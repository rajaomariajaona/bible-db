document_id: JHN.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus at the Feast of Tabernacles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this Jesus traveled extensively throughout the province of Galilee, but he avoided the province of Judea, for he knew the Jewish leaders in Jerusalem were plotting to have him killed. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: During the feast, the Jewish leaders kept looking for Jesus and asking around, “Where is he? Have you seen him?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A controversy was brewing among the people, with so many differing opinions about Jesus. Some were saying, “He’s a good man!” While others weren’t convinced and insisted, saying, “He’s just a demagogue.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He leads the people astray.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet no one was bold enough to speak out publicly on Jesus’ behalf for fear of the Jewish leaders.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Not until the feast was half over did Jesus finally appear in the temple courts and begin to teach. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The Jewish leaders were astonished by what he taught and said, “How did this man acquire such knowledge? He wasn’t trained in our schools—who taught him?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I don’t teach my own ideas,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “My doctrine is not my own.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the truth revealed to me by the One who sent me.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you want to test my teachings and discover where I received them, first be passionate to do God’s will,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic is very poetic: “Whoever is satisfied to do God’s satisfaction shall gain liberating knowledge.”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and then you will be able to discern if my teachings are from the heart of God or from my own opinions.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Charlatans praise themselves and seek honor from men, but my Father sent me to speak truth on his behalf. And I have no false motive, because I seek only the glory of God.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moses has given you the law, but not one of you is faithful to keep it. So if you are all law-breakers, why then would you seek to kill me?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the annual Feast of Tabernacles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Tents.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'was approaching. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then some in the crowd shouted out, “You must be out of your mind! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Are you demon possessed?” This is an Aramaic figure of speech for lunacy.
      marker-yv: yv-n
    - type: text
      text: Who’s trying to kill you?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I only had to do one miracle,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “one deed.” Although Jesus performed many miracles, it is likely he is referring to the miracle of the lame man being healed in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and all of you marvel!
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet isn’t it true that Moses and your forefathers
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the patriarchs. Circumcision actually began with a sign of the covenant God instituted with Abraham. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ordered you to circumcise your sons even if the eighth day fell on a Sabbath?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A son was to be circumcised eight days after he was born. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if you cut away part of a man on the Sabbath and that doesn’t break the Jewish law,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Torah.” Jesus was saying, “Who are you to judge me when you don’t practice what you preach?”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: why then would you be indignant with me for making a man completely healed on the Sabbath?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Stop judging based on the superficial.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Never judge as a hypocrite wearing a mask.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: First you must
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: embrace the standards of mercy
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus was teaching that the law of mercy (healing the lame man) overrides the laws of Moses (regulations of the Sabbath). Seeing situations and people with the lens of mercy gives us true discernment.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and truth.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then some of the residents of Jerusalem spoke up and said, “Isn’t this the one they’re trying to kill? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So why is he here speaking publicly and not one of the Jewish leaders is doing anything about it? Are they starting to think that he’s the Anointed One? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But how could he be, since we know this man is from Galilee, but no one will know where the true Messiah comes from, he’ll just appear out of nowhere.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a Rabbinical interpretation that was common in that day. However, they knew that the Messiah would come from Bethlehem, for it was prophesied in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: where the Christ would be born. So in truth, they did not know where Jesus was from.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Knowing all of this, Jesus one day preached '
    - type: usfm
      marker: it
      children:
      - type: text
        text: boldly
    - type: text
      text: ' in the temple courts, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So, you think you know me and where I come from? But you don’t know the One who sent me—the Father who is always faithful.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “truthful.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have not come simply on my own initiative.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Father has sent me here, and I know all about him, for I have come from his presence.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I am from next to him.” The Aramaic is “from his presence I am.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Jesus’ brothers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were actually Jesus’ half brothers, for Joseph was his stepfather.
      marker-yv: yv-n
    - type: text
      text: 'came to advise him, saying, “Why don’t you leave the countryside villages and go to Judea where the crowds are, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “so that your followers can see your miracles.”
      marker-yv: yv-n
    - type: text
      text: 'so that your followers can see your miracles? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'His words caused many to want to arrest him, but no man was able to lay a hand on him, for it wasn’t yet his appointed time. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And there were many people who thought he might be the Messiah. They said, “After all, when the Anointed One appears, could he possibly do more signs and wonders than this man has done?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So when the Pharisees '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “separated ones.”
      marker-yv: yv-n
    - type: text
      text: heard these rumors circulating about Jesus, they went with the leading priests and the temple guards to arrest him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My days to be with you are numbered. Then I will return to the One who sent me.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you will search for me and not be able to find me. For where I am,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this tremendous statement, Jesus was telling them that he was about to return to the realm where I AM dwells. Of course, the Jewish leaders didn’t understand the impact of what he was telling them.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you cannot come.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus was speaking of his approaching death on the cross, which he knew was near, and his ascension back to the Father, the realm of I AM.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When the Jewish leaders heard this, they discussed among themselves, “Where could he possibly go that we won’t be able to find him? Is he going to minister in a different land where our people live scattered among the nations? Is he going to teach those who are not Jews? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were many of the tribes of Israel who were scattered at that time in Assyria, Iran, Afghanistan, and other adjacent nations. These had been taken captive by the kings of Assyria in 722 BC. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: What did he really mean by his statement, ‘You will search for me and won’t be able to find me. And where I am you can’t come’?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rivers of Living Water
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Then on the most important day of the feast, the last day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When man’s feasting is over there is still thirst. Jesus comes at the last day of the feast to satisfy the thirst of those who seek God. Only the Lord Jesus can quench the spiritual thirst of men by giving them his living water.
      marker-yv: yv-n
    - type: text
      text: Jesus stood and shouted out to the crowds—
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “All you thirsty ones, come to me! Come to me and drink!
    - type: text
