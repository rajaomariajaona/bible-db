    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Jesus was prophesying about the Holy Spirit that believers were being prepared to receive. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:39
      - type: usfm
        marker: ft
