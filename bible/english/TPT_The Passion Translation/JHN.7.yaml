        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: But the Holy Spirit had not yet been poured out upon them, because Jesus had not yet been unveiled in his full splendor.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This splendor included the splendor of the cross, the splendor of his resurrection, and the glory of his ascension into heaven. Just as water poured out of the rock that was struck by Moses, so from the wounded side of Jesus living water poured out to heal, save, and bring life to everyone who believes. The Holy Spirit poured out of Christ and into the church at Pentecost.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divided Opinions about Jesus
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'No one can see what you’re doing here in the backwoods of Galilee. How do you expect to be successful and famous if you do all these things in secret? Now is your time—go to Jerusalem, come out of hiding, and show the world who you are!” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'When the crowd heard Jesus’ words, some said, “This man really is a prophet!” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Others said, “He’s the Messiah!” But others said, “How could he be the Anointed One since he’s from Galilee? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Don’t the Scriptures say that he will be one of David’s descendants and be born in Bethlehem, the city of David?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They had an understanding of the Bible but still missed who Jesus was. Bible knowledge alone, without the Holy Spirit opening our hearts and bringing us to Christ, can leave us as a skeptic. They jumped to conclusions, not realizing that Jesus may have been raised in Nazareth in Galilee, but he was born in Bethlehem and was a true descendant of David. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 89:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
