document_id: JHN.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus at the Feast of Tabernacles
  - type: text
    content: 'After this Jesus traveled extensively throughout the province of Galilee, but he avoided the province of Judea, for he knew the Jewish leaders in Jerusalem were plotting to have him killed. '
  '11':
  - type: text
    content: During the feast, the Jewish leaders kept looking for Jesus and asking around, “Where is he? Have you seen him?”
  '12':
  - type: text
    content: 'A controversy was brewing among the people, with so many differing opinions about Jesus. Some were saying, “He’s a good man!” While others weren’t convinced and insisted, saying, “He’s just a demagogue.” '
  - type: note
    content: Or “He leads the people astray.”
  '13':
  - type: text
    content: Yet no one was bold enough to speak out publicly on Jesus’ behalf for fear of the Jewish leaders.
  '14':
  - type: text
    content: 'Not until the feast was half over did Jesus finally appear in the temple courts and begin to teach. '
  '15':
  - type: text
    content: The Jewish leaders were astonished by what he taught and said, “How did this man acquire such knowledge? He wasn’t trained in our schools—who taught him?”
  '16':
  - type: text
    content: 'So Jesus responded, '
  - type: text
    content: “I don’t teach my own ideas,
  - type: text
    content: ' '
  - type: note
    content: Or “My doctrine is not my own.”
  - type: text
    content: but the truth revealed to me by the One who sent me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: If you want to test my teachings and discover where I received them, first be passionate to do God’s will,
  - type: text
    content: ' '
  - type: note
    content: 'The Aramaic is very poetic: “Whoever is satisfied to do God’s satisfaction shall gain liberating knowledge.”'
  - type: text
    content: and then you will be able to discern if my teachings are from the heart of God or from my own opinions.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Charlatans praise themselves and seek honor from men, but my Father sent me to speak truth on his behalf. And I have no false motive, because I seek only the glory of God.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Moses has given you the law, but not one of you is faithful to keep it. So if you are all law-breakers, why then would you seek to kill me?”
  '2':
  - type: text
    content: 'Now the annual Feast of Tabernacles '
  - type: note
    content: Or “Tents.” See Deut. 16:13.
  - type: text
    content: 'was approaching. '
  '20':
  - type: text
    content: 'Then some in the crowd shouted out, “You must be out of your mind! '
  - type: note
    content: Or “Are you demon possessed?” This is an Aramaic figure of speech for lunacy.
  - type: text
    content: Who’s trying to kill you?”
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I only had to do one miracle,
  - type: text
    content: ' '
  - type: note
    content: Or “one deed.” Although Jesus performed many miracles, it is likely he is referring to the miracle of the lame man being healed in John 5.
  - type: text
    content: and all of you marvel!
  - type: text
    content: ' '
  '22':
  - type: text
    content: Yet isn’t it true that Moses and your forefathers
  - type: text
    content: ' '
  - type: note
    content: This is the patriarchs. Circumcision actually began with a sign of the covenant God instituted with Abraham. See Gen. 17.
  - type: text
    content: ordered you to circumcise your sons even if the eighth day fell on a Sabbath?
  - type: text
    content: ' '
  - type: note
    content: A son was to be circumcised eight days after he was born. See Phil. 3:5.
  '23':
  - type: text
    content: So if you cut away part of a man on the Sabbath and that doesn’t break the Jewish law,
  - type: text
    content: ' '
  - type: note
    content: Or “Torah.” Jesus was saying, “Who are you to judge me when you don’t practice what you preach?”
  - type: text
    content: why then would you be indignant with me for making a man completely healed on the Sabbath?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Stop judging based on the superficial.
  - type: text
    content: ' '
  - type: note
    content: Or “Never judge as a hypocrite wearing a mask.”
  - type: text
    content: First you must
  - type: text
    content: ' '
  - type: text
    content: embrace the standards of mercy
  - type: text
    content: ' '
  - type: note
    content: Jesus was teaching that the law of mercy (healing the lame man) overrides the laws of Moses (regulations of the Sabbath). Seeing situations and people with the lens of mercy gives us true discernment.
  - type: text
    content: and truth.”
  '25':
  - type: text
    content: 'Then some of the residents of Jerusalem spoke up and said, “Isn’t this the one they’re trying to kill? '
  '26':
  - type: text
    content: 'So why is he here speaking publicly and not one of the Jewish leaders is doing anything about it? Are they starting to think that he’s the Anointed One? '
  '27':
  - type: text
    content: But how could he be, since we know this man is from Galilee, but no one will know where the true Messiah comes from, he’ll just appear out of nowhere.”
  - type: note
    content: This was a Rabbinical interpretation that was common in that day. However, they knew that the Messiah would come from Bethlehem, for it was prophesied in Mic. 5:2 where the Christ would be born. So in truth, they did not know where Jesus was from.
  '28':
  - type: text
    content: 'Knowing all of this, Jesus one day preached '
  - type: text
    content: boldly
  - type: text
    content: ' in the temple courts, '
  - type: text
    content: “So, you think you know me and where I come from? But you don’t know the One who sent me—the Father who is always faithful.
  - type: text
    content: ' '
  - type: note
    content: Or “truthful.”
  - type: text
    content: I have not come simply on my own initiative.
  - type: text
    content: ' '
  '29':
  - type: text
    content: The Father has sent me here, and I know all about him, for I have come from his presence.”
  - type: note
    content: Or “I am from next to him.” The Aramaic is “from his presence I am.”
  '3':
  - type: text
    content: 'So Jesus’ brothers '
  - type: note
    content: These were actually Jesus’ half brothers, for Joseph was his stepfather.
  - type: text
    content: 'came to advise him, saying, “Why don’t you leave the countryside villages and go to Judea where the crowds are, '
  - type: note
    content: Or “so that your followers can see your miracles.”
  - type: text
    content: 'so that your followers can see your miracles? '
  '30':
  - type: text
    content: 'His words caused many to want to arrest him, but no man was able to lay a hand on him, for it wasn’t yet his appointed time. '
  '31':
  - type: text
    content: And there were many people who thought he might be the Messiah. They said, “After all, when the Anointed One appears, could he possibly do more signs and wonders than this man has done?”
  '32':
  - type: text
    content: 'So when the Pharisees '
  - type: note
    content: Or “separated ones.”
  - type: text
    content: heard these rumors circulating about Jesus, they went with the leading priests and the temple guards to arrest him.
  '33':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “My days to be with you are numbered. Then I will return to the One who sent me.
  - type: text
    content: ' '
  '34':
  - type: text
    content: And you will search for me and not be able to find me. For where I am,
  - type: text
    content: ' '
  - type: note
    content: In this tremendous statement, Jesus was telling them that he was about to return to the realm where I AM dwells. Of course, the Jewish leaders didn’t understand the impact of what he was telling them.
  - type: text
    content: you cannot come.”
  - type: note
    content: Jesus was speaking of his approaching death on the cross, which he knew was near, and his ascension back to the Father, the realm of I AM.
  '35':
  - type: text
    content: 'When the Jewish leaders heard this, they discussed among themselves, “Where could he possibly go that we won’t be able to find him? Is he going to minister in a different land where our people live scattered among the nations? Is he going to teach those who are not Jews? '
  - type: note
    content: There were many of the tribes of Israel who were scattered at that time in Assyria, Iran, Afghanistan, and other adjacent nations. These had been taken captive by the kings of Assyria in 722 BC. See 2 Kings 17–18.
  '36':
  - type: text
    content: What did he really mean by his statement, ‘You will search for me and won’t be able to find me. And where I am you can’t come’?”
  - type: heading
    content: Rivers of Living Water
  '37':
  - type: text
    content: 'Then on the most important day of the feast, the last day, '
  - type: note
    content: When man’s feasting is over there is still thirst. Jesus comes at the last day of the feast to satisfy the thirst of those who seek God. Only the Lord Jesus can quench the spiritual thirst of men by giving them his living water.
  - type: text
    content: Jesus stood and shouted out to the crowds—
  - type: text
    content: “All you thirsty ones, come to me! Come to me and drink!
  - type: text
    content: ' '
  '38':
  - type: text
    content: Believe in me so that rivers of living water will burst out from within you, flowing
  - type: text
    content: ' '
  - type: note
    content: The root word used here is the same as the River Jordan, which means “flowing” (down).
  - type: text
    content: from your innermost being, just like the Scripture says!”
  - type: note
    content: Or “rivers of living water will flow from his throne within.” See Isa. 44:3; 55:1; 58:11; Ezek. 47:1; Rev. 22:1. A drink becomes a river!
  '39':
  - type: text
    content: 'Jesus was prophesying about the Holy Spirit that believers were being prepared to receive. '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: But the Holy Spirit had not yet been poured out upon them, because Jesus had not yet been unveiled in his full splendor.
  - type: note
    content: This splendor included the splendor of the cross, the splendor of his resurrection, and the glory of his ascension into heaven. Just as water poured out of the rock that was struck by Moses, so from the wounded side of Jesus living water poured out to heal, save, and bring life to everyone who believes. The Holy Spirit poured out of Christ and into the church at Pentecost.
  - type: heading
    content: Divided Opinions about Jesus
  '4':
  - type: text
    content: 'No one can see what you’re doing here in the backwoods of Galilee. How do you expect to be successful and famous if you do all these things in secret? Now is your time—go to Jerusalem, come out of hiding, and show the world who you are!” '
  '40':
  - type: text
    content: 'When the crowd heard Jesus’ words, some said, “This man really is a prophet!” '
  '41':
  - type: text
    content: 'Others said, “He’s the Messiah!” But others said, “How could he be the Anointed One since he’s from Galilee? '
  '42':
  - type: text
    content: 'Don’t the Scriptures say that he will be one of David’s descendants and be born in Bethlehem, the city of David?” '
  - type: note
    content: They had an understanding of the Bible but still missed who Jesus was. Bible knowledge alone, without the Holy Spirit opening our hearts and bringing us to Christ, can leave us as a skeptic. They jumped to conclusions, not realizing that Jesus may have been raised in Nazareth in Galilee, but he was born in Bethlehem and was a true descendant of David. See Ps. 89:3–4; Mic. 5:2; Matt. 1:1; 2:1; Luke 2:4.
  '43':
  - type: text
    content: 'So the crowd was divided over Jesus, '
  '44':
  - type: text
    content: some wanted him arrested but no one dared to lay a hand on him.
  - type: heading
    content: The Unbelief of Religious Leaders
  '45':
  - type: text
    content: So when the temple guards returned to the Pharisees and the leading priests without Jesus, they were questioned, “Where is he? Why didn’t you bring that man back with you?”
  '46':
  - type: text
    content: They answered, “You don’t understand—he speaks amazing things like no one else has ever spoken!”
  '47':
  - type: text
    content: 'The religious leaders mocked, “Oh, so now you also have been led astray by him? '
  '48':
  - type: text
    content: 'Do you see even one of us, your leaders, following him? '
  '49':
  - type: text
    content: This ignorant rabble swarms around him because none of them know anything about the Law! They’re all cursed!”
  '5':
  - type: text
    content: His brothers were pushing him, even though they didn’t yet believe in him as the Savior.
  - type: note
    content: As translated from the Aramaic and implied in the Greek text. This fulfills the prophecy of Ps. 69:8–9.
  '50':
  - type: text
    content: 'Just then, Nicodemus, who had secretly spent time with Jesus, spoke up, for he was a respected voice among them. '
  '51':
  - type: text
    content: He cautioned them, saying, “Does our law decide a man’s guilt before we first hear him and allow him to defend himself?”
  '52':
  - type: text
    content: 'They argued, “Oh, so now you’re an advocate for this Galilean! Search the Scriptures, Nicodemus, and you’ll see that there’s no mention of a prophet coming out of Galilee!” '
  - type: note
    content: They apparently didn’t know their own Jewish history, for the prophet Jonah, in 580 BC, came from Gathepher, a village only three miles from Nazareth. It is believed that Elijah, Nahum, and Hosea also came from Galilee. Jesus’ Galilean ministry was prophesied in Isa. 9:1–2.
  - type: text
    content: So with that their debate ended
  - type: text
    content: ', '
  '53':
  - type: text
    content: and they each went their own way.
  '6':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “My time of being unveiled hasn’t yet come, but any time is a suitable opportunity for you
  - type: text
    content: ' '
  - type: text
    content: to gain man’s approval.
  - type: text
    content: ' '
  '7':
  - type: text
    content: The world can’t hate you, but it does me, for I am exposing their evil deeds.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You can go ahead and celebrate the feast without me—my appointed time has not yet come.”
  '9':
  - type: text
    content: 'Jesus lingered in Galilee until his brothers had left for the feast in Jerusalem. Then later, Jesus took a back road and went into Jerusalem in secret. '
