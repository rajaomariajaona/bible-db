    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: So when the temple guards returned to the Pharisees and the leading priests without Jesus, they were questioned, “Where is he? Why didn’t you bring that man back with you?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: They answered, “You don’t understand—he speaks amazing things like no one else has ever spoken!”
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'The religious leaders mocked, “Oh, so now you also have been led astray by him? '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
