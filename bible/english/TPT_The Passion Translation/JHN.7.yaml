          text: 7:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They apparently didn’t know their own Jewish history, for the prophet Jonah, in 580 BC, came from Gathepher, a village only three miles from Nazareth. It is believed that Elijah, Nahum, and Hosea also came from Galilee. Jesus’ Galilean ministry was prophesied in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
