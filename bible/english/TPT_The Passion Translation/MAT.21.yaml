document_id: MAT.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Triumphal Entry into Jerusalem
  - type: text
    content: 'Now, as they were approaching Jerusalem they arrived at the place of the stables '
  - type: note
    content: Or “Bethphage,” which in Aramaic means “the house of stables.” Transliterated into Greek it means “the house of unripe figs.”
  - type: text
    content: 'near the Mount of Olives. Jesus sent two of his disciples ahead, saying, '
  '10':
  - type: text
    content: 'As Jesus entered Jerusalem, the people went wild with excitement—the entire city was thrown into an uproar! '
  - type: note
    content: Or “The city was shaken [like with an earthquake]!”
  '11':
  - type: text
    content: 'Some asked, “Who is this man?” And the crowds shouted back, “This is Jesus! He’s the prophet from Nazareth '
  - type: note
    content: The Hebrew word Nazara (Nazareth) can be translated “Branch” or “Victorious One.” They were shouting, “This is Jesus, the Victorious One of Galilee!”
  - type: text
    content: of Galilee!”
  - type: heading
    content: Jesus in the Temple
  '12':
  - type: text
    content: 'Upon entering Jerusalem Jesus went directly into the temple area and drove away all the merchants who were buying and selling their goods. He overturned the tables of the money changers and the stands of those selling doves. '
  - type: note
    content: The revered theologian and historian Jerome was the translator of the Bible into Latin. He also wrote a commentary on Matthew, which includes a fascinating thought about Jesus overturning the tables. Jerome writes, “For a certain fiery and starry light shone from his eyes, and the majesty of God gleamed in his face.”
  '13':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “My dwelling place will be known as a house of prayer, but you have made it into a hangout for thieves!”
  - type: note
    content: See Isa. 56:5–7; Jer. 7:11.
  '14':
  - type: text
    content: Then the blind and the crippled came into the temple courts, and Jesus healed them all. And the children circled around him shouting out, “Blessings and praises to the Son of David!”
  '15':
  - type: text
    content: 'But when the chief priests and religious scholars heard the children shouting and saw all the wonderful miracles of healing, they were furious. '
  - type: note
    content: The Aramaic is “it seemed evil to them.”
  '16':
  - type: text
    content: They said to Jesus, “Don’t you hear what these children are saying? This is not right!”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Yes, I hear them. But have you never read the Scripture, ‘From the lips of children and infants you have ordained praise’?”
  - type: note
    content: See Ps. 8:2. The Greek text quoting from Ps. 8 does not agree with either the Hebrew text, the Septuagint, or the Aramaic, but seems to line up with a version found in the Dead Sea Scrolls. You might say Jesus paraphrased the Scriptures to speak to his generation.
  '17':
  - type: text
    content: Jesus then left at once for the nearby village of Bethany, where he spent the night.
  - type: note
    content: The Hebrew Matthew adds, “There he was explaining the kingdom of God.”
  '18':
  - type: text
    content: 'While walking back into the city the next morning, he got hungry. '
  '19':
  - type: text
    content: 'He noticed a lone fig tree by the side of the path and walked over to see if there was any fruit on it, but there was none—he found only leaves. So he spoke to the fig tree and said, '
  - type: text
    content: “You will be barren and will never bear fruit again!”
  - type: text
    content: ' Instantly the fig tree '
  - type: note
    content: The fig tree is first mentioned in Gen. 3:7, with its leaves being a “covering” for fallen Adam and Eve to hide behind. It is connected to the Tree of Knowledge of Good and Evil, and became a hiding place for Zacchaeus, who climbed a sycamore-fig tree to see Jesus. Many also equate the fig tree as being a symbol of Israel.
  - type: text
    content: shriveled up right in front of their eyes!
  '2':
  - type: text
    content: '“As soon as you enter the village, you will find a donkey tethered along with her young colt. Untie them both and bring them to me. '
  '20':
  - type: text
    content: Astonished, his disciples asked, “How did you make this fig tree instantly wither and die?”
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Listen to the truth. If you do not doubt God’s power and speak out of faith’s fullness, you can also speak to a tree and it will wither away. Even more than that, you could say to this mountain, ‘Be lifted up and be thrown into the sea’ and it will be done.
  - type: text
    content: ' '
  - type: note
    content: The mountain and the sea are both metaphors. Mountains speak of kingdoms, and the sea represents the nations (e.g., “sea of humanity”). Faith brings the reality of the kingdom realm into the nations.
  '22':
  - type: text
    content: Everything you pray for with the fullness of faith you will receive!”
  - type: note
    content: Jesus taught his disciples that if faith’s fullness lived in them, they could speak to the physical creation around them and it would respond. Faith unlocks great authority for the believer.
  - type: heading
    content: The Authority of Jesus
  '23':
  - type: text
    content: 'After this Jesus went into the temple courts and taught the people. The leading priests and Jewish elders approached him and interrupted him and asked, “By what power '
  - type: note
    content: As translated from the Hebrew Matthew. The Greek is “authority.” See also vv. 24 and 27.
  - type: text
    content: do you do these things, and who granted you the authority to teach here?”
  '24':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “I too have a question to ask you. If you can answer this question, then I will tell you by what power I do these things.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Where did John’s authority to baptize come from? From heaven or from people?”
  '26':
  - type: text
    content: They stepped away and debated among themselves, saying, “How should we answer this? If we say from heaven, he will say to us, ‘Then why didn’t you respond to John and believe what he said?’ But if we deny that God gave John his authority, we’ll be mobbed by the people, for they’re convinced that John was God’s prophet.”
  '27':
  - type: text
    content: So they finally answered, “We don’t know.”
  - type: text
    content: “Then neither will I tell you from where my power comes to do these things!”
  - type: text
    content: ' he replied.'
  - type: heading
    content: The Parable of Two Sons
  '28':
  - type: text
    content: 'Jesus said to his critics, '
  - type: note
    content: As translated from the Hebrew Matthew.
  - type: text
    content: “Tell me what you think
  - type: text
    content: ' '
  - type: text
    content: of this parable
  - type: text
    content: ':'
  - type: text
    content: “There once was a man with two sons. The father came to the first and said, ‘Son, I want you to go and work in the vineyard today.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: The son replied, ‘I’d rather not.’ But afterward, he deeply regretted what he said to his father, changed his mind, and decided to go to the vineyard.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And if anyone stops you and asks, ‘What are you doing?’ just tell them, ‘The Lord of All needs them,’ and he will let you take them.”
  '30':
  - type: text
    content: The father approached the second son and said the same thing to him. The son replied, ‘Father, I will go and do as you said.’ But he never did—he didn’t go to the vineyard.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Tell me now, which of these two sons did the will of his father?”
  - type: text
    content: They answered him, “The first one.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You’re right. For many sinners, tax collectors, and prostitutes are going into God’s kingdom realm ahead of you!
  - type: text
    content: ' '
  '32':
  - type: text
    content: John came to show you the path of righteousness,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “the way of goodness.”
  - type: text
    content: yet the despised and outcasts believed in him, but you did not. When you saw them turn, you neither repented of your ways nor believed his words.”
  - type: heading
    content: The Parable of the Rejected Son
  '33':
  - type: text
    content: “Pay close attention to this parable,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “There once was an honorable man who planted a vineyard.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew. The Greek is “landowner.” See Isa. 5:1–7.
  - type: text
    content: He built a fence around it,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “He planted a vineyard by a stream.”
  - type: text
    content: dug out a pit for pressing the grapes, and erected a watchtower. Afterward he leased the land to tenant farmers and then went a distance away.
  - type: text
    content: ' '
  '34':
  - type: text
    content: At harvest time he sent his servants to the tenants to collect the portion that was due him as the lord of the vineyard.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But the tenants seized his servants and beat one, killed another, and stoned another.
  - type: text
    content: ' '
  - type: note
    content: 'The obvious meaning of the parable is this: God is the landowner, the servants he sends are God’s prophets, and the son is Jesus Christ.'
  '36':
  - type: text
    content: So the landowner sent other servants, even more than at first, but they were mistreated the same way.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Finally, he sent his own son to them, and he said to himself, ‘Perhaps with my own son standing before them they will be ashamed of what they’ve done.’
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “They will respect my son.”
  '38':
  - type: text
    content: But when the tenants saw the son, they said, ‘This is the heir! Let’s kill him and then we can have his inheritance!’
  - type: text
    content: ' '
  '39':
  - type: text
    content: So they seized him, took him outside the vineyard, and murdered him.
  '4':
  - type: text
    content: 'All of this happened to fulfill the prophecy:'
  '40':
  - type: text
    content: “You tell me, when the lord of the vineyard comes, what do you think he will do to those tenants?”
  '41':
  - type: text
    content: They answered, “He will bring a horrible death to those who did this evil and he will completely destroy them. Then he’ll lease his vineyard to different tenants who will be faithful to give him the portion he deserves.”
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Haven’t you ever read the Scripture that says:'
  - type: text
    content: The very stone the builder rejected as flawed
  - type: text
    content: has now become the most important
  - type: text
    content: cornerstone.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 118:22–23. Or “capstone of the arch” or “keystone.” This is an obvious metaphor of Jesus Christ. He is a Stone that many will stumble over, and a Stone that will fall upon the unbeliever.
  - type: text
    content: This was the Lord’s plan
  - type: text
    content: ' '
  - type: note
    content: The Aramaic and the Hebrew Matthew read “This came from the presence of [next to] Lord Yahweh and is a marvel in our eyes.”
  - type: text
    content: —
  - type: text
    content: isn’t it marvelous to behold?
  '43':
  - type: text
    content: “This is why I say to you that the kingdom realm of God will be taken from you and given to a people
  - type: text
    content: ' '
  - type: note
    content: Or “nation.” The Hebrew Matthew and Aramaic can be translated “gentiles.” This is a prophecy of the church being given access to God’s kingdom realm through faith in Jesus Christ.
  - type: text
    content: who will bear its fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: The one who comes against this stone
  - type: text
    content: ' '
  - type: note
    content: Or “falls upon this stone.” Some manuscripts do not include v. 44. The Hebrew Matthew does not have the last clause of v. 44.
  - type: text
    content: will be broken, but the one on whom it falls will be pulverized!”
  - type: note
    content: See Isa. 8:14–15; Dan. 2:34–35.
  '45':
  - type: text
    content: 'When the leading priests and the Pharisees realized that the parable was referring to them, they were '
  '46':
  - type: text
    content: outraged and wanted to arrest him at once. But they were afraid of the reaction of the crowds, because the people considered him to be a prophet.
  '5':
  - type: text
    content: 'Tell Zion’s daughter:'
  - type: text
    content: “Look, your King arrives!
  - type: text
    content: He’s coming to you humbly,
  - type: text
    content: sitting on a donkey, riding on a donkey’s colt.”
  - type: note
    content: See Zech. 9:9. Kings rode on horses, not donkeys. He chose the young colt as a symbol of humility and gentleness.
  '6':
  - type: text
    content: 'So the two disciples went on ahead and did as Jesus had instructed them. '
  '7':
  - type: text
    content: They brought the donkey and her colt to him and placed their cloaks and prayer shawls on the colt, and Jesus rode on it.
  '8':
  - type: text
    content: 'Then an exceptionally large crowd gathered and carpeted the road before him with their cloaks and prayer shawls. '
  - type: note
    content: See 2 Kings 9:13.
  - type: text
    content: 'Others cut down branches from trees to spread in his path. '
  '9':
  - type: text
    content: 'Jesus rode in the center of the procession—crowds going before him and crowds coming behind him, and they all shouted, “Bring the victory, Lord, '
  - type: note
    content: Or “Hosanna,” an Aramaic word that means “O, save (bring the victory), Lord!” The crowds were recognizing Jesus as Yahweh’s Messiah. By shouting out, “Son of David,” they were clearly expecting Jesus to immediately overthrow the Roman oppression and set the nation free. Many want victory before the cross, but true victory comes after resurrection!
  - type: text
    content: 'Son of David! He is the blessed one sent from the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  - type: note
    content: As translated from the Aramaic. See Ps. 118:25–26.
  - type: text
    content: We celebrate with praises to God in the highest!”
