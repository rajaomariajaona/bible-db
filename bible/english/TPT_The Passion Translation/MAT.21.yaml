      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who will bear its fruit.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who comes against this stone
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:44
      - type: usfm
        marker: ft
