  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tell Zion’s daughter:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, your King arrives!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s coming to you humbly,
  - type: usfm
    marker: q1
    children:
    - type: text
