document_id: MAT.21,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Triumphal Entry into Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now, as they were approaching Jerusalem they arrived at the place of the stables '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Bethphage,” which in Aramaic means “the house of stables.” Transliterated into Greek it means “the house of unripe figs.”
      marker-yv: yv-n
    - type: text
      text: 'near the Mount of Olives. Jesus sent two of his disciples ahead, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'As Jesus entered Jerusalem, the people went wild with excitement—the entire city was thrown into an uproar! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The city was shaken [like with an earthquake]!”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Some asked, “Who is this man?” And the crowds shouted back, “This is Jesus! He’s the prophet from Nazareth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nazara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Nazareth) can be translated “Branch” or “Victorious One.” They were shouting, “This is Jesus, the Victorious One of Galilee!”
      marker-yv: yv-n
    - type: text
      text: of Galilee!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus in the Temple
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Upon entering Jerusalem Jesus went directly into the temple area and drove away all the merchants who were buying and selling their goods. He overturned the tables of the money changers and the stands of those selling doves. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The revered theologian and historian Jerome was the translator of the Bible into Latin. He also wrote a commentary on Matthew, which includes a fascinating thought about Jesus overturning the tables. Jerome writes, “For a certain fiery and starry light shone from his eyes, and the majesty of God gleamed in his face.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My dwelling place will be known as a house of prayer, but you have made it into a hangout for thieves!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 56:5–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the blind and the crippled came into the temple courts, and Jesus healed them all. And the children circled around him shouting out, “Blessings and praises to the Son of David!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But when the chief priests and religious scholars heard the children shouting and saw all the wonderful miracles of healing, they were furious. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “it seemed evil to them.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They said to Jesus, “Don’t you hear what these children are saying? This is not right!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, I hear them. But have you never read the Scripture, ‘From the lips of children and infants you have ordained praise’?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Greek text quoting from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: does not agree with either the Hebrew text, the Septuagint, or the Aramaic, but seems to line up with a version found in the Dead Sea Scrolls. You might say Jesus paraphrased the Scriptures to speak to his generation.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Jesus then left at once for the nearby village of Bethany, where he spent the night.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew Matthew adds, “There he was explaining the kingdom of God.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'While walking back into the city the next morning, he got hungry. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He noticed a lone fig tree by the side of the path and walked over to see if there was any fruit on it, but there was none—he found only leaves. So he spoke to the fig tree and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will be barren and will never bear fruit again!”
    - type: text
      text: ' Instantly the fig tree '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fig tree is first mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', with its leaves being a “covering” for fallen Adam and Eve to hide behind. It is connected to the Tree of Knowledge of Good and Evil, and became a hiding place for Zacchaeus, who climbed a sycamore-fig tree to see Jesus. Many also equate the fig tree as being a symbol of Israel.'
      marker-yv: yv-n
    - type: text
      text: shriveled up right in front of their eyes!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“As soon as you enter the village, you will find a donkey tethered along with her young colt. Untie them both and bring them to me. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Astonished, his disciples asked, “How did you make this fig tree instantly wither and die?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen to the truth. If you do not doubt God’s power and speak out of faith’s fullness, you can also speak to a tree and it will wither away. Even more than that, you could say to this mountain, ‘Be lifted up and be thrown into the sea’ and it will be done.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The mountain and the sea are both metaphors. Mountains speak of kingdoms, and the sea represents the nations (e.g., “sea of humanity”). Faith brings the reality of the kingdom realm into the nations.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Everything you pray for with the fullness of faith you will receive!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus taught his disciples that if faith’s fullness lived in them, they could speak to the physical creation around them and it would respond. Faith unlocks great authority for the believer.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Authority of Jesus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'After this Jesus went into the temple courts and taught the people. The leading priests and Jewish elders approached him and interrupted him and asked, “By what power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew Matthew. The Greek is “authority.” See also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: do you do these things, and who granted you the authority to teach here?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I too have a question to ask you. If you can answer this question, then I will tell you by what power I do these things.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Where did John’s authority to baptize come from? From heaven or from people?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: They stepped away and debated among themselves, saying, “How should we answer this? If we say from heaven, he will say to us, ‘Then why didn’t you respond to John and believe what he said?’ But if we deny that God gave John his authority, we’ll be mobbed by the people, for they’re convinced that John was God’s prophet.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So they finally answered, “We don’t know.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then neither will I tell you from where my power comes to do these things!”
    - type: text
      text: ' he replied.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of Two Sons
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jesus said to his critics, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew Matthew.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Tell me what you think
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: of this parable
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ':'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There once was a man with two sons. The father came to the first and said, ‘Son, I want you to go and work in the vineyard today.’
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The son replied, ‘I’d rather not.’ But afterward, he deeply regretted what he said to his father, changed his mind, and decided to go to the vineyard.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And if anyone stops you and asks, ‘What are you doing?’ just tell them, ‘The Lord of All needs them,’ and he will let you take them.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The father approached the second son and said the same thing to him. The son replied, ‘Father, I will go and do as you said.’ But he never did—he didn’t go to the vineyard.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tell me now, which of these two sons did the will of his father?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They answered him, “The first one.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You’re right. For many sinners, tax collectors, and prostitutes are going into God’s kingdom realm ahead of you!
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: John came to show you the path of righteousness,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the way of goodness.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: yet the despised and outcasts believed in him, but you did not. When you saw them turn, you neither repented of your ways nor believed his words.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Rejected Son
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Pay close attention to this parable,”
    - type: text
      text: ' Jesus said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There once was an honorable man who planted a vineyard.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew Matthew. The Greek is “landowner.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 5:1–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He built a fence around it,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “He planted a vineyard by a stream.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dug out a pit for pressing the grapes, and erected a watchtower. Afterward he leased the land to tenant farmers and then went a distance away.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At harvest time he sent his servants to the tenants to collect the portion that was due him as the lord of the vineyard.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the tenants seized his servants and beat one, killed another, and stoned another.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The obvious meaning of the parable is this: God is the landowner, the servants he sends are God’s prophets, and the son is Jesus Christ.'
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the landowner sent other servants, even more than at first, but they were mistreated the same way.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Finally, he sent his own son to them, and he said to himself, ‘Perhaps with my own son standing before them they will be ashamed of what they’ve done.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “They will respect my son.”
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the tenants saw the son, they said, ‘This is the heir! Let’s kill him and then we can have his inheritance!’
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So they seized him, took him outside the vineyard, and murdered him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'All of this happened to fulfill the prophecy:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You tell me, when the lord of the vineyard comes, what do you think he will do to those tenants?”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: They answered, “He will bring a horrible death to those who did this evil and he will completely destroy them. Then he’ll lease his vineyard to different tenants who will be faithful to give him the portion he deserves.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
