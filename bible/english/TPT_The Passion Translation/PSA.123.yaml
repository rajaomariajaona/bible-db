document_id: PSA.123
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Prayer for Mercy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of the stairway
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God-Enthroned in heaven, I lift my eyes toward you in worship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The way I love you
- type: usfm
  marker: q1
  children:
  - type: text
    text: is like the way a servant wants to please his master,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the way a maid waits for the orders of her mistress.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We look to you, our God, with passionate longing
- type: usfm
  marker: q1
  children:
  - type: text
    text: to please you and discover more of your mercy and grace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: For we’ve had more than our fill of this scoffing and scorn—
- type: usfm
  marker: q1
  children:
  - type: text
    text: this mistreatment by the wealthy elite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, show us your mercy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, show us your grace!
