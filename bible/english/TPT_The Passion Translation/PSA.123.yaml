document_id: PSA.123,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer for Mercy
  - type: text
    content: A song of the stairway
  - type: text
    content: O God-Enthroned in heaven, I lift my eyes toward you in worship.
  '2':
  - type: text
    content: The way I love you
  - type: text
    content: is like the way a servant wants to please his master,
  - type: text
    content: the way a maid waits for the orders of her mistress.
  - type: text
    content: We look to you, our God, with passionate longing
  - type: text
    content: to please you and discover more of your mercy and grace.
  '3':
  - type: text
    content: For we’ve had more than our fill of this scoffing and scorn—
  - type: text
    content: this mistreatment by the wealthy elite.
  - type: text
    content: Lord, show us your mercy!
  - type: text
    content: Lord, show us your grace!
