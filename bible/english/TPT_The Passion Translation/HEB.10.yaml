document_id: HEB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ’s Eternal Sacrifice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The old system of living under the law presented us with only a faint shadow, a crude outline of the reality of the wonderful blessings to come. Even with its steady stream of sacrifices offered year after year, there still was nothing that could make our hearts perfect before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'For if animal sacrifices could once and for all eliminate sin, they would have ceased to be offered and the worshipers would have clean consciences. Instead, once was not enough so by the repetitive sacrifices year after year, the worshipers were continually reminded of their sins, with their hearts still impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For what power does the blood of bulls and goats '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “bulls and birds.”
    marker-yv: yv-n
  - type: text
    text: have to remove sin’s guilt?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So when Jesus the Messiah came into the world he said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Since your ultimate desire was not another animal sacrifice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you have clothed me with a body
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 40:6–8
      metadata:
        usfm: PSA.40.6+PSA.40.7+PSA.40.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Hebrew of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 40:6
      metadata:
        usfm: PSA.40.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: has, “My ears you have pierced.” The Clementine Septuagint has “My ears you have prepared.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that I might offer myself instead!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Multiple burnt offerings and sin-offerings
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: cannot satisfy your justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So I said to you, ‘God—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will be the One to go and do your will,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to fulfill all that is written of me in your Word!’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the scroll of the Book.” The Aramaic can be translated “from the beginning of your writings [the Torah] it is spoken of me.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'First he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Multiple burnt-offerings and sin-offerings cannot satisfy your justice”
  - type: text
    text: ' (even though the law required them to be offered).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And then he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “God, I will be the One to go and do your will.”
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: So by being the sacrifice that removes sin
  - type: text
    text: ', he abolishes animal sacrifices '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he abolishes the first.”
    marker-yv: yv-n
  - type: text
    text: 'and replaces that entire system with the new covenant. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the second” (covenant).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'By God’s will we have been purified and made holy once and for all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “made holy through the offering up of the body of Jesus Christ once and for all.”
    marker-yv: yv-n
  - type: text
    text: through the sacrifice of the body of Jesus, the Messiah!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yet every day priests still serve, ritually offering the same sacrifices again and again—sacrifices that can never take away sin’s guilt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when this Priest had offered the one supreme sacrifice for sin for all time he sat down on a throne at the right hand of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'waiting until all his whispering enemies are subdued and turn into his footstool. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And by his one perfect sacrifice he made us perfectly holy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “we are being made holy.”
    marker-yv: yv-n
  - type: text
    text: and complete for all time!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The Holy Spirit confirms this to us by this Scripture, for the Lord says,
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Afterwards, I will give them this covenant: I will embed my laws into their hearts and fasten my Word to their thoughts.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And then he says,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “I will not ever again remember their sins and lawless deeds!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 31:33–34
      metadata:
        usfm: JER.31.33+JER.31.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So if our sins have been forgiven and forgotten, why would we ever need to offer another sacrifice for sin?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Confidence before God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And now we are brothers and sisters in God’s family because of the blood of Jesus, and he welcomes us to come into the most holy sanctuary in the heavenly realm—boldly and without hesitation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For he has dedicated a new, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “newly slain.”
    marker-yv: yv-n
  - type: text
    text: life-giving way for us to approach God. For just as the veil was torn in two, Jesus’ body was torn open to give us free and fresh access to him!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And since we now have a magnificent High Priest to welcome us into God’s house, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'we come closer to God and approach him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “draw near to God,” or “offer a true sacrifice.” The Hebrew verbs “to draw near” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: lehitkarev
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and “to offer a sacrifice” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: lehakriv
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) are nearly identical and both are taken from the same root word.
    marker-yv: yv-n
  - type: text
    text: with an open heart, fully convinced that nothing will keep us at a distance from him. For our hearts have been sprinkled with blood to remove impurity, and we have been freed from an accusing conscience. Now we are clean, unstained, and presentable to God inside and out!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “our bodies washed with pure water.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So now wrap your heart tightly around the hope that lives within us, knowing that God always keeps his promises! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Faithful is the One who sent us this message of hope.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Discover creative ways to encourage others '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Let us look on one another with the excitement of love.”
    marker-yv: yv-n
  - type: text
    text: 'and to motivate them toward acts of compassion, doing beautiful works as expressions of love. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This is not the time to pull away and neglect '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “abandon.” The Greek implies a person who is extremely discouraged.
    marker-yv: yv-n
  - type: text
    text: meeting together, as some have formed the habit of doing. In fact, we should come together even more frequently, eager to encourage and urge each other onward as we anticipate that day dawning.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Another Warning
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For if we continue to persist in deliberate sin after we have known and received the truth, there is not another sacrifice for sin to be made for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But this would qualify one for the certain, terrifying expectation of judgment and the raging fire ready to burn up his enemies! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 26:11
      metadata:
        usfm: ISA.26.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Anyone who disobeyed Moses’ law died without mercy on the simple evidence of two or three witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'How much more severely do you suppose a person deserves to be judged who has contempt for God’s Son, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who tramples the Son of God under his feet.”
    marker-yv: yv-n
  - type: text
    text: and who scorns the blood of the new covenant that made him holy, and has outraged the Spirit of grace?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “insults the Spirit of grace.” One of the names of the Holy Spirit is “the Spirit of Grace.” The Holy Spirit is the dispenser and Lord of Grace. To be filled with the Holy Spirit means that you are filled with grace (spiritual power) to live pure, holy, and undefiled.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For we know him who said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I have the right to take revenge
- type: usfm
  marker: q1
  children:
  - type: text
    text: and pay them back for their evil!”
- type: usfm
  marker: m
  children:
  - type: text
    text: And also,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “The Lord God will judge his own people!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 32:35–36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'It is the most terrifying thing of all to come under the judgment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to fall into the hands.”
    marker-yv: yv-n
  - type: text
    text: of the Living God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Don’t you remember those days right after the Light shined in your hearts? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “after you were baptized.”
    marker-yv: yv-n
  - type: text
    text: 'You endured a great marathon season of suffering hardships, yet you stood your ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And at times you were publicly and shamefully mistreated, being persecuted for your faith; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “so that you would become seers” or “develop vision.”
    marker-yv: yv-n
  - type: text
    text: then at other times you stood side by side with those who preach the message of hope.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “partners with those who were similarly abused.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'You sympathized with those in prison '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my [Paul’s] imprisonment.”
    marker-yv: yv-n
  - type: text
    text: 'and when all your belongings were confiscated you accepted that violation with joy; convinced that you possess a treasure growing in heaven '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
