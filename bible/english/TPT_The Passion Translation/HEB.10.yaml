document_id: HEB.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ’s Eternal Sacrifice
  - type: text
    content: 'The old system of living under the law presented us with only a faint shadow, a crude outline of the reality of the wonderful blessings to come. Even with its steady stream of sacrifices offered year after year, there still was nothing that could make our hearts perfect before God. '
  '10':
  - type: text
    content: 'By God’s will we have been purified and made holy once and for all '
  - type: note
    content: Or “made holy through the offering up of the body of Jesus Christ once and for all.”
  - type: text
    content: through the sacrifice of the body of Jesus, the Messiah!
  '11':
  - type: text
    content: 'Yet every day priests still serve, ritually offering the same sacrifices again and again—sacrifices that can never take away sin’s guilt. '
  '12':
  - type: text
    content: 'But when this Priest had offered the one supreme sacrifice for sin for all time he sat down on a throne at the right hand of God, '
  '13':
  - type: text
    content: 'waiting until all his whispering enemies are subdued and turn into his footstool. '
  '14':
  - type: text
    content: 'And by his one perfect sacrifice he made us perfectly holy '
  - type: note
    content: Or “we are being made holy.”
  - type: text
    content: and complete for all time!
  '15':
  - type: text
    content: The Holy Spirit confirms this to us by this Scripture, for the Lord says,
  '16':
  - type: text
    content: '“Afterwards, I will give them this covenant: I will embed my laws into their hearts and fasten my Word to their thoughts.”'
  '17':
  - type: text
    content: And then he says,
  - type: text
    content: “I will not ever again remember their sins and lawless deeds!”
  - type: note
    content: See Jer. 31:33–34.
  '18':
  - type: text
    content: So if our sins have been forgiven and forgotten, why would we ever need to offer another sacrifice for sin?
  - type: heading
    content: Our Confidence before God
  '19':
  - type: text
    content: 'And now we are brothers and sisters in God’s family because of the blood of Jesus, and he welcomes us to come into the most holy sanctuary in the heavenly realm—boldly and without hesitation. '
  '2':
  - type: text
    content: 'For if animal sacrifices could once and for all eliminate sin, they would have ceased to be offered and the worshipers would have clean consciences. Instead, once was not enough so by the repetitive sacrifices year after year, the worshipers were continually reminded of their sins, with their hearts still impure. '
  '20':
  - type: text
    content: 'For he has dedicated a new, '
  - type: note
    content: Or “newly slain.”
  - type: text
    content: life-giving way for us to approach God. For just as the veil was torn in two, Jesus’ body was torn open to give us free and fresh access to him!
  '21':
  - type: text
    content: 'And since we now have a magnificent High Priest to welcome us into God’s house, '
  '22':
  - type: text
    content: 'we come closer to God and approach him '
  - type: note
    content: Or “draw near to God,” or “offer a true sacrifice.” The Hebrew verbs “to draw near” (lehitkarev) and “to offer a sacrifice” (lehakriv) are nearly identical and both are taken from the same root word.
  - type: text
    content: with an open heart, fully convinced that nothing will keep us at a distance from him. For our hearts have been sprinkled with blood to remove impurity, and we have been freed from an accusing conscience. Now we are clean, unstained, and presentable to God inside and out!
  - type: note
    content: Or “our bodies washed with pure water.”
  '23':
  - type: text
    content: 'So now wrap your heart tightly around the hope that lives within us, knowing that God always keeps his promises! '
  - type: note
    content: The Aramaic can be translated “Faithful is the One who sent us this message of hope.”
  '24':
  - type: text
    content: 'Discover creative ways to encourage others '
  - type: note
    content: The Aramaic can be translated “Let us look on one another with the excitement of love.”
  - type: text
    content: 'and to motivate them toward acts of compassion, doing beautiful works as expressions of love. '
  '25':
  - type: text
    content: 'This is not the time to pull away and neglect '
  - type: note
    content: Or “abandon.” The Greek implies a person who is extremely discouraged.
  - type: text
    content: meeting together, as some have formed the habit of doing. In fact, we should come together even more frequently, eager to encourage and urge each other onward as we anticipate that day dawning.
  - type: heading
    content: Another Warning
  '26':
  - type: text
    content: 'For if we continue to persist in deliberate sin after we have known and received the truth, there is not another sacrifice for sin to be made for us. '
  '27':
  - type: text
    content: 'But this would qualify one for the certain, terrifying expectation of judgment and the raging fire ready to burn up his enemies! '
  - type: note
    content: See Isa. 26:11.
  '28':
  - type: text
    content: 'Anyone who disobeyed Moses’ law died without mercy on the simple evidence of two or three witnesses. '
  '29':
  - type: text
    content: 'How much more severely do you suppose a person deserves to be judged who has contempt for God’s Son, '
  - type: note
    content: Or “who tramples the Son of God under his feet.”
  - type: text
    content: and who scorns the blood of the new covenant that made him holy, and has outraged the Spirit of grace?
  - type: note
    content: Or “insults the Spirit of grace.” One of the names of the Holy Spirit is “the Spirit of Grace.” The Holy Spirit is the dispenser and Lord of Grace. To be filled with the Holy Spirit means that you are filled with grace (spiritual power) to live pure, holy, and undefiled.
  '30':
  - type: text
    content: For we know him who said,
  - type: text
    content: “I have the right to take revenge
  - type: text
    content: and pay them back for their evil!”
  - type: text
    content: And also,
  - type: text
    content: “The Lord God will judge his own people!”
  - type: note
    content: See Deut. 32:35–36.
  '31':
  - type: text
    content: 'It is the most terrifying thing of all to come under the judgment '
  - type: note
    content: Or “to fall into the hands.”
  - type: text
    content: of the Living God!
  '32':
  - type: text
    content: 'Don’t you remember those days right after the Light shined in your hearts? '
  - type: note
    content: The Aramaic can be translated “after you were baptized.”
  - type: text
    content: 'You endured a great marathon season of suffering hardships, yet you stood your ground. '
  '33':
  - type: text
    content: 'And at times you were publicly and shamefully mistreated, being persecuted for your faith; '
  - type: note
    content: The Aramaic can be translated “so that you would become seers” or “develop vision.”
  - type: text
    content: then at other times you stood side by side with those who preach the message of hope.
  - type: note
    content: As translated from the Aramaic. The Greek is “partners with those who were similarly abused.”
  '34':
  - type: text
    content: 'You sympathized with those in prison '
  - type: note
    content: Or “my [Paul’s] imprisonment.”
  - type: text
    content: 'and when all your belongings were confiscated you accepted that violation with joy; convinced that you possess a treasure growing in heaven '
  - type: note
    content: As translated from the Aramaic. The Greek is “you possess greater heavenly things.”
  - type: text
    content: 'that could never be taken from you. '
  '35':
  - type: text
    content: So don’t lose your bold, courageous faith, for you are destined for a great reward!
  - type: note
    content: As translated from the Aramaic. The Greek is “your faith yields a great reward.”
  '36':
  - type: text
    content: 'You need the strength of endurance to reveal the poetry '
  - type: note
    content: Or “to do God’s will.” The Greek word for “do” is taken from the Greek word poeima (poem or poetry).
  - type: text
    content: 'of God’s will and then you receive the promise in full. '
  '37':
  - type: text
    content: For soon and very soon,
  - type: text
    content: “The One who is appearing will come without delay!”
  - type: note
    content: That is, time is not relevant in the realm of the Spirit. See Isa. 26:20; Hab. 2:3–4.
  '38':
  - type: text
    content: And he also says,
  - type: note
    content: Supplied for clarity of the English narrative.
  - type: text
    content: “My righteous ones will live from my faith.
  - type: note
    content: As translated from the Aramaic, and the Septuagint of Hab. 2:4.
  - type: text
    content: But if fear holds them back,
  - type: note
    content: The Greek word hupostello (aroist subjunctive middle, used absolutely), does not mean “to draw back” but “to cower in fear.”
  - type: text
    content: my soul is not content with them!”
  '39':
  - type: text
    content: But we are certainly not those who are held back by fear and perish; we are among those who have faith and experience true life!
  - type: note
    content: Or “faith to the preservation of the soul.” The Aramaic can be translated “faith that fulfills our soul.”
  '4':
  - type: text
    content: 'For what power does the blood of bulls and goats '
  - type: note
    content: The Aramaic can be translated “bulls and birds.”
  - type: text
    content: have to remove sin’s guilt?
  '5':
  - type: text
    content: So when Jesus the Messiah came into the world he said,
  - type: text
    content: “Since your ultimate desire was not another animal sacrifice,
  - type: text
    content: you have clothed me with a body
  - type: note
    content: As translated from the Aramaic. See also Ps. 40:6–8. The Hebrew of Ps. 40:6 has, “My ears you have pierced.” The Clementine Septuagint has “My ears you have prepared.”
  - type: text
    content: that I might offer myself instead!
  '6':
  - type: text
    content: Multiple burnt offerings and sin-offerings
  - type: text
    content: cannot satisfy your justice.
  '7':
  - type: text
    content: So I said to you, ‘God—
  - type: text
    content: I will be the One to go and do your will,
  - type: text
    content: to fulfill all that is written of me in your Word!’ ”
  - type: note
    content: Or “in the scroll of the Book.” The Aramaic can be translated “from the beginning of your writings [the Torah] it is spoken of me.”
  '8':
  - type: text
    content: 'First he said, '
  - type: text
    content: “Multiple burnt-offerings and sin-offerings cannot satisfy your justice”
  - type: text
    content: ' (even though the law required them to be offered).'
  '9':
  - type: text
    content: 'And then he said, '
  - type: text
    content: “God, I will be the One to go and do your will.”
  - type: text
    content: ' '
  - type: text
    content: So by being the sacrifice that removes sin
  - type: text
    content: ', he abolishes animal sacrifices '
  - type: note
    content: Or “he abolishes the first.”
  - type: text
    content: 'and replaces that entire system with the new covenant. '
  - type: note
    content: Or “the second” (covenant).
