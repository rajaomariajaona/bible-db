document_id: PSA.62,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Unshakable Faith
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: By David, for the one who praises
  - type: note
    content: The inscription includes the name Jeduthun, which means “one who praises.”
  - type: text
    content: I stand silently to listen for the one I love,
  - type: text
    content: waiting as long as it takes for the Lord to rescue me.
  - type: text
    content: For God alone has become my Savior.
  '10':
  - type: text
    content: The wealth of the world is nothing to God.
  - type: text
    content: So if your wealth increases, don’t be boastful or
  - type: text
    content: put your trust in your money.
  - type: text
    content: And don’t you think for a moment that
  - type: text
    content: you can get away with stealing by overcharging others
  - type: text
    content: just to get more for yourself!
  '11':
  - type: text
    content: God said to me once and for all,
  - type: text
    content: “All the strength and power you need flows from me!”
  - type: text
    content: And again I heard it clearly said,
  '12':
  - type: text
    content: “All the love you need is found in me!”
  - type: text
    content: And it’s true that
  - type: text
    content: ' you repay people for what they do.'
  '2':
  - type: text
    content: He alone is my safe place;
  - type: text
    content: his wraparound presence always protects me.
  - type: text
    content: For he is my champion defender;
  - type: text
    content: there’s no risk of failure with God.
  - type: text
    content: So why would I let worry paralyze me,
  - type: text
    content: even when troubles multiply around me?
  '3':
  - type: text
    content: But look at these who want me dead,
  - type: text
    content: shouting their vicious threats at me!
  - type: text
    content: The moment they discover my weakness,
  - type: text
    content: they all begin plotting to take me down.
  '4':
  - type: text
    content: Liars, hypocrites, with nothing good to say—
  - type: text
    content: all their energies are spent
  - type: text
    content: on moving me from this exalted place.
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: I am standing in absolute stillness, silent before the one I love,
  - type: text
    content: waiting as long as it takes for him to rescue me.
  - type: text
    content: Only God is my Savior, and he will not fail me.
  '6':
  - type: text
    content: For he alone is my safe place.
  - type: text
    content: His wraparound presence always protects me
  - type: text
    content: as my champion defender.
  - type: text
    content: There’s no risk of failure with God!
  - type: text
    content: So why would I let worry paralyze me,
  - type: text
    content: even when troubles multiply around me?
  '7':
  - type: text
    content: God’s glory is all around me!
  - type: text
    content: His wraparound presence is all I need,
  - type: text
    content: for the Lord is my Savior, my hero, and my life-giving strength.
  '8':
  - type: text
    content: Trust only in God every moment!
  - type: text
    content: Tell him all your troubles and pour out your heart-longings to him.
  - type: text
    content: Believe me when I tell you—he will help you!
  - type: text
    content: Pause in his presence
  '9':
  - type: text
    content: Before God all the people of the earth, high or low,
  - type: text
    content: are like smoke that disappears,
  - type: text
    content: like a vapor that quickly vanishes away.
  - type: text
    content: Compared to God they’re nothing but vanity, nothing at all!
