document_id: PSA.62,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Unshakable Faith
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: By David, for the one who praises
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The inscription includes the name Jeduthun, which means “one who praises.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I stand silently to listen for the one I love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: waiting as long as it takes for the Lord to rescue me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God alone has become my Savior.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The wealth of the world is nothing to God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So if your wealth increases, don’t be boastful or
  - type: usfm
    marker: q1
    children:
    - type: text
      text: put your trust in your money.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t you think for a moment that
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you can get away with stealing by overcharging others
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just to get more for yourself!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God said to me once and for all,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the strength and power you need flows from me!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And again I heard it clearly said,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “All the love you need is found in me!”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And it’s true that
    - type: text
      text: ' you repay people for what they do.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He alone is my safe place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his wraparound presence always protects me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he is my champion defender;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there’s no risk of failure with God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why would I let worry paralyze me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even when troubles multiply around me?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But look at these who want me dead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shouting their vicious threats at me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moment they discover my weakness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they all begin plotting to take me down.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Liars, hypocrites, with nothing good to say—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all their energies are spent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on moving me from this exalted place.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I am standing in absolute stillness, silent before the one I love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: waiting as long as it takes for him to rescue me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only God is my Savior, and he will not fail me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For he alone is my safe place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wraparound presence always protects me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as my champion defender.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no risk of failure with God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why would I let worry paralyze me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even when troubles multiply around me?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: God’s glory is all around me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wraparound presence is all I need,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the Lord is my Savior, my hero, and my life-giving strength.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Trust only in God every moment!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell him all your troubles and pour out your heart-longings to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Believe me when I tell you—he will help you!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Before God all the people of the earth, high or low,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are like smoke that disappears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a vapor that quickly vanishes away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Compared to God they’re nothing but vanity, nothing at all!
