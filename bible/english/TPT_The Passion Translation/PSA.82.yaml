document_id: PSA.82,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: True Justice
  - type: text
    content: Asaph’s poetic song
  - type: text
    content: All rise! For God now comes to judge
  - type: text
    content: as he convenes heaven’s courtroom.
  - type: note
    content: Or “the council of El.” The Aramaic reads “God now stands in the assembly of the angels, and he will judge in their midst.”
  - type: text
    content: He judges every judge and rules in the midst of the gods, saying,
  '2':
  - type: text
    content: “How long will you judges refuse to listen
  - type: text
    content: to the voice of true justice and continue to corrupt what is right
  - type: text
    content: by judging in favor of the wrong?”
  - type: text
    content: Pause in his presence
  '3':
  - type: text
    content: “Defend the defenseless, the fatherless and the forgotten,
  - type: text
    content: the disenfranchised and the destitute.
  '4':
  - type: text
    content: Your duty is to deliver the poor and the powerless;
  - type: text
    content: liberate them from the grasp of the wicked.
  '5':
  - type: text
    content: But you continue in your darkness and ignorance
  - type: text
    content: while the foundations of society are shaken to the core!
  '6':
  - type: text
    content: Didn’t I commission you as judges, saying,
  - type: text
    content: ‘You are all like gods, since you judge on my behalf.
  - type: text
    content: You are all like sons of the Most High, my representatives.’
  '7':
  - type: text
    content: Nevertheless, in death you are nothing but mere men!
  - type: text
    content: You will be laid in the ground like any prince and you will die.”
  '8':
  - type: text
    content: All rise! For God now takes his place as judge of all the earth.
  - type: text
    content: Don’t you know that everything and everyone belongs to him?
  - type: text
    content: The nations will be sifted in his hands!
