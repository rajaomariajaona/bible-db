document_id: PSA.82,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: True Justice
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Asaph’s poetic song
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All rise! For God now comes to judge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as he convenes heaven’s courtroom.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 82:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the council of El.” The Aramaic reads “God now stands in the assembly of the angels, and he will judge in their midst.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He judges every judge and rules in the midst of the gods, saying,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How long will you judges refuse to listen
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the voice of true justice and continue to corrupt what is right
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by judging in favor of the wrong?”
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Defend the defenseless, the fatherless and the forgotten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the disenfranchised and the destitute.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your duty is to deliver the poor and the powerless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: liberate them from the grasp of the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you continue in your darkness and ignorance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the foundations of society are shaken to the core!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Didn’t I commission you as judges, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You are all like gods, since you judge on my behalf.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are all like sons of the Most High, my representatives.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless, in death you are nothing but mere men!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be laid in the ground like any prince and you will die.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All rise! For God now takes his place as judge of all the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you know that everything and everyone belongs to him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations will be sifted in his hands!
