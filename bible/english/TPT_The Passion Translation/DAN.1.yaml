    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The king interviewed them all, and among all the young men, he found none to equal Daniel, Hananiah, Mishael, and Azariah. So, the king chose them to serve as his advisers. '
