document_id: DAN.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel and His Friends in the Court of the King
  - type: text
    content: 'It was the third year of the reign of Jehoiakim king of Judah '
  - type: note
    content: See 2 Kings 23:36–24:6; 2 Chron. 36:5–8.
  - type: text
    content: 'when Nebuchadnezzar, '
  - type: note
    content: Nebuchadnezzar means “Nebo will protect the king/crown.” Nebo was the Babylonian god. The name Nebuchadnezzar appears thirty-two times in the first five chapters of Daniel.
  - type: text
    content: 'king of Babylon, marched on Jerusalem and besieged the city. '
  '10':
  - type: text
    content: 'But he warned Daniel, “My lord the king has ordered your meat and drink, and I fear that he will notice if your face starts looking worse '
  - type: note
    content: Or “discontented.”
  - type: text
    content: than the other men your age. You could put my life in jeopardy with the king.”
  '11':
  - type: text
    content: 'Daniel then appealed to the overseer whom the chief officer put in charge over Daniel, Hananiah, Mishael, and Azariah. Daniel said to him, '
  '12':
  - type: text
    content: '“Test us, your servants, for ten days. Give us only seeds '
  - type: note
    content: The predominant meaning of the Hebrew word hazzero‘im is “something sown” or “that which is produced by seeds,” possibly “vegetables.” See Ezek. 4:9–13. Daniel ate the food associated with exile. In a metaphoric sense, Daniel ate the “seeds” of the kingdom.
  - type: text
    content: 'to eat and water to drink. '
  '13':
  - type: text
    content: Then afterward, compare our appearance with those of the young men who eat the king’s food. Then you can decide what to do with us.”
  '14':
  - type: text
    content: 'So the overseer agreed to do what they requested and tested them for ten days. '
  '15':
  - type: text
    content: 'And when the ten days were completed, they looked healthier and had even gained weight. The four Hebrew young men were in better physical condition compared to any of the others who had eaten their food from the royal table. '
  '16':
  - type: text
    content: 'So the guard replaced their diet of royal food and wine with vegetables '
  - type: text
    content: and water
  - type: text
    content: .
  - type: heading
    content: Four Exceptional Young Men
  '17':
  - type: text
    content: 'God imparted insight and skill in every aspect of literature and science '
  - type: note
    content: The Bible is not negative toward “literature and science.” However, all knowledge and revelation need to come from God, who is the source of insight and truth. All truth is God’s truth.
  - type: text
    content: 'to the four Hebrew men. Daniel also had the '
  - type: text
    content: unique
  - type: text
    content: ' gift of interpreting every kind of supernatural vision '
  - type: note
    content: The Hebrew word for “vision” is hazon and is found more than thirty times in the book of Daniel.
  - type: text
    content: and dream.
  '18':
  - type: text
    content: 'At the end of the period that the king had assigned for their training, the chief of the palace servants brought them to Nebuchadnezzar’s court. '
  '19':
  - type: text
    content: 'The king interviewed them all, and among all the young men, he found none to equal Daniel, Hananiah, Mishael, and Azariah. So, the king chose them to serve as his advisers. '
  '2':
  - type: text
    content: 'My Lord '
  - type: note
    content: This is the Hebrew word ’adonay and can be translated “my master” or “my lord [Lord].” Daniel uses this word ten times in his prayer of ch. 9.
  - type: text
    content: 'gave Nebuchadnezzar victory over King Jehoiakim and permitted the Babylonian ruler to remove '
  - type: note
    content: The Hebrew word miqsat doesn’t quite seem to fit in this sentence. It is literally “The Lord gave victory to Nebuchadnezzar . . . to bring to an end [cut off] the holy vessels.” The verb qasah is most used to denote the end of a period of time, to cut off one season for the next one to come. This hints at the cutting off of temple worship, the kingdom of Judah and its kings, and Judah’s rule, as they are taken into captivity.
  - type: text
    content: 'some of the sacred vessels '
  - type: note
    content: Or “furnishings.”
  - type: text
    content: 'belonging to the temple of the '
  - type: text
    content: 'true'
  - type: text
    content: ' God. Nebuchadnezzar carried them away to the land of Babylon '
  - type: note
    content: Or “Shinar.” At the time the book of Daniel was written, this was simply another name for the country of Babylonia and its capital city of Babylon.
  - type: text
    content: 'and placed the '
  - type: text
    content: sacred
  - type: text
    content: ' vessels into the temple treasury of his own gods.'
  '20':
  - type: text
    content: 'And when the king questioned them on any point of wisdom or understanding, '
  - type: note
    content: Or “the wisdom of understanding.”
  - type: text
    content: 'he found them ten times superior to all the magicians and enchanters '
  - type: note
    content: This is the Hebrew word ’ashshaph. It can be understood as someone who has a mystical power to deflect from another person any harmful events that may have been revealed to him in a dream. It could also be translated “astrologist” or “conjuror.”
  - type: text
    content: 'in his entire kingdom. '
  '21':
  - type: text
    content: 'And Daniel continued there in Babylon '
  - type: text
    content: as a royal adviser
  - type: text
    content: ' until the time Cyrus became king.'
  - type: note
    content: Or “until the first year of King Cyrus,” that is, the first year of his reign after conquering Babylon.
  '3':
  - type: text
    content: 'Later, the king ordered Ashpenaz, his chief officer, '
  - type: note
    content: Although the Hebrew uses the word for “eunuch,” the term evolved to mean any trusted official of the king without any reference to the anatomy of the person. It was not Ashpenaz’s physical status in focus but the responsibility the king had given to him for the oversight of his affairs. Daniel and Joseph shared many parallels. Ashpenaz was to Daniel what Potiphar was to Joseph. Daniel could be considered the Bible’s second Joseph.
  - type: text
    content: 'to select a certain number of youths '
  - type: note
    content: The Hebrew word used here is yeled, which implies that these young men were past adolescence. Many scholars believe Daniel was a young teenager when taken into Babylonian captivity.
  - type: text
    content: 'from royal or noble families of the Israelites '
  '4':
  - type: text
    content: 'who would be suitable for service in the king’s palace. They were to be handsome '
  - type: text
    content: young men
  - type: text
    content: ' without defect, '
  - type: note
    content: The Hebrew word used here is me‘um. It can mean “without any physical deformity” and/or “without moral defilement.”
  - type: text
    content: 'well-versed in every branch of wisdom. They were to be intelligent, '
  - type: note
    content: Or “knowers of knowledge.” Some form or another of this Hebrew word is found eighteen times in ch. 2.
  - type: text
    content: 'discerning, '
  - type: note
    content: Or possibly (as a transitive verb) “causing one to understand,” that is, one who is skilled in instructing and convincing others.
  - type: text
    content: 'and qualified for royal service. '
  - type: note
    content: Or “having the ability [confidence, self-control] to stand in the king’s palace.”
  - type: text
    content: 'Ashpenaz was instructed to teach them '
  - type: text
    content: the culture
  - type: text
    content: ', the literature, and the language '
  - type: note
    content: That is, the Aramaic language.
  - type: text
    content: of the Babylonians.
  '5':
  - type: text
    content: 'The king provided them a daily allowance '
  - type: note
    content: Or “daily according to its day.” See Luke 11:3.
  - type: text
    content: 'of '
  - type: text
    content: the best
  - type: text
    content: ' food and wine from the king’s table. For three years they were to receive a thorough education, after which they would enter the king’s service. '
  - type: note
    content: Or “they would stand before the king.”
  '6':
  - type: text
    content: 'Among these men of Judah were Daniel, Hananiah, Mishael, and Azariah. '
  - type: note
    content: 'The meanings of the Hebrew men’s names are: “God is my judge” (Daniel), “Yah has been gracious [to me]” (Hananiah), “Who is like God?” or “His mother asked God for him” (Mishael), and “Yah has helped [me]” (Azariah). The medieval Rabbi Saadya Gaon identifies these four as the descendants of King Hezekiah.'
  '7':
  - type: text
    content: 'But the chief official of the palace gave them '
  - type: text
    content: Babylonian
  - type: text
    content: ' names: Daniel he called Belteshazzar, '
  - type: note
    content: A possible meaning of Belteshazzar (Assyrian, Belet-sar-usur) is “guard his life.”
  - type: text
    content: 'Hananiah he called Shadrach, '
  - type: note
    content: A possible meaning of Shadrach (Assyrian, saduraku) is “I am very fearful [of God].”
  - type: text
    content: 'Mishael he called Meshach, '
  - type: note
    content: Meshach (Assyrian, mesaku) possibly means “I am of little account” or “the shadow of the prince.”
  - type: text
    content: and Azariah he called Abednego.
  - type: note
    content: A possible meaning of Abednego (Assyrian, Arad-Nabu) is “servant of the shining one” or “servant of Nabu.”
  '8':
  - type: text
    content: 'However, Daniel determined in his heart not to contaminate himself '
  - type: note
    content: Or “estrange himself.” The verb used here is ga’al, which, in its basic Qal voicing, means “to redeem” or “to avenge.” It is not the word typically used for defilement. However, in its Hithpael form (or tense) here (viz., yitga’al), it does carry the reflexive sense of “defile or contaminate oneself”—so that is an appropriate alternate reading to “estrange oneself.” In this context, it can carry the meaning of being estranged (from the priesthood, see Neh. 13:29). All Babylonian (Assyrian) food was considered ritually unclean (see Ezek. 4:13; Hos. 9:3–4). In a sense, when Daniel rejected the food of Babylon, he was also rejecting the identity of the name given to him in v. 7. Verses 7 and 8 are close parallels. Daniel’s allegiance was not to Babylon but to the King of Glory.
  - type: text
    content: 'with the food and wine from the royal table, so he begged the chief official to exempt him from the royal diet. '
  '9':
  - type: text
    content: 'Then God moved on the heart of the chief official to show Daniel favor '
  - type: note
    content: This is the Hebrew word hesed, which means “unearned love.”
  - type: text
    content: 'and compassion. '
  - type: note
    content: Or “loyal love and mercy.” Here we see God giving Daniel favor in the eyes of an unbeliever. God can indeed use others to demonstrate his love toward us.
