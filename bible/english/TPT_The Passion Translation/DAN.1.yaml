      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And when the ten days were completed, they looked healthier and had even gained weight. The four Hebrew young men were in better physical condition compared to any of the others who had eaten their food from the royal table. '
  '16':
  - type: usfm
    marker: p
