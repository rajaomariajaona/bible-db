    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Son of man, the people who are living in the ruins in the land of Israel are saying, ‘Abraham was only one man when he took possession of the land, but we are many. Certainly, we can possess this land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and rebuild
    - type: text
      text: .’
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“Now give the people this message, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Do you really think you can take ownership of the land? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You are evildoers!
    - type: text
      text: ' You murder others, you eat meat with blood, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “you eat on blood.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 17:10–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 19:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Some scholars amend this to read “you eat on the mountains,” referring to meat sacrificed to false gods on pagan altars on the high places of the land.
      marker-yv: yv-n
    - type: text
      text: 'and you worship your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foul
    - type: text
      text: ' idols. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: You rely on your swords, you engage in despicable pagan practices, and you are all adulterers. Do you really think I will give the ownership of the land to you?’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Tell them that I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', solemnly warn them: As surely as I exist, those living in the ruined towns will fall by the sword, those in the countryside I will give to the wild animals for them to eat, and those among the crags and in caves will die from disease. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'I will turn the land into a total wasteland, and I will put an end to their arrogant power. Israel’s mountains will be so deserted that no one will pass that way again. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', when I turn the land into a barren desert because of all the filthy things they have done.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Do Not Respond
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When he sees the enemy coming to attack, he must sound his shofar to warn the people. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“As for you, son of man, your fellow citizens are talking about you beside the walls and in the doorways of their homes. They keep saying to one another, ‘Let’s go hear what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has to say.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'They all flock to you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “They come to you like the coming of people.”
      marker-yv: yv-n
    - type: text
      text: 'to sit at your feet as my people. They listen to your words, but they will not act on them. Instead, they express genuine devotion to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', but their hearts are set on cheating others. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'As far as they are concerned, you are like an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: entertainer
    - type: text
      text: ' who sings a love song '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you [Ezekiel] are like an erotic song.”
      marker-yv: yv-n
    - type: text
      text: 'with a beautiful voice to a good musical accompaniment. They hear what you say, but no one will do it. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your prophecies
    - type: text
      text: ' come true '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “When all this comes true.”
      marker-yv: yv-n
    - type: text
      text: '—and they are beginning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to be fulfilled
    - type: text
      text: ' now—they will know that there has been a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'true'
    - type: text
      text: ' prophet among them.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If people hear the warning but pay no attention and the sword overtakes them and kills them, they will bear the responsibility for their own deaths. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “his blood will be upon his own head.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Because they heard the sound of the shofar and paid no attention to the warning, their deaths are their own faults. But if they had listened to the warning, they could have saved their lives.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “ ‘If, however, the watchman sees the enemy approaching but has not blown his shofar to warn the people and the sword overtakes them and kills a single one of them, even though that person was a sinner, I will still hold the watchman responsible for that person’s death.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will require his [the dead person’s] blood at the watchman’s hand.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Son of man, I have appointed you as watchman for the people of Israel. When you hear me speak a warning, give them my warning. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'If I say to the wicked, ‘Evildoers, you are about to die,’ and you fail to warn them to renounce their evil ways, they will die for their guilt, but I will hold you responsible for their deaths. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But if you warn the wicked to change their evil behavior and they refuse to change, the wicked will die for their sins, but you will have saved your own life.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Individual Responsibility
    marker-yv: yv-h
