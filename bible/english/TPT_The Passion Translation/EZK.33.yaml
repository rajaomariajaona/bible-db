verses:
  '1':
  - type: heading
    content: God Appoints Ezekiel as a Watchman
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 33 constitutes panel I1 in the chiastic structure of the book. It deals with the theme of Ezekiel as a “watchman” for the house of Israel. This chapter serves as a contrasting parallel with ch. 24—the “cooking pot” judgment on Jerusalem (i.e., panel I).
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  - type: note
    content: Starting with this chapter and for the rest of the book, Ezekiel gives prophecies that look forward to the restoration of Israel. Although ch. 33 repeats some of the themes of judgment, it remains a pivotal chapter in the book. While Jerusalem was still standing, Ezekiel’s message was mostly negative and corrective, for the people felt like they were safe as long as the temple stood in Jerusalem. But after Jerusalem’s fall and the people’s hopes were shattered, Ezekiel began to encourage them and prophesy hope for the future. Sinful people and sinful nations must lose their false hopes before they (we) are ready to hear the true way of trusting God alone for our future.
  '10':
  - type: text
    content: '“Son of man, say to the people of Israel, ‘You continually say: Our rebellious acts and our sins have caught up with us, and we are wasting away because of them. How then can we live?’'
  '11':
  - type: text
    content: '“Say to them, ‘As surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', exist—I take no delight in the death of the wicked, but '
  - type: text
    content: I delight
  - type: text
    content: ' in seeing them turn from their ways so they can live. So, repent and turn from your evil ways. People of Israel, why would you want to die? '
  - type: text
    content: Turn and come back to me!
  - type: text
    content: ’
  '12':
  - type: text
    content: '“Son of man, say to your people, ‘All the good things a good person has done will not be any help if that one decides to turn to sin. And all the sins of an evil person will not destroy him if the evildoer decides to repent and turn from sin. If the righteous turns to sin, the righteous person will not be able to live because of past righteous deeds.’ '
  '13':
  - type: text
    content: 'Suppose I say to a righteous person: ‘You will certainly live,’ but then he becomes confident in his righteousness and turns away and willfully sins; none of the good things he has done in the past will be remembered. He will die in his sins. '
  '14':
  - type: text
    content: 'If, however, I say to a wicked person: ‘You will certainly die,’ but then the wicked turns away from sin and does what is just and right '
  '15':
  - type: text
    content: 'by returning what has been stolen and returning the borrower’s pledge and by following the laws that give life and no longer doing wrong, that person will live and will not die. '
  '16':
  - type: text
    content: None of his previous sins will be counted against him, for he has done what is just and right—therefore, he will certainly live.
  '17':
  - type: text
    content: '“Yet your people say: ‘The ways of the Lord are not right.’ But it is their ways that are not right! '
  '18':
  - type: text
    content: 'When an upright person turns away from what is right and does what is evil, that person will die for it. '
  '19':
  - type: text
    content: 'And when a wicked person turns from being wicked and does what is just and right, that person will live. '
  '2':
  - type: text
    content: '“Son of man, give your people this message: ‘If I bring war to your nation, '
  - type: note
    content: Or “If I bring a sword against the land.”
  - type: text
    content: 'you must select a man and post him as a watchman. '
  '20':
  - type: text
    content: 'Yet you say: ‘The ways of the Lord are not right.’ Listen, people of Israel, I will judge each of you according to your ways.”'
  - type: heading
    content: God Restores Ezekiel’s Speech
  '21':
  - type: text
    content: 'In the eleventh year '
  - type: note
    content: As translated from a few Hebrew and Greek manuscripts and some ancient translations. Although most Hebrew manuscripts read “the twelfth year,” Jerusalem was captured in the fourth month of the eleventh year of Zedekiah. See 2 Kings 25:3; Jer. 39:2 and footnote.
  - type: text
    content: 'of our captivity, on the fifth day of the tenth month, one who escaped from Jerusalem arrived and informed me: “The city has been taken.” '
  '22':
  - type: text
    content: 'Now the evening before the survivor arrived, the '
  - type: text
    content: mighty
  - type: text
    content: ' hand of '
  - type: text
    content: Yahweh
  - type: text
    content: ' had rested on me, '
  - type: note
    content: Ezekiel was possibly in a trance-like state due to the “mighty hand of Yahweh” resting on him. This indicates that Yahweh took control over Ezekiel’s body and spirit.
  - type: text
    content: and my speech was fully restored before he came to me in the morning—I could speak again.
  - type: note
    content: See Ezek. 3:26–27; 24:27.
  - type: heading
    content: The Sins of the People
  '23':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, '
  '24':
  - type: text
    content: '“Son of man, the people who are living in the ruins in the land of Israel are saying, ‘Abraham was only one man when he took possession of the land, but we are many. Certainly, we can possess this land '
  - type: text
    content: and rebuild
  - type: text
    content: .’
  '25':
  - type: text
    content: '“Now give the people this message, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Do you really think you can take ownership of the land? '
  - type: text
    content: You are evildoers!
  - type: text
    content: ' You murder others, you eat meat with blood, '
  - type: note
    content: Literally “you eat on blood.” See Lev. 17:10–14; 19:26. Some scholars amend this to read “you eat on the mountains,” referring to meat sacrificed to false gods on pagan altars on the high places of the land.
  - type: text
    content: 'and you worship your '
  - type: text
    content: foul
  - type: text
    content: ' idols. '
  '26':
  - type: text
    content: You rely on your swords, you engage in despicable pagan practices, and you are all adulterers. Do you really think I will give the ownership of the land to you?’
  '27':
  - type: text
    content: '“Tell them that I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', solemnly warn them: As surely as I exist, those living in the ruined towns will fall by the sword, those in the countryside I will give to the wild animals for them to eat, and those among the crags and in caves will die from disease. '
  '28':
  - type: text
    content: 'I will turn the land into a total wasteland, and I will put an end to their arrogant power. Israel’s mountains will be so deserted that no one will pass that way again. '
  '29':
  - type: text
    content: 'Then they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', when I turn the land into a barren desert because of all the filthy things they have done.”'
  - type: heading
    content: The People Do Not Respond
  '3':
  - type: text
    content: 'When he sees the enemy coming to attack, he must sound his shofar to warn the people. '
  '30':
  - type: text
    content: '“As for you, son of man, your fellow citizens are talking about you beside the walls and in the doorways of their homes. They keep saying to one another, ‘Let’s go hear what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has to say.’ '
  '31':
  - type: text
    content: 'They all flock to you '
  - type: note
    content: Literally “They come to you like the coming of people.”
  - type: text
    content: 'to sit at your feet as my people. They listen to your words, but they will not act on them. Instead, they express genuine devotion to '
  - type: text
    content: Yahweh
  - type: text
    content: ', but their hearts are set on cheating others. '
  '32':
  - type: text
    content: 'As far as they are concerned, you are like an '
  - type: text
    content: entertainer
  - type: text
    content: ' who sings a love song '
  - type: note
    content: Or “you [Ezekiel] are like an erotic song.”
  - type: text
    content: 'with a beautiful voice to a good musical accompaniment. They hear what you say, but no one will do it. '
  '33':
  - type: text
    content: 'When all '
  - type: text
    content: your prophecies
  - type: text
    content: ' come true '
  - type: note
    content: Or “When all this comes true.”
  - type: text
    content: '—and they are beginning '
  - type: text
    content: to be fulfilled
  - type: text
    content: ' now—they will know that there has been a '
  - type: text
    content: 'true'
  - type: text
    content: ' prophet among them.”'
  '4':
  - type: text
    content: 'If people hear the warning but pay no attention and the sword overtakes them and kills them, they will bear the responsibility for their own deaths. '
  - type: note
    content: Or “his blood will be upon his own head.”
  '5':
  - type: text
    content: Because they heard the sound of the shofar and paid no attention to the warning, their deaths are their own faults. But if they had listened to the warning, they could have saved their lives.
  '6':
  - type: text
    content: “ ‘If, however, the watchman sees the enemy approaching but has not blown his shofar to warn the people and the sword overtakes them and kills a single one of them, even though that person was a sinner, I will still hold the watchman responsible for that person’s death.’
  - type: note
    content: Or “I will require his [the dead person’s] blood at the watchman’s hand.”
  '7':
  - type: text
    content: '“Son of man, I have appointed you as watchman for the people of Israel. When you hear me speak a warning, give them my warning. '
  '8':
  - type: text
    content: 'If I say to the wicked, ‘Evildoers, you are about to die,’ and you fail to warn them to renounce their evil ways, they will die for their guilt, but I will hold you responsible for their deaths. '
  '9':
  - type: text
    content: But if you warn the wicked to change their evil behavior and they refuse to change, the wicked will die for their sins, but you will have saved your own life.”
  - type: heading
    content: Individual Responsibility
