          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Starting with this chapter and for the rest of the book, Ezekiel gives prophecies that look forward to the restoration of Israel. Although ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: repeats some of the themes of judgment, it remains a pivotal chapter in the book. While Jerusalem was still standing, Ezekiel’s message was mostly negative and corrective, for the people felt like they were safe as long as the temple stood in Jerusalem. But after Jerusalem’s fall and the people’s hopes were shattered, Ezekiel began to encourage them and prophesy hope for the future. Sinful people and sinful nations must lose their false hopes before they (we) are ready to hear the true way of trusting God alone for our future.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Son of man, say to the people of Israel, ‘You continually say: Our rebellious acts and our sins have caught up with us, and we are wasting away because of them. How then can we live?’'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Say to them, ‘As surely as I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', exist—I take no delight in the death of the wicked, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I delight
    - type: text
      text: ' in seeing them turn from their ways so they can live. So, repent and turn from your evil ways. People of Israel, why would you want to die? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Turn and come back to me!
    - type: text
      text: ’
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Son of man, say to your people, ‘All the good things a good person has done will not be any help if that one decides to turn to sin. And all the sins of an evil person will not destroy him if the evildoer decides to repent and turn from sin. If the righteous turns to sin, the righteous person will not be able to live because of past righteous deeds.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Suppose I say to a righteous person: ‘You will certainly live,’ but then he becomes confident in his righteousness and turns away and willfully sins; none of the good things he has done in the past will be remembered. He will die in his sins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If, however, I say to a wicked person: ‘You will certainly die,’ but then the wicked turns away from sin and does what is just and right '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'by returning what has been stolen and returning the borrower’s pledge and by following the laws that give life and no longer doing wrong, that person will live and will not die. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: None of his previous sins will be counted against him, for he has done what is just and right—therefore, he will certainly live.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Yet your people say: ‘The ways of the Lord are not right.’ But it is their ways that are not right! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When an upright person turns away from what is right and does what is evil, that person will die for it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when a wicked person turns from being wicked and does what is just and right, that person will live. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, give your people this message: ‘If I bring war to your nation, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
