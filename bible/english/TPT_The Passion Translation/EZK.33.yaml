      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “If I bring a sword against the land.”
      marker-yv: yv-n
    - type: text
      text: 'you must select a man and post him as a watchman. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Yet you say: ‘The ways of the Lord are not right.’ Listen, people of Israel, I will judge each of you according to your ways.”'
  - type: usfm
