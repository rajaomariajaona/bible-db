verses:
  '1':
  - type: heading
    content: Jeremiah Persecuted
  - type: text
    content: 'Pashhur '
  - type: note
    content: The name Pashhur is derived from Egyptian. It means “son of Horus” or “portion of Horus.” Pashhur in Hebrew means “surrounded with prosperity [nobility, liberty].”
  - type: text
    content: 'son of Immer was a priest and the temple overseer. When he heard what Jeremiah had prophesied, '
  - type: text
    content: he became angry
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'For I heard them whispering '
  - type: text
    content: behind my back
  - type: text
    content: ':'
  - type: text
    content: '“Terror everywhere! '
  - type: text
    content: That’s all he prophesies.
  - type: text
    content: ”
  - type: text
    content: All my close friends watch for me to fall.
  - type: text
    content: “Let’s turn him in to the authorities,” they say.
  - type: text
    content: “Perhaps we can set a trap for him.
  - type: text
    content: Finally
  - type: text
    content: ', we will prevail over him'
  - type: text
    content: and take our revenge on him.”
  - type: heading
    content: Yahweh, a Mighty, Fearless Warrior
  '11':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' is a mighty, fearless warrior standing at my side.'
  - type: text
    content: My persecutors are the ones who will fall down and fail;
  - type: text
    content: disgraced by their failure, they will not succeed.
  - type: text
    content: Their shame will stick to them forever.
  '12':
  - type: text
    content: 'O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: you test the righteous.
  - type: text
    content: You probe my deepest thoughts and motives.
  - type: text
    content: 'I have committed my cause '
  - type: note
    content: Or “dispute,” “trouble,” or “quarrel.”
  - type: text
    content: to you,
  - type: text
    content: so let me watch as you take revenge on my enemies.
  '13':
  - type: text
    content: 'Sing! Sing praises to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: What caused this outburst of praise from Jeremiah’s lips? It was because he had finally “committed [his] cause to [Yahweh]” (v. 12). True praise and joy flow when we take our burdens, our “cause,” and lay them at Jesus’ feet. At times, the weakness of our own heart is our worst enemy. When we lay our weakness at his feet and commit ourselves to God, we can then sing and rejoice.
  - type: text
    content: for he rescues the soul of the needy
  - type: text
    content: from the power of the wicked.
  '14':
  - type: text
    content: Cursed be the day on which I was born!
  - type: text
    content: The day when my mother bore me,
  - type: text
    content: may that day never be blessed!
  '15':
  - type: text
    content: Put a curse on the man
  - type: text
    content: who made my father glad by saying,
  - type: text
    content: “Good news—it’s a boy! You have a son.”
  '16':
  - type: text
    content: 'Let that man be like the cities '
  - type: text
    content: of Sodom and Gomorrah
  - type: text
    content: 'that '
  - type: text
    content: Yahweh
  - type: text
    content: ' destroyed without pity.'
  - type: text
    content: Let him hear shouts of alarm in the morning
  - type: text
    content: and battle cries at noon.
  '17':
  - type: text
    content: For he did not kill me before I came from the womb,
  - type: text
    content: making my pregnant mother’s womb my grave forever.
  - type: note
    content: Or “so my mother might be to me for my grave and her womb eternally pregnant.” See Job 3:1–19.
  '18':
  - type: text
    content: Why was I even born?
  - type: text
    content: Was it just to experience toil and sorrow
  - type: text
    content: and spend my days in shame?
  - type: note
    content: The emotions of Jeremiah are exploding from the depth of his soul. In this chapter alone he had endured a public beating and been placed in the stocks; he was humiliated, mocked, and slandered. His best friends deserted him, and his enemies wanted him gone and out of the way—all because he spoke the truth and prophesied the doom that was to befall Jerusalem and Judah. Yet, through it all, Jeremiah knew that Yahweh stood beside him as a “mighty, fearless warrior” (v. 11). God is also next to you in all your struggles.
  '2':
  - type: text
    content: 'So he arrested Jeremiah, beat him, '
  - type: note
    content: See Deut. 25:3.
  - type: text
    content: 'and put him in stocks '
  - type: note
    content: The stocks were a form of punishment made from a wooden frame that held the person immobile. It was an unusually severe punishment that was designed to inflict pain and discomfort. The holes of the stocks were for the head, feet, and arms and would be placed far apart in order to intensify the pain and discomfort. The Hebrew word for “stocks” (mahpeket) means “causing distortion” because of how the body was forced into a cramped position.
  - type: text
    content: 'at the upper Benjamin Gate '
  - type: note
    content: The upper Benjamin Gate was likely on the north side of the Temple Mount facing the territory of Benjamin and was built by King Jotham (see 2 Kings 15:35).
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple. '
  '3':
  - type: text
    content: 'The next morning, when Pashhur released Jeremiah from the stocks, Jeremiah said to him, “Pashhur, '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given you a new name—Terror Everywhere! '
  - type: note
    content: See Jer. 6:25; 20:10; 49:5, 29.
  '4':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: ‘I am making you a terror '
  - type: note
    content: Or “I am going to hand you over to terror.”
  - type: text
    content: 'to yourself and to all your friends, who will be killed in battle while you look on. I will give all Judah into the hands of the king of Babylon. He will take them captive to Babylon or kill them with the sword. '
  '5':
  - type: text
    content: 'I will give all the wealth of this city—her resources, her prized possessions, and all the treasures of the kings of Judah—into the hands of their enemies, who will seize all the plunder and carry it off to Babylon. '
  '6':
  - type: text
    content: 'You, Pashhur, and all your household will go into captivity as prisoners to Babylon. '
  - type: note
    content: This prophecy was likely fulfilled at the deportation of Jehoiachin (597 BC). Shortly afterward, Zephaniah took Pashhur’s position (see 29:25–26).
  - type: text
    content: 'You will die there and be buried there, you and all your '
  - type: text
    content: gullible
  - type: text
    content: ' friends to whom you have prophesied falsely.’ ”'
  - type: heading
    content: Jeremiah Complains to God
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ', you pushed '
  - type: note
    content: Although the Hebrew word patah can mean “deceived” or “enticed,” “compelled” and “pushed” are also within the universe of meaning for patah. It is hard to imagine the God who is Light deceiving anyone.
  - type: text
    content: me into being a prophet,
  - type: text
    content: and I let you do it.
  - type: text
    content: You overpowered me,
  - type: note
    content: 'The prophet felt violated by God. He felt like he was pushed, coerced, and overpowered. Jeremiah, a true prophet, felt that he was emotionally violated by a divine, irresistible power. When you ask God to take over your life, you, too, may be ridiculed and mocked. The response of others to your ministry can never be the validation or rejection of what you do for the Master. See Abraham Heschel, The Prophets (Peabody, MA: Hendrickson Publishers, 1962), vol. 1, 113.'
  - type: text
    content: and now I am overcome.
  - type: text
    content: I have become nothing but a joke all day long,
  - type: text
    content: with everyone mocking me.
  '8':
  - type: text
    content: Whenever I prophesy,
  - type: text
    content: you have me speak, “Violence and destruction!”
  - type: text
    content: I am ridiculed every time I proclaim your word.
  - type: text
    content: I get nothing but trouble and insults all day long.
  '9':
  - type: text
    content: When I tell myself,
  - type: text
    content: “I’m not going to speak his message ever again
  - type: text
    content: or prophesy any more in his name,”
  - type: text
    content: then all at once you are within me
  - type: text
    content: like a burning, consuming fire deep in my bones.
  - type: note
    content: A consuming fire is an ancient Semitic metaphor for passion. As Jeremiah joined his heart to God’s heart, he experienced the power of God’s consuming passion. God’s passion burned within Jeremiah so that he could not abandon God’s call on his life. The fire of God’s word burned in the bones of the prophet. God had placed his words in Jeremiah’s mouth (see 1:9), and here, those words are burning in his bones. The realization of his call and commission overpowered him and moved him to speak the words of God to people who would not receive them. Today, we need true prophets who are fearless to speak the authentic words of God.
  - type: text
    content: 'I try my best to hold '
  - type: text
    content: your word
  - type: text
    content: ' inside,'
  - type: text
    content: but I can’t hold it back any longer!
