document_id: JER.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Persecuted
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pashhur '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Pashhur is derived from Egyptian. It means “son of Horus” or “portion of Horus.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pashhur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Hebrew means “surrounded with prosperity [nobility, liberty].”
      marker-yv: yv-n
    - type: text
      text: 'son of Immer was a priest and the temple overseer. When he heard what Jeremiah had prophesied, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he became angry
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For I heard them whispering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: behind my back
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Terror everywhere! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: That’s all he prophesies.
    - type: text
      text: ”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my close friends watch for me to fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let’s turn him in to the authorities,” they say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Perhaps we can set a trap for him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Finally
    - type: text
      text: ', we will prevail over him'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and take our revenge on him.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', a Mighty, Fearless Warrior'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is a mighty, fearless warrior standing at my side.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My persecutors are the ones who will fall down and fail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: disgraced by their failure, they will not succeed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their shame will stick to them forever.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you test the righteous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You probe my deepest thoughts and motives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have committed my cause '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dispute,” “trouble,” or “quarrel.”
      marker-yv: yv-n
    - type: text
      text: to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so let me watch as you take revenge on my enemies.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sing! Sing praises to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What caused this outburst of praise from Jeremiah’s lips? It was because he had finally “committed [his] cause to [
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ']” (v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). True praise and joy flow when we take our burdens, our “cause,” and lay them at Jesus’ feet. At times, the weakness of our own heart is our worst enemy. When we lay our weakness at his feet and commit ourselves to God, we can then sing and rejoice.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he rescues the soul of the needy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the power of the wicked.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Cursed be the day on which I was born!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day when my mother bore me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may that day never be blessed!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Put a curse on the man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who made my father glad by saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Good news—it’s a boy! You have a son.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Let that man be like the cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Sodom and Gomorrah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' destroyed without pity.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him hear shouts of alarm in the morning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and battle cries at noon.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For he did not kill me before I came from the womb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making my pregnant mother’s womb my grave forever.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “so my mother might be to me for my grave and her womb eternally pregnant.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 3:1–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Why was I even born?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was it just to experience toil and sorrow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and spend my days in shame?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The emotions of Jeremiah are exploding from the depth of his soul. In this chapter alone he had endured a public beating and been placed in the stocks; he was humiliated, mocked, and slandered. His best friends deserted him, and his enemies wanted him gone and out of the way—all because he spoke the truth and prophesied the doom that was to befall Jerusalem and Judah. Yet, through it all, Jeremiah knew that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: stood beside him as a “mighty, fearless warrior” (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God is also next to you in all your struggles.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So he arrested Jeremiah, beat him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 25:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and put him in stocks '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The stocks were a form of punishment made from a wooden frame that held the person immobile. It was an unusually severe punishment that was designed to inflict pain and discomfort. The holes of the stocks were for the head, feet, and arms and would be placed far apart in order to intensify the pain and discomfort. The Hebrew word for “stocks” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: mahpeket
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) means “causing distortion” because of how the body was forced into a cramped position.
      marker-yv: yv-n
    - type: text
      text: 'at the upper Benjamin Gate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The upper Benjamin Gate was likely on the north side of the Temple Mount facing the territory of Benjamin and was built by King Jotham (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 15:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s temple. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The next morning, when Pashhur released Jeremiah from the stocks, Jeremiah said to him, “Pashhur, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has given you a new name—Terror Everywhere! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 6:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: ‘I am making you a terror '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I am going to hand you over to terror.”
      marker-yv: yv-n
    - type: text
      text: 'to yourself and to all your friends, who will be killed in battle while you look on. I will give all Judah into the hands of the king of Babylon. He will take them captive to Babylon or kill them with the sword. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I will give all the wealth of this city—her resources, her prized possessions, and all the treasures of the kings of Judah—into the hands of their enemies, who will seize all the plunder and carry it off to Babylon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You, Pashhur, and all your household will go into captivity as prisoners to Babylon. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was likely fulfilled at the deportation of Jehoiachin (597 BC). Shortly afterward, Zephaniah took Pashhur’s position (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'You will die there and be buried there, you and all your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gullible
    - type: text
      text: ' friends to whom you have prophesied falsely.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Complains to God
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you pushed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: patah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean “deceived” or “enticed,” “compelled” and “pushed” are also within the universe of meaning for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: patah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is hard to imagine the God who is Light deceiving anyone.
      marker-yv: yv-n
    - type: text
      text: me into being a prophet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I let you do it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You overpowered me,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The prophet felt violated by God. He felt like he was pushed, coerced, and overpowered. Jeremiah, a true prophet, felt that he was emotionally violated by a divine, irresistible power. When you ask God to take over your life, you, too, may be ridiculed and mocked. The response of others to your ministry can never be the validation or rejection of what you do for the Master. See Abraham Heschel,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Prophets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Peabody, MA: Hendrickson Publishers, 1962), vol. 1, 113.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and now I am overcome.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have become nothing but a joke all day long,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with everyone mocking me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Whenever I prophesy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have me speak, “Violence and destruction!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am ridiculed every time I proclaim your word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I get nothing but trouble and insults all day long.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: When I tell myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m not going to speak his message ever again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or prophesy any more in his name,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then all at once you are within me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a burning, consuming fire deep in my bones.
    - type: usfm
