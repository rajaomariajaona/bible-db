document_id: 1TH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Godly Character of Jesus’ Servants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My dear brothers and sisters, it’s obvious that our ministry among you has proven to be fruitful. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Our coming to you has not been in vain” (empty). See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 17:1–9
      metadata:
        usfm: ACT.17.1+ACT.17.2+ACT.17.3+ACT.17.4+ACT.17.5+ACT.17.6+ACT.17.7+ACT.17.8+ACT.17.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And though we had already suffered greatly in Philippi, where we were shamefully mistreated, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul and Silas had been beaten and imprisoned in Philippi. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Acts 16:11–17:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'we were emboldened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by faith
  - type: text
    text: ' in our God to fearlessly preach his wonderful gospel to you in spite of incredible opposition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Our coming alongside you to encourage you was not out of some delusion, or impure motive, or an intention to mislead you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but we have been approved by God to be those who preach the gospel. So our motivation to preach is not pleasing people but pleasing God, who thoroughly examines our hearts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'God is our witness that when we came to encourage you, we never once used cunning compliments as a pretext for greed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'nor did we crave the praises of men, whether you or others. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul never watered down his message in preaching the gospel. His fearless courage serves as an example to us today to keep our message uncompromised.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Even though we could have imposed upon you our demands as apostles of Christ, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Although we could have been honored as apostles of the Messiah.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 9:1–18
      metadata:
        usfm: 1CO.9.1+1CO.9.2+1CO.9.3+1CO.9.4+1CO.9.5+1CO.9.6+1CO.9.7+1CO.9.8+1CO.9.9+1CO.9.10+1CO.9.11+1CO.9.12+1CO.9.13+1CO.9.14+1CO.9.15+1CO.9.16+1CO.9.17+1CO.9.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Philem. 8
      metadata:
        usfm: PHM.1.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'instead we showed you kindness and were gentle among you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some reliable manuscripts have “We became like little children (infants) among you.”
    marker-yv: yv-n
  - type: text
    text: 'We cared for you in the same way a nursing mother cares for her own children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: With a mother’s love and affectionate attachment to you, we were very happy to share with you not only the gospel of God but also our lives—because you had become so dear to us.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You had become our beloved.” Just a few months before, the Thessalonians were complete strangers to Paul. Now he states how dear they had become to his heart. True ministry is caring for others with a father’s love and a mother’s love—not exerting control or abusive authority over those whom we serve.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Beloved brothers and sisters, surely you remember how hard we labored among you. We worked night and day so that we would not become a burden to you while we preached the wonderful gospel of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'With God as our witness you saw how we lived among you—in holiness, in godly relationships, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “righteousness.” The Hebraic concept of righteousness extends toward our relationships and how we treat others. Paul stated that he lived in holiness toward God and purity in his relationships with others, so that no one could blame him for wrongdoing.
    marker-yv: yv-n
  - type: text
    text: 'and without fault. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you know how affectionately we treated each one of you, like a loving father cares for his own children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: We comforted and encouraged you and challenged you to adopt a lifestyle worthy of God, who invites you into his kingdom and glory.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Our calling is a summons from God to enter into his glory. A possible hendiadys, “his own glorious kingdom.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faithfulness of the Thessalonians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This is why we continually thank God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for your lives
  - type: text
    text: ', because you received our message '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wholeheartedly
  - type: text
    text: . You embraced it not as the fabrication of men but as the word of God. And the word continues to be an energizing force in you who believe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: it
    children:
    - type: text
      text: My dear
  - type: text
    text: ' brothers and sisters, the same thing happened to you as happened to God’s churches in Christ Jesus that are in Judea. For you received the same kind of mistreatment from your fellow countrymen as they did from theirs, the Jews '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'who killed both the Lord Jesus and the prophets and ran us out of town. They are offending God and hostile to everyone else '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'by hindering us from speaking to the unbelievers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the gentiles.”
    marker-yv: yv-n
  - type: text
    text: 'so that they might be saved. By so doing they are constantly filling up to the brim the measure of their guilt, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, they are filling up to the limit of their sins before God.
    marker-yv: yv-n
  - type: text
    text: 'and punishment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wrath,” a metonymy for the punishment resulting from their sins.
    marker-yv: yv-n
  - type: text
    text: has come upon them at last!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “completely” (to a full extent). This could be a prophetic word from Paul regarding the soon destruction of Jerusalem in the Roman war of AD 67–70. Paul is not referring to all Jews, for many had become converts and made up the early church. God rejected the empty rituals of Judaism but not the Jewish people. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Rom. 9–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Concern for the Thessalonians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Beloved friends, we may have been torn away '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “We have been [like] orphans.”
    marker-yv: yv-n
  - type: text
    text: 'from you physically for a season, but never in our hearts. For we have had intense longings and have endeavored to come and see in your faces the reflection of this great love. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. How poetic are the Semitic languages!
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'We '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miss you badly
  - type: text
    text: ', and I personally wanted to come to you, trying again and again, but our adversary, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satanas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “adversary,” “accuser,” “opposer,” and it is the title for Satan. In some way Satan worked to hinder Paul from returning to Thessalonica, possibly through the Jews who opposed him.
    marker-yv: yv-n
  - type: text
    text: 'Satan, blocked our way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For what will be our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: confident
  - type: text
    text: ' hope, our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exhilarating
  - type: text
    text: ' joy, or our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' trophy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “crown of boasting.”
    marker-yv: yv-n
  - type: text
    text: 'that we will boast in before our Lord Jesus at his appearing? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parousia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which can be translated “coming” or “appearing.” Paul uses it six times in his letters to the Thessalonians ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:13
      metadata:
        usfm: 1TH.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:15
      metadata:
        usfm: 1TH.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:23
      metadata:
        usfm: 1TH.5.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Thess. 2:1
      metadata:
        usfm: 2TH.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: 2TH.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'It is you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yes, you are our glorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pride and
  - type: text
    text: ' joy!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The true reward of ministry is not money or fame but the souls of men and women we can influence for the glory of God.
    marker-yv: yv-n
