document_id: 1TH.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Godly Character of Jesus’ Servants
  - type: text
    content: 'My dear brothers and sisters, it’s obvious that our ministry among you has proven to be fruitful. '
  - type: note
    content: Or “Our coming to you has not been in vain” (empty). See Acts 17:1–9.
  '10':
  - type: text
    content: 'With God as our witness you saw how we lived among you—in holiness, in godly relationships, '
  - type: note
    content: Or “righteousness.” The Hebraic concept of righteousness extends toward our relationships and how we treat others. Paul stated that he lived in holiness toward God and purity in his relationships with others, so that no one could blame him for wrongdoing.
  - type: text
    content: 'and without fault. '
  '11':
  - type: text
    content: 'And you know how affectionately we treated each one of you, like a loving father cares for his own children. '
  '12':
  - type: text
    content: We comforted and encouraged you and challenged you to adopt a lifestyle worthy of God, who invites you into his kingdom and glory.
  - type: note
    content: Our calling is a summons from God to enter into his glory. A possible hendiadys, “his own glorious kingdom.”
  - type: heading
    content: The Faithfulness of the Thessalonians
  '13':
  - type: text
    content: 'This is why we continually thank God '
  - type: text
    content: for your lives
  - type: text
    content: ', because you received our message '
  - type: text
    content: wholeheartedly
  - type: text
    content: . You embraced it not as the fabrication of men but as the word of God. And the word continues to be an energizing force in you who believe.
  '14':
  - type: text
    content: My dear
  - type: text
    content: ' brothers and sisters, the same thing happened to you as happened to God’s churches in Christ Jesus that are in Judea. For you received the same kind of mistreatment from your fellow countrymen as they did from theirs, the Jews '
  '15':
  - type: text
    content: 'who killed both the Lord Jesus and the prophets and ran us out of town. They are offending God and hostile to everyone else '
  '16':
  - type: text
    content: 'by hindering us from speaking to the unbelievers '
  - type: note
    content: Or “the gentiles.”
  - type: text
    content: 'so that they might be saved. By so doing they are constantly filling up to the brim the measure of their guilt, '
  - type: note
    content: That is, they are filling up to the limit of their sins before God.
  - type: text
    content: 'and punishment '
  - type: note
    content: Or “wrath,” a metonymy for the punishment resulting from their sins.
  - type: text
    content: has come upon them at last!
  - type: note
    content: Or “completely” (to a full extent). This could be a prophetic word from Paul regarding the soon destruction of Jerusalem in the Roman war of AD 67–70. Paul is not referring to all Jews, for many had become converts and made up the early church. God rejected the empty rituals of Judaism but not the Jewish people. See Rom. 9–11.
  - type: heading
    content: Paul’s Concern for the Thessalonians
  '17':
  - type: text
    content: 'Beloved friends, we may have been torn away '
  - type: note
    content: Or “We have been [like] orphans.”
  - type: text
    content: 'from you physically for a season, but never in our hearts. For we have had intense longings and have endeavored to come and see in your faces the reflection of this great love. '
  - type: note
    content: As translated from the Aramaic. How poetic are the Semitic languages!
  '18':
  - type: text
    content: 'We '
  - type: text
    content: miss you badly
  - type: text
    content: ', and I personally wanted to come to you, trying again and again, but our adversary, '
  - type: note
    content: The Greek word satanas means “adversary,” “accuser,” “opposer,” and it is the title for Satan. In some way Satan worked to hinder Paul from returning to Thessalonica, possibly through the Jews who opposed him.
  - type: text
    content: 'Satan, blocked our way. '
  '19':
  - type: text
    content: 'For what will be our '
  - type: text
    content: confident
  - type: text
    content: ' hope, our '
  - type: text
    content: exhilarating
  - type: text
    content: ' joy, or our '
  - type: text
    content: wonderful
  - type: text
    content: ' trophy '
  - type: note
    content: Or “crown of boasting.”
  - type: text
    content: 'that we will boast in before our Lord Jesus at his appearing? '
  - type: note
    content: This is the Greek word parousia, which can be translated “coming” or “appearing.” Paul uses it six times in his letters to the Thessalonians (3:13; 4:15; 5:23; 2 Thess. 2:1, 8).
  - type: text
    content: 'It is you! '
  '2':
  - type: text
    content: 'And though we had already suffered greatly in Philippi, where we were shamefully mistreated, '
  - type: note
    content: Paul and Silas had been beaten and imprisoned in Philippi. See Acts 16:11–17:1.
  - type: text
    content: 'we were emboldened '
  - type: text
    content: by faith
  - type: text
    content: ' in our God to fearlessly preach his wonderful gospel to you in spite of incredible opposition.'
  '20':
  - type: text
    content: 'Yes, you are our glorious '
  - type: text
    content: pride and
  - type: text
    content: ' joy!'
  - type: note
    content: The true reward of ministry is not money or fame but the souls of men and women we can influence for the glory of God.
  '3':
  - type: text
    content: 'Our coming alongside you to encourage you was not out of some delusion, or impure motive, or an intention to mislead you, '
  '4':
  - type: text
    content: 'but we have been approved by God to be those who preach the gospel. So our motivation to preach is not pleasing people but pleasing God, who thoroughly examines our hearts. '
  '5':
  - type: text
    content: 'God is our witness that when we came to encourage you, we never once used cunning compliments as a pretext for greed, '
  '6':
  - type: text
    content: 'nor did we crave the praises of men, whether you or others. '
  - type: note
    content: Paul never watered down his message in preaching the gospel. His fearless courage serves as an example to us today to keep our message uncompromised.
  '7':
  - type: text
    content: 'Even though we could have imposed upon you our demands as apostles of Christ, '
  - type: note
    content: The Aramaic can be translated “Although we could have been honored as apostles of the Messiah.” See also 1 Cor. 9:1–18; Philem. 8.
  - type: text
    content: 'instead we showed you kindness and were gentle among you. '
  - type: note
    content: Some reliable manuscripts have “We became like little children (infants) among you.”
  - type: text
    content: 'We cared for you in the same way a nursing mother cares for her own children. '
  '8':
  - type: text
    content: With a mother’s love and affectionate attachment to you, we were very happy to share with you not only the gospel of God but also our lives—because you had become so dear to us.
  - type: note
    content: Or “You had become our beloved.” Just a few months before, the Thessalonians were complete strangers to Paul. Now he states how dear they had become to his heart. True ministry is caring for others with a father’s love and a mother’s love—not exerting control or abusive authority over those whom we serve.
  '9':
  - type: text
    content: 'Beloved brothers and sisters, surely you remember how hard we labored among you. We worked night and day so that we would not become a burden to you while we preached the wonderful gospel of God. '
