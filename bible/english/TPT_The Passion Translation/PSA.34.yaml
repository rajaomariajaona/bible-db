document_id: PSA.34,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Goodness
  - type: text
    content: A song by King David composed after his escape from the king when he pretended to be insane
  - type: text
    content: Lord! I’m bursting with joy over what you’ve done for me!
  - type: text
    content: My lips are full of perpetual praise.
  '10':
  - type: text
    content: 'Even the strong and the wealthy '
  - type: note
    content: Following the ancient versions (Septuagint, Syriac, and Vulgate), this phrase is translated “rich ones.” Modern translations read “young lions.”
  - type: text
    content: grow weak and hungry,
  - type: text
    content: but those who passionately pursue the Lord
  - type: text
    content: will never lack any good thing.
  '11':
  - type: text
    content: Come, children of God, and listen to me.
  - type: text
    content: 'I’ll share the lesson I’ve learned of fearing the Lord:'
  '12':
  - type: text
    content: Do you want to live a long, good life,
  - type: text
    content: enjoying the beauty that fills each day?
  - type: text
    content: Then never speak a lie or allow wicked words
  - type: text
    content: to come from your mouth.
  '14':
  - type: text
    content: Keep turning your back on every sin,
  - type: text
    content: and make “peace” your life motto.
  - type: text
    content: Practice being at peace with everyone.
  - type: note
    content: Twice in this verse David used the Hebrew word shalom. This word means much more than “peace.” It means wholeness, wellness, well-being, safe, happy, friendly, favor, completeness, to make peace, peace offering, secure, to prosper, to be victorious, to be content, tranquil, quiet, and restful. So shalom is used to describe those of us who have been provided all that is needed to be whole and complete and break off all authority that would attempt to bind us to chaos.
  '15':
  - type: text
    content: The Lord sees all we do;
  - type: text
    content: he watches over his friends day and night.
  - type: text
    content: His godly ones receive the answers they seek
  - type: text
    content: whenever they cry out to him.
  '16':
  - type: text
    content: But the Lord has made up his mind to oppose evildoers
  - type: text
    content: and to wipe out even the memory of them
  - type: text
    content: from the face of the earth.
  - type: note
    content: See 1 Peter 3:10–12.
  '17':
  - type: text
    content: Yet when holy lovers of God cry out
  - type: text
    content: to him with all their hearts,
  - type: text
    content: the Lord will hear them and come to rescue them
  - type: text
    content: from all their troubles.
  '18':
  - type: text
    content: The Lord is close to all whose hearts are crushed by pain,
  - type: text
    content: and he is always ready to restore the repentant one.
  '19':
  - type: text
    content: Even when bad things happen to the good and godly ones,
  - type: text
    content: the Lord will save them and not let them be defeated
  - type: text
    content: by what they face.
  '2':
  - type: text
    content: I’m boasting of you and all your works,
  - type: text
    content: so let all who are discouraged take heart.
  '20':
  - type: text
    content: God will be your bodyguard to protect you
  - type: text
    content: when trouble is near.
  - type: text
    content: Not one bone will be broken.
  '21':
  - type: text
    content: Evil will cause the death of the wicked,
  - type: text
    content: for they hate and persecute the devoted lovers of God.
  - type: text
    content: 'Make no mistake about it:'
  - type: text
    content: God will hold them guilty and punish them;
  - type: text
    content: they will pay the penalty!
  '22':
  - type: text
    content: But the Lord has paid for the freedom of his servants,
  - type: text
    content: and he will freely pardon those who love him.
  - type: text
    content: He will declare them free and innocent
  - type: text
    content: when they turn to hide themselves in him.
  '3':
  - type: text
    content: Join me, everyone! Let’s praise the Lord together.
  - type: text
    content: Let’s make him famous!
  - type: text
    content: Let’s make his name glorious to all.
  '4':
  - type: text
    content: 'Listen to my testimony: I cried to God in my distress'
  - type: text
    content: and he answered me. He freed me from all my fears!
  '5':
  - type: text
    content: Gaze upon him, join your life with his, and joy will come.
  - type: text
    content: Your faces will glisten with glory.
  - type: text
    content: You’ll never wear that shame-face again.
  '6':
  - type: text
    content: When I had nothing, desperate and defeated,
  - type: text
    content: I cried out to the Lord and he heard me,
  - type: text
    content: bringing his miracle-deliverance when I needed it most.
  - type: note
    content: 'David wrote this psalm at perhaps the lowest point in his life. He was alone. He had to part from Jonathan, his dearest friend. He was being chased by Saul and his paid assassins. He had run to hide in the cave of Adullam (meaning “their prey”). Yet the beautiful sounds of praise were heard echoing in his cavern. This is a lesson for all of us: we praise our way out of our difficulties into his light.'
  '7':
  - type: text
    content: 'The angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' stooped down to listen as I prayed,'
  - type: text
    content: encircling me, empowering me, and showing me how to escape.
  - type: text
    content: He will do this for everyone who fears God.
  '8':
  - type: text
    content: 'Drink deeply '
  - type: note
    content: Many translations read “Taste and see.” The Hebrew root word for “see” is taken from a word that means “to drink deeply.”
  - type: text
    content: of the pleasures of this God.
  - type: text
    content: Experience for yourself the joyous mercies he gives
  - type: text
    content: to all who turn to hide themselves in him.
  '9':
  - type: text
    content: Worship in awe and wonder, all you who’ve been made holy!
  - type: text
    content: For all who fear him will feast with plenty.
