document_id: PSA.34,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God’s Goodness
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song by King David composed after his escape from the king when he pretended to be insane
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord! I’m bursting with joy over what you’ve done for me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My lips are full of perpetual praise.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even the strong and the wealthy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Following the ancient versions (Septuagint, Syriac, and Vulgate), this phrase is translated “rich ones.” Modern translations read “young lions.”
      marker-yv: yv-n
    - type: text
      text: grow weak and hungry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but those who passionately pursue the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will never lack any good thing.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, children of God, and listen to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll share the lesson I’ve learned of fearing the Lord:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you want to live a long, good life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enjoying the beauty that fills each day?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then never speak a lie or allow wicked words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to come from your mouth.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep turning your back on every sin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make “peace” your life motto.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Practice being at peace with everyone.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Twice in this verse David used the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This word means much more than “peace.” It means wholeness, wellness, well-being, safe, happy, friendly, favor, completeness, to make peace, peace offering, secure, to prosper, to be victorious, to be content, tranquil, quiet, and restful. So
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used to describe those of us who have been provided all that is needed to be whole and complete and break off all authority that would attempt to bind us to chaos.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord sees all we do;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he watches over his friends day and night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His godly ones receive the answers they seek
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whenever they cry out to him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Lord has made up his mind to oppose evildoers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to wipe out even the memory of them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the face of the earth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 3:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet when holy lovers of God cry out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to him with all their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Lord will hear them and come to rescue them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from all their troubles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord is close to all whose hearts are crushed by pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he is always ready to restore the repentant one.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when bad things happen to the good and godly ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Lord will save them and not let them be defeated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by what they face.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m boasting of you and all your works,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so let all who are discouraged take heart.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will be your bodyguard to protect you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when trouble is near.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one bone will be broken.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil will cause the death of the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they hate and persecute the devoted lovers of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make no mistake about it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will hold them guilty and punish them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will pay the penalty!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Lord has paid for the freedom of his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will freely pardon those who love him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will declare them free and innocent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they turn to hide themselves in him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Join me, everyone! Let’s praise the Lord together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s make him famous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s make his name glorious to all.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to my testimony: I cried to God in my distress'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he answered me. He freed me from all my fears!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaze upon him, join your life with his, and joy will come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your faces will glisten with glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll never wear that shame-face again.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I had nothing, desperate and defeated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cried out to the Lord and he heard me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing his miracle-deliverance when I needed it most.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'David wrote this psalm at perhaps the lowest point in his life. He was alone. He had to part from Jonathan, his dearest friend. He was being chased by Saul and his paid assassins. He had run to hide in the cave of Adullam (meaning “their prey”). Yet the beautiful sounds of praise were heard echoing in his cavern. This is a lesson for all of us: we praise our way out of our difficulties into his light.'
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' stooped down to listen as I prayed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: encircling me, empowering me, and showing me how to escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will do this for everyone who fears God.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Drink deeply '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many translations read “Taste and see.” The Hebrew root word for “see” is taken from a word that means “to drink deeply.”
      marker-yv: yv-n
    - type: text
      text: of the pleasures of this God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Experience for yourself the joyous mercies he gives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to all who turn to hide themselves in him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Worship in awe and wonder, all you who’ve been made holy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all who fear him will feast with plenty.
