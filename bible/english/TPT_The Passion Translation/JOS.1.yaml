        text: The book of Joshua begins with the word “And.” What writer uses the connective “And” to start a new production? This indicates the close connection between the books of Deuteronomy and Joshua. In the Hebrew text every book from Joshua through 2 Kings (with the exception of Ruth) begins with “And,” demonstrating that the history of Israel is one connected narrative and inspired by one divine author, the Holy Spirit.
