document_id: JOS.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Great Commission
  - type: text
    content: 'And '
  - type: note
    content: The book of Joshua begins with the word “And.” What writer uses the connective “And” to start a new production? This indicates the close connection between the books of Deuteronomy and Joshua. In the Hebrew text every book from Joshua through 2 Kings (with the exception of Ruth) begins with “And,” demonstrating that the history of Israel is one connected narrative and inspired by one divine author, the Holy Spirit.
  - type: text
    content: 'after Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant, died, '
  - type: note
    content: Jewish tradition states that Moses died on the seventh of Adar, the twelfth month of the Jewish calendar. The book of Joshua takes up the story right after the thirty-day mourning period for Moses (see Deut. 34:5–8). Leaders may die, but God’s prophetic promises live on.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Joshua '
  - type: note
    content: Joshua is the name Moses gave him, changing it from Hoshea to Joshua (Yehoshua), which means “Yahweh is salvation,” “may Yahweh save,” “Yahweh makes triumphant,” or “Yahweh is the Deliverer.”
  - type: text
    content: 'son of Nun, '
  - type: note
    content: Nun means “eternal,” “perpetual,” “to re-sprout,” or “eternal increase.” Joshua was the son of Nun. One greater than Joshua is Jesus, Son of the Eternal God. Joshua is introduced into the story as the “son of Nun.” In western culture we are identified by our profession, by what we do or have accomplished. But in Hebrew culture, we are introduced in the language of sonship—as a son or daughter. In English, we, too, use patronyms to identify persons, which is nearly the same as “son of.”
  - type: text
    content: 'Moses’ '
  - type: text
    content: faithful
  - type: text
    content: ' assistant, and said, '
  - type: note
    content: Seventeen times in Joshua we read the words “Yahweh spoke to Joshua” or “Yahweh said.” Perhaps it was through an audible voice, in a dream, in a vision, in a divine encounter, through a prophecy, through the Urim and Thummim (see Num. 27:21), or by some other way. God has multiple ways of speaking to his servants.
  '10':
  - type: text
    content: 'Joshua ordered the leaders of the people: '
  '11':
  - type: text
    content: '“Go through the camp and instruct the people, ‘Pack your bags; '
  - type: note
    content: Or “Prepare supplies” or “Gather what you need.”
  - type: text
    content: 'for within three days you will cross the Jordan to conquer and occupy the land that '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God is giving you to possess.’ ”'
  - type: note
    content: Many scholars conclude that Joshua did not give this command until after the spies he sent out in ch. 2 had returned.
  '12':
  - type: text
    content: 'Then Joshua addressed the Reubenites, the Gadites, and the half-tribe of Manasseh: '
  - type: note
    content: See Num. 32:28–32; Deut. 3:18–20.
  '13':
  - type: text
    content: '“Remember the words that '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant Moses commanded you: ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ' your God is giving you this land on the east side of the Jordan as your homeland.’ '
  - type: note
    content: Or “[as] a place of rest.”
  - type: text
    content: 'Therefore, your wives, your little ones, and your livestock '
  - type: note
    content: 'The order here is significant: “your wives, your little ones, and your livestock.” When the two and a half tribes asked Moses to remain on the other side of the Jordan, they displayed a warped sense of their values by speaking of their possessions before their wives and children. See Num. 32:16.'
  - type: text
    content: 'may remain here, but all your '
  - type: text
    content: valiant
  - type: text
    content: ' warriors must cross over with us armed. '
  - type: note
    content: Forty thousand warriors from these two and a half tribes crossed over to fight for their brothers (see Josh. 4:13). From Num. 26:7, 18, 34, we learn that about ninety thousand people of these tribes remained on the east side of the Jordan, including the women, children (those under the age of twenty), and the old men. Their new settlement was vulnerable, and they needed a fighting force to remain in case of attack.
  - type: text
    content: 'They will take the lead and help their brothers '
  '15':
  - type: text
    content: 'until they take possession of the land that '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God is giving them as their homeland. '
  - type: note
    content: The unity of God’s people is in focus in vv. 12–15. Similarly, we must be willing to fight for our brother’s victory as much as we fight for our own (see 1 Sam. 23:16; Phil. 2:3–4; Heb. 10:25). This is one of the very points where the people would fail when we begin to read Judges. Everyone began to do what they wanted rather than to work together for the benefit of the whole community.
  - type: text
    content: 'Afterward, you will be free to return to your own land and possess the land that Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: ’s servant, gave you here on the east side of the Jordan.”
  - type: note
    content: Joshua the prophet foresaw the complete victory of possessing the land of their enemies. In vv. 12–15 we learn that the land-takers were required to be united. Neither one individual nor one tribe could take the land; it required all God’s people going in together and fighting as one. Battles are won as God’s people unite. But unity alone isn’t enough; we must be prepared for a battle over our complete inheritance. There must be no rest until everyone has received his or her inheritance. See Eph. 4:11–16.
  '16':
  - type: text
    content: 'They answered Joshua: “We will do everything you have told us and will go wherever you send us. '
  '17':
  - type: text
    content: 'We always obeyed Moses, and we will always obey you. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God stand beside you as he stood with Moses. '
  '18':
  - type: text
    content: 'And anyone who questions your authority or disobeys whatever you command '
  - type: note
    content: Literally “your mouth.”
  - type: text
    content: shall be put to death. So, Joshua, be strong and brave!”
  - type: note
    content: Or “be determined and confident!”
  '2':
  - type: text
    content: '“My servant Moses is dead. Now get up! Prepare to cross the Jordan '
  - type: note
    content: Jordan comes from two Hebrew root words meaning “to descend” and “to judge.”
  - type: text
    content: 'River, you and all the people. '
  - type: text
    content: Lead them
  - type: text
    content: ' '
  - type: note
    content: Joshua was the successor to Moses. The leadership of Israel was given not to one of Moses’ children but to the one whom God chose, prepared, and anointed. Leadership is not hereditary but established by the call of God on one’s life. God chose Joshua in part because of his lifetime of service to Moses and his longing to be in the presence of God. See Ex. 33:11. Moses (representing the law) was not able to take God’s people into their inheritance, but Joshua (representing Jesus) could.
  - type: text
    content: 'into the land that I am giving to the Israelites. '
  '3':
  - type: text
    content: 'Every part of the land where you march '
  - type: note
    content: Or “Every place you put the sole of your foot upon,” a figure of speech for the power to conquer. To place the sole of your foot upon the land or upon your enemies was a metaphor for military victory. See Gen. 49:8; Josh. 10:24.
  - type: text
    content: 'I will give you, as I promised Moses. '
  - type: note
    content: See Deut. 11:24.
  '4':
  - type: text
    content: 'Your borders will extend from the '
  - type: text
    content: southern
  - type: text
    content: ' desert to the '
  - type: text
    content: northern
  - type: text
    content: ' mountains of Lebanon, and from the great river Euphrates '
  - type: text
    content: in the east
  - type: text
    content: ', to the Mediterranean '
  - type: note
    content: Or “the Great Sea.”
  - type: text
    content: 'in the west—including all the land of the Hittites. '
  - type: note
    content: God mentioned the Hittites because they were the strongest and most warlike of the tribes, but in this passage, they are representative of all the seven tribes of the land. There were other inhabitants of the land as well—seven particular tribes are listed in several texts, including Deut. 7. The Hittites controlled a vast empire (with a capital far off to the north in modern Turkey) whose population stretched to the borderlands of Egypt (this very region that was now no longer under Egyptian domination).
  '5':
  - type: text
    content: 'Joshua, no one will be able to defeat you for the rest of your life! I will be with you as I was with Moses, '
  - type: note
    content: What an amazing promise God gave to Joshua! In the same way Yahweh was with Moses (think burning bush, hearing God’s voice, speaking “mouth to mouth” with God [Ex. 33:11], performing miracles, divine encounters, defeating enemies), so he would be with Joshua. Throughout this book, God repeatedly assured Joshua of his presence (see Josh. 2:24; 3:7, 10; 4:14; 6:27; 10:14, 42; 13:6; 14:12; 21:44; 23:3, 10).
  - type: text
    content: 'and I will never fail '
  - type: note
    content: Or “I will not weaken you” or “allow you to be weak.” At least one Jewish scholar renders it, “I will not part from you.” (See Reuven Drucker, Yehoshua, Art Scroll Tanach Series, 1988.)
  - type: text
    content: 'nor abandon you. '
  '6':
  - type: text
    content: 'You must be strong and brave. You will lead the people to acquire and apportion the land that I promised their ancestors I would give them. '
  '7':
  - type: text
    content: 'You must remain very strong and courageous! '
  - type: note
    content: To be courageous means to translate your convictions into bold actions.
  - type: text
    content: 'Be faithful to obey all the teaching '
  - type: note
    content: Or “law [Torah].”
  - type: text
    content: 'that my servant Moses commanded you to follow. Do not deviate from him '
  - type: note
    content: This phrase could mean “Don’t deviate from [the instruction of] Moses” or “Don’t turn from Yahweh.”
  - type: text
    content: 'to the right or to the left, so that you will have overwhelming success '
  - type: note
    content: Or “be prosperous,” “push forward,” or “break out.”
  - type: text
    content: 'in everything you undertake. '
  '8':
  - type: text
    content: 'Recite this scroll of the law constantly. '
  - type: note
    content: Or “Don’t let this book of the law depart from your mouth.”
  - type: text
    content: 'Contemplate it '
  - type: note
    content: Or “meditate,” “ponder,” “imagine,” “mutter,” or “talk to oneself.” See Ps. 1:2; Prov. 3:1–2.
  - type: text
    content: 'day and night and be careful to follow every word it contains; then you will enjoy incredible prosperity and success. '
  - type: note
    content: Or “understanding.” See Prov. 3:4.
  '9':
  - type: text
    content: 'I repeat, '
  - type: note
    content: Or “Have I not commanded you?”
  - type: text
    content: 'be strong and brave! Do not yield to fear nor be discouraged, for I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God, and I will be with you wherever you go!”'
  - type: note
    content: 'God gave Joshua seven promises: (1) He would possess a vast territory (see vv. 3–4). (2) No one would be able to defeat him (see v. 5). (3) God would be with him as he was with Moses (see v. 5). (4) God would never fail him (see v. 5). (5) God would never abandon him (see v. 5). (6) He would enjoy prosperity and success (see v. 8). (7) God would be with him wherever he went (see v. 9). Remember, what God promised Joshua, he also promises you, for all that was promised to this Joshua is fulfilled in the better Joshua (Jesus) in whom we are included for receiving all of God’s promises as yes and amen.'
  - type: heading
    content: Preparation to Cross Over
