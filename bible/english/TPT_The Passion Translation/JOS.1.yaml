        text: Joshua was the successor to Moses. The leadership of Israel was given not to one of Moses’ children but to the one whom God chose, prepared, and anointed. Leadership is not hereditary but established by the call of God on one’s life. God chose Joshua in part because of his lifetime of service to Moses and his longing to be in the presence of God. See
