        text: means “eternal,” “perpetual,” “to re-sprout,” or “eternal increase.” Joshua was the son of Nun. One greater than Joshua is Jesus, Son of the Eternal God. Joshua is introduced into the story as the “son of Nun.” In western culture we are identified by our profession, by what we do or have accomplished. But in Hebrew culture, we are introduced in the language of sonship—as a son or daughter. In English, we, too, use patronyms to identify persons, which is nearly the same as “son of.”
