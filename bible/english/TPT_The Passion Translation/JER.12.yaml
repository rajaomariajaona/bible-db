document_id: JER.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Complaint
  - type: text
    content: Yahweh
  - type: text
    content: ', whenever I complain to you,'
  - type: text
    content: you always prove to be right.
  - type: text
    content: Nevertheless, hear my plea that I bring to you.
  - type: text
    content: Why is it that wicked people are successful?
  - type: text
    content: Why do scoundrels live so secure and serene?
  '10':
  - type: text
    content: 'Many rulers '
  - type: note
    content: Or “Many shepherds.” Some view the shepherds as foreign kings, yet it is likely that this refers to Judah’s kings, who bore the responsibility of the ruin of the nation.
  - type: text
    content: have destroyed my vineyard.
  - type: text
    content: They have trampled my property
  - type: note
    content: Or “portion.”
  - type: text
    content: and have made my magnificent fields
  - type: text
    content: into a desolate desert.
  '11':
  - type: text
    content: They have left it a wasteland—
  - type: text
    content: wasted, waterless, and empty before me.
  - type: text
    content: The whole land is laid waste,
  - type: text
    content: yet there is no one who seems to care.
  '12':
  - type: text
    content: Many destroyers have marched over those barren hills.
  - type: text
    content: Yahweh
  - type: text
    content: ’s sword has devoured the people throughout the land;
  - type: text
    content: no one is safe.
  '13':
  - type: text
    content: The people planted wheat but reaped nothing but weeds.
  - type: text
    content: They wearied themselves for nothing.
  - type: text
    content: They will be disappointed by their small harvest
  - type: text
    content: 'because of the burning anger of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: Yahweh’s Message to Israel’s Neighbors
  '14':
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me concerning our evil neighboring nations who attacked the land he promised to my people Israel: “I will uproot those nations and throw them off their land. I will also uproot the people of Judah '
  - type: text
    content: and rescue them
  - type: text
    content: ' from the midst of their enemies. '
  '15':
  - type: text
    content: 'Then after a period of exile, '
  - type: note
    content: Or “after I have uprooted them.”
  - type: text
    content: 'I will again show compassion to each '
  - type: text
    content: nation
  - type: text
    content: ' and bring each one back to their homelands. '
  '16':
  - type: text
    content: 'They once taught my people to worship Baal, but if they acknowledge me as the only true God, '
  - type: note
    content: Or “if they learn to swear by my name, ‘As Yahweh lives.’ ”
  - type: text
    content: 'and if they learn from my people how to worship me, then I will establish them and prosper them alongside my people. '
  - type: note
    content: This verse shows us that God loves the nations and forgives nations who turn to him.
  '17':
  - type: text
    content: 'However, if they don’t listen to me, I will uproot them from their lands and completely destroy them. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '2':
  - type: text
    content: You plant them like trees that take root;
  - type: text
    content: they spread their branches and bear fruit.
  - type: text
    content: They talk like they know you,
  - type: text
    content: but their affections are so far from you.
  - type: note
    content: Or “you are so far from their kidneys.” The Hebraic concept of the kidneys was as the place of affections and passions.
  '3':
  - type: text
    content: 'But as for me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', you know me fully.'
  - type: text
    content: You see me, and you understand me.
  - type: text
    content: You have tested my feelings for you
  - type: text
    content: and found that I am fully devoted to you
  - type: text
    content: .
  - type: text
    content: Set them aside like sheep that are going to be killed;
  - type: text
    content: keep them ready for the time of their slaughter.
  '4':
  - type: text
    content: How much longer will the land mourn?
  - type: text
    content: How much longer must the birds and animals perish?
  - type: text
    content: Even the grass of every field withers
  - type: text
    content: because of the wickedness of these people!
  - type: text
    content: For the people boast, “God doesn’t see what happens to us.”
  - type: heading
    content: God’s Reply
  '5':
  - type: text
    content: “So, the footmen have beaten you, have they?
  - type: text
    content: How, then, will you run with the cavalry?
  - type: text
    content: If you stumble in the open country,
  - type: text
    content: how will you do in the thickets of the Jordan?
  - type: note
    content: God doesn’t give a full answer to the questions of Jeremiah in this chapter. God is not obligated to justify the wisdom of his providence. At times, answers to our questions solve nothing. What we need most is not answers but for God to be the answer to our needs. God’s answer to Jeremiah was a rebuke of his impatience and a reality check of how much Jeremiah needed God to be his strength to finish his race. God was saying to his prophet, “If the men of your hometown were difficult to endure, how will you be able to stand up against the persecution of the entire nation?”
  '6':
  - type: text
    content: For even your brothers and relatives have betrayed you,
  - type: text
    content: and are in full pursuit of you.
  - type: note
    content: Or “they are in full cry after you.” As painful as it is, there are times when our own fellow believers may betray us. See Ps. 62:3–4; Prov. 26:25; Matt. 10:36.
  - type: text
    content: Don’t believe them when they speak to you as friends.”
  - type: heading
    content: The Sorrow of God
  '7':
  - type: text
    content: '“I have abandoned my house '
  - type: text
    content: of Israel
  - type: note
    content: Most scholars view “my house” as a reference to not just the temple but also the household (nation) of Israel. God’s people are his “house,” his “people,” and “the beloved” of his soul. The pain of the Father’s heart and his deep affection for his people are obvious in this passage.
  - type: text
    content: and deserted the people I call my own.
  - type: text
    content: I have surrendered
  - type: text
    content: the beloved of my soul
  - type: text
    content: over to her enemies.
  '8':
  - type: text
    content: My own inheritance has turned against me
  - type: text
    content: like savage, roaring lions in the jungle;
  - type: text
    content: 'therefore, '
  - type: text
    content: I will deal with her as though
  - type: text
    content: ' I hate her.'
  - type: note
    content: 'In the Hebraic mindset, love and hate do not express opposites, as in modern language (see Mal. 1:2–3), or as found in the New Testament (see Jesus’ teaching on loving enemies in Matt. 5:43–44). The Targum reads: “Therefore I expelled her.” See Rom. 9:13.'
  '9':
  - type: text
    content: Are hyenas and birds of prey all trying
  - type: text
    content: to devour the people I chose for myself?
  - type: note
    content: 'Or “Is my heritage to me a speckled bird of prey?” Scholars are divided over which translation is correct. The Hebrew word for “speckled” has a homonym that means “hyena.” The Septuagint reads: “Is not my inheritance to me a hyena’s lair, or a lair round about her?” Israel is pictured as a corpse that hyenas have eaten and that carrion birds have hovered over (or as a bird attacked by other birds of prey). The meaning is that Israel’s enemies are to completely ravage her.'
  - type: text
    content: Are birds of prey circling around her?
  - type: text
    content: Go, gather all the wild beasts
  - type: text
    content: and bring them to devour her.
