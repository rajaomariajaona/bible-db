segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Complaint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', whenever I complain to you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: you always prove to be right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nevertheless, hear my plea that I bring to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why is it that wicked people are successful?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do scoundrels live so secure and serene?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You plant them like trees that take root;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they spread their branches and bear fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They talk like they know you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but their affections are so far from you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you are so far from their kidneys.” The Hebraic concept of the kidneys was as the place of affections and passions.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But as for me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you know me fully.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You see me, and you understand me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have tested my feelings for you
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: and found that I am fully devoted to you
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set them aside like sheep that are going to be killed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: keep them ready for the time of their slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How much longer will the land mourn?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How much longer must the birds and animals perish?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the grass of every field withers
- type: usfm
  marker: q1
  children:
  - type: text
    text: because of the wickedness of these people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the people boast, “God doesn’t see what happens to us.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Reply
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “So, the footmen have beaten you, have they?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How, then, will you run with the cavalry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you stumble in the open country,
- type: usfm
  marker: q1
  children:
  - type: text
    text: how will you do in the thickets of the Jordan?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God doesn’t give a full answer to the questions of Jeremiah in this chapter. God is not obligated to justify the wisdom of his providence. At times, answers to our questions solve nothing. What we need most is not answers but for God to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the answer to our needs. God’s answer to Jeremiah was a rebuke of his impatience and a reality check of how much Jeremiah needed God to be his strength to finish his race. God was saying to his prophet, “If the men of your hometown were difficult to endure, how will you be able to stand up against the persecution of the entire nation?”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For even your brothers and relatives have betrayed you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and are in full pursuit of you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they are in full cry after you.” As painful as it is, there are times when our own fellow believers may betray us. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 62:3–4
      metadata:
        usfm: PSA.62.3+PSA.62.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 26:25
      metadata:
        usfm: PRO.26.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 10:36
      metadata:
        usfm: MAT.10.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t believe them when they speak to you as friends.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sorrow of God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“I have abandoned my house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most scholars view “my house” as a reference to not just the temple but also the household (nation) of Israel. God’s people are his “house,” his “people,” and “the beloved” of his soul. The pain of the Father’s heart and his deep affection for his people are obvious in this passage.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and deserted the people I call my own.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have surrendered
- type: usfm
  marker: q1
  children:
  - type: text
    text: the beloved of my soul
- type: usfm
  marker: q1
  children:
  - type: text
    text: over to her enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My own inheritance has turned against me
- type: usfm
  marker: q1
  children:
  - type: text
    text: like savage, roaring lions in the jungle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'therefore, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will deal with her as though
  - type: text
    text: ' I hate her.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the Hebraic mindset, love and hate do not express opposites, as in modern language (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 1:2–3
      metadata:
        usfm: MAL.1.2+MAL.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), or as found in the New Testament (see Jesus’ teaching on loving enemies in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 5:43–44
      metadata:
        usfm: MAT.5.43+MAT.5.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). The Targum reads: “Therefore I expelled her.” See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 9:13
      metadata:
        usfm: ROM.9.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Are hyenas and birds of prey all trying
- type: usfm
  marker: q1
  children:
  - type: text
    text: to devour the people I chose for myself?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “Is my heritage to me a speckled bird of prey?” Scholars are divided over which translation is correct. The Hebrew word for “speckled” has a homonym that means “hyena.” The Septuagint reads: “Is not my inheritance to me a hyena’s lair, or a lair round about her?” Israel is pictured as a corpse that hyenas have eaten and that carrion birds have hovered over (or as a bird attacked by other birds of prey). The meaning is that Israel’s enemies are to completely ravage her.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are birds of prey circling around her?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go, gather all the wild beasts
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bring them to devour her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Many rulers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Many shepherds.” Some view the shepherds as foreign kings, yet it is likely that this refers to Judah’s kings, who bore the responsibility of the ruin of the nation.
    marker-yv: yv-n
  - type: text
    text: have destroyed my vineyard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have trampled my property
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “portion.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and have made my magnificent fields
- type: usfm
  marker: q1
  children:
  - type: text
    text: into a desolate desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They have left it a wasteland—
- type: usfm
  marker: q1
  children:
  - type: text
    text: wasted, waterless, and empty before me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole land is laid waste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yet there is no one who seems to care.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Many destroyers have marched over those barren hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s sword has devoured the people throughout the land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no one is safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The people planted wheat but reaped nothing but weeds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wearied themselves for nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be disappointed by their small harvest
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because of the burning anger of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s Message to Israel’s Neighbors
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Here is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to me concerning our evil neighboring nations who attacked the land he promised to my people Israel: “I will uproot those nations and throw them off their land. I will also uproot the people of Judah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and rescue them
  - type: text
    text: ' from the midst of their enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then after a period of exile, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “after I have uprooted them.”
    marker-yv: yv-n
  - type: text
    text: 'I will again show compassion to each '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nation
  - type: text
    text: ' and bring each one back to their homelands. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They once taught my people to worship Baal, but if they acknowledge me as the only true God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “if they learn to swear by my name, ‘As
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lives.’ ”
    marker-yv: yv-n
  - type: text
    text: 'and if they learn from my people how to worship me, then I will establish them and prosper them alongside my people. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse shows us that God loves the nations and forgives nations who turn to him.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'However, if they don’t listen to me, I will uproot them from their lands and completely destroy them. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
