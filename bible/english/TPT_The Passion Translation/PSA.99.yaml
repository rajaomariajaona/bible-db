document_id: PSA.99,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God of Holiness
  - type: text
    content: Yahweh
  - type: text
    content: ' is King over all! Everyone trembles in awe before him.'
  - type: text
    content: He rules enthroned between the wings of the cherubim.
  - type: text
    content: So let the earth shake and quake in wonder before him!
  '2':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is great and glorious in the midst of his Zion-people.'
  - type: text
    content: He is exalted above all!
  '3':
  - type: text
    content: Let everyone praise this breathtaking God, for he is holy.
  '4':
  - type: text
    content: A lover of justice is our mighty King; he is right in all his ways.
  - type: text
    content: He insists on being fair to all,
  - type: text
    content: promoting true justice and righteousness in Jacob.
  '5':
  - type: text
    content: So everyone, exalt the Lord our God
  - type: text
    content: facedown before his glory-throne, for he is great and holy.
  '6':
  - type: text
    content: God has his praying priests
  - type: text
    content: ','
  - type: text
    content: like Moses, Aaron, and Samuel, who all interceded,
  - type: text
    content: asking God for help.
  - type: text
    content: God heard their cries and came to their rescue.
  '7':
  - type: text
    content: He spoke to them from the pillar of clouds,
  - type: text
    content: and they followed his instructions,
  - type: text
    content: doing everything he told them.
  '8':
  - type: text
    content: God, the great forgiver, answered their prayers,
  - type: text
    content: yet he would punish them when they went astray.
  '9':
  - type: text
    content: Keep exalting the Lord our God
  - type: text
    content: facedown before his glory-throne, for he is great and holy!
