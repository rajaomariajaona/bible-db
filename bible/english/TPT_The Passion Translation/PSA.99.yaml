document_id: PSA.99,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God of Holiness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is King over all! Everyone trembles in awe before him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rules enthroned between the wings of the cherubim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So let the earth shake and quake in wonder before him!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is great and glorious in the midst of his Zion-people.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is exalted above all!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let everyone praise this breathtaking God, for he is holy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lover of justice is our mighty King; he is right in all his ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He insists on being fair to all,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: promoting true justice and righteousness in Jacob.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So everyone, exalt the Lord our God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: facedown before his glory-throne, for he is great and holy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God has his praying priests
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like Moses, Aaron, and Samuel, who all interceded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asking God for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God heard their cries and came to their rescue.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spoke to them from the pillar of clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they followed his instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: doing everything he told them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, the great forgiver, answered their prayers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet he would punish them when they went astray.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep exalting the Lord our God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: facedown before his glory-throne, for he is great and holy!
