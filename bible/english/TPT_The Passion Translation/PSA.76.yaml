document_id: PSA.76
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Awe-Inspiring Power
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s poetic tune, a song of smiting
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God is well known in the land of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is famous throughout Israel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'making his home in Jerusalem, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 76:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Salem,” the ancient name of Jerusalem.
    marker-yv: yv-n
  - type: text
    text: living here on Mount Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: That’s where he smashes every weapon of war
- type: usfm
  marker: q1
  children:
  - type: text
    text: that comes against him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s where he uses the broken arrows
- type: usfm
  marker: q1
  children:
  - type: text
    text: as kindling for his mighty bonfire.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: God, you are so resplendent and radiant!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 76:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used here is often translated as “anointed” when taken from either the Hebrew or the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your majesty shines from your everlasting mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing could be compared to you in glory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even the mightiest of men have been paralyzed by your presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were so stunned and lifeless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: not even the strongest one could lift a hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When Jacob’s God roared his rebuke,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soldiers and their steeds all fell to the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: stunned and lying still.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No wonder you are greatly feared! You are the awe-inspiring God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For who could ever stand before your face
- type: usfm
  marker: q1
  children:
  - type: text
    text: when your fierce anger burns and live to tell about it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As the earth itself holds its breath in awe before you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: judgment is decreed from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You arise to punish evil and defend the gentle upon the earth.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You have power to transform man’s futile anger into praise.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 76:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The counsel of men will praise you.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fury of your enemies only causes your fame to increase.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 76:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “Survivors of your wrath keep your festivals.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So you’d better keep every promise you’ve ever made
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'to the Awesome One, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all people bring their extravagant gifts to him alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He is famous for breaking the spirit of the powers that be.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the kings of the earth will know him as the Fearsome One!
