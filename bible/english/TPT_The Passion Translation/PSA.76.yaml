document_id: PSA.76,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Awe-Inspiring Power
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: Asaph’s poetic tune, a song of smiting
  - type: text
    content: God is well known in the land of Judah.
  - type: text
    content: He is famous throughout Israel,
  '10':
  - type: text
    content: You have power to transform man’s futile anger into praise.
  - type: note
    content: Or “The counsel of men will praise you.”
  - type: text
    content: The fury of your enemies only causes your fame to increase.
  - type: note
    content: The Septuagint reads “Survivors of your wrath keep your festivals.”
  '11':
  - type: text
    content: So you’d better keep every promise you’ve ever made
  - type: text
    content: 'to the Awesome One, '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: Let all people bring their extravagant gifts to him alone.
  '12':
  - type: text
    content: He is famous for breaking the spirit of the powers that be.
  - type: text
    content: And the kings of the earth will know him as the Fearsome One!
  '2':
  - type: text
    content: 'making his home in Jerusalem, '
  - type: note
    content: Or “Salem,” the ancient name of Jerusalem.
  - type: text
    content: living here on Mount Zion.
  '3':
  - type: text
    content: That’s where he smashes every weapon of war
  - type: text
    content: that comes against him.
  - type: text
    content: That’s where he uses the broken arrows
  - type: text
    content: as kindling for his mighty bonfire.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: God, you are so resplendent and radiant!
  - type: note
    content: The word used here is often translated as “anointed” when taken from either the Hebrew or the Aramaic.
  - type: text
    content: Your majesty shines from your everlasting mountain.
  - type: text
    content: Nothing could be compared to you in glory!
  '5':
  - type: text
    content: Even the mightiest of men have been paralyzed by your presence.
  - type: text
    content: They were so stunned and lifeless,
  - type: text
    content: not even the strongest one could lift a hand.
  '6':
  - type: text
    content: When Jacob’s God roared his rebuke,
  - type: text
    content: soldiers and their steeds all fell to the ground,
  - type: text
    content: stunned and lying still.
  '7':
  - type: text
    content: No wonder you are greatly feared! You are the awe-inspiring God!
  - type: text
    content: For who could ever stand before your face
  - type: text
    content: when your fierce anger burns and live to tell about it.
  '8':
  - type: text
    content: As the earth itself holds its breath in awe before you,
  - type: text
    content: judgment is decreed from heaven.
  '9':
  - type: text
    content: You arise to punish evil and defend the gentle upon the earth.
  - type: text
    content: Pause in his presence
