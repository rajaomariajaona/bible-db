      - type: text
        text: ). Although it can be translated “worm,” Jesus was saying that he was like the worm that bleeds scarlet, changing the very substance of those his blood touches. “When the female of the scarlet [‘tola’] worm species was ready to give birth to her young, she would attach her body to the trunk of a tree, fixing herself so firmly and permanently that she would never leave again. The eggs deposited beneath her body were thus protected until the larvae were hatched and able to enter their own life cycle. As the mother died, the crimson fluid stained her body and the surrounding wood. From the dead bodies of such female scarlet worms, the commercial scarlet dyes of antiquity were extracted” (Biblical Basis for Modern Science, p. 73, 1985, Henry Morris). The tola worm left a scarlet stain on the tree to which it attached itself, but after three days, the scarlet stain turned white. See
    - type: usfm
      marker: ft
      children:
