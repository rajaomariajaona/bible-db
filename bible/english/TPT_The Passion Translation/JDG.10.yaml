document_id: JDG.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola, the Champion-Deliverer
  - type: text
    content: 'After Abimelech died, '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised up a man of Issachar’s tribe to deliver Israel. His name was Tola '
  - type: note
    content: The Hebrew word tola, a homonym, can be translated “scarlet” or “worm.” The dried body of the female worm coccus ilicis was crushed (see Isa. 53:5) and then used to dye clothing scarlet or crimson. In those days, scarlet cloth was highly valued (Lam. 4:5). Exodus mentions “scarlet” twenty-six times referring to materials of the tabernacle. In Ps. 22, the psalm of the cross, Jesus identified himself as tola, “a . . . worm” (v. 6). Although it can be translated “worm,” Jesus was saying that he was like the worm that bleeds scarlet, changing the very substance of those his blood touches. “When the female of the scarlet [‘tola’] worm species was ready to give birth to her young, she would attach her body to the trunk of a tree, fixing herself so firmly and permanently that she would never leave again. The eggs deposited beneath her body were thus protected until the larvae were hatched and able to enter their own life cycle. As the mother died, the crimson fluid stained her body and the surrounding wood. From the dead bodies of such female scarlet worms, the commercial scarlet dyes of antiquity were extracted” (Biblical Basis for Modern Science, p. 73, 1985, Henry Morris). The tola worm left a scarlet stain on the tree to which it attached itself, but after three days, the scarlet stain turned white. See Isa. 1:18. Tola is a preview of our splendid Jesus who was like a crushed worm that bled scarlet.
  - type: text
    content: 'son of Puah '
  - type: note
    content: Puah means “splendid.”
  - type: text
    content: 'and grandson of Dodo. '
  - type: note
    content: Dodo comes from the root word for “beloved” or “lover.” In Tola we see Jesus, who is now the Lover of our soul.
  - type: text
    content: 'He lived in the village of Shamir '
  - type: note
    content: Shamir means “sharp point [thorn].” Jewish tradition states that God created the shamir stone as the means by which Moses engraved the names of the twelve tribes onto the stones of the breastplate. (See Tosefta, Soṭah, xv. 1 [ed. Zuckermandel, p. 321]; Soṭah 48b; Yer. Soṭah 24b.) Other traditions hold that shamir was a very small worm that could bore into stone. (See Rashi, Pes. 54a, Grünbaum [“Gesammelte Aufsätze,” p. 32]; Maimonides, commentary on Ab. 5, 6.)
  - type: text
    content: 'in the highlands of Ephraim. '
  '10':
  - type: text
    content: 'Then the Israelites desperately cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ', “We have sinned against you because we have abandoned our God and have worshiped the Baals.”'
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' answered them, '
  - type: note
    content: Jewish tradition states that a prophet delivered this word to Israel.
  - type: text
    content: '“Did I not rescue you '
  - type: text
    content: in the past
  - type: text
    content: ' from '
  - type: text
    content: the power of
  - type: text
    content: ' the Egyptians, the Amorites, the Ammonites, the Philistines, '
  '12':
  - type: text
    content: 'the Sidonians, the Amalekites, and the Midianites? '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Maonites.”
  - type: text
    content: 'When they swept over you and oppressed you and when you cried out in desperation to me, did I not deliver you and set you free from their power? '
  '13':
  - type: text
    content: 'Because you have abandoned me to serve false gods, I am no longer coming to your rescue! '
  '14':
  - type: text
    content: Go ahead and pray all you want to these new gods you have chosen. Let’s see if they will come and deliver you in your time of trouble!”
  '15':
  - type: text
    content: 'But the Israelites continued to plead with '
  - type: text
    content: Yahweh
  - type: text
    content: ', “Rescue us! We know we are guilty. You can do to us whatever seems good to you, '
  - type: note
    content: It is always better to throw yourself upon the mercy of God than to be subject to the cruelty of men. See 2 Sam. 24:12–14.
  - type: text
    content: 'but '
  - type: text
    content: please
  - type: text
    content: ', come to our rescue!” '
  '16':
  - type: text
    content: 'So they threw away the false gods from among them and returned to worshiping '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: text
    content: At last
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' felt '
  - type: note
    content: Or “saw.”
  - type: text
    content: Israel’s misery and could bear it no longer.
  '17':
  - type: text
    content: 'Then the Ammonites mustered an army '
  - type: text
    content: and
  - type: text
    content: ' encamped in Gilead, while the Israelites rallied together, and they encamped at Mizpah. '
  '18':
  - type: text
    content: The commanders of the people of Gilead said to one another, “Whoever starts the fight against the Ammonites, we’ll make him our leader.”
  '2':
  - type: text
    content: He was Israel’s champion-deliverer for twenty-three years; then he died and was buried at Shamir.
  - type: heading
    content: Jair, the Champion-Deliverer
  '3':
  - type: text
    content: 'After Tola, '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised up a man from Gilead whose name was Jair. '
  - type: note
    content: Jair means “he enlightens.”
  - type: text
    content: 'He was Israel’s champion-deliverer for twenty-two years. '
  '4':
  - type: text
    content: 'He had thirty sons, who rode on thirty donkeys, and thirty villages belonged to them. '
  - type: note
    content: Jair’s thirty sons riding on thirty donkeys and owning thirty cities is expressed poetically in the Hebrew. The rarely used word for “donkeys” (burros) is a homonym for the word for “villages.” The information implies a somewhat princely authority given to his sons.
  - type: text
    content: 'These villages are in the region of Gilead and are called Jair’s Villages to this day. '
  '5':
  - type: text
    content: Jair died and was buried at Kamon.
  - type: note
    content: Kamon means “elevation.” It is identified as modern Qamm, on the Jordan-Irbid road.
  - type: heading
    content: Oppression by the Ammonites
  '6':
  - type: text
    content: 'The Israelites again did evil in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: ', worshiping the Baals and the Ashtaroths, '
  - type: note
    content: Or “Astartes.” These idols were local manifestations of the goddess Ishtar, the fertility goddess of the ancient Near East.
  - type: text
    content: 'the gods of Aram, '
  - type: note
    content: The chief gods of Aram were Hadad and Rimmon.
  - type: text
    content: 'Sidon, '
  - type: note
    content: Or “Phoenicia.”
  - type: text
    content: 'Moab, '
  - type: note
    content: The chief god of Moab was Chemosh.
  - type: text
    content: 'and Ammon, '
  - type: note
    content: The chief god of Ammon was Molech.
  - type: text
    content: 'and the gods of the Philistines. '
  - type: note
    content: The gods of the Philistines were Dagon and Baal-Zebub.
  - type: text
    content: 'Because Israel entirely abandoned the worship of '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ' became furious with Israel, and he handed them over to the oppression of the Philistines '
  - type: note
    content: This introduces the oppression of the Philistines, which will not even begin to be resolved until ch. 13 with Samson and would not be finally resolved until the champion-deliverer David.
  - type: text
    content: 'and the Ammonites. '
  '8':
  - type: text
    content: 'They crushed and oppressed all the Israelites for eighteen years. They ruled over all the Israelites living east of the Jordan in Gilead, in the land of the Amorites. '
  '9':
  - type: text
    content: The Ammonites also crossed the Jordan and fought against the tribes of Judah, Benjamin, and Ephraim, leaving Israel distressed.
