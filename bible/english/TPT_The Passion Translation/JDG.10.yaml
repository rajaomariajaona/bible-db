    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' became furious with Israel, and he handed them over to the oppression of the Philistines '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This introduces the oppression of the Philistines, which will not even begin to be resolved until ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: JDG.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: with Samson and would not be finally resolved until the champion-deliverer David.
    marker-yv: yv-n
  - type: text
    text: 'and the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They crushed and oppressed all the Israelites for eighteen years. They ruled over all the Israelites living east of the Jordan in Gilead, in the land of the Amorites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Ammonites also crossed the Jordan and fought against the tribes of Judah, Benjamin, and Ephraim, leaving Israel distressed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the Israelites desperately cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “We have sinned against you because we have abandoned our God and have worshiped the Baals.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' answered them, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jewish tradition states that a prophet delivered this word to Israel.
    marker-yv: yv-n
  - type: text
    text: '“Did I not rescue you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the past
  - type: text
    text: ' from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the power of
  - type: text
    text: ' the Egyptians, the Amorites, the Ammonites, the Philistines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the Sidonians, the Amalekites, and the Midianites? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “Maonites.”
    marker-yv: yv-n
  - type: text
    text: 'When they swept over you and oppressed you and when you cried out in desperation to me, did I not deliver you and set you free from their power? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Because you have abandoned me to serve false gods, I am no longer coming to your rescue! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Go ahead and pray all you want to these new gods you have chosen. Let’s see if they will come and deliver you in your time of trouble!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Israelites continued to plead with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “Rescue us! We know we are guilty. You can do to us whatever seems good to you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is always better to throw yourself upon the mercy of God than to be subject to the cruelty of men. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 24:12–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: please
  - type: text
    text: ', come to our rescue!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they threw away the false gods from among them and returned to worshiping '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: At last
  - type: text
    text: ', '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' felt '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “saw.”
    marker-yv: yv-n
  - type: text
    text: Israel’s misery and could bear it no longer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the Ammonites mustered an army '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encamped in Gilead, while the Israelites rallied together, and they encamped at Mizpah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The commanders of the people of Gilead said to one another, “Whoever starts the fight against the Ammonites, we’ll make him our leader.”
