        text: 10:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The chief gods of Aram were Hadad and Rimmon.
    marker-yv: yv-n
  - type: text
    text: 'Sidon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Phoenicia.”
    marker-yv: yv-n
  - type: text
    text: 'Moab, '
