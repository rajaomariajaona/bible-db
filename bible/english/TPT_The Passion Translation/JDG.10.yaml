    marker-yv: yv-n
  - type: text
    text: 'He was Israel’s champion-deliverer for twenty-two years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He had thirty sons, who rode on thirty donkeys, and thirty villages belonged to them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jair’s thirty sons riding on thirty donkeys and owning thirty cities is expressed poetically in the Hebrew. The rarely used word for “donkeys” (burros) is a homonym for the word for “villages.” The information implies a somewhat princely authority given to his sons.
    marker-yv: yv-n
  - type: text
    text: 'These villages are in the region of Gilead and are called Jair’s Villages to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jair died and was buried at Kamon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kamon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “elevation.” It is identified as modern Qamm, on the Jordan-Irbid road.
    marker-yv: yv-n
