        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “sharp point [thorn].” Jewish tradition states that God created the shamir stone as the means by which Moses engraved the names of the twelve tribes onto the stones of the breastplate. (See Tosefta, Soṭah, xv. 1 [ed. Zuckermandel, p. 321]; Soṭah 48b; Yer. Soṭah 24b.) Other traditions hold that shamir was a very small worm that could bore into stone. (See Rashi, Pes. 54a, Grünbaum [“Gesammelte Aufsätze,” p. 32]; Maimonides, commentary on Ab. 5, 6.)
    marker-yv: yv-n
  - type: text
    text: 'in the highlands of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He was Israel’s champion-deliverer for twenty-three years; then he died and was buried at Shamir.
- type: usfm
