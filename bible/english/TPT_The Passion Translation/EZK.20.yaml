document_id: EZK.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Disobedience in Egypt
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 20 is the sixth panel (F) in the chiastic parallel structure in Ezekiel. This section contains the declaration of the judgment against Israel and the promise of new covenant blessing and restoration. This section—panel F—constitutes the corresponding parallel with panel F1 in ch. 36, which also contains a declaration of judgment against Israel, followed by the promise of new covenant blessing.
  - type: text
    content: 'It was the seventh year, the fifth month, and the tenth day '
  - type: text
    content: after our deportation to Babylon
  - type: text
    content: '. '
  - type: note
    content: That is, August 14, 591 BC. The dating of this event would be four to five years before the destruction of the temple in Jerusalem.
  - type: text
    content: 'Some of the elders of Israel came to request that I ask '
  - type: text
    content: Yahweh
  - type: text
    content: ' for his message to them. As we sat together, '
  '10':
  - type: text
    content: '“So I brought them out of Egypt and led them into the desert. '
  '11':
  - type: text
    content: 'I gave them my laws and taught them my commands, '
  - type: note
    content: This refers to the law given to Israel at Mount Sinai. See Lev. 18:5.
  - type: text
    content: 'so that they would follow them and live by them. '
  '12':
  - type: text
    content: 'And I also gave them my Sabbaths as a sign between me and them '
  - type: note
    content: See Ex. 31:17. The Sabbath was a unique sign of the covenant between God and Israel. There is no command to keep the Sabbath today for gentile believers. See Rom. 14:5.
  - type: text
    content: 'so that they might know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the one who sets them apart as my own. '
  '13':
  - type: text
    content: 'But the Israelites rebelled against me in the wilderness and refused to keep my laws and rejected my commands (the one who obeys my laws will live by them), and they completely dishonored my Sabbaths. I was about to vent my fury on them in the desert and destroy them. '
  '14':
  - type: text
    content: But I chose to withhold my punishment
  - type: text
    content: ' for the sake of my '
  - type: text
    content: holy
  - type: text
    content: ' name, that it not be profaned in the eyes of the nations who had seen my power in bringing the Israelites out of Egypt. '
  '15':
  - type: text
    content: 'So, I made a vow in the desert that I would not bring that generation '
  - type: note
    content: Or “them.”
  - type: text
    content: 'into the most splendid land that I had given them, a land flowing with milk and honey. '
  '16':
  - type: text
    content: 'For they had scorned my commands, refused to keep my laws, dishonored my Sabbaths, and their hearts were attached to idols. '
  '17':
  - type: text
    content: In spite of this, I took pity on them, so I spared them from destruction and did not make an end of them in the desert.
  '18':
  - type: text
    content: '“I warned their children in the wilderness: ‘Do not follow the ways of your ancestors, do not practice their standard of justice, and do not defile yourselves with their '
  - type: text
    content: foul
  - type: text
    content: ' idols. '
  '19':
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God. Keep my laws, obey my commands, and follow them. '
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '20':
  - type: text
    content: 'Keep my Sabbaths as holy days. Let them be a '
  - type: text
    content: covenant
  - type: text
    content: '-sign between me and you, to remind you that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God.’'
  '21':
  - type: text
    content: '“However, '
  - type: text
    content: like their parents
  - type: text
    content: ', the next generation rebelled against me; they refused to keep my laws and did not respect or practice my standard of justice so that they would follow my laws and live by them. '
  - type: note
    content: See Num. 25:1–9.
  - type: text
    content: 'They also dishonored my Sabbaths. So, in my fury I decided to punish them and pour out my anger on them in the desert. '
  '22':
  - type: text
    content: 'But I restrained myself to protect the honor of my name so that I would not be profaned in the eyes of the surrounding nations who saw me reveal myself by bringing the '
  - type: text
    content: Israelites
  - type: text
    content: ' out of Egypt. '
  '23':
  - type: text
    content: 'Moreover, I made a vow to them in the wilderness that I would scatter them throughout the nations and disperse them into foreign countries. '
  '24':
  - type: text
    content: I did this
  - type: text
    content: ' because they had broken my laws, refused to obey my commands, dishonored my Sabbaths, and their hearts chased after the idols '
  - type: note
    content: Or “they fastened their eyes on the idols.”
  - type: text
    content: 'of their ancestors. '
  '25':
  - type: text
    content: 'And for this reason I gave them laws and regulations that resulted in punishment, not life. '
  - type: note
    content: Or “I gave them statutes that were not good and rules they could not keep to have life.”
  '26':
  - type: text
    content: 'And because they sacrificed their firstborn children in the fire, I declared them defiled and unfit '
  - type: text
    content: to worship me
  - type: text
    content: '. I did this to fill them with revulsion so that they would know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: Israel’s Disobedience in Canaan
  '27':
  - type: text
    content: '“Therefore, son of man, speak to the people of Israel '
  - type: text
    content: in exile
  - type: text
    content: ' and say to them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Here is another instance of your ancestors blaspheming me by their infidelity. '
  '28':
  - type: text
    content: 'When I had brought them into the promised land, they discovered all sorts of high hills and all kinds of spreading trees. That is where they offered sacrifices and made offerings '
  - type: text
    content: to false gods
  - type: text
    content: ' that provoked my anger. That is where they burned incense and poured out drink offerings '
  - type: text
    content: to false gods
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'So I asked them: What is this high place where you go?’ ” '
  - type: note
    content: This verse contains a significant paronomasia. The Hebrew term for “high place” (bamah) has a homonym that can be translated “where we go.” The Hebrew play on words, lost in translation, would not be missed by a Hebrew speaker.
  - type: text
    content: (So its name is called High Place to this day.)
  - type: heading
    content: Israel’s Disobedience in Exile
  '3':
  - type: text
    content: '“Son of man, give the elders of Israel this message: ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Are you really coming to consult with me? As surely as I live, I will tell you nothing. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '30':
  - type: text
    content: '“Say to the Israelites '
  - type: text
    content: in exile
  - type: text
    content: ', ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Will you defile yourselves in the same way your ancestors did and act like a prostitute with your idol worship? '
  '31':
  - type: text
    content: 'For when you offer your gifts and sacrifice your children as sacrifices by fire, you defile yourselves with all your idol worship to this very day. Do you think you can come and consult with me? As surely as I live, I will not answer you. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken!'
  '32':
  - type: text
    content: '“ ‘You are saying that you want to worship idols of wood and stone and be like the nations around you. But what you have in mind will never happen. '
  '33':
  - type: text
    content: 'As surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', live, I warn you: I will continue to rule over you with a strong hand and with all my power and my wrath poured out!’ ”'
  - type: heading
    content: Another Exodus
  '34':
  - type: text
    content: '“ ‘You have been scattered into many different nations and lands. But with a strong hand and my mighty power and outpoured wrath, I will bring you back. '
  '35':
  - type: text
    content: 'I will bring you into the desert of many nations, '
  - type: note
    content: This is likely a reference to the Syrian desert or the Arabian desert, both of which are surrounded by other nations.
  - type: text
    content: 'and there I will enter into judgment '
  - type: note
    content: The Hebrew verb shaphat can mean either “to plead with” or “to execute judgment.” See Hos. 2:14.
  - type: text
    content: 'with you face-to-face! '
  '36':
  - type: text
    content: 'Just as I entered into judgment with your ancestors in the wilderness of Sinai, so I now judge you. I am Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', and I declare this to you. '
  '37':
  - type: text
    content: 'I will make you pass under the shepherd’s rod and take note of you, '
  - type: text
    content: as a shepherd sorts his sheep
  - type: text
    content: '. '
  - type: note
    content: See Lev. 27:32. The metaphor of the shepherd’s rod may also include the notion of discipline.
  - type: text
    content: 'And I will bring you into the bond of the covenant. '
  - type: note
    content: The “bond” of the covenant entails a mandatory obligation to obey the terms of the covenant.
  '38':
  - type: text
    content: 'I will purge out the rebels from among you, those who sin against me. I will remove them from the land where they are exiled, but they will not enter the land of Israel. Then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'And now, you people of Israel, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: Go ahead, all of you, worship your '
  - type: text
    content: foul
  - type: text
    content: ' idols, if that’s what you want to do. But later you will have to listen and obey me! Then you will no longer dishonor my holy name by worshiping your foul idols and bringing your offerings to them.’ ”'
  - type: heading
    content: Israel’s Future Transformation
  '4':
  - type: text
    content: 'Then he said to me, “Judge them, Ezekiel! Bring a charge against them, son of man! '
  - type: note
    content: Or “Will you judge them, Ezekiel? Will you bring a charge against them, son of man?” Although this is the imperfect verb, the Hebrew verb can be viewed as the desiderative mood.
  - type: text
    content: 'Confront them over the disgusting practices of their ancestors! '
  '40':
  - type: text
    content: '“ ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: On the high mountain of Israel set apart for me, '
  - type: note
    content: That is, Mount Zion.
  - type: text
    content: 'all the people of Israel—everyone in the land—will worship me. I will be pleased with you and accept your sacrifices to me. And there I will require your best offerings, all your best gifts dedicated to me, and your holy sacrifices. '
  '41':
  - type: text
    content: 'I will take you out from among the nations and lands where you have been scattered and gather you together. Then I will be pleased with you just as I am pleased with the sweet aroma of burning sacrifices. And I will put my holiness on display through you before the nations. '
  '42':
  - type: text
    content: 'And when I bring you back to the soil of Israel, the land that I pledged my word to give to your ancestors, you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'You will remember your ways and all the vile actions by which you have defiled yourselves, and you will be disgusted with yourselves for all the evil things you did. '
  - type: note
    content: When God shows mercy, we become ashamed of our past and repent and turn to God for restoration. We then see that our transformation is not according to our merit but solely by his kindness and grace. See Ezek. 6:9; Rom. 2:4.
  '44':
  - type: text
    content: 'And when I deal with you, not as you deserve because of your wickedness, but in a way that brings honor to my name, then you, the people of Israel, will recognize that I am God. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '45':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '46':
  - type: text
    content: '“Son of man, look toward the south and prophesy against the forests of the southern land. '
  '47':
  - type: text
    content: 'Prophesy to the southern forest, ‘Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ': Behold, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you that I am about to light a fire in you that will consume every green tree and every dry tree of your land! This blazing fire will not be extinguished as it spreads to the north and consumes everything in its path. '
  - type: note
    content: Or “all faces from south to north will be scorched by it.”
  '48':
  - type: text
    content: 'Everyone will know that it was I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', who started that fire, and no one will ever be able to put it out.’ ”'
  '49':
  - type: text
    content: 'But I protested and said, “But Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', everyone is already complaining that I only speak in riddles.”'
  - type: note
    content: Or “I am the maker of parables [allegories].” See Matt. 13:11.
  '5':
  - type: text
    content: 'Tell them what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: ‘On the day when I chose Israel '
  - type: text
    content: to be my people
  - type: text
    content: ', I pledged my word '
  - type: note
    content: Or “I raised my hand toward,” which was done when taking an oath.
  - type: text
    content: 'to the tribes of Jacob, and I revealed myself to them in Egypt. '
  - type: note
    content: God revealed his mighty power to Israel in the plagues he sent against Egypt and in the Passover miracle.
  - type: text
    content: 'I pledged my word to them and said: I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God. '
  - type: note
    content: See Ex. 3:13–14; Deut. 7:6.
  '6':
  - type: text
    content: 'That day I promised that I would bring them out of Egypt to a land I had searched out especially for them—a land flowing with milk and honey, the most splendid land of all. '
  - type: note
    content: See Ex. 3:8; Lev. 18:3.
  '7':
  - type: text
    content: 'And I said to them, “Every one of you, get rid of the things you love that I hate. Don’t make yourselves unfit for my presence by worshiping the idols of Egypt. For I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God.” '
  '8':
  - type: text
    content: 'But they rebelled against me and refused to listen to me. Not one of them rejected the detestable things their eyes feasted on, nor did they give up the idols of Egypt. So in my anger, I decided to pour out my wrath on them and vent my anger against them in the midst of Egypt.’ '
  '9':
  - type: text
    content: 'I acted to protect the honor of my name, so that I would not be profaned in the eyes of the surrounding nations who saw me reveal myself by bringing the '
  - type: text
    content: Israelites
  - type: text
    content: ' out of Egypt.”'
  - type: heading
    content: Israel’s Disobedience in the Wilderness
