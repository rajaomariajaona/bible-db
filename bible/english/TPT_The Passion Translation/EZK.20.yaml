document_id: EZK.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Disobedience in Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezekiel 20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the sixth panel (F) in the chiastic parallel structure in Ezekiel. This section contains the declaration of the judgment against Israel and the promise of new covenant blessing and restoration. This section—panel F—constitutes the corresponding parallel with panel F
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which also contains a declaration of judgment against Israel, followed by the promise of new covenant blessing.'
      marker-yv: yv-n
    - type: text
      text: 'It was the seventh year, the fifth month, and the tenth day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: after our deportation to Babylon
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, August 14, 591 BC. The dating of this event would be four to five years before the destruction of the temple in Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Some of the elders of Israel came to request that I ask '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' for his message to them. As we sat together, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“So I brought them out of Egypt and led them into the desert. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I gave them my laws and taught them my commands, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers to the law given to Israel at Mount Sinai. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 18:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'so that they would follow them and live by them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I also gave them my Sabbaths as a sign between me and them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 31:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Sabbath was a unique sign of the covenant between God and Israel. There is no command to keep the Sabbath today for gentile believers. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 14:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'so that they might know that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', am the one who sets them apart as my own. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the Israelites rebelled against me in the wilderness and refused to keep my laws and rejected my commands (the one who obeys my laws will live by them), and they completely dishonored my Sabbaths. I was about to vent my fury on them in the desert and destroy them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: it
      children:
      - type: text
        text: But I chose to withhold my punishment
    - type: text
      text: ' for the sake of my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: holy
    - type: text
      text: ' name, that it not be profaned in the eyes of the nations who had seen my power in bringing the Israelites out of Egypt. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So, I made a vow in the desert that I would not bring that generation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “them.”
      marker-yv: yv-n
    - type: text
      text: 'into the most splendid land that I had given them, a land flowing with milk and honey. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For they had scorned my commands, refused to keep my laws, dishonored my Sabbaths, and their hearts were attached to idols. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: In spite of this, I took pity on them, so I spared them from destruction and did not make an end of them in the desert.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“I warned their children in the wilderness: ‘Do not follow the ways of your ancestors, do not practice their standard of justice, and do not defile yourselves with their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foul
    - type: text
      text: ' idols. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God. Keep my laws, obey my commands, and follow them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Keep my Sabbaths as holy days. Let them be a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: covenant
    - type: text
      text: '-sign between me and you, to remind you that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God.’'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“However, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like their parents
    - type: text
      text: ', the next generation rebelled against me; they refused to keep my laws and did not respect or practice my standard of justice so that they would follow my laws and live by them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 25:1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'They also dishonored my Sabbaths. So, in my fury I decided to punish them and pour out my anger on them in the desert. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But I restrained myself to protect the honor of my name so that I would not be profaned in the eyes of the surrounding nations who saw me reveal myself by bringing the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israelites
    - type: text
      text: ' out of Egypt. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moreover, I made a vow to them in the wilderness that I would scatter them throughout the nations and disperse them into foreign countries. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I did this
    - type: text
      text: ' because they had broken my laws, refused to obey my commands, dishonored my Sabbaths, and their hearts chased after the idols '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they fastened their eyes on the idols.”
      marker-yv: yv-n
    - type: text
      text: 'of their ancestors. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And for this reason I gave them laws and regulations that resulted in punishment, not life. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I gave them statutes that were not good and rules they could not keep to have life.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And because they sacrificed their firstborn children in the fire, I declared them defiled and unfit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to worship me
    - type: text
      text: '. I did this to fill them with revulsion so that they would know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Disobedience in Canaan
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Therefore, son of man, speak to the people of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in exile
    - type: text
      text: ' and say to them, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Here is another instance of your ancestors blaspheming me by their infidelity. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When I had brought them into the promised land, they discovered all sorts of high hills and all kinds of spreading trees. That is where they offered sacrifices and made offerings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to false gods
    - type: text
      text: ' that provoked my anger. That is where they burned incense and poured out drink offerings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to false gods
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So I asked them: What is this high place where you go?’ ” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse contains a significant paronomasia. The Hebrew term for “high place” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: bamah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) has a homonym that can be translated “where we go.” The Hebrew play on words, lost in translation, would not be missed by a Hebrew speaker.
      marker-yv: yv-n
    - type: text
      text: (So its name is called High Place to this day.)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Disobedience in Exile
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Son of man, give the elders of Israel this message: ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Are you really coming to consult with me? As surely as I live, I will tell you nothing. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“Say to the Israelites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in exile
    - type: text
      text: ', ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Will you defile yourselves in the same way your ancestors did and act like a prostitute with your idol worship? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For when you offer your gifts and sacrifice your children as sacrifices by fire, you defile yourselves with all your idol worship to this very day. Do you think you can come and consult with me? As surely as I live, I will not answer you. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken!'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“ ‘You are saying that you want to worship idols of wood and stone and be like the nations around you. But what you have in mind will never happen. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'As surely as I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', live, I warn you: I will continue to rule over you with a strong hand and with all my power and my wrath poured out!’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Another Exodus
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '“ ‘You have been scattered into many different nations and lands. But with a strong hand and my mighty power and outpoured wrath, I will bring you back. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'I will bring you into the desert of many nations, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely a reference to the Syrian desert or the Arabian desert, both of which are surrounded by other nations.
      marker-yv: yv-n
    - type: text
      text: 'and there I will enter into judgment '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shaphat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean either “to plead with” or “to execute judgment.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with you face-to-face! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Just as I entered into judgment with your ancestors in the wilderness of Sinai, so I now judge you. I am Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and I declare this to you. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'I will make you pass under the shepherd’s rod and take note of you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a shepherd sorts his sheep
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 27:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The metaphor of the shepherd’s rod may also include the notion of discipline.
      marker-yv: yv-n
    - type: text
      text: 'And I will bring you into the bond of the covenant. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “bond” of the covenant entails a mandatory obligation to obey the terms of the covenant.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'I will purge out the rebels from among you, those who sin against me. I will remove them from the land where they are exiled, but they will not enter the land of Israel. Then you will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
