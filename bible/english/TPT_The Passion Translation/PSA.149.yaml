document_id: PSA.149
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Triumphant Praise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hallelujah! Praise the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s time to sing to God a brand-new song
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 149:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a spontaneous song.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that all his holy people will hear how wonderful he is!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May Israel be enthused with joy because of him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and may the sons of Zion pour out
- type: usfm
  marker: q1
  children:
  - type: text
    text: their joyful praises to their King.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Break forth with dancing!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make music and sing God’s praises with the rhythm of drums!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For he enjoys his faithful lovers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He adorns the humble with his beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he loves to give them victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: His godly lovers triumph in the glory of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their joyful praises will rise even while others sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: God’s high and holy praises fill their mouths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their shouted praises are their weapons of war!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: These warring weapons will bring vengeance
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the nations and every resistant power—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: to bind kings with chains and rulers with iron shackles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Praise-filled warriors will enforce
- type: usfm
  marker: q1
  children:
  - type: text
    text: the judgment decreed against their enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the honor he gives to all his godly lovers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah! Praise the Lord!
