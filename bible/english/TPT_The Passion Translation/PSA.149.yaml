document_id: PSA.149,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Triumphant Praise
  - type: text
    content: Hallelujah! Praise the Lord!
  - type: text
    content: It’s time to sing to God a brand-new song
  - type: note
    content: Or “a spontaneous song.”
  - type: text
    content: so that all his holy people will hear how wonderful he is!
  '2':
  - type: text
    content: May Israel be enthused with joy because of him,
  - type: text
    content: and may the sons of Zion pour out
  - type: text
    content: their joyful praises to their King.
  '3':
  - type: text
    content: Break forth with dancing!
  - type: text
    content: Make music and sing God’s praises with the rhythm of drums!
  '4':
  - type: text
    content: For he enjoys his faithful lovers.
  - type: text
    content: He adorns the humble with his beauty,
  - type: text
    content: and he loves to give them victory.
  '5':
  - type: text
    content: His godly lovers triumph in the glory of God,
  - type: text
    content: and their joyful praises will rise even while others sleep.
  '6':
  - type: text
    content: God’s high and holy praises fill their mouths,
  - type: text
    content: for their shouted praises are their weapons of war!
  '7':
  - type: text
    content: These warring weapons will bring vengeance
  - type: text
    content: on the nations and every resistant power—
  '8':
  - type: text
    content: to bind kings with chains and rulers with iron shackles.
  '9':
  - type: text
    content: Praise-filled warriors will enforce
  - type: text
    content: the judgment decreed against their enemies.
  - type: text
    content: This is the honor he gives to all his godly lovers.
  - type: text
    content: Hallelujah! Praise the Lord!
