document_id: HOS.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel, a Deceitful Son
  - type: text
    content: 11:12
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ': '
  - type: note
    content: In the English Bible, v. 1 is included in ch. 11 as v. 12 . However, the Hebrew text labels the verse as 12:1 , and indeed, the content of the verse fits better in this context. Therefore, the translation team has placed this verse in ch. 12 for smoother reading while retaining the English notation. The team reminds the reader that verse and chapter numbers have been added to Scripture by translators and are not part of the inspired text.
  - type: text
    content: “All around me are the lies of Ephraim,
  - type: note
    content: Or “I am besieged [as with a surrounding army] with Ephraim’s lies.”
  - type: text
    content: and nothing Israel says can be trusted.
  - type: text
    content: 'Judah, '
  - type: text
    content: on the other hand
  - type: text
    content: ', still walks with God;'
  - type: text
    content: he remains faithful to the Holy One.
  - type: text
    content: 'Ephraim '
  - type: text
    content: follows fantasies
  - type: text
    content: ', like feeding on the wind.'
  - type: text
    content: They chase the desert wind all day long;
  - type: note
    content: Or “the east wind [off the desert],” which is a metaphor for Assyria. See Jer. 18:17 ; Ezek. 17:10 ; Hos. 13:15 .
  - type: text
    content: they multiply their lies and violence.
  - type: text
    content: They make a treaty with Assyria,
  - type: text
    content: and at the same time, they send a gift of olive oil to Egypt.”
  '10':
  - type: text
    content: “I am the One who speaks through the prophets,
  - type: text
    content: and reveals to them vision after vision.
  - type: text
    content: Through the ministry of prophets,
  - type: text
    content: I reveal my message in parables.”
  - type: note
    content: Or “oracles of doom.” Some Jewish commentators translate this as “I appeared under many guises.” Jesus’ preferred method of teaching was allegory (parables; see Matt. 13:34 ; Mark 4:34 ).
  '11':
  - type: text
    content: “Gilead is full of nothing but iniquity!
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: Therefore, its people will be wiped out.
  - type: text
    content: Do they sacrifice bulls in Gilgal?
  - type: text
    content: That is why I will make their altars
  - type: text
    content: nothing but heaps of stones
  - type: text
    content: on the furrows of the plowed fields.”
  '12':
  - type: text
    content: Jacob fled to the land of Aram,
  - type: note
    content: This is the land of Haran, where Abraham came from. See Gen. 27:41–45 .
  - type: text
    content: where Israel became a servant to win a wife.
  - type: text
    content: 'He took care of '
  - type: text
    content: another man’s sheep
  - type: text
    content: ' to pay the bride-price.'
  - type: note
    content: See Gen. 29:15–30 .
  '13':
  - type: text
    content: 'By a prophet, '
  - type: text
    content: Yahweh
  - type: text
    content: ' brought Israel out of Egypt;'
  - type: text
    content: 'By a prophet '
  - type: text
    content: named Moses
  - type: text
    content: ', he cared for his people, Israel.'
  - type: note
    content: God was reminding Israel of the many blessings that came to them through his prophets and urging them not to despise the prophets’ ministries. See 1 Thess. 5:20 .
  '14':
  - type: text
    content: But the people of Israel have provoked him to bitter anger.
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: will hold the Israelites responsible
  - type: text
    content: for the crimes of bloodshed they have committed.
  - type: note
    content: Or literally “and his bloods upon him he will leave.”
  - type: text
    content: Their master will make them pay
  - type: text
    content: for all the disgraceful things they have done.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' is bringing charges against Judah.'
  - type: text
    content: 'He will punish Jacob '
  - type: note
    content: Jacob was the ancestor of both the Northern and Southern Kingdoms, and his name is used here as a metonymy for the people of Israel.
  - type: text
    content: as his conduct deserves;
  - type: text
    content: he will repay the people for what they have done.
  '3':
  - type: text
    content: In his mother’s womb, Jacob grabbed his twin brother’s heel;
  - type: text
    content: when he grew to be a man, he struggled with God.
  - type: note
    content: See Gen. 32:24–30 .
  '4':
  - type: text
    content: He wrestled with the angel and won;
  - type: text
    content: he wept and sought his blessing.
  - type: note
    content: Or “favor.” The implication is that if God gave strength and endurance to Jacob to prevail in his wrestling match, wouldn’t God also give the Israelites strength to prevail without their having to turn to Egypt and Assyria for help?
  - type: text
    content: God met him at Bethel,
  - type: text
    content: and there he spoke to us.
  '5':
  - type: text
    content: Yes
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the God of Angel Armies.'
  - type: text
    content: Yahweh
  - type: text
    content: —remember his name!
  - type: heading
    content: Return to God
  '6':
  - type: text
    content: And you, to your God you must return.
  - type: text
    content: Stand guard over divine love and justice
  - type: text
    content: and always put your trust in him
  - type: text
    content: as you wait patiently for your God.
  - type: note
    content: The Hebrew can be translated as both “put your trust in your God” and “wait patiently for your God.” This translation includes both forms.
  '7':
  - type: text
    content: Israel
  - type: text
    content: ', you are like merchants '
  - type: note
    content: There is a play on words that is lost in translation. The word for “merchants” is also the word for “Canaanites.” Hosea was comparing the dishonesty of the Israelites to that of their pagan neighbors, the Canaanites. The implication is that the Israelites were acting as dishonestly as their cheating neighbors.
  - type: text
    content: using fraudulent scales.
  - type: text
    content: How you love to cheat your customers!
  '8':
  - type: text
    content: Ephraim boasts, “Look how rich I have become!
  - type: text
    content: I’ve made a fortune all by myself.
  - type: text
    content: There’s nothing wrong with the profits I have made.
  - type: text
    content: Is there anything sinful about that?”
  - type: note
    content: Or “In all that I have gained, I did not incur guilt.” There is a play on words with the word for “guilt” (Hb. ’on ), which has a homonym meaning “wealth.”
  '9':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have been your true God'
  - type: text
    content: ever since your days in Egypt.
  - type: text
    content: Yet, I will make you live in tents again
  - type: note
    content: That is, as punishment for their apostasy, Israel would be dislodged from their homes and live a nomadic life again in tents, as they did in their wilderness wandering.
  - type: text
    content: as you did when we first met in the Tent of Meeting.”
  - type: note
    content: See Ex. 33:7 .
