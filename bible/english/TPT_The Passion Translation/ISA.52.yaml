  - type: text
    content: For they will now see a sight unheard of,
  - type: text
    content: and things never considered before now fill their thoughts.”
  - type: note
    content: See Rom. 15:21. Verses 13–15 present Christ as an exalted King, a High Priest who cleanses, and a Prophet who reveals the secrets of God to men.
  '2':
  - type: text
    content: 'Arise and shake '
  - type: note
    content: The Hebrew word na’ar means “shaking out [of a lion’s mane]” or “shaking up and down” and is a homophone for “to growl [like a lion’s roar].” See Jer. 51:38.
  - type: text
    content: off your dust!
  - type: note
    content: This dust can also include our “dust nature” received from Adam (see 1 Cor. 15:47–49). We need to crucify it and be clothed with Christ. Part of Satan’s curse is that he was to eat dust (see Gen. 3:14). Whatever we withhold from God becomes food for the serpent. We must shake off (overcome) the “dust” of our old life and rise up in our new life, enthroned with Jesus Christ (see Rom. 8:30; Eph. 2:16; Rev. 3:21).
  - type: text
    content: Sit enthroned, Jerusalem!
  - type: text
    content: Break off your shackles of bondage from your neck,
