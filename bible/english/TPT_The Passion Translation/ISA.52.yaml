  - type: heading
    content: The Despised Servant
  '13':
  - type: text
    content: '“Look! My servant '
  - type: note
    content: This section of Isaiah is perhaps the greatest description of the life, crucifixion, and resurrection of our Lord Jesus Christ, apart from the four Gospels. Up to this point in Isaiah’s writings, the “Servant” has been described as the true Prophet, Teacher, and victorious Redeemer, with no hint whatsoever that his activity would be interrupted by death. But in this section we find him as the unparalleled Suffering Servant and Sin-Bearer who died for us. The prophecy found here is the most remarkable in all of the Old Testament of the sufferings of Jesus Christ and the glory that followed (see 1 Peter 1:11). Isaiah 52:13 through Isa. 53 is quoted in all four Gospels, Acts, Romans, and 1 Peter. It is the epicenter of the gospel.
  - type: text
    content: will prosper and succeed!
  - type: note
    content: Or “act wisely” or “prosper,” likely a metonymy for “succeed.”
  - type: text
    content: He will be highly honored, raised up, and greatly exalted!
  - type: note
    content: This is an obvious reference to God’s Servant-Savior, Jesus, who was raised from the dead and highly exalted at the right hand of God. See Phil. 2:5–11.
