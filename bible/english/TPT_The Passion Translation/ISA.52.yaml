        text: This section of Isaiah is perhaps the greatest description of the life, crucifixion, and resurrection of our Lord Jesus Christ, apart from the four Gospels. Up to this point in Isaiah’s writings, the “Servant” has been described as the true Prophet, Teacher, and victorious Redeemer, with no hint whatsoever that his activity would be interrupted by death. But in this section we find him as the unparalleled Suffering Servant and Sin-Bearer who died for us. The prophecy found here is the most remarkable in all of the Old Testament of the sufferings of Jesus Christ and the glory that followed (see
    - type: usfm
