  '15':
  - type: text
    content: 'so now he will startle '
  - type: note
    content: Or “sprinkle many nations” or “Many nations will marvel at him” (LXX). The words startle and sprinkle share a homonymic root. The idea is that Jesus would sprinkle to cleanse many with his redeeming blood and also that he would startle the nations with his resurrection power and endless life.
  - type: text
