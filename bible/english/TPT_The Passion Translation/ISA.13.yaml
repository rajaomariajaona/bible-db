document_id: ISA.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Pronouncement of Judgment on Babylon
  - type: text
    content: 'This is the prophecy against Babylon '
  - type: note
    content: This verse begins a new section of Isaiah (chs. 13–23) that contains ten prophecies against ten nations. Babylon (related to Babel) means “confusion” and points to the political and religious confusion and disorder among the nations. This prophecy against Babylon was spoken by Isaiah at least 174 years before Babylon fell in 536 BC. The Greek historian Herodotus described the city of Babylon as 15 miles (24.14 kilometers) wide on each side with walls that were more than 85 feet (25.91 meters) thick and 350 feet (106.68 meters) high. It had one hundred gates to the city and was the commercial center of the ancient Near East. In the book of Revelation, Babylon becomes a metaphor for the world’s political and religious system. See Isa. 46–47; Rev. 18.
  - type: text
    content: 'that God revealed to Isaiah, son of Amoz:'
  '10':
  - type: text
    content: For the stars of the heavens and their constellations
  - type: note
    content: Or “Orion.” See Joel 2:31; Amos 5:8; Matt. 24:29; Acts 2:20; Heb. 12:26–29. Stars may also be a metaphor for false teachers (see Judah [Jude] 13) and constellations a metaphor for fellowships (networks, denominations).
  - type: text
    content: will not give their light.
  - type: text
    content: The rising sun will be obscured, and the moon won’t shine.
  '11':
  - type: text
    content: “I will bring punishment to the world for its evil
  - type: text
    content: and to the wicked for their sins.
  - type: text
    content: I will shatter the arrogance of the proud,
  - type: text
    content: and will humble the pride of the high and mighty.
  - type: note
    content: Or “tyrants.”
  '12':
  - type: text
    content: I will make a person scarcer than fine gold
  - type: text
    content: and people rarer than a wedge of gold from Ophir.
  - type: note
    content: A region on the southern coast of Arabia.
  '13':
  - type: text
    content: Therefore, I will make the heavens shudder
  - type: text
    content: and the earth shake from its foundation
  - type: text
    content: because of the wrath of the Lord, Commander of Angel Armies,
  - type: text
    content: in the day of his fierce anger.
  '14':
  - type: text
    content: Like a hunted gazelle, each will return to his own people,
  - type: text
    content: and like sheep with no one to gather them,
  - type: text
    content: each will flee to his native land.
  '15':
  - type: text
    content: Captured ones will be slain,
  - type: text
    content: and those who are caught will die by the sword.
  '16':
  - type: text
    content: Their infants will be dashed to pieces
  - type: text
    content: before their very eyes.
  - type: note
    content: See Ps. 137:9.
  - type: text
    content: Their houses will be looted and their wives raped.
  - type: note
    content: See Zech. 14:2.
  '17':
  - type: text
    content: 'Behold! I am stirring up the Medes '
  - type: note
    content: The Medes were people who lived on the Zagros Mountains, in present-day central Iran.
  - type: text
    content: against them,
  - type: text
    content: who neither value silver nor delight in gold.
  '18':
  - type: text
    content: They will slaughter the young men,
  - type: note
    content: Or “With their bows they will strike down the young [men].”
  - type: text
    content: and show no pity on infants nor compassion on children.”
  '19':
  - type: text
    content: God will overthrow Babylon, the jewel of kingdoms,
  - type: text
    content: the splendor and pride of the Babylonians,
  - type: text
    content: exactly as he did to Sodom and Gomorrah.
  '2':
  - type: text
    content: “Raise high a signal flag on a barren hilltop! Shout out!
  - type: text
    content: 'Beckon my '
  - type: text
    content: armies
  - type: text
    content: ' to invade the gates of the nobles,'
  '20':
  - type: text
    content: Babylon will never rise again,
  - type: text
    content: nor will she be inhabited for many generations.
  - type: text
    content: Bedouins will not even pitch their tents there,
  - type: text
    content: and shepherds will refuse to rest their flocks there.
  '21':
  - type: text
    content: Wild animals will roam there,
  - type: text
    content: 'and their vacant houses will be overrun by eerie creatures '
  - type: note
    content: Or “wild dogs” or “hyenas.”
  - type: text
    content: —
  - type: text
    content: 'nothing but owls '
  - type: note
    content: Or “ostriches” or “skunks.”
  - type: text
    content: 'and goat-shaped demons '
  - type: note
    content: Or “satyrs.” (See Koehler and Baumgartner’s Lexicon in Veteris Testamenti Libros, Leiden, 1958, 926, and A Hebrew and English Lexicon of the Old Testament by Brown, Driver, and Briggs, 1980, 972.)
  - type: text
    content: dancing!
  '22':
  - type: text
    content: Hyenas will howl in her houses,
  - type: text
    content: and jackals will make their dens in her palaces.
  - type: text
    content: Babylon’s time is up, and her days are numbered!
  '3':
  - type: text
    content: for I have given orders to my consecrated ones.
  - type: text
    content: I have summoned my mighty heroes,
  - type: text
    content: those who rejoice in my triumph,
  - type: text
    content: that they may execute my anger.”
  - type: note
    content: These were God’s armies consecrated by him to carry out his judgment on Babylon. God was mustering his army from among the Medes to invade Babylon (see v. 17; 21:2).
  '4':
  - type: text
    content: Listen!
  - type: text
    content: ' A thunderous noise is heard on the mountain,'
  - type: text
    content: like that of a massive multitude.
  - type: text
    content: Listen!
  - type: text
    content: ' Kingdoms are in an uproar;'
  - type: text
    content: nations are assembling together.
  - type: text
    content: 'The almighty Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is mustering an army for war.'
  '5':
  - type: text
    content: They are coming from a faraway land,
  - type: text
    content: from the end of the heavens.
  - type: note
    content: Or possibly “horizon.” See Joel 2:1–10; 2 Thess. 1:7–10; Judah (Jude) 14–15. The heavenly sons and daughters of God are also consecrated ones, mighty ones, and warriors who rejoice in his triumph.
  - type: text
    content: Here comes
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' with his instruments of judgment,'
  - type: text
    content: ready to ravage the entire land.
  - type: note
    content: Or “all the earth.”
  '6':
  - type: text
    content: 'Wail, for the day of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near!'
  - type: text
    content: It will come with the destructive power of Shaddai.
  '7':
  - type: text
    content: For this reason, every hand will go limp
  - type: text
    content: and every heart will melt.
  '8':
  - type: text
    content: 'All '
  - type: text
    content: the Babylonians
  - type: text
    content: ' will be seized with panic and pain.'
  - type: text
    content: Anguish will grip them like a woman in labor.
  - type: text
    content: They will look at one another with astonishment,
  - type: text
    content: and their faces will be flames of fire!
  '9':
  - type: text
    content: Behold! The day of the Lord is coming
  - type: text
    content: with pitiless fury and fierce anger.
  - type: text
    content: The land will be made desolate,
  - type: text
    content: destroying the sinners who inhabit it.
