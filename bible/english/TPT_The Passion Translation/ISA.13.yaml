verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pronouncement of Judgment on Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the prophecy against Babylon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse begins a new section of Isaiah (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 13–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) that contains ten prophecies against ten nations.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Babylon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (related to Babel) means “confusion” and points to the political and religious confusion and disorder among the nations. This prophecy against Babylon was spoken by Isaiah at least 174 years before Babylon fell in 536 BC. The Greek historian Herodotus described the city of Babylon as 15 miles (24.14 kilometers) wide on each side with walls that were more than 85 feet (25.91 meters) thick and 350 feet (106.68 meters) high. It had one hundred gates to the city and was the commercial center of the ancient Near East. In the book of Revelation, Babylon becomes a metaphor for the world’s political and religious system. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Isa. 46–47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'that God revealed to Isaiah, son of Amoz:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the stars of the heavens and their constellations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Orion.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 24:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:26–29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Stars may also be a metaphor for false teachers (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judah [Jude] 13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and constellations a metaphor for fellowships (networks, denominations).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will not give their light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rising sun will be obscured, and the moon won’t shine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will bring punishment to the world for its evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to the wicked for their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will shatter the arrogance of the proud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will humble the pride of the high and mighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tyrants.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make a person scarcer than fine gold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and people rarer than a wedge of gold from Ophir.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A region on the southern coast of Arabia.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I will make the heavens shudder
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the earth shake from its foundation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of the wrath of the Lord, Commander of Angel Armies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the day of his fierce anger.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a hunted gazelle, each will return to his own people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and like sheep with no one to gather them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each will flee to his native land.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Captured ones will be slain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who are caught will die by the sword.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their infants will be dashed to pieces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before their very eyes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 137:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their houses will be looted and their wives raped.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 14:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold! I am stirring up the Medes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Medes were people who lived on the Zagros Mountains, in present-day central Iran.
      marker-yv: yv-n
    - type: text
      text: against them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who neither value silver nor delight in gold.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will slaughter the young men,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “With their bows they will strike down the young [men].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and show no pity on infants nor compassion on children.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will overthrow Babylon, the jewel of kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the splendor and pride of the Babylonians,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: exactly as he did to Sodom and Gomorrah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Raise high a signal flag on a barren hilltop! Shout out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Beckon my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: armies
    - type: text
      text: ' to invade the gates of the nobles,'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon will never rise again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will she be inhabited for many generations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bedouins will not even pitch their tents there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and shepherds will refuse to rest their flocks there.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild animals will roam there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and their vacant houses will be overrun by eerie creatures '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wild dogs” or “hyenas.”
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nothing but owls '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ostriches” or “skunks.”
      marker-yv: yv-n
    - type: text
      text: 'and goat-shaped demons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “satyrs.” (See Koehler and Baumgartner’s
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lexicon in Veteris Testamenti Libros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Leiden, 1958, 926, and'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: A Hebrew and English Lexicon of the Old Testament
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: by Brown, Driver, and Briggs, 1980, 972.)
      marker-yv: yv-n
    - type: text
      text: dancing!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hyenas will howl in her houses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and jackals will make their dens in her palaces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon’s time is up, and her days are numbered!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have given orders to my consecrated ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have summoned my mighty heroes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who rejoice in my triumph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that they may execute my anger.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were God’s armies consecrated by him to carry out his judgment on Babylon. God was mustering his army from among the Medes to invade Babylon (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Listen!
    - type: text
      text: ' A thunderous noise is heard on the mountain,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like that of a massive multitude.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Listen!
    - type: text
      text: ' Kingdoms are in an uproar;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nations are assembling together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The almighty Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is mustering an army for war.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are coming from a faraway land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the end of the heavens.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or possibly “horizon.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Thess. 1:7–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judah (Jude) 14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The heavenly sons and daughters of God are also consecrated ones, mighty ones, and warriors who rejoice in his triumph.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Here comes
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' with his instruments of judgment,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to ravage the entire land.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “all the earth.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wail, for the day of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is near!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will come with the destructive power of Shaddai.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For this reason, every hand will go limp
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every heart will melt.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Babylonians
    - type: text
      text: ' will be seized with panic and pain.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish will grip them like a woman in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will look at one another with astonishment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their faces will be flames of fire!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold! The day of the Lord is coming
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with pitiless fury and fierce anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land will be made desolate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: destroying the sinners who inhabit it.
