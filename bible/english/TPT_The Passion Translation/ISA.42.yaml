      children:
      - type: text
        text: Or “A bruised [bent-over] reed.” A reed can be seen as a biblical metaphor for the feebleness of humanity. Jesus, God’s Servant, is extraordinarily gentle. Rather than break weak ones, he restores and heals them. See
