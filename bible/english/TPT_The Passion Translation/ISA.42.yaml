document_id: ISA.42,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Servant
  - type: text
    content: “Take a good look at my servant!
  - type: note
    content: 'Here we are introduced to the Lord Jesus, the Messiah, as the Chosen Servant of the Lord, sustained by Yahweh, sent on a divine mission to bring light and freedom to the hearts of his covenant people. Starting with ch. 42, Isaiah gave us four Servant Songs: (1) This chapter presents Jesus as the Faithful Servant who brings light to the nations. (2) In Isa. 49:1–13 he is the Chosen Servant to bring salvation to the nations and to restore Israel. (3) In Isa. 50:4–9, we have the song of the Obedient Servant who reveals the Father. (4) In Isa. 52:13–53:12 we find him as Suffering Servant. See also Matt. 12:18–21.'
  - type: text
    content: 'I love him dearly, '
  - type: note
    content: Or “I find all my delight in him.” See Matt. 3:17.
  - type: text
    content: for he is my chosen one.
  - type: text
    content: I have taken hold of him in my strength,
  - type: note
    content: Or “whom I uphold [by my strength].”
  - type: text
    content: and I have clothed him with my Spirit.
  - type: note
    content: Or “placed my Spirit upon him.”
  - type: text
    content: He will cause justice to spring up for the nations.
  '10':
  - type: text
    content: 'Sing to '
  - type: text
    content: Yahweh
  - type: text
    content: ' a brand-new song!'
  - type: note
    content: Every new thing God does requires a new song to declare it. See Rev. 5:9.
  - type: text
    content: 'Sing his praise '
  - type: text
    content: until it echoes
  - type: text
    content: ' from the ends of the earth!'
  - type: text
    content: Sailors and sea creatures, praise him!
  - type: text
    content: Islands and all their inhabitants, sing his praise!
  '11':
  - type: text
    content: Let the desert and its villages lift their voices in praise!
  - type: text
    content: 'Let the '
  - type: text
    content: tent
  - type: text
    content: ' villages of Kedar '
  - type: note
    content: Kedar was a son of Ishmael (see Gen. 25:13), and his tribe were considered nomads. Kedar can also be seen as a metaphor for the old nature.
  - type: text
    content: shout their praises!
  - type: text
    content: 'Let the residents of Sela’s cliffs '
  - type: note
    content: Sela means “rock” (Song. 2:14). Sela was once the capitol of Edom.
  - type: text
    content: shout with glee,
  - type: text
    content: with a celebration shout from the mountaintops!
  - type: note
    content: See Song. 4:8.
  '12':
  - type: text
    content: 'Let them give '
  - type: text
    content: Yahweh
  - type: text
    content: ' the glorious praise he deserves'
  - type: text
    content: and declare his praise in the islands!
  - type: heading
    content: Our Hero-God
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' goes out to battle like a hero'
  - type: note
    content: As he carried our cross, Jesus went out from Jerusalem as a hero to conquer our foes.
  - type: text
    content: and stirs up his passion and zeal like a mighty warrior.
  - type: text
    content: Yes, his God-shout is a mighty battle cry;
  - type: text
    content: 'he will triumph heroically over '
  - type: text
    content: all
  - type: text
    content: ' his foes.'
  - type: note
    content: Or “he shows himself superior to his enemies.” Every spiritual enemy is conquered by the Son of God—even death.
  '14':
  - type: text
    content: For a long time, I said nothing.
  - type: note
    content: Or “I have been silent. Should I remain silent forever and hold my peace?” (LXX).
  - type: text
    content: I restrained myself and kept silent.
  - type: text
    content: Now I will groan, pant, and gasp like a woman in labor.
  '15':
  - type: text
    content: I will level their hills and mountains
  - type: note
    content: Hills and mountains are frequently used as metaphors for governments, nations, and kingdoms.
  - type: text
    content: and dry up all their vegetation.
  - type: text
    content: I will turn rivers into islands and dry up their lakes.
  '16':
  - type: text
    content: 'I will walk '
  - type: note
    content: See John 16:13; Rom. 8:14.
  - type: text
    content: the blind by an unknown way
  - type: note
    content: See Josh. 3:4; John 14:6; Heb. 10:19–22.
  - type: text
    content: and guide them on paths they’ve never traveled.
  - type: text
    content: I will smooth their difficult road
  - type: note
    content: This can be seen as a metaphor for God changing our hearts and removing obstacles so we can walk with him. No obstacle within us will prevent God from accomplishing his plan.
  - type: text
    content: 'and make their dark '
  - type: text
    content: mysteries
  - type: text
    content: ' bright with light.'
  - type: note
    content: Darkness is a frequent biblical metaphor for ignorance and light for understanding (revelation-light).
  - type: text
