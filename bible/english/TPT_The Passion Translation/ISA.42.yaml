    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'These first four verses give us the qualifications for ministry: (1) chosen and anointed by God, (2) committed to reach the unreached, (3) gentle and compassionate, and (4) not discouraged but having unfailing courage.'
