  - type: text
    content: .
  - type: note
    content: See Matt. 28:18–20; Heb. 13:5.
  '17':
  - type: text
    content: But those who trust in idols,
  - type: text
    content: who say to their metal images,
  - type: text
    content: “You are our gods,”
