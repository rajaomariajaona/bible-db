    content: will be turned aside in total disgrace.
  - type: note
    content: Or “in shame you will be ashamed.”
  - type: heading
    content: Blind and Deaf to Truth
  '18':
  - type: text
    content: Hear me, you deaf! Look up, you blind, and see!
  '19':
  - type: text
    content: 'Who is as blind as my servant '
  - type: text
    content: Israel
  - type: text
    content: or as deaf as the messenger I send?
  - type: note
    content: Israel was given a divine mission to serve God and his purposes. The nation was to become his messenger. See Rom. 11.
  - type: text
    content: Who is as blind as my covenant friend,
  - type: text
    content: 'as blind as '
  - type: text
    content: Yahweh
  - type: text
    content: ’s servant?
  '2':
  - type: text
    content: He will be gentle and will not quarrel with others in public.
  - type: text
    content: He will not exalt his own voice.
  '20':
  - type: text
    content: Israel
  - type: text
    content: ', you have seen so much, but you don’t get it!'
  - type: text
    content: 'You have been taught so much, '
  - type: note
    content: Or “You have ears to hear.”
  - type: text
    content: but what did you really hear?
  - type: note
    content: See Prov. 28:9.
  '21':
  - type: text
    content: For the sake of his righteousness,
  - type: text
    content: Yahweh
  - type: text
    content: ' was eager to exalt his law and make it glorious.'
  - type: note
    content: Or “it pleased Yahweh to praise his justice and make his law glorious.”
  '22':
  - type: text
    content: But this is a people plundered and robbed,
  - type: text
    content: trapped in holes and hidden in houses of bondage.
  - type: note
    content: Or “prisons.” This section (vv. 18–25) deals with God’s people in bondage. Judah was held captive in Babylon; the church is held captive to religious systems and to concepts from which Jesus came to set us free (see Gal. 4:3, 8). We must always be careful to hear and see and, with hearts open to God, receive the new thing God is doing on the earth today. Jesus was blind and deaf to doing anything other than the will of his Father. God is still restoring his church and making us like Christ, free and full of new life.
  - type: text
    content: They are like prey that no one will rescue,
  - type: text
    content: like spoil with no one to say, “Bring them back!”
  '23':
  - type: text
    content: Doesn’t anyone understand this?
  - type: text
    content: Will any of you pay attention to this in the future?
  '24':
  - type: text
    content: Who gave up Jacob to looters and Israel to robbers?
  - type: text
    content: 'It was '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself, against whom we sinned'
  - type: text
    content: by not walking in holy ways nor heeding holy words.
  '25':
  - type: text
    content: So he poured out the heat of his anger
  - type: text
    content: 'and '
  - type: text
    content: they suffered
  - type: text
    content: ' the fury of war.'
  - type: text
    content: His anger enveloped them in flames,
  - type: text
    content: but they still did not understand—
  - type: text
    content: consumed by fire yet they did not take it to heart.
  '3':
  - type: text
    content: He would never crush a broken heart
  - type: note
    content: Or “A bruised [bent-over] reed.” A reed can be seen as a biblical metaphor for the feebleness of humanity. Jesus, God’s Servant, is extraordinarily gentle. Rather than break weak ones, he restores and heals them. See Matt. 12:20.
  - type: text
    content: nor disregard the weak and vulnerable.
  - type: note
    content: Or “nor extinguish a smoldering candle [those whose light and faith is growing dim].”
  - type: text
    content: He will make sure justice comes to those who are wronged.
  '4':
  - type: text
    content: 'His '
  - type: text
    content: inner being
  - type: text
    content: ' will not become faint or discouraged,'
  - type: text
    content: 'nor will '
  - type: text
    content: his light
  - type: text
    content: ' grow dim before he establishes justice on the earth.'
  - type: text
    content: Even the distant lands beyond the seas
  - type: text
    content: will hunger for his instruction.”
  - type: note
    content: 'These first four verses give us the qualifications for ministry: (1) chosen and anointed by God, (2) committed to reach the unreached, (3) gentle and compassionate, and (4) not discouraged but having unfailing courage.'
  '5':
  - type: text
