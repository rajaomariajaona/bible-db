document_id: JER.52,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king. He reigned for eleven years in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah, of Libnah. '
  - type: note
    content: Libnah, a town in Judah, was on the border between Judah and Philistia.
  '10':
  - type: text
    content: 'Nebuchadnezzar had Zedekiah’s sons slaughtered at Riblah, and Zedekiah was forced to watch their execution. The king of Babylon also executed all the officials of Judah. '
  '11':
  - type: text
    content: 'Then he put out Zedekiah’s eyes and bound him with chains. Then they dragged him off blinded to '
  - type: text
    content: distant
  - type: text
    content: ' Babylon and put him in prison till the day of his death.'
  - type: heading
    content: The Destruction of the Temple
  '12':
  - type: text
    content: 'In the nineteenth year that Nebuchadnezzar was king of Babylon, on the tenth day of the fifth month of that year, the field general '
  - type: note
    content: Or “the chief executioner.”
  - type: text
    content: 'Nebuzaradan, who served the king, entered Jerusalem. '
  '13':
  - type: text
    content: 'He burned down the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the royal palace, and all the homes of the wealthy of Jerusalem, and other buildings went up in flames. '
  '14':
  - type: text
    content: The Babylonians under the command of Nebuzaradan demolished all the walls surrounding Jerusalem.
  '15':
  - type: text
    content: 'Nebuzaradan, the field general, took as prisoners some of the poor who were left behind in Jerusalem, together with the skilled workers and the deserters who had gone over to him. '
  '16':
  - type: text
    content: But he also left behind some of the extremely poor people in the land of Judah. They owned nothing, but he gave them vineyards and fields of their own.
  '17':
  - type: text
    content: 'The Babylonians '
  - type: text
    content: took everything of value
  - type: text
    content: ' from the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: '. They smashed the bronze pillars and confiscated the wheeled stands and the bronze laver. Everything made of bronze they carried off to Babylon. '
  '18':
  - type: text
    content: 'They also took the ash pots, the shovels, the snuffers, the sprinkling bowls, the incense bowls, and all the bronze vessels that had been used in worship. '
  '19':
  - type: text
    content: 'The field general took away every small bowl, the censers, '
  - type: note
    content: That is, fire pans used for carrying live coals.
  - type: text
    content: 'the sprinkling bowls, the ash containers, the lampstands, the ladles, and the saucers '
  - type: note
    content: Or “bowls used for pouring out wine offerings.”
  - type: text
    content: '—everything that was made of gold or silver. '
  '2':
  - type: text
    content: 'He did what was displeasing in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: ', just as King Jehoiakim had done. '
  '20':
  - type: text
    content: 'But the two pillars, the one sea and the twelve bronze bulls on their movable stands, which King Solomon had made for the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ', were too heavy to weigh. '
  '21':
  - type: text
    content: 'Both pillars were identical, and each stood eighteen cubits high. '
  - type: note
    content: This is about twenty-seven feet (eight meters).
  - type: text
    content: 'Their circumference was twelve cubits, '
  - type: note
    content: About eighteen feet (five meters).
  - type: text
    content: 'and they were four fingers thick '
  - type: note
    content: About three inches (eight centimeters).
  - type: text
    content: 'and hollow inside. '
  '22':
  - type: text
    content: 'On top of each column was a large section of bronze; its height was over five cubits, '
  - type: note
    content: About seven feet (two meters).
  - type: text
    content: 'and all around it were filigree and pomegranates, all in bronze. '
  '23':
  - type: text
    content: There was a total of one hundred pomegranates on the filigree all around, and ninety-six were visible from the ground.
  - type: heading
    content: The People of Judah Deported to Babylon
  '24':
  - type: text
    content: Nebuzaradan
  - type: text
    content: ', the field general, arrested Seraiah the chief priest, Zephaniah the priest next in rank, '
  - type: note
    content: That is, he was next in line to be the high priest.
  - type: text
    content: 'and other temple officials. '
  - type: note
    content: Or “the three guardians of the threshold.”
  '25':
  - type: text
    content: 'In the city he arrested an official who was in command of the fighting men, seven of the king’s closest associates, '
  - type: note
    content: Or “seven men who saw the king’s face.”
  - type: text
    content: 'who were discovered in the city, the secretary to the army commander responsible for mustering the troops, and sixty men of distinction. '
  '26':
  - type: text
    content: 'The field general took these men and brought them to the king of Babylon at Riblah. '
  '27':
  - type: text
    content: At Riblah, in the territory of Hamath, the king of Babylon had them executed. And so, the people of Judah were taken into exile.
  '28':
  - type: text
    content: 'Here is the record of the number of those deported by Nebuchadnezzar in the seventh year of his reign: '
  - type: note
    content: That is, 598–597 BC. Verses 28–30 refer to three separate groups of exiles. The first group was taken away with King Jehoiachin, the second at the end of Zedekiah’s reign, and the third some years later.
  - type: text
    content: '3,023 men from Judah. '
  '29':
  - type: text
    content: 'In the eighteenth year of Nebuchadnezzar’s reign, '
  - type: note
    content: That is, 587–586 BC.
  - type: text
    content: 'he deported 832 persons from Jerusalem. '
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' became so angry with the people of Jerusalem and Judah that he banished them from the land.'
  - type: note
    content: Or “drove them from before his face.”
  - type: text
    content: 'Zedekiah rebelled against the king of Babylon. '
  '30':
  - type: text
    content: 'In the twenty-third year of Nebuchadnezzar’s reign, '
  - type: note
    content: That is, 582–581 BC.
  - type: text
    content: Nebuzaradan, the field general, deported 745 Judeans. In all, 4,600 persons were deported.
  - type: note
    content: This total number is much smaller than the number listed in 2 Kings 24:14–16. The common explanation is that the numbers listed here are only the men while the numbers listed in 2 Kings included women and children.
  '31':
  - type: text
    content: 'Thirty-seven years after King Jehoiachin was taken away as a prisoner, on the twenty-fifth day of the twelfth month of that year, King Evil-merodach '
  - type: note
    content: Evil-merodach means “Man of [the god] Marduk.”
  - type: text
    content: 'of Babylon showed kindness to Jehoiachin by releasing him from prison. This was in Evil-merodach’s first year as king. '
  '32':
  - type: text
    content: 'The king of Babylon treated Jehoiachin kindly and gave him a position of honor above the other kings. '
  '33':
  - type: text
    content: 'So Jehoiachin laid aside his prison clothes and, for the rest of his life, always ate at the king’s table. '
  '34':
  - type: text
    content: At the command of the king of Babylon, everything that he needed was given to him each day until his death.
  '4':
  - type: text
    content: 'In the ninth year of Zedekiah’s reign, on the tenth day of the tenth month, Nebuchadnezzar king of Babylon attacked Jerusalem with his entire army and laid siege to it. '
  - type: note
    content: Jerusalem fell in July of 586 BC. Since the months of the year would have been counted from spring (March/April), the siege of Jerusalem began in January two years before.
  '5':
  - type: text
    content: 'After the city had been surrounded for a year and half, '
  - type: note
    content: Or “After Zedekiah had been king ten years, on the ninth day of the fourth month,” which was equal to about a year and half of the siege of Jerusalem.
  - type: text
    content: 'they broke through the city walls. '
  - type: note
    content: Chapter 39 also gives a detailed account of the fall of Jerusalem. After the fall of the city (see 39:1–3), Zedekiah was captured and punished (see 39:4–10). See also 2 Kings 25:1–12.
  '6':
  - type: text
    content: 'On the ninth day of the fourth month, the famine was so severe in the city that there was nothing left to eat. '
  '7':
  - type: text
    content: 'That was when the Babylonians broke through the city wall. That same night, Zedekiah and his soldiers tried to escape through the gate between the two walls near the royal garden even though they knew the enemy had the city surrounded. They fled toward the Jordan Valley, '
  '8':
  - type: text
    content: 'but the Babylonians pursued King Zedekiah and overtook him in the plains of Jericho. All his army deserted him there and fled. '
  '9':
  - type: text
    content: 'The Babylonians captured him and brought him to King '
  - type: text
    content: Nebuchadnezzar
  - type: text
    content: ', who was '
  - type: text
    content: based at the town of
  - type: text
    content: ' Riblah in the territory of Hamath, '
  - type: note
    content: Riblah was on the Orontes River north of Israel in Syria. Hamath was an important town also located on the Orontes River.
  - type: text
    content: 'where he passed sentence on Zedekiah. '
