document_id: JER.52,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king. He reigned for eleven years in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah, of Libnah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Libnah, a town in Judah, was on the border between Judah and Philistia.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nebuchadnezzar had Zedekiah’s sons slaughtered at Riblah, and Zedekiah was forced to watch their execution. The king of Babylon also executed all the officials of Judah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then he put out Zedekiah’s eyes and bound him with chains. Then they dragged him off blinded to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: distant
    - type: text
      text: ' Babylon and put him in prison till the day of his death.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of the Temple
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In the nineteenth year that Nebuchadnezzar was king of Babylon, on the tenth day of the fifth month of that year, the field general '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the chief executioner.”
      marker-yv: yv-n
    - type: text
      text: 'Nebuzaradan, who served the king, entered Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He burned down the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the royal palace, and all the homes of the wealthy of Jerusalem, and other buildings went up in flames. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The Babylonians under the command of Nebuzaradan demolished all the walls surrounding Jerusalem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nebuzaradan, the field general, took as prisoners some of the poor who were left behind in Jerusalem, together with the skilled workers and the deserters who had gone over to him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But he also left behind some of the extremely poor people in the land of Judah. They owned nothing, but he gave them vineyards and fields of their own.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The Babylonians '
    - type: usfm
      marker: it
      children:
      - type: text
        text: took everything of value
    - type: text
      text: ' from the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. They smashed the bronze pillars and confiscated the wheeled stands and the bronze laver. Everything made of bronze they carried off to Babylon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They also took the ash pots, the shovels, the snuffers, the sprinkling bowls, the incense bowls, and all the bronze vessels that had been used in worship. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The field general took away every small bowl, the censers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, fire pans used for carrying live coals.
      marker-yv: yv-n
    - type: text
      text: 'the sprinkling bowls, the ash containers, the lampstands, the ladles, and the saucers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bowls used for pouring out wine offerings.”
      marker-yv: yv-n
    - type: text
      text: '—everything that was made of gold or silver. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He did what was displeasing in the sight of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', just as King Jehoiakim had done. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But the two pillars, the one sea and the twelve bronze bulls on their movable stands, which King Solomon had made for the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', were too heavy to weigh. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Both pillars were identical, and each stood eighteen cubits high. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is about twenty-seven feet (eight meters).
      marker-yv: yv-n
    - type: text
      text: 'Their circumference was twelve cubits, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About eighteen feet (five meters).
      marker-yv: yv-n
    - type: text
      text: 'and they were four fingers thick '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About three inches (eight centimeters).
      marker-yv: yv-n
    - type: text
      text: 'and hollow inside. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On top of each column was a large section of bronze; its height was over five cubits, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About seven feet (two meters).
      marker-yv: yv-n
    - type: text
      text: 'and all around it were filigree and pomegranates, all in bronze. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: There was a total of one hundred pomegranates on the filigree all around, and ninety-six were visible from the ground.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People of Judah Deported to Babylon
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nebuzaradan
    - type: text
      text: ', the field general, arrested Seraiah the chief priest, Zephaniah the priest next in rank, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, he was next in line to be the high priest.
      marker-yv: yv-n
    - type: text
      text: 'and other temple officials. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the three guardians of the threshold.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'In the city he arrested an official who was in command of the fighting men, seven of the king’s closest associates, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “seven men who saw the king’s face.”
      marker-yv: yv-n
    - type: text
      text: 'who were discovered in the city, the secretary to the army commander responsible for mustering the troops, and sixty men of distinction. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The field general took these men and brought them to the king of Babylon at Riblah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: At Riblah, in the territory of Hamath, the king of Babylon had them executed. And so, the people of Judah were taken into exile.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Here is the record of the number of those deported by Nebuchadnezzar in the seventh year of his reign: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, 598–597 BC. Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: refer to three separate groups of exiles. The first group was taken away with King Jehoiachin, the second at the end of Zedekiah’s reign, and the third some years later.
      marker-yv: yv-n
    - type: text
      text: '3,023 men from Judah. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'In the eighteenth year of Nebuchadnezzar’s reign, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, 587–586 BC.
      marker-yv: yv-n
    - type: text
      text: 'he deported 832 persons from Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' became so angry with the people of Jerusalem and Judah that he banished them from the land.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “drove them from before his face.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah rebelled against the king of Babylon. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'In the twenty-third year of Nebuchadnezzar’s reign, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, 582–581 BC.
      marker-yv: yv-n
    - type: text
      text: Nebuzaradan, the field general, deported 745 Judeans. In all, 4,600 persons were deported.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This total number is much smaller than the number listed in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 24:14–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The common explanation is that the numbers listed here are only the men while the numbers listed in 2 Kings included women and children.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Thirty-seven years after King Jehoiachin was taken away as a prisoner, on the twenty-fifth day of the twelfth month of that year, King Evil-merodach '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Evil-merodach
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “Man of [the god] Marduk.”
      marker-yv: yv-n
    - type: text
      text: 'of Babylon showed kindness to Jehoiachin by releasing him from prison. This was in Evil-merodach’s first year as king. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The king of Babylon treated Jehoiachin kindly and gave him a position of honor above the other kings. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So Jehoiachin laid aside his prison clothes and, for the rest of his life, always ate at the king’s table. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: At the command of the king of Babylon, everything that he needed was given to him each day until his death.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In the ninth year of Zedekiah’s reign, on the tenth day of the tenth month, Nebuchadnezzar king of Babylon attacked Jerusalem with his entire army and laid siege to it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jerusalem fell in July of 586 BC. Since the months of the year would have been counted from spring (March/April), the siege of Jerusalem began in January two years before.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After the city had been surrounded for a year and half, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “After Zedekiah had been king ten years, on the ninth day of the fourth month,” which was equal to about a year and half of the siege of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'they broke through the city walls. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Chapter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also gives a detailed account of the fall of Jerusalem. After the fall of the city (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), Zedekiah was captured and punished (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:4–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'On the ninth day of the fourth month, the famine was so severe in the city that there was nothing left to eat. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'That was when the Babylonians broke through the city wall. That same night, Zedekiah and his soldiers tried to escape through the gate between the two walls near the royal garden even though they knew the enemy had the city surrounded. They fled toward the Jordan Valley, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'but the Babylonians pursued King Zedekiah and overtook him in the plains of Jericho. All his army deserted him there and fled. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The Babylonians captured him and brought him to King '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nebuchadnezzar
    - type: text
      text: ', who was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: based at the town of
    - type: text
