document_id: HOS.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hosea Prophesies against Israel’s Pagan Altars
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Israel was once like a lush vine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that produced plenty of grapes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet the more his fruit increased,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the more pagan altars he built.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The more abundantly his land increased,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the more abundant were his sacred fertility pillars.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When I am ready, I will discipline these wayward people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and armies will be gathered against them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to put them in bonds for their double sins.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “It was my desire to tame/break them in, binding together the peoples for double furrows [i.e., an extra-wide, double-blade plow].”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “Ephraim was once obedient like a well-trained cow'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that loved to thresh the grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seeing her fair neck,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought I would put Ephraim in the yoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah will have to plow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob must level the soil.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ephraim represents the Northern Kingdom, Judah the Southern Kingdom, and Jacob the entire nation.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seeds
    - type: text
      text: ' of righteousness for yourselves,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and you will reap a harvest of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' unending love.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The harvest of the Spirit is love (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:22–23
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There is so much grace in the Old Testament, and grace is still broadcasting from God’s heart every day. He is the God of love, mercy, and grace. He has always been the same from the beginning. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 3:6
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:8
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James (Jacob) 1:17
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break up the hard, fallow ground of your heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This sentence seems to be out of order, for breaking up the fallow ground should precede sowing and reaping. However, the text implies that it is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: new
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ground that must be taken. In other words, the process of sowing, reaping, and harvesting must continue while still looking to find new ground that needs the righteousness of God planted within it. The ground is an obvious metaphor for the human heart, for we are made from the soil. The heart must pursue righteousness and reap unending love as well as break up new ground that may be hidden in our lives.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For it is time to seek '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s favor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until he comes to pour out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: righteousness on you like falling rain.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Righteousness is a gift that God pours out from heaven; it is not a result of our striving. The key to biblical spirituality is receptivity. And this is the reason we need to plow up the hard places in our hearts.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But instead, you have cultivated lawlessness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and reaped a harvest of injustice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have eaten the fruit of your lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have trusted in your own strength
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in your own way” or, if the text is emended, “your [many] chariots” (also LXX). However, Israel was not known for many chariots, compared to Egypt and Assyria.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and in your vast, mighty army,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: war cries will break out against your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all your fortified cities will be destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as Shalman destroyed Beth Arbel on the day of battle,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a reference to the Moabite king, Salamanu, and his destruction of Beth Arbel (Irbid) in Gilead. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '2 Kings 15:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when children and their mothers were dashed to death on the ground,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: so it will be done to you, Bethel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “house of Israel” (LXX).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of your evil stacked upon evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At dawn, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as the battle begins
    - type: text
      text: ', your kingship will be no more.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The last king of Israel was Hoshea, and he was taken captive by the Assyrians even before they began their siege against Samaria (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '2 Kings 17:4–6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Israel’s devotion is false '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “slippery.”
      marker-yv: yv-n
    - type: text
      text: and divided;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soon the people must pay the penalty for their guilt.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
      - type: text
        text: ' '
    - type: text
      text: will demolish their altars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and shatter their sacred pillars.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then they will say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have lost our king
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because we have not feared '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but what could a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: human
    - type: text
      text: ' king do for us anyway?”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: All they do is make empty speeches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: phony promises, and useless treaties.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their so-called justice spreads like poisonous weeds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: among the furrows of the fields.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 6:12
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Sins at Bethel
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Samaria’s citizens will tremble and mourn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: over the loss of their sacred calves of Bethel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Beth Aven,” a derisive term for Bethel.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bethel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means the “house of God.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beth Aven
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the house of evil.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone will wail over its loss
  - type: usfm
    marker: q1
    children:
    - type: text
      text: along with their idolatrous priests
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because their “glory” has gone into exile.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' will carry the calf-idol to Assyria'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as tribute to the great king.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim will reap the shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a disgrace for Israel!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Samaria—your king has had his day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your king will disappear
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a twig on the surface of the waters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like a [wood] chip on the surface of the waters” (LXX).
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The hilltop shrines, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Beth Aven [house of evil].” See the footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:5
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the vanity and sin of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be demolished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thorns and thistles will overgrow and cover their altars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will say to the mountains, “Bury us!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to the hills, “Fall on us!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Israel, since the days of Gibeah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, when Israel’s monarchy got started. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '1 Sam. 8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have not stopped sinning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From then until now, you have persisted in your ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Were not the evildoers overtaken by war in Gibeah?
