document_id: HOS.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Hosea Prophesies against Israel’s Pagan Altars
  - type: text
    content: Israel was once like a lush vine
  - type: text
    content: that produced plenty of grapes.
  - type: text
    content: Yet the more his fruit increased,
  - type: text
    content: the more pagan altars he built.
  - type: text
    content: The more abundantly his land increased,
  - type: text
    content: the more abundant were his sacred fertility pillars.
  '10':
  - type: text
    content: When I am ready, I will discipline these wayward people,
  - type: text
    content: and armies will be gathered against them
  - type: text
    content: to put them in bonds for their double sins.”
  - type: note
    content: Or “It was my desire to tame/break them in, binding together the peoples for double furrows [i.e., an extra-wide, double-blade plow].”
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Ephraim was once obedient like a well-trained cow'
  - type: text
    content: that loved to thresh the grain.
  - type: text
    content: Seeing her fair neck,
  - type: text
    content: I thought I would put Ephraim in the yoke.
  - type: text
    content: Judah will have to plow;
  - type: text
    content: Jacob must level the soil.
  - type: note
    content: Ephraim represents the Northern Kingdom, Judah the Southern Kingdom, and Jacob the entire nation.
  '12':
  - type: text
    content: 'Sow '
  - type: text
    content: seeds
  - type: text
    content: ' of righteousness for yourselves,'
  - type: text
    content: 'and you will reap a harvest of '
  - type: text
    content: God’s
  - type: text
    content: ' unending love.'
  - type: note
    content: The harvest of the Spirit is love (see Gal. 5:22–23 ). There is so much grace in the Old Testament, and grace is still broadcasting from God’s heart every day. He is the God of love, mercy, and grace. He has always been the same from the beginning. See Mal. 3:6 ; Heb. 13:8 ; James (Jacob) 1:17 .
  - type: text
    content: Break up the hard, fallow ground of your heart.
  - type: note
    content: This sentence seems to be out of order, for breaking up the fallow ground should precede sowing and reaping. However, the text implies that it is new ground that must be taken. In other words, the process of sowing, reaping, and harvesting must continue while still looking to find new ground that needs the righteousness of God planted within it. The ground is an obvious metaphor for the human heart, for we are made from the soil. The heart must pursue righteousness and reap unending love as well as break up new ground that may be hidden in our lives.
  - type: text
    content: 'For it is time to seek '
  - type: text
    content: Yahweh
  - type: text
    content: ’s favor
  - type: text
    content: until he comes to pour out
  - type: text
    content: righteousness on you like falling rain.
  - type: note
    content: Righteousness is a gift that God pours out from heaven; it is not a result of our striving. The key to biblical spirituality is receptivity. And this is the reason we need to plow up the hard places in our hearts.
  '13':
  - type: text
    content: But instead, you have cultivated lawlessness
  - type: text
    content: and reaped a harvest of injustice.
  - type: text
    content: You have eaten the fruit of your lies.
  - type: text
    content: Because you have trusted in your own strength
  - type: note
    content: Or “in your own way” or, if the text is emended, “your [many] chariots” (also LXX). However, Israel was not known for many chariots, compared to Egypt and Assyria.
  - type: text
    content: and in your vast, mighty army,
  '14':
  - type: text
    content: war cries will break out against your people,
  - type: text
    content: and all your fortified cities will be destroyed.
  - type: text
    content: Just as Shalman destroyed Beth Arbel on the day of battle,
  - type: note
    content: This may be a reference to the Moabite king, Salamanu, and his destruction of Beth Arbel (Irbid) in Gilead. See 2 Kings 15:10 .
  - type: text
    content: when children and their mothers were dashed to death on the ground,
  '15':
  - type: text
    content: so it will be done to you, Bethel,
  - type: note
    content: Or “house of Israel” (LXX).
  - type: text
    content: because of your evil stacked upon evil.
  - type: text
    content: 'At dawn, '
  - type: text
    content: as the battle begins
  - type: text
    content: ', your kingship will be no more.”'
  - type: note
    content: The last king of Israel was Hoshea, and he was taken captive by the Assyrians even before they began their siege against Samaria (see 2 Kings 17:4–6 ).
  '2':
  - type: text
    content: 'Israel’s devotion is false '
  - type: note
    content: Or “slippery.”
  - type: text
    content: and divided;
  - type: text
    content: soon the people must pay the penalty for their guilt.
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: will demolish their altars
  - type: text
    content: and shatter their sacred pillars.
  '3':
  - type: text
    content: Then they will say,
  - type: text
    content: “We have lost our king
  - type: text
    content: 'because we have not feared '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'but what could a '
  - type: text
    content: human
  - type: text
    content: ' king do for us anyway?”'
  '4':
  - type: text
    content: All they do is make empty speeches,
  - type: text
    content: phony promises, and useless treaties.
  - type: text
    content: Their so-called justice spreads like poisonous weeds
  - type: text
    content: among the furrows of the fields.
  - type: note
    content: See Amos 6:12 .
  - type: heading
    content: Israel’s Sins at Bethel
  '5':
  - type: text
    content: Samaria’s citizens will tremble and mourn
  - type: text
    content: over the loss of their sacred calves of Bethel.
  - type: note
    content: Or “Beth Aven,” a derisive term for Bethel. Bethel means the “house of God.” Beth Aven means “the house of evil.”
  - type: text
    content: Everyone will wail over its loss
  - type: text
    content: along with their idolatrous priests
  - type: text
    content: because their “glory” has gone into exile.
  '6':
  - type: text
    content: They
  - type: text
    content: ' will carry the calf-idol to Assyria'
  - type: text
    content: as tribute to the great king.
  - type: text
    content: Ephraim will reap the shame.
  - type: text
    content: What a disgrace for Israel!
  '7':
  - type: text
    content: Samaria—your king has had his day.
  - type: text
    content: Your king will disappear
  - type: text
    content: like a twig on the surface of the waters.
  - type: note
    content: Or “like a [wood] chip on the surface of the waters” (LXX).
  '8':
  - type: text
    content: 'The hilltop shrines, '
  - type: note
    content: Or “Beth Aven [house of evil].” See the footnote on 10:5 .
  - type: text
    content: the vanity and sin of Israel,
  - type: text
    content: will be demolished.
  - type: text
    content: Thorns and thistles will overgrow and cover their altars.
  - type: text
    content: Then they will say to the mountains, “Bury us!”
  - type: text
    content: and to the hills, “Fall on us!”
  '9':
  - type: text
    content: “Israel, since the days of Gibeah,
  - type: note
    content: That is, when Israel’s monarchy got started. See 1 Sam. 8 .
  - type: text
    content: you have not stopped sinning.
  - type: text
    content: From then until now, you have persisted in your ways.
  - type: text
    content: Were not the evildoers overtaken by war in Gibeah?
