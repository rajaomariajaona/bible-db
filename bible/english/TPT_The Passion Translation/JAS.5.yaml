      metadata:
        usfm: 1CO.14.14+1CO.14.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Are there happy, cheerful ones among you? Encourage them to sing out their praises! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “pluck the strings of a harp” or “sing a psalm.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Are there any sick among you? Then ask the elders of the church to come and pray over the sick and anoint them with oil in the name of our Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the prayer of faith '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the claim of faith.”
    marker-yv: yv-n
  - type: text
    text: 'will heal the sick '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not the Greek usually used for sickness or disease. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kamno
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also mean “those who are weary and worn down,” and in the context could possibly refer to believers who have been arguing with each other, leaving them spiritually weak.
    marker-yv: yv-n
  - type: text
    text: 'and the Lord will raise them up, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, restore them to health. This could be a subtle hint of a resurrection.
    marker-yv: yv-n
  - type: text
    text: 'and if they have committed sins '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “doer of sin.” There is a clear implication in this passage that the sickness (weakness) referred to is the result of sin. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 11:18–32
      metadata:
        usfm: 1CO.11.18+1CO.11.19+1CO.11.20+1CO.11.21+1CO.11.22+1CO.11.23+1CO.11.24+1CO.11.25+1CO.11.26+1CO.11.27+1CO.11.28+1CO.11.29+1CO.11.30+1CO.11.31+1CO.11.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: they will be forgiven.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be speaking of the church elders who are forgiving the arguing believers and restoring them back into fellowship.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Confess and acknowledge how you have offended one another '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, which uses a word that can be translated “faults” or “folly” or “offenses.” The Critical Greek text is “confess your sins.”
    marker-yv: yv-n
  - type: text
    text: 'and then pray for one another to be instantly healed, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “restored.”
    marker-yv: yv-n
  - type: text
    text: 'for tremendous power is released through the passionate, heartfelt prayer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “energized prayer,” a prayer within a prayer.
    marker-yv: yv-n
  - type: text
    text: of a godly believer!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elijah was a man with human frailties, just like all of us, but he prayed and received supernatural answers. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he prayed with prayer” (intensity).
    marker-yv: yv-n
  - type: text
    text: 'He actually shut the heavens over the land so there would be no rain for three and a half years! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then he prayed again and the skies opened up over the land so that the rain came again and produced the harvest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Finally, as members of God’s beloved family, we must go after the one who wanders from the truth and bring him back. '
  - type: usfm
    marker: vlbl
