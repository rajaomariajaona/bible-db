document_id: JAS.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to the Rich
  - type: text
    content: 'Listen all you who are rich, for it’s time to weep and howl over the misery '
  - type: note
    content: The Aramaic word can refer to demonic torment.
  - type: text
    content: 'that will overtake you! '
  '10':
  - type: text
    content: 'My brothers and sisters, take '
  - type: note
    content: Or “receive.”
  - type: text
    content: 'the prophets as your mentors. They have prophesied in the name of the Lord '
  - type: note
    content: That is, by the Lord’s authority. See also v. 14.
  - type: text
    content: 'and '
  - type: text
    content: it brought them great sufferings
  - type: text
    content: ', yet they patiently endured. '
  '11':
  - type: text
    content: 'We honor them as our heroes '
  - type: note
    content: Or “we regard them as blessed.”
  - type: text
    content: because they remained faithful even while enduring great sufferings. And you have heard of all that Job went through and we can now see that the Lord ultimately treated him with wonderful kindness, revealing how tenderhearted he really is!
  - type: note
    content: See Ex. 34:6; Ps. 86:15.
  '12':
  - type: text
    content: 'Above all we must be those who never need to verify our speech as truthful by swearing by the heavens or the earth or any other oath. '
  - type: note
    content: See Matt. 5:34.
  - type: text
    content: But instead we must be so full of integrity that our “Yes” or “No” is convincing enough and we do not stumble into hypocrisy.
  - type: note
    content: Some Greek manuscripts read “stumble into hypocrisy,” while others have, “stumble into judgment.”
  - type: heading
    content: Prayer for the Sick
  '13':
  - type: text
    content: 'Are there any believers in your fellowship suffering great hardship and distress? Encourage them to pray! '
  - type: note
    content: See Luke 18:1; 1 Cor. 14:14–15.
  - type: text
    content: 'Are there happy, cheerful ones among you? Encourage them to sing out their praises! '
  - type: note
    content: Or “pluck the strings of a harp” or “sing a psalm.”
  '14':
  - type: text
    content: 'Are there any sick among you? Then ask the elders of the church to come and pray over the sick and anoint them with oil in the name of our Lord. '
  '15':
  - type: text
    content: 'And the prayer of faith '
  - type: note
    content: Or “the claim of faith.”
  - type: text
    content: 'will heal the sick '
  - type: note
    content: This is not the Greek usually used for sickness or disease. The word kamno can also mean “those who are weary and worn down,” and in the context could possibly refer to believers who have been arguing with each other, leaving them spiritually weak.
  - type: text
    content: 'and the Lord will raise them up, '
  - type: note
    content: That is, restore them to health. This could be a subtle hint of a resurrection.
  - type: text
    content: 'and if they have committed sins '
  - type: note
    content: Or “doer of sin.” There is a clear implication in this passage that the sickness (weakness) referred to is the result of sin. See also 1 Cor. 11:18–32.
  - type: text
    content: they will be forgiven.
  - type: note
    content: This may be speaking of the church elders who are forgiving the arguing believers and restoring them back into fellowship.
  '16':
  - type: text
    content: 'Confess and acknowledge how you have offended one another '
  - type: note
    content: As translated from the Aramaic, which uses a word that can be translated “faults” or “folly” or “offenses.” The Critical Greek text is “confess your sins.”
  - type: text
    content: 'and then pray for one another to be instantly healed, '
  - type: note
    content: Or “restored.”
  - type: text
    content: 'for tremendous power is released through the passionate, heartfelt prayer '
  - type: note
    content: Or “energized prayer,” a prayer within a prayer.
  - type: text
    content: of a godly believer!
  '17':
  - type: text
    content: 'Elijah was a man with human frailties, just like all of us, but he prayed and received supernatural answers. '
  - type: note
    content: Or “he prayed with prayer” (intensity).
  - type: text
    content: 'He actually shut the heavens over the land so there would be no rain for three and a half years! '
  '18':
  - type: text
    content: Then he prayed again and the skies opened up over the land so that the rain came again and produced the harvest.
  '19':
  - type: text
    content: 'Finally, as members of God’s beloved family, we must go after the one who wanders from the truth and bring him back. '
  '2':
  - type: text
    content: 'Your riches lie rotting, your fine clothing eaten by moths, '
  '20':
  - type: text
    content: 'For the one who restores the sinning believer back to God from the error of his way, gives back to his soul '
  - type: note
    content: As translated from the Aramaic. The Greek is similar, meaning “save his soul from death.”
  - type: text
    content: 'life from the dead, and covers over countless sins '
  - type: note
    content: That is, bring about forgiveness of many sins through restoring the person back to God. To cover sins is a Hebrew concept of atonement.
  - type: text
    content: by their demonstration of love
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'and your gold and silver are corroded as a witness against you. You have hoarded up treasure for the last days but it will become a fire to burn your flesh. '
  '4':
  - type: text
    content: 'Listen! Can’t you hear the cries of the laborers '
  - type: note
    content: Or “the reapers” (of your fields).
  - type: text
    content: 'over the wages you fraudulently held back from those who worked for you? '
  - type: note
    content: Or “those who worked in your fields.”
  - type: text
    content: The cries for justice of those you’ve cheated have reached the ears of the Lord of armies!
  - type: note
    content: Or “Lord Sabaoth.”
  '5':
  - type: text
    content: 'You have indulged yourselves with every luxury and pleasure this world offers, but you’re only stuffing your heart full for a day of slaughter. '
  '6':
  - type: text
    content: 'You have condemned and murdered good and innocent people '
  - type: note
    content: Or “the righteous one,” a possible reference to the death of Jesus.
  - type: text
    content: who had no power to defend themselves.
  - type: note
    content: Or “will not (God) resist you?”
  '7':
  - type: text
    content: 'Meanwhile, brothers and sisters, we must be patient and filled with expectation as we wait for the appearing '
  - type: note
    content: This is the abstract Greek word parousia which can mean “arrival, presence, becoming manifest, appearing.” Parousia is taken from the present participle pareina a compound word of para (beside) and einai (to be seen, made visible). It has little to do with distance or space, but with becoming visible, such as an uncovering or revealing what is nearby. It is commonly used for the return of our Lord Jesus Christ.
  - type: text
    content: 'of the Lord. Think about the farmer who has to patiently wait for the earth’s harvest as it ripens because of the early and latter rains. '
  '8':
  - type: text
    content: 'So you also, keep your hopes high and be patient, for the presence of the Lord is drawing closer. '
  - type: note
    content: Or “near at hand.” The Greek word engizo is taken from the word eggus, which means to take by the hand, to throttle, or to hold the reins. (See Strong’s Concordance, Gr. 1448 and 1451.)
  '9':
  - type: text
    content: 'Since each of you are part of God’s family never complain or grumble about each other '
  - type: note
    content: Or “don’t blame others” (for your troubles).
  - type: text
    content: so that judgment will not come on you, for the true Judge is near and very ready to appear!
  - type: note
    content: Or “at the gate.”
