document_id: PRO.13,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living Wisely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise son or daughter desires a father’s discipline,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the know-it-all never listens to correction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom opens your heart to receive wise counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but pride closes your ears to advice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and gives birth only to quarrels and strife.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wealth quickly gained is quickly wasted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Wealth gained by fraud will dwindle.”
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: easy come, easy go!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you gradually gain wealth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will watch it grow.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When hope’s dream seems to drag on and on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the delay can be depressing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when at last your dream comes true,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: life’s sweetness will satisfy your soul.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “it is a tree of life.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Despise the word, will you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you’ll pay the price and it won’t be pretty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the one who honors the Father’s holy instructions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be rewarded.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the lovers of God teach you truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a fountain of life opens up within you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their wise instruction will deliver you from the ways of death.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone admires a wise, sensible person,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the treacherous walk on the path of ruin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and the Septuagint. The Hebrew is uncertain.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything a wise and shrewd man does
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comes from a source of revelation-knowledge,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “A wise person thinks ahead.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the behavior of a fool puts foolishness on parade!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that the fool is unable to finish anything he begins.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An undependable messenger causes a lot of trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the trustworthy and wise messengers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: release healing wherever they go.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s sons and daughters are peacemakers, healers, and faithful deliverers for others.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poverty and disgrace come to the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who refuses to hear criticism.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew. The Septuagint is “Instruction removes poverty and disgrace.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the one who is easy to correct is on the path of honor.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God fulfills your longings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sweetness fills your soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked refuse to turn from darkness
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: to see their desires come to pass
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied by the Hebrew parallelism of the text.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of the wise are kind and easy to swallow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the unbeliever just wants to pick a fight and argue.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you want to grow in wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spend time with the wise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Walk with the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’ll eventually become just like them.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calamity chases the sin-chaser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but prosperity pursues the God-lover.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The benevolent man leaves an inheritance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that endures to his children’s children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wealth of the wicked is treasured up for the righteous.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lovers of God will live a long life and get to enjoy their wealth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the ungodly will suddenly perish.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “In the fallow ground of the poor there is abundance of food, but injustice sweeps it away.” The Aramaic is “Those who don’t find the way of life destroy many years of wealth, and some are utterly destroyed.” There is a vast difference in the three translations. This translation follows the Septuagint.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If you withhold correction and punishment '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spare the rod.” Corporal punishment was common in premodern societies.
      marker-yv: yv-n
    - type: text
      text: from your children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you demonstrate a lack of true love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So prove your love and be prompt to punish them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The one who spares the rod hates his child.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lovers of God will have more than enough,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wicked will always lack what they crave.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard your words and you’ll guard your life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but if you don’t control your tongue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will ruin everything.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The slacker wants it all and ends up with nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the hard worker ends up with all that he longed for.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovers of God hate what is phony and false,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wicked are full of shame and behave shamefully.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here literally means “to cause a stink” or “to emit an odor.” This is a figure of speech for what is shameful.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness is like a shield of protection,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: guarding those who keep their integrity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but sin is the downfall of the wicked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One pretends to be rich but is poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Another pretends to be poor but is quite rich.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is never godly to be a phony. It’s always better to be who you are and avoid pretense.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The self-assurance of the rich is their money,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “The salvation of the soul is a man’s true wealth.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but people don’t kidnap and extort the poor!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The virtues of God’s lovers shine brightly in the darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the flickering lamp of the ungodly will be extinguished.
