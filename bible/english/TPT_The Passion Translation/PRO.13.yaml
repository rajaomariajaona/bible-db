document_id: PRO.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living Wisely
  - type: text
    content: A wise son or daughter desires a father’s discipline,
  - type: text
    content: but the know-it-all never listens to correction.
  '10':
  - type: text
    content: Wisdom opens your heart to receive wise counsel,
  - type: text
    content: but pride closes your ears to advice
  - type: text
    content: and gives birth only to quarrels and strife.
  '11':
  - type: text
    content: 'Wealth quickly gained is quickly wasted '
  - type: note
    content: Or “Wealth gained by fraud will dwindle.”
  - type: text
    content: —
  - type: text
    content: easy come, easy go!
  - type: text
    content: But if you gradually gain wealth,
  - type: text
    content: you will watch it grow.
  '12':
  - type: text
    content: When hope’s dream seems to drag on and on,
  - type: text
    content: the delay can be depressing.
  - type: text
    content: But when at last your dream comes true,
  - type: text
    content: life’s sweetness will satisfy your soul.
  - type: note
    content: Or “it is a tree of life.”
  '13':
  - type: text
    content: Despise the word, will you?
  - type: text
    content: Then you’ll pay the price and it won’t be pretty!
  - type: text
    content: But the one who honors the Father’s holy instructions
  - type: text
    content: will be rewarded.
  '14':
  - type: text
    content: When the lovers of God teach you truth,
  - type: text
    content: a fountain of life opens up within you,
  - type: text
    content: and their wise instruction will deliver you from the ways of death.
  '15':
  - type: text
    content: Everyone admires a wise, sensible person,
  - type: text
    content: but the treacherous walk on the path of ruin.
  - type: note
    content: As translated from the Aramaic and the Septuagint. The Hebrew is uncertain.
  '16':
  - type: text
    content: Everything a wise and shrewd man does
  - type: text
    content: comes from a source of revelation-knowledge,
  - type: note
    content: Or “A wise person thinks ahead.”
  - type: text
    content: but the behavior of a fool puts foolishness on parade!
  - type: note
    content: The implication is that the fool is unable to finish anything he begins.
  '17':
  - type: text
    content: An undependable messenger causes a lot of trouble,
  - type: text
    content: but the trustworthy and wise messengers
  - type: text
    content: release healing wherever they go.
  - type: note
    content: God’s sons and daughters are peacemakers, healers, and faithful deliverers for others.
  '18':
  - type: text
    content: Poverty and disgrace come to the one
  - type: text
    content: who refuses to hear criticism.
  - type: note
    content: As translated from the Hebrew. The Septuagint is “Instruction removes poverty and disgrace.”
  - type: text
    content: But the one who is easy to correct is on the path of honor.
  '19':
  - type: text
    content: When God fulfills your longings,
  - type: text
    content: sweetness fills your soul.
  - type: text
    content: But the wicked refuse to turn from darkness
  - type: text
    content: to see their desires come to pass
  - type: text
    content: .
  - type: note
    content: Implied by the Hebrew parallelism of the text.
  '2':
  - type: text
    content: The words of the wise are kind and easy to swallow,
  - type: text
    content: but the unbeliever just wants to pick a fight and argue.
  '20':
  - type: text
    content: If you want to grow in wisdom,
  - type: text
    content: spend time with the wise.
  - type: text
    content: Walk with the wicked
  - type: text
    content: and you’ll eventually become just like them.
  '21':
  - type: text
    content: Calamity chases the sin-chaser,
  - type: text
    content: but prosperity pursues the God-lover.
  '22':
  - type: text
    content: The benevolent man leaves an inheritance
  - type: text
    content: that endures to his children’s children,
  - type: text
    content: but the wealth of the wicked is treasured up for the righteous.
  '23':
  - type: text
    content: The lovers of God will live a long life and get to enjoy their wealth,
  - type: text
    content: but the ungodly will suddenly perish.
  - type: note
    content: As translated from the Septuagint. The Hebrew is “In the fallow ground of the poor there is abundance of food, but injustice sweeps it away.” The Aramaic is “Those who don’t find the way of life destroy many years of wealth, and some are utterly destroyed.” There is a vast difference in the three translations. This translation follows the Septuagint.
  '24':
  - type: text
    content: 'If you withhold correction and punishment '
  - type: note
    content: Or “spare the rod.” Corporal punishment was common in premodern societies.
  - type: text
    content: from your children,
  - type: text
    content: you demonstrate a lack of true love.
  - type: text
    content: So prove your love and be prompt to punish them.
  - type: note
    content: Or “The one who spares the rod hates his child.”
  '25':
  - type: text
    content: The lovers of God will have more than enough,
  - type: text
    content: but the wicked will always lack what they crave.
  '3':
  - type: text
    content: Guard your words and you’ll guard your life,
  - type: text
    content: but if you don’t control your tongue,
  - type: text
    content: it will ruin everything.
  '4':
  - type: text
    content: The slacker wants it all and ends up with nothing,
  - type: text
    content: but the hard worker ends up with all that he longed for.
  '5':
  - type: text
    content: Lovers of God hate what is phony and false,
  - type: text
    content: but the wicked are full of shame and behave shamefully.
  - type: note
    content: The Hebrew word used here literally means “to cause a stink” or “to emit an odor.” This is a figure of speech for what is shameful.
  '6':
  - type: text
    content: Righteousness is like a shield of protection,
  - type: text
    content: guarding those who keep their integrity,
  - type: text
    content: but sin is the downfall of the wicked.
  '7':
  - type: text
    content: One pretends to be rich but is poor.
  - type: text
    content: Another pretends to be poor but is quite rich.
  - type: note
    content: It is never godly to be a phony. It’s always better to be who you are and avoid pretense.
  '8':
  - type: text
    content: The self-assurance of the rich is their money,
  - type: note
    content: The Aramaic is “The salvation of the soul is a man’s true wealth.”
  - type: text
    content: but people don’t kidnap and extort the poor!
  '9':
  - type: text
    content: The virtues of God’s lovers shine brightly in the darkness,
  - type: text
    content: but the flickering lamp of the ungodly will be extinguished.
