document_id: GEN.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph’s Brothers Return to Egypt with Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the famine in the land continued to grow more severe. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When all the grain they had brought from Egypt was almost gone, their father said to them, “Go back and buy us more food.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Judah objected, “The Egyptian warned us repeatedly, ‘You will not see my face again, unless Benjamin is with you!’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We’ll only go if you’ll let our brother come with us. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If you insist he remains here, we won’t go, for the man solemnly told us, ‘You will not see my face again, unless your brother is with you!’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob’s sons told him, essentially, “We won’t see Joseph’s face until he sees Benjamin.” The name Benjamin means “son of my right hand.” There is One greater than Joseph who is now waiting until he sees “the sons of his right hand,” an overcoming company of sons and daughters who will sit and reign with him in victory (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 3:21
      metadata:
        usfm: REV.3.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). When the church matures into the full measure of sonship, we will see him whom our soul loves.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Israel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Israel is the name God gave to Jacob.
    marker-yv: yv-n
  - type: text
    text: demanded, “Why did you make it so hard for me by telling the man you had another brother?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They answered him, “The man interrogated us about ourselves and our family, saying, ‘Is your father still living? Do you have another brother?’ We had to answer his questions! We had no idea he would say, ‘You must bring your brother here to me.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Then Judah spoke up and said to Israel, “Father, I promise to guarantee his safety with my life. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:8–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was an amazing statement of sacrificial love from Judah. One day a son of Judah would come, a Lion from the tribe of Judah, Jesus, who would offer his life as a ransom for many. Only a father can understand the loss of two of his children, and Judah had experienced that loss. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 38:7
      metadata:
        usfm: GEN.38.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: GEN.38.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'You can hold me personally responsible if I don’t return with him. I’ll bear the blame before you for the rest of my life if I fail to bring him safely back to you! You have my promise. Entrust him to my care, and let us be on our way, so that we all don’t die of starvation—we and you and all our children—we will live and not die! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And besides, if we hadn’t delayed so long, we could have gone and returned twice by now!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: After considering their words
  - type: text
    text: ', their father Israel said to them, “If that’s the way it has to be, then do this: Load your donkeys with the very best gifts you can find, choice products of the land, and offer them to the man. Take some balm and some honey, spices, and myrrh, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ironically, these items were the same things carried in the caravan that took Joseph away as a slave (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 37:25
      metadata:
        usfm: GEN.37.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Now they carry the same items to Joseph as tribute.
    marker-yv: yv-n
  - type: text
    text: 'pistachio nuts and almonds. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Take double the money with you. Give him back the money that was returned in the top of your sacks, for it may have been a mistake. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Take your brother, too, and be off! Go back to the man at once. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'May the God who is more than enough '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “El Shaddai.” See second footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 17:1
      metadata:
        usfm: GEN.17.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'grant you mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and favor
  - type: text
    text: ' before the man, so that he may send back both Simeon and Benjamin. As for me, if I suffer loss, then let it be so.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the brothers set off for Egypt and took double the money, the many gifts, and Benjamin. Once they arrived, they presented themselves before Joseph.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Prepares a Feast for His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Joseph saw his brother Benjamin with them, he said to his chief servant, “Bring the men to my house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and make them feel at home
  - type: text
    text: '. Butcher an animal and prepare a meal, for these men are to dine with me at noon.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Joseph’s chief servant did as he was told and brought the men to Joseph’s house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now the brothers were very apprehensive as they were being led inside, and said to each other, “He brought us here because of the money that was put back in our sacks the first time we came to Egypt! He’s looking for an opportunity to arrest us, turn us into his slaves, and take away our donkeys!” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So they approached the chief servant and spoke to him at the entrance of the house. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“If you please, my lord,” they said, “we came here once before to buy food, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on our way home
  - type: text
    text: ', when we camped for the night and opened our sacks, we found each one’s money in the top of his bag. All our money was there in our bags! We know it must have been an oversight of some kind, and we have no clue who put it there, so we have brought it all back with us. Plus, we have additional money to buy more food.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Relax,” he replied, “don’t be afraid. Your God, the God of your father, must have been the one who put treasure in your bags. I have received your money; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it’s all accounted for
  - type: text
    text: '.” Then the chief servant brought Simeon out to them. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he gave feed to their donkeys and brought the brothers into the house. He gave them water to drink and washed their feet. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The men laid out their gifts to present to Joseph, for they were told he would appear before them at noon and would dine with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Joseph came home, they presented to him the gifts they had brought with them into the house. They each bowed low before him with their faces to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He asked them how the family was doing, saying, “You mentioned your aging father; is he still alive? Is he doing well?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Yes,” they replied, “our father, your servant, is still alive and doing well.” And they bowed low before Joseph in respect.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Looking them over, he saw his brother Benjamin, his mother’s son, and said to them, “So, I see you have returned with your youngest brother, of whom you spoke. God be gracious to you, my son.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joseph hastily left the room, for he was overwhelmed with feelings of love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: racham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is used ninety times in the Bible and almost always refers to God’s compassionate, merciful love for us.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Racham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is also the word for “womb.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Racham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is best described as nurturing love, the love a mother would have for her children.
    marker-yv: yv-n
  - type: text
    text: 'for his brother and on the verge of tears. He went into a private room and sobbed, as tears ran down his cheeks. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All of a sudden, this world leader, this captain over millions, collapsed inside. It was beginning to make sense to him—all the loneliness, those dark days in prison, the misunderstanding, and the pain of rejection. A family shattered for over two decades was being reunited. It took great discipline for Joseph to keep his secret from them. Joseph’s heart moved him to tears—tears of tenderness and affection for his younger brother and his long-lost family. Like a little boy again, Joseph missed his daddy.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When he finally composed himself, he washed his face, reappeared, and ordered: “Serve the meal.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'First, they served Joseph who was seated apart from his brothers, then the brothers by themselves, and the Egyptians by themselves. (It would have been utterly offensive for the Egyptians to eat at the same table with the Hebrews.) '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now, the brothers had been seated before Joseph in their birth order, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What a feast was before them! They had not eaten like this for months, maybe years. As they noticed the order of seating, the brothers were amazed but still had no clue. There are 39,916,800 different orders in which eleven individuals could be seated. Did they believe he had supernatural wisdom to know their birth order?
    marker-yv: yv-n
  - type: text
    text: 'from the firstborn at one end of the table to the youngest at the other end. They were all stunned when they realized the seating arrangement and looked at each other in astonishment. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eleven
  - type: text
    text: ' plates of food were taken from Joseph’s table and set in front of each of them, but Benjamin’s portion was five times more than any of theirs! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph let them understand that Benjamin was his favorite, giving him a portion five times larger than the others. Five times more meat, five times more vegetables, five times more of everything! Why would Joseph have given more to Benjamin? Was he merely following the steps of his father’s favoritism that brought all of this on? No. Joseph was testing them to see if they would be jealous again. Were they truly broken? Could they endure seeing one brother favored over the others and still rejoice? Or, would they get rid of Benjamin as they had him?
    marker-yv: yv-n
  - type: text
    text: They feasted and drank their fill with Joseph until they all became drunk.
