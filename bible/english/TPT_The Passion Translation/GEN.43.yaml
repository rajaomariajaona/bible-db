document_id: GEN.43,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Brothers Return to Egypt with Benjamin
  - type: text
    content: 'Now the famine in the land continued to grow more severe. '
  '10':
  - type: text
    content: And besides, if we hadn’t delayed so long, we could have gone and returned twice by now!”
  '11':
  - type: text
    content: After considering their words
  - type: text
    content: ', their father Israel said to them, “If that’s the way it has to be, then do this: Load your donkeys with the very best gifts you can find, choice products of the land, and offer them to the man. Take some balm and some honey, spices, and myrrh, '
  - type: note
    content: Ironically, these items were the same things carried in the caravan that took Joseph away as a slave (see Gen. 37:25). Now they carry the same items to Joseph as tribute.
  - type: text
    content: 'pistachio nuts and almonds. '
  '12':
  - type: text
    content: 'Take double the money with you. Give him back the money that was returned in the top of your sacks, for it may have been a mistake. '
  '13':
  - type: text
    content: 'Take your brother, too, and be off! Go back to the man at once. '
  '14':
  - type: text
    content: 'May the God who is more than enough '
  - type: note
    content: Or “El Shaddai.” See second footnote on Gen. 17:1.
  - type: text
    content: 'grant you mercy '
  - type: text
    content: and favor
  - type: text
    content: ' before the man, so that he may send back both Simeon and Benjamin. As for me, if I suffer loss, then let it be so.”'
  '15':
  - type: text
    content: So the brothers set off for Egypt and took double the money, the many gifts, and Benjamin. Once they arrived, they presented themselves before Joseph.
  - type: heading
    content: Joseph Prepares a Feast for His Brothers
  '16':
  - type: text
    content: 'When Joseph saw his brother Benjamin with them, he said to his chief servant, “Bring the men to my house '
  - type: text
    content: and make them feel at home
  - type: text
    content: '. Butcher an animal and prepare a meal, for these men are to dine with me at noon.” '
  '17':
  - type: text
    content: Joseph’s chief servant did as he was told and brought the men to Joseph’s house.
  '18':
  - type: text
    content: 'Now the brothers were very apprehensive as they were being led inside, and said to each other, “He brought us here because of the money that was put back in our sacks the first time we came to Egypt! He’s looking for an opportunity to arrest us, turn us into his slaves, and take away our donkeys!” '
  '19':
  - type: text
    content: 'So they approached the chief servant and spoke to him at the entrance of the house. '
  '2':
  - type: text
    content: When all the grain they had brought from Egypt was almost gone, their father said to them, “Go back and buy us more food.”
  '20':
  - type: text
    content: '“If you please, my lord,” they said, “we came here once before to buy food, '
  '21':
  - type: text
    content: 'but '
  - type: text
    content: on our way home
  - type: text
    content: ', when we camped for the night and opened our sacks, we found each one’s money in the top of his bag. All our money was there in our bags! We know it must have been an oversight of some kind, and we have no clue who put it there, so we have brought it all back with us. Plus, we have additional money to buy more food.”'
  '23':
  - type: text
    content: '“Relax,” he replied, “don’t be afraid. Your God, the God of your father, must have been the one who put treasure in your bags. I have received your money; '
  - type: text
    content: it’s all accounted for
  - type: text
    content: '.” Then the chief servant brought Simeon out to them. '
  '24':
  - type: text
    content: 'Then he gave feed to their donkeys and brought the brothers into the house. He gave them water to drink and washed their feet. '
  '25':
  - type: text
    content: The men laid out their gifts to present to Joseph, for they were told he would appear before them at noon and would dine with them.
  '26':
  - type: text
    content: 'When Joseph came home, they presented to him the gifts they had brought with them into the house. They each bowed low before him with their faces to the ground. '
  '27':
  - type: text
    content: He asked them how the family was doing, saying, “You mentioned your aging father; is he still alive? Is he doing well?”
  '28':
  - type: text
    content: “Yes,” they replied, “our father, your servant, is still alive and doing well.” And they bowed low before Joseph in respect.
  '29':
  - type: text
    content: 'Looking them over, he saw his brother Benjamin, his mother’s son, and said to them, “So, I see you have returned with your youngest brother, of whom you spoke. God be gracious to you, my son.” '
  '3':
  - type: text
    content: 'But Judah objected, “The Egyptian warned us repeatedly, ‘You will not see my face again, unless Benjamin is with you!’ '
  '30':
  - type: text
    content: 'Joseph hastily left the room, for he was overwhelmed with feelings of love '
  - type: note
    content: This is the Hebrew word racham. It is used ninety times in the Bible and almost always refers to God’s compassionate, merciful love for us. Racham is also the word for “womb.” Racham is best described as nurturing love, the love a mother would have for her children.
  - type: text
    content: 'for his brother and on the verge of tears. He went into a private room and sobbed, as tears ran down his cheeks. '
  - type: note
    content: All of a sudden, this world leader, this captain over millions, collapsed inside. It was beginning to make sense to him—all the loneliness, those dark days in prison, the misunderstanding, and the pain of rejection. A family shattered for over two decades was being reunited. It took great discipline for Joseph to keep his secret from them. Joseph’s heart moved him to tears—tears of tenderness and affection for his younger brother and his long-lost family. Like a little boy again, Joseph missed his daddy.
  '31':
  - type: text
    content: 'When he finally composed himself, he washed his face, reappeared, and ordered: “Serve the meal.”'
  '32':
  - type: text
    content: 'First, they served Joseph who was seated apart from his brothers, then the brothers by themselves, and the Egyptians by themselves. (It would have been utterly offensive for the Egyptians to eat at the same table with the Hebrews.) '
  '33':
  - type: text
    content: 'Now, the brothers had been seated before Joseph in their birth order, '
  - type: note
    content: What a feast was before them! They had not eaten like this for months, maybe years. As they noticed the order of seating, the brothers were amazed but still had no clue. There are 39,916,800 different orders in which eleven individuals could be seated. Did they believe he had supernatural wisdom to know their birth order?
  - type: text
    content: 'from the firstborn at one end of the table to the youngest at the other end. They were all stunned when they realized the seating arrangement and looked at each other in astonishment. '
  '34':
  - type: text
    content: Eleven
  - type: text
    content: ' plates of food were taken from Joseph’s table and set in front of each of them, but Benjamin’s portion was five times more than any of theirs! '
  - type: note
    content: Joseph let them understand that Benjamin was his favorite, giving him a portion five times larger than the others. Five times more meat, five times more vegetables, five times more of everything! Why would Joseph have given more to Benjamin? Was he merely following the steps of his father’s favoritism that brought all of this on? No. Joseph was testing them to see if they would be jealous again. Were they truly broken? Could they endure seeing one brother favored over the others and still rejoice? Or, would they get rid of Benjamin as they had him?
  - type: text
    content: They feasted and drank their fill with Joseph until they all became drunk.
  '4':
  - type: text
    content: 'We’ll only go if you’ll let our brother come with us. '
  '5':
  - type: text
    content: If you insist he remains here, we won’t go, for the man solemnly told us, ‘You will not see my face again, unless your brother is with you!’ ”
  - type: note
    content: Jacob’s sons told him, essentially, “We won’t see Joseph’s face until he sees Benjamin.” The name Benjamin means “son of my right hand.” There is One greater than Joseph who is now waiting until he sees “the sons of his right hand,” an overcoming company of sons and daughters who will sit and reign with him in victory (see Rev. 3:21). When the church matures into the full measure of sonship, we will see him whom our soul loves.
  '6':
  - type: text
    content: 'Israel '
  - type: note
    content: Israel is the name God gave to Jacob.
  - type: text
    content: demanded, “Why did you make it so hard for me by telling the man you had another brother?”
  '7':
  - type: text
    content: They answered him, “The man interrogated us about ourselves and our family, saying, ‘Is your father still living? Do you have another brother?’ We had to answer his questions! We had no idea he would say, ‘You must bring your brother here to me.’ ”
  '8':
  - type: text
    content: 'Then Judah spoke up and said to Israel, “Father, I promise to guarantee his safety with my life. '
  - type: note
    content: This was an amazing statement of sacrificial love from Judah. One day a son of Judah would come, a Lion from the tribe of Judah, Jesus, who would offer his life as a ransom for many. Only a father can understand the loss of two of his children, and Judah had experienced that loss. See Gen. 38:7, 10.
  - type: text
    content: 'You can hold me personally responsible if I don’t return with him. I’ll bear the blame before you for the rest of my life if I fail to bring him safely back to you! You have my promise. Entrust him to my care, and let us be on our way, so that we all don’t die of starvation—we and you and all our children—we will live and not die! '
