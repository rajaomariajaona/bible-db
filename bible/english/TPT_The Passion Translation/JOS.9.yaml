document_id: JOS.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gibeonites Deceive Joshua
  - type: text
    content: 'Now when all the kings west of the Jordan heard about these things—those in the hill country, '
  - type: note
    content: This was a hilly area on the west of the Jordan called the Shephelah. The kings of the highlands could represent those today who occupy the high ground of pride and fleshly confidence. They look down from their elevated position on anyone who is unlike them.
  - type: text
    content: in the western foothills, and along the entire coast of the Great Sea as far as Lebanon (the kings of the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites)—
  '10':
  - type: text
    content: 'We’ve also heard of all he did to help you defeat the two Amorite kings on the other side of the Jordan—King Sihon of Heshbon and King Og of Bashan, who lived in Ashtaroth. '
  - type: note
    content: They did not mention the more recent miraculous conquests of Jericho and Ai.
  '11':
  - type: text
    content: 'Therefore, our leaders and all the inhabitants of our land sent us to find you with these instructions: ‘Get food ready for your long trip, and go to the Israelites and say to them, “Make a treaty with us. We’re willing to be your servants.” ’ '
  '12':
  - type: text
    content: 'Look at our bread! It was still warm when we left home with it. See how dry and moldy it’s become! '
  '13':
  - type: text
    content: These wineskins were new when we filled them. See how they’ve dried up and burst! And look, our clothes and sandals are worn out from our long journey.”
  - type: note
    content: The Gibeonites with old wineskins (religious systems), old clothing (old nature), old worn-out shoes (old methods), and moldy bread, represent counterfeit traditions and deceptions of religion. Their bread was moldy, not fit for consumption. The boast of their “long journey” parallels the ecclesiastical history of many church traditions today that have confidence in their long history more than the authority of Scripture. We can make no alliance with the old as we move forward to possess our inheritance. A new victory requires that we eat the fresh bread of heaven with a renewed mind that hears what God is saying today to his people.
  '14':
  - type: text
    content: 'The leaders of Israel ratified a peace treaty with the Gibeonites by sharing a meal together, '
  - type: note
    content: Literally “The men took some of their provisions.” This was not simply eating the moldy bread but also a sharing of a fellowship meal to ratify the peace treaty.
  - type: text
    content: 'but they failed to consult with '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: Or “they did not ask the mouth of Yahweh.” Some Jewish scholars believe that meant they did not ask the Lord to show them what to do through the Urim and Thummim. If we lack wisdom and ask God, he will give us his heart (see James 1:5).
  '15':
  - type: text
    content: Joshua agreed to let them live. He made a peace treaty with them, and the leaders of the assembly sealed it with an oath.
  '16':
  - type: text
    content: 'But three days after the treaty had been made, the Israelites learned '
  - type: note
    content: Or “heard.” It is possible that Israel supernaturally heard that the Gibeonites were lying, perhaps through a dream or from a prophet among them who heard from God.
  - type: text
    content: that they had been deceived
  - type: text
    content: '. In fact, the Gibeonites were from the local area and lived nearby. '
  '17':
  - type: text
    content: 'So the Israelites set out at once, and on the third day, they came to their cities: Gibeon, Chephirah, '
  - type: note
    content: Chephirah means “lioness.” It has been identified with the modern Khirbet el-Kefireh, about ten miles west of Jerusalem.
  - type: text
    content: 'Beeroth, '
  - type: note
    content: Beeroth means “wells.”
  - type: text
    content: 'and Kiriath Jearim. '
  - type: note
    content: 'Kiriath Jearim means “city of dense thickets” (representing the mind of man). Kiriath Jearim is also called Kiriath Baal (see Josh. 15:60). The four cities in this verse were clustered close together: Beeroth was about five miles northeast of Gibeon; Chephirah was about five miles southwest of Gibeon, and Kiriath Jearim was a bit farther away in the same direction.'
  '18':
  - type: text
    content: 'But the Israelites did not attack them because the leaders of the assembly had sworn an oath to them in the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel.'
  - type: text
    content: 'This caused Israel to grumble against their leaders, '
  '19':
  - type: text
    content: 'but the leaders told the assembly of Israel, “We cannot touch them, for we swore an oath to them in the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel. '
  '2':
  - type: text
    content: 'they came together to make war against Joshua and Israel. '
  '20':
  - type: text
    content: We must let them live for fear that God’s anger will come upon us because of the oath we swore to them.” So they became woodcutters and water carriers for the community of Israel, as their leaders had decreed.
  '22':
  - type: text
    content: 'Joshua summoned the Gibeonites and asked them, “Why did you deceive us? You told us that you lived very far from us, but we now know for a fact that you live right here near us. '
  '23':
  - type: text
    content: 'Therefore, '
  - type: text
    content: we will spare your lives
  - type: text
    content: ', but you will live under a curse, and you will be condemned to perpetual servitude. You will serve the house of my God by cutting wood and carrying water for us.”'
  - type: note
    content: See Deut. 29:10–11. Cutting wood and carrying water were the tasks of women in the culture of that day. The implication is that the Gibeonites would have had to disband their army and depend on Israel for their defense. Furthermore, cutting wood and carrying water would be very important tasks for tabernacle worship when Israel set up their base in Shiloh (see Josh. 18:1). Though they were considered servants and uncircumcised gentiles, they would be close in proximity to the worship of Yahweh in the tabernacle and serve the needs of the sacrificial system. Historically, the Gibeonites retained their treaty rights with Israel for more than four hundred years, until the close of David’s reign. One violation of their treaty occurred under Saul’s reign, and it brought Israel three years of famine as God’s judgment. See 2 Sam. 21:1–9. Principles of any covenant are very important to God.
  '24':
  - type: text
    content: 'They answered Joshua, “We lied, sir, because we greatly feared for our lives. We know for certain all about Moses and how he served '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God. We know for certain that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will honor his promise to Moses and give you all these lands as your own. And we know for certain that he commanded you to wipe out all the inhabitants living here and thus take possession of this land. '
  '25':
  - type: text
    content: Now we are at your mercy, so do with us what you consider right and proper.”
  '26':
  - type: text
    content: 'So Joshua '
  - type: text
    content: had mercy
  - type: text
    content: ' and saved them '
  - type: note
    content: Israel’s sons once made a treaty with the people of Shechem but broke it and killed the people (see Gen. 34:13–31). Here Joshua made a peace treaty and kept his oath. Like Joshua, leaders must always keep their promises and show mercy to others. At times, our past sins do affect our lives. The consequences of our sins may later surface so that we can learn from the past and break off its influence by the power of the Holy Spirit.
  - type: text
    content: 'from being killed by the Israelites. '
  '27':
  - type: text
    content: 'That day, he made them woodcutters and water carriers to serve the community of Israel for the altar of '
  - type: text
    content: Yahweh
  - type: text
    content: ' at his divinely chosen place. '
  - type: note
    content: See Deut. 12:11, 14, 26; 15:20; 17:8; 31:11.
  - type: text
    content: And that is what they do to this day.
  '3':
  - type: text
    content: 'When the inhabitants of Gibeon '
  - type: note
    content: 'The kings mentioned in this passage could represent those today who oppose God’s ways: Gibeon means “hill city,” representing human pride, Hivite means “human effort,” and Ai means “heap of ruins.” Gibeon was the capital of the Hivites, a large city about seven miles from Ai and nearly twenty miles from Israel’s camp at Gilgal. It has been identified with modern al-Jib, a Palestinian village about six miles northwest of Jerusalem.'
  - type: text
    content: 'learned how Joshua had destroyed Jericho and Ai, '
  '4':
  - type: text
    content: 'they resorted to a ruse: They sent a delegation disguised '
  - type: note
    content: Or possibly “They collected provisions.” The meaning of the Hebrew is uncertain.
  - type: text
    content: as messengers from a distant land
  - type: text
    content: '. They loaded their donkeys with worn-out sacks and old, patched wineskins. '
  '5':
  - type: text
    content: 'They wore old, patched sandals on their feet and old, tattered clothes, and took along dry, moldy bread. '
  '6':
  - type: text
    content: 'When they arrived at Israel’s camp at Gilgal, they said to Joshua and the Israelites: “We’ve come from a far country to propose that you make a treaty with us.”'
  '7':
  - type: text
    content: The men of Israel asked the Hivites, “Perhaps you live nearby. Why should we make a treaty with you?”
  - type: note
    content: See Ex. 23:32; Deut. 7:2.
  '8':
  - type: text
    content: “We are willing to be your servants,” they answered Joshua.
  - type: text
    content: Joshua questioned them further, “Who are you and where are you from?”
  '9':
  - type: text
    content: 'The Gibeonites replied: “Your servants come from a very distant land because we’ve heard of the fame of your God, '
  - type: text
    content: Yahweh
  - type: text
    content: '. We’ve heard of his wonders and all that he did in Egypt. '
