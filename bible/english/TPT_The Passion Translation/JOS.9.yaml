document_id: JOS.9,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gibeonites Deceive Joshua
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when all the kings west of the Jordan heard about these things—those in the hill country, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a hilly area on the west of the Jordan called the Shephelah. The kings of the highlands could represent those today who occupy the high ground of pride and fleshly confidence. They look down from their elevated position on anyone who is unlike them.
      marker-yv: yv-n
    - type: text
      text: in the western foothills, and along the entire coast of the Great Sea as far as Lebanon (the kings of the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites)—
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'We’ve also heard of all he did to help you defeat the two Amorite kings on the other side of the Jordan—King Sihon of Heshbon and King Og of Bashan, who lived in Ashtaroth. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They did not mention the more recent miraculous conquests of Jericho and Ai.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore, our leaders and all the inhabitants of our land sent us to find you with these instructions: ‘Get food ready for your long trip, and go to the Israelites and say to them, “Make a treaty with us. We’re willing to be your servants.” ’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Look at our bread! It was still warm when we left home with it. See how dry and moldy it’s become! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: These wineskins were new when we filled them. See how they’ve dried up and burst! And look, our clothes and sandals are worn out from our long journey.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Gibeonites with old wineskins (religious systems), old clothing (old nature), old worn-out shoes (old methods), and moldy bread, represent counterfeit traditions and deceptions of religion. Their bread was moldy, not fit for consumption. The boast of their “long journey” parallels the ecclesiastical history of many church traditions today that have confidence in their long history more than the authority of Scripture. We can make no alliance with the old as we move forward to possess our inheritance. A new victory requires that we eat the fresh bread of heaven with a renewed mind that hears what God is saying today to his people.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The leaders of Israel ratified a peace treaty with the Gibeonites by sharing a meal together, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “The men took some of their provisions.” This was not simply eating the moldy bread but also a sharing of a fellowship meal to ratify the peace treaty.
      marker-yv: yv-n
    - type: text
      text: 'but they failed to consult with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they did not ask the mouth of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .” Some Jewish scholars believe that meant they did not ask the Lord to show them what to do through the Urim and Thummim. If we lack wisdom and ask God, he will give us his heart (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Joshua agreed to let them live. He made a peace treaty with them, and the leaders of the assembly sealed it with an oath.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But three days after the treaty had been made, the Israelites learned '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “heard.” It is possible that Israel supernaturally heard that the Gibeonites were lying, perhaps through a dream or from a prophet among them who heard from God.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that they had been deceived
    - type: text
      text: '. In fact, the Gibeonites were from the local area and lived nearby. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So the Israelites set out at once, and on the third day, they came to their cities: Gibeon, Chephirah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Chephirah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lioness.” It has been identified with the modern Khirbet el-Kefireh, about ten miles west of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Beeroth, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beeroth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “wells.”
      marker-yv: yv-n
    - type: text
      text: 'and Kiriath Jearim. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kiriath Jearim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “city of dense thickets” (representing the mind of man). Kiriath Jearim is also called Kiriath Baal (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 15:60
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). The four cities in this verse were clustered close together: Beeroth was about five miles northeast of Gibeon; Chephirah was about five miles southwest of Gibeon, and Kiriath Jearim was a bit farther away in the same direction.'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But the Israelites did not attack them because the leaders of the assembly had sworn an oath to them in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This caused Israel to grumble against their leaders, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'but the leaders told the assembly of Israel, “We cannot touch them, for we swore an oath to them in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'they came together to make war against Joshua and Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: We must let them live for fear that God’s anger will come upon us because of the oath we swore to them.” So they became woodcutters and water carriers for the community of Israel, as their leaders had decreed.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Joshua summoned the Gibeonites and asked them, “Why did you deceive us? You told us that you lived very far from us, but we now know for a fact that you live right here near us. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we will spare your lives
    - type: text
      text: ', but you will live under a curse, and you will be condemned to perpetual servitude. You will serve the house of my God by cutting wood and carrying water for us.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 29:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cutting wood and carrying water were the tasks of women in the culture of that day. The implication is that the Gibeonites would have had to disband their army and depend on Israel for their defense. Furthermore, cutting wood and carrying water would be very important tasks for tabernacle worship when Israel set up their base in Shiloh (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 18:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Though they were considered servants and uncircumcised gentiles, they would be close in proximity to the worship of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in the tabernacle and serve the needs of the sacrificial system. Historically, the Gibeonites retained their treaty rights with Israel for more than four hundred years, until the close of David’s reign. One violation of their treaty occurred under Saul’s reign, and it brought Israel three years of famine as God’s judgment. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 21:1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Principles of any covenant are very important to God.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They answered Joshua, “We lied, sir, because we greatly feared for our lives. We know for certain all about Moses and how he served '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your God. We know for certain that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will honor his promise to Moses and give you all these lands as your own. And we know for certain that he commanded you to wipe out all the inhabitants living here and thus take possession of this land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Now we are at your mercy, so do with us what you consider right and proper.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So Joshua '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had mercy
    - type: text
      text: ' and saved them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Israel’s sons once made a treaty with the people of Shechem but broke it and killed the people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 34:13–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Here Joshua made a peace treaty and kept his oath. Like Joshua, leaders must always keep their promises and show mercy to others. At times, our past sins do affect our lives. The consequences of our sins may later surface so that we can learn from the past and break off its influence by the power of the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: 'from being killed by the Israelites. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'That day, he made them woodcutters and water carriers to serve the community of Israel for the altar of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' at his divinely chosen place. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
