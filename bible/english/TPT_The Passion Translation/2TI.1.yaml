document_id: 2TI.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: From Paul, an apostle of Jesus the Messiah, appointed by God’s pleasure to announce the wonderful promise of life found in Jesus, the anointed Messiah.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'This truth is now being unveiled by the revelation of the anointed Jesus, our life-giver, who has dismantled death, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: obliterating all its effects on our lives
    - type: text
      text: ', and has manifested his immortal life in us by the gospel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and His Gospel Ministry
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he has anointed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “consecrated.”
      marker-yv: yv-n
    - type: text
      text: 'me as his preacher, his apostle, and his teacher of truth to the nations. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The confidence of my calling enables me to overcome every difficulty without shame, for I have an intimate revelation of this God. And my faith in him convinces me that he is more than able to keep all that I’ve placed in his hands '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “what he has entrusted to me.”
      marker-yv: yv-n
    - type: text
      text: safe and secure until the fullness of his appearing.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Allow the healing words you’ve heard from me to live in you and make them a model for life as your faith and love for the Anointed One '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grows even more
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Guard well this incomparable treasure by the Spirit of Holiness living within you.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Perhaps you’ve heard that Phygelus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: His name means “fugitive.”
      marker-yv: yv-n
    - type: text
      text: 'and Hermogenes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: His name means “born of Hermes,” a pagan god.
      marker-yv: yv-n
    - type: text
      text: 'and all the believers of Asia have deserted me because of my imprisonment. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nevertheless, so many times Onesiphorus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: His name means “one who brings profit” or “profitable” or “help-bringer.” The Orthodox tradition recognizes Onesiphorus as one of the seventy disciples chosen and sent by Jesus to preach. He became a bishop at Colophon (Asia Minor) and later at Corinth. Both the Orthodox and Roman Catholic churches hold that he died a martyr outside of Ephesus in the city of Parium.
      marker-yv: yv-n
    - type: text
      text: 'was like a breath of fresh air to me and never seemed to be ashamed of my chains. May our Lord Jesus bestow compassion and mercy upon him and his household. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For when he arrived in Rome, he searched and searched for me until he found out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where I was being held, so that he could minister to me
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'just like he did so wonderfully as I rested in his house '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an alternate translation of the Aramaic words found in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This translation has placed them here for the sake of the English narrative.
      marker-yv: yv-n
    - type: text
      text: while in Ephesus, as you well know.
  - type: usfm
    marker: p
    children:
    - type: text
      text: May Jesus, our Master, give him abundant mercy in the day he stands before him.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My beloved son, I pray for a greater release of God’s grace, love, and total well-being to flow into your life from God our Father and from our Lord Jesus Christ!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You know that I’ve been called to serve the God of my fathers with a clean conscience. Night and day I pray constantly for you, building a memorial for you with my prayers. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I know that you have wept for me, your spiritual father, and your tears are dear to me. I can’t wait to see you again! I’m filled with joy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'as I think of your strong faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that was passed down through your family line
    - type: text
      text: . It began with your grandmother Lois, who passed it on to your dear mother, Eunice. And it’s clear that you too are following in the footsteps of their godly example.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy and the Holy Spirit
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I’m writing to encourage you to fan into a flame and rekindle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “excite the gift” or “awake the gift.”
      marker-yv: yv-n
    - type: text
      text: 'the fire of the spiritual gift God imparted to you when I laid my hands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: upon you
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For God will never give you the spirit of fear, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, fearing men. The fear of God prevents us from fearing others.
      marker-yv: yv-n
    - type: text
      text: 'but the Holy Spirit who gives you mighty power, love, and self-control. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can also be translated “revelation-light,” or “instruction.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So never be ashamed of the testimony of our Lord, nor be embarrassed over my imprisonment, but overcome every evil by the revelation of the power of God! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with the gospel and the power of God.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He gave us resurrection life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He is our life-giver.”
      marker-yv: yv-n
    - type: text
      text: 'and drew us to himself by his holy calling on our lives. And it wasn’t because of any good we have done, but by his divine pleasure and marvelous grace that confirmed our union with the anointed Jesus, even before time began! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “before the time of the ages.”
      marker-yv: yv-n
