document_id: 2TI.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: From Paul, an apostle of Jesus the Messiah, appointed by God’s pleasure to announce the wonderful promise of life found in Jesus, the anointed Messiah.
  '10':
  - type: text
    content: 'This truth is now being unveiled by the revelation of the anointed Jesus, our life-giver, who has dismantled death, '
  - type: text
    content: obliterating all its effects on our lives
  - type: text
    content: ', and has manifested his immortal life in us by the gospel.'
  - type: heading
    content: Paul and His Gospel Ministry
  '11':
  - type: text
    content: 'And he has anointed '
  - type: note
    content: Or “consecrated.”
  - type: text
    content: 'me as his preacher, his apostle, and his teacher of truth to the nations. '
  '12':
  - type: text
    content: 'The confidence of my calling enables me to overcome every difficulty without shame, for I have an intimate revelation of this God. And my faith in him convinces me that he is more than able to keep all that I’ve placed in his hands '
  - type: note
    content: Or “what he has entrusted to me.”
  - type: text
    content: safe and secure until the fullness of his appearing.
  '13':
  - type: text
    content: 'Allow the healing words you’ve heard from me to live in you and make them a model for life as your faith and love for the Anointed One '
  - type: text
    content: grows even more
  - type: text
    content: '. '
  '14':
  - type: text
    content: Guard well this incomparable treasure by the Spirit of Holiness living within you.
  '15':
  - type: text
    content: 'Perhaps you’ve heard that Phygelus, '
  - type: note
    content: His name means “fugitive.”
  - type: text
    content: 'and Hermogenes '
  - type: note
    content: His name means “born of Hermes,” a pagan god.
  - type: text
    content: 'and all the believers of Asia have deserted me because of my imprisonment. '
  '16':
  - type: text
    content: 'Nevertheless, so many times Onesiphorus '
  - type: note
    content: His name means “one who brings profit” or “profitable” or “help-bringer.” The Orthodox tradition recognizes Onesiphorus as one of the seventy disciples chosen and sent by Jesus to preach. He became a bishop at Colophon (Asia Minor) and later at Corinth. Both the Orthodox and Roman Catholic churches hold that he died a martyr outside of Ephesus in the city of Parium.
  - type: text
    content: 'was like a breath of fresh air to me and never seemed to be ashamed of my chains. May our Lord Jesus bestow compassion and mercy upon him and his household. '
  '17':
  - type: text
    content: 'For when he arrived in Rome, he searched and searched for me until he found out '
  - type: text
    content: where I was being held, so that he could minister to me
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'just like he did so wonderfully as I rested in his house '
  - type: note
    content: This is an alternate translation of the Aramaic words found in v. 16. This translation has placed them here for the sake of the English narrative.
  - type: text
    content: while in Ephesus, as you well know.
  - type: text
    content: May Jesus, our Master, give him abundant mercy in the day he stands before him.
  '2':
  - type: text
    content: My beloved son, I pray for a greater release of God’s grace, love, and total well-being to flow into your life from God our Father and from our Lord Jesus Christ!
  '3':
  - type: text
    content: 'You know that I’ve been called to serve the God of my fathers with a clean conscience. Night and day I pray constantly for you, building a memorial for you with my prayers. '
  '4':
  - type: text
    content: 'I know that you have wept for me, your spiritual father, and your tears are dear to me. I can’t wait to see you again! I’m filled with joy '
  '5':
  - type: text
    content: 'as I think of your strong faith '
  - type: text
    content: that was passed down through your family line
  - type: text
    content: . It began with your grandmother Lois, who passed it on to your dear mother, Eunice. And it’s clear that you too are following in the footsteps of their godly example.
  - type: heading
    content: Timothy and the Holy Spirit
  '6':
  - type: text
    content: 'I’m writing to encourage you to fan into a flame and rekindle '
  - type: note
    content: Literally “excite the gift” or “awake the gift.”
  - type: text
    content: 'the fire of the spiritual gift God imparted to you when I laid my hands '
  - type: text
    content: upon you
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'For God will never give you the spirit of fear, '
  - type: note
    content: That is, fearing men. The fear of God prevents us from fearing others.
  - type: text
    content: 'but the Holy Spirit who gives you mighty power, love, and self-control. '
  - type: note
    content: The Aramaic can also be translated “revelation-light,” or “instruction.”
  '8':
  - type: text
    content: 'So never be ashamed of the testimony of our Lord, nor be embarrassed over my imprisonment, but overcome every evil by the revelation of the power of God! '
  - type: note
    content: Or “with the gospel and the power of God.”
  '9':
  - type: text
    content: 'He gave us resurrection life '
  - type: note
    content: Or “He is our life-giver.”
  - type: text
    content: 'and drew us to himself by his holy calling on our lives. And it wasn’t because of any good we have done, but by his divine pleasure and marvelous grace that confirmed our union with the anointed Jesus, even before time began! '
  - type: note
    content: Literally “before the time of the ages.”
