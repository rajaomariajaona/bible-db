      children:
      - type: text
        text: On the surface, the Hebrew text reads simply “the men rowed to get back to dry land [the shore].” However, the verb used to denote “to row” is a colorful one (
    - type: usfm
      marker: it
      children:
      - type: text
        text: chatar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which carries the nuance of “digging into the water with oars.” This implies strenuous effort, hence the appropriate use of the adverbial phrase “frantically trying to return to the shore.” Their labor ended in failure given the turbulent sea they had to contend with.
    marker-yv: yv-n
  - type: text
    text: 'but they got nowhere. All the while, the sea was raging even wilder than before. '
