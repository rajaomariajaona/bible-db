      - type: text
        text: Or “prepared,” as translated from the Vulgate, Arabic, Syriac, and Targum. In the Hebrew Bible, this verse is the first verse of ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JON.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. There are numerous serendipitous events in Jonah: the ship in Joppa going to Tarshish, the surprising storm at sea, and now the fish directed by God to swallow Jonah. Later, the plant, the worm, and the hot wind will also confirm that God was behind all that happened to his prophet.'
    marker-yv: yv-n
  - type: text
    text: 'a huge fish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to be at that very spot
  - type: text
    text: ' in order to swallow Jonah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is apparent that God was in control of the sea and the storm, and this verse shows him in control of the huge fish. Whatever kind of fish this was, it was more obedient to God than Jonah was. One ancient Jewish tradition states that God created this unique fish on the fifth day of creation and preserved it in readiness for Jonah. See Pirqe Rabbi Eliezer 10.
    marker-yv: yv-n
  - type: text
    text: 'And Jonah was kept alive in the stomach of the fish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The story is replete with miracles. The fish was at the spot where Jonah was thrown overboard and sank into the ocean. The fish swallowed Jonah not to eat him but to shelter him. There are two miracles that may have happened. One, God kept Jonah alive, preserving him from being killed when swallowed and sustaining his life inside the fish. However, it is possible that Jonah died inside the fish and was miraculously resurrected by God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:2
      metadata:
        usfm: JON.2.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The word for “stomach” could be translated “womb,” a possible reference not to the fish’s belly but to the “womb of the grave.” The God who raised Jesus from the dead after three days could raise Jonah from the dead as well. Regardless, even while running away from God, Jonah experienced the miracle-love of God.
    marker-yv: yv-n
