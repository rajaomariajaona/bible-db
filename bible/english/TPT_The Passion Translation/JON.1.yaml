        text: .” It is difficult to be certain of the exact location of Tarshish. Some have suggested the island of Crete, but more likely, Tarshish was the farthest western location known at that time, on the Iberian Peninsula in southern Spain. What stands out is not simply the location of Tarshish but also Jonah’s desire to get as far away as he possibly could from God’s presence. Perhaps Jonah thought that God had given him an impossible task of going alone to an enemy nation and proclaiming her doom. Jonah was filled with fear and unbelief. However, disobedience to God is never an option.
    marker-yv: yv-n
