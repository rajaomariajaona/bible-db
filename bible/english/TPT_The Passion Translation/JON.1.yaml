    - type: usfm
      marker: ft
      children:
      - type: text
        text: Notice how many times Jonah went “down.” He went down to Joppa, down below deck, and lay down to sleep. Soon he will go down into the sea and down into the belly of the fish. The path of disobedience is a downward slope. But thankfully for Jonah (and for us), God heard his cry of despair and rescued him.
    marker-yv: yv-n
  - type: text
