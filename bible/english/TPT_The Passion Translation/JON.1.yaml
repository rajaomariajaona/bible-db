        text: These seasoned sailors were all of different nationalities, and each with a god (idol) they worshiped. Sadly, there is no mention yet of Jonah crying out to the true God.
    marker-yv: yv-n
  - type: text
    text: 'In order to lighten the ship they hurled the cargo and tackle overboard. Jonah, however, had gone down below and lain down '
