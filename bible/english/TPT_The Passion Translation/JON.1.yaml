document_id: JON.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Disobeys Yahweh
  - type: text
    content: 'One day '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed to Jonah, '
  - type: note
    content: Or “The word of Yahweh came to Jonah.” Jonah means “dove.” Jonah is mentioned in 2 Kings 14:25 and by Jesus in Matt. 12:39–41 and in Luke 11:29–32. According to Jewish tradition, Jonah was the son of the widow of Zarephath, whom Elijah raised from the dead (see 1 Kings 17:8–24). Additionally, Jonah is credited with the anointing of Jehu (see 2 Kings 9:1–10). See Seder Olam Rabbah 18.
  - type: text
    content: 'Amittai’s son, this message: '
  '10':
  - type: text
    content: Jonah added, “
  - type: text
    content: I am his prophet
  - type: text
    content: ', but I’m trying to escape from him.”'
  - type: note
    content: Or “The sailors knew that Jonah was running away from Yahweh because he had already told them earlier.”
  - type: text
    content: 'Hearing this, the sailors were gripped with fear '
  - type: note
    content: Or “the sailors feared a great fear.”
  - type: text
    content: 'and said, “What terrible thing have you done? '
  - type: note
    content: Or “What terrible thing did you do [to cause this]?”
  '11':
  - type: text
    content: What can we do to you to make the sea calm down for us?” Even as they spoke, the storm and waves were getting worse and worse.
  - type: note
    content: Or “the sea was walking and storming.”
  '12':
  - type: text
    content: Then Jonah said, “It’s all my fault that you are caught in this violent storm. So just pick me up and throw me into the sea, and it will calm down for you.”
  '13':
  - type: text
    content: Reluctant to sacrifice Jonah
  - type: text
    content: ', the sailors rowed frantically trying to return to shore, '
  - type: note
    content: On the surface, the Hebrew text reads simply “the men rowed to get back to dry land [the shore].” However, the verb used to denote “to row” is a colorful one (chatar), which carries the nuance of “digging into the water with oars.” This implies strenuous effort, hence the appropriate use of the adverbial phrase “frantically trying to return to the shore.” Their labor ended in failure given the turbulent sea they had to contend with.
  - type: text
    content: 'but they got nowhere. All the while, the sea was raging even wilder than before. '
  '14':
  - type: text
    content: Losing hope
  - type: text
    content: ', they began to pray to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and said, “Please, '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: God of Jonah
  - type: text
    content: ', don’t let us perish on account of Jonah. And don’t hold it against us for throwing this man overboard. For you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have acted in accordance with your will.”'
  '15':
  - type: text
    content: 'So the sailors took hold of Jonah and tossed him into the '
  - type: text
    content: foaming
  - type: text
    content: ' sea. '
  - type: text
    content: Then all at once
  - type: text
    content: ', the sea stopped raging. '
  '16':
  - type: text
    content: 'Awestruck, the men were gripped with the fear of '
  - type: text
    content: Yahweh
  - type: text
    content: ', and they made vows and offered sacrifices to '
  - type: text
    content: Jonah’s God
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: A Huge Fish Swallows Jonah
  '17':
  - type: text
    content: 'Meanwhile, '
  - type: text
    content: Yahweh
  - type: text
    content: ' directed '
  - type: note
    content: 'Or “prepared,” as translated from the Vulgate, Arabic, Syriac, and Targum. In the Hebrew Bible, this verse is the first verse of ch. 2. There are numerous serendipitous events in Jonah: the ship in Joppa going to Tarshish, the surprising storm at sea, and now the fish directed by God to swallow Jonah. Later, the plant, the worm, and the hot wind will also confirm that God was behind all that happened to his prophet.'
  - type: text
    content: 'a huge fish '
  - type: text
    content: to be at that very spot
  - type: text
    content: ' in order to swallow Jonah. '
  - type: note
    content: It is apparent that God was in control of the sea and the storm, and this verse shows him in control of the huge fish. Whatever kind of fish this was, it was more obedient to God than Jonah was. One ancient Jewish tradition states that God created this unique fish on the fifth day of creation and preserved it in readiness for Jonah. See Pirqe Rabbi Eliezer 10.
  - type: text
    content: 'And Jonah was kept alive in the stomach of the fish '
  - type: note
    content: The story is replete with miracles. The fish was at the spot where Jonah was thrown overboard and sank into the ocean. The fish swallowed Jonah not to eat him but to shelter him. There are two miracles that may have happened. One, God kept Jonah alive, preserving him from being killed when swallowed and sustaining his life inside the fish. However, it is possible that Jonah died inside the fish and was miraculously resurrected by God (see 2:2). The word for “stomach” could be translated “womb,” a possible reference not to the fish’s belly but to the “womb of the grave.” The God who raised Jesus from the dead after three days could raise Jonah from the dead as well. Regardless, even while running away from God, Jonah experienced the miracle-love of God.
  - type: text
    content: for three days and three nights.
  - type: note
    content: See Matt. 12:40.
  '2':
  - type: text
    content: '“Arise! Leave at once for the great city of Nineveh '
  - type: note
    content: Nineveh (modern Mosul, Iraq) was the capital and most populous city of the Assyrian Empire. Although Jonah does not give us details of the wickedness of Nineveh, the book of Nahum does (see Nah. 2:12–13; 3:1–5, 19). Some scholars believe the name Nineveh means “city of Ninus,” who was believed to be the mythical founder of Assyria. Others see its meaning as “house of fish” or think the city was named after a fish goddess. Nineveh was for decades the largest city in the known world. Genesis 10:11 states that Nimrod built the city of Nineveh. At least one ancient tradition is that Nineveh was Noah’s hometown. God called Nineveh “great.”
  - type: text
    content: and proclaim judgment against her, for the wickedness of her people is staring me in the face.”
  - type: note
    content: Or “its evil has ascended before me.” See Ex. 2:23; 1 Sam. 5:12; 2 Kings 19:28; Ps. 74:23; Isa. 37:29; Jer. 14:2.
  '3':
  - type: text
    content: 'But Jonah bolted and ran in '
  - type: text
    content: the opposite direction
  - type: text
    content: ', determined to run away from the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: '. He went down to the coastal city of Joppa and found a ship bound for Tarshish. He paid his fare, '
  - type: note
    content: There is always a price to pay for disobedience to God.
  - type: text
    content: 'went down into the hold of the ship, and set sail for Tarshish to flee from the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: Or “from the face of Yahweh.” It is difficult to be certain of the exact location of Tarshish. Some have suggested the island of Crete, but more likely, Tarshish was the farthest western location known at that time, on the Iberian Peninsula in southern Spain. What stands out is not simply the location of Tarshish but also Jonah’s desire to get as far away as he possibly could from God’s presence. Perhaps Jonah thought that God had given him an impossible task of going alone to an enemy nation and proclaiming her doom. Jonah was filled with fear and unbelief. However, disobedience to God is never an option.
  '4':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' unleashed a powerful, violent wind on the sea. The ship was caught in such a great tempest that it was in jeopardy of shattering. '
  '5':
  - type: text
    content: 'The sailors were terrified. Each of them began to call on his own god for help. '
  - type: note
    content: These seasoned sailors were all of different nationalities, and each with a god (idol) they worshiped. Sadly, there is no mention yet of Jonah crying out to the true God.
  - type: text
    content: 'In order to lighten the ship they hurled the cargo and tackle overboard. Jonah, however, had gone down below and lain down '
  - type: note
    content: Notice how many times Jonah went “down.” He went down to Joppa, down below deck, and lay down to sleep. Soon he will go down into the sea and down into the belly of the fish. The path of disobedience is a downward slope. But thankfully for Jonah (and for us), God heard his cry of despair and rescued him.
  - type: text
    content: in the hold and was fast asleep.
  - type: note
    content: 'This is not the usual Hebrew word for “sleep” but a word used to denote a deep sleep, often a supernatural sleep. See Gen. 15:12; 1 Sam. 26:12. The Septuagint translates the verb as “snore.” Nothing could be more exhausting than running from God. Jesus also slept during a storm but for a different reason: he was unafraid.'
  '6':
  - type: text
    content: 'The captain went '
  - type: text
    content: below
  - type: text
    content: ' and asked Jonah, “How can you be sleeping so soundly at a time like this? Get up! Call on your god! Maybe he will feel sorry for us '
  - type: note
    content: Or “he will take notice of us.”
  - type: text
    content: and not leave us to die.”
  '7':
  - type: text
    content: 'Then the sailors said to each other, “Come on. Let’s cast lots to find out who is to blame for bringing us this calamity.” '
  - type: note
    content: In the ancient world, it was commonly believed that a ship could be endangered by having a guilty person on board.
  - type: text
    content: They cast lots, and the lot pointed to Jonah.
  - type: note
    content: God is radically involved in the world, this time even in the casting of lots. See the calling of Matthias in Acts 1:15–26.
  '8':
  - type: text
    content: 'So they interrogated him. “Tell us,” '
  - type: note
    content: 'Some Hebrew manuscripts insert here: “Who is to blame for this disaster?” A few Hebrew and Greek manuscripts leave this sentence out, perhaps because of its repetitive information since the casting of lots revealed that this was Jonah’s fault.'
  - type: text
    content: they said, “what is the purpose of your journey? Where do you come from? What is your country, and who are your people?”
  '9':
  - type: text
    content: '“I’m a Hebrew,” he replied. “I worship the God of heaven, the Creator of both sea and dry land. '
  - type: text
    content: His name is
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: '.” '
