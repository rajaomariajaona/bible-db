      text: • Hebrews
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Although each letter was written to a specific church or person or group, they were meant to be circular letters read by all the churches. Scholars believe they were all written within a span of less than fourteen years and are meant to bring all believers into the beautiful discovery of God’s plan for their lives. They empower us today to live our lives with deep conviction of truth, faith, and love—overcoming every enemy and being victorious in Christ in all things. Amen!
