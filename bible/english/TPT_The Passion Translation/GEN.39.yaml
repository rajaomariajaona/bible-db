      - type: text
        text: )! He not only adjusted to living in Egypt but also flourished and became the personal attendant (administrator) of Potiphar’s affairs and eventually the supervisor of the penal system. Joseph would never have been given such an honor if he had not demonstrated a high degree of integrity and faithfulness. Everyone could see that God was with Joseph. He that was faithful over a few things was now being made a ruler over much. See
