        text: Joseph had a God-favored life. A study of the life of Joseph is a study of the favor of God. He was faithful as a son, a shepherd, and a servant. He was diligent in all that he did. Wisdom guided him, even in a strange land, and everything he did prospered (see
    - type: usfm
