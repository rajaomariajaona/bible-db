      - type: text
        text: The text does not say with whom Potiphar was furious. Perhaps he knew his wife’s promiscuous ways. He had Joseph only thrown into prison when a man with his authority could have had him killed. Perhaps he doubted the truth of her story, but to save face, he had Joseph imprisoned. According to the
    - type: usfm
