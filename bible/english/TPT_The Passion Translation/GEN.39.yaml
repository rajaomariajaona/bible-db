      - type: text
        text: Joseph understood the great favor shown to him and could not violate the trust of his master. He valued Potiphar’s trust in him. Joseph knew that he was elevated to a place of honor; nothing was held back from him. Joseph had self-respect and respected Potiphar’s wife. Though she was evil, he was honorable toward her.
    marker-yv: yv-n
  - type: text
    text: nor has he kept anything back from me except you, because you’re his wife. Why would I want to do such an immoral thing and sin against God?”
