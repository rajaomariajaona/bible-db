document_id: GEN.39,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Serves Potiphar
  - type: text
    content: 'After the Ishmaelite traders brought Joseph down to Egypt, he was purchased by an Egyptian officer '
  - type: note
    content: This is actually the Hebrew word for “eunuch.” In Egyptian culture, the key officials surrounding the king were made eunuchs to prevent them from having sons that would compete for the throne. This may help the reader understand why Potiphar’s wife chased after Joseph later in the chapter.
  - type: text
    content: 'of Pharaoh, the captain of the guard, whose name was Potiphar. '
  - type: note
    content: Potiphar means “given by the sun-god Ra” or “one who belongs to the sun-god Ra.”
  '10':
  - type: text
    content: 'Yet day after day, she was determined to seduce him. But Joseph continually refused her advances and would not even go near her. '
  '11':
  - type: text
    content: 'Then one day, when he had to go into the house to do his work and no one else was there, '
  '12':
  - type: text
    content: 'she grabbed him by his robe and said, “Come on, sleep with me!” But he abruptly ran out of the house, leaving his robe in her hands! '
  - type: note
    content: Interestingly, the triliteral Hebrew root for “robe,” b-g-d, has a homonym meaning “marital fidelity.” There are times when running is the mark of a coward, and there are times when running is the mark of courage. Joseph would rather run in embarrassment than linger, falling into the trap of sexual promiscuity (see 1 Thess. 4:3–8). Self-control is a true sign of integrity. It is better to lose a good coat than a good conscience! He may have lost his coat, but Joseph kept his character. If the Lord has destined you for greatness, if God has a work for you to do, there should be no surprise when this kind of temptation comes to you.
  '13':
  - type: text
    content: 'Realizing he had fled, and she was holding his robe in her hands, '
  '14':
  - type: text
    content: 'she called for her household servants and said to them, “See! My husband brings this Hebrew foreigner here to make fools of us! '
  - type: note
    content: Or “to play with us,” a possible euphemism for having sex with them.
  - type: text
    content: 'He barged into my house and tried to have sex with me, and I screamed; '
  '15':
  - type: text
    content: and when he heard me scream for help, he ran out of the house and left his robe!”
  '16':
  - type: text
    content: 'She kept the robe beside her until his master came home '
  '17':
  - type: text
    content: 'and she told him the same story: “This Hebrew foreigner you brought among us barged into the house and tried to violate me. '
  '18':
  - type: text
    content: As soon as I screamed out for help, he ran outside and left his robe here beside me.”
  - type: heading
    content: Joseph Goes to Prison
  '19':
  - type: text
    content: 'When his master heard his wife’s account about how his servant had treated her, he became furious. '
  - type: note
    content: The text does not say with whom Potiphar was furious. Perhaps he knew his wife’s promiscuous ways. He had Joseph only thrown into prison when a man with his authority could have had him killed. Perhaps he doubted the truth of her story, but to save face, he had Joseph imprisoned. According to the Yalkut Shimoni, Asenath, the daughter of Potiphar, did her best to convince her father of Joseph’s innocence and what really happened. Later, when Joseph was freed from prison, Asenath became Joseph’s wife.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: '’s '
  - type: text
    content: presence
  - type: text
    content: ' was with Joseph and he became successful '
  - type: note
    content: Or “prosperous.” The implication is that Joseph excelled in everything. God’s presence and favor do more for us than our skill, intelligence, and cleverness could achieve. God had his hand in everything that happened to Joseph, and he has his hand in everything that happens to you (see Rom. 8:28).
  - type: text
    content: 'while living in the house of his Egyptian master. '
  '20':
  - type: text
    content: 'So Joseph’s master took him and threw him into prison, the place where the king’s prisoners are confined, and he was left there. '
  - type: note
    content: In Ps. 105:17–18 we learn that Joseph’s feet were in chains and an iron collar was placed on his neck (or “his soul”). It would be hard to imagine a lower point in Joseph’s life. Betrayed by his brothers, sold as slave, and falsely accused, he suffered for a season until his time of deliverance arrived. As hard as it may seem, God may allow others to take advantage of us in order to carry out his secret will for our life. He will let us look like a fool in order to perfect our character. This is “the place where [our King’s] prisoners are confined” (Gen. 39:20; see Eph. 4:1)!
  '21':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' was with Joseph and demonstrated to him his faithful love by giving him great favor in the sight of the warden. '
  '22':
  - type: text
    content: 'The warden put all the prisoners under Joseph’s care; he was placed in charge of all the prisoners and everything in the prison. '
  '23':
  - type: text
    content: 'The warden had no worries about the prison with Joseph in charge, because '
  - type: text
    content: Yahweh
  - type: text
    content: ’s presence was with Joseph and caused everything Joseph did to prosper.
  - type: note
    content: Joseph had a God-favored life. A study of the life of Joseph is a study of the favor of God. He was faithful as a son, a shepherd, and a servant. He was diligent in all that he did. Wisdom guided him, even in a strange land, and everything he did prospered (see Ps. 1:3)! He not only adjusted to living in Egypt but also flourished and became the personal attendant (administrator) of Potiphar’s affairs and eventually the supervisor of the penal system. Joseph would never have been given such an honor if he had not demonstrated a high degree of integrity and faithfulness. Everyone could see that God was with Joseph. He that was faithful over a few things was now being made a ruler over much. See Matt. 25:21.
  '3':
  - type: text
    content: 'When his master realized that '
  - type: text
    content: Yahweh
  - type: text
    content: '’s '
  - type: text
    content: presence
  - type: text
    content: ' was with Joseph '
  - type: note
    content: The Talmud teaches that the Hebrew text should be translated as “Yahweh was continually on Joseph’s lips”; in other words, Potiphar noted that Joseph did everything as unto God and gave him the glory. There is something trustworthy about a person with no agenda other than to give God glory in everything.
  - type: text
    content: 'and caused everything he did to prosper, '
  '4':
  - type: text
    content: 'Joseph found favor with Potiphar. He was quickly promoted to become the overseer of Potiphar’s house and was put in charge of all that he had. '
  '5':
  - type: text
    content: 'From the moment Potiphar appointed Joseph over his household, '
  - type: text
    content: Yahweh
  - type: text
    content: ' blessed the Egyptian’s affairs for Joseph’s sake. The blessing of '
  - type: text
    content: Yahweh
  - type: text
    content: ' was upon everything Potiphar owned; his finances increased, his crops flourished, and his flocks and herds multiplied. '
  - type: note
    content: Or “everything Potiphar owned, at home and in the field.”
  '6':
  - type: text
    content: So Potiphar placed all that he owned under Joseph’s oversight. And with Joseph in charge, Potiphar had nothing to worry about, except deciding on what to eat!
  - type: note
    content: Or possibly a figure of speech for “his private affairs,” or euphemistically for “his wife.”
  - type: heading
    content: Joseph and Potiphar’s Wife
  - type: text
    content: 'Now Joseph was '
  - type: text
    content: strikingly
  - type: text
    content: ' handsome, very good-looking, and well-built. '
  - type: note
    content: No other man is described in these terms in the Bible; however the Hebrew phrase is nearly identical to the description of Rachel (see Gen. 29:17).
  '7':
  - type: text
    content: 'It wasn’t long before his master’s wife '
  - type: note
    content: Although unnamed, Hebrew tradition identifies Potiphar’s wife as Zuleika. As an Egyptian aristocrat, she was no doubt a beautiful woman.
  - type: text
    content: 'noticed Joseph. She demanded: “Come make love to me.”'
  '8':
  - type: text
    content: '“Never!” Joseph replied. “Don’t you realize that my master has nothing to worry about with me in charge, for he has put everything he has under my care? '
  '9':
  - type: text
    content: 'There is no one greater in his household than me, '
  - type: note
    content: Joseph understood the great favor shown to him and could not violate the trust of his master. He valued Potiphar’s trust in him. Joseph knew that he was elevated to a place of honor; nothing was held back from him. Joseph had self-respect and respected Potiphar’s wife. Though she was evil, he was honorable toward her.
  - type: text
    content: nor has he kept anything back from me except you, because you’re his wife. Why would I want to do such an immoral thing and sin against God?”
