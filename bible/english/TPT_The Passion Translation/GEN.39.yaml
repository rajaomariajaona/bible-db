      - type: text
        text: we learn that Joseph’s feet were in chains and an iron collar was placed on his neck (or “his soul”). It would be hard to imagine a lower point in Joseph’s life. Betrayed by his brothers, sold as slave, and falsely accused, he suffered for a season until his time of deliverance arrived. As hard as it may seem, God may allow others to take advantage of us in order to carry out his secret will for our life. He will let us look like a fool in order to perfect our character. This is “the place where [our King’s] prisoners are confined” (
