    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'You must distribute it as an inheritance for yourselves and the resident aliens who live among you, who have their children among you, since you must treat them as citizens of Israel. They must receive a share of the land for their inheritance with you among the tribes of Israel. '
  '23':
  - type: usfm
