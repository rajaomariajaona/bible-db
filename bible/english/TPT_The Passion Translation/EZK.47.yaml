    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In whatever tribe the resident alien resides, that is where you will assign his share. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The man holding his measuring line walked east and measured off a thousand cubits. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About a third of a mile (1,750 feet; 530 meters). Three times Ezekiel uses this phrase in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Then he made me wade across the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shallow
    - type: text
      text: ' water, and it was ankle deep. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The river flowing “ankle deep” points to our walk in Christ. As we walk in the Spirit-River of life, our lives are changed. The first miracle of the apostles in the book of Acts helped a man lame in his ankles sitting at the temple’s Beautiful Gate, the gate through which this river flowed. He was immediately healed and was able to walk and enter the temple for the first time in his life. Ezekiel’s Temple began its process of being rebuilt as the lame beggar waded into the river of God pouring out from the apostles. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 3:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He measured off another thousand cubits and told me to wade across the stream again; the water was up to my knees. '
    - type: usfm
      marker: f
