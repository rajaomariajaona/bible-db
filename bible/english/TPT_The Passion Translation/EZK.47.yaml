      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The knee-deep river of God points symbolically to a life of prayer. We bow our knees before the Father of Glory and enter into the flow of life through prayer (
      - type: text
        text: Ezra 9:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
