        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'He measured off another thousand cubits and made me wade across the stream again, and the water was up to my waist. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The waist-deep river of God points symbolically to what we produce or give birth to, for the water soaks the reproductive organs. When the life-giving Spirit-River reaches our loins, we begin bearing the fruit of the Spirit, spiritual offspring, and enduring works that glorify God.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He measured off another thousand; it was now a river '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over my head
    - type: text
      text: ', which I was unable to swim across. It was a deep swollen river—a river no one could cross.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man said to me, “Son of man, do you see this?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: No doubt Ezekiel was stunned by seeing a stream start as a trickle and end up becoming an impassable river. The rhetorical question that was posed to Ezekiel could be made into an emphatic statement, by saying, “Son of man, pay close attention to the miracle you just witnessed! Get this revelation!” A river over your head points to the revelation of the Holy Spirit that is deep and limitless, which cannot be humanly “crossed over” or understood without divine help. This deep river is flowing in us today and will cause us to go beyond the earthly realm into God’s life in the Spirit (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 2:1–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). When the river is this deep, we will become totally dependent upon the Holy Spirit to teach, guide, and empower us. Human intellect will not be able to fathom the depth of this Spirit-River.
      marker-yv: yv-n
    - type: text
      text: Then he brought me back to the riverbank.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication of this sentence is that Ezekiel was in the river and had to return to the bank.
      marker-yv: yv-n
