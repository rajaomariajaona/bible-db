    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: However, its swamps and marshes will not become healed but will be left for salt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse illustrates a significant interpretive feature of this vision, namely, that it is not a picture of ecological perfection. The statement that the swamps and marshes will not be purified by the remarkable river flowing down from the Jerusalem temple but will be left as stagnant pools, polluted by excessive salt, reflects a less than perfect renewal. Now, while this vision describes a truly remarkable transformation of the land of promise, and the ecological purification of the Dead Sea, it is incomplete. The language of this vision is couched in terms of revived natural vegetation, ecology, and wildlife—marine creatures in particular—but the full realization of this divine transformation will not come about until the return of the Lord Jesus. And that vision is given to us in the final two chapters of Holy Scripture—
      - type: text
        text: Rev. 21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is there—and only there—that the full and perfect consummation of God’s redemptive plans and purposes for his people is revealed. And significantly, while explicit images of Ezekiel’s vision are retained in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 22:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the full import of John’s vision is profoundly spiritual and transcends the physical realities of a fallen world that will one day be renewed and transformed forever.'
      marker-yv: yv-n
