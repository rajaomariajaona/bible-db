document_id: EZK.47,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Life-Giving River Flows from the Temple
  - type: text
    content: 'Then the '
  - type: text
    content: shining
  - type: text
    content: ' man brought me back to the entrance of the temple, and I saw water flowing '
  - type: note
    content: Today, the temple of God is the church, the Holy of Holies on the earth today (see 1 Cor. 3:16; Eph. 2:19–22). This river can be a picture of the life-giving flow of the Holy Spirit, who becomes “rivers” pouring through us, his temple (see John 7:37–39; see also Gen. 2:10–14; Pss. 1:3; 46:4; 65:9; Song. 4:12; Isa. 66:12; Rev. 22:1–2). This river heals as it flows; it brings life as it grows deeper.
  - type: text
    content: 'from underneath the temple threshold. It was flowing eastward (for the temple faced east). '
  - type: note
    content: 'There is a vast water table beneath the Temple Mount in Israel. In the Letter of Aristeas, dated circa 100 BC, there is mention of a spring on the Temple Mount inside the enclosure of the temple area. The many sacrifices and purification rites (involving mikveh, immersion pools used for ceremonial cleansing of Jewish worshipers) required much water. It is also possible that past earthquakes have capped underground springs and reservoirs in Jerusalem. (See G. A. Cooke, A Critical and Exegetical Commentary on the Book of Ezekiel, The International Critical Commentary [Edinburgh: T & T Clark, 1985], 517–18; see also L. Ritmeyer, “Locating the Original Temple Mount,” Biblical Archaeology Review 18, no. 2 [1992]: 34–36, which includes various locations of cisterns [reservoirs] on the Temple Mount.)'
  - type: text
    content: 'Water was trickling out from the south side of the temple, south of the altar. '
  '10':
  - type: text
    content: 'Fishermen '
  - type: note
    content: This healing river of God’s Spirit brings life. It points us to the gospel being preached by the Lord’s “fishermen,” his kingdom evangelists (see Matt. 4:19 and footnote).
  - type: text
    content: 'will crowd its banks and spread their nets from En-Gedi '
  - type: note
    content: En-Gedi means “the fountain of the kid.”
  - type: text
    content: 'to En-Eglaim. '
  - type: note
    content: En-Eglaim may possibly be Ain-el-Feshkah, a village on the northwest end of the Dead Sea. En-Eglaim means “fountains of two calves” or “fountain of two pools.”
  - type: text
    content: 'They will catch as many species of fish as there are in the Great Sea. '
  - type: note
    content: That is, the Mediterranean Sea (see vv. 15, 19, 20).
  '11':
  - type: text
    content: However, its swamps and marshes will not become healed but will be left for salt.
  - type: note
    content: This verse illustrates a significant interpretive feature of this vision, namely, that it is not a picture of ecological perfection. The statement that the swamps and marshes will not be purified by the remarkable river flowing down from the Jerusalem temple but will be left as stagnant pools, polluted by excessive salt, reflects a less than perfect renewal. Now, while this vision describes a truly remarkable transformation of the land of promise, and the ecological purification of the Dead Sea, it is incomplete. The language of this vision is couched in terms of revived natural vegetation, ecology, and wildlife—marine creatures in particular—but the full realization of this divine transformation will not come about until the return of the Lord Jesus. And that vision is given to us in the final two chapters of Holy Scripture—Rev. 21–22. It is there—and only there—that the full and perfect consummation of God’s redemptive plans and purposes for his people is revealed. And significantly, while explicit images of Ezekiel’s vision are retained in Rev. 22:1, the full import of John’s vision is profoundly spiritual and transcends the physical realities of a fallen world that will one day be renewed and transformed forever.
  '12':
  - type: text
    content: “Along both banks of the river, every kind of fruit tree will flourish. And their leaves will never wither, and abundant fruit will always be on their branches. Each month they will bear a fresh crop of fruit because this life-giving water comes from inside the sanctuary. And their fruit will be good to eat, and the leaves will bring healing.”
  - type: note
    content: See Rev. 22:1–2 for the fulfillment of this phenomenon.
  - type: heading
    content: The Boundaries of the Holy Land
  '13':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “Behold, here are the territorial boundaries for your distribution of land among the twelve tribes of Israel. Joseph shall receive a double portion. '
  - type: note
    content: Joseph’s two portions would remind Israel’s tribes that Joseph’s family line divided into two tribes, Manasseh and Ephraim. There was no “tribe of Joseph” but of his two sons.
  '14':
  - type: text
    content: You will each have a fair share of it since I swore to your ancestors that I would give it to them. So now, this land will belong to you as family property.
  '15':
  - type: text
    content: '“These will be the borders of the land. '
  - type: note
    content: Verses 15–20 are similar to the division of the land under Moses in Num. 34:1–12. It will help to compare these two passages, especially in light of the textual difficulty in understanding exact locations found here in Ezekiel’s account (see the footnotes for Ezek. 47:15–18).
  - type: text
    content: 'The northern border starts at the Mediterranean Sea and stretches '
  - type: text
    content: east
  - type: text
    content: ' along the road to '
  - type: text
    content: the town of
  - type: text
    content: ' Hethlon, '
  - type: note
    content: Possibly modern Haitela.
  - type: text
    content: 'through Hamath Pass, to '
  - type: text
    content: the town of
  - type: text
    content: ' Zedad, '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “the entrance of Zedad, Hamath.” Zedad is possibly modern Sadad, southeast of Homs.
  '16':
  - type: text
    content: 'and then on to the towns of Berothah '
  - type: note
    content: Berothah is possibly the same as Berothai (see 2 Sam. 8:8), modern Bereitan.
  - type: text
    content: 'and Sibraim. '
  - type: note
    content: Sibraim may possibly be modern Ziphron (see Num. 34:9).
  - type: text
    content: 'These two towns are on the border between Damascus and Hamath. It will extend as far as Hazer-ha-Tikon, which is on the border of '
  - type: text
    content: the region of
  - type: text
    content: ' Hauran. '
  - type: note
    content: Hauran is sometimes equated with Bashan, the mountainous region east of Lake Galilee.
  '17':
  - type: text
    content: 'So, your northern frontier will extend from the sea to Hazer-Enon, '
  - type: note
    content: Most scholars identify Hazar-Enon with modern Qaryatein.
  - type: text
    content: which is north of Damascus and the border of Hamath on the north.
  - type: note
    content: The Hebrew of v. 17 is uncertain.
  '18':
  - type: text
    content: “The Jordan River will serve as your eastern border between Hauran and Damascus, between Gilead and Israel, down to the Dead Sea as far south as Tamar.
  - type: note
    content: The Hebrew of this last clause is uncertain.
  '19':
  - type: text
    content: '“Your southern border stretches '
  - type: text
    content: west
  - type: text
    content: ' from Tamar southward to the waters of Meribah-Kadesh, following the dry riverbed to the Mediterranean Sea; that will be your southern border. '
  '2':
  - type: text
    content: 'Then he took me out by the north gate and led me around the outside to the gate that faces east. And there I saw water flowing out on the right-hand side, south of the gateway. '
  '20':
  - type: text
    content: 'And your western boundary will follow the coast of the Mediterranean Sea '
  - type: text
    content: from the southern border north
  - type: text
    content: ' to the point opposite Hamath Pass; that will be the western frontier.'
  '21':
  - type: text
    content: '“Divide this land among the tribes of Israel. '
  '22':
  - type: text
    content: 'You must distribute it as an inheritance for yourselves and the resident aliens who live among you, who have their children among you, since you must treat them as citizens of Israel. They must receive a share of the land for their inheritance with you among the tribes of Israel. '
  '23':
  - type: text
    content: 'In whatever tribe the resident alien resides, that is where you will assign his share. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '3':
  - type: text
    content: 'The man holding his measuring line walked east and measured off a thousand cubits. '
  - type: note
    content: About a third of a mile (1,750 feet; 530 meters). Three times Ezekiel uses this phrase in vv. 4–5.
  - type: text
    content: 'Then he made me wade across the '
  - type: text
    content: shallow
  - type: text
    content: ' water, and it was ankle deep. '
  - type: note
    content: The river flowing “ankle deep” points to our walk in Christ. As we walk in the Spirit-River of life, our lives are changed. The first miracle of the apostles in the book of Acts helped a man lame in his ankles sitting at the temple’s Beautiful Gate, the gate through which this river flowed. He was immediately healed and was able to walk and enter the temple for the first time in his life. Ezekiel’s Temple began its process of being rebuilt as the lame beggar waded into the river of God pouring out from the apostles. See Acts 3:1–10.
  '4':
  - type: text
    content: 'He measured off another thousand cubits and told me to wade across the stream again; the water was up to my knees. '
  - type: note
    content: The knee-deep river of God points symbolically to a life of prayer. We bow our knees before the Father of Glory and enter into the flow of life through prayer (Ezra 9:5; Dan. 6:10; Luke 22:41; Eph. 1:14–21).
  - type: text
    content: 'He measured off another thousand cubits and made me wade across the stream again, and the water was up to my waist. '
  - type: note
    content: The waist-deep river of God points symbolically to what we produce or give birth to, for the water soaks the reproductive organs. When the life-giving Spirit-River reaches our loins, we begin bearing the fruit of the Spirit, spiritual offspring, and enduring works that glorify God.
  '5':
  - type: text
    content: 'He measured off another thousand; it was now a river '
  - type: text
    content: over my head
  - type: text
    content: ', which I was unable to swim across. It was a deep swollen river—a river no one could cross.'
  '6':
  - type: text
    content: 'The '
  - type: text
    content: shining
  - type: text
    content: ' man said to me, “Son of man, do you see this?” '
  - type: note
    content: No doubt Ezekiel was stunned by seeing a stream start as a trickle and end up becoming an impassable river. The rhetorical question that was posed to Ezekiel could be made into an emphatic statement, by saying, “Son of man, pay close attention to the miracle you just witnessed! Get this revelation!” A river over your head points to the revelation of the Holy Spirit that is deep and limitless, which cannot be humanly “crossed over” or understood without divine help. This deep river is flowing in us today and will cause us to go beyond the earthly realm into God’s life in the Spirit (see 1 Cor. 2:1–16). When the river is this deep, we will become totally dependent upon the Holy Spirit to teach, guide, and empower us. Human intellect will not be able to fathom the depth of this Spirit-River.
  - type: text
    content: Then he brought me back to the riverbank.
  - type: note
    content: The implication of this sentence is that Ezekiel was in the river and had to return to the bank.
  '7':
  - type: text
    content: 'When I got there, I was astonished to see '
  - type: note
    content: Or “behold, I saw.”
  - type: text
    content: 'an enormous number of trees on each side of the river. '
  - type: note
    content: See Rev. 22:2.
  '8':
  - type: text
    content: 'He said, “This water flows east, down to the Jordan Valley '
  - type: note
    content: Or “Arabah,” which in the time of Ezekiel referred to the rift valley through which the Jordan River flows until it empties into the Dead Sea.
  - type: text
    content: 'and to the Dead Sea. As it flows into the stagnant waters, that water becomes fresh water. '
  - type: note
    content: See 2 Kings 2:21.
  '9':
  - type: text
    content: 'Wherever the river '
  - type: note
    content: Or literally “two rivers.” See Zech. 14:8.
  - type: text
    content: 'flows, all living creatures will live and thrive. Schools of fish will be very plentiful, for wherever the river goes, it brings healing, and everything will come alive! '
