document_id: MAT.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Sends Out His Twelve Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus gathered his twelve '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The number twelve speaks of governmental authority. Israel had twelve tribes, and Jesus chose twelve disciples. Only after Jesus gave them this authority were they called apostles. The authority Jesus gave them is what he had demonstrated over the previous five chapters of Matthew. After Christ’s resurrection he reminded them, as he sent them again to the nations, that “all authority has already been given to you.” Here Jesus makes these twelve men the answer to their own prayers for the Lord of the Harvest to send out more reapers.
    marker-yv: yv-n
  - type: text
    text: 'disciples and imparted to them authority to cast out demons and to heal every sickness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word is “ailment” or “affliction.”
    marker-yv: yv-n
  - type: text
    text: and every disease.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now, these are the names of the twelve apostles: first, Simon, who is nicknamed Peter, and Andrew, his brother. And then Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “James.” Translations of the Bible have substituted Jacob with James. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use Jacob throughout.
    marker-yv: yv-n
  - type: text
    text: 'and John, sons of Zebedee. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Next were Phillip and Bartholomew; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bartholomew is likely another name for Nathaniel. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 1:45
      metadata:
        usfm: JHN.1.45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'then Thomas and Matthew, the tax collector; Jacob the son of Alphaeus; Thaddeus; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Lebbaeus.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Simon, the former member of the Zealot party, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the patriot.” The Zealot party was also known as the Daggar party. Some manuscripts read “Simon the Canaanite.”
    marker-yv: yv-n
  - type: text
    text: and Judas the locksmith, who eventually betrayed Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Judas is actually Judah. Iscariot is not his last name, but could be taken from the name of the town, Kerioth, twelve miles south of Hebron. But more plausibly, Iscariot is taken from a Hebrew word meaning “lock,” Judah being a locksmith. He likely was the one chosen to lock the collection bag, which means he had the key and could pilfer the fund at will. It is his sad history that he wanted to lock up Jesus and control him for his own ends.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jesus sent out the Twelve with these instructions: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t go into any Gentile or Samaritan territory.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Don’t go on the paths of the non-Jewish people.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go instead and find the lost sheep
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “the sheep who have strayed from the house of Israel.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: among the people of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And as you go, preach this message: ‘Heaven’s kingdom realm is accessible, close enough to touch.’'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew and a few Greek manuscripts add the call to repentance with the word “Repent (turn from sin and turn to God), for the kingdom of heaven approaches.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You must continually bring healing to lepers and to those who are sick,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the weak.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and make it your habit to break off the demonic presence from people,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “cure the insane.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and raise the dead back to life. Freely
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, don’t charge for preaching the gospel.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you have received
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: the power of the kingdom
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', so freely release it to others.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You won’t need a lot of money.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Don’t take gold, silver, or copper.” The Hebrew Matthew is “Don’t heap up silver and gold in your money belts.” The Aramaic has the nuance of more than not taking money, but of not going after the accumulation of money by using God’s anointing.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Travel light,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Don’t take sandals or a staff,” which is likely a figure of speech for “Travel light.” The reason Jesus told his disciples to leave their things behind is that they already had what was most important. Our “money” or wealth is in the kingdom realm of God. Our “clothing” is the garment of righteousness we wear in Christ. Our “backpack” points to our past experiences, which we tend to carry as weights on our backs. We leave our past behind since it no longer exists in Christ. Our “shoes” become a picture of the good news we walk in as we experience his continual peace. Our “staff” is a symbol of authority, and we take with us no other authority but Christ’s. We can leave it all behind since we take it all with us in Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and don’t even pack an extra change of clothes in your backpack. Trust God for everything, because the one who works for him deserves to be provided for.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whatever village or town you enter, search for an honorable
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “worthy”; that is, “deserving of your confidence.” The “worthy” man would be one who welcomed the disciples into his home, providing hospitality to them.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: man who will let you into his home until you leave for the next town.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Once you enter a house, speak to the family there and say, ‘God’s blessing of peace be upon this house!’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if those living there welcome you, let your peace come upon the house. But if you are rejected, that blessing of peace will come back upon you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if anyone doesn’t listen to you and rejects your message, when you leave that house or town, shake the dust off your feet.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shaking dust off of one’s feet when leaving a city demonstrates that you would not take their defilement with you. The “uncleanness” could also refer to any bitter response to the rejection they experienced. They were to “shake it off” before they went to their next assignment.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mark my words, on the day of judgment the wicked people who lived in the land of Sodom and Gomorrah will have a lesser degree of judgment than the city that rejects you,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: for the people of Sodom and Gomorrah did not have the opportunity that was given to them
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now, remember, it is I who sends you out, even though you feel vulnerable as lambs going into a pack of wolves. So be as shrewd as snakes yet as harmless
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “innocent.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as doves.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Warns His Apostles of Persecution
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be on your guard! For there will be those who will betray you before their religious councils and brutally beat you with whips in their public gatherings.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although this can be translated “synagogues,” it is actually a gathering of people. No one would be scourged in a synagogue building. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 4:28–30
      metadata:
        usfm: LUK.4.28+LUK.4.29+LUK.4.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Sinaiticus version of Matthew is “courts of justice.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And because you follow me, they will take you to stand trial in front of rulers and even kings as an opportunity to testify of me before them and the unbelievers.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This prophecy of Jesus was fulfilled many times over with the apostles of the Lamb.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So when they arrest you, don’t worry about how to speak or what you are to say, for the Holy Spirit will give you at that very moment the words to speak.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It won’t be you speaking but the Spirit of your Father speaking through you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A brother will betray his brother unto death—even a father his child! Children will rise up against their parents and have them put to death.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Expect to be hated by all because of my name, but be faithful to the end and you will experience life and deliverance.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is found here one of the agrapha, quoted from an earlier gospel manuscript that has been lost, which reads, “As often as you fall, rise up, and you will be saved.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Akolouthia of Confession
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Evans,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Historical Jesus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; 2004,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', at 213).'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when they persecute you in one town, flee to another. But I promise you this: you will not deliver all the cities and towns of Israel before the Son of Man comes.'
