document_id: MAT.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out His Twelve Apostles
  - type: text
    content: 'Jesus gathered his twelve '
  - type: note
    content: The number twelve speaks of governmental authority. Israel had twelve tribes, and Jesus chose twelve disciples. Only after Jesus gave them this authority were they called apostles. The authority Jesus gave them is what he had demonstrated over the previous five chapters of Matthew. After Christ’s resurrection he reminded them, as he sent them again to the nations, that “all authority has already been given to you.” Here Jesus makes these twelve men the answer to their own prayers for the Lord of the Harvest to send out more reapers.
  - type: text
    content: 'disciples and imparted to them authority to cast out demons and to heal every sickness '
  - type: note
    content: The Aramaic word is “ailment” or “affliction.”
  - type: text
    content: and every disease.
  '10':
  - type: text
    content: Travel light,
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t take sandals or a staff,” which is likely a figure of speech for “Travel light.” The reason Jesus told his disciples to leave their things behind is that they already had what was most important. Our “money” or wealth is in the kingdom realm of God. Our “clothing” is the garment of righteousness we wear in Christ. Our “backpack” points to our past experiences, which we tend to carry as weights on our backs. We leave our past behind since it no longer exists in Christ. Our “shoes” become a picture of the good news we walk in as we experience his continual peace. Our “staff” is a symbol of authority, and we take with us no other authority but Christ’s. We can leave it all behind since we take it all with us in Christ.
  - type: text
    content: and don’t even pack an extra change of clothes in your backpack. Trust God for everything, because the one who works for him deserves to be provided for.
  '11':
  - type: text
    content: “Whatever village or town you enter, search for an honorable
  - type: text
    content: ' '
  - type: note
    content: Or “worthy”; that is, “deserving of your confidence.” The “worthy” man would be one who welcomed the disciples into his home, providing hospitality to them.
  - type: text
    content: man who will let you into his home until you leave for the next town.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Once you enter a house, speak to the family there and say, ‘God’s blessing of peace be upon this house!’
  - type: text
    content: ' '
  '13':
  - type: text
    content: And if those living there welcome you, let your peace come upon the house. But if you are rejected, that blessing of peace will come back upon you.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And if anyone doesn’t listen to you and rejects your message, when you leave that house or town, shake the dust off your feet.
  - type: text
    content: ' '
  - type: note
    content: Shaking dust off of one’s feet when leaving a city demonstrates that you would not take their defilement with you. The “uncleanness” could also refer to any bitter response to the rejection they experienced. They were to “shake it off” before they went to their next assignment.
  '15':
  - type: text
    content: Mark my words, on the day of judgment the wicked people who lived in the land of Sodom and Gomorrah will have a lesser degree of judgment than the city that rejects you,
  - type: text
    content: ' '
  - type: text
    content: for the people of Sodom and Gomorrah did not have the opportunity that was given to them
  - type: text
    content: '! '
  '16':
  - type: text
    content: Now, remember, it is I who sends you out, even though you feel vulnerable as lambs going into a pack of wolves. So be as shrewd as snakes yet as harmless
  - type: text
    content: ' '
  - type: note
    content: Or “innocent.”
  - type: text
    content: as doves.”
  - type: heading
    content: Jesus Warns His Apostles of Persecution
  '17':
  - type: text
    content: “Be on your guard! For there will be those who will betray you before their religious councils and brutally beat you with whips in their public gatherings.
  - type: text
    content: ' '
  - type: note
    content: Although this can be translated “synagogues,” it is actually a gathering of people. No one would be scourged in a synagogue building. See Luke 4:28–30. The Sinaiticus version of Matthew is “courts of justice.”
  '18':
  - type: text
    content: And because you follow me, they will take you to stand trial in front of rulers and even kings as an opportunity to testify of me before them and the unbelievers.
  - type: text
    content: ' '
  - type: note
    content: This prophecy of Jesus was fulfilled many times over with the apostles of the Lamb.
  '19':
  - type: text
    content: So when they arrest you, don’t worry about how to speak or what you are to say, for the Holy Spirit will give you at that very moment the words to speak.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now, these are the names of the twelve apostles: first, Simon, who is nicknamed Peter, and Andrew, his brother. And then Jacob '
  - type: note
    content: Or “James.” Translations of the Bible have substituted Jacob with James. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use Jacob throughout.
  - type: text
    content: 'and John, sons of Zebedee. '
  '20':
  - type: text
    content: It won’t be you speaking but the Spirit of your Father speaking through you.
  - type: note
    content: See Ex. 4:12.
  '21':
  - type: text
    content: “A brother will betray his brother unto death—even a father his child! Children will rise up against their parents and have them put to death.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Expect to be hated by all because of my name, but be faithful to the end and you will experience life and deliverance.
  - type: text
    content: ' '
  - type: note
    content: There is found here one of the agrapha, quoted from an earlier gospel manuscript that has been lost, which reads, “As often as you fall, rise up, and you will be saved.” Akolouthia of Confession (Evans, The Historical Jesus; 2004, supra, at 213).
  '23':
  - type: text
    content: 'And when they persecute you in one town, flee to another. But I promise you this: you will not deliver all the cities and towns of Israel before the Son of Man comes.'
  '24':
  - type: text
    content: “A student is not superior to his teacher any more than a servant would be greater than his master.
  - type: text
    content: ' '
  '25':
  - type: text
    content: The student must be satisfied to share his teacher’s fate and the servant his master’s. If they have called the head of the family ‘lord of flies,’
  - type: text
    content: ' '
  - type: note
    content: Or Baal-zebub, a derisive term for Satan. There is some evidence that the Hebrew word Baal-zebub could also mean “lord of tricks” (or “trickster”).
  - type: text
    content: no wonder they malign the members of his family.
  '26':
  - type: text
    content: “Don’t be afraid or intimidated by others, for God will bring everything out into the open and every secret will be told.
  - type: text
    content: ' '
  '27':
  - type: text
    content: What I say to you in the dark, repeat in broad daylight, and what you hear in a whisper, announce it publicly.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Don’t be in fear of those who can kill only the body but not your soul. Fear only God, who is able to destroy both soul and body in hell.
  - type: text
    content: ' '
  '29':
  - type: text
    content: You can buy two sparrows for only a copper coin, yet not even one sparrow falls from its nest without the knowledge of your Father. Aren’t you worth much more to God than many sparrows?
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Next were Phillip and Bartholomew; '
  - type: note
    content: Bartholomew is likely another name for Nathaniel. See John 1:45.
  - type: text
    content: 'then Thomas and Matthew, the tax collector; Jacob the son of Alphaeus; Thaddeus; '
  - type: note
    content: Or “Lebbaeus.”
  '30':
  - type: text
    content: So don’t worry. For your Father cares deeply about even the smallest detail of your life.
  - type: note
    content: Or “even the hairs of your head are numbered.”
  '32':
  - type: text
    content: “If you openly and publicly acknowledge me, I will freely and openly acknowledge you before my heavenly Father.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But if you publicly deny that you know me,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “he who blasphemes me.”
  - type: text
    content: I will also deny you before my heavenly Father.
  '34':
  - type: text
    content: “Perhaps you think I’ve come to spread peace and calm over the earth—but my coming will bring conflict and division,
  - type: text
    content: ' '
  - type: note
    content: Or “I have not come to bring peace but a sword.” The Aramaic word harba can mean either “sword” or “war.” The Greek is “sword” (of division). Either term signifies division.
  - type: text
    content: not peace.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Because of me,
  - type: text
    content: A son will turn against his father,
  - type: text
    content: a daughter her mother
  - type: text
    content: and against her mother-in-law.
  - type: note
    content: The Hebrew Matthew adds here, “For there will be five in a house, three against two and two against three, father against son and son against father, and they will stand alone.” This is missing from the Greek manuscripts.
  '36':
  - type: text
    content: Within your own families you will find enemies.
  - type: note
    content: See Mic. 7:6.
  '37':
  - type: text
    content: “Whoever loves father or mother or son or daughter more than me is not fit to be my disciple.
  - type: text
    content: ' '
  - type: note
    content: Or “is of no use to me.” The Hebrew Matthew is “I am not suitable for him.”
  '38':
  - type: text
    content: And whoever comes to me must follow in my steps and be willing to share my cross and experience it as his own, or he is not worthy of me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Those who cling to their lives
  - type: text
    content: ' '
  - type: note
    content: Or “Anyone who clings to his own life [soul, self, being].”
  - type: text
    content: will give up true life. But those who let go of their lives for my sake and surrender it all to me will discover true life!
  '4':
  - type: text
    content: 'Simon, the former member of the Zealot party, '
  - type: note
    content: Or “the patriot.” The Zealot party was also known as the Daggar party. Some manuscripts read “Simon the Canaanite.”
  - type: text
    content: and Judas the locksmith, who eventually betrayed Jesus.
  - type: note
    content: The name Judas is actually Judah. Iscariot is not his last name, but could be taken from the name of the town, Kerioth, twelve miles south of Hebron. But more plausibly, Iscariot is taken from a Hebrew word meaning “lock,” Judah being a locksmith. He likely was the one chosen to lock the collection bag, which means he had the key and could pilfer the fund at will. It is his sad history that he wanted to lock up Jesus and control him for his own ends.
  '40':
  - type: text
    content: “Whoever receives you receives me, and whoever receives me receives the One who sent me.
  - type: text
    content: ' '
  - type: note
    content: Justin Martyr (AD 165) cited this verse but translated it, possibly from an earlier manuscript, “He who hears me hears Him who sent me” (First Apology LXXXII).
  '41':
  - type: text
    content: Whoever receives a prophet because he is God’s messenger
  - type: text
    content: ' '
  - type: note
    content: Or “in the name of a prophet.” See 1 Kings 17:9–24; 2 Kings 4:9–37.
  - type: text
    content: will share a prophet’s reward. And whoever welcomes a righteous person because he follows me
  - type: text
    content: ' '
  - type: note
    content: Or “in the name of a righteous person.”
  - type: text
    content: will also share in his reward.
  - type: text
    content: ' '
  '42':
  - type: text
    content: And whoever gives a cup of cold water to one of my disciples, I promise you, he will not go unrewarded.”
  '5':
  - type: text
    content: 'Jesus sent out the Twelve with these instructions: '
  - type: text
    content: “Don’t go into any Gentile or Samaritan territory.
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t go on the paths of the non-Jewish people.”
  '6':
  - type: text
    content: Go instead and find the lost sheep
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “the sheep who have strayed from the house of Israel.”
  - type: text
    content: among the people of Israel.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And as you go, preach this message: ‘Heaven’s kingdom realm is accessible, close enough to touch.’'
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew and a few Greek manuscripts add the call to repentance with the word “Repent (turn from sin and turn to God), for the kingdom of heaven approaches.”
  '8':
  - type: text
    content: You must continually bring healing to lepers and to those who are sick,
  - type: text
    content: ' '
  - type: note
    content: Or “the weak.”
  - type: text
    content: and make it your habit to break off the demonic presence from people,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “cure the insane.”
  - type: text
    content: and raise the dead back to life. Freely
  - type: text
    content: ' '
  - type: note
    content: That is, don’t charge for preaching the gospel.
  - type: text
    content: you have received
  - type: text
    content: ' '
  - type: text
    content: the power of the kingdom
  - type: text
    content: ', so freely release it to others.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: You won’t need a lot of money.
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t take gold, silver, or copper.” The Hebrew Matthew is “Don’t heap up silver and gold in your money belts.” The Aramaic has the nuance of more than not taking money, but of not going after the accumulation of money by using God’s anointing.
