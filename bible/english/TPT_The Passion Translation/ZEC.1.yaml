document_id: ZEC.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Return to Yahweh
  - type: text
    content: 'In October of the second year that Darius was emperor '
  - type: text
    content: of Persia
  - type: text
    content: ', '
  - type: note
    content: The Hebrew text for “In October” is literally “In the eighth month”; this was the Hebrew month of October–November, 520 BC (Gregorian calendar). The Syriac adds “the first day,” perhaps based on Jewish tradition.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to the prophet Zechariah son of Berechiah, '
  - type: note
    content: There are verses that indicate Zechariah was the son of Iddo the seer (see 2 Chron. 12:15; Ezra 5:1; 6:14; Neh. 12:16); however, the Hebrew word for “son” can also mean “grandson.” It is also possible that Berechiah was, indeed, Zechariah’s father but died, leaving Zechariah to be raised by his grandfather. Iddo the priest is mentioned in Neh. 12:4 as one of exiles who returned to the land with Zerubbabel in 538 BC.
  - type: text
    content: 'son of Iddo, saying, '
  '10':
  - type: text
    content: 'Then the man standing among the myrtles spoke up and said, “These are '
  - type: text
    content: Yahweh
  - type: text
    content: ’s agents sent to patrol the earth.”
  - type: note
    content: Or “who are sent back and forth across the land.”
  '11':
  - type: text
    content: 'Then the horsemen reported to the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' who stood among the myrtles, “We have been patrolling the land, '
  - type: note
    content: Or “walking about the entire world.” The Hebrew verb for “walking” is halak, used in Gen. 13:17 for Abraham walking over the land to possess it.
  - type: text
    content: and indeed, all is peacefully at rest.”
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ’s angel then spoke and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, you have inflicted your anger on Jerusalem and the cities of Judah for the past seventy years. How many more years will pass before you once again show them that you love them?” '
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' then replied to the angel who was talking to me with kind and comforting words. '
  '14':
  - type: text
    content: 'So the angel told me to proclaim these words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies: “My heart burns with passion '
  - type: note
    content: Or “jealousy.” For the English reader, jealousy often carries a negative connotation. Here we see God’s passion and caring love for Jerusalem and his people, but their waywardness has kept him from pouring out that love upon them.
  - type: text
    content: 'for Jerusalem and Zion, '
  '15':
  - type: text
    content: 'but I am deeply angry with the careless and complacent nations. I was only mildly angry '
  - type: text
    content: with my people
  - type: text
    content: ', but the nations I used to punish them acted too severely. '
  - type: note
    content: Or “they [the nations] contributed to the disaster.”
  '16':
  - type: text
    content: 'Therefore, I have returned to Jerusalem with mercy and kindness. '
  - type: note
    content: See Ezek. 43:1–5.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have decreed to rebuild my house there. '
  - type: note
    content: The rebuilding of the Jerusalem temple reinforces the certainty of Yahweh’s intention to continue to pour out his mercy and compassion on his people now that they had been freed from their captivity in exile for some twenty years. The house of the Lord would, in fact, be completed within three years or so, in 516 BC. The same was true for the rebuilding of the city of Jerusalem, some eighty years in the future at the time of Nehemiah (ca. 444 BC).
  - type: text
    content: Surveyors
  - type: text
    content: ' will stretch my measuring line over Jerusalem '
  - type: text
    content: to rebuild the city
  - type: text
    content: .”
  '17':
  - type: text
    content: 'The angel also told me to proclaim, “I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, decree that my cities will once more overflow with prosperity. I will comfort Zion once again and claim Jerusalem as my own.”'
  - type: heading
    content: 'Second Vision: Four Horns and Four Craftsmen'
  '18':
  - type: text
    content: 'Then I looked up and had a vision. Behold, '
  - type: text
    content: I saw
  - type: text
    content: ' four horns. '
  - type: note
    content: Zechariah 2 in the Hebrew Bible begins with v. 18. Animal’s horns are a consistent biblical symbol of strength and power (see Deut. 33:17; 1 Kings 22:11; Ps. 75:10; Ezek. 29:21; Mic. 4:13). They represent, in this context, four nations or, metaphorically, four principalities. The number four is a biblical number consistently representing the entire world (i.e., four compass directions; see Zech. 2:6; 6:5).
  '19':
  - type: text
    content: 'I asked the angel who was talking to me, “What do these represent?” And he answered, “These are the '
  - type: text
    content: four
  - type: text
    content: ' horns that scattered Jerusalem, Judah, and Israel.”'
  '2':
  - type: text
    content: “
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', was intensely angry with your ancestors. '
  '20':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' opened my eyes to see four '
  - type: text
    content: conquering
  - type: text
    content: ' craftsmen. '
  - type: note
    content: Or “blacksmiths,” those who hammer out heated metal. See Isa. 54:16. This passage teaches us that for every evil on the earth, God has an answer, “craftsmen” who themselves become the solution. The four horns that scattered God’s people are likely Assyria, Egypt, Babylonia, and Medo-Persia. The four conquering craftsmen are likely Egypt, Babylonia, Persia, and Greece. Whatever their precise identity may have been, the important point to note is that all the enemies of Judah will ultimately be destroyed.
  '21':
  - type: text
    content: And I asked, “What are they coming to do?” He replied, “They have come to terrify and hammer out justice among the nations who lifted their horns to completely crush the land of Judah and scatter its inhabitants.”
  '3':
  - type: text
    content: 'So give the people this message: ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says to you: “Come back to me, and I will come back to you,” '
  - type: note
    content: Or “Return to me, and I will return to you.” This was a consistent message of God’s prophets. See Isa. 31:6; Jer. 3:1, 22; Hos. 6:1; 7:10; Amos 4:6–11; Mal. 3:7.
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  - type: note
    content: This divine name (Hb. yahweh tsebaʾot) is used by Zechariah forty-seven times. This name emphasizes God’s power, majesty, and sovereignty over not only the nations of earth but also the angelic armies of heaven.
  '4':
  - type: text
    content: 'Do not be like your ancestors. Long ago my prophets warned them, saying, “Turn your lives around completely and end your evil, wicked ways.” But they refused to listen to me or obey me. '
  '5':
  - type: text
    content: 'And where did they end up? And the prophets, did they live forever? '
  '6':
  - type: text
    content: 'But my words and warnings, which I gave through my servants the prophets, proved to be true. '
  - type: text
    content: Your ancestors ignored them, and so they were punished.
  - type: text
    content: ' As a result, they repented, saying, “'
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has punished us as he warned he would do and as our sinful ways have deserved.” ’ ”'
  - type: heading
    content: The Eight Visions of Zechariah
  '7':
  - type: text
    content: 'On February 15 (the month of Shvat), in the second year of Darius’ reign, '
  - type: note
    content: The Hebrew text for “February 15” is literally “On the twenty-fourth day of the eleventh month”; this was February 15, 519 BC (Gregorian calendar).
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to the prophet Zechariah son of Berechiah, son of Iddo.'
  - type: heading
    content: 'First Vision: The Horsemen'
  '8':
  - type: text
    content: 'That night I had a vision. Behold, I saw a man sitting on a reddish-brown horse in the shadows of a grove of myrtles. '
  - type: note
    content: Isaiah referenced “myrtles” in connection to the Messianic age (Isa. 41:19; 55:13).
  - type: text
    content: 'And behind him I saw other horses—some brown, tan, and white '
  - type: text
    content: with riders upon them
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'There was '
  - type: text
    content: another
  - type: text
    content: ' angel there who talked with me, and I asked him, “What do these represent, my lord?” And the angel '
  - type: note
    content: It is possible that the “man” on the horse was the same as “the angel who was talking to me.” However, the text seems to imply (and most commentators agree) that this angel talking with Zechariah was an angel of interpretation sent to Zechariah to help the prophet interpret what he was seeing. This would mean that the horseman among the myrtle grove was a different angel, who is described in v. 12 as “Yahweh’s angel.” Zechariah always referred to the “angel who talked with me” by the same words and mentioned this angel in several of his visions (see 1:19; 2:3; 4:1, 4–5; 5:5, 10; 6:4).
  - type: text
    content: who was talking to me said, “Let me show you.”
