  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be like your ancestors. Long ago my prophets warned them, saying, “Turn your lives around completely and end your evil, wicked ways.” But they refused to listen to me or obey me. '
  '5':
