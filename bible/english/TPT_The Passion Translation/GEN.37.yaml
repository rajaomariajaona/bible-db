      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They took the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blood-stained
    - type: text
      text: ' robe back to their father and said, “We found this. Look it over—doesn’t it belong to your son?”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Jacob recognized it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instantly
    - type: text
      text: ' and cried out, “It’s my son’s robe! Some wild animal must have killed him. My son Joseph has been torn to pieces!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:33
