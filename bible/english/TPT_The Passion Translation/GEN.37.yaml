      children:
      - type: text
        text: Overcome with grief
    - type: text
      text: ', Jacob tore his clothes, put on sackcloth, and mourned for his son a long time. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'All his sons and daughters '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Daughters” refers to Dinah and Jacob’s daughters-in-law.
      marker-yv: yv-n
    - type: text
      text: 'came and tried to comfort him, but he refused to be comforted. He told them, “No, I will mourn for him the rest of my life, until I join my son in the realm of the dead.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Sheol” or “the underworld.” This is the first reference to Sheol in the Bible, which refers to a place believed to be beneath the earth where departed souls exist in the gloom of death, darkness, and silence.
      marker-yv: yv-n
    - type: text
      text: Joseph’s father wept and wept for his son.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Meanwhile, the Midianites took Joseph to Egypt and sold him to Potiphar, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Potiphar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “given by the sun-god Ra” or “one who belongs to the sun-god Ra.”
      marker-yv: yv-n
    - type: text
      text: one of Pharaoh’s officials, the captain of the guard.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the chief executioner.” He was the warden over the Egyptian penal system and, perhaps, the chief steward over Pharaoh’s affairs.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: When Joseph’s brothers saw that their father loved him more than he loved them, they hated him and would not speak a kind word to him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or possibly, “they pushed aside every attempt by Joseph to be friendly.” See Shadal; cf. Tanh. B. Gen. 180.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'One night Joseph had a dream, and when he shared it with his brothers, they hated him even more! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Listen to this dream I had,” he told them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“There we were, binding sheaves of grain in the field. Suddenly, my sheaf rose up and stood upright. Then your sheaves gathered around mine and bowed down to mine!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: His brothers asked him, “Oh, so you think you’re going to be our king? Do you actually think you’re destined to rule over us?” So, the dream that he told them about made them hate him even more.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then another night he had a dream, and he shared it with his brothers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint adds “and he shared it with his father.”
      marker-yv: yv-n
    - type: text
      text: 'saying, “Listen, I had another dream. This time, the sun and moon and eleven stars were bowing down to me.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These dreams had a major influence on Joseph’s life from that day forward. If you had a dream about the stars of heaven bowing down to you, do you not think it would affect you? Joseph behaved with excellence because he saw himself as a “star.” When you understand what motivated young Joseph, you will understand the true significance of the following chapters.
      marker-yv: yv-n
