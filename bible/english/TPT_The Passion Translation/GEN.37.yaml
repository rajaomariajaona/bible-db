document_id: GEN.37,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story of Joseph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'This is the story of the family of Jacob, who had settled in the land of Canaan, where his father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Isaac
    - type: text
      text: ' had lived as an immigrant.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'According to the Genesis chronologies, Isaac was alive during the events of this chapter and would have been one hundred and sixty-eight. Jacob was one hundred and eight when Joseph was sold into slavery. See JPS Torah Commentary:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Genesis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Nahum Sarna.'
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob’s son Joseph was seventeen, and he served his older half brothers, the sons of his father’s wives Bilhah and Zilpah, helping them watch over the flocks. One day Joseph went to his father with a bad report about their behavior.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although we are not told exactly what the “bad report” contained, Joseph’s brothers saw him as a tattle-tale and trouble maker. He may have exaggerated or slandered his brothers to his father.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When his father and brothers heard it, his father scolded him, “What kind of dream is that? Do you really think that I, and your mother, and your brothers are going to come and bow to the ground before you?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So his brothers grew more jealous of him, but his father kept pondering Joseph’s dream.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Even though the sheaves, stars, sun, and moon would all bow down to Joseph, his family missed it! They were “sheaves” and “stars,” not thorns and snakes. Everyone in the family would be favored. The sheaves of grain were Jacob’s sons. They were God’s crop on the earth—a ripened, harvested crop. They were stars, bright lights shining in the heavens. Instead of provoking his brothers to jealousy, this dream could have brought them joy over God’s mercy to them as a family. The second dream spoke of government. God informed Joseph through the symbols of the sun, moon, and stars that the government would be given to Joseph one day. In
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 1:16–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the lights of the sky were to “rule” the day and “rule” the night. These governing bodies bowing down to Joseph spoke of the great authority he would one day be given over his brothers. This second dream is much like the vision in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 12:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The woman clothed with the sun signifies God’s people (bride), with the moon under her feet and the crown of twelve stars on her head. We must see God’s church as ready to give birth to a corporate expression of Christ as his Body on the earth. From the standpoint of eternity, God sees us all as sheaves full of life and stars full of light. Although the sons of Jacob sinned, Christ still came through them (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 38:27–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The jealous brothers had no faith in Joseph’s dreams, but Jacob, having been broken by God, kept the matter in his heart, for even Jacob had received messages from God in dreams.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph Sold by His Brothers
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'One day, when his brothers had gone to Shechem to care for their father’s flock, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Israel called for Joseph and said to him, “Your brothers are grazing the flocks near Shechem. I want you to go join them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Father
    - type: text
      text: ', I’ll go.” Joseph replied.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jacob added, “Go find out how your brothers are doing with the flocks and bring word back to me.” So, his father sent him off from the valley of Hebron.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shechem is at least a four-day walk from the valley of Hebron. Joseph left Hebron (which means “fellowship”) to visit his brothers. Jesus left the fellowship of heaven to reveal his Father’s love to those who killed him out of jealousy. Joseph’s life story is a vivid preview of the life of Christ.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph arrived at Shechem '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and began to roam the countryside looking for his brothers, a man approached him and asked, “What are you looking for?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I’m looking for my brothers, who are taking care of their flock,” he answered. “Please tell me, do you know where they are?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The man replied, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Who was this man who directed Joseph to Dothan? Was it an angel? Perhaps. It was God’s hand that led Joseph into this encounter with his angry brothers. God began the process of exalting Joseph through this encounter. God would send him ahead of his brothers into Egypt (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 105:16–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: “They’ve left here already. I overheard them mention that they were going to Dothan.” So, Joseph took off to catch up with his brothers and found them at Dothan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dothan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the home of Elisha, means “two wells.” Dothan is about a day’s walk from Shechem.'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'As he was still a long distance away, the brothers recognized him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by his robe
    - type: text
      text: ', and by the time he reached them, they had plotted together to kill him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They said to each other, “Here comes this dream expert. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “lord dreamer” or “master dreamer.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Let’s kill him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: His brothers scorned him for his gift and hated him for his dreams. They could not endure the thought of bowing down to a younger brother that was more favored than they were. Rather than bow down to Joseph, they sought to kill him. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 29:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and throw his body into one of these dry wells. We can say that a wild animal ate him. Then we’ll see how his dreams turn out!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When Reuben heard of this, he tried to save Joseph’s life. “Don’t take his life,” he said. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“No bloodshed! Let’s throw him into this pit in the middle of nowhere, but don’t hurt him.” Reuben said these things because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he planned to return later
    - type: text
      text: ' to rescue Joseph and take him back to his father.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Reuben was Jacob’s firstborn and would have had the responsibility of representing his father’s interests.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When Joseph finally caught up with his brothers, they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seized him
    - type: text
      text: ', stripped him of his ornamented robe, his beautiful full-length robe, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: and threw him into the dry, empty pit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'If we will remain faithful in a time of betrayal, we will be restored and wear the favor-garment once again. Joseph’s life was really a series of three robes: the “robe of favor” given to him by Jacob and taken by his jealous brothers, the “stolen robe” that Potiphar’s wife ripped from him to falsely accuse him, and the “royal robe” of reigning in Egypt as God’s savior for Israel. That coat of many colors had to go before God could use young Joseph. What is there in your life that must be taken from you before you can be set free to be God’s instrument?'
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Afterward, the brothers sat down to eat their food. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What callous indifference Joseph’s brothers demonstrated as they sat near the well, eating a meal! No doubt they were within earshot of Joseph’s cries, asking them for help.
      marker-yv: yv-n
    - type: text
      text: 'When they looked up, they saw a caravan of Ishmaelite merchants coming from Gilead on their way to Egypt. They had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: many
    - type: text
      text: ' camels loaded with myrrh, spices, and perfumes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Judah spoke up and said to his brothers, “What will we gain by murdering our brother and covering up his blood? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 16:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 24:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I have an idea!
    - type: text
      text: ' Let’s sell Joseph to these Ishmaelites and not lay a hand on him, for he is our brother, our own flesh and blood.” His brothers agreed. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And when the Midianites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (also known as Ishmaelites)
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 8:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; see also “Midianites” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Harper’s Bible Dictionary
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', page 634.'
      marker-yv: yv-n
    - type: text
      text: 'came by, Joseph’s brothers lifted him out of the pit, and sold him to the Ishmaelites for twenty pieces of silver, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In that day, twenty silver shekels was the going price to purchase a young male slave. See the Laws of Hammurabi, pars. 116, 214, 252; see also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 27:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Isn’t it amazing how the Lord sent the merchants from Midian at just the right time for Joseph? The Lord has ways to deliver us that are beyond our comprehension. It is ridiculous to even try to figure out how God will pull it off—he just will! Judah sold Joseph for twenty pieces of silver; Judas (Judah) sold Jesus for thirty (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 26:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Whenever we devalue one another, we are selling one another, “shortchanging” one another, failing to understand a person’s true value. How could a life be sold for mere silver? If Joseph’s brothers had valued him as a sheaf or a star, they would not have sold him.
      marker-yv: yv-n
    - type: text
      text: 'and the merchants took Joseph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: far
    - type: text
      text: ' away to Egypt.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Later, Reuben went to the pit, and saw that Joseph was gone. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He was overcome with grief
    - type: text
      text: ' and tore his clothes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now Israel’s love for Joseph surpassed that for his other sons because he was born to him in his old age. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob was ninety-one when Joseph was born. Joseph and his baby brother Benjamin were the only two sons Jacob had with his beloved Rachel.
      marker-yv: yv-n
    - type: text
      text: 'So Israel had made him a richly ornamented robe. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 37:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a coat of many colors” (LXX, Vulgate), a long-sleeved tunic that went down to his feet. Most tunics worn by men would only go down to the knees and were often made without sleeves. This robe was not something one would wear at work but was considered to be a robe of special significance for a prince. The same Hebrew word is found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the robe of a princess. Fully aware of what happened with parental favoritism between him and his brother Esau, Jacob still lavished preference upon Joseph. It is possible that Jacob was designating Joseph as the royal priest of his family, thus bypassing Reuben, the firstborn, and planting seeds of angry jealousy in the hearts of all his half brothers.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: He went to his brothers and said, “The boy is gone! What am I going to do now?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then they took Joseph’s colorful robe, killed a goat, and dipped the robe in its blood. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
