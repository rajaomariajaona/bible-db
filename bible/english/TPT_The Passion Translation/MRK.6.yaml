document_id: MRK.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Rejected in Nazareth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Afterward, Jesus left Capernaum '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The healing of the woman and the resurrection of Jairus’ daughter were both done in Capernaum.
      marker-yv: yv-n
    - type: text
      text: 'and returned with his disciples to Nazareth, his hometown. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whatever house you enter, stay there until you leave the area.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever community does not welcome you or receive your message, leave it behind. And as you go, shake the dust off your feet as a testimony against them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic and some Greek manuscripts add a sentence: “Truly, I tell you that it will be more tolerable for Sodom and Gomorrah in the day of judgment than for that city.”'
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So they went out and preached publicly that everyone should repent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They cast out many demons and anointed many sick people with oil and healed them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of John the Baptizer
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'King Herod soon heard about Jesus, for the name of Jesus was on everyone’s lips. Some were even saying about him, “John the Baptizer has been raised from the dead, and that’s why miraculous powers flow from him!” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Others said, “No, he’s Elijah!” While others said, “He’s a prophet, like one of the prophets of old!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When Herod heard what the people were saying, he concluded, “I beheaded John, and now he’s raised from the dead!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: For Herod had John arrested and thrown into prison for repeatedly rebuking him in public, saying, “You have no right to marry Herodias, the wife of your brother Philip! You are violating the law of God!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 18:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 20:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This infuriated Herodias, and she held a bitter grudge against him and wanted John executed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On the Sabbath, he went to teach in the synagogue. Everyone who heard his teaching was overwhelmed with astonishment. They said among themselves, “What incredible wisdom has been given to him! Where did he receive such profound insights? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Where did he get these things” (or “insights,” “understanding,” “ideas,” “teachings”)?
      marker-yv: yv-n
    - type: text
      text: 'And what mighty miracles flow through his hands! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Herod both feared and stood in awe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text can also mean “deep respect” or that Herod “feared” John.
      marker-yv: yv-n
    - type: text
      text: of John and kept him safely in custody, because he was convinced that he was a righteous and holy man. Every time Herod heard John speak, it disturbed his soul, but he was drawn to him and was intrigued by his words.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But Herodias found her opportunity to have John killed—it was on the king’s birthday! Herod prepared a great banquet and invited all his officials, military commanders, and the leaders of the province of Galilee to celebrate with him on his birthday. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On the day of the feast, his stepdaughter, the daughter of Herodias, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although unnamed, church history and tradition identifies her as Salome, not to be confused with the Salome who was a witness of the crucifixion (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 15:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'came to honor the king with a beautiful dance, and she flattered him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “she fascinated him.”
      marker-yv: yv-n
    - type: text
      text: 'Her dancing greatly pleased the king and his guests, so he said to the girl, “You can ask me for anything you want and I will give it to you!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he repeated it in front of everyone, with a vow to complete his promise to her: “Anything you desire and it will be yours! I’ll even share my kingdom with you!”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'She immediately left the room and said to her mother, “What should I ask for?” Her mother answered, “The head of John the Baptizer on a platter!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So she hurried back to the king and made her request: “I want you to bring me the head of John the Baptizer on a platter—and I want it right now!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Deeply grieved, the king regretted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “The king was tied in a knot.”
      marker-yv: yv-n
    - type: text
      text: 'his promise to her, but since he had made his vow in front of all his honored guests, he couldn’t deny her request. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So without delay the king ordered an executioner to bring John’s head, and he went and beheaded John in prison. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'He brought his head on a platter and gave it to the girl, and the girl brought it to her mother. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When John’s followers heard what had happened, they came and removed his body and laid it in a tomb.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Multiplies Food to Feed Five Thousand
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Isn’t this Mary’s son, the carpenter, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tekton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “carpenter,” “metal worker,” “sculptor,” “artisan,” “stone worker,” or “builder.”
      marker-yv: yv-n
    - type: text
      text: 'the brother of Jacob, Joseph, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Joses.”
      marker-yv: yv-n
    - type: text
      text: Judah, and Simon? And don’t his sisters all live here in Nazareth?” And they took offense at him.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The apostles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: returned from their mission
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus had sent the apostles into the Galilean villages to preach and cast out demons (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and they are now returning to report back to him.
      marker-yv: yv-n
    - type: text
      text: and gathered around Jesus and told him everything they had done and taught.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'There was such a swirl of activity around Jesus, with so many people coming and going, that they were unable to even eat a meal. So Jesus said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, let’s take a break and find a secluded place where you can rest a while.”
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They slipped away and left by sailboat for a deserted spot. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: But many of the people saw them leaving and realized where they were headed, so they took off running along the shore. Then people from the surrounding towns joined them in the chase, and a large crowd got there ahead of them.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'By the time Jesus came ashore, a massive crowd was waiting. At the sight of them, his heart was filled with compassion, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “nurturing love toward them.”
      marker-yv: yv-n
    - type: text
      text: 'because they seemed like wandering sheep who had no shepherd. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 27:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 34:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'So he taught them many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderful
    - type: text
      text: ' things.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Late that afternoon, his disciples said, “It’s getting really late and we’re here in this remote place with nothing to eat. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: You should send the crowds away so they can go into the surrounding villages and buy food.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'But he answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You give them something to eat.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Are you sure?” they replied. “You really want us to go buy them supper? It would cost a small fortune '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “two hundred denarii” (silver coins). A denarius was the going rate for a day’s wage. This would equal nearly eight months’ wages.
      marker-yv: yv-n
    - type: text
      text: to feed all these thousands of hungry people.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How many loaves of bread do you have?”
    - type: text
      text: ' he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go and see.”
    - type: text
      text: ' After they had looked around, they came back and said, “Five—plus a couple of fish.”'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then he instructed them to organize the crowd and have them sit down in groups on the grass. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A prophet is treated with honor everywhere except in his own hometown, among his relatives, and in his own house.”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'So they had them sit down in groups '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are two Greek words used for groups in this context. In v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: it is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: symposion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is used most frequently for drinking parties (rows of guests). The word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prasai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: found in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also mean “garden plots” or “flower beds.” Spread out over the hillside the people would have looked like flower beds, planted in green pastures, drinking in the miracle power of Jesus. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 23:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'of hundreds and fifties. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Then Jesus took the five loaves and two fish, gazed into heaven, and gave thanks to God. He broke the bread and the two fish and distributed them to his disciples to serve the people—
    - type: usfm
      marker: it
      children:
      - type: text
        text: and the food was multiplied in front of their eyes
    - type: text
      text: '! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Everyone had plenty to eat and was fully satisfied. '
