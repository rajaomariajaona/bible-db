document_id: MRK.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Rejected in Nazareth
  - type: text
    content: 'Afterward, Jesus left Capernaum '
  - type: note
    content: The healing of the woman and the resurrection of Jairus’ daughter were both done in Capernaum.
  - type: text
    content: 'and returned with his disciples to Nazareth, his hometown. '
  '10':
  - type: text
    content: And whatever house you enter, stay there until you leave the area.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Whatever community does not welcome you or receive your message, leave it behind. And as you go, shake the dust off your feet as a testimony against them.”
  - type: note
    content: 'The Aramaic and some Greek manuscripts add a sentence: “Truly, I tell you that it will be more tolerable for Sodom and Gomorrah in the day of judgment than for that city.”'
  '12':
  - type: text
    content: 'So they went out and preached publicly that everyone should repent. '
  '13':
  - type: text
    content: They cast out many demons and anointed many sick people with oil and healed them.
  - type: heading
    content: Death of John the Baptizer
  '14':
  - type: text
    content: 'King Herod soon heard about Jesus, for the name of Jesus was on everyone’s lips. Some were even saying about him, “John the Baptizer has been raised from the dead, and that’s why miraculous powers flow from him!” '
  '15':
  - type: text
    content: Others said, “No, he’s Elijah!” While others said, “He’s a prophet, like one of the prophets of old!”
  '16':
  - type: text
    content: 'When Herod heard what the people were saying, he concluded, “I beheaded John, and now he’s raised from the dead!” '
  '17':
  - type: text
    content: For Herod had John arrested and thrown into prison for repeatedly rebuking him in public, saying, “You have no right to marry Herodias, the wife of your brother Philip! You are violating the law of God!”
  - type: note
    content: See Lev. 18:16; 20:21.
  '19':
  - type: text
    content: 'This infuriated Herodias, and she held a bitter grudge against him and wanted John executed. '
  '2':
  - type: text
    content: 'On the Sabbath, he went to teach in the synagogue. Everyone who heard his teaching was overwhelmed with astonishment. They said among themselves, “What incredible wisdom has been given to him! Where did he receive such profound insights? '
  - type: note
    content: Or “Where did he get these things” (or “insights,” “understanding,” “ideas,” “teachings”)?
  - type: text
    content: 'And what mighty miracles flow through his hands! '
  '20':
  - type: text
    content: 'But Herod both feared and stood in awe '
  - type: note
    content: The Greek text can also mean “deep respect” or that Herod “feared” John.
  - type: text
    content: of John and kept him safely in custody, because he was convinced that he was a righteous and holy man. Every time Herod heard John speak, it disturbed his soul, but he was drawn to him and was intrigued by his words.
  '21':
  - type: text
    content: 'But Herodias found her opportunity to have John killed—it was on the king’s birthday! Herod prepared a great banquet and invited all his officials, military commanders, and the leaders of the province of Galilee to celebrate with him on his birthday. '
  '22':
  - type: text
    content: 'On the day of the feast, his stepdaughter, the daughter of Herodias, '
  - type: note
    content: Although unnamed, church history and tradition identifies her as Salome, not to be confused with the Salome who was a witness of the crucifixion (Mark 15:40).
  - type: text
    content: 'came to honor the king with a beautiful dance, and she flattered him. '
  - type: note
    content: Or “she fascinated him.”
  - type: text
    content: 'Her dancing greatly pleased the king and his guests, so he said to the girl, “You can ask me for anything you want and I will give it to you!” '
  '23':
  - type: text
    content: 'And he repeated it in front of everyone, with a vow to complete his promise to her: “Anything you desire and it will be yours! I’ll even share my kingdom with you!”'
  '24':
  - type: text
    content: 'She immediately left the room and said to her mother, “What should I ask for?” Her mother answered, “The head of John the Baptizer on a platter!” '
  '25':
  - type: text
    content: 'So she hurried back to the king and made her request: “I want you to bring me the head of John the Baptizer on a platter—and I want it right now!”'
  '26':
  - type: text
    content: 'Deeply grieved, the king regretted '
  - type: note
    content: The Aramaic is “The king was tied in a knot.”
  - type: text
    content: 'his promise to her, but since he had made his vow in front of all his honored guests, he couldn’t deny her request. '
  '27':
  - type: text
    content: 'So without delay the king ordered an executioner to bring John’s head, and he went and beheaded John in prison. '
  '28':
  - type: text
    content: 'He brought his head on a platter and gave it to the girl, and the girl brought it to her mother. '
  '29':
  - type: text
    content: When John’s followers heard what had happened, they came and removed his body and laid it in a tomb.
  - type: heading
    content: Jesus Multiplies Food to Feed Five Thousand
  '3':
  - type: text
    content: 'Isn’t this Mary’s son, the carpenter, '
  - type: note
    content: The Greek word tekton can be translated “carpenter,” “metal worker,” “sculptor,” “artisan,” “stone worker,” or “builder.”
  - type: text
    content: 'the brother of Jacob, Joseph, '
  - type: note
    content: Or “Joses.”
  - type: text
    content: Judah, and Simon? And don’t his sisters all live here in Nazareth?” And they took offense at him.
  '30':
  - type: text
    content: 'The apostles '
  - type: text
    content: returned from their mission
  - type: text
    content: ' '
  - type: note
    content: Jesus had sent the apostles into the Galilean villages to preach and cast out demons (6:7–13), and they are now returning to report back to him.
  - type: text
    content: and gathered around Jesus and told him everything they had done and taught.
  '31':
  - type: text
    content: 'There was such a swirl of activity around Jesus, with so many people coming and going, that they were unable to even eat a meal. So Jesus said to his disciples, '
  - type: text
    content: “Come, let’s take a break and find a secluded place where you can rest a while.”
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'They slipped away and left by sailboat for a deserted spot. '
  '33':
  - type: text
    content: But many of the people saw them leaving and realized where they were headed, so they took off running along the shore. Then people from the surrounding towns joined them in the chase, and a large crowd got there ahead of them.
  '34':
  - type: text
    content: 'By the time Jesus came ashore, a massive crowd was waiting. At the sight of them, his heart was filled with compassion, '
  - type: note
    content: The Aramaic is “nurturing love toward them.”
  - type: text
    content: 'because they seemed like wandering sheep who had no shepherd. '
  - type: note
    content: See Num. 27:17; Ezek. 34:5.
  - type: text
    content: 'So he taught them many '
  - type: text
    content: wonderful
  - type: text
    content: ' things.'
  '35':
  - type: text
    content: 'Late that afternoon, his disciples said, “It’s getting really late and we’re here in this remote place with nothing to eat. '
  '36':
  - type: text
    content: You should send the crowds away so they can go into the surrounding villages and buy food.”
  '37':
  - type: text
    content: 'But he answered them, '
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: '“Are you sure?” they replied. “You really want us to go buy them supper? It would cost a small fortune '
  - type: note
    content: Or “two hundred denarii” (silver coins). A denarius was the going rate for a day’s wage. This would equal nearly eight months’ wages.
  - type: text
    content: to feed all these thousands of hungry people.”
  '38':
  - type: text
    content: “How many loaves of bread do you have?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Go and see.”
  - type: text
    content: ' After they had looked around, they came back and said, “Five—plus a couple of fish.”'
  '39':
  - type: text
    content: 'Then he instructed them to organize the crowd and have them sit down in groups on the grass. '
  '4':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “A prophet is treated with honor everywhere except in his own hometown, among his relatives, and in his own house.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'So they had them sit down in groups '
  - type: note
    content: There are two Greek words used for groups in this context. In v. 39 it is the Greek word symposion, which is used most frequently for drinking parties (rows of guests). The word prasai found in v. 40 can also mean “garden plots” or “flower beds.” Spread out over the hillside the people would have looked like flower beds, planted in green pastures, drinking in the miracle power of Jesus. See Ps. 23:2.
  - type: text
    content: 'of hundreds and fifties. '
  '41':
  - type: text
    content: Then Jesus took the five loaves and two fish, gazed into heaven, and gave thanks to God. He broke the bread and the two fish and distributed them to his disciples to serve the people—
  - type: text
    content: and the food was multiplied in front of their eyes
  - type: text
    content: '! '
  '42':
  - type: text
    content: 'Everyone had plenty to eat and was fully satisfied. '
  '43':
  - type: text
    content: 'Then the twelve disciples picked up what remained, and each of them ended up with a basket full of leftovers! '
  '44':
  - type: text
    content: 'Altogether, five thousand families '
  - type: note
    content: Or “five thousand men.” There were women and children present as well, but it would have not been common for women and children to come by themselves. These five thousand men represented their households. This miracle is the only miracle recorded in all four Gospels.
  - type: text
    content: were fed that day!
  - type: heading
    content: Jesus Walks on Water
  '45':
  - type: text
    content: 'After everyone had their meal, Jesus instructed his disciples to get back into the boat and go on ahead of him and sail to the other side to Bethsaida. '
  - type: note
    content: This is Beit-Tside, which in Aramaic and Hebrew is “the fishing place.”
  '46':
  - type: text
    content: So he dispersed the crowd, said good-bye to his disciples, then slipped away to pray on the mountain.
  '47':
  - type: text
    content: 'As night fell, the boat was in the middle of the lake and Jesus was alone on land. '
  '48':
  - type: text
    content: 'The wind was against the disciples and he could see '
  - type: note
    content: Seeing them from land in the dark was an obvious miracle, for evening had come and Jesus was a great distance from them while they were in the middle of the lake. Jesus sees and knows the struggles each of us go through.
  - type: text
    content: that they were straining at the oars, trying to make headway.
  - type: text
    content: 'When it was almost morning, '
  - type: note
    content: Or “about the fourth watch of the night.”
  - type: text
    content: 'Jesus came to them, walking on the surface of the water, and he started to pass by them. '
  - type: note
    content: To pass by them is somewhat similar to God “passing by Moses” when he was on Sinai. See Ex. 33:19, 22.
  '49':
  - type: text
    content: 'When they all saw him walking on the waves, they thought he was a ghost and screamed out in terror. But he said to them at once, '
  - type: text
    content: “Don’t yield to fear. Have courage. It’s really me—I Am!”
  - type: note
    content: In both Greek and Aramaic, this reads, “I Am” (the living God), an obvious statement that Jesus is “the great I AM” and there is nothing to be afraid of. This is the same statement God made to Moses in front of the burning bush. See also Matt. 14:27; John 8:58.
  '5':
  - type: text
    content: 'He was unable to do any great miracle in Nazareth, '
  - type: note
    content: Nazareth was the only place recorded in the Gospels that Jesus was unable (because of their unbelief) to do great miracles.
  - type: text
    content: 'except to heal a few sick people by laying his hands upon them. '
  '51':
  - type: text
    content: 'Then he came closer and climbed into the boat with them, and immediately the stormy wind became still. They were completely and utterly overwhelmed with astonishment. '
  '52':
  - type: text
    content: 'Their doubting hearts '
  - type: note
    content: Or “their minds were dull [or “unwilling to learn”]” or “their hearts had been hardened.” The implication is that they were unwilling to accept new information. Every miracle carries a message.
  - type: text
    content: 'had not grasped his authority and power over all things in spite of just having witnessed the miraculous '
  - type: text
    content: feeding
  - type: text
    content: .
  - type: note
    content: 'Or “They didn’t understand about the loaves.” That is, they didn’t understand the lesson that the miracle was meant to teach them—that God has the power to deliver us, no matter what the limitation. Also, the miracle was that the bread multiplied in their hands, so they likewise had the power to rebuke the stormy wind and sail through to the other side, even if Jesus were to pass them. He wanted them to see things in a new light and know the authority that they now carried. The two lessons of the multiplied loaves were the following: (1) that Jesus had all power to meet every need, and (2) that the disciples carried this power with them, for the bread multiplied in their hands. They were also a part of the miracle. See also Mark 8:14–21. The two great miracles of Israel were also duplicated here: the crossing of the sea and the bread (or “manna”) that fell from heaven.'
  - type: heading
    content: Jesus the Healer
  '53':
  - type: text
    content: 'They made landfall at Gennesaret and anchored there. '
  - type: note
    content: Apparently, they were blown off course, since they were headed for Bethsaida. Gennesaret is a plain not far from Capernaum on the northwest side of the lake.
  '54':
  - type: text
    content: 'The moment they got out of the boat, everyone recognized that it was Jesus, '
  - type: text
    content: the healer
  - type: text
    content: '! '
  '55':
  - type: text
    content: 'So they ran throughout the region, telling the people, “Bring all the sick—even those too sick to walk and bring them on mats!” '
  '56':
  - type: text
    content: 'Wherever he went, in the countryside, villages, or towns, they placed the sick on mats in the streets or in public places '
  - type: note
    content: Or “marketplace.”
  - type: text
    content: 'and begged him, saying, “Just let us touch the tassel of your prayer shawl!” '
  - type: note
    content: The blue tassel on the corner of the prayer shawl was said to symbolize all the commandments and promises of God. See Num. 15:38–40. The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted Mal. 4:2 (“healing in his wings”) as a reference to the tassels of the prayer shawl.
  - type: text
    content: And all who touched him were instantly healed!
  '6':
  - type: text
    content: He was amazed at the depth of their unbelief!
  - type: note
    content: This is one of two instances where Jesus was amazed. The other is found in Matt. 8:10. Both refer to the response of faith. Here it is the great unbelief of those who knew Jesus and lived in his hometown of Nazareth (Jews). The other is the great faith of the Roman military captain (a gentile). We have no record of Jesus ever returning to Nazareth. He made Capernaum his base of ministry while in the province of Galilee.
  - type: text
    content: Then Jesus went out into the different villages and taught the people.
  - type: heading
    content: Jesus Sends Out the Twelve Apostles
  '7':
  - type: text
    content: 'Jesus gathered his twelve disciples and imparted to them his authority to cast out demons. Then he sent them out in pairs with these instructions: '
  '8':
  - type: text
    content: “Take only your staff and the sandals on your feet—no bread, no knapsack, no extra garment, and no money.
  - type: text
    content: ' '
  - type: note
    content: Or “copper coins inside your belt.”
