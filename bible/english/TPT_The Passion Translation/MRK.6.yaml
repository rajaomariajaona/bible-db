        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nazareth was the only place recorded in the Gospels that Jesus was unable (because of their unbelief) to do great miracles.
      marker-yv: yv-n
    - type: text
      text: 'except to heal a few sick people by laying his hands upon them. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Then he came closer and climbed into the boat with them, and immediately the stormy wind became still. They were completely and utterly overwhelmed with astonishment. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Their doubting hearts '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their minds were dull [or “unwilling to learn”]” or “their hearts had been hardened.” The implication is that they were unwilling to accept new information. Every miracle carries a message.
      marker-yv: yv-n
    - type: text
      text: 'had not grasped his authority and power over all things in spite of just having witnessed the miraculous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feeding
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “They didn’t understand about the loaves.” That is, they didn’t understand the lesson that the miracle was meant to teach them—that God has the power to deliver us, no matter what the limitation. Also, the miracle was that the bread multiplied in their hands, so they likewise had the power to rebuke the stormy wind and sail through to the other side, even if Jesus were to pass them. He wanted them to see things in a new light and know the authority that they now carried. The two lessons of the multiplied loaves were the following: (1) that Jesus had all power to meet every need, and (2) that the disciples carried this power with them, for the bread multiplied in their hands. They were also a part of the miracle. See also'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 8:14–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. The two great miracles of Israel were also duplicated here: the crossing of the sea and the bread (or “manna”) that fell from heaven.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
