  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-50
    - type: text
      text: 'When they all saw him walking on the waves, they thought he was a ghost and screamed out in terror. But he said to them at once, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t yield to fear. Have courage. It’s really me—I Am!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:49–50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In both Greek and Aramaic, this reads, “I Am” (the living God), an obvious statement that Jesus is “the great I AM” and there is nothing to be afraid of. This is the same statement God made to Moses in front of the burning bush. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 14:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:58
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He was unable to do any great miracle in Nazareth, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
