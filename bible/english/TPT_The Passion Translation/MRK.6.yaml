      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Seeing them from land in the dark was an obvious miracle, for evening had come and Jesus was a great distance from them while they were in the middle of the lake. Jesus sees and knows the struggles each of us go through.
      marker-yv: yv-n
    - type: text
      text: that they were straining at the oars, trying to make headway.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was almost morning, '
    - type: usfm
      marker: f
