      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The blue tassel on the corner of the prayer shawl was said to symbolize all the commandments and promises of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 15:38–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“healing in his wings”) as a reference to the tassels of the prayer shawl.
      marker-yv: yv-n
    - type: text
      text: And all who touched him were instantly healed!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He was amazed at the depth of their unbelief!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is one of two instances where Jesus was amazed. The other is found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 8:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Both refer to the response of faith. Here it is the great unbelief of those who knew Jesus and lived in his hometown of Nazareth (Jews). The other is the great faith of the Roman military captain (a gentile). We have no record of Jesus ever returning to Nazareth. He made Capernaum his base of ministry while in the province of Galilee.
      marker-yv: yv-n
  - type: usfm
