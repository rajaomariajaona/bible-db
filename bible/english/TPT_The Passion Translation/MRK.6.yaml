        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “five thousand men.” There were women and children present as well, but it would have not been common for women and children to come by themselves. These five thousand men represented their households. This miracle is the only miracle recorded in all four Gospels.
