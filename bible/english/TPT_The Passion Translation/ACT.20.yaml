        - type: text
          text: can only mean that he was lifeless. This boy becomes a picture of some believers today who, because they view themselves as “well off,” sit carelessly where they shouldn’t, growing drowsy, falling asleep, and enduring a disastrous fall. But God has grace and power to raise even the foolish ones back to life.
      marker-yv: yv-n
