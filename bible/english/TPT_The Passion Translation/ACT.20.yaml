document_id: ACT.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Apostle Paul Goes to Macedonia and Greece
  - type: text
    content: 'When the uproar finally died down, Paul gathered the believers and encouraged their hearts. He kissed them, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'said good-bye, and left for Macedonia. '
  '10':
  - type: text
    content: Paul went downstairs, bent over the boy, and embraced him. Taking him in his arms, he said to all the people gathered, “Stop your worrying. He’s come back to life!”
  - type: note
    content: Or “His soul is in him.” Paul raised him from the dead.
  '11':
  - type: text
    content: 'Paul went back upstairs, served communion, and ate a meal with them. Then he picked back up where he left off and taught until dawn. '
  - type: note
    content: The Aramaic adds “by land” (on foot).
  '12':
  - type: text
    content: Filled with enormous joy, they took the boy home alive and everyone was encouraged.
  - type: note
    content: The Greek is “comforted,” while the Aramaic is “overjoyed.” This translation merges both concepts.
  - type: heading
    content: Paul’s Voyage to Miletus
  '13':
  - type: text
    content: 'Continuing our journey, we made our way to the ship and sailed for Assos. '
  - type: note
    content: A coastal city in far western Turkey. Assos means “approaching.”
  - type: text
    content: 'Paul had previously arranged to meet us there as he traveled overland by foot. '
  '14':
  - type: text
    content: 'So he rejoined our team there and we took him aboard and sailed for Mitylene. '
  - type: note
    content: A city on the Greek island of Lesbos.
  '15':
  - type: text
    content: 'The next day we crossed over to Chios, '
  - type: note
    content: A Greek island in the Aegean Sea off the coast of Turkey.
  - type: text
    content: 'and the following day we arrived at the island of Samos. '
  - type: note
    content: A Greek island in the Aegean Sea off the coast of Turkey.
  - type: text
    content: 'We stayed at Trogyllium, '
  - type: note
    content: As translated from the Aramaic and some Greek manuscripts. Most Greek manuscripts do not have this clause.
  - type: text
    content: 'and on the day after that we reached Miletus. '
  - type: note
    content: An ancient seaport of far western Turkey.
  '16':
  - type: text
    content: 'Paul was in a hurry to arrive in Jerusalem, hoping to make it in time for the Feast of Pentecost, so he decided to bypass Ephesus and not spend any time in that region. '
  - type: note
    content: Or “waste any time in the province of Asia [Minor].”
  '17':
  - type: text
    content: 'However, from Miletus Paul had sent a message to the elders of the church '
  - type: note
    content: These elders would be equivalent to pastors, leaders of the church.
  - type: text
    content: in Ephesus and asked them to come meet with him.
  '18':
  - type: text
    content: 'When they arrived, he said to them, “All of you know how I’ve lived and conducted myself while I was with you. From the first day I set foot in western Turkey '
  '19':
  - type: text
    content: 'I’ve operated in God’s miracle power '
  - type: note
    content: As translated in the Aramaic, which is literally “I’ve performed God’s miracles.” The Greek is “I’ve served the Lord.”
  - type: text
    content: 'with great humility and served you '
  - type: note
    content: Some manuscripts add, “for more than three years.” See also 1 Thess. 2:10–12.
  - type: text
    content: 'with many tears. I’ve endured numerous ordeals because of the plots of the Jews. '
  '2':
  - type: text
    content: 'At every place he passed through, he brought words of great comfort and encouragement to the believers. Then he went on to Greece '
  '20':
  - type: text
    content: 'You know how I’ve taught you in public meetings and in your homes, and that I’ve not held anything back from you that would help you grow. '
  '21':
  - type: text
    content: 'I urged both Jews and non-Jews to turn from sin to God and to have faith in our Lord Jesus. '
  '22':
  - type: text
    content: 'And now I am captive to the Holy Spirit '
  - type: note
    content: Or “shackled by the Holy Spirit.”
  - type: text
    content: 'to go to Jerusalem, without really knowing what will happen to me there. '
  '23':
  - type: text
    content: 'Yet I know that the Holy Spirit warns me '
  - type: note
    content: This warning from the Holy Spirit could have come through prophecies, dreams, visions, or the voice of the Holy Spirit speaking within him.
  - type: text
    content: in town after town, saying, ‘Chains and afflictions are prepared for you.’
  '24':
  - type: text
    content: '“But whether I live or die is not important, for I don’t esteem my life as indispensable. '
  - type: note
    content: Or “I do not consider my life worth a single word.” That is, Paul viewed his life as not worth mentioning. We don’t need to see our lives as precious in our own eyes, for they are precious in the eyes of our Lord Jesus, and that must be enough.
  - type: text
    content: 'It’s more important for me to fulfill my destiny and to finish the ministry my Lord Jesus has assigned to me, which is to faithfully preach the wonderful news of God’s grace. '
  '25':
  - type: text
    content: 'I’ve been a part of your lives and shared with you many times the message of God’s kingdom realm. But now I leave you, and you will not see my face again. '
  '26':
  - type: text
    content: 'If any of you should be lost, I will not be blamed, for my conscience is clean, '
  '27':
  - type: text
    content: 'because I’ve taught you everything I could about God’s eternal plan and I’ve held nothing back. '
  '28':
  - type: text
    content: 'So guard your hearts. Be true shepherds '
  - type: note
    content: Or “pastors.”
  - type: text
    content: 'over all the flock and feed them well. Remember, it was the Holy Spirit who appointed you to guard and oversee '
  - type: note
    content: The Greek uses the word overseers or guardians. This is the sacred duty of his leaders in the church.
  - type: text
    content: 'the churches that belong to Jesus, the Anointed One, '
  - type: note
    content: As translated from some Greek and Aramaic texts. Jesus is implied, for the Aramaic is simply “the Anointed One.” Some Greek manuscripts and the Western Peshitta read “the church of God.”
  - type: text
    content: which he purchased and established by his own blood.
  '29':
  - type: text
    content: '“I know that after I leave, imposters who have no loyalty to the flock '
  - type: note
    content: As translated from the Aramaic. The Greek is “they won’t spare the flock.”
  - type: text
    content: 'will come among you like savage wolves. '
  '3':
  - type: text
    content: and stayed there for three months.
  - type: text
    content: 'Just as Paul was about to sail for Syria, he learned of a plot against him by the Jews, so he decided to return by going through Macedonia. '
  '30':
  - type: text
    content: 'Even some from among your very own ranks will rise up, twisting the truth '
  - type: note
    content: Or “speaking crooked things.”
  - type: text
    content: 'to seduce people into following them instead of Jesus. '
  '31':
  - type: text
    content: So be alert and discerning. Remember that for three years, night and day, I’ve never stopped warning each of you, pouring out my heart to you with tears.
  '32':
  - type: text
    content: '“And so now, I entrust you into God’s hands and the message of his grace, '
  - type: note
    content: The Aramaic is “the manifestation of grace.”
  - type: text
    content: 'which is all that you need to become strong. '
  - type: note
    content: Or “to build you up,” a Greek word taken from the root word for “architect.”
  - type: text
    content: All of God’s blessings are imparted through the message of his grace, which he provides as the spiritual inheritance given to all of his holy ones.
  - type: note
    content: Or “sanctified”; that is, those who are devoted to holiness.
  '33':
  - type: text
    content: '“I haven’t been after your money or any of your possessions. '
  - type: note
    content: Or “silver, gold, or fine apparel.”
  '34':
  - type: text
    content: 'You all know that I’ve worked with my hands to meet my own needs and the needs of those who’ve served with me. '
  '35':
  - type: text
    content: 'I’ve left you an example of how you should serve and take care of those who are weak. '
  - type: note
    content: Or “minister to the sick.”
  - type: text
    content: 'For we must always cherish the words of our Lord Jesus, who taught, '
  - type: text
    content: ‘Giving brings a far greater blessing than receiving.’
  - type: text
    content: '  ”'
  - type: note
    content: The Aramaic is an idiom that speaks of extravagant generosity. “Blessed are those who try to give more than they’ve been given.”
  '36':
  - type: text
    content: 'After Paul finished speaking, he knelt down and prayed with them. '
  '37':
  - type: text
    content: 'Then they all cried with great weeping as one after another hugged Paul and kissed him. '
  '38':
  - type: text
    content: What broke their hearts the most were his words “You will not see my face again.”
  - type: text
    content: Then they tearfully accompanied Paul back to the ship.
  '4':
  - type: text
    content: 'Seven men accompanied him as far as western Turkey. They were Sopater, '
  - type: note
    content: Sopater, or Sosipater, is mentioned in Rom. 16:21 as one of Paul’s relatives. His name means “his father’s savior.”
  - type: text
    content: 'son of Pyrrhus '
  - type: note
    content: Or “son of fiery red flames.” This phrase is not found in the Aramaic.
  - type: text
    content: 'from Berea, Aristarchus '
  - type: note
    content: See the third footnote on 19:29.
  - type: text
    content: 'and Secundus '
  - type: note
    content: Secundus means “fortunate.”
  - type: text
    content: 'from Thessalonica, Gaius '
  - type: note
    content: Many believe this is the same Gaius mentioned in 19:29. See the second footnote on 19:29.
  - type: text
    content: 'from Derbe, and Timothy, '
  - type: note
    content: The Aramaic is “Timothy of Lystra.” See introductions to 1 and 2 Timothy.
  - type: text
    content: 'Tychicus, '
  - type: note
    content: It is likely that Tychicus was a native of Ephesus since he carried the letter Paul wrote to them as well as the letter to Colossae. See Eph. 6:21; Col. 4:7. He is also mentioned in 2 Tim. 4:12 and Titus 3:12. His name means “child of fortune.”
  - type: text
    content: 'and Trophimus '
  - type: note
    content: Trophimus was not a Jew. He is mentioned in Acts 21:29. His name means “nutritious.”
  - type: text
    content: 'from western Turkey. '
  '5':
  - type: text
    content: These men went ahead and were waiting for us at Troas.
  - type: note
    content: Notice “us,” which implies Luke has now rejoined the missionary team.
  '6':
  - type: text
    content: 'As soon as all of the Passover celebrations were over, '
  - type: note
    content: Or “the Days of Unleavened Bread.” This holiday was observed during the week immediately following Passover and was wrapped into the Passover celebration.
  - type: text
    content: 'we sailed from Philippi. After five days we joined the others in Troas, where we stayed another week. '
  - type: note
    content: This is when the events took place mentioned by Paul in 2 Cor. 2:12–13.
  '7':
  - type: text
    content: 'On Sunday we gathered to take communion '
  - type: note
    content: The Aramaic is “breaking pieces of the Eucharist.”
  - type: text
    content: 'and to hear Paul preach. Because he was planning to leave the next day, he continued speaking until past midnight. '
  '8':
  - type: text
    content: 'There were many flickering lights '
  - type: note
    content: It is possible that these flickering lights refer to angelic activity in the upper chamber.
  - type: text
    content: 'in the upstairs chamber where we were meeting. '
  '9':
  - type: text
    content: 'Sitting in an open window listening was a young man named Eutychus. '
  - type: note
    content: Or “a preteen named Eutychus,” which means “fortunate” or “lucky.”
  - type: text
    content: As Paul’s sermon dragged on, Eutychus became drowsy and fell into a deep slumber. Sound asleep, he fell three stories to his death below.
  - type: note
    content: There is no doubt that “Lucky” died because of his fall. The Greek word nekros can only mean that he was lifeless. This boy becomes a picture of some believers today who, because they view themselves as “well off,” sit carelessly where they shouldn’t, growing drowsy, falling asleep, and enduring a disastrous fall. But God has grace and power to raise even the foolish ones back to life.
