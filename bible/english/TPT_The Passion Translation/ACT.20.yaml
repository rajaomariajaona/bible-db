document_id: ACT.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Apostle Paul Goes to Macedonia and Greece
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When the uproar finally died down, Paul gathered the believers and encouraged their hearts. He kissed them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'said good-bye, and left for Macedonia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Paul went downstairs, bent over the boy, and embraced him. Taking him in his arms, he said to all the people gathered, “Stop your worrying. He’s come back to life!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “His soul is in him.” Paul raised him from the dead.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Paul went back upstairs, served communion, and ate a meal with them. Then he picked back up where he left off and taught until dawn. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic adds “by land” (on foot).
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Filled with enormous joy, they took the boy home alive and everyone was encouraged.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is “comforted,” while the Aramaic is “overjoyed.” This translation merges both concepts.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Voyage to Miletus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Continuing our journey, we made our way to the ship and sailed for Assos. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A coastal city in far western Turkey. Assos means “approaching.”
      marker-yv: yv-n
    - type: text
      text: 'Paul had previously arranged to meet us there as he traveled overland by foot. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So he rejoined our team there and we took him aboard and sailed for Mitylene. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A city on the Greek island of Lesbos.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The next day we crossed over to Chios, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Greek island in the Aegean Sea off the coast of Turkey.
      marker-yv: yv-n
    - type: text
      text: 'and the following day we arrived at the island of Samos. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Greek island in the Aegean Sea off the coast of Turkey.
      marker-yv: yv-n
    - type: text
      text: 'We stayed at Trogyllium, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and some Greek manuscripts. Most Greek manuscripts do not have this clause.
      marker-yv: yv-n
    - type: text
      text: 'and on the day after that we reached Miletus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An ancient seaport of far western Turkey.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Paul was in a hurry to arrive in Jerusalem, hoping to make it in time for the Feast of Pentecost, so he decided to bypass Ephesus and not spend any time in that region. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “waste any time in the province of Asia [Minor].”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'However, from Miletus Paul had sent a message to the elders of the church '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These elders would be equivalent to pastors, leaders of the church.
      marker-yv: yv-n
    - type: text
      text: in Ephesus and asked them to come meet with him.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When they arrived, he said to them, “All of you know how I’ve lived and conducted myself while I was with you. From the first day I set foot in western Turkey '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I’ve operated in God’s miracle power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated in the Aramaic, which is literally “I’ve performed God’s miracles.” The Greek is “I’ve served the Lord.”
      marker-yv: yv-n
    - type: text
      text: 'with great humility and served you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts add, “for more than three years.” See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 2:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with many tears. I’ve endured numerous ordeals because of the plots of the Jews. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'At every place he passed through, he brought words of great comfort and encouragement to the believers. Then he went on to Greece '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You know how I’ve taught you in public meetings and in your homes, and that I’ve not held anything back from you that would help you grow. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I urged both Jews and non-Jews to turn from sin to God and to have faith in our Lord Jesus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And now I am captive to the Holy Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shackled by the Holy Spirit.”
      marker-yv: yv-n
    - type: text
      text: 'to go to Jerusalem, without really knowing what will happen to me there. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Yet I know that the Holy Spirit warns me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This warning from the Holy Spirit could have come through prophecies, dreams, visions, or the voice of the Holy Spirit speaking within him.
      marker-yv: yv-n
    - type: text
      text: in town after town, saying, ‘Chains and afflictions are prepared for you.’
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“But whether I live or die is not important, for I don’t esteem my life as indispensable. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I do not consider my life worth a single word.” That is, Paul viewed his life as not worth mentioning. We don’t need to see our lives as precious in our own eyes, for they are precious in the eyes of our Lord Jesus, and that must be enough.
      marker-yv: yv-n
    - type: text
      text: 'It’s more important for me to fulfill my destiny and to finish the ministry my Lord Jesus has assigned to me, which is to faithfully preach the wonderful news of God’s grace. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I’ve been a part of your lives and shared with you many times the message of God’s kingdom realm. But now I leave you, and you will not see my face again. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'If any of you should be lost, I will not be blamed, for my conscience is clean, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'because I’ve taught you everything I could about God’s eternal plan and I’ve held nothing back. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So guard your hearts. Be true shepherds '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “pastors.”
      marker-yv: yv-n
    - type: text
      text: 'over all the flock and feed them well. Remember, it was the Holy Spirit who appointed you to guard and oversee '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: overseers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: guardians
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This is the sacred duty of his leaders in the church.
      marker-yv: yv-n
    - type: text
      text: 'the churches that belong to Jesus, the Anointed One, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from some Greek and Aramaic texts. Jesus is implied, for the Aramaic is simply “the Anointed One.” Some Greek manuscripts and the Western Peshitta read “the church of God.”
      marker-yv: yv-n
    - type: text
      text: which he purchased and established by his own blood.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“I know that after I leave, imposters who have no loyalty to the flock '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “they won’t spare the flock.”
      marker-yv: yv-n
    - type: text
      text: 'will come among you like savage wolves. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and stayed there for three months.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as Paul was about to sail for Syria, he learned of a plot against him by the Jews, so he decided to return by going through Macedonia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Even some from among your very own ranks will rise up, twisting the truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “speaking crooked things.”
      marker-yv: yv-n
    - type: text
      text: 'to seduce people into following them instead of Jesus. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So be alert and discerning. Remember that for three years, night and day, I’ve never stopped warning each of you, pouring out my heart to you with tears.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“And so now, I entrust you into God’s hands and the message of his grace, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the manifestation of grace.”
      marker-yv: yv-n
    - type: text
      text: 'which is all that you need to become strong. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to build you up,” a Greek word taken from the root word for “architect.”
      marker-yv: yv-n
    - type: text
      text: All of God’s blessings are imparted through the message of his grace, which he provides as the spiritual inheritance given to all of his holy ones.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sanctified”; that is, those who are devoted to holiness.
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“I haven’t been after your money or any of your possessions. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “silver, gold, or fine apparel.”
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'You all know that I’ve worked with my hands to meet my own needs and the needs of those who’ve served with me. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'I’ve left you an example of how you should serve and take care of those who are weak. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “minister to the sick.”
      marker-yv: yv-n
    - type: text
      text: 'For we must always cherish the words of our Lord Jesus, who taught, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Giving brings a far greater blessing than receiving.’
    - type: text
      text: '  ”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is an idiom that speaks of extravagant generosity. “Blessed are those who try to give more than they’ve been given.”
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'After Paul finished speaking, he knelt down and prayed with them. '
  '37':
  - type: usfm
    marker: p
    children:
