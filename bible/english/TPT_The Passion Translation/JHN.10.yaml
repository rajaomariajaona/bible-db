document_id: JHN.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Kind Shepherd
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus said to the Pharisees
  - type: text
    text: ', '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen to this eternal truth: The person who sneaks over the wall to enter into the sheep pen, rather than coming through the gate, reveals himself as a thief coming to steal.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the true Shepherd walks right up to the gate,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and because the gatekeeper knows who he is, he opens the gate to let him in.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In this parable the gatekeeper would represent John the Baptizer who recognized Jesus as the Shepherd. John opened the gate for him to be introduced to Israel at Jesus’ baptism.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the sheep recognize the voice of the true Shepherd, for he calls his own by name and leads them out, for they belong to him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when he has brought out all his sheep, he walks ahead of them and they will follow him, for they are familiar with his voice.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But they will run away from strangers and never follow them because they know it’s the voice of a stranger.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jesus told the Pharisees this parable even though they didn’t understand a word of what he meant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: They didn’t understand this allegory of the Old Testament law as the sheepfold that became the religion of Judaism, like a pen that confined the people. Christ is the gate that not only allowed everyone in, but he let them out in the New Testament to enjoy all the riches of the pasture. The Holy Spirit is the gatekeeper and the false prophets and Pharisees are the thieves and robbers (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 2:8
      metadata:
        usfm: COL.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Remember that this chapter follows the healing of the blind man who was cast out of the “sheep pen” but accepted in Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 3:23–26
      metadata:
        usfm: GAL.3.23+GAL.3.24+GAL.3.25+GAL.3.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus is the shepherd, the gate, and the pasture.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Jesus went over it again, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I speak to you eternal truth: I am the Gate for the flock.'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. There is a word play with “I” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and “flock” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). As the gateway, he brings us to the Father and his kingdom realm. As the shepherd, he cares for us and shows us his loving heart.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All those who broke in before me are thieves who came to steal,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Old Testament refers to the kings of Israel and Judah as “shepherds.” These kings along with false prophets are shepherds who don’t always have God’s heart for the sheep. After the healing of the blind man, the Pharisees refused to acknowledge Jesus’ rightful place as shepherd of his flock, so the
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thieves coming to steal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: would also refer to them.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but the sheep never listened to them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Gateway.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A sheep pen was an enclosure with walls and no roof that would often have the sheep of an entire village kept within. After the sheep were brought in for the night, it was common for the shepherd to sleep at the entrance so he could protect his sheep. Only the shepherds of the sheep would be recognized by that gatekeeper. Jesus is the one who will remain with his flock and keep his sheep living in peace and safety. His teaching (voice) will guard us from the unreliable teachers who want to steal our hearts and bind us to themselves. They steal and rob the affection that belongs only to Jesus, our kind shepherd.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: To enter through me is to experience life, freedom, and satisfaction.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “go in and out and find pasture.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A thief has only one thing in mind—he wants to steal, slaughter,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thuo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is not the usual word for “kill.” It means “sacrifice” or “slaughter.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and destroy. But I have come to
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: give you everything in abundance,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the Aramaic text.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: more than you expect
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the Greek text.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: —life in its fullness until you overflow!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Good
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word for “good” in Greek (
    - type: usfm
      marker: it
      children:
      - type: text
        text: kalos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) can also mean “beautiful,” “virtuous,” “excellent,” “genuine,” or “better.” (See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Strong’s Concordance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Gr. 2570.) Jesus is also called the “Great Shepherd” ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 13:20
      metadata:
        usfm: HEB.13.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and the “Shepherd-King” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 5:4
      metadata:
        usfm: 1PE.5.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Shepherd who lays down my life as a sacrifice for the sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the worker who serves only for wages is not a real shepherd. Because he has no heart for the sheep he will run away and abandon them when he sees the wolf coming. And then the wolf mauls the sheep, drags them off, and scatters them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I alone am the Good Shepherd, and I know those whose hearts are mine, for they recognize me and know me,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: just as my Father knows my heart and I know my Father’s heart. I am ready to give my life for the sheep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And I have other sheep that I will gather which are not of this Jewish flock. And I, their shepherd, must lead them too, and they will follow me and listen to my voice. And I will join them all into one flock with one shepherd.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “one flock” is the church made up of both Jews and non-Jews. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 34:23
      metadata:
        usfm: EZK.34.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:11–14
      metadata:
        usfm: EPH.2.11+EPH.2.12+EPH.2.13+EPH.2.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Father has an intense love for me because I freely give my own life—to raise it up again.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I surrender my own life, and no one has the power to take my life from me. I have the authority to lay it down and the power to take it back again. This is the destiny my Father has set before me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This teaching set off another heated controversy among the Jewish leaders. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Many of them said, “This man is a demon-possessed lunatic! Why would anyone listen to a word he says?” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But then there were others who weren’t so sure: “His teaching is full of insight. These are not the ravings of a madman! How could a demonized man give sight to one born blind?”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus at the Feast of Renewal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'The time came to observe the winter Feast of Renewal in Jerusalem. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:22–23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is also known as the “Feast of Dedication” or “The Feast of Lights.” The Aramaic word for “dedication” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chudatha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is equivalent to the Hebrew word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Chanuka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Contemporary Judaism recognizes this as Hanukkah, celebrated on Kislev 25 on the Jewish calendar. The Greek is literally “The Feast of Renewing” to commemorate the miraculous renewing of oil that burned for eight days.
    marker-yv: yv-n
  - type: text
    text: 'Jesus walked into the temple area under Solomon’s covered walkway '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: when the Jewish leaders encircled him and said, “How much longer will you keep us in suspense? Tell us the truth and clarify this for us once and for all. Are you really the Messiah, the Anointed One?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have told you the truth already and you did not believe me. The proof of who I am is revealed by all the miracles that I do in the name of my Father.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yet, you stubbornly refuse to follow me, because you are not my sheep. As I’ve told you before:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My own sheep will hear my voice and I know each one, and they will follow me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I give to them the gift of eternal life and they will never be lost and no one has the power to snatch them out of my hands.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My Father, who has given them to me as his gift, is the mightiest of all, and no one has the power to snatch them from my Father’s care.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Father and I are one.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When they heard this, the Jewish leaders were so enraged that they picked up rocks to stone him to death. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father has empowered me to work many miracles and acts of mercy among you. So which one of them do you want to stone me for?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The Jewish leaders responded, “We’re not stoning you for anything good you did—it’s because of your blasphemy! You’re just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a son of Adam
  - type: text
    text: ', but you’ve claimed to be God!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Isn’t it written in your Scriptures that God said, ‘You are gods?’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 82:6
      metadata:
        usfm: PSA.82.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Scriptures cannot be denied or found to be in error.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if those who have the message of the Scriptures are said to be ‘gods,’ then why would you accuse me of blasphemy?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I have been uniquely chosen by God and he is the one who sent me to you. How then could it be blasphemy for me to say, ‘I am the Son of God!’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I’m not doing the beautiful works that my Father sent me to do, then don’t believe me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if you see me doing the beautiful works of God upon the earth, then you should at least believe the evidence of the miracles, even if you don’t believe my words! Then you would come to experience me and be convinced that I am in the Father and the Father is in me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Once again they attempted to seize him, but he escaped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miraculously
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the context of being encircled by those with stones in their hands ready to kill him. It was clearly a miracle. He may have become invisible, transported himself to another location, or caused his accusers to be momentarily paralyzed or blinded as he slipped away.
    marker-yv: yv-n
  - type: text
    text: 'from their clutches. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then Jesus went back to the place where John had baptized him at the crossing of the Jordan. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Many came out to where he was and said about him, “Even though John didn’t perform any miracles, everything he predicted about this man is true!” '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And many people became followers of Jesus at the Jordan and believed in him.
