document_id: PSA.72,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Righteous King
  - type: text
    content: Solomon’s psalm
  - type: note
    content: The Septuagint indicates this could be a psalm written by David for his son Solomon. This royal psalm is a prayer for the king. Read through it as though it is referring to King Jesus—One who is greater than Solomon.
  - type: text
    content: O God, make the king a godly judge like you
  - type: text
    content: and give the king’s son the gift of justice too.
  '10':
  - type: text
    content: 'Distant kings '
  - type: note
    content: Included in the Hebrew text are kings of Tarshish (Spain) and kings of Sheba and Seba (Ethiopia).
  - type: text
    content: will surrender and come with their gifts
  - type: text
    content: from every continent and coastland;
  - type: text
    content: they will offer their tribute to you.
  '11':
  - type: text
    content: O King of kings, they will all bow before you.
  - type: text
    content: O King of kings, every nation will one day serve you.
  '12':
  - type: text
    content: He will care for the needy and neglected
  - type: text
    content: when they cry to him for help.
  - type: text
    content: The humble and helpless will know his kindness,
  - type: text
    content: for with a father’s compassion he will save their souls.
  '14':
  - type: text
    content: They will be rescued from tyranny and torture,
  - type: text
    content: for their lifeblood is precious in his eyes.
  '15':
  - type: text
    content: Long live this King!
  - type: text
    content: 'May the wealth of the world '
  - type: note
    content: Or “the gold of Sheba.”
  - type: text
    content: be laid before him.
  - type: text
    content: May there be ceaseless praise and prayer to him.
  - type: text
    content: May all the blessing be brought to him.
  '16':
  - type: text
    content: Bless us with a bountiful harvest,
  - type: text
    content: with golden grain swaying on the mountain fields!
  - type: text
    content: May the cities be full of praising people, fruitful and filled—
  '17':
  - type: text
    content: so that his name may be honored forever!
  - type: text
    content: May the fame of his name spring forth!
  - type: text
    content: May it shine on, like the sunshine!
  - type: text
    content: In him all will be blessed to bless others,
  - type: text
    content: and may all the people bless the One who blessed them.
  '18':
  - type: text
    content: 'Praise '
  - type: text
    content: Yahweh
  - type: text
    content: ' forever, the God of Israel!'
  - type: text
    content: He is the one and only God of wonders,
  - type: text
    content: surpassing every expectation.
  '19':
  - type: text
    content: The blazing glory of his name will be praised forever!
  - type: text
    content: May all the earth overflow with his glory!
  - type: text
    content: Faithful is our King! Amen!
  '2':
  - type: text
    content: Help him to give true justice to your people,
  - type: text
    content: honorably and equally to all.
  '20':
  - type: text
    content: This concludes the poetry sung by David, Jesse’s son.
  - type: heading
    content: Book 3
  - type: heading
    content: The Leviticus Psalms
  - type: heading
    content: Psalms of worship and God’s house
  '3':
  - type: text
    content: Then the mountains of influence will be fruitful,
  - type: text
    content: and from your righteousness
  - type: text
    content: prosperity and peace will flow to all the people.
  '4':
  - type: text
    content: May the poor and humble have an advocate with the king.
  - type: text
    content: May he consider the children of the poor
  - type: text
    content: and crush the cruel oppressor.
  '5':
  - type: text
    content: The sun and moon will stop shining
  - type: text
    content: before your devoted lovers will stop worshiping;
  - type: text
    content: for ages upon ages the people will love and adore you!
  '6':
  - type: text
    content: Your favor will fall like rain upon our surrendered lives,
  - type: note
    content: Or “like rain on mown grass.”
  - type: text
    content: like showers reviving the earth.
  '7':
  - type: text
    content: In the days of his reign the righteous will spring forth
  - type: text
    content: with the abundance of peace and prosperity forevermore.
  '8':
  - type: text
    content: May he subdue and take dominion from sea to sea;
  - type: text
    content: may he rule from the river to the rim.
  '9':
  - type: text
    content: Desert nomads are bowing at his feet;
  - type: text
    content: every enemy is falling facedown, biting the dust!
