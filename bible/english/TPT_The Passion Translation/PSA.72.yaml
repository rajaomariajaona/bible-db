document_id: PSA.72,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Righteous King
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Solomon’s psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint indicates this could be a psalm written by David for his son Solomon. This royal psalm is a prayer for the king. Read through it as though it is referring to King Jesus—One who is greater than Solomon.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, make the king a godly judge like you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and give the king’s son the gift of justice too.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Distant kings '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 72:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Included in the Hebrew text are kings of Tarshish (Spain) and kings of Sheba and Seba (Ethiopia).
      marker-yv: yv-n
    - type: text
      text: will surrender and come with their gifts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from every continent and coastland;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will offer their tribute to you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O King of kings, they will all bow before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O King of kings, every nation will one day serve you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will care for the needy and neglected
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they cry to him for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The humble and helpless will know his kindness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for with a father’s compassion he will save their souls.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be rescued from tyranny and torture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their lifeblood is precious in his eyes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long live this King!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the wealth of the world '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 72:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the gold of Sheba.”
      marker-yv: yv-n
    - type: text
      text: be laid before him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May there be ceaseless praise and prayer to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all the blessing be brought to him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bless us with a bountiful harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with golden grain swaying on the mountain fields!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the cities be full of praising people, fruitful and filled—
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that his name may be honored forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the fame of his name spring forth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May it shine on, like the sunshine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In him all will be blessed to bless others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and may all the people bless the One who blessed them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' forever, the God of Israel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the one and only God of wonders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surpassing every expectation.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The blazing glory of his name will be praised forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all the earth overflow with his glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faithful is our King! Amen!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help him to give true justice to your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: honorably and equally to all.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This concludes the poetry sung by David, Jesse’s son.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Book 3
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: The Leviticus Psalms
    marker-yv: yv-h
  - type: usfm
    marker: ms3
    children:
    - type: text
      text: Psalms of worship and God’s house
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the mountains of influence will be fruitful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and from your righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prosperity and peace will flow to all the people.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the poor and humble have an advocate with the king.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he consider the children of the poor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and crush the cruel oppressor.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun and moon will stop shining
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before your devoted lovers will stop worshiping;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for ages upon ages the people will love and adore you!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your favor will fall like rain upon our surrendered lives,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 72:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like rain on mown grass.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like showers reviving the earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the days of his reign the righteous will spring forth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the abundance of peace and prosperity forevermore.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he subdue and take dominion from sea to sea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may he rule from the river to the rim.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desert nomads are bowing at his feet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every enemy is falling facedown, biting the dust!
