  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus looked at him and prophesied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Before the rooster crows in the morning, you will deny
  - type: text
    text: ' '
  - type: usfm
