  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peter, my dear friend, listen to what I’m about to tell you. Satan has obtained permission to come and sift you all like wheat and test your faith.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But I have prayed for you, Peter, that you would stay faithful to me no matter what comes. Remember this: after you have turned back to me and have been restored, make it your life mission to strengthen the faith of your brothers.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “But Lord,” Peter replied, “I am ready to stand with you to the very end, even if it means prison or death!”
- type: usfm
