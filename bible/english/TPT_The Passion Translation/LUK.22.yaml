    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'The religious leaders seized Jesus and led him away, but Peter followed from a safe distance. They brought him to the home of the high priest, where people were already gathered out in the courtyard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
