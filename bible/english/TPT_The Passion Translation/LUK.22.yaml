    - type: text
      text: '4'
  - type: text
    text: 'He secretly went to the religious hierarchy and the captains of the temple guards to discuss with them how he could betray Jesus and turn him over to their hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The religious hierarchy was elated over Judas’ treachery, and they agreed to give him a sum of money in exchange for Jesus’ betrayal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Judas vowed that he would find them a suitable opportunity to betray Jesus when he was away from the crowds.
- type: usfm
