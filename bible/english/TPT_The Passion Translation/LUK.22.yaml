- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: They all shouted, “Then you do claim to be the Son of God?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are the ones who say I am.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: They all shouted, “We’ve heard it from his very lips! What further proof do we need?”
