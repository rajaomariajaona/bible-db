  - type: text
    text: Jesus Prophesies the Location of the Last Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'On the day the Passover lambs were to be sacrificed, Jesus sent for Peter and John and instructed them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and prepare the Passover supper so we can eat it together.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They asked him, “Where do we make the preparations to eat the meal?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus gave them this sign: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When you enter the city, you will find a man
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
