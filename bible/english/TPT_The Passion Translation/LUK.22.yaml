      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Carrying water was a task given to women; it would have been easy to spot a man carrying the water jug.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: carrying a jug of water.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jerusalem would have been filled with pilgrims coming to celebrate the feast. Every house would be filled with additional guests, so finding a room for Jesus and the Twelve would be no easy task. It is possible that this man carrying a jug of water (normally a woman’s task) would be an Essene. They were the only Jewish men who culturally would carry water in this way since they were celibates. They had a community in Jerusalem that had a gate called the “Essene Gate.” They also had a different calendar than the typical Jewish one, which meant they would still have guest rooms available.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow him home
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and say to the owner of the house, ‘The Teacher told us to ask you, “Where is the room I may use to have the Passover meal with my disciples?” ’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will then take you to a large, fully furnished upstairs room. Make the preparations for us there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They went and found everything to be exactly like Jesus had prophesied, and they prepared the Passover meal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and His Disciples Eat the Last Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus arrived at the upper room, he took his place at the table along with all the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have longed with passion and desire to eat this Passover lamb with you before I endure my sufferings.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I promise you that the next time we eat this, we will be together in the feast of God’s kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he raised a cup and gave thanks to God and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take this and pass it on to one another and drink.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I promise you that the next time we drink this wine, we will be together in the feast of God’s kingdom.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
