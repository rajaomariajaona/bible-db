  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: They asked him point blank, “Tell us, are you the Christ, the Messiah, or not?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I tell you the truth, you won’t believe me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if I question you, you will not answer me or release me.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:68
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The phrase “or release me” is found only in the Aramaic text.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: usfm
    marker: wj
    children:
