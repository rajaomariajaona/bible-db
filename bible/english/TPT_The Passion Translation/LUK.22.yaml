  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The apostles questioned among themselves which one of them was about to do this.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apostles Argue over Which of Them Will Be the Greatest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The disciples bickered over which one of them would be considered the greatest '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This took place at the Lord’s Passover table. Their discussion of who was the worst among them led them to argue over who was the greatest. Jesus was only hours away from the horrible death of crucifixion while his apostles argued.
    marker-yv: yv-n
  - type: text
    text: 'in the kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus interrupted their argument, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The kings and men of authority in this world rule oppressively over their subjects, claiming that they do it for the good of the people. They are obsessed with how others see them.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is actually “They want to be called ‘servants of goodness.’ ”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But this is not your calling. You will lead by a different model. The greatest one among you will live as one called to serve others without honor.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text uses the word here for “youngest,” and the Aramaic is “small one.” In Hebrew culture in the days of Jesus, the firstborn of the household had honor, while the youngest accepted the role of menial service to all the others of the house.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The greatest honor and authority is reserved for the one who has a servant heart.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The leaders who are served are the most important in your eyes, but in the kingdom, it is the servants who lead. Am I not here with you as one who serves?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Because you have stood with me through all my trials and ordeals,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am promising you the kingdom that the Father has promised me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: We will celebrate in this kingdom and you will feast with me at my table. And each of you will be given a throne, twelve thrones in all, and you will be made rulers on thrones to judge the tribes of Israel.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prophesies Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
