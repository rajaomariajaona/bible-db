    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used here is literally “new testament.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I make with you, and it will be poured out soon for all of you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I want you to know that the hands of the one who delivers me to be the sacrifice are with mine on the table this very moment.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
