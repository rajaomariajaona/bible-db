        text: are found in the Aramaic manuscript, many Greek texts omit them. Most of the early church fathers included them in their translations and commentaries. Though very rare, the phenomenon of hematidrosis, sweating blood, is well documented. Under great emotional stress, tiny capillaries in the sweat glands can break, thus mixing blood with sweat. This process could have marked weakness and possibly shock.
