document_id: LUK.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Satan Entered into Judas
  - type: text
    content: 'As the celebration of the Passover Lamb '
  - type: note
    content: The Passover celebration was known as the “Feast of Bread without Yeast.” The Jewish people commemorate their exodus from Egypt to this day with a weeklong Passover feast. See Ex. 12:1–20; Deut. 16:1–8.
  - type: text
    content: was approaching, the Jewish religious leaders and scholars of the law continually schemed to find a way to murder Jesus without starting a riot—for they feared the crowds.
  '10':
  - type: text
    content: 'Jesus gave them this sign: '
  - type: text
    content: “When you enter the city, you will find a man
  - type: text
    content: ' '
  - type: note
    content: Carrying water was a task given to women; it would have been easy to spot a man carrying the water jug.
  - type: text
    content: carrying a jug of water.
  - type: text
    content: ' '
  - type: note
    content: Jerusalem would have been filled with pilgrims coming to celebrate the feast. Every house would be filled with additional guests, so finding a room for Jesus and the Twelve would be no easy task. It is possible that this man carrying a jug of water (normally a woman’s task) would be an Essene. They were the only Jewish men who culturally would carry water in this way since they were celibates. They had a community in Jerusalem that had a gate called the “Essene Gate.” They also had a different calendar than the typical Jewish one, which meant they would still have guest rooms available.
  - type: text
    content: Follow him home
  - type: text
    content: ' '
  '11':
  - type: text
    content: and say to the owner of the house, ‘The Teacher told us to ask you, “Where is the room I may use to have the Passover meal with my disciples?” ’
  - type: text
    content: ' '
  '12':
  - type: text
    content: He will then take you to a large, fully furnished upstairs room. Make the preparations for us there.”
  '13':
  - type: text
    content: They went and found everything to be exactly like Jesus had prophesied, and they prepared the Passover meal.
  - type: heading
    content: Jesus and His Disciples Eat the Last Supper
  '14':
  - type: text
    content: 'When Jesus arrived at the upper room, he took his place at the table along with all the apostles. '
  '15':
  - type: text
    content: 'Then he told them, '
  - type: text
    content: “I have longed with passion and desire to eat this Passover lamb with you before I endure my sufferings.
  - type: text
    content: ' '
  '16':
  - type: text
    content: I promise you that the next time we eat this, we will be together in the feast of God’s kingdom.”
  '17':
  - type: text
    content: 'Then he raised a cup and gave thanks to God and said to them, '
  - type: text
    content: “Take this and pass it on to one another and drink.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I promise you that the next time we drink this wine, we will be together in the feast of God’s kingdom.”
  - type: note
    content: Verses 17–18 are not found in most Aramaic texts. Most Greek texts and a fifth-century Aramaic manuscript known as “the Palestinian Syriac” include them in the narrative.
  '19':
  - type: text
    content: 'Then he lifted up a loaf, and after praying a prayer of thanksgiving to God, he gave each of his apostles a piece of bread, saying, '
  - type: text
    content: “This loaf is my body,
  - type: text
    content: ' '
  - type: note
    content: From here to the end of v. 20 is considered the most highly debated passage in Luke’s Gospel because a few reliable Greek manuscripts do not have it. Yet there is ample internal evidence to argue for its inclusion.
  - type: text
    content: which is now being offered to you. Always eat it to remember me.”
  '20':
  - type: text
    content: 'After supper was over, he lifted the cup again and said, '
  - type: text
    content: “This cup is my blood of the new covenant
  - type: text
    content: ' '
  - type: note
    content: The Aramaic word used here is literally “new testament.”
  - type: text
    content: I make with you, and it will be poured out soon for all of you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But I want you to know that the hands of the one who delivers me to be the sacrifice are with mine on the table this very moment.
  - type: text
    content: ' '
  '22':
  - type: text
    content: The Son of Man must now go where he will be sacrificed. But there will be great and unending doom for the man who betrays me.”
  '23':
  - type: text
    content: The apostles questioned among themselves which one of them was about to do this.
  - type: heading
    content: Apostles Argue over Which of Them Will Be the Greatest
  '24':
  - type: text
    content: 'The disciples bickered over which one of them would be considered the greatest '
  - type: note
    content: This took place at the Lord’s Passover table. Their discussion of who was the worst among them led them to argue over who was the greatest. Jesus was only hours away from the horrible death of crucifixion while his apostles argued.
  - type: text
    content: 'in the kingdom. '
  '25':
  - type: text
    content: 'Jesus interrupted their argument, saying, '
  - type: text
    content: “The kings and men of authority in this world rule oppressively over their subjects, claiming that they do it for the good of the people. They are obsessed with how others see them.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is actually “They want to be called ‘servants of goodness.’ ”
  '26':
  - type: text
    content: But this is not your calling. You will lead by a different model. The greatest one among you will live as one called to serve others without honor.
  - type: text
    content: ' '
  - type: note
    content: The Greek text uses the word here for “youngest,” and the Aramaic is “small one.” In Hebrew culture in the days of Jesus, the firstborn of the household had honor, while the youngest accepted the role of menial service to all the others of the house.
  - type: text
    content: The greatest honor and authority is reserved for the one who has a servant heart.
  - type: text
    content: ' '
  '27':
  - type: text
    content: The leaders who are served are the most important in your eyes, but in the kingdom, it is the servants who lead. Am I not here with you as one who serves?
  '28':
  - type: text
    content: “Because you have stood with me through all my trials and ordeals,
  - type: text
    content: ' '
  '29':
  - type: text
    content: I am promising you the kingdom that the Father has promised me.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'At that time Satan himself entered into Judas the locksmith, '
  - type: note
    content: See the last footnote on Luke 6:14–16.
  - type: text
    content: 'who was one of the twelve apostles. '
  '30':
  - type: text
    content: We will celebrate in this kingdom and you will feast with me at my table. And each of you will be given a throne, twelve thrones in all, and you will be made rulers on thrones to judge the tribes of Israel.”
  - type: heading
    content: Jesus Prophesies Peter’s Denial
  '31':
  - type: text
    content: “Peter, my dear friend, listen to what I’m about to tell you. Satan has obtained permission to come and sift you all like wheat and test your faith.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'But I have prayed for you, Peter, that you would stay faithful to me no matter what comes. Remember this: after you have turned back to me and have been restored, make it your life mission to strengthen the faith of your brothers.”'
  '33':
  - type: text
    content: “But Lord,” Peter replied, “I am ready to stand with you to the very end, even if it means prison or death!”
  '34':
  - type: text
    content: 'Jesus looked at him and prophesied, '
  - type: text
    content: “Before the rooster crows in the morning, you will deny
  - type: text
    content: ' '
  - type: note
    content: The Aramaic text says “blasphemed.”
  - type: text
    content: three times that you even know me.”
  '35':
  - type: text
    content: 'Then he said to all of them, '
  - type: text
    content: “When I sent you out empty-handed, did you lack anything?”
  - type: text
    content: “Not a thing,” they answered. “God provided all we needed.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: '“But now I say to you: Take what you need.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: If you have money, take it
  - type: text
    content: ' '
  - type: note
    content: Now the disciples were to take needed items with them, including money, for they were to be a source of blessing to others with their generosity.
  - type: text
    content: —and a knapsack and a sword.
  - type: text
    content: ' '
  - type: note
    content: It is possible that Jesus was using symbolic speech, for we take with us the sword of the Spirit, which is the Word of God. See Eph. 6:17.
  - type: text
    content: Danger is imminent.
  - type: text
    content: ' '
  - type: note
    content: 'The text here is a Hebraic figure of speech: “If you don’t have a sword, you’d better sell something and buy one,” which implies that danger is imminent.'
  '37':
  - type: text
    content: For the prophetic Scripture about me ‘He will be accused of being a criminal’
  - type: text
    content: ' '
  - type: note
    content: See Isa. 53:8–9.
  - type: text
    content: will now come to pass. All that was prophesied of me will be fulfilled.”
  '38':
  - type: text
    content: The disciples told him, “Lord, we already have two swords!”
  - type: text
    content: “You still don’t understand,”
  - type: text
    content: ' '
  - type: note
    content: Or “That will be enough.” Jesus is saying, “Never mind. You still don’t get it.” He corrected their thinking about taking swords and using violent means in vv. 50–51.
  - type: text
    content: Jesus responded.
  - type: heading
    content: The Garden of Gethsemane
  '39':
  - type: text
    content: 'Jesus left the upper room with his disciples '
  - type: note
    content: That is, with the exception of Judas. See v. 47.
  - type: text
    content: 'and, as was his habit, went to the Mount of Olives, '
  - type: text
    content: his place of secret prayer
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'He secretly went to the religious hierarchy and the captains of the temple guards to discuss with them how he could betray Jesus and turn him over to their hands. '
  '40':
  - type: text
    content: 'There he told the apostles, '
  - type: text
    content: “Keep praying for strength to be spared from the severe test of your faith that is about to come.”
  '41':
  - type: text
    content: 'Then he withdrew from them a short distance '
  - type: note
    content: Literally “a stone’s throw away.”
  - type: text
    content: 'to be alone. Kneeling down, he prayed, '
  '42':
  - type: text
    content: “Father, if you are willing, take this cup of agony away from me.
  - type: text
    content: ' '
  - type: note
    content: Jesus asked the Father to be spared from death in the garden so that he could go all the way to the cross. His prayer was answered. The blood that dripped in the garden would not redeem. Jesus had to carry the cross and fulfill all that was written of him. See Heb. 5:7.
  - type: text
    content: But no matter what, your will must be mine.”
  '43':
  - type: text
    content: 'Jesus called '
  - type: note
    content: 'Translated from the Aramaic text. The Greek manuscripts state it passively: “An angel from heaven appeared.”'
  - type: text
    content: 'for an angel of glory to strengthen him, and the angel appeared. '
  '44':
  - type: text
    content: 'He prayed even more passionately, like one being sacrificed, '
  - type: note
    content: The Aramaic text is literally “He prayed sacrificially.”
  - type: text
    content: until he was in such intense agony of spirit that his sweat became drops of blood, dripping onto the ground.
  - type: note
    content: Although vv. 43–44 are found in the Aramaic manuscript, many Greek texts omit them. Most of the early church fathers included them in their translations and commentaries. Though very rare, the phenomenon of hematidrosis, sweating blood, is well documented. Under great emotional stress, tiny capillaries in the sweat glands can break, thus mixing blood with sweat. This process could have marked weakness and possibly shock.
  '45':
  - type: text
    content: 'When Jesus finished praying, he got up and went to his disciples and found them all asleep, for they were exhausted and overwhelmed with sorrow. '
  '46':
  - type: text
    content: “Why are you sleeping?”
  - type: text
    content: ' he asked them. '
  - type: text
    content: “You need to be alert and pray for the strength to endure the great temptation.”
  - type: heading
    content: Judas Betrays Jesus
  '47':
  - type: text
    content: No sooner had he finished speaking when suddenly a mob approached, and in front of the mob was his disciple Judas. He walked up close to Jesus and greeted him with a kiss. For he had agreed to give the religious leaders a sign, saying, “The one I kiss is the one to seize.”
  - type: note
    content: Nearly every Greek manuscript leaves out this information. The Aramaic text includes it.
  '48':
  - type: text
    content: 'Jesus looked at him with sorrow and said, '
  - type: text
    content: “A kiss, Judas? Are you really going to betray the Son of Man with a kiss?”
  '49':
  - type: text
    content: When the other disciples understood what was happening, they asked, “Lord, shall we fight them with our swords?”
  '5':
  - type: text
    content: 'The religious hierarchy was elated over Judas’ treachery, and they agreed to give him a sum of money in exchange for Jesus’ betrayal. '
  '50':
  - type: text
    content: Just then, one of the disciples swung his sword at the high priest’s servant and slashed off his right ear.
  - type: note
    content: The servant’s name was Malchus (John 18:10). What Peter did was a criminal act that could have ruined his entire life. Jesus was concerned both for the wounded man and Peter’s future.
  '51':
  - type: text
    content: 'Jesus stopped the incident from escalating any further by saying, '
  - type: text
    content: “Enough of this!”
  - type: text
    content: ' Then he touched the right side of the injured man’s head and '
  - type: text
    content: the ear grew back
  - type: text
    content: ' '
  - type: note
    content: 'Implied in the context of this miracle. Jesus, the Creator, re-created his ear. The last thing Jesus did before they tied and bound his beautiful hands to arrest him in Gethsemane: He used his healing hands to restore the cut-off ear that Peter slashed (here and John 18:12). He was bound for hours until they loosed his hands to pierce them with nails.'
  - type: text
    content: —he was healed!
  '52':
  - type: text
    content: 'Jesus turned to those who had come to seize him—the ruling priests, the officers of the temple police, and the religious leaders—and said, '
  - type: text
    content: “Am I a criminal that you come to capture me with clubs and swords? Wasn’t I with you day after day, teaching in the temple courts?
  - type: text
    content: ' '
  '53':
  - type: text
    content: You could have seized me at any time. But in the darkness of night you have now found your time, for it belongs to you and to the prince of darkness.”
  - type: note
    content: The “prince of darkness” is Satan. This phrase is found only in the Aramaic manuscripts. The Greek text states, “the powers of darkness.”
  - type: heading
    content: Peter Denies He Knew Jesus
  '54':
  - type: text
    content: 'The religious leaders seized Jesus and led him away, but Peter followed from a safe distance. They brought him to the home of the high priest, where people were already gathered out in the courtyard. '
  '55':
  - type: text
    content: Someone had built a fire, so Peter inched closer and sat down among them to stay warm.
  '56':
  - type: text
    content: A girl noticed Peter sitting in the firelight. Staring at him, she pointed him out and said, “This man is one of Jesus’ disciples!”
  '57':
  - type: text
    content: Peter flatly denied it, saying, “What are you talking about, girl? I don’t know him!”
  '58':
  - type: text
    content: A little while later, someone else spotted Peter and said, “I recognize you. You’re one of his, I know it!”
  - type: text
    content: Peter again said, “I’m not one of his disciples.”
  '59':
  - type: text
    content: 'About an hour later, someone else identified Peter and insisted he was a disciple of Jesus, saying, “Look at him! He’s from Galilee, '
  - type: note
    content: Peter’s accent gave him away as being a Galilean. See also Mark 14:70.
  - type: text
    content: just like Jesus. I know he’s one of them.”
  '6':
  - type: text
    content: Judas vowed that he would find them a suitable opportunity to betray Jesus when he was away from the crowds.
  - type: heading
    content: Jesus Prophesies the Location of the Last Supper
  '60':
  - type: text
    content: But Peter was adamant. “Listen, I don’t know what you’re talking about. Don’t you understand? I don’t even know him.” While the words were still in his mouth, the rooster crowed.
  '61':
  - type: text
    content: 'At that moment, the Lord, who was being led through the courtyard by his captors, '
  - type: note
    content: Implied by the context, necessary for proper understanding of the narrative.
  - type: text
    content: 'turned around and gazed at Peter. All at once Peter remembered the words Jesus had prophesied over him, '
  - type: text
    content: “Before the rooster crows in the morning, you will deny three times that you even know me.”
  - type: text
    content: ' '
  '62':
  - type: text
    content: 'Peter burst into tears, '
  - type: note
    content: It is not just our sin that causes us to weep. It is seeing the Savior whom we have sinned against that brings our tears.
  - type: text
    content: ran off from the crowd, and wept bitterly.
  - type: heading
    content: Jesus Is Mocked and Severely Beaten
  '63':
  - type: text
    content: 'Those who were guarding Jesus mocked and beat him severely. '
  '64':
  - type: text
    content: 'They also made fun of him, blindfolding him and slapping his face and saying, “Prove that you are a prophet and tell us which one of us hit you!” '
  '65':
  - type: text
    content: They blasphemed and heaped insult after insult upon him.
  - type: heading
    content: Jesus before the Jewish Council
  '66':
  - type: text
    content: 'At daybreak the high priests, the experts of the law, and the top religious leaders convened and had Jesus brought before their council. '
  '67':
  - type: text
    content: They asked him point blank, “Tell us, are you the Christ, the Messiah, or not?”
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “If I tell you the truth, you won’t believe me.
  - type: text
    content: ' '
  '68':
  - type: text
    content: And if I question you, you will not answer me or release me.
  - type: text
    content: ' '
  - type: note
    content: The phrase “or release me” is found only in the Aramaic text.
  '69':
  - type: text
    content: But from today on, the Son of Man will be enthroned in the place of honor, power, and authority with Almighty God.”
  '7':
  - type: text
    content: 'On the day the Passover lambs were to be sacrificed, Jesus sent for Peter and John and instructed them, '
  - type: text
    content: “Go and prepare the Passover supper so we can eat it together.”
  '70':
  - type: text
    content: They all shouted, “Then you do claim to be the Son of God?”
  - type: text
    content: 'He said to them, '
  - type: text
    content: “You are the ones who say I am.”
  '71':
  - type: text
    content: They all shouted, “We’ve heard it from his very lips! What further proof do we need?”
  '9':
  - type: text
    content: They asked him, “Where do we make the preparations to eat the meal?”
