document_id: EZK.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Eagles and the Vine
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '10':
  - type: text
    content: Yes, it is planted—but will it thrive?
  - type: text
    content: 'Will it not shrivel up when the east wind '
  - type: note
    content: That is, the Babylonian armies.
  - type: text
    content: blows?
  - type: text
    content: 'Will it not wither '
  - type: text
    content: in the fertile soil
  - type: text
    content: ' where it had grown?”'
  - type: heading
    content: Yahweh Unlocks His Riddle
  '11':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '12':
  - type: text
    content: '“Ask that tribe of rebels if they know the meaning of my parable. Tell them: ‘Listen, the king of Babylon swooped into Jerusalem. Then he carried away the king and top officials and took them off to Babylon. '
  - type: note
    content: See 2 Kings 24:10–17. Babylon and Egypt (see Ezek. 17:17) also represent spiritual forces that affect the growth and advance of the church today. We, too, are a vine, a low spreading vine that is meant to bear much fruit in our union with Christ (see v. 6; John 15). Babylon pictures the world system, and Egypt pictures leaning on the strength of man (the flesh). We need to be set free from our captivity to the world and our trust in man.
  '13':
  - type: text
    content: 'He took one from the royal family '
  - type: note
    content: That is, Zedekiah, who was the uncle of King Jehoiachin of Judah.
  - type: text
    content: 'and made a treaty with him, forcing him to swear an oath of allegiance to him. He also carried off to Babylon the leading men of Israel '
  '14':
  - type: text
    content: 'so that their kingdom would be humbled and not rise again and to ensure that the treaty would be kept. '
  - type: note
    content: Or “surviving only by keeping his treaty.”
  '15':
  - type: text
    content: 'But he rebelled against Nebuchadnezzar and sent envoys to Egypt to procure himself horses and a large army. Will he get away with that? Will a man who has done this go unpunished? Will he break the treaty and still escape? '
  '16':
  - type: text
    content: 'As surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', live, this king will die in Babylon! '
  - type: text
    content: He will die
  - type: text
    content: ' in the country of the king who put him on the throne, because he despised his oath and broke the treaty he had made. '
  '17':
  - type: text
    content: 'Despite Pharaoh’s mighty army and numerous troops, he will not be able to save him in war. When the Babylonians build siege ramps and wooden towers to kill many in the city, the Egyptians will not '
  - type: text
    content: lift a finger to help
  - type: text
    content: '! '
  '18':
  - type: text
    content: For he despised his oath by breaking the treaty to which he had pledged himself, and he will not go unpunished.
  '19':
  - type: text
    content: '“ ‘Therefore, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', decree, as surely as I live, I swear it. It was my oath that he has despised and my treaty which he has broken. I will punish him for this! '
  '2':
  - type: text
    content: '“Son of man, propose this riddle to Israel, and speak this parable '
  - type: note
    content: There is a play on words in the Hebrew. The words for “speak” and “parable” come from the same Hebrew triliteral root word.
  - type: text
    content: 'to the people. '
  '20':
  - type: text
    content: 'I will throw my net over him and trap him in it. I will take him to Babylon and render judgment against him there for all the wicked things he did against me. '
  - type: note
    content: See Ezek. 12:13.
  '21':
  - type: text
    content: 'All his elite troops will fall by the sword, and the survivors will be scattered in every direction. And then you will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it.’ ”'
  - type: heading
    content: Parable of the Cedar Tree
  '22':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “I will take the highest branch from a cedar tree.
  - type: text
    content: I will break off from the very top a tender shoot
  - type: text
    content: and plant it myself on a high and lofty mountain.
  '23':
  - type: text
    content: I will plant it on the highest mountain in Israel,
  - type: text
    content: where it will put out branches and bear fruit
  - type: note
    content: See John 15:1–16; Gal. 5:22–23.
  - type: text
    content: and grow into a stately cedar tree.
  - type: note
    content: This image is similar to the one in vv. 3–4, except here it is God, not an eagle, who takes the top cedar branch and plants it. This is a parable of God restoring the kingdom of Israel (cedar tree) and giving hope to his people once again.
  - type: text
    content: Every kind of bird will find a home in it.
  - type: note
    content: Or “live beneath it.” See Ezek. 31:6; Matt. 13:32.
  - type: text
    content: Yes, in the shade of its branches the birds will make their nests.
  '24':
  - type: text
    content: 'And all the trees of the field '
  - type: note
    content: That is, the nations of the earth.
  - type: text
    content: 'will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the one'
  - type: text
    content: who brings the tall tree low and raises the low tree high,
  - type: text
    content: who withers the green tree and makes the withered tree sprout again.
  - type: note
    content: Both humiliation and exaltation are the work of the sovereign God. He will humble the proud and give grace to the humble. See also 1 Sam. 2:7; Pss. 18:27; 75:8; 147:6; Prov. 3:34; James 4:6.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken and have done it!”'
  '3':
  - type: text
    content: 'Tell them '
  - type: text
    content: to guess the meaning of
  - type: text
    content: ' what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have to say to them:'
  - type: text
    content: “There once was this great eagle with huge wings,
  - type: text
    content: whose wingspan was very wide,
  - type: text
    content: with many beautiful colored feathers around its head.
  - type: text
    content: One day he came to the Lebanon Mountains,
  - type: text
    content: and taking a new branch of a cedar tree,
  '4':
  - type: text
    content: he broke it off and carried it off to a land of traders.
  - type: text
    content: He planted it there in a city of merchants.
  '5':
  - type: text
    content: Next, he took a young seedling from the land
  - type: text
    content: and planted it in a fertile field.
  - type: text
    content: He placed it like a willow tree
  - type: text
    content: by the side of a flowing stream.
  '6':
  - type: text
    content: The young plant sprouted until it became a low spreading vine.
  - type: text
    content: Its branches grew up toward the great eagle,
  - type: note
    content: The “great eagle,” the king of birds, represents King Nebuchadnezzar, whose power (wings) extended over a large area. He deported King Jehoiachin and put Zedekiah on the throne in 597 BC.
  - type: text
    content: and its roots grew down deep into the soil.
  - type: text
    content: So, it became a vine,
  - type: text
    content: branching out and sprouting new shoots.
  '7':
  - type: text
    content: 'But another great eagle '
  - type: note
    content: This second great eagle is Egypt. King Zedekiah trusted in vain for Egypt’s help against the Babylonian invaders.
  - type: text
    content: appeared
  - type: text
    content: with huge wings and many feathers around its head.
  - type: text
    content: And soon the vine bent its roots toward him
  - type: text
    content: and stretched its branches toward this eagle
  - type: text
    content: from the place where it was planted,
  - type: text
    content: expecting this eagle to nourish it.
  '8':
  - type: text
    content: The vine was planted in good soil,
  - type: text
    content: by the side of a generous stream
  - type: note
    content: See Jer. 51:13.
  - type: text
    content: so that the vine could branch out,
  - type: text
    content: bear fruit, and become a wonderful vine.
  '9':
  - type: text
    content: 'So I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', ask you:'
  - type: text
    content: Will the vine thrive?
  - type: text
    content: 'Will not the '
  - type: text
    content: first eagle
  - type: text
    content: ' come and tear out its roots?'
  - type: text
    content: Will it not strip off its grapes
  - type: text
    content: so that all its foliage withers?
  - type: text
    content: Then, even weak ones could easily uproot it!
