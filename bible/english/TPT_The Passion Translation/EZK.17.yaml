document_id: EZK.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Eagles and the Vine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me again, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, propose this riddle to Israel, and speak this parable '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a play on words in the Hebrew. The words for “speak” and “parable” come from the same Hebrew triliteral root word.
    marker-yv: yv-n
  - type: text
    text: 'to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tell them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to guess the meaning of
  - type: text
    text: ' what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have to say to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There once was this great eagle with huge wings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose wingspan was very wide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with many beautiful colored feathers around its head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One day he came to the Lebanon Mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and taking a new branch of a cedar tree,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: he broke it off and carried it off to a land of traders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He planted it there in a city of merchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Next, he took a young seedling from the land
- type: usfm
  marker: q1
  children:
  - type: text
    text: and planted it in a fertile field.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He placed it like a willow tree
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the side of a flowing stream.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The young plant sprouted until it became a low spreading vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its branches grew up toward the great eagle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “great eagle,” the king of birds, represents King Nebuchadnezzar, whose power (wings) extended over a large area. He deported King Jehoiachin and put Zedekiah on the throne in 597 BC.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and its roots grew down deep into the soil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So, it became a vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: branching out and sprouting new shoots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But another great eagle '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This second great eagle is Egypt. King Zedekiah trusted in vain for Egypt’s help against the Babylonian invaders.
    marker-yv: yv-n
  - type: text
    text: appeared
- type: usfm
  marker: q1
  children:
  - type: text
    text: with huge wings and many feathers around its head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And soon the vine bent its roots toward him
- type: usfm
  marker: q1
  children:
  - type: text
    text: and stretched its branches toward this eagle
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the place where it was planted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: expecting this eagle to nourish it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The vine was planted in good soil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the side of a generous stream
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 51:13
      metadata:
        usfm: JER.51.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that the vine could branch out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bear fruit, and become a wonderful vine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', ask you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will the vine thrive?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will not the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first eagle
  - type: text
    text: ' come and tear out its roots?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will it not strip off its grapes
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that all its foliage withers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then, even weak ones could easily uproot it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yes, it is planted—but will it thrive?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will it not shrivel up when the east wind '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Babylonian armies.
    marker-yv: yv-n
  - type: text
    text: blows?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will it not wither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the fertile soil
  - type: text
    text: ' where it had grown?”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' Unlocks His Riddle'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me again, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Ask that tribe of rebels if they know the meaning of my parable. Tell them: ‘Listen, the king of Babylon swooped into Jerusalem. Then he carried away the king and top officials and took them off to Babylon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 24:10–17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Babylon and Egypt (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 17:17
      metadata:
        usfm: EZK.17.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) also represent spiritual forces that affect the growth and advance of the church today. We, too, are a vine, a low spreading vine that is meant to bear much fruit in our union with Christ (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: EZK.17.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 15
      metadata:
        usfm: JHN.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Babylon pictures the world system, and Egypt pictures leaning on the strength of man (the flesh). We need to be set free from our captivity to the world and our trust in man.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He took one from the royal family '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Zedekiah, who was the uncle of King Jehoiachin of Judah.
    marker-yv: yv-n
  - type: text
    text: 'and made a treaty with him, forcing him to swear an oath of allegiance to him. He also carried off to Babylon the leading men of Israel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'so that their kingdom would be humbled and not rise again and to ensure that the treaty would be kept. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “surviving only by keeping his treaty.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But he rebelled against Nebuchadnezzar and sent envoys to Egypt to procure himself horses and a large army. Will he get away with that? Will a man who has done this go unpunished? Will he break the treaty and still escape? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As surely as I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', live, this king will die in Babylon! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He will die
  - type: text
    text: ' in the country of the king who put him on the throne, because he despised his oath and broke the treaty he had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Despite Pharaoh’s mighty army and numerous troops, he will not be able to save him in war. When the Babylonians build siege ramps and wooden towers to kill many in the city, the Egyptians will not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lift a finger to help
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For he despised his oath by breaking the treaty to which he had pledged himself, and he will not go unpunished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“ ‘Therefore, I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', decree, as surely as I live, I swear it. It was my oath that he has despised and my treaty which he has broken. I will punish him for this! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will throw my net over him and trap him in it. I will take him to Babylon and render judgment against him there for all the wicked things he did against me. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 12:13
      metadata:
        usfm: EZK.12.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'All his elite troops will fall by the sword, and the survivors will be scattered in every direction. And then you will know that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have decreed it.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Cedar Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will take the highest branch from a cedar tree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will break off from the very top a tender shoot
- type: usfm
  marker: q1
  children:
  - type: text
    text: and plant it myself on a high and lofty mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will plant it on the highest mountain in Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where it will put out branches and bear fruit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 15:1–16
      metadata:
        usfm: JHN.15.1+JHN.15.2+JHN.15.3+JHN.15.4+JHN.15.5+JHN.15.6+JHN.15.7+JHN.15.8+JHN.15.9+JHN.15.10+JHN.15.11+JHN.15.12+JHN.15.13+JHN.15.14+JHN.15.15+JHN.15.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 5:22–23
      metadata:
        usfm: GAL.5.22+GAL.5.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and grow into a stately cedar tree.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This image is similar to the one in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3–4
      metadata:
        usfm: EZK.17.3+EZK.17.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', except here it is God, not an eagle, who takes the top cedar branch and plants it. This is a parable of God restoring the kingdom of Israel (cedar tree) and giving hope to his people once again.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every kind of bird will find a home in it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “live beneath it.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 31:6
      metadata:
        usfm: EZK.31.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:32
      metadata:
        usfm: MAT.13.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, in the shade of its branches the birds will make their nests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And all the trees of the field '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the nations of the earth.
    marker-yv: yv-n
  - type: text
    text: 'will know that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', am the one'
- type: usfm
  marker: q1
  children:
  - type: text
    text: who brings the tall tree low and raises the low tree high,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who withers the green tree and makes the withered tree sprout again.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both humiliation and exaltation are the work of the sovereign God. He will humble the proud and give grace to the humble. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pss. 18:27
      metadata:
        usfm: PSA.18.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
