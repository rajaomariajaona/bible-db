document_id: ACT.19,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Apostle Paul in Ephesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'While Apollos was ministering in Corinth, Paul traveled on through the regions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Turkey
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is “the upper inland country.” This was a trek through certain regions of Turkey for him to arrive in Ephesus.
      marker-yv: yv-n
    - type: text
      text: 'until he arrived in Ephesus, where he found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a group of twelve
    - type: text
      text: ' followers of Jesus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “some disciples.” Verse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: states there were twelve. This information is included here in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: for the sake of the English narrative.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Every day '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek manuscript D adds, “from the fifth hour [11:00 a.m.] to the tenth hour [4:00 p.m.].”
      marker-yv: yv-n
    - type: text
      text: 'for over two years, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Counting the three months of focusing on ministry to the Jews, Paul’s entire stay in Ephesus came to three years, which would have included a short visit to Corinth. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 20:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'he taught them in the lecture hall of Tyrannus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was like a college or lecture hall. Tyrannus (whose name means “sovereign”) was most likely a philosopher and lecturer who had disciples whom he taught. Apparently Tyrannus welcomed Paul after he left the Jewish congregation and brought him into his school to teach the students.
      marker-yv: yv-n
    - type: text
      text: 'which resulted in everyone living in the province of Asia, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This “school of ministry” exploded as many came to hear Paul and then went out to preach, expanding the reach of the gospel into all the “province of Asia” (Asia Minor). The province of Asia would have covered no less than one-third of Turkey. Many multitudes heard the gospel in the two-year period when Paul taught in Ephesus. The teaching of the apostles resulted in the expansion of God’s kingdom realm.
      marker-yv: yv-n
    - type: text
      text: Jews and non-Jews, hearing the prophetic word of the Lord.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or simply, “the word of the Lord.” However, the phrase “the word of the Lord” is a Hebrew expression consistently used for the prophetic utterances given by the prophets.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Extraordinary Miracles in Ephesus
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'God kept releasing a flow of extraordinary miracles through the hands of Paul. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Because of this, people took Paul’s handkerchiefs and articles of clothing, even pieces of cloth that had touched his skin, laying them on the bodies of the sick, and diseases and demons left them and they were healed.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: Now, there were seven itinerant Jewish exorcists, sons of Sceva the high priest, who took it upon themselves to use the name and authority of Jesus over those who were demonized. They would say, “We cast you out in the name of the Jesus that Paul preaches!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: One day, when they said those words, the demon in the man replied, “I know about Jesus, and I recognize Paul, but who do you think you are?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the demonized man jumped on them and threw them to the ground, beating them mercilessly. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: True authority comes from relationship with Jesus Christ, not just using formulas and techniques. Evil spirits know about the depth of our relationship with God.
      marker-yv: yv-n
    - type: text
      text: He overpowered the seven exorcists until they all ran out of the house naked and badly bruised.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revival Breaks Out
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'All of the people in Ephesus were awestruck, both Jews and non-Jews, when they heard about what had happened. Great fear fell over the entire city, and the authority of the name of Jesus was exalted. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Many believers publicly confessed their sins and disclosed their secrets. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Large numbers of those who had been practicing magic took all of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: books and scrolls of spells and incantations
    - type: text
      text: ' and publicly burned them. When the value of all the books and scrolls was calculated, it all came to several million dollars. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fifty thousand silver drachmas.” Some historians have said that one lamb would be sold for one silver drachma. The price of a ewe lamb today is about 150 USD. A drachma was one day’s wage, and fifty thousand drachmas would be one hundred years’ wages. The value of the books could have been millions of dollars.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The first thing he asked them was “Did you receive the Holy Spirit when you became believers?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No,” they replied. “We’ve not even heard of a holy spirit.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The power of God caused the word to spread, and the people were greatly impacted.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Chronologically, this would have been the time when Paul wrote his first letter to the Corinthians.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Riot Breaks Out
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Paul had it in his heart to go to Jerusalem and, on his way there, to revisit the places in Greece where he had ministered. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to go through Macedonia and Achaia.” The implication is that Paul wanted to revisit the area of Greece he had ministered in; therefore, that is made explicit in this translation.
      marker-yv: yv-n
    - type: text
      text: '“After that,” he said, “I have to go to Rome also.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So he sent ahead into Macedonia two of his ministry assistants, Timothy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Timothy’s name means “one who honors God.” He was Paul’s spiritual son and later became an apostolic church planter. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Timothy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and Erastus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Erastus means “beloved.” He was possibly the treasurer of the city of Corinth. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 16:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: while he remained in western Turkey.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the province of Asia” (Minor).
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'At that time a major disturbance erupted in Ephesus over the people following God’s way. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is simply “the way.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: It began with a wealthy man named Demetrius, who had built a large business and enriched many craftsmen by manufacturing silver shrines for the Greek goddess Artemis.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also known as Diana. She was venerated as the daughter of Zeus and the sister of Apollo.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'Demetrius called a meeting of his employees, along with all the various tradespeople of Ephesus, and said, “You know that our prosperous livelihood is being threatened by this Paul, who is persuading crowds of people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to turn away from our gods
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The true worship of God threatens not only the political realm, but the spiritual and economic realm as well. Jesus compels men to adopt new values.
      marker-yv: yv-n
    - type: text
      text: 'We make a good living by doing what we do, but everywhere Paul goes, not only here in Ephesus but throughout western Turkey, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the [Roman] province of Asia [Minor].”
      marker-yv: yv-n
    - type: text
      text: 'he convinces people that there’s no such thing as a god made with hands. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Our businesses are in danger of being discredited. And not only that, but the temple of our great goddess Artemis is being dishonored and seen as worthless. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The temple of Artemis (Diana) is one of the seven ancient wonders of the world. We must never put buildings or temples above the true worship of God. The Ephesians valued their goddess and economic standards more than truth.
      marker-yv: yv-n
    - type: text
      text: She is the goddess of all of western Turkey and is worshiped in all the world. But if this outrage continues, everyone everywhere will suffer the loss of her magnificent greatness.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When the people heard this, they were filled with boiling rage. They shouted over and over, “Artemis, the great goddess of the Ephesians!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The entire city was thrown into chaos as everyone rushed into the stadium together, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The stadium of Ephesus has recently been discovered and is estimated to have held twenty-four thousand spectators.
      marker-yv: yv-n
    - type: text
      text: 'dragging with them Gaius '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gaius’ name is a variant form of “lord.” There is speculation that he could be the man to whom the apostle John wrote his third letter (3 John).
      marker-yv: yv-n
    - type: text
      text: 'and Aristarchus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aristarchus’ name means “best ruler.” He was a native of Thessalonica (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 20:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). He traveled often with Paul and is also mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Philem. 24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', called there Paul’s “fellow prisoner.” Church tradition states that he was martyred by Emperor Nero for loving and serving Jesus Christ.'
      marker-yv: yv-n
    - type: text
      text: Paul’s traveling companions from Macedonia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Paul asked, “Then what was the meaning of your baptism?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “into what [name or authority] were you baptized?”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: They responded, “It meant that we would follow John’s teaching.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When Paul attempted to go in and speak to the massive crowd, the disciples wouldn’t let him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Some of the high-ranking governmental officials of the region, because they loved him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: sent Paul an urgent message, saying, “Whatever you do, don’t step foot into that stadium!”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The frenzied crowd shouted out one thing, and others shouted something else, until they were all in mass confusion, with many not even knowing why they were there!
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Some of the Jews pushed forward a Jewish man named Alexander to be their spokesman, and different factions of the crowd shouted instructions at him. He stood before the people and motioned for everyone to be quiet so he could be heard. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: But when he began to speak, they realized that he was a Jew, so they shouted him down. For nearly two hours they shouted over and over, “Great is Artemis, the goddess of the Ephesians!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Artemis, the great goddess of the Ephesians, has faded from history, while we fill stadiums today for conferences and revivals and say, “Great is the God Most High!”
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Eventually the mayor of the city '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the city governor.” The Greek is “city clerk” or “scribe” (or “keeper of the records”). For all practical purposes he would be or represent the mayor of the city.
      marker-yv: yv-n
    - type: text
      text: 'was able to quiet them down. He said, “Fellow citizens! Who in the world doesn’t know that we are devoted to the great temple '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic, the Greek is “custodians of the temple.”
      marker-yv: yv-n
    - type: text
      text: 'of Artemis and to her image that fell from Zeus out of heaven? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “her face that fell from heaven.” Much conjecture has been made over this statement. Some of the oldest translations have “fell from Zeus [Jupiter],” while most modern translations have “fell from the sky [heaven].” Some believe it was an aerolite that was fashioned into a stature of Artemis; however, Pliny the Elder, a Roman author and philosopher who died trying to save relatives from the eruption of Mount Vesuvius, says it was made from wood, possibly ebony (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Naturalis Historia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.79.213–14).
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Since no one can deny it, you should all just be quiet. Calm down and don’t do anything hasty. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'For you have brought these men before us who aren’t guilty of any crime. They are neither temple robbers nor blasphemers of our goddess. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So if Demetrius and the men of his trade have a case against someone, the courts are open. They can appear before the judge and press charges. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But if you’re looking for anything further to bring up, it must be argued before the court and settled there, not here. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Paul said, “John’s baptism was for those who were turning from their sins, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “John’s baptism was a baptism of grace to the people.”
      marker-yv: yv-n
    - type: text
      text: 'and he taught you to believe in and follow the one who was coming after him: Jesus the Anointed One.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “The Anointed One” (or “Messiah”) is found only in the Aramaic. The Greek is simply “Jesus.”
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Don’t you realize we’re putting our city in danger of being accused of a riot by the Roman authorities? There’s no good explanation we can give them for all this commotion!”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: After he had said this, he dispersed the crowds and sent them away.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When they understood this, they were baptized into the authority of Jesus, the Anointed One. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “on the name of Jesus Christ,” which means they were baptized into the authority of the name of Jesus, who was greater than John.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'And when Paul laid his hands on each of the twelve, the Holy Spirit manifested and they immediately spoke in tongues '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “supernaturally given languages.”
      marker-yv: yv-n
    - type: text
      text: and prophesied.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “They spoke tongue by tongue and gushed out prophecies.” The impartation of the Holy Spirit and his gifts are here being transferred from Paul to these believers. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 1:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus taught that when the Holy Spirit comes upon us, it is to impart power for our lives and ministries. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For three months Paul taught openly and fearlessly in the synagogue, arguing persuasively for them to enter into God’s kingdom realm. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “about God’s kingdom realm.” It is a big step for both Jews and Christians to come out of their religious identity and focus on the reality of God’s kingdom realm.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But some of them hardened their hearts and stubbornly refused to believe. When they spoke evil '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cursed the Christian way of living.”
      marker-yv: yv-n
    - type: text
      text: of the Way in front of the congregation, Paul withdrew from them and took the believers with him.
