        children:
        - type: text
          text: ', which is taken from a Semitic root word that means “to tear bark off of a tree.” He is saying that your loving eyes of worship have uncovered his heart and laid it bare, making him vulnerable to you. What a description of what happens to Jesus when he looks into your eyes. Your worship brings to him such an ecstasy and delight that it becomes hard to even imagine. Yet God has placed inside of you the ability to ravish the vulnerable heart of your King—not someday in heaven, but now, even when you feel incomplete and weak.'
      marker-yv: yv-n
  - type: usfm
