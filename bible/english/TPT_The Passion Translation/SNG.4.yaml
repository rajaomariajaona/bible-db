document_id: SNG.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Bridegroom-King
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Listen, my dearest darling,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you are so beautiful—you are beauty itself to me!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your eyes are
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: like gentle doves behind your veil.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What devotion I see each time I gaze upon you.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are like a sacrifice ready to be offered.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text literally means “Your hair is like a flock of goats streaming down Mount Gilead.” There is great symbolism in this verse. Hair is a symbol of our devotion to Christ. Mount Gilead (“hill of testimony”) is where the sacrificial animals were kept in preparation for temple sacrifices. So a goat coming down Mount Gilead was “a sacrifice ready to be offered.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How satisfying to me, my equal, my bride.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your love is my finest wine—intoxicating and thrilling.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And your sweet, perfumed praises—so exotic, so pleasing.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your loving words are like the honeycomb to me;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your tongue releases milk and honey,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: for I find the promised land flowing within you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both the promised land and your heart flow with milk and honey. You have become the promised land of Jesus Christ.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The fragrance of your worshiping love
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: surrounds you with scented robes of white.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like the scent of Lebanon.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My darling bride, my private paradise,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: fastened to my heart.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A secret spring that no one else can have are you—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: my bubbling fountain hidden from public view.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What a perfect partner to me now that I have you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your inward life is now sprouting, bringing forth fruit.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What a beautiful paradise unfolds within you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Your shoots are a paradise of pomegranates.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I’m near you, I smell aromas of the finest spice,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for many clusters of my exquisite fruit
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: now grow within your inner garden.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Here are the nine:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pomegranates
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Pomegranate” is taken from a word that means “exalted.” The temple pillars and the robe of the high priest were adorned with pomegranates.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of passion,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: henna
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Henna” comes from a root word for “ransom price” or “redemption.” The fruit of mercy is seen in his maturing bride.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from heaven,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: spikenard
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew root word for “spikenard” means “light.” She (the bride) is walking in the light as he (Christ) is the Light.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so sweet,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saffron
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Saffron” is the crocus, the lover’s perfume, costly and fragrant.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: shining,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: fragrant calamus
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Calamus” is taken from a marsh plant known as sweet flag, which produces fragrant oil. The Hebrew word for this spice can also mean “purchased” or “redeemed.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from the cross,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sacred cinnamon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cinnamon emits a fragrance that is representative of an odor of holiness to the Lord. It was used in the sacred anointing oil of the priests and the tabernacle.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: branches of scented woods,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the incense that would be burned on the golden altar in the Holy Place.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: myrrh, like tears from a tree,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Known as “tears from a tree,” myrrh was a resin spice formed by cutting a tree. It is a picture of the suffering love of Christ dripping down from Calvary’s tree.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and aloe as eagles ascending.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aloe is considered by many to be a healing balm. The presence of the Lord within her is released as a healing balm to those she touches. Jesus’ robes smelled of aloe (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 45:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). One of the names used by some for aloe is “eagle wood.” Like eagles, we fly above our wounds, free from the past as we walk in intimacy with Jesus.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are a fountain of gardens.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A well of living water springs up from within you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: like a mountain brook flowing into my heart!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like the flowing streams of Lebanon.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite Bride
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Awake, O north '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “north” comes from a root word for “hidden,” “to treasure up,” or “hidden (ones).” It takes both the cold north wind (God’s hidden ways) and the south wind (God’s pleasant, refreshing dealings with us) to bring forth the fragrance of his life in us and to saturate us with divine aromas.
      marker-yv: yv-n
    - type: text
      text: wind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, O south wind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Breathe on my garden with your Spirit-Wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stir up the sweet spice of your life within me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spare nothing as you make me your fruitful garden.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold nothing back until I release your fragrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Come walk with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as you walked
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: with Adam
    - type: text
      text: ' in your paradise garden.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The scene of a garden and the breath of God point us back to Eden. Now this paradise is found in the bride (of Christ). This is the reason the reference to Adam is given: to help the reader connect with the mystery of this scene. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 15:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come taste the fruits of your life in me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I look at you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I see how you have taken my fruit and tasted my word.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your life has become clean and pure,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: like a lamb washed and newly shorn.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You now show grace and balance with truth on display.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your lips are as lovely as Rahab’s scarlet ribbon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “scarlet ribbon” in the text is a comparison to the ribbon Rahab placed at her dwelling to show the place where mercy would spare her life. The color scarlet points us to the blood of mercy, Christ’s sacrifice that has spared us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: speaking mercy, speaking grace.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The words of your mouth are as refreshing as an oasis.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What pleasure you bring to me!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I see your blushing cheeks
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: opened like the halves of a pomegranate,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pomegranates speak of our open hearts of love, filled with passion for God. The Hebrew word for “pomegranate” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ramam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a homonym for a word that means “to rise up.” Pomegranates were also engraved on the tops of the pillars of Solomon’s Temple and sewn into the hem of the robe of the high priest, interspersed with golden bells.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: showing through your veil of tender meekness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I look at you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I see your inner strength, so stately and strong.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are as secure as David’s fortress.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your virtues and grace cause a thousand famous soldiers
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to surrender to your beauty.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your pure faith and love rest over your heart
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as you nurture those who are yet infants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite
    marker-yv: yv-h
