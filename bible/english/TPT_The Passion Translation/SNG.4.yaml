document_id: SNG.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bridegroom-King
  - type: text
    content: Listen, my dearest darling,
  - type: text
    content: you are so beautiful—you are beauty itself to me!
  - type: text
    content: Your eyes are
  - type: text
    content: like gentle doves behind your veil.
  - type: text
    content: What devotion I see each time I gaze upon you.
  - type: text
    content: You are like a sacrifice ready to be offered.
  - type: note
    content: The Hebrew text literally means “Your hair is like a flock of goats streaming down Mount Gilead.” There is great symbolism in this verse. Hair is a symbol of our devotion to Christ. Mount Gilead (“hill of testimony”) is where the sacrificial animals were kept in preparation for temple sacrifices. So a goat coming down Mount Gilead was “a sacrifice ready to be offered.”
  '10':
  - type: text
    content: How satisfying to me, my equal, my bride.
  - type: text
    content: Your love is my finest wine—intoxicating and thrilling.
  - type: text
    content: And your sweet, perfumed praises—so exotic, so pleasing.
  '11':
  - type: text
    content: Your loving words are like the honeycomb to me;
  - type: text
    content: your tongue releases milk and honey,
  - type: text
    content: for I find the promised land flowing within you.
  - type: note
    content: Both the promised land and your heart flow with milk and honey. You have become the promised land of Jesus Christ.
  - type: text
    content: The fragrance of your worshiping love
  - type: text
    content: surrounds you with scented robes of white.
  - type: note
    content: Or “like the scent of Lebanon.”
  '12':
  - type: text
    content: My darling bride, my private paradise,
  - type: text
    content: fastened to my heart.
  - type: text
    content: A secret spring that no one else can have are you—
  - type: text
    content: my bubbling fountain hidden from public view.
  - type: text
    content: What a perfect partner to me now that I have you.
  '13':
  - type: text
    content: Your inward life is now sprouting, bringing forth fruit.
  - type: text
    content: What a beautiful paradise unfolds within you.
  - type: note
    content: Or “Your shoots are a paradise of pomegranates.”
  - type: text
    content: When I’m near you, I smell aromas of the finest spice,
  - type: text
    content: for many clusters of my exquisite fruit
  - type: text
    content: now grow within your inner garden.
  - type: text
    content: 'Here are the nine:'
  - type: text
    content: pomegranates
  - type: text
    content: ' '
  - type: note
    content: “Pomegranate” is taken from a word that means “exalted.” The temple pillars and the robe of the high priest were adorned with pomegranates.
  - type: text
    content: of passion,
  - type: text
    content: henna
  - type: text
    content: ' '
  - type: note
    content: “Henna” comes from a root word for “ransom price” or “redemption.” The fruit of mercy is seen in his maturing bride.
  - type: text
    content: from heaven,
  - type: text
    content: spikenard
  - type: text
    content: ' '
  - type: note
    content: The Hebrew root word for “spikenard” means “light.” She (the bride) is walking in the light as he (Christ) is the Light.
  - type: text
    content: so sweet,
  - type: text
    content: saffron
  - type: text
    content: ' '
  - type: note
    content: “Saffron” is the crocus, the lover’s perfume, costly and fragrant.
  - type: text
    content: shining,
  - type: text
    content: fragrant calamus
  - type: text
    content: ' '
  - type: note
    content: “Calamus” is taken from a marsh plant known as sweet flag, which produces fragrant oil. The Hebrew word for this spice can also mean “purchased” or “redeemed.”
  - type: text
    content: from the cross,
  - type: text
    content: sacred cinnamon,
  - type: note
    content: Cinnamon emits a fragrance that is representative of an odor of holiness to the Lord. It was used in the sacred anointing oil of the priests and the tabernacle.
  - type: text
    content: branches of scented woods,
  - type: note
    content: This is the incense that would be burned on the golden altar in the Holy Place.
  - type: text
    content: myrrh, like tears from a tree,
  - type: note
    content: Known as “tears from a tree,” myrrh was a resin spice formed by cutting a tree. It is a picture of the suffering love of Christ dripping down from Calvary’s tree.
  - type: text
    content: and aloe as eagles ascending.
  - type: note
    content: Aloe is considered by many to be a healing balm. The presence of the Lord within her is released as a healing balm to those she touches. Jesus’ robes smelled of aloe (see Ps. 45:8). One of the names used by some for aloe is “eagle wood.” Like eagles, we fly above our wounds, free from the past as we walk in intimacy with Jesus.
  '15':
  - type: text
    content: You are a fountain of gardens.
  - type: note
    content: See Jer. 31:12.
  - type: text
    content: A well of living water springs up from within you,
  - type: text
    content: like a mountain brook flowing into my heart!
  - type: note
    content: Or “like the flowing streams of Lebanon.”
  - type: heading
    content: The Shulamite Bride
  '16':
  - type: text
    content: 'Awake, O north '
  - type: note
    content: The Hebrew word for “north” comes from a root word for “hidden,” “to treasure up,” or “hidden (ones).” It takes both the cold north wind (God’s hidden ways) and the south wind (God’s pleasant, refreshing dealings with us) to bring forth the fragrance of his life in us and to saturate us with divine aromas.
  - type: text
    content: wind!
  - type: text
    content: Awake, O south wind!
  - type: text
    content: Breathe on my garden with your Spirit-Wind.
  - type: text
    content: Stir up the sweet spice of your life within me.
  - type: text
    content: Spare nothing as you make me your fruitful garden.
  - type: text
    content: Hold nothing back until I release your fragrance.
  - type: text
    content: 'Come walk with me '
  - type: text
    content: as you walked
  - type: text
    content: with Adam
  - type: text
    content: ' in your paradise garden.'
  - type: note
    content: 'The scene of a garden and the breath of God point us back to Eden. Now this paradise is found in the bride (of Christ). This is the reason the reference to Adam is given: to help the reader connect with the mystery of this scene. See Jer. 31:12; John 15:1–2.'
  - type: text
    content: Come taste the fruits of your life in me.
  '2':
  - type: text
    content: When I look at you,
  - type: text
    content: I see how you have taken my fruit and tasted my word.
  - type: text
    content: Your life has become clean and pure,
  - type: text
    content: like a lamb washed and newly shorn.
  - type: text
    content: You now show grace and balance with truth on display.
  '3':
  - type: text
    content: Your lips are as lovely as Rahab’s scarlet ribbon,
  - type: note
    content: The “scarlet ribbon” in the text is a comparison to the ribbon Rahab placed at her dwelling to show the place where mercy would spare her life. The color scarlet points us to the blood of mercy, Christ’s sacrifice that has spared us. See Josh. 2.
  - type: text
    content: speaking mercy, speaking grace.
  - type: text
    content: The words of your mouth are as refreshing as an oasis.
  - type: text
    content: What pleasure you bring to me!
  - type: text
    content: I see your blushing cheeks
  - type: text
    content: opened like the halves of a pomegranate,
  - type: note
    content: Pomegranates speak of our open hearts of love, filled with passion for God. The Hebrew word for “pomegranate” is ramam, a homonym for a word that means “to rise up.” Pomegranates were also engraved on the tops of the pillars of Solomon’s Temple and sewn into the hem of the robe of the high priest, interspersed with golden bells.
  - type: text
    content: showing through your veil of tender meekness.
  '4':
  - type: text
    content: When I look at you,
  - type: text
    content: I see your inner strength, so stately and strong.
  - type: text
    content: You are as secure as David’s fortress.
  - type: text
    content: Your virtues and grace cause a thousand famous soldiers
  - type: text
    content: to surrender to your beauty.
  '5':
  - type: text
    content: Your pure faith and love rest over your heart
  - type: text
    content: as you nurture those who are yet infants.
  - type: heading
    content: The Shulamite
  '6':
  - type: text
    content: I’ve made up my mind.
  - type: text
    content: Until the darkness disappears and the dawn has fully come,
  - type: text
    content: in spite of shadows and fears,
  - type: text
    content: I will go to the mountaintop with you—
  - type: text
    content: the mountain of suffering love
  - type: note
    content: Literally “the mountain of myrrh”—the emblem of suffering love. To become the bride, she must experience Calvary, as did her Lord. We must be his co-crucified partner who will embrace the fellowship of his sufferings. See Gal. 2:20; Phil. 3:10.
  - type: text
    content: and the hill of burning incense.
  - type: text
    content: Yes, I will be your bride
  - type: text
    content: .
  - type: note
    content: As implied in the context and affirmed by the bridegroom in v. 8, this verse is the first mention of the Shulamite as the bride.
  - type: heading
    content: The Bridegroom-King
  '7':
  - type: text
    content: Every part of you is so beautiful, my darling.
  - type: text
    content: Perfect is your beauty, without flaw within.
  '8':
  - type: text
    content: Now you are ready, my bride,
  - type: text
    content: to come with me as we climb the highest peaks together.
  - type: text
    content: Come with me through the archway of trust.
  - type: note
    content: This phrase is translated from the Septuagint. The Hebrew is “the crest of Amana.” Amana comes from a Hebrew root word from which we get the English word “amen.” This is also one of the Hebrew words for “faith.” The crest of Amana is the realm where all God’s promises are kept and realized. Amana can also be translated “a place of settled security.” (Dictionary of Scripture Proper Names by J. B. Jackson.)
  - type: text
    content: We will look
  - type: text
    content: ' '
  - type: note
    content: The meaning of the word for “look” includes “survey, inspect, look all around, observe.” The bride of Christ is seated on high with Jesus and is encouraged to survey all the blessings heaven contains—it is a picture of our co-exaltation with Christ.
  - type: text
    content: down
  - type: text
    content: from the crest of the glistening mounts
  - type: text
    content: and from the summit of our sublime sanctuary,
  - type: text
    content: from the lion’s den and the leopard’s lair.
  '9':
  - type: text
    content: For you reach into my heart.
  - type: text
    content: With one flash of your eyes I am undone by your love,
  - type: text
    content: my beloved, my equal,
  - type: text
    content: ' '
  - type: note
    content: Or “sister.”
  - type: text
    content: my bride.
  - type: text
    content: You leave me breathless—
  - type: text
    content: I am overcome
  - type: text
    content: by merely a glance from your worshiping eyes,
  - type: text
    content: for you have stolen my heart.
  - type: note
    content: Or “you have ravished my heart.” This is the Hebrew word libabethini, which is taken from a Semitic root word that means “to tear bark off of a tree.” He is saying that your loving eyes of worship have uncovered his heart and laid it bare, making him vulnerable to you. What a description of what happens to Jesus when he looks into your eyes. Your worship brings to him such an ecstasy and delight that it becomes hard to even imagine. Yet God has placed inside of you the ability to ravish the vulnerable heart of your King—not someday in heaven, but now, even when you feel incomplete and weak.
  - type: text
    content: I am held hostage by your love
  - type: text
    content: and by the graces of righteousness shining upon you.
  - type: note
    content: Or “the jewels of your neck [necklace].” These divine jewels are the beautifying graces that the Holy Spirit gives to us. They are the “graces of righteousness” given to the redeemed bride of Christ.
