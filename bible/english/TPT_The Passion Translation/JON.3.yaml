document_id: JON.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonah Goes to Nineveh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the prophet
  - type: text
    text: ' Jonah for the second time. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God was not finished with Jonah. He spoke to him a second time. Past failures cannot annul the grace of God in our lives. Our Father will discipline those he loves and will restore them to their calling and mission. Ministry is not an earned position; it is a grace-gift.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Arise!” he said. “Leave at once for the great city of Nineveh and preach to the people the message I give you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This time
  - type: text
    text: ', Jonah set out for Nineveh in obedience to the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: . Now Nineveh was a very important city to God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leʾlohim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can mean “great [with many] gods” or, more likely, as an intense superlative, “great [in importance] before God.” God is concerned not only for races and nations but also for cities.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'It took three days to traverse the entire city. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a visit [journey] of three days.” Commentators vary in interpreting the meaning of the Hebrew phrase.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When Jonah entered the city, he walked a day’s journey and began to preach: “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' will destroy this city in forty '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The number forty is the number of testing. Jesus was in the wilderness for forty days being tested by the devil. God was testing the people of the city and giving them time to repent. The Septuagint gives an even shorter time: “in three days.” Jonah’s short message was the only prophecy that Jonah gave in the entire book. And it didn’t happen. But the city repented, which makes Jonah one of the only successful prophets (in terms of getting people to listen and act).'
    marker-yv: yv-n
  - type: text
    text: days!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A City Turns to God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The people of Nineveh believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jonah’s message and turned
  - type: text
    text: ' to God. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: To show they had repented
  - type: text
    text: ', they called for a fast and put on sackcloth, from the greatest to the least of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the news reached the king of Nineveh, he arose from his throne, took off his royal robe, put on sackcloth, and sat down in ashes. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These actions undertaken by the king of Nineveh were classic expressions of mourning and repentance in the ancient Near East.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He then issued this proclamation:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: '“People of Nineveh, by decree of the king and his nobles, no person or animal, herd or flock, may eat anything; they must not consume any food or water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Each of you must cover yourself and your livestock with burlap and call on God with all your might. Everyone must turn away from his or her evil ways and violent behavior. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who knows? Perhaps God may show us mercy and be willing to change his mind. Perhaps he will relent and turn from unleashing his fierce anger so that we will not die.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Forgives
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When God saw their sincere efforts to turn from their wicked ways, he decided not to punish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “he [God] sighed.”
    marker-yv: yv-n
  - type: text
    text: the people of Nineveh and did not bring upon them the disaster he said would come.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 18:7–8
      metadata:
        usfm: JER.18.7+JER.18.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . God had forgiven Jonah, and then he showed forgiveness to Nineveh.
    marker-yv: yv-n
