document_id: JON.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Goes to Nineveh
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to '
  - type: text
    content: the prophet
  - type: text
    content: ' Jonah for the second time. '
  - type: note
    content: God was not finished with Jonah. He spoke to him a second time. Past failures cannot annul the grace of God in our lives. Our Father will discipline those he loves and will restore them to their calling and mission. Ministry is not an earned position; it is a grace-gift.
  '10':
  - type: text
    content: 'When God saw their sincere efforts to turn from their wicked ways, he decided not to punish '
  - type: note
    content: Or literally “he [God] sighed.”
  - type: text
    content: the people of Nineveh and did not bring upon them the disaster he said would come.
  - type: note
    content: See Jer. 18:7–8. God had forgiven Jonah, and then he showed forgiveness to Nineveh.
  '2':
  - type: text
    content: '“Arise!” he said. “Leave at once for the great city of Nineveh and preach to the people the message I give you.” '
  '3':
  - type: text
    content: This time
  - type: text
    content: ', Jonah set out for Nineveh in obedience to the word of '
  - type: text
    content: Yahweh
  - type: text
    content: . Now Nineveh was a very important city to God.
  - type: note
    content: The Hebrew word leʾlohim can mean “great [with many] gods” or, more likely, as an intense superlative, “great [in importance] before God.” God is concerned not only for races and nations but also for cities.
  - type: text
    content: 'It took three days to traverse the entire city. '
  - type: note
    content: Or “a visit [journey] of three days.” Commentators vary in interpreting the meaning of the Hebrew phrase.
  '4':
  - type: text
    content: 'When Jonah entered the city, he walked a day’s journey and began to preach: “'
  - type: text
    content: God
  - type: text
    content: ' will destroy this city in forty '
  - type: note
    content: 'The number forty is the number of testing. Jesus was in the wilderness for forty days being tested by the devil. God was testing the people of the city and giving them time to repent. The Septuagint gives an even shorter time: “in three days.” Jonah’s short message was the only prophecy that Jonah gave in the entire book. And it didn’t happen. But the city repented, which makes Jonah one of the only successful prophets (in terms of getting people to listen and act).'
  - type: text
    content: days!”
  - type: heading
    content: A City Turns to God
  '5':
  - type: text
    content: 'The people of Nineveh believed '
  - type: text
    content: Jonah’s message and turned
  - type: text
    content: ' to God. '
  - type: text
    content: To show they had repented
  - type: text
    content: ', they called for a fast and put on sackcloth, from the greatest to the least of them. '
  '6':
  - type: text
    content: 'When the news reached the king of Nineveh, he arose from his throne, took off his royal robe, put on sackcloth, and sat down in ashes. '
  - type: note
    content: These actions undertaken by the king of Nineveh were classic expressions of mourning and repentance in the ancient Near East.
  '7':
  - type: text
    content: 'He then issued this proclamation:'
  - type: text
    content: '“People of Nineveh, by decree of the king and his nobles, no person or animal, herd or flock, may eat anything; they must not consume any food or water. '
  '8':
  - type: text
    content: 'Each of you must cover yourself and your livestock with burlap and call on God with all your might. Everyone must turn away from his or her evil ways and violent behavior. '
  '9':
  - type: text
    content: Who knows? Perhaps God may show us mercy and be willing to change his mind. Perhaps he will relent and turn from unleashing his fierce anger so that we will not die.”
  - type: heading
    content: God Forgives
