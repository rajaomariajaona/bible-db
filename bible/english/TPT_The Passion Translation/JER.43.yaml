document_id: JER.43,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah and Baruch Are Taken to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeremiah finished telling the crowd what the Lord had commanded him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then say to them, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, says this: I will send for my servant Nebuchadnezzar, king of Babylon. He will set up his throne on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the exact spot
    - type: text
      text: ' where I buried these stones and spread his royal tent over them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he comes to invade, he will defeat Egypt:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘Those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: destined
    - type: text
      text: ' for the plague will die by the plague;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: destined
    - type: text
      text: ' for captivity will go into captivity;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: destined
    - type: text
      text: ' for the sword will die by the sword.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘He will burn down the temples of the gods of Egypt and burn up their gods or take them prisoner. He will fold up the land of Egypt as a shepherd folds his cloak over himself. Then he will leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: victorious
    - type: text
      text: ' without anyone standing in his way. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will break the obelisks '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sacred pillars.” According to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 16:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', set stones (sacred pillars) were forbidden in Israel.'
      marker-yv: yv-n
    - type: text
      text: 'of the temple of the sun in Egypt '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or according to the Septuagint, “which is at On” (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 41:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '50'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Egyptian name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: On
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: corresponds to the Greek translation of “Heliopolis” (the City of the Sun). This city is now part of Cairo.
      marker-yv: yv-n
    - type: text
      text: and will burn to the ground the temples of the gods of Egypt.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Azariah son of Hoshaiah, Johanan son of Kareah, and other arrogant men '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As is clear in the context, the Hebrew word refers to proud, defiant, disrespectful, presumptuous, and arrogant behavior.
      marker-yv: yv-n
    - type: text
      text: 'said to Jeremiah, “You are lying. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God did not tell you to say to us, ‘Do not go live in Egypt.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was Baruch son of Neriah who stirred you up against us to hand us over to the Babylonians to be either killed or deported to Babylon.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Johanan, all the army officers, and all the people refused to obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s command to stay in Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, Johanan and his military leaders gathered up everyone left in Judah who had come back from all the nations where they had been scattered. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They also led off the men, women, children, and the king’s daughters, too, and every single person that Nebuzaradan the field general had left under the charge of Gedaliah son of Ahikam. This included the prophet Jeremiah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah, an old man by this time, apparently had no choice; he was forced to go into exile to Egypt with the others from Judah.
      marker-yv: yv-n
    - type: text
      text: 'and Baruch son of Neriah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In total disobedience to the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', they entered the land of Egypt and arrived at Tahpanhes.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning of Egypt’s Fall
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At Tahpanhes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to Jeremiah and said, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take some large stones to the entrance of Pharaoh’s royal building in Tahpanhes. Bury the stones underneath the clay pavement '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hide them in the mortar of the clay [brick] pavement.” The Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: 'and make sure the people of Judah are watching. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this symbolic action, Jeremiah was setting up the foundation stones for the throne of Nebuchadnezzar. This allegory was saying to the people that Egypt would come under the authority of the king of Babylon.
      marker-yv: yv-n
