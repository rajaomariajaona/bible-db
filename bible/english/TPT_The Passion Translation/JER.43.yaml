document_id: JER.43,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah and Baruch Are Taken to Egypt
  - type: text
    content: 'Jeremiah finished telling the crowd what the Lord had commanded him. '
  '10':
  - type: text
    content: Then say to them, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, says this: I will send for my servant Nebuchadnezzar, king of Babylon. He will set up his throne on '
  - type: text
    content: the exact spot
  - type: text
    content: ' where I buried these stones and spread his royal tent over them. '
  '11':
  - type: text
    content: 'When he comes to invade, he will defeat Egypt:'
  - type: text
    content: '“ ‘Those '
  - type: text
    content: destined
  - type: text
    content: ' for the plague will die by the plague;'
  - type: text
    content: 'those '
  - type: text
    content: destined
  - type: text
    content: ' for captivity will go into captivity;'
  - type: text
    content: 'those '
  - type: text
    content: destined
  - type: text
    content: ' for the sword will die by the sword.'
  '12':
  - type: text
    content: '“ ‘He will burn down the temples of the gods of Egypt and burn up their gods or take them prisoner. He will fold up the land of Egypt as a shepherd folds his cloak over himself. Then he will leave '
  - type: text
    content: victorious
  - type: text
    content: ' without anyone standing in his way. '
  '13':
  - type: text
    content: 'He will break the obelisks '
  - type: note
    content: Or “sacred pillars.” According to Deut. 16:22, set stones (sacred pillars) were forbidden in Israel.
  - type: text
    content: 'of the temple of the sun in Egypt '
  - type: note
    content: Or according to the Septuagint, “which is at On” (see Gen. 41:45, 50; 46:20). The Egyptian name On corresponds to the Greek translation of “Heliopolis” (the City of the Sun). This city is now part of Cairo.
  - type: text
    content: and will burn to the ground the temples of the gods of Egypt.’ ”
  '2':
  - type: text
    content: 'Then Azariah son of Hoshaiah, Johanan son of Kareah, and other arrogant men '
  - type: note
    content: As is clear in the context, the Hebrew word refers to proud, defiant, disrespectful, presumptuous, and arrogant behavior.
  - type: text
    content: 'said to Jeremiah, “You are lying. '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God did not tell you to say to us, ‘Do not go live in Egypt.’ '
  '3':
  - type: text
    content: It was Baruch son of Neriah who stirred you up against us to hand us over to the Babylonians to be either killed or deported to Babylon.”
  '4':
  - type: text
    content: 'So Johanan, all the army officers, and all the people refused to obey '
  - type: text
    content: Yahweh
  - type: text
    content: '’s command to stay in Judah. '
  '5':
  - type: text
    content: 'Instead, Johanan and his military leaders gathered up everyone left in Judah who had come back from all the nations where they had been scattered. '
  '6':
  - type: text
    content: 'They also led off the men, women, children, and the king’s daughters, too, and every single person that Nebuzaradan the field general had left under the charge of Gedaliah son of Ahikam. This included the prophet Jeremiah '
  - type: note
    content: Jeremiah, an old man by this time, apparently had no choice; he was forced to go into exile to Egypt with the others from Judah.
  - type: text
    content: 'and Baruch son of Neriah. '
  '7':
  - type: text
    content: 'In total disobedience to the voice of '
  - type: text
    content: Yahweh
  - type: text
    content: ', they entered the land of Egypt and arrived at Tahpanhes.'
  - type: note
    content: See 2 Kings 25:26.
  - type: heading
    content: Warning of Egypt’s Fall
  '8':
  - type: text
    content: 'At Tahpanhes, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Jeremiah and said, '
  '9':
  - type: text
    content: '“Take some large stones to the entrance of Pharaoh’s royal building in Tahpanhes. Bury the stones underneath the clay pavement '
  - type: note
    content: Or “Hide them in the mortar of the clay [brick] pavement.” The Hebrew is uncertain.
  - type: text
    content: 'and make sure the people of Judah are watching. '
  - type: note
    content: In this symbolic action, Jeremiah was setting up the foundation stones for the throne of Nebuchadnezzar. This allegory was saying to the people that Egypt would come under the authority of the king of Babylon.
