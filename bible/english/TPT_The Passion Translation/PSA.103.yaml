document_id: PSA.103
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Our Father’s Love
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s song of praise
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: With my whole heart, with my whole life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with my innermost being,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I bow in wonder and love before you, the holy God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you are my soul’s celebration.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How could I ever forget the miracles of kindness
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ve done for me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You kissed my heart with forgiveness, in spite of all I’ve done.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: From this verse through the rest of the psalm, the writer used the second person (you). This translation has left the psalm in the first person to enhance the poetic nuance for the English reader.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve healed me inside and out from every disease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You’ve rescued me from hell '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “redeemed me from the pit,” a term often used for Sheol or hell.
    marker-yv: yv-n
  - type: text
    text: and saved my life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve crowned me with love and mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You satisfy my every desire with good things.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is somewhat difficult to understand. It is literally “who satisfies with good ornaments.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve supercharged my life so that I soar again
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your youth [implying both strength and beauty] he restores.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a flying eagle in the sky!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You’re a God who makes things right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: giving justice to the defenseless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You unveiled to Moses your plans
- type: usfm
  marker: q1
  children:
  - type: text
    text: and showed Israel’s sons what you could do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lord, you’re so kind and tenderhearted
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Lord, you’re so compassionate and merciful.” The Hebrew word for “compassion” has a homonym that means “womb.” The Lord carries his people like a mother carries a child in her womb.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and so patient with people who fail you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your love is like a flooding river
- type: usfm
  marker: q1
  children:
  - type: text
    text: overflowing its banks with kindness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You don’t look at us only to find our faults,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You [he] will not always fight with us [like fighting with enemies].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: just so that you can hold a grudge against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You may discipline us for our many sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but never as much as we really deserve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor do you get even with us for what we’ve done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Higher than the highest heavens—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s how high your tender mercy extends!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Greater than the grandeur of heaven above
- type: usfm
  marker: q1
  children:
  - type: text
    text: is the greatness of your loyal love, towering over all
- type: usfm
  marker: q1
  children:
  - type: text
    text: who fear you and bow down before you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Farther than from a sunrise to a sunset—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s how far you’ve removed our guilt from us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The same way a loving father feels toward his children—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s but a sample of your tender feelings toward us,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “like a father has deep compassion for his children.” The Hebrew word for “tender feelings” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: racham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which has a homonym that can be translated “womb.” Our Father carries you in his womb. What a beautiful word play that our Father has a mother’s nurturing love for his children.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: your beloved children, who live in awe of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You know all about us, inside and out.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yatsar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “form” or “frame.” God knows our frame. But
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yatsar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also has a homonym that means “to be in distress” or “to be frustrated.” So this sentence could be translated “You know all about our frustrations and distress.” These thoughts combined would mean that God hasn’t forgotten that he formed us from dust and we’ll experience frustrations as human beings. God is sympathetic to our difficulties.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are mindful that we’re made from dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Our days are so few, and our momentary beauty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 103:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word translated “beauty” actually means “shining.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: so swiftly fades away!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then all of a sudden we’re gone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like grass clippings blown away in a gust of wind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: taken away to our appointment with death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leaving nothing to show that we were here.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Lord, your endless love stretches
- type: usfm
  marker: q1
  children:
  - type: text
    text: from one eternity to the other,
- type: usfm
  marker: q1
  children:
  - type: text
    text: unbroken and unrelenting toward those who fear you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those who bow facedown in awe before you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness to keep every gracious promise you’ve made
- type: usfm
  marker: q1
  children:
  - type: text
    text: passes from parents, to children, to grandchildren, and beyond.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You are faithful to all those who follow your ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: and keep your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has established his throne in heaven;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: his kingdom rules the entire universe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So bless the Lord, all his messengers of power,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are his mighty heroes who listen intently
- type: usfm
  marker: q1
  children:
  - type: text
    text: to the voice of his word to do it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Bless and praise the Lord, you mighty warriors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ministers who serve him well and fulfill his desires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will bless and praise the Lord with my whole heart!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all his works throughout the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: wherever his dominion stretches—
- type: usfm
  marker: q1
  children:
  - type: text
    text: let everything bless the Lord!
