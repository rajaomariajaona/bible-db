document_id: PSA.103,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Father’s Love
  - type: text
    content: King David’s song of praise
  - type: text
    content: With my whole heart, with my whole life,
  - type: text
    content: and with my innermost being,
  - type: text
    content: I bow in wonder and love before you, the holy God!
  '10':
  - type: text
    content: You may discipline us for our many sins,
  - type: text
    content: but never as much as we really deserve.
  - type: text
    content: Nor do you get even with us for what we’ve done.
  '11':
  - type: text
    content: Higher than the highest heavens—
  - type: text
    content: that’s how high your tender mercy extends!
  - type: text
    content: Greater than the grandeur of heaven above
  - type: text
    content: is the greatness of your loyal love, towering over all
  - type: text
    content: who fear you and bow down before you!
  '12':
  - type: text
    content: Farther than from a sunrise to a sunset—
  - type: text
    content: that’s how far you’ve removed our guilt from us.
  '13':
  - type: text
    content: The same way a loving father feels toward his children—
  - type: text
    content: that’s but a sample of your tender feelings toward us,
  - type: note
    content: Or “like a father has deep compassion for his children.” The Hebrew word for “tender feelings” is racham, which has a homonym that can be translated “womb.” Our Father carries you in his womb. What a beautiful word play that our Father has a mother’s nurturing love for his children.
  - type: text
    content: your beloved children, who live in awe of you.
  '14':
  - type: text
    content: You know all about us, inside and out.
  - type: note
    content: The Hebrew word yatsar can be translated “form” or “frame.” God knows our frame. But yatsar also has a homonym that means “to be in distress” or “to be frustrated.” So this sentence could be translated “You know all about our frustrations and distress.” These thoughts combined would mean that God hasn’t forgotten that he formed us from dust and we’ll experience frustrations as human beings. God is sympathetic to our difficulties.
  - type: text
    content: You are mindful that we’re made from dust.
  '15':
  - type: text
    content: Our days are so few, and our momentary beauty
  - type: note
    content: The Hebrew word translated “beauty” actually means “shining.”
  - type: text
    content: so swiftly fades away!
  '16':
  - type: text
    content: Then all of a sudden we’re gone,
  - type: text
    content: like grass clippings blown away in a gust of wind,
  - type: text
    content: taken away to our appointment with death,
  - type: text
    content: leaving nothing to show that we were here.
  '17':
  - type: text
    content: But Lord, your endless love stretches
  - type: text
    content: from one eternity to the other,
  - type: text
    content: unbroken and unrelenting toward those who fear you
  - type: text
    content: and those who bow facedown in awe before you.
  - type: text
    content: Your faithfulness to keep every gracious promise you’ve made
  - type: text
    content: passes from parents, to children, to grandchildren, and beyond.
  '18':
  - type: text
    content: You are faithful to all those who follow your ways
  - type: text
    content: and keep your word.
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ' has established his throne in heaven;'
  - type: text
    content: his kingdom rules the entire universe.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', you are my soul’s celebration.'
  - type: text
    content: How could I ever forget the miracles of kindness
  - type: text
    content: you’ve done for me?
  '20':
  - type: text
    content: So bless the Lord, all his messengers of power,
  - type: text
    content: for you are his mighty heroes who listen intently
  - type: text
    content: to the voice of his word to do it.
  '21':
  - type: text
    content: Bless and praise the Lord, you mighty warriors,
  - type: text
    content: ministers who serve him well and fulfill his desires.
  '22':
  - type: text
    content: I will bless and praise the Lord with my whole heart!
  - type: text
    content: Let all his works throughout the earth,
  - type: text
    content: wherever his dominion stretches—
  - type: text
    content: let everything bless the Lord!
  '3':
  - type: text
    content: You kissed my heart with forgiveness, in spite of all I’ve done.
  - type: note
    content: From this verse through the rest of the psalm, the writer used the second person (you). This translation has left the psalm in the first person to enhance the poetic nuance for the English reader.
  - type: text
    content: You’ve healed me inside and out from every disease.
  '4':
  - type: text
    content: 'You’ve rescued me from hell '
  - type: note
    content: Or “redeemed me from the pit,” a term often used for Sheol or hell.
  - type: text
    content: and saved my life.
  - type: text
    content: You’ve crowned me with love and mercy.
  '5':
  - type: text
    content: You satisfy my every desire with good things.
  - type: note
    content: The Hebrew text is somewhat difficult to understand. It is literally “who satisfies with good ornaments.”
  - type: text
    content: You’ve supercharged my life so that I soar again
  - type: note
    content: Or “your youth [implying both strength and beauty] he restores.”
  - type: text
    content: like a flying eagle in the sky!
  '6':
  - type: text
    content: You’re a God who makes things right,
  - type: text
    content: giving justice to the defenseless.
  '7':
  - type: text
    content: You unveiled to Moses your plans
  - type: text
    content: and showed Israel’s sons what you could do.
  '8':
  - type: text
    content: Lord, you’re so kind and tenderhearted
  - type: note
    content: Or “Lord, you’re so compassionate and merciful.” The Hebrew word for “compassion” has a homonym that means “womb.” The Lord carries his people like a mother carries a child in her womb.
  - type: text
    content: and so patient with people who fail you!
  - type: text
    content: Your love is like a flooding river
  - type: text
    content: overflowing its banks with kindness.
  - type: note
    content: See Ex. 34:6.
  '9':
  - type: text
    content: You don’t look at us only to find our faults,
  - type: note
    content: Or “You [he] will not always fight with us [like fighting with enemies].”
  - type: text
    content: just so that you can hold a grudge against us.
