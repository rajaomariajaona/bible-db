document_id: MAT.28,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection of Jesus
  - type: text
    content: 'After the Sabbath ended, at the first light of dawn on the first day of the week, Mary Magdalene and the other Mary '
  - type: note
    content: This was Mary, the mother of Jacob and Joseph. See Mark 16:1; Luke 24:10.
  - type: text
    content: 'went to take a look at the tomb. '
  '10':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Throw off all your fears. Go and tell my brothers
  - type: text
    content: ' '
  - type: note
    content: What an incredible truth! Believers are now his brothers and sisters. See Heb. 2:11.
  - type: text
    content: to go to Galilee. They will find me there.”
  - type: heading
    content: The Guards Report What They Witnessed
  '11':
  - type: text
    content: 'After the women left the tomb, a few of the guards went into Jerusalem and told the chief priests everything they had seen and heard. '
  '12':
  - type: text
    content: 'So the chief priests called a meeting with all the religious leaders and came up with a plan. They bribed the guards with a large sum of money '
  '13':
  - type: text
    content: 'and told them, “Tell everyone, ‘While we were asleep, his disciples came at night and stole his body!’ '
  '14':
  - type: text
    content: 'If Pilate finds out about this, don’t worry. We’ll make sure you don’t get blamed.” '
  '15':
  - type: text
    content: So they took the money and did as they were told. (That is why the story of the guards is still circulated among the Jews to this day.)
  - type: heading
    content: The Great Commission
  '16':
  - type: text
    content: 'Meanwhile, the eleven disciples heard the wonderful news from the women and left for Galilee, to the mountain where Jesus had arranged to meet them. '
  '17':
  - type: text
    content: The moment they saw him, they worshiped him, but some still had lingering doubts.
  '18':
  - type: text
    content: 'Then Jesus came close to them and said, '
  - type: text
    content: “All authority of the universe has been given to me.
  - type: text
    content: ' '
  - type: note
    content: There is a sentence found in the Aramaic that is missing in all but one Greek manuscript, which reads, “As my Father has sent me, so I send you.”
  '19':
  - type: text
    content: Now wherever you go, make disciples of all nations, baptizing them in the name of the Father, the Son, and the Holy Spirit.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Suddenly, the earth shook violently beneath their feet as the angel of the '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: descended from heaven. Lightning flashed around him and his robe was dazzling white! The guards were stunned and terrified—lying motionless like dead men. Then the angel walked up to the tomb, rolled away the stone, and sat on top of it!
  '20':
  - type: text
    content: And teach them to faithfully follow
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “keep” or “guard” (a fortress).
  - type: text
    content: all that I have commanded you. And never forget that I am with you every day, even to the completion of this age.”
  - type: note
    content: Or “I am with you all the appointed days” (Variorum Version).
  '5':
  - type: text
    content: 'The women were breathless and terrified, until the angel said to them, “There’s no reason to be afraid. I know you’re here looking for Jesus, who was crucified. '
  '6':
  - type: text
    content: 'He isn’t here—he has risen victoriously, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'just as he said! Come inside the tomb and see the place where our Lord was lying. '
  - type: note
    content: As translated from the Aramaic and some Greek texts.
  '7':
  - type: text
    content: 'Then run and tell his disciples that he has risen from the dead! I give you his message: ‘I am going ahead of you to Galilee and you will see me there.’ ”'
  - type: note
    content: Or ‘He is going ahead of you to Galilee and you will see him there. Behold, I have told you!’ ”
  '8':
  - type: text
    content: They rushed quickly to tell his disciples, and their hearts were filled with fear, awe, and great joy at the same time.
  '9':
  - type: text
    content: 'Along the way, Jesus suddenly appeared in front of them and said, '
  - type: text
    content: “Rejoice!”
  - type: text
    content: ' '
  - type: note
    content: Or “Be rejoicing!”
  - type: text
    content: They were so overwhelmed by seeing him that they bowed down and grasped his feet in adoring worship.
