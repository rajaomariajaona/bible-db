    marker-yv: yv-n
  - type: text
    text: 'went to take a look at the tomb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: 'Suddenly, the earth shook violently beneath their feet as the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:2–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: descended from heaven. Lightning flashed around him and his robe was dazzling white! The guards were stunned and terrified—lying motionless like dead men. Then the angel walked up to the tomb, rolled away the stone, and sat on top of it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The women were breathless and terrified, until the angel said to them, “There’s no reason to be afraid. I know you’re here looking for Jesus, who was crucified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He isn’t here—he has risen victoriously, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'just as he said! Come inside the tomb and see the place where our Lord was lying. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and some Greek texts.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then run and tell his disciples that he has risen from the dead! I give you his message: ‘I am going ahead of you to Galilee and you will see me there.’ ”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or ‘He is going ahead of you to Galilee and you will see him there. Behold, I have told you!’ ”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They rushed quickly to tell his disciples, and their hearts were filled with fear, awe, and great joy at the same time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Along the way, Jesus suddenly appeared in front of them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Rejoice!”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Be rejoicing!”
    marker-yv: yv-n
  - type: text
    text: They were so overwhelmed by seeing him that they bowed down and grasped his feet in adoring worship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Throw off all your fears. Go and tell my brothers
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What an incredible truth! Believers are now his brothers and sisters. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 2:11
      metadata:
        usfm: HEB.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to go to Galilee. They will find me there.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Guards Report What They Witnessed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'After the women left the tomb, a few of the guards went into Jerusalem and told the chief priests everything they had seen and heard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the chief priests called a meeting with all the religious leaders and came up with a plan. They bribed the guards with a large sum of money '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and told them, “Tell everyone, ‘While we were asleep, his disciples came at night and stole his body!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If Pilate finds out about this, don’t worry. We’ll make sure you don’t get blamed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So they took the money and did as they were told. (That is why the story of the guards is still circulated among the Jews to this day.)
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Meanwhile, the eleven disciples heard the wonderful news from the women and left for Galilee, to the mountain where Jesus had arranged to meet them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The moment they saw him, they worshiped him, but some still had lingering doubts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jesus came close to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “All authority of the universe has been given to me.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a sentence found in the Aramaic that is missing in all but one Greek manuscript, which reads, “As my Father has sent me, so I send you.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now wherever you go, make disciples of all nations, baptizing them in the name of the Father, the Son, and the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And teach them to faithfully follow
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “keep” or “guard” (a fortress).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all that I have commanded you. And never forget that I am with you every day, even to the completion of this age.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I am with you all the appointed days” (Variorum Version).
    marker-yv: yv-n
