document_id: REV.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman Clothed with the Sun
  - type: text
    content: 'Then an astonishing miracle-sign appeared in heaven. '
  - type: text
    content: I saw
  - type: text
    content: ' a woman '
  - type: note
    content: The church is figuratively spoken of as a woman. The description of her “clothed with . . . the sun, and the moon [powers of darkness] . . . under her feet” points to the victorious church about to give birth to a company of believers who will do the great works of Jesus and spread the brilliance of his glory throughout the earth. The overcoming bride of Christ is also seen as a woman “clothed with the sun.” See Gen. 37:9–10; Song. 6:10.
  - type: text
    content: 'clothed with '
  - type: text
    content: the brilliance of
  - type: text
    content: ' the sun, and the moon was under her feet. She was wearing on her head a victor’s crown of twelve stars. '
  '10':
  - type: text
    content: 'Then I heard a triumphant voice in heaven proclaiming:'
  - type: text
    content: “Now salvation and power are set in place,
  - type: text
    content: and the kingdom reign of our God
  - type: text
    content: and the ruling authority of his Anointed One
  - type: text
    content: are established.
  - type: text
    content: For the accuser of our brothers and sisters,
  - type: text
    content: 'who '
  - type: text
    content: relentlessly
  - type: text
    content: ' accused them'
  - type: text
    content: day and night before our God,
  - type: text
    content: 'has now been '
  - type: text
    content: defeated
  - type: text
    content: —cast out once and for all!
  '11':
  - type: text
    content: They conquered him completely
  - type: text
    content: through the blood of the Lamb
  - type: text
    content: and the powerful word of his testimony.
  - type: note
    content: As translated from the Aramaic. The Greek is “the word of their testimony.” It is the faithful testimony of Jesus that has the power to destroy the works of the devil.
  - type: text
    content: They triumphed because
  - type: text
    content: ' they did not love and cling'
  - type: text
    content: to their own lives, even when faced with death.
  '12':
  - type: text
    content: So rejoice, you heavens,
  - type: text
    content: and every heavenly being!
  - type: text
    content: But woe to the earth and the sea,
  - type: text
    content: for the devil has come down to you
  - type: text
    content: with great fury, because he knows
  - type: text
    content: his time is short.”
  - type: heading
    content: The Dragon Fights the Woman
  '13':
  - type: text
    content: 'Now, when the dragon realized that he had been cast down to the earth, he set off in pursuit of the woman who had given birth to the man-child. '
  - type: note
    content: The man-child is a company of believers who have overcome the dragon. They are the symbolic 144,000 victorious ones. See Rom. 8:17; 1 Cor. 4:8; 6:2; 2 Tim. 2:12.
  '14':
  - type: text
    content: But the two wings of the great eagle were given to the woman so that she could fly and escape into the wilderness to her own special place, where she was nourished for a time, and times, and half a time, away from the face of the dragon.
  '15':
  - type: text
    content: 'Then the dragon spewed from his mouth a '
  - type: text
    content: raging
  - type: text
    content: ' river of water to sweep her away with the flood. '
  '16':
  - type: text
    content: But the earth came to the rescue of the woman and at once opened its mouth and swallowed the river that the dragon had poured from his mouth.
  '17':
  - type: text
    content: 'Then the dragon became enraged at the woman and went off to make war '
  - type: note
    content: See Eph. 6:10–12.
  - type: text
    content: 'against the remnant of her offspring who follow the commands of God and have the testimony of Jesus. '
  - type: note
    content: That is, they have the character and nature of Jesus. It is the power of the faithful testimony of Jesus (not ours) that has power to overcome the devil.
  '18':
  - type: text
    content: 'And the dragon took his stand '
  - type: note
    content: Or “And I stood.”
  - type: text
    content: on the sand of the seashore.
  '2':
  - type: text
    content: She was pregnant and was crying out in labor pains, in the agony of giving birth.
  - type: note
    content: There are a number of possible interpretations explaining this astonishing miracle-sign. Some view the woman giving birth to be Israel, others the Virgin Mary. But it is a woman in heaven who is clothed with the sun (often a symbol of Christ) and the moon (often a symbol of occultic power) under her feet. This would mean the heavenly woman is a picture of the virgin bride of Christ emerging in the last days in radiant victory.
  '3':
  - type: text
    content: Consider this
  - type: text
    content: ': another astonishing miracle-sign appeared in heaven! I saw a huge, fiery-red dragon with ten horns and seven heads, '
  - type: note
    content: See Dan. 7:7. A reference symbolizing the ferocious, cruel, and wicked power of the devil.
  - type: text
    content: 'each wearing a royal crown. He was wearing seven royal crowns. '
  '4':
  - type: text
    content: 'The dragon’s '
  - type: text
    content: massive
  - type: text
    content: ' tail '
  - type: note
    content: See Isa. 9:15.
  - type: text
    content: swept across the sky and dragged away a third of the stars of heaven and cast them to the earth. And the dragon crouched before the woman who was about to give birth—poised to devour the baby the moment it was born.
  '5':
  - type: text
    content: 'She gave birth to a man-child who is about to rule and shepherd every nation with an iron scepter, '
  - type: note
    content: See Pss. 2:7–9; 110:1–2.
  - type: text
    content: 'and her son was caught up to God and to his throne. '
  '6':
  - type: text
    content: 'The woman fled into the wilderness, where God had already prepared a '
  - type: text
    content: safe
  - type: text
    content: ' place for her, and there they nourished her for one thousand two hundred and sixty days.'
  - type: heading
    content: The Dragon Defeated
  '7':
  - type: text
    content: 'Then a terrible war broke out in heaven. Michael '
  - type: note
    content: The name Michael means “one who is like God.”
  - type: text
    content: 'and his angels fought against the great dragon. The dragon and his angels fought back. '
  '8':
  - type: text
    content: 'But the dragon did not have the power to win and they could not regain their place in heaven. '
  '9':
  - type: text
    content: 'So the great dragon was thrown down once and for all. He was the serpent, the ancient snake called the devil, '
  - type: note
    content: Or “lying slanderer.”
  - type: text
    content: 'and Satan, '
  - type: note
    content: Or “Adversary.”
  - type: text
    content: who deceives the whole earth. He was cast down into the earth and his angels along with him.
