document_id: REV.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman Clothed with the Sun
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then an astonishing miracle-sign appeared in heaven. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I saw
    - type: text
      text: ' a woman '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The church is figuratively spoken of as a woman. The description of her “clothed with . . . the sun, and the moon [powers of darkness] . . . under her feet” points to the victorious church about to give birth to a company of believers who will do the great works of Jesus and spread the brilliance of his glory throughout the earth. The overcoming bride of Christ is also seen as a woman “clothed with the sun.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 37:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'clothed with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the brilliance of
    - type: text
      text: ' the sun, and the moon was under her feet. She was wearing on her head a victor’s crown of twelve stars. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then I heard a triumphant voice in heaven proclaiming:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now salvation and power are set in place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the kingdom reign of our God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the ruling authority of his Anointed One
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are established.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the accuser of our brothers and sisters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: relentlessly
    - type: text
      text: ' accused them'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: day and night before our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'has now been '
    - type: usfm
      marker: it
      children:
      - type: text
        text: defeated
    - type: text
      text: —cast out once and for all!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They conquered him completely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: through the blood of the Lamb
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the powerful word of his testimony.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the word of their testimony.” It is the faithful testimony of Jesus that has the power to destroy the works of the devil.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They triumphed because
    - type: text
      text: ' they did not love and cling'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to their own lives, even when faced with death.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So rejoice, you heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every heavenly being!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But woe to the earth and the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the devil has come down to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with great fury, because he knows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his time is short.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dragon Fights the Woman
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now, when the dragon realized that he had been cast down to the earth, he set off in pursuit of the woman who had given birth to the man-child. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The man-child is a company of believers who have overcome the dragon. They are the symbolic 144,000 victorious ones. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But the two wings of the great eagle were given to the woman so that she could fly and escape into the wilderness to her own special place, where she was nourished for a time, and times, and half a time, away from the face of the dragon.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the dragon spewed from his mouth a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raging
    - type: text
      text: ' river of water to sweep her away with the flood. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But the earth came to the rescue of the woman and at once opened its mouth and swallowed the river that the dragon had poured from his mouth.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the dragon became enraged at the woman and went off to make war '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'against the remnant of her offspring who follow the commands of God and have the testimony of Jesus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, they have the character and nature of Jesus. It is the power of the faithful testimony of Jesus (not ours) that has power to overcome the devil.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the dragon took his stand '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “And I stood.”
      marker-yv: yv-n
    - type: text
      text: on the sand of the seashore.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: She was pregnant and was crying out in labor pains, in the agony of giving birth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are a number of possible interpretations explaining this astonishing miracle-sign. Some view the woman giving birth to be Israel, others the Virgin Mary. But it is a woman in heaven who is clothed with the sun (often a symbol of Christ) and the moon (often a symbol of occultic power) under her feet. This would mean the heavenly woman is a picture of the virgin bride of Christ emerging in the last days in radiant victory.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Consider this
    - type: text
      text: ': another astonishing miracle-sign appeared in heaven! I saw a huge, fiery-red dragon with ten horns and seven heads, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . A reference symbolizing the ferocious, cruel, and wicked power of the devil.
      marker-yv: yv-n
    - type: text
      text: 'each wearing a royal crown. He was wearing seven royal crowns. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The dragon’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: massive
    - type: text
      text: ' tail '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 9:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: swept across the sky and dragged away a third of the stars of heaven and cast them to the earth. And the dragon crouched before the woman who was about to give birth—poised to devour the baby the moment it was born.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'She gave birth to a man-child who is about to rule and shepherd every nation with an iron scepter, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 2:7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 110:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and her son was caught up to God and to his throne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The woman fled into the wilderness, where God had already prepared a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: safe
    - type: text
      text: ' place for her, and there they nourished her for one thousand two hundred and sixty days.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dragon Defeated
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then a terrible war broke out in heaven. Michael '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Michael means “one who is like God.”
      marker-yv: yv-n
    - type: text
      text: 'and his angels fought against the great dragon. The dragon and his angels fought back. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But the dragon did not have the power to win and they could not regain their place in heaven. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So the great dragon was thrown down once and for all. He was the serpent, the ancient snake called the devil, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “lying slanderer.”
      marker-yv: yv-n
    - type: text
      text: 'and Satan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Adversary.”
      marker-yv: yv-n
    - type: text
      text: who deceives the whole earth. He was cast down into the earth and his angels along with him.
