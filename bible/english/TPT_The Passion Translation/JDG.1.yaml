document_id: JDG.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah Leads
  - type: text
    content: 'And '
  - type: note
    content: See first footnote on Josh. 1:1.
  - type: text
    content: 'after Joshua died, '
  - type: text
    content: the twelve tribal leaders
  - type: text
    content: ' '
  - type: note
    content: Or “the Israelites.” Not the entire nation but the twelve representatives of the twelve tribes came before the high priest to present their request before God.
  - type: text
    content: 'consulted '
  - type: text
    content: Yahweh
  - type: text
    content: ' for a prophetic sign '
  - type: note
    content: Although the Hebrew verb sha’al means, in its basic sense, “ask” or “inquire,” one subset meaning is to “inquire of,” “consult deity,” or “ask for an oracle [a prophetic sign or message].” It’s not explicitly stated, but it is likely Israel came before Yahweh at Shiloh (see Josh. 18:1). They presented themselves there to consult the Urim and Thummim worn on the breastplate of Phineas the high priest. Urim means “lights” and Thummim means “perfections.” See Ex. 28:30; Num. 27:21. The Israelites showed their commitment to following Yahweh’s plan by seeking a prophetic indication of which tribe should go first in the attack. It is always wise to seek the Lord before we step out into a new chapter of our lives. See Prov. 3:5–6.
  - type: text
    content: and asked, “Which tribe do you choose to be the first to lead the attack against the Canaanites?”
  '10':
  - type: text
    content: Under Caleb’s leadership
  - type: text
    content: ', '
  - type: note
    content: See Josh. 15:14.
  - type: text
    content: 'they fought against the Canaanites living in Hebron, formerly known as Kiriath Arba, and killed the three '
  - type: text
    content: Canaanite families descended from
  - type: text
    content: ' Sheshai, Ahiman, and Talmai. '
  - type: note
    content: These three descended from the giant Anak (see Num. 13:22, 33), and their names represent the three “giants” we must topple to advance into our inheritance. Sheshai is taken from a word that means “white-washed.” He points to the hypocrisy of the Pharisees that were like “tombs painted over with white paint” (Matt. 23:27), consumed with how they appeared to others. Ahiman means “brother of a gift” or “like a gift.” He represents pride over giftedness. We all have spiritual gifts, but they are gifts of grace, not trophies. And Talmai comes from a word that means “scholar.” True scholarship will always acknowledge how little humans know and how great God truly is. According to the parallel passage in Joshua, it was the descendants of these three sons of Anak that were conquered (see Josh. 15:13–14).
  '11':
  - type: text
    content: 'From there, they attacked the city of Debir, formerly known as Kiriath Sepher. '
  - type: note
    content: Kiriath Sepher means “city of books,” and Debir means “the word.” God is still looking for people who will “conquer” the book (Bible), view it as the Word of God, and make it their own.
  '12':
  - type: text
    content: 'Caleb announced, “I will give my daughter Achsah '
  - type: note
    content: Achsah means “anklet [that which beautifies the feet].” A believer who brings the good news to others is said to have “beautiful feet.” See Song. 7:1; Isa. 52:7; Rom. 10:15.
  - type: text
    content: 'in marriage to the man '
  - type: note
    content: Caleb knew it would take a special man to conquer a city with giants and thereby be a worthy husband for his daughter. Caleb knew that it would require a man endued with God’s power and favor to take the city of Debir.
  - type: text
    content: who attacks and captures Kiriath Sepher.”
  - type: heading
    content: Othniel
  '13':
  - type: text
    content: 'Caleb’s nephew Othniel '
  - type: note
    content: 'Othniel was the first champion-deliverer (judge). He lived in the shadow of his famous uncle, Caleb. No dragon slayer did more for his princess. Othniel prefigures our Lord Jesus, the Living Word who took the “city of books” for his bride. Othniel means “lion of God” or “strength of God.” He lived up to his name! Scholars believe Othniel was about fifty-three years old at this time. Arguably, Othniel could be considered the “ideal judge,” who married an Israelite, mobilized all the people, and was Spirit-endowed to lead to victory. (Rick Wadholm Jr., A Theology of the Spirit in the Former Prophets: A Pentecostal Perspective [Cleveland, TN: CPT Press, 2018] 121–124, 210.)'
  - type: text
    content: the Kenizzite captured Kiriath Sepher; and Caleb gave him his daughter Achsah in marriage.
  '14':
  - type: text
    content: 'One day, Othniel nagged her to ask her father for a field '
  - type: text
    content: as a wedding gift, so she went to him
  - type: text
    content: . When she got down from her donkey, Caleb said to her, “What can I do for you?”
  '15':
  - type: text
    content: '“Please, give me a blessing,” she replied. “I know you’ve already given me some arid desert land, but please give me a field with springs of water.” So Caleb blessed her with '
  - type: text
    content: a field that had
  - type: text
    content: ' both upper and lower springs.'
  - type: note
    content: 'Or possibly the name of a specific field: “He gave her [a field called] Upper and Lower Gulloth-Mayim.”'
  - type: heading
    content: Judah Advances
  '16':
  - type: text
    content: 'The descendants of Moses’ father-in-law, the Kenite, joined the people of Judah, and went with them from '
  - type: text
    content: Jericho
  - type: text
    content: ', the City of Date Palms, to the Judean wilderness. The Kenites had settled there among the '
  - type: text
    content: Amalekites
  - type: text
    content: ' at Arad.'
  - type: note
    content: Or “among the people at Arad.”
  '17':
  - type: text
    content: 'Judah and their brother-tribe Simeon advanced to the city of Zephath and wiped out the Canaanites living there. That’s why they now call the city Hormah. '
  - type: note
    content: This is an example of a Hebraic pun, or play on words. The words for “Hormah” and for the phrase “wiped out” are similar. Hormah means “totally destroyed” or “under the ban.”
  '18':
  - type: text
    content: The men of
  - type: text
    content: ' Judah captured Gaza, '
  - type: note
    content: Gaza means “strong” or “stronghold.” Gaza is located on the Mediterranean, and scholars consider it to be the oldest city of the Philistines. It is mentioned eighteen times in the Old Testament and once in the New Testament (see Acts 8:26).
  - type: text
    content: 'Ashkelon, '
  - type: note
    content: Ashkelon means “weight.” The town is possibly named for the weights of the scales used for measuring products. It is a coastal city located about thirty miles south of modern Tel Aviv.
  - type: text
    content: 'Ekron, '
  - type: note
    content: Ekron means “torn up by the roots.” It is mentioned over twenty times in the Old Testament.
  - type: text
    content: and the territories surrounding each of these cities.
  - type: heading
    content: Israel Fails to Conquer the Land
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: '’s presence '
  - type: text
    content: and power
  - type: text
    content: ' were with '
  - type: text
    content: the men of
  - type: text
    content: ' Judah and they were able to conquer the hill country, but because the people of the lowlands had war chariots, '
  - type: note
    content: Or “chariots with iron-rimmed wheels.”
  - type: text
    content: 'they failed to drive them out. '
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' answered them, '
  - type: note
    content: Our God answers prayer. We can expect the Lord to speak to his leaders and to his people today. Twelve times in Judges Yahweh spoke to the Israelites. See 6:16, 23, 25; 7:2, 4–5, 7, 9; 10:11; 20:18, 23, 28.
  - type: text
    content: '“Let Judah take the lead. '
  - type: note
    content: Judah means “praise.” Praise will lead the way before us. See 2 Chron. 20:21.
  '20':
  - type: text
    content: 'Because Caleb conquered the three '
  - type: text
    content: giants
  - type: text
    content: ', the sons of Anak, '
  - type: note
    content: Since Anak can mean “long-necked,” it is presumed that the “sons of Anak” were men of great height.
  - type: text
    content: he was given the city of Hebron.
  '21':
  - type: text
    content: The tribe of Benjamin, however, failed to conquer the Jebusites living in Jerusalem. So to this day, the Jebusites live among the Benjamites in Jerusalem.
  - type: note
    content: The inability of Israel to dispossess their enemies in vv. 19–29 (see Josh. 15:63) becomes a picture for us today of not dealing with every issue (enemy) within our hearts that prevents us from possessing our full inheritance in Christ. We will repeat the same patterns of defeat if we are not thorough in eliminating every evil from our lives. See Col. 3:5–11.
  '22':
  - type: text
    content: Yahweh
  - type: text
    content: '’s '
  - type: text
    content: presence and power
  - type: text
    content: ' were with Joseph’s descendants, so they advanced toward Bethel and sent men ahead to spy out the city that was formerly known as Luz. '
  '24':
  - type: text
    content: 'The spies confronted a man coming out of Bethel and they said to him, “Show us the way to enter the city and we will treat you well.” '
  - type: note
    content: Or literally “we will do chesed [covenant loyalty] to you.”
  '25':
  - type: text
    content: 'So he showed the spies a secret entrance into the city, and they killed everyone living in Bethel with the sword '
  - type: note
    content: Or literally “with the mouth” (i.e., “edge”) of the sword. See Heb. 4:12.
  - type: text
    content: 'except that man and his family. '
  '26':
  - type: text
    content: 'Later the man '
  - type: text
    content: and his family
  - type: text
    content: ' moved to the land of the Hittites '
  - type: note
    content: The region from northern Syria into Asia Minor was known in the days of Joshua and Judges as the kingdom of Hatti, or “the land of the Hittites.” The Talmud describes this region as the place where Phoenicians produced blue dye that the Israelites used for the blue fringes (tassels) of their garments. (See Num. 15:38; Sotah [Talmud] 46b.) According to Egyptian inscriptions dated to 1500 BC, the Hittites were expelled from the land of Canaan.
  - type: text
    content: 'and built a town. The '
  - type: text
    content: new
  - type: text
    content: ' town has kept the name Luz to this day.'
  '27':
  - type: text
    content: 'The Canaanites were determined to stay in their land, so the men of Manasseh did not conquer '
  - type: text
    content: the cities of
  - type: text
    content: ' Beth Shean, Taanach, Dor, Ibleam, Megiddo, and their surrounding villages. '
  - type: note
    content: Or “and their daughter towns.”
  '28':
  - type: text
    content: 'And whenever Israel gained the upper hand, they subjected the Canaanites to forced labor; '
  - type: note
    content: Eventually, Solomon conscripted the Canaanites to build the temple (see 1 Kings 9:20–22; 2 Chron. 8:7–8).
  - type: text
    content: but they did not completely drive them out.
  '29':
  - type: text
    content: The tribe of Ephraim failed to drive out the Canaanites living in Gezer, so the Canaanites continue to live there among them.
  '3':
  - type: text
    content: I have delivered the land into their hands.”
  - type: text
    content: 'Judah then enlisted support from their brother-tribe Simeon, '
  - type: note
    content: One (Judah) can chase a thousand, but two (Judah and Simeon) can chase ten thousand (see Deut. 32:30). In the next verse they did just that! Simeon’s cities were within the territory of Judah (see Josh. 15:26–32, 42; 19:1–9). Both Judah and Simeon had the same mother (Leah) and saw themselves as true brothers. Simeon means “one who hears.” When worship and the prophetic flow together, we will win our battles.
  - type: text
    content: 'saying, “Follow us into our territory and fight with us against the Canaanites; then we will do the same for you.” So the Simeonites '
  - type: text
    content: agreed and
  - type: text
    content: ' joined them.'
  '30':
  - type: text
    content: 'The tribe of Zebulun failed to drive out the Canaanites living in Kitron '
  - type: note
    content: Traditionally identified in Jewish writings as Sepphoris, about four miles north of Nazareth.
  - type: text
    content: or Nahalol, so the Canaanites continue to live there among them.
  '31':
  - type: text
    content: 'The tribe of Asher failed to drive out the Canaanites living in Acco, Sidon, Ahlab, Achzib, Helbah, Aphik, and Rehob, '
  '32':
  - type: text
    content: so the people of Asher live among the Canaanites residing in the land because they did not conquer them.
  '33':
  - type: text
    content: 'Likewise, the tribe of Naphtali failed to drive out the Canaanites living in Beth Shemesh or Beth Anath, '
  - type: note
    content: Shemesh means “sun” and Anath means “the war goddess.” They were Canaanite deities. It is likely that temples to these pagan gods were located in their respective cities.
  - type: text
    content: so they live among the Canaanites residing in the land. However, they forced the inhabitants of Beth Shemesh and Beth Anath to serve them.
  '34':
  - type: text
    content: 'The tribe of Dan '
  - type: text
    content: was least successful
  - type: text
    content: '. The Amorites forced them back into the hills '
  - type: note
    content: Although our enemies may push God’s people into retreat for a season, in Christ, our ultimate victory over our foes is secure.
  - type: text
    content: 'and they could no longer live in the valley. '
  '35':
  - type: text
    content: 'The Amorites persisted in living on Mount Heres, in Aijalon, and in Shaalbim. But when the descendants of Joseph grew stronger, they overpowered the Amorites and ruled over them. '
  '36':
  - type: text
    content: 'The boundary of the Amorites ran from Scorpion Pass '
  - type: note
    content: Or “Akrabbim,” possibly modern Neqb es-Safa, which descends from Beersheba to the Wadi Murra. Scorpion Pass lies about twenty miles south of the Dead Sea.
  - type: text
    content: to Sela and continued northward from there.
  '4':
  - type: text
    content: 'When Judah advanced, '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave them victory over the Canaanites and Perizzites, and they defeated ten thousand men at Bezek. '
  - type: note
    content: Bezek means “lightning.” Bezek is identified by some with Khirbet Bezqa, a site near Gezer, or possibly Khirbet Ibzik, about fifteen miles northeast of Shechem.
  '5':
  - type: text
    content: 'They encountered '
  - type: text
    content: King
  - type: text
    content: ' Adoni-Bezek '
  - type: note
    content: Adoni-Bezek means “the lord of lightning.”
  - type: text
    content: 'fleeing with his army on the battlefield. They pursued him, captured him, and defeated the Canaanites and Perizzites. Then they cut off Adoni-Bezek’s thumbs and big toes. '
  - type: note
    content: They cut off the king’s thumbs so he would never be able to hold a sword or scepter again. They cut off his big toes so that he would never be able to flee. He reaped what he had sown (see v. 7; cf. Gal. 6:7).
  '7':
  - type: text
    content: 'Adoni-Bezek confessed, “I once had seventy '
  - type: note
    content: The number seventy is the biblical number of the nations (Gen. 10 mentions seventy nations). In contrast, Jesus sent out seventy to bring the kingdom feast to the hungry among the nations. As they were sent out in Christ’s name, Jesus saw Satan fall from heaven like “lightning” (Luke 10:17–19). This was the ultimate victory over Adoni-Bezek, the lord of lightning. Adoni-Bezek is a picture of Satan.
  - type: text
    content: kings picking up scraps under my table with their thumbs and big toes cut off. Now God has paid me back for what I did to them!” They took him captive to Jerusalem, where he died.
  - type: note
    content: Although Jesus died in Jerusalem, by virtue of his resurrection, he lives today (see Rom. 6:10). But Satan was defeated in Jerusalem and stripped of his ability to conquer us all because of the cross of Jesus Christ. (See Col. 2:14–15; cf. John 3:18.)
  - type: heading
    content: Judah’s Victories
  '8':
  - type: text
    content: 'The men of Judah attacked Jerusalem and captured it. They killed '
  - type: text
    content: the inhabitants of
  - type: text
    content: ' the city '
  - type: note
    content: Or “they put the city to the mouth of the sword.” The words of our mouth are like the edge of a sword to defeat our enemies. See Heb. 4:12.
  - type: text
    content: 'and set it on fire. '
  - type: note
    content: Although they conquered Jerusalem, they did not fully occupy it until the time of King David, when he established Jerusalem as the nation’s capital.
  '9':
  - type: text
    content: 'Afterward, the men of Judah continued their advance and attacked the Canaanites living in the hill country, the southern desert region, and the western lowlands. '
