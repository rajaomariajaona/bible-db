document_id: ISA.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrogant Assyria
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe to those who legalize injustice and write oppressive legislation! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Since I was able to seize kingdoms full of idols and images more powerful and more impressive than those of Jerusalem and Samaria, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: won’t I do the same thing to Jerusalem and Samaria and their idols?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In his blasphemous boast, the king of Assyria equated the Lord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: with all the other gods and their idols that he had conquered. His arrogance would be his downfall. Although he became the rod of God’s anger to punish Judah and Israel, that same rod was now poised to strike him down.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But when the Lord has carried out his purpose on Mount Zion and Jerusalem, he will punish the king of Assyria because of his overbearing arrogance and unrestrained pride! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the pride of his exalted eyes.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He boasted, “Look what I have done by the strength of my hand and by my wisdom. See how clever I am! I have erased the borders of nations and plundered their treasures. I have been like a mighty conqueror, subduing those in strong fortresses. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “brought down kings from their thrones.” Assyria represents human reasoning, with its high thoughts and deceptive fantasies that exalt themselves against God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The intellect of man falls short and is inferior to the wisdom and knowledge of God.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I seized their wealth as one who found an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unprotected
    - type: text
      text: ' nest. As one who gathers eggs that have been left behind, so I gathered the wealth of the world. And the young birds could neither move a wing nor even open their mouths to peep!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Decrees Judgment on Assyria
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Is the axe greater than the one who wields it? Is the saw greater than the one who cuts with it? Can the axe strike without a hand to move it? Can a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lifeless
    - type: text
      text: ' wooden cane walk all by itself? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although God used Assyria as his “axe” and his “saw” to bring about his purposes, that doesn’t mean they had reason to be proud. The same can be said of us. Although God may use us powerfully, we must give glory and credit to God and his grace. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 12:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore, the sovereign Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, will send a devastating plague among Assyria’s proud warriors. Yes, the “glory” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “The ‘glory’ of Assyria” is a metaphor describing all their pomp and military might.
      marker-yv: yv-n
    - type: text
      text: 'of Assyria will be burned and go up in smoke! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the Light of Israel will become a fire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in their midst
    - type: text
      text: ', and the Holy One will become a flame! He will consume the thorns '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moses knelt before the burning thorn bush, and God ignited a fire in his heart. Today God wants to light a holy flame in every heart that follows Christ.
      marker-yv: yv-n
    - type: text
      text: 'and thistles of the Assyrian king in one day! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The splendor of his forest and orchard '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The phrase “forest and orchard” is a metaphor for Assyria’s armies (forest) and the king’s noblemen (orchard).
      marker-yv: yv-n
    - type: text
      text: 'will be completely destroyed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from breath to flesh, it will be destroyed,” which is a metaphor for totality.
      marker-yv: yv-n
    - type: text
      text: 'like a dying man fading away. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text of this last clause is uncertain.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The forest will have so few trees left '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fire of the glory of the Lord will consume the armies of Assyria. One angel destroyed 185,000 Assyrians in one night. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 19:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 37:36–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: that even a little boy could count them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration Promised
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You rip away the rights of the poor and prey upon widows and orphans! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You make widows your spoil and orphans your prey.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In that day, neither the remnant of Israel nor the survivors of the house of Jacob will lean anymore upon the one who abused them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Assyria.
      marker-yv: yv-n
    - type: text
      text: 'but they will lean fully '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sincerely.”
      marker-yv: yv-n
    - type: text
      text: 'on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the faithfulness of
    - type: text
      text: ' the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the Holy One of Israel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'A remnant will return, the remnant of Jacob’s tribes to the mighty God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Though your people Israel were as many as the sand on the seashore, only a remnant will return. Destruction has been decreed, and it will be overflowing with righteousness. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, will complete the destruction he has decreed upon the whole land.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So hear what the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, has to say: “My Zion-people, do not be gripped with fear over the Assyrians who oppress and abuse you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who beat you with a rod and lift up their staff against you.”
      marker-yv: yv-n
    - type: text
      text: 'as the Egyptians did long ago. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: After only a brief moment, I will end my indignation against you, and it will fall upon them to their destruction!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', who commands angel armies, will wield his whip against them, as when he struck Midian at the rock of Oreb. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The rock of Oreb (“raven”) is the place where Gideon killed two fleeing Midianite princes (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Isaiah mentioned both the rock of Oreb and the victory at the Red Sea to illustrate how God will completely subdue his enemies.
      marker-yv: yv-n
    - type: text
      text: And once again he will raise his rod over the waters, as he did in Egypt.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'In that day the Lord will remove the heavy burden from your shoulders and break off the yoke of bondage from your necks because of the heavy anointing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: upon you
    - type: text
      text: '!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because of oil [anointing].” Oil is a frequent symbol of the anointing of God. Although the meaning of the Hebrew text of this clause is uncertain, some scholars see the imagery of an ox who grew so fat that it shattered the yoke on his neck. Assyria’s yoke of bondage would be broken off Judah because they would grow fat and heavy with the anointing of God’s restored favor.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The Assyrian army '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he.” By implication and context, this is the king of Assyria with his armies.
      marker-yv: yv-n
    - type: text
      text: attacked Aiath;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aiath (or Ai) was a city east of Bethel and near Jericho. It means “heap of ruins.” In vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the Hebrew text contains no conjunctions and is in a very disjointed, short, hard-hitting style. There is much scholarly debate about when this invasion took place. Perhaps the names of the locations give us hints about the things God will “invade” inside of believers today. The “heap of ruins” could be an apt picture of our flesh life.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they passed over into Migron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Migron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “threshing floor.” God takes the hearts of his chosen ones through the threshing floor by the Holy Spirit.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stored their equipment at Michmash.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Michmash is a city about ten miles (sixteen kilometers) north of Jerusalem, believed to be modern-day Mukhmas.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Michmash
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “hidden.” God will go after our hidden issues.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: They went through the pass
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and spent the night at Geba.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Gibeah.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gibeah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “uphill,” a picture of striving in the flesh.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ramah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ramah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “high place.” It is an obvious metaphor for lofty and arrogant attitudes that are “raised up in defiance of the true knowledge of God” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: was alarmed and trembled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those in Gibeah, the city of Saul, ran for their lives.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
