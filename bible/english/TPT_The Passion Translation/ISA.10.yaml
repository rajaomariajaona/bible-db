document_id: ISA.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Arrogant Assyria
  - type: text
    content: 'Woe to those who legalize injustice and write oppressive legislation! '
  '10':
  - type: text
    content: 'Since I was able to seize kingdoms full of idols and images more powerful and more impressive than those of Jerusalem and Samaria, '
  '11':
  - type: text
    content: won’t I do the same thing to Jerusalem and Samaria and their idols?”
  - type: note
    content: In his blasphemous boast, the king of Assyria equated the Lord Yahweh with all the other gods and their idols that he had conquered. His arrogance would be his downfall. Although he became the rod of God’s anger to punish Judah and Israel, that same rod was now poised to strike him down.
  '12':
  - type: text
    content: 'But when the Lord has carried out his purpose on Mount Zion and Jerusalem, he will punish the king of Assyria because of his overbearing arrogance and unrestrained pride! '
  - type: note
    content: Or “the pride of his exalted eyes.”
  '13':
  - type: text
    content: 'He boasted, “Look what I have done by the strength of my hand and by my wisdom. See how clever I am! I have erased the borders of nations and plundered their treasures. I have been like a mighty conqueror, subduing those in strong fortresses. '
  - type: note
    content: Or “brought down kings from their thrones.” Assyria represents human reasoning, with its high thoughts and deceptive fantasies that exalt themselves against God (see 2 Cor. 10:5). The intellect of man falls short and is inferior to the wisdom and knowledge of God.
  '14':
  - type: text
    content: 'I seized their wealth as one who found an '
  - type: text
    content: unprotected
  - type: text
    content: ' nest. As one who gathers eggs that have been left behind, so I gathered the wealth of the world. And the young birds could neither move a wing nor even open their mouths to peep!”'
  - type: heading
    content: God Decrees Judgment on Assyria
  '15':
  - type: text
    content: 'Is the axe greater than the one who wields it? Is the saw greater than the one who cuts with it? Can the axe strike without a hand to move it? Can a '
  - type: text
    content: lifeless
  - type: text
    content: ' wooden cane walk all by itself? '
  - type: note
    content: Although God used Assyria as his “axe” and his “saw” to bring about his purposes, that doesn’t mean they had reason to be proud. The same can be said of us. Although God may use us powerfully, we must give glory and credit to God and his grace. See Acts 12:23.
  '16':
  - type: text
    content: 'Therefore, the sovereign Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will send a devastating plague among Assyria’s proud warriors. Yes, the “glory” '
  - type: note
    content: “The ‘glory’ of Assyria” is a metaphor describing all their pomp and military might.
  - type: text
    content: 'of Assyria will be burned and go up in smoke! '
  '17':
  - type: text
    content: 'For the Light of Israel will become a fire '
  - type: text
    content: in their midst
  - type: text
    content: ', and the Holy One will become a flame! He will consume the thorns '
  - type: note
    content: Moses knelt before the burning thorn bush, and God ignited a fire in his heart. Today God wants to light a holy flame in every heart that follows Christ.
  - type: text
    content: 'and thistles of the Assyrian king in one day! '
  '18':
  - type: text
    content: 'The splendor of his forest and orchard '
  - type: note
    content: The phrase “forest and orchard” is a metaphor for Assyria’s armies (forest) and the king’s noblemen (orchard).
  - type: text
    content: 'will be completely destroyed, '
  - type: note
    content: Or “from breath to flesh, it will be destroyed,” which is a metaphor for totality.
  - type: text
    content: 'like a dying man fading away. '
  - type: note
    content: The Hebrew text of this last clause is uncertain.
  '19':
  - type: text
    content: 'The forest will have so few trees left '
  - type: note
    content: The fire of the glory of the Lord will consume the armies of Assyria. One angel destroyed 185,000 Assyrians in one night. See 2 Kings 19:35; Isa. 37:36–38.
  - type: text
    content: that even a little boy could count them.
  - type: heading
    content: Restoration Promised
  '2':
  - type: text
    content: 'You rip away the rights of the poor and prey upon widows and orphans! '
  - type: note
    content: Or “You make widows your spoil and orphans your prey.”
  '20':
  - type: text
    content: 'In that day, neither the remnant of Israel nor the survivors of the house of Jacob will lean anymore upon the one who abused them, '
  - type: note
    content: That is, Assyria.
  - type: text
    content: 'but they will lean fully '
  - type: note
    content: Or “sincerely.”
  - type: text
    content: 'on '
  - type: text
    content: the faithfulness of
  - type: text
    content: ' the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Holy One of Israel. '
  '21':
  - type: text
    content: 'A remnant will return, the remnant of Jacob’s tribes to the mighty God. '
  '22':
  - type: text
    content: 'Though your people Israel were as many as the sand on the seashore, only a remnant will return. Destruction has been decreed, and it will be overflowing with righteousness. '
  '23':
  - type: text
    content: 'For the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will complete the destruction he has decreed upon the whole land.'
  '24':
  - type: text
    content: 'So hear what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has to say: “My Zion-people, do not be gripped with fear over the Assyrians who oppress and abuse you, '
  - type: note
    content: Or “who beat you with a rod and lift up their staff against you.”
  - type: text
    content: 'as the Egyptians did long ago. '
  '25':
  - type: text
    content: After only a brief moment, I will end my indignation against you, and it will fall upon them to their destruction!”
  '26':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', who commands angel armies, will wield his whip against them, as when he struck Midian at the rock of Oreb. '
  - type: note
    content: The rock of Oreb (“raven”) is the place where Gideon killed two fleeing Midianite princes (see Judg. 7:25). Isaiah mentioned both the rock of Oreb and the victory at the Red Sea to illustrate how God will completely subdue his enemies.
  - type: text
    content: And once again he will raise his rod over the waters, as he did in Egypt.
  '27':
  - type: text
    content: 'In that day the Lord will remove the heavy burden from your shoulders and break off the yoke of bondage from your necks because of the heavy anointing '
  - type: text
    content: upon you
  - type: text
    content: '!'
  - type: note
    content: Or “because of oil [anointing].” Oil is a frequent symbol of the anointing of God. Although the meaning of the Hebrew text of this clause is uncertain, some scholars see the imagery of an ox who grew so fat that it shattered the yoke on his neck. Assyria’s yoke of bondage would be broken off Judah because they would grow fat and heavy with the anointing of God’s restored favor.
  '28':
  - type: text
    content: 'The Assyrian army '
  - type: note
    content: Or “he.” By implication and context, this is the king of Assyria with his armies.
  - type: text
    content: attacked Aiath;
  - type: note
    content: Aiath (or Ai) was a city east of Bethel and near Jericho. It means “heap of ruins.” In vv. 28–31, the Hebrew text contains no conjunctions and is in a very disjointed, short, hard-hitting style. There is much scholarly debate about when this invasion took place. Perhaps the names of the locations give us hints about the things God will “invade” inside of believers today. The “heap of ruins” could be an apt picture of our flesh life.
  - type: text
    content: they passed over into Migron
  - type: note
    content: Migron means “threshing floor.” God takes the hearts of his chosen ones through the threshing floor by the Holy Spirit.
  - type: text
    content: and stored their equipment at Michmash.
  - type: note
    content: Michmash is a city about ten miles (sixteen kilometers) north of Jerusalem, believed to be modern-day Mukhmas. Michmash means “hidden.” God will go after our hidden issues.
  '29':
  - type: text
    content: They went through the pass
  - type: text
    content: and spent the night at Geba.
  - type: note
    content: Or “Gibeah.” Gibeah means “uphill,” a picture of striving in the flesh.
  - type: text
    content: 'Ramah '
  - type: note
    content: Ramah means “high place.” It is an obvious metaphor for lofty and arrogant attitudes that are “raised up in defiance of the true knowledge of God” (2 Cor. 10:5).
  - type: text
    content: was alarmed and trembled.
  - type: text
    content: Those in Gibeah, the city of Saul, ran for their lives.
  '3':
  - type: text
    content: 'What will come of you on your day of visitation when disaster comes from afar? To whom will you run for help? And what will you do then with all your great wealth? '
  - type: note
    content: Or “glory” or “honor,” a possible metaphor for their vast armies.
  '30':
  - type: text
    content: Cry aloud, O daughter of Gallim!
  - type: note
    content: Gallim means “heaps [of waves, stones, etc.]” or possibly “springs.” It represents the flow of life that does not originate with God but with the self.
  - type: text
    content: 'Listen, O Laishah! '
  - type: note
    content: Or “Laish.” Laish is the Hebrew word for “lion.” The lion’s den is a picture of the realm of demonic power (see Song. 4:8).
  - type: text
    content: Poor Anathoth!
  - type: note
    content: Or “Answer [her], O Anathoth!” Anathoth means “answers to prayers.”
  '31':
  - type: text
    content: 'Madmenah '
  - type: note
    content: Madmenah means “dung heap.” See Phil. 3:8.
  - type: text
    content: is retreating;
  - type: text
    content: 'the residents of Gebim '
  - type: note
    content: Gebim means “pits” or “ditches.”
  - type: text
    content: are hiding.
  '32':
  - type: text
    content: 'This very day, '
  - type: note
    content: Or “While it is still day.”
  - type: text
    content: 'standing at Nob, '
  - type: note
    content: Nob was the city of priests, which the Talmud and Jerome’s translation state was within sight of Jerusalem. Nob means “higher place.”
  - type: text
    content: he will shake his fist
  - type: text
    content: at the mountain of the daughter of the house of Zion—
  - type: text
    content: at the hill of Jerusalem.
  '33':
  - type: text
    content: Behold, the Sovereign Lord of Angel Armies
  - type: text
    content: is about to cut off the branches with terrifying power.
  - type: text
    content: He will cut down the exalted heights of the high,
  - type: text
    content: and all the lofty will be brought low.
  '34':
  - type: text
    content: He will slash the thickets of the forest as with an axe,
  - type: text
    content: and Lebanon will fall before the Mighty One.
  '4':
  - type: text
    content: You’ll have no option but to cringe among the captives or fall among the corpses of the slain! Yet despite all this, his anger has not subsided, and his hand is poised to strike.
  - type: note
    content: Or “his hand is still reaching out.”
  '5':
  - type: text
    content: 'Woe to '
  - type: text
    content: arrogant
  - type: text
    content: ' Assyria, the rod of my anger! The club I place in the '
  - type: text
    content: king’s
  - type: text
    content: ' hand is my fury. '
  '6':
  - type: text
    content: 'I am the one who has sent him against a godless nation and ordered him to attack a people who anger me. I sent him to take the spoil and seize the plunder '
  - type: note
    content: See Isa. 8:1.
  - type: text
    content: 'and to trample them down like dust in the street. '
  '7':
  - type: text
    content: 'But he has no clue what he’s doing, and he has something else in mind. He plans on annihilating many nations '
  '8':
  - type: text
    content: 'and thinks, “After all, I have made my executive commanders into kings. '
  '9':
  - type: text
    content: 'Calneh '
  - type: note
    content: Calneh (or Calno) means “[selfish] ambition.” It was a city in Shinar (see Gen. 10:10).
  - type: text
    content: 'will be no different than Carchemish, '
  - type: note
    content: Carchemish, which means “fortress of one who subdues,” was a capital city of northern Syria, once known as the Hittite empire.
  - type: text
    content: whom I destroyed
  - type: text
    content: '. I’ll destroy Hamath as I did Arpad '
  - type: note
    content: Hamath means “high walls.” It was the principal city of northern Syria. Arpad means “I will spread out.” It was a Syro-Hittite city north of Aleppo in northwestern Syria.
  - type: text
    content: 'and make Samaria like Damascus. '
  - type: note
    content: Samaria means “watch [guard] mountain.” It was the mountainous region north of Jerusalem also known as the northern kingdom of Israel. Damascus is not a Hebrew word (likely Aramaic); it means “alert” or “active.” Damascus is the major city of Syria and is viewed as the oldest continuously inhabited city on earth.
