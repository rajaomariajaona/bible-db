document_id: PSA.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Although we cannot be sure, it is possible that Ezra compiled the Psalms and wrote Ps. 1 as an “introduction” to the Psalter. Others believe Ps. 1 was written by David or Jeremiah.The Tree of Life
  - type: text
    content: What delight comes to the one who follows God’s ways!
  - type: note
    content: Psalm 1 is the contrast of those who follow God’s ways with those who choose their own path. Read through this psalm with the purpose of learning how to live with God in the first place.
  - type: text
    content: He won’t walk in step with the wicked,
  - type: text
    content: nor share the sinner’s way,
  - type: text
    content: nor be found sitting in the scorner’s seat.
  '2':
  - type: text
    content: His passion is to remain true to the Word of “I AM,”
  - type: text
    content: 'meditating day and night '
  - type: note
    content: To meditate on the revelation of light day and night means to meditate 24/7 on what is good and delightful. However, day signifies a period of enlightenment (Eph. 1:18) and night signifies a period of obscurity. Both when we have the light of insight and when we seem to be in the dark, meditation is the key to unlock the revelation of God.
  - type: text
    content: on the true revelation of light.
  - type: note
    content: Or “Torah.” From Ps. 1 we learn that the righteous and the wicked are distinguished by what they delight in.
  '3':
  - type: text
    content: He will be standing firm like a flourishing tree
  - type: text
    content: 'planted '
  - type: note
    content: Or “transplanted.” That is, God planted our lives from where we were into a place of blessing. See Ps. 92:13–14.
  - type: text
    content: by God’s design,
  - type: text
    content: deeply rooted by the brooks of bliss,
  - type: text
    content: bearing fruit in every season of life.
  - type: text
    content: He is never dry, never fainting,
  - type: text
    content: ever blessed, ever prosperous.
  - type: note
    content: The metaphors found in this verse can be paraphrased as “No matter what he sets out to do, he brings it to a successful conclusion.”
  '4':
  - type: text
    content: But how different are the wicked.
  - type: text
    content: 'They are like chaff '
  - type: note
    content: Chaff is lifeless, only a shell without the kernel. Chaff depicts a life without the truth of Christ. See Ps. 35:5–6.
  - type: text
    content: blown away by the wind.
  '5':
  - type: text
    content: The wicked will not endure the day of judgment,
  - type: text
    content: for God will not defend them.
  - type: text
    content: Nothing they do will succeed or endure for long,
  - type: text
    content: for they have no part with those who walk in truth.
  '6':
  - type: text
    content: But how different it is for the righteous!
  - type: text
    content: The Lord embraces their paths as they move forward
  - type: text
    content: while the way of the wicked leads only to doom.
