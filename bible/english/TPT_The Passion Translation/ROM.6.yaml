document_id: ROM.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumph of Grace over Sin
  - type: text
    content: 'So what do we do, then? Do we persist in sin so that God’s kindness and grace will increase? '
  '10':
  - type: text
    content: 'For by his sacrifice he died to sin’s power once and for all, '
  - type: note
    content: See also Heb. 9:26–28.
  - type: text
    content: 'but he now lives continuously for the Father’s pleasure. '
  '11':
  - type: text
    content: So let it be the same way with you! Since you are now joined with him, you must continually view yourselves as dead and unresponsive to sin’s appeal while living daily for God’s pleasure in union with Jesus, the Anointed One.
  - type: heading
    content: Sin’s Reign Is Over
  '12':
  - type: text
    content: 'Sin is a dethroned monarch; so you must no longer give it an opportunity to rule over your life, controlling how you live and compelling you to obey its desires and cravings. '
  - type: note
    content: This command of the apostle Paul must be seen in the light of 6:2–11. Spiritual victory is not striving harder, but resting on the truths of our purchased freedom. We have already died to sin (v. 2), through baptism we have been united with Christ in his death and resurrection (vv. 3–5), our former identity has forever been deprived of its power (vv. 6–7), and we are joined with Christ and live to God (vv. 8–11). On that basis, the command of v. 12 is based on who we really are.
  '13':
  - type: text
    content: 'So then, refuse to answer its call to surrender your body as a tool for wickedness. Instead, passionately answer God’s call to keep yielding your body to him as one who has now experienced resurrection life! You live now for his pleasure, ready to be used for his noble purpose. '
  - type: note
    content: Or “For the members of your body will be used as weapons for the righteousness of God.”
  '14':
  - type: text
    content: 'Remember this: sin will not conquer you, for God already has! You are not governed by law but governed by the reign of the grace of God.'
  - type: heading
    content: Grace Frees Us to Serve God
  '15':
  - type: text
    content: 'What are we to do, then? Should we sin to our hearts’ content since there’s no law to condemn us anymore? What a terrible thought! '
  '16':
  - type: text
    content: Don’t you realize that grace frees you to choose your own master? But choose carefully, for you surrender yourself to become a servant—bound to the one you choose to obey. If you choose to love sin, it will become your master, and it will own you and reward you with death. But if you choose to love and obey God, he will lead you into perfect righteousness.
  '17':
  - type: text
    content: 'And thanks be to God, for in the past you were servants of sin, but now your obedience is heart deep, and your life is being molded by truth through the teaching you are devoted to. '
  - type: note
    content: As translated from the Aramaic. The Greek is “the type of teaching into which you were handed over.”
  '18':
  - type: text
    content: And now you celebrate your freedom from your former master—sin. You’ve left its bondage, and now God’s perfect righteousness holds power over you as his loving servants.
  '19':
  - type: text
    content: 'I’ve used the familiar terms of a “servant” and a “master” to compensate for your weakness to understand. For just as you surrendered your bodies and souls to impurity and lawlessness, which only brought more lawlessness into your lives, so now surrender yourselves as servants of righteousness, which brings you deeper into true holiness. '
  '2':
  - type: text
    content: 'What a terrible thought! We have died to sin once and for all, as a dead man passes away from this life. So how could we live under sin’s rule a moment longer? '
  '20':
  - type: text
    content: For when you were bound as servants to sin, you lived your lives free from any obligation to righteousness.
  '21':
  - type: text
    content: 'So tell me, what benefit ensued from doing those things that you’re now ashamed of? It left you with nothing but a legacy of shame and death. '
  '22':
  - type: text
    content: 'But now, as God’s loving servants, you live in joyous freedom from the power of sin. So consider the benefits you now enjoy—you are brought deeper into the experience of true holiness that ends with eternal life! '
  '23':
  - type: text
    content: 'For sin’s meager wages is death, '
  - type: note
    content: 'The Greek word translated “meager wages” actually means “the wages of a foot soldier.” This Greek word, opsonion, is taken from the word used for a piece of dried fish: opsarion. The Aramaic can be translated “The business of sin is death.”'
  - type: text
    content: but God’s lavish gift is life eternal, found in your union with our Lord Jesus, the Anointed One.
  '3':
  - type: text
    content: Or have you forgotten that all of us who were immersed into union with Jesus, the Anointed One, were immersed into union with his death?
  '4':
  - type: text
    content: 'Sharing in his death by our baptism means that we were co-buried with him, so that when the Father’s glory raised Christ from the dead, we were also raised with him. We have been co-resurrected with him so that we could be empowered to walk in the freshness of new life. '
  '5':
  - type: text
    content: 'For since we are permanently grafted into him '
  - type: note
    content: Or “if we have become grown together as one with him.”
  - type: text
    content: to experience a death like his, then we are permanently grafted into him to experience a resurrection like his and the new life that it imparts.
  '6':
  - type: text
    content: 'Could it be any clearer '
  - type: note
    content: Or “Coming to know this,” or “Coming to the realization.”
  - type: text
    content: 'that our former identity '
  - type: note
    content: The Aramaic can be translated “our old son of Adam.”
  - type: text
    content: 'is now and forever deprived of its power? For we were co-crucified with him to dismantle the stronghold of sin within us, '
  - type: note
    content: Or “body of sin would no longer have dominion over us.”
  - type: text
    content: so that we would not continue to live one moment longer submitted to sin’s power.
  - type: note
    content: Or “that the body of sin might be annulled” (put out of business). To beg God for victory over sin is a refusal to understand that we have already died to sin. Our joyful task is to believe the good news, rather than to seek to “crucify ourselves.” Sin is not suppressed by the cross; it is eliminated. Upon this “water” God commands us to step out and walk, for we are now in him.
  '7':
  - type: text
    content: 'Obviously, a dead person is incapable of sinning. '
  '8':
  - type: text
    content: 'And if we were co-crucified with the Anointed One, we know that we will also share in the fullness of his life. '
  '9':
  - type: text
    content: 'And we know that since the Anointed One has been raised from the dead to die no more, his resurrection life has vanquished death and its power over him is finished. '
