document_id: ROM.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Triumph of Grace over Sin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So what do we do, then? Do we persist in sin so that God’s kindness and grace will increase? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by his sacrifice he died to sin’s power once and for all, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 9:26–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'but he now lives continuously for the Father’s pleasure. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So let it be the same way with you! Since you are now joined with him, you must continually view yourselves as dead and unresponsive to sin’s appeal while living daily for God’s pleasure in union with Jesus, the Anointed One.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sin’s Reign Is Over
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sin is a dethroned monarch; so you must no longer give it an opportunity to rule over your life, controlling how you live and compelling you to obey its desires and cravings. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This command of the apostle Paul must be seen in the light of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:2–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Spiritual victory is not striving harder, but resting on the truths of our purchased freedom. We have already died to sin (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), through baptism we have been united with Christ in his death and resurrection (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), our former identity has forever been deprived of its power (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and we are joined with Christ and live to God (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). On that basis, the command of v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is based on who we really are.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, refuse to answer its call to surrender your body as a tool for wickedness. Instead, passionately answer God’s call to keep yielding your body to him as one who has now experienced resurrection life! You live now for his pleasure, ready to be used for his noble purpose. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “For the members of your body will be used as weapons for the righteousness of God.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember this: sin will not conquer you, for God already has! You are not governed by law but governed by the reign of the grace of God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grace Frees Us to Serve God
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What are we to do, then? Should we sin to our hearts’ content since there’s no law to condemn us anymore? What a terrible thought! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t you realize that grace frees you to choose your own master? But choose carefully, for you surrender yourself to become a servant—bound to the one you choose to obey. If you choose to love sin, it will become your master, and it will own you and reward you with death. But if you choose to love and obey God, he will lead you into perfect righteousness.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thanks be to God, for in the past you were servants of sin, but now your obedience is heart deep, and your life is being molded by truth through the teaching you are devoted to. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the type of teaching into which you were handed over.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And now you celebrate your freedom from your former master—sin. You’ve left its bondage, and now God’s perfect righteousness holds power over you as his loving servants.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’ve used the familiar terms of a “servant” and a “master” to compensate for your weakness to understand. For just as you surrendered your bodies and souls to impurity and lawlessness, which only brought more lawlessness into your lives, so now surrender yourselves as servants of righteousness, which brings you deeper into true holiness. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What a terrible thought! We have died to sin once and for all, as a dead man passes away from this life. So how could we live under sin’s rule a moment longer? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For when you were bound as servants to sin, you lived your lives free from any obligation to righteousness.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So tell me, what benefit ensued from doing those things that you’re now ashamed of? It left you with nothing but a legacy of shame and death. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, as God’s loving servants, you live in joyous freedom from the power of sin. So consider the benefits you now enjoy—you are brought deeper into the experience of true holiness that ends with eternal life! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For sin’s meager wages is death, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word translated “meager wages” actually means “the wages of a foot soldier.” This Greek word,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: opsonion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', is taken from the word used for a piece of dried fish:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: opsarion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Aramaic can be translated “The business of sin is death.”
      marker-yv: yv-n
    - type: text
      text: but God’s lavish gift is life eternal, found in your union with our Lord Jesus, the Anointed One.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or have you forgotten that all of us who were immersed into union with Jesus, the Anointed One, were immersed into union with his death?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sharing in his death by our baptism means that we were co-buried with him, so that when the Father’s glory raised Christ from the dead, we were also raised with him. We have been co-resurrected with him so that we could be empowered to walk in the freshness of new life. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For since we are permanently grafted into him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “if we have become grown together as one with him.”
      marker-yv: yv-n
    - type: text
      text: to experience a death like his, then we are permanently grafted into him to experience a resurrection like his and the new life that it imparts.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Could it be any clearer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Coming to know this,” or “Coming to the realization.”
      marker-yv: yv-n
    - type: text
      text: 'that our former identity '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “our old son of Adam.”
      marker-yv: yv-n
    - type: text
      text: 'is now and forever deprived of its power? For we were co-crucified with him to dismantle the stronghold of sin within us, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “body of sin would no longer have dominion over us.”
      marker-yv: yv-n
    - type: text
      text: so that we would not continue to live one moment longer submitted to sin’s power.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that the body of sin might be annulled” (put out of business). To beg God for victory over sin is a refusal to understand that we have already died to sin. Our joyful task is to believe the good news, rather than to seek to “crucify ourselves.” Sin is not suppressed by the cross; it is eliminated. Upon this “water” God commands us to step out and walk, for we are now in him.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obviously, a dead person is incapable of sinning. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if we were co-crucified with the Anointed One, we know that we will also share in the fullness of his life. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we know that since the Anointed One has been raised from the dead to die no more, his resurrection life has vanquished death and its power over him is finished. '
