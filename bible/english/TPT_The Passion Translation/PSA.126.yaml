document_id: PSA.126,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Restored
  - type: text
    content: A song of the stairway
  - type: text
    content: It was like a dream come true
  - type: text
    content: when you freed us from our bondage and brought us back to Zion!
  '2':
  - type: text
    content: We laughed and laughed and overflowed with gladness.
  - type: text
    content: We were left shouting for joy and singing your praise.
  - type: text
    content: All the nations saw it and joined in, saying,
  - type: text
    content: “The Lord has done great miracles for them!”
  '3':
  - type: text
    content: Yes, he did mighty miracles and we are overjoyed!
  '4':
  - type: text
    content: Now, Lord, do it again! Restore us to our former glory!
  - type: text
    content: May streams of your refreshing flow over us
  - type: text
    content: until our dry hearts are drenched again.
  '5':
  - type: text
    content: Those who sow their tears as seeds
  - type: note
    content: Or “sow their seeds with tears.” A sower weeps when he sows his precious seed while his children are hungry. This is a picture of sacrificing what little we have for the harvest to come.
  - type: text
    content: will reap a harvest with joyful shouts of glee.
  '6':
  - type: text
    content: They may weep as they go out carrying their seed to sow,
  - type: text
    content: but they will return with joyful laughter and shouting with gladness
  - type: text
    content: as they bring back armloads of blessing and a harvest overflowing!
