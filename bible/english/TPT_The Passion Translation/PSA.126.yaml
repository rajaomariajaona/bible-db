document_id: PSA.126,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Restored
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: It was like a dream come true
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you freed us from our bondage and brought us back to Zion!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: We laughed and laughed and overflowed with gladness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were left shouting for joy and singing your praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations saw it and joined in, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The Lord has done great miracles for them!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yes, he did mighty miracles and we are overjoyed!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Now, Lord, do it again! Restore us to our former glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May streams of your refreshing flow over us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until our dry hearts are drenched again.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who sow their tears as seeds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 126:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sow their seeds with tears.” A sower weeps when he sows his precious seed while his children are hungry. This is a picture of sacrificing what little we have for the harvest to come.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will reap a harvest with joyful shouts of glee.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They may weep as they go out carrying their seed to sow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they will return with joyful laughter and shouting with gladness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they bring back armloads of blessing and a harvest overflowing!
