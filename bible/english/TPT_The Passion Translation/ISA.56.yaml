document_id: ISA.56,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joy for the Outcasts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to his people
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Promote the cause of justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do what is just and right,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cultivate righteousness.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for soon my salvation will come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my righteousness will be unveiled.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Blind watchmen, all of them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have no revelation-knowledge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they’re like dumb dogs that don’t even bark—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dreaming, sleeping, devoted to slumber.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They’re greedy dogs that never eat enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the shepherds have no discernment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they follow their own desires.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every last one of them seeks his own profit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Each one says, “Let’s get wine and liquor and have a party!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And tomorrow, more of the same, except even better!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint omits this verse.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Blessed is the one who will faithfully keep his commitment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, blessed is the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who honors the Sabbath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For believers today, our Sabbath is now a man, the Lord Jesus Christ. We rest in the finished work of the cross. We cease from our own labors and enter into his Sabbath rest. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and does not disregard it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the one who keeps their hands from doing evil.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The foreigner who joins himself to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: should never say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Because I’m a foreigner
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will exclude me from his people.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the eunuchs should never say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Because I can’t have children
    - type: text
      text: ', I’m just a barren tree.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a figure of speech, comparing being unable to procreate to being like a withered tree. Eunuchs were forbidden to worship with God’s people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 23:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but God’s mercy triumphs over rejection.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to such a man
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To the eunuchs who keep my Sabbaths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and choose the things that honor me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and remain true to my covenant, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I make this promise
    - type: text
      text: ':'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ‘I will bestow upon them within my household
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in my house and within my walls.” This becomes a figure of speech for God’s household or family, not a literal plaque in the temple.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both an honored place and an honored name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even better than the honor that comes from having children.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a monument [memorial].” God is saying that grace is greater than our disqualifications. In spite of our imperfections, if we continue to honor God and his Word, favor will rest on our lives forever. This favor and name will endure longer than what comes from having children.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bestow upon them my everlasting favor;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with an everlasting name.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will never be forgotten.’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And to the foreigners who join themselves to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to worship him, those who want to be his servants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and love the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all who honor the Sabbath and do not disregard it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and who remain true to my covenant—
    - type: usfm
      marker: it
      children:
      - type: text
        text: I make this promise
    - type: text
      text: ':'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ‘I will welcome you into my holy mountain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s holy mountain is the Zion-realm. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:22–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make you joyful in my house of prayer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s desire has always been to gather his people into the house of prayer. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 21:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 19:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will accept every sacrifice and offering
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you place on my altar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for my house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of worship
    - type: text
      text: ' will be known'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a house of prayer for all people.’ ”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The Lord God Almighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who brings home the outcasts of Israel, says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There are many others I will gather,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will add them to those who are already gathered.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 17:20–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Corrupt Leaders
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All you wild beasts, come and devour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you wild animals of the forest.
