document_id: ISA.56,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joy for the Outcasts
  - type: text
    content: Yahweh
  - type: text
    content: ' says '
  - type: text
    content: to his people
  - type: text
    content: ':'
  - type: text
    content: “Promote the cause of justice!
  - type: text
    content: Do what is just and right,
  - type: note
    content: Or “Cultivate righteousness.”
  - type: text
    content: for soon my salvation will come
  - type: text
    content: and my righteousness will be unveiled.
  '10':
  - type: text
    content: Blind watchmen, all of them!
  - type: text
    content: They have no revelation-knowledge;
  - type: text
    content: they’re like dumb dogs that don’t even bark—
  - type: text
    content: dreaming, sleeping, devoted to slumber.
  '11':
  - type: text
    content: They’re greedy dogs that never eat enough.
  - type: text
    content: And the shepherds have no discernment;
  - type: text
    content: they follow their own desires.
  - type: text
    content: Every last one of them seeks his own profit.
  '12':
  - type: text
    content: Each one says, “Let’s get wine and liquor and have a party!
  - type: text
    content: And tomorrow, more of the same, except even better!”
  - type: note
    content: The Septuagint omits this verse.
  '2':
  - type: text
    content: Blessed is the one who will faithfully keep his commitment.
  - type: text
    content: Yes, blessed is the one
  - type: text
    content: 'who honors the Sabbath '
  - type: note
    content: For believers today, our Sabbath is now a man, the Lord Jesus Christ. We rest in the finished work of the cross. We cease from our own labors and enter into his Sabbath rest. See Heb. 4.
  - type: text
    content: and does not disregard it,
  - type: text
    content: and the one who keeps their hands from doing evil.”
  '3':
  - type: text
    content: 'The foreigner who joins himself to '
  - type: text
    content: Yahweh
  - type: text
    content: should never say,
  - type: text
    content: “
  - type: text
    content: Because I’m a foreigner
  - type: text
    content: ','
  - type: text
    content: Yahweh
  - type: text
    content: ' will exclude me from his people.”'
  - type: text
    content: And the eunuchs should never say,
  - type: text
    content: “
  - type: text
    content: Because I can’t have children
  - type: text
    content: ', I’m just a barren tree.”'
  - type: note
    content: This is a figure of speech, comparing being unable to procreate to being like a withered tree. Eunuchs were forbidden to worship with God’s people (see Deut. 23:1), but God’s mercy triumphs over rejection.
  '4':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says '
  - type: text
    content: to such a man
  - type: text
    content: ','
  - type: text
    content: “To the eunuchs who keep my Sabbaths,
  - type: text
    content: and choose the things that honor me,
  - type: text
    content: 'and remain true to my covenant, '
  - type: text
    content: I make this promise
  - type: text
    content: ':'
  '5':
  - type: text
    content: ‘I will bestow upon them within my household
  - type: note
    content: Or “in my house and within my walls.” This becomes a figure of speech for God’s household or family, not a literal plaque in the temple.
  - type: text
    content: both an honored place and an honored name,
  - type: text
    content: even better than the honor that comes from having children.
  - type: note
    content: Or “a monument [memorial].” God is saying that grace is greater than our disqualifications. In spite of our imperfections, if we continue to honor God and his Word, favor will rest on our lives forever. This favor and name will endure longer than what comes from having children.
  - type: text
    content: I bestow upon them my everlasting favor;
  - type: note
    content: Or “with an everlasting name.”
  - type: text
    content: you will never be forgotten.’
  '6':
  - type: text
    content: 'And to the foreigners who join themselves to '
  - type: text
    content: Yahweh
  - type: text
    content: to worship him, those who want to be his servants
  - type: text
    content: 'and love the name of '
  - type: text
    content: Yahweh
  - type: text
    content: —
  - type: text
    content: all who honor the Sabbath and do not disregard it,
  - type: text
    content: and who remain true to my covenant—
  - type: text
    content: I make this promise
  - type: text
    content: ':'
  '7':
  - type: text
    content: ‘I will welcome you into my holy mountain
  - type: note
    content: Yahweh’s holy mountain is the Zion-realm. See Heb. 12:22–24.
  - type: text
    content: and make you joyful in my house of prayer.
  - type: note
    content: God’s desire has always been to gather his people into the house of prayer. See Matt. 21:13; Mark 11:17; Luke 19:46.
  - type: text
    content: I will accept every sacrifice and offering
  - type: text
    content: that you place on my altar,
  - type: text
    content: 'for my house '
  - type: text
    content: of worship
  - type: text
    content: ' will be known'
  - type: text
    content: as a house of prayer for all people.’ ”
  '8':
  - type: text
    content: The Lord God Almighty,
  - type: text
    content: who brings home the outcasts of Israel, says,
  - type: text
    content: “There are many others I will gather,
  - type: text
    content: and I will add them to those who are already gathered.”
  - type: note
    content: See John 17:20–24.
  - type: heading
    content: Corrupt Leaders
  '9':
  - type: text
    content: All you wild beasts, come and devour,
  - type: text
    content: you wild animals of the forest.
