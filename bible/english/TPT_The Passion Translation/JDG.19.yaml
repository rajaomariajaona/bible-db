  - type: heading
    content: The Outrage of Gibeah
  - type: text
    content: These were the days when there was no king ruling in Israel.
  - type: text
    content: 'Now there was a Levite who lived in the remote hill country of Ephraim. He took as his mistress '
  - type: note
    content: Or “concubine.”
  - type: text
    content: 'a woman from Bethlehem in Judah, '
  '10':
  - type: text
    content: 'But the Levite refused; he and his two donkeys, his servant, and his mistress set out and traveled as far as the vicinity of Jebus—that is, Jerusalem. '
  '11':
  - type: text
    content: Late in the day, they were near Jebus, and the servant said to his master, “Let’s go into this town of the Jebusites and spend the night there.”
  '12':
  - type: text
    content: His master said to him, “
  - type: text
    content: No
  - type: text
    content: '. They are not of Israel. We will not enter a town of foreigners. We will go on to Gibeah. '
  '13':
  - type: text
    content: 'Come,” he said to his attendant, “we’ll go to another town and spend the night either in Gibeah or in Ramah.” '
  '14':
  - type: text
    content: So they traveled on, and as the sun set, they were near Gibeah in the territory of Benjamin.
  '15':
  - type: text
    content: 'They turned off there and entered Gibeah to spend the night. The Levite, '
  - type: text
    content: his servant, and his mistress
  - type: text
    content: ' sat down in the town square, but nobody invited them indoors to spend the night. '
  '16':
  - type: text
    content: 'In the evening, an old man came into town from working in his field. This man was from the hill country of Ephraim and resided at Gibeah, where the townspeople were of the tribe of Benjamin. '
  '17':
  - type: text
    content: He happened to see the travelers sitting in the town square. The old man inquired, “Where do you come from? And where are you headed?”
  '18':
  - type: text
    content: 'The Levite replied, “We’re just passing through. We’re traveling from Bethlehem in Judah to the other end of the hill country of Ephraim, where I live. I just made a journey to Bethlehem of Judah, and now we’re on our way to the House of '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: Or “on our way to my house” (LXX). If the Hebrew is to be preferred, “the House of Yahweh” stood at Shiloh.
  - type: text
    content: 'but nobody has offered us hospitality. '
  '19':
  - type: text
    content: 'We have plenty of straw and feed for our donkeys, and bread and wine for me and the woman and for the attendant with us. '
  - type: text
    content: All we need is a roof over our heads
  - type: text
    content: ; we lack nothing.”
  '2':
  - type: text
    content: but she eventually was unfaithful. She deserted him and returned to her father’s house in Bethlehem where she stayed for four months.
  '20':
  - type: text
    content: '“Rest easy,” said the old man. “I’ll take care of all your needs. You won’t need to spend the night in the square.” '
  '21':
  - type: text
    content: So the old man took them into his house. He prepared fodder for the donkeys; then they washed their feet, and they ate and drank together.
  - type: heading
    content: The Depraved Men of Gibeah
  '22':
  - type: text
    content: 'They were enjoying themselves when suddenly some perverted and depraved men '
  - type: note
    content: Or “sons of Belial,” an evil spirit that dwelt in the underworld.
  - type: text
    content: 'of the town surrounded the house and pounded on the door. They called to the aged owner of the house, “Bring out the man you invited into your house so that we can have sex with him.” '
  '23':
  - type: text
    content: 'The owner of the house went out to reason with them. “Please, my friends,” he said. “Don’t commit such a wicked act. This man is my guest! Do not perpetrate this outrage. '
  '24':
  - type: text
    content: 'Look, here are the man’s mistress and my virgin daughter—let me bring them out to you. Do what you wish with them. Have your pleasure with them, but don’t do such an outrageous thing to this man.” '
  '25':
  - type: text
    content: But the men refused to listen to him, so the Levite seized his mistress and pushed her out to them. They raped her repeatedly all night until morning and finally let her go when dawn broke.
  '26':
  - type: text
    content: 'At sunrise the woman staggered back to the house where her master had spent the night and collapsed at the entrance of the man’s house. '
  '27':
  - type: text
    content: 'When the Levite arose in the morning, he opened the doors of the house to start on his journey, and he saw his mistress lying at the entrance of the house with her hands on the threshold. '
  '28':
  - type: text
    content: '“Get up,” he said to her, “it’s time to go.” But there was no response, for she was dead. '
  - type: note
    content: The last clause, implied in the Hebrew, is taken from the Septuagint.
  - type: text
    content: 'The man placed her body on the donkey and set out for home. '
  '29':
  - type: text
    content: 'When he arrived home, he took a sword, cut the corpse of his mistress limb by limb into twelve pieces, and sent them, '
  - type: text
    content: one for each tribe
  - type: text
    content: ', throughout Israel. '
  '3':
  - type: text
    content: 'The Levite '
  - type: note
    content: Or “Her husband.” However, the English terminology for marriage does not fit the cultural relationship presented in chs. 19–20.
  - type: text
    content: 'set out with his servant and a pair of donkeys to find her, win back her heart, and try to persuade her to return home with him. She received him into her father’s house, and when the girl’s father saw him, he received him warmly. '
  '30':
  - type: text
    content: And everyone who saw this horrible display, cried out, “Never have we seen such brutality take place from the day we came up from the land of Egypt to this day. We need to decide what we should do about this!”
  '4':
  - type: text
    content: His father-in-law, the girl’s father, pressed him to stay, so the Levite stayed with him three days, and they ate and drank together.
  '5':
  - type: text
    content: 'On the fourth day, early in the morning, he started to leave, but his father-in-law, the girl’s father, insisted, “Eat something first to give you strength '
  - type: text
    content: for your journey
  - type: text
    content: '; then you can leave.” '
  '6':
  - type: text
    content: 'After the two of them sat down and had breakfast together, the girl’s father said to the Levite, “You might as well stay overnight and enjoy yourself.” '
  '7':
  - type: text
    content: The Levite started to leave, but his mistress’ father kept urging him to stay until he turned back and spent another night there.
  '8':
  - type: text
    content: 'Early in the morning of the fifth day, he was about to leave when the girl’s father said, “Come, have breakfast.” They ate together and lingered there until past noon. '
  '9':
  - type: text
    content: Then the Levite, his mistress, and his attendant started to leave. But his mistress’ father said to him, “Look, the day is almost gone; stay another night here and enjoy yourself. Tomorrow, you can start early on your journey and head for home.”
