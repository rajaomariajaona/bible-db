document_id: LUK.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and Religious Traditions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One Sabbath day, Jesus and his disciples were walking through a field of ripe wheat. His disciples plucked some heads of grain, rubbed the husks off with their hands, and ate them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: This infuriated some of the Jewish religious leaders. They said to Jesus, “Why are you allowing your disciples to harvest grain on the Sabbath? Don’t you know it’s not permissible according to the law?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Haven’t you read the Scriptures? Haven’t you read what King David did when he was hungry?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He entered the sanctuary of God, took the bread of God’s presence right off the sacred table, and shared it with his men.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This incident is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 21:1–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus referred to this story to prove to the Pharisees that they were hypocrites who were willing to overlook David’s “violation” of the Sabbath but not Jesus’ supposed violation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It was only lawful for the priests to eat the bread of God’s presence.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You need to know that the Son of Man is no slave to the Sabbath, for I am master over the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: On another Sabbath, Jesus was teaching in the synagogue. In the room with him was a man with a deformed right hand. Everyone watched Jesus closely, especially the Jewish religious leaders and the religious scholars, to see if Jesus would heal on a Sabbath, for they were eager to find a reason to accuse him of breaking the Jewish laws.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus, knowing their every thought, said to the man with the deformed hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come and stand here in the middle of the room.”
  - type: text
    text: ' So he got up and came forward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus said to all who were there, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Let me ask you a question. Which is better: to heal or to do harm on the Sabbath? I have come to save a life, but you have come to find a life to destroy.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus knew there were some present who wanted to “destroy” his life and would soon crucify him. He came to heal; they came to kill. They were the real Sabbath breakers.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'One by one Jesus looked into the eyes of each person in the room. Then he said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stretch out your arm and open your hand!”
- type: usfm
  marker: p
  children:
  - type: text
    text: With everyone watching intently, he stretched out his arm, and his hand was completely healed!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The room erupted with bitter rage, and from that moment on, the religious leaders plotted among themselves about how they might harm Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Chooses Twelve Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After leaving the synagogue, Jesus went into the high hills to spend the whole night in prayer to God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the pattern of Jesus in the Gospel accounts. Before he made important decisions and before great events in his life, he sought his Father. Once he saw what the Father wanted, Jesus obeyed as the perfect Son. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 5:19
      metadata:
        usfm: JHN.5.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: At daybreak, he called together all of his followers and selected twelve from among them, and he appointed them to be his apostles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apostle means “ambassador,” “missionary,” or “sent one.” The apostles were all different in their personalities and came from different backgrounds. The people Jesus chooses today don’t all look, act, or sound alike. The first ministry Jesus established was the apostolic. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 12:28
      metadata:
        usfm: 1CO.12.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 4:11
      metadata:
        usfm: EPH.4.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: 'Here are their names: Simon, whom he named Peter; Andrew, Peter’s brother; Jacob; John; Philip; Bartholomew; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:14–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many scholars believe that Bartholomew was the Nathaniel mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 1:45–46
      metadata:
        usfm: JHN.1.45+JHN.1.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Matthew; Thomas; Jacob the son of Alpheus; Simon, known as a fiery political zealot; Judah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:14–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: He is also called Thaddeus, as mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 10:3
      metadata:
        usfm: MAT.10.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 3:18
      metadata:
        usfm: MRK.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the son of Jacob; and Judas the locksmith, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:14–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The name Judas is actually Judah. Iscariot is not his last name, but could be taken from the name of the town, Kerioth, twelve miles south of Hebron. More plausibly, it is from a Hebrew word meaning “lock”: Judah the locksmith. Most likely he was chosen to lock the collection bag, which means he had the key and could pilfer the funds at will. Sadly, he wanted to lock up Jesus and control him for his own ends.'
    marker-yv: yv-n
  - type: text
    text: who later betrayed Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus and his apostles came down from the hillside to a level field, where a large number of his disciples waited, along with a massive crowd: people from all over Judea, Jerusalem, and the coastal district of Tyre and Sidon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The non-Jewish people flocked to hear Jesus, and he healed them all.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They had all come to listen to the Word so that they could be healed of their diseases '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the literal translation of the Aramaic text.
    marker-yv: yv-n
  - type: text
    text: 'and be set free from tormenting demonic powers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The entire crowd eagerly tried to come near Jesus, to touch him to receive healing, because a tangible, supernatural power emanated from him and healed all who came close to him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Taught Them What Matters Most
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Looking intently at his followers, Jesus began his sermon. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How enriched
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “blessed.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you become when you are a beggar, for you will experience the reality of God’s kingdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How filled you become when you are consumed with hunger and desire, for you will be completely satisfied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How content you become when you weep
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: with complete brokenness
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', for you will laugh with unrestrained joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How favored you become when you are hated, excommunicated, or slandered, or when your name is spoken of as evil because of your love for me, the Son of Man.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I promise you that as you experience these things, you will celebrate and dance with overflowing joy, and the heavenly reward of your faith will be abundant, because you are being treated the same way as your forefathers the prophets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But what sorrows await those of you who are rich in this life only, for you have already received all the comfort you’ll ever get.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrows await those of you who are content with yourselves, for hunger and emptiness will come to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrows await those of you who laugh now, having received all your joy in this life only, for grief and wailing will come to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrows await those of you who are always honored and lauded by others, for that’s how your forefathers treated every false prophet.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love Your Enemies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But I say to you who hear, love your enemies and do something wonderful
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic text.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for them in return for their hatred.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When someone curses you, bless that person in return. When others mistreat and harass you, accept it as your mission to pray for them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: To those who despise you, continue to serve them and minister to them.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As literally translated from the Aramaic text. The Greek text states, “If someone strikes you on one side of your jaw, offer the other side too.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If someone takes away your coat, give him as a gift your shirt as well.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When someone comes to beg from you, give to that person what you have. When things are wrongly taken from you, do not demand they be given back.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The way you want others to treat you is how you should treat everyone else.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you really showing true love by loving only those who love you? Even those who don’t know God will do that.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Are you really showing compassion when you do good deeds only to those who do good deeds to you? Even those who don’t know God will do that.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you lend money only to those you know will repay you, what credit is that to your character? Even those who don’t know God do that.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rather love your enemies and continue to treat them well. When you lend money, don’t despair
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is literally “Do not cut off the hope of man.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: if you are never paid back, for it is not lost. You will receive a rich reward and you will be known as true children of the Most High God, having his same nature. Be like your Father who is famous for his kindness to heal
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literal translation of the Aramaic text.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even the thankless and cruel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Overflow with mercy and compassion for others, just as your heavenly Father overflows with mercy and compassion for all.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judging Others
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Forsake the habit of criticizing and judging others, and you will not be criticized and judged in return. Don’t condemn others and you will not be condemned. Forgive over and over, and you will be forgiven over and over.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Give generously and generous gifts will be given back to you, shaken down to make room for more. Abundant gifts will pour out upon you with such an overflowing measure that it will run over the top! The measurement of your generosity becomes the measurement of your return.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jesus also quoted these proverbs: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What happens when a blind man pretends to guide another blind man? They both stumble into a ditch!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And how could the apprentice know more than his master, for only after he is fully qualified will he be at that level.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why do you focus on the flaw in someone else’s life and fail to notice the glaring flaws of your own life?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Why do you see a speck in your brother’s eye but fail to see the beam of wood sticking out of your own eye?”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How could you say to your friend, ‘Here, let me show you where you’re wrong,’ when you are guilty of even more than he? You are overly critical, splitting hairs and being a hypocrite! You must acknowledge your own blind spots and deal with them before you will be able to deal with the blind spot of your friend.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You hypocrite, why don’t you first remove the beam sticking out of your own eye? Then you can see clearly to remove the small speck out of your brother’s eye.” Jesus is teaching that our blind spots prevent us from accurately evaluating the needs of others.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fruit of Your Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You’ll never find choice fruit hanging on a bad, unhealthy tree. And rotten fruit doesn’t hang on a good, healthy tree.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Every tree will be revealed by the quality of fruit that it produces. You will never pick figs or grapes from thorn trees.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: People are known in this same way. Out of the virtue stored in their hearts, good and upright people will produce good fruit. Likewise, out of the evil hidden in their hearts, evil ones will produce what is evil. For the overflow of what has been stored in your heart will be seen by your fruit and will be heard in your words.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What good does it do for you to say I am your Lord and Master if you don’t put into practice what I teach you?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let me describe the one who truly follows me and does what I say:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He is like a man who chooses the right place to build a house and then lays a deep and secure foundation. When the storms and floods rage against that house, it continues to stand strong and unshaken through the tempest, for he built it wisely on the right foundation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the one who has heard my teaching and does not obey it is like a man who builds a house without laying any foundation at all. When the storms and floods rage against that house, it will immediately collapse and become a total loss.
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Which of these two builders will you be?
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This last question is an important summary implied in the context.
    marker-yv: yv-n
