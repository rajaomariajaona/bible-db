document_id: LUK.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Warns against Hypocrisy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: By now a crowd of many thousands had gathered around Jesus. So many people pushed to be near him, they began to trample one another.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus turned to his disciples and warned them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Beware of the hypocrisy of the Pharisees. It permeates everything they do and teach, like leaven.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic adds “serving their own interests.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everything hidden and covered up will soon be exposed. For the facade is falling down, and nothing will be kept secret for long.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whatever you have spoken in private will be public knowledge, and what you have whispered secretly behind closed doors will be broadcast far and wide for all to hear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen, my beloved friends, don’t fear those who may want to take your life but can do nothing more. It’s true that they may kill your body, but they have no power over your soul.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one you must fear is God, for he has both the power to take your life and the authority to cast your soul into hell.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is literally “the Valley of Hinnom.” This was a valley along the south side of Jerusalem where excrement and rubbish were burned continually. It became a Jewish metaphor for the place of eternal punishment.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yes, the only one you need to fear is God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is the value of your soul to God? Could your worth be defined by any amount of money? God doesn’t abandon or forget even the small sparrow he has made. How then could he forget or abandon you? What about the seemingly minor issues of your life? Do they matter to God? Of course they do! So you never need to worry, for you are more valuable to God than anything else in this world.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This translation has chosen to make explicit the figures of speech and metaphors of these verses. The literal Greek text reads “Do not five sparrows sell for two copper coins? Not one is overlooked before God. Indeed, the very hairs of your head are numbered. Stop fearing—you are more valuable than many sparrows.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I can assure you of this: If you freely declare in public that I am the Son of Man, the Messiah, then I will freely declare to all the angels of God that you are mine.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if you publicly pretend that you don’t know me, I will deny you before the angels of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone speaks evil of me, the Son of Man, that one can be forgiven. But if anyone speaks scornfully against the Holy Spirit, it will never be forgiven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And remember this: When people publicly accuse you'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text adds “in the synagogues.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and forcefully drag you before the religious leaders and authorities, do not be troubled. Don’t worry about defending yourself or how to answer their accusations.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simply be confident and allow the Spirit of Wisdom access to your heart, and in that very moment he will reveal what you are to say to them.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Condemns Greed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Just then someone spoke up from the crowd and said, “Master, you should compel my older brother to divide the family inheritance and give me my fair share!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the Jewish culture of that day, rabbis would be asked to mediate disputes such as this. However, the man did not want mediation but representation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My friend, who made me a judge or arbitrator over you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Speaking to the people, Jesus continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be alert and guard your heart from greed and from always wishing for what you don’t have. For your life can never be measured by the amount of things you possess.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus then gave them this illustration: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A wealthy land owner had a farm that produced bumper crops. Every year the harvest was so great it filled his barns to overflowing!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He thought, ‘What should I do now that every barn is full and I have nowhere else to store more?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I know what I’ll do! I’ll tear down the barns and build one massive barn to hold all my grain and goods.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then I can just sit back, surrounded with comfort and ease. I’ll enjoy life with no worries at all.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “God said to him, ‘What a fool you are to trust in your riches and not in me! This very night the messengers of death
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is simply “they.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will demand to take your life. Then who will get all the wealth you have stored up for yourself?’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The same thing will happen to all those who fill up their lives with everything but God.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Worry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus taught his disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen to me. Never let anxiety enter your hearts. Never worry about any of your needs, such as food or clothing.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For your life is infinitely more than just the food you eat or the clothing you wear.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take the carefree birds as your example. Do you ever see them worry? They neither grow their own food nor put it in a storehouse for later. Yet God takes care of every one of them, feeding each of them out of
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: the abundance of
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: his love and goodness. Isn’t your life more precious to God than a bird?
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be carefree in the care of God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Does worry add anything to your life? Can it add one more year, or even one day?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if worrying adds nothing, but actually subtracts from your life, why would you worry about God’s care of you?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Think about the lilies. They grow and become beautiful, not because they work hard or strive to clothe themselves. Yet not even Solomon, wearing his kingly garments of splendor, could be compared to a field of lilies.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If God can clothe the fields and meadows with grass and flowers, can he not clothe you as well, O struggling one with so many doubts?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Greek word means “little faiths.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I repeat: Don’t let worry enter your life. Live above the anxious cares about your personal needs.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: People everywhere seem to worry about making a living, but your heavenly Father knows your every need and will take care of you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As you passionately seek his kingdom, above all else, he will supply your needs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So don’t ever be afraid, dearest friends! Your loving Father joyously gives you his kingdom with all its promises!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now, go and sell what you have and give to those in need; you will be making deposits in your account in heaven, an account that will never be taken from you. Your gifts will become a secure and unfailing treasure, deposited in heaven forever.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Where you deposit your treasure, that is where you fix your thoughts—and your heart will long to be there also.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Be Ready
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be prepared for action
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is literally “Let your loins be girded and keep your lamps burning.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: at a moment’s notice.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Be like servants anticipating their master’s return from a wedding celebration. They are ready at a moment’s notice to unlock and open the door for him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What great joy is ahead for those who stay awake and wait for their Master’s return! He himself will become their servant and wait on them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He may appear at midnight or even later, but what great joy for the awakened ones whenever he comes!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Of course, if they knew ahead of time the hour of their master’s appearing, they would be alert, just as they would be ready if they knew ahead of time that a thief was coming to break into their house.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So keep being alert and ready at all times. For I promise you that the Son of Man will surprise you and appear
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word can also be translated “become.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: when you don’t expect him.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faithful Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: “Lord,” Peter asked, “does this apply only to the twelve of us, or is it for everyone else as well?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The Lord replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A master will delegate authority in his house to a trustworthy and thoughtful manager who understands his master’s desires. And the household manager will serve others what they need at exactly the right time.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-44
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whenever his master returns, he will find that his servant has served him well. I promise you, the master will reward him generously and he will be placed as an overseer of everything he owns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But what if that servant says in his heart, ‘My master delays his coming, and who knows when he will return?’ Because of the delay, the servant elevates himself and mistreats those in his master’s household. Instead of caring for the ones he was appointed to serve, he abuses the other servants, both men and women. He throws drunken parties for his friends and gives himself over to every pleasure.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Let me tell you what will happen to him. His master will suddenly return at a time that shocks him, and he will remove the abusive, selfish servant from his position of trust. The master will punish him and assign him a portion with the unbelievers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Every servant who knows what pleases his master yet does not make himself ready and refuses to put his master’s will to action will receive many punishing blows.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Every servant who does not know
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: his master’s will
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and unwittingly does what is wrong will receive a less severe punishment. For those who have received a greater revelation from their master are required a greater obedience. And those who have been entrusted with great responsibility will be held more responsible to their master.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Brings Fire to the Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have come to set the earth on fire, and how I wish it were already ablaze with
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: fiery passion for God!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe this fire that Jesus came to bring is judgment. But Jesus did not come to judge the world but to save it (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 3:17
