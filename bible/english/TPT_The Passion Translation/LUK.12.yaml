        text: There is an amazing play on words found in the Aramaic text. The word translated “hypocrites” is literally “accepter of faces.” The Aramaic states that the Pharisees looked at the “face” of the sky and the “faces” of men, living superficially, not seeing what was happening spiritually around them.
