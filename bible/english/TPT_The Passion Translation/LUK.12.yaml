document_id: LUK.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Warns against Hypocrisy
  - type: text
    content: By now a crowd of many thousands had gathered around Jesus. So many people pushed to be near him, they began to trample one another.
  - type: text
    content: 'Jesus turned to his disciples and warned them, '
  - type: text
    content: “Beware of the hypocrisy of the Pharisees. It permeates everything they do and teach, like leaven.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic adds “serving their own interests.”
  '10':
  - type: text
    content: If anyone speaks evil of me, the Son of Man, that one can be forgiven. But if anyone speaks scornfully against the Holy Spirit, it will never be forgiven.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And remember this: When people publicly accuse you'
  - type: text
    content: ' '
  - type: note
    content: The Greek text adds “in the synagogues.”
  - type: text
    content: and forcefully drag you before the religious leaders and authorities, do not be troubled. Don’t worry about defending yourself or how to answer their accusations.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Simply be confident and allow the Spirit of Wisdom access to your heart, and in that very moment he will reveal what you are to say to them.”
  - type: heading
    content: Jesus Condemns Greed
  '13':
  - type: text
    content: Just then someone spoke up from the crowd and said, “Master, you should compel my older brother to divide the family inheritance and give me my fair share!”
  '14':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: In the Jewish culture of that day, rabbis would be asked to mediate disputes such as this. However, the man did not want mediation but representation.
  - type: text
    content: “My friend, who made me a judge or arbitrator over you?”
  '15':
  - type: text
    content: 'Speaking to the people, Jesus continued, '
  - type: text
    content: “Be alert and guard your heart from greed and from always wishing for what you don’t have. For your life can never be measured by the amount of things you possess.”
  '16':
  - type: text
    content: 'Jesus then gave them this illustration: '
  - type: text
    content: “A wealthy land owner had a farm that produced bumper crops. Every year the harvest was so great it filled his barns to overflowing!
  - type: text
    content: ' '
  '17':
  - type: text
    content: He thought, ‘What should I do now that every barn is full and I have nowhere else to store more?
  - type: text
    content: ' '
  '18':
  - type: text
    content: I know what I’ll do! I’ll tear down the barns and build one massive barn to hold all my grain and goods.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Then I can just sit back, surrounded with comfort and ease. I’ll enjoy life with no worries at all.’
  '2':
  - type: text
    content: Everything hidden and covered up will soon be exposed. For the facade is falling down, and nothing will be kept secret for long.
  - type: text
    content: ' '
  '20':
  - type: text
    content: “God said to him, ‘What a fool you are to trust in your riches and not in me! This very night the messengers of death
  - type: text
    content: ' '
  - type: note
    content: The Greek text is simply “they.”
  - type: text
    content: will demand to take your life. Then who will get all the wealth you have stored up for yourself?’
  - type: text
    content: ' '
  '21':
  - type: text
    content: The same thing will happen to all those who fill up their lives with everything but God.”
  - type: heading
    content: Don’t Worry
  '22':
  - type: text
    content: 'Jesus taught his disciples, saying, '
  - type: text
    content: “Listen to me. Never let anxiety enter your hearts. Never worry about any of your needs, such as food or clothing.
  - type: text
    content: ' '
  '23':
  - type: text
    content: For your life is infinitely more than just the food you eat or the clothing you wear.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Take the carefree birds as your example. Do you ever see them worry? They neither grow their own food nor put it in a storehouse for later. Yet God takes care of every one of them, feeding each of them out of
  - type: text
    content: ' '
  - type: text
    content: the abundance of
  - type: text
    content: ' '
  - type: text
    content: his love and goodness. Isn’t your life more precious to God than a bird?
  - type: text
    content: ' '
  - type: text
    content: Be carefree in the care of God!
  '25':
  - type: text
    content: “Does worry add anything to your life? Can it add one more year, or even one day?
  - type: text
    content: ' '
  '26':
  - type: text
    content: So if worrying adds nothing, but actually subtracts from your life, why would you worry about God’s care of you?
  '27':
  - type: text
    content: “Think about the lilies. They grow and become beautiful, not because they work hard or strive to clothe themselves. Yet not even Solomon, wearing his kingly garments of splendor, could be compared to a field of lilies.
  - type: text
    content: ' '
  '28':
  - type: text
    content: If God can clothe the fields and meadows with grass and flowers, can he not clothe you as well, O struggling one with so many doubts?
  - type: text
    content: ' '
  - type: note
    content: This Greek word means “little faiths.”
  '29':
  - type: text
    content: 'I repeat: Don’t let worry enter your life. Live above the anxious cares about your personal needs.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Whatever you have spoken in private will be public knowledge, and what you have whispered secretly behind closed doors will be broadcast far and wide for all to hear.
  '30':
  - type: text
    content: People everywhere seem to worry about making a living, but your heavenly Father knows your every need and will take care of you.
  - type: text
    content: ' '
  '31':
  - type: text
    content: As you passionately seek his kingdom, above all else, he will supply your needs.
  - type: text
    content: ' '
  '32':
  - type: text
    content: So don’t ever be afraid, dearest friends! Your loving Father joyously gives you his kingdom with all its promises!
  '33':
  - type: text
    content: “Now, go and sell what you have and give to those in need; you will be making deposits in your account in heaven, an account that will never be taken from you. Your gifts will become a secure and unfailing treasure, deposited in heaven forever.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Where you deposit your treasure, that is where you fix your thoughts—and your heart will long to be there also.”
  - type: heading
    content: Be Ready
  '35':
  - type: text
    content: “Be prepared for action
  - type: text
    content: ' '
  - type: note
    content: The Greek is literally “Let your loins be girded and keep your lamps burning.”
  - type: text
    content: at a moment’s notice.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Be like servants anticipating their master’s return from a wedding celebration. They are ready at a moment’s notice to unlock and open the door for him.
  - type: text
    content: ' '
  '37':
  - type: text
    content: What great joy is ahead for those who stay awake and wait for their Master’s return! He himself will become their servant and wait on them.
  - type: text
    content: ' '
  '38':
  - type: text
    content: He may appear at midnight or even later, but what great joy for the awakened ones whenever he comes!
  - type: text
    content: ' '
  '39':
  - type: text
    content: Of course, if they knew ahead of time the hour of their master’s appearing, they would be alert, just as they would be ready if they knew ahead of time that a thief was coming to break into their house.
  - type: text
    content: ' '
  '4':
  - type: text
    content: “Listen, my beloved friends, don’t fear those who may want to take your life but can do nothing more. It’s true that they may kill your body, but they have no power over your soul.
  - type: text
    content: ' '
  '40':
  - type: text
    content: So keep being alert and ready at all times. For I promise you that the Son of Man will surprise you and appear
  - type: text
    content: ' '
  - type: note
    content: The Greek word can also be translated “become.”
  - type: text
    content: when you don’t expect him.”
  - type: heading
    content: The Faithful Servant
  '41':
  - type: text
    content: “Lord,” Peter asked, “does this apply only to the twelve of us, or is it for everyone else as well?”
  '42':
  - type: text
    content: 'The Lord replied, '
  - type: text
    content: “A master will delegate authority in his house to a trustworthy and thoughtful manager who understands his master’s desires. And the household manager will serve others what they need at exactly the right time.
  - type: text
    content: ' '
  '43':
  - type: text
    content: And whenever his master returns, he will find that his servant has served him well. I promise you, the master will reward him generously and he will be placed as an overseer of everything he owns.
  '45':
  - type: text
    content: “But what if that servant says in his heart, ‘My master delays his coming, and who knows when he will return?’ Because of the delay, the servant elevates himself and mistreats those in his master’s household. Instead of caring for the ones he was appointed to serve, he abuses the other servants, both men and women. He throws drunken parties for his friends and gives himself over to every pleasure.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Let me tell you what will happen to him. His master will suddenly return at a time that shocks him, and he will remove the abusive, selfish servant from his position of trust. The master will punish him and assign him a portion with the unbelievers.
  '47':
  - type: text
    content: “Every servant who knows what pleases his master yet does not make himself ready and refuses to put his master’s will to action will receive many punishing blows.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Every servant who does not know
  - type: text
    content: ' '
  - type: text
    content: his master’s will
  - type: text
    content: ' '
  - type: text
    content: and unwittingly does what is wrong will receive a less severe punishment. For those who have received a greater revelation from their master are required a greater obedience. And those who have been entrusted with great responsibility will be held more responsible to their master.”
  - type: heading
    content: Jesus Brings Fire to the Earth
  '49':
  - type: text
    content: “I have come to set the earth on fire, and how I wish it were already ablaze with
  - type: text
    content: ' '
  - type: text
    content: fiery passion for God!
  - type: text
    content: ' '
  - type: note
    content: Some scholars believe this fire that Jesus came to bring is judgment. But Jesus did not come to judge the world but to save it (John 3:17). He wished not for judgment but mercy to grip the hearts of God’s people. He interceded for those who crucified him.
  '5':
  - type: text
    content: The one you must fear is God, for he has both the power to take your life and the authority to cast your soul into hell.
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “the Valley of Hinnom.” This was a valley along the south side of Jerusalem where excrement and rubbish were burned continually. It became a Jewish metaphor for the place of eternal punishment.
  - type: text
    content: Yes, the only one you need to fear is God.
  '50':
  - type: text
    content: But first I must be immersed into the baptism
  - type: text
    content: ' '
  - type: text
    content: of God’s judgment,
  - type: text
    content: ' '
  - type: note
    content: The implication of the context is that Jesus was drawing closer to his time of experiencing God’s judgment for our sins on the cross. It is a “baptism” of judgment that we deserved.
  - type: text
    content: and I am consumed with passion as I await its fulfillment.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Don’t think for a moment that I came to grant peace and harmony to everyone. No, my arrival will change everything and create hostility among you.
  - type: text
    content: ' '
  '52':
  - type: text
    content: From now on, even family members will be divided over me and will choose sides
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “Among five in one house, three will be against two and two will be against three.”
  - type: text
    content: one against another.
  - type: text
    content: ' '
  '53':
  - type: text
    content: Fathers will be divided from sons and sons from fathers; mothers will be divided from daughters and daughters from mothers; mothers-in-law will be against brides and brides against mothers-in-law—all because of me.”
  - type: heading
    content: Discerning the Time
  '54':
  - type: text
    content: 'Jesus then said to the crowds gathered around him, '
  - type: text
    content: “When you see a cloud forming in the west, don’t you say, ‘A storm is brewing’? And then it arrives.
  - type: text
    content: ' '
  '55':
  - type: text
    content: And when you feel the south wind blowing, you say, ‘A heat wave is on the way.’ And so it happens.
  - type: text
    content: ' '
  '56':
  - type: text
    content: What hypocrites!
  - type: text
    content: ' '
  - type: note
    content: There is an amazing play on words found in the Aramaic text. The word translated “hypocrites” is literally “accepter of faces.” The Aramaic states that the Pharisees looked at the “face” of the sky and the “faces” of men, living superficially, not seeing what was happening spiritually around them.
  - type: text
    content: You are such experts at forecasting the weather, but you are totally unwilling to understand
  - type: text
    content: ' '
  - type: text
    content: the spiritual significance of
  - type: text
    content: ' '
  - type: text
    content: the time you’re living in.
  '57':
  - type: text
    content: “You can’t even judge for yourselves what is good and right.
  '58':
  - type: text
    content: “When you are guilty of wrong-doing, it is better to agree with your adversary and settle your dispute before you have to go before a judge. If not, your adversary may drag you into court, and the judge may find you guilty and
  - type: text
    content: ' '
  '59':
  - type: text
    content: throw you into prison until you have paid off your fine entirely.”
  '6':
  - type: text
    content: “What is the value of your soul to God? Could your worth be defined by any amount of money? God doesn’t abandon or forget even the small sparrow he has made. How then could he forget or abandon you? What about the seemingly minor issues of your life? Do they matter to God? Of course they do! So you never need to worry, for you are more valuable to God than anything else in this world.
  - type: note
    content: This translation has chosen to make explicit the figures of speech and metaphors of these verses. The literal Greek text reads “Do not five sparrows sell for two copper coins? Not one is overlooked before God. Indeed, the very hairs of your head are numbered. Stop fearing—you are more valuable than many sparrows.”
  '8':
  - type: text
    content: '“I can assure you of this: If you freely declare in public that I am the Son of Man, the Messiah, then I will freely declare to all the angels of God that you are mine.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: But if you publicly pretend that you don’t know me, I will deny you before the angels of God.
  - type: text
    content: ' '
