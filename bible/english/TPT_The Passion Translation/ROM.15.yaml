document_id: ROM.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love Is the Key to Unity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, those who are mature '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “powerful.”
    marker-yv: yv-n
  - type: text
    text: 'in their faith can easily be recognized, for they don’t live to please themselves but have learned to patiently embrace others in their immaturity. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “not just please themselves.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Our goal must be to empower others to do what is right and good for them, and to bring them into spiritual maturity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For not even '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the most powerful one of all
  - type: text
    text: ', the Anointed One, lived to please himself. His life fulfilled the Scripture that says:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: All the insults of those who insulted you fall upon me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:9
      metadata:
        usfm: PSA.69.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Whatever was written beforehand is meant to instruct us in how to live. The Scriptures impart to us encouragement and inspiration so that we can live in hope and endure all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now may God, the source of great endurance and comfort, grace you with unity among yourselves, which flows from your relationship with Jesus, the Anointed One. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “that you may value one another equally in Jesus, the Messiah.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then, with a unanimous rush of passion, you will with one voice glorify God, the Father of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You will bring God glory when you accept and welcome one another as partners, just as the Anointed One has fully accepted you and received you as his partner.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The God of Hope for Jews and Non-Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I am convinced that Jesus, the Messiah, was sent as a servant to the Jewish people '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a servant of the circumcision,” which is a figure of speech for the Jewish people.
    marker-yv: yv-n
  - type: text
    text: 'to fulfill the promises God made to our ancestors and to prove God’s faithfulness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And now, because of Jesus, the non-Jewish people of the world can glorify God for his kindness to them, fulfilling the prophecy of Scripture:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of this I will proclaim you among the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will hear me sing praises to your name.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 18:49
      metadata:
        usfm: PSA.18.49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And in another place it says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You who are not Jewish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celebrate life right alongside his Jewish people.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 32:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the Lord, all you who are not Jews,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and let all the people of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: raise their voices in praises to him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 117:1
      metadata:
        usfm: PSA.117.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Isaiah prophesied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“An heir to David’s throne '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “[a sprout from] the root of Jesse,” which is a Hebrew idiom for King David, the son of Jesse, who was promised to have an heir to his throne who would rule over not only Israel but all the nations.
    marker-yv: yv-n
  - type: text
    text: will emerge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will rise up as ruler
- type: usfm
  marker: q1
  children:
  - type: text
    text: over all the non-Jewish nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all their hopes will be met in him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “their hopes will be placed on him.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 11:10
      metadata:
        usfm: ISA.11.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now may God, the fountain of hope, fill you to overflowing with uncontainable joy and perfect peace as you trust in him. And may the power of the Holy Spirit continually surround your life with his super-abundance until you radiate with hope!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Ministry and His Plans
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'My dear brothers and sisters, I am fully convinced of your genuine spirituality. I know that each of you is stuffed full of God’s goodness, that you are richly supplied with all kinds of revelation-knowledge, and that you are empowered to effectively instruct '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “warn.”
    marker-yv: yv-n
  - type: text
    text: 'one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And because of the outpouring of God’s grace on my life to be his minister and to preach Jesus, the Anointed One, to the non-Jewish people, I have written rather boldly to you on some themes, reminding you of their importance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For this grace has made me a servant of the gospel of God, constantly doing the work of a priest, for I endeavor to present an acceptable offering to God; so that the non-Jewish people of the earth may be set apart and made holy by the Spirit of holiness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now then, it is through my union with Jesus Christ, that I enjoy an enthusiasm and confidence in my ministry for God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'And I will not be presumptuous to speak of anything except what Christ has accomplished through me. For many non-Jewish people are coming into faith’s obedience by the power of the Spirit of God, which is displayed through mighty signs and amazing wonders, both in word and deed. Starting from Jerusalem I went from place to place as far as the distant Roman province of Illyricum, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:18–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Illyricum (modern-day Croatia) was the Roman province that comprises parts of the western Balkan Peninsula. It is believed that Paul traveled over 10,000 miles throughout the Roman Empire establishing congregations.
    marker-yv: yv-n
  - type: text
    text: 'fully preaching the wonderful message of Christ. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:18–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The apostle Paul thoroughly preached the good news with much evidence that God was working through him. This resulted in many non-Jewish people coming to faith in Jesus Christ. The signs and wonders were a part of the message, validating Paul’s apostolic mandate to evangelize and plant churches.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'It is my honor and constant passion to be a pioneer who preaches where no one has ever even heard of the Anointed One, instead of building upon someone else’s foundation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'As the Scriptures say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who know nothing about him will clearly see him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those who have not heard will understand.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 52:15
      metadata:
        usfm: ISA.52.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Intention to Visit Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'My pursuit of this mission has prevented me many times from visiting you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'but there is now nothing left to keep me in these regions. So many years I have longed to come and be with you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So on my way to Spain I hope to visit you as I pass through Rome. And after I have enjoyed fellowship with you for a while, I hope that you would help me financially on my journey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But now I’m on my way to Jerusalem to encourage God’s people and minister to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I am pleased to inform you that the believers of Macedonia and Greece '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Achaia,” a region in western Greece.
    marker-yv: yv-n
  - type: text
    text: 'have made a generous contribution for the poor among the holy believers in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They were thrilled to have an opportunity to give back to the believers in Jerusalem. For indeed, they are deeply grateful for them and feel indebted because they brought them the gospel. Since the ethnic multitudes have shared in the spiritual wealth of the Jewish people, it is only right that the non-Jewish people share their material wealth with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So, when I have completed this act of worship and safely delivered the offering '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is actually “fruit.” Paul was delivering to them a “spiritual fruit basket.” It is an act of worship every time we consider the poor and serve others.
    marker-yv: yv-n
  - type: text
    text: 'to them in Jerusalem, I will set out for Spain and visit you on my way there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I am convinced that when I come to you, I will come packed full and loaded '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pleroma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is also used for a cargo ship packed full of people and goods.
    marker-yv: yv-n
  - type: text
    text: with the blessings of the Anointed One!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'That’s why I plead with you, because of our union with our Lord Jesus Christ, to be partners with me in your prayers to God. My dear brothers and sisters in the faith, with the love we share in the Holy Spirit, fight alongside me in prayer. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although Paul was an esteemed and powerful apostle of Jesus, he was not too proud to ask other believers to pray for him.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ask the Father to deliver me from the danger I face from the unbelievers in Judea. For I want to make sure that the contribution I carry for Jerusalem will be favorably received by God’s holy ones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then he will send me to you with great joy in the pleasure of God’s will, and I will be spiritually refreshed by your fellowship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And now may the God who gives us his peace and wholeness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “May the God who is peace be with you all.”
    marker-yv: yv-n
  - type: text
    text: be with you all. Yes, Lord, so let it be!
