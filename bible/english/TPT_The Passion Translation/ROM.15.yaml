document_id: ROM.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Love Is the Key to Unity
  - type: text
    content: 'Now, those who are mature '
  - type: note
    content: The Aramaic can be translated “powerful.”
  - type: text
    content: 'in their faith can easily be recognized, for they don’t live to please themselves but have learned to patiently embrace others in their immaturity. '
  - type: note
    content: Or “not just please themselves.”
  '10':
  - type: text
    content: 'And in another place it says:'
  - type: text
    content: “You who are not Jewish,
  - type: text
    content: celebrate life right alongside his Jewish people.”
  - type: note
    content: See Deut. 32:43.
  '11':
  - type: text
    content: 'And again:'
  - type: text
    content: Praise the Lord, all you who are not Jews,
  - type: text
    content: and let all the people of the earth
  - type: text
    content: raise their voices in praises to him.
  - type: note
    content: See Ps. 117:1.
  '12':
  - type: text
    content: 'And Isaiah prophesied:'
  - type: text
    content: '“An heir to David’s throne '
  - type: note
    content: Or “[a sprout from] the root of Jesse,” which is a Hebrew idiom for King David, the son of Jesse, who was promised to have an heir to his throne who would rule over not only Israel but all the nations.
  - type: text
    content: will emerge,
  - type: text
    content: and he will rise up as ruler
  - type: text
    content: over all the non-Jewish nations,
  - type: text
    content: for all their hopes will be met in him.”
  - type: note
    content: Or “their hopes will be placed on him.” See Isa. 11:10.
  '13':
  - type: text
    content: Now may God, the fountain of hope, fill you to overflowing with uncontainable joy and perfect peace as you trust in him. And may the power of the Holy Spirit continually surround your life with his super-abundance until you radiate with hope!
  - type: heading
    content: Paul’s Ministry and His Plans
  '14':
  - type: text
    content: 'My dear brothers and sisters, I am fully convinced of your genuine spirituality. I know that each of you is stuffed full of God’s goodness, that you are richly supplied with all kinds of revelation-knowledge, and that you are empowered to effectively instruct '
  - type: note
    content: Or “warn.”
  - type: text
    content: 'one another. '
  '15':
  - type: text
    content: 'And because of the outpouring of God’s grace on my life to be his minister and to preach Jesus, the Anointed One, to the non-Jewish people, I have written rather boldly to you on some themes, reminding you of their importance. '
  '16':
  - type: text
    content: For this grace has made me a servant of the gospel of God, constantly doing the work of a priest, for I endeavor to present an acceptable offering to God; so that the non-Jewish people of the earth may be set apart and made holy by the Spirit of holiness.
  '17':
  - type: text
    content: 'Now then, it is through my union with Jesus Christ, that I enjoy an enthusiasm and confidence in my ministry for God. '
  '18':
  - type: text
    content: 'And I will not be presumptuous to speak of anything except what Christ has accomplished through me. For many non-Jewish people are coming into faith’s obedience by the power of the Spirit of God, which is displayed through mighty signs and amazing wonders, both in word and deed. Starting from Jerusalem I went from place to place as far as the distant Roman province of Illyricum, '
  - type: note
    content: Illyricum (modern-day Croatia) was the Roman province that comprises parts of the western Balkan Peninsula. It is believed that Paul traveled over 10,000 miles throughout the Roman Empire establishing congregations.
  - type: text
    content: 'fully preaching the wonderful message of Christ. '
  - type: note
    content: The apostle Paul thoroughly preached the good news with much evidence that God was working through him. This resulted in many non-Jewish people coming to faith in Jesus Christ. The signs and wonders were a part of the message, validating Paul’s apostolic mandate to evangelize and plant churches.
  '2':
  - type: text
    content: 'Our goal must be to empower others to do what is right and good for them, and to bring them into spiritual maturity. '
  '20':
  - type: text
    content: 'It is my honor and constant passion to be a pioneer who preaches where no one has ever even heard of the Anointed One, instead of building upon someone else’s foundation. '
  '21':
  - type: text
    content: 'As the Scriptures say:'
  - type: text
    content: Those who know nothing about him will clearly see him,
  - type: text
    content: and those who have not heard will understand.
  - type: note
    content: See Isa. 52:15.
  - type: heading
    content: Paul’s Intention to Visit Rome
  '22':
  - type: text
    content: 'My pursuit of this mission has prevented me many times from visiting you, '
  '23':
  - type: text
    content: 'but there is now nothing left to keep me in these regions. So many years I have longed to come and be with you! '
  '24':
  - type: text
    content: 'So on my way to Spain I hope to visit you as I pass through Rome. And after I have enjoyed fellowship with you for a while, I hope that you would help me financially on my journey. '
  '25':
  - type: text
    content: But now I’m on my way to Jerusalem to encourage God’s people and minister to them.
  '26':
  - type: text
    content: 'I am pleased to inform you that the believers of Macedonia and Greece '
  - type: note
    content: Or “Achaia,” a region in western Greece.
  - type: text
    content: 'have made a generous contribution for the poor among the holy believers in Jerusalem. '
  '27':
  - type: text
    content: They were thrilled to have an opportunity to give back to the believers in Jerusalem. For indeed, they are deeply grateful for them and feel indebted because they brought them the gospel. Since the ethnic multitudes have shared in the spiritual wealth of the Jewish people, it is only right that the non-Jewish people share their material wealth with them.
  '28':
  - type: text
    content: 'So, when I have completed this act of worship and safely delivered the offering '
  - type: note
    content: The Greek word is actually “fruit.” Paul was delivering to them a “spiritual fruit basket.” It is an act of worship every time we consider the poor and serve others.
  - type: text
    content: 'to them in Jerusalem, I will set out for Spain and visit you on my way there. '
  '29':
  - type: text
    content: 'I am convinced that when I come to you, I will come packed full and loaded '
  - type: note
    content: The Greek word pleroma is also used for a cargo ship packed full of people and goods.
  - type: text
    content: with the blessings of the Anointed One!
  '3':
  - type: text
    content: 'For not even '
  - type: text
    content: the most powerful one of all
  - type: text
    content: ', the Anointed One, lived to please himself. His life fulfilled the Scripture that says:'
  - type: text
    content: All the insults of those who insulted you fall upon me.
  - type: note
    content: See Ps. 69:9.
  '30':
  - type: text
    content: 'That’s why I plead with you, because of our union with our Lord Jesus Christ, to be partners with me in your prayers to God. My dear brothers and sisters in the faith, with the love we share in the Holy Spirit, fight alongside me in prayer. '
  - type: note
    content: Although Paul was an esteemed and powerful apostle of Jesus, he was not too proud to ask other believers to pray for him.
  '31':
  - type: text
    content: 'Ask the Father to deliver me from the danger I face from the unbelievers in Judea. For I want to make sure that the contribution I carry for Jerusalem will be favorably received by God’s holy ones. '
  '32':
  - type: text
    content: Then he will send me to you with great joy in the pleasure of God’s will, and I will be spiritually refreshed by your fellowship.
  '33':
  - type: text
    content: 'And now may the God who gives us his peace and wholeness '
  - type: note
    content: Or “May the God who is peace be with you all.”
  - type: text
    content: be with you all. Yes, Lord, so let it be!
  '4':
  - type: text
    content: Whatever was written beforehand is meant to instruct us in how to live. The Scriptures impart to us encouragement and inspiration so that we can live in hope and endure all things.
  '5':
  - type: text
    content: 'Now may God, the source of great endurance and comfort, grace you with unity among yourselves, which flows from your relationship with Jesus, the Anointed One. '
  - type: note
    content: The Aramaic can be translated “that you may value one another equally in Jesus, the Messiah.”
  '6':
  - type: text
    content: 'Then, with a unanimous rush of passion, you will with one voice glorify God, the Father of our Lord Jesus Christ. '
  '7':
  - type: text
    content: You will bring God glory when you accept and welcome one another as partners, just as the Anointed One has fully accepted you and received you as his partner.
  - type: heading
    content: The God of Hope for Jews and Non-Jews
  '8':
  - type: text
    content: 'I am convinced that Jesus, the Messiah, was sent as a servant to the Jewish people '
  - type: note
    content: Or “a servant of the circumcision,” which is a figure of speech for the Jewish people.
  - type: text
    content: 'to fulfill the promises God made to our ancestors and to prove God’s faithfulness. '
  '9':
  - type: text
    content: 'And now, because of Jesus, the non-Jewish people of the world can glorify God for his kindness to them, fulfilling the prophecy of Scripture:'
  - type: text
    content: Because of this I will proclaim you among the nations
  - type: text
    content: and they will hear me sing praises to your name.
  - type: note
    content: See Ps. 18:49.
