document_id: 1CO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love, the Motivation of Our Lives
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'If I were to speak with eloquence in earth’s many languages, and in the heavenly tongues of angels, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication is that the angels speak a distinct language among themselves that is not known on earth.
    marker-yv: yv-n
  - type: text
    text: 'yet I didn’t express myself with love, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for love is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hooba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and it is a homonym that also means “to set on fire.” It is difficult to fully express the meaning of this word and translate it into English. You could say the Aramaic concept is “burning love” or “fiery love,” coming from the inner depths of the heart as an eternal energy, an active power of bonding hearts and lives in secure relationships. The Greek word is'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: agapē
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which describes the highest form of love. It is the love God has for his people. It is an intense affection that must be demonstrated. It is a loyal, endless, and unconditional commitment of love. Feelings are attached to this love. It is not abstract, but devoted to demonstrating the inward feelings of love toward another with acts of kindness and benevolence.'
    marker-yv: yv-n
  - type: text
    text: my words would be reduced to the hollow sound of nothing more than a clanging cymbal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And if I were to have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the gift of
  - type: text
    text: ' prophecy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “prophetic powers.”
    marker-yv: yv-n
  - type: text
    text: 'with a profound understanding of God’s hidden secrets, and if I possessed unending supernatural knowledge, and if I had the greatest gift of faith that could move mountains, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek present infinitive indicates a continuous aspect, which means a faith to keep on removing mountains or to remove one mountain after another.
    marker-yv: yv-n
  - type: text
    text: but have never learned to love, then I am nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And if I were to be so generous as to give away everything I owned to feed the poor, and to offer my body to be burned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as a martyr
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used here is a homonym that can mean either “to burn” or “to boast.” Because of this, some Greek manuscripts have “I offer my body in order to boast [glory].”
    marker-yv: yv-n
  - type: text
    text: without the pure motive of love, I would gain nothing of value.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Love is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: large and
  - type: text
    text: ' incredibly patient. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Love patiently endures mistreatment” could mean that love is incredibly patient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even in difficult relationships
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Aramaic can be translated “Love transforms the spirit.”
    marker-yv: yv-n
  - type: text
    text: 'Love is gentle and consistently kind to all. It refuses to be jealous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “boil with jealousy.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: when blessing comes to someone else
  - type: text
    text: '. Love does not brag about one’s achievements nor inflate its own importance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Love does not traffic in shame and disrespect, nor selfishly seek its own honor. Love is not easily irritated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “overly sensitive” (having sharp edges).
    marker-yv: yv-n
  - type: text
    text: 'or quick to take offense. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “resentful” or “does not keep score.” The Aramaic can be translated “Love does not stare at evil.” Love will overlook offenses and remain focused on what is good, refusing to hold resentment in our hearts.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Love joyfully celebrates honesty '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “reality” (or “truth”).
    marker-yv: yv-n
  - type: text
    text: 'and finds no delight in what is wrong. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “injustice” or “unrighteousness.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Love is a safe place of shelter, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Love bears all things.” Although commonly understood to mean that love can bear hardships of any kind, the nominalized form of the verb (
    - type: usfm
      marker: it
      children:
      - type: text
        text: stego
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is actually the word for “roof” found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 2:4
      metadata:
        usfm: MRK.2.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Paul is saying that love covers all things, like a roof covers the house. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 4:8
      metadata:
        usfm: 1PE.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Love does not focus on what is wrong but will bear with the shortcomings of others. And like a roof protects and shields, you could say that love springs no leak. It is a safe place that offers shelter, not exposure.
    marker-yv: yv-n
  - type: text
    text: 'for it never stops believing the best for others. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “it never loses faith.”
    marker-yv: yv-n
  - type: text
    text: Love never takes failure as defeat, for it never gives up.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perfect Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Love never stops loving. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Love never, not even once, fails [lapses]” or “Love never falls down” (it keeps going higher).
    marker-yv: yv-n
  - type: text
    text: 'It extends beyond the gift of prophecy, which eventually fades away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “prophecy comes to pass.”
    marker-yv: yv-n
  - type: text
    text: 'It is more enduring than tongues, which will one day fall silent. Love remains long after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: words of
  - type: text
    text: ' knowledge are forgotten. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the gift of the word of knowledge (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 12:8
      metadata:
        usfm: 1CO.12.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Knowledge itself will not pass away or be set aside, for we will learn of God’s mercies throughout eternity. This is the gifts of knowledge Paul refers to.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Our present knowledge and our prophecies are but partial, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in fragments.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but when love’s perfection arrives, the partial will fade away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perfect love diminishes the importance of prophecy and tongues. Paul could be saying that they will cease being important when compared with perfect love. That which is perfect is love and is greater than the gifts. Perfect love puts everything else in second place, for God is love. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 John 4:8
      metadata:
        usfm: 1JN.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: 1JN.4.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Paul is contrasting spiritual gifts with love, saying, “Gifts will fail, but love will never fail.” Like leaves falling to the ground, something greater will one day take their place: the love of God.'
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When I was a child, I spoke about childish matters, for I saw things like a child and reasoned like a child. But the day came when I matured, and I set aside my childish ways.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For now we see but a faint reflection of riddles and mysteries '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ainigma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: used here is equal to our English word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enigma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'as though reflected in a mirror, but one day we will see face-to-face. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is referring to God speaking to Moses “face-to-face” (Hebrew “mouth-to-mouth”), and not using dreams and figures of speech (
    - type: text
      text: Num. 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Transforming love will bring us all face-to-face, mouth-to-mouth with God.
    marker-yv: yv-n
  - type: text
    text: 'My understanding is incomplete now, but one day I will understand everything, just as everything about me has been fully understood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Until then, there are three things that remain: faith, hope, and love—yet love surpasses them all. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Faith and hope both spring from love, which makes love the greatest virtue of all. Faith and hope are temporary, but love is eternal. Paul gives us ten characteristics of divine love in this chapter. Love (1) is patient under stress, (2) is kind at all times, (3) is generous, not envious, (4) is humble, not self-promoting, (5) is never rude, (6) does not manipulate by using shame, (7) is not irritable or easily offended, (8) celebrates honesty, (9) does not focus on what is flawed, and (10) is loyal to the end.
    marker-yv: yv-n
  - type: text
    text: So above all else, let love be the beautiful prize for which you run.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Unfortunately, there is a chapter break before this line. Chapter headings are not part of the inspired text. This translation has chosen to insert the partial text of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:1
      metadata:
        usfm: 1CO.14.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here in conclusion to Paul’s masterful treatise on love.
    marker-yv: yv-n
