document_id: 1CO.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Love, the Motivation of Our Lives
  - type: text
    content: 'If I were to speak with eloquence in earth’s many languages, and in the heavenly tongues of angels, '
  - type: note
    content: The implication is that the angels speak a distinct language among themselves that is not known on earth.
  - type: text
    content: 'yet I didn’t express myself with love, '
  - type: note
    content: The Aramaic word for love is hooba, and it is a homonym that also means “to set on fire.” It is difficult to fully express the meaning of this word and translate it into English. You could say the Aramaic concept is “burning love” or “fiery love,” coming from the inner depths of the heart as an eternal energy, an active power of bonding hearts and lives in secure relationships. The Greek word is agapē, which describes the highest form of love. It is the love God has for his people. It is an intense affection that must be demonstrated. It is a loyal, endless, and unconditional commitment of love. Feelings are attached to this love. It is not abstract, but devoted to demonstrating the inward feelings of love toward another with acts of kindness and benevolence.
  - type: text
    content: my words would be reduced to the hollow sound of nothing more than a clanging cymbal.
  '10':
  - type: text
    content: 'but when love’s perfection arrives, the partial will fade away. '
  - type: note
    content: 'Perfect love diminishes the importance of prophecy and tongues. Paul could be saying that they will cease being important when compared with perfect love. That which is perfect is love and is greater than the gifts. Perfect love puts everything else in second place, for God is love. See 1 John 4:8, 18. Paul is contrasting spiritual gifts with love, saying, “Gifts will fail, but love will never fail.” Like leaves falling to the ground, something greater will one day take their place: the love of God.'
  '11':
  - type: text
    content: When I was a child, I spoke about childish matters, for I saw things like a child and reasoned like a child. But the day came when I matured, and I set aside my childish ways.
  '12':
  - type: text
    content: 'For now we see but a faint reflection of riddles and mysteries '
  - type: note
    content: The Greek word ainigma used here is equal to our English word enigma.
  - type: text
    content: 'as though reflected in a mirror, but one day we will see face-to-face. '
  - type: note
    content: Paul is referring to God speaking to Moses “face-to-face” (Hebrew “mouth-to-mouth”), and not using dreams and figures of speech (Num. 12:8). Transforming love will bring us all face-to-face, mouth-to-mouth with God.
  - type: text
    content: 'My understanding is incomplete now, but one day I will understand everything, just as everything about me has been fully understood. '
  '13':
  - type: text
    content: 'Until then, there are three things that remain: faith, hope, and love—yet love surpasses them all. '
  - type: note
    content: Faith and hope both spring from love, which makes love the greatest virtue of all. Faith and hope are temporary, but love is eternal. Paul gives us ten characteristics of divine love in this chapter. Love (1) is patient under stress, (2) is kind at all times, (3) is generous, not envious, (4) is humble, not self-promoting, (5) is never rude, (6) does not manipulate by using shame, (7) is not irritable or easily offended, (8) celebrates honesty, (9) does not focus on what is flawed, and (10) is loyal to the end.
  - type: text
    content: So above all else, let love be the beautiful prize for which you run.
  - type: note
    content: Unfortunately, there is a chapter break before this line. Chapter headings are not part of the inspired text. This translation has chosen to insert the partial text of 14:1 here in conclusion to Paul’s masterful treatise on love.
  '2':
  - type: text
    content: 'And if I were to have '
  - type: text
    content: the gift of
  - type: text
    content: ' prophecy '
  - type: note
    content: Or “prophetic powers.”
  - type: text
    content: 'with a profound understanding of God’s hidden secrets, and if I possessed unending supernatural knowledge, and if I had the greatest gift of faith that could move mountains, '
  - type: note
    content: The Greek present infinitive indicates a continuous aspect, which means a faith to keep on removing mountains or to remove one mountain after another.
  - type: text
    content: but have never learned to love, then I am nothing.
  '3':
  - type: text
    content: 'And if I were to be so generous as to give away everything I owned to feed the poor, and to offer my body to be burned '
  - type: text
    content: as a martyr
  - type: text
    content: ', '
  - type: note
    content: The Aramaic word used here is a homonym that can mean either “to burn” or “to boast.” Because of this, some Greek manuscripts have “I offer my body in order to boast [glory].”
  - type: text
    content: without the pure motive of love, I would gain nothing of value.
  '4':
  - type: text
    content: 'Love is '
  - type: text
    content: large and
  - type: text
    content: ' incredibly patient. '
  - type: note
    content: Or “Love patiently endures mistreatment” could mean that love is incredibly patient even in difficult relationships. The Aramaic can be translated “Love transforms the spirit.”
  - type: text
    content: 'Love is gentle and consistently kind to all. It refuses to be jealous '
  - type: note
    content: Or “boil with jealousy.”
  - type: text
    content: when blessing comes to someone else
  - type: text
    content: '. Love does not brag about one’s achievements nor inflate its own importance. '
  '5':
  - type: text
    content: 'Love does not traffic in shame and disrespect, nor selfishly seek its own honor. Love is not easily irritated '
  - type: note
    content: Or “overly sensitive” (having sharp edges).
  - type: text
    content: 'or quick to take offense. '
  - type: note
    content: Or “resentful” or “does not keep score.” The Aramaic can be translated “Love does not stare at evil.” Love will overlook offenses and remain focused on what is good, refusing to hold resentment in our hearts.
  '6':
  - type: text
    content: 'Love joyfully celebrates honesty '
  - type: note
    content: Or “reality” (or “truth”).
  - type: text
    content: 'and finds no delight in what is wrong. '
  - type: note
    content: Or “injustice” or “unrighteousness.”
  '7':
  - type: text
    content: 'Love is a safe place of shelter, '
  - type: note
    content: Or “Love bears all things.” Although commonly understood to mean that love can bear hardships of any kind, the nominalized form of the verb (stego) is actually the word for “roof” found in Mark 2:4. Paul is saying that love covers all things, like a roof covers the house. See 1 Peter 4:8. Love does not focus on what is wrong but will bear with the shortcomings of others. And like a roof protects and shields, you could say that love springs no leak. It is a safe place that offers shelter, not exposure.
  - type: text
    content: 'for it never stops believing the best for others. '
  - type: note
    content: Or “it never loses faith.”
  - type: text
    content: Love never takes failure as defeat, for it never gives up.
  - type: heading
    content: Perfect Love
  '8':
  - type: text
    content: 'Love never stops loving. '
  - type: note
    content: Or “Love never, not even once, fails [lapses]” or “Love never falls down” (it keeps going higher).
  - type: text
    content: 'It extends beyond the gift of prophecy, which eventually fades away. '
  - type: note
    content: The Aramaic can be translated “prophecy comes to pass.”
  - type: text
    content: 'It is more enduring than tongues, which will one day fall silent. Love remains long after '
  - type: text
    content: words of
  - type: text
    content: ' knowledge are forgotten. '
  - type: note
    content: That is, the gift of the word of knowledge (1 Cor. 12:8). Knowledge itself will not pass away or be set aside, for we will learn of God’s mercies throughout eternity. This is the gifts of knowledge Paul refers to.
  '9':
  - type: text
    content: 'Our present knowledge and our prophecies are but partial, '
  - type: note
    content: Or “in fragments.”
