document_id: EPH.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Introduction
  - type: text
    content: Dear friends
  - type: text
    content: ','
  - type: text
    content: My name is
  - type: text
    content: ' Paul, and I was chosen by God to be an apostle of Jesus, the Messiah. '
  '10':
  - type: text
    content: 'And because of God’s unfailing purpose, this detailed plan will reign supreme through every period of time until the fulfillment of all the ages finally reaches its climax—when God makes all things new '
  - type: note
    content: As translated from the Aramaic. The Greek text states “God will gather together all things in fulfillment in Christ.” That is, God will unite all things under the headship of Christ.
  - type: text
    content: in all of heaven and earth through Jesus Christ.
  '11':
  - type: text
    content: 'Through our union with Christ we too have been claimed by God as his own inheritance. '
  - type: note
    content: The Greek construction of this phrase can mean either that God appointed us (Gr. klēroō, chosen by casting lots) to be his inheritance, or that we have been appointed an inheritance.
  - type: text
    content: 'Before we were even born, he gave us our destiny; '
  - type: note
    content: Or “estate.”
  - type: text
    content: 'that we would fulfill the plan of God who always accomplishes every purpose and plan in his heart. '
  '12':
  - type: text
    content: 'God’s purpose was that we '
  - type: text
    content: Jews
  - type: text
    content: ', who were the first to long for the messianic hope, would be the first to believe in the Anointed One and bring great praise and glory to God!'
  '13':
  - type: text
    content: 'And because of him, when you '
  - type: text
    content: who are not Jews
  - type: text
    content: ' heard the revelation '
  - type: note
    content: The Greek text is logos or “word of God.”
  - type: text
    content: of truth, you believed in the wonderful news of salvation. Now we have been stamped with the seal of the promised Holy Spirit.
  - type: note
    content: Some Aramaic manuscripts add here “who was announced by the angels.”
  '14':
  - type: text
    content: 'He is given to us like an engagement ring, '
  - type: note
    content: The Greek word used here can be translated “pledge,” “down payment” or “engagement ring.”
  - type: text
    content: 'as the first installment of what’s coming! He is our hope-promise of a future inheritance '
  - type: note
    content: The Aramaic word used for “inheritance” can also be translated “dividend.”
  - type: text
    content: which seals us until we have all of redemption’s promises and experience complete freedom—all for the supreme glory and honor of God!
  - type: heading
    content: Paul Prays for the Spirit of Wisdom and Revelation
  '15':
  - type: text
    content: 'Because of this, since I first heard about your strong faith in the Lord Jesus Christ and your tender love toward all his devoted ones, '
  '16':
  - type: text
    content: 'my heart is always full and overflowing with thanks to God for you as I constantly remember you in my prayers. '
  - type: note
    content: The literal Aramaic text can be translated “I began confessing on your behalf and praying.”
  '17':
  - type: text
    content: 'I pray that the Father of glory, the God of our Lord Jesus Christ, would impart to you the riches of the Spirit of wisdom and the Spirit of revelation '
  - type: note
    content: Or “discovery.”
  - type: text
    content: to know him through your deepening intimacy with him.
  '18':
  - type: text
    content: 'I pray that the light of God will illuminate the eyes of your imagination, '
  - type: note
    content: Or “innermost” (heart).
  - type: text
    content: 'flooding you with light, until you experience the full revelation of the hope of his calling '
  - type: note
    content: Or “to which he is calling you.”
  - type: text
    content: —that is, the wealth of God’s glorious inheritances that he finds in us, his holy ones!
  '19':
  - type: text
    content: 'I pray that you will continually experience the immeasurable greatness of God’s power made available to you through faith. Then your lives will be an advertisement of this immense power as it works through you! This is the mighty power '
  '2':
  - type: text
    content: 'I’m writing this letter to all the devoted believers '
  - type: note
    content: Recent manuscripts add the words “those who are in Ephesus.” The oldest manuscripts have “to the Ephesians” written in the margin. This would reinforce the theory that it is meant to be read and distributed to all the churches. Although the book bears the name “Ephesians,” some scholars believe that this letter could be the missing letter to the Laodiceans mentioned in Col. 4:16. Regardless, Ephesians contains crucial truths for believers worldwide.
  - type: text
    content: 'who have been made holy '
  - type: note
    content: Or “to the saints [holy ones] and the faithful in Christ Jesus.” Notice that God is the one who makes us holy, but our response is to be “faithful” (or “devoted”).
  - type: text
    content: by being one with Jesus, the Anointed One.
  - type: text
    content: 'May God himself, the heavenly Father of our Lord Jesus Christ, release grace over you and impart total well-being '
  - type: note
    content: Or “peace.” The Hebrew concept of peace means much more than tranquility.
  - type: text
    content: into your lives.
  - type: heading
    content: Our Sonship and the Father’s Plan
  '20':
  - type: text
    content: 'that was released when God raised Christ from the dead and exalted him '
  - type: note
    content: Or “he seated him” (enthroned).
  - type: text
    content: 'to the place of highest honor and supreme authority '
  - type: note
    content: Or “at his right hand,” a metaphor for the place of honor and authority.
  - type: text
    content: 'in the heavenly realm! '
  '21':
  - type: text
    content: 'And now he is exalted as first above every ruler, authority, government, and realm of power in existence! He is gloriously enthroned over every name that is ever praised, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'not only in this age, '
  - type: note
    content: The Aramaic word can be translated “universe.”
  - type: text
    content: but in the age that is coming!
  - type: note
    content: As translated from the Aramaic.
  '22':
  - type: text
    content: 'And he alone is the leader and source of everything needed in the church. God has put everything beneath the authority of Jesus Christ '
  - type: note
    content: Both Greek and Aramaic texts use the figure of speech “under his feet,” which means he has conquered, subdued, and now rules over them.
  - type: text
    content: and has given him the highest rank above all others
  - type: text
    content: '. '
  '23':
  - type: text
    content: And now we, his church, are his body on the earth and that which fills him who is being filled by it!
  - type: note
    content: That is, as we are those who are filled (completed) by Christ, we also complete (fill) him. What a wonderful and humbling mystery is revealed by this verse.
  '3':
  - type: text
    content: 'Every spiritual blessing in the heavenly realm has already been lavished upon us as a love gift from our wonderful heavenly Father, the Father of our Lord Jesus—all because he sees us wrapped into Christ. This is why we celebrate him '
  - type: note
    content: Or “bless” (or “blessed be God”).
  - type: text
    content: with all our hearts!
  '4':
  - type: text
    content: 'And in love he chose us before he laid the foundation of the universe! '
  - type: note
    content: There is an alternate Greek translation of the unique wording of this verse that could be translated “He chose us to be a ‘word’ before the fall of the world.” The Greek word for “chose” is eklegomai, which is a form of lego (speak). The word for “fall” (Adam’s fall) is kataboles, which can mean “falling down,” but is usually translated as “foundation” (of the world).
  - type: text
    content: Because of his great love, he ordained us, so that we would be seen as holy in his eyes with an unstained innocence.
  '5':
  - type: text
    content: 'For it was always in his perfect plan '
  - type: note
    content: Or “He marked out our horizon [destiny] beforehand.”
  - type: text
    content: 'to adopt '
  - type: note
    content: The Aramaic reads “to establish us.”
  - type: text
    content: 'us as his delightful children, through our union with Jesus, the Anointed One, so that his tremendous love that cascades over us would glorify his grace '
  - type: note
    content: Or “to praise upon praise of the glory of his grace.”
  - type: text
    content: —for the same love he has for the Beloved, Jesus, he has for us. And this unfolding plan brings him great pleasure!
  '7':
  - type: text
    content: 'Since we are now joined to Christ, we have been given the treasures of redemption by his blood—the total cancellation '
  - type: note
    content: Or “forgiveness.” The Greek word aphesis means “to send away” or “to set free” (from bondage).
  - type: text
    content: 'of our sins—all because of the cascading riches '
  - type: note
    content: The Greek word for “riches” (ploutos) is also used to describe God’s wisdom and knowledge in Rom. 11:33. Just as God is all-knowing and has all-wisdom, so he has untold riches of grace available for his children.
  - type: text
    content: 'of his grace. '
  '8':
  - type: text
    content: 'This '
  - type: text
    content: superabundant
  - type: text
    content: ' grace is already powerfully working in us, '
  - type: note
    content: Or “lavished on us.”
  - type: text
    content: 'releasing all forms of wisdom and practical understanding. '
  '9':
  - type: text
    content: 'And through the revelation of the Anointed One, he unveiled his secret desires to us—the hidden mystery of his long-range plan, which he was delighted to implement from the very beginning of time. '
