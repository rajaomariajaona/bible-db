segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Dear friends
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: My name is
  - type: text
    text: ' Paul, and I was chosen by God to be an apostle of Jesus, the Messiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I’m writing this letter to all the devoted believers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Recent manuscripts add the words “those who are in Ephesus.” The oldest manuscripts have “to the Ephesians” written in the margin. This would reinforce the theory that it is meant to be read and distributed to all the churches. Although the book bears the name “Ephesians,” some scholars believe that this letter could be the missing letter to the Laodiceans mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 4:16
      metadata:
        usfm: COL.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Regardless, Ephesians contains crucial truths for believers worldwide.
    marker-yv: yv-n
  - type: text
    text: 'who have been made holy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to the saints [holy ones] and the faithful in Christ Jesus.” Notice that God is the one who makes us holy, but our response is to be “faithful” (or “devoted”).
    marker-yv: yv-n
  - type: text
    text: by being one with Jesus, the Anointed One.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'May God himself, the heavenly Father of our Lord Jesus Christ, release grace over you and impart total well-being '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “peace.” The Hebrew concept of peace means much more than tranquility.
    marker-yv: yv-n
  - type: text
    text: into your lives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Sonship and the Father’s Plan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Every spiritual blessing in the heavenly realm has already been lavished upon us as a love gift from our wonderful heavenly Father, the Father of our Lord Jesus—all because he sees us wrapped into Christ. This is why we celebrate him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “bless” (or “blessed be God”).
    marker-yv: yv-n
  - type: text
    text: with all our hearts!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And in love he chose us before he laid the foundation of the universe! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an alternate Greek translation of the unique wording of this verse that could be translated “He chose us to be a ‘word’ before the fall of the world.” The Greek word for “chose” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eklegomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is a form of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lego
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (speak). The word for “fall” (Adam’s fall) is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kataboles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which can mean “falling down,” but is usually translated as “foundation” (of the world).'
    marker-yv: yv-n
  - type: text
    text: Because of his great love, he ordained us, so that we would be seen as holy in his eyes with an unstained innocence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'For it was always in his perfect plan '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He marked out our horizon [destiny] beforehand.”
    marker-yv: yv-n
  - type: text
    text: 'to adopt '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “to establish us.”
    marker-yv: yv-n
  - type: text
    text: 'us as his delightful children, through our union with Jesus, the Anointed One, so that his tremendous love that cascades over us would glorify his grace '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to praise upon praise of the glory of his grace.”
    marker-yv: yv-n
  - type: text
    text: —for the same love he has for the Beloved, Jesus, he has for us. And this unfolding plan brings him great pleasure!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Since we are now joined to Christ, we have been given the treasures of redemption by his blood—the total cancellation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “forgiveness.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aphesis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to send away” or “to set free” (from bondage).
    marker-yv: yv-n
  - type: text
    text: 'of our sins—all because of the cascading riches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “riches” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ploutos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is also used to describe God’s wisdom and knowledge in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 11:33
      metadata:
        usfm: ROM.11.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Just as God is all-knowing and has all-wisdom, so he has untold riches of grace available for his children.
    marker-yv: yv-n
  - type: text
    text: 'of his grace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: superabundant
  - type: text
    text: ' grace is already powerfully working in us, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lavished on us.”
    marker-yv: yv-n
  - type: text
    text: 'releasing all forms of wisdom and practical understanding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And through the revelation of the Anointed One, he unveiled his secret desires to us—the hidden mystery of his long-range plan, which he was delighted to implement from the very beginning of time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And because of God’s unfailing purpose, this detailed plan will reign supreme through every period of time until the fulfillment of all the ages finally reaches its climax—when God makes all things new '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text states “God will gather together all things in fulfillment in Christ.” That is, God will unite all things under the headship of Christ.
    marker-yv: yv-n
  - type: text
    text: in all of heaven and earth through Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Through our union with Christ we too have been claimed by God as his own inheritance. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek construction of this phrase can mean either that God appointed us (Gr.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: klēroō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', chosen by casting lots) to be his inheritance, or that we have been appointed an inheritance.'
    marker-yv: yv-n
  - type: text
    text: 'Before we were even born, he gave us our destiny; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “estate.”
    marker-yv: yv-n
  - type: text
    text: 'that we would fulfill the plan of God who always accomplishes every purpose and plan in his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'God’s purpose was that we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jews
  - type: text
    text: ', who were the first to long for the messianic hope, would be the first to believe in the Anointed One and bring great praise and glory to God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And because of him, when you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who are not Jews
  - type: text
    text: ' heard the revelation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: logos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or “word of God.”
    marker-yv: yv-n
  - type: text
    text: of truth, you believed in the wonderful news of salvation. Now we have been stamped with the seal of the promised Holy Spirit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Aramaic manuscripts add here “who was announced by the angels.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He is given to us like an engagement ring, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here can be translated “pledge,” “down payment” or “engagement ring.”
    marker-yv: yv-n
  - type: text
    text: 'as the first installment of what’s coming! He is our hope-promise of a future inheritance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used for “inheritance” can also be translated “dividend.”
    marker-yv: yv-n
  - type: text
    text: which seals us until we have all of redemption’s promises and experience complete freedom—all for the supreme glory and honor of God!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Prays for the Spirit of Wisdom and Revelation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Because of this, since I first heard about your strong faith in the Lord Jesus Christ and your tender love toward all his devoted ones, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'my heart is always full and overflowing with thanks to God for you as I constantly remember you in my prayers. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The literal Aramaic text can be translated “I began confessing on your behalf and praying.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I pray that the Father of glory, the God of our Lord Jesus Christ, would impart to you the riches of the Spirit of wisdom and the Spirit of revelation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “discovery.”
    marker-yv: yv-n
  - type: text
    text: to know him through your deepening intimacy with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I pray that the light of God will illuminate the eyes of your imagination, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “innermost” (heart).
    marker-yv: yv-n
  - type: text
    text: 'flooding you with light, until you experience the full revelation of the hope of his calling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to which he is calling you.”
    marker-yv: yv-n
  - type: text
    text: —that is, the wealth of God’s glorious inheritances that he finds in us, his holy ones!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I pray that you will continually experience the immeasurable greatness of God’s power made available to you through faith. Then your lives will be an advertisement of this immense power as it works through you! This is the mighty power '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that was released when God raised Christ from the dead and exalted him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he seated him” (enthroned).
    marker-yv: yv-n
  - type: text
    text: 'to the place of highest honor and supreme authority '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “at his right hand,” a metaphor for the place of honor and authority.
    marker-yv: yv-n
  - type: text
    text: 'in the heavenly realm! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And now he is exalted as first above every ruler, authority, government, and realm of power in existence! He is gloriously enthroned over every name that is ever praised, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'not only in this age, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word can be translated “universe.”
    marker-yv: yv-n
  - type: text
    text: but in the age that is coming!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he alone is the leader and source of everything needed in the church. God has put everything beneath the authority of Jesus Christ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both Greek and Aramaic texts use the figure of speech “under his feet,” which means he has conquered, subdued, and now rules over them.
    marker-yv: yv-n
  - type: usfm
    marker: it
