document_id: ACT.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy Spirit Comes at Pentecost
  - type: text
    content: 'On the day Pentecost was being fulfilled, '
  - type: note
    content: Or “came to be fulfilled.” The Greek word means “to fill completely (to be fulfilled).” Pentecost was one of the main feasts of Israel. The name is derived from pentekostos, which means “fiftieth,” since it was held on the fiftieth day after the Passover Sabbath. It was also known as the Feast of Harvest.
  - type: text
    content: 'all the disciples were gathered in one place. '
  '10':
  - type: text
    content: 'north central Turkey, '
  - type: note
    content: Or “Phrygia.”
  - type: text
    content: 'southern Turkey, Egypt, Libyans who are neighbors of Cyrene, visitors from all over the Roman Empire, both Jews and converts to Judaism, Cretans and Arabs. '
  '11':
  - type: text
    content: 'Yet we hear them speaking of God’s mighty wonders in our own dialects!” '
  - type: note
    content: This is the universal remedy of the curse of Babel, where human beings were divided by languages (Gen. 11:9). Now, in Christ, the language of the Spirit unifies us all in him.
  '12':
  - type: text
    content: They all stood there, dumbfounded and astonished, saying to one another, “What is this phenomenon?”
  - type: note
    content: As translated from the Aramaic.
  '13':
  - type: text
    content: But others poked fun at them and said, “They’re just drunk on new wine.”
  - type: heading
    content: Peter’s Pentecost Sermon
  '14':
  - type: text
    content: 'Peter stood up with the eleven apostles '
  - type: note
    content: All of the twelve standing there would prove that they were not drunk. They stood before this massive crowd, possibly in the courts of the temple. There were three thousand converted and baptized that day, so the crowd was possibly much larger than that.
  - type: text
    content: 'and shouted '
  - type: note
    content: See footnote for v. 4. Peter was speaking under the anointing of the Holy Spirit. The tongues being spoken, along with the sound of the wind, drew the crowd. Peter would have spoken to them in the common language of Aramaic. Even with the Galilean and Judean dialects, nearly all of the Jewish people present would understand his words.
  - type: text
    content: 'to the crowd. “Listen carefully, my fellow Jews '
  - type: note
    content: Or “you Jewish men.” This is also used in Acts 2:22; 3:12; 5:35; 13:16; 21:28.
  - type: text
    content: 'and residents of Jerusalem. You need to clearly understand what’s happening here. '
  '15':
  - type: text
    content: 'These people are not drunk like you think they are, for it is only nine o’clock in the morning. '
  - type: note
    content: Or “the third hour,” the time for Jewish morning prayer.
  '16':
  - type: text
    content: 'This is '
  - type: text
    content: the fulfillment of
  - type: text
    content: ' what was prophesied through the prophet Joel, '
  - type: text
    content: for God says
  - type: text
    content: ':'
  - type: note
    content: See Joel 2:28–32.
  '17':
  - type: text
    content: '‘This is what I will do in the last days '
  - type: note
    content: The New Testament term “the last days” began at Pentecost and extends until the return of Christ. We have technically been in “the last days” for over two thousand years.
  - type: text
    content: '—I will pour out '
  - type: note
    content: Or “gush forth,” or “run greedily.” The Aramaic can be translated “I will be splashing my Spirit-Wind over all flesh” (humanity).
  - type: text
    content: 'my Spirit on everybody and cause your sons and daughters to prophesy, and your young men will see visions, '
  - type: note
    content: Or “divinely appointed appearances.” The Greek word for “visions,” horasis, can also mean “our eyes opened to have divine encounters and see into the spiritual realm.” These are not daydreams but visions of the heavenly realm. (See Strong’s Concordance, Gr. 3700 and 3706.)
  - type: text
    content: 'and your old men will experience dreams '
  - type: text
    content: from God
  - type: text
    content: '. '
  - type: note
    content: This verse can be translated from the Aramaic as “Your grandparents shall see visions and your priests shall dream dreams.”
  '18':
  - type: text
    content: 'The Holy Spirit will come upon all my servants, men and women alike, and they will prophesy. '
  '19':
  - type: text
    content: 'I will reveal startling signs and wonders in the sky above and mighty miracles on the earth below. Blood and fire and pillars of clouds '
  - type: note
    content: Or “columns [plumes] of smoke.” The Aramaic can be translated “the sweet smell of burning incense.”
  - type: text
    content: 'will appear. '
  '2':
  - type: text
    content: 'Suddenly they heard the sound of a violent blast of wind '
  - type: note
    content: The Aramaic can also be translated “like the roar of a groaning spirit.” This mighty wind is for power; the breath of Jesus breathed into his disciples in John 20:22 was for life.
  - type: text
    content: 'rushing into the house '
  - type: note
    content: Or “It filled the house.” Tradition says they were gathered in an upper room; however, it is more likely that it was the House of the Lord (the temple), where they all gathered to celebrate Pentecost. See also Luke 24:53.
  - type: text
    content: 'from out of the heavenly realm. The roar of the wind was so overpowering it was all anyone could bear! '
  '20':
  - type: text
    content: 'For the sun will be turned dark '
  - type: note
    content: This could be a figure of speech similar to “Lights out on the old order.” The Aramaic is “The sun will be in mourning.” Perhaps this prophecy was fulfilled when Christ was crucified.
  - type: text
    content: 'and the moon blood-red before that great and awesome appearance of the day of the Lord. '
  '21':
  - type: text
    content: 'But everyone who calls on the name of the Lord '
  - type: note
    content: The Aramaic can be translated “Whoever calls on the name of Jesus as the Messiah will receive life.”
  - type: text
    content: will be saved.’ ”
  '22':
  - type: text
    content: 'Peter continued, “People of Israel, listen to the facts. '
  - type: note
    content: Peter wisely begins his sermon with a recounting of Jewish history, keeping the main point of his sermon until the end. A great transformation had taken place in Peter, who had denied Christ three times only six weeks ago. Now he preaches with power and authority. This is the difference the Holy Spirit makes in the life of a believer.
  - type: text
    content: 'Jesus, the Victorious, '
  - type: note
    content: Or “Jesus the Nazarene” (the Branch). The Aramaic word used here also implies the title of an heir of a powerful family, or one who is victorious (“Jesus, the Victorious”).
  - type: text
    content: 'was a man on a divine mission '
  - type: note
    content: The Aramaic is “the man from God,” which may be an idiomatic saying for “the man born of God.”
  - type: text
    content: 'whose authority was clearly proven. For you know how God performed many powerful miracles, signs, and wonders through him. '
  '23':
  - type: text
    content: 'This Man’s destiny was prearranged, for God knew that Jesus would be handed over to you to be crucified and that you would execute him on a cross by the hands of lawless men. Yet it was all part of his predetermined plan. '
  '24':
  - type: text
    content: 'God destroyed the cords of death '
  - type: note
    content: As translated from the Aramaic, which can also be translated “God destroyed death’s destruction.” The Greek is “God freed him from the travails of death.” The Greek word translated “travails” is commonly used for the labor pains of childbirth.
  - type: text
    content: 'and raised him up, because it was impossible for death’s power to hold him prisoner. '
  '25':
  - type: text
    content: 'This is the very thing David prophesied about him:'
  - type: note
    content: See Ps. 16:8–11.
  - type: text
    content: '‘I continually see the Lord '
  - type: note
    content: The Hebrew-Aramaic word is Yahweh.
  - type: text
    content: in front of me.
  - type: text
    content: He’s at my right hand, and I am never shaken.
  - type: note
    content: As translated from the Aramaic. The Greek is “so that I will not be shaken.”
  '26':
  - type: text
    content: No wonder my heart is glad and my glory celebrates!
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: My mouth is filled with his praises,
  - type: text
    content: and I have hope that my body will live
  - type: note
    content: The Greek word for “live” (kataskenosei) is always used for “pitch a tent.” Or “My body will pitch its tent in hope (expectation).” The Aramaic is “Even my body he will restore to hope.”
  '27':
  - type: text
    content: because you will not leave my soul among the dead,
  - type: note
    content: The Aramaic is “Sheol”; the Greek is “Hades.” Both refer to the realm of death.
  - type: text
    content: nor will you allow your sacred one to experience decay.
  '28':
  - type: text
    content: For you have revealed to me the pathways to life,
  - type: text
    content: and seeing your face fills me with euphoria!’
  - type: note
    content: This Greek word (euphrosune) occurs only here and in Acts 14:17. It is the spirit of joy, an ecstasy that comes from God. The Aramaic is “You will fill me, O Sweetness, with your presence.”
  '29':
  - type: text
    content: '“My fellow Jews, I can tell you there is no doubt that our noted patriarch has both died and been buried in his tomb, which remains to this day. '
  - type: text
    content: So you can see that he was not referring to himself with those words
  - type: text
    content: '. '
  '3':
  - type: text
    content: Then all at once a pillar of fire appeared before their eyes
  - type: text
    content: '. '
  - type: note
    content: This was the pillar of fire that led Israel from bondage into the promised land. The same pillar of fire manifested here to initiate a new beginning from dead religious structures into the powerful life of the Spirit. Each believer received an overpowering flame of fire, signified by the shaft of light that engulfed them. It was as though each one received his own personal pillar of fire that would empower him and lead him throughout his life. This was the promise Jesus gave to his disciples of “the one like me” (John 14:26), who would be sent by the Father and never leave them. Today every believer is indwelt by the Spirit of Christ (Rom. 8:9). This was the birthday of the church of Jesus Christ.
  - type: text
    content: 'It separated into tongues of fire that engulfed '
  - type: note
    content: Or “rested over them.”
  - type: text
    content: 'each one of them. '
  '30':
  - type: text
    content: 'But as a prophet, he knew God’s faithful promise, made with God’s unbreakable oath, that one of his descendants would take his throne. '
  - type: note
    content: See Ps. 132:11; Luke 1:32.
  '31':
  - type: text
    content: 'So when peering into the future, David prophesied '
  - type: note
    content: The Aramaic can be translated “David rose up after seeing a vision and he saw.”
  - type: text
    content: 'of the Messiah’s resurrection. '
  - type: text
    content: And God revealed to him
  - type: text
    content: ' that the Messiah would not be abandoned to the realm of death, nor would his body experience decay.'
  '32':
  - type: text
    content: “Can’t you see it? God has resurrected Jesus, and we all have seen him!
  - type: note
    content: Or “of whom we are witnesses,” which implies that they all had seen the resurrected Jesus.
  '33':
  - type: text
    content: '“Then God exalted him to his right hand upon the throne of highest honor. And the Father gave him the authority to send the promised Holy Spirit, which is being poured out '
  - type: note
    content: The Aramaic is “splashed out the gift of the Holy Spirit.”
  - type: text
    content: upon us today. This is what you’re seeing and hearing!
  '34':
  - type: text
    content: '“David wasn’t the one who ascended into heaven, but the one who prophesied:'
  - type: text
    content: ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: said to my Lord,
  - type: text
    content: I honor you by enthroning you beside me,
  - type: note
    content: Or “at my right hand.”
  '35':
  - type: text
    content: until I make your enemies
  - type: text
    content: a footstool beneath your feet.’
  - type: note
    content: See Ps. 110:1, which is the most frequently quoted Old Testament verse found in the New Testament. This shows there is a continuing work of defeating Christ’s enemies as his kingdom increases on earth as it is in heaven.
  '36':
  - type: text
    content: '“Now everyone in Israel '
  - type: note
    content: Or “all the house of Israel.”
  - type: text
    content: 'can know for certain '
  - type: note
    content: Or “inescapably,” for no one can escape the claims of Christ.
  - type: text
    content: 'that Jesus, whom you crucified, is the one God has made '
  - type: note
    content: The Aramaic is “Lord Yahweh made him [from birth] to be both Elohim and Messiah.” The Greek verb used for “made” can also mean “brought forth.” This is a clear statement of both Jesus’ humanity (God brought him forth by human birth) and his deity.
  - type: text
    content: 'both Lord '
  - type: note
    content: Y’shua (Jesus) is now Lord of a new creation company, a new heaven, and a new earth—he is Lord of all. The Greek word kurios is not necessarily a divine title. The Aramaic text uses a clear title of Jesus’ deity.
  - type: text
    content: and the Messiah.”
  - type: heading
    content: The Crowd Responds to Peter’s Words
  '37':
  - type: text
    content: 'When they heard this they were crushed and realized what they had done to Jesus. '
  - type: note
    content: This Greek verb indicates the deepest sorrow and emotional agitation. It is taken from a root word that means “mortally wounded” and is found only here in all the New Testament.
  - type: text
    content: Deeply moved, they said to Peter and the other apostles, “What do we need to do, brothers?”
  - type: note
    content: The Aramaic contains an idiomatic figure of speech, “What do we need to do to be your brothers?”
  '38':
  - type: text
    content: 'Peter replied, “Repent and return to God, '
  - type: note
    content: The Greek word translated “repent” means both “to change the mind and direction of your life” and “to turn back to God.”
  - type: text
    content: 'and each one of you must be baptized in the name of Jesus, the Anointed One, '
  - type: note
    content: 'Peter was likely saying these words from the steps of the temple. Below him were dozens of mikveh (immersion pools used for ceremonial cleanings of Jewish worshipers). Peter was pointing them to the cleansing that comes through the name and authority of Jesus Christ. The Aramaic is startling: “Be immersed in the name of Lord Yahweh Y’shua.” Peter is clearly saying that Lord Yahweh and Jesus are one and the same.'
  - type: text
    content: 'to have your sins removed. Then you may take hold of the gift of the Holy Spirit. '
  '39':
  - type: text
    content: 'For God’s promise of the Holy Spirit is for you '
  - type: note
    content: The Aramaic can be translated “This outpouring is for you.”
  - type: text
    content: 'and your families, for those yet to be born '
  - type: note
    content: Or “for those who are far away (gentiles).”
  - type: text
    content: and for everyone whom the Lord our God calls to himself.”
  '4':
  - type: text
    content: 'They were all filled and equipped '
  - type: note
    content: There are two Greek words used here for “filled.” In v. 2, it is pleroo, which means “filled inwardly.” In v. 4 it is pletho, which means “filled outwardly” or “furnished and equipped.” This was the anointing of the Spirit for ministry. Every believer needs the filling of the Spirit both inwardly for life and outwardly for ministry.
  - type: text
    content: 'with the Holy Spirit and were inspired '
  - type: note
    content: The Greek word apotheggomai literally means “to ring out” (like a bell). It can also mean “carried along” or “inspired.”
  - type: text
    content: to speak in tongues—empowered by the Spirit to speak in languages they had never learned!
  '40':
  - type: text
    content: 'Peter preached to them and warned them with these words: “Be rescued from the wayward and perverse culture of this world!”'
  - type: note
    content: Or “Be free from and preserved from this crooked people!”
  '41':
  - type: text
    content: 'Those who believed the word that day numbered three thousand. They were all baptized and added '
  - type: text
    content: to the church
  - type: text
    content: .
  - type: note
    content: Although the word church is not in the text, it is implied. They were converted by the message of Peter and brought into the fellowship of the believers.
  - type: heading
    content: The Community of Believers
  '42':
  - type: text
    content: 'Every believer was faithfully devoted to following the teachings '
  - type: note
    content: The Greek word didache means “skilled instruction and training.”
  - type: text
    content: 'of the apostles. Their hearts were mutually linked to one another, '
  - type: note
    content: Or “They became partners.”
  - type: text
    content: 'sharing communion '
  - type: note
    content: Or “breaking of bread.” This was more than sharing meals, but participating together in observing the Lord’s Table. The Aramaic, which can be translated “the Eucharist” or “holy communion,” makes it even more explicit.
  - type: text
    content: 'and coming together regularly for prayer. '
  - type: note
    content: Or “[all kinds of] prayers.”
  '43':
  - type: text
    content: 'A deep sense of holy awe '
  - type: note
    content: Or “Fear [of God] came upon every person.”
  - type: text
    content: 'swept over everyone, and the apostles performed many miraculous signs and wonders. '
  - type: note
    content: The Aramaic adds, “in Jerusalem,” which is missing in the Greek.
  '44':
  - type: text
    content: 'All the believers were in fellowship as one body, '
  - type: note
    content: Or “added into one body.”
  - type: text
    content: 'and they shared with one another whatever they had. '
  '45':
  - type: text
    content: Out of generosity
  - type: text
    content: ' they even sold their assets to distribute the proceeds to those who were in need among them. '
  '46':
  - type: text
    content: 'Daily they met together in the temple courts and in one another’s homes to celebrate communion. They shared meals together with joyful hearts and tender humility. '
  '47':
  - type: text
    content: They were continually filled with praises to God, enjoying the favor of all the people. And the Lord kept adding to their number daily those who were coming to life.
  - type: note
    content: As translated from the Aramaic. The Aramaic word for “church” is the joining of “meet” and “come.” This word is an invitation to enter into fellowship with Christ and his people. The Greek word for “church” is ekklesia, which is “called-out ones.” (See the second footnote on Matt. 16:18.)
  '5':
  - type: text
    content: 'Now, at that time there were Jewish worshipers '
  - type: note
    content: Or “devout Jewish men.”
  - type: text
    content: 'who had emigrated from many different lands to live in Jerusalem. '
  '6':
  - type: text
    content: 'When the people '
  - type: note
    content: The Greek word andres implies respect, such as “ladies and gentlemen.”
  - type: text
    content: 'of the city heard the roaring sound, crowds came running to where it was coming from, stunned over what was happening, because each one could hear the disciples speaking in his or her own language. '
  '7':
  - type: text
    content: 'Bewildered, they said to one another, “Aren’t these all Galileans? '
  - type: note
    content: It is likely they knew they were Galileans by their Aramaic dialect common in Galilee.
  '8':
  - type: text
    content: 'So how is it that we hear them speaking in our own languages? '
  '9':
  - type: text
    content: 'We are northeastern Iranians, '
  - type: note
    content: Or “Parthians.”
  - type: text
    content: 'northwestern Iranians, '
  - type: note
    content: Or “Medes.”
  - type: text
    content: 'Elamites, '
  - type: note
    content: This area is now Khuzestan and the Ilam Province, including a small part of southern Iraq.
  - type: text
    content: 'and those from Mesopotamia, '
  - type: note
    content: The Aramaic is Beth-Nahrin, which means “land of the rivers.” This would include Iraq, parts of Syria, southeastern Turkey, and southwestern Iran. The Assyrians also consider themselves to be natives of Beth-Nahrin (Mesopotamia).
  - type: text
    content: 'Judea, east central Turkey, '
  - type: note
    content: Or “Cappadocia.”
  - type: text
    content: 'the coastal areas of the Black Sea, '
  - type: note
    content: Or “Pontus,” which is northeastern Turkey. Pontus means “sea.”
  - type: text
    content: 'Asia, '
  - type: note
    content: Or “Orientals.”
