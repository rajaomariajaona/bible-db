document_id: LUK.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Ministers throughout the Land
  - type: text
    content: 'Soon afterward, Jesus began a ministry tour throughout the country, visiting cities and villages to announce the wonderful news '
  - type: note
    content: 'Jesus revealed fully what the law and the prophets did not fully reveal: the heart of the Father. This good news fulfills the ache of every human being to know a good Father who loves them.'
  - type: text
    content: 'of God’s kingdom. His twelve disciples traveled with him '
  '10':
  - type: text
    content: 'He said, '
  - type: text
    content: “You have been given a teachable heart to perceive the secret, hidden mysteries of God’s kingdom realm. But to those without a listening heart, my words are merely stories. Even though they have eyes, they are blind to the true meaning of what I say,
  - type: text
    content: ' '
  - type: note
    content: This is taken from Isa. 6:9–10. See also Jer. 5:21; Ezek. 12:2.
  - type: text
    content: and even though they listen, they won’t receive full revelation.
  '11':
  - type: text
    content: '“Here, then, is the deeper meaning to my parable: The word of God'
  - type: text
    content: ' '
  - type: note
    content: Or “manifestation of God.”
  - type: text
    content: is the seed that is sown into hearts.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The hard pathway represents the hard hearts of those who hear the word of God but the slanderer
  - type: text
    content: ' '
  - type: note
    content: Or “the devil.” The Greek word diabolos (also translated “devil”) means “the slanderer.”
  - type: text
    content: quickly snatches away what was sown in their hearts to keep them from believing and experiencing salvation.
  - type: text
    content: ' '
  '13':
  - type: text
    content: The seeds falling on gravel represents those who initially respond to the word with joy, but soon afterward, when a season of difficulty and harassment of the enemy comes to them, they wither and fall away, for they have no root in the truth and their faith is temporary.
  - type: text
    content: ' '
  - type: note
    content: From the Aramaic text.
  '14':
  - type: text
    content: The seeds that fall into the weeds represents the hearts of those who hear the word of God but their growth is quickly choked off by their own anxious cares, the riches of this world, and the fleeting pleasures of this life. This is why they never become mature and fruitful.
  - type: text
    content: ' '
  '15':
  - type: text
    content: The seed that fell into good, fertile soil represents those lovers of truth who hear it deep within their hearts. They respond by clinging to the word, keeping it dear as they endure all things in faith. This is the seed that will one day bear much fruit in their lives.”
  - type: heading
    content: The Revelation Light
  '16':
  - type: text
    content: “No one lights a lamp and then hides it, covering it over or putting it where no one sees its light. No, he places the lamp on a lampstand so others benefit from its brightness.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Because this revelation lamp now shines within you, nothing will be hidden from you—it will all be revealed. Every secret
  - type: text
    content: ' '
  - type: text
    content: of the kingdom
  - type: text
    content: ' '
  - type: note
    content: Implied in the context of Jesus’ teaching on the mysteries of God’s kingdom realm (v. 10).
  - type: text
    content: will be unveiled and out in the open, made known by the revelation-light.
  - type: text
    content: ' '
  '18':
  - type: text
    content: So pay careful attention to your hearts as you listen to my teaching, for to those who have open hearts, even more revelation will be given to them until it overflows. And for those who do not listen with open hearts, what little light they imagine themselves to have will be taken away.”
  - type: note
    content: This verse contains a complicated ellipsis, which is a literary function of omitting certain information to invite discovery. The ellipsis of the text has been supplied by making explicit what is implicit in the context. The parables of the sower and of the lamp are similar, in that they speak of the heart that receives truth. The word of the kingdom is a “seed” that grows within us and a “lamp” that glows within us.
  - type: heading
    content: Jesus’ True Family
  '19':
  - type: text
    content: 'Jesus’ mother and his brothers '
  - type: note
    content: Mary had other sons and daughters. These were the half-brothers/sisters of Jesus. Jesus’ father was not Joseph, but the Father of eternity. See also Mark 6:3.
  - type: text
    content: 'came to where Jesus was teaching, but they couldn’t get through the crowd that had gathered around him. '
  '2':
  - type: text
    content: 'as did a number of women who had been healed of many illnesses and set free from demonic power. One of the women was Mary who was from the village of Magdala, '
  - type: note
    content: Or “Mary Magdalene.” The ancient village of Magdala has recently been discovered near the current town of Migdol. Some scholars believe Mary Magdalene could have been a rich widow since she financially supported the ministry of Jesus. In Luke 8:3 she is named first among the women who cared for Jesus out of their own means.
  - type: text
    content: 'from whom Jesus had cast out seven demons. '
  - type: note
    content: The number seven means completeness. Mary was completely possessed by demons, but Jesus restored her true self and cast out her demons.
  - type: text
    content: 'Among the women were Susanna and '
  '20':
  - type: text
    content: 'Someone told Jesus, “Your mother and brothers '
  - type: note
    content: See John 7:5.
  - type: text
    content: are standing outside, wanting to speak with you.”
  '21':
  - type: text
    content: 'Jesus told the crowd, '
  - type: text
    content: “These who come to listen to me are like my mother and my brothers. They’re the ones who long to hear God’s words and put them into practice.”
  - type: heading
    content: Peace in the Storm
  '22':
  - type: text
    content: 'One day Jesus said to his disciples, '
  - type: text
    content: “Let’s get in a boat and go across to the other side of the lake.”
  - type: text
    content: ' So they set sail, and soon Jesus fell asleep. But a fierce wind arose and became a violent squall that threatened to swamp their boat. '
  '24':
  - type: text
    content: Alarmed, the disciples woke Jesus up and said, “Master, Master, we’re sinking! Don’t you care that we’re going to drown?”
  - type: text
    content: 'With great authority Jesus rebuked the howling wind and surging waves, and instantly they became calm. '
  '25':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Why are you fearful? Have you lost your faith
  - type: text
    content: ' '
  - type: text
    content: in me
  - type: text
    content: ?”
  - type: text
    content: 'Shocked, they said with amazement to one another, “Who is this man '
  - type: note
    content: The answer to that question is found in Jer. 31:35, “He is the Lord of hosts!”
  - type: text
    content: who has authority over winds and waves that they obey him?”
  - type: heading
    content: A Demonized Man Set Free
  '26':
  - type: text
    content: As soon as they stepped ashore on the eastern side of the lake in the land of the Gerasenes, the disciples were confronted by a demon-possessed madman from a nearby town. Many times he had been put under guard and bound with chains, but the many demons inside him had repeatedly thrown him into convulsions, breaking his shackles and driving him out of the town into the countryside. He had been demonized for a long time and was living naked in a cemetery among the tombs. When he saw Jesus, he fell at his feet and screamed out, “What are you doing here? You are Jesus, the Son of the Most High God!”
  - type: text
    content: Jesus commanded the demons to come out of him, and they shouted, “We beg you, don’t torture us!”
  '3':
  - type: text
    content: 'Joanna, the wife of Chusa, who managed King Herod’s household. '
  - type: note
    content: Some scholars believe that Chusa was the government official mentioned in John 4:46–53.
  - type: text
    content: Many other women who supported Jesus’ ministry from their own personal finances also traveled with him.
  - type: note
    content: To travel with a rabbi was considered a high honor. Yet it was not permitted in the culture and time of Jesus’ ministry for a woman to be mentored by a rabbi. Jesus elevated women into a place of honor and respect, in spite of the cultural limitations. It was these wealthy women who provided for Jesus’ care. Luke is the one Gospel writer who brings out the many times Jesus honored women. These women would later be present at the crucifixion (Matt. 27:55–56; Mark 15:40–41; Luke 23:49, 55) and at the resurrection (Luke 24:1–11). Mary Magdalene was the first human being to see the risen Christ (John 20:11–18).
  - type: heading
    content: Mysteries of God’s Kingdom Realm
  '30':
  - type: text
    content: 'Jesus asked the man, '
  - type: text
    content: “What is your name?”
  - type: text
    content: '“Mob,” the demons answered. “We are a mob, '
  - type: note
    content: The Greek word used for “mob” is literally “legion,” which was the largest unit of the Roman military and represented up to 6,800 soldiers.
  - type: text
    content: 'for there are many of us here in this man. '
  '31':
  - type: text
    content: We beg you, don’t banish us into the Abyss!”
  - type: note
    content: See Rev. 9:1; 20:1–3. The Abyss is the place of imprisonment for Satan and his demons.
  '32':
  - type: text
    content: 'On the hillside nearby, there was a large herd of pigs, and the demons pleaded with Jesus, “Let us enter into the pigs.” '
  '33':
  - type: text
    content: So Jesus ordered all the “mob” of demons to come out of the man and enter the pigs. The crazed herd of swine stampeded over the cliff into the lake and all of them drowned.
  '34':
  - type: text
    content: 'When the herders tending the pigs saw what had happened, they ran off in fear and reported it to the nearby town and throughout the countryside. '
  '35':
  - type: text
    content: 'Then the people of the region came out to see for themselves what had happened. When they came to where Jesus was, they discovered the '
  - type: text
    content: notorious
  - type: text
    content: ' madman totally set free. He was clothed, speaking intelligently, and sitting at the feet of Jesus. They were shocked! '
  '36':
  - type: text
    content: Then eyewitnesses to the miracle reported all that they had seen and how Jesus completely delivered the demonized man from his torment.
  - type: text
    content: 'After hearing about such amazing power, the townspeople became frightened. '
  '37':
  - type: text
    content: 'Soon all the people of the region of the Gerasenes and the surrounding country pleaded with Jesus to leave them, for they were gripped with fear. So Jesus got into the boat, intending to return to Galilee. '
  '38':
  - type: text
    content: But the man who had been set free begged Jesus over and over not to leave, saying, “Let me be with you!”
  - type: text
    content: 'Jesus sent him away with these instructions: '
  '39':
  - type: text
    content: “Return to your home and your family, and tell them all the wonderful things God has done for you.”
  - type: text
    content: ' So the man went back and preached to everyone who would listen about the amazing miracle Jesus had worked in his life.'
  - type: heading
    content: More Miracles of Healing
  '4':
  - type: text
    content: 'Massive crowds gathered from many towns to hear Jesus, and he taught them using metaphors and parables, '
  - type: note
    content: One of Jesus’ preferred teaching methods was through story (Matt. 13:34). A parable required the listener to be humble, teachable, and open to truth. Revelation from God can be found through the doorway of an allegory. This parable is described in the Aramaic as “the parable of the seed.”
  - type: text
    content: 'such as this:'
  '40':
  - type: text
    content: 'When Jesus returned to Galilee, the crowds were overjoyed, for they had been waiting for him to arrive. '
  '41':
  - type: text
    content: Just then, a man named Jairus, the leader of the local Jewish congregation, fell before Jesus’ feet. He desperately begged him to come and heal his twelve-year-old daughter, his only child, because she was at the point of death.
  - type: text
    content: 'As Jesus started to go with him to his home to see her, a large crowd surrounded him. '
  '43':
  - type: text
    content: 'In the crowd that day was a woman who had suffered greatly for twelve years '
  - type: note
    content: The daughter of Jairus was twelve years old; this woman had suffered for twelve years. Jesus touched the girl; the woman touched Jesus.
  - type: text
    content: 'from slow bleeding. Even though she had spent all that she had on healers, '
  - type: note
    content: Translated from the Aramaic text, which states literally “the house of healers.” This phrase is not found in many Greek texts.
  - type: text
    content: 'she was still suffering. '
  '44':
  - type: text
    content: 'Pressing in through the crowd, she came up behind Jesus and touched the fringe '
  - type: note
    content: This was on the corner of the prayer shawl, and the tassel was meant to symbolize all of the commandments and promises of God. The woman was laying hold of a promise for healing.
  - type: text
    content: 'of his garment. Instantly her bleeding stopped '
  - type: text
    content: and she was healed
  - type: text
    content: .
  '45':
  - type: text
    content: 'Jesus suddenly stopped and said to his disciples, '
  - type: text
    content: “Someone touched me. Who was it?”
  - type: note
    content: Jesus already knew the answer to his question. He wanted the woman to come forward and acknowledge her healing.
  - type: text
    content: 'While they all denied it, Peter pointed out, “Master, everyone is touching you, trying to get close to you. The crowds are so thick '
  - type: note
    content: There were many crowds around Jesus, the living Word. Many today crowd around the Bible, the written Word. But only those who “touch” the Scriptures in faith receive its promises, just like the sick woman received her healing.
  - type: text
    content: we can’t walk through all these people without being jostled.”
  '46':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Yes, but I felt power surge through me. Someone touched me to be healed, and they received their healing.”
  '47':
  - type: text
    content: 'When the woman realized she couldn’t hide any longer, she came and fell trembling at Jesus’ feet. Before the entire crowd she declared, “I was desperate to touch you, Jesus, for I knew if I could just touch even the fringe of your garment '
  - type: note
    content: She was touching the hem of the robe of our anointed High Priest, Jesus. See Ps. 133:2.
  - type: text
    content: I would be healed.”
  '48':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Beloved daughter, your faith in me released your healing. You may go with my peace.”
  '49':
  - type: text
    content: While Jesus was still speaking to the woman, someone came from Jairus’ house and told him, “There’s no need to bother the Master any further. Your daughter has passed away. She’s gone.”
  '5':
  - type: text
    content: “A farmer went out to sow seeds for a harvest. As he scattered his seeds, some of them fell on the hard pathway and were quickly trampled down and unable to grow and became nothing but bird seed.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'When Jesus heard this, he turned to Jairus and said, '
  - type: text
    content: “Don’t yield to your fear. Have faith in me and she will live again.”
  '51':
  - type: text
    content: 'When they arrived at the house, Jesus allowed only Peter, John, and Jacob—along with the child’s parents—to go inside. '
  '52':
  - type: text
    content: 'Jesus told those left outside, who were sobbing and wailing with grief, '
  - type: text
    content: “Stop crying. She is not dead; she’s just asleep and must be awakened.”
  '53':
  - type: text
    content: 'They laughed at him, '
  - type: note
    content: They did not realize that Jesus was using “sleep” as a metaphor for death.
  - type: text
    content: knowing for certain that she had died.
  '54':
  - type: text
    content: 'Jesus approached the body, took the girl by her hand, and called out with a loud voice, '
  - type: text
    content: “My sleeping child, awake! Rise up!”
  '55':
  - type: text
    content: Instantly her spirit returned to her body and she stood up.
  - type: note
    content: 'This chapter contains four great miracles of Jesus Christ: (1) over nature, for he stilled the wind and waves; (2) over demons, for he cast out a mob of evil spirits; (3) over disease, for he healed the hemorrhaging woman; and (4) over death, for he restored the life of this twelve-year-old girl.'
  - type: text
    content: Jesus directed her stunned parents to give her something to eat and ordered them to tell no one what just happened.
  '6':
  - type: text
    content: Some fell on the gravel, and though they sprouted they couldn’t take root; it withered for lack of moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seeds fell where there was nothing but weeds. They too were unable to grow to full maturity, for the weeds choked them out.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Yet some of the seeds fell into good, fertile soil, and they grew and flourished until they produced more than a hundredfold harvest, a bumper crop.”
  - type: text
    content: ' Then Jesus added, shouting out to all who would hear, '
  - type: text
    content: “Listen with your heart and you will understand!”
  '9':
  - type: text
    content: 'Later his disciples came to him privately to ask him what deeper meaning they could find in this parable. '
