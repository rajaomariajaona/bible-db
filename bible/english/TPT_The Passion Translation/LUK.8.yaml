    - type: text
      text: Jesus Ministers throughout the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Soon afterward, Jesus began a ministry tour throughout the country, visiting cities and villages to announce the wonderful news '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jesus revealed fully what the law and the prophets did not fully reveal: the heart of the Father. This good news fulfills the ache of every human being to know a good Father who loves them.'
      marker-yv: yv-n
    - type: text
      text: 'of God’s kingdom. His twelve disciples traveled with him '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
