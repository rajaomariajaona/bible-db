      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Abyss is the place of imprisonment for Satan and his demons.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On the hillside nearby, there was a large herd of pigs, and the demons pleaded with Jesus, “Let us enter into the pigs.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So Jesus ordered all the “mob” of demons to come out of the man and enter the pigs. The crazed herd of swine stampeded over the cliff into the lake and all of them drowned.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'When the herders tending the pigs saw what had happened, they ran off in fear and reported it to the nearby town and throughout the countryside. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then the people of the region came out to see for themselves what had happened. When they came to where Jesus was, they discovered the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: notorious
    - type: text
      text: ' madman totally set free. He was clothed, speaking intelligently, and sitting at the feet of Jesus. They were shocked! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Then eyewitnesses to the miracle reported all that they had seen and how Jesus completely delivered the demonized man from his torment.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After hearing about such amazing power, the townspeople became frightened. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Soon all the people of the region of the Gerasenes and the surrounding country pleaded with Jesus to leave them, for they were gripped with fear. So Jesus got into the boat, intending to return to Galilee. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But the man who had been set free begged Jesus over and over not to leave, saying, “Let me be with you!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus sent him away with these instructions: '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Return to your home and your family, and tell them all the wonderful things God has done for you.”
    - type: text
      text: ' So the man went back and preached to everyone who would listen about the amazing miracle Jesus had worked in his life.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Miracles of Healing
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Massive crowds gathered from many towns to hear Jesus, and he taught them using metaphors and parables, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of Jesus’ preferred teaching methods was through story (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). A parable required the listener to be humble, teachable, and open to truth. Revelation from God can be found through the doorway of an allegory. This parable is described in the Aramaic as “the parable of the seed.”
      marker-yv: yv-n
    - type: text
      text: 'such as this:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'When Jesus returned to Galilee, the crowds were overjoyed, for they had been waiting for him to arrive. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-42
    - type: text
      text: Just then, a man named Jairus, the leader of the local Jewish congregation, fell before Jesus’ feet. He desperately begged him to come and heal his twelve-year-old daughter, his only child, because she was at the point of death.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus started to go with him to his home to see her, a large crowd surrounded him. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'In the crowd that day was a woman who had suffered greatly for twelve years '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The daughter of Jairus was twelve years old; this woman had suffered for twelve years. Jesus touched the girl; the woman touched Jesus.
      marker-yv: yv-n
    - type: text
      text: 'from slow bleeding. Even though she had spent all that she had on healers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic text, which states literally “the house of healers.” This phrase is not found in many Greek texts.
      marker-yv: yv-n
    - type: text
      text: 'she was still suffering. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Pressing in through the crowd, she came up behind Jesus and touched the fringe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was on the corner of the prayer shawl, and the tassel was meant to symbolize all of the commandments and promises of God. The woman was laying hold of a promise for healing.
      marker-yv: yv-n
    - type: text
      text: 'of his garment. Instantly her bleeding stopped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and she was healed
    - type: text
      text: .
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jesus suddenly stopped and said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Someone touched me. Who was it?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus already knew the answer to his question. He wanted the woman to come forward and acknowledge her healing.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they all denied it, Peter pointed out, “Master, everyone is touching you, trying to get close to you. The crowds are so thick '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were many crowds around Jesus, the living Word. Many today crowd around the Bible, the written Word. But only those who “touch” the Scriptures in faith receive its promises, just like the sick woman received her healing.
      marker-yv: yv-n
    - type: text
      text: we can’t walk through all these people without being jostled.”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, but I felt power surge through me. Someone touched me to be healed, and they received their healing.”
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'When the woman realized she couldn’t hide any longer, she came and fell trembling at Jesus’ feet. Before the entire crowd she declared, “I was desperate to touch you, Jesus, for I knew if I could just touch even the fringe of your garment '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: She was touching the hem of the robe of our anointed High Priest, Jesus. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 133:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: I would be healed.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Beloved daughter, your faith in me released your healing. You may go with my peace.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: While Jesus was still speaking to the woman, someone came from Jairus’ house and told him, “There’s no need to bother the Master any further. Your daughter has passed away. She’s gone.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A farmer went out to sow seeds for a harvest. As he scattered his seeds, some of them fell on the hard pathway and were quickly trampled down and unable to grow and became nothing but bird seed.
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'When Jesus heard this, he turned to Jairus and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t yield to your fear. Have faith in me and she will live again.”
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'When they arrived at the house, Jesus allowed only Peter, John, and Jacob—along with the child’s parents—to go inside. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Jesus told those left outside, who were sobbing and wailing with grief, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stop crying. She is not dead; she’s just asleep and must be awakened.”
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'They laughed at him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They did not realize that Jesus was using “sleep” as a metaphor for death.
      marker-yv: yv-n
    - type: text
      text: knowing for certain that she had died.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Jesus approached the body, took the girl by her hand, and called out with a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My sleeping child, awake! Rise up!”
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 55-56
