  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'One day Jesus said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let’s get in a boat and go across to the other side of the lake.”
    - type: text
      text: ' So they set sail, and soon Jesus fell asleep. But a fierce wind arose and became a violent squall that threatened to swamp their boat. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Alarmed, the disciples woke Jesus up and said, “Master, Master, we’re sinking! Don’t you care that we’re going to drown?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With great authority Jesus rebuked the howling wind and surging waves, and instantly they became calm. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you fearful? Have you lost your faith
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in me
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shocked, they said with amazement to one another, “Who is this man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The answer to that question is found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:35
      - type: usfm
