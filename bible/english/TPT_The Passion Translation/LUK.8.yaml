    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet some of the seeds fell into good, fertile soil, and they grew and flourished until they produced more than a hundredfold harvest, a bumper crop.”
    - type: text
      text: ' Then Jesus added, shouting out to all who would hear, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen with your heart and you will understand!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
