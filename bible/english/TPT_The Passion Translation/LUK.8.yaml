      text: 'He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have been given a teachable heart to perceive the secret, hidden mysteries of God’s kingdom realm. But to those without a listening heart, my words are merely stories. Even though they have eyes, they are blind to the true meaning of what I say,
    - type: text
      text: ' '
    - type: usfm
      marker: f
