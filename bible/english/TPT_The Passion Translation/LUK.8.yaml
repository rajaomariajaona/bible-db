    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:55–56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This chapter contains four great miracles of Jesus Christ: (1) over nature, for he stilled the wind and waves; (2) over demons, for he cast out a mob of evil spirits; (3) over disease, for he healed the hemorrhaging woman; and (4) over death, for he restored the life of this twelve-year-old girl.'
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus directed her stunned parents to give her something to eat and ordered them to tell no one what just happened.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Some fell on the gravel, and though they sprouted they couldn’t take root; it withered for lack of moisture.
    - type: text
      text: ' '
  '7':
