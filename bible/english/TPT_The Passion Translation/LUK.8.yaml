      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “manifestation of God.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is the seed that is sown into hearts.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The hard pathway represents the hard hearts of those who hear the word of God but the slanderer
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the devil.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: diabolos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also translated “devil”) means “the slanderer.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: quickly snatches away what was sown in their hearts to keep them from believing and experiencing salvation.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The seeds falling on gravel represents those who initially respond to the word with joy, but soon afterward, when a season of difficulty and harassment of the enemy comes to them, they wither and fall away, for they have no root in the truth and their faith is temporary.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From the Aramaic text.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The seeds that fall into the weeds represents the hearts of those who hear the word of God but their growth is quickly choked off by their own anxious cares, the riches of this world, and the fleeting pleasures of this life. This is why they never become mature and fruitful.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The seed that fell into good, fertile soil represents those lovers of truth who hear it deep within their hearts. They respond by clinging to the word, keeping it dear as they endure all things in faith. This is the seed that will one day bear much fruit in their lives.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Revelation Light
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one lights a lamp and then hides it, covering it over or putting it where no one sees its light. No, he places the lamp on a lampstand so others benefit from its brightness.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Because this revelation lamp now shines within you, nothing will be hidden from you—it will all be revealed. Every secret
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: of the kingdom
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the context of Jesus’ teaching on the mysteries of God’s kingdom realm (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will be unveiled and out in the open, made known by the revelation-light.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So pay careful attention to your hearts as you listen to my teaching, for to those who have open hearts, even more revelation will be given to them until it overflows. And for those who do not listen with open hearts, what little light they imagine themselves to have will be taken away.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse contains a complicated ellipsis, which is a literary function of omitting certain information to invite discovery. The ellipsis of the text has been supplied by making explicit what is implicit in the context. The parables of the sower and of the lamp are similar, in that they speak of the heart that receives truth. The word of the kingdom is a “seed” that grows within us and a “lamp” that glows within us.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ True Family
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesus’ mother and his brothers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mary had other sons and daughters. These were the half-brothers/sisters of Jesus. Jesus’ father was not Joseph, but the Father of eternity. See also
      - type: usfm
