  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Demonized Man Set Free
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-29
    - type: text
      text: As soon as they stepped ashore on the eastern side of the lake in the land of the Gerasenes, the disciples were confronted by a demon-possessed madman from a nearby town. Many times he had been put under guard and bound with chains, but the many demons inside him had repeatedly thrown him into convulsions, breaking his shackles and driving him out of the town into the countryside. He had been demonized for a long time and was living naked in a cemetery among the tombs. When he saw Jesus, he fell at his feet and screamed out, “What are you doing here? You are Jesus, the Son of the Most High God!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus commanded the demons to come out of him, and they shouted, “We beg you, don’t torture us!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Joanna, the wife of Chusa, who managed King Herod’s household. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars believe that Chusa was the government official mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:46–53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Many other women who supported Jesus’ ministry from their own personal finances also traveled with him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To travel with a rabbi was considered a high honor. Yet it was not permitted in the culture and time of Jesus’ ministry for a woman to be mentored by a rabbi. Jesus elevated women into a place of honor and respect, in spite of the cultural limitations. It was these wealthy women who provided for Jesus’ care. Luke is the one Gospel writer who brings out the many times Jesus honored women. These women would later be present at the crucifixion (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:55–56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 15:40–41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 23:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '55'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and at the resurrection (
      - type: usfm
