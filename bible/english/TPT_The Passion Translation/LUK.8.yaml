    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Other seeds fell where there was nothing but weeds. They too were unable to grow to full maturity, for the weeds choked them out.
    - type: text
      text: ' '
  '8':
