          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'came to where Jesus was teaching, but they couldn’t get through the crowd that had gathered around him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'as did a number of women who had been healed of many illnesses and set free from demonic power. One of the women was Mary who was from the village of Magdala, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Mary Magdalene.” The ancient village of Magdala has recently been discovered near the current town of Migdol. Some scholars believe Mary Magdalene could have been a rich widow since she financially supported the ministry of Jesus. In
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: she is named first among the women who cared for Jesus out of their own means.
      marker-yv: yv-n
    - type: text
      text: 'from whom Jesus had cast out seven demons. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The number seven means completeness. Mary was completely possessed by demons, but Jesus restored her true self and cast out her demons.
      marker-yv: yv-n
    - type: text
      text: 'Among the women were Susanna and '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Someone told Jesus, “Your mother and brothers '
    - type: usfm
