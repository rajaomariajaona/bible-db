    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesus asked the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is your name?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Mob,” the demons answered. “We are a mob, '
    - type: usfm
