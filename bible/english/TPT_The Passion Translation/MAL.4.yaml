document_id: MAL.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sun of Righteousness
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Bible has the verses in this chapter numbered 3:19–24.
  - type: text
    content: '“You see, there is a day coming, raging like a fiery furnace. On that day, all the proud and wicked people will burn up like straw thrown into a furnace. Neither stalks nor roots will remain. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declare it.'
  - type: note
    content: See Isa. 10:16; 30:27; Jer. 21:14; Zeph. 1:18; 3:8.
  '2':
  - type: text
    content: '“But for you who stand in awe at the sound of my name, '
  - type: text
    content: a new dawn is coming
  - type: text
    content: '. For the sun of righteousness will rise with healing radiating from its wings. '
  - type: note
    content: See 2 Sam. 23:4; Ps. 84:11; Isa. 30:26; Matt. 17:2; Luke 1:76–79; John 1:4–5; Heb. 1:3; Rev. 1:16. We see the dawning of the new day in the shining light of Christ, our “sun of righteousness,” who brings healing, salvation, wholeness, and blessing to the people of earth. The rays of his love and power will radiate healing for troubled minds, broken hearts, and wounded souls. There will be no more gloom. See also Isa. 9:1–2.
  - type: text
    content: 'And you will be free and leap for joy like calves released from the stall. '
  '3':
  - type: text
    content: 'In the day that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, am preparing, you will overcome and trample down the wicked like they were ashes under your feet.”'
  - type: heading
    content: The Return of Elijah
  '4':
  - type: text
    content: '“Remember the law of my servant Moses, the commands and instructions I gave him at Mount Sinai '
  - type: note
    content: Or “Horeb,” the common name in the Torah for the mountain usually called Sinai.
  - type: text
    content: 'for all Israel '
  - type: text
    content: to obey
  - type: text
    content: .
  '5':
  - type: text
    content: '“Keep watching, for I am sending you the prophet Elijah before that great and fearful day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' arrives. '
  - type: note
    content: See Matt. 11:9–14; 17:12; Mark 9:10–13; Luke 1:16–17. Jesus confirmed that the “Elijah” who was coming was John the Baptist. Although Elijah never died, John was not Elijah reincarnated. John’s ministry would be like that of Elijah. John the Baptist dressed like Elijah (see 2 Kings 1:8; Matt. 3:4), John preached a message of repentance in the wilderness like Elijah (see Matt. 3:1), and both John and Elijah had high-profile political enemies (see 1 Kings 18:16–17; Matt. 14:3). To this day, Jews celebrating Passover Seders will place an empty chair at the table just in case Elijah returns to announce the Messiah’s coming. The day of Yahweh will be “great” for the believers and “fearful” for the lost.
  '6':
  - type: text
    content: 'He will return the fathers’ hearts to their children and the children’s hearts to their fathers so that I can come '
  - type: text
    content: and bless
  - type: text
    content: ' and not strike the land with a curse.”'
  - type: note
    content: The Old Testament ends with “a curse.” For this reason, when Jews read this passage aloud, they repeat v. 5 after reading v. 6 so that they won’t end on a note of doom. The Hebrew term translated “curse” is cherem, which has the formal meaning of a “ban.” It is used in the Old Testament to denote a divine “devoting to destruction” (or “annihilation”), a judgment handed down, for example, to the original gentile nations of the land of Canaan (see Deut. 7). Recognizing the terrible nature of this divine judgment makes the final short chapter of Malachi an even stronger testimony to the wonderful mercy and love of our God in sending his Son to die on our behalf so that we will never have to suffer such a terrifying judgment.
