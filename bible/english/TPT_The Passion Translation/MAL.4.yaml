        text: . We see the dawning of the new day in the shining light of Christ, our “sun of righteousness,” who brings healing, salvation, wholeness, and blessing to the people of earth. The rays of his love and power will radiate healing for troubled minds, broken hearts, and wounded souls. There will be no more gloom. See also
