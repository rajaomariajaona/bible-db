      children:
      - type: text
        text: ). Recognizing the terrible nature of this divine judgment makes the final short chapter of Malachi an even stronger testimony to the wonderful mercy and love of our God in sending his Son to die on our behalf so that we will never have to suffer such a terrifying judgment.
