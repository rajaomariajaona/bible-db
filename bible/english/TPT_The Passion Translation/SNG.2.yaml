document_id: SNG.2,1849
type_code: eng
verses:
  '1':
  - type: text
    content: I am truly his rose,
  - type: text
    content: the very theme of his song.
  - type: note
    content: The Hebrew text reads “a rose of Sharon.” The word Sharon can be translated “his song.” She now sees herself as the one he sings over. The root word for “rose” (Hb. habab) can mean “overshadowed.”
  - type: text
    content: I’m overshadowed by his love,
  - type: text
    content: like a lily growing in the valley!
  - type: heading
    content: The Shepherd-King
  '10':
  - type: text
    content: 'The one I love calls to me:'
  - type: text
    content: Arise,
  - type: text
    content: ' '
  - type: note
    content: The Hebrew word for “arise” (quwm) was used by the high priest when he spoke to the Levites to take up the ark of glory on their shoulders to move it as Israel journeyed through the wilderness (Ps. 132:8). The ark can be a metaphor for the bride, carried on the shoulders of our Bridegroom (Luke 15:1–7).
  - type: text
    content: my dearest. Hurry, my darling.
  - type: note
    content: Or “my fair one.” This is the Hebrew word for “fullness” or “complete.” He calls us his complete one.
  - type: text
    content: Come away with me!
  - type: note
    content: Or “Come to me.” See Matt. 11:28–30.
  - type: text
    content: I have come as you have asked
  - type: text
    content: to draw you to my heart and lead you out.
  - type: text
    content: For now is the time, my beautiful one.
  '11':
  - type: text
    content: The season has changed,
  - type: text
    content: the bondage of your barren winter has ended,
  - type: text
    content: and the season of hiding is over and gone.
  - type: text
    content: The rains have soaked the earth
  - type: note
    content: The rains speak of the outpouring of the Holy Spirit. She is refreshed and prepared to move out with him.
  '12':
  - type: text
    content: and left it bright with blossoming flowers.
  - type: note
    content: These flowers may point to the holy lovers of God throughout the ages, which after “rains” of God’s Spirit mature, blossom, and give forth the fragrance of Christ. Paul was a flower; Peter was a flower; and Mary of Bethany was a flower blooming. The sons of God are the flowers appearing on the earth out of their union with Christ.
  - type: text
    content: The season for singing and pruning the vines has arrived.
  - type: note
    content: Or “The season of singing has arrived.” The Hebrew word for “pruning” is a homonym that can also mean “singing.” This translation includes both meanings.
  - type: text
    content: I hear the cooing of doves in our land,
  - type: note
    content: This is the turtledove, which is heard only at the time of harvest. The turtledove is also an acceptable sacrifice of cleansing in place of a lamb. The words “our land” show the joint possession of all things that we enjoy through our union with Christ.
  - type: text
    content: filling the air with songs to awaken you
  - type: text
    content: and guide you forth.
  '13':
  - type: text
    content: Can you not discern this new day of destiny
  - type: text
    content: breaking forth around you?
  - type: text
    content: The early signs of my purposes and plans
  - type: text
    content: are bursting forth.
  - type: note
    content: This text is literally translated “The fig tree has sweetened and puts forth its early figs.” In the language of allegory, the fig tree is a picture of destiny and purpose. The sign of a fig tree blooming is the sign of an early spring, a new season.
  - type: text
    content: The budding vines of new life
  - type: text
    content: are now blooming everywhere.
  - type: text
    content: The fragrance of their flowers whispers,
  - type: text
    content: “There is change in the air.”
  - type: text
    content: Arise, my love, my beautiful companion,
  - type: text
    content: and run with me to the higher place.
  - type: text
    content: For now is the time to arise and come away with me.
  '14':
  - type: text
    content: For you are my dove, hidden in the split-open rock.
  - type: note
    content: This speaks of the wounded side of Jesus, our Rock where we hide and rest. When Moses asked God to see his glory, God hid Moses in the cleft of the rock. See Ex. 33:22.
  - type: text
    content: It was I who took you and hid you up high
  - type: text
    content: in the secret stairway of the sky.
  - type: text
    content: Let me see your radiant face and hear your sweet voice.
  - type: note
    content: The Hebrew text literally means “Your voice is delicious.”
  - type: text
    content: How beautiful your eyes of worship
  - type: text
    content: and lovely your voice in prayer.
  '15':
  - type: text
    content: You must catch the troubling foxes,
  - type: text
    content: those sly little foxes
  - type: text
    content: ' '
  - type: note
    content: These “foxes” are the compromises that are hidden deep in our hearts. These are areas of our lives where we have not yet allowed the victory of Christ to shine. The foxes keep the fruit of his Spirit from growing within us.
  - type: text
    content: that hinder our relationship.
  - type: text
    content: For they raid our budding vineyard of love
  - type: text
    content: to ruin what I’ve planted within you.
  - type: text
    content: Will you catch them and remove them for me?
  - type: text
    content: We will do it together.
  - type: heading
    content: The Shulamite
  '16':
  - type: text
    content: I know my lover is mine and I have everything in you,
  - type: text
    content: for we delight ourselves in each other.
  - type: note
    content: The Hebrew wording includes the phrase “He browses among the lilies.” The Hebrew word for “browse” can also mean “to take delight in” or “to be as a special friend.” The same Hebrew word, ra’ah, is used in Ps. 23:1, “The Lord is my best friend and my shepherd.”
  '17':
  - type: text
    content: But until the day springs to life
  - type: text
    content: and the shifting shadows of fear disappear,
  - type: text
    content: turn around, my lover, and ascend
  - type: text
    content: 'to the holy mountains of separation '
  - type: note
    content: This text literally means “mountains of Bether,” the Hebrew word for “separation” or “gap.” This could be the realm of holiness, being separated to God. Some scholars say Bether was a spiritual representation of a mountain of fragrant spices; i.e., the realm of holiness.
  - type: text
    content: without me.
  - type: text
    content: Until the new day fully dawns,
  - type: text
    content: run on ahead like the graceful gazelle
  - type: text
    content: and skip like the young stag
  - type: text
    content: over the mountains of separation.
  - type: text
    content: Go on ahead to the mountain of spices—
  - type: text
    content: I’ll come away another time
  - type: text
    content: .
  '2':
  - type: text
    content: Yes, you are my darling companion.
  - type: text
    content: You stand out from all the rest.
  - type: text
    content: For though the thorns
  - type: text
    content: ' '
  - type: note
    content: This is a thorn bush, which speaks of “the curse of sin.” See Gen. 3:18; John 19:5; Gal. 3:13. On the cross, Jesus wore a crown of thorns, for he took away the curse of sin.
  - type: text
    content: surround you,
  - type: text
    content: you remain as pure as a lily,
  - type: note
    content: The emblem of a lily was engraved on the upper part of the pillars of Solomon’s Temple. Lilies are symbols of purity in the “temple” of our inner being.
  - type: text
    content: more than all others.
  - type: heading
    content: The Shulamite
  '3':
  - type: text
    content: My beloved is to me
  - type: text
    content: the most fragrant apple tree—
  - type: text
    content: he stands above the sons of men.
  - type: note
    content: Or “trees of the forest.” Trees in the Bible are often metaphors for humanity.
  - type: text
    content: Sitting under his grace-shadow,
  - type: text
    content: I blossom in his shade,
  - type: text
    content: enjoying the sweet taste of his pleasant, delicious fruit,
  - type: text
    content: resting with delight where his glory never fades.
  '4':
  - type: text
    content: Suddenly, he transported me into his house of wine—
  - type: text
    content: he looked upon me with his unrelenting love divine.
  - type: note
    content: 'Or “His [tribal] banner covering me was love.” There are two Hebrew words for “banner”: nes is the military banner, and the one used here is degel, the tribal banner, of which there was one for each of the twelve tribes of Israel. The Shulamite lives under the banner of the tribe of love.'
  '5':
  - type: text
    content: Revive me with your raisin cakes.
  - type: note
    content: Or “goblet of wine.” King David gave raisin cakes to the entire nation of Israel in celebration of the ark of glory, God’s presence, coming into Jerusalem (see 2 Sam. 6:19). Additionally, the Hebrew word for “with raisin cakes,” ba’ashishot, is a homonym that can also mean “fires.” The fires of passion and love are overwhelming.
  - type: text
    content: Refresh me again with your apples.
  - type: note
    content: Or “apricots.” These are the sweet promises of grace that sustain us.
  - type: text
    content: Help me and hold me, for I am lovesick!
  - type: note
    content: Or “wounded by love.”
  - type: text
    content: I am longing for more—
  - type: text
    content: yet how could I take more
  - type: text
    content: '?'
  '6':
  - type: text
    content: 'His left hand '
  - type: note
    content: The Hebrew word for “left” is smowl, which can also mean “dark.” The “left hand” of the Lord speaks of the mysteries of his ways—the unseen activities of grace, which are so little understood.
  - type: text
    content: cradles my head
  - type: text
    content: 'while his right hand '
  - type: note
    content: For more on the right hand and left hand, see Prov. 3:16.
  - type: text
    content: holds me close.
  - type: text
    content: I am at rest in this love.
  - type: heading
    content: The Shepherd-King
  '7':
  - type: text
    content: Promise me, Jerusalem maidens,
  - type: text
    content: by the gentle gazelles and delicate deer,
  - type: note
    content: In the poetic imagery of the Song of Songs, “deer” and “gazelles” are symbols of the joys of love. The Septuagint reads “by all the powers and strengths of the field.”
  - type: text
    content: that you’ll not disturb my love until she is ready to arise.
  - type: heading
    content: The Shulamite
  '8':
  - type: text
    content: Listen! I hear my lover’s voice.
  - type: text
    content: I know it’s him coming to me—
  - type: text
    content: leaping with joy over mountains,
  - type: text
    content: 'skipping in love over the hills '
  - type: text
    content: that separate us
  - type: text
    content: ','
  - type: note
    content: Implied in the context of v. 17.
  - type: text
    content: to come to me.
  '9':
  - type: text
    content: 'Let me describe him:'
  - type: text
    content: he is graceful as a gazelle,
  - type: text
    content: swift as a wild stag.
  - type: text
    content: Now he comes closer,
  - type: text
    content: even to the places where I hide.
  - type: note
    content: Or “There he stands behind our wall.” Fear and religious duty will always have a wall to hide behind. The contrast is striking. He is free and leaping over mountains, but the Shulamite was enclosed and restricted behind a wall.
  - type: text
    content: He gazes into my soul,
  - type: text
    content: peering through the portal
  - type: text
    content: as he blossoms within my heart.
  - type: heading
    content: The Shepherd-King
