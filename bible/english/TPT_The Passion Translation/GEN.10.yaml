    - type: usfm
      marker: it
      children:
      - type: text
        text: Gomer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “complete” and was the ancestor of the ancient Cimmerians who are believed to have originated in southern Russia and northern Iran. Gomer is mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 38:6
      metadata:
        usfm: EZK.38.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: as an ally of Gog and enemy of Israel. Romans, Gauls, Germans, Celts, Armenians, and Britons could all be considered as descendants of Japheth and Gomer.
    marker-yv: yv-n
  - type: text
    text: 'Magog, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Magog
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “region of Gog,” and became the Scythian (Iranian) or Tartar (Russian) tribe. One church father, Jerome, states they were “Scythian nations, fierce and innumerable, who live beyond the Caucasus and the Lake Maeotis, and near the Caspian Sea, and spread out even onward to India.” It is possible that the Chinese, Japanese, Alaskans, Russians, and Native Americans could be traced back as descendants of Japheth and Magog.
    marker-yv: yv-n
  - type: text
    text: 'Madai, '
  - type: usfm
    marker: f
    children:
