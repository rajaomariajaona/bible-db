    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This chapter includes more than the names of people; it lists the names of cities, tribes, and nations. The underlying theme in this chapter is that God determines the boundaries of nations and the seasons of history. See
    - type: usfm
