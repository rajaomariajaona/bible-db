document_id: GEN.10,1849
type_code: eng
verses:
  '1':
  - type: text
    content: This is the story of the descendants of Noah’s three sons, Shem, Ham, and Japheth. After the great flood, they fathered many children.
  - type: note
    content: This begins the second ten-generation account in Genesis, and it is incredibly important for understanding human history. This chapter contains what many have described as the “Table of Nations,” the earliest ethnological table found in the literature of the ancient world. Virtually all the names included here have been verified and found in archeological sites over the past one hundred years. There are precisely seventy names mentioned here, and seventy followers of Jesus were sent out as a testimony that the gospel of his kingdom is meant for all people (see Luke 10:1–24). This chapter includes more than the names of people; it lists the names of cities, tribes, and nations. The underlying theme in this chapter is that God determines the boundaries of nations and the seasons of history. See Pss. 82:8; 96:7–10; Jer. 10:7.
  - type: heading
    content: Descendants of Japheth
  '10':
  - type: text
    content: 'The centers of his kingdom '
  - type: note
    content: Or “The beginnings of his kingdom.”
  - type: text
    content: ', Babel, '
  - type: note
    content: Or “Babylon,” which means “confusion,” “mixed,” or “chaos.” Babel was a famous city on the Euphrates in modern Iraq.
  - type: text
    content: 'Erech, '
  - type: note
    content: A region southeast of Babylon known as “Uruk” (modern Warka). Erech means “long.”
  - type: text
    content: 'and Akkad, '
  - type: note
    content: A city north of Babylon known as “Agade.” Akkad means “subtle.”
  - type: text
    content: 'were in the land of Shinar. '
  - type: note
    content: Or “Babylonia.”
  '11':
  - type: text
    content: 'From there, he went into Assyria and built '
  - type: text
    content: the cities of
  - type: text
    content: ' Nineveh, '
  - type: note
    content: Nineveh, which means “abode of the god Ninus,” was the capital of Assyria and is located 250 miles northwest of Baghdad. It is presently identified with the mounds of Kuyunjik and Nebi Yunus, which means “the prophet Jonah.”
  - type: text
    content: 'Rehoboth-Ir, '
  - type: note
    content: Rehoboth-Ir means “[city of] broad streets.”
  - type: text
    content: 'Calah, '
  - type: note
    content: Calah, which means “enthusiasm,” was one of the four great cities of Assyria.
  '12':
  - type: text
    content: 'and Resen '
  - type: note
    content: Resen, which means “fountainhead,” was one of the four great cities of Assyria.
  - type: text
    content: '(which is between the great city of Calah '
  - type: note
    content: This is modern Nimrud in Iraq, south of Mosul. It is likely called “the great city” because it was at one time the royal capital of the Assyrians.
  - type: text
    content: and Nineveh).
  '13':
  - type: text
    content: 'Egypt '
  - type: note
    content: Or “Mizraim.”
  - type: text
    content: 'was the father of the Ludites, '
  - type: note
    content: The Ludites, which means “firebrands,” are difficult to identify. They were known as warriors and descendants of the Egyptian people. Some scholars see them as Lybians and others as Lydians.
  - type: text
    content: 'Anamites, '
  - type: note
    content: The Anamites, which means “affliction of the waters,” were an unidentified people who were descendants of Egypt.
  - type: text
    content: 'Lehabites, '
  - type: note
    content: The Lehabites were considered descendants of Libya. See 2 Chron. 12:3; 16:8; Dan. 11:43.
  - type: text
    content: 'Naphtuhites, '
  - type: note
    content: Naphtuhites may mean “people of the [Nile] delta.”
  '14':
  - type: text
    content: 'Pathrusites, '
  - type: note
    content: The Pathrusites (related to the word Pathros, meaning “southland”) were inhabitants of Upper Egypt. See Jer. 44:15.
  - type: text
    content: Casluhites, and Caphtorites (the ancestors of the Philistines).
  - type: note
    content: Some scholars link this parenthetical information with the previously noted Casluhites. The Philistines were from the area of the Aegean Sea and invaded the lands of Canaan and Egypt in the thirteenth century BC. See Amos 9:7.
  '15':
  - type: text
    content: 'Canaan was the father of Sidon '
  - type: note
    content: Sidon, which means “hunting,” likely represents all of Phoenicia. See Judg. 18:7; 1 Kings 5:6; 16:31.
  - type: text
    content: '(his firstborn), the Hittites, '
  - type: note
    content: Or “Heth” (which means “terror”), the father of the Hittites, a dominant tribe in Canaan.
  '16':
  - type: text
    content: 'the Jebusites, '
  - type: note
    content: The Jebusites, which means “people of the threshing floor,” were the ancient inhabitants of Jebus, a stronghold that was conquered by David when he established Jerusalem. David purchased the plot of land upon which the temple would later be built from Araunah, the Jebusite. See Josh. 15:8; 2 Sam. 5:6–9; 24:18–25.
  - type: text
    content: 'the Amorites, '
  - type: note
    content: The Amorites, which means “talkers,” inhabited the promised land west of the Jordan before the arrival of the Israelites. See Amos 2:9–10.
  - type: text
    content: 'the Girgashites, '
  - type: note
    content: The Girgashites, which means “clay-dwellers,” lived to the east of Lake Galilee.
  '17':
  - type: text
    content: 'the Hivites, '
  - type: note
    content: The Hivites, which means “villagers,” were located in the vicinity of Gibeon (see Josh. 9:7; 11:19) near Shechem (see Gen. 34:2) and near Mt. Hermon (see Josh. 11:3).
  - type: text
    content: 'the Arkites, '
  - type: note
    content: Beginning with the Arkites, which means “gnawing,” vv. 17–18 list inhabitants of cities. The Arkites are identified with modern Arqa in Lebanon.
  - type: text
    content: 'the Sinites, '
  - type: note
    content: The Sinites, which means “those of clay,” are connected to an unidentified city, likely near Arqa in Lebanon. See 1 Chron. 1:15.
  '18':
  - type: text
    content: 'the Arvadites, '
  - type: note
    content: The Arvadites, which means “those who break loose,” are connected to a coastal city in Lebanon, known today as Ruad. See Ezek. 27:8, 11.
  - type: text
    content: 'the Zemarites, '
  - type: note
    content: The Zemarites, which means “double woolen,” are a people of a city south of Arvad.
  - type: text
    content: 'and the Hamathites. '
  - type: note
    content: The Hamathites, which means “fortress dwellers,” are the people of the city of Hamath, modern Hama in Syria. See Num. 13:21; Josh. 13:5; Judg. 3:3.
  - type: text
    content: 'The families of the Canaanites eventually scattered across '
  '19':
  - type: text
    content: 'the Canaanite territory extending from Sidon toward Gerar '
  - type: note
    content: Gerar, which means “lodging place,” was a Philistine town in Gaza, modern-day Umm.
  - type: text
    content: 'to Gaza '
  - type: note
    content: Gaza, which means “the strong one,” was a Philistine city in the southwest coastal region of Israel, modern Gaza City.
  - type: text
    content: 'including Sodom, '
  - type: note
    content: Sodom, which means “burning,” was a Canaanite city located in the region of the Dead Sea, possibly identified with Tell el-Hammam in Jordan near the Israeli border, and was destroyed by God’s judgment of fire and brimstone. See Gen. 19:1–29.
  - type: text
    content: 'Gomorrah, '
  - type: note
    content: Gomorrah, which means “submersion,” was a Canaanite city, perhaps a twin city of Sodom located in the region of the Dead Sea.
  - type: text
    content: 'Admah, '
  - type: note
    content: Admah, which means “red earth,” was a Canaanite city in the Siddim Valley.
  - type: text
    content: 'and Zeboiim, '
  - type: note
    content: Zeboiim, which means “gazelles,” was a neighboring city of Sodom.
  - type: text
    content: 'as far as Lasha. '
  - type: note
    content: Lasha, which means “fissure,” was a city of the Dead Sea Valley.
  '2':
  - type: text
    content: 'The sons of Japheth were Gomer, '
  - type: note
    content: Gomer means “complete” and was the ancestor of the ancient Cimmerians who are believed to have originated in southern Russia and northern Iran. Gomer is mentioned in Ezek. 38:6 as an ally of Gog and enemy of Israel. Romans, Gauls, Germans, Celts, Armenians, and Britons could all be considered as descendants of Japheth and Gomer.
  - type: text
    content: 'Magog, '
  - type: note
    content: Magog means “region of Gog,” and became the Scythian (Iranian) or Tartar (Russian) tribe. One church father, Jerome, states they were “Scythian nations, fierce and innumerable, who live beyond the Caucasus and the Lake Maeotis, and near the Caspian Sea, and spread out even onward to India.” It is possible that the Chinese, Japanese, Alaskans, Russians, and Native Americans could be traced back as descendants of Japheth and Magog.
  - type: text
    content: 'Madai, '
  - type: note
    content: Madai means “middle land” and was the ancestor of the Medes who lived east of Assyria, south of the Caspian Sea. It is possible that the descendants of Madai (the Medes) also include the Persians. See Isa. 13:17; 21:2; Jer. 51:11, 28.
  - type: text
    content: 'Javan, '
  - type: note
    content: Javan means “Ionia” or “Greece” and is the ancestor of a branch of Greek people.
  - type: text
    content: 'Tubal, '
  - type: note
    content: Tubal means “brought forth” and in contemporary scholarship is identified as Tabal, an Anatolian state and region north of the Black Sea, identified in Assyrian sources. There is a city in Russia named “Tubolsk.”
  - type: text
    content: 'Meshech, '
  - type: note
    content: Meshech means “drawing out” and was the ancestor of a people identified by Assyrian records as the “Muscu” and by Josephus as the Cappadocian “Mosocheni” (or “Mushki,” possibly Moscow).
  - type: text
    content: and Tiras.
  - type: note
    content: Tiras, or Tirana, meaning “desire,” was the ancestor of the Thracians, who were also called “Sea People.” According to the Book of Jubilees, they inhabited four islands in the Mediterranean. They possibly include the people who settled in the Balkans, Romania, Bulgaria, Moravia, and Italy.
  '20':
  - type: text
    content: These were the descendants of Ham by families, lands, languages, and nations.
  - type: heading
    content: Descendants of Shem
  '21':
  - type: text
    content: 'Shem, the older brother of Japheth, also had sons and was the ancestor of all the sons of Eber, '
  - type: text
    content: who were also known as “Hebrews.”
  - type: note
    content: Eber, which means “the region beyond” or “the opposite side,” was the eponymous ancestor of the Hebrews.
  '22':
  - type: text
    content: 'The sons of Shem were Elam, '
  - type: note
    content: Elam, which means “eternal one” or “eternity,” settled in Babylonia. His people’s capital city was Susa. See Gen. 14:1; Isa. 11:11.
  - type: text
    content: 'Assyria, '
  - type: note
    content: Or “Asshur,” the Hebrew word for “Assyria.”
  - type: text
    content: 'Arphaxad, '
  - type: note
    content: Arphaxad, which means “he cursed the breast,” is associated with Babylon, and some Jewish scholars identify him as the founder of the Chaldean city of Ur, the future home of Abram.
  - type: text
    content: 'Lud, '
  - type: note
    content: Lud, which means “strife,” settled in northern Africa and may be the ancestor of the Lydians of Anatolia.
  - type: text
    content: and Aram.
  - type: note
    content: Aram, which means “exalted,” refers to the Arameans who eventually settled in Syria. Through their influence the Aramaic language shaped commerce and diplomacy.
  '23':
  - type: text
    content: 'The sons of Aram were Uz, '
  - type: note
    content: Uz, which means “woodland,” was the land of Job, possibly in Arabia.
  - type: text
    content: 'Hul, '
  - type: note
    content: Hul, which means “circle,” was the ancestor of a Syrian people group, possibly the Armenians.
  - type: text
    content: 'Gether, '
  - type: note
    content: Gether, which means “fear,” according to Josephus, was the ancestor of the Bactrians of Central Asia.
  - type: text
    content: and Mash.
  - type: note
    content: Or “Meshech” (LXX; see 1 Chron. 1:17). Mash means “drawn out.”
  '24':
  - type: text
    content: 'Arphaxad was the father of Shelah, '
  - type: note
    content: Shelah means “sent/shot forth [like a prayer].”
  - type: text
    content: the father of Eber.
  '25':
  - type: text
    content: 'Eber was the father of two sons: Peleg, (or '
  - type: text
    content: “Division,”
  - type: text
    content: ' '
  - type: note
    content: Or “Earthquake.”
  - type: text
    content: 'for during his lifetime the earth was divided), '
  - type: note
    content: “Division” is a play on words for Peleg, which means “disperse,” “divide,” or “cut into channels.” The Hebrew word ’eretz, which means “earth,” is more commonly translated “land.” In that case, “the earth was divided” could point to a tectonic dividing of the continents during the lifetime of Peleg. The Greeks call the Aegean Sea the “Archipelago,” or the “first sea.” There is some evidence to link this with the scientific theory of continental drift; the parting of the continents during the days of Peleg. Most scholars, however, view this “division” as the dividing of languages and dispersing of nations at the Tower of Babel.
  - type: text
    content: 'and his brother Joktan, '
  - type: note
    content: Joktan, which means “he will be made little,” was the ancestor of various Arabian tribes. His Arabic name means “wakeful.”
  - type: text
    content: 'the father of Almodad, '
  - type: note
    content: Almodad means “not measured,” or “God is friend” (LXX).
  - type: text
    content: 'Sheleph, '
  - type: note
    content: Sheleph, which means “drawn out,” was the possible ancestor of various Yemenite tribes.
  - type: text
    content: 'Hazarmaveth, '
  - type: note
    content: Hazarmaveth, which means “oasis of Mot” or “the god of death,” was the possible ancestor of people who settled east of Yemen. He is equated with modern Hadramawt in Yemen.
  - type: text
    content: 'Jerah, '
  - type: note
    content: Jerah, which means “moon” or “month,” likely settled in south Arabia.
  '27':
  - type: text
    content: 'Hadoram, '
  - type: note
    content: Hadoram, which means “the god Hadad is exalted,” was the possible ancestor of the Yemenite people (the Sabeans).
  - type: text
    content: 'Uzal, '
  - type: note
    content: Uzal (or “Azal”) was the ancient name of Sanaa, capital of Yemen.
  - type: text
    content: 'Diklah, '
  - type: note
    content: Diklah means “date palm.”
  '28':
  - type: text
    content: 'Obal, '
  - type: note
    content: Obal means “stripped bare.” There are a number of possible locations in Yemen of a city once named Obal.
  - type: text
    content: 'Abimael, '
  - type: note
    content: Abimael means “a father sent by God” or “truly, God is my father.” Abimael was an ancestor of Arabian tribes.
  - type: text
    content: 'Sheba, '
  - type: note
    content: Descendants of Sheba settled in southern Arabia. Sheba is sometimes identified with the entire Arabian Peninsula. See 1 Kings 10:1–10.
  '29':
  - type: text
    content: 'Ophir, '
  - type: note
    content: Ophir is known as the east coast of Arabia and is frequently connected to gold, i.e., “the gold of Ophir.”
  - type: text
    content: 'Havilah, '
  - type: note
    content: This Havilah is not believed to be the same Havilah mentioned in Gen. 2:11. This region of Havilah was in Arabia toward the Red Sea.
  - type: text
    content: 'and Jobab. '
  - type: note
    content: Jobab, which means “desert,” is an unknown region likely located in Arabia.
  - type: text
    content: 'All the descendants of Joktan '
  '3':
  - type: text
    content: 'The sons of Gomer were Ashkenaz, '
  - type: note
    content: Ashkenaz means “scattered” and was the ancestor of the northern Indo-Germanic tribes and the father of the Saxons and Scandinavians.
  - type: text
    content: 'Riphath, '
  - type: note
    content: Riphath means “spoken” and was the ancestor of those that settled in Carpathia and Paphlagonia.
  - type: text
    content: and Togarmah.
  - type: note
    content: Togarmah means “you will break her.”
  '30':
  - type: text
    content: 'lived in the territory that extends all the way from Mesha '
  - type: note
    content: Mesha, which means “freedom,” is the region on the east coast of the Red Sea.
  - type: text
    content: 'toward the eastern hills of Sephar. '
  - type: note
    content: Sephar, which means “a numbering,” is the hilly region near the Red Sea.
  '31':
  - type: text
    content: 'These were the families of Shem according to their genealogies, by their families, lands, languages, and nations. '
  '32':
  - type: text
    content: After the flood, Noah’s descendants formed nations as the people spread throughout the earth.
  '4':
  - type: text
    content: 'The sons of Javan were Elishah, '
  - type: note
    content: Elishah means “God of the coming,” or “God of the coming one,” and he was the ancestor of those who populated modern-day Cyprus. He is mentioned in Ezek. 27:7 as the source of the purple dye shipped to Tyre.
  - type: text
    content: 'Tarshish, '
  - type: note
    content: Tarshish means “yellow stone” and is mentioned twenty-eight times in the Bible but is difficult to identify. Some believe he was the ancestor of those who settled in southern Turkey, although there is evidence that Tarshish was the ancestor of Sardinia or Tartessus (in Spain). See 1 Kings 10:22; Jer. 10:9; Jonah 1:3.
  - type: text
    content: 'Cyprus, '
  - type: note
    content: Or “Kittim,” which means “bruisers” and is an ancient name for Cyprus. There is a Cyprian city named Kition.
  - type: text
    content: and Rhodes.
  - type: note
    content: Or “Dodanim” or “Rodanim” (see 1 Chron. 1:7). Dodanim means “leaders” and is most often associated with Greece (e.g., the cities of Rhodes, Dardanelles).
  '5':
  - type: text
    content: All of Japheth’s descendants lived in their respective tribes and regions, each group speaking its own language. From there, the people spread to distant shores and faraway lands.
  - type: heading
    content: Descendants of Ham
  '6':
  - type: text
    content: 'The sons of Ham '
  - type: note
    content: The Hamites are listed in four primary subgroups from south to north. The first three are in Africa and last in the land bridge between Africa and Asia.
  - type: text
    content: 'were Ethiopia, '
  - type: note
    content: Or “Cush” or “Kesh” (Egyptian), whose descendants settled in Ethiopia and southern Sudan.
  - type: text
    content: 'Egypt, '
  - type: note
    content: Or “Mizraim,” which means “land of the Copts,” whose descendants settled in Egypt.
  - type: text
    content: 'Libya, '
  - type: note
    content: Or “Put,” which means “a bow,” whose descendants settled in Libya and possibly Somalia. See Jer. 46:9.
  - type: text
    content: and Canaan.
  - type: note
    content: The descendants of Canaan settled in Palestine (Phoenicia).
  '7':
  - type: text
    content: 'The sons of Cush were Seba, '
  - type: note
    content: Seba means “drink” and is the ancient name for Meroë in northeast Africa. See Ps. 72:10; Isa. 43:3.
  - type: text
    content: 'Havilah, Sabtah, '
  - type: note
    content: This is the only place Sabtah (“striking”) is mentioned in the Bible. It is likely a region in southern Arabia.
  - type: text
    content: 'Raamah, '
  - type: note
    content: Raamah means “horse’s mane” and is perhaps a south Arabian city mentioned in ancient inscriptions. See Ezek. 27:22.
  - type: text
    content: and Sabteca.
  - type: note
    content: The descendants of Sabteca settled eastward in Samudake, along the Persian Gulf.
  - type: text
    content: 'The sons of Raamah were Sheba '
  - type: note
    content: The descendants of Sheba, which means “an oath,” were the Sabaeans who lived in southwest Arabia and were trading merchants. See Isa. 60:6.
  - type: text
    content: and Dedan.
  - type: note
    content: The descendants of Dedan, which means “lowlands,” are mentioned as traders with caravans of camels. See Isa. 21:13; Jer. 25:23; 49:8. Dedan may be identified as the modern-day oasis of Al-‘Ula in northern Arabia or possibly Kuwait.
  '8':
  - type: text
    content: 'Cush also had a son named Nimrod, who became known as the first mighty conqueror. '
  - type: note
    content: Or “strong man” or “giant” (LXX).
  '9':
  - type: text
    content: 'He was a mighty despot before '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Or “a mighty hunter before Yahweh.” Nimrod was a hunter of men (not simply animals), a potentate, and a terrorist. See Jer. 16:16. Some etymological studies link Nimrod to the word for “rebel” or “we will rebel.” Nimrod was the first despot and anarchist. Many believe that Nimrod was also named “Marduk,” whom scholars identify as the god of the Babylonian religions. His wife was Semiramis. They bore a child that is identified by some as the Egyptian Osiris and the Hindu Vishnu. See 1 Chron. 1:10.
  - type: text
    content: '. There was a saying, “Like Nimrod, a mighty despot before '
  - type: text
    content: Yahweh
  - type: text
    content: '.” '
