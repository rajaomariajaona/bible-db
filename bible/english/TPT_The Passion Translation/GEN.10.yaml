      text: '1'
  - type: text
    text: This is the story of the descendants of Noah’s three sons, Shem, Ham, and Japheth. After the great flood, they fathered many children.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This begins the second ten-generation account in Genesis, and it is incredibly important for understanding human history. This chapter contains what many have described as the “Table of Nations,” the earliest ethnological table found in the literature of the ancient world. Virtually all the names included here have been verified and found in archeological sites over the past one hundred years. There are precisely seventy names mentioned here, and seventy followers of Jesus were sent out as a testimony that the gospel of his kingdom is meant for all people (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
