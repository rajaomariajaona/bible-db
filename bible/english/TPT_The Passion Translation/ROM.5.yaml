document_id: ROM.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Our New Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our faith in Jesus transfers God’s righteousness to us and he now declares us flawless in his eyes. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “having already been declared righteous.” What bliss! We are declared righteous in the eyes of the Holy God. This is the wonder of grace!
      marker-yv: yv-n
    - type: text
      text: 'This means we can now enjoy true and lasting peace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Let us enjoy peace with God.” The Greek word for peace is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: eirene
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and can also mean “to join” (as in a dove-tail joint). We have entered into the union of our lives with God’s peace and enjoy lasting friendship with God. The Hebrew word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means abundant peace and well-being.'
      marker-yv: yv-n
    - type: text
      text: 'with God, all because of what our Lord Jesus, the Anointed One, has done for us. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if while we were still enemies, God fully reconciled '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek verb for reconciled is actually “exchanged.” That is, he exchanged our sins for his righteousness and thus reconciled us to God. The reign of death is caused by the guilt of sin.
      marker-yv: yv-n
    - type: text
      text: 'us to himself through the death of his Son, then something greater than friendship is ours. Now that we are at peace with God, and because we share in his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: resurrection
    - type: text
      text: ' life, how much more we will be rescued from sin’s dominion!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And even more than that, we overflow with triumphant joy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “boasting” (in God).
      marker-yv: yv-n
    - type: text
      text: in our new relationship of living reconciled to God—all because of Jesus Christ!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gift of Grace Greater Than Sin
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Adam sinned, the entire world was affected. Sin entered human experience, and death was the result. And so death followed this sin, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “This sin” is translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'casting its shadow over all humanity, because all have sinned. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sin was in the world before Moses gave the written law, but it was not charged against them where no law existed. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, there was no ability to be charged and found guilty of breaking the law.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet death reigned '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Death is a temporary monarch that exercises dominion over humanity, but one day it will be completely deposed and defeated through Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: 'as king from Adam to Moses even though they hadn’t broken a command '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the way Adam had
    - type: text
      text: '. The first man, Adam, was a picture '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “imprint.”
      marker-yv: yv-n
    - type: text
      text: of the Messiah, who was to come.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The actions of both Adam and Christ affect the entire world. Death passes to all who are in Adam; life passes to all who are in Christ. Each is a corporate head of a race of people. God sees every person as in Adam or in Christ.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, there is no comparison between Adam’s transgression and the gracious gift that we experience. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: For the magnitude of the gift far outweighs the crime
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although clearly implied in the text, this summary of explanation is necessary as it makes explicit Paul’s contrast between Adam’s transgression and Christ’s redemption.
      marker-yv: yv-n
    - type: text
      text: 'It’s true that many died because of one man’s transgression, but how much greater will God’s grace and his gracious gift of acceptance overflow '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “multiply” or “superabound.”
      marker-yv: yv-n
    - type: text
      text: to many because of what one man, Jesus, the Messiah, did for us!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this free-flowing gift imparts to us much more than what was given to us through the one who sinned. For because of one transgression, we are all facing a death sentence with a verdict of “Guilty!” But this gracious gift leaves us free from our many failures '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “falls,” or “trespasses.”
      marker-yv: yv-n
    - type: text
      text: and brings us into the perfect righteousness of God—acquitted with the words “Not guilty!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Death once held us in its grip, and by the blunder of one man, death reigned as king over humanity. But now, how much more '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are four “much mores” in this chapter. Two point to our future deliverance (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and two point to the abundance of grace which we now experience (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'are we held in the grip of grace and continue reigning as kings in life, enjoying our regal freedom through the gift of perfect righteousness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the gift of covenant membership.”
      marker-yv: yv-n
    - type: text
      text: in the one and only Jesus, the Messiah!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In other words, just as condemnation came upon all people through one transgression, so through one righteous act '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Jesus’ sacrifice
    - type: text
      text: ', the perfect righteousness that makes us right with God and leads us to a victorious life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “which brings righteousness of life.”
      marker-yv: yv-n
    - type: text
      text: 'is now available to all. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One man’s disobedience opened the door for all humanity to become sinners. So also one man’s obedience opened the door for many to be made perfectly right with God and acceptable to him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our faith guarantees us permanent access into this marvelous kindness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “grace.”
      marker-yv: yv-n
    - type: text
      text: that has given us a perfect relationship with God. What incredible joy bursts forth within us as we keep on celebrating our hope of experiencing God’s glory!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, the law was introduced into God’s plan to bring the reality of human sinfulness out of hiding. And yet, wherever sin increased, there was more than enough of God’s grace to triumph all the more! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul speaks of God’s grace in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as superabundant, but then adds the prefix,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: huper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“hyper”), making grace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: huperperisseuō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which could be translated super-hyperabundant grace! There is an endless fountain of grace that has been opened for us in Christ!'
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And just as sin reigned through death, so also this sin-conquering grace will reign as king through righteousness, imparting eternal life through Jesus, our Lord and Messiah!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But that’s not all! Even in times of trouble we have a joyful confidence, knowing that our pressures '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: thlipsis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', often translated “tribulation.”'
      marker-yv: yv-n
    - type: text
      text: 'will develop in us patient endurance. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And patient endurance will refine our character, and proven character leads us back to hope. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this hope is not a disappointing fantasy, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “This hope does not put one to shame.”
      marker-yv: yv-n
    - type: text
      text: because we can now experience the endless love of God cascading into our hearts through the Holy Spirit who lives in us!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “was given to us.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when the time was right, the Anointed One came and died '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to demonstrate his love
    - type: text
      text: ' for sinners who were entirely helpless, weak, and powerless to save themselves.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, would anyone dare to die for the sake of a wicked person? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek reads, “Rarely would anyone die for a righteous person.”
      marker-yv: yv-n
    - type: text
      text: 'We can all understand if someone was willing to die for a truly noble person. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Christ proved God’s passionate love for us by dying in our place while we were still lost and ungodly!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there is still much more to say of his unfailing love for us! For through the blood of Jesus we have heard the powerful declaration, “You are now righteous in my sight.” And because of the sacrifice of Jesus, you will never experience the wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of God
    - type: text
      text: '. '
