document_id: ROM.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our New Life
  - type: text
    content: 'Our faith in Jesus transfers God’s righteousness to us and he now declares us flawless in his eyes. '
  - type: note
    content: Or “having already been declared righteous.” What bliss! We are declared righteous in the eyes of the Holy God. This is the wonder of grace!
  - type: text
    content: 'This means we can now enjoy true and lasting peace '
  - type: note
    content: Or “Let us enjoy peace with God.” The Greek word for peace is eirene and can also mean “to join” (as in a dove-tail joint). We have entered into the union of our lives with God’s peace and enjoy lasting friendship with God. The Hebrew word is shalom, which means abundant peace and well-being.
  - type: text
    content: 'with God, all because of what our Lord Jesus, the Anointed One, has done for us. '
  '10':
  - type: text
    content: 'So if while we were still enemies, God fully reconciled '
  - type: note
    content: The Greek verb for reconciled is actually “exchanged.” That is, he exchanged our sins for his righteousness and thus reconciled us to God. The reign of death is caused by the guilt of sin.
  - type: text
    content: 'us to himself through the death of his Son, then something greater than friendship is ours. Now that we are at peace with God, and because we share in his '
  - type: text
    content: resurrection
  - type: text
    content: ' life, how much more we will be rescued from sin’s dominion!'
  - type: note
    content: See also John 14:19; Heb. 7:25.
  '11':
  - type: text
    content: 'And even more than that, we overflow with triumphant joy '
  - type: note
    content: Or “boasting” (in God).
  - type: text
    content: in our new relationship of living reconciled to God—all because of Jesus Christ!
  - type: heading
    content: The Gift of Grace Greater Than Sin
  '12':
  - type: text
    content: 'When Adam sinned, the entire world was affected. Sin entered human experience, and death was the result. And so death followed this sin, '
  - type: note
    content: “This sin” is translated from the Aramaic.
  - type: text
    content: 'casting its shadow over all humanity, because all have sinned. '
  '13':
  - type: text
    content: 'Sin was in the world before Moses gave the written law, but it was not charged against them where no law existed. '
  - type: note
    content: That is, there was no ability to be charged and found guilty of breaking the law.
  '14':
  - type: text
    content: 'Yet death reigned '
  - type: note
    content: Death is a temporary monarch that exercises dominion over humanity, but one day it will be completely deposed and defeated through Jesus Christ.
  - type: text
    content: 'as king from Adam to Moses even though they hadn’t broken a command '
  - type: text
    content: the way Adam had
  - type: text
    content: '. The first man, Adam, was a picture '
  - type: note
    content: Or “imprint.”
  - type: text
    content: of the Messiah, who was to come.
  - type: note
    content: The actions of both Adam and Christ affect the entire world. Death passes to all who are in Adam; life passes to all who are in Christ. Each is a corporate head of a race of people. God sees every person as in Adam or in Christ.
  '15':
  - type: text
    content: 'Now, there is no comparison between Adam’s transgression and the gracious gift that we experience. '
  - type: text
    content: For the magnitude of the gift far outweighs the crime
  - type: text
    content: '. '
  - type: note
    content: Although clearly implied in the text, this summary of explanation is necessary as it makes explicit Paul’s contrast between Adam’s transgression and Christ’s redemption.
  - type: text
    content: 'It’s true that many died because of one man’s transgression, but how much greater will God’s grace and his gracious gift of acceptance overflow '
  - type: note
    content: Or “multiply” or “superabound.”
  - type: text
    content: to many because of what one man, Jesus, the Messiah, did for us!
  '16':
  - type: text
    content: 'And this free-flowing gift imparts to us much more than what was given to us through the one who sinned. For because of one transgression, we are all facing a death sentence with a verdict of “Guilty!” But this gracious gift leaves us free from our many failures '
  - type: note
    content: Or “falls,” or “trespasses.”
  - type: text
    content: and brings us into the perfect righteousness of God—acquitted with the words “Not guilty!”
  '17':
  - type: text
    content: 'Death once held us in its grip, and by the blunder of one man, death reigned as king over humanity. But now, how much more '
  - type: note
    content: There are four “much mores” in this chapter. Two point to our future deliverance (vv. 9, 10), and two point to the abundance of grace which we now experience (vv. 15, 17).
  - type: text
    content: 'are we held in the grip of grace and continue reigning as kings in life, enjoying our regal freedom through the gift of perfect righteousness '
  - type: note
    content: Or “the gift of covenant membership.”
  - type: text
    content: in the one and only Jesus, the Messiah!
  '18':
  - type: text
    content: 'In other words, just as condemnation came upon all people through one transgression, so through one righteous act '
  - type: text
    content: of Jesus’ sacrifice
  - type: text
    content: ', the perfect righteousness that makes us right with God and leads us to a victorious life '
  - type: note
    content: As translated from the Aramaic. The Greek is “which brings righteousness of life.”
  - type: text
    content: 'is now available to all. '
  '19':
  - type: text
    content: 'One man’s disobedience opened the door for all humanity to become sinners. So also one man’s obedience opened the door for many to be made perfectly right with God and acceptable to him. '
  '2':
  - type: text
    content: 'Our faith guarantees us permanent access into this marvelous kindness '
  - type: note
    content: Or “grace.”
  - type: text
    content: that has given us a perfect relationship with God. What incredible joy bursts forth within us as we keep on celebrating our hope of experiencing God’s glory!
  '20':
  - type: text
    content: 'So then, the law was introduced into God’s plan to bring the reality of human sinfulness out of hiding. And yet, wherever sin increased, there was more than enough of God’s grace to triumph all the more! '
  - type: note
    content: Paul speaks of God’s grace in v. 17 as superabundant, but then adds the prefix, huper (“hyper”), making grace huperperisseuō, which could be translated super-hyperabundant grace! There is an endless fountain of grace that has been opened for us in Christ!
  '21':
  - type: text
    content: And just as sin reigned through death, so also this sin-conquering grace will reign as king through righteousness, imparting eternal life through Jesus, our Lord and Messiah!
  '3':
  - type: text
    content: 'But that’s not all! Even in times of trouble we have a joyful confidence, knowing that our pressures '
  - type: note
    content: This is the Greek word thlipsis, often translated “tribulation.”
  - type: text
    content: 'will develop in us patient endurance. '
  '4':
  - type: text
    content: 'And patient endurance will refine our character, and proven character leads us back to hope. '
  '5':
  - type: text
    content: 'And this hope is not a disappointing fantasy, '
  - type: note
    content: Or “This hope does not put one to shame.”
  - type: text
    content: because we can now experience the endless love of God cascading into our hearts through the Holy Spirit who lives in us!
  - type: note
    content: Or “was given to us.”
  '6':
  - type: text
    content: 'For when the time was right, the Anointed One came and died '
  - type: text
    content: to demonstrate his love
  - type: text
    content: ' for sinners who were entirely helpless, weak, and powerless to save themselves.'
  '7':
  - type: text
    content: 'Now, would anyone dare to die for the sake of a wicked person? '
  - type: note
    content: As translated from the Aramaic. The Greek reads, “Rarely would anyone die for a righteous person.”
  - type: text
    content: 'We can all understand if someone was willing to die for a truly noble person. '
  '8':
  - type: text
    content: But Christ proved God’s passionate love for us by dying in our place while we were still lost and ungodly!
  '9':
  - type: text
    content: 'And there is still much more to say of his unfailing love for us! For through the blood of Jesus we have heard the powerful declaration, “You are now righteous in my sight.” And because of the sacrifice of Jesus, you will never experience the wrath '
  - type: text
    content: of God
  - type: text
    content: '. '
