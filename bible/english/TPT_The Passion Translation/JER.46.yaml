    content: Horsemen, harness the horses
  - type: text
    content: and mount up!
  - type: text
    content: Prepare for battle and put on your helmets!
  - type: text
    content: Put on your armor
  - type: text
    content: and sharpen your spears!”
  '5':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' asks,'
  - type: text
    content: “What do I see?
  - type: text
    content: The army breaking ranks and retreating?
  - type: text
    content: Their heroes flee for their lives,
  - type: text
    content: beaten, defeated, and terrified,
  - type: text
    content: not once looking back.
  '6':
  - type: text
    content: Don’t let the swift ones get away.
  - type: text
    content: Stop the warriors from fleeing!
  - type: text
    content: In the north near the Euphrates River,
  - type: text
    content: they collapse, slain in battle.
  '7':
  - type: text
    content: “Who is this that rises like the Nile,
  - type: note
    content: Jeremiah described the military activity of Egypt as a flood that covers the land. Isaiah used similar imagery to describe the invasion of Assyria over one hundred years earlier (see Isa. 8:6–8).
  - type: text
    content: like a river in flood stage?
  '8':
  - type: text
    content: Why, it’s Egypt that rose like the Nile,
  - type: text
    content: like a river in flood stage.
  - type: text
    content: 'It is '
  - type: text
    content: prideful Pharaoh
  - type: text
    content: ' who says,'
  - type: text
    content: ‘I will rise and cover the earth.
  - type: text
    content: I will destroy cities and the people who live in them.’
  '9':
  - type: text
    content: Go ahead, Egypt
  - type: text
    content: ', tell your horsemen—‘Charge!’'
  - type: text
    content: And your chariots—‘Ride forth!’
  - type: text
    content: March out your mighty warriors,
  - type: text
    content: your hired
  - type: text
    content: ' soldiers from Ethiopia and Libya'
  - type: note
    content: Or “Put,” a territory in north Africa, west of Egypt. See Ezek. 30:5.
  - type: text
    content: with shield in hand,
  - type: text
    content: 'your archers from Lydia '
  - type: note
    content: Or “the Ludim,” a people of Africa (see Gen. 10:13 and the second footnote). Current scholarship identifies the Ludim as the Lydians. See Ezek. 30:5 and the third footnote.
  - type: text
    content: skilled with the bow.
