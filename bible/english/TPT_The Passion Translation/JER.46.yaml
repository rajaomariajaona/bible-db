document_id: JER.46,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Egypt
  - type: text
    content: 'The words of '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoken through the prophet Jeremiah against the nations. '
  - type: note
    content: Verse 1 serves as a summary of most of the final section of Jeremiah (chs. 46–51), which contains a number of prophecies against foreign nations. The background of ch. 46 can be found in 2 Kings 23:29. The Septuagint places this collection of oracles after Jer. 25. Jeremiah, like the prophets of old, saw Yahweh as the one who controlled the history of the world and the destiny of nations. See Isa. 13–23; Ezek. 25–32.
  '10':
  - type: text
    content: 'For this is the day of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: a day when he takes vengeance on his foes.
  - type: text
    content: The sword will devour until gorged,
  - type: text
    content: until drunk on their blood.
  - type: text
    content: 'For Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: is hosting a sacrificial feast
  - type: text
    content: in the land of the north, by the river Euphrates.
  '11':
  - type: text
    content: Go ahead
  - type: text
    content: —try to find some healing medicine in Gilead,
  - type: text
    content: you frail, unfortunate people of Egypt!
  - type: note
    content: Or “virgin daughter of Egypt.”
  - type: text
    content: None of your medicine will do you any good.
  '12':
  - type: text
    content: The nations have heard of your humiliation;
  - type: text
    content: all the world has heard your scream.
  - type: text
    content: For your warriors stumble over each other.
  - type: text
    content: No one escapes with his life.”
  - type: heading
    content: Nebuchadnezzar Invades Egypt
  '13':
  - type: text
    content: 'This is the message '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to the prophet Jeremiah about Nebuchadnezzar king of Babylon advancing to strike Egypt.'
  '14':
  - type: text
    content: “Tell this throughout Egypt;
  - type: text
    content: proclaim it in the cities of Migdol, Memphis, and Tahpanhes.
  - type: text
    content: Say to them, ‘Stand your ground, grab your weapons,
  - type: text
    content: for the war will destroy everything around you.’
  '15':
  - type: text
    content: 'Why has your mighty god Apis '
  - type: note
    content: Apis (or Hapi) was the sacred bull worshiped in Memphis and called Egypt’s “strong one.” He was associated with the solar cult and was known for the sun disk between his horns.
  - type: text
    content: fled?
  - type: text
    content: Why did your bull-idol topple over?
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: the true God
  - type: text
    content: ', has overthrown him.'
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' made many stumble and fall.'
  - type: text
    content: Falling over each other,
  - type: text
    content: they say, ‘Get up! Go back to our own people,
  - type: text
    content: to our homeland,
  - type: text
    content: and get away from our enemies’ devastating sword!’
  '17':
  - type: text
    content: They have given a nickname to Pharaoh, king of Egypt—
  - type: text
    content: ‘The Loudmouth Who Missed His Opportunity!’
  '18':
  - type: text
    content: “As surely as I am the King, the Living God,
  - type: text
    content: 'whose name is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'I declare that there is one coming '
  - type: note
    content: That is, Nebuchadnezzar.
  - type: text
    content: who
  - type: text
    content: will tower over you
  - type: text
    content: like Mount Tabor towers over the hills,
  - type: text
    content: 'and like Mount Carmel '
  - type: note
    content: Mount Carmel stands at 1,790 feet (546 meters) above sea level and is on the coast of northern Israel at the end of the Jezreel Valley.
  - type: text
    content: stands high above the sea.
  '19':
  - type: text
    content: Get your bags packed to go into exile,
  - type: text
    content: fair people of Egypt.
  - type: text
    content: Memphis will be reduced to a desert,
  - type: text
    content: a desolate, uninhabited wasteland.
  '2':
  - type: text
    content: 'This is a prophecy against the army of Pharaoh Neco '
  - type: note
    content: Pharaoh Neco defeated and killed King Josiah at Megiddo in 609 BC. Later, he deposed Josiah’s successor, King Jehoahaz, and replaced him with Jehoiakim (see 2 Kings 23:29–34). Afterward, Pharaoh Neco clashed with Nebuchadnezzar, who defeated him in 605 BC.
  - type: text
    content: 'of Egypt at Carchemish '
  - type: note
    content: Carchemish was the capital of the northern part of the region of Syria on the border of Turkey. Situated on the bank of the Euphrates, Carchemish was once the capital of the Hittite Empire.
  - type: text
    content: on the river Euphrates. King Nebuchadnezzar and the Babylonians defeated the Egyptians in the fourth year of the reign of Jehoiakim son of Josiah, king of Judah.
  '20':
  - type: text
    content: Egypt was a lovely, splendid heifer,
  - type: text
    content: 'but a stinging fly '
  - type: note
    content: Or “horsefly.” The Hebrew word qerets, a hapax legomenon, comes from a verb meaning “to nip [bite, cut].”
  - type: text
    content: from the north has settled on her.
  '21':
  - type: text
    content: The mercenaries she had with her
  - type: text
    content: were like pampered, fattened calves,
  - type: text
    content: but they, too, turned and ran away;
  - type: text
    content: they failed to stand and fight.
  - type: text
    content: 'For the day has come when '
  - type: text
    content: Yahweh
  - type: text
    content: will bring disaster and punishment to them.
  '22':
  - type: text
    content: Egypt hisses like a snake crawling away,
  - type: note
    content: The simile of a snake fleeing is pointed, since the snake was a common icon on the royal insignia of Egypt.
  - type: text
    content: as her enemies advance in force
  - type: text
    content: and attack her with axes
  - type: text
    content: like woodsmen chopping down trees.
  '23':
  - type: text
    content: They shall cut down her impenetrable forest,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “because they are more numerous than locusts;
  - type: text
    content: they are without number.
  '24':
  - type: text
    content: Fair Egypt will be put to shame.
  - type: text
    content: I will give her over to the power of a nation from the north.”
  '25':
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, says: “Behold, I will punish Amon, '
  - type: note
    content: Or “Amun.” This refers to the patron deity of Thebes, who was worshiped as the sun god. Amon later merged with Ra to become Amon-Ra, the chief deity of Egypt.
  - type: text
    content: 'the god of the Egyptians in the city of Thebes. '
  - type: note
    content: Or “the city of No,” modern-day Luxor. Thebes was the ancient capital of Upper Egypt in the south. The invasion of Babylon would begin in the north (Memphis) and continue to the south (Thebes). See Nah. 3:8.
  - type: text
    content: 'Yes, I will punish Egypt, her gods, her rulers, Pharaoh, and those who put their trust in him. '
  '26':
  - type: text
    content: 'I will hand them over to those who seek their lives, to Nebuchadnezzar king of Babylon and his commanders. But afterward, Egypt will be inhabited again as in the past,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: God Will Save His People
  '27':
  - type: text
    content: “Do not yield to fear, my servant Jacob.
  - type: text
    content: Israel, do not be alarmed.
  - type: text
    content: For I will rescue you and your descendants
  - type: text
    content: from that foreign land in which you are held captive.
  - type: text
    content: You will return and live in peace,
  - type: note
    content: See Hos. 6:1–3.
  - type: text
    content: safe and secure, with no one to make you afraid.”
  '28':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares to you, “My servant Jacob,'
  - type: text
    content: 'Do not be afraid, for I am with you '
  - type: text
    content: and will save you
  - type: text
    content: .
  - type: text
    content: Someday, I will bring destruction to all the nations
  - type: text
    content: where I have driven you,
  - type: text
    content: but I will not destroy you.
  - type: text
    content: Let me assure you
  - type: text
    content: ', I will discipline you'
  - type: text
    content: but in moderation.
  - type: text
    content: I will not allow you to go entirely unpunished.”
  '3':
  - type: text
    content: Egypt’s commanders shout
  - type: text
    content: ':'
  - type: text
    content: “Shields up, both large and small!
  - type: text
    content: Onward to battle!
  '4':
