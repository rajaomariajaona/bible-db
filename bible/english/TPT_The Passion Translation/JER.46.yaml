      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: serves as a summary of most of the final section of Jeremiah (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 46–51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), which contains a number of prophecies against foreign nations. The background of ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '46'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Septuagint places this collection of oracles after
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jeremiah, like the prophets of old, saw
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as the one who controlled the history of the world and the destiny of nations. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Isa. 13–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezek. 25–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For this is the day of Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day when he takes vengeance on his foes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will devour until gorged,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until drunk on their blood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is hosting a sacrificial feast
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the land of the north, by the river Euphrates.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Go ahead
    - type: text
      text: —try to find some healing medicine in Gilead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you frail, unfortunate people of Egypt!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “virgin daughter of Egypt.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: None of your medicine will do you any good.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The nations have heard of your humiliation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the world has heard your scream.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your warriors stumble over each other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one escapes with his life.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar Invades Egypt
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This is the message '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to the prophet Jeremiah about Nebuchadnezzar king of Babylon advancing to strike Egypt.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Tell this throughout Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclaim it in the cities of Migdol, Memphis, and Tahpanhes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to them, ‘Stand your ground, grab your weapons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the war will destroy everything around you.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Why has your mighty god Apis '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Apis (or Hapi) was the sacred bull worshiped in Memphis and called Egypt’s “strong one.” He was associated with the solar cult and was known for the sun disk between his horns.
      marker-yv: yv-n
    - type: text
      text: fled?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why did your bull-idol topple over?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the true God
    - type: text
      text: ', has overthrown him.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' made many stumble and fall.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Falling over each other,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they say, ‘Get up! Go back to our own people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to our homeland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and get away from our enemies’ devastating sword!’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They have given a nickname to Pharaoh, king of Egypt—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The Loudmouth Who Missed His Opportunity!’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “As surely as I am the King, the Living God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'whose name is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I declare that there is one coming '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Nebuchadnezzar.
      marker-yv: yv-n
    - type: text
      text: who
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will tower over you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like Mount Tabor towers over the hills,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and like Mount Carmel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mount Carmel stands at 1,790 feet (546 meters) above sea level and is on the coast of northern Israel at the end of the Jezreel Valley.
      marker-yv: yv-n
    - type: text
      text: stands high above the sea.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Get your bags packed to go into exile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fair people of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Memphis will be reduced to a desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a desolate, uninhabited wasteland.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'This is a prophecy against the army of Pharaoh Neco '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pharaoh Neco defeated and killed King Josiah at Megiddo in 609 BC. Later, he deposed Josiah’s successor, King Jehoahaz, and replaced him with Jehoiakim (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:29–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Afterward, Pharaoh Neco clashed with Nebuchadnezzar, who defeated him in 605 BC.
      marker-yv: yv-n
    - type: text
      text: 'of Egypt at Carchemish '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Carchemish was the capital of the northern part of the region of Syria on the border of Turkey. Situated on the bank of the Euphrates, Carchemish was once the capital of the Hittite Empire.
      marker-yv: yv-n
    - type: text
      text: on the river Euphrates. King Nebuchadnezzar and the Babylonians defeated the Egyptians in the fourth year of the reign of Jehoiakim son of Josiah, king of Judah.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Egypt was a lovely, splendid heifer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but a stinging fly '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “horsefly.” The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qerets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a hapax legomenon, comes from a verb meaning “to nip [bite, cut].”'
      marker-yv: yv-n
    - type: text
      text: from the north has settled on her.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The mercenaries she had with her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: were like pampered, fattened calves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they, too, turned and ran away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they failed to stand and fight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the day has come when '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will bring disaster and punishment to them.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Egypt hisses like a snake crawling away,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The simile of a snake fleeing is pointed, since the snake was a common icon on the royal insignia of Egypt.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as her enemies advance in force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and attack her with axes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like woodsmen chopping down trees.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: They shall cut down her impenetrable forest,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “because they are more numerous than locusts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are without number.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fair Egypt will be put to shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give her over to the power of a nation from the north.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, Commander of Angel Armies, says: “Behold, I will punish Amon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Amun.” This refers to the patron deity of Thebes, who was worshiped as the sun god. Amon later merged with Ra to become Amon-Ra, the chief deity of Egypt.
      marker-yv: yv-n
    - type: text
      text: 'the god of the Egyptians in the city of Thebes. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the city of No,” modern-day Luxor. Thebes was the ancient capital of Upper Egypt in the south. The invasion of Babylon would begin in the north (Memphis) and continue to the south (Thebes). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nah. 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Yes, I will punish Egypt, her gods, her rulers, Pharaoh, and those who put their trust in him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I will hand them over to those who seek their lives, to Nebuchadnezzar king of Babylon and his commanders. But afterward, Egypt will be inhabited again as in the past,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Will Save His People
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Do not yield to fear, my servant Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel, do not be alarmed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will rescue you and your descendants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from that foreign land in which you are held captive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will return and live in peace,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 6:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: safe and secure, with no one to make you afraid.”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares to you, “My servant Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not be afraid, for I am with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and will save you
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Someday, I will bring destruction to all the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where I have driven you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I will not destroy you.
  - type: usfm
    marker: q1
    children:
