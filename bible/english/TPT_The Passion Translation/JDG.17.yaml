          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “house of God.” Micah attempted to begin his own religious system of worship, complete with a priestly ephod (priestly vest). Compare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 12:25–33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and he made some idols and a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: counterfeit
    - type: text
      text: ' ephod and ordained '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “filled the hand of.”
      marker-yv: yv-n
    - type: text
      text: 'one of his sons as his priest. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In those days, Israel had no king. People did whatever they wanted to do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micah’s Counterfeit Priest
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time, there was a young man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:7
      - type: usfm
        marker: ft
        children:
