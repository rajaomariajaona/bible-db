      - type: usfm
        marker: ft
        children:
        - type: text
          text: His name was Jonathan, son of Gershom. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'from the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priestly
    - type: text
      text: ' tribe of Levi living in Bethlehem in Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He left there to search for another place to live. On his journey, he came to Micah’s house in the hill country of Ephraim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Micah asked him, “Where are you from?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m a Levite from Bethlehem in Judah,” he said, “and I’m looking for a place to live.”
