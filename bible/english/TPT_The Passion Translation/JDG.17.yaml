document_id: JDG.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Micah’s Shrine
  - type: text
    content: 'There was a man named Micah from the hill country of Ephraim. '
  - type: note
    content: Micah means “Yahweh the Incomparable” or “Who is like Yahweh?” According to Jewish tradition, Micah’s mother was Delilah. Most scholars believe that chs. 17–18 form an appendix to the book and that the events of these two chapters actually happened much earlier, possibly during the days of the champion-deliverer Othniel.
  '10':
  - type: text
    content: '“Live here with me,” Micah said to him. “Be my father and priest, and I’ll pay you ten shekels of silver a year and provide your clothes and your food.” '
  '11':
  - type: text
    content: 'So the Levite agreed to move in with him and the young man became like one of his sons. '
  '12':
  - type: text
    content: 'Then Micah ordained the young Levite as his priest, and he lived in his house. '
  '13':
  - type: text
    content: 'And Micah declared, “Now I know that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will bless me and prosper me, since a Levite now serves as my priest.”'
  - type: note
    content: He was Micah’s priest, not God’s.
  '2':
  - type: text
    content: 'He said to his mother, “When someone stole your eleven hundred shekels of silver, '
  - type: note
    content: Eleven hundred shekels would amount to over one hundred pounds of silver ($30,000).
  - type: text
    content: 'I overheard you speak a curse over the thief. Well, '
  - type: text
    content: it turns out
  - type: text
    content: ', I have the money. I’m the one who took it. '
  - type: text
    content: Here—I’m bringing it back
  - type: text
    content: .”
  - type: text
    content: 'Immediately, his mother, '
  - type: text
    content: wanting to revoke her curse
  - type: text
    content: ', said: “O my son! May '
  - type: text
    content: Yahweh
  - type: text
    content: ' bless you!”'
  '3':
  - type: text
    content: 'So he returned the eleven hundred shekels of silver to his mother, but she said to him, “I give it back to you, for I solemnly dedicate this silver to '
  - type: text
    content: Yahweh
  - type: text
    content: ' for my son to make a carved image, an idol covered with silver.” '
  '4':
  - type: text
    content: So from the silver he returned to his mother, she took two hundred shekels of silver and gave them to a silversmith, who molded them into an idol and overlaid the idol with silver. Micah kept the idol in his house.
  '5':
  - type: text
    content: 'Now Micah had a shrine, '
  - type: note
    content: Or “house of God.” Micah attempted to begin his own religious system of worship, complete with a priestly ephod (priestly vest). Compare 1 Kings 12:25–33.
  - type: text
    content: 'and he made some idols and a '
  - type: text
    content: counterfeit
  - type: text
    content: ' ephod and ordained '
  - type: note
    content: Or “filled the hand of.”
  - type: text
    content: 'one of his sons as his priest. '
  '6':
  - type: text
    content: In those days, Israel had no king. People did whatever they wanted to do.
  - type: heading
    content: Micah’s Counterfeit Priest
  '7':
  - type: text
    content: 'At the same time, there was a young man '
  - type: note
    content: His name was Jonathan, son of Gershom. See 18:30.
  - type: text
    content: 'from the '
  - type: text
    content: priestly
  - type: text
    content: ' tribe of Levi living in Bethlehem in Judah. '
  '8':
  - type: text
    content: 'He left there to search for another place to live. On his journey, he came to Micah’s house in the hill country of Ephraim. '
  '9':
  - type: text
    content: Micah asked him, “Where are you from?”
  - type: text
    content: “I’m a Levite from Bethlehem in Judah,” he said, “and I’m looking for a place to live.”
