  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Live here with me,” Micah said to him. “Be my father and priest, and I’ll pay you ten shekels of silver a year and provide your clothes and your food.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Levite agreed to move in with him and the young man became like one of his sons. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Micah ordained the young Levite as his priest, and he lived in his house. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Micah declared, “Now I know that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will bless me and prosper me, since a Levite now serves as my priest.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: He was Micah’s priest, not God’s.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to his mother, “When someone stole your eleven hundred shekels of silver, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eleven hundred shekels would amount to over one hundred pounds of silver ($30,000).
      marker-yv: yv-n
    - type: text
      text: 'I overheard you speak a curse over the thief. Well, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it turns out
    - type: text
      text: ', I have the money. I’m the one who took it. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Here—I’m bringing it back
    - type: text
      text: .”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately, his mother, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wanting to revoke her curse
    - type: text
      text: ', said: “O my son! May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' bless you!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he returned the eleven hundred shekels of silver to his mother, but she said to him, “I give it back to you, for I solemnly dedicate this silver to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' for my son to make a carved image, an idol covered with silver.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So from the silver he returned to his mother, she took two hundred shekels of silver and gave them to a silversmith, who molded them into an idol and overlaid the idol with silver. Micah kept the idol in his house.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Micah had a shrine, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
