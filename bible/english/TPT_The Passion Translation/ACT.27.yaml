document_id: ACT.27,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Sails to Italy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was decided that we '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that Luke rejoined Paul here and sailed with him to Rome.
      marker-yv: yv-n
    - type: text
      text: 'were to sail for Italy, Festus handed over Paul and a number of other prisoners to the custody of a Roman officer named Julius, a member of the imperial guard. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Men, I can see that our voyage would be disastrous for us and bring great loss, not only to our ship and cargo but also to our own lives. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: We should remain here
    - type: text
      text: .”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was clearly prophetic revelation given to the apostle Paul.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the officer in charge was persuaded more by the ship’s helmsman and captain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ship’s owner.”
      marker-yv: yv-n
    - type: text
      text: 'than he was by Paul. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the majority decided to put out to sea, since Fair Haven was an exposed harbor and not suitable to winter in. They had hoped to somehow reach the Cretan port of Phineka, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Phoenix.”
      marker-yv: yv-n
    - type: text
      text: which was a more suitable port because it was facing south.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “looking toward Lips and Choros.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lips
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was the Greek term for the “winds from the southwest,” and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Choros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the word for “winds from the northwest.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When a gentle south breeze began to blow, they assumed they could make it, so they pulled up anchor and sailed close to Crete. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it wasn’t long before the weather abruptly worsened and a storm of hurricane force called the Nor’easter '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Euroclydon’s typhoon.”
      marker-yv: yv-n
    - type: text
      text: 'tore across the island and blew us out to sea. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The sailors weren’t able to turn the ship into the wind, so they gave up and let it be driven by the gale winds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “we surrendered to its power.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As we passed to the lee of a small island called Cauda, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Gaudos.”
      marker-yv: yv-n
    - type: text
      text: 'we were barely able to get the ship’s lifeboat under control, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so the crew hoisted the dinghy aboard. The sailors used ropes and cables to undergird the ship, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “They tied down the lifeboat on the ship, lest it fall into the sea.”
      marker-yv: yv-n
    - type: text
      text: 'fearing they would run aground on the shoals of Syrtis. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a shallow region full of reefs and sandbars off the coast of Libya between Benghazi and Tripoli.
      marker-yv: yv-n
    - type: text
      text: They lowered the drag anchor to slow its speed and let the ship be driven along.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, because of being battered severely by the storm, the sailors jettisoned the cargo, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and by the third day they even threw the ship’s tackle and rigging overboard. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We went on board a ship from the port of Adramyttium '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Adramyttium
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (modern-day Edrimit, Turkey) was a seaport in the Roman colony of Mysia. Adramyttium means “I will abide in death.”
      marker-yv: yv-n
    - type: text
      text: 'that was planning to stop at various ports along the coast of southwestern Turkey. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the coast of the province of Asia” (Minor).
      marker-yv: yv-n
    - type: text
      text: 'We put out to sea and were accompanied by Aristarchus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aristarchus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the best leader.”
      marker-yv: yv-n
    - type: text
      text: from Thessalonica in Macedonia.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After many days of seeing neither the sun nor the stars, and with the violent storm continuing to rage against us, all hope of ever getting through it alive was abandoned.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After being without food for a long time, Paul stepped before them all and said, “Men, you should have obeyed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: peitharkheo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to obey one who is in authority.” Paul was the true captain of the ship and carried the weight of authority.
      marker-yv: yv-n
    - type: text
      text: 'me and avoided all of this pain and suffering by not leaving Crete. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now listen to me. Don’t be depressed, for no one will perish—only the ship will be lost. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God’s angel visited me last night, the angel of my God, the God I passionately serve. He came and stood in front of me '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, ‘Don’t be afraid, Paul. You are destined to stand trial before Caesar. And because of God’s favor on you, he has given you the lives of everyone who is sailing with you.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So men, keep up your courage! I know that God will protect you, just as he told me he would. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we must run aground on some island '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to be saved
    - type: text
      text: .”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourteenth night of being tossed about the Adriatic Sea, about midnight, the sailors sensed we were approaching land. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took soundings and discovered that the water was about 120 feet deep. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “twenty fathoms.”
      marker-yv: yv-n
    - type: text
      text: 'After sailing a short distance, they again took soundings and found it was only ninety feet deep. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fifteen fathoms.”
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fearing we would be dashed against a rocky coast, they dropped four anchors from the stern and waited for morning to come.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day we docked at Sidon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Phoenician city now in modern-day Lebanon.
      marker-yv: yv-n
    - type: text
      text: 'and Julius, being considerate of Paul, allowed him to disembark and be refreshed by his friends living there. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some sailors pretended to go down to drop anchors from the bow when in fact they wanted to lower the lifeboat into the sea and escape, abandoning ship. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul said to the Roman officer and his soldiers, “Unless you all stay together onboard the ship, you have no chance of surviving.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the moment they heard this, the soldiers cut the ropes of the dinghy and let it fall away.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just before daybreak, Paul urged everyone to eat. He said, “Today makes two full weeks that you’ve been in fearful peril and hunger, unable to eat a thing. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now eat and be nourished. For you’ll all come through this ordeal without a scratch.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Not one hair of your heads will perish.”
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul took bread and gave thanks to God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “glorified God.”
      marker-yv: yv-n
    - type: text
      text: 'in front of them, broke it and began to eat. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were 276 people who ate until they were filled, and were strengthened and encouraged. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:36–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul served communion on board the ship and fed every passenger and crew member. (Did God multiply the bread?) The language used is vividly eucharistic. There is a variation among many Greek manuscripts as to the total of those who were fed. Some have as few as sixty-nine or seventy. The majority of reliable manuscripts in Greek and Aramaic have 276.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After they were satisfied, they threw the grain into the sea to lighten the ship.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Is Shipwrecked
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When daylight came, the sailors didn’t recognize the land, but they noticed a cove with a sandy beach, so they decided to run the ship ashore. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there we put out to sea, but because the winds '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the spirits were against us.”
      marker-yv: yv-n
    - type: text
      text: 'were against us, we sailed under the lee of Cyprus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, east and north of the island.
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They cut away the anchors, leaving them in the sea, untied the ropes holding the rudders, and hoisted the foresail to the breeze to head for the beach. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they drifted into the rocky shoals between two depths of the sea, causing the ship to flounder still a distance from shore. The bow was stuck fast, jammed on the rocks, while the stern was being smashed by the pounding of the surf.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The soldiers wanted to kill all the prisoners to prevent them from escaping. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Roman officer was determined to bring Paul safely through, so he foiled their attempts. He commanded the prisoners and crew who could swim to jump overboard and swim ashore. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The rest all managed to survive by clinging to planks and broken pieces of the ship, so that everyone scrambled to the shore uninjured.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After sailing across the open sea off Cilicia and Pamphylia, we docked at the port of Myra in Lycia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While we were there, the commanding officer found an Egyptian ship from Alexandria that was bound for Italy, and he put us on board.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We made little headway for several days, and with difficulty we made it to Knidus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cnidus,” an ancient port city on the Gulf of Gökova on the coast of Turkey.
      marker-yv: yv-n
    - type: text
      text: 'The strong winds kept us from holding our course, so from there we sailed along the lee of Crete, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “we circled Crete.”
      marker-yv: yv-n
    - type: text
      text: 'opposite Cape Salome. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hugging the coast, we struggled on to a place called Fair Havens, near the town of Lasea. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We remained there a long time, until we passed the day of the Jewish fast.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was possibly the Day of Atonement, when every Jew fasts.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul advised the frightened sailors that they should not put out to sea in such dangerous weather, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. This was the season the Romans called
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mare clausum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the closed sea, when the Mediterranean was not navigable.'
      marker-yv: yv-n
    - type: text
      text: 'saying, '
