document_id: ACT.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Sails to Italy
  - type: text
    content: 'When it was decided that we '
  - type: note
    content: It is likely that Luke rejoined Paul here and sailed with him to Rome.
  - type: text
    content: 'were to sail for Italy, Festus handed over Paul and a number of other prisoners to the custody of a Roman officer named Julius, a member of the imperial guard. '
  '10':
  - type: text
    content: '“Men, I can see that our voyage would be disastrous for us and bring great loss, not only to our ship and cargo but also to our own lives. '
  - type: text
    content: We should remain here
  - type: text
    content: .”
  - type: note
    content: This was clearly prophetic revelation given to the apostle Paul.
  '11':
  - type: text
    content: 'But the officer in charge was persuaded more by the ship’s helmsman and captain '
  - type: note
    content: Or “ship’s owner.”
  - type: text
    content: 'than he was by Paul. '
  '12':
  - type: text
    content: 'So the majority decided to put out to sea, since Fair Haven was an exposed harbor and not suitable to winter in. They had hoped to somehow reach the Cretan port of Phineka, '
  - type: note
    content: Or “Phoenix.”
  - type: text
    content: which was a more suitable port because it was facing south.
  - type: note
    content: As translated from the Aramaic. The Greek is “looking toward Lips and Choros.” Lips was the Greek term for the “winds from the southwest,” and Choros the word for “winds from the northwest.”
  '13':
  - type: text
    content: 'When a gentle south breeze began to blow, they assumed they could make it, so they pulled up anchor and sailed close to Crete. '
  '14':
  - type: text
    content: 'But it wasn’t long before the weather abruptly worsened and a storm of hurricane force called the Nor’easter '
  - type: note
    content: The Aramaic is “Euroclydon’s typhoon.”
  - type: text
    content: 'tore across the island and blew us out to sea. '
  '15':
  - type: text
    content: The sailors weren’t able to turn the ship into the wind, so they gave up and let it be driven by the gale winds.
  - type: note
    content: The Aramaic is “we surrendered to its power.”
  '16':
  - type: text
    content: 'As we passed to the lee of a small island called Cauda, '
  - type: note
    content: Or “Gaudos.”
  - type: text
    content: 'we were barely able to get the ship’s lifeboat under control, '
  '17':
  - type: text
    content: 'so the crew hoisted the dinghy aboard. The sailors used ropes and cables to undergird the ship, '
  - type: note
    content: The Aramaic is “They tied down the lifeboat on the ship, lest it fall into the sea.”
  - type: text
    content: 'fearing they would run aground on the shoals of Syrtis. '
  - type: note
    content: This was a shallow region full of reefs and sandbars off the coast of Libya between Benghazi and Tripoli.
  - type: text
    content: They lowered the drag anchor to slow its speed and let the ship be driven along.
  '18':
  - type: text
    content: 'The next day, because of being battered severely by the storm, the sailors jettisoned the cargo, '
  '19':
  - type: text
    content: 'and by the third day they even threw the ship’s tackle and rigging overboard. '
  '2':
  - type: text
    content: 'We went on board a ship from the port of Adramyttium '
  - type: note
    content: Adramyttium (modern-day Edrimit, Turkey) was a seaport in the Roman colony of Mysia. Adramyttium means “I will abide in death.”
  - type: text
    content: 'that was planning to stop at various ports along the coast of southwestern Turkey. '
  - type: note
    content: Or “the coast of the province of Asia” (Minor).
  - type: text
    content: 'We put out to sea and were accompanied by Aristarchus '
  - type: note
    content: Aristarchus means “the best leader.”
  - type: text
    content: from Thessalonica in Macedonia.
  '20':
  - type: text
    content: After many days of seeing neither the sun nor the stars, and with the violent storm continuing to rage against us, all hope of ever getting through it alive was abandoned.
  '21':
  - type: text
    content: 'After being without food for a long time, Paul stepped before them all and said, “Men, you should have obeyed '
  - type: note
    content: The Greek word peitharkheo means “to obey one who is in authority.” Paul was the true captain of the ship and carried the weight of authority.
  - type: text
    content: 'me and avoided all of this pain and suffering by not leaving Crete. '
  '22':
  - type: text
    content: 'Now listen to me. Don’t be depressed, for no one will perish—only the ship will be lost. '
  '23':
  - type: text
    content: 'For God’s angel visited me last night, the angel of my God, the God I passionately serve. He came and stood in front of me '
  '24':
  - type: text
    content: 'and said, ‘Don’t be afraid, Paul. You are destined to stand trial before Caesar. And because of God’s favor on you, he has given you the lives of everyone who is sailing with you.’ '
  '25':
  - type: text
    content: 'So men, keep up your courage! I know that God will protect you, just as he told me he would. '
  '26':
  - type: text
    content: 'But we must run aground on some island '
  - type: text
    content: to be saved
  - type: text
    content: .”
  '27':
  - type: text
    content: 'On the fourteenth night of being tossed about the Adriatic Sea, about midnight, the sailors sensed we were approaching land. '
  '28':
  - type: text
    content: 'So they took soundings and discovered that the water was about 120 feet deep. '
  - type: note
    content: Or “twenty fathoms.”
  - type: text
    content: 'After sailing a short distance, they again took soundings and found it was only ninety feet deep. '
  - type: note
    content: Or “fifteen fathoms.”
  '29':
  - type: text
    content: Fearing we would be dashed against a rocky coast, they dropped four anchors from the stern and waited for morning to come.
  '3':
  - type: text
    content: 'The next day we docked at Sidon, '
  - type: note
    content: A Phoenician city now in modern-day Lebanon.
  - type: text
    content: 'and Julius, being considerate of Paul, allowed him to disembark and be refreshed by his friends living there. '
  '30':
  - type: text
    content: 'Some sailors pretended to go down to drop anchors from the bow when in fact they wanted to lower the lifeboat into the sea and escape, abandoning ship. '
  '31':
  - type: text
    content: 'Paul said to the Roman officer and his soldiers, “Unless you all stay together onboard the ship, you have no chance of surviving.” '
  '32':
  - type: text
    content: At the moment they heard this, the soldiers cut the ropes of the dinghy and let it fall away.
  '33':
  - type: text
    content: 'Just before daybreak, Paul urged everyone to eat. He said, “Today makes two full weeks that you’ve been in fearful peril and hunger, unable to eat a thing. '
  '34':
  - type: text
    content: Now eat and be nourished. For you’ll all come through this ordeal without a scratch.”
  - type: note
    content: Or “Not one hair of your heads will perish.”
  '35':
  - type: text
    content: 'Then Paul took bread and gave thanks to God '
  - type: note
    content: The Aramaic is “glorified God.”
  - type: text
    content: 'in front of them, broke it and began to eat. '
  '36':
  - type: text
    content: 'There were 276 people who ate until they were filled, and were strengthened and encouraged. '
  - type: note
    content: Paul served communion on board the ship and fed every passenger and crew member. (Did God multiply the bread?) The language used is vividly eucharistic. There is a variation among many Greek manuscripts as to the total of those who were fed. Some have as few as sixty-nine or seventy. The majority of reliable manuscripts in Greek and Aramaic have 276.
  '38':
  - type: text
    content: After they were satisfied, they threw the grain into the sea to lighten the ship.
  - type: heading
    content: Paul Is Shipwrecked
  '39':
  - type: text
    content: 'When daylight came, the sailors didn’t recognize the land, but they noticed a cove with a sandy beach, so they decided to run the ship ashore. '
  '4':
  - type: text
    content: 'From there we put out to sea, but because the winds '
  - type: note
    content: The Aramaic can be translated “the spirits were against us.”
  - type: text
    content: 'were against us, we sailed under the lee of Cyprus. '
  - type: note
    content: That is, east and north of the island.
  '40':
  - type: text
    content: 'They cut away the anchors, leaving them in the sea, untied the ropes holding the rudders, and hoisted the foresail to the breeze to head for the beach. '
  '41':
  - type: text
    content: But they drifted into the rocky shoals between two depths of the sea, causing the ship to flounder still a distance from shore. The bow was stuck fast, jammed on the rocks, while the stern was being smashed by the pounding of the surf.
  '42':
  - type: text
    content: 'The soldiers wanted to kill all the prisoners to prevent them from escaping. '
  '43':
  - type: text
    content: 'But the Roman officer was determined to bring Paul safely through, so he foiled their attempts. He commanded the prisoners and crew who could swim to jump overboard and swim ashore. '
  - type: note
    content: As translated from the Aramaic.
  '44':
  - type: text
    content: The rest all managed to survive by clinging to planks and broken pieces of the ship, so that everyone scrambled to the shore uninjured.
  '5':
  - type: text
    content: 'After sailing across the open sea off Cilicia and Pamphylia, we docked at the port of Myra in Lycia. '
  '6':
  - type: text
    content: While we were there, the commanding officer found an Egyptian ship from Alexandria that was bound for Italy, and he put us on board.
  '7':
  - type: text
    content: 'We made little headway for several days, and with difficulty we made it to Knidus. '
  - type: note
    content: Or “Cnidus,” an ancient port city on the Gulf of Gökova on the coast of Turkey.
  - type: text
    content: 'The strong winds kept us from holding our course, so from there we sailed along the lee of Crete, '
  - type: note
    content: The Aramaic is “we circled Crete.”
  - type: text
    content: 'opposite Cape Salome. '
  '8':
  - type: text
    content: 'Hugging the coast, we struggled on to a place called Fair Havens, near the town of Lasea. '
  '9':
  - type: text
    content: We remained there a long time, until we passed the day of the Jewish fast.
  - type: note
    content: This was possibly the Day of Atonement, when every Jew fasts.
  - type: text
    content: 'Paul advised the frightened sailors that they should not put out to sea in such dangerous weather, '
  - type: note
    content: As translated from the Aramaic. This was the season the Romans called mare clausum, the closed sea, when the Mediterranean was not navigable.
  - type: text
    content: 'saying, '
