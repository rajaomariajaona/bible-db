  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When Jacob woke up the next morning, he was shocked to find Leah lying next to him! So he confronted Laban and said, “What have you done to me? Didn’t I serve you these seven years for Rachel? Why have you tricked me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laban answered, “It’s not our custom here to give the younger daughter in marriage before the older daughter is married. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Wait until this bridal week of festivities is over, then I’ll give you Rachel, but you must serve me for another seven years.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For those seven years, God was teaching Jacob submission to the rights of the firstborn. It was not right to marry the younger before the older. All that Jacob had circumvented in stealing the blessing from Esau he must now learn by serving for another seven years and learn the timing of God. After the first seven years were over, Laban tricked Jacob by giving him Leah, not Rachel, on his wedding night. Jacob was fooled by the veil over the bride’s face, thinking she was Rachel, even as he had fooled his father with a hairy skin over his arms, confusing him with Esau. Every “Jacob” will one day meet his “Laban.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: 'Jacob complied with Laban’s request. After he completed the prescribed week of Leah’s wedding feast, Laban gave his daughter Rachel to be his wife, and he slept with her. Rachel was his true love, not Leah. (Laban assigned Bilhah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:28–30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Bilhah may come from an Arabic word for “stupid” or “unconcerned.” If it comes from Hebrew, it means “troubled.”
    marker-yv: yv-n
  - type: text
    text: as his daughter Rachel’s servant.) And Jacob remained there serving Laban for another seven years.
