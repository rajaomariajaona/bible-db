      marker: fr
      children:
      - type: text
        text: 29:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the land of the sons of the east,” that is, east of Canaan. Jacob arrived at Paddan-Aram in Mesopotamia.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One day, Jacob came to a well out in the open country where the shepherds watered their animals. Three flocks of sheep and goats were lying near the well, which had a large, heavy stone covering the opening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Whenever all the flocks gathered there, the shepherds would roll away the stone from the mouth of the well, water their sheep, and then roll the stone back over the top of the well.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jacob approached them and said, “Good day, friends; where are you from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “We’re from Haran,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Do you happen to know Laban, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Laban was the son of Bethuel and the grandson of Nahor, Abraham’s brother.
    marker-yv: yv-n
  - type: text
    text: a grandson of Nahor?” Jacob said.
- type: usfm
  marker: p
  children:
  - type: text
    text: “We do,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jacob asked, “How’s he doing?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“He’s doing well,” they answered. “As a matter of fact, here comes his daughter Rachel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rachel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “ewe lamb.”
    marker-yv: yv-n
  - type: text
    text: right now with her flock.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is obvious that God led Jacob supernaturally to the very well where Rachel would appear, and she came at an unusual time of day to water her father’s flocks. This was a divine appointment for Jacob. And you can be assured that God has his hands of guidance upon you also.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jacob said to them, “Look, it’s not time for the animals to gather together here; it’s now the hottest hour of the day. Let’s go ahead and water the sheep, then you can go and pasture them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They replied, “First, we have to wait until all the flocks are gathered. After that, the stone needs to be rolled away from the mouth of the well, then we’ll water the animals.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'While they were still speaking, Rachel, the shepherdess, drew near to the well with her father’s sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As soon as Jacob took one good look at Rachel, the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beautiful
  - type: text
    text: ' daughter of his uncle Laban, he quickly went over to the mouth of the well and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: single-handedly
  - type: text
    text: ' rolled away the stone and watered all the flock of his uncle Laban! '
  - type: usfm
    marker: f
