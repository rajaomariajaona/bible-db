      - type: text
        text: ', we learn that Jacob tended sheep for those seven years in order to get the bride he loved. There is another who has now waited for nearly seven thousand years for his bride that he dearly loves! And what has he been doing for all those years? He has been carrying his lambs close to his heart and tending his flock like a Shepherd (see'
    - type: usfm
      marker: ft
