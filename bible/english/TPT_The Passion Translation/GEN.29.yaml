    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reuben
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “See! A son!” Leah defined fulfillment by how much Jacob loved her. Envy can often be traced back to an inward struggle to gain identity. Leah and Rachel competed for Jacob’s heart. Leah called her firstborn Reuben, which in Hebrew sounds like “he has seen my misery.”
    marker-yv: yv-n
  - type: text
    text: 'saying, “Because '
  - type: usfm
    marker: nd
    children:
    - type: text
