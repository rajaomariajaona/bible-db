type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Meets a Woman at the Well
  - type: text
    content: 'Jacob resumed his journey '
  - type: note
    content: Or “Jacob lifted up his feet.” This unusual Hebrew expression could be double entendre, telling us that Jacob lifted up his feet not only to go on his journey but also to go up the Stairway he had just seen in his dream. To move forward is always to move higher up with God.
  - type: text
    content: 'and entered the land east '
  - type: text
    content: of Canaan
  - type: text
    content: '. '
  - type: note
    content: Or “the land of the sons of the east,” that is, east of Canaan. Jacob arrived at Paddan-Aram in Mesopotamia.
  '10':
  - type: text
    content: 'As soon as Jacob took one good look at Rachel, the '
  - type: text
    content: beautiful
  - type: text
    content: ' daughter of his uncle Laban, he quickly went over to the mouth of the well and '
  - type: text
    content: single-handedly
  - type: text
    content: ' rolled away the stone and watered all the flock of his uncle Laban! '
  - type: note
    content: At the sight of the lovely Rachel, Jacob’s soul was so moved that he gained the strength to roll away the stone all by himself. “One flash of [her] eyes” (Song. 4:9) made him a momentary “superman.” After he moved the heavy stone, Jacob drew gallons and gallons of water for her flocks.
  '11':
  - type: text
    content: 'Immediately, he walked up to Rachel and kissed her! '
  - type: text
    content: Unable to hold back his tears
  - type: text
    content: ', Jacob wept aloud. '
  - type: note
    content: This entire scene is filled with emotion. Jacob saw the girl of his dreams and became supercharged to move the heavy stone and water her flock. Then he kissed her and lifted up his voice with passionate tears. You can almost hear the tender music playing in the background as this “guy meets girl” scene unfolds. As you read it over again, think of Jesus who also rolled away a heavy stone so that he could come meet you to romance your soul (see Song of Songs). He drew you to faith in him, then offered you a drink from the well of life.
  '12':
  - type: text
    content: After he composed himself
  - type: text
    content: ', he explained to Rachel, “I’m your father’s nephew, your aunt Rebekah’s son.” Upon hearing this, Rachel ran to tell her father. '
  '13':
  - type: text
    content: 'When Laban heard the news that his nephew Jacob had arrived at the well, he ran to greet him. Laban hugged and kissed Jacob and welcomed him into his home. After Jacob told him the story of all that happened, '
  '14':
  - type: text
    content: 'Laban said to him, “Certainly, you are my own flesh and blood!” Jacob stayed with him for an entire month '
  - type: text
    content: and worked for him
  - type: text
    content: .
  - type: heading
    content: Jacob Marries Leah and Rachel
  '15':
  - type: text
    content: 'Afterward, Laban said to Jacob, “Just because you’re my relative doesn’t mean I expect you to work for nothing. Tell me, what do you want your wages to be?” '
  '16':
  - type: text
    content: '(Now, Laban had two daughters; the older was Leah, '
  - type: note
    content: The etymology of the name Leah is somewhat ambiguous. Some Hebrew scholars equate the name Leah with “weak,” “sluggish,” or “weary.” Tradition has it that Leah was cross-eyed, or perhaps partly blind. Her vision was impaired; seeing dimly. A “Leah” church does not function with clear vision. Leah represents those with limited vision who cannot discern the timing and ways of God. Like the lukewarm Laodiceans, the church is instructed to “purchase eye salve” so that it can see clearly (Rev. 3:18). A vision-impaired church will live by principles, laws, traditions, and customs. It was the “custom” for Leah to marry Jacob (v. 26). Like many today, she was unable to see clearly, felt unloved, and was unable to perceive God’s greater purpose. The fruit of Leah (and her handmaiden, called “the slave girl” in Gal. 4:21–22) was only bondage. Jacob had to “work” after getting her!
  - type: text
    content: 'and the younger was Rachel. '
  '17':
  - type: text
    content: 'Rachel had a lovely figure and was gorgeous, '
  - type: note
    content: Or “Rachel was beautiful of form and beautiful in appearance.” Rachel becomes a picture of the radiant bride of the last days who makes herself ready for her Bridegroom. See Eph. 5:27; Rev. 19:7.
  - type: text
    content: 'but Leah’s eyes were weak. '
  - type: note
    content: Or “her eyes were sickly” (LXX). The Hebrew is uncertain.
  - type: text
    content: )
  '18':
  - type: text
    content: Jacob had fallen in love with Rachel, so he answered Laban, “I will serve you for seven years for the hand of your younger daughter, Rachel!”
  '19':
  - type: text
    content: 'Laban replied, “I’d rather give her to you than to some other man. Stay and work for me.” '
  '2':
  - type: text
    content: 'One day, Jacob came to a well out in the open country where the shepherds watered their animals. Three flocks of sheep and goats were lying near the well, which had a large, heavy stone covering the opening. '
  '20':
  - type: text
    content: So Jacob served Laban for seven years in exchange for Rachel, but because he loved her so deeply, the seven years seemed like only a few days.
  - type: note
    content: Love can make long, hard service short and easy. This is why the Scriptures speak of a labor of love (1 Thess. 1:3; Heb. 6:10). In Hos. 12:12, we learn that Jacob tended sheep for those seven years in order to get the bride he loved. There is another who has now waited for nearly seven thousand years for his bride that he dearly loves! And what has he been doing for all those years? He has been carrying his lambs close to his heart and tending his flock like a Shepherd (see Isa. 40:11).
  '21':
  - type: text
    content: 'After the seven years, Jacob said to Laban, “My time is fulfilled; give me your daughter so that I may marry her and sleep with her.” '
  '22':
  - type: text
    content: 'So Laban prepared a '
  - type: text
    content: wedding
  - type: text
    content: ' feast '
  - type: note
    content: Or “drinking party.”
  - type: text
    content: 'and invited all the people of the surrounding area. '
  '23':
  - type: text
    content: 'That night, Laban '
  - type: text
    content: tricked Jacob
  - type: text
    content: ' by bringing his older daughter Leah to Jacob’s tent, and he slept with her '
  - type: text
    content: on his wedding night
  - type: text
    content: '! '
  - type: note
    content: Perhaps Jacob was drunk on wine, and Leah was wearing a bridal veil.
  '24':
  - type: text
    content: '(Laban assigned Zilpah '
  - type: note
    content: Zilpah means “small” or “a trickling.”
  - type: text
    content: to be Leah’s servant.)
  '25':
  - type: text
    content: When Jacob woke up the next morning, he was shocked to find Leah lying next to him! So he confronted Laban and said, “What have you done to me? Didn’t I serve you these seven years for Rachel? Why have you tricked me?”
  '26':
  - type: text
    content: 'Laban answered, “It’s not our custom here to give the younger daughter in marriage before the older daughter is married. '
  '27':
  - type: text
    content: Wait until this bridal week of festivities is over, then I’ll give you Rachel, but you must serve me for another seven years.”
  - type: note
    content: For those seven years, God was teaching Jacob submission to the rights of the firstborn. It was not right to marry the younger before the older. All that Jacob had circumvented in stealing the blessing from Esau he must now learn by serving for another seven years and learn the timing of God. After the first seven years were over, Laban tricked Jacob by giving him Leah, not Rachel, on his wedding night. Jacob was fooled by the veil over the bride’s face, thinking she was Rachel, even as he had fooled his father with a hairy skin over his arms, confusing him with Esau. Every “Jacob” will one day meet his “Laban.”
  '28':
  - type: text
    content: 'Jacob complied with Laban’s request. After he completed the prescribed week of Leah’s wedding feast, Laban gave his daughter Rachel to be his wife, and he slept with her. Rachel was his true love, not Leah. (Laban assigned Bilhah '
  - type: note
    content: The name Bilhah may come from an Arabic word for “stupid” or “unconcerned.” If it comes from Hebrew, it means “troubled.”
  - type: text
    content: as his daughter Rachel’s servant.) And Jacob remained there serving Laban for another seven years.
  - type: heading
    content: Leah’s Four Sons
  '3':
  - type: text
    content: Whenever all the flocks gathered there, the shepherds would roll away the stone from the mouth of the well, water their sheep, and then roll the stone back over the top of the well.
  '31':
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' saw that Leah was unloved, he opened her womb, but Rachel remained childless. '
  '32':
  - type: text
    content: 'Leah conceived, gave birth to a son, and named him Reuben, '
  - type: note
    content: Reuben means “See! A son!” Leah defined fulfillment by how much Jacob loved her. Envy can often be traced back to an inward struggle to gain identity. Leah and Rachel competed for Jacob’s heart. Leah called her firstborn Reuben, which in Hebrew sounds like “he has seen my misery.”
  - type: text
    content: 'saying, “Because '
  - type: text
    content: Yahweh
  - type: text
    content: ' looked upon me with compassion in my misery, surely, my husband will love me now!” '
  '33':
  - type: text
    content: 'She conceived again, gave birth to a son, and named him Simeon, '
  - type: note
    content: Simeon’s name comes from the Hebrew verb meaning “to hear.” God saw Leah’s pain and heard her cry. She named her first two children after God’s mercy and compassion for the downcast and rejected. There is a mercy-chord in God’s heart that is touched by the broken, poor, and rejected. God gives greater honor to dishonored ones (see 1 Cor. 12:24). It is the nature of God to be drawn to those who hurt. God saw her pain, her loneliness, and her heartache. If only she had understood how greatly the Lord loved her.
  - type: text
    content: saying, “
  - type: text
    content: Yahweh
  - type: text
    content: ' has heard that I am despised, and in his mercy, he has given me this son also.” '
  '34':
  - type: text
    content: 'Leah conceived the third time, gave birth to a son, and named him Levi, '
  - type: note
    content: The name Levi sounds like the Hebrew word meaning “to join,” “bind,” or “attach.”
  - type: text
    content: 'saying, “This time my husband will be joined to me, because now I’ve given him three sons!” '
  '35':
  - type: text
    content: 'Once again, Leah conceived and gave birth to a son. She named him Judah, '
  - type: note
    content: The name Judah sounds like the Hebrew verb meaning “to praise.” Over the years of struggling with the pain of being unloved, Leah finally opened her heart to the Lord, and grace touched her. God was tenderly wooing her to himself through her disappointment in her marriage. At last, she gave birth to her fourth son and resolved to praise the Lord no matter what. Leah had now become a worshiper of the Almighty. She found her fulfillment in God, so she named her son Judah and declared, “This time I will praise the Lord!” Leah, not Rachel, became the mother of Judah and the ancestor of Jesus.
  - type: text
    content: 'saying, “This time I will praise the Lord!” Then she stopped bearing children '
  - type: text
    content: for a while
  - type: text
    content: .
  '4':
  - type: text
    content: Jacob approached them and said, “Good day, friends; where are you from?”
  - type: text
    content: “We’re from Haran,” they answered.
  '5':
  - type: text
    content: '“Do you happen to know Laban, '
  - type: note
    content: Laban was the son of Bethuel and the grandson of Nahor, Abraham’s brother.
  - type: text
    content: a grandson of Nahor?” Jacob said.
  - type: text
    content: “We do,” they replied.
  '6':
  - type: text
    content: Jacob asked, “How’s he doing?”
  - type: text
    content: '“He’s doing well,” they answered. “As a matter of fact, here comes his daughter Rachel '
  - type: note
    content: Rachel means “ewe lamb.”
  - type: text
    content: right now with her flock.”
  - type: note
    content: It is obvious that God led Jacob supernaturally to the very well where Rachel would appear, and she came at an unusual time of day to water her father’s flocks. This was a divine appointment for Jacob. And you can be assured that God has his hands of guidance upon you also.
  '7':
  - type: text
    content: Jacob said to them, “Look, it’s not time for the animals to gather together here; it’s now the hottest hour of the day. Let’s go ahead and water the sheep, then you can go and pasture them.”
  '8':
  - type: text
    content: They replied, “First, we have to wait until all the flocks are gathered. After that, the stone needs to be rolled away from the mouth of the well, then we’ll water the animals.”
  '9':
  - type: text
    content: 'While they were still speaking, Rachel, the shepherdess, drew near to the well with her father’s sheep. '
