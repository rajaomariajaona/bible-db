    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jacob lifted up his feet.” This unusual Hebrew expression could be double entendre, telling us that Jacob lifted up his feet not only to go on his journey but also to go up the Stairway he had just seen in his dream. To move forward is always to move higher up with God.
    marker-yv: yv-n
  - type: text
    text: 'and entered the land east '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Canaan
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
