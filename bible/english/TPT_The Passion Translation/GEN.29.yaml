      text: Yahweh
  - type: text
    text: ' saw that Leah was unloved, he opened her womb, but Rachel remained childless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Leah conceived, gave birth to a son, and named him Reuben, '
  - type: usfm
