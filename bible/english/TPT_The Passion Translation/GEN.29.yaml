      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'but Leah’s eyes were weak. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
