      children:
      - type: text
        text: Or “her eyes were sickly” (LXX). The Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jacob had fallen in love with Rachel, so he answered Laban, “I will serve you for seven years for the hand of your younger daughter, Rachel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Laban replied, “I’d rather give her to you than to some other man. Stay and work for me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Jacob served Laban for seven years in exchange for Rachel, but because he loved her so deeply, the seven years seemed like only a few days.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Love can make long, hard service short and easy. This is why the Scriptures speak of a labor of love (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Thess. 1:3
      metadata:
        usfm: 1TH.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 6:10
      metadata:
        usfm: HEB.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 12:12
      metadata:
        usfm: HOS.12.12
    - type: usfm
