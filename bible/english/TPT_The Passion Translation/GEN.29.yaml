    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At the sight of the lovely Rachel, Jacob’s soul was so moved that he gained the strength to roll away the stone all by himself. “One flash of [her] eyes” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 4:9
      metadata:
        usfm: SNG.4.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) made him a momentary “superman.” After he moved the heavy stone, Jacob drew gallons and gallons of water for her flocks.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Immediately, he walked up to Rachel and kissed her! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Unable to hold back his tears
  - type: text
    text: ', Jacob wept aloud. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This entire scene is filled with emotion. Jacob saw the girl of his dreams and became supercharged to move the heavy stone and water her flock. Then he kissed her and lifted up his voice with passionate tears. You can almost hear the tender music playing in the background as this “guy meets girl” scene unfolds. As you read it over again, think of Jesus who also rolled away a heavy stone so that he could come meet you to romance your soul (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Song of Songs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). He drew you to faith in him, then offered you a drink from the well of life.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: After he composed himself
  - type: text
    text: ', he explained to Rachel, “I’m your father’s nephew, your aunt Rebekah’s son.” Upon hearing this, Rachel ran to tell her father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Laban heard the news that his nephew Jacob had arrived at the well, he ran to greet him. Laban hugged and kissed Jacob and welcomed him into his home. After Jacob told him the story of all that happened, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Laban said to him, “Certainly, you are my own flesh and blood!” Jacob stayed with him for an entire month '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and worked for him
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Marries Leah and Rachel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Afterward, Laban said to Jacob, “Just because you’re my relative doesn’t mean I expect you to work for nothing. Tell me, what do you want your wages to be?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(Now, Laban had two daughters; the older was Leah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The etymology of the name Leah is somewhat ambiguous. Some Hebrew scholars equate the name Leah with “weak,” “sluggish,” or “weary.” Tradition has it that Leah was cross-eyed, or perhaps partly blind. Her vision was impaired; seeing dimly. A “Leah” church does not function with clear vision. Leah represents those with limited vision who cannot discern the timing and ways of God. Like the lukewarm Laodiceans, the church is instructed to “purchase eye salve” so that it can see clearly (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 3:18
      metadata:
        usfm: REV.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). A vision-impaired church will live by principles, laws, traditions, and customs. It was the “custom” for Leah to marry Jacob (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: GEN.29.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Like many today, she was unable to see clearly, felt unloved, and was unable to perceive God’s greater purpose. The fruit of Leah (and her handmaiden, called “the slave girl” in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 4:21–22
      metadata:
        usfm: GAL.4.21+GAL.4.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) was only bondage. Jacob had to “work” after getting her!
    marker-yv: yv-n
