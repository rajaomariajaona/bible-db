document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So then what is the importance of circumcision, and what advantage is there of being a Jew? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Actually, there are numerous advantages. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “They have increased [prospered] in every way.”
    marker-yv: yv-n
  - type: text
    text: 'Most important, God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: distinguished the Jews from all other people
  - type: text
    text: ' by entrusting them with the revelation of his prophetic promises. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These prophetic promises (“messages,” “oracles,” or “sayings”) include the entire scope of revelation given to the Jews through the teachings of the Torah and the many prophecies of the coming Messiah, all finding their fulfillment in Jesus, the Anointed One.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But what if some were unfaithful to their divine calling? Does their unbelief weaken God’s faithfulness? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Absolutely not! God will always be proven faithful and true to his word, while people are proven to be liars. This will fulfill what was written in the Scriptures:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your words will always be vindicated
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you will rise victorious
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you are being tried by your critics!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You will prevail when judged.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 51:4
      metadata:
        usfm: PSA.51.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But what if our wrong shows how right God is? Doesn’t our bad serve the purpose of making God look good? (Of course, I’m only speaking from a human viewpoint.) Would that infer that God is unfair when he displays his anger against wrongdoing? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Absolutely not! For if that were the case, how could God be the righteous judge of all the earth?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So, if my lie brings into sharp contrast the brightness of God’s truth, and if my lie accentuates his glory, then why should I be condemned as a sinner? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Is it proper for us to sin, just so good things may come? May it never be! Yet there are some who slander us and claim that is what we teach. They deserve to be condemned for even saying it!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Universal Sinfulness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So, are we to conclude then that we Jews are superior to all others? Certainly not! For we have already proven '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “accused” or “drawn up an indictment.”
    marker-yv: yv-n
  - type: text
    text: 'that both Jews and gentiles are all under the bondage of sin. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the Scriptures agree, for it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no one who always does what is right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no, not even one!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: There is no one with true spiritual insight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and there is no one who seeks after God alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All have deliberately wandered from God’s ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All have become depraved and unfit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kindness has disappeared from them all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: not even one is good.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is quoted from the Greek Septuagint of
    - type: usfm
