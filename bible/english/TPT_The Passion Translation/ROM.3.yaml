      metadata:
        usfm: PSA.36.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Paul lists a total of fourteen truths that describe all of humanity from the Old Testament.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now, we realize that everything the law says is addressed to those who are under its authority. This is for two reasons: So that every excuse will be silenced, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with no boasting of innocence
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “every excuse will be silenced” means that there will be no one boasting that they are innocent before God.
    marker-yv: yv-n
  - type: text
    text: 'And so that the entire world will be held accountable to God’s standards. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “may be liable to judgment by God.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For by the merit of observing the law no one earns the status of being declared righteous before God, for it is the law that fully exposes and unmasks the reality of sin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gospel Reveals God’s Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'But now, independently of the law, the righteousness of God is tangible and brought to light through Jesus, the Anointed One. This is the righteousness that the Scriptures prophesied would come. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “attested to by the Law and the Prophets.”
    marker-yv: yv-n
  - type: text
    text: 'It is God’s righteousness made visible through the faithfulness of Jesus Christ. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “through faith in Jesus Christ.”
    marker-yv: yv-n
  - type: text
    text: 'And now all who believe in him receive that gift. For there is really no difference between us, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'for we all have sinned and are in need of the glory of God. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Yet through his powerful declaration of acquittal, God freely gives away his righteousness. His gift '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dorean
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “present,” “gift,” “legacy,” “privilege.”'
    marker-yv: yv-n
  - type: text
    text: 'of love and favor now cascades over us, all because Jesus, the Anointed One, has liberated us from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the guilt, punishment, and power of
  - type: text
    text: ' sin!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus’ God-given destiny '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “God ordained in advance an atonement by faith in his [Jesus’] blood.”
    marker-yv: yv-n
  - type: text
    text: 'was to be the sacrifice to take away sins, and now he is our mercy seat '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “propitiation.” The
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mercy seat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: becomes a metonymy for the sacrificial, redemptive work of Christ. The mercy seat was the lid to the ark of the covenant, which was carried throughout the wilderness for years and finally found a home in the temple in Jerusalem. “Blood of mercy” was sprinkled on the mercy seat (or “place of satisfaction”) yearly on the Day of Atonement, which covered the sins of the people until Jesus sprinkled his blood on the mercy seat in the heavens. The mercy seat was not seen by the people; only the high priest went into the holy of holies to sprinkle blood upon the mercy seat. Yet Jesus was publicly offered as the satisfaction for sin’s consequences.
    marker-yv: yv-n
  - type: text
    text: 'because of his death on the cross. We come to him for mercy, for God has made a provision for us to be forgiven by faith in the sacred blood of Jesus. This is the perfect demonstration of God’s justice, because until now, he had been so patient—holding back his justice out of his tolerance for us. So he covered over '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “passed over,” “released” (let it be). This is the only place the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
