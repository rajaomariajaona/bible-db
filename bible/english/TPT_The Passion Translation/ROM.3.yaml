document_id: ROM.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Righteousness
  - type: text
    content: 'So then what is the importance of circumcision, and what advantage is there of being a Jew? '
  '10':
  - type: text
    content: 'And the Scriptures agree, for it is written:'
  - type: text
    content: There is no one who always does what is right,
  - type: text
    content: no, not even one!
  '11':
  - type: text
    content: There is no one with true spiritual insight,
  - type: text
    content: and there is no one who seeks after God alone.
  '12':
  - type: text
    content: All have deliberately wandered from God’s ways.
  - type: text
    content: All have become depraved and unfit.
  - type: text
    content: Kindness has disappeared from them all,
  - type: text
    content: not even one is good.
  - type: note
    content: This is quoted from the Greek Septuagint of Pss. 14:1–3 and 53:3.
  '13':
  - type: text
    content: Their words release a stench,
  - type: note
    content: Or “Their throats are open graves,” a metonymy for their speech.
  - type: text
    content: like the smell of death—foul and filthy!
  - type: note
    content: See Ps. 5:9.
  - type: text
    content: Deceitful lies roll off their tongues.
  - type: text
    content: The venom of a viper drips from their lips.
  - type: note
    content: See Ps. 140:3.
  '14':
  - type: text
    content: Bitter profanity flows from their mouths,
  - type: text
    content: only meant to cut and harm.
  - type: note
    content: See Ps. 10:7.
  '15':
  - type: text
    content: They are infatuated with violence and murder.
  - type: note
    content: Or “Their feet are swift to shed blood.”
  '16':
  - type: text
    content: They release ruin and misery wherever they go.
  '17':
  - type: text
    content: They never experience the path of peace.
  - type: note
    content: Verses 15–17 are quoted from Isa. 59:7–8.
  '18':
  - type: text
    content: They shut their eyes to the awe-inspiring God!
  - type: note
    content: See Ps. 36:1. Paul lists a total of fourteen truths that describe all of humanity from the Old Testament.
  '19':
  - type: text
    content: 'Now, we realize that everything the law says is addressed to those who are under its authority. This is for two reasons: So that every excuse will be silenced, '
  - type: text
    content: with no boasting of innocence
  - type: text
    content: '. '
  - type: note
    content: “every excuse will be silenced” means that there will be no one boasting that they are innocent before God.
  - type: text
    content: 'And so that the entire world will be held accountable to God’s standards. '
  - type: note
    content: Or “may be liable to judgment by God.”
  '2':
  - type: text
    content: 'Actually, there are numerous advantages. '
  - type: note
    content: The Aramaic can be translated “They have increased [prospered] in every way.”
  - type: text
    content: 'Most important, God '
  - type: text
    content: distinguished the Jews from all other people
  - type: text
    content: ' by entrusting them with the revelation of his prophetic promises. '
  - type: note
    content: These prophetic promises (“messages,” “oracles,” or “sayings”) include the entire scope of revelation given to the Jews through the teachings of the Torah and the many prophecies of the coming Messiah, all finding their fulfillment in Jesus, the Anointed One.
  '20':
  - type: text
    content: For by the merit of observing the law no one earns the status of being declared righteous before God, for it is the law that fully exposes and unmasks the reality of sin.
  - type: heading
    content: The Gospel Reveals God’s Righteousness
  '21':
  - type: text
    content: 'But now, independently of the law, the righteousness of God is tangible and brought to light through Jesus, the Anointed One. This is the righteousness that the Scriptures prophesied would come. '
  - type: note
    content: Or “attested to by the Law and the Prophets.”
  - type: text
    content: 'It is God’s righteousness made visible through the faithfulness of Jesus Christ. '
  - type: note
    content: Or “through faith in Jesus Christ.”
  - type: text
    content: 'And now all who believe in him receive that gift. For there is really no difference between us, '
  '23':
  - type: text
    content: 'for we all have sinned and are in need of the glory of God. '
  '24':
  - type: text
    content: 'Yet through his powerful declaration of acquittal, God freely gives away his righteousness. His gift '
  - type: note
    content: The Greek word is dorean, which means “present,” “gift,” “legacy,” “privilege.”
  - type: text
    content: 'of love and favor now cascades over us, all because Jesus, the Anointed One, has liberated us from '
  - type: text
    content: the guilt, punishment, and power of
  - type: text
    content: ' sin!'
  '25':
  - type: text
    content: 'Jesus’ God-given destiny '
  - type: note
    content: The Aramaic can be translated “God ordained in advance an atonement by faith in his [Jesus’] blood.”
  - type: text
    content: 'was to be the sacrifice to take away sins, and now he is our mercy seat '
  - type: note
    content: Or “propitiation.” The mercy seat becomes a metonymy for the sacrificial, redemptive work of Christ. The mercy seat was the lid to the ark of the covenant, which was carried throughout the wilderness for years and finally found a home in the temple in Jerusalem. “Blood of mercy” was sprinkled on the mercy seat (or “place of satisfaction”) yearly on the Day of Atonement, which covered the sins of the people until Jesus sprinkled his blood on the mercy seat in the heavens. The mercy seat was not seen by the people; only the high priest went into the holy of holies to sprinkle blood upon the mercy seat. Yet Jesus was publicly offered as the satisfaction for sin’s consequences.
  - type: text
    content: 'because of his death on the cross. We come to him for mercy, for God has made a provision for us to be forgiven by faith in the sacred blood of Jesus. This is the perfect demonstration of God’s justice, because until now, he had been so patient—holding back his justice out of his tolerance for us. So he covered over '
  - type: note
    content: Or “passed over,” “released” (let it be). This is the only place the Greek word paresis is found in the New Testament.
  - type: text
    content: 'the sins of those who lived prior to Jesus’ sacrifice. '
  '26':
  - type: text
    content: 'And when the season of tolerance came to an end, there was only one possible way for God to give away his righteousness and still be true to both his justice and his mercy—to offer up his own Son. So now, because we stand on the faithfulness of Jesus, '
  - type: note
    content: Or “faith in Jesus.”
  - type: text
    content: God declares us righteous in his eyes!
  '27':
  - type: text
    content: 'Where, then, is there room for boasting? Do our works bring God’s acceptance? Not at all! It was not our works of keeping the law but our faith '
  - type: note
    content: The Aramaic can be translated “It was not our works of keeping Torah, but the Torah of faith.” The Greek is “the law [principle] of faith.”
  - type: text
    content: 'in his finished work '
  - type: text
    content: that makes us right with God
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'So our conclusion is this: God’s wonderful declaration that we are righteous '
  - type: note
    content: Or “continually made righteous.”
  - type: text
    content: in his eyes can only come when we put our faith in Christ, and not in keeping the law.
  - type: heading
    content: The God of All the People
  '29':
  - type: text
    content: 'After all, is God the God of the Jews only, or is he equally the God for all of humanity? Of course, he’s the God of all people! '
  '3':
  - type: text
    content: 'But what if some were unfaithful to their divine calling? Does their unbelief weaken God’s faithfulness? '
  '30':
  - type: text
    content: 'Since there is only one God, he will treat us all the same—he eliminates our guilt and makes us right with him by faith no matter who we are. '
  - type: note
    content: Or “whether they are circumcised or uncircumcised.”
  '31':
  - type: text
    content: Does emphasizing our faith invalidate the law? Absolutely not. Instead, our faith establishes the role the law should rightfully have.
  - type: note
    content: Or “upholds the law.” The rightful role of the law is to bring conviction of sin (vv. 19–20) and to present God’s standard of holiness, now fulfilled in Christ (8:4).
  '4':
  - type: text
    content: 'Absolutely not! God will always be proven faithful and true to his word, while people are proven to be liars. This will fulfill what was written in the Scriptures:'
  - type: text
    content: Your words will always be vindicated
  - type: text
    content: and you will rise victorious
  - type: text
    content: when you are being tried by your critics!
  - type: note
    content: Or “You will prevail when judged.” See Ps. 51:4.
  '5':
  - type: text
    content: 'But what if our wrong shows how right God is? Doesn’t our bad serve the purpose of making God look good? (Of course, I’m only speaking from a human viewpoint.) Would that infer that God is unfair when he displays his anger against wrongdoing? '
  '6':
  - type: text
    content: Absolutely not! For if that were the case, how could God be the righteous judge of all the earth?
  '7':
  - type: text
    content: 'So, if my lie brings into sharp contrast the brightness of God’s truth, and if my lie accentuates his glory, then why should I be condemned as a sinner? '
  '8':
  - type: text
    content: Is it proper for us to sin, just so good things may come? May it never be! Yet there are some who slander us and claim that is what we teach. They deserve to be condemned for even saying it!
  - type: heading
    content: Universal Sinfulness
  '9':
  - type: text
    content: 'So, are we to conclude then that we Jews are superior to all others? Certainly not! For we have already proven '
  - type: note
    content: Or “accused” or “drawn up an indictment.”
  - type: text
    content: 'that both Jews and gentiles are all under the bondage of sin. '
