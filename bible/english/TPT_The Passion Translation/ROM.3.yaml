    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deceitful lies roll off their tongues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The venom of a viper drips from their lips.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
