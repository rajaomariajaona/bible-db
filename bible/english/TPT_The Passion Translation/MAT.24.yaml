      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus is saying that Daniel’s prophecy was not yet fulfilled in Jesus’ time. Many see the fulfillment of this prophecy in AD 70, when Titus, the Roman prince, went into the temple and sacrificed animals to Jupiter.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: taking its stand
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the defiling sign of desolation piling up (setting up) in the Holy Place.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in the Holy Place
    - type: text
      text: ' [let the reader learn], '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These parenthetical words were added by Matthew to encourage us to seek the Lord for the understanding of this mystery. Jesus, speaking in the role of the True Prophet, gives us truth to ponder in veiled language.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
