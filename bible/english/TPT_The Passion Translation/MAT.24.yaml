  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On that day, if you happen to be outside,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “on the roof.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: don’t go back inside to gather belongings.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if you’re working out in the field, don’t run back home to get a coat.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It will be especially hard for pregnant women and for those nursing their babies in those days.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus turned to them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take a good look at all these things, for I’m telling you, there will not be one stone left upon another. It will all be leveled!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy of Jesus was fulfilled by the Roman prince Titus, who, in the Roman war of AD 67–70, destroyed the temple. In about AD 135 the emperor Hadrian completely destroyed the city of Jerusalem and built a new city on its foundations and named it Aelia Capitolina.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So pray that your escape will not be during the winter months or on a Sabbath.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this will be a time of great misery beyond the magnitude of anything the world has ever seen or ever will see. Unless God limited those days, no one would escape.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But because of his love for those chosen to be his, he will shorten that time of trouble.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And you will hear reports from some, saying, ‘Look, he has returned,’ ‘The Messiah is over here,’ or ‘The Messiah is over there!’ Don’t believe it.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For there will be imposters falsely claiming to be God’s ‘Anointed One,’ and false prophets
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “prophets of lies.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will arise to perform miracle signs to lead astray, if possible, those God has chosen to be his.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remember this, for I prophesy it will happen!
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if someone says to you, ‘Look, the Anointed One has returned! He’s in the desert,’ don’t go chasing after him. Or if they say to you, ‘Look, he’s here in our house,’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the inner rooms.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: don’t believe it.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The appearing
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “presence” (Gr.
      - type: usfm
        marker: ft
        children:
