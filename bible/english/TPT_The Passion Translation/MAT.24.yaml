document_id: MAT.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Prophesies the Destruction of the Temple
  - type: text
    content: 'As Jesus was leaving the temple courts, his disciples came to him and pointed out the beautiful architecture of the temple. '
  '10':
  - type: text
    content: Then many will stop following me and fall away,
  - type: text
    content: ' '
  - type: note
    content: Or “Many will stumble” (or take offense).
  - type: text
    content: and they will betray one another and hate one another.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And many lying prophets will arise, deceiving multitudes and leading them away from the path of truth.
  - type: text
    content: ' '
  '12':
  - type: text
    content: There will be such an increase of the sin of lawlessness that those whose hearts once burned with passion for God and others will grow cold.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But hold your hope
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “endure.”
  - type: text
    content: firmly to the end and you will experience life and deliverance.
  '14':
  - type: text
    content: “Yet through it all, the good news of heaven’s kingdom will be proclaimed all over the world, providing every nation with a demonstration of the reality of God. And after that the end of this age will arrive.”
  - type: heading
    content: The Detestable Idol That Brings Misery
  '15':
  - type: text
    content: “When you witness what Daniel prophesied, ‘the disgusting destroyer,’
  - type: text
    content: ' '
  - type: note
    content: Or “the abomination [sin] that brings desolation [desecration].” See Dan. 8:13; 9:27; 11:31; 12:11. Jesus is saying that Daniel’s prophecy was not yet fulfilled in Jesus’ time. Many see the fulfillment of this prophecy in AD 70, when Titus, the Roman prince, went into the temple and sacrificed animals to Jupiter.
  - type: text
    content: taking its stand
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “the defiling sign of desolation piling up (setting up) in the Holy Place.”
  - type: text
    content: in the Holy Place
  - type: text
    content: ' [let the reader learn], '
  - type: note
    content: These parenthetical words were added by Matthew to encourage us to seek the Lord for the understanding of this mystery. Jesus, speaking in the role of the True Prophet, gives us truth to ponder in veiled language.
  '16':
  - type: text
    content: then those in the land of Judah must escape to the higher ground.
  - type: text
    content: ' '
  - type: note
    content: See Jer. 16:16; Zech. 14:5; Luke 21:20–22.
  '17':
  - type: text
    content: On that day, if you happen to be outside,
  - type: text
    content: ' '
  - type: note
    content: Or “on the roof.”
  - type: text
    content: don’t go back inside to gather belongings.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And if you’re working out in the field, don’t run back home to get a coat.
  - type: text
    content: ' '
  '19':
  - type: text
    content: It will be especially hard for pregnant women and for those nursing their babies in those days.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus turned to them and said, '
  - type: text
    content: “Take a good look at all these things, for I’m telling you, there will not be one stone left upon another. It will all be leveled!”
  - type: note
    content: This prophecy of Jesus was fulfilled by the Roman prince Titus, who, in the Roman war of AD 67–70, destroyed the temple. In about AD 135 the emperor Hadrian completely destroyed the city of Jerusalem and built a new city on its foundations and named it Aelia Capitolina.
  '20':
  - type: text
    content: So pray that your escape will not be during the winter months or on a Sabbath.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For this will be a time of great misery beyond the magnitude of anything the world has ever seen or ever will see. Unless God limited those days, no one would escape.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But because of his love for those chosen to be his, he will shorten that time of trouble.
  '23':
  - type: text
    content: “And you will hear reports from some, saying, ‘Look, he has returned,’ ‘The Messiah is over here,’ or ‘The Messiah is over there!’ Don’t believe it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For there will be imposters falsely claiming to be God’s ‘Anointed One,’ and false prophets
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “prophets of lies.”
  - type: text
    content: will arise to perform miracle signs to lead astray, if possible, those God has chosen to be his.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Remember this, for I prophesy it will happen!
  - type: text
    content: ' '
  '26':
  - type: text
    content: So if someone says to you, ‘Look, the Anointed One has returned! He’s in the desert,’ don’t go chasing after him. Or if they say to you, ‘Look, he’s here in our house,’
  - type: text
    content: ' '
  - type: note
    content: Or “in the inner rooms.”
  - type: text
    content: don’t believe it.
  - type: text
    content: ' '
  '27':
  - type: text
    content: The appearing
  - type: text
    content: ' '
  - type: note
    content: Or “presence” (Gr. parousia).
  - type: text
    content: of the Son of Man will burst forth with the brightness of lightning shining from the eastern sky to the west.
  - type: text
    content: ' '
  '28':
  - type: text
    content: How do birds of prey know where the dead body is?
  - type: text
    content: ' '
  - type: note
    content: Or “Wherever you find the corpse, there the eagles will gather.” This peculiar verse is best understood as a parallel of vultures knowing where the carcass is (for example) to how instinctively believers will know when Jesus has appeared.
  - type: text
    content: They just know instinctively, and so you will know when I appear.”
  - type: heading
    content: The Appearing of the Son of Man
  '29':
  - type: text
    content: '“Then immediately this is what will take place: ‘The sun will be darkened and the moon give no light. The stars will fall from the sky and all the cosmic powers will be shaken.’'
  - type: text
    content: ' '
  - type: note
    content: See Isa. 13:10; 34:4; Joel 2:10; Amos 8:9. This can also be viewed as a Hebraic metaphor of the lights of the natural realm being shut off and replaced with heaven’s glory—lights out on the old order. Sun, moon, and stars are also representative of the governmental structures failing with great calamity. A new order, a new glory, is coming to replace the fading glories of this world.
  '3':
  - type: text
    content: 'Later, when they arrived at the Mount of Olives, his disciples came privately to where he was sitting and said, “Tell us, when will these things happen? And what sign should we expect to signal your coming '
  - type: note
    content: Or “presence” (Gr. parousia).
  - type: text
    content: and the completion of this age?”
  - type: note
    content: Although it is possible to translate this “the end of the world,” the Hebraic mind-set of the end of days is a transition into a new age of the Messiah’s coming when all things will be restored.
  '30':
  - type: text
    content: Then the sign announcing the Son of Man will appear in the sky, and all the nations of the earth will mourn over him.
  - type: text
    content: ' '
  - type: note
    content: See Zech. 12:10–14; Rev. 1:7.
  - type: text
    content: And they will see the Son of Man appearing in the clouds of heaven, revealed with mighty power,
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “mighty warriors.”
  - type: text
    content: great splendor, and glory.
  - type: text
    content: ' '
  '31':
  - type: text
    content: And he will send his messengers with the loud blast of the trumpet,
  - type: text
    content: ' '
  - type: note
    content: There is always a deeper meaning to the literal understanding of the text of the Bible. This deeper meaning does not negate the literal, but gives a fuller comprehension. Clouds are metaphors of God’s presence among his people. The trumpet blast is symbolic of the universal announcement that will be heard by all.
  - type: text
    content: and with a great voice
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew, which can also be translated “with a great shout.” This is also found in the Latin Vulgate translated by Jerome, who is believed to have had access to the manuscript of the Hebrew Matthew.
  - type: text
    content: they will gather his beloved chosen ones from the four winds, from one end of heaven to the other!”
  - type: heading
    content: A Parable of the Fig Tree
  '32':
  - type: text
    content: “Now learn the lesson from the parable of the fig tree. When spring arrives and it sends out its tender branches and sprouts leaves, you know that summer is near.
  - type: text
    content: ' '
  '33':
  - type: text
    content: So it will be with you, for when you observe all these things taking place, you will know that he is near, even at the door!
  - type: text
    content: ' '
  '34':
  - type: text
    content: I assure you, the end of this age
  - type: text
    content: ' '
  - type: note
    content: Or “generation.”
  - type: text
    content: will not come until all I have spoken comes to pass.
  - type: text
    content: ' '
  '35':
  - type: text
    content: The earth and sky will wear out and fade away before one word I speak loses its power or fails to accomplish its purpose.”
  - type: heading
    content: Live Always Ready for His Appearing
  '36':
  - type: text
    content: “Concerning that day and exact hour, no one knows when it will arrive, not even the angels of heaven
  - type: text
    content: ' '
  - type: note
    content: A few Greek manuscripts add “nor the Son.” However, that phrase is missing in many Greek texts and is not found in the Hebrew Matthew, the Aramaic, or the Latin Vulgate.
  - type: text
    content: —only the Father knows.
  - type: text
    content: ' '
  '37':
  - type: text
    content: For it will be like it was in the days of Noah when the Son of Man appears.
  - type: text
    content: ' '
  - type: note
    content: Or “so it will be in the Lord’s presence” (Gr. parousia).
  '38':
  - type: text
    content: Before the flood, people lived their lives eating, drinking, marrying, and having children.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew, which is literally “being fruitful and multiplying” (having children). The Greek is “marrying and giving in marriage.”
  '39':
  - type: text
    content: They didn’t realize the end was near until Noah entered the ark, and then suddenly, the flood came and took them all away in judgment. It will happen the same way when the Son of Man appears.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “At that time deception will run rampant. So beware that you are not fooled!
  - type: text
    content: ' '
  '40':
  - type: text
    content: At that time, two men will be working on the farm; one will be taken away in judgment, the other left.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Two women will be grinding grain; one will be taken away in judgment, the other left.
  - type: text
    content: ' '
  - type: note
    content: 'One of the three manuscripts of the Hebrew Matthew, known as Shem-Tob, includes additional text: “This is because the angels at the end of the age will first remove the stumbling blocks [the wicked] from the world and will separate the good from the evil.” This passage is not speaking of what is known as the “rapture,” for as it was in the days of Noah, the evil were “taken” and the righteous were “left.”'
  '42':
  - type: text
    content: 'This is why you must stay alert: because no one knows the day your Lord will come.'
  '43':
  - type: text
    content: '“But realize this: If a homeowner had known what time of night the burglar would come to rob his house, he would have been alert and ready, and not let his house be robbed.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: So always be ready, alert, and prepared, because at an hour when you’re not expecting him, the Son of Man will come.”
  - type: heading
    content: The Wise and Faithful Servant
  '45':
  - type: text
    content: “What would qualify a servant to manage his master’s house? He would be a wise servant who is both faithful and dependable. The master would commission him to oversee others, for he would lead them well and give them food at the right time.
  - type: text
    content: ' '
  '46':
  - type: text
    content: What joy and blessing will come to that faithful servant when the master comes home to find him serving with excellence!
  - type: text
    content: ' '
  '47':
  - type: text
    content: I can promise you, the master will raise him up and put him in charge of all that he owns.
  '48':
  - type: text
    content: “But the evil servant says in his heart, ‘My master delays his coming, and who knows when he will return?’
  - type: text
    content: ' '
  - type: text
    content: And because of the delay, the servant mistreats those in his master’s household. Instead of caring for the ones he was appointed to serve,
  - type: text
    content: ' '
  '49':
  - type: text
    content: he abuses the other servants and begins to party with drunkards.
  - type: text
    content: ' '
  '5':
  - type: text
    content: For many will appear on the scene claiming my authority or saying about themselves, ‘I am the Anointed One,’ and they will lead many astray.
  '50':
  - type: text
    content: Let me tell you what will happen to him. His master will suddenly return unexpectedly, and he will remove the abusive, selfish servant from his position of trust.
  - type: text
    content: ' '
  '51':
  - type: text
    content: And the master will cut him in two
  - type: text
    content: ' '
  - type: note
    content: Most likely hyperbole. The Greek word dichotomeō could also mean that God “will separate him from himself” (soul and body).
  - type: text
    content: and assign him to the place of great sorrow and anguish
  - type: text
    content: ' '
  - type: note
    content: Or “gnashing of teeth.”
  - type: text
    content: along with all the other hypocrites.”
  '6':
  - type: text
    content: “You will hear of wars and revolutions on every side, with more rumors of wars to come. Don’t panic or give in to your fears, for the breaking apart of the world’s systems is destined to happen. But it won’t yet be the end; it will still be unfolding.
  '7':
  - type: text
    content: “Nations
  - type: text
    content: ' '
  - type: note
    content: Or “ethnic group.” See 2 Chron. 15:6; Isa. 19:2.
  - type: text
    content: will go to war against nations and kingdoms against kingdoms. And there will be terrible earthquakes, horrible epidemics,
  - type: text
    content: ' '
  - type: note
    content: Although missing from a few Greek manuscripts, “horrible epidemics” is found in the Hebrew Matthew, the Aramaic, and the majority of Greek texts.
  - type: text
    content: and famines in place after place.
  - type: text
    content: ' '
  '8':
  - type: text
    content: This is how the birth pains
  - type: text
    content: ' '
  - type: text
    content: of the new age will begin
  - type: text
    content: '!”'
  - type: note
    content: The Passion Translation is aware of distorted use of the words “new age”; however, true believers in Christ anticipate the coming of a new day (age) dawning, with Christ and his bride ruling the nations. See Joel 2; Rev. 3:21.
  - type: heading
    content: Persecution of Believers
  '9':
  - type: text
    content: “You can expect to be persecuted, even killed; for you will be hated by all the nations because of your love for me.
  - type: text
    content: ' '
  - type: note
    content: Or “because of my name.”
