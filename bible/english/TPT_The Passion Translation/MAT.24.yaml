verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prophesies the Destruction of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus was leaving the temple courts, his disciples came to him and pointed out the beautiful architecture of the temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then many will stop following me and fall away,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Many will stumble” (or take offense).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they will betray one another and hate one another.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And many lying prophets will arise, deceiving multitudes and leading them away from the path of truth.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There will be such an increase of the sin of lawlessness that those whose hearts once burned with passion for God and others will grow cold.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But hold your hope
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “endure.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: firmly to the end and you will experience life and deliverance.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yet through it all, the good news of heaven’s kingdom will be proclaimed all over the world, providing every nation with a demonstration of the reality of God. And after that the end of this age will arrive.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Detestable Idol That Brings Misery
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you witness what Daniel prophesied, ‘the disgusting destroyer,’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the abomination [sin] that brings desolation [desecration].” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 8:13
      - type: usfm
        marker: ft
        children:
