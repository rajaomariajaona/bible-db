      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This can also be viewed as a Hebraic metaphor of the lights of the natural realm being shut off and replaced with heaven’s glory—lights out on the old order. Sun, moon, and stars are also representative of the governmental structures failing with great calamity. A new order, a new glory, is coming to replace the fading glories of this world.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, when they arrived at the Mount of Olives, his disciples came privately to where he was sitting and said, “Tell us, when will these things happen? And what sign should we expect to signal your coming '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “presence” (Gr.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: parousia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: and the completion of this age?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although it is possible to translate this “the end of the world,” the Hebraic mind-set of the end of days is a transition into a new age of the Messiah’s coming when all things will be restored.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then the sign announcing the Son of Man will appear in the sky, and all the nations of the earth will mourn over him.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 12:10–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And they will see the Son of Man appearing in the clouds of heaven, revealed with mighty power,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew Matthew is “mighty warriors.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: great splendor, and glory.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he will send his messengers with the loud blast of the trumpet,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is always a deeper meaning to the literal understanding of the text of the Bible. This deeper meaning does not negate the literal, but gives a fuller comprehension. Clouds are metaphors of God’s presence among his people. The trumpet blast is symbolic of the universal announcement that will be heard by all.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and with a great voice
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew Matthew, which can also be translated “with a great shout.” This is also found in the Latin Vulgate translated by Jerome, who is believed to have had access to the manuscript of the Hebrew Matthew.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they will gather his beloved chosen ones from the four winds, from one end of heaven to the other!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Parable of the Fig Tree
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now learn the lesson from the parable of the fig tree. When spring arrives and it sends out its tender branches and sprouts leaves, you know that summer is near.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So it will be with you, for when you observe all these things taking place, you will know that he is near, even at the door!
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I assure you, the end of this age
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
