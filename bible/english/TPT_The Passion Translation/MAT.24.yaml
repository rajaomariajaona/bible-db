        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of the Son of Man will burst forth with the brightness of lightning shining from the eastern sky to the west.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How do birds of prey know where the dead body is?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Wherever you find the corpse, there the eagles will gather.” This peculiar verse is best understood as a parallel of vultures knowing where the carcass is (for example) to how instinctively believers will know when Jesus has appeared.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They just know instinctively, and so you will know when I appear.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Appearing of the Son of Man
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Then immediately this is what will take place: ‘The sun will be darkened and the moon give no light. The stars will fall from the sky and all the cosmic powers will be shaken.’'
    - type: text
      text: ' '
