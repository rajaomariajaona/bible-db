      - type: text
        text: There are numerous parallels between Noah and Adam. Both came onto an earth that had been submerged by water. Both were given lordship over creation. Both were blessed and told to multiply. Both were men of the soil, working the ground. Both sinned in a garden (vineyard). Both experienced the exposure of nakedness. Both men’s sins affected their posterity. Both had three sons. And both experienced a prophecy following their fall.
