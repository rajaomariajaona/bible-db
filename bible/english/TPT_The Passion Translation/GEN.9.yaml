  - type: heading
    content: The Rainbow
  '12':
  - type: text
    content: '“Here is the sign for you and future generations that my '
  - type: text
    content: loving
  - type: text
    content: ' covenant will endure between me and you and every animal that came with you out of the ark: '
  '13':
  - type: text
    content: 'I have placed my rainbow '
  - type: note
    content: Or “bending,” most often translated “warrior’s bow,” for just as a warrior hangs up his bow after the battle, so God’s bow, without arrows, is now surrendered to the sky, not aimed at earth, because of his love for humanity. The rainbow around God’s throne is a full circle, for the earth does not cut off God’s rainbow promises. And it is an emerald-colored rainbow around the throne, for it is the promise of life. See Rev. 4:3; 10:1.
  - type: text
    content: 'among the clouds, and it will be a sign of my '
  - type: text
    content: loving
  - type: text
    content: ' covenant between me and the earth. '
  '14':
  - type: text
    content: 'Whenever I bring clouds over the earth, and the rainbow appears in the clouds, '
  '15':
  - type: text
    content: 'I will remember my covenant with you and with every living thing upon the earth. Never again will the waters become a flood to destroy life from the earth. '
  '16':
  - type: text
    content: When the rainbow is in the clouds, I will see it and remember the everlasting covenant I made with you and every living thing of every kind upon the earth.”
  '17':
  - type: text
    content: 'So God said to Noah, “The rainbow is my '
  - type: text
    content: signature
  - type: text
    content: ' in the sky, my seal of love '
  - type: note
    content: Or “sign of confirmation.”
  - type: text
    content: to confirm that I have kept my covenant between me and every living thing on earth.”
  - type: heading
    content: Noah’s Sons
  '18':
  - type: text
    content: 'Noah’s sons came out of the ark with him: Shem, Ham (the father of Canaan), and Japheth. '
  '19':
  - type: text
    content: From these three sons of Noah the entire world was repopulated.
  '2':
  - type: text
    content: 'I will cause every living creature of earth, sky, and sea '
  - type: note
    content: Or “every animal of the earth, every bird of the air, everything that creeps on the ground, and all the fish of the sea.”
  - type: text
    content: 'to fear and dread you from this time forward. They are now under your authority. '
  - type: note
    content: Or “are delivered into your hands.”
  '20':
  - type: text
    content: 'Noah, a farmer, was the first to plant a vineyard. '
  '21':
  - type: text
    content: 'He drank so much of the wine he made that he got drunk and passed out naked inside his tent. '
  - type: note
    content: Chronologically, this would likely have been years after they exited the ark.
  '22':
  - type: text
    content: 'And Ham, the father of Canaan, '
  - type: text
    content: went into the tent and
  - type: text
    content: ' gazed on his '
  - type: text
    content: shamefully
  - type: text
    content: ' exposed father. '
  - type: note
    content: Various Hebrew scholars surmise that this was a euphemistic account of Ham doing some act of gross indecency, not mere voyeurism. See Prov. 30:17; 1 Peter 4:8.
  - type: text
    content: 'Then he went out and informed his brothers. '
  '23':
  - type: text
    content: 'So, Shem and Japheth took their father’s cloak '
  - type: note
    content: Or “the garment.” It is possible that Ham brought his father’s garment outside the tent to show it to his brothers.
  - type: text
    content: 'and walked backwards with the cloak on their shoulders into the tent to cover up their naked father. '
  - type: text
    content: Respectfully
  - type: text
    content: ', they turned their faces away so as not to see their father lying there exposed. '
  '24':
  - type: text
    content: 'When Noah sobered up and realized what his youngest son had done to him, '
  '25':
  - type: text
    content: 'he uttered these words:'
  - type: text
    content: '“Cursed be '
  - type: text
    content: your son
  - type: text
    content: ', Canaan,'
  - type: note
    content: Although it was Ham, Noah’s son, who violated his father, Ham’s son Canaan was the one who was cursed. Some see the possibility that Canaan was complicit in what Ham did.
  - type: text
    content: 'and let him be the lowest of servants '
  - type: note
    content: Or “slave of slaves.” Canaan was the ancestor of the Canaanites. Canaan means “bow down.” See Josh. 9:23; Judg. 1.
  - type: text
    content: to his brothers.”
  '26':
  - type: text
    content: He also said,
  - type: text
    content: '“Worthy of praise is '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the God of Shem!
  - type: note
    content: Jesus Christ came through the lineage of Shem (see Luke 3:23–38), the father of the Semitic peoples. This is a prophecy that Shem would have a special relationship with Yahweh.
  - type: text
    content: Let Canaan be Shem’s slave.
  '27':
  - type: text
    content: May God enlarge Japheth’s family
  - type: text
    content: 'and increase his '
  - type: text
    content: territory
  - type: text
    content: .
  - type: note
    content: Or “May God make room for Japheth.” This a play on words, for the Hebrew triliteral root for Japheth (y-p-t) is identical to the root for “make room,” “increase,” or “enlarge [enrich, prosper].” Japheth was to become the father of enlarged nations, spreading out over the globe.
  - type: text
    content: 'May he '
  - type: text
    content: share in the blessing of Shem
  - type: text
    content: ','
  - type: text
    content: and his descendants make their homes
  - type: text
    content: among the tents of Shem,
  - type: note
    content: Many scholars view this as an alliance between Shem and Japheth that would include sharing the blessing of prosperity among them.
  - type: text
    content: and may Canaan be his slave also!”
  - type: note
    content: This account of Noah’s cursing and blessing of his three sons illustrates the power of a father’s words over his children (and grandchildren) and how those words create the reality of their future. Descendants of each of Noah’s sons were present at the crucifixion of the Lord Jesus. The descendants of Shem were present in the Jewish religious leaders who conspired to crucify the Messiah. Japheth was present in the Romans who participated jointly with the Jews to crucify the Lord Jesus. And a descendant of Ham was present in the person of Simon of Cyrene, who bore the cross of Christ in servitude (see Luke 23:26). The sons of Noah are brought before us again in Acts 8–10. The Ethiopian was a descendant of Ham whom Philip blessed with the gospel (see Acts 8:25–40). Saul of Tarsus (Paul) was from Shem and was also converted by the revelation of Jesus (see Acts 9:1–31). Cornelius the centurion was a son of Japheth who believed the good news of Christ (see Acts 10).
  '28':
  - type: text
    content: 'After the flood, Noah lived another three hundred and fifty years. '
  '29':
  - type: text
    content: Noah’s entire lifetime was nine hundred and fifty years, and then he died.
  - type: note
    content: There are numerous parallels between Noah and Adam. Both came onto an earth that had been submerged by water. Both were given lordship over creation. Both were blessed and told to multiply. Both were men of the soil, working the ground. Both sinned in a garden (vineyard). Both experienced the exposure of nakedness. Both men’s sins affected their posterity. Both had three sons. And both experienced a prophecy following their fall.
