document_id: GEN.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Covenant with Noah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lovingly
  - type: text
    text: ' blessed Noah and all his family and said to them, “Reproduce, be fruitful, and populate the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will cause every living creature of earth, sky, and sea '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “every animal of the earth, every bird of the air, everything that creeps on the ground, and all the fish of the sea.”
    marker-yv: yv-n
  - type: text
    text: 'to fear and dread you from this time forward. They are now under your authority. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “are delivered into your hands.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You may now eat the meat of animals '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “every moving thing that lives.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 2:16
      metadata:
        usfm: COL.2.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 4:3–5
      metadata:
        usfm: 1TI.4.3+1TI.4.4+1TI.4.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'as well as green plants; I now give you everything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for food for you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'However, you must not eat meat with its lifeblood still in it, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for its life is in the blood
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If anyone takes another person’s life, I will demand an account—whether from man or beast, I will demand an account for taking a human life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Whoever sheds human blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: by other humans he must have his own blood shed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to kill a person is to kill
  - type: text
    text: ' one made'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'in God’s own '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beautiful
  - type: text
    text: ' image.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now all of you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with my blessing
  - type: text
    text: ', reproduce,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: be fruitful and repopulate the earth.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “swarm throughout the earth.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then God said to Noah and his family, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“I establish my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loving
  - type: text
    text: ' covenant '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “covenant” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: berit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and is found numerous times in this chapter. God’s covenant turns judgment into grace.
    marker-yv: yv-n
  - type: text
    text: 'with you, your descendants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and every living creature that is with you—animals large and small, birds, and every living thing that came out of the ark. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will maintain my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loving
  - type: text
    text: ' covenant with you. I will never again completely destroy life on earth by means of a flood. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes
  - type: text
    text: ', never again will a flood destroy the whole earth!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rainbow
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Here is the sign for you and future generations that my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loving
  - type: text
    text: ' covenant will endure between me and you and every animal that came with you out of the ark: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I have placed my rainbow '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “bending,” most often translated “warrior’s bow,” for just as a warrior hangs up his bow after the battle, so God’s bow, without arrows, is now surrendered to the sky, not aimed at earth, because of his love for humanity. The rainbow around God’s throne is a full circle, for the earth does not cut off God’s rainbow promises. And it is an emerald-colored rainbow around the throne, for it is the promise of life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 4:3
      metadata:
        usfm: REV.4.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:1
      metadata:
        usfm: REV.10.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'among the clouds, and it will be a sign of my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loving
  - type: text
    text: ' covenant between me and the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Whenever I bring clouds over the earth, and the rainbow appears in the clouds, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I will remember my covenant with you and with every living thing upon the earth. Never again will the waters become a flood to destroy life from the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the rainbow is in the clouds, I will see it and remember the everlasting covenant I made with you and every living thing of every kind upon the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So God said to Noah, “The rainbow is my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: signature
  - type: text
    text: ' in the sky, my seal of love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sign of confirmation.”
    marker-yv: yv-n
  - type: text
    text: to confirm that I have kept my covenant between me and every living thing on earth.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noah’s Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noah’s sons came out of the ark with him: Shem, Ham (the father of Canaan), and Japheth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: From these three sons of Noah the entire world was repopulated.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noah, a farmer, was the first to plant a vineyard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He drank so much of the wine he made that he got drunk and passed out naked inside his tent. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chronologically, this would likely have been years after they exited the ark.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Ham, the father of Canaan, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: went into the tent and
  - type: text
    text: ' gazed on his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shamefully
  - type: text
    text: ' exposed father. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Various Hebrew scholars surmise that this was a euphemistic account of Ham doing some act of gross indecency, not mere voyeurism. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 30:17
      metadata:
        usfm: PRO.30.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 4:8
      metadata:
        usfm: 1PE.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Then he went out and informed his brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So, Shem and Japheth took their father’s cloak '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the garment.” It is possible that Ham brought his father’s garment outside the tent to show it to his brothers.
    marker-yv: yv-n
  - type: text
    text: 'and walked backwards with the cloak on their shoulders into the tent to cover up their naked father. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Respectfully
  - type: text
    text: ', they turned their faces away so as not to see their father lying there exposed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Noah sobered up and realized what his youngest son had done to him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'he uttered these words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Cursed be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your son
  - type: text
    text: ', Canaan,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although it was Ham, Noah’s son, who violated his father, Ham’s son Canaan was the one who was cursed. Some see the possibility that Canaan was complicit in what Ham did.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and let him be the lowest of servants '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “slave of slaves.” Canaan was the ancestor of the Canaanites.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Canaan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “bow down.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 9:23
      metadata:
        usfm: JOS.9.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 1
      metadata:
        usfm: JDG.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: to his brothers.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He also said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Worthy of praise is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: the God of Shem!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus Christ came through the lineage of Shem (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 3:23–38
      metadata:
        usfm: LUK.3.23+LUK.3.24+LUK.3.25+LUK.3.26+LUK.3.27+LUK.3.28+LUK.3.29+LUK.3.30+LUK.3.31+LUK.3.32+LUK.3.33+LUK.3.34+LUK.3.35+LUK.3.36+LUK.3.37+LUK.3.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), the father of the Semitic peoples. This is a prophecy that Shem would have a special relationship with
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let Canaan be Shem’s slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: May God enlarge Japheth’s family
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and increase his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: territory
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “May God make room for Japheth.” This a play on words, for the Hebrew triliteral root for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Japheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: it
      children:
      - type: text
        text: y-p-t
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is identical to the root for “make room,” “increase,” or “enlarge [enrich, prosper].” Japheth was to become the father of enlarged nations, spreading out over the globe.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: share in the blessing of Shem
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his descendants make their homes
- type: usfm
  marker: q1
  children:
  - type: text
    text: among the tents of Shem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many scholars view this as an alliance between Shem and Japheth that would include sharing the blessing of prosperity among them.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and may Canaan be his slave also!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
