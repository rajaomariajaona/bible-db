document_id: HOS.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Summary of Yahweh’s Case against Israel
  - type: text
    content: When Ephraim used to speak,
  - type: text
    content: his words commanded great respect.
  - type: text
    content: He once had great authority in Israel,
  - type: note
    content: Early in Israel’s history in the land, the people of Ephraim were powerful. See Josh. 24:29–30 ; Judg. 8:1–3 ; 12:1–6 .
  - type: text
    content: but he became guilty of Baal worship
  - type: text
    content: and signed his own death warrant.
  '10':
  - type: text
    content: “Where is your king now,
  - type: text
    content: who could save you in all your cities?
  - type: text
    content: Where are your rulers, of whom you said,
  - type: text
    content: ‘Give us a king and leaders’?
  '11':
  - type: text
    content: In my anger, I gave you kings,
  - type: text
    content: and in my wrath, I have taken them away.
  - type: note
    content: In the greater context of Hosea and his unhappy marriage, the Hebrew verbs translated “gave” and “taken” are frequently used to describe a women “given” in marriage and a man having “taken” a wife.
  '12':
  - type: text
    content: “Ephraim’s sin is recorded;
  - type: text
    content: his guilt is on record and kept in store.
  '13':
  - type: text
    content: “You are like a senseless baby
  - type: text
    content: at the point of childbirth;
  - type: text
    content: labor pains have begun, and his time is due,
  - type: text
    content: but he refuses to leave the womb.
  - type: note
    content: The metaphor of childbirth demonstrates that Ephraim had experienced catastrophes (labor pains) that were designed by God to produce a change of heart (the birthing of new life). But since Ephraim refused to learn from his disasters (leave the womb) and refused to repent (be born anew), he was doomed.
  '14':
  - type: text
    content: Shall I save my people from the clutches of Sheol?
  - type: note
    content: The Hebrew concept of Sheol is the dark underworld, the world of the dead, and at times a reference to the grave.
  - type: text
    content: Shall I ransom them from Death’s firm grip?
  - type: text
    content: Hey, Death! Tell me, where is your punishment?
  - type: text
    content: 'Hey, Grave! '
  - type: note
    content: “Grave” is the Hebrew word Sheol .
  - type: text
    content: Tell me, where is your sting?
  - type: text
    content: Revenge will be hidden from my eyes.”
  - type: heading
    content: Final Warning
  '15':
  - type: text
    content: 'Though '
  - type: text
    content: Ephraim
  - type: text
    content: ' bears more fruit '
  - type: note
    content: This is an obvious play on the word Ephraim , which means “doubly fruitful.” See Gen. 41:52 .
  - type: text
    content: than his brothers,
  - type: text
    content: Yahweh
  - type: text
    content: ’s breath will blow from the desert.
  - type: text
    content: The scorching wind will come from the east;
  - type: note
    content: The wind of the east is a reference to Assyria, the nation that God would bring against his people in judgment.
  - type: text
    content: it will dry up his springs,
  - type: text
    content: and his wells will run dry.
  - type: text
    content: The wind will come to plunder his treasury,
  - type: text
    content: robbing it of every precious thing.
  '16':
  - type: text
    content: Samaria will be punished
  - type: text
    content: because she has rebelled against her God.
  - type: text
    content: Her people will fall by the sword;
  - type: text
    content: even her little ones will be dashed to pieces
  - type: text
    content: and her pregnant women split open.
  - type: note
    content: Although this verse is noted as 14:1 in the Hebrew Bible, most modern English versions follow the Septuagint in numbering it as 13:16 . The subject matter of this verse fits better with ch. 13 .
  '2':
  - type: text
    content: And now they sin more and more
  - type: text
    content: by making silver idols for themselves,
  - type: text
    content: cleverly crafted idols of their own invention—
  - type: text
    content: each skillfully made by human hands.
  - type: text
    content: “Sacrifice to them,” they say.
  - type: text
    content: Why would men kiss idols of calves?
  - type: note
    content: Or “Those who offer human sacrifice kiss [images of] calves.”
  '3':
  - type: text
    content: 'Therefore, '
  - type: text
    content: the entire tribe of Ephraim
  - type: text
    content: ' will vanish'
  - type: text
    content: like the morning mist,
  - type: text
    content: like the dew that quickly disappears,
  - type: text
    content: like the chaff blown by the wind from the threshing floor,
  - type: text
    content: like smoke rising from a chimney.
  - type: heading
    content: Yahweh Is Still the God of Israel
  '4':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have been your true God'
  - type: text
    content: ever since your days in Egypt.
  - type: note
    content: 'The Septuagint adds a sentence before this verse: “I am the Lord your God who set the heavens firm and keeps the earth steady; my hands have created the whole array of heaven, but I have not shown these to you for you to follow them. It was I who brought you up out of Egypt.”'
  - type: text
    content: You must know no other god but me.
  - type: text
    content: There is no other god who can save you.
  '5':
  - type: text
    content: 'I tenderly cared for you '
  - type: note
    content: The Syriac and the Septuagint read “I shepherded [fed] you.” God was reminding his people that he had always provided for them, even in a difficult season of their lives.
  - type: text
    content: in the desert,
  - type: text
    content: in the land of dreadful drought.
  - type: note
    content: Or “burning heat.”
  '6':
  - type: text
    content: When I pastured you, you were full,
  - type: text
    content: but when you were satisfied, your hearts grew proud,
  - type: text
    content: and you completely forgot about me.
  '7':
  - type: text
    content: 'So now I will be '
  - type: note
    content: There is a possible play on words, for “I will be” in the Hebrew is very close to the name for Yahweh , “I AM that I AM” or “I AM who I will be.”
  - type: text
    content: like a male lion to you,
  - type: text
    content: like a leopard lurking beside the path.
  '8':
  - type: text
    content: I will attack you like a charging bear robbed of her cubs,
  - type: text
    content: and will rip open your chest.
  - type: note
    content: The irony is stinging. They would not open their hearts (chest) to the things of God, so now, God would rip their hearts open in judgment.
  - type: text
    content: Like a lioness, I will devour you on the spot;
  - type: text
    content: 'like a wild beast '
  - type: note
    content: Some Jewish scholars view the “wild beast” as the Assyrians.
  - type: text
    content: I will tear you to shreds!
  '9':
  - type: text
    content: Israel, you have destroyed yourself,
  - type: text
    content: because you are against me, your only help.”
  - type: note
    content: Literally “He/It has destroyed you, Israel, because with/in me [is] with/in your help.” The meaning of the Hebrew is uncertain.
  - type: heading
    content: Israel’s Ruin
