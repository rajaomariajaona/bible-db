  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now they sin more and more
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by making silver idols for themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cleverly crafted idols of their own invention—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each skillfully made by human hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sacrifice to them,” they say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would men kiss idols of calves?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Those who offer human sacrifice kiss [images of] calves.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the entire tribe of Ephraim
    - type: text
      text: ' will vanish'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the morning mist,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the dew that quickly disappears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the chaff blown by the wind from the threshing floor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like smoke rising from a chimney.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' Is Still the God of Israel'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have been your true God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ever since your days in Egypt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Septuagint adds a sentence before this verse: “I am the Lord your God who set the heavens firm and keeps the earth steady; my hands have created the whole array of heaven, but I have not shown these to you for you to follow them. It was I who brought you up out of Egypt.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You must know no other god but me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no other god who can save you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I tenderly cared for you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Syriac and the Septuagint read “I shepherded [fed] you.” God was reminding his people that he had always provided for them, even in a difficult season of their lives.
      marker-yv: yv-n
    - type: text
      text: in the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the land of dreadful drought.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “burning heat.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I pastured you, you were full,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when you were satisfied, your hearts grew proud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you completely forgot about me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So now I will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is a possible play on words, for “I will be” in the Hebrew is very close to the name for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', “I AM that I AM” or “I AM who I will be.”'
      marker-yv: yv-n
    - type: text
      text: like a male lion to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a leopard lurking beside the path.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will attack you like a charging bear robbed of her cubs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will rip open your chest.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The irony is stinging. They would not open their hearts (chest) to the things of God, so now, God would rip their hearts open in judgment.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lioness, I will devour you on the spot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'like a wild beast '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Jewish scholars view the “wild beast” as the Assyrians.
      marker-yv: yv-n
    - type: text
      text: I will tear you to shreds!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel, you have destroyed yourself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because you are against me, your only help.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “He/It has destroyed you, Israel, because with/in me [is] with/in your help.” The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Ruin
    marker-yv: yv-h
