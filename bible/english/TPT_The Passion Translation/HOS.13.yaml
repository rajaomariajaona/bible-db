      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he became guilty of Baal worship
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and signed his own death warrant.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where is your king now,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who could save you in all your cities?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are your rulers, of whom you said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Give us a king and leaders’?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my anger, I gave you kings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and in my wrath, I have taken them away.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the greater context of Hosea and his unhappy marriage, the Hebrew verbs translated “gave” and “taken” are frequently used to describe a women “given” in marriage and a man having “taken” a wife.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ephraim’s sin is recorded;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his guilt is on record and kept in store.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are like a senseless baby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the point of childbirth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: labor pains have begun, and his time is due,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he refuses to leave the womb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The metaphor of childbirth demonstrates that Ephraim had experienced catastrophes (labor pains) that were designed by God to produce a change of heart (the birthing of new life). But since Ephraim refused to learn from his disasters (leave the womb) and refused to repent (be born anew), he was doomed.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I save my people from the clutches of Sheol?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew concept of Sheol is the dark underworld, the world of the dead, and at times a reference to the grave.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I ransom them from Death’s firm grip?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hey, Death! Tell me, where is your punishment?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hey, Grave! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Grave” is the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sheol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tell me, where is your sting?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenge will be hidden from my eyes.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Final Warning
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ephraim
    - type: text
      text: ' bears more fruit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an obvious play on the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ephraim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “doubly fruitful.” See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 41:52
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: than his brothers,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s breath will blow from the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scorching wind will come from the east;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The wind of the east is a reference to Assyria, the nation that God would bring against his people in judgment.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will dry up his springs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his wells will run dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wind will come to plunder his treasury,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: robbing it of every precious thing.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samaria will be punished
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because she has rebelled against her God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her people will fall by the sword;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even her little ones will be dashed to pieces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her pregnant women split open.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although this verse is noted as
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:1
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in the Hebrew Bible, most modern English versions follow the Septuagint in numbering it as
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:16
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The subject matter of this verse fits better with ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ' '
      - type: usfm
