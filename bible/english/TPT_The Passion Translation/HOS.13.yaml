    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Ephraim used to speak,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his words commanded great respect.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He once had great authority in Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early in Israel’s history in the land, the people of Ephraim were powerful. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:29–30
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 8:1–3
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
