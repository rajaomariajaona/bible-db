document_id: PSA.140,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer for Protection
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s poetic song
  - type: text
    content: Lord, protect me from this evil one!
  - type: text
    content: Rescue me from these violent schemes!
  '10':
  - type: text
    content: May their slanderous lives never prosper!
  - type: text
    content: Let evil itself hunt them down and pursue them relentlessly
  - type: text
    content: until they are thrown into fiery pits
  - type: text
    content: from which they will never get out!
  - type: text
    content: Let burning coals of hellfire fall upon their heads!
  '12':
  - type: text
    content: For I know, Lord, that you will be the hero
  - type: text
    content: of all those they persecute,
  - type: text
    content: and you will secure justice for the poor.
  '13':
  - type: text
    content: Your godly ones will thank you no matter what happens.
  - type: text
    content: For they choose and cherish your presence
  - type: text
    content: above everything else!
  '2':
  - type: text
    content: He concocts his secret strategy to divide and harm others,
  - type: text
    content: stirring up trouble one against another.
  '3':
  - type: text
    content: They are known for their sharp rhetoric
  - type: text
    content: of poisonous, hateful words.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: Keep me safe, Lord, out of reach from these wicked and violent men,
  - type: text
    content: and guard me, God, for they have plotted an evil scheme
  - type: text
    content: to ruin me and bring me down.
  '5':
  - type: text
    content: They are proud and insolent; they’ve set an ambush for me in secret.
  - type: text
    content: They are determined to snare me in their net like captured prey.
  - type: text
    content: Pause in his presence
  '6':
  - type: text
    content: O Lord, you are my God and my saving strength!
  - type: text
    content: My Hero-God, you wrap yourself around me to protect me.
  - type: text
    content: For I’m surrounded by your presence in my day of battle.
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', hear my cry.'
  - type: text
    content: May my voice move your heart to show me mercy.
  '8':
  - type: text
    content: Don’t let the wicked triumph over me,
  - type: text
    content: but bring down their every strategy to subdue me
  - type: text
    content: or they will become even more arrogant!
  - type: text
    content: Pause in his presence
  '9':
  - type: text
    content: Those who surround me are nothing but proud troublemakers.
  - type: text
    content: May they drink the poison of their own poisonous words.
