document_id: PSA.140,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Prayer for Protection
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lord, protect me from this evil one!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from these violent schemes!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: May their slanderous lives never prosper!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let evil itself hunt them down and pursue them relentlessly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until they are thrown into fiery pits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from which they will never get out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let burning coals of hellfire fall upon their heads!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For I know, Lord, that you will be the hero
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of all those they persecute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you will secure justice for the poor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Your godly ones will thank you no matter what happens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they choose and cherish your presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: above everything else!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He concocts his secret strategy to divide and harm others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stirring up trouble one against another.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They are known for their sharp rhetoric
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of poisonous, hateful words.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Keep me safe, Lord, out of reach from these wicked and violent men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and guard me, God, for they have plotted an evil scheme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to ruin me and bring me down.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They are proud and insolent; they’ve set an ambush for me in secret.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are determined to snare me in their net like captured prey.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: O Lord, you are my God and my saving strength!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My Hero-God, you wrap yourself around me to protect me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I’m surrounded by your presence in my day of battle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', hear my cry.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May my voice move your heart to show me mercy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Don’t let the wicked triumph over me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but bring down their every strategy to subdue me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or they will become even more arrogant!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Those who surround me are nothing but proud troublemakers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they drink the poison of their own poisonous words.
