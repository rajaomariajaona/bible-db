document_id: 1CO.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Greeting
  - type: text
    content: 'From Paul, divinely appointed according to the plan of God, to be an apostle of the Anointed One, Jesus. Our fellow believer Sosthenes '
  - type: note
    content: Sosthenes means “savior of his nation.” He was the Jewish synagogue ruler in Corinth who had converted to Christ and had been beaten for his faith (Acts 18:12–17).
  - type: text
    content: 'joins me '
  '10':
  - type: text
    content: 'I urge you, my brothers and sisters, for the sake of the name of our Lord Jesus Christ, to agree to live in unity with one another '
  - type: note
    content: Or “that you all speak the same thing”; that is, to have a united testimony. The Aramaic can be translated “that you may all be of one word.”
  - type: text
    content: 'and put to rest any division that attempts to tear you apart. '
  - type: note
    content: The congregation of believers in Corinth was sorely divided. They had divided over which leader or apostle they followed (chs. 1–3), over the limits of their freedom (chs. 6–8), over their socio-economic status (ch. 11), and over spiritual gifts (chs. 12–14). Division among believers grossly hinders our message and ministry to the world of unbelievers. Paul is pleading with them to unite around the love of God for one another (ch. 13).
  - type: text
    content: 'Be restored '
  - type: note
    content: Or “fully equipped.”
  - type: text
    content: as one united body living in perfect harmony. Form a consistent choreography among yourselves, having a common perspective with shared values.
  '11':
  - type: text
    content: 'My dear brothers and sisters, '
  - type: text
    content: I have a serious concern I need to bring up with you
  - type: text
    content: ', '
  - type: note
    content: Before Paul brought correction to the Corinthians, he first affirmed the work of God in their midst. See vv. 4–9. Perhaps we should look at confused and messed-up Christians differently and speak to how God sees imperfect believers.
  - type: text
    content: 'for I have been informed by those of Chloe’s '
  - type: text
    content: house church
  - type: text
    content: ' '
  - type: note
    content: Or “Chloe’s people.” The word household or family is not in the Greek text. By implication, it refers to those who are meeting with Chloe, as the one they are connected to (Chloe’s people; i.e., house church, or Chloe’s congregation). She was obviously a trusted leader in Paul’s estimation and had influence in the church of Corinth. Her name means “green [tender] sprout.” Those who informed Paul of the problems in Corinth may have been Stephanas, Fortunatus, and Achaicus, mentioned in 1 Cor. 16:17.
  - type: text
    content: 'that you have been destructively arguing among yourselves. '
  '12':
  - type: text
    content: 'And I need to bring this up because each of you is claiming loyalty to different preachers. Some are saying, “I am a disciple of Paul,” or, “I follow Apollos,” or, “I am a disciple of Peter the Rock,” '
  - type: note
    content: Or “Cephas,” the Aramaic word for rock (keefa) transliterated into Greek. Paul is comfortable in calling Peter by his Aramaic nickname, Keefa.
  - type: text
    content: 'and some, “I belong '
  - type: text
    content: only
  - type: text
    content: ' to Christ.” '
  '13':
  - type: text
    content: 'But '
  - type: text
    content: let me ask you
  - type: text
    content: ', is Christ divided up into groups? Did I die on the cross for you? At your baptism did you pledge yourselves to follow Paul?'
  - type: note
    content: Or “Were you baptized in the name of Paul?”
  '14':
  - type: text
    content: 'Thank God I only baptized two from Corinth—Crispus and Gaius! '
  - type: note
    content: Before converting to faith in Christ, Crispus was likely the ruler of the synagogue in Corinth mentioned in Acts 18:18. Gaius was most likely the one who hosted Paul when he came to Rome (Rom. 16:23). Since they had become believers before Paul’s assistants, Timothy and Silas, arrived from Macedonia, Paul went ahead and baptized them.
  '15':
  - type: text
    content: 'So now no one can say that in my name I baptized others. '
  - type: note
    content: As translated from the Aramaic. The Greek is “so that no one can say that they were baptized in my name.”
  '16':
  - type: text
    content: '(Yes, I also baptized Stephanus and his family. Other than that, I don’t remember baptizing anyone else.) '
  '17':
  - type: text
    content: 'For the Anointed One has sent me on a mission, not to see how many I could baptize, '
  - type: note
    content: In the broader context of Paul’s teaching, both baptism and the Lord’s Table proclaim the Lord Jesus (Rom. 6:3–11; 1 Cor. 11:24–27). Therefore, viewing Paul’s statement as somewhat hyperbolic, it is taken to mean that he was not sent just to baptize but also to preach the gospel.
  - type: text
    content: but to proclaim the good news. And I declare this message stripped of all philosophical arguments that empty the cross of its true power. For I trust in the all-sufficient cross of Christ alone.
  - type: heading
    content: The True Power of the Cross
  '18':
  - type: text
    content: 'To preach the message '
  - type: note
    content: Or “expression [Gr. logos]” or “the act of proclaiming.”
  - type: text
    content: 'of the cross seems like sheer nonsense to those who are on their way to destruction, but to us who are being saved, it is the mighty power of God released within us. '
  - type: note
    content: The “message of the cross” becomes the ignition point where God’s power becomes operative and actualized with the ability to convert, transform, and save. The Aramaic can be translated “For he [rather than the message] is the power of God.”
  '19':
  - type: text
    content: 'For it is written:'
  - type: text
    content: I will dismantle the wisdom of the wise
  - type: text
    content: and I will invalidate the intelligence of the scholars.
  - type: note
    content: See Isa. 29:14 (LXX). Paul uses the prophecy of Isaiah as a warning against leaning upon human wisdom to understand spiritual matters. True wisdom comes from above and is given by divine revelation to those who are teachable and humble before God.
  '2':
  - type: text
    content: 'in writing you this letter addressed to the community of God '
  - type: note
    content: Or “church.” This is the Greek word ekklēsia, which means “a summoned people, called to assemble, a legislative body.” It is also a word used in Greek culture to “assemble an army.”
  - type: text
    content: throughout the city of Corinth. For you have been made pure, set apart in the Anointed One, Jesus. And God has invited you to be his devoted and holy people, and not only you, but everyone everywhere who calls on the name of our Lord Jesus Christ as their Lord, and ours also.
  '20':
  - type: text
    content: 'So where is the wise philosopher '
  - type: text
    content: who understands
  - type: text
    content: '? Where is the expert scholar '
  - type: text
    content: who comprehends
  - type: text
    content: '? And where is the skilled debater of our time '
  - type: text
    content: who could win a debate with God
  - type: text
    content: '? Hasn’t God demonstrated that the wisdom of this world system is utter foolishness?'
  '21':
  - type: text
    content: 'For in his wisdom, '
  - type: text
    content: God designed that all
  - type: text
    content: ' the world’s wisdom would be insufficient to lead people to the discovery of himself. He took great delight in baffling the wisdom of the world by using the simplicity of preaching the story of the cross '
  - type: note
    content: Or simply “the foolishness of preaching.” However, it is not the act of preaching but the content of what is preached that brings salvation to those who believe.
  - type: text
    content: 'in order to save those who believe it. '
  '22':
  - type: text
    content: 'For the Jews constantly demand to see miraculous signs, while those who are not Jews '
  - type: note
    content: The Aramaic uses the term Arameans for gentiles. It means “Aramaic-speaking people.”
  - type: text
    content: 'constantly cling to the world’s wisdom, '
  - type: note
    content: To paraphrase, the gentiles seek for success in the world’s eyes, or a wisdom that leads them to succeed. Christ crucified is both a miracle sign and the wisdom that will lead one to reign in life.
  '23':
  - type: text
    content: 'but we preach the crucified Messiah. The Jews stumble over him and the rest of the world sees him as foolishness. '
  '24':
  - type: text
    content: 'But for those who have been chosen to follow him, both Jews and Greeks, he is God’s mighty power, God’s true wisdom, and our Messiah. '
  - type: note
    content: Christ is the supreme manifestation of God’s power to save us from sin, to work miracles, and to defeat evil. Christ is the supreme manifestation of wisdom, for he carries out the eternal plan of God and brings it to completion.
  '25':
  - type: text
    content: For the “foolish” things of God have proven to be wiser than human wisdom. And the “feeble” things of God have proven to be far more powerful than any human ability.
  - type: note
    content: Although the cross seemed to be the foolishness of God, it reveals his transcendent wisdom. And though God the Son was crucified in weakness, he has risen through the divine power that transforms lives today. God has no weakness or foolishness whatsoever. Yet what looks like weakness is actually his strength, and what looks like foolishness is actually his wisdom.
  - type: heading
    content: God’s Calling
  '26':
  - type: text
    content: 'Brothers and sisters, consider who you were when God called you '
  - type: text
    content: to salvation
  - type: text
    content: '. Not many of you were wise scholars by human standards, nor were many of you in positions of power. Not many of you were considered the elite '
  - type: text
    content: when you answered God’s call
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'But God chose those whom the world considers foolish to shame those who think they are wise, and God chose the puny and powerless to shame '
  - type: note
    content: The Greek word kataischyunō can also be translated “embarrass,” “confuse,” “baffle,” or “frustrate.”
  - type: text
    content: 'the high and mighty. '
  '28':
  - type: text
    content: 'He chose the lowly, the laughable '
  - type: note
    content: Or “despised,” “disgusting,” “outcasts,” “perceived with contempt.”
  - type: text
    content: 'in the world’s eyes—nobodies—so that he would shame the somebodies. For he chose what is regarded as insignificant in order to supersede what is regarded as prominent, '
  '29':
  - type: text
    content: 'so that there would be no place for prideful boasting in God’s presence. '
  '3':
  - type: text
    content: 'May joyous grace '
  - type: note
    content: The Greek word charis, in its original sense, is descriptive of that which brings pleasure and joy to the human heart, implying a strong emotional element. God’s grace includes favor and supernatural potency, and it is meant to leave us both charming and beautiful. In classical Greek it was meant to convey the attitude of favor shown by royalty. See Torrance, The Doctrine of Grace in the Apostolic Fathers, pp. 1–5.
  - type: text
    content: and endless peace be yours continually from our Father God and from our Lord Jesus, the Anointed One!
  - type: heading
    content: Made Wonderfully Rich
  '30':
  - type: text
    content: For it is not from man that we draw our life
  - type: text
    content: ' but from God as we are being joined to Jesus, the Anointed One. And now he is our God-given wisdom, our virtue, our holiness, and our redemption. '
  '31':
  - type: text
    content: 'And this fulfills what is written:'
  - type: text
    content: If anyone boasts, let him only boast
  - type: text
    content: in all that the Lord has done!
  - type: note
    content: Or “He who triumphs, let him triumph in the Lord God!” See Jer. 9:24.
  '4':
  - type: text
    content: 'I am always thanking my God for you because he has given you such free and open access to his grace through your union with Jesus, the Messiah. '
  '5':
  - type: text
    content: 'In him you have been made extravagantly rich in every way. You have been endowed with a wealth of inspired utterance '
  - type: note
    content: Or “in every kind of speaking.” By implication, Paul is commending them for their speaking gifts (prophecy, tongues and interpretation of tongues, preaching, and teaching the word of God). This will be developed further in chs. 12–14.
  - type: text
    content: 'and the riches that come from your intimate knowledge of him. '
  '6':
  - type: text
    content: 'For the reality of the truth of Christ is seen among you and strengthened '
  - type: note
    content: Or “validated” or “confirmed.” The word used here is found in classical Greek in the context of establishing (building) communities.
  - type: text
    content: 'through your experience of him. '
  '7':
  - type: text
    content: 'So now you aren’t lacking any spiritual gift '
  - type: note
    content: Or “You don’t fail to receive any gift of the Holy Spirit.” God wants his church to receive every gift the Holy Spirit has to give us. This may be a figure of speech called a litotes, which means it could also be translated, “You have every spiritual gift.”
  - type: text
    content: 'as you eagerly await the unveiling '
  - type: note
    content: Or “eagerly accept” or “eagerly await.” The Greek word ekdechomai is a compound word, ek (out of, from) and dechomai (to accept or receive or take hold of).
  - type: text
    content: 'of the Lord Jesus, the Anointed One. '
  '8':
  - type: text
    content: 'He will keep you steady and strong to the very end, making your character mature so that you will be found innocent on the day of our Lord Jesus Christ. '
  '9':
  - type: text
    content: 'God is forever faithful and can be trusted to do this in you, for he has invited you to co-share the life of his Son, '
  - type: note
    content: Or “a life of communion with his Son.” That is, a co-participation (communion, fellowship) of the Son. The Aramaic can be translated “You have been called to the (wedding) feast of his Son.” We see a clear picture here that believers are called to share in the sonship of Jesus. By God’s grace, we will share in the Son’s standing and position before the Father. We are not only blameless but made holy by the co-sharing of the life of God’s Son.
  - type: text
    content: Jesus, the Anointed One, our King!
  - type: note
    content: Or “Lord.”
  - type: heading
    content: Paul Addresses Divisions in the Church
