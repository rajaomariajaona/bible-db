document_id: 1CO.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From Paul, divinely appointed according to the plan of God, to be an apostle of the Anointed One, Jesus. Our fellow believer Sosthenes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sosthenes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “savior of his nation.” He was the Jewish synagogue ruler in Corinth who had converted to Christ and had been beaten for his faith (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:12–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'joins me '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I urge you, my brothers and sisters, for the sake of the name of our Lord Jesus Christ, to agree to live in unity with one another '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that you all speak the same thing”; that is, to have a united testimony. The Aramaic can be translated “that you may all be of one word.”
      marker-yv: yv-n
    - type: text
      text: 'and put to rest any division that attempts to tear you apart. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The congregation of believers in Corinth was sorely divided. They had divided over which leader or apostle they followed (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), over the limits of their freedom (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 6–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), over their socio-economic status (ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and over spiritual gifts (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 12–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Division among believers grossly hinders our message and ministry to the world of unbelievers. Paul is pleading with them to unite around the love of God for one another (ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Be restored '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fully equipped.”
      marker-yv: yv-n
    - type: text
      text: as one united body living in perfect harmony. Form a consistent choreography among yourselves, having a common perspective with shared values.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'My dear brothers and sisters, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I have a serious concern I need to bring up with you
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Before Paul brought correction to the Corinthians, he first affirmed the work of God in their midst. See vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Perhaps we should look at confused and messed-up Christians differently and speak to how God sees imperfect believers.
      marker-yv: yv-n
    - type: text
      text: 'for I have been informed by those of Chloe’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house church
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Chloe’s people.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: household
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: family
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is not in the Greek text. By implication, it refers to those who are meeting with Chloe, as the one they are connected to (Chloe’s people; i.e., house church, or Chloe’s congregation). She was obviously a trusted leader in Paul’s estimation and had influence in the church of Corinth. Her name means “green [tender] sprout.” Those who informed Paul of the problems in Corinth may have been Stephanas, Fortunatus, and Achaicus, mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'that you have been destructively arguing among yourselves. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I need to bring this up because each of you is claiming loyalty to different preachers. Some are saying, “I am a disciple of Paul,” or, “I follow Apollos,” or, “I am a disciple of Peter the Rock,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cephas,” the Aramaic word for rock (
      - type: usfm
        marker: it
        children:
        - type: text
          text: keefa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) transliterated into Greek. Paul is comfortable in calling Peter by his Aramaic nickname, Keefa.
      marker-yv: yv-n
    - type: text
      text: 'and some, “I belong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' to Christ.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let me ask you
    - type: text
      text: ', is Christ divided up into groups? Did I die on the cross for you? At your baptism did you pledge yourselves to follow Paul?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Were you baptized in the name of Paul?”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Thank God I only baptized two from Corinth—Crispus and Gaius! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Before converting to faith in Christ, Crispus was likely the ruler of the synagogue in Corinth mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Gaius was most likely the one who hosted Paul when he came to Rome (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 16:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Since they had become believers before Paul’s assistants, Timothy and Silas, arrived from Macedonia, Paul went ahead and baptized them.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So now no one can say that in my name I baptized others. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “so that no one can say that they were baptized in my name.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '(Yes, I also baptized Stephanus and his family. Other than that, I don’t remember baptizing anyone else.) '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the Anointed One has sent me on a mission, not to see how many I could baptize, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the broader context of Paul’s teaching, both baptism and the Lord’s Table proclaim the Lord Jesus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 6:3–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 11:24–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Therefore, viewing Paul’s statement as somewhat hyperbolic, it is taken to mean that he was not sent just to baptize but also to preach the gospel.
      marker-yv: yv-n
    - type: text
      text: but to proclaim the good news. And I declare this message stripped of all philosophical arguments that empty the cross of its true power. For I trust in the all-sufficient cross of Christ alone.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The True Power of the Cross
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'To preach the message '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “expression [Gr.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ']” or “the act of proclaiming.”'
      marker-yv: yv-n
    - type: text
      text: 'of the cross seems like sheer nonsense to those who are on their way to destruction, but to us who are being saved, it is the mighty power of God released within us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “message of the cross” becomes the ignition point where God’s power becomes operative and actualized with the ability to convert, transform, and save. The Aramaic can be translated “For he [rather than the message] is the power of God.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will dismantle the wisdom of the wise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will invalidate the intelligence of the scholars.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 29:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (LXX). Paul uses the prophecy of Isaiah as a warning against leaning upon human wisdom to understand spiritual matters. True wisdom comes from above and is given by divine revelation to those who are teachable and humble before God.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'in writing you this letter addressed to the community of God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “church.” This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekklēsia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “a summoned people, called to assemble, a legislative body.” It is also a word used in Greek culture to “assemble an army.”'
      marker-yv: yv-n
    - type: text
      text: throughout the city of Corinth. For you have been made pure, set apart in the Anointed One, Jesus. And God has invited you to be his devoted and holy people, and not only you, but everyone everywhere who calls on the name of our Lord Jesus Christ as their Lord, and ours also.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So where is the wise philosopher '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who understands
    - type: text
      text: '? Where is the expert scholar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who comprehends
    - type: text
      text: '? And where is the skilled debater of our time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who could win a debate with God
    - type: text
      text: '? Hasn’t God demonstrated that the wisdom of this world system is utter foolishness?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For in his wisdom, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God designed that all
    - type: text
      text: ' the world’s wisdom would be insufficient to lead people to the discovery of himself. He took great delight in baffling the wisdom of the world by using the simplicity of preaching the story of the cross '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or simply “the foolishness of preaching.” However, it is not the act of preaching but the content of what is preached that brings salvation to those who believe.
      marker-yv: yv-n
    - type: text
      text: 'in order to save those who believe it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For the Jews constantly demand to see miraculous signs, while those who are not Jews '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic uses the term Arameans for gentiles. It means “Aramaic-speaking people.”
      marker-yv: yv-n
    - type: text
      text: 'constantly cling to the world’s wisdom, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To paraphrase, the gentiles seek for success in the world’s eyes, or a wisdom that leads them to succeed. Christ crucified is both a miracle sign and the wisdom that will lead one to reign in life.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'but we preach the crucified Messiah. The Jews stumble over him and the rest of the world sees him as foolishness. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But for those who have been chosen to follow him, both Jews and Greeks, he is God’s mighty power, God’s true wisdom, and our Messiah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Christ is the supreme manifestation of God’s power to save us from sin, to work miracles, and to defeat evil. Christ is the supreme manifestation of wisdom, for he carries out the eternal plan of God and brings it to completion.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For the “foolish” things of God have proven to be wiser than human wisdom. And the “feeble” things of God have proven to be far more powerful than any human ability.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the cross seemed to be the foolishness of God, it reveals his transcendent wisdom. And though God the Son was crucified in weakness, he has risen through the divine power that transforms lives today. God has no weakness or foolishness whatsoever. Yet what looks like weakness is actually his strength, and what looks like foolishness is actually his wisdom.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Calling
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Brothers and sisters, consider who you were when God called you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to salvation
    - type: text
      text: '. Not many of you were wise scholars by human standards, nor were many of you in positions of power. Not many of you were considered the elite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when you answered God’s call
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But God chose those whom the world considers foolish to shame those who think they are wise, and God chose the puny and powerless to shame '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kataischyunō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also be translated “embarrass,” “confuse,” “baffle,” or “frustrate.”
      marker-yv: yv-n
    - type: text
      text: 'the high and mighty. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'He chose the lowly, the laughable '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “despised,” “disgusting,” “outcasts,” “perceived with contempt.”
      marker-yv: yv-n
    - type: text
      text: 'in the world’s eyes—nobodies—so that he would shame the somebodies. For he chose what is regarded as insignificant in order to supersede what is regarded as prominent, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'so that there would be no place for prideful boasting in God’s presence. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'May joyous grace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: charis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', in its original sense, is descriptive of that which brings pleasure and joy to the human heart, implying a strong emotional element. God’s grace includes favor and supernatural potency, and it is meant to leave us both charming and beautiful. In classical Greek it was meant to convey the attitude of favor shown by royalty. See Torrance,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Doctrine of Grace in the Apostolic Fathers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pp. 1–5.'
      marker-yv: yv-n
    - type: text
      text: and endless peace be yours continually from our Father God and from our Lord Jesus, the Anointed One!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Made Wonderfully Rich
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: it
      children:
      - type: text
        text: For it is not from man that we draw our life
    - type: text
      text: ' but from God as we are being joined to Jesus, the Anointed One. And now he is our God-given wisdom, our virtue, our holiness, and our redemption. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And this fulfills what is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If anyone boasts, let him only boast
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in all that the Lord has done!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He who triumphs, let him triumph in the Lord God!” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 9:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I am always thanking my God for you because he has given you such free and open access to his grace through your union with Jesus, the Messiah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'In him you have been made extravagantly rich in every way. You have been endowed with a wealth of inspired utterance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in every kind of speaking.” By implication, Paul is commending them for their speaking gifts (prophecy, tongues and interpretation of tongues, preaching, and teaching the word of God). This will be developed further in chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 12–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and the riches that come from your intimate knowledge of him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the reality of the truth of Christ is seen among you and strengthened '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “validated” or “confirmed.” The word used here is found in classical Greek in the context of establishing (building) communities.
      marker-yv: yv-n
    - type: text
      text: 'through your experience of him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So now you aren’t lacking any spiritual gift '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You don’t fail to receive any gift of the Holy Spirit.” God wants his church to receive every gift the Holy Spirit has to give us. This may be a figure of speech called a litotes, which means it could also be translated, “You have every spiritual gift.”
      marker-yv: yv-n
    - type: text
      text: 'as you eagerly await the unveiling '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “eagerly accept” or “eagerly await.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekdechomai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a compound word,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (out of, from) and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dechomai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (to accept or receive or take hold of).
      marker-yv: yv-n
    - type: text
      text: 'of the Lord Jesus, the Anointed One. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He will keep you steady and strong to the very end, making your character mature so that you will be found innocent on the day of our Lord Jesus Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'God is forever faithful and can be trusted to do this in you, for he has invited you to co-share the life of his Son, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a life of communion with his Son.” That is, a co-participation (communion, fellowship) of the Son. The Aramaic can be translated “You have been called to the (wedding) feast of his Son.” We see a clear picture here that believers are called to share in the sonship of Jesus. By God’s grace, we will share in the Son’s standing and position before the Father. We are not only blameless but made holy by the co-sharing of the life of God’s Son.
      marker-yv: yv-n
    - type: text
      text: Jesus, the Anointed One, our King!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Lord.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Addresses Divisions in the Church
    marker-yv: yv-h
