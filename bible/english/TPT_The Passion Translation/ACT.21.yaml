document_id: ACT.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Journey to Jerusalem
  - type: text
    content: 'After we tore ourselves away from them, we put out to sea and sailed a direct course for the island of Kos, and on the next day to the island of Rhodes, '
  - type: note
    content: Both Kos and Rhodes are Greek islands in the Aegean Sea.
  - type: text
    content: 'and from there to Patara. '
  - type: note
    content: A city on the Mediterranean coast of Turkey.
  '10':
  - type: text
    content: 'During our stay of several days, Agabus, '
  - type: note
    content: See Acts 11:28.
  - type: text
    content: 'a prophet from Judea, came to visit us. '
  '11':
  - type: text
    content: As a prophetic gesture
  - type: text
    content: ', he took Paul’s belt and tied his own hands and feet with it as he prophesied, “The Holy Spirit says, ‘The one who owns this belt will be tied up in this same way by the Jews and they will hand him over to those who are not Jews.’ ”'
  - type: note
    content: Or “gentiles”; i.e., the Romans.
  '12':
  - type: text
    content: 'When we heard this, both we and the believers of Caesarea begged Paul not to go on to Jerusalem. '
  '13':
  - type: text
    content: But Paul replied, “Why do you cry and break my heart with your tears? Don’t you know that I’m prepared not only to be imprisoned but to die in Jerusalem for the sake of the wonder of the name of our Lord Jesus?”
  '14':
  - type: text
    content: Because we couldn’t persuade him, we gave up and said nothing more except “May the will of the Lord be done.”
  - type: heading
    content: Paul Arrives in Jerusalem
  '15':
  - type: text
    content: 'Afterward we packed our bags and set off for Jerusalem, '
  '16':
  - type: text
    content: 'with some of the believers from Caesarea accompanying us. '
  - type: text
    content: They brought us to a village
  - type: text
    content: ' '
  - type: note
    content: Implied in the text and found in a few Greek manuscripts.
  - type: text
    content: 'where they introduced us to Mnason, a Cypriot, one of the original disciples, '
  - type: note
    content: That is, one of the first converts. He may have been one of the original converts at Pentecost or one of the first disciples converted by Paul and Barnabas. Mnason means “remembering.”
  - type: text
    content: and he offered us hospitality.
  '17':
  - type: text
    content: 'When we finally arrived in Jerusalem, the believers welcomed us with delight. '
  '18':
  - type: text
    content: 'The next day Paul and our team had a meeting with Jacob '
  - type: note
    content: That is, Jacob (James) the brother of our Lord Jesus, not the apostle Jacob who was martyred.
  - type: text
    content: 'and all the elders of the Jerusalem church. '
  '19':
  - type: text
    content: After greeting everyone, Paul explained in detail what God had accomplished through his ministry among the non-Jewish people.
  '2':
  - type: text
    content: 'There we found a ship that was crossing over to Syria, '
  - type: note
    content: Or “Phoenicia,” a Greek term for coastal Lebanon and Syria.
  - type: text
    content: 'so we went aboard and sailed away. '
  '20':
  - type: text
    content: 'When they heard Paul’s report, they praised God. And they said to him, “You should know, brother, that there are many tens of thousands of Jews who have also embraced the faith and are passionately keeping the law of Moses. '
  '21':
  - type: text
    content: 'But they’ve heard a rumor that you’ve been instructing the Jews everywhere to abandon Moses '
  - type: note
    content: Or “apostasy from [the law of] Moses.”
  - type: text
    content: 'by telling them they don’t need to circumcise their children or keep our Jewish customs. '
  '22':
  - type: text
    content: 'They will certainly hear that you’ve come to Jerusalem. So what is the proper way to proceed? '
  '23':
  - type: text
    content: 'We urge you to follow our suggestion. We have four men here who have taken a vow and are ready to have their heads shaved. '
  '24':
  - type: text
    content: 'Now go with them to the temple and sponsor them in their purification ceremony, '
  - type: note
    content: This could have been the completion of a Nazarite vow (Num. 6:1–12) or a reference to the Jewish custom of when a Jew returned from a trip to a foreign (pagan) land, he would purify himself of the defilement of being with unbelievers (Mishnah Oholoth 2:3).
  - type: text
    content: 'and pay all their required expenses. Then everyone will know that the rumors they’ve heard are false. They’ll see that you are one who lives according to the law of Moses. '
  '25':
  - type: text
    content: But in reference to the non-Jewish believers, we’ve sent them a letter with our decision, stating that they should avoid eating meat that has been offered to an idol, or eating blood or any animal that has been strangled, and to avoid sexual immorality.”
  - type: note
    content: It seems strange that Jacob makes no mention of the offering that Paul brought for the poor saints in Jerusalem, which was the reason for leaving his missionary work to come to Jerusalem. Instead, Jacob wants to ensure the purity of Paul’s message. There is at least a hint that Paul’s ministry was not always well received in Judea. See Rom. 15:30–31.
  - type: heading
    content: Paul Arrested in Jerusalem
  '26':
  - type: text
    content: The next day, Paul took the four men to the temple and ceremonially purified himself along with them. He publicly gave notice of the date when their vows would end and when sacrifices would be offered for each of them.
  '27':
  - type: text
    content: 'When the seven-day period '
  - type: note
    content: This could also mean “the Sabbath.”
  - type: text
    content: 'was almost over, a number of Jews from western Turkey '
  - type: note
    content: Or “Asia (Minor).” They were possibly in Jerusalem to celebrate the Feast of Pentecost.
  - type: text
    content: 'who had seen him in the temple courts stirred up the whole crowd against him. Seizing him, '
  '28':
  - type: text
    content: 'they shouted, “Men of Israel, help us! This is the man who teaches everywhere what is contrary to our nation, our law, and this temple. And not only that, but now he brings these non-Jewish men with him into the inner courts of our temple! They have made this sacred place ritually unclean.” '
  '29':
  - type: text
    content: (For Trophimus, an Ephesian, had been seen previously with him, and they assumed that he entered the inner courts with Paul.)
  '3':
  - type: text
    content: 'After we sighted Cyprus and sailed south of it, we docked at Tyre '
  - type: note
    content: Tyre was a city in Phoenicia. They would have sailed four or five days from Patara to reach Tyre.
  - type: text
    content: in Syria, where the ship unloaded its cargo.
  '30':
  - type: text
    content: 'This ignited a huge riot in the city as all the people came together to seize Paul and drag him out of the temple courts, closing the gates behind him. '
  '31':
  - type: text
    content: 'But as they were about to kill Paul, the news reached the commander of the Roman garrison '
  - type: note
    content: The Roman commander was in charge of about six hundred soldiers.
  - type: text
    content: 'that the entire city was in an uproar. '
  '32':
  - type: text
    content: 'He immediately ran out to the crowd with a large number of his officers and soldiers. When the crowd saw them coming, they stopped beating Paul. '
  '33':
  - type: text
    content: The commander arrested him and ordered that he be bound with two chains. He then asked, “Who is he and what has he done wrong?”
  '34':
  - type: text
    content: 'Some in the crowd shouted one thing and others something else, just adding to the confusion. Since the commander was unable to get to the truth because of the disturbance, he ordered that Paul be brought back to their headquarters. '
  '35':
  - type: text
    content: 'When they reached the steps leading up to the fortress, '
  - type: note
    content: This was the Antonia Fortress (or Tower) built by Herod the Great in 19 BC.
  - type: text
    content: 'they had to protect Paul and carry him up because of the violent mob following them, '
  '36':
  - type: text
    content: and everyone was screaming out, “Away with this man! Kill him!”
  '37':
  - type: text
    content: As Paul was being led to the entrance of the compound, he said to the commander in Greek, “May I have a word with you?”
  - type: text
    content: 'The commander replied, “So you know Greek, do you? '
  - type: note
    content: The commander was surprised that Paul could speak some Greek, for the people living in Israel at that time did not speak Greek. Paul, an educated Jew from Turkey, spoke to the commander in the common language of the Roman Empire.
  '38':
  - type: text
    content: 'Aren’t you that Egyptian fanatic who started a rebellion some time ago and led four thousand assassins '
  - type: note
    content: The Greek word used here is Sicarii, a sect of Jewish nationalists who were violently hostile to Roman rule. They got their name from the small dagger known as a sicarii.
  - type: text
    content: out into the wilderness?”
  '39':
  - type: text
    content: Paul answered, “I am, in fact, a Jew from Tarsus, in Cilicia, a well-known city of southern Turkey where I was born. I beg you, sir, please give me a moment to speak to these people.”
  '4':
  - type: text
    content: 'When we went ashore we found a number of believers and stayed with them for a week. '
  - type: text
    content: They prophesied to Paul repeatedly
  - type: text
    content: ', warning him by the Holy Spirit not to set foot in Jerusalem. '
  '40':
  - type: text
    content: 'When the commander gave his permission, Paul stood on the steps and gestured with his hands for the people to listen. When the crowd quieted down, Paul addressed them in Aramaic '
  - type: note
    content: Or “Hebrew.” The Hebrew language had been replaced with Aramaic during the Babylonian captivity. For more than a thousand years the Aramaic language remained the language of the Jewish people. Note that Paul did not address the Jewish people in Greek.
  - type: text
    content: 'and said:'
  '5':
  - type: text
    content: 'When it was time for us to leave and be on our way, everyone—men, women, and children—accompanied us out of the city down to the beach. After we all knelt '
  - type: text
    content: in the sand
  - type: text
    content: ' and prayed together, '
  '6':
  - type: text
    content: 'we kissed one another, '
  - type: note
    content: As translated from the Aramaic idiom “one to one” (kissed).
  - type: text
    content: said our good-byes, and boarded the ship, while the believers went back to their homes.
  '7':
  - type: text
    content: 'From Tyre we sailed '
  - type: note
    content: The text can mean either “continued our journey” or “completed our journey.” If they completed their journey by boat to Akko, they would have gone by land to Caesarea. Akko, or Ptolemais, was named after the Egyptian ruler Ptolemy II Philadelphus in 261 BC (Epistulae Aristeas 115; 1 Macc. 5:15). See also Judg. 1:31.
  - type: text
    content: 'on to the town of Akko and greeted the believers there with peace. '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'We stayed with them for a day. '
  '8':
  - type: text
    content: 'Then we went on to Caesarea and stayed for several days '
  - type: note
    content: This information is supplied from v. 10.
  - type: text
    content: 'in the home of Philip the evangelist, who was one of the seven deacons '
  - type: note
    content: See Acts 6:1–7. An evangelist is simply “a preacher of the good news” or in Aramaic, “a preacher of the hope.” Philip is described as both an evangelist and a deacon (servant). Every minister must become a servant.
  - type: text
    content: 'and '
  '9':
  - type: text
    content: the father of four unmarried daughters who prophesied.
