document_id: ACT.21,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Journey to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After we tore ourselves away from them, we put out to sea and sailed a direct course for the island of Kos, and on the next day to the island of Rhodes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both Kos and Rhodes are Greek islands in the Aegean Sea.
      marker-yv: yv-n
    - type: text
      text: 'and from there to Patara. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A city on the Mediterranean coast of Turkey.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During our stay of several days, Agabus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'a prophet from Judea, came to visit us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As a prophetic gesture
    - type: text
      text: ', he took Paul’s belt and tied his own hands and feet with it as he prophesied, “The Holy Spirit says, ‘The one who owns this belt will be tied up in this same way by the Jews and they will hand him over to those who are not Jews.’ ”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “gentiles”; i.e., the Romans.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we heard this, both we and the believers of Caesarea begged Paul not to go on to Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Paul replied, “Why do you cry and break my heart with your tears? Don’t you know that I’m prepared not only to be imprisoned but to die in Jerusalem for the sake of the wonder of the name of our Lord Jesus?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because we couldn’t persuade him, we gave up and said nothing more except “May the will of the Lord be done.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Arrives in Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward we packed our bags and set off for Jerusalem, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with some of the believers from Caesarea accompanying us. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They brought us to a village
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text and found in a few Greek manuscripts.
      marker-yv: yv-n
    - type: text
      text: 'where they introduced us to Mnason, a Cypriot, one of the original disciples, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, one of the first converts. He may have been one of the original converts at Pentecost or one of the first disciples converted by Paul and Barnabas.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mnason
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “remembering.”
      marker-yv: yv-n
    - type: text
      text: and he offered us hospitality.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we finally arrived in Jerusalem, the believers welcomed us with delight. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day Paul and our team had a meeting with Jacob '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Jacob (James) the brother of our Lord Jesus, not the apostle Jacob who was martyred.
      marker-yv: yv-n
    - type: text
      text: 'and all the elders of the Jerusalem church. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After greeting everyone, Paul explained in detail what God had accomplished through his ministry among the non-Jewish people.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There we found a ship that was crossing over to Syria, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Phoenicia,” a Greek term for coastal Lebanon and Syria.
      marker-yv: yv-n
    - type: text
      text: 'so we went aboard and sailed away. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard Paul’s report, they praised God. And they said to him, “You should know, brother, that there are many tens of thousands of Jews who have also embraced the faith and are passionately keeping the law of Moses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they’ve heard a rumor that you’ve been instructing the Jews everywhere to abandon Moses '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “apostasy from [the law of] Moses.”
      marker-yv: yv-n
    - type: text
      text: 'by telling them they don’t need to circumcise their children or keep our Jewish customs. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will certainly hear that you’ve come to Jerusalem. So what is the proper way to proceed? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We urge you to follow our suggestion. We have four men here who have taken a vow and are ready to have their heads shaved. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now go with them to the temple and sponsor them in their purification ceremony, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could have been the completion of a Nazarite vow (
      - type: text
        text: Num. 6:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) or a reference to the Jewish custom of when a Jew returned from a trip to a foreign (pagan) land, he would purify himself of the defilement of being with unbelievers (Mishnah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Oholoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2:3).
      marker-yv: yv-n
    - type: text
      text: 'and pay all their required expenses. Then everyone will know that the rumors they’ve heard are false. They’ll see that you are one who lives according to the law of Moses. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But in reference to the non-Jewish believers, we’ve sent them a letter with our decision, stating that they should avoid eating meat that has been offered to an idol, or eating blood or any animal that has been strangled, and to avoid sexual immorality.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It seems strange that Jacob makes no mention of the offering that Paul brought for the poor saints in Jerusalem, which was the reason for leaving his missionary work to come to Jerusalem. Instead, Jacob wants to ensure the purity of Paul’s message. There is at least a hint that Paul’s ministry was not always well received in Judea. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 15:30–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Arrested in Jerusalem
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day, Paul took the four men to the temple and ceremonially purified himself along with them. He publicly gave notice of the date when their vows would end and when sacrifices would be offered for each of them.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the seven-day period '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could also mean “the Sabbath.”
      marker-yv: yv-n
    - type: text
      text: 'was almost over, a number of Jews from western Turkey '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Asia (Minor).” They were possibly in Jerusalem to celebrate the Feast of Pentecost.
      marker-yv: yv-n
    - type: text
      text: 'who had seen him in the temple courts stirred up the whole crowd against him. Seizing him, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they shouted, “Men of Israel, help us! This is the man who teaches everywhere what is contrary to our nation, our law, and this temple. And not only that, but now he brings these non-Jewish men with him into the inner courts of our temple! They have made this sacred place ritually unclean.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (For Trophimus, an Ephesian, had been seen previously with him, and they assumed that he entered the inner courts with Paul.)
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After we sighted Cyprus and sailed south of it, we docked at Tyre '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tyre was a city in Phoenicia. They would have sailed four or five days from Patara to reach Tyre.
      marker-yv: yv-n
    - type: text
      text: in Syria, where the ship unloaded its cargo.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This ignited a huge riot in the city as all the people came together to seize Paul and drag him out of the temple courts, closing the gates behind him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as they were about to kill Paul, the news reached the commander of the Roman garrison '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Roman commander was in charge of about six hundred soldiers.
      marker-yv: yv-n
    - type: text
      text: 'that the entire city was in an uproar. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He immediately ran out to the crowd with a large number of his officers and soldiers. When the crowd saw them coming, they stopped beating Paul. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The commander arrested him and ordered that he be bound with two chains. He then asked, “Who is he and what has he done wrong?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some in the crowd shouted one thing and others something else, just adding to the confusion. Since the commander was unable to get to the truth because of the disturbance, he ordered that Paul be brought back to their headquarters. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they reached the steps leading up to the fortress, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the Antonia Fortress (or Tower) built by Herod the Great in 19 BC.
      marker-yv: yv-n
    - type: text
      text: 'they had to protect Paul and carry him up because of the violent mob following them, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and everyone was screaming out, “Away with this man! Kill him!”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Paul was being led to the entrance of the compound, he said to the commander in Greek, “May I have a word with you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The commander replied, “So you know Greek, do you? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The commander was surprised that Paul could speak some Greek, for the people living in Israel at that time did not speak Greek. Paul, an educated Jew from Turkey, spoke to the commander in the common language of the Roman Empire.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aren’t you that Egyptian fanatic who started a rebellion some time ago and led four thousand assassins '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sicarii
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a sect of Jewish nationalists who were violently hostile to Roman rule. They got their name from the small dagger known as a sicarii.'
      marker-yv: yv-n
    - type: text
      text: out into the wilderness?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul answered, “I am, in fact, a Jew from Tarsus, in Cilicia, a well-known city of southern Turkey where I was born. I beg you, sir, please give me a moment to speak to these people.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we went ashore we found a number of believers and stayed with them for a week. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They prophesied to Paul repeatedly
    - type: text
      text: ', warning him by the Holy Spirit not to set foot in Jerusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the commander gave his permission, Paul stood on the steps and gestured with his hands for the people to listen. When the crowd quieted down, Paul addressed them in Aramaic '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hebrew.” The Hebrew language had been replaced with Aramaic during the Babylonian captivity. For more than a thousand years the Aramaic language remained the language of the Jewish people. Note that Paul did not address the Jewish people in Greek.
      marker-yv: yv-n
    - type: text
      text: 'and said:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was time for us to leave and be on our way, everyone—men, women, and children—accompanied us out of the city down to the beach. After we all knelt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the sand
    - type: text
      text: ' and prayed together, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'we kissed one another, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic idiom “one to one” (kissed).
      marker-yv: yv-n
    - type: text
      text: said our good-byes, and boarded the ship, while the believers went back to their homes.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Tyre we sailed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text can mean either “continued our journey” or “completed our journey.” If they completed their journey by boat to Akko, they would have gone by land to Caesarea. Akko, or Ptolemais, was named after the Egyptian ruler Ptolemy II Philadelphus in 261 BC (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Epistulae Aristeas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 115;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Macc. 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 1:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on to the town of Akko and greeted the believers there with peace. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'We stayed with them for a day. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then we went on to Caesarea and stayed for several days '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This information is supplied from v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in the home of Philip the evangelist, who was one of the seven deacons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
