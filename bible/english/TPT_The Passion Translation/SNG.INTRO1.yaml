  - type: text
    text: About Song of Songs
- type: usfm
  marker: ip
  children:
  - type: text
    text: The first book translated in the Passion Translation was the Song of Songs (also known as the Song of Solomon), my favorite book in the Bible. I have fallen in love with this sweetest song of all the ages. We see the Shulamite’s breathtaking journey unveiled in this amazing allegory. It is the path every passionate lover will take. But this divine parable penned by Solomon also describes the journey that every longing lover of Jesus will find as his or her very own.
- type: usfm
  marker: ip
  children:
  - type: text
    text: By translating this portion of the Word of God, the Song of Songs, I have attempted to translate not only from a scholarly or linguistic perspective, but also from the passion of a heart on fire. Love will always find a language to express itself. Fiery love for Jesus pushes our thoughts out of hiding and puts them into words of adoration. This articulation, out of the deepest places of our hearts, moves God and inspires each of us to a greater devotion. Everyone deserves to hear and feel the passion of our Bridegroom for his radiant and soon-to-be-perfected bride.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The inspired Song of Songs is a work of art. It is a melody sung from the heart of Jesus Christ longing for his bride. It is full of symbols, subtle art forms, poetry, and nuances that the translator must convey in order to bring it forth adequately to the English reader. This is what I have attempted to do with this project.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Some of the cultural symbols that conveyed a rich texture of meaning to the Hebrew speaker nearly three thousand years ago have become almost impossible to leave in their literal form, since the English speaker of today has little or no connection to those symbols. This requires that much of the hidden meanings locked into the Hebrew text be made explicit. That is why I have chosen to make this a dynamic equivalent translation—transferring the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: meaning
  - type: text
    text: ', not just the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: words
  - type: text
    text: ', into a form that many will find refreshing.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: So be prepared to see yourself in this journey and hear the Lord’s lyrics of love sung over you. Invest the time to read this through in one sitting. Then go back and read slowly and carefully, pondering each verse and praying through each love principle revealed in this translation. I think you may be shocked to read some of the things spoken over your life, considering them almost too good to be true.
- type: usfm
  marker: ip
  children:
  - type: text
    text: May heaven’s glorious Bridegroom, the beloved of your soul, come and manifest himself to you in a wonderful fashion as you read Song of Songs in the Passion Translation. My prayer is that you will be as thrilled with what you read as I have been in translating it.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Purpose
- type: usfm
  marker: ip
  children:
  - type: text
    text: In reading this Shulamite’s journey, the storyline’s purpose is often missed or overlooked. I believe the Holy Spirit has hidden within the Song of Songs an amazing story—a story of how Jesus makes his bride beautiful and holy by casting out her fear with perfect love. This sent-from-heaven revelation is waiting to be received with all its intensity and power to unlock the deepest places of our hearts.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Most of the earliest church fathers—including Origen, Gregory of Nyssa, Augustine, and Jerome—viewed the Song of Songs as a clear representation of Christ and his bride, presented in deeply symbolic and allegorical teaching. Along with many other early church fathers, they wrote commentaries to reveal the beautiful secrets given to us in Solomon’s masterpiece.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Unfortunately for some, the Song of Songs has become merely a book expressing sexuality, with hidden meanings and symbols of sensuality. Many modern expositors teach from the Song of Songs the sexual relationship appropriate to a husband and wife. They find it difficult when others see the symbols and apply them to the spiritual journey every believer must take as we move further into the passionate heart of our heavenly Bridegroom. Their fear is that we “over-spiritualize” the Song of Songs. How hard that would be! How wonderfully spiritual and holy is this song of all songs!
- type: usfm
  marker: is1
  children:
  - type: text
    text: Author and Audience
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The author of this love poem is made clear in the first stanza: “The most amazing song of all, by King Solomon.” We can be thankful and grateful this wise, stately king gave us such a passionate, symbolic picture of the love of God—first for his people and then for Christ’s church! Solomon’s poetic insights deepen our understanding of the love of God in the same way they did for his people from generations past!'
- type: usfm
  marker: is1
  children:
  - type: text
    text: Major Themes
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Interpreting Song of Songs.
  - type: text
    text: ' This divine song of romance is one of the most difficult books to interpret. Over the centuries there have been no fewer than six dominant ways people have understood Song of Songs, including typical, dramatic, mythological-cultic, dream, literal, and allegorical.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: This translation reveals each symbol that the reader encounters in this song as a form of “virtual reality,” an artistic masterpiece, which, when properly interpreted, helps us in our pursuit of Jesus Christ. Truly, if this is the song of all songs, its theme goes beyond and reaches higher than merely literal human sexuality. It extends to our union with the living God.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Christ’s Divine Love for His Bride.
  - type: text
    text: ' The love of God shines and springs forth from the second verse in this poem of divine romance! It opens by testifying to the Spirit’s kiss of God’s divine word breathing upon us the revelation of this love, equipping us as his warriors and intoxicating us with his love.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: This most amazing song speaks of God’s saving love, keeping love, forgiving love, and embracing love. Even the allegory itself of the bride and Bridegroom-King speaks of the passionate pursuit of our loving God! Sitting with this poem of divine romance will transform your understanding of God’s love like never before!
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The dominant voice in this divine love poem is the Shulamite. The word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shulamite
  - type: text
    text: ' and the word for Solomon are taken from the same Hebrew root word—one masculine, the other feminine. We are one spirit with our King, united with him. He longs for his bride to be his love-prisoner, in the prison cell of his eternal love! Through our union with Christ we enjoy a joint possession of all things. You have become the Shulamite, and you will ultimately dwell in holy union with Jesus Christ.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Divine Christian Romance.
  - type: text
    text: ' This poem tells the story of our journey of divine romance as bride of the Bridegroom-King, Jesus Christ. It speaks of the journey every longing lover of Jesus will find as his or her very own. The bride sees her beloved as a shepherd, a representation of the relationship between you and your Beloved. The suffering love of Jesus will be in our hearts for the rest of our days—the revelation of our Beloved tied onto the cross like a bundle of myrrh, a picture of the suffering love of Christ dripping down from Calvary’s tree for every lover of God.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The symbol of the bride (Christians) pursuing and being given to the Bridegroom-King (Jesus) also represents the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: community
  - type: text
    text: ' of brides, the church. For the beautiful bride overflowing with her Lover’s life is to be given to others, even as Jesus was given to us by the Father. She has become a feast for the nations, wine to cheer the hearts of others. In this poem of divine romance the “city” is a picture of the local church, a place with government, order, and overseers. And the king’s “vineyard” is a picture of the church, the multitude of those called to follow Jesus.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Passionate Christian Devotion.
  - type: text
    text: ' Throughout this love song of divine romance, various symbols are used to speak of our passionate, emotional devotion to our Bridegroom-King-Lover: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lilies
  - type: text
    text: ' are symbols of our pure devotion to Christ in the “temple” of our inner being; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foxes
  - type: text
    text: ' are the compromises hidden deep in our hearts that keep the fruit of passionate devotion to Christ from growing within us; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair
  - type: text
    text: ' is a symbol of our devotion to Christ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pomegranates
  - type: text
    text: ' are equated to human passion and emotions, for when opened they speak powerfully of our hearts of passion opened to our Lover.'
