verses:
  '1':
  - type: heading
    content: 'Fourth Vision: The Basket of Ripe Fruit'
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed this to me '
  - type: text
    content: in another vision
  - type: text
    content: ': a basket of ripe fruit.'
  - type: note
    content: The fruit was most likely figs.
  '10':
  - type: text
    content: I will turn your festivals into funerals,
  - type: text
    content: and all your lively singing into funeral dirges.
  - type: text
    content: I will make you all wear sackcloth and shave your heads,
  - type: text
    content: as if you were mourning the death of an only child.
  - type: text
    content: That day will be bitter to the end.”
  - type: heading
    content: A Famine of the Word of God
  '11':
  - type: text
    content: '“Behold, the days are coming,” declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “when I will send a famine on the land.
  - type: text
    content: People will not hunger for food nor thirst for water
  - type: text
    content: 'but will starve for a word from '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: note
    content: That is, a famine of hearing God’s revelation. God will punish a rebellious people with silence. Tired of speaking without being listened to, God says nothing and sends no more prophets with a fresh word from heaven. God’s silence can be a form of his correction.
  '12':
  - type: text
    content: People will stagger from sea to sea
  - type: text
    content: and wander from the north to the east
  - type: text
    content: 'searching for a revelation from '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: but they will not hear from me.
  '13':
  - type: text
    content: On that day, even your beautiful young women
  - type: text
    content: and strong young men will collapse from thirst.
  '14':
  - type: text
    content: 'Those who swear by Ashimah, '
  - type: note
    content: Amos again employed a play on words. The name of Samaria’s goddess Ashimah sounds similar to the Hebrew word for “sin,” ʾashmah.
  - type: text
    content: the idol of Samaria
  - type: text
    content: ','
  - type: text
    content: who say, ‘Long live your golden calf-god of Dan!’
  - type: note
    content: See 1 Kings 12:30.
  - type: text
    content: 'and say, ‘As surely as the god '
  - type: note
    content: Or “way,” a possible reference to the roads going to the shrines for pagan worship. See Amos 5:5.
  - type: text
    content: 'of Beersheba '
  - type: note
    content: “From Dan to Beersheba” is a common phrase for the totality of the promised land.
  - type: text
    content: lives!’—
  - type: text
    content: they will all fall, never to rise again.”
  '2':
  - type: text
    content: “Amos, what do you see?” he asked.
  - type: text
    content: “A basket of ripe fruit,” I replied.
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said,'
  - type: text
    content: '“The time is ripe '
  - type: note
    content: 'Or “the end has come.” The Hebrew contains a play on words that can easily be lost in translation. The word for “ripe [summer] fruit” is qayits, “ripe,” and the word for “end” is qets. Some scholars believe these words may have been homonyms. See B. D. Rahtjen, “A Critical Note on Amos 8:1–2,” Journal of Biblical Literature 83, no. 4 (1964), 416–17; Herbert Donner and Wolfgang Röllig, Kanaanäische und Aramäische Inschriften (Harrassowitz: 1942), 182.'
  - type: text
    content: for my people Israel.
  - type: text
    content: I will not continue to overlook their sins.
  '3':
  - type: text
    content: 'On that day, those singing songs in the temple '
  - type: note
    content: Or “palace.”
  - type: text
    content: will wail instead,”
  - type: text
    content: 'declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “There will be corpses piled up everywhere.
  - type: text
    content: They will be cast out in silence.”
  - type: note
    content: Or “They will be cast out. Be silent!”
  - type: heading
    content: Prophecy against Those Who Exploit Others
  '4':
  - type: text
    content: Listen to this, all you who trample on the poor
  - type: text
    content: and reduce the needy to nothing!
  - type: note
    content: Any community can be judged by how it treats “the least important of these.” Jesus highlighted this in Matt. 25:31–46.
  '5':
  - type: text
    content: You say to yourselves, “We can’t wait
  - type: text
    content: 'for these holy days '
  - type: note
    content: Or “new moon [festivals].” See Lev. 23:24; 1 Sam. 20:5; Isa. 1:13; Hos. 2:11.
  - type: text
    content: to be over
  - type: text
    content: so that we can sell our corn!”
  - type: text
    content: And, “When will this Sabbath be over
  - type: text
    content: so that we can open the storage and sell our wheat?
  - type: text
    content: Then we can overcharge our customers, shortchange them,
  - type: note
    content: Or “that we may make the ephah small and the shekel great.” The ephah was a unit of measurement (about eight gallons or thirty liters), and the shekel was their currency.
  - type: text
    content: and deceive them by tampering with the scales.
  '6':
  - type: text
    content: We can even sell the worthless chaff we sweep up for silver.
  - type: text
    content: 'We can buy the poor with silver '
  - type: text
    content: and make them our slaves
  - type: text
    content: because they cannot pay their debts,
  - type: text
    content: even a debt so small as that of a pair of sandals.”
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ', the Majesty of Jacob, '
  - type: note
    content: 'Most modern translations make the text quite literal: “Yahweh has sworn by the pride of Jacob.” Yet in most languages it makes no sense to swear by someone’s pride, any more than it does in English. It is even questionable whether that is what the Hebrew really means. In the Old Testament, the Lord never “swears” by something or somebody else but always by himself. It makes more sense to read the text as Yahweh “swearing” an oath in his own name, “the Majesty [pride] of Jacob.”'
  - type: text
    content: 'has sworn an oath:'
  - type: text
    content: “I will never forget all the evil they have done.
  '8':
  - type: text
    content: That is why the earth will tremble for this,
  - type: text
    content: and all who live on it mourn.
  - type: note
    content: Or “be destroyed” (according to Jewish scholars such as Kimchi and those found in the Targums). This verse is a likely reference to the great historical earthquake mentioned in Amos 1:1 and in Zech. 14:5.
  - type: text
    content: All of the land will rise up like the river Nile—
  - type: text
    content: inundated and stirred up by floodwaters—
  - type: text
    content: and then subside, just like the river of Egypt!”
  - type: heading
    content: Prophecy of Darkness and Mourning
  '9':
  - type: text
    content: '“On that day,” declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “I will make the sun set at noon
  - type: text
    content: and darken the earth in the middle of the day.
  - type: note
    content: 'Or “in a day of light.” This is likely a prophecy of a solar eclipse. It has been calculated that a complete eclipse of the sun happened on February 9, 784 BC and on June 15, 763 BC. The eclipse of 763 BC is mentioned in an Assyrian text. See R. W. Rogers, Cuneiform Parallels to the Old Testament (London: Henry Frowde/Oxford University Press, 1912), 233. God can turn the lights off on the old order whenever he chooses.'
