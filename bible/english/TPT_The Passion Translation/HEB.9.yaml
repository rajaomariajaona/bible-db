document_id: HEB.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Old Pattern of Worship
  - type: text
    content: 'Now in the first covenant there were specific rules for worship including a sanctuary on earth to worship in. '
  '10':
  - type: text
    content: For this old pattern of worship was a matter of external rules and rituals concerning food and drink and ceremonial washings which was imposed upon us until the appointed time of heart-restoration had arrived.
  - type: note
    content: The Greek word diothosis is used only here in the New Testament. It means “to set things right,” or “to snap a broken bone back into place,” by implication restoration.
  - type: heading
    content: The Heavenly Pattern of Worship
  '11':
  - type: text
    content: 'But now the Anointed One has become the King-Priest of every wonderful thing that has come. '
  - type: note
    content: The Aramaic can be translated “the good things that he did.” Some Greek manuscripts have “good things that are coming.”
  - type: text
    content: 'For he serves in a greater, more perfect heavenly tabernacle not made by men, that is to say, not a part of this creation. '
  '12':
  - type: text
    content: 'And he has entered once and forever into the Holiest Sanctuary of All, not with the blood of animal sacrifices, but the sacred blood of his own sacrifice. And he alone has made our salvation '
  - type: note
    content: Or “He has paid the ransom [redemption] forever.”
  - type: text
    content: secure forever!
  '13':
  - type: text
    content: 'Under the old covenant the blood of bulls, goats, and the ashes of a heifer were sprinkled on those who were defiled and effectively cleansed them outwardly from their ceremonial impurities. '
  '14':
  - type: text
    content: 'Yet how much more will the sacred blood of the Messiah thoroughly cleanse our consciences! For by the power of the eternal Spirit he has offered himself to God as the perfect '
  - type: note
    content: Or “unblemished.”
  - type: text
    content: 'Sacrifice that now frees '
  - type: note
    content: Or “purifies.”
  - type: text
    content: 'us from our dead works '
  - type: note
    content: Or “what we did when we were corpses.”
  - type: text
    content: to worship and serve the living God.
  '15':
  - type: text
    content: 'So Jesus is the One who has enacted a new covenant with a new relationship with God so that those who accept the invitation '
  - type: note
    content: Or “those who are called.”
  - type: text
    content: will receive the eternal inheritance he has promised to his heirs. For he died to release us from the guilt of the violations committed under the first covenant.
  '16':
  - type: text
    content: 'Now a person’s last will and testament can only take effect after one has been proven to have died; otherwise the will cannot be in force while the person who made it is still alive. '
  '18':
  - type: text
    content: 'So this is why not even the first covenant was inaugurated without the blood of animals. '
  '19':
  - type: text
    content: 'For Moses ratified the covenant after he gave the people all the commandments of the law. He took the blood of calves and goats, with water, scarlet wool, and a hyssop branch, and sprinkled both the people and the book of the covenant, '
  - type: note
    content: See Ex. 24:3, 7.
  '2':
  - type: text
    content: 'When you entered the tabernacle you would first come into the holy chamber where you would find the lampstand '
  - type: note
    content: See Ex. 25:31–40; Lev. 24:1–4.
  - type: text
    content: 'and the bread of his presence on the fellowship table. '
  - type: note
    content: See Ex. 25:23–30; 39:36. This fellowship table had twelve loaves of sacred bread. See also Lev. 24:5–9.
  '20':
  - type: text
    content: saying,
  - type: text
    content: “This is the blood of the covenant that God commands you to keep.”
  - type: note
    content: See Ex. 24:8. The blood of Jesus gave birth to the new covenant for the forgiveness of sins. See Matt. 26:28.
  '21':
  - type: text
    content: 'And later Moses also sprinkled the tabernacle with blood and every utensil and item used in their service of worship. '
  '22':
  - type: text
    content: Actually, nearly everything under the law was purified with blood, since forgiveness only comes through an outpouring of blood.
  '23':
  - type: text
    content: 'And so it was necessary for all the earthly symbols '
  - type: note
    content: Or “outlines” or “sketches.”
  - type: text
    content: 'of the heavenly realities to be purified with these animal sacrifices, but the heavenly things themselves required a superior sacrifice than these. '
  '24':
  - type: text
    content: 'For the Messiah did not enter into the earthly tabernacle made by men, which was but an echo of the true sanctuary, but he entered into heaven itself to appear before the face '
  - type: note
    content: As translated from the Aramaic (Hebrew), which has no word equivalent for “presence,” only “face.” To come into God’s presence meant that you come before his face.
  - type: text
    content: 'of God in our place. '
  '25':
  - type: text
    content: 'Under the old system year after year the high priest entered the most holy sanctuary with blood that was not his own. But the Messiah did not need to repeatedly offer himself year after year, '
  '26':
  - type: text
    content: 'for that would mean he must suffer repeatedly ever since the fall of the world. '
  - type: note
    content: Or “from the foundation of the world.” The Greek word katabole can also mean “laying down” or “falling down” (of the world through sin), which by implication means Adam’s sin.
  - type: text
    content: 'But now he has appeared at the fulfillment of the ages to abolish '
  - type: note
    content: The Aramaic can be translated “annihilate sin.”
  - type: text
    content: sin once and for all by the sacrifice of himself!
  '27':
  - type: text
    content: 'Every human being is appointed to die once, and then to face God’s judgment. '
  - type: note
    content: The Greek is literally “a court trial.”
  '28':
  - type: text
    content: But when we die we will be face-to-face with Christ
  - type: text
    content: ', the One who experienced death once for all to bear the sins of many! '
  - type: note
    content: The Aramaic can be translated “to burn away [obliterate] the sins of many.” See Isa. 53:12.
  - type: text
    content: And now to those who eagerly await him, he will appear a second time; not to deal with sin, but to bring us the fullness of salvation.
  - type: note
    content: There is a salvation that is yet to be unveiled. See 1 Peter 1:5.
  '3':
  - type: text
    content: 'Then as you pass through the next curtain '
  - type: note
    content: See Ex. 26:31–35.
  - type: text
    content: 'you would enter the innermost chamber called, the holiest sanctuary of all. '
  - type: note
    content: Or “holy of holies,” that is, the holiest place of all.
  '4':
  - type: text
    content: 'It contained the golden altar of incense and the ark of covenant mercy, which was a wooden box covered entirely with gold. And placed inside the ark of covenant mercy was the golden jar with mystery-manna inside, '
  - type: note
    content: The Hebrew word for “manna,” the wilderness bread, means “mystery” or “What is it?”
  - type: text
    content: 'Aaron’s resurrection rod, which had sprouted, and the stone tablets engraved with the covenant laws. '
  '5':
  - type: text
    content: 'On top of the lid of the ark were two cherubim, angels of splendor, with outstretched wings overshadowing the throne of mercy. '
  - type: note
    content: Or “the place of atonement.” See Ex. 25:18–22.
  - type: text
    content: But now is not the time to discuss further the significant details of these things.
  '6':
  - type: text
    content: 'So with this prescribed pattern of worship the priests would routinely go in and out of the first chamber to perform their religious duties. '
  '7':
  - type: text
    content: And the high priest was permitted to enter into the Holiest Sanctuary of All only once a year and he could never enter without first offering sacrificial blood for both his own sins and for the sins of the people.
  '8':
  - type: text
    content: 'Now the Holy Spirit uses the symbols of this pattern of worship to reveal that the perfect way of holiness '
  - type: note
    content: As translated from the Aramaic. The Greek is “the way into the Holy Place.”
  - type: text
    content: 'had not yet been unveiled. For as long as the tabernacle stood '
  '9':
  - type: text
    content: 'it was an illustration '
  - type: note
    content: The Aramaic can be translated “mystery.”
  - type: text
    content: that pointed to our present time of fulfillment
  - type: text
    content: ', demonstrating that offerings and animal sacrifices had failed to perfectly cleanse the conscience of the worshiper. '
