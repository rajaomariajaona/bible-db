document_id: JHN.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lazarus Raised from the Dead
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'In the village of Bethany there was a man named Lazarus, and his sisters, Mary and Martha. Mary was the one who would anoint Jesus’ feet with costly perfume and dry his feet with her long hair. One day Lazarus became very sick to the point of death. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Jesus added, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus, our friend, has just fallen asleep.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus was stating an obvious euphemism. Lazarus “sleeping” means that he has died. To “awaken” him means that Jesus would raise him from the dead.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It’s time that I go and awaken him.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When they heard this, the disciples replied, “Lord, if he has just fallen asleep, then he’ll get better.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Jesus was speaking about Lazarus’ death, but the disciples presumed he was talking about natural sleep.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Jesus made it plain to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus is dead.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And for your sake, I’m glad I wasn’t there,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: because now you have another opportunity to see who I am
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that you will learn to trust in me. Come, let’s go and see him.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Thomas, nicknamed the Twin, remarked to the other disciples, “Let’s go so that we can die with him.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that Thomas was expressing pessimism about the fate of Jesus going back into the region where he was threatened with death.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'Now when they arrived at Bethany, which was only about two miles from Jerusalem, Jesus found that Lazarus had already been in the tomb for four days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Many friends '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Jews.”
      marker-yv: yv-n
    - type: text
      text: 'of Mary and Martha had come from the region to console them over the loss of their brother. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And when Martha heard that Jesus was approaching the village, she went out to meet him, but Mary stayed in the house.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Martha said to Jesus, “My Lord, if only you had come sooner, my brother wouldn’t have died. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But I know that if you were to ask God for anything, he would do it for you.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus told her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your brother will rise and live.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: She replied, “Yes, I know he will rise with everyone else on resurrection day.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “at the last day.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Martha,”
    - type: text
      text: ' Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: You don’t have to wait until then.
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The words
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: I am
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'in the Aramaic are a clear statement of Christ’s deity: “I am the living God, the Resurrection and the Life!”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Resurrection,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic uses a word that is related linguistically to the name Noah, who was symbolically “resurrected” from the flood as the life-giver to those who repopulated the earth. Resurrection is superior to life, for life can be defeated and ended. But resurrection overcomes. Life is the power to exist, but resurrection is the power to conquer all, even death itself. Believers must learn to live in Christ our Life, but also, Christ our Resurrection to conquer all things. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and I am Life Eternal. Anyone who clings to me in faith, even though he dies, will live forever.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the one who lives by believing in me will never die.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is very emphatic in the Greek, “never die forever!”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do you believe this?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John presents Jesus as the great Savior who saves us from sin (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), blindness (
      - type: text
        text: John 9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and death (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then Martha replied, “Yes, Lord, I do! I’ve always believed that you are the Anointed One, the Son of God who has come into the world for us!” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then she left and hurried off to her sister, Mary, and called her aside from all the mourners and whispered to her, “The Master is here and he’s asking for you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This is one of the most beautiful things that ever could be said to you: “The Master is here and he’s asking for you.” Mary’s response must be ours: “she quickly went off to find him” (v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So when Mary heard this, she quickly went off to find him, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So his sisters sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a message
    - type: text
      text: ' to Jesus, “Lord, our brother Lazarus, the one you love, is very sick. Please come!”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'for Jesus was lingering outside the village at the same spot where Martha met him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Now when Mary’s friends who were comforting her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Mary’s friends who loved her.”
      marker-yv: yv-n
    - type: text
      text: noticed how quickly she ran out of the house, they followed her, assuming she was going to the tomb of her brother to mourn.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: When Mary finally found Jesus outside the village, she fell at his feet in tears and said, “Lord, if only you had been here, my brother would not have died.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When Jesus looked at Mary and saw her weeping at his feet, and all her friends who were with her grieving, he shuddered with emotion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here (
      - type: usfm
        marker: it
        children:
        - type: text
          text: enebrimēsato
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) can also mean “indignant and stirred with anger.” Was he angry at the mourners? Not at all. He was angry over the work of the devil in taking the life of his friend, Lazarus. The Aramaic, however, has no connotation of indignation, only tenderness and compassion (lit. “his heart melted with compassion”).
      marker-yv: yv-n
    - type: text
      text: 'and was deeply moved with tenderness and compassion. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where did you bury him?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Lord, come with us and we’ll show you,” they replied.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Then tears streamed down Jesus’ face.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Seeing Jesus weep caused many of the mourners to say, “Look how much he loved Lazarus.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “how much mercy he felt for Lazarus.”
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Yet others said, “Isn’t this the One who opens blind eyes? Why didn’t he do something to keep Lazarus from dying?”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then Jesus, with intense emotions, came to the tomb—a cave with a stone placed over its entrance. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Roll away the stone.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Martha said, “But Lord, it’s been four days since he died—by now his body is already decomposing!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When he heard this, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This sickness will not end in death for Lazarus, but will bring glory and praise to God. This will reveal the greatness of the Son of God by what takes place.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jesus looked at her and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Didn’t I tell you that if you will believe in me, you will see God unveil his power?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you would see the glory of God.”
      marker-yv: yv-n
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'So they rolled away the heavy stone. Jesus gazed into heaven and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, thank you
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Resurrection power is released when we give thanks to God. Jesus stood at Lazarus’ tomb and gave thanks, then commanded him to arise. Giving thanks to God has more power than you can ever imagine. Have you stopped to thank God yet today?
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that you have heard my prayer,
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you listen to every word I speak. Now, so that these who stand here with me will believe that you have sent me to the earth as your messenger,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: I will use the power you have given me.
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Then with a loud voice Jesus shouted with authority: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus! Come out of the tomb!”
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Then in front of everyone, Lazarus, who had died four days earlier, slowly hobbled out—he still had grave clothes tightly wrapped around his hands and feet and covering his face! Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Unwrap him and let him loose.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Burial customs in the ancient Near East were to wrap the corpse in white cotton cloths from the neck to the feet. The head was then covered with a large handkerchief.
      marker-yv: yv-n
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'From that day forward many of those '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Jews.”
      marker-yv: yv-n
    - type: text
      text: 'who had come to visit Mary believed in him, for they had seen with their own eyes this amazing miracle! '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: But a few went back to inform the Pharisees about what Jesus had done.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'So the Pharisees and the chief priests called a special meeting of the High Council '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Sanhedrin.” This was the Great Sanhedrin, equivalent to a Jewish court, which would be comprised of seventy men who would judge Jewish religious matters.
      marker-yv: yv-n
    - type: text
      text: 'and said, “So what are we going to do about this man? Look at all the great miracles he’s performing! '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: If we allow him to continue like this, everyone will believe in him. And the Romans will take action and destroy both our country and our people!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is translated “our place [position] and our nation.” “Our place” could refer to the temple.
      marker-yv: yv-n
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Now Caiaphas, the high priest that year, spoke up and said, “You don’t understand a thing! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'Now even though Jesus loved Mary, Martha, and Lazarus, he remained where he was for two more days. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Don’t you realize we’d be much better off if this one man were to die for the people than for the whole nation to perish?”
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: '(This prophecy that Jesus was destined to die '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'for the Jewish people didn’t come from Caiaphas himself, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but he was moved by God
    - type: text
      text: ' to prophesy as the chief priest. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And Jesus’ death would not be for the Jewish people only, but to gather together God’s children scattered around the world and unite them as one.) '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 49:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: So from that day on, they were committed to killing Jesus.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'For this reason Jesus no longer went out in public among the Jews. But he went in the wilderness to a village called Ephraim, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:54
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the fortress city of Ephraim” or “the mill called Ephraim.” Ephraim means “double fruitfulness.” Some believe this location is the present town of Et-Taiyibeh, which would make it about fourteen miles (twenty-two kilometers) northeast of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: where he secluded himself with his disciples.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Now the time came for the Passover preparations, and many from the countryside went to Jerusalem for their ceremonial cleansing before the feast began. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'And all the people kept looking out for Jesus, expecting him to come to the city. They said to themselves while they waited in the temple courts, “Do you think that he will dare come to the feast?” '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: For the leading priests and the Pharisees had given orders that they be informed immediately if anyone saw Jesus, so they could seize and arrest him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Finally, on the third day, he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come. It’s time to go to Bethany.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Judea.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “But Teacher,” they said to him, “do you really want to go back there? It was just a short time ago the people of Judea were going to stone you!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are there not twelve hours of daylight
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in every day?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus used a parable to respond to why he was not afraid to go where his life could be in danger. This is more than the sun, but “the One who gives light to the world.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You can go through a day without the fear of stumbling when you walk in the One who gives light to the world. But you will stumble when the light is not in you, for you’ll be walking in the dark.”
