document_id: PSA.74,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: We Need You Now
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Asaph’s poem of instruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you really going to leave us, God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would you turn your back on us, rejecting your people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are yours, your very own.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 74:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the sheep of your pasture.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will your anger smolder against us forever?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, how much longer will you let this go on
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and allow these barbarians to blaspheme your name?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you stand back and watch them get away with this forever?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why don’t you do something?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have the power to break in,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so why would you hide your great power from us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t hold back! Unleash your might and give them a final blow.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have always been, and always will be, my King.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the mighty conqueror, working wonders all over the world.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was you who split the sea in two by your glorious strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You smashed the power of Tannin, the sea monster.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You crushed the might of Leviathan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 74:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Leviathan is mentioned six times in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Leviathan means “twisted” or “coiled” and is considered to be a sea monster. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the great dragon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then you took the crumbs and fed them to the sharks.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your glory you opened up springs and fountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then you spoke, and the ever-flowing springs of Jordan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dried up so we could cross over.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You own the day and the night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sunlight and starlight call you Creator.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The four corners of the earth were formed by your hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every changing season owes its beauty to you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', don’t ever forget how these arrogant enemies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like fools, have mocked your name.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, aren’t we your beloved dove that praises you?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 74:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint, Syriac, and one Hebrew manuscript.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect us from these wild beasts who want to harm us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t leave us as lambs among wolves!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can’t abandon us after all we’ve been through!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t forget that we are your beloved ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrap us back into your heart again, for you chose us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You brought us out of our slavery and bondage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made us your favored ones, your Zion-people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your home on earth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember your promises to us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for darkness covers the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: giving the violent ones a hiding place.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let these insults continue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t you see that we are your downtrodden
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and oppressed people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the poor and needy into a choir of praise to you!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t ignore these ignorant words, this continual mocking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up, God; it’s time to defend yourself from all this.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never forget what your adversaries are saying.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their rage and uproar rise continually against you.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It’s time to stand up to them!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn your steps toward this devastation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come running to bring your restoring grace to these ruins,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 74:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This verse reads differently in the Aramaic: “Lift up your servants with your might above those who take them captive, for those who oppress us are enemies to your holiness.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to what the enemy has done to devastate your Holy Place.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have come into the very midst of your dwelling place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: roaring like beasts, setting up their banners to flaunt their conquest.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now everything is in shambles! They’ve totally destroyed it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a forest chopped down to the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there’s nothing left.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of the beauty of the craftsmanship
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the inner place has been ruined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: smashed, broken, and shattered.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 74:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm describes physical destruction as well as what the enemy of our souls has done spiritually to mar the image of God in the “inner place” of man’s spirit. God will fully restore all things, including his image within us, as our hearts become his Holy Place on the earth.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve burned it all to the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve violated your sanctuary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the very dwelling place of your glory and your name.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They boasted, “Let’s completely crush them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s wipe out every trace of this God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s burn up every sacred place where they worship this God.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We don’t see any miraculous signs anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no longer a prophet among us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who can tell us how long this devastation will continue.
