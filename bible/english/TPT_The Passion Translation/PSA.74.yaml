document_id: PSA.74,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: We Need You Now
  - type: text
    content: Asaph’s poem of instruction
  - type: text
    content: Are you really going to leave us, God?
  - type: text
    content: Would you turn your back on us, rejecting your people?
  - type: text
    content: We are yours, your very own.
  - type: note
    content: Or “the sheep of your pasture.”
  - type: text
    content: Will your anger smolder against us forever?
  '10':
  - type: text
    content: God, how much longer will you let this go on
  - type: text
    content: and allow these barbarians to blaspheme your name?
  - type: text
    content: Will you stand back and watch them get away with this forever?
  '11':
  - type: text
    content: Why don’t you do something?
  - type: text
    content: You have the power to break in,
  - type: text
    content: so why would you hide your great power from us?
  - type: text
    content: Don’t hold back! Unleash your might and give them a final blow.
  '12':
  - type: text
    content: You have always been, and always will be, my King.
  - type: text
    content: You are the mighty conqueror, working wonders all over the world.
  '13':
  - type: text
    content: It was you who split the sea in two by your glorious strength.
  - type: text
    content: You smashed the power of Tannin, the sea monster.
  '14':
  - type: text
    content: 'You crushed the might of Leviathan, '
  - type: note
    content: Leviathan is mentioned six times in Job 41. Leviathan means “twisted” or “coiled” and is considered to be a sea monster. See Gen. 1:21.
  - type: text
    content: the great dragon,
  - type: text
    content: then you took the crumbs and fed them to the sharks.
  '15':
  - type: text
    content: With your glory you opened up springs and fountains,
  - type: text
    content: then you spoke, and the ever-flowing springs of Jordan
  - type: text
    content: dried up so we could cross over.
  '16':
  - type: text
    content: You own the day and the night.
  - type: text
    content: Sunlight and starlight call you Creator.
  '17':
  - type: text
    content: The four corners of the earth were formed by your hands,
  - type: text
    content: and every changing season owes its beauty to you.
  '18':
  - type: text
    content: 'O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', don’t ever forget how these arrogant enemies,'
  - type: text
    content: like fools, have mocked your name.
  '19':
  - type: text
    content: Lord, aren’t we your beloved dove that praises you?
  - type: note
    content: As translated from the Septuagint, Syriac, and one Hebrew manuscript.
  - type: text
    content: Protect us from these wild beasts who want to harm us.
  - type: text
    content: Don’t leave us as lambs among wolves!
  - type: text
    content: You can’t abandon us after all we’ve been through!
  '2':
  - type: text
    content: Don’t forget that we are your beloved ones.
  - type: text
    content: Wrap us back into your heart again, for you chose us.
  - type: text
    content: You brought us out of our slavery and bondage
  - type: text
    content: and made us your favored ones, your Zion-people,
  - type: text
    content: your home on earth.
  '20':
  - type: text
    content: Remember your promises to us,
  - type: text
    content: for darkness covers the land,
  - type: text
    content: giving the violent ones a hiding place.
  '21':
  - type: text
    content: Don’t let these insults continue.
  - type: text
    content: Can’t you see that we are your downtrodden
  - type: text
    content: and oppressed people?
  - type: text
    content: Make the poor and needy into a choir of praise to you!
  '22':
  - type: text
    content: Don’t ignore these ignorant words, this continual mocking.
  - type: text
    content: Rise up, God; it’s time to defend yourself from all this.
  '23':
  - type: text
    content: Never forget what your adversaries are saying.
  - type: text
    content: For their rage and uproar rise continually against you.
  - type: text
    content: It’s time to stand up to them!
  '3':
  - type: text
    content: Turn your steps toward this devastation.
  - type: text
    content: Come running to bring your restoring grace to these ruins,
  - type: note
    content: 'This verse reads differently in the Aramaic: “Lift up your servants with your might above those who take them captive, for those who oppress us are enemies to your holiness.”'
  - type: text
    content: to what the enemy has done to devastate your Holy Place.
  '4':
  - type: text
    content: They have come into the very midst of your dwelling place,
  - type: text
    content: roaring like beasts, setting up their banners to flaunt their conquest.
  '5':
  - type: text
    content: Now everything is in shambles! They’ve totally destroyed it.
  - type: text
    content: Like a forest chopped down to the ground,
  - type: text
    content: there’s nothing left.
  '6':
  - type: text
    content: All of the beauty of the craftsmanship
  - type: text
    content: of the inner place has been ruined,
  - type: text
    content: smashed, broken, and shattered.
  - type: note
    content: This psalm describes physical destruction as well as what the enemy of our souls has done spiritually to mar the image of God in the “inner place” of man’s spirit. God will fully restore all things, including his image within us, as our hearts become his Holy Place on the earth.
  '7':
  - type: text
    content: They’ve burned it all to the ground.
  - type: text
    content: They’ve violated your sanctuary,
  - type: text
    content: the very dwelling place of your glory and your name.
  '8':
  - type: text
    content: They boasted, “Let’s completely crush them!
  - type: text
    content: Let’s wipe out every trace of this God.
  - type: text
    content: Let’s burn up every sacred place where they worship this God.”
  '9':
  - type: text
    content: We don’t see any miraculous signs anymore.
  - type: text
    content: There’s no longer a prophet among us
  - type: text
    content: who can tell us how long this devastation will continue.
