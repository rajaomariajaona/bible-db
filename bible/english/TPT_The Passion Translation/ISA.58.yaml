  '1':
  - type: heading
    content: Ritual and Ceremony Is Not Enough
  - type: text
    content: '“Shout it loud '
  - type: text
    content: and clear
  - type: text
    content: '!'
  - type: text
    content: Don’t hold back!
  - type: text
    content: Let your voice be like a trumpet blast!
  - type: text
    content: Declare to my people their rebellion
  - type: text
    content: and to Jacob’s tribes their sin!
  '10':
  - type: text
    content: 'and if you offer yourselves in compassion '
  - type: note
    content: Jesus offered himself for us, so we should offer ourselves in compassion for others. See Matt. 10:8; Acts 20:33–35; Gal. 1:4; Eph. 5:2, 25; 1 Tim. 2:6; Titus 2:14.
  - type: text
    content: for the hungry
  - type: text
    content: and relieve those in misery,
  - type: note
    content: 'The five qualifications of last-days ministry are found in vv. 9–10: (1) Commit to banish every form of oppression in our lives, churches, and society. (2) Remove scornful accusation (criticism) of others and their ministries. (3) Forbid to spread malicious slander. (4) Have compassion for the poor and disenfranchised. (5) Comfort those enduring suffering and tragedy. Then God promises (vv. 10–12) that multiple blessings will come: (1) Our spiritual light (influence) will increase in our communities. (2) Discouragement and gloom will disappear from our lives. (3) God will give us specific guidance and counsel to know what to do and where to go. (4) He will fill us with renewing grace, even when we are surrounded by difficult situations. (5) Our spiritual lives will flourish like a lush garden with fruit and beauty. (6) We will not cease to be an ever-flowing source of blessing to others. (7) We will be given God’s grace to rebuild lives and institutions in our cities, churches, and nations. (8) We will take up the legacy of our spiritual fathers and build on their foundations. (9) We will have a testimony of healing cities. (10) We will restore well-being to our communities.'
  - type: text
    content: then your dawning light will rise in the darkness
  - type: text
    content: and your gloom will turn into noonday splendor!
  - type: note
    content: Or “double light.”
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' will always guide you where to go and what to do.'
  - type: text
    content: He will fill you with refreshment
  - type: text
    content: even when you are in a dry, difficult place.
  - type: text
    content: He will continually restore strength to you,
  - type: text
    content: so you will flourish like a well-watered garden
  - type: text
    content: 'and like an ever-flowing, trustworthy spring '
  - type: text
    content: of blessing
  - type: text
    content: .
  '12':
  - type: text
    content: Your people will rebuild long-deserted ruins,
  - type: text
    content: building anew on foundations laid long before you.
  - type: note
    content: Or “on foundations of many generations.”
  - type: text
    content: You will be known as Repairers of the Cities
  - type: note
    content: Or “repairers of the gap.”
  - type: text
    content: and Restorers of Communities.
  - type: note
    content: Or “restorers of paths that lead you home.” This is the Elijah ministry of restoration. See Neh. 1–4; Acts 3:21.
  '13':
  - type: text
    content: “If you stop pursuing your own desires on my holy day,
  - type: text
    content: and refrain from disregarding the Sabbath,
  - type: text
    content: if you call the Sabbath a delightful pleasure
  - type: text
    content: 'and '
  - type: text
    content: Yahweh
  - type: text
    content: ’s holy day honorable,
  - type: text
    content: if you honor it properly by not chasing your own desires,
  - type: text
    content: serving your own interests, and speaking empty words,
  '14':
  - type: text
    content: then you will find the joyous bliss
  - type: text
    content: 'that comes from serving '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: And I will cause you to prosper
  - type: text
    content: and be carried triumphantly over the high places of the land.
  - type: note
    content: That is, God will raise you up and cause you to prosper greatly. See Deut. 32:13; Eph. 1:3; 2:6.
  - type: text
    content: You will enjoy the heritage of Jacob, your ancestor.”
  - type: text
    content: 'Certainly the mouth of '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken it!'
  '2':
  - type: text
    content: Yes, daily they seem to seek me,
  - type: text
    content: pretending
  - type: text
    content: ' that they delight to know my ways,'
  - type: text
    content: as though they were a nation that does what is right
  - type: text
    content: and had not rejected the law of their God.
  - type: text
    content: They ask me to show them the right way,
  - type: text
    content: acting as though they are eager to be close to me.
  '3':
  - type: text
    content: They say, ‘Why is it that when we fasted,
  - type: text
    content: you did not see it?
  - type: text
    content: We starved ourselves, and you didn’t seem to notice.’
  - type: text
    content: “Because on the day you fasted
  - type: text
    content: you were seeking only your own desires,
  - type: text
    content: and you continue to exploit your workers.
  - type: note
    content: See Lev. 16:29. It was clear that their fasting was an attempt to appear spiritual and manipulate God.
  '4':
  - type: text
    content: During your fasts, you quarrel and fight with others
  - type: text
    content: and strike them with an angry fist.
  - type: text
    content: When you fast like that, your voice will not be heard on high.
  '5':
  - type: text
    content: Do you think I’m impressed with that kind of fast?
  - type: text
    content: Is it just a day to starve your bodies,
  - type: text
    content: make others think you’re humble,
  - type: note
    content: Or “to bow your heads like [bent-over] reeds.”
  - type: text
    content: and lie down in sackcloth and ashes?
  - type: text
    content: Do you call that a fast?
  - type: text
    content: 'Do you think I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will be pleased with that?”'
  - type: note
    content: Or “that is a day acceptable to Yahweh?”
  - type: heading
    content: Worship God in Truth
  '6':
  - type: text
    content: '“This is the kind of fast that I desire:'
  - type: text
    content: Remove the heavy chains of oppression!
  - type: text
    content: 'Stop exploiting '
  - type: text
    content: your workers
  - type: text
    content: '!'
  - type: note
    content: Or “Loose the ropes of the yoke.”
  - type: text
    content: Set free the crushed and mistreated!
  - type: text
    content: Break off every yoke of bondage!
  '7':
  - type: text
    content: Share your food with the hungry!
  - type: text
    content: Provide for the homeless
  - type: text
    content: and bring them into your home!
  - type: text
    content: Clothe the naked!
  - type: text
    content: Don’t turn your back on your own flesh and blood!
  '8':
  - type: text
    content: Then my favor will bathe you in sunlight
  - type: text
    content: until you are like the dawn bursting through a dark night.
  - type: note
    content: Showing justice will bring the light of a new day. This sunrise pictures God’s restored favor and blessing coming upon the people.
  - type: text
    content: 'And then suddenly your healing '
  - type: note
    content: Or “health” or “restoration.” This would include the body, soul, and spirit.
  - type: text
    content: will manifest.
  - type: note
    content: Or “sprout speedily” or “grow.”
  - type: text
    content: You will see your righteousness march out before you,
  - type: text
    content: 'and the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will protect you from all harm!'
  - type: note
    content: Or “will be your rear guard”; that is, God’s glory covers us from our past and protects us today and forever, with glory going before us and following after us as well.
  '9':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' will answer you when you pray.'
  - type: text
    content: When you cry out for help, he will say,
  - type: text
    content: ‘I am here.’
  - type: text
    content: “If you banish every form of oppression, the scornful accusations,
  - type: note
    content: Or “extending the finger.”
  - type: text
    content: and vicious slander,
