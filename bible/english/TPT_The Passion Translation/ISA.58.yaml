document_id: ISA.58
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ritual and Ceremony Is Not Enough
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Shout it loud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and clear
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t hold back!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your voice be like a trumpet blast!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Declare to my people their rebellion
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to Jacob’s tribes their sin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yes, daily they seem to seek me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: pretending
  - type: text
    text: ' that they delight to know my ways,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: as though they were a nation that does what is right
- type: usfm
  marker: q1
  children:
  - type: text
    text: and had not rejected the law of their God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They ask me to show them the right way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: acting as though they are eager to be close to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They say, ‘Why is it that when we fasted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you did not see it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We starved ourselves, and you didn’t seem to notice.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because on the day you fasted
- type: usfm
  marker: q1
  children:
  - type: text
    text: you were seeking only your own desires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you continue to exploit your workers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 16:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It was clear that their fasting was an attempt to appear spiritual and manipulate God.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: During your fasts, you quarrel and fight with others
- type: usfm
  marker: q1
  children:
  - type: text
    text: and strike them with an angry fist.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you fast like that, your voice will not be heard on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do you think I’m impressed with that kind of fast?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it just a day to starve your bodies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: make others think you’re humble,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to bow your heads like [bent-over] reeds.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and lie down in sackcloth and ashes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you call that a fast?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do you think I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', will be pleased with that?”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that is a day acceptable to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ?”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Worship God in Truth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“This is the kind of fast that I desire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remove the heavy chains of oppression!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Stop exploiting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your workers
  - type: text
    text: '!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Loose the ropes of the yoke.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set free the crushed and mistreated!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Break off every yoke of bondage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Share your food with the hungry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Provide for the homeless
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bring them into your home!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clothe the naked!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t turn your back on your own flesh and blood!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then my favor will bathe you in sunlight
- type: usfm
  marker: q1
  children:
  - type: text
    text: until you are like the dawn bursting through a dark night.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Showing justice will bring the light of a new day. This sunrise pictures God’s restored favor and blessing coming upon the people.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And then suddenly your healing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “health” or “restoration.” This would include the body, soul, and spirit.
    marker-yv: yv-n
  - type: text
    text: will manifest.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sprout speedily” or “grow.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will see your righteousness march out before you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and the glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will protect you from all harm!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “will be your rear guard”; that is, God’s glory covers us from our past and protects us today and forever, with glory going before us and following after us as well.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will answer you when you pray.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you cry out for help, he will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am here.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you banish every form of oppression, the scornful accusations,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “extending the finger.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and vicious slander,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and if you offer yourselves in compassion '
  - type: usfm
