  - type: text
    text: for the hungry
- type: usfm
  marker: q1
  children:
  - type: text
    text: and relieve those in misery,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The five qualifications of last-days ministry are found in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9–10
      metadata:
        usfm: ISA.58.9+ISA.58.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': (1) Commit to banish every form of oppression in our lives, churches, and society. (2) Remove scornful accusation (criticism) of others and their ministries. (3) Forbid to spread malicious slander. (4) Have compassion for the poor and disenfranchised. (5) Comfort those enduring suffering and tragedy. Then God promises (vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10–12
      metadata:
        usfm: ISA.58.10+ISA.58.11+ISA.58.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') that multiple blessings will come: (1) Our spiritual light (influence) will increase in our communities. (2) Discouragement and gloom will disappear from our lives. (3) God will give us specific guidance and counsel to know what to do and where to go. (4) He will fill us with renewing grace, even when we are surrounded by difficult situations. (5) Our spiritual lives will flourish like a lush garden with fruit and beauty. (6) We will not cease to be an ever-flowing source of blessing to others. (7) We will be given God’s grace to rebuild lives and institutions in our cities, churches, and nations. (8) We will take up the legacy of our spiritual fathers and build on their foundations. (9) We will have a testimony of healing cities. (10) We will restore well-being to our communities.'
    marker-yv: yv-n
- type: usfm
