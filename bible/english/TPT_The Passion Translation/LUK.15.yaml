      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Shortly afterward, the younger son packed up all his belongings and traveled off to see the world. He journeyed to a far-off land where he soon wasted all he was given in a binge of extravagant and reckless living.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “With everything spent and nothing left, he grew hungry, because there was a severe famine in that land.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So he begged a farmer in that country to hire him. The farmer hired him and sent him out to feed the pigs.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The son was so famished, he was willing even to eat the slop given to the pigs,
    - type: text
      text: ' '
