  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Humiliated, the son finally realized what he was doing, and he thought, ‘There are many workers at my father’s house who have all the food they want with plenty to spare. They lack nothing. Why am I here dying of hunger, feeding these pigs and eating their slop?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I want to go back home to my father’s house, and I’ll say to him, “Father, I was wrong. I have sinned against you.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I’ll never again be worthy to be called your son. Please, Father, just treat me like one of your employees.” ’
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This raised concerns among the Jewish religious leaders and experts of the law. Indignant, they grumbled and complained, saying, “Look at how this man associates with all these notorious sinners and welcomes them all to come to him!” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So the young son set off for home. From a long distance away, his father saw him coming,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: dressed as a beggar,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the context of the Greek text and stated more explicitly in the Aramaic.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and great compassion swelled up in his heart for his son who was returning home. The father raced out to meet him, swept him up in his arms, hugged him dearly, and kissed him over and over with tender love.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then the son said, ‘Father, I was wrong. I have sinned against you. I could never deserve to be called your son. Just let me be—’
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The father interrupted and said,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This poetic description is made explicit from the cultural and spiritual implication of the text.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Son, you’re home now!’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Turning to his servants, the father said, ‘Quick, bring me the best robe, my very own robe, and I will place it on his shoulders. Bring the ring, the seal of sonship,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Culturally, this ring was an emblem of authority, a seal of sonship giving the son authority to transact business in his father’s name. This was a picture of the seal of the Holy Spirit (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and I will put it on his finger. And bring out the best shoes
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bring sandals for his feet.” Slaves were barefoot.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you can find for my son.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let’s
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: prepare a great feast
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is “kill the grain-fatted calf.” This is a picture of feasting upon Christ, who was sacrificed for us.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and celebrate.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For my beloved son was once dead, but now he’s alive! Once he was lost, but now he is found!’ And everyone celebrated with overflowing joy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now, the older son was out working in the field when his brother returned, and as he approached the house, he heard the music of celebration and dancing.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He called over one of the servants and asked, ‘What’s going on?’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The servant replied, ‘It’s your younger brother. He’s returned home and your father is throwing a party to celebrate his homecoming.’
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The older son became angry and refused to go in and celebrate. So his father came out and pleaded with him, ‘Come and enjoy the feast with us!’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the culture of that era, hospitality was of supreme importance. To refuse to go in to the feast, when it was his responsibility culturally to cohost the event with his father, was a humiliating rejection of the father.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The son said, ‘Father, listen! How many years have I worked like a slave for you, performing every duty you’ve asked as a faithful son?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: While the younger brother pursued self-discovery, the older brother believed in moral conformity, earning favor from his father. Both needed the revelation of grace.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I’ve never once disobeyed you. But you’ve never thrown a party for me because of my faithfulness. Never once have you even given me a goat that I could feast on and celebrate with my friends as this son of yours is doing now.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In response, Jesus gave them this illustration: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look at him! He comes back after wasting your wealth on prostitutes and reckless living, and here you are throwing a great feast to celebrate—for him!’
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The father said, ‘My son, you are always with me by my side. Everything I have is yours to enjoy.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It’s only right to rejoice and celebrate like this, because your brother was once dead and gone, but now he is alive and back with us again. He was lost, but now he is found!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus spoke three parables unveiling and revealing how the Trinity desires to bring people back through the Son, by the Spirit, to the Father. The Son came as a shepherd, seeking and sacrificing to find the lost sinner. The Spirit seeks the lost sinner like the woman searched with the light of illumination for the lost coin until she found it. And the Father welcomes the returning sinner back to his house. It is the work of the Trinity to bring us back to God.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There once was a shepherd with a hundred lambs, but one of his lambs wandered away and was lost. So the shepherd left the ninety-nine lambs out in the open field and searched in the wilderness for that one lost lamb. He didn’t stop until he finally found it. With exuberant joy, he raised it up, placed it on his shoulders,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What a wonderful picture this shepherd’s joy gives us of our “Good Shepherd.” He doesn’t beat the lost sheep for wandering away. He raises it up and carries it home!
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and carried it back with cheerful delight!
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Returning home, he called all his friends and neighbors together and said, ‘Let’s have a party! Come and celebrate with me the return of my lost lamb. It wandered away, but I found it and brought it home.’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “In the same way, there will be a glorious celebration in heaven over the rescue of one lost sinner who repents, comes back home, and returns to the fold—more so than for all the righteous people who never strayed away.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Lost Coin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus gave them another parable: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There once was a woman who had ten
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The silver coin was a
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zuza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Aramaic). Although there are differing opinions as to its value, it could be equal in today’s currency to more than twelve hundred US dollars. Notice the change of numbers in the three parables in this chapter: one out of a hundred for the sheep, one out of ten for the coins, and one out of two for the sons. This progressively shows the extraordinary value that Jesus places on every lost soul. Although the coin was lost, it never lost its value.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: valuable silver coins. When she lost one of them, she swept her entire house, diligently searching every nook and cranny for that one lost coin.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When she finally found it, she gathered all her friends and neighbors for a celebration, telling them, ‘Come and celebrate with me! I had lost my precious silver coin, but now I’ve found it.’
    - type: text
      text: ' '
