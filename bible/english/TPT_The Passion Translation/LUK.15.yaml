  '1':
  - type: heading
    content: The Parable of the Lost Lamb
  - type: text
    content: 'Many dishonest tax collectors and other notorious sinners often gathered around to listen as Jesus taught the people. '
  '10':
  - type: text
    content: That’s the way God responds
  - type: text
    content: ' '
  - type: note
    content: Jesus used the woman in this parable as a metaphor for God. A female image of God would incite anger from the Pharisees. In the next parable, God reveals himself as the extravagant Father who forgives his wayward son.
  - type: text
    content: every time one lost sinner repents and turns to him. He says to all his angels, ‘Let’s have a joyous celebration, for the one who was lost, I have found!’ ”
  - type: note
    content: The silver coin had an image of Roman authority on it. We have been stamped with the image of God. Even when we are “lost,” that image is still present, needing only to be “found” and redeemed by grace.
  - type: heading
    content: The Loving Father
  '11':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Once there was a father with two sons.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The younger son came to his father and said, ‘Father, don’t you think it’s time to give me my share of your estate?’
  - type: text
    content: ' '
  - type: note
    content: In the light of Middle Eastern culture, it was a great offense for a son to ask his father for his inheritance. It would be equivalent to saying, “I wish you were already dead!”
  - type: text
    content: So the father went ahead and distributed between the two sons their inheritance.
  - type: text
    content: ' '
  - type: note
    content: The Greek is literally “He gave them his life” (Greek bios).
  '13':
  - type: text
    content: Shortly afterward, the younger son packed up all his belongings and traveled off to see the world. He journeyed to a far-off land where he soon wasted all he was given in a binge of extravagant and reckless living.
  '14':
  - type: text
    content: “With everything spent and nothing left, he grew hungry, because there was a severe famine in that land.
  - type: text
    content: ' '
  '15':
  - type: text
    content: So he begged a farmer in that country to hire him. The farmer hired him and sent him out to feed the pigs.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The son was so famished, he was willing even to eat the slop given to the pigs,
  - type: text
    content: ' '
  - type: note
    content: Tending pigs would be degrading to anyone, but especially to a Jew, who was forbidden to raise swine. See Lev. 11:7–8; Isa. 66:17.
  - type: text
    content: because no one would feed him a thing.
  '17':
  - type: text
    content: “Humiliated, the son finally realized what he was doing, and he thought, ‘There are many workers at my father’s house who have all the food they want with plenty to spare. They lack nothing. Why am I here dying of hunger, feeding these pigs and eating their slop?
  - type: text
    content: ' '
  '18':
  - type: text
    content: I want to go back home to my father’s house, and I’ll say to him, “Father, I was wrong. I have sinned against you.
  - type: text
    content: ' '
  '19':
  - type: text
    content: I’ll never again be worthy to be called your son. Please, Father, just treat me like one of your employees.” ’
  '2':
  - type: text
    content: 'This raised concerns among the Jewish religious leaders and experts of the law. Indignant, they grumbled and complained, saying, “Look at how this man associates with all these notorious sinners and welcomes them all to come to him!” '
  '20':
  - type: text
    content: “So the young son set off for home. From a long distance away, his father saw him coming,
  - type: text
    content: ' '
  - type: text
    content: dressed as a beggar,
  - type: text
    content: ' '
  - type: note
    content: Implied in the context of the Greek text and stated more explicitly in the Aramaic.
  - type: text
    content: and great compassion swelled up in his heart for his son who was returning home. The father raced out to meet him, swept him up in his arms, hugged him dearly, and kissed him over and over with tender love.
  '21':
  - type: text
    content: “Then the son said, ‘Father, I was wrong. I have sinned against you. I could never deserve to be called your son. Just let me be—’
  - type: text
    content: “The father interrupted and said,
  - type: text
    content: ' '
  - type: note
    content: This poetic description is made explicit from the cultural and spiritual implication of the text.
  - type: text
    content: ‘Son, you’re home now!’
  '22':
  - type: text
    content: “Turning to his servants, the father said, ‘Quick, bring me the best robe, my very own robe, and I will place it on his shoulders. Bring the ring, the seal of sonship,
  - type: text
    content: ' '
  - type: note
    content: Culturally, this ring was an emblem of authority, a seal of sonship giving the son authority to transact business in his father’s name. This was a picture of the seal of the Holy Spirit (Eph. 1:14).
  - type: text
    content: and I will put it on his finger. And bring out the best shoes
  - type: text
    content: ' '
  - type: note
    content: Or “bring sandals for his feet.” Slaves were barefoot.
  - type: text
    content: you can find for my son.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Let’s
  - type: text
    content: ' '
  - type: text
    content: prepare a great feast
  - type: text
    content: ' '
  - type: note
    content: The Greek text is “kill the grain-fatted calf.” This is a picture of feasting upon Christ, who was sacrificed for us.
  - type: text
    content: and celebrate.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For my beloved son was once dead, but now he’s alive! Once he was lost, but now he is found!’ And everyone celebrated with overflowing joy.
  '25':
  - type: text
    content: “Now, the older son was out working in the field when his brother returned, and as he approached the house, he heard the music of celebration and dancing.
  - type: text
    content: ' '
  '26':
  - type: text
    content: He called over one of the servants and asked, ‘What’s going on?’
  '27':
  - type: text
    content: “The servant replied, ‘It’s your younger brother. He’s returned home and your father is throwing a party to celebrate his homecoming.’
  '28':
  - type: text
    content: “The older son became angry and refused to go in and celebrate. So his father came out and pleaded with him, ‘Come and enjoy the feast with us!’
  - type: note
    content: In the culture of that era, hospitality was of supreme importance. To refuse to go in to the feast, when it was his responsibility culturally to cohost the event with his father, was a humiliating rejection of the father.
  '29':
  - type: text
    content: “The son said, ‘Father, listen! How many years have I worked like a slave for you, performing every duty you’ve asked as a faithful son?
  - type: text
    content: ' '
  - type: note
    content: While the younger brother pursued self-discovery, the older brother believed in moral conformity, earning favor from his father. Both needed the revelation of grace.
  - type: text
    content: And I’ve never once disobeyed you. But you’ve never thrown a party for me because of my faithfulness. Never once have you even given me a goat that I could feast on and celebrate with my friends as this son of yours is doing now.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'In response, Jesus gave them this illustration: '
  '30':
  - type: text
    content: Look at him! He comes back after wasting your wealth on prostitutes and reckless living, and here you are throwing a great feast to celebrate—for him!’
  '31':
  - type: text
    content: “The father said, ‘My son, you are always with me by my side. Everything I have is yours to enjoy.
  - type: text
    content: ' '
  '32':
  - type: text
    content: It’s only right to rejoice and celebrate like this, because your brother was once dead and gone, but now he is alive and back with us again. He was lost, but now he is found!’ ”
  - type: note
    content: Jesus spoke three parables unveiling and revealing how the Trinity desires to bring people back through the Son, by the Spirit, to the Father. The Son came as a shepherd, seeking and sacrificing to find the lost sinner. The Spirit seeks the lost sinner like the woman searched with the light of illumination for the lost coin until she found it. And the Father welcomes the returning sinner back to his house. It is the work of the Trinity to bring us back to God.
  '4':
  - type: text
    content: “There once was a shepherd with a hundred lambs, but one of his lambs wandered away and was lost. So the shepherd left the ninety-nine lambs out in the open field and searched in the wilderness for that one lost lamb. He didn’t stop until he finally found it. With exuberant joy, he raised it up, placed it on his shoulders,
  - type: text
    content: ' '
  - type: note
    content: What a wonderful picture this shepherd’s joy gives us of our “Good Shepherd.” He doesn’t beat the lost sheep for wandering away. He raises it up and carries it home!
  - type: text
    content: and carried it back with cheerful delight!
  - type: text
    content: ' '
  '6':
  - type: text
    content: Returning home, he called all his friends and neighbors together and said, ‘Let’s have a party! Come and celebrate with me the return of my lost lamb. It wandered away, but I found it and brought it home.’ ”
  '7':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: “In the same way, there will be a glorious celebration in heaven over the rescue of one lost sinner who repents, comes back home, and returns to the fold—more so than for all the righteous people who never strayed away.”
  - type: heading
    content: The Parable of the Lost Coin
  '8':
  - type: text
    content: 'Jesus gave them another parable: '
  - type: text
    content: “There once was a woman who had ten
  - type: text
    content: ' '
  - type: note
    content: 'The silver coin was a zuza (Aramaic). Although there are differing opinions as to its value, it could be equal in today’s currency to more than twelve hundred US dollars. Notice the change of numbers in the three parables in this chapter: one out of a hundred for the sheep, one out of ten for the coins, and one out of two for the sons. This progressively shows the extraordinary value that Jesus places on every lost soul. Although the coin was lost, it never lost its value.'
  - type: text
    content: valuable silver coins. When she lost one of them, she swept her entire house, diligently searching every nook and cranny for that one lost coin.
  - type: text
    content: ' '
  '9':
  - type: text
    content: When she finally found it, she gathered all her friends and neighbors for a celebration, telling them, ‘Come and celebrate with me! I had lost my precious silver coin, but now I’ve found it.’
  - type: text
    content: ' '
