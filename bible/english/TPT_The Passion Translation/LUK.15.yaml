      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus used the woman in this parable as a metaphor for God. A female image of God would incite anger from the Pharisees. In the next parable, God reveals himself as the extravagant Father who forgives his wayward son.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: every time one lost sinner repents and turns to him. He says to all his angels, ‘Let’s have a joyous celebration, for the one who was lost, I have found!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The silver coin had an image of Roman authority on it. We have been stamped with the image of God. Even when we are “lost,” that image is still present, needing only to be “found” and redeemed by grace.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Loving Father
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Once there was a father with two sons.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The younger son came to his father and said, ‘Father, don’t you think it’s time to give me my share of your estate?’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the light of Middle Eastern culture, it was a great offense for a son to ask his father for his inheritance. It would be equivalent to saying, “I wish you were already dead!”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the father went ahead and distributed between the two sons their inheritance.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is literally “He gave them his life” (Greek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
