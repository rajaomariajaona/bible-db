    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many dishonest tax collectors and other notorious sinners often gathered around to listen as Jesus taught the people. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
