document_id: MRK.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Sower
  - type: text
    content: 'Once again Jesus went to teach the people at the shore of Lake Galilee '
  - type: note
    content: Commonly known as the Sea of Galilee. It is interesting that Jesus left the house (Mark 3:20) to go to the sea. The “house” suggests the “house of Israel,” and the “sea” speaks of the non-Jewish peoples (i.e., the “sea of humanity”).
  - type: text
    content: 'and a massive crowd surrounded him. The crowd was so huge that he had to get into a boat and teach the people from there. '
  '10':
  - type: text
    content: 'Afterward, Jesus’ disciples and those close to him remained behind to ask Jesus about his parables. '
  '11':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “The privilege of intimately knowing the mystery of God’s kingdom realm has been granted to you, but not to the others,
  - type: text
    content: ' '
  - type: note
    content: Or “to the outsiders.” The Aramaic is “backward ones.” Jesus spoke allegorically so that those who didn’t care to understand couldn’t understand. Yet he knew that the hungry ones would seek out the hidden meaning of the parables and understand the secrets of God’s kingdom realm. It is still that way today. See Prov. 25:2.
  - type: text
    content: where everything is revealed in parables.
  '12':
  - type: text
    content: “For even when they see what I do, they will not understand, and when they hear what I say, they will learn nothing, otherwise they would repent and be forgiven.”
  - type: note
    content: See Isa. 6:9–10.
  '13':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “If you don’t understand this parable, how will you understand any parable?
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Let me explain: The farmer sows the'
  - type: text
    content: ' '
  - type: text
    content: message of the kingdom.
  - type: text
    content: ' '
  '15':
  - type: text
    content: What falls on the beaten path represents those who hear the message, but immediately Satan appears and snatches it from their hearts.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And what is sown on gravel represents those who hear the message and receive it joyfully,
  - type: text
    content: ' '
  '17':
  - type: text
    content: but because their hearts fail to sink a deep root, they don’t endure for long. For when trouble or persecution comes on account of the message, they immediately wilt and fall away.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And what is sown among thorns represents those who hear the message,
  - type: text
    content: ' '
  '19':
  - type: text
    content: but they allow the cares of this life and the seduction of wealth and the desires for other things to crowd out and choke the message so that it produces nothing.
  '2':
  - type: text
    content: 'He taught them many things by using parables '
  - type: note
    content: The Aramaic and Greek use a word for “parable” that means “a metaphor,” “allegory,” “simile,” “illustration,” “comparison,” “figure of speech,” “riddle,” or “enigmatic saying that is meant to stimulate intense thought.” Throughout Hebrew history, wise men, prophets, and teachers used parables and allegories as a preferred method of teaching spiritual truths. Poets would write their riddles and musicians would sing their proverbs with verbal imagery. Jesus always taught the people by using allegory and parables (Matt. 13:34; Mark 4:34). As a true prophet, one of Jesus’ preferred methods of teaching was allegory. To deny the validity of allegorical teaching is to ignore the teaching methods of Jesus, the living Word.
  - type: text
    content: 'to illustrate spiritual truths, saying:'
  '20':
  - type: text
    content: “But what is sown on good soil represents those who open their hearts to receive the message and their lives bear good fruit—some yield a harvest of thirty, sixty, even a hundredfold!”
  - type: heading
    content: Parable of the Lamp
  '21':
  - type: text
    content: 'He also gave them this parable: '
  - type: text
    content: “No one lights a lamp
  - type: text
    content: ' '
  - type: note
    content: The Jewish people considered the Torah, God’s Word, to be a lamp that gives light to see and understand. Israel was meant to be a light that gives illumination to the nations. Jesus also calls his followers those who “light up the world.” See Matt. 5:14.
  - type: text
    content: only to place it under a basket or under the bed. It is meant to be placed on a lampstand.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For there is nothing that is hidden that won’t be disclosed, and there is no secret that won’t be brought out into the light!
  - type: text
    content: ' '
  '23':
  - type: text
    content: If you understand what I’m saying, you need to respond!”
  - type: note
    content: Or “The one with ears to hear should use them.” The Aramaic is “If one brings a hearing ear for himself, he will hear.”
  '24':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “Be diligent to understand the meaning behind everything you hear, for as you do, more understanding will be given to you. And according to your longing to understand,
  - type: text
    content: ' '
  - type: note
    content: Or “By the measure with which you measure, it will be measured to you.” Some interpret this to refer to our relationships; i.e., “The way you treat others will be the way you will be treated.” However the context is clearly about having an open heart to receive and live in truth, and not to hide it or have a closed heart to understand.
  - type: text
    content: much more will be added to you.
  - type: text
    content: ' '
  '25':
  - type: text
    content: For those who listen with open hearts will receive more revelation. But those who don’t listen with open hearts will lose what little they think they have!”
  - type: note
    content: This verse contains a complicated ellipsis, which is a literary function of omitting certain information to invite discovery. The ellipsis of the text has been supplied by making explicit what is implicit in the context. The verse reads literally “More will be given to the person who has (something), but a person who doesn’t have (something), even what (something) they do have will be taken from him.” This translation fills the ellipsis with the theme of the context—having an open heart to receive the truth of God. The parables of the sower and of the lamp are similar in that they speak of the heart that receives truth. The Word is a “seed” that grows within us and a “lamp” that glows within us.
  - type: heading
    content: Parable of the Growing Seed
  '26':
  - type: text
    content: 'Jesus also told them this parable: '
  - type: text
    content: “God’s kingdom realm is like someone spreading seed on the ground.
  - type: text
    content: ' '
  '27':
  - type: text
    content: He goes to bed and gets up, day after day, and the seed sprouts and grows tall, though he knows not how.
  - type: text
    content: ' '
  '28':
  - type: text
    content: All by itself it sprouts, and the soil produces a crop; first the green stem, then the head on the stalk, and then the fully developed grain in the head.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Then, when the grain is ripe, he immediately puts the sickle to the grain, because harvest time has come.”
  - type: note
    content: This parable is only found in Mark’s Gospel. It teaches us that the reality of God’s kingdom realm is like seed sown into the world that will grow through stages of maturity until the harvest.
  - type: heading
    content: Parable of the Tiny Mustard Seed
  '3':
  - type: text
    content: '“Consider this: A sower went out to sow.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he told them this parable: '
  - type: text
    content: “How can I describe God’s kingdom realm? Let me illustrate it with this parable.
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is like the mustard seed, the tiniest of all the seeds,
  - type: text
    content: ' '
  '32':
  - type: text
    content: yet when it springs up and grows, it becomes the largest plant in the garden, with so many large spreading branches, even birds can nest in its shade.”
  - type: note
    content: Like the preceding parable, this is an allegorical way of describing the growth of God’s kingdom realm. It may appear in the beginning as small and insignificant, yet it will grow until it becomes the greatest kingdom of all. Both of these parables teach us that God’s kingdom is growing on the earth and not diminishing. See Ezek. 17:22–24.
  - type: heading
    content: Jesus Always Taught Using Parables
  '33':
  - type: text
    content: 'Jesus used many parables such as these as he taught the people, and they learned according to their ability to understand. '
  '34':
  - type: text
    content: He never spoke to them without using parables, but would wait until he was alone with his disciples to explain to them their meanings.
  - type: note
    content: Jesus still delights to mystify those who follow him, but he waits until we are alone with him, and then he reveals the wonders of his grace and truth to our hearts.
  - type: heading
    content: Jesus Stills a Storm
  '35':
  - type: text
    content: 'That same day, after it grew dark, Jesus said to his disciples, '
  - type: text
    content: “Let’s cross over to the other side of the lake.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Leaving the crowd behind, the disciples got into the boat in which Jesus was already sitting, and they took him with them. Other boats sailed with them. '
  '37':
  - type: text
    content: 'Suddenly, as they were crossing the lake, a ferocious storm arose, with violent winds and waves that were crashing into the boat until it was nearly swamped. '
  - type: note
    content: This gale of wind and ferocious tempest was demonic in nature, as Jesus was about to confront a powerful principality on the other side of the lake. (See Mark 5:1–20.) Jesus would not have rebuked the storm if it was from God. The devil knew that if Jesus crossed to the other side, he would cast out the demon horde that had long terrorized the entire region.
  '38':
  - type: text
    content: 'But Jesus was calmly sleeping in the stern, resting on a cushion. '
  '39':
  - type: text
    content: 'So they shook him awake, saying, “Teacher, don’t you even care that we are all about to die!” Fully awake, he rebuked the storm and shouted to the sea, '
  - type: text
    content: “Hush! Be still!”
  - type: text
    content: ' '
  - type: note
    content: In Aramaic, the language Jesus spoke, it is “Peace. Submit to the will of God!”
  - type: text
    content: All at once the wind stopped howling and the water became perfectly calm.
  '4':
  - type: text
    content: As he sowed some fell along the beaten path and soon the birds came and ate it.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then he turned to his disciples and said to them, '
  - type: text
    content: “Why are you so afraid? Haven’t you learned to trust yet?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: But they were overwhelmed with fear and awe and said to one another, “Who is this man who has such authority that even the wind and waves obey him?”
  '5':
  - type: text
    content: Some fell onto gravel with no topsoil and quickly sprouted since the soil had no depth.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But when the days grew hot, the sprouts were scorched and withered because they had insufficient roots.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Some fell among the thorns, and the thorns grew up and choked it, and it yielded no fruit.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But some fell onto good, rich soil that kept producing a good harvest. Some yielded thirty, some sixty—and some a hundredfold!
  - type: text
    content: ' '
  '9':
  - type: text
    content: If you understand this, then you need to respond.”
  - type: note
    content: 'Or “The one with ears to hear should use them.” We usually apply portions of this parable to unbelievers, but Jesus instructs us to apply it to ourselves. The four kinds of soils speak of four kinds of hearts: hard hearts, hollow hearts, half hearts, and whole hearts. With the first soil we see the activity of Satan, the second, that of the flesh, and the third, that of the world. Bearing fruit is never a problem with what is sown but with the soil it falls upon.'
  - type: heading
    content: The Purpose of Parables
