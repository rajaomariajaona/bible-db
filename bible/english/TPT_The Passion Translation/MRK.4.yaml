segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Sower
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Once again Jesus went to teach the people at the shore of Lake Galilee '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Commonly known as the Sea of Galilee. It is interesting that Jesus left the house (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 3:20
      metadata:
        usfm: MRK.3.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) to go to the sea. The “house” suggests the “house of Israel,” and the “sea” speaks of the non-Jewish peoples (i.e., the “sea of humanity”).
    marker-yv: yv-n
  - type: text
    text: 'and a massive crowd surrounded him. The crowd was so huge that he had to get into a boat and teach the people from there. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He taught them many things by using parables '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic and Greek use a word for “parable” that means “a metaphor,” “allegory,” “simile,” “illustration,” “comparison,” “figure of speech,” “riddle,” or “enigmatic saying that is meant to stimulate intense thought.” Throughout Hebrew history, wise men, prophets, and teachers used parables and allegories as a preferred method of teaching spiritual truths. Poets would write their riddles and musicians would sing their proverbs with verbal imagery. Jesus always taught the people by using allegory and parables (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:34
      metadata:
        usfm: MAT.13.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 4:34
      metadata:
        usfm: MRK.4.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). As a true prophet, one of Jesus’ preferred methods of teaching was allegory. To deny the validity of allegorical teaching is to ignore the teaching methods of Jesus, the living Word.
    marker-yv: yv-n
  - type: text
    text: 'to illustrate spiritual truths, saying:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Consider this: A sower went out to sow.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As he sowed some fell along the beaten path and soon the birds came and ate it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Some fell onto gravel with no topsoil and quickly sprouted since the soil had no depth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when the days grew hot, the sprouts were scorched and withered because they had insufficient roots.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Some fell among the thorns, and the thorns grew up and choked it, and it yielded no fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But some fell onto good, rich soil that kept producing a good harvest. Some yielded thirty, some sixty—and some a hundredfold!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you understand this, then you need to respond.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “The one with ears to hear should use them.” We usually apply portions of this parable to unbelievers, but Jesus instructs us to apply it to ourselves. The four kinds of soils speak of four kinds of hearts: hard hearts, hollow hearts, half hearts, and whole hearts. With the first soil we see the activity of Satan, the second, that of the flesh, and the third, that of the world. Bearing fruit is never a problem with what is sown but with the soil it falls upon.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Purpose of Parables
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Afterward, Jesus’ disciples and those close to him remained behind to ask Jesus about his parables. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The privilege of intimately knowing the mystery of God’s kingdom realm has been granted to you, but not to the others,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to the outsiders.” The Aramaic is “backward ones.” Jesus spoke allegorically so that those who didn’t care to understand couldn’t understand. Yet he knew that the hungry ones would seek out the hidden meaning of the parables and understand the secrets of God’s kingdom realm. It is still that way today. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 25:2
      metadata:
        usfm: PRO.25.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: where everything is revealed in parables.
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For even when they see what I do, they will not understand, and when they hear what I say, they will learn nothing, otherwise they would repent and be forgiven.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 6:9–10
      metadata:
        usfm: ISA.6.9+ISA.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you don’t understand this parable, how will you understand any parable?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let me explain: The farmer sows the'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: message of the kingdom.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What falls on the beaten path represents those who hear the message, but immediately Satan appears and snatches it from their hearts.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what is sown on gravel represents those who hear the message and receive it joyfully,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but because their hearts fail to sink a deep root, they don’t endure for long. For when trouble or persecution comes on account of the message, they immediately wilt and fall away.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what is sown among thorns represents those who hear the message,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but they allow the cares of this life and the seduction of wealth and the desires for other things to crowd out and choke the message so that it produces nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But what is sown on good soil represents those who open their hearts to receive the message and their lives bear good fruit—some yield a harvest of thirty, sixty, even a hundredfold!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Lamp
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He also gave them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one lights a lamp
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jewish people considered the Torah, God’s Word, to be a lamp that gives light to see and understand. Israel was meant to be a light that gives illumination to the nations. Jesus also calls his followers those who “light up the world.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 5:14
      metadata:
        usfm: MAT.5.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: only to place it under a basket or under the bed. It is meant to be placed on a lampstand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For there is nothing that is hidden that won’t be disclosed, and there is no secret that won’t be brought out into the light!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you understand what I’m saying, you need to respond!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The one with ears to hear should use them.” The Aramaic is “If one brings a hearing ear for himself, he will hear.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be diligent to understand the meaning behind everything you hear, for as you do, more understanding will be given to you. And according to your longing to understand,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “By the measure with which you measure, it will be measured to you.” Some interpret this to refer to our relationships; i.e., “The way you treat others will be the way you will be treated.” However the context is clearly about having an open heart to receive and live in truth, and not to hide it or have a closed heart to understand.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: much more will be added to you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For those who listen with open hearts will receive more revelation. But those who don’t listen with open hearts will lose what little they think they have!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse contains a complicated ellipsis, which is a literary function of omitting certain information to invite discovery. The ellipsis of the text has been supplied by making explicit what is implicit in the context. The verse reads literally “More will be given to the person who has (something), but a person who doesn’t have (something), even what (something) they do have will be taken from him.” This translation fills the ellipsis with the theme of the context—having an open heart to receive the truth of God. The parables of the sower and of the lamp are similar in that they speak of the heart that receives truth. The Word is a “seed” that grows within us and a “lamp” that glows within us.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Growing Seed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jesus also told them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “God’s kingdom realm is like someone spreading seed on the ground.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He goes to bed and gets up, day after day, and the seed sprouts and grows tall, though he knows not how.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All by itself it sprouts, and the soil produces a crop; first the green stem, then the head on the stalk, and then the fully developed grain in the head.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then, when the grain is ripe, he immediately puts the sickle to the grain, because harvest time has come.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This parable is only found in Mark’s Gospel. It teaches us that the reality of God’s kingdom realm is like seed sown into the world that will grow through stages of maturity until the harvest.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Tiny Mustard Seed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he told them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can I describe God’s kingdom realm? Let me illustrate it with this parable.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like the mustard seed, the tiniest of all the seeds,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: yet when it springs up and grows, it becomes the largest plant in the garden, with so many large spreading branches, even birds can nest in its shade.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Like the preceding parable, this is an allegorical way of describing the growth of God’s kingdom realm. It may appear in the beginning as small and insignificant, yet it will grow until it becomes the greatest kingdom of all. Both of these parables teach us that God’s kingdom is growing on the earth and not diminishing. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 17:22–24
      metadata:
        usfm: EZK.17.22+EZK.17.23+EZK.17.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Always Taught Using Parables
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jesus used many parables such as these as he taught the people, and they learned according to their ability to understand. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He never spoke to them without using parables, but would wait until he was alone with his disciples to explain to them their meanings.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus still delights to mystify those who follow him, but he waits until we are alone with him, and then he reveals the wonders of his grace and truth to our hearts.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Stills a Storm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'That same day, after it grew dark, Jesus said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let’s cross over to the other side of the lake.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Leaving the crowd behind, the disciples got into the boat in which Jesus was already sitting, and they took him with them. Other boats sailed with them. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Suddenly, as they were crossing the lake, a ferocious storm arose, with violent winds and waves that were crashing into the boat until it was nearly swamped. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This gale of wind and ferocious tempest was demonic in nature, as Jesus was about to confront a powerful principality on the other side of the lake. (See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 5:1–20
      metadata:
        usfm: MRK.5.1+MRK.5.2+MRK.5.3+MRK.5.4+MRK.5.5+MRK.5.6+MRK.5.7+MRK.5.8+MRK.5.9+MRK.5.10+MRK.5.11+MRK.5.12+MRK.5.13+MRK.5.14+MRK.5.15+MRK.5.16+MRK.5.17+MRK.5.18+MRK.5.19+MRK.5.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .) Jesus would not have rebuked the storm if it was from God. The devil knew that if Jesus crossed to the other side, he would cast out the demon horde that had long terrorized the entire region.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Jesus was calmly sleeping in the stern, resting on a cushion. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So they shook him awake, saying, “Teacher, don’t you even care that we are all about to die!” Fully awake, he rebuked the storm and shouted to the sea, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Hush! Be still!”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Aramaic, the language Jesus spoke, it is “Peace. Submit to the will of God!”
    marker-yv: yv-n
  - type: text
    text: All at once the wind stopped howling and the water became perfectly calm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then he turned to his disciples and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you so afraid? Haven’t you learned to trust yet?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: But they were overwhelmed with fear and awe and said to one another, “Who is this man who has such authority that even the wind and waves obey him?”
