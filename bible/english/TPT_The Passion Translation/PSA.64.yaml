document_id: PSA.64
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Victory over Evildoers
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s song
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Lord, can’t you hear my cry, my bitter complaint?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep me safe from this band of criminals and
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the conspiracy of these wicked men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They gather in their secret counsel to destroy me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Can’t you hear their slander, their lies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their words are like poison-tipped arrows
- type: usfm
  marker: q1
  children:
  - type: text
    text: shot from the shadows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are unafraid and have no fear of consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They persist with their evil plans
- type: usfm
  marker: q1
  children:
  - type: text
    text: and plot together to hide their traps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They boast, “No one can see us or stop us!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They search out opportunities to pervert justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: as they plan the “perfect crime.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: How unsearchable is their endless evil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They try desperately to hide the deep darkness of their hearts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 64:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Scholars are unanimous in agreement that the meaning of the Hebrew text of this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But all the while God has his own fire-tipped arrows!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly, without warning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will be pierced and struck down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Staggering backward, they will be destroyed
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the very ones they spoke against.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who see this will view them with scorn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then all will stand awestruck over what God has done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: seeing how he vindicated the victims of these crimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The lovers of God will be glad, rejoicing in the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be found in his glorious wraparound presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: singing songs of praise to God!
