document_id: PSA.64,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Victory over Evildoers
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s song
  - type: text
    content: Lord, can’t you hear my cry, my bitter complaint?
  - type: text
    content: Keep me safe from this band of criminals and
  - type: text
    content: from the conspiracy of these wicked men.
  - type: text
    content: They gather in their secret counsel to destroy me.
  '10':
  - type: text
    content: The lovers of God will be glad, rejoicing in the Lord.
  - type: text
    content: They will be found in his glorious wraparound presence,
  - type: text
    content: singing songs of praise to God!
  '3':
  - type: text
    content: Can’t you hear their slander, their lies?
  - type: text
    content: Their words are like poison-tipped arrows
  - type: text
    content: shot from the shadows.
  - type: text
    content: They are unafraid and have no fear of consequences.
  '5':
  - type: text
    content: They persist with their evil plans
  - type: text
    content: and plot together to hide their traps.
  - type: text
    content: They boast, “No one can see us or stop us!”
  '6':
  - type: text
    content: They search out opportunities to pervert justice
  - type: text
    content: as they plan the “perfect crime.”
  - type: text
    content: How unsearchable is their endless evil!
  - type: text
    content: They try desperately to hide the deep darkness of their hearts.
  - type: note
    content: Scholars are unanimous in agreement that the meaning of the Hebrew text of this verse is uncertain.
  '7':
  - type: text
    content: But all the while God has his own fire-tipped arrows!
  - type: text
    content: Suddenly, without warning,
  - type: text
    content: they will be pierced and struck down.
  '8':
  - type: text
    content: Staggering backward, they will be destroyed
  - type: text
    content: by the very ones they spoke against.
  - type: text
    content: All who see this will view them with scorn.
  '9':
  - type: text
    content: Then all will stand awestruck over what God has done,
  - type: text
    content: seeing how he vindicated the victims of these crimes.
