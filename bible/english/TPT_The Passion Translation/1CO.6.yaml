document_id: 1CO.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Lawsuits between Believers
  - type: text
    content: 'Furthermore, how dare you take a fellow believer to court! It is wrong to drag him before the unrighteous to settle a legal dispute. Isn’t it better to take him before God’s holy believers to settle the matter? '
  '10':
  - type: text
    content: 'fraud, greed, drunkenness, verbal abuse, '
  - type: note
    content: Or “slanderers.”
  - type: text
    content: 'or extortion—these will not inherit God’s kingdom realm. '
  '11':
  - type: text
    content: 'It’s true that some of you once lived in those lifestyles, but now you have been purified from sin, '
  - type: note
    content: Or “washed clean.”
  - type: text
    content: made holy, and given a perfect standing before God—all because of the power of the name of the Lord Jesus, the Messiah, and through our union with the Spirit of our God.
  '12':
  - type: text
    content: 'It’s true that our freedom allows us to do anything, but that doesn’t mean that everything we do is good for us. I’m free to do as I choose, but I choose to never be enslaved to anything. '
  '13':
  - type: text
    content: Some have said, “I eat to live and I live to eat!” But God will do away with it all. The body was not created for illicit sex, but to serve and worship our Lord Jesus, who can fill the body with himself.
  '14':
  - type: text
    content: Now the God who raised up our Lord from the grave will awaken and raise us up through his mighty power!
  - type: heading
    content: The Body of Christ
  '15':
  - type: text
    content: 'Don’t you know that your bodies belong to Christ as his body parts? Should one presume to take the members of Christ’s body and make them into members of a harlot? Absolutely not! '
  '16':
  - type: text
    content: 'Aren’t you aware of the fact that when anyone sleeps with a prostitute he becomes a part of her, and she becomes a part of him? For it has been declared:'
  - type: text
    content: The two become a single body.
  - type: note
    content: See Gen. 2:24. Paul is teaching that sexual intercourse causes an interpersonal union that goes beyond a physical relationship.
  '17':
  - type: text
    content: 'But the one who joins '
  - type: note
    content: The Greek verb kallaō means “to unite,” “to knit or weld together,” “to mingle,” or “to join together,” and “to make two into one.”
  - type: text
    content: 'himself to the Lord is mingled into one spirit with him. '
  '18':
  - type: text
    content: This is why
  - type: text
    content: ' you must keep running away from sexual immorality. '
  - type: note
    content: Or “fornication,” which includes sexual activity outside of marriage.
  - type: text
    content: For every other sin a person commits is external to the body, but immorality involves sinning against your own body.
  '19':
  - type: text
    content: 'Have you forgotten that your body is now the sacred temple of the Spirit of Holiness, who lives in you? You don’t belong to yourself any longer, for the gift of God, the Holy Spirit, lives inside your sanctuary. '
  - type: note
    content: Or “the in-you Holy Spirit.” The Greek word Paul uses for “temple” is actually naos, “sanctuary.” See Eph. 2:19–22; 1 Peter 2:4–5.
  '2':
  - type: text
    content: 'Don’t you realize that we, the holy ones, will judge the universe? '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'If the unbelieving world is under your jurisdiction, you should be fully competent to settle these trivial lawsuits among yourselves. '
  '20':
  - type: text
    content: 'You were God’s expensive purchase, paid for with tears of blood, '
  - type: note
    content: As translated from the Aramaic. Your soul was purchased with the bride-price of the precious blood of Christ.
  - type: text
    content: 'so by all means, then, use your body '
  - type: note
    content: The Aramaic and the Textus Receptus adds “and in your spirit.”
  - type: text
    content: to bring glory to God!
  '3':
  - type: text
    content: 'For surely you know that we will one day judge '
  - type: note
    content: The meaning of this is that believers will one day govern over and judge the angelic realm. Our position in Christ is higher than the angels. They are servants; we are sons. Sons rule over servants.
  - type: text
    content: 'angels, let alone these everyday matters. '
  '4':
  - type: text
    content: 'Don’t you realize that you are bringing your issues before civil judges appointed by people who have no standing within the church? '
  - type: note
    content: The Greek verb kathizete can be interpreted as an ironic imperative instead of a question. This would change the verse to read “Appoint as judges those who have no standing in the church to arbitrate ordinary lawsuits.” However, it is more likely a question since kathizete is found at the end of the sentence.
  '5':
  - type: text
    content: 'What a shame that there is not one within the church '
  - type: note
    content: This chapter is loaded with irony. Paul here argues that the church must have someone who could discern, sift, weigh, and judge these everyday matters within the body. The irony is that the word for church is ekklēsia, which means “governing body,” similar to a senate. It was a Greek term used for the gathering of a governing body to promote the welfare of a city. To be a part of an ekklēsia (church) implies that there is wisdom and leadership among the group to govern and bring blessing to a city.
  - type: text
    content: 'who has '
  - type: text
    content: the spirit of
  - type: text
    content: ' wisdom who could arbitrate these disputes and reconcile the offended parties! '
  '6':
  - type: text
    content: It’s not right for
  - type: text
    content: ' a believer to sue a fellow believer—and especially to bring it before the unbelievers.'
  '7':
  - type: text
    content: 'Don’t you realize that when you drag another believer into court you’re providing the evidence that you are already defeated? Wouldn’t it be better to accept the fact that someone is trying to cheat and take advantage of you, and simply '
  - type: text
    content: choose the high road
  - type: text
    content: '? '
  - type: text
    content: At times it is better to
  - type: text
    content: ' just accept injustice and even to let someone take advantage of you, '
  - type: text
    content: rather than to expose our conflicts publicly before unbelievers
  - type: text
    content: '. '
  - type: note
    content: 'Paul does not mean that we should passively acquiesce to abuse from others. Rather, he brings before us a higher principle: It is better to suffer personal injustice than to bring disgrace to Christ by bringing our conflicts before unbelievers. The Spirit of wisdom (Eph. 1:17) is one of the graces that God pours out upon his people. This anointing of wisdom will empower the body of Christ to bring justice and righteousness into our churches. Most scholars conclude that these disputes were not criminal but issues related to business, personal property, inheritances, default in loan payments to other believers, and the like. See also Matt. 5:25–26; 18:15–17.'
  '8':
  - type: text
    content: 'But instead you keep cheating and doing wrong to your brothers and sisters, '
  - type: text
    content: and then request that unbelievers render their judgment
  - type: text
    content: '!'
  - type: heading
    content: Christian Morality and the Kingdom Realm of God
  '9':
  - type: text
    content: 'Surely you must know that people who practice evil cannot possess God’s kingdom realm. Stop being deceived! '
  - type: note
    content: Or “Make no mistake!”
  - type: text
    content: 'People who continue to engage in sexual immorality, idolatry, adultery, sexual perversion, '
  - type: note
    content: Or “catamites” or “pederasts” or “child molesters.”
  - type: text
    content: 'homosexuality, '
