document_id: 1CO.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lawsuits between Believers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Furthermore, how dare you take a fellow believer to court! It is wrong to drag him before the unrighteous to settle a legal dispute. Isn’t it better to take him before God’s holy believers to settle the matter? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Don’t you realize that we, the holy ones, will judge the universe? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'If the unbelieving world is under your jurisdiction, you should be fully competent to settle these trivial lawsuits among yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For surely you know that we will one day judge '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this is that believers will one day govern over and judge the angelic realm. Our position in Christ is higher than the angels. They are servants; we are sons. Sons rule over servants.
    marker-yv: yv-n
  - type: text
    text: 'angels, let alone these everyday matters. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Don’t you realize that you are bringing your issues before civil judges appointed by people who have no standing within the church? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kathizete
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be interpreted as an ironic imperative instead of a question. This would change the verse to read “Appoint as judges those who have no standing in the church to arbitrate ordinary lawsuits.” However, it is more likely a question since
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kathizete
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is found at the end of the sentence.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'What a shame that there is not one within the church '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This chapter is loaded with irony. Paul here argues that the church must have someone who could discern, sift, weigh, and judge these everyday matters within the body. The irony is that the word for church is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekklēsia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “governing body,” similar to a senate. It was a Greek term used for the gathering of a governing body to promote the welfare of a city. To be a part of an'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekklēsia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (church) implies that there is wisdom and leadership among the group to govern and bring blessing to a city.
    marker-yv: yv-n
  - type: text
    text: 'who has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the spirit of
  - type: text
    text: ' wisdom who could arbitrate these disputes and reconcile the offended parties! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: It’s not right for
  - type: text
    text: ' a believer to sue a fellow believer—and especially to bring it before the unbelievers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Don’t you realize that when you drag another believer into court you’re providing the evidence that you are already defeated? Wouldn’t it be better to accept the fact that someone is trying to cheat and take advantage of you, and simply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: choose the high road
  - type: text
    text: '? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: At times it is better to
  - type: text
    text: ' just accept injustice and even to let someone take advantage of you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rather than to expose our conflicts publicly before unbelievers
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul does not mean that we should passively acquiesce to abuse from others. Rather, he brings before us a higher principle: It is better to suffer personal injustice than to bring disgrace to Christ by bringing our conflicts before unbelievers. The Spirit of wisdom ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 1:17
      metadata:
        usfm: EPH.1.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is one of the graces that God pours out upon his people. This anointing of wisdom will empower the body of Christ to bring justice and righteousness into our churches. Most scholars conclude that these disputes were not criminal but issues related to business, personal property, inheritances, default in loan payments to other believers, and the like. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 5:25–26
      metadata:
        usfm: MAT.5.25+MAT.5.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:15–17
      metadata:
        usfm: MAT.18.15+MAT.18.16+MAT.18.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But instead you keep cheating and doing wrong to your brothers and sisters, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and then request that unbelievers render their judgment
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christian Morality and the Kingdom Realm of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Surely you must know that people who practice evil cannot possess God’s kingdom realm. Stop being deceived! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Make no mistake!”
    marker-yv: yv-n
  - type: text
    text: 'People who continue to engage in sexual immorality, idolatry, adultery, sexual perversion, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “catamites” or “pederasts” or “child molesters.”
    marker-yv: yv-n
  - type: text
    text: 'homosexuality, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fraud, greed, drunkenness, verbal abuse, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “slanderers.”
    marker-yv: yv-n
  - type: text
    text: 'or extortion—these will not inherit God’s kingdom realm. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It’s true that some of you once lived in those lifestyles, but now you have been purified from sin, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “washed clean.”
    marker-yv: yv-n
  - type: text
    text: made holy, and given a perfect standing before God—all because of the power of the name of the Lord Jesus, the Messiah, and through our union with the Spirit of our God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It’s true that our freedom allows us to do anything, but that doesn’t mean that everything we do is good for us. I’m free to do as I choose, but I choose to never be enslaved to anything. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Some have said, “I eat to live and I live to eat!” But God will do away with it all. The body was not created for illicit sex, but to serve and worship our Lord Jesus, who can fill the body with himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now the God who raised up our Lord from the grave will awaken and raise us up through his mighty power!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Body of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Don’t you know that your bodies belong to Christ as his body parts? Should one presume to take the members of Christ’s body and make them into members of a harlot? Absolutely not! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aren’t you aware of the fact that when anyone sleeps with a prostitute he becomes a part of her, and she becomes a part of him? For it has been declared:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: The two become a single body.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:24
      metadata:
        usfm: GEN.2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Paul is teaching that sexual intercourse causes an interpersonal union that goes beyond a physical relationship.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the one who joins '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kallaō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to unite,” “to knit or weld together,” “to mingle,” or “to join together,” and “to make two into one.”
    marker-yv: yv-n
  - type: text
    text: 'himself to the Lord is mingled into one spirit with him. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is why
  - type: text
    text: ' you must keep running away from sexual immorality. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fornication,” which includes sexual activity outside of marriage.
    marker-yv: yv-n
  - type: text
    text: For every other sin a person commits is external to the body, but immorality involves sinning against your own body.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Have you forgotten that your body is now the sacred temple of the Spirit of Holiness, who lives in you? You don’t belong to yourself any longer, for the gift of God, the Holy Spirit, lives inside your sanctuary. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the in-you Holy Spirit.” The Greek word Paul uses for “temple” is actually
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: naos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', “sanctuary.” See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:19–22
      metadata:
        usfm: EPH.2.19+EPH.2.20+EPH.2.21+EPH.2.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 2:4–5
      metadata:
        usfm: 1PE.2.4+1PE.2.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You were God’s expensive purchase, paid for with tears of blood, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Your soul was purchased with the bride-price of the precious blood of Christ.
    marker-yv: yv-n
  - type: text
    text: 'so by all means, then, use your body '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic and the Textus Receptus adds “and in your spirit.”
    marker-yv: yv-n
  - type: text
    text: to bring glory to God!
