document_id: PSA.102,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: From Tears to Praise
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer for those who are overwhelmed and for all the discouraged who come to pour out their hearts before the Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, listen to my prayer! Listen to my cry for help!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My days are marked by the lengthening shadows of death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m withering away and there’s nothing left of me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But then I remember that you, O Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: still sit enthroned as King over all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fame of your name will be revealed to every generation.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you are about to arise and show your tender love to Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now is the time, Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your compassion and mercy to be poured out—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the appointed time has come
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: for your prophetic promises to be fulfilled
    - type: text
      text: '!'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your servants weep in sympathy over Zion’s ruins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and feel love for her every stone.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you arise to intervene,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the nations and kings will be stunned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will fear your awesome name, trembling before your glory!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, you will reveal yourself to Zion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and appear in the brightness of your glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to restore her and give her children.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He responds to the prayer of the poor and broken
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will not despise the cry of the homeless.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Write all this down for the coming generation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so re-created people '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 102:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those born anew [re-created].”
      marker-yv: yv-n
    - type: text
      text: will read it and praise the Lord!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tell them how Yah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 102:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Taken from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: weh. Yah is often used as the name of the God of Power.
      marker-yv: yv-n
    - type: text
      text: looked down from his high and holy place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gazing from his glory to survey the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can’t hide your face from me in the day of my distress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stoop down to hear my prayer and answer me quickly, Lord!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He listened to all the groaning of his people longing to be free,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he set loose the sons of death to experience life.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multitudes will stream to Jerusalem to
  - type: usfm
    marker: q1
    children:
    - type: text
      text: praise the Lord and declare his name in Zion!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peoples from every land, their kings and kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will gather together to worship the Lord.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God has brought me to my knees, shortening my life.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I cry out to you, my God, Father of eternity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: please don’t let me die!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know my life is not yet finished.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your hands you once formed the foundations of the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and handcrafted the heavens above.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all fade away one day like worn-out clothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to be discarded, but you’ll still be here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will replace it all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your first creation will be changed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you alone will endure, the God of all eternity!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Generation after generation our descendants will live securely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are the one protecting us, keeping us for yourself.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my days of happiness have gone up in smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My body is raging with fever, my heart is sick,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’m consumed by this illness—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: withered like a dead leaf. I can’t even eat.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m nothing but skin and bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing’s left of me but whispered groans.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m like a pelican of the wilderness,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 102:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ancient expositors viewed the “pelican in the wilderness” as a reference to Christ. The famous legend and much medieval artwork taught that the pelican would give the gift of blood to her starving young by piercing her own breast with her beak, allowing her young to drink her blood and live. What an amazing example of sacrificial love. Augustine writes concerning this: “The mother wounds herself deeply and pours forth her blood over her young, bathed in which they recover life.” See Augustine, “Exposition on the Book of Psalms,” in'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nicene and Post-Nicene Fathers, First Series
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ed. A. Cleveland Coxe and Philip Schaff (Peabody, MA: Hendrickson, 1955), 8:497.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like an owl among the ruins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m sleepless, shivering in the cold, forlorn, and friendless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a lonely bird on the rooftop.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My every enemy mocks and insults me incessantly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They even use my name as a curse to speak over others!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your great and furious anger against me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all I do is suffer with sorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with nothing to eat but a meal of mourning.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 102:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I eat ashes as if they were bread.” Ashes speak of mourning, for mourners would often throw dust and ashes over their heads.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My crying fills my cup with salty tears!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your wrath you have rejected me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sweeping me away like dirt on the floor.
