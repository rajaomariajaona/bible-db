document_id: PSA.102,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: From Tears to Praise
  - type: text
    content: A prayer for those who are overwhelmed and for all the discouraged who come to pour out their hearts before the Lord
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: Lord, listen to my prayer! Listen to my cry for help!
  '11':
  - type: text
    content: My days are marked by the lengthening shadows of death.
  - type: text
    content: I’m withering away and there’s nothing left of me.
  '12':
  - type: text
    content: But then I remember that you, O Lord,
  - type: text
    content: still sit enthroned as King over all!
  - type: text
    content: The fame of your name will be revealed to every generation.
  '13':
  - type: text
    content: I know you are about to arise and show your tender love to Zion.
  - type: text
    content: Now is the time, Lord,
  - type: text
    content: for your compassion and mercy to be poured out—
  - type: text
    content: the appointed time has come
  - type: text
    content: for your prophetic promises to be fulfilled
  - type: text
    content: '!'
  '14':
  - type: text
    content: For your servants weep in sympathy over Zion’s ruins
  - type: text
    content: and feel love for her every stone.
  '15':
  - type: text
    content: When you arise to intervene,
  - type: text
    content: all the nations and kings will be stunned
  - type: text
    content: and will fear your awesome name, trembling before your glory!
  '16':
  - type: text
    content: Yes, you will reveal yourself to Zion
  - type: text
    content: and appear in the brightness of your glory
  - type: text
    content: to restore her and give her children.
  '17':
  - type: text
    content: He responds to the prayer of the poor and broken
  - type: text
    content: and will not despise the cry of the homeless.
  '18':
  - type: text
    content: Write all this down for the coming generation,
  - type: text
    content: 'so re-created people '
  - type: note
    content: Or “those born anew [re-created].”
  - type: text
    content: will read it and praise the Lord!
  '19':
  - type: text
    content: 'Tell them how Yah '
  - type: note
    content: Taken from Yahweh. Yah is often used as the name of the God of Power.
  - type: text
    content: looked down from his high and holy place,
  - type: text
    content: gazing from his glory to survey the earth.
  '2':
  - type: text
    content: You can’t hide your face from me in the day of my distress.
  - type: text
    content: Stoop down to hear my prayer and answer me quickly, Lord!
  '20':
  - type: text
    content: He listened to all the groaning of his people longing to be free,
  - type: text
    content: and he set loose the sons of death to experience life.
  '21':
  - type: text
    content: Multitudes will stream to Jerusalem to
  - type: text
    content: praise the Lord and declare his name in Zion!
  '22':
  - type: text
    content: Peoples from every land, their kings and kingdoms,
  - type: text
    content: will gather together to worship the Lord.
  '23':
  - type: text
    content: But God has brought me to my knees, shortening my life.
  '24':
  - type: text
    content: So I cry out to you, my God, Father of eternity,
  - type: text
    content: please don’t let me die!
  - type: text
    content: I know my life is not yet finished.
  '25':
  - type: text
    content: With your hands you once formed the foundations of the earth
  - type: text
    content: and handcrafted the heavens above.
  '26':
  - type: text
    content: They will all fade away one day like worn-out clothing,
  - type: text
    content: ready to be discarded, but you’ll still be here.
  - type: text
    content: You will replace it all!
  - type: text
    content: Your first creation will be changed,
  - type: text
    content: but you alone will endure, the God of all eternity!
  '28':
  - type: text
    content: Generation after generation our descendants will live securely,
  - type: text
    content: for you are the one protecting us, keeping us for yourself.
  '3':
  - type: text
    content: For my days of happiness have gone up in smoke.
  - type: text
    content: My body is raging with fever, my heart is sick,
  - type: text
    content: and I’m consumed by this illness—
  - type: text
    content: withered like a dead leaf. I can’t even eat.
  '5':
  - type: text
    content: I’m nothing but skin and bones.
  - type: text
    content: Nothing’s left of me but whispered groans.
  '6':
  - type: text
    content: I’m like a pelican of the wilderness,
  - type: note
    content: 'Ancient expositors viewed the “pelican in the wilderness” as a reference to Christ. The famous legend and much medieval artwork taught that the pelican would give the gift of blood to her starving young by piercing her own breast with her beak, allowing her young to drink her blood and live. What an amazing example of sacrificial love. Augustine writes concerning this: “The mother wounds herself deeply and pours forth her blood over her young, bathed in which they recover life.” See Augustine, “Exposition on the Book of Psalms,” in Nicene and Post-Nicene Fathers, First Series, ed. A. Cleveland Coxe and Philip Schaff (Peabody, MA: Hendrickson, 1955), 8:497.'
  - type: text
    content: like an owl among the ruins.
  '7':
  - type: text
    content: I’m sleepless, shivering in the cold, forlorn, and friendless,
  - type: text
    content: like a lonely bird on the rooftop.
  '8':
  - type: text
    content: My every enemy mocks and insults me incessantly.
  - type: text
    content: They even use my name as a curse to speak over others!
  '9':
  - type: text
    content: Because of your great and furious anger against me,
  - type: text
    content: all I do is suffer with sorrow,
  - type: text
    content: with nothing to eat but a meal of mourning.
  - type: note
    content: Or “I eat ashes as if they were bread.” Ashes speak of mourning, for mourners would often throw dust and ashes over their heads.
  - type: text
    content: My crying fills my cup with salty tears!
  - type: text
    content: In your wrath you have rejected me,
  - type: text
    content: sweeping me away like dirt on the floor.
