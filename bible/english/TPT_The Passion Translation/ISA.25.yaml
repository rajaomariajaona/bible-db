document_id: ISA.25,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song of God’s Faithfulness
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you are my '
  - type: text
    content: glorious
  - type: text
    content: ' God!'
  - type: text
    content: I will exalt you and praise your name forever,
  - type: text
    content: for you have done so many wonderful things.
  - type: text
    content: Well-thought-out plans you formed in ages past—
  - type: text
    content: you’ve been faithful and true to fulfill them all!
  '10':
  - type: text
    content: 'The '
  - type: text
    content: mighty
  - type: text
    content: ', '
  - type: text
    content: gracious
  - type: text
    content: ' hand of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: will rest upon this mountain,
  - type: text
    content: but the Moabites will be trampled under his feet
  - type: text
    content: as straw gets trampled into the manure.
  - type: note
    content: Or “as straw is trampled down at Madmenah [a village outside Jerusalem].” Madmenah can also be translated “dung heap.” See Isa. 10:31.
  '11':
  - type: text
    content: They will stretch out their arms in it
  - type: text
    content: like a swimmer stretches out his arms to swim,
  - type: text
    content: yet God will bring down their pride,
  - type: text
    content: and they will thrash and sink despite their struggle.
  - type: note
    content: The Hebrew of this clause is uncertain.
  '12':
  - type: text
    content: He will tear down the high walls of Moab’s fortresses
  - type: text
    content: and flatten them into the dust.
  '2':
  - type: text
    content: The city that was once mighty
  - type: note
    content: That is, Babylon. See Jer. 50–51; Rev. 17–18.
  - type: text
    content: you’ve turned into a heap of rubble;
  - type: text
    content: the fortified city now lies in ruins.
  - type: text
    content: The foreigner’s fortress is no more and will never be rebuilt.
  '3':
  - type: text
    content: Therefore, superpower nations will glorify you
  - type: text
    content: and the cities of terrorist nations will revere you.
  '4':
  - type: text
    content: You have been a fortress-protector for the poor,
  - type: text
    content: a mighty stronghold for the needy in their distress,
  - type: text
    content: a shelter from the sudden storm,
  - type: text
    content: and a shade from the shimmering heat of the day.
  - type: text
    content: For the fury of tyrants
  - type: text
    content: was like a winter windstorm battering against the wall,
  '5':
  - type: text
    content: and like the heat of a drought in a desert land;
  - type: text
    content: but you subdued the heat under the shade of clouds.
  - type: text
    content: You alone silence the song of tyrants.
  - type: heading
    content: The Rich Feast of the Lord
  '6':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'will host a rich feast '
  - type: note
    content: Or “a feast of fatness.” See Ps. 36:9.
  - type: text
    content: 'on this mountain '
  - type: note
    content: That is, the Zion-realm, the higher realm of glory that is offered to the church. We have already come to the top of this mountain! This feast is the love-feast and the fellowship with Christ that we experience in the family of God. See Pss. 36:8; 63:5; Isa. 55:1–2; Heb. 12:2–24. The seven significant mountains in the Bible are Moriah, Sinai, Gerizim, Nebo, Carmel, Calvary, and Zion.
  - type: text
    content: for all peoples—
  - type: text
    content: a feast with plenty of meat and well-aged wine,
  - type: text
    content: 'with an abundance of food '
  - type: note
    content: Or “rich food filled with marrow.”
  - type: text
    content: and the finest of wine.
  '7':
  - type: text
    content: And on this mountain, he will destroy the shroud
  - type: note
    content: Or “the face of the shroud.”
  - type: text
    content: wrapped around all the people, the veil spread over all nations.
  '8':
  - type: text
    content: 'It is '
  - type: text
    content: the gloom of
  - type: text
    content: ' death!'
  - type: note
    content: The gloom of death is like a shroud over every life. The curse of death is defeated in Christ so that all may come to the rich, joyous feast of the Lord. See 1 Cor. 15:54–56.
  - type: text
    content: He will swallow it up in victory forever!
  - type: note
    content: The Hebrew word netsach can mean “victory” or “forever.” This translation includes both concepts. Netsach comes from a root word that means “to glitter from afar” or “to excel.” Jesus’ death, burial, resurrection, and ascension have brought an endless victory, an endless life, and the conquest of every enemy. Now Christ waits for his sons and daughters to arise and become the second witness to his eternal victory. See Rom. 8:19–21; 2 Cor. 13:1; Heb. 2:6–13.
  - type: text
    content: 'And God, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', will wipe away'
  - type: text
    content: every tear from every face.
  - type: note
    content: See Rev. 21:4.
  - type: text
    content: He will remove every trace of disgrace
  - type: text
    content: that his people have suffered throughout the world,
  - type: text
    content: 'for the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has promised it!'
  '9':
  - type: text
    content: In that day they will say,
  - type: text
    content: “Behold! This is our God!
  - type: text
    content: 'We’ve waited '
  - type: note
    content: The Hebrew word qavah (the root word for “rope”) means “to wait” or “to entwine.” Waiting on God means binding and connecting our hearts to who God is and to his promises. The Hebrew concept of waiting on the Lord is never a passive thing but an active one, full of expectation.
  - type: text
    content: for him, and he saved us!
  - type: text
    content: 'This one, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: —he is worth the wait!
  - type: note
    content: Or “we waited for him!”
  - type: text
    content: We will keep shouting with joy
  - type: text
    content: as we find our bliss in his salvation-kiss!”
