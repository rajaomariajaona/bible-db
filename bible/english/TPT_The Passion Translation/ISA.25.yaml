document_id: ISA.25,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Song of God’s Faithfulness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you are my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glorious
    - type: text
      text: ' God!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will exalt you and praise your name forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have done so many wonderful things.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well-thought-out plans you formed in ages past—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ve been faithful and true to fulfill them all!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gracious
    - type: text
      text: ' hand of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will rest upon this mountain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the Moabites will be trampled under his feet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as straw gets trampled into the manure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as straw is trampled down at Madmenah [a village outside Jerusalem].” Madmenah can also be translated “dung heap.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 10:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They will stretch out their arms in it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a swimmer stretches out his arms to swim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet God will bring down their pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will thrash and sink despite their struggle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew of this clause is uncertain.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He will tear down the high walls of Moab’s fortresses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and flatten them into the dust.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The city that was once mighty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Babylon. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Jer. 50–51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ve turned into a heap of rubble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the fortified city now lies in ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The foreigner’s fortress is no more and will never be rebuilt.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore, superpower nations will glorify you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the cities of terrorist nations will revere you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You have been a fortress-protector for the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a mighty stronghold for the needy in their distress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a shelter from the sudden storm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a shade from the shimmering heat of the day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the fury of tyrants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was like a winter windstorm battering against the wall,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and like the heat of a drought in a desert land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you subdued the heat under the shade of clouds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You alone silence the song of tyrants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rich Feast of the Lord
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will host a rich feast '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a feast of fatness.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 36:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on this mountain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the Zion-realm, the higher realm of glory that is offered to the church. We have already come to the top of this mountain! This feast is the love-feast and the fellowship with Christ that we experience in the family of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 36:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 63:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 55:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:2–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The seven significant mountains in the Bible are Moriah, Sinai, Gerizim, Nebo, Carmel, Calvary, and Zion.
      marker-yv: yv-n
    - type: text
      text: for all peoples—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a feast with plenty of meat and well-aged wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'with an abundance of food '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “rich food filled with marrow.”
      marker-yv: yv-n
    - type: text
      text: and the finest of wine.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And on this mountain, he will destroy the shroud
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the face of the shroud.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wrapped around all the people, the veil spread over all nations.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'It is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gloom of
    - type: text
      text: ' death!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The gloom of death is like a shroud over every life. The curse of death is defeated in Christ so that all may come to the rich, joyous feast of the Lord. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:54–56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will swallow it up in victory forever!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: netsach
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean “victory” or “forever.” This translation includes both concepts.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Netsach
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comes from a root word that means “to glitter from afar” or “to excel.” Jesus’ death, burial, resurrection, and ascension have brought an endless victory, an endless life, and the conquest of every enemy. Now Christ waits for his sons and daughters to arise and become the second witness to his eternal victory. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:19–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 2:6–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And God, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', will wipe away'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every tear from every face.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 21:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will remove every trace of disgrace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that his people have suffered throughout the world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has promised it!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In that day they will say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold! This is our God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We’ve waited '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qavah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (the root word for “rope”) means “to wait” or “to entwine.” Waiting on God means binding and connecting our hearts to who God is and to his promises. The Hebrew concept of waiting on the Lord is never a passive thing but an active one, full of expectation.
      marker-yv: yv-n
    - type: text
      text: for him, and he saved us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This one, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: —he is worth the wait!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “we waited for him!”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will keep shouting with joy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as we find our bliss in his salvation-kiss!”
