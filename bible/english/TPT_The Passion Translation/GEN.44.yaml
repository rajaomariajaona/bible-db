document_id: GEN.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Tests His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph ordered his chief servant, “Fill the men’s sacks with grain, with as much as they can hold, and put each one’s money back in the mouth of his bag. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As for the youngest one, place my silver goblet in the mouth of his sack, along with the money he paid for his grain.” And he did as Joseph said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'At dawn, the men loaded their donkeys and set off for home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They hadn’t gone far outside of the city when Joseph said to his chief servant, “Now, go at once and pursue the men! And when you catch up to them, say to them, ‘Why did you repay good with evil? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Why have you stolen the silver goblet
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint and Vulgate and implied in the Hebrew.
    marker-yv: yv-n
  - type: text
    text: 'from which my master drinks, and the one he uses to discover secrets hidden from men? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “for divination.” Some historians tell that water was poured into a certain vessel, and then pieces of gold, silver, or precious stones were added, and then, by the shape of the designs that appeared at the surface of the water, the diviner could interpret events. Joseph did not say that he used the goblet for divination but wanted his brothers to think he did.
    marker-yv: yv-n
  - type: text
    text: You have done an evil thing!’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the chief servant caught up with them, he repeated his master’s words to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They answered him, “Why does my lord accuse us of such things? Far be it from your servants to do anything of the kind! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Didn’t we return from Canaan with the money we found in our grain sacks? Why then would we steal silver or gold from the house of your lord? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Look for yourself. If any of your servants is found to have it, then he will die, and the rest of us will become your master’s slaves!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Very well then,” Joseph’s servant replied, “as you have said. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: But I will show you leniency
  - type: text
    text: . The one who has it will be my slave, but the rest of you will go free.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Each one quickly lowered his bag to the ground and opened it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the chief servant searched each bag, beginning with oldest and ending with the youngest—and he found the silver goblet in Benjamin’s bag! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: They had not stolen Joseph’s silver goblet, but they had stolen Joseph’s dignity and threw him into a pit. They were responsible for all of Joseph’s afflictions. God was seeking to reveal their hearts through how they endured this false accusation. Joseph’s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: silver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: goblet, hidden in Benjamin’s bag, was a picture of the years of suffering Joseph went through as a slave sold for “silver.” Joseph was testing their loyalty. Would they stand with Benjamin and love him, or would they sacrifice Benjamin as they had Joseph? Would they be loyal brothers now? Joseph gave them a chance to do away with Benjamin as they had done away with him.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aghast
  - type: text
    text: ', the brothers ripped their clothes in despair. They all loaded their donkeys again and returned to the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joseph was waiting in his house when Judah and his brothers arrived. When they saw Joseph, they all fell to the ground before him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the third time, Joseph’s brothers bowed before him. What a sight for Joseph to see them all return. He had to know if they had really changed. Joseph was truly doing them a kindness. He was giving them a chance to pass a test they once had failed! Their guilt could be removed not only by the mercy of Joseph but also by proving their “repentance by a changed life” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 3:8
      metadata:
        usfm: MAT.3.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Joseph said to them, “What have you done? Don’t you know that divination would have given insight to a man like me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Judah replied, “What can we say, my lord? How can we plead our case? How can we prove our innocence? God has revealed the guilt of your servants, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Their long-suppressed feelings of guilt surfaced. God was awakening their consciences to what they had done to Joseph.
    marker-yv: yv-n
  - type: text
    text: and here we are—our lord’s slaves, both we and the one in whose sack the silver goblet was found.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “No,” Joseph commanded. “Only the one who stole my silver goblet will be my slave; the rest of you will go on home in peace to your father.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah Pleads for Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Judah stepped forward and offered, “My lord, please, may I have a word with you? You are the equal of Pharaoh. Please don’t be angry with me, your servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My lord asked his servants, ‘Do you have a father or another brother?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We answered my lord, ‘We have an aged father and our youngest brother, who is a child of his old age. The child’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: full
  - type: text
    text: ' brother is dead, so now he is the only child left of his mother, and his father loves him very much.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then you said to your servants, ‘Bring him here to me so that I might see him myself.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'We said to my lord, ‘But he cannot leave his father; if he were to leave him, his father would die.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then you said to your servants, ‘You will not see my face again if I do not see your youngest brother.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When we arrived home to your servant, my father, we told him every word you had spoken to us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Sometime later, our father said to us, ‘Go back and buy some more food for us.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'We answered, ‘We can only return to Egypt if we take our youngest brother with us. We won’t see the man’s face again, if he doesn’t see our youngest brother.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then, your servant, my father, said to us, ‘You know that my wife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rachel
  - type: text
    text: ' only gave me two sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'One is gone from me—torn by a beast! I haven’t seen him since. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: If you take this one also from me, and something happens to him, you will send my gray hairs in grief down to the grave.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah continued
  - type: text
    text: ', “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: My lord
  - type: text
    text: ', if I went to your servant, my father, without the boy, and he saw that the boy was not with us, he would die! His very life is wrapped up with the life of the boy. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:30–31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As father and son, the souls of Jacob and Benjamin were bound together in the bundle of life.
    marker-yv: yv-n
  - type: text
    text: 'Now he is so old that the grief of his loss would kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Furthermore, I, your servant, have guaranteed the boy’s safety to my father. I told him, ‘If I don’t return the boy back to you, I will bear the blame before you, my father, for the rest of my life!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: '“So, please let me take the place of the boy, and I will remain here as a slave to you, my lord. Please let the boy go back with his brothers. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:33–34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As Judah spoke for his brothers, he did not attempt to justify himself or pass the blame off onto Benjamin. Unlike in the past, they did not turn on Benjamin as they had turned on Joseph. Judah stood as a savior for his brother. He had changed greatly from the one who conspired to sell his brother into slavery (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 37:26–27
      metadata:
        usfm: GEN.37.26+GEN.37.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and now offered himself to be a slave as a substitute for his brother Benjamin. Jewish historians note that for many long years after this event, the tribe of Benjamin walked in faithful love toward the tribe of Judah even when the other ten tribes deserted them.
    marker-yv: yv-n
  - type: text
    text: How could I return to my father without the boy? I don’t want to witness the woe and grief that would overtake my father.”
