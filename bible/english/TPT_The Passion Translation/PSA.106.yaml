document_id: PSA.106,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God Is Good
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hallelujah! Praise the Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone thank God, for he is good and easy to please.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your tender love for us, Lord, continues on forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You freed them from the strong power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of those who oppressed them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rescued them from bondage.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then the waters rushed over their enemies and drowned them all—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not one survived.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Seeing this, the people believed your words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they all broke out with songs of praise!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet how quickly they forgot your miracles of power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wouldn’t wait for you to act when they were hungry,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: but demanded you satisfy their cravings and give them food!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tested you to the breaking point.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So you gave them what they wanted to eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but their souls starved away to nothing.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They became envious of Moses and Aaron, your holy ones.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You split open the earth, and it swallowed up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dathan and Abiram along with their followers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fire fell from heaven and burnt up all the band of rebels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: turning them to ashes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They made an idol of a calf at Sinai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bowed to worship their man-made statue.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Who could ever fully describe your glorious miracles?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', who could ever praise you enough?'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They preferred the image of a grass-eating ox
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the presence of the glory-filled God.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: They totally forgot it was you who saved them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by the wonders and awesome miracles you worked in Egypt.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So you decided to destroy them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Moses, your chosen leader,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stood in the gap between you and the people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made intercession on their behalf
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to turn away your wrath from killing them all.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Yet they still didn’t believe your words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they despised the land of delight you gave to them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They grumbled and found fault with everything
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and closed their hearts to your voice.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: So you solemnly swore to them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that they would all die in the desert.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And you scattered their children to distant lands to die as exiles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then our fathers joined the worshipers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the false god named “Lord of the Pit.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They even ate the sacrifices offered to the dead!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: All they did made you burn with anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It made you so angry that a plague broke out among them!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The happiest one on earth is the one who keeps your word
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and clings to righteousness every moment.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: It continued until Phineas intervened and executed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the guilty for causing judgment to fall upon them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 106:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is implicit information found in the story of Phineas (
      - type: text
        text: Num. 25:7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Because of this deed of righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Phineas will be remembered forever.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Your people also provoked you to wrath
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the stream called Strife.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 106:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Meribah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the Hebrew word for “strife” ('
      - type: text
        text: Num. 20:1–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is where Moses got into serious trouble!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Because the people were rebellious against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moses exploded in anger and spoke to them out of his bitterness.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Neither did our fathers destroy the enemies in the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you had commanded them.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: But they mingled themselves with their enemies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and learned to copy their works of darkness.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: They began to serve their gods and bow before their idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of this led them away from you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and brought about their downfall.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: They even sacrificed their little children to the demon spirits,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-39
    - type: text
      text: shedding the innocent blood of their sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These dark practices greatly defiled the land and their own souls,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: through the murder and bloodshed of their own babies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their sins made them spiritual adulterers before you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So remember me, Lord, as you take joy in your people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when you come to bring the blessings of salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: don’t forget me!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: This is why you were furious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As your anger burned hot against them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you couldn’t even stand to look
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at your very own people any longer!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: So you turned them over to the crushing hands of other nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who hated them became tyrants over them.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Oppressive enemies subdued them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ruling over them with their tyranny.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Many times you would have come to rescue them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they continued in their rebellious ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: choosing to ignore your warnings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they sank lower and lower, destroyed by their depravity.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-45
    - type: text
      text: Yet even so, you waited and waited,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: watching to see if they would turn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and cry out to you for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a father’s
    - type: text
      text: ' help.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then, when you heard their cry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you relented and you remembered your covenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you turned your heart toward them again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: according to your abundant, overflowing, and limitless love.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Then you caused even their oppressors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to pity them and show them compassion.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Do it again, Lord! Save us, O Lord, our God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather us from our exile and unite us together
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that we will give our great and joyous thanks to you again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bring you glory by our praises.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Blessed be our Lord God forever and ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let everyone everywhere say, “Hallelujah!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen! Faithful is our King!
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Book 5
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: The Deuteronomy Psalms
    marker-yv: yv-h
  - type: usfm
    marker: ms3
    children:
    - type: text
      text: Psalms of praise and the Word
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Let me share in the wealth and beauty of all your devoted lovers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rejoice with your nation in all their joys,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let me share in the glory you give to your chosen ones.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We have all sinned so much, just like our fathers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Guilty” is written over our lives.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our fathers who were delivered from Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: didn’t fully understand your wonders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they took you for granted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over and over you showed them such tender love and mercy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they were barely beyond the Red Sea
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they rebelled against you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nonetheless, you saved them more than once
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so they would know how powerful you are,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: showing them the honor of your name.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You roared over the waters of the Red Sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making a dry path for your people to cross through.
