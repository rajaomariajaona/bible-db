document_id: PSA.106,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Is Good
  - type: text
    content: Hallelujah! Praise the Lord!
  - type: text
    content: Everyone thank God, for he is good and easy to please.
  - type: text
    content: Your tender love for us, Lord, continues on forever.
  '10':
  - type: text
    content: You freed them from the strong power
  - type: text
    content: of those who oppressed them
  - type: text
    content: and rescued them from bondage.
  '11':
  - type: text
    content: Then the waters rushed over their enemies and drowned them all—
  - type: text
    content: not one survived.
  '12':
  - type: text
    content: Seeing this, the people believed your words,
  - type: text
    content: and they all broke out with songs of praise!
  '13':
  - type: text
    content: Yet how quickly they forgot your miracles of power.
  - type: text
    content: They wouldn’t wait for you to act when they were hungry,
  '14':
  - type: text
    content: but demanded you satisfy their cravings and give them food!
  - type: text
    content: They tested you to the breaking point.
  '15':
  - type: text
    content: So you gave them what they wanted to eat,
  - type: text
    content: but their souls starved away to nothing.
  '16':
  - type: text
    content: They became envious of Moses and Aaron, your holy ones.
  '17':
  - type: text
    content: You split open the earth, and it swallowed up
  - type: text
    content: Dathan and Abiram along with their followers.
  '18':
  - type: text
    content: Fire fell from heaven and burnt up all the band of rebels,
  - type: text
    content: turning them to ashes.
  '19':
  - type: text
    content: They made an idol of a calf at Sinai
  - type: text
    content: and bowed to worship their man-made statue.
  '2':
  - type: text
    content: Who could ever fully describe your glorious miracles?
  - type: text
    content: Yahweh
  - type: text
    content: ', who could ever praise you enough?'
  '20':
  - type: text
    content: They preferred the image of a grass-eating ox
  - type: text
    content: to the presence of the glory-filled God.
  '21':
  - type: text
    content: They totally forgot it was you who saved them
  - type: text
    content: by the wonders and awesome miracles you worked in Egypt.
  '23':
  - type: text
    content: So you decided to destroy them.
  - type: text
    content: But Moses, your chosen leader,
  - type: text
    content: stood in the gap between you and the people
  - type: text
    content: and made intercession on their behalf
  - type: text
    content: to turn away your wrath from killing them all.
  '24':
  - type: text
    content: Yet they still didn’t believe your words
  - type: text
    content: and they despised the land of delight you gave to them.
  '25':
  - type: text
    content: They grumbled and found fault with everything
  - type: text
    content: and closed their hearts to your voice.
  '26':
  - type: text
    content: So you solemnly swore to them
  - type: text
    content: that they would all die in the desert.
  '27':
  - type: text
    content: And you scattered their children to distant lands to die as exiles.
  '28':
  - type: text
    content: Then our fathers joined the worshipers
  - type: text
    content: of the false god named “Lord of the Pit.”
  - type: text
    content: They even ate the sacrifices offered to the dead!
  '29':
  - type: text
    content: All they did made you burn with anger.
  - type: text
    content: It made you so angry that a plague broke out among them!
  '3':
  - type: text
    content: The happiest one on earth is the one who keeps your word
  - type: text
    content: and clings to righteousness every moment.
  '30':
  - type: text
    content: It continued until Phineas intervened and executed
  - type: text
    content: the guilty for causing judgment to fall upon them.
  - type: note
    content: This is implicit information found in the story of Phineas (Num. 25:7–9).
  '31':
  - type: text
    content: Because of this deed of righteousness
  - type: text
    content: Phineas will be remembered forever.
  '32':
  - type: text
    content: Your people also provoked you to wrath
  - type: text
    content: at the stream called Strife.
  - type: note
    content: The word used here is Meribah, the Hebrew word for “strife” (Num. 20:1–13).
  - type: text
    content: This is where Moses got into serious trouble!
  '33':
  - type: text
    content: Because the people were rebellious against you,
  - type: text
    content: Moses exploded in anger and spoke to them out of his bitterness.
  '34':
  - type: text
    content: Neither did our fathers destroy the enemies in the land,
  - type: text
    content: as you had commanded them.
  '35':
  - type: text
    content: But they mingled themselves with their enemies
  - type: text
    content: and learned to copy their works of darkness.
  '36':
  - type: text
    content: They began to serve their gods and bow before their idols.
  - type: text
    content: All of this led them away from you
  - type: text
    content: and brought about their downfall.
  '37':
  - type: text
    content: They even sacrificed their little children to the demon spirits,
  '38':
  - type: text
    content: shedding the innocent blood of their sons and daughters.
  - type: text
    content: These dark practices greatly defiled the land and their own souls,
  - type: text
    content: through the murder and bloodshed of their own babies!
  - type: text
    content: Their sins made them spiritual adulterers before you.
  '4':
  - type: text
    content: So remember me, Lord, as you take joy in your people.
  - type: text
    content: And when you come to bring the blessings of salvation,
  - type: text
    content: don’t forget me!
  '40':
  - type: text
    content: This is why you were furious.
  - type: text
    content: As your anger burned hot against them,
  - type: text
    content: you couldn’t even stand to look
  - type: text
    content: at your very own people any longer!
  '41':
  - type: text
    content: So you turned them over to the crushing hands of other nations,
  - type: text
    content: and those who hated them became tyrants over them.
  '42':
  - type: text
    content: Oppressive enemies subdued them,
  - type: text
    content: ruling over them with their tyranny.
  '43':
  - type: text
    content: Many times you would have come to rescue them,
  - type: text
    content: but they continued in their rebellious ways,
  - type: text
    content: choosing to ignore your warnings.
  - type: text
    content: Then they sank lower and lower, destroyed by their depravity.
  '44':
  - type: text
    content: Yet even so, you waited and waited,
  - type: text
    content: watching to see if they would turn
  - type: text
    content: 'and cry out to you for '
  - type: text
    content: a father’s
  - type: text
    content: ' help.'
  - type: text
    content: And then, when you heard their cry,
  - type: text
    content: you relented and you remembered your covenant,
  - type: text
    content: and you turned your heart toward them again,
  - type: text
    content: according to your abundant, overflowing, and limitless love.
  '46':
  - type: text
    content: Then you caused even their oppressors
  - type: text
    content: to pity them and show them compassion.
  '47':
  - type: text
    content: Do it again, Lord! Save us, O Lord, our God!
  - type: text
    content: Gather us from our exile and unite us together
  - type: text
    content: so that we will give our great and joyous thanks to you again
  - type: text
    content: and bring you glory by our praises.
  '48':
  - type: text
    content: Blessed be our Lord God forever and ever.
  - type: text
    content: And let everyone everywhere say, “Hallelujah!”
  - type: text
    content: Amen! Faithful is our King!
  - type: heading
    content: Book 5
  - type: heading
    content: The Deuteronomy Psalms
  - type: heading
    content: Psalms of praise and the Word
  '5':
  - type: text
    content: Let me share in the wealth and beauty of all your devoted lovers,
  - type: text
    content: rejoice with your nation in all their joys,
  - type: text
    content: and let me share in the glory you give to your chosen ones.
  '6':
  - type: text
    content: We have all sinned so much, just like our fathers.
  - type: text
    content: “Guilty” is written over our lives.
  '7':
  - type: text
    content: Our fathers who were delivered from Egypt
  - type: text
    content: didn’t fully understand your wonders,
  - type: text
    content: and they took you for granted.
  - type: text
    content: Over and over you showed them such tender love and mercy!
  - type: text
    content: Yet they were barely beyond the Red Sea
  - type: text
    content: when they rebelled against you.
  '8':
  - type: text
    content: Nonetheless, you saved them more than once
  - type: text
    content: so they would know how powerful you are,
  - type: text
    content: showing them the honor of your name.
  '9':
  - type: text
    content: You roared over the waters of the Red Sea,
  - type: text
    content: making a dry path for your people to cross through.
