document_id: LUK.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and Zacchaeus
  - type: text
    content: On his way to Jerusalem
  - type: text
    content: ', Jesus had to pass through Jericho. '
  '10':
  - type: text
    content: The Son of Man has come to seek out and to give life to those who are lost.”
  - type: note
    content: This is a quotation taken from Ezek. 34:16. Notice that Jesus describes himself as both “life” and “Son of Man.” He is both divine and human.
  - type: heading
    content: The Parable of a Prince and His Servants
  '11':
  - type: text
    content: 'At this time Jesus was getting close to entering Jerusalem. The crowds that followed him were convinced that God’s kingdom would fully manifest when Jesus established it in Jerusalem. '
  '12':
  - type: text
    content: 'So he told them this story to change their perspective:'
  - type: text
    content: “Once a wealthy prince left his province to travel to a distant land, where he would be crowned king and then return.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Before he departed he summoned his ten servants together and charged them, ‘I am entrusting each of you with fifty thousand dollars
  - type: text
    content: ' '
  - type: note
    content: Literally “ten minas.”
  - type: text
    content: to invest while I am away. Trade with it and put the money to work until I return.’
  '14':
  - type: text
    content: “Some of his countrymen despised the prince and sent a delegation after him to declare before the royals, ‘We refuse to let this man rule over us! He will not be our king!’
  '15':
  - type: text
    content: “Nevertheless, he was crowned king and returned to his land. Then he summoned his ten servants to see how much each one had earned and what their profits came to.
  '16':
  - type: text
    content: “The first one came forward and said, ‘Master, I took what you gave me and invested it, and it multiplied ten times.’
  '17':
  - type: text
    content: “ ‘Splendid! You have done well, my excellent servant. Because you have shown that I can trust you in this small matter, I now grant you authority to rule over ten cities.’
  '18':
  - type: text
    content: “The second came and said, ‘Master, what you left with me has multiplied five times.’
  '19':
  - type: text
    content: “His master said, ‘I also grant you authority in my kingdom over five cities.’
  '2':
  - type: text
    content: 'There lived a very wealthy man named Zacchaeus, '
  - type: note
    content: The name Zacchaeus means “pure.”
  - type: text
    content: 'who supervised all the tax collectors. '
  '20':
  - type: text
    content: “Another came before the king and said, ‘Master, here is the money you entrusted to me. I hid it for safekeeping.
  - type: text
    content: ' '
  '21':
  - type: text
    content: You see, I live in fear of you, for everyone knows you are a strict master and impossible to please. You push us for a high return on all that you own, and you always want to gain from someone else’s efforts.’
  - type: note
    content: The text is literally “You pick up what you didn’t lay down and reap where you didn’t sow.” This statement is obviously not true. The opposite can be found in how the master shared his kingdom with the other more faithful servants. Today, many likewise have a misconception of the true heart of our Master. Our Master makes servants into rulers.
  '22':
  - type: text
    content: “The king said, ‘You wicked servant! I will judge you using your own words. If what you said about me is true, that I am a harsh man, pushing you for a high return and wanting gain from others’ efforts,
  - type: text
    content: ' '
  '23':
  - type: text
    content: why didn’t you at least put my money in the bank
  - type: text
    content: ' '
  - type: note
    content: The text is literally “upon a table,” a metaphor for where banking transactions took place.
  - type: text
    content: to earn some interest on it?’
  '24':
  - type: text
    content: “The king said to his other servants, ‘Take the money he has and give it to the faithful servant who multiplied my money ten times over.’
  '25':
  - type: text
    content: “ ‘But master,’ the other servants objected, ‘why give it to him? He already has so much!’
  '26':
  - type: text
    content: “ ‘Yes,’ replied the king. ‘But to all who have been faithful, I will give even more to them. And for the ones who have nothing, even the little they seem to have I will take from them.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Now, bring all those rebellious enemies of mine who rejected me as their king—bring them here before me and execute them!’ ”
  - type: heading
    content: Jesus’ Final Approach to Jerusalem
  '28':
  - type: text
    content: 'After saying all of this, Jesus headed straight for Jerusalem. '
  '29':
  - type: text
    content: 'When he arrived at the stables of Annia '
  - type: note
    content: The Greek text includes two small villages, Bethphage and Bethany. The meaning of the names combined means “the stables of Annia.” This is how it is translated in the Aramaic.
  - type: text
    content: 'near the Mount of Olives, '
  - type: note
    content: The Mount of Olives is a large hill less than two miles from Jerusalem and about one hundred feet higher.
  - type: text
    content: 'he sent two of his disciples ahead, saying, '
  '3':
  - type: text
    content: 'He was very eager to see Jesus and kept trying to get a look at him through the massive crowd. Since Zacchaeus was a short man and couldn’t see over the heads of the people, '
  '30':
  - type: text
    content: “When you enter the next village,
  - type: text
    content: ' '
  - type: note
    content: Literally “across the valley.”
  - type: text
    content: you will find tethered there a donkey’s young colt that has never been ridden. Untie it and bring it to me.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And if anyone stops you and asks, ‘What are you doing?’ just tell them this: ‘It is needed for the Lord.’ ”'
  - type: note
    content: The Lord Jesus created all things and therefore owns it all.
  '32':
  - type: text
    content: 'The two disciples entered the village and found the colt exactly like Jesus had said. '
  '33':
  - type: text
    content: While they were untying it, the owners confronted them and asked, “What are you doing?”
  '34':
  - type: text
    content: The disciples replied, “We need this donkey for the Lord.”
  '35':
  - type: text
    content: 'After they brought the colt to Jesus, they placed their prayer shawls on its back, and Jesus rode it as he descended the Mount of Olives toward Jerusalem. '
  - type: note
    content: See Zech. 9:9.
  - type: text
    content: As he rode toward the city, people spontaneously threw their prayer shawls like a carpet on the path in front of him.
  - type: note
    content: This was done to signify Jesus was King. See 2 Kings 9:13. This is an obvious reference to the coming of the promised Messiah.
  '37':
  - type: text
    content: 'As soon as he got to the bottom of the Mount of Olives, the crowd of his followers shouted with a loud outburst of ecstatic joy over all the mighty wonders of power they had witnessed. '
  '38':
  - type: text
    content: 'They shouted over and over, “Highest praises to God for the one who comes as King in the name of the Lord! Heaven’s peace and glory from the highest realm '
  - type: text
    content: now comes to us
  - type: text
    content: '!”'
  - type: note
    content: This is a quotation of Ps. 118:26.
  '39':
  - type: text
    content: Some Jewish religious leaders who stood off from the procession said to Jesus, “Teacher, order your followers at once to stop saying these things!”
  '4':
  - type: text
    content: 'he ran on ahead of everyone and climbed up a blossoming fig tree '
  - type: note
    content: This was a sturdy sycamore-fig tree that was known to reach over forty feet high. The Aramaic text calls it a “tree in bloom.”
  - type: text
    content: to get a glimpse of Jesus as he passed by.
  '40':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Listen to me. If my followers were silenced, the very stones would break forth with praises!”
  - type: heading
    content: Jesus Weeps over Jerusalem
  '41':
  - type: text
    content: 'When Jesus caught sight of the city, he burst into tears with uncontrollable weeping over Jerusalem, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: “If only you could recognize that this day peace is within your reach! But you cannot see it.
  - type: text
    content: ' '
  '43':
  - type: text
    content: For the day is soon coming when your enemies will surround you, hem you in on every side, and lay siege to you.
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic. The Greek text states, “They will throw up ramparts.” See Isa. 29:3; Jer. 6:6; Ezek. 4:2. Jesus was the only one weeping while everyone else was rejoicing.
  '44':
  - type: text
    content: They will crush you to pieces, and your children too! And they will leave your city totally destroyed. Since you would not recognize God’s day of visitation, you will see your day of devastation!”
  - type: heading
    content: Jesus Cleanses the Temple Courts
  '45':
  - type: text
    content: 'Jesus entered the temple area and forcibly threw out all the merchants from their stalls. '
  '46':
  - type: text
    content: 'He rebuked them, saying, '
  - type: text
    content: “The Scriptures declare, ‘My Father’s house is to be filled with prayer—a house of prayer,
  - type: text
    content: ' '
  - type: note
    content: See Isa. 56:7; Jer. 7:11.
  - type: text
    content: not a cave of bandits!’ ”
  '47':
  - type: text
    content: 'From then on Jesus continued teaching in the temple area, but the high priests, the experts of the law, and the prominent men of the city kept trying to find a strategy to accuse Jesus, for they wanted him dead. '
  '48':
  - type: text
    content: They could find no reason to accuse him, for he was a hero to the people and the crowds were awestruck by every word he spoke.
  '5':
  - type: text
    content: 'When Jesus got to that place, he looked up into the tree and said, '
  - type: text
    content: “Zacchaeus, hurry on down, for I must
  - type: text
    content: ' '
  - type: note
    content: Although they had never met, Jesus knew Zacchaeus’ name. This was a “word of revelation knowledge (1 Cor. 12:8).” The Aramaic text states, “It is my duty to stay at your house.” It is likely that Jesus spent the night in Zacchaeus’ home.
  - type: text
    content: stay at your house today!”
  '6':
  - type: text
    content: So he scurried down the tree and found himself face-to-face with Jesus.
  '7':
  - type: text
    content: 'As Jesus left to go with Zacchaeus, many in the crowd complained, “Look at this! Of all the people to have dinner '
  - type: note
    content: The Aramaic states “dinner after the fast.”
  - type: text
    content: with, he’s going to eat in the house of a crook.”
  '8':
  - type: text
    content: 'Zacchaeus was amazed over his gracious visit to his home and joyously welcomed Jesus. '
  - type: note
    content: This is supplied from v. 6, stated here for the sake of the narrative.
  - type: text
    content: Zacchaeus stood in front of the Lord and said, “Half of all that I own I will give to the poor. And Lord, if I have cheated anyone, I promise to pay them back four times as much as I stole.”
  - type: note
    content: Jewish laws for restitution required repayment of a multiple of what was stolen. See 2 Sam. 12:6, where King David decrees a fourfold restitution.
  '9':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Your repentance shows that today life
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek text is “salvation.” Notice that Jesus describes himself as both “life” and “Son of Man.” He is both divine and human.
  - type: text
    content: has come to you and your household, and that you are a true son of Abraham.
  - type: text
    content: ' '
