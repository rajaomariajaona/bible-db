document_id: LUK.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and Zacchaeus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: it
    children:
    - type: text
      text: On his way to Jerusalem
  - type: text
    text: ', Jesus had to pass through Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There lived a very wealthy man named Zacchaeus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Zacchaeus means “pure.”
    marker-yv: yv-n
  - type: text
    text: 'who supervised all the tax collectors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He was very eager to see Jesus and kept trying to get a look at him through the massive crowd. Since Zacchaeus was a short man and couldn’t see over the heads of the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'he ran on ahead of everyone and climbed up a blossoming fig tree '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a sturdy sycamore-fig tree that was known to reach over forty feet high. The Aramaic text calls it a “tree in bloom.”
    marker-yv: yv-n
  - type: text
    text: to get a glimpse of Jesus as he passed by.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus got to that place, he looked up into the tree and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Zacchaeus, hurry on down, for I must
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although they had never met, Jesus knew Zacchaeus’ name. This was a “word of revelation knowledge (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 12:8
      metadata:
        usfm: 1CO.12.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).” The Aramaic text states, “It is my duty to stay at your house.” It is likely that Jesus spent the night in Zacchaeus’ home.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: stay at your house today!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So he scurried down the tree and found himself face-to-face with Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As Jesus left to go with Zacchaeus, many in the crowd complained, “Look at this! Of all the people to have dinner '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic states “dinner after the fast.”
    marker-yv: yv-n
  - type: text
    text: with, he’s going to eat in the house of a crook.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Zacchaeus was amazed over his gracious visit to his home and joyously welcomed Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is supplied from v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: LUK.19.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', stated here for the sake of the narrative.'
    marker-yv: yv-n
  - type: text
    text: Zacchaeus stood in front of the Lord and said, “Half of all that I own I will give to the poor. And Lord, if I have cheated anyone, I promise to pay them back four times as much as I stole.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jewish laws for restitution required repayment of a multiple of what was stolen. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', where King David decrees a fourfold restitution.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your repentance shows that today life
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text is “salvation.” Notice that Jesus describes himself as both “life” and “Son of Man.” He is both divine and human.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has come to you and your household, and that you are a true son of Abraham.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of Man has come to seek out and to give life to those who are lost.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a quotation taken from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 34:16
      metadata:
        usfm: EZK.34.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Notice that Jesus describes himself as both “life” and “Son of Man.” He is both divine and human.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of a Prince and His Servants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At this time Jesus was getting close to entering Jerusalem. The crowds that followed him were convinced that God’s kingdom would fully manifest when Jesus established it in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So he told them this story to change their perspective:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Once a wealthy prince left his province to travel to a distant land, where he would be crowned king and then return.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Before he departed he summoned his ten servants together and charged them, ‘I am entrusting each of you with fifty thousand dollars
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “ten minas.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to invest while I am away. Trade with it and put the money to work until I return.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Some of his countrymen despised the prince and sent a delegation after him to declare before the royals, ‘We refuse to let this man rule over us! He will not be our king!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Nevertheless, he was crowned king and returned to his land. Then he summoned his ten servants to see how much each one had earned and what their profits came to.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The first one came forward and said, ‘Master, I took what you gave me and invested it, and it multiplied ten times.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘Splendid! You have done well, my excellent servant. Because you have shown that I can trust you in this small matter, I now grant you authority to rule over ten cities.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The second came and said, ‘Master, what you left with me has multiplied five times.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “His master said, ‘I also grant you authority in my kingdom over five cities.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Another came before the king and said, ‘Master, here is the money you entrusted to me. I hid it for safekeeping.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You see, I live in fear of you, for everyone knows you are a strict master and impossible to please. You push us for a high return on all that you own, and you always want to gain from someone else’s efforts.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The text is literally “You pick up what you didn’t lay down and reap where you didn’t sow.” This statement is obviously not true. The opposite can be found in how the master shared his kingdom with the other more faithful servants. Today, many likewise have a misconception of the true heart of our Master. Our Master makes servants into rulers.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The king said, ‘You wicked servant! I will judge you using your own words. If what you said about me is true, that I am a harsh man, pushing you for a high return and wanting gain from others’ efforts,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: why didn’t you at least put my money in the bank
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The text is literally “upon a table,” a metaphor for where banking transactions took place.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to earn some interest on it?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The king said to his other servants, ‘Take the money he has and give it to the faithful servant who multiplied my money ten times over.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘But master,’ the other servants objected, ‘why give it to him? He already has so much!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘Yes,’ replied the king. ‘But to all who have been faithful, I will give even more to them. And for the ones who have nothing, even the little they seem to have I will take from them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now, bring all those rebellious enemies of mine who rejected me as their king—bring them here before me and execute them!’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Final Approach to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'After saying all of this, Jesus headed straight for Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When he arrived at the stables of Annia '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text includes two small villages, Bethphage and Bethany. The meaning of the names combined means “the stables of Annia.” This is how it is translated in the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'near the Mount of Olives, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Mount of Olives is a large hill less than two miles from Jerusalem and about one hundred feet higher.
    marker-yv: yv-n
  - type: text
    text: 'he sent two of his disciples ahead, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When you enter the next village,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “across the valley.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will find tethered there a donkey’s young colt that has never been ridden. Untie it and bring it to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if anyone stops you and asks, ‘What are you doing?’ just tell them this: ‘It is needed for the Lord.’ ”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Lord Jesus created all things and therefore owns it all.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The two disciples entered the village and found the colt exactly like Jesus had said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: While they were untying it, the owners confronted them and asked, “What are you doing?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The disciples replied, “We need this donkey for the Lord.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: 'After they brought the colt to Jesus, they placed their prayer shawls on its back, and Jesus rode it as he descended the Mount of Olives toward Jerusalem. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:35–36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 9:9
      metadata:
        usfm: ZEC.9.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: As he rode toward the city, people spontaneously threw their prayer shawls like a carpet on the path in front of him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:35–36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was done to signify Jesus was King. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This is an obvious reference to the coming of the promised Messiah.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'As soon as he got to the bottom of the Mount of Olives, the crowd of his followers shouted with a loud outburst of ecstatic joy over all the mighty wonders of power they had witnessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'They shouted over and over, “Highest praises to God for the one who comes as King in the name of the Lord! Heaven’s peace and glory from the highest realm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: now comes to us
  - type: text
    text: '!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a quotation of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 118:26
      metadata:
        usfm: PSA.118.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Some Jewish religious leaders who stood off from the procession said to Jesus, “Teacher, order your followers at once to stop saying these things!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
