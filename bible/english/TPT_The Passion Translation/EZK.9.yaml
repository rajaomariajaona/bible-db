    - type: text
      text: The Slaughter of Those with No Mark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I heard the Lord shout loudly for me to hear, “Executioners, draw near! '
    - type: usfm
      marker: f
