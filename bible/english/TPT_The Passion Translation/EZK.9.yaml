      marker-yv: yv-n
    - type: text
      text: 'each one holding a deadly weapon. Also, I saw with them a man clothed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: white
    - type: text
      text: ' linen, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This man in linen was an angel, or messenger, and was the seventh man that Ezekiel saw. White linen is a frequent biblical symbol of righteousness.
      marker-yv: yv-n
    - type: text
      text: 'with a scribe’s case '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a writing kit that contained an inkhorn and pen.
      marker-yv: yv-n
    - type: text
      text: 'tied to his belt. They came and stood in front of the bronze altar. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The bronze altar is the place of sacrifice. For believers today, it represents the cross of Christ.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the dazzling glory of the God of Israel rose from above the cherubim where it had been resting and moved toward the threshold of the temple. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The glory of the Lord had moved from its place over the cherubim-throne in the Holy of Holies to the threshold (or possibly outer gates) of the temple. God was reluctant to leave his throne in Jerusalem, waiting for the people to have a change of heart and repent.
      marker-yv: yv-n
    - type: text
      text: 'Then he called to the man dressed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: white
    - type: text
      text: ' linen with a scribe’s case at his side, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to him, “Go throughout Jerusalem, and place a mark '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tav,” the last letter of the Hebrew alphabet that in ancient Hebrew was shaped somewhat like “X,” the mark of a cross. Another possible meaning of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tav
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is “desire.”
      marker-yv: yv-n
    - type: text
      text: 'on the foreheads of all who grieve and are greatly distressed over all the disgusting things done in the city.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Those with discernment, the intercessors who agonized over Israel’s demise, were spared. The righteous were left behind (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 12:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 24:37–41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Their “foreheads” were marked, for their thoughts were turned toward God and his glory. Those with no “mark [cross]” on their foreheads (thoughts) were those walking in the mindset of man. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard him say to the other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: six
    - type: text
      text: ', “Follow the man in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: white
    - type: text
      text: ' linen through the city and strike down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: everyone with no mark on their forehead
    - type: text
      text: '—old men, young men, girls, children, women—kill them all. Show no mercy, not even one glance of pity. But do not touch anyone with a mark on his forehead. And begin at my sanctuary.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and first footnote.
      marker-yv: yv-n
    - type: text
      text: 'So, they began with those men in front of the temple and with the elders. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to the executioners, “Go make my temple unfit for worship. Fill its courtyard with corpses. Now get to work.” They departed and began to strike the people throughout the city.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were slaying, I was left alone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the temple
    - type: text
      text: '. I threw myself facedown on the ground and cried out, “Oh, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', are you really going to wipe out the remnant of Israel by venting your fury on Jerusalem?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered me, “The guilt of the people of Israel and Judah is enormous. The land is full of bloodshed, and Jerusalem full of perverted justice. They say, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' can’t see us! He has abandoned the nation.’ '
