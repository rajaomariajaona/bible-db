        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The executioners have drawn near.”
      marker-yv: yv-n
    - type: text
      text: 'Each bring your weapon of destruction!” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So, I no longer will show them any mercy nor give them one glance of pity. They hereby suffer the consequences of their own behavior.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then, the man dressed in '
    - type: usfm
      marker: it
