        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This upper gate was built by Jotham (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 15:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), also called the Benjamin Gate (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Benjamin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “Son of My Right Hand”; see
      - type: usfm
        marker: ft
        children:
