document_id: EZK.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Slaughter of Those with No Mark
  - type: text
    content: 'Then I heard the Lord shout loudly for me to hear, “Executioners, draw near! '
  - type: note
    content: Or “The executioners have drawn near.”
  - type: text
    content: 'Each bring your weapon of destruction!” '
  '10':
  - type: text
    content: So, I no longer will show them any mercy nor give them one glance of pity. They hereby suffer the consequences of their own behavior.”
  '11':
  - type: text
    content: 'Just then, the man dressed in '
  - type: text
    content: white
  - type: text
    content: ' linen with the scribe’s case came back and made his report: “'
  - type: text
    content: It is finished
  - type: text
    content: ; I have carried out your orders.”
  - type: note
    content: God is using symbolic and metaphorical language in the book of Ezekiel. The man clothed in linen is a picture of our Savior. The only one worthy of this task is our Lord Jesus Christ, and he is the one who places this mark or seal upon the heads of believers. See Dan. 10:5; Rev. 1:12–20. He is the one who fulfills the will of his Father (see John 5:19). We are marked or sealed with the Holy Spirit (see 2 Cor. 1:21–22; Eph. 1:13; 4:30; 2 Tim. 2:19; Rev. 7:3–4).
  '2':
  - type: text
    content: 'Immediately six men '
  - type: note
    content: That is, angels.
  - type: text
    content: 'advanced from the upper north gate, '
  - type: note
    content: This upper gate was built by Jotham (see 2 Kings 15:35), also called the Benjamin Gate (Benjamin means “Son of My Right Hand”; see Jer. 20:2) and was also known as the New Gate (the dawning of a new day; see Jer. 26:10; 36:10).
  - type: text
    content: 'each one holding a deadly weapon. Also, I saw with them a man clothed in '
  - type: text
    content: white
  - type: text
    content: ' linen, '
  - type: note
    content: This man in linen was an angel, or messenger, and was the seventh man that Ezekiel saw. White linen is a frequent biblical symbol of righteousness.
  - type: text
    content: 'with a scribe’s case '
  - type: note
    content: This was a writing kit that contained an inkhorn and pen.
  - type: text
    content: 'tied to his belt. They came and stood in front of the bronze altar. '
  - type: note
    content: The bronze altar is the place of sacrifice. For believers today, it represents the cross of Christ.
  '3':
  - type: text
    content: 'Then the dazzling glory of the God of Israel rose from above the cherubim where it had been resting and moved toward the threshold of the temple. '
  - type: note
    content: The glory of the Lord had moved from its place over the cherubim-throne in the Holy of Holies to the threshold (or possibly outer gates) of the temple. God was reluctant to leave his throne in Jerusalem, waiting for the people to have a change of heart and repent.
  - type: text
    content: 'Then he called to the man dressed in '
  - type: text
    content: white
  - type: text
    content: ' linen with a scribe’s case at his side, '
  '4':
  - type: text
    content: 'and '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to him, “Go throughout Jerusalem, and place a mark '
  - type: note
    content: Or “tav,” the last letter of the Hebrew alphabet that in ancient Hebrew was shaped somewhat like “X,” the mark of a cross. Another possible meaning of tav is “desire.”
  - type: text
    content: 'on the foreheads of all who grieve and are greatly distressed over all the disgusting things done in the city.” '
  - type: note
    content: Those with discernment, the intercessors who agonized over Israel’s demise, were spared. The righteous were left behind (see Ex. 12:22; Matt. 24:37–41). Their “foreheads” were marked, for their thoughts were turned toward God and his glory. Those with no “mark [cross]” on their foreheads (thoughts) were those walking in the mindset of man. See Rom. 8:7.
  '5':
  - type: text
    content: 'And I heard him say to the other '
  - type: text
    content: six
  - type: text
    content: ', “Follow the man in '
  - type: text
    content: white
  - type: text
    content: ' linen through the city and strike down '
  - type: text
    content: everyone with no mark on their forehead
  - type: text
    content: '—old men, young men, girls, children, women—kill them all. Show no mercy, not even one glance of pity. But do not touch anyone with a mark on his forehead. And begin at my sanctuary.” '
  - type: note
    content: See 1 Peter 4:18 and first footnote.
  - type: text
    content: 'So, they began with those men in front of the temple and with the elders. '
  '7':
  - type: text
    content: He said to the executioners, “Go make my temple unfit for worship. Fill its courtyard with corpses. Now get to work.” They departed and began to strike the people throughout the city.
  '8':
  - type: text
    content: 'While they were slaying, I was left alone '
  - type: text
    content: in the temple
  - type: text
    content: '. I threw myself facedown on the ground and cried out, “Oh, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', are you really going to wipe out the remnant of Israel by venting your fury on Jerusalem?”'
  '9':
  - type: text
    content: He answered me, “The guilt of the people of Israel and Judah is enormous. The land is full of bloodshed, and Jerusalem full of perverted justice. They say, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' can’t see us! He has abandoned the nation.’ '
