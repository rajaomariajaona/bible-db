          text: Jer. 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and was also known as the New Gate (the dawning of a new day; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
