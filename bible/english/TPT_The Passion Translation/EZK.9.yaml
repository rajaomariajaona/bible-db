          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God is using symbolic and metaphorical language in the book of Ezekiel. The man clothed in linen is a picture of our Savior. The only one worthy of this task is our Lord Jesus Christ, and he is the one who places this mark or seal upon the heads of believers. See
      - type: usfm
