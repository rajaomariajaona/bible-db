      - type: text
        text: white
    - type: text
      text: ' linen with the scribe’s case came back and made his report: “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is finished
    - type: text
      text: ; I have carried out your orders.”
    - type: usfm
