    - type: text
      text: ', your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was leading you the right way.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, then, would you now go down to Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to drink the waters of the Nile?
    - type: usfm
      marker: f
