          text: Isa. 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 55:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:37–39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 22:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The pleasure of God is to be the Source of Living Water within our innermost being. He longs to satisfy his chosen ones for their enjoyment. He wants to dispense himself into every part of our being until we are saturated and become his expression on the earth. To turn away from our Fountain to another source of life will take us to a dead end, and God calls it “sin.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and they have dug for themselves cisterns '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a contextual metaphor for worshiping false gods. Our true Spring of Living Water never fails us and is available for us to drink of him and find restoration. False gods are impotent and as useless as cracked, broken cisterns (see continuation of v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and the following footnote). Living waters flow from the throne of God; broken cisterns hold the waters of the world and are hewn by human hands.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cracked cisterns that hold no water.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancient agricultural societies needed to store rainwater to last through a prolonged dry season. A hewn-out rock cistern had to be lined with plaster in order to be waterproof. If the plaster were to crack, the water would seep out. The false gods that Israel pursued were nothing more than contaminated, broken cisterns, but
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was to Israel a never-failing Spring of Living Water.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Bitter Results of Unfaithfulness to God
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is Israel a slave? Was he born a slave?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, then, has he been seized like prey?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: His enemies
    - type: text
      text: ' have raged against him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: roaring like fierce lions.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The image of lions was associated with the Assyrians.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They leveled his cities, left them without inhabitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and devastated his land.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover, Egyptian armies will march from Memphis and Tahpanhes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Memphis was once the capital of Lower Egypt and the place where the kings of Egypt resided. Tahpanhes was a major city on the Nile delta on the caravan route to Israel and Mesopotamia.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will come and shave your head bald.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “crack your skull” or “graze your head.” Conquering armies shaved the heads of the men they conquered as a sign that they had been reduced to slavery.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel, you have no one to blame but yourselves!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
