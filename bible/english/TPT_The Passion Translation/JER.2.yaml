document_id: JER.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Love for Israel
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to me: '
  '10':
  - type: text
    content: '“Go off to the Greek islands '
  - type: note
    content: Or “the coastlines/islands of the Kittites [Cyprus],” a metonymy for the Greek isles.
  - type: text
    content: and investigate for yourselves.
  - type: text
    content: 'Take a close look at Kedar '
  - type: note
    content: Kedar was the region of desert nomads descended from Ishmael (see Gen. 25:13) in northern Arabia, situated in an easterly direction (see Jer. 49:28). Yahweh wanted Israel to send messengers to the west and to the east (everywhere) to see if any nation was forsaking their god to worship another god as Judah was doing.
  - type: text
    content: also
  - type: text
    content: and observe very carefully.
  - type: text
    content: 'Has there ever been anything '
  - type: text
    content: as disgusting
  - type: text
    content: ' as this?'
  '11':
  - type: text
    content: Has a nation ever traded in its gods
  - type: text
    content: (even though they are not really gods)?
  - type: text
    content: But my people have bartered away their glory
  - type: note
    content: The phrase “their glory” refers to God, who is their glory. Our only glory is God, who set his love upon us. See Hos. 4:7; Pss. 3:4; 4:2; 106:20; Rom. 1:22–23.
  - type: text
    content: in exchange for gods who do nothing.
  '12':
  - type: text
    content: Be appalled, O heavens, and cringe with fear!
  - type: text
    content: 'Be shocked '
  - type: note
    content: Or “shudder with fear” or “be terrified.” “Be shocked” comes from a verb that means “to have one’s hair stand on end.”
  - type: text
    content: 'and utterly devastated at this '
  - type: text
    content: betrayal
  - type: text
    content: '!'
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '13':
  - type: text
    content: '“My people are guilty of a double sin:'
  - type: text
    content: they have abandoned me, the Spring of Living Water,
  - type: note
    content: See Isa. 12:3; 55:1; John 4:13–14; 7:37–39; Rev. 22:17. The pleasure of God is to be the Source of Living Water within our innermost being. He longs to satisfy his chosen ones for their enjoyment. He wants to dispense himself into every part of our being until we are saturated and become his expression on the earth. To turn away from our Fountain to another source of life will take us to a dead end, and God calls it “sin.”
  - type: text
    content: 'and they have dug for themselves cisterns '
  - type: note
    content: That is, a contextual metaphor for worshiping false gods. Our true Spring of Living Water never fails us and is available for us to drink of him and find restoration. False gods are impotent and as useless as cracked, broken cisterns (see continuation of v. 13 and the following footnote). Living waters flow from the throne of God; broken cisterns hold the waters of the world and are hewn by human hands.
  - type: text
    content: —
  - type: text
    content: cracked cisterns that hold no water.”
  - type: note
    content: Ancient agricultural societies needed to store rainwater to last through a prolonged dry season. A hewn-out rock cistern had to be lined with plaster in order to be waterproof. If the plaster were to crack, the water would seep out. The false gods that Israel pursued were nothing more than contaminated, broken cisterns, but Yahweh was to Israel a never-failing Spring of Living Water.
  - type: heading
    content: The Bitter Results of Unfaithfulness to God
  '14':
  - type: text
    content: “Is Israel a slave? Was he born a slave?
  - type: text
    content: Why, then, has he been seized like prey?
  '15':
  - type: text
    content: His enemies
  - type: text
    content: ' have raged against him,'
  - type: text
    content: roaring like fierce lions.
  - type: note
    content: The image of lions was associated with the Assyrians.
  - type: text
    content: They leveled his cities, left them without inhabitants,
  - type: text
    content: and devastated his land.
  '16':
  - type: text
    content: Moreover, Egyptian armies will march from Memphis and Tahpanhes.
  - type: note
    content: Memphis was once the capital of Lower Egypt and the place where the kings of Egypt resided. Tahpanhes was a major city on the Nile delta on the caravan route to Israel and Mesopotamia.
  - type: text
    content: They will come and shave your head bald.
  - type: note
    content: Or “crack your skull” or “graze your head.” Conquering armies shaved the heads of the men they conquered as a sign that they had been reduced to slavery.
  '17':
  - type: text
    content: Israel, you have no one to blame but yourselves!
  - type: text
    content: 'You '
  - type: text
    content: stubbornly
  - type: text
    content: ' turned away even though '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God,'
  - type: text
    content: was leading you the right way.
  '18':
  - type: text
    content: Why, then, would you now go down to Egypt
  - type: text
    content: to drink the waters of the Nile?
  - type: note
    content: Or “Shihor,” a tributary of the Nile River. To “drink the waters of the Nile” is likely a metaphor for the people leaning on the strength of Egypt to deliver them. There is, perhaps, a little irony here because in Jer. 43:7, the people of Judah ended up going to Egypt, specifically Tahpanhes.
  - type: text
    content: Why would you go to Assyria
  - type: text
    content: to drink from the river Euphrates?
  - type: note
    content: Yahweh was rebuking his people for turning away from him, the Source of Living Water, only to seek comfort and stability somewhere else. How we must remove every false crutch we would lean on! God is enough to fill every need we have.
  '19':
  - type: text
    content: Your own wickedness punishes you.
  - type: text
    content: Your own unfaithfulness rebukes you.
  - type: text
    content: Look deep into your heart and you will learn
  - type: text
    content: how evil and bitter it is
  - type: text
    content: 'to forsake me, '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God,'
  - type: text
    content: and have no awe of me.
  - type: note
    content: Or “the fear [awe] of me is not on you.”
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have spoken.”'
  - type: heading
    content: Israel Is like an Unfaithful Wife
  '2':
  - type: text
    content: '“Go, preach this message '
  - type: note
    content: Jeremiah began his first sermon with an impassioned plea for Israel to forsake her shameless idolatry. Jeremiah compared Israel to a wife who forsakes her husband for promiscuous affairs with men. Jeremiah charged his people with unfaithfulness to God and warned Israel of the coming Babylonian invasion. In contrast to Hezekiah’s response to Isaiah’s warnings that saved Judah from the Assyrians, Jeremiah’s warnings went unheeded. For twenty chapters Jeremiah appealed, pleaded, and warned with strong words and, at times, with tenderness of heart, but still Israel would not listen to the young prophet whom God had sent to them.
  - type: text
    content: 'publicly for all Jerusalem to hear: ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: “ ‘I fondly remember the single-hearted devotion
  - type: note
    content: Or “faithfulness.” This is the Hebrew word chesed, which stresses covenant love, kindness, and loyalty. See Pss. 98:3; 106:44–45; see also Ps. 132:11.
  - type: text
    content: you had for me in your youth.
  - type: note
    content: See Ezek. 16:8, 43, 60; Hos. 2:15.
  - type: text
    content: You loved me deeply as a bride loves a bridegroom.
  - type: note
    content: Or “[I remember] how you loved me in the time of your engagement.”
  - type: text
    content: You followed me closely in the desert,
  - type: text
    content: in a land where no crops grow.
  '20':
  - type: text
    content: “Long ago, you broke your bond with me and severed ties.
  - type: note
    content: Or “you broke your yoke and tore off your straps.”
  - type: text
    content: 'You '
  - type: text
    content: boldly
  - type: text
    content: ' said, ‘I will not serve '
  - type: text
    content: you
  - type: text
    content: '!’'
  - type: text
    content: Yet, on every high hill and under every green tree,
  - type: text
    content: you offered yourself to other gods
  - type: text
    content: .
  - type: text
    content: You were like a prostitute sprawled out awaiting sex.
  '21':
  - type: text
    content: I planted you like a special vine
  - type: note
    content: See Gen. 49:11; Isa. 5:1–2; John 15:1–10.
  - type: text
    content: from the absolute best seed,
  - type: note
    content: See 1 Peter 1:23; James 1:18; 1 John 3:9.
  - type: text
    content: but look at what you’ve become now!
  - type: text
    content: You’re like a twisted, rotten vine.
  '22':
  - type: text
    content: Even if you scrubbed yourself with the strongest soap,
  - type: text
    content: 'your guilty stains '
  - type: note
    content: 'The Hebrew word katam is found only here in the Hebrew Bible. Katam can refer to menstrual bloodstains on a woman’s clothes or body. Jeremiah used ten images in this chapter to describe the detestable dimensions of Israel’s idolatry: (1) an unfaithful wife who strayed from God (see vv. 1–5); (2) a prostitute (see v. 20); (3) a choice vine that produces nothing but worthless fruit (see v. 21); (4) a guilty person whose sin cannot be washed away with soap (see v. 22); (5) a wild camel and donkey in heat (see vv. 23–24); (6) a fool bent on self-destruction (see v. 25); (7) a thief (see v. 26); (8) a foolish idolater (see vv. 27–28); (9) a thankless, rebellious people (see vv. 29–32); and (10) a blinded nation who cannot see her obvious guilt (see vv. 33–37).'
  - type: text
    content: would remain before my face.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '23':
  - type: text
    content: “How dare you say, ‘I have not defiled myself.
  - type: text
    content: I’ve not chased after false gods.’
  - type: note
    content: Or “the Baals.”
  - type: text
    content: Look how you behaved badly in the valley.
  - type: note
    content: The Targum identifies this valley as Beth Peor (see Num. 25:1–5; Deut. 4:46; Hos. 9:10). However, the Latin Vulgate and most scholars point to the Hinnom Valley, where child sacrifices were made to the god Molech. The Septuagint reads “in the cemetery.”
  - type: text
    content: Don’t you realize what you’ve done?
  - type: text
    content: You’re like a restless wild camel running loose
  '24':
  - type: text
    content: or like a wild female donkey
  - type: text
    content: accustomed to the wilderness.
  - type: text
    content: While in heat, she sniffs the wind,
  - type: text
    content: and in her lust, no one can restrain her.
  - type: text
    content: Any male that wants her will find her ready.
  '25':
  - type: text
    content: Israel
  - type: text
    content: ', don’t chase after other gods'
  - type: text
    content: until you wear out your sandals
  - type: text
    content: and your throats are parched with thirst.
  - type: text
    content: Yet, you still say,
  - type: text
    content: ‘It’s hopeless; I can’t stop chasing them.
  - type: text
    content: I desperately love these foreign gods.’ ”
  - type: heading
    content: Israel Disgraced
  '26':
  - type: text
    content: “Just as a thief is ashamed when caught in the act,
  - type: text
    content: so all Israel will be shamed—
  - type: text
    content: your kings and princes, your prophets and priests.
  '27':
  - type: text
    content: 'You have called '
  - type: text
    content: an idol of
  - type: text
    content: ' wood your ‘father’'
  - type: text
    content: 'and '
  - type: text
    content: an idol of
  - type: text
    content: ' stone your ‘mother.’'
  - type: text
    content: You have turned your back toward me instead of your face.
  - type: text
    content: 'But '
  - type: text
    content: how different it is
  - type: text
    content: ' when you get into trouble!'
  - type: text
    content: You cry out to me and ask me to come and save you.
  '28':
  - type: text
    content: Now where are all your homemade gods?
  - type: text
    content: They are nowhere to be found.
  - type: text
    content: Let them arise and save you in your time of trouble!
  - type: text
    content: Judah, you have as many gods as you have villages!
  - type: note
    content: The Septuagint adds “and they offer as many sacrifices to Baal as there are streets in the city of Jerusalem.”
  '29':
  - type: text
    content: What right do you have to complain about me?
  - type: text
    content: 'You have all rebelled against me,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '3':
  - type: text
    content: Israel, like the firstfruits of my harvest,
  - type: text
    content: I set you apart, and you belonged to me alone.
  - type: note
    content: Or “Israel was holy to Yahweh.” The Hebrew concept of holy is “to be set apart and reserved [only for Yahweh].”
  - type: text
    content: 'Anyone who devoured you '
  - type: note
    content: Or “All who ate of it.” See Gen. 12:3; Jer. 12:14; Ezek. 25:12–13.
  - type: text
    content: I made to suffer,
  - type: text
    content: and I rained disaster down upon them.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Israel’s History
  '30':
  - type: text
    content: “I’ve wasted my time punishing you
  - type: text
    content: because you did not respond to my correction.
  - type: text
    content: With the ferocity of a hungry lion,
  - type: text
    content: you murdered the prophets I sent to you.
  '31':
  - type: text
    content: “O people of this generation,
  - type: text
    content: 'see the word '
  - type: note
    content: How can the word of God be seen? One ancient symbol of God’s word was the jar of manna kept in the ark of the covenant. According to Jewish tradition, God commanded that this jar be taken out of the ark in Jeremiah’s time and exhibited (see the Mekilta, an ancient exegesis of the book of Exodus). Today, God’s word is made visible through the lives of those who faithfully follow Jesus Christ (see 2 Cor. 3:2–3; Heb. 8:10).
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ':'
  - type: text
    content: Have I been like a wilderness to Israel
  - type: text
    content: or a dangerous land full of gloom?
  - type: text
    content: Then why do my people say,
  - type: text
    content: ‘We’re free to do as we want,
  - type: text
    content: 'and we have no intention of returning to '
  - type: text
    content: serve
  - type: text
    content: ' you anymore.’'
  '32':
  - type: text
    content: Does a young woman disregard her engagement ring,
  - type: text
    content: or does a bride forget about her wedding dress?
  - type: text
    content: Yet, my people have continually forgotten me.
  '33':
  - type: text
    content: How skillfully you pursue your lovers;
  - type: text
    content: even the worst adulterers could learn from you.
  - type: note
    content: Or “you have taught yourselves how to follow evil ways.”
  '34':
  - type: text
    content: Your clothes are stained
  - type: text
    content: with the lifeblood of the helpless and innocent,
  - type: text
    content: 'though you did not catch them breaking into '
  - type: text
    content: your home
  - type: text
    content: .
  - type: note
    content: See Ex. 22:2.
  - type: text
    content: Despite all your guilt,
  '35':
  - type: text
    content: you dare to say, ‘I’m innocent!
  - type: text
    content: Yahweh
  - type: text
    content: ' is not angry with me anymore.’'
  - type: text
    content: 'But watch out! I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will judge you '
  - type: text
    content: for perjury
  - type: text
    content: 'because you say: ‘I have not sinned.’'
  '36':
  - type: text
    content: Look how you cheapen yourself
  - type: text
    content: by constantly shifting your course.
  - type: note
    content: That is, Israel was constantly pursuing foreign gods and foreign alliances.
  - type: text
    content: Egypt will put you to shame just as Assyria did.
  '37':
  - type: text
    content: You will turn away from Egypt utterly humiliated,
  - type: note
    content: Or “You will turn away from Egypt with your hands upon your heads [a figure of speech for shame and disappointment].”
  - type: text
    content: 'for I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have completely rejected those you trust.'
  - type: text
    content: No alliance will be able to help you!”
  '4':
  - type: text
    content: 'Jacob’s tribes, listen! Every clan of Israel, listen to the words of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'He declares to you:'
  - type: text
    content: “What did your ancestors find wrong with me
  - type: text
    content: that they would run so far away from me?
  - type: text
    content: They left me to follow worthless idols
  - type: text
    content: and themselves became worthless!
  - type: note
    content: This Hebrew pun is intensified by the word for “worthless,” which in Hebrew sounds like the name Baal. Baal was a Canaanite fertility god.
  '6':
  - type: text
    content: They never stopped to ask themselves,
  - type: text
    content: '‘Where is '
  - type: text
    content: Yahweh
  - type: text
    content: ', who rescued us from Egypt?'
  - type: text
    content: 'Where is the '
  - type: text
    content: Yahweh
  - type: text
    content: ' who led us through the wilderness,'
  - type: note
    content: See Deut. 6:10–18; 8:14–16; 32:10; Rom. 8:14.
  - type: text
    content: through a barren wasteland with its pits and problems?
  - type: text
    content: Where is the one who led us
  - type: text
    content: through a land of deserts and droughts,
  - type: text
    content: 'dangers and deep darkness '
  - type: note
    content: Or “death’s shadow.”
  - type: text
    content: —
  - type: text
    content: where no one lives nor even passes through?’
  '7':
  - type: text
    content: “I brought you to this land of abundance
  - type: text
    content: to enjoy its lush fruit and goodness,
  - type: text
    content: but you entered the land and defiled my land.
  - type: note
    content: The land was defiled by Israel’s adoption of Canaanite fertility cults (see Hos. 5:3; 6:10). The land can be polluted by the sins of its occupants.
  - type: text
    content: You made hideous the very land I call my own.
  '8':
  - type: text
    content: The priests did not stop and ask,
  - type: text
    content: '‘Where is '
  - type: text
    content: Yahweh
  - type: text
    content: ?’
  - type: text
    content: 'The scribal scholars '
  - type: note
    content: Or “those skilled at handling the law.”
  - type: text
    content: did not intimately know me.
  - type: text
    content: 'The shepherds '
  - type: note
    content: That is, the rulers.
  - type: text
    content: of the people
  - type: text
    content: ' rebelled against me.'
  - type: text
    content: 'The '
  - type: text
    content: 'false'
  - type: text
