        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah began his first sermon with an impassioned plea for Israel to forsake her shameless idolatry. Jeremiah compared Israel to a wife who forsakes her husband for promiscuous affairs with men. Jeremiah charged his people with unfaithfulness to God and warned Israel of the coming Babylonian invasion. In contrast to Hezekiah’s response to Isaiah’s warnings that saved Judah from the Assyrians, Jeremiah’s warnings went unheeded. For twenty chapters Jeremiah appealed, pleaded, and warned with strong words and, at times, with tenderness of heart, but still Israel would not listen to the young prophet whom God had sent to them.
      marker-yv: yv-n
    - type: text
      text: 'publicly for all Jerusalem to hear: ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you:'
