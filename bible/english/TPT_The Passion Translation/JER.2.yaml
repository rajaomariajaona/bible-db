        - type: text
          text: 2:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Shihor,” a tributary of the Nile River. To “drink the waters of the Nile” is likely a metaphor for the people leaning on the strength of Egypt to deliver them. There is, perhaps, a little irony here because in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 43:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the people of Judah ended up going to Egypt, specifically Tahpanhes.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you go to Assyria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to drink from the river Euphrates?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was rebuking his people for turning away from him, the Source of Living Water, only to seek comfort and stability somewhere else. How we must remove every false crutch we would lean on! God is enough to fill every need we have.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
