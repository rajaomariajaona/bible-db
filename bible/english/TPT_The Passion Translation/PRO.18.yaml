document_id: PRO.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Gives Life
  - type: text
    content: An unfriendly person isolates himself
  - type: text
    content: and seems to care only about his own issues.
  - type: text
    content: For his contempt of sound judgment makes him a recluse.
  - type: note
    content: There are alternate possible translations of this verse in the Hebrew; for example, “An idle man meditates on his lusts and mocks wise instruction.”
  '10':
  - type: text
    content: The character of God is a tower of strength,
  - type: note
    content: The Hebrew word migdal, translated as “tower of strength,” has a homonym that can be translated “bed of flowers.”
  - type: text
    content: for the lovers of God delight to run into his heart
  - type: text
    content: and be exalted on high.
  '11':
  - type: text
    content: The rich, in their conceit, imagine that their wealth
  - type: text
    content: is enough to protect them.
  - type: text
    content: It becomes their confidence in a day of trouble.
  - type: note
    content: The Aramaic is “The wealth of the rich is a strong city, and its glory casts a broad shadow.”
  '12':
  - type: text
    content: A man’s heart is the proudest when his downfall is nearest,
  - type: text
    content: for he won’t see glory until the Lord sees humility.
  '13':
  - type: text
    content: Listen before you speak,
  - type: text
    content: for to speak before you’ve heard the facts will bring humiliation.
  '14':
  - type: text
    content: The will to live sustains you when you’re sick,
  - type: note
    content: The Septuagint is “A wise servant can calm a man’s anger.”
  - type: text
    content: but depression crushes courage and leaves you unable to cope.
  '15':
  - type: text
    content: The spiritually hungry are always ready to learn more,
  - type: text
    content: for their hearts are eager to discover new truths.
  '16':
  - type: text
    content: Would you like to meet a very important person?
  - type: text
    content: Take a generous gift.
  - type: text
    content: It will do wonders to gain entrance into his presence.
  '17':
  - type: text
    content: There are two sides to every story.
  - type: text
    content: The first one to speak sounds true until you hear the other side
  - type: text
    content: and they set the record straight.
  - type: note
    content: The text implies that a legal testimony in a courtroom may seem to be correct until cross-examination begins.
  '18':
  - type: text
    content: 'A coin toss '
  - type: note
    content: The Hebrew is “Casting lots.”
  - type: text
    content: resolves a dispute
  - type: text
    content: and can put an argument to rest
  - type: text
    content: between formidable opponents.
  '19':
  - type: text
    content: It is easier to conquer a strong city
  - type: text
    content: than to win back a friend whom you’ve offended.
  - type: text
    content: Their walls go up, making it nearly impossible to win them back.
  - type: note
    content: Or “A brother supported by a brother is like a high, strong city. They hold each other up like the bars of a fortress.”
  '2':
  - type: text
    content: Senseless people find no pleasure in acquiring true wisdom,
  - type: text
    content: for all they want to do is impress you with what they know.
  '20':
  - type: text
    content: Sharing words of wisdom is satisfying to your inner being.
  - type: text
    content: It encourages you to know
  - type: text
    content: that you’ve changed someone else’s life.
  - type: note
    content: Or “A man’s belly is filled with the fruits of his mouth, and by the harvest of his lips he will be satisfied.”
  '21':
  - type: text
    content: Your words are so powerful
  - type: text
    content: that they will kill or give life,
  - type: text
    content: and the talkative person will reap the consequences.
  '22':
  - type: text
    content: When a man finds a wife,
  - type: text
    content: he has found a treasure!
  - type: text
    content: For she is the gift of God to bring him joy and pleasure.
  - type: text
    content: But the one who divorces a good woman
  - type: text
    content: loses what is good from his house.
  - type: note
    content: The reference to divorce is not found in the Hebrew text but is included in both the Aramaic and the Septuagint.
  - type: text
    content: To choose an adulteress is both stupid and ungodly
  - type: text
    content: .
  - type: note
    content: As translated from the Septuagint.
  '23':
  - type: text
    content: The poor plead for help from the rich,
  - type: text
    content: but all they get in return is a harsh response.
  '24':
  - type: text
    content: Some friendships don’t last for long,
  - type: note
    content: Or “A man with too many friends may be broken to pieces.”
  - type: text
    content: but there is one loving friend who is joined to your heart
  - type: note
    content: The Hebrew word used here can be translated “joined together,” “stick close,” “to cleave,” “to pursue,” or “to overtake.”
  - type: text
    content: closer than any other!
  '3':
  - type: text
    content: An ungodly man is always cloaked with disgrace,
  - type: text
    content: as dishonor and shame are his companions.
  '4':
  - type: text
    content: 'Words of wisdom '
  - type: note
    content: Or “Words that touch the heart.”
  - type: text
    content: are like a fresh, flowing brook—
  - type: text
    content: like deep waters that spring forth from within,
  - type: text
    content: bubbling up inside the one with understanding.
  '5':
  - type: text
    content: It is atrocious when judges show favor to the guilty
  - type: text
    content: and deprive the innocent of justice.
  '6':
  - type: text
    content: A senseless man jumps headfirst into an argument;
  - type: text
    content: he’s just asking for a beating for his reckless words.
  - type: note
    content: The Aramaic is “his rash words call for death.”
  '7':
  - type: text
    content: A fool has a big mouth that only gets him into trouble,
  - type: text
    content: and he’ll pay the price for what he says.
  '8':
  - type: text
    content: The words of a gossip merely reveal the wounds of his own soul,
  - type: note
    content: Scholars are somewhat uncertain about an exact translation of this phrase. The Aramaic is “The words of a lazy man lead him to fear and evil.”
  - type: text
    content: and his slander penetrates into the innermost being.
  '9':
  - type: text
    content: The one who is too lazy to look for work
  - type: text
    content: is the same one who wastes his life away.
