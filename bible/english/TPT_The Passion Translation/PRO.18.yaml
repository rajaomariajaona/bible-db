document_id: PRO.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Gives Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: An unfriendly person isolates himself
- type: usfm
  marker: q1
  children:
  - type: text
    text: and seems to care only about his own issues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For his contempt of sound judgment makes him a recluse.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are alternate possible translations of this verse in the Hebrew; for example, “An idle man meditates on his lusts and mocks wise instruction.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Senseless people find no pleasure in acquiring true wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all they want to do is impress you with what they know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: An ungodly man is always cloaked with disgrace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as dishonor and shame are his companions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Words of wisdom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Words that touch the heart.”
    marker-yv: yv-n
  - type: text
    text: are like a fresh, flowing brook—
- type: usfm
  marker: q1
  children:
  - type: text
    text: like deep waters that spring forth from within,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bubbling up inside the one with understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It is atrocious when judges show favor to the guilty
- type: usfm
  marker: q1
  children:
  - type: text
    text: and deprive the innocent of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A senseless man jumps headfirst into an argument;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he’s just asking for a beating for his reckless words.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “his rash words call for death.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A fool has a big mouth that only gets him into trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he’ll pay the price for what he says.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The words of a gossip merely reveal the wounds of his own soul,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Scholars are somewhat uncertain about an exact translation of this phrase. The Aramaic is “The words of a lazy man lead him to fear and evil.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his slander penetrates into the innermost being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The one who is too lazy to look for work
- type: usfm
  marker: q1
  children:
  - type: text
    text: is the same one who wastes his life away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The character of God is a tower of strength,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: migdal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', translated as “tower of strength,” has a homonym that can be translated “bed of flowers.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the lovers of God delight to run into his heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: and be exalted on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich, in their conceit, imagine that their wealth
- type: usfm
  marker: q1
  children:
  - type: text
    text: is enough to protect them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It becomes their confidence in a day of trouble.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “The wealth of the rich is a strong city, and its glory casts a broad shadow.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A man’s heart is the proudest when his downfall is nearest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he won’t see glory until the Lord sees humility.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Listen before you speak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for to speak before you’ve heard the facts will bring humiliation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The will to live sustains you when you’re sick,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint is “A wise servant can calm a man’s anger.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but depression crushes courage and leaves you unable to cope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The spiritually hungry are always ready to learn more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their hearts are eager to discover new truths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Would you like to meet a very important person?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take a generous gift.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will do wonders to gain entrance into his presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: There are two sides to every story.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The first one to speak sounds true until you hear the other side
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they set the record straight.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The text implies that a legal testimony in a courtroom may seem to be correct until cross-examination begins.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A coin toss '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is “Casting lots.”
    marker-yv: yv-n
  - type: text
    text: resolves a dispute
- type: usfm
  marker: q1
  children:
  - type: text
    text: and can put an argument to rest
- type: usfm
  marker: q1
  children:
  - type: text
    text: between formidable opponents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It is easier to conquer a strong city
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to win back a friend whom you’ve offended.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their walls go up, making it nearly impossible to win them back.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A brother supported by a brother is like a high, strong city. They hold each other up like the bars of a fortress.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sharing words of wisdom is satisfying to your inner being.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It encourages you to know
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you’ve changed someone else’s life.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A man’s belly is filled with the fruits of his mouth, and by the harvest of his lips he will be satisfied.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Your words are so powerful
- type: usfm
  marker: q1
  children:
  - type: text
    text: that they will kill or give life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the talkative person will reap the consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When a man finds a wife,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he has found a treasure!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For she is the gift of God to bring him joy and pleasure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the one who divorces a good woman
- type: usfm
  marker: q1
  children:
  - type: text
    text: loses what is good from his house.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The reference to divorce is not found in the Hebrew text but is included in both the Aramaic and the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: To choose an adulteress is both stupid and ungodly
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The poor plead for help from the rich,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but all they get in return is a harsh response.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Some friendships don’t last for long,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A man with too many friends may be broken to pieces.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but there is one loving friend who is joined to your heart
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here can be translated “joined together,” “stick close,” “to cleave,” “to pursue,” or “to overtake.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: closer than any other!
