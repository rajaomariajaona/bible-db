document_id: ROM.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith-Righteousness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My beloved brothers and sisters, the passionate desire of my heart and constant prayer to God is for my fellow Israelites to experience salvation. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The heart that believes in him receives the gift of the righteousness of God—and then the mouth confesses, resulting in salvation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Scriptures encourage us with these words:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Everyone who believes in him will never be disappointed.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Good News for All People
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then faith eliminates the distinction between Jew and non-Jew, for he is the same Lord for all people. And he has enough treasures to lavish generously upon all who call on him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it’s true:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Everyone who calls on the Lord’s name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will experience new life.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But how can people call on him for help if they’ve not yet believed? And how can they believe in one they’ve not yet heard of? And how can they hear the message of life if there is no one there to proclaim it? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And how can the message be proclaimed if messengers have yet to be sent? That’s why the Scriptures say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How welcome is the arrival
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “how beautiful the feet.” The Greek word implies their arrival comes at just the right time. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 52:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nah. 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of those proclaiming the joyful news of peace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and of good things to come!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But not everyone welcomes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “obeys.”
      marker-yv: yv-n
    - type: text
      text: 'the good news, as Isaiah said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, is there anyone who hears
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and believes our message?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 53:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Faith, then, is birthed in a heart that responds to God’s anointed utterance of the Anointed One.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can it be that Israel hasn’t heard the message? No, they have heard it, for:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The voice has been heard throughout the world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and its message has gone to the ends of the earth!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 19:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So again I ask, didn’t Israel already understand that God’s message was for others as well as for themselves? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is confirming that God’s plan from the beginning was to give the message of salvation to all the nations.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes, they certainly did understand
    - type: text
      text: ', for Moses was the first '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “First Moses . . . then Isaiah (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) confirms it.”
      marker-yv: yv-n
    - type: text
      text: 'to state it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make you jealous of a people who are ‘nobodies.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will use people with no understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to provoke you to anger.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 32:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Those who are “nobodies” and the “people with no understanding” both refer to the gentile believers among the nations that have by faith entered into new life in Jesus.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that although they are deeply devoted to God, they are unenlightened. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Isaiah the fearless prophet dared to declare:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who found me weren’t even seeking me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I manifested '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The compound Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: emphanes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to make manifest,” “to appear in shining light,” “to be bright,” “to shine light upon,” “to come into view.”
      marker-yv: yv-n
    - type: text
      text: myself before those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who weren’t even asking to know me!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 65:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Yet regarding Israel Isaiah says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With love I have held out my hands day after day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: offering myself to this unbelieving
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stubborn people!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 65:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And since they’ve ignored the righteousness God gives, wanting instead to be acceptable to God because of their own works, they’ve refused to submit to God’s faith-righteousness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Christ is the end of the law. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Christ is the goal of the law.”
      marker-yv: yv-n
    - type: text
      text: And because of him, God has transferred his perfect righteousness to all who believe.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses wrote long ago about the need to obey every part of the law in order to be declared right with God:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “The one who obeys these things must always live by them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Whoever obeys these things will find life.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 18:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But we receive the faith-righteousness that speaks an entirely different message:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: '“Don’t for a moment think you need to climb into the heavens to find the Messiah and bring him down, '
  '7':
  - type: usfm
    marker: mi
    children:
    - type: text
      text: or to descend into the underworld to bring him up from the dead.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 30:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the faith-righteousness we receive speaks to us in these words of Moses:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “God’s living message is very close to you, as close as your own heart beating in your chest and as near as the tongue in your mouth.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 30:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And what is God’s “living message”? It is the revelation of faith for salvation, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “word of faith.”
      marker-yv: yv-n
    - type: text
      text: 'which is the message that we preach. For if you publicly declare with your mouth that Jesus is Lord and believe in your heart that God raised him from the dead, you will experience salvation. '
