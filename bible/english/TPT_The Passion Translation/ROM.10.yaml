document_id: ROM.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith-Righteousness
  - type: text
    content: 'My beloved brothers and sisters, the passionate desire of my heart and constant prayer to God is for my fellow Israelites to experience salvation. '
  '10':
  - type: text
    content: 'The heart that believes in him receives the gift of the righteousness of God—and then the mouth confesses, resulting in salvation. '
  '11':
  - type: text
    content: 'For the Scriptures encourage us with these words:'
  - type: text
    content: “Everyone who believes in him will never be disappointed.”
  - type: note
    content: See Isa. 28:16.
  - type: heading
    content: Good News for All People
  '12':
  - type: text
    content: 'So then faith eliminates the distinction between Jew and non-Jew, for he is the same Lord for all people. And he has enough treasures to lavish generously upon all who call on him. '
  '13':
  - type: text
    content: 'And it’s true:'
  - type: text
    content: “Everyone who calls on the Lord’s name
  - type: text
    content: will experience new life.”
  '14':
  - type: text
    content: 'But how can people call on him for help if they’ve not yet believed? And how can they believe in one they’ve not yet heard of? And how can they hear the message of life if there is no one there to proclaim it? '
  '15':
  - type: text
    content: 'And how can the message be proclaimed if messengers have yet to be sent? That’s why the Scriptures say:'
  - type: text
    content: How welcome is the arrival
  - type: note
    content: Or “how beautiful the feet.” The Greek word implies their arrival comes at just the right time. See Isa. 52:7; Nah. 1:15.
  - type: text
    content: of those proclaiming the joyful news of peace
  - type: text
    content: and of good things to come!
  '16':
  - type: text
    content: 'But not everyone welcomes '
  - type: note
    content: Or “obeys.”
  - type: text
    content: 'the good news, as Isaiah said:'
  - type: text
    content: Lord, is there anyone who hears
  - type: text
    content: and believes our message?
  - type: note
    content: See Isa. 53:1.
  '17':
  - type: text
    content: Faith, then, is birthed in a heart that responds to God’s anointed utterance of the Anointed One.
  '18':
  - type: text
    content: 'Can it be that Israel hasn’t heard the message? No, they have heard it, for:'
  - type: text
    content: The voice has been heard throughout the world,
  - type: text
    content: and its message has gone to the ends of the earth!
  - type: note
    content: See Ps. 19:4.
  '19':
  - type: text
    content: 'So again I ask, didn’t Israel already understand that God’s message was for others as well as for themselves? '
  - type: note
    content: Paul is confirming that God’s plan from the beginning was to give the message of salvation to all the nations.
  - type: text
    content: Yes, they certainly did understand
  - type: text
    content: ', for Moses was the first '
  - type: note
    content: Or “First Moses . . . then Isaiah (v. 20) confirms it.”
  - type: text
    content: 'to state it:'
  - type: text
    content: “I will make you jealous of a people who are ‘nobodies.’
  - type: text
    content: And I will use people with no understanding
  - type: text
    content: to provoke you to anger.”
  - type: note
    content: See Deut. 32:21. Those who are “nobodies” and the “people with no understanding” both refer to the gentile believers among the nations that have by faith entered into new life in Jesus.
  '2':
  - type: text
    content: 'For I know that although they are deeply devoted to God, they are unenlightened. '
  '20':
  - type: text
    content: 'And Isaiah the fearless prophet dared to declare:'
  - type: text
    content: “Those who found me weren’t even seeking me.
  - type: text
    content: 'I manifested '
  - type: note
    content: The compound Greek word emphanes means “to make manifest,” “to appear in shining light,” “to be bright,” “to shine light upon,” “to come into view.”
  - type: text
    content: myself before those
  - type: text
    content: who weren’t even asking to know me!”
  - type: note
    content: See Isa. 65:1.
  '21':
  - type: text
    content: 'Yet regarding Israel Isaiah says:'
  - type: text
    content: “With love I have held out my hands day after day,
  - type: text
    content: offering myself to this unbelieving
  - type: text
    content: and stubborn people!”
  - type: note
    content: See Isa. 65:2.
  '3':
  - type: text
    content: 'And since they’ve ignored the righteousness God gives, wanting instead to be acceptable to God because of their own works, they’ve refused to submit to God’s faith-righteousness. '
  '4':
  - type: text
    content: 'For Christ is the end of the law. '
  - type: note
    content: Or “Christ is the goal of the law.”
  - type: text
    content: And because of him, God has transferred his perfect righteousness to all who believe.
  '5':
  - type: text
    content: 'Moses wrote long ago about the need to obey every part of the law in order to be declared right with God:'
  - type: text
    content: “The one who obeys these things must always live by them.”
  - type: note
    content: Or “Whoever obeys these things will find life.” See Lev. 18:5.
  '6':
  - type: text
    content: 'But we receive the faith-righteousness that speaks an entirely different message:'
  - type: text
    content: '“Don’t for a moment think you need to climb into the heavens to find the Messiah and bring him down, '
  '7':
  - type: text
    content: or to descend into the underworld to bring him up from the dead.”
  - type: note
    content: See Deut. 30:12–13.
  '8':
  - type: text
    content: 'But the faith-righteousness we receive speaks to us in these words of Moses:'
  - type: text
    content: “God’s living message is very close to you, as close as your own heart beating in your chest and as near as the tongue in your mouth.”
  - type: note
    content: See Deut. 30:14.
  '9':
  - type: text
    content: 'And what is God’s “living message”? It is the revelation of faith for salvation, '
  - type: note
    content: Or “word of faith.”
  - type: text
    content: 'which is the message that we preach. For if you publicly declare with your mouth that Jesus is Lord and believe in your heart that God raised him from the dead, you will experience salvation. '
