  - type: note
    content: That is, the Sanhedrin, seventy leaders who were chosen to instruct the people of God. Ezekiel discovered they were in fact leading the people into idolatry.
  - type: text
    content: 'and standing among them was Jaazaniah '
  - type: note
    content: Although difficult to identify with absolute certainty, this may have been the Jaazaniah who was one of those responsible for the reforms of King Josiah (see 2 Kings 25:23).
  - type: text
