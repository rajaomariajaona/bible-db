  - type: text
    content: worship of Tammuz
  - type: text
    content: '? You will see even more terrible things than that.”'
  '16':
  - type: text
    content: 'Next he transported me to the north gate to the inner '
  - type: text
    content: court
  - type: text
    content: ' of his temple. And there, at the entrance to '
  - type: text
