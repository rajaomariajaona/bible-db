  '1':
  - type: heading
    content: Ezekiel’s Fourth Vision of the Glory of God
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 8–11 is the second panel (B) in the chiastic parallel structure in Ezekiel. This section contains a series of visions relating to idolatry in the temple (see chs. 8–9) and the departure of the glory cloud from the temple (see chs. 10–11)—a sign representing God’s abandonment of his people as a punishment for their idolatrous rebellion against him over many years. Note, however, that 11:16 and following record the promise that God will return his people from captivity in due course and renew them spiritually as well. This section—panel B—constitutes the contrasting parallel with panel B1 in chs. 43–44, where Ezekiel is given a vision of the glory cloud returning to the temple (see ch. 43) and the renewal of the priestly service in the temple, reserved exclusively for the ministry of the faithful Zadokite priests (see ch. 44). See 44:15 and following in particular.
  - type: text
    content: 'In the sixth year '
  - type: text
    content: of our exile
  - type: text
    content: ', on the fifth day of the sixth month, '
  - type: note
    content: This date is probably September 17, 592 BC, fourteen months after Ezekiel’s first vision. Chapter 8 introduces a new series of Ezekiel’s visions, which refer to Jerusalem and the remnant of Judah during King Zedekiah’s reign. Ezekiel is transported by the Spirit (see 1 Kings 18:12; 2 Kings 2:16; Acts 8:39–40) from Babylon to Jerusalem to see the vile activities of the people of Israel in the temple of Yahweh.
