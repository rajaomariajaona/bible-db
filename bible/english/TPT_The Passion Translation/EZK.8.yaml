  - type: text
    content: '’s sanctuary. They bowed down to the east, before the rising sun. '
  '17':
  - type: text
    content: 'God said to me, “Son of man, do you see this? It is bad enough that the people of Judah are doing these despicable things, but they also spread violence throughout the land and provoke my anger further! Look at how they insult me in every possible way they can. '
  - type: note
    content: 'Or “they put the branch to their nose.” This was something done in Assyrian religious practices (see Martin Haug, Essays on the Sacred Language, Writings and Religion of the Parsis [United Kingdom: Houghton, Osgood, 1878], 4). Some scholars see this act as a vile attempt to insult God with crude gestures. Whatever their actual action was, it was a provocative attempt to insult and scorn the living God, the God of Israel.'
  '18':
  - type: text
    content: Therefore, with wrath I will deal with them. I will show neither pity nor mercy. They can cry to me as loudly as they want, but I will not listen to them.”
  '2':
  - type: text
    content: 'Behold, I saw a fiery human figure. '
  - type: note
    content: Most translations follow the Greek Septuagint that reads “the appearance of a man”; however, the Hebrew is “the appearance of fire,” and The Passion Translation team has chosen to merge both concepts.
  - type: text
    content: 'His body looked like fire! Below the waist were flames of fire; above the waist he glistened as bright as glowing bronze. '
  - type: note
    content: See Ezek. 1:26–28.
  '3':
  - type: text
    content: 'He reached out with what seemed like a hand and grabbed me by my hair. Then, in a '
  - type: text
