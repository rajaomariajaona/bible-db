  '6':
  - type: text
    content: And he said to me, “Son of man, do you see what they are doing? Look at all the repulsive, loathsome things that the people of Israel are practicing here! Their disgusting deeds drive me farther and farther from my sanctuary. And you will see even more shocking things than these.”
  - type: heading
    content: The Leaders of Israel Practicing Secret Idolatry
  '7':
  - type: text
    content: 'He next transported me to the entrance to the outer courtyard. I looked '
  - type: text
