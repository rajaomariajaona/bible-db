  - type: heading
    content: The Women of Judah Worshiping Tammuz
  '14':
  - type: text
    content: 'Next he took me to the entrance of the north gate of the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' where women were weeping over the death of the god Tammuz. '
  - type: note
    content: This is the only place in the Bible where the worship of Tammuz is mentioned. It dates back as far as 3000 BC. The passage here refers to a religious ceremony of an annual feast of mourning for Tammuz (precursor of Adonis) every year in the month of Tammuz (June–July) to commemorate the period of his stay in the underworld.
  '15':
