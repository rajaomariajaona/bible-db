  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From then on Pilate tried to find a way out of the situation and to set him free, but the Jewish authorities shouted him down: “If you let this man go, you’re no friend of Caesar! Anyone who declares himself a king is an enemy of the emperor!”'
    - type: usfm
