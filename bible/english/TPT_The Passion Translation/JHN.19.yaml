      text: 'Jesus carried his own cross out of the city to the place called “The Skull,” which in Aramaic is Golgotha. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there they nailed him to the cross. He was crucified, along with two others, one on each side with Jesus in the middle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate had them post a sign over the cross, which was written in three languages—Aramaic, Latin, and Greek. Many of the people of Jerusalem read the sign, for he was crucified near the city. The sign stated: “Jesus of Nazareth, the King of the Jews.”'
    - type: usfm
