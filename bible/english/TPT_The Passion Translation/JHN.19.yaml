      text: Jesus Is Flogged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pilate ordered Jesus to be brutally beaten with a whip of leather straps embedded with metal. '
    - type: usfm
      marker: f
