          text: The Aramaic could be translated “his tunic was entirely woven from above.” Jesus’ tunic was an emblem of his perfect holiness and righteousness as one who came “from above.” As believers, we are now robed in that seamless garment of righteousness in Christ. They stripped the robe from Jesus and gambled over it at the cross. Many people are still gambling over their eternal souls—while others receive freely the blood-stained, seamless robe of perfect righteousness. Jesus was unclothed so that we could be robed in his glory.
