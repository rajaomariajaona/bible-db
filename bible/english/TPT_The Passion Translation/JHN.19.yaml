        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In essence, these words were a form of blackmail as the Jewish authorities were reminding Pilate that it would ruin his career if he pardoned Jesus. The term “friend of Caesar” was an honorific title given only to the ruling wealthy class of Romans who would have access to the emperor’s court. Many of these friends of Caesar were senators and members of the Equestrian Order, known also as the Knights. Pilate’s position was a political appointment due to his being a member of this elite class of Romans who took an oath of loyalty to Caesar. They were, in effect, threatening to inform Rome that Pilate was allowing treason in Caesar’s empire. As one historian remarked, “One false move and his appointment would be cancelled and his career finished” (P. Barnett,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Jesus and the Rise of Early Christianity: A History of New Testament Times'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Illinois: InterVarsity, 1999, p. 147). This overruled Pilate’s desire to set Jesus free. He went on to condemn him to death. To place your career over Jesus is never wise.'
      marker-yv: yv-n
