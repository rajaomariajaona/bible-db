          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This leather whip, embedded with sharpened pieces of bone and metal, was known as “the scorpion.” Historians record that many people never survived this cruel flogging. The whips were known to break open the flesh and cut through muscle and sinew all the way to the bone. It was his love for you that enabled him to endure such treatment.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Perplexed, Pilate said, “Are you going to play deaf? Don’t you know that I have the power to grant you your freedom or nail you to a tree?”
