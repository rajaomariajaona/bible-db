          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic was the language of the common people in Israel. Hebrew ceased to be their spoken language after 450 BC, after the Jews returned from Babylon. Aramaic remained the language of Israel for nearly one thousand years. Latin was the official language of the Roman Empire. The inscription was also in Greek, for the Alexandrian Jews who had come to observe the Passover in Jerusalem would be unable to read Aramaic. The words were, “Jesus, the Nazarene, King of the Jews.” The first letters of each of the four words written on the sign in Aramaic (Hebrew) were: Y-H-W-H ('
      - type: usfm
        marker: it
        children:
        - type: text
          text: Y’shua Hanozri Wumelech a Yehudim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). To write these letters,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also known as the tetragrammaton), was the Hebrew form of writing the sacred name “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .” No wonder the chief priests were so offended by this sign and insisted that Pilate change it. This was a sign given to Israel, for over Jesus’ head on the cross was written, Y-H-W-H! God, the Savior, bled to death for you.
      marker-yv: yv-n
