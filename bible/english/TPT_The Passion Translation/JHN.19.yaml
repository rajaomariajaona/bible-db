          text: . It would obviously point to Judas. However, some expositors believe it was Caiaphas who handed over Jesus to Pilate, and is referred to here. But in fact, it was the evil spirits of darkness who were controlling Pilate and moving in the hearts of all involved to crucify Jesus. These dark powers would be the ones to experience the tremendous judgment unleashed on them by the power of the cross and resurrection.
      marker-yv: yv-n
    - type: usfm
