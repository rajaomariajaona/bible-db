document_id: GAL.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Life of Freedom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At last we have freedom, for Christ has set us free! We must always cherish this truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “stand strong.”
      marker-yv: yv-n
    - type: text
      text: and firmly refuse to go back into the bondage of our past.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Deep in my heart I have confidence that the Lord, who lives in you, will bring you back around to the truth. And I’m convinced that those who trouble you, whoever they think they are, will bear the penalty!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, why do you think the religious system persecutes me? Is it because I preach the message of being circumcised and keeping all the laws of Judaism? Not at all! Is there no longer any offense over the cross? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To tell you the truth, I am so disgusted with all your agitators. I wish they would go even further and cut off their legalistic influence from your lives!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “castrate themselves.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beloved ones, God has called us to live a life of freedom. But don’t view this wonderful freedom as an excuse to set up a base of operations in the natural realm. Constantly love each other and be committed to serve one another.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all the law can be summarized in one grand statement:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Demonstrate love to your neighbor, even as you care for and love yourself.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 19:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you continue to criticize and come against each other over minor issues, you’re acting like wild beasts trying to destroy one another!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both Aramaic and Greek manuscripts read “biting and devouring,” which is a metaphor for critical attitudes that will destroy the fellowship. These terms were often found in classical Greek literature to describe wild animals fighting each other in deadly conflict.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Holy Spirit, Our Victory
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let me emphasize this: As you yield to the dynamic life and power of the Holy Spirit, you will abandon the cravings of your self-life. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the natural realm.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When your self-life craves the things that offend the Holy Spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you hinder him from living free within you
    - type: text
      text: '! And the Holy Spirit’s intense cravings hinder your self-life from dominating you! So then, the two incompatible and conflicting forces within you are your self-life of the flesh and the new creation life of the Spirit.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The concept of the “new creation life of the Spirit” is implied in the greater context of Galatians, and referred to explicitly in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when you yield to the life of the Spirit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word for Spirit is actually “Spirit-Wind.”
      marker-yv: yv-n
    - type: text
      text: 'you will no longer be living under the law, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but soaring above it
    - type: text
      text: '!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The behavior of the self-life is obvious: Sexual immorality, lustful thoughts, pornography, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Paul, tell you: If you think there is benefit in circumcision and Jewish regulations, then you’re acting as though Christ is not enough. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'chasing after things instead of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “idolatry.”
      marker-yv: yv-n
    - type: text
      text: 'manipulating others, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “witchcraft.” The Greek word for “witchcraft” can imply drug usage.
      marker-yv: yv-n
    - type: text
      text: 'hatred of those who get in your way, senseless arguments, resentment when others are favored, temper tantrums, angry quarrels, only thinking of yourself, being in love with your own opinions, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being envious of the blessings of others, murder, uncontrolled addictions, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “drunken binges.”
      marker-yv: yv-n
    - type: text
      text: wild parties, and all other similar behavior.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Haven’t I already warned you that those who use their “freedom” for these things will not inherit the kingdom realm of God!
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the fruit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word here can be translated “harvest.”
      marker-yv: yv-n
    - type: text
      text: 'produced by the Holy Spirit within you is divine love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all its varied expressions
    - type: text
      text: ':'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is clear textual inference that the “fruit” (singular) of the Holy Spirit is love, with the other virtues displaying aspects of the greatest quality of Spirit-life,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: love.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'joy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that overflows
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This translation has chosen to supply action to these virtues, for they are not meant to be abstract virtues, but made visible with actions.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that subdues
    - type: text
      text: ','
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'patience '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for patience is taken from a verb that means “ever tapping” or “never quitting.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that endures
    - type: text
      text: ','
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kindness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word can be translated “sweetness.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in action
    - type: text
      text: ','
  - type: usfm
    marker: p
    children:
    - type: text
      text: a life full of virtue,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “goodness.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that prevails
    - type: text
      text: ','
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'gentleness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of heart
    - type: text
      text: ', and'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of spirit
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: self
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is not found in this verse; however, most translations render this as “self-control.” The word is actually “lordship,” or by implication “spirit-strength.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Never set the law above these qualities, for they are meant to be limitless.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “there is no law set against these things” or “there is no conflict with Jewish laws.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep in mind that we who belong to Jesus Christ have already experienced crucifixion. For everything connected with our self-life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “all our fleshly passions and desires.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 2:15–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'was put to death on the cross and crucified with Messiah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the Spirit is the source of our life, we must also allow the Spirit to direct every aspect of our lives. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So may we never be arrogant, or look down on another, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for each of us is an original
    - type: text
      text: . We must forsake all jealousy that diminishes the value of others.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say it again emphatically: If you let yourselves be circumcised you are obliged to fulfill every single one of the commandments and regulations of the law!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you want to be made right with God by fulfilling the obligations of the law, you have cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more than your flesh
    - type: text
      text: '—you have cut yourselves off from Christ and have fallen away from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the revelation of
    - type: text
      text: ' grace!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we have the true hope that comes from being made right with God, and by the Spirit we wait eagerly for this hope. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you’re joined to the Anointed One, circumcision and religious obligations can benefit you nothing. All that matters now is living in the faith that works and expresses itself through love.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before you were led astray, you were so faithful. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you were running well.”
      marker-yv: yv-n
    - type: text
      text: Who has deceived you so that you have turned from what is right?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The One who enfolded you into his grace is not behind this false teaching that you’ve embraced. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t you know that when you allow even a little lie into your heart, it can permeate your entire belief system?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “A little yeast goes through the whole lump of dough.” The text uses a metaphor of “yeast” that has effects that cannot be hidden when it is folded into dough. The yeast is the lie of legalism.
      marker-yv: yv-n
