document_id: GAL.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Life of Freedom
  - type: text
    content: 'At last we have freedom, for Christ has set us free! We must always cherish this truth '
  - type: note
    content: Or “stand strong.”
  - type: text
    content: and firmly refuse to go back into the bondage of our past.
  '10':
  - type: text
    content: Deep in my heart I have confidence that the Lord, who lives in you, will bring you back around to the truth. And I’m convinced that those who trouble you, whoever they think they are, will bear the penalty!
  '11':
  - type: text
    content: 'Dear friends, why do you think the religious system persecutes me? Is it because I preach the message of being circumcised and keeping all the laws of Judaism? Not at all! Is there no longer any offense over the cross? '
  '12':
  - type: text
    content: To tell you the truth, I am so disgusted with all your agitators. I wish they would go even further and cut off their legalistic influence from your lives!
  - type: note
    content: Or “castrate themselves.”
  '13':
  - type: text
    content: Beloved ones, God has called us to live a life of freedom. But don’t view this wonderful freedom as an excuse to set up a base of operations in the natural realm. Constantly love each other and be committed to serve one another.
  '14':
  - type: text
    content: 'For all the law can be summarized in one grand statement:'
  - type: text
    content: “Demonstrate love to your neighbor, even as you care for and love yourself.”
  - type: note
    content: See Lev. 19:18.
  '15':
  - type: text
    content: But if you continue to criticize and come against each other over minor issues, you’re acting like wild beasts trying to destroy one another!
  - type: note
    content: Both Aramaic and Greek manuscripts read “biting and devouring,” which is a metaphor for critical attitudes that will destroy the fellowship. These terms were often found in classical Greek literature to describe wild animals fighting each other in deadly conflict.
  - type: heading
    content: The Holy Spirit, Our Victory
  '16':
  - type: text
    content: 'Let me emphasize this: As you yield to the dynamic life and power of the Holy Spirit, you will abandon the cravings of your self-life. '
  - type: note
    content: Or “the natural realm.”
  '17':
  - type: text
    content: 'When your self-life craves the things that offend the Holy Spirit '
  - type: text
    content: you hinder him from living free within you
  - type: text
    content: '! And the Holy Spirit’s intense cravings hinder your self-life from dominating you! So then, the two incompatible and conflicting forces within you are your self-life of the flesh and the new creation life of the Spirit.'
  - type: note
    content: The concept of the “new creation life of the Spirit” is implied in the greater context of Galatians, and referred to explicitly in 6:15–16.
  '18':
  - type: text
    content: 'But when you yield to the life of the Spirit, '
  - type: note
    content: The word for Spirit is actually “Spirit-Wind.”
  - type: text
    content: 'you will no longer be living under the law, '
  - type: text
    content: but soaring above it
  - type: text
    content: '!'
  '19':
  - type: text
    content: 'The behavior of the self-life is obvious: Sexual immorality, lustful thoughts, pornography, '
  '2':
  - type: text
    content: 'I, Paul, tell you: If you think there is benefit in circumcision and Jewish regulations, then you’re acting as though Christ is not enough. '
  '20':
  - type: text
    content: 'chasing after things instead of God, '
  - type: note
    content: Literally “idolatry.”
  - type: text
    content: 'manipulating others, '
  - type: note
    content: Literally “witchcraft.” The Greek word for “witchcraft” can imply drug usage.
  - type: text
    content: 'hatred of those who get in your way, senseless arguments, resentment when others are favored, temper tantrums, angry quarrels, only thinking of yourself, being in love with your own opinions, '
  '21':
  - type: text
    content: 'being envious of the blessings of others, murder, uncontrolled addictions, '
  - type: note
    content: Literally “drunken binges.”
  - type: text
    content: wild parties, and all other similar behavior.
  - type: text
    content: Haven’t I already warned you that those who use their “freedom” for these things will not inherit the kingdom realm of God!
  '22':
  - type: text
    content: 'But the fruit '
  - type: note
    content: The Greek word here can be translated “harvest.”
  - type: text
    content: 'produced by the Holy Spirit within you is divine love '
  - type: text
    content: in all its varied expressions
  - type: text
    content: ':'
  - type: note
    content: There is clear textual inference that the “fruit” (singular) of the Holy Spirit is love, with the other virtues displaying aspects of the greatest quality of Spirit-life, agape love.
  - type: text
    content: 'joy '
  - type: text
    content: that overflows
  - type: text
    content: ','
  - type: note
    content: This translation has chosen to supply action to these virtues, for they are not meant to be abstract virtues, but made visible with actions.
  - type: text
    content: 'peace '
  - type: text
    content: that subdues
  - type: text
    content: ','
  - type: text
    content: 'patience '
  - type: note
    content: The Greek word for patience is taken from a verb that means “ever tapping” or “never quitting.”
  - type: text
    content: that endures
  - type: text
    content: ','
  - type: text
    content: 'kindness '
  - type: note
    content: The Aramaic word can be translated “sweetness.”
  - type: text
    content: in action
  - type: text
    content: ','
  - type: text
    content: a life full of virtue,
  - type: note
    content: Or “goodness.”
  - type: text
    content: 'faith '
  - type: text
    content: that prevails
  - type: text
    content: ','
  - type: text
    content: 'gentleness '
  - type: text
    content: of heart
  - type: text
    content: ', and'
  - type: text
    content: 'strength '
  - type: text
    content: of spirit
  - type: text
    content: .
  - type: note
    content: The word self is not found in this verse; however, most translations render this as “self-control.” The word is actually “lordship,” or by implication “spirit-strength.”
  - type: text
    content: Never set the law above these qualities, for they are meant to be limitless.
  - type: note
    content: Literally “there is no law set against these things” or “there is no conflict with Jewish laws.”
  '24':
  - type: text
    content: 'Keep in mind that we who belong to Jesus Christ have already experienced crucifixion. For everything connected with our self-life '
  - type: note
    content: Or “all our fleshly passions and desires.” See 1 John 2:15–17.
  - type: text
    content: 'was put to death on the cross and crucified with Messiah. '
  '25':
  - type: text
    content: 'If the Spirit is the source of our life, we must also allow the Spirit to direct every aspect of our lives. '
  '26':
  - type: text
    content: 'So may we never be arrogant, or look down on another, '
  - type: text
    content: for each of us is an original
  - type: text
    content: . We must forsake all jealousy that diminishes the value of others.
  - type: note
    content: As translated from the Aramaic.
  '3':
  - type: text
    content: 'I say it again emphatically: If you let yourselves be circumcised you are obliged to fulfill every single one of the commandments and regulations of the law!'
  '4':
  - type: text
    content: 'If you want to be made right with God by fulfilling the obligations of the law, you have cut off '
  - type: text
    content: more than your flesh
  - type: text
    content: '—you have cut yourselves off from Christ and have fallen away from '
  - type: text
    content: the revelation of
  - type: text
    content: ' grace!'
  '5':
  - type: text
    content: 'But we have the true hope that comes from being made right with God, and by the Spirit we wait eagerly for this hope. '
  '6':
  - type: text
    content: When you’re joined to the Anointed One, circumcision and religious obligations can benefit you nothing. All that matters now is living in the faith that works and expresses itself through love.
  '7':
  - type: text
    content: 'Before you were led astray, you were so faithful. '
  - type: note
    content: Or “you were running well.”
  - type: text
    content: Who has deceived you so that you have turned from what is right?
  '8':
  - type: text
    content: 'The One who enfolded you into his grace is not behind this false teaching that you’ve embraced. '
  '9':
  - type: text
    content: Don’t you know that when you allow even a little lie into your heart, it can permeate your entire belief system?
  - type: note
    content: Literally “A little yeast goes through the whole lump of dough.” The text uses a metaphor of “yeast” that has effects that cannot be hidden when it is folded into dough. The yeast is the lie of legalism.
