document_id: ISA.66,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Resting Place Is with the Humble
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “The heavens are my throne
  - type: note
    content: The glorious God is too great to be limited to a literal chair-like throne. This “throne” is symbolic, a term meant to help us understand his great sovereignty and authority as ruler over all.
  - type: text
    content: and the earth is my footstool.
  - type: text
    content: Where is the house you will build for me?
  - type: note
    content: God rebukes the returning exiles for wanting to rebuild the temple and to restore the outward forms of worship with no intention of turning from their evil ways and having their hearts changed. God no longer dwells in man-made buildings but in God-shaped hearts of people who love, worship, and believe in him. See v. 2; 1 Kings 8:22–43; Acts 7:48; Eph. 2:19–22; Heb. 3:5–6.
  - type: text
    content: Where is the place where I will rest?
  '10':
  - type: text
    content: So rejoice with Jerusalem and be glad for her!
  - type: text
    content: All who love her, join in with her great joy,
  - type: text
    content: especially those who remember her grief!
  '11':
  - type: text
    content: 'You, '
  - type: text
    content: her children
  - type: text
    content: ', will drink the milk of her prosperity'
  - type: text
    content: and nurse with delight from her glorious abundance!
  '12':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “I will extend to her prosperity like a river
  - type: text
    content: and the wealth of gentiles like a flooding river.
  - type: text
    content: You will nurse from her breast, be cradled in her arms,
  - type: text
    content: 'and '
  - type: text
    content: delightfully
  - type: text
    content: ' bounced on her knees.'
  '13':
  - type: text
    content: As a mother tenderly comforts her child,
  - type: text
    content: so will I tenderly comfort you,
  - type: text
    content: and you will find comfort in Jerusalem.”
  - type: heading
    content: Judgment by Fire and Sword
  '14':
  - type: text
    content: When you feast your eyes on this,
  - type: text
    content: your heart will leap for joy and be revived;
  - type: text
    content: 'your '
  - type: text
    content: body
  - type: text
    content: ' will flourish and sprout like grass.'
  - type: note
    content: Or “Your bones [a metaphor for your inner being] will sprout like grass [flourish].” Some commentators view this as physical health and well-being.
  - type: text
    content: 'The mighty power '
  - type: note
    content: Or “hand,” a metaphor for his power and anointing.
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be revealed,'
  - type: text
    content: resting
  - type: text
    content: ' on his servants,'
  - type: text
    content: but his fury will be shown to his enemies!
  '15':
  - type: text
    content: 'Look! '
  - type: text
    content: Yahweh
  - type: text
    content: ' is coming as a raging fire'
  - type: text
    content: and his chariots like a whirlwind
  - type: note
    content: See 2 Kings 2:1–18; Ezek. 1:4–28.
  - type: text
    content: to unleash his anger with fiery fury
  - type: text
    content: and with the fiery lightning of his rebuke!
  - type: note
    content: See Zech. 9:14; Heb. 12:29.
  '16':
  - type: text
    content: 'For with fire '
  - type: note
    content: See Jer. 23:29–32.
  - type: text
    content: and with his sword
  - type: note
    content: See Heb. 4:12.
  - type: text
    content: Yahweh
  - type: text
    content: ' will judge '
  - type: note
    content: Or “contend” or “plead.” See Amos 7:4–6.
  - type: text
    content: humanity—
  - type: text
    content: 'many will be the slain of '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '17':
  - type: text
    content: '“The end is near for those who ‘consecrate’ and ‘purify’ themselves to enter their cultic groves! They go in procession one after another '
  - type: text
    content: into their ceremonies
  - type: text
    content: '. They eat '
  - type: text
    content: disgusting foods
  - type: text
    content: '—pork, mice, and rodents. '
  '18':
  - type: text
    content: 'I '
  - type: text
    content: despise
  - type: text
    content: ' their '
  - type: text
    content: evil
  - type: text
    content: ' works '
  - type: note
    content: See Gal. 5:19–21.
  - type: text
    content: 'and their thoughts,” '
  - type: note
    content: Or “imaginations.” The works and thoughts of fallen humanity can be compared to the “mark (character) of the beast” on the hands (works) and the foreheads (thoughts, mindsets) of people. See Acts 17:29; Rev. 13:13–18.
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: God’s Reign
  - type: text
    content: '“The time is coming for me to gather people together from all over the world, '
  - type: note
    content: Or “nations and tongues.” See Acts 2:5–12.
  - type: text
    content: 'and they will come and gaze on my radiance. '
  '19':
  - type: text
    content: 'I will set an amazing sign '
  - type: note
    content: To “set a sign” is likely a figure of speech for “to display a mighty miracle.” This Hebrew phrase is also found in Ps. 78:43 and Jer. 32:20. In the book of Acts, the miracle-sign God set among his people was the Holy Spirit, who sent out laborers into the harvest fields of the nations.
  - type: text
    content: 'among them. I will send some of the remnant to other nations—to Tarshish, Put, '
  - type: note
    content: Or “Pul.” Put is modern-day Libya.
  - type: text
    content: 'Lud '
  - type: note
    content: Lud is Lydia in modern-day western Turkey.
  - type: text
    content: '(known for its archers), '
  - type: note
    content: Or possibly Meshech, a region frequently associated with Tubal, which could be a reference to Russia (Moscow).
  - type: text
    content: 'Tubal, '
  - type: note
    content: Ancient Tubal is comprised of much of modern-day Turkey.
  - type: text
    content: 'Javan, '
  - type: note
    content: Javan was the son of Japheth and the grandson of Noah. This is a likely metonymy referring to modern-day Greece.
  - type: text
    content: 'and distant islands that have never heard of my fame nor gazed on my glory. They will declare my glory among the gentiles! '
  '2':
  - type: text
    content: 'My hand made these things so they all belong to me,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: '“But there is one my eyes are drawn to:'
  - type: text
    content: 'the humble one, the tender one, '
  - type: note
    content: Or “the one bruised [crushed] in spirit.”
  - type: text
    content: the trembling one
  - type: text
    content: who lives in awe of all I say.
  '20':
  - type: text
    content: 'And they will bring back from the nations your own people as an offering to me,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: '“They will come on horseback, in chariots, in wagons, on mules and camels to my holy mountain, Jerusalem,” says '
  - type: text
    content: Yahweh
  - type: text
    content: '. “In the same way my people bring a grain offering in a sacred vessel to the temple, they will be brought as grain offerings to my holy mountain, Jerusalem, as a holy offering to me. '
  '21':
  - type: text
    content: 'And some of them I will appoint as Levitical priests,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '22':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: “The new heavens and the new earth that I am making will remain and endure before me in the same way your offspring '
  - type: note
    content: Or “seed.”
  - type: text
    content: 'and your name will endure. '
  '23':
  - type: text
    content: From one Sabbath to the next, one month to the next, one year to the next, all humanity will come to worship me!
  '24':
  - type: text
    content: '“They will go out '
  - type: text
    content: of the city
  - type: text
    content: ' and see the dead bodies of those who rebelled against me. For their worm will not die '
  - type: note
    content: This is likely a figure of speech for unending suffering. Some equate the “worm” with the guilty conscience. See Mark 9:48.
  - type: text
    content: 'and their fire will never go out. '
  - type: note
    content: It is possible that this refers to a mass burial site where maggots continue to eat flesh and fire burns continually with corpses. Some see this as having been fulfilled by the slaughter of Israel’s enemies during the time of the Maccabees, others as a view toward a future slaughter, and still others as a description of hell.
  - type: text
    content: And they will be abhorrent to humanity.”
  - type: note
    content: Or “all flesh,” the last words of Isaiah. It is a long-held Jewish tradition that Isaiah was placed inside a hollow tree and sawn in two by the order of King Manasseh. The book of Isaiah is likewise “sawn in two” by theologians with theories of two or more authors.
  '3':
  - type: text
    content: 'But the one who offers a bull '
  - type: text
    content: with no humility
  - type: text
    content: is like one who kills a man.
  - type: text
    content: 'The one who offers a lamb '
  - type: text
    content: without contrition
  - type: text
    content: is like one who breaks a dog’s neck.
  - type: text
    content: 'The one who brings grain offerings '
  - type: text
    content: with no heart-purity
  - type: text
    content: is like one who offers pig’s blood!
  - type: text
    content: 'The one who offers incense '
  - type: text
    content: with no sincerity
  - type: text
    content: 'is like one who kisses '
  - type: note
    content: Or “blesses.”
  - type: text
    content: an idol!
  - type: text
    content: 'They have all chosen their own way, '
  - type: text
    content: not mine
  - type: text
    content: ','
  - type: text
    content: and they take delight in these disgusting things!
  '4':
  - type: text
    content: 'So I chose to punish '
  - type: note
    content: Or “mock.”
  - type: text
    content: them
  - type: text
    content: and to bring on them what they fear the most
  - type: text
    content: because I called out to them and they ignored me.
  - type: text
    content: I spoke and they did not listen
  - type: text
    content: but did what is evil in my sight
  - type: text
    content: and chose what I despise.”
  '5':
  - type: text
    content: 'Hear the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', you who tremble at what he says:'
  - type: text
    content: “Shame on your own people,
  - type: text
    content: who reject you and hate you,
  - type: text
    content: claiming they do it for my sake.
  - type: text
    content: 'For they '
  - type: text
    content: mock you
  - type: text
    content: ', saying,'
  - type: text
    content: '‘May '
  - type: text
    content: Yahweh
  - type: text
    content: ' be glorified; let us see you rejoice.’ ”'
  - type: heading
    content: God Intervenes
  '6':
  - type: text
    content: Listen! A sound of uproar is coming from the city
  - type: text
    content: a sound from the temple!
  - type: text
    content: 'It is the thunder '
  - type: note
    content: Or “voice.” Ch. 40 begins with a thunderous voice in the wilderness; the book of Isaiah ends with a voice like thunder in his temple.
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: as he completely punishes his enemies!
  '7':
  - type: text
    content: Zion
  - type: text
    content: ' gave birth suddenly, even before going into labor.'
  - type: text
    content: She delivered a son without any painful contractions.
  '8':
  - type: text
    content: Who has ever seen or heard of such a wonder?
  - type: text
    content: Could a country be born in a day?
  - type: text
    content: Can a nation be birthed so suddenly?
  - type: note
    content: This actually happened with Israel being “reborn” as a nation in 1948. And it happened at Pentecost when the church, a holy nation, was birthed by the Holy Spirit. See Acts 2:1–4.
  - type: text
    content: Yet no sooner does Zion go into labor
  - type: text
    content: than she gives birth to sons!
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, says,'
  - type: text
    content: “Do I allow you to conceive and not to give birth?
  - type: text
    content: Do I shut the womb when I’m the one who delivers?”
