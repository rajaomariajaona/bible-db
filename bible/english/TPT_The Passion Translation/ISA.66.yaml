        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God rebukes the returning exiles for wanting to rebuild the temple and to restore the outward forms of worship with no intention of turning from their evil ways and having their hearts changed. God no longer dwells in man-made buildings but in God-shaped hearts of people who love, worship, and believe in him. See v.
