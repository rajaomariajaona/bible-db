      children:
      - type: text
        text: The glorious God is too great to be limited to a literal chair-like throne. This “throne” is symbolic, a term meant to help us understand his great sovereignty and authority as ruler over all.
    marker-yv: yv-n
- type: usfm
  marker: q1
