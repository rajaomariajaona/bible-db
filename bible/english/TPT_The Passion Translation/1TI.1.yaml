document_id: 1TI.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: From Paul, an apostle in Christ Jesus, for it was Jesus himself, our living hope, who sent me as his servant by the command of God, our life-giver.
  - type: note
    content: Or “Savior.”
  '10':
  - type: text
    content: 'rapists, those who are sexually impure, homosexuals, '
  - type: note
    content: The Aramaic can be translated “molesters of male children.”
  - type: text
    content: 'kidnappers, liars, those who break their oaths, and all those who oppose the teaching of godliness and purity in the church! '
  - type: text
    content: They are the ones the law is for
  - type: text
    content: .
  '11':
  - type: text
    content: 'I have been commissioned to preach the wonderful news of the glory of the exalted God. '
  '12':
  - type: text
    content: My heart spills over with thanks to God for the way he continually empowers me, and to our Lord Jesus, the Anointed One, who found me trustworthy and who authorized me to be his partner in this ministry.
  - type: heading
    content: Empowering Mercy
  '13':
  - type: text
    content: 'Mercy kissed me, even though I used to be a blasphemer, a persecutor of believers, and a scorner of what turned out to be true. I was ignorant and didn’t know what I was doing. '
  '14':
  - type: text
    content: 'I was flooded with such incredible grace, '
  - type: text
    content: like a river overflowing its banks
  - type: text
    content: ', '
  - type: note
    content: Paul uses the Greek word pleonazō, which means “superabounding grace.”
  - type: text
    content: until I was full of faith and love for Jesus, the Anointed One!
  '15':
  - type: text
    content: 'I can testify that the Word is true and deserves to be received by all, for Jesus Christ came into the world to bring sinners back to life—even me, the worst sinner of all! '
  '16':
  - type: text
    content: 'Yet I was captured by grace, so that Jesus Christ could display through me the outpouring of his Spirit '
  - type: note
    content: As translated from the Aramaic. The Greek text reads “that Jesus would demonstrate his perfect patience.”
  - type: text
    content: 'as a pattern to be seen for all those who would believe '
  - type: note
    content: Or “destined to believe.”
  - type: text
    content: in him for eternal life.
  '17':
  - type: text
    content: 'Because of this my praises rise to the King of all the universe '
  - type: note
    content: Or “King of the ages.”
  - type: text
    content: 'who is indestructible, '
  - type: note
    content: The Aramaic word used here is a direct reference to the physical body of Christ that did not decompose in the tomb, but was raised in resurrection.
  - type: text
    content: 'invisible, and full of glory, the only God '
  - type: note
    content: As translated from the Aramaic. Some Greek texts have “the only wise God.”
  - type: text
    content: who is worthy of the highest honors throughout all of time and throughout the eternity of eternities! Amen!
  - type: heading
    content: Paul Encourages Timothy to Remain Faithful
  '18':
  - type: text
    content: 'So Timothy, my son, I am entrusting you with this responsibility, in keeping with the very first prophecies that were spoken over your life, and are now in the process of fulfillment in this great work of ministry, in keeping with the prophecies spoken over you. With this encouragement '
  - type: text
    content: use your prophecies
  - type: text
    content: ' as weapons as you wage spiritual warfare by faith and with a clean conscience. For there are many who reject these virtues and are now destitute of the true faith, '
  '2':
  - type: text
    content: 'Timothy, you are my true spiritual son in the faith. May abundant grace, mercy, and total well-being '
  - type: note
    content: The Hebrew concept of peace includes health, prosperity, and peace of mind.
  - type: text
    content: from God the Father and the Anointed One, our Lord Jesus, be yours!
  - type: heading
    content: Timothy’s Ministry in Ephesus
  '20':
  - type: text
    content: 'such as Hymenaeus '
  - type: note
    content: The name Hymenaeus is also the name of the pagan god of the bridal song sung by the attendants of the bride during the ceremony. He was invoked by the bride’s friends in hope that he would come and manifest himself. Perhaps Hymenaeus was attempting to mix the worship of false gods into the church. See also 2 Tim. 2:17.
  - type: text
    content: 'and Alexander '
  - type: note
    content: Alexander’s name means “protector of men,” or “man pleaser.” When the church attempts to please men, we can quickly fail to please God.
  - type: text
    content: who have fallen away. I have delivered them both over to Satan to be rid of them and to teach them to no longer blaspheme!
  '3':
  - type: text
    content: 'As I urged you when I left for Macedonia, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'I’m asking that you remain in Ephesus to instruct them not to teach or follow the error of deceptive doctrines, '
  '4':
  - type: text
    content: 'nor pay any attention to cultural myths, traditions, or the endless study of genealogies. '
  - type: note
    content: The Jewish people have always been diligent to carefully record their genealogies; yet, the reference to genealogies here may also include the apocryphal writings of Jewish mysticism, detailing the origins of angelic beings involved in creation.
  - type: text
    content: Those digressions only breed controversies and debates. They are devoid of power that builds up and strengthens the church in the faith of God.
  '5':
  - type: text
    content: 'For we reach the goal of fulfilling all the commandments when we love others deeply with a pure heart, a clean conscience, and sincere faith. '
  '6':
  - type: text
    content: 'Some believers have been led astray by teachings and speculations that emphasize nothing more than the empty words of men. '
  '7':
  - type: text
    content: 'They presume to be expert teachers of the law, '
  - type: note
    content: Or “Torah.”
  - type: text
    content: but they don’t have the slightest idea of what they’re talking about and they simply love to argue!
  - type: heading
    content: Paul’s Use of the Law
  '8':
  - type: text
    content: 'We know that the moral code of the law is beautiful when applied as God intended, '
  '9':
  - type: text
    content: 'but actually, the law was not established for righteous people, but to bring conviction of sin to the unrighteous. The law was established to bring the revelation of sin to the evildoers and rebellious, the sinners without God, those who are vicious and perverse, and to those who strike their father or their mother, '
  - type: note
    content: As translated from the Aramaic. The Greek reads “those who murder their father or murder their mother.”
  - type: text
    content: 'sinners, murderers, '
