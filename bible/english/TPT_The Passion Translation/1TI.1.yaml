document_id: 1TI.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: From Paul, an apostle in Christ Jesus, for it was Jesus himself, our living hope, who sent me as his servant by the command of God, our life-giver.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Savior.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'rapists, those who are sexually impure, homosexuals, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “molesters of male children.”
      marker-yv: yv-n
    - type: text
      text: 'kidnappers, liars, those who break their oaths, and all those who oppose the teaching of godliness and purity in the church! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They are the ones the law is for
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I have been commissioned to preach the wonderful news of the glory of the exalted God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: My heart spills over with thanks to God for the way he continually empowers me, and to our Lord Jesus, the Anointed One, who found me trustworthy and who authorized me to be his partner in this ministry.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Empowering Mercy
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mercy kissed me, even though I used to be a blasphemer, a persecutor of believers, and a scorner of what turned out to be true. I was ignorant and didn’t know what I was doing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I was flooded with such incredible grace, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like a river overflowing its banks
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pleonazō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “superabounding grace.”'
      marker-yv: yv-n
    - type: text
      text: until I was full of faith and love for Jesus, the Anointed One!
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I can testify that the Word is true and deserves to be received by all, for Jesus Christ came into the world to bring sinners back to life—even me, the worst sinner of all! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Yet I was captured by grace, so that Jesus Christ could display through me the outpouring of his Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek text reads “that Jesus would demonstrate his perfect patience.”
      marker-yv: yv-n
    - type: text
      text: 'as a pattern to be seen for all those who would believe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “destined to believe.”
      marker-yv: yv-n
    - type: text
      text: in him for eternal life.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Because of this my praises rise to the King of all the universe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “King of the ages.”
      marker-yv: yv-n
    - type: text
      text: 'who is indestructible, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here is a direct reference to the physical body of Christ that did not decompose in the tomb, but was raised in resurrection.
      marker-yv: yv-n
    - type: text
      text: 'invisible, and full of glory, the only God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. Some Greek texts have “the only wise God.”
      marker-yv: yv-n
    - type: text
      text: who is worthy of the highest honors throughout all of time and throughout the eternity of eternities! Amen!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Encourages Timothy to Remain Faithful
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'So Timothy, my son, I am entrusting you with this responsibility, in keeping with the very first prophecies that were spoken over your life, and are now in the process of fulfillment in this great work of ministry, in keeping with the prophecies spoken over you. With this encouragement '
    - type: usfm
      marker: it
      children:
      - type: text
        text: use your prophecies
    - type: text
      text: ' as weapons as you wage spiritual warfare by faith and with a clean conscience. For there are many who reject these virtues and are now destitute of the true faith, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Timothy, you are my true spiritual son in the faith. May abundant grace, mercy, and total well-being '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew concept of peace includes health, prosperity, and peace of mind.
      marker-yv: yv-n
    - type: text
      text: from God the Father and the Anointed One, our Lord Jesus, be yours!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy’s Ministry in Ephesus
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'such as Hymenaeus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Hymenaeus is also the name of the pagan god of the bridal song sung by the attendants of the bride during the ceremony. He was invoked by the bride’s friends in hope that he would come and manifest himself. Perhaps Hymenaeus was attempting to mix the worship of false gods into the church. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and Alexander '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Alexander’s name means “protector of men,” or “man pleaser.” When the church attempts to please men, we can quickly fail to please God.
      marker-yv: yv-n
    - type: text
      text: who have fallen away. I have delivered them both over to Satan to be rid of them and to teach them to no longer blaspheme!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'As I urged you when I left for Macedonia, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'I’m asking that you remain in Ephesus to instruct them not to teach or follow the error of deceptive doctrines, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'nor pay any attention to cultural myths, traditions, or the endless study of genealogies. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish people have always been diligent to carefully record their genealogies; yet, the reference to genealogies here may also include the apocryphal writings of Jewish mysticism, detailing the origins of angelic beings involved in creation.
      marker-yv: yv-n
    - type: text
      text: Those digressions only breed controversies and debates. They are devoid of power that builds up and strengthens the church in the faith of God.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For we reach the goal of fulfilling all the commandments when we love others deeply with a pure heart, a clean conscience, and sincere faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Some believers have been led astray by teachings and speculations that emphasize nothing more than the empty words of men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They presume to be expert teachers of the law, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Torah.”
      marker-yv: yv-n
    - type: text
      text: but they don’t have the slightest idea of what they’re talking about and they simply love to argue!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Use of the Law
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'We know that the moral code of the law is beautiful when applied as God intended, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'but actually, the law was not established for righteous people, but to bring conviction of sin to the unrighteous. The law was established to bring the revelation of sin to the evildoers and rebellious, the sinners without God, those who are vicious and perverse, and to those who strike their father or their mother, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek reads “those who murder their father or murder their mother.”
      marker-yv: yv-n
    - type: text
      text: 'sinners, murderers, '
