      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Daniel was a seer. He experienced many dreams, including dreams filled with visions. In the book, he records four visions that span the time between the destruction of Jerusalem in 587/586 BC and the revolt against Antiochus IV Epiphanes in 164 BC.
      marker-yv: yv-n
    - type: text
      text: while I lay on my bed. So, I wrote down my dream, describing in full all that I had seen.
    - type: usfm
      marker: f
      children:
