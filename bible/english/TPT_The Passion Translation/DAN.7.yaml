document_id: DAN.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Daniel’s First Vision: The Four Beasts'
  - type: text
    content: 'During the first year of '
  - type: text
    content: the reign of
  - type: text
    content: ' King Belshazzar of Babylon, '
  - type: text
    content: I
  - type: text
    content: ', Daniel, had a dream filled with visions '
  - type: note
    content: Daniel was a seer. He experienced many dreams, including dreams filled with visions. In the book, he records four visions that span the time between the destruction of Jerusalem in 587/586 BC and the revolt against Antiochus IV Epiphanes in 164 BC.
  - type: text
    content: while I lay on my bed. So, I wrote down my dream, describing in full all that I had seen.
  - type: note
    content: It is likely that this vision happened in 554 BC, which would be prior to the events of ch. 5. The words “see,” “look(ed),” or “vision” are found fourteen times in this chapter.
  '10':
  - type: text
    content: 'A surging stream of fire flowed from before him. '
  - type: note
    content: The stream (or river) of fire represents the blindingly brilliant glory of God’s presence that conquers all who come before him. Like lava rolling out of God’s presence, so the burning fire of holiness pours out from his throne. See Heb. 12:29.
  - type: text
    content: 'Immeasurable numbers of people were serving him, and countless myriads were attending him. '
  - type: note
    content: Or “Thousands upon thousands . . . and myriads of myriads.” See Rev. 5:11.
  - type: text
    content: 'The court convened for judgment, and '
  - type: text
    content: the
  - type: text
    content: ' books were opened.'
  - type: note
    content: See Ps. 56:8; Mal. 3:16; Rev. 20:12.
  '11':
  - type: text
    content: 'As I kept on looking, I heard boastful words being spoken by the little horn. As I watched, '
  - type: text
    content: the verdict was issued
  - type: text
    content: '. The '
  - type: text
    content: fourth
  - type: text
    content: ' beast was killed, and its body was thrown into the blazing fire. '
  '12':
  - type: text
    content: As for the rest of the beasts, their dominion had been taken away, but they were allowed to continue living for an appointed time.
  '13':
  - type: text
    content: 'Then, as I was looking on in my night visions, suddenly I saw one like a son of man '
  - type: note
    content: The phrase “son of man” is found in the Bible nearly two hundred times. Eighty-four times it is found in the Gospels describing Jesus Christ. Although the phrase “son of man” implies a human being, in this reference, he is much more than a human. It is a Messianic title for our Lord Jesus. He is not “a son of a man,” but the Son of Man.
  - type: text
    content: 'coming in the midst of the clouds of heaven. '
  - type: note
    content: See Ps. 104:3; Matt. 24:30; 26:64; Mark 13:26; Rev. 1:7; 14:14.
  - type: text
    content: 'He was ushered into the presence of the Ancient of Days and presented before him. '
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: the Ancient of Days
  - type: text
    content: ' conferred upon him dominion, glory, and kingship. People of every nation and language group worshiped him. His dominion is everlasting and will never pass away, and his kingdom will never be destroyed.'
  - type: heading
    content: Interpretation of the Vision
  '15':
  - type: text
    content: 'As for me, Daniel, I was terrified by these night visions, and my spirit '
  - type: note
    content: Or “my spirit in its sheath [body],” that is, the spirit contained in his body. The Septuagint reads, “my spirit was troubled in these things.”
  - type: text
    content: 'was deeply disturbed by all that I saw. '
  '16':
  - type: text
    content: 'I went up to one '
  - type: note
    content: See v. 10. This “one” was possibly an angel. It was also an angel who interpreted the prophet Zechariah’s dreams (see Zech. 1:8–9, 18–21; 2:1–5).
  - type: text
    content: 'who was standing there and asked him to explain the true meaning of what I had witnessed. So he gave me the interpretation:'
  '17':
  - type: text
    content: '“These four great beasts represent four empires '
  - type: note
    content: Or “kings.” One Aramaic manuscript along with the ancient Greek and Latin have “kingdoms.”
  - type: text
    content: 'that will rise to power over the earth. '
  '18':
  - type: text
    content: 'But after them, the holy ones, the most high ones, '
  - type: note
    content: Or “exalted ones.” The Aramaic is clearly plural, thus, “most high ones.” Some linguists see this as a “plural of majesty” that could be translated in the singular “the holy ones of the Most High.” However, in every other reference to God in chs. 2–7, the phrase “Most High” is singular. Indeed, God’s saints today have been raised up to sit in the heavenly realms with Jesus Christ (see Rom. 8:30; Eph. 2:6; Col. 3:1–2; Rev. 3:21). Every believer is a “holy one [saint]” and one of the “most high ones” who receive the kingdom of God.
  - type: text
    content: 'will receive the kingdom and possess it forever. '
  - type: text
    content: Yes
  - type: text
    content: ', forever and ever!”'
  '19':
  - type: text
    content: 'But I was curious to know more about the fourth beast. It was much different from all the others—the terrifying, dreadful beast. It crushed its victims with claws of bronze and with teeth of iron and then trampled on them. '
  '2':
  - type: text
    content: 'Suddenly, in my night vision, I saw '
  - type: note
    content: Or literally “I was looking in my vision by night, and behold.”
  - type: text
    content: 'the four winds of the heavens '
  - type: note
    content: The four winds might be a metaphor of angelic activity. Compare the imagery of the visions of Ezek. 1 and Zech. 6:5.
  - type: text
    content: 'burst forth upon the great sea. '
  - type: note
    content: The “great sea” symbolically represents the “sea of humanity.”
  '20':
  - type: text
    content: 'Also, '
  - type: text
    content: I wanted to know
  - type: text
    content: ' more about the ten horns on its head and the more prominent horn that sprouted up and uprooted three of the previous horns. '
  - type: text
    content: I wanted to gain insight
  - type: text
    content: ' '
  - type: note
    content: Verses 19–20 comprise one long, complicated Aramaic sentence. In this translation, it has been broken into five sentences for the sake of clarity in the English narrative.
  - type: text
    content: 'about this conspicuous little horn, more imposing than the others, with eyes in it and a mouth speaking arrogantly. '
  '21':
  - type: text
    content: 'As I watched, that horn fought against the holy ones '
  - type: note
    content: That is, believers or “saints.” See v. 27.
  - type: text
    content: 'and was defeating them '
  '22':
  - type: text
    content: 'until the Everlasting One came on the scene. He handed judgment '
  - type: note
    content: The day is coming when the saints of the Most High will judge angels and rule the nations with Christ. See 1 Cor. 6:2–3; Rev. 2:26–27; 3:21; 20:4–6.
  - type: text
    content: over to the saints of the Most High, and dominion was given to the holy ones of the Most High. Then the time came when the holy ones took possession of the kingdom.
  '23':
  - type: text
    content: 'He gave me the interpretation: “The fourth beast means that there will be a fourth kingdom on the earth, different from all the other kingdoms. It will devour the whole earth, trample it down, and shatter it to pieces. '
  '24':
  - type: text
    content: 'And the ten horns are ten kings that will arise from that '
  - type: text
    content: fourth
  - type: text
    content: ' kingdom, '
  - type: text
    content: and they will succeed each other
  - type: text
    content: '. But after them, an '
  - type: text
    content: eleventh
  - type: text
    content: ' king will rise to power. He will be different from the previous ones and will subdue '
  - type: note
    content: Or “wear away” or “bring low.” Some scholars consider this eleventh king to be Antiochus IV Epiphanes (175–164 BC), who followed a succession of rulers of the Seleucid dynasty. He eventually banned the observance of the Sabbath and feast days (see v. 25).
  - type: text
    content: 'three of those kings. '
  '25':
  - type: text
    content: 'He will speak '
  - type: text
    content: blasphemous
  - type: text
    content: ' words against the Most High and try to wear down '
  - type: note
    content: The Aramaic word yeballeʾ found here is often used to mean wearing out clothing. The sense is that this king will harass and oppress God’s people until they feel defeated and worn out. Surely, this is the scheme of the enemy of God’s people—to wear them out and harass them with continuous oppression.
  - type: text
    content: 'the holy ones of the Most High. He will try to alter the set periods of time '
  - type: note
    content: Or “appointed events.”
  - type: text
    content: 'and change '
  - type: text
    content: God’s
  - type: text
    content: ' decree, '
  - type: note
    content: Although most translations have “change the law,” the Aramaic word dat used here carries the primary sense of “decree.” It is not the formal equivalent word for torah (the Hebrew word for law); dat is exclusively an Aramaic term found in the Persian period (ca. mid-sixth–mid-fourth centuries BC). The little horn is trying to alter God’s decree of an everlasting kingdom given to the saints of the Most High to possess.
  - type: text
    content: 'and the saints will be subjected to '
  - type: text
    content: his power
  - type: text
    content: ' '
  - type: note
    content: Or “given to him.” But in a divine reversal, God will “give” his kingdom to the saints. The saints who were once oppressed are given the charge and authority of the kingdom.
  - type: text
    content: 'for a time, times, and half a time. '
  - type: note
    content: If the “time” is equal to a year, then this would be three and a half years.
  '26':
  - type: text
    content: 'But when the '
  - type: text
    content: heavenly
  - type: text
    content: ' court convenes, his ruling power will be stripped '
  - type: text
    content: from him
  - type: text
    content: '. His authority will be abolished and destroyed forever. '
  '27':
  - type: text
    content: Then the Most High will give to his holy ones the kingdom and the dominion and the grandeur of all the kingdoms on earth. All rulers and authorities will serve and obey him, for his kingdom is everlasting.”
  '28':
  - type: text
    content: 'That is all that I saw in my dream. '
  - type: note
    content: Or “This is the end of the matter.”
  - type: text
    content: I, Daniel, was so greatly terrified by my thoughts that my face turned pale, but I hid the vision in my heart.
  - type: note
    content: Or “kept the matter to myself.” Here ends the Aramaic portion of the book, and the Hebrew resumes at ch. 8 to the end of the book.
  '3':
  - type: text
    content: 'Then emerging from the '
  - type: text
    content: tossing
  - type: text
    content: ' sea came four immense beasts, each different from the others.'
  - type: note
    content: 'Daniel’s vision is an impressive overview of human history. God has a plan for the world. History is his story. Many scholars view the four beasts as representing empires, not people: the Babylonian (the winged lion; see v. 4), the Medo-Persian (the bear; see v. 5), the Greek (the tiger; see v. 6), and the Roman (the apocalyptic beast; see vv. 7–8). Daniel’s vision was an overview of nearly one thousand years of the future. Only God’s supernatural knowledge could make this known to Daniel.'
  '4':
  - type: text
    content: 'The first one was like a winged lion, with wings like an eagle. '
  - type: note
    content: The imagery of the winged lion pictures Babylon and its swift attacks against its neighboring nations (see Jer. 49:19, 22).
  - type: text
    content: 'As I watched, its wings were plucked off, '
  - type: note
    content: Babylon, the winged lion, had its wings plucked off during the season of insanity of its king, Nebuchadnezzar (ch. 4). Nebuchadnezzar’s restoration to sanity and to his rulership is described as being given a “human heart.” His wings stretching upward were “plucked off” for a season until he acknowledged the Most High God.
  - type: text
    content: and it was lifted up from the earth, standing on two feet like a person, and it was given a human heart.
  '5':
  - type: text
    content: 'Then the second beast I saw resembled a bear. It was half crouching '
  - type: note
    content: Or “raised up on one side.”
  - type: text
    content: 'and had three ribs '
  - type: note
    content: 'Some Jewish scholars interpret the “three ribs” as three Persian kings: Cyrus, Ahasuerus, and Darius.'
  - type: text
    content: clenched between its fangs. It was told, “Stand up and devour more flesh.”
  '6':
  - type: text
    content: 'After that, as I looked on, behold, there was another one that looked like a tiger. '
  - type: note
    content: Or literally “striped cat” or “leopard.” Most scholars interpret the “tiger” or “leopard” as the Greek Empire led by Alexander the Great.
  - type: text
    content: 'On its back were four '
  - type: text
    content: large
  - type: text
    content: ' wings of a bird. This beast had four heads, '
  - type: note
    content: 'The four heads are possibly a reference to the four generals who took over the Greek Empire after the death of Alexander. Others see the four heads as the four headwaters or beginnings of the Greek Empire: Alexander’s conquest, Greek Egypt, Greek Syria, and the Hellenistic period of the flourishing of the Greek language and culture.'
  - type: text
    content: and it was given authority for dominion.
  '7':
  - type: text
    content: 'Then in my night vision, behold, I saw a fourth beast! It was dreadful, terrifying, and incredibly powerful. It had huge iron teeth '
  - type: note
    content: Some manuscript evidence adds “and claws of bronze.” The word order is “and teeth of iron [were] hers, great ones devouring and crushing,” which means it could be translated, “It had large iron teeth used for devouring and crushing great ones [great kingdoms].”
  - type: text
    content: 'used for crushing and devouring '
  - type: text
    content: its victims
  - type: text
    content: '. With its massive feet it trampled on what was left. It had ten horns '
  - type: note
    content: Horns are a biblical symbol of authority, power, and rulership. “Ten horns” is possibly a reference to the first ten rulers over the Roman Empire, which correspond to the ten toes of the statue of ch. 2. The ten horns (rulers) of the Roman Empire include Julius Caesar, Augustus Caesar, Tiberius Caesar, Gaius Caesar (Caligula), Claudius Caesar, Nero Claudius Caesar, Galba, Otho, Vitellius, and Vespasian.
  - type: text
    content: and was totally different from the other beasts.
  '8':
  - type: text
    content: 'As I was wondering about the horns, suddenly, another little horn '
  - type: note
    content: Some scholars view this “little horn” as a possible reference to Herod the Great and the line of Herods that came after him. The Herods were different from other Roman leaders, for they were Edomites and circumcised Jews.
  - type: text
    content: 'sprouted up among them and tore out by the roots three of the previous horns to make room for it. '
  - type: note
    content: See v. 24. There are multiple interpretations for the three uprooted horns. Some see this as three emperors, three kingdoms, or three types of government. If indeed the “little horn” was Herod the Great (and the Herods after him), then the three horns uprooted by him were possibly Augustus (who tried to kill the Jews), Tiberius (who was involved in killing Jesus), and Claudius (who killed James).
  - type: text
    content: On this little horn there were eyes like that of a man and a mouth boasting arrogantly.
  - type: note
    content: Or “a mouth speaking great things.”
  - type: heading
    content: The Courtroom of Heaven
  '9':
  - type: text
    content: 'As I looked on, '
  - type: text
    content: I observed a heavenly courtroom
  - type: text
    content: '. '
  - type: text
    content: Various
  - type: text
    content: ' thrones were being arranged '
  - type: note
    content: These thrones were apparently set up for a council of judges. Ancient Jewish tradition believes that God’s holy ones have the privilege of sitting at his side to participate in judgment (see Matt. 19:28; Luke 22:30; Rev. 3:21; 20:4).
  - type: text
    content: 'until the Ancient of Days took his seat. His clothing was as white as snow, and his hair was white like perfectly clean wool. His throne was '
  - type: text
    content: a tempest of
  - type: text
    content: ' fiery flames, '
  - type: note
    content: See Gen. 15:17; Ex. 3:2; 19:18.
  - type: text
    content: 'set upon wheels of blazing fire. '
  - type: note
    content: This is Yahweh’s chariot-throne. It is important to note that God’s throne is not always stationary but in motion. It sits upon wheels of fire. See Ezek. 1. God’s government (throne) is meant to come to the earth. See Pss. 58:11; 103:19.
