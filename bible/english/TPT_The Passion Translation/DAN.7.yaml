        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that this vision happened in 554 BC, which would be prior to the events of ch.
      - type: usfm
        marker: ft
