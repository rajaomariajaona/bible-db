document_id: 2CO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Servants of the New Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Are we beginning to sound like those who speak highly of themselves? Do you really need letters of recommendation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to validate our ministry
  - type: text
    text: ', like others do? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently, there were some insecure and phony ministers who would carry forged letters of recommendation in an attempt to validate their ministry. Paul’s supernatural ministry needed no such letter of recommendation.
    marker-yv: yv-n
  - type: text
    text: 'Do we really need your letter of endorsement? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Of course not!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For your very lives are our “letters of recommendation,” permanently engraved on our hearts, recognized and read by everybody. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As a result of our ministry, you are living letters written by Christ, not with ink but by the Spirit of the living God—not carved onto stone tablets '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 24:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 31:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 34:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 9:10–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Jer. 38:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (LXX).
    marker-yv: yv-n
  - type: text
    text: 'but on the tablets of tender hearts. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We carry this confidence in our hearts because of our union with Christ before God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yet we don’t see ourselves as capable enough to do anything in our own strength, for our true competence flows from God’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: empowering presence
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He alone makes us adequate ministers who are focused on an entirely new covenant. Our ministry is not based on the letter of the law but through the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: power of the
  - type: text
    text: ' Spirit. The letter of the law kills, but the Spirit pours out life.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To illustrate this, on the day when the law was given by Moses, three thousand people were killed, but on the day the Spirit was poured out at Pentecost, three thousand people received new life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 32:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 2:41
      metadata:
        usfm: ACT.2.41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Glorious Ministry of the Spirit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Even the ministry that was characterized by chiseled letters on stone tablets came with a dazzling measure of glory, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Glory
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glorious
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is mentioned fourteen times in this chapter. No chapter in the Bible refers to God’s glory more than
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 3
      metadata:
        usfm: 2CO.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'though it produced death. The Israelites couldn’t bear to gaze on the glowing face of Moses '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: because of the radiant splendor shining from his countenance—a glory destined to fade away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yet how much more radiant is this new and glorious ministry of the Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that shines from us
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For if the former ministry of condemnation was ushered in with a measure of glory, how much more does the ministry that imparts righteousness far excel in glory. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The contrast here is between a ministry that brings awareness of sin and leads to condemnation and a new ministry that confirms to us that we are made righteous and innocent by the work of the cross and the grace of the Spirit.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'What once was glorious no longer holds any glory because of the increasingly '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and implied contextually in the Greek.
    marker-yv: yv-n
  - type: text
    text: 'greater glory that has replaced it. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The fading ministry came with a portion of glory, but now we embrace the unfading ministry of a permanent impartation of glory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then, with this amazing hope living in us, we step out in freedom and boldness to speak the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We are not like Moses, who used a veil to hide the glory to keep the Israelites from staring at him as it faded away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the end of what was fading.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Their minds were closed and hardened, for even to this day that same veil comes over their minds when they hear the words of the former covenant. The veil has not yet been lifted from them, for it is only eliminated when one is joined to the Messiah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So until now, whenever the Old Testament '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Moses,” an obvious metonymy.
    marker-yv: yv-n
  - type: text
    text: 'is being read, the same blinding comes over their hearts. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the moment one turns to the Lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    marker-yv: yv-n
  - type: text
    text: 'with an open heart, the veil is lifted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and they see
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now, the “Lord” '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I’m referring to
  - type: text
    text: ' is the Holy Spirit, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is teaching us that not every time the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: appears does it mean Jesus Christ. Here we see that “the Lord” refers to the Holy Spirit. When the Holy Spirit is ruling, speaking, convincing us of truth, there is freedom. Jesus calls the Holy Spirit the Lord of the harvest who prepares the workers and the harvest fields, sending them out into specific places for the reaping of souls. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 9:38
      metadata:
        usfm: MAT.9.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and wherever he is Lord, there is freedom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'We can all draw close to him with the veil removed from our faces. And with no veil we all become like mirrors who brightly reflect the glory of the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “We all, with unveiled faces, behold the glory of the Lord as in a mirror.”
    marker-yv: yv-n
  - type: text
    text: 'We are being transfigured '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: metamorphoō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the same word used for Jesus’ being transfigured on the mountain (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 17:2
      metadata:
        usfm: MAT.17.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 9:2
      metadata:
        usfm: MRK.9.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and for our transfiguration through the renewing of the thoughts of our minds (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 12:2
      metadata:
        usfm: ROM.12.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'into his very image as we move from one brighter level of glory to another. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The source of our transformation comes from Christ’s glory, and the destination we are brought to is more glory. The transforming glory is the result of gazing upon the beauty and splendor of Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: And this glorious transfiguration comes from the Lord, who is the Spirit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Notice the ten aspects of New Testament ministry given by Paul: (1) It is based on the triumph of Christ over every power of darkness ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:14
      metadata:
        usfm: 2CO.2.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (2) It diffuses the fragrant aroma of Christ everywhere (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:15–16
      metadata:
        usfm: 2CO.2.15+2CO.2.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (3) It refuses to water down the Word of God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:17
      metadata:
        usfm: 2CO.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (4) It produces living letters of Christ (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:3
      metadata:
        usfm: 2CO.3.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (5) It is not based on the clever abilities of men but God’s empowering presence (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:6
      metadata:
        usfm: 2CO.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (6) It imparts life (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:6
      metadata:
        usfm: 2CO.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (7) It flows from the Holy Spirit (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:8
      metadata:
        usfm: 2CO.3.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17–18
      metadata:
        usfm: 2CO.3.17+2CO.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (8) It imparts righteousness (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: 2CO.3.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (9) It contains a greater glory than the law (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:10–11
      metadata:
        usfm: 2CO.3.10+2CO.3.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (10) It brings the transfiguration of believers into greater levels of glory (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:18
      metadata:
        usfm: 2CO.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
