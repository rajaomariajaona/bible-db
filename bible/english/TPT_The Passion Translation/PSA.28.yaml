segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: My Strength and Shield
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: David’s poetic praise to God
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Defender
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I’m pleading with you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', help me!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm was likely written when David was exiled because of the rebellion of his son Absalom. He was not longing and looking for his throne but for God’s throne (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PSA.28.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t close your ears to my cry, for you’re my defender.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my rocky summit.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you continue to remain aloof and refuse to answer me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I might as well give up and die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my cry for help as I turn toward your mercy seat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I lift my hands toward your sacred sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Don’t allow me to be punished along with the wicked—
- type: usfm
  marker: q1
  children:
  - type: text
    text: these hypocrites who speak sweetly to their neighbors’ faces
- type: usfm
  marker: q1
  children:
  - type: text
    text: while holding evil against them in their hearts.
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Vindication
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Go ahead and punish them as they deserve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be paid back for all their evil plans
- type: usfm
  marker: q1
  children:
  - type: text
    text: in proportion to their wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Since they don’t care anything about you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or understand the great things you’ve done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'take them down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like an old building being demolished
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: never again to be rebuilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', may your name be blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and built up
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you have answered my passionate cry for mercy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Strength
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is my strength and my wraparound shield.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I fully trust in you, help is on the way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I jump for joy and burst forth with ecstatic, passionate praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing songs of what you mean to me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You will be the inner strength of all your people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the mighty protector of all,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the saving strength for all your anointed ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Save your people whom you love, and bless your chosen ones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be our shepherd leading us forward,
- type: usfm
  marker: q1
  children:
  - type: text
    text: forever carrying us in your arms!
