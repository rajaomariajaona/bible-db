document_id: PSA.28,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: My Strength and Shield
  - type: text
    content: David’s poetic praise to God
  - type: heading
    content: My Defender
  - type: text
    content: 'I’m pleading with you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', help me!'
  - type: note
    content: This psalm was likely written when David was exiled because of the rebellion of his son Absalom. He was not longing and looking for his throne but for God’s throne (see v. 2).
  - type: text
    content: Don’t close your ears to my cry, for you’re my defender.
  - type: note
    content: Or “my rocky summit.”
  - type: text
    content: If you continue to remain aloof and refuse to answer me,
  - type: text
    content: I might as well give up and die.
  '2':
  - type: text
    content: Hear my cry for help as I turn toward your mercy seat,
  - type: text
    content: as I lift my hands toward your sacred sanctuary.
  '3':
  - type: text
    content: Don’t allow me to be punished along with the wicked—
  - type: text
    content: these hypocrites who speak sweetly to their neighbors’ faces
  - type: text
    content: while holding evil against them in their hearts.
  - type: heading
    content: My Vindication
  '4':
  - type: text
    content: Go ahead and punish them as they deserve.
  - type: text
    content: Let them be paid back for all their evil plans
  - type: text
    content: in proportion to their wickedness.
  '5':
  - type: text
    content: Since they don’t care anything about you,
  - type: text
    content: or understand the great things you’ve done,
  - type: text
    content: 'take them down '
  - type: text
    content: like an old building being demolished
  - type: text
    content: ','
  - type: text
    content: never again to be rebuilt.
  '6':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ', may your name be blessed '
  - type: text
    content: and built up
  - type: text
    content: '!'
  - type: text
    content: For you have answered my passionate cry for mercy.
  - type: heading
    content: My Strength
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ' is my strength and my wraparound shield.'
  - type: text
    content: When I fully trust in you, help is on the way.
  - type: text
    content: I jump for joy and burst forth with ecstatic, passionate praise!
  - type: text
    content: I will sing songs of what you mean to me!
  '8':
  - type: text
    content: You will be the inner strength of all your people,
  - type: text
    content: Yahweh
  - type: text
    content: ', the mighty protector of all,'
  - type: text
    content: and the saving strength for all your anointed ones.
  '9':
  - type: text
    content: Save your people whom you love, and bless your chosen ones.
  - type: text
    content: Be our shepherd leading us forward,
  - type: text
    content: forever carrying us in your arms!
