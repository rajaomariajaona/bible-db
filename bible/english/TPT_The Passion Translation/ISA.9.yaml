        text: . This glorious light includes Jesus’ teachings, his miracles, and his pure life lived before the Father. Jesus Christ is a light of rescue for the lost, comfort for the hurting, wholeness for the broken, and escape for the captive. It is the light of joy, the light of revelation, the light of deliverance. Jesus’ birth signaled an end of night and the beginning of morning.
