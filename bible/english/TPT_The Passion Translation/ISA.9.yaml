      - type: text
        text: This was the region that first went into captivity during the Assyrian invasion in 734–733 BC. Yet this land was the first to enjoy the blessings of the ministry of Jesus, for his works were done among them. Their “honor” would be to host the life and miracles of the Prince of Glory, the Messiah. Isaiah is prophesying the ministry of Jesus that would reverse the curse over that region. In the place where devastation had robbed hope, he will appear. He chooses the places in our lives where we have the most disgrace and shame, and there he shines his light. Our past failures become prophecies of a future victory.
    marker-yv: yv-n
