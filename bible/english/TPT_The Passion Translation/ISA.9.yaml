  - type: text
    text: 'In a single day, the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' cut off from Israel both head and tail, palm branch and reed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The elders and dignitaries are the head, and the prophet who teaches lies is the tail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The leaders have led them astray, and the citizens are left in confusion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: That is why the Lord did not show pity to the young people or have compassion on their orphans and widows. For everyone was godless and did evil and each mouth spewed out wickedness. Therefore, the Lord’s anger has not subsided, and his hand is poised to strike them again.
