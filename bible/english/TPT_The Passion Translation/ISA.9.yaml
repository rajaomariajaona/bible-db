document_id: ISA.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Son Is Born
  - type: text
    content: 'No more gloom for those who are in distress! Although the Lord greatly humbled the regions of Zebulun and Naphtali, '
  - type: note
    content: This was the region that first went into captivity during the Assyrian invasion in 734–733 BC. Yet this land was the first to enjoy the blessings of the ministry of Jesus, for his works were done among them. Their “honor” would be to host the life and miracles of the Prince of Glory, the Messiah. Isaiah is prophesying the ministry of Jesus that would reverse the curse over that region. In the place where devastation had robbed hope, he will appear. He chooses the places in our lives where we have the most disgrace and shame, and there he shines his light. Our past failures become prophecies of a future victory.
  - type: text
    content: 'he will one day bestow upon them great honor—from the Mediterranean eastward to the other side of the Jordan '
  - type: note
    content: That is, Gilead or Transjordan.
  - type: text
    content: and throughout the Galilee of the gentiles.
  '10':
  - type: text
    content: '“Our brick walls may have crumbled, but we will rebuild them with dressed stones. '
  - type: text
    content: Invading armies
  - type: text
    content: ' may have cut down our sycamore trees, but we will plant cedars in their place!”'
  - type: note
    content: Their attitude was basically “Even if God sends judgment, we will start over and be stronger and more prosperous than before,” not realizing that God will not lift his hand of judgment until they humble their hearts.
  '11':
  - type: text
    content: 'So the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' stirred up their enemies and strengthened Rezin’s foes, '
  - type: note
    content: That is, the Assyrians. The Septuagint reads “the enemies of Mount Zion.”
  - type: text
    content: 'and they came against the people. '
  '12':
  - type: text
    content: 'Syrians '
  - type: note
    content: Or “Arameans,” a confederacy of Aramaic-speaking people known as Aram (modern-day Syria).
  - type: text
    content: 'on the east, Philistines on the west—they came with bared teeth '
  - type: note
    content: Or “with their whole mouth.”
  - type: text
    content: 'and devoured Israel. Yet despite all this, his anger did not subside, and his hand '
  - type: text
    content: of judgment
  - type: text
    content: ' is poised to strike them again. '
  '13':
  - type: text
    content: 'For the people did not repent and turn to the one who struck them or seek the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: heading
    content: Judgment Coming to the Leaders
  '14':
  - type: text
    content: 'In a single day, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' cut off from Israel both head and tail, palm branch and reed. '
  '15':
  - type: text
    content: 'The elders and dignitaries are the head, and the prophet who teaches lies is the tail. '
  '16':
  - type: text
    content: 'The leaders have led them astray, and the citizens are left in confusion. '
  '17':
  - type: text
    content: That is why the Lord did not show pity to the young people or have compassion on their orphans and widows. For everyone was godless and did evil and each mouth spewed out wickedness. Therefore, the Lord’s anger has not subsided, and his hand is poised to strike them again.
  - type: heading
    content: Israel’s Tribes Turn Against One Another
  '18':
  - type: text
    content: 'Surely wickedness burned like '
  - type: text
    content: an out-of-control
  - type: text
    content: ' fire, consuming thorns and thistles. It set ablaze the thickets of the forest with flames swirling upward in columns of smoke. '
  '19':
  - type: text
    content: 'The land was scorched '
  - type: note
    content: The Hebrew word n‘étam is a hapax legomenon taken from an Arabic word for “dark.” Its Hebrew meaning is uncertain and could be rendered “scorched,” “shaken,” or “darkened.”
  - type: text
    content: 'because of the anger of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. The people themselves became fuel for the fire, and no one showed compassion toward another. '
  '2':
  - type: text
    content: Those who walked in darkness
  - type: note
    content: See Pss. 82:5; 107:10; Isa. 8:20.
  - type: text
    content: 'have seen a radiant light '
  - type: text
    content: shining upon them
  - type: text
    content: .
  - type: note
    content: Just as darkness and night have boundaries (see Gen. 1:4), so the Lord will cause gloom to end and the shadows to flee. He is the one who says, “It will last this long and not a day longer.” God begins in darkness and turns the darkness into the day. Even the darkest thing in us will be bathed in his glory-light.
  - type: text
    content: They once lived in the shadows of death,
  - type: text
    content: but now a glorious light has dawned!
  - type: note
    content: See Matt. 4:15–16; Eph. 5:8. This glorious light includes Jesus’ teachings, his miracles, and his pure life lived before the Father. Jesus Christ is a light of rescue for the lost, comfort for the hurting, wholeness for the broken, and escape for the captive. It is the light of joy, the light of revelation, the light of deliverance. Jesus’ birth signaled an end of night and the beginning of morning.
  '20':
  - type: text
    content: 'With their right hands they snatched what belonged to others, yet remained hungry. With their left hands they stole food, yet they were starving '
  - type: note
    content: This is a figurative way to describe civil war. Although they all belonged to Israel’s tribes, they were now turning against one another.
  - type: text
    content: 'and even ate their own offspring! '
  - type: note
    content: Or “they ate the flesh of their own arm.” This could be a figure of speech for harassing and destroying one another. See also Jer. 19:9.
  '21':
  - type: text
    content: 'Manasseh devoured Ephraim, and Ephraim Manasseh, and together they turned against Judah. '
  - type: note
    content: See 2 Chron. 28:6–15.
  - type: text
    content: Yet despite all this, the Lord’s anger has not subsided, and his hand is poised to strike them again.
  - type: note
    content: Or “his hand is still reaching out.”
  '3':
  - type: text
    content: Lord
  - type: text
    content: ', you have multiplied the nation'
  - type: text
    content: and given them overwhelming joy!
  - type: text
    content: They are ecstatic in your presence
  - type: text
    content: and rejoice like those who bring in a great harvest
  - type: note
    content: As the light of Jesus shines on the earth, it will bring in a harvest of joy and rejoicing. The people of God are about to arise and spoil the kingdom of darkness, even as Israel spoiled Egypt and went out rejoicing. God will cause our joy to overflow like those distributing loot after a battle. Great will be the conversions, the increase, and our rejoicing. Many sons will be brought into glory as the increasing Light of Dawn appears (see Heb. 2:10). With both harvest and victory in battle, people rejoice in what God has done.
  - type: text
    content: and those who divide up the spoils of victory!
  - type: note
    content: The Masoretic text reads “you have magnified joy to everyone who receives the Light.” A sign of the moving of God among us to fulfill this promise is an outbreak of joy! He fills our mouths with laughter as a sign that the great ingathering of the harvest is here (Pss. 119:162; 126). The phrase “they are ecstatic in your presence” refers to the heart of worship God is releasing today. The gospel will always bring joy, and those who receive good news will rejoice (see Ps. 67:4; Acts 8:8). This is the joy of the Feast of Tabernacles. The two great joys of the human heart come at a time of harvest and a time of victory. Human celebration at these two times knows no bounds. As the increase is brought in, victory is experienced. What greater joy is there in heaven and earth than when souls are saved?
  '4':
  - type: text
    content: For you have broken the chains
  - type: note
    content: Or “burdensome yoke.”
  - type: text
    content: that have bound your people
  - type: text
    content: and lifted off the heavy bar across their shoulders,
  - type: text
    content: the rod the oppressor used against them.
  - type: text
    content: You have shattered all their bondage,
  - type: note
    content: The words chains, bar, and rod all represent oppression and bondage.
  - type: text
    content: just as you did when Midian’s armies were defeated.
  '5':
  - type: text
    content: Every boot of marching troops
  - type: text
    content: and every uniform caked with blood
  - type: text
    content: will be burned as fuel for the fire.
  - type: heading
    content: The Wonderful One
  '6':
  - type: text
    content: A child has been born for us;
  - type: text
    content: a son has been given to us.
  - type: note
    content: The word child speaks of Christ’s humanity, and the word son points to his eternal deity. This son would be born in a time of darkness, but he will bring the light of a new day to the hearts of men.
  - type: text
    content: 'The responsibility of '
  - type: text
    content: complete
  - type: text
    content: ' dominion'
  - type: text
    content: 'will rest on his shoulders, and his name will be:'
  - type: text
    content: the Wonderful One,
  - type: text
    content: the Extraordinary Strategist,
  - type: text
    content: the Mighty God,
  - type: note
    content: Or “the God of battle” or “Champion-God.” See Ps. 45:3.
  - type: text
    content: the Father of Eternity,
  - type: text
    content: 'the Prince '
  - type: note
    content: It is possible to render v. 6 as “A Wonderful Counselor is the Mighty God! The Everlasting Father is a Prince of Peace.”
  - type: text
    content: of Peace!
  '7':
  - type: text
    content: Great and vast is his dominion.
  - type: note
    content: Or “His authority will continually expand.” The Hebrew word misrah, found only in this verse and in v. 6, can be translated “empire,” “governmental authority,” or “dominion.”
  - type: text
    content: He will bring immeasurable peace and prosperity.
  - type: note
    content: The Hebrew word shalom can be translated “peace,” “prosperity,” “wholeness,” or “success.” Perhaps all of these concepts are included in the shalom Christ brings us.
  - type: text
    content: He will rule on David’s throne and over David’s kingdom
  - type: text
    content: to establish and uphold it by promoting justice and righteousness
  - type: text
    content: from this time forward and forevermore.
  - type: text
    content: 'The marvelous passion '
  - type: note
    content: Or “intense devotion.” See 2 Cor. 11:2.
  - type: text
    content: 'that the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies, has for his people
  - type: text
    content: will ensure that it is finished!
  - type: heading
    content: The Lord Judges Arrogance and Oppression
  '8':
  - type: text
    content: 'The Lord decreed a word against Jacob, and it brought calamity upon Israel. '
  '9':
  - type: text
    content: 'And all the people of Ephraim and Samaria knew of it. Their hearts filled with pride and they arrogantly boasted, '
