  - type: text
    text: Denunciation of Self-Serving Officials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is what the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the Commander of Angel Armies, has to say:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Go to Shebna, the treasurer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sōḵēn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a hapax legomenon) is uncertain, although most scholars view it as a word for a high government official in Hezekiah’s court, like a comptroller or perhaps a treasurer. In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shebna is mentioned as the king’s scribe or secretary. The name Shebna means “one who rests himself” or “one who is captive.” Shebna becomes a picture of the Adam-life (the spirit of anti-Christ) that seeks self-promotion. But God will replace our “Shebna” with Eliakim (the Christ-life within us; see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ISA.22.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This principle of replacement is found throughout the Scriptures (Isaac for Ishmael, David for Saul, Esther for Vashti, Samuel for Eli, Matthias for Judas, etc.).
    marker-yv: yv-n
  - type: text
    text: 'of the palace, and say to him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '‘What right do you have to be here, and who gave you permission? And why do you chisel out a tomb for yourself here, carving out your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: royal
  - type: text
    text: ' burial place, a dwelling place in the rock? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This elevated cliff may have been on the other side of the Kidron Valley, where the village of Silwan is now situated. Many rock-cut tombs have been discovered there. It appears that Shebna hewing out his tomb on a cliff was a gross display of self-promotion.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Watch out, O strong man, for the Lord is about to seize you and hurl you down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He will sling you around and around '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will wind you up over and over like a headdress [turban].”
    marker-yv: yv-n
  - type: text
    text: 'and throw you like a ball into a distant, barren land. There you will die, and all your splendid chariots will lie there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the dust
  - type: text
    text: '. You are a disgrace to your master’s house! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will kick you out of office and pull you down from your high position!’
