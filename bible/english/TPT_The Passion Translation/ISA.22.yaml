document_id: ISA.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy concerning Jerusalem
  - type: text
    content: 'A prophecy concerning the “Valley of Vision”:'
  - type: note
    content: Although Isaiah frequently refers to Jerusalem as a mountain (Mount Zion), he now sees it as a valley from which nothing can be seen. See Jer. 7:31–34; 21:13. Jerusalem is both on a hill and surrounded by hills. The Valley of Vision is where Yahweh imparts revelation.
  - type: text
    content: What’s happening with you?
  - type: text
    content: Why have you all gone up to the rooftops?
  '10':
  - type: text
    content: You inspected the houses in Jerusalem
  - type: text
    content: and tore some down to fortify the wall.
  '11':
  - type: text
    content: 'You built a reservoir '
  - type: note
    content: Or “mikveh,” a pool for an immersion ritual offering repentance and consecration. Mikveh can also be translated “ditch,” perhaps suggesting Hezekiah’s tunnel.
  - type: text
    content: between the two walls in the city
  - type: text
    content: to conserve water flowing down from the old pool,
  - type: text
    content: but you gave no thought to the one who made it.
  - type: text
    content: You did not trust in the one who formed it long ago!
  '12':
  - type: text
    content: 'In that day, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'called you to '
  - type: text
    content: repent
  - type: text
    content: ' with weeping and mourning'
  - type: text
    content: 'and to '
  - type: text
    content: show your remorse
  - type: text
    content: ' by shaving your heads'
  - type: text
    content: and wearing sackcloth.
  '13':
  - type: text
    content: But instead, you celebrated with joy and festivity,
  - type: text
    content: slaughtering the sheep and the fatted ox, saying,
  - type: text
    content: “We will feast on meat and drink much wine.
  - type: text
    content: Eat and drink, for tomorrow we die.”
  - type: note
    content: See 1 Cor. 15:32.
  '14':
  - type: text
    content: 'Revealed in my ears are the words of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'Commander of Angel Armies:'
  - type: text
    content: “Until your dying day, certainly I will not forgive this sin.”
  - type: note
    content: See 2 Kings 24:3–4.
  - type: heading
    content: Denunciation of Self-Serving Officials
  '15':
  - type: text
    content: 'This is what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies, has to say:'
  - type: text
    content: '“Go to Shebna, the treasurer '
  - type: note
    content: The meaning of the Hebrew word sōḵēn (a hapax legomenon) is uncertain, although most scholars view it as a word for a high government official in Hezekiah’s court, like a comptroller or perhaps a treasurer. In 2 Kings 18:18 Shebna is mentioned as the king’s scribe or secretary. The name Shebna means “one who rests himself” or “one who is captive.” Shebna becomes a picture of the Adam-life (the spirit of anti-Christ) that seeks self-promotion. But God will replace our “Shebna” with Eliakim (the Christ-life within us; see v. 20). This principle of replacement is found throughout the Scriptures (Isaac for Ishmael, David for Saul, Esther for Vashti, Samuel for Eli, Matthias for Judas, etc.).
  - type: text
    content: 'of the palace, and say to him, '
  '16':
  - type: text
    content: '‘What right do you have to be here, and who gave you permission? And why do you chisel out a tomb for yourself here, carving out your '
  - type: text
    content: royal
  - type: text
    content: ' burial place, a dwelling place in the rock? '
  - type: note
    content: This elevated cliff may have been on the other side of the Kidron Valley, where the village of Silwan is now situated. Many rock-cut tombs have been discovered there. It appears that Shebna hewing out his tomb on a cliff was a gross display of self-promotion.
  '17':
  - type: text
    content: 'Watch out, O strong man, for the Lord is about to seize you and hurl you down. '
  '18':
  - type: text
    content: 'He will sling you around and around '
  - type: note
    content: Or “I will wind you up over and over like a headdress [turban].”
  - type: text
    content: 'and throw you like a ball into a distant, barren land. There you will die, and all your splendid chariots will lie there '
  - type: text
    content: in the dust
  - type: text
    content: '. You are a disgrace to your master’s house! '
  '19':
  - type: text
    content: I will kick you out of office and pull you down from your high position!’
  '2':
  - type: text
    content: The whole city is in an uproar.
  - type: text
    content: What’s happened to the once happy, bustling city?
  - type: note
    content: See Ps. 48:1–2.
  - type: text
    content: 'The bodies of the slain '
  - type: text
    content: litter your streets
  - type: text
    content: .
  - type: text
    content: They were not slain by the sword on the battlefield
  - type: text
    content: but executed.
  '20':
  - type: text
    content: '“On that day, I will appoint my servant Eliakim, '
  - type: note
    content: Eliakim means “raised up by God.” He is a picture of the Lord Jesus, who was raised up by the power of God to rule over God’s house. It is possible that Eliakim was the high priest. The Hebrew text uses priestly terms for his clothing and sash. See Rev. 1:13.
  - type: text
    content: 'son of Hilkiah, '
  - type: note
    content: There was a high priest named Hilkiah who could be the Hilkiah mentioned here as father of Eliakim. Hilkiah means “my portion is Yahweh.” See 2 Kings 22:4.
  - type: text
    content: to take your place
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'I will '
  - type: text
    content: honor him
  - type: text
    content: ' by clothing him with your robe and binding your priestly sash upon him. I will transfer your authority into his hands, and he will be a father '
  - type: note
    content: As a father, Eliakim (Jesus) cares for, provides for, and loves his people. See Isa. 9:6–7.
  - type: text
    content: 'to those living in Jerusalem and to the people of Judah. '
  '22':
  - type: text
    content: 'I will place upon his shoulders the key '
  - type: text
    content: to the treasures
  - type: text
    content: ' of David’s palace. He will open doors that no one can shut, and he will shut doors that no one can open. '
  - type: note
    content: See Rev. 3:7. Eliakim (a picture of Jesus) was to have unlimited control. The doors he would open were doors of revelation, treasures, favor, and opportunity. When he would close those doors, no amount of human striving could open them.
  '23':
  - type: text
    content: 'I will strike a blow to him as a nail '
  - type: note
    content: The Hebrew word yathed can be translated as either “peg” or “nail.”
  - type: text
    content: 'in a secure '
  - type: note
    content: The Hebrew word ʾaman is most frequently translated “believe.” It is also a form of our word amen. God fastened Jesus on the cross, the sinner’s place of security, so that we would believe in him.
  - type: text
    content: 'place, and he will be a glorious throne of honor for his father’s house. '
  - type: note
    content: We are now seated with Christ as part of his Father’s house (sons and daughters). See Eph. 2:6; Rev. 3:21.
  '24':
  - type: text
    content: 'All the glory of his father’s house they will fasten to him, including offspring and branches '
  - type: text
    content: that will trust in him
  - type: text
    content: '. '
  - type: note
    content: Or “leaves” or “everyone small or great” (LXX). The Hebrew is uncertain.
  - type: text
    content: Every vessel, jar, and bowl, both small and great, will be fastened to him.
  '25':
  - type: text
    content: '“And in that day,” declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, “the nail fastened in a secure place will give way and be cut off and fall. And all the load hanging on it will fall off.” The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken.'
  - type: note
    content: That is, the Lord has decreed that even Eliakim’s authority and prominence will one day be cut off. Human authority is always temporary.
  '3':
  - type: text
    content: All your leaders have fled far away,
  - type: text
    content: and those who were found were taken captive—
  - type: text
    content: before they even shot a single arrow.
  - type: note
    content: Or “they were taken without their bows” or “the mighty ones among you fled away” (LXX).
  '4':
  - type: text
    content: That is why I said,
  - type: text
    content: “Leave me alone to weep my bitter tears.
  - type: text
    content: Don’t even try to comfort me
  - type: text
    content: 'concerning my beloved people '
  - type: note
    content: Or “the young women [daughters] of my people,” a metaphor to show how Isaiah loved the people of Jerusalem.
  - type: text
    content: being destroyed.”
  '5':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: has a day in store—a day of tumult, trampling,
  - type: text
    content: and terror in the “Valley of Vision.”
  - type: note
    content: Or “the valley of Zion” (LXX).
  - type: text
    content: It is a day when they breach the walls
  - type: note
    content: The Hebrew of this clause is uncertain. It can also be translated “the people shout.”
  - type: text
    content: 'and the people cry out to the mountain '
  - type: text
    content: of holiness
  - type: text
    content: .
  - type: note
    content: The word mountain is singular and refers to the Temple Mount, the mountain of holiness.
  '6':
  - type: text
    content: The soldiers of
  - type: text
    content: ' Elam attacked with chariots and cavalry,'
  - type: text
    content: armed with bows and arrows.
  - type: text
    content: The troops of
  - type: text
    content: ' Kir advanced with shields ready.'
  '7':
  - type: text
    content: Your lush valleys were full of chariots,
  - type: text
    content: and the horsemen took their stand at your gates.
  '8':
  - type: text
    content: He removed his protection from Judah.
  - type: note
    content: Or “He [the invading army] has taken away Judah’s covering.”
  - type: text
    content: In that day, you looked for additional weapons
  - type: text
    content: 'from the storehouse of the Forest '
  - type: text
    content: of Lebanon
  - type: text
    content: .
  - type: note
    content: Or “the House of the Forest,” likely the royal armory mentioned in 1 Kings 10:17. A forest is often a metaphor for humanity. See Song. 2:3; Isa. 55:12.
  '9':
  - type: text
    content: You discovered the many breaches in the City of David,
  - type: text
    content: and you collected water in the lower pool.
  - type: note
    content: Possibly the Pool of Siloam.
