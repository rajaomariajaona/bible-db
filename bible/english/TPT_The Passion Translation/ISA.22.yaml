  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were not slain by the sword on the battlefield
- type: usfm
  marker: q1
  children:
  - type: text
    text: but executed.
- type: usfm
  marker: q1
  children:
  - type: usfm
