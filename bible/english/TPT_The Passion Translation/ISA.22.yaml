- type: usfm
  marker: q1
  children:
  - type: text
    text: to conserve water flowing down from the old pool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but you gave no thought to the one who made it.
- type: usfm
  marker: q1
  children:
  - type: text
