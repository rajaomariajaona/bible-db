      children:
      - type: text
        text: People of
    - type: text
      text: ' Judah, your sins are engraved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: indelibly
    - type: text
      text: ' on the stone tablets of your hearts and on the horns of your altars, '
    - type: usfm
      marker: f
