      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Judah’s guilt had penetrated deep into the people’s hearts, into their innermost being. Sin was engraved where the blood should be. The horns of the altar (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and the tablets of our hearts (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 10:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) must be sprinkled with the blood of God’s sacrifice, Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: 'engraved with an iron pen and a chisel with a diamond point. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
