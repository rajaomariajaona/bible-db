  '1':
  - type: heading
    content: The Sin of Judah
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ': “'
  - type: text
    content: People of
  - type: text
    content: ' Judah, your sins are engraved '
  - type: text
    content: indelibly
  - type: text
    content: ' on the stone tablets of your hearts and on the horns of your altars, '
  - type: note
    content: Judah’s guilt had penetrated deep into the people’s hearts, into their innermost being. Sin was engraved where the blood should be. The horns of the altar (see Lev. 4:7) and the tablets of our hearts (see Heb. 10:22) must be sprinkled with the blood of God’s sacrifice, Jesus Christ.
  - type: text
    content: 'engraved with an iron pen and a chisel with a diamond point. '
  '10':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', probe the heart,'
  - type: note
    content: The hearts of men and women can be so deceitful that only God’s searching gaze can uncover and heal. See Deut. 8:2; 1 Sam. 16:7; Pss. 17:3; 26:2; Prov. 17:3; 21:2; Acts 1:24; 15:8; 1 John 3:20.
  - type: text
    content: and I thoroughly test the inner being
  - type: text
    content: to give to all people what they deserve according to their ways
  - type: text
    content: and based on their deeds.”
  '11':
  - type: text
    content: Go ahead and
  - type: text
    content: ' cheat others dishonestly,'
  - type: text
    content: but by mid-life, everything you’ve gained
  - type: text
    content: 'will fly away, '
  - type: note
    content: See Prov. 23:5.
  - type: text
    content: like birds hatched from stolen eggs.
  - type: text
    content: You will be proven a fool in the end.
  '12':
  - type: text
    content: Our sacred sanctuary is a throne
  - type: text
    content: 'radiating the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ', you are the only hope of Israel!'
  - type: text
    content: All who forsake you will be covered with shame.
  - type: text
    content: 'Those who turn away '
  - type: note
    content: The Hebrew for “turn away” is from the same triliteral root as the word for “faultfinder.” When we become a “faultfinder,” we are turning away from God. See Judah (Jude) 16.
  - type: text
    content: from you
  - type: text
    content: will be written in the dirt.
  - type: note
    content: See John 8:8 and footnote. Jesus wrote in the dirt before the accusers of the adulterous woman, illustrating what was prophesied by Jeremiah. To forsake the Hope of Israel is spiritual adultery. The men who wanted to stone the woman were spiritual adulterers, for they had forsaken Jesus, the only hope of Israel. Jesus showed that those who brought the adulterous woman to him were actually the ones who had broken their covenant vow, not just the woman who was thrown at his feet. We must never use the Word of God as a weapon to harm others but rather as a tool to share the love story of a God who longs for our hearts as a bridegroom longs for his bride.
  - type: text
    content: 'To forsake you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: is to forsake the fountain of living waters.
  - type: note
    content: Or “the fountain of life” (LXX).
  - type: heading
    content: Jeremiah’s Prayer for Help
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ', you '
  - type: text
    content: alone
  - type: text
    content: ' are my praise.'
  - type: text
    content: 'Heal me, and I will be '
  - type: text
    content: perfectly
  - type: text
    content: ' healed;'
  - type: text
    content: 'save me, and I will be '
  - type: text
    content: completely
  - type: text
    content: ' saved.'
  '15':
  - type: text
    content: 'Listen to what the people keep saying to me:'
  - type: text
    content: '“Where is the word of '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: note
    content: Jeremiah’s enemies were taunting him over a prophetic word of coming disaster that had not yet been fulfilled.
  - type: text
    content: Let it come to pass!”
  '16':
  - type: text
    content: But I have not stopped running after you
  - type: text
    content: 'and being a '
  - type: text
    content: 'true'
  - type: text
    content: ' shepherd.'
  - type: note
    content: Or “I have not run after you for the sake of disaster.” The difference between the Hebrew word for “shepherd” and the word for “disaster” is a vowel, which was missing from biblical Hebrew.
  - type: text
    content: 'Nor have I '
  - type: text
    content: secretly
  - type: text
    content: ' longed for the day of disaster.'
  - type: note
    content: See Amos 5:18.
  - type: text
    content: You know every word my lips have spoken,
  - type: text
    content: for they were spoken in your presence.
  '17':
  - type: text
    content: Do not cause me disappointment.
  - type: note
    content: Or “Don’t be a cause of terror.” The Hebrew word mechittah can mean either “terror” or “dismay [disappointment].”
  - type: text
    content: You are my safe place in a day of calamity.
  '18':
  - type: text
    content: Let those who persecute me be ashamed,
  - type: text
    content: and don’t let me be disgraced;
  - type: text
    content: let them be the ones who are disheartened
  - type: text
    content: and not me.
  - type: text
    content: Bring on them the day of disaster,
  - type: text
    content: and shatter them with double destruction.
  - type: heading
    content: The Sabbath
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: “Go and stand in the public gate of Jerusalem by which the kings of Judah enter and leave, and then go to all the gates of Jerusalem '
  '2':
  - type: text
    content: 'Your people have set up pagan altars to the goddess Asherah everywhere in your land—under large trees, on hills '
  '20':
  - type: text
    content: 'and preach to the people: ‘Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ', you kings and people of Judah, and all who live in Jerusalem who enter by these gates!'
  '21':
  - type: text
    content: “ ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: If you value your lives, stop carrying any loads '
  - type: note
    content: These loads would be merchandise meant to be sold and bartered with in the markets of Jerusalem. The meaning is that the people are to honor God first on that day; it is not a day to promote ourselves and sell our “goods.”
  - type: text
    content: 'on the Sabbath day, bringing them through the gates of Jerusalem. '
  '22':
  - type: text
    content: 'Nor shall you carry any loads out of your houses on the Sabbath day or do any work; rather, you must set apart that day to honor me as I commanded your ancestors. '
  '23':
  - type: text
    content: '(Yet they would not listen or obey; they stubbornly refused and would not obey or accept instruction.) '
  '24':
  - type: text
    content: 'If you listen to me, declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', and do not bring in any load through the gates of this city on the Sabbath day but observe the Sabbath day as set apart for me and do no work that day, '
  '25':
  - type: text
    content: 'then kings of David’s lineage will pass through the city’s gates. The kings and their officials will be riding in chariots or riding horses and will be accompanied by the people of Judah and the people of Jerusalem. There will always be people living here. '
  '26':
  - type: text
    content: 'Then people will come from the towns of Judah and from the villages around Jerusalem and from the land of Benjamin, from the lowlands west of Jerusalem, from the hill country, and from the southern desert of Judah, bringing burnt offerings and sacrifices, grain offerings and frankincense, '
  - type: note
    content: Frankincense was sprinkled, along with a compound of spices, on grain offerings. See Lev. 2:1–2.
  - type: text
    content: 'and offerings of thanksgiving '
  - type: note
    content: Or “bringing songs of thanksgiving.”
  - type: text
    content: 'to '
  - type: text
    content: Yahweh
  - type: text
    content: '’s house. '
  '27':
  - type: text
    content: But if you do not listen to me, if you treat the Sabbath as any other day on which you carry loads through the gates of Jerusalem, then I will set its gates on fire, and that fire will consume even the palaces of Jerusalem, and no one will be able to extinguish it!’ ”
  '3':
  - type: text
    content: 'and mountains, and in open fields. So, as punishment for all your sins, I will take your treasures—everything you own, including your altars '
  - type: note
    content: Or “high places.”
  - type: text
    content: '—and give them all to your enemies. '
  '4':
  - type: text
    content: 'You will forfeit, by your own deeds, '
  - type: note
    content: Or “Your own hands will have to let go.”
  - type: text
    content: 'the '
  - type: text
    content: wonderful
  - type: text
    content: ' inheritance I have given you to possess. I will make you serve your enemies in a foreign land you have never known, for you have kindled the flame of my anger, which will burn forever.”'
  - type: heading
    content: A Contrast of People
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me:'
  - type: text
    content: '“Even a strong person '
  - type: note
    content: The Hebrew word geber means a “strong man,” “champion,” or “hero.”
  - type: text
    content: is cursed
  - type: note
    content: 'The Hebrew language has at least six different words for “curse,” with each having a different nuance. They are: ʾarar, qalal, ʾala, qabab, naqab, zaʿam. The word here is ʾarar, which does not mean a magic incantation or evil omen but rather “banned,” “cut off [from purpose],” “hemmed in with obstacles,” or “isolated.” Such is the life that is lived in self-confidence without trusting in God. See R. Laird Harris, Gleason L. Archer, Jr., and Bruce K. Waltke, eds., Theological Wordbook of the Old Testament (Chicago: Moody Press, 2004), V. P. Hamilton, s.v. “168 (ʾarar).”'
  - type: text
    content: when his confidence rests in his own strength.
  - type: text
    content: To place your confidence in the strength of man
  - type: text
    content: means that you are turning your heart away from me.
  '6':
  - type: text
    content: That person is like a desert tumbleweed
  - type: text
    content: in a dry and dusty desert,
  - type: text
    content: in a rocky wilderness without inhabitant.
  - type: text
    content: Even when goodness is all around him, he won’t experience it.
  '7':
  - type: text
    content: '“I will bless '
  - type: text
    content: with happiness
  - type: text
    content: ' '
  - type: note
    content: The Hebraic concept of “blessing” involves prosperity, happiness, and contentment, and grants us the power to do Yahweh’s will for our lives. We will never be disappointed when we put all our trust in God alone. God plus nothing is all we need.
  - type: text
    content: the one who trusts in me,
  - type: text
    content: 'the one who trusts in me '
  - type: text
    content: alone
  - type: text
    content: .
  - type: note
    content: Or “Blessed is the man who trusts in Yahweh, and Yahweh becomes his trust.”
  '8':
  - type: text
    content: He is like a tree planted on the riverbank,
  - type: note
    content: There is beautiful similarity between vv. 5–8 and Ps. 1. See Ezek. 17:5, 8.
  - type: text
    content: extending its roots into streams of water.
  - type: text
    content: It does not fear when scorching heat comes,
  - type: text
    content: 'for its leaves remain fresh and '
  - type: text
    content: never fading
  - type: text
    content: even in a year of drought.
  - type: text
    content: 'It has no anxieties but continues to bear '
  - type: text
    content: luscious
  - type: text
    content: ' fruit.”'
  '9':
  - type: text
    content: 'There is nothing more deceitful '
  - type: note
    content: This is the Hebrew word ʿaqab, which comes from a verbal root that means “to take by the heel” or “to supplant” and from which we derive the name Jacob. Every person has a “Jacob life” living in them, a life that cannot be trusted, for it plots ways to get what it wants (see Phil. 2:21). Only the life of Christ within us is the life that pleases God (see Matt. 3:17; Phil. 1:21; 3:9).
  - type: text
    content: than the heart of man;
  - type: text
    content: who can understand it?
  - type: note
    content: 'The Septuagint renders this sentence: “The heart of man is deep [Gr. batheia] beyond all things.”'
  - type: text
    content: 'Man’s heart is sick, '
  - type: text
    content: in need of healing
  - type: text
    content: .
  - type: note
    content: There is no doubt that the heart of a person is evil, as Jesus taught (see Mark 7:21–23), and is in need of healing (see Mark 2:17).
