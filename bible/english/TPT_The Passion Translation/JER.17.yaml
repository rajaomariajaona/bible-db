  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I thoroughly test the inner being
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to give to all people what they deserve according to their ways
  - type: usfm
    marker: q1
    children:
    - type: text
