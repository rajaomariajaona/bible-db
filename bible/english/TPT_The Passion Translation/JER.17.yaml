  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Go ahead and
    - type: text
      text: ' cheat others dishonestly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but by mid-life, everything you’ve gained
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will fly away, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 23:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: like birds hatched from stolen eggs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be proven a fool in the end.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Our sacred sanctuary is a throne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'radiating the glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you are the only hope of Israel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who forsake you will be covered with shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who turn away '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew for “turn away” is from the same triliteral root as the word for “faultfinder.” When we become a “faultfinder,” we are turning away from God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judah (Jude) 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: from you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be written in the dirt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and footnote. Jesus wrote in the dirt before the accusers of the adulterous woman, illustrating what was prophesied by Jeremiah. To forsake the Hope of Israel is spiritual adultery. The men who wanted to stone the woman were spiritual adulterers, for they had forsaken Jesus, the only hope of Israel. Jesus showed that those who brought the adulterous woman to him were actually the ones who had broken their covenant vow, not just the woman who was thrown at his feet. We must never use the Word of God as a weapon to harm others but rather as a tool to share the love story of a God who longs for our hearts as a bridegroom longs for his bride.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To forsake you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is to forsake the fountain of living waters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the fountain of life” (LXX).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Prayer for Help
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone
    - type: text
      text: ' are my praise.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Heal me, and I will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: perfectly
    - type: text
      text: ' healed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'save me, and I will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: completely
    - type: text
      text: ' saved.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Listen to what the people keep saying to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Where is the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah’s enemies were taunting him over a prophetic word of coming disaster that had not yet been fulfilled.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it come to pass!”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But I have not stopped running after you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and being a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'true'
    - type: text
      text: ' shepherd.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I have not run after you for the sake of disaster.” The difference between the Hebrew word for “shepherd” and the word for “disaster” is a vowel, which was missing from biblical Hebrew.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor have I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: secretly
    - type: text
      text: ' longed for the day of disaster.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know every word my lips have spoken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they were spoken in your presence.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Do not cause me disappointment.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Don’t be a cause of terror.” The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mechittah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean either “terror” or “dismay [disappointment].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my safe place in a day of calamity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Let those who persecute me be ashamed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and don’t let me be disgraced;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let them be the ones who are disheartened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring on them the day of disaster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and shatter them with double destruction.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sabbath
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me: “Go and stand in the public gate of Jerusalem by which the kings of Judah enter and leave, and then go to all the gates of Jerusalem '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Your people have set up pagan altars to the goddess Asherah everywhere in your land—under large trees, on hills '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and preach to the people: ‘Hear the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you kings and people of Judah, and all who live in Jerusalem who enter by these gates!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “ ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares: If you value your lives, stop carrying any loads '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These loads would be merchandise meant to be sold and bartered with in the markets of Jerusalem. The meaning is that the people are to honor God first on that day; it is not a day to promote ourselves and sell our “goods.”
      marker-yv: yv-n
    - type: text
      text: 'on the Sabbath day, bringing them through the gates of Jerusalem. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nor shall you carry any loads out of your houses on the Sabbath day or do any work; rather, you must set apart that day to honor me as I commanded your ancestors. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '(Yet they would not listen or obey; they stubbornly refused and would not obey or accept instruction.) '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'If you listen to me, declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and do not bring in any load through the gates of this city on the Sabbath day but observe the Sabbath day as set apart for me and do no work that day, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'then kings of David’s lineage will pass through the city’s gates. The kings and their officials will be riding in chariots or riding horses and will be accompanied by the people of Judah and the people of Jerusalem. There will always be people living here. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then people will come from the towns of Judah and from the villages around Jerusalem and from the land of Benjamin, from the lowlands west of Jerusalem, from the hill country, and from the southern desert of Judah, bringing burnt offerings and sacrifices, grain offerings and frankincense, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Frankincense was sprinkled, along with a compound of spices, on grain offerings. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 2:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and offerings of thanksgiving '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bringing songs of thanksgiving.”
      marker-yv: yv-n
    - type: text
      text: 'to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s house. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But if you do not listen to me, if you treat the Sabbath as any other day on which you carry loads through the gates of Jerusalem, then I will set its gates on fire, and that fire will consume even the palaces of Jerusalem, and no one will be able to extinguish it!’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
