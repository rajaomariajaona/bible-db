document_id: JDG.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Nations Remaining in the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is a list of the nations that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' permitted to remain in the land so he could use them to test the Israelites who had not known what it was like during the Canaanite wars. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' was upon him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Targum reads “the Spirit of Prophecy came upon him,” signifying a sudden and pronounced power of God’s Spirit coming upon Othniel that transcended human strength or ability. The supernatural strength, wisdom, boldness, valor, and ecstasy of a prophet would manifest when the Spirit of God came upon him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: and empowered him to liberate Israel from bondage
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint adds “and they obeyed him.”
      marker-yv: yv-n
    - type: text
      text: 'He became Israel’s champion and went out to war, and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' delivered into his hands Cushan-Rishathaim, the king of Mesopotamia. Othniel overpowered him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish historian Josephus states that Othniel won the victory with a small band of courageous men who surprised the king’s bodyguards, overpowered them, and killed the king. (See Josephus,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ant.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.3.3.)
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and after the land had peace for forty years, Othniel the son of Kenaz died.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ehud, the Champion-Deliverer
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites again did what was evil in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s sight, and because they did what was offensive to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', he gave King Eglon of Moab power over Israel. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: strengthened King Eglon against Israel.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eglon formed an alliance with the Ammonites and Amalekites, and they attacked and defeated Israel. Eglon captured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jericho
    - type: text
      text: ', the City of Date Palms. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Eglon of Moab kept the Israelites in bondage to him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Israel served King Eglon.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Eglon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fat bull.”
      marker-yv: yv-n
    - type: text
      text: for eighteen years.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Israelites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with shattered hearts
    - type: text
      text: ', cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' for mercy, and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' raised up a champion-deliverer to rescue them—Ehud, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ehud
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “union” or “strong.”
      marker-yv: yv-n
    - type: text
      text: 'who was left-handed. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew literally reads “restricted [crippled] in his right hand.” Left-handed Ehud was from the tribe of Benjamin.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Benjamin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “son of my right hand.” Some scholars believe Ehud may have been the great-grandson of Benjamin. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . God will use his deliverers no matter what handicap they may have. Ehud’s weakness became his strength.
      marker-yv: yv-n
    - type: text
      text: He was the son of Gera from the tribe of Benjamin.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day, the Israelites sent him to present tribute to King Eglon of Moab. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud had made for himself a two-edged sword over a foot long, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The length of Ehud’s sword in Hebrew is a
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gomed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a term which only occurs here in the Old Testament. It is believed to be a short cubit, or about thirteen inches long.'
      marker-yv: yv-n
    - type: text
      text: 'which he strapped under his coat to his right thigh. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and his entourage
    - type: text
      text: ' came before King Eglon, who was a very fat man, to present the tribute. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The tribute was likely fruit and produce of the land, along with quantities of wool, which would have required a number of people to carry it and present it to the king. Ehud, like God’s servants today, carried both a gift and a sword: a gift to bless the lives of God’s people and a sword to render judgment on everything that hindered their advance in the ways of God.'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the formal presentation of the tribute, he told the men who accompanied him to go back home. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud went with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part of the way
    - type: text
      text: ', but he turned back at the carved stones '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “quarries” or “carved images.” It may have been the boundary line of Eglon’s territory.
      marker-yv: yv-n
    - type: text
      text: near Gilgal. He returned to Eglon and said, “Your Majesty, I have a secret message for you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king said to his attendants, “Leave us!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Silence!” The king commanded his servants to leave the room before Ehud shared his “secret message.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After all the king’s servants had left, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He wanted the succeeding generations of Israel, who had not known war before, to learn the art of warfare. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud approached King Eglon while he was sitting alone in his cool upper room and said to him, “I have a message from God for you.” As the king rose from his throne, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud reached '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beneath his robe
    - type: text
      text: ' with his left hand for the sword strapped to his right thigh, and he plunged it deep into Eglon’s belly! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the hilt also went in after the blade, and the fat closed over the blade. Ehud was unable to pull out the sword, and the dung came out.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: According to the Latin Vulgate, Midrash Rabbah, and the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Targum of Jonathan on the Prophets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The meaning of the Hebrew in this last clause is uncertain.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stepping out of the king’s upper room into the portico, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew of this clause is uncertain.
      marker-yv: yv-n
    - type: text
      text: 'Ehud shut and locked the doors behind him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he had slipped away, the king’s servants came to the doors of the upper room and discovered they were locked. So they told themselves, “He must be on the toilet.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew uses the euphemistic saying, “Perhaps he is covering his feet.” Compare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 24:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They waited and waited, but still the king did not emerge. Embarrassed, they finally took their key and unlocked the doors. And when they opened the doors, there was their master sprawled out on the floor, dead! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Ehud had escaped while they stood there wondering what to do. He fled beyond the carved stones and made it to Seirah.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he arrived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: back in the land
    - type: text
      text: ', he sounded the war trumpet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with a loud blast
    - type: text
      text: ' and rallied the people in the hill country of Ephraim. The Israelites went down from the hills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to fight against the Moabites
    - type: text
      text: ' with Ehud leading the charge. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Follow me closely,” he said, “and pursue them, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has delivered your enemies, the Moabites, into your hands!” So they followed his lead and secured the fords of the Jordan opposite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the land of
    - type: text
      text: ' Moab and did not let anyone cross. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the battle that ensued, they killed nearly ten thousand able-bodied men—brave warriors of Moab, and not one escaped. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he left in the land the five Philistine principalities '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tyrants” or “lords.”
      marker-yv: yv-n
    - type: text
      text: 'and all the Canaanites, Sidonians, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sidonians may be a collective term for the Phoenicians. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and Hivites who lived on Mount Lebanon from Mount Baal Hermon as far as Lebo Hamath. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On that day, Moab surrendered to Israel, and the land had peace for eighty years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shamgar, the Surprise Deliverer
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Ehud, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God raised up
    - type: text
      text: ' Shamgar son of Anath, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Shamgar the Beth Anathite.” Shamgar is not a Hebrew name, and his father, Anath, (the name of a pagan god of war) was a Canaanite, not an Israelite. God raised up a foreigner to bring deliverance to the nation. A nobody with a stick is more than enough when God is with him.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shamgar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “surprised stranger.”
      marker-yv: yv-n
    - type: text
      text: 'who killed six hundred Philistines with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nothing but
    - type: text
      text: ' an ox-goad, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Word of God is like an ox-goad that disciplines the heart and moves us closer to righteousness. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Eccl. 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and Shamgar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the deliverer
    - type: text
      text: ' rescued Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They remained in the land to test Israel to see if they would obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s commands that Moses had given to their ancestors.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Israelites settled among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took their daughters in marriage and gave their own daughters to their sons; and the Israelites served their false gods.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 34:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezra 9:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
