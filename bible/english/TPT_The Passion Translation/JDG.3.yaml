document_id: JDG.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nations Remaining in the Land
  - type: text
    content: 'Here is a list of the nations that '
  - type: text
    content: Yahweh
  - type: text
    content: ' permitted to remain in the land so he could use them to test the Israelites who had not known what it was like during the Canaanite wars. '
  '10':
  - type: text
    content: 'And the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' was upon him '
  - type: note
    content: The Targum reads “the Spirit of Prophecy came upon him,” signifying a sudden and pronounced power of God’s Spirit coming upon Othniel that transcended human strength or ability. The supernatural strength, wisdom, boldness, valor, and ecstasy of a prophet would manifest when the Spirit of God came upon him (see 1 Sam. 10:10).
  - type: text
    content: and empowered him to liberate Israel from bondage
  - type: text
    content: '. '
  - type: note
    content: The Septuagint adds “and they obeyed him.”
  - type: text
    content: 'He became Israel’s champion and went out to war, and '
  - type: text
    content: Yahweh
  - type: text
    content: ' delivered into his hands Cushan-Rishathaim, the king of Mesopotamia. Othniel overpowered him, '
  - type: note
    content: The Jewish historian Josephus states that Othniel won the victory with a small band of courageous men who surprised the king’s bodyguards, overpowered them, and killed the king. (See Josephus, Ant. 5.3.3.)
  '11':
  - type: text
    content: and after the land had peace for forty years, Othniel the son of Kenaz died.
  - type: heading
    content: Ehud, the Champion-Deliverer
  '12':
  - type: text
    content: 'The Israelites again did what was evil in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s sight, and because they did what was offensive to '
  - type: text
    content: Yahweh
  - type: text
    content: ', he gave King Eglon of Moab power over Israel. '
  - type: note
    content: Or “Yahweh strengthened King Eglon against Israel.”
  '13':
  - type: text
    content: 'Eglon formed an alliance with the Ammonites and Amalekites, and they attacked and defeated Israel. Eglon captured '
  - type: text
    content: Jericho
  - type: text
    content: ', the City of Date Palms. '
  '14':
  - type: text
    content: 'King Eglon of Moab kept the Israelites in bondage to him '
  - type: note
    content: Or “Israel served King Eglon.” Eglon means “fat bull.”
  - type: text
    content: for eighteen years.
  '15':
  - type: text
    content: 'Then the Israelites, '
  - type: text
    content: with shattered hearts
  - type: text
    content: ', cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' for mercy, and '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised up a champion-deliverer to rescue them—Ehud, '
  - type: note
    content: Ehud means “union” or “strong.”
  - type: text
    content: 'who was left-handed. '
  - type: note
    content: The Hebrew literally reads “restricted [crippled] in his right hand.” Left-handed Ehud was from the tribe of Benjamin. Benjamin means “son of my right hand.” Some scholars believe Ehud may have been the great-grandson of Benjamin. See 20:16. God will use his deliverers no matter what handicap they may have. Ehud’s weakness became his strength.
  - type: text
    content: He was the son of Gera from the tribe of Benjamin.
  - type: text
    content: 'One day, the Israelites sent him to present tribute to King Eglon of Moab. '
  '16':
  - type: text
    content: 'Ehud had made for himself a two-edged sword over a foot long, '
  - type: note
    content: The length of Ehud’s sword in Hebrew is a gomed, a term which only occurs here in the Old Testament. It is believed to be a short cubit, or about thirteen inches long.
  - type: text
    content: 'which he strapped under his coat to his right thigh. '
  '17':
  - type: text
    content: 'He '
  - type: text
    content: and his entourage
  - type: text
    content: ' came before King Eglon, who was a very fat man, to present the tribute. '
  - type: note
    content: 'The tribute was likely fruit and produce of the land, along with quantities of wool, which would have required a number of people to carry it and present it to the king. Ehud, like God’s servants today, carried both a gift and a sword: a gift to bless the lives of God’s people and a sword to render judgment on everything that hindered their advance in the ways of God.'
  '18':
  - type: text
    content: 'After the formal presentation of the tribute, he told the men who accompanied him to go back home. '
  '19':
  - type: text
    content: 'Ehud went with them '
  - type: text
    content: part of the way
  - type: text
    content: ', but he turned back at the carved stones '
  - type: note
    content: Or “quarries” or “carved images.” It may have been the boundary line of Eglon’s territory.
  - type: text
    content: near Gilgal. He returned to Eglon and said, “Your Majesty, I have a secret message for you.”
  - type: text
    content: The king said to his attendants, “Leave us!”
  - type: note
    content: Or “Silence!” The king commanded his servants to leave the room before Ehud shared his “secret message.”
  - type: text
    content: 'After all the king’s servants had left, '
  '2':
  - type: text
    content: 'He wanted the succeeding generations of Israel, who had not known war before, to learn the art of warfare. '
  '20':
  - type: text
    content: 'Ehud approached King Eglon while he was sitting alone in his cool upper room and said to him, “I have a message from God for you.” As the king rose from his throne, '
  '21':
  - type: text
    content: 'Ehud reached '
  - type: text
    content: beneath his robe
  - type: text
    content: ' with his left hand for the sword strapped to his right thigh, and he plunged it deep into Eglon’s belly! '
  '22':
  - type: text
    content: And the hilt also went in after the blade, and the fat closed over the blade. Ehud was unable to pull out the sword, and the dung came out.
  - type: note
    content: According to the Latin Vulgate, Midrash Rabbah, and the Targum of Jonathan on the Prophets. The meaning of the Hebrew in this last clause is uncertain.
  '23':
  - type: text
    content: 'Stepping out of the king’s upper room into the portico, '
  - type: note
    content: The meaning of the Hebrew of this clause is uncertain.
  - type: text
    content: 'Ehud shut and locked the doors behind him. '
  '24':
  - type: text
    content: 'After he had slipped away, the king’s servants came to the doors of the upper room and discovered they were locked. So they told themselves, “He must be on the toilet.” '
  - type: note
    content: The Hebrew uses the euphemistic saying, “Perhaps he is covering his feet.” Compare 1 Sam. 24:3.
  '25':
  - type: text
    content: 'They waited and waited, but still the king did not emerge. Embarrassed, they finally took their key and unlocked the doors. And when they opened the doors, there was their master sprawled out on the floor, dead! '
  '26':
  - type: text
    content: But Ehud had escaped while they stood there wondering what to do. He fled beyond the carved stones and made it to Seirah.
  '27':
  - type: text
    content: 'When he arrived '
  - type: text
    content: back in the land
  - type: text
    content: ', he sounded the war trumpet '
  - type: text
    content: with a loud blast
  - type: text
    content: ' and rallied the people in the hill country of Ephraim. The Israelites went down from the hills '
  - type: text
    content: to fight against the Moabites
  - type: text
    content: ' with Ehud leading the charge. '
  '28':
  - type: text
    content: '“Follow me closely,” he said, “and pursue them, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has delivered your enemies, the Moabites, into your hands!” So they followed his lead and secured the fords of the Jordan opposite '
  - type: text
    content: the land of
  - type: text
    content: ' Moab and did not let anyone cross. '
  '29':
  - type: text
    content: 'In the battle that ensued, they killed nearly ten thousand able-bodied men—brave warriors of Moab, and not one escaped. '
  '3':
  - type: text
    content: 'So he left in the land the five Philistine principalities '
  - type: note
    content: Or “tyrants” or “lords.”
  - type: text
    content: 'and all the Canaanites, Sidonians, '
  - type: note
    content: Sidonians may be a collective term for the Phoenicians. See Josh. 13:4.
  - type: text
    content: 'and Hivites who lived on Mount Lebanon from Mount Baal Hermon as far as Lebo Hamath. '
  '30':
  - type: text
    content: On that day, Moab surrendered to Israel, and the land had peace for eighty years.
  - type: heading
    content: Shamgar, the Surprise Deliverer
  '31':
  - type: text
    content: 'After Ehud, '
  - type: text
    content: God raised up
  - type: text
    content: ' Shamgar son of Anath, '
  - type: note
    content: Or “Shamgar the Beth Anathite.” Shamgar is not a Hebrew name, and his father, Anath, (the name of a pagan god of war) was a Canaanite, not an Israelite. God raised up a foreigner to bring deliverance to the nation. A nobody with a stick is more than enough when God is with him. Shamgar means “surprised stranger.”
  - type: text
    content: 'who killed six hundred Philistines with '
  - type: text
    content: nothing but
  - type: text
    content: ' an ox-goad, '
  - type: note
    content: The Word of God is like an ox-goad that disciplines the heart and moves us closer to righteousness. See Eccl. 12:11.
  - type: text
    content: 'and Shamgar '
  - type: text
    content: the deliverer
  - type: text
    content: ' rescued Israel.'
  '4':
  - type: text
    content: 'They remained in the land to test Israel to see if they would obey '
  - type: text
    content: Yahweh
  - type: text
    content: ’s commands that Moses had given to their ancestors.
  '5':
  - type: text
    content: 'So the Israelites settled among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites. '
  '6':
  - type: text
    content: They took their daughters in marriage and gave their own daughters to their sons; and the Israelites served their false gods.
  - type: note
    content: See Ex. 34:16; Deut. 7:3; Ezra 9:12.
  - type: heading
    content: Othniel, the Champion-Deliverer
  '7':
  - type: text
    content: 'The Israelites did what was evil in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s sight. They ignored '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God, and they served the Baal gods and the Asherah goddesses. '
  '8':
  - type: text
    content: 'Therefore '
  - type: text
    content: Yahweh
  - type: text
    content: '’s blazing anger rose up against them. He surrendered them to Cushan-Rishathaim, '
  - type: note
    content: Cushan possibly means “darkness” and Rishathaim possibly means “double wickedness.” Cushan-Rishathaim was an oppressive ruler over Israel for eight years because of their rebellion against God.
  - type: text
    content: 'the king of Mesopotamia. '
  - type: note
    content: Mesopotamia was all the land between the Tigris and Euphrates rivers. This would include parts of modern Syria and Iraq.
  - type: text
    content: 'He kept the Israelites in bondage to him '
  - type: note
    content: Or “they served the king.”
  - type: text
    content: 'for eight years. '
  '9':
  - type: text
    content: 'Then the Israelites, '
  - type: text
    content: with shattered hearts
  - type: text
    content: ', cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: for mercy
  - type: text
    content: ', '
  - type: note
    content: This was probably in a public assembly at Shiloh. Their cries came from broken hearts, as they were devastated with nowhere else to turn. Yahweh heard their repentant cries and answered them by raising up a champion-deliverer.
  - type: text
    content: 'and '
  - type: text
    content: he answered them
  - type: text
    content: ' by raising up a champion-deliverer to rescue them, Othniel. He was Caleb’s nephew, the son of his younger brother Kenaz. '
