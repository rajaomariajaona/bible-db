        marker: it
        children:
        - type: text
          text: A Greek-English Lexicon of the New Testament and Other Early Christian Literature
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 3rd ed.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of God’s creation:'
  '15':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know all that you do, and I know that you are neither frozen in apathy nor fervent with passion.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you are neither cold nor hot.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How I wish you were either one or the other!
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But because you are neither cold nor hot, but lukewarm, I am about to spit you from my mouth.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not a complete rejection, for Jesus gives them a call to repent and return to a place of being passionate and zealous for God. The Aramaic uses an idiom that can mean “I am about to reprimand you (lit. ‘give you of my mouth’).”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you claim, “I’m rich and getting richer—I don’t need a thing.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although Laodicea was known as a very prosperous city, a financial center of the region, Christ’s estimation of them was that they were spiritually poor. Only in Christ are we made rich (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet you are clueless that you’re miserable, poor, blind, barren, and naked!
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So I counsel you to purchase gold
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Christ will be our gold. The wealth of Christ is not purchased with money but by faith. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 22:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 23:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 55:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: perfected by fire, so that you can be truly rich. Purchase a white garment to cover and clothe your shameful Adam-nakedness.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “so that the shame of the nakedness of you will not be exposed.” Christ will be our white garment and our eye salve that helps us to see things as they truly are.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Purchase eye salve to be placed over your eyes so that you can truly see.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All those I dearly love I unmask and train.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “rebuke and discipline.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So repent and be eager
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: to pursue what is right.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wake up and strengthen all that remains before it dies, for I haven’t found your works to be perfect in the sight of my God.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold, I’m standing at the door, knocking.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “I have been standing at the door, knocking.” Jesus knocking on the door points us to the process of an ancient Jewish wedding invitation. In the days of Jesus, a bridegroom and his father would come to the door of the bride-to-be carrying the betrothal cup of wine and the bride-price. Standing outside, they would knock. If she fully opened the door, she was saying, “Yes, I will be your bride.” Jesus and his Father, in the same way, are knocking on the doors of our hearts, inviting us to be the bride of Christ.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If your heart is open to hear my voice and you open the door
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: within
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', I will come in to you and feast with you, and you will feast with me.'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely taken from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 5:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', where the king knocks on the door of the heart of the Shulamite, longing to come in and feast with her.'
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And to the one who conquers
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Each of the seven churches is given a wonderful promise to the one who “conquers” (or “overcomes,” or “is victorious”). The Greek verb tense in each of the seven instances is “one who continually, repeatedly, and habitually conquers.” The seven churches at seven locations indicates that believers are at that stage in their growth as overcomers.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ephesus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “desirable” (deeply loved by the Lord).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Smyrna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “myrrh” (the trials and troubles we all go through).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pergamum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “elevated place” (seasons of praises and favor).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Thyatira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the incense [odor] of affliction” (learning to praise and overcome hardships).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sardis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “those who escape” (breaking free of our past).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Philadelphia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “brotherly love” (learning lessons of loving others).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
