        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The key of David unlocks intimacy and prayer. David was a man who lived in grace centuries before the gospel of God’s grace was unveiled. In that sense, the key of David allowed him to view the future and live in the grace it would reveal.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'who opens doors that none can shut and who closes doors that none can open:'
