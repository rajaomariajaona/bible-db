document_id: REV.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ’s Letter to Sardis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Write the following to the messenger of the congregation in Sardis,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sardis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean “those who have escaped” or “red ones” (jewels). How we need to escape every form of religious bondage on our journey into Christlikeness. By the blood of Christ, we are redeemed and set free to be his fiery (red) ones, like jewels before God. Twice in the history of Sardis it had fallen to its enemies because it was not alert and watching. It was conquered once in 549 BC by King Cyrus of Persia, and again in 214 BC by Antiochus the Great. For this reason, the people of Sardis were asleep and needed an awakening.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for these are the words of the one who holds the seven Spirits of God
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the seven-fold Spirit of God.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and the seven stars:'
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know all that you do and I know that you have a reputation for being really “alive,” but you’re actually dead!
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Because you’ve passionately kept my message of perseverance, I will also keep you from the hour of proving that is coming to test every person on earth.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I come swiftly, so cling tightly to what you have, so that no one may seize your crown of victory.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the one who is victorious, I will make you to be a pillar in the sanctuary of my God,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Since the image of a secure pillar is figurative, the sanctuary (temple) is also figurative, for there is no temple in the New Jerusalem reality (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The word for “pillar” is also used for a pillar of fire. The emblem of a pillar points to a sure and fixed position upholding and supporting the kingdom purposes of God.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: permanently secure.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “never again will he leave it.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will write on you the name of my God and the name of the city of my God—the New Jerusalem, descending from my God out of heaven.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We are not going up to the New Jerusalem; this heavenly “city” is coming down to us on earth. It’s new in quality, not simply new in time.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I’ll write my own name on you.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the one whose heart is open let him listen carefully to what the Spirit is now saying to all the churches.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ’s Letter to Laodicea
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Write the following to the messenger of the congregation in Laodicea,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Laodicea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “human rights” or “self-righteousness.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for these are the words of the Amen,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is only one other place in the Bible that “the Amen” or “the God of Amen” is found. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 65:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the faithful and true witness, the ruler
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the beginning [originator, source] of God’s creation.” The Greek Septuagint uses this word (
      - type: usfm
        marker: it
        children:
        - type: text
          text: archē
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) for ruler/authority in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 40:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . See also
      - type: usfm
