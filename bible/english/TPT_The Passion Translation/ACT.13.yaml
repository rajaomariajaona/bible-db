document_id: ACT.13,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul and Barnabas Sent Out as Apostles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the church at Antioch there were a number of prophets and teachers of the Word, including Barnabas, Simeon from Niger, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: niger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “someone who works with wood, a carpenter.” The Latin word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: niger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “black.”
      marker-yv: yv-n
    - type: text
      text: 'Lucius the Libyan, Manean (the childhood companion of King Herod Antipas), '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who was like a brother to Herod the tetrarch.”
      marker-yv: yv-n
    - type: text
      text: 'and Saul. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You son of the devil! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “son of the accuser.”
      marker-yv: yv-n
    - type: text
      text: 'You are full of every form of fraud and deceit and an enemy of all that is right. When will you stop perverting the truth of God into lies? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this very moment the hand of God’s judgment comes down upon you and you will be blind—so blind you won’t even be able to see the light of the sun.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “until the end of the age.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Paul spoke these words, a shadowy mist '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “gloom.”
      marker-yv: yv-n
    - type: text
      text: 'and darkness came over the sorcerer, leaving him blind and groping about, begging someone to lead him around by the hand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the governor witnessed this, he believed and was awestruck by the power of the message of the Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Barnabas at Antioch in Turkey
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul and his companions sailed from the Cyprus port of Paphos to Perga in southern Turkey. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Pamphylia,” which may mean “a place of mingled races.” It is a region in southern Turkey.
      marker-yv: yv-n
    - type: text
      text: 'John left them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The sudden departure of John from the team became an issue between Paul and Barnabas. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 15:36–39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'there and returned to Jerusalem '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: as they journeyed on to the city of Antioch in the region of Pisidia.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Antioch in the region of Pisidia is situated in the Sultandag Mountains about one hundred miles north of Perga. This would have been an arduous journey from the sea into the mountains. God was directing his missionaries where to go.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the Sabbath they went into the synagogue and took their seats. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the reading from the scrolls of the books of Moses and the prophets, the leader of the meeting '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “president of the synagogue.”
      marker-yv: yv-n
    - type: text
      text: sent Paul and Barnabas a message, saying, “Brothers, do you have a word of encouragement to share with us? If so, please feel free to give it.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul stood and motioned that he had something to say. He said, “Listen, all of you Jews and non-Jews who worship God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The God of Israel divinely chose our ancestors to be his people. While they were enslaved in Egypt, he made them great, both in numbers and in strength, until he unveiled his mighty power and led them out of bondage. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 12:51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For nearly forty years, he nourished them in the wilderness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and some Greek manuscripts. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 16:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 14:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was the one who destroyed the seven nations inhabiting the land of Canaan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and afterward gave the land to his people as their inheritance. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were worshiping as priests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “serving the Lord.” The Greek word used here is also used for priestly duties.
      marker-yv: yv-n
    - type: text
      text: 'before the Lord in prayer and fasting, the Holy Spirit said, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Here we see the Lord of the harvest, the Holy Spirit, sending out laborers into the harvest field. The Holy Spirit speaks in many different ways. Perhaps he spoke a prophecy through one of the prophets in the church, or a divine voice may have interrupted their worship. God’s Spirit still speaks today in any way he chooses.
      marker-yv: yv-n
    - type: text
      text: '“I have called Barnabas and Saul to do an important work for me. Now, release them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “appoint them.” The Greek word used here is found in the Septuagint of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: for consecrating Levites for God’s service as priests.
      marker-yv: yv-n
    - type: text
      text: 'to go and fulfill it.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This took about four hundred and fifty years.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is much debate over where this clause fits. It is possible that it would go with the next sentence, “For four hundred and fifty years God raised up deliverers.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then God raised up deliverers for the people until the time of the prophet Samuel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people craved for a king, so God gave them one from the tribe of Benjamin: Saul, the son of Kish, who ruled for forty years. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After removing him, God raised up David to be king, for God said of him, ‘I have found in David, son of Jesse, a man who always pursues my heart '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 89:19–29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and will accomplish all that I have destined him to do.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he will do all my pleasure.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“From David’s lineage God brought Israel a Savior, just as he promised. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So before Jesus appeared, John preached the message of a baptism of repentance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the baptism of grace.”
      marker-yv: yv-n
    - type: text
      text: 'to prepare all of Israel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As John was about to finish his mission, he said repeatedly, ‘If you think that I am the one to come, you’re mistaken. He will come after me, and I don’t even deserve to stoop down and untie his sandals!’
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Fellow Jews, Abraham’s descendants, and all those among you who worship and reverence God, this message of life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is, “the message of salvation.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 107:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'has been sent for us all to hear. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of Jerusalem and their leaders didn’t realize who he was, nor did they understand the prophecies written of him. Yet they fulfilled those very prophecies, which they read week after week in their meetings, by condemning him to death. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even though they could come up with no legal grounds for the death sentence, they pleaded with Pilate to have him executed. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they did to him all that was prophesied they would do.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then they took him down from the cross and laid him in a tomb. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So after they had fasted and prayed, they laid hands on them and sent them off.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dispatched them” (a military term). This was the commissioning of Barnabas and Saul as apostles. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apostle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “sent one.” They were sent by the Holy Spirit and by the church and released as missionaries. The New Testament shows there were many other apostles besides the Twelve. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:11–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God raised him from the dead! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for many days afterward he appeared on numerous occasions to his disciples who knew him well and had followed him from Galilee to Jerusalem. Those disciples are now his witnesses, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “witnesses” can also be translated “martyrs.”
      marker-yv: yv-n
    - type: text
      text: telling the people the truth about him.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So here we are to share with you some wonderful news! The promise God made to our forefathers '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'has now been fulfilled for us, their children. For God has raised Jesus from the dead, as it says in Psalms:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: ‘Today I reveal you as my Son, and I as your Father.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“God had promised to not let him decay in the tomb or face destruction again, so God raised him from the dead. He gave this promise in the Psalms:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘I will give to you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is plural, “you all,” or “to you and yours.”
      marker-yv: yv-n
    - type: text
      text: 'what I gave to David:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Faithful mercies '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “decrees.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 55:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: that you can trust.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “I will give to you the grace [favor] I gave to faithful David.”
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“He explains it further in another Psalm:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You will not allow your holy one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to experience bodily decay.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 16:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This cannot be a reference to David, for after he passionately served God’s purpose for his generation, he died. He was buried with his ancestors and his body experienced decay. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the one whom God raised from the dead has never experienced corruption in any form.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So listen, friends! Through this Jesus, the forgiveness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cancellation.”
      marker-yv: yv-n
    - type: text
      text: 'of sins is offered to you. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone who believes in him is set free from sin and guilt—something the law of Moses had no power to do. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul and Barnabas, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and their assistant Mark (known as John)
    - type: text
      text: ', were directed by the Holy Spirit to go to Seleucia, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text. Seleucia (modern-day Samandag) was a coastal city in Syria from which Paul and Barnabas left with John Mark for their first missionary journey in AD 49. Seleucia means “white light.”
      marker-yv: yv-n
    - type: text
      text: 'and from there they sailed to Cyprus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cyprus was the home of Barnabas.
      marker-yv: yv-n
    - type: text
      text: 'When they arrived at Salamis, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Salamis is a city on the southeastern coast of Cyprus. Salamis means “in the middle of salty water.”
      marker-yv: yv-n
    - type: text
      text: 'they went to the synagogues and declared the Word of God. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So be very careful that what the prophets warned about does not happen to you:'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Be amazed and in agony, you scoffers!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Be amazed and perish, you scoffers.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in your day I will do something so wonderful
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that when I perform mighty deeds among you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you won’t even believe that it was I who did it!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek text seems to quote from the Septuagint version of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hab. 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', “I am doing a work in your days that you won’t believe even when it is announced to you.”'
      marker-yv: yv-n
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Paul and Barnabas started to leave, the people pleaded with them to share more about these things on the next Sabbath day. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the meeting had finally broken up, many of those in attendance, both Jews and converts to Judaism, tagged along with Paul and Barnabas, who continued to persuade them to go deeper in their understanding of God’s grace.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The following week, nearly everyone in the city gathered to hear the word of God. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Jewish leaders saw the size of the crowds, vicious jealousy filled their hearts and they rose up to oppose what Paul was teaching. They insulted him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “blasphemed.”
      marker-yv: yv-n
    - type: text
      text: and argued with him over everything he said.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet Paul and Barnabas did not back down. Filled with courage, they boldly replied, “We were compelled to bring God’s message '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “word.”
      marker-yv: yv-n
    - type: text
      text: 'first to you Jews. But seeing you’ve rejected this message and refuse to embrace eternal life, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You view yourselves as unworthy of eternal life.”
      marker-yv: yv-n
    - type: text
      text: 'we will focus instead on the nations and offer it to them. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This will fulfill what the Lord has commanded us:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I have destined you to become
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a beacon light for the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and release salvation to the ends of the earth!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 42:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 60:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the non-Jewish people in the crowd heard these words, they were thrilled and they honored '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “praised.”
      marker-yv: yv-n
    - type: text
      text: 'the word of the Lord. All who believed that they were destined to experience eternal life received the message. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Those who were appointed to experience eternal life believed.” The Greek word for “appointed” can also be translated “stationed in battle order.”
      marker-yv: yv-n
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God’s word spread like wildfire throughout the entire region.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jewish leaders stirred up a violent mob against Paul and Barnabas, including many prominent and wealthy people of the city. They persecuted them and ran them out of town. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they left, they shook the dust off their feet as a sign of protest against them, and they went on to the city of Iconium. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is present-day Konya, a large city about sixty-two miles (one hundred kilometers) from Antioch. This journey would have taken a number of days. Iconium means “small image” (idol). In Israel, Iconium is a girl’s name that means “coming.”
      marker-yv: yv-n
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They left the new converts in Antioch overflowing with the joy of the Holy Spirit.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there they crossed the island as far as Paphos, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paphos is a city on the southwestern coast of Cyprus.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Paphos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “boiling hot.”
      marker-yv: yv-n
    - type: text
      text: 'where they encountered a Jewish false prophet, a sorcerer named Elymas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spiritual advisor.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: magos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is often translated “astrologer.” Although the text does not give us his name, Elymas, until v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', it is included here for the sake of the English narrative.'
      marker-yv: yv-n
    - type: text
      text: 'who also went by the name of “son of Jesus.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Bar-Jesus” (son of Joshua). The Aramaic is “Bar-Shuma.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had gained influence as the spiritual advisor to the regional governor, Sergius Paulus, considered by many to be a wise and intelligent leader. The governor requested a meeting with Barnabas and Saul because he wanted to hear the message of God’s word. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the manifestation of God.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elymas, whose name means “sorcerer,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic name Elymas means “magician” or “sorcerer.” This would be similar to the Arabic name Alumas, which also means “magician.”
      marker-yv: yv-n
    - type: text
      text: stood up against them and tried to prevent the governor from believing their message.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul, also known as Paul, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From here on in Acts, Saul is only referred to as Paul. Saul means “sought after,” and Paul means “little.” The name change is descriptive of what happened within Paul, leaving behind greatness in his own eyes and being content to be insignificant. This is the journey every believer must take.
      marker-yv: yv-n
    - type: text
      text: 'stared into his eyes and rebuked him. Filled with the Holy Spirit, he said, '
