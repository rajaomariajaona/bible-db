document_id: PSA.26,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Declare Me Innocent
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic praise to God
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Trust and Transparency
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', be my judge and declare me innocent!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clear my name, for I walk in integrity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and trust you without wavering.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look how they devise their wicked plans;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their hands are always ready to receive a bribe.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I’m not like them, Lord—not at all
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me, redeem me with your mercy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have chosen to walk only in what is right.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Among the worshipers I will praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am safe and secure because of you!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you can scrutinize me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refine my heart and probe my every thought.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put me to the test and you’ll find me true.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will never lose sight of your steadfast love for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your faithfulness has steadied my steps.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Truthfulness
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t keep company with tricky, two-faced men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will I go the way of those with hidden motives.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I despise the sinner’s hangouts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You won’t find me walking with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I come to your altar, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be clean before you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I wash my hands in innocence.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: approaching with songs of thanksgiving,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: singing songs of your mighty miracles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Testimony
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', I love to live in your house, this dwelling place of dazzling glory!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t treat me as one of these scheming sinners
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who plot violence against the innocent.
