document_id: PSA.26
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Declare Me Innocent
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s poetic praise to God
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Trust and Transparency
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', be my judge and declare me innocent!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clear my name, for I walk in integrity
- type: usfm
  marker: q1
  children:
  - type: text
    text: and trust you without wavering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you can scrutinize me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Refine my heart and probe my every thought.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put me to the test and you’ll find me true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will never lose sight of your steadfast love for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness has steadied my steps.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Truthfulness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I won’t keep company with tricky, two-faced men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor will I go the way of those with hidden motives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I despise the sinner’s hangouts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You won’t find me walking with the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'When I come to your altar, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll be clean before you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I wash my hands in innocence.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: approaching with songs of thanksgiving,
- type: usfm
  marker: q1
  children:
  - type: text
    text: singing songs of your mighty miracles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Testimony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', I love to live in your house, this dwelling place of dazzling glory!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Don’t treat me as one of these scheming sinners
- type: usfm
  marker: q1
  children:
  - type: text
    text: who plot violence against the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Look how they devise their wicked plans;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their hands are always ready to receive a bribe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: I’m not like them, Lord—not at all
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me, redeem me with your mercy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I have chosen to walk only in what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Among the worshipers I will praise '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I am safe and secure because of you!
