document_id: PSA.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Declare Me Innocent
  - type: text
    content: King David’s poetic praise to God
  - type: heading
    content: David’s Trust and Transparency
  - type: text
    content: Yahweh
  - type: text
    content: ', be my judge and declare me innocent!'
  - type: text
    content: Clear my name, for I walk in integrity
  - type: text
    content: and trust you without wavering.
  '10':
  - type: text
    content: Look how they devise their wicked plans;
  - type: text
    content: their hands are always ready to receive a bribe.
  '11':
  - type: text
    content: I’m not like them, Lord—not at all
  - type: text
    content: .
  - type: text
    content: Save me, redeem me with your mercy,
  - type: text
    content: for I have chosen to walk only in what is right.
  '12':
  - type: text
    content: 'Among the worshipers I will praise '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: for I am safe and secure because of you!
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', you can scrutinize me.'
  - type: text
    content: Refine my heart and probe my every thought.
  - type: text
    content: Put me to the test and you’ll find me true.
  '3':
  - type: text
    content: I will never lose sight of your steadfast love for me.
  - type: text
    content: Your faithfulness has steadied my steps.
  - type: heading
    content: David’s Truthfulness
  '4':
  - type: text
    content: I won’t keep company with tricky, two-faced men,
  - type: text
    content: nor will I go the way of those with hidden motives.
  '5':
  - type: text
    content: I despise the sinner’s hangouts.
  - type: text
    content: You won’t find me walking with the wicked.
  '6':
  - type: text
    content: 'When I come to your altar, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: I’ll be clean before you,
  - type: note
    content: Or “I wash my hands in innocence.”
  - type: text
    content: approaching with songs of thanksgiving,
  - type: text
    content: singing songs of your mighty miracles.
  - type: heading
    content: David’s Testimony
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ', I love to live in your house, this dwelling place of dazzling glory!'
  '9':
  - type: text
    content: Don’t treat me as one of these scheming sinners
  - type: text
    content: who plot violence against the innocent.
