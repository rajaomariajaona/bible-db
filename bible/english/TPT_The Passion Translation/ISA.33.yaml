document_id: ISA.33,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zion Restored
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Woe to you, destroyer, you who have not been destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you, traitor, you who have not been betrayed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you have finished your work of destroying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when you have completed your betrayal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be betrayed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers to Sennacherib, the king of Assyria. When Assyria was finished destroying Jerusalem, God would destroy Assyria. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 19:35–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Now I will arise,” says the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now I will exalt myself; now I will unveil my majesty!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Assyria
    - type: text
      text: ', your plans are worthless, as useless as chaff.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You conceive straw and are pregnant with chaff.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My breath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Your breath.”
      marker-yv: yv-n
    - type: text
      text: will be a fire that consumes you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As a thorn bush is cut down and thrown into the fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your nation will be burned to ashes of lime.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Righteous King
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “You who are far away, listen to what I have done,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you who draw near to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: acknowledge my power and strength!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Sinners in Zion are afraid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the godless are gripped with panic,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying, ‘Who can dwell with such an all-consuming fire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can live in the presence of the never-ending flame?’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Only those who walk with integrity and speak what is true,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who despise even the thought of cheating the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and do not accept a bribe, nor plot violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nor contemplate doing evil '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[who] shut their eyes from seeing evil [harming others].”
      marker-yv: yv-n
    - type: text
      text: —
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
