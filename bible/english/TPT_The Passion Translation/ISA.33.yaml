          text: 33:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse refers to those who are enthroned with Christ and seated with him in the heavenly realm (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). They receive a supernatural supply of revelation-bread and living water. Their eyes are fixed on their beautiful King, not on themselves or their ministries.
      marker-yv: yv-n
