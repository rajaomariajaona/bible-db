document_id: ISA.33,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion Restored
  - type: text
    content: Woe to you, destroyer, you who have not been destroyed.
  - type: text
    content: Woe to you, traitor, you who have not been betrayed.
  - type: text
    content: When you have finished your work of destroying,
  - type: text
    content: you will be destroyed,
  - type: text
    content: and when you have completed your betrayal,
  - type: text
    content: you will be betrayed.
  - type: note
    content: This refers to Sennacherib, the king of Assyria. When Assyria was finished destroying Jerusalem, God would destroy Assyria. See 2 Kings 19:35–37.
  '10':
  - type: text
    content: “Now I will arise,” says the Lord.
  - type: text
    content: “Now I will exalt myself; now I will unveil my majesty!
  '11':
  - type: text
    content: Assyria
  - type: text
    content: ', your plans are worthless, as useless as chaff.'
  - type: note
    content: Or “You conceive straw and are pregnant with chaff.”
  - type: text
    content: 'My breath '
  - type: note
    content: Or “Your breath.”
  - type: text
    content: will be a fire that consumes you.
  '12':
  - type: text
    content: As a thorn bush is cut down and thrown into the fire,
  - type: text
    content: your nation will be burned to ashes of lime.”
  - type: heading
    content: The Righteous King
  '13':
  - type: text
    content: “You who are far away, listen to what I have done,
  - type: text
    content: and you who draw near to me,
  - type: text
    content: acknowledge my power and strength!
  '14':
  - type: text
    content: Sinners in Zion are afraid,
  - type: text
    content: and the godless are gripped with panic,
  - type: text
    content: saying, ‘Who can dwell with such an all-consuming fire?
  - type: text
    content: Who can live in the presence of the never-ending flame?’
  '15':
  - type: text
    content: Only those who walk with integrity and speak what is true,
  - type: note
    content: See Ps. 15.
  - type: text
    content: who despise even the thought of cheating the poor,
  - type: text
    content: and do not accept a bribe, nor plot violence,
  - type: text
    content: 'nor contemplate doing evil '
  - type: note
    content: Or “[who] shut their eyes from seeing evil [harming others].”
  - type: text
    content: —
  '16':
  - type: text
    content: they will live safely on the heights
  - type: text
    content: and make their safe place the mountain strongholds,
  - type: text
    content: with bread in steady supply and water assured.”
  - type: note
    content: This verse refers to those who are enthroned with Christ and seated with him in the heavenly realm (see Eph. 2:6; Rev. 3:21). They receive a supernatural supply of revelation-bread and living water. Their eyes are fixed on their beautiful King, not on themselves or their ministries.
  '17':
  - type: text
    content: In this high place
  - type: text
    content: ', your eyes will see'
  - type: text
    content: 'the king '
  - type: note
    content: This is the King of Glory, the King of kings. No earthly king is in view here. See Song. 2:10–13; Eph. 1:3; 2:6; 2 Peter 1:3–4.
  - type: text
    content: 'in his '
  - type: text
    content: stunning
  - type: text
    content: ' beauty'
  - type: text
    content: and gaze upon his broad domain.
  - type: note
    content: Or “land of distances.”
  '18':
  - type: text
    content: You will look back on the fears of your past and say,
  - type: text
    content: '“Now, where is the scholar? '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Where is the counter?”
  - type: text
    content: Where is the adviser?
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Where is the one who weighs the money [tribute]?”
  - type: text
    content: Where is the one who numbers those who are maturing?”
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Where is the one who counts the towers?”
  '19':
  - type: text
    content: You will no longer see the defiant foreigner
  - type: text
    content: who speaks a strange, incomprehensible language.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', be gracious to us,'
  - type: text
    content: for we wait for you.
  - type: note
    content: The Hebrew concept of waiting is not passive but includes joining our hearts to God and looking to him alone to help us.
  - type: text
    content: 'Be our strength '
  - type: note
    content: Or “arm,” a metaphor for strength.
  - type: text
    content: every morning
  - type: text
    content: and rescue us when troubles come.
  '20':
  - type: text
    content: Set your gaze on Zion,
  - type: text
    content: 'the city where we gather for '
  - type: text
    content: Yahweh
  - type: text
    content: ’s feasts.
  - type: note
    content: See Lev. 23; Deut. 16.
  - type: text
    content: Your eyes will see Jerusalem as a quiet, pleasant place.
  - type: text
    content: It is a secure dwelling, permanent and unmovable,
  - type: text
    content: not like a tabernacle that must be taken down,
  - type: text
    content: its pegs pulled up, and transported.
  '21':
  - type: text
    content: 'Glorious '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be there for us'
  - type: text
    content: 'in a land with broad rivers and '
  - type: text
    content: life-giving
  - type: text
    content: ' streams,'
  - type: note
    content: This points to a restoration of Eden’s paradise. See Gen. 2:10; Ezek. 47:1–12; Acts 3:21.
  - type: text
    content: where the hostile, majestic ships will not sail.
  - type: note
    content: The Hebrew of this clause is uncertain.
  '22':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is our Judge, our Lawgiver, and our King;'
  - type: note
    content: 'Isaiah referred to the three forms of government in Israel’s history: the law of Moses, the judges, and the kings.'
  - type: text
    content: 'he will save us '
  - type: text
    content: completely
  - type: text
    content: '!'
  - type: note
    content: See 1 Thess. 5:23.
  '23':
  - type: text
    content: Your ropes hang loose,
  - type: text
    content: your mast is not secure, and your sail is not unfurled.
  - type: note
    content: Their “cords” (of faith) were not tightly fastened to Yahweh, their “mast” (human strength) was not secure, and their “sail” (to move forward by the Spirit-wind of God) was not unfurled, yet God would be faithful to them.
  - type: text
    content: Then there will be a great plunder,
  - type: text
    content: such an abundant treasure divided
  - type: note
    content: These are the spoils of the great victory of Christ, won for us through his death, resurrection, and ascension. See Eph. 1:3; 4:8; Col. 2:13–15.
  - type: text
    content: that even the lame will seize their rich share.
  - type: note
    content: The “lame [feeble]” are those who worship with a limp (see Gen. 32:24–32).
  '24':
  - type: text
    content: 'No one living in '
  - type: text
    content: Zion
  - type: text
    content: ' will say, “I am sick,”'
  - type: text
    content: for all who live there will have their sin forgiven.
  '3':
  - type: text
    content: 'The nations retreat at the sound of '
  - type: text
    content: your
  - type: text
    content: ' roaring voice.'
  - type: text
    content: The nations scatter as you arise in your majesty.
  '4':
  - type: text
    content: 'Their '
  - type: note
    content: Or “Your.”
  - type: text
    content: spoil will be harvested,
  - type: text
    content: 'carried away like locusts '
  - type: text
    content: that strip a field bare
  - type: text
    content: .
  - type: text
    content: And like leaping locusts, men will leap upon the spoils.
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' is high and lifted up; he dwells '
  - type: note
    content: The Hebrew uses the word shakan, the word from which we get “shekinah [glory].” We could say, “Yahweh is shekinah’d on high.”
  - type: text
    content: on high!
  - type: text
    content: He lavished his justice and righteousness on Zion!
  '6':
  - type: text
    content: He will be your constant source of stability in changing times,
  - type: text
    content: 'and out of his abundant '
  - type: text
    content: love
  - type: text
    content: ' he gives you'
  - type: text
    content: the riches of salvation, wisdom, and knowledge.
  - type: text
    content: Yes
  - type: text
    content: ', the fear of the Lord is the key to this treasure!'
  '7':
  - type: text
    content: 'Listen! The valiant ones '
  - type: note
    content: Or “the Arielites [lions of God].” Others translate it “priests.”
  - type: text
    content: cry in the streets
  - type: text
    content: and envoys of peace weep bitterly.
  '8':
  - type: text
    content: The highways are deserted
  - type: text
    content: and the travelers have disappeared.
  - type: text
    content: 'Covenants are broken and witnesses '
  - type: note
    content: As translated from Dead Sea scroll 1QIsaa. Some manuscripts have “cities.”
  - type: text
    content: rejected,
  - type: text
    content: and no one is respected.
  '9':
  - type: text
    content: The land mourns and languishes.
  - type: text
    content: Lebanon is disgraced and withered.
  - type: text
    content: The fields of
  - type: text
    content: ' Sharon are like a desert.'
  - type: text
    content: The lands of
  - type: text
    content: ' Bashan and Carmel are stripped bare.'
