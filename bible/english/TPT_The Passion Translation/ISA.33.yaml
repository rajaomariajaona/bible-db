      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be our strength '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
