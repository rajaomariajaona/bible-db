  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is a secure dwelling, permanent and unmovable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not like a tabernacle that must be taken down,
  - type: usfm
    marker: q1
    children:
    - type: text
