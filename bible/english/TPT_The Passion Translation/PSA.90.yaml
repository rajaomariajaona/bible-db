document_id: PSA.90,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God, the Eternal
  - type: text
    content: A prayer of Moses, God’s prophet
  - type: text
    content: Lord, you have always been our eternal home,
  - type: text
    content: our hiding place from generation to generation.
  '10':
  - type: text
    content: You’ve limited our life span to a mere seventy years,
  - type: text
    content: yet some you give grace to live still longer.
  - type: note
    content: Or “if in strength eighty years.”
  - type: text
    content: But even the best of years are marred by tears and toils
  - type: text
    content: and in the end are nothing more than a gravestone in a graveyard!
  - type: note
    content: A poetic description of what is implied in the context. The Septuagint has the phrase “until we mellow and accept your correction.”
  - type: text
    content: We’re gone so quickly, so swiftly;
  - type: text
    content: we pass away and simply disappear.
  '11':
  - type: text
    content: Lord, who fully knows the power of your passion
  - type: text
    content: and the intensity of your emotions?
  - type: note
    content: As translated from the Aramaic. The Hebrew can be translated “Who could experience the strength of your anger? Who could endure the fear your fury can bring, and who truly comprehends the fear of God?”
  '12':
  - type: text
    content: Help us to remember that our days are numbered,
  - type: text
    content: and help us to interpret our lives correctly.
  - type: text
    content: Set your wisdom deeply in our hearts
  - type: text
    content: so that we may accept your correction.
  - type: note
    content: As translated from the Septuagint.
  '13':
  - type: text
    content: Return to us again, O God!
  - type: text
    content: How much longer will it take until you show us
  - type: text
    content: your abundant compassion?
  '14':
  - type: text
    content: Let the sunrise of your love end our dark night.
  - type: text
    content: Break through our clouded dawn again!
  - type: text
    content: Only you can satisfy our hearts,
  - type: text
    content: filling us with songs of joy to the end of our days.
  '15':
  - type: text
    content: We’ve been overwhelmed with grief;
  - type: text
    content: come now and overwhelm us with gladness.
  - type: text
    content: Replace our years of trouble with decades of delight.
  '16':
  - type: text
    content: Let us see your miracles again, and let the rising generation
  - type: text
    content: see the glorious wonders you’re famous for.
  '17':
  - type: text
    content: 'O Lord our God, let your sweet beauty '
  - type: note
    content: Or “favor.”
  - type: text
    content: rest upon us.
  - type: text
    content: Come work with us, and then our works will endure;
  - type: text
    content: you will give us success in all we do.
  '2':
  - type: text
    content: Long before you gave birth to the earth
  - type: text
    content: and before the mountains were born,
  - type: text
    content: you have been from everlasting to everlasting,
  - type: note
    content: The Hebrew word often rendered “eternity” [“everlasting”] is ‘olam, which can be translated “beyond the horizon.”
  - type: text
    content: the one and only true God.
  '3':
  - type: text
    content: When you speak the words “Life, return to me!”
  - type: text
    content: man turns back to dust.
  '4':
  - type: text
    content: One thousand years pass before your eyes
  - type: text
    content: like yesterday that quickly faded away,
  - type: text
    content: like a night’s sleep soon forgotten.
  - type: note
    content: Or “like divisions [watches] of the night.”
  '5':
  - type: text
    content: One day we will each be swept away into the sleep of death.
  - type: text
    content: We glide along through the tides of time—
  - type: text
    content: so quickly gone, like a dream that fades at dawn,
  - type: note
    content: A poetic description of what is implied in the context.
  - type: text
    content: like glistening grass that springs up one day
  - type: text
    content: and is dry and withered the next, ready to be cut down!
  '7':
  - type: text
    content: Terrified by your anger, confined beneath the curse,
  - type: text
    content: we live our lives knowing your wrath.
  - type: note
    content: Or “worn out by your rage.” Jesus has come and broken the curse and lifted the unbearable burden of our sins.
  '8':
  - type: text
    content: For all of our faults and flaws are in full view to you.
  - type: note
    content: The Septuagint reads “The laws we have broken all stand before you.”
  - type: text
    content: Everything we want to hide, you search out
  - type: text
    content: and expose by the radiance of your face.
  '9':
  - type: text
    content: We are banished to live in the shadow of your anger.
  - type: text
    content: Our days soon become years until our lifetime comes to an end,
  - type: text
    content: finished with nothing but a sigh.
  - type: note
    content: The Septuagint reads “All our days have been filled with failures.”
