document_id: PSA.90
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God, the Eternal
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A prayer of Moses, God’s prophet
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, you have always been our eternal home,
- type: usfm
  marker: q1
  children:
  - type: text
    text: our hiding place from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Long before you gave birth to the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: and before the mountains were born,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you have been from everlasting to everlasting,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word often rendered “eternity” [“everlasting”] is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘olam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which can be translated “beyond the horizon.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the one and only true God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When you speak the words “Life, return to me!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: man turns back to dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: One thousand years pass before your eyes
- type: usfm
  marker: q1
  children:
  - type: text
    text: like yesterday that quickly faded away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a night’s sleep soon forgotten.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “like divisions [watches] of the night.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: One day we will each be swept away into the sleep of death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We glide along through the tides of time—
- type: usfm
  marker: q1
  children:
  - type: text
    text: so quickly gone, like a dream that fades at dawn,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A poetic description of what is implied in the context.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: like glistening grass that springs up one day
- type: usfm
  marker: q1
  children:
  - type: text
    text: and is dry and withered the next, ready to be cut down!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Terrified by your anger, confined beneath the curse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: we live our lives knowing your wrath.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “worn out by your rage.” Jesus has come and broken the curse and lifted the unbearable burden of our sins.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For all of our faults and flaws are in full view to you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “The laws we have broken all stand before you.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything we want to hide, you search out
- type: usfm
  marker: q1
  children:
  - type: text
    text: and expose by the radiance of your face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We are banished to live in the shadow of your anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our days soon become years until our lifetime comes to an end,
- type: usfm
  marker: q1
  children:
  - type: text
    text: finished with nothing but a sigh.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “All our days have been filled with failures.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You’ve limited our life span to a mere seventy years,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yet some you give grace to live still longer.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “if in strength eighty years.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even the best of years are marred by tears and toils
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in the end are nothing more than a gravestone in a graveyard!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A poetic description of what is implied in the context. The Septuagint has the phrase “until we mellow and accept your correction.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re gone so quickly, so swiftly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: we pass away and simply disappear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lord, who fully knows the power of your passion
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the intensity of your emotions?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Hebrew can be translated “Who could experience the strength of your anger? Who could endure the fear your fury can bring, and who truly comprehends the fear of God?”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Help us to remember that our days are numbered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and help us to interpret our lives correctly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set your wisdom deeply in our hearts
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that we may accept your correction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Return to us again, O God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How much longer will it take until you show us
- type: usfm
  marker: q1
  children:
  - type: text
    text: your abundant compassion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let the sunrise of your love end our dark night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Break through our clouded dawn again!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Only you can satisfy our hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: filling us with songs of joy to the end of our days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: We’ve been overwhelmed with grief;
- type: usfm
  marker: q1
  children:
  - type: text
    text: come now and overwhelm us with gladness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Replace our years of trouble with decades of delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let us see your miracles again, and let the rising generation
- type: usfm
  marker: q1
  children:
  - type: text
    text: see the glorious wonders you’re famous for.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'O Lord our God, let your sweet beauty '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 90:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “favor.”
    marker-yv: yv-n
  - type: text
    text: rest upon us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come work with us, and then our works will endure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will give us success in all we do.
