document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Cry to God
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s song of love’s celebration
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I poured out my complaint to you, God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I lifted up my voice, shouting out for your help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When I was in deep distress, in my day of trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I reached out for you with hands stretched out to heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Over and over I kept looking for you, God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but your comforting grace was nowhere to be found.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As I thought of you I moaned, “God, where are you?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 77:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “When I am in heaviness [depressed], I will think upon God.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m overwhelmed with despair as I wait for your help to arrive.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I can’t get a wink of sleep until you come and comfort me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I’m too burdened to even pray!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My mind wandered, thinking of days gone by—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the years long since passed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then I remembered the worship songs I used to sing
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the night seasons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my heart began to fill again with thoughts of you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So my spirit went out once more in search of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Would you really walk off and leave me forever, my Lord God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Won’t you show me your kind favor, delighting in me again?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Has your well of sweet mercy dried up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will your promises never come true?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Have you somehow forgotten to show me love?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are you so angry that you’ve closed
- type: usfm
  marker: q1
  children:
  - type: text
    text: your heart of compassion toward me?
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lord, what wounds me most is that it’s somehow my fault that
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ve changed your heart toward me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I no longer see the years of the Mighty One
- type: usfm
  marker: q1
  children:
  - type: text
    text: or your right hand of power.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 77:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This difficult verse has a number of alternate translations, including “Your right hand has changed [or withered].” The implication is that God’s power and protection are no longer being seen.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yet I could never forget all your miracles, my God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I remember all your wonders of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I ponder all you’ve done, Lord, musing on all your miracles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: It’s here in your presence, in your sanctuary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where I learn more of your ways,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 77:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is an alternative translation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for holiness is revealed in everything you do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, you’re the one and only, the great and glorious God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Your display of wonders, miracles, and power
- type: usfm
  marker: q1
  children:
  - type: text
    text: makes the nations acknowledge you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: By your glory-bursts you’ve rescued us over and over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just ask the sons of Jacob or
- type: usfm
  marker: q1
  children:
  - type: text
    text: the sons of Joseph, and they will tell you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all of us, your beloved ones, know that it’s true!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the many waters of the Red Sea took one look at you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 77:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the Red Sea is not mentioned in the verse, it is implied in the context.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: they were afraid and ran away to hide—
- type: usfm
  marker: q1
  children:
  - type: text
    text: trembling to its depths!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Storm clouds filled with water high in the skies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: cloudbursts and thunderclaps announced your approach.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lightning-flashes lit up the landscape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rolling whirlwinds exploded with sonic booms of thunder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rumbling as the skies shouted out your story
- type: usfm
  marker: q1
  children:
  - type: text
    text: with light and sound and wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything on earth shook and trembled as you drew near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your steps formed a highway through the seas
- type: usfm
  marker: q1
  children:
  - type: text
    text: with footprints on a pathway no one even knew was there.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 77:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could be a prophecy of Jesus one day walking on water.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You led your people forward by your loving hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: blessed by the leadership of Moses and Aaron.
