document_id: PSA.77,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry to God
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: Asaph’s song of love’s celebration
  - type: text
    content: I poured out my complaint to you, God.
  - type: text
    content: I lifted up my voice, shouting out for your help.
  '10':
  - type: text
    content: Lord, what wounds me most is that it’s somehow my fault that
  - type: text
    content: you’ve changed your heart toward me
  - type: text
    content: and I no longer see the years of the Mighty One
  - type: text
    content: or your right hand of power.
  - type: note
    content: This difficult verse has a number of alternate translations, including “Your right hand has changed [or withered].” The implication is that God’s power and protection are no longer being seen.
  '11':
  - type: text
    content: Yet I could never forget all your miracles, my God,
  - type: text
    content: as I remember all your wonders of old.
  '12':
  - type: text
    content: I ponder all you’ve done, Lord, musing on all your miracles.
  '13':
  - type: text
    content: It’s here in your presence, in your sanctuary,
  - type: text
    content: where I learn more of your ways,
  - type: note
    content: This is an alternative translation.
  - type: text
    content: for holiness is revealed in everything you do.
  - type: text
    content: Lord, you’re the one and only, the great and glorious God!
  '14':
  - type: text
    content: Your display of wonders, miracles, and power
  - type: text
    content: makes the nations acknowledge you.
  '15':
  - type: text
    content: By your glory-bursts you’ve rescued us over and over.
  - type: text
    content: Just ask the sons of Jacob or
  - type: text
    content: the sons of Joseph, and they will tell you!
  - type: text
    content: And all of us, your beloved ones, know that it’s true!
  - type: text
    content: Pause in his presence
  '16':
  - type: text
    content: When the many waters of the Red Sea took one look at you,
  - type: note
    content: Although the Red Sea is not mentioned in the verse, it is implied in the context.
  - type: text
    content: they were afraid and ran away to hide—
  - type: text
    content: trembling to its depths!
  '17':
  - type: text
    content: Storm clouds filled with water high in the skies;
  - type: text
    content: cloudbursts and thunderclaps announced your approach.
  - type: text
    content: Lightning-flashes lit up the landscape.
  '18':
  - type: text
    content: Rolling whirlwinds exploded with sonic booms of thunder,
  - type: text
    content: rumbling as the skies shouted out your story
  - type: text
    content: with light and sound and wind.
  - type: text
    content: Everything on earth shook and trembled as you drew near.
  '19':
  - type: text
    content: Your steps formed a highway through the seas
  - type: text
    content: with footprints on a pathway no one even knew was there.
  - type: note
    content: This could be a prophecy of Jesus one day walking on water.
  '2':
  - type: text
    content: When I was in deep distress, in my day of trouble,
  - type: text
    content: I reached out for you with hands stretched out to heaven.
  - type: text
    content: Over and over I kept looking for you, God,
  - type: text
    content: but your comforting grace was nowhere to be found.
  '20':
  - type: text
    content: You led your people forward by your loving hand,
  - type: text
    content: blessed by the leadership of Moses and Aaron.
  '3':
  - type: text
    content: As I thought of you I moaned, “God, where are you?”
  - type: note
    content: Or “When I am in heaviness [depressed], I will think upon God.”
  - type: text
    content: I’m overwhelmed with despair as I wait for your help to arrive.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: I can’t get a wink of sleep until you come and comfort me.
  - type: text
    content: Now I’m too burdened to even pray!
  '5':
  - type: text
    content: My mind wandered, thinking of days gone by—
  - type: text
    content: the years long since passed.
  '6':
  - type: text
    content: Then I remembered the worship songs I used to sing
  - type: text
    content: in the night seasons,
  - type: text
    content: and my heart began to fill again with thoughts of you.
  - type: text
    content: So my spirit went out once more in search of you.
  '7':
  - type: text
    content: Would you really walk off and leave me forever, my Lord God?
  - type: text
    content: Won’t you show me your kind favor, delighting in me again?
  '8':
  - type: text
    content: Has your well of sweet mercy dried up?
  - type: text
    content: Will your promises never come true?
  '9':
  - type: text
    content: Have you somehow forgotten to show me love?
  - type: text
    content: Are you so angry that you’ve closed
  - type: text
    content: your heart of compassion toward me?
  - type: text
    content: Pause in his presence
