  - type: text
    text: 'Soon, there were so many people surrounding him that he had to teach sitting in a boat while the large crowd stood on the shore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He taught them many things by using stories, parables to illustrate spiritual truths, '
  - type: usfm
