    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic and Greek use a word for “parable” that means “a metaphor, allegory, simile, illustration, comparison, figure of speech, riddle, or enigmatic saying that is meant to stimulate intense thought.” Throughout Hebrew history wise men, prophets, and teachers used parables and allegories as a preferred method of teaching spiritual truths. Poets would write their riddles and musicians would sing their proverbs with verbal imagery. Jesus never taught the people without using allegory and parables (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:34
      metadata:
        usfm: MAT.13.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). As a true prophet, one of Jesus’ preferred methods of teaching was allegory. To deny the validity of allegorical teaching is to ignore the teaching methods of Jesus, the Living Word. This chapter contains seven parables of Jesus: (1) the parable of the sower, (2) the parable of the wheat and weeds, (3) the parable of the net, (4) the parable of the tiny mustard seed, (5) the parable of yeast, (6) the parable of the hidden treasure, and (7) the parable of the costly pearl.'
