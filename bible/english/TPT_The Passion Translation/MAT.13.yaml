    content: but when the days grew hot, they were scorched and withered because they had insufficient roots.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Others fell among the thorns, so when they sprouted, the thorns choked them.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But other
  - type: text
