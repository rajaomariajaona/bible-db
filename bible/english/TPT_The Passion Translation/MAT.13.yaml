      - type: text
        text: is found twenty-seven times in the New Testament and means “secrets” or “mysteries.” The mysteries of heaven’s kingdom realm are spiritual insights into the nature and ways of God. Jesus Christ can only be fully understood by the spirit, not merely by the intellect of man. Jesus taught his disciples using the cryptic language of parables to move them beyond intellectual abilities and engage the spirit. If the listener had a hunger to learn with an open, teachable heart, then Jesus’ words brought life and understanding. We must always be those who push aside our opinions and traditions to glean the deepest meaning of all that Jesus did and taught. See also
