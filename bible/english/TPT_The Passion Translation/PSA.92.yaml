document_id: PSA.92,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise
  - type: text
    content: A song for the day of worship
  - type: note
    content: Ancient Jewish tradition holds that Adam composed this psalm on the first Sabbath of creation, and it was to be sung by the Levites on the Sabbath in the temple.
  - type: text
    content: It’s so enjoyable to come before you
  - type: text
    content: with uncontainable praises spilling from our hearts!
  - type: text
    content: How we love to sing our praises over and over to you,
  - type: text
    content: to the matchless God, high and exalted over all!
  '10':
  - type: text
    content: Your anointing has made me strong and mighty.
  - type: text
    content: You’ve empowered my life for triumph
  - type: note
    content: The Septuagint reads “I will raise my horn high like a rhinoceros [Hb. translated as “wild ox”], and in my old age I will still have plenty of oil [anointing].”
  - type: text
    content: by pouring fresh oil over me.
  '11':
  - type: text
    content: You’ve said that those lying in wait to pounce on me
  - type: text
    content: would be defeated,
  - type: text
    content: and now it’s happened right in front of my eyes,
  - type: text
    content: and I’ve heard their cries of surrender!
  '12':
  - type: text
    content: Yes! Look how you’ve made all your devoted lovers
  - type: text
    content: to flourish like palm trees,
  - type: text
    content: each one growing in victory, standing with strength!
  - type: note
    content: Or “growing high like a cedar in Lebanon.” God makes us immortal and immovable.
  '13':
  - type: text
    content: You’ve transplanted them into your heavenly courtyard,
  - type: text
    content: where they are thriving before you,
  '14':
  - type: text
    content: for in your presence they will still overflow and be anointed.
  - type: text
    content: Even in their old age they will stay fresh,
  - type: text
    content: bearing luscious fruit and abiding faithfully.
  '15':
  - type: text
    content: 'Listen to them! With pleasure they still proclaim:'
  - type: text
    content: “You’re so good! You’re my beautiful strength!
  - type: text
    content: You’ve never made a mistake with me.”
  - type: note
    content: Or “You are just and never unfair.”
  '2':
  - type: text
    content: At each and every sunrise we will be thanking you
  - type: text
    content: for your kindness and your love.
  - type: text
    content: As the sun sets and all through the night,
  - type: text
    content: we will keep proclaiming, “You are so faithful!”
  '3':
  - type: text
    content: Melodies of praise will fill the air as every musical instrument,
  - type: note
    content: Or “a ten-stringed harp and lyre.”
  - type: text
    content: joined with every heart, overflows with worship.
  '4':
  - type: text
    content: No wonder I’m so glad; I can’t keep it in!
  - type: text
    content: Lord, I’m shouting with glee over all you’ve done,
  - type: text
    content: 'for all you’ve done for me:'
  '5':
  - type: text
    content: what mighty miracles and your power at work—just to name a few!
  - type: text
    content: Depths of purpose and layers of meaning
  - type: text
    content: saturate everything you do.
  '6':
  - type: text
    content: Such amazing mysteries are found within every miracle
  - type: text
    content: that nearly everyone seems to miss.
  - type: text
    content: Those with no discernment can never really discover
  - type: text
    content: the deep and glorious secrets hidden in your ways.
  '7':
  - type: text
    content: It’s true the wicked flourish, but only for a moment;
  - type: text
    content: they foolishly forget their destiny with death,
  - type: text
    content: that they will all one day be destroyed forevermore.
  '8':
  - type: text
    content: But you, O Lord, are exalted forever
  - type: text
    content: in the highest place of endless glory,
  '9':
  - type: text
    content: while your opponents, the workers of wickedness,
  - type: text
    content: will all perish, forever separated from you.
