document_id: PSA.92,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Song of Praise
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for the day of worship
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '92'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancient Jewish tradition holds that Adam composed this psalm on the first Sabbath of creation, and it was to be sung by the Levites on the Sabbath in the temple.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s so enjoyable to come before you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with uncontainable praises spilling from our hearts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How we love to sing our praises over and over to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the matchless God, high and exalted over all!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your anointing has made me strong and mighty.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You’ve empowered my life for triumph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 92:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “I will raise my horn high like a rhinoceros [Hb. translated as “wild ox”], and in my old age I will still have plenty of oil [anointing].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by pouring fresh oil over me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve said that those lying in wait to pounce on me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would be defeated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and now it’s happened right in front of my eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’ve heard their cries of surrender!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes! Look how you’ve made all your devoted lovers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to flourish like palm trees,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each one growing in victory, standing with strength!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 92:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “growing high like a cedar in Lebanon.” God makes us immortal and immovable.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve transplanted them into your heavenly courtyard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where they are thriving before you,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for in your presence they will still overflow and be anointed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in their old age they will stay fresh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bearing luscious fruit and abiding faithfully.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to them! With pleasure they still proclaim:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You’re so good! You’re my beautiful strength!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve never made a mistake with me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 92:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You are just and never unfair.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At each and every sunrise we will be thanking you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your kindness and your love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the sun sets and all through the night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we will keep proclaiming, “You are so faithful!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Melodies of praise will fill the air as every musical instrument,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 92:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a ten-stringed harp and lyre.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: joined with every heart, overflows with worship.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wonder I’m so glad; I can’t keep it in!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, I’m shouting with glee over all you’ve done,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for all you’ve done for me:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what mighty miracles and your power at work—just to name a few!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depths of purpose and layers of meaning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saturate everything you do.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such amazing mysteries are found within every miracle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that nearly everyone seems to miss.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those with no discernment can never really discover
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the deep and glorious secrets hidden in your ways.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s true the wicked flourish, but only for a moment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they foolishly forget their destiny with death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that they will all one day be destroyed forevermore.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, O Lord, are exalted forever
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the highest place of endless glory,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while your opponents, the workers of wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will all perish, forever separated from you.
