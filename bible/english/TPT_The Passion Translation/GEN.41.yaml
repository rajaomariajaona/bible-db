document_id: GEN.41,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: From the Pit to the Palace
  - type: text
    content: 'After two full years, Pharaoh dreamed that he was standing by the Nile, '
  '10':
  - type: text
    content: 'Once, when Pharaoh was angry with his servants, he incarcerated me and the chief baker in the prison of Potiphar, the captain of the guard. '
  '11':
  - type: text
    content: 'We both had dreams on the same night but with different meanings. '
  '12':
  - type: text
    content: 'There was a young Hebrew man imprisoned with us who had been the personal servant to the captain of the guard. And when we told him our dreams, he interpreted them and told each of us their meaning. '
  '13':
  - type: text
    content: And it happened just as he said. Pharaoh restored me to my post, but he had the baker impaled.”
  '14':
  - type: text
    content: 'After hearing this, Pharaoh immediately sent for Joseph. They rushed him out of the dungeon '
  - type: text
    content: to prepare him to meet with the king
  - type: text
    content: '. '
  - type: note
    content: Joseph’s dreams landed him in a pit and later in a prison. It was Joseph’s gift for interpreting dreams that brought him out from the prison to stand before Pharaoh (see Prov. 22:29).
  - type: text
    content: When he had shaved and changed his clothes, he came and stood before Pharaoh.
  - type: note
    content: Joseph did not immediately beg to be released from prison. He approached the mighty Pharaoh with dignity and respect. Joseph quickly acknowledged that only God has the power to interpret dreams, for he is the One who gives them. Like the Lord Jesus, Joseph did only what the Father revealed to him (see John 5:19, 30).
  '15':
  - type: text
    content: Pharaoh said to Joseph, “I have had two dreams that no one can explain. I have heard that you are able to interpret a dream the moment you hear it.”
  '16':
  - type: text
    content: “I cannot do it alone,” Joseph replied, “but God will help me to give Pharaoh the proper interpretation for Pharaoh’s welfare.”
  '17':
  - type: text
    content: 'Then Pharaoh told Joseph, “In my dream I was standing on the bank of the Nile, '
  '18':
  - type: text
    content: 'and up from the river emerged seven healthy, fat cows, and they began to graze in the marshland. '
  '19':
  - type: text
    content: 'Right behind them followed seven other scrawny and emaciated cows. Never have I seen such ugly cows in all the land of Egypt! '
  '2':
  - type: text
    content: 'and up from the river emerged seven healthy, fat cows, and they began grazing in the marshland. '
  '20':
  - type: text
    content: 'The seven ugly, scrawny cows ate up the healthy, fat cows, '
  '21':
  - type: text
    content: 'but after consuming them, no one could tell that they had eaten them, for they looked just as bad as before. I awoke '
  - type: text
    content: with a start
  - type: text
    content: ', '
  '22':
  - type: text
    content: but immediately went back to sleep
  - type: text
    content: ' and had another dream. I saw seven ears of grain, full and ripe, growing on a single stalk. '
  '23':
  - type: text
    content: 'Right behind them sprouted seven thin, shriveled ears, scorched by the east wind. '
  '24':
  - type: text
    content: The seven shriveled ears swallowed up the seven healthy ears. I have shared my dreams with my magicians, but no one can give me an interpretation.”
  - type: heading
    content: Joseph Interprets Pharaoh’s Dreams
  '25':
  - type: text
    content: 'Then Joseph said to Pharaoh, “Both your dreams tell the same story, for God has '
  - type: text
    content: prophetically
  - type: text
    content: ' told Pharaoh what he is about to do. '
  '26':
  - type: text
    content: 'Both the seven healthy cows and the seven healthy ears represent seven good years; it’s the same dream. '
  '27':
  - type: text
    content: 'The seven ugly and scrawny cows that followed and the seven shriveled ears scorched by the east wind are seven years also. They represent seven years of famine. '
  '28':
  - type: text
    content: 'It is just as I have told Pharaoh; God has divinely revealed what he is about to do. '
  '29':
  - type: text
    content: 'There will come seven years of great abundance throughout all the land of Egypt, '
  '3':
  - type: text
    content: 'Then he saw seven other cows come up out of the Nile right behind them. They were ugly and thin, and they stood beside the fat cows on the riverbank. '
  '30':
  - type: text
    content: 'followed by seven years of intense famine. All of Egypt will forget the former abundance, for all the land will be ravaged by a famine, a very severe famine. They will not even remember their former abundance. '
  '32':
  - type: text
    content: 'The reason that Pharaoh’s dream was repeated is that God has determined that it will surely happen, '
  - type: note
    content: See Deut. 13:1–5.
  - type: text
    content: and that he will soon carry it out.”
  '33':
  - type: text
    content: Joseph continued
  - type: text
    content: ', “Let Pharaoh select a very wise and discerning man and set him over the land of Egypt. '
  '34':
  - type: text
    content: 'Let Pharaoh appoint other officials throughout the land to collect one-fifth of all the crops each year during the seven plentiful years. '
  '35':
  - type: text
    content: 'Have them gather all the food of these abundant years that are coming, and under Pharaoh’s authority, have the grain stored in the cities for food. '
  '36':
  - type: text
    content: Store it all as food reserve for the people during the seven years of famine coming upon Egypt, so that the land will survive the famine.”
  - type: heading
    content: Joseph Promoted to Power
  '37':
  - type: text
    content: 'Joseph’s proposal pleased Pharaoh and all his advisers. '
  '38':
  - type: text
    content: 'He said to them, “Where can we find anyone else like this one, for he has the Spirit of God in him!” '
  - type: note
    content: How true this is of Jesus as well. There is simply no one like our Lord Jesus Christ. He walked in the fullness of the Spirit without limitation (see John 3:34). Joseph was a forerunner of our Lord Jesus. His wisdom and understanding for interpreting dreams flowed out of a relationship with God’s Spirit. True wisdom comes from the Spirit of Christ (see Col. 2:3). This is the first time that Scripture mentions that someone has the Spirit of God in them. Later in the Old Testament, Bezalel, the craftsman of the tabernacle, is similarly described (see Ex. 31:3; 35:31), as well as Daniel (see Dan. 5:14).
  '39':
  - type: text
    content: 'So Pharaoh turned to Joseph and said, “Since God has divinely revealed this to you, there is no one as wise and full of insight as you. '
  '4':
  - type: text
    content: The seven ugly, thin cows ate up the seven healthy, fat cows.
  - type: text
    content: 'After Pharaoh’s dream he awoke '
  '40':
  - type: text
    content: 'I hereby place you in charge of all my affairs, and all my people will obey your commands. '
  - type: note
    content: The Hebrew text is literally “on your mouth all my people will kiss.” See also Ps. 2:11–12, where a kiss demonstrates serving and worshiping God.
  - type: text
    content: 'Only I, the king, '
  - type: note
    content: Or “Only the throne,” a metonymy for the king and his authority.
  - type: text
    content: will be greater than you!
  '41':
  - type: text
    content: '“Listen to me, Joseph,” Pharaoh continued. “I am placing you in charge of all of Egypt.” '
  '42':
  - type: text
    content: 'Then he removed his signet ring, '
  - type: note
    content: Pharaoh validated Joseph’s authority by giving him his signet ring, which had the royal seal of Egypt engraved upon it.
  - type: text
    content: 'placed it on Joseph’s finger, and had him clothed with fine linen robes! '
  - type: note
    content: Instead of prison garments, Joseph was given the finest of clothing (the linen garments of a priest). Joseph had lost a robe twice; now he received a new one! He who had been dragging fetters of iron was now adorned with a chain of gold. Pharaoh gave Joseph an usekh, a broad collar made of gold. The Egyptians placed these collars on their deities or officials. Pharaoh recognized that God was with Joseph, and the Egyptians would recognize Joseph’s authority. See Dan. 5:7; Est. 8:2. Instead of sitting in a dingy dungeon, Joseph was free. He was even given the keys to his own chariot! Joseph was now thirty years old (see Gen. 41:46). This is the age at which Jewish men could enter priestly service at the temple and the age at which Jesus began his earthly ministry. Nevertheless, it is a very young age to be awarded the highest governmental position in a powerful nation with the responsibility of running the affairs of the country. This testifies to Joseph’s God-given wisdom and grace.
  - type: text
    content: 'He adorned him with a golden collar around his neck. '
  '43':
  - type: text
    content: 'Pharaoh had him ride in the chariot reserved for the second-in-command and sent runners going before him, crying out, “Kneel!” '
  - type: note
    content: Joseph, once accused of rape, was now made prime minister, head of all the people, chief justice, and general of the armed forces in all of Egypt—all as a foreigner! He went from a prison to the highest office in the land in one day! Joseph had the strange experience of having what others dream about, but not what he dreamed about. His gifts were finally recognized, but not by his brothers. A million people shouting “Kneel!” would not do for Joseph as much as eleven brothers doing the same. This exaltation, as glorious as it was, still fell short of what God had promised Joseph in his dreams.
  - type: text
    content: In this way, Pharaoh placed Joseph over all the land of Egypt.
  '44':
  - type: text
    content: 'Pharaoh also said to Joseph, “I am Pharaoh. No one in all of Egypt will lift a finger '
  - type: note
    content: Or “no one will lift a hand or foot.”
  - type: text
    content: without your permission!”
  - type: heading
    content: A New Identity and a Bride
  '45':
  - type: text
    content: 'Pharaoh gave Joseph a new name: Revealer of Secrets. '
  - type: note
    content: Or “Zaphenath-Paneah.” The root word for “Zaphenath” means “to hide,” and the root word for “Paneah” means “to disclose [explain].” The Greek of the Septuagint can be translated “savior of the world [sustainer of life].” Other scholars believe it could be translated “God has said, ‘he will live.’ ” Each of these possible translations can point us to Jesus Christ, the true Revealer of Mysteries, the Savior of the world, and the One God raised from the dead.
  - type: text
    content: 'He also arranged for him to marry the daughter of Potiphera, '
  - type: note
    content: Potiphera is the longer form of the name Potiphar. Some of oldest traditions of Rabbinical Judaism state that Potiphera was the same Potiphar that had Joseph imprisoned (see Rashi, Rashbam, Alshich). This would have been Joseph’s final vindication of innocence, to marry the daughter of the one who accused him. However, more contemporary scholars believe Potiphera was a different individual than the captain of the guard.
  - type: text
    content: 'the priest of Heliopolis. '
  - type: note
    content: Or “On [strength, vigor],” which is also recognized as Heliopolis, a modern suburb of Cairo. It is one of the most ancient Egyptian cities and was the seat of worship of the sun god Ra. Heliopolis is the home of the oldest obelisk on earth, the Obelisk of Sesostris I. Joseph was marrying the daughter of one of the most respected men in Egypt.
  - type: text
    content: 'Her name was Asenath. '
  - type: note
    content: Asenath, the daughter of the Egyptian priest of On, means “belonging to (the goddess) Neith.” Joseph was given a bride while rejected by his brothers. Joseph is a type of Christ who finds a bride during this church age. See 2 Cor. 11:2; Eph. 5:25–26.
  - type: text
    content: 'And Joseph took charge over all the land of Egypt. '
  - type: note
    content: Or “Joseph went out throughout the land of Egypt.”
  '46':
  - type: text
    content: 'Joseph was thirty years old '
  - type: note
    content: Jesus, too, was thirty when he began his public ministry. Ezekiel was thirty when he was visited by God. Thirty is the number of maturity and the priesthood, for a priest had to be thirty before he could serve in temple worship.
  - type: text
    content: 'when he entered the service of Pharaoh, king of Egypt. '
  - type: note
    content: Joseph had lived thirteen years in captivity.
  - type: text
    content: Leaving Pharaoh’s presence, Joseph traveled throughout the entire land of Egypt.
  - type: note
    content: Think of this as Joseph’s royal tour, inspecting the kingdom he was to rule over.
  - type: heading
    content: Seven Years of Abundance
  '47':
  - type: text
    content: 'During the seven years of abundance, the land produced bumper crops. '
  '48':
  - type: text
    content: 'Joseph supervised the gathering up of all the great stores of food of the seven years of abundance and '
  - type: text
    content: strategically
  - type: text
    content: ' placed them in various walled cities near where the harvest was gathered. '
  - type: note
    content: One can see the wisdom of Joseph in storing the grain near where it would be needed, versus keeping it all in one central storage place.
  '49':
  - type: text
    content: He gathered such massive quantities of produce that he gave up trying to measure it all, for it was like counting the sand on the seashore.
  - type: heading
    content: Joseph’s Two Sons
  '5':
  - type: text
    content: 'and fell back to sleep. He dreamed a second time. In his dream, he saw seven ears of grain, plump, ripe, and growing on a single stalk. '
  '50':
  - type: text
    content: 'Prior to the famine, Joseph and Asenath, daughter of Potiphera, priest of Heliopolis, had two sons. '
  '51':
  - type: text
    content: 'Joseph named the firstborn Manasseh, '
  - type: note
    content: Manasseh sounds like the Hebrew words for “he causes to forget.”
  - type: text
    content: 'saying, “God has made me forget all my troubles and my parental home.” '
  '52':
  - type: text
    content: 'The second he named Ephraim, '
  - type: note
    content: 'Ephraim comes from the Hebrew word for “being fruitful,” with an implication of “double fruitfulness.” This is God’s order: Manasseh then Ephraim. God must cause us to forget our prisons of the past before we can become fruitful. The “King’s prison” is the place where we forget our pain so we can move on into the fruitfulness of becoming like Christ, one who forgives others. Instead of seeking revenge toward our brothers who have harmed us, we must give birth to a “Manasseh.” To call your afflictions “blessings” is to become fruitful and give birth to an “Ephraim.” In all of these things, we acknowledge that they are the glorious work of God (see Phil. 4:8)!'
  - type: text
    content: saying, “God has made me fruitful in the land of my suffering.”
  '53':
  - type: text
    content: 'Eventually, Egypt’s seven years of abundance came to an end. '
  '54':
  - type: text
    content: 'Then began the seven years of famine, just as Joseph prophesied. Although there was a severe famine everywhere else, food was available throughout the land of Egypt. '
  '55':
  - type: text
    content: When the Egyptians grew hungry, the people cried out to Pharaoh for food. Then Pharaoh said to all his people, “Go to Joseph and do whatever he tells you.”
  - type: note
    content: Joseph, in effect, became the Minister of Agriculture over the land. His first dream of bundles of wheat bowing before him was a prophetic hint of his future responsibilities.
  '56':
  - type: text
    content: 'As the famine worsened over all the land, Joseph opened all the storehouses '
  - type: note
    content: As translated from the Septuagint, Vulgate, and Syriac. The Hebrew is “he opened all that was among them.” Joseph opened the door for others to be fed. He was an exceptional administrator and a wise manager of Egypt’s resources. Because he had passed each previous test and grown in character, he was ready when the Lord promoted him to a place of such power. He handled all this prestige without pride or arrogance. Joseph was a man prepared to rule in wisdom and to use his position of authority to provide for others. God now had a man he could use as a deliverer.
  - type: text
    content: 'and sold grain to the Egyptians, for the famine was severe everywhere. '
  '57':
  - type: text
    content: So because of the severity of the worldwide famine, people from all over the world had to come and buy grain from Joseph.
  '6':
  - type: text
    content: 'Close behind them sprouted seven ears of grain, thin and shriveled by the east wind. '
  '7':
  - type: text
    content: 'And the seven thin ears swallowed up the seven plump and full ears. Then Pharaoh awoke from his '
  - type: text
    content: vivid and disturbing
  - type: text
    content: ' dream!'
  '8':
  - type: text
    content: 'The next morning, his spirit was agitated, so he called for all the magicians '
  - type: note
    content: The Hebrew word for “magicians” is hartumim and is used exclusively in connection with Egypt and Babylon.
  - type: text
    content: and wise men in Egypt. Pharaoh recounted his dreams to them, but no one could give him the interpretation.
  '9':
  - type: text
    content: 'When the chief steward '
  - type: text
    content: heard about the dreams he remembered Joseph and
  - type: text
    content: ' said to Pharaoh, “'
  - type: text
    content: Please
  - type: text
    content: ', your dream reminds me today of my failures. '
