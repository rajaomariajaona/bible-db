document_id: GEN.41
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: From the Pit to the Palace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After two full years, Pharaoh dreamed that he was standing by the Nile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and up from the river emerged seven healthy, fat cows, and they began grazing in the marshland. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then he saw seven other cows come up out of the Nile right behind them. They were ugly and thin, and they stood beside the fat cows on the riverbank. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The seven ugly, thin cows ate up the seven healthy, fat cows.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'After Pharaoh’s dream he awoke '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and fell back to sleep. He dreamed a second time. In his dream, he saw seven ears of grain, plump, ripe, and growing on a single stalk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Close behind them sprouted seven ears of grain, thin and shriveled by the east wind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the seven thin ears swallowed up the seven plump and full ears. Then Pharaoh awoke from his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: vivid and disturbing
  - type: text
    text: ' dream!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The next morning, his spirit was agitated, so he called for all the magicians '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “magicians” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hartumim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and is used exclusively in connection with Egypt and Babylon.
    marker-yv: yv-n
  - type: text
    text: and wise men in Egypt. Pharaoh recounted his dreams to them, but no one could give him the interpretation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the chief steward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heard about the dreams he remembered Joseph and
  - type: text
    text: ' said to Pharaoh, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Please
  - type: text
    text: ', your dream reminds me today of my failures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Once, when Pharaoh was angry with his servants, he incarcerated me and the chief baker in the prison of Potiphar, the captain of the guard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We both had dreams on the same night but with different meanings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There was a young Hebrew man imprisoned with us who had been the personal servant to the captain of the guard. And when we told him our dreams, he interpreted them and told each of us their meaning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And it happened just as he said. Pharaoh restored me to my post, but he had the baker impaled.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'After hearing this, Pharaoh immediately sent for Joseph. They rushed him out of the dungeon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to prepare him to meet with the king
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph’s dreams landed him in a pit and later in a prison. It was Joseph’s gift for interpreting dreams that brought him out from the prison to stand before Pharaoh (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 22:29
      metadata:
        usfm: PRO.22.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: When he had shaved and changed his clothes, he came and stood before Pharaoh.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph did not immediately beg to be released from prison. He approached the mighty Pharaoh with dignity and respect. Joseph quickly acknowledged that only God has the power to interpret dreams, for he is the One who gives them. Like the Lord Jesus, Joseph did only what the Father revealed to him (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 5:19
      metadata:
        usfm: JHN.5.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: JHN.5.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pharaoh said to Joseph, “I have had two dreams that no one can explain. I have heard that you are able to interpret a dream the moment you hear it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “I cannot do it alone,” Joseph replied, “but God will help me to give Pharaoh the proper interpretation for Pharaoh’s welfare.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Pharaoh told Joseph, “In my dream I was standing on the bank of the Nile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and up from the river emerged seven healthy, fat cows, and they began to graze in the marshland. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Right behind them followed seven other scrawny and emaciated cows. Never have I seen such ugly cows in all the land of Egypt! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The seven ugly, scrawny cows ate up the healthy, fat cows, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but after consuming them, no one could tell that they had eaten them, for they looked just as bad as before. I awoke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with a start
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: but immediately went back to sleep
  - type: text
    text: ' and had another dream. I saw seven ears of grain, full and ripe, growing on a single stalk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Right behind them sprouted seven thin, shriveled ears, scorched by the east wind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The seven shriveled ears swallowed up the seven healthy ears. I have shared my dreams with my magicians, but no one can give me an interpretation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Interprets Pharaoh’s Dreams
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joseph said to Pharaoh, “Both your dreams tell the same story, for God has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophetically
  - type: text
    text: ' told Pharaoh what he is about to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Both the seven healthy cows and the seven healthy ears represent seven good years; it’s the same dream. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The seven ugly and scrawny cows that followed and the seven shriveled ears scorched by the east wind are seven years also. They represent seven years of famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'It is just as I have told Pharaoh; God has divinely revealed what he is about to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'There will come seven years of great abundance throughout all the land of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: 'followed by seven years of intense famine. All of Egypt will forget the former abundance, for all the land will be ravaged by a famine, a very severe famine. They will not even remember their former abundance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The reason that Pharaoh’s dream was repeated is that God has determined that it will surely happen, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 13:1–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and that he will soon carry it out.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joseph continued
  - type: text
    text: ', “Let Pharaoh select a very wise and discerning man and set him over the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Let Pharaoh appoint other officials throughout the land to collect one-fifth of all the crops each year during the seven plentiful years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Have them gather all the food of these abundant years that are coming, and under Pharaoh’s authority, have the grain stored in the cities for food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Store it all as food reserve for the people during the seven years of famine coming upon Egypt, so that the land will survive the famine.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Promoted to Power
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Joseph’s proposal pleased Pharaoh and all his advisers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He said to them, “Where can we find anyone else like this one, for he has the Spirit of God in him!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: How true this is of Jesus as well. There is simply no one like our Lord Jesus Christ. He walked in the fullness of the Spirit without limitation (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 3:34
      metadata:
        usfm: JHN.3.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Joseph was a forerunner of our Lord Jesus. His wisdom and understanding for interpreting dreams flowed out of a relationship with God’s Spirit. True wisdom comes from the Spirit of Christ (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 2:3
      metadata:
        usfm: COL.2.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This is the first time that Scripture mentions that someone has the Spirit of God in them. Later in the Old Testament, Bezalel, the craftsman of the tabernacle, is similarly described (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 31:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 35:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), as well as Daniel (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 5:14
      metadata:
        usfm: DAN.5.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So Pharaoh turned to Joseph and said, “Since God has divinely revealed this to you, there is no one as wise and full of insight as you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I hereby place you in charge of all my affairs, and all my people will obey your commands. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is literally “on your mouth all my people will kiss.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 2:11–12
      metadata:
        usfm: PSA.2.11+PSA.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', where a kiss demonstrates serving and worshiping God.'
    marker-yv: yv-n
  - type: text
    text: 'Only I, the king, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Only the throne,” a metonymy for the king and his authority.
    marker-yv: yv-n
  - type: text
    text: will be greater than you!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“Listen to me, Joseph,” Pharaoh continued. “I am placing you in charge of all of Egypt.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then he removed his signet ring, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pharaoh validated Joseph’s authority by giving him his signet ring, which had the royal seal of Egypt engraved upon it.
    marker-yv: yv-n
  - type: text
    text: 'placed it on Joseph’s finger, and had him clothed with fine linen robes! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Instead of prison garments, Joseph was given the finest of clothing (the linen garments of a priest). Joseph had lost a robe twice; now he received a new one! He who had been dragging fetters of iron was now adorned with a chain of gold. Pharaoh gave Joseph an
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: usekh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a broad collar made of gold. The Egyptians placed these collars on their deities or officials. Pharaoh recognized that God was with Joseph, and the Egyptians would recognize Joseph’s authority. See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 5:7
      metadata:
        usfm: DAN.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Est. 8:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Instead of sitting in a dingy dungeon, Joseph was free. He was even given the keys to his own chariot! Joseph was now thirty years old (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 41:46
      metadata:
        usfm: GEN.41.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This is the age at which Jewish men could enter priestly service at the temple and the age at which Jesus began his earthly ministry. Nevertheless, it is a very young age to be awarded the highest governmental position in a powerful nation with the responsibility of running the affairs of the country. This testifies to Joseph’s God-given wisdom and grace.
    marker-yv: yv-n
  - type: text
    text: 'He adorned him with a golden collar around his neck. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Pharaoh had him ride in the chariot reserved for the second-in-command and sent runners going before him, crying out, “Kneel!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph, once accused of rape, was now made prime minister, head of all the people, chief justice, and general of the armed forces in all of Egypt—all as a foreigner! He went from a prison to the highest office in the land in one day! Joseph had the strange experience of having what others dream about, but not what he dreamed about. His gifts were finally recognized, but not by his brothers. A million people shouting “Kneel!” would not do for Joseph as much as eleven brothers doing the same. This exaltation, as glorious as it was, still fell short of what God had promised Joseph in his dreams.
    marker-yv: yv-n
  - type: text
    text: In this way, Pharaoh placed Joseph over all the land of Egypt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pharaoh also said to Joseph, “I am Pharaoh. No one in all of Egypt will lift a finger '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “no one will lift a hand or foot.”
    marker-yv: yv-n
  - type: text
    text: without your permission!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Identity and a Bride
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Pharaoh gave Joseph a new name: Revealer of Secrets. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Zaphenath-Paneah.” The root word for “Zaphenath” means “to hide,” and the root word for “Paneah” means “to disclose [explain].” The Greek of the Septuagint can be translated “savior of the world [sustainer of life].” Other scholars believe it could be translated “God has said, ‘he will live.’ ” Each of these possible translations can point us to Jesus Christ, the true Revealer of Mysteries, the Savior of the world, and the One God raised from the dead.
    marker-yv: yv-n
  - type: text
    text: 'He also arranged for him to marry the daughter of Potiphera, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Potiphera is the longer form of the name Potiphar. Some of oldest traditions of Rabbinical Judaism state that Potiphera was the same Potiphar that had Joseph imprisoned (see Rashi, Rashbam, Alshich). This would have been Joseph’s final vindication of innocence, to marry the daughter of the one who accused him. However, more contemporary scholars believe Potiphera was a different individual than the captain of the guard.
    marker-yv: yv-n
  - type: text
    text: 'the priest of Heliopolis. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “On [strength, vigor],” which is also recognized as Heliopolis, a modern suburb of Cairo. It is one of the most ancient Egyptian cities and was the seat of worship of the sun god Ra. Heliopolis is the home of the oldest obelisk on earth, the Obelisk of Sesostris I. Joseph was marrying the daughter of one of the most respected men in Egypt.
    marker-yv: yv-n
  - type: text
    text: 'Her name was Asenath. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asenath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the daughter of the Egyptian priest of On, means “belonging to (the goddess) Neith.” Joseph was given a bride while rejected by his brothers. Joseph is a type of Christ who finds a bride during this church age. See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 11:2
      metadata:
        usfm: 2CO.11.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 5:25–26
      metadata:
        usfm: EPH.5.25+EPH.5.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'And Joseph took charge over all the land of Egypt. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Joseph went out throughout the land of Egypt.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Joseph was thirty years old '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, too, was thirty when he began his public ministry. Ezekiel was thirty when he was visited by God. Thirty is the number of maturity and the priesthood, for a priest had to be thirty before he could serve in temple worship.
    marker-yv: yv-n
  - type: text
    text: 'when he entered the service of Pharaoh, king of Egypt. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph had lived thirteen years in captivity.
    marker-yv: yv-n
  - type: text
    text: Leaving Pharaoh’s presence, Joseph traveled throughout the entire land of Egypt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Think of this as Joseph’s royal tour, inspecting the kingdom he was to rule over.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seven Years of Abundance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'During the seven years of abundance, the land produced bumper crops. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Joseph supervised the gathering up of all the great stores of food of the seven years of abundance and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: strategically
  - type: text
    text: ' placed them in various walled cities near where the harvest was gathered. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One can see the wisdom of Joseph in storing the grain near where it would be needed, versus keeping it all in one central storage place.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: He gathered such massive quantities of produce that he gave up trying to measure it all, for it was like counting the sand on the seashore.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph’s Two Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Prior to the famine, Joseph and Asenath, daughter of Potiphera, priest of Heliopolis, had two sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Joseph named the firstborn Manasseh, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Manasseh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew words for “he causes to forget.”
    marker-yv: yv-n
  - type: text
    text: 'saying, “God has made me forget all my troubles and my parental home.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'The second he named Ephraim, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:52
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ephraim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comes from the Hebrew word for “being fruitful,” with an implication of “double fruitfulness.” This is God’s order: Manasseh then Ephraim. God must cause us to forget our prisons of the past before we can become fruitful. The “King’s prison” is the place where we forget our pain so we can move on into the fruitfulness of becoming like Christ, one who forgives others. Instead of seeking revenge toward our brothers who have harmed us, we must give birth to a “Manasseh.” To call your afflictions “blessings” is to become fruitful and give birth to an “Ephraim.” In all of these things, we acknowledge that they are the glorious work of God (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 4:8
      metadata:
        usfm: PHP.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )!
    marker-yv: yv-n
  - type: text
    text: saying, “God has made me fruitful in the land of my suffering.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Eventually, Egypt’s seven years of abundance came to an end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Then began the seven years of famine, just as Joseph prophesied. Although there was a severe famine everywhere else, food was available throughout the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: When the Egyptians grew hungry, the people cried out to Pharaoh for food. Then Pharaoh said to all his people, “Go to Joseph and do whatever he tells you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:55
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph, in effect, became the Minister of Agriculture over the land. His first dream of bundles of wheat bowing before him was a prophetic hint of his future responsibilities.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'As the famine worsened over all the land, Joseph opened all the storehouses '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:56
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint, Vulgate, and Syriac. The Hebrew is “he opened all that was among them.” Joseph opened the door for others to be fed. He was an exceptional administrator and a wise manager of Egypt’s resources. Because he had passed each previous test and grown in character, he was ready when the Lord promoted him to a place of such power. He handled all this prestige without pride or arrogance. Joseph was a man prepared to rule in wisdom and to use his position of authority to provide for others. God now had a man he could use as a deliverer.
    marker-yv: yv-n
  - type: text
    text: 'and sold grain to the Egyptians, for the famine was severe everywhere. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: So because of the severity of the worldwide famine, people from all over the world had to come and buy grain from Joseph.
