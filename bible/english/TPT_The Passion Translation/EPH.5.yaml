document_id: EPH.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living in God’s Love
  - type: text
    content: 'Be imitators of God in everything you do, '
  - type: note
    content: The Greek word mimetes frequently depicts an actor playing a role. God wants us to mimic him and be filled with his thoughts, his love, his deeds, and his character.
  - type: text
    content: 'for then you will represent your Father as his beloved sons and daughters. '
  '10':
  - type: text
    content: Then you will learn to choose what is beautiful to our Lord.
  '11':
  - type: text
    content: 'And don’t even associate with the servants of darkness because they have no fruit in them; instead, reveal truth to them. '
  '12':
  - type: text
    content: 'The very things they do in secret are too vile and filthy to even mention. '
  '13':
  - type: text
    content: 'Whatever the revelation-light exposes, it will also correct, and everything that reveals truth is light to the soul. '
  - type: note
    content: Or “everything revealed becomes light.”
  '14':
  - type: text
    content: This is why the Scripture says,
  - type: text
    content: “Arise, you sleeper! Rise up from your coffin and the Anointed One will shine his light into you!”
  - type: note
    content: See Isa. 26:19; 51:17; 52:1; 60:1.
  - type: heading
    content: Living in God’s Wisdom
  '15':
  - type: text
    content: 'So be very careful how you live, not being like those with no understanding, but live honorably with true wisdom, for we are living in evil times. Take full advantage of every day as you spend your life for his purposes. '
  '17':
  - type: text
    content: 'And don’t live foolishly for then you will have discernment to fully understand God’s will. '
  '18':
  - type: text
    content: 'And don’t get drunk with wine, which is rebellion; '
  - type: note
    content: The Aramaic can be translated “the wine of the prodigal.” The Greek is “reckless living” or “debauchery.”
  - type: text
    content: 'instead be filled continually with the Holy Spirit. '
  - type: note
    content: Or “be inebriated in the Spirit’s fullness.”
  '19':
  - type: text
    content: And your hearts will overflow with
  - type: text
    content: ' a joyful song to the Lord. Keep speaking to each other with words of Scripture, singing the Psalms with praises and spontaneous songs given by the Spirit! '
  - type: note
    content: Or “spiritual songs.” There is no other song more spiritual than the Song of Songs. Perhaps Paul was encouraging the church to sing and rejoice in the greatest of all songs.
  '2':
  - type: text
    content: And continue to walk surrendered to the extravagant love of Christ, for he surrendered his life as a sacrifice for us. His great love for us was pleasing to God, like an aroma of adoration—a sweet healing fragrance.
  - type: note
    content: The Aramaic word for “fragrance” can also be translated “healing balm.”
  '20':
  - type: text
    content: 'Always give thanks to Father God for every person '
  - type: note
    content: The Greek text is ambiguous; it can mean “give thanks for all things” or “for all people.” The Aramaic is quite specific—“for all people.”
  - type: text
    content: he brings into your life
  - type: text
    content: ' in the name of our Lord Jesus Christ.'
  - type: heading
    content: Loving Relationships
  '21':
  - type: text
    content: 'And out of your reverence for Christ be supportive of each other in love. '
  '22':
  - type: text
    content: 'For wives, this means being devoted '
  - type: note
    content: The Greek word for “submit,” or “supportive,” is not found in v. 22. It is literally “Wives, with your husbands.”
  - type: text
    content: 'to your husbands like you are tenderly devoted to our Lord, '
  '23':
  - type: text
    content: 'for the husband provides leadership for the wife, just as Christ provides leadership for his church, as the Savior and Reviver '
  - type: note
    content: The Aramaic word used here can be translated “Savior” or “Reviver.” This translation includes both concepts.
  - type: text
    content: 'of the body. '
  '24':
  - type: text
    content: In the same way the church is devoted to Christ, let the wives be devoted to their husbands in everything.
  '25':
  - type: text
    content: 'And to the husbands, you are to demonstrate love for your wives with the same tender devotion that Christ demonstrated to us, his bride. '
  - type: note
    content: Or “church.”
  - type: text
    content: 'For he died for us, sacrificing himself '
  '26':
  - type: text
    content: 'to make us holy and pure, cleansing us through the showering of the pure water of the Word of God. '
  '27':
  - type: text
    content: All that he does in us is designed
  - type: text
    content: ' to make us a mature church for his pleasure, until we become a source of praise to him—glorious and radiant, '
  - type: note
    content: The Greek word for “radiance” (endoxos) can also mean “gorgeous,” “honorable,” “esteemed,” “splendid,” “infused with glory.” This is what Christ’s love will do to you. (See Strong’s Concordance, Gr. 1741.)
  - type: text
    content: beautiful and holy, without fault or flaw.
  - type: note
    content: The Greek text has “without any wrinkle.” The Aramaic can be translated “without chips or knots.”
  '28':
  - type: text
    content: 'Husbands have the obligation of loving and caring for their wives the same way they love and care for their own bodies, for to love your wife is to love your own self. '
  '29':
  - type: text
    content: 'No one abuses his own body, but pampers it—serving and satisfying its needs. That’s exactly what Christ does for his church! '
  '3':
  - type: text
    content: 'And have nothing to do with sexual immorality, lust, or greed—for you are his holy ones '
  - type: text
    content: and let no one be able to accuse you of them in any form
  - type: text
    content: '. '
  '30':
  - type: text
    content: He serves and satisfies us
  - type: text
    content: ' '
  - type: note
    content: Inferred from v. 29 and made explicit here.
  - type: text
    content: as members of his body.
  '31':
  - type: text
    content: 'For this reason a man is to leave his father and his mother and lovingly hold to his wife, since the two have become joined as one flesh. '
  - type: note
    content: See Gen. 2:24.
  '32':
  - type: text
    content: 'Marriage is the beautiful design of the Almighty, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'a great mystery '
  - type: note
    content: Or “megamystery.” No book of the Bible unveils more of this great megamystery than does the Song of Songs.
  - type: text
    content: 'of Christ and his church. '
  '33':
  - type: text
    content: So every married man should be gracious to his wife just as he is gracious to himself. And every wife should be tenderly devoted to her husband.
  '4':
  - type: text
    content: Guard your speech. Forsake obscenities and worthless insults; these are nonsensical words that bring disgrace and are unnecessary. Instead, let worship fill your heart and spill out in your words.
  '5':
  - type: text
    content: 'For it has been made clear to you already that the kingdom of God cannot be accessed by anyone who is guilty of sexual sin, or who is impure or greedy—for greed is the essence of idolatry. How could they expect to have an inheritance in Christ’s kingdom '
  - type: text
    content: while doing those things
  - type: text
    content: '?'
  - type: heading
    content: Living in God’s Light
  '6':
  - type: text
    content: 'Don’t be fooled by those who speak their empty words and deceptive teachings telling you otherwise. This is what brings God’s anger upon the rebellious! '
  '7':
  - type: text
    content: 'Don’t listen to them or live like them at all. '
  '8':
  - type: text
    content: 'Once your life was full of sin’s darkness, but now you have the very light of our Lord shining through you because of your union with him. Your mission is to live as children flooded with his revelation-light! '
  '9':
  - type: text
    content: 'And the supernatural fruits of his light '
  - type: note
    content: Some Greek manuscripts have “Spirit.”
  - type: text
    content: 'will be seen in you—goodness, righteousness, and truth. '
