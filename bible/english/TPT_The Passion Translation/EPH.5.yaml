document_id: EPH.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in God’s Love
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be imitators of God in everything you do, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mimetes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: frequently depicts an actor playing a role. God wants us to mimic him and be filled with his thoughts, his love, his deeds, and his character.
      marker-yv: yv-n
    - type: text
      text: 'for then you will represent your Father as his beloved sons and daughters. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then you will learn to choose what is beautiful to our Lord.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And don’t even associate with the servants of darkness because they have no fruit in them; instead, reveal truth to them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The very things they do in secret are too vile and filthy to even mention. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever the revelation-light exposes, it will also correct, and everything that reveals truth is light to the soul. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “everything revealed becomes light.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is why the Scripture says,
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Arise, you sleeper! Rise up from your coffin and the Anointed One will shine his light into you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 26:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 60:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in God’s Wisdom
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So be very careful how you live, not being like those with no understanding, but live honorably with true wisdom, for we are living in evil times. Take full advantage of every day as you spend your life for his purposes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And don’t live foolishly for then you will have discernment to fully understand God’s will. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And don’t get drunk with wine, which is rebellion; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the wine of the prodigal.” The Greek is “reckless living” or “debauchery.”
      marker-yv: yv-n
    - type: text
      text: 'instead be filled continually with the Holy Spirit. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “be inebriated in the Spirit’s fullness.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And your hearts will overflow with
    - type: text
      text: ' a joyful song to the Lord. Keep speaking to each other with words of Scripture, singing the Psalms with praises and spontaneous songs given by the Spirit! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spiritual songs.” There is no other song more spiritual than the Song of Songs. Perhaps Paul was encouraging the church to sing and rejoice in the greatest of all songs.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And continue to walk surrendered to the extravagant love of Christ, for he surrendered his life as a sacrifice for us. His great love for us was pleasing to God, like an aroma of adoration—a sweet healing fragrance.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word for “fragrance” can also be translated “healing balm.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Always give thanks to Father God for every person '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is ambiguous; it can mean “give thanks for all things” or “for all people.” The Aramaic is quite specific—“for all people.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: he brings into your life
    - type: text
      text: ' in the name of our Lord Jesus Christ.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loving Relationships
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And out of your reverence for Christ be supportive of each other in love. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For wives, this means being devoted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “submit,” or “supportive,” is not found in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is literally “Wives, with your husbands.”
      marker-yv: yv-n
    - type: text
      text: 'to your husbands like you are tenderly devoted to our Lord, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the husband provides leadership for the wife, just as Christ provides leadership for his church, as the Savior and Reviver '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here can be translated “Savior” or “Reviver.” This translation includes both concepts.
      marker-yv: yv-n
    - type: text
      text: 'of the body. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way the church is devoted to Christ, let the wives be devoted to their husbands in everything.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to the husbands, you are to demonstrate love for your wives with the same tender devotion that Christ demonstrated to us, his bride. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “church.”
      marker-yv: yv-n
    - type: text
      text: 'For he died for us, sacrificing himself '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to make us holy and pure, cleansing us through the showering of the pure water of the Word of God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: All that he does in us is designed
    - type: text
      text: ' to make us a mature church for his pleasure, until we become a source of praise to him—glorious and radiant, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “radiance” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: endoxos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) can also mean “gorgeous,” “honorable,” “esteemed,” “splendid,” “infused with glory.” This is what Christ’s love will do to you. (See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Strong’s Concordance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gr. 1741.)'
      marker-yv: yv-n
    - type: text
      text: beautiful and holy, without fault or flaw.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text has “without any wrinkle.” The Aramaic can be translated “without chips or knots.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Husbands have the obligation of loving and caring for their wives the same way they love and care for their own bodies, for to love your wife is to love your own self. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one abuses his own body, but pampers it—serving and satisfying its needs. That’s exactly what Christ does for his church! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And have nothing to do with sexual immorality, lust, or greed—for you are his holy ones '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and let no one be able to accuse you of them in any form
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He serves and satisfies us
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Inferred from v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and made explicit here.
      marker-yv: yv-n
    - type: text
      text: as members of his body.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason a man is to leave his father and his mother and lovingly hold to his wife, since the two have become joined as one flesh. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 2:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marriage is the beautiful design of the Almighty, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'a great mystery '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “megamystery.” No book of the Bible unveils more of this great megamystery than does the Song of Songs.
      marker-yv: yv-n
    - type: text
      text: 'of Christ and his church. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So every married man should be gracious to his wife just as he is gracious to himself. And every wife should be tenderly devoted to her husband.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Guard your speech. Forsake obscenities and worthless insults; these are nonsensical words that bring disgrace and are unnecessary. Instead, let worship fill your heart and spill out in your words.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it has been made clear to you already that the kingdom of God cannot be accessed by anyone who is guilty of sexual sin, or who is impure or greedy—for greed is the essence of idolatry. How could they expect to have an inheritance in Christ’s kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while doing those things
    - type: text
      text: '?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in God’s Light
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t be fooled by those who speak their empty words and deceptive teachings telling you otherwise. This is what brings God’s anger upon the rebellious! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t listen to them or live like them at all. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once your life was full of sin’s darkness, but now you have the very light of our Lord shining through you because of your union with him. Your mission is to live as children flooded with his revelation-light! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the supernatural fruits of his light '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts have “Spirit.”
      marker-yv: yv-n
    - type: text
      text: 'will be seen in you—goodness, righteousness, and truth. '
