document_id: PSA.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 6 is a part of the daily prayer ritual of religious Jews.A Cry for Healing
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: 'A song for stringed instruments, for the new day '
  - type: note
    content: This is the Hebrew word sheminith. Although we cannot be certain, many scholars believe it to mean “eighth.” It could represent a harp with eight strings, an octave, the eighth division of singers, the eighth day, or the eighth month. Eight is the biblical number of a new beginning, a new day. Jewish rabbis have taught that the number eight is the number of the future messianic age when Messiah comes and makes all things new.
  - type: text
    content: by King David
  - type: heading
    content: How Long?
  - type: text
    content: Yahweh
  - type: text
    content: ', don’t condemn me.'
  - type: text
    content: Don’t punish me in your fiery anger.
  - type: note
    content: David implied that he had sinned and needed forgiveness. This is the first of seven penitential psalms (32; 38; 51; 102; 130; 143).
  '10':
  - type: text
    content: Now it’s my enemies who have been shamed.
  - type: text
    content: Terror-stricken, they will turn back again,
  - type: note
    content: See Pss. 9:18; 31:8.
  - type: text
    content: knowing the bitterness of sudden disgrace!
  '2':
  - type: text
    content: Please deal gently with me
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ;
  - type: text
    content: show me mercy, for I’m sick and frail and weak.
  - type: text
    content: 'Heal me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', for I’m falling apart.'
  - type: note
    content: Or “my bones are shaking.” Bones are often used metaphorically for our inner being.
  '3':
  - type: text
    content: My soul is so troubled; but you,
  - type: text
    content: Yahweh
  - type: text
    content: —how long?
  - type: note
    content: The Hebrew ends abruptly, with sudden silence and broken syntax. Words failed David, too broken to finish his sentence. This sudden silence is a figure of speech called aposiopesis.
  - type: heading
    content: Return to Me
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ', turn to me and rescue my life'
  - type: text
    content: because I know your faithful love will never fail me.
  '5':
  - type: text
    content: 'In the darkness of death who remembers '
  - type: text
    content: your name in worship
  - type: text
    content: '?'
  - type: text
    content: How could I bring you praise if I’m buried in a tomb?
  - type: note
    content: Or “Sheol,” the realm of the dead. This is the first psalm to mention the grave (or Sheol). It is depicted in the poetic literature of the Hebrews as a vast wasteland, a stronghold of darkness, and a beast of prey.
  - type: heading
    content: Extreme Anguish
  '6':
  - type: text
    content: I’m worn out with my weeping and groaning.
  - type: text
    content: Night after night I soak my pillow with tears,
  - type: note
    content: Or “I cause my bed to swim with tears.” Our beds are frequently the washing place where the sheep are sheared (Song. 4:2). The bed was the place of David’s sin; it became the place of his weeping. Even as Adam sinned in a garden, Jesus wept in a garden over Adam’s sin.
  - type: text
    content: and flood my bed with weeping.
  '7':
  - type: text
    content: 'My eyes '
  - type: text
    content: of faith
  - type: text
    content: ' '
  - type: note
    content: The Hebrew is singular, “My eye;” a likely metaphor for the eye of his heart. David’s faith was growing weak.
  - type: text
    content: won’t focus anymore, for sorrow fills my heart.
  - type: text
    content: There are so many enemies who come against me!
  - type: heading
    content: He Heard My Cry
  '8':
  - type: text
    content: Turn from me, all you troublemakers!
  - type: note
    content: See Ps. 5:5; Matt. 7:23.
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has turned to hear the sound of my weeping.'
  '9':
  - type: text
    content: Yes!
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: my healer
  - type: text
    content: ' has heard all my pleading'
  - type: text
    content: 'and has taken hold of my prayers '
  - type: note
    content: Or “accepted my prayers.” The Hebrew word can mean “to grasp,” “to lay hold of,” “to marry,” or, figuratively, “to accept.”
  - type: text
    content: and answered them all.
