        text: . Although we cannot be certain, many scholars believe it to mean “eighth.” It could represent a harp with eight strings, an octave, the eighth division of singers, the eighth day, or the eighth month. Eight is the biblical number of a new beginning, a new day. Jewish rabbis have taught that the number eight is the number of the future messianic age when Messiah comes and makes all things new.
