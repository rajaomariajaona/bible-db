      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “my bones are shaking.” Bones are often used metaphorically for our inner being.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul is so troubled; but you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: —how long?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew ends abruptly, with sudden silence and broken syntax. Words failed David, too broken to finish his sentence. This sudden silence is a figure of speech called aposiopesis.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Return to Me
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', turn to me and rescue my life'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I know your faithful love will never fail me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the darkness of death who remembers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your name in worship
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could I bring you praise if I’m buried in a tomb?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Sheol,” the realm of the dead. This is the first psalm to mention the grave (or Sheol). It is depicted in the poetic literature of the Hebrews as a vast wasteland, a stronghold of darkness, and a beast of prey.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Extreme Anguish
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m worn out with my weeping and groaning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Night after night I soak my pillow with tears,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I cause my bed to swim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: with tears
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .” Our beds are frequently the washing place where the sheep are sheared (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The bed was the place of David’s sin; it became the place of his weeping. Even as Adam sinned in a garden, Jesus wept in a garden over Adam’s sin.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and flood my bed with weeping.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of faith
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is singular, “My eye;” a likely metaphor for the eye of his heart. David’s faith was growing weak.
      marker-yv: yv-n
    - type: text
      text: won’t focus anymore, for sorrow fills my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are so many enemies who come against me!
  - type: usfm
    marker: s1
