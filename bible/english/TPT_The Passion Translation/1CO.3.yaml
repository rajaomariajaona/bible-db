        text: Song. 4:12–16
      metadata:
        usfm: SNG.4.12+SNG.4.13+SNG.4.14+SNG.4.15+SNG.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the house he is building. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'God has given me unique gifts '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “grace” (for the task).
    marker-yv: yv-n
  - type: text
    text: 'as a skilled master builder '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wise, first-class architect.” We would say in today’s English, “a top-notch general contractor.”
    marker-yv: yv-n
  - type: text
    text: 'who lays a good foundation. Afterward another craftsman comes and builds on it. So builders beware! Let every builder do his work carefully, according to God’s standards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For no one is empowered to lay an alternative foundation other than the good foundation that exists, which is Jesus Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'The quality of materials used by anyone building on this foundation will soon be made apparent, whether it has been built with gold, silver, and costly stones, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12–13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul’s language seems to be anticipating his next subject: the church as God’s true temple. There is here an allusion to the temple of Solomon, which was built using gold, silver, and costly stones. Wisdom will build her house with divine substance (gold), redemption’s fruit (silver), and transformed lives (costly stones). See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 22:14–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 29:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Wood, hay, and straw are emblems of the works of the flesh, the building materials of men, not of God. They grow up from the ground, which God cursed (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 3:17
      metadata:
        usfm: GEN.3.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It is both quality and durability that God commends. Fire will cause the better material to glow brighter, but the inferior material will be consumed. How we build and what we build matters to God. Note that it is possible to build on the true foundation of Christ but with wrong materials. We need God’s work done in God’s way.
    marker-yv: yv-n
  - type: text
    text: 'or wood, hay, and straw. Their work will soon become evident, for the Day '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12–13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 2:16
      metadata:
        usfm: ROM.2.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
