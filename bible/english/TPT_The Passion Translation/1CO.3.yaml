        text: 2 Thess. 1:10
      metadata:
        usfm: 2TH.1.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'will make it clear, because it will be revealed by blazing fire! And the fire will test and prove the workmanship of each builder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If his work stands the test of fire, he will be rewarded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If his work is consumed by the fire, he will suffer great loss. Yet he himself will barely escape destruction, like one being rescued out of a burning house.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Church, God’s Inner Sanctuary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Don’t you realize that together you have become God’s inner sanctuary '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “temple.” The plural
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (you all) shows that Paul is referring to the church, the body of believers, the holy dwelling place of God on earth. Later, in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 6:19
      metadata:
        usfm: 1CO.6.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', he refers to individual believers (our human bodies) as the dwelling place of God. Ten times in 1 Corinthians Paul uses the phrase “Don’t you know” (or realize)?'
    marker-yv: yv-n
  - type: text
    text: 'and that the Spirit of God makes his permanent home in you? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God revealed his presence in the Old Testament temple by filling it with a cloud of glory. The New Testament inner sanctuary is now the church, where God dwells among us by his Spirit.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now, if someone desecrates '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If someone destroys God’s temple, God will destroy him.” The Aramaic uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deface
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shatter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: God’s inner sanctuary, God will desecrate him, for God’s inner sanctuary is holy, and that is exactly who you are.
- type: usfm
  marker: s1
  children:
  - type: text
    text: True Wisdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So why fool yourself and live under an illusion? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For every verse that warns us of being deceived by others, there is verse to warn us about being self-deceived. Having a teachable heart and learning wisdom from above is the best way to guard from self-deception.
    marker-yv: yv-n
  - type: text
    text: 'Make no mistake about it, if anyone thinks he is wise by the world’s standards, he will be made wiser by being a fool for God! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “If anyone thinks he is wise by the world’s standards, he must first become ignorant [or silly] and then he can become truly wise.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For what the world says is wisdom is actually foolishness in God’s eyes. As it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cleverness of the know-it-alls
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'becomes the trap '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: drassomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to close the fist on” or, by implication, “to trap” or “to firmly grasp” (a slippery object). See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: that ensnares them.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord sees right through
- type: usfm
  marker: q1
  children:
  - type: text
    text: the clever reasonings of the wise
- type: usfm
  marker: q1
  children:
  - type: text
    text: and knows that it’s all a sham.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 94:11
      metadata:
        usfm: PSA.94.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So don’t be proud of your allegiance to any human leader. For actually, you already have everything! It has all been given for your benefit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'whether it is Paul or Apollos or Peter the Rock, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Cephas,” which is the Latin spelling of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: keefa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the Aramaic word for “rock.” God places all of his servants at the disposal of the church. Leaders come and go, but God’s work continues. Every gift and every leader is meant to serve the body of Christ and bring her into the fullness of Christ.'
    marker-yv: yv-n
  - type: text
    text: 'or whether it’s the world '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the universe.” That is, the church is not of this world; it is to bring heaven’s kingdom into the forefront of all the world. The wisdom of the world is subdued by God’s wisdom given to the church.
    marker-yv: yv-n
  - type: text
    text: 'or life or death, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
