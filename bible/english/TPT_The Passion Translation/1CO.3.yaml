document_id: 1CO.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Spiritual Maturity
  - type: text
    content: 'Brothers and sisters, when I was with you I found it impossible to speak to you as those who are spiritually mature people, for you are still dominated by the mind-set of the flesh. And because you are immature infants in Christ, '
  '10':
  - type: text
    content: 'God has given me unique gifts '
  - type: note
    content: Or “grace” (for the task).
  - type: text
    content: 'as a skilled master builder '
  - type: note
    content: Or “wise, first-class architect.” We would say in today’s English, “a top-notch general contractor.”
  - type: text
    content: 'who lays a good foundation. Afterward another craftsman comes and builds on it. So builders beware! Let every builder do his work carefully, according to God’s standards. '
  '11':
  - type: text
    content: For no one is empowered to lay an alternative foundation other than the good foundation that exists, which is Jesus Christ!
  '12':
  - type: text
    content: 'The quality of materials used by anyone building on this foundation will soon be made apparent, whether it has been built with gold, silver, and costly stones, '
  - type: note
    content: 'Paul’s language seems to be anticipating his next subject: the church as God’s true temple. There is here an allusion to the temple of Solomon, which was built using gold, silver, and costly stones. Wisdom will build her house with divine substance (gold), redemption’s fruit (silver), and transformed lives (costly stones). See 1 Chron. 22:14–16; 29:2. Wood, hay, and straw are emblems of the works of the flesh, the building materials of men, not of God. They grow up from the ground, which God cursed (Gen. 3:17). It is both quality and durability that God commends. Fire will cause the better material to glow brighter, but the inferior material will be consumed. How we build and what we build matters to God. Note that it is possible to build on the true foundation of Christ but with wrong materials. We need God’s work done in God’s way.'
  - type: text
    content: 'or wood, hay, and straw. Their work will soon become evident, for the Day '
  - type: note
    content: See Rom. 2:16; 1 Cor. 1:8; 4:5; 5:5; 2 Cor. 5:9–10; 2 Thess. 1:10.
  - type: text
    content: 'will make it clear, because it will be revealed by blazing fire! And the fire will test and prove the workmanship of each builder. '
  '14':
  - type: text
    content: 'If his work stands the test of fire, he will be rewarded. '
  '15':
  - type: text
    content: If his work is consumed by the fire, he will suffer great loss. Yet he himself will barely escape destruction, like one being rescued out of a burning house.
  - type: heading
    content: The Church, God’s Inner Sanctuary
  '16':
  - type: text
    content: 'Don’t you realize that together you have become God’s inner sanctuary '
  - type: note
    content: Or “temple.” The plural you (you all) shows that Paul is referring to the church, the body of believers, the holy dwelling place of God on earth. Later, in 1 Cor. 6:19, he refers to individual believers (our human bodies) as the dwelling place of God. Ten times in 1 Corinthians Paul uses the phrase “Don’t you know” (or realize)?
  - type: text
    content: 'and that the Spirit of God makes his permanent home in you? '
  - type: note
    content: God revealed his presence in the Old Testament temple by filling it with a cloud of glory. The New Testament inner sanctuary is now the church, where God dwells among us by his Spirit.
  '17':
  - type: text
    content: 'Now, if someone desecrates '
  - type: note
    content: Or “If someone destroys God’s temple, God will destroy him.” The Aramaic uses the word deface or shatter.
  - type: text
    content: God’s inner sanctuary, God will desecrate him, for God’s inner sanctuary is holy, and that is exactly who you are.
  - type: heading
    content: True Wisdom
  '18':
  - type: text
    content: 'So why fool yourself and live under an illusion? '
  - type: note
    content: For every verse that warns us of being deceived by others, there is verse to warn us about being self-deceived. Having a teachable heart and learning wisdom from above is the best way to guard from self-deception.
  - type: text
    content: 'Make no mistake about it, if anyone thinks he is wise by the world’s standards, he will be made wiser by being a fool for God! '
  - type: note
    content: As translated from the Aramaic. The Greek is “If anyone thinks he is wise by the world’s standards, he must first become ignorant [or silly] and then he can become truly wise.”
  '19':
  - type: text
    content: 'For what the world says is wisdom is actually foolishness in God’s eyes. As it is written:'
  - type: text
    content: The cleverness of the know-it-alls
  - type: text
    content: 'becomes the trap '
  - type: note
    content: The Greek word drassomai means “to close the fist on” or, by implication, “to trap” or “to firmly grasp” (a slippery object). See Job 5:13.
  - type: text
    content: that ensnares them.
  '2':
  - type: text
    content: 'I had to nurse you and feed you with “milk,” '
  - type: note
    content: This “milk” would include the basic teachings of our faith. Even so, every newborn needs milk to survive and be sustained. See 1 Peter 2:2. The more advanced teachings Paul describes are spiritual “solid food”—something we can “sink our teeth into” and look for deeper meaning in.
  - type: text
    content: 'not with the solid food '
  - type: text
    content: of more advanced teachings
  - type: text
    content: ', because you weren’t ready for it. In fact, you are still not ready to be fed solid food, '
  '20':
  - type: text
    content: 'And again:'
  - type: text
    content: The Lord sees right through
  - type: text
    content: the clever reasonings of the wise
  - type: text
    content: and knows that it’s all a sham.
  - type: note
    content: See Ps. 94:11.
  '21':
  - type: text
    content: 'So don’t be proud of your allegiance to any human leader. For actually, you already have everything! It has all been given for your benefit, '
  '22':
  - type: text
    content: 'whether it is Paul or Apollos or Peter the Rock, '
  - type: note
    content: Or “Cephas,” which is the Latin spelling of keefa, the Aramaic word for “rock.” God places all of his servants at the disposal of the church. Leaders come and go, but God’s work continues. Every gift and every leader is meant to serve the body of Christ and bring her into the fullness of Christ.
  - type: text
    content: 'or whether it’s the world '
  - type: note
    content: The Aramaic can be translated “the universe.” That is, the church is not of this world; it is to bring heaven’s kingdom into the forefront of all the world. The wisdom of the world is subdued by God’s wisdom given to the church.
  - type: text
    content: 'or life or death, '
  - type: note
    content: That is, the pressures of life and death are beneath the rule of Christ in our hearts. See Rom. 14:9. The days of our present life, as well as the future glory, belong to us already. We are not victims in life, for as believers we share in the lordship of Christ today and forever.
  - type: text
    content: 'or whether it’s the present or the future—everything belongs to you! '
  '23':
  - type: text
    content: And now you are joined to the Messiah, who is joined to God.
  '3':
  - type: text
    content: 'for you are living your lives dominated by the mind-set of the flesh. Ask yourselves: Is there jealousy among you? Do you compare yourselves with others? Do you quarrel '
  - type: text
    content: like children
  - type: text
    content: ' and end up taking sides? If so, this proves that you are living your lives centered on yourselves, dominated by the mind-set of the flesh, and behaving like unbelievers. '
  '4':
  - type: text
    content: 'For when you divide yourselves up in groups—a “Paul group” and an “Apollos group” '
  - type: note
    content: Apollos was a brilliant, educated Alexandrian Jew and a follower of John the Baptizer. While in Ephesus, Apollos met Priscilla and Aquila, who directed him into deeper teachings of Christ (Acts 18:24–26). Apparently the church of Corinth was deeply divided and in need of wisdom and unity.
  - type: text
    content: —you’re acting like people without the Spirit’s influence.
  - type: note
    content: Or “Are you [merely] men?”
  '5':
  - type: text
    content: 'Who is Apollos, really? Or who is Paul? Aren’t we both just servants through whom you believed our message? Aren’t each of us doing the ministry the Lord has assigned to us? '
  '6':
  - type: text
    content: 'I planted the church, and Apollos came and cared for it, but it was God who caused it to grow. '
  '7':
  - type: text
    content: This means the one who plants is not anybody special, nor the one who waters, for God is the one who brings the supernatural growth.
  '8':
  - type: text
    content: 'Now, the one who plants and the one who waters are '
  - type: text
    content: equally important
  - type: text
    content: ' and on the same team, but each will be rewarded for his own work. '
  '9':
  - type: text
    content: 'We are coworkers with God '
  - type: note
    content: Workers have different gifts and abilities, but true growth of God’s kingdom is through divine power. No one is a superstar; we are all members on God’s team.
  - type: text
    content: 'and you are God’s cultivated garden, '
  - type: note
    content: See Gen. 2:8; Song. 4:12–16.
  - type: text
    content: 'the house he is building. '
