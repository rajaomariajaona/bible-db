document_id: 1CO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Spiritual Maturity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Brothers and sisters, when I was with you I found it impossible to speak to you as those who are spiritually mature people, for you are still dominated by the mind-set of the flesh. And because you are immature infants in Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I had to nurse you and feed you with “milk,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “milk” would include the basic teachings of our faith. Even so, every newborn needs milk to survive and be sustained. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 2:2
      metadata:
        usfm: 1PE.2.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The more advanced teachings Paul describes are spiritual “solid food”—something we can “sink our teeth into” and look for deeper meaning in.
    marker-yv: yv-n
  - type: text
    text: 'not with the solid food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of more advanced teachings
  - type: text
    text: ', because you weren’t ready for it. In fact, you are still not ready to be fed solid food, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'for you are living your lives dominated by the mind-set of the flesh. Ask yourselves: Is there jealousy among you? Do you compare yourselves with others? Do you quarrel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like children
  - type: text
    text: ' and end up taking sides? If so, this proves that you are living your lives centered on yourselves, dominated by the mind-set of the flesh, and behaving like unbelievers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For when you divide yourselves up in groups—a “Paul group” and an “Apollos group” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apollos was a brilliant, educated Alexandrian Jew and a follower of John the Baptizer. While in Ephesus, Apollos met Priscilla and Aquila, who directed him into deeper teachings of Christ (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 18:24–26
      metadata:
        usfm: ACT.18.24+ACT.18.25+ACT.18.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Apparently the church of Corinth was deeply divided and in need of wisdom and unity.
    marker-yv: yv-n
  - type: text
    text: —you’re acting like people without the Spirit’s influence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Are you [merely] men?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Who is Apollos, really? Or who is Paul? Aren’t we both just servants through whom you believed our message? Aren’t each of us doing the ministry the Lord has assigned to us? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I planted the church, and Apollos came and cared for it, but it was God who caused it to grow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: This means the one who plants is not anybody special, nor the one who waters, for God is the one who brings the supernatural growth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now, the one who plants and the one who waters are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: equally important
  - type: text
    text: ' and on the same team, but each will be rewarded for his own work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We are coworkers with God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Workers have different gifts and abilities, but true growth of God’s kingdom is through divine power. No one is a superstar; we are all members on God’s team.
    marker-yv: yv-n
  - type: text
    text: 'and you are God’s cultivated garden, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:8
      metadata:
        usfm: GEN.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
