document_id: JER.36,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Writing the Scroll of Prophecies
  - type: text
    content: 'In the fourth year that Jehoiakim son of Josiah was king of Judah, '
  - type: note
    content: The fourth year of Jehoiakim’s reign was 605 BC. Jeremiah had been prophesying for twenty-three years.
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, '
  '10':
  - type: text
    content: 'Then, while all the people were listening in the temple, Baruch publicly read from the scroll everything that I had said. He did this from the room of Gemariah son of Shaphan, the king’s '
  - type: text
    content: royal
  - type: text
    content: ' scribe. '
  - type: note
    content: See 2 Kings 22:3–10.
  - type: text
    content: His room was in the upper courtyard near the entrance of the New Gate of the temple.
  - type: heading
    content: Baruch Reads the Scroll to the King’s Officials
  '11':
  - type: text
    content: 'The moment Micaiah the son of Gemariah heard '
  - type: text
    content: Yahweh
  - type: text
    content: '’s message being read from the scroll, '
  '12':
  - type: text
    content: 'he went straight to the king’s palace and to the chambers of the king’s '
  - type: text
    content: royal
  - type: text
    content: ' scribe, where all the government officials were holding a meeting. Those attending were Elishama the secretary, Delaiah son of Shemaiah, Elnathan son of Achbor, Gemariah son of Shaphan, Zedekiah son of Hananiah, and all the other government officials. '
  '13':
  - type: text
    content: 'Micaiah recounted everything that he had heard Baruch read to the people from the scroll. '
  '14':
  - type: text
    content: Then the officials sent Jehudi (the son of Nethaniah, grandson of Shelemiah and great-grandson of Cushi) to tell Baruch to bring them the scroll that he had read to the people. So Baruch went to them, carrying the scroll in his hand.
  '15':
  - type: text
    content: '“Have a seat,” they said, “and please read the scroll to us.” '
  - type: text
    content: They listened attentively
  - type: text
    content: ' as Baruch read its entirety to them. '
  '16':
  - type: text
    content: 'When they had heard its contents, the officials were seized with panic, '
  - type: note
    content: Or “they shook each man toward his neighbor.”
  - type: text
    content: and they said to Baruch, “
  - type: text
    content: This is dreadful!
  - type: text
    content: ' We must report this to the king.” '
  '17':
  - type: text
    content: Then they asked him, “Tell us, how did you write all this? Did Jeremiah dictate it to you?”
  '18':
  - type: text
    content: Baruch answered, “Yes he did. I wrote it down word for word in ink on this scroll.”
  '19':
  - type: text
    content: Then they said to him, “
  - type: text
    content: For your own safety
  - type: text
    content: ', you and Jeremiah must go into hiding. Don’t let anyone know where you are.”'
  - type: heading
    content: The King Burns the Scroll
  '2':
  - type: text
    content: '“Get a scroll and write on it every word that I have spoken to you concerning Israel, Judah, and all the nations from the first time I spoke to you when Josiah was king up to now. '
  '20':
  - type: text
    content: For safekeeping
  - type: text
    content: ', the officials put the scroll in the office of Elishama, the court secretary, and went to the king’s court, where they reported everything to the king. '
  '21':
  - type: text
    content: 'Then the king sent Jehudi to retrieve the scroll. He brought it from the room of Elishama and read it to the king and all his gathered officials. '
  '22':
  - type: text
    content: 'It was winter and the king was sitting in front of the fireplace in his winter palace. '
  '23':
  - type: text
    content: 'As soon as Jehudi finished reading three or four columns '
  - type: text
    content: from the scroll
  - type: text
    content: ', the king would cut them off with a small knife and throw them into the fire until the entire scroll was burned up. '
  - type: note
    content: The same antichrist spirit that opposes God’s Word operates today (see 1 John 4:3), but the Word of God is indestructible and endures forever. See Ps. 119:89; 1 Peter 1:23. The “small knife” of higher criticism still cuts away portions of God’s Word today.
  '24':
  - type: text
    content: 'But none of those who heard the contents of the scroll showed the slightest hint of remorse or sorrow, '
  - type: note
    content: Or “nor did they rend their garments.”
  - type: text
    content: 'including the king. '
  '25':
  - type: text
    content: 'Although Elnathan, Delaiah, and Gemariah begged the king not to burn the scroll, he brushed them off and paid no attention to them. '
  '26':
  - type: text
    content: 'Then he commanded Prince Jerahmeel, '
  - type: note
    content: It is likely that Jerahmeel was a member of the royal family rather than the actual son of Jehoiakim, who himself was only thirty years old at this time (see 2 Kings 23:36).
  - type: text
    content: 'together with Seraiah son of Azriel and Shelemiah son of Abdeel, to arrest me and my scribe Baruch, but '
  - type: text
    content: Yahweh
  - type: text
    content: ' had hidden us.'
  - type: note
    content: 'Some Jewish scholars believe that Jeremiah and Baruch were hiding near the quarries of Solomon in what is known as “Jeremiah’s Grotto,” not far from the Damascus Gate. See A. W. Streane, The Book of the Prophet Jeremiah: Together with the Lamentations (Cambridge: University Press, 1952).'
  - type: heading
    content: Rewriting the Scroll
  '27':
  - type: text
    content: 'After King Jehoiakim had burned the scroll that I had dictated to Baruch, '
  - type: text
    content: Yahweh
  - type: text
    content: ' instructed me '
  '28':
  - type: text
    content: 'to get a new scroll and write everything on it that was in the first scroll. '
  '29':
  - type: text
    content: Yahweh
  - type: text
    content: ' told me to tell the king, “'
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: You have burned the scroll, and you have demanded that Jeremiah tell you why he prophesied that the king of Babylon will certainly come and destroy this land and exterminate its people and its animals. '
  '3':
  - type: text
    content: 'Perhaps when the people of Judah hear of the totality of destruction that I intend to bring on them, they will turn from their evil ways; then I will forgive their perversity and their sins.” '
  - type: note
    content: Once again, we see the merciful heart of God giving the people another opportunity to repent so that he could forgive and restore them. God’s heart is not to destroy nations but for the nations to come to repentance. See John 3:17; 2 Peter 3:9.
  '30':
  - type: text
    content: 'So now, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you, King Jehoiakim of Judah, people will cast your dead body out on the ground, where it will '
  - type: text
    content: rot and
  - type: text
    content: ' be exposed to the sun by day and the frost by night. '
  - type: note
    content: The one who cast the prophecies of Jeremiah into the fire was himself cast out.
  - type: text
    content: 'And none of your descendants will succeed you on the throne of David. '
  '31':
  - type: text
    content: I will punish all of you, your descendants, and your officials for all your blatant sins. You and the people of Judah and Jerusalem have not stopped to pay attention to any of my warnings. Therefore, I will pour out on all of you every disaster that I have pronounced against you.”
  '32':
  - type: text
    content: 'Then I took another scroll and gave it to Baruch my scribe, and he wrote down everything that I dictated. He wrote everything that had been on the first scroll that Jehoiakim had destroyed. I also '
  - type: text
    content: dictated to Baruch
  - type: text
    content: ' many similar prophecies, '
  - type: note
    content: These “similar prophecies” may have included the book of Lamentations.
  - type: text
    content: which were added as well.
  '4':
  - type: text
    content: 'So I summoned Baruch '
  - type: note
    content: Baruch means “blessed [prospered] of God.” See footnote on 32:12.
  - type: text
    content: 'son of Neriah and dictated to him everything that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had said to me, and Baruch wrote it all down on a scroll.'
  - type: heading
    content: Reading the Scroll of Prophecies in the Temple
  '5':
  - type: text
    content: 'Then, I instructed Baruch: “I am forbidden to go back into the temple. '
  '6':
  - type: text
    content: 'So during the next day of fasting in the temple, '
  - type: note
    content: In the Jewish culture, there were a number of days appointed for fasting, but fasts were also observed at times of approaching national disaster. There were doubtless large numbers of people gathered in the temple during the days of solemn fasts.
  - type: text
    content: 'you must go and read aloud from the scroll so that the people will hear everything that '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said to me and that I have dictated to you. Make sure all the people of Judah who have come in from their towns hear you clearly. '
  '7':
  - type: text
    content: 'Perhaps they will pray to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and turn from their evil ways, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has promised to punish these people with his terrible anger and fury.” '
  '8':
  - type: text
    content: 'So Baruch followed my instructions, went into the temple, and read '
  - type: text
    content: Yahweh
  - type: text
    content: ’s words from the scroll.
  '9':
  - type: text
    content: 'In the ninth month of the fifth year that Jehoiakim son of Josiah was king of Judah, '
  - type: note
    content: The ninth month of the fifth year of Jehoiakim’s reign was December 604 BC.
  - type: text
    content: 'the people of Judah and Jerusalem were fasting. '
