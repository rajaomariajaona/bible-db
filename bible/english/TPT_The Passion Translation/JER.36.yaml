document_id: JER.36,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Writing the Scroll of Prophecies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the fourth year that Jehoiakim son of Josiah was king of Judah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fourth year of Jehoiakim’s reign was 605 BC. Jeremiah had been prophesying for twenty-three years.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then, while all the people were listening in the temple, Baruch publicly read from the scroll everything that I had said. He did this from the room of Gemariah son of Shaphan, the king’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: royal
    - type: text
      text: ' scribe. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 22:3–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: His room was in the upper courtyard near the entrance of the New Gate of the temple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Baruch Reads the Scroll to the King’s Officials
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The moment Micaiah the son of Gemariah heard '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s message being read from the scroll, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'he went straight to the king’s palace and to the chambers of the king’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: royal
    - type: text
      text: ' scribe, where all the government officials were holding a meeting. Those attending were Elishama the secretary, Delaiah son of Shemaiah, Elnathan son of Achbor, Gemariah son of Shaphan, Zedekiah son of Hananiah, and all the other government officials. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Micaiah recounted everything that he had heard Baruch read to the people from the scroll. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the officials sent Jehudi (the son of Nethaniah, grandson of Shelemiah and great-grandson of Cushi) to tell Baruch to bring them the scroll that he had read to the people. So Baruch went to them, carrying the scroll in his hand.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Have a seat,” they said, “and please read the scroll to us.” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They listened attentively
    - type: text
      text: ' as Baruch read its entirety to them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When they had heard its contents, the officials were seized with panic, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they shook each man toward his neighbor.”
      marker-yv: yv-n
    - type: text
      text: and they said to Baruch, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: This is dreadful!
    - type: text
      text: ' We must report this to the king.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then they asked him, “Tell us, how did you write all this? Did Jeremiah dictate it to you?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Baruch answered, “Yes he did. I wrote it down word for word in ink on this scroll.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then they said to him, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: For your own safety
    - type: text
      text: ', you and Jeremiah must go into hiding. Don’t let anyone know where you are.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King Burns the Scroll
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Get a scroll and write on it every word that I have spoken to you concerning Israel, Judah, and all the nations from the first time I spoke to you when Josiah was king up to now. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: it
      children:
      - type: text
        text: For safekeeping
    - type: text
      text: ', the officials put the scroll in the office of Elishama, the court secretary, and went to the king’s court, where they reported everything to the king. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the king sent Jehudi to retrieve the scroll. He brought it from the room of Elishama and read it to the king and all his gathered officials. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'It was winter and the king was sitting in front of the fireplace in his winter palace. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'As soon as Jehudi finished reading three or four columns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from the scroll
    - type: text
      text: ', the king would cut them off with a small knife and throw them into the fire until the entire scroll was burned up. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The same antichrist spirit that opposes God’s Word operates today (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but the Word of God is indestructible and endures forever. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 119:89
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 1:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The “small knife” of higher criticism still cuts away portions of God’s Word today.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But none of those who heard the contents of the scroll showed the slightest hint of remorse or sorrow, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “nor did they rend their garments.”
      marker-yv: yv-n
    - type: text
      text: 'including the king. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Although Elnathan, Delaiah, and Gemariah begged the king not to burn the scroll, he brushed them off and paid no attention to them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then he commanded Prince Jerahmeel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that Jerahmeel was a member of the royal family rather than the actual son of Jehoiakim, who himself was only thirty years old at this time (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'together with Seraiah son of Azriel and Shelemiah son of Abdeel, to arrest me and my scribe Baruch, but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had hidden us.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Jewish scholars believe that Jeremiah and Baruch were hiding near the quarries of Solomon in what is known as “Jeremiah’s Grotto,” not far from the Damascus Gate. See A. W. Streane,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'The Book of the Prophet Jeremiah: Together with the Lamentations'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Cambridge: University Press, 1952).'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rewriting the Scroll
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'After King Jehoiakim had burned the scroll that I had dictated to Baruch, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' instructed me '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'to get a new scroll and write everything on it that was in the first scroll. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' told me to tell the king, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: You have burned the scroll, and you have demanded that Jeremiah tell you why he prophesied that the king of Babylon will certainly come and destroy this land and exterminate its people and its animals. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Perhaps when the people of Judah hear of the totality of destruction that I intend to bring on them, they will turn from their evil ways; then I will forgive their perversity and their sins.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Once again, we see the merciful heart of God giving the people another opportunity to repent so that he could forgive and restore them. God’s heart is not to destroy nations but for the nations to come to repentance. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'So now, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you, King Jehoiakim of Judah, people will cast your dead body out on the ground, where it will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rot and
    - type: text
      text: ' be exposed to the sun by day and the frost by night. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The one who cast the prophecies of Jeremiah into the fire was himself cast out.
      marker-yv: yv-n
    - type: text
      text: 'And none of your descendants will succeed you on the throne of David. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I will punish all of you, your descendants, and your officials for all your blatant sins. You and the people of Judah and Jerusalem have not stopped to pay attention to any of my warnings. Therefore, I will pour out on all of you every disaster that I have pronounced against you.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then I took another scroll and gave it to Baruch my scribe, and he wrote down everything that I dictated. He wrote everything that had been on the first scroll that Jehoiakim had destroyed. I also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dictated to Baruch
    - type: text
      text: ' many similar prophecies, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These “similar prophecies” may have included the book of Lamentations.
      marker-yv: yv-n
    - type: text
      text: which were added as well.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So I summoned Baruch '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Baruch
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “blessed [prospered] of God.” See footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'son of Neriah and dictated to him everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had said to me, and Baruch wrote it all down on a scroll.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reading the Scroll of Prophecies in the Temple
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then, I instructed Baruch: “I am forbidden to go back into the temple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So during the next day of fasting in the temple, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Jewish culture, there were a number of days appointed for fasting, but fasts were also observed at times of approaching national disaster. There were doubtless large numbers of people gathered in the temple during the days of solemn fasts.
      marker-yv: yv-n
    - type: text
      text: 'you must go and read aloud from the scroll so that the people will hear everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has said to me and that I have dictated to you. Make sure all the people of Judah who have come in from their towns hear you clearly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Perhaps they will pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and turn from their evil ways, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has promised to punish these people with his terrible anger and fury.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So Baruch followed my instructions, went into the temple, and read '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s words from the scroll.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'In the ninth month of the fifth year that Jehoiakim son of Josiah was king of Judah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ninth month of the fifth year of Jehoiakim’s reign was December 604 BC.
      marker-yv: yv-n
    - type: text
      text: 'the people of Judah and Jerusalem were fasting. '
