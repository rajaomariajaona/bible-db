document_id: 1CO.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Resurrection of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dear friends, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “brothers.”
    marker-yv: yv-n
  - type: text
    text: 'let me give you clearly the heart of the gospel that I’ve preached to you—the good news that you have heartily received and on which you stand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For it is through the revelation of the gospel that you are being saved, if you fasten your life firmly to the message I’ve taught you, unless you have believed in vain. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I have shared with you what I have received and what is of utmost importance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Messiah died for our sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fulfilling the prophecies of the Scriptures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He was buried in a tomb
- type: usfm
  marker: q1
  children:
  - type: text
    text: and was raised from the dead after three days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as foretold in the Scriptures.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 16:9–10
      metadata:
        usfm: PSA.16.9+PSA.16.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 24:25–27
      metadata:
        usfm: LUK.24.25+LUK.24.26+LUK.24.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44–46
      metadata:
        usfm: LUK.24.44+LUK.24.45+LUK.24.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he appeared to Peter the Rock
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Cephas.” Paul includes the bodily appearance of Jesus to his followers as part of the gospel to be believed. What Paul states as the heart of the gospel is (1) Christ’s death, (2) the fulfillment of prophecies, (3) Christ’s burial, (4) Christ’s resurrection, and (5) Christ supernaturally appeared (manifested) to his followers. More than 515 followers of Jesus saw him after his resurrection, including those mentioned by Paul and Miriam (Mary) at the garden tomb.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to the twelve apostles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most scholars conclude that vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3–5
      metadata:
        usfm: 1CO.15.3+1CO.15.4+1CO.15.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: represent an early creed of the apostles on which our Christian faith is based.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He also appeared to more than five hundred of his followers at the same time, most of whom are still alive as I write this, though a few have passed away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Some have fallen asleep,” a Hebrew euphemism for death when referring to believers.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he appeared to Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 1:19
      metadata:
        usfm: GAL.1.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jacob was the half brother of our Lord Jesus. It is unfortunate that other translations of the Bible have substituted James for Jacob. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. At first Jacob did not believe that his brother was the Messiah (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:5
      metadata:
        usfm: JHN.7.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Yet after he believed, he wrote what many have come to know as the book of James (or Jacob) and he became the leading elder of the church of Jerusalem (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 15:13
      metadata:
        usfm: ACT.15.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'and to all the apostles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Last of all he appeared in front of me, like one born prematurely, ripped from the womb. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as one born at the wrong time.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ektroma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is used to describe a premature birth or miscarriage or abortion. This means Paul’s call to be an apostle was not normal; it was sudden and unexpected. Paul never claimed to be part of the Twelve, but an apostle chosen by the resurrected Lord Jesus. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 4:11
      metadata:
        usfm: EPH.4.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yes, I am the most insignificant of all the apostles, unworthy even to be called an apostle, because I hunted down believers and persecuted God’s church. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But God’s amazing grace has made me who I am! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “By the grace of God, I am what I am.”
    marker-yv: yv-n
  - type: text
    text: 'And his grace to me was not fruitless. In fact, I worked harder than all the rest, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 11:16–28
      metadata:
        usfm: 2CO.11.16+2CO.11.17+2CO.11.18+2CO.11.19+2CO.11.20+2CO.11.21+2CO.11.22+2CO.11.23+2CO.11.24+2CO.11.25+2CO.11.26+2CO.11.27+2CO.11.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'yet not in my own strength but God’s, for his empowering grace is poured out upon me. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So this is what we all have taught you, and whether it was through me or someone else, you have now believed the gospel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Importance of the Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The message we preach is Christ, who has been raised from the dead. So how could any of you possibly say there is no resurrection of the dead? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For if there is no such thing as a resurrection from the dead, then not even Christ has been raised. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is showing us that the resurrection of Jesus cannot be separated from the coming resurrection of believers. To remove the truth of Christ’s resurrection is to destroy the message of the gospel of hope.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if Christ has not been raised, all of our preaching has been for nothing and your faith is useless. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moreover, if the dead are not raised, that would mean that we are false witnesses who are misrepresenting God. And that would mean that we have preached a lie, stating that God raised him from the dead, if in reality he didn’t.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If the dead aren’t raised up, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “if there is no life after death.”
    marker-yv: yv-n
  - type: text
    text: 'that would mean that Christ has not been raised up either. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And if Christ is not alive, you are still lost in your sins and your faith is a fantasy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'It would also mean that those believers in Christ who have passed away '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “those who have fallen asleep in Christ.” In the Hebraic mind-set, this is a euphemism for believers who have died.
    marker-yv: yv-n
  - type: text
    text: 'have simply perished. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If the only benefit of our hope in Christ is limited to this life on earth, we deserve to be pitied more than all others!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Why would we be the most pitiable people of all? Because we live a life that contains a measure of hardship and suffering and, at times, possible martyrdom, with no hope of an afterlife. The Aramaic places the emphasis on the apostles who preached the gospel: “If through these [false pretenses] we have preached life eternal through the Messiah, then we [apostles] are the most miserable of all humanity.”'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the truth is, Christ is risen from the dead, as the firstfruit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first part of the harvest is called the firstfruits. Jesus’ resurrection is the firstfruit of those who will be raised in resurrection power, never to die again.
    marker-yv: yv-n
  - type: text
    text: 'of a great resurrection harvest of those who have died. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For since death came through a man, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Adam
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 5:12–21
      metadata:
        usfm: ROM.5.12+ROM.5.13+ROM.5.14+ROM.5.15+ROM.5.16+ROM.5.17+ROM.5.18+ROM.5.19+ROM.5.20+ROM.5.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'it is fitting that the resurrection of the dead has also come through a man, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Even as all who are in Adam die, so also all who are in Christ will be made alive. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But each one in his proper order: Christ, the firstfruits, then those who belong to Christ in his presence.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “appearance” (Gr.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parousia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the final stage of completion comes, when he will bring to an end every other rulership, authority, and power, and he will hand over his kingdom to Father God. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Until then he is destined to reign '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: as King
  - type: text
    text: ' until all hostility has been subdued and placed under his feet. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 110:1
      metadata:
        usfm: PSA.110.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And the last enemy to be subdued and eliminated is death itself.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 20:14
      metadata:
        usfm: REV.20.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The Father has placed all things in subjection under the feet of Christ. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “under his [the Messiah’s] feet.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 8:6
      metadata:
        usfm: PSA.8.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Yet when it says, “all things,” it is understood that the Father does not include himself, for he is the one who placed all things in subjection to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'However, when everything is subdued and in submission to him, then the Son himself will be subject to the Father, who put all things under his feet. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Christ and the Father are equally one. The work of the Son and the work of the Father may differ, but both will result in all evil being overcome on the earth and the kingdom being given to God.
    marker-yv: yv-n
  - type: text
    text: This is so that Father God will be everything in everyone!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Implications of the Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'If there is no resurrection, what do these people think they’re doing when they are baptized for the dead? If the dead aren’t raised, why be baptized for them? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is one of the most puzzling verses in all the New Testament. Bible scholars are divided over its meaning, with nearly two hundred interpretations offered. Paul is not condemning nor commending this practice, but merely using it as evidence that the hope of resurrection life after death for the believer is widely believed. Apparently, some believers were baptized in hopes of benefitting those who died before receiving baptism. This practice is not mentioned anywhere else in the Bible nor in other writings of the earliest church fathers.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And why would we be risking our lives every day?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'My brothers and sisters, I continually face death. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some translations render this “I die daily,” implying a dying to sin. Yet this is not in the context at all. Paul faces death day by day because of the danger of preaching the gospel in a hostile culture. He is not referring to dying to sin daily, for our death to sin took place on the cross. We died once and for all to sin. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 6:6–11
      metadata:
        usfm: ROM.6.6+ROM.6.7+ROM.6.8+ROM.6.9+ROM.6.10+ROM.6.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 2:20
      metadata:
        usfm: GAL.2.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'This is as sure as my boasting of you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I affirm [swear] by the act of boasting in you.” Paul uses a Greek particle that is reserved for taking an oath or swearing to the truth of a statement. This statement by Paul may contain an ellipsis that could be supplied by saying, “I swear by the confidence I have of your salvation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that I am confident also of a coming resurrection
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    marker-yv: yv-n
  - type: text
    text: 'and our co-union together in the life of our Lord Jesus Christ, who gives me confidence to share my experiences with you. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tell me, why did I fight “wild beasts” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It does not appear that these wild beasts were animals. Rather, Paul is referring figuratively to beastly men and their savage opposition that Paul had to endure in Ephesus (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 19:28–31
      metadata:
        usfm: ACT.19.28+ACT.19.29+ACT.19.30+ACT.19.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Elsewhere in the Bible wicked men are called beasts (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Titus 1:12
      metadata:
        usfm: TIT.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Peter 2:12
      metadata:
        usfm: 2PE.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judah [Jude] 10
      metadata:
        usfm: JUD.1.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The author of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 73
      metadata:
        usfm: PSA.73
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: described himself as a “brute beast” when he wandered away from God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 73:22
      metadata:
        usfm: PSA.73.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). When naming all of the hardships that he endured, Paul did not mention fighting wild beasts (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 11:23–28
      metadata:
        usfm: 2CO.11.23+2CO.11.24+2CO.11.25+2CO.11.26+2CO.11.27+2CO.11.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: in Ephesus if my hope is in this life only? What was the point of that? If the dead do not rise, then
- type: usfm
  marker: mi
  children:
  - type: text
    text: Let’s party all night, for tomorrow we die!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 22:13
      metadata:
        usfm: ISA.22.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 12:19
      metadata:
        usfm: LUK.12.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So stop fooling yourselves! Evil companions will corrupt good morals and character. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is likely a quotation from the Athenian poet Menander (
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thras.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 218). Paul is using this quote to encourage the believers to stay away from those who deny the resurrection.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Come back to your right senses and awaken to what is right. Repent from your sinful ways. For some have no knowledge of God’s wonderful love. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “Some have not the knowledge of God.”
    marker-yv: yv-n
  - type: text
    text: You should be ashamed that you make me write this way to you!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The motivation of Paul giving them the exhortation in this verse is the resurrection from the dead. We have a glorious hope of resurrection awaiting us, and for that reason, we live our lives with eternity in view.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Resurrection Body
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I can almost hear someone saying, “How can the dead come back to life? And what kind of body will they have when they are resurrected?” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Foolish man! Don’t you know that what you sow in the ground doesn’t germinate unless it dies? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And what you sow is not the body that will come into being, but the bare seed. And it’s hard to tell whether it’s wheat or some other seed. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But when it dies, God gives it a new form, a body to fulfill his purpose, and he sees to it that each seed gets a new body of its own '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and becomes the plant he designed it to be
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is teaching us of the resurrected body every believer will one day possess. Our bodies will then be perfect, renewed, transformed, indestructible, and not limited to the laws of nature. We will never get sick and never experience death again. We will still have our personalities as individuals but without any hint of sin. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 3:21
      metadata:
        usfm: PHP.3.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'All flesh is not identical. Animals have one flesh and human beings another. Birds have their distinct flesh and fish another. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'In the same way there are earthly bodies and heavenly bodies. There is a splendor of the celestial body and a different one for the earthly. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'There is the radiance of the sun and differing radiance for the moon and for the stars. Even the stars differ in their shining. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And that’s how it will be with the resurrection of the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The body is “sown” in decay, but will be raised in immortality. It is “sown” in humiliation, but will be raised in glorification. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “They are buried in agony, but raised in glory.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'It is “sown” in weakness but will be raised in power. If there is a physical body, there is also a spiritual body. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'For it is written:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: The first man, Adam, became a living soul.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:7
      metadata:
        usfm: GEN.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The last Adam '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The last Adam is Jesus Christ. As the last Adam, he ended Adam’s race and began a new species of humans who are indwelt by the Holy Spirit and carry the life of Christ within them.
    marker-yv: yv-n
  - type: text
    text: 'became the life-giving Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'However, the spiritual didn’t come first. The natural precedes the spiritual. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The first man was from the dust of the earth; the second Man is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'from the realm of heaven. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In God’s eyes there are only two men, Adam and Christ. Every human being is a copy of one or the other. To be in Adam is to be lost and merely human, but to be in Christ is to be wrapped into the Anointed One as one who carries the life of Christ within.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'The first one, made from dust, has a race of people just like him, who are also made from dust. The One sent from heaven has a race of heavenly people who are just like him. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Once we carried the likeness of the man of dust, but now let us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word can be translated either “let us” or “we shall.” This may explain the variation among Greek manuscripts.
    marker-yv: yv-n
  - type: text
    text: carry the likeness of the man of heaven.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, just as Jesus now has an earthly body transformed into a spiritual body, so we will have our bodies transformed into heavenly bodies.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Transformation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Now, I tell you this, my brothers and sisters, flesh and blood are not able to inherit God’s kingdom realm, and neither will that which is decaying be able to inherit what is incorruptible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
