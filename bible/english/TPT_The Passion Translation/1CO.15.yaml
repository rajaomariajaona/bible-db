      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Your labor in the Lord is not without effect.” This final clause is litotes, a double negative, which is best conveyed in a positive form.
    marker-yv: yv-n
