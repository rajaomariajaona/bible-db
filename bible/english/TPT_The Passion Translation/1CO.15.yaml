      - type: text
        text: '].”'
    marker-yv: yv-n
  - type: text
    text: '—in the twinkling of his eye. For when the last trumpet is sounded, the dead will come back to life. We will be indestructible and we will be transformed. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'For we will discard our mortal “clothes” and slip into a body that is imperishable. What is mortal now will be exchanged for immortality. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And when that which is mortal puts on immortality, and what now decays is exchanged for what will never decay, then the Scripture will be fulfilled that says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Death is swallowed up by a triumphant victory!
  - type: usfm
    marker: f
    children:
