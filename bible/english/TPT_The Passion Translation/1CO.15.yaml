    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “dear brothers and sisters.”
    marker-yv: yv-n
  - type: text
    text: 'stand firm, stable, and enduring. Live your lives with an unshakable confidence. We know that we prosper and excel in every season by serving the Lord, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:58
    - type: usfm
      marker: ft
      children:
