      children:
      - type: text
        text: The Aramaic can be translated “Accept God’s grace.”
    marker-yv: yv-n
  - type: text
    text: 'for giving us the victory as conquerors through our Lord Jesus, the Anointed One. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:57
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What an amazing summary of what Jesus Christ has accomplished for us! Although Satan seemed to be victorious, the cross of Christ defeated him, defeated death, and defeated sin, making us into victorious conquerors who have hope beyond the grave.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'So now, beloved ones, '
