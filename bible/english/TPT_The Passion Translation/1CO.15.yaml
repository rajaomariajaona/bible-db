        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek can be translated “Always have the Lord’s possessions in abundance.”
    marker-yv: yv-n
  - type: text
    text: because we are assured that our union with the Lord makes our labor productive with fruit that endures.
  - type: usfm
    marker: f
    children:
