document_id: JER.29,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Letter to the Exiles
  - type: text
    content: 'This is the open letter '
  - type: note
    content: The letter (or scroll) was likely written and sent around 595 BC.
  - type: text
    content: 'that the prophet Jeremiah sent from Jerusalem to the rest of the elders in exile, to the priests, the prophets, '
  - type: note
    content: Multiple prophets were taken into captivity, including Daniel and Ezekiel.
  - type: text
    content: 'and all the people whom Nebuchadnezzar had deported from Jerusalem to Babylon. '
  '10':
  - type: text
    content: 'I say to you: After Babylon has ruled over you for seventy years, I will show compassion to you '
  - type: note
    content: Or “I will visit you.”
  - type: text
    content: and will fulfill my promise of giving you good things, and I will bring you back to your land.”
  - type: note
    content: Or “this place [Israel].”
  '11':
  - type: text
    content: 'Here’s what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: “I know '
  - type: note
    content: The Hebrew word for “know” is yadaʿ. This word occurs nearly one thousand times in the Bible. It signifies the many ways of gaining information through the senses. It is a word that can mean “to experience” or “to intimately know.” God is intimately involved in every aspect of your life. He knows where he is taking you, and it is good.
  - type: text
    content: 'all about the '
  - type: text
    content: marvelous
  - type: text
    content: ' destiny '
  - type: note
    content: Or “artistic designs,” “[marvelous] intentions,” or “[wonderful] plans.” The Hebrew word is the noun machashabah. The verb form means to “make plans,” “reckon,” “account,” or “think” and it is used 121 times in the Bible. There are a number of possible meanings, but they are all found within the context of creating something new. One possible translation could be “I know the new ideas I have for you.” God is an eternal Inventor, ever inventing new ways to show us his endless love.
  - type: text
    content: 'I have in store for you, a future planned out in detail. My intention is not to harm you but to surround you with peace and prosperity '
  - type: note
    content: The Hebrew word for “peace and prosperity” is shalom.
  - type: text
    content: 'and to give you a beautiful future, '
  - type: text
    content: glistening
  - type: text
    content: ' with hope. '
  - type: note
    content: Or “the future you hope for,” “hope for the future,” or “a destiny and a hope.” See Hos. 2:15.
  '12':
  - type: text
    content: 'When you call on me and come to me in prayer, I will listen to your '
  - type: text
    content: every word
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'If you reach out to me, you will find me when you search for me with all your heart. '
  '14':
  - type: text
    content: 'I will not disappoint you,” '
  - type: note
    content: Or “I will be available to you” or “I will make myself found unto you.”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: . “
  - type: text
    content: All that you have lost
  - type: text
    content: ', I will restore, and I will regather you from all the nations where I have scattered you. I will bring you back home to the land from which I exiled you,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: God’s Message to Those Who Remained in Judah
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' says all these things to you because you claim that he has raised up prophets for you in Babylon. '
  '16':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says about David’s descendant, King '
  - type: text
    content: Zedekiah
  - type: text
    content: ', and all the people living in this city, your relatives who were not taken away as prisoners with you: '
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says: “I am now going to send catastrophe to them—war, food shortages, and plague. I will make them like worthless figs, '
  - type: note
    content: See Jer. 24:8–10.
  - type: text
    content: 'so rotten they cannot be eaten. '
  '18':
  - type: text
    content: 'I will make them into a horrible sight to all the earth, a curse, a thing of horror, scorn, and derision to all the nations where I have driven them. I will afflict them with war, food shortages, and plague '
  '19':
  - type: text
    content: 'because they have refused to listen to my words,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', “although I have sent all my servants the prophets to them over and over, but still they closed their ears,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '2':
  - type: text
    content: '(Among the exiles were King Jeconiah, '
  - type: text
    content: Nehushta
  - type: text
    content: ' the queen mother, the high-ranking officials, the leading men of Judah and Jerusalem, and the craftsmen and metalworkers.) '
  '20':
  - type: text
    content: '“So pay attention, you exiles, whom I have sent from Jerusalem to Babylon, to what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have said!”'
  '21':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, says about Ahab the son of Kolaiah and Zedekiah the son of Maaseiah. He says, “These men are telling you lies in my name. Therefore, I will hand them over to King Nebuchadnezzar of Babylon, and he will have them put to death before your eyes. '
  '22':
  - type: text
    content: 'And in the future, when the people of Judah who are exiles in Babylon want to put a curse on someone, they will say, ‘I pray that '
  - type: text
    content: Yahweh
  - type: text
    content: ' kills you in the same way the king of Babylon burned Zedekiah and Ahab to death!’ '
  '23':
  - type: text
    content: 'For they have done outrageous scandals in Israel, committing adultery with other men’s wives and speaking lying words in my name that I never spoke to them. I know all that they have done and am a witness '
  - type: text
    content: against them
  - type: text
    content: '. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: Shemaiah’s Letter
  '24':
  - type: text
    content: '“This is what you should say to Shemaiah of Nehelam: '
  '25':
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, says: You have taken it upon yourself to write letters to all the people in Jerusalem, to the priest Zephaniah son of Maaseiah and to all the priests. Your letter states, '
  '26':
  - type: text
    content: '‘After the death of Jehoiada the priest, '
  - type: text
    content: Yahweh
  - type: text
    content: ' chose you to be the priest in charge of the temple '
  - type: text
    content: security
  - type: text
    content: '. You know that anyone who acts crazy and pretends to be a prophet should be arrested and put in chains and iron collars. '
  '27':
  - type: text
    content: 'Why, then, haven’t you done this to Jeremiah of Anathoth, who is now posing as a prophet to the people? '
  '28':
  - type: text
    content: 'He even sent us a letter in Babylon, saying: You’ll be there a long time, so build houses, settle down, plant gardens, and eat what they produce.’ ”'
  '29':
  - type: text
    content: 'Now, when the priest Zephaniah had read this letter to Jeremiah, '
  '3':
  - type: text
    content: 'Jeremiah entrusted the letter to Elasah son of Shaphan and to Gemariah son of Hilkiah, whom Zedekiah king of Judah had sent to Babylon, to Nebuchadnezzar king of Babylon. The letter read as follows:'
  '30':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Jeremiah, '
  '31':
  - type: text
    content: '“Send another letter to all the exiles '
  - type: text
    content: in Babylon
  - type: text
    content: ':'
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have not chosen Shemaiah '
  - type: note
    content: Even in Babylon, the false prophets were contending against Jeremiah. The priest Ezekiel, who was called into the prophetic office (see Ezek. 1–2), was one of the Jews who was taken captive into Babylon. He would have prophesied and confirmed the word of Yahweh spoken through Jeremiah.
  - type: text
    content: 'of Nehelam to be one of my prophets, and he has misled you by telling lies in my name. '
  '32':
  - type: text
    content: 'He has even stirred up rebellion against me. Therefore, I will punish Shemaiah. He and his descendants will not live to see the good things I will do for my people. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, says to all the exiles deported from Jerusalem to Babylon: '
  '5':
  - type: text
    content: '“Build houses and settle in the land. Plant gardens and eat their produce. '
  '6':
  - type: text
    content: 'Get married and have children; encourage your sons and daughters to get married and raise families. '
  - type: text
    content: Flourish
  - type: text
    content: ' in your captivity, for you must increase and not decrease. '
  - type: note
    content: Although Jeremiah was called to warn the people that exile would be their punishment for disobeying God, once they had been taken captive, Jeremiah’s message changed completely to a message of hope, comfort, and eventual restoration to their homeland. A prophet cannot speak his opinions but only the message God gives him. One day the message may be “Repent and change your ways” and the next day “Be at peace, for you will increase and not decrease.” Obedience to God is a prophet’s primary duty.
  '7':
  - type: text
    content: 'Work for the good of the city to which I have exiled you. And pray to '
  - type: text
    content: Yahweh
  - type: text
    content: ', asking for a blessing on your city since your peace depends on its peace.” '
  - type: note
    content: Or “as the city prospers, you will prosper.”
  '8':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, says: “Do not be deceived by the false prophets in your midst or by those who presume to know the future. Pay no attention to their dreams, '
  '9':
  - type: text
    content: 'for,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares, “they prophesy lies to you in my name, and I have not sent them. '
