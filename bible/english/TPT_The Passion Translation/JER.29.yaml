  - type: text
    text: Jeremiah’s Letter to the Exiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the open letter '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The letter (or scroll) was likely written and sent around 595 BC.
    marker-yv: yv-n
  - type: text
    text: 'that the prophet Jeremiah sent from Jerusalem to the rest of the elders in exile, to the priests, the prophets, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Multiple prophets were taken into captivity, including Daniel and Ezekiel.
    marker-yv: yv-n
  - type: text
    text: 'and all the people whom Nebuchadnezzar had deported from Jerusalem to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(Among the exiles were King Jeconiah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nehushta
  - type: text
    text: ' the queen mother, the high-ranking officials, the leading men of Judah and Jerusalem, and the craftsmen and metalworkers.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jeremiah entrusted the letter to Elasah son of Shaphan and to Gemariah son of Hilkiah, whom Zedekiah king of Judah had sent to Babylon, to Nebuchadnezzar king of Babylon. The letter read as follows:'
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, Commander of Angel Armies, says to all the exiles deported from Jerusalem to Babylon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Build houses and settle in the land. Plant gardens and eat their produce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Get married and have children; encourage your sons and daughters to get married and raise families. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Flourish
  - type: text
    text: ' in your captivity, for you must increase and not decrease. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although Jeremiah was called to warn the people that exile would be their punishment for disobeying God, once they had been taken captive, Jeremiah’s message changed completely to a message of hope, comfort, and eventual restoration to their homeland. A prophet cannot speak his opinions but only the message God gives him. One day the message may be “Repent and change your ways” and the next day “Be at peace, for you will increase and not decrease.” Obedience to God is a prophet’s primary duty.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Work for the good of the city to which I have exiled you. And pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', asking for a blessing on your city since your peace depends on its peace.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as the city prospers, you will prosper.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, Commander of Angel Armies, says: “Do not be deceived by the false prophets in your midst or by those who presume to know the future. Pay no attention to their dreams, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'for,” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' declares, “they prophesy lies to you in my name, and I have not sent them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I say to you: After Babylon has ruled over you for seventy years, I will show compassion to you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will visit you.”
    marker-yv: yv-n
  - type: text
    text: and will fulfill my promise of giving you good things, and I will bring you back to your land.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “this place [Israel].”
    marker-yv: yv-n
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Here’s what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you: “I know '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “know” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yadaʿ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This word occurs nearly one thousand times in the Bible. It signifies the many ways of gaining information through the senses. It is a word that can mean “to experience” or “to intimately know.” God is intimately involved in every aspect of your life. He knows where he is taking you, and it is good.
    marker-yv: yv-n
  - type: text
    text: 'all about the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marvelous
  - type: text
    text: ' destiny '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “artistic designs,” “[marvelous] intentions,” or “[wonderful] plans.” The Hebrew word is the noun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: machashabah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The verb form means to “make plans,” “reckon,” “account,” or “think” and it is used 121 times in the Bible. There are a number of possible meanings, but they are all found within the context of creating something new. One possible translation could be “I know the new ideas I have for you.” God is an eternal Inventor, ever inventing new ways to show us his endless love.
    marker-yv: yv-n
  - type: text
    text: 'I have in store for you, a future planned out in detail. My intention is not to harm you but to surround you with peace and prosperity '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “peace and prosperity” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shalom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and to give you a beautiful future, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: glistening
  - type: text
    text: ' with hope. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the future you hope for,” “hope for the future,” or “a destiny and a hope.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 2:15
      metadata:
        usfm: HOS.2.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When you call on me and come to me in prayer, I will listen to your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: every word
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If you reach out to me, you will find me when you search for me with all your heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will not disappoint you,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will be available to you” or “I will make myself found unto you.”
    marker-yv: yv-n
  - type: text
    text: 'declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: . “
  - type: usfm
    marker: it
    children:
    - type: text
      text: All that you have lost
  - type: text
    text: ', I will restore, and I will regather you from all the nations where I have scattered you. I will bring you back home to the land from which I exiled you,” declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Message to Those Who Remained in Judah
  marker-yv: yv-h
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says all these things to you because you claim that he has raised up prophets for you in Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says about David’s descendant, King '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zedekiah
  - type: text
    text: ', and all the people living in this city, your relatives who were not taken away as prisoners with you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, says: “I am now going to send catastrophe to them—war, food shortages, and plague. I will make them like worthless figs, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 24:8–10
      metadata:
        usfm: JER.24.8+JER.24.9+JER.24.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'so rotten they cannot be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I will make them into a horrible sight to all the earth, a curse, a thing of horror, scorn, and derision to all the nations where I have driven them. I will afflict them with war, food shortages, and plague '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'because they have refused to listen to my words,” declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “although I have sent all my servants the prophets to them over and over, but still they closed their ears,” declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“So pay attention, you exiles, whom I have sent from Jerusalem to Babylon, to what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have said!”'
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, Commander of Angel Armies, says about Ahab the son of Kolaiah and Zedekiah the son of Maaseiah. He says, “These men are telling you lies in my name. Therefore, I will hand them over to King Nebuchadnezzar of Babylon, and he will have them put to death before your eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And in the future, when the people of Judah who are exiles in Babylon want to put a curse on someone, they will say, ‘I pray that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' kills you in the same way the king of Babylon burned Zedekiah and Ahab to death!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For they have done outrageous scandals in Israel, committing adultery with other men’s wives and speaking lying words in my name that I never spoke to them. I know all that they have done and am a witness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against them
  - type: text
    text: '. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shemaiah’s Letter
  marker-yv: yv-h
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“This is what you should say to Shemaiah of Nehelam: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of Israel, Commander of Angel Armies, says: You have taken it upon yourself to write letters to all the people in Jerusalem, to the priest Zephaniah son of Maaseiah and to all the priests. Your letter states, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '‘After the death of Jehoiada the priest, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' chose you to be the priest in charge of the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: security
  - type: text
    text: '. You know that anyone who acts crazy and pretends to be a prophet should be arrested and put in chains and iron collars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Why, then, haven’t you done this to Jeremiah of Anathoth, who is now posing as a prophet to the people? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He even sent us a letter in Babylon, saying: You’ll be there a long time, so build houses, settle down, plant gardens, and eat what they produce.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now, when the priest Zephaniah had read this letter to Jeremiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Jeremiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Send another letter to all the exiles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Babylon
  - type: text
    text: ':'
- type: usfm
  marker: mi
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have not chosen Shemaiah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Even in Babylon, the false prophets were contending against Jeremiah. The priest Ezekiel, who was called into the prophetic office (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezek. 1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), was one of the Jews who was taken captive into Babylon. He would have prophesied and confirmed the word of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: spoken through Jeremiah.
    marker-yv: yv-n
  - type: text
    text: 'of Nehelam to be one of my prophets, and he has misled you by telling lies in my name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He has even stirred up rebellion against me. Therefore, I will punish Shemaiah. He and his descendants will not live to see the good things I will do for my people. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
