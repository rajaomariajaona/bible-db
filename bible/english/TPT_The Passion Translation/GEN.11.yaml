document_id: GEN.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tower of Babel
  - type: text
    content: 'Now everyone at that time spoke a single language '
  - type: note
    content: Or “one lip.”
  - type: text
    content: 'with one vocabulary. '
  '10':
  - type: text
    content: These are the descendants of Shem.
  - type: note
    content: See 1 Chron. 1:17–27; Luke 3:23–38.
  - type: text
    content: 'Two years after the flood, at the age of one hundred, Shem had a son named Arphaxad. '
  - type: note
    content: See Gen. 10:22.
  '11':
  - type: text
    content: And after Arphaxad was born, Shem lived another five hundred years and had other sons and daughters.
  '12':
  - type: text
    content: 'When Arphaxad was thirty-five, he had a son named Shelah. '
  - type: note
    content: See Gen. 10:24.
  '13':
  - type: text
    content: And after Shelah was born Arphaxad lived another four hundred and three years and had other sons and daughters.
  '14':
  - type: text
    content: 'When Shelah was thirty, he had a son named Eber. '
  - type: note
    content: See Gen. 10:24.
  '15':
  - type: text
    content: And after Eber was born, Shelah lived another four hundred and three years and had other sons and daughters.
  '16':
  - type: text
    content: 'When Eber was thirty-four, he had a son named Peleg. '
  - type: note
    content: See Gen. 10:25.
  '17':
  - type: text
    content: And after Peleg was born, Eber lived another four hundred and thirty years and had other sons and daughters.
  '18':
  - type: text
    content: 'When Peleg was thirty, he had a son named Reu. '
  '19':
  - type: text
    content: And after Reu was born, Peleg lived another two hundred and nine years and had other sons and daughters.
  '2':
  - type: text
    content: 'As people migrated eastward, '
  - type: note
    content: Or “from the east.” The Hebrew is ambiguous.
  - type: text
    content: 'they found a large plain in the land of Shinar and settled there. '
  '20':
  - type: text
    content: 'When Reu was thirty-two, '
  - type: note
    content: Or “one hundred and thirty-two” (LXX, Sam. Pent.). It is Jewish tradition that Reu was born when the Tower of Babel had begun to be built. Reu means “friend” or “shepherd.”
  - type: text
    content: 'he had a son named Serug. '
  '21':
  - type: text
    content: And after Serug was born, Reu lived another two hundred and seven years and had other sons and daughters.
  '22':
  - type: text
    content: 'When Serug was thirty, '
  - type: note
    content: Or “one hundred and thirty” (LXX, Sam. Pent.). Serug means “interwoven” or “strength.” According to the Book of Jubilees, Serug was the first one of Shem’s descendants to turn from Yahweh to worship idols. It is said he taught sorcery to his son Nahor.
  - type: text
    content: 'he had a son named Nahor. '
  '23':
  - type: text
    content: And after Nahor was born, Serug lived another two hundred years and had other sons and daughters.
  '24':
  - type: text
    content: 'When Nahor was twenty-nine, he had a son named Terah. '
  - type: note
    content: Terah means “wild goat” or “wanderer.”
  '25':
  - type: text
    content: 'And after Terah was born, Nahor '
  - type: note
    content: Jewish tradition states that Nahor lived in Ur, on the Euphrates in lower Mesopotamia, the place where God appeared to Abram. Nahor means “angry,” “passionate.”
  - type: text
    content: lived another one hundred and nineteen years and had other sons and daughters.
  '26':
  - type: text
    content: 'When Terah was seventy, he had sons named Abram, '
  - type: note
    content: This was the Patriarch who would later have his name changed to Abraham. Abram means “exalted father.” Abraham means “father of a multitude.” There were ten generations from Adam to Noah and ten generations from Shem to Abram.
  - type: text
    content: Nahor, and Haran.
  - type: note
    content: Haran means “living in the high place” or “mountaineer.”
  - type: heading
    content: The Story of Terah
  '27':
  - type: text
    content: 'Here are the descendants of Terah. Terah was the father of Abram, Nahor, and Haran, and Haran was the father of Lot. '
  '28':
  - type: text
    content: 'Haran preceded his father, Terah, in death in the land of his birth, in the Chaldean city of Ur. '
  - type: note
    content: The word Chaldea means “demonic;” Ur means “flame.” Ur was an ancient city-state in Mesopotamia (modern Iraq), which was approximately fifty miles south of Babylon. The ruins of Ur can still be seen at modern Tell el-Muqayyar. In 2000 BC, Ur was perhaps one of the largest cities of the world. It is clear that Abram and his father served foreign gods. Ur was named after the moon goddess and was her center of worship. The Chaldeans were astrologers, occultists, and idol worshipers. Ancient traditions state that Terah was an idol-maker until his death. The Jewish writers have a tradition that Abram and his father were cast into a fiery furnace for refusing to worship idols and were miraculously delivered. See Josh. 24:2.
  '29':
  - type: text
    content: The brothers
  - type: text
    content: ', Abram and Nahor, were both married. Abram’s wife was Sarai. '
  - type: note
    content: Sarai means “ruler” or “my princess.” God would later change her name to “Sarah.”
  - type: text
    content: 'Nahor married the daughter of '
  - type: text
    content: his deceased brother
  - type: text
    content: ' Haran; her name was Milcah, '
  - type: note
    content: Nahor married his orphaned niece. Milcah means “queen.”
  - type: text
    content: 'and her sister was Iscah. '
  - type: note
    content: Iscah means “discerner” or “one who scans abroad.” Iscah is Jessica in English.
  '3':
  - type: text
    content: 'They said to one another, “Come, let’s unite together and make bricks '
  - type: text
    content: of clay
  - type: text
    content: ' '
  - type: note
    content: God’s building never includes bricks, only stones. Man makes bricks; God is the Maker of stones. The New Jerusalem will not be made from bricks but from precious stones (see Rev. 21:18–20). Pharaoh made his treasure cities out of bricks; God raises up his temple using living stones (see 1 Peter 2:5).
  - type: text
    content: 'and burn them until they become hard.” So, they piled up the bricks they made to serve as stones and collected tar for mortar. '
  '30':
  - type: text
    content: Now Sarai was barren and childless.
  '31':
  - type: text
    content: 'Terah took his son Abram, his grandson Lot, '
  - type: note
    content: Lot means “to wrap a covering” or “to envelop.”
  - type: text
    content: 'the son of Haran, and his daughter-in-law Sarai, his son Abram’s wife, and they all departed together from the Chaldean city of Ur to go into the land of Canaan. '
  - type: note
    content: The land of Canaan takes its name from the son of Ham, Canaan. The land of Canaan is mentioned sixty-six times in the Old Testament but not found in the New Testament.
  - type: text
    content: 'But when they journeyed as far as Haran, '
  - type: note
    content: Most scholars identify Haran with a city in Turkey, now in ruins, called Harran, which is approximately six hundred miles from Ur. It is the city that Jacob fled to (see Gen. 27:43; 28:10) and, later, that the Assyrians destroyed in the days of Hezekiah (see 2 Kings 19:12; Isa. 37:12).
  - type: text
    content: 'they settled there. '
  '32':
  - type: text
    content: Terah lived two hundred and five years and died in Haran.
  '4':
  - type: text
    content: 'Then they said, “Come, let’s begin work to build ourselves a city with a lofty tower that rises into the heavens. We’ll make a name for ourselves, '
  - type: text
    content: a monument to us
  - type: text
    content: ', '
  - type: note
    content: An ancient historian, Philo Judaeus, says that each worker engraved their names on the bricks to memorialize themselves. Today their names are forgotten, and the Name of God stands as a High Tower. Seeking to make a name for ourselves is self-worship. We are to lay aside our reputations to make the Name of Jesus famous (see Phil. 2:3–11). Jesus emptied himself of his outward glory.
  - type: text
    content: instead of being scattered all over the earth.”
  '5':
  - type: text
    content: 'But when '
  - type: text
    content: Yahweh
  - type: text
    content: ' came down to see the city and the tower which mortals had started building, '
  '6':
  - type: text
    content: 'he said, “If they have begun this as one people sharing a common language, then nothing they plan to do will be impossible for them. '
  '7':
  - type: text
    content: 'Come, let us '
  - type: note
    content: In the plural pronoun many theologians see the three members of the Godhead.
  - type: text
    content: go down and confuse their language and prevent them from understanding each other.”
  - type: note
    content: Some linguists believe there are nearly seven thousand languages in the world. Although God confused the language of earth, he will one day purify (clarify) the language so that people will serve him in unity. See Zeph. 3:9. Acts 2 is the reversal of Babel, for God gave men unlearned languages as they spoke in tongues.
  '8':
  - type: text
    content: 'So '
  - type: text
    content: Yahweh
  - type: text
    content: ' scattered them over the entire earth, and they stopped building their city. '
  - type: note
    content: The Bible ends with two figurative cities, Babylon and the New Jerusalem. Babylon-builders will always seek to make a name for themselves. Those who are a part of the New Jerusalem long to see only the name of Jesus exalted. The overcomer’s name will be engraved forever on a stone in the City of our God where he makes his dwelling with man (see Rev. 2:17).
  '9':
  - type: text
    content: 'That is why the city was called Babel—because it was there that '
  - type: text
    content: Yahweh
  - type: text
    content: ' confused '
  - type: note
    content: Babel comes from the Hebrew word “to confuse.” However, in the Babylonian language, the city was called Bab-ilu, “the gate of God.”
  - type: text
    content: the language of the whole world and from there the people were scattered over the face of the earth.
  - type: heading
    content: Genealogy of Shem
