        text: means “flame.” Ur was an ancient city-state in Mesopotamia (modern Iraq), which was approximately fifty miles south of Babylon. The ruins of Ur can still be seen at modern Tell el-Muqayyar. In 2000 BC, Ur was perhaps one of the largest cities of the world. It is clear that Abram and his father served foreign gods. Ur was named after the moon goddess and was her center of worship. The Chaldeans were astrologers, occultists, and idol worshipers. Ancient traditions state that Terah was an idol-maker until his death. The Jewish writers have a tradition that Abram and his father were cast into a fiery furnace for refusing to worship idols and were miraculously delivered. See
