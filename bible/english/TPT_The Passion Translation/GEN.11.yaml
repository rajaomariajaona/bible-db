  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then they said, “Come, let’s begin work to build ourselves a city with a lofty tower that rises into the heavens. We’ll make a name for ourselves, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a monument to us
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ancient historian, Philo Judaeus, says that each worker engraved their names on the bricks to memorialize themselves. Today their names are forgotten, and the Name of God stands as a High Tower. Seeking to make a name for ourselves is self-worship. We are to lay aside our reputations to make the Name of Jesus famous (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
