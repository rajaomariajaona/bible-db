      metadata:
        usfm: PHP.2.3+PHP.2.4+PHP.2.5+PHP.2.6+PHP.2.7+PHP.2.8+PHP.2.9+PHP.2.10+PHP.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Jesus emptied himself of his outward glory.
    marker-yv: yv-n
  - type: text
    text: instead of being scattered all over the earth.”
