    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Bible ends with two figurative cities, Babylon and the New Jerusalem. Babylon-builders will always seek to make a name for themselves. Those who are a part of the New Jerusalem long to see only the name of Jesus exalted. The overcomer’s name will be engraved forever on a stone in the City of our God where he makes his dwelling with man (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
