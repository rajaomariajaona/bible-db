      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comes from the Hebrew word “to confuse.” However, in the Babylonian language, the city was called Bab-ilu, “the gate of God.”
    marker-yv: yv-n
  - type: text
    text: the language of the whole world and from there the people were scattered over the face of the earth.
