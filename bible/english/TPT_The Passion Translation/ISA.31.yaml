document_id: ISA.31,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Trust the Holy One of Israel
  - type: text
    content: Woe to those who run down to Egypt for help,
  - type: text
    content: trusting in the might of their multitude
  - type: text
    content: of cavalry, chariots, and riders.
  - type: text
    content: Their confident trust is not in the Holy One of Israel,
  - type: text
    content: 'nor do they consult with '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '2':
  - type: text
    content: Yet he is wiser than all of them!
  - type: text
    content: 'He can call down calamity '
  - type: text
    content: upon evildoers
  - type: text
    content: and never needs to retract his words.
  - type: text
    content: He will stand up against the wicked and those who protect them.
  '3':
  - type: text
    content: 'The Egyptians are not gods; '
  - type: note
    content: Or “mighty ones.”
  - type: text
    content: they’re only human!
  - type: note
    content: “Human” is the Hebrew word adam.
  - type: text
    content: Their horses are not supernatural; they’re only flesh!
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' demonstrates his power,'
  - type: note
    content: Or “stretches out his hand.” See Eph. 4:11.
  - type: text
    content: the helper will stumble and the helped will fall—
  - type: text
    content: both will perish together!
  - type: heading
    content: The Lord Will Fight for His People
  '4':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me:'
  - type: text
    content: '“When a lion, '
  - type: note
    content: See Rev. 5.
  - type: text
    content: 'the great beast, growls '
  - type: note
    content: The Hebrew word for “growl” (hagah) is more commonly translated “meditates.”
  - type: text
    content: over his prey,
  - type: text
    content: and when the shepherds band together against him,
  - type: text
    content: the lion is neither terrified by their shouts
  - type: text
    content: nor disturbed by all the noise they make.
  - type: text
    content: 'So will '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies,'
  - type: text
    content: 'come down to fight '
  - type: text
    content: for you
  - type: text
    content: ' on Mount Zion and on Zion’s hill!'
  '5':
  - type: text
    content: Just as a bird hovers over its nest to protect its young,
  - type: text
    content: 'so will '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, shield Jerusalem.'
  - type: text
    content: He will protect her, deliver her, spare her, and rescue her!”
  - type: heading
    content: Repent and Return
  '6':
  - type: text
    content: “People of Israel! Repent and turn back to God,
  - type: text
    content: whom you have deeply betrayed.
  '7':
  - type: text
    content: For a time is coming
  - type: text
    content: when all people will throw away
  - type: text
    content: their sinful idols of silver and gold
  - type: text
    content: and forsake all that their own hands have made.
  - type: note
    content: See Acts 17:29.
  '8':
  - type: text
    content: Assyria will fall by the sword but not the sword of man.
  - type: text
    content: 'It will not be man’s sword that will slaughter them, '
  - type: text
    content: but God’s
  - type: text
    content: '!'
  - type: text
    content: They will run from battle,
  - type: text
    content: and their young men will be made slaves.
  '9':
  - type: text
    content: Fear will cause them to surrender their high fortress,
  - type: note
    content: Or “rock cliff” (Hb. sela).
  - type: text
    content: and they will panic at the sight of princes,
  - type: text
    content: and desert their battle flag,”
  - type: text
    content: says the Lord God, whose fire burns in Zion
  - type: text
    content: and whose furnace burns in Jerusalem!
