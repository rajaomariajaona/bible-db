  - type: text
    text: Woe to those who run down to Egypt for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: trusting in the might of their multitude
- type: usfm
  marker: q1
  children:
  - type: text
    text: of cavalry, chariots, and riders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their confident trust is not in the Holy One of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nor do they consult with '
  - type: usfm
    marker: nd
    children:
    - type: text
