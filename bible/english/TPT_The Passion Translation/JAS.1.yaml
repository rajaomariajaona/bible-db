document_id: JAS.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith and Wisdom
  - type: text
    content: Greetings!
  - type: text
    content: ' My name is Jacob, '
  - type: note
    content: James is actually the Hebrew name Jacob, the name of the man who had twelve sons that formed the twelve tribes of Israel.
  - type: text
    content: 'and I’m a love-slave of God and of the Lord Jesus Christ. I’m writing to all the twelve tribes of Israel who have been sown as seeds '
  - type: note
    content: As translated from the Aramaic, which was the language spoken by Jesus and his disciples.
  - type: text
    content: among the nations.
  '10':
  - type: text
    content: 'But those who are rich should boast in how God has brought them low and humbled them, for all their earthly glory will one day fade away like a wildflower in the meadow. '
  '11':
  - type: text
    content: 'For as the scorching heat of the sun causes the petals of the wildflower to fall off and lose its appearance of beauty, '
  - type: note
    content: In the land of the Bible there were many deserts with arid land. The rainy season is quite short and the burning heat of the sun scorched the earth until the next season of rain arrived. We live in a constantly changing world with riches and beauty quickly fading. Our hope is set on things above.
  - type: text
    content: so the rich in the midst of their pursuit of wealth will wither away.
  '12':
  - type: text
    content: If your faith remains strong, even while surrounded by life’s difficulties, you will continue to experience the untold blessings of God! True happiness comes as you pass the test with faith, and receive the victorious crown of life promised to every lover of God!
  '13':
  - type: text
    content: 'When you are tempted don’t ever say, “God is tempting me,” for God is incapable of being tempted by evil and he is never the source of temptation. '
  '14':
  - type: text
    content: 'Instead it is each person’s own desires and thoughts that drag them into evil and lure '
  - type: note
    content: Or “hooked by the bait of evil from their own desires.”
  - type: text
    content: 'them away into darkness. '
  '15':
  - type: text
    content: 'Evil desires give birth to evil actions. And when sin is fully mature it can murder you! '
  '16':
  - type: text
    content: So my friends, don’t be fooled by your own desires!
  '17':
  - type: text
    content: 'Every gift '
  - type: note
    content: Or “legacy.”
  - type: text
    content: 'God freely gives us is good and perfect, '
  - type: note
    content: The Aramaic word used here, mshamlaita, means “complete, wholesome, abundant, sufficient, enough, and perfect.”
  - type: text
    content: 'streaming down from the Father of lights, '
  - type: note
    content: Jesus calls us the light of the world (Matt. 5:14–16) and Paul describes believers as “shining lights” (Phil. 2:15) in this world. God is our Father, he created angels but he brought us into new birth. The Greek word anōthen (“from above”) is used by Jesus in describing to Nicodemus that we are born from above. We are lights born from above. See also John 3:7.
  - type: text
    content: 'who shines from the heavens with no hidden shadow or darkness '
  - type: note
    content: Or “shadow of turning.” The implication is there is nothing that you will find wrong with God, nothing in him that could even remotely appear to be evil hiding. The more you get to know him the more you realize how beautiful and holy he is.
  - type: text
    content: 'and is never subject to change. '
  '18':
  - type: text
    content: 'God was delighted '
  - type: note
    content: Or “God having decided gave us birth.” The comparison in this passage is striking. Sin gives birth to death, God from his pure desires gives us birth to bring him glory.
  - type: text
    content: 'to give us birth by the truth of his infallible Word '
  - type: note
    content: The Aramaic can be translated “the word of the rainbow-sign.” That is, the unbreakable new covenant promises we have as new creatures in Christ.
  - type: text
    content: so that we would fulfill his chosen destiny for us and become the favorite ones out of all his creation!
  - type: note
    content: Or “a kind of firstfruits of his creations” or “the pledge [down-payment] of a still further creation [a more complete harvest].”
  '19':
  - type: text
    content: 'My dearest brothers and sisters, take this to heart: Be quick to listen, '
  - type: note
    content: Although the Greek does not supply an object we are to listen to, it is obvious in the context that we should listen to one another, to God’s voice, and to his Word. May God give us listening hearts.
  - type: text
    content: 'but slow to speak. And be slow to become angry, '
  '2':
  - type: text
    content: 'My fellow believers, when it seems as though you are facing nothing but difficulties, see it as an invaluable opportunity to experience the greatest joy that you can! '
  '20':
  - type: text
    content: 'for human anger is never a legitimate tool to promote God’s righteous purpose. '
  - type: note
    content: Or “God’s righteousness will never attach itself to human anger.”
  '21':
  - type: text
    content: 'So this is why we abandon everything morally impure '
  - type: note
    content: The Aramaic word used here can mean “demonic activities.”
  - type: text
    content: 'and all forms of wicked conduct. '
  - type: note
    content: Or “excesses of evil.”
  - type: text
    content: 'Instead, with a sensitive spirit '
  - type: note
    content: Due to the Greek sentence construction, this clause may refer to what preceded it, “abandon . . . all forms of wicked conduct with a gentle [meek] heart.”
  - type: text
    content: we absorb God’s Word, which has been implanted within our nature, for the Word of Life has power to continually deliver us.
  - type: note
    content: Or “save our souls.” The Greek uses the effective aorist active infinitive σωσαι (sōsai) from σωζω (sōzō) and could refer to the ultimate salvation of our souls (personality, emotions, thoughts) and/or our eternal salvation.
  '22':
  - type: text
    content: Don’t just listen to the Word of Truth and not respond to it, for that is the essence of self-deception. So always let his Word become like poetry written and fulfilled by your life!
  - type: note
    content: Or “be a poet [doer] of the Word.”
  '23':
  - type: text
    content: 'If you listen to the Word and don’t live out the message you hear, you become like the person who looks in the mirror of the Word to discover the reflection of his face in the beginning. '
  - type: note
    content: Or “realizing his beginning [genesis] face” or “studying the face he was born with.”
  '24':
  - type: text
    content: You perceive how God sees you in the mirror of the Word
  - type: text
    content: ', '
  - type: note
    content: For the believer, seeing the man “in the mirror” is seeing how God sees us from the beginning, even before the fall of Adam which resulted in sin’s devastation to human hearts. The man in the mirror is the new creation man.
  - type: text
    content: 'but then you go out and forget '
  - type: note
    content: The Aramaic can be translated “drift away from.”
  - type: text
    content: 'your divine origin. '
  '25':
  - type: text
    content: 'But those who set their gaze deeply into the perfecting law of liberty '
  - type: note
    content: This is referred to as the “royal law of love” in 2:8 and the “law of liberty” in 2:12.
  - type: text
    content: are fascinated by and respond to the truth they hear and are strengthened by it—they experience God’s blessing in all that they do!
  - type: note
    content: See Luke 11:28.
  '26':
  - type: text
    content: If someone believes they have a relationship with God but fails to guard his words then his heart is drifting away and his religion is shallow and empty.
  - type: note
    content: As translated from the Aramaic. The Greek is “If one presumes to be religious but doesn’t guard his tongue, he deceives himself and his religion is useless.”
  '27':
  - type: text
    content: 'True spirituality '
  - type: note
    content: The Aramaic can be translated “True ministry.”
  - type: text
    content: 'that is pure in the eyes of our Father God is to make a difference in the lives of the orphans, '
  - type: note
    content: The Greek word orhpanos means “the fatherless” or “the comfortless.”
  - type: text
    content: and widows in their troubles, and to refuse to be corrupted by the world’s values.
  '3':
  - type: text
    content: 'For you know that when your faith is tested '
  - type: note
    content: Or “when faith passes the test.”
  - type: text
    content: 'it stirs up in you the power of endurance. '
  '4':
  - type: text
    content: And then as your endurance grows even stronger, it will release perfection into every part of your being until there is nothing missing and nothing lacking.
  '5':
  - type: text
    content: 'And if anyone longs to be wise, ask God for wisdom and he will give it! He won’t see your lack of wisdom as an opportunity to scold you over your failures but he will overwhelm your failures with his generous grace. '
  - type: note
    content: Or “with an open hand.”
  '6':
  - type: text
    content: 'Just make sure you ask empowered by confident faith without doubting that you will receive. For the ambivalent person believes one minute and doubts the next. Being undecided makes you become like the rough seas driven and tossed by the wind. You’re up one minute and tossed down the next. '
  '7':
  - type: text
    content: 'When you are half-hearted and wavering it leaves you unstable. '
  - type: note
    content: Or “restless” or “disengaged.”
  - type: text
    content: Can you really expect to receive anything from the Lord when you’re in that condition?
  '9':
  - type: text
    content: 'The believer who is poor still has reasons to boast, for he has been placed on high. '
