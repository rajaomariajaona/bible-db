document_id: JAS.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith and Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Greetings!
    - type: text
      text: ' My name is Jacob, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: James is actually the Hebrew name Jacob, the name of the man who had twelve sons that formed the twelve tribes of Israel.
      marker-yv: yv-n
    - type: text
      text: 'and I’m a love-slave of God and of the Lord Jesus Christ. I’m writing to all the twelve tribes of Israel who have been sown as seeds '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic, which was the language spoken by Jesus and his disciples.
      marker-yv: yv-n
    - type: text
      text: among the nations.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But those who are rich should boast in how God has brought them low and humbled them, for all their earthly glory will one day fade away like a wildflower in the meadow. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For as the scorching heat of the sun causes the petals of the wildflower to fall off and lose its appearance of beauty, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the land of the Bible there were many deserts with arid land. The rainy season is quite short and the burning heat of the sun scorched the earth until the next season of rain arrived. We live in a constantly changing world with riches and beauty quickly fading. Our hope is set on things above.
      marker-yv: yv-n
    - type: text
      text: so the rich in the midst of their pursuit of wealth will wither away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If your faith remains strong, even while surrounded by life’s difficulties, you will continue to experience the untold blessings of God! True happiness comes as you pass the test with faith, and receive the victorious crown of life promised to every lover of God!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When you are tempted don’t ever say, “God is tempting me,” for God is incapable of being tempted by evil and he is never the source of temptation. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Instead it is each person’s own desires and thoughts that drag them into evil and lure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hooked by the bait of evil from their own desires.”
      marker-yv: yv-n
    - type: text
      text: 'them away into darkness. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Evil desires give birth to evil actions. And when sin is fully mature it can murder you! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So my friends, don’t be fooled by your own desires!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Every gift '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “legacy.”
      marker-yv: yv-n
    - type: text
      text: 'God freely gives us is good and perfect, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mshamlaita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', means “complete, wholesome, abundant, sufficient, enough, and perfect.”'
      marker-yv: yv-n
    - type: text
      text: 'streaming down from the Father of lights, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus calls us the light of the world (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:14–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and Paul describes believers as “shining lights” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) in this world. God is our Father, he created angels but he brought us into new birth. The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: anōthen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“from above”) is used by Jesus in describing to Nicodemus that we are born from above. We are lights born from above. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'who shines from the heavens with no hidden shadow or darkness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shadow of turning.” The implication is there is nothing that you will find wrong with God, nothing in him that could even remotely appear to be evil hiding. The more you get to know him the more you realize how beautiful and holy he is.
      marker-yv: yv-n
    - type: text
      text: 'and is never subject to change. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'God was delighted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God having decided gave us birth.” The comparison in this passage is striking. Sin gives birth to death, God from his pure desires gives us birth to bring him glory.
      marker-yv: yv-n
    - type: text
      text: 'to give us birth by the truth of his infallible Word '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the word of the rainbow-sign.” That is, the unbreakable new covenant promises we have as new creatures in Christ.
      marker-yv: yv-n
    - type: text
      text: so that we would fulfill his chosen destiny for us and become the favorite ones out of all his creation!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a kind of firstfruits of his creations” or “the pledge [down-payment] of a still further creation [a more complete harvest].”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'My dearest brothers and sisters, take this to heart: Be quick to listen, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek does not supply an object we are to listen to, it is obvious in the context that we should listen to one another, to God’s voice, and to his Word. May God give us listening hearts.
      marker-yv: yv-n
    - type: text
      text: 'but slow to speak. And be slow to become angry, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'My fellow believers, when it seems as though you are facing nothing but difficulties, see it as an invaluable opportunity to experience the greatest joy that you can! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'for human anger is never a legitimate tool to promote God’s righteous purpose. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God’s righteousness will never attach itself to human anger.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So this is why we abandon everything morally impure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here can mean “demonic activities.”
      marker-yv: yv-n
    - type: text
      text: 'and all forms of wicked conduct. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “excesses of evil.”
      marker-yv: yv-n
    - type: text
      text: 'Instead, with a sensitive spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Due to the Greek sentence construction, this clause may refer to what preceded it, “abandon . . . all forms of wicked conduct with a gentle [meek] heart.”
      marker-yv: yv-n
    - type: text
      text: we absorb God’s Word, which has been implanted within our nature, for the Word of Life has power to continually deliver us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “save our souls.” The Greek uses the effective aorist active infinitive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: wg
        children:
        - type: text
          text: σωσαι
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: it
        children:
        - type: text
          text: sōsai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: wg
        children:
        - type: text
          text: σωζω
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: it
        children:
        - type: text
          text: sōzō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and could refer to the ultimate salvation of our souls (personality, emotions, thoughts) and/or our eternal salvation.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Don’t just listen to the Word of Truth and not respond to it, for that is the essence of self-deception. So always let his Word become like poetry written and fulfilled by your life!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “be a poet [doer] of the Word.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'If you listen to the Word and don’t live out the message you hear, you become like the person who looks in the mirror of the Word to discover the reflection of his face in the beginning. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “realizing his beginning [genesis] face” or “studying the face he was born with.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: You perceive how God sees you in the mirror of the Word
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For the believer, seeing the man “in the mirror” is seeing how God sees us from the beginning, even before the fall of Adam which resulted in sin’s devastation to human hearts. The man in the mirror is the new creation man.
      marker-yv: yv-n
    - type: text
      text: 'but then you go out and forget '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “drift away from.”
      marker-yv: yv-n
    - type: text
      text: 'your divine origin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But those who set their gaze deeply into the perfecting law of liberty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is referred to as the “royal law of love” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and the “law of liberty” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: are fascinated by and respond to the truth they hear and are strengthened by it—they experience God’s blessing in all that they do!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: If someone believes they have a relationship with God but fails to guard his words then his heart is drifting away and his religion is shallow and empty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “If one presumes to be religious but doesn’t guard his tongue, he deceives himself and his religion is useless.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'True spirituality '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “True ministry.”
      marker-yv: yv-n
    - type: text
      text: 'that is pure in the eyes of our Father God is to make a difference in the lives of the orphans, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orhpanos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the fatherless” or “the comfortless.”
      marker-yv: yv-n
    - type: text
      text: and widows in their troubles, and to refuse to be corrupted by the world’s values.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For you know that when your faith is tested '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “when faith passes the test.”
      marker-yv: yv-n
    - type: text
      text: 'it stirs up in you the power of endurance. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And then as your endurance grows even stronger, it will release perfection into every part of your being until there is nothing missing and nothing lacking.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And if anyone longs to be wise, ask God for wisdom and he will give it! He won’t see your lack of wisdom as an opportunity to scold you over your failures but he will overwhelm your failures with his generous grace. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with an open hand.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Just make sure you ask empowered by confident faith without doubting that you will receive. For the ambivalent person believes one minute and doubts the next. Being undecided makes you become like the rough seas driven and tossed by the wind. You’re up one minute and tossed down the next. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'When you are half-hearted and wavering it leaves you unstable. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “restless” or “disengaged.”
      marker-yv: yv-n
    - type: text
      text: Can you really expect to receive anything from the Lord when you’re in that condition?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The believer who is poor still has reasons to boast, for he has been placed on high. '
