        - type: text
          text: 'There are three persons mentioned in this verse: “my messenger . . . the Lord . . . the messenger of the covenant.” John the Baptist is the one mentioned first (“my messenger”; see preceding footnote). It is likely that “the Lord” and “the messenger of the covenant” are the same person. The chiastic structure likewise strengthens the view that they are identical. This then leaves us with: “Behold! I ['
