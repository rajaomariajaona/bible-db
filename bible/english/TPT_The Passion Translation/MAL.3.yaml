  '5':
  - type: text
    content: '“So I will come near to you and put you on trial. I will be quick to testify against sorcerers, adulterers, and those who lie under oath, against those who cheat workers of their wages, who oppress the widows and orphans and ignore the immigrants '
  - type: note
    content: Or “turn away the foreigners.”
  - type: text
    content: 'but who do not live in awe of me. This is '
  - type: text
    content: Yahweh
  - type: text
