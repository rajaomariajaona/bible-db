verses:
  '1':
  - type: heading
    content: The Messenger of Yahweh
  - type: text
    content: '“Behold! I am sending my messenger, who will prepare the way before me. '
  - type: note
    content: The Hebrew word for “my messenger” is malʾaki, which is the prophet’s name, Malachi. This messenger is identified as Elijah in 4:5, and the prophecy was fulfilled in the person of John the Baptist. See Isa. 40:3; 57:14; 62:10; Matt. 11:10; Mark 1:2; Luke 7:27.
  - type: text
    content: 'Then suddenly, the Lord whom you long for will enter his temple. The messenger of the covenant, '
  - type: note
    content: 'There are three persons mentioned in this verse: “my messenger . . . the Lord . . . the messenger of the covenant.” John the Baptist is the one mentioned first (“my messenger”; see preceding footnote). It is likely that “the Lord” and “the messenger of the covenant” are the same person. The chiastic structure likewise strengthens the view that they are identical. This then leaves us with: “Behold! I [Yahweh] am sending my messenger [John the Baptist], who [John] will prepare the way before me. Then suddenly, the Lord [Jesus] whom you long for will enter his temple [both the temple in Jerusalem and the temple of the body of Christ]. The messenger of the covenant [Jesus], your soul’s delight, will certainly come.” Chapter 3 of Malachi opens with one of the greatest prophecies of hope in all the Old Testament. The Lord, the messenger of the covenant, is coming to purify hearts and to establish a new covenant. This is the only place in the Bible that the phrase messenger of the covenant is found. It probably means “the one who brings a message about the covenant” or “the messenger whom the covenant speaks about.” See Deut. 18:15, 18.'
  - type: text
    content: 'your soul’s delight, will certainly come,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  '10':
  - type: text
    content: 'Bring the full amount of your tithes into the '
