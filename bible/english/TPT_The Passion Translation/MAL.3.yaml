  '2':
  - type: text
    content: 'But who can endure the day of his coming? '
  - type: note
    content: Although the Hebrew word boʾ is usually translated “coming,” it can also mean “to fall upon” or even “to attack.” Who can abide the day of his falling upon us?
  - type: text
    content: 'Who will not fall down in worship when the Lord is unveiled? '
  - type: note
    content: Or “who will remain standing when he is unveiled.” See Judg. 13:20; 1 Kings 18:39; Ezek. 1:28; Dan. 10:9; Luke 5:8; Phil. 2:10; Rev. 1:17; 22:8.
  - type: text
    content: For he will carry out a purifying process.
  - type: text
    content: ' He will be like a refiner’s fire or a launderer’s bleach. '
  - type: note
    content: This purifying process is described by means of two similes, likening the messenger to a refiner’s fire and a launderer’s bleach. The image of a refiner’s fire is taken from the process of the melting and heating of metal in a furnace to purify or refine it. As the metal is melted, the impurities either burn away or come to the surface, where they can be skimmed off (see Ps. 66:10; Isa. 1:25; 48:10; Ezek. 22:17–22; Zech. 13:9). The second image compares the messenger with launderer’s bleach. The Hebrew word borit refers to a powerful chemical agent with a strong cleansing effect that is similar to lye. It is thus best described not as soap but rather as a much harsher cleanser, such as bleach or lye. There is a deliberate wordplay with the word for “covenant” (Hb. berit) and the word for “launderer’s bleach” (Hb. borit) that is lost in translation. This borit is an alkaline liquid containing potassium hydroxide that was gathered by percolating water through wood ash. Washing cloth in this cleaner was an effective way of removing greasy and oily stains. Jesus has come to set this purifying fire in our hearts and to cleanse us of the deepest stain of sin and shame.
