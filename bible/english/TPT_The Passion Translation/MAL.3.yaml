  - type: note
    content: Or “the storehouse,” a reference to a certain part of the temple area. See 1 Kings 7:51; 2 Chron. 31:11; Neh. 10:38–39; 13:4–12.
  - type: text
    content: 'so that there may be ample provisions in my house. Test me and see if I, '
  - type: text
