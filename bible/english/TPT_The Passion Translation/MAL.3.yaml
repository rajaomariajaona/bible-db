  '6':
  - type: text
    content: 'Truly, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have not changed. And you, children of Jacob, you haven’t changed either.”'
  - type: note
    content: 'This final clause is based on variant readings found in the Septuagint and the Peshitta (Syriac) traditions of the Old Testament: “And you, children of Jacob, have not changed either.” There is more than a hint of sarcasm here, for God was saying that his people hadn’t changed a bit. True to the character of Jacob, who cheated (robbed) his brother, the people’s hearts remained unchanged over the years, and they were cheating (robbing) God like Jacob did to Esau. The Masoretic Text reads “have not ceased to be [destroyed].”'
  - type: heading
    content: A Call to Repentance
  '7':
  - type: text
    content: '“Ever since the time of your ancestors, you have turned away from my laws and evaded them. Return to me, and I will return to you,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: “But you ask, ‘How do we need to return?’
  '8':
  - type: text
    content: “Is it right for people to rob God? Yet you rob me.
  - type: note
    content: The Septuagint is perhaps based on a slightly different Hebrew order of consonants for the word rob. The triliteral root, ʿqb, has the same three consonants but in a different order. The meaning of this root is “to deceive,” and it is the root from which the name Jacob (Hb. yaʿaqob) is formed. If this theory is true, this is a clever pun on the name of Jacob.
  - type: text
    content: '“But you ask, ‘How could we '
  - type: text
    content: possibly
  - type: text
    content: ' rob you?’'
  - type: text
    content: '“You withhold your tithes and offerings. '
