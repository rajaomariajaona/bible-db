  - type: text
    content: ', Commander of Angel Armies, will fling open the floodgates of heaven for you and pour down upon you an overflowing blessing that you will not be able to contain. '
  '11':
  - type: text
    content: 'I will defeat the devourer '
  - type: note
    content: As with many portions of Scripture, this verse has multiple meanings. The “devourer” was the term used for the massive swarms of locusts that would devour the crops. Yet the devourer could also be a term for the devil, who seeks to devour believers (see 1 Peter 5:8) and to destroy our spiritual harvest.
  - type: text
