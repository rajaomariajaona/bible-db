          text: 'This final clause is based on variant readings found in the Septuagint and the Peshitta (Syriac) traditions of the Old Testament: “And you, children of Jacob, have not changed either.” There is more than a hint of sarcasm here, for God was saying that his people hadn’t changed a bit. True to the character of Jacob, who cheated (robbed) his brother, the people’s hearts remained unchanged over the years, and they were cheating (robbing) God like Jacob did to Esau. The Masoretic Text reads “have not ceased to be [destroyed].”'
