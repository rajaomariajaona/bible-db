document_id: PRO.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prologue
  - type: text
    content: Here are kingdom revelations, words to live by,
  - type: text
    content: and words of wisdom given to empower you to reign in life,
  - type: note
    content: As stated in the introduction, the Hebrew word for “proverbs” means more than just a wise saying. It can also mean “to rule, to reign in power, to take dominion.”
  - type: text
    content: 'written as proverbs by Israel’s King Solomon, '
  - type: note
    content: The name Solomon means “peaceable.” There is a greater one than Solomon who gives peace to all of his followers. His name is Jesus. Solomon was the seed of David; we are the seed of Jesus Christ. Solomon had an encounter with God after asking for a discerning heart (1 Kings 3:5–14). This pleased God, so he gave Solomon wisdom, riches, and power. God is ready to impart these same things today to those who ask him. See James 1:5–8.
  - type: text
    content: David’s son.
  '10':
  - type: text
    content: When peer pressure compels you to go with the crowd
  - type: text
    content: and sinners invite you to join in,
  - type: text
    content: you must simply say, “No!”
  '11':
  - type: text
    content: When the gang says—
  - type: text
    content: “We’re going to steal and kill and get away with it.
  '12':
  - type: text
    content: We’ll take down the rich and rob them.
  - type: text
    content: We’ll swallow them up alive
  - type: text
    content: and take what we want from whomever we want.
  '13':
  - type: text
    content: Then we’ll take their treasures and fill our homes with loot.
  '14':
  - type: text
    content: So come on and join us.
  - type: text
    content: Take your chance with us.
  - type: text
    content: We’ll divide up all we get;
  - type: text
    content: we’ll each end up with big bags of cash!”—
  '15':
  - type: text
    content: my son, refuse to go with them and stay far away from them.
  '16':
  - type: text
    content: For crime is their way of life and bloodshed their specialty.
  '17':
  - type: text
    content: To be aware of their snare is the best way of escape.
  '18':
  - type: text
    content: They’ll resort to murder to steal their victim’s assets,
  - type: text
    content: but eventually it will be their own lives that are ambushed.
  '19':
  - type: text
    content: In their ungodly disrespect for God
  - type: text
    content: they bring destruction on their own lives.
  - type: heading
    content: Wisdom’s Warning
  '2':
  - type: text
    content: Within these sayings will be found the revelation of wisdom
  - type: note
    content: There are six Hebrew words translated “wisdom” in the book of Proverbs. Some of them require an entire phrase in English to convey the meaning. The word used here is chokmah, and it is used in Proverbs forty-two times. Forty-two is the number of months Jesus ministered and the number of generations from Abraham to Christ listed in Matt. 1.
  - type: text
    content: and the impartation of spiritual understanding.
  - type: text
    content: Use them as keys to unlock the treasures of true knowledge.
  '20':
  - type: text
    content: Wisdom’s praises are sung in the streets
  - type: text
    content: and celebrated far and wide.
  '21':
  - type: text
    content: Yet wisdom’s song is not always heard in the halls of higher learning.
  - type: text
    content: But in the hustle and bustle of everyday life
  - type: text
    content: its lyrics can always be heard above the din of the crowd.
  - type: note
    content: Literally translated, this verse reads “Wisdom sings out in the streets and speaks her voice in the squares, crying out at the head of noisy crowds and at the entrance of the city gates.” This is a parabolic statement of wisdom being heard everywhere and in every place.
  - type: text
    content: You will hear wisdom’s warning as she preaches courageously
  - type: text
    content: 'to those who stop to listen:'
  '22':
  - type: text
    content: “Foolish ones, how much longer will you cling to your deception?
  - type: note
    content: Or “Childish ones, how long will you love your childishness?”
  - type: text
    content: How much longer will you mock wisdom,
  - type: text
    content: you cynical scorners who fight the facts?
  '23':
  - type: text
    content: Come back to your senses and be restored to reality.
  - type: text
    content: Don’t even think about refusing my rebuke!
  - type: text
    content: Don’t you know that I’m ready
  - type: text
    content: to pour out my spirit of wisdom upon you
  - type: text
    content: and bring to you the revelation of my words
  - type: text
    content: that will make your heart wise?
  '24':
  - type: text
    content: I’ve called to you over and over;
  - type: text
    content: still you refuse to come to me.
  - type: text
    content: I’ve pleaded with you again and again,
  - type: text
    content: yet you’ve turned a deaf ear to my voice.
  '25':
  - type: text
    content: Because you have laughed at my counsel
  - type: text
    content: and have insisted on continuing in your stubbornness,
  '26':
  - type: text
    content: I will laugh when your calamity comes
  - type: text
    content: and will turn away from you at the time of your disaster.
  - type: text
    content: Make a joke of my advice, will you?
  - type: text
    content: Then I’ll make a joke out of you!
  '27':
  - type: text
    content: When the storm clouds of terror gather over your head,
  - type: text
    content: when dread and distress consume you
  - type: text
    content: and your catastrophe comes like a hurricane,
  '28':
  - type: text
    content: you will cry out to me, but I won’t answer.
  - type: text
    content: Then it will be too late to expect my help.
  - type: text
    content: When desperation drives you to search for me,
  - type: text
    content: I will be nowhere to be found.
  '29':
  - type: text
    content: Because you have turned up your nose at me
  - type: text
    content: and closed your eyes to the facts
  - type: text
    content: 'and refused to worship me in awe '
  - type: note
    content: The Hebrew word used here can be translated “fear,” “dread,” “awe,” or “worship.” Nearly every translation uses the word fear or reverence while ignoring the other aspects of the Aramaic word dekhlatha. The New Testament is clear that there is no fear in love. See 1 John 4:18.
  - type: text
    content: —
  '3':
  - type: text
    content: Those who cling to these words will receive discipline
  - type: text
    content: 'to demonstrate wisdom '
  - type: note
    content: The Hebrew word translated “wisdom” here also means “righteousness.”
  - type: text
    content: in every relationship
  - type: text
    content: and to choose what is right and just and fair.
  '30':
  - type: text
    content: because you scoffed at my wise counsel
  - type: text
    content: and laughed at my correction—
  '31':
  - type: text
    content: now you will eat the bitter fruit of your own ways.
  - type: text
    content: You’ve made your own bed; now lie in it!
  - type: text
    content: So how do you like that?
  '32':
  - type: text
    content: Like an idiot you’ve turned away from me
  - type: text
    content: and chosen destruction instead.
  - type: text
    content: 'Your self-satisfied smugness '
  - type: note
    content: Or “your abundant prosperity.”
  - type: text
    content: will kill you.
  '33':
  - type: text
    content: But the one who always listens to me
  - type: text
    content: will live undisturbed in a heavenly peace.
  - type: text
    content: Free from fear, confident and courageous,
  - type: text
    content: that one will rest unafraid and sheltered from the storms of life.”
  '4':
  - type: text
    content: These proverbs will give you great skill
  - type: text
    content: to teach the immature and make them wise,
  - type: text
    content: to give youth the understanding of their design and destiny.
  '5':
  - type: text
    content: For the wise, these proverbs will make you even wiser,
  - type: text
    content: and for those with discernment,
  - type: text
    content: you will be able to acquire brilliant strategies for leadership.
  '6':
  - type: text
    content: These kingdom revelations will break open your understanding
  - type: text
    content: to unveil the deeper meaning of parables,
  - type: text
    content: poetic riddles, and epigrams,
  - type: text
    content: and to unravel the words and enigmas of the wise.
  '7':
  - type: text
    content: We cross the threshold of true knowledge
  - type: text
    content: when we live in obedient devotion to God.
  - type: note
    content: Many translations render this “the fear of the Lord.” This means much more than the English concept of fear. It also implies submission, awe, worship, and reverence. The Hebrew word used here is found fourteen times in Proverbs. The number fourteen represents spiritual perfection. The number fourteen is mentioned three times in the genealogy of Jesus (Matt. 1:1–17). It is also the number for Passover. You will pass from darkness to wisdom’s light by the “fear” of the Lord.
  - type: text
    content: 'Stubborn know-it-alls '
  - type: note
    content: Or “foolish ones.” There are three Hebrew words translated “fool” in Proverbs and another six that are related to a fool or foolish acts. A fool is described in Proverbs as one who hates true wisdom and correction, with no desire to acquire revelation knowledge.
  - type: text
    content: will never stop to do this,
  - type: text
    content: for they scorn true wisdom and knowledge.
  - type: heading
    content: The Wisdom of a Father
  '8':
  - type: text
    content: Pay close attention, my child, to your father’s wise words
  - type: text
    content: and never forget your mother’s instructions.
  - type: note
    content: Many expositors see this verse as the words of David to Solomon, yet we all must give heed to this command. The words of our Father (God) and our mother (the church, the freewoman) will bring us wisdom. See Gal. 4:21–31.
  '9':
  - type: text
    content: For their insight will bring you success,
  - type: text
    content: adorning you with grace-filled thoughts
  - type: text
    content: and giving you reins to guide your decisions.
  - type: note
    content: The Hebrew text here is literally translated “adornment for your head, chains for your neck.” The head is a metaphor for our thoughts, the neck a symbol for willing obedience that guides our decisions, in contrast to being stiff-necked or proud. See Phil. 2:5–7.
