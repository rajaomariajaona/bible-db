document_id: PRO.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prologue
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here are kingdom revelations, words to live by,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and words of wisdom given to empower you to reign in life,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As stated in the introduction, the Hebrew word for “proverbs” means more than just a wise saying. It can also mean “to rule, to reign in power, to take dominion.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'written as proverbs by Israel’s King Solomon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Solomon means “peaceable.” There is a greater one than Solomon who gives peace to all of his followers. His name is Jesus. Solomon was the seed of David; we are the seed of Jesus Christ. Solomon had an encounter with God after asking for a discerning heart (
      - type: text
        text: 1 Kings 3:5–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This pleased God, so he gave Solomon wisdom, riches, and power. God is ready to impart these same things today to those who ask him. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 1:5–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: David’s son.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When peer pressure compels you to go with the crowd
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sinners invite you to join in,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you must simply say, “No!”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the gang says—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We’re going to steal and kill and get away with it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll take down the rich and rob them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll swallow them up alive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and take what we want from whomever we want.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we’ll take their treasures and fill our homes with loot.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So come on and join us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take your chance with us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll divide up all we get;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we’ll each end up with big bags of cash!”—
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my son, refuse to go with them and stay far away from them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For crime is their way of life and bloodshed their specialty.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To be aware of their snare is the best way of escape.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll resort to murder to steal their victim’s assets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but eventually it will be their own lives that are ambushed.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In their ungodly disrespect for God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they bring destruction on their own lives.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom’s Warning
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Within these sayings will be found the revelation of wisdom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are six Hebrew words translated “wisdom” in the book of Proverbs. Some of them require an entire phrase in English to convey the meaning. The word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chokmah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and it is used in Proverbs forty-two times. Forty-two is the number of months Jesus ministered and the number of generations from Abraham to Christ listed in'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the impartation of spiritual understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Use them as keys to unlock the treasures of true knowledge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom’s praises are sung in the streets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and celebrated far and wide.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet wisdom’s song is not always heard in the halls of higher learning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the hustle and bustle of everyday life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: its lyrics can always be heard above the din of the crowd.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally translated, this verse reads “Wisdom sings out in the streets and speaks her voice in the squares, crying out at the head of noisy crowds and at the entrance of the city gates.” This is a parabolic statement of wisdom being heard everywhere and in every place.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will hear wisdom’s warning as she preaches courageously
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to those who stop to listen:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Foolish ones, how much longer will you cling to your deception?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Childish ones, how long will you love your childishness?”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much longer will you mock wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you cynical scorners who fight the facts?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come back to your senses and be restored to reality.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t even think about refusing my rebuke!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you know that I’m ready
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to pour out my spirit of wisdom upon you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bring to you the revelation of my words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that will make your heart wise?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve called to you over and over;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: still you refuse to come to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve pleaded with you again and again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet you’ve turned a deaf ear to my voice.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have laughed at my counsel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and have insisted on continuing in your stubbornness,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will laugh when your calamity comes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will turn away from you at the time of your disaster.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make a joke of my advice, will you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll make a joke out of you!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the storm clouds of terror gather over your head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when dread and distress consume you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your catastrophe comes like a hurricane,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will cry out to me, but I won’t answer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then it will be too late to expect my help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When desperation drives you to search for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be nowhere to be found.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have turned up your nose at me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and closed your eyes to the facts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and refused to worship me in awe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here can be translated “fear,” “dread,” “awe,” or “worship.” Nearly every translation uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fear
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: reverence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: while ignoring the other aspects of the Aramaic word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dekhlatha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The New Testament is clear that there is no fear in love. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: —
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who cling to these words will receive discipline
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to demonstrate wisdom '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “wisdom” here also means “righteousness.”
      marker-yv: yv-n
    - type: text
      text: in every relationship
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to choose what is right and just and fair.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because you scoffed at my wise counsel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and laughed at my correction—
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: now you will eat the bitter fruit of your own ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve made your own bed; now lie in it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how do you like that?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an idiot you’ve turned away from me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and chosen destruction instead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your self-satisfied smugness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your abundant prosperity.”
      marker-yv: yv-n
    - type: text
      text: will kill you.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the one who always listens to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will live undisturbed in a heavenly peace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Free from fear, confident and courageous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that one will rest unafraid and sheltered from the storms of life.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These proverbs will give you great skill
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to teach the immature and make them wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to give youth the understanding of their design and destiny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wise, these proverbs will make you even wiser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for those with discernment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be able to acquire brilliant strategies for leadership.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These kingdom revelations will break open your understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to unveil the deeper meaning of parables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poetic riddles, and epigrams,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to unravel the words and enigmas of the wise.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We cross the threshold of true knowledge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when we live in obedient devotion to God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many translations render this “the fear of the Lord.” This means much more than the English concept of fear. It also implies submission, awe, worship, and reverence. The Hebrew word used here is found fourteen times in Proverbs. The number fourteen represents spiritual perfection. The number fourteen is mentioned three times in the genealogy of Jesus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:1–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It is also the number for Passover. You will pass from darkness to wisdom’s light by the “fear” of the Lord.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Stubborn know-it-alls '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “foolish ones.” There are three Hebrew words translated “fool” in Proverbs and another six that are related to a fool or foolish acts. A fool is described in Proverbs as one who hates true wisdom and correction, with no desire to acquire revelation knowledge.
      marker-yv: yv-n
    - type: text
      text: will never stop to do this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they scorn true wisdom and knowledge.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wisdom of a Father
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay close attention, my child, to your father’s wise words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and never forget your mother’s instructions.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many expositors see this verse as the words of David to Solomon, yet we all must give heed to this command. The words of our Father (God) and our mother (the church, the freewoman) will bring us wisdom. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:21–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their insight will bring you success,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: adorning you with grace-filled thoughts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and giving you reins to guide your decisions.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text here is literally translated “adornment for your head, chains for your neck.” The head is a metaphor for our thoughts, the neck a symbol for willing obedience that guides our decisions, in contrast to being stiff-necked or proud. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:5–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
