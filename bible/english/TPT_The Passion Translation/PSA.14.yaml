    - type: text
      text: A Psalm of David
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only the withering soul '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fool.” The word for “fool” comes from a Hebrew word meaning “withering.” If we make no room for God, we have withered hearts, our moral sense of righteousness is put to sleep, and the noble aspirations of the heart shrivel up and die.
      marker-yv: yv-n
    - type: text
      text: would say to himself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone who thinks like this is corrupt and callous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devoid of what is good.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' looks down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in love
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: looking over all of Adam’s sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s looking to see if there is anyone who acts wisely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any who are searching for God and wanting to please him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: None Who Are Good
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But everyone has wandered astray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: walking stubbornly toward evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one is good; he can’t even find one.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They live in luxury while exploiting my people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t these workers of wickedness ever learn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They don’t ever think of praying to God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Overwhelmed with Dread
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But look at them now, in panic, trembling with terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For God is on the side of his godly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lovers
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is always the safest place for the poor'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the workers of wickedness oppress them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Overcome with Joy
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How I wish that Israel’s rescue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would arise from the midst of Zion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' restores his people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob’s joy will break forth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Israel will be glad!
