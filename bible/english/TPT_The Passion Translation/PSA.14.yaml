document_id: PSA.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Looks Down from Heaven With a few differences, Ps. 14 and Ps. 53 are nearly identical. Ps. 14 is practical; Ps. 53 is prophetic. Ps. 14 deals with the past, Ps. 53 with the future.
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A Psalm of David
  - type: heading
    content: No God
  - type: text
    content: 'Only the withering soul '
  - type: note
    content: Or “fool.” The word for “fool” comes from a Hebrew word meaning “withering.” If we make no room for God, we have withered hearts, our moral sense of righteousness is put to sleep, and the noble aspirations of the heart shrivel up and die.
  - type: text
    content: would say to himself,
  - type: text
    content: “There is no God.”
  - type: text
    content: Anyone who thinks like this is corrupt and callous,
  - type: text
    content: devoid of what is good.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' looks down '
  - type: text
    content: in love
  - type: text
    content: ','
  - type: text
    content: looking over all of Adam’s sons and daughters.
  - type: text
    content: He’s looking to see if there is anyone who acts wisely,
  - type: text
    content: any who are searching for God and wanting to please him.
  - type: heading
    content: None Who Are Good
  '3':
  - type: text
    content: But everyone has wandered astray,
  - type: text
    content: walking stubbornly toward evil.
  - type: text
    content: Not one is good; he can’t even find one.
  '4':
  - type: text
    content: They live in luxury while exploiting my people!
  - type: text
    content: Won’t these workers of wickedness ever learn?
  - type: text
    content: They don’t ever think of praying to God.
  - type: heading
    content: Overwhelmed with Dread
  '5':
  - type: text
    content: But look at them now, in panic, trembling with terror.
  - type: text
    content: 'For God is on the side of his godly '
  - type: text
    content: lovers
  - type: text
    content: .
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ' is always the safest place for the poor'
  - type: text
    content: when the workers of wickedness oppress them.
  - type: heading
    content: Overcome with Joy
  '7':
  - type: text
    content: How I wish that Israel’s rescue
  - type: text
    content: would arise from the midst of Zion!
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' restores his people,'
  - type: text
    content: Jacob’s joy will break forth
  - type: text
    content: and Israel will be glad!
