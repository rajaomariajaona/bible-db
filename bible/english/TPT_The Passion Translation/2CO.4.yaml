document_id: 2CO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: New Covenant Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, it’s because of God’s mercy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “God has mercied us.” The Aramaic can be translated “God’s mercy rests on us.”
    marker-yv: yv-n
  - type: text
    text: 'that we have been entrusted with the privilege of this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: new covenant
  - type: text
    text: ' ministry. And we will not quit or faint with weariness. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'We reject every shameful cover-up and refuse to resort to cunning trickery or distorting the Word of God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “handle the word of God dishonestly.”
    marker-yv: yv-n
  - type: text
    text: 'Instead, we open up our souls to you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “we commend ourselves.”
    marker-yv: yv-n
  - type: text
    text: 'by presenting the truth to everyone’s conscience in the sight and presence of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Even if our gospel message is veiled, it is only veiled to those who are perishing, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for their minds have been blinded by the god of this age, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Satan is called the god of this age. He uses trickery, deceit, accusation, and slander to blind people’s hearts. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 8:44
      metadata:
        usfm: JHN.8.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:31
      metadata:
        usfm: JHN.12.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:30
      metadata:
        usfm: JHN.14.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:2
      metadata:
        usfm: EPH.2.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'leaving them in unbelief. Their blindness keeps them from seeing the dayspring light '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the flame of the good news.”
    marker-yv: yv-n
  - type: text
    text: 'of the gospel of the glory of Christ, who is the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divine
  - type: text
    text: ' image of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We don’t preach ourselves, but rather the lordship of Jesus Christ, for we are your servants for Jesus’ sake. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For God, who said,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Let brilliant light shine out of darkness,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul helps us to understand that “light” is both literal and a metaphor for spiritual revelation, and shows that the creation narrative provides us with an allegory pointing to the experience of new birth in Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 1:3
      metadata:
        usfm: GEN.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 9:2
      metadata:
        usfm: ISA.9.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: is the one who has cascaded his light into us—the brilliant dawning light of the glorious knowledge of God as we gaze into the face of Jesus Christ.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the face-to-face presence of Christ.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Treasure in Clay Jars
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'We are like common clay jars that carry this glorious treasure within, so that this immeasurable power will be seen as God’s, not ours. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse begins a long and complicated Greek sentence that ends with v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: 2CO.4.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Paul uses figurative language to say that we are common clay jars (created from dust/clay) yet we possess the brilliant light of God’s glory, Jesus Christ, and carry him as treasure in our being. The outward vessel is not as important as the glorious treasure within. The metaphors here may allude to Gideon’s clay pots that had burning torches inside (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 7:16
      metadata:
        usfm: JDG.7.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Though we experience every kind of pressure, we’re not crushed. At times we don’t know what to do, but quitting is not an option. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “perplexed but not thoroughly perplexed.” The Aramaic can be translated “We are corrected but not condemned.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We are persecuted by others, but God has not forsaken us. We may be knocked down, but not out. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We continually share in the death of Jesus in our own bodies '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “carry about in the body the death of Jesus.”
    marker-yv: yv-n
  - type: text
    text: 'so that the resurrection life of Jesus will be revealed through our humanity. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We consider living to mean that we are constantly being handed over to death for Jesus’ sake so that the life of Jesus will be revealed through our humanity. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So, then, death is at work in us but it releases life in you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: We have the same Spirit of faith that is described in the Scriptures when it says,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “First I believed, then I spoke in faith.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 116:10
      metadata:
        usfm: PSA.116.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So we also first believe then speak in faith. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'We do this because we are convinced that he who raised Jesus will raise us up with him, and together we will all be brought into his presence. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yes, all things work for your enrichment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:28
      metadata:
        usfm: ROM.8.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'so that more of God’s marvelous grace will spread to more and more people, resulting in an even greater increase of praise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to cause thanksgiving to superabound.”
    marker-yv: yv-n
  - type: text
    text: to God, bringing him even more glory!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So no wonder we don’t give up. For even though our outer person gradually wears out, our inner being is renewed every single day. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'We view our slight, short-lived troubles in the light of eternity. We see our difficulties as the substance that produces for us an eternal, weighty glory far beyond all comparison, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: because we don’t focus our attention on what is seen but on what is unseen. For what is seen is temporary, but the unseen realm is eternal.
