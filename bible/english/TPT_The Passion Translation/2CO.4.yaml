document_id: 2CO.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: New Covenant Ministry
  - type: text
    content: 'Now, it’s because of God’s mercy '
  - type: note
    content: Or “God has mercied us.” The Aramaic can be translated “God’s mercy rests on us.”
  - type: text
    content: 'that we have been entrusted with the privilege of this '
  - type: text
    content: new covenant
  - type: text
    content: ' ministry. And we will not quit or faint with weariness. '
  '10':
  - type: text
    content: 'We continually share in the death of Jesus in our own bodies '
  - type: note
    content: Or “carry about in the body the death of Jesus.”
  - type: text
    content: 'so that the resurrection life of Jesus will be revealed through our humanity. '
  '11':
  - type: text
    content: 'We consider living to mean that we are constantly being handed over to death for Jesus’ sake so that the life of Jesus will be revealed through our humanity. '
  '12':
  - type: text
    content: So, then, death is at work in us but it releases life in you.
  '13':
  - type: text
    content: We have the same Spirit of faith that is described in the Scriptures when it says,
  - type: text
    content: “First I believed, then I spoke in faith.”
  - type: note
    content: See Ps. 116:10.
  - type: text
    content: 'So we also first believe then speak in faith. '
  '14':
  - type: text
    content: 'We do this because we are convinced that he who raised Jesus will raise us up with him, and together we will all be brought into his presence. '
  '15':
  - type: text
    content: 'Yes, all things work for your enrichment '
  - type: note
    content: See Rom. 8:28.
  - type: text
    content: 'so that more of God’s marvelous grace will spread to more and more people, resulting in an even greater increase of praise '
  - type: note
    content: Or “to cause thanksgiving to superabound.”
  - type: text
    content: to God, bringing him even more glory!
  '16':
  - type: text
    content: 'So no wonder we don’t give up. For even though our outer person gradually wears out, our inner being is renewed every single day. '
  '17':
  - type: text
    content: 'We view our slight, short-lived troubles in the light of eternity. We see our difficulties as the substance that produces for us an eternal, weighty glory far beyond all comparison, '
  '18':
  - type: text
    content: because we don’t focus our attention on what is seen but on what is unseen. For what is seen is temporary, but the unseen realm is eternal.
  '2':
  - type: text
    content: 'We reject every shameful cover-up and refuse to resort to cunning trickery or distorting the Word of God. '
  - type: note
    content: Or “handle the word of God dishonestly.”
  - type: text
    content: 'Instead, we open up our souls to you '
  - type: note
    content: As translated from the Aramaic. The Greek is “we commend ourselves.”
  - type: text
    content: 'by presenting the truth to everyone’s conscience in the sight and presence of God. '
  '3':
  - type: text
    content: 'Even if our gospel message is veiled, it is only veiled to those who are perishing, '
  '4':
  - type: text
    content: 'for their minds have been blinded by the god of this age, '
  - type: note
    content: Satan is called the god of this age. He uses trickery, deceit, accusation, and slander to blind people’s hearts. See John 8:44; 12:31; 14:30; Eph. 2:2.
  - type: text
    content: 'leaving them in unbelief. Their blindness keeps them from seeing the dayspring light '
  - type: note
    content: The Aramaic can be translated “the flame of the good news.”
  - type: text
    content: 'of the gospel of the glory of Christ, who is the '
  - type: text
    content: divine
  - type: text
    content: ' image of God.'
  '5':
  - type: text
    content: 'We don’t preach ourselves, but rather the lordship of Jesus Christ, for we are your servants for Jesus’ sake. '
  '6':
  - type: text
    content: For God, who said,
  - type: text
    content: “Let brilliant light shine out of darkness,”
  - type: note
    content: Paul helps us to understand that “light” is both literal and a metaphor for spiritual revelation, and shows that the creation narrative provides us with an allegory pointing to the experience of new birth in Christ. See Gen. 1:3; Isa. 9:2.
  - type: text
    content: is the one who has cascaded his light into us—the brilliant dawning light of the glorious knowledge of God as we gaze into the face of Jesus Christ.
  - type: note
    content: Or “in the face-to-face presence of Christ.”
  - type: heading
    content: Treasure in Clay Jars
  '7':
  - type: text
    content: 'We are like common clay jars that carry this glorious treasure within, so that this immeasurable power will be seen as God’s, not ours. '
  - type: note
    content: This verse begins a long and complicated Greek sentence that ends with v. 10. Paul uses figurative language to say that we are common clay jars (created from dust/clay) yet we possess the brilliant light of God’s glory, Jesus Christ, and carry him as treasure in our being. The outward vessel is not as important as the glorious treasure within. The metaphors here may allude to Gideon’s clay pots that had burning torches inside (Judg. 7:16).
  '8':
  - type: text
    content: 'Though we experience every kind of pressure, we’re not crushed. At times we don’t know what to do, but quitting is not an option. '
  - type: note
    content: Or “perplexed but not thoroughly perplexed.” The Aramaic can be translated “We are corrected but not condemned.”
  '9':
  - type: text
    content: 'We are persecuted by others, but God has not forsaken us. We may be knocked down, but not out. '
