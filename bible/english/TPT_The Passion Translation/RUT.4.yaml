    marker-yv: yv-n
  - type: text
    text: 'Therefore, it will be your responsibility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to father a child
  - type: text
    text: ' in order to maintain the dead man’s name on his inheritance.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: At this, the kinsman-redeemer balked and said, “In that case, I’m not able to redeem it for myself without risking my own inheritance. Take my purchase option of redemption yourself, for I can’t do it.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The summary statement of the law is “I can’t do it.” Grace, not law-keeping, is our only hope of salvation (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:7–8
      metadata:
        usfm: EPH.2.7+EPH.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Titus 3:5
      metadata:
        usfm: TIT.3.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This man desired to preserve his name in Israel by not marrying the Moabite woman. However, his name has been lost. Boaz, on the other hand, not only preserved his name in this story that is read every year in the Jewish celebrations, but he also had his name inscribed upon the pillar in the temple of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: built by Solomon. It is not in seeking to preserve our own name but seeking
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s faithfulness that we receive an eternal name and are placed as pillars in the temple of our God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '(At that time in Israel, in order to finalize a transaction concerning redeeming and transferring property, a man would customarily remove a sandal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The sandal symbolized the man’s property rights. To give up the sandal meant he would no longer walk on that property and claim it as his; he had transferred the rights to another. This custom had become obsolete by the time of writing, which shows that the book of Ruth was written well after the events of Ruth had transpired.
    marker-yv: yv-n
  - type: text
    text: 'and give it to the other party, making the contract legally binding.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So when the kinsman-redeemer said to Boaz, “Take my purchase option of redemption for yourself,” he took off his sandal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and gave it to Boaz
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus received the rights (the sandal) to supersede the law and obtained the promise of a more excellent ministry than the law (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 8:1–6
      metadata:
        usfm: HEB.8.1+HEB.8.2+HEB.8.3+HEB.8.4+HEB.8.5+HEB.8.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). We are his “seed” and joint heirs of his ministry.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Boaz turned to the elders and announced publicly, “Today, you are witnesses that I have purchased from the hand of Naomi all that belonged to Elimelech and all that belonged to Chilion and Mahlon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have also acquired Ruth the Moabite, Mahlon’s widow, to be my wife. I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will raise children with her
  - type: text
    text: ' who will maintain the dead man’s name on his inheritance so that the name of the dead may not be cut off from his village and from his family line. Today, you are witnesses of this transaction.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then all the elders and all the people who were at the gate said: “We are witnesses. May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' make the woman who is coming into your house like Rachel and Leah, both of whom built up the house of Israel. May you become famous in Bethlehem! May you become very prosperous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' give you children by this young woman, and through them, may your family be like the family of Perez, whom Tamar bore to Judah!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The people of Bethlehem were recalling the story of Judah’s sinning sons who did not have sons of their own through disobedience in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 38
      metadata:
        usfm: GEN.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Judah himself sinfully slept with his Canaanite daughter-in-law (thinking she was a prostitute). But what was sinful,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: turned to goodness through redemption.
    marker-yv: yv-n
- type: usfm
  marker: s1
