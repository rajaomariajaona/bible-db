  - type: text
    text: Boaz turned to the kinsman-redeemer and said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sir
  - type: text
    text: ', Naomi has returned from the country of Moab, and she’s selling the piece of property that belonged to our relative Elimelech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So I thought you ought to know about it. '
  - type: usfm
    marker: f
