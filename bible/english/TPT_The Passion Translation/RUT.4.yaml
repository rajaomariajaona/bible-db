document_id: RUT.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Boaz the Kinsman-Redeemer
  - type: text
    content: 'No sooner had Boaz gone up to the city gate and sat down '
  - type: note
    content: Jesus, our heavenly Boaz, went “up” in his ascension and “sat down” at the right hand of God in glory.
  - type: text
    content: 'when the kinsman-redeemer '
  - type: note
    content: This man was in the position to be a redeemer; however, in the context of the business at the gate, he had not yet exercised his right to redeem and thus had not yet become the kinsman-redeemer in fact. See vv. 3, 4, 6.
  - type: text
    content: 'of whom Boaz had spoken came passing by. Boaz called to him, “Come over here, friend; sit down with me. '
  - type: text
    content: We have some business to attend to
  - type: text
    content: .” So the man went over and sat down.
  '10':
  - type: text
    content: 'I have also acquired Ruth the Moabite, Mahlon’s widow, to be my wife. I '
  - type: text
    content: will raise children with her
  - type: text
    content: ' who will maintain the dead man’s name on his inheritance so that the name of the dead may not be cut off from his village and from his family line. Today, you are witnesses of this transaction.”'
  '11':
  - type: text
    content: 'Then all the elders and all the people who were at the gate said: “We are witnesses. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' make the woman who is coming into your house like Rachel and Leah, both of whom built up the house of Israel. May you become famous in Bethlehem! May you become very prosperous! '
  '12':
  - type: text
    content: 'And may '
  - type: text
    content: Yahweh
  - type: text
    content: ' give you children by this young woman, and through them, may your family be like the family of Perez, whom Tamar bore to Judah!”'
  - type: note
    content: The people of Bethlehem were recalling the story of Judah’s sinning sons who did not have sons of their own through disobedience in Gen. 38. Judah himself sinfully slept with his Canaanite daughter-in-law (thinking she was a prostitute). But what was sinful, Yahweh turned to goodness through redemption.
  - type: heading
    content: Boaz and Ruth Marry
  '13':
  - type: text
    content: 'So Boaz and Ruth married, and they became one as husband and wife. '
  - type: text
    content: Yahweh
  - type: text
    content: ' opened Ruth’s womb, and she bore a son. '
  '14':
  - type: text
    content: 'Then the women of Bethlehem blessed Naomi: “Praise '
  - type: text
    content: Yahweh
  - type: text
    content: ', who never abandoned you nor withheld from you a kinsman-redeemer! And may his name be famous in Israel! '
  - type: note
    content: Or “May his name be declared in Israel.”
  '15':
  - type: text
    content: May this child renew your life and sustain you in your old age! May your daughter-in-law, who loves you dearly, be more to you than seven sons could ever be, for she has given you a wonderful grandchild!”
  '16':
  - type: text
    content: 'Then Naomi took her grandson and cuddled him in her arms and cared for him '
  - type: note
    content: That is, Naomi became like a foster mother to Obed.
  - type: text
    content: 'as if he were her own. '
  '17':
  - type: text
    content: 'The women of the neighborhood gave him a name, saying, “At last, Naomi has a son!” They named him Obed, '
  - type: note
    content: The name Obed means “worshiper” or “servant [of Yahweh].” It is possibly a shortened form of Obadiah, which has the same meaning.
  - type: text
    content: and he became the father of Jesse, the father of David.
  - type: heading
    content: The Genealogy of David
  '18':
  - type: text
    content: 'Now these are the descendants of Perez:'
  - type: note
    content: See Matt. 1:2–6.
  - type: text
    content: Perez became the father of Hezron,
  '19':
  - type: text
    content: Hezron the father of Ram,
  - type: text
    content: Ram the father of Amminadab,
  '2':
  - type: text
    content: 'Then Boaz invited ten '
  - type: note
    content: The number ten is recognized biblically as the number of human responsibility (Ten Commandments). The law kept Ruth out (see Deut. 23:3). The law serves to add guilt to the human condition. Boaz prefigured Jesus, our gracious Kinsman-Redeemer, who has done for us what the law cannot (see John 1:17; Rom. 8:3–5; 2 Cor. 3:6).
  - type: text
    content: men of the city council and said, “
  - type: text
    content: Please
  - type: text
    content: ', sit down here with us.” After they were seated, '
  '20':
  - type: text
    content: Amminadab the father of Nahshon,
  - type: text
    content: Nahshon the father of Salmon,
  '21':
  - type: text
    content: Salmon the father of Boaz,
  - type: text
    content: Boaz the father of Obed,
  '22':
  - type: text
    content: Obed the father of Jesse,
  - type: text
    content: 'who had a '
  - type: text
    content: famous
  - type: text
    content: ' son, '
  - type: text
    content: King
  - type: text
    content: ' David.'
  - type: note
    content: The story of Ruth shows that the family of David was in reality from Bethlehem and that David’s great-grandmother was Ruth, a gentile from Moab.
  '3':
  - type: text
    content: Boaz turned to the kinsman-redeemer and said, “
  - type: text
    content: Sir
  - type: text
    content: ', Naomi has returned from the country of Moab, and she’s selling the piece of property that belonged to our relative Elimelech. '
  '4':
  - type: text
    content: 'So I thought you ought to know about it. '
  - type: note
    content: See Jer. 32:6–12.
  - type: text
    content: 'Buy it if you want. We can make it official in the presence of those here and in the presence of the elders of our people. As the kinsman-redeemer, you have the first right of refusal. Redeem it if you choose to, but if not, tell me so I will know, '
  - type: text
    content: as I am next in line
  - type: text
    content: .”
  - type: text
    content: The man replied, “I’ll redeem it.”
  '5':
  - type: text
    content: 'Then Boaz added, “The day you buy the field from the hand of Naomi, you also acquire Ruth the Moabite, '
  - type: note
    content: Boaz mentioned the land (field) before he mentioned Ruth (the treasure). Boaz was not afraid to pay the price to acquire both the field and the treasure. See Matt. 13:44.
  - type: text
    content: 'the widow of the dead. '
  - type: note
    content: The law is weak and sickly, like Ruth’s deceased husband, Mahlon (see 1:1–2; Rom. 7:1–4).
  - type: text
    content: 'Therefore, it will be your responsibility '
  - type: text
    content: to father a child
  - type: text
    content: ' in order to maintain the dead man’s name on his inheritance.”'
  '6':
  - type: text
    content: At this, the kinsman-redeemer balked and said, “In that case, I’m not able to redeem it for myself without risking my own inheritance. Take my purchase option of redemption yourself, for I can’t do it.”
  - type: note
    content: The summary statement of the law is “I can’t do it.” Grace, not law-keeping, is our only hope of salvation (see Eph. 2:7–8; Titus 3:5). This man desired to preserve his name in Israel by not marrying the Moabite woman. However, his name has been lost. Boaz, on the other hand, not only preserved his name in this story that is read every year in the Jewish celebrations, but he also had his name inscribed upon the pillar in the temple of Yahweh built by Solomon. It is not in seeking to preserve our own name but seeking Yahweh’s faithfulness that we receive an eternal name and are placed as pillars in the temple of our God.
  '7':
  - type: text
    content: '(At that time in Israel, in order to finalize a transaction concerning redeeming and transferring property, a man would customarily remove a sandal '
  - type: note
    content: The sandal symbolized the man’s property rights. To give up the sandal meant he would no longer walk on that property and claim it as his; he had transferred the rights to another. This custom had become obsolete by the time of writing, which shows that the book of Ruth was written well after the events of Ruth had transpired.
  - type: text
    content: 'and give it to the other party, making the contract legally binding.) '
  '8':
  - type: text
    content: 'So when the kinsman-redeemer said to Boaz, “Take my purchase option of redemption for yourself,” he took off his sandal '
  - type: text
    content: and gave it to Boaz
  - type: text
    content: '. '
  - type: note
    content: Jesus received the rights (the sandal) to supersede the law and obtained the promise of a more excellent ministry than the law (see Heb. 8:1–6). We are his “seed” and joint heirs of his ministry.
  '9':
  - type: text
    content: 'Then Boaz turned to the elders and announced publicly, “Today, you are witnesses that I have purchased from the hand of Naomi all that belonged to Elimelech and all that belonged to Chilion and Mahlon. '
