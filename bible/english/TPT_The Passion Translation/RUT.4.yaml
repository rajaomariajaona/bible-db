      metadata:
        usfm: JER.32.6+JER.32.7+JER.32.8+JER.32.9+JER.32.10+JER.32.11+JER.32.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Buy it if you want. We can make it official in the presence of those here and in the presence of the elders of our people. As the kinsman-redeemer, you have the first right of refusal. Redeem it if you choose to, but if not, tell me so I will know, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as I am next in line
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: text
    text: The man replied, “I’ll redeem it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Boaz added, “The day you buy the field from the hand of Naomi, you also acquire Ruth the Moabite, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Boaz mentioned the land (field) before he mentioned Ruth (the treasure). Boaz was not afraid to pay the price to acquire both the field and the treasure. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:44
      metadata:
        usfm: MAT.13.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
