  - type: text
    text: 'of whom Boaz had spoken came passing by. Boaz called to him, “Come over here, friend; sit down with me. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: We have some business to attend to
  - type: text
    text: .” So the man went over and sat down.
