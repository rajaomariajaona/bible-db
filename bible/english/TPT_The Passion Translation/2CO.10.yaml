document_id: 2CO.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Defense of His Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now, please listen, for I need to address an issue. I’m making this personal appeal to you by the gentleness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “peace” or, literally “by the oasis rest.”
      marker-yv: yv-n
    - type: text
      text: 'and self-forgetfulness of Christ. I am the one who is “humble and timid” when face-to-face with you but “bold and outspoken” when a safe distance away. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is apparently quoting their own words that they used to describe him.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For I can imagine some of you saying, “His letters are authoritative and stern, but when he’s with us he’s not that impressive '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he’s weak.”
      marker-yv: yv-n
    - type: text
      text: 'and he’s a poor speaker.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Greece was known as a land of eloquent speakers. Orators were professionally trained to address crowds. It seems some people were judging Paul by comparing his speaking gift to the eloquent speeches of others. Yet Paul was a brilliant teacher, not a trained orator. True leadership is much more than our speaking ability. Our influence is not limited to a rousing sermon, but we will affect the lives of many if we walk in purity, led by the Holy Spirit. Both Moses and Jeremiah saw themselves as poor speakers. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 4:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Such a person should realize that when we arrive, there will be no difference in the actions we take and the words we write.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Apostolic Mandate
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Of course, we wouldn’t dare to put ourselves in the same class or compare ourselves with those who rate themselves so highly. They compare themselves to one another '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “copying one another.” God has made each of us unique and given us spiritual gifts that are unique. It is never wise to copy or compare yourself to another believer. Pride will result if we see ourselves as better than someone else, or discouragement if we see ourselves as less valuable than someone else. We don’t live by comparison to others but by Christ’s life in us.
      marker-yv: yv-n
    - type: text
      text: 'and make up their own standards to measure themselves by, and then they judge themselves by their own standards. What self-delusion! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But we are those who choose to limit our boasting to only the measure of the work '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the sphere of the allocation” (given to us). Paul uses the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: metron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which was the length of a race course (Gr.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dromos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It was the word used to define the boundaries of a Greek stadium. One could say that Paul stayed within his lane and knew the limits of his measure (
      - type: usfm
        marker: it
        children:
        - type: text
          text: metron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) of spiritual authority.
      marker-yv: yv-n
    - type: text
      text: 'to which God has appointed us—a measure that, by the way, has reached as far as you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And since you are within our assigned limits, we didn’t overstep our boundaries of authority by being the first to announce to you the wonderful news of the Anointed One. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'We’re not trying to take credit for the ministry done by others, going beyond the limits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God set for us
    - type: text
      text: '. Instead, our hope soars as your faith continues to grow, causing a great expansion of our ministry among you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then we can go and preach the good news in the regions beyond you without trespassing on the ministry sphere of other laborers and what they have already done. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: The one who boasts must boast in the Lord.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 9:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: it
      children:
      - type: text
        text: So let’s be clear
    - type: text
      text: . To have the Lord’s approval and commendation is of greater value than bragging about oneself.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now I plead with you that when I come, don’t force me to take a hard line with you (which I’m willing to do) by daring to confront '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “Don’t force me to be severe with the confidence with which I reckon to dare.” Paul pleads with them not to mistake his humility as weakness or an unwillingness to act with authority.
      marker-yv: yv-n
    - type: text
      text: 'those who mistakenly believe that we are living by the standards of the world, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not by the Spirit’s wisdom and power
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'For although we live in the natural realm, we don’t wage a military campaign employing human weapons, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: using manipulation to achieve our aims
    - type: text
      text: '. Instead, our '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' weapons are energized with divine power to effectively dismantle the defenses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: behind which people hide
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strongholds.” The Aramaic word for strongholds can also be translated “rebellious castles.” Paul seems to be referring to demonic strongholds or centers of opposition to the light of the gospel.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'We can demolish every deceptive fantasy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “citadels of argumentations,” which include fantasies.
      marker-yv: yv-n
    - type: text
      text: 'that opposes God and break through every arrogant attitude that is raised up in defiance of the true knowledge of God. We capture, like prisoners of war, every thought '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “every scheme.” Paul is using the concept of taking prisoners of war, but in this case the prisoners held captive are faulty patterns of thought that defy God’s authority.
      marker-yv: yv-n
    - type: text
      text: 'and insist that it bow in obedience to the Anointed One. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Since we are armed with such dynamic weaponry
    - type: text
      text: ', we stand ready to punish '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “court martial.”
      marker-yv: yv-n
    - type: text
      text: any trace of rebellion, as soon as you choose complete obedience.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This completes one long, complicated Greek sentence that began in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. In this passage Paul describes four arenas of our warfare: (1) We are empowered by grace and with the gospel to dismantle strongholds. (2) We demolish arguments, opinions, theories, and philosophies. (3) We take captive every thought to insist that it become obedient to the mind of Christ. (4) We stand ready and willing to wage war and defeat the enemy ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:10–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Responds to Criticism
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You seem to always be looking at people by their outward appearances. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “You focus on people’s faces.”
      marker-yv: yv-n
    - type: text
      text: 'If someone is confident that he belongs to Christ, he should remind himself of this: we belong to Christ no less than he does. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I am not ashamed, even if I’ve come across as one who has overstated the authority given to us by the Lord. For it is the authority to help build you up, not tear you down. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I don’t want to seem as though I’m trying to bully you with my letters. '
