    marker-yv: yv-n
  - type: text
    text: 'For the country is full of bloodshed and murders, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “judgments of bloods,” that is, such crimes involving the shedding of blood were deserving of death.
    marker-yv: yv-n
  - type: text
    text: 'and the city is full of violence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'so I will bring evil nations here to seize their homes. I will put an end to the pride of their elite, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
