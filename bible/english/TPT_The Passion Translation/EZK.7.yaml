        text: implies menstrual impurity.
    marker-yv: yv-n
  - type: text
    text: 'Their wealth will not be able to save them on the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s fury. For it will be worthless on that day to buy food to fill their stomachs since it was their wealth that led them into sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Once they were so proud of their beautiful jewelry, out of which they made their disgusting, horrible idols. Now I have made their wealth and jewels repulsive to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will give your wealth to foreigners, as spoils of war to the evilest people on earth, and they will profane it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will turn my face away from them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, God will lift his divine, protecting presence from them.
    marker-yv: yv-n
  - type: text
    text: 'while my hidden, treasured place '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
