  - type: text
    text: '“ ‘Now is the day of disaster. Behold, your doom has come! Brutality has blossomed, and pride is at its peak. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “the crown has come, has come out, the rod has blossomed.” Some Jewish scholars see the “rod” as Nebuchadnezzar. The Hebrew meaning, however, remains uncertain.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Violence has grown up into a rod to punish their wickedness. None of these proud, evil people will survive. All their wealth and prestige will be swept away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “not from them, nor from their multitude, nor from their tumult, and they are worthless.” The Hebrew is uncertain.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The time of your doom is before you; the day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of reckoning
  - type: text
    text: ' has come. Let not the buyer be happy nor the seller be sad, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, commerce will end and have no more place in the land.
    marker-yv: yv-n
  - type: text
    text: 'for wrath is upon the entire multitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the seller will not be able to return to what has been sold while they live. For the vision concerns them all. Each persists in sin, and no one will hold on to their lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The trumpet sounds, everyone gets ready, but no one goes into battle, since my anger rests on everyone alike.’ ”
