document_id: EZK.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The End Has Come
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '10':
  - type: text
    content: '“ ‘Now is the day of disaster. Behold, your doom has come! Brutality has blossomed, and pride is at its peak. '
  - type: note
    content: Or literally “the crown has come, has come out, the rod has blossomed.” Some Jewish scholars see the “rod” as Nebuchadnezzar. The Hebrew meaning, however, remains uncertain.
  '11':
  - type: text
    content: 'Violence has grown up into a rod to punish their wickedness. None of these proud, evil people will survive. All their wealth and prestige will be swept away. '
  - type: note
    content: Or literally “not from them, nor from their multitude, nor from their tumult, and they are worthless.” The Hebrew is uncertain.
  '12':
  - type: text
    content: 'The time of your doom is before you; the day '
  - type: text
    content: of reckoning
  - type: text
    content: ' has come. Let not the buyer be happy nor the seller be sad, '
  - type: note
    content: That is, commerce will end and have no more place in the land.
  - type: text
    content: 'for wrath is upon the entire multitude. '
  '13':
  - type: text
    content: 'For the seller will not be able to return to what has been sold while they live. For the vision concerns them all. Each persists in sin, and no one will hold on to their lives. '
  '14':
  - type: text
    content: The trumpet sounds, everyone gets ready, but no one goes into battle, since my anger rests on everyone alike.’ ”
  - type: heading
    content: The Sins of Israel
  '15':
  - type: text
    content: '“ ‘Enemies '
  - type: note
    content: Or “The sword.”
  - type: text
    content: 'are lurking outside the city; inside are disease and starvation. Anyone out in the countryside will die in battle; anyone in the city will die by starvation and plague. '
  '16':
  - type: text
    content: 'And those who escape will flee to the mountains, '
  - type: text
    content: moaning
  - type: text
    content: ' like doves of the valleys, each one '
  - type: text
    content: moaning
  - type: text
    content: ' for his sin. '
  '17':
  - type: text
    content: 'Every hand will grow weak. '
  - type: text
    content: Gripped with fear
  - type: text
    content: ', they wet themselves. '
  - type: note
    content: Literally “all knees walk [with] water,” a euphemism for “they can no longer hold their water [bladder].”
  '18':
  - type: text
    content: 'Terror covers them as they put on sackcloth. Shame covers their faces as they shave their heads bald. '
  - type: note
    content: Shaving their heads was a cultural sign of grief and disgrace.
  '19':
  - type: text
    content: 'They will throw their silver away in the streets and their gold like filthy menstrual rags. '
  - type: note
    content: The Hebrew word niddah implies menstrual impurity.
  - type: text
    content: 'Their wealth will not be able to save them on the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s fury. For it will be worthless on that day to buy food to fill their stomachs since it was their wealth that led them into sin. '
  '2':
  - type: text
    content: '“Son of man, tell the people of Israel what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the land of Israel: ‘Finished! The end has come over all the land. '
  - type: note
    content: 'Or “the four corners of the land.” The sense of the term qes, which means “end,” here implies the end of God’s forbearance and the beginning of judgment (see Amos 8:2; LaMar Eugene Cooper, The New American Commentary, Vol. 17: Ezekiel [United States: Broadman & Holman Publishers, 1994], 110).'
  '20':
  - type: text
    content: 'Once they were so proud of their beautiful jewelry, out of which they made their disgusting, horrible idols. Now I have made their wealth and jewels repulsive to them. '
  '21':
  - type: text
    content: 'I will give your wealth to foreigners, as spoils of war to the evilest people on earth, and they will profane it. '
  '22':
  - type: text
    content: 'I will turn my face away from them '
  - type: note
    content: That is, God will lift his divine, protecting presence from them.
  - type: text
    content: 'while my hidden, treasured place '
  - type: note
    content: Although unstated, God’s “hidden, treasured place” was his sanctuary in his temple.
  - type: text
    content: is profaned and thugs force their way in and defile it.
  '23':
  - type: text
    content: '“ ‘Prepare plenty of chains '
  - type: text
    content: to bind up the captives
  - type: text
    content: '. '
  - type: note
    content: Or literally “Make the rattoq.” This is the only place in the Bible the word rattoq occurs, and it is of uncertain meaning. The root word means “to bind [with chains],” or possibly “tie up [with ropes].” One ancient translation reads instead “Everything is in confusion.”
  - type: text
    content: 'For the country is full of bloodshed and murders, '
  - type: note
    content: Or “judgments of bloods,” that is, such crimes involving the shedding of blood were deserving of death.
  - type: text
    content: 'and the city is full of violence, '
  '24':
  - type: text
    content: 'so I will bring evil nations here to seize their homes. I will put an end to the pride of their elite, '
  - type: note
    content: Or “the pride of the powerful.”
  - type: text
    content: 'and their sanctuary will be profaned. '
  '25':
  - type: text
    content: 'Panic is on the way! They will look for peace but never find it. '
  '26':
  - type: text
    content: 'One disaster will follow another, with rumor upon rumor. They will seek a vision from the prophet '
  - type: text
    content: but in vain
  - type: text
    content: '. The priestly teaching of the divine law will be destroyed, along with the counsel of the elders. '
  '27':
  - type: text
    content: 'The king will go into mourning, the officials will be wrapped in despair, and the hands of the people will tremble '
  - type: text
    content: in terror
  - type: text
    content: '. I will punish them for the way they have lived and judge them the same way as they have judged others. Then they will be convinced that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!’ ”'
  '3':
  - type: text
    content: 'Now the end has come. '
  - type: note
    content: Chapter 7 is best seen as a funeral dirge, a lament over the fall of Jerusalem. The frequent repetition emphasizes the message of judgment and doom hanging over Jerusalem. The verses are filled with deep emotion with a note of finality. This becomes a preview of the coming day of Yahweh, when he will judge the world and those who walk in darkness. See Isa. 60:1–5; Joel 2:1–2; Mal. 4:1–6.
  - type: text
    content: 'I will unleash my anger on you and judge you for the way you have lived. I will judge you for all your loathsome practices. '
  '4':
  - type: text
    content: 'I will not show you pity nor spare you. '
  - type: note
    content: It is important to see that God is both the Father of Mercy and the God of Judgment. See Rom. 11:13–24.
  - type: text
    content: 'Indeed, I will punish you for your conduct—the despicable evil you have done. Then you all will be convinced that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’
  '5':
  - type: text
    content: '“The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: ‘Look! An unheard-of disaster is coming. '
  - type: note
    content: Or “One disaster after another.” The Hebrew is uncertain.
  '6':
  - type: text
    content: 'It’s all over for you! The end is near! '
  - type: note
    content: Or “the end has come.” There is some ambiguity about the precise meaning of the verb bo’. The context suggests either that the end has arrived or is about to.
  - type: text
    content: 'Doom is awakened against you. '
  - type: note
    content: The Hebrew has a play on words. The Hebrew words for “end” and “awakened” are homonyms (words with the same triconsonantal root).
  - type: text
    content: 'Behold, the fateful day! '
  '7':
  - type: text
    content: Now it is your turn to be punished
  - type: text
    content: '. You who dwell in this land, doom is coming, for the day '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near. The people will be '
  - type: text
    content: shouting
  - type: text
    content: ' in panic, not '
  - type: text
    content: shouting
  - type: text
    content: ' with joy at the '
  - type: text
    content: shrines
  - type: text
    content: ' on the mountaintops. '
  - type: note
    content: The mountain summits in Canaan were universally associated with idolatrous Israelite worship of local deities, epitomized by the numerous references to “high places” throughout the Old Testament historical books and canonical prophets.
  '8':
  - type: text
    content: 'Very soon I will vent my fury on you and punish you until my anger is finished. I will judge you for the way you live and punish you for all your loathsome practices. '
  '9':
  - type: text
    content: 'I will show you no mercy nor spare you, but I will punish you for your conduct and for all your detestable deeds. Then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' who has punished you.’ ”'
  - type: note
    content: Or “who strikes the blow.”
  - type: heading
    content: The Day of Judgment
