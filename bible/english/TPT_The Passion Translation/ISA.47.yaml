document_id: ISA.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Ode to the Fall of Babylon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Get down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from your throne
  - type: text
    text: ' and sit in the dust, O Miss Babylon!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sit on the ground where you belong,
- type: usfm
  marker: q1
  children:
  - type: text
    text: not on a throne, O Miss Chaldea!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you will never be described again as ‘delicate and dainty.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “pampered and spoiled.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Take off your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pretty
  - type: text
    text: ' veil;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your flowing tresses.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: take two millstones and grind grain.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grinding with millstones was considered the lowest of menial work, usually done by slaves. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 11:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift your skirt, bare your legs, and wade through the rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your humiliating nakedness will be uncovered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your shame exposed and seen by all.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is true that Babylon has fallen historically, but we can understand that the “Babylonian system” in the church is also falling. Old concepts are crumbling and being swept away (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 10:3–6
      metadata:
        usfm: 2CO.10.3+2CO.10.4+2CO.10.5+2CO.10.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) as God exposes our impurity. Yet the Redeemer stands ready to restore and revive those with hungry, passionate hearts for God.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will take vengeance and let no one intercede for you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew meaning of this clause is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We have a Redeemer. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is his name,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Commander of Angel Armies, the Holy One of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Sit silently and go away into the darkness, O Miss Chaldea!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you will no longer be called the Mistress of Kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I became angry with my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'so I wounded '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “defiled,” which comes from a root word meaning “to pierce” or “to wound.”
    marker-yv: yv-n
  - type: text
    text: my special ones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I handed them over to you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and you took them captive
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: You showed them no mercy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you even made the elderly suffer under your heavy yoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You thought,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘I will be the Mistress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Kingdoms
  - type: text
    text: ' forever.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you never considered what you were doing
- type: usfm
  marker: q1
  children:
  - type: text
    text: or reflected on how all this would end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “So now, listen to this, you pampered lover of pleasure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who sits smug and secure and says in her heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am, and there is no one like me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will never have to live as a widow
- type: usfm
  marker: q1
  children:
  - type: text
    text: or suffer the loss of my children.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Suddenly both of these losses will overtake you in one day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you will lose your husband and your children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Despite your many magic spells and your powerful sorceries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will be overwhelmed by these tragedies in full measure!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You felt so smug and secure in your wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You thought, ‘No one sees me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your idea of ‘wisdom’ and self-professed ‘knowledge’
- type: usfm
  marker: q1
  children:
  - type: text
    text: has led you astray, saying in your heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am! There is none like me!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: An avalanche of
  - type: text
    text: ' evil will come upon you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: that no magic spell will be able to avert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Great disaster is about to fall upon you
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you will not be able to ward off!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Total devastation will strike you suddenly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will happen so swiftly you won’t even see it coming!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “So go ahead—keep trusting in your sorceries
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the witchcraft you’ve practiced since your youth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perhaps you might succeed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Perhaps you’ll scare away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your impending doom
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You must be fatigued with so much counsel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the stargazers and astrologers take their stand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: See if they can help you now!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them make their monthly predictions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maybe they can reveal what
- type: usfm
  marker: q1
  children:
  - type: text
    text: is about to come upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Look at them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re nothing but straw for the consuming fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They can’t even rescue themselves from the power of the flame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And this is not some cozy fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you sit beside to keep yourself warm!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These traders, with whom you have dealt since your youth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will do nothing but disappoint you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each has wandered off to his own way—
- type: usfm
  marker: q1
  children:
  - type: text
    text: there is no one left to rescue you!”
