document_id: ISA.47,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: An Ode to the Fall of Babylon
  - type: text
    content: '“Get down '
  - type: text
    content: from your throne
  - type: text
    content: ' and sit in the dust, O Miss Babylon!'
  - type: text
    content: Sit on the ground where you belong,
  - type: text
    content: not on a throne, O Miss Chaldea!
  - type: text
    content: For you will never be described again as ‘delicate and dainty.’
  - type: note
    content: Or “pampered and spoiled.”
  '10':
  - type: text
    content: You felt so smug and secure in your wickedness.
  - type: text
    content: You thought, ‘No one sees me.’
  - type: text
    content: Your idea of ‘wisdom’ and self-professed ‘knowledge’
  - type: text
    content: has led you astray, saying in your heart,
  - type: text
    content: ‘I am! There is none like me!’
  '11':
  - type: text
    content: An avalanche of
  - type: text
    content: ' evil will come upon you'
  - type: text
    content: that no magic spell will be able to avert.
  - type: text
    content: Great disaster is about to fall upon you
  - type: text
    content: that you will not be able to ward off!
  - type: text
    content: Total devastation will strike you suddenly.
  - type: text
    content: It will happen so swiftly you won’t even see it coming!
  '12':
  - type: text
    content: “So go ahead—keep trusting in your sorceries
  - type: text
    content: and the witchcraft you’ve practiced since your youth.
  - type: text
    content: Perhaps you might succeed!
  - type: text
    content: 'Perhaps you’ll scare away '
  - type: text
    content: your impending doom
  - type: text
    content: '!'
  '13':
  - type: text
    content: You must be fatigued with so much counsel!
  - type: text
    content: Let the stargazers and astrologers take their stand.
  - type: text
    content: See if they can help you now!
  - type: text
    content: Let them make their monthly predictions.
  - type: text
    content: Maybe they can reveal what
  - type: text
    content: is about to come upon you.
  '14':
  - type: text
    content: Look at them!
  - type: text
    content: They’re nothing but straw for the consuming fire.
  - type: text
    content: They can’t even rescue themselves from the power of the flame.
  - type: text
    content: And this is not some cozy fire
  - type: text
    content: that you sit beside to keep yourself warm!
  '15':
  - type: text
    content: These traders, with whom you have dealt since your youth,
  - type: text
    content: will do nothing but disappoint you.
  - type: text
    content: Each has wandered off to his own way—
  - type: text
    content: there is no one left to rescue you!”
  '2':
  - type: text
    content: 'Take off your '
  - type: text
    content: pretty
  - type: text
    content: ' veil;'
  - type: note
    content: Or “your flowing tresses.”
  - type: text
    content: take two millstones and grind grain.
  - type: note
    content: Grinding with millstones was considered the lowest of menial work, usually done by slaves. See Ex. 11:5.
  - type: text
    content: Lift your skirt, bare your legs, and wade through the rivers.
  '3':
  - type: text
    content: Your humiliating nakedness will be uncovered,
  - type: text
    content: your shame exposed and seen by all.
  - type: note
    content: It is true that Babylon has fallen historically, but we can understand that the “Babylonian system” in the church is also falling. Old concepts are crumbling and being swept away (see 2 Cor. 10:3–6) as God exposes our impurity. Yet the Redeemer stands ready to restore and revive those with hungry, passionate hearts for God.
  - type: text
    content: I will take vengeance and let no one intercede for you.”
  - type: note
    content: The Hebrew meaning of this clause is uncertain.
  '4':
  - type: text
    content: 'We have a Redeemer. '
  - type: text
    content: Yahweh
  - type: text
    content: ' is his name,'
  - type: text
    content: the Commander of Angel Armies, the Holy One of Israel!
  '5':
  - type: text
    content: “Sit silently and go away into the darkness, O Miss Chaldea!
  - type: text
    content: For you will no longer be called the Mistress of Kingdoms.
  '6':
  - type: text
    content: I became angry with my people,
  - type: text
    content: 'so I wounded '
  - type: note
    content: Or “defiled,” which comes from a root word meaning “to pierce” or “to wound.”
  - type: text
    content: my special ones.
  - type: text
    content: 'I handed them over to you, '
  - type: text
    content: and you took them captive
  - type: text
    content: .
  - type: text
    content: You showed them no mercy;
  - type: text
    content: you even made the elderly suffer under your heavy yoke.
  '7':
  - type: text
    content: You thought,
  - type: text
    content: '‘I will be the Mistress '
  - type: text
    content: of Kingdoms
  - type: text
    content: ' forever.’'
  - type: text
    content: But you never considered what you were doing
  - type: text
    content: or reflected on how all this would end.
  '8':
  - type: text
    content: “So now, listen to this, you pampered lover of pleasure,
  - type: text
    content: who sits smug and secure and says in her heart,
  - type: text
    content: ‘I am, and there is no one like me!
  - type: text
    content: I will never have to live as a widow
  - type: text
    content: or suffer the loss of my children.’
  '9':
  - type: text
    content: Suddenly both of these losses will overtake you in one day,
  - type: text
    content: for you will lose your husband and your children.
  - type: text
    content: Despite your many magic spells and your powerful sorceries,
  - type: text
    content: you will be overwhelmed by these tragedies in full measure!
