- type: usfm
  marker: q1
  children:
  - type: text
    text: “Has Israel no sons?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is there no one to inherit her land?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'What right did '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your god
  - type: text
    text: ' Molech '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Milcom,” the name of a Canaanite god worshiped with child sacrifice. See
    - type: usfm
