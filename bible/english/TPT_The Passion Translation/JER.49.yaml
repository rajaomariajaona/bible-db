  - type: text
    text: have to take the territory of Gad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the people of Molech to occupy its towns?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Therefore, I say to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The days are coming when I will cause the Ammonites of Rabbah
- type: usfm
  marker: q1
  children:
  - type: text
    text: to hear the battle cries of their attackers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will turn her into a heap of ruins
- type: usfm
  marker: q1
  children:
  - type: text
    text: and her surrounding villages will be set on fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Israel will drive out those who drove her out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', affirm it!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Weep and wail, Heshbon, for Ai has been destroyed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shriek, women of Rabbah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put on sackcloth and mourn;
- type: usfm
  marker: q1
  children:
  - type: text
    text: run back and forth in confusion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For enemies will lead Molech away and take him captive
- type: usfm
  marker: q1
  children:
  - type: text
    text: with all his priests and servants.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:3
    - type: usfm
      marker: ft
