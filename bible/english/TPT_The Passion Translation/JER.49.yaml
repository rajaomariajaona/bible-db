document_id: JER.49,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Ammon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to the Ammonites:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ammon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “tribal.” It was the northern brother-nation of Moab (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 19:30–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Rabbah, modern-day Amman in the kingdom of Jordan, was Ammon’s capital city. For other messages concerning Ammon, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 21:28–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:1–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 1:13–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zeph. 2:8–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Has Israel no sons?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there no one to inherit her land?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What right did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your god
    - type: text
      text: ' Molech '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Milcom,” the name of a Canaanite god worshiped with child sacrifice. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 18:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 11:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: have to take the territory of Gad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the people of Molech to occupy its towns?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: However, I have taken everything from Esau’s descendants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have uncovered his hiding places
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that he can hide no longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the Edomites are ruined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'along with their relatives and neighbors, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with no one left to say
    - type: text
      text: ','
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Leave your orphans, I’ll take care of them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let your widows depend on me!’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “Even those nations that don’t deserve to be punished must drink from the cup filled with my anger. So how do you hope to escape? You will not go unpunished but will certainly have to drink from that same cup. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have sworn by my great name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your capital city of
    - type: text
      text: ' Bozrah and all its surrounding villages will become nothing but desert ruins. Bozrah will be a laughingstock, a curse, and an object of horror forever.”'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have received a word from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A messenger has been sent to tell the nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Assemble your armies for battle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and get ready to attack '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edom
    - type: text
      text: .”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I will make you the least of nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the world will despise you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your proud heart has deceived you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your pride rests in thinking everyone is afraid of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you whose home is in the rocky cliffs,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly a reference to Petra in Jordan.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who live high on the mountaintop,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though you make your nest as high as the eagle’s,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Obad. 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will topple you from your high place!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I will make Edom an object of horror and astonishment; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “something to hiss at”; see footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'everyone who passes by it will be appalled and will make insulting remarks because of all its disasters! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you: As Sodom and Gomorrah and their neighboring towns were destroyed and no one will live there again, not one person will ever settle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in Edom
    - type: text
      text: ' again.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, just as a lion suddenly comes out of the thickets of the Jordan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus is like a lion who, after his baptism, came up from “the thickets of the Jordan” to do the Father’s pleasure.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to a rich pastureland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will suddenly make the people of Edom run away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will appoint a leader that I choose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For who can be compared to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is able to challenge me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Name for me the ruler
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shepherd.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who can stand up to me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I say to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days are coming when I will cause the Ammonites of Rabbah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to hear the battle cries of their attackers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn her into a heap of ruins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her surrounding villages will be set on fire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Israel will drive out those who drove her out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', affirm it!'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now listen to the plans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that I have against you, Edom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to what I have in store
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the people of Teman.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like little lambs, your children will be dragged away
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before your own eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and everyone will be horrified!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they will be appalled because of what has happened to the sheep.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will shudder at the sound of their downfall
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the echoes of their cry reach to the Red Sea.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look, an enemy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Nebuchadnezzar and the Babylonian armies.
      marker-yv: yv-n
    - type: text
      text: will swoop down on Bozrah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and attack Edom without warning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like an eagle diving from the sky.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy will capture the cities and the fortresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on that day Edom’s warriors will be as frightened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a woman in her birth pains.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Damascus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: says
    - type: text
      text: ' to Damascus:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Damascus, the capital of Syria, was conquered in 732 BC by the Assyrian king Tiglath-Pileser III. For other messages concerning Damascus and Syria, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 17:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 1:3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your neighboring cities of
    - type: text
      text: ' Hamath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hamath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fortress.” Hamath was once the principal city of upper Syria, situated in the Orontes Valley. The Hamathites were descendants of Ham and Canaan (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Hamath, in the days of Solomon, was a storehouse city and major center for trade (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 4:21–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It is identified as present-day Hamah.
      marker-yv: yv-n
    - type: text
      text: 'and Arpad '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Arpad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “bed [couch]” or “support.” It was a city-state in northern Syria about twenty miles (thirty-two kilometers) north of Aleppo.
      marker-yv: yv-n
    - type: text
      text: are humiliated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have heard the bad news.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are shaken with anxiety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the troubled sea that cannot be calmed.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Damascus are in a panic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have lost their courage and have turned to run.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish and travail have taken hold of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a woman in labor.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were once famous, and I was pleased with you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but now I warn you, ‘Escape while you can!’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Why has the city of my praise, the town of my joy, not been evacuated?”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nevertheless, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day, the enemy will kill your young men in the streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all your warriors will perish.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will light a fire inside the walls of Damascus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to devour the palaces of Ben-Hadad.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:27
      - type: usfm
        marker: ft
        children:
        - type: text
