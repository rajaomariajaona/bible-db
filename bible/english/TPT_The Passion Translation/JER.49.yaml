- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Why do you glory in your ebbing strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you rebellious ones?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you trust in your great wealth and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who will dare to attack me?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look, I will bring terror upon you,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'says Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Terror will come from every side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: everyone will run away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and no one will be there to bring them back together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But I affirm to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will one day bring back the captive Ammonites.”
- type: usfm
