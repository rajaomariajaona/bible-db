document_id: JER.49,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Ammon
  - type: text
    content: Yahweh
  - type: text
    content: ' says to the Ammonites:'
  - type: note
    content: Ammon means “tribal.” It was the northern brother-nation of Moab (see Gen. 19:30–38). Rabbah, modern-day Amman in the kingdom of Jordan, was Ammon’s capital city. For other messages concerning Ammon, see Ezek. 21:28–32; 25:1–7; Amos 1:13–15; Zeph. 2:8–11.
  - type: text
    content: “Has Israel no sons?
  - type: text
    content: Is there no one to inherit her land?
  - type: text
    content: 'What right did '
  - type: text
    content: your god
  - type: text
    content: ' Molech '
  - type: note
    content: Or “Milcom,” the name of a Canaanite god worshiped with child sacrifice. See Lev. 18:21; 1 Kings 11:5, 33; 2 Kings 23:13.
  - type: text
    content: have to take the territory of Gad,
  - type: text
    content: and the people of Molech to occupy its towns?
  '10':
  - type: text
    content: However, I have taken everything from Esau’s descendants.
  - type: text
    content: I have uncovered his hiding places
  - type: text
    content: so that he can hide no longer.
  - type: text
    content: All the Edomites are ruined,
  - type: text
    content: 'along with their relatives and neighbors, '
  - type: text
    content: with no one left to say
  - type: text
    content: ','
  '11':
  - type: text
    content: ‘Leave your orphans, I’ll take care of them;
  - type: text
    content: let your widows depend on me!’ ”
  '12':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Even those nations that don’t deserve to be punished must drink from the cup filled with my anger. So how do you hope to escape? You will not go unpunished but will certainly have to drink from that same cup. '
  '13':
  - type: text
    content: 'For I have sworn by my great name, '
  - type: text
    content: Yahweh
  - type: text
    content: ', that '
  - type: text
    content: your capital city of
  - type: text
    content: ' Bozrah and all its surrounding villages will become nothing but desert ruins. Bozrah will be a laughingstock, a curse, and an object of horror forever.”'
  '14':
  - type: text
    content: 'I have received a word from '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: 'A messenger has been sent to tell the nations:'
  - type: text
    content: “Assemble your armies for battle
  - type: text
    content: 'and get ready to attack '
  - type: text
    content: Edom
  - type: text
    content: .”
  '15':
  - type: text
    content: “Behold, I will make you the least of nations;
  - type: text
    content: all the world will despise you.
  '16':
  - type: text
    content: Your proud heart has deceived you.
  - type: text
    content: Your pride rests in thinking everyone is afraid of you.
  - type: text
    content: 'But I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you whose home is in the rocky cliffs,'
  - type: note
    content: Possibly a reference to Petra in Jordan.
  - type: text
    content: who live high on the mountaintop,
  - type: text
    content: though you make your nest as high as the eagle’s,
  - type: note
    content: See Obad. 4.
  - type: text
    content: I will topple you from your high place!
  '17':
  - type: text
    content: '“I will make Edom an object of horror and astonishment; '
  - type: note
    content: Or “something to hiss at”; see footnote on 18:16.
  - type: text
    content: 'everyone who passes by it will be appalled and will make insulting remarks because of all its disasters! '
  '18':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you: As Sodom and Gomorrah and their neighboring towns were destroyed and no one will live there again, not one person will ever settle '
  - type: text
    content: in Edom
  - type: text
    content: ' again.'
  '19':
  - type: text
    content: “Behold, just as a lion suddenly comes out of the thickets of the Jordan
  - type: note
    content: Jesus is like a lion who, after his baptism, came up from “the thickets of the Jordan” to do the Father’s pleasure.
  - type: text
    content: to a rich pastureland,
  - type: text
    content: I will suddenly make the people of Edom run away.
  - type: text
    content: And I will appoint a leader that I choose.
  - type: text
    content: For who can be compared to me?
  - type: text
    content: Who is able to challenge me?
  - type: text
    content: Name for me the ruler
  - type: note
    content: Or “shepherd.”
  - type: text
    content: who can stand up to me.
  '2':
  - type: text
    content: Therefore, I say to you,
  - type: text
    content: The days are coming when I will cause the Ammonites of Rabbah
  - type: text
    content: to hear the battle cries of their attackers.
  - type: text
    content: I will turn her into a heap of ruins
  - type: text
    content: and her surrounding villages will be set on fire.
  - type: text
    content: Then Israel will drive out those who drove her out.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', affirm it!'
  '20':
  - type: text
    content: So now listen to the plans
  - type: text
    content: that I have against you, Edom.
  - type: text
    content: Listen to what I have in store
  - type: text
    content: for the people of Teman.
  - type: text
    content: Like little lambs, your children will be dragged away
  - type: text
    content: before your own eyes,
  - type: text
    content: and everyone will be horrified!
  - type: note
    content: Or “they will be appalled because of what has happened to the sheep.”
  '21':
  - type: text
    content: The earth will shudder at the sound of their downfall
  - type: text
    content: while the echoes of their cry reach to the Red Sea.
  '22':
  - type: text
    content: 'Look, an enemy '
  - type: note
    content: That is, Nebuchadnezzar and the Babylonian armies.
  - type: text
    content: will swoop down on Bozrah
  - type: text
    content: and attack Edom without warning,
  - type: text
    content: like an eagle diving from the sky.
  - type: text
    content: The enemy will capture the cities and the fortresses.
  - type: text
    content: And on that day Edom’s warriors will be as frightened
  - type: text
    content: as a woman in her birth pains.”
  - type: heading
    content: Prophecy against Damascus
  '23':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ' to Damascus:'
  - type: note
    content: Damascus, the capital of Syria, was conquered in 732 BC by the Assyrian king Tiglath-Pileser III. For other messages concerning Damascus and Syria, see Isa. 17:1–3; Amos 1:3–5; Zech. 9:1.
  - type: text
    content: “
  - type: text
    content: Your neighboring cities of
  - type: text
    content: ' Hamath '
  - type: note
    content: Hamath means “fortress.” Hamath was once the principal city of upper Syria, situated in the Orontes Valley. The Hamathites were descendants of Ham and Canaan (see Gen. 10:18). Hamath, in the days of Solomon, was a storehouse city and major center for trade (see 1 Kings 4:21–24; 2 Chron. 8:4). It is identified as present-day Hamah.
  - type: text
    content: 'and Arpad '
  - type: note
    content: Arpad means “bed [couch]” or “support.” It was a city-state in northern Syria about twenty miles (thirty-two kilometers) north of Aleppo.
  - type: text
    content: are humiliated,
  - type: text
    content: for they have heard the bad news.
  - type: text
    content: They are shaken with anxiety
  - type: text
    content: like the troubled sea that cannot be calmed.
  '24':
  - type: text
    content: The people of Damascus are in a panic.
  - type: text
    content: They have lost their courage and have turned to run.
  - type: text
    content: Anguish and travail have taken hold of them,
  - type: text
    content: like a woman in labor.
  '25':
  - type: text
    content: You were once famous, and I was pleased with you,
  - type: text
    content: but now I warn you, ‘Escape while you can!’
  - type: note
    content: Or “Why has the city of my praise, the town of my joy, not been evacuated?”
  '26':
  - type: text
    content: 'Nevertheless, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you:'
  - type: text
    content: On that day, the enemy will kill your young men in the streets,
  - type: text
    content: and all your warriors will perish.
  '27':
  - type: text
    content: I will light a fire inside the walls of Damascus,
  - type: text
    content: to devour the palaces of Ben-Hadad.”
  - type: note
    content: Ben-Hadad was the title given to several kings of Damascus (1 Kings 15:18, 20; 2 Kings 13:24). Ben-Hadad means “son of Hadad.” Hadad was a storm god of the ancient world, similar to the Canaanite god Baal.
  - type: heading
    content: Prophecy against the Arab Tribes
  '28':
  - type: text
    content: Yahweh
  - type: text
    content: ' says to the tribe of Kedar and the areas controlled by Hazor, '
  - type: note
    content: Hazor, although the name of a city, is used here in a collective sense for the Arab tribes of the eastern desert that lived in small, unwalled villages. The Hebrew text has “kingdoms of Hazor.” The word kingdoms is to be understood loosely as a people group under the leadership of a tribal chieftain. Hazor was the largest fortified city in the land of Israel at one time (see Josh. 11:10). It traded extensively with Babylon and Syria.
  - type: text
    content: 'all conquered by King Nebuchadnezzar of Babylon:'
  - type: text
    content: “Rise up! Advance to Kedar,
  - type: text
    content: destroy the Arab tribes of the east.
  - type: note
    content: These words are most likely addressed to Nebuchadnezzar, instructing him to invade and conquer the Arab tribes of the eastern desert.
  '29':
  - type: text
    content: Capture their tents, flocks,
  - type: text
    content: tent curtains, camels, and all their gear.
  - type: text
    content: Tell the people there is terror on every side!”
  '3':
  - type: text
    content: Weep and wail, Heshbon, for Ai has been destroyed!
  - type: text
    content: Shriek, women of Rabbah!
  - type: text
    content: Put on sackcloth and mourn;
  - type: text
    content: run back and forth in confusion!
  - type: text
    content: For enemies will lead Molech away and take him captive
  - type: text
    content: with all his priests and servants.
  - type: note
    content: See Amos 1:15.
  '30':
  - type: text
    content: Yahweh
  - type: text
    content: ' says to the people of Hazor:'
  - type: text
    content: “Run away and hide in caves as fast as you can,
  - type: text
    content: for Nebuchadnezzar king of Babylon has plans to attack you;
  - type: text
    content: he has a scheme in mind to defeat you.
  '31':
  - type: text
    content: “Rise up! March on an unsuspecting people
  - type: text
    content: 'who feel safe and secure,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “They are complacent, living off by themselves
  - type: text
    content: without walls or gates.
  '32':
  - type: text
    content: Take all their camels and many sheep
  - type: text
    content: as the spoils of war.
  - type: text
    content: Those who live in the edges of the desert
  - type: note
    content: Or “Those who cut the corners of their hair.”
  - type: text
    content: I will scatter to the four winds.
  - type: text
    content: 'And I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will bring disaster on them from every side.'
  '33':
  - type: text
    content: Hazor will become desolate, the haunt of jackals,
  - type: text
    content: an empty, uninhabited desert.”
  - type: heading
    content: Prophecy against Elam
  '34':
  - type: text
    content: 'In the beginning of the reign of Zedekiah king of Judah, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, gave me a word for the land of Elam.'
  - type: note
    content: Some Jewish scholars identify Elam as an ancient civilization centered in the far west and southwest of modern-day Iran. However, it was absorbed into (and became a province of) Persia during the Achaemenid Period (539–331 BC).
  - type: text
    content: “Behold, I will break the strength of Elam’s archers,
  - type: note
    content: Or “I will break Elam’s bow.” The Elamites were famous as skilled archers (see Isa. 22:6).
  - type: text
    content: the boast of their might.
  '36':
  - type: text
    content: 'I will bring storms '
  - type: text
    content: of judgment
  - type: text
    content: ' from everywhere'
  - type: text
    content: to break out against them.
  - type: text
    content: I will scatter them to the four winds.
  - type: text
    content: And there will not be a single nation
  - type: text
    content: that will not take you captive.
  '37':
  - type: text
    content: 'Elamites! I will shatter your '
  - type: text
    content: confidence
  - type: text
    content: ' before your enemies,'
  - type: text
    content: who are determined to kill you.
  - type: text
    content: 'In my burning anger, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: will bring disaster on you
  - type: text
    content: and pursue you with the sword
  - type: text
    content: until I have eliminated you all.
  '38':
  - type: text
    content: 'Then I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will destroy your kings and leaders'
  - type: text
    content: and establish my rule in Elam.
  '39':
  - type: text
    content: Then later on, I will bring your captives back,”
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '4':
  - type: text
    content: Why do you glory in your ebbing strength,
  - type: text
    content: you rebellious ones?
  - type: text
    content: For you trust in your great wealth and say,
  - type: text
    content: ‘Who will dare to attack me?’
  '5':
  - type: text
    content: Look, I will bring terror upon you,”
  - type: text
    content: 'says Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: “Terror will come from every side;
  - type: text
    content: everyone will run away,
  - type: text
    content: and no one will be there to bring them back together.
  '6':
  - type: text
    content: But I affirm to you,
  - type: text
    content: I will one day bring back the captive Ammonites.”
  - type: heading
    content: Prophecy against Edom
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says to Edom:'
  - type: note
    content: The people of Edom were despised by the Jews. After the fall of Jerusalem in 586 BC, they occupied parts of southern Judah. Jeremiah’s message was of judgment, not hope, for the Edomites. For other messages concerning Edom, see Isa. 34:5–17; 63:1–6; Ezek. 25:12–14; 35:1–15; Amos 1:11–12; Obad. 1–14; Mal. 1:2–5.
  - type: text
    content: “Is there no wise person left in Teman?
  - type: text
    content: Have all the advisers run out of common sense?
  - type: text
    content: Has all their wisdom vanished?
  '8':
  - type: text
    content: 'People of Dedan, '
  - type: note
    content: Dedan was a city southeast of Edom.
  - type: text
    content: turn and run!
  - type: text
    content: Go into hiding, for I will bring ruin on Esau
  - type: text
    content: when my time to punish him has come.
  '9':
  - type: text
    content: People who harvest grapes
  - type: text
    content: always leave some for the poor.
  - type: text
    content: Thieves who break in at night
  - type: text
    content: only take what they want.
