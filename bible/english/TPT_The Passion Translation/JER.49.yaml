- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is there no wise person left in Teman?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have all the advisers run out of common sense?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has all their wisdom vanished?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'People of Dedan, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dedan was a city southeast of Edom.
    marker-yv: yv-n
  - type: text
    text: turn and run!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go into hiding, for I will bring ruin on Esau
- type: usfm
  marker: q1
  children:
  - type: text
    text: when my time to punish him has come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: People who harvest grapes
- type: usfm
  marker: q1
  children:
  - type: text
    text: always leave some for the poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thieves who break in at night
- type: usfm
  marker: q1
  children:
  - type: text
    text: only take what they want.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: However, I have taken everything from Esau’s descendants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have uncovered his hiding places
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that he can hide no longer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the Edomites are ruined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'along with their relatives and neighbors, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with no one left to say
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘Leave your orphans, I’ll take care of them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: let your widows depend on me!’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says, “Even those nations that don’t deserve to be punished must drink from the cup filled with my anger. So how do you hope to escape? You will not go unpunished but will certainly have to drink from that same cup. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I have sworn by my great name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your capital city of
  - type: text
    text: ' Bozrah and all its surrounding villages will become nothing but desert ruins. Bozrah will be a laughingstock, a curse, and an object of horror forever.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have received a word from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A messenger has been sent to tell the nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Assemble your armies for battle
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and get ready to attack '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Edom
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Behold, I will make you the least of nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the world will despise you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your proud heart has deceived you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your pride rests in thinking everyone is afraid of you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say to you whose home is in the rocky cliffs,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly a reference to Petra in Jordan.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: who live high on the mountaintop,
- type: usfm
  marker: q1
  children:
  - type: text
    text: though you make your nest as high as the eagle’s,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Obad. 4
      metadata:
        usfm: OBA.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will topple you from your high place!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“I will make Edom an object of horror and astonishment; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “something to hiss at”; see footnote on
    - type: usfm
