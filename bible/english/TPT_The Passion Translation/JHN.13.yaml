document_id: JHN.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Washes Feet
  - type: text
    content: 'Jesus knew that the night before Passover would be his last night on earth before leaving this world to return to the Father’s side. All throughout his time with his disciples, Jesus had demonstrated a deep and tender love for them. And now he longed to show them the full measure of his love. '
  - type: note
    content: Or “he loved them to the very end.”
  '10':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “You are already clean. You’ve been washed completely and you just need your feet to be cleansed—but that can’t be said of all of you.”
  - type: text
    content: ' For Jesus knew which one was about to betray him, '
  '11':
  - type: text
    content: and that’s why he told them that not all of them were clean.
  '12':
  - type: text
    content: 'After washing their feet, he put his robe on and returned to his place at the table. '
  - type: note
    content: There has never been a nobleman, a teacher, or a king that loves and serves his servants like Jesus.
  - type: text
    content: “Do you understand what I just did?”
  - type: text
    content: ' Jesus said. '
  '13':
  - type: text
    content: “You’ve called me your teacher and lord, and you’re right, for that’s who I am.
  - type: text
    content: ' '
  '14':
  - type: text
    content: So if I’m your teacher and lord and have just washed your dirty feet, then you should follow the example that I’ve set for you and wash one another’s dirty feet. Now do for each other what I have just done for you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'I speak to you timeless truth: a servant is not superior to his master, and an apostle is never greater than the one who sent him.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: So now put into practice what I have done for you, and you will experience a life of happiness enriched with untold blessings!”
  - type: heading
    content: Jesus Predicts His Betrayal
  '18':
  - type: text
    content: “I don’t refer to all of you when I tell you these things, for I know the ones I’ve chosen—to fulfill the Scripture that says, ‘The one who shared supper with me treacherously betrays me.’
  - type: text
    content: ' '
  - type: note
    content: Or “has lifted up his heel against me.” The Greek text preserves the idiom of Ps. 41:9, which speaks of a treacherous betrayal. In the Semitic culture it is the greatest breach of etiquette to sit and eat with a friend and then later betray them. This is why many would never eat with someone they were not on good terms with. See also footnotes on Ps. 41:9.
  '19':
  - type: text
    content: I am telling you this now, before it happens, so that when the prophecy comes to pass you will be convinced that I AM.
  - type: text
    content: ' '
  - type: note
    content: Or “I Am the One” or “I AM Who I AM.” Jesus once again equated himself with the I Am.
  '2':
  - type: text
    content: 'Before their evening meal had begun, the accuser '
  - type: note
    content: Or “devil.”
  - type: text
    content: 'had already deeply embedded betrayal '
  - type: note
    content: Or “that he should betray Jesus.” The Aramaic is “Satan arose in the heart of Judas to betray Jesus.”
  - type: text
    content: into the heart of Judas Iscariot, the son of Simon.
  '20':
  - type: text
    content: '“Listen to this timeless truth: whoever receives the messenger I send receives me, and the one who receives me receives the Father'
  - type: text
    content: ' '
  - type: note
    content: Or “the One.” By implication, this is the Father.
  - type: text
    content: who sent me.”
  '21':
  - type: text
    content: 'Then Jesus was moved deeply in his spirit. '
  - type: note
    content: As translated from the Greek. The Aramaic describes Jesus’ emotion as “feeling a profound tenderness” or “his spirit felt a longing.” We can conclude that everything within our Lord Jesus was moved deeply by the thought of being betrayed by one of his beloved disciples.
  - type: text
    content: 'Looking at his disciples, he announced, '
  - type: text
    content: “I tell you the truth—one of you is about to betray me.”
  '22':
  - type: text
    content: 'Eyeing each other, his disciples puzzled over which one of them could do such a thing. '
  '23':
  - type: text
    content: 'The disciple that Jesus dearly loved '
  - type: note
    content: The Aramaic is “the one Jesus showed mercy to.” This was obviously John, the one who wrote this Gospel. Remember, you too can say, “I am the disciple who Jesus dearly loves and shows mercy to.”
  - type: text
    content: 'was at the right of him at the table '
  - type: note
    content: This could be a figure of speech for “the place of honor.”
  - type: text
    content: 'and was leaning his head on Jesus. '
  '24':
  - type: text
    content: 'Peter gestured to this disciple to ask Jesus who it was he was referring to. '
  '25':
  - type: text
    content: Then the dearly loved disciple leaned into Jesus’ chest and whispered, “Master, who is it?”
  '26':
  - type: text
    content: “The one I give this piece of bread to after I’ve dipped it in the bowl,”
  - type: text
    content: ' Jesus replied. Then he dipped the piece of bread into the bowl and handed it to Judas Iscariot, the son of Simon. '
  - type: note
    content: This was culturally an act of cherished friendship and intimacy, to hand over choice bits of food to a friend. This is the love of Christ, to give food to his enemy. It is no wonder Satan entered his heart after Judas ate the bread handed to him by his friend. For how can one accept the gift of true friendship and still hold on to treachery and the spirit of betrayal?
  '27':
  - type: text
    content: 'And when Judas ate the piece of bread, Satan '
  - type: note
    content: This is an Aramaic word that means “adversary.”
  - type: text
    content: 'entered him. Then Jesus looked at Judas and said, '
  - type: text
    content: “What you are planning to do, go do it now.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'None of those around the table realized what was happening. '
  '29':
  - type: text
    content: 'Some thought that Judas, their trusted treasurer, was being told to go buy what was needed for the Passover celebration, or perhaps to go give something to the poor. '
  '3':
  - type: text
    content: 'Now Jesus was fully aware that the Father had placed all things under his control, for he had come from God and was about to go back to be with him. '
  '30':
  - type: text
    content: So Judas left quickly and went out into the dark night to betray Jesus.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'After Judas left the room, Jesus said, '
  - type: text
    content: “The time has come for the glory of God to surround the Son of Man, and God will be greatly glorified through what happens to me.
  - type: text
    content: ' '
  - type: note
    content: Or “The Son of Man was glorified and the Father was glorified by him.”
  '32':
  - type: text
    content: And very soon God will unveil the glory of the Son of Man.
  - type: note
    content: Or “Since God is glorified in him (the Son of Man) God will also glorify him in himself, and glorify him immediately.” The Greek text has the word doxazo (“glory” or “honor”) five times in vv. 31–32. This repetition would mean that it speaks of more than simply honor. It is the clear statement of the exchange of glory between God and his Son, Jesus Christ.
  '33':
  - type: text
    content: “My dear friends,
  - type: text
    content: ' '
  - type: note
    content: Or “children.”
  - type: text
    content: 'I only have a brief time left to be with you. And then you will search and long for me. But I tell you what I told the Jewish leaders: you’ll not be able to come where I am.'
  - type: note
    content: See John 7:33–34.
  '34':
  - type: text
    content: “So I give you now a new
  - type: text
    content: ' '
  - type: note
    content: Jesus set a new standard of love before his followers. Although the Old Testament does instruct us to love one another (Lev. 19:18, 34; Deut. 10:18), Jesus now gives the commandment to use his standard of love for us as the true measurement of love as we care for one another.
  - type: text
    content: 'commandment: Love each other just as much as I have loved you.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: For when you demonstrate the same love I have for you by loving one another, everyone will know that you’re my true followers.”
  '36':
  - type: text
    content: Peter interjected, “But, Master, where are you going?”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Where I am going you won’t be able to follow, but one day you will follow me there.”
  '37':
  - type: text
    content: 'Peter '
  - type: note
    content: The Aramaic is translated “Simon the Rock.”
  - type: text
    content: said, “What do you mean I’m not able to follow you now? I would sacrifice my life to die for you!”
  - type: note
    content: The Aramaic uses the word “consecrate,” which means to offer up a sacrifice. Peter implied that he would willingly offer himself in Jesus’ place.
  '38':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Would you really lay down your life for me, Peter? Here’s the absolute truth: Before the rooster crows in the morning, you will say three times that you don’t even know me!”'
  - type: note
    content: Peter, like all of us, resisted the acknowledgment of his weakness and chose to cling to the illusion of strength. Peter was given the sign of a rooster crowing, for that is what he was. He was like a crowing rooster, strutting in pride. “Rocky” got cocky and forgot where true strength is found.
  '4':
  - type: text
    content: 'So he got up from the meal and took off his outer robe, and took a towel and wrapped it around his waist. '
  '5':
  - type: text
    content: Then he poured water into a basin and began to wash the disciples’ dirty feet and dry them with his towel.
  - type: note
    content: Jesus knew that betrayal was hiding in Judas’ heart, yet our Master still washed his feet.
  '6':
  - type: text
    content: But when Jesus got to Simon Peter, he objected and said, “I can’t let you wash my dirty feet—you’re my Lord!”
  '7':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You don’t understand yet the meaning of what I’m doing, but soon it will be clear to you.”
  - type: note
    content: By removing their sandals and washing their feet, Jesus was showing them that he was granting them a new inheritance—his own. The sandal is often used in covenants of inheritance in Hebrew culture. Every defilement would be removed so that they could “place the sole of their feet” upon the new covenant inheritance. See Josh. 1:3; Ruth 4:1–12. God likewise told Moses to remove his sandals (Ex. 3:5), for he was about to receive a new inheritance—the holiness of God and the authority that came with it.
  '8':
  - type: text
    content: Peter looked at Jesus and said, “You’ll never wash my dirty feet—never!”
  - type: text
    content: “But Peter, if you don’t allow me to wash your feet,”
  - type: text
    content: ' Jesus responded, '
  - type: text
    content: “then you will not be able to share life with me.”
  '9':
  - type: text
    content: So Peter said, “Lord, in that case, don’t just wash my feet, wash my hands and my head too!”
