      - type: usfm
        marker: ft
        children:
        - type: text
          text: By removing their sandals and washing their feet, Jesus was showing them that he was granting them a new inheritance—his own. The sandal is often used in covenants of inheritance in Hebrew culture. Every defilement would be removed so that they could “place the sole of their feet” upon the new covenant inheritance. See
