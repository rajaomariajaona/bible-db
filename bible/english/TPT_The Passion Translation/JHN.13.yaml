          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter, like all of us, resisted the acknowledgment of his weakness and chose to cling to the illusion of strength. Peter was given the sign of a rooster crowing, for that is what he was. He was like a crowing rooster, strutting in pride. “Rocky” got cocky and forgot where true strength is found.
