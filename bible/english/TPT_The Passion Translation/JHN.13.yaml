document_id: JHN.13,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Washes Feet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus knew that the night before Passover would be his last night on earth before leaving this world to return to the Father’s side. All throughout his time with his disciples, Jesus had demonstrated a deep and tender love for them. And now he longed to show them the full measure of his love. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he loved them to the very end.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are already clean. You’ve been washed completely and you just need your feet to be cleansed—but that can’t be said of all of you.”
    - type: text
      text: ' For Jesus knew which one was about to betray him, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and that’s why he told them that not all of them were clean.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After washing their feet, he put his robe on and returned to his place at the table. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There has never been a nobleman, a teacher, or a king that loves and serves his servants like Jesus.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you understand what I just did?”
    - type: text
      text: ' Jesus said. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You’ve called me your teacher and lord, and you’re right, for that’s who I am.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if I’m your teacher and lord and have just washed your dirty feet, then you should follow the example that I’ve set for you and wash one another’s dirty feet. Now do for each other what I have just done for you.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I speak to you timeless truth: a servant is not superior to his master, and an apostle is never greater than the one who sent him.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So now put into practice what I have done for you, and you will experience a life of happiness enriched with untold blessings!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Betrayal
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I don’t refer to all of you when I tell you these things, for I know the ones I’ve chosen—to fulfill the Scripture that says, ‘The one who shared supper with me treacherously betrays me.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “has lifted up his heel against me.” The Greek text preserves the idiom of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 41:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which speaks of a treacherous betrayal. In the Semitic culture it is the greatest breach of etiquette to sit and eat with a friend and then later betray them. This is why many would never eat with someone they were not on good terms with. See also footnotes on'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 41:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am telling you this now, before it happens, so that when the prophecy comes to pass you will be convinced that I AM.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I Am the One” or “I AM Who I AM.” Jesus once again equated himself with the I Am.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Before their evening meal had begun, the accuser '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “devil.”
      marker-yv: yv-n
    - type: text
      text: 'had already deeply embedded betrayal '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that he should betray Jesus.” The Aramaic is “Satan arose in the heart of Judas to betray Jesus.”
      marker-yv: yv-n
    - type: text
      text: into the heart of Judas Iscariot, the son of Simon.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen to this timeless truth: whoever receives the messenger I send receives me, and the one who receives me receives the Father'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the One.” By implication, this is the Father.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who sent me.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Jesus was moved deeply in his spirit. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Greek. The Aramaic describes Jesus’ emotion as “feeling a profound tenderness” or “his spirit felt a longing.” We can conclude that everything within our Lord Jesus was moved deeply by the thought of being betrayed by one of his beloved disciples.
      marker-yv: yv-n
    - type: text
      text: 'Looking at his disciples, he announced, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth—one of you is about to betray me.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Eyeing each other, his disciples puzzled over which one of them could do such a thing. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The disciple that Jesus dearly loved '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the one Jesus showed mercy to.” This was obviously John, the one who wrote this Gospel. Remember, you too can say, “I am the disciple who Jesus dearly loves and shows mercy to.”
      marker-yv: yv-n
    - type: text
      text: 'was at the right of him at the table '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could be a figure of speech for “the place of honor.”
      marker-yv: yv-n
    - type: text
      text: 'and was leaning his head on Jesus. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Peter gestured to this disciple to ask Jesus who it was he was referring to. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then the dearly loved disciple leaned into Jesus’ chest and whispered, “Master, who is it?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The one I give this piece of bread to after I’ve dipped it in the bowl,”
    - type: text
      text: ' Jesus replied. Then he dipped the piece of bread into the bowl and handed it to Judas Iscariot, the son of Simon. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was culturally an act of cherished friendship and intimacy, to hand over choice bits of food to a friend. This is the love of Christ, to give food to his enemy. It is no wonder Satan entered his heart after Judas ate the bread handed to him by his friend. For how can one accept the gift of true friendship and still hold on to treachery and the spirit of betrayal?
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And when Judas ate the piece of bread, Satan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an Aramaic word that means “adversary.”
      marker-yv: yv-n
    - type: text
      text: 'entered him. Then Jesus looked at Judas and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What you are planning to do, go do it now.”
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'None of those around the table realized what was happening. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Some thought that Judas, their trusted treasurer, was being told to go buy what was needed for the Passover celebration, or perhaps to go give something to the poor. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now Jesus was fully aware that the Father had placed all things under his control, for he had come from God and was about to go back to be with him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So Judas left quickly and went out into the dark night to betray Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts Peter’s Denial
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'After Judas left the room, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The time has come for the glory of God to surround the Son of Man, and God will be greatly glorified through what happens to me.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The Son of Man was glorified and the Father was glorified by him.”
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And very soon God will unveil the glory of the Son of Man.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Since God is glorified in him (the Son of Man) God will also glorify him in himself, and glorify him immediately.” The Greek text has the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doxazo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“glory” or “honor”) five times in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This repetition would mean that it speaks of more than simply honor. It is the clear statement of the exchange of glory between God and his Son, Jesus Christ.
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My dear friends,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “children.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I only have a brief time left to be with you. And then you will search and long for me. But I tell you what I told the Jewish leaders: you’ll not be able to come where I am.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 7:33–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So I give you now a new
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus set a new standard of love before his followers. Although the Old Testament does instruct us to love one another (
      - type: text
        text: Lev. 19:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '34'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), Jesus now gives the commandment to use his standard of love for us as the true measurement of love as we care for one another.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'commandment: Love each other just as much as I have loved you.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For when you demonstrate the same love I have for you by loving one another, everyone will know that you’re my true followers.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Peter interjected, “But, Master, where are you going?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where I am going you won’t be able to follow, but one day you will follow me there.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Peter '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is translated “Simon the Rock.”
      marker-yv: yv-n
    - type: text
      text: said, “What do you mean I’m not able to follow you now? I would sacrifice my life to die for you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic uses the word “consecrate,” which means to offer up a sacrifice. Peter implied that he would willingly offer himself in Jesus’ place.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Would you really lay down your life for me, Peter? Here’s the absolute truth: Before the rooster crows in the morning, you will say three times that you don’t even know me!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
