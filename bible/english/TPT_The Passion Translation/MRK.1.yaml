document_id: MRK.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wonderful News
  - type: text
    content: 'This is the beginning of the wonderful news about Jesus '
  - type: note
    content: The Aramaic is “the revelation of Jesus.”
  - type: text
    content: the Messiah, the Son of God.
  - type: note
    content: Although the words “Son of God” are missing from some Greek manuscripts, it is found in the Aramaic.
  '10':
  - type: text
    content: 'The moment Jesus rose up out of the water, John saw the heavenly realm split open, and the Holy Spirit descended upon him like a dove. '
  - type: note
    content: The Lord Jesus was buried in baptism, symbolically into death (the Jordan) so that he might minister not in the natural way of men, but in the way of resurrection by the power of the Holy Spirit. The dove, an emblem of the Holy Spirit, pictures both meekness and purity. The implication is that the Holy Spirit came upon Jesus and never left him.
  '11':
  - type: text
    content: 'At the same time, a voice spoke from heaven, saying:'
  - type: text
    content: “You are my Son, my cherished one,
  - type: text
    content: and my greatest delight is in you!”
  - type: note
    content: Although not a direct quotation, the wording is similar to Ps. 2:7.
  '12':
  - type: text
    content: 'Immediately after this he was compelled by the Holy Spirit '
  - type: note
    content: Or “cast out [or ‘thrown,’ or ‘pushed’] into the wilderness.” The Greek word ekballei is often used for driving out demons. This was a forceful compelling of the Holy Spirit.
  - type: text
    content: 'to go into an uninhabited desert region. '
  '13':
  - type: text
    content: 'He remained there in the wilderness for forty days, '
  - type: note
    content: The “forty days” points to Moses, Elijah, and David, who were all great champions in Israel’s history. See Ex. 34:28; 1 Sam. 17:16; 1 Kings 19:8, 15.
  - type: text
    content: enduring the ordeals of Satan’s tests. He encountered wild animals, but also angels who appeared and ministered to his needs.
  - type: note
    content: Between vv. 13 and 14 there is an entire year of our Lord’s life that Mark skips over. Jesus spent most of that year in and around Jerusalem. The Gospel of John gives further details of that year in ch. 1.
  - type: heading
    content: Jesus Calls Four Fishermen to Follow Him
  '14':
  - type: text
    content: 'Later on, after John the Baptizer was arrested, Jesus went back into the region of Galilee and preached the wonderful gospel of God’s kingdom. '
  - type: note
    content: As translated from the Aramaic and most Greek manuscripts.
  '15':
  - type: text
    content: 'His message was this: '
  - type: text
    content: “At last the fulfillment of the age has come! It is time for God’s kingdom to be experienced in its fullness!
  - type: text
    content: ' '
  - type: note
    content: Or “the kingdom of God is at hand,” that is, God’s kingdom is close enough to reach.
  - type: text
    content: Turn your lives back to God and put your trust in the hope-filled gospel!”
  - type: note
    content: The Greek is “believe the good news” (“the gospel”), and the Aramaic is “put your trust in the joyful message of hope.” This translation merges both concepts, making it “the hope-filled gospel.”
  '16':
  - type: text
    content: 'As Jesus was walking along the shore of Lake Galilee, he noticed two brothers fishing: Simon and Andrew. He watched them as they were casting their nets into the sea '
  '17':
  - type: text
    content: 'and said to them, '
  - type: text
    content: “Come follow me and I will transform you into fishers of men instead of fish!”
  - type: text
    content: ' '
  - type: note
    content: The metaphor of “fishers of people” simply means that they will persuade others and catch people for God.
  '18':
  - type: text
    content: 'Immediately they dropped their nets and left everything behind to follow Jesus. '
  '19':
  - type: text
    content: 'Walking a little farther, Jesus found two other brothers sitting in a boat, along with their father, mending their nets. Their names were Jacob '
  - type: note
    content: Or “James.” Other translations of the Bible substitute James for Jacob. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use the correct name, Jacob, throughout.
  - type: text
    content: 'and John, and their father Zebedee. '
  - type: note
    content: Zebedee means “my gift.” Zebedee’s gift to Jesus was his sons. A wise father will always want his children to be given to Jesus.
  '2':
  - type: text
    content: 'It starts with Isaiah the prophet, who wrote:'
  - type: text
    content: Listen! I am sending my messenger ahead of you
  - type: note
    content: See Ex. 23:20; Mal. 3:1.
  - type: text
    content: and he will prepare your way!
  '20':
  - type: text
    content: Jesus immediately walked up to them and invited the two brothers to become his followers. Jacob and John dropped their nets, stood up, left their father in the boat with the hired men, and followed Jesus.
  - type: note
    content: What a powerful effect Jesus had upon people! One encounter with the Son of God compelled these businessmen to leave their trade and follow Jesus. We learn from Luke 5:10 that the family of Zebedee was in business together with Simon (Peter) and Andrew. They owned the boat and had a hired crew, which makes one think they were somewhat prosperous business owners, for commercial fishermen in the time of Jesus were usually wealthy.
  - type: heading
    content: People Stunned by Jesus’ Teachings
  '21':
  - type: text
    content: 'Then Jesus and his disciples went to Capernaum, '
  - type: note
    content: Capernaum means “the village of Nahum.” Nahum means “comforted.” Jesus did many miracles and made his Galilean base of ministry in “the village of the comforted.”
  - type: text
    content: 'and he immediately started teaching on the Sabbath day in the synagogue. '
  '22':
  - type: text
    content: 'The people were awestruck '
  - type: note
    content: The Greek word used here, ekplesso, is a strong verb that means “awestruck, filled with amazement, astonished, panic stricken, something that takes your breath away (being hit with a blow), to be shocked, to expel, to drive out.” Clearly, Jesus spoke with such glory and power emanating from him that his words were like thunderbolts in their hearts. May we hear his words in the same way today.
  - type: text
    content: 'by his teaching, because he taught in a way that demonstrated '
  - type: text
    content: God’s
  - type: text
    content: ' authority, which was quite unlike the religious scholars.'
  - type: note
    content: Or “scribes” (experts of the Law). Jesus taught from an inner knowledge of God and his Word, for his teaching emphasized obedience to God from the heart, not just outwardly keeping of laws.
  '23':
  - type: text
    content: 'Suddenly, during the meeting, a demon-possessed man screamed out, '
  '24':
  - type: text
    content: '“Hey! Leave us alone! Jesus the victorious, '
  - type: note
    content: As translated from the Aramaic. The Greek is “Jesus the Nazarene” (“Branch” or “Scion”).
  - type: text
    content: I know who you are. You’re God’s Holy One and you have come to destroy us!”
  - type: note
    content: The demon knew Jesus’ true identity before the people did. This is not so much a question (Have you come to destroy us?), but rather an assertive and defiant declaration. There is no question mark in the Greek text. The demonized man was apparently comfortable in the presence of the religious teachers, but when Jesus stepped into the room, he spoke out and couldn’t resist the power of Jesus.
  '25':
  - type: text
    content: 'Jesus rebuked him, saying, '
  - type: text
    content: “Silence! You are bound!
  - type: text
    content: ' '
  - type: note
    content: Or “muzzled.”
  - type: text
    content: Come out of him!”
  '26':
  - type: text
    content: 'The man’s body shook violently in spasms, and the demon hurled him to the floor until it finally came out of him with a deafening shriek! '
  '27':
  - type: text
    content: The crowd was awestruck and kept saying among themselves, “What is this new teaching that comes with such authority? With merely a word he commands demons to come out and they obey him!”
  '28':
  - type: text
    content: So the reports about Jesus spread like wildfire throughout every community in Galilee.
  - type: heading
    content: Jesus Heals Many
  '29':
  - type: text
    content: 'Now, as soon as they left the meeting, they went straight to Simon and Andrew’s house, along with Jacob and John. '
  '3':
  - type: text
    content: He is a thunderous voice of one
  - type: text
    content: 'who shouts in the wilderness:'
  - type: text
    content: “Prepare your hearts
  - type: text
    content: 'for the coming of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: and clear a straight path
  - type: note
    content: Or “Prepare the way for the Lord and make his beaten paths straight, level, and passable.” This “way” is not a road, but preparing the heart, making room for the ways of the Lord.
  - type: text
    content: inside your hearts for him!”
  - type: note
    content: See Isa. 40:3.
  '30':
  - type: text
    content: 'Simon’s mother-in-law was bedridden, sick with a high fever, so the first thing they did was to tell Jesus about her. '
  '31':
  - type: text
    content: He walked up to her bedside, gently took her hand, and raised her up! Her fever disappeared and she began to serve them.
  '32':
  - type: text
    content: 'Later in the day, '
  - type: text
    content: just after the Sabbath ended
  - type: text
    content: ' '
  - type: note
    content: Implied in the context.
  - type: text
    content: 'at sunset, the people kept bringing to Jesus all who were sick and tormented by demons, '
  '33':
  - type: text
    content: 'until the whole village was crowded around the house. '
  '34':
  - type: text
    content: 'Jesus healed many who were sick '
  - type: note
    content: The Greek word kakos is actually the word for “evil”; however, it is traditionally translated “sickness.”
  - type: text
    content: with various diseases and cast out many demons. But he would not permit the demons to speak, because they knew who he really was.
  - type: note
    content: Jesus wants us to proclaim who he is, not demons.
  - type: heading
    content: Jesus Prays, Preaches, Heals, and Casts Out Demons
  '35':
  - type: text
    content: 'The next morning, Jesus got up long before daylight, left the house while it was dark, and made his way to a secluded place to give himself to prayer. '
  '36':
  - type: text
    content: 'Later, Simon and his friends searched for him, '
  '37':
  - type: text
    content: and when they finally tracked him down, they told him, “Everyone is looking for you—they want you!”
  '38':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “We have to go on to the surrounding villages so that I can share my message with the people there, for that is my mission.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: So he went throughout the region of Galilee, preaching in the Jewish synagogues and casting out demons.
  '4':
  - type: text
    content: 'John the Baptizer '
  - type: note
    content: John was the son of Zechariah, a priest. As the son of a priest, John was qualified to serve in the temple but chose instead the lonely wilderness to begin his ministry of calling a nation to repentance and preparing the way for the Lord Jesus.
  - type: text
    content: 'was the messenger who appeared in the wilderness, preaching a baptism of repentance '
  - type: note
    content: That is, “an immersion that will bring a change of heart and lead you into repentance” for the complete cancellation of sins.
  - type: text
    content: 'for the complete cancellation of sins. '
  '40':
  - type: text
    content: 'On one occasion, a leper came and threw himself down in front of Jesus, pleading for his healing, saying, “You have the power to heal me right now if only you really want to!” '
  '41':
  - type: text
    content: 'Being deeply moved with tender compassion, '
  - type: note
    content: This is an intense emotion. Some Greek manuscripts have “Jesus was moved with anger” (at the leprosy, not the man). However, the Aramaic is clearly “moved with compassion.” The two Aramaic words for “anger” and “compassion” are written almost identically. Perhaps both are correct. Jesus was deeply moved with compassion toward the man and angry at the disease.
  - type: text
    content: 'Jesus reached out and touched the skin of the leper and told him, '
  - type: text
    content: “Of course I want you to be healed—so now, be cleansed!”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Instantly his leprous sores completely disappeared and his skin became smooth! '
  '43':
  - type: text
    content: 'Jesus sent him away with a very stern warning, '
  - type: note
    content: The Greek word embrimaomai can mean “to sternly give a warning”; however, in John 11:33 it is translated “was deeply moved with tenderness and compassion.” The miracle of healing this leper had a profound effect on both Jesus and the man who was healed.
  '44':
  - type: text
    content: 'saying, '
  - type: text
    content: “Don’t say anything to anyone
  - type: text
    content: ' '
  - type: text
    content: about what just happened
  - type: text
    content: ', but go find a priest and show him that you’ve been healed. Then bring the offering that Moses commanded for your cleansing as a living testimony to everyone.”'
  - type: note
    content: See Lev. 14:1–32. Normally, touching a leper would make a man unclean, but in this instance, the leper was healed and Jesus was not defiled.
  '45':
  - type: text
    content: 'But no sooner did the man leave than he began to proclaim his healing publicly '
  - type: note
    content: Or “preach.”
  - type: text
    content: and tell the story everywhere.
  - type: text
    content: Jesus’ growing fame prevented him from entering the villages openly, which forced him to remain in isolated places. Even so, a steady stream of people flocked to him from everywhere.
  '5':
  - type: text
    content: 'A steady stream of people came to be dipped in the Jordan River as they publicly confessed their sins. They came from all over southern Israel, '
  - type: note
    content: Or “Judea.”
  - type: text
    content: 'including nearly all the inhabitants of Jerusalem. '
  '6':
  - type: text
    content: 'John wore a rough garment made from camel hair, '
  - type: note
    content: John was not afraid to violate religious taboos. A camel was considered unclean in the Jewish tradition. He was wearing what others considered to be unclean. Those who break loose of religious tradition will often appear to be undignified, as was John. His commission was to inaugurate a new way of living according to the truths of Jesus Christ and the Holy Spirit.
  - type: text
    content: 'with a leather belt around his waist, '
  - type: note
    content: This was considered to be the wardrobe of a prophet and was identical to what the prophet Elijah wore (2 Kings 1:8; Zech. 13:4). With a diet of locusts John points back to the four varieties of locusts mentioned in Joel 1:4. Locusts (grasshoppers) are an emblem of intimidation that will keep believers from taking their inheritance by faith. Israel thought themselves to be like grasshoppers in their own eyes because of the intimidation of the fierce inhabitants of the land. John the Baptizer arrives on the scene and makes locusts his food, eating up that symbol of intimidation (devouring the devourer). And he drank honey, which is a biblical metaphor of the revelation of God’s Word that is sweeter than honey (Ps. 19:7–10). John’s ministry was a prophetic statement from God that a new day had come, a day of leaving dead formalism and embracing new life in Jesus without intimidation.
  - type: text
    content: 'and he ate locusts and honey. '
  '7':
  - type: text
    content: 'And this is the message he kept preaching: “There is a man coming after me who is greater and a lot more powerful than I am. I’m not even worthy to bend down and untie the strap of his sandals. '
  '8':
  - type: text
    content: I’ve baptized you into water, but he will baptize you into the Spirit of Holiness!”
  - type: heading
    content: The Baptism and Testing of Jesus
  '9':
  - type: text
    content: 'One day, Jesus came from the Galilean village of Nazareth '
  - type: note
    content: It is possible to translate the Aramaic as “Then one day Jesus came from victorious revelation” to be baptized by John. The word Nazareth can mean “victorious one,” and the word Galilee can be translated “the place of revelation.”
  - type: text
    content: 'and had John immerse him in the Jordan River. '
