    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the beginning of the wonderful news about Jesus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the revelation of Jesus.”
    marker-yv: yv-n
  - type: text
    text: the Messiah, the Son of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the words “Son of God” are missing from some Greek manuscripts, it is found in the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'It starts with Isaiah the prophet, who wrote:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen! I am sending my messenger ahead of you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 23:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 3:1
      metadata:
        usfm: MAL.3.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will prepare your way!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He is a thunderous voice of one
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'who shouts in the wilderness:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Prepare your hearts
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the coming of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and clear a straight path
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Prepare the way for the Lord and make his beaten paths straight, level, and passable.” This “way” is not a road, but preparing the heart, making room for the ways of the Lord.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: inside your hearts for him!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 40:3
      metadata:
        usfm: ISA.40.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'John the Baptizer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John was the son of Zechariah, a priest. As the son of a priest, John was qualified to serve in the temple but chose instead the lonely wilderness to begin his ministry of calling a nation to repentance and preparing the way for the Lord Jesus.
    marker-yv: yv-n
  - type: text
    text: 'was the messenger who appeared in the wilderness, preaching a baptism of repentance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “an immersion that will bring a change of heart and lead you into repentance” for the complete cancellation of sins.
    marker-yv: yv-n
  - type: text
    text: 'for the complete cancellation of sins. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A steady stream of people came to be dipped in the Jordan River as they publicly confessed their sins. They came from all over southern Israel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Judea.”
    marker-yv: yv-n
  - type: text
    text: 'including nearly all the inhabitants of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'John wore a rough garment made from camel hair, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John was not afraid to violate religious taboos. A camel was considered unclean in the Jewish tradition. He was wearing what others considered to be unclean. Those who break loose of religious tradition will often appear to be undignified, as was John. His commission was to inaugurate a new way of living according to the truths of Jesus Christ and the Holy Spirit.
    marker-yv: yv-n
  - type: text
    text: 'with a leather belt around his waist, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was considered to be the wardrobe of a prophet and was identical to what the prophet Elijah wore (
    - type: text
      text: 2 Kings 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 13:4
      metadata:
        usfm: ZEC.13.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). With a diet of locusts John points back to the four varieties of locusts mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joel 1:4
      metadata:
        usfm: JOL.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Locusts (grasshoppers) are an emblem of intimidation that will keep believers from taking their inheritance by faith. Israel thought themselves to be like grasshoppers in their own eyes because of the intimidation of the fierce inhabitants of the land. John the Baptizer arrives on the scene and makes locusts his food, eating up that symbol of intimidation (devouring the devourer). And he drank honey, which is a biblical metaphor of the revelation of God’s Word that is sweeter than honey (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 19:7–10
      metadata:
        usfm: PSA.19.7+PSA.19.8+PSA.19.9+PSA.19.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). John’s ministry was a prophetic statement from God that a new day had come, a day of leaving dead formalism and embracing new life in Jesus without intimidation.
    marker-yv: yv-n
  - type: text
    text: 'and he ate locusts and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And this is the message he kept preaching: “There is a man coming after me who is greater and a lot more powerful than I am. I’m not even worthy to bend down and untie the strap of his sandals. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I’ve baptized you into water, but he will baptize you into the Spirit of Holiness!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Baptism and Testing of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'One day, Jesus came from the Galilean village of Nazareth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible to translate the Aramaic as “Then one day Jesus came from victorious revelation” to be baptized by John. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nazareth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can mean “victorious one,” and the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Galilee
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “the place of revelation.”
    marker-yv: yv-n
  - type: text
    text: 'and had John immerse him in the Jordan River. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The moment Jesus rose up out of the water, John saw the heavenly realm split open, and the Holy Spirit descended upon him like a dove. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Lord Jesus was buried in baptism, symbolically into death (the Jordan) so that he might minister not in the natural way of men, but in the way of resurrection by the power of the Holy Spirit. The dove, an emblem of the Holy Spirit, pictures both meekness and purity. The implication is that the Holy Spirit came upon Jesus and never left him.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At the same time, a voice spoke from heaven, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Son, my cherished one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my greatest delight is in you!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although not a direct quotation, the wording is similar to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 2:7
      metadata:
        usfm: PSA.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Immediately after this he was compelled by the Holy Spirit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cast out [or ‘thrown,’ or ‘pushed’] into the wilderness.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekballei
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is often used for driving out demons. This was a forceful compelling of the Holy Spirit.
    marker-yv: yv-n
  - type: text
    text: 'to go into an uninhabited desert region. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He remained there in the wilderness for forty days, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “forty days” points to Moses, Elijah, and David, who were all great champions in Israel’s history. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 17:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 19:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '15'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: enduring the ordeals of Satan’s tests. He encountered wild animals, but also angels who appeared and ministered to his needs.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Between vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: MRK.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: MRK.1.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: there is an entire year of our Lord’s life that Mark skips over. Jesus spent most of that year in and around Jerusalem. The Gospel of John gives further details of that year in ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1'
      metadata:
        usfm: JHN.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Four Fishermen to Follow Him
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Later on, after John the Baptizer was arrested, Jesus went back into the region of Galilee and preached the wonderful gospel of God’s kingdom. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and most Greek manuscripts.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'His message was this: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “At last the fulfillment of the age has come! It is time for God’s kingdom to be experienced in its fullness!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the kingdom of God is at hand,” that is, God’s kingdom is close enough to reach.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Turn your lives back to God and put your trust in the hope-filled gospel!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is “believe the good news” (“the gospel”), and the Aramaic is “put your trust in the joyful message of hope.” This translation merges both concepts, making it “the hope-filled gospel.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As Jesus was walking along the shore of Lake Galilee, he noticed two brothers fishing: Simon and Andrew. He watched them as they were casting their nets into the sea '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come follow me and I will transform you into fishers of men instead of fish!”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The metaphor of “fishers of people” simply means that they will persuade others and catch people for God.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Immediately they dropped their nets and left everything behind to follow Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Walking a little farther, Jesus found two other brothers sitting in a boat, along with their father, mending their nets. Their names were Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “James.” Other translations of the Bible substitute James for Jacob. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use the correct name, Jacob, throughout.
    marker-yv: yv-n
  - type: text
    text: 'and John, and their father Zebedee. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zebedee means “my gift.” Zebedee’s gift to Jesus was his sons. A wise father will always want his children to be given to Jesus.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jesus immediately walked up to them and invited the two brothers to become his followers. Jacob and John dropped their nets, stood up, left their father in the boat with the hired men, and followed Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What a powerful effect Jesus had upon people! One encounter with the Son of God compelled these businessmen to leave their trade and follow Jesus. We learn from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 5:10
      metadata:
        usfm: LUK.5.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that the family of Zebedee was in business together with Simon (Peter) and Andrew. They owned the boat and had a hired crew, which makes one think they were somewhat prosperous business owners, for commercial fishermen in the time of Jesus were usually wealthy.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: People Stunned by Jesus’ Teachings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Jesus and his disciples went to Capernaum, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capernaum means “the village of Nahum.” Nahum means “comforted.” Jesus did many miracles and made his Galilean base of ministry in “the village of the comforted.”
    marker-yv: yv-n
  - type: text
    text: 'and he immediately started teaching on the Sabbath day in the synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The people were awestruck '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekplesso
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', is a strong verb that means “awestruck, filled with amazement, astonished, panic stricken, something that takes your breath away (being hit with a blow), to be shocked, to expel, to drive out.” Clearly, Jesus spoke with such glory and power emanating from him that his words were like thunderbolts in their hearts. May we hear his words in the same way today.'
    marker-yv: yv-n
  - type: text
    text: 'by his teaching, because he taught in a way that demonstrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' authority, which was quite unlike the religious scholars.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “scribes” (experts of the Law). Jesus taught from an inner knowledge of God and his Word, for his teaching emphasized obedience to God from the heart, not just outwardly keeping of laws.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Suddenly, during the meeting, a demon-possessed man screamed out, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Hey! Leave us alone! Jesus the victorious, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “Jesus the Nazarene” (“Branch” or “Scion”).
    marker-yv: yv-n
  - type: text
    text: I know who you are. You’re God’s Holy One and you have come to destroy us!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The demon knew Jesus’ true identity before the people did. This is not so much a question (Have you come to destroy us?), but rather an assertive and defiant declaration. There is no question mark in the Greek text. The demonized man was apparently comfortable in the presence of the religious teachers, but when Jesus stepped into the room, he spoke out and couldn’t resist the power of Jesus.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus rebuked him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Silence! You are bound!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “muzzled.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come out of him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The man’s body shook violently in spasms, and the demon hurled him to the floor until it finally came out of him with a deafening shriek! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The crowd was awestruck and kept saying among themselves, “What is this new teaching that comes with such authority? With merely a word he commands demons to come out and they obey him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So the reports about Jesus spread like wildfire throughout every community in Galilee.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Many
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now, as soon as they left the meeting, they went straight to Simon and Andrew’s house, along with Jacob and John. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Simon’s mother-in-law was bedridden, sick with a high fever, so the first thing they did was to tell Jesus about her. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He walked up to her bedside, gently took her hand, and raised her up! Her fever disappeared and she began to serve them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Later in the day, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: just after the Sabbath ended
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the context.
    marker-yv: yv-n
  - type: text
    text: 'at sunset, the people kept bringing to Jesus all who were sick and tormented by demons, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'until the whole village was crowded around the house. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus healed many who were sick '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
