    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prays, Preaches, Heals, and Casts Out Demons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The next morning, Jesus got up long before daylight, left the house while it was dark, and made his way to a secluded place to give himself to prayer. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Later, Simon and his friends searched for him, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: and when they finally tracked him down, they told him, “Everyone is looking for you—they want you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “We have to go on to the surrounding villages so that I can share my message with the people there, for that is my mission.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: So he went throughout the region of Galilee, preaching in the Jewish synagogues and casting out demons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'On one occasion, a leper came and threw himself down in front of Jesus, pleading for his healing, saying, “You have the power to heal me right now if only you really want to!” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Being deeply moved with tender compassion, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is an intense emotion. Some Greek manuscripts have “Jesus was moved with anger” (at the leprosy, not the man). However, the Aramaic is clearly “moved with compassion.” The two Aramaic words for “anger” and “compassion” are written almost identically. Perhaps both are correct. Jesus was deeply moved with compassion toward the man and angry at the disease.
    marker-yv: yv-n
  - type: text
    text: 'Jesus reached out and touched the skin of the leper and told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Of course I want you to be healed—so now, be cleansed!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Instantly his leprous sores completely disappeared and his skin became smooth! '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesus sent him away with a very stern warning, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: embrimaomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can mean “to sternly give a warning”; however, in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 11:33
      metadata:
        usfm: JHN.11.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: it is translated “was deeply moved with tenderness and compassion.” The miracle of healing this leper had a profound effect on both Jesus and the man who was healed.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t say anything to anyone
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: about what just happened
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', but go find a priest and show him that you’ve been healed. Then bring the offering that Moses commanded for your cleansing as a living testimony to everyone.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 14:1–32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Normally, touching a leper would make a man unclean, but in this instance, the leper was healed and Jesus was not defiled.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'But no sooner did the man leave than he began to proclaim his healing publicly '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “preach.”
    marker-yv: yv-n
  - type: text
    text: and tell the story everywhere.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus’ growing fame prevented him from entering the villages openly, which forced him to remain in isolated places. Even so, a steady stream of people flocked to him from everywhere.
