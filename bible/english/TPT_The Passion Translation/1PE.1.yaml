document_id: 1PE.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Living Hope
  - type: text
    content: 'From Peter, an apostle of Jesus the Anointed One, to the chosen ones '
  - type: note
    content: Or “elect” (believers). As God’s chosen people, this would also refer to the faithful within unfaithful Israel.
  - type: text
    content: 'who have been scattered like “seed” into the nations living as refugees '
  - type: note
    content: First Peter, Hebrews, and Jacob were all written to believers who had been scattered like “seed” among the nations due to persecution. Exile is the way the original audience would have described the situation in their day. “Refugees” is a modern equivalent in ours.
  - type: text
    content: 'in Pontus, '
  - type: note
    content: Pontus is the region of the Turkish coast of the Black Sea.
  - type: text
    content: 'Galatia, Cappadocia, '
  - type: note
    content: Galatia and Cappadocia are regions of central Turkey.
  - type: text
    content: 'and throughout '
  - type: text
    content: the Roman provinces of
  - type: text
    content: ' Asia and Bithynia. '
  - type: note
    content: The provinces of Asia (Minor) and Bithynia are modern-day western Turkey.
  '10':
  - type: text
    content: 'This salvation was the focus of the prophets who prophesied of this '
  - type: text
    content: outpouring of
  - type: text
    content: ' grace that was destined for you. They made a careful search and investigation of the meaning '
  - type: text
    content: of their God-given prophecies
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'as they probed into '
  - type: text
    content: the mysteries
  - type: text
    content: ' of who would fulfill them and the time period when it would all take place. The Spirit of the Anointed One was in them '
  - type: note
    content: The Spirit of Christ was in the prophets of the Old Testament. This means that Enoch, Abraham, Jacob, Moses, Elijah, Elisha, Isaiah, Jeremiah, and all the prophets who prophesied did so by the Holy Spirit living in them. Today every believer has the Holy Spirit within him or her and everyone may prophesy. See Rom. 8:9; 1 Cor. 12; 14.
  - type: text
    content: 'and was pointing prophetically to the sufferings that Christ was destined to suffer and the glories that would be released afterward. '
  '12':
  - type: text
    content: 'God revealed to the prophets that their ministry was not for their own benefit '
  - type: note
    content: That is, the prophets understood that their prophecies were not only for their generation but for generations to come.
  - type: text
    content: 'but for yours. And now, you have heard these things from the evangelists '
  - type: note
    content: The Aramaic can be translated “extenders of hope.”
  - type: text
    content: 'who preached the gospel to you through '
  - type: text
    content: the power of
  - type: text
    content: ' the Holy Spirit sent from heaven—the gospel '
  - type: text
    content: containing wonderful mysteries
  - type: text
    content: ' that even the angels long to get a glimpse of.'
  - type: note
    content: Heavenly angels are fascinated with God’s mercy shown toward us. His wise plan of making former rebels into lovers has mystified the angelic realm. The church is the University of Angels and every believer a professor. Angels long to peer into the mysteries of God’s grace, which have been lavished upon us. How much more should we be fascinated explorers of the mercy of God, for we have received it and are now redeemed. See also Eph. 3:10.
  - type: heading
    content: A Call to Holiness
  '13':
  - type: text
    content: 'So then, prepare your '
  - type: text
    content: hearts and
  - type: text
    content: ' minds for action! '
  - type: note
    content: We would say today, “Roll up your sleeves,” or, “Fasten your seat belt!”
  - type: text
    content: 'Stay alert and fix your hope firmly on the marvelous grace that is coming to you. For when Jesus Christ is unveiled, '
  - type: note
    content: 'Or “to come out of concealment, appear, be made manifest, revealed.” Peter uses the Greek word apokàlypsis, which is the title of the last book in the Bible, Revelation: The Unveiling of Jesus Christ. The Aramaic can be translated “Stay alert and share the news about the joy that came to you with the revelation of Jesus the Messiah.”'
  - type: text
    content: a greater measure of
  - type: text
    content: ' grace will be released to you. '
  '14':
  - type: text
    content: 'As God’s obedient children, never again shape your lives by the desires that you followed when you didn’t know better. '
  '15':
  - type: text
    content: 'Instead, shape your lives to become like the Holy One who called you. '
  '16':
  - type: text
    content: 'For Scripture says:'
  - type: text
    content: “You are to be holy, because I am holy.”
  - type: note
    content: See Lev. 11:44; 19:2. Everything about God is holy. True holiness includes justice, mercy, truth, and righteousness. To be holy is to be absolutely devoted to God in all that we do, demonstrating who he is to the world. Holiness surrounds God’s throne and we are seated with him in heavenly places (Eph. 2:6). The Hebraic concept of holiness is “set apart”; that is, we are a people set apart for God, even as God is “set apart” from all gods. Grace has imbedded holiness into our lives, yet we are to make right choices and to yield to Christ and God’s Word as the Holy Spirit lives in us. Holiness is not merely actions we perform, but what we absorb and manifest as we live our lives in God’s presence. Christ is our holiness (1 Cor. 1:30).
  '17':
  - type: text
    content: 'Since you call on him as your heavenly Father, the impartial Judge who judges according to each one’s works, '
  - type: note
    content: The Aramaic can be translated “no one will put on a face mask before him.” Believers in Jesus will not be judged for their sins, since that happened once and for all when Jesus was crucified to redeem us. We will be judged, however, for our works in order to determine the reward (or lack of reward) that God gives to those who believe in Christ. See Isa. 53:4–5; Rom. 14:10–12; 1 Cor. 3:12–15; 1 Peter 2:24.
  - type: text
    content: 'live each day with holy awe and reverence throughout your time on earth. '
  - type: note
    content: Or “throughout the time of your exile.”
  '18':
  - type: text
    content: 'For you know that your lives were ransomed once and for all from the empty and futile way of life handed down from generation to generation. It was not a ransom payment of silver and gold, which eventually perishes, '
  '19':
  - type: text
    content: 'but the precious blood of Christ—who like a spotless, unblemished lamb was '
  - type: text
    content: sacrificed for us
  - type: text
    content: .
  - type: note
    content: See Ex. 12; Lev. 22:20–25; Isa. 53:7; John 1:29; Heb. 4:15; 7:26–27.
  '2':
  - type: text
    content: You are not forgotten
  - type: text
    content: ', for you have been chosen and destined by Father God. The Holy Spirit has set you apart to be God’s holy ones, obedient followers of Jesus Christ who have been '
  - type: text
    content: gloriously
  - type: text
    content: ' sprinkled with his blood. May God’s delightful grace and peace cascade over you many times over!'
  - type: note
    content: 'Or “be multiplied to you.” Notice all three members of the Trinity are mentioned in this verse: Father God, the Holy Spirit, and Jesus Christ. We are chosen by the Father, set apart (or sanctified) by the Holy Spirit, and submitted to Christ.'
  '20':
  - type: text
    content: This was part of God’s plan
  - type: text
    content: ', for he was chosen and destined for this before the foundation of the earth was laid, '
  - type: note
    content: Or “before the fall of the world.” The Greek word kataboles can possibly mean “lay a foundation,” or “a fall,” or “casting down.” See also Eph. 1:4.
  - type: text
    content: 'but he has been made manifest in these last days for you. '
  '21':
  - type: text
    content: 'It is through him that you now believe in God, '
  - type: note
    content: Or “You believe in him.”
  - type: text
    content: 'who raised him from the dead and glorified him, '
  - type: note
    content: As translated from the Aramaic. The Greek is “and gave him glory.”
  - type: text
    content: 'so that you would fasten your faith and hope in God '
  - type: text
    content: alone
  - type: text
    content: .
  - type: heading
    content: Love and Purity
  '22':
  - type: text
    content: 'Now, because of your obedience to the truth, '
  - type: note
    content: Most later manuscripts have “through the Spirit.” It is generally recognized by scholars today that this was likely an addition to the text.
  - type: text
    content: 'you have purified your very souls, and this empowers you to be full of love for your fellow believers. So express this sincere love toward one another passionately and with a pure heart. '
  - type: note
    content: 'This verse is packed with the virtues that should be seen in the lives of believers: obedience, truth, purification of our souls, authentic (sincere) love, fervent (passionate) expressions of love, and heart purity.'
  '23':
  - type: text
    content: 'For through the eternal and living Word of God '
  - type: note
    content: Or “the Word of the living and enduring God.”
  - type: text
    content: 'you have been born again. And this “seed” that he planted within you can never be destroyed but will live '
  - type: text
    content: and grow
  - type: text
    content: ' inside of you forever. For:'
  '24':
  - type: text
    content: 'Human beings '
  - type: note
    content: Or “All flesh.”
  - type: text
    content: 'are '
  - type: text
    content: frail and temporary
  - type: text
    content: ', like grass,'
  - type: text
    content: 'and the glory of man '
  - type: text
    content: fleeting
  - type: text
    content: like blossoms of the field.
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: The grass dries and withers and the flowers fall off,
  '25':
  - type: text
    content: but the Word of the Lord endures forever!
  - type: note
    content: See Isa. 40:6–8.
  - type: text
    content: 'And this is the Word '
  - type: note
    content: As translated from the Aramaic. This reveals that Jesus is the Word proclaimed to the world. See John 1:1. The Greek is “This is the good news announced to you.”
  - type: text
    content: that was announced to you!
  '3':
  - type: text
    content: 'Celebrate with praises the God and Father of our Lord Jesus Christ, who has shown us his extravagant mercy. For his '
  - type: text
    content: fountain of
  - type: text
    content: ' mercy has given us a new life—we are reborn '
  - type: note
    content: This is the only place in the New Testament where the Greek verb anagennaō is found (a hapax legomenon). This shows that God himself is the one who gives us new birth as newborn believers filled with the life of Christ. God is truly our Father, who gives us new life through his living mercy.
  - type: text
    content: 'to experience a living, energetic hope '
  - type: note
    content: Some Greek manuscripts and the Aramaic read “the hope of life.”
  - type: text
    content: 'through the resurrection of Jesus Christ from the dead. '
  - type: note
    content: Peter states that the first result of our new birth is that we are brought into a living hope in the power of God, based on the resurrection of Christ. The God of resurrection gives us a powerful hope to excel in life.
  '4':
  - type: text
    content: 'We are reborn into a perfect inheritance '
  - type: note
    content: The second result that comes from our new birth is an eternal inheritance, which is available now by faith, and will also be reserved in heaven for us when we pass from death to life. Paul describes it as “every spiritual blessing” that has already been given to us by God (Eph. 1:3).
  - type: text
    content: that can never perish, never be defiled, and never diminish. It is promised and preserved forever in the heavenly realm for you!
  - type: note
    content: This would no doubt encourage those believers who had scattered from their homelands and been deprived of what they once possessed. Their blessings (and ours) are not only material, but spiritual, from a transcendent reality.
  '5':
  - type: text
    content: 'Through our faith, the mighty power of God constantly guards '
  - type: note
    content: The Greek word for “guards us” is phrouroumenous, which comes from a military term (phrouria) meaning “a fort” or “an army garrison stationed to defend a city.” You are continually being watched over and protected by God’s mighty power.
  - type: text
    content: 'us until our '
  - type: text
    content: full
  - type: text
    content: ' salvation '
  - type: note
    content: The third result of our new birth that Peter mentions is our full salvation (or deliverance) that will come when Christ is unveiled. It is ready to be revealed and waits for our discovery.
  - type: text
    content: 'is ready to be revealed '
  - type: note
    content: 'The Greek verb apokalyptō means “to unveil and disclose.” Peter is saying that there is a more complete salvation awaiting us when Christ is unveiled in the last days. The nominalized form of apokalyptō is the title of the last book of the Bible, Revelation: The Unveiling of Jesus Christ. In just a few verses Peter will tell us that a “grace” will also be unveiled to us in the last days (1:13).'
  - type: text
    content: 'in the last time. '
  '6':
  - type: text
    content: 'May the thought of this cause you to jump for joy, '
  - type: note
    content: Or “exult in joy.” The Aramaic can be translated “rejoice for eternity.”
  - type: text
    content: 'even though lately you’ve had to put up with the grief of many trials. '
  - type: note
    content: Peter speaks of believers suffering difficulties and persecutions four times in his first letter (1:6–7; 3:13–17; 4:12–19; 5:9).
  '7':
  - type: text
    content: 'But these only reveal the sterling core '
  - type: note
    content: Or “proven character.”
  - type: text
    content: 'of your faith, which is far more valuable than gold that perishes, for even gold is refined by fire. '
  - type: text
    content: Your authentic faith
  - type: text
    content: ' will result in even more praise, glory, and honor when Jesus the Anointed One is revealed.'
  - type: note
    content: Or “comes out of his concealment.”
  '8':
  - type: text
    content: 'You love him passionately although you have not seen him, but through believing in him you are saturated with an ecstatic joy, indescribably sublime and immersed in glory. '
  - type: note
    content: The Aramaic can be translated “a glorification that cannot be described.”
  '9':
  - type: text
    content: For you are reaping the harvest of your faith—the full salvation promised you—your souls’ victory!
  - type: note
    content: Or “the salvation of your souls.”
  - type: heading
    content: Overcoming Grace
