document_id: 1PE.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Living Hope
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'From Peter, an apostle of Jesus the Anointed One, to the chosen ones '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “elect” (believers). As God’s chosen people, this would also refer to the faithful within unfaithful Israel.
    marker-yv: yv-n
  - type: text
    text: 'who have been scattered like “seed” into the nations living as refugees '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: First Peter, Hebrews, and Jacob were all written to believers who had been scattered like “seed” among the nations due to persecution. Exile is the way the original audience would have described the situation in their day. “Refugees” is a modern equivalent in ours.
    marker-yv: yv-n
  - type: text
    text: 'in Pontus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pontus is the region of the Turkish coast of the Black Sea.
    marker-yv: yv-n
  - type: text
    text: 'Galatia, Cappadocia, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Galatia and Cappadocia are regions of central Turkey.
    marker-yv: yv-n
  - type: text
    text: 'and throughout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Roman provinces of
  - type: text
    text: ' Asia and Bithynia. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The provinces of Asia (Minor) and Bithynia are modern-day western Turkey.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You are not forgotten
  - type: text
    text: ', for you have been chosen and destined by Father God. The Holy Spirit has set you apart to be God’s holy ones, obedient followers of Jesus Christ who have been '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gloriously
  - type: text
    text: ' sprinkled with his blood. May God’s delightful grace and peace cascade over you many times over!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “be multiplied to you.” Notice all three members of the Trinity are mentioned in this verse: Father God, the Holy Spirit, and Jesus Christ. We are chosen by the Father, set apart (or sanctified) by the Holy Spirit, and submitted to Christ.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celebrate with praises the God and Father of our Lord Jesus Christ, who has shown us his extravagant mercy. For his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fountain of
  - type: text
    text: ' mercy has given us a new life—we are reborn '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the only place in the New Testament where the Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anagennaō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is found (a hapax legomenon). This shows that God himself is the one who gives us new birth as newborn believers filled with the life of Christ. God is truly our Father, who gives us new life through his living mercy.
    marker-yv: yv-n
  - type: text
    text: 'to experience a living, energetic hope '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts and the Aramaic read “the hope of life.”
    marker-yv: yv-n
  - type: text
    text: 'through the resurrection of Jesus Christ from the dead. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peter states that the first result of our new birth is that we are brought into a living hope in the power of God, based on the resurrection of Christ. The God of resurrection gives us a powerful hope to excel in life.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We are reborn into a perfect inheritance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The second result that comes from our new birth is an eternal inheritance, which is available now by faith, and will also be reserved in heaven for us when we pass from death to life. Paul describes it as “every spiritual blessing” that has already been given to us by God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 1:3
      metadata:
        usfm: EPH.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: that can never perish, never be defiled, and never diminish. It is promised and preserved forever in the heavenly realm for you!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This would no doubt encourage those believers who had scattered from their homelands and been deprived of what they once possessed. Their blessings (and ours) are not only material, but spiritual, from a transcendent reality.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Through our faith, the mighty power of God constantly guards '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “guards us” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: phrouroumenous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which comes from a military term ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: phrouria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) meaning “a fort” or “an army garrison stationed to defend a city.” You are continually being watched over and protected by God’s mighty power.
    marker-yv: yv-n
  - type: text
    text: 'us until our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: full
  - type: text
    text: ' salvation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The third result of our new birth that Peter mentions is our full salvation (or deliverance) that will come when Christ is unveiled. It is ready to be revealed and waits for our discovery.
    marker-yv: yv-n
  - type: text
    text: 'is ready to be revealed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apokalyptō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to unveil and disclose.” Peter is saying that there is a more complete salvation awaiting us when Christ is unveiled in the last days. The nominalized form of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apokalyptō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is the title of the last book of the Bible, Revelation: The Unveiling of Jesus Christ. In just a few verses Peter will tell us that a “grace” will also be unveiled to us in the last days ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:13
      metadata:
        usfm: 1PE.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'in the last time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'May the thought of this cause you to jump for joy, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “exult in joy.” The Aramaic can be translated “rejoice for eternity.”
    marker-yv: yv-n
  - type: text
    text: 'even though lately you’ve had to put up with the grief of many trials. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peter speaks of believers suffering difficulties and persecutions four times in his first letter (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:6–7
      metadata:
        usfm: 1PE.1.6+1PE.1.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:13–17
      metadata:
        usfm: 1PE.3.13+1PE.3.14+1PE.3.15+1PE.3.16+1PE.3.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:12–19
      metadata:
        usfm: 1PE.4.12+1PE.4.13+1PE.4.14+1PE.4.15+1PE.4.16+1PE.4.17+1PE.4.18+1PE.4.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:9
      metadata:
        usfm: 1PE.5.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But these only reveal the sterling core '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “proven character.”
    marker-yv: yv-n
  - type: text
    text: 'of your faith, which is far more valuable than gold that perishes, for even gold is refined by fire. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your authentic faith
  - type: text
    text: ' will result in even more praise, glory, and honor when Jesus the Anointed One is revealed.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “comes out of his concealment.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You love him passionately although you have not seen him, but through believing in him you are saturated with an ecstatic joy, indescribably sublime and immersed in glory. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “a glorification that cannot be described.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For you are reaping the harvest of your faith—the full salvation promised you—your souls’ victory!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the salvation of your souls.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Overcoming Grace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This salvation was the focus of the prophets who prophesied of this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: outpouring of
  - type: text
    text: ' grace that was destined for you. They made a careful search and investigation of the meaning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of their God-given prophecies
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'as they probed into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the mysteries
  - type: text
    text: ' of who would fulfill them and the time period when it would all take place. The Spirit of the Anointed One was in them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Spirit of Christ was in the prophets of the Old Testament. This means that Enoch, Abraham, Jacob, Moses, Elijah, Elisha, Isaiah, Jeremiah, and all the prophets who prophesied did so by the Holy Spirit living in them. Today every believer has the Holy Spirit within him or her and everyone may prophesy. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:9
      metadata:
        usfm: ROM.8.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 12
      metadata:
        usfm: 1CO.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: 1CO.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and was pointing prophetically to the sufferings that Christ was destined to suffer and the glories that would be released afterward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'God revealed to the prophets that their ministry was not for their own benefit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the prophets understood that their prophecies were not only for their generation but for generations to come.
    marker-yv: yv-n
  - type: text
    text: 'but for yours. And now, you have heard these things from the evangelists '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “extenders of hope.”
    marker-yv: yv-n
  - type: text
    text: 'who preached the gospel to you through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the power of
  - type: text
    text: ' the Holy Spirit sent from heaven—the gospel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: containing wonderful mysteries
  - type: text
    text: ' that even the angels long to get a glimpse of.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Heavenly angels are fascinated with God’s mercy shown toward us. His wise plan of making former rebels into lovers has mystified the angelic realm. The church is the University of Angels and every believer a professor. Angels long to peer into the mysteries of God’s grace, which have been lavished upon us. How much more should we be fascinated explorers of the mercy of God, for we have received it and are now redeemed. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 3:10
      metadata:
        usfm: EPH.3.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Holiness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So then, prepare your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hearts and
  - type: text
    text: ' minds for action! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We would say today, “Roll up your sleeves,” or, “Fasten your seat belt!”
    marker-yv: yv-n
  - type: text
    text: 'Stay alert and fix your hope firmly on the marvelous grace that is coming to you. For when Jesus Christ is unveiled, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
