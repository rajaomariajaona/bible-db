        text: . Everything about God is holy. True holiness includes justice, mercy, truth, and righteousness. To be holy is to be absolutely devoted to God in all that we do, demonstrating who he is to the world. Holiness surrounds God’s throne and we are seated with him in heavenly places (
    - type: usfm
