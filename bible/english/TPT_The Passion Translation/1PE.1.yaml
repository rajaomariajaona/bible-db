        text: ). The Hebraic concept of holiness is “set apart”; that is, we are a people set apart for God, even as God is “set apart” from all gods. Grace has imbedded holiness into our lives, yet we are to make right choices and to yield to Christ and God’s Word as the Holy Spirit lives in us. Holiness is not merely actions we perform, but what we absorb and manifest as we live our lives in God’s presence. Christ is our holiness (
