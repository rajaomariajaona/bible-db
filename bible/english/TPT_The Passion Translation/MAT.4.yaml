document_id: MAT.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Tempted by the Devil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Afterward, the Holy Spirit led Jesus into the wilderness to experience the ordeal of testing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “tribulation.” God also tested Israel for forty years in the wilderness. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 8:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'by the accuser. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “devil.” The Aramaic word for “devil” means “accuser.” The Greek word is “slanderer.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And after fasting for forty days, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses and Elijah both fasted forty days. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 19:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The number forty usually signifies passing a test or enduring a time of trial. It rained for forty days in the time of Noah, and Jonah warned Nineveh for forty days. God told Ezekiel to lay on his right side for forty days (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 4:6
      metadata:
        usfm: EZK.4.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Jesus was extremely hungry. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then the tempter came to him and said, “How can you possibly be the Son of God and go hungry? Just command these stones to be turned into loaves of bread.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The Scriptures say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Bread alone will not satisfy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Man will not live by bread alone.” Nothing can satisfy the Son’s appetite but the words of God.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but true life is found in every word
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that constantly goes forth from God’s mouth.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 8:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . God had not given Jesus permission to turn stones into bread, and Jesus would not be pushed into prematurely demonstrating his power. He was content with the timing of his Father. He refused to turn stones into bread to feed himself, but he multiplied bread for his hungry followers. Today he is still turning hearts of stone into living bread that will feed the nations with truth.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the accuser transported Jesus to the holy city of Jerusalem and perched him at the highest point '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wing.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 91:4
      metadata:
        usfm: PSA.91.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'of the temple '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and said to him, “If you’re really God’s Son, jump, and the angels will catch you. For it is written in the Scriptures:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will command his angels to protect you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will lift you up
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that you won’t even bruise your foot on a rock.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 91:11–12
      metadata:
        usfm: PSA.91.11+PSA.91.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 26:53
      metadata:
        usfm: MAT.26.53
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This was a temptation to capitalize on being the Son of God and to force God to protect him as he jumped. Jesus was being tested over restraining his power as the Anointed One and waiting until the timing of his Father in publicly releasing him to work miracles and display his power. He was not sent to throw himself down from the temple, but to throw down the temple and establish a new order of worship—as a true relationship with God is internal with every believer now becoming the temple of God. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 3:16
      metadata:
        usfm: 1CO.3.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:19
      metadata:
        usfm: 1CO.6.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Once again Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The Scriptures say:'
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You must never put the Lord your God to a test.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 6:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the third time the accuser lifted Jesus up onto a very high mountain range and showed him all the kingdoms of the world and all the splendor that goes with it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “All of these kingdoms I will give to you,” the accuser said, “if only you will kneel down before me and worship me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go away, Satan!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Satan.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For the Scriptures say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Kneel before the Lord your God
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and worship only him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 6:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: At once the accuser left him, and angels suddenly gathered around Jesus to minister to his needs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Preaches in Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Jesus heard that John the Baptizer had been thrown into prison, he went back into Galilee. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus moved from Nazareth to make his home in Capernaum, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capernaum means “the village of Nahum.” It was a fishing village on the northwestern shore of Lake Galilee. Nahum means “comforted.” Jesus did many miracles and based his Galilean ministry in the “village of the comforted.”
    marker-yv: yv-n
  - type: text
    text: 'which is by Lake Galilee in the land of Zebulun and Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He did this to make the prophecy of Isaiah come true:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Listen, you who live in the land of Zebulun
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the land of Naphtali,
- type: usfm
  marker: q1
  children:
  - type: text
    text: along the road to the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: and on the other side of the Jordan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and Galilee—the land of the Gentiles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You who spend your days shrouded in darkness
- type: usfm
  marker: q1
  children:
  - type: text
    text: can now say, “We have seen a brilliant Light.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Light is a common name for the Messiah in rabbinical literature. It speaks of both Christ and the revelatory teaching he brings. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 9:1–2
      metadata:
        usfm: ISA.9.1+ISA.9.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Aramaic word for Galilee (
    - type: usfm
      marker: it
      children:
      - type: text
        text: Galeela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) means “revelation of God.” Jesus was raised and ministered in the land of the “revelation of God.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who live in the dark shadow land of death
- type: usfm
  marker: q1
  children:
  - type: text
    text: can now say, “The Dawning Light arises on us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From that time on Jesus began to proclaim his message with these words: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Keep turning away from your sins and come back to God, for heaven’s kingdom realm is now accessible.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “close enough to touch!”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls His Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As he was walking by the shore of Lake Galilee, Jesus noticed two fishermen who were brothers. One was nicknamed Keefa '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Simon.” The Aramaic is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Keefa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “the rock” or “pebble.” Peter ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: Petros
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is his Greek name.
    marker-yv: yv-n
  - type: text
    text: '(later called Peter), and the other was Andrew, his brother. Watching as they were casting their nets into the water, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus called out to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come and follow me, and I will transform you into men who catch people for God.”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fishers of men.” The Aramaic word can mean either “fishers” or “hunters.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 47:1–10
      metadata:
        usfm: EZK.47.1+EZK.47.2+EZK.47.3+EZK.47.4+EZK.47.5+EZK.47.6+EZK.47.7+EZK.47.8+EZK.47.9+EZK.47.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Immediately they dropped their nets and left everything behind to follow Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Leaving there, Jesus found three other men sitting in a boat, mending their nets. Two were brothers, Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “James.” Most translations of the Bible have substituted Jacob with James. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use the correct name, Jacob, throughout.
    marker-yv: yv-n
  - type: text
    text: 'and John, and they were with their father, Zebedee. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zebedee’s name means “my gift.” The gift he gave to Jesus was his two sons. All parents have the privilege of giving their children back to God.
    marker-yv: yv-n
  - type: text
    text: 'Jesus called Jacob and John to his side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and said to them
  - type: text
    text: ', '
