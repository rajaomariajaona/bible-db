document_id: MAT.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Tempted by the Devil
  - type: text
    content: 'Afterward, the Holy Spirit led Jesus into the wilderness to experience the ordeal of testing '
  - type: note
    content: Or “tribulation.” God also tested Israel for forty years in the wilderness. See Deut. 8:2.
  - type: text
    content: 'by the accuser. '
  - type: note
    content: Or “devil.” The Aramaic word for “devil” means “accuser.” The Greek word is “slanderer.”
  '10':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Go away, Satan!
  - type: text
    content: ' '
  - type: note
    content: Or “Satan.”
  - type: text
    content: 'For the Scriptures say:'
  - type: text
    content: Kneel before the Lord your God
  - type: text
    content: and worship only him.”
  - type: note
    content: See Deut. 6:13–14.
  '11':
  - type: text
    content: At once the accuser left him, and angels suddenly gathered around Jesus to minister to his needs.
  - type: heading
    content: Jesus Preaches in Galilee
  '12':
  - type: text
    content: 'When Jesus heard that John the Baptizer had been thrown into prison, he went back into Galilee. '
  '13':
  - type: text
    content: 'Jesus moved from Nazareth to make his home in Capernaum, '
  - type: note
    content: Capernaum means “the village of Nahum.” It was a fishing village on the northwestern shore of Lake Galilee. Nahum means “comforted.” Jesus did many miracles and based his Galilean ministry in the “village of the comforted.”
  - type: text
    content: 'which is by Lake Galilee in the land of Zebulun and Naphtali. '
  '14':
  - type: text
    content: 'He did this to make the prophecy of Isaiah come true:'
  '15':
  - type: text
    content: Listen, you who live in the land of Zebulun
  - type: text
    content: and the land of Naphtali,
  - type: text
    content: along the road to the sea
  - type: text
    content: and on the other side of the Jordan,
  - type: text
    content: and Galilee—the land of the Gentiles!
  '16':
  - type: text
    content: You who spend your days shrouded in darkness
  - type: text
    content: can now say, “We have seen a brilliant Light.”
  - type: note
    content: Light is a common name for the Messiah in rabbinical literature. It speaks of both Christ and the revelatory teaching he brings. See Isa. 9:1–2. The Aramaic word for Galilee (Galeela) means “revelation of God.” Jesus was raised and ministered in the land of the “revelation of God.”
  - type: text
    content: And those who live in the dark shadow land of death
  - type: text
    content: can now say, “The Dawning Light arises on us.”
  '17':
  - type: text
    content: 'From that time on Jesus began to proclaim his message with these words: '
  - type: text
    content: “Keep turning away from your sins and come back to God, for heaven’s kingdom realm is now accessible.”
  - type: note
    content: Or “close enough to touch!”
  - type: heading
    content: Jesus Calls His Disciples
  '18':
  - type: text
    content: 'As he was walking by the shore of Lake Galilee, Jesus noticed two fishermen who were brothers. One was nicknamed Keefa '
  - type: note
    content: Or “Simon.” The Aramaic is Keefa, which means “the rock” or “pebble.” Peter (Petros) is his Greek name.
  - type: text
    content: '(later called Peter), and the other was Andrew, his brother. Watching as they were casting their nets into the water, '
  '19':
  - type: text
    content: 'Jesus called out to them and said, '
  - type: text
    content: “Come and follow me, and I will transform you into men who catch people for God.”
  - type: text
    content: ' '
  - type: note
    content: Or “fishers of men.” The Aramaic word can mean either “fishers” or “hunters.” See Ezek. 47:1–10.
  '2':
  - type: text
    content: 'And after fasting for forty days, '
  - type: note
    content: Moses and Elijah both fasted forty days. See Ex. 34:28; 1 Kings 19:8. The number forty usually signifies passing a test or enduring a time of trial. It rained for forty days in the time of Noah, and Jonah warned Nineveh for forty days. God told Ezekiel to lay on his right side for forty days (Ezek. 4:6).
  - type: text
    content: 'Jesus was extremely hungry. '
  '20':
  - type: text
    content: Immediately they dropped their nets and left everything behind to follow Jesus.
  '21':
  - type: text
    content: 'Leaving there, Jesus found three other men sitting in a boat, mending their nets. Two were brothers, Jacob '
  - type: note
    content: Or “James.” Most translations of the Bible have substituted Jacob with James. Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use the correct name, Jacob, throughout.
  - type: text
    content: 'and John, and they were with their father, Zebedee. '
  - type: note
    content: Zebedee’s name means “my gift.” The gift he gave to Jesus was his two sons. All parents have the privilege of giving their children back to God.
  - type: text
    content: 'Jesus called Jacob and John to his side '
  - type: text
    content: and said to them
  - type: text
    content: ', '
  - type: text
    content: “Come and follow me.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: And at once they left their boat and their father, and began to follow Jesus.
  - type: heading
    content: Jesus’ Ministry of Healing
  '23':
  - type: text
    content: 'Jesus ministered from place to place throughout all of the province of Galilee. He taught '
  - type: note
    content: The Greek word didasko is a word often used for providing skilled training.
  - type: text
    content: 'in the synagogues, preaching the wonderful news of the kingdom and healing every kind of sickness and disease among the people. '
  '24':
  - type: text
    content: 'His fame spread throughout all Syria! Many people who were in pain and suffering with every kind of illness were brought to Jesus for their healing—epileptics, '
  - type: note
    content: Or “the mentally ill.”
  - type: text
    content: paralytics, and those tormented by demonic powers were all set free. Everyone who was brought to Jesus was healed!
  '25':
  - type: text
    content: This resulted in massive crowds of people following him, including people from Galilee, Jerusalem, the land of Judah, the region of the Ten Cities known as the Decapolis, and beyond the Jordan River.
  - type: note
    content: This was the first encounter the non-Jewish peoples of the Middle East had with Jesus. He was proclaiming his universal kingdom and inviting all to enter into it.
  '3':
  - type: text
    content: Then the tempter came to him and said, “How can you possibly be the Son of God and go hungry? Just command these stones to be turned into loaves of bread.”
  '4':
  - type: text
    content: 'He answered, '
  - type: text
    content: '“The Scriptures say:'
  - type: text
    content: Bread alone will not satisfy,
  - type: note
    content: Or “Man will not live by bread alone.” Nothing can satisfy the Son’s appetite but the words of God.
  - type: text
    content: but true life is found in every word
  - type: text
    content: that constantly goes forth from God’s mouth.”
  - type: note
    content: See Deut. 8:3. God had not given Jesus permission to turn stones into bread, and Jesus would not be pushed into prematurely demonstrating his power. He was content with the timing of his Father. He refused to turn stones into bread to feed himself, but he multiplied bread for his hungry followers. Today he is still turning hearts of stone into living bread that will feed the nations with truth.
  '5':
  - type: text
    content: 'Then the accuser transported Jesus to the holy city of Jerusalem and perched him at the highest point '
  - type: note
    content: Or “wing.” See Ps. 91:4.
  - type: text
    content: 'of the temple '
  '6':
  - type: text
    content: 'and said to him, “If you’re really God’s Son, jump, and the angels will catch you. For it is written in the Scriptures:'
  - type: text
    content: He will command his angels to protect you
  - type: text
    content: and they will lift you up
  - type: text
    content: so that you won’t even bruise your foot on a rock.”
  - type: note
    content: See Ps. 91:11–12; Matt. 26:53. This was a temptation to capitalize on being the Son of God and to force God to protect him as he jumped. Jesus was being tested over restraining his power as the Anointed One and waiting until the timing of his Father in publicly releasing him to work miracles and display his power. He was not sent to throw himself down from the temple, but to throw down the temple and establish a new order of worship—as a true relationship with God is internal with every believer now becoming the temple of God. See 1 Cor. 3:16; 6:19.
  '7':
  - type: text
    content: 'Once again Jesus said to him, '
  - type: text
    content: '“The Scriptures say:'
  - type: text
    content: You must never put the Lord your God to a test.”
  - type: note
    content: See Deut. 6:16.
  '8':
  - type: text
    content: And the third time the accuser lifted Jesus up onto a very high mountain range and showed him all the kingdoms of the world and all the splendor that goes with it.
  '9':
  - type: text
    content: “All of these kingdoms I will give to you,” the accuser said, “if only you will kneel down before me and worship me.”
