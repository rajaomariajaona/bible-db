document_id: PSA.61,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Prayer for Protection
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for the guitar by King David
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, hear my prayer. Listen to my heart’s cry.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For no matter where I am, even when I’m far from home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cry out to you for a father’s help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I’m feeble and overwhelmed by life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: guide me into your glory, where I am safe and sheltered.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lord, you are a paradise of protection to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You lift me high above the fray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: None of my foes can touch me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I’m held firmly in your wraparound presence!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Keep me in this glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me live continually under your splendor-shadow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiding my life in you forever.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have heard my sweet resolutions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to love and serve you, for I am your beloved.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have given me an inheritance of rich treasures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which you give to all your devoted lovers.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You treat me like a king, giving me a full and abundant life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: years and years of reigning,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 61:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “add to the days of the king.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like many generations rolled into one.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will live enthroned with you forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard me, God, with your unending, unfailing love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me live my days walking in grace and truth before you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And my praises will fill the heavens forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fulfilling my vow to make every day a love-gift to you!
