document_id: PSA.61,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prayer for Protection
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: A song for the guitar by King David
  - type: text
    content: O God, hear my prayer. Listen to my heart’s cry.
  '2':
  - type: text
    content: For no matter where I am, even when I’m far from home,
  - type: text
    content: I will cry out to you for a father’s help.
  - type: text
    content: When I’m feeble and overwhelmed by life,
  - type: text
    content: guide me into your glory, where I am safe and sheltered.
  '3':
  - type: text
    content: Lord, you are a paradise of protection to me.
  - type: text
    content: You lift me high above the fray.
  - type: text
    content: None of my foes can touch me
  - type: text
    content: when I’m held firmly in your wraparound presence!
  '4':
  - type: text
    content: Keep me in this glory.
  - type: text
    content: Let me live continually under your splendor-shadow,
  - type: text
    content: hiding my life in you forever.
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: You have heard my sweet resolutions
  - type: text
    content: to love and serve you, for I am your beloved.
  - type: text
    content: And you have given me an inheritance of rich treasures,
  - type: text
    content: which you give to all your devoted lovers.
  '6':
  - type: text
    content: You treat me like a king, giving me a full and abundant life,
  - type: text
    content: years and years of reigning,
  - type: note
    content: Or “add to the days of the king.”
  - type: text
    content: like many generations rolled into one.
  '7':
  - type: text
    content: I will live enthroned with you forever!
  - type: text
    content: Guard me, God, with your unending, unfailing love.
  - type: text
    content: Let me live my days walking in grace and truth before you.
  '8':
  - type: text
    content: And my praises will fill the heavens forever,
  - type: text
    content: fulfilling my vow to make every day a love-gift to you!
