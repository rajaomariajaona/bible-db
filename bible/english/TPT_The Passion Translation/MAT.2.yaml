document_id: MAT.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wise Men Visit
  - type: text
    content: 'Jesus was born in Bethlehem '
  - type: note
    content: Bethlehem, or Byt-lehem, means “house of bread,” the prophesied birthplace of Messiah. However, the Hebrew word lehem can also mean “fighters.” Jesus was born in “the House of Fighters!” This is the city of David, one of the greatest fighters in the entire Bible. Perhaps this is why the people of Jesus’ day expected him to fight the Romans and free their land from foreign occupation. Jesus fulfilled both aspects of the meaning of Bethlehem in Gethsemane and on the cross, where he fought the “Goliath” of our souls and won, becoming Bread for the world. God controls all events, proven by the prophecy that Jesus would be born in Bethlehem even though his parents were living in Nazareth. See Mic. 5:2; Luke 2:1–19.
  - type: text
    content: 'near Jerusalem '
  - type: note
    content: Or “in the land of Judea.”
  - type: text
    content: 'during the reign of King Herod. '
  - type: note
    content: Herod died in 4 BC, which helps in dating the birth of Christ.
  - type: text
    content: 'After Jesus’ birth a group of spiritual priests '
  - type: note
    content: Or “astrologers,” known as dream interpreters. These wealthy priests would have traveled with an entourage for protection as officials from the East. The Greek word magos is taken from the Mede language and means “spiritual advisors” or simply “priests.” They were appointed by Darius over the state religion as priests of Persia, which is modern-day Iran, and served as official advisors to the king. By the time of Jesus’ birth, Persia had been conquered and was being governed by successors to Alexander the Great. It is possible these Magos came from the Mesopotamian region of Seleucia. See also Dan. 2 and 5:11, where the prophet Daniel is given the title of “Chief of the Magio.” It is probable that these Magos were descendants of those who had been taught by Daniel, and because of his prophecy of the Messiah being “cut off,” they may have been able to decipher the date of his birth along with the interpretation of his star rising.
  - type: text
    content: 'from the East came to Jerusalem '
  '10':
  - type: text
    content: 'And when they saw the star, they were so ecstatic that they shouted and celebrated with unrestrained joy. '
  - type: note
    content: The Greek is hard to translate since it contains so many redundant words for joy in this one verse. It is literally “They rejoiced with a great joy exceedingly.” They were ecstatic!
  '11':
  - type: text
    content: 'When they came into the house and saw the young child with Mary, his mother, they fell to the ground at his feet and worshiped him. Then they opened their treasure chests '
  - type: note
    content: These “wise men” were extremely wealthy. They presented gifts that totaled a great sum of money—not tiny presents wrapped with bows, but treasure chests full of financial wealth. Although we are not given the monetary value of each type of gift, we know that frankincense and myrrh were extremely costly. These gifts would have financed Joseph and Mary and Jesus’ exodus to Egypt and supplied their living expenses for a number of years, even after returning to Israel. Gold is an often-used symbol of the deity of Christ. Frankincense points to his perfect life of holiness, excellence, and devotion. Myrrh, an embalming spice, speaks to us of the suffering love that would lead him to the death on the cross.
  - type: text
    content: 'full of gifts and presented him with gold, frankincense, and myrrh. '
  '12':
  - type: text
    content: Afterward they returned to their own country by another route because God had warned them in a dream not to go back to Herod.
  - type: heading
    content: They Escape to Egypt
  '13':
  - type: text
    content: After they had gone, Joseph had another dream. An angel of the Lord appeared to him and said, “Get up now and flee to Egypt. Take Mary and the little child and stay there until I tell you to leave, for Herod intends to search for the child to kill him.”
  '14':
  - type: text
    content: 'So that very night he got up and took Jesus and his mother and made their escape to Egypt '
  '15':
  - type: text
    content: 'and remained there until Herod died. All of this fulfilled what the Lord had spoken through his prophet:'
  - type: text
    content: I summon my Son out of Egypt.
  - type: note
    content: See Hos. 11:1. Both Jesus and the nation of Israel came up out of Egypt. Jesus applies Hos. 11:1 to himself and, in a sense, takes it out of context. There is a deeper level of understanding for every verse, for the Bible points us continually to Jesus.
  '16':
  - type: text
    content: 'When Herod realized that he had been tricked by the wise men, he was infuriated. So he sent soldiers with orders to slaughter every baby boy two years old and younger in Bethlehem and throughout the surrounding countryside, based on the time frame he was given from interrogating the wise men. '
  '17':
  - type: text
    content: 'This fulfilled the words of the prophet Jeremiah:'
  '18':
  - type: text
    content: I hear the screams of anguish,
  - type: text
    content: weeping, and wailing in Ramah.
  - type: text
    content: Rachel is weeping uncontrollably for her children.
  - type: note
    content: As translated from the Septuagint. Rachel becomes a metaphor for all of Israel.
  - type: text
    content: And she refuses to be comforted,
  - type: text
    content: because they are dead and gone.
  - type: note
    content: See Jer. 31:14–15.
  - type: heading
    content: They Return to Nazareth
  '19':
  - type: text
    content: 'After Herod died, an angel of the Lord appeared again to Joseph in a dream while he was still in Egypt, '
  '2':
  - type: text
    content: 'and inquired of the people, “Where is the child who is born king of the Jewish people? We observed his star rising in the sky '
  - type: note
    content: Or “his star in the east” or “shooting star” or possibly “comet.” Note that it is also called “his star,” not the star of Bethlehem.
  - type: text
    content: and we’ve come to bow before him in worship.”
  - type: note
    content: With the visit of the wise men coming to bow in worship before Jesus, we see a preview of the nations one day worshiping our King. See Ps. 72:8–11.
  '20':
  - type: text
    content: saying, “Go back to the land of Israel and take the child and his mother with you, for those who sought to kill the child are dead.”
  '21':
  - type: text
    content: 'So he awoke and took Jesus and Mary and returned to the land of Israel. '
  '22':
  - type: text
    content: 'But when he heard that Archelaus, Herod’s son, had succeeded him as ruler over all of the territory of Judah, he was afraid to go back. Then he had another dream from God, warning him to avoid that region and instructing him instead to go to the province of Galilee. '
  '23':
  - type: text
    content: So he settled his family in the village of Nazareth, fulfilling the prophecy that he would be known as the “Branch.”
  - type: note
    content: Or “a Nazarene.” The Hebrew Scriptures give us a wonderful truth about the Branch (Sprout) of the Lord that would come and establish righteousness. The word for “branch” or sprout is netzer, the root word for Nazareth and Nazarene. The teaching of the Branch of the Lord is a concept taught throughout the Bible, from the Tree of Life, to the seven branches of the Lampstand, to Jesus the Vine calling us his branches. Jesus is a Scion, a Branch that can be transplanted and grafted into a human life. Another variant form of this amazing word netzer can be translated “keeper, watchman, one who keeps secrets, guardian, one who keeps watch.” All of these words are true of Jesus, the Branch who was raised in the village of the Branch (Nazareth). Additionally, the Aramaic word for Nazareth means “heir of a powerful family” or “victorious one.” So it is entirely possible to translate this “he will be called the Victorious Branch (of Nazareth).” See Dan. 11:7; Isa. 11:1; 60:21. See also Isa. 4:2; Jer. 23:5; Zech. 6:12, which use a Hebrew synonym for Branch, tsemach.
  '3':
  - type: text
    content: 'King Herod was shaken to the core when he heard this, and not only he, but all of Jerusalem was disturbed when they heard this news. '
  - type: note
    content: Although we are not told how many “wise men” came to visit Bethlehem, it was likely quite a large entourage. It is doubtful that three men from Persia would cause such an uproar and commotion in the city. There were possibly over one hundred who traveled in the caravan from the East arriving in Jerusalem.
  '4':
  - type: text
    content: So he called a meeting of the Jewish ruling priests and religious scholars, demanding that they tell him where the promised Messiah was prophesied to be born.
  '5':
  - type: text
    content: '“He will be born in Bethlehem, in the land of Judah,” they told him. “Because the prophecy states:'
  '6':
  - type: text
    content: And you, little Bethlehem,
  - type: text
    content: are not insignificant among the clans of Judah,
  - type: text
    content: for out of you will emerge
  - type: text
    content: 'the Shepherd-King '
  - type: note
    content: As translated from the Aramaic. The Greek is “the Leader who will shepherd my people Israel.”
  - type: text
    content: of my people Israel!”
  - type: note
    content: See Mic. 5:2. Both the Septuagint and the Hebrew Matthew have “out of you will come to me a Ruler who will be King of Israel.” The Septuagint adds, “He will shepherd my people in the strength of the Lord.”
  '7':
  - type: text
    content: 'Then Herod secretly summoned the spiritual priests from the East to ascertain the exact time the star first appeared. '
  '8':
  - type: text
    content: And he told them, “Now go to Bethlehem and carefully look there for the child, and when you’ve found him, report to me so that I can go and bow down and worship him too.”
  '9':
  - type: text
    content: 'And on their way to Bethlehem, the same star they had seen in the East suddenly reappeared! Amazed, they watched as it went ahead of them and stopped directly over the place where the child was. '
