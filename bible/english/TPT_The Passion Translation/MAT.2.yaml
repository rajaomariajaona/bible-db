        children:
        - type: text
          text: . Both the Septuagint and the Hebrew Matthew have “out of you will come to me a Ruler who will be King of Israel.” The Septuagint adds, “He will shepherd my people in the strength of the Lord.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Herod secretly summoned the spiritual priests from the East to ascertain the exact time the star first appeared. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he told them, “Now go to Bethlehem and carefully look there for the child, and when you’ve found him, report to me so that I can go and bow down and worship him too.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on their way to Bethlehem, the same star they had seen in the East suddenly reappeared! Amazed, they watched as it went ahead of them and stopped directly over the place where the child was. '
