  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Herod was shaken to the core when he heard this, and not only he, but all of Jerusalem was disturbed when they heard this news. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although we are not told how many “wise men” came to visit Bethlehem, it was likely quite a large entourage. It is doubtful that three men from Persia would cause such an uproar and commotion in the city. There were possibly over one hundred who traveled in the caravan from the East arriving in Jerusalem.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he called a meeting of the Jewish ruling priests and religious scholars, demanding that they tell him where the promised Messiah was prophesied to be born.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“He will be born in Bethlehem, in the land of Judah,” they told him. “Because the prophecy states:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, little Bethlehem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are not insignificant among the clans of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for out of you will emerge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the Shepherd-King '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the Leader who will shepherd my people Israel.”
      marker-yv: yv-n
    - type: text
      text: of my people Israel!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
