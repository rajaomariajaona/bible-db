          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is hard to translate since it contains so many redundant words for joy in this one verse. It is literally “They rejoiced with a great joy exceedingly.” They were ecstatic!
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came into the house and saw the young child with Mary, his mother, they fell to the ground at his feet and worshiped him. Then they opened their treasure chests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These “wise men” were extremely wealthy. They presented gifts that totaled a great sum of money—not tiny presents wrapped with bows, but treasure chests full of financial wealth. Although we are not given the monetary value of each type of gift, we know that frankincense and myrrh were extremely costly. These gifts would have financed Joseph and Mary and Jesus’ exodus to Egypt and supplied their living expenses for a number of years, even after returning to Israel. Gold is an often-used symbol of the deity of Christ. Frankincense points to his perfect life of holiness, excellence, and devotion. Myrrh, an embalming spice, speaks to us of the suffering love that would lead him to the death on the cross.
      marker-yv: yv-n
    - type: text
      text: 'full of gifts and presented him with gold, frankincense, and myrrh. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward they returned to their own country by another route because God had warned them in a dream not to go back to Herod.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: They Escape to Egypt
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After they had gone, Joseph had another dream. An angel of the Lord appeared to him and said, “Get up now and flee to Egypt. Take Mary and the little child and stay there until I tell you to leave, for Herod intends to search for the child to kill him.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So that very night he got up and took Jesus and his mother and made their escape to Egypt '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and remained there until Herod died. All of this fulfilled what the Lord had spoken through his prophet:'
  - type: usfm
    marker: mi
    children:
