  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Herod realized that he had been tricked by the wise men, he was infuriated. So he sent soldiers with orders to slaughter every baby boy two years old and younger in Bethlehem and throughout the surrounding countryside, based on the time frame he was given from interrogating the wise men. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This fulfilled the words of the prophet Jeremiah:'
