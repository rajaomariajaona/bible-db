  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus set out from there to go into the non-Jewish region of Tyre. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the region of Tyre and Sidon.” (Some manuscripts do not have Sidon.) These two cities are located in Lebanon on the Mediterranean coast.
      marker-yv: yv-n
    - type: text
      text: 'He intended to slip into a house unnoticed, but people found out that he was there. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when a woman whose daughter had a demon spirit heard he was there, she came and threw herself down at his feet. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She was not Jewish, but a foreigner, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Greek.” The Jews considered the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Greek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to mean anyone who was not a Jew, not necessarily a person of Greek descent.
      marker-yv: yv-n
    - type: text
      text: 'born in the part of Syria known as Phoenicia. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This story, in light of the culture of that time, is phenomenal. She was a foreign-born woman with a demonized daughter. Combined, these characteristics made her an unlikely candidate to seek out a Jewish healer. The racial divide of that day was quite pronounced, but love and faith overcome every barrier, including racial prejudice. In
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the Hebrew Matthew text describes her as “a Canaanite merchant woman.” Canaan included the region of modern-day Lebanon and parts of Syria. In this region, Jezebel established Baal worship and there her body was eventually thrown to the dogs. Here Jesus heals a woman and brings her into the true worship of God.'
      marker-yv: yv-n
    - type: text
      text: 'She begged him repeatedly to cast the demon out of her daughter. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally he said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “First let my children be fed and satisfied, for it isn’t fair to take the children’s bread
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Children” is a metaphor for the Jewish people (children of Israel), and the “children’s bread” becomes a metaphor for healing or casting out demons.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and throw it to the little dogs.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “little pet dogs.” The term translated “dog” here is the diminutive form of the Greek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kuon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Calling her a household pet was not meant as an ethnic slur, but was used to describe an impure (unclean) mind. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
