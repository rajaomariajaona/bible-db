        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 2:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
