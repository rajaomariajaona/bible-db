document_id: MRK.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Breaks Religious Traditions
  - type: text
    content: 'One day, the Pharisees and certain religious scholars came from Jerusalem and gathered around Jesus. '
  '10':
  - type: text
    content: 'For example, Moses taught us:'
  - type: text
    content: ‘Honor your father and mother,’
  - type: note
    content: See Ex. 20:12; Deut. 5:16.
  - type: text
    content: and,
  - type: text
    content: ‘Whoever insults or mistreats his father or mother must be put to death.’
  - type: note
    content: See Ex. 21:17; Lev. 20:9.
  '11':
  - type: text
    content: “But your made-up rules allow a person to say to his parents, ‘I’ve decided to take the support you were counting on from me and make it my holy offering to God, and that will be your blessing instead.’
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “Whatever you would have gained from me will be corban (an offering).” Corban (qorban) is an Aramaic word that implies that a person is pure, sincere, and pious when he makes an offering to God. In this case, people would simply speak the word corban over the money they were obligated to use in support of their aged parents, and that would exempt them from their duty to give it. Jesus disapproved of this practice, as it nullified God’s commands. Words themselves don’t count with God; he seeks justice and obedience from the heart.
  '12':
  - type: text
    content: How convenient! The rules you teach exempt him from providing for his aged parents.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Do you really think God will honor your traditions passed down to others, making up rules that nullify God’s Word? And you’re doing many other similar things.”
  - type: heading
    content: Jesus Explains What Truly Defiles
  '14':
  - type: text
    content: 'Then Jesus called the crowd together again, saying, '
  - type: text
    content: “Hear my words, all of you, and take them to heart.
  - type: text
    content: ' '
  '15':
  - type: text
    content: What truly contaminates a person is not what he puts into his body, but what comes out. That’s what makes a person defiled.”
  - type: note
    content: Some Greek manuscripts and the Aramaic add v. 16, “If anyone has ears to hear, let him hear.”
  '17':
  - type: text
    content: 'When Jesus went back home and away from the crowd, his disciples '
  - type: text
    content: acknowledged that they didn’t understand the meaning of the parable and
  - type: text
    content: ' asked him to explain it. '
  '18':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “Are you as dull as the rest? Don’t you understand that you are not defiled by what you eat?
  - type: text
    content: ' '
  '19':
  - type: text
    content: For the food you swallow doesn’t enter your heart, but goes into your stomach, only to pass out into the sewer.”
  - type: text
    content: ' (This means all foods are clean.) '
  - type: note
    content: The words in parenthesis are added by the author (Mark).
  '2':
  - type: text
    content: 'They were shocked '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'to find that some of Jesus’ disciples ate bread without first observing the Jewish ritual of hand washing before eating their meal. '
  '20':
  - type: text
    content: 'He added, '
  - type: text
    content: “Words and deeds pollute a person, not food.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Evil originates from inside a person. Coming out of a human heart are evil schemes,
  - type: text
    content: ' '
  - type: note
    content: Or “depraved thoughts.”
  - type: text
    content: sexual immorality,
  - type: text
    content: ' '
  - type: note
    content: This is the Greek word porneía (the root word from which we get pornography). The literal meaning is “to sell off oneself” (into sexual impurity).
  - type: text
    content: theft, murder,
  - type: text
    content: ' '
  '22':
  - type: text
    content: adultery, greed, wickedness, treachery, debauchery,
  - type: text
    content: ' '
  - type: note
    content: Or “indecency.” This is the Greek word aselgeia, a possible veiled term for homosexual behavior and other sexual deviant behavior forbidden in the Old Testament. Aselgeia is used ten times in the New Testament.
  - type: text
    content: jealousy,
  - type: text
    content: ' '
  - type: note
    content: Or “an evil eye,” which is an Aramaic idiom for stinginess.
  - type: text
    content: slander,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “blasphemy.”
  - type: text
    content: arrogance,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “boasting.”
  - type: text
    content: and recklessness.
  - type: text
    content: ' '
  - type: note
    content: Or “senselessness.”
  '23':
  - type: text
    content: All these corrupt things emerge from within and constantly defile a person.”
  - type: heading
    content: Jesus and a Foreign Woman
  '24':
  - type: text
    content: 'Jesus set out from there to go into the non-Jewish region of Tyre. '
  - type: note
    content: Or “the region of Tyre and Sidon.” (Some manuscripts do not have Sidon.) These two cities are located in Lebanon on the Mediterranean coast.
  - type: text
    content: 'He intended to slip into a house unnoticed, but people found out that he was there. '
  '25':
  - type: text
    content: 'But when a woman whose daughter had a demon spirit heard he was there, she came and threw herself down at his feet. '
  '26':
  - type: text
    content: 'She was not Jewish, but a foreigner, '
  - type: note
    content: Or “Greek.” The Jews considered the word Greek to mean anyone who was not a Jew, not necessarily a person of Greek descent.
  - type: text
    content: 'born in the part of Syria known as Phoenicia. '
  - type: note
    content: This story, in light of the culture of that time, is phenomenal. She was a foreign-born woman with a demonized daughter. Combined, these characteristics made her an unlikely candidate to seek out a Jewish healer. The racial divide of that day was quite pronounced, but love and faith overcome every barrier, including racial prejudice. In Matt. 15:22, the Hebrew Matthew text describes her as “a Canaanite merchant woman.” Canaan included the region of modern-day Lebanon and parts of Syria. In this region, Jezebel established Baal worship and there her body was eventually thrown to the dogs. Here Jesus heals a woman and brings her into the true worship of God.
  - type: text
    content: 'She begged him repeatedly to cast the demon out of her daughter. '
  '27':
  - type: text
    content: 'Finally he said to her, '
  - type: text
    content: “First let my children be fed and satisfied, for it isn’t fair to take the children’s bread
  - type: text
    content: ' '
  - type: note
    content: “Children” is a metaphor for the Jewish people (children of Israel), and the “children’s bread” becomes a metaphor for healing or casting out demons.
  - type: text
    content: and throw it to the little dogs.”
  - type: note
    content: Or “little pet dogs.” The term translated “dog” here is the diminutive form of the Greek kuon. Calling her a household pet was not meant as an ethnic slur, but was used to describe an impure (unclean) mind. See Matt. 7:6; Phil. 3:2; 2 Peter 2:22; Rev. 22:15. Using the metaphors of children, children’s bread, and dogs was the way Jesus tested her faith and revealed her strong confidence in Jesus’ power to heal her daughter. She saw Jesus as “Lord” and received her miracle.
  '28':
  - type: text
    content: She answered, “How true that is, Lord. But even puppies under the family table are allowed to eat the little children’s crumbs.”
  '29':
  - type: text
    content: 'Then Jesus said to her, '
  - type: text
    content: “That’s a good reply! Now, because you said this, you may go. The demon has permanently left your daughter.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: '(For the Pharisees, like all other Jews, will not eat without first performing a ritual of pouring water over their cupped hands '
  - type: note
    content: Or “with a fist.” Some have surmised this was a thorough washing from the hand to the elbow. But it was most likely water poured over cupped hands. This is not taught in the Torah, but was insisted on because of the tradition of the elders. A few Greek manuscripts and the Aramaic read “They do not eat unless they wash their hands carefully,” with no mention of a fist.
  - type: text
    content: 'to keep the tradition of the elders. '
  '30':
  - type: text
    content: And when she returned home, she found her daughter resting quietly on the couch, completely set free from the demon!
  - type: heading
    content: Jesus Heals a Deaf Man
  '31':
  - type: text
    content: 'After this, Jesus left the coastland of Tyre and came through Sidon on his way to Lake Galilee and over into regions of Syria. '
  - type: note
    content: Or “the Decapolis,” which means “Ten Cities,” all of which were located in Syria. (See Mark 5:20 and footnote.) Jesus headed southeast to Lake Galilee. This trek was many miles and would have taken him days to arrive.
  '32':
  - type: text
    content: Some people brought to him a deaf man with a severe speech impediment. They pleaded with Jesus to place his hands on him and heal him.
  '33':
  - type: text
    content: 'So Jesus led him away from the crowd to a private spot. Then he stuck his fingers into the man’s ears and placed some of his saliva on the man’s tongue. '
  - type: note
    content: The saliva of firstborn sons in the Jewish culture of Jesus’ time was considered to have power to heal infirmities.
  '34':
  - type: text
    content: 'Then he gazed into heaven, '
  - type: note
    content: The Aramaic is “Then he focused on (or contemplated) heaven.”
  - type: text
    content: 'sighed deeply, and spoke to the man’s ears and tongue, '
  - type: text
    content: “Ethpathakh,”
  - type: text
    content: ' which is Aramaic '
  - type: note
    content: Aramaic was the language of Jesus and his disciples and continues to be spoken today. The spelling of Ethpathakh has been adjusted to fit proper Aramaic instead of the transliterated Greek text, which is unintelligible, possibly due to a scribal error.
  - type: text
    content: for “Open up, now!”
  - type: note
    content: The phrase “open up” is the same wording used in the Hebrew of Isa. 61:1, “Open the prison doors.” It furthermore refers to the opening of the eyes of the blind and the ears of the deaf.
  '35':
  - type: text
    content: 'At once the man’s ears opened and he could hear perfectly, and his tongue was untied and he began to speak normally. '
  '36':
  - type: text
    content: 'Jesus ordered everyone to keep this miracle a secret, but the more he told them not to, the more the news spread! '
  '37':
  - type: text
    content: 'The people were absolutely beside themselves and astonished beyond measure. '
  - type: note
    content: The Greek text uses an unusual construction, found nowhere else in the New Testament, to describe the utter astonishment of the people over this miracle. Jesus led the man away from the unbelief of others to work his miracle and healed him with his saliva. (Later, wicked men would spit upon him in public.) Jesus then told the man he healed not to tell others, but he did. Jesus tells us to spread the good news, and we don’t.
  - type: text
    content: 'And they began to declare, “Everything he does is wonderful! '
  - type: note
    content: Or “beautiful,” “perfect,” “admirable,” or “marvelous.” This verse can also be translated “He has made everything beautiful” or “He has made everything ideally.”
  - type: text
    content: He even makes the deaf hear and the mute speak!”
  '4':
  - type: text
    content: 'Similarly, when returning from the marketplace, they ceremonially wash themselves before eating. '
  - type: note
    content: The Aramaic is “If they do not bathe, they do not eat.”
  - type: text
    content: They also observed many other traditions, such as ceremonially washing cups, pitchers, and kettles.)
  - type: note
    content: Some manuscripts add “dining couches.” Some Aramaic manuscripts add “beds” (or “mats”). This ceremonial sprinkling amounted to nothing more than religious rules and customs, but none of them were commanded in the writings of Moses—they were the oral traditions of men.
  '5':
  - type: text
    content: So the Pharisees and religious scholars asked Jesus, “Why don’t your disciples live according to the age-old traditions passed down by our elders? They should first ceremonially wash their hands before eating.”
  '6':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You are hypocrites! How accurately
  - type: text
    content: ' '
  - type: note
    content: Or “excellently.”
  - type: text
    content: 'did Isaiah prophesy about you phonies when he said:'
  - type: text
    content: ‘These people honor me with their words
  - type: text
    content: while their hearts run far away from me!
  '7':
  - type: text
    content: Their worship is nothing more than a charade!
  - type: text
    content: For they continue to insist
  - type: text
    content: that their man-made traditions
  - type: text
    content: are equal to the instructions of God.’
  - type: note
    content: See Isa. 29:13 (LXX).
  '8':
  - type: text
    content: “You abandon God’s commandments just to keep men’s rituals, such as ceremonially washing utensils, cups, and other things.”
  - type: note
    content: Some manuscripts omit the last clause. It is found in the Aramaic and the majority of Greek texts.
  '9':
  - type: text
    content: 'Then he added, '
  - type: text
    content: “How skillful you’ve become in rejecting God’s law in order to maintain your man-made set of rules.
  - type: text
    content: ' '
