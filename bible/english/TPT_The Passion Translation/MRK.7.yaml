        children:
        - type: text
          text: . Using the metaphors of children, children’s bread, and dogs was the way Jesus tested her faith and revealed her strong confidence in Jesus’ power to heal her daughter. She saw Jesus as “Lord” and received her miracle.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She answered, “How true that is, Lord. But even puppies under the family table are allowed to eat the little children’s crumbs.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That’s a good reply! Now, because you said this, you may go. The demon has permanently left your daughter.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(For the Pharisees, like all other Jews, will not eat without first performing a ritual of pouring water over their cupped hands '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with a fist.” Some have surmised this was a thorough washing from the hand to the elbow. But it was most likely water poured over cupped hands. This is not taught in the Torah, but was insisted on because of the tradition of the elders. A few Greek manuscripts and the Aramaic read “They do not eat unless they wash their hands carefully,” with no mention of a fist.
      marker-yv: yv-n
    - type: text
      text: 'to keep the tradition of the elders. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when she returned home, she found her daughter resting quietly on the couch, completely set free from the demon!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Deaf Man
