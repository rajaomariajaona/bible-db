document_id: MRK.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection of Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the first day of the week, as the Sabbath was ending, Mary Magdalene, Mary the mother of Jacob, and Salome made their way to the tomb. It was very early in the morning as the first streaks of light were beginning to be seen in the sky. They had purchased aromatic embalming spices so that they might anoint his body. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After she had seen Jesus, she ran to tell his disciples, who were all emotionally devastated and weeping. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Excitedly, Mary told them, “He’s alive and I’ve seen him!” But even after hearing this, they didn’t believe her.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, Jesus appeared to two of the disciples, who were on their way to another village, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to the country.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 24:13–35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'appearing in a form they did not recognize. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Jerusalem
    - type: text
      text: ' to tell the rest of the disciples, but they didn’t believe it was true.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus appeared '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “manifested” or “became visible” (in clear light).
      marker-yv: yv-n
    - type: text
      text: before the eleven apostles as they were eating a meal. He corrected them for having such hard, unbelieving hearts because they did not believe those who saw him after his resurrection.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “As you go into all the world, preach openly the wonderful news of the gospel to the entire human race!
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever believes the good news and is baptized will be saved, and whoever does not believe the good news will be condemned.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And these miracle signs will accompany those who believe: They will drive out demons in the power of my name. They will speak in tongues.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will be supernaturally protected from snakes and from drinking anything poisonous.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They will pick up snakes and be unharmed, and whatever poison they drink will not hurt them.” Some scholars believe that this sentence contains two Aramaic idioms. To pick up snakes could be a picture of overcoming one’s enemies (“snakes”), and drinking poison may be speaking of dealing with attacks on one’s character (poisonous words). The imagery is from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 91:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And they will lay hands on the sick and heal them.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After saying these things, Jesus was lifted up into heaven and sat down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the place of honor
    - type: text
      text: ' at the right hand of God! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is literally “out of the right-sidednesses [plural] of God.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the apostles went out announcing the good news everywhere, as the Lord himself consistently worked with them, validating the message they preached with miracle-signs that accompanied them!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they had been asking one another, “Who can roll away the heavy stone for us from the entrance of the tomb?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they arrived, they discovered that the very large stone was already rolled away! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they stepped into the tomb, they saw a young man sitting on the right, dressed in a long white robe. The women were startled and amazed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the angel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 28:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'said to them, “Don’t be afraid. I know that you’re here looking for Jesus of Nazareth, who was crucified. He isn’t here—he has risen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: victoriously
    - type: text
      text: '! Look! See the place where they laid him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Run and tell his disciples, even Peter, that he is risen. He has gone ahead of you into Galilee and you will see him there, just like he told you.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They staggered out of the tomb, awestruck, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “trembling” (with astonishment).
      marker-yv: yv-n
    - type: text
      text: with their minds swirling. They ran to tell the disciples, but they were so afraid and amazed, they said nothing to anyone.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some early manuscripts of Mark do not include vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . They are found in the Aramaic. A shorter ending to Mark found in a few manuscripts reads, “They reported briefly to those around Peter all that they had been commanded. After these things, Jesus himself commissioned them
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to take the message
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: from the east to the west—the holy and imperishable preaching of eternal salvation. Amen.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Appears to Some of His Followers
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early on the first day of the week, after rising from the dead, Jesus appeared to Mary Magdalene, from whom he had cast out seven demons. '
