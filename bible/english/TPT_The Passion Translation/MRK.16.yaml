document_id: MRK.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection of Jesus
  - type: text
    content: 'On the first day of the week, as the Sabbath was ending, Mary Magdalene, Mary the mother of Jacob, and Salome made their way to the tomb. It was very early in the morning as the first streaks of light were beginning to be seen in the sky. They had purchased aromatic embalming spices so that they might anoint his body. '
  '10':
  - type: text
    content: 'After she had seen Jesus, she ran to tell his disciples, who were all emotionally devastated and weeping. '
  '11':
  - type: text
    content: Excitedly, Mary told them, “He’s alive and I’ve seen him!” But even after hearing this, they didn’t believe her.
  '12':
  - type: text
    content: 'After this, Jesus appeared to two of the disciples, who were on their way to another village, '
  - type: note
    content: Or “to the country.” See Luke 24:13–35.
  - type: text
    content: 'appearing in a form they did not recognize. '
  '13':
  - type: text
    content: 'They went back '
  - type: text
    content: to Jerusalem
  - type: text
    content: ' to tell the rest of the disciples, but they didn’t believe it was true.'
  '14':
  - type: text
    content: 'Then Jesus appeared '
  - type: note
    content: Or “manifested” or “became visible” (in clear light).
  - type: text
    content: before the eleven apostles as they were eating a meal. He corrected them for having such hard, unbelieving hearts because they did not believe those who saw him after his resurrection.
  '15':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “As you go into all the world, preach openly the wonderful news of the gospel to the entire human race!
  - type: text
    content: ' '
  '16':
  - type: text
    content: Whoever believes the good news and is baptized will be saved, and whoever does not believe the good news will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And these miracle signs will accompany those who believe: They will drive out demons in the power of my name. They will speak in tongues.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: They will be supernaturally protected from snakes and from drinking anything poisonous.
  - type: text
    content: ' '
  - type: note
    content: Or “They will pick up snakes and be unharmed, and whatever poison they drink will not hurt them.” Some scholars believe that this sentence contains two Aramaic idioms. To pick up snakes could be a picture of overcoming one’s enemies (“snakes”), and drinking poison may be speaking of dealing with attacks on one’s character (poisonous words). The imagery is from Ps. 91:13.
  - type: text
    content: And they will lay hands on the sick and heal them.”
  '19':
  - type: text
    content: 'After saying these things, Jesus was lifted up into heaven and sat down '
  - type: text
    content: at the place of honor
  - type: text
    content: ' at the right hand of God! '
  - type: note
    content: The Greek is literally “out of the right-sidednesses [plural] of God.”
  '20':
  - type: text
    content: And the apostles went out announcing the good news everywhere, as the Lord himself consistently worked with them, validating the message they preached with miracle-signs that accompanied them!
  '3':
  - type: text
    content: 'And they had been asking one another, “Who can roll away the heavy stone for us from the entrance of the tomb?” '
  '4':
  - type: text
    content: 'But when they arrived, they discovered that the very large stone was already rolled away! '
  '5':
  - type: text
    content: 'And as they stepped into the tomb, they saw a young man sitting on the right, dressed in a long white robe. The women were startled and amazed. '
  '6':
  - type: text
    content: 'But the angel '
  - type: note
    content: See Matt. 28:2.
  - type: text
    content: 'said to them, “Don’t be afraid. I know that you’re here looking for Jesus of Nazareth, who was crucified. He isn’t here—he has risen '
  - type: text
    content: victoriously
  - type: text
    content: '! Look! See the place where they laid him. '
  '7':
  - type: text
    content: Run and tell his disciples, even Peter, that he is risen. He has gone ahead of you into Galilee and you will see him there, just like he told you.”
  '8':
  - type: text
    content: 'They staggered out of the tomb, awestruck, '
  - type: note
    content: Or “trembling” (with astonishment).
  - type: text
    content: with their minds swirling. They ran to tell the disciples, but they were so afraid and amazed, they said nothing to anyone.
  - type: note
    content: Some early manuscripts of Mark do not include vv. 9–20. They are found in the Aramaic. A shorter ending to Mark found in a few manuscripts reads, “They reported briefly to those around Peter all that they had been commanded. After these things, Jesus himself commissioned them to take the message from the east to the west—the holy and imperishable preaching of eternal salvation. Amen.”
  - type: heading
    content: Jesus Appears to Some of His Followers
  '9':
  - type: text
    content: 'Early on the first day of the week, after rising from the dead, Jesus appeared to Mary Magdalene, from whom he had cast out seven demons. '
