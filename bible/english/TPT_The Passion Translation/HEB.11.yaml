      text: knowing that he is real and that he rewards the faith of those who passionately seek him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith opened Noah’s heart to receive revelation and warnings from God about what was coming, even things that had never been seen. But he stepped out in reverent obedience to God and built an ark that would save him and his family. By his faith the world was condemned, but Noah received God’s gift of righteousness that comes by believing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith of the Patriarchs
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith motivated Abraham to obey God’s call and leave the familiar to discover the territory he was destined to inherit from God. So he left with only a promise and without even knowing ahead of time where he was going, Abraham stepped out in faith. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He lived by faith as an immigrant in his promised land as though it belonged to someone else. '
