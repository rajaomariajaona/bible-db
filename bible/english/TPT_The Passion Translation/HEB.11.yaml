          text: without faith. It is assumed that it is the faith of the person mentioned, not merely an abstraction of faith.
      marker-yv: yv-n
    - type: text
      text: to choose a more acceptable sacrifice to offer God than his brother Cain, and God declared him righteous because of his offering of faith. By his faith, Abel still speaks instruction to us today, even though he is long dead.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now God has invited us to live in something better than what they had—faith’s fullness! This is so that they could be brought to finished perfection alongside of us.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith translated Enoch from this life and he was taken up into heaven! He never had to experience death; he just disappeared from this world because God promoted him. For before he was translated to the heavenly realm his life had become a pleasure to God.
    - type: usfm
      marker: f
