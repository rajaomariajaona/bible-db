document_id: HEB.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Power of Bold Faith
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now faith brings our hopes into reality and becomes the foundation needed to acquire the things we long for. It is all the evidence required to prove what is still unseen. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His eyes of faith were set on the city '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He was continually receiving the city.”
      marker-yv: yv-n
    - type: text
      text: 'with unshakable foundations, whose architect and builder is God himself. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarah’s faith embraced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' miracle power to conceive even though she was barren and was past the age of childbearing, for the authority of her faith '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and some Greek manuscripts. Arguably, a difficult passage to translate from the Greek; variations of the text are focused on Abraham’s faith, not Sarah’s. Other manuscripts seem to have the focus on “their faith” (both Sarah’s and Abraham’s).
      marker-yv: yv-n
    - type: text
      text: rested in the One who made the promise, and she tapped into his faithfulness.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In fact, so many children were subsequently fathered by this aged man of faith—one who was as good as dead, that he now has offspring as innumerable as the sand on the seashore and as the stars in the sky!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These heroes all died still clinging to their faith, not even receiving all that had been promised them. But they saw beyond the horizon the fulfillment of their promises and gladly embraced it from afar. They all lived their lives on earth as those who belonged to another realm.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as strangers and nomads on earth.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For clearly, those who live this way '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “speak this way.”
      marker-yv: yv-n
    - type: text
      text: 'are longing for the appearing of a heavenly city. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “homeland” (country).
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if their hearts were still remembering what they left behind, they would have found an opportunity to go back. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they couldn’t turn back for their hearts were fixed on what was far greater, that is, the heavenly realm!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It should be noted that there is no mention of “land” or “country” in the Greek text of vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: So because of this God is not ashamed in any way to be called their God, for he has prepared a heavenly city for them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham, Isaac, and Jacob
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith operated powerfully in Abraham for when he was put to the test he offered up Isaac. Even though he received God’s promises '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “he received the royal-proclamation,” the Aramaic word for “promise.”
      marker-yv: yv-n
    - type: text
      text: 'of descendants, he was willing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he attempted to offer up.”
      marker-yv: yv-n
    - type: text
      text: 'to offer up his only son! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God had promised,
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Through your son Isaac your lineage will carry on your name.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in Isaac seed will be named for you.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham’s faith made it logical to him that God could raise Isaac from the dead, and symbolically, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Isaac was given to him as a parable.”
      marker-yv: yv-n
    - type: text
      text: that’s exactly what happened.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This testimony of faith is what previous generations '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “elders.”
      marker-yv: yv-n
    - type: text
      text: 'were commended for. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The power of faith prompted Isaac to impart a blessing to his sons, Jacob and Esau, concerning their prophetic destinies.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob worshiped in faith’s reality at the end of his life, and leaning upon his staff he imparted a prophetic blessing upon each of Joseph’s sons.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith inspired Joseph and opened his eyes to see into the future, for as he was dying he prophesied about the exodus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “remembering the exodus.” This is amazing, since the exodus had not yet happened, so how could Joseph “remember” it? This is the eye of faith that imparts prophetic vision of the future.
      marker-yv: yv-n
    - type: text
      text: 'of Israel out of Egypt, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 50:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and gave instructions that his bones were to be taken from Egypt with them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 47:29–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith prompted the parents of Moses at his birth to hide him for three months, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'because they realized their child was exceptional '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “elegant.” This can mean pleasing in appearance and/or good character.
      marker-yv: yv-n
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' refused to be afraid of the king’s edict.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith enabled Moses to choose God’s will, for although he was raised as the son of Pharaoh’s daughter, he refused to make that his identity, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'choosing instead to suffer mistreatment with the people of God. Moses preferred faith’s certainty above the momentary enjoyment of sin’s pleasures. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He found his true wealth in suffering abuse for being anointed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the reproach of Christ.” The Greek text can be translated with either Moses as the one anointed, or Christ, the Anointed One. Moses saw the messianic hope and esteemed it greater than momentary affliction. He believed in the coming Anointed One and held the promise dear.
      marker-yv: yv-n
    - type: text
      text: 'more than in anything the world could offer him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the storehouses of Egypt.”
      marker-yv: yv-n
    - type: text
      text: 'for his eyes looked with wonder not on the immediate, but on the ultimate—faith’s great reward! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “he was paid back in the reward of a Messiah!”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Holding faith’s promise Moses abandoned Egypt and had no fear of Pharaoh’s rage because he persisted in faith as if he had seen God who is unseen.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek does not have “God” but can be translated “Moses was patient for the invisible as though he were able to see it come to be.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith stirred Moses to perform the rite of Passover and sprinkle lamb’s blood, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “pouring out of [lamb’s] blood.”
      marker-yv: yv-n
    - type: text
      text: to prevent the destroyer from harming their firstborn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “firstborn people and animals.”
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith opened the way for the Hebrews to cross the Red Sea as if on dry land, but when the Egyptians tried to cross they were swallowed up and drowned!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jericho and Rahab
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith empowers us to see that the universe was created and beautifully coordinated '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the ages were completely equipped.”
      marker-yv: yv-n
    - type: text
      text: by the power of God’s words! He spoke and the invisible realm gave birth to all that is seen.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith pulled down Jericho’s walls after the people marched around them for seven days!
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith provided a way of escape for Rahab the prostitute, avoiding the destruction of the unbelievers, because she received the Hebrew spies in peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Faith Champions
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And what more could I say to convince you? For there is not enough time to tell you of the faith of Gideon, Barak, Samson, Jephthah, David, Samuel, and the prophets. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Through faith’s power they conquered kingdoms and established true justice. Their faith fastened onto their promises and pulled them into reality! It was faith that shut the mouth of lions, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'put out the power of raging fire, and caused many to escape certain death by the sword. Although weak, their faith imparted power to make them strong! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “They were restored (healed) from sickness.”
      marker-yv: yv-n
    - type: text
      text: 'Faith sparked courage within them and they became mighty warriors in battle, pulling armies from another realm into battle array. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Although most translate this “causing enemy armies to flee” the Greek is literally “wheeling ranks drawn up in battle order, ranks which belonged to another.” The implication is that through their faith, angelic warriors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wheeled
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: into battle formation ready to fight with them in battle.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faith-filled women saw their dead children raised in resurrection power.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet it was faith that enabled others to endure great atrocities. They were stretched out on the wheel and tortured, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tortured with clubs” (beaten to death).
      marker-yv: yv-n
    - type: text
      text: and didn’t deny their faith in order to be freed, because they longed for a more honorable and glorious resurrection!
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Others were mocked and experienced the most severe beating with whips; they were in chains and imprisoned. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of these faith champions were brutally killed by stoning, being sawn in two or slaughtered by the sword. These lived in faith as they went about wearing goatskins and sheepskins for clothing. They lost everything they possessed, they endured great afflictions, and they were cruelly mistreated. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They wandered the earth living in the desert wilderness, in caves, on barren mountains and in holes in the earth. Truly, the world was not even worthy of them, not realizing who they were.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the true heroes, commended for their faith, yet they lived in hope without receiving the fullness of what was promised them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faith moved Abel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although Abel is the subject of the Greek sentence, faith is the emphasis and focus of this chapter. Nothing would have been accomplished by the figures mentioned in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
