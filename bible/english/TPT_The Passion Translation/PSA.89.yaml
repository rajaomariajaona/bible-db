segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Will You Reject Us Forever?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Poems by Ethan the Ezrahite for instruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '89'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many scholars believe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 89
      metadata:
        usfm: PSA.89
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: contains four poems or stanzas. This translation signifies each poem with an inscription.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: First Poem – God’s Promises to David
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This forever-song I sing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “sing” has multiple homonyms.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shuwr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also mean “wall.” When we feel like we are up against a wall, it is time to sing and see ourselves break through by faith. But
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shuwr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also mean “to behold” or “to perceive.” As we sing to God in abandoned worship, we perceive that his glory is greater than the wall that stands before us. The root word of the word used here for “sing” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is also the same word used for “having dominion over.” So many times when we sing in worship, exalting the loving-kindness of God, we establish dominion over any thoughts that God might not be faithful or that he may fail us. Sing when you feel defeated and watch as the walls come down and you rise to take dominion over your foes.'
    marker-yv: yv-n
  - type: text
    text: of the gentle love of God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Young and old alike will hear about
- type: usfm
  marker: q1
  children:
  - type: text
    text: your faithful, steadfast love—never failing!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Here’s my chorus: “Your mercy grows through the ages.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness is firm, rising up to the skies.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I heard the Lord say, “My covenant has been made,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I’m committed forever to my chosen one, David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I have made my oath that there will be sons of David forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sons that are kings through every generation.”
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Can you hear it? Heaven is filled with your praises, O Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the holy ones are praising you for your miracles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sons of God are all praising you for your mighty wonders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We could search the skies forever and never find one like you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the mighty angels could not be compared to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You are a God who is greatly to be feared
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you preside over the council of holy ones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are surrounded by trembling ones
- type: usfm
  marker: q1
  children:
  - type: text
    text: who are overwhelmed with fear and dread,
- type: usfm
  marker: q1
  children:
  - type: text
    text: stunned as they stand in awe of you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So awesome are you, O  '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Lord God of Angel Armies!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where could we find anyone as glorious as you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness shines all around you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You rule over oceans and the swelling seas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When their stormy waves rise, you speak, and they lie still.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a prophecy of Jesus, who would one day calm the stormy seas. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 8:23–27
      metadata:
        usfm: MAT.8.23+MAT.8.24+MAT.8.25+MAT.8.26+MAT.8.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You crushed the strongholds of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all your enemies were scattered
- type: usfm
  marker: q1
  children:
  - type: text
    text: at the mighty display of your glory-power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All the heavens and everything on earth belong to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are the Creator of all that is seen and unseen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The four corners of the earth were put in place by you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made the majestic mountains
- type: usfm
  marker: q1
  children:
  - type: text
    text: that are still shouting their praises to your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Breathtaking and awesome is your power!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Astounding and unbelievable
- type: usfm
  marker: q1
  children:
  - type: text
    text: is your might and strength when it goes on display!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Your glorious throne rests on a foundation
- type: usfm
  marker: q1
  children:
  - type: text
    text: of righteousness and just verdicts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grace and truth are the attendants who go before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: O Lord, how blessed are the people
- type: usfm
  marker: q1
  children:
  - type: text
    text: who know the triumphant shout,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “triumphant shout” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teruah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a homonym of the word for “brokenness.” Our triumphant shout can be powerful even in the midst of our brokenness.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they walk in the radiance of your presence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the radiance of your face.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: We can do nothing but leap for joy all day long,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for we know who you are and what you do,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you’ve exalted us on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The glory of your splendor is our strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your marvelous favor makes us even stronger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lifting us even higher!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You are our King, the holiest one of all;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your wraparound presence is our protection.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Second Poem – God Keeps His Promises
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: You spoke to your prophets in visions, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I have found a mighty hero for my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have chosen David as my loving servant and exalted him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have anointed him as king with the oil of my holiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will be strength to him, and I will give him
- type: usfm
  marker: q1
  children:
  - type: text
    text: my grace to sustain him no matter what comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: None of his enemies will get the best of him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor will the wicked one overpower him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For I will crush his every adversary
- type: usfm
  marker: q1
  children:
  - type: text
    text: and do away with all who hate him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Because I love him and treasure him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my faithfulness will always protect him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will place my great favor upon him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will cause his power and fame to increase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will set his hand over the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his right hand over the rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And he will come before me, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘You truly are my Father, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David was the first man in the Bible to address God as “my Father.”
    marker-yv: yv-n
  - type: text
    text: my only God, and my strong deliverer!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I am setting him apart, favoring him as my firstborn son.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make him the most high king in all the earth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I will love him forever and always show him kindness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My covenant with him will never be broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For I have decreed that he will always have an heir—
- type: usfm
  marker: q1
  children:
  - type: text
    text: a dynasty that will release the days of heaven on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-32
  - type: text
    text: But if his children turn from me and forsake my words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: refusing to walk in my truth, renouncing and violating my laws,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then I will surely punish them for their sins
- type: usfm
  marker: q1
  children:
  - type: text
    text: with my stern discipline until they regret it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But I will never, no never, lift my faithful love from off their lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My kindness will prevail and I will never disown them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: How could I revoke my covenant of love that I promised David?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have given him my word, my holy, irrevocable word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How could I lie to my loving servant David?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: Sons of David will continue to reign on his throne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their kingdom will endure as long as the sun is in the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This covenant will be an unbreakable promise that
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have established for all time.”
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: s1
  children:
  - type: text
    text: Third Poem – Why Has Our King Been Defeated?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Why have you rejected me, the one you anointed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you cast me away?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you lose your temper with me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: You have torn up the contract you made with me, your servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have stripped away my crown '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 89:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In place of the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: crown
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', some translations render “my dignity.”'
    marker-yv: yv-n
  - type: text
    text: and thrown it to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You have torn down all my walls of defense
- type: usfm
  marker: q1
  children:
  - type: text
    text: and have made my every hiding place into ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: All the passersby attack and rob me while my neighbors mock!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Instead of fighting for me, you take the side of my enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even giving them strength to subdue me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then watched them celebrate their victory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: You are no longer helping me in battle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve forsaken me to the swords of those
- type: usfm
  marker: q1
  children:
  - type: text
    text: who would strike me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: You’ve made my regal splendor to decrease
- type: usfm
  marker: q1
  children:
  - type: text
    text: and allowed my rule to be overthrown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Because of you, I’ve become old before my time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I’m publicly disgraced!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fourth Poem – Save Us, God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: How long will you hide your love from me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have you left me for good?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will your anger continue to burn against me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Remember, Lord, I am nothing but dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: here today and so soon blown away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is this all you’ve created us for? For nothing but this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Which one of us will live forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We are all mortal, terminal, for we will all one day die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which one of us would ever escape our appointment with death
- type: usfm
  marker: q1
  children:
  - type: text
    text: and dodge our own funeral?
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: So God, where is all this love and kindness you promised us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What happened to your covenant with David?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Have you forgotten how your own servants are being slandered?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord God, it seems like I’m carrying in my heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the pain and abuse of many people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: They have relentlessly insulted and persecuted us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your anointed ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Nevertheless, blessed be our God forever and ever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen! Faithful is our King!
- type: usfm
  marker: ms1
  children:
