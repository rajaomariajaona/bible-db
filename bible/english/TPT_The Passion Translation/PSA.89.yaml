document_id: PSA.89,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Will You Reject Us Forever?
  - type: text
    content: Poems by Ethan the Ezrahite for instruction
  - type: note
    content: Many scholars believe Ps. 89 contains four poems or stanzas. This translation signifies each poem with an inscription.
  - type: heading
    content: First Poem – God’s Promises to David
  - type: text
    content: 'This forever-song I sing '
  - type: note
    content: The Hebrew word for “sing” has multiple homonyms. Shuwr can also mean “wall.” When we feel like we are up against a wall, it is time to sing and see ourselves break through by faith. But shuwr can also mean “to behold” or “to perceive.” As we sing to God in abandoned worship, we perceive that his glory is greater than the wall that stands before us. The root word of the word used here for “sing” is sur, which is also the same word used for “having dominion over.” So many times when we sing in worship, exalting the loving-kindness of God, we establish dominion over any thoughts that God might not be faithful or that he may fail us. Sing when you feel defeated and watch as the walls come down and you rise to take dominion over your foes.
  - type: text
    content: of the gentle love of God!
  - type: text
    content: Young and old alike will hear about
  - type: text
    content: your faithful, steadfast love—never failing!
  '10':
  - type: text
    content: You crushed the strongholds of Egypt,
  - type: text
    content: and all your enemies were scattered
  - type: text
    content: at the mighty display of your glory-power.
  '11':
  - type: text
    content: All the heavens and everything on earth belong to you,
  - type: text
    content: for you are the Creator of all that is seen and unseen.
  '12':
  - type: text
    content: The four corners of the earth were put in place by you.
  - type: text
    content: You made the majestic mountains
  - type: text
    content: that are still shouting their praises to your name.
  '13':
  - type: text
    content: Breathtaking and awesome is your power!
  - type: text
    content: Astounding and unbelievable
  - type: text
    content: is your might and strength when it goes on display!
  '14':
  - type: text
    content: Your glorious throne rests on a foundation
  - type: text
    content: of righteousness and just verdicts.
  - type: text
    content: Grace and truth are the attendants who go before you.
  '15':
  - type: text
    content: O Lord, how blessed are the people
  - type: text
    content: who know the triumphant shout,
  - type: note
    content: The Hebrew word for “triumphant shout” is teruah, a homonym of the word for “brokenness.” Our triumphant shout can be powerful even in the midst of our brokenness.
  - type: text
    content: for they walk in the radiance of your presence.
  - type: note
    content: Or “in the radiance of your face.”
  '16':
  - type: text
    content: We can do nothing but leap for joy all day long,
  - type: text
    content: for we know who you are and what you do,
  - type: text
    content: and you’ve exalted us on high.
  '17':
  - type: text
    content: The glory of your splendor is our strength,
  - type: text
    content: and your marvelous favor makes us even stronger,
  - type: text
    content: lifting us even higher!
  '18':
  - type: text
    content: You are our King, the holiest one of all;
  - type: text
    content: your wraparound presence is our protection.
  - type: heading
    content: Second Poem – God Keeps His Promises
  '19':
  - type: text
    content: You spoke to your prophets in visions, saying,
  - type: text
    content: “I have found a mighty hero for my people.
  - type: text
    content: I have chosen David as my loving servant and exalted him.
  - type: text
    content: I have anointed him as king with the oil of my holiness.
  '2':
  - type: text
    content: 'Here’s my chorus: “Your mercy grows through the ages.'
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: Your faithfulness is firm, rising up to the skies.”
  '21':
  - type: text
    content: I will be strength to him, and I will give him
  - type: text
    content: my grace to sustain him no matter what comes.
  '22':
  - type: text
    content: None of his enemies will get the best of him,
  - type: text
    content: nor will the wicked one overpower him.
  '23':
  - type: text
    content: For I will crush his every adversary
  - type: text
    content: and do away with all who hate him.
  '24':
  - type: text
    content: Because I love him and treasure him,
  - type: text
    content: my faithfulness will always protect him.
  - type: text
    content: I will place my great favor upon him,
  - type: text
    content: and I will cause his power and fame to increase.
  '25':
  - type: text
    content: I will set his hand over the sea
  - type: text
    content: and his right hand over the rivers.
  '26':
  - type: text
    content: And he will come before me, saying,
  - type: text
    content: '‘You truly are my Father, '
  - type: note
    content: David was the first man in the Bible to address God as “my Father.”
  - type: text
    content: my only God, and my strong deliverer!’
  '27':
  - type: text
    content: I am setting him apart, favoring him as my firstborn son.
  - type: text
    content: I will make him the most high king in all the earth!
  '28':
  - type: text
    content: I will love him forever and always show him kindness.
  - type: text
    content: My covenant with him will never be broken.
  '29':
  - type: text
    content: For I have decreed that he will always have an heir—
  - type: text
    content: a dynasty that will release the days of heaven on earth.
  '3':
  - type: text
    content: I heard the Lord say, “My covenant has been made,
  - type: text
    content: and I’m committed forever to my chosen one, David.
  '30':
  - type: text
    content: But if his children turn from me and forsake my words,
  - type: text
    content: refusing to walk in my truth, renouncing and violating my laws,
  - type: text
    content: then I will surely punish them for their sins
  - type: text
    content: with my stern discipline until they regret it.
  '33':
  - type: text
    content: But I will never, no never, lift my faithful love from off their lives.
  - type: text
    content: My kindness will prevail and I will never disown them.
  '34':
  - type: text
    content: How could I revoke my covenant of love that I promised David?
  - type: text
    content: For I have given him my word, my holy, irrevocable word.
  - type: text
    content: How could I lie to my loving servant David?
  '36':
  - type: text
    content: Sons of David will continue to reign on his throne,
  - type: text
    content: and their kingdom will endure as long as the sun is in the sky.
  - type: text
    content: This covenant will be an unbreakable promise that
  - type: text
    content: I have established for all time.”
  - type: text
    content: Pause in his presence
  - type: heading
    content: Third Poem – Why Has Our King Been Defeated?
  '38':
  - type: text
    content: Why have you rejected me, the one you anointed?
  - type: text
    content: Why would you cast me away?
  - type: text
    content: Why would you lose your temper with me?
  '39':
  - type: text
    content: You have torn up the contract you made with me, your servant.
  - type: text
    content: 'You have stripped away my crown '
  - type: note
    content: In place of the word crown, some translations render “my dignity.”
  - type: text
    content: and thrown it to the ground.
  '4':
  - type: text
    content: I have made my oath that there will be sons of David forever,
  - type: text
    content: sons that are kings through every generation.”
  - type: text
    content: Pause in his presence
  '40':
  - type: text
    content: You have torn down all my walls of defense
  - type: text
    content: and have made my every hiding place into ruins.
  '41':
  - type: text
    content: All the passersby attack and rob me while my neighbors mock!
  '42':
  - type: text
    content: Instead of fighting for me, you take the side of my enemies,
  - type: text
    content: even giving them strength to subdue me,
  - type: text
    content: and then watched them celebrate their victory!
  '43':
  - type: text
    content: You are no longer helping me in battle.
  - type: text
    content: You’ve forsaken me to the swords of those
  - type: text
    content: who would strike me down.
  '44':
  - type: text
    content: You’ve made my regal splendor to decrease
  - type: text
    content: and allowed my rule to be overthrown.
  '45':
  - type: text
    content: Because of you, I’ve become old before my time,
  - type: text
    content: and I’m publicly disgraced!
  - type: text
    content: Pause in his presence
  - type: heading
    content: Fourth Poem – Save Us, God
  '46':
  - type: text
    content: How long will you hide your love from me?
  - type: text
    content: Have you left me for good?
  - type: text
    content: How long will your anger continue to burn against me?
  '47':
  - type: text
    content: Remember, Lord, I am nothing but dust,
  - type: text
    content: here today and so soon blown away.
  - type: text
    content: Is this all you’ve created us for? For nothing but this?
  '48':
  - type: text
    content: Which one of us will live forever?
  - type: text
    content: We are all mortal, terminal, for we will all one day die.
  - type: text
    content: Which one of us would ever escape our appointment with death
  - type: text
    content: and dodge our own funeral?
  - type: text
    content: Pause in his presence
  '49':
  - type: text
    content: So God, where is all this love and kindness you promised us?
  - type: text
    content: What happened to your covenant with David?
  '5':
  - type: text
    content: Can you hear it? Heaven is filled with your praises, O Lord!
  - type: text
    content: All the holy ones are praising you for your miracles.
  - type: text
    content: The sons of God are all praising you for your mighty wonders.
  - type: text
    content: We could search the skies forever and never find one like you.
  - type: text
    content: All the mighty angels could not be compared to you.
  '50':
  - type: text
    content: Have you forgotten how your own servants are being slandered?
  - type: text
    content: Lord God, it seems like I’m carrying in my heart
  - type: text
    content: all the pain and abuse of many people.
  '51':
  - type: text
    content: They have relentlessly insulted and persecuted us,
  - type: text
    content: your anointed ones.
  '52':
  - type: text
    content: Nevertheless, blessed be our God forever and ever.
  - type: text
    content: Amen! Faithful is our King!
  - type: heading
    content: Book 4
  - type: heading
    content: The Numbers Psalms
  - type: heading
    content: Psalms of our pilgrimage on earth
  '7':
  - type: text
    content: You are a God who is greatly to be feared
  - type: text
    content: as you preside over the council of holy ones.
  - type: text
    content: You are surrounded by trembling ones
  - type: text
    content: who are overwhelmed with fear and dread,
  - type: text
    content: stunned as they stand in awe of you!
  '8':
  - type: text
    content: 'So awesome are you, O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', Lord God of Angel Armies!'
  - type: text
    content: Where could we find anyone as glorious as you?
  - type: text
    content: Your faithfulness shines all around you!
  '9':
  - type: text
    content: You rule over oceans and the swelling seas.
  - type: text
    content: When their stormy waves rise, you speak, and they lie still.
  - type: note
    content: This is a prophecy of Jesus, who would one day calm the stormy seas. See Matt. 8:23–27.
