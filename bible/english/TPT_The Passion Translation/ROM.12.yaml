document_id: ROM.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Transforming Power of the Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Beloved friends, what should be our proper response to God’s marvelous mercies? To surrender yourselves to God to be his sacred, living sacrifices. And live in holiness, experiencing all that delights his heart. For this becomes your genuine expression of worship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Stop imitating the ideals and opinions of the culture around you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Don’t be squeezed into the mold of this present age.” Paul uses the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: which means “spaces of time” or “present time.” The Aramaic word carries the same idea but it is much deeper in meaning. The Aramaic word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘alma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “to surround” like being surrounded in time. Paul is warning us not to be conformed to this world surrounded by time, this temporal world coming to an end. We are not to be squeezed into the mold of this world system that is falling apart.'
    marker-yv: yv-n
  - type: text
    text: but be inwardly transformed by the Holy Spirit through a total reformation of how you think. This will empower you to discern God’s will as you live a beautiful life, satisfying and perfect in his eyes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Your Proper Role in the Body of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God has given me grace to speak a warning about pride. I would ask each of you to be emptied of self-promotion and not create a false image of your importance. Instead, honestly assess your worth by using your God-given faith as the standard of measurement, and then you will see your true value with an appropriate self-esteem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In the human body there are many parts and organs, each with a unique function. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And so it is in the body of Christ. For though we are many, we’ve all been mingled into one body in Christ. This means that we are all vitally joined to one another, with each contributing to the others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'God’s marvelous grace imparts to each one of us varying gifts. So if God has given you the grace-gift of prophecy, activate your gift by using the proportion of faith you have to prophesy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If your grace-gift is serving, then thrive in serving others well. If you have the grace-gift of teaching, then be actively teaching and training others. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If you have the grace-gift of encouragement, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “exhortation.” This is the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parakaleo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “to be alongside of someone to comfort, encourage, console, strengthen, exhort, and stir up faith.”'
    marker-yv: yv-n
  - type: text
    text: 'then use it often to encourage others. If you have the grace-gift of giving to meet the needs of others, then may you prosper in your generosity without any fanfare. If you have the gift of leadership, be passionate about your leadership. And if you have the gift of showing compassion, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “if you are a caregiver.”
    marker-yv: yv-n
  - type: text
    text: 'then flourish in your cheerful '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hilarotes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is used only here in the New Testament and can be translated “cheerful” or “hilarious.”
    marker-yv: yv-n
  - type: text
    text: display of compassion.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Transformed Relationships
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Let the inner movement of your heart always be to love one another, and never play the role of an actor wearing a mask. Despise evil and embrace everything that is good and virtuous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Be devoted to tenderly loving your fellow believers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as members of one family
  - type: text
    text: . Try to outdo yourselves in respect and honor of one another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Be enthusiastic to serve the Lord, keeping your passion toward him boiling hot! Radiate with the glow of the Holy Spirit and let him fill you with excitement as you serve him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Let this hope burst forth within you, releasing a continual joy. Don’t give up in a time of trouble, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Bear your afflictions bravely.”
    marker-yv: yv-n
  - type: text
    text: but commune with God at all times.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Take a constant interest in the needs of God’s beloved people and respond by helping them. And eagerly welcome people as guests into your home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Speak blessing, not cursing, over those who reject and persecute you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Celebrate with those who celebrate, and weep with those who grieve. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Live happily together in a spirit of harmony, and be as mindful of another’s worth as you are your own. Don’t live with a lofty mind-set, thinking you are too important to serve others, but be willing to do menial tasks and identify with those who are humble minded. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Since the Greek text is ambiguous and can mean either “be willing to do menial tasks” or “associate with the lowly,” this translation incorporates both. The Berkeley Translation renders this “adjust yourselves to humble situations.”
    marker-yv: yv-n
  - type: text
    text: Don’t be smug or even think for a moment that you know it all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Never hold a grudge or try to get even, but plan your life around the noblest way to benefit others. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Do your best to live as everybody’s friend.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to live at peace with all people.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Beloved, don’t be obsessed with taking revenge, but leave that to God’s righteous justice. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wrath.”
    marker-yv: yv-n
  - type: text
    text: 'For the Scriptures say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Vengeance is mine, and I will repay,” says the Lord.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 32:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If your enemy is hungry, buy him lunch!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Win him over with kindness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If he thirsts, give him a drink.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your surprising generosity will awaken his conscience,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and God will reward you with favor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You will heap coals of fire on his head,” an obvious figure of speech. It means that by demonstrating kindness to him, his heart will be moved and his shame exposed. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 25:21–22
      metadata:
        usfm: PRO.25.21+PRO.25.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Never let evil defeat you, but defeat evil with good.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Don’t be conquered by the evil one, but conquer evil through union with the good One.”
    marker-yv: yv-n
