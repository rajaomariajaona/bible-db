document_id: MRK.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Multiplies Food Again
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During those days, another massive crowd gathered to hear Jesus, and again, there was no food and the people were hungry. So Jesus called his disciples to come near him and said to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward, Jesus got into a boat and sailed to the vicinity of Dalmanutha.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars believe that this may have been near Magdala on the western shore of Lake Galilee. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 15:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Aramaic word for Dalmanutha means “the land of oppression.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Pharisees Demand a Sign
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as Jesus landed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “immediately.”
      marker-yv: yv-n
    - type: text
      text: 'he was confronted by the Pharisees, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “separated ones” who saw themselves as Jewish purists and guardians of religious orthodoxy. Although the text does not say what sign they were demanding, they were requiring proof of Jesus’ divine mission and ministry. The text does imply that they were disingenuous and wanted only to discredit Jesus.
      marker-yv: yv-n
    - type: text
      text: who argued with Jesus and tested him. They demanded that he give them a miraculous sign from heaven.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With a deep sigh from his spirit, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What drives this generation to clamor for a sign? Listen to the truth: there will absolutely be no sign given to this generation!”'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “generation” can also mean “a tribe or nation.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he turned and left them, got back into the boat, and crossed over to the opposite shore.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Warns of the Yeast of the Pharisees and of Herod
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, the disciples had forgotten to take bread with them, except for one loaf of flatbread. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And as they were sailing across the lake
    - type: text
      text: ', Jesus repeatedly warned them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be on your guard against the yeast
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The yeast Jesus is referring to here is hypocrisy. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The yeast of religious and political hypocrisy is what Jesus warned them to avoid.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: inside of the Pharisees and the yeast inside of Herod!”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the disciples had no clue what Jesus was talking about, so they began to discuss it among themselves, saying, “Is he saying this because we forgot to bring bread?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Knowing what they were thinking, Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why all this fussing over forgetting to bring bread? Do you still not see or understand what I say to you? Are your hearts still hard?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You have good eyes, yet you still don’t see, and you have good ears, yet you still don’t hear, neither do you remember.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I multiplied the bread to feed more than five thousand people, how many baskets full of leftovers did you gather afterward?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Twelve,” they replied.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My heart goes out to this crowd, for they’ve already been here with me for three days with nothing to eat.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And when I multiplied food to feed over four thousand, how many large baskets full of leftovers did you gather afterwards?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven,” they replied.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then how is it that you still don’t get it?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Blind Eyes
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived at Bethsaida, some people brought a blind man to Jesus, begging him to touch him and heal him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus led him, as his sighted guide, outside the village. He placed his saliva on the man’s eyes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not the common word for “eyes.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: omma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can refer to both physical and spiritual sight. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 20:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and covered them with his hands. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Jesus placed his hands over his eyes and brought light.”
      marker-yv: yv-n
    - type: text
      text: 'Then he asked him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now do you see anything?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” he said. “My sight is coming back! I’m beginning to see people, but they look like trees—walking trees.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus put his hands over the man’s eyes a second time and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made him look up
    - type: text
      text: '. The man opened his eyes wide and he could see everything perfectly. His eyesight was completely restored! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus sent him home with these instructions: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go home, but don’t tell anyone what happened, not even the people of your own village.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and some Greek manuscripts. The Greek contains many variations of this statement. Other manuscripts read “Go to your house, and if you go into the village, don’t tell anyone what happened.” Others read “Do not even go into the village.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Receives Revelation from God
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus and his disciples walked '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would likely have been a two-day journey of thirty miles north from Bethsaida.
      marker-yv: yv-n
    - type: text
      text: 'to the villages near Caesarea Philippi. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a beautiful area north of Lake Galilee near Tel-Dan. Located at the foothills of Mount Hermon, it was an ancient Roman city rebuilt by Philip the tetrarch in honor of Augustus Caesar.
      marker-yv: yv-n
    - type: text
      text: 'On the way, he posed this question to his disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do the people say that I am?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They replied, “Some say John the Baptizer, others say Elijah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For the Jews, the return of Elijah would signal the end of days. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the prophet, and still others say you must be one of the prophets.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But who do you say that I am?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Shimon” (or “Simeon”), which presents an interesting word play.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shimon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “he who hears.” Simon Peter heard the question posed by Jesus and answered it. But he also heard the revelation from the Father that Jesus is the Messiah, God’s Son. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Simon is the first one of the disciples who truly heard the Father’s revelation of the identity of Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: 'spoke up, saying, “You are the Messiah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Christ,” which means “the Anointed One” (or “Messiah”).
      marker-yv: yv-n
    - type: text
      text: the Son of the Living God!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and a small number of Greek manuscripts.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I’m concerned that if I send them home hungry, some may faint along the way, for many have come a long, long way just to be with me.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he warned them not to breathe a word of this to anyone.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prophesies His Death and Resurrection
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From then on, Jesus began to tell his disciples that he, the Son of Man, was destined to go to Jerusalem and suffer great injustice '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This great injustice refers to the beatings, mockings, rejection, and illegal trial Jesus endured. To have the Messiah suffer was contrary to every belief system among the Jews. The Messiah was to be the King of Israel, surrounded with glory, not suffering. Mark gives us three instances of Jesus prophesying his death and resurrection (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Each time Jesus made this prediction, the disciples were confused and unable to understand. So each time Jesus took the opportunity to explain what being his follower really entailed (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:34–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:33–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:35–45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'from the elders, leading priests, and religious scholars. He also explained that he would be killed and three days later be raised to life again. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus opened his heart and spoke freely with his disciples, explaining all these things to them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He spoke openly [boldly, plainly, freely, honestly] about this.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter took him aside and rebuked him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although Mark does not state what Peter was saying to Jesus, he was likely rebuking him for not understanding the role of the Messiah-King, who was going to suffer and die, but who would rise to power and bring glory to Israel. Peter wanted Jesus to come up with another plan. Yet Peter was the one who was mistaken, not Jesus. How many times have we assumed we had a better plan for our lives than God had? One moment Peter speaks profoundly about Jesus’ identity, and the next he rebukes the Messiah for choosing the wrong path.
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus turned around, and glancing at all of the other disciples, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus knew that Peter was merely being the spokesman for all twelve disciples, voicing their opinion to Jesus on their behalf.
      marker-yv: yv-n
    - type: text
      text: 'he rebuked Peter, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get out of my sight, Satan!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter’s rebuke of Jesus became, as it were, the words of Satan himself. The word used for Satan here means “adversary.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For your heart is not set on God’s plan but man’s!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “For you never cheer God but the children of men!”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What It Means to Be a Follower of Jesus
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus had his disciples and the crowd gather around him. And he said to them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you truly want to follow me, you should at once completely disown your own life. And you must be willing to share my cross and experience it as your own, as you continually surrender to my ways.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Follow me.” This powerful verse was shocking to those who heard Jesus that day. To follow Jesus is more than the dethroning of our own lives, but the enthroning of Christ.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
