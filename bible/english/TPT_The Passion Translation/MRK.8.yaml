          text: . All four Gospels record the feeding of the five thousand, but only Matthew and Mark give us the feeding of the four thousand. Many have called this the forgotten miracle. Jesus multiplied food twice with miracle power. Because of the locations of these two miracles, it is believed that the five thousand were mostly Jews and the four thousand mentioned here were mostly gentiles. First the Jew, then the gentile. First there were twelve baskets of leftovers, then seven large baskets full. Twelve is a distinctively Jewish number representing government, and seven represents fullness, indicating the fullness of blessing going out to the entire world. The Bread of Life, Jesus Christ, is now our feast.
