document_id: PSA.21,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Through Your Strength
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the end times, to the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: David’s poem of praise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Think of this song as a praise song to Jesus, our true King.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Looking Back
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', because of your strength the king is strong.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look how he rejoices in you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He bursts out with a joyful song because of your victory!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: We will watch them fail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for these are the ones who plan their evil schemes against the Lord.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They will turn and run at the sight of your judgment-arrows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aimed straight at their hearts.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Looking Up
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Rise up and put your might on display!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By your strength we will sing and praise your glorious power!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For you have given him his heart’s desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anything and everything he asks for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You haven’t withheld a thing from the king.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Rich blessings overflow with every encounter with you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you placed a royal crown of gold upon his head.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He wanted life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This can be viewed as a prophecy of our Lord Jesus asking for resurrection-life. Every verse of this psalm is prophetic, pointing us to Jesus.
      marker-yv: yv-n
    - type: text
      text: —you have given it to him and more!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days of his blessing stretch on one after another, forever!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have honored him and made him famous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Glory-garments are upon him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you surround him with splendor and majesty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your victory heaps blessing after blessing upon him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What joy and bliss he tastes, rejoicing before your face!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You make him joyful in joy with your face!”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the king trusts in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will never stumble, never fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The forever-love of the Most High holds him firm.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Looking Forward
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Your almighty hands have captured your foes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You uncovered all who hate you and you seized them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: When you appear before them,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: unveiling the radiance of your face
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will be consumed by the fierce fire of your presence.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s flames will swallow them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They and their descendants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be destroyed by an unrelenting fire.
