document_id: PSA.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Through Your Strength
  - type: text
    content: For the end times, to the Pure and Shining One
  - type: text
    content: David’s poem of praise
  - type: note
    content: Think of this song as a praise song to Jesus, our true King.
  - type: heading
    content: Looking Back
  - type: text
    content: Yahweh
  - type: text
    content: ', because of your strength the king is strong.'
  - type: text
    content: Look how he rejoices in you!
  - type: text
    content: He bursts out with a joyful song because of your victory!
  '11':
  - type: text
    content: We will watch them fail,
  - type: text
    content: for these are the ones who plan their evil schemes against the Lord.
  '12':
  - type: text
    content: They will turn and run at the sight of your judgment-arrows
  - type: text
    content: aimed straight at their hearts.
  - type: heading
    content: Looking Up
  '13':
  - type: text
    content: Rise up and put your might on display!
  - type: text
    content: By your strength we will sing and praise your glorious power!
  '2':
  - type: text
    content: For you have given him his heart’s desire,
  - type: text
    content: anything and everything he asks for.
  - type: text
    content: You haven’t withheld a thing from the king.
  - type: text
    content: Pause in his presence
  '3':
  - type: text
    content: Rich blessings overflow with every encounter with you,
  - type: text
    content: and you placed a royal crown of gold upon his head.
  '4':
  - type: text
    content: 'He wanted life '
  - type: note
    content: This can be viewed as a prophecy of our Lord Jesus asking for resurrection-life. Every verse of this psalm is prophetic, pointing us to Jesus.
  - type: text
    content: —you have given it to him and more!
  - type: text
    content: The days of his blessing stretch on one after another, forever!
  '5':
  - type: text
    content: You have honored him and made him famous.
  - type: text
    content: Glory-garments are upon him,
  - type: text
    content: and you surround him with splendor and majesty.
  '6':
  - type: text
    content: Your victory heaps blessing after blessing upon him.
  - type: text
    content: What joy and bliss he tastes, rejoicing before your face!
  - type: note
    content: Or “You make him joyful in joy with your face!”
  '7':
  - type: text
    content: 'For the king trusts in '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and he will never stumble, never fall.
  - type: text
    content: The forever-love of the Most High holds him firm.
  - type: heading
    content: Looking Forward
  '8':
  - type: text
    content: Your almighty hands have captured your foes.
  - type: text
    content: You uncovered all who hate you and you seized them.
  '9':
  - type: text
    content: When you appear before them,
  - type: text
    content: unveiling the radiance of your face
  - type: text
    content: ','
  - type: text
    content: they will be consumed by the fierce fire of your presence.
  - type: text
    content: Yahweh
  - type: text
    content: ’s flames will swallow them up.
  - type: text
    content: They and their descendants
  - type: text
    content: will be destroyed by an unrelenting fire.
