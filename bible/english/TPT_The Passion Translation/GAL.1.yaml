      - type: text
        text: is used throughout the New Testament for brothers (and sisters). It is used in classical Greek by physicians to describe “those who came from the same womb.” Every believer is born from the same “womb” of the Father’s heart and the wounded side of Jesus Christ. In the time of Alexander the Great, the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
