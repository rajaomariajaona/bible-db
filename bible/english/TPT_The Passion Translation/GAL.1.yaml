document_id: GAL.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'From Paul, '
  - type: note
    content: The name Paul means “little.” His name before his conversion was Saul, which means “significant one” or “sought after.” What great transformation takes place when we experience a profound change as Saul did! God transforms us from being “important” to being “small” in our own eyes. This is what qualifies God’s apostolic servants.
  - type: text
    content: 'an apostle '
  - type: note
    content: The word apostle means “one who is sent on a mission” or “an ambassador.” By implication, an apostle carries the delegated authority of the one who sends him. Jesus Christ chose Paul to be an apostle to plant churches and impart the revelation of Christ and his true gospel. The New Testament refers more often to the gift of apostle than all the other ascension gifts (prophet, evangelist, pastor, and teacher) combined. See Eph. 4:11.
  - type: text
    content: 'of Jesus Christ. My apostleship was not granted to me by men, for I was appointed by Jesus Christ, and God the Father, who raised him from the dead. '
  '10':
  - type: text
    content: I’m obviously not trying to flatter you or water down my message to be popular with men, but my supreme passion is to please God. For if all I attempt to do is please people, I would fail to be a true servant of Christ.
  - type: heading
    content: How Paul Became an Apostle
  '11':
  - type: text
    content: 'Beloved ones, let me repeat emphatically that the gospel entrusted to me was not given to me by any man. '
  '12':
  - type: text
    content: No one taught me this revelation, for it was given to me directly by the unveiling of Jesus Christ.
  '13':
  - type: text
    content: 'By now you have heard stories of how severely '
  - type: note
    content: The Aramaic can be translated “beyond measure.”
  - type: text
    content: 'I harassed and persecuted Christians and how systematically I endeavored to destroy God’s church, all because of my radical devotion to the Jewish religion. '
  - type: note
    content: The Jewish way of life includes not only religion but also culture. Paul is using the word religion broadly, not only to include the rich culture of Judaism, but also to include the various religious traditions not found in the Torah.
  '14':
  - type: text
    content: My zeal and passion for the doctrines of Judaism distinguished me among my people, for I was far more advanced in my religious instruction than others my age.
  '15':
  - type: text
    content: 'But then God called me by his grace, and chose me from my birth to be his. '
  '16':
  - type: text
    content: 'He was pleased to unveil his Son in me so that I would proclaim him to the peoples of the world. After I had this encounter, I kept it a secret for some time, sharing it with no one. '
  '17':
  - type: text
    content: 'And I had no desire to run to Jerusalem and try to impress those who had become apostles before me. Instead, I withdrew into the Arabian Desert. Then I returned to Damascus, '
  - type: text
    content: where I had first encountered Jesus
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'I remained there for three years until I eventually went up to Jerusalem, met the apostle Peter, '
  - type: note
    content: The Aramaic name of Peter is kefa, which means “rock.”
  - type: text
    content: 'and stayed with him for a couple of weeks. '
  '19':
  - type: text
    content: 'The only other apostle I met during that time was Jacob, '
  - type: note
    content: Or “James.” However, his true name was not James, but Jacob. See the introduction to the book of James (Jacob).
  - type: text
    content: the Lord’s brother.
  '2':
  - type: text
    content: 'All the brothers and sisters '
  - type: note
    content: The Greek word adelphos is used throughout the New Testament for brothers (and sisters). It is used in classical Greek by physicians to describe “those who came from the same womb.” Every believer is born from the same “womb” of the Father’s heart and the wounded side of Jesus Christ. In the time of Alexander the Great, the word adelphos was used not only for brothers (and sisters), but for “faithful soldiers.” How wonderful it is in our journey to know that we have partners in battle fighting for the faith alongside of us.
  - type: text
    content: join with me as I write this letter to the churches throughout the region of central Turkey.
  - type: note
    content: Or “Galatia.” This was the region in Asia Minor (modern-day Turkey) that Paul visited during his first and second missionary journeys. See Acts 16:1–5.
  '20':
  - type: text
    content: 'Everything I’m describing to you I confess before God to be the absolute truth. '
  '21':
  - type: text
    content: 'After my stay in Jerusalem, I went to Syria and southeast Turkey, '
  - type: note
    content: Or “Cilicia,” which was the southeastern province of Asia Minor, directly adjoining Syria.
  '22':
  - type: text
    content: 'but I remained unknown to the churches '
  - type: note
    content: Today we would call these Jewish believers in Messiah “Messianic Jews”—not only Jewish (by birth) but also Christian (by faith).
  - type: text
    content: 'in Judea. '
  '23':
  - type: text
    content: 'The only thing they heard about me was this: “Our former enemy, who once brutally persecuted us, is now preaching the good news of the faith that he tried to destroy!” '
  '24':
  - type: text
    content: Because of the transformation that took place in my life
  - type: text
    content: ', they praised God even more!'
  '3':
  - type: text
    content: 'May God’s undeserved kindness and total well-being '
  - type: note
    content: This is the word peace, which in the Hebraic mindset means “health, prosperity, peace, and total well-being.” The phrase grace and peace appears as a greeting in Rom. 1:7, 1 Cor. 1:3, 2 Cor. 1:2, Gal. 1:3, Eph. 1:2, Phil. 1:2, Col. 1:2, 1 Thess. 1:1, 2 Thess. 1:2, Titus 1:4, 1 Peter 1:2, 2 Peter 1:2, and Rev. 1:4.
  - type: text
    content: 'that flow from our Father God and from the Lord Jesus be yours. '
  - type: note
    content: Grace was not just a “message” that Paul taught; it was the way he dealt with deceived people. Even over the confused churches that were mixing works and grace, Paul spoke words of blessing and peace. When we learn to bless and release “undeserved kindness” and “well-being” over those who oppose us, perhaps then they will listen to us.
  '4':
  - type: text
    content: 'He’s the Anointed One who offered himself '
  - type: text
    content: as the sacrifice
  - type: text
    content: ' for our sins! He has rescued us from this evil world system '
  - type: note
    content: This “evil world system” would include the religious system that is based on duty and performance instead of love and grace.
  - type: text
    content: 'and set us free, just as our Father God desired. '
  '5':
  - type: text
    content: May all the glory be to God alone, throughout time and eternity. Amen!
  - type: heading
    content: One Gospel
  '6':
  - type: text
    content: 'I am shocked over how quickly you have strayed away from the One who called you in the grace of Christ. I’m astounded that you now embrace a distorted '
  - type: note
    content: Or “another gospel.”
  - type: text
    content: 'gospel! '
  '7':
  - type: text
    content: That is a fake “gospel” that is simply not true. There is only one gospel—the good news of Christ! Yet you have allowed those who mingle law with grace to confuse you.
  '8':
  - type: text
    content: But even if we or an angel from heaven should preach a gospel different than the one we preached to you, let them be under God’s curse!
  '9':
  - type: text
    content: 'Let me make it clear: Anyone, no matter who they are, that brings you a different gospel than the gospel that you have received, let them be condemned and cursed!'
