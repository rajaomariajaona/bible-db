document_id: GAL.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Paul, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Paul means “little.” His name before his conversion was Saul, which means “significant one” or “sought after.” What great transformation takes place when we experience a profound change as Saul did! God transforms us from being “important” to being “small” in our own eyes. This is what qualifies God’s apostolic servants.
      marker-yv: yv-n
    - type: text
      text: 'an apostle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apostle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “one who is sent on a mission” or “an ambassador.” By implication, an apostle carries the delegated authority of the one who sends him. Jesus Christ chose Paul to be an apostle to plant churches and impart the revelation of Christ and his true gospel. The New Testament refers more often to the gift of apostle than all the other ascension gifts (prophet, evangelist, pastor, and teacher) combined. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'of Jesus Christ. My apostleship was not granted to me by men, for I was appointed by Jesus Christ, and God the Father, who raised him from the dead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I’m obviously not trying to flatter you or water down my message to be popular with men, but my supreme passion is to please God. For if all I attempt to do is please people, I would fail to be a true servant of Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: How Paul Became an Apostle
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved ones, let me repeat emphatically that the gospel entrusted to me was not given to me by any man. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one taught me this revelation, for it was given to me directly by the unveiling of Jesus Christ.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By now you have heard stories of how severely '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “beyond measure.”
      marker-yv: yv-n
    - type: text
      text: 'I harassed and persecuted Christians and how systematically I endeavored to destroy God’s church, all because of my radical devotion to the Jewish religion. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish way of life includes not only religion but also culture. Paul is using the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: religion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: broadly, not only to include the rich culture of Judaism, but also to include the various religious traditions not found in the Torah.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: My zeal and passion for the doctrines of Judaism distinguished me among my people, for I was far more advanced in my religious instruction than others my age.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But then God called me by his grace, and chose me from my birth to be his. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was pleased to unveil his Son in me so that I would proclaim him to the peoples of the world. After I had this encounter, I kept it a secret for some time, sharing it with no one. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I had no desire to run to Jerusalem and try to impress those who had become apostles before me. Instead, I withdrew into the Arabian Desert. Then I returned to Damascus, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where I had first encountered Jesus
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I remained there for three years until I eventually went up to Jerusalem, met the apostle Peter, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic name of Peter is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kefa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “rock.”'
      marker-yv: yv-n
    - type: text
      text: 'and stayed with him for a couple of weeks. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The only other apostle I met during that time was Jacob, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “James.” However, his true name was not James, but Jacob. See the introduction to the book of James (Jacob).
      marker-yv: yv-n
    - type: text
      text: the Lord’s brother.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the brothers and sisters '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: adelphos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used throughout the New Testament for brothers (and sisters). It is used in classical Greek by physicians to describe “those who came from the same womb.” Every believer is born from the same “womb” of the Father’s heart and the wounded side of Jesus Christ. In the time of Alexander the Great, the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: adelphos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used not only for brothers (and sisters), but for “faithful soldiers.” How wonderful it is in our journey to know that we have partners in battle fighting for the faith alongside of us.
      marker-yv: yv-n
    - type: text
      text: join with me as I write this letter to the churches throughout the region of central Turkey.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Galatia.” This was the region in Asia Minor (modern-day Turkey) that Paul visited during his first and second missionary journeys. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16:1–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everything I’m describing to you I confess before God to be the absolute truth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After my stay in Jerusalem, I went to Syria and southeast Turkey, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cilicia,” which was the southeastern province of Asia Minor, directly adjoining Syria.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I remained unknown to the churches '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Today we would call these Jewish believers in Messiah “Messianic Jews”—not only Jewish (by birth) but also Christian (by faith).
      marker-yv: yv-n
    - type: text
      text: 'in Judea. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The only thing they heard about me was this: “Our former enemy, who once brutally persecuted us, is now preaching the good news of the faith that he tried to destroy!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Because of the transformation that took place in my life
    - type: text
      text: ', they praised God even more!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May God’s undeserved kindness and total well-being '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: peace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which in the Hebraic mindset means “health, prosperity, peace, and total well-being.” The phrase'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: grace and peace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: appears as a greeting in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
