    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was used not only for brothers (and sisters), but for “faithful soldiers.” How wonderful it is in our journey to know that we have partners in battle fighting for the faith alongside of us.
    marker-yv: yv-n
  - type: text
    text: join with me as I write this letter to the churches throughout the region of central Turkey.
  - type: usfm
    marker: f
    children:
