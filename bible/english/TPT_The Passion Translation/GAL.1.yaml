    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Paul means “little.” His name before his conversion was Saul, which means “significant one” or “sought after.” What great transformation takes place when we experience a profound change as Saul did! God transforms us from being “important” to being “small” in our own eyes. This is what qualifies God’s apostolic servants.
    marker-yv: yv-n
  - type: text
    text: 'an apostle '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apostle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “one who is sent on a mission” or “an ambassador.” By implication, an apostle carries the delegated authority of the one who sends him. Jesus Christ chose Paul to be an apostle to plant churches and impart the revelation of Christ and his true gospel. The New Testament refers more often to the gift of apostle than all the other ascension gifts (prophet, evangelist, pastor, and teacher) combined. See
    - type: usfm
