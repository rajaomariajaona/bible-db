  - type: text
    text: 'that flow from our Father God and from the Lord Jesus be yours. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grace was not just a “message” that Paul taught; it was the way he dealt with deceived people. Even over the confused churches that were mixing works and grace, Paul spoke words of blessing and peace. When we learn to bless and release “undeserved kindness” and “well-being” over those who oppose us, perhaps then they will listen to us.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He’s the Anointed One who offered himself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as the sacrifice
  - type: text
    text: ' for our sins! He has rescued us from this evil world system '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “evil world system” would include the religious system that is based on duty and performance instead of love and grace.
    marker-yv: yv-n
  - type: text
    text: 'and set us free, just as our Father God desired. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May all the glory be to God alone, throughout time and eternity. Amen!
- type: usfm
  marker: s1
  children:
  - type: text
    text: One Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I am shocked over how quickly you have strayed away from the One who called you in the grace of Christ. I’m astounded that you now embrace a distorted '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “another gospel.”
    marker-yv: yv-n
  - type: text
    text: 'gospel! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That is a fake “gospel” that is simply not true. There is only one gospel—the good news of Christ! Yet you have allowed those who mingle law with grace to confuse you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But even if we or an angel from heaven should preach a gospel different than the one we preached to you, let them be under God’s curse!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let me make it clear: Anyone, no matter who they are, that brings you a different gospel than the gospel that you have received, let them be condemned and cursed!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I’m obviously not trying to flatter you or water down my message to be popular with men, but my supreme passion is to please God. For if all I attempt to do is please people, I would fail to be a true servant of Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: How Paul Became an Apostle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Beloved ones, let me repeat emphatically that the gospel entrusted to me was not given to me by any man. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: No one taught me this revelation, for it was given to me directly by the unveiling of Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'By now you have heard stories of how severely '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “beyond measure.”
    marker-yv: yv-n
  - type: text
    text: 'I harassed and persecuted Christians and how systematically I endeavored to destroy God’s church, all because of my radical devotion to the Jewish religion. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jewish way of life includes not only religion but also culture. Paul is using the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: religion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: broadly, not only to include the rich culture of Judaism, but also to include the various religious traditions not found in the Torah.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My zeal and passion for the doctrines of Judaism distinguished me among my people, for I was far more advanced in my religious instruction than others my age.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But then God called me by his grace, and chose me from my birth to be his. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He was pleased to unveil his Son in me so that I would proclaim him to the peoples of the world. After I had this encounter, I kept it a secret for some time, sharing it with no one. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And I had no desire to run to Jerusalem and try to impress those who had become apostles before me. Instead, I withdrew into the Arabian Desert. Then I returned to Damascus, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: where I had first encountered Jesus
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I remained there for three years until I eventually went up to Jerusalem, met the apostle Peter, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic name of Peter is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kefa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “rock.”'
    marker-yv: yv-n
  - type: text
    text: 'and stayed with him for a couple of weeks. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The only other apostle I met during that time was Jacob, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “James.” However, his true name was not James, but Jacob. See the introduction to the book of James (Jacob).
    marker-yv: yv-n
  - type: text
    text: the Lord’s brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Everything I’m describing to you I confess before God to be the absolute truth. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After my stay in Jerusalem, I went to Syria and southeast Turkey, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Cilicia,” which was the southeastern province of Asia Minor, directly adjoining Syria.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'but I remained unknown to the churches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Today we would call these Jewish believers in Messiah “Messianic Jews”—not only Jewish (by birth) but also Christian (by faith).
    marker-yv: yv-n
  - type: text
    text: 'in Judea. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The only thing they heard about me was this: “Our former enemy, who once brutally persecuted us, is now preaching the good news of the faith that he tried to destroy!” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Because of the transformation that took place in my life
