document_id: EZK.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Worthless Vine
  - type: text
    content: ' '
  - type: note
    content: 'In Ezek. 15–17 we find three parables that demonstrate that Jerusalem has no hope of deliverance: the parable of the worthless vine, the parable of the unfaithful wife of Yahweh, and the parable of two eagles and a vine.'
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '2':
  - type: text
    content: '“Son of man, how is the wood of the grapevine different than that of other tree branches of the forest? '
  - type: note
    content: Or “of all the branches of the trees of the forest, what happens to the wood of the grapevine?” The grapevine is a common biblical metaphor for Israel (see Ps. 80:8–19; Isa. 5:1–7). In the New Testament, Jesus describes himself as the true sprouting vine and believers as his branches (see John 15). God is humbling Israel and us with these words. The lowly grapevine is nothing compared to the lofty trees of the land, yet God has shown us his grace and loving favor.
  '3':
  - type: text
    content: 'Can its wood be used for making anything? Can it be used as pegs to hang things on? '
  '4':
  - type: text
    content: 'Look, it is good only for building a fire. When fire burns off both ends and the middle is charred, '
  - type: note
    content: The burned off ends are the Northern Kingdom of Israel and the Southern Kingdom of Judah. The charred middle is Jerusalem.
  - type: text
    content: 'is it useful for anything? '
  '5':
  - type: text
    content: Even while it was intact, you could make nothing with it. When it’s burned and charred, it’s even more worthless.”
  '6':
  - type: text
    content: 'So, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “Just like I made the wood of the vine only useful as firewood, so I will treat the people of Jerusalem. '
  '7':
  - type: text
    content: 'I will oppose them! They may have escaped one fire, but another fire will yet devour them. '
  - type: note
    content: The first “fire” refers metaphorically to the first time Nebuchadnezzar captured Jerusalem in 597 BC. People who survived that invasion were still living in Jerusalem when Ezekiel prophesied. The second “fire” refers to the final destruction of Jerusalem by Nebuchadnezzar in 586 BC.
  - type: text
    content: 'When I set my face against them, then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  '8':
  - type: text
    content: 'Because of their unfaithfulness and infidelity, I will reduce the land to a desert. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
