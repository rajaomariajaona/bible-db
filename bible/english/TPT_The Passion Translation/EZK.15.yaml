  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezek. 15–17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'we find three parables that demonstrate that Jerusalem has no hope of deliverance: the parable of the worthless vine, the parable of the unfaithful wife of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and the parable of two eagles and a vine.'
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, how is the wood of the grapevine different than that of other tree branches of the forest? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “of all the branches of the trees of the forest, what happens to the wood of the grapevine?” The grapevine is a common biblical metaphor for Israel (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 80:8–19
      metadata:
        usfm: PSA.80.8+PSA.80.9+PSA.80.10+PSA.80.11+PSA.80.12+PSA.80.13+PSA.80.14+PSA.80.15+PSA.80.16+PSA.80.17+PSA.80.18+PSA.80.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 5:1–7
      metadata:
        usfm: ISA.5.1+ISA.5.2+ISA.5.3+ISA.5.4+ISA.5.5+ISA.5.6+ISA.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In the New Testament, Jesus describes himself as the true sprouting vine and believers as his branches (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 15
      metadata:
        usfm: JHN.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God is humbling Israel and us with these words. The lowly grapevine is nothing compared to the lofty trees of the land, yet God has shown us his grace and loving favor.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Can its wood be used for making anything? Can it be used as pegs to hang things on? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Look, it is good only for building a fire. When fire burns off both ends and the middle is charred, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The burned off ends are the Northern Kingdom of Israel and the Southern Kingdom of Judah. The charred middle is Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'is it useful for anything? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even while it was intact, you could make nothing with it. When it’s burned and charred, it’s even more worthless.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: “Just like I made the wood of the vine only useful as firewood, so I will treat the people of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will oppose them! They may have escaped one fire, but another fire will yet devour them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first “fire” refers metaphorically to the first time Nebuchadnezzar captured Jerusalem in 597 BC. People who survived that invasion were still living in Jerusalem when Ezekiel prophesied. The second “fire” refers to the final destruction of Jerusalem by Nebuchadnezzar in 586 BC.
    marker-yv: yv-n
  - type: text
    text: 'When I set my face against them, then you will know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Because of their unfaithfulness and infidelity, I will reduce the land to a desert. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
