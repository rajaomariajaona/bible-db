- type: usfm
  marker: s1
  children:
  - type: text
    text: The Religious Leaders Bring Charges against Jeremiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the priests and prophets said to the leaders and all the people, “This man deserves to die, since he has prophesied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: horrible things
  - type: text
    text: ' against this city, which you yourselves have heard.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Jeremiah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: defended himself
  - type: text
    text: ' before all the leaders and the people, saying, “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' himself sent me to prophesy this message you have heard me speak against this temple and this city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But if you stop doing evil, change your ways, and obey the voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' your God, then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will stop the impending disaster and relent of what he has decreed against you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As for me, I am in your hands. Do with me whatever seems right to you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jeremiah was a prophet of great faith and confidence in God’s protection, unlike Uriah, who fled (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20–23
      metadata:
        usfm: JER.26.20+JER.26.21+JER.26.22+JER.26.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Only be sure of this: if you put me to death, you will be bringing innocent blood on yourselves, on this city, and on its people, since '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has truly sent me to bring you the warning you have heard.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Spared
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then all the leaders and the people said to the priests and prophets, “This man does not deserve to die, for he has spoken to us in the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' our God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And some of the elders of the nation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The elders were community leaders and officials from various parts of Israel who had gathered in Jerusalem. Perhaps this episode took place during one of Israel’s national feasts.
    marker-yv: yv-n
  - type: text
    text: 'then stood to address the crowd: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“In the days of Hezekiah king of Judah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the prophet
  - type: text
    text: ' Micah of Moresheth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 1:1
      metadata:
        usfm: MIC.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Moresheth was a small village about twenty-three miles (thirty-seven kilometers) southwest of Jerusalem. It has been tentatively identified as Tell ej-Judeideh, where, according to Jerome, a church was built over Micah’s tomb.
    marker-yv: yv-n
  - type: text
    text: prophesied to all the people of Judah, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, declares:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Zion will be plowed under like a field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jerusalem will become a heap of rubble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the Temple Mount will be covered with overgrowth.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 3:12
      metadata:
        usfm: MIC.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is significant that this is the only place in all the prophetic literature where one prophet directly quotes another by name.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Did King Hezekiah and the people of Judah sentence Micah to death for prophesying this? Did not the king rather fear '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: humble himself
  - type: text
    text: ', and plead earnestly '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The phrase “plead earnestly” is a special Hebrew idiom (
    - type: usfm
      marker: it
      children:
      - type: text
        text: chalah panim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) that most translate as “entreat the favor of.” It is literally “make gentle the face” or, colloquially, “to make God smile.” That is why you find it used in particularly stressful circumstances, when it is very important that the prayers of men cause God to change his mind. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'with him so that he relented of the disaster that he had decreed against them? Do we really want to bring a disaster upon ourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with such a crime
  - type: text
    text: ?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Prophet Uriah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'There was another prophet in those day who prophesied in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s name, Uriah son of Shemaiah, from Kiriath Jearim. He prophesied the same things against Judah and Jerusalem as Jeremiah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When King Jehoiakim and all his leaders and mighty men heard what Uriah prophesied, the king was determined to put him to death. On hearing this, he was afraid and escaped to Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'King Jehoiakim, however, sent Elnathan son of Achbor to Egypt with others, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'who brought Uriah back from Egypt and took him to King Jehoiakim. The king executed Uriah with the sword '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
