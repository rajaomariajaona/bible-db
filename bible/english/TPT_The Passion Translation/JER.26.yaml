document_id: JER.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Life Is Threatened
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to Jeremiah at the beginning of the reign of Jehoiakim son of Josiah, king of Judah.'
  - type: note
    content: The date of this chapter would be about 609 or 608 BC.
  '10':
  - type: text
    content: 'Upon hearing about this, the leaders of Judah went up from the royal palace to the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and took their seats '
  - type: text
    content: to hold court
  - type: text
    content: ' at the gate of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s temple.
  - type: note
    content: Or “the New Gate of the house of Yahweh,” which is likely an expanded text based on 36:10. In that era, city gates served as places for a court of judgment (see Deut. 21:19; 2 Sam. 15:2; Amos 5:10–12).
  - type: heading
    content: The Religious Leaders Bring Charges against Jeremiah
  '11':
  - type: text
    content: 'Then the priests and prophets said to the leaders and all the people, “This man deserves to die, since he has prophesied '
  - type: text
    content: horrible things
  - type: text
    content: ' against this city, which you yourselves have heard.”'
  '12':
  - type: text
    content: 'Then Jeremiah '
  - type: text
    content: defended himself
  - type: text
    content: ' before all the leaders and the people, saying, “'
  - type: text
    content: Yahweh
  - type: text
    content: ' himself sent me to prophesy this message you have heard me speak against this temple and this city. '
  '13':
  - type: text
    content: 'But if you stop doing evil, change your ways, and obey the voice of '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God, then '
  - type: text
    content: Yahweh
  - type: text
    content: ' will stop the impending disaster and relent of what he has decreed against you. '
  '14':
  - type: text
    content: 'As for me, I am in your hands. Do with me whatever seems right to you. '
  - type: note
    content: Jeremiah was a prophet of great faith and confidence in God’s protection, unlike Uriah, who fled (see vv. 20–23).
  '15':
  - type: text
    content: 'Only be sure of this: if you put me to death, you will be bringing innocent blood on yourselves, on this city, and on its people, since '
  - type: text
    content: Yahweh
  - type: text
    content: ' has truly sent me to bring you the warning you have heard.”'
  - type: heading
    content: Jeremiah Spared
  '16':
  - type: text
    content: 'Then all the leaders and the people said to the priests and prophets, “This man does not deserve to die, for he has spoken to us in the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God.”'
  '17':
  - type: text
    content: 'And some of the elders of the nation '
  - type: note
    content: The elders were community leaders and officials from various parts of Israel who had gathered in Jerusalem. Perhaps this episode took place during one of Israel’s national feasts.
  - type: text
    content: 'then stood to address the crowd: '
  '18':
  - type: text
    content: '“In the days of Hezekiah king of Judah, '
  - type: text
    content: the prophet
  - type: text
    content: ' Micah of Moresheth '
  - type: note
    content: See Mic. 1:1. Moresheth was a small village about twenty-three miles (thirty-seven kilometers) southwest of Jerusalem. It has been tentatively identified as Tell ej-Judeideh, where, according to Jerome, a church was built over Micah’s tomb.
  - type: text
    content: prophesied to all the people of Judah, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declares:'
  - type: text
    content: “ ‘Zion will be plowed under like a field,
  - type: text
    content: Jerusalem will become a heap of rubble,
  - type: text
    content: and the Temple Mount will be covered with overgrowth.’
  - type: note
    content: See Mic. 3:12. It is significant that this is the only place in all the prophetic literature where one prophet directly quotes another by name.
  '19':
  - type: text
    content: '“Did King Hezekiah and the people of Judah sentence Micah to death for prophesying this? Did not the king rather fear '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: humble himself
  - type: text
    content: ', and plead earnestly '
  - type: note
    content: The phrase “plead earnestly” is a special Hebrew idiom (chalah panim) that most translate as “entreat the favor of.” It is literally “make gentle the face” or, colloquially, “to make God smile.” That is why you find it used in particularly stressful circumstances, when it is very important that the prayers of men cause God to change his mind. See 2 Kings 13:4.
  - type: text
    content: 'with him so that he relented of the disaster that he had decreed against them? Do we really want to bring a disaster upon ourselves '
  - type: text
    content: with such a crime
  - type: text
    content: ?”
  - type: heading
    content: The Prophet Uriah
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Stand in the court of my house, the temple, and announce what I tell you to say to the crowds coming to worship me from the cities of Judah. Do not leave out anything or hold back a word. '
  '20':
  - type: text
    content: 'There was another prophet in those day who prophesied in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s name, Uriah son of Shemaiah, from Kiriath Jearim. He prophesied the same things against Judah and Jerusalem as Jeremiah. '
  '21':
  - type: text
    content: 'When King Jehoiakim and all his leaders and mighty men heard what Uriah prophesied, the king was determined to put him to death. On hearing this, he was afraid and escaped to Egypt. '
  '22':
  - type: text
    content: 'King Jehoiakim, however, sent Elnathan son of Achbor to Egypt with others, '
  '23':
  - type: text
    content: 'who brought Uriah back from Egypt and took him to King Jehoiakim. The king executed Uriah with the sword '
  - type: note
    content: See Heb. 11:37. Uriah means “Yah is Light” or “Light of Yah.”
  - type: text
    content: and had his body thrown into the common burial ground.
  '24':
  - type: text
    content: 'Nevertheless Jeremiah escaped execution—but only because Ahikam, '
  - type: note
    content: Ahikam was one of those whom King Josiah sent to seek counsel from the prophetess Huldah about the scroll Josiah found in the temple (see 2 Kings 22:12). Ahikam’s son was Gedaliah, who also befriended Jeremiah (see Jer. 39:14) and was given charge of Judah after the Babylonian invasion.
  - type: text
    content: the son of Shaphan, protected him and would not allow him to be handed over to the furious crowd.
  '3':
  - type: text
    content: Perhaps they will listen, and they will all turn from their evil ways. If so, I will relent and not bring the impending disaster I have planned for them because of their evil deeds.
  '4':
  - type: text
    content: '“Give them this warning: ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ' says: If you will not listen to me and obey the instructions that I have given you '
  '5':
  - type: text
    content: 'or heed the words of my servants the prophets, whom I keep sending to you even though you have not obeyed them, '
  '6':
  - type: text
    content: 'then I will make this temple into '
  - type: text
    content: a pile of ruins
  - type: text
    content: ' just like I did to Shiloh. '
  - type: note
    content: Shiloh had once been the location of the tabernacle (see Josh. 18:1). The Philistines captured the ark of the covenant from Israel at the battle of Aphek (see 1 Sam. 4:1–11) and likely also destroyed Shiloh at that time (see Ps. 78:60–64; Jer. 7:12).
  - type: text
    content: This city will become a worldwide object of cursing.’ ”
  '7':
  - type: text
    content: 'The priests, prophets, and all the people heard what Jeremiah said in the temple court of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'When Jeremiah had finished speaking the message '
  - type: text
    content: Yahweh
  - type: text
    content: ' had ordered him to give to the people, all the priests, prophets, '
  - type: note
    content: The Septuagint adds the word false (“false prophets”) in vv. 8, 11, and 16. Most of the prophets during the days of Jeremiah were false prophets who gave the people a false hope.
  - type: text
    content: 'and people forcefully seized him and said, “You ought to be killed for this! '
  - type: note
    content: Or “Judgment of death to this man!” The people not only followed the lies of the false prophets, but they also hated the words of the true prophet and wanted to kill him. They believed Jeremiah was the false prophet among them. See Deut. 18:20.
  '9':
  - type: text
    content: 'Why have you prophesied in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s name, ‘This temple will become a pile of ruins like Shiloh, and Jerusalem become an uninhabited ruin?’ ” Then a mob formed and ganged up against Jeremiah in the temple court of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
