      text: '4'
  - type: text
    text: '“Give them this warning: ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: If you will not listen to me and obey the instructions that I have given you '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'or heed the words of my servants the prophets, whom I keep sending to you even though you have not obeyed them, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'then I will make this temple into '
  - type: usfm
    marker: it
