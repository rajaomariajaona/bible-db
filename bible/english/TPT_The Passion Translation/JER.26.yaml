verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Life Is Threatened
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke these words to Jeremiah at the beginning of the reign of Jehoiakim son of Josiah, king of Judah.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The date of this chapter would be about 609 or 608 BC.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Upon hearing about this, the leaders of Judah went up from the royal palace to the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and took their seats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to hold court
    - type: text
      text: ' at the gate of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s temple.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the New Gate of the house of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ',” which is likely an expanded text based on'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . In that era, city gates served as places for a court of judgment (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 21:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 5:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Religious Leaders Bring Charges against Jeremiah
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priests and prophets said to the leaders and all the people, “This man deserves to die, since he has prophesied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horrible things
    - type: text
      text: ' against this city, which you yourselves have heard.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jeremiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: defended himself
    - type: text
      text: ' before all the leaders and the people, saying, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' himself sent me to prophesy this message you have heard me speak against this temple and this city. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you stop doing evil, change your ways, and obey the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God, then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will stop the impending disaster and relent of what he has decreed against you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for me, I am in your hands. Do with me whatever seems right to you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah was a prophet of great faith and confidence in God’s protection, unlike Uriah, who fled (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only be sure of this: if you put me to death, you will be bringing innocent blood on yourselves, on this city, and on its people, since '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has truly sent me to bring you the warning you have heard.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Spared
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the leaders and the people said to the priests and prophets, “This man does not deserve to die, for he has spoken to us in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some of the elders of the nation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The elders were community leaders and officials from various parts of Israel who had gathered in Jerusalem. Perhaps this episode took place during one of Israel’s national feasts.
      marker-yv: yv-n
    - type: text
      text: 'then stood to address the crowd: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In the days of Hezekiah king of Judah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the prophet
    - type: text
      text: ' Micah of Moresheth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Moresheth was a small village about twenty-three miles (thirty-seven kilometers) southwest of Jerusalem. It has been tentatively identified as Tell ej-Judeideh, where, according to Jerome, a church was built over Micah’s tomb.
      marker-yv: yv-n
    - type: text
      text: prophesied to all the people of Judah, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, declares:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Zion will be plowed under like a field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will become a heap of rubble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the Temple Mount will be covered with overgrowth.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is significant that this is the only place in all the prophetic literature where one prophet directly quotes another by name.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Did King Hezekiah and the people of Judah sentence Micah to death for prophesying this? Did not the king rather fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: humble himself
    - type: text
      text: ', and plead earnestly '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The phrase “plead earnestly” is a special Hebrew idiom (
      - type: usfm
        marker: it
        children:
        - type: text
          text: chalah panim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) that most translate as “entreat the favor of.” It is literally “make gentle the face” or, colloquially, “to make God smile.” That is why you find it used in particularly stressful circumstances, when it is very important that the prayers of men cause God to change his mind. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 13:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with him so that he relented of the disaster that he had decreed against them? Do we really want to bring a disaster upon ourselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with such a crime
    - type: text
      text: ?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prophet Uriah
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, “Stand in the court of my house, the temple, and announce what I tell you to say to the crowds coming to worship me from the cities of Judah. Do not leave out anything or hold back a word. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was another prophet in those day who prophesied in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s name, Uriah son of Shemaiah, from Kiriath Jearim. He prophesied the same things against Judah and Jerusalem as Jeremiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When King Jehoiakim and all his leaders and mighty men heard what Uriah prophesied, the king was determined to put him to death. On hearing this, he was afraid and escaped to Egypt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Jehoiakim, however, sent Elnathan son of Achbor to Egypt with others, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who brought Uriah back from Egypt and took him to King Jehoiakim. The king executed Uriah with the sword '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Uriah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is Light” or “Light of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
    - type: text
      text: and had his body thrown into the common burial ground.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless Jeremiah escaped execution—but only because Ahikam, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahikam was one of those whom King Josiah sent to seek counsel from the prophetess Huldah about the scroll Josiah found in the temple (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 22:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Ahikam’s son was Gedaliah, who also befriended Jeremiah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 39:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and was given charge of Judah after the Babylonian invasion.
      marker-yv: yv-n
    - type: text
      text: the son of Shaphan, protected him and would not allow him to be handed over to the furious crowd.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Perhaps they will listen, and they will all turn from their evil ways. If so, I will relent and not bring the impending disaster I have planned for them because of their evil deeds.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Give them this warning: ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: If you will not listen to me and obey the instructions that I have given you '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or heed the words of my servants the prophets, whom I keep sending to you even though you have not obeyed them, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I will make this temple into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a pile of ruins
    - type: text
      text: ' just like I did to Shiloh. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shiloh had once been the location of the tabernacle (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 18:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Philistines captured the ark of the covenant from Israel at the battle of Aphek (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 4:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and likely also destroyed Shiloh at that time (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 78:60–64
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: This city will become a worldwide object of cursing.’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests, prophets, and all the people heard what Jeremiah said in the temple court of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jeremiah had finished speaking the message '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had ordered him to give to the people, all the priests, prophets, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint adds the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'false'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“false prophets”) in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Most of the prophets during the days of Jeremiah were false prophets who gave the people a false hope.
      marker-yv: yv-n
    - type: text
      text: 'and people forcefully seized him and said, “You ought to be killed for this! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Judgment of death to this man!” The people not only followed the lies of the false prophets, but they also hated the words of the true prophet and wanted to kill him. They believed Jeremiah was the false prophet among them. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 18:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why have you prophesied in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s name, ‘This temple will become a pile of ruins like Shiloh, and Jerusalem become an uninhabited ruin?’ ” Then a mob formed and ganged up against Jeremiah in the temple court of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
