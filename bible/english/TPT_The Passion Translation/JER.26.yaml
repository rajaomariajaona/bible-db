  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Why have you prophesied in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s name, ‘This temple will become a pile of ruins like Shiloh, and Jerusalem become an uninhabited ruin?’ ” Then a mob formed and ganged up against Jeremiah in the temple court of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Upon hearing about this, the leaders of Judah went up from the royal palace to the temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and took their seats '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to hold court
  - type: text
    text: ' at the gate of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s temple.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the New Gate of the house of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ',” which is likely an expanded text based on'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:10
      metadata:
        usfm: JER.36.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . In that era, city gates served as places for a court of judgment (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
