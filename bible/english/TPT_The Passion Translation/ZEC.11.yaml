verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Will Overthrow Mighty Empires
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Open your borders, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your doors.”
      marker-yv: yv-n
    - type: text
      text: Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let fire consume your cedar trees.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I took my staff, “Affection,” and broke it in half to revoke the covenant that I had made with the whole nation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Israel
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was annulled on that day, and the sheep-traffickers, who were watching me, realized that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' was speaking through me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said to them, “If it seems right to you, give me my wages; if not, never mind.” So they weighed out my wages: thirty shekels of silver.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Thirty shekels of silver was the amount of compensation an ox owner paid to a slave’s master if the owner’s ox injured the slave (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 21:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). In effect, this was a statement of devaluing Zechariah and his ministry, and it was ultimately an insult to the Lord, who spoke through Zechariah. Judas betrayed (sold) Jesus for thirty pieces of silver. Zechariah was told to throw his silver to the treasury (or “potter”; see the following footnote). Judas’ silver was used to buy a field from a potter (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:6–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It seems that the three “shepherds” that God removed were the elders, the chief priests, and the scribes (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) who had “trafficked” his sheep. Today, he is raising up shepherds who have his heart (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and who will use his staffs of grace and union to help and guide his flock.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, “Now, hand your silver over to the treasury, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from an emendation of one letter of the Masoretic Text. The unamended Hebrew word is “smelter [silversmith]” or “potter.”
      marker-yv: yv-n
    - type: text
      text: 'these thirty pieces of silver—this wonderful sum at which they valued me.” So I took the thirty shekels of silver and handed them over to the treasury in the house of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I cast them into the treasury in the house of the Lord.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I broke in half my second staff, “Union,” to symbolize the breaking of brotherly bonds between Judah and Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This breaking of the brotherly ties of Israel and Judah points to the Samaritan schism. Josephus wrote that it was in about the year 328 BC that the Samaritans built their rival temple on Mount Gerizim. The breaking of “Union” would symbolize the outbreak of foreign oppression (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and the resulting schism between Israel and Judah.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, “Once again, act the part of a worthless shepherd and take with you the shepherd’s gear. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For behold, I am now raising up a shepherd in the land who will not care about the lost, who will not go in search of the stray, who will not heal the injured, who will not feed the healthy sheep, but instead, he will eat the meat of the fattest sheep and even tear off their hooves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most Jewish commentators view this “shepherd” as the cruel and heartless Herod.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Doom is ahead for the worthless shepherd
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the shepherd of nothingness.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who deserts his flock!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the sword strike his arm
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gouge
    - type: text
      text: ' his right eye!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “arm” is a consistent biblical symbol of strength (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 51:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 30:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). A warrior would hold his shield in his left hand and would peer around the side of his shield with his right eye. A man blinded in his right eye was worthless in battle and unable to stand and fight.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May his arm shrivel completely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his right eye be totally blind!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cry in sorrow, cypress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the towering cedar trees have toppled—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the high and mighty ones are destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, oaks of Bashan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The “cypress,” “towering cedar trees,” and the “oaks” are all metaphors for the pride and arrogance of the leaders of the empires that failed to come to Israel’s aid. Zechariah was dealing with three of the key borderlands of Israel: the northwest (Lebanon/Phoenicia), the northeast (Bashan/southern Syria), and east (Transjordan). Israel’s neighbors showed little solidarity with her as the Assyrians and then the Babylonians came in and ravaged the land.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the thick forest has been felled.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Listen!
    - type: text
      text: ' It’s the sound of the wailing of shepherds.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their glory is gone, their rich pastures destroyed.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Listen!
    - type: text
      text: ' It’s the sound of the young lions roaring.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The thickets of the Jordan have been ravaged.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Two Staffs
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what my God, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', says: “Shepherd '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the inhabitants of this land
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for they are like
    - type: text
      text: ' a flock doomed for slaughter. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who buy them slaughter them without remorse. And the merchants who sell them say, ‘Blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', I have become rich!’ Even the hirelings—their own shepherds—show no pity for the sheep. I will no longer show mercy to the inhabitants of the land,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: . “Instead, I will cause each one to fall into the clutches of his neighbor and into the clutches of his king. They will devastate the land, and I will not rescue anyone from their power.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the prophet himself, Zechariah, became a “stand-in” shepherd.
      marker-yv: yv-n
    - type: text
      text: 'became a shepherd for the sheep doomed for slaughter, especially for those sheep who had been trafficked. I took two staffs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in my hand
    - type: text
      text: '; one I named “Affection,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Pleasantness” (NET), “Favor” (NIV), “Beauty” (KJV), or “Mercy” (CEV).
      marker-yv: yv-n
    - type: text
      text: 'and the other I named “Union,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This participial Hebrew verb form
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chobelim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: derives from the verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chabal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: with the sense of “to bind [someone] by a pledge.” So in this context, this symbolic name for the second shepherd’s staff may denote the “union” of brotherhood.
      marker-yv: yv-n
    - type: text
      text: 'and I cared for the sheep myself. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'How grateful we can be that our mighty God holds these two staffs: Affection and Union. They become the great powers to shape our lives, to protect us, to care for us, and to instruct us. We need God’s affection (grace), and we need to realize our union with Christ to access the fullness of God. The Hebrew word translated “affection” ('
      - type: usfm
        marker: it
        children:
        - type: text
          text: noʿam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) can also be translated “pleasant.” How pleasant it is when we dwell in union with Christ and unity with one another! See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 133
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I removed three shepherds in one month, for I ran out of patience '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a Hebrew idiom, “my soul was short.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: with the sheep-traffickers
    - type: text
      text: ', and they hated me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I told them, “I am not going to be your shepherd anymore. Those doomed to die can die; those doomed for destruction can perish; and the rest can devour one another.” '
