  - type: text
    content: Let fire consume your cedar trees.
  '10':
  - type: text
    content: 'Then I took my staff, “Affection,” and broke it in half to revoke the covenant that I had made with the whole nation '
  - type: text
    content: of Israel
  - type: text
    content: .
  '11':
  - type: text
    content: 'So it was annulled on that day, and the sheep-traffickers, who were watching me, realized that '
  - type: text
    content: Yahweh
  - type: text
    content: ' was speaking through me. '
  '12':
  - type: text
    content: 'Then I said to them, “If it seems right to you, give me my wages; if not, never mind.” So they weighed out my wages: thirty shekels of silver.'
  - type: note
    content: Thirty shekels of silver was the amount of compensation an ox owner paid to a slave’s master if the owner’s ox injured the slave (see Ex. 21:32). In effect, this was a statement of devaluing Zechariah and his ministry, and it was ultimately an insult to the Lord, who spoke through Zechariah. Judas betrayed (sold) Jesus for thirty pieces of silver. Zechariah was told to throw his silver to the treasury (or “potter”; see the following footnote). Judas’ silver was used to buy a field from a potter (see Matt. 27:6–10). It seems that the three “shepherds” that God removed were the elders, the chief priests, and the scribes (see Matt. 16:21) who had “trafficked” his sheep. Today, he is raising up shepherds who have his heart (see Jer. 3:15) and who will use his staffs of grace and union to help and guide his flock.
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Now, hand your silver over to the treasury, '
  - type: note
    content: As translated from an emendation of one letter of the Masoretic Text. The unamended Hebrew word is “smelter [silversmith]” or “potter.”
  - type: text
    content: 'these thirty pieces of silver—this wonderful sum at which they valued me.” So I took the thirty shekels of silver and handed them over to the treasury in the house of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: note
    content: Or “I cast them into the treasury in the house of the Lord.”
  '14':
  - type: text
    content: Then I broke in half my second staff, “Union,” to symbolize the breaking of brotherly bonds between Judah and Israel.
  - type: note
    content: This breaking of the brotherly ties of Israel and Judah points to the Samaritan schism. Josephus wrote that it was in about the year 328 BC that the Samaritans built their rival temple on Mount Gerizim. The breaking of “Union” would symbolize the outbreak of foreign oppression (see v. 10) and the resulting schism between Israel and Judah.
  '15':
  - type: text
    content: 'Next, '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Once again, act the part of a worthless shepherd and take with you the shepherd’s gear. '
  '16':
  - type: text
    content: For behold, I am now raising up a shepherd in the land who will not care about the lost, who will not go in search of the stray, who will not heal the injured, who will not feed the healthy sheep, but instead, he will eat the meat of the fattest sheep and even tear off their hooves.
  - type: note
    content: Most Jewish commentators view this “shepherd” as the cruel and heartless Herod.
  '17':
  - type: text
    content: “Doom is ahead for the worthless shepherd
  - type: note
    content: Or “the shepherd of nothingness.”
  - type: text
    content: who deserts his flock!
  - type: text
    content: May the sword strike his arm
  - type: text
    content: 'and '
  - type: text
    content: gouge
  - type: text
    content: ' his right eye!'
  - type: note
    content: The “arm” is a consistent biblical symbol of strength (see Ex. 6:6; Isa. 51:9; Ezek. 30:21). A warrior would hold his shield in his left hand and would peer around the side of his shield with his right eye. A man blinded in his right eye was worthless in battle and unable to stand and fight.
  - type: text
    content: May his arm shrivel completely
  - type: text
    content: and his right eye be totally blind!”
  '2':
  - type: text
    content: Cry in sorrow, cypress,
  - type: text
    content: for the towering cedar trees have toppled—
  - type: text
    content: the high and mighty ones are destroyed.
  - type: text
    content: Wail, oaks of Bashan,
  - type: note
    content: 'The “cypress,” “towering cedar trees,” and the “oaks” are all metaphors for the pride and arrogance of the leaders of the empires that failed to come to Israel’s aid. Zechariah was dealing with three of the key borderlands of Israel: the northwest (Lebanon/Phoenicia), the northeast (Bashan/southern Syria), and east (Transjordan). Israel’s neighbors showed little solidarity with her as the Assyrians and then the Babylonians came in and ravaged the land.'
  - type: text
    content: for the thick forest has been felled.
  '3':
  - type: text
    content: Listen!
  - type: text
    content: ' It’s the sound of the wailing of shepherds.'
  - type: text
    content: Their glory is gone, their rich pastures destroyed.
  - type: text
    content: Listen!
  - type: text
    content: ' It’s the sound of the young lions roaring.'
  - type: text
    content: The thickets of the Jordan have been ravaged.
  - type: heading
    content: The Two Staffs
  '4':
  - type: text
    content: 'This is what my God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', says: “Shepherd '
  - type: text
    content: the inhabitants of this land
  - type: text
    content: ', '
  - type: text
    content: for they are like
  - type: text
    content: ' a flock doomed for slaughter. '
  '5':
  - type: text
    content: 'Those who buy them slaughter them without remorse. And the merchants who sell them say, ‘Blessed be '
  - type: text
    content: Yahweh
  - type: text
    content: ', I have become rich!’ Even the hirelings—their own shepherds—show no pity for the sheep. I will no longer show mercy to the inhabitants of the land,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: . “Instead, I will cause each one to fall into the clutches of his neighbor and into the clutches of his king. They will devastate the land, and I will not rescue anyone from their power.”
  '7':
  - type: text
    content: 'So I '
  - type: note
    content: That is, the prophet himself, Zechariah, became a “stand-in” shepherd.
  - type: text
    content: 'became a shepherd for the sheep doomed for slaughter, especially for those sheep who had been trafficked. I took two staffs '
  - type: text
    content: in my hand
  - type: text
    content: '; one I named “Affection,” '
  - type: note
    content: Or “Pleasantness” (NET), “Favor” (NIV), “Beauty” (KJV), or “Mercy” (CEV).
  - type: text
    content: 'and the other I named “Union,” '
  - type: note
    content: This participial Hebrew verb form chobelim derives from the verb chabal with the sense of “to bind [someone] by a pledge.” So in this context, this symbolic name for the second shepherd’s staff may denote the “union” of brotherhood.
  - type: text
    content: 'and I cared for the sheep myself. '
  - type: note
    content: 'How grateful we can be that our mighty God holds these two staffs: Affection and Union. They become the great powers to shape our lives, to protect us, to care for us, and to instruct us. We need God’s affection (grace), and we need to realize our union with Christ to access the fullness of God. The Hebrew word translated “affection” (noʿam) can also be translated “pleasant.” How pleasant it is when we dwell in union with Christ and unity with one another! See Ps. 133.'
  '8':
  - type: text
    content: 'So I removed three shepherds in one month, for I ran out of patience '
  - type: note
    content: This is a Hebrew idiom, “my soul was short.”
  - type: text
    content: with the sheep-traffickers
  - type: text
    content: ', and they hated me. '
  '9':
  - type: text
    content: 'And I told them, “I am not going to be your shepherd anymore. Those doomed to die can die; those doomed for destruction can perish; and the rest can devour one another.” '
