        usfm: EPH.4.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in the church; you have set your heart toward a noble ambition, for the word is true! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yet an elder needs to be one who is without blame before others.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He should be one whose heart is for his wife alone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and not another woman
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This literally means “a one-woman kind of man” or “faithful to your woman [wife],” which implies much more than simply not being a polygamist. It was culturally common for men to have more than one wife or concubines in that era.
    marker-yv: yv-n
  - type: text
    text: 'He should be recognized as one who is sensible, and well-behaved, and living a disciplined life. He should be a “spiritual shepherd” who has the gift of teaching, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “able to teach.”
    marker-yv: yv-n
  - type: text
    text: and is known for his hospitality.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He cannot be a drunkard, or someone who lashes out at others, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “not swift to strike.”
    marker-yv: yv-n
  - type: text
    text: 'or argumentative, or someone who simply craves more money, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “merciful to money.” Some see in this the concept of not showing favoritism because of someone’s economic status.
    marker-yv: yv-n
  - type: text
    text: but instead, recognized by his gentleness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'His heart should be set on guiding his household with wisdom and dignity; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “beautifully.”
    marker-yv: yv-n
  - type: text
    text: 'bringing up his children to worship with devotion and purity. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For if he’s unable to properly lead his own household well, how could he properly lead God’s household?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He should not be a new disciple '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “a new plant,” which implies shallow roots.
    marker-yv: yv-n
  - type: text
    text: 'who would be vulnerable to living in the clouds of conceit and fall into pride, making him easy prey for Satan. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek literally means “fall into Satan’s court of law.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He should be respected by those who are unbelievers, having a beautiful testimony among them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Greek. The Aramaic uses a metaphor, “a beautiful testimony from the wilderness.” This means he has passed through his wilderness journey and is now seen as tested and proven.
    marker-yv: yv-n
  - type: text
    text: so that he will not fall into the traps of Satan and be disgraced.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And in the same way the deacons '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “ministers.”
    marker-yv: yv-n
  - type: text
    text: 'must be those who are pure and true to their word, not addicted to wine, or with greedy eyes on the contributions. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “corrupt profits.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Instead, they must faithfully embrace the mysteries of faith while keeping a clean conscience. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And each of them must be found trustworthy according to these standards before they are given the responsibility to minister as servant-leaders without blame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the women '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used here can mean “women” or “wives.” This may refer to women deacons. Phoebe is called a deacon in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 16:1
      metadata:
        usfm: ROM.16.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'also who serve the church should be dignified, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Greek, the Aramaic can be translated “modest.”
    marker-yv: yv-n
  - type: text
    text: 'faithful in all things, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “temperate.”
    marker-yv: yv-n
  - type: text
    text: having their thoughts set on truth, and not known as those who gossip.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A deacon’s heart must be toward his wife alone, leading his children and household with excellence. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For those who serve in this way will obtain an honorable reputation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a good rank.”
    marker-yv: yv-n
  - type: text
    text: for themselves and a greater right to speak boldly in the faith that comes from Jesus Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I’m writing all this with the expectation of seeing you soon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But if I’m delayed in coming, you’ll already have these instructions on how to conduct the affairs of the church of the living God, his very household and the supporting pillar and firm foundation of the truth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Mystery of Righteousness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the mystery of righteousness is beyond all question!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the only place where this phrase occurs in the New Testament. The “mystery of righteousness” (godliness) is Jesus Christ living within the believer. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mystery
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (secret) is found twenty-seven times in the New Testament. We “must faithfully embrace the mysteries of our faith while keeping a clean conscience” (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: 1TI.3.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Although Paul did speak Greek, his native language was Aramaic, which is difficult to translate into Greek. The Aramaic word used here for mysteries is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘arza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This is the Aramaic word for a cedar tree. A cedar tree has deep, firm roots. So must our faith be rooted inside these mysteries.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was revealed as a human being,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and as our great High Priest in the Spirit!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated by the implication of the Aramaic. The Greek says, “justified in the Spirit.” Although some interpret it to mean his resurrection, that seems indefinite and with little meaning to today’s reader. There is deep and beautiful poetic artistry here in this passage. The word order of the Aramaic lines is convincing that glorious and hidden truths are tucked into these verses; they are full of Jewish word plays and symbolism and read like a poem. Many have concluded that this passage was an ancient hymn sung by the early church. Two different Aramaic words for “righteousness” are used in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: 1TI.3.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The first word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kanota
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: which is clearly connected to the word for “priest” or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kahna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . An Aramaic or Hebrew reader would clearly connect this “righteousness” to the priestly ministry. In poetic and perhaps subtle linguistic form, this points us to the High Priest of our faith. The second word used that is most often translated “righteousness” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: atzaddaq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; the word in the line before used for messenger (angels) is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: malaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is a form of the word for king ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: malak
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). To summarize, you have the words “great [high] priest,” “king,” and “righteousness,” which is the name for Melchizedek, (King of Righteousness). Truly, this mystery of righteousness is great!
    marker-yv: yv-n
