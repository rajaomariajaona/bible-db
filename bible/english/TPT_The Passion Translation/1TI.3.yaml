    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'There are a number of terms that are synonymous for elder, such as: pastor, shepherd, presbyter, bishop, overseer, or guardian. These all describe the one office of pastor mentioned in'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
