verses:
  '1':
  - type: heading
    content: Leaders in the Church
  - type: text
    content: 'If any of you '
  - type: note
    content: Some translations have “men,” however, the Greek word is not gender specific.
  - type: text
    content: 'aspires to be an overseer '
  - type: note
    content: 'There are a number of terms that are synonymous for elder, such as: pastor, shepherd, presbyter, bishop, overseer, or guardian. These all describe the one office of pastor mentioned in Eph. 4:11.'
  - type: text
    content: 'in the church; you have set your heart toward a noble ambition, for the word is true! '
  '10':
  - type: text
    content: And each of them must be found trustworthy according to these standards before they are given the responsibility to minister as servant-leaders without blame.
  '11':
  - type: text
    content: 'And the women '
  - type: note
    content: The word used here can mean “women” or “wives.” This may refer to women deacons. Phoebe is called a deacon in Rom. 16:1.
  - type: text
    content: 'also who serve the church should be dignified, '
  - type: note
    content: As translated from the Greek, the Aramaic can be translated “modest.”
  - type: text
    content: 'faithful in all things, '
  - type: note
    content: Or “temperate.”
  - type: text
    content: having their thoughts set on truth, and not known as those who gossip.
  '12':
  - type: text
    content: 'A deacon’s heart must be toward his wife alone, leading his children and household with excellence. '
  '13':
  - type: text
    content: 'For those who serve in this way will obtain an honorable reputation '
  - type: note
    content: Or “a good rank.”
  - type: text
    content: for themselves and a greater right to speak boldly in the faith that comes from Jesus Christ!
  '14':
  - type: text
    content: 'I’m writing all this with the expectation of seeing you soon. '
  '15':
  - type: text
    content: But if I’m delayed in coming, you’ll already have these instructions on how to conduct the affairs of the church of the living God, his very household and the supporting pillar and firm foundation of the truth.
  - type: heading
    content: The Mystery of Righteousness
  '16':
  - type: text
    content: For the mystery of righteousness is beyond all question!
  - type: note
    content: This is the only place where this phrase occurs in the New Testament. The “mystery of righteousness” (godliness) is Jesus Christ living within the believer. The word mystery (secret) is found twenty-seven times in the New Testament. We “must faithfully embrace the mysteries of our faith while keeping a clean conscience” (v. 9). Although Paul did speak Greek, his native language was Aramaic, which is difficult to translate into Greek. The Aramaic word used here for mysteries is ‘arza. This is the Aramaic word for a cedar tree. A cedar tree has deep, firm roots. So must our faith be rooted inside these mysteries.
  - type: text
    content: He was revealed as a human being,
  - type: text
    content: and as our great High Priest in the Spirit!
  - type: note
    content: As translated by the implication of the Aramaic. The Greek says, “justified in the Spirit.” Although some interpret it to mean his resurrection, that seems indefinite and with little meaning to today’s reader. There is deep and beautiful poetic artistry here in this passage. The word order of the Aramaic lines is convincing that glorious and hidden truths are tucked into these verses; they are full of Jewish word plays and symbolism and read like a poem. Many have concluded that this passage was an ancient hymn sung by the early church. Two different Aramaic words for “righteousness” are used in v. 16. The first word is kanota which is clearly connected to the word for “priest” or kahna. An Aramaic or Hebrew reader would clearly connect this “righteousness” to the priestly ministry. In poetic and perhaps subtle linguistic form, this points us to the High Priest of our faith. The second word used that is most often translated “righteousness” is atzaddaq; the word in the line before used for messenger (angels) is malaka, which is a form of the word for king (malak). To summarize, you have the words “great [high] priest,” “king,” and “righteousness,” which is the name for Melchizedek, (King of Righteousness). Truly, this mystery of righteousness is great!
  - type: text
    content: 'Angels gazed upon him '
  - type: text
    content: as a man
  - type: text
    content: and the glorious message of his kingly rulership
  - type: text
    content: is being preached to the nations!
  - type: text
    content: Many have believed in him
  - type: text
    content: and he has been taken back to heaven,
  - type: text
    content: and has ascended into the place of exalted glory
  - type: text
    content: in the heavenly realm
  - type: text
    content: .
  - type: text
    content: Yes, great is this mystery of righteousness!
  '2':
  - type: text
    content: Yet an elder needs to be one who is without blame before others.
  - type: text
    content: 'He should be one whose heart is for his wife alone '
  - type: text
    content: and not another woman
  - type: text
    content: '. '
  - type: note
    content: This literally means “a one-woman kind of man” or “faithful to your woman [wife],” which implies much more than simply not being a polygamist. It was culturally common for men to have more than one wife or concubines in that era.
  - type: text
    content: 'He should be recognized as one who is sensible, and well-behaved, and living a disciplined life. He should be a “spiritual shepherd” who has the gift of teaching, '
  - type: note
    content: Or “able to teach.”
  - type: text
    content: and is known for his hospitality.
  '3':
  - type: text
    content: 'He cannot be a drunkard, or someone who lashes out at others, '
  - type: note
    content: The Aramaic can be translated “not swift to strike.”
  - type: text
    content: 'or argumentative, or someone who simply craves more money, '
  - type: note
    content: The Aramaic can be translated “merciful to money.” Some see in this the concept of not showing favoritism because of someone’s economic status.
  - type: text
    content: but instead, recognized by his gentleness.
  '4':
  - type: text
    content: 'His heart should be set on guiding his household with wisdom and dignity; '
  - type: note
    content: Literally “beautifully.”
  - type: text
    content: 'bringing up his children to worship with devotion and purity. '
  '5':
  - type: text
    content: For if he’s unable to properly lead his own household well, how could he properly lead God’s household?
  '6':
  - type: text
    content: 'He should not be a new disciple '
  - type: note
    content: The Aramaic can be translated “a new plant,” which implies shallow roots.
  - type: text
    content: 'who would be vulnerable to living in the clouds of conceit and fall into pride, making him easy prey for Satan. '
  - type: note
    content: The Greek literally means “fall into Satan’s court of law.”
  '7':
  - type: text
    content: 'He should be respected by those who are unbelievers, having a beautiful testimony among them '
  - type: note
    content: As translated from the Greek. The Aramaic uses a metaphor, “a beautiful testimony from the wilderness.” This means he has passed through his wilderness journey and is now seen as tested and proven.
  - type: text
    content: so that he will not fall into the traps of Satan and be disgraced.
  '8':
  - type: text
    content: 'And in the same way the deacons '
  - type: note
    content: The Aramaic can be translated “ministers.”
  - type: text
    content: 'must be those who are pure and true to their word, not addicted to wine, or with greedy eyes on the contributions. '
  - type: note
    content: Or “corrupt profits.”
  '9':
  - type: text
    content: 'Instead, they must faithfully embrace the mysteries of faith while keeping a clean conscience. '
