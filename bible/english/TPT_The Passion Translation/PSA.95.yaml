document_id: PSA.95,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: It’s Time to Sing
  - type: text
    content: Come on, everyone! Let’s sing for joy to the Lord!
  - type: text
    content: Let’s shout our loudest praises to our God who saved us!
  '10':
  - type: text
    content: So for forty long years I was grieved and disgusted by them.
  - type: text
    content: I described them as wicked wanderers
  - type: text
    content: whose hearts would not follow my ways or keep my words.
  '11':
  - type: text
    content: So I made a vow in my anger and declared,
  - type: text
    content: ‘They will not enter the resting place I’ve planned for them!’
  - type: text
    content: So don’t you ever be hard-hearted or stubborn like they were!
  - type: text
    content: ”
  '2':
  - type: text
    content: Everyone come meet his face with a thankful heart.
  - type: text
    content: Don’t hold back your praises;
  - type: text
    content: make him great by your shouts of joy!
  '3':
  - type: text
    content: For the Lord is the greatest of all,
  - type: text
    content: King-God over all other gods!
  '4':
  - type: text
    content: In one hand he holds the mysteries of the earth,
  - type: text
    content: and in the other he holds the highest mountain peaks.
  '5':
  - type: text
    content: He’s the owner of every ocean,
  - type: text
    content: the engineer and sculptor of earth itself!
  '6':
  - type: text
    content: Come and kneel before this Creator-God;
  - type: text
    content: come and bow before the mighty God, our majestic maker!
  '7':
  - type: text
    content: For we are those he cares for, and he is the God we worship.
  - type: text
    content: So drop everything else and listen to his voice!
  - type: text
    content: 'For this is what he’s saying:'
  - type: text
    content: “Today, when I speak,
  - type: text
    content: don’t even think about turning a deaf ear to me
  - type: text
    content: like they did when they tested me at Meribah and Massah,
  - type: note
    content: Meribah means “strife” or “argument.” Massah means “testing.”
  - type: text
    content: the place where they argued with me, their Creator.
  - type: text
    content: Your ancestors challenged me over and over with their complaining,
  - type: text
    content: even though I had convinced them of my power and love.
  - type: text
    content: They still doubted my care for them.
