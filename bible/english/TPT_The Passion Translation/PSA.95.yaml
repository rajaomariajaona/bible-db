document_id: PSA.95
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: It’s Time to Sing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Come on, everyone! Let’s sing for joy to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s shout our loudest praises to our God who saved us!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Everyone come meet his face with a thankful heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t hold back your praises;
- type: usfm
  marker: q1
  children:
  - type: text
    text: make him great by your shouts of joy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the Lord is the greatest of all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: King-God over all other gods!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In one hand he holds the mysteries of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in the other he holds the highest mountain peaks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He’s the owner of every ocean,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the engineer and sculptor of earth itself!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Come and kneel before this Creator-God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: come and bow before the mighty God, our majestic maker!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: For we are those he cares for, and he is the God we worship.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So drop everything else and listen to his voice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For this is what he’s saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Today, when I speak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t even think about turning a deaf ear to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: like they did when they tested me at Meribah and Massah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 95:7–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meribah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “strife” or “argument.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Massah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “testing.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the place where they argued with me, their Creator.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your ancestors challenged me over and over with their complaining,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even though I had convinced them of my power and love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They still doubted my care for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So for forty long years I was grieved and disgusted by them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I described them as wicked wanderers
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose hearts would not follow my ways or keep my words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So I made a vow in my anger and declared,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘They will not enter the resting place I’ve planned for them!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: So don’t you ever be hard-hearted or stubborn like they were!
  - type: text
    text: ”
