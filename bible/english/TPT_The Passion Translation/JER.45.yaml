document_id: JER.45,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baruch Rebuke
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fourth year '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is important to remember that the book of Jeremiah is not in chronological order. This chapter describes an event that happened around 605 BC.
      marker-yv: yv-n
    - type: text
      text: 'of the reign of Jehoiakim son of Josiah, king of Judah, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave me a word for Baruch son of Neriah while I was dictating to Baruch the message that he wrote down in a scroll. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I said to him
    - type: text
      text: ', “Baruch, this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' God of Israel says about you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘You have been thinking: “These are horrible times for me. In addition to my pain, now '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' adds sorrow to my troubles. I am worn out with groaning, with relief nowhere in sight!” ’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But here is a message for you. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: ‘That which I have built I am about to knock down, and what I have planted I will uproot over the entire land. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are you seeking personal greatness for yourself? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Do you seek promotion for yourself?” The goal of our lives must not be to selfishly promote ourselves (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) but to seek great things for God’s glory. During the Babylonian captivity, Baruch wrote a deuterocanonical book that is included in the Bibles of some Christian traditions. God did have great things in mind for Baruch, but his rebuke instructed Baruch not to seek those things for himself but only for the glory of God.
      marker-yv: yv-n
    - type: text
      text: 'Do not seek it, for I am now going to bring disaster on all humanity, but I will ensure that you escape with your life wherever you may go,’ declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s message to Baruch is also a message to us. In the midst of international conflicts and turmoil, God is mindful of the individual. Baruch was not forgotten in the swirl of events around the Babylonian captivity. And God is mindful of your life, too, even in a day of dramatic world events.
      marker-yv: yv-n
