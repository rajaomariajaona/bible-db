document_id: JER.45,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Baruch Rebuke
  - type: text
    content: 'In the fourth year '
  - type: note
    content: It is important to remember that the book of Jeremiah is not in chronological order. This chapter describes an event that happened around 605 BC.
  - type: text
    content: 'of the reign of Jehoiakim son of Josiah, king of Judah, '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave me a word for Baruch son of Neriah while I was dictating to Baruch the message that he wrote down in a scroll. '
  '2':
  - type: text
    content: I said to him
  - type: text
    content: ', “Baruch, this is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' God of Israel says about you. '
  '3':
  - type: text
    content: '‘You have been thinking: “These are horrible times for me. In addition to my pain, now '
  - type: text
    content: Yahweh
  - type: text
    content: ' adds sorrow to my troubles. I am worn out with groaning, with relief nowhere in sight!” ’ '
  '4':
  - type: text
    content: 'But here is a message for you. '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: ‘That which I have built I am about to knock down, and what I have planted I will uproot over the entire land. '
  '5':
  - type: text
    content: 'Are you seeking personal greatness for yourself? '
  - type: note
    content: Or “Do you seek promotion for yourself?” The goal of our lives must not be to selfishly promote ourselves (see Phil. 2:3–5; James 3:16) but to seek great things for God’s glory. During the Babylonian captivity, Baruch wrote a deuterocanonical book that is included in the Bibles of some Christian traditions. God did have great things in mind for Baruch, but his rebuke instructed Baruch not to seek those things for himself but only for the glory of God.
  - type: text
    content: 'Do not seek it, for I am now going to bring disaster on all humanity, but I will ensure that you escape with your life wherever you may go,’ declares '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: note
    content: God’s message to Baruch is also a message to us. In the midst of international conflicts and turmoil, God is mindful of the individual. Baruch was not forgotten in the swirl of events around the Babylonian captivity. And God is mindful of your life, too, even in a day of dramatic world events.
