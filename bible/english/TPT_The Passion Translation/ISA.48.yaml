document_id: ISA.48,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our All-Knowing God
  - type: text
    content: “Listen carefully, O Jacob’s tribes,
  - type: text
    content: you who are called by the name Israel
  - type: text
    content: and come from the lineage of Judah,
  - type: text
    content: 'who solemnly swear in the name of '
  - type: text
    content: Yahweh
  - type: text
    content: and claim to worship the God of Israel.
  - type: note
    content: Or “who cause the God of Israel to be remembered.”
  - type: text
    content: But there is no truth or righteousness in your confession!
  '10':
  - type: text
    content: See, I have purified you in the furnace of adversity,
  - type: text
    content: but not like silver—I have refined you in the fire.
  - type: note
    content: The implication is that if God had left them in the fire to melt down all their dross, they would still be there in the fire with nothing left of them. God limits the intensity and the timing of our every trial and uses the furnace of adversity to make us more like Christ. See 1 Cor. 10:13.
  '11':
  - type: text
    content: For my own sake alone I will do it,
  - type: text
    content: so my name will not be dishonored.
  - type: note
    content: God promises to deliver, refine, and rescue his people so that his own name and identity as the God of gods will not be defamed. Rescue is as sure as God’s identity.
  - type: text
    content: I will not yield my glory to another.”
  - type: heading
    content: Consider God’s Might
  '12':
  - type: text
    content: “Listen to me, O Jacob,
  - type: text
    content: 'Israel, whom I have called:'
  - type: text
    content: I am the One and Only,
  - type: text
    content: the First and the Last.
  '13':
  - type: text
    content: With my mighty hand I laid the foundation of the earth;
  - type: text
    content: with the span of my right hand I spread out the cosmos.
  - type: text
    content: And when I speak to them, they both stand at attention.
  '14':
  - type: text
    content: Now, all of you gather around and listen.
  - type: text
    content: 'Which '
  - type: text
    content: of the gods
  - type: text
    content: ' has foretold these things?'
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', love this man,'
  - type: text
    content: 'and he '
  - type: note
    content: Most scholars view this man to be Cyrus.
  - type: text
    content: will carry out my purpose against Babylon.
  - type: text
    content: He will be my ‘arm of might’ against the Babylonians!
  '15':
  - type: text
    content: I am the one; yes, I am the one
  - type: text
    content: 'who called him by name '
  - type: text
    content: before he was born
  - type: text
    content: .
  - type: text
    content: I have led him forward on a prosperous, successful path.”
  - type: heading
    content: Come Together and Walk with Me
  '16':
  - type: text
    content: '“Draw near to me and listen:'
  - type: text
    content: From the beginning, I have not spoken in secret.
  - type: text
    content: 'From the beginning of time, '
  - type: note
    content: Or “From the time of its occurring.”
  - type: text
    content: I was there.”
  - type: text
    content: 'And now Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has sent me, '
  - type: text
    content: empowered by
  - type: text
    content: ' '
  - type: note
    content: Or “has sent me and his Spirit.”
  - type: text
    content: his Spirit!
  '17':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', your Kinsman-Redeemer, the Holy One of Israel says:'
  - type: text
    content: '“I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God.'
  - type: text
    content: I am the One who teaches you how to succeed
  - type: text
    content: 'and who leads you '
  - type: text
    content: step by step
  - type: text
    content: ' in the way you should go.'
  '18':
  - type: text
    content: If only you had listened to my commands,
  - type: text
    content: 'then peace '
  - type: note
    content: Or “prosperity [shalom].”
  - type: text
    content: 'would have flowed like a river '
  - type: note
    content: Or “the river.” See John 7:37–39.
  - type: text
    content: for you
  - type: text
    content: 'and success '
  - type: note
    content: Or “righteousness.”
  - type: text
    content: 'would '
  - type: text
    content: wash over
  - type: text
    content: ' you like waves of the sea.'
  '19':
  - type: text
    content: Your children would have multiplied
  - type: text
    content: 'to become like the sand '
  - type: text
    content: of the seashore
  - type: note
    content: See Gen. 22:17; 32:12.
  - type: text
    content: and your descendants like grains of sand.
  - type: text
    content: There would be no end of them,
  - type: text
    content: and I would not cut them off.”
  '2':
  - type: text
    content: Indeed, you name yourselves after the holy city
  - type: text
    content: and say that you depend upon Israel’s God.
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies, is his name.'
  '20':
  - type: text
    content: Go! Leave Babylon!
  - type: text
    content: Flee from Chaldea!
  - type: text
    content: Announce it with joyous singing!
  - type: note
    content: Or “shouting.” The key to fleeing from the Babylon-like (Babylon means “confusion”) systems of the world is to go out with a joyous song. See Jer. 33:7–11.
  - type: text
    content: Let everyone know!
  - type: text
    content: Proclaim it to the ends of the earth!
  - type: text
    content: 'Say it loud and clear:'
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' has rescued his servant Jacob!”'
  '21':
  - type: text
    content: The people weren’t thirsty
  - type: text
    content: when he led them through barren, desolate deserts,
  - type: text
    content: for he broke open the rock for water to flow for them.
  - type: text
    content: The rock was split open, and rivers gushed out!
  - type: note
    content: See John 19:34; 1 Cor. 10:1–11.
  '22':
  - type: text
    content: '“There is never peace,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “for the wicked.”'
  '3':
  - type: text
    content: “Long ago I prophesied things that would happen.
  - type: text
    content: 'I issued decrees '
  - type: note
    content: Or “They came forth from my mouth.”
  - type: text
    content: and made them known.
  - type: text
    content: Then suddenly, I acted and made them happen.
  '4':
  - type: text
    content: I knew you were stubborn.
  - type: text
    content: Your neck is like a rod of iron,
  - type: text
    content: and you’re as hard-hearted as brass!
  - type: note
    content: Or “your forehead is as hard as brass.”
  '5':
  - type: text
    content: Long ago I told you these things.
  - type: text
    content: Long before they happened
  - type: text
    content: I proclaimed them
  - type: text
    content: so you would never be able to say,
  - type: text
    content: ‘My idols did this;
  - type: text
    content: my wood and metal idols decreed it!’
  '6':
  - type: text
    content: You have heard what I foretold and have seen it all unfold,
  - type: text
    content: 'so admit '
  - type: note
    content: Or “declare.”
  - type: text
    content: that it happened
  - type: text
    content: ' and I was right!'
  - type: note
    content: Or “You should tell this to others.” The Hebrew of this sentence is uncertain.
  - type: text
    content: From now on I will tell you about new things never seen before,
  - type: text
    content: hidden things, well-guarded secrets you know nothing about.
  '7':
  - type: text
    content: They are created now, brand new today, not long ago!
  - type: text
    content: You’ve never heard of them before now,
  - type: text
    content: so you cannot say, ‘Oh, I already knew about that.’
  '8':
  - type: text
    content: “You have never heard nor understood;
  - type: text
    content: your ear had not been opened beforehand.
  - type: text
    content: Though I knew that you would fight against me
  - type: text
    content: as a rebel from birth,
  '9':
  - type: text
    content: yet, for the sake of my great name and for my glory,
  - type: text
    content: I held back my anger and was patient with you
  - type: text
    content: 'so I did not whittle you down '
  - type: text
    content: to nothing
  - type: text
    content: .
