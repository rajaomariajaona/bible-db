document_id: ISA.48,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Our All-Knowing God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen carefully, O Jacob’s tribes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who are called by the name Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and come from the lineage of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who solemnly swear in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and claim to worship the God of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who cause the God of Israel to be remembered.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there is no truth or righteousness in your confession!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, I have purified you in the furnace of adversity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but not like silver—I have refined you in the fire.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that if God had left them in the fire to melt down all their dross, they would still be there in the fire with nothing left of them. God limits the intensity and the timing of our every trial and uses the furnace of adversity to make us more like Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my own sake alone I will do it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so my name will not be dishonored.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God promises to deliver, refine, and rescue his people so that his own name and identity as the God of gods will not be defamed. Rescue is as sure as God’s identity.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not yield my glory to another.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consider God’s Might
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, O Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Israel, whom I have called:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the One and Only,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the First and the Last.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my mighty hand I laid the foundation of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the span of my right hand I spread out the cosmos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when I speak to them, they both stand at attention.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now, all of you gather around and listen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the gods
    - type: text
      text: ' has foretold these things?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', love this man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most scholars view this man to be Cyrus.
      marker-yv: yv-n
    - type: text
      text: will carry out my purpose against Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be my ‘arm of might’ against the Babylonians!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the one; yes, I am the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who called him by name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before he was born
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have led him forward on a prosperous, successful path.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Come Together and Walk with Me
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Draw near to me and listen:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the beginning, I have not spoken in secret.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the beginning of time, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “From the time of its occurring.”
      marker-yv: yv-n
    - type: text
      text: I was there.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has sent me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: empowered by
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “has sent me and his Spirit.”
      marker-yv: yv-n
    - type: text
      text: his Spirit!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your Kinsman-Redeemer, the Holy One of Israel says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the One who teaches you how to succeed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and who leads you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: step by step
    - type: text
      text: ' in the way you should go.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you had listened to my commands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'then peace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “prosperity [
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '].”'
      marker-yv: yv-n
    - type: text
      text: 'would have flowed like a river '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the river.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 7:37–39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and success '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “righteousness.”
      marker-yv: yv-n
    - type: text
      text: 'would '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wash over
    - type: text
      text: ' you like waves of the sea.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your children would have multiplied
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to become like the sand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the seashore
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your descendants like grains of sand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There would be no end of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I would not cut them off.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, you name yourselves after the holy city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and say that you depend upon Israel’s God.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the Commander of Angel Armies, is his name.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go! Leave Babylon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flee from Chaldea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Announce it with joyous singing!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shouting.” The key to fleeing from the Babylon-like (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Babylon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “confusion”) systems of the world is to go out with a joyous song. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 33:7–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let everyone know!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclaim it to the ends of the earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say it loud and clear:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has rescued his servant Jacob!”'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people weren’t thirsty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he led them through barren, desolate deserts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he broke open the rock for water to flow for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rock was split open, and rivers gushed out!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 19:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 10:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“There is never peace,” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “for the wicked.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Long ago I prophesied things that would happen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I issued decrees '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They came forth from my mouth.”
      marker-yv: yv-n
    - type: text
      text: and made them known.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then suddenly, I acted and made them happen.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I knew you were stubborn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your neck is like a rod of iron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’re as hard-hearted as brass!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your forehead is as hard as brass.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long ago I told you these things.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long before they happened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I proclaimed them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so you would never be able to say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘My idols did this;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my wood and metal idols decreed it!’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have heard what I foretold and have seen it all unfold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so admit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “declare.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that it happened
    - type: text
      text: ' and I was right!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You should tell this to others.” The Hebrew of this sentence is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From now on I will tell you about new things never seen before,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hidden things, well-guarded secrets you know nothing about.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are created now, brand new today, not long ago!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve never heard of them before now,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so you cannot say, ‘Oh, I already knew about that.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have never heard nor understood;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your ear had not been opened beforehand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I knew that you would fight against me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a rebel from birth,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet, for the sake of my great name and for my glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I held back my anger and was patient with you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so I did not whittle you down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to nothing
    - type: text
      text: .
