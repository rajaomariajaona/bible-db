  '1':
  - type: heading
    content: Future Glory of Zion
  - type: text
    content: 'In the future, '
  - type: note
    content: Or “At the end of days.” This phrase, often used by the prophets of the Old Testament, refers to our current time in human history between Pentecost and the return of Christ to the earth. See Heb. 1:2; 1 John 2:18. Micah 4:1–3 is nearly identical to Isa. 2:2–4.
  - type: text
    content: 'the mountain of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s temple
  - type: text
    content: will be raised up as the head of the mountains,
  - type: note
    content: The mountain of Yahweh’s temple can be understood in several ways. Some view it as Jerusalem, others as a mountain in the heavenly realm; still others view this mountain as a metaphor for the people of God, his dwelling place (see Eph. 2:11–22). God’s grace will fully establish his people as the mountain rising above every other mountain. Mountains in the Bible are often used metaphorically for kingdoms. Kingdoms and governments are like mountains and hills on the landscape of history. The mountain-kingdom of God will be the chief of all mountains, the highest of all hills. The secular world sees Christ’s kingdom as irrelevant and powerless. But one day, the kingdoms of the earth will be leveled, and the King’s mountain will be high and exalted. See Isa. 25:6–8.
  - type: text
    content: towering over all the hills.
  - type: text
    content: A sparkling stream of every nation will flow into it.
  - type: note
    content: Or “All the nations will flow as a river to it.” The Hebrew word nahar can be translated “stream [river],” “to sparkle,” or “to be cheerful.” In Isa. 60:5, it is translated “radiant.” A cheerful, sparkling stream of people will come into divine radiance as they come up the mountain of the Lord. This speaks of the uphill flow of the river of God—a supernatural magnetism bringing the nations into the kingdom of Christ. This is the reversal of the dispersion of the people at Babel (see Gen. 11:1–9).
