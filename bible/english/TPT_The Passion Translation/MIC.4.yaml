  '2':
  - type: text
    content: Many peoples will come and say,
  - type: text
    content: '“Everyone, come! Let’s go up higher to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s mountain,
  - type: text
    content: to the house of Jacob’s God; then he can teach us his ways,
  - type: text
    content: and we can walk in his paths.”
  - type: text
    content: 'Zion '
  - type: note
    content: Zion today is more than a location; it is a realm where God is enthroned (see Pss. 2:4–6; 87:5). Zion is a synonym for the people of God, the dwelling place of his Spirit (see Pss. 9:11; 74:2; 76:2; Heb. 12:22–24). The perfection of beauty is in Mount Zion, where the light of God shines (see Ps. 50:2). Perfected praise rises to the Lord in this place of perfect rest (see Ps. 65:1–2). The Mountain of Zion is where the Lord is known in his greatness (see Ps. 99:2; Isa. 12:4–6). It is the hope of all the afflicted (see Ps. 102:16–22; Isa. 14:32; 51:11).
  - type: text
    content: will be the center of instruction,
  - type: note
    content: Although the Hebrew word torah is used here, it means more than “the law.” This word also can be translated “instruction” or “teaching.” This is not the law of Moses, for that came from Sinai. This is revelation of the gospel and the instruction of God out of the Zion realm that overcomes every work of darkness within us and around us. From Jerusalem the gospel light and the twelve mighty apostles went forth to change the world.
  - type: text
    content: 'and the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will go out from Jerusalem.'
