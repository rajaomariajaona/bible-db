  '9':
  - type: text
    content: Why are you wailing?
  - type: text
    content: Why are you writhing like a woman in labor?
  - type: text
    content: Have you no king to help you?
  - type: text
    content: 'And your wise leader, '
  - type: note
    content: 'Or “counselor.” These two rhetorical questions can be interpreted in two ways: first, in referring to God as their King and Counselor who is always there to help them and, second, in referring to Hezekiah and his prophetic adviser, who could not be counted on to save them.'
  - type: text
