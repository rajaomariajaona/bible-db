    content: Many nations have now gathered to attack you.
  - type: text
    content: They say, “Let’s destroy Jerusalem
  - type: text
    content: so that we can gloat over capturing Zion.”
  - type: note
    content: Or “Let her be profaned [violated] and let our eyes gaze upon Zion.” This seems to imply overtones of a violent man about to rape a girl, which is in keeping with the larger context, for Jerusalem is referred to as the “daughter of Zion” (vv. 8, 10, 13).
