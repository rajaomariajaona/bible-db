  '8':
  - type: text
    content: “And to you, Tower of the Flock,
  - type: text
    content: where the daughter of Zion is lifted up,
  - type: note
    content: Or “the hill of Daughter Zion.” Hill is taken from the triliteral Hebrew root ʿpl, which means “to lift up” or “to swell.” One of the possible meanings is “stronghold [fortress, mound].” Traditionally, this is seen as a metaphor for Jerusalem as the place where God, like a shepherd from his lookout tower, watches over his people. However, “Tower of the Flock” (Hb. Migdal ʿEder) is a historical location on the road between Jerusalem and Bethlehem and only yards away from the border of Bethlehem. This was the place where Rachel was buried after giving birth to Benjamin and where Jacob pitched his tent to mourn her passing. Migdal Eder was known to have a two-story stone watchtower where Levitical shepherds would stand watching over the flock to make certain that the wild animals did not harm the sheep. These were the flocks raised to be sacrificed in the temple just four miles away. Migdal Eder was like a holding pen for these special Passover lambs. It is possible that the shepherds, on the night Jesus was born, were near Migdal Eder. This would fulfill both the prophecies of Mic. 5:2 and 4:8. The birthing of the Passover lambs would take place at the lower floor of the watchtower (Migdal Eder). Selected ewes that were about to give birth would be brought there. After the birth of the lambs, the priestly shepherds would wrap the lambs in cloth and lay them in the manger lined with soft hay, for Passover lambs must be unblemished with no bruises or broken bones. The miracle sign for these priestly shepherds would be a baby boy lying where the Passover lamb should be—in the manger (not a manger, but the manger where sacred lambs would be placed). Based on the prophecy of Mic. 4:8, the Jewish Midrash concluded that the arrival of the Messiah would be declared first at Migdal Eder. Jesus was not born in a cave or in a stable but in the lower floor of Migdal Eder and placed where a sacrificial lamb belonged. See Alfred Edersheim, The Life and Times of Jesus the Messiah, Book 2, chapter 6; Luke 2:1–20.
  - type: text
    content: 'your royal dominion '
  - type: note
    content: Or “your first rule [dynasty] will come.” Traditionally this was understood as the return of David’s kingly rulership to Israel; however, seen from the vantage point after Christ’s time on earth, the hints of the coming Messiah to take “dominion” as the first and foremost King are clear.
  - type: text
