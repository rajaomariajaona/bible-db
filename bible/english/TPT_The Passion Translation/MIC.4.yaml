      - type: text
        text: ) is a historical location on the road between Jerusalem and Bethlehem and only yards away from the border of Bethlehem. This was the place where Rachel was buried after giving birth to Benjamin and where Jacob pitched his tent to mourn her passing. Migdal Eder was known to have a two-story stone watchtower where Levitical shepherds would stand watching over the flock to make certain that the wild animals did not harm the sheep. These were the flocks raised to be sacrificed in the temple just four miles away. Migdal Eder was like a holding pen for these special Passover lambs. It is possible that the shepherds, on the night Jesus was born, were near Migdal Eder. This would fulfill both the prophecies of
