  '1':
  - type: heading
    content: The Future Glory of the Davidic Dynasty
  - type: text
    content: Now you are walled in.
  - type: note
    content: As translated from the Septuagint. The meaning of the Hebrew text, “Gather in the troops, daughter of troops,” is uncertain. In the Hebrew Bible this verse is numbered 4:14 and ch. 5 begins with v. 2.
  - type: text
    content: They have laid siege against us.
  - type: text
    content: They smack the ruler of Israel’s face with a rod.
  - type: note
    content: To “smack [strike]” someone upon the cheek was considered a symbolic way to humiliate a person. See 1 Kings 22:24; Job 16:10; Lam. 3:30.
  '10':
  - type: text
    content: '“When that day comes,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “I will destroy your horses and demolish your chariots.
  '11':
  - type: text
    content: I will destroy the cities of your country
  - type: text
    content: and tear down all your strongholds.
  '12':
  - type: text
    content: 'I will dismantle the witchcraft '
  - type: note
    content: Or “I will remove the magic charms from your hands.”
  - type: text
    content: in your land,
  - type: text
    content: and you will no longer cast spells.
  '13':
  - type: text
    content: I shall tear away your idols
  - type: text
    content: and your sacred stone pillars from among you.
  - type: text
    content: You will no longer worship things
  - type: text
    content: that your own hands have made.
  '14':
  - type: text
    content: I will uproot your sacred poles
  - type: note
    content: Or “Asherah poles,” which were idols used in the worship of the goddess Asherah.
  - type: text
    content: and level your cities.
  '15':
  - type: text
    content: I will punish with furious anger
  - type: text
    content: the nations who have disobeyed me.”
  '2':
  - type: text
    content: “But you, Bethlehem Ephrathah,
  - type: note
    content: 'Or “But you, fruitful Bethlehem.” See Matt. 2:6. Jewish tradition places ancient Bethlehem Ephrathah northeast of the current city and about four miles (six kilometers) south of the Old City of Jerusalem. This puts Migdal Eder (see Mic. 4:8 and the first note there) very close to the modern-day marker of Kever Rakhel—the tomb of Rachel. Bethlehem was the ancestral home of David. Ephrathah means “fruitful.” It is likely the name for a neighborhood attached to Bethlehem, and it comes from the name of Ephrath, one of the clans that made up the tribe of Judah (see Ruth 1:1–2). David’s family was part of this clan (see 1 Sam. 17:12). Bethlehem means both “house of bread” and “house of warriors.” Jesus, who was born in Bethlehem, is our Living Bread and our Mighty Warrior. The Hebrew alphabet contains picture meanings with each letter. So, if we do a Hebrew word study on the pictographic Hebrew letters, it will display a deeper meaning: Bet has a picture of a house and means “a house,” “son,” or “Son of God.” Yod is a picture of a hand and means “to work” or “to do a mighty deed.” Taw is a cross and means “to seal” or “to make a covenant.” Lamed pictures a staff and means “to control” or “to have authority.” Het is an inner room and has a picture meaning “to separate,” “a fence,” or “a sanctuary.” Mem pictures the waters and means “liquid,” “massive,” or “chaos.” From their pictographs, Bethlehem translates as “The Son of God is going to do a mighty deed. This deed will seal a covenant and be identified with the sign of a cross. He will have the authority to provide a sanctuary of safety where he will give those who have received him the water of eternal life.”'
  - type: text
    content: so small among the clans of Judah,
  - type: text
    content: from your people will come a ruler
  - type: text
    content: who will rule Israel for me.
  - type: text
    content: He
  - type: text
    content: ' will burst forth from the '
  - type: text
    content: first
  - type: text
    content: ' sunrise'
  - type: note
    content: Or “his goings out” or “his rising.” The Hebrew word motsaʾotaw is derived from a root word meaning “fountain.”
  - type: text
    content: from the days of eternity!”
  - type: note
    content: The Hebrew word ʿolam can be translated “ancient [times]”; however, it is most frequently associated with eternity. This is a clear statement of the eternality of the Savior who was born in Bethlehem.
  '3':
  - type: text
    content: 'Therefore, '
  - type: text
    content: Yahweh
  - type: text
    content: ' will hand Israel over to her enemies'
  - type: text
    content: until the labor pains are over and the child is born.
  - type: note
    content: See Isa. 7:14; 9:6. Although the language used is somewhat mysterious, the implication of the text is that the child born from this labor will be the deliverer of the nation. The labor pains will birth the hope of deliverance and restoration in the future.
  - type: text
    content: 'And then the remnant of his brothers '
  - type: text
    content: in exile
  - type: text
    content: will be reunited with the Israelites.
  '4':
  - type: text
    content: He will take his stand and will lead and feed his flock
  - type: text
    content: 'with the strength that comes from '
  - type: text
    content: Yahweh
  - type: text
    content: and with the majesty of the name of his God.
  - type: text
    content: With this shepherd
  - type: text
    content: ', they will live in safety,'
  - type: text
    content: for his greatness will extend to the ends of the earth.
  '5':
  - type: text
    content: He himself will be their peace.
  - type: note
    content: The Hebrew word shalom means “peace,” “abundance,” “prosperity,” and “wholeness.” See Isa. 9:6; Eph. 2:14.
  - type: heading
    content: Yahweh Will Deliver Israel from the Assyrians
  - type: text
    content: When the Assyrian army sets foot on our soil
  - type: note
    content: As translated from the Septuagint and Syriac. The Hebrew is “treads upon our palaces/fortresses.”
  - type: text
    content: to invade our land,
  - type: text
    content: we will raise up more than enough
  - type: text
    content: mighty captains to conquer them.
  - type: note
    content: Or “we will raise up seven shepherds [rulers] against them and eight princes of men.” This is a figure of speech saying that they raise up not two or three but more than enough (seven or eight) forces to defeat them. This figure of speech—giving one number followed by another number that is greater by one—is frequently found in Scripture (see Prov. 6:16; 30:15; Amos 1:3, 6, 9, 11, 13).
  '6':
  - type: text
    content: They will shepherd the Assyrians with the sword,
  - type: text
    content: 'the land of Nimrod '
  - type: note
    content: The “land of Nimrod” is synonymous with Assyria.
  - type: text
    content: with the drawn sword.
  - type: note
    content: Or “at its borders [entrances].” A slight emendation of the text gives peticha, “drawn sword.”
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' will deliver us from the Assyrians,'
  - type: text
    content: when they invade our land
  - type: text
    content: and tread on our territory.
  - type: heading
    content: The Remnant
  '7':
  - type: text
    content: Then the remnant of Jacob
  - type: text
    content: will be scattered among many peoples.
  - type: text
    content: 'They will be like the refreshing dew from '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: The dew was considered to be a gift from the Lord (see Gen. 27:28; Deut. 33:28; Hos. 14:5).
  - type: text
    content: like raindrops on the meadows,
  - type: text
    content: which do not wait on man’s command
  - type: text
    content: and are beyond human control.
  '8':
  - type: text
    content: Then the scattered remnant of Jacob will live among the nations.
  - type: text
    content: They will be like lions among the animals of the forest,
  - type: text
    content: like fierce lions among flocks of sheep,
  - type: text
    content: they will pounce on their prey with no one to rescue.
  '9':
  - type: text
    content: You will be victorious over your foes,
  - type: text
    content: and all your enemies will be torn to pieces.
  - type: heading
    content: Yahweh Will Destroy Their Idols
