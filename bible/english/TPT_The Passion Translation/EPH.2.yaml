document_id: EPH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Power Raised Us from the Dead
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: it
    children:
    - type: text
      text: And his fullness fills you
  - type: text
    text: ', even though you were once like corpses, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated literally from the Greek.
    marker-yv: yv-n
  - type: text
    text: 'dead in your sins and offenses. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'It wasn’t that long ago that you lived in the religion, customs, and values '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the worldliness of this world.”
    marker-yv: yv-n
  - type: text
    text: 'of this world, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic phrase can also refer to the authority of secular governments.
    marker-yv: yv-n
  - type: text
    text: 'obeying the dark ruler of the earthly realm who fills the atmosphere with his authority, and works diligently in the hearts of those who are disobedient to the truth of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The corruption that was in us from birth was expressed through the deeds and desires of our self-life. We lived by whatever natural cravings and thoughts our minds dictated, living as rebellious children subject to God’s wrath like everyone else.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But God still loved us with such great love. He is so rich in compassion and mercy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Even when we were dead and doomed in our many sins, he united us into the very life of Christ and saved us by his wonderful grace! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He raised us up with Christ the exalted One, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and we ascended with him into the glorious perfection and authority
  - type: text
    text: ' of the heavenly realm, for we are now co-seated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To be “placed” or “seated” in heaven means we have been given the perfection and authority to be there.
    marker-yv: yv-n
  - type: text
    text: as one with Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Throughout the coming ages '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “universes.”
    marker-yv: yv-n
  - type: text
    text: 'we will be the visible display of the infinite riches of his grace and kindness, which was showered upon us in Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For by grace you have been saved by faith. Nothing you did could ever earn this salvation, for it was the love gift '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for “gift” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mohabata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and comes from the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chav
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “love.”'
    marker-yv: yv-n
  - type: text
    text: 'from God that brought us to Christ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So no one will ever be able to boast, for salvation is never a reward for good works or human striving.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We have become his poetry, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The beautiful Greek word used here is translated “poem” or “poetry.” Our lives are the beautiful poetry written by God that will speak forth all that he desires in life.
    marker-yv: yv-n
  - type: text
    text: 'a re-created people that will fulfill the destiny he has given each of us, for we are joined to Jesus, the Anointed One. Even before we were born, God planned in advance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our destiny
  - type: text
    text: ' and the good works '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although implied, these good works make up our destiny. As we yield to God, our prearranged destiny comes to pass and we are rewarded for simply doing what he wanted us to accomplish.
    marker-yv: yv-n
  - type: text
    text: 'we would do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to fulfill it
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Humanity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'So don’t forget that you were not born as Jews and were uncircumcised (circumcision itself is just a work of man’s hands); you had none of the Jewish covenants and laws; you were foreigners to Israel’s incredible heritage; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “freedom,” or “commonwealth.”
    marker-yv: yv-n
  - type: text
    text: you were without the covenants and prophetic promises of the Messiah, the promised hope, and without God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yet look at you now! Everything is new!
  - type: text
    text: ' Although you were once distant and far away from God, now you have been brought delightfully close to him through the sacred blood of Jesus—you have actually been united to Christ!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Our reconciling “Peace” is Jesus! He has made Jew and non-Jew one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Christ
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: By dying as our sacrifice
  - type: text
    text: ', he has broken down every wall of prejudice that separated us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and has now made us equal through our union with Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ethnic hatred has been dissolved by the crucifixion of his precious body on the cross. The legal code that stood condemning every one of us has now been repealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by his command
  - type: text
    text: '. His triune essence has made peace between us by starting over—forming '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “to create in himself one new man.”
    marker-yv: yv-n
  - type: text
    text: 'one new race of humanity, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “one new man.”
    marker-yv: yv-n
  - type: text
    text: Jews and non-Jews fused together in himself!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Two have now become one, and we live restored to God and reconciled in the body of Christ. Through his crucifixion, hatred died. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the Messiah has come to preach this sweet message of peace to you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is Paul’s paraphrase of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 57:19
      metadata:
        usfm: ISA.57.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the ones who were distant, and to those who are near. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And now, because we are united to Christ, we both have equal and direct access in the realm of the Holy Spirit to come before the Father!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So, you are not foreigners or guests, but rather you are the children of the city of the holy ones, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'with all the rights as family members of the household of God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You are rising like the perfectly fitted stones of the temple
  - type: text
    text: '; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “temple” is not found in the text here, but is explicitly mentioned in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: EPH.2.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and your lives have been built up together upon the foundation laid by the apostles and prophets, and best of all, you are connected to the Head Cornerstone of the building, the Anointed One, Jesus Christ himself!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This entire building is under construction and is continually growing under his supervision until it rises up completed as the holy temple of the Lord himself. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This means that God is transforming each one of you into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Holy of Holies
  - type: text
    text: ', his dwelling place, through the power of the Holy Spirit living in you!'
