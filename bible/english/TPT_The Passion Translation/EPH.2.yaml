document_id: EPH.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Power Raised Us from the Dead
  - type: text
    content: And his fullness fills you
  - type: text
    content: ', even though you were once like corpses, '
  - type: note
    content: As translated literally from the Greek.
  - type: text
    content: 'dead in your sins and offenses. '
  '10':
  - type: text
    content: 'We have become his poetry, '
  - type: note
    content: The beautiful Greek word used here is translated “poem” or “poetry.” Our lives are the beautiful poetry written by God that will speak forth all that he desires in life.
  - type: text
    content: 'a re-created people that will fulfill the destiny he has given each of us, for we are joined to Jesus, the Anointed One. Even before we were born, God planned in advance '
  - type: text
    content: our destiny
  - type: text
    content: ' and the good works '
  - type: note
    content: Although implied, these good works make up our destiny. As we yield to God, our prearranged destiny comes to pass and we are rewarded for simply doing what he wanted us to accomplish.
  - type: text
    content: 'we would do '
  - type: text
    content: to fulfill it
  - type: text
    content: '!'
  - type: heading
    content: A New Humanity
  '11':
  - type: text
    content: 'So don’t forget that you were not born as Jews and were uncircumcised (circumcision itself is just a work of man’s hands); you had none of the Jewish covenants and laws; you were foreigners to Israel’s incredible heritage; '
  - type: note
    content: Or “freedom,” or “commonwealth.”
  - type: text
    content: you were without the covenants and prophetic promises of the Messiah, the promised hope, and without God.
  '13':
  - type: text
    content: Yet look at you now! Everything is new!
  - type: text
    content: ' Although you were once distant and far away from God, now you have been brought delightfully close to him through the sacred blood of Jesus—you have actually been united to Christ!'
  '14':
  - type: text
    content: 'Our reconciling “Peace” is Jesus! He has made Jew and non-Jew one '
  - type: text
    content: in Christ
  - type: text
    content: '. '
  - type: text
    content: By dying as our sacrifice
  - type: text
    content: ', he has broken down every wall of prejudice that separated us '
  - type: text
    content: and has now made us equal through our union with Christ
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ethnic hatred has been dissolved by the crucifixion of his precious body on the cross. The legal code that stood condemning every one of us has now been repealed '
  - type: text
    content: by his command
  - type: text
    content: '. His triune essence has made peace between us by starting over—forming '
  - type: note
    content: As translated from the Aramaic. The Greek is “to create in himself one new man.”
  - type: text
    content: 'one new race of humanity, '
  - type: note
    content: Or “one new man.”
  - type: text
    content: Jews and non-Jews fused together in himself!
  '16':
  - type: text
    content: 'Two have now become one, and we live restored to God and reconciled in the body of Christ. Through his crucifixion, hatred died. '
  '17':
  - type: text
    content: 'For the Messiah has come to preach this sweet message of peace to you, '
  - type: note
    content: This is Paul’s paraphrase of Isa. 57:19.
  - type: text
    content: 'the ones who were distant, and to those who are near. '
  '18':
  - type: text
    content: And now, because we are united to Christ, we both have equal and direct access in the realm of the Holy Spirit to come before the Father!
  '19':
  - type: text
    content: 'So, you are not foreigners or guests, but rather you are the children of the city of the holy ones, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'with all the rights as family members of the household of God. '
  '2':
  - type: text
    content: 'It wasn’t that long ago that you lived in the religion, customs, and values '
  - type: note
    content: The Aramaic can be translated “the worldliness of this world.”
  - type: text
    content: 'of this world, '
  - type: note
    content: The Aramaic phrase can also refer to the authority of secular governments.
  - type: text
    content: 'obeying the dark ruler of the earthly realm who fills the atmosphere with his authority, and works diligently in the hearts of those who are disobedient to the truth of God. '
  '20':
  - type: text
    content: You are rising like the perfectly fitted stones of the temple
  - type: text
    content: '; '
  - type: note
    content: The “temple” is not found in the text here, but is explicitly mentioned in v. 21.
  - type: text
    content: and your lives have been built up together upon the foundation laid by the apostles and prophets, and best of all, you are connected to the Head Cornerstone of the building, the Anointed One, Jesus Christ himself!
  '21':
  - type: text
    content: 'This entire building is under construction and is continually growing under his supervision until it rises up completed as the holy temple of the Lord himself. '
  '22':
  - type: text
    content: 'This means that God is transforming each one of you into '
  - type: text
    content: the Holy of Holies
  - type: text
    content: ', his dwelling place, through the power of the Holy Spirit living in you!'
  '3':
  - type: text
    content: The corruption that was in us from birth was expressed through the deeds and desires of our self-life. We lived by whatever natural cravings and thoughts our minds dictated, living as rebellious children subject to God’s wrath like everyone else.
  '4':
  - type: text
    content: 'But God still loved us with such great love. He is so rich in compassion and mercy. '
  '5':
  - type: text
    content: 'Even when we were dead and doomed in our many sins, he united us into the very life of Christ and saved us by his wonderful grace! '
  '6':
  - type: text
    content: 'He raised us up with Christ the exalted One, '
  - type: text
    content: and we ascended with him into the glorious perfection and authority
  - type: text
    content: ' of the heavenly realm, for we are now co-seated '
  - type: note
    content: To be “placed” or “seated” in heaven means we have been given the perfection and authority to be there.
  - type: text
    content: as one with Christ!
  '7':
  - type: text
    content: 'Throughout the coming ages '
  - type: note
    content: The Aramaic can be translated “universes.”
  - type: text
    content: 'we will be the visible display of the infinite riches of his grace and kindness, which was showered upon us in Jesus Christ. '
  '8':
  - type: text
    content: 'For by grace you have been saved by faith. Nothing you did could ever earn this salvation, for it was the love gift '
  - type: note
    content: The Aramaic word for “gift” is mohabata and comes from the Aramaic word chav, which means “love.”
  - type: text
    content: 'from God that brought us to Christ! '
  '9':
  - type: text
    content: So no one will ever be able to boast, for salvation is never a reward for good works or human striving.
