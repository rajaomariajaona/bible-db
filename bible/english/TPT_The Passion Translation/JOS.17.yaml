document_id: JOS.17,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Half-Tribe of West Manasseh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Joshua assigned land to the descendants of Manasseh, Joseph’s firstborn son. Joshua allotted Gilead and Bashan to Machir the firstborn of Manasseh, the father of Gilead, because he was a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brave
    - type: text
      text: ' warrior. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Within these two territories, there were several cities together with their surrounding towns that belonged to Manasseh: Beth Shean, Ibleam, Dor, Endor, Taanach, and Megiddo. These constituted three regions. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew meaning is uncertain.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Yet the men of Manasseh failed to take possession of those towns, and the Canaanites continued to live in that land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Later, when the Israelites grew strong, they put the Canaanites to forced labor but did not utterly drive them out.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribes of Ephraim and West Manasseh Request More Land
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: One day, the descendants of Joseph came to Joshua and said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has blessed us with many people, but you have given us only one part of the land. We ought to have more land!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Joshua said to them, “If the hill country of Ephraim is too small for the large number of people in your tribes, then go into the forests which belong to the Perizzites and the Rephaites, and clear ground for yourselves there.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The descendants of Joseph answered, “Indeed, there’s not enough room for us in the hill country of Ephraim. Yet all the Canaanites who live in the plain have chariots with iron-rimmed wheels, both those in Beth Shean and its villages, and those in the Valley of Jezreel.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Joshua said to the tribe of Ephraim and the half-tribe of Manasseh, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Then Joshua said to the house of Joseph.”
      marker-yv: yv-n
    - type: text
      text: '“There are indeed many people in your tribes, and for that reason, you are very powerful. I will give you more than one share of land. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Therefore, I will give you the hill country as well. It is a forest, but '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will empower
    - type: text
      text: ' you to take possession of it and clear it from one end to the other. You will conquer all the Canaanites even though they not only have iron chariots but also are a strong people.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Joshua assigned land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: west of the Jordan River
    - type: text
      text: ' to the rest of the tribe of Manasseh. The male descendants of Manasseh were Abiezer, Helek, Asriel, Shechem, Hepher, and Shemida. All of these men were heads of families, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and each of their families received territory west of the Jordan River
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Manasseh’s grandson Gilead had a son named Hepher who had a son named Zelophehad, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zelophehad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “first one [to break through]” or “firstborn.”
      marker-yv: yv-n
    - type: text
      text: 'who had no sons. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 27:1–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'But he did have five daughters: Mahlah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mahlah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “smooth,” “polished,” “caressing,” or “pleasing.”
      marker-yv: yv-n
    - type: text
      text: 'Noah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Noah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is found here as a woman’s name and means “rest,” “call,” “quiet,” or “peace.”
      marker-yv: yv-n
    - type: text
      text: 'Hoglah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hoglah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “hopping bird” or “quail.”
      marker-yv: yv-n
    - type: text
      text: 'Milcah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Milcah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “queen,” “rule,” or “counsel.”
      marker-yv: yv-n
    - type: text
      text: 'and Tirzah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tirzah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “pleasure,” “delight,” “loving,” or “graciousness.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They came before the priest Eleazar and Joshua son of Nun and the leaders, and said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' commanded Moses to give us an inheritance among our relatives.” So according to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s commandment, he gave an inheritance to them as he did to their uncles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: Since Joshua assigned land to both Manasseh’s male and female descendants, the tribe of Manasseh received ten shares of land on the west side of the Jordan River and two on the east (the territories of Gilead and Bashan).
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The northwest territory of Manasseh reached from Asher to Michmethath, which is east of Shechem; the boundary went southward to the inhabitants of the spring of Tappuah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tappuah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “apple.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and divided the land of Tappuah belonging to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the tribe of
    - type: text
      text: ' Manasseh from the town of Tappuah belonging to the Ephraimites. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'From there, the southern border followed the Kanah Stream westward to the Mediterranean Sea. The main territory of Manasseh lay north of the stream of Kanah, but south of it were some cities that belonged to the tribe of Ephraim even though they were located inside the territory of Manasseh. In the northwest, Manasseh bordered on the tribe of Asher, and in the northeast, it bordered on the tribe of Issachar. '
