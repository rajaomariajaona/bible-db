document_id: JOS.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Half-Tribe of West Manasseh
  - type: text
    content: 'Joshua assigned land to the descendants of Manasseh, Joseph’s firstborn son. Joshua allotted Gilead and Bashan to Machir the firstborn of Manasseh, the father of Gilead, because he was a '
  - type: text
    content: brave
  - type: text
    content: ' warrior. '
  '11':
  - type: text
    content: 'Within these two territories, there were several cities together with their surrounding towns that belonged to Manasseh: Beth Shean, Ibleam, Dor, Endor, Taanach, and Megiddo. These constituted three regions. '
  - type: note
    content: The Hebrew meaning is uncertain.
  '12':
  - type: text
    content: 'Yet the men of Manasseh failed to take possession of those towns, and the Canaanites continued to live in that land. '
  '13':
  - type: text
    content: Later, when the Israelites grew strong, they put the Canaanites to forced labor but did not utterly drive them out.
  - type: heading
    content: The Tribes of Ephraim and West Manasseh Request More Land
  '14':
  - type: text
    content: One day, the descendants of Joseph came to Joshua and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ' has blessed us with many people, but you have given us only one part of the land. We ought to have more land!”'
  '15':
  - type: text
    content: Joshua said to them, “If the hill country of Ephraim is too small for the large number of people in your tribes, then go into the forests which belong to the Perizzites and the Rephaites, and clear ground for yourselves there.”
  '16':
  - type: text
    content: The descendants of Joseph answered, “Indeed, there’s not enough room for us in the hill country of Ephraim. Yet all the Canaanites who live in the plain have chariots with iron-rimmed wheels, both those in Beth Shean and its villages, and those in the Valley of Jezreel.”
  '17':
  - type: text
    content: 'Then Joshua said to the tribe of Ephraim and the half-tribe of Manasseh, '
  - type: note
    content: Or “Then Joshua said to the house of Joseph.”
  - type: text
    content: '“There are indeed many people in your tribes, and for that reason, you are very powerful. I will give you more than one share of land. '
  '18':
  - type: text
    content: 'Therefore, I will give you the hill country as well. It is a forest, but '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: will empower
  - type: text
    content: ' you to take possession of it and clear it from one end to the other. You will conquer all the Canaanites even though they not only have iron chariots but also are a strong people.”'
  '2':
  - type: text
    content: 'And Joshua assigned land '
  - type: text
    content: west of the Jordan River
  - type: text
    content: ' to the rest of the tribe of Manasseh. The male descendants of Manasseh were Abiezer, Helek, Asriel, Shechem, Hepher, and Shemida. All of these men were heads of families, '
  - type: text
    content: and each of their families received territory west of the Jordan River
  - type: text
    content: .
  '3':
  - type: text
    content: 'Manasseh’s grandson Gilead had a son named Hepher who had a son named Zelophehad, '
  - type: note
    content: Zelophehad means “first one [to break through]” or “firstborn.”
  - type: text
    content: 'who had no sons. '
  - type: note
    content: See Num. 27:1–7.
  - type: text
    content: 'But he did have five daughters: Mahlah, '
  - type: note
    content: Mahlah means “smooth,” “polished,” “caressing,” or “pleasing.”
  - type: text
    content: 'Noah, '
  - type: note
    content: Noah is found here as a woman’s name and means “rest,” “call,” “quiet,” or “peace.”
  - type: text
    content: 'Hoglah, '
  - type: note
    content: Hoglah means “hopping bird” or “quail.”
  - type: text
    content: 'Milcah, '
  - type: note
    content: Milcah means “queen,” “rule,” or “counsel.”
  - type: text
    content: 'and Tirzah. '
  - type: note
    content: Tirzah means “pleasure,” “delight,” “loving,” or “graciousness.”
  '4':
  - type: text
    content: They came before the priest Eleazar and Joshua son of Nun and the leaders, and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded Moses to give us an inheritance among our relatives.” So according to '
  - type: text
    content: Yahweh
  - type: text
    content: '’s commandment, he gave an inheritance to them as he did to their uncles. '
  '5':
  - type: text
    content: Since Joshua assigned land to both Manasseh’s male and female descendants, the tribe of Manasseh received ten shares of land on the west side of the Jordan River and two on the east (the territories of Gilead and Bashan).
  '7':
  - type: text
    content: 'The northwest territory of Manasseh reached from Asher to Michmethath, which is east of Shechem; the boundary went southward to the inhabitants of the spring of Tappuah '
  - type: note
    content: Tappuah means “apple.”
  '8':
  - type: text
    content: 'and divided the land of Tappuah belonging to '
  - type: text
    content: the tribe of
  - type: text
    content: ' Manasseh from the town of Tappuah belonging to the Ephraimites. '
  '9':
  - type: text
    content: 'From there, the southern border followed the Kanah Stream westward to the Mediterranean Sea. The main territory of Manasseh lay north of the stream of Kanah, but south of it were some cities that belonged to the tribe of Ephraim even though they were located inside the territory of Manasseh. In the northwest, Manasseh bordered on the tribe of Asher, and in the northeast, it bordered on the tribe of Issachar. '
