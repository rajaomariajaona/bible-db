document_id: GEN.23,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Sarah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sarah lived to be one hundred and twenty-seven. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This reference to Sarah is the only time that Scripture mentions a woman’s age at death.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now Ephron the Hittite was sitting there among his countrymen. He spoke up so all the Hittites who sat at the gate as elders of the city '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who came in at the gate of his city,” a figure of speech for stating they had leadership in the city. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 4:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'could hear him, and said, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “No, my lord, listen. I will give you not only the cave but also the entire field! In the presence of my people, I will give it to you to bury your dead.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Abraham bowed low before the people of the land, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and he said to Ephron in the hearing of all the people, “No, please listen, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kind sir
    - type: text
      text: . I will pay whatever the field is worth. Take my money so that I can bury my dead there.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: '“If you insist, my lord,” answered Ephron. “But what is a piece of land worth only four hundred silver shekels to men of our standing? Go ahead and bury your dead.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Abraham agreed to the amount, weighed out the four hundred silver shekels '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The price was undoubtedly high. Jeremiah gave only seventeen shekels for land that was probably no less spacious than the field of Machpelah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 32:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Although difficult to estimate the cost, some have calculated four hundred shekels of silver to be approximately ten pounds of silver.
      marker-yv: yv-n
    - type: text
      text: according to the merchant’s standard of weight, and in the presence of the Hittites he gave the money to Ephron.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Ephron’s field of Machpelah, east of Mamre, along with the cave and all the trees within its borders, passed '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'to Abraham as his legal possession. The complete transaction was carried out in the presence of the Hittites—those who sat as elders at the city gates. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'After this, Abraham buried his wife Sarah in the cave there in the field of Machpelah near Mamre (now Hebron) in the land of Canaan. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'She died in the land of Canaan at Kiriath Arba, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kiriath Arba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the city of the four [giants].” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 14:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Some Jewish scholars believe “the city of the four” refers to the four couples buried there: Adam and Eve, Abraham and Sarah, Isaac and Rebekah, Jacob and Leah. See also the first footnote on'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 23:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: on “Machpelah.”
      marker-yv: yv-n
    - type: text
      text: 'now known as Hebron. There Abraham mourned and wept for her. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Both the field and the cave passed from the Hittites to Abraham’s possession to be his family burial ground.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: After his time of mourning was over
    - type: text
      text: ', Abraham got up from where her body lay, and went to speak with the Hittites. He said to them, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“I live as an alien and stranger among you. Sell me some of your property so I can use it as a burial site '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for my wife
    - type: text
      text: .”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: '“Hear us, my lord,” the Hittites answered, “you are a mighty prince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of God
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “king of God” (LXX). The Hebrew reads “a mighty chief among us,” with the generic term for “god” likely being used as the superlative for “mighty.”
      marker-yv: yv-n
    - type: text
      text: among us. You may bury your dead in the choicest of our tombs. None of us would withhold our burial ground from you.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then Abraham bowed respectfully before the Hittites, the people of the land '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he said to them, “If you are willing to allow my wife a proper burial, then please hear me out. On my behalf please persuade '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your countryman
    - type: text
      text: ', Ephron the son of Zohar, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'to sell me the cave he owns at Machpelah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Machpelah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means “double” or “doubling.” Everyone buried in this cave would be as one of a couple: Abraham and Sarah, Isaac and Rebekah, Jacob and Leah (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 23:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:29–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Death for the patriarchs was a gateway into the resurrection. This cave was more like a bedroom to rest in than a tomb, more an altar than a grave. It was an altar to the God of Abraham, Isaac, and Jacob, who is not a God of the dead but of the living (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 22:31–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). According to Jewish tradition, Adam and Eve were also buried in this cave. See Jerusalem Talmud,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ta’anit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4:2; Babylonian Talmud,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Eruvin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 53a;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pirque Rabbi Eliezer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ch. 20; Midrash Rabba ('
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gen. Rab.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 28:3. According to the Midrash, the patriarchs were buried in this cave because this cave is the threshold to the garden of Eden. Some New Testament scholars believe that it could have been the patriarchs who were raised from the dead at the resurrection of Christ and were seen in Jerusalem. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:52–53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on the edge of his land. Let him sell it to me publicly '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in your presence” or “among you.”
      marker-yv: yv-n
    - type: text
      text: 'and at the full price, so that I may own it for a burial site.” '
