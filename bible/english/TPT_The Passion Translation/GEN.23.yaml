verses:
  '1':
  - type: heading
    content: The Death of Sarah
  - type: text
    content: 'Sarah lived to be one hundred and twenty-seven. '
  - type: note
    content: This reference to Sarah is the only time that Scripture mentions a woman’s age at death.
  '10':
  - type: text
    content: 'Now Ephron the Hittite was sitting there among his countrymen. He spoke up so all the Hittites who sat at the gate as elders of the city '
  - type: note
    content: Or “who came in at the gate of his city,” a figure of speech for stating they had leadership in the city. See Ruth 4:1–12.
  - type: text
    content: 'could hear him, and said, '
  '11':
  - type: text
    content: “No, my lord, listen. I will give you not only the cave but also the entire field! In the presence of my people, I will give it to you to bury your dead.”
  '12':
  - type: text
    content: 'Then Abraham bowed low before the people of the land, '
  '13':
  - type: text
    content: 'and he said to Ephron in the hearing of all the people, “No, please listen, '
  - type: text
    content: kind sir
  - type: text
    content: . I will pay whatever the field is worth. Take my money so that I can bury my dead there.”
  '14':
  - type: text
    content: '“If you insist, my lord,” answered Ephron. “But what is a piece of land worth only four hundred silver shekels to men of our standing? Go ahead and bury your dead.” '
  '16':
  - type: text
    content: 'So Abraham agreed to the amount, weighed out the four hundred silver shekels '
  - type: note
    content: The price was undoubtedly high. Jeremiah gave only seventeen shekels for land that was probably no less spacious than the field of Machpelah (see Jer. 32:9). Although difficult to estimate the cost, some have calculated four hundred shekels of silver to be approximately ten pounds of silver.
  - type: text
    content: according to the merchant’s standard of weight, and in the presence of the Hittites he gave the money to Ephron.
  '17':
  - type: text
    content: 'So Ephron’s field of Machpelah, east of Mamre, along with the cave and all the trees within its borders, passed '
  '18':
  - type: text
    content: 'to Abraham as his legal possession. The complete transaction was carried out in the presence of the Hittites—those who sat as elders at the city gates. '
  '19':
  - type: text
    content: 'After this, Abraham buried his wife Sarah in the cave there in the field of Machpelah near Mamre (now Hebron) in the land of Canaan. '
  '2':
  - type: text
    content: 'She died in the land of Canaan at Kiriath Arba, '
  - type: note
    content: 'Kiriath Arba means “the city of the four [giants].” See Josh. 14:15. Some Jewish scholars believe “the city of the four” refers to the four couples buried there: Adam and Eve, Abraham and Sarah, Isaac and Rebekah, Jacob and Leah. See also the first footnote on Gen. 23:9 on “Machpelah.”'
  - type: text
    content: 'now known as Hebron. There Abraham mourned and wept for her. '
  '20':
  - type: text
    content: Both the field and the cave passed from the Hittites to Abraham’s possession to be his family burial ground.
  '3':
  - type: text
    content: After his time of mourning was over
  - type: text
    content: ', Abraham got up from where her body lay, and went to speak with the Hittites. He said to them, '
  '4':
  - type: text
    content: '“I live as an alien and stranger among you. Sell me some of your property so I can use it as a burial site '
  - type: text
    content: for my wife
  - type: text
    content: .”
  '5':
  - type: text
    content: '“Hear us, my lord,” the Hittites answered, “you are a mighty prince '
  - type: text
    content: of God
  - type: text
    content: ' '
  - type: note
    content: Or “king of God” (LXX). The Hebrew reads “a mighty chief among us,” with the generic term for “god” likely being used as the superlative for “mighty.”
  - type: text
    content: among us. You may bury your dead in the choicest of our tombs. None of us would withhold our burial ground from you.”
  '7':
  - type: text
    content: 'Then Abraham bowed respectfully before the Hittites, the people of the land '
  '8':
  - type: text
    content: 'and he said to them, “If you are willing to allow my wife a proper burial, then please hear me out. On my behalf please persuade '
  - type: text
    content: your countryman
  - type: text
    content: ', Ephron the son of Zohar, '
  '9':
  - type: text
    content: 'to sell me the cave he owns at Machpelah '
  - type: note
    content: 'Machpelah means “double” or “doubling.” Everyone buried in this cave would be as one of a couple: Abraham and Sarah, Isaac and Rebekah, Jacob and Leah (see Gen. 23:19; 25:9; 49:29–32; 50:13). Death for the patriarchs was a gateway into the resurrection. This cave was more like a bedroom to rest in than a tomb, more an altar than a grave. It was an altar to the God of Abraham, Isaac, and Jacob, who is not a God of the dead but of the living (see Matt. 22:31–32). According to Jewish tradition, Adam and Eve were also buried in this cave. See Jerusalem Talmud, Ta’anit 4:2; Babylonian Talmud, Eruvin 53a; Pirque Rabbi Eliezer, ch. 20; Midrash Rabba (Gen. Rab.), 28:3. According to the Midrash, the patriarchs were buried in this cave because this cave is the threshold to the garden of Eden. Some New Testament scholars believe that it could have been the patriarchs who were raised from the dead at the resurrection of Christ and were seen in Jerusalem. See Matt. 27:52–53.'
  - type: text
    content: 'on the edge of his land. Let him sell it to me publicly '
  - type: note
    content: Or “in your presence” or “among you.”
  - type: text
    content: 'and at the full price, so that I may own it for a burial site.” '
