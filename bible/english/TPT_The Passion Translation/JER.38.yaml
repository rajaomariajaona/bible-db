document_id: JER.38,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Thrown into a Muddy Cistern
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The officials of Jerusalem
    - type: text
      text: ' were listening to me as I was prophesying, including Shephatiah son of Mattan, Gedaliah son of Pashhur, Jucal son of Shelemiah, and Pashhur son of Malchiah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king commanded Ebed-Melech, “Take thirty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts have “three men.”
      marker-yv: yv-n
    - type: text
      text: 'men with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from the palace guard
    - type: text
      text: ' and pull the prophet Jeremiah out of the cistern before he dies.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went with the men into the palace to a room under the treasury and took some worn-out clothing and rags and lowered them on ropes to me in the cistern. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ebed-Melech then shouted down to me, “Here, put these worn-out clothes and rags under your armpits to pad the ropes.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they hauled me up from the cistern and pulled me out, and I remained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in confinement
    - type: text
      text: ' in the palace guardhouse.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Like Jeremiah of old, we have been drawn up by God out of the pit of sin with cords of love. The worn-out clothes and filthy rags of our own righteousness will be discarded. From then on, we remain prisoners of the Lord in the bonds of the new covenant.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zedekiah Asks Jeremiah for a Word
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, King Zedekiah summoned me to meet him at his private entrance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the third entrance,” which was likely the private entrance of the king.
      marker-yv: yv-n
    - type: text
      text: 'to the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: . “I want to ask you for a word,” the king said to me, “and keep nothing back from me.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I answered him, “If I tell you the truth you will put me to death. And if I tell you what you should do, you will not listen to me.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Zedekiah then secretly promised me with an oath, saying, “As surely as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the giver of this life of ours, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who made for us our souls.”
      marker-yv: yv-n
    - type: text
      text: lives, I will neither have you put to death nor hand you over to these men who are determined to kill you.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well then,” I said to Zedekiah, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies says, ‘If you go out and surrender to Nebuchadnezzar’s generals, your life will be spared, and Jerusalem will not be burned down. You and your family will survive. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you do not surrender to Nebuchadnezzar’s generals, this city will be handed over to the Babylonians, they will burn it down, and I will make sure that you are taken prisoner by your enemies.’ ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Zedekiah then said to me, “I’m afraid of our own people who have already defected to the Babylonians. They might give me into their hands; then they will torture me!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I told them
    - type: text
      text: ': “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says that whoever stays in this city will die by sword, plague, or food shortages, but anyone who leaves the city and surrenders to the Babylonians will escape with their lives and live. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“That will not happen,” I told him. “Please listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s voice in what I say, and then it will go well with you, and your life will be spared. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has given me a vision of what will happen to you if you refuse to surrender. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw all the women left in the king’s palace being led out and given to the generals of the king of Babylon. And they were all taunting you as they were led away:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘Your trusted friends '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the false prophets who prophesied peace when God had destined the Babylonian invasion.
      marker-yv: yv-n
    - type: text
      text: led you astray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and overcame you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They told you to resist,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they all ran away!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, now your feet are stuck in the mire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yes, you’re trapped so deep in the mud.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is an intentional parallel drawn between the king’s position in this prophecy and the experience of Jeremiah (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes, all your wives and children will be marched out into your enemy’s camp. And you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zedekiah
    - type: text
      text: ', will be a prisoner in the clutches of the king of Babylon, powerless to escape. And this city will be burned to the ground.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah then said to me, “If you wish to keep on living, tell no one about our conversation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If my officials hear that I have been talking to you, and they come and ask you, ‘What did you say to the king and what did the king say to you? You’d better tell us everything, or we will kill you,’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then you must reply, ‘I humbly begged the king not to send me back to the prison at Jonathan’s house to die there.’ ”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In fact, the officials did come to interrogate me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about my meeting with the king
    - type: text
      text: ', so I told them exactly what he had instructed me to say. Because no one overheard my conversation with the king, they stopped questioning me at that point.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so, I remained confined in the palace guardhouse until the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tragic
    - type: text
      text: ' day Jerusalem was captured.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has said, ‘'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' will certainly hand over Jerusalem to the army of the king of Babylon, and he will capture it.’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the officials said to the king, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: traitor
    - type: text
      text: ' must die! His words are demoralizing the soldiers and all the people left in the city. This man is not seeking the welfare of the people but their ruin.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Zedekiah answered, “He is in your hands, so do what you want, I will not stand in your way.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: King Zedekiah was presumptuous toward God, weak in his leadership, and childish in his conduct (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took me and put me into the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: muddy
    - type: text
      text: ' cistern of the king’s son Malchiah in the palace courtyard. There was little water in the cistern, only mud. They lowered me down with ropes, and I sank down deep into the mud.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lam. 3:53–57
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rescued by the Ethiopian
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ebed-Melech '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ebed melech
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “servant of the king.” Ebed-Melech is used here as a proper name.
      marker-yv: yv-n
    - type: text
      text: 'the Ethiopian, a palace official, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “eunuch,” which is more likely an official title rather than an indication that Ebed-Melech was physically a eunuch.
      marker-yv: yv-n
    - type: text
      text: 'heard that I had been put into the cistern. As the king was sitting in the Benjamin Gate, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Kings would often hold court at the gates of the city and adjudicate cases.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ebed-Melech came out from the palace and spoke to the king. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“My lord the king,” he said, “these evil men were wrong to throw the prophet Jeremiah into a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: muddy
    - type: text
      text: ' cistern. He will starve to death there since there is no more food left in the city.”'
