document_id: JER.38,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Thrown into a Muddy Cistern
  - type: text
    content: The officials of Jerusalem
  - type: text
    content: ' were listening to me as I was prophesying, including Shephatiah son of Mattan, Gedaliah son of Pashhur, Jucal son of Shelemiah, and Pashhur son of Malchiah. '
  '10':
  - type: text
    content: 'So the king commanded Ebed-Melech, “Take thirty '
  - type: note
    content: Some manuscripts have “three men.”
  - type: text
    content: 'men with you '
  - type: text
    content: from the palace guard
  - type: text
    content: ' and pull the prophet Jeremiah out of the cistern before he dies.” '
  '11':
  - type: text
    content: 'So he went with the men into the palace to a room under the treasury and took some worn-out clothing and rags and lowered them on ropes to me in the cistern. '
  '12':
  - type: text
    content: 'Ebed-Melech then shouted down to me, “Here, put these worn-out clothes and rags under your armpits to pad the ropes.” '
  '13':
  - type: text
    content: 'So they hauled me up from the cistern and pulled me out, and I remained '
  - type: text
    content: in confinement
  - type: text
    content: ' in the palace guardhouse.'
  - type: note
    content: Like Jeremiah of old, we have been drawn up by God out of the pit of sin with cords of love. The worn-out clothes and filthy rags of our own righteousness will be discarded. From then on, we remain prisoners of the Lord in the bonds of the new covenant.
  - type: heading
    content: Zedekiah Asks Jeremiah for a Word
  '14':
  - type: text
    content: 'Later, King Zedekiah summoned me to meet him at his private entrance '
  - type: note
    content: Or “the third entrance,” which was likely the private entrance of the king.
  - type: text
    content: 'to the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: . “I want to ask you for a word,” the king said to me, “and keep nothing back from me.”
  '15':
  - type: text
    content: I answered him, “If I tell you the truth you will put me to death. And if I tell you what you should do, you will not listen to me.”
  '16':
  - type: text
    content: 'King Zedekiah then secretly promised me with an oath, saying, “As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ', the giver of this life of ours, '
  - type: note
    content: Or “who made for us our souls.”
  - type: text
    content: lives, I will neither have you put to death nor hand you over to these men who are determined to kill you.”
  '17':
  - type: text
    content: “Well then,” I said to Zedekiah, “
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies says, ‘If you go out and surrender to Nebuchadnezzar’s generals, your life will be spared, and Jerusalem will not be burned down. You and your family will survive. '
  '18':
  - type: text
    content: But if you do not surrender to Nebuchadnezzar’s generals, this city will be handed over to the Babylonians, they will burn it down, and I will make sure that you are taken prisoner by your enemies.’ ”
  '19':
  - type: text
    content: King Zedekiah then said to me, “I’m afraid of our own people who have already defected to the Babylonians. They might give me into their hands; then they will torture me!”
  '2':
  - type: text
    content: I told them
  - type: text
    content: ': “'
  - type: text
    content: Yahweh
  - type: text
    content: ' says that whoever stays in this city will die by sword, plague, or food shortages, but anyone who leaves the city and surrenders to the Babylonians will escape with their lives and live. '
  '20':
  - type: text
    content: '“That will not happen,” I told him. “Please listen to '
  - type: text
    content: Yahweh
  - type: text
    content: '’s voice in what I say, and then it will go well with you, and your life will be spared. '
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' has given me a vision of what will happen to you if you refuse to surrender. '
  '22':
  - type: text
    content: 'I saw all the women left in the king’s palace being led out and given to the generals of the king of Babylon. And they were all taunting you as they were led away:'
  - type: text
    content: '“ ‘Your trusted friends '
  - type: note
    content: That is, the false prophets who prophesied peace when God had destined the Babylonian invasion.
  - type: text
    content: led you astray
  - type: text
    content: and overcame you!
  - type: text
    content: They told you to resist,
  - type: text
    content: as they all ran away!
  - type: text
    content: See, now your feet are stuck in the mire,
  - type: text
    content: yes, you’re trapped so deep in the mud.’
  - type: note
    content: There is an intentional parallel drawn between the king’s position in this prophecy and the experience of Jeremiah (see v. 6).
  '23':
  - type: text
    content: '“Yes, all your wives and children will be marched out into your enemy’s camp. And you, '
  - type: text
    content: Zedekiah
  - type: text
    content: ', will be a prisoner in the clutches of the king of Babylon, powerless to escape. And this city will be burned to the ground.”'
  '24':
  - type: text
    content: 'Zedekiah then said to me, “If you wish to keep on living, tell no one about our conversation. '
  '25':
  - type: text
    content: 'If my officials hear that I have been talking to you, and they come and ask you, ‘What did you say to the king and what did the king say to you? You’d better tell us everything, or we will kill you,’ '
  '26':
  - type: text
    content: then you must reply, ‘I humbly begged the king not to send me back to the prison at Jonathan’s house to die there.’ ”
  '27':
  - type: text
    content: 'In fact, the officials did come to interrogate me '
  - type: text
    content: about my meeting with the king
  - type: text
    content: ', so I told them exactly what he had instructed me to say. Because no one overheard my conversation with the king, they stopped questioning me at that point.'
  '28':
  - type: text
    content: 'And so, I remained confined in the palace guardhouse until the '
  - type: text
    content: tragic
  - type: text
    content: ' day Jerusalem was captured.'
  '3':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said, ‘'
  - type: text
    content: I
  - type: text
    content: ' will certainly hand over Jerusalem to the army of the king of Babylon, and he will capture it.’ ”'
  '4':
  - type: text
    content: 'Then the officials said to the king, “This '
  - type: text
    content: traitor
  - type: text
    content: ' must die! His words are demoralizing the soldiers and all the people left in the city. This man is not seeking the welfare of the people but their ruin.”'
  '5':
  - type: text
    content: 'King Zedekiah answered, “He is in your hands, so do what you want, I will not stand in your way.” '
  - type: note
    content: King Zedekiah was presumptuous toward God, weak in his leadership, and childish in his conduct (see vv. 18–19).
  '6':
  - type: text
    content: 'So they took me and put me into the '
  - type: text
    content: muddy
  - type: text
    content: ' cistern of the king’s son Malchiah in the palace courtyard. There was little water in the cistern, only mud. They lowered me down with ropes, and I sank down deep into the mud.'
  - type: note
    content: See Lam. 3:53–57.
  - type: heading
    content: Rescued by the Ethiopian
  '7':
  - type: text
    content: 'Ebed-Melech '
  - type: note
    content: The Hebrew term ebed melech means “servant of the king.” Ebed-Melech is used here as a proper name.
  - type: text
    content: 'the Ethiopian, a palace official, '
  - type: note
    content: Or “eunuch,” which is more likely an official title rather than an indication that Ebed-Melech was physically a eunuch.
  - type: text
    content: 'heard that I had been put into the cistern. As the king was sitting in the Benjamin Gate, '
  - type: note
    content: Kings would often hold court at the gates of the city and adjudicate cases.
  '8':
  - type: text
    content: 'Ebed-Melech came out from the palace and spoke to the king. '
  '9':
  - type: text
    content: '“My lord the king,” he said, “these evil men were wrong to throw the prophet Jeremiah into a '
  - type: text
    content: muddy
  - type: text
    content: ' cistern. He will starve to death there since there is no more food left in the city.”'
