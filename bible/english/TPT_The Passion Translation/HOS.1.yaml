document_id: HOS.1,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'Here is '
  - type: text
    content: Yahweh
  - type: text
    content: '’s message that came through '
  - type: text
    content: the prophet
  - type: text
    content: ' Hosea son of Beeri. '
  - type: note
    content: Beeri means “my wellspring.” Jewish tradition states that Beeri was a prophet who was a wellspring of revelation and greatly influenced Isaiah.
  - type: text
    content: 'At that time, Uzziah, Jotham, Ahaz, and Hezekiah ruled as kings of Judah, and Jeroboam the son of Joash was king in Israel. '
  '10':
  - type: text
    content: 'Yet someday, '
  - type: note
    content: In the Hebrew Bible, this paragraph is the first part of ch. 2 . Most English translations keep this paragraph as part of ch. 1 .
  - type: text
    content: 'the number of the people of Israel will become as innumerable as the sand of the sea, which cannot be counted. '
  - type: note
    content: Even when God sends judgment, mercy will prevail. He will restore and renew and reveal his love again. See Hab. 3:2 .
  - type: text
    content: 'Although '
  - type: note
    content: Or “In the place where,” which could be a reference to Jezreel.
  - type: text
    content: God
  - type: text
    content: ' named them Not-My-People, he will '
  - type: text
    content: restore
  - type: text
    content: ' them and call them Children of the Living God.'
  - type: note
    content: We must always remember that mercy triumphs over judgment. God always remembers to show mercy (see Isa. 54:8 ).
  '11':
  - type: text
    content: 'The divided people of Judah and Israel will reunite. They will appoint themselves one head '
  - type: note
    content: Jesus is the “one head” over all his scattered people. He has reunited Jew and gentile into one new person (see Eph. 2:15 ). We are the seeds he has sown into the earth (see Matt. 13:1–23 , 38 ), and he is the Head of the church (see Col. 1:18 ).
  - type: text
    content: 'and will once again cover the land like grass that sprouts from the ground. How great will be the day when '
  - type: text
    content: the meaning of
  - type: text
    content: ' Jezreel’s name is fulfilled: '
  - type: text
    content: God sows!
  '2':
  - type: text
    content: 'This is the beginning of what '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke through Hosea.'
  - type: heading
    content: Hosea’s Marriage
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Go and marry an adulterous woman '
  - type: note
    content: Or “Go marry a woman of harlotries.” It is possible that Hosea was told to marry a temple prostitute from the fertility cult of Baal. However, some view this description as a prediction—that is, that she was not necessarily a prostitute when Hosea married her but would prove to be unfaithful to him in the future. Gomer is nowhere called by the Hebrew word zonah (“prostitute”). Commentators and translators are varied in their explanations and translations of the Hebrew.
  - type: text
    content: 'and have children of adultery '
  - type: note
    content: Or “she will have children born through unfaithfulness [adultery].” Throughout the Old Testament, prostitution is a symbol of Israel’s unfaithfulness to God and of pursuing false gods (idolatry). See Jer. 2–3 ; Ezek. 16 ; 23 .
  - type: text
    content: 'because the people of the land are adulterers. They have forsaken me.” '
  '3':
  - type: text
    content: 'So I married a woman named Gomer, '
  - type: note
    content: Gomer means “all finish with her” or “ending.”
  - type: text
    content: Diblaim’s daughter. She became pregnant and bore a son.
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Name him Jezreel '
  - type: note
    content: Jezreel means “God sows” or “may God sow.” However, Jezreel was best known as a place, the location where Jehu assassinated Israel’s King Ahab and his family (see 2 Kings 9–10 ).
  - type: text
    content: 'because it will not be long before I punish the dynasty of Jehu for the massacre at Jezreel and then destroy the kingdom of Israel. '
  '5':
  - type: text
    content: 'At that time, I will smash Israel’s military power '
  - type: note
    content: Or “bow,” a metonymy for military power.
  - type: text
    content: in the Valley of Jezreel.”
  - type: note
    content: The Valley of Jezreel runs eastward from the capital city of Jezreel near Mount Gilboa toward the Jordan River. The Valley of Jezreel was the location where invaders from the north entered the land (see Judg. 6:33 ) and a frequent site of large battles in history. The valley was flat and navigable for chariots (as opposed to the Judean highlands). Many such clashes took place here, generally initiated by the superpowers Egypt and Mesopotamia trying to extend their reach into the lands between them (such as Israel). The prophecy of this verse was fulfilled when the Assyrians invaded and defeated Israel.
  '6':
  - type: text
    content: 'Later, Gomer became pregnant again and gave birth to a daughter. '
  - type: note
    content: It is entirely possible that Hosea was not the father of this child.
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: “Name her No-Tender-Mercy '
  - type: note
    content: The Hebrew root word is racham , a word of tender love, like motherly love for a child. It has a homonym that means “womb.” Perhaps “womb-love” could be a possible translation for the word translated here as “tender mercy.”
  - type: text
    content: 'because I will no longer have tender mercy on the nation of Israel. I will certainly not forgive them. '
  '7':
  - type: text
    content: I will, however, have compassion on the nation of Judah.
  - type: text
    content: '“I will rescue them! I will not give them victory through their weapons and military might. '
  - type: note
    content: Or “through their warrior’s bow, sword, and warfare.”
  - type: text
    content: 'It will not be their horsemen and chariots that deliver them. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God, will save them!”'
  '8':
  - type: text
    content: 'After Gomer weaned her daughter, No-Tender-Mercy, she became pregnant again and gave birth to a son. '
  - type: note
    content: It is entirely possible that Hosea was not the father of this child.
  '9':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Name him Not-My-People '
  - type: note
    content: 'To paraphrase this in language that shows the emotional power of the prophet’s mandate, we could describe Hosea’s family as follows: “He is married to a harlot, has one kid named after a disaster [Jezreel] and two others called, essentially, ‘Unloved’ and ‘Unwanted’ ” (Joel Hoffman, And God Said: How Translations Conceal the Bible’s Original Meaning [New York: St. Martin’s Press, 2010], 226).'
  - type: text
    content: because you, Israel, are not mine anymore, and I am not yours.”
  - type: note
    content: Or literally “I [am] not I AM for you” (cf. Ex. 3:14 ) or “I do not exist for you.” A solemn statement indeed! This serves as a decree of divorce. God canceled the covenant relationship between himself and Israel.
  - type: heading
    content: Israel’s Restoration
