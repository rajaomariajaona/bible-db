document_id: GAL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Church Leaders Accept Paul as an Apostle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fourteen years later, I returned to Jerusalem, this time with Barnabas '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Barnabas is an Aramaic name that means “son of encouragement.”
    marker-yv: yv-n
  - type: text
    text: 'and Titus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Titus was a gentile convert to Christ and was a frequent companion of Paul’s. Later Paul wrote a beautiful letter to Titus. Titus’ name means “nurse.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: my coworkers
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' gave me a clear revelation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although we don’t know exactly what the “clear revelation” might have been, it is possible it came in the form of a dream, a vision, a prophecy, or an angel that appeared to Paul.
    marker-yv: yv-n
  - type: text
    text: to go and confer with the other apostles concerning the message of grace I was preaching to the gentiles. I spoke privately with those who were viewed as senior leaders of the church, wanting to make certain that my labor and ministry for the Messiah had not been based on a false understanding of the gospel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to make sure I was not running the race for nothing.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Even though Titus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Titus was converted through Paul’s ministry and was later sent out by Paul as an apostolic church planter. The book of Titus was written by Paul to his spiritual son to give him encouragement and revelation for his ministry.
    marker-yv: yv-n
  - type: text
    text: 'was a Syrian, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Aramean,” which is an Aramaic-speaking gentile. Syrians are Arameans, but Greeks are not. Most Greek manuscripts identify Titus as a Greek when, in fact, he was Syrian. It is believed that the Greek scribes changed Titus’ ethnicity to Greek, but the Aramaic text correctly identifies him as a Syrian.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: they accepted him as a brother
  - type: text
    text: ' without demanding that he first be circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: I met with them privately
  - type: text
    text: ' because false “brothers” had been secretly smuggled into church meetings. They were sent to spy on the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' freedom that we have in Jesus Christ. Their agenda was to bring us back into the bondage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of religion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But you must know that we did not submit to their religious shackles, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or in Aramaic “their efforts to enslave us” or “their oppression.”
    marker-yv: yv-n
  - type: text
    text: 'not even for a moment, so that we might keep the truth of the gospel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of grace
  - type: text
    text: ' unadulterated for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Even those most influential among the brothers were not able to add anything to my message. Who they are before men makes no difference to me, for God is not impressed by their reputations. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “God does not accept the face (mask) of a man.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So they recognized that I was entrusted with taking the gospel to the gentiles '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the uncircumcised.”
    marker-yv: yv-n
  - type: text
    text: 'just as Peter was entrusted with taking it to the Jews. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the circumcised.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For the same God who empowered Peter’s apostolic ministry to the Jews also flowed through me as an apostle to those who are gentiles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they all recognized this grace operating in my ministry, those who were recognized as influential pillars '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 3:12
      metadata:
        usfm: REV.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in the church—Jacob, Peter, and John—extended to Barnabas and me the warmth of Christian fellowship '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “gave me the right hand of fellowship.”
    marker-yv: yv-n
  - type: text
    text: 'and honored my calling to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: minister to
  - type: text
    text: ' the gentiles, even as they were to go to the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They simply requested one thing of me: that I would remember the poor and needy, which was the burden I was already carrying in my heart.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Confronts Peter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When Peter visited Antioch, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Antioch was a large city in Syria with a significant Jewish population. It was in Antioch that believers were first called Christians and it was the first church to send out missionaries to the nations. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 11:25–26
      metadata:
        usfm: ACT.11.25+ACT.11.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:1–3
      metadata:
        usfm: ACT.13.1+ACT.13.2+ACT.13.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: caused the believers to stumble over his behavior
  - type: text
    text: ', so I confronted him to his face. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He enjoyed eating with the gentile believers who didn’t keep the Jewish customs—up until the time Jacob’s Jewish friends arrived from Jerusalem. When he saw them, he withdrew from his gentile friends—fearing how it would look to them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fearing those of the circumcision.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: if he ate with gentile believers
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And so, because of Peter’s hypocrisy, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The incident of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Acts 10–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: happened before this account in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 2
      metadata:
        usfm: GAL.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Peter was shown by a heavenly vision that God views gentile believers as “clean.” This amplifies Peter’s hypocrisy. Even Jesus’ apostles had conflicts that needed to be worked out and healed.
    marker-yv: yv-n
  - type: text
    text: many other Jewish believers followed suit, refusing to eat with gentile believers. Even Barnabas was led astray by their hypocritical behavior!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So when I realized they were acting inconsistently with the revelation of the gospel, I confronted Peter in front of everyone:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“You were born a Jew, but you’ve chosen to disregard Jewish regulations and live like a gentile. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Aramaic translators translate this word “Syrian” or “Aramean.”
    marker-yv: yv-n
  - type: text
    text: Why then do you force gentiles to conform to these same rules?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jews and Gentiles Are Saved by Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Although we’re Jews by birth and not gentile “sinners,” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'we know that no one receives God’s perfect righteousness as a reward for keeping the law, but only by the faith of Jesus, the Messiah! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic and Greek can be translated “the faith
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, the Messiah” or “faith
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus Christ.” It is not simply our faith, but his—the faithfulness of Jesus to fulfill the Father’s pleasure in his life and the sacrifice for our sins in his death. Salvation is found in the “faith of Jesus.”
    marker-yv: yv-n
  - type: text
    text: 'His faithfulness has saved us, and we have received God’s perfect righteousness. Now we know that God accepts no one by the keeping of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: religious
  - type: text
    text: ' laws!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by the works of the law.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If we are those who desire to be righteous through our union with the Anointed One, does that mean our Messiah condones sin even though we acknowledge that we are sinners? How absurd! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For if I start over and reconstruct the old religious system that I had torn down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with the message of grace
  - type: text
    text: ', I would appear to be a lawbreaker.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I prove myself to be a sinner.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For through the law I died to the law, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 6:2
      metadata:
        usfm: ROM.6.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:4
      metadata:
        usfm: ROM.7.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: so that I might live to God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 6:10
      metadata:
        usfm: ROM.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: ROM.6.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: ROM.6.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 5:15
      metadata:
        usfm: 2CO.5.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My old identity has been co-crucified with Christ and no longer lives. And now the essence of this new life is no longer mine, for the Anointed One lives his life through me—
  - type: usfm
    marker: it
    children:
