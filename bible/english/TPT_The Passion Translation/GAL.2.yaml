document_id: GAL.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Church Leaders Accept Paul as an Apostle
  - type: text
    content: 'Fourteen years later, I returned to Jerusalem, this time with Barnabas '
  - type: note
    content: Barnabas is an Aramaic name that means “son of encouragement.”
  - type: text
    content: 'and Titus, '
  - type: note
    content: Titus was a gentile convert to Christ and was a frequent companion of Paul’s. Later Paul wrote a beautiful letter to Titus. Titus’ name means “nurse.”
  - type: text
    content: my coworkers
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'They simply requested one thing of me: that I would remember the poor and needy, which was the burden I was already carrying in my heart.'
  - type: heading
    content: Paul Confronts Peter
  '11':
  - type: text
    content: 'When Peter visited Antioch, '
  - type: note
    content: Antioch was a large city in Syria with a significant Jewish population. It was in Antioch that believers were first called Christians and it was the first church to send out missionaries to the nations. See Acts 11:25–26; 13:1–3.
  - type: text
    content: 'he '
  - type: text
    content: caused the believers to stumble over his behavior
  - type: text
    content: ', so I confronted him to his face. '
  '12':
  - type: text
    content: 'He enjoyed eating with the gentile believers who didn’t keep the Jewish customs—up until the time Jacob’s Jewish friends arrived from Jerusalem. When he saw them, he withdrew from his gentile friends—fearing how it would look to them '
  - type: note
    content: Or “fearing those of the circumcision.”
  - type: text
    content: if he ate with gentile believers
  - type: text
    content: .
  '13':
  - type: text
    content: 'And so, because of Peter’s hypocrisy, '
  - type: note
    content: The incident of Acts 10–11 happened before this account in Gal. 2. Peter was shown by a heavenly vision that God views gentile believers as “clean.” This amplifies Peter’s hypocrisy. Even Jesus’ apostles had conflicts that needed to be worked out and healed.
  - type: text
    content: many other Jewish believers followed suit, refusing to eat with gentile believers. Even Barnabas was led astray by their hypocritical behavior!
  '14':
  - type: text
    content: 'So when I realized they were acting inconsistently with the revelation of the gospel, I confronted Peter in front of everyone:'
  - type: text
    content: '“You were born a Jew, but you’ve chosen to disregard Jewish regulations and live like a gentile. '
  - type: note
    content: Some Aramaic translators translate this word “Syrian” or “Aramean.”
  - type: text
    content: Why then do you force gentiles to conform to these same rules?”
  - type: heading
    content: Jews and Gentiles Are Saved by Faith
  '15':
  - type: text
    content: 'Although we’re Jews by birth and not gentile “sinners,” '
  '16':
  - type: text
    content: 'we know that no one receives God’s perfect righteousness as a reward for keeping the law, but only by the faith of Jesus, the Messiah! '
  - type: note
    content: The Aramaic and Greek can be translated “the faith of Jesus, the Messiah” or “faith in Jesus Christ.” It is not simply our faith, but his—the faithfulness of Jesus to fulfill the Father’s pleasure in his life and the sacrifice for our sins in his death. Salvation is found in the “faith of Jesus.”
  - type: text
    content: 'His faithfulness has saved us, and we have received God’s perfect righteousness. Now we know that God accepts no one by the keeping of '
  - type: text
    content: religious
  - type: text
    content: ' laws!'
  - type: note
    content: Or “by the works of the law.”
  '17':
  - type: text
    content: 'If we are those who desire to be righteous through our union with the Anointed One, does that mean our Messiah condones sin even though we acknowledge that we are sinners? How absurd! '
  '18':
  - type: text
    content: 'For if I start over and reconstruct the old religious system that I had torn down '
  - type: text
    content: with the message of grace
  - type: text
    content: ', I would appear to be a lawbreaker.'
  - type: note
    content: Or “I prove myself to be a sinner.”
  '19':
  - type: text
    content: 'For through the law I died to the law, '
  - type: note
    content: See Rom. 6:2; 7:4.
  - type: text
    content: so that I might live to God.
  - type: note
    content: See Rom. 6:10, 11, 14; 2 Cor. 5:15.
  '2':
  - type: text
    content: God
  - type: text
    content: ' gave me a clear revelation '
  - type: note
    content: Although we don’t know exactly what the “clear revelation” might have been, it is possible it came in the form of a dream, a vision, a prophecy, or an angel that appeared to Paul.
  - type: text
    content: to go and confer with the other apostles concerning the message of grace I was preaching to the gentiles. I spoke privately with those who were viewed as senior leaders of the church, wanting to make certain that my labor and ministry for the Messiah had not been based on a false understanding of the gospel.
  - type: note
    content: Or “to make sure I was not running the race for nothing.”
  '20':
  - type: text
    content: My old identity has been co-crucified with Christ and no longer lives. And now the essence of this new life is no longer mine, for the Anointed One lives his life through me—
  - type: text
    content: we live in union as one
  - type: text
    content: '! '
  - type: note
    content: We are one with him, and he lives in us. See John 14:20.
  - type: text
    content: 'My new life is empowered by the faith of the Son of God who loves me so much that he gave himself for me, '
  - type: text
    content: dispensing his life into mine
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'So that is why I don’t view God’s grace as something peripheral. '
  - type: note
    content: Or “I do not nullify the grace of God (by adding works).”
  - type: text
    content: For if keeping the law could release God’s righteousness to us, then Christ would have died for nothing.
  '3':
  - type: text
    content: 'Even though Titus '
  - type: note
    content: Titus was converted through Paul’s ministry and was later sent out by Paul as an apostolic church planter. The book of Titus was written by Paul to his spiritual son to give him encouragement and revelation for his ministry.
  - type: text
    content: 'was a Syrian, '
  - type: note
    content: Or “Aramean,” which is an Aramaic-speaking gentile. Syrians are Arameans, but Greeks are not. Most Greek manuscripts identify Titus as a Greek when, in fact, he was Syrian. It is believed that the Greek scribes changed Titus’ ethnicity to Greek, but the Aramaic text correctly identifies him as a Syrian.
  - type: text
    content: they accepted him as a brother
  - type: text
    content: ' without demanding that he first be circumcised. '
  '4':
  - type: text
    content: I met with them privately
  - type: text
    content: ' because false “brothers” had been secretly smuggled into church meetings. They were sent to spy on the '
  - type: text
    content: wonderful
  - type: text
    content: ' freedom that we have in Jesus Christ. Their agenda was to bring us back into the bondage '
  - type: text
    content: of religion
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'But you must know that we did not submit to their religious shackles, '
  - type: note
    content: Or in Aramaic “their efforts to enslave us” or “their oppression.”
  - type: text
    content: 'not even for a moment, so that we might keep the truth of the gospel '
  - type: text
    content: of grace
  - type: text
    content: ' unadulterated for you.'
  '6':
  - type: text
    content: 'Even those most influential among the brothers were not able to add anything to my message. Who they are before men makes no difference to me, for God is not impressed by their reputations. '
  - type: note
    content: Or “God does not accept the face (mask) of a man.”
  '7':
  - type: text
    content: 'So they recognized that I was entrusted with taking the gospel to the gentiles '
  - type: note
    content: Or “the uncircumcised.”
  - type: text
    content: 'just as Peter was entrusted with taking it to the Jews. '
  - type: note
    content: Or “the circumcised.”
  '8':
  - type: text
    content: For the same God who empowered Peter’s apostolic ministry to the Jews also flowed through me as an apostle to those who are gentiles.
  '9':
  - type: text
    content: 'When they all recognized this grace operating in my ministry, those who were recognized as influential pillars '
  - type: note
    content: See Rev. 3:12.
  - type: text
    content: 'in the church—Jacob, Peter, and John—extended to Barnabas and me the warmth of Christian fellowship '
  - type: note
    content: Or “gave me the right hand of fellowship.”
  - type: text
    content: 'and honored my calling to '
  - type: text
    content: minister to
  - type: text
    content: ' the gentiles, even as they were to go to the Jews. '
