document_id: LAM.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem the Abandoned Widow
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How lonely sits the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once thronged with people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once great among the nations,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 34:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she is now lonely like a widow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once a fair princess ruling among the provinces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now a shackled servant.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The enemy has seized
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all her precious treasures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before her very eyes she witnessed foreigners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enter her holy sanctuary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: although you had forbidden them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever to enter your assembly.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Everyone is groaning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: longing for anything to eat;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they have traded their treasures '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Treasures” could be translated “darlings” and may refer to either their little children or their wealth, which they traded for food to stay alive.
      marker-yv: yv-n
    - type: text
      text: for food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in order to keep themselves alive.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Daughter of Zion’s Lament
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and consider'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how pathetic I have become!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “None who passes by
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even cares.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn around and look at me! Is there anyone who suffers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as much as I?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', in the terrible day of your fierce anger,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you punished me worst of all.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “From on high, he sent a fire deep in my bones,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 102:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 20:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it conquered me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “them,” that is, “my bones.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He trapped my feet in his snare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hurled me back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He left me stunned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in misery that had no end.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' took my sins in his hands'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tied them into a yoke.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew of the first two lines of this verse is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, he set his yoke upon my neck
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and caused my strength to fail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord let my enemies defeat me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am helpless to resist.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“The Lord has '
    - type: usfm
      marker: it
      children:
      - type: text
        text: despised
    - type: text
      text: ' and rejected'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the mighty warriors who defended me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He mobilized an army to destroy me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crush my young men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord has trampled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like grapes
    - type: text
      text: ' in a winepress'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fair daughter of Judah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “This is why I weep bitterly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as tears stream down my cheeks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truly, no one is here to comfort me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or revive my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My children no longer have a future,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the enemy has triumphed.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Zion stretches out her hands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for help
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there is no one to comfort her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s command, Jacob’s neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: became her enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all treated Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though she were a bloody rag.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a menstrual cloth. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is just to judge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have rebelled against his word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, everyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and see my sorrow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my maidens and young men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have gone into captivity.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I called to my lovers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they cheated on me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they deceived me.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My leaders and priests
  - type: usfm
    marker: q2
    children:
    - type: text
      text: died in the city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while scrounging for food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just to keep themselves alive.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to bring back their soul.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'She is weeping bitterly '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Weeping she weeps.”
      marker-yv: yv-n
    - type: text
      text: through the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with tears streaming down her cheeks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all her lovers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one can be found to comfort her.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Jewish commentators infer that the “lovers” were the prophets who could give no comforting words at that time.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her friends have all betrayed her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have now become her enemies.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', can’t you see I’m in deep trouble?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My gut is churning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my heart is burning—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how rebellious I have been!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword rules on the street;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plague rules within the houses.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “They have heard my groans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet I have no one to comfort me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my enemies have heard of my trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they are glad you have done this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to me
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You threatened me and kept your promise—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oh, that the same would happen to them!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Let all their wickedness condemn them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deal with them as you have dealt with me for all my sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My groaning seems endless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am sick at heart.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Judah’s people have gone into exile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under harsh labor and much pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They found no place to rest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: living among foreigners.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their enemies have seized them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the narrow passes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the midst of distress.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The empty roads to Zion mourn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for no one travels to her sacred feasts anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The singing maidens suffer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the priests can only groan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city gates stand empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zion
    - type: text
      text: ' can only moan.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her foes have the upper hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while her enemies are now at ease.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has made'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem suffer for her many, many sins.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s wrath is always justified. He does not display capricious rage. He is patient but must, in the end, execute judgment.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young children are taken into captivity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as captives before the oppressor.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: All the splendor has departed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the fair daughter of Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her princes are like deer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that find no pasture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weak and weary they stumble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unable to flee from those who pursue them.
