document_id: LAM.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem the Abandoned Widow
  - type: text
    content: How lonely sits the city
  - type: text
    content: once thronged with people!
  - type: text
    content: Once great among the nations,
  - type: note
    content: See Gen. 12:2; Ex. 34:24.
  - type: text
    content: she is now lonely like a widow.
  - type: text
    content: Once a fair princess ruling among the provinces,
  - type: text
    content: now a shackled servant.
  '10':
  - type: text
    content: The enemy has seized
  - type: text
    content: all her precious treasures.
  - type: text
    content: Before her very eyes she witnessed foreigners
  - type: text
    content: enter her holy sanctuary,
  - type: text
    content: although you had forbidden them
  - type: text
    content: ever to enter your assembly.
  '11':
  - type: text
    content: Everyone is groaning,
  - type: text
    content: longing for anything to eat;
  - type: text
    content: 'they have traded their treasures '
  - type: note
    content: “Treasures” could be translated “darlings” and may refer to either their little children or their wealth, which they traded for food to stay alive.
  - type: text
    content: for food
  - type: text
    content: in order to keep themselves alive.
  - type: heading
    content: The Daughter of Zion’s Lament
  - type: text
    content: '“Look, '
  - type: text
    content: Yahweh
  - type: text
    content: ', and consider'
  - type: text
    content: how pathetic I have become!
  '12':
  - type: text
    content: “None who passes by
  - type: text
    content: even cares.
  - type: note
    content: The Hebrew is uncertain.
  - type: text
    content: Turn around and look at me! Is there anyone who suffers
  - type: text
    content: as much as I?
  - type: text
    content: Yahweh
  - type: text
    content: ', in the terrible day of your fierce anger,'
  - type: text
    content: you punished me worst of all.
  '13':
  - type: text
    content: “From on high, he sent a fire deep in my bones,
  - type: note
    content: See Ps. 102:3–4; Jer. 20:9.
  - type: text
    content: and it conquered me.
  - type: note
    content: Or “them,” that is, “my bones.”
  - type: text
    content: He trapped my feet in his snare
  - type: text
    content: and hurled me back.
  - type: text
    content: He left me stunned
  - type: text
    content: in misery that had no end.
  '14':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' took my sins in his hands'
  - type: text
    content: and tied them into a yoke.
  - type: note
    content: The Hebrew of the first two lines of this verse is uncertain.
  - type: text
    content: Then, he set his yoke upon my neck
  - type: text
    content: and caused my strength to fail.
  - type: text
    content: The Lord let my enemies defeat me;
  - type: text
    content: I am helpless to resist.
  '15':
  - type: text
    content: '“The Lord has '
  - type: text
    content: despised
  - type: text
    content: ' and rejected'
  - type: text
    content: all the mighty warriors who defended me.
  - type: text
    content: He mobilized an army to destroy me
  - type: text
    content: and crush my young men.
  - type: text
    content: 'The Lord has trampled '
  - type: text
    content: like grapes
  - type: text
    content: ' in a winepress'
  - type: text
    content: the fair daughter of Judah.
  '16':
  - type: text
    content: “This is why I weep bitterly,
  - type: text
    content: as tears stream down my cheeks.
  - type: text
    content: Truly, no one is here to comfort me
  - type: text
    content: or revive my life.
  - type: text
    content: My children no longer have a future,
  - type: text
    content: for the enemy has triumphed.”
  '17':
  - type: text
    content: 'Zion stretches out her hands '
  - type: text
    content: for help
  - type: text
    content: ','
  - type: text
    content: but there is no one to comfort her.
  - type: text
    content: 'At '
  - type: text
    content: Yahweh
  - type: text
    content: ’s command, Jacob’s neighbors
  - type: text
    content: became her enemies.
  - type: text
    content: They all treated Jerusalem
  - type: text
    content: as though she were a bloody rag.
  - type: note
    content: That is, a menstrual cloth. See Lev. 12:2.
  '18':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' is just to judge,'
  - type: text
    content: for I have rebelled against his word.
  - type: text
    content: Listen, everyone,
  - type: text
    content: and see my sorrow;
  - type: text
    content: my maidens and young men
  - type: text
    content: have gone into captivity.
  '19':
  - type: text
    content: “I called to my lovers,
  - type: text
    content: but they cheated on me.
  - type: note
    content: Or “they deceived me.”
  - type: text
    content: My leaders and priests
  - type: text
    content: died in the city
  - type: text
    content: while scrounging for food
  - type: text
    content: just to keep themselves alive.
  - type: note
    content: Or “to bring back their soul.”
  '2':
  - type: text
    content: 'She is weeping bitterly '
  - type: note
    content: Or “Weeping she weeps.”
  - type: text
    content: through the night,
  - type: text
    content: with tears streaming down her cheeks.
  - type: text
    content: Among all her lovers,
  - type: text
    content: not one can be found to comfort her.
  - type: note
    content: Some Jewish commentators infer that the “lovers” were the prophets who could give no comforting words at that time.
  - type: text
    content: Her friends have all betrayed her
  - type: text
    content: and have now become her enemies.
  '20':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', can’t you see I’m in deep trouble?'
  - type: text
    content: My gut is churning
  - type: text
    content: and my heart is burning—
  - type: text
    content: how rebellious I have been!
  - type: text
    content: The sword rules on the street;
  - type: text
    content: plague rules within the houses.
  '21':
  - type: text
    content: “They have heard my groans,
  - type: text
    content: yet I have no one to comfort me.
  - type: text
    content: All my enemies have heard of my trouble;
  - type: text
    content: 'they are glad you have done this '
  - type: text
    content: to me
  - type: text
    content: .
  - type: text
    content: You threatened me and kept your promise—
  - type: text
    content: oh, that the same would happen to them!
  '22':
  - type: text
    content: “Let all their wickedness condemn them.
  - type: text
    content: Deal with them as you have dealt with me for all my sins.
  - type: text
    content: My groaning seems endless,
  - type: text
    content: and I am sick at heart.”
  '3':
  - type: text
    content: Judah’s people have gone into exile
  - type: text
    content: under harsh labor and much pain.
  - type: text
    content: They found no place to rest
  - type: text
    content: living among foreigners.
  - type: text
    content: All their enemies have seized them
  - type: text
    content: in the narrow passes.
  - type: note
    content: Or “in the midst of distress.”
  '4':
  - type: text
    content: The empty roads to Zion mourn,
  - type: text
    content: for no one travels to her sacred feasts anymore.
  - type: text
    content: The singing maidens suffer,
  - type: text
    content: and the priests can only groan.
  - type: text
    content: The city gates stand empty,
  - type: text
    content: 'and '
  - type: text
    content: Zion
  - type: text
    content: ' can only moan.'
  '5':
  - type: text
    content: Her foes have the upper hand
  - type: text
    content: while her enemies are now at ease.
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has made'
  - type: text
    content: Jerusalem suffer for her many, many sins.
  - type: note
    content: God’s wrath is always justified. He does not display capricious rage. He is patient but must, in the end, execute judgment.
  - type: text
    content: Her young children are taken into captivity
  - type: text
    content: as captives before the oppressor.
  '6':
  - type: text
    content: All the splendor has departed
  - type: text
    content: from the fair daughter of Zion.
  - type: text
    content: Her princes are like deer
  - type: text
    content: that find no pasture.
  - type: text
    content: Weak and weary they stumble,
  - type: text
    content: unable to flee from those who pursue them.
  '7':
  - type: text
    content: In her days of wandering and affliction,
  - type: text
    content: Jerusalem still remembers
  - type: text
    content: all her precious treasures
  - type: text
    content: that were hers from days gone by.
  - type: text
    content: When the enemies defeated her people,
  - type: text
    content: there was no one to help her.
  - type: text
    content: Her conquerors looked on,
  - type: text
    content: jeering and cheering at her downfall.
  '8':
  - type: text
    content: Jerusalem has committed a horrible sin
  - type: text
    content: and has become an object of scorn.
  - type: text
    content: All who once honored her now despise her,
  - type: text
    content: for they have seen her nakedness.
  - type: text
    content: Shunned
  - type: text
    content: ', she groans aloud'
  - type: text
    content: and turns to hide her face in shame.
  '9':
  - type: text
    content: Her filth stains her skirts—
  - type: text
    content: she never pictured this outcome.
  - type: note
    content: Her uncleanness is likely a metaphor for idolatry.
  - type: text
    content: Therefore, her fall is terrible
  - type: text
    content: 'with no one to comfort '
  - type: note
    content: This phrase is found four times in this chapter.
  - type: text
    content: her.
  - type: text
    content: Jerusalem groans
  - type: text
    content: ', “'
  - type: text
    content: Yahweh
  - type: text
    content: ', look how miserable I am;'
  - type: text
    content: all the while my enemy gloats!”
