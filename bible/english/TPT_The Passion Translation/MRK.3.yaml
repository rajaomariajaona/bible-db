    - type: text
      text: Massive Crowds Follow Jesus
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once again Jesus withdrew with his disciples to the lakeside, but a massive crowd of people followed him from all around the provinces of Galilee and southern Israel. '
