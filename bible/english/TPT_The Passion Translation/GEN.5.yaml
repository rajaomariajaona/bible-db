      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “Adam.” No stronger statement could be made that male and female are coequal before their Creator. There is really only one man in the Old Testament, and that is Adam. There is really only one man in the New Testament, and that is Jesus. There are really only two men who have represented the human race: the first Adam and the Last Adam, Jesus Christ. The books of Genesis and Matthew are both introduced with the record of the generations of Adam and Christ.'
