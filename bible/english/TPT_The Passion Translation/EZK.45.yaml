        marker: fr
        children:
        - type: text
          text: 45:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “twenty shekels plus twenty-five shekels plus fifteen shekels.” A mina was a little over a pound (a little over half a kilogram). The shekel, gerah, and mina were all weights used in Israel for measuring scales. These weights were usually stones of a specified weight. The shekel was about 20 gerahs in weight and roughly 0.4 ounces or 11.4 grams. A gerah was a bean, most likely from the carob tree, that amounted to one-twentieth of a shekel (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 30:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God was telling Israel that the weights they use for measurements on their scales must be accurate.
      marker-yv: yv-n
  - type: usfm
