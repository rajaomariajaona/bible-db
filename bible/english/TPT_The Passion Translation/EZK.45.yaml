        children:
        - type: text
          text: is taken from an Anglo-Saxon word meaning “making at one,” hence “at-one-ment.” It is the act of loving reconciliation between God and fallen man. Atonement presupposes a separation from God that needs to be overcome if we are to know him and have fellowship with him. Making atonement is the act by which God and man are brought together in personal relationship. See v.
      - type: usfm
