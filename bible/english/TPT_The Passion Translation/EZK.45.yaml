document_id: EZK.45,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Sacred Arrangements
  - type: text
    content: ' '
  - type: note
    content: 'Ezekiel 45–48 constitutes panel A1—the final one in the chiastic structure of the book. These chapters contain the visionary description of the division of the land and the renewal of the historical boundaries, implying renewed conquest (note especially 48:8–35, a description of the sacred city, the dwelling place of Yahweh: “Yahweh-Lives-There”). These chapters then serve as the climactic, consummate contrasting parallel with chs. 1–7 (panel A) that open the book of Ezekiel, focusing on the desecration of the land and temple (note the vision of the heavenly throne room).'
  - type: text
    content: '“When you apportion the land as an inheritance to each tribe, you must set aside a sacred portion for '
  - type: text
    content: Yahweh
  - type: text
    content: '. It is to be 25,000 cubits '
  - type: note
    content: About 8.29 miles (13.25 kilometers). Also vv. 3, 5, 6.
  - type: text
    content: 'long and 20,000 cubits '
  - type: note
    content: About 6.63 miles (10.6 kilometers), as translated from the Septuagint. The Hebrew is “ten thousand cubits wide.”
  - type: text
    content: 'wide. The entire area of this land will be sacred. '
  '10':
  - type: text
    content: You must have accurate scales and a true standard of measurement for grains (
  - type: text
    content: known as
  - type: text
    content: ' an ephah) '
  - type: note
    content: The dry measurement of an ephah is a little over half a bushel or eighteen liters.
  - type: text
    content: and for liquids (
  - type: text
    content: known as
  - type: text
    content: ' a bath). '
  - type: note
    content: The liquid measurement of a bath is slightly over five gallons or nineteen liters.
  '11':
  - type: text
    content: 'The measurement of an ephah and bath must be equal, and each will be one-tenth of a homer, '
  - type: note
    content: A homer (homer literally means “a donkey load”) is about 50 gallons or 220 liters.
  - type: text
    content: 'the bath and the ephah one-tenth of a homer. The standard for measuring will be based on the homer. '
  '12':
  - type: text
    content: A shekel is to consist of twenty gerahs. A mina is to consist of sixty shekels.”
  - type: note
    content: Or “twenty shekels plus twenty-five shekels plus fifteen shekels.” A mina was a little over a pound (a little over half a kilogram). The shekel, gerah, and mina were all weights used in Israel for measuring scales. These weights were usually stones of a specified weight. The shekel was about 20 gerahs in weight and roughly 0.4 ounces or 11.4 grams. A gerah was a bean, most likely from the carob tree, that amounted to one-twentieth of a shekel (see Ex. 30:13). God was telling Israel that the weights they use for measurements on their scales must be accurate.
  - type: heading
    content: Worship Offerings
  '13':
  - type: text
    content: '“These are the things you must bring as an offering '
  - type: text
    content: to God
  - type: text
    content: ':'
  - type: text
    content: “One-sixtieth of your wheat,
  - type: note
    content: Or “an ephah for every homer of wheat,” which is one-sixtieth of their wheat harvest.
  - type: text
    content: One-sixtieth of your barley,
  - type: note
    content: Or “and the sixth of an ephah for every homer of barley,” which is equal to one-sixtieth of their barley harvest.
  '14':
  - type: text
    content: One-hundredth of your olive oil, using the standard measurement known by all,
  - type: note
    content: Or “one bath of oil out of every ten baths or out of every kor [which is equal to ten baths or one homer, since ten baths equal one homer],” which equals one-hundredth of the olive oil.
  '15':
  - type: text
    content: Then, one sheep (or goat) is to be taken from every flock of two hundred livestock from the well-watered pastures of Israel.
  - type: text
    content: '“I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that these offerings will be for grain offerings, burnt offerings, and peace offerings, '
  - type: note
    content: Or “fellowship offerings.”
  - type: text
    content: 'to make atonement '
  - type: note
    content: The word atonement is taken from an Anglo-Saxon word meaning “making at one,” hence “at-one-ment.” It is the act of loving reconciliation between God and fallen man. Atonement presupposes a separation from God that needs to be overcome if we are to know him and have fellowship with him. Making atonement is the act by which God and man are brought together in personal relationship. See v. 17.
  - type: text
    content: for the people.
  '16':
  - type: text
    content: '“All the people of the land will be required to give these offerings to the prince of Israel. '
  '17':
  - type: text
    content: 'The prince will be responsible to provide the burnt offerings, the grain offerings, and the drink offerings for feasts, new moons, '
  - type: note
    content: See Num. 28:11–14.
  - type: text
    content: 'Sabbaths, and all the appointed feasts of the people of Israel. '
  - type: note
    content: These feasts were not secular celebrations, but the three major feasts of the Jewish calendar of Israel, which included Passover and the Feast of Unleavened Bread, the Feast of Weeks (also called Pentecost or Feast of Harvest), and the Feast of Tabernacles. These were called pilgrim festivals because every Israelite was expected to come together in Jerusalem for them. See Ex. 23:14–17; Lev. 23:5–22; 33–34; Deut. 16:16.
  - type: text
    content: The prince must provide the sacrifice for sin, the grain offering, the burnt offering, and the fellowship offerings to make atonement for the people of Israel.”
  - type: note
    content: Indeed, our Prince, the Lord Jesus, provided himself as the atoning sacrifice for sin. He is the fulfillment of all the offerings and sacrifices of the Old Testament.
  - type: heading
    content: The Feast of the Passover
  '18':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “On the first day of each new year, '
  - type: note
    content: This was not January 1 but the month of Nisan in the Jewish calendar (late March–early April).
  - type: text
    content: 'you must select a perfect young bull without blemish to sacrifice to purify the sanctuary. '
  '19':
  - type: text
    content: 'The priest must take the blood of the sin offering and smear it on the doorposts of the temple, on the four corners of the ledge of the altar, and on the posts of the gate to the inner courtyard. '
  '2':
  - type: text
    content: 'And inside this area, a square plot of land 500 cubits by 500 cubits '
  - type: note
    content: About 875 feet long by 875 feet wide (265 meters long by 265 meters wide).
  - type: text
    content: 'must be set apart for the temple compound. All around the temple compound there will be a strip of open land that is 50 cubits '
  - type: note
    content: About 87.5 feet (26.5 meters).
  - type: text
    content: 'wide on each side. '
  '20':
  - type: text
    content: 'You must do the same seven days later, on behalf of anyone who has sinned unintentionally or through ignorance. In this way you will purify '
  - type: note
    content: Or “make atonement for.”
  - type: text
    content: the temple.
  '21':
  - type: text
    content: '“Then '
  - type: text
    content: seven days later
  - type: text
    content: ', on the fourteenth day of the first month, you will observe the Passover Feast '
  - type: note
    content: Or “it will be Passover for you.” Passover was a Hebrew festival to commemorate the night Yahweh “passed over” the Hebrew homes and rescued them from their slavery in Egypt. See Ex. 12. Many years later, it was at the time of the Passover Feast that Jesus was crucified as the Passover Lamb. See Matt. 26:2; Mark 14:1; Luke 22:1–2; John 13:1; 1 Cor. 5:7–8.
  - type: text
    content: 'for seven days. During that time everyone must eat bread made without yeast. '
  '22':
  - type: text
    content: 'On the first day of the feast, the prince must offer a bull as a sacrifice for sin, for himself and all the sins of the people of the land. '
  '23':
  - type: text
    content: 'And on each of the seven days of the festival the prince will offer '
  - type: text
    content: Yahweh
  - type: text
    content: ' a burnt offering of seven young bulls and seven rams without blemish or defect. And every day he will also offer a male goat to take away the sins of the people. '
  '24':
  - type: text
    content: 'The prince must also offer one ephah of grain '
  - type: note
    content: See v. 10 and first footnote there.
  - type: text
    content: 'for each bull and each ram sacrificed. And he will also offer one hin '
  - type: note
    content: A hin is one-sixteenth of a bath (a bath is slightly over five gallons, or nineteen liters).
  - type: text
    content: of oil for each ephah.”
  - type: heading
    content: The Feast of Tabernacles
  '25':
  - type: text
    content: '“On the fifteenth day of the seventh month '
  - type: note
    content: This was late September or early October, the month of Tishri in the Jewish calendar.
  - type: text
    content: 'and on each of the seven days of the Feast '
  - type: text
    content: of Tabernacles
  - type: text
    content: ', the prince must supply the provisions for the sin offerings, burnt offerings, grain offerings, and the oil.”'
  '3':
  - type: text
    content: 'Within this sacred portion you must mark off an area that is 25,000 cubits long and 10,000 cubits '
  - type: note
    content: About 3.31 miles (5.3 kilometers). Also v. 5.
  - type: text
    content: wide. This is the area set apart for the temple, the Holy of Holies.
  '4':
  - type: text
    content: '“This dedicated part of the land will be for the priests who minister before '
  - type: text
    content: Yahweh
  - type: text
    content: ' in his sanctuary. It will be for the priests’ houses and for the holy precincts of the temple. '
  '5':
  - type: text
    content: The other half of the area
  - type: text
    content: ', a section 25,000 cubits long and 10,000 cubits wide, will be owned by the Levites who minister at the temple, with towns for them to live in. '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “as their possession, twenty chambers.”
  '6':
  - type: text
    content: 'You must assign an area 25,000 cubits long by 5,000 cubits '
  - type: note
    content: About 1.66 miles (2.65 kilometers).
  - type: text
    content: wide, adjacent to the land belonging to my sanctuary. This will belong to all the people of Israel.”
  - type: heading
    content: The Portion for the Prince
  '7':
  - type: text
    content: '“The prince '
  - type: note
    content: See Ezek. 44:3 and the first footnote there.
  - type: text
    content: 'will have land on both sides of the holy area and the city. West of the holy area and the city, his land will reach to the Mediterranean Sea. East of the holy area and the city, his land will reach to the eastern border of the country. It will correspond in length to the land given to each tribe. '
  '8':
  - type: text
    content: 'This will be the prince’s property in Israel. Then my leaders will no longer '
  - type: text
    content: bully
  - type: text
    content: ' and oppress my people. They will permit the people of Israel to '
  - type: text
    content: live peacefully
  - type: text
    content: ' and possess the rest of the country for its tribes.”'
  - type: note
    content: Or “occupy the land in line with its tribal allocations.”
  - type: heading
    content: Rules for the Rulers
  '9':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: “You have overstepped your bounds, you leaders of Israel! Stop your violence and oppression and start practicing justice and righteousness. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you: Do what is right and just, and stop forcing people from their homes '
  - type: text
    content: so that you can take their property
  - type: text
    content: '. '
