document_id: PSA.139,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: You Know All About Me
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lord, you know everything there is to know about me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Wherever I go, your hand will guide me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your strength will empower me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: It’s impossible to disappear from you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or to ask the darkness to hide me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your presence is everywhere, bringing light into my night.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There is no such thing as darkness with you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The night, to you, is as bright as the day;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there’s no difference between the two.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You formed my innermost being, shaping my delicate inside
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my intricate outside,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wove them all together in my mother’s womb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “knit” or “wove” can also be translated “covered” or “defended.” God places an eternal spirit inside the conceived child within the womb of a mother and covers that life, sends the child a guardian angel, and watches over him or her.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I thank you, God, for making me so mysteriously complex!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you do is marvelously breathtaking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It simply amazes me to think about it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How thoroughly you know me, Lord!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You even formed every bone in my body
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you created me in the secret place;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text is literally “the depths of the earth.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'carefully, skillfully you shaped me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “embroidered me.”
      marker-yv: yv-n
    - type: text
      text: from nothing to something.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: You saw who you created me to be before I became me!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew could be translated “as an embryo.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Before I’d ever seen the light of day
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the number of days you planned for me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: were already recorded in your book.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 69:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: Every single moment you are thinking of me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How precious and wonderful to consider
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you cherish me constantly in your every thought!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, your desires toward me are more
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than the grains of sand on every shore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I awake each morning, you’re still with me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: O God, come and slay these bloodthirsty, murderous men!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I cry out, “Depart from me, you wicked ones!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You perceive every movement of my heart and soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you understand my every thought before it even enters my mind.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: See how they blaspheme your sacred name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and lift up themselves against you, but all in vain!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Lord, can’t you see how I despise those who despise you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I grieve when I see them rise up against you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I have nothing but complete hatred and disgust for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your enemies shall be my enemies!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: God, I invite your searching gaze into my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Examine me through and through;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: find out everything that may be hidden within me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put me to the test and sift through all my anxious cares.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: See if there is any path of pain I’m walking on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and lead me back to your glorious, everlasting way—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the path that brings me back to you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: You are so intimately aware of me, Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You read my heart like an open book
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you know all the words I’m about to speak
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before I even start a sentence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know every step I will take before my journey even begins.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You’ve gone into my future to prepare the way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and in kindness you follow behind me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to spare me from the harm of my past.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You hem me in [lit. “besiege me”] before and behind.” The implication is that God protects the psalmist from what may come in the future and what has happened in the past.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have laid your hand on me!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: This is just too wonderful, deep, and incomprehensible!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your understanding of me brings me wonder and strength.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew reads “too high to understand.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Where could I go from your Spirit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where could I run and hide from your face?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If I go up to heaven, you’re there!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I go down to the realm of the dead, you’re there too!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If I fly with wings into the shining dawn, you’re there!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If I fly into the radiant sunset, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 139:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the Hebrew, which reads “the remote parts of the sea” or “beyond the horizon to the west.” The sea is west of Israel.
      marker-yv: yv-n
    - type: text
      text: you’re there waiting!
