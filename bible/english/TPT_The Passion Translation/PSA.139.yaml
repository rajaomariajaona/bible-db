document_id: PSA.139,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: You Know All About Me
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s poetic song
  - type: text
    content: Lord, you know everything there is to know about me.
  '10':
  - type: text
    content: Wherever I go, your hand will guide me;
  - type: text
    content: your strength will empower me.
  '11':
  - type: text
    content: It’s impossible to disappear from you
  - type: text
    content: or to ask the darkness to hide me,
  - type: text
    content: for your presence is everywhere, bringing light into my night.
  '12':
  - type: text
    content: There is no such thing as darkness with you.
  - type: text
    content: The night, to you, is as bright as the day;
  - type: text
    content: there’s no difference between the two.
  '13':
  - type: text
    content: You formed my innermost being, shaping my delicate inside
  - type: text
    content: and my intricate outside,
  - type: text
    content: and wove them all together in my mother’s womb.
  - type: note
    content: The Hebrew word for “knit” or “wove” can also be translated “covered” or “defended.” God places an eternal spirit inside the conceived child within the womb of a mother and covers that life, sends the child a guardian angel, and watches over him or her.
  '14':
  - type: text
    content: I thank you, God, for making me so mysteriously complex!
  - type: text
    content: Everything you do is marvelously breathtaking.
  - type: text
    content: It simply amazes me to think about it!
  - type: text
    content: How thoroughly you know me, Lord!
  '15':
  - type: text
    content: You even formed every bone in my body
  - type: text
    content: when you created me in the secret place;
  - type: note
    content: The Hebrew text is literally “the depths of the earth.”
  - type: text
    content: 'carefully, skillfully you shaped me '
  - type: note
    content: Or “embroidered me.”
  - type: text
    content: from nothing to something.
  '16':
  - type: text
    content: You saw who you created me to be before I became me!
  - type: note
    content: The Hebrew could be translated “as an embryo.”
  - type: text
    content: Before I’d ever seen the light of day
  - type: text
    content: ','
  - type: text
    content: the number of days you planned for me
  - type: text
    content: were already recorded in your book.
  - type: note
    content: See Ps. 69:28.
  '17':
  - type: text
    content: Every single moment you are thinking of me!
  - type: text
    content: How precious and wonderful to consider
  - type: text
    content: that you cherish me constantly in your every thought!
  - type: text
    content: O God, your desires toward me are more
  - type: text
    content: than the grains of sand on every shore!
  - type: text
    content: When I awake each morning, you’re still with me.
  '19':
  - type: text
    content: O God, come and slay these bloodthirsty, murderous men!
  - type: text
    content: For I cry out, “Depart from me, you wicked ones!”
  '2':
  - type: text
    content: You perceive every movement of my heart and soul,
  - type: text
    content: and you understand my every thought before it even enters my mind.
  '20':
  - type: text
    content: See how they blaspheme your sacred name
  - type: text
    content: and lift up themselves against you, but all in vain!
  '21':
  - type: text
    content: Lord, can’t you see how I despise those who despise you?
  - type: text
    content: For I grieve when I see them rise up against you.
  '22':
  - type: text
    content: I have nothing but complete hatred and disgust for them.
  - type: text
    content: Your enemies shall be my enemies!
  '23':
  - type: text
    content: God, I invite your searching gaze into my heart.
  - type: text
    content: Examine me through and through;
  - type: text
    content: find out everything that may be hidden within me.
  - type: text
    content: Put me to the test and sift through all my anxious cares.
  '24':
  - type: text
    content: See if there is any path of pain I’m walking on,
  - type: text
    content: and lead me back to your glorious, everlasting way—
  - type: text
    content: the path that brings me back to you.
  '3':
  - type: text
    content: You are so intimately aware of me, Lord.
  - type: text
    content: You read my heart like an open book
  - type: text
    content: and you know all the words I’m about to speak
  - type: text
    content: before I even start a sentence!
  - type: text
    content: You know every step I will take before my journey even begins.
  '5':
  - type: text
    content: You’ve gone into my future to prepare the way,
  - type: text
    content: and in kindness you follow behind me
  - type: text
    content: to spare me from the harm of my past.
  - type: note
    content: Or “You hem me in [lit. “besiege me”] before and behind.” The implication is that God protects the psalmist from what may come in the future and what has happened in the past.
  - type: text
    content: You have laid your hand on me!
  '6':
  - type: text
    content: This is just too wonderful, deep, and incomprehensible!
  - type: text
    content: Your understanding of me brings me wonder and strength.
  - type: note
    content: As translated from the Septuagint. The Hebrew reads “too high to understand.”
  '7':
  - type: text
    content: Where could I go from your Spirit?
  - type: text
    content: Where could I run and hide from your face?
  '8':
  - type: text
    content: If I go up to heaven, you’re there!
  - type: text
    content: If I go down to the realm of the dead, you’re there too!
  '9':
  - type: text
    content: If I fly with wings into the shining dawn, you’re there!
  - type: text
    content: 'If I fly into the radiant sunset, '
  - type: note
    content: Implied in the Hebrew, which reads “the remote parts of the sea” or “beyond the horizon to the west.” The sea is west of Israel.
  - type: text
    content: you’re there waiting!
