document_id: EZK.2,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel Is Called to Be a Prophet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'He said to me, “Son of man, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The phrase “son of man [Adam]” is used ninety-two times in the book of Ezekiel to describe the prophet. In the Gospels, Jesus is called the Son of Man over eighty times. (Note that Jesus is never called the “son of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: man” but
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Son of Man.) This term is also found once in Daniel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) but is not used of any other prophet. As a Messianic title, it reveals our great High Priest, Jesus Christ, as the one who identified with humanity. Jesus became partaker of human nature so that believers could become partakers of the divine nature (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 2:14–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). In taking the title “the Son of Man” upon himself, Jesus said that Ezekiel was a type of Christ.
      marker-yv: yv-n
    - type: text
      text: rise to your feet; I want to talk to you.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He unrolled it in front of me with writing on both sides. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Covered with writing on both sides would mean that there was no room for any sermons from Ezekiel, only the words of God.
      marker-yv: yv-n
    - type: text
      text: On it was written “Lament, Mourning, and Cries of Doom.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On the scroll were listed all the judgments God was about to pour out on the rebellious people of Israel.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The moment I heard these words, the Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “the Spirit of prophecy.”
      marker-yv: yv-n
    - type: text
      text: 'flowed into me and set me upright on my feet. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I heard him speaking to me, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he was addressing himself to me.” The reflexive mood of the Hebrew verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: midabber
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: conveys the idea of intimate relationship. The voice from the throne upon the chariot speaks to the prophet.
      marker-yv: yv-n
    - type: text
      text: 'saying, “Son of man, I am sending you to the rebellious sons of Israel who have refused allegiance to me. They and their ancestors have been in revolt against me up to the present day. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I am sending you to a stubborn and hard-hearted people. Tell them, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this.’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God is saying to Ezekiel that every time Ezekiel speaks to the people, he will be speaking on God’s behalf.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And whether they listen or not, this tribe of defiant rebels will know that a true prophet is among them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And you, son of man, do not be afraid of them or of anything they say, even though '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you may feel
    - type: text
      text: ' like you are stepping on thorns and sitting on scorpions. Do not be afraid of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: angry
    - type: text
      text: ' words or intimidated by their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glaring
    - type: text
      text: ' stares, for they are rebellion personified! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You are to speak my words to them whether they listen to you or rebelliously refuse. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But you, son of man, listen to what I am saying to you: do not be like them, for they are a tribe of rebels. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a house of rebels,” also in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Now, open your mouth and eat what I am about to give you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Vision of the Scroll
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Just then, I saw a hand holding a scroll reaching out to me. '
