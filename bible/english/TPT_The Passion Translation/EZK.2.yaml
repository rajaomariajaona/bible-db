document_id: EZK.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel Is Called to Be a Prophet
  - type: text
    content: 'He said to me, “Son of man, '
  - type: note
    content: The phrase “son of man [Adam]” is used ninety-two times in the book of Ezekiel to describe the prophet. In the Gospels, Jesus is called the Son of Man over eighty times. (Note that Jesus is never called the “son of a man” but the Son of Man.) This term is also found once in Daniel (8:17) but is not used of any other prophet. As a Messianic title, it reveals our great High Priest, Jesus Christ, as the one who identified with humanity. Jesus became partaker of human nature so that believers could become partakers of the divine nature (see Heb. 2:14–18; 2 Peter 1:4). In taking the title “the Son of Man” upon himself, Jesus said that Ezekiel was a type of Christ.
  - type: text
    content: rise to your feet; I want to talk to you.”
  '10':
  - type: text
    content: 'He unrolled it in front of me with writing on both sides. '
  - type: note
    content: See Rev. 5:1. Covered with writing on both sides would mean that there was no room for any sermons from Ezekiel, only the words of God.
  - type: text
    content: On it was written “Lament, Mourning, and Cries of Doom.”
  - type: note
    content: On the scroll were listed all the judgments God was about to pour out on the rebellious people of Israel.
  '2':
  - type: text
    content: 'The moment I heard these words, the Spirit '
  - type: note
    content: That is, “the Spirit of prophecy.”
  - type: text
    content: 'flowed into me and set me upright on my feet. '
  '3':
  - type: text
    content: 'And I heard him speaking to me, '
  - type: note
    content: Or “he was addressing himself to me.” The reflexive mood of the Hebrew verb midabber conveys the idea of intimate relationship. The voice from the throne upon the chariot speaks to the prophet.
  - type: text
    content: 'saying, “Son of man, I am sending you to the rebellious sons of Israel who have refused allegiance to me. They and their ancestors have been in revolt against me up to the present day. '
  '4':
  - type: text
    content: 'I am sending you to a stubborn and hard-hearted people. Tell them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this.’ '
  - type: note
    content: God is saying to Ezekiel that every time Ezekiel speaks to the people, he will be speaking on God’s behalf.
  '5':
  - type: text
    content: 'And whether they listen or not, this tribe of defiant rebels will know that a true prophet is among them. '
  '6':
  - type: text
    content: 'And you, son of man, do not be afraid of them or of anything they say, even though '
  - type: text
    content: you may feel
  - type: text
    content: ' like you are stepping on thorns and sitting on scorpions. Do not be afraid of their '
  - type: text
    content: angry
  - type: text
    content: ' words or intimidated by their '
  - type: text
    content: glaring
  - type: text
    content: ' stares, for they are rebellion personified! '
  '7':
  - type: text
    content: 'You are to speak my words to them whether they listen to you or rebelliously refuse. '
  '8':
  - type: text
    content: 'But you, son of man, listen to what I am saying to you: do not be like them, for they are a tribe of rebels. '
  - type: note
    content: Or “a house of rebels,” also in 3:9.
  - type: text
    content: Now, open your mouth and eat what I am about to give you.”
  - type: heading
    content: The Vision of the Scroll
  '9':
  - type: text
    content: 'Just then, I saw a hand holding a scroll reaching out to me. '
