document_id: JDG.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Civil War
  - type: text
    content: 'The Israelites were united as one man from Dan in the north to Beersheba '
  - type: note
    content: “From Dan . . . to Beersheba” is a merism, meaning every Israelite, for Dan was the northernmost city in Israel and Beersheba was in the far south.
  - type: text
    content: 'in the south, including those living in Gilead on the other side of the Jordan. Everyone assembled together before '
  - type: text
    content: Yahweh
  - type: text
    content: ' at Mizpah. '
  '10':
  - type: text
    content: 'And we’ll take a tenth '
  - type: note
    content: Or “ten men of a hundred throughout all the tribes of Israel, and a hundred of a thousand, and a thousand of ten thousand.”
  - type: text
    content: 'of the men of our tribes of Israel to carry supplies for our forces. When our army arrives at Gibeah in the territory of Benjamin, we’ll give them what they deserve for the outrageous, disgraceful act they committed in Israel.” '
  '11':
  - type: text
    content: So all the men of Israel united as one man to come against Gibeah.
  - type: note
    content: It is striking that the tribes refused to come together to help one another throughout most of the book of Judges until this clear moment of uniting to destroy one of their own tribes.
  '12':
  - type: text
    content: 'The Israelite tribes sent couriers throughout the tribe of Benjamin, saying, “What is this brutal crime that you have done? '
  '13':
  - type: text
    content: 'We demand that you surrender the depraved perverts from Gibeah '
  - type: text
    content: who took part in this evil act
  - type: text
    content: . We’ll put them to death and purge the evil out of Israel.”
  - type: text
    content: 'But the Benjamites refused to yield to the demands of their brothers the Israelites. '
  '14':
  - type: text
    content: 'Instead, the Benjamites gathered warriors from all their towns to come to Gibeah and fight '
  - type: text
    content: their brothers
  - type: text
    content: ', the Israelites. '
  '15':
  - type: text
    content: 'On that day, the Benjamites gathered a force from their towns of twenty-six thousand armed men, not including the seven hundred elite soldiers of Gibeah. '
  '16':
  - type: text
    content: 'Among Benjamin’s elite troops, seven hundred were left-handed, and each of them could sling a rock and hit a target within a hairbreadth without missing. '
  '17':
  - type: text
    content: The tribes of Israel had four hundred thousand experienced soldiers armed with swords, not counting Benjamin’s warriors.
  - type: heading
    content: The Israelites Inquire of God at Bethel
  '18':
  - type: text
    content: Before the battle
  - type: text
    content: ', the armies of Israel went to the house of God '
  - type: note
    content: Or “to Bethel.”
  - type: text
    content: to seek counsel from God. The Israelites inquired, “Which tribe gets to go first to battle the Benjamites?”
  - type: text
    content: Yahweh
  - type: text
    content: ' answered, “Judah will go first.”'
  '19':
  - type: text
    content: 'The Israelites got up the next morning and encamped near Gibeah. '
  '2':
  - type: text
    content: 'All the leaders '
  - type: note
    content: The Hebrew reads “All the corners.” This is a figure of speech for the tribal leaders.
  - type: text
    content: 'of all the people from the tribes of Israel presented themselves in the assembly of God’s people, four hundred thousand fighting men armed with swords. '
  '20':
  - type: text
    content: 'The men of Israel took up battle positions against the Benjamites at Gibeah, '
  '21':
  - type: text
    content: but the Benjamites rushed out of the city, and slaughtered twenty-two thousand Israelites.
  '22':
  - type: text
    content: 'The men of Israel encouraged one another and resumed their battle positions where they had lined up the first day. '
  '23':
  - type: text
    content: 'The Israelites wept before '
  - type: text
    content: Yahweh
  - type: text
    content: ' until evening, and they inquired of '
  - type: text
    content: Yahweh
  - type: text
    content: ', “Should we go out again to battle with our brothers the Benjamites?” And '
  - type: text
    content: Yahweh
  - type: text
    content: ' answered, “Yes, go back into the battle!”'
  '24':
  - type: text
    content: 'The next day, the Israelites advanced toward the Benjamites. '
  '25':
  - type: text
    content: When Benjamin marched out from Gibeah to engage them, they struck down another eighteen thousand Israelite swordsmen.
  '26':
  - type: text
    content: 'After losing again, the entire Israelite army went up to the house of God, '
  - type: note
    content: The Latin Vulgate reads “the house of God at Shiloh.” The Hebrew is Bethel, which means “the house of God.”
  - type: text
    content: 'and they sat there fasting and weeping before '
  - type: text
    content: Yahweh
  - type: text
    content: ' all day until evening and presented burnt offerings and peace offerings before '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'The Israelites inquired of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: at Shiloh
  - type: text
    content: ', for the ark of God’s covenant '
  - type: note
    content: This is the only mention of the ark in the book of Judges.
  - type: text
    content: 'was there in those days. '
  '28':
  - type: text
    content: 'Phineas son of Eleazer, son of Aaron, ministered there before '
  - type: text
    content: the ark
  - type: text
    content: '. '
  - type: note
    content: Or “it.”
  - type: text
    content: 'He inquired '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', saying, “Should we resume our battle with our brothers, the Benjamites? Or should we quit?”'
  - type: text
    content: Yahweh
  - type: text
    content: ' answered, “Attack! For tomorrow I will give you the victory!”'
  - type: heading
    content: Victory
  '29':
  - type: text
    content: 'So Israel set ambushes all around Gibeah. '
  '3':
  - type: text
    content: The Benjamites heard that the Israelites had assembled at Mizpah. The Israelites said to them, “Tell us, how did this evil rape and murder happen?”
  '30':
  - type: text
    content: 'On the third day, one company of Israelites advanced against the Benjamites, deploying against Gibeah as they had before. '
  '31':
  - type: text
    content: This tactic drew the Benjamites out of the city to attack the advancing Israelite army, leaving the city unguarded. They began to inflict casualties on the Israelites as before. There they killed about thirty men of Israel.
  '32':
  - type: text
    content: The Benjamites boasted, “We are defeating them just as we did before!”
  - type: text
    content: 'But '
  - type: text
    content: when the Benjamites had taken the bait
  - type: text
    content: ', the Israelites said, “Retreat, and draw them away from the city to the main roads.” '
  '33':
  - type: text
    content: 'Every Israelite rose from his position and took their assumed positions at Baal-Tamar. Then the Israelites who were hiding in ambush jumped up from their positions west of Gibeah. '
  - type: note
    content: As translated from the Septuagint. The Hebrew is Maareh-Geba.
  '34':
  - type: text
    content: Ten thousand elite soldiers from all over Israel made their direct assault on Gibeah.
  - type: text
    content: 'The fighting was fierce. And the Benjamites had no clue that disaster was at their doorstep. '
  '35':
  - type: text
    content: 'On that day, '
  - type: text
    content: Yahweh
  - type: text
    content: ' struck down the Benjamites before Israel. The Israelites slaughtered 25,100 swordsmen of Benjamin. '
  '36':
  - type: text
    content: Then the Benjamites realized that they were defeated. The Israelites had moved back because they were depending on the surprise attack they had set up near Gibeah.
  '37':
  - type: text
    content: 'The men of Israel who had been waiting in ambush made a mad dash for Gibeah, attacked the city, and killed its inhabitants. '
  '38':
  - type: text
    content: 'The Israelites’ strategy was to send up a smoke signal from the city once they had sacked it, '
  '39':
  - type: text
    content: and when the men of Israel saw the smoke signal, they would turn and rejoin the battle.
  - type: text
    content: When the Benjamites had inflicted about thirty casualties on the men of Israel, they said, “Look, we are defeating them as we did in the first battle!”
  '4':
  - type: text
    content: 'The Levite, whose mistress had been murdered, replied, “My mistress and I stopped in Gibeah in '
  - type: text
    content: the territory of
  - type: text
    content: ' Benjamin to spend the night. '
  '40':
  - type: text
    content: But when the smoke signal began to go up from the city, the Benjamites looked behind them and saw the whole city going up in smoke!
  '41':
  - type: text
    content: 'When the men of Israel turned back, the men of Benjamin saw that disaster had come upon them, and they panicked. '
  '42':
  - type: text
    content: 'So they fled toward the wilderness, retreating from the Israelites, but the Israelites overtook them and killed them there. '
  '43':
  - type: text
    content: Surrounding the Benjamites, the Israelites chased them and easily overran them in the area east of Gibeah.
  - type: heading
    content: Survivors
  '44':
  - type: text
    content: 'Eighteen thousand Benjamites died, all of them valiant fighters. '
  '45':
  - type: text
    content: 'As they turned and fled in the wilderness to Rimmon Rock, the Israelites picked off another five thousand Benjamites on the main roads. They chased them as far as Gidom, killing two thousand more there. '
  '46':
  - type: text
    content: 'That day, a total of twenty-five thousand sword-bearing Benjamites fell, all of them valiant fighters. '
  '47':
  - type: text
    content: 'But six hundred men who had fled to the wilderness camped at Rimmon Rock and remained there for four months. '
  '48':
  - type: text
    content: The men of Israel went back to the Benjamites and slaughtered every living thing in every town—men and beasts and all that were found, and they burned down every town they came across.
  '5':
  - type: text
    content: 'That night, the '
  - type: text
    content: depraved
  - type: text
    content: ' men of Gibeah came after me to harm me, gathering around the house in the night where I was staying. They intended to kill me, but instead, they raped my mistress, and she died. '
  '6':
  - type: text
    content: 'This deliberate, outrageous act of depravity was committed in Israel! Therefore, I took her body and cut it in pieces and sent the pieces throughout every part of Israel. '
  '7':
  - type: text
    content: Now you Israelites must decide on a response! Let’s do something about it here and now!”
  - type: heading
    content: Attempt at Extradition
  '8':
  - type: text
    content: 'Then all the people stood in unison and declared, “None of us will go back to our cities or return to our homes. '
  '9':
  - type: text
    content: 'This is what we’re going to do to Gibeah: We’ll cast lots to '
  - type: text
    content: choose who will
  - type: text
    content: ' fight against it. '
