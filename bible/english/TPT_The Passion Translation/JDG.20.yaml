document_id: JDG.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Civil War
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The Israelites were united as one man from Dan in the north to Beersheba '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “From Dan . . . to Beersheba” is a merism, meaning every Israelite, for Dan was the northernmost city in Israel and Beersheba was in the far south.
      marker-yv: yv-n
    - type: text
      text: 'in the south, including those living in Gilead on the other side of the Jordan. Everyone assembled together before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' at Mizpah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And we’ll take a tenth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ten men of a hundred throughout all the tribes of Israel, and a hundred of a thousand, and a thousand of ten thousand.”
      marker-yv: yv-n
    - type: text
      text: 'of the men of our tribes of Israel to carry supplies for our forces. When our army arrives at Gibeah in the territory of Benjamin, we’ll give them what they deserve for the outrageous, disgraceful act they committed in Israel.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So all the men of Israel united as one man to come against Gibeah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is striking that the tribes refused to come together to help one another throughout most of the book of Judges until this clear moment of uniting to destroy one of their own tribes.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The Israelite tribes sent couriers throughout the tribe of Benjamin, saying, “What is this brutal crime that you have done? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'We demand that you surrender the depraved perverts from Gibeah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who took part in this evil act
    - type: text
      text: . We’ll put them to death and purge the evil out of Israel.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Benjamites refused to yield to the demands of their brothers the Israelites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Instead, the Benjamites gathered warriors from all their towns to come to Gibeah and fight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their brothers
    - type: text
      text: ', the Israelites. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On that day, the Benjamites gathered a force from their towns of twenty-six thousand armed men, not including the seven hundred elite soldiers of Gibeah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Among Benjamin’s elite troops, seven hundred were left-handed, and each of them could sling a rock and hit a target within a hairbreadth without missing. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The tribes of Israel had four hundred thousand experienced soldiers armed with swords, not counting Benjamin’s warriors.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Israelites Inquire of God at Bethel
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Before the battle
    - type: text
      text: ', the armies of Israel went to the house of God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to Bethel.”
      marker-yv: yv-n
    - type: text
      text: to seek counsel from God. The Israelites inquired, “Which tribe gets to go first to battle the Benjamites?”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' answered, “Judah will go first.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The Israelites got up the next morning and encamped near Gibeah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'All the leaders '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew reads “All the corners.” This is a figure of speech for the tribal leaders.
      marker-yv: yv-n
    - type: text
      text: 'of all the people from the tribes of Israel presented themselves in the assembly of God’s people, four hundred thousand fighting men armed with swords. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The men of Israel took up battle positions against the Benjamites at Gibeah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: but the Benjamites rushed out of the city, and slaughtered twenty-two thousand Israelites.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The men of Israel encouraged one another and resumed their battle positions where they had lined up the first day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The Israelites wept before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' until evening, and they inquired of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', “Should we go out again to battle with our brothers the Benjamites?” And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' answered, “Yes, go back into the battle!”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The next day, the Israelites advanced toward the Benjamites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When Benjamin marched out from Gibeah to engage them, they struck down another eighteen thousand Israelite swordsmen.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'After losing again, the entire Israelite army went up to the house of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Latin Vulgate reads “the house of God at Shiloh.” The Hebrew is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bethel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “the house of God.”'
      marker-yv: yv-n
    - type: text
      text: 'and they sat there fasting and weeping before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' all day until evening and presented burnt offerings and peace offerings before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The Israelites inquired of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at Shiloh
    - type: text
      text: ', for the ark of God’s covenant '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the only mention of the ark in the book of Judges.
      marker-yv: yv-n
    - type: text
      text: 'was there in those days. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Phineas son of Eleazer, son of Aaron, ministered there before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the ark
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “it.”
      marker-yv: yv-n
    - type: text
      text: 'He inquired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ', saying, “Should we resume our battle with our brothers, the Benjamites? Or should we quit?”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' answered, “Attack! For tomorrow I will give you the victory!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victory
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So Israel set ambushes all around Gibeah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The Benjamites heard that the Israelites had assembled at Mizpah. The Israelites said to them, “Tell us, how did this evil rape and murder happen?”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'On the third day, one company of Israelites advanced against the Benjamites, deploying against Gibeah as they had before. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: This tactic drew the Benjamites out of the city to attack the advancing Israelite army, leaving the city unguarded. They began to inflict casualties on the Israelites as before. There they killed about thirty men of Israel.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The Benjamites boasted, “We are defeating them just as we did before!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when the Benjamites had taken the bait
    - type: text
      text: ', the Israelites said, “Retreat, and draw them away from the city to the main roads.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Every Israelite rose from his position and took their assumed positions at Baal-Tamar. Then the Israelites who were hiding in ambush jumped up from their positions west of Gibeah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Maareh-Geba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ten thousand elite soldiers from all over Israel made their direct assault on Gibeah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fighting was fierce. And the Benjamites had no clue that disaster was at their doorstep. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'On that day, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' struck down the Benjamites before Israel. The Israelites slaughtered 25,100 swordsmen of Benjamin. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Then the Benjamites realized that they were defeated. The Israelites had moved back because they were depending on the surprise attack they had set up near Gibeah.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'The men of Israel who had been waiting in ambush made a mad dash for Gibeah, attacked the city, and killed its inhabitants. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The Israelites’ strategy was to send up a smoke signal from the city once they had sacked it, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: and when the men of Israel saw the smoke signal, they would turn and rejoin the battle.
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Benjamites had inflicted about thirty casualties on the men of Israel, they said, “Look, we are defeating them as we did in the first battle!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The Levite, whose mistress had been murdered, replied, “My mistress and I stopped in Gibeah in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the territory of
    - type: text
      text: ' Benjamin to spend the night. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: But when the smoke signal began to go up from the city, the Benjamites looked behind them and saw the whole city going up in smoke!
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'When the men of Israel turned back, the men of Benjamin saw that disaster had come upon them, and they panicked. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'So they fled toward the wilderness, retreating from the Israelites, but the Israelites overtook them and killed them there. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Surrounding the Benjamites, the Israelites chased them and easily overran them in the area east of Gibeah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Survivors
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Eighteen thousand Benjamites died, all of them valiant fighters. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'As they turned and fled in the wilderness to Rimmon Rock, the Israelites picked off another five thousand Benjamites on the main roads. They chased them as far as Gidom, killing two thousand more there. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'That day, a total of twenty-five thousand sword-bearing Benjamites fell, all of them valiant fighters. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'But six hundred men who had fled to the wilderness camped at Rimmon Rock and remained there for four months. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: The men of Israel went back to the Benjamites and slaughtered every living thing in every town—men and beasts and all that were found, and they burned down every town they came across.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'That night, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: depraved
    - type: text
      text: ' men of Gibeah came after me to harm me, gathering around the house in the night where I was staying. They intended to kill me, but instead, they raped my mistress, and she died. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This deliberate, outrageous act of depravity was committed in Israel! Therefore, I took her body and cut it in pieces and sent the pieces throughout every part of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now you Israelites must decide on a response! Let’s do something about it here and now!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attempt at Extradition
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then all the people stood in unison and declared, “None of us will go back to our cities or return to our homes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This is what we’re going to do to Gibeah: We’ll cast lots to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: choose who will
    - type: text
      text: ' fight against it. '
