  '1':
  - type: heading
    content: God’s Tender Love for Zion
  - type: text
    content: '“Rejoice '
  - type: note
    content: 'This verse begins with only two words in Hebrew: “barren” and “rejoice.” These are two ends of the emotional spectrum. Nothing brings sorrow like being barren. Yet God promises that even in our greatest sorrow there can be a song of joy.'
  - type: text
    content: with singing
  - type: text
    content: ', you barren one!'
  - type: text
    content: You who have never given birth,
  - type: text
    content: burst into a song of joy and shout,
  - type: text
    content: you who have never been in labor!
  - type: text
    content: For the deserted wife will have more children
  - type: text
    content: 'than the married one,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: note
    content: This verse can be viewed as the remedy for spiritual barrenness—the song of triumph and the shout of joy! Spiritual barrenness is broken by the power of worship. Where God’s people are held back in worship, spiritual barrenness soon follows. Our worship has the power to bring new birth (salvation) into our congregations. Worship is a mighty force to influence the lost and bring new birth. See Gal. 4:27.
  '10':
  - type: text
    content: Even if the mountains were to crumble
  - type: text
    content: and the hills disappear,
  - type: text
    content: my heart of steadfast, faithful love
  - type: text
    content: will never leave you,
  - type: text
    content: 'and my covenant of peace '
  - type: note
    content: This is the covenant of shalom that God has made with us, his people. God’s covenant promise is that his shalom (“peace,” “prosperity,” “success,” “wholeness,” and “well-being”) will be our portion all our days on earth. See Eph. 2:14.
  - type: text
    content: with you will never be shaken,”
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'whose love and compassion '
  - type: note
    content: The Hebrew word for “compassion” (racham) means “to love deeply, like a mother’s love.” Racham is a homonym for “womb,” with an implication that God’s love is like the love of a mother carrying a child in her womb.
  - type: text
    content: will never give up on you
  - type: text
    content: .
  - type: heading
    content: God Will Restore
  '11':
  - type: text
    content: “You unhappy one, storm-tossed and troubled,
  - type: note
    content: See Eph. 4:14.
  - type: text
    content: I am ready to rebuild you with precious stones
  - type: note
    content: Or “I am about to set your stones in antimony.”
  - type: text
    content: 'and your '
  - type: text
    content: intimacy with me
  - type: text
    content: ' will be built on a foundation of sapphires.'
  - type: note
    content: The sapphire stone was the second stone of the high priest’s breastplate and had engraved upon it the name Simeon (“he who hears”). Foundation stones cannot be seen, yet they support all that is built upon them. Our foundation is sapphire, the heavenly pavement.
  '12':
  - type: text
    content: I will make your towers of rubies,
  - type: text
    content: your gates of sparkling jewels,
  - type: note
    content: Or “beryl.”
  - type: text
    content: 'and all your walls '
  - type: note
    content: Or “border.”
  - type: text
    content: of precious, delightful stones.
  '13':
  - type: text
    content: 'All your children will be taught by '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: See John 6:45.
  - type: text
    content: and great will be their peace and prosperity.
  '14':
  - type: text
    content: You will be established in righteousness.
  - type: text
    content: Oppression—be far from you!
  - type: note
    content: See Acts 10:38.
  - type: text
    content: Fear—be far from you!
  - type: note
    content: See 2 Tim. 1:7.
  - type: text
    content: Yes, terror will not come near you, nor will you be afraid.
  '15':
  - type: text
    content: If anyone dares to stir up strife against you,
  - type: text
    content: it is not from me!
  - type: text
    content: Those who challenge you will go down in defeat.
  '16':
  - type: text
    content: See, I am the one who created the craftsman
  - type: text
    content: who fans the coals into a fire
  - type: text
    content: and forges a weapon fit for its purpose,
  - type: text
    content: and I am the one who created the destroyer to destroy.
  '17':
  - type: text
    content: But I promise you
  - type: text
    content: ','
  - type: text
    content: no weapon meant to hurt you will succeed,
  - type: text
    content: 'and you will refute '
  - type: note
    content: Or “condemn.”
  - type: text
    content: every accusing word spoken against you.
  - type: text
    content: 'This promise is the inheritance of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s servants,
  - type: note
    content: 'In ch. 53 we learn about the Servant of the Lord (Jesus Christ): his humiliation, his death, and the glory that followed. Here we find the Servant has become many servants (plural), a corporate body of believers. The Son has become sons. From this point on, Isaiah’s focus finds its fulfillment in the corporate church and the glorious bride of Jesus Christ.'
  - type: text
    content: 'and their vindication '
  - type: note
    content: Or “righteousness.”
  - type: text
    content: 'is from me,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '2':
  - type: text
    content: “
  - type: text
    content: Increase is coming
  - type: text
    content: ', so enlarge your tent'
  - type: text
    content: and add extensions to your dwelling.
  - type: note
    content: Or “stretch out the curtains of your dwelling.”
  - type: text
    content: Hold nothing back! Make the tent ropes longer and the pegs stronger.
  - type: note
    content: Or “Lengthen your cords; make firm your tent pegs.”
  '3':
  - type: text
    content: You will increase and spread out in every direction.
  - type: note
    content: Or “to the right and to the left.”
  - type: text
    content: 'Your sons and daughters '
  - type: note
    content: Or “Your seed,” the same Hebrew word found in 53:10 and Gen. 3:15.
  - type: text
    content: will conquer nations
  - type: text
    content: and revitalize desolate cities.
  '4':
  - type: text
    content: Do not fear, for your shame is no more.
  - type: text
    content: Do not be embarrassed,
  - type: text
    content: for you will not be disgraced.
  - type: text
    content: You will forget the inadequacy you felt in your youth
  - type: text
    content: and will no longer remember the shame of your widowhood.
  '5':
  - type: text
    content: For your Maker is your husband;
  - type: text
