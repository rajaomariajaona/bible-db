  - type: text
    content: ', your Kinsman-Redeemer.'
  '9':
  - type: text
    content: “To me, this is like the time when I vowed
  - type: text
    content: that the waters of Noah’s flood
  - type: text
    content: would never again cover the earth.
  - type: text
    content: Now I vow to you that I will neither be angry with you
  - type: text
