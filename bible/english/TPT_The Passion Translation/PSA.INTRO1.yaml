      - type: text
        text: Outline
    - type: text
      text: ': The book of Psalms is really five books in one. Moses gave us the five books of the Law called the Pentateuch; David gave us the five books of the Psalms. Each division ends with a doxology that includes the word “Amen!” The last division ends with Psalm 150 as the doxology, forming an appropriate conclusion to this “Pentateuch of David.” These five divisions have been compared to the first five books of the Bible:'
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: Psalms 1–41 (Genesis) — Psalms of man and creation
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: Psalms 42–72 (Exodus) — Psalms of suffering and redemption
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: Psalms 73–89 (Leviticus) — Psalms of worship and God’s house
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: Psalms 90–106 (Numbers) — Psalms of our pilgrimage on earth
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: Psalms 107–150 (Deuteronomy) — Psalms of praise and the Word
  - type: usfm
    marker: is1
    children:
    - type: text
      text: About Psalms
  - type: usfm
    marker: ip
    children:
    - type: text
      text: I have loved the Psalms for over forty years. They have been my comfort and joy, leading me to the place where worship flows. When discouraged or downcast, I have never failed to take new strength from reading the Psalms. They charge my batteries and fill my sails. In fact, they seem to grow even more powerful as I grow older. Their thunder stirs me; their sweet melodies move me into the sacred emotions of a heart on fire. The dark rain clouds of grief turn to bright rainbows of hope just from meditating on David’s soul-subduing songs.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The Psalms find the words that express our deepest and strongest emotions, no matter what the circumstances. Every emotion of our hearts is reflected in the Psalms. Reading the Psalms will turn sighing into singing and trouble into triumph. The word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: praise
    - type: text
      text: ' is found 189 times in this book. There is simply nothing that touches my heart like the Psalms. Thousands of years ago my deepest feelings were put to music—this is what we all delightfully discover when reading the Psalms!'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A contemporary name for the book of Psalms could be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Poetry on Fire
    - type: text
      text: . These 150 poetic masterpieces give us an expression of faith and worship. They become a mirror to the heart of God’s people in our quest to experience God’s presence. Much of Christianity has become so intellectualized that our emotions and artistic creativity are often set aside as unimportant in the worship of God. The Psalms free us to become emotional, passionate, sincere worshipers. It is time to sing the Psalms!
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Purpose
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The Psalms are clearly poetic. They are praises placed inside of poetry. Everyone who reads the Psalms realizes how filled with emotion they are! You will never be bored in reading the poetry that spills out of a fiery, passionate heart. These verses contain both poetry and music that touch the heart deeply, enabling you to encounter the heart of God through your emotional and creative senses.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Author and Audience
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Most of these poetic masterpieces come to us from David, King of Israel. He wrote them during specific periods of his life: when he was on the run from Saul, grateful for the Lord’s protection and provision, scared for his future, mournful over his sin, and praising God with uplifted hands. Other authors include David’s son Solomon, Moses, Asaph, and the prophetic singers of Korah’s clan.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: While they were written during specific periods in the history of Israel—from the monarchy to the postexilic eras—they connect to our own time as much as they reflect their time. So in many ways these poems are written to you and me. The original audience was the children of Israel, but the Psalms reflect the hopes and dreams, fears and failures of humanity in general.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Major Themes
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Poetry of Praise.
    - type: text
      text: ' The Psalms are pure praise, inspired by the breath of God. Praise is a matter of life and breath. As long as we have breath we are told to praise the Lord. The Psalms release a flood of God-inspired insights that will lift heaviness off the human heart. The Psalms are meant to do for you what they did for David: they will bring you from your cave of despair into the glad presence of the King who likes and enjoys you.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Poetry of Prayer.
    - type: text
      text: ' Mixed with intercession, the Psalms become the fuel for our devotional life. Each psalm is a prayer. The early church recited and sang the Psalms regularly. Many contemporary worship songs have been inspired by this book of prayer-poetry!'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Poetry of Wisdom.
    - type: text
      text: ' The Psalms unlock mysteries and parables, for within the purest praise is the cryptic language of a wise messenger. The wisdom of God is contained in these 150 keys; you have a key chain with master keys to unlock God’s storehouse of wisdom and revelation. It is the “harp” (anointed worship) that releases divine secrets. Read carefully Psalm 49:4: “I will break open mysteries with my music, and my song will release riddles solved.”'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Poetry of Prophecy.
    - type: text
      text: ' Prophetic insights rest upon the Psalms. David’s harp brings revelation and understanding to the people. Singers who tap into the insights of the Psalms will bring forth truths in their songs, which will break the hearts of people and release divine understanding to the church. Prophets must become musicians and musicians must become prophets for the key of David to be given to the church.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Poetry of Jesus Christ.
    - type: text
      text: ' As with every part of the Old Testament, we are called to read the Psalms in two ways: (1) as the original audience heard them in their ancient Hebrew world; and (2) as the fulfillment of messianic prophesies, submitting by faith that these poems point to Jesus Christ. Therefore, at one level, these poems are all about him. There are 150 Psalms, and each of them reveals a special and unique aspect of the God-man, Christ Jesus. We could say every Psalm is messianic in that each finds its fulfillment in Christ. Looking backward in light of Christ’s revelation, we see they all point to our Lord Jesus, whom God has chosen as King over all.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Since these songs are all about Jesus, one of the keys to understanding the Psalms is to look for Jesus within its pages. Luke 24:44 says: “I told you that everything written about me would be fulfilled, including all the prophecies from the law of Moses through the Psalms and the writings of the prophets—that they would all find their fulfillment.” There are many secrets about Jesus waiting to be discovered here!'
