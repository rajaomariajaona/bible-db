document_id: JER.51,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh’s War against Babylon
  - type: text
    content: Yahweh
  - type: text
    content: ' says,'
  - type: text
    content: '“I will stir up the spirit of a destroyer '
  - type: note
    content: Or “a destructive wind.” Hebrew uses the same word (ruach) for both “spirit” and “wind.” The prophecy in this verse would be fulfilled by Cyrus, the Persian king who defeated Babylon.
  - type: text
    content: to fight
  - type: text
    content: against Babylon and the heart of my enemies.
  - type: note
    content: Or “Leb Kamai,” a possible cryptogram or code name for Chaldea.
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ' has judged in our favor.'
  - type: text
    content: Come, let us tell the news in Zion,
  - type: text
    content: 'all the wonders that '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God has done!’ ”'
  - type: heading
    content: The End of Babylon
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' has stirred up a spirit '
  - type: text
    content: of hostility
  - type: text
    content: in the king of the Medes
  - type: note
    content: The king (LXX, Syriac; Hebrew is “kings”) of the Medes was likely Cyrus, who became king of Persia but who was from Media (see 50:3).
  - type: text
    content: 'because '
  - type: text
    content: Yahweh
  - type: text
    content: ’s plan is to destroy Babylon.
  - type: text
    content: 'This is '
  - type: text
    content: Yahweh
  - type: text
    content: '’s revenge for '
  - type: text
    content: destroying
  - type: text
    content: ' his temple.'
  - type: text
    content: “Sharpen the arrows;
  - type: text
    content: fill up your quivers!
  - type: note
    content: Or “take up your shields.”
  '12':
  - type: text
    content: Give the signal to attack Babylon’s walls!
  - type: text
    content: Post sentries and reinforce the guards!
  - type: text
    content: Prepare a surprise attack!
  - type: text
    content: Yahweh
  - type: text
    content: ' has done what he said he would do'
  - type: text
    content: to the people of Babylon.
  '13':
  - type: text
    content: You who are enthroned beside many rivers and canals
  - type: text
    content: and are rich in treasures,
  - type: note
    content: These riches consisted of the plunder they gained in battle from other nations.
  - type: text
    content: your end has come.
  - type: text
    content: The thread of your life is cut.
  - type: note
    content: That is, “the web of your destiny is finished.”
  '14':
  - type: text
    content: 'For I have sworn by my great name, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: that I will fill your land with warriors as a swarm of locusts,
  - type: text
    content: and they will raise up the victory shout over you.”
  - type: heading
    content: A Song of Praise
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Verses 15–19 are nearly identical with 10:12–16.
  - type: text
    content: 'made the earth by his '
  - type: text
    content: glorious
  - type: text
    content: ' power'
  - type: text
    content: 'and firmly established it by his '
  - type: text
    content: great
  - type: text
    content: ' wisdom.'
  - type: text
    content: His skill stretched out the sky.
  '16':
  - type: text
    content: When he speaks, a roar is released in the waters of heaven.
  - type: text
    content: Clouds rise from the far-off horizons.
  - type: text
    content: He unleashes on the earth from his storehouses,
  - type: note
    content: Enoch saw these storehouses (see 1 Enoch 17–18).
  - type: text
    content: rain, lightning bolts, and stormy winds.
  '17':
  - type: text
    content: Idolaters are senseless and know so little.
  - type: text
    content: Idol-makers are shamed by what they make
  - type: text
    content: since their idols are nothing but lifeless lies.
  '18':
  - type: text
    content: They are worthless—nothing but a joke!
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' comes to punish them, they will perish.'
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ', the Riches of Jacob,'
  - type: text
    content: you are nothing like these.
  - type: text
    content: He created the universe
  - type: text
    content: and has chosen
  - type: text
    content: ' Israel to be his inheritance.'
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, is his name!'
  - type: heading
    content: Babylon, Yahweh’s War Club
  '2':
  - type: text
    content: 'I will bring foreigners against Babylon to winnow '
  - type: note
    content: The Hebrew contains a play on words with “foreigners [Hb. zarim]” and “winnow [Hb. zeruha].”
  - type: text
    content: her
  - type: text
    content: and plunder her country.
  - type: text
    content: They will attack her on every side
  - type: text
    content: in the day of her disaster.
  '20':
  - type: text
    content: “You were my war club, my battle club.
  - type: text
    content: I used you to crush nations and overthrow kingdoms.
  '21':
  - type: text
    content: With you I defeated horses and riders,
  - type: text
    content: and with you I broke chariots and their riders in pieces.
  '22':
  - type: text
    content: With you I shattered men and women,
  - type: text
    content: with you I conquered old and young,
  - type: text
    content: and with you I triumphed over young men and girls.
  '23':
  - type: text
    content: With you I overpowered shepherds and flocks,
  - type: text
    content: with you I devastated plowmen and animals that pull the plow,
  - type: text
    content: and with you I crushed governors and officials.”
  - type: heading
    content: Babylon’s Time Has Come
  '24':
  - type: text
    content: '“But now,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “you will see with your own eyes'
  - type: text
    content: how I repay you, Babylon and the Chaldeans,
  - type: text
    content: for all the wrongs you have done to Zion.
  '25':
  - type: text
    content: 'I have become your enemy,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: '“O mountain '
  - type: note
    content: A mountain is a frequently used metaphor for a kingdom.
  - type: text
    content: of destruction,
  - type: text
    content: destroyer of the whole world!
  - type: text
    content: I will unleash my power against you,
  - type: text
    content: send you tumbling to the ground,
  - type: text
    content: and turn you into a mountain of soot and ashes.
  '26':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare:'
  - type: text
    content: After I am through with you
  - type: text
    content: ','
  - type: text
    content: people will not be able to find any among you
  - type: text
    content: to rebuild you
  - type: text
    content: ','
  - type: text
    content: not one foundation stone or cornerstone.
  - type: text
    content: You will lie desolate forever.”
  - type: heading
    content: Babylon Has Fallen
  '27':
  - type: text
    content: “Raise up a signal flag throughout the world;
  - type: text
    content: sound the war trumpet among the nations!
  - type: text
    content: Prepare the nations to attack her!
  - type: text
    content: Assemble the kingdoms of Ararat, Minni, Ashkenaz
  - type: note
    content: Ararat, Minni, and Ashkenaz were kingdom-states north of Babylonia.
  - type: text
    content: to make war against her.
  - type: text
    content: 'Appoint a commanding officer to lead her enemies '
  - type: text
    content: in battle
  - type: text
    content: ;
  - type: text
    content: send multitudes of horsemen like swarms of locusts.
  '28':
  - type: text
    content: Prepare the kings of Media, her governors, all her officials,
  - type: text
    content: and all the lands they rule to come make war against Babylon.”
  '29':
  - type: text
    content: 'Then, when '
  - type: text
    content: Yahweh
  - type: text
    content: ' executed his plan against Babylon,'
  - type: text
    content: the earth trembled and convulsed.
  - type: text
    content: He determined to make Babylon an uninhabited desert.
  '3':
  - type: text
    content: Shoot down all their archers
  - type: text
    content: and all their proud warriors dressed in armor.
  - type: note
    content: The Hebrew is uncertain. It is literally “Against let bend the bowman his bow and against let him stand up in his armor.” One possible interpretation is “Don’t bend the bow or put on your armor [there will be no need to fight].”
  - type: text
    content: Do not spare her soldiers!
  - type: text
    content: Destroy her entire army!
  '30':
  - type: text
    content: Babylon’s warriors had enough of fighting,
  - type: text
    content: so they stayed inside their forts.
  - type: text
    content: With their courage melted away,
  - type: text
    content: they have been left like ordinary civilians.
  - type: text
    content: Their city gates have been broken through,
  - type: text
    content: and her houses are on fire.
  '31':
  - type: text
    content: Courier after courier,
  - type: text
    content: messenger after messenger,
  - type: text
    content: 'runs to inform the king of Babylon:'
  - type: text
    content: One says
  - type: text
    content: ', “Your city has been taken from every side.”'
  '32':
  - type: text
    content: Another says
  - type: text
    content: ', “The river crossings have been overrun.”'
  - type: text
    content: And another
  - type: text
    content: ', “The thickets and reed marshes have all been burned.”'
  - type: text
    content: And yet another one says
  - type: text
    content: ', “All your fighting men are gripped with panic.”'
  '33':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: 'Commander of Angel Armies, says to you:'
  - type: text
    content: “When people trample down the threshing place,
  - type: text
    content: the time of threshing is not far off.
  - type: text
    content: The time to harvest Fair Babylon is almost here!”
  - type: heading
    content: Jerusalem’s Lament
  '34':
  - type: text
    content: Nebuchadnezzar, king of Babylon, devoured us, chewed us up,
  - type: text
    content: and consumed us like a hungry man consumes a meal.
  - type: note
    content: Or “made me [us] like an empty vessel.”
  - type: text
    content: Like a monster he swallowed us whole,
  - type: text
    content: filled his belly with our delicacies
  - type: note
    content: That is, Israel’s national treasures. See 20:4–5.
  - type: text
    content: and then expelled us.
  '35':
  - type: text
    content: Let the people of Zion say,
  - type: text
    content: “May the violence done to our people fall upon Babylon!”
  - type: text
    content: Let Jerusalem say,
  - type: text
    content: “May the Chaldeans pay for the crime of shedding my blood!”
  - type: heading
    content: Yahweh Promises to Help Israel
  '36':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Look, I am taking up your cause
  - type: text
    content: to make sure you are avenged.
  - type: text
    content: I will dry up her water source
  - type: text
    content: and make her rivers run dry.
  '37':
  - type: text
    content: Babylon will be reduced to a pile of ruins,
  - type: text
    content: the haunt of jackals,
  - type: text
    content: a thing of horror and scorn,
  - type: text
    content: a place where no one lives.
  '38':
  - type: text
    content: 'Like lions, the Babylonians all roar '
  - type: text
    content: over their prey
  - type: text
    content: ;
  - type: text
    content: they growl like lions’ cubs.
  '39':
  - type: text
    content: Are they ready to feast? I will prepare them a drink
  - type: text
    content: that will make them drunk.
  - type: note
    content: This is possibly a reference to Belshazzar’s banquet of Dan. 5. See Jer. 25:15–29.
  - type: text
    content: They will drink themselves tipsy
  - type: text
    content: and fall into an everlasting sleep,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '4':
  - type: text
    content: The slaughtered will fall throughout the land of the Chaldeans.
  - type: text
    content: They will be wounded and die in their city streets.
  '40':
  - type: text
    content: '“I will lead these '
  - type: text
    content: proud lions
  - type: text
    content: ' down'
  - type: text
    content: like lambs to the slaughter,
  - type: text
    content: like rams and goats to be sacrificed.”
  - type: heading
    content: Babylon’s Fate
  '41':
  - type: text
    content: '“What! Has the '
  - type: text
    content: great city of
  - type: text
    content: ' Babylon '
  - type: note
    content: Or “Sheshak,” an alternate, cryptic name for the city of Babylon.
  - type: text
    content: been taken?
  - type: text
    content: Has the pride of the whole world been seized?
  - type: text
    content: Babylon has become an object of horror
  - type: text
    content: throughout the nations.
  '42':
  - type: text
    content: The sea has risen over Babylon;
  - type: note
    content: The sea is a metaphor for the sweeping hordes of enemy soldiers attacking the nation. See 46:7–8; 47:2.
  - type: text
    content: she sinks beneath its crashing waves.
  '43':
  - type: text
    content: Her nearby towns have become desolate, a parched land,
  - type: text
    content: a desert where no one lives and where nobody goes.
  '44':
  - type: text
    content: I will punish Bel, the god of Babylon,
  - type: text
    content: and make him give back what he has stolen.
  - type: note
    content: Or “take out of his mouth what he has swallowed.”
  - type: text
    content: The people will no longer stream to him
  - type: text
    content: to bring him their offering
  - type: text
    content: .
  - type: text
    content: The walls of Babylon have fallen.”
  - type: note
    content: This summary statement seems to be a rhetorical device known as an inclusio, in which the sense of the opening statement in v. 41 is repeated here.
  - type: heading
    content: Yahweh Punishes Idolatry
  '45':
  - type: text
    content: “Leave Babylon behind, my people.
  - type: text
    content: Each of you, save your lives
  - type: text
    content: 'from '
  - type: text
    content: Yahweh
  - type: text
    content: ’s furious anger.
  '46':
  - type: text
    content: But make sure that you are not discouraged.
  - type: text
    content: Do not worry about the many conspiracy theories
  - type: text
    content: that are being circulated throughout the country.
  - type: text
    content: For every year a different rumor spreads—
  - type: text
    content: rumors of violence, rumors of one king fighting another.
  '47':
  - type: text
    content: “Behold, the days are coming
  - type: text
    content: when I will punish Babylon’s ‘gods.’
  - type: text
    content: Her entire country will be humiliated,
  - type: text
    content: with all her slaughtered lying in the streets.
  '48':
  - type: text
    content: Creation itself will sing for joy over Babylon’s demise.
  - type: text
    content: 'Destroyers from the north will attack her,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '49':
  - type: text
    content: “For people throughout the world have been slain by Babylon.
  - type: text
    content: And now, because of Israel’s slaughtered ones,
  - type: text
    content: Babylon will fall.”
  - type: note
    content: Or “Also, Babylon is to fall for the slain of Israel, just as for Babylon the slain of all the earth have fallen.”
  - type: heading
    content: Yahweh’s Message to the Israelite Captives in Babylon
  '5':
  - type: text
    content: Remember
  - type: text
    content: ', your God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'has not forsaken '
  - type: note
    content: The Hebrew word for “forsaken” means “to be made [left] a widow.” God’s people are never “widowed [helpless],” for God is our Redeemer.
  - type: text
    content: Israel and Judah
  - type: text
    content: even though the land is awash with their sins against me,
  - type: text
    content: the Holy One of Israel.
  '50':
  - type: text
    content: “You who have escaped with your life,
  - type: text
    content: do not wait to leave Babylon behind.
  - type: text
    content: 'Remember '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: your God
  - type: text
    content: ' in a distant land,'
  - type: text
    content: 'and let your thoughts turn to '
  - type: text
    content: beautiful
  - type: text
    content: ' Jerusalem.”'
  '51':
  - type: text
    content: “We were mocked and ashamed;
  - type: text
    content: we were covered with disgrace
  - type: text
    content: because foreigners had entered
  - type: text
    content: 'the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s holy places.”
  '52':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares,'
  - type: text
    content: “Behold, the days are coming
  - type: text
    content: when I will punish Babylon’s ‘gods,’
  - type: text
    content: and throughout the land, wounded people
  - type: text
    content: will be groaning in pain.
  '53':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say,'
  - type: text
    content: even if Babylon should climb up to the sky,
  - type: text
    content: and entrench herself in an inaccessible height,
  - type: text
    content: I would still call her enemies to destroy her.”
  - type: heading
    content: Babylon’s Doom
  '54':
  - type: text
    content: “Listen! The voice of a shout from Babylon.
  - type: text
    content: It is a noise of great destruction
  - type: text
    content: coming from the country of the Chaldeans.
  '55':
  - type: text
    content: I am attacking Babylon and will destroy her
  - type: text
    content: and will silence the noise of the city.
  - type: text
    content: The enemy armies rush in like roaring waves
  - type: text
    content: and attack with shouts and battle cries.
  '56':
  - type: text
    content: An enemy has come to destroy Babylon.
  - type: text
    content: They have captured Babylon’s soldiers
  - type: text
    content: and broken their bows into pieces.
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is a God of recompense;'
  - type: text
    content: he never fails to repay.
  '57':
  - type: text
    content: I will make her soldiers and all her leaders drunk,
  - type: text
    content: including the advisers, officials, and military commanders.
  - type: text
    content: They will fall into an everlasting sleep,
  - type: text
    content: never to wake again,”
  - type: text
    content: declares the King,
  - type: text
    content: 'whose name is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '58':
  - type: text
    content: “The attacking army will demolish
  - type: text
    content: the massive walls protecting Babylon
  - type: text
    content: and burn down the lofty gates of the city.
  - type: note
    content: According to Herodotus, the ancient Greek historian, the outer walls of Babylon were over 350 feet (107 meters) high (200 royal cubits) and over 80 feet (24 meters) thick. However, other historians and scholars believe the walls to be over 80 feet (24 meters) high and over 30 feet (9 meters) thick, allowing for a team of four horses to be driven along the top of the walls. “In the circuit of the wall are a hundred gates, all of brass, with brazen lintels and side-posts” (see Herodotus 1.179, trans. George Rawlinson).
  - type: text
    content: The nations wear themselves out to no avail;
  - type: text
    content: they will see the flames destroy what they’ve done,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: heading
    content: Jeremiah’s Written Prophecy Thrown into the Euphrates
  '59':
  - type: text
    content: 'Now Jeremiah had written all these prophecies of Babylon’s doom on a scroll. In the fourth year of the reign of Zedekiah, the king of Judah, the king traveled to Babylonia, accompanied by his personal attendant, '
  - type: note
    content: Or “officer of the resting place,” which suggests that Seraiah oversaw making arrangements for the king’s accommodations when the king traveled. It is believed that Seraiah was Baruch’s brother (see 32:12).
  - type: text
    content: 'Seraiah son of Neriah and grandson of Mahseiah. Jeremiah gave Seraiah the scroll '
  '6':
  - type: text
    content: Flee from Babylon!
  - type: text
    content: Save your lives!
  - type: text
    content: Don’t you perish when I punish her for her guilt;
  - type: text
    content: the time of revenge is here.
  - type: text
    content: 'Now '
  - type: text
    content: Yahweh
  - type: text
    content: ' will pay her back for what she has done.'
  '61':
  - type: text
    content: 'together with this command: “When you arrive in Babylon, be sure to read all the prophecies written on this scroll to all the people. '
  '62':
  - type: text
    content: 'Afterward, pray this prayer: ‘O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', you have promised to destroy this place so that no one will live here ever again, neither human nor animal. You said it will be desolate forever.’'
  '63':
  - type: text
    content: '“Then, '
  - type: text
    content: Seraiah
  - type: text
    content: ', when you finish reading this book to the people, tie a '
  - type: text
    content: heavy
  - type: text
    content: ' stone to it and throw it into the middle of the Euphrates River '
  '64':
  - type: text
    content: 'with these words: ‘Just as this scroll will sink, so Babylon will sink '
  - type: text
    content: to the depths
  - type: text
    content: ', never to rise again from the disaster I am going to bring on her.’ ”'
  - type: note
    content: As translated from the Septuagint. The Hebrew adds “and they shall weary themselves.”
  - type: text
    content: This ends Jeremiah’s writings.
  - type: note
    content: According to tradition, Jeremiah did continue writing with the book of Lamentations. This verse implies that Jer. 52 was possibly added by another author and seems to parallel 2 Kings 24:18–25:30.
  '7':
  - type: text
    content: 'Babylon was like a golden cup in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s hand;
  - type: text
    content: she made the whole world drunk.
  - type: text
    content: The nations drank her wine
  - type: text
    content: and then went mad.
  '8':
  - type: text
    content: Suddenly the cup of Babylon falls to the ground and is shattered.
  - type: text
    content: Wail for her!
  - type: text
    content: Get medicine for her wounds;
  - type: text
    content: perhaps she can be cured.
  '9':
  - type: text
    content: They said
  - type: text
    content: ', ‘We tried to heal Babylon but failed.'
  - type: text
    content: She can’t be healed, so let’s each go to our own country.
  - type: text
    content: For her judgment has reached up to heaven
  - type: text
    content: and rises to the very clouds.
