    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to Herodotus, the ancient Greek historian, the outer walls of Babylon were over 350 feet (107 meters) high (200 royal cubits) and over 80 feet (24 meters) thick. However, other historians and scholars believe the walls to be over 80 feet (24 meters) high and over 30 feet (9 meters) thick, allowing for a team of four horses to be driven along the top of the walls. “In the circuit of the wall are a hundred gates, all of brass, with brazen lintels and side-posts” (see Herodotus 1.179, trans. George Rawlinson).
