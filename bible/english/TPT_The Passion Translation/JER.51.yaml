      text: '20'
  - type: text
    text: “You were my war club, my battle club.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I used you to crush nations and overthrow kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: With you I defeated horses and riders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with you I broke chariots and their riders in pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: With you I shattered men and women,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with you I conquered old and young,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with you I triumphed over young men and girls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: With you I overpowered shepherds and flocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with you I devastated plowmen and animals that pull the plow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with you I crushed governors and officials.”
