          text: Or “By his knowledge” or “By his sweat.” The Hebrew word for “knowledge” is taken from a homonymic root for “sweat.” Perhaps this is an allusion to his sweat trickling from the cross or of the sweat of blood in the garden of Gethsemane, as well as the knowledge of life that comes to us when we believe in him. See also
