      text: and endured the torment of our sufferings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We viewed him as one who was being punished
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 53:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “stricken,” a word used for one who is struck with leprosy. Because of this, the Jewish Talmud gives many opinions about this verse, then offers an authoritative ruling of the sages: “The rabbis say: ‘His name is The Leper . . . as it is said [in'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isaiah 53:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '], “Surely our sicknesses he himself bore and our sorrows he carried, yet we ourselves esteemed him stricken, smitten of God, and afflicted” ’ ” (b. Sanhedrin 98b). Their conclusion was that the Messiah will be called “the Leper of the House of Rabbi.” They understood that he would not be an actual “leper” but that he would carry the spiritual “leprosy” of the people, as a leper carries his affliction.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
