      text: 'like a root '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 53:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus is the Root of David and the Sprouting of the Lord (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The parched soil can represent both the barrenness of humanity before God and the barren season of Israel’s history just before Jesus appeared. A root cannot live in dry ground, yet we see a hint here that the Messiah would be miraculously born. A root in dry ground is an allusion to the virgin birth of Jesus, who was conceived without a human father.
      marker-yv: yv-n
    - type: text
      text: in parched soil.
  - type: usfm
