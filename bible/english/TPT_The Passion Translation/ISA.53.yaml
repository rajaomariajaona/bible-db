document_id: ISA.53,1849
type_code: eng
verses:
  '1':
  - type: text
    content: Who has truly believed our revelation?
  - type: text
    content: 'To whom will '
  - type: text
    content: Yahweh
  - type: text
    content: ' reveal his mighty arm?'
  - type: note
    content: God’s “arm” is a metaphor for his triumphant power. It is said that almost every verse in this chapter is alluded to in the New Testament in reference to Jesus.
  '10':
  - type: text
    content: 'Even though it pleased '
  - type: text
    content: Yahweh
  - type: text
    content: to crush him with grief,
  - type: note
    content: Or “disease.”
  - type: text
    content: he will be restored to favor.
  - type: note
    content: This points to the resurrection of Jesus Christ, who died and rose again to the place of highest honor (see Phil. 2:5–11).
  - type: text
    content: After his soul becomes a guilt-offering,
  - type: note
    content: See Mark 10:45; Eph. 5:2; Heb. 9:14.
  - type: text
    content: he will gaze upon his many offspring and prolong his days.
  - type: note
    content: Christ’s sacrifice results in the birth of spiritual offspring. He will see his spiritual offspring and enjoy living his life through them; thus, it could be said he prolonged his days. The life we live is no longer our own, and in a way, we prolong his days as we walk in close fellowship with Christ. A people in his image is the joy that was set before him (see Heb. 12:1–2).
  - type: text
    content: 'And through him, '
  - type: text
    content: Yahweh
  - type: text
    content: ’s deepest desires
  - type: text
    content: will be fully accomplished.
  - type: note
    content: Or “the will of the Lord will prosper in his hand.”
  '11':
  - type: text
    content: After the great anguish of his soul,
  - type: text
    content: 'he will see light '
  - type: note
    content: This vision of light is the light of a new day, the resurrection morning light that flooded into the empty tomb.
  - type: text
    content: and be fully satisfied.
  - type: note
    content: Or “he will eat and drink his fill.” See Song. 5:1.
  - type: text
    content: 'By knowing him, '
  - type: note
    content: Or “By his knowledge” or “By his sweat.” The Hebrew word for “knowledge” is taken from a homonymic root for “sweat.” Perhaps this is an allusion to his sweat trickling from the cross or of the sweat of blood in the garden of Gethsemane, as well as the knowledge of life that comes to us when we believe in him. See also Gen. 2:9 and 3:17–19, which connect knowledge (of good and evil) with Adam’s sweat.
  - type: text
    content: the righteous one,
  - type: text
    content: my servant will make many to be righteous,
  - type: note
    content: This is an intimate knowledge, or experience of him by faith, that imparts the righteousness of God to everyone who believes. To be declared righteous involves pardon and acceptance. We are fully pardoned and fully accepted in Christ. See Rom. 3:21–26; 8:1; 2 Cor. 5:21; Eph. 1:5–6; 1 John 4:10.
  - type: text
    content: 'because he, '
  - type: text
    content: their sin-bearer
  - type: text
    content: ', carried away their sins.'
  - type: note
    content: Jesus accepted the responsibility for the consequences of our sins. See Ps. 38:4; John 1:29; 1 John 3:5.
  '12':
  - type: text
    content: 'So I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will assign him a portion'
  - type: text
    content: among a great multitude,
  - type: text
    content: and he will triumph
  - type: text
    content: 'and divide the spoils of victory with '
  - type: text
    content: his
  - type: text
    content: ' mighty ones '
  - type: note
    content: Jesus shares the spoils of his victory on the cross and in the resurrection with us, his mighty ones. He purchased your victory, your salvation, your emotional wholeness, your healing, your deliverance, and your triumph over every foe.
  - type: text
    content: —
  - type: text
    content: 'all because he poured out his life-blood '
  - type: note
    content: Or “himself.”
  - type: text
    content: to death.
  - type: text
    content: He was counted among the worst of sinners,
  - type: text
    content: yet he carried sin’s burden for many
  - type: note
    content: See Matt. 11:28.
  - type: text
    content: and intercedes for those who are rebels.
  - type: note
    content: The work of a priest was to offer sacrifice for sin and intercede for the sinner. Our High Priest, Jesus, has done this for us. He became our sacrifice and now is interceding for us. See Luke 23:33–34; Rom. 8:34; Heb. 7:25, 27.
  '2':
  - type: text
    content: He sprouted up like a tender plant before the Lord,
  - type: note
    content: Or “before him.”
  - type: text
    content: 'like a root '
  - type: note
    content: Jesus is the Root of David and the Sprouting of the Lord (see Isa. 11:1). The parched soil can represent both the barrenness of humanity before God and the barren season of Israel’s history just before Jesus appeared. A root cannot live in dry ground, yet we see a hint here that the Messiah would be miraculously born. A root in dry ground is an allusion to the virgin birth of Jesus, who was conceived without a human father.
  - type: text
    content: in parched soil.
  - type: text
    content: He possessed no distinguishing beauty
  - type: text
    content: or outward splendor to catch our attention—
  - type: text
    content: nothing special in his appearance to make us desire him.
  '3':
  - type: text
    content: He was despised and rejected by men,
  - type: text
    content: 'a man of '
  - type: text
    content: deep
  - type: text
    content: ' sorrows'
  - type: text
    content: who was no stranger to suffering and grief.
  - type: note
    content: Yet Jesus was the most emotionally whole and healed man to ever walk the earth. He did not absorb the insults and rejections of even his own neighbors (see Luke 4:14–30).
  - type: text
    content: We hid our faces from him in disgust
  - type: text
    content: and considered him a nobody, not worthy of respect.
  - type: heading
    content: The Sin-Bearer Servant
  '4':
  - type: text
    content: Yet he was the one who carried our sicknesses
  - type: note
    content: This was fulfilled in two ways. First, the Lamb of God carried away diseases as he walked the earth (see Matt. 8:16–17). And second, he paid the sin price for all humanity on the cross with his sacred blood.
  - type: text
    content: and endured the torment of our sufferings.
  - type: text
    content: We viewed him as one who was being punished
  - type: note
    content: 'Or “stricken,” a word used for one who is struck with leprosy. Because of this, the Jewish Talmud gives many opinions about this verse, then offers an authoritative ruling of the sages: “The rabbis say: ‘His name is The Leper . . . as it is said [in Isaiah 53:4], “Surely our sicknesses he himself bore and our sorrows he carried, yet we ourselves esteemed him stricken, smitten of God, and afflicted” ’ ” (b. Sanhedrin 98b). Their conclusion was that the Messiah will be called “the Leper of the House of Rabbi.” They understood that he would not be an actual “leper” but that he would carry the spiritual “leprosy” of the people, as a leper carries his affliction.'
  - type: text
    content: for something he himself had done,
  - type: text
    content: as one who was struck down by God and brought low.
  '5':
  - type: text
    content: But it was because of our rebellious deeds that he was pierced
  - type: note
    content: See Zech. 12:10; John 19:31–37; Rev. 1:7.
  - type: text
    content: and because of our sins that he was crushed.
  - type: text
    content: He endured the punishment that made us completely whole,
  - type: note
    content: This is the Hebrew word shalom, meaning “peace,” “prosperity,” “wholeness,” “success,” or “well-being.” All of these have come to us through Christ’s sufferings.
  - type: text
    content: 'and in his wounding '
  - type: note
    content: The Hebrew word could be translated “among his wounds [bruises]” or “in his wounds [bruises].” See the split-open rock of Song. 2:14.
  - type: note
    content: The Hebrew word for “wounding” (or “scourging”) is chaburah and means “blueness of the wounds.” But chaburah is taken from the root word chabar, which means “to join together,” “to unite,” “to have fellowship,” or “to become a couple.” A nuanced translation of Isaiah 53:5 could be “In the fellowship of being one with him is our healing.”
  - type: text
    content: we found our healing.
  '6':
  - type: text
    content: 'Like wayward sheep, we have all wandered '
  - type: note
    content: The Hebrew verb wander has an implication of self-deception. See 1 Peter 2:25.
  - type: text
    content: astray.
  - type: text
    content: Each of us has turned from God’s paths and chosen our own way;
  - type: text
    content: 'even so, '
  - type: text
    content: Yahweh
  - type: text
    content: ' laid '
  - type: note
    content: The Hebrew verb laid can also mean “to make intercession.” This would mean that the Lord interceded within himself (the Godhead) to orchestrate our salvation.
  - type: text
    content: the guilt of our every sin upon him.
  - type: note
    content: This entire chapter provides such detail of the last hours of Jesus Christ that one would almost imagine Isaiah was standing at the foot of the cross writing this chapter. Isaiah’s prophecy, written more than seven hundred years before the cross, is all stated in the past tense, as though it had already happened. There is no other person in human history who could possibly fulfill all of Isaiah’s prophecy. It is believed that Isaiah 53 is referred to eighty-five times in the New Testament. A few of these references include Matt. 8:17; 27:11–13, 26–31, 41–43, 57–60; Mark 15:28; Luke 22:37; John 12:38; Acts 8:32–35; Rom. 5:6–9, 18–19; 10:16; Phil. 2:5–11; 1 Peter 2:21–24.
  - type: heading
    content: The Surrendered Servant
  '7':
  - type: text
    content: He was oppressed and harshly mistreated;
  - type: text
    content: still he humbly submitted, refusing to defend himself.
  - type: text
    content: 'He was led like a '
  - type: text
    content: gentle
  - type: text
    content: ' lamb '
  - type: note
    content: See Gen. 22:7–8; John 1:29; 1 Cor. 5:7; 1 Peter 1:18–19; Rev. 5:12.
  - type: text
    content: to be slaughtered.
  - type: text
    content: Like a silent sheep before his shearers,
  - type: text
    content: he didn’t even open his mouth.
  - type: note
    content: This was the silence of submission to his Father’s will. See Matt. 26:63; Luke 23:9; 1 Peter 2:23.
  '8':
  - type: text
    content: By coercion and with a perversion of justice
  - type: text
    content: he was taken away.
  - type: text
    content: 'And who could have imagined '
  - type: note
    content: Or “who of his generation considered.”
  - type: text
    content: his future?
  - type: text
    content: He was cut down in the prime of life;
  - type: note
    content: Or “He was cut off from the land of the living.” See Dan. 9:26.
  - type: text
    content: 'for the rebellion of his '
  - type: note
    content: Or “my.”
  - type: text
    content: own people,
  - type: text
    content: 'he was struck down '
  - type: text
    content: in their place
  - type: text
    content: .
  '9':
  - type: text
    content: They gave him a grave among criminals,
  - type: note
    content: See Matt. 27:38; Mark 15:27; Luke 23:32; John 19:18.
  - type: text
    content: but he ended up instead in a rich man’s tomb,
  - type: note
    content: See Matt. 27:57–60. The literal Hebrew is “and with the rich in his deaths” (plural). His death is our death too, for we have been co-crucified with Christ (see Gal. 2:20). Jesus was born from a virgin womb and laid in a virgin tomb.
  - type: text
    content: although he had done no violence nor spoken deceitfully.
  - type: heading
    content: The Servant’s Reward
