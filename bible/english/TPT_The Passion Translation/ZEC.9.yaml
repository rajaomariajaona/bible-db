      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will sound the shofar'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and advance in the great storm of his power.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, will be their shield.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their slinging stones shall conquer and subdue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the enemy
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spilling their blood like wine from an overfilled bowl,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the blood that stains the corners of the altar.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On that day, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' their God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will rescue them and make a way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are like a beloved flock of sheep to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yes, precious like the gemstones of a diadem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that will sparkle throughout '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “be lifted up over” or “be raised up over.”
      marker-yv: yv-n
    - type: text
      text: his land.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How beautiful and splendid they will be!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young men will flourish by eating the grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the maidens by drinking the new wine.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Grain and new wine can also be taken as metaphors. Grain is a picture of resurrection life that springs up from the ground. Joshua’s generation was given a new diet of eating the grain of the promised land (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 5:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). New wine is a consistent emblem of the new life of the Spirit that empowers us (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 5:37–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Resurrection life and the empowerment of the Spirit become the source of our victorious life in Christ.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and even on Hamath, which borders Damascus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and on Tyre and Sidon with all their great wisdom.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The people of Tyre have built for themselves a fortress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have swept up piles of silver like dust
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and gathered mounds of gold like the dirt of the streets.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Behold! The Lord will take away all she has,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Lord is going to take possession of her” (LXX, Vulgate).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: burn her city to the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sink her warships into the sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he will hurl down her fortress into the sea.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ashkelon will see it and be afraid;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza will see it and writhe in agony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ekron will witness the loss of her hopes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the king of Gaza will perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Ashkelon will be deserted.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Foreigners '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a mixed population due to the colonization of the land.
      marker-yv: yv-n
    - type: text
      text: will live in Ashdod.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, I will destroy the pride of the Philistine people.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will stop them from eating meat with its blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and take the forbidden food from between their teeth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their remnant, too, will become a part of the people of God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God will give his unexpected and undeserved grace to gentiles and will include them as part of his people. This has happened through the blood of Jesus Christ, who has broken down every dividing wall between the races and ethnicities. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:11–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a clan in Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the people of Ekron will also become '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a part of God’s people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as did the Jebusites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Philistine city of Ekron is likely a metonymy for the Philistines in general. The Jebusites once held as their capital the city of Jerusalem, called Jebus before it was captured by David (see
      - type: usfm
