verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecies concerning the Nations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy: The weighty message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' pertains to the region of Hadrach, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the only reference in the Bible (a hapax legomenon) to the land of Hadrach. Although there are many opinions concerning the location of the land of Hadrach, it is believed to be Aram (Syria), the region around the city of Damascus, north of Israel.
      marker-yv: yv-n
    - type: text
      text: and it will come to rest upon Damascus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “Damascus its resting place.” However, there is a masculine singular suffix on “resting place,” which points to the antecedent of the masculine “message [word].” The words for “region” and “Hadrach” are both Hebrew feminine words.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' keeps an eye on every person'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “To
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the eye of Adam [mankind]”—that is, “All people will look to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and on all the tribes of Israel
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Lord
    - type: text
      text: ', will banish'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'war chariots and horses from Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Ephraim,” a metonymy for the entire Northern Kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: and Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will break the bows used in war.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your king
    - type: text
      text: ' will proclaim peace and well-being to the nations.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 4:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His dominion will stretch from sea to sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 72:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the river to the ends of the earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'As for you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zion
    - type: text
      text: ', because of my covenant with you sealed with blood,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have set your captives free
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the waterless pit of their prison.”
    - type: usfm
