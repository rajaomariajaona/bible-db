      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 37:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prisoners of Hope
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Come running back home to your fortress,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “fortress” is a hapax legomenon, and its meaning is uncertain. Others translate it “stronghold,” “citadel,” or “place of safety.” For the believer today, our fortress is the heart of God, where we are sheltered in his goodness and mercy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you hope-filled prisoners!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This very day, I vow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will restore to you double '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blessing for your trouble
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 40:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 61:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: it
      children:
      - type: text
        text: My people will be my weapons
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have bent Judah as my bow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made Ephraim my arrow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will awaken and stir up your sons, Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: against the sons of Greece.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will use you like a warrior’s sword.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will appear above them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his arrow will flash like lightning.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:14
      - type: usfm
        marker: ft
