document_id: ZEC.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecies concerning the Nations
  - type: text
    content: 'A prophecy: The weighty message of '
  - type: text
    content: Yahweh
  - type: text
    content: ' pertains to the region of Hadrach, '
  - type: note
    content: This is the only reference in the Bible (a hapax legomenon) to the land of Hadrach. Although there are many opinions concerning the location of the land of Hadrach, it is believed to be Aram (Syria), the region around the city of Damascus, north of Israel.
  - type: text
    content: and it will come to rest upon Damascus.
  - type: note
    content: Literally “Damascus its resting place.” However, there is a masculine singular suffix on “resting place,” which points to the antecedent of the masculine “message [word].” The words for “region” and “Hadrach” are both Hebrew feminine words.
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' keeps an eye on every person'
  - type: note
    content: Or literally “To Yahweh the eye of Adam [mankind]”—that is, “All people will look to Yahweh.”
  - type: text
    content: and on all the tribes of Israel
  '10':
  - type: text
    content: 'I, '
  - type: text
    content: the Lord
  - type: text
    content: ', will banish'
  - type: text
    content: 'war chariots and horses from Israel '
  - type: note
    content: Or “Ephraim,” a metonymy for the entire Northern Kingdom of Israel.
  - type: text
    content: and Jerusalem.
  - type: text
    content: I will break the bows used in war.
  - type: text
    content: Your king
  - type: text
    content: ' will proclaim peace and well-being to the nations.'
  - type: note
    content: See Isa. 2:4; Mic. 4:3–4.
  - type: text
    content: His dominion will stretch from sea to sea,
  - type: note
    content: See Ps. 72:8.
  - type: text
    content: from the river to the ends of the earth.
  '11':
  - type: text
    content: 'As for you, '
  - type: text
    content: Zion
  - type: text
    content: ', because of my covenant with you sealed with blood,'
  - type: text
    content: I have set your captives free
  - type: text
    content: from the waterless pit of their prison.”
  - type: note
    content: See Gen. 37:24.
  - type: heading
    content: Prisoners of Hope
  '12':
  - type: text
    content: “Come running back home to your fortress,
  - type: note
    content: The Hebrew word for “fortress” is a hapax legomenon, and its meaning is uncertain. Others translate it “stronghold,” “citadel,” or “place of safety.” For the believer today, our fortress is the heart of God, where we are sheltered in his goodness and mercy.
  - type: text
    content: you hope-filled prisoners!
  - type: text
    content: This very day, I vow
  - type: text
    content: 'I will restore to you double '
  - type: text
    content: blessing for your trouble
  - type: text
    content: .
  - type: note
    content: See Isa. 40:2; 61:7; Hos. 2:15.
  '13':
  - type: text
    content: My people will be my weapons
  - type: text
    content: ','
  - type: text
    content: for I have bent Judah as my bow
  - type: text
    content: and made Ephraim my arrow.
  - type: text
    content: I will awaken and stir up your sons, Zion,
  - type: text
    content: against the sons of Greece.
  - type: text
    content: I will use you like a warrior’s sword.”
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' will appear above them,'
  - type: text
    content: and his arrow will flash like lightning.
  - type: note
    content: See Ps. 18:14; Hab. 3:4, 11.
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will sound the shofar'
  - type: text
    content: and advance in the great storm of his power.
  '15':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will be their shield.'
  - type: text
    content: 'Their slinging stones shall conquer and subdue '
  - type: text
    content: the enemy
  - type: text
    content: ','
  - type: text
    content: spilling their blood like wine from an overfilled bowl,
  - type: text
    content: like the blood that stains the corners of the altar.
  '16':
  - type: text
    content: 'On that day, '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God'
  - type: text
    content: will rescue them and make a way.
  - type: text
    content: For they are like a beloved flock of sheep to him,
  - type: text
    content: yes, precious like the gemstones of a diadem
  - type: text
    content: 'that will sparkle throughout '
  - type: note
    content: Or “be lifted up over” or “be raised up over.”
  - type: text
    content: his land.
  '17':
  - type: text
    content: How beautiful and splendid they will be!
  - type: text
    content: Young men will flourish by eating the grain,
  - type: text
    content: and the maidens by drinking the new wine.
  - type: note
    content: Grain and new wine can also be taken as metaphors. Grain is a picture of resurrection life that springs up from the ground. Joshua’s generation was given a new diet of eating the grain of the promised land (see Josh. 5:11–12). New wine is a consistent emblem of the new life of the Spirit that empowers us (see Matt. 9:17; Luke 5:37–38). Resurrection life and the empowerment of the Spirit become the source of our victorious life in Christ.
  '2':
  - type: text
    content: and even on Hamath, which borders Damascus,
  - type: text
    content: and on Tyre and Sidon with all their great wisdom.
  '3':
  - type: text
    content: The people of Tyre have built for themselves a fortress.
  - type: text
    content: They have swept up piles of silver like dust
  - type: text
    content: and gathered mounds of gold like the dirt of the streets.
  '4':
  - type: text
    content: Behold! The Lord will take away all she has,
  - type: note
    content: Or “the Lord is going to take possession of her” (LXX, Vulgate).
  - type: text
    content: burn her city to the ground,
  - type: text
    content: and sink her warships into the sea.
  - type: note
    content: Or “he will hurl down her fortress into the sea.”
  '5':
  - type: text
    content: Ashkelon will see it and be afraid;
  - type: text
    content: Gaza will see it and writhe in agony.
  - type: text
    content: Ekron will witness the loss of her hopes;
  - type: text
    content: the king of Gaza will perish,
  - type: text
    content: and Ashkelon will be deserted.
  '6':
  - type: text
    content: 'Foreigners '
  - type: note
    content: That is, a mixed population due to the colonization of the land.
  - type: text
    content: will live in Ashdod.
  - type: text
    content: Yes, I will destroy the pride of the Philistine people.
  '7':
  - type: text
    content: I will stop them from eating meat with its blood
  - type: text
    content: and take the forbidden food from between their teeth.
  - type: text
    content: But their remnant, too, will become a part of the people of God,
  - type: note
    content: God will give his unexpected and undeserved grace to gentiles and will include them as part of his people. This has happened through the blood of Jesus Christ, who has broken down every dividing wall between the races and ethnicities. See Eph. 2:11–19.
  - type: text
    content: like a clan in Judah.
  - type: text
    content: 'And the people of Ekron will also become '
  - type: text
    content: a part of God’s people
  - type: text
    content: as did the Jebusites.
  - type: note
    content: The Philistine city of Ekron is likely a metonymy for the Philistines in general. The Jebusites once held as their capital the city of Jerusalem, called Jebus before it was captured by David (see 2 Sam. 5:6–7; 1 Chron. 11:4–6). The Jebusites were not annihilated, but a remnant survived and was absorbed into the community of the people of God (see Josh. 15:63; Judg. 1:21; 1 Kings 9:20–21). Even the ancient enemies of Israel, the Philistines, will be granted grace to mingle with God’s people and become part of their communities. Mercy triumphs over judgment.
  '8':
  - type: text
    content: I will stand guard before my temple
  - type: text
    content: to defend it from all who march against it.
  - type: text
    content: No oppressor will overrun them ever again,
  - type: text
    content: for now, I am constantly on the alert.”
  - type: note
    content: See Deut. 11:12.
  - type: heading
    content: The King of Zion
  '9':
  - type: text
    content: “My daughter Zion, let your heart and soul rejoice!
  - type: text
    content: Rejoice, my daughter Jerusalem, and shout your cheerful praises!
  - type: text
    content: Look! Your King comes to you.
  - type: text
    content: He is righteous and fully qualified to save you.
  - type: note
    content: Or “he is righteous [fulfilled all the qualifications] and victorious [able to save].” See Isa. 32:1; 46:13; 51:5; Jer. 23:5.
  - type: text
    content: Yet he comes to you so humbly, riding on a donkey;
  - type: text
    content: sitting meekly on a colt, a young foal of a donkey.
  - type: note
    content: Rejecting the pomp and fanfare of most kings riding on a war horse (see Jer. 17:25; 22:4), King Jesus the Messiah fulfilled this prophecy by riding into Jerusalem on the back of a donkey, the traditional mount of princes (see Gen. 49:11; Judg. 5:10; 10:4; 12:14; Matt. 21:5; Mark 11:1–10; John 12:14–16).
