document_id: JER.34,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Warns King Zedekiah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me when Nebuchadnezzar, king of Babylon, was at war against Jerusalem and the cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Judah
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The events of this chapter took place in the early months of Nebuchadnezzar’s siege of Jerusalem prior to its destruction in 586 BC. Chapters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 34–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: generally contain Jeremiah’s experiences during the siege of Jerusalem. Like most of the book of Jeremiah, the events are not given in a strict chronological order.
      marker-yv: yv-n
    - type: text
      text: 'He had all his army with him, including soldiers from all the kingdoms of his empire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All the leaders and all the people made an agreement that everyone should free their slaves, men or women, and no longer keep them enslaved, so they set every slave free. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But afterward, they went back on their word and forced the men and women whom they had set free back into slavery.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to Jeremiah, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, made a covenant with your ancestors when I led them out of the house of bondage in Egypt. I said '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'that every seventh year, each one of you is to free any fellow Hebrews who have sold themselves to you. They may be your slave for six years, then you must give them their freedom. Your ancestors, however, did not listen to me and would not obey. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'You recently decided to obey me and did what pleases me by setting your Hebrew slaves completely free. You even went to the temple dedicated to me, and in my name, you made a covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to set them free
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But now you have broken your promise and dishonored my name by forcing your former slaves back into slavery. From those whom you once set free to live as they please, you have taken their freedom away again to please yourselves.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“So, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say you have disobeyed me by failing to grant freedom to your fellow Jews. Very well then. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', declare that I will give you freedom—the freedom to die by the sword, disease, and starvation. And I will make you a disgusting '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “make you a trembling [horror].”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: sight
    - type: text
      text: ' to every nation in the world. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'The officials of Judah and of Jerusalem, together with the palace officials, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:18–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “eunuchs.”
      marker-yv: yv-n
    - type: text
      text: 'the priests, and all the leaders, made a covenant with me. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And to seal their agreement
    - type: text
      text: ' to set their slaves free, they walked between the two halves of a calf that they had cut in two. But they broke the covenant and did not fulfill its terms. So, I will do to these people what they did to the calf. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, then told me to go to Zedekiah king of Judah and give him this message:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you, ‘I am going to hand over this city to the king of Babylon, and he will burn it down. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I will hand them over to their enemies, to those determined to kill them. And their dead bodies will be food for the birds and beasts. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'These enemies are the king of Babylon and his army. They have stopped attacking Jerusalem for now, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nebuchadnezzar broke off his siege of Jerusalem after hearing that an Egyptian army was advancing against him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It was at that time, when it looked as though Nebuchadnezzar had withdrawn his siege, that the people broke their agreement and forced their slaves to return. Since they forced their slaves to return,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: would force Nebuchadnezzar to return and devastate the land.
      marker-yv: yv-n
    - type: text
      text: but they still want to kill King Zedekiah of Judah and his officials. So, I will command them to return and attack again. This time they will conquer the city and burn it to the ground. I will hand over King Zedekiah and all his officials. I will also turn the towns of Judah into an inhabitable wasteland.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You will not escape from his clutches but will certainly be captured and given over to him. You will see the king of Babylon face-to-face and speak to him in person. Then you will go into exile to Babylon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So listen now to the promise of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Zedekiah king of Judah. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say that you will not be executed. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You will die in peace, and incense will be burned for you at your funeral as they burned it for the kings before you. They will mourn for you, saying: “How terrible! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Our highness is dead!
    - type: text
      text: '” I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Then Jeremiah the prophet.”
      marker-yv: yv-n
    - type: text
      text: 'repeated all these words to Zedekiah king of Judah in Jerusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Meanwhile, the army of Babylon was trying to break through the walls of Lachish '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lachish was twenty-three miles (thirty-seven kilometers) southwest of Jerusalem. The now famous Lachish letters, written on pieces of broken pottery, belong to this time period just before the fall of Lachish and Jerusalem in 586 BC.
      marker-yv: yv-n
    - type: text
      text: 'and Azekah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Azekah was about twelve miles (nineteen kilometers) north of Lachish and is mentioned in one of the Lachish letters. The Lachish letters, written in Hebrew, are fragments of nearly twenty letters written during the siege of Jerusalem. They were written just before the final attack of Nebuchadnezzar against the city. The officer in charge of a military outpost between Lachish and Azekah wrote to the officer in charge at Lachish, informing him that he could no longer see Azekah. The Lachish letters are like a voice from the dead confirming the accuracy of Jeremiah’s account.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Second Kings 25:1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: provides the background for this chapter.
      marker-yv: yv-n
    - type: text
      text: the only remaining fortified towns of Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Break a Promise
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to Jeremiah after King Zedekiah had made an agreement with the people of Jerusalem to set free all the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jewish
    - type: text
      text: ' slaves. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 15:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Everyone was to free their Hebrew slaves, men and women, and no longer enslave a fellow Jew. '
