document_id: HEB.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moving On to Deeper Truth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now is the time for us to progress beyond the basic message of Christ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Word [
      - type: usfm
        marker: it
        children:
        - type: text
          text: Logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] of the beginning of Christ.”'
      marker-yv: yv-n
    - type: text
      text: 'and advance into perfection. The foundation has already been laid for us to build upon: turning away from our dead works '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “useless deeds.” “Dead works” are the attempts of people to please God through religion, keeping religious laws and traditions, and serving others to gain influence with God. There was one “work” that brings life to all, that was the work of Christ on the cross.
      marker-yv: yv-n
    - type: text
      text: 'to embrace faith in God, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God, the Faithful One, is not unfair. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “God is not evil.”
      marker-yv: yv-n
    - type: text
      text: 'How can he forget '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: He won’t remember our sins, but will remember our works of loving service to others.
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beautiful
    - type: text
      text: ' work you have done for him? He remembers the love you demonstrate as you continually serve '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text implies financially providing for others.
      marker-yv: yv-n
    - type: text
      text: 'his beloved ones '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “saints” (or “holy ones”).
      marker-yv: yv-n
    - type: text
      text: 'for the glory of his name. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we long to see you passionately advance until the end and you find your hope fulfilled. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t allow your hearts to grow dull '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “dull of heart” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nothros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is taken from a root word meaning “illegitimate child.” The implication is that we don’t see ourselves as a child of illegitimacy, but as a child of intimacy, and that keeps our relationship fervent and passionate.'
      marker-yv: yv-n
    - type: text
      text: 'or lose your enthusiasm, but follow the example of those who fully received what God has promised '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “to those who were heirs of the royal proclamation.”
      marker-yv: yv-n
    - type: text
      text: because of their strong faith and patient endurance.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “because of their faith and the outpouring of the Spirit.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Faithful Promise
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when God made a promise to Abraham, since there was no one greater than himself, he swore an oath on his own integrity '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to keep the promise as sure as God exists! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have no doubt, I promise to bless you over and over,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and give you a son
    - type: text
      text: ' and multiply you without measure!”'
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Abraham waited patiently in faith and succeeded in seeing the promise fulfilled. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'That is, through the birth of Isaac. The Aramaic is fascinating, for the name of Abraham is not in the Greek text in this verse: “And he [God] bestowed his Spirit and he [Abraham] received the kingdom.”'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'It is very common for people to swear an oath by something greater than themselves, for the oath will confirm their statements and end all dispute. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So in the same way, God wanted to end all doubt and confirm it even more forcefully to those who would inherit his promises. His purpose was unchangeable, so God added his vow to the promise. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So it is impossible for God to lie for we know that his promise and his vow will never change!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now we have run into his heart to hide ourselves in his faithfulness. This is where we find his strength and comfort, for he empowers us to seize what has already been established ahead of time—an unshakable hope! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have this certain hope like a strong, unbreakable anchor holding our souls to God himself. Our anchor of hope is fastened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the mercy seat
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text and made explicit as that which is found inside the innermost chamber.
      marker-yv: yv-n
    - type: text
      text: 'in the heavenly realm beyond the sacred threshold, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic, which is literally “beyond the faces of the door.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'teaching about different baptisms, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The New Testament speaks of seven baptisms, including the baptism of fire, the baptism of the Holy Spirit, the baptism of suffering (Jesus’ cross), the baptism into the cloud, the baptism into Moses, the baptism of repentance, and water baptism.
      marker-yv: yv-n
    - type: text
      text: 'impartation by the laying on of hands, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was done in the Old and New Testaments to heal, to bless others, to impart the Holy Spirit and his gifts, to identify with a person (or sacrifice), and to release others to their calling and ministry.
      marker-yv: yv-n
    - type: text
      text: 'resurrection of the dead, and eternal judgment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and where Jesus, our forerunner, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “trailblazer.” Jesus has blazed a trail for us to enter into the sacred chamber and seize the hope that has been fulfilled in his eyes already, to have a company of king-priests who will dwell with him in the holiest of holies and minister from there out to the nations of the earth. The clear implication of vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is that he takes us in to share his throne and his ministry as the royal Priest.
      marker-yv: yv-n
    - type: text
      text: has gone in before us. He is now and forever our royal Priest like Melchizedek.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the order [likeness] of Melchizedek.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So with God’s enablement '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “If God entrusts it to us.” The Aramaic uses here the title for God “the Lord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
    - type: text
      text: we will move on to deeper truths.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning to Never Turn Away
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is impossible to restore an apostate. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, one who has abandoned their faith. Because of the extraordinary length of the Greek sentence, this summary statement implied in the text is given here at the beginning of the paragraph for the sake of English narrative. To say it is impossible does not mean that God cannot bring them to repentance, but that he chooses to leave them in their hardened state, much like Pharaoh who hardened his heart to God. The Aramaic is very clear, “they cannot be renewed to conversion.”
      marker-yv: yv-n
    - type: text
      text: 'For once a person has come into God’s light, and tasted the gifts of the heavenly realm, and has received the Holy Spirit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “has been in [business] partnership with the Holy Spirit.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and feasted on the good Word of God, and has entered into the power of the age that is breaking in, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the age that is about to come.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if he abandons his faith, there is no use even trying to lead him to repentance. By their sin of apostasy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and implied in the Greek.
      marker-yv: yv-n
    - type: text
      text: 'they re-crucify the Son of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “it is impossible to crucify the Son of God again for them to change their own minds!”
      marker-yv: yv-n
    - type: text
      text: and have publicly repudiated him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “have made a public spectacle of him.” The Aramaic can be translated “insulted the Son of God.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: For men’s hearts
    - type: text
      text: ' are just like the soil that drinks up the showers which often fall upon it. Some soil will yield crops as God’s blessing upon the field. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the field continues to produce only thorns and thistles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These are the consequences of sin from the time of Adam. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: a curse hangs over it and it will be burned.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even though we speak like this, beloved, we are fully convinced that there are more beautiful and excellent things, which flow from your salvation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “things which cling to salvation.”
      marker-yv: yv-n
