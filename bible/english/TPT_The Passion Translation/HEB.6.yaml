document_id: HEB.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Moving On to Deeper Truth
  - type: text
    content: 'Now is the time for us to progress beyond the basic message of Christ '
  - type: note
    content: Or “the Word [Logos] of the beginning of Christ.”
  - type: text
    content: 'and advance into perfection. The foundation has already been laid for us to build upon: turning away from our dead works '
  - type: note
    content: Or “useless deeds.” “Dead works” are the attempts of people to please God through religion, keeping religious laws and traditions, and serving others to gain influence with God. There was one “work” that brings life to all, that was the work of Christ on the cross.
  - type: text
    content: 'to embrace faith in God, '
  '10':
  - type: text
    content: 'For God, the Faithful One, is not unfair. '
  - type: note
    content: The Aramaic can be translated “God is not evil.”
  - type: text
    content: 'How can he forget '
  - type: note
    content: He won’t remember our sins, but will remember our works of loving service to others.
  - type: text
    content: 'the '
  - type: text
    content: beautiful
  - type: text
    content: ' work you have done for him? He remembers the love you demonstrate as you continually serve '
  - type: note
    content: The Greek text implies financially providing for others.
  - type: text
    content: 'his beloved ones '
  - type: note
    content: Or “saints” (or “holy ones”).
  - type: text
    content: 'for the glory of his name. '
  '11':
  - type: text
    content: 'But we long to see you passionately advance until the end and you find your hope fulfilled. '
  '12':
  - type: text
    content: 'So don’t allow your hearts to grow dull '
  - type: note
    content: The Greek word for “dull of heart” is nothros, which is taken from a root word meaning “illegitimate child.” The implication is that we don’t see ourselves as a child of illegitimacy, but as a child of intimacy, and that keeps our relationship fervent and passionate.
  - type: text
    content: 'or lose your enthusiasm, but follow the example of those who fully received what God has promised '
  - type: note
    content: The Aramaic can be translated “to those who were heirs of the royal proclamation.”
  - type: text
    content: because of their strong faith and patient endurance.
  - type: note
    content: The Aramaic can be translated “because of their faith and the outpouring of the Spirit.”
  - type: heading
    content: God’s Faithful Promise
  '13':
  - type: text
    content: 'Now when God made a promise to Abraham, since there was no one greater than himself, he swore an oath on his own integrity '
  - type: note
    content: See Gen. 22:16–17.
  - type: text
    content: 'to keep the promise as sure as God exists! '
  '14':
  - type: text
    content: So he said,
  - type: text
    content: “Have no doubt, I promise to bless you over and over,
  - type: text
    content: and give you a son
  - type: text
    content: ' and multiply you without measure!”'
  '15':
  - type: text
    content: 'So Abraham waited patiently in faith and succeeded in seeing the promise fulfilled. '
  - type: note
    content: 'That is, through the birth of Isaac. The Aramaic is fascinating, for the name of Abraham is not in the Greek text in this verse: “And he [God] bestowed his Spirit and he [Abraham] received the kingdom.”'
  '16':
  - type: text
    content: 'It is very common for people to swear an oath by something greater than themselves, for the oath will confirm their statements and end all dispute. '
  '17':
  - type: text
    content: 'So in the same way, God wanted to end all doubt and confirm it even more forcefully to those who would inherit his promises. His purpose was unchangeable, so God added his vow to the promise. '
  '18':
  - type: text
    content: So it is impossible for God to lie for we know that his promise and his vow will never change!
  - type: text
    content: 'And now we have run into his heart to hide ourselves in his faithfulness. This is where we find his strength and comfort, for he empowers us to seize what has already been established ahead of time—an unshakable hope! '
  '19':
  - type: text
    content: 'We have this certain hope like a strong, unbreakable anchor holding our souls to God himself. Our anchor of hope is fastened '
  - type: text
    content: to the mercy seat
  - type: text
    content: ' '
  - type: note
    content: Implied in the text and made explicit as that which is found inside the innermost chamber.
  - type: text
    content: 'in the heavenly realm beyond the sacred threshold, '
  - type: note
    content: As translated from the Aramaic, which is literally “beyond the faces of the door.”
  '2':
  - type: text
    content: 'teaching about different baptisms, '
  - type: note
    content: The New Testament speaks of seven baptisms, including the baptism of fire, the baptism of the Holy Spirit, the baptism of suffering (Jesus’ cross), the baptism into the cloud, the baptism into Moses, the baptism of repentance, and water baptism.
  - type: text
    content: 'impartation by the laying on of hands, '
  - type: note
    content: This was done in the Old and New Testaments to heal, to bless others, to impart the Holy Spirit and his gifts, to identify with a person (or sacrifice), and to release others to their calling and ministry.
  - type: text
    content: 'resurrection of the dead, and eternal judgment. '
  '20':
  - type: text
    content: 'and where Jesus, our forerunner, '
  - type: note
    content: Or “trailblazer.” Jesus has blazed a trail for us to enter into the sacred chamber and seize the hope that has been fulfilled in his eyes already, to have a company of king-priests who will dwell with him in the holiest of holies and minister from there out to the nations of the earth. The clear implication of vv. 19–20 is that he takes us in to share his throne and his ministry as the royal Priest.
  - type: text
    content: has gone in before us. He is now and forever our royal Priest like Melchizedek.
  - type: note
    content: Or “in the order [likeness] of Melchizedek.”
  '3':
  - type: text
    content: 'So with God’s enablement '
  - type: note
    content: Or “If God entrusts it to us.” The Aramaic uses here the title for God “the Lord YHWH.”
  - type: text
    content: we will move on to deeper truths.
  - type: heading
    content: A Warning to Never Turn Away
  '4':
  - type: text
    content: 'It is impossible to restore an apostate. '
  - type: note
    content: That is, one who has abandoned their faith. Because of the extraordinary length of the Greek sentence, this summary statement implied in the text is given here at the beginning of the paragraph for the sake of English narrative. To say it is impossible does not mean that God cannot bring them to repentance, but that he chooses to leave them in their hardened state, much like Pharaoh who hardened his heart to God. The Aramaic is very clear, “they cannot be renewed to conversion.”
  - type: text
    content: 'For once a person has come into God’s light, and tasted the gifts of the heavenly realm, and has received the Holy Spirit, '
  - type: note
    content: Or “has been in [business] partnership with the Holy Spirit.”
  '5':
  - type: text
    content: 'and feasted on the good Word of God, and has entered into the power of the age that is breaking in, '
  - type: note
    content: Or “the age that is about to come.”
  '6':
  - type: text
    content: 'if he abandons his faith, there is no use even trying to lead him to repentance. By their sin of apostasy '
  - type: note
    content: As translated from the Aramaic and implied in the Greek.
  - type: text
    content: 'they re-crucify the Son of God, '
  - type: note
    content: Or “it is impossible to crucify the Son of God again for them to change their own minds!”
  - type: text
    content: and have publicly repudiated him.
  - type: note
    content: Or “have made a public spectacle of him.” The Aramaic can be translated “insulted the Son of God.”
  '7':
  - type: text
    content: For men’s hearts
  - type: text
    content: ' are just like the soil that drinks up the showers which often fall upon it. Some soil will yield crops as God’s blessing upon the field. '
  '8':
  - type: text
    content: 'But if the field continues to produce only thorns and thistles '
  - type: note
    content: These are the consequences of sin from the time of Adam. See Gen. 3:18.
  - type: text
    content: a curse hangs over it and it will be burned.
  '9':
  - type: text
    content: Even though we speak like this, beloved, we are fully convinced that there are more beautiful and excellent things, which flow from your salvation.
  - type: note
    content: Or “things which cling to salvation.”
