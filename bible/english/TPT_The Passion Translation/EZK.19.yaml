      - type: text
        text: As translated from ancient versions, Theodotion, and the Targum. The Hebrew is “He knew [had sex with] their widows,” which was the custom of kings in the ancient world when they had defeated a rival. Similarly, when a new lion becomes the dominant male of the pride, he mates with all the females to establish his status. Thus, this clause suggests that the mother’s second son became Judah’s king.
    marker-yv: yv-n
