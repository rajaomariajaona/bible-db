document_id: EZK.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Sorrow
  - type: text
    content: '“Now Ezekiel, sing this funeral song to mourn the rulers '
  - type: note
    content: Or “princes,” the term Ezekiel uses throughout his book for kings.
  - type: text
    content: 'of Israel, '
  '10':
  - type: text
    content: “ ‘Your mother was like a grapevine
  - type: text
    content: planted beside a stream,
  - type: text
    content: with luscious fruit and full of branches,
  - type: text
    content: because the water flowed so abundantly.
  - type: note
    content: In vv. 10–14 the parable changes to a different metaphor but with the same theme. Here Israel is the fruitful vine, and her sons are the branches.
  '11':
  - type: text
    content: She grew strong branches, and some grew very high,
  - type: text
    content: which became royal scepters.
  - type: text
    content: The vine grew higher and higher,
  - type: text
    content: up into the clouds.
  - type: text
    content: Everyone could see her towering height
  - type: text
    content: and the vast number of her branches.
  '12':
  - type: text
    content: 'But '
  - type: text
    content: disaster struck the vine
  - type: text
    content: .
  - type: text
    content: 'Angry, '
  - type: text
    content: mighty hands
  - type: text
    content: ' pulled it up by its roots'
  - type: note
    content: That is, the hands of God came against Israel in judgment and devastated the nation.
  - type: text
    content: and threw it to the ground.
  - type: text
    content: 'The '
  - type: text
    content: hot
  - type: text
    content: ' east wind dried it up,'
  - type: text
    content: 'and her fruit shriveled '
  - type: text
    content: and fell to the ground
  - type: text
    content: .
  - type: note
    content: Literally “[her fruit] was broken in pieces.”
  - type: text
    content: 'Her strong stem '
  - type: note
    content: Her “strong stem” is likely a reference to King Zedekiah.
  - type: text
    content: was withered
  - type: text
    content: and was consumed by the fire.
  '13':
  - type: text
    content: 'Now '
  - type: text
    content: what remains of her
  - type: text
    content: ' has been transplanted to the desert,'
  - type: text
    content: to a dry and thirsty land.
  - type: note
    content: That is, Israel was “transplanted” into captivity in Babylon.
  '14':
  - type: text
    content: Fire spread from her stem
  - type: text
    content: and devoured its fruit.
  - type: text
    content: There is not a strong branch left
  - type: text
    content: that could become a scepter for a king.’ ”
  - type: text
    content: This is a funeral song of lament, and it should be used as such.
  '2':
  - type: text
    content: saying,
  - type: text
    content: “ ‘What a lioness was your mother among lions!
  - type: note
    content: Or “What is your mother? A lioness!” The “lioness” is a metaphor for the royal lineage of King David (see Gen. 49:9). The “mother” likely represents Israel; however, some see the mother as Hamutal, the wife of Josiah and mother of Jehoahaz and Zedekiah. In Ezek. 19:2–9, there are four different Hebrew words used for the lions (words for “lioness,” “lions,” “young lions,” and “cubs”).
  - type: text
    content: She lay down among the young lions
  - type: text
    content: and reared her cubs.
  '3':
  - type: text
    content: One of the cubs she raised
  - type: text
    content: grew into a young and powerful man-eating lion
  - type: note
    content: This ferocious lion is King Jehoahaz, who was only twenty-three when he ascended to the throne.
  - type: text
    content: who learned to hunt and devour his prey.
  '4':
  - type: text
    content: The nations heard about him,
  - type: text
    content: and they trapped him in their pit.
  - type: text
    content: With hooks they dragged him off to Egypt.
  - type: note
    content: Jehoahaz was deposed and taken captive to Egypt in 609 BC. See 2 Kings 23:31–34.
  '5':
  - type: text
    content: 'When she realized '
  - type: text
    content: that he was not coming back
  - type: text
    content: ','
  - type: text
    content: she despaired and her hopes were dashed.
  - type: text
    content: 'She chose another of her cubs '
  - type: text
    content: to take his place
  - type: text
    content: and made a powerful lion of him too.
  - type: note
    content: Modern Christian commentators see here a reference to King Jehoiachin while Jewish scholars believe it is King Jehoiakim.
  '6':
  - type: text
    content: He prowled among the pride
  - type: text
    content: and grew into a powerful man-eating lion,
  - type: text
    content: who learned to hunt and devour his prey.
  '7':
  - type: text
    content: He demolished their strongholds
  - type: note
    content: As translated from ancient versions, Theodotion, and the Targum. The Hebrew is “He knew [had sex with] their widows,” which was the custom of kings in the ancient world when they had defeated a rival. Similarly, when a new lion becomes the dominant male of the pride, he mates with all the females to establish his status. Thus, this clause suggests that the mother’s second son became Judah’s king.
  - type: text
    content: and destroyed their cities.
  - type: text
    content: Whenever the lion released his roar,
  - type: text
    content: the land and all the people were terrified!
  '8':
  - type: text
    content: The nations marched out against him
  - type: text
    content: from all around.
  - type: text
    content: They threw their net over him,
  - type: text
    content: and he was trapped in their pit.
  '9':
  - type: text
    content: With their hooks they captured him,
  - type: note
    content: Or “put him in a cage.”
  - type: text
    content: led him with bands around his neck to the king of Babylon.
  - type: text
    content: They threw him into a dungeon
  - type: text
    content: so that his roar could never be heard again
  - type: text
    content: on the mountains of Israel.
  - type: note
    content: See 2 Kings 24:8–17.
