  - type: text
    content: ' said to me: “Even if Moses and Samuel '
  - type: note
    content: See Ezek. 14:14. Moses the lawgiver and Samuel the prophet were both considered unusually close to God as men of prayer and thus would be the most likely to move God through intercession to spare the people. See Ex. 32:11–14, 31–34; Num. 14:13–25; 1 Sam. 7:5–10; 12:19; Ps. 99:6. Moses (see Ex. 32:30–32) and Samuel (see 1 Sam. 7:1–10) both led the people into repentance and cleansing, and then they interceded on their behalf. In Jeremiah’s case, there was no repentance, and thus no remedy.
