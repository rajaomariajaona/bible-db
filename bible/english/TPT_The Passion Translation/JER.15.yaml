  - type: text
    content: If you separate the precious from the worthless,
  - type: note
    content: Or “If you bring forth [words] that are more precious than trash.” The “precious” was the truth of God’s love and faithfulness toward his people. The “worthless” was Jeremiah’s attitude that God was somehow failing him. God was telling Jeremiah to cleanse his heart from baseless suspicions and doubts over God’s faithfulness. God does not want a hopeless person to be his messenger. Our undiluted message must be “So wonderfully great is [his] faithfulness!” (Lam. 3:23).
