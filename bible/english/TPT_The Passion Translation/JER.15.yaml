    content: 'When you speak to me, '
  - type: note
    content: Or “When I discovered your words.” This could be a reference to the discovery of the book of the law in the temple by the high priest Hilkiah in 621 BC (see 2 Kings 22:8–11; 2 Chron. 34:14–15).
  - type: text
    content: I devour every word.
  - type: note
    content: 'Some commentators suggest that “I devour every word” refers to Jeremiah speaking the prophetic words of Yahweh, which would carry the meaning: “When your words come to me, they become my words [message],” or “they become part of me.” See Ezek. 3:1–3; Rev. 10:9, 10. According to David Kimchi, the Jewish sage who paraphrased Jeremiah, it is: “Your words descended upon me in the spirit of prophecy, and I joyfully welcomed them as one has pleasure in eating something tasty.”'
