  '12':
  - type: text
    content: “Will a man break the hardest iron or bronze?
  - type: note
    content: This is arguably one of the most difficult verses in Jeremiah to interpret. The literal Hebrew is “Will iron break iron from the north, and bronze?” Or possibly “Can one break iron, iron from the north, and bronze?” If Yahweh is speaking, he is drawing a comparison between Israel (iron) and her stronger enemies (Babylon) from the north (iron from the north, and bronze). If Jeremiah is speaking, he is drawing a comparison between his own strength (iron) and that of his enemies (iron from the north, and bronze).
