document_id: EZK.46,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prince and the Feasts
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “The east gate of the inner courtyard must remain closed for the six working days. '
  - type: note
    content: That is, from Sunday to Friday.
  - type: text
    content: 'However, on the Sabbath day and the day of the new moon, it will be open. '
  '11':
  - type: text
    content: '“On the feast days and solemn festivals the '
  - type: text
    content: prince’s
  - type: text
    content: ' grain offering must be one ephah for every bull, one ephah for every ram, and as much as he wants for the lambs, and a hin of oil for every ephah '
  - type: text
    content: of grain
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'When the prince offers me a freewill burnt offering or a freewill fellowship sacrifice, the east gate must be opened for him, and he will make his offering as he does on the Sabbath day. When he leaves, the '
  - type: text
    content: priests
  - type: text
    content: ' will shut the gate behind him.'
  '13':
  - type: text
    content: '“Every day, he '
  - type: note
    content: As translated from a few Hebrew manuscripts, the Septuagint, and the Vulgate. Most Hebrew manuscripts have “you.” However, it is doubtful that “you” is referring to Ezekiel and more likely that it is referring to the “prince.”
  - type: text
    content: 'must provide a year-old flawless lamb as a burnt offering to me for the morning sacrifice. '
  '14':
  - type: text
    content: 'Additionally, every morning, he must provide a grain offering of one-sixth of an '
  - type: text
    content: ephah
  - type: text
    content: ' and one-third hin of olive oil, to mix with the flour. This grain offering to me will be a lasting ordinance for all time. '
  '15':
  - type: text
    content: 'Every single morning, the lamb, the grain, and the olive oil must be offered '
  - type: text
    content: to me
  - type: text
    content: .”
  - type: heading
    content: The Prince’s Land
  '16':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “If the prince gives a gift of his land to any of his sons, that land will belong to his descendants. It is their property by inheritance. '
  '17':
  - type: text
    content: 'If, however, he gives part of his inheritance to one of his servants, it will belong to him until the year of liberty, and then it must return to the prince. '
  - type: note
    content: Or “then it will come to an end.” The year of liberty is most likely the Year of Jubilee. See Lev. 25:8–55. The purpose of this law was so that the prince’s family would never permanently lose the property of their family line.
  - type: text
    content: 'Only he and his sons will own it permanently. '
  '18':
  - type: text
    content: 'The prince may not evict anyone from their land or seize any part of the family property '
  - type: text
    content: of any Israelite
  - type: text
    content: . He must provide an inheritance for his sons out of his own property so that no member of my people is robbed of what is his!”
  - type: note
    content: Or “is scattered from his property.”
  - type: heading
    content: The Sacred Kitchens
  '19':
  - type: text
    content: 'Then the '
  - type: text
    content: shining
  - type: text
    content: ' man took me through the entrance at the side of the north gate that leads to the priests’ holy chambers. And behold, there before us was a place at the western end of the rooms. '
  '2':
  - type: text
    content: 'The prince must enter through the porch of the outer gate and stand by the posts of the gateway as the priests offer his burnt offering and his fellowship offering on his behalf. He must bow down and worship at the threshold of the gate. Then the prince will go out '
  - type: text
    content: the same gate he entered
  - type: text
    content: ', but the gate will remain open until evening. '
  '20':
  - type: text
    content: He said to me, “This is the kitchen where the priests must boil the guilt offering and the sin offering, and where they must bake the grain offering without having to carry them into the outer court and inadvertently transmit holiness to the people.”
  '21':
  - type: text
    content: 'Then he brought me out to the outer court and led me to each of its four corners. And in each corner of the outer court was an enclosure. '
  '22':
  - type: text
    content: 'Each enclosure in the corners was the same size, forty cubits by thirty cubits. '
  - type: note
    content: About 70 feet by 52.5 feet (21.3 meters by 16 meters).
  '23':
  - type: text
    content: 'All four enclosures had stone shelves on the walls '
  - type: note
    content: Or “a ledge of stone all around the inside of each of the walls.” These “ledges” were most likely courses of stone masonry designed to enclose the fireplaces.
  - type: text
    content: with built-in fireplaces all around the walls under the ledge.
  '24':
  - type: text
    content: 'Then the '
  - type: text
    content: shining
  - type: text
    content: ' man said to me, “These are the kitchens where the temple servants '
  - type: note
    content: That is, the Levites.
  - type: text
    content: will cook the sacrifices the people offer.”
  '3':
  - type: text
    content: 'Each Sabbath and each new moon, all the people of the land will bow down and worship in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: ' at the entrance to the gate.'
  '4':
  - type: text
    content: '“On the Sabbath, I want the prince to bring to me six lambs and one ram, all without flaws, and the '
  - type: text
    content: priests
  - type: text
    content: ' will burn them as an offering to me. '
  '5':
  - type: text
    content: 'Additionally, I want the prince to also give me one ephah of grain with the ram as an offering and as much grain offering as he wants to give for each lamb, plus a hin '
  - type: note
    content: A hin is one-sixteenth of a bath (a bath is slightly over five gallons, or nineteen liters). Also vv. 7, 11, 14.
  - type: text
    content: 'of olive oil for every ephah '
  - type: text
    content: of flour
  - type: text
    content: .
  '6':
  - type: text
    content: '“On the day of the new moon, I want the prince to offer '
  - type: text
    content: to me
  - type: text
    content: ' a young unblemished bull, six unblemished lambs, and one unblemished ram. '
  '7':
  - type: text
    content: 'And with his offerings, I want him also to bring to me one ephah '
  - type: text
    content: of grain
  - type: text
    content: ' for the bull and one ephah '
  - type: text
    content: of grain
  - type: text
    content: ' for the ram, and as much flour and oil as he wants for the lambs, and a hin of oil for every ephah of grain.'
  '8':
  - type: text
    content: “When the prince enters, he must enter and exit the outer courtyard by the porch of the gate.
  '9':
  - type: text
    content: “When the people of Israel come into my presence for the solemn festivals, the prince will be with them, coming in with them and going out with them. When they enter the outer courtyard, they will all go in from either the north side or south side of the temple. Those who have come in by the north gate to bow in worship must go out by the south gate, and those who have come in by the south gate must go out by the north gate. No one will turn around and leave through the same gate by which he entered, but they must go out on the opposite side.
  - type: note
    content: That is, no one can be in God’s presence and leave the same way as they came. God’s presence changes us, transforms us, and touches our lives indelibly.
