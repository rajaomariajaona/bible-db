document_id: EZK.46,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prince and the Feasts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: “The east gate of the inner courtyard must remain closed for the six working days. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, from Sunday to Friday.
      marker-yv: yv-n
    - type: text
      text: 'However, on the Sabbath day and the day of the new moon, it will be open. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“On the feast days and solemn festivals the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prince’s
    - type: text
      text: ' grain offering must be one ephah for every bull, one ephah for every ram, and as much as he wants for the lambs, and a hin of oil for every ephah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of grain
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When the prince offers me a freewill burnt offering or a freewill fellowship sacrifice, the east gate must be opened for him, and he will make his offering as he does on the Sabbath day. When he leaves, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' will shut the gate behind him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Every day, he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from a few Hebrew manuscripts, the Septuagint, and the Vulgate. Most Hebrew manuscripts have “you.” However, it is doubtful that “you” is referring to Ezekiel and more likely that it is referring to the “prince.”
      marker-yv: yv-n
    - type: text
      text: 'must provide a year-old flawless lamb as a burnt offering to me for the morning sacrifice. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Additionally, every morning, he must provide a grain offering of one-sixth of an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ephah
    - type: text
      text: ' and one-third hin of olive oil, to mix with the flour. This grain offering to me will be a lasting ordinance for all time. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Every single morning, the lamb, the grain, and the olive oil must be offered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to me
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prince’s Land
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: “If the prince gives a gift of his land to any of his sons, that land will belong to his descendants. It is their property by inheritance. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If, however, he gives part of his inheritance to one of his servants, it will belong to him until the year of liberty, and then it must return to the prince. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “then it will come to an end.” The year of liberty is most likely the Year of Jubilee. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 25:8–55
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The purpose of this law was so that the prince’s family would never permanently lose the property of their family line.
      marker-yv: yv-n
    - type: text
      text: 'Only he and his sons will own it permanently. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The prince may not evict anyone from their land or seize any part of the family property '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of any Israelite
    - type: text
      text: . He must provide an inheritance for his sons out of his own property so that no member of my people is robbed of what is his!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “is scattered from his property.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sacred Kitchens
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man took me through the entrance at the side of the north gate that leads to the priests’ holy chambers. And behold, there before us was a place at the western end of the rooms. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The prince must enter through the porch of the outer gate and stand by the posts of the gateway as the priests offer his burnt offering and his fellowship offering on his behalf. He must bow down and worship at the threshold of the gate. Then the prince will go out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the same gate he entered
    - type: text
      text: ', but the gate will remain open until evening. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He said to me, “This is the kitchen where the priests must boil the guilt offering and the sin offering, and where they must bake the grain offering without having to carry them into the outer court and inadvertently transmit holiness to the people.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then he brought me out to the outer court and led me to each of its four corners. And in each corner of the outer court was an enclosure. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Each enclosure in the corners was the same size, forty cubits by thirty cubits. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 70 feet by 52.5 feet (21.3 meters by 16 meters).
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'All four enclosures had stone shelves on the walls '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a ledge of stone all around the inside of each of the walls.” These “ledges” were most likely courses of stone masonry designed to enclose the fireplaces.
      marker-yv: yv-n
    - type: text
      text: with built-in fireplaces all around the walls under the ledge.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man said to me, “These are the kitchens where the temple servants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the Levites.
      marker-yv: yv-n
    - type: text
      text: will cook the sacrifices the people offer.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Each Sabbath and each new moon, all the people of the land will bow down and worship in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' at the entrance to the gate.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“On the Sabbath, I want the prince to bring to me six lambs and one ram, all without flaws, and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' will burn them as an offering to me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Additionally, I want the prince to also give me one ephah of grain with the ram as an offering and as much grain offering as he wants to give for each lamb, plus a hin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A hin is one-sixteenth of a bath (a bath is slightly over five gallons, or nineteen liters). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'of olive oil for every ephah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of flour
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“On the day of the new moon, I want the prince to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to me
    - type: text
      text: ' a young unblemished bull, six unblemished lambs, and one unblemished ram. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And with his offerings, I want him also to bring to me one ephah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of grain
    - type: text
      text: ' for the bull and one ephah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of grain
    - type: text
      text: ' for the ram, and as much flour and oil as he wants for the lambs, and a hin of oil for every ephah of grain.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “When the prince enters, he must enter and exit the outer courtyard by the porch of the gate.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: “When the people of Israel come into my presence for the solemn festivals, the prince will be with them, coming in with them and going out with them. When they enter the outer courtyard, they will all go in from either the north side or south side of the temple. Those who have come in by the north gate to bow in worship must go out by the south gate, and those who have come in by the south gate must go out by the north gate. No one will turn around and leave through the same gate by which he entered, but they must go out on the opposite side.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, no one can be in God’s presence and leave the same way as they came. God’s presence changes us, transforms us, and touches our lives indelibly.
      marker-yv: yv-n
