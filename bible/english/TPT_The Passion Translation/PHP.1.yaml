        text: .
    marker-yv: yv-n
  - type: text
    text: 'In my life or in my death, Christ will be magnified in me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: My true life is the Anointed One, and dying means gaining more of him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: usfm
    marker: it
    children:
    - type: text
      text: So here’s my dilemma
  - type: text
    text: ': Each day I live means bearing more fruit in my ministry; yet I fervently long to be liberated from this body '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22–24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: analyō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “to fold up a tent and depart.” Sailors used this word to say, “loose the ship and set sail.” And farmers used'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: analyō
