        text: to mean “to unyoke an oxen” (set it free).
    marker-yv: yv-n
  - type: text
    text: and joined fully to Christ. That would suit me fine, but the greatest advantage to you would be that I remain alive. So you can see why I’m torn between the two—I don’t know which I prefer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Yet deep in my heart I’m confident that I will be spared so I can add to your joy and further strengthen and mature your faith. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that I could help with your pioneer advance and joy in faith.” Paul was excited to help them make new pioneer advances in their faith and joy.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When I am freed to come to you, my deliverance will give you a reason to boast even more in Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Whatever happens, keep living your lives based on the reality of the gospel of Christ. Then when I come to see you, or hear good reports of you, I’ll know that you stand united in one Spirit and one passion—celebrating together as conquerors '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated literally from the Aramaic. The Greek states “striving side by side with one mind.”
    marker-yv: yv-n
  - type: text
    text: 'in the faith of the gospel. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “his revelation.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And then you will never be shaken or intimidated by the opposition that rises up against us. Your courage will prove to be a sure sign from God of their coming destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For God has graciously given you the privilege not only to believe in Christ, but also to suffer for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For you have been called by him to endure the conflict in the same way I have endured it—for you know I’m not giving up.
