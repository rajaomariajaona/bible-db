document_id: PHP.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'From Paul and Timothy, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Timothy was Paul’s convert, coworker, and spiritual son. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 1:2
      metadata:
        usfm: 1TI.1.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'both of us servants of Jesus, the Anointed One. To all his devoted followers in Philippi, including your pastors, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “guardians,” as translated from the Greek. The Aramaic text uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and could refer to Jewish priests who had received Jesus as the Messiah.'
    marker-yv: yv-n
  - type: text
    text: 'and to all the servant-leaders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text is “deacons.” The word for deacon is actually taken from a Greek compound of the words
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kovis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that means “to kick up the dust,” referring to a servant who is so swift to accomplish his service that he stirs up the dust of the street running to fulfill his duty.
    marker-yv: yv-n
  - type: text
    text: of the church.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May the blessings of divine grace and supernatural peace that flow from God our wonderful Father, and our Messiah, the Lord Jesus, be upon your lives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Prays for the Philippians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'My prayers for you are full of praise to God as I give him thanks for you with great joy! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I’m so grateful for our union
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and our enduring partnership that began the first time I presented to you the gospel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: I pray with great faith for you
  - type: text
    text: ', because I’m fully convinced that the One who began this gracious work '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “good [worthwhile] work.” Paul uses language here that sounds similar to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 1:2
      metadata:
        usfm: GEN.1.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . When God created the heavens and the earth, he declared it to be “good.” And now with the new creation life within us, God again sees our growth in grace as something good.
    marker-yv: yv-n
  - type: text
    text: 'in you will faithfully continue the process of maturing you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he will see to it that you remain faithful.”
    marker-yv: yv-n
  - type: text
    text: 'until the unveiling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “day of Christ.” This is the day of his unveiling, his appearing.
    marker-yv: yv-n
  - type: text
    text: of our Lord Jesus Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It’s no wonder I pray with such confidence, since you have a permanent place in my heart! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “since you have given me a permanent place in your hearts.”
    marker-yv: yv-n
  - type: text
    text: 'You have remained partners with me in the wonderful grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God
  - type: text
    text: ' even though I’m here in chains for standing up for the truth of the gospel. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the truth of God’s revelation.” The Greek can also be translated “for the defense and proof (a possible hendiadys) of the gospel.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Only God knows how much I dearly love you with the tender affection '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “mercies.”
    marker-yv: yv-n
  - type: text
    text: of Jesus, the Anointed One.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I continue to pray for your love to grow and increase beyond measure, bringing you into the rich revelation of spiritual insight '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “insight” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: aisthēsis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is a hapax legomenon in the New Testament and used numerous times in the Septuagint referring to practical understanding linked to life. It is a word that implies walking out the truth that insight reveals. It could also be translated “experience,” or “to experience the reality of something and apply it to life.”
    marker-yv: yv-n
  - type: text
    text: in all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This will enable you to choose '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “choose” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: dokimazō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) means “to examine, to discern, or approve after testing.” It comes from a root word that means “accepted” or “pleasing.” So discernment becomes the path to finding what God approves, not simply what God forbids. When love, revelation, and insight overflow into our discernment, we will always be looking for what is excellent and pleasing in God’s eyes. We choose what is best, not by law or rules, but by loving discernment.
    marker-yv: yv-n
  - type: text
    text: 'the most excellent way of all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Greek. The Aramaic can be translated “choose those things that bring contentment.”
    marker-yv: yv-n
  - type: text
    text: '—becoming pure and without offense until the unveiling of Christ. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in preparation for the day of Christ.” This is the day of his unveiling at his appearing.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you will be filled completely with the fruits of righteousness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the fruit that is righteousness.”
    marker-yv: yv-n
  - type: text
    text: that are found in Jesus, the Anointed One—bringing great praise and glory to God!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Imprisonment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I want you to know, dear ones, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my brothers.”
    marker-yv: yv-n
  - type: text
    text: 'what has happened to me has not hindered, but helped my ministry of preaching the gospel, causing it to expand and spread to many people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For now the elite Roman guards and government officials '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Caesar’s court.”
    marker-yv: yv-n
  - type: text
    text: 'overseeing my imprisonment have plainly recognized that I am here because of my love for the Anointed One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And what I’m going through has actually caused many believers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “brothers.”
    marker-yv: yv-n
  - type: text
    text: to become even more courageous in the Lord and to be bold and passionate to preach the Word of God, all because of my chains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It’s true that there are some who preach Christ out of competition and controversy, for they are jealous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: over the way God has used me
  - type: text
    text: '. Many others '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have purer motives
  - type: text
    text: '—they preach with grace and love filling their hearts, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “with goodwill.” This translation has borrowed the term “love” from v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: PHP.1.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and made it explicit here as the purest motive for preaching the gospel.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: because they know I’ve been destined for the purpose of defending the revelation of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “the gospel.” The implication from the Aramaic is that some of these preachers (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PHP.1.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) had been ordained by Paul.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Those who preach Christ with ambition and competition are insincere—they just want to add to the hardships of my imprisonment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yet in spite of all of this I am overjoyed! For what does it matter as long as Christ is being preached? If they preach him with mixed motives or with genuine love, the message of Christ is still being preached. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: And I will continue to rejoice
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'because I know that the lavish supply '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “supply” can also be translated “festive chorus.”
    marker-yv: yv-n
  - type: text
    text: 'of the Spirit of Jesus, the Anointed One, and your intercession for me will bring about my deliverance. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A quotation from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 13:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (LXX).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'No matter what, I will continue to hope and passionately cling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apokaradokia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and can be translated “with the deepest and intense yearnings,” or “the concentrated desire that abandons all other interests with outstretched hands in expectation.” It is possible that Paul uses the words “passionately cling,” and “hope” as a hendiadys (i.e., “my hope-filled intense expectation”).
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romans 8:19
      metadata:
        usfm: ROM.8.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the only other place in the New Testament where
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apokaradokia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is found.
    marker-yv: yv-n
  - type: text
    text: 'to Christ, so that he will be openly revealed through me before everyone’s eyes. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “with uncovered faces.” Some interpret it to mean without shame.
    marker-yv: yv-n
  - type: text
    text: 'So I will not be ashamed! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 1:16
      metadata:
        usfm: ROM.1.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 10:8
      metadata:
        usfm: 2CO.10.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 4:16
      metadata:
        usfm: 1PE.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 John 2:28
      metadata:
        usfm: 1JN.2.28
    - type: usfm
      marker: ft
