document_id: PHP.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'From Paul and Timothy, '
  - type: note
    content: Timothy was Paul’s convert, coworker, and spiritual son. See 1 Tim. 1:2.
  - type: text
    content: 'both of us servants of Jesus, the Anointed One. To all his devoted followers in Philippi, including your pastors, '
  - type: note
    content: Or “guardians,” as translated from the Greek. The Aramaic text uses the word priests, and could refer to Jewish priests who had received Jesus as the Messiah.
  - type: text
    content: 'and to all the servant-leaders '
  - type: note
    content: As translated from the Aramaic. The Greek text is “deacons.” The word for deacon is actually taken from a Greek compound of the words dia and kovis that means “to kick up the dust,” referring to a servant who is so swift to accomplish his service that he stirs up the dust of the street running to fulfill his duty.
  - type: text
    content: of the church.
  '10':
  - type: text
    content: 'This will enable you to choose '
  - type: note
    content: The Greek word for “choose” (dokimazō) means “to examine, to discern, or approve after testing.” It comes from a root word that means “accepted” or “pleasing.” So discernment becomes the path to finding what God approves, not simply what God forbids. When love, revelation, and insight overflow into our discernment, we will always be looking for what is excellent and pleasing in God’s eyes. We choose what is best, not by law or rules, but by loving discernment.
  - type: text
    content: 'the most excellent way of all '
  - type: note
    content: As translated from the Greek. The Aramaic can be translated “choose those things that bring contentment.”
  - type: text
    content: '—becoming pure and without offense until the unveiling of Christ. '
  - type: note
    content: Or “in preparation for the day of Christ.” This is the day of his unveiling at his appearing.
  '11':
  - type: text
    content: 'And you will be filled completely with the fruits of righteousness '
  - type: note
    content: Or “the fruit that is righteousness.”
  - type: text
    content: that are found in Jesus, the Anointed One—bringing great praise and glory to God!
  - type: heading
    content: Paul’s Imprisonment
  '12':
  - type: text
    content: 'I want you to know, dear ones, '
  - type: note
    content: Or “my brothers.”
  - type: text
    content: 'what has happened to me has not hindered, but helped my ministry of preaching the gospel, causing it to expand and spread to many people. '
  '13':
  - type: text
    content: 'For now the elite Roman guards and government officials '
  - type: note
    content: Or “Caesar’s court.”
  - type: text
    content: 'overseeing my imprisonment have plainly recognized that I am here because of my love for the Anointed One. '
  '14':
  - type: text
    content: 'And what I’m going through has actually caused many believers '
  - type: note
    content: Or “brothers.”
  - type: text
    content: to become even more courageous in the Lord and to be bold and passionate to preach the Word of God, all because of my chains.
  '15':
  - type: text
    content: 'It’s true that there are some who preach Christ out of competition and controversy, for they are jealous '
  - type: text
    content: over the way God has used me
  - type: text
    content: '. Many others '
  - type: text
    content: have purer motives
  - type: text
    content: '—they preach with grace and love filling their hearts, '
  - type: note
    content: Or “with goodwill.” This translation has borrowed the term “love” from v. 16 and made it explicit here as the purest motive for preaching the gospel.
  '16':
  - type: text
    content: because they know I’ve been destined for the purpose of defending the revelation of God.
  - type: note
    content: As translated from the Aramaic. The Greek is “the gospel.” The implication from the Aramaic is that some of these preachers (v. 15) had been ordained by Paul.
  '17':
  - type: text
    content: 'Those who preach Christ with ambition and competition are insincere—they just want to add to the hardships of my imprisonment. '
  '18':
  - type: text
    content: 'Yet in spite of all of this I am overjoyed! For what does it matter as long as Christ is being preached? If they preach him with mixed motives or with genuine love, the message of Christ is still being preached. '
  - type: text
    content: And I will continue to rejoice
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'because I know that the lavish supply '
  - type: note
    content: The Greek word for “supply” can also be translated “festive chorus.”
  - type: text
    content: 'of the Spirit of Jesus, the Anointed One, and your intercession for me will bring about my deliverance. '
  - type: note
    content: A quotation from Job 13:16 (LXX).
  '2':
  - type: text
    content: May the blessings of divine grace and supernatural peace that flow from God our wonderful Father, and our Messiah, the Lord Jesus, be upon your lives.
  - type: heading
    content: Paul Prays for the Philippians
  '20':
  - type: text
    content: 'No matter what, I will continue to hope and passionately cling '
  - type: note
    content: The Greek word is apokaradokia and can be translated “with the deepest and intense yearnings,” or “the concentrated desire that abandons all other interests with outstretched hands in expectation.” It is possible that Paul uses the words “passionately cling,” and “hope” as a hendiadys (i.e., “my hope-filled intense expectation”). Romans 8:19 is the only other place in the New Testament where apokaradokia is found.
  - type: text
    content: 'to Christ, so that he will be openly revealed through me before everyone’s eyes. '
  - type: note
    content: Literally “with uncovered faces.” Some interpret it to mean without shame.
  - type: text
    content: 'So I will not be ashamed! '
  - type: note
    content: See also Rom. 1:16; 2 Cor. 10:8; 1 Peter 4:16; 1 John 2:28.
  - type: text
    content: 'In my life or in my death, Christ will be magnified in me. '
  '21':
  - type: text
    content: My true life is the Anointed One, and dying means gaining more of him.
  '22':
  - type: text
    content: So here’s my dilemma
  - type: text
    content: ': Each day I live means bearing more fruit in my ministry; yet I fervently long to be liberated from this body '
  - type: note
    content: The Greek uses the word analyō, which means “to fold up a tent and depart.” Sailors used this word to say, “loose the ship and set sail.” And farmers used analyō to mean “to unyoke an oxen” (set it free).
  - type: text
    content: and joined fully to Christ. That would suit me fine, but the greatest advantage to you would be that I remain alive. So you can see why I’m torn between the two—I don’t know which I prefer.
  '25':
  - type: text
    content: 'Yet deep in my heart I’m confident that I will be spared so I can add to your joy and further strengthen and mature your faith. '
  - type: note
    content: Or “that I could help with your pioneer advance and joy in faith.” Paul was excited to help them make new pioneer advances in their faith and joy.
  '26':
  - type: text
    content: When I am freed to come to you, my deliverance will give you a reason to boast even more in Jesus Christ.
  '27':
  - type: text
    content: 'Whatever happens, keep living your lives based on the reality of the gospel of Christ. Then when I come to see you, or hear good reports of you, I’ll know that you stand united in one Spirit and one passion—celebrating together as conquerors '
  - type: note
    content: As translated literally from the Aramaic. The Greek states “striving side by side with one mind.”
  - type: text
    content: 'in the faith of the gospel. '
  - type: note
    content: Or “his revelation.”
  '28':
  - type: text
    content: 'And then you will never be shaken or intimidated by the opposition that rises up against us. Your courage will prove to be a sure sign from God of their coming destruction. '
  '29':
  - type: text
    content: 'For God has graciously given you the privilege not only to believe in Christ, but also to suffer for him. '
  '3':
  - type: text
    content: 'My prayers for you are full of praise to God as I give him thanks for you with great joy! '
  - type: text
    content: I’m so grateful for our union
  - type: text
    content: ' '
  '30':
  - type: text
    content: For you have been called by him to endure the conflict in the same way I have endured it—for you know I’m not giving up.
  '5':
  - type: text
    content: 'and our enduring partnership that began the first time I presented to you the gospel. '
  '6':
  - type: text
    content: I pray with great faith for you
  - type: text
    content: ', because I’m fully convinced that the One who began this gracious work '
  - type: note
    content: Or “good [worthwhile] work.” Paul uses language here that sounds similar to Gen. 1:2. When God created the heavens and the earth, he declared it to be “good.” And now with the new creation life within us, God again sees our growth in grace as something good.
  - type: text
    content: 'in you will faithfully continue the process of maturing you '
  - type: note
    content: Or “he will see to it that you remain faithful.”
  - type: text
    content: 'until the unveiling '
  - type: note
    content: Literally “day of Christ.” This is the day of his unveiling, his appearing.
  - type: text
    content: of our Lord Jesus Christ!
  '7':
  - type: text
    content: 'It’s no wonder I pray with such confidence, since you have a permanent place in my heart! '
  - type: note
    content: Or “since you have given me a permanent place in your hearts.”
  - type: text
    content: 'You have remained partners with me in the wonderful grace '
  - type: text
    content: of God
  - type: text
    content: ' even though I’m here in chains for standing up for the truth of the gospel. '
  - type: note
    content: The Aramaic can be translated “the truth of God’s revelation.” The Greek can also be translated “for the defense and proof (a possible hendiadys) of the gospel.”
  '8':
  - type: text
    content: 'Only God knows how much I dearly love you with the tender affection '
  - type: note
    content: Or “mercies.”
  - type: text
    content: of Jesus, the Anointed One.
  '9':
  - type: text
    content: 'I continue to pray for your love to grow and increase beyond measure, bringing you into the rich revelation of spiritual insight '
  - type: note
    content: The Greek word for “insight” (aisthēsis) is a hapax legomenon in the New Testament and used numerous times in the Septuagint referring to practical understanding linked to life. It is a word that implies walking out the truth that insight reveals. It could also be translated “experience,” or “to experience the reality of something and apply it to life.”
  - type: text
    content: in all things.
