document_id: PRO.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Calling
  - type: text
    content: Can’t you hear the voice of Wisdom?
  - type: note
    content: Wisdom is personified throughout the book of Proverbs. Lady Wisdom is a figure of speech for God himself, who invites us to receive the best way to live, the excellent and noble way of life found in Jesus Christ. Jesus is wisdom personified, for he was anointed with the Spirit of Wisdom. See Isa. 11:1–2; 1 Cor. 1:30; Col. 2:3.
  - type: text
    content: From the top of the mountains of influence
  - type: text
    content: she speaks into the gateways of the glorious city.
  - type: note
    content: As translated from the Aramaic. The church is also a gateway, the house of God, the portal to heaven, and as Jesus calls it, a “city that stands on a hilltop” (see Matt. 5:14). Christ is the head of the church, where the wisdom of God is revealed. See 1 Cor. 1 and Eph. 3:10–12.
  - type: text
    content: At the place where pathways merge,
  - type: text
    content: at the entrance of every portal,
  - type: text
    content: there she stands, ready to impart understanding,
  - type: text
    content: shouting aloud to all who enter,
  - type: text
    content: preaching her sermon to those who will listen.
  - type: note
    content: In chapter 7 it was the harlot calling out to the simple; here it is Lady Wisdom. True wisdom is easy to find—we only have to listen to her voice. Though it comes from above, it is found on street level. Creation and conscience are two voices that speak to our hearts. To discover wisdom, we don’t need a brilliant intellect but a tender, attentive heart.
  '10':
  - type: text
    content: My wise correction is more valuable than silver or gold.
  - type: text
    content: The finest gold is nothing compared to the revelation-knowledge
  - type: text
    content: I can impart.”
  '11':
  - type: text
    content: Wisdom is so priceless that it exceeds the value of any jewel.
  - type: note
    content: Literally “corals” or “pearls.”
  - type: text
    content: Nothing you could wish for can equal her.
  '12':
  - type: text
    content: “For I am Wisdom, and I am shrewd and intelligent.
  - type: text
    content: I have at my disposal living-understanding
  - type: text
    content: to devise a plan for your life.
  - type: note
    content: Or “to discover clever inventions.”
  '13':
  - type: text
    content: Wisdom pours into you
  - type: text
    content: when you begin to hate every form of evil in your life,
  - type: text
    content: for that’s what worship and fearing God is all about.
  - type: text
    content: Then you will discover
  - type: text
    content: that your pompous pride and perverse speech
  - type: text
    content: are the very ways of wickedness that I hate!”
  - type: heading
    content: The Power of Wisdom
  '14':
  - type: text
    content: “You will find true success when you find me,
  - type: text
    content: for I have insight into wise plans that are designed just for you.
  - type: text
    content: 'I hold in my hands living-understanding, '
  - type: note
    content: Or “I am living-understanding.”
  - type: text
    content: courage, and strength.
  '15':
  - type: text
    content: I empower kings to reign and rulers to make laws that are just.
  - type: note
    content: We have been made kings and priestly rulers by the grace of redemption.
  '16':
  - type: text
    content: I empower princes to rise and take dominion,
  - type: text
    content: and generous ones to govern the earth.
  - type: note
    content: As translated from many Hebrew manuscripts and the Septuagint. Other Hebrew manuscripts have “and all nobles who govern justly.” The word nobles can also be translated “generous ones.”
  '17':
  - type: text
    content: I will show my love to those who passionately love me.
  - type: note
    content: Wisdom is not found by the halfhearted. One must love wisdom to gain it. A superficial desire will yield only a superficial knowledge.
  - type: text
    content: For they will search and search continually until they find me.
  '18':
  - type: text
    content: Unending wealth and glory
  - type: text
    content: come to those who discover where I dwell.
  - type: text
    content: The riches of righteousness and a long, satisfying life
  - type: text
    content: will be given to them.
  - type: note
    content: Or “riches and righteousness.” The phrase “a long, satisfying life” is from the Aramaic.
  '19':
  - type: text
    content: What I impart has greater worth than gold and treasure,
  - type: text
    content: and the increase I bring benefits more than a windfall of income.
  '20':
  - type: text
    content: I lead you into the ways of righteousness
  - type: text
    content: to discover the paths of true justice.
  '21':
  - type: text
    content: 'Those who love me gain great wealth '
  - type: note
    content: The Aramaic is “I will leave great hope as an inheritance to my friends.”
  - type: text
    content: and a glorious inheritance,
  - type: text
    content: and I will fill their lives with treasures.”
  - type: heading
    content: Wisdom in the Beginning
  '22':
  - type: text
    content: “In the beginning I was there,
  - type: text
    content: 'for God possessed me '
  - type: note
    content: The Aramaic and the Septuagint read “The Lord created me at the beginning.” The Hebrew verb translated here as “possessed” has two basic meanings. One is “acquired,” the other is “created.” Poetically, it is a statement that the existence of Wisdom (Christ) was not independent of God at creation but was manifested and possessed by God as he created all things. Otherwise, it would sound like God was without wisdom before he created it.
  - type: text
    content: even before he created the universe.
  '23':
  - type: text
    content: From eternity past I was set in place,
  - type: text
    content: before the world began.
  - type: text
    content: 'I was anointed '
  - type: note
    content: The Hebrew word translated “anointed” here literally means “poured out” and is often used to describe the anointing oil poured out over a king.
  - type: text
    content: from the beginning.
  '24':
  - type: text
    content: Before the oceans depths were poured out,
  - type: text
    content: and before there were any glorious fountains
  - type: text
    content: overflowing with water,
  - type: note
    content: The Hebrew uses the word kabad, which means “glory,” to describe the fountains. It could also be translated “fountains of glory” or “glorious fountains.”
  - type: text
    content: I was there, dancing!
  - type: note
    content: Many translations have “I was born [or brought forth].” The Hebrew word for “born” is taken from a word that means “to kick and twirl” or “to dance.”
  '25':
  - type: text
    content: Even before one mountain had been sculpted
  - type: text
    content: or one hill raised up,
  - type: text
    content: I was already there, dancing!
  '26':
  - type: text
    content: When he created the earth, the fields,
  - type: text
    content: even the first atom of dust,
  - type: text
    content: I was already there.
  '27':
  - type: text
    content: When he hung the tapestry of the heavens
  - type: text
    content: and stretched out the horizon of the earth,
  '28':
  - type: text
    content: when the clouds and skies were set in place
  - type: text
    content: and the subterranean fountains began to flow strong,
  - type: text
    content: I was already there.
  '29':
  - type: text
    content: When he set in place the pillars of the earth
  - type: text
    content: and spoke the decrees of the seas,
  - type: text
    content: commanding the waves
  - type: text
    content: so that they wouldn’t overstep their boundaries,
  '30':
  - type: text
    content: 'I was there, close to the Creator’s side '
  - type: note
    content: See John 1:1.
  - type: text
    content: as his master artist.
  - type: note
    content: Or “architect.”
  - type: text
    content: Daily he was filled with delight in me
  - type: text
    content: as I playfully rejoiced before him.
  - type: note
    content: The Hebrew word translated here as “rejoiced” can also be translated as “joyfully playing” or “laughing.”
  '31':
  - type: text
    content: I laughed and played,
  - type: text
    content: so happy with what he had made,
  - type: text
    content: while finding my delight in the children of men.”
  - type: note
    content: What a beautiful picture we find here of Wisdom (Christ), who finds his fulfillment in us. See Pss. 8:4–9; 16:3; Eph. 2:10; 19–22; Heb. 2:10.
  - type: heading
    content: Wisdom Worth Waiting For
  '32':
  - type: text
    content: “So listen, my sons and daughters, to everything I tell you,
  - type: text
    content: for nothing will bring you more joy than following my ways.
  '33':
  - type: text
    content: Listen to my counsel,
  - type: text
    content: for my instruction will enlighten you.
  - type: text
    content: You’ll be wise not to ignore it.
  '34':
  - type: text
    content: If you wait at wisdom’s doorway,
  - type: note
    content: Or “Guard the door of my entrances.”
  - type: text
    content: longing to hear a word for every day,
  - type: text
    content: joy will break forth within you as you listen for what I’ll say.
  '35':
  - type: text
    content: For the fountain of life pours into you every time that you find me,
  - type: text
    content: and this is the secret of growing in the delight
  - type: text
    content: and the favor of the Lord.
  '36':
  - type: text
    content: But those who stumble and miss me will be sorry they did!
  - type: text
    content: For ignoring what I have to say will bring harm to your own soul.
  - type: text
    content: Those who hate me are simply flirting with death!”
  - type: note
    content: To hate wisdom is not only a sign of stupidity, but it is also a mark of depravity.
  '4':
  - type: text
    content: “I’m calling to you, sons of Adam,
  - type: text
    content: yes, and to you daughters as well.
  '5':
  - type: text
    content: Listen to me and you will be prudent and wise.
  - type: text
    content: For even the foolish and feeble can receive an understanding heart
  - type: text
    content: that will change their inner being
  - type: text
    content: .
  '6':
  - type: text
    content: The meaning of my words will release within you revelation
  - type: text
    content: for you to reign in life.
  - type: note
    content: The Hebrew word is literally translated as “princely” or “noble” things. The implication is that these words of wisdom are for ruling and reigning in life.
  - type: text
    content: My lyrics will empower you to live by what is right.
  '7':
  - type: text
    content: For everything I say is unquestionably true,
  - type: text
    content: and I refuse to endure the lies of lawlessness—
  - type: text
    content: my words will never lead you astray.
  '8':
  - type: text
    content: All the declarations of my mouth can be trusted;
  - type: text
    content: they contain no twisted logic or perversion of the truth.
  '9':
  - type: text
    content: All my words are clear and straightforward to everyone
  - type: text
    content: who possesses spiritual understanding.
  - type: text
    content: If you have an open mind, you will receive revelation-knowledge.
