document_id: PRO.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Calling
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Can’t you hear the voice of Wisdom?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wisdom is personified throughout the book of Proverbs. Lady Wisdom is a figure of speech for God himself, who invites us to receive the best way to live, the excellent and noble way of life found in Jesus Christ. Jesus is wisdom personified, for he was anointed with the Spirit of Wisdom. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the top of the mountains of influence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she speaks into the gateways of the glorious city.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The church is also a gateway, the house of God, the portal to heaven, and as Jesus calls it, a “city that stands on a hilltop” (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Christ is the head of the church, where the wisdom of God is revealed. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 3:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the place where pathways merge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the entrance of every portal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there she stands, ready to impart understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shouting aloud to all who enter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: preaching her sermon to those who will listen.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In chapter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: it was the harlot calling out to the simple; here it is Lady Wisdom. True wisdom is easy to find—we only have to listen to her voice. Though it comes from above, it is found on street level. Creation and conscience are two voices that speak to our hearts. To discover wisdom, we don’t need a brilliant intellect but a tender, attentive heart.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My wise correction is more valuable than silver or gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The finest gold is nothing compared to the revelation-knowledge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can impart.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Wisdom is so priceless that it exceeds the value of any jewel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “corals” or “pearls.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing you could wish for can equal her.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “For I am Wisdom, and I am shrewd and intelligent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have at my disposal living-understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to devise a plan for your life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to discover clever inventions.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Wisdom pours into you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you begin to hate every form of evil in your life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for that’s what worship and fearing God is all about.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will discover
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that your pompous pride and perverse speech
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are the very ways of wickedness that I hate!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Power of Wisdom
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “You will find true success when you find me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have insight into wise plans that are designed just for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I hold in my hands living-understanding, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I am living-understanding.”
      marker-yv: yv-n
    - type: text
      text: courage, and strength.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I empower kings to reign and rulers to make laws that are just.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We have been made kings and priestly rulers by the grace of redemption.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I empower princes to rise and take dominion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and generous ones to govern the earth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from many Hebrew manuscripts and the Septuagint. Other Hebrew manuscripts have “and all nobles who govern justly.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nobles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also be translated “generous ones.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I will show my love to those who passionately love me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wisdom is not found by the halfhearted. One must love wisdom to gain it. A superficial desire will yield only a superficial knowledge.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they will search and search continually until they find me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Unending wealth and glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come to those who discover where I dwell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The riches of righteousness and a long, satisfying life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be given to them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “riches and righteousness.” The phrase “a long, satisfying life” is from the Aramaic.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: What I impart has greater worth than gold and treasure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the increase I bring benefits more than a windfall of income.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I lead you into the ways of righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to discover the paths of true justice.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Those who love me gain great wealth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “I will leave great hope as an inheritance to my friends.”
      marker-yv: yv-n
    - type: text
      text: and a glorious inheritance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will fill their lives with treasures.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom in the Beginning
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “In the beginning I was there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for God possessed me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic and the Septuagint read “The Lord created me at the beginning.” The Hebrew verb translated here as “possessed” has two basic meanings. One is “acquired,” the other is “created.” Poetically, it is a statement that the existence of Wisdom (Christ) was not independent of God at creation but was manifested and possessed by God as he created all things. Otherwise, it would sound like God was without wisdom before he created it.
      marker-yv: yv-n
    - type: text
      text: even before he created the universe.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: From eternity past I was set in place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before the world began.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I was anointed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “anointed” here literally means “poured out” and is often used to describe the anointing oil poured out over a king.
      marker-yv: yv-n
    - type: text
      text: from the beginning.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Before the oceans depths were poured out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and before there were any glorious fountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: overflowing with water,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kabad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “glory,” to describe the fountains. It could also be translated “fountains of glory” or “glorious fountains.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was there, dancing!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many translations have “I was born [or brought forth].” The Hebrew word for “born” is taken from a word that means “to kick and twirl” or “to dance.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Even before one mountain had been sculpted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or one hill raised up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was already there, dancing!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: When he created the earth, the fields,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the first atom of dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was already there.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: When he hung the tapestry of the heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stretched out the horizon of the earth,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: when the clouds and skies were set in place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the subterranean fountains began to flow strong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was already there.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When he set in place the pillars of the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and spoke the decrees of the seas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: commanding the waves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that they wouldn’t overstep their boundaries,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I was there, close to the Creator’s side '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: as his master artist.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “architect.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daily he was filled with delight in me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I playfully rejoiced before him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated here as “rejoiced” can also be translated as “joyfully playing” or “laughing.”
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I laughed and played,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so happy with what he had made,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while finding my delight in the children of men.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:31
      - type: usfm
