    children:
    - type: text
      text: Wisdom Worth Waiting For
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “So listen, my sons and daughters, to everything I tell you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for nothing will bring you more joy than following my ways.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Listen to my counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my instruction will enlighten you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be wise not to ignore it.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: If you wait at wisdom’s doorway,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Guard the door of my entrances.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: longing to hear a word for every day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: joy will break forth within you as you listen for what I’ll say.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: For the fountain of life pours into you every time that you find me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and this is the secret of growing in the delight
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the favor of the Lord.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: But those who stumble and miss me will be sorry they did!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For ignoring what I have to say will bring harm to your own soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who hate me are simply flirting with death!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To hate wisdom is not only a sign of stupidity, but it is also a mark of depravity.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I’m calling to you, sons of Adam,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yes, and to you daughters as well.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Listen to me and you will be prudent and wise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For even the foolish and feeble can receive an understanding heart
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: that will change their inner being
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The meaning of my words will release within you revelation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you to reign in life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word is literally translated as “princely” or “noble” things. The implication is that these words of wisdom are for ruling and reigning in life.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My lyrics will empower you to live by what is right.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For everything I say is unquestionably true,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I refuse to endure the lies of lawlessness—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my words will never lead you astray.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: All the declarations of my mouth can be trusted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they contain no twisted logic or perversion of the truth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All my words are clear and straightforward to everyone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who possesses spiritual understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you have an open mind, you will receive revelation-knowledge.
