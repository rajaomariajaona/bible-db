document_id: JOS.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Two Stone Memorials Established
  - type: text
    content: 'When the entire nation had finished their miracle-crossing of the Jordan, '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Joshua, '
  '10':
  - type: text
    content: 'While the priests remained standing in the middle of the Jordan with the ark '
  - type: text
    content: on their shoulders
  - type: text
    content: ', the people hurried across. All the instructions '
  - type: text
    content: Yahweh
  - type: text
    content: ' had given to Joshua were carried out '
  - type: note
    content: For the priests to stand still for many hours with the heavy ark on their shoulders was a test of their strength, patience, and courage. We also are priests in the kingdom of God, and we are called upon to possess those same qualities.
  - type: text
    content: '—just as Moses had told Joshua. '
  - type: note
    content: See Deut. 31:7–8.
  '11':
  - type: text
    content: 'And when Israel had finished crossing, the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and the priests crossed as the people looked on.'
  '12':
  - type: text
    content: 'The Reubenites, the Gadites, and half the tribe of Manasseh went across, armed and ready for battle, in front of the Israelites, as Moses had commanded them. '
  - type: note
    content: See Num. 32:20–22.
  '13':
  - type: text
    content: 'In all, about forty thousand men were equipped for battle. And they all marched before '
  - type: text
    content: Yahweh
  - type: text
    content: ' to wage war on the plains of Jericho.'
  '14':
  - type: text
    content: 'On that day, '
  - type: text
    content: Yahweh
  - type: text
    content: ' exalted Joshua before all the people. As they had stood in awe of Moses, so they stood in awe of Joshua for the rest of his life.'
  - type: heading
    content: The Jordan Returns to Flood Stage
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: Joshua heard the voice of God in real time.
  '16':
  - type: text
    content: '“Command the priests carrying the ark of the covenant '
  - type: note
    content: Or “the ark of testimony [instruction].”
  - type: text
    content: 'to come up from the Jordan.” '
  '17':
  - type: text
    content: 'So Joshua did as he was commanded, '
  '18':
  - type: text
    content: 'and the priests carrying the ark of the covenant of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came up from the riverbed. And the moment their feet touched the western bank of the Jordan, the floodwaters surged back in place where they were before and returned to flood stage.'
  '19':
  - type: text
    content: 'The people experienced the miracle-crossing of the Jordan on the tenth day of the first month '
  - type: text
    content: of the Jewish calendar
  - type: text
    content: '. '
  - type: note
    content: The “first month” is the month of Abib, which began with the first new moon occurring after March 11 on the Gregorian calendar, so the crossing occurred between March 21 and April 18. It was on this same day forty years earlier that Israel set apart the Passover Lamb in Egypt (see Ex. 12:2–3, 18). (See Keil, Joshua, 51.)
  - type: text
    content: 'They established their base camp at Gilgal, '
  - type: note
    content: Gilgal means “circle” or “rolling away.”
  - type: text
    content: 'east of Jericho, '
  - type: note
    content: Or “on the east border of Jericho,” which was about halfway between the Jordan and Jericho.
  '2':
  - type: text
    content: '“Choose twelve men, '
  - type: note
    content: Jesus, our heavenly Joshua, likewise chose twelve men to be his disciples.
  - type: text
    content: 'one from each of the '
  - type: text
    content: twelve
  - type: text
    content: ' tribes of Israel. '
  '20':
  - type: text
    content: 'where Joshua set up a '
  - type: text
    content: memorial with
  - type: text
    content: ' the twelve stones taken from the Jordan. '
  '21':
  - type: text
    content: 'He told the Israelites, “In time to come, when children ask their fathers, ‘Why are these stones so important?’ '
  '22':
  - type: text
    content: 'tell them, ‘Here is the place where the Israelites crossed the Jordan on dry ground!’ '
  '23':
  - type: text
    content: 'For your God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', dried up the waters of the Jordan before your eyes until you crossed over, '
  - type: note
    content: Elijah had a repeat of this miracle-crossing (see 2 Kings 2:7–8). Those who walk in the “spirit of Elijah” today can likewise expect miracles in their ministry. Elisha, who had a double portion of the spirit of Elijah, also performed the miracle-crossing (see 2 Kings 2:9–14; cf. John 14:12).
  - type: text
    content: 'just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God did for us '
  - type: text
    content: years ago
  - type: text
    content: '; he dried up the Red Sea while we crossed over! '
  '24':
  - type: text
    content: 'He has done these '
  - type: text
    content: miracles
  - type: text
    content: ' so that all the earth will be in awe '
  - type: note
    content: Or “know firsthand” from the Hebrew word yada.
  - type: text
    content: 'of the mighty power '
  - type: note
    content: Or “hand.”
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and that you might always obey '
  - type: note
    content: Or “fear,” which has a varied universe of meanings in Hebrew. The two miracles—the parting of the Red Sea and the miracle-crossing of the Jordan—carry a message for the entire world to learn. As believers in our heavenly Joshua, our Lord Jesus, we can learn from the symbolism of these miracles. The Red Sea parting shows us deep lessons of our salvation from sin, and so does the Jordan crossing. We were co-buried with Christ in baptism into his death (Jordan), and now we are co-raised with him on the “dry ground” of resurrection territory (see Rom. 6:4–5; Col. 2:12).
  - type: text
    content: Yahweh
  - type: text
    content: ' your God!”'
  '3':
  - type: text
    content: 'Instruct each of them to take a stone from the riverbed, twelve stones from the very place where the priests stand '
  - type: text
    content: with the ark
  - type: text
    content: . Have them carry the stones over to the place where you camp tonight.”
  '4':
  - type: text
    content: 'So Joshua summoned the twelve men he had selected from the Israelites, one per tribe. '
  '5':
  - type: text
    content: 'Joshua instructed them, “Walk out to the middle of the riverbed to the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God. Each of you choose a stone and lift it up onto your shoulder—one stone for each tribe. '
  '6':
  - type: text
    content: 'The stones will always be a sign to you. Someday, when your children ask you, ‘Why are these stones so important?’ '
  '7':
  - type: text
    content: 'tell them, ‘The Jordan stopped flowing in front of the ark of the covenant of '
  - type: text
    content: Yahweh
  - type: text
    content: —the floodwaters were completely cut off.’ These stones will serve as a memorial for Israel forever.”
  '8':
  - type: text
    content: The Israelites did as Joshua commanded them. They took twelve stones according to the number of the tribes of Israel, from the middle of the riverbed, and carried them to the camp and put them there.
  '9':
  - type: text
    content: 'Joshua set up the memorial stones '
  - type: text
    content: that they had taken from
  - type: text
    content: ' the exact spot '
  - type: note
    content: Or “Joshua set up the stones in the exact spot,” which would imply there may have been a second set of memorial stones (one set on land and another on the riverbed).
  - type: text
    content: where the priests stood bearing the ark in the riverbed. They remain there to this day.
  - type: note
    content: The Talmud states that these stones were still at that very spot even a generation after the destruction of the Second Temple, and that three rabbis stood on top of them (Talmud, Sotah 34a).
