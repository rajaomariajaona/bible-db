      children:
      - type: text
        text: Or “fear,” which has a varied universe of meanings in Hebrew. The two miracles—the parting of the Red Sea and the miracle-crossing of the Jordan—carry a message for the entire world to learn. As believers in our heavenly Joshua, our Lord Jesus, we can learn from the symbolism of these miracles. The Red Sea parting shows us deep lessons of our salvation from sin, and so does the Jordan crossing. We were co-buried with Christ in baptism into his death (Jordan), and now we are co-raised with him on the “dry ground” of resurrection territory (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
