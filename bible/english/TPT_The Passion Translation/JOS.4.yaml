document_id: JOS.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Two Stone Memorials Established
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the entire nation had finished their miracle-crossing of the Jordan, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Joshua, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Choose twelve men, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, our heavenly Joshua, likewise chose twelve men to be his disciples.
    marker-yv: yv-n
  - type: text
    text: 'one from each of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: twelve
  - type: text
    text: ' tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Instruct each of them to take a stone from the riverbed, twelve stones from the very place where the priests stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with the ark
  - type: text
    text: . Have them carry the stones over to the place where you camp tonight.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Joshua summoned the twelve men he had selected from the Israelites, one per tribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Joshua instructed them, “Walk out to the middle of the riverbed to the ark of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' your God. Each of you choose a stone and lift it up onto your shoulder—one stone for each tribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The stones will always be a sign to you. Someday, when your children ask you, ‘Why are these stones so important?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tell them, ‘The Jordan stopped flowing in front of the ark of the covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: —the floodwaters were completely cut off.’ These stones will serve as a memorial for Israel forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The Israelites did as Joshua commanded them. They took twelve stones according to the number of the tribes of Israel, from the middle of the riverbed, and carried them to the camp and put them there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joshua set up the memorial stones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that they had taken from
  - type: text
    text: ' the exact spot '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Joshua set up the stones in the exact spot,” which would imply there may have been a second set of memorial stones (one set on land and another on the riverbed).
    marker-yv: yv-n
  - type: text
    text: where the priests stood bearing the ark in the riverbed. They remain there to this day.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Talmud states that these stones were still at that very spot even a generation after the destruction of the Second Temple, and that three rabbis stood on top of them (Talmud,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sotah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 34a).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'While the priests remained standing in the middle of the Jordan with the ark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on their shoulders
  - type: text
    text: ', the people hurried across. All the instructions '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had given to Joshua were carried out '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the priests to stand still for many hours with the heavy ark on their shoulders was a test of their strength, patience, and courage. We also are priests in the kingdom of God, and we are called upon to possess those same qualities.
    marker-yv: yv-n
  - type: text
    text: '—just as Moses had told Joshua. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 31:7–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when Israel had finished crossing, the ark of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and the priests crossed as the people looked on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The Reubenites, the Gadites, and half the tribe of Manasseh went across, armed and ready for battle, in front of the Israelites, as Moses had commanded them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 32:20–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In all, about forty thousand men were equipped for battle. And they all marched before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' to wage war on the plains of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On that day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' exalted Joshua before all the people. As they had stood in awe of Moses, so they stood in awe of Joshua for the rest of his life.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jordan Returns to Flood Stage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Joshua, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joshua heard the voice of God in real time.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Command the priests carrying the ark of the covenant '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the ark of testimony [instruction].”
    marker-yv: yv-n
  - type: text
    text: 'to come up from the Jordan.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Joshua did as he was commanded, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the priests carrying the ark of the covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' came up from the riverbed. And the moment their feet touched the western bank of the Jordan, the floodwaters surged back in place where they were before and returned to flood stage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The people experienced the miracle-crossing of the Jordan on the tenth day of the first month '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the Jewish calendar
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “first month” is the month of Abib, which began with the first new moon occurring after March 11 on the Gregorian calendar, so the crossing occurred between March 21 and April 18. It was on this same day forty years earlier that Israel set apart the Passover Lamb in Egypt (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 12:2–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '18'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). (See Keil,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 51.)'
    marker-yv: yv-n
  - type: text
    text: 'They established their base camp at Gilgal, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gilgal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “circle” or “rolling away.”
    marker-yv: yv-n
  - type: text
    text: 'east of Jericho, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “on the east border of Jericho,” which was about halfway between the Jordan and Jericho.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'where Joshua set up a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: memorial with
  - type: text
    text: ' the twelve stones taken from the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He told the Israelites, “In time to come, when children ask their fathers, ‘Why are these stones so important?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'tell them, ‘Here is the place where the Israelites crossed the Jordan on dry ground!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For your God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', dried up the waters of the Jordan before your eyes until you crossed over, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Elijah had a repeat of this miracle-crossing (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 2:7–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Those who walk in the “spirit of Elijah” today can likewise expect miracles in their ministry. Elisha, who had a double portion of the spirit of Elijah, also performed the miracle-crossing (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 2:9–14
    - type: usfm
      marker: ft
      children:
