      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the three annual feasts (Passover, Pentecost, and Tabernacles), which could not be observed properly in exile, for they required going to the temple. It seems like the Northern Kingdom did not coalesce in Assyrian exile as Judah did in Babylonian/Persian exile. In fact, we never hear from the ten lost tribes again after 722 BC. Apparently, they were victims of total or almost total ethnic genocide, or at least culturally extinguishing cleansing. Many in the North were worshiping the golden calves at Bethel and not even going to Jerusalem. Some of the remnant were left behind to mix with others, producing the Samaritans of the New Testament era.
      marker-yv: yv-n
