  - type: text
    content: They will not be able to offer their firstfruits
  - type: text
    content: nor pour out drink offerings of wine to him,
  - type: text
    content: for their food will be like funeral fare—
  - type: text
    content: food given to those in mourning.
  - type: text
    content: Whoever eats it will become unclean.
  - type: text
    content: They will only have sufficient food to satisfy their hunger
  - type: text
    content: 'and not enough to offer to '
  - type: text
    content: Yahweh
  - type: text
    content: ' in his house.'
  '5':
  - type: text
    content: What will you do on the appointed feast days,
  - type: text
    content: 'on the day you gather for '
  - type: text
    content: Yahweh
  - type: text
    content: ’s festivals?
  - type: note
    content: That is, the three annual feasts (Passover, Pentecost, and Tabernacles), which could not be observed properly in exile, for they required going to the temple. It seems like the Northern Kingdom did not coalesce in Assyrian exile as Judah did in Babylonian/Persian exile. In fact, we never hear from the ten lost tribes again after 722 BC. Apparently, they were victims of total or almost total ethnic genocide, or at least culturally extinguishing cleansing. Many in the North were worshiping the golden calves at Bethel and not even going to Jerusalem. Some of the remnant were left behind to mix with others, producing the Samaritans of the New Testament era.
  '6':
  - type: text
    content: Look! Even if you flee from destruction,
  - type: text
    content: Egypt will round you up.
  - type: text
    content: Your gathering together
  - type: text
    content: will be for your burial in Memphis.
  - type: note
    content: Or “Moph,” also called “Noph.”
  - type: text
    content: Your silver treasures will be lost among the weeds,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: and thornbushes will overgrow your homes.
  '7':
  - type: text
    content: Your day of punishment has come,
  - type: text
    content: and the time for recompense has arrived,
  - type: text
    content: and Israel will know it.
  - type: note
    content: As translated from the Aleppo Codex, Leningrad Codex, and the Masoretic Text.
  - type: text
    content: You say
  - type: text
    content: ', “The prophet is a fool.'
  - type: text
    content: This man of the Spirit is crazy!”
  - type: note
    content: This appears to be a derisive description regarding God’s Spirit coming upon the prophet, who would go into a trance or ecstatic state and prophesy.
  - type: text
    content: But your guilt is great,
  - type: text
    content: even greater than all your deep-seated hatred.
  '8':
  - type: text
    content: This prophet of my God is a watchman for Israel.
  - type: text
    content: Yet, everywhere he goes, the people set traps for him.
  - type: text
    content: He is considered an enemy in the house of his God.
  - type: note
    content: Or literally “A watchman Ephraim with my God, a prophet, a snare of a fowler on all his paths, hatred in the house of his God.” Verses 7–8 are the most difficult verses in Hosea to translate, as the Hebrew text is uncertain. There is a lack of certainty whether these words (or some of them) were spoken by Hosea or by the people of Israel. It seems more fitting in the context to view them as spoken by Hosea.
  - type: heading
    content: Israel’s Sins at Gibeah
  '9':
  - type: text
    content: Israel has sunk so deeply into depravity—
  - type: text
    content: just as you did at Gibeah.
  - type: note
    content: Perhaps one of the lowest points of Israel’s history took place at Gibeah. The men of the city raped and killed a Levite’s concubine (see Judg. 19:22–30 ), which led to a civil war that nearly wiped out the tribe of Benjamin. Gibeah would also be recognized by the people of that day as the place where Israel asked God for a king (see 1 Sam. 8 ). Instead of Yahweh being their king, the Israelites ended up with Saul.
  - type: text
    content: God will not overlook the guilt of your actions;
  - type: text
    content: he will punish you for your sins.
  - type: heading
    content: Israel’s Sins at Baal Peor
