      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tyre was a beautiful port city and the mother of the Carthaginian (Semitic; “Punic” is the Latin pronunciation of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Phoenician
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) culture which, with Hannibal’s leadership, rivaled Rome. Many empires tried to conquer Tyre but were only partially able to do so. Tyre had plenty of money to pay tribute if she had to. Only Alexander, in the most extensive siege warfare ever seen up to that date, was able to fully take the city (332 BC). This could be translated “like a palm tree” instead of “Tyre.” The first line of this verse is uncertain in the Hebrew. Many translations defer to the Septuagint for clarity.
      marker-yv: yv-n
