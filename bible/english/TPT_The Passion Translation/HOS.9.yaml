  - type: text
    content: But when they reached Baal Peor
  - type: note
    content: Baal Peor means “lord of the [mountain] gap.” See Deut. 4:3–4 .
  - type: text
    content: 'they devoted themselves to the shameful '
  - type: text
    content: god
  - type: text
    content: ', Baal,'
  - type: note
    content: Or “they devoted themselves to Shame [i.e., Baal].” Hebrew speakers of that day were accustomed to substituting Shame for Baal . This is specifically Baal of Peor, a local Moabite Baal, not the Baal introduced to Israel by Jezebel. See Num. 25:1–15 ; Ps. 106:28 ; 1 Cor. 10:8 ; Rev. 2:14 .
  - type: text
    content: and became as shameful as the things they loved.
  - type: note
    content: This could be a reference to the Moabite women the Israelite men slept with in Acacia who led them astray into pagan idolatry.
  '11':
  - type: text
    content: 'The glory of Israel '
  - type: note
    content: Although the shining presence of God could be in view here, the next line indicates that Ephraim’s (Israel’s) glory is their children, the generation to come. Moral corruption of a nation often results in a decline of the birthrate, as God’s punishment of evil. Also note the sharp contrast between the shame in v. 10 and the “glory” departing in v. 11 .
  - type: text
    content: will fly away from you like a bird,
  - type: note
    content: The Hebrew word for “glory” is kabod . It is a very loaded word in the Old Testament. God’s glory is heavy, weighty. The glory that left the temple (see Ezek. 11:23 ) will come crashing back in (see Ezek. 43:1–5 ) with the restoration. This glorious heaviness is beautifully and poetically contrasted with the lightness of a bird flying away. Later rabbis also described this, equivalently, as the Shekinah, a cloud of Yahweh ’s presence. This imagery goes back to the cloud of the dwelling place and Solomon’s Temple that was also present at the Mount of Transforming Glory (see Ex. 33:18 ; 2 Chron. 7:1 ; Matt. 17:5 ).
  - type: text
    content: leaving you infertile—no pregnancy, no conception.
  '12':
  - type: text
    content: Even if they raise their children, I will remove them,
  - type: text
    content: and not one will be left alive.
  - type: text
    content: Even worse than that will be when I desert you.
  '13':
  - type: text
    content: Ephraim, I once saw you like the city of Tyre
  - type: note
    content: Tyre was a beautiful port city and the mother of the Carthaginian (Semitic; “Punic” is the Latin pronunciation of Phoenician ) culture which, with Hannibal’s leadership, rivaled Rome. Many empires tried to conquer Tyre but were only partially able to do so. Tyre had plenty of money to pay tribute if she had to. Only Alexander, in the most extensive siege warfare ever seen up to that date, was able to fully take the city (332 BC). This could be translated “like a palm tree” instead of “Tyre.” The first line of this verse is uncertain in the Hebrew. Many translations defer to the Septuagint for clarity.
  - type: text
    content: planted in a pleasant setting,
  - type: text
    content: but now you must send out your sons
  - type: text
    content: 'to be slaughtered '
  - type: text
    content: in battle
  - type: text
    content: .”
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ', give them . . .'
  - type: text
    content: Yes
  - type: text
    content: ', what punishment should I ask you to give?'
  - type: text
    content: Give them wombs that miscarry and breasts with no milk.
  - type: note
    content: The broken sentence in the first line of this verse seems to be the most accurate translation, even though it is ambiguous in English. It appears that Hosea was deeply struggling in his heart over God punishing his unfaithful people. Perhaps because Hosea’s wife was unfaithful, he saw his own feelings as a mirror of Yahweh ’s feelings for his wife, Israel. Hosea began to pray for his people, but his feelings rose up abruptly, so he asked instead what God would do. Should he demonstrate his love or condemn her? Hosea submitted to God’s choice.
  - type: heading
    content: Israel’s Sins at Gilgal
