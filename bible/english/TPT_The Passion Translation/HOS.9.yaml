  '16':
  - type: text
    content: Ephraim, you’re finished!
  - type: text
    content: Your root has dried up,
  - type: text
    content: and you will bear no more fruit.
  - type: note
    content: This verse is loaded with significant irony, for the name Ephraim means “doubly fruitful.”
  - type: text
    content: Even if the women do give birth,
  - type: text
