        - type: text
          text: 9:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The broken sentence in the first line of this verse seems to be the most accurate translation, even though it is ambiguous in English. It appears that Hosea was deeply struggling in his heart over God punishing his unfaithful people. Perhaps because Hosea’s wife was unfaithful, he saw his own feelings as a mirror of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s feelings for his wife, Israel. Hosea began to pray for his people, but his feelings rose up abruptly, so he asked instead what God would do. Should he demonstrate his love or condemn her? Hosea submitted to God’s choice.
      marker-yv: yv-n
