          text: ). Failure to do this ruins the wine. Those who are “thickening upon their lees” are entrenched in their smugness; they are the self-satisfied wealthy who are overconfident in themselves. The Hebrew words for “search” and for “lees” sound nearly the same when spoken. During the days of Zephaniah, the people of Jerusalem worshiped the god Dionysus along with
      - type: usfm
