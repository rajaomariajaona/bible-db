document_id: ZEP.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of Yahweh
  - type: text
    content: 'This is the prophetic message '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave to Zephaniah son of Cushi, '
  - type: note
    content: Or “The word of Yahweh came to Zephaniah, son of Cushi.” Zephaniah means “the Lord hides” or “the Lord treasures.” Both Zephaniah and you are treasured by the Lord and hidden in his heart (see Col. 3:2–3). Cushi (see Jer. 36:14) is not to be confused with the land of Cush, which was called Ethiopia in Greco-Roman times and included portions of modern Sudan and part of present-day Ethiopia. It is possible, however, that Zephaniah’s father was Ethiopian or Sudanese and that Zephaniah himself was a Black man.
  - type: text
    content: grandson of Gedaliah, great-grandson of Amariah, great-great-grandson of Hezekiah. Zephaniah received this message during the time when Josiah, the son of Amon, ruled Judah.
  '10':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare:'
  - type: text
    content: 'A cry for help will be heard from the Fish Gate '
  - type: text
    content: in Jerusalem
  - type: text
    content: ','
  - type: note
    content: The Fish Gate was on the northern side of Jerusalem, the closest gate both to the fishing port of Tyre and to Lake Galilee, where fishermen caught, dried, and sold fish in Jerusalem. Jewish scholars believe the Fish Gate was also called the Ephraim Gate.
  - type: text
    content: 'wailing from the '
  - type: text
    content: wealthier
  - type: text
    content: ', newer part '
  - type: note
    content: Or “Second Quarter” or “Mishneh,” a section of the city possibly near the Fish Gate. See 2 Kings 22:14.
  - type: text
    content: of the city.
  - type: text
    content: A loud crash will echo from the hills.
  - type: note
    content: The approaching armies coming to attack Jerusalem are the cause of the uproar, the wailing, and the crashing (of buildings) on the hills surrounding the city.
  '11':
  - type: text
    content: Wail, you who live in the market area
  - type: note
    content: Or “Makhtesh.” Probably the lower area later known as the Tyropoeon Valley that separates the Upper City from the Temple Mount. The word means “mortar” or “depression.” According to this verse, the merchants conducted their business here. The Targum reads “Kidron wadi.” See Berlin, Zephaniah, AYBC, 87.
  - type: text
    content: because all the merchants will be dead,
  - type: text
    content: and those who weigh out silver will be wiped out.
  '12':
  - type: text
    content: “When that time comes,
  - type: text
    content: I will search Jerusalem with lamps
  - type: note
    content: Or “I will illumine Jerusalem with lamps,” a figure of speech for light exposing what is taking place in the dark. The lamp of God’s Word and his holy gaze will uncover what is hiding in people’s hearts.
  - type: text
    content: and punish those stagnating
  - type: text
    content: in their self-satisfied smugness.
  - type: note
    content: Or “those who are thickening upon their lees [sediment],” a metaphor referring to the process of making wine. During fermentation, wine must be poured from one vessel to another to separate the lees or sediment (see Jer. 48:11). Failure to do this ruins the wine. Those who are “thickening upon their lees” are entrenched in their smugness; they are the self-satisfied wealthy who are overconfident in themselves. The Hebrew words for “search” and for “lees” sound nearly the same when spoken. During the days of Zephaniah, the people of Jerusalem worshiped the god Dionysus along with Yahweh. Dionysus was the god of wine and pleasure. The Romans called this god Bacchus. This religious syncretism was offensive to God, so he told them that his searchlight would uncover the darkness of their syncretism so that the people could see it for what it was.
  - type: text
    content: They say in their hearts,
  - type: text
    content: ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: is aloof
  - type: text
    content: ' and can do nothing for us,'
  - type: text
    content: either good or bad.’
  '13':
  - type: text
    content: 'Yet all their '
  - type: text
    content: hoarded
  - type: text
    content: ' wealth will be looted'
  - type: text
    content: and their houses leveled.
  - type: text
    content: They will build houses but never move in,
  - type: text
    content: plant vineyards but never drink the wine.”
  - type: heading
    content: Judgment Day
  '14':
  - type: text
    content: 'The great day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near,'
  - type: text
    content: right around the corner, closer than you think and coming fast.
  - type: text
    content: 'How bitter will be the sound of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: when even the brave warriors weep in anguish.
  - type: note
    content: This sentence in Hebrew is somewhat uncertain. It is literally “the sound of the day of Yahweh, bitter [is] one crying out there, a warrior.”
  '15':
  - type: text
    content: It will be a day of wrath,
  - type: text
    content: a day of terror and trouble,
  - type: text
    content: a day of desolation and distress,
  - type: text
    content: a day of darkness and gloom,
  - type: text
    content: a day of clouds and thick darkness,
  '16':
  - type: text
    content: 'a day of shofar '
  - type: note
    content: Or “trumpet” or “horn.” The shopar (or shophar) is a ram’s or goat’s horn that one blows as one would a trumpet.
  - type: text
    content: blasts and battle shouts
  - type: text
    content: against fortified cities
  - type: text
    content: and all the lofty towers.
  - type: note
    content: 'Zephaniah employed many Hebrew words that sound similar and filled vv. 15–16 with wordplay. This is a brilliant literary stanza. “This passage [vv. 15–16a] is probably the most classical description of [the day of Yahweh] in Israelite literature. . . . Each saying has 7 syllables and the word ywm [day] occurs 7 times. A complete stanza is thus formed” (P. J. Nel, “Structural and Conceptual Strategy in Zephaniah, Chapter 1,” Journal of Northwestern Semitic Languages 15 [1989]: 164).'
  '17':
  - type: text
    content: “I will bring such distress on people
  - type: text
    content: that they will grope their way like the blind
  - type: text
    content: for having sinned against me.
  - type: text
    content: Their blood will be poured out like dust,
  - type: text
    content: yes, their flesh like dung.
  '18':
  - type: text
    content: On that day, I will display my great anger,
  - type: text
    content: and none of their silver or gold will save them.
  - type: text
    content: My avenging zeal will burn like a fire on that day,
  - type: text
    content: to consume the entire land.
  - type: text
    content: For I will bring a terrible and sudden end
  - type: text
    content: that will destroy everyone living in the land.”
  '2':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that I will certainly sweep away'
  - type: text
    content: 'every '
  - type: text
    content: living
  - type: text
    content: ' thing from the land—'
  - type: text
    content: animals and humans, birds and fish.
  - type: text
    content: I will topple the wicked and their idols
  - type: note
    content: 'Or “I will sweep away these stumbling blocks with the wicked.” The context implies that the idols (stumbling blocks) are images of previously mentioned “animals and humans, birds and fish.” See J. J. M. Roberts, Nahum, Habakkuk, and Zephaniah, Old Testament Library Series (Louisville, KY: Westminster/John Knox Press, 1991), 167; Adele Berlin, Zephaniah, Anchor Yale Bible Commentaries, vol. 25a (New Haven, CT: Yale University Press, 1994), 73–74.'
  - type: text
    content: 'and sweep away man '
  - type: note
    content: 'Or “Adam.” There is a powerful wordplay in Hebrew: “I will cut off Adam from the very ʾadamah [dirt] from which he came.”'
  - type: text
    content: from the land.”
  - type: heading
    content: Judah’s Idolatry Punished
  '4':
  - type: text
    content: “I will punish Judah and all who live in Jerusalem.
  - type: text
    content: I will wipe out every trace of Baal from the land
  - type: text
    content: along with the names of the pagan priests
  - type: text
    content: 'or any priest '
  - type: text
    content: who has turned away from me
  - type: text
    content: .
  '5':
  - type: text
    content: I will punish those who bow down on their rooftops
  - type: text
    content: 'to worship the '
  - type: text
    content: sun, moon, and stars
  - type: note
    content: Or “the host [armies] of heaven.” See Deut. 4:19; 17:3–7; Jer. 19:13; 32:29.
  - type: text
    content: 'and those '
  - type: text
    content: with divided loyalties
  - type: text
    content: ' who bow before '
  - type: text
    content: Yahweh
  - type: text
    content: and swear allegiance to me
  - type: text
    content: but also swear their oaths in the name of their king.
  - type: note
    content: 'This “king” is likely a reference to the pagan god they worshiped, possibly Baal or Molech or a Canaanite god known by the Ammonites as Milcom. See E. R. Clendenen, “Religious Background of the Old Testament,” in Foundations for Biblical Interpretation, ed. D. S. Dockery et al. (Nashville, TN: Broadman & Holman, 1994), 298–99. See also Deut. 6:13; 10:20.'
  '6':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will punish those'
  - type: text
    content: who have turned their back on me,
  - type: text
    content: who do not seek me nor pray for me to guide them.”
  - type: heading
    content: The Day of Yahweh Is Near
  '7':
  - type: text
    content: Be silent before the Lord God,
  - type: text
    content: 'for the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near.'
  - type: text
    content: “I have prepared a sacrifice
  - type: note
    content: The Hebrew word zabach means both “sacrifice” and “slaughter.”
  - type: text
    content: and have consecrated my invited guests.
  - type: note
    content: This passage describes the day of Yahweh with stinging irony, using the technical language of sacrificial ritual. God’s metaphorical banquet is his punishment, the sacrifices are his people, and the invited guests are Israel’s enemies whom God uses to punish his people. See Isa. 34:6; Jer. 12:3; 46:10; Ezek. 39:17.
  '8':
  - type: text
    content: 'On the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s sacrifice,
  - type: text
    content: I will punish the royal family, your officials,
  - type: text
    content: and all who dress like pagan priests.
  - type: note
    content: Or “in foreign attire,” likely a reference to the cultic clothing of pagan religions. See 2 Kings 10:22.
  '9':
  - type: text
    content: At that time, I will punish
  - type: text
    content: 'all who '
  - type: text
    content: worship Dagon
  - type: note
    content: Or “who leap over the threshold,” likely a reference to the superstitious custom of those who worshiped the fish-god Dagon. See 1 Sam. 5:4–5.
  - type: text
    content: and fill the palace of their rulers
  - type: text
    content: with violence and deception.
