document_id: DAN.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Second Vision
  - type: text
    content: 'In the third year of the reign of King Belshazzar, '
  - type: note
    content: This happened in 552 or 551 BC.
  - type: text
    content: 'I, Daniel, saw a second supernatural vision. '
  '10':
  - type: text
    content: 'It grew so powerful that it attacked the armies of heaven and hurled some of the starry host '
  - type: note
    content: The Hebrew word for “host” is sabaʾ; it is frequently used for the heavenly host, the armies of heaven. However, it is also used for God’s people who are like stars (see Gen. 15:5; 26:4; Song. 6:10; Dan. 12:3; Phil. 2:15). In this context, it is possibly a poetic picture of God’s people, the starry host, who were mercilessly persecuted by Antiochus IV Epiphanes.
  - type: text
    content: 'to the ground and trampled them down. '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: horn
  - type: text
    content: ' arrogantly exalted itself against the Prince of the heavenly armies. '
  - type: note
    content: Although this may be a reference to the murder of the high priest Onias III in 171 BC, it is much more likely referring to the ultimate leader of the heavenly army, God himself. Many Scriptures can have a dual meaning or dual application.
  - type: text
    content: 'It abolished the daily sacrifices, '
  - type: note
    content: Or “the burnt offering of continuity.” See Num. 28:3.
  - type: text
    content: 'and the place of his sanctuary was defiled. '
  - type: note
    content: Or “thrown down [made low].” This was not yet the destruction of the temple but a reference to the profaning of the temple in 167 BC, when Antiochus IV Epiphanes set up what was known as the “awful horror,” the idol of Zeus in the temple (see second footnote on 8:9).
  '12':
  - type: text
    content: 'God’s people began to turn away from him and gave themselves to the power of the horn. Sin replaced the daily sacrifices on account of the rebellion of the people. '
  - type: note
    content: 'There is no doubt that the first part of v. 12 is extremely difficult to translate. Because the precise meaning of the Hebrew is difficult, and any translation is uncertain, it is recommended to read other translations for possible meanings. Most scholars, however, are agreed that the “little horn” refers to Antiochus IV Epiphanes, the Syrian-Greek tyrant who controlled the region and persecuted the citizens in the mid-second century BC. Stephen Miller, in his commentary on Daniel (Daniel, The New American Commentary, vol. 18 [Nashville: B&H, 1994], 227), argues plausibly that the “rebellion” mentioned here in v. 12 may well allude to the sins of the Jewish people who turned away from their God and fell into idolatry, worshiping the Greek gods, during this time (see 1 Macc. 1:11–15, 43). As a result, they were given over to persecution by Antiochus, who terminated the daily Jewish offerings. This would have been evidence of a divine chastening of God’s people.'
  - type: text
    content: The horn
  - type: text
    content: ' was successful in all it attempted to do; truth was cast down to the ground.'
  '13':
  - type: text
    content: 'Then I heard a holy one speaking. Another holy one asked the first one, the Wonderful Numberer, '
  - type: note
    content: 'This is from the Hebrew word palmoni. It is possibly the name of the holy one (angel) that Daniel heard speaking. There are two prominent views among scholars as to the identity and meaning of Palmoni, a hapax legomenon. Some view his name as a contraction of two Hebrew words: pala, which means “wonderful” or “marvelous,” and moneh, which means “a counted number.” The angel Palmoni can be seen as the Wonderful Numberer or the Numberer of Secrets, who knew the exact numbers that would measure or count the time of the desolation of the temple and gives that number to Daniel. Since Jesus is described as the “Wonderful Counselor,” perhaps Palmoni, the Wonderful Numberer, was Christ, making this a Christophany in Daniel’s vision. Regardless, this verse shows us that numbers indeed have significance in Scripture and that their meanings and patterns were put there by God. We even have a book in the Bible called “Numbers.” An alternate view is that Palmoni or peloni is a contraction of a pronoun meaning “a certain one” and ’almoni, a pronoun meaning “one who is not mentioned.” These two pronouns are joined together to denote someone who is not named, i.e., with the sense of “such and such a person.”'
  - type: text
    content: '“How long will it be until '
  - type: text
    content: this
  - type: text
    content: ' vision is '
  - type: text
    content: fulfilled
  - type: text
    content: ', '
  - type: text
    content: in relation to
  - type: text
    content: ' the daily sacrifice, the rebellion that causes desolation, the handing over '
  - type: note
    content: The infinitive construct form tet (from the verb natan) denotes a nominal form here, with the meanings “giving over,” “handing over,” or “surrendering.”
  - type: text
    content: 'of the sanctuary, and the trampling underfoot of the host '
  - type: text
    content: of God’s people
  - type: text
    content: ?”
  - type: note
    content: Or “the host.” Because the meaning of the Hebrew of v. 13 is difficult, contains multiple glosses, and any translation is uncertain, it is recommended to read other translations for possible meanings.
  '14':
  - type: text
    content: 'He answered, “For 2,300 evenings and mornings; '
  - type: note
    content: This can be understood in two ways. (1) It could mean 2,300 days (6 years and 111 days) since the Hebraic concept of a “day” in Genesis 1 is evening and morning. (2) It could be counting the evening sacrifice and the morning sacrifice, which would then make it 1,150 days (3 years and 55 days). Due to the dating of when Antiochus IV Epiphanes set up the vile idol in the sanctuary, the latter interpretation is more likely. The important point not to miss is that God foretold precisely the day when the vile idol would be removed from the temple.
  - type: text
    content: then the sanctuary will be purified.”
  - type: note
    content: Or “then the sanctuary will be justified [restored].” This reconsecration of the sanctuary took place when the first Hanukkah was celebrated on 25 Kislev, 164 BC.
  - type: heading
    content: The Angel Gabriel Interprets Daniel’s Vision
  '15':
  - type: text
    content: While I, Daniel, was pondering the vision I had seen, suddenly there appeared before me one who looked like a man.
  - type: note
    content: The Hebrew contains something like a play on words. The Hebrew word for man is geber, and it has the same triliteral root as the proper name Gabriel. Gabriel means “geber [mighty or notable] of God” or “Mighty God is my mighty man [hero].” Gabriel is God’s intimidator, which is one reason angels always have to say, “Don’t be afraid” (10:12; see 10:19). Although angels are frequently mentioned in the Old Testament, only in the book of Daniel are they named.
  '16':
  - type: text
    content: 'Then I heard the voice of someone calling out over the waters of the Ulai canal, '
  - type: note
    content: 'Or “between the Ulai.” Theodotion’s revision of the Septuagint has “in the middle of the Ulai.” The early church read from and favored Theodotion’s version of Daniel over the Septuagint. (See Jerome, Commentary on Daniel, trans. Gleason Archer [Grand Rapids, MI: Baker Book House, 1958].)'
  - type: text
    content: '“Gabriel, '
  - type: note
    content: Gabriel is the first named angel mentioned in the Bible. Jewish tradition states that he is one of four archangels that include Michael, Uriel, and Raphael. He is recognized as the one who stands at the left hand of God with Michael on God’s right (see Pirqe Rabbi Eliezer 4:4).
  - type: text
    content: help this man understand the meaning of his vision.”
  '17':
  - type: text
    content: 'As '
  - type: text
    content: the angel
  - type: text
    content: ' Gabriel came closer to where I was standing, I was so terrified that I fell facedown on the ground. Then he said to me, “'
  - type: text
    content: Daniel
  - type: text
    content: ', son of man, '
  - type: note
    content: Gabriel addresses the prophet Daniel as “son of man,” the Hebrew equivalent of the Aramaic expression found in 7:13.
  - type: text
    content: you need to understand that your vision refers to the time of the end.”
  - type: note
    content: Or “the edge [fringe] of time.”
  '18':
  - type: text
    content: 'When he spoke with me, I '
  - type: text
    content: lost consciousness
  - type: text
    content: ' and passed out. '
  - type: note
    content: Or “I fell into a trance” or “into a deep sleep.” Daniel experienced a complete loss of consciousness before the angel Gabriel. The Hebrew verb used refers rather to an unusual supernatural state of unconsciousness. It is the same root used of Adam in the creation story (see Gen. 2:21). The splendor of Gabriel’s presence overwhelmed Daniel, much like what happened to John when he experienced an angelic encounter (see Rev. 22:8). Dazed and overpowered in Gabriel’s presence, Daniel passed out. See Gen. 15:12; Rev. 1:17.
  - type: text
    content: 'But he took hold of me and raised me to my feet. '
  '19':
  - type: text
    content: '“Listen,” he said, “and I will tell you what will take place in the time of wrath, '
  - type: note
    content: Or “the latter end of the indignation.”
  - type: text
    content: 'for the vision pertains to the appointed time of the end:'
  '2':
  - type: text
    content: 'In my vision I suddenly found myself in the fortress city of Susa, '
  - type: note
    content: The Hebrew is literally “And I saw in the vision; and when I saw, I was in Susa the citadel.” Daniel was transported in his vision to Susa. Interestingly, the traditional tomb of Daniel is in Susa.
  - type: text
    content: the capital
  - type: text
    content: ' of the province of Elam, '
  - type: note
    content: The province of Elam was situated east of the Tigris River. In the New Testament, Elamites were present in Jerusalem at Pentecost (see Acts 2:9).
  - type: text
    content: standing
  - type: text
    content: ' beside the Ulai canal. '
  - type: note
    content: Or “the Ulai gate” (LXX, Aramaic, Latin Vulgate). The “Ulai” is modern Eulaeus, an artificial canal that joins two other streams, the Kerkha and the Abdizful.
  '20':
  - type: text
    content: '“The ram that you saw with two '
  - type: text
    content: long
  - type: text
    content: ' horns represents the kingdoms of the Medes and the Persians.'
  '21':
  - type: text
    content: '“The male goat represents the kingdoms of Greece, '
  - type: note
    content: Or “Javan,” a Hebrew term for Greece.
  - type: text
    content: and the big horn on its forehead is the first king of the Greek Empire.
  '22':
  - type: text
    content: '“As for the horn that was broken off and replaced by four prominent horns, this signifies that four other kingdoms will rise from its midst, but their '
  - type: text
    content: combined
  - type: text
    content: ' power will not be as great as the first.'
  '23':
  - type: text
    content: '“When their reign comes to an end and their crimes have reached their full measure, there will arise a stern king, skilled in stubbornness and trickery. '
  - type: note
    content: Or “skilled in double-dealing” or “master of intrigue.” The Hebrew is literally “who understands riddles.” The king referred to here was the evil genius Antiochus IV Epiphanes, a thoroughly malicious, spiteful, and devious person. He was recognized as a cunning, shrewd expert in deception.
  '24':
  - type: text
    content: 'He will grow in might but not through any power of his own. '
  - type: note
    content: The Hebrew is literally “He will grow in power, but not with his own power.” The implication is that it is God who is allowing him to rule with great authority, for all authority comes from God (see Rom. 13:1).
  - type: text
    content: 'He will cause amazing devastation, '
  - type: note
    content: Or “He will destroy marvelous things.”
  - type: text
    content: 'succeed in every undertaking, and destroy mighty ones, the saints '
  - type: text
    content: of the Most High
  - type: text
    content: '. '
  '25':
  - type: text
    content: By his cunning, he will make treachery succeed under his rule. In his own mind, he will highly exaggerate his own importance. When they are at ease, he will suddenly destroy many. But when he rises up against the Prince of all princes, he will be broken—but not by any human power.
  - type: note
    content: The expression be’ephes yad means “without a hand [touching him].” See Dan. 2:34, 45.
  '26':
  - type: text
    content: '“The explanation of the vision you had about the evening and morning '
  - type: text
    content: sacrifices
  - type: text
    content: ' is '
  - type: text
    content: absolutely
  - type: text
    content: ' true. And seal up the vision, for it concerns the distant future.”'
  '27':
  - type: text
    content: I, Daniel, was dazed and lay sick for several days; then I got up and went back to serve the king. I was perplexed by the vision, for it seemed beyond understanding.
  '3':
  - type: text
    content: 'As I looked about, behold, I saw a ram '
  - type: note
    content: A ram is a symbol of strength, power, authority, and leadership. The word for “ram” in Arabic also means “warrior.”
  - type: text
    content: 'standing on the bank of the canal. It had two long horns, one behind the other, but the one behind was longer. '
  - type: note
    content: The “two long horns” represent the joint kingdom of Media and Persia. The longer horn was Persia, for it was more powerful and rose to power after Media.
  '4':
  - type: text
    content: 'I watched as the ram charged toward the west, then the north, and then the south. With each conquest, it became even more powerful. '
  - type: note
    content: Or “became arrogant” or possibly “accomplished great things.”
  - type: text
    content: No beast could withstand it or be rescued from its power; it did whatever it pleased.
  '5':
  - type: text
    content: 'As I considered what it all meant, I saw a male goat '
  - type: note
    content: The ram and goat are not wild beasts but domesticated animals used for sacrificial purposes. Num. 28–29 show that a ram and goat were offered on the altar during every major feast.
  - type: text
    content: 'come rushing from the west, racing across the whole earth without touching the ground. He had a '
  - type: text
    content: single
  - type: text
    content: ' prominent '
  - type: note
    content: The word for “prominent” in the Hebrew is literally “a horn of seeing.”
  - type: text
    content: 'horn on his forehead. '
  - type: note
    content: This single prominent horn represents Alexander the Great, the founder and first ruler of the Greek Empire (see v. 21).
  '6':
  - type: text
    content: 'The goat came up to the two-horned ram that I saw standing beside the canal and rushed at it with savage force. '
  '7':
  - type: text
    content: Then I saw him reach the ram and attack it with furious blows. He smashed it so hard that it broke off its two horns, for the ram had no power to withstand it. The goat knocked the ram to the ground and trampled it down. And there was no one to rescue the ram from his power.
  '8':
  - type: text
    content: 'Then the goat grew exceedingly arrogant. '
  - type: note
    content: Or “made a great display of his strength.”
  - type: text
    content: 'At the very peak of his power, his big horn '
  - type: text
    content: abruptly
  - type: text
    content: ' snapped off. In its place, four prominent horns came up, each pointing to a different direction. '
  - type: note
    content: Or “toward the four winds of heaven.” The “big horn” being snapped off is likely a reference to the untimely death of Alexander the Great with a sudden fever in 323 BC at the age of thirty-two. The “four prominent horns” that grew in its place could be a symbolic reference to the kingdoms of Macedonia, Asia Minor, Syria, and Egypt.
  '9':
  - type: text
    content: 'From one of them, '
  - type: note
    content: Or “From out of them.”
  - type: text
    content: 'a small horn emerged. '
  - type: note
    content: The small horn is likely a symbolic reference to Antiochus IV Epiphanes, whose name means “the Manifest/Conspicuous One.” He rose to power after killing his own brother and ruled over the Seleucid kingdom from 175 to 164 BC. Antiochus was known as one who hated the Jews and greatly persecuted them. In Jerusalem, Antiochus set up an idol of Zeus in the temple and offered a pig on the altar, desecrating it. This idol became known as the “abomination that brings desolation” (11:31), among other names. See the third footnote on v. 11. See also 9:27 and footnotes; Matt. 24:15–16.
  - type: text
    content: 'It eventually grew to be very big, and its power extended toward the south, the east, '
  - type: note
    content: Antiochus IV Epiphanes waged war to the south against Egypt and to the east against the Persians and Parthians.
  - type: text
    content: 'and toward the beautiful '
  - type: text
    content: land
  - type: text
    content: '. '
  - type: note
    content: Or “toward the glorious [promised land]” or possibly “the land of glory [or beauty],” a symbolic reference to the land of Israel. See Jer. 3:19; Ezek. 20:6.
