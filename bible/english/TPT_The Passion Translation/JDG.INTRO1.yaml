    text: About the Book of Judges
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The seventh book of the Bible in the Hebrew Scriptures is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shophetim
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: it
