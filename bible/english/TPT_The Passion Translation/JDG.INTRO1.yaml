  - type: text
    content: About the Book of Judges
  - type: text
    content: 'The seventh book of the Bible in the Hebrew Scriptures is '
  - type: text
    content: Shophetim
  - type: text
    content: ', '
  - type: note
    content: 'Shophetim could also be translated, “avengers,” “punishers,” “defenders,” “deliverers,” “saviors,” or possibly “governors.” In a sense, there is a dynamic at play in the Old Testament that mirrors the New Testament: Joshua parallels the book of Ephesians; Judges parallels the book of Galatians, for the message of Galatians leads the people of God out of error and bondage. The twelve judges have a parallel with the twelve apostles of Jesus. The book of Judges can be viewed as an apostolic manual for “last days” ministries. The judges were forerunners of the kingdom. God has promised that he will restore the era of deliverers (judges) in the last days to bring the church into complete victory. See Isa. 1:26; Obad. 21.'
  - type: text
    content: or “Judges.” It describes the various men and women who distinguished themselves in Israel during the time period between the book of Joshua and the establishment of a kingdom in 1 Samuel. For four hundred years, Israel had no king or prophet to guide them. Instead, twelve consecutive judges led them. But the Hebrew word for “judge” has little comparison to the western concept of a judge, one who sits on the bench judging court cases argued by trained lawyers.
  - type: text
    content: No, the judges were not law-court justices. Instead, they were Israel’s champion-deliverers. God chose them to deliver Israel from enemy oppression, lead the people of God into a revival, and restore their national identity. The role of these deliverers cannot be understated, for without their impact and deliverance, Israel’s enemies may have entirely consumed them. Some of the deliverers are well-known biblical champions, and others are somewhat obscure.
  - type: text
    content: 'Who were the judges? They were unique men and women who carried God’s presence—his Spirit—and were commissioned to deliver the people of Israel from the oppression of their enemies. They were saviors and rescuers, whom God raised up at the right time to rally the nation and bring victory to Israel. They were twelve divinely appointed champions who brought the people out of the wilderness mentality and into divine order and breakthrough when no one else could. Here are the six major judges and six minor judges:'
  - type: text
    content: Major Judges
  - type: text
    content: Minor Judges
  - type: text
    content: Gideon
  - type: text
    content: Shamgar
  - type: text
    content: Jephthah
  - type: text
    content: Elon
  - type: text
    content: Deborah
  - type: text
    content: Jair
  - type: text
    content: Ehud
  - type: text
    content: Tola
  - type: text
