    - type: text
      text: '7'
  - type: text
    text: 'Joshua cried out, “O Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', why did you lead these people across the Jordan? To be defeated? To be killed by the Amorites? If only we had been content to stay on the other side of the Jordan! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O Lord, what can I say now that Israel has retreated from its enemies? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the Canaanites and everyone else in the land hear about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our defeat
  - type: text
    text: ', they will gang up on us and wipe us off the face of the earth. And what then will you do about your great name?”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “What will you do to protect your great reputation?” Joshua pleaded with God to consider that his reputation was at stake over the success and protection of his people.
    marker-yv: yv-n
- type: usfm
