  - type: text
    text: 'When they returned to Joshua, they reported to him, “There is no need to trouble the whole army to conquer Ai. The people are so few that two or three thousand men could attack it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and take the city
  - type: text
    text: '.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nothing in our spiritual life is so small that we can war against it in our own strength without God.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Joshua sent three thousand troops to attack the city, but they were routed by the men of Ai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
