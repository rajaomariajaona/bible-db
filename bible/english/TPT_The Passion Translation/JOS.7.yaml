  - type: text
    text: ' spoke to Joshua: “Stand up! Why are you groveling before me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israel has sinned! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The defeat at Ai was not just because they did not pray and trust God; it was because there was sin in the camp of Israel and they had lost God’s favor. Although it was one individual, Achan, who sinned, God viewed them as a unit. We are one body in Christ, and the victory of one is the victory of all, and the sin of one is the sin of all. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 5:1–7
      metadata:
        usfm: 1CO.5.1+1CO.5.2+1CO.5.3+1CO.5.4+1CO.5.5+1CO.5.6+1CO.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . For the righteousness of one (Rahab), the whole of her family was saved. For the sin of Achan, the whole of his family was condemned. Thus it is imperative that we belong firmly to the family of God in Christ Jesus, our eldest brother and representative head.
    marker-yv: yv-n
  - type: text
    text: 'They have broken the covenant which I had commanded them to keep. They have taken forbidden plunder. They have stolen from me, taken what is mine, hidden it among their belongings, and lied about it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cursed things are among you! That is why Israel is powerless, has retreated from their enemies, and is in danger of annihilation. If you do not get rid of these cursed things from among you, I will not go with you any longer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Get up and purify the people in preparation for tomorrow. '
  - type: usfm
    marker: f
    children:
