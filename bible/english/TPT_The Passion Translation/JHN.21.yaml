document_id: JHN.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Appears at Lake Galilee
  - type: text
    content: 'Later, Jesus appeared once again to a group of his disciples by Lake Galilee. '
  - type: note
    content: Or “the Sea of Tiberias.”
  '10':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Bring some of the fish you just caught.”
  '11':
  - type: text
    content: 'So Peter waded into the water and helped pull the net to shore. It was full of many large fish, exactly one hundred and fifty-three, '
  - type: note
    content: This speaks of the great redemption of Christ for all nations and all people. One hundred and fifty-three large fish points to a mighty harvest from among the people groups of the world. This great catch of fish begins the process of inner healing for Peter and the guilt of his denial of Christ. Peter began to follow Jesus because of a great catch of fish (Luke 5:2–10), so Jesus now repeated that miracle, inviting Peter to begin to follow him again. According to the early church father Jerome, there were 153 species of fish in Lake Galilee that would remind Peter of his original call to be a fisher of men.
  - type: text
    content: but even with so many fish, the net was not torn.
  '12':
  - type: text
    content: “Come, let’s have some breakfast,”
  - type: text
    content: ' Jesus said to them.'
  - type: text
    content: 'And not one of the disciples needed to ask who it was, because every one of them knew it was the Lord. '
  '13':
  - type: text
    content: 'Then Jesus came close to them and served them the bread and the fish. '
  '14':
  - type: text
    content: This was the third time Jesus appeared to his disciples after his resurrection.
  - type: heading
    content: Jesus Restores Peter
  '15':
  - type: text
    content: 'After they had breakfast, Jesus said to Peter, '
  - type: text
    content: “Simon, son of Jonah,
  - type: text
    content: ' '
  - type: note
    content: Jesus called Peter “Simon, son of Jonah” because Jonah was the prophet who ran from his calling, but was supernaturally restored. So Peter had followed Jonah’s example, by denying Jesus and running away. Yet Jesus now stood before him to fully restore him and heal his heart. See also vv. 16, 17.
  - type: text
    content: do you burn with love
  - type: text
    content: ' '
  - type: note
    content: The Aramaic word for “love” is hooba, and is taken from a root word that means “to set on fire.” This was the word Jesus would have used to ask Peter, “Do you burn with love for me?” Our love for Jesus must be passionate and kindle a holy flame within our hearts. See Song. 8:6–7.
  - type: text
    content: for me more than these?”
  - type: note
    content: As often is the case, Jesus’ words have more than one meaning. “These” can refer to the fish they had just caught, for Peter was a fisherman and loved to fish. He may have been counting and sorting the fish when Jesus asked him that question. But “these” most likely refers to the other disciples. It was Peter’s boast that he loved Jesus more than the others, and though everyone else would leave him, Peter never would. That boast proved empty, as within hours of making the claim, Peter denied he even knew Jesus three times. So Jesus asked Peter three times if he loved him. In essence, Jesus knew how to bring healing to Peter and remove the pain of his denial. Three times Peter denied Jesus, but three times he made his confession of his deep love for Christ. By the third time, the “crowing rooster” inside Peter had been silenced, and now he was ready to be a shepherd for Jesus’ flock.
  - type: text
    content: Peter answered, “Yes, Lord! You know that I have great affection for you!”
  - type: text
    content: “Then take care of my lambs,”
  - type: text
    content: ' '
  - type: note
    content: 'The Aramaic is “feed my rams” (male lambs). This may refer to the other disciples. In v. 16 the Aramaic is simply “sheep.” And in v. 17 in Aramaic, Jesus used the third term “ewes” (female lambs). Some see in these that Peter was symbolically given charge of three flocks: Jews, Samaritans, and gentiles. Regardless, men and women need to be cared for and fed by the leadership of Christ’s church among the nations.'
  - type: text
    content: Jesus said.
  '16':
  - type: text
    content: 'Jesus repeated his question the second time, '
  - type: text
    content: “Simon, son of Jonah, do you burn with love for me?”
  - type: text
    content: Peter answered, “Yes, my Lord! You know that I have great affection for you!”
  - type: text
    content: “Then take care of my sheep,”
  - type: text
    content: ' Jesus said.'
  '17':
  - type: text
    content: 'Then Jesus asked him again, '
  - type: text
    content: “Peter, son of Jonah, do you have great affection for me?”
  - type: text
    content: 'Peter was saddened by being asked the third time '
  - type: note
    content: Three times Peter denied Christ, so Jesus gave him three opportunities to redeem himself.
  - type: text
    content: and said, “My Lord, you know everything. You know that I burn with love for you!”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Then feed my lambs!
  - type: text
    content: ' '
  '18':
  - type: text
    content: Peter, listen, when you were younger you made your own choices
  - type: text
    content: ' '
  - type: note
    content: Or “you girded yourself.”
  - type: text
    content: and you went where you pleased. But one day when you are old,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “grayheaded.”
  - type: text
    content: others will tie you up and escort you where you would not choose to go—and you will spread out your arms.”
  - type: text
    content: ' '
  - type: note
    content: Or “stretch out your hands.” This was clearly a hint of the martyrdom Peter would experience in Rome one day, where historians have recorded that Peter was crucified upside down, at his request, because he said that he was unworthy to be crucified in the same way as his Lord. He once said he was willing to die for our Lord Jesus; here Christ promised that would happen.
  '19':
  - type: text
    content: '(Jesus said this to Peter as a prophecy of what kind of death he would die, for the glory of God.) And then he said, '
  - type: text
    content: “Peter, follow me!”
  '2':
  - type: text
    content: 'It happened one day while Peter, Thomas (the Twin), Nathanael (from Cana in Galilee), Jacob, John, '
  - type: note
    content: Or in place of Jacob (James) and John, “the sons of Zebedee.”
  - type: text
    content: 'and two other disciples were all together. '
  '20':
  - type: text
    content: 'Then Peter turned and saw that the disciple whom Jesus loved was following them. (This was the disciple who sat close to Jesus at the Last Supper and had asked him, “Lord, who is the one that will betray you?”) '
  '21':
  - type: text
    content: So when Peter saw him, he asked Jesus, “What’s going to happen to him?”
  '22':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If I decide to let him live until I return, what concern is that of yours? You must still keep on following me!”
  '23':
  - type: text
    content: 'So the rumor started to circulate among the believers that this disciple wasn’t going to die. But Jesus never said that, he only said, '
  - type: text
    content: “If I let him live until I return, what concern is that of yours?”
  - type: heading
    content: Conclusion
  '24':
  - type: text
    content: 'I, John, '
  - type: note
    content: The evidence both internally and externally clearly points to John as the author of this book, thus the explicit reference here.
  - type: text
    content: 'am that disciple who has written these things to testify of the truth, and we '
  - type: note
    content: The word we implies that John had conferred with the other disciples, as he has left us an accurate account of the life of Jesus Christ.
  - type: text
    content: 'know that what I’ve documented is accurate. '
  '25':
  - type: text
    content: 'Jesus did countless things that I haven’t included here. And if every one of his works were written down '
  - type: text
    content: and described one by one
  - type: text
    content: ', '
  - type: note
    content: Implied in the Aramaic.
  - type: text
    content: I suppose that the world itself wouldn’t have enough room to contain the books that would have to be written!
  - type: note
    content: 'The Aramaic is very poetic: “The world itself would be emptied out into the books that would be written.” An alternate translation of the Aramaic could read “I suppose that forever is still not enough time for all the books to be written!”'
  '3':
  - type: text
    content: 'Peter told them, “I’m going fishing.” And they all replied, “We’ll go with you.” '
  - type: note
    content: According to Luke 24:49, the disciples were told to wait in Jerusalem for the day they would be clothed with power. These seven apostles were not following what they had been told, and for this reason they caught nothing until Jesus joined them. He became the eighth man.
  - type: text
    content: So they went out and fished through the night, but caught nothing.
  '4':
  - type: text
    content: 'Then at dawn, Jesus was standing there on the shore, but the disciples didn’t realize that it was him! '
  '5':
  - type: text
    content: 'He called out to them, saying, '
  - type: text
    content: “Hey guys! Did you catch any fish?”
  - type: note
    content: Or “Have you caught anything to eat?”
  - type: text
    content: “Not a thing,” they replied.
  '6':
  - type: text
    content: 'Jesus shouted to them, '
  - type: text
    content: “Throw your net over the starboard side, and you’ll catch some!”
  - type: text
    content: ' And so they did as he said, and they caught so many fish they couldn’t even pull in the net!'
  '7':
  - type: text
    content: 'Then the disciple whom Jesus loved said to Peter, “It’s the Lord!” '
  - type: note
    content: It was John, the one whom Jesus loved, that recognized the voice of Jesus. Perhaps it was Peter’s discouragement that prevented him from recognizing the voice of the Master. Peter’s name was Simon (Hb. Simeon), which means “he who hears.” Our hearing his voice is hindered when we are confused and filled with doubts.
  - type: text
    content: 'When Peter heard him say that, he quickly wrapped his outer garment around him, and because he was athletic, '
  - type: note
    content: As translated from the Aramaic. The Greek is literally “because he was naked.” This is very strange and most expositors make quite a case for this not being the case, in spite of the Greek saying he was, indeed, naked. The problem is solved by the Aramaic, which says, “because Peter was athletic, he dove into the water.”
  - type: text
    content: 'he dove right into the lake to go to Jesus! '
  '8':
  - type: text
    content: 'The other disciples then brought the boat to shore, dragging their catch of fish. They weren’t far from land, only about a hundred meters. '
  '9':
  - type: text
    content: 'And when they got to shore, they noticed a charcoal fire with some roasted fish and bread. '
  - type: note
    content: It was while standing next to a fire that Peter denied Christ; now standing next to a fire, Jesus would restore his beloved friend.
