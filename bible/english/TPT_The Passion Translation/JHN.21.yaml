          text: As translated from the Aramaic. The Greek is literally “because he was naked.” This is very strange and most expositors make quite a case for this not being the case, in spite of the Greek saying he was, indeed, naked. The problem is solved by the Aramaic, which says, “because Peter was athletic, he dove into the water.”
