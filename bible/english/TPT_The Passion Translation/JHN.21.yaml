  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Bring some of the fish you just caught.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Peter waded into the water and helped pull the net to shore. It was full of many large fish, exactly one hundred and fifty-three, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This speaks of the great redemption of Christ for all nations and all people. One hundred and fifty-three large fish points to a mighty harvest from among the people groups of the world. This great catch of fish begins the process of inner healing for Peter and the guilt of his denial of Christ. Peter began to follow Jesus because of a great catch of fish (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 5:2–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), so Jesus now repeated that miracle, inviting Peter to begin to follow him again. According to the early church father Jerome, there were 153 species of fish in Lake Galilee that would remind Peter of his original call to be a fisher of men.
      marker-yv: yv-n
    - type: text
      text: but even with so many fish, the net was not torn.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, let’s have some breakfast,”
    - type: text
      text: ' Jesus said to them.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And not one of the disciples needed to ask who it was, because every one of them knew it was the Lord. '
