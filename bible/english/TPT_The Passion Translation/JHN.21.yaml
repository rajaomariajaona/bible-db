        children:
        - type: text
          text: ', and is taken from a root word that means “to set on fire.” This was the word Jesus would have used to ask Peter, “Do you burn with love for me?” Our love for Jesus must be passionate and kindle a holy flame within our hearts. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 8:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for me more than these?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As often is the case, Jesus’ words have more than one meaning. “These” can refer to the fish they had just caught, for Peter was a fisherman and loved to fish. He may have been counting and sorting the fish when Jesus asked him that question. But “these” most likely refers to the other disciples. It was Peter’s boast that he loved Jesus more than the others, and though everyone else would leave him, Peter never would. That boast proved empty, as within hours of making the claim, Peter denied he even knew Jesus three times. So Jesus asked Peter three times if he loved him. In essence, Jesus knew how to bring healing to Peter and remove the pain of his denial. Three times Peter denied Jesus, but three times he made his confession of his deep love for Christ. By the third time, the “crowing rooster” inside Peter had been silenced, and now he was ready to be a shepherd for Jesus’ flock.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter answered, “Yes, Lord! You know that I have great affection for you!”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then take care of my lambs,”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “feed my rams” (male lambs). This may refer to the other disciples. In v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
