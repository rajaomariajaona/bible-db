          text: 'in Aramaic, Jesus used the third term “ewes” (female lambs). Some see in these that Peter was symbolically given charge of three flocks: Jews, Samaritans, and gentiles. Regardless, men and women need to be cared for and fed by the leadership of Christ’s church among the nations.'
      marker-yv: yv-n
    - type: text
