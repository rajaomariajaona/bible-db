      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “stretch out your hands.” This was clearly a hint of the martyrdom Peter would experience in Rome one day, where historians have recorded that Peter was crucified upside down, at his request, because he said that he was unworthy to be crucified in the same way as his Lord. He once said he was willing to die for our Lord Jesus; here Christ promised that would happen.
      marker-yv: yv-n
  '19':
  - type: usfm
