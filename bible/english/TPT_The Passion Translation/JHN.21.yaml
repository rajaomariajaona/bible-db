        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus called Peter “Simon, son of Jonah” because Jonah was the prophet who ran from his calling, but was supernaturally restored. So Peter had followed Jonah’s example, by denying Jesus and running away. Yet Jesus now stood before him to fully restore him and heal his heart. See also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
