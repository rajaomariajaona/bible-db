document_id: LUK.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Teachings about Forgiveness and Faith
  - type: text
    content: 'One day Jesus said to his disciples, '
  - type: text
    content: “There will always be temptations to sin, but what sorrow awaits the person who does the tempting!
  - type: text
    content: ' '
  '10':
  - type: text
    content: In the same way, when you obey me you should say, ‘We are unworthy servants who have simply done our duty.’”
  - type: heading
    content: Ten Healed of Leprosy
  '11':
  - type: text
    content: 'As Jesus continued on toward Jerusalem, he reached the border between Galilee and Samaria. '
  '12':
  - type: text
    content: 'As he entered a village there, ten men with leprosy stood at a distance, '
  '13':
  - type: text
    content: crying out, “Jesus, Master, have mercy on us!”
  '14':
  - type: text
    content: 'He looked at them and said, '
  - type: text
    content: “Go show yourselves to the priests.”
  - type: note
    content: See Lev 14:2-32.
  - type: text
    content: ' And as they went, they were cleansed of their leprosy.'
  '15':
  - type: text
    content: 'One of them, when he saw that he was healed, came back to Jesus, shouting, “Praise God!” '
  '16':
  - type: text
    content: He fell to the ground at Jesus’ feet, thanking him for what he had done. This man was a Samaritan.
  '17':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “Didn’t I heal ten men? Where are the other nine?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Has no one returned to give glory to God except this foreigner?”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And Jesus said to the man, '
  - type: text
    content: “Stand up and go. Your faith has healed you.
  - type: note
    content: Or Your faith has saved you.
  - type: text
    content: ”
  - type: heading
    content: The Coming of the Kingdom
  '2':
  - type: text
    content: It would be better to be thrown into the sea with a millstone hung around your neck than to cause one of these little ones to fall into sin.
  - type: text
    content: ' '
  '20':
  - type: text
    content: One day the Pharisees asked Jesus, “When will the Kingdom of God come?”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The Kingdom of God can’t be detected by visible signs.
  - type: note
    content: Or by your speculations.
  - type: text
    content: ' '
  '21':
  - type: text
    content: You won’t be able to say, ‘Here it is!’ or ‘It’s over there!’ For the Kingdom of God is already among you.
  - type: note
    content: Or is within you, or is in your grasp.
  - type: text
    content: ”
  '22':
  - type: text
    content: 'Then he said to his disciples, '
  - type: text
    content: “The time is coming when you will long to see the day when the Son of Man returns,
  - type: note
    content: Or long for even one day with the Son of Man. “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: but you won’t see it.
  - type: text
    content: ' '
  '23':
  - type: text
    content: People will tell you, ‘Look, there is the Son of Man,’ or ‘Here he is,’ but don’t go out and follow them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For as the lightning flashes and lights up the sky from one end to the other, so it will be on the day
  - type: note
    content: Some manuscripts do not include on the day.
  - type: text
    content: ' '
  - type: text
    content: when the Son of Man comes.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But first the Son of Man must suffer terribly
  - type: note
    content: Or suffer many things.
  - type: text
    content: ' '
  - type: text
    content: and be rejected by this generation.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “When the Son of Man returns, it will be like it was in Noah’s day.
  - type: text
    content: ' '
  '27':
  - type: text
    content: In those days, the people enjoyed banquets and parties and weddings right up to the time Noah entered his boat and the flood came and destroyed them all.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “And the world will be as it was in the days of Lot. People went about their daily business—eating and drinking, buying and selling, farming and building—
  - type: text
    content: ' '
  '29':
  - type: text
    content: until the morning Lot left Sodom. Then fire and burning sulfur rained down from heaven and destroyed them all.
  - type: text
    content: ' '
  '3':
  - type: text
    content: So watch yourselves!
  - type: text
    content: “If another believer
  - type: text
    content: ' '
  - type: note
    content: Greek If your brother.
  - type: text
    content: sins, rebuke that person; then if there is repentance, forgive.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Yes, it will be ‘business as usual’ right up to the day when the Son of Man is revealed.
  - type: text
    content: ' '
  '31':
  - type: text
    content: On that day a person out on the deck of a roof must not go down into the house to pack. A person out in the field must not return home.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Remember what happened to Lot’s wife!
  - type: text
    content: ' '
  '33':
  - type: text
    content: If you cling to your life, you will lose it, and if you let your life go, you will save it.
  - type: text
    content: ' '
  '34':
  - type: text
    content: That night two people will be asleep in one bed; one will be taken, the other left.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Two women will be grinding flour together at the mill; one will be taken, the other left.
  - type: note
    content: Some manuscripts add verse 36, Two men will be working in the field; one will be taken, the other left. Compare Matt 24:40.
  - type: text
    content: ”
  '37':
  - type: text
    content: “Where will this happen, Lord?”
  - type: note
    content: Greek “Where, Lord?”
  - type: text
    content: ' the disciples asked.'
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Just as the gathering of vultures shows there is a carcass nearby, so these signs indicate that the end is near.”
  - type: note
    content: Greek “Wherever the carcass is, the vultures gather.”
  '4':
  - type: text
    content: Even if that person wrongs you seven times a day and each time turns again and asks forgiveness, you must forgive.”
  '5':
  - type: text
    content: The apostles said to the Lord, “Show us how to increase our faith.”
  '6':
  - type: text
    content: 'The Lord answered, '
  - type: text
    content: “If you had faith even as small as a mustard seed, you could say to this mulberry tree, ‘May you be uprooted and be planted in the sea,’ and it would obey you!
  '7':
  - type: text
    content: ' '
  - type: text
    content: “When a servant comes in from plowing or taking care of sheep, does his master say, ‘Come in and eat with me’?
  - type: text
    content: ' '
  '8':
  - type: text
    content: No, he says, ‘Prepare my meal, put on your apron, and serve me while I eat. Then you can eat later.’
  - type: text
    content: ' '
  '9':
  - type: text
    content: And does the master thank the servant for doing what he was told to do? Of course not.
  - type: text
    content: ' '
