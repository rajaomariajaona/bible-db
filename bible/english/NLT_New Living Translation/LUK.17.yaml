document_id: LUK.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teachings about Forgiveness and Faith
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day Jesus said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There will always be temptations to sin, but what sorrow awaits the person who does the tempting!
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way, when you obey me you should say, ‘We are unworthy servants who have simply done our duty.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ten Healed of Leprosy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As Jesus continued on toward Jerusalem, he reached the border between Galilee and Samaria. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As he entered a village there, ten men with leprosy stood at a distance, '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: crying out, “Jesus, Master, have mercy on us!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He looked at them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go show yourselves to the priests.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Lev 14:2-32.
      marker-yv: yv-n
    - type: text
      text: ' And as they went, they were cleansed of their leprosy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them, when he saw that he was healed, came back to Jesus, shouting, “Praise God!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He fell to the ground at Jesus’ feet, thanking him for what he had done. This man was a Samaritan.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Didn’t I heal ten men? Where are the other nine?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Has no one returned to give glory to God except this foreigner?”
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stand up and go. Your faith has healed you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Your faith has saved you.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Coming of the Kingdom
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It would be better to be thrown into the sea with a millstone hung around your neck than to cause one of these little ones to fall into sin.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day the Pharisees asked Jesus, “When will the Kingdom of God come?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Kingdom of God can’t be detected by visible signs.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by your speculations.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You won’t be able to say, ‘Here it is!’ or ‘It’s over there!’ For the Kingdom of God is already among you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'is within you, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is in your grasp.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The time is coming when you will long to see the day when the Son of Man returns,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long for even one day with the Son of Man. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but you won’t see it.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: People will tell you, ‘Look, there is the Son of Man,’ or ‘Here he is,’ but don’t go out and follow them.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For as the lightning flashes and lights up the sky from one end to the other, so it will be on the day
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on the day.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: when the Son of Man comes.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But first the Son of Man must suffer terribly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suffer many things.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and be rejected by this generation.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When the Son of Man returns, it will be like it was in Noah’s day.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In those days, the people enjoyed banquets and parties and weddings right up to the time Noah entered his boat and the flood came and destroyed them all.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And the world will be as it was in the days of Lot. People went about their daily business—eating and drinking, buying and selling, farming and building—
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: until the morning Lot left Sodom. Then fire and burning sulfur rained down from heaven and destroyed them all.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So watch yourselves!
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If another believer
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: If your brother.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sins, rebuke that person; then if there is repentance, forgive.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, it will be ‘business as usual’ right up to the day when the Son of Man is revealed.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On that day a person out on the deck of a roof must not go down into the house to pack. A person out in the field must not return home.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remember what happened to Lot’s wife!
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you cling to your life, you will lose it, and if you let your life go, you will save it.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That night two people will be asleep in one bed; one will be taken, the other left.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Two women will be grinding flour together at the mill; one will be taken, the other left.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 36, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Two men will be working in the field; one will be taken, the other left. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 24:40.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Where will this happen, Lord?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:37a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Where, Lord?”
      marker-yv: yv-n
    - type: text
      text: ' the disciples asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Just as the gathering of vultures shows there is a carcass nearby, so these signs indicate that the end is near.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:37b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Wherever the carcass is, the vultures gather.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even if that person wrongs you seven times a day and each time turns again and asks forgiveness, you must forgive.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The apostles said to the Lord, “Show us how to increase our faith.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you had faith even as small as a mustard seed, you could say to this mulberry tree, ‘May you be uprooted and be planted in the sea,’ and it would obey you!
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When a servant comes in from plowing or taking care of sheep, does his master say, ‘Come in and eat with me’?
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: No, he says, ‘Prepare my meal, put on your apron, and serve me while I eat. Then you can eat later.’
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And does the master thank the servant for doing what he was told to do? Of course not.
    - type: text
      text: ' '
