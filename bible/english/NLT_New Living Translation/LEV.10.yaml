document_id: LEV.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sin of Nadab and Abihu
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aaron’s sons Nadab and Abihu put coals of fire in their incense burners and sprinkled incense over them. In this way, they disobeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by burning before him the wrong kind of fire, different than he had commanded. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You must distinguish between what is sacred and what is common, between what is ceremonially unclean and what is clean. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And you must teach the Israelites all the decrees that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them through Moses.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron and his remaining sons, Eleazar and Ithamar, “Take what is left of the grain offering after a portion has been presented as a special gift to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and eat it beside the altar. Make sure it contains no yeast, for it is most holy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must eat it in a sacred place, for it has been given to you and your descendants as your portion of the special gifts presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. These are the commands I have been given. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the breast and thigh that were lifted up as a special offering may be eaten in any place that is ceremonially clean. These parts have been given to you and your descendants as your portion of the peace offerings presented by the people of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must lift up the thigh and breast as a special offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', along with the fat of the special gifts. These parts will belong to you and your descendants as your permanent right, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses then asked them what had happened to the goat of the sin offering. When he discovered it had been burned up, he became very angry with Eleazar and Ithamar, Aaron’s remaining sons. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Why didn’t you eat the sin offering in the sacred area?” he demanded. “It is a holy offering! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given it to you to remove the guilt of the community and to purify the people, making them right with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to make atonement for the people before the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Since the animal’s blood was not brought into the Holy Place, you should have eaten the meat in the sacred area as I ordered you.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Aaron answered Moses, “Today my sons presented both their sin offering and their burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And yet this tragedy has happened to me. If I had eaten the people’s sin offering on such a tragic day as this, would the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have been pleased?” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So fire blazed forth from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence and burned them up, and they died there before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when Moses heard this, he was satisfied.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' meant when he said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I will display my holiness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through those who come near me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will display my glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before all the people.’”
  - type: usfm
    marker: m
    children:
    - type: text
      text: And Aaron was silent.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses called for Mishael and Elzaphan, Aaron’s cousins, the sons of Aaron’s uncle Uzziel. He said to them, “Come forward and carry away the bodies of your relatives from in front of the sanctuary to a place outside the camp.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they came forward and picked them up by their garments and carried them out of the camp, just as Moses had commanded.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to Aaron and his sons Eleazar and Ithamar, “Do not show grief by leaving your hair uncombed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by uncovering your heads.
      marker-yv: yv-n
    - type: text
      text: ' or by tearing your clothes. If you do, you will die, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger will strike the whole community of Israel. However, the rest of the Israelites, your relatives, may mourn because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s fiery destruction of Nadab and Abihu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you must not leave the entrance of the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 10:9.
      marker-yv: yv-n
    - type: text
      text: ' or you will die, for you have been anointed with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointing oil.” So they did as Moses commanded.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions for Priestly Conduct
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Aaron, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“You and your descendants must never drink wine or any other alcoholic drink before going into the Tabernacle. If you do, you will die. This is a permanent law for you, and it must be observed from generation to generation. '
