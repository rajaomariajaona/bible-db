document_id: LEV.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sin of Nadab and Abihu
  - type: text
    content: 'Aaron’s sons Nadab and Abihu put coals of fire in their incense burners and sprinkled incense over them. In this way, they disobeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' by burning before him the wrong kind of fire, different than he had commanded. '
  '10':
  - type: text
    content: 'You must distinguish between what is sacred and what is common, between what is ceremonially unclean and what is clean. '
  '11':
  - type: text
    content: 'And you must teach the Israelites all the decrees that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them through Moses.”'
  '12':
  - type: text
    content: 'Then Moses said to Aaron and his remaining sons, Eleazar and Ithamar, “Take what is left of the grain offering after a portion has been presented as a special gift to the '
  - type: text
    content: Lord
  - type: text
    content: ', and eat it beside the altar. Make sure it contains no yeast, for it is most holy. '
  '13':
  - type: text
    content: 'You must eat it in a sacred place, for it has been given to you and your descendants as your portion of the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. These are the commands I have been given. '
  '14':
  - type: text
    content: 'But the breast and thigh that were lifted up as a special offering may be eaten in any place that is ceremonially clean. These parts have been given to you and your descendants as your portion of the peace offerings presented by the people of Israel. '
  '15':
  - type: text
    content: 'You must lift up the thigh and breast as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', along with the fat of the special gifts. These parts will belong to you and your descendants as your permanent right, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '16':
  - type: text
    content: 'Moses then asked them what had happened to the goat of the sin offering. When he discovered it had been burned up, he became very angry with Eleazar and Ithamar, Aaron’s remaining sons. '
  '17':
  - type: text
    content: '“Why didn’t you eat the sin offering in the sacred area?” he demanded. “It is a holy offering! The '
  - type: text
    content: Lord
  - type: text
    content: ' has given it to you to remove the guilt of the community and to purify the people, making them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for the people before the Lord.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Since the animal’s blood was not brought into the Holy Place, you should have eaten the meat in the sacred area as I ordered you.”
  '19':
  - type: text
    content: 'Then Aaron answered Moses, “Today my sons presented both their sin offering and their burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. And yet this tragedy has happened to me. If I had eaten the people’s sin offering on such a tragic day as this, would the '
  - type: text
    content: Lord
  - type: text
    content: ' have been pleased?” '
  '2':
  - type: text
    content: 'So fire blazed forth from the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence and burned them up, and they died there before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: And when Moses heard this, he was satisfied.
  '3':
  - type: text
    content: 'Then Moses said to Aaron, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' meant when he said,'
  - type: text
    content: ‘I will display my holiness
  - type: text
    content: through those who come near me.
  - type: text
    content: I will display my glory
  - type: text
    content: before all the people.’”
  - type: text
    content: And Aaron was silent.
  '4':
  - type: text
    content: 'Then Moses called for Mishael and Elzaphan, Aaron’s cousins, the sons of Aaron’s uncle Uzziel. He said to them, “Come forward and carry away the bodies of your relatives from in front of the sanctuary to a place outside the camp.” '
  '5':
  - type: text
    content: So they came forward and picked them up by their garments and carried them out of the camp, just as Moses had commanded.
  '6':
  - type: text
    content: Then Moses said to Aaron and his sons Eleazar and Ithamar, “Do not show grief by leaving your hair uncombed
  - type: note
    content: Or by uncovering your heads.
  - type: text
    content: ' or by tearing your clothes. If you do, you will die, and the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger will strike the whole community of Israel. However, the rest of the Israelites, your relatives, may mourn because of the '
  - type: text
    content: Lord
  - type: text
    content: '’s fiery destruction of Nadab and Abihu. '
  '7':
  - type: text
    content: But you must not leave the entrance of the Tabernacle
  - type: note
    content: Hebrew Tent of Meeting; also in 10:9.
  - type: text
    content: ' or you will die, for you have been anointed with the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointing oil.” So they did as Moses commanded.
  - type: heading
    content: Instructions for Priestly Conduct
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, '
  '9':
  - type: text
    content: '“You and your descendants must never drink wine or any other alcoholic drink before going into the Tabernacle. If you do, you will die. This is a permanent law for you, and it must be observed from generation to generation. '
