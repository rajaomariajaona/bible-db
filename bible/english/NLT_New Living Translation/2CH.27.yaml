document_id: 2CH.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jotham Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jotham was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother was Jerusha, the daughter of Zadok.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jotham did what was pleasing in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. He did everything his father, Uzziah, had done, except that Jotham did not sin by entering the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . But the people continued in their corrupt ways.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jotham rebuilt the upper gate of the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He also did extensive rebuilding on the wall at the hill of Ophel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He built towns in the hill country of Judah and constructed fortresses and towers in the wooded areas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jotham went to war against the Ammonites and conquered them. Over the next three years he received from them an annual tribute of 7,500 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver, 50,000 bushels of wheat, and 50,000 bushels of barley.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10,000 cors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2,200 kiloliters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of wheat, and 10,000 cors of barley.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'King Jotham became powerful because he was careful to live in obedience to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The rest of the events of Jotham’s reign, including all his wars and other activities, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Israel and Judah.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When Jotham died, he was buried in the City of David. And his son Ahaz became the next king.
