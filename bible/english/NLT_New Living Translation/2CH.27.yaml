document_id: 2CH.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham Rules in Judah
  - type: text
    content: Jotham was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother was Jerusha, the daughter of Zadok.
  '2':
  - type: text
    content: 'Jotham did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. He did everything his father, Uzziah, had done, except that Jotham did not sin by entering the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: . But the people continued in their corrupt ways.
  '3':
  - type: text
    content: 'Jotham rebuilt the upper gate of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He also did extensive rebuilding on the wall at the hill of Ophel. '
  '4':
  - type: text
    content: 'He built towns in the hill country of Judah and constructed fortresses and towers in the wooded areas. '
  '5':
  - type: text
    content: Jotham went to war against the Ammonites and conquered them. Over the next three years he received from them an annual tribute of 7,500 pounds
  - type: note
    content: Hebrew 100 talents [3,400 kilograms].
  - type: text
    content: ' of silver, 50,000 bushels of wheat, and 50,000 bushels of barley.'
  - type: note
    content: Hebrew 10,000 cors [2,200 kiloliters] of wheat, and 10,000 cors of barley.
  '6':
  - type: text
    content: 'King Jotham became powerful because he was careful to live in obedience to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: 'The rest of the events of Jotham’s reign, including all his wars and other activities, are recorded in '
  - type: text
    content: The Book of the Kings of Israel and Judah.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. '
  '9':
  - type: text
    content: When Jotham died, he was buried in the City of David. And his son Ahaz became the next king.
