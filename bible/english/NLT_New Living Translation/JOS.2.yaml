document_id: JOS.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rahab Protects the Spies
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Joshua secretly sent out two spies from the Israelite camp at Acacia Grove.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shittim.
      marker-yv: yv-n
    - type: text
      text: ' He instructed them, “Scout out the land on the other side of the Jordan River, especially around Jericho.” So the two men set out and came to the house of a prostitute named Rahab and stayed there that night.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we have heard how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made a dry path for you through the Red Sea'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
    - type: text
      text: ' when you left Egypt. And we know what you did to Sihon and Og, the two Amorite kings east of the Jordan River, whose people you completely destroyed.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No wonder our hearts have melted in fear! No one has the courage to fight after hearing such things. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is the supreme God of the heavens above and the earth below.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now swear to me by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that you will be kind to me and my family since I have helped you. Give me some guarantee that '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: when Jericho is conquered, you will let me live, along with my father and mother, my brothers and sisters, and all their families.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We offer our own lives as a guarantee for your safety,” the men agreed. “If you don’t betray us, we will keep our promise and be kind to you when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives us the land.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, since Rahab’s house was built into the town wall, she let them down by a rope through the window. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Escape to the hill country,” she told them. “Hide there for three days from the men searching for you. Then, when they have returned, you can go on your way.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before they left, the men told her, “We will be bound by the oath we have taken only if you follow these instructions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we come into the land, you must leave this scarlet rope hanging from the window through which you let us down. And all your family members—your father, mother, brothers, and all your relatives—must be here inside the house. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If they go out into the street and are killed, it will not be our fault. But if anyone lays a hand on people inside this house, we will accept the responsibility for their death. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But someone told the king of Jericho, “Some Israelites have come here tonight to spy out the land.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you betray us, however, we are not bound by this oath in any way.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I accept your terms,” she replied. And she sent them on their way, leaving the scarlet rope hanging from the window.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The spies went up into the hill country and stayed there three days. The men who were chasing them searched everywhere along the road, but they finally returned without success.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the two spies came down from the hill country, crossed the Jordan River, and reported to Joshua all that had happened to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given us the whole land,” they said, “for all the people in the land are terrified of us.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king of Jericho sent orders to Rahab: “Bring out the men who have come into your house, for they have come here to spy out the whole land.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rahab had hidden the two men, but she replied, “Yes, the men were here earlier, but I didn’t know where they were from. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They left the town at dusk, as the gates were about to close. I don’t know where they went. If you hurry, you can probably catch up with them.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Actually, she had taken them up to the roof and hidden them beneath bundles of flax she had laid out.) '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king’s men went looking for the spies along the road leading to the shallow crossings of the Jordan River. And as soon as the king’s men had left, the gate of Jericho was shut.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before the spies went to sleep that night, Rahab went up on the roof to talk with them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you this land,” she told them. “We are all afraid of you. Everyone in the land is living in terror. '
