document_id: JOS.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Rahab Protects the Spies
  - type: text
    content: Then Joshua secretly sent out two spies from the Israelite camp at Acacia Grove.
  - type: note
    content: Hebrew Shittim.
  - type: text
    content: ' He instructed them, “Scout out the land on the other side of the Jordan River, especially around Jericho.” So the two men set out and came to the house of a prostitute named Rahab and stayed there that night.'
  '10':
  - type: text
    content: 'For we have heard how the '
  - type: text
    content: Lord
  - type: text
    content: ' made a dry path for you through the Red Sea'
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' when you left Egypt. And we know what you did to Sihon and Og, the two Amorite kings east of the Jordan River, whose people you completely destroyed.'
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'No wonder our hearts have melted in fear! No one has the courage to fight after hearing such things. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is the supreme God of the heavens above and the earth below.'
  '12':
  - type: text
    content: '“Now swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' that you will be kind to me and my family since I have helped you. Give me some guarantee that '
  '13':
  - type: text
    content: when Jericho is conquered, you will let me live, along with my father and mother, my brothers and sisters, and all their families.”
  '14':
  - type: text
    content: '“We offer our own lives as a guarantee for your safety,” the men agreed. “If you don’t betray us, we will keep our promise and be kind to you when the '
  - type: text
    content: Lord
  - type: text
    content: ' gives us the land.”'
  '15':
  - type: text
    content: 'Then, since Rahab’s house was built into the town wall, she let them down by a rope through the window. '
  '16':
  - type: text
    content: “Escape to the hill country,” she told them. “Hide there for three days from the men searching for you. Then, when they have returned, you can go on your way.”
  '17':
  - type: text
    content: 'Before they left, the men told her, “We will be bound by the oath we have taken only if you follow these instructions. '
  '18':
  - type: text
    content: 'When we come into the land, you must leave this scarlet rope hanging from the window through which you let us down. And all your family members—your father, mother, brothers, and all your relatives—must be here inside the house. '
  '19':
  - type: text
    content: 'If they go out into the street and are killed, it will not be our fault. But if anyone lays a hand on people inside this house, we will accept the responsibility for their death. '
  '2':
  - type: text
    content: 'But someone told the king of Jericho, “Some Israelites have come here tonight to spy out the land.” '
  '20':
  - type: text
    content: If you betray us, however, we are not bound by this oath in any way.”
  '21':
  - type: text
    content: “I accept your terms,” she replied. And she sent them on their way, leaving the scarlet rope hanging from the window.
  '22':
  - type: text
    content: The spies went up into the hill country and stayed there three days. The men who were chasing them searched everywhere along the road, but they finally returned without success.
  '23':
  - type: text
    content: 'Then the two spies came down from the hill country, crossed the Jordan River, and reported to Joshua all that had happened to them. '
  '24':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has given us the whole land,” they said, “for all the people in the land are terrified of us.”'
  '3':
  - type: text
    content: 'So the king of Jericho sent orders to Rahab: “Bring out the men who have come into your house, for they have come here to spy out the whole land.”'
  '4':
  - type: text
    content: 'Rahab had hidden the two men, but she replied, “Yes, the men were here earlier, but I didn’t know where they were from. '
  '5':
  - type: text
    content: 'They left the town at dusk, as the gates were about to close. I don’t know where they went. If you hurry, you can probably catch up with them.” '
  '6':
  - type: text
    content: '(Actually, she had taken them up to the roof and hidden them beneath bundles of flax she had laid out.) '
  '7':
  - type: text
    content: So the king’s men went looking for the spies along the road leading to the shallow crossings of the Jordan River. And as soon as the king’s men had left, the gate of Jericho was shut.
  '8':
  - type: text
    content: 'Before the spies went to sleep that night, Rahab went up on the roof to talk with them. '
  '9':
  - type: text
    content: '“I know the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you this land,” she told them. “We are all afraid of you. Everyone in the land is living in terror. '
