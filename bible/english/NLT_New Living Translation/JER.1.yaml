document_id: JER.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the words of Jeremiah son of Hilkiah, one of the priests from the town of Anathoth in the land of Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' first gave messages to Jeremiah during the thirteenth year of the reign of Josiah son of Amon, king of Judah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The thirteenth year of Josiah’s reign was 627 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s messages continued throughout the reign of King Jehoiakim, Josiah’s son, until the eleventh year of the reign of King Zedekiah, another of Josiah’s sons. In August
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the fifth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. The fifth month in the eleventh year of Zedekiah’s reign occurred within the months of August and September 586 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ' Also see 52:12 and the note there.'
    marker-yv: yv-n
  - type: text
    text: ' of that eleventh year the people of Jerusalem were taken away as captives.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Call and First Visions
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me this message:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I knew you before I formed you in your mother’s womb.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before you were born I set you apart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and appointed you as my prophet to the nations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',” I said, “I can’t speak for you! I’m too young!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “Don’t say, ‘I’m too young,’ for you must go wherever I send you and say whatever I tell you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And don’t be afraid of the people, for I will be with you and will protect you. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' reached out and touched my mouth and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look, I have put my words in your mouth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Today I appoint you to stand up
- type: usfm
  marker: q2
  children:
  - type: text
    text: against nations and kingdoms.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some you must uproot and tear down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroy and overthrow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Others you must build up
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plant.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Look, Jeremiah! What do you see?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And I replied, “I see a branch from an almond tree.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “That’s right, and it means that I am watching,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew word for “watching” '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(shoqed) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the word for “almond tree” '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (shaqed).
    marker-yv: yv-n
  - type: text
    text: ' and I will certainly carry out all my plans.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to me again and asked, “What do you see now?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And I replied, “I see a pot of boiling water, spilling from the north.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Yes,” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “for terror from the north will boil out on the people of this land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Listen! I am calling the armies of the kingdoms of the north to come to Jerusalem. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “They will set their thrones
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the gates of the city.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will attack its walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the other towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will pronounce judgment
- type: usfm
  marker: q2
  children:
  - type: text
    text: on my people for all their evil—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for deserting me and burning incense to other gods.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, they worship idols made with their own hands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Get up and prepare for action.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Go out and tell them everything I tell you to say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid of them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or I will make you look foolish in front of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For see, today I have made you strong
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a fortified city that cannot be captured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an iron pillar or a bronze wall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will stand against the whole land—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the kings, officials, priests, and people of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They will fight you, but they will fail.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I am with you, and I will take care of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
