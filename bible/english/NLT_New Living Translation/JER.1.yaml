document_id: JER.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'These are the words of Jeremiah son of Hilkiah, one of the priests from the town of Anathoth in the land of Benjamin. '
  '10':
  - type: text
    content: Today I appoint you to stand up
  - type: text
    content: against nations and kingdoms.
  - type: text
    content: Some you must uproot and tear down,
  - type: text
    content: destroy and overthrow.
  - type: text
    content: Others you must build up
  - type: text
    content: and plant.”
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Look, Jeremiah! What do you see?”'
  - type: text
    content: And I replied, “I see a branch from an almond tree.”
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “That’s right, and it means that I am watching,'
  - type: note
    content: The Hebrew word for “watching” (shoqed) sounds like the word for “almond tree” (shaqed).
  - type: text
    content: ' and I will certainly carry out all my plans.”'
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to me again and asked, “What do you see now?”'
  - type: text
    content: And I replied, “I see a pot of boiling water, spilling from the north.”
  '14':
  - type: text
    content: '“Yes,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “for terror from the north will boil out on the people of this land. '
  '15':
  - type: text
    content: 'Listen! I am calling the armies of the kingdoms of the north to come to Jerusalem. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: text
    content: “They will set their thrones
  - type: text
    content: at the gates of the city.
  - type: text
    content: They will attack its walls
  - type: text
    content: and all the other towns of Judah.
  '16':
  - type: text
    content: I will pronounce judgment
  - type: text
    content: on my people for all their evil—
  - type: text
    content: for deserting me and burning incense to other gods.
  - type: text
    content: Yes, they worship idols made with their own hands!
  '17':
  - type: text
    content: “Get up and prepare for action.
  - type: text
    content: Go out and tell them everything I tell you to say.
  - type: text
    content: Do not be afraid of them,
  - type: text
    content: or I will make you look foolish in front of them.
  '18':
  - type: text
    content: For see, today I have made you strong
  - type: text
    content: like a fortified city that cannot be captured,
  - type: text
    content: like an iron pillar or a bronze wall.
  - type: text
    content: You will stand against the whole land—
  - type: text
    content: the kings, officials, priests, and people of Judah.
  '19':
  - type: text
    content: They will fight you, but they will fail.
  - type: text
    content: For I am with you, and I will take care of you.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' first gave messages to Jeremiah during the thirteenth year of the reign of Josiah son of Amon, king of Judah.'
  - type: note
    content: The thirteenth year of Josiah’s reign was 627 b.c.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s messages continued throughout the reign of King Jehoiakim, Josiah’s son, until the eleventh year of the reign of King Zedekiah, another of Josiah’s sons. In August
  - type: note
    content: Hebrew In the fifth month, of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. The fifth month in the eleventh year of Zedekiah’s reign occurred within the months of August and September 586 b.c. Also see 52:12 and the note there.
  - type: text
    content: ' of that eleventh year the people of Jerusalem were taken away as captives.'
  - type: heading
    content: Jeremiah’s Call and First Visions
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me this message:'
  '5':
  - type: text
    content: “I knew you before I formed you in your mother’s womb.
  - type: text
    content: Before you were born I set you apart
  - type: text
    content: and appointed you as my prophet to the nations.”
  '6':
  - type: text
    content: '“O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ',” I said, “I can’t speak for you! I’m too young!”'
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Don’t say, ‘I’m too young,’ for you must go wherever I send you and say whatever I tell you. '
  '8':
  - type: text
    content: 'And don’t be afraid of the people, for I will be with you and will protect you. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!” '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' reached out and touched my mouth and said,'
  - type: text
    content: “Look, I have put my words in your mouth!
