document_id: NUM.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Strikes the Rock
  - type: text
    content: In the first month of the year,
  - type: note
    content: The first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April. The number of years since leaving Egypt is not specified.
  - type: text
    content: ' the whole community of Israel arrived in the wilderness of Zin and camped at Kadesh. While they were there, Miriam died and was buried.'
  '10':
  - type: text
    content: 'Then he and Aaron summoned the people to come and gather at the rock. “Listen, you rebels!” he shouted. “Must we bring you water from this rock?” '
  '11':
  - type: text
    content: Then Moses raised his hand and struck the rock twice with the staff, and water gushed out. So the entire community and their livestock drank their fill.
  '12':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Because you did not trust me enough to demonstrate my holiness to the people of Israel, you will not lead them into the land I am giving them!” '
  '13':
  - type: text
    content: 'This place was known as the waters of Meribah (which means “arguing”) because there the people of Israel argued with the '
  - type: text
    content: Lord
  - type: text
    content: ', and there he demonstrated his holiness among them.'
  - type: heading
    content: Edom Refuses Israel Passage
  '14':
  - type: text
    content: 'While Moses was at Kadesh, he sent ambassadors to the king of Edom with this message:'
  - type: text
    content: '“This is what your relatives, the people of Israel, say: You know all the hardships we have been through. '
  '15':
  - type: text
    content: 'Our ancestors went down to Egypt, and we lived there a long time, and we and our ancestors were brutally mistreated by the Egyptians. '
  '16':
  - type: text
    content: 'But when we cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard us and sent an angel who brought us out of Egypt. Now we are camped at Kadesh, a town on the border of your land. '
  '17':
  - type: text
    content: Please let us travel through your land. We will be careful not to go through your fields and vineyards. We won’t even drink water from your wells. We will stay on the king’s road and never leave it until we have passed through your territory.”
  '18':
  - type: text
    content: But the king of Edom said, “Stay out of my land, or I will meet you with an army!”
  '19':
  - type: text
    content: The Israelites answered, “We will stay on the main road. If our livestock drink your water, we will pay for it. Just let us pass through your country. That’s all we ask.”
  '2':
  - type: text
    content: 'There was no water for the people to drink at that place, so they rebelled against Moses and Aaron. '
  '20':
  - type: text
    content: 'But the king of Edom replied, “Stay out! You may not pass through our land.” With that he mobilized his army and marched out against them with an imposing force. '
  '21':
  - type: text
    content: Because Edom refused to allow Israel to pass through their country, Israel was forced to turn around.
  - type: heading
    content: The Death of Aaron
  '22':
  - type: text
    content: 'The whole community of Israel left Kadesh and arrived at Mount Hor. '
  '23':
  - type: text
    content: 'There, on the border of the land of Edom, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '24':
  - type: text
    content: '“The time has come for Aaron to join his ancestors in death. He will not enter the land I am giving the people of Israel, because the two of you rebelled against my instructions concerning the water at Meribah. '
  '25':
  - type: text
    content: 'Now take Aaron and his son Eleazar up Mount Hor. '
  '26':
  - type: text
    content: There you will remove Aaron’s priestly garments and put them on Eleazar, his son. Aaron will die there and join his ancestors.”
  '27':
  - type: text
    content: 'So Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. The three of them went up Mount Hor together as the whole community watched. '
  '28':
  - type: text
    content: 'At the summit, Moses removed the priestly garments from Aaron and put them on Eleazar, Aaron’s son. Then Aaron died there on top of the mountain, and Moses and Eleazar went back down. '
  '29':
  - type: text
    content: When the people realized that Aaron had died, all Israel mourned for him thirty days.
  '3':
  - type: text
    content: 'The people blamed Moses and said, “If only we had died in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence with our brothers! '
  '4':
  - type: text
    content: 'Why have you brought the congregation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s people into this wilderness to die, along with all our livestock? '
  '5':
  - type: text
    content: Why did you make us leave Egypt and bring us here to this terrible place? This land has no grain, no figs, no grapes, no pomegranates, and no water to drink!”
  '6':
  - type: text
    content: Moses and Aaron turned away from the people and went to the entrance of the Tabernacle,
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' where they fell face down on the ground. Then the glorious presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to them, '
  '7':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '8':
  - type: text
    content: “You and Aaron must take the staff and assemble the entire community. As the people watch, speak to the rock over there, and it will pour out its water. You will provide enough water from the rock to satisfy the whole community and their livestock.”
  '9':
  - type: text
    content: 'So Moses did as he was told. He took the staff from the place where it was kept before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
