document_id: NUM.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Strikes the Rock
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the first month of the year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April. The number of years since leaving Egypt is not specified.
    marker-yv: yv-n
  - type: text
    text: ' the whole community of Israel arrived in the wilderness of Zin and camped at Kadesh. While they were there, Miriam died and was buried.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There was no water for the people to drink at that place, so they rebelled against Moses and Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The people blamed Moses and said, “If only we had died in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence with our brothers! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Why have you brought the congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s people into this wilderness to die, along with all our livestock? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why did you make us leave Egypt and bring us here to this terrible place? This land has no grain, no figs, no grapes, no pomegranates, and no water to drink!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moses and Aaron turned away from the people and went to the entrance of the Tabernacle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' where they fell face down on the ground. Then the glorious presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to them, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “You and Aaron must take the staff and assemble the entire community. As the people watch, speak to the rock over there, and it will pour out its water. You will provide enough water from the rock to satisfy the whole community and their livestock.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Moses did as he was told. He took the staff from the place where it was kept before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then he and Aaron summoned the people to come and gather at the rock. “Listen, you rebels!” he shouted. “Must we bring you water from this rock?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then Moses raised his hand and struck the rock twice with the staff, and water gushed out. So the entire community and their livestock drank their fill.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron, “Because you did not trust me enough to demonstrate my holiness to the people of Israel, you will not lead them into the land I am giving them!” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This place was known as the waters of Meribah (which means “arguing”) because there the people of Israel argued with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and there he demonstrated his holiness among them.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edom Refuses Israel Passage
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'While Moses was at Kadesh, he sent ambassadors to the king of Edom with this message:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“This is what your relatives, the people of Israel, say: You know all the hardships we have been through. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Our ancestors went down to Egypt, and we lived there a long time, and we and our ancestors were brutally mistreated by the Egyptians. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But when we cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', he heard us and sent an angel who brought us out of Egypt. Now we are camped at Kadesh, a town on the border of your land. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Please let us travel through your land. We will be careful not to go through your fields and vineyards. We won’t even drink water from your wells. We will stay on the king’s road and never leave it until we have passed through your territory.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But the king of Edom said, “Stay out of my land, or I will meet you with an army!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The Israelites answered, “We will stay on the main road. If our livestock drink your water, we will pay for it. Just let us pass through your country. That’s all we ask.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the king of Edom replied, “Stay out! You may not pass through our land.” With that he mobilized his army and marched out against them with an imposing force. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Because Edom refused to allow Israel to pass through their country, Israel was forced to turn around.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Aaron
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The whole community of Israel left Kadesh and arrived at Mount Hor. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'There, on the border of the land of Edom, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“The time has come for Aaron to join his ancestors in death. He will not enter the land I am giving the people of Israel, because the two of you rebelled against my instructions concerning the water at Meribah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now take Aaron and his son Eleazar up Mount Hor. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: There you will remove Aaron’s priestly garments and put them on Eleazar, his son. Aaron will die there and join his ancestors.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So Moses did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded. The three of them went up Mount Hor together as the whole community watched. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'At the summit, Moses removed the priestly garments from Aaron and put them on Eleazar, Aaron’s son. Then Aaron died there on top of the mountain, and Moses and Eleazar went back down. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: When the people realized that Aaron had died, all Israel mourned for him thirty days.
