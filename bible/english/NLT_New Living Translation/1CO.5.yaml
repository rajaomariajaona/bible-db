document_id: 1CO.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Condemns Spiritual Pride
  - type: text
    content: I can hardly believe the report about the sexual immorality going on among you—something that even pagans don’t do. I am told that a man in your church is living in sin with his stepmother.
  - type: note
    content: Greek his father’s wife.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'But I wasn’t talking about unbelievers who indulge in sexual sin, or are greedy, or cheat people, or worship idols. You would have to leave this world to avoid people like that. '
  '11':
  - type: text
    content: I meant that you are not to associate with anyone who claims to be a believer
  - type: note
    content: Greek a brother.
  - type: text
    content: ' yet indulges in sexual sin, or is greedy, or worships idols, or is abusive, or is a drunkard, or cheats people. Don’t even eat with such people.'
  '12':
  - type: text
    content: 'It isn’t my responsibility to judge outsiders, but it certainly is your responsibility to judge those inside the church who are sinning. '
  '13':
  - type: text
    content: God will judge those on the outside; but as the Scriptures say, “You must remove the evil person from among you.”
  - type: note
    content: Deut 17:7.
  '2':
  - type: text
    content: You are so proud of yourselves, but you should be mourning in sorrow and shame. And you should remove this man from your fellowship.
  '3':
  - type: text
    content: Even though I am not with you in person, I am with you in the Spirit.
  - type: note
    content: Or in spirit.
  - type: text
    content: ' And as though I were there, I have already passed judgment on this man '
  '4':
  - type: text
    content: in the name of the Lord Jesus. You must call a meeting of the church.
  - type: note
    content: Or In the name of the Lord Jesus, you must call a meeting of the church.
  - type: text
    content: ' I will be present with you in spirit, and so will the power of our Lord Jesus. '
  '5':
  - type: text
    content: Then you must throw this man out and hand him over to Satan so that his sinful nature will be destroyed
  - type: note
    content: Or so that his body will be destroyed; Greek reads for the destruction of the flesh.
  - type: text
    content: ' and he himself'
  - type: note
    content: Greek and the spirit.
  - type: text
    content: ' will be saved on the day the Lord'
  - type: note
    content: Other manuscripts read the Lord Jesus; still others read our Lord Jesus Christ.
  - type: text
    content: ' returns.'
  '6':
  - type: text
    content: 'Your boasting about this is terrible. Don’t you realize that this sin is like a little yeast that spreads through the whole batch of dough? '
  '7':
  - type: text
    content: Get rid of the old “yeast” by removing this wicked person from among you. Then you will be like a fresh batch of dough made without yeast, which is what you really are. Christ, our Passover Lamb, has been sacrificed for us.
  - type: note
    content: Greek has been sacrificed.
  - type: text
    content: ' '
  '8':
  - type: text
    content: So let us celebrate the festival, not with the old bread
  - type: note
    content: Greek not with old leaven.
  - type: text
    content: ' of wickedness and evil, but with the new bread'
  - type: note
    content: Greek but with unleavened [bread].
  - type: text
    content: ' of sincerity and truth.'
  '9':
  - type: text
    content: 'When I wrote to you before, I told you not to associate with people who indulge in sexual sin. '
