document_id: PRO.20
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wine produces mockers; alcohol leads to brawls.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those led astray by drink cannot be wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The king’s fury is like a lion’s roar;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rouse his anger is to risk your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Avoiding a fight is a mark of honor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: only fools insist on quarreling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those too lazy to plow in the right season
- type: usfm
  marker: q2
  children:
  - type: text
    text: will have no food at the harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Though good advice lies deep within the heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a person with understanding will draw it out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Many will say they are loyal friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but who can find one who is truly reliable?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The godly walk with integrity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessed are their children who follow them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When a king sits in judgment, he weighs all the evidence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: distinguishing the bad from the good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who can say, “I have cleansed my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am pure and free from sin”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: False weights and unequal measures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A stone and a stone, an ephah and an ephah.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests double standards of every kind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Even children are known by the way they act,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether their conduct is pure, and whether it is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ears to hear and eyes to see—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'both are gifts from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If you love sleep, you will end in poverty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep your eyes open, and there will be plenty to eat!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The buyer haggles over the price, saying, “It’s worthless,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: then brags about getting a bargain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Wise words are more valuable
- type: usfm
  marker: q2
  children:
  - type: text
    text: than much gold and many rubies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Get security from someone who guarantees a stranger’s debt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get a deposit if he does it for foreigners.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An alternate reading in the Masoretic Text is '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for a promiscuous woman.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Stolen bread tastes sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it turns to gravel in the mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Plans succeed through good counsel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t go to war without wise advice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A gossip goes around telling secrets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so don’t hang around with chatterers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If you insult your father or mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your light will be snuffed out in total darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: An inheritance obtained too early in life
- type: usfm
  marker: q2
  children:
  - type: text
    text: is not a blessing in the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t say, “I will get even for this wrong.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Wait for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to handle the matter.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests double standards;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is not pleased by dishonest scales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' directs our steps,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so why try to understand everything along the way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Don’t trap yourself by making a rash promise to God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and only later counting the cost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A wise king scatters the wicked like wheat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then runs his threshing wheel over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s light penetrates the human spirit,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The human spirit is the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ’s light.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: exposing every hidden motive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Unfailing love and faithfulness protect the king;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his throne is made secure through love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The glory of the young is their strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the gray hair of experience is the splendor of the old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Physical punishment cleanses away evil;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: such discipline purifies the heart.
