document_id: PRO.20,116
type_code: eng
verses:
  '1':
  - type: text
    content: Wine produces mockers; alcohol leads to brawls.
  - type: text
    content: Those led astray by drink cannot be wise.
  '10':
  - type: text
    content: False weights and unequal measures
  - type: note
    content: Hebrew A stone and a stone, an ephah and an ephah.
  - type: text
    content: —
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' detests double standards of every kind.'
  '11':
  - type: text
    content: Even children are known by the way they act,
  - type: text
    content: whether their conduct is pure, and whether it is right.
  '12':
  - type: text
    content: Ears to hear and eyes to see—
  - type: text
    content: 'both are gifts from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: If you love sleep, you will end in poverty.
  - type: text
    content: Keep your eyes open, and there will be plenty to eat!
  '14':
  - type: text
    content: The buyer haggles over the price, saying, “It’s worthless,”
  - type: text
    content: then brags about getting a bargain!
  '15':
  - type: text
    content: Wise words are more valuable
  - type: text
    content: than much gold and many rubies.
  '16':
  - type: text
    content: Get security from someone who guarantees a stranger’s debt.
  - type: text
    content: Get a deposit if he does it for foreigners.
  - type: note
    content: An alternate reading in the Masoretic Text is for a promiscuous woman.
  '17':
  - type: text
    content: Stolen bread tastes sweet,
  - type: text
    content: but it turns to gravel in the mouth.
  '18':
  - type: text
    content: Plans succeed through good counsel;
  - type: text
    content: don’t go to war without wise advice.
  '19':
  - type: text
    content: A gossip goes around telling secrets,
  - type: text
    content: so don’t hang around with chatterers.
  '2':
  - type: text
    content: The king’s fury is like a lion’s roar;
  - type: text
    content: to rouse his anger is to risk your life.
  '20':
  - type: text
    content: If you insult your father or mother,
  - type: text
    content: your light will be snuffed out in total darkness.
  '21':
  - type: text
    content: An inheritance obtained too early in life
  - type: text
    content: is not a blessing in the end.
  '22':
  - type: text
    content: Don’t say, “I will get even for this wrong.”
  - type: text
    content: 'Wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' to handle the matter.'
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests double standards;'
  - type: text
    content: he is not pleased by dishonest scales.
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' directs our steps,'
  - type: text
    content: so why try to understand everything along the way?
  '25':
  - type: text
    content: Don’t trap yourself by making a rash promise to God
  - type: text
    content: and only later counting the cost.
  '26':
  - type: text
    content: A wise king scatters the wicked like wheat,
  - type: text
    content: then runs his threshing wheel over them.
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s light penetrates the human spirit,
  - type: note
    content: Or The human spirit is the Lord’s light.
  - type: text
    content: exposing every hidden motive.
  '28':
  - type: text
    content: Unfailing love and faithfulness protect the king;
  - type: text
    content: his throne is made secure through love.
  '29':
  - type: text
    content: The glory of the young is their strength;
  - type: text
    content: the gray hair of experience is the splendor of the old.
  '3':
  - type: text
    content: Avoiding a fight is a mark of honor;
  - type: text
    content: only fools insist on quarreling.
  '30':
  - type: text
    content: Physical punishment cleanses away evil;
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: such discipline purifies the heart.
  '4':
  - type: text
    content: Those too lazy to plow in the right season
  - type: text
    content: will have no food at the harvest.
  '5':
  - type: text
    content: Though good advice lies deep within the heart,
  - type: text
    content: a person with understanding will draw it out.
  '6':
  - type: text
    content: Many will say they are loyal friends,
  - type: text
    content: but who can find one who is truly reliable?
  '7':
  - type: text
    content: The godly walk with integrity;
  - type: text
    content: blessed are their children who follow them.
  '8':
  - type: text
    content: When a king sits in judgment, he weighs all the evidence,
  - type: text
    content: distinguishing the bad from the good.
  '9':
  - type: text
    content: Who can say, “I have cleansed my heart;
  - type: text
    content: I am pure and free from sin”?
