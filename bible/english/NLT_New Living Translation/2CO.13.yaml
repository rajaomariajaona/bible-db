document_id: 2CO.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Advice
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the third time I am coming to visit you (and as the Scriptures say, “The facts of every case must be established by the testimony of two or three witnesses”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 19:15.
      marker-yv: yv-n
    - type: text
      text: '). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing this to you before I come, hoping that I won’t need to deal severely with you when I do come. For I want to use the authority the Lord has given me to strengthen you, not to tear you down.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Greetings
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Brothers.
      marker-yv: yv-n
    - type: text
      text: ' I close my letter with these last words: Be joyful. Grow to maturity. Encourage each other. Live in harmony and peace. Then the God of love and peace will be with you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet each other with a sacred kiss. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All of God’s people here send you their greetings.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some English translations include verse 13 as part of verse 12, and then verse 14 becomes verse 13.
      marker-yv: yv-n
    - type: text
      text: May the grace of the Lord Jesus Christ, the love of God, and the fellowship of the Holy Spirit be with you all.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I have already warned those who had been sinning when I was there on my second visit. Now I again warn them and all others, just as I did before, that next time I will not spare them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give you all the proof you want that Christ speaks through me. Christ is not weak when he deals with you; he is powerful among you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Although he was crucified in weakness, he now lives by the power of God. We, too, are weak, just as Christ was, but when we deal with you we will be alive with him and will have God’s power.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Examine yourselves to see if your faith is genuine. Test yourselves. Surely you know that Jesus Christ is among you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in you.
      marker-yv: yv-n
    - type: text
      text: '; if not, you have failed the test of genuine faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As you test yourselves, I hope you will recognize that we have not failed the test of apostolic authority.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We pray to God that you will not do what is wrong by refusing our correction. I hope we won’t need to demonstrate our authority when we arrive. Do the right thing before we come—even if that makes it look like we have failed to demonstrate our authority. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we cannot oppose the truth, but must always stand for the truth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are glad to seem weak if it helps show that you are actually strong. We pray that you will become mature.
