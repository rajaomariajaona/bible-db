document_id: JOB.20,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zophar’s Second Response to Job
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Zophar the Naamathite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Their children will beg from the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they must give back their stolen riches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Though they are young,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their bones will lie in the dust.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “They enjoyed the sweet taste of wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: letting it melt under their tongue.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They savored it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: holding it long in their mouths.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But suddenly the food in their bellies turns sour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a poisonous venom in their stomach.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They will vomit the wealth they swallowed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God won’t let them keep it down.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They will suck the poison of cobras.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The viper will kill them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They will never again enjoy streams of olive oil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or rivers of milk and honey.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They will give back everything they worked for.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their wealth will bring them no joy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For they oppressed the poor and left them destitute.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They foreclosed on their homes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “I must reply
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I am greatly disturbed.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They were always greedy and never satisfied.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing remains of all the things they dreamed about.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nothing is left after they finish gorging themselves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore, their prosperity will not endure.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “In the midst of plenty, they will run into trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be overcome by misery.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: May God give them a bellyful of trouble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May God rain down his anger upon them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: When they try to escape an iron weapon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bronze-tipped arrow will pierce them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The arrow is pulled from their back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the arrowhead glistens with blood.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with gall.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The terrors of death are upon them.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Their treasures will be thrown into deepest darkness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wildfire will devour their goods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consuming all they have left.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The heavens will reveal their guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth will testify against them.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A flood will sweep away their house.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s anger will descend on them in torrents.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: This is the reward that God gives the wicked.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is the inheritance decreed by God.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I’ve had to endure your insults,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now my spirit prompts me to reply.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Don’t you realize that from the beginning of time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever since people were first placed on the earth,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: the triumph of the wicked has been short lived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the joy of the godless has been only temporary?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Though the pride of the godless reaches to the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their heads touch the clouds,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: yet they will vanish forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thrown away like their own dung.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who knew them will ask,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Where are they?’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They will fade like a dream and not be found.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will vanish like a vision in the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Those who once saw them will see them no more.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their families will never see them again.
