document_id: JOB.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar’s Second Response to Job
  - type: text
    content: 'Then Zophar the Naamathite replied:'
  '10':
  - type: text
    content: Their children will beg from the poor,
  - type: text
    content: for they must give back their stolen riches.
  '11':
  - type: text
    content: Though they are young,
  - type: text
    content: their bones will lie in the dust.
  '12':
  - type: text
    content: “They enjoyed the sweet taste of wickedness,
  - type: text
    content: letting it melt under their tongue.
  '13':
  - type: text
    content: They savored it,
  - type: text
    content: holding it long in their mouths.
  '14':
  - type: text
    content: But suddenly the food in their bellies turns sour,
  - type: text
    content: a poisonous venom in their stomach.
  '15':
  - type: text
    content: They will vomit the wealth they swallowed.
  - type: text
    content: God won’t let them keep it down.
  '16':
  - type: text
    content: They will suck the poison of cobras.
  - type: text
    content: The viper will kill them.
  '17':
  - type: text
    content: They will never again enjoy streams of olive oil
  - type: text
    content: or rivers of milk and honey.
  '18':
  - type: text
    content: They will give back everything they worked for.
  - type: text
    content: Their wealth will bring them no joy.
  '19':
  - type: text
    content: For they oppressed the poor and left them destitute.
  - type: text
    content: They foreclosed on their homes.
  '2':
  - type: text
    content: “I must reply
  - type: text
    content: because I am greatly disturbed.
  '20':
  - type: text
    content: They were always greedy and never satisfied.
  - type: text
    content: Nothing remains of all the things they dreamed about.
  '21':
  - type: text
    content: Nothing is left after they finish gorging themselves.
  - type: text
    content: Therefore, their prosperity will not endure.
  '22':
  - type: text
    content: “In the midst of plenty, they will run into trouble
  - type: text
    content: and be overcome by misery.
  '23':
  - type: text
    content: May God give them a bellyful of trouble.
  - type: text
    content: May God rain down his anger upon them.
  '24':
  - type: text
    content: When they try to escape an iron weapon,
  - type: text
    content: a bronze-tipped arrow will pierce them.
  '25':
  - type: text
    content: The arrow is pulled from their back,
  - type: text
    content: and the arrowhead glistens with blood.
  - type: note
    content: Hebrew with gall.
  - type: text
    content: The terrors of death are upon them.
  '26':
  - type: text
    content: Their treasures will be thrown into deepest darkness.
  - type: text
    content: A wildfire will devour their goods,
  - type: text
    content: consuming all they have left.
  '27':
  - type: text
    content: The heavens will reveal their guilt,
  - type: text
    content: and the earth will testify against them.
  '28':
  - type: text
    content: A flood will sweep away their house.
  - type: text
    content: God’s anger will descend on them in torrents.
  '29':
  - type: text
    content: This is the reward that God gives the wicked.
  - type: text
    content: It is the inheritance decreed by God.”
  '3':
  - type: text
    content: I’ve had to endure your insults,
  - type: text
    content: but now my spirit prompts me to reply.
  '4':
  - type: text
    content: “Don’t you realize that from the beginning of time,
  - type: text
    content: ever since people were first placed on the earth,
  '5':
  - type: text
    content: the triumph of the wicked has been short lived
  - type: text
    content: and the joy of the godless has been only temporary?
  '6':
  - type: text
    content: Though the pride of the godless reaches to the heavens
  - type: text
    content: and their heads touch the clouds,
  '7':
  - type: text
    content: yet they will vanish forever,
  - type: text
    content: thrown away like their own dung.
  - type: text
    content: Those who knew them will ask,
  - type: text
    content: ‘Where are they?’
  '8':
  - type: text
    content: They will fade like a dream and not be found.
  - type: text
    content: They will vanish like a vision in the night.
  '9':
  - type: text
    content: Those who once saw them will see them no more.
  - type: text
    content: Their families will never see them again.
