document_id: EXO.39,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Clothing for the Priests
  - type: text
    content: 'The craftsmen made beautiful sacred garments of blue, purple, and scarlet cloth—clothing for Aaron to wear while ministering in the Holy Place, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Making the Ephod
  '10':
  - type: text
    content: They mounted four rows of gemstones
  - type: note
    content: The identification of some of these gemstones is uncertain.
  - type: text
    content: ' on it. The first row contained a red carnelian, a pale-green peridot, and an emerald. '
  '11':
  - type: text
    content: 'The second row contained a turquoise, a blue lapis lazuli, and a white moonstone. '
  '12':
  - type: text
    content: 'The third row contained an orange jacinth, an agate, and a purple amethyst. '
  '13':
  - type: text
    content: 'The fourth row contained a blue-green beryl, an onyx, and a green jasper. All these stones were set in gold filigree. '
  '14':
  - type: text
    content: Each stone represented one of the twelve sons of Israel, and the name of that tribe was engraved on it like a seal.
  '15':
  - type: text
    content: 'To attach the chestpiece to the ephod, they made braided cords of pure gold thread. '
  '16':
  - type: text
    content: 'They also made two settings of gold filigree and two gold rings and attached them to the top corners of the chestpiece. '
  '17':
  - type: text
    content: 'They tied the two gold cords to the rings on the chestpiece. '
  '18':
  - type: text
    content: 'They tied the other ends of the cords to the gold settings on the shoulder-pieces of the ephod. '
  '19':
  - type: text
    content: 'Then they made two more gold rings and attached them to the inside edges of the chestpiece next to the ephod. '
  '2':
  - type: text
    content: Bezalel
  - type: note
    content: Hebrew He; also in 39:8, 22.
  - type: text
    content: ' made the ephod of finely woven linen and embroidered it with gold and with blue, purple, and scarlet thread. '
  '20':
  - type: text
    content: 'Then they made two more gold rings and attached them to the front of the ephod, below the shoulder-pieces, just above the knot where the decorative sash was fastened to the ephod. '
  '21':
  - type: text
    content: 'They attached the bottom rings of the chestpiece to the rings on the ephod with blue cords. In this way, the chestpiece was held securely to the ephod above the decorative sash. All this was done just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Additional Clothing for the Priests
  '22':
  - type: text
    content: 'Bezalel made the robe that is worn with the ephod from a single piece of blue woven cloth, '
  '23':
  - type: text
    content: with an opening for Aaron’s head in the middle of it. The opening was reinforced with a woven collar
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' so it would not tear. '
  '24':
  - type: text
    content: 'They made pomegranates of blue, purple, and scarlet yarn, and attached them to the hem of the robe. '
  '25':
  - type: text
    content: 'They also made bells of pure gold and placed them between the pomegranates along the hem of the robe, '
  '26':
  - type: text
    content: 'with bells and pomegranates alternating all around the hem. This robe was to be worn whenever the priest ministered before the '
  - type: text
    content: Lord
  - type: text
    content: ', just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '27':
  - type: text
    content: 'They made tunics for Aaron and his sons from fine linen cloth. '
  '28':
  - type: text
    content: 'The turban and the special head coverings were made of fine linen, and the undergarments were also made of finely woven linen. '
  '29':
  - type: text
    content: 'The sashes were made of finely woven linen and embroidered with blue, purple, and scarlet thread, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: He made gold thread by hammering out thin sheets of gold and cutting it into fine strands. With great skill and care, he worked it into the fine linen with the blue, purple, and scarlet thread.
  '30':
  - type: text
    content: 'Finally, they made the sacred medallion—the badge of holiness—of pure gold. They engraved it like a seal with these words: '
  - type: text
    content: Holy to the Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'They attached the medallion with a blue cord to Aaron’s turban, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Moses Inspects the Work
  '32':
  - type: text
    content: And so at last the Tabernacle
  - type: note
    content: Hebrew the Tabernacle, the Tent of Meeting; also in 39:40.
  - type: text
    content: ' was finished. The Israelites had done everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '33':
  - type: text
    content: 'And they brought the entire Tabernacle to Moses:'
  - type: text
    content: the sacred tent with all its furnishings, clasps, frames, crossbars, posts, and bases;
  '34':
  - type: text
    content: the tent coverings of tanned ram skins and fine goatskin leather;
  - type: text
    content: the inner curtain to shield the Ark;
  '35':
  - type: text
    content: the Ark of the Covenant
  - type: note
    content: Or Ark of the Testimony.
  - type: text
    content: ' and its carrying poles;'
  - type: text
    content: the Ark’s cover—the place of atonement;
  '36':
  - type: text
    content: the table and all its utensils;
  - type: text
    content: the Bread of the Presence;
  '37':
  - type: text
    content: the pure gold lampstand with its symmetrical lamp cups, all its accessories, and the olive oil for lighting;
  '38':
  - type: text
    content: the gold altar;
  - type: text
    content: the anointing oil and fragrant incense;
  - type: text
    content: the curtain for the entrance of the sacred tent;
  '39':
  - type: text
    content: the bronze altar;
  - type: text
    content: the bronze grating and its carrying poles and utensils;
  - type: text
    content: the washbasin with its stand;
  '4':
  - type: text
    content: 'The ephod consisted of two pieces, front and back, joined at the shoulders with two shoulder-pieces. '
  '40':
  - type: text
    content: the curtains for the walls of the courtyard;
  - type: text
    content: the posts and their bases;
  - type: text
    content: the curtain for the entrance to the courtyard;
  - type: text
    content: the ropes and tent pegs;
  - type: text
    content: all the furnishings to be used in worship at the Tabernacle;
  '41':
  - type: text
    content: the beautifully stitched garments for the priests to wear while ministering in the Holy Place—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests.
  '42':
  - type: text
    content: 'So the people of Israel followed all of the '
  - type: text
    content: Lord
  - type: text
    content: '’s instructions to Moses. '
  '43':
  - type: text
    content: 'Then Moses inspected all their work. When he found it had been done just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him, he blessed them.'
  '5':
  - type: text
    content: 'The decorative sash was made of the same materials: finely woven linen embroidered with gold and with blue, purple, and scarlet thread, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '6':
  - type: text
    content: 'They mounted the two onyx stones in settings of gold filigree. The stones were engraved with the names of the tribes of Israel, just as a seal is engraved. '
  '7':
  - type: text
    content: 'He fastened these stones on the shoulder-pieces of the ephod as a reminder that the priest represents the people of Israel. All this was done just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Making the Chestpiece
  '8':
  - type: text
    content: 'Bezalel made the chestpiece with great skill and care. He made it to match the ephod, using finely woven linen embroidered with gold and with blue, purple, and scarlet thread. '
  '9':
  - type: text
    content: He made the chestpiece of a single piece of cloth folded to form a pouch nine inches
  - type: note
    content: Hebrew 1 span [23 centimeters].
  - type: text
    content: ' square. '
