document_id: EXO.39,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Clothing for the Priests
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The craftsmen made beautiful sacred garments of blue, purple, and scarlet cloth—clothing for Aaron to wear while ministering in the Holy Place, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Making the Ephod
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They mounted four rows of gemstones
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of some of these gemstones is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' on it. The first row contained a red carnelian, a pale-green peridot, and an emerald. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The second row contained a turquoise, a blue lapis lazuli, and a white moonstone. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The third row contained an orange jacinth, an agate, and a purple amethyst. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The fourth row contained a blue-green beryl, an onyx, and a green jasper. All these stones were set in gold filigree. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Each stone represented one of the twelve sons of Israel, and the name of that tribe was engraved on it like a seal.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'To attach the chestpiece to the ephod, they made braided cords of pure gold thread. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They also made two settings of gold filigree and two gold rings and attached them to the top corners of the chestpiece. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They tied the two gold cords to the rings on the chestpiece. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They tied the other ends of the cords to the gold settings on the shoulder-pieces of the ephod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then they made two more gold rings and attached them to the inside edges of the chestpiece next to the ephod. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Bezalel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 39:8, 22.
      marker-yv: yv-n
    - type: text
      text: ' made the ephod of finely woven linen and embroidered it with gold and with blue, purple, and scarlet thread. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then they made two more gold rings and attached them to the front of the ephod, below the shoulder-pieces, just above the knot where the decorative sash was fastened to the ephod. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They attached the bottom rings of the chestpiece to the rings on the ephod with blue cords. In this way, the chestpiece was held securely to the ephod above the decorative sash. All this was done just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Additional Clothing for the Priests
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Bezalel made the robe that is worn with the ephod from a single piece of blue woven cloth, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: with an opening for Aaron’s head in the middle of it. The opening was reinforced with a woven collar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' so it would not tear. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They made pomegranates of blue, purple, and scarlet yarn, and attached them to the hem of the robe. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'They also made bells of pure gold and placed them between the pomegranates along the hem of the robe, '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'with bells and pomegranates alternating all around the hem. This robe was to be worn whenever the priest ministered before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They made tunics for Aaron and his sons from fine linen cloth. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The turban and the special head coverings were made of fine linen, and the undergarments were also made of finely woven linen. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The sashes were made of finely woven linen and embroidered with blue, purple, and scarlet thread, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He made gold thread by hammering out thin sheets of gold and cutting it into fine strands. With great skill and care, he worked it into the fine linen with the blue, purple, and scarlet thread.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Finally, they made the sacred medallion—the badge of holiness—of pure gold. They engraved it like a seal with these words: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Holy to the Lord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'They attached the medallion with a blue cord to Aaron’s turban, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Inspects the Work
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: And so at last the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tabernacle, the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 39:40.
      marker-yv: yv-n
    - type: text
      text: ' was finished. The Israelites had done everything just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And they brought the entire Tabernacle to Moses:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the sacred tent with all its furnishings, clasps, frames, crossbars, posts, and bases;
  '34':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: the tent coverings of tanned ram skins and fine goatskin leather;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the inner curtain to shield the Ark;
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: the Ark of the Covenant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ark of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ' and its carrying poles;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Ark’s cover—the place of atonement;
  '36':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: the table and all its utensils;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Bread of the Presence;
  '37':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: the pure gold lampstand with its symmetrical lamp cups, all its accessories, and the olive oil for lighting;
  '38':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: the gold altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the anointing oil and fragrant incense;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the curtain for the entrance of the sacred tent;
  '39':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: the bronze altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the bronze grating and its carrying poles and utensils;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the washbasin with its stand;
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The ephod consisted of two pieces, front and back, joined at the shoulders with two shoulder-pieces. '
  '40':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: the curtains for the walls of the courtyard;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the posts and their bases;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the curtain for the entrance to the courtyard;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the ropes and tent pegs;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all the furnishings to be used in worship at the Tabernacle;
  '41':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: the beautifully stitched garments for the priests to wear while ministering in the Holy Place—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'So the people of Israel followed all of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s instructions to Moses. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Then Moses inspected all their work. When he found it had been done just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him, he blessed them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The decorative sash was made of the same materials: finely woven linen embroidered with gold and with blue, purple, and scarlet thread, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They mounted the two onyx stones in settings of gold filigree. The stones were engraved with the names of the tribes of Israel, just as a seal is engraved. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He fastened these stones on the shoulder-pieces of the ephod as a reminder that the priest represents the people of Israel. All this was done just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Making the Chestpiece
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Bezalel made the chestpiece with great skill and care. He made it to match the ephod, using finely woven linen embroidered with gold and with blue, purple, and scarlet thread. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He made the chestpiece of a single piece of cloth folded to form a pouch nine inches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 span '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' square. '
