document_id: GAL.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Think of it this way. If a father dies and leaves an inheritance for his young children, those children are not much better off than slaves until they grow up, even though they actually own everything their father had. '
  '10':
  - type: text
    content: 'You are trying to earn favor with God by observing certain days or months or seasons or years. '
  '11':
  - type: text
    content: 'I fear for you. Perhaps all my hard work with you was for nothing. '
  '12':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 4:28, 31.
  - type: text
    content: ' I plead with you to live as I do in freedom from these things, for I have become like you Gentiles—free from those laws.'
  - type: text
    content: 'You did not mistreat me when I first preached to you. '
  '13':
  - type: text
    content: 'Surely you remember that I was sick when I first brought you the Good News. '
  '14':
  - type: text
    content: 'But even though my condition tempted you to reject me, you did not despise me or turn me away. No, you took me in and cared for me as though I were an angel from God or even Christ Jesus himself. '
  '15':
  - type: text
    content: 'Where is that joyful and grateful spirit you felt then? I am sure you would have taken out your own eyes and given them to me if it had been possible. '
  '16':
  - type: text
    content: Have I now become your enemy because I am telling you the truth?
  '17':
  - type: text
    content: 'Those false teachers are so eager to win your favor, but their intentions are not good. They are trying to shut you off from me so that you will pay attention only to them. '
  '18':
  - type: text
    content: If someone is eager to do good things for you, that’s all right; but let them do it all the time, not just when I’m with you.
  '19':
  - type: text
    content: 'Oh, my dear children! I feel as if I’m going through labor pains for you again, and they will continue until Christ is fully developed in your lives. '
  '2':
  - type: text
    content: 'They have to obey their guardians until they reach whatever age their father set. '
  '20':
  - type: text
    content: I wish I were with you right now so I could change my tone. But at this distance I don’t know how else to help you.
  - type: heading
    content: Abraham’s Two Children
  '21':
  - type: text
    content: 'Tell me, you who want to live under the law, do you know what the law actually says? '
  '22':
  - type: text
    content: The Scriptures say that Abraham had two sons, one from his slave wife and one from his freeborn wife.
  - type: note
    content: See Gen 16:15; 21:2-3.
  - type: text
    content: ' '
  '23':
  - type: text
    content: The son of the slave wife was born in a human attempt to bring about the fulfillment of God’s promise. But the son of the freeborn wife was born as God’s own fulfillment of his promise.
  '24':
  - type: text
    content: 'These two women serve as an illustration of God’s two covenants. The first woman, Hagar, represents Mount Sinai where people received the law that enslaved them. '
  '25':
  - type: text
    content: And now Jerusalem is just like Mount Sinai in Arabia,
  - type: note
    content: Greek And Hagar, which is Mount Sinai in Arabia, is now like Jerusalem; other manuscripts read And Mount Sinai in Arabia is now like Jerusalem.
  - type: text
    content: ' because she and her children live in slavery to the law. '
  '26':
  - type: text
    content: 'But the other woman, Sarah, represents the heavenly Jerusalem. She is the free woman, and she is our mother. '
  '27':
  - type: text
    content: As Isaiah said,
  - type: text
    content: “Rejoice, O childless woman,
  - type: text
    content: you who have never given birth!
  - type: text
    content: Break into a joyful shout,
  - type: text
    content: you who have never been in labor!
  - type: text
    content: For the desolate woman now has more children
  - type: text
    content: than the woman who lives with her husband!”
  - type: note
    content: Isa 54:1.
  '28':
  - type: text
    content: 'And you, dear brothers and sisters, are children of the promise, just like Isaac. '
  '29':
  - type: text
    content: But you are now being persecuted by those who want you to keep the law, just as Ishmael, the child born by human effort, persecuted Isaac, the child born by the power of the Spirit.
  '3':
  - type: text
    content: And that’s the way it was with us before Christ came. We were like children; we were slaves to the basic spiritual principles
  - type: note
    content: Or powers; also in 4:9.
  - type: text
    content: ' of this world.'
  '30':
  - type: text
    content: But what do the Scriptures say about that? “Get rid of the slave and her son, for the son of the slave woman will not share the inheritance with the free woman’s son.”
  - type: note
    content: Gen 21:10.
  - type: text
    content: ' '
  '31':
  - type: text
    content: So, dear brothers and sisters, we are not children of the slave woman; we are children of the free woman.
  '4':
  - type: text
    content: 'But when the right time came, God sent his Son, born of a woman, subject to the law. '
  '5':
  - type: text
    content: God sent him to buy freedom for us who were slaves to the law, so that he could adopt us as his very own children.
  - type: note
    content: Greek sons; also in 4:6.
  - type: text
    content: ' '
  '6':
  - type: text
    content: And because we
  - type: note
    content: Greek you.
  - type: text
    content: ' are his children, God has sent the Spirit of his Son into our hearts, prompting us to call out, “Abba, Father.”'
  - type: note
    content: Abba is an Aramaic term for “father.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: Now you are no longer a slave but God’s own child.
  - type: note
    content: Greek son; also in 4:7b.
  - type: text
    content: ' And since you are his child, God has made you his heir.'
  - type: heading
    content: Paul’s Concern for the Galatians
  '8':
  - type: text
    content: 'Before you Gentiles knew God, you were slaves to so-called gods that do not even exist. '
  '9':
  - type: text
    content: 'So now that you know God (or should I say, now that God knows you), why do you want to go back again and become slaves once more to the weak and useless spiritual principles of this world? '
