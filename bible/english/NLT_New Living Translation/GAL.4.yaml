document_id: GAL.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Think of it this way. If a father dies and leaves an inheritance for his young children, those children are not much better off than slaves until they grow up, even though they actually own everything their father had. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You are trying to earn favor with God by observing certain days or months or seasons or years. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I fear for you. Perhaps all my hard work with you was for nothing. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:28, 31.
      marker-yv: yv-n
    - type: text
      text: ' I plead with you to live as I do in freedom from these things, for I have become like you Gentiles—free from those laws.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You did not mistreat me when I first preached to you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Surely you remember that I was sick when I first brought you the Good News. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But even though my condition tempted you to reject me, you did not despise me or turn me away. No, you took me in and cared for me as though I were an angel from God or even Christ Jesus himself. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Where is that joyful and grateful spirit you felt then? I am sure you would have taken out your own eyes and given them to me if it had been possible. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Have I now become your enemy because I am telling you the truth?
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Those false teachers are so eager to win your favor, but their intentions are not good. They are trying to shut you off from me so that you will pay attention only to them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If someone is eager to do good things for you, that’s all right; but let them do it all the time, not just when I’m with you.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Oh, my dear children! I feel as if I’m going through labor pains for you again, and they will continue until Christ is fully developed in your lives. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They have to obey their guardians until they reach whatever age their father set. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I wish I were with you right now so I could change my tone. But at this distance I don’t know how else to help you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham’s Two Children
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tell me, you who want to live under the law, do you know what the law actually says? '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The Scriptures say that Abraham had two sons, one from his slave wife and one from his freeborn wife.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Gen 16:15; 21:2-3.
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The son of the slave wife was born in a human attempt to bring about the fulfillment of God’s promise. But the son of the freeborn wife was born as God’s own fulfillment of his promise.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'These two women serve as an illustration of God’s two covenants. The first woman, Hagar, represents Mount Sinai where people received the law that enslaved them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And now Jerusalem is just like Mount Sinai in Arabia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And Hagar, which is Mount Sinai in Arabia, is now like Jerusalem; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And Mount Sinai in Arabia is now like Jerusalem.
      marker-yv: yv-n
    - type: text
      text: ' because she and her children live in slavery to the law. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But the other woman, Sarah, represents the heavenly Jerusalem. She is the free woman, and she is our mother. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: As Isaiah said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rejoice, O childless woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have never given birth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break into a joyful shout,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have never been in labor!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the desolate woman now has more children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the woman who lives with her husband!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 54:1.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And you, dear brothers and sisters, are children of the promise, just like Isaac. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: But you are now being persecuted by those who want you to keep the law, just as Ishmael, the child born by human effort, persecuted Isaac, the child born by the power of the Spirit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And that’s the way it was with us before Christ came. We were like children; we were slaves to the basic spiritual principles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'powers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:9.
      marker-yv: yv-n
    - type: text
      text: ' of this world.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But what do the Scriptures say about that? “Get rid of the slave and her son, for the son of the slave woman will not share the inheritance with the free woman’s son.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 21:10.
      marker-yv: yv-n
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So, dear brothers and sisters, we are not children of the slave woman; we are children of the free woman.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But when the right time came, God sent his Son, born of a woman, subject to the law. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: God sent him to buy freedom for us who were slaves to the law, so that he could adopt us as his very own children.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sons; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:6.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And because we
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you.
      marker-yv: yv-n
    - type: text
      text: ' are his children, God has sent the Spirit of his Son into our hearts, prompting us to call out, “Abba, Father.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6b '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is an Aramaic term for “father.”
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now you are no longer a slave but God’s own child.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:7b.
      marker-yv: yv-n
    - type: text
      text: ' And since you are his child, God has made you his heir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Concern for the Galatians
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Before you Gentiles knew God, you were slaves to so-called gods that do not even exist. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So now that you know God (or should I say, now that God knows you), why do you want to go back again and become slaves once more to the weak and useless spiritual principles of this world? '
