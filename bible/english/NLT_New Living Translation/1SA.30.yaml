document_id: 1SA.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Destroys the Amalekites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Three days later, when David and his men arrived home at their town of Ziklag, they found that the Amalekites had made a raid into the Negev and Ziklag; they had crushed Ziklag and burned it to the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They had carried off the women and children and everyone else but without killing anyone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When David and his men saw the ruins and realized what had happened to their families, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'they wept until they could weep no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David’s two wives, Ahinoam from Jezreel and Abigail, the widow of Nabal from Carmel, were among those captured. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David was now in great danger because all his men were very bitter about losing their sons and daughters, and they began to talk of stoning him. But David found strength in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he said to Abiathar the priest, “Bring me the ephod!” So Abiathar brought it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then David asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Should I chase after this band of raiders? Will I catch them?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told him, “Yes, go after them. You will surely recover everything that was taken from you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So David and his 600 men set out, and they came to the brook Besor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But 200 of the men were too exhausted to cross the brook, so David continued the pursuit with 400 men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Along the way they found an Egyptian man in a field and brought him to David. They gave him some bread to eat and water to drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They also gave him part of a fig cake and two clusters of raisins, for he hadn’t had anything to eat or drink for three days and nights. Before long his strength returned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “To whom do you belong, and where do you come from?” David asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“I am an Egyptian—the slave of an Amalekite,” he replied. “My master abandoned me three days ago because I was sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: We were on our way back from raiding the Kerethites in the Negev, the territory of Judah, and the land of Caleb, and we had just burned Ziklag.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Will you lead me to this band of raiders?” David asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: The young man replied, “If you take an oath in God’s name that you will not kill me or give me back to my master, then I will guide you to them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So he led David to them, and they found the Amalekites spread out across the fields, eating and drinking and dancing with joy because of the vast amount of plunder they had taken from the Philistines and the land of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David and his men rushed in among them and slaughtered them throughout that night and the entire next day until evening. None of the Amalekites escaped except 400 young men who fled on camels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'David got back everything the Amalekites had taken, and he rescued his two wives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nothing was missing: small or great, son or daughter, nor anything else that had been taken. David brought everything back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He also recovered all the flocks and herds, and his men drove them ahead of the other livestock. “This plunder belongs to David!” they said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then David returned to the brook Besor and met up with the 200 men who had been left behind because they were too exhausted to go with him. They went out to meet David and his men, and David greeted them joyfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But some evil troublemakers among David’s men said, “They didn’t go with us, so they can’t have any of the plunder we recovered. Give them their wives and children, and tell them to be gone.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But David said, “No, my brothers! Don’t be selfish with what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given us. He has kept us safe and helped us defeat the band of raiders that attacked us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Who will listen when you talk like this? We share and share alike—those who go to battle and those who guard the equipment.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: From then on David made this a decree and regulation for Israel, and it is still followed today.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When he arrived at Ziklag, David sent part of the plunder to the elders of Judah, who were his friends. “Here is a present for you, taken from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s enemies,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The gifts were sent to the people of the following towns David had visited: Bethel, Ramoth-negev, Jattir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aroer, Siphmoth, Eshtemoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Racal,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Carmel.
    marker-yv: yv-n
  - type: text
    text: ' the towns of the Jerahmeelites, the towns of the Kenites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hormah, Bor-ashan, Athach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hebron, and all the other places David and his men had visited.
