document_id: NUM.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Daily Offerings
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: This is the burnt offering to be presented each Sabbath day, in addition to the regular burnt offering and its accompanying liquid offering.
  - type: heading
    content: The Monthly Offerings
  '11':
  - type: text
    content: '“On the first day of each month, present an extra burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' of two young bulls, one ram, and seven one-year-old male lambs, all with no defects. '
  '12':
  - type: text
    content: These must be accompanied by grain offerings of choice flour moistened with olive oil—six quarts
  - type: note
    content: Hebrew 3/10 of an ephah [6.6 liters]; also in 28:20, 28.
  - type: text
    content: ' with each bull, four quarts with the ram, '
  '13':
  - type: text
    content: 'and two quarts with each lamb. This burnt offering will be a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'You must also present a liquid offering with each sacrifice: two quarts'
  - type: note
    content: Hebrew 1/2 of a hin [2 liters].
  - type: text
    content: ' of wine for each bull, a third of a gallon'
  - type: note
    content: Hebrew 1/3 of a hin [1.3 liters].
  - type: text
    content: ' for the ram, and one quart'
  - type: note
    content: Hebrew 1/4 of a hin [1 liter].
  - type: text
    content: ' for each lamb. Present this monthly burnt offering on the first day of each month throughout the year.'
  '15':
  - type: text
    content: '“On the first day of each month, you must also offer one male goat for a sin offering to the '
  - type: text
    content: Lord
  - type: text
    content: . This is in addition to the regular burnt offering and its accompanying liquid offering.
  - type: heading
    content: Offerings for the Passover
  '16':
  - type: text
    content: “On the fourteenth day of the first month,
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: ' you must celebrate the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover. '
  '17':
  - type: text
    content: 'On the following day—the fifteenth day of the month—a joyous, seven-day festival will begin, but no bread made with yeast may be eaten. '
  '18':
  - type: text
    content: 'The first day of the festival will be an official day for holy assembly, and no ordinary work may be done on that day. '
  '19':
  - type: text
    content: 'As a special gift you must present a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '—two young bulls, one ram, and seven one-year-old male lambs, all with no defects. '
  '2':
  - type: text
    content: '“Give these instructions to the people of Israel: The offerings you present as special gifts are a pleasing aroma to me; they are my food. See to it that they are brought at the appointed times and offered according to my instructions.'
  '20':
  - type: text
    content: 'These will be accompanied by grain offerings of choice flour moistened with olive oil—six quarts with each bull, four quarts with the ram, '
  '21':
  - type: text
    content: 'and two quarts with each of the seven lambs. '
  '22':
  - type: text
    content: 'You must also offer a male goat as a sin offering to purify yourselves and make yourselves right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for yourselves; also in 28:30.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Present these offerings in addition to your regular morning burnt offering. '
  '24':
  - type: text
    content: 'On each of the seven days of the festival, this is how you must prepare the food offering that is presented as a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. These will be offered in addition to the regular burnt offerings and liquid offerings. '
  '25':
  - type: text
    content: The seventh day of the festival will be another official day for holy assembly, and no ordinary work may be done on that day.
  - type: heading
    content: Offerings for the Festival of Harvest
  '26':
  - type: text
    content: “At the Festival of Harvest,
  - type: note
    content: Hebrew Festival of Weeks. This was later called the Festival of Pentecost (see Acts 2:1). It is celebrated today as Shavuot (or Shabuoth).
  - type: text
    content: ' when you present the first of your new grain to the '
  - type: text
    content: Lord
  - type: text
    content: ', you must call an official day for holy assembly, and you may do no ordinary work on that day. '
  '27':
  - type: text
    content: 'Present a special burnt offering on that day as a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. It will consist of two young bulls, one ram, and seven one-year-old male lambs. '
  '28':
  - type: text
    content: 'These will be accompanied by grain offerings of choice flour moistened with olive oil—six quarts with each bull, four quarts with the ram, '
  '29':
  - type: text
    content: 'and two quarts with each of the seven lambs. '
  '3':
  - type: text
    content: '“Say to the people: This is the special gift you must present to the '
  - type: text
    content: Lord
  - type: text
    content: ' as your daily burnt offering. You must offer two one-year-old male lambs with no defects. '
  '30':
  - type: text
    content: 'Also, offer one male goat to purify yourselves and make yourselves right with the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: Prepare these special burnt offerings, along with their liquid offerings, in addition to the regular burnt offering and its accompanying grain offering. Be sure that all the animals you sacrifice have no defects.
  '4':
  - type: text
    content: 'Sacrifice one lamb in the morning and the other in the evening. '
  '5':
  - type: text
    content: With each lamb you must offer a grain offering of two quarts
  - type: note
    content: Hebrew 1/10 of an ephah [2.2 liters]; also in 28:13, 21, 29.
  - type: text
    content: ' of choice flour mixed with one quart'
  - type: note
    content: Hebrew 1/4 of a hin [1 liter]; also in 28:7.
  - type: text
    content: ' of pure oil of pressed olives. '
  '6':
  - type: text
    content: 'This is the regular burnt offering instituted at Mount Sinai as a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Along with it you must present the proper liquid offering of one quart of alcoholic drink with each lamb, poured out in the Holy Place as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Offer the second lamb in the evening with the same grain offering and liquid offering. It, too, is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Sabbath Offerings
  '9':
  - type: text
    content: “On the Sabbath day, sacrifice two one-year-old male lambs with no defects. They must be accompanied by a grain offering of four quarts
  - type: note
    content: Hebrew 2/10 of an ephah [4.4 liters]; also in 28:12, 20, 28.
  - type: text
    content: ' of choice flour moistened with olive oil, and a liquid offering. '
