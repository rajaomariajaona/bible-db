document_id: NUM.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Daily Offerings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Give these instructions to the people of Israel: The offerings you present as special gifts are a pleasing aroma to me; they are my food. See to it that they are brought at the appointed times and offered according to my instructions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Say to the people: This is the special gift you must present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as your daily burnt offering. You must offer two one-year-old male lambs with no defects. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sacrifice one lamb in the morning and the other in the evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: With each lamb you must offer a grain offering of two quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 liters]; also in 28:13, 21, 29.'
    marker-yv: yv-n
  - type: text
    text: ' of choice flour mixed with one quart'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/4 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 liter]; also in 28:7.'
    marker-yv: yv-n
  - type: text
    text: ' of pure oil of pressed olives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is the regular burnt offering instituted at Mount Sinai as a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Along with it you must present the proper liquid offering of one quart of alcoholic drink with each lamb, poured out in the Holy Place as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Offer the second lamb in the evening with the same grain offering and liquid offering. It, too, is a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sabbath Offerings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “On the Sabbath day, sacrifice two one-year-old male lambs with no defects. They must be accompanied by a grain offering of four quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.4 liters]; also in 28:12, 20, 28.'
    marker-yv: yv-n
  - type: text
    text: ' of choice flour moistened with olive oil, and a liquid offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This is the burnt offering to be presented each Sabbath day, in addition to the regular burnt offering and its accompanying liquid offering.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Monthly Offerings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“On the first day of each month, present an extra burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of two young bulls, one ram, and seven one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: These must be accompanied by grain offerings of choice flour moistened with olive oil—six quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '3/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[6.6 liters]; also in 28:20, 28.'
    marker-yv: yv-n
  - type: text
    text: ' with each bull, four quarts with the ram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and two quarts with each lamb. This burnt offering will be a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You must also present a liquid offering with each sacrifice: two quarts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/2 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2 liters].'
    marker-yv: yv-n
  - type: text
    text: ' of wine for each bull, a third of a gallon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/3 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.3 liters].'
    marker-yv: yv-n
  - type: text
    text: ' for the ram, and one quart'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/4 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 liter].'
    marker-yv: yv-n
  - type: text
    text: ' for each lamb. Present this monthly burnt offering on the first day of each month throughout the year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“On the first day of each month, you must also offer one male goat for a sin offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . This is in addition to the regular burnt offering and its accompanying liquid offering.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings for the Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “On the fourteenth day of the first month,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
    marker-yv: yv-n
  - type: text
    text: ' you must celebrate the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On the following day—the fifteenth day of the month—a joyous, seven-day festival will begin, but no bread made with yeast may be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The first day of the festival will be an official day for holy assembly, and no ordinary work may be done on that day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'As a special gift you must present a burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—two young bulls, one ram, and seven one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These will be accompanied by grain offerings of choice flour moistened with olive oil—six quarts with each bull, four quarts with the ram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and two quarts with each of the seven lambs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You must also offer a male goat as a sin offering to purify yourselves and make yourselves right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to make atonement for yourselves; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 28:30.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Present these offerings in addition to your regular morning burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On each of the seven days of the festival, this is how you must prepare the food offering that is presented as a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. These will be offered in addition to the regular burnt offerings and liquid offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The seventh day of the festival will be another official day for holy assembly, and no ordinary work may be done on that day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings for the Festival of Harvest
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “At the Festival of Harvest,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Weeks. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was later called the Festival of Pentecost (see Acts 2:1). It is celebrated today as Shavuot (or Shabuoth).
    marker-yv: yv-n
  - type: text
    text: ' when you present the first of your new grain to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you must call an official day for holy assembly, and you may do no ordinary work on that day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Present a special burnt offering on that day as a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It will consist of two young bulls, one ram, and seven one-year-old male lambs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'These will be accompanied by grain offerings of choice flour moistened with olive oil—six quarts with each bull, four quarts with the ram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and two quarts with each of the seven lambs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Also, offer one male goat to purify yourselves and make yourselves right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Prepare these special burnt offerings, along with their liquid offerings, in addition to the regular burnt offering and its accompanying grain offering. Be sure that all the animals you sacrifice have no defects.
