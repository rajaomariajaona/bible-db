document_id: LUK.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: It was now the fifteenth year of the reign of Tiberius, the Roman emperor. Pontius Pilate was governor over Judea; Herod Antipas was ruler
  - type: note
    content: Greek Herod was tetrarch. Herod Antipas was a son of King Herod.
  - type: text
    content: ' over Galilee; his brother Philip was ruler'
  - type: note
    content: Greek tetrarch; also in 3:1c.
  - type: text
    content: ' over Iturea and Traconitis; Lysanias was ruler over Abilene. '
  '10':
  - type: text
    content: The crowds asked, “What should we do?”
  '11':
  - type: text
    content: John replied, “If you have two shirts, give one to the poor. If you have food, share it with those who are hungry.”
  '12':
  - type: text
    content: Even corrupt tax collectors came to be baptized and asked, “Teacher, what should we do?”
  '13':
  - type: text
    content: He replied, “Collect no more taxes than the government requires.”
  '14':
  - type: text
    content: “What should we do?” asked some soldiers.
  - type: text
    content: John replied, “Don’t extort money or make false accusations. And be content with your pay.”
  '15':
  - type: text
    content: 'Everyone was expecting the Messiah to come soon, and they were eager to know whether John might be the Messiah. '
  '16':
  - type: text
    content: John answered their questions by saying, “I baptize you with
  - type: note
    content: Or in.
  - type: text
    content: ' water; but someone is coming soon who is greater than I am—so much greater that I’m not even worthy to be his slave and untie the straps of his sandals. He will baptize you with the Holy Spirit and with fire.'
  - type: note
    content: Or in the Holy Spirit and in fire.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'He is ready to separate the chaff from the wheat with his winnowing fork. Then he will clean up the threshing area, gathering the wheat into his barn but burning the chaff with never-ending fire.” '
  '18':
  - type: text
    content: John used many such warnings as he announced the Good News to the people.
  '19':
  - type: text
    content: John also publicly criticized Herod Antipas, the ruler of Galilee,
  - type: note
    content: Greek Herod the tetrarch.
  - type: text
    content: ' for marrying Herodias, his brother’s wife, and for many other wrongs he had done. '
  '2':
  - type: text
    content: 'Annas and Caiaphas were the high priests. At this time a message from God came to John son of Zechariah, who was living in the wilderness. '
  '20':
  - type: text
    content: So Herod put John in prison, adding this sin to his many others.
  - type: heading
    content: The Baptism of Jesus
  '21':
  - type: text
    content: 'One day when the crowds were being baptized, Jesus himself was baptized. As he was praying, the heavens opened, '
  '22':
  - type: text
    content: and the Holy Spirit, in bodily form, descended on him like a dove. And a voice from heaven said, “You are my dearly loved Son, and you bring me great joy.
  - type: note
    content: Some manuscripts read my Son, and today I have become your Father.
  - type: text
    content: ”
  - type: heading
    content: The Ancestors of Jesus
  '23':
  - type: text
    content: Jesus was about thirty years old when he began his public ministry.
  - type: text
    content: Jesus was known as the son of Joseph.
  - type: text
    content: Joseph was the son of Heli.
  '24':
  - type: text
    content: Heli was the son of Matthat.
  - type: text
    content: Matthat was the son of Levi.
  - type: text
    content: Levi was the son of Melki.
  - type: text
    content: Melki was the son of Jannai.
  - type: text
    content: Jannai was the son of Joseph.
  '25':
  - type: text
    content: Joseph was the son of Mattathias.
  - type: text
    content: Mattathias was the son of Amos.
  - type: text
    content: Amos was the son of Nahum.
  - type: text
    content: Nahum was the son of Esli.
  - type: text
    content: Esli was the son of Naggai.
  '26':
  - type: text
    content: Naggai was the son of Maath.
  - type: text
    content: Maath was the son of Mattathias.
  - type: text
    content: Mattathias was the son of Semein.
  - type: text
    content: Semein was the son of Josech.
  - type: text
    content: Josech was the son of Joda.
  '27':
  - type: text
    content: Joda was the son of Joanan.
  - type: text
    content: Joanan was the son of Rhesa.
  - type: text
    content: Rhesa was the son of Zerubbabel.
  - type: text
    content: Zerubbabel was the son of Shealtiel.
  - type: text
    content: Shealtiel was the son of Neri.
  '28':
  - type: text
    content: Neri was the son of Melki.
  - type: text
    content: Melki was the son of Addi.
  - type: text
    content: Addi was the son of Cosam.
  - type: text
    content: Cosam was the son of Elmadam.
  - type: text
    content: Elmadam was the son of Er.
  '29':
  - type: text
    content: Er was the son of Joshua.
  - type: text
    content: Joshua was the son of Eliezer.
  - type: text
    content: Eliezer was the son of Jorim.
  - type: text
    content: Jorim was the son of Matthat.
  - type: text
    content: Matthat was the son of Levi.
  '3':
  - type: text
    content: 'Then John went from place to place on both sides of the Jordan River, preaching that people should be baptized to show that they had repented of their sins and turned to God to be forgiven. '
  '30':
  - type: text
    content: Levi was the son of Simeon.
  - type: text
    content: Simeon was the son of Judah.
  - type: text
    content: Judah was the son of Joseph.
  - type: text
    content: Joseph was the son of Jonam.
  - type: text
    content: Jonam was the son of Eliakim.
  '31':
  - type: text
    content: Eliakim was the son of Melea.
  - type: text
    content: Melea was the son of Menna.
  - type: text
    content: Menna was the son of Mattatha.
  - type: text
    content: Mattatha was the son of Nathan.
  - type: text
    content: Nathan was the son of David.
  '32':
  - type: text
    content: David was the son of Jesse.
  - type: text
    content: Jesse was the son of Obed.
  - type: text
    content: Obed was the son of Boaz.
  - type: text
    content: Boaz was the son of Salmon.
  - type: note
    content: Greek Sala, a variant spelling of Salmon; also in 3:32b. See Ruth 4:20-21.
  - type: text
    content: Salmon was the son of Nahshon.
  '33':
  - type: text
    content: Nahshon was the son of Amminadab.
  - type: text
    content: Amminadab was the son of Admin.
  - type: text
    content: Admin was the son of Arni.
  - type: note
    content: Some manuscripts read Amminadab was the son of Aram. Arni and Aram are alternate spellings of Ram. See 1 Chr 2:9-10.
  - type: text
    content: Arni was the son of Hezron.
  - type: text
    content: Hezron was the son of Perez.
  - type: text
    content: Perez was the son of Judah.
  '34':
  - type: text
    content: Judah was the son of Jacob.
  - type: text
    content: Jacob was the son of Isaac.
  - type: text
    content: Isaac was the son of Abraham.
  - type: text
    content: Abraham was the son of Terah.
  - type: text
    content: Terah was the son of Nahor.
  '35':
  - type: text
    content: Nahor was the son of Serug.
  - type: text
    content: Serug was the son of Reu.
  - type: text
    content: Reu was the son of Peleg.
  - type: text
    content: Peleg was the son of Eber.
  - type: text
    content: Eber was the son of Shelah.
  '36':
  - type: text
    content: Shelah was the son of Cainan.
  - type: text
    content: Cainan was the son of Arphaxad.
  - type: text
    content: Arphaxad was the son of Shem.
  - type: text
    content: Shem was the son of Noah.
  - type: text
    content: Noah was the son of Lamech.
  '37':
  - type: text
    content: Lamech was the son of Methuselah.
  - type: text
    content: Methuselah was the son of Enoch.
  - type: text
    content: Enoch was the son of Jared.
  - type: text
    content: Jared was the son of Mahalalel.
  - type: text
    content: Mahalalel was the son of Kenan.
  '38':
  - type: text
    content: Kenan was the son of Enosh.
  - type: note
    content: Greek Enos, a variant spelling of Enosh; also in 3:38b. See Gen 5:6.
  - type: text
    content: Enosh was the son of Seth.
  - type: text
    content: Seth was the son of Adam.
  - type: text
    content: Adam was the son of God.
  '4':
  - type: text
    content: Isaiah had spoken of John when he said,
  - type: text
    content: “He is a voice shouting in the wilderness,
  - type: text
    content: '‘Prepare the way for the '
  - type: text
    content: Lord
  - type: text
    content: ’s coming!
  - type: text
    content: Clear the road for him!
  '5':
  - type: text
    content: The valleys will be filled,
  - type: text
    content: and the mountains and hills made level.
  - type: text
    content: The curves will be straightened,
  - type: text
    content: and the rough places made smooth.
  '6':
  - type: text
    content: And then all people will see
  - type: text
    content: the salvation sent from God.’”
  - type: note
    content: Isa 40:3-5 (Greek version).
  '7':
  - type: text
    content: 'When the crowds came to John for baptism, he said, “You brood of snakes! Who warned you to flee the coming wrath? '
  '8':
  - type: text
    content: 'Prove by the way you live that you have repented of your sins and turned to God. Don’t just say to each other, ‘We’re safe, for we are descendants of Abraham.’ That means nothing, for I tell you, God can create children of Abraham from these very stones. '
  '9':
  - type: text
    content: Even now the ax of God’s judgment is poised, ready to sever the roots of the trees. Yes, every tree that does not produce good fruit will be chopped down and thrown into the fire.”
