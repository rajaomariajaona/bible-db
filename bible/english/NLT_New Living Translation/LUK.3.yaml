document_id: LUK.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: John the Baptist Prepares the Way
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It was now the fifteenth year of the reign of Tiberius, the Roman emperor. Pontius Pilate was governor over Judea; Herod Antipas was ruler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Herod was tetrarch. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Herod Antipas was a son of King Herod.
    marker-yv: yv-n
  - type: text
    text: ' over Galilee; his brother Philip was ruler'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tetrarch; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:1c.
    marker-yv: yv-n
  - type: text
    text: ' over Iturea and Traconitis; Lysanias was ruler over Abilene. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Annas and Caiaphas were the high priests. At this time a message from God came to John son of Zechariah, who was living in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then John went from place to place on both sides of the Jordan River, preaching that people should be baptized to show that they had repented of their sins and turned to God to be forgiven. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Isaiah had spoken of John when he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He is a voice shouting in the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Prepare the way for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s coming!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clear the road for him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The valleys will be filled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mountains and hills made level.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The curves will be straightened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rough places made smooth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And then all people will see
- type: usfm
  marker: q2
  children:
  - type: text
    text: the salvation sent from God.’”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4-6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 40:3-5 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the crowds came to John for baptism, he said, “You brood of snakes! Who warned you to flee the coming wrath? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Prove by the way you live that you have repented of your sins and turned to God. Don’t just say to each other, ‘We’re safe, for we are descendants of Abraham.’ That means nothing, for I tell you, God can create children of Abraham from these very stones. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even now the ax of God’s judgment is poised, ready to sever the roots of the trees. Yes, every tree that does not produce good fruit will be chopped down and thrown into the fire.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The crowds asked, “What should we do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: John replied, “If you have two shirts, give one to the poor. If you have food, share it with those who are hungry.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Even corrupt tax collectors came to be baptized and asked, “Teacher, what should we do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He replied, “Collect no more taxes than the government requires.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “What should we do?” asked some soldiers.
- type: usfm
  marker: p
  children:
  - type: text
    text: John replied, “Don’t extort money or make false accusations. And be content with your pay.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Everyone was expecting the Messiah to come soon, and they were eager to know whether John might be the Messiah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: John answered their questions by saying, “I baptize you with
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in.
    marker-yv: yv-n
  - type: text
    text: ' water; but someone is coming soon who is greater than I am—so much greater that I’m not even worthy to be his slave and untie the straps of his sandals. He will baptize you with the Holy Spirit and with fire.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in the Holy Spirit and in fire.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He is ready to separate the chaff from the wheat with his winnowing fork. Then he will clean up the threshing area, gathering the wheat into his barn but burning the chaff with never-ending fire.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: John used many such warnings as he announced the Good News to the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: John also publicly criticized Herod Antipas, the ruler of Galilee,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Herod the tetrarch.
    marker-yv: yv-n
  - type: text
    text: ' for marrying Herodias, his brother’s wife, and for many other wrongs he had done. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Herod put John in prison, adding this sin to his many others.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Baptism of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'One day when the crowds were being baptized, Jesus himself was baptized. As he was praying, the heavens opened, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: and the Holy Spirit, in bodily form, descended on him like a dove. And a voice from heaven said, “You are my dearly loved Son, and you bring me great joy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my Son, and today I have become your Father.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ancestors of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jesus was about thirty years old when he began his public ministry.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jesus was known as the son of Joseph.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joseph was the son of Heli.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Heli was the son of Matthat.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Matthat was the son of Levi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Levi was the son of Melki.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Melki was the son of Jannai.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jannai was the son of Joseph.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Joseph was the son of Mattathias.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mattathias was the son of Amos.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Amos was the son of Nahum.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nahum was the son of Esli.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Esli was the son of Naggai.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Naggai was the son of Maath.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Maath was the son of Mattathias.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mattathias was the son of Semein.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Semein was the son of Josech.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Josech was the son of Joda.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Joda was the son of Joanan.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joanan was the son of Rhesa.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Rhesa was the son of Zerubbabel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zerubbabel was the son of Shealtiel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shealtiel was the son of Neri.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Neri was the son of Melki.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Melki was the son of Addi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Addi was the son of Cosam.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Cosam was the son of Elmadam.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elmadam was the son of Er.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Er was the son of Joshua.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joshua was the son of Eliezer.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliezer was the son of Jorim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jorim was the son of Matthat.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Matthat was the son of Levi.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Levi was the son of Simeon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Simeon was the son of Judah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Judah was the son of Joseph.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joseph was the son of Jonam.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jonam was the son of Eliakim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Eliakim was the son of Melea.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Melea was the son of Menna.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Menna was the son of Mattatha.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mattatha was the son of Nathan.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nathan was the son of David.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: David was the son of Jesse.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jesse was the son of Obed.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Obed was the son of Boaz.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Boaz was the son of Salmon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sala, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Salmon; also in 3:32b. See Ruth 4:20-21.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Salmon was the son of Nahshon.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nahshon was the son of Amminadab.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Amminadab was the son of Admin.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Admin was the son of Arni.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amminadab was the son of Aram. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Arni '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are alternate spellings of Ram. See 1 Chr 2:9-10.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Arni was the son of Hezron.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hezron was the son of Perez.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Perez was the son of Judah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Judah was the son of Jacob.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jacob was the son of Isaac.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Isaac was the son of Abraham.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Abraham was the son of Terah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Terah was the son of Nahor.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nahor was the son of Serug.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Serug was the son of Reu.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Reu was the son of Peleg.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Peleg was the son of Eber.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eber was the son of Shelah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Shelah was the son of Cainan.
- type: usfm
