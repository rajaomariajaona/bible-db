document_id: EXO.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Craftsmen: Bezalel and Oholiab'
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: the beautifully stitched garments—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests;
  '11':
  - type: text
    content: the anointing oil;
  - type: text
    content: the fragrant incense for the Holy Place.
  - type: text
    content: The craftsmen must make everything as I have commanded you.”
  - type: heading
    content: Instructions for the Sabbath
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' then gave these instructions to Moses: '
  '13':
  - type: text
    content: '“Tell the people of Israel: ‘Be careful to keep my Sabbath day, for the Sabbath is a sign of the covenant between me and you from generation to generation. It is given so you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who makes you holy. '
  '14':
  - type: text
    content: 'You must keep the Sabbath day, for it is a holy day for you. Anyone who desecrates it must be put to death; anyone who works on that day will be cut off from the community. '
  '15':
  - type: text
    content: 'You have six days each week for your ordinary work, but the seventh day must be a Sabbath day of complete rest, a holy day dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. Anyone who works on the Sabbath must be put to death. '
  '16':
  - type: text
    content: 'The people of Israel must keep the Sabbath day by observing it from generation to generation. This is a covenant obligation for all time. '
  '17':
  - type: text
    content: 'It is a permanent sign of my covenant with the people of Israel. For in six days the '
  - type: text
    content: Lord
  - type: text
    content: ' made heaven and earth, but on the seventh day he stopped working and was refreshed.’”'
  '18':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' finished speaking with Moses on Mount Sinai, he gave him the two stone tablets inscribed with the terms of the covenant,'
  - type: note
    content: Hebrew the two tablets of the Testimony; see note on 25:16.
  - type: text
    content: ' written by the finger of God.'
  '2':
  - type: text
    content: '“Look, I have specifically chosen Bezalel son of Uri, grandson of Hur, of the tribe of Judah. '
  '3':
  - type: text
    content: 'I have filled him with the Spirit of God, giving him great wisdom, ability, and expertise in all kinds of crafts. '
  '4':
  - type: text
    content: 'He is a master craftsman, expert in working with gold, silver, and bronze. '
  '5':
  - type: text
    content: He is skilled in engraving and mounting gemstones and in carving wood. He is a master at every craft!
  '6':
  - type: text
    content: '“And I have personally appointed Oholiab son of Ahisamach, of the tribe of Dan, to be his assistant. Moreover, I have given special skill to all the gifted craftsmen so they can make all the things I have commanded you to make:'
  '7':
  - type: text
    content: the Tabernacle;
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: the Ark of the Covenant;
  - type: note
    content: Hebrew the Ark of the Testimony.
  - type: text
    content: the Ark’s cover—the place of atonement;
  - type: text
    content: all the furnishings of the Tabernacle;
  '8':
  - type: text
    content: the table and its utensils;
  - type: text
    content: the pure gold lampstand with all its accessories;
  - type: text
    content: the incense altar;
  '9':
  - type: text
    content: the altar of burnt offering with all its utensils;
  - type: text
    content: the washbasin with its stand;
