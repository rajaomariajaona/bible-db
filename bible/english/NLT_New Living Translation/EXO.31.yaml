document_id: EXO.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Craftsmen: Bezalel and Oholiab'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Look, I have specifically chosen Bezalel son of Uri, grandson of Hur, of the tribe of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I have filled him with the Spirit of God, giving him great wisdom, ability, and expertise in all kinds of crafts. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He is a master craftsman, expert in working with gold, silver, and bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He is skilled in engraving and mounting gemstones and in carving wood. He is a master at every craft!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“And I have personally appointed Oholiab son of Ahisamach, of the tribe of Dan, to be his assistant. Moreover, I have given special skill to all the gifted craftsmen so they can make all the things I have commanded you to make:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: the Tabernacle;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Ark of the Covenant;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Ark of the Testimony.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Ark’s cover—the place of atonement;
- type: usfm
  marker: li1
  children:
  - type: text
    text: all the furnishings of the Tabernacle;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: the table and its utensils;
- type: usfm
  marker: li1
  children:
  - type: text
    text: the pure gold lampstand with all its accessories;
- type: usfm
  marker: li1
  children:
  - type: text
    text: the incense altar;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: the altar of burnt offering with all its utensils;
- type: usfm
  marker: li1
  children:
  - type: text
    text: the washbasin with its stand;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: the beautifully stitched garments—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: the anointing oil;
- type: usfm
  marker: li1
  children:
  - type: text
    text: the fragrant incense for the Holy Place.
- type: usfm
  marker: m
  children:
  - type: text
    text: The craftsmen must make everything as I have commanded you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions for the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' then gave these instructions to Moses: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Tell the people of Israel: ‘Be careful to keep my Sabbath day, for the Sabbath is a sign of the covenant between me and you from generation to generation. It is given so you may know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who makes you holy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You must keep the Sabbath day, for it is a holy day for you. Anyone who desecrates it must be put to death; anyone who works on that day will be cut off from the community. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You have six days each week for your ordinary work, but the seventh day must be a Sabbath day of complete rest, a holy day dedicated to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Anyone who works on the Sabbath must be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The people of Israel must keep the Sabbath day by observing it from generation to generation. This is a covenant obligation for all time. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It is a permanent sign of my covenant with the people of Israel. For in six days the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made heaven and earth, but on the seventh day he stopped working and was refreshed.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' finished speaking with Moses on Mount Sinai, he gave him the two stone tablets inscribed with the terms of the covenant,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the two tablets of the Testimony; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 25:16.
    marker-yv: yv-n
  - type: text
    text: ' written by the finger of God.'
