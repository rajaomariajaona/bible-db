document_id: 1SA.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Protects the Town of Keilah
  - type: text
    content: 'One day news came to David that the Philistines were at Keilah stealing grain from the threshing floors. '
  '10':
  - type: text
    content: 'Then David prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, I have heard that Saul is planning to come and destroy Keilah because I am here. '
  '11':
  - type: text
    content: Will the leaders of Keilah betray me to him?
  - type: note
    content: Some manuscripts lack the first sentence of 23:11.
  - type: text
    content: ' And will Saul actually come as I have heard? O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, please tell me.”'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “He will come.”'
  '12':
  - type: text
    content: Again David asked, “Will the leaders of Keilah betray me and my men to Saul?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Yes, they will betray you.”'
  - type: heading
    content: David Hides in the Wilderness
  '13':
  - type: text
    content: 'So David and his men—about 600 of them now—left Keilah and began roaming the countryside. Word soon reached Saul that David had escaped, so he didn’t go to Keilah after all. '
  '14':
  - type: text
    content: David now stayed in the strongholds of the wilderness and in the hill country of Ziph. Saul hunted him day after day, but God didn’t let Saul find him.
  '15':
  - type: text
    content: 'One day near Horesh, David received the news that Saul was on the way to Ziph to search for him and kill him. '
  '16':
  - type: text
    content: 'Jonathan went to find David and encouraged him to stay strong in his faith in God. '
  '17':
  - type: text
    content: '“Don’t be afraid,” Jonathan reassured him. “My father will never find you! You are going to be the king of Israel, and I will be next to you, as my father, Saul, is well aware.” '
  '18':
  - type: text
    content: 'So the two of them renewed their solemn pact before the '
  - type: text
    content: Lord
  - type: text
    content: . Then Jonathan returned home, while David stayed at Horesh.
  '19':
  - type: text
    content: 'But now the men of Ziph went to Saul in Gibeah and betrayed David to him. “We know where David is hiding,” they said. “He is in the strongholds of Horesh on the hill of Hakilah, which is in the southern part of Jeshimon. '
  '2':
  - type: text
    content: 'David asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Should I go and attack them?”'
  - type: text
    content: '“Yes, go and save Keilah,” the '
  - type: text
    content: Lord
  - type: text
    content: ' told him.'
  '20':
  - type: text
    content: Come down whenever you’re ready, O king, and we will catch him and hand him over to you!”
  '21':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you,” Saul said. “At last someone is concerned about me! '
  '22':
  - type: text
    content: 'Go and check again to be sure of where he is staying and who has seen him there, for I know that he is very crafty. '
  '23':
  - type: text
    content: 'Discover his hiding places, and come back when you are sure. Then I’ll go with you. And if he is in the area at all, I’ll track him down, even if I have to search every hiding place in Judah!” '
  '24':
  - type: text
    content: So the men of Ziph returned home ahead of Saul.
  - type: text
    content: 'Meanwhile, David and his men had moved into the wilderness of Maon in the Arabah Valley south of Jeshimon. '
  '25':
  - type: text
    content: When David heard that Saul and his men were searching for him, he went even farther into the wilderness to the great rock, and he remained there in the wilderness of Maon. But Saul kept after him in the wilderness.
  '26':
  - type: text
    content: 'Saul and David were now on opposite sides of a mountain. Just as Saul and his men began to close in on David and his men, '
  '27':
  - type: text
    content: 'an urgent message reached Saul that the Philistines were raiding Israel again. '
  '28':
  - type: text
    content: So Saul quit chasing David and returned to fight the Philistines. Ever since that time, the place where David was camped has been called the Rock of Escape.
  - type: note
    content: Hebrew Sela-hammahlekoth.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Verse 23:29 is numbered 24:1 in Hebrew text.
  - type: text
    content: David then went to live in the strongholds of En-gedi.
  '3':
  - type: text
    content: But David’s men said, “We’re afraid even here in Judah. We certainly don’t want to go to Keilah to fight the whole Philistine army!”
  '4':
  - type: text
    content: 'So David asked the '
  - type: text
    content: Lord
  - type: text
    content: ' again, and again the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Go down to Keilah, for I will help you conquer the Philistines.”'
  '5':
  - type: text
    content: 'So David and his men went to Keilah. They slaughtered the Philistines and took all their livestock and rescued the people of Keilah. '
  '6':
  - type: text
    content: Now when Abiathar son of Ahimelech fled to David at Keilah, he brought the ephod with him.
  '7':
  - type: text
    content: 'Saul soon learned that David was at Keilah. “Good!” he exclaimed. “We’ve got him now! God has handed him over to me, for he has trapped himself in a walled town!” '
  '8':
  - type: text
    content: So Saul mobilized his entire army to march to Keilah and besiege David and his men.
  '9':
  - type: text
    content: 'But David learned of Saul’s plan and told Abiathar the priest to bring the ephod and ask the '
  - type: text
    content: Lord
  - type: text
    content: ' what he should do. '
