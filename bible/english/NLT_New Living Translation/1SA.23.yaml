document_id: 1SA.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Protects the Town of Keilah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day news came to David that the Philistines were at Keilah stealing grain from the threshing floors. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then David prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, I have heard that Saul is planning to come and destroy Keilah because I am here. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Will the leaders of Keilah betray me to him?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts lack the first sentence of 23:11.
      marker-yv: yv-n
    - type: text
      text: ' And will Saul actually come as I have heard? O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, please tell me.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “He will come.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Again David asked, “Will the leaders of Keilah betray me and my men to Saul?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “Yes, they will betray you.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Hides in the Wilderness
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So David and his men—about 600 of them now—left Keilah and began roaming the countryside. Word soon reached Saul that David had escaped, so he didn’t go to Keilah after all. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: David now stayed in the strongholds of the wilderness and in the hill country of Ziph. Saul hunted him day after day, but God didn’t let Saul find him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'One day near Horesh, David received the news that Saul was on the way to Ziph to search for him and kill him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jonathan went to find David and encouraged him to stay strong in his faith in God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Don’t be afraid,” Jonathan reassured him. “My father will never find you! You are going to be the king of Israel, and I will be next to you, as my father, Saul, is well aware.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So the two of them renewed their solemn pact before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then Jonathan returned home, while David stayed at Horesh.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But now the men of Ziph went to Saul in Gibeah and betrayed David to him. “We know where David is hiding,” they said. “He is in the strongholds of Horesh on the hill of Hakilah, which is in the southern part of Jeshimon. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'David asked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Should I go and attack them?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes, go and save Keilah,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Come down whenever you’re ready, O king, and we will catch him and hand him over to you!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you,” Saul said. “At last someone is concerned about me! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Go and check again to be sure of where he is staying and who has seen him there, for I know that he is very crafty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Discover his hiding places, and come back when you are sure. Then I’ll go with you. And if he is in the area at all, I’ll track him down, even if I have to search every hiding place in Judah!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So the men of Ziph returned home ahead of Saul.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, David and his men had moved into the wilderness of Maon in the Arabah Valley south of Jeshimon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When David heard that Saul and his men were searching for him, he went even farther into the wilderness to the great rock, and he remained there in the wilderness of Maon. But Saul kept after him in the wilderness.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Saul and David were now on opposite sides of a mountain. Just as Saul and his men began to close in on David and his men, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'an urgent message reached Saul that the Philistines were raiding Israel again. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So Saul quit chasing David and returned to fight the Philistines. Ever since that time, the place where David was camped has been called the Rock of Escape.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sela-hammahlekoth.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 23:29 is numbered 24:1 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: David then went to live in the strongholds of En-gedi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But David’s men said, “We’re afraid even here in Judah. We certainly don’t want to go to Keilah to fight the whole Philistine army!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So David asked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' again, and again the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “Go down to Keilah, for I will help you conquer the Philistines.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David and his men went to Keilah. They slaughtered the Philistines and took all their livestock and rescued the people of Keilah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Now when Abiathar son of Ahimelech fled to David at Keilah, he brought the ephod with him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Saul soon learned that David was at Keilah. “Good!” he exclaimed. “We’ve got him now! God has handed him over to me, for he has trapped himself in a walled town!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So Saul mobilized his entire army to march to Keilah and besiege David and his men.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But David learned of Saul’s plan and told Abiathar the priest to bring the ephod and ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' what he should do. '
