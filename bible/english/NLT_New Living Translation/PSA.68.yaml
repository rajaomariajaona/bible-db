document_id: PSA.68,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A song. A psalm of David.'
  - type: text
    content: Rise up, O God, and scatter your enemies.
  - type: text
    content: Let those who hate God run for their lives.
  '10':
  - type: text
    content: There your people finally settled,
  - type: text
    content: and with a bountiful harvest, O God,
  - type: text
    content: you provided for your needy people.
  '11':
  - type: text
    content: The Lord gives the word,
  - type: text
    content: and a great army
  - type: note
    content: Or a host of women.
  - type: text
    content: ' brings the good news.'
  '12':
  - type: text
    content: Enemy kings and their armies flee,
  - type: text
    content: while the women of Israel divide the plunder.
  '13':
  - type: text
    content: Even those who lived among the sheepfolds found treasures—
  - type: text
    content: doves with wings of silver
  - type: text
    content: and feathers of gold.
  '14':
  - type: text
    content: The Almighty scattered the enemy kings
  - type: text
    content: like a blowing snowstorm on Mount Zalmon.
  '15':
  - type: text
    content: The mountains of Bashan are majestic,
  - type: text
    content: with many peaks stretching high into the sky.
  '16':
  - type: text
    content: Why do you look with envy, O rugged mountains,
  - type: text
    content: at Mount Zion, where God has chosen to live,
  - type: text
    content: 'where the '
  - type: text
    content: 'Lord '
  - type: text
    content: himself will live forever?
  '17':
  - type: text
    content: Surrounded by unnumbered thousands of chariots,
  - type: text
    content: the Lord came from Mount Sinai into his sanctuary.
  '18':
  - type: text
    content: When you ascended to the heights,
  - type: text
    content: you led a crowd of captives.
  - type: text
    content: You received gifts from the people,
  - type: text
    content: even from those who rebelled against you.
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' God will live among us there.'
  '19':
  - type: text
    content: Praise the Lord; praise God our savior!
  - type: text
    content: 'For each day he carries us in his arms. '
  - type: text
    content: Interlude
  '2':
  - type: text
    content: Blow them away like smoke.
  - type: text
    content: Melt them like wax in a fire.
  - type: text
    content: Let the wicked perish in the presence of God.
  '20':
  - type: text
    content: Our God is a God who saves!
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' rescues us from death.'
  '21':
  - type: text
    content: But God will smash the heads of his enemies,
  - type: text
    content: crushing the skulls of those who love their guilty ways.
  '22':
  - type: text
    content: The Lord says, “I will bring my enemies down from Bashan;
  - type: text
    content: I will bring them up from the depths of the sea.
  '23':
  - type: text
    content: You, my people, will wash
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads shatter.
  - type: text
    content: ' your feet in their blood,'
  - type: text
    content: and even your dogs will get their share!”
  '24':
  - type: text
    content: Your procession has come into view, O God—
  - type: text
    content: the procession of my God and King as he goes into the sanctuary.
  '25':
  - type: text
    content: Singers are in front, musicians behind;
  - type: text
    content: between them are young women playing tambourines.
  '26':
  - type: text
    content: Praise God, all you people of Israel;
  - type: text
    content: 'praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the source of Israel’s life.'
  '27':
  - type: text
    content: Look, the little tribe of Benjamin leads the way.
  - type: text
    content: Then comes a great throng of rulers from Judah
  - type: text
    content: and all the rulers of Zebulun and Naphtali.
  '28':
  - type: text
    content: Summon your might, O God.
  - type: note
    content: As in some Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read Your God has commanded your strength.
  - type: text
    content: Display your power, O God, as you have in the past.
  '29':
  - type: text
    content: The kings of the earth are bringing tribute
  - type: text
    content: to your Temple in Jerusalem.
  '3':
  - type: text
    content: But let the godly rejoice.
  - type: text
    content: Let them be glad in God’s presence.
  - type: text
    content: Let them be filled with joy.
  '30':
  - type: text
    content: Rebuke these enemy nations—
  - type: text
    content: these wild animals lurking in the reeds,
  - type: text
    content: this herd of bulls among the weaker calves.
  - type: text
    content: Make them bring bars of silver in humble tribute.
  - type: text
    content: Scatter the nations that delight in war.
  '31':
  - type: text
    content: Let Egypt come with gifts of precious metals
  - type: note
    content: Or of rich cloth.
  - type: text
    content: ;
  - type: text
    content: let Ethiopia
  - type: note
    content: Hebrew Cush.
  - type: text
    content: ' bring tribute to God.'
  '32':
  - type: text
    content: Sing to God, you kingdoms of the earth.
  - type: text
    content: 'Sing praises to the Lord. '
  - type: text
    content: Interlude
  '33':
  - type: text
    content: Sing to the one who rides across the ancient heavens,
  - type: text
    content: his mighty voice thundering from the sky.
  '34':
  - type: text
    content: Tell everyone about God’s power.
  - type: text
    content: His majesty shines down on Israel;
  - type: text
    content: his strength is mighty in the heavens.
  '35':
  - type: text
    content: God is awesome in his sanctuary.
  - type: text
    content: The God of Israel gives power and strength to his people.
  - type: text
    content: Praise be to God!
  '4':
  - type: text
    content: Sing praises to God and to his name!
  - type: text
    content: Sing loud praises to him who rides the clouds.
  - type: note
    content: Or rides through the deserts.
  - type: text
    content: 'His name is the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: rejoice in his presence!
  '5':
  - type: text
    content: Father to the fatherless, defender of widows—
  - type: text
    content: this is God, whose dwelling is holy.
  '6':
  - type: text
    content: God places the lonely in families;
  - type: text
    content: he sets the prisoners free and gives them joy.
  - type: text
    content: But he makes the rebellious live in a sun-scorched land.
  '7':
  - type: text
    content: O God, when you led your people out from Egypt,
  - type: text
    content: 'when you marched through the dry wasteland, '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: the earth trembled, and the heavens poured down rain
  - type: text
    content: before you, the God of Sinai,
  - type: text
    content: before God, the God of Israel.
  '9':
  - type: text
    content: You sent abundant rain, O God,
  - type: text
    content: to refresh the weary land.
