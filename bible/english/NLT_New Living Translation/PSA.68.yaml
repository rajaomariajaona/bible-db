document_id: PSA.68,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A song. A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Rise up, O God, and scatter your enemies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let those who hate God run for their lives.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: There your people finally settled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with a bountiful harvest, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you provided for your needy people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The Lord gives the word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a great army
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a host of women.
      marker-yv: yv-n
    - type: text
      text: ' brings the good news.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Enemy kings and their armies flee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the women of Israel divide the plunder.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Even those who lived among the sheepfolds found treasures—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doves with wings of silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and feathers of gold.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The Almighty scattered the enemy kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a blowing snowstorm on Mount Zalmon.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The mountains of Bashan are majestic,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with many peaks stretching high into the sky.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Why do you look with envy, O rugged mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at Mount Zion, where God has chosen to live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: himself will live forever?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Surrounded by unnumbered thousands of chariots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord came from Mount Sinai into his sanctuary.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When you ascended to the heights,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you led a crowd of captives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You received gifts from the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even from those who rebelled against you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God will live among us there.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Praise the Lord; praise God our savior!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For each day he carries us in his arms. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Blow them away like smoke.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Melt them like wax in a fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the wicked perish in the presence of God.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Our God is a God who saves!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescues us from death.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But God will smash the heads of his enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crushing the skulls of those who love their guilty ways.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The Lord says, “I will bring my enemies down from Bashan;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring them up from the depths of the sea.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: You, my people, will wash
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shatter.
      marker-yv: yv-n
    - type: text
      text: ' your feet in their blood,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even your dogs will get their share!”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Your procession has come into view, O God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the procession of my God and King as he goes into the sanctuary.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Singers are in front, musicians behind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: between them are young women playing tambourines.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Praise God, all you people of Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the source of Israel’s life.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Look, the little tribe of Benjamin leads the way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then comes a great throng of rulers from Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the rulers of Zebulun and Naphtali.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Summon your might, O God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Your God has commanded your strength.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Display your power, O God, as you have in the past.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The kings of the earth are bringing tribute
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your Temple in Jerusalem.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But let the godly rejoice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be glad in God’s presence.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be filled with joy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Rebuke these enemy nations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these wild animals lurking in the reeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this herd of bulls among the weaker calves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them bring bars of silver in humble tribute.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scatter the nations that delight in war.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Let Egypt come with gifts of precious metals
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:31a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of rich cloth.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Ethiopia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:31b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cush.
      marker-yv: yv-n
    - type: text
      text: ' bring tribute to God.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Sing to God, you kingdoms of the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Sing praises to the Lord. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Sing to the one who rides across the ancient heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his mighty voice thundering from the sky.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Tell everyone about God’s power.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His majesty shines down on Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his strength is mighty in the heavens.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: God is awesome in his sanctuary.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God of Israel gives power and strength to his people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise be to God!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sing praises to God and to his name!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing loud praises to him who rides the clouds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rides through the deserts.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rejoice in his presence!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Father to the fatherless, defender of widows—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this is God, whose dwelling is holy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: God places the lonely in families;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sets the prisoners free and gives them joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he makes the rebellious live in a sun-scorched land.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: O God, when you led your people out from Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'when you marched through the dry wasteland, '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: the earth trembled, and the heavens poured down rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before you, the God of Sinai,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before God, the God of Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You sent abundant rain, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to refresh the weary land.
