document_id: HEB.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promised Rest for God’s People
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'God’s promise of entering his rest still stands, so we ought to tremble with fear that some of you might fail to experience it. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For all who have entered into God’s rest have rested from their labors, just as God did after creating the world. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So let us do our best to enter that rest. But if we disobey God, as the people of Israel did, we will fall.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the word of God is alive and powerful. It is sharper than the sharpest two-edged sword, cutting between soul and spirit, between joint and marrow. It exposes our innermost thoughts and desires. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nothing in all creation is hidden from God. Everything is naked and exposed before his eyes, and he is the one to whom we are accountable.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is Our High Priest
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So then, since we have a great High Priest who has entered heaven, Jesus the Son of God, let us hold firmly to what we believe. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This High Priest of ours understands our weaknesses, for he faced all of the same testings we do, yet he did not sin. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So let us come boldly to the throne of our gracious God. There we will receive his mercy, and we will find grace to help us when we need it most.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For this good news—that God has prepared this rest—has been announced to us just as it was to them. But it did them no good because they didn’t share the faith of those who listened to God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they didn’t combine what they heard with faith.
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For only we who believe can enter his rest. As for the others, God said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In my anger I took an oath:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They will never enter my place of rest,’”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95:11.
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'even though this rest has been ready since he made the world. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We know it is ready because of the place in the Scriptures where it mentions the seventh day: “On the seventh day God rested from all his work.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 2:2.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But in the other passage God said, “They will never enter my place of rest.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95:11.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God’s rest is there for people to enter, but those who first heard this good news failed to enter because they disobeyed God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God set another time for entering his rest, and that time is today. God announced this through David much later in the words already quoted:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Today when you hear his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t harden your hearts.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95:7-8.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now if Joshua had succeeded in giving them this rest, God would not have spoken about another day of rest still to come. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So there is a special rest
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a Sabbath rest.
      marker-yv: yv-n
    - type: text
      text: ' still waiting for the people of God. '
