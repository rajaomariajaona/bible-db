document_id: HEB.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promised Rest for God’s People
  - type: text
    content: 'God’s promise of entering his rest still stands, so we ought to tremble with fear that some of you might fail to experience it. '
  '10':
  - type: text
    content: 'For all who have entered into God’s rest have rested from their labors, just as God did after creating the world. '
  '11':
  - type: text
    content: So let us do our best to enter that rest. But if we disobey God, as the people of Israel did, we will fall.
  '12':
  - type: text
    content: 'For the word of God is alive and powerful. It is sharper than the sharpest two-edged sword, cutting between soul and spirit, between joint and marrow. It exposes our innermost thoughts and desires. '
  '13':
  - type: text
    content: Nothing in all creation is hidden from God. Everything is naked and exposed before his eyes, and he is the one to whom we are accountable.
  - type: heading
    content: Christ Is Our High Priest
  '14':
  - type: text
    content: 'So then, since we have a great High Priest who has entered heaven, Jesus the Son of God, let us hold firmly to what we believe. '
  '15':
  - type: text
    content: 'This High Priest of ours understands our weaknesses, for he faced all of the same testings we do, yet he did not sin. '
  '16':
  - type: text
    content: So let us come boldly to the throne of our gracious God. There we will receive his mercy, and we will find grace to help us when we need it most.
  '2':
  - type: text
    content: For this good news—that God has prepared this rest—has been announced to us just as it was to them. But it did them no good because they didn’t share the faith of those who listened to God.
  - type: note
    content: Some manuscripts read they didn’t combine what they heard with faith.
  - type: text
    content: ' '
  '3':
  - type: text
    content: For only we who believe can enter his rest. As for the others, God said,
  - type: text
    content: '“In my anger I took an oath:'
  - type: text
    content: ‘They will never enter my place of rest,’”
  - type: note
    content: Ps 95:11.
  - type: text
    content: 'even though this rest has been ready since he made the world. '
  '4':
  - type: text
    content: 'We know it is ready because of the place in the Scriptures where it mentions the seventh day: “On the seventh day God rested from all his work.”'
  - type: note
    content: Gen 2:2.
  - type: text
    content: ' '
  '5':
  - type: text
    content: But in the other passage God said, “They will never enter my place of rest.”
  - type: note
    content: Ps 95:11.
  '6':
  - type: text
    content: 'So God’s rest is there for people to enter, but those who first heard this good news failed to enter because they disobeyed God. '
  '7':
  - type: text
    content: 'So God set another time for entering his rest, and that time is today. God announced this through David much later in the words already quoted:'
  - type: text
    content: “Today when you hear his voice,
  - type: text
    content: don’t harden your hearts.”
  - type: note
    content: Ps 95:7-8.
  '8':
  - type: text
    content: 'Now if Joshua had succeeded in giving them this rest, God would not have spoken about another day of rest still to come. '
  '9':
  - type: text
    content: So there is a special rest
  - type: note
    content: Or a Sabbath rest.
  - type: text
    content: ' still waiting for the people of God. '
