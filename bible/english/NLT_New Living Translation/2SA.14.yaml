document_id: 2SA.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joab Arranges for Absalom’s Return
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joab realized how much the king longed to see Absalom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If anyone objects,” the king said, “bring him to me. I can assure you he will never harm you again!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she said, “Please swear to me by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God that you won’t let anyone take vengeance against my son. I want no more bloodshed.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives,” he replied, “not a hair on your son’s head will be disturbed!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Please allow me to ask one more thing of my lord the king,” she said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go ahead and speak,” he responded.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She replied, “Why don’t you do as much for the people of God as you have promised to do for me? You have convicted yourself in making this decision, because you have refused to bring home your own banished son. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All of us must die eventually. Our lives are like water spilled out on the ground, which cannot be gathered up again. But God does not just sweep life away; instead, he devises ways to bring us back when we have been separated from him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have come to plead with my lord the king because people have threatened me. I said to myself, ‘Perhaps the king will listen to me '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and rescue us from those who would cut us off from the inheritance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the property; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the people.
      marker-yv: yv-n
    - type: text
      text: ' God has given us. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, my lord the king will give us peace of mind again.’ I know that you are like an angel of God in discerning good from evil. May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God be with you.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I must know one thing,” the king replied, “and tell me the truth.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, my lord the king,” she responded.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Did Joab put you up to this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the woman replied, “My lord the king, how can I deny it? Nobody can hide anything from you. Yes, Joab sent me and told me what to say. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So he sent for a woman from Tekoa who had a reputation for great wisdom. He said to her, “Pretend you are in mourning; wear mourning clothes and don’t put on lotions.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: don’t anoint yourself with oil.
      marker-yv: yv-n
    - type: text
      text: ' Act like a woman who has been mourning for the dead for a long time. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did it to place the matter before you in a different light. But you are as wise as an angel of God, and you understand everything that happens among us!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king sent for Joab and told him, “All right, go and bring back the young man Absalom.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joab bowed with his face to the ground in deep respect and said, “At last I know that I have gained your approval, my lord the king, for you have granted me this request!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab went to Geshur and brought Absalom back to Jerusalem. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king gave this order: “Absalom may go to his own house, but he must never come into my presence.” So Absalom did not see the king.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Absalom Reconciled to David
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now Absalom was praised as the most handsome man in all Israel. He was flawless from head to foot. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He cut his hair only once a year, and then only because it was so heavy. When he weighed it out, it came to five pounds!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '200 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by the royal standard.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He had three sons and one daughter. His daughter’s name was Tamar, and she was very beautiful.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom lived in Jerusalem for two years, but he never got to see the king. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Absalom sent for Joab to ask him to intercede for him, but Joab refused to come. Absalom sent for him a second time, but again Joab refused to come. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then go to the king and tell him the story I am about to tell you.” Then Joab told her what to say.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Absalom said to his servants, “Go and set fire to Joab’s barley field, the field next to mine.” So they set his field on fire, as Absalom had commanded.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joab came to Absalom at his house and demanded, “Why did your servants set my field on fire?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Absalom replied, “Because I wanted you to ask the king why he brought me back from Geshur if he didn’t intend to see me. I might as well have stayed there. Let me see the king; if he finds me guilty of anything, then let him kill me.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joab told the king what Absalom had said. Then at last David summoned Absalom, who came and bowed low before the king, and the king kissed him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the woman from Tekoa approached
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts and Greek and Syriac versions; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spoke to.
      marker-yv: yv-n
    - type: text
      text: ' the king, she bowed with her face to the ground in deep respect and cried out, “O king! Help me!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What’s the trouble?” the king asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Alas, I am a widow!” she replied. “My husband is dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My two sons had a fight out in the field. And since no one was there to stop it, one of them was killed. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the family is demanding, ‘Let us have your son. We will execute him for murdering his brother. He doesn’t deserve to inherit his family’s property.’ They want to extinguish the only coal I have left, and my husband’s name and family will disappear from the face of the earth.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Leave it to me,” the king told her. “Go home, and I’ll see to it that no one touches him.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Oh, thank you, my lord the king,” the woman from Tekoa replied. “If you are criticized for helping me, let the blame fall on me and on my father’s house, and let the king and his throne be innocent.”
