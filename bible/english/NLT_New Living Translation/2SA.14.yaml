document_id: 2SA.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Joab Arranges for Absalom’s Return
  - type: text
    content: 'Joab realized how much the king longed to see Absalom. '
  '10':
  - type: text
    content: “If anyone objects,” the king said, “bring him to me. I can assure you he will never harm you again!”
  '11':
  - type: text
    content: 'Then she said, “Please swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that you won’t let anyone take vengeance against my son. I want no more bloodshed.”'
  - type: text
    content: '“As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,” he replied, “not a hair on your son’s head will be disturbed!”'
  '12':
  - type: text
    content: “Please allow me to ask one more thing of my lord the king,” she said.
  - type: text
    content: “Go ahead and speak,” he responded.
  '13':
  - type: text
    content: 'She replied, “Why don’t you do as much for the people of God as you have promised to do for me? You have convicted yourself in making this decision, because you have refused to bring home your own banished son. '
  '14':
  - type: text
    content: All of us must die eventually. Our lives are like water spilled out on the ground, which cannot be gathered up again. But God does not just sweep life away; instead, he devises ways to bring us back when we have been separated from him.
  '15':
  - type: text
    content: '“I have come to plead with my lord the king because people have threatened me. I said to myself, ‘Perhaps the king will listen to me '
  '16':
  - type: text
    content: and rescue us from those who would cut us off from the inheritance
  - type: note
    content: Or the property; or the people.
  - type: text
    content: ' God has given us. '
  '17':
  - type: text
    content: 'Yes, my lord the king will give us peace of mind again.’ I know that you are like an angel of God in discerning good from evil. May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God be with you.”'
  '18':
  - type: text
    content: “I must know one thing,” the king replied, “and tell me the truth.”
  - type: text
    content: “Yes, my lord the king,” she responded.
  '19':
  - type: text
    content: “Did Joab put you up to this?”
  - type: text
    content: 'And the woman replied, “My lord the king, how can I deny it? Nobody can hide anything from you. Yes, Joab sent me and told me what to say. '
  '2':
  - type: text
    content: So he sent for a woman from Tekoa who had a reputation for great wisdom. He said to her, “Pretend you are in mourning; wear mourning clothes and don’t put on lotions.
  - type: note
    content: Hebrew don’t anoint yourself with oil.
  - type: text
    content: ' Act like a woman who has been mourning for the dead for a long time. '
  '20':
  - type: text
    content: He did it to place the matter before you in a different light. But you are as wise as an angel of God, and you understand everything that happens among us!”
  '21':
  - type: text
    content: So the king sent for Joab and told him, “All right, go and bring back the young man Absalom.”
  '22':
  - type: text
    content: Joab bowed with his face to the ground in deep respect and said, “At last I know that I have gained your approval, my lord the king, for you have granted me this request!”
  '23':
  - type: text
    content: 'Then Joab went to Geshur and brought Absalom back to Jerusalem. '
  '24':
  - type: text
    content: 'But the king gave this order: “Absalom may go to his own house, but he must never come into my presence.” So Absalom did not see the king.'
  - type: heading
    content: Absalom Reconciled to David
  '25':
  - type: text
    content: 'Now Absalom was praised as the most handsome man in all Israel. He was flawless from head to foot. '
  '26':
  - type: text
    content: He cut his hair only once a year, and then only because it was so heavy. When he weighed it out, it came to five pounds!
  - type: note
    content: Hebrew 200 shekels [2.3 kilograms] by the royal standard.
  - type: text
    content: ' '
  '27':
  - type: text
    content: He had three sons and one daughter. His daughter’s name was Tamar, and she was very beautiful.
  '28':
  - type: text
    content: 'Absalom lived in Jerusalem for two years, but he never got to see the king. '
  '29':
  - type: text
    content: 'Then Absalom sent for Joab to ask him to intercede for him, but Joab refused to come. Absalom sent for him a second time, but again Joab refused to come. '
  '3':
  - type: text
    content: Then go to the king and tell him the story I am about to tell you.” Then Joab told her what to say.
  '30':
  - type: text
    content: So Absalom said to his servants, “Go and set fire to Joab’s barley field, the field next to mine.” So they set his field on fire, as Absalom had commanded.
  '31':
  - type: text
    content: Then Joab came to Absalom at his house and demanded, “Why did your servants set my field on fire?”
  '32':
  - type: text
    content: And Absalom replied, “Because I wanted you to ask the king why he brought me back from Geshur if he didn’t intend to see me. I might as well have stayed there. Let me see the king; if he finds me guilty of anything, then let him kill me.”
  '33':
  - type: text
    content: So Joab told the king what Absalom had said. Then at last David summoned Absalom, who came and bowed low before the king, and the king kissed him.
  '4':
  - type: text
    content: When the woman from Tekoa approached
  - type: note
    content: As in many Hebrew manuscripts and Greek and Syriac versions; Masoretic Text reads spoke to.
  - type: text
    content: ' the king, she bowed with her face to the ground in deep respect and cried out, “O king! Help me!”'
  '5':
  - type: text
    content: “What’s the trouble?” the king asked.
  - type: text
    content: '“Alas, I am a widow!” she replied. “My husband is dead. '
  '6':
  - type: text
    content: 'My two sons had a fight out in the field. And since no one was there to stop it, one of them was killed. '
  '7':
  - type: text
    content: Now the rest of the family is demanding, ‘Let us have your son. We will execute him for murdering his brother. He doesn’t deserve to inherit his family’s property.’ They want to extinguish the only coal I have left, and my husband’s name and family will disappear from the face of the earth.”
  '8':
  - type: text
    content: “Leave it to me,” the king told her. “Go home, and I’ll see to it that no one touches him.”
  '9':
  - type: text
    content: “Oh, thank you, my lord the king,” the woman from Tekoa replied. “If you are criticized for helping me, let the blame fall on me and on my father’s house, and let the king and his throne be innocent.”
