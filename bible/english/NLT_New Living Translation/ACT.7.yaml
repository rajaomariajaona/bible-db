document_id: ACT.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stephen Addresses the Council
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the high priest asked Stephen, “Are these accusations true?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and rescued him from all his troubles. And God gave him favor before Pharaoh, king of Egypt. God also gave Joseph unusual wisdom, so that Pharaoh appointed him governor over all of Egypt and put him in charge of the palace.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“But a famine came upon Egypt and Canaan. There was great misery, and our ancestors ran out of food. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jacob heard that there was still grain in Egypt, so he sent his sons—our ancestors—to buy some. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The second time they went, Joseph revealed his identity to his brothers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joseph was recognized by his brothers.
      marker-yv: yv-n
    - type: text
      text: ' and they were introduced to Pharaoh. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Joseph sent for his father, Jacob, and all his relatives to come to Egypt, seventy-five persons in all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So Jacob went to Egypt. He died there, as did our ancestors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Their bodies were taken to Shechem and buried in the tomb Abraham had bought for a certain price from Hamor’s sons in Shechem.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“As the time drew near when God would fulfill his promise to Abraham, the number of our people in Egypt greatly increased. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But then a new king came to the throne of Egypt who knew nothing about Joseph. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: This king exploited our people and oppressed them, forcing parents to abandon their newborn babies so they would die.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'This was Stephen’s reply: “Brothers and fathers, listen to me. Our glorious God appeared to our ancestor Abraham in Mesopotamia before he settled in Haran.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mesopotamia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'was the region now called Iraq. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Haran '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a city in what is now called Syria.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“At that time Moses was born—a beautiful child in God’s eyes. His parents cared for him at home for three months. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When they had to abandon him, Pharaoh’s daughter adopted him and raised him as her own son. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moses was taught all the wisdom of the Egyptians, and he was powerful in both speech and action.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“One day when Moses was forty years old, he decided to visit his relatives, the people of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He saw an Egyptian mistreating an Israelite. So Moses came to the man’s defense and avenged him, killing the Egyptian. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Moses assumed his fellow Israelites would realize that God had sent him to rescue them, but they didn’t.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “The next day he visited them again and saw two men of Israel fighting. He tried to be a peacemaker. ‘Men,’ he said, ‘you are brothers. Why are you fighting each other?’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“But the man in the wrong pushed Moses aside. ‘Who made you a ruler and judge over us?’ he asked. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '‘Are you going to kill me as you killed that Egyptian yesterday?’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When Moses heard that, he fled the country and lived as a foreigner in the land of Midian. There his two sons were born.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: God told him, ‘Leave your native land and your relatives, and come into the land that I will show you.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 12:1.
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“Forty years later, in the desert near Mount Sinai, an angel appeared to Moses in the flame of a burning bush. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'When Moses saw it, he was amazed at the sight. As he went to take a closer look, the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called out to him, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ‘I am the God of your ancestors—the God of Abraham, Isaac, and Jacob.’ Moses shook with terror and did not dare to look.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, ‘Take off your sandals, for you are standing on holy ground. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: I have certainly seen the oppression of my people in Egypt. I have heard their groans and have come down to rescue them. Now go, for I am sending you back to Egypt.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31-34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 3:5-10.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '“So God sent back the same man his people had previously rejected when they demanded, ‘Who made you a ruler and judge over us?’ Through the angel who appeared to him in the burning bush, God sent Moses to be their ruler and savior. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: And by means of many wonders and miraculous signs, he led them out of Egypt, through the Red Sea, and through the wilderness for forty years.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: “Moses himself told the people of Israel, ‘God will raise up for you a Prophet like me from among your own people.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 18:15.
      marker-yv: yv-n
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Moses was with our ancestors, the assembly of God’s people in the wilderness, when the angel spoke to him at Mount Sinai. And there Moses received life-giving words to pass on to us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to you.
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '“But our ancestors refused to listen to Moses. They rejected him and wanted to return to Egypt. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Abraham left the land of the Chaldeans and lived in Haran until his father died. Then God brought him here to the land where you now live.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'They told Aaron, ‘Make us some gods who can lead us, for we don’t know what has become of this Moses, who brought us out of Egypt.’ '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'So they made an idol shaped like a calf, and they sacrificed to it and celebrated over this thing they had made. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Then God turned away from them and abandoned them to serve the stars of heaven as their gods! In the book of the prophets it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Was it to me you were bringing sacrifices and offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: during those forty years in the wilderness, Israel?
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: No, you carried your pagan gods—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the shrine of Molech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the star of your god Rephan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the images you made to worship them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send you into exile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as far away as Babylon.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:42-43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos 5:25-27 (Greek version).
      marker-yv: yv-n
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: “Our ancestors carried the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the tent of witness.
      marker-yv: yv-n
    - type: text
      text: ' with them through the wilderness. It was constructed according to the plan God had shown to Moses. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Years later, when Joshua led our ancestors in battle against the nations that God drove out of this land, the Tabernacle was taken with them into their new territory. And it stayed there until the time of King David.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: “David found favor with God and asked for the privilege of building a permanent Temple for the God of Jacob.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the house of Jacob.
      marker-yv: yv-n
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'But it was Solomon who actually built it. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: However, the Most High doesn’t live in temples made by human hands. As the prophet says,
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ‘Heaven is my throne,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth is my footstool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Could you build me a temple as good as that?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Could you build me such a resting place?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“But God gave him no inheritance here, not even one square foot of land. God did promise, however, that eventually the whole land would belong to Abraham and his descendants—even though he had no children yet. '
  '50':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Didn’t my hands make both heaven and earth?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:49-50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 66:1-2.
      marker-yv: yv-n
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: “You stubborn people! You are heathen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: uncircumcised.
      marker-yv: yv-n
    - type: text
      text: ' at heart and deaf to the truth. Must you forever resist the Holy Spirit? That’s what your ancestors did, and so do you! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Name one prophet your ancestors didn’t persecute! They even killed the ones who predicted the coming of the Righteous One—the Messiah whom you betrayed and murdered. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: You deliberately disobeyed God’s law, even though you received it from the hands of angels.”
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: The Jewish leaders were infuriated by Stephen’s accusation, and they shook their fists at him in rage.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they were grinding their teeth against him.
      marker-yv: yv-n
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'But Stephen, full of the Holy Spirit, gazed steadily into heaven and saw the glory of God, and he saw Jesus standing in the place of honor at God’s right hand. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: And he told them, “Look, I see the heavens opened and the Son of Man standing in the place of honor at God’s right hand!”
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Then they put their hands over their ears and began shouting. They rushed at him '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: and dragged him out of the city and began to stone him. His accusers took off their coats and laid them at the feet of a young man named Saul.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:58 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Saul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is later called Paul; see 13:9.
      marker-yv: yv-n
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'As they stoned him, Stephen prayed, “Lord Jesus, receive my spirit.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'God also told him that his descendants would live in a foreign land, where they would be oppressed as slaves for 400 years. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
