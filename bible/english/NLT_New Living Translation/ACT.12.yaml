document_id: ACT.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: James Is Killed and Peter Is Imprisoned
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: About that time King Herod Agrippa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Herod the king. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: He was the nephew of Herod Antipas and a grandson of Herod the Great.
      marker-yv: yv-n
    - type: text
      text: ' began to persecute some believers in the church. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They passed the first and second guard posts and came to the iron gate leading to the city, and this opened for them all by itself. So they passed through and started walking down the street, and then the angel suddenly left him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Peter finally came to his senses. “It’s really true!” he said. “The Lord has sent his angel and saved me from Herod and from what the Jewish leaders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Jewish people.
      marker-yv: yv-n
    - type: text
      text: ' had planned to do to me!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When he realized this, he went to the home of Mary, the mother of John Mark, where many were gathered for prayer. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He knocked at the door in the gate, and a servant girl named Rhoda came to open it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: When she recognized Peter’s voice, she was so overjoyed that, instead of opening the door, she ran back inside and told everyone, “Peter is standing at the door!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “You’re out of your mind!” they said. When she insisted, they decided, “It must be his angel.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Meanwhile, Peter continued knocking. When they finally opened the door and saw him, they were amazed. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He motioned for them to quiet down and told them how the Lord had led him out of prison. “Tell James and the other brothers what happened,” he said. And then he went to another place.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'At dawn there was a great commotion among the soldiers about what had happened to Peter. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Herod Agrippa ordered a thorough search for him. When he couldn’t be found, Herod interrogated the guards and sentenced them to death. Afterward Herod left Judea to stay in Caesarea for a while.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Herod Agrippa
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He had the apostle James (John’s brother) killed with a sword. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now Herod was very angry with the people of Tyre and Sidon. So they sent a delegation to make peace with him because their cities were dependent upon Herod’s country for food. The delegates won the support of Blastus, Herod’s personal assistant, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and an appointment with Herod was granted. When the day arrived, Herod put on his royal robes, sat on his throne, and made a speech to them. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The people gave him a great ovation, shouting, “It’s the voice of a god, not of a man!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Instantly, an angel of the Lord struck Herod with a sickness, because he accepted the people’s worship instead of giving the glory to God. So he was consumed with worms and died.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Meanwhile, the word of God continued to spread, and there were many new believers.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When Barnabas and Saul had finished their mission to Jerusalem, they returned,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mission, they returned to Jerusalem. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mission, they returned from Jerusalem; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mission, they returned from Jerusalem to Antioch.
      marker-yv: yv-n
    - type: text
      text: ' taking John Mark with them.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When Herod saw how much this pleased the Jewish people, he also arrested Peter. (This took place during the Passover celebration.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the days of unleavened bread.
      marker-yv: yv-n
    - type: text
      text: ') '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then he imprisoned him, placing him under the guard of four squads of four soldiers each. Herod intended to bring Peter out for public trial after the Passover. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But while Peter was in prison, the church prayed very earnestly for him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Miraculous Escape from Prison
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The night before Peter was to be placed on trial, he was asleep, fastened with two chains between two soldiers. Others stood guard at the prison gate. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Suddenly, there was a bright light in the cell, and an angel of the Lord stood before Peter. The angel struck him on the side to awaken him and said, “Quick! Get up!” And the chains fell off his wrists. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then the angel told him, “Get dressed and put on your sandals.” And he did. “Now put on your coat and follow me,” the angel ordered.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Peter left the cell, following the angel. But all the time he thought it was a vision. He didn’t realize it was actually happening. '
