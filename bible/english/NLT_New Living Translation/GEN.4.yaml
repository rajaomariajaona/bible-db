    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now Adam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the man; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:25.
      marker-yv: yv-n
    - type: text
      text: ' had sexual relations with his wife, Eve, and she became pregnant. When she gave birth to Cain, she said, “With the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s help, I have produced
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I have acquired. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that can mean “produce” or “acquire.”
      marker-yv: yv-n
    - type: text
      text: ' a man!” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “What have you done? Listen! Your brother’s blood cries out to me from the ground! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now you are cursed and banished from the ground, which has swallowed your brother’s blood. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No longer will the ground yield good crops for you, no matter how hard you work! From now on you will be a homeless wanderer on the earth.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cain replied to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “My punishment'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: My sin.
      marker-yv: yv-n
    - type: text
      text: ' is too great for me to bear! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have banished me from the land and from your presence; you have made me a homeless wanderer. Anyone who finds me will kill me!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “No, for I will give a sevenfold punishment to anyone who kills you.” Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' put a mark on Cain to warn anyone who might try to kill him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Cain left the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence and settled in the land of Nod,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “wandering.”
      marker-yv: yv-n
    - type: text
      text: ' east of Eden.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Descendants of Cain
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Cain had sexual relations with his wife, and she became pregnant and gave birth to Enoch. Then Cain founded a city, which he named Enoch, after his son. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Enoch had a son named Irad. Irad became the father of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the ancestor of, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and so throughout the verse.
      marker-yv: yv-n
    - type: text
      text: ' Mehujael. Mehujael became the father of Methushael. Methushael became the father of Lamech.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lamech married two women. The first was named Adah, and the second was Zillah. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Later she gave birth to his brother and named him Abel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they grew up, Abel became a shepherd, while Cain cultivated the ground. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adah gave birth to Jabal, who was the first of those who raise livestock and live in tents. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His brother’s name was Jubal, the first of all who play the harp and flute. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lamech’s other wife, Zillah, gave birth to a son named Tubal-cain. He became an expert in forging tools of bronze and iron. Tubal-cain had a sister named Naamah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day Lamech said to his wives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Adah and Zillah, hear my voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to me, you wives of Lamech.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have killed a man who attacked me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a young man who wounded me.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If someone who kills Cain is punished seven times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then the one who kills me will be punished seventy-seven times!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Seth
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Adam had sexual relations with his wife again, and she gave birth to another son. She named him Seth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Seth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably means “granted”; the name may also mean “appointed.”
      marker-yv: yv-n
    - type: text
      text: ' for she said, “God has granted me another son in place of Abel, whom Cain killed.” '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Seth grew up, he had a son and named him Enosh. At that time people first began to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by name.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was time for the harvest, Cain presented some of his crops as a gift to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abel also brought a gift—the best portions of the firstborn lambs from his flock. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' accepted Abel and his gift, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but he did not accept Cain and his gift. This made Cain very angry, and he looked dejected.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Why are you so angry?” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked Cain. “Why do you look so dejected? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will be accepted if you do what is right. But if you refuse to do what is right, then watch out! Sin is crouching at the door, eager to control you. But you must subdue it and be its master.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day Cain suggested to his brother, “Let’s go out into the fields.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Samaritan Pentateuch, Greek and Syriac versions, and Latin Vulgate; Masoretic Text lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Let’s go out into the fields.”
      marker-yv: yv-n
    - type: text
      text: ' And while they were in the field, Cain attacked his brother, Abel, and killed him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked Cain, “Where is your brother? Where is Abel?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I don’t know,” Cain responded. “Am I my brother’s guardian?”
