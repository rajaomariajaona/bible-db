document_id: GEN.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cain and Abel
  - type: text
    content: Now Adam
  - type: note
    content: Or the man; also in 4:25.
  - type: text
    content: ' had sexual relations with his wife, Eve, and she became pregnant. When she gave birth to Cain, she said, “With the '
  - type: text
    content: Lord
  - type: text
    content: ’s help, I have produced
  - type: note
    content: Or I have acquired. Cain sounds like a Hebrew term that can mean “produce” or “acquire.”
  - type: text
    content: ' a man!” '
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “What have you done? Listen! Your brother’s blood cries out to me from the ground! '
  '11':
  - type: text
    content: 'Now you are cursed and banished from the ground, which has swallowed your brother’s blood. '
  '12':
  - type: text
    content: No longer will the ground yield good crops for you, no matter how hard you work! From now on you will be a homeless wanderer on the earth.”
  '13':
  - type: text
    content: 'Cain replied to the '
  - type: text
    content: Lord
  - type: text
    content: ', “My punishment'
  - type: note
    content: Or My sin.
  - type: text
    content: ' is too great for me to bear! '
  '14':
  - type: text
    content: You have banished me from the land and from your presence; you have made me a homeless wanderer. Anyone who finds me will kill me!”
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “No, for I will give a sevenfold punishment to anyone who kills you.” Then the '
  - type: text
    content: Lord
  - type: text
    content: ' put a mark on Cain to warn anyone who might try to kill him. '
  '16':
  - type: text
    content: 'So Cain left the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence and settled in the land of Nod,
  - type: note
    content: Nod means “wandering.”
  - type: text
    content: ' east of Eden.'
  - type: heading
    content: The Descendants of Cain
  '17':
  - type: text
    content: 'Cain had sexual relations with his wife, and she became pregnant and gave birth to Enoch. Then Cain founded a city, which he named Enoch, after his son. '
  '18':
  - type: text
    content: Enoch had a son named Irad. Irad became the father of
  - type: note
    content: Or the ancestor of, and so throughout the verse.
  - type: text
    content: ' Mehujael. Mehujael became the father of Methushael. Methushael became the father of Lamech.'
  '19':
  - type: text
    content: 'Lamech married two women. The first was named Adah, and the second was Zillah. '
  '2':
  - type: text
    content: Later she gave birth to his brother and named him Abel.
  - type: text
    content: 'When they grew up, Abel became a shepherd, while Cain cultivated the ground. '
  '20':
  - type: text
    content: 'Adah gave birth to Jabal, who was the first of those who raise livestock and live in tents. '
  '21':
  - type: text
    content: 'His brother’s name was Jubal, the first of all who play the harp and flute. '
  '22':
  - type: text
    content: 'Lamech’s other wife, Zillah, gave birth to a son named Tubal-cain. He became an expert in forging tools of bronze and iron. Tubal-cain had a sister named Naamah. '
  '23':
  - type: text
    content: One day Lamech said to his wives,
  - type: text
    content: “Adah and Zillah, hear my voice;
  - type: text
    content: listen to me, you wives of Lamech.
  - type: text
    content: I have killed a man who attacked me,
  - type: text
    content: a young man who wounded me.
  '24':
  - type: text
    content: If someone who kills Cain is punished seven times,
  - type: text
    content: then the one who kills me will be punished seventy-seven times!”
  - type: heading
    content: The Birth of Seth
  '25':
  - type: text
    content: Adam had sexual relations with his wife again, and she gave birth to another son. She named him Seth,
  - type: note
    content: Seth probably means “granted”; the name may also mean “appointed.”
  - type: text
    content: ' for she said, “God has granted me another son in place of Abel, whom Cain killed.” '
  '26':
  - type: text
    content: 'When Seth grew up, he had a son and named him Enosh. At that time people first began to worship the '
  - type: text
    content: Lord
  - type: text
    content: ' by name.'
  '3':
  - type: text
    content: 'When it was time for the harvest, Cain presented some of his crops as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Abel also brought a gift—the best portions of the firstborn lambs from his flock. The '
  - type: text
    content: Lord
  - type: text
    content: ' accepted Abel and his gift, '
  '5':
  - type: text
    content: but he did not accept Cain and his gift. This made Cain very angry, and he looked dejected.
  '6':
  - type: text
    content: '“Why are you so angry?” the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Cain. “Why do you look so dejected? '
  '7':
  - type: text
    content: You will be accepted if you do what is right. But if you refuse to do what is right, then watch out! Sin is crouching at the door, eager to control you. But you must subdue it and be its master.”
  '8':
  - type: text
    content: One day Cain suggested to his brother, “Let’s go out into the fields.”
  - type: note
    content: As in Samaritan Pentateuch, Greek and Syriac versions, and Latin Vulgate; Masoretic Text lacks “Let’s go out into the fields.”
  - type: text
    content: ' And while they were in the field, Cain attacked his brother, Abel, and killed him.'
  '9':
  - type: text
    content: 'Afterward the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Cain, “Where is your brother? Where is Abel?”'
  - type: text
    content: “I don’t know,” Cain responded. “Am I my brother’s guardian?”
