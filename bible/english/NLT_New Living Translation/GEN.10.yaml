document_id: GEN.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This is the account of the families of Shem, Ham, and Japheth, the three sons of Noah. Many children were born to them after the great flood.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Japheth
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He built his kingdom in the land of Babylonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shinar.
      marker-yv: yv-n
    - type: text
      text: ' with the cities of Babylon, Erech, Akkad, and Calneh. '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: From there he expanded his territory to Assyria,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: From that land Assyria went out.
      marker-yv: yv-n
    - type: text
      text: ' building the cities of Nineveh, Rehoboth-ir, Calah, '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: and Resen (the great city located between Nineveh and Calah).
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mizraim was the ancestor of the Ludites, Anamites, Lehabites, Naphtuhites, '
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pathrusites, Casluhites, and the Caphtorites, from whom the Philistines came.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Casluhites, from whom the Philistines came, and Caphtorites. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Jer 47:4; Amos 9:7.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Canaan’s oldest son was Sidon, the ancestor of the Sidonians. Canaan was also the ancestor of the Hittites,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ancestor of Heth.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jebusites, Amorites, Girgashites, '
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hivites, Arkites, Sinites, '
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Arvadites, Zemarites, and Hamathites. The Canaanite clans eventually spread out, '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and the territory of Canaan extended from Sidon in the north to Gerar and Gaza in the south, and east as far as Sodom, Gomorrah, Admah, and Zeboiim, near Lasha.
  '2':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The descendants of Japheth were Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: These were the descendants of Ham, identified by clan, language, territory, and national identity.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Shem
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Sons were also born to Shem, the older brother of Japheth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shem, whose older brother was Japheth.
      marker-yv: yv-n
    - type: text
      text: ' Shem was the ancestor of all the descendants of Eber.'
  '22':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The descendants of Shem were Elam, Asshur, Arphaxad, Lud, and Aram.
  '23':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The descendants of Aram were Uz, Hul, Gether, and Mash.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Arphaxad was the father of Shelah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Arphaxad was the father of Cainan, Cainan was the father of Shelah. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Luke 3:36.
      marker-yv: yv-n
    - type: text
      text: ' and Shelah was the father of Eber.'
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Eber had two sons. The first was named Peleg (which means “division”), for during his lifetime the people of the world were divided into different language groups. His brother’s name was Joktan.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Joktan was the ancestor of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hadoram, Uzal, Diklah, '
  '28':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Obal, Abimael, Sheba, '
  '29':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ophir, Havilah, and Jobab. All these were descendants of Joktan. '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The descendants of Gomer were Ashkenaz, Riphath, and Togarmah.
  '30':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The territory they occupied extended from Mesha all the way to Sephar in the eastern mountains.
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: These were the descendants of Shem, identified by clan, language, territory, and national identity.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: These are the clans that descended from Noah’s sons, arranged by nation according to their lines of descent. All the nations of the earth descended from these clans after the great flood.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The descendants of Javan were Elishah, Tarshish, Kittim, and Rodanim.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek version (see also 1 Chr 1:7); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dodanim.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Their descendants became the seafaring peoples that spread out to various lands, each identified by its own language, clan, and national identity.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Ham
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The descendants of Ham were Cush, Mizraim, Put, and Canaan.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The descendants of Cush were Seba, Havilah, Sabtah, Raamah, and Sabteca. The descendants of Raamah were Sheba and Dedan.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cush was also the ancestor of Nimrod, who was the first heroic warrior on earth. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Since he was the greatest hunter in the world,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a great hunter before the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 10:9b.
      marker-yv: yv-n
    - type: text
      text: ' his name became proverbial. People would say, “This man is like Nimrod, the greatest hunter in the world.” '
