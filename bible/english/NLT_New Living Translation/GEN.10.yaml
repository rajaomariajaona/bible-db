document_id: GEN.10,116
type_code: eng
verses:
  '1':
  - type: text
    content: This is the account of the families of Shem, Ham, and Japheth, the three sons of Noah. Many children were born to them after the great flood.
  - type: heading
    content: Descendants of Japheth
  '10':
  - type: text
    content: He built his kingdom in the land of Babylonia,
  - type: note
    content: Hebrew Shinar.
  - type: text
    content: ' with the cities of Babylon, Erech, Akkad, and Calneh. '
  '11':
  - type: text
    content: From there he expanded his territory to Assyria,
  - type: note
    content: Or From that land Assyria went out.
  - type: text
    content: ' building the cities of Nineveh, Rehoboth-ir, Calah, '
  '12':
  - type: text
    content: and Resen (the great city located between Nineveh and Calah).
  '13':
  - type: text
    content: 'Mizraim was the ancestor of the Ludites, Anamites, Lehabites, Naphtuhites, '
  '14':
  - type: text
    content: Pathrusites, Casluhites, and the Caphtorites, from whom the Philistines came.
  - type: note
    content: Hebrew Casluhites, from whom the Philistines came, and Caphtorites. Compare Jer 47:4; Amos 9:7.
  '15':
  - type: text
    content: Canaan’s oldest son was Sidon, the ancestor of the Sidonians. Canaan was also the ancestor of the Hittites,
  - type: note
    content: Hebrew ancestor of Heth.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Jebusites, Amorites, Girgashites, '
  '17':
  - type: text
    content: 'Hivites, Arkites, Sinites, '
  '18':
  - type: text
    content: 'Arvadites, Zemarites, and Hamathites. The Canaanite clans eventually spread out, '
  '19':
  - type: text
    content: and the territory of Canaan extended from Sidon in the north to Gerar and Gaza in the south, and east as far as Sodom, Gomorrah, Admah, and Zeboiim, near Lasha.
  '2':
  - type: text
    content: The descendants of Japheth were Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
  '20':
  - type: text
    content: These were the descendants of Ham, identified by clan, language, territory, and national identity.
  - type: heading
    content: Descendants of Shem
  '21':
  - type: text
    content: Sons were also born to Shem, the older brother of Japheth.
  - type: note
    content: Or Shem, whose older brother was Japheth.
  - type: text
    content: ' Shem was the ancestor of all the descendants of Eber.'
  '22':
  - type: text
    content: The descendants of Shem were Elam, Asshur, Arphaxad, Lud, and Aram.
  '23':
  - type: text
    content: The descendants of Aram were Uz, Hul, Gether, and Mash.
  '24':
  - type: text
    content: Arphaxad was the father of Shelah,
  - type: note
    content: Greek version reads Arphaxad was the father of Cainan, Cainan was the father of Shelah. Compare Luke 3:36.
  - type: text
    content: ' and Shelah was the father of Eber.'
  '25':
  - type: text
    content: Eber had two sons. The first was named Peleg (which means “division”), for during his lifetime the people of the world were divided into different language groups. His brother’s name was Joktan.
  '26':
  - type: text
    content: 'Joktan was the ancestor of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '28':
  - type: text
    content: 'Obal, Abimael, Sheba, '
  '29':
  - type: text
    content: 'Ophir, Havilah, and Jobab. All these were descendants of Joktan. '
  '3':
  - type: text
    content: The descendants of Gomer were Ashkenaz, Riphath, and Togarmah.
  '30':
  - type: text
    content: The territory they occupied extended from Mesha all the way to Sephar in the eastern mountains.
  '31':
  - type: text
    content: These were the descendants of Shem, identified by clan, language, territory, and national identity.
  - type: heading
    content: Conclusion
  '32':
  - type: text
    content: These are the clans that descended from Noah’s sons, arranged by nation according to their lines of descent. All the nations of the earth descended from these clans after the great flood.
  '4':
  - type: text
    content: The descendants of Javan were Elishah, Tarshish, Kittim, and Rodanim.
  - type: note
    content: As in some Hebrew manuscripts and Greek version (see also 1 Chr 1:7); most Hebrew manuscripts read Dodanim.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Their descendants became the seafaring peoples that spread out to various lands, each identified by its own language, clan, and national identity.
  - type: heading
    content: Descendants of Ham
  '6':
  - type: text
    content: The descendants of Ham were Cush, Mizraim, Put, and Canaan.
  '7':
  - type: text
    content: The descendants of Cush were Seba, Havilah, Sabtah, Raamah, and Sabteca. The descendants of Raamah were Sheba and Dedan.
  '8':
  - type: text
    content: 'Cush was also the ancestor of Nimrod, who was the first heroic warrior on earth. '
  '9':
  - type: text
    content: Since he was the greatest hunter in the world,
  - type: note
    content: Hebrew a great hunter before the Lord; also in 10:9b.
  - type: text
    content: ' his name became proverbial. People would say, “This man is like Nimrod, the greatest hunter in the world.” '
