document_id: PSA.33
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let the godly sing for joy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is fitting for the pure to praise him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with melodies on the lyre;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: make music for him on the ten-stringed harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sing a new song of praise to him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: play skillfully on the harp, and sing with joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' holds true,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we can trust everything he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He loves whatever is just and good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the unfailing love of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' fills the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' merely spoke,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heavens were created.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He breathed the word,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the stars were born.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He assigned the sea its boundaries
- type: usfm
  marker: q2
  children:
  - type: text
    text: and locked the oceans in vast reservoirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let the whole world fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let everyone stand in awe of him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For when he spoke, the world began!
- type: usfm
  marker: q2
  children:
  - type: text
    text: It appeared at his command.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' frustrates the plans of the nations'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thwarts all their schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s plans stand firm forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his intentions can never be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'What joy for the nation whose God is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose people he has chosen as his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' looks down from heaven'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sees the whole human race.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: From his throne he observes
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who live on the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He made their hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so he understands everything they do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The best-equipped army cannot save a king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor is great strength enough to save a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t count on your warhorse to give you victory—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all its strength, it cannot save you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' watches over those who fear him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who rely on his unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He rescues them from death
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keeps them alive in times of famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We put our hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is our help and our shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: In him our hearts rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for we trust in his holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Let your unfailing love surround us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for our hope is in you alone.
