document_id: PSA.33,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the godly sing for joy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is fitting for the pure to praise him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' frustrates the plans of the nations'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thwarts all their schemes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s plans stand firm forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his intentions can never be shaken.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What joy for the nation whose God is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose people he has chosen as his inheritance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks down from heaven'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sees the whole human race.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From his throne he observes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who live on the earth.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he understands everything they do.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The best-equipped army cannot save a king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor is great strength enough to save a warrior.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t count on your warhorse to give you victory—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all its strength, it cannot save you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' watches over those who fear him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who rely on his unfailing love.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescues them from death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keeps them alive in times of famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with melodies on the lyre;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make music for him on the ten-stringed harp.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We put our hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is our help and our shield.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In him our hearts rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we trust in his holy name.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let your unfailing love surround us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for our hope is in you alone.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing a new song of praise to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: play skillfully on the harp, and sing with joy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' holds true,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we can trust everything he does.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He loves whatever is just and good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the unfailing love of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fills the earth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' merely spoke,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the heavens were created.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He breathed the word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the stars were born.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He assigned the sea its boundaries
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and locked the oceans in vast reservoirs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the whole world fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let everyone stand in awe of him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when he spoke, the world began!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It appeared at his command.
