document_id: PSA.33,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Let the godly sing for joy to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: it is fitting for the pure to praise him.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' frustrates the plans of the nations'
  - type: text
    content: and thwarts all their schemes.
  '11':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ’s plans stand firm forever;
  - type: text
    content: his intentions can never be shaken.
  '12':
  - type: text
    content: 'What joy for the nation whose God is the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: whose people he has chosen as his inheritance.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' looks down from heaven'
  - type: text
    content: and sees the whole human race.
  '14':
  - type: text
    content: From his throne he observes
  - type: text
    content: all who live on the earth.
  '15':
  - type: text
    content: He made their hearts,
  - type: text
    content: so he understands everything they do.
  '16':
  - type: text
    content: The best-equipped army cannot save a king,
  - type: text
    content: nor is great strength enough to save a warrior.
  '17':
  - type: text
    content: Don’t count on your warhorse to give you victory—
  - type: text
    content: for all its strength, it cannot save you.
  '18':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' watches over those who fear him,'
  - type: text
    content: those who rely on his unfailing love.
  '19':
  - type: text
    content: He rescues them from death
  - type: text
    content: and keeps them alive in times of famine.
  '2':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' with melodies on the lyre;'
  - type: text
    content: make music for him on the ten-stringed harp.
  '20':
  - type: text
    content: 'We put our hope in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He is our help and our shield.
  '21':
  - type: text
    content: In him our hearts rejoice,
  - type: text
    content: for we trust in his holy name.
  '22':
  - type: text
    content: 'Let your unfailing love surround us, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for our hope is in you alone.
  '3':
  - type: text
    content: Sing a new song of praise to him;
  - type: text
    content: play skillfully on the harp, and sing with joy.
  '4':
  - type: text
    content: 'For the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' holds true,'
  - type: text
    content: and we can trust everything he does.
  '5':
  - type: text
    content: He loves whatever is just and good;
  - type: text
    content: 'the unfailing love of the '
  - type: text
    content: Lord
  - type: text
    content: ' fills the earth.'
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' merely spoke,'
  - type: text
    content: and the heavens were created.
  - type: text
    content: He breathed the word,
  - type: text
    content: and all the stars were born.
  '7':
  - type: text
    content: He assigned the sea its boundaries
  - type: text
    content: and locked the oceans in vast reservoirs.
  '8':
  - type: text
    content: 'Let the whole world fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and let everyone stand in awe of him.
  '9':
  - type: text
    content: For when he spoke, the world began!
  - type: text
    content: It appeared at his command.
