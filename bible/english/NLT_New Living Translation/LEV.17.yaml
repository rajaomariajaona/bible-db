document_id: LEV.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Prohibitions against Eating Blood
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“And if any native Israelite or foreigner living among you eats or drinks blood in any form, I will turn against that person and cut him off from the community of your people, '
  '11':
  - type: text
    content: 'for the life of the body is in its blood. I have given you the blood on the altar to purify you, making you right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for you.
  - type: text
    content: ' It is the blood, given in exchange for a life, that makes purification possible. '
  '12':
  - type: text
    content: That is why I have said to the people of Israel, ‘You must never eat or drink blood—neither you nor the foreigners living among you.’
  '13':
  - type: text
    content: '“And if any native Israelite or foreigner living among you goes hunting and kills an animal or bird that is approved for eating, he must drain its blood and cover it with earth. '
  '14':
  - type: text
    content: The life of every creature is in its blood. That is why I have said to the people of Israel, ‘You must never eat or drink blood, for the life of any creature is in its blood.’ So whoever consumes blood will be cut off from the community.
  '15':
  - type: text
    content: '“And if any native-born Israelites or foreigners eat the meat of an animal that died naturally or was torn up by wild animals, they must wash their clothes and bathe themselves in water. They will remain ceremonially unclean until evening, but then they will be clean. '
  '16':
  - type: text
    content: But if they do not wash their clothes and bathe themselves, they will be punished for their sin.”
  '2':
  - type: text
    content: '“Give the following instructions to Aaron and his sons and all the people of Israel. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.'
  '3':
  - type: text
    content: “If any native Israelite sacrifices a bull
  - type: note
    content: Or cow.
  - type: text
    content: ' or a lamb or a goat anywhere inside or outside the camp '
  '4':
  - type: text
    content: instead of bringing it to the entrance of the Tabernacle
  - type: note
    content: Hebrew Tent of Meeting; also in 17:5, 6, 9.
  - type: text
    content: ' to present it as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', that person will be as guilty as a murderer.'
  - type: note
    content: Hebrew will be guilty of blood.
  - type: text
    content: ' Such a person has shed blood and will be cut off from the community. '
  '5':
  - type: text
    content: 'The purpose of this rule is to stop the Israelites from sacrificing animals in the open fields. It will ensure that they bring their sacrifices to the priest at the entrance of the Tabernacle, so he can present them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as peace offerings. '
  '6':
  - type: text
    content: 'Then the priest will be able to splatter the blood against the '
  - type: text
    content: Lord
  - type: text
    content: '’s altar at the entrance of the Tabernacle, and he will burn the fat as a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'The people must no longer be unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' by offering sacrifices to the goat idols.'
  - type: note
    content: Or goat demons.
  - type: text
    content: ' This is a permanent law for them, to be observed from generation to generation.'
  '8':
  - type: text
    content: '“Give them this command as well. If any native Israelite or foreigner living among you offers a burnt offering or a sacrifice '
  '9':
  - type: text
    content: 'but does not bring it to the entrance of the Tabernacle to offer it to the '
  - type: text
    content: Lord
  - type: text
    content: ', that person will be cut off from the community.'
