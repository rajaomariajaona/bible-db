document_id: PSA.54,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of David, regarding the time the Ziphites came and said to Saul, “We know where David is hiding.” To be accompanied by stringed instruments.'
  - type: text
    content: Come with great power, O God, and rescue me!
  - type: text
    content: Defend me with your might.
  '2':
  - type: text
    content: Listen to my prayer, O God.
  - type: text
    content: Pay attention to my plea.
  '3':
  - type: text
    content: For strangers are attacking me;
  - type: text
    content: violent people are trying to kill me.
  - type: text
    content: 'They care nothing for God. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: But God is my helper.
  - type: text
    content: The Lord keeps me alive!
  '5':
  - type: text
    content: May the evil plans of my enemies be turned against them.
  - type: text
    content: Do as you promised and put an end to them.
  '6':
  - type: text
    content: I will sacrifice a voluntary offering to you;
  - type: text
    content: 'I will praise your name, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for it is good.
  '7':
  - type: text
    content: For you have rescued me from my troubles
  - type: text
    content: and helped me to triumph over my enemies.
