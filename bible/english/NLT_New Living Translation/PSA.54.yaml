document_id: PSA.54,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of David, regarding the time the Ziphites came and said to Saul, “We know where David is hiding.” To be accompanied by stringed instruments.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come with great power, O God, and rescue me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Defend me with your might.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my prayer, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention to my plea.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For strangers are attacking me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: violent people are trying to kill me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They care nothing for God. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God is my helper.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Lord keeps me alive!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the evil plans of my enemies be turned against them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do as you promised and put an end to them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sacrifice a voluntary offering to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will praise your name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it is good.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have rescued me from my troubles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and helped me to triumph over my enemies.
