document_id: JOS.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Memorials to the Jordan Crossing
  - type: text
    content: 'When all the people had crossed the Jordan, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  '10':
  - type: text
    content: 'The priests who were carrying the Ark stood in the middle of the river until all of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands that Moses had given to Joshua were carried out. Meanwhile, the people hurried across the riverbed. '
  '11':
  - type: text
    content: 'And when everyone was safely on the other side, the priests crossed over with the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' as the people watched.'
  '12':
  - type: text
    content: 'The armed warriors from the tribes of Reuben, Gad, and the half-tribe of Manasseh led the Israelites across the Jordan, just as Moses had directed. '
  '13':
  - type: text
    content: 'These armed men—about 40,000 strong—were ready for battle, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with them as they crossed over to the plains of Jericho.'
  '14':
  - type: text
    content: 'That day the '
  - type: text
    content: Lord
  - type: text
    content: ' made Joshua a great leader in the eyes of all the Israelites, and for the rest of his life they revered him as much as they had revered Moses.'
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Joshua, '
  '16':
  - type: text
    content: “Command the priests carrying the Ark of the Covenant
  - type: note
    content: Hebrew Ark of the Testimony.
  - type: text
    content: ' to come up out of the riverbed.” '
  '17':
  - type: text
    content: 'So Joshua gave the command. '
  '18':
  - type: text
    content: 'As soon as the priests carrying the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant came up out of the riverbed and their feet were on high ground, the water of the Jordan returned and overflowed its banks as before.
  '19':
  - type: text
    content: The people crossed the Jordan on the tenth day of the first month.
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: ' Then they camped at Gilgal, just east of Jericho. '
  '2':
  - type: text
    content: '“Now choose twelve men, one from each tribe. '
  '20':
  - type: text
    content: It was there at Gilgal that Joshua piled up the twelve stones taken from the Jordan River.
  '21':
  - type: text
    content: 'Then Joshua said to the Israelites, “In the future your children will ask, ‘What do these stones mean?’ '
  '22':
  - type: text
    content: 'Then you can tell them, ‘This is where the Israelites crossed the Jordan on dry ground.’ '
  '23':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God dried up the river right before your eyes, and he kept it dry until you were all across, just as he did at the Red Sea'
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' when he dried it up until we had all crossed over. '
  '24':
  - type: text
    content: 'He did this so all the nations of the earth might know that the '
  - type: text
    content: Lord
  - type: text
    content: '’s hand is powerful, and so you might fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God forever.”'
  '3':
  - type: text
    content: Tell them, ‘Take twelve stones from the very place where the priests are standing in the middle of the Jordan. Carry them out and pile them up at the place where you will camp tonight.’”
  '4':
  - type: text
    content: 'So Joshua called together the twelve men he had chosen—one from each of the tribes of Israel. '
  '5':
  - type: text
    content: 'He told them, “Go into the middle of the Jordan, in front of the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Each of you must pick up one stone and carry it out on your shoulder—twelve stones in all, one for each of the twelve tribes of Israel. '
  '6':
  - type: text
    content: 'We will use these stones to build a memorial. In the future your children will ask you, ‘What do these stones mean?’ '
  '7':
  - type: text
    content: 'Then you can tell them, ‘They remind us that the Jordan River stopped flowing when the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant went across.’ These stones will stand as a memorial among the people of Israel forever.”
  '8':
  - type: text
    content: 'So the men did as Joshua had commanded them. They took twelve stones from the middle of the Jordan River, one for each tribe, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had told Joshua. They carried them to the place where they camped for the night and constructed the memorial there.'
  '9':
  - type: text
    content: Joshua also set up another pile of twelve stones in the middle of the Jordan, at the place where the priests who carried the Ark of the Covenant were standing. And they are there to this day.
