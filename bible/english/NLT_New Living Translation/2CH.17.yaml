document_id: 2CH.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Jehoshaphat, Asa’s son, became the next king. He strengthened Judah to stand against any attack from Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fell over all the surrounding kingdoms so that none of them wanted to declare war on Jehoshaphat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Some of the Philistines brought him gifts and silver as tribute, and the Arabs brought 7,700 rams and 7,700 male goats.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Jehoshaphat became more and more powerful and built fortresses and storage cities throughout Judah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He stored numerous supplies in Judah’s towns and stationed an army of seasoned troops at Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: His army was enrolled according to ancestral clans.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From Judah there were 300,000 troops organized in units of 1,000, under the command of Adnah. '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Next in command was Jehohanan, who commanded 280,000 troops. '
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Next was Amasiah son of Zicri, who volunteered for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s service, with 200,000 troops under his command.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'From Benjamin there were 200,000 troops equipped with bows and shields. They were under the command of Eliada, a veteran soldier. '
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Next in command was Jehozabad, who commanded 180,000 armed men.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These were the troops stationed in Jerusalem to serve the king, besides those Jehoshaphat stationed in the fortified towns throughout Judah.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He stationed troops in all the fortified towns of Judah, and he assigned additional garrisons to the land of Judah and to the towns of Ephraim that his father, Asa, had captured.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Jehoshaphat because he followed the example of his father’s early years'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the example of his father, David.
      marker-yv: yv-n
    - type: text
      text: ' and did not worship the images of Baal. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He sought his father’s God and obeyed his commands instead of following the evil practices of the kingdom of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' established Jehoshaphat’s control over the kingdom of Judah. All the people of Judah brought gifts to Jehoshaphat, so he became very wealthy and highly esteemed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He was deeply committed to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: His heart was courageous in.
      marker-yv: yv-n
    - type: text
      text: ' the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . He removed the pagan shrines and Asherah poles from Judah.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the third year of his reign Jehoshaphat sent his officials to teach in all the towns of Judah. These officials included Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He sent Levites along with them, including Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tob-adonijah. He also sent out the priests Elishama and Jehoram. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They took copies of the Book of the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and traveled around through all the towns of Judah, teaching the people.'
