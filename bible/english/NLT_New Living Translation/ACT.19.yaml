document_id: ACT.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Third Missionary Journey
  - type: text
    content: While Apollos was in Corinth, Paul traveled through the interior regions until he reached Ephesus, on the coast, where he found several believers.
  - type: note
    content: Greek disciples; also in 19:9, 30.
  - type: text
    content: ' '
  '10':
  - type: text
    content: This went on for the next two years, so that people throughout the province of Asia—both Jews and Greeks—heard the word of the Lord.
  '11':
  - type: text
    content: 'God gave Paul the power to perform unusual miracles. '
  '12':
  - type: text
    content: When handkerchiefs or aprons that had merely touched his skin were placed on sick people, they were healed of their diseases, and evil spirits were expelled.
  '13':
  - type: text
    content: 'A group of Jews was traveling from town to town casting out evil spirits. They tried to use the name of the Lord Jesus in their incantation, saying, “I command you in the name of Jesus, whom Paul preaches, to come out!” '
  '14':
  - type: text
    content: 'Seven sons of Sceva, a leading priest, were doing this. '
  '15':
  - type: text
    content: 'But one time when they tried it, the evil spirit replied, “I know Jesus, and I know Paul, but who are you?” '
  '16':
  - type: text
    content: Then the man with the evil spirit leaped on them, overpowered them, and attacked them with such violence that they fled from the house, naked and battered.
  '17':
  - type: text
    content: 'The story of what happened spread quickly all through Ephesus, to Jews and Greeks alike. A solemn fear descended on the city, and the name of the Lord Jesus was greatly honored. '
  '18':
  - type: text
    content: 'Many who became believers confessed their sinful practices. '
  '19':
  - type: text
    content: A number of them who had been practicing sorcery brought their incantation books and burned them at a public bonfire. The value of the books was several million dollars.
  - type: note
    content: Greek 50,000 pieces of silver, each of which was the equivalent of a day’s wage.
  - type: text
    content: ' '
  '2':
  - type: text
    content: “Did you receive the Holy Spirit when you believed?” he asked them.
  - type: text
    content: “No,” they replied, “we haven’t even heard that there is a Holy Spirit.”
  '20':
  - type: text
    content: So the message about the Lord spread widely and had a powerful effect.
  '21':
  - type: text
    content: Afterward Paul felt compelled by the Spirit
  - type: note
    content: Or decided in his spirit.
  - type: text
    content: ' to go over to Macedonia and Achaia before going to Jerusalem. “And after that,” he said, “I must go on to Rome!” '
  '22':
  - type: text
    content: He sent his two assistants, Timothy and Erastus, ahead to Macedonia while he stayed awhile longer in the province of Asia.
  - type: heading
    content: The Riot in Ephesus
  '23':
  - type: text
    content: 'About that time, serious trouble developed in Ephesus concerning the Way. '
  '24':
  - type: text
    content: It began with Demetrius, a silversmith who had a large business manufacturing silver shrines of the Greek goddess Artemis.
  - type: note
    content: Artemis is otherwise known as Diana.
  - type: text
    content: ' He kept many craftsmen busy. '
  '25':
  - type: text
    content: 'He called them together, along with others employed in similar trades, and addressed them as follows:'
  - type: text
    content: '“Gentlemen, you know that our wealth comes from this business. '
  '26':
  - type: text
    content: 'But as you have seen and heard, this man Paul has persuaded many people that handmade gods aren’t really gods at all. And he’s done this not only here in Ephesus but throughout the entire province! '
  '27':
  - type: text
    content: Of course, I’m not just talking about the loss of public respect for our business. I’m also concerned that the temple of the great goddess Artemis will lose its influence and that Artemis—this magnificent goddess worshiped throughout the province of Asia and all around the world—will be robbed of her great prestige!”
  '28':
  - type: text
    content: 'At this their anger boiled, and they began shouting, “Great is Artemis of the Ephesians!” '
  '29':
  - type: text
    content: 'Soon the whole city was filled with confusion. Everyone rushed to the amphitheater, dragging along Gaius and Aristarchus, who were Paul’s traveling companions from Macedonia. '
  '3':
  - type: text
    content: “Then what baptism did you experience?” he asked.
  - type: text
    content: And they replied, “The baptism of John.”
  '30':
  - type: text
    content: 'Paul wanted to go in, too, but the believers wouldn’t let him. '
  '31':
  - type: text
    content: Some of the officials of the province, friends of Paul, also sent a message to him, begging him not to risk his life by entering the amphitheater.
  '32':
  - type: text
    content: 'Inside, the people were all shouting, some one thing and some another. Everything was in confusion. In fact, most of them didn’t even know why they were there. '
  '33':
  - type: text
    content: 'The Jews in the crowd pushed Alexander forward and told him to explain the situation. He motioned for silence and tried to speak. '
  '34':
  - type: text
    content: 'But when the crowd realized he was a Jew, they started shouting again and kept it up for about two hours: “Great is Artemis of the Ephesians! Great is Artemis of the Ephesians!”'
  '35':
  - type: text
    content: 'At last the mayor was able to quiet them down enough to speak. “Citizens of Ephesus,” he said. “Everyone knows that Ephesus is the official guardian of the temple of the great Artemis, whose image fell down to us from heaven. '
  '36':
  - type: text
    content: 'Since this is an undeniable fact, you should stay calm and not do anything rash. '
  '37':
  - type: text
    content: You have brought these men here, but they have stolen nothing from the temple and have not spoken against our goddess.
  '38':
  - type: text
    content: '“If Demetrius and the craftsmen have a case against them, the courts are in session and the officials can hear the case at once. Let them make formal charges. '
  '39':
  - type: text
    content: 'And if there are complaints about other matters, they can be settled in a legal assembly. '
  '4':
  - type: text
    content: Paul said, “John’s baptism called for repentance from sin. But John himself told the people to believe in the one who would come later, meaning Jesus.”
  '40':
  - type: text
    content: 'I am afraid we are in danger of being charged with rioting by the Roman government, since there is no cause for all this commotion. And if Rome demands an explanation, we won’t know what to say.” '
  '41':
  - type: note
    content: Some translations include verse 41 as part of verse 40.
  - type: text
    content: Then he dismissed them, and they dispersed.
  '5':
  - type: text
    content: 'As soon as they heard this, they were baptized in the name of the Lord Jesus. '
  '6':
  - type: text
    content: Then when Paul laid his hands on them, the Holy Spirit came on them, and they spoke in other tongues
  - type: note
    content: Or in other languages.
  - type: text
    content: ' and prophesied. '
  '7':
  - type: text
    content: There were about twelve men in all.
  - type: heading
    content: Paul Ministers in Ephesus
  '8':
  - type: text
    content: 'Then Paul went to the synagogue and preached boldly for the next three months, arguing persuasively about the Kingdom of God. '
  '9':
  - type: text
    content: 'But some became stubborn, rejecting his message and publicly speaking against the Way. So Paul left the synagogue and took the believers with him. Then he held daily discussions at the lecture hall of Tyrannus. '
