document_id: ACT.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Third Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: While Apollos was in Corinth, Paul traveled through the interior regions until he reached Ephesus, on the coast, where he found several believers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'disciples; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 19:9, 30.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Did you receive the Holy Spirit when you believed?” he asked them.
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” they replied, “we haven’t even heard that there is a Holy Spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Then what baptism did you experience?” he asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: And they replied, “The baptism of John.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Paul said, “John’s baptism called for repentance from sin. But John himself told the people to believe in the one who would come later, meaning Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As soon as they heard this, they were baptized in the name of the Lord Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then when Paul laid his hands on them, the Holy Spirit came on them, and they spoke in other tongues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in other languages.
    marker-yv: yv-n
  - type: text
    text: ' and prophesied. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There were about twelve men in all.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Ministers in Ephesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Paul went to the synagogue and preached boldly for the next three months, arguing persuasively about the Kingdom of God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But some became stubborn, rejecting his message and publicly speaking against the Way. So Paul left the synagogue and took the believers with him. Then he held daily discussions at the lecture hall of Tyrannus. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This went on for the next two years, so that people throughout the province of Asia—both Jews and Greeks—heard the word of the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'God gave Paul the power to perform unusual miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When handkerchiefs or aprons that had merely touched his skin were placed on sick people, they were healed of their diseases, and evil spirits were expelled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A group of Jews was traveling from town to town casting out evil spirits. They tried to use the name of the Lord Jesus in their incantation, saying, “I command you in the name of Jesus, whom Paul preaches, to come out!” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Seven sons of Sceva, a leading priest, were doing this. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But one time when they tried it, the evil spirit replied, “I know Jesus, and I know Paul, but who are you?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then the man with the evil spirit leaped on them, overpowered them, and attacked them with such violence that they fled from the house, naked and battered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The story of what happened spread quickly all through Ephesus, to Jews and Greeks alike. A solemn fear descended on the city, and the name of the Lord Jesus was greatly honored. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Many who became believers confessed their sinful practices. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A number of them who had been practicing sorcery brought their incantation books and burned them at a public bonfire. The value of the books was several million dollars.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '50,000 pieces of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: each of which was the equivalent of a day’s wage.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So the message about the Lord spread widely and had a powerful effect.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afterward Paul felt compelled by the Spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: decided in his spirit.
    marker-yv: yv-n
  - type: text
    text: ' to go over to Macedonia and Achaia before going to Jerusalem. “And after that,” he said, “I must go on to Rome!” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He sent his two assistants, Timothy and Erastus, ahead to Macedonia while he stayed awhile longer in the province of Asia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Riot in Ephesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'About that time, serious trouble developed in Ephesus concerning the Way. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: It began with Demetrius, a silversmith who had a large business manufacturing silver shrines of the Greek goddess Artemis.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:24 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Artemis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is otherwise known as Diana.
    marker-yv: yv-n
  - type: text
    text: ' He kept many craftsmen busy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He called them together, along with others employed in similar trades, and addressed them as follows:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Gentlemen, you know that our wealth comes from this business. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But as you have seen and heard, this man Paul has persuaded many people that handmade gods aren’t really gods at all. And he’s done this not only here in Ephesus but throughout the entire province! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Of course, I’m not just talking about the loss of public respect for our business. I’m also concerned that the temple of the great goddess Artemis will lose its influence and that Artemis—this magnificent goddess worshiped throughout the province of Asia and all around the world—will be robbed of her great prestige!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'At this their anger boiled, and they began shouting, “Great is Artemis of the Ephesians!” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Soon the whole city was filled with confusion. Everyone rushed to the amphitheater, dragging along Gaius and Aristarchus, who were Paul’s traveling companions from Macedonia. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul wanted to go in, too, but the believers wouldn’t let him. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Some of the officials of the province, friends of Paul, also sent a message to him, begging him not to risk his life by entering the amphitheater.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Inside, the people were all shouting, some one thing and some another. Everything was in confusion. In fact, most of them didn’t even know why they were there. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The Jews in the crowd pushed Alexander forward and told him to explain the situation. He motioned for silence and tried to speak. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But when the crowd realized he was a Jew, they started shouting again and kept it up for about two hours: “Great is Artemis of the Ephesians! Great is Artemis of the Ephesians!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'At last the mayor was able to quiet them down enough to speak. “Citizens of Ephesus,” he said. “Everyone knows that Ephesus is the official guardian of the temple of the great Artemis, whose image fell down to us from heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Since this is an undeniable fact, you should stay calm and not do anything rash. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: You have brought these men here, but they have stolen nothing from the temple and have not spoken against our goddess.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '“If Demetrius and the craftsmen have a case against them, the courts are in session and the officials can hear the case at once. Let them make formal charges. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And if there are complaints about other matters, they can be settled in a legal assembly. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I am afraid we are in danger of being charged with rioting by the Roman government, since there is no cause for all this commotion. And if Rome demands an explanation, we won’t know what to say.” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some translations include verse 41 as part of verse 40.
    marker-yv: yv-n
  - type: text
    text: Then he dismissed them, and they dispersed.
