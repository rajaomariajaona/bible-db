document_id: PSA.11,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'I trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' for protection.'
  - type: text
    content: So why do you say to me,
  - type: text
    content: “Fly like a bird to the mountains for safety!
  '2':
  - type: text
    content: The wicked are stringing their bows
  - type: text
    content: and fitting their arrows on the bowstrings.
  - type: text
    content: They shoot from the shadows
  - type: text
    content: at those whose hearts are right.
  '3':
  - type: text
    content: The foundations of law and order have collapsed.
  - type: text
    content: What can the righteous do?”
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is in his holy Temple;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' still rules from heaven.'
  - type: text
    content: He watches everyone closely,
  - type: text
    content: examining every person on earth.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' examines both the righteous and the wicked.'
  - type: text
    content: He hates those who love violence.
  '6':
  - type: text
    content: He will rain down blazing coals and burning sulfur on the wicked,
  - type: text
    content: punishing them with scorching winds.
  '7':
  - type: text
    content: 'For the righteous '
  - type: text
    content: Lord
  - type: text
    content: ' loves justice.'
  - type: text
    content: The virtuous will see his face.
