document_id: PSA.11
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for protection.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why do you say to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Fly like a bird to the mountains for safety!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The wicked are stringing their bows
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fitting their arrows on the bowstrings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shoot from the shadows
- type: usfm
  marker: q2
  children:
  - type: text
    text: at those whose hearts are right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The foundations of law and order have collapsed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What can the righteous do?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is in his holy Temple;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' still rules from heaven.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He watches everyone closely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: examining every person on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' examines both the righteous and the wicked.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hates those who love violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He will rain down blazing coals and burning sulfur on the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: punishing them with scorching winds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the righteous '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves justice.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The virtuous will see his face.
