document_id: ISA.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Babylon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This message came to me concerning Babylon—the desert by the sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: concerning the desert by the sea.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster is roaring down on you from the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a whirlwind sweeping in from the Negev.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: O my people, threshed and winnowed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have told you everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies has said,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything the God of Israel has told me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Edom
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: This message came to me concerning Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dumah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'which means “silence” or “stillness.” It is a wordplay on the word '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Edom.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Someone from Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Seir, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Edom.
      marker-yv: yv-n
    - type: text
      text: ' keeps calling to me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Watchman, how much longer until morning?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will the night be over?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The watchman replies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Morning is coming, but night will soon return.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you wish to ask again, then come back and ask.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Arabia
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This message came to me concerning Arabia:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O caravans from Dedan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hide in the deserts of Arabia.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: O people of Tema,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring water to these thirsty people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: food to these weary refugees.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They have fled from the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the drawn sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the bent bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the terrors of battle.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The Lord said to me, “Within a year, counting each day,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Within a year, as a servant bound by contract would count it. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some ancient manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Within three years, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as in 16:14.
      marker-yv: yv-n
    - type: text
      text: ' all the glory of Kedar will come to an end. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Only a few of its courageous archers will survive. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, have spoken!”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I see a terrifying vision:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I see the betrayer betraying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the destroyer destroying.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, you Elamites and Medes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attack and lay siege.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make an end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to all the groaning Babylon caused.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My stomach aches and burns with pain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sharp pangs of anguish are upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those of a woman in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I grow faint when I hear what God is planning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am too afraid to look.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My mind reels and my heart races.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I longed for evening to come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now I am terrified of the dark.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Look! They are preparing a great feast.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are spreading rugs for people to sit on.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everyone is eating and drinking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But quick! Grab your shields and prepare for battle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are being attacked!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Meanwhile, the Lord said to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Put a watchman on the city wall.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him shout out what he sees.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He should look for chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drawn by pairs of horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for riders on donkeys and camels.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the watchman be fully alert.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then the watchman
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Syriac version; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a lion.
      marker-yv: yv-n
    - type: text
      text: ' called out,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Day after day I have stood on the watchtower, my lord.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Night after night I have remained at my post.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now at last—look!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here comes a man in a chariot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a pair of horses!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the watchman said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Babylon is fallen, fallen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the idols of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lie broken on the ground!”
