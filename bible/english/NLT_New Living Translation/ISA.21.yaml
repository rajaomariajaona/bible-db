document_id: ISA.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Babylon
  - type: text
    content: This message came to me concerning Babylon—the desert by the sea
  - type: note
    content: Hebrew concerning the desert by the sea.
  - type: text
    content: ':'
  - type: text
    content: Disaster is roaring down on you from the desert,
  - type: text
    content: like a whirlwind sweeping in from the Negev.
  '10':
  - type: text
    content: O my people, threshed and winnowed,
  - type: text
    content: 'I have told you everything the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has said,'
  - type: text
    content: everything the God of Israel has told me.
  - type: heading
    content: A Message about Edom
  '11':
  - type: text
    content: This message came to me concerning Edom
  - type: note
    content: Hebrew Dumah, which means “silence” or “stillness.” It is a wordplay on the word Edom.
  - type: text
    content: ':'
  - type: text
    content: Someone from Edom
  - type: note
    content: Hebrew Seir, another name for Edom.
  - type: text
    content: ' keeps calling to me,'
  - type: text
    content: “Watchman, how much longer until morning?
  - type: text
    content: When will the night be over?”
  '12':
  - type: text
    content: The watchman replies,
  - type: text
    content: “Morning is coming, but night will soon return.
  - type: text
    content: If you wish to ask again, then come back and ask.”
  - type: heading
    content: A Message about Arabia
  '13':
  - type: text
    content: 'This message came to me concerning Arabia:'
  - type: text
    content: O caravans from Dedan,
  - type: text
    content: hide in the deserts of Arabia.
  '14':
  - type: text
    content: O people of Tema,
  - type: text
    content: bring water to these thirsty people,
  - type: text
    content: food to these weary refugees.
  '15':
  - type: text
    content: They have fled from the sword,
  - type: text
    content: from the drawn sword,
  - type: text
    content: from the bent bow
  - type: text
    content: and the terrors of battle.
  '16':
  - type: text
    content: The Lord said to me, “Within a year, counting each day,
  - type: note
    content: Hebrew Within a year, as a servant bound by contract would count it. Some ancient manuscripts read Within three years, as in 16:14.
  - type: text
    content: ' all the glory of Kedar will come to an end. '
  '17':
  - type: text
    content: 'Only a few of its courageous archers will survive. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, have spoken!”'
  '2':
  - type: text
    content: 'I see a terrifying vision:'
  - type: text
    content: I see the betrayer betraying,
  - type: text
    content: the destroyer destroying.
  - type: text
    content: Go ahead, you Elamites and Medes,
  - type: text
    content: attack and lay siege.
  - type: text
    content: I will make an end
  - type: text
    content: to all the groaning Babylon caused.
  '3':
  - type: text
    content: My stomach aches and burns with pain.
  - type: text
    content: Sharp pangs of anguish are upon me,
  - type: text
    content: like those of a woman in labor.
  - type: text
    content: I grow faint when I hear what God is planning;
  - type: text
    content: I am too afraid to look.
  '4':
  - type: text
    content: My mind reels and my heart races.
  - type: text
    content: I longed for evening to come,
  - type: text
    content: but now I am terrified of the dark.
  '5':
  - type: text
    content: Look! They are preparing a great feast.
  - type: text
    content: They are spreading rugs for people to sit on.
  - type: text
    content: Everyone is eating and drinking.
  - type: text
    content: But quick! Grab your shields and prepare for battle.
  - type: text
    content: You are being attacked!
  '6':
  - type: text
    content: Meanwhile, the Lord said to me,
  - type: text
    content: “Put a watchman on the city wall.
  - type: text
    content: Let him shout out what he sees.
  '7':
  - type: text
    content: He should look for chariots
  - type: text
    content: drawn by pairs of horses,
  - type: text
    content: and for riders on donkeys and camels.
  - type: text
    content: Let the watchman be fully alert.”
  '8':
  - type: text
    content: Then the watchman
  - type: note
    content: As in Dead Sea Scrolls and Syriac version; Masoretic Text reads a lion.
  - type: text
    content: ' called out,'
  - type: text
    content: “Day after day I have stood on the watchtower, my lord.
  - type: text
    content: Night after night I have remained at my post.
  '9':
  - type: text
    content: Now at last—look!
  - type: text
    content: Here comes a man in a chariot
  - type: text
    content: with a pair of horses!”
  - type: text
    content: Then the watchman said,
  - type: text
    content: “Babylon is fallen, fallen!
  - type: text
    content: All the idols of Babylon
  - type: text
    content: lie broken on the ground!”
