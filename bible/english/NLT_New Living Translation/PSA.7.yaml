document_id: PSA.7,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew A shiggaion, probably indicating a musical setting for the psalm.
  - type: text
    content: ' of David, which he sang to the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Cush of the tribe of Benjamin.'
  - type: text
    content: 'I come to you for protection, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God.'
  - type: text
    content: Save me from my persecutors—rescue me!
  '10':
  - type: text
    content: God is my shield,
  - type: text
    content: saving those whose hearts are true and right.
  '11':
  - type: text
    content: God is an honest judge.
  - type: text
    content: He is angry with the wicked every day.
  '12':
  - type: text
    content: If a person does not repent,
  - type: text
    content: God
  - type: note
    content: Hebrew he.
  - type: text
    content: ' will sharpen his sword;'
  - type: text
    content: he will bend and string his bow.
  '13':
  - type: text
    content: He will prepare his deadly weapons
  - type: text
    content: and shoot his flaming arrows.
  '14':
  - type: text
    content: The wicked conceive evil;
  - type: text
    content: they are pregnant with trouble
  - type: text
    content: and give birth to lies.
  '15':
  - type: text
    content: They dig a deep pit to trap others,
  - type: text
    content: then fall into it themselves.
  '16':
  - type: text
    content: The trouble they make for others backfires on them.
  - type: text
    content: The violence they plan falls on their own heads.
  '17':
  - type: text
    content: 'I will thank the '
  - type: text
    content: Lord
  - type: text
    content: ' because he is just;'
  - type: text
    content: 'I will sing praise to the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Most High.'
  '2':
  - type: text
    content: If you don’t, they will maul me like a lion,
  - type: text
    content: tearing me to pieces with no one to rescue me.
  '3':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, if I have done wrong'
  - type: text
    content: or am guilty of injustice,
  '4':
  - type: text
    content: if I have betrayed a friend
  - type: text
    content: or plundered my enemy without cause,
  '5':
  - type: text
    content: then let my enemies capture me.
  - type: text
    content: Let them trample me into the ground
  - type: text
    content: 'and drag my honor in the dust. '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: ', in anger!'
  - type: text
    content: Stand up against the fury of my enemies!
  - type: text
    content: Wake up, my God, and bring justice!
  '7':
  - type: text
    content: Gather the nations before you.
  - type: text
    content: Rule over them from on high.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' judges the nations.'
  - type: text
    content: 'Declare me righteous, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for I am innocent, O Most High!
  '9':
  - type: text
    content: End the evil of those who are wicked,
  - type: text
    content: and defend the righteous.
  - type: text
    content: For you look deep within the mind and heart,
  - type: text
    content: O righteous God.
