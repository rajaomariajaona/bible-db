document_id: PSA.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'A shiggaion, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably indicating a musical setting for the psalm.
      marker-yv: yv-n
    - type: text
      text: ' of David, which he sang to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' concerning Cush of the tribe of Benjamin.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I come to you for protection, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Save me from my persecutors—rescue me!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: God is my shield,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saving those whose hearts are true and right.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God is an honest judge.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is angry with the wicked every day.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If a person does not repent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he.
      marker-yv: yv-n
    - type: text
      text: ' will sharpen his sword;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will bend and string his bow.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He will prepare his deadly weapons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shoot his flaming arrows.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The wicked conceive evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are pregnant with trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give birth to lies.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They dig a deep pit to trap others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then fall into it themselves.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The trouble they make for others backfires on them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The violence they plan falls on their own heads.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I will thank the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because he is just;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will sing praise to the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Most High.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: If you don’t, they will maul me like a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tearing me to pieces with no one to rescue me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, if I have done wrong'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or am guilty of injustice,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: if I have betrayed a friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or plundered my enemy without cause,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: then let my enemies capture me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them trample me into the ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and drag my honor in the dust. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in anger!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stand up against the fury of my enemies!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up, my God, and bring justice!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Gather the nations before you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rule over them from on high.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' judges the nations.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Declare me righteous, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am innocent, O Most High!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: End the evil of those who are wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and defend the righteous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you look deep within the mind and heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O righteous God.
