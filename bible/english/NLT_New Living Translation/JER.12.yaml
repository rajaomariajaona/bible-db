document_id: JER.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Questions the Lord’s Justice
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you always give me justice'
  - type: text
    content: when I bring a case before you.
  - type: text
    content: 'So let me bring you this complaint:'
  - type: text
    content: Why are the wicked so prosperous?
  - type: text
    content: Why are evil people so happy?
  '10':
  - type: text
    content: “Many rulers have ravaged my vineyard,
  - type: text
    content: trampling down the vines
  - type: text
    content: and turning all its beauty into a barren wilderness.
  '11':
  - type: text
    content: They have made it an empty wasteland;
  - type: text
    content: I hear its mournful cry.
  - type: text
    content: The whole land is desolate,
  - type: text
    content: and no one even cares.
  '12':
  - type: text
    content: On all the bare hilltops,
  - type: text
    content: destroying armies can be seen.
  - type: text
    content: 'The sword of the '
  - type: text
    content: Lord
  - type: text
    content: ' devours people'
  - type: text
    content: from one end of the nation to the other.
  - type: text
    content: No one will escape!
  '13':
  - type: text
    content: My people have planted wheat
  - type: text
    content: but are harvesting thorns.
  - type: text
    content: They have worn themselves out,
  - type: text
    content: but it has done them no good.
  - type: text
    content: They will harvest a crop of shame
  - type: text
    content: 'because of the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: A Message for Israel’s Neighbors
  '14':
  - type: text
    content: 'Now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “I will uproot from their land all the evil nations reaching out for the possession I gave my people Israel. And I will uproot Judah from among them. '
  '15':
  - type: text
    content: 'But afterward I will return and have compassion on all of them. I will bring them home to their own lands again, each nation to its own possession. '
  '16':
  - type: text
    content: 'And if these nations truly learn the ways of my people, and if they learn to swear by my name, saying, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives’ (just as they taught my people to swear by the name of Baal), then they will be given a place among my people. '
  '17':
  - type: text
    content: 'But any nation who refuses to obey me will be uprooted and destroyed. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: You have planted them,
  - type: text
    content: and they have taken root and prospered.
  - type: text
    content: Your name is on their lips,
  - type: text
    content: but you are far from their hearts.
  '3':
  - type: text
    content: 'But as for me, '
  - type: text
    content: Lord
  - type: text
    content: ', you know my heart.'
  - type: text
    content: You see me and test my thoughts.
  - type: text
    content: Drag these people away like sheep to be butchered!
  - type: text
    content: Set them aside to be slaughtered!
  '4':
  - type: text
    content: How long must this land mourn?
  - type: text
    content: Even the grass in the fields has withered.
  - type: text
    content: The wild animals and birds have disappeared
  - type: text
    content: because of the evil in the land.
  - type: text
    content: For the people have said,
  - type: text
    content: '“The '
  - type: text
    content: 'Lord '
  - type: text
    content: doesn’t see what’s ahead for us!”
  - type: heading
    content: The Lord’s Reply to Jeremiah
  '5':
  - type: text
    content: “If racing against mere men makes you tired,
  - type: text
    content: how will you race against horses?
  - type: text
    content: If you stumble and fall on open ground,
  - type: text
    content: what will you do in the thickets near the Jordan?
  '6':
  - type: text
    content: Even your brothers, members of your own family,
  - type: text
    content: have turned against you.
  - type: text
    content: They plot and raise complaints against you.
  - type: text
    content: Do not trust them,
  - type: text
    content: no matter how pleasantly they speak.
  '7':
  - type: text
    content: “I have abandoned my people, my special possession.
  - type: text
    content: I have surrendered my dearest ones to their enemies.
  '8':
  - type: text
    content: My chosen people have roared at me like a lion of the forest,
  - type: text
    content: so I have treated them with contempt.
  '9':
  - type: text
    content: My chosen people act like speckled vultures,
  - type: note
    content: Or speckled hyenas.
  - type: text
    content: but they themselves are surrounded by vultures.
  - type: text
    content: Bring on the wild animals to pick their corpses clean!
