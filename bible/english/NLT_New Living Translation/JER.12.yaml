document_id: JER.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jeremiah Questions the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Justice
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you always give me justice'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I bring a case before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So let me bring you this complaint:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are the wicked so prosperous?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why are evil people so happy?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Many rulers have ravaged my vineyard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trampling down the vines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turning all its beauty into a barren wilderness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They have made it an empty wasteland;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hear its mournful cry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole land is desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one even cares.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: On all the bare hilltops,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying armies can be seen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The sword of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' devours people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one end of the nation to the other.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will escape!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: My people have planted wheat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but are harvesting thorns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have worn themselves out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it has done them no good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will harvest a crop of shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because of the fierce anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Israel’s Neighbors
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “I will uproot from their land all the evil nations reaching out for the possession I gave my people Israel. And I will uproot Judah from among them. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But afterward I will return and have compassion on all of them. I will bring them home to their own lands again, each nation to its own possession. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if these nations truly learn the ways of my people, and if they learn to swear by my name, saying, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives’ (just as they taught my people to swear by the name of Baal), then they will be given a place among my people. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But any nation who refuses to obey me will be uprooted and destroyed. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have planted them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they have taken root and prospered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your name is on their lips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you are far from their hearts.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But as for me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you know my heart.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You see me and test my thoughts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drag these people away like sheep to be butchered!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Set them aside to be slaughtered!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: How long must this land mourn?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the grass in the fields has withered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wild animals and birds have disappeared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the evil in the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the people have said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: doesn’t see what’s ahead for us!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Reply to Jeremiah
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “If racing against mere men makes you tired,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how will you race against horses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you stumble and fall on open ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what will you do in the thickets near the Jordan?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Even your brothers, members of your own family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have turned against you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They plot and raise complaints against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not trust them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no matter how pleasantly they speak.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “I have abandoned my people, my special possession.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have surrendered my dearest ones to their enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: My chosen people have roared at me like a lion of the forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I have treated them with contempt.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My chosen people act like speckled vultures,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: speckled hyenas.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they themselves are surrounded by vultures.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring on the wild animals to pick their corpses clean!
