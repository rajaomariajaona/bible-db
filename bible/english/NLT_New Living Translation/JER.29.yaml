document_id: JER.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Letter to the Exiles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jeremiah wrote a letter from Jerusalem to the elders, priests, prophets, and all the people who had been exiled to Babylon by King Nebuchadnezzar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: This was after King Jehoiachin,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: ' the queen mother, the court officials, the other officials of Judah, and all the craftsmen and artisans had been deported from Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He sent the letter with Elasah son of Shaphan and Gemariah son of Hilkiah when they went to Babylon as King Zedekiah’s ambassadors to Nebuchadnezzar. This is what Jeremiah’s letter said:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says to all the captives he has exiled to Babylon from Jerusalem: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Build homes, and plan to stay. Plant gardens, and eat the food they produce. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Marry and have children. Then find spouses for them so that you may have many grandchildren. Multiply! Do not dwindle away! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And work for the peace and prosperity of the city where I sent you into exile. Pray to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for it, for its welfare will determine your welfare.”'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: “Do not let your prophets and fortune-tellers who are with you in the land of Babylon trick you. Do not listen to their dreams, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'because they are telling you lies in my name. I have not sent them,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “You will be in Babylon for seventy years. But then I will come and do for you all the good things I have promised, and I will bring you home again. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For I know the plans I have for you,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “They are plans for good and not for disaster, to give you a future and a hope. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In those days when you pray, I will listen. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If you look for me wholeheartedly, you will find me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will be found by you,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . “I will end your captivity and restore your fortunes. I will gather you out of the nations where I sent you and will bring you home again to your own land.”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You claim that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has raised up prophets for you in Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the king who sits on David’s throne and all those still living here in Jerusalem—your relatives who were not exiled to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says: “I will send war, famine, and disease upon them and make them like bad figs, too rotten to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yes, I will pursue them with war, famine, and disease, and I will scatter them around the world. In every nation where I send them, I will make them an object of damnation, horror, contempt, and mockery. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For they refuse to listen to me, though I have spoken to them repeatedly through the prophets I sent. And you who are in exile have not listened either,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore, listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all you captives there in Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says about your prophets—Ahab son of Kolaiah and Zedekiah son of Maaseiah—who are telling you lies in my name: “I will turn them over to Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' for execution before your eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Their terrible fate will become proverbial, so that the Judean exiles will curse someone by saying, ‘May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' make you like Zedekiah and Ahab, whom the king of Babylon burned alive!’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For these men have done terrible things among my people. They have committed adultery with their neighbors’ wives and have lied in my name, saying things I did not command. I am a witness to this. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Shemaiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent this message to Shemaiah the Nehelamite in Babylon: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: You wrote a letter on your own authority to Zephaniah son of Maaseiah, the priest, and you sent copies to the other priests and people in Jerusalem. You wrote to Zephaniah,'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has appointed you to replace Jehoiada as the priest in charge of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. You are responsible to put into stocks and neck irons any crazy man who claims to be a prophet. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So why have you done nothing to stop Jeremiah from Anathoth, who pretends to be a prophet among you? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Jeremiah sent a letter here to Babylon, predicting that our captivity will be a long one. He said, ‘Build homes, and plan to stay. Plant gardens, and eat the food they produce.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But when Zephaniah the priest received Shemaiah’s letter, he took it to Jeremiah and read it to him. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave this message to Jeremiah: '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Send an open letter to all the exiles in Babylon. Tell them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says concerning Shemaiah the Nehelamite: Since he has prophesied to you when I did not send him and has tricked you into believing his lies, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I will punish him and his family. None of his descendants will see the good things I will do for my people, for he has incited you to rebel against me. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
