document_id: 1KI.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Response to Solomon
  - type: text
    content: 'So Solomon finished building the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', as well as the royal palace. He completed everything he had planned to do. '
  '10':
  - type: text
    content: 'It took Solomon twenty years to build the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and his own royal palace. At the end of that time, '
  '11':
  - type: text
    content: 'he gave twenty towns in the land of Galilee to King Hiram of Tyre. (Hiram had previously provided all the cedar and cypress timber and gold that Solomon had requested.) '
  '12':
  - type: text
    content: 'But when Hiram came from Tyre to see the towns Solomon had given him, he was not at all pleased with them. '
  '13':
  - type: text
    content: '“What kind of towns are these, my brother?” he asked. So Hiram called that area Cabul (which means “worthless”), as it is still known today. '
  '14':
  - type: text
    content: Nevertheless, Hiram paid
  - type: note
    content: Or For Hiram had paid.
  - type: text
    content: ' Solomon 9,000 pounds'
  - type: note
    content: Hebrew 120 talents [4,000 kilograms].
  - type: text
    content: ' of gold.'
  - type: heading
    content: Solomon’s Many Achievements
  '15':
  - type: text
    content: 'This is the account of the forced labor that King Solomon conscripted to build the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple, the royal palace, the supporting terraces,
  - type: note
    content: Hebrew the millo; also in 9:24. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' the wall of Jerusalem, and the cities of Hazor, Megiddo, and Gezer. '
  '16':
  - type: text
    content: '(Pharaoh, the king of Egypt, had attacked and captured Gezer, killing the Canaanite population and burning it down. He gave the city to his daughter as a wedding gift when she married Solomon. '
  '17':
  - type: text
    content: 'So Solomon rebuilt the city of Gezer.) He also built up the towns of Lower Beth-horon, '
  '18':
  - type: text
    content: Baalath, and Tamar
  - type: note
    content: An alternate reading in the Masoretic Text reads Tadmor.
  - type: text
    content: ' in the wilderness within his land. '
  '19':
  - type: text
    content: He built towns as supply centers and constructed towns where his chariots and horses
  - type: note
    content: Or and charioteers.
  - type: text
    content: ' could be stationed. He built everything he desired in Jerusalem and Lebanon and throughout his entire realm.'
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Solomon a second time, as he had done before at Gibeon. '
  '20':
  - type: text
    content: 'There were still some people living in the land who were not Israelites, including Amorites, Hittites, Perizzites, Hivites, and Jebusites. '
  '21':
  - type: text
    content: These were descendants of the nations whom the people of Israel had not completely destroyed.
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' So Solomon conscripted them as slaves, and they serve as forced laborers to this day. '
  '22':
  - type: text
    content: 'But Solomon did not conscript any of the Israelites for forced labor. Instead, he assigned them to serve as fighting men, government officials, officers and captains in his army, commanders of his chariots, and charioteers. '
  '23':
  - type: text
    content: Solomon appointed 550 of them to supervise the people working on his various projects.
  '24':
  - type: text
    content: Solomon moved his wife, Pharaoh’s daughter, from the City of David to the new palace he had built for her. Then he constructed the supporting terraces.
  '25':
  - type: text
    content: 'Three times each year Solomon presented burnt offerings and peace offerings on the altar he had built for the '
  - type: text
    content: Lord
  - type: text
    content: '. He also burned incense to the '
  - type: text
    content: Lord
  - type: text
    content: . And so he finished the work of building the Temple.
  '26':
  - type: text
    content: King Solomon also built a fleet of ships at Ezion-geber, a port near Elath
  - type: note
    content: As in Greek version (see also 2 Kgs 14:22; 16:6); Hebrew reads Eloth, a variant spelling of Elath.
  - type: text
    content: ' in the land of Edom, along the shore of the Red Sea.'
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Hiram sent experienced crews of sailors to sail the ships with Solomon’s men. '
  '28':
  - type: text
    content: They sailed to Ophir and brought back to Solomon some sixteen tons
  - type: note
    content: Hebrew 420 talents [14 metric tons].
  - type: text
    content: ' of gold.'
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to him,'
  - type: text
    content: “I have heard your prayer and your petition. I have set this Temple apart to be holy—this place you have built where my name will be honored forever. I will always watch over it, for it is dear to my heart.
  '4':
  - type: text
    content: '“As for you, if you will follow me with integrity and godliness, as David your father did, obeying all my commands, decrees, and regulations, '
  '5':
  - type: text
    content: 'then I will establish the throne of your dynasty over Israel forever. For I made this promise to your father, David: ‘One of your descendants will always sit on the throne of Israel.’'
  '6':
  - type: text
    content: '“But if you or your descendants abandon me and disobey the commands and decrees I have given you, and if you serve and worship other gods, '
  '7':
  - type: text
    content: 'then I will uproot Israel from this land that I have given them. I will reject this Temple that I have made holy to honor my name. I will make Israel an object of mockery and ridicule among the nations. '
  '8':
  - type: text
    content: 'And though this Temple is impressive now, all who pass by will be appalled and will gasp in horror. They will ask, ‘Why did the '
  - type: text
    content: Lord
  - type: text
    content: ' do such terrible things to this land and to this Temple?’'
  '9':
  - type: text
    content: '“And the answer will be, ‘Because his people abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who brought their ancestors out of Egypt, and they worshiped other gods instead and bowed down to them. That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought all these disasters on them.’”'
  - type: heading
    content: Solomon’s Agreement with Hiram
