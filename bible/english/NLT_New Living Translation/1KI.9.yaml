document_id: 1KI.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Response to Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Solomon finished building the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as well as the royal palace. He completed everything he had planned to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to Solomon a second time, as he had done before at Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to him,'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “I have heard your prayer and your petition. I have set this Temple apart to be holy—this place you have built where my name will be honored forever. I will always watch over it, for it is dear to my heart.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“As for you, if you will follow me with integrity and godliness, as David your father did, obeying all my commands, decrees, and regulations, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'then I will establish the throne of your dynasty over Israel forever. For I made this promise to your father, David: ‘One of your descendants will always sit on the throne of Israel.’'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“But if you or your descendants abandon me and disobey the commands and decrees I have given you, and if you serve and worship other gods, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'then I will uproot Israel from this land that I have given them. I will reject this Temple that I have made holy to honor my name. I will make Israel an object of mockery and ridicule among the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And though this Temple is impressive now, all who pass by will be appalled and will gasp in horror. They will ask, ‘Why did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' do such terrible things to this land and to this Temple?’'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“And the answer will be, ‘Because his people abandoned the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, who brought their ancestors out of Egypt, and they worshiped other gods instead and bowed down to them. That is why the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought all these disasters on them.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Agreement with Hiram
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'It took Solomon twenty years to build the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and his own royal palace. At the end of that time, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'he gave twenty towns in the land of Galilee to King Hiram of Tyre. (Hiram had previously provided all the cedar and cypress timber and gold that Solomon had requested.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when Hiram came from Tyre to see the towns Solomon had given him, he was not at all pleased with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“What kind of towns are these, my brother?” he asked. So Hiram called that area Cabul (which means “worthless”), as it is still known today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nevertheless, Hiram paid
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:14a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For Hiram had paid.
    marker-yv: yv-n
  - type: text
    text: ' Solomon 9,000 pounds'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:14b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '120 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4,000 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of gold.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Many Achievements
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is the account of the forced labor that King Solomon conscripted to build the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple, the royal palace, the supporting terraces,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the millo; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 9:24. The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' the wall of Jerusalem, and the cities of Hazor, Megiddo, and Gezer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(Pharaoh, the king of Egypt, had attacked and captured Gezer, killing the Canaanite population and burning it down. He gave the city to his daughter as a wedding gift when she married Solomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Solomon rebuilt the city of Gezer.) He also built up the towns of Lower Beth-horon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Baalath, and Tamar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An alternate reading in the Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tadmor.
    marker-yv: yv-n
  - type: text
    text: ' in the wilderness within his land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He built towns as supply centers and constructed towns where his chariots and horses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and charioteers.
    marker-yv: yv-n
  - type: text
    text: ' could be stationed. He built everything he desired in Jerusalem and Lebanon and throughout his entire realm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'There were still some people living in the land who were not Israelites, including Amorites, Hittites, Perizzites, Hivites, and Jebusites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: These were descendants of the nations whom the people of Israel had not completely destroyed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' So Solomon conscripted them as slaves, and they serve as forced laborers to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Solomon did not conscript any of the Israelites for forced labor. Instead, he assigned them to serve as fighting men, government officials, officers and captains in his army, commanders of his chariots, and charioteers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Solomon appointed 550 of them to supervise the people working on his various projects.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Solomon moved his wife, Pharaoh’s daughter, from the City of David to the new palace he had built for her. Then he constructed the supporting terraces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Three times each year Solomon presented burnt offerings and peace offerings on the altar he had built for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He also burned incense to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . And so he finished the work of building the Temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: King Solomon also built a fleet of ships at Ezion-geber, a port near Elath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:26a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 2 Kgs 14:22; 16:6); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eloth, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Elath.
    marker-yv: yv-n
  - type: text
    text: ' in the land of Edom, along the shore of the Red Sea.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:26b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sea of reeds.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hiram sent experienced crews of sailors to sail the ships with Solomon’s men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They sailed to Ophir and brought back to Solomon some sixteen tons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '420 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[14 metric tons].'
    marker-yv: yv-n
  - type: text
    text: ' of gold.'
