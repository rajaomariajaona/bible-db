document_id: PSA.145,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; each verse (including 13b) begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: A psalm of praise of David.
  - type: text
    content: I will exalt you, my God and King,
  - type: text
    content: and praise your name forever and ever.
  '10':
  - type: text
    content: 'All of your works will thank you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and your faithful followers will praise you.
  '11':
  - type: text
    content: They will speak of the glory of your kingdom;
  - type: text
    content: they will give examples of your power.
  '12':
  - type: text
    content: They will tell about your mighty deeds
  - type: text
    content: and about the majesty and glory of your reign.
  '13':
  - type: text
    content: For your kingdom is an everlasting kingdom.
  - type: text
    content: You rule throughout all generations.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' always keeps his promises;'
  - type: text
    content: he is gracious in all he does.
  - type: note
    content: As in Dead Sea Scrolls and Greek and Syriac versions; the Masoretic Text lacks the final two lines of this verse.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' helps the fallen'
  - type: text
    content: and lifts those bent beneath their loads.
  '15':
  - type: text
    content: The eyes of all look to you in hope;
  - type: text
    content: you give them their food as they need it.
  '16':
  - type: text
    content: When you open your hand,
  - type: text
    content: you satisfy the hunger and thirst of every living thing.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous in everything he does;'
  - type: text
    content: he is filled with kindness.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is close to all who call on him,'
  - type: text
    content: yes, to all who call on him in truth.
  '19':
  - type: text
    content: He grants the desires of those who fear him;
  - type: text
    content: he hears their cries for help and rescues them.
  '2':
  - type: text
    content: I will praise you every day;
  - type: text
    content: yes, I will praise you forever.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' protects all those who love him,'
  - type: text
    content: but he destroys the wicked.
  '21':
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and may everyone on earth bless his holy name
  - type: text
    content: forever and ever.
  '3':
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: '! He is most worthy of praise!'
  - type: text
    content: No one can measure his greatness.
  '4':
  - type: text
    content: Let each generation tell its children of your mighty acts;
  - type: text
    content: let them proclaim your power.
  '5':
  - type: text
    content: I will meditate on your majestic, glorious splendor
  - type: text
    content: and your wonderful miracles.
  '6':
  - type: text
    content: Your awe-inspiring deeds will be on every tongue;
  - type: text
    content: I will proclaim your greatness.
  '7':
  - type: text
    content: Everyone will share the story of your wonderful goodness;
  - type: text
    content: they will sing with joy about your righteousness.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is merciful and compassionate,'
  - type: text
    content: slow to get angry and filled with unfailing love.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good to everyone.'
  - type: text
    content: He showers compassion on all his creation.
