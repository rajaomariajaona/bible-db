document_id: PSA.145,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is a Hebrew acrostic poem; each verse (including 13b) begins with a successive letter of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: A psalm of praise of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I will exalt you, my God and King,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and praise your name forever and ever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All of your works will thank you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your faithful followers will praise you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They will speak of the glory of your kingdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will give examples of your power.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They will tell about your mighty deeds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and about the majesty and glory of your reign.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For your kingdom is an everlasting kingdom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You rule throughout all generations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' always keeps his promises;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is gracious in all he does.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Dead Sea Scrolls and Greek and Syriac versions; the Masoretic Text lacks the final two lines of this verse.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helps the fallen'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lifts those bent beneath their loads.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The eyes of all look to you in hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you give them their food as they need it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When you open your hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you satisfy the hunger and thirst of every living thing.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is righteous in everything he does;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is filled with kindness.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is close to all who call on him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, to all who call on him in truth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He grants the desires of those who fear him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he hears their cries for help and rescues them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will praise you every day;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, I will praise you forever.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' protects all those who love him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he destroys the wicked.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may everyone on earth bless his holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forever and ever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! He is most worthy of praise!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one can measure his greatness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Let each generation tell its children of your mighty acts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them proclaim your power.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I will meditate on your majestic, glorious splendor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your wonderful miracles.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your awe-inspiring deeds will be on every tongue;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will proclaim your greatness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Everyone will share the story of your wonderful goodness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will sing with joy about your righteousness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is merciful and compassionate,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slow to get angry and filled with unfailing love.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good to everyone.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He showers compassion on all his creation.
