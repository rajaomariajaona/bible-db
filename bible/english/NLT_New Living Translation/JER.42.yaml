document_id: JER.42,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to Stay in Judah
  - type: text
    content: Then all the military leaders, including Johanan son of Kareah and Jezaniah
  - type: note
    content: Greek version reads Azariah; compare 43:2.
  - type: text
    content: ' son of Hoshaiah, and all the people, from the least to the greatest, approached '
  '10':
  - type: text
    content: '‘Stay here in this land. If you do, I will build you up and not tear you down; I will plant you and not uproot you. For I am sorry about all the punishment I have had to bring upon you. '
  '11':
  - type: text
    content: 'Do not fear the king of Babylon anymore,’ says the '
  - type: text
    content: Lord
  - type: text
    content: '. ‘For I am with you and will save you and rescue you from his power. '
  '12':
  - type: text
    content: I will be merciful to you by making him kind, so he will let you stay here in your land.’
  '13':
  - type: text
    content: '“But if you refuse to obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and if you say, ‘We will not stay here; '
  '14':
  - type: text
    content: 'instead, we will go to Egypt where we will be free from war, the call to arms, and hunger,’ '
  '15':
  - type: text
    content: 'then hear the '
  - type: text
    content: Lord
  - type: text
    content: '’s message to the remnant of Judah. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘If you are determined to go to Egypt and live there, '
  '16':
  - type: text
    content: 'the very war and famine you fear will catch up to you, and you will die there. '
  '17':
  - type: text
    content: That is the fate awaiting every one of you who insists on going to live in Egypt. Yes, you will die from war, famine, and disease. None of you will escape the disaster I will bring upon you there.’
  '18':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘Just as my anger and fury have been poured out on the people of Jerusalem, so they will be poured out on you when you enter Egypt. You will be an object of damnation, horror, cursing, and mockery. And you will never see your homeland again.’'
  '19':
  - type: text
    content: '“Listen, you remnant of Judah. The '
  - type: text
    content: Lord
  - type: text
    content: ' has told you: ‘Do not go to Egypt!’ Don’t forget this warning I have given you today. '
  '2':
  - type: text
    content: 'Jeremiah the prophet. They said, “Please pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for us. As you can see, we are only a tiny remnant compared to what we were before. '
  '20':
  - type: text
    content: 'For you were not being honest when you sent me to pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for you. You said, ‘Just tell us what the '
  - type: text
    content: Lord
  - type: text
    content: ' our God says, and we will do it!’ '
  '21':
  - type: text
    content: 'And today I have told you exactly what he said, but you will not obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God any better now than you have in the past. '
  '22':
  - type: text
    content: So you can be sure that you will die from war, famine, and disease in Egypt, where you insist on going.”
  '3':
  - type: text
    content: 'Pray that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will show us what to do and where to go.”'
  '4':
  - type: text
    content: '“All right,” Jeremiah replied. “I will pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as you have asked, and I will tell you everything he says. I will hide nothing from you.”'
  '5':
  - type: text
    content: 'Then they said to Jeremiah, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God be a faithful witness against us if we refuse to obey whatever he tells us to do! '
  '6':
  - type: text
    content: 'Whether we like it or not, we will obey the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to whom we are sending you with our plea. For if we obey him, everything will turn out well for us.”'
  '7':
  - type: text
    content: 'Ten days later the '
  - type: text
    content: Lord
  - type: text
    content: ' gave his reply to Jeremiah. '
  '8':
  - type: text
    content: 'So he called for Johanan son of Kareah and the other military leaders, and for all the people, from the least to the greatest. '
  '9':
  - type: text
    content: 'He said to them, “You sent me to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with your request, and this is his reply: '
