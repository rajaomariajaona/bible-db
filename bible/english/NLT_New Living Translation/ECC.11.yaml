document_id: ECC.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Uncertainties of Life
  - type: text
    content: Send your grain across the seas,
  - type: text
    content: and in time, profits will flow back to you.
  - type: note
    content: Or Give generously, / for your gifts will return to you later. Hebrew reads Throw your bread on the waters, / for after many days you will find it again.
  '10':
  - type: text
    content: So refuse to worry, and keep your body healthy. But remember that youth, with a whole life before you, is meaningless.
  '2':
  - type: text
    content: But divide your investments among many places,
  - type: note
    content: Hebrew among seven or even eight.
  - type: text
    content: for you do not know what risks might lie ahead.
  '3':
  - type: text
    content: When clouds are heavy, the rains come down.
  - type: text
    content: Whether a tree falls north or south, it stays where it falls.
  '4':
  - type: text
    content: Farmers who wait for perfect weather never plant.
  - type: text
    content: If they watch every cloud, they never harvest.
  '5':
  - type: text
    content: Just as you cannot understand the path of the wind or the mystery of a tiny baby growing in its mother’s womb,
  - type: note
    content: Some manuscripts read Just as you cannot understand how breath comes to a tiny baby in its mother’s womb.
  - type: text
    content: ' so you cannot understand the activity of God, who does all things.'
  '6':
  - type: text
    content: Plant your seed in the morning and keep busy all afternoon, for you don’t know if profit will come from one activity or another—or maybe both.
  - type: heading
    content: Advice for Young and Old
  '7':
  - type: text
    content: Light is sweet; how pleasant to see a new day dawning.
  '8':
  - type: text
    content: When people live to be very old, let them rejoice in every day of life. But let them also remember there will be many dark days. Everything still to come is meaningless.
  '9':
  - type: text
    content: Young people,
  - type: note
    content: Hebrew Young man.
  - type: text
    content: ' it’s wonderful to be young! Enjoy every minute of it. Do everything you want to do; take it all in. But remember that you must give an account to God for everything you do. '
