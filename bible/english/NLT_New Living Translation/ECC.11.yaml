document_id: ECC.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Uncertainties of Life
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send your grain across the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in time, profits will flow back to you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Give generously, / for your gifts will return to you later. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Throw your bread on the waters, / for after many days you will find it again.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So refuse to worry, and keep your body healthy. But remember that youth, with a whole life before you, is meaningless.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But divide your investments among many places,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: among seven or even eight.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you do not know what risks might lie ahead.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When clouds are heavy, the rains come down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whether a tree falls north or south, it stays where it falls.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Farmers who wait for perfect weather never plant.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If they watch every cloud, they never harvest.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Just as you cannot understand the path of the wind or the mystery of a tiny baby growing in its mother’s womb,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Just as you cannot understand how breath comes to a tiny baby in its mother’s womb.
      marker-yv: yv-n
    - type: text
      text: ' so you cannot understand the activity of God, who does all things.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plant your seed in the morning and keep busy all afternoon, for you don’t know if profit will come from one activity or another—or maybe both.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Advice for Young and Old
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Light is sweet; how pleasant to see a new day dawning.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When people live to be very old, let them rejoice in every day of life. But let them also remember there will be many dark days. Everything still to come is meaningless.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Young people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Young man.
      marker-yv: yv-n
    - type: text
      text: ' it’s wonderful to be young! Enjoy every minute of it. Do everything you want to do; take it all in. But remember that you must give an account to God for everything you do. '
