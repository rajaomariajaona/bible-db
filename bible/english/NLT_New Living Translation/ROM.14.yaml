document_id: ROM.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Danger of Criticism
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Accept other believers who are weak in faith, and don’t argue with them about what they think is right or wrong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For instance, one person believes it’s all right to eat anything. But another believer with a sensitive conscience will eat only vegetables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Those who feel free to eat anything must not look down on those who don’t. And those who don’t eat certain foods must not condemn those who do, for God has accepted them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who are you to condemn someone else’s servants? Their own master will judge whether they stand or fall. And with the Lord’s help, they will stand and receive his approval.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In the same way, some think one day is more holy than another day, while others think every day is alike. You should each be fully convinced that whichever day you choose is acceptable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Those who worship the Lord on a special day do it to honor him. Those who eat any kind of food do so to honor the Lord, since they give thanks to God before eating. And those who refuse to eat certain foods also want to please the Lord and give thanks to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For we don’t live for ourselves or die for ourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If we live, it’s to honor the Lord. And if we die, it’s to honor the Lord. So whether we live or die, we belong to the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Christ died and rose again for this very purpose—to be Lord both of the living and of the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So why do you condemn another believer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'your brother; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:10b, 13, 15, 21.
    marker-yv: yv-n
  - type: text
    text: '? Why do you look down on another believer? Remember, we will all stand before the judgment seat of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“‘As surely as I live,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘every knee will bend to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every tongue will declare allegiance to God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'declare praise for God. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 49:18; 45:23 (Greek version).
    marker-yv: yv-n
  - type: text
    text: ’”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yes, each of us will give a personal account to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So let’s stop condemning each other. Decide instead to live in such a way that you will not cause another believer to stumble and fall.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I know and am convinced on the authority of the Lord Jesus that no food, in and of itself, is wrong to eat. But if someone believes it is wrong, then for that person it is wrong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And if another believer is distressed by what you eat, you are not acting in love if you eat it. Don’t let your eating ruin someone for whom Christ died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then you will not be criticized for doing something you believe is good. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the Kingdom of God is not a matter of what we eat or drink, but of living a life of goodness and peace and joy in the Holy Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If you serve Christ with this attitude, you will please God, and others will approve of you, too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So then, let us aim for harmony in the church and try to build each other up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Don’t tear apart the work of God over what you eat. Remember, all foods are acceptable, but it is wrong to eat something if it makes another person stumble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is better not to eat meat or drink wine or do anything else if it might cause another believer to stumble.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to stumble or be offended or be weakened.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You may believe there’s nothing wrong with what you are doing, but keep it between yourself and God. Blessed are those who don’t feel guilty for doing something they have decided is right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But if you have doubts about whether or not you should eat something, you are sinning if you go ahead and do it. For you are not following your convictions. If you do anything you believe is not right, you are sinning.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts place the text of 16:25-27 here.
    marker-yv: yv-n
