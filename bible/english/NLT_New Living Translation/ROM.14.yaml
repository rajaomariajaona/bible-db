document_id: ROM.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Danger of Criticism
  - type: text
    content: 'Accept other believers who are weak in faith, and don’t argue with them about what they think is right or wrong. '
  '10':
  - type: text
    content: So why do you condemn another believer
  - type: note
    content: Greek your brother; also in 14:10b, 13, 15, 21.
  - type: text
    content: '? Why do you look down on another believer? Remember, we will all stand before the judgment seat of God. '
  '11':
  - type: text
    content: For the Scriptures say,
  - type: text
    content: '“‘As surely as I live,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ‘every knee will bend to me,
  - type: text
    content: and every tongue will declare allegiance to God.
  - type: note
    content: Or declare praise for God. Isa 49:18; 45:23 (Greek version).
  - type: text
    content: ’”
  '12':
  - type: text
    content: 'Yes, each of us will give a personal account to God. '
  '13':
  - type: text
    content: So let’s stop condemning each other. Decide instead to live in such a way that you will not cause another believer to stumble and fall.
  '14':
  - type: text
    content: 'I know and am convinced on the authority of the Lord Jesus that no food, in and of itself, is wrong to eat. But if someone believes it is wrong, then for that person it is wrong. '
  '15':
  - type: text
    content: 'And if another believer is distressed by what you eat, you are not acting in love if you eat it. Don’t let your eating ruin someone for whom Christ died. '
  '16':
  - type: text
    content: 'Then you will not be criticized for doing something you believe is good. '
  '17':
  - type: text
    content: 'For the Kingdom of God is not a matter of what we eat or drink, but of living a life of goodness and peace and joy in the Holy Spirit. '
  '18':
  - type: text
    content: 'If you serve Christ with this attitude, you will please God, and others will approve of you, too. '
  '19':
  - type: text
    content: So then, let us aim for harmony in the church and try to build each other up.
  '2':
  - type: text
    content: 'For instance, one person believes it’s all right to eat anything. But another believer with a sensitive conscience will eat only vegetables. '
  '20':
  - type: text
    content: 'Don’t tear apart the work of God over what you eat. Remember, all foods are acceptable, but it is wrong to eat something if it makes another person stumble. '
  '21':
  - type: text
    content: It is better not to eat meat or drink wine or do anything else if it might cause another believer to stumble.
  - type: note
    content: Some manuscripts read to stumble or be offended or be weakened.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'You may believe there’s nothing wrong with what you are doing, but keep it between yourself and God. Blessed are those who don’t feel guilty for doing something they have decided is right. '
  '23':
  - type: text
    content: But if you have doubts about whether or not you should eat something, you are sinning if you go ahead and do it. For you are not following your convictions. If you do anything you believe is not right, you are sinning.
  - type: note
    content: Some manuscripts place the text of 16:25-27 here.
  '3':
  - type: text
    content: 'Those who feel free to eat anything must not look down on those who don’t. And those who don’t eat certain foods must not condemn those who do, for God has accepted them. '
  '4':
  - type: text
    content: Who are you to condemn someone else’s servants? Their own master will judge whether they stand or fall. And with the Lord’s help, they will stand and receive his approval.
  '5':
  - type: text
    content: 'In the same way, some think one day is more holy than another day, while others think every day is alike. You should each be fully convinced that whichever day you choose is acceptable. '
  '6':
  - type: text
    content: 'Those who worship the Lord on a special day do it to honor him. Those who eat any kind of food do so to honor the Lord, since they give thanks to God before eating. And those who refuse to eat certain foods also want to please the Lord and give thanks to God. '
  '7':
  - type: text
    content: 'For we don’t live for ourselves or die for ourselves. '
  '8':
  - type: text
    content: 'If we live, it’s to honor the Lord. And if we die, it’s to honor the Lord. So whether we live or die, we belong to the Lord. '
  '9':
  - type: text
    content: Christ died and rose again for this very purpose—to be Lord both of the living and of the dead.
