document_id: ACT.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Appears before Felix
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Five days later Ananias, the high priest, arrived with some of the Jewish elders and the lawyer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: some elders and an orator.
    marker-yv: yv-n
  - type: text
    text: ' Tertullus, to present their case against Paul to the governor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Paul was called in, Tertullus presented the charges against Paul in the following address to the governor:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“You have provided a long period of peace for us Jews and with foresight have enacted reforms for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For all of this, Your Excellency, we are very grateful to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But I don’t want to bore you, so please give me your attention for only a moment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We have found this man to be a troublemaker who is constantly stirring up riots among the Jews all over the world. He is a ringleader of the cult known as the Nazarenes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Furthermore, he was trying to desecrate the Temple when we arrested him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add an expanded conclusion to verse 6, all of verse 7, and an additional phrase in verse 8: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'We would have judged him by our law, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'but Lysias, the commander of the garrison, came and violently took him away from us, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: commanding his accusers to come before you.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You can find out the truth of our accusations by examining him yourself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the other Jews chimed in, declaring that everything Tertullus said was true.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The governor then motioned for Paul to speak. Paul said, “I know, sir, that you have been a judge of Jewish affairs for many years, so I gladly present my defense before you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You can quickly discover that I arrived in Jerusalem no more than twelve days ago to worship at the Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'My accusers never found me arguing with anyone in the Temple, nor stirring up a riot in any synagogue or on the streets of the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: These men cannot prove the things they accuse me of doing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But I admit that I follow the Way, which they call a cult. I worship the God of our ancestors, and I firmly believe the Jewish law and everything written in the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I have the same hope in God that these men have, that he will raise both the righteous and the unrighteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Because of this, I always try to maintain a clear conscience before God and all people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“After several years away, I returned to Jerusalem with money to aid my people and to offer sacrifices to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'My accusers saw me in the Temple as I was completing a purification ceremony. There was no crowd around me and no rioting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But some Jews from the province of Asia were there—and they ought to be here to bring charges if they have anything against me! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ask these men here what crime the Jewish high council
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sanhedrin.
    marker-yv: yv-n
  - type: text
    text: ' found me guilty of, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: except for the one time I shouted out, ‘I am on trial before you today because I believe in the resurrection of the dead!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'At that point Felix, who was quite familiar with the Way, adjourned the hearing and said, “Wait until Lysias, the garrison commander, arrives. Then I will decide the case.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He ordered an officer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a centurion.
    marker-yv: yv-n
  - type: text
    text: ' to keep Paul in custody but to give him some freedom and allow his friends to visit him and take care of his needs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A few days later Felix came back with his wife, Drusilla, who was Jewish. Sending for Paul, they listened as he told them about faith in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As he reasoned with them about righteousness and self-control and the coming day of judgment, Felix became frightened. “Go away for now,” he replied. “When it is more convenient, I’ll call for you again.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He also hoped that Paul would bribe him, so he sent for him quite often and talked with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: After two years went by in this way, Felix was succeeded by Porcius Festus. And because Felix wanted to gain favor with the Jewish people, he left Paul in prison.
