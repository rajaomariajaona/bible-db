document_id: ACT.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Appears before Felix
  - type: text
    content: Five days later Ananias, the high priest, arrived with some of the Jewish elders and the lawyer
  - type: note
    content: Greek some elders and an orator.
  - type: text
    content: ' Tertullus, to present their case against Paul to the governor. '
  '10':
  - type: text
    content: 'The governor then motioned for Paul to speak. Paul said, “I know, sir, that you have been a judge of Jewish affairs for many years, so I gladly present my defense before you. '
  '11':
  - type: text
    content: 'You can quickly discover that I arrived in Jerusalem no more than twelve days ago to worship at the Temple. '
  '12':
  - type: text
    content: 'My accusers never found me arguing with anyone in the Temple, nor stirring up a riot in any synagogue or on the streets of the city. '
  '13':
  - type: text
    content: These men cannot prove the things they accuse me of doing.
  '14':
  - type: text
    content: '“But I admit that I follow the Way, which they call a cult. I worship the God of our ancestors, and I firmly believe the Jewish law and everything written in the prophets. '
  '15':
  - type: text
    content: 'I have the same hope in God that these men have, that he will raise both the righteous and the unrighteous. '
  '16':
  - type: text
    content: Because of this, I always try to maintain a clear conscience before God and all people.
  '17':
  - type: text
    content: '“After several years away, I returned to Jerusalem with money to aid my people and to offer sacrifices to God. '
  '18':
  - type: text
    content: 'My accusers saw me in the Temple as I was completing a purification ceremony. There was no crowd around me and no rioting. '
  '19':
  - type: text
    content: 'But some Jews from the province of Asia were there—and they ought to be here to bring charges if they have anything against me! '
  '2':
  - type: text
    content: 'When Paul was called in, Tertullus presented the charges against Paul in the following address to the governor:'
  - type: text
    content: '“You have provided a long period of peace for us Jews and with foresight have enacted reforms for us. '
  '20':
  - type: text
    content: Ask these men here what crime the Jewish high council
  - type: note
    content: Greek Sanhedrin.
  - type: text
    content: ' found me guilty of, '
  '21':
  - type: text
    content: except for the one time I shouted out, ‘I am on trial before you today because I believe in the resurrection of the dead!’”
  '22':
  - type: text
    content: 'At that point Felix, who was quite familiar with the Way, adjourned the hearing and said, “Wait until Lysias, the garrison commander, arrives. Then I will decide the case.” '
  '23':
  - type: text
    content: He ordered an officer
  - type: note
    content: Greek a centurion.
  - type: text
    content: ' to keep Paul in custody but to give him some freedom and allow his friends to visit him and take care of his needs.'
  '24':
  - type: text
    content: 'A few days later Felix came back with his wife, Drusilla, who was Jewish. Sending for Paul, they listened as he told them about faith in Christ Jesus. '
  '25':
  - type: text
    content: 'As he reasoned with them about righteousness and self-control and the coming day of judgment, Felix became frightened. “Go away for now,” he replied. “When it is more convenient, I’ll call for you again.” '
  '26':
  - type: text
    content: He also hoped that Paul would bribe him, so he sent for him quite often and talked with him.
  '27':
  - type: text
    content: After two years went by in this way, Felix was succeeded by Porcius Festus. And because Felix wanted to gain favor with the Jewish people, he left Paul in prison.
  '3':
  - type: text
    content: 'For all of this, Your Excellency, we are very grateful to you. '
  '4':
  - type: text
    content: 'But I don’t want to bore you, so please give me your attention for only a moment. '
  '5':
  - type: text
    content: 'We have found this man to be a troublemaker who is constantly stirring up riots among the Jews all over the world. He is a ringleader of the cult known as the Nazarenes. '
  '6':
  - type: text
    content: Furthermore, he was trying to desecrate the Temple when we arrested him.
  - type: note
    content: 'Some manuscripts add an expanded conclusion to verse 6, all of verse 7, and an additional phrase in verse 8: We would have judged him by our law, 7but Lysias, the commander of the garrison, came and violently took him away from us, 8commanding his accusers to come before you.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'You can find out the truth of our accusations by examining him yourself.” '
  '9':
  - type: text
    content: Then the other Jews chimed in, declaring that everything Tertullus said was true.
