document_id: 1KI.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds the Temple
  - type: text
    content: It was in midspring, in the month of Ziv,
  - type: note
    content: Hebrew It was in the month of Ziv, which is the second month. This month of the ancient Hebrew lunar calendar usually occurs within the months of April and May.
  - type: text
    content: ' during the fourth year of Solomon’s reign, that he began to construct the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: . This was 480 years after the people of Israel were rescued from their slavery in the land of Egypt.
  '10':
  - type: text
    content: As already stated, he built a complex of rooms along the sides of the building, attached to the Temple walls by cedar timbers. Each story of the complex was 7-1/2 feet
  - type: note
    content: Hebrew 5 cubits [2.3 meters].
  - type: text
    content: ' high.'
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Solomon: '
  '12':
  - type: text
    content: '“Concerning this Temple you are building, if you keep all my decrees and regulations and obey all my commands, I will fulfill through you the promise I made to your father, David. '
  '13':
  - type: text
    content: I will live among the Israelites and will never abandon my people Israel.”
  - type: heading
    content: The Temple’s Interior
  '14':
  - type: text
    content: 'So Solomon finished building the Temple. '
  '15':
  - type: text
    content: 'The entire inside, from floor to ceiling, was paneled with wood. He paneled the walls and ceilings with cedar, and he used planks of cypress for the floors. '
  '16':
  - type: text
    content: 'He partitioned off an inner sanctuary—the Most Holy Place—at the far end of the Temple. It was 30 feet deep and was paneled with cedar from floor to ceiling. '
  '17':
  - type: text
    content: The main room of the Temple, outside the Most Holy Place, was 60 feet
  - type: note
    content: Hebrew 40 cubits [18.4 meters].
  - type: text
    content: ' long. '
  '18':
  - type: text
    content: Cedar paneling completely covered the stone walls throughout the Temple, and the paneling was decorated with carvings of gourds and open flowers.
  '19':
  - type: text
    content: 'He prepared the inner sanctuary at the far end of the Temple, where the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant would be placed. '
  '2':
  - type: text
    content: 'The Temple that King Solomon built for the '
  - type: text
    content: Lord
  - type: text
    content: ' was 90 feet long, 30 feet wide, and 45 feet high.'
  - type: note
    content: Hebrew 60 cubits [27.6 meters] long, 20 cubits [9.2 meters] wide, and 30 cubits [13.8 meters] high.
  - type: text
    content: ' '
  '20':
  - type: text
    content: This inner sanctuary was 30 feet long, 30 feet wide, and 30 feet high. He overlaid the inside with solid gold. He also overlaid the altar made of cedar.
  - type: note
    content: Or overlaid the altar with cedar. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then Solomon overlaid the rest of the Temple’s interior with solid gold, and he made gold chains to protect the entrance
  - type: note
    content: Or to draw curtains across. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' to the Most Holy Place. '
  '22':
  - type: text
    content: So he finished overlaying the entire Temple with gold, including the altar that belonged to the Most Holy Place.
  '23':
  - type: text
    content: He made two cherubim of wild olive
  - type: note
    content: Or pine; Hebrew reads oil tree; also in 6:31, 33.
  - type: text
    content: ' wood, each 15 feet'
  - type: note
    content: Hebrew 10 cubits [4.6 meters]; also in 6:24, 26.
  - type: text
    content: ' tall, and placed them in the inner sanctuary. '
  '24':
  - type: text
    content: The wingspan of each of the cherubim was 15 feet, each wing being 7-1/2 feet
  - type: note
    content: Hebrew 5 cubits [2.3 meters].
  - type: text
    content: ' long. '
  '25':
  - type: text
    content: 'The two cherubim were identical in shape and size; '
  '26':
  - type: text
    content: 'each was 15 feet tall. '
  '27':
  - type: text
    content: 'He placed them side by side in the inner sanctuary of the Temple. Their outspread wings reached from wall to wall, while their inner wings touched at the center of the room. '
  '28':
  - type: text
    content: He overlaid the two cherubim with gold.
  '29':
  - type: text
    content: 'He decorated all the walls of the inner sanctuary and the main room with carvings of cherubim, palm trees, and open flowers. '
  '3':
  - type: text
    content: The entry room at the front of the Temple was 30 feet
  - type: note
    content: Hebrew 20 cubits [9.2 meters]; also in 6:16, 20.
  - type: text
    content: ' wide, running across the entire width of the Temple. It projected outward 15 feet'
  - type: note
    content: Hebrew 10 cubits [4.6 meters].
  - type: text
    content: ' from the front of the Temple. '
  '30':
  - type: text
    content: He overlaid the floor in both rooms with gold.
  '31':
  - type: text
    content: For the entrance to the inner sanctuary, he made double doors of wild olive wood with five-sided doorposts.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '32':
  - type: text
    content: These double doors were decorated with carvings of cherubim, palm trees, and open flowers. The doors, including the decorations of cherubim and palm trees, were overlaid with gold.
  '33':
  - type: text
    content: 'Then he made four-sided doorposts of wild olive wood for the entrance to the Temple. '
  '34':
  - type: text
    content: 'There were two folding doors of cypress wood, and each door was hinged to fold back upon itself. '
  '35':
  - type: text
    content: These doors were decorated with carvings of cherubim, palm trees, and open flowers—all overlaid evenly with gold.
  '36':
  - type: text
    content: The walls of the inner courtyard were built so that there was one layer of cedar beams between every three layers of finished stone.
  '37':
  - type: text
    content: 'The foundation of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple was laid in midspring, in the month of Ziv,
  - type: note
    content: Hebrew was laid in the month of Ziv. This month of the ancient Hebrew lunar calendar usually occurs within the months of April and May.
  - type: text
    content: ' during the fourth year of Solomon’s reign. '
  '38':
  - type: text
    content: The entire building was completed in every detail by midautumn, in the month of Bul,
  - type: note
    content: Hebrew by the month of Bul, which is the eighth month. This month of the ancient Hebrew lunar calendar usually occurs within the months of October and November.
  - type: text
    content: ' during the eleventh year of his reign. So it took seven years to build the Temple.'
  '4':
  - type: text
    content: Solomon also made narrow recessed windows throughout the Temple.
  '5':
  - type: text
    content: 'He built a complex of rooms against the outer walls of the Temple, all the way around the sides and rear of the building. '
  '6':
  - type: text
    content: The complex was three stories high, the bottom floor being 7-1/2 feet wide, the second floor 9 feet wide, and the top floor 10-1/2 feet wide.
  - type: note
    content: Hebrew the bottom floor being 5 cubits [2.3 meters] wide, the second floor 6 cubits [2.8 meters] wide, and the top floor 7 cubits [3.2 meters] wide.
  - type: text
    content: ' The rooms were connected to the walls of the Temple by beams resting on ledges built out from the wall. So the beams were not inserted into the walls themselves.'
  '7':
  - type: text
    content: The stones used in the construction of the Temple were finished at the quarry, so there was no sound of hammer, ax, or any other iron tool at the building site.
  '8':
  - type: text
    content: The entrance to the bottom floor
  - type: note
    content: As in Greek version; Hebrew reads middle floor.
  - type: text
    content: ' was on the south side of the Temple. There were winding stairs going up to the second floor, and another flight of stairs between the second and third floors. '
  '9':
  - type: text
    content: 'After completing the Temple structure, Solomon put in a ceiling made of cedar beams and planks. '
