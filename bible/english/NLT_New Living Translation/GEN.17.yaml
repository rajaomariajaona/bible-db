document_id: GEN.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Is Named Abraham
  - type: text
    content: 'When Abram was ninety-nine years old, the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him and said, “I am El-Shaddai—‘God Almighty.’ Serve me faithfully and live a blameless life. '
  '10':
  - type: text
    content: 'This is the covenant that you and your descendants must keep: Each male among you must be circumcised. '
  '11':
  - type: text
    content: 'You must cut off the flesh of your foreskin as a sign of the covenant between me and you. '
  '12':
  - type: text
    content: 'From generation to generation, every male child must be circumcised on the eighth day after his birth. This applies not only to members of your family but also to the servants born in your household and the foreign-born servants whom you have purchased. '
  '13':
  - type: text
    content: 'All must be circumcised. Your bodies will bear the mark of my everlasting covenant. '
  '14':
  - type: text
    content: Any male who fails to be circumcised will be cut off from the covenant family for breaking the covenant.”
  - type: heading
    content: Sarai Is Named Sarah
  '15':
  - type: text
    content: Then God said to Abraham, “Regarding Sarai, your wife—her name will no longer be Sarai. From now on her name will be Sarah.
  - type: note
    content: Sarai and Sarah both mean “princess”; the change in spelling may reflect the difference in dialect between Ur and Canaan.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And I will bless her and give you a son from her! Yes, I will bless her richly, and she will become the mother of many nations. Kings of nations will be among her descendants.”
  '17':
  - type: text
    content: 'Then Abraham bowed down to the ground, but he laughed to himself in disbelief. “How could I become a father at the age of 100?” he thought. “And how can Sarah have a baby when she is ninety years old?” '
  '18':
  - type: text
    content: So Abraham said to God, “May Ishmael live under your special blessing!”
  '19':
  - type: text
    content: But God replied, “No—Sarah, your wife, will give birth to a son for you. You will name him Isaac,
  - type: note
    content: Isaac means “he laughs.”
  - type: text
    content: ' and I will confirm my covenant with him and his descendants as an everlasting covenant. '
  '2':
  - type: text
    content: I will make a covenant with you, by which I will guarantee to give you countless descendants.”
  '20':
  - type: text
    content: 'As for Ishmael, I will bless him also, just as you have asked. I will make him extremely fruitful and multiply his descendants. He will become the father of twelve princes, and I will make him a great nation. '
  '21':
  - type: text
    content: 'But my covenant will be confirmed with Isaac, who will be born to you and Sarah about this time next year.” '
  '22':
  - type: text
    content: When God had finished speaking, he left Abraham.
  '23':
  - type: text
    content: 'On that very day Abraham took his son, Ishmael, and every male in his household, including those born there and those he had bought. Then he circumcised them, cutting off their foreskins, just as God had told him. '
  '24':
  - type: text
    content: 'Abraham was ninety-nine years old when he was circumcised, '
  '25':
  - type: text
    content: 'and Ishmael, his son, was thirteen. '
  '26':
  - type: text
    content: 'Both Abraham and his son, Ishmael, were circumcised on that same day, '
  '27':
  - type: text
    content: along with all the other men and boys of the household, whether they were born there or bought as servants. All were circumcised with him.
  '3':
  - type: text
    content: 'At this, Abram fell face down on the ground. Then God said to him, '
  '4':
  - type: text
    content: '“This is my covenant with you: I will make you the father of a multitude of nations! '
  '5':
  - type: text
    content: What’s more, I am changing your name. It will no longer be Abram. Instead, you will be called Abraham,
  - type: note
    content: Abram means “exalted father”; Abraham sounds like a Hebrew term that means “father of many.”
  - type: text
    content: ' for you will be the father of many nations. '
  '6':
  - type: text
    content: I will make you extremely fruitful. Your descendants will become many nations, and kings will be among them!
  '7':
  - type: text
    content: “I will confirm my covenant with you and your descendants
  - type: note
    content: Hebrew seed; also in 17:7b, 8, 9, 10, 19.
  - type: text
    content: ' after you, from generation to generation. This is the everlasting covenant: I will always be your God and the God of your descendants after you. '
  '8':
  - type: text
    content: And I will give the entire land of Canaan, where you now live as a foreigner, to you and your descendants. It will be their possession forever, and I will be their God.”
  - type: heading
    content: The Mark of the Covenant
  '9':
  - type: text
    content: 'Then God said to Abraham, “Your responsibility is to obey the terms of the covenant. You and all your descendants have this continual responsibility. '
