document_id: GEN.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram Is Named Abraham
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Abram was ninety-nine years old, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to him and said, “I am El-Shaddai—‘God Almighty.’ Serve me faithfully and live a blameless life. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is the covenant that you and your descendants must keep: Each male among you must be circumcised. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You must cut off the flesh of your foreskin as a sign of the covenant between me and you. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'From generation to generation, every male child must be circumcised on the eighth day after his birth. This applies not only to members of your family but also to the servants born in your household and the foreign-born servants whom you have purchased. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All must be circumcised. Your bodies will bear the mark of my everlasting covenant. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Any male who fails to be circumcised will be cut off from the covenant family for breaking the covenant.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sarai Is Named Sarah
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then God said to Abraham, “Regarding Sarai, your wife—her name will no longer be Sarai. From now on her name will be Sarah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sarai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sarah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: both mean “princess”; the change in spelling may reflect the difference in dialect between Ur and Canaan.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I will bless her and give you a son from her! Yes, I will bless her richly, and she will become the mother of many nations. Kings of nations will be among her descendants.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham bowed down to the ground, but he laughed to himself in disbelief. “How could I become a father at the age of 100?” he thought. “And how can Sarah have a baby when she is ninety years old?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Abraham said to God, “May Ishmael live under your special blessing!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God replied, “No—Sarah, your wife, will give birth to a son for you. You will name him Isaac,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:19 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Isaac '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “he laughs.”
      marker-yv: yv-n
    - type: text
      text: ' and I will confirm my covenant with him and his descendants as an everlasting covenant. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I will make a covenant with you, by which I will guarantee to give you countless descendants.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for Ishmael, I will bless him also, just as you have asked. I will make him extremely fruitful and multiply his descendants. He will become the father of twelve princes, and I will make him a great nation. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But my covenant will be confirmed with Isaac, who will be born to you and Sarah about this time next year.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When God had finished speaking, he left Abraham.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that very day Abraham took his son, Ishmael, and every male in his household, including those born there and those he had bought. Then he circumcised them, cutting off their foreskins, just as God had told him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham was ninety-nine years old when he was circumcised, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ishmael, his son, was thirteen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Both Abraham and his son, Ishmael, were circumcised on that same day, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: along with all the other men and boys of the household, whether they were born there or bought as servants. All were circumcised with him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this, Abram fell face down on the ground. Then God said to him, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is my covenant with you: I will make you the father of a multitude of nations! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What’s more, I am changing your name. It will no longer be Abram. Instead, you will be called Abraham,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means “exalted father”; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abraham '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “father of many.”
      marker-yv: yv-n
    - type: text
      text: ' for you will be the father of many nations. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make you extremely fruitful. Your descendants will become many nations, and kings will be among them!
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I will confirm my covenant with you and your descendants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seed; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 17:7b, 8, 9, 10, 19.
      marker-yv: yv-n
    - type: text
      text: ' after you, from generation to generation. This is the everlasting covenant: I will always be your God and the God of your descendants after you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will give the entire land of Canaan, where you now live as a foreigner, to you and your descendants. It will be their possession forever, and I will be their God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Mark of the Covenant
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then God said to Abraham, “Your responsibility is to obey the terms of the covenant. You and all your descendants have this continual responsibility. '
