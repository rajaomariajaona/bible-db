document_id: NAM.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 2:1-13 are numbered 2:2-14 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Your enemy is coming to crush you, Nineveh.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Man the ramparts! Watch the roads!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare your defenses! Call out your forces!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon the city is plundered, empty, and ruined.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hearts melt and knees shake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people stand aghast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their faces pale and trembling.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where now is that great Nineveh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that den filled with young lions?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was a place where people—like lions and their cubs—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walked freely and without fear.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lion tore up meat for his cubs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strangled prey for his mate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He filled his den with prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his caverns with his plunder.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am your enemy!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your chariots will soon go up in smoke.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your young men
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: young lions.
      marker-yv: yv-n
    - type: text
      text: ' will be killed in battle.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will you plunder conquered nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The voices of your proud messengers will be heard no more.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though the destroyer has destroyed Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will restore its honor.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel’s vine has been stripped of branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he will restore its splendor.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shields flash red in the sunlight!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See the scarlet uniforms of the valiant troops!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch as their glittering chariots move into position,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a forest of spears waving above them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek and Syriac versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: into position, / the horses whipped into a frenzy.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The chariots race recklessly along the streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rush wildly through the squares.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They flash like firelight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and move as swiftly as lightning.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king shouts to his officers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble in their haste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rushing to the walls to set up their defenses.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The river gates have been torn open!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The palace is about to collapse!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nineveh’s exile has been decreed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the servant girls mourn its capture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They moan like doves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and beat their breasts in sorrow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nineveh is like a leaking water reservoir!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The people are slipping away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop, stop!” someone shouts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but no one even looks back.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loot the silver!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Plunder the gold!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no end to Nineveh’s treasures—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its vast, uncounted wealth.
