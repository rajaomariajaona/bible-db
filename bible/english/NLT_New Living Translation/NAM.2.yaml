document_id: NAM.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Nineveh
  - type: text
    content: ' '
  - type: note
    content: Verses 2:1-13 are numbered 2:2-14 in Hebrew text.
  - type: text
    content: Your enemy is coming to crush you, Nineveh.
  - type: text
    content: Man the ramparts! Watch the roads!
  - type: text
    content: Prepare your defenses! Call out your forces!
  '10':
  - type: text
    content: Soon the city is plundered, empty, and ruined.
  - type: text
    content: Hearts melt and knees shake.
  - type: text
    content: The people stand aghast,
  - type: text
    content: their faces pale and trembling.
  '11':
  - type: text
    content: Where now is that great Nineveh,
  - type: text
    content: that den filled with young lions?
  - type: text
    content: It was a place where people—like lions and their cubs—
  - type: text
    content: walked freely and without fear.
  '12':
  - type: text
    content: The lion tore up meat for his cubs
  - type: text
    content: and strangled prey for his mate.
  - type: text
    content: He filled his den with prey,
  - type: text
    content: his caverns with his plunder.
  '13':
  - type: text
    content: “I am your enemy!”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “Your chariots will soon go up in smoke.
  - type: text
    content: Your young men
  - type: note
    content: Hebrew young lions.
  - type: text
    content: ' will be killed in battle.'
  - type: text
    content: Never again will you plunder conquered nations.
  - type: text
    content: The voices of your proud messengers will be heard no more.”
  '2':
  - type: text
    content: Even though the destroyer has destroyed Judah,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will restore its honor.'
  - type: text
    content: Israel’s vine has been stripped of branches,
  - type: text
    content: but he will restore its splendor.
  '3':
  - type: text
    content: Shields flash red in the sunlight!
  - type: text
    content: See the scarlet uniforms of the valiant troops!
  - type: text
    content: Watch as their glittering chariots move into position,
  - type: text
    content: with a forest of spears waving above them.
  - type: note
    content: Greek and Syriac versions read into position, / the horses whipped into a frenzy.
  '4':
  - type: text
    content: The chariots race recklessly along the streets
  - type: text
    content: and rush wildly through the squares.
  - type: text
    content: They flash like firelight
  - type: text
    content: and move as swiftly as lightning.
  '5':
  - type: text
    content: The king shouts to his officers;
  - type: text
    content: they stumble in their haste,
  - type: text
    content: rushing to the walls to set up their defenses.
  '6':
  - type: text
    content: The river gates have been torn open!
  - type: text
    content: The palace is about to collapse!
  '7':
  - type: text
    content: Nineveh’s exile has been decreed,
  - type: text
    content: and all the servant girls mourn its capture.
  - type: text
    content: They moan like doves
  - type: text
    content: and beat their breasts in sorrow.
  '8':
  - type: text
    content: Nineveh is like a leaking water reservoir!
  - type: text
    content: The people are slipping away.
  - type: text
    content: “Stop, stop!” someone shouts,
  - type: text
    content: but no one even looks back.
  '9':
  - type: text
    content: Loot the silver!
  - type: text
    content: Plunder the gold!
  - type: text
    content: There’s no end to Nineveh’s treasures—
  - type: text
    content: its vast, uncounted wealth.
