document_id: ACT.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Brothers and esteemed fathers,” Paul said, “listen to me as I offer my defense.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I asked, ‘What should I do, Lord?’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And the Lord told me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Get up and go into Damascus, and there you will be told everything you are to do.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I was blinded by the intense light and had to be led by the hand to Damascus by my companions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man named Ananias lived there. He was a godly man, deeply devoted to the law, and well regarded by all the Jews of Damascus. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He came and stood beside me and said, ‘Brother Saul, regain your sight.’ And that very moment I could see him!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then he told me, ‘The God of our ancestors has chosen you to know his will and to see the Righteous One and hear him speak. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are to be his witness, telling everyone what you have seen and heard. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What are you waiting for? Get up and be baptized. Have your sins washed away by calling on the name of the Lord.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After I returned to Jerusalem, I was praying in the Temple and fell into a trance. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I saw a vision of Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: him.
      marker-yv: yv-n
    - type: text
      text: ' saying to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Hurry! Leave Jerusalem, for the people here won’t accept your testimony about me.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘But Lord,’ I argued, ‘they certainly know that in every synagogue I imprisoned and beat those who believed in you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they heard him speaking in their own language,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in Aramaic, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Hebrew.
      marker-yv: yv-n
    - type: text
      text: ' the silence was even greater.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I was in complete agreement when your witness Stephen was killed. I stood by and kept the coats they took off when they stoned him.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But the Lord said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Go, for I will send you far away to the Gentiles!’
    - type: text
      text: ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The crowd listened until Paul said that word. Then they all began to shout, “Away with such a fellow! He isn’t fit to live!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They yelled, threw off their coats, and tossed handfuls of dust into the air.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Reveals His Roman Citizenship
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The commander brought Paul inside and ordered him lashed with whips to make him confess his crime. He wanted to find out why the crowd had become so furious. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When they tied Paul down to lash him, Paul said to the officer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the centurion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 22:26.
      marker-yv: yv-n
    - type: text
      text: ' standing there, “Is it legal for you to whip a Roman citizen who hasn’t even been tried?”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the officer heard this, he went to the commander and asked, “What are you doing? This man is a Roman citizen!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the commander went over and asked Paul, “Tell me, are you a Roman citizen?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, I certainly am,” Paul replied.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am, too,” the commander muttered, “and it cost me plenty!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul answered, “But I am a citizen by birth!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The soldiers who were about to interrogate Paul quickly withdrew when they heard he was a Roman citizen, and the commander was frightened because he had ordered him bound and whipped.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul before the High Council
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul said, “I am a Jew, born in Tarsus, a city in Cilicia, and I was brought up and educated here in Jerusalem under Gamaliel. As his student, I was carefully trained in our Jewish laws and customs. I became very zealous to honor God in everything I did, just like all of you today. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The next day the commander ordered the leading priests into session with the Jewish high council.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sanhedrin.
      marker-yv: yv-n
    - type: text
      text: ' He wanted to find out what the trouble was all about, so he released Paul to have him stand before them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I persecuted the followers of the Way, hounding some to death, arresting both men and women and throwing them in prison. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The high priest and the whole council of elders can testify that this is so. For I received letters from them to our Jewish brothers in Damascus, authorizing me to bring the followers of the Way from there to Jerusalem, in chains, to be punished.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As I was on the road, approaching Damascus about noon, a very bright light from heaven suddenly shone down around me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I fell to the ground and heard a voice saying to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Saul, Saul, why are you persecuting me?’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘Who are you, lord?’ I asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And the voice replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am Jesus the Nazarene,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus of Nazareth.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the one you are persecuting.’
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people with me saw the light but didn’t understand the voice speaking to me.
