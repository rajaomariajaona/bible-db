document_id: ACT.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“Brothers and esteemed fathers,” Paul said, “listen to me as I offer my defense.” '
  '10':
  - type: text
    content: “I asked, ‘What should I do, Lord?’
  - type: text
    content: '“And the Lord told me, '
  - type: text
    content: ‘Get up and go into Damascus, and there you will be told everything you are to do.’
  '11':
  - type: text
    content: '“I was blinded by the intense light and had to be led by the hand to Damascus by my companions. '
  '12':
  - type: text
    content: 'A man named Ananias lived there. He was a godly man, deeply devoted to the law, and well regarded by all the Jews of Damascus. '
  '13':
  - type: text
    content: He came and stood beside me and said, ‘Brother Saul, regain your sight.’ And that very moment I could see him!
  '14':
  - type: text
    content: '“Then he told me, ‘The God of our ancestors has chosen you to know his will and to see the Righteous One and hear him speak. '
  '15':
  - type: text
    content: 'For you are to be his witness, telling everyone what you have seen and heard. '
  '16':
  - type: text
    content: What are you waiting for? Get up and be baptized. Have your sins washed away by calling on the name of the Lord.’
  '17':
  - type: text
    content: '“After I returned to Jerusalem, I was praying in the Temple and fell into a trance. '
  '18':
  - type: text
    content: I saw a vision of Jesus
  - type: note
    content: Greek him.
  - type: text
    content: ' saying to me, '
  - type: text
    content: ‘Hurry! Leave Jerusalem, for the people here won’t accept your testimony about me.’
  '19':
  - type: text
    content: '“‘But Lord,’ I argued, ‘they certainly know that in every synagogue I imprisoned and beat those who believed in you. '
  '2':
  - type: text
    content: When they heard him speaking in their own language,
  - type: note
    content: Greek in Aramaic, or in Hebrew.
  - type: text
    content: ' the silence was even greater.'
  '20':
  - type: text
    content: And I was in complete agreement when your witness Stephen was killed. I stood by and kept the coats they took off when they stoned him.’
  '21':
  - type: text
    content: '“But the Lord said to me, '
  - type: text
    content: ‘Go, for I will send you far away to the Gentiles!’
  - type: text
    content: ”
  '22':
  - type: text
    content: 'The crowd listened until Paul said that word. Then they all began to shout, “Away with such a fellow! He isn’t fit to live!” '
  '23':
  - type: text
    content: They yelled, threw off their coats, and tossed handfuls of dust into the air.
  - type: heading
    content: Paul Reveals His Roman Citizenship
  '24':
  - type: text
    content: 'The commander brought Paul inside and ordered him lashed with whips to make him confess his crime. He wanted to find out why the crowd had become so furious. '
  '25':
  - type: text
    content: When they tied Paul down to lash him, Paul said to the officer
  - type: note
    content: Greek the centurion; also in 22:26.
  - type: text
    content: ' standing there, “Is it legal for you to whip a Roman citizen who hasn’t even been tried?”'
  '26':
  - type: text
    content: When the officer heard this, he went to the commander and asked, “What are you doing? This man is a Roman citizen!”
  '27':
  - type: text
    content: So the commander went over and asked Paul, “Tell me, are you a Roman citizen?”
  - type: text
    content: “Yes, I certainly am,” Paul replied.
  '28':
  - type: text
    content: “I am, too,” the commander muttered, “and it cost me plenty!”
  - type: text
    content: Paul answered, “But I am a citizen by birth!”
  '29':
  - type: text
    content: The soldiers who were about to interrogate Paul quickly withdrew when they heard he was a Roman citizen, and the commander was frightened because he had ordered him bound and whipped.
  - type: heading
    content: Paul before the High Council
  '3':
  - type: text
    content: 'Then Paul said, “I am a Jew, born in Tarsus, a city in Cilicia, and I was brought up and educated here in Jerusalem under Gamaliel. As his student, I was carefully trained in our Jewish laws and customs. I became very zealous to honor God in everything I did, just like all of you today. '
  '30':
  - type: text
    content: The next day the commander ordered the leading priests into session with the Jewish high council.
  - type: note
    content: Greek Sanhedrin.
  - type: text
    content: ' He wanted to find out what the trouble was all about, so he released Paul to have him stand before them.'
  '4':
  - type: text
    content: 'And I persecuted the followers of the Way, hounding some to death, arresting both men and women and throwing them in prison. '
  '5':
  - type: text
    content: The high priest and the whole council of elders can testify that this is so. For I received letters from them to our Jewish brothers in Damascus, authorizing me to bring the followers of the Way from there to Jerusalem, in chains, to be punished.
  '6':
  - type: text
    content: '“As I was on the road, approaching Damascus about noon, a very bright light from heaven suddenly shone down around me. '
  '7':
  - type: text
    content: 'I fell to the ground and heard a voice saying to me, '
  - type: text
    content: ‘Saul, Saul, why are you persecuting me?’
  '8':
  - type: text
    content: “‘Who are you, lord?’ I asked.
  - type: text
    content: '“And the voice replied, '
  - type: text
    content: ‘I am Jesus the Nazarene,
  - type: note
    content: Or Jesus of Nazareth.
  - type: text
    content: ' '
  - type: text
    content: the one you are persecuting.’
  - type: text
    content: ' '
  '9':
  - type: text
    content: The people with me saw the light but didn’t understand the voice speaking to me.
