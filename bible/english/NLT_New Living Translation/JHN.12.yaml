document_id: JHN.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Anointed at Bethany
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Six days before the Passover celebration began, Jesus arrived in Bethany, the home of Lazarus—the man he had raised from the dead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the leading priests decided to kill Lazarus, too, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for it was because of him that many of the people had deserted them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'had deserted their traditions; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: had deserted.
      marker-yv: yv-n
    - type: text
      text: ' and believed in Jesus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Triumphant Entry
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The next day, the news that Jesus was on the way to Jerusalem swept through the city. A large crowd of Passover visitors '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: took palm branches and went down the road to meet him. They shouted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Praise God!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hosanna, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: an exclamation of praise adapted from a Hebrew expression that means “save now.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessings on the one who comes in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hail to the King of Israel!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 118:25-26; Zeph 3:15.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus found a young donkey and rode on it, fulfilling the prophecy that said:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t be afraid, people of Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: daughter of Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, your King is coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: riding on a donkey’s colt.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zech 9:9.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His disciples didn’t understand at the time that this was a fulfillment of prophecy. But after Jesus entered into his glory, they remembered what had happened and realized that these things had been written about him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Many in the crowd had seen Jesus call Lazarus from the tomb, raising him from the dead, and they were telling others
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: were testifying.
      marker-yv: yv-n
    - type: text
      text: ' about it. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That was the reason so many went out to meet him—because they had heard about this miraculous sign. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Pharisees said to each other, “There’s nothing we can do. Look, everyone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the world.
      marker-yv: yv-n
    - type: text
      text: ' has gone after him!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A dinner was prepared in Jesus’ honor. Martha served, and Lazarus was among those who ate
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who reclined.
      marker-yv: yv-n
    - type: text
      text: ' with him. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Some Greeks who had come to Jerusalem for the Passover celebration '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'paid a visit to Philip, who was from Bethsaida in Galilee. They said, “Sir, we want to meet Jesus.” '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Philip told Andrew about it, and they went together to ask Jesus.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now the time has come for the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to enter into his glory.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you the truth, unless a kernel of wheat is planted in the soil and dies, it remains alone. But its death will produce many new kernels—a plentiful harvest of new lives.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Those who love their life in this world will lose it. Those who care nothing for their life in this world will keep it for eternity.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who wants to serve me must follow me, because my servants must be where I am. And the Father will honor anyone who serves me.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now my soul is deeply troubled. Should I pray, ‘Father, save me from this hour’? But this is the very reason I came!
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Father, bring glory to your name.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a voice spoke from heaven, saying, “I have already brought glory to my name, and I will do so again.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the crowd heard the voice, some thought it was thunder, while others declared an angel had spoken to him.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Mary took a twelve-ounce jar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'took 1 litra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[327 grams].'
      marker-yv: yv-n
    - type: text
      text: ' of expensive perfume made from essence of nard, and she anointed Jesus’ feet with it, wiping his feet with her hair. The house was filled with the fragrance.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The voice was for your benefit, not mine.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The time for judging this world has come, when Satan, the ruler of this world, will be cast out.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when I am lifted up from the earth, I will draw everyone to myself.”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said this to indicate how he was going to die.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The crowd responded, “We understood from Scripture
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the law.
      marker-yv: yv-n
    - type: text
      text: ' that the Messiah would live forever. How can you say the Son of Man will die? Just who is this Son of Man, anyway?”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My light will shine for you just a little longer. Walk in the light while you can, so the darkness will not overtake you. Those who walk in the darkness cannot see where they are going.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Put your trust in the light while there is still time; then you will become children of the light.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: After saying these things, Jesus went away and was hidden from them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Unbelief of the People
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But despite all the miraculous signs Jesus had done, most of the people still did not believe in him. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is exactly what Isaiah the prophet had predicted:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has believed our message?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To whom has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' revealed his powerful arm?”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 53:1.
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But the people couldn’t believe, for as Isaiah also said,
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Judas Iscariot, the disciple who would soon betray him, said, '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The Lord has blinded their eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hardened their hearts—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that their eyes cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their hearts cannot understand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they cannot turn to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have me heal them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 6:10.
      marker-yv: yv-n
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Isaiah was referring to Jesus when he said this, because he saw the future and spoke of the Messiah’s glory. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Many people did believe in him, however, including some of the Jewish leaders. But they wouldn’t admit it for fear that the Pharisees would expel them from the synagogue. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For they loved human praise more than the praise of God.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus shouted to the crowds, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you trust me, you are trusting not only me, but also God who sent me.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For when you see me, you are seeing the one who sent me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have come as a light to shine in this dark world, so that all who put their trust in me will no longer remain in the dark.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will not judge those who hear me but don’t obey me, for I have come to save the world and not to judge it.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But all who reject me and my message will be judged on the day of judgment by the truth I have spoken.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I don’t speak on my own authority. The Father who sent me has commanded me what to say and how to say it.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “That perfume was worth a year’s wages.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'worth 300 denarii. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' It should have been sold and the money given to the poor.” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I know his commands lead to eternal life; so I say whatever the Father tells me to say.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not that he cared for the poor—he was a thief, and since he was in charge of the disciples’ money, he often stole some for himself.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Leave her alone. She did this in preparation for my burial.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will always have the poor among you, but you will not always have me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When all the people
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jewish people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:11.
      marker-yv: yv-n
    - type: text
      text: ' heard of Jesus’ arrival, they flocked to see him and also to see Lazarus, the man Jesus had raised from the dead. '
