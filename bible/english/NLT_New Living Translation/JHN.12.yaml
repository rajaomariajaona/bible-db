document_id: JHN.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Anointed at Bethany
  - type: text
    content: 'Six days before the Passover celebration began, Jesus arrived in Bethany, the home of Lazarus—the man he had raised from the dead. '
  '10':
  - type: text
    content: 'Then the leading priests decided to kill Lazarus, too, '
  '11':
  - type: text
    content: for it was because of him that many of the people had deserted them
  - type: note
    content: Or had deserted their traditions; Greek reads had deserted.
  - type: text
    content: ' and believed in Jesus.'
  - type: heading
    content: Jesus’ Triumphant Entry
  '12':
  - type: text
    content: 'The next day, the news that Jesus was on the way to Jerusalem swept through the city. A large crowd of Passover visitors '
  '13':
  - type: text
    content: took palm branches and went down the road to meet him. They shouted,
  - type: text
    content: “Praise God!
  - type: note
    content: Greek Hosanna, an exclamation of praise adapted from a Hebrew expression that means “save now.”
  - type: text
    content: 'Blessings on the one who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Hail to the King of Israel!”
  - type: note
    content: Ps 118:25-26; Zeph 3:15.
  '14':
  - type: text
    content: 'Jesus found a young donkey and rode on it, fulfilling the prophecy that said:'
  '15':
  - type: text
    content: “Don’t be afraid, people of Jerusalem.
  - type: note
    content: Greek daughter of Zion.
  - type: text
    content: Look, your King is coming,
  - type: text
    content: riding on a donkey’s colt.”
  - type: note
    content: Zech 9:9.
  '16':
  - type: text
    content: His disciples didn’t understand at the time that this was a fulfillment of prophecy. But after Jesus entered into his glory, they remembered what had happened and realized that these things had been written about him.
  '17':
  - type: text
    content: Many in the crowd had seen Jesus call Lazarus from the tomb, raising him from the dead, and they were telling others
  - type: note
    content: Greek were testifying.
  - type: text
    content: ' about it. '
  '18':
  - type: text
    content: 'That was the reason so many went out to meet him—because they had heard about this miraculous sign. '
  '19':
  - type: text
    content: Then the Pharisees said to each other, “There’s nothing we can do. Look, everyone
  - type: note
    content: Greek the world.
  - type: text
    content: ' has gone after him!”'
  - type: heading
    content: Jesus Predicts His Death
  '2':
  - type: text
    content: A dinner was prepared in Jesus’ honor. Martha served, and Lazarus was among those who ate
  - type: note
    content: Or who reclined.
  - type: text
    content: ' with him. '
  '20':
  - type: text
    content: 'Some Greeks who had come to Jerusalem for the Passover celebration '
  '21':
  - type: text
    content: 'paid a visit to Philip, who was from Bethsaida in Galilee. They said, “Sir, we want to meet Jesus.” '
  '22':
  - type: text
    content: Philip told Andrew about it, and they went together to ask Jesus.
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Now the time has come for the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: to enter into his glory.
  - type: text
    content: ' '
  '24':
  - type: text
    content: I tell you the truth, unless a kernel of wheat is planted in the soil and dies, it remains alone. But its death will produce many new kernels—a plentiful harvest of new lives.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Those who love their life in this world will lose it. Those who care nothing for their life in this world will keep it for eternity.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Anyone who wants to serve me must follow me, because my servants must be where I am. And the Father will honor anyone who serves me.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Now my soul is deeply troubled. Should I pray, ‘Father, save me from this hour’? But this is the very reason I came!
  - type: text
    content: ' '
  '28':
  - type: text
    content: Father, bring glory to your name.”
  - type: text
    content: 'Then a voice spoke from heaven, saying, “I have already brought glory to my name, and I will do so again.” '
  '29':
  - type: text
    content: When the crowd heard the voice, some thought it was thunder, while others declared an angel had spoken to him.
  '3':
  - type: text
    content: Then Mary took a twelve-ounce jar
  - type: note
    content: Greek took 1 litra [327 grams].
  - type: text
    content: ' of expensive perfume made from essence of nard, and she anointed Jesus’ feet with it, wiping his feet with her hair. The house was filled with the fragrance.'
  '30':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “The voice was for your benefit, not mine.
  - type: text
    content: ' '
  '31':
  - type: text
    content: The time for judging this world has come, when Satan, the ruler of this world, will be cast out.
  - type: text
    content: ' '
  '32':
  - type: text
    content: And when I am lifted up from the earth, I will draw everyone to myself.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: He said this to indicate how he was going to die.
  '34':
  - type: text
    content: The crowd responded, “We understood from Scripture
  - type: note
    content: Greek from the law.
  - type: text
    content: ' that the Messiah would live forever. How can you say the Son of Man will die? Just who is this Son of Man, anyway?”'
  '35':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “My light will shine for you just a little longer. Walk in the light while you can, so the darkness will not overtake you. Those who walk in the darkness cannot see where they are going.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Put your trust in the light while there is still time; then you will become children of the light.”
  - type: text
    content: After saying these things, Jesus went away and was hidden from them.
  - type: heading
    content: The Unbelief of the People
  '37':
  - type: text
    content: 'But despite all the miraculous signs Jesus had done, most of the people still did not believe in him. '
  '38':
  - type: text
    content: 'This is exactly what Isaiah the prophet had predicted:'
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', who has believed our message?'
  - type: text
    content: 'To whom has the '
  - type: text
    content: Lord
  - type: text
    content: ' revealed his powerful arm?”'
  - type: note
    content: Isa 53:1.
  '39':
  - type: text
    content: But the people couldn’t believe, for as Isaiah also said,
  '4':
  - type: text
    content: 'But Judas Iscariot, the disciple who would soon betray him, said, '
  '40':
  - type: text
    content: “The Lord has blinded their eyes
  - type: text
    content: and hardened their hearts—
  - type: text
    content: so that their eyes cannot see,
  - type: text
    content: and their hearts cannot understand,
  - type: text
    content: and they cannot turn to me
  - type: text
    content: and have me heal them.”
  - type: note
    content: Isa 6:10.
  '41':
  - type: text
    content: 'Isaiah was referring to Jesus when he said this, because he saw the future and spoke of the Messiah’s glory. '
  '42':
  - type: text
    content: 'Many people did believe in him, however, including some of the Jewish leaders. But they wouldn’t admit it for fear that the Pharisees would expel them from the synagogue. '
  '43':
  - type: text
    content: For they loved human praise more than the praise of God.
  '44':
  - type: text
    content: 'Jesus shouted to the crowds, '
  - type: text
    content: “If you trust me, you are trusting not only me, but also God who sent me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For when you see me, you are seeing the one who sent me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: I have come as a light to shine in this dark world, so that all who put their trust in me will no longer remain in the dark.
  - type: text
    content: ' '
  '47':
  - type: text
    content: I will not judge those who hear me but don’t obey me, for I have come to save the world and not to judge it.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But all who reject me and my message will be judged on the day of judgment by the truth I have spoken.
  - type: text
    content: ' '
  '49':
  - type: text
    content: I don’t speak on my own authority. The Father who sent me has commanded me what to say and how to say it.
  - type: text
    content: ' '
  '5':
  - type: text
    content: “That perfume was worth a year’s wages.
  - type: note
    content: Greek worth 300 denarii. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' It should have been sold and the money given to the poor.” '
  '50':
  - type: text
    content: And I know his commands lead to eternal life; so I say whatever the Father tells me to say.”
  '6':
  - type: text
    content: Not that he cared for the poor—he was a thief, and since he was in charge of the disciples’ money, he often stole some for himself.
  '7':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Leave her alone. She did this in preparation for my burial.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You will always have the poor among you, but you will not always have me.”
  '9':
  - type: text
    content: When all the people
  - type: note
    content: Greek Jewish people; also in 12:11.
  - type: text
    content: ' heard of Jesus’ arrival, they flocked to see him and also to see Lazarus, the man Jesus had raised from the dead. '
