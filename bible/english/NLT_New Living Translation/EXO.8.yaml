document_id: EXO.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Frogs
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 8:1-4 are numbered 7:26-29 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Go back to Pharaoh and announce to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Let my people go, so they can worship me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Do it tomorrow,” Pharaoh said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right,” Moses replied, “it will be as you have said. Then you will know that there is no one like the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The frogs will leave you and your houses, your officials, and your people. They will remain only in the Nile River.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Moses and Aaron left Pharaoh’s palace, and Moses cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' about the frogs he had inflicted on Pharaoh. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did just what Moses had predicted. The frogs in the houses, the courtyards, and the fields all died. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The Egyptians piled them into great heaps, and a terrible stench filled the land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But when Pharaoh saw that relief had come, he became stubborn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'made his heart heavy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:32.
      marker-yv: yv-n
    - type: text
      text: ' He refused to listen to Moses and Aaron, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had predicted.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Gnats
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Tell Aaron, ‘Raise your staff and strike the ground. The dust will turn into swarms of gnats throughout the land of Egypt.’” '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Moses and Aaron did just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded them. When Aaron raised his hand and struck the ground with his staff, gnats infested the entire land, covering the Egyptians and their animals. All the dust in the land of Egypt turned into gnats. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pharaoh’s magicians tried to do the same thing with their secret arts, but this time they failed. And the gnats covered everyone, people and animals alike.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“This is the finger of God!” the magicians exclaimed to Pharaoh. But Pharaoh’s heart remained hard. He wouldn’t listen to them, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had predicted.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Flies
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'If you refuse to let them go, I will send a plague of frogs across your entire land. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Moses, “Get up early in the morning and stand in Pharaoh’s way as he goes down to the river. Say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Let my people go, so they can worship me. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'If you refuse, then I will send swarms of flies on you, your officials, your people, and all the houses. The Egyptian homes will be filled with flies, and the ground will be covered with them. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But this time I will spare the region of Goshen, where my people live. No flies will be found there. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and that I am present even in the heart of your land. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I will make a clear distinction between
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Latin versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will set redemption between.
      marker-yv: yv-n
    - type: text
      text: ' my people and your people. This miraculous sign will happen tomorrow.’”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did just as he had said. A thick swarm of flies filled Pharaoh’s palace and the houses of his officials. The whole land of Egypt was thrown into chaos by the flies.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Pharaoh called for Moses and Aaron. “All right! Go ahead and offer sacrifices to your God,” he said. “But do it here in this land.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But Moses replied, “That wouldn’t be right. The Egyptians detest the sacrifices that we offer to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. Look, if we offer our sacrifices here where the Egyptians can see us, they will stone us. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'We must take a three-day trip into the wilderness to offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, just as he has commanded us.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“All right, go ahead,” Pharaoh replied. “I will let you go into the wilderness to offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. But don’t go too far away. Now hurry and pray for me.”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moses answered, “As soon as I leave you, I will pray to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and tomorrow the swarms of flies will disappear from you and your officials and all your people. But I am warning you, Pharaoh, don’t lie to us again and refuse to let the people go to sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The Nile River will swarm with frogs. They will come up out of the river and into your palace, even into your bedroom and onto your bed! They will enter the houses of your officials and your people. They will even jump into your ovens and your kneading bowls. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'So Moses left Pharaoh’s palace and pleaded with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to remove all the flies. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did as Moses asked and caused the swarms of flies to disappear from Pharaoh, his officials, and his people. Not a single fly remained. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But Pharaoh again became stubborn and refused to let the people go.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Frogs will jump on you, your people, and all your officials.’”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 8:5-32 are numbered 8:1-28 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Tell Aaron, ‘Raise the staff in your hand over all the rivers, canals, and ponds of Egypt, and bring up frogs over all the land.’” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Aaron raised his hand over the waters of Egypt, and frogs came up and covered the whole land! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But the magicians were able to do the same thing with their magic. They, too, caused frogs to come up on the land of Egypt.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Pharaoh summoned Moses and Aaron and begged, “Plead with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to take the frogs away from me and my people. I will let your people go, so they can offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “You set the time!” Moses replied. “Tell me when you want me to pray for you, your officials, and your people. Then you and your houses will be rid of the frogs. They will remain only in the Nile River.”
