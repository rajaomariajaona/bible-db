document_id: EXO.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Plague of Frogs
  - type: text
    content: ' '
  - type: note
    content: Verses 8:1-4 are numbered 7:26-29 in Hebrew text.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go back to Pharaoh and announce to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Let my people go, so they can worship me. '
  '10':
  - type: text
    content: “Do it tomorrow,” Pharaoh said.
  - type: text
    content: '“All right,” Moses replied, “it will be as you have said. Then you will know that there is no one like the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '11':
  - type: text
    content: The frogs will leave you and your houses, your officials, and your people. They will remain only in the Nile River.”
  '12':
  - type: text
    content: 'So Moses and Aaron left Pharaoh’s palace, and Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' about the frogs he had inflicted on Pharaoh. '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did just what Moses had predicted. The frogs in the houses, the courtyards, and the fields all died. '
  '14':
  - type: text
    content: 'The Egyptians piled them into great heaps, and a terrible stench filled the land. '
  '15':
  - type: text
    content: But when Pharaoh saw that relief had come, he became stubborn.
  - type: note
    content: Hebrew made his heart heavy; also in 8:32.
  - type: text
    content: ' He refused to listen to Moses and Aaron, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had predicted.'
  - type: heading
    content: A Plague of Gnats
  '16':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Tell Aaron, ‘Raise your staff and strike the ground. The dust will turn into swarms of gnats throughout the land of Egypt.’” '
  '17':
  - type: text
    content: 'So Moses and Aaron did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded them. When Aaron raised his hand and struck the ground with his staff, gnats infested the entire land, covering the Egyptians and their animals. All the dust in the land of Egypt turned into gnats. '
  '18':
  - type: text
    content: Pharaoh’s magicians tried to do the same thing with their secret arts, but this time they failed. And the gnats covered everyone, people and animals alike.
  '19':
  - type: text
    content: '“This is the finger of God!” the magicians exclaimed to Pharaoh. But Pharaoh’s heart remained hard. He wouldn’t listen to them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had predicted.'
  - type: heading
    content: A Plague of Flies
  '2':
  - type: text
    content: 'If you refuse to let them go, I will send a plague of frogs across your entire land. '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Get up early in the morning and stand in Pharaoh’s way as he goes down to the river. Say to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Let my people go, so they can worship me. '
  '21':
  - type: text
    content: 'If you refuse, then I will send swarms of flies on you, your officials, your people, and all the houses. The Egyptian homes will be filled with flies, and the ground will be covered with them. '
  '22':
  - type: text
    content: 'But this time I will spare the region of Goshen, where my people live. No flies will be found there. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' and that I am present even in the heart of your land. '
  '23':
  - type: text
    content: I will make a clear distinction between
  - type: note
    content: As in Greek and Latin versions; Hebrew reads I will set redemption between.
  - type: text
    content: ' my people and your people. This miraculous sign will happen tomorrow.’”'
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did just as he had said. A thick swarm of flies filled Pharaoh’s palace and the houses of his officials. The whole land of Egypt was thrown into chaos by the flies.'
  '25':
  - type: text
    content: Pharaoh called for Moses and Aaron. “All right! Go ahead and offer sacrifices to your God,” he said. “But do it here in this land.”
  '26':
  - type: text
    content: 'But Moses replied, “That wouldn’t be right. The Egyptians detest the sacrifices that we offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. Look, if we offer our sacrifices here where the Egyptians can see us, they will stone us. '
  '27':
  - type: text
    content: 'We must take a three-day trip into the wilderness to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, just as he has commanded us.”'
  '28':
  - type: text
    content: '“All right, go ahead,” Pharaoh replied. “I will let you go into the wilderness to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. But don’t go too far away. Now hurry and pray for me.”'
  '29':
  - type: text
    content: 'Moses answered, “As soon as I leave you, I will pray to the '
  - type: text
    content: Lord
  - type: text
    content: ', and tomorrow the swarms of flies will disappear from you and your officials and all your people. But I am warning you, Pharaoh, don’t lie to us again and refuse to let the people go to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'The Nile River will swarm with frogs. They will come up out of the river and into your palace, even into your bedroom and onto your bed! They will enter the houses of your officials and your people. They will even jump into your ovens and your kneading bowls. '
  '30':
  - type: text
    content: 'So Moses left Pharaoh’s palace and pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' to remove all the flies. '
  '31':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did as Moses asked and caused the swarms of flies to disappear from Pharaoh, his officials, and his people. Not a single fly remained. '
  '32':
  - type: text
    content: But Pharaoh again became stubborn and refused to let the people go.
  '4':
  - type: text
    content: Frogs will jump on you, your people, and all your officials.’”
  '5':
  - type: text
    content: ' '
  - type: note
    content: Verses 8:5-32 are numbered 8:1-28 in Hebrew text.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Tell Aaron, ‘Raise the staff in your hand over all the rivers, canals, and ponds of Egypt, and bring up frogs over all the land.’” '
  '6':
  - type: text
    content: 'So Aaron raised his hand over the waters of Egypt, and frogs came up and covered the whole land! '
  '7':
  - type: text
    content: But the magicians were able to do the same thing with their magic. They, too, caused frogs to come up on the land of Egypt.
  '8':
  - type: text
    content: 'Then Pharaoh summoned Moses and Aaron and begged, “Plead with the '
  - type: text
    content: Lord
  - type: text
    content: ' to take the frogs away from me and my people. I will let your people go, so they can offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '9':
  - type: text
    content: “You set the time!” Moses replied. “Tell me when you want me to pray for you, your officials, and your people. Then you and your houses will be rid of the frogs. They will remain only in the Nile River.”
