document_id: 2CO.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Are we beginning to praise ourselves again? Are we like others, who need to bring you letters of recommendation, or who ask you to write such letters on their behalf? Surely not! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The only letter of recommendation we need is you yourselves. Your lives are a letter written in our
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your.
    marker-yv: yv-n
  - type: text
    text: ' hearts; everyone can read it and recognize our good work among you. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Clearly, you are a letter from Christ showing the result of our ministry among you. This “letter” is written not with pen and ink, but with the Spirit of the living God. It is carved not on tablets of stone, but on human hearts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We are confident of all this because of our great trust in God through Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It is not that we think we are qualified to do anything on our own. Our qualification comes from God. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has enabled us to be ministers of his new covenant. This is a covenant not of written laws, but of the Spirit. The old written covenant ends in death; but under the new covenant, the Spirit gives life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Glory of the New Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The old way,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ministry; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:8, 9, 10, 11, 12.
    marker-yv: yv-n
  - type: text
    text: ' with laws etched in stone, led to death, though it began with such glory that the people of Israel could not bear to look at Moses’ face. For his face shone with the glory of God, even though the brightness was already fading away. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Shouldn’t we expect far greater glory under the new way, now that the Holy Spirit is giving life? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If the old way, which brings condemnation, was glorious, how much more glorious is the new way, which makes us right with God! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In fact, that first glory was not glorious at all compared with the overwhelming glory of the new way. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So if the old way, which has been replaced, was glorious, how much more glorious is the new, which remains forever!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Since this new way gives us such confidence, we can be very bold. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We are not like Moses, who put a veil over his face so the people of Israel would not see the glory, even though it was destined to fade away. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the people’s minds were hardened, and to this day whenever the old covenant is being read, the same veil covers their minds so they cannot understand the truth. And this veil can be removed only by believing in Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Yes, even today when they read Moses’ writings, their hearts are covered with that veil, and they do not understand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But whenever someone turns to the Lord, the veil is taken away. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the Lord is the Spirit, and wherever the Spirit of the Lord is, there is freedom. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So all of us who have had that veil removed can see and reflect the glory of the Lord. And the Lord—who is the Spirit—makes us more and more like him as we are changed into his glorious image.
