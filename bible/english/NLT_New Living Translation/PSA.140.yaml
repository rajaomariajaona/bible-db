document_id: PSA.140,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', rescue me from evil people.'
  - type: text
    content: Protect me from those who are violent,
  '10':
  - type: text
    content: Let burning coals fall down on their heads.
  - type: text
    content: Let them be thrown into the fire
  - type: text
    content: or into watery pits from which they can’t escape.
  '11':
  - type: text
    content: Don’t let liars prosper here in our land.
  - type: text
    content: Cause great disasters to fall on the violent.
  '12':
  - type: text
    content: 'But I know the '
  - type: text
    content: Lord
  - type: text
    content: ' will help those they persecute;'
  - type: text
    content: he will give justice to the poor.
  '13':
  - type: text
    content: Surely righteous people are praising your name;
  - type: text
    content: the godly will live in your presence.
  '2':
  - type: text
    content: those who plot evil in their hearts
  - type: text
    content: and stir up trouble all day long.
  '3':
  - type: text
    content: Their tongues sting like a snake;
  - type: text
    content: 'the venom of a viper drips from their lips. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', keep me out of the hands of the wicked.'
  - type: text
    content: Protect me from those who are violent,
  - type: text
    content: for they are plotting against me.
  '5':
  - type: text
    content: The proud have set a trap to catch me;
  - type: text
    content: they have stretched out a net;
  - type: text
    content: 'they have placed traps all along the way. '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: 'I said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You are my God!”'
  - type: text
    content: 'Listen, O '
  - type: text
    content: Lord
  - type: text
    content: ', to my cries for mercy!'
  '7':
  - type: text
    content: 'O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', the strong one who rescued me,'
  - type: text
    content: you protected me on the day of battle.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do not let evil people have their way.'
  - type: text
    content: Do not let their evil schemes succeed,
  - type: text
    content: 'or they will become proud. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: Let my enemies be destroyed
  - type: text
    content: by the very evil they have planned for me.
