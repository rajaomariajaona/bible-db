document_id: PSA.140,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', rescue me from evil people.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Protect me from those who are violent,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Let burning coals fall down on their heads.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be thrown into the fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or into watery pits from which they can’t escape.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Don’t let liars prosper here in our land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cause great disasters to fall on the violent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But I know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will help those they persecute;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will give justice to the poor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Surely righteous people are praising your name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the godly will live in your presence.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: those who plot evil in their hearts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stir up trouble all day long.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Their tongues sting like a snake;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the venom of a viper drips from their lips. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', keep me out of the hands of the wicked.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Protect me from those who are violent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they are plotting against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The proud have set a trap to catch me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have stretched out a net;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they have placed traps all along the way. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “You are my God!”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Listen, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to my cries for mercy!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the strong one who rescued me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you protected me on the day of battle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not let evil people have their way.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not let their evil schemes succeed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'or they will become proud. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let my enemies be destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the very evil they have planned for me.
