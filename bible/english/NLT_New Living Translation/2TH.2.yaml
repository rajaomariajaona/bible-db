document_id: 2TH.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Events prior to the Lord’s Second Coming
  - type: text
    content: Now, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 2:13, 15.
  - type: text
    content: ' let us clarify some things about the coming of our Lord Jesus Christ and how we will be gathered to meet him. '
  '10':
  - type: text
    content: 'He will use every kind of evil deception to fool those on their way to destruction, because they refuse to love and accept the truth that would save them. '
  '11':
  - type: text
    content: 'So God will cause them to be greatly deceived, and they will believe these lies. '
  '12':
  - type: text
    content: Then they will be condemned for enjoying evil rather than believing the truth.
  - type: heading
    content: Believers Should Stand Firm
  '13':
  - type: text
    content: As for us, we can’t help but thank God for you, dear brothers and sisters loved by the Lord. We are always thankful that God chose you to be among the first
  - type: note
    content: Some manuscripts read chose you from the very beginning.
  - type: text
    content: ' to experience salvation—a salvation that came through the Spirit who makes you holy and through your belief in the truth. '
  '14':
  - type: text
    content: He called you to salvation when we told you the Good News; now you can share in the glory of our Lord Jesus Christ.
  '15':
  - type: text
    content: With all these things in mind, dear brothers and sisters, stand firm and keep a strong grip on the teaching we passed on to you both in person and by letter.
  '16':
  - type: text
    content: 'Now may our Lord Jesus Christ himself and God our Father, who loved us and by his grace gave us eternal comfort and a wonderful hope, '
  '17':
  - type: text
    content: comfort you and strengthen you in every good thing you do and say.
  '2':
  - type: text
    content: 'Don’t be so easily shaken or alarmed by those who say that the day of the Lord has already begun. Don’t believe them, even if they claim to have had a spiritual vision, a revelation, or a letter supposedly from us. '
  '3':
  - type: text
    content: Don’t be fooled by what they say. For that day will not come until there is a great rebellion against God and the man of lawlessness
  - type: note
    content: Some manuscripts read the man of sin.
  - type: text
    content: ' is revealed—the one who brings destruction.'
  - type: note
    content: Greek the son of destruction.
  - type: text
    content: ' '
  '4':
  - type: text
    content: He will exalt himself and defy everything that people call god and every object of worship. He will even sit in the temple of God, claiming that he himself is God.
  '5':
  - type: text
    content: 'Don’t you remember that I told you about all this when I was with you? '
  '6':
  - type: text
    content: 'And you know what is holding him back, for he can be revealed only when his time comes. '
  '7':
  - type: text
    content: 'For this lawlessness is already at work secretly, and it will remain secret until the one who is holding it back steps out of the way. '
  '8':
  - type: text
    content: Then the man of lawlessness will be revealed, but the Lord Jesus will slay him with the breath of his mouth and destroy him by the splendor of his coming.
  '9':
  - type: text
    content: 'This man will come to do the work of Satan with counterfeit power and signs and miracles. '
