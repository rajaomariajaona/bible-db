document_id: 1CO.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Avoiding Lawsuits with Christians
  - type: text
    content: When one of you has a dispute with another believer, how dare you file a lawsuit and ask a secular court to decide the matter instead of taking it to other believers
  - type: note
    content: Greek God’s holy people; also in 6:2.
  - type: text
    content: '! '
  '10':
  - type: text
    content: 'or are thieves, or greedy people, or drunkards, or are abusive, or cheat people—none of these will inherit the Kingdom of God. '
  '11':
  - type: text
    content: Some of you were once like that. But you were cleansed; you were made holy; you were made right with God by calling on the name of the Lord Jesus Christ and by the Spirit of our God.
  - type: heading
    content: Avoiding Sexual Sin
  '12':
  - type: text
    content: 'You say, “I am allowed to do anything”—but not everything is good for you. And even though “I am allowed to do anything,” I must not become a slave to anything. '
  '13':
  - type: text
    content: 'You say, “Food was made for the stomach, and the stomach for food.” (This is true, though someday God will do away with both of them.) But you can’t say that our bodies were made for sexual immorality. They were made for the Lord, and the Lord cares about our bodies. '
  '14':
  - type: text
    content: And God will raise us from the dead by his power, just as he raised our Lord from the dead.
  '15':
  - type: text
    content: 'Don’t you realize that your bodies are actually parts of Christ? Should a man take his body, which is part of Christ, and join it to a prostitute? Never! '
  '16':
  - type: text
    content: And don’t you realize that if a man joins himself to a prostitute, he becomes one body with her? For the Scriptures say, “The two are united into one.”
  - type: note
    content: Gen 2:24.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But the person who is joined to the Lord is one spirit with him.
  '18':
  - type: text
    content: 'Run from sexual sin! No other sin so clearly affects the body as this one does. For sexual immorality is a sin against your own body. '
  '19':
  - type: text
    content: 'Don’t you realize that your body is the temple of the Holy Spirit, who lives in you and was given to you by God? You do not belong to yourself, '
  '2':
  - type: text
    content: 'Don’t you realize that someday we believers will judge the world? And since you are going to judge the world, can’t you decide even these little things among yourselves? '
  '20':
  - type: text
    content: for God bought you with a high price. So you must honor God with your body.
  '3':
  - type: text
    content: 'Don’t you realize that we will judge angels? So you should surely be able to resolve ordinary disputes in this life. '
  '4':
  - type: text
    content: 'If you have legal disputes about such matters, why go to outside judges who are not respected by the church? '
  '5':
  - type: text
    content: 'I am saying this to shame you. Isn’t there anyone in all the church who is wise enough to decide these issues? '
  '6':
  - type: text
    content: But instead, one believer
  - type: note
    content: Greek one brother.
  - type: text
    content: ' sues another—right in front of unbelievers!'
  '7':
  - type: text
    content: 'Even to have such lawsuits with one another is a defeat for you. Why not just accept the injustice and leave it at that? Why not let yourselves be cheated? '
  '8':
  - type: text
    content: Instead, you yourselves are the ones who do wrong and cheat even your fellow believers.
  - type: note
    content: Greek even the brothers.
  '9':
  - type: text
    content: 'Don’t you realize that those who do wrong will not inherit the Kingdom of God? Don’t fool yourselves. Those who indulge in sexual sin, or who worship idols, or commit adultery, or are male prostitutes, or practice homosexuality, '
