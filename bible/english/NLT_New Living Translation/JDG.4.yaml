document_id: JDG.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deborah Becomes Israel’s Judge
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After Ehud’s death, the Israelites again did evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At Kedesh, Barak called together the tribes of Zebulun and Naphtali, and 10,000 warriors went up with him. Deborah also went with him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Heber the Kenite, a descendant of Moses’ brother-in-law
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: father-in-law.
      marker-yv: yv-n
    - type: text
      text: ' Hobab, had moved away from the other members of his tribe and pitched his tent by the oak of Zaanannim near Kedesh.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Sisera was told that Barak son of Abinoam had gone up to Mount Tabor, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he called for all 900 of his iron chariots and all of his warriors, and they marched from Harosheth-haggoyim to the Kishon River.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Deborah said to Barak, “Get ready! This is the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give you victory over Sisera, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is marching ahead of you.” So Barak led his 10,000 warriors down the slopes of Mount Tabor into battle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Barak attacked, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' threw Sisera and all his chariots and warriors into a panic. Sisera leaped down from his chariot and escaped on foot. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Barak chased the chariots and the enemy army all the way to Harosheth-haggoyim, killing all of Sisera’s warriors. Not a single one was left alive.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, Sisera ran to the tent of Jael, the wife of Heber the Kenite, because Heber’s family was on friendly terms with King Jabin of Hazor. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jael went out to meet Sisera and said to him, “Come into my tent, sir. Come in. Don’t be afraid.” So he went into her tent, and she covered him with a blanket.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Please give me some water,” he said. “I’m thirsty.” So she gave him some milk from a leather bag and covered him again.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' turned them over to King Jabin of Hazor, a Canaanite king. The commander of his army was Sisera, who lived in Harosheth-haggoyim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Stand at the door of the tent,” he told her. “If anybody comes and asks you if there is anyone here, say no.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when Sisera fell asleep from exhaustion, Jael quietly crept up to him with a hammer and tent peg in her hand. Then she drove the tent peg through his temple and into the ground, and so he died.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Barak came looking for Sisera, Jael went out to meet him. She said, “Come, and I will show you the man you are looking for.” So he followed her into the tent and found Sisera lying there dead, with the tent peg through his temple.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So on that day Israel saw God defeat Jabin, the Canaanite king. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And from that time on Israel became stronger and stronger against King Jabin until they finally destroyed him.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Sisera, who had 900 iron chariots, ruthlessly oppressed the Israelites for twenty years. Then the people of Israel cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deborah, the wife of Lappidoth, was a prophet who was judging Israel at that time. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She would sit under the Palm of Deborah, between Ramah and Bethel in the hill country of Ephraim, and the Israelites would go to her for judgment. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day she sent for Barak son of Abinoam, who lived in Kedesh in the land of Naphtali. She said to him, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, commands you: Call out 10,000 warriors from the tribes of Naphtali and Zebulun at Mount Tabor. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will call out Sisera, commander of Jabin’s army, along with his chariots and warriors, to the Kishon River. There I will give you victory over him.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Barak told her, “I will go, but only if you go with me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Very well,” she replied, “I will go with you. But you will receive no honor in this venture, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s victory over Sisera will be at the hands of a woman.” So Deborah went with Barak to Kedesh. '
