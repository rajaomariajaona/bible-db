document_id: JDG.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Deborah Becomes Israel’s Judge
  - type: text
    content: 'After Ehud’s death, the Israelites again did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. '
  '10':
  - type: text
    content: At Kedesh, Barak called together the tribes of Zebulun and Naphtali, and 10,000 warriors went up with him. Deborah also went with him.
  '11':
  - type: text
    content: Now Heber the Kenite, a descendant of Moses’ brother-in-law
  - type: note
    content: Or father-in-law.
  - type: text
    content: ' Hobab, had moved away from the other members of his tribe and pitched his tent by the oak of Zaanannim near Kedesh.'
  '12':
  - type: text
    content: 'When Sisera was told that Barak son of Abinoam had gone up to Mount Tabor, '
  '13':
  - type: text
    content: he called for all 900 of his iron chariots and all of his warriors, and they marched from Harosheth-haggoyim to the Kishon River.
  '14':
  - type: text
    content: 'Then Deborah said to Barak, “Get ready! This is the day the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you victory over Sisera, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is marching ahead of you.” So Barak led his 10,000 warriors down the slopes of Mount Tabor into battle. '
  '15':
  - type: text
    content: 'When Barak attacked, the '
  - type: text
    content: Lord
  - type: text
    content: ' threw Sisera and all his chariots and warriors into a panic. Sisera leaped down from his chariot and escaped on foot. '
  '16':
  - type: text
    content: Then Barak chased the chariots and the enemy army all the way to Harosheth-haggoyim, killing all of Sisera’s warriors. Not a single one was left alive.
  '17':
  - type: text
    content: 'Meanwhile, Sisera ran to the tent of Jael, the wife of Heber the Kenite, because Heber’s family was on friendly terms with King Jabin of Hazor. '
  '18':
  - type: text
    content: Jael went out to meet Sisera and said to him, “Come into my tent, sir. Come in. Don’t be afraid.” So he went into her tent, and she covered him with a blanket.
  '19':
  - type: text
    content: “Please give me some water,” he said. “I’m thirsty.” So she gave him some milk from a leather bag and covered him again.
  '2':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' turned them over to King Jabin of Hazor, a Canaanite king. The commander of his army was Sisera, who lived in Harosheth-haggoyim. '
  '20':
  - type: text
    content: “Stand at the door of the tent,” he told her. “If anybody comes and asks you if there is anyone here, say no.”
  '21':
  - type: text
    content: But when Sisera fell asleep from exhaustion, Jael quietly crept up to him with a hammer and tent peg in her hand. Then she drove the tent peg through his temple and into the ground, and so he died.
  '22':
  - type: text
    content: When Barak came looking for Sisera, Jael went out to meet him. She said, “Come, and I will show you the man you are looking for.” So he followed her into the tent and found Sisera lying there dead, with the tent peg through his temple.
  '23':
  - type: text
    content: 'So on that day Israel saw God defeat Jabin, the Canaanite king. '
  '24':
  - type: text
    content: And from that time on Israel became stronger and stronger against King Jabin until they finally destroyed him.
  '3':
  - type: text
    content: 'Sisera, who had 900 iron chariots, ruthlessly oppressed the Israelites for twenty years. Then the people of Israel cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help.'
  '4':
  - type: text
    content: 'Deborah, the wife of Lappidoth, was a prophet who was judging Israel at that time. '
  '5':
  - type: text
    content: 'She would sit under the Palm of Deborah, between Ramah and Bethel in the hill country of Ephraim, and the Israelites would go to her for judgment. '
  '6':
  - type: text
    content: 'One day she sent for Barak son of Abinoam, who lived in Kedesh in the land of Naphtali. She said to him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, commands you: Call out 10,000 warriors from the tribes of Naphtali and Zebulun at Mount Tabor. '
  '7':
  - type: text
    content: And I will call out Sisera, commander of Jabin’s army, along with his chariots and warriors, to the Kishon River. There I will give you victory over him.”
  '8':
  - type: text
    content: Barak told her, “I will go, but only if you go with me.”
  '9':
  - type: text
    content: '“Very well,” she replied, “I will go with you. But you will receive no honor in this venture, for the '
  - type: text
    content: Lord
  - type: text
    content: '’s victory over Sisera will be at the hands of a woman.” So Deborah went with Barak to Kedesh. '
