document_id: JER.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Forbidden to Marry
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me another message. He said, '
  '10':
  - type: text
    content: '“When you tell the people all these things, they will ask, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' decreed such terrible things against us? What have we done to deserve such treatment? What is our sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' our God?’'
  '11':
  - type: text
    content: '“Then you will give them the '
  - type: text
    content: Lord
  - type: text
    content: '’s reply: ‘It is because your ancestors were unfaithful to me. They worshiped other gods and served them. They abandoned me and did not obey my word. '
  '12':
  - type: text
    content: 'And you are even worse than your ancestors! You stubbornly follow your own evil desires and refuse to listen to me. '
  '13':
  - type: text
    content: So I will throw you out of this land and send you into a foreign land where you and your ancestors have never been. There you can worship idols day and night—and I will grant you no favors!’
  - type: heading
    content: Hope despite the Disaster
  '14':
  - type: text
    content: '“But the time is coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when people who are taking an oath will no longer say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who rescued the people of Israel from the land of Egypt.’ '
  '15':
  - type: text
    content: 'Instead, they will say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the people of Israel back to their own land from the land of the north and from all the countries to which he had exiled them.’ For I will bring them back to this land that I gave their ancestors.'
  '16':
  - type: text
    content: '“But now I am sending for many fishermen who will catch them,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “I am sending for hunters who will hunt them down in the mountains, hills, and caves. '
  '17':
  - type: text
    content: 'I am watching them closely, and I see every sin. They cannot hope to hide from me. '
  '18':
  - type: text
    content: I will double their punishment for all their sins, because they have defiled my land with lifeless images of their detestable gods and have filled my territory with their evil deeds.”
  - type: heading
    content: Jeremiah’s Prayer of Confidence
  '19':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are my strength and fortress,'
  - type: text
    content: my refuge in the day of trouble!
  - type: text
    content: Nations from around the world
  - type: text
    content: will come to you and say,
  - type: text
    content: “Our ancestors left us a foolish heritage,
  - type: text
    content: for they worshiped worthless idols.
  '2':
  - type: text
    content: '“Do not get married or have children in this place. '
  '20':
  - type: text
    content: Can people make their own gods?
  - type: text
    content: These are not real gods at all!”
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “Now I will show them my power;
  - type: text
    content: now I will show them my might.
  - type: text
    content: At last they will know and understand
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the children born here in this city and about their mothers and fathers: '
  '4':
  - type: text
    content: They will die from terrible diseases. No one will mourn for them or bury them, and they will lie scattered on the ground like manure. They will die from war and famine, and their bodies will be food for the vultures and wild animals.”
  - type: heading
    content: Judah’s Coming Punishment
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Do not go to funerals to mourn and show sympathy for these people, for I have removed my protection and peace from them. I have taken away my unfailing love and my mercy. '
  '6':
  - type: text
    content: 'Both the great and the lowly will die in this land. No one will bury them or mourn for them. Their friends will not cut themselves in sorrow or shave their heads in sadness. '
  '7':
  - type: text
    content: No one will offer a meal to comfort those who mourn for the dead—not even at the death of a mother or father. No one will send a cup of wine to console them.
  '8':
  - type: text
    content: '“And do not go to their feasts and parties. Do not eat and drink with them at all. '
  '9':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: In your own lifetime, before your very eyes, I will put an end to the happy singing and laughter in this land. The joyful voices of bridegrooms and brides will no longer be heard.'
