document_id: JER.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Forbidden to Marry
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me another message. He said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Do not get married or have children in this place. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the children born here in this city and about their mothers and fathers: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They will die from terrible diseases. No one will mourn for them or bury them, and they will lie scattered on the ground like manure. They will die from war and famine, and their bodies will be food for the vultures and wild animals.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah’s Coming Punishment
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “Do not go to funerals to mourn and show sympathy for these people, for I have removed my protection and peace from them. I have taken away my unfailing love and my mercy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Both the great and the lowly will die in this land. No one will bury them or mourn for them. Their friends will not cut themselves in sorrow or shave their heads in sadness. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No one will offer a meal to comfort those who mourn for the dead—not even at the death of a mother or father. No one will send a cup of wine to console them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“And do not go to their feasts and parties. Do not eat and drink with them at all. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: In your own lifetime, before your very eyes, I will put an end to the happy singing and laughter in this land. The joyful voices of bridegrooms and brides will no longer be heard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“When you tell the people all these things, they will ask, ‘Why has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' decreed such terrible things against us? What have we done to deserve such treatment? What is our sin against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God?’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Then you will give them the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s reply: ‘It is because your ancestors were unfaithful to me. They worshiped other gods and served them. They abandoned me and did not obey my word. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And you are even worse than your ancestors! You stubbornly follow your own evil desires and refuse to listen to me. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So I will throw you out of this land and send you into a foreign land where you and your ancestors have never been. There you can worship idols day and night—and I will grant you no favors!’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hope despite the Disaster
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But the time is coming,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “when people who are taking an oath will no longer say, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, who rescued the people of Israel from the land of Egypt.’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Instead, they will say, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, who brought the people of Israel back to their own land from the land of the north and from all the countries to which he had exiled them.’ For I will bring them back to this land that I gave their ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“But now I am sending for many fishermen who will catch them,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “I am sending for hunters who will hunt them down in the mountains, hills, and caves. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I am watching them closely, and I see every sin. They cannot hope to hide from me. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will double their punishment for all their sins, because they have defiled my land with lifeless images of their detestable gods and have filled my territory with their evil deeds.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Prayer of Confidence
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are my strength and fortress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my refuge in the day of trouble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nations from around the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come to you and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our ancestors left us a foolish heritage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they worshiped worthless idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Can people make their own gods?
- type: usfm
  marker: q2
  children:
  - type: text
    text: These are not real gods at all!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now I will show them my power;
- type: usfm
  marker: q2
  children:
  - type: text
    text: now I will show them my might.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At last they will know and understand
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
