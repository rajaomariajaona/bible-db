document_id: EXO.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Signs of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Power
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But Moses protested again, “What if they won’t believe me or listen to me? What if they say, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' never appeared to you’?”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But Moses pleaded with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “O Lord, I’m not very good with words. I never have been, and I’m not now, even though you have spoken to me. I get tongue-tied, and my words get tangled.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked Moses, “Who makes a person’s mouth? Who decides whether people speak or do not speak, hear or do not hear, see or do not see? Is it not I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Now go! I will be with you as you speak, and I will instruct you in what to say.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But Moses again pleaded, “Lord, please! Send anyone else.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' became angry with Moses. “All right,” he said. “What about your brother, Aaron the Levite? I know he speaks well. And look! He is on his way to meet you now. He will be delighted to see you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Talk to him, and put the words in his mouth. I will be with both of you as you speak, and I will instruct you both in what to do. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aaron will be your spokesman to the people. He will be your mouthpiece, and you will stand in the place of God for him, telling him what to say. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And take your shepherd’s staff with you, and use it to perform the miraculous signs I have shown you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Returns to Egypt
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So Moses went back home to Jethro, his father-in-law. “Please let me return to my relatives in Egypt,” Moses said. “I don’t even know if they are still alive.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go in peace,” Jethro replied.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Before Moses left Midian, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Return to Egypt, for all those who wanted to kill you have died.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked him, “What is that in your hand?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “A shepherd’s staff,” Moses replied.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So Moses took his wife and sons, put them on a donkey, and headed back to the land of Egypt. In his hand he carried the staff of God.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Moses, “When you arrive back in Egypt, go to Pharaoh and perform all the miracles I have empowered you to do. But I will harden his heart so he will refuse to let the people go. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then you will tell him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Israel is my firstborn son. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I commanded you, “Let my son go, so he can worship me.” But since you have refused, I will now kill your firstborn son!’”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'On the way to Egypt, at a place where Moses and his family had stopped for the night, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confronted him and was about to kill him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But Moses’ wife, Zipporah, took a flint knife and circumcised her son. She touched his feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “feet” may refer here to the male sex organ.
      marker-yv: yv-n
    - type: text
      text: ' with the foreskin and said, “Now you are a bridegroom of blood to me.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '(When she said “a bridegroom of blood,” she was referring to the circumcision.) After that, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' left him alone.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Aaron, “Go out into the wilderness to meet Moses.” So Aaron went and met Moses at the mountain of God, and he embraced him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Moses then told Aaron everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him to say. And he told him about the miraculous signs the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him to perform.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then Moses and Aaron returned to Egypt and called all the elders of Israel together. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Throw it down on the ground,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him. So Moses threw down the staff, and it turned into a snake! Moses jumped back.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Aaron told them everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told Moses, and Moses performed the miraculous signs as they watched. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then the people of Israel were convinced that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had sent Moses and Aaron. When they heard that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was concerned about them and had seen their misery, they bowed down and worshiped.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, “Reach out and grab its tail.” So Moses reached out and grabbed it, and it turned back into a shepherd’s staff in his hand.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Perform this sign,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him. “Then they will believe that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors—the God of Abraham, the God of Isaac, and the God of Jacob—really has appeared to you.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Now put your hand inside your cloak.” So Moses put his hand inside his cloak, and when he took it out again, his hand was white as snow with a severe skin disease.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with leprosy. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here can describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Now put your hand back into your cloak,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said. So Moses put his hand back in, and when he took it out again, it was as healthy as the rest of his body.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “If they do not believe you and are not convinced by the first miraculous sign, they will be convinced by the second sign. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And if they don’t believe you or listen to you even after these two signs, then take some water from the Nile River and pour it out on the dry ground. When you do, the water from the Nile will turn to blood on the ground.”
