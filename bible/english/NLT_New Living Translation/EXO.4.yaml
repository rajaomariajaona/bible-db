document_id: EXO.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Signs of the Lord’s Power
  - type: text
    content: 'But Moses protested again, “What if they won’t believe me or listen to me? What if they say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' never appeared to you’?”'
  '10':
  - type: text
    content: 'But Moses pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ', “O Lord, I’m not very good with words. I never have been, and I’m not now, even though you have spoken to me. I get tongue-tied, and my words get tangled.”'
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Moses, “Who makes a person’s mouth? Who decides whether people speak or do not speak, hear or do not hear, see or do not see? Is it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  '12':
  - type: text
    content: Now go! I will be with you as you speak, and I will instruct you in what to say.”
  '13':
  - type: text
    content: But Moses again pleaded, “Lord, please! Send anyone else.”
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' became angry with Moses. “All right,” he said. “What about your brother, Aaron the Levite? I know he speaks well. And look! He is on his way to meet you now. He will be delighted to see you. '
  '15':
  - type: text
    content: 'Talk to him, and put the words in his mouth. I will be with both of you as you speak, and I will instruct you both in what to do. '
  '16':
  - type: text
    content: 'Aaron will be your spokesman to the people. He will be your mouthpiece, and you will stand in the place of God for him, telling him what to say. '
  '17':
  - type: text
    content: And take your shepherd’s staff with you, and use it to perform the miraculous signs I have shown you.”
  - type: heading
    content: Moses Returns to Egypt
  '18':
  - type: text
    content: So Moses went back home to Jethro, his father-in-law. “Please let me return to my relatives in Egypt,” Moses said. “I don’t even know if they are still alive.”
  - type: text
    content: “Go in peace,” Jethro replied.
  '19':
  - type: text
    content: 'Before Moses left Midian, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Return to Egypt, for all those who wanted to kill you have died.”'
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' asked him, “What is that in your hand?”'
  - type: text
    content: “A shepherd’s staff,” Moses replied.
  '20':
  - type: text
    content: So Moses took his wife and sons, put them on a donkey, and headed back to the land of Egypt. In his hand he carried the staff of God.
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “When you arrive back in Egypt, go to Pharaoh and perform all the miracles I have empowered you to do. But I will harden his heart so he will refuse to let the people go. '
  '22':
  - type: text
    content: 'Then you will tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Israel is my firstborn son. '
  '23':
  - type: text
    content: I commanded you, “Let my son go, so he can worship me.” But since you have refused, I will now kill your firstborn son!’”
  '24':
  - type: text
    content: 'On the way to Egypt, at a place where Moses and his family had stopped for the night, the '
  - type: text
    content: Lord
  - type: text
    content: ' confronted him and was about to kill him. '
  '25':
  - type: text
    content: But Moses’ wife, Zipporah, took a flint knife and circumcised her son. She touched his feet
  - type: note
    content: The Hebrew word for “feet” may refer here to the male sex organ.
  - type: text
    content: ' with the foreskin and said, “Now you are a bridegroom of blood to me.” '
  '26':
  - type: text
    content: '(When she said “a bridegroom of blood,” she was referring to the circumcision.) After that, the '
  - type: text
    content: Lord
  - type: text
    content: ' left him alone.'
  '27':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Aaron, “Go out into the wilderness to meet Moses.” So Aaron went and met Moses at the mountain of God, and he embraced him. '
  '28':
  - type: text
    content: 'Moses then told Aaron everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him to say. And he told him about the miraculous signs the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him to perform.'
  '29':
  - type: text
    content: 'Then Moses and Aaron returned to Egypt and called all the elders of Israel together. '
  '3':
  - type: text
    content: '“Throw it down on the ground,” the '
  - type: text
    content: Lord
  - type: text
    content: ' told him. So Moses threw down the staff, and it turned into a snake! Moses jumped back.'
  '30':
  - type: text
    content: 'Aaron told them everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had told Moses, and Moses performed the miraculous signs as they watched. '
  '31':
  - type: text
    content: 'Then the people of Israel were convinced that the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent Moses and Aaron. When they heard that the '
  - type: text
    content: Lord
  - type: text
    content: ' was concerned about them and had seen their misery, they bowed down and worshiped.'
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “Reach out and grab its tail.” So Moses reached out and grabbed it, and it turned back into a shepherd’s staff in his hand.'
  '5':
  - type: text
    content: '“Perform this sign,” the '
  - type: text
    content: Lord
  - type: text
    content: ' told him. “Then they will believe that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors—the God of Abraham, the God of Isaac, and the God of Jacob—really has appeared to you.”'
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Now put your hand inside your cloak.” So Moses put his hand inside his cloak, and when he took it out again, his hand was white as snow with a severe skin disease.'
  - type: note
    content: Or with leprosy. The Hebrew word used here can describe various skin diseases.
  - type: text
    content: ' '
  '7':
  - type: text
    content: '“Now put your hand back into your cloak,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said. So Moses put his hand back in, and when he took it out again, it was as healthy as the rest of his body.'
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “If they do not believe you and are not convinced by the first miraculous sign, they will be convinced by the second sign. '
  '9':
  - type: text
    content: And if they don’t believe you or listen to you even after these two signs, then take some water from the Nile River and pour it out on the dry ground. When you do, the water from the Nile will turn to blood on the ground.”
