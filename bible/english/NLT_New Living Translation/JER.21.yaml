document_id: JER.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: No Deliverance from Babylon
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke through Jeremiah when King Zedekiah sent Pashhur son of Malkijah and Zephaniah son of Maaseiah, the priest, to speak with him. They begged Jeremiah, '
  '10':
  - type: text
    content: 'For I have decided to bring disaster and not good upon this city, says the '
  - type: text
    content: Lord
  - type: text
    content: . It will be handed over to the king of Babylon, and he will reduce it to ashes.’
  - type: heading
    content: Judgment on Judah’s Kings
  '11':
  - type: text
    content: '“Say to the royal family of Judah, ‘Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to the dynasty of David:'
  - type: text
    content: “‘Give justice each morning to the people you judge!
  - type: text
    content: Help those who have been robbed;
  - type: text
    content: rescue them from their oppressors.
  - type: text
    content: Otherwise, my anger will burn like an unquenchable fire
  - type: text
    content: because of all your sins.
  '13':
  - type: text
    content: I will personally fight against the people in Jerusalem,
  - type: text
    content: that mighty fortress—
  - type: text
    content: the people who boast, “No one can touch us here.
  - type: text
    content: No one can break in here.”
  '14':
  - type: text
    content: And I myself will punish you for your sinfulness,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I will light a fire in your forests
  - type: text
    content: that will burn up everything around you.’”
  '2':
  - type: text
    content: '“Please speak to the '
  - type: text
    content: Lord
  - type: text
    content: ' for us and ask him to help us. King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 21:7.
  - type: text
    content: ' of Babylon is attacking Judah. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will be gracious and do a mighty miracle as he has done in the past. Perhaps he will force Nebuchadnezzar to withdraw his armies.”'
  '3':
  - type: text
    content: 'Jeremiah replied, “Go back to King Zedekiah and tell him, '
  '4':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I will make your weapons useless against the king of Babylon and the Babylonians'
  - type: note
    content: Or Chaldeans; also in 21:9.
  - type: text
    content: ' who are outside your walls attacking you. In fact, I will bring your enemies right into the heart of this city. '
  '5':
  - type: text
    content: 'I myself will fight against you with a strong hand and a powerful arm, for I am very angry. You have made me furious! '
  '6':
  - type: text
    content: 'I will send a terrible plague upon this city, and both people and animals will die. '
  '7':
  - type: text
    content: 'And after all that, says the '
  - type: text
    content: Lord
  - type: text
    content: ', I will hand over King Zedekiah, his staff, and everyone else in the city who survives the disease, war, and famine. I will hand them over to King Nebuchadnezzar of Babylon and to their other enemies. He will slaughter them and show them no mercy, pity, or compassion.’'
  '8':
  - type: text
    content: '“Tell all the people, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Take your choice of life or death! '
  '9':
  - type: text
    content: 'Everyone who stays in Jerusalem will die from war, famine, or disease, but those who go out and surrender to the Babylonians will live. Their reward will be life! '
