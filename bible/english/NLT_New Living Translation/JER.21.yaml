document_id: JER.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: No Deliverance from Babylon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke through Jeremiah when King Zedekiah sent Pashhur son of Malkijah and Zephaniah son of Maaseiah, the priest, to speak with him. They begged Jeremiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Please speak to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for us and ask him to help us. King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 21:7.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon is attacking Judah. Perhaps the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be gracious and do a mighty miracle as he has done in the past. Perhaps he will force Nebuchadnezzar to withdraw his armies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jeremiah replied, “Go back to King Zedekiah and tell him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: I will make your weapons useless against the king of Babylon and the Babylonians'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 21:9.
    marker-yv: yv-n
  - type: text
    text: ' who are outside your walls attacking you. In fact, I will bring your enemies right into the heart of this city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I myself will fight against you with a strong hand and a powerful arm, for I am very angry. You have made me furious! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will send a terrible plague upon this city, and both people and animals will die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And after all that, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will hand over King Zedekiah, his staff, and everyone else in the city who survives the disease, war, and famine. I will hand them over to King Nebuchadnezzar of Babylon and to their other enemies. He will slaughter them and show them no mercy, pity, or compassion.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Tell all the people, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Take your choice of life or death! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Everyone who stays in Jerusalem will die from war, famine, or disease, but those who go out and surrender to the Babylonians will live. Their reward will be life! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For I have decided to bring disaster and not good upon this city, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . It will be handed over to the king of Babylon, and he will reduce it to ashes.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment on Judah’s Kings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Say to the royal family of Judah, ‘Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to the dynasty of David:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Give justice each morning to the people you judge!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Help those who have been robbed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescue them from their oppressors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Otherwise, my anger will burn like an unquenchable fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all your sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I will personally fight against the people in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that mighty fortress—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the people who boast, “No one can touch us here.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one can break in here.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And I myself will punish you for your sinfulness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will light a fire in your forests
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will burn up everything around you.’”
