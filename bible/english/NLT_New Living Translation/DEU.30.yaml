document_id: DEU.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Return to the Lord
  - type: text
    content: '“In the future, when you experience all these blessings and curses I have listed for you, and when you are living among the nations to which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has exiled you, take to heart all these instructions. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will delight in you if you obey his voice and keep the commands and decrees written in this Book of Instruction, and if you turn to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and soul.'
  - type: heading
    content: The Choice of Life or Death
  '11':
  - type: text
    content: '“This command I am giving you today is not too difficult for you, and it is not beyond your reach. '
  '12':
  - type: text
    content: 'It is not kept in heaven, so distant that you must ask, ‘Who will go up to heaven and bring it down so we can hear it and obey?’ '
  '13':
  - type: text
    content: 'It is not kept beyond the sea, so far away that you must ask, ‘Who will cross the sea to bring it to us so we can hear it and obey?’ '
  '14':
  - type: text
    content: No, the message is very close at hand; it is on your lips and in your heart so that you can obey it.
  '15':
  - type: text
    content: '“Now listen! Today I am giving you a choice between life and death, between prosperity and disaster. '
  '16':
  - type: text
    content: 'For I command you this day to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and to keep his commands, decrees, and regulations by walking in his ways. If you do this, you will live and multiply, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you and the land you are about to enter and occupy.'
  '17':
  - type: text
    content: '“But if your heart turns away and you refuse to listen, and if you are drawn away to serve and worship other gods, '
  '18':
  - type: text
    content: then I warn you now that you will certainly be destroyed. You will not live a long, good life in the land you are crossing the Jordan to occupy.
  '19':
  - type: text
    content: '“Today I have given you the choice between life and death, between blessings and curses. Now I call on heaven and earth to witness the choice you make. Oh, that you would choose life, so that you and your descendants might live! '
  '2':
  - type: text
    content: 'If at that time you and your children return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and if you obey with all your heart and all your soul all the commands I have given you today, '
  '20':
  - type: text
    content: 'You can make this choice by loving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, obeying him, and committing yourself firmly to him. This'
  - type: note
    content: Or He.
  - type: text
    content: ' is the key to your life. And if you love and obey the '
  - type: text
    content: Lord
  - type: text
    content: ', you will live long in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give your ancestors Abraham, Isaac, and Jacob.”'
  '3':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will restore your fortunes. He will have mercy on you and gather you back from all the nations where he has scattered you. '
  '4':
  - type: text
    content: Even though you are banished to the ends of the earth,
  - type: note
    content: Hebrew of the heavens.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will gather you from there and bring you back again. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will return you to the land that belonged to your ancestors, and you will possess that land again. Then he will make you even more prosperous and numerous than your ancestors!'
  '6':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will change your heart'
  - type: note
    content: Hebrew circumcise your heart.
  - type: text
    content: ' and the hearts of all your descendants, so that you will love him with all your heart and soul and so you may live! '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will inflict all these curses on your enemies and on those who hate and persecute you. '
  '8':
  - type: text
    content: 'Then you will again obey the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep all his commands that I am giving you today.'
  '9':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will then make you successful in everything you do. He will give you many children and numerous livestock, and he will cause your fields to produce abundant harvests, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will again delight in being good to you as he was to your ancestors. '
