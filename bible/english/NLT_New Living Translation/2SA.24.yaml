document_id: 2SA.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Takes a Census
  - type: text
    content: 'Once again the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against Israel, and he caused David to harm them by taking a census. “Go and count the people of Israel and Judah,” the '
  - type: text
    content: Lord
  - type: text
    content: ' told him.'
  '10':
  - type: text
    content: 'But after he had taken the census, David’s conscience began to bother him. And he said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have sinned greatly by taking this census. Please forgive my guilt, '
  - type: text
    content: Lord
  - type: text
    content: ', for doing this foolish thing.”'
  '11':
  - type: text
    content: 'The next morning the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet Gad, who was David’s seer. This was the message: '
  '12':
  - type: text
    content: '“Go and say to David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will give you three choices. Choose one of these punishments, and I will inflict it on you.’”'
  '13':
  - type: text
    content: So Gad came to David and asked him, “Will you choose three
  - type: note
    content: As in Greek version (see also 1 Chr 21:12); Hebrew reads seven.
  - type: text
    content: ' years of famine throughout your land, three months of fleeing from your enemies, or three days of severe plague throughout your land? Think this over and decide what answer I should give the '
  - type: text
    content: Lord
  - type: text
    content: ' who sent me.”'
  '14':
  - type: text
    content: '“I’m in a desperate situation!” David replied to Gad. “But let us fall into the hands of the '
  - type: text
    content: Lord
  - type: text
    content: ', for his mercy is great. Do not let me fall into human hands.”'
  '15':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a plague upon Israel that morning, and it lasted for three days.'
  - type: note
    content: Hebrew for the designated time.
  - type: text
    content: ' A total of 70,000 people died throughout the nation, from Dan in the north to Beersheba in the south. '
  '16':
  - type: text
    content: 'But as the angel was preparing to destroy Jerusalem, the '
  - type: text
    content: Lord
  - type: text
    content: ' relented and said to the death angel, “Stop! That is enough!” At that moment the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was by the threshing floor of Araunah the Jebusite.'
  '17':
  - type: text
    content: 'When David saw the angel, he said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “I am the one who has sinned and done wrong! But these people are as innocent as sheep—what have they done? Let your anger fall against me and my family.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'That day Gad came to David and said to him, “Go up and build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite.”'
  '19':
  - type: text
    content: 'So David went up to do what the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him. '
  '2':
  - type: text
    content: So the king said to Joab and the commanders
  - type: note
    content: As in Greek version (see also 24:4 and 1 Chr 21:2); Hebrew reads Joab the commander.
  - type: text
    content: ' of the army, “Take a census of all the tribes of Israel—from Dan in the north to Beersheba in the south—so I may know how many people there are.”'
  '20':
  - type: text
    content: 'When Araunah saw the king and his men coming toward him, he came and bowed before the king with his face to the ground. '
  '21':
  - type: text
    content: “Why have you come, my lord the king?” Araunah asked.
  - type: text
    content: 'David replied, “I have come to buy your threshing floor and to build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' there, so that he will stop the plague.”'
  '22':
  - type: text
    content: '“Take it, my lord the king, and use it as you wish,” Araunah said to David. “Here are oxen for the burnt offering, and you can use the threshing boards and ox yokes for wood to build a fire on the altar. '
  '23':
  - type: text
    content: 'I will give it all to you, Your Majesty, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' your God accept your sacrifice.”'
  '24':
  - type: text
    content: 'But the king replied to Araunah, “No, I insist on buying it, for I will not present burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God that have cost me nothing.” So David paid him fifty pieces of silver'
  - type: note
    content: Hebrew 50 shekels of silver, about 20 ounces or 570 grams in weight.
  - type: text
    content: ' for the threshing floor and the oxen.'
  '25':
  - type: text
    content: 'David built an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: ' and sacrificed burnt offerings and peace offerings. And the '
  - type: text
    content: Lord
  - type: text
    content: ' answered his prayer for the land, and the plague on Israel was stopped.'
  '3':
  - type: text
    content: 'But Joab replied to the king, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God let you live to see a hundred times as many people as there are now! But why, my lord the king, do you want to do this?”'
  '4':
  - type: text
    content: 'But the king insisted that they take the census, so Joab and the commanders of the army went out to count the people of Israel. '
  '5':
  - type: text
    content: 'First they crossed the Jordan and camped at Aroer, south of the town in the valley, in the direction of Gad. Then they went on to Jazer, '
  '6':
  - type: text
    content: then to Gilead in the land of Tahtim-hodshi
  - type: note
    content: Greek version reads to Gilead and to Kadesh in the land of the Hittites.
  - type: text
    content: ' and to Dan-jaan and around to Sidon. '
  '7':
  - type: text
    content: Then they came to the fortress of Tyre, and all the towns of the Hivites and Canaanites. Finally, they went south to Judah
  - type: note
    content: Or they went to the Negev of Judah.
  - type: text
    content: ' as far as Beersheba.'
  '8':
  - type: text
    content: 'Having gone through the entire land for nine months and twenty days, they returned to Jerusalem. '
  '9':
  - type: text
    content: Joab reported the number of people to the king. There were 800,000 capable warriors in Israel who could handle a sword, and 500,000 in Judah.
  - type: heading
    content: Judgment for David’s Sin
