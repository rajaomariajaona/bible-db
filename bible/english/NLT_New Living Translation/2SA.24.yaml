document_id: 2SA.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Takes a Census
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Once again the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' burned against Israel, and he caused David to harm them by taking a census. “Go and count the people of Israel and Judah,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him.'
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But after he had taken the census, David’s conscience began to bother him. And he said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I have sinned greatly by taking this census. Please forgive my guilt, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for doing this foolish thing.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next morning the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to the prophet Gad, who was David’s seer. This was the message: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go and say to David, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will give you three choices. Choose one of these punishments, and I will inflict it on you.’”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Gad came to David and asked him, “Will you choose three
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 1 Chr 21:12); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seven.
      marker-yv: yv-n
    - type: text
      text: ' years of famine throughout your land, three months of fleeing from your enemies, or three days of severe plague throughout your land? Think this over and decide what answer I should give the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who sent me.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I’m in a desperate situation!” David replied to Gad. “But let us fall into the hands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for his mercy is great. Do not let me fall into human hands.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent a plague upon Israel that morning, and it lasted for three days.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for the designated time.
      marker-yv: yv-n
    - type: text
      text: ' A total of 70,000 people died throughout the nation, from Dan in the north to Beersheba in the south. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as the angel was preparing to destroy Jerusalem, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' relented and said to the death angel, “Stop! That is enough!” At that moment the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was by the threshing floor of Araunah the Jebusite.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David saw the angel, he said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I am the one who has sinned and done wrong! But these people are as innocent as sheep—what have they done? Let your anger fall against me and my family.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Builds an Altar
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That day Gad came to David and said to him, “Go up and build an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the threshing floor of Araunah the Jebusite.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David went up to do what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king said to Joab and the commanders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 24:4 and 1 Chr 21:2); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joab the commander.
      marker-yv: yv-n
    - type: text
      text: ' of the army, “Take a census of all the tribes of Israel—from Dan in the north to Beersheba in the south—so I may know how many people there are.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Araunah saw the king and his men coming toward him, he came and bowed before the king with his face to the ground. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why have you come, my lord the king?” Araunah asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David replied, “I have come to buy your threshing floor and to build an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' there, so that he will stop the plague.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take it, my lord the king, and use it as you wish,” Araunah said to David. “Here are oxen for the burnt offering, and you can use the threshing boards and ox yokes for wood to build a fire on the altar. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give it all to you, Your Majesty, and may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God accept your sacrifice.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king replied to Araunah, “No, I insist on buying it, for I will not present burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God that have cost me nothing.” So David paid him fifty pieces of silver'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 shekels of silver, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 20 ounces or 570 grams in weight.
      marker-yv: yv-n
    - type: text
      text: ' for the threshing floor and the oxen.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David built an altar there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and sacrificed burnt offerings and peace offerings. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered his prayer for the land, and the plague on Israel was stopped.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joab replied to the king, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God let you live to see a hundred times as many people as there are now! But why, my lord the king, do you want to do this?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king insisted that they take the census, so Joab and the commanders of the army went out to count the people of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'First they crossed the Jordan and camped at Aroer, south of the town in the valley, in the direction of Gad. Then they went on to Jazer, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then to Gilead in the land of Tahtim-hodshi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Gilead and to Kadesh in the land of the Hittites.
      marker-yv: yv-n
    - type: text
      text: ' and to Dan-jaan and around to Sidon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they came to the fortress of Tyre, and all the towns of the Hivites and Canaanites. Finally, they went south to Judah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they went to the Negev of Judah.
      marker-yv: yv-n
    - type: text
      text: ' as far as Beersheba.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having gone through the entire land for nine months and twenty days, they returned to Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joab reported the number of people to the king. There were 800,000 capable warriors in Israel who could handle a sword, and 500,000 in Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment for David’s Sin
    marker-yv: yv-h
