document_id: JDG.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Deborah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'On that day Deborah and Barak son of Abinoam sang this song:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Consider this, you who ride on fine donkeys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who sit on fancy saddle blankets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you who walk along the road.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Listen to the village musicians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gathered at the watering holes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They recount the righteous victories of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the victories of his villagers in Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: marched down to the city gates.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Wake up, Deborah, wake up!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up, wake up, and sing a song!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, Barak!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead your captives away, son of Abinoam!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Down from Tabor marched the few against the nobles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' marched down against mighty warriors.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They came down from Ephraim—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a land that once belonged to the Amalekites;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they followed you, Benjamin, with your troops.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Makir the commanders marched down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Zebulun came those who carry a commander’s staff.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The princes of Issachar were with Deborah and Barak.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They followed Barak, rushing into the valley.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the tribe of Reuben
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was great indecision.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Syriac version, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'searchings of heart; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: resolve of heart.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Why did you sit at home among the sheepfolds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hear the shepherds whistle for their flocks?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, in the tribe of Reuben
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was great indecision.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Gilead remained east of the Jordan.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And why did Dan stay home?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asher sat unmoved at the seashore,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remaining in his harbors.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But Zebulun risked his life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as did Naphtali, on the heights of the battlefield.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The kings of Canaan came and fought,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at Taanach near Megiddo’s springs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they carried off no silver treasures.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Israel’s leaders took charge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people gladly followed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The stars fought from heaven.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The stars in their orbits fought against Sisera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The Kishon River swept them away—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that ancient torrent, the Kishon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: March on with courage, my soul!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then the horses’ hooves hammered the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the galloping, galloping of Sisera’s mighty steeds.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '‘Let the people of Meroz be cursed,’ said the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Let them be utterly cursed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because they did not come to help the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to help the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against the mighty warriors.’'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Most blessed among women is Jael,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wife of Heber the Kenite.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May she be blessed above all women who live in tents.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Sisera asked for water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she gave him milk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a bowl fit for nobles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she brought him yogurt.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then with her left hand she reached for a tent peg,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with her right hand for the workman’s hammer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She struck Sisera with the hammer, crushing his head.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With a shattering blow, she pierced his temples.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He sank, he fell,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he lay still at her feet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And where he sank,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there he died.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “From the window Sisera’s mother looked out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Through the window she watched for his return, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Why is his chariot so long in coming?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why don’t we hear the sound of chariot wheels?’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Her wise women answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and she repeats these words to herself:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Listen, you kings!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention, you mighty rulers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I will sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will make music to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ‘They must be dividing the captured plunder—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a woman or two for every man.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be colorful robes for Sisera,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and colorful, embroidered robes for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the plunder will include
  - type: usfm
    marker: q2
    children:
    - type: text
      text: colorful robes embroidered on both sides.’
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', may all your enemies die like Sisera!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But may those who love you rise like the sun in all its power!”
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then there was peace in the land for forty years.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when you set out from Seir'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and marched across the fields of Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the earth trembled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cloudy skies poured down rain.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The mountains quaked in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Mount Sinai—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “In the days of Shamgar son of Anath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the days of Jael,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: people avoided the main roads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and travelers stayed on winding pathways.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: There were few people left in the villages of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until Deborah arose as a mother for Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When Israel chose new gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: war erupted at the city gates.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet not a shield or spear could be seen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among forty thousand warriors in Israel!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My heart is with the commanders of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with those who volunteered for war.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
