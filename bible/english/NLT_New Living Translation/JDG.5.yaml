document_id: JDG.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Deborah
  - type: text
    content: 'On that day Deborah and Barak son of Abinoam sang this song:'
  '10':
  - type: text
    content: “Consider this, you who ride on fine donkeys,
  - type: text
    content: you who sit on fancy saddle blankets,
  - type: text
    content: and you who walk along the road.
  '11':
  - type: text
    content: Listen to the village musicians
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: gathered at the watering holes.
  - type: text
    content: 'They recount the righteous victories of the '
  - type: text
    content: Lord
  - type: text
    content: and the victories of his villagers in Israel.
  - type: text
    content: 'Then the people of the '
  - type: text
    content: Lord
  - type: text
    content: marched down to the city gates.
  '12':
  - type: text
    content: “Wake up, Deborah, wake up!
  - type: text
    content: Wake up, wake up, and sing a song!
  - type: text
    content: Arise, Barak!
  - type: text
    content: Lead your captives away, son of Abinoam!
  '13':
  - type: text
    content: “Down from Tabor marched the few against the nobles.
  - type: text
    content: 'The people of the '
  - type: text
    content: Lord
  - type: text
    content: ' marched down against mighty warriors.'
  '14':
  - type: text
    content: They came down from Ephraim—
  - type: text
    content: a land that once belonged to the Amalekites;
  - type: text
    content: they followed you, Benjamin, with your troops.
  - type: text
    content: From Makir the commanders marched down;
  - type: text
    content: from Zebulun came those who carry a commander’s staff.
  '15':
  - type: text
    content: The princes of Issachar were with Deborah and Barak.
  - type: text
    content: They followed Barak, rushing into the valley.
  - type: text
    content: But in the tribe of Reuben
  - type: text
    content: there was great indecision.
  - type: note
    content: As in some Hebrew manuscripts and Syriac version, which read searchings of heart; Masoretic Text reads resolve of heart.
  '16':
  - type: text
    content: Why did you sit at home among the sheepfolds—
  - type: text
    content: to hear the shepherds whistle for their flocks?
  - type: text
    content: Yes, in the tribe of Reuben
  - type: text
    content: there was great indecision.
  '17':
  - type: text
    content: Gilead remained east of the Jordan.
  - type: text
    content: And why did Dan stay home?
  - type: text
    content: Asher sat unmoved at the seashore,
  - type: text
    content: remaining in his harbors.
  '18':
  - type: text
    content: But Zebulun risked his life,
  - type: text
    content: as did Naphtali, on the heights of the battlefield.
  '19':
  - type: text
    content: “The kings of Canaan came and fought,
  - type: text
    content: at Taanach near Megiddo’s springs,
  - type: text
    content: but they carried off no silver treasures.
  '2':
  - type: text
    content: “Israel’s leaders took charge,
  - type: text
    content: and the people gladly followed.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '20':
  - type: text
    content: The stars fought from heaven.
  - type: text
    content: The stars in their orbits fought against Sisera.
  '21':
  - type: text
    content: The Kishon River swept them away—
  - type: text
    content: that ancient torrent, the Kishon.
  - type: text
    content: March on with courage, my soul!
  '22':
  - type: text
    content: Then the horses’ hooves hammered the ground,
  - type: text
    content: the galloping, galloping of Sisera’s mighty steeds.
  '23':
  - type: text
    content: '‘Let the people of Meroz be cursed,’ said the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ‘Let them be utterly cursed,
  - type: text
    content: 'because they did not come to help the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: 'to help the '
  - type: text
    content: Lord
  - type: text
    content: ' against the mighty warriors.’'
  '24':
  - type: text
    content: “Most blessed among women is Jael,
  - type: text
    content: the wife of Heber the Kenite.
  - type: text
    content: May she be blessed above all women who live in tents.
  '25':
  - type: text
    content: Sisera asked for water,
  - type: text
    content: and she gave him milk.
  - type: text
    content: In a bowl fit for nobles,
  - type: text
    content: she brought him yogurt.
  '26':
  - type: text
    content: Then with her left hand she reached for a tent peg,
  - type: text
    content: and with her right hand for the workman’s hammer.
  - type: text
    content: She struck Sisera with the hammer, crushing his head.
  - type: text
    content: With a shattering blow, she pierced his temples.
  '27':
  - type: text
    content: He sank, he fell,
  - type: text
    content: he lay still at her feet.
  - type: text
    content: And where he sank,
  - type: text
    content: there he died.
  '28':
  - type: text
    content: “From the window Sisera’s mother looked out.
  - type: text
    content: Through the window she watched for his return, saying,
  - type: text
    content: ‘Why is his chariot so long in coming?
  - type: text
    content: Why don’t we hear the sound of chariot wheels?’
  '29':
  - type: text
    content: “Her wise women answer,
  - type: text
    content: 'and she repeats these words to herself:'
  '3':
  - type: text
    content: “Listen, you kings!
  - type: text
    content: Pay attention, you mighty rulers!
  - type: text
    content: 'For I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'I will make music to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '30':
  - type: text
    content: ‘They must be dividing the captured plunder—
  - type: text
    content: with a woman or two for every man.
  - type: text
    content: There will be colorful robes for Sisera,
  - type: text
    content: and colorful, embroidered robes for me.
  - type: text
    content: Yes, the plunder will include
  - type: text
    content: colorful robes embroidered on both sides.’
  '31':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', may all your enemies die like Sisera!'
  - type: text
    content: But may those who love you rise like the sun in all its power!”
  - type: text
    content: Then there was peace in the land for forty years.
  '4':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', when you set out from Seir'
  - type: text
    content: and marched across the fields of Edom,
  - type: text
    content: the earth trembled,
  - type: text
    content: and the cloudy skies poured down rain.
  '5':
  - type: text
    content: 'The mountains quaked in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the God of Mount Sinai—
  - type: text
    content: 'in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the God of Israel.
  '6':
  - type: text
    content: “In the days of Shamgar son of Anath,
  - type: text
    content: and in the days of Jael,
  - type: text
    content: people avoided the main roads,
  - type: text
    content: and travelers stayed on winding pathways.
  '7':
  - type: text
    content: There were few people left in the villages of Israel
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: —
  - type: text
    content: until Deborah arose as a mother for Israel.
  '8':
  - type: text
    content: When Israel chose new gods,
  - type: text
    content: war erupted at the city gates.
  - type: text
    content: Yet not a shield or spear could be seen
  - type: text
    content: among forty thousand warriors in Israel!
  '9':
  - type: text
    content: My heart is with the commanders of Israel,
  - type: text
    content: with those who volunteered for war.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
