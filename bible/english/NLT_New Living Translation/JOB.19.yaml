document_id: JOB.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Sixth Speech: A Response to Bildad'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: He has demolished me on every side, and I am finished.
  - type: text
    content: He has uprooted my hope like a fallen tree.
  '11':
  - type: text
    content: His fury burns against me;
  - type: text
    content: he counts me as an enemy.
  '12':
  - type: text
    content: His troops advance.
  - type: text
    content: They build up roads to attack me.
  - type: text
    content: They camp all around my tent.
  '13':
  - type: text
    content: “My relatives stay far away,
  - type: text
    content: and my friends have turned against me.
  '14':
  - type: text
    content: My family is gone,
  - type: text
    content: and my close friends have forgotten me.
  '15':
  - type: text
    content: My servants and maids consider me a stranger.
  - type: text
    content: I am like a foreigner to them.
  '16':
  - type: text
    content: When I call my servant, he doesn’t come;
  - type: text
    content: I have to plead with him!
  '17':
  - type: text
    content: My breath is repulsive to my wife.
  - type: text
    content: I am rejected by my own family.
  '18':
  - type: text
    content: Even young children despise me.
  - type: text
    content: When I stand to speak, they turn their backs on me.
  '19':
  - type: text
    content: My close friends detest me.
  - type: text
    content: Those I loved have turned against me.
  '2':
  - type: text
    content: “How long will you torture me?
  - type: text
    content: How long will you try to crush me with your words?
  '20':
  - type: text
    content: I have been reduced to skin and bones
  - type: text
    content: and have escaped death by the skin of my teeth.
  '21':
  - type: text
    content: “Have mercy on me, my friends, have mercy,
  - type: text
    content: for the hand of God has struck me.
  '22':
  - type: text
    content: Must you also persecute me, like God does?
  - type: text
    content: Haven’t you chewed me up enough?
  '23':
  - type: text
    content: “Oh, that my words could be recorded.
  - type: text
    content: Oh, that they could be inscribed on a monument,
  '24':
  - type: text
    content: carved with an iron chisel and filled with lead,
  - type: text
    content: engraved forever in the rock.
  '25':
  - type: text
    content: “But as for me, I know that my Redeemer lives,
  - type: text
    content: and he will stand upon the earth at last.
  '26':
  - type: text
    content: And after my body has decayed,
  - type: text
    content: yet in my body I will see God!
  - type: note
    content: Or without my body I will see God. The meaning of the Hebrew is uncertain.
  '27':
  - type: text
    content: I will see him for myself.
  - type: text
    content: Yes, I will see him with my own eyes.
  - type: text
    content: I am overwhelmed at the thought!
  '28':
  - type: text
    content: “How dare you go on persecuting me,
  - type: text
    content: saying, ‘It’s his own fault’?
  '29':
  - type: text
    content: You should fear punishment yourselves,
  - type: text
    content: for your attitude deserves punishment.
  - type: text
    content: Then you will know that there is indeed a judgment.”
  '3':
  - type: text
    content: You have already insulted me ten times.
  - type: text
    content: You should be ashamed of treating me so badly.
  '4':
  - type: text
    content: Even if I have sinned,
  - type: text
    content: that is my concern, not yours.
  '5':
  - type: text
    content: You think you’re better than I am,
  - type: text
    content: using my humiliation as evidence of my sin.
  '6':
  - type: text
    content: But it is God who has wronged me,
  - type: text
    content: capturing me in his net.
  - type: note
    content: Or for I am like a city under siege.
  '7':
  - type: text
    content: “I cry out, ‘Help!’ but no one answers me.
  - type: text
    content: I protest, but there is no justice.
  '8':
  - type: text
    content: God has blocked my way so I cannot move.
  - type: text
    content: He has plunged my path into darkness.
  '9':
  - type: text
    content: He has stripped me of my honor
  - type: text
    content: and removed the crown from my head.
