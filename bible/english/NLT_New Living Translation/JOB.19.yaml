document_id: JOB.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job’s Sixth Speech: A Response to Bildad'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Job spoke again:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has demolished me on every side, and I am finished.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has uprooted my hope like a fallen tree.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His fury burns against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he counts me as an enemy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His troops advance.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They build up roads to attack me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They camp all around my tent.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My relatives stay far away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my friends have turned against me.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My family is gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my close friends have forgotten me.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My servants and maids consider me a stranger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am like a foreigner to them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I call my servant, he doesn’t come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have to plead with him!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My breath is repulsive to my wife.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am rejected by my own family.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even young children despise me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I stand to speak, they turn their backs on me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My close friends detest me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those I loved have turned against me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How long will you torture me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you try to crush me with your words?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been reduced to skin and bones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have escaped death by the skin of my teeth.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have mercy on me, my friends, have mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the hand of God has struck me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must you also persecute me, like God does?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Haven’t you chewed me up enough?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that my words could be recorded.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, that they could be inscribed on a monument,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: carved with an iron chisel and filled with lead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: engraved forever in the rock.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But as for me, I know that my Redeemer lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will stand upon the earth at last.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And after my body has decayed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet in my body I will see God!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'without my body I will see God. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will see him for myself.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I will see him with my own eyes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am overwhelmed at the thought!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How dare you go on persecuting me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, ‘It’s his own fault’?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You should fear punishment yourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your attitude deserves punishment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then you will know that there is indeed a judgment.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have already insulted me ten times.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You should be ashamed of treating me so badly.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if I have sinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is my concern, not yours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You think you’re better than I am,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: using my humiliation as evidence of my sin.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is God who has wronged me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: capturing me in his net.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for I am like a city under siege.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I cry out, ‘Help!’ but no one answers me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I protest, but there is no justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has blocked my way so I cannot move.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has plunged my path into darkness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has stripped me of my honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and removed the crown from my head.
