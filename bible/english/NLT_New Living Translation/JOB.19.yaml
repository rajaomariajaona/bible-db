document_id: JOB.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job’s Sixth Speech: A Response to Bildad'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job spoke again:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How long will you torture me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you try to crush me with your words?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have already insulted me ten times.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You should be ashamed of treating me so badly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even if I have sinned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is my concern, not yours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You think you’re better than I am,
- type: usfm
  marker: q2
  children:
  - type: text
    text: using my humiliation as evidence of my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But it is God who has wronged me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: capturing me in his net.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for I am like a city under siege.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I cry out, ‘Help!’ but no one answers me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I protest, but there is no justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God has blocked my way so I cannot move.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has plunged my path into darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He has stripped me of my honor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and removed the crown from my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He has demolished me on every side, and I am finished.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has uprooted my hope like a fallen tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: His fury burns against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he counts me as an enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: His troops advance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They build up roads to attack me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They camp all around my tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “My relatives stay far away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my friends have turned against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My family is gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my close friends have forgotten me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My servants and maids consider me a stranger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am like a foreigner to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When I call my servant, he doesn’t come;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have to plead with him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My breath is repulsive to my wife.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am rejected by my own family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Even young children despise me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I stand to speak, they turn their backs on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My close friends detest me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those I loved have turned against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have been reduced to skin and bones
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have escaped death by the skin of my teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Have mercy on me, my friends, have mercy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the hand of God has struck me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Must you also persecute me, like God does?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Haven’t you chewed me up enough?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Oh, that my words could be recorded.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, that they could be inscribed on a monument,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: carved with an iron chisel and filled with lead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: engraved forever in the rock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “But as for me, I know that my Redeemer lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will stand upon the earth at last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And after my body has decayed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet in my body I will see God!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'without my body I will see God. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I will see him for myself.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, I will see him with my own eyes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am overwhelmed at the thought!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “How dare you go on persecuting me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, ‘It’s his own fault’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: You should fear punishment yourselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your attitude deserves punishment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then you will know that there is indeed a judgment.”
