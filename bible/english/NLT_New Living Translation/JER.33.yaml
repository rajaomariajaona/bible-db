document_id: JER.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promises of Peace and Prosperity
  - type: text
    content: 'While Jeremiah was still confined in the courtyard of the guard, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him this second message: '
  '10':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have said, ‘This is a desolate land where people and animals have all disappeared.’ Yet in the empty streets of Jerusalem and Judah’s other towns, there will be heard once more '
  '11':
  - type: text
    content: 'the sounds of joy and laughter. The joyful voices of bridegrooms and brides will be heard again, along with the joyous songs of people bringing thanksgiving offerings to the '
  - type: text
    content: Lord
  - type: text
    content: . They will sing,
  - type: text
    content: '‘Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is good.'
  - type: text
    content: His faithful love endures forever!’
  - type: text
    content: 'For I will restore the prosperity of this land to what it was in the past, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: This land—though it is now desolate and has no people and animals—will once more have pastures where shepherds can lead their flocks. '
  '13':
  - type: text
    content: Once again shepherds will count their flocks in the towns of the hill country, the foothills of Judah,
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' the Negev, the land of Benjamin, the vicinity of Jerusalem, and all the towns of Judah. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '14':
  - type: text
    content: '“The day will come, says the '
  - type: text
    content: Lord
  - type: text
    content: ', when I will do for Israel and Judah all the good things I have promised them.'
  '15':
  - type: text
    content: “In those days and at that time
  - type: text
    content: I will raise up a righteous descendant
  - type: note
    content: Hebrew a righteous branch.
  - type: text
    content: ' from King David’s line.'
  - type: text
    content: He will do what is just and right throughout the land.
  '16':
  - type: text
    content: In that day Judah will be saved,
  - type: text
    content: and Jerusalem will live in safety.
  - type: text
    content: 'And this will be its name:'
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Is Our Righteousness.’'
  - type: note
    content: Hebrew Yahweh Tsidqenu.
  '17':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: David will have a descendant sitting on the throne of Israel forever. '
  '18':
  - type: text
    content: And there will always be Levitical priests to offer burnt offerings and grain offerings and sacrifices to me.”
  '19':
  - type: text
    content: 'Then this message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—the '
  - type: text
    content: Lord
  - type: text
    content: ' who made the earth, who formed and established it, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '20':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: If you can break my covenant with the day and the night so that one does not follow the other, '
  '21':
  - type: text
    content: 'only then will my covenant with my servant David be broken. Only then will he no longer have a descendant to reign on his throne. The same is true for my covenant with the Levitical priests who minister before me. '
  '22':
  - type: text
    content: And as the stars of the sky cannot be counted and the sand on the seashore cannot be measured, so I will multiply the descendants of my servant David and the Levites who minister before me.”
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave another message to Jeremiah. He said, '
  '24':
  - type: text
    content: '“Have you noticed what people are saying?—‘The '
  - type: text
    content: Lord
  - type: text
    content: ' chose Judah and Israel and then abandoned them!’ They are sneering and saying that Israel is not worthy to be counted as a nation. '
  '25':
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I would no more reject my people than I would change my laws that govern night and day, earth and sky. '
  '26':
  - type: text
    content: I will never abandon the descendants of Jacob or David, my servant, or change the plan that David’s descendants will rule the descendants of Abraham, Isaac, and Jacob. Instead, I will restore them to their land and have mercy on them.”
  '3':
  - type: text
    content: 'Ask me and I will tell you remarkable secrets you do not know about things to come. '
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: You have torn down the houses of this city and even the king’s palace to get materials to strengthen the walls against the siege ramps and swords of the enemy. '
  '5':
  - type: text
    content: You expect to fight the Babylonians,
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' but the men of this city are already as good as dead, for I have determined to destroy them in my terrible anger. I have abandoned them because of all their wickedness.'
  '6':
  - type: text
    content: '“Nevertheless, the time will come when I will heal Jerusalem’s wounds and give it prosperity and true peace. '
  '7':
  - type: text
    content: 'I will restore the fortunes of Judah and Israel and rebuild their towns. '
  '8':
  - type: text
    content: 'I will cleanse them of their sins against me and forgive all their sins of rebellion. '
  '9':
  - type: text
    content: Then this city will bring me joy, glory, and honor before all the nations of the earth! The people of the world will see all the good I do for my people, and they will tremble with awe at the peace and prosperity I provide for them.
