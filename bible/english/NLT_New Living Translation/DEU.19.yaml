document_id: DEU.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cities of Refuge
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God destroys the nations whose land he is giving you, you will take over their land and settle in their towns and homes. '
  '10':
  - type: text
    content: 'That way you will prevent the death of innocent people in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your special possession. You will not be held responsible for the death of innocent people.'
  '11':
  - type: text
    content: '“But suppose someone is hostile toward a neighbor and deliberately ambushes and murders him and then flees to one of the cities of refuge. '
  '12':
  - type: text
    content: 'In that case, the elders of the murderer’s hometown must send agents to the city of refuge to bring him back and hand him over to the dead person’s avenger to be put to death. '
  '13':
  - type: text
    content: Do not feel sorry for that murderer! Purge from Israel the guilt of murdering innocent people; then all will go well with you.
  - type: heading
    content: Concern for Justice
  '14':
  - type: text
    content: '“When you arrive in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your special possession, you must never steal anyone’s land by moving the boundary markers your ancestors set up to mark their property.'
  '15':
  - type: text
    content: “You must not convict anyone of a crime on the testimony of only one witness. The facts of the case must be established by the testimony of two or three witnesses.
  '16':
  - type: text
    content: '“If a malicious witness comes forward and accuses someone of a crime, '
  '17':
  - type: text
    content: 'then both the accuser and accused must appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' by coming to the priests and judges in office at that time. '
  '18':
  - type: text
    content: 'The judges must investigate the case thoroughly. If the accuser has brought false charges against his fellow Israelite, '
  '19':
  - type: text
    content: 'you must impose on the accuser the sentence he intended for the other person. In this way, you will purge such evil from among you. '
  '2':
  - type: text
    content: 'Then you must set apart three cities of refuge in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
  '20':
  - type: text
    content: 'Then the rest of the people will hear about it and be afraid to do such an evil thing. '
  '21':
  - type: text
    content: You must show no pity for the guilty! Your rule should be life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.
  '3':
  - type: text
    content: Survey the territory,
  - type: note
    content: Or Keep the roads in good repair.
  - type: text
    content: ' and divide the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you into three districts, with one of these cities in each district. Then anyone who has killed someone can flee to one of the cities of refuge for safety.'
  '4':
  - type: text
    content: '“If someone kills another person unintentionally, without previous hostility, the slayer may flee to any of these cities to live in safety. '
  '5':
  - type: text
    content: For example, suppose someone goes into the forest with a neighbor to cut wood. And suppose one of them swings an ax to chop down a tree, and the ax head flies off the handle, killing the other person. In such cases, the slayer may flee to one of the cities of refuge to live in safety.
  '6':
  - type: text
    content: '“If the distance to the nearest city of refuge is too far, an enraged avenger might be able to chase down and kill the person who caused the death. Then the slayer would die unfairly, since he had never shown hostility toward the person who died. '
  '7':
  - type: text
    content: That is why I am commanding you to set aside three cities of refuge.
  '8':
  - type: text
    content: '“And if the '
  - type: text
    content: Lord
  - type: text
    content: ' your God enlarges your territory, as he swore to your ancestors, and gives you all the land he promised them, '
  '9':
  - type: text
    content: 'you must designate three additional cities of refuge. (He will give you this land if you are careful to obey all the commands I have given you—if you always love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and walk in his ways.) '
