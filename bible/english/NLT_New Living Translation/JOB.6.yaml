document_id: JOB.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job’s Second Speech: A Response to Eliphaz'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job spoke again:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “If my misery could be weighed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my troubles be put on the scales,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: they would outweigh all the sands of the sea.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That is why I spoke impulsively.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the Almighty has struck me down with his arrows.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their poison infects my spirit.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s terrors are lined up against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Don’t I have a right to complain?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t wild donkeys bray when they find no grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and oxen bellow when they have no food?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t people complain about unsalted food?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does anyone want the tasteless white of an egg?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the tasteless juice of the mallow plant?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My appetite disappears when I look at it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gag at the thought of eating it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Oh, that I might have my request,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God would grant my desire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I wish he would crush me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I wish he would reach out his hand and kill me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'At least I can take comfort in this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Despite the pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have not denied the words of the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But I don’t have the strength to endure.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have nothing to live for.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Do I have the strength of a stone?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is my body made of bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: No, I am utterly helpless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: without any chance of success.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “One should be kind to a fainting friend,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you accuse me without any fear of the Almighty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: friend, / or he might lose his fear of the Almighty.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My brothers, you have proved as unreliable as a seasonal brook
- type: usfm
  marker: q2
  children:
  - type: text
    text: that overflows its banks in the spring
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: when it is swollen with ice and melting snow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But when the hot weather arrives, the water disappears.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The brook vanishes in the heat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The caravans turn aside to be refreshed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is nothing to drink, so they die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The caravans from Tema search for this water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the travelers from Sheba hope to find it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They count on it but are disappointed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When they arrive, their hopes are dashed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You, too, have given no help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have seen my calamity, and you are afraid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But why? Have I ever asked you for a gift?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have I begged for anything of yours for myself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Have I asked you to rescue me from my enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or to save me from ruthless people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Teach me, and I will keep quiet.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Show me what I have done wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Honest words can be painful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but what do your criticisms amount to?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Do you think your words are convincing
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you disregard my cry of desperation?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You would even send an orphan into slavery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: even gamble over an orphan.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or sell a friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Look at me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would I lie to your face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Stop assuming my guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have done no wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Do you think I am lying?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t I know the difference between right and wrong?
