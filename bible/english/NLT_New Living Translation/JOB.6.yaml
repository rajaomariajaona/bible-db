document_id: JOB.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Second Speech: A Response to Eliphaz'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: 'At least I can take comfort in this:'
  - type: text
    content: Despite the pain,
  - type: text
    content: I have not denied the words of the Holy One.
  '11':
  - type: text
    content: But I don’t have the strength to endure.
  - type: text
    content: I have nothing to live for.
  '12':
  - type: text
    content: Do I have the strength of a stone?
  - type: text
    content: Is my body made of bronze?
  '13':
  - type: text
    content: No, I am utterly helpless,
  - type: text
    content: without any chance of success.
  '14':
  - type: text
    content: “One should be kind to a fainting friend,
  - type: text
    content: but you accuse me without any fear of the Almighty.
  - type: note
    content: Or friend, / or he might lose his fear of the Almighty.
  '15':
  - type: text
    content: My brothers, you have proved as unreliable as a seasonal brook
  - type: text
    content: that overflows its banks in the spring
  '16':
  - type: text
    content: when it is swollen with ice and melting snow.
  '17':
  - type: text
    content: But when the hot weather arrives, the water disappears.
  - type: text
    content: The brook vanishes in the heat.
  '18':
  - type: text
    content: The caravans turn aside to be refreshed,
  - type: text
    content: but there is nothing to drink, so they die.
  '19':
  - type: text
    content: The caravans from Tema search for this water;
  - type: text
    content: the travelers from Sheba hope to find it.
  '2':
  - type: text
    content: “If my misery could be weighed
  - type: text
    content: and my troubles be put on the scales,
  '20':
  - type: text
    content: They count on it but are disappointed.
  - type: text
    content: When they arrive, their hopes are dashed.
  '21':
  - type: text
    content: You, too, have given no help.
  - type: text
    content: You have seen my calamity, and you are afraid.
  '22':
  - type: text
    content: But why? Have I ever asked you for a gift?
  - type: text
    content: Have I begged for anything of yours for myself?
  '23':
  - type: text
    content: Have I asked you to rescue me from my enemies,
  - type: text
    content: or to save me from ruthless people?
  '24':
  - type: text
    content: Teach me, and I will keep quiet.
  - type: text
    content: Show me what I have done wrong.
  '25':
  - type: text
    content: Honest words can be painful,
  - type: text
    content: but what do your criticisms amount to?
  '26':
  - type: text
    content: Do you think your words are convincing
  - type: text
    content: when you disregard my cry of desperation?
  '27':
  - type: text
    content: You would even send an orphan into slavery
  - type: note
    content: Hebrew even gamble over an orphan.
  - type: text
    content: or sell a friend.
  '28':
  - type: text
    content: Look at me!
  - type: text
    content: Would I lie to your face?
  '29':
  - type: text
    content: Stop assuming my guilt,
  - type: text
    content: for I have done no wrong.
  '3':
  - type: text
    content: they would outweigh all the sands of the sea.
  - type: text
    content: That is why I spoke impulsively.
  '30':
  - type: text
    content: Do you think I am lying?
  - type: text
    content: Don’t I know the difference between right and wrong?
  '4':
  - type: text
    content: For the Almighty has struck me down with his arrows.
  - type: text
    content: Their poison infects my spirit.
  - type: text
    content: God’s terrors are lined up against me.
  '5':
  - type: text
    content: Don’t I have a right to complain?
  - type: text
    content: Don’t wild donkeys bray when they find no grass,
  - type: text
    content: and oxen bellow when they have no food?
  '6':
  - type: text
    content: Don’t people complain about unsalted food?
  - type: text
    content: Does anyone want the tasteless white of an egg?
  - type: note
    content: Or the tasteless juice of the mallow plant?
  '7':
  - type: text
    content: My appetite disappears when I look at it;
  - type: text
    content: I gag at the thought of eating it!
  '8':
  - type: text
    content: “Oh, that I might have my request,
  - type: text
    content: that God would grant my desire.
  '9':
  - type: text
    content: I wish he would crush me.
  - type: text
    content: I wish he would reach out his hand and kill me.
