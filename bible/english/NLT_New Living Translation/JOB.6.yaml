document_id: JOB.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job’s Second Speech: A Response to Eliphaz'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Job spoke again:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At least I can take comfort in this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Despite the pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not denied the words of the Holy One.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I don’t have the strength to endure.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have nothing to live for.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do I have the strength of a stone?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is my body made of bronze?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, I am utterly helpless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without any chance of success.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “One should be kind to a fainting friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you accuse me without any fear of the Almighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: friend, / or he might lose his fear of the Almighty.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My brothers, you have proved as unreliable as a seasonal brook
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that overflows its banks in the spring
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it is swollen with ice and melting snow.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when the hot weather arrives, the water disappears.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The brook vanishes in the heat.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The caravans turn aside to be refreshed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there is nothing to drink, so they die.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The caravans from Tema search for this water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the travelers from Sheba hope to find it.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If my misery could be weighed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my troubles be put on the scales,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They count on it but are disappointed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When they arrive, their hopes are dashed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, too, have given no help.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have seen my calamity, and you are afraid.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But why? Have I ever asked you for a gift?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have I begged for anything of yours for myself?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have I asked you to rescue me from my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to save me from ruthless people?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach me, and I will keep quiet.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show me what I have done wrong.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honest words can be painful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but what do your criticisms amount to?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think your words are convincing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you disregard my cry of desperation?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You would even send an orphan into slavery
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: even gamble over an orphan.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or sell a friend.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would I lie to your face?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stop assuming my guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have done no wrong.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they would outweigh all the sands of the sea.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That is why I spoke impulsively.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I am lying?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t I know the difference between right and wrong?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Almighty has struck me down with his arrows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their poison infects my spirit.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s terrors are lined up against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t I have a right to complain?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t wild donkeys bray when they find no grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and oxen bellow when they have no food?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t people complain about unsalted food?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does anyone want the tasteless white of an egg?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the tasteless juice of the mallow plant?
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My appetite disappears when I look at it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I gag at the thought of eating it!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that I might have my request,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God would grant my desire.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wish he would crush me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wish he would reach out his hand and kill me.
