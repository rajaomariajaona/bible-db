document_id: ISA.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: These are the visions that Isaiah son of Amoz saw concerning Judah and Jerusalem. He saw these visions during the years when Uzziah, Jotham, Ahaz, and Hezekiah were kings of Judah.
  - type: note
    content: These kings reigned from 792 to 686 b.c.
  - type: heading
    content: A Message for Rebellious Judah
  '10':
  - type: text
    content: 'Listen to the '
  - type: text
    content: Lord
  - type: text
    content: ', you leaders of “Sodom.”'
  - type: text
    content: Listen to the law of our God, people of “Gomorrah.”
  '11':
  - type: text
    content: “What makes you think I want all your sacrifices?”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I am sick of your burnt offerings of rams
  - type: text
    content: and the fat of fattened cattle.
  - type: text
    content: I get no pleasure from the blood
  - type: text
    content: of bulls and lambs and goats.
  '12':
  - type: text
    content: When you come to worship me,
  - type: text
    content: who asked you to parade through my courts with all your ceremony?
  '13':
  - type: text
    content: Stop bringing me your meaningless gifts;
  - type: text
    content: the incense of your offerings disgusts me!
  - type: text
    content: As for your celebrations of the new moon and the Sabbath
  - type: text
    content: and your special days for fasting—
  - type: text
    content: they are all sinful and false.
  - type: text
    content: I want no more of your pious meetings.
  '14':
  - type: text
    content: I hate your new moon celebrations and your annual festivals.
  - type: text
    content: They are a burden to me. I cannot stand them!
  '15':
  - type: text
    content: When you lift up your hands in prayer, I will not look.
  - type: text
    content: Though you offer many prayers, I will not listen,
  - type: text
    content: for your hands are covered with the blood of innocent victims.
  '16':
  - type: text
    content: Wash yourselves and be clean!
  - type: text
    content: Get your sins out of my sight.
  - type: text
    content: Give up your evil ways.
  '17':
  - type: text
    content: Learn to do good.
  - type: text
    content: Seek justice.
  - type: text
    content: Help the oppressed.
  - type: text
    content: Defend the cause of orphans.
  - type: text
    content: Fight for the rights of widows.
  '18':
  - type: text
    content: “Come now, let’s settle this,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Though your sins are like scarlet,
  - type: text
    content: I will make them as white as snow.
  - type: text
    content: Though they are red like crimson,
  - type: text
    content: I will make them as white as wool.
  '19':
  - type: text
    content: If you will only obey me,
  - type: text
    content: you will have plenty to eat.
  '2':
  - type: text
    content: Listen, O heavens! Pay attention, earth!
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The children I raised and cared for
  - type: text
    content: have rebelled against me.
  '20':
  - type: text
    content: But if you turn away and refuse to listen,
  - type: text
    content: you will be devoured by the sword of your enemies.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Unfaithful Jerusalem
  '21':
  - type: text
    content: See how Jerusalem, once so faithful,
  - type: text
    content: has become a prostitute.
  - type: text
    content: Once the home of justice and righteousness,
  - type: text
    content: she is now filled with murderers.
  '22':
  - type: text
    content: Once like pure silver,
  - type: text
    content: you have become like worthless slag.
  - type: text
    content: Once so pure,
  - type: text
    content: you are now like watered-down wine.
  '23':
  - type: text
    content: Your leaders are rebels,
  - type: text
    content: the companions of thieves.
  - type: text
    content: All of them love bribes
  - type: text
    content: and demand payoffs,
  - type: text
    content: but they refuse to defend the cause of orphans
  - type: text
    content: or fight for the rights of widows.
  '24':
  - type: text
    content: 'Therefore, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: the Mighty One of Israel, says,
  - type: text
    content: “I will take revenge on my enemies
  - type: text
    content: and pay back my foes!
  '25':
  - type: text
    content: I will raise my fist against you.
  - type: text
    content: I will melt you down and skim off your slag.
  - type: text
    content: I will remove all your impurities.
  '26':
  - type: text
    content: Then I will give you good judges again
  - type: text
    content: and wise counselors like you used to have.
  - type: text
    content: Then Jerusalem will again be called the Home of Justice
  - type: text
    content: and the Faithful City.”
  '27':
  - type: text
    content: Zion will be restored by justice;
  - type: text
    content: those who repent will be revived by righteousness.
  '28':
  - type: text
    content: But rebels and sinners will be completely destroyed,
  - type: text
    content: 'and those who desert the '
  - type: text
    content: Lord
  - type: text
    content: ' will be consumed.'
  '29':
  - type: text
    content: You will be ashamed of your idol worship
  - type: text
    content: in groves of sacred oaks.
  - type: text
    content: You will blush because you worshiped
  - type: text
    content: in gardens dedicated to idols.
  '3':
  - type: text
    content: Even an ox knows its owner,
  - type: text
    content: and a donkey recognizes its master’s care—
  - type: text
    content: but Israel doesn’t know its master.
  - type: text
    content: My people don’t recognize my care for them.”
  '30':
  - type: text
    content: You will be like a great tree with withered leaves,
  - type: text
    content: like a garden without water.
  '31':
  - type: text
    content: The strongest among you will disappear like straw;
  - type: text
    content: their evil deeds will be the spark that sets it on fire.
  - type: text
    content: They and their evil works will burn up together,
  - type: text
    content: and no one will be able to put out the fire.
  '4':
  - type: text
    content: Oh, what a sinful nation they are—
  - type: text
    content: loaded down with a burden of guilt.
  - type: text
    content: They are evil people,
  - type: text
    content: 'corrupt children who have rejected the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: They have despised the Holy One of Israel
  - type: text
    content: and turned their backs on him.
  '5':
  - type: text
    content: Why do you continue to invite punishment?
  - type: text
    content: Must you rebel forever?
  - type: text
    content: Your head is injured,
  - type: text
    content: and your heart is sick.
  '6':
  - type: text
    content: You are battered from head to foot—
  - type: text
    content: covered with bruises, welts, and infected wounds—
  - type: text
    content: without any soothing ointments or bandages.
  '7':
  - type: text
    content: Your country lies in ruins,
  - type: text
    content: and your towns are burned.
  - type: text
    content: Foreigners plunder your fields before your eyes
  - type: text
    content: and destroy everything they see.
  '8':
  - type: text
    content: Beautiful Jerusalem
  - type: note
    content: Hebrew The daughter of Zion.
  - type: text
    content: ' stands abandoned'
  - type: text
    content: like a watchman’s shelter in a vineyard,
  - type: text
    content: like a lean-to in a cucumber field after the harvest,
  - type: text
    content: like a helpless city under siege.
  '9':
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: had not spared a few of us,
  - type: note
    content: Greek version reads a few of our children. Compare Rom 9:29.
  - type: text
    content: we would have been wiped out like Sodom,
  - type: text
    content: destroyed like Gomorrah.
