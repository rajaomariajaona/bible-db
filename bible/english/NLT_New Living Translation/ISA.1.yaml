document_id: ISA.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: These are the visions that Isaiah son of Amoz saw concerning Judah and Jerusalem. He saw these visions during the years when Uzziah, Jotham, Ahaz, and Hezekiah were kings of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'These kings reigned from 792 to 686 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Rebellious Judah
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Listen, O heavens! Pay attention, earth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The children I raised and cared for
- type: usfm
  marker: q2
  children:
  - type: text
    text: have rebelled against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Even an ox knows its owner,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a donkey recognizes its master’s care—
- type: usfm
  marker: q1
  children:
  - type: text
    text: but Israel doesn’t know its master.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My people don’t recognize my care for them.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oh, what a sinful nation they are—
- type: usfm
  marker: q2
  children:
  - type: text
    text: loaded down with a burden of guilt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are evil people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'corrupt children who have rejected the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have despised the Holy One of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turned their backs on him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why do you continue to invite punishment?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Must you rebel forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your head is injured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your heart is sick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You are battered from head to foot—
- type: usfm
  marker: q2
  children:
  - type: text
    text: covered with bruises, welts, and infected wounds—
- type: usfm
  marker: q2
  children:
  - type: text
    text: without any soothing ointments or bandages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your country lies in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your towns are burned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreigners plunder your fields before your eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy everything they see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Beautiful Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The daughter of Zion.
    marker-yv: yv-n
  - type: text
    text: ' stands abandoned'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a watchman’s shelter in a vineyard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a lean-to in a cucumber field after the harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a helpless city under siege.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: had not spared a few of us,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a few of our children. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 9:29.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: we would have been wiped out like Sodom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroyed like Gomorrah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Listen to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you leaders of “Sodom.”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to the law of our God, people of “Gomorrah.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What makes you think I want all your sacrifices?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am sick of your burnt offerings of rams
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fat of fattened cattle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I get no pleasure from the blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: of bulls and lambs and goats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When you come to worship me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who asked you to parade through my courts with all your ceremony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Stop bringing me your meaningless gifts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the incense of your offerings disgusts me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for your celebrations of the new moon and the Sabbath
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your special days for fasting—
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are all sinful and false.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want no more of your pious meetings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I hate your new moon celebrations and your annual festivals.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are a burden to me. I cannot stand them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When you lift up your hands in prayer, I will not look.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though you offer many prayers, I will not listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your hands are covered with the blood of innocent victims.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Wash yourselves and be clean!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get your sins out of my sight.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give up your evil ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Learn to do good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seek justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Help the oppressed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Defend the cause of orphans.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fight for the rights of widows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Come now, let’s settle this,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Though your sins are like scarlet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make them as white as snow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though they are red like crimson,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make them as white as wool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If you will only obey me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will have plenty to eat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But if you turn away and refuse to listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be devoured by the sword of your enemies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Unfaithful Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: See how Jerusalem, once so faithful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: has become a prostitute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Once the home of justice and righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she is now filled with murderers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Once like pure silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have become like worthless slag.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Once so pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are now like watered-down wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Your leaders are rebels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the companions of thieves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them love bribes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and demand payoffs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but they refuse to defend the cause of orphans
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fight for the rights of widows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Mighty One of Israel, says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will take revenge on my enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pay back my foes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will raise my fist against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will melt you down and skim off your slag.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will remove all your impurities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then I will give you good judges again
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wise counselors like you used to have.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Jerusalem will again be called the Home of Justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the Faithful City.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Zion will be restored by justice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who repent will be revived by righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But rebels and sinners will be completely destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and those who desert the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be consumed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: You will be ashamed of your idol worship
- type: usfm
  marker: q2
  children:
  - type: text
    text: in groves of sacred oaks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will blush because you worshiped
- type: usfm
  marker: q2
  children:
  - type: text
    text: in gardens dedicated to idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: You will be like a great tree with withered leaves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a garden without water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The strongest among you will disappear like straw;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their evil deeds will be the spark that sets it on fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They and their evil works will burn up together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will be able to put out the fire.
