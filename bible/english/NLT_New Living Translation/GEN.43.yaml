document_id: GEN.43,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Brothers Return to Egypt
  - type: text
    content: 'But the famine continued to ravage the land of Canaan. '
  '10':
  - type: text
    content: If we hadn’t wasted all this time, we could have gone and returned twice by now.”
  '11':
  - type: text
    content: 'So their father, Jacob, finally said to them, “If it can’t be avoided, then at least do this. Pack your bags with the best products of this land. Take them down to the man as gifts—balm, honey, gum, aromatic resin, pistachio nuts, and almonds. '
  '12':
  - type: text
    content: 'Also take double the money that was put back in your sacks, as it was probably someone’s mistake. '
  '13':
  - type: text
    content: 'Then take your brother, and go back to the man. '
  '14':
  - type: text
    content: May God Almighty
  - type: note
    content: Hebrew El-Shaddai.
  - type: text
    content: ' give you mercy as you go before the man, so that he will release Simeon and let Benjamin return. But if I must lose my children, so be it.”'
  '15':
  - type: text
    content: 'So the men packed Jacob’s gifts and double the money and headed off with Benjamin. They finally arrived in Egypt and presented themselves to Joseph. '
  '16':
  - type: text
    content: 'When Joseph saw Benjamin with them, he said to the manager of his household, “These men will eat with me this noon. Take them inside the palace. Then go slaughter an animal, and prepare a big feast.” '
  '17':
  - type: text
    content: So the man did as Joseph told him and took them into Joseph’s palace.
  '18':
  - type: text
    content: The brothers were terrified when they saw that they were being taken into Joseph’s house. “It’s because of the money someone put in our sacks last time we were here,” they said. “He plans to pretend that we stole it. Then he will seize us, make us slaves, and take our donkeys.”
  - type: heading
    content: A Feast at Joseph’s Palace
  '19':
  - type: text
    content: 'The brothers approached the manager of Joseph’s household and spoke to him at the entrance to the palace. '
  '2':
  - type: text
    content: When the grain they had brought from Egypt was almost gone, Jacob said to his sons, “Go back and buy us a little more food.”
  '20':
  - type: text
    content: '“Sir,” they said, “we came to Egypt once before to buy food. '
  '21':
  - type: text
    content: 'But as we were returning home, we stopped for the night and opened our sacks. Then we discovered that each man’s money—the exact amount paid—was in the top of his sack! Here it is; we have brought it back with us. '
  '22':
  - type: text
    content: We also have additional money to buy more food. We have no idea who put our money in our sacks.”
  '23':
  - type: text
    content: “Relax. Don’t be afraid,” the household manager told them. “Your God, the God of your father, must have put this treasure into your sacks. I know I received your payment.” Then he released Simeon and brought him out to them.
  '24':
  - type: text
    content: 'The manager then led the men into Joseph’s palace. He gave them water to wash their feet and provided food for their donkeys. '
  '25':
  - type: text
    content: They were told they would be eating there, so they prepared their gifts for Joseph’s arrival at noon.
  '26':
  - type: text
    content: 'When Joseph came home, they gave him the gifts they had brought him, then bowed low to the ground before him. '
  '27':
  - type: text
    content: After greeting them, he asked, “How is your father, the old man you spoke about? Is he still alive?”
  '28':
  - type: text
    content: “Yes,” they replied. “Our father, your servant, is alive and well.” And they bowed low again.
  '29':
  - type: text
    content: 'Then Joseph looked at his brother Benjamin, the son of his own mother. “Is this your youngest brother, the one you told me about?” Joseph asked. “May God be gracious to you, my son.” '
  '3':
  - type: text
    content: 'But Judah said, “The man was serious when he warned us, ‘You won’t see my face again unless your brother is with you.’ '
  '30':
  - type: text
    content: 'Then Joseph hurried from the room because he was overcome with emotion for his brother. He went into his private room, where he broke down and wept. '
  '31':
  - type: text
    content: After washing his face, he came back out, keeping himself under control. Then he ordered, “Bring out the food!”
  '32':
  - type: text
    content: 'The waiters served Joseph at his own table, and his brothers were served at a separate table. The Egyptians who ate with Joseph sat at their own table, because Egyptians despise Hebrews and refuse to eat with them. '
  '33':
  - type: text
    content: 'Joseph told each of his brothers where to sit, and to their amazement, he seated them according to age, from oldest to youngest. '
  '34':
  - type: text
    content: And Joseph filled their plates with food from his own table, giving Benjamin five times as much as he gave the others. So they feasted and drank freely with him.
  '4':
  - type: text
    content: 'If you send Benjamin with us, we will go down and buy more food. '
  '5':
  - type: text
    content: But if you don’t let Benjamin go, we won’t go either. Remember, the man said, ‘You won’t see my face again unless your brother is with you.’”
  '6':
  - type: text
    content: “Why were you so cruel to me?” Jacob
  - type: note
    content: Hebrew Israel; also in 43:11. See note on 35:21.
  - type: text
    content: ' moaned. “Why did you tell him you had another brother?”'
  '7':
  - type: text
    content: “The man kept asking us questions about our family,” they replied. “He asked, ‘Is your father still alive? Do you have another brother?’ So we answered his questions. How could we know he would say, ‘Bring your brother down here’?”
  '8':
  - type: text
    content: 'Judah said to his father, “Send the boy with me, and we will be on our way. Otherwise we will all die of starvation—and not only we, but you and our little ones. '
  '9':
  - type: text
    content: 'I personally guarantee his safety. You may hold me responsible if I don’t bring him back to you. Then let me bear the blame forever. '
