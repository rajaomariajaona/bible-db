document_id: JER.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem’s Last Warning
  - type: text
    content: “Run for your lives, you people of Benjamin!
  - type: text
    content: Get out of Jerusalem!
  - type: text
    content: Sound the alarm in Tekoa!
  - type: text
    content: Send up a signal at Beth-hakkerem!
  - type: text
    content: A powerful army is coming from the north,
  - type: text
    content: coming with disaster and destruction.
  '10':
  - type: text
    content: To whom can I give warning?
  - type: text
    content: Who will listen when I speak?
  - type: text
    content: Their ears are closed,
  - type: text
    content: and they cannot hear.
  - type: text
    content: 'They scorn the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: They don’t want to listen at all.
  '11':
  - type: text
    content: 'So now I am filled with the '
  - type: text
    content: Lord
  - type: text
    content: ’s fury.
  - type: text
    content: Yes, I am tired of holding it in!
  - type: text
    content: “I will pour out my fury on children playing in the streets
  - type: text
    content: and on gatherings of young men,
  - type: text
    content: on husbands and wives
  - type: text
    content: and on those who are old and gray.
  '12':
  - type: text
    content: Their homes will be turned over to their enemies,
  - type: text
    content: as will their fields and their wives.
  - type: text
    content: For I will raise my powerful fist
  - type: text
    content: against the people of this land,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “From the least to the greatest,
  - type: text
    content: their lives are ruled by greed.
  - type: text
    content: From prophets to priests,
  - type: text
    content: they are all frauds.
  '14':
  - type: text
    content: They offer superficial treatments
  - type: text
    content: for my people’s mortal wound.
  - type: text
    content: They give assurances of peace
  - type: text
    content: when there is no peace.
  '15':
  - type: text
    content: Are they ashamed of their disgusting actions?
  - type: text
    content: Not at all—they don’t even know how to blush!
  - type: text
    content: Therefore, they will lie among the slaughtered.
  - type: text
    content: They will be brought down when I punish them,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Judah Rejects the Lord’s Way
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Stop at the crossroads and look around.
  - type: text
    content: Ask for the old, godly way, and walk in it.
  - type: text
    content: Travel its path, and you will find rest for your souls.
  - type: text
    content: But you reply, ‘No, that’s not the road we want!’
  '17':
  - type: text
    content: I posted watchmen over you who said,
  - type: text
    content: ‘Listen for the sound of the alarm.’
  - type: text
    content: But you replied,
  - type: text
    content: ‘No! We won’t pay attention!’
  '18':
  - type: text
    content: “Therefore, listen to this, all you nations.
  - type: text
    content: Take note of my people’s situation.
  '19':
  - type: text
    content: Listen, all the earth!
  - type: text
    content: I will bring disaster on my people.
  - type: text
    content: It is the fruit of their own schemes,
  - type: text
    content: because they refuse to listen to me.
  - type: text
    content: They have rejected my word.
  '2':
  - type: text
    content: O Jerusalem,
  - type: note
    content: Hebrew Daughter of Zion.
  - type: text
    content: ' you are my beautiful and delicate daughter—'
  - type: text
    content: but I will destroy you!
  '20':
  - type: text
    content: There’s no use offering me sweet frankincense from Sheba.
  - type: text
    content: Keep your fragrant calamus imported from distant lands!
  - type: text
    content: I will not accept your burnt offerings.
  - type: text
    content: Your sacrifices have no pleasing aroma for me.”
  '21':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will put obstacles in my people’s path.
  - type: text
    content: Fathers and sons will both fall over them.
  - type: text
    content: Neighbors and friends will die together.”
  - type: heading
    content: An Invasion from the North
  '22':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Look! A great army coming from the north!
  - type: text
    content: A great nation is rising against you from far-off lands.
  '23':
  - type: text
    content: They are armed with bows and spears.
  - type: text
    content: They are cruel and show no mercy.
  - type: text
    content: They sound like a roaring sea
  - type: text
    content: as they ride forward on horses.
  - type: text
    content: They are coming in battle formation,
  - type: text
    content: planning to destroy you, beautiful Jerusalem.
  - type: note
    content: Hebrew daughter of Zion.
  - type: text
    content: ”
  '24':
  - type: text
    content: We have heard reports about the enemy,
  - type: text
    content: and we wring our hands in fright.
  - type: text
    content: Pangs of anguish have gripped us,
  - type: text
    content: like those of a woman in labor.
  '25':
  - type: text
    content: Don’t go out to the fields!
  - type: text
    content: Don’t travel on the roads!
  - type: text
    content: The enemy’s sword is everywhere
  - type: text
    content: and terrorizes us at every turn!
  '26':
  - type: text
    content: Oh, my people, dress yourselves in burlap
  - type: text
    content: and sit among the ashes.
  - type: text
    content: Mourn and weep bitterly, as for the loss of an only son.
  - type: text
    content: For suddenly the destroying armies will be upon you!
  '27':
  - type: text
    content: “Jeremiah, I have made you a tester of metals,
  - type: note
    content: As in Greek version; Hebrew reads a tester of my people a fortress.
  - type: text
    content: that you may determine the quality of my people.
  '28':
  - type: text
    content: They are the worst kind of rebel,
  - type: text
    content: full of slander.
  - type: text
    content: They are as hard as bronze and iron,
  - type: text
    content: and they lead others into corruption.
  '29':
  - type: text
    content: The bellows fiercely fan the flames
  - type: text
    content: to burn out the corruption.
  - type: text
    content: But it does not purify them,
  - type: text
    content: for the wickedness remains.
  '3':
  - type: text
    content: Enemies will surround you, like shepherds camped around the city.
  - type: text
    content: Each chooses a place for his troops to devour.
  '30':
  - type: text
    content: I will label them ‘Rejected Silver,’
  - type: text
    content: 'for I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am discarding them.”'
  '4':
  - type: text
    content: They shout, ‘Prepare for battle!
  - type: text
    content: Attack at noon!’
  - type: text
    content: ‘No, it’s too late; the day is fading,
  - type: text
    content: and the evening shadows are falling.’
  '5':
  - type: text
    content: ‘Well then, let’s attack at night
  - type: text
    content: and destroy her palaces!’”
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “Cut down the trees for battering rams.
  - type: text
    content: Build siege ramps against the walls of Jerusalem.
  - type: text
    content: This is the city to be punished,
  - type: text
    content: for she is wicked through and through.
  '7':
  - type: text
    content: She spouts evil like a fountain.
  - type: text
    content: Her streets echo with the sounds of violence and destruction.
  - type: text
    content: I always see her sickness and sores.
  '8':
  - type: text
    content: Listen to this warning, Jerusalem,
  - type: text
    content: or I will turn from you in disgust.
  - type: text
    content: Listen, or I will turn you into a heap of ruins,
  - type: text
    content: a land where no one lives.”
  '9':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “Even the few who remain in Israel
  - type: text
    content: will be picked over again,
  - type: text
    content: as when a harvester checks each vine a second time
  - type: text
    content: to pick the grapes that were missed.”
  - type: heading
    content: Judah’s Constant Rebellion
