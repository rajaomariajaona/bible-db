document_id: JER.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem’s Last Warning
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Run for your lives, you people of Benjamin!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get out of Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sound the alarm in Tekoa!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Send up a signal at Beth-hakkerem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A powerful army is coming from the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming with disaster and destruction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To whom can I give warning?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will listen when I speak?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their ears are closed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they cannot hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They scorn the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t want to listen at all.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So now I am filled with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fury.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I am tired of holding it in!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will pour out my fury on children playing in the streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on gatherings of young men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on husbands and wives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on those who are old and gray.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their homes will be turned over to their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as will their fields and their wives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will raise my powerful fist
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the people of this land,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From the least to the greatest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their lives are ruled by greed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From prophets to priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are all frauds.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They offer superficial treatments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my people’s mortal wound.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They give assurances of peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when there is no peace.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are they ashamed of their disgusting actions?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not at all—they don’t even know how to blush!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, they will lie among the slaughtered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be brought down when I punish them,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Judah Rejects the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Way
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop at the crossroads and look around.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ask for the old, godly way, and walk in it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Travel its path, and you will find rest for your souls.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you reply, ‘No, that’s not the road we want!’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I posted watchmen over you who said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Listen for the sound of the alarm.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you replied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘No! We won’t pay attention!’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore, listen to this, all you nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take note of my people’s situation.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, all the earth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring disaster on my people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the fruit of their own schemes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they refuse to listen to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have rejected my word.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Daughter of Zion.
      marker-yv: yv-n
    - type: text
      text: ' you are my beautiful and delicate daughter—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will destroy you!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no use offering me sweet frankincense from Sheba.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep your fragrant calamus imported from distant lands!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not accept your burnt offerings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your sacrifices have no pleasing aroma for me.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will put obstacles in my people’s path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fathers and sons will both fall over them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neighbors and friends will die together.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Invasion from the North
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! A great army coming from the north!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A great nation is rising against you from far-off lands.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are armed with bows and spears.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are cruel and show no mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sound like a roaring sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they ride forward on horses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are coming in battle formation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planning to destroy you, beautiful Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: daughter of Zion.
      marker-yv: yv-n
    - type: text
      text: ”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have heard reports about the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we wring our hands in fright.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pangs of anguish have gripped us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those of a woman in labor.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t go out to the fields!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t travel on the roads!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy’s sword is everywhere
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrorizes us at every turn!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, my people, dress yourselves in burlap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sit among the ashes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mourn and weep bitterly, as for the loss of an only son.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For suddenly the destroying armies will be upon you!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Jeremiah, I have made you a tester of metals,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a tester of my people a fortress.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you may determine the quality of my people.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are the worst kind of rebel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: full of slander.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are as hard as bronze and iron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they lead others into corruption.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bellows fiercely fan the flames
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to burn out the corruption.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it does not purify them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the wickedness remains.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enemies will surround you, like shepherds camped around the city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Each chooses a place for his troops to devour.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will label them ‘Rejected Silver,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', am discarding them.”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shout, ‘Prepare for battle!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attack at noon!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘No, it’s too late; the day is fading,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the evening shadows are falling.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Well then, let’s attack at night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy her palaces!’”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cut down the trees for battering rams.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build siege ramps against the walls of Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the city to be punished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for she is wicked through and through.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She spouts evil like a fountain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her streets echo with the sounds of violence and destruction.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I always see her sickness and sores.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to this warning, Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or I will turn from you in disgust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, or I will turn you into a heap of ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a land where no one lives.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even the few who remain in Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be picked over again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as when a harvester checks each vine a second time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pick the grapes that were missed.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah’s Constant Rebellion
    marker-yv: yv-h
