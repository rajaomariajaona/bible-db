document_id: 2CH.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Revolt against Athaliah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the seventh year of Athaliah’s reign, Jehoiada the priest decided to act. He summoned his courage and made a pact with five army commanders: Azariah son of Jeroham, Ishmael son of Jehohanan, Azariah son of Obed, Maaseiah son of Adaiah, and Elishaphat son of Zicri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'These men traveled secretly throughout Judah and summoned the Levites and clan leaders in all the towns to come to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They all gathered at the Temple of God, where they made a solemn pact with Joash, the young king.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jehoiada said to them, “Here is the king’s son! The time has come for him to reign! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has promised that a descendant of David will be our king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is what you must do. When you priests and Levites come on duty on the Sabbath, a third of you will serve as gatekeepers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Another third will go over to the royal palace, and the final third will be at the Foundation Gate. Everyone else should stay in the courtyards of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Remember, only the priests and Levites on duty may enter the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for they are set apart as holy. The rest of the people must obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s instructions and stay outside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You Levites, form a bodyguard around the king and keep your weapons in hand. Kill anyone who tries to enter the Temple. Stay with the king wherever he goes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the Levites and all the people of Judah did everything as Jehoiada the priest ordered. The commanders took charge of the men reporting for duty that Sabbath, as well as those who were going off duty. Jehoiada the priest did not let anyone go home after their shift ended. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jehoiada supplied the commanders with the spears and the large and small shields that had once belonged to King David and were stored in the Temple of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He stationed all the people around the king, with their weapons ready. They formed a line from the south side of the Temple around to the north side and all around the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then Jehoiada and his sons brought out Joash, the king’s son, placed the crown on his head, and presented him with a copy of God’s laws.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a copy of the covenant.
    marker-yv: yv-n
  - type: text
    text: ' They anointed him and proclaimed him king, and everyone shouted, “Long live the king!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Athaliah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Athaliah heard the noise of the people running and the shouts of praise to the king, she hurried to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple to see what was happening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When she arrived, she saw the newly crowned king standing in his place of authority by the pillar at the Temple entrance. The commanders and trumpeters were surrounding him, and people from all over the land were rejoicing and blowing trumpets. Singers with musical instruments were leading the people in a great celebration. When Athaliah saw all this, she tore her clothes in despair and shouted, “Treason! Treason!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Jehoiada the priest ordered the commanders who were in charge of the troops, “Take her to the soldiers in front of the Temple,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bring her out from between the ranks; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Take her out of the Temple precincts. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and kill anyone who tries to rescue her.” For the priest had said, “She must not be killed in the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So they seized her and led her out to the entrance of the Horse Gate on the palace grounds, and they killed her there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiada’s Religious Reforms
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Jehoiada made a covenant between himself and the king and the people that they would be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And all the people went over to the temple of Baal and tore it down. They demolished the altars and smashed the idols, and they killed Mattan the priest of Baal in front of the altars.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jehoiada now put the priests and Levites in charge of the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', following all the directions given by David. He also commanded them to present burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as prescribed by the Law of Moses, and to sing and rejoice as David had instructed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He also stationed gatekeepers at the gates of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple to keep out those who for any reason were ceremonially unclean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then the commanders, nobles, rulers, and all the people of the land escorted the king from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They went through the upper gate and into the palace, and they seated the king on the royal throne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So all the people of the land rejoiced, and the city was peaceful because Athaliah had been killed.
