document_id: 1CH.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Reuben
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: The oldest son of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the name that God gave to Jacob.
      marker-yv: yv-n
    - type: text
      text: ' was Reuben. But since he dishonored his father by sleeping with one of his father’s concubines, his birthright was given to the sons of his brother Joseph. For this reason, Reuben is not listed in the genealogical records as the firstborn son. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: During the reign of Saul, the Reubenites defeated the Hagrites in battle. Then they moved into the Hagrite settlements all along the eastern edge of Gilead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Gad
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Next to the Reubenites, the descendants of Gad lived in the land of Bashan as far east as Salecah. '
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joel was the leader in the land of Bashan, and Shapham was second-in-command, followed by Janai and Shaphat.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Their relatives, the leaders of seven other clans, were Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber. '
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were all descendants of Abihail son of Huri, son of Jaroah, son of Gilead, son of Michael, son of Jeshishai, son of Jahdo, son of Buz. '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahi son of Abdiel, son of Guni, was the leader of their clans.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gadites lived in the land of Gilead, in Bashan and its villages, and throughout all the pasturelands of Sharon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All of these were listed in the genealogical records during the days of King Jotham of Judah and King Jeroboam of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribes East of the Jordan
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There were 44,760 capable warriors in the armies of Reuben, Gad, and the half-tribe of Manasseh. They were all skilled in combat and armed with shields, swords, and bows. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They waged war against the Hagrites, the Jeturites, the Naphishites, and the Nodabites. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The descendants of Judah became the most powerful tribe and provided a ruler for the nation,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and from Judah came a prince.
      marker-yv: yv-n
    - type: text
      text: ' but the birthright belonged to Joseph.'
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They cried out to God during the battle, and he answered their prayer because they trusted in him. So the Hagrites and all their allies were defeated. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The plunder taken from the Hagrites included 50,000 camels, 250,000 sheep and goats, 2,000 donkeys, and 100,000 captives. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Many of the Hagrites were killed in the battle because God was fighting against them. The people of Reuben, Gad, and Manasseh lived in their land until they were taken into exile.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The half-tribe of Manasseh was very large and spread through the land from Bashan to Baal-hermon, Senir, and Mount Hermon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the leaders of their clans: Epher,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Epher.
      marker-yv: yv-n
    - type: text
      text: ' Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel. These men had a great reputation as mighty warriors and leaders of their clans.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But these tribes were unfaithful to the God of their ancestors. They worshiped the gods of the nations that God had destroyed. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the God of Israel caused King Pul of Assyria (also known as Tiglath-pileser) to invade the land and take away the people of Reuben, Gad, and the half-tribe of Manasseh as captives. The Assyrians exiled them to Halah, Habor, Hara, and the Gozan River, where they remain to this day.
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Reuben, the oldest son of Israel, were Hanoch, Pallu, Hezron, and Carmi.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Joel were Shemaiah, Gog, Shimei, '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Micah, Reaiah, Baal, '
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Beerah. Beerah was the leader of the Reubenites when they were taken into captivity by King Tiglath-pileser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tilgath-pilneser, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Tiglath-pileser; also in 5:26.
      marker-yv: yv-n
    - type: text
      text: ' of Assyria.'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beerah’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: His.
      marker-yv: yv-n
    - type: text
      text: ' relatives are listed in their genealogical records by their clans: Jeiel (the leader), Zechariah, '
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Bela son of Azaz, son of Shema, son of Joel.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The Reubenites lived in the area that stretches from Aroer to Nebo and Baal-meon. '
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: And since they had so many livestock in the land of Gilead, they spread east toward the edge of the desert that stretches to the Euphrates River.
