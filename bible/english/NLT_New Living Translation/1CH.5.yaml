document_id: 1CH.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Reuben
  - type: text
    content: The oldest son of Israel
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' was Reuben. But since he dishonored his father by sleeping with one of his father’s concubines, his birthright was given to the sons of his brother Joseph. For this reason, Reuben is not listed in the genealogical records as the firstborn son. '
  '10':
  - type: text
    content: During the reign of Saul, the Reubenites defeated the Hagrites in battle. Then they moved into the Hagrite settlements all along the eastern edge of Gilead.
  - type: heading
    content: Descendants of Gad
  '11':
  - type: text
    content: 'Next to the Reubenites, the descendants of Gad lived in the land of Bashan as far east as Salecah. '
  '12':
  - type: text
    content: Joel was the leader in the land of Bashan, and Shapham was second-in-command, followed by Janai and Shaphat.
  '13':
  - type: text
    content: 'Their relatives, the leaders of seven other clans, were Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber. '
  '14':
  - type: text
    content: 'These were all descendants of Abihail son of Huri, son of Jaroah, son of Gilead, son of Michael, son of Jeshishai, son of Jahdo, son of Buz. '
  '15':
  - type: text
    content: Ahi son of Abdiel, son of Guni, was the leader of their clans.
  '16':
  - type: text
    content: 'The Gadites lived in the land of Gilead, in Bashan and its villages, and throughout all the pasturelands of Sharon. '
  '17':
  - type: text
    content: All of these were listed in the genealogical records during the days of King Jotham of Judah and King Jeroboam of Israel.
  - type: heading
    content: The Tribes East of the Jordan
  '18':
  - type: text
    content: 'There were 44,760 capable warriors in the armies of Reuben, Gad, and the half-tribe of Manasseh. They were all skilled in combat and armed with shields, swords, and bows. '
  '19':
  - type: text
    content: 'They waged war against the Hagrites, the Jeturites, the Naphishites, and the Nodabites. '
  '2':
  - type: text
    content: The descendants of Judah became the most powerful tribe and provided a ruler for the nation,
  - type: note
    content: Or and from Judah came a prince.
  - type: text
    content: ' but the birthright belonged to Joseph.'
  '20':
  - type: text
    content: 'They cried out to God during the battle, and he answered their prayer because they trusted in him. So the Hagrites and all their allies were defeated. '
  '21':
  - type: text
    content: 'The plunder taken from the Hagrites included 50,000 camels, 250,000 sheep and goats, 2,000 donkeys, and 100,000 captives. '
  '22':
  - type: text
    content: Many of the Hagrites were killed in the battle because God was fighting against them. The people of Reuben, Gad, and Manasseh lived in their land until they were taken into exile.
  '23':
  - type: text
    content: 'The half-tribe of Manasseh was very large and spread through the land from Bashan to Baal-hermon, Senir, and Mount Hermon. '
  '24':
  - type: text
    content: 'These were the leaders of their clans: Epher,'
  - type: note
    content: As in Greek version and Latin Vulgate; Hebrew reads and Epher.
  - type: text
    content: ' Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel. These men had a great reputation as mighty warriors and leaders of their clans.'
  '25':
  - type: text
    content: 'But these tribes were unfaithful to the God of their ancestors. They worshiped the gods of the nations that God had destroyed. '
  '26':
  - type: text
    content: So the God of Israel caused King Pul of Assyria (also known as Tiglath-pileser) to invade the land and take away the people of Reuben, Gad, and the half-tribe of Manasseh as captives. The Assyrians exiled them to Halah, Habor, Hara, and the Gozan River, where they remain to this day.
  '3':
  - type: text
    content: The sons of Reuben, the oldest son of Israel, were Hanoch, Pallu, Hezron, and Carmi.
  '4':
  - type: text
    content: 'The descendants of Joel were Shemaiah, Gog, Shimei, '
  '5':
  - type: text
    content: 'Micah, Reaiah, Baal, '
  '6':
  - type: text
    content: and Beerah. Beerah was the leader of the Reubenites when they were taken into captivity by King Tiglath-pileser
  - type: note
    content: Hebrew Tilgath-pilneser, a variant spelling of Tiglath-pileser; also in 5:26.
  - type: text
    content: ' of Assyria.'
  '7':
  - type: text
    content: Beerah’s
  - type: note
    content: Hebrew His.
  - type: text
    content: ' relatives are listed in their genealogical records by their clans: Jeiel (the leader), Zechariah, '
  '8':
  - type: text
    content: and Bela son of Azaz, son of Shema, son of Joel.
  - type: text
    content: 'The Reubenites lived in the area that stretches from Aroer to Nebo and Baal-meon. '
  '9':
  - type: text
    content: And since they had so many livestock in the land of Gilead, they spread east toward the edge of the desert that stretches to the Euphrates River.
