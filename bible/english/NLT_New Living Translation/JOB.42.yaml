document_id: JOB.42,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Responds to the Lord
  - type: text
    content: 'Then Job replied to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '10':
  - type: text
    content: 'When Job prayed for his friends, the '
  - type: text
    content: Lord
  - type: text
    content: ' restored his fortunes. In fact, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him twice as much as before! '
  '11':
  - type: text
    content: 'Then all his brothers, sisters, and former friends came and feasted with him in his home. And they consoled him and comforted him because of all the trials the '
  - type: text
    content: Lord
  - type: text
    content: ' had brought against him. And each of them brought him a gift of money'
  - type: note
    content: Hebrew a kesitah; the value or weight of the kesitah is no longer known.
  - type: text
    content: ' and a gold ring.'
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed Job in the second half of his life even more than in the beginning. For now he had 14,000 sheep, 6,000 camels, 1,000 teams of oxen, and 1,000 female donkeys. '
  '13':
  - type: text
    content: 'He also gave Job seven more sons and three more daughters. '
  '14':
  - type: text
    content: 'He named his first daughter Jemimah, the second Keziah, and the third Keren-happuch. '
  '15':
  - type: text
    content: In all the land no women were as lovely as the daughters of Job. And their father put them into his will along with their brothers.
  '16':
  - type: text
    content: 'Job lived 140 years after that, living to see four generations of his children and grandchildren. '
  '17':
  - type: text
    content: Then he died, an old man who had lived a long, full life.
  '2':
  - type: text
    content: “I know that you can do anything,
  - type: text
    content: and no one can stop you.
  '3':
  - type: text
    content: You asked, ‘Who is this that questions my wisdom with such ignorance?’
  - type: text
    content: It is I—and I was talking about things I knew nothing about,
  - type: text
    content: things far too wonderful for me.
  '4':
  - type: text
    content: You said, ‘Listen and I will speak!
  - type: text
    content: I have some questions for you,
  - type: text
    content: and you must answer them.’
  '5':
  - type: text
    content: I had only heard about you before,
  - type: text
    content: but now I have seen you with my own eyes.
  '6':
  - type: text
    content: I take back everything I said,
  - type: text
    content: and I sit in dust and ashes to show my repentance.”
  - type: heading
    content: 'Conclusion: The Lord Blesses Job'
  '7':
  - type: text
    content: 'After the '
  - type: text
    content: Lord
  - type: text
    content: ' had finished speaking to Job, he said to Eliphaz the Temanite: “I am angry with you and your two friends, for you have not spoken accurately about me, as my servant Job has. '
  '8':
  - type: text
    content: 'So take seven bulls and seven rams and go to my servant Job and offer a burnt offering for yourselves. My servant Job will pray for you, and I will accept his prayer on your behalf. I will not treat you as you deserve, for you have not spoken accurately about me, as my servant Job has.” '
  '9':
  - type: text
    content: 'So Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' accepted Job’s prayer.'
