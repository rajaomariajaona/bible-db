document_id: JOB.42,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job Responds to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Job replied to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Job prayed for his friends, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' restored his fortunes. In fact, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave him twice as much as before! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all his brothers, sisters, and former friends came and feasted with him in his home. And they consoled him and comforted him because of all the trials the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had brought against him. And each of them brought him a gift of money'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a kesitah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the value or weight of the kesitah is no longer known.
      marker-yv: yv-n
    - type: text
      text: ' and a gold ring.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed Job in the second half of his life even more than in the beginning. For now he had 14,000 sheep, 6,000 camels, 1,000 teams of oxen, and 1,000 female donkeys. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also gave Job seven more sons and three more daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He named his first daughter Jemimah, the second Keziah, and the third Keren-happuch. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In all the land no women were as lovely as the daughters of Job. And their father put them into his will along with their brothers.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job lived 140 years after that, living to see four generations of his children and grandchildren. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he died, an old man who had lived a long, full life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I know that you can do anything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one can stop you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You asked, ‘Who is this that questions my wisdom with such ignorance?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is I—and I was talking about things I knew nothing about,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: things far too wonderful for me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, ‘Listen and I will speak!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have some questions for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you must answer them.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I had only heard about you before,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now I have seen you with my own eyes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I take back everything I said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I sit in dust and ashes to show my repentance.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Conclusion: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Blesses Job'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had finished speaking to Job, he said to Eliphaz the Temanite: “I am angry with you and your two friends, for you have not spoken accurately about me, as my servant Job has. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So take seven bulls and seven rams and go to my servant Job and offer a burnt offering for yourselves. My servant Job will pray for you, and I will accept his prayer on your behalf. I will not treat you as you deserve, for you have not spoken accurately about me, as my servant Job has.” '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded them, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' accepted Job’s prayer.'
