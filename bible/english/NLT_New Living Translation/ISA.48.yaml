document_id: ISA.48,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Stubborn People
  - type: text
    content: “Listen to me, O family of Jacob,
  - type: text
    content: you who are called by the name of Israel
  - type: text
    content: and born into the family of Judah.
  - type: text
    content: 'Listen, you who take oaths in the name of the '
  - type: text
    content: Lord
  - type: text
    content: and call on the God of Israel.
  - type: text
    content: You don’t keep your promises,
  '10':
  - type: text
    content: I have refined you, but not as silver is refined.
  - type: text
    content: Rather, I have refined you in the furnace of suffering.
  '11':
  - type: text
    content: I will rescue you for my sake—
  - type: text
    content: yes, for my own sake!
  - type: text
    content: I will not let my reputation be tarnished,
  - type: text
    content: and I will not share my glory with idols!
  - type: heading
    content: Freedom from Babylon
  '12':
  - type: text
    content: “Listen to me, O family of Jacob,
  - type: text
    content: Israel my chosen one!
  - type: text
    content: I alone am God,
  - type: text
    content: the First and the Last.
  '13':
  - type: text
    content: It was my hand that laid the foundations of the earth,
  - type: text
    content: my right hand that spread out the heavens above.
  - type: text
    content: When I call out the stars,
  - type: text
    content: they all appear in order.”
  '14':
  - type: text
    content: Have any of your idols ever told you this?
  - type: text
    content: 'Come, all of you, and listen:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Cyrus as his ally.'
  - type: text
    content: He will use him to put an end to the empire of Babylon
  - type: text
    content: and to destroy the Babylonian
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' armies.'
  '15':
  - type: text
    content: '“I have said it: I am calling Cyrus!'
  - type: text
    content: I will send him on this errand and will help him succeed.
  '16':
  - type: text
    content: Come closer, and listen to this.
  - type: text
    content: From the beginning I have told you plainly what would happen.”
  - type: text
    content: 'And now the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' and his Spirit'
  - type: text
    content: have sent me with this message.
  '17':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'your Redeemer, the Holy One of Israel:'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who teaches you what is good for you
  - type: text
    content: and leads you along the paths you should follow.
  '18':
  - type: text
    content: Oh, that you had listened to my commands!
  - type: text
    content: Then you would have had peace flowing like a gentle river
  - type: text
    content: and righteousness rolling over you like waves in the sea.
  '19':
  - type: text
    content: Your descendants would have been like the sands along the seashore—
  - type: text
    content: too many to count!
  - type: text
    content: There would have been no need for your destruction,
  - type: text
    content: or for cutting off your family name.”
  '2':
  - type: text
    content: even though you call yourself the holy city
  - type: text
    content: and talk about depending on the God of Israel,
  - type: text
    content: 'whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '20':
  - type: text
    content: Yet even now, be free from your captivity!
  - type: text
    content: Leave Babylon and the Babylonians.
  - type: note
    content: Or the Chaldeans.
  - type: text
    content: Sing out this message!
  - type: text
    content: Shout it to the ends of the earth!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed his servants,'
  - type: text
    content: the people of Israel.
  - type: note
    content: Hebrew his servant, Jacob. See note on 14:1.
  '21':
  - type: text
    content: They were not thirsty
  - type: text
    content: when he led them through the desert.
  - type: text
    content: He divided the rock,
  - type: text
    content: and water gushed out for them to drink.
  '22':
  - type: text
    content: “But there is no peace for the wicked,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: Long ago I told you what was going to happen.
  - type: text
    content: Then suddenly I took action,
  - type: text
    content: and all my predictions came true.
  '4':
  - type: text
    content: For I know how stubborn and obstinate you are.
  - type: text
    content: Your necks are as unbending as iron.
  - type: text
    content: Your heads are as hard as bronze.
  '5':
  - type: text
    content: That is why I told you what would happen;
  - type: text
    content: I told you beforehand what I was going to do.
  - type: text
    content: Then you could never say, ‘My idols did it.
  - type: text
    content: My wooden image and metal god commanded it to happen!’
  '6':
  - type: text
    content: You have heard my predictions and seen them fulfilled,
  - type: text
    content: but you refuse to admit it.
  - type: text
    content: Now I will tell you new things,
  - type: text
    content: secrets you have not yet heard.
  '7':
  - type: text
    content: They are brand new, not things from the past.
  - type: text
    content: So you cannot say, ‘We knew that all the time!’
  '8':
  - type: text
    content: “Yes, I will tell you of things that are entirely new,
  - type: text
    content: things you never heard of before.
  - type: text
    content: For I know so well what traitors you are.
  - type: text
    content: You have been rebels from birth.
  '9':
  - type: text
    content: Yet for my own sake and for the honor of my name,
  - type: text
    content: I will hold back my anger and not wipe you out.
