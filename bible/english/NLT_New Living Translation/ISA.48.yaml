document_id: ISA.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Stubborn People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen to me, O family of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are called by the name of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and born into the family of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Listen, you who take oaths in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and call on the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You don’t keep your promises,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: even though you call yourself the holy city
- type: usfm
  marker: q1
  children:
  - type: text
    text: and talk about depending on the God of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'whose name is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Long ago I told you what was going to happen.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then suddenly I took action,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all my predictions came true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For I know how stubborn and obstinate you are.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your necks are as unbending as iron.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your heads are as hard as bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: That is why I told you what would happen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I told you beforehand what I was going to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you could never say, ‘My idols did it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My wooden image and metal god commanded it to happen!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You have heard my predictions and seen them fulfilled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you refuse to admit it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I will tell you new things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: secrets you have not yet heard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They are brand new, not things from the past.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So you cannot say, ‘We knew that all the time!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Yes, I will tell you of things that are entirely new,
- type: usfm
  marker: q2
  children:
  - type: text
    text: things you never heard of before.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I know so well what traitors you are.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have been rebels from birth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Yet for my own sake and for the honor of my name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will hold back my anger and not wipe you out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have refined you, but not as silver is refined.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rather, I have refined you in the furnace of suffering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will rescue you for my sake—
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, for my own sake!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not let my reputation be tarnished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will not share my glory with idols!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Freedom from Babylon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Listen to me, O family of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel my chosen one!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I alone am God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the First and the Last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: It was my hand that laid the foundations of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my right hand that spread out the heavens above.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I call out the stars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they all appear in order.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Have any of your idols ever told you this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Come, all of you, and listen:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has chosen Cyrus as his ally.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will use him to put an end to the empire of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to destroy the Babylonian
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldean.
    marker-yv: yv-n
  - type: text
    text: ' armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“I have said it: I am calling Cyrus!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will send him on this errand and will help him succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Come closer, and listen to this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the beginning I have told you plainly what would happen.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And now the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and his Spirit'
- type: usfm
  marker: q2
  children:
  - type: text
    text: have sent me with this message.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your Redeemer, the Holy One of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who teaches you what is good for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leads you along the paths you should follow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Oh, that you had listened to my commands!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then you would have had peace flowing like a gentle river
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteousness rolling over you like waves in the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your descendants would have been like the sands along the seashore—
- type: usfm
  marker: q2
  children:
  - type: text
    text: too many to count!
- type: usfm
  marker: q1
  children:
  - type: text
    text: There would have been no need for your destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or for cutting off your family name.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Yet even now, be free from your captivity!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Leave Babylon and the Babylonians.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:20a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Chaldeans.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing out this message!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout it to the ends of the earth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has redeemed his servants,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:20b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'his servant, Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They were not thirsty
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he led them through the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He divided the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water gushed out for them to drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “But there is no peace for the wicked,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
