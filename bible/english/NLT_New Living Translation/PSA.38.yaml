document_id: PSA.38,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David, asking God to remember him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', don’t rebuke me in your anger'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or discipline me in your rage!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My heart beats wildly, my strength fails,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am going blind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My loved ones and friends stay away, fearing my disease.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even my own family stands at a distance.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Meanwhile, my enemies lay traps to kill me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who wish me harm make plans to ruin me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All day long they plan their treachery.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But I am deaf to all their threats.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am silent before them as one who cannot speak.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I choose to hear nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I make no reply.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For I am waiting for you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You must answer for me, O Lord my God.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I prayed, “Don’t let my enemies gloat over me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or rejoice at my downfall.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I am on the verge of collapse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: facing constant pain.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But I confess my sins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am deeply sorry for what I have done.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I have many aggressive enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they hate me without reason.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Your arrows have struck deep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your blows are crushing me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They repay me evil for good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and oppose me for pursuing good.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Do not abandon me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not stand at a distance, my God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Come quickly to help me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Lord my savior.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Because of your anger, my whole body is sick;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my health is broken because of my sins.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My guilt overwhelms me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is a burden too heavy to bear.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: My wounds fester and stink
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of my foolish sins.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I am bent over and racked with pain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All day long I walk around filled with grief.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A raging fever burns within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my health is broken.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I am exhausted and completely crushed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My groans come from an anguished heart.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You know what I long for, Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you hear my every sigh.
