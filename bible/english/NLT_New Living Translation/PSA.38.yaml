document_id: PSA.38,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David, asking God to remember him.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', don’t rebuke me in your anger'
  - type: text
    content: or discipline me in your rage!
  '10':
  - type: text
    content: My heart beats wildly, my strength fails,
  - type: text
    content: and I am going blind.
  '11':
  - type: text
    content: My loved ones and friends stay away, fearing my disease.
  - type: text
    content: Even my own family stands at a distance.
  '12':
  - type: text
    content: Meanwhile, my enemies lay traps to kill me.
  - type: text
    content: Those who wish me harm make plans to ruin me.
  - type: text
    content: All day long they plan their treachery.
  '13':
  - type: text
    content: But I am deaf to all their threats.
  - type: text
    content: I am silent before them as one who cannot speak.
  '14':
  - type: text
    content: I choose to hear nothing,
  - type: text
    content: and I make no reply.
  '15':
  - type: text
    content: 'For I am waiting for you, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: You must answer for me, O Lord my God.
  '16':
  - type: text
    content: I prayed, “Don’t let my enemies gloat over me
  - type: text
    content: or rejoice at my downfall.”
  '17':
  - type: text
    content: I am on the verge of collapse,
  - type: text
    content: facing constant pain.
  '18':
  - type: text
    content: But I confess my sins;
  - type: text
    content: I am deeply sorry for what I have done.
  '19':
  - type: text
    content: I have many aggressive enemies;
  - type: text
    content: they hate me without reason.
  '2':
  - type: text
    content: Your arrows have struck deep,
  - type: text
    content: and your blows are crushing me.
  '20':
  - type: text
    content: They repay me evil for good
  - type: text
    content: and oppose me for pursuing good.
  '21':
  - type: text
    content: 'Do not abandon me, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Do not stand at a distance, my God.
  '22':
  - type: text
    content: Come quickly to help me,
  - type: text
    content: O Lord my savior.
  '3':
  - type: text
    content: Because of your anger, my whole body is sick;
  - type: text
    content: my health is broken because of my sins.
  '4':
  - type: text
    content: My guilt overwhelms me—
  - type: text
    content: it is a burden too heavy to bear.
  '5':
  - type: text
    content: My wounds fester and stink
  - type: text
    content: because of my foolish sins.
  '6':
  - type: text
    content: I am bent over and racked with pain.
  - type: text
    content: All day long I walk around filled with grief.
  '7':
  - type: text
    content: A raging fever burns within me,
  - type: text
    content: and my health is broken.
  '8':
  - type: text
    content: I am exhausted and completely crushed.
  - type: text
    content: My groans come from an anguished heart.
  '9':
  - type: text
    content: You know what I long for, Lord;
  - type: text
    content: you hear my every sigh.
