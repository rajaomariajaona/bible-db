document_id: ISA.56,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Blessings for All Nations
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Be just and fair to all.
  - type: text
    content: Do what is right and good,
  - type: text
    content: for I am coming soon to rescue you
  - type: text
    content: and to display my righteousness among you.
  '10':
  - type: text
    content: For the leaders of my people—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ’s watchmen, his shepherds—
  - type: text
    content: are blind and ignorant.
  - type: text
    content: They are like silent watchdogs
  - type: text
    content: that give no warning when danger comes.
  - type: text
    content: They love to lie around, sleeping and dreaming.
  '11':
  - type: text
    content: Like greedy dogs, they are never satisfied.
  - type: text
    content: They are ignorant shepherds,
  - type: text
    content: all following their own path
  - type: text
    content: and intent on personal gain.
  '12':
  - type: text
    content: “Come,” they say, “let’s get some wine and have a party.
  - type: text
    content: Let’s all get drunk.
  - type: text
    content: Then tomorrow we’ll do it again
  - type: text
    content: and have an even bigger party!”
  '2':
  - type: text
    content: Blessed are all those
  - type: text
    content: who are careful to do this.
  - type: text
    content: Blessed are those who honor my Sabbath days of rest
  - type: text
    content: and keep themselves from doing wrong.
  '3':
  - type: text
    content: '“Don’t let foreigners who commit themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' say,'
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will never let me be part of his people.’'
  - type: text
    content: And don’t let the eunuchs say,
  - type: text
    content: ‘I’m a dried-up tree with no children and no future.’
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: I will bless those eunuchs
  - type: text
    content: who keep my Sabbath days holy
  - type: text
    content: and who choose to do what pleases me
  - type: text
    content: and commit their lives to me.
  '5':
  - type: text
    content: I will give them—within the walls of my house—
  - type: text
    content: a memorial and a name
  - type: text
    content: far greater than sons and daughters could give.
  - type: text
    content: For the name I give them is an everlasting one.
  - type: text
    content: It will never disappear!
  '6':
  - type: text
    content: '“I will also bless the foreigners who commit themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who serve him and love his name,
  - type: text
    content: who worship him and do not desecrate the Sabbath day of rest,
  - type: text
    content: and who hold fast to my covenant.
  '7':
  - type: text
    content: I will bring them to my holy mountain of Jerusalem
  - type: text
    content: and will fill them with joy in my house of prayer.
  - type: text
    content: I will accept their burnt offerings and sacrifices,
  - type: text
    content: because my Temple will be called a house of prayer for all nations.
  '8':
  - type: text
    content: 'For the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'who brings back the outcasts of Israel, says:'
  - type: text
    content: I will bring others, too,
  - type: text
    content: besides my people Israel.”
  - type: heading
    content: Sinful Leaders Condemned
  '9':
  - type: text
    content: Come, wild animals of the field!
  - type: text
    content: Come, wild animals of the forest!
  - type: text
    content: Come and devour my people!
