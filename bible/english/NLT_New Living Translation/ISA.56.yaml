document_id: ISA.56
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blessings for All Nations
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Be just and fair to all.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do what is right and good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I am coming soon to rescue you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to display my righteousness among you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Blessed are all those
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are careful to do this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed are those who honor my Sabbath days of rest
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep themselves from doing wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Don’t let foreigners who commit themselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' say,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will never let me be part of his people.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And don’t let the eunuchs say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I’m a dried-up tree with no children and no future.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bless those eunuchs
- type: usfm
  marker: q2
  children:
  - type: text
    text: who keep my Sabbath days holy
- type: usfm
  marker: q1
  children:
  - type: text
    text: and who choose to do what pleases me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commit their lives to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will give them—within the walls of my house—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a memorial and a name
- type: usfm
  marker: q2
  children:
  - type: text
    text: far greater than sons and daughters could give.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the name I give them is an everlasting one.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will never disappear!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“I will also bless the foreigners who commit themselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: who serve him and love his name,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who worship him and do not desecrate the Sabbath day of rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who hold fast to my covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will bring them to my holy mountain of Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will fill them with joy in my house of prayer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will accept their burnt offerings and sacrifices,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because my Temple will be called a house of prayer for all nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who brings back the outcasts of Israel, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring others, too,
- type: usfm
  marker: q2
  children:
  - type: text
    text: besides my people Israel.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sinful Leaders Condemned
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Come, wild animals of the field!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come, wild animals of the forest!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come and devour my people!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the leaders of my people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s watchmen, his shepherds—
- type: usfm
  marker: q2
  children:
  - type: text
    text: are blind and ignorant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are like silent watchdogs
- type: usfm
  marker: q2
  children:
  - type: text
    text: that give no warning when danger comes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They love to lie around, sleeping and dreaming.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Like greedy dogs, they are never satisfied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are ignorant shepherds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all following their own path
- type: usfm
  marker: q2
  children:
  - type: text
    text: and intent on personal gain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Come,” they say, “let’s get some wine and have a party.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s all get drunk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then tomorrow we’ll do it again
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have an even bigger party!”
