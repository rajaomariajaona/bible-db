document_id: 1CH.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priestly Line
  - type: text
    content: ' '
  - type: note
    content: Verses 6:1-15 are numbered 5:27-41 in Hebrew text.
  - type: text
    content: The sons of Levi were Gershon, Kohath, and Merari.
  '10':
  - type: text
    content: Johanan was the father of Azariah, the high priest at the Temple
  - type: note
    content: Hebrew the house.
  - type: text
    content: ' built by Solomon in Jerusalem.'
  '11':
  - type: text
    content: Azariah was the father of Amariah.
  - type: text
    content: Amariah was the father of Ahitub.
  '12':
  - type: text
    content: Ahitub was the father of Zadok.
  - type: text
    content: Zadok was the father of Shallum.
  '13':
  - type: text
    content: Shallum was the father of Hilkiah.
  - type: text
    content: Hilkiah was the father of Azariah.
  '14':
  - type: text
    content: Azariah was the father of Seraiah.
  - type: text
    content: 'Seraiah was the father of Jehozadak, '
  '15':
  - type: text
    content: 'who went into exile when the '
  - type: text
    content: Lord
  - type: text
    content: ' sent the people of Judah and Jerusalem into captivity under Nebuchadnezzar.'
  - type: heading
    content: The Levite Clans
  '16':
  - type: text
    content: ' '
  - type: note
    content: Verses 6:16-81 are numbered 6:1-66 in Hebrew text.
  - type: text
    content: The sons of Levi were Gershon,
  - type: note
    content: Hebrew Gershom, a variant spelling of Gershon (see 6:1); also in 6:17, 20, 43, 62, 71.
  - type: text
    content: ' Kohath, and Merari.'
  '17':
  - type: text
    content: The descendants of Gershon included Libni and Shimei.
  '18':
  - type: text
    content: The descendants of Kohath included Amram, Izhar, Hebron, and Uzziel.
  '19':
  - type: text
    content: The descendants of Merari included Mahli and Mushi.
  - type: text
    content: 'The following were the Levite clans, listed according to their ancestral descent:'
  '2':
  - type: text
    content: The descendants of Kohath included Amram, Izhar, Hebron, and Uzziel.
  '20':
  - type: text
    content: 'The descendants of Gershon included Libni, Jahath, Zimmah, '
  '21':
  - type: text
    content: Joah, Iddo, Zerah, and Jeatherai.
  '22':
  - type: text
    content: 'The descendants of Kohath included Amminadab, Korah, Assir, '
  '23':
  - type: text
    content: Elkanah, Abiasaph,
  - type: note
    content: Hebrew Ebiasaph, a variant spelling of Abiasaph (also in 6:37); compare parallel text at Exod 6:24.
  - type: text
    content: ' Assir, '
  '24':
  - type: text
    content: Tahath, Uriel, Uzziah, and Shaul.
  '25':
  - type: text
    content: 'The descendants of Elkanah included Amasai, Ahimoth, '
  '26':
  - type: text
    content: 'Elkanah, Zophai, Nahath, '
  '27':
  - type: text
    content: Eliab, Jeroham, Elkanah, and Samuel.
  - type: note
    content: As in some Greek manuscripts (see also 6:33-34); Hebrew lacks and Samuel.
  '28':
  - type: text
    content: The sons of Samuel were Joel
  - type: note
    content: As in some Greek manuscripts and the Syriac version (see also 6:33 and 1 Sam 8:2); Hebrew lacks Joel.
  - type: text
    content: ' (the older) and Abijah (the second).'
  '29':
  - type: text
    content: 'The descendants of Merari included Mahli, Libni, Shimei, Uzzah, '
  '3':
  - type: text
    content: The children of Amram were Aaron, Moses, and Miriam.
  - type: text
    content: The sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar.
  '30':
  - type: text
    content: Shimea, Haggiah, and Asaiah.
  - type: heading
    content: The Temple Musicians
  '31':
  - type: text
    content: 'David assigned the following men to lead the music at the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' after the Ark was placed there. '
  '32':
  - type: text
    content: They ministered with music at the Tabernacle
  - type: note
    content: Hebrew the Tabernacle, the Tent of Meeting.
  - type: text
    content: ' until Solomon built the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem. They carried out their work, following all the regulations handed down to them. '
  '33':
  - type: text
    content: 'These are the men who served, along with their sons:'
  - type: text
    content: 'Heman the musician was from the clan of Kohath. His genealogy was traced back through Joel, Samuel, '
  '34':
  - type: text
    content: 'Elkanah, Jeroham, Eliel, Toah, '
  '35':
  - type: text
    content: 'Zuph, Elkanah, Mahath, Amasai, '
  '36':
  - type: text
    content: 'Elkanah, Joel, Azariah, Zephaniah, '
  '37':
  - type: text
    content: 'Tahath, Assir, Abiasaph, Korah, '
  '38':
  - type: text
    content: Izhar, Kohath, Levi, and Israel.
  - type: note
    content: Israel is the name that God gave to Jacob.
  '39':
  - type: text
    content: Heman’s first assistant was Asaph from the clan of Gershon.
  - type: note
    content: Hebrew lacks from the clan of Gershon; see 6:43.
  - type: text
    content: ' Asaph’s genealogy was traced back through Berekiah, Shimea, '
  '4':
  - type: text
    content: Eleazar was the father of Phinehas.
  - type: text
    content: Phinehas was the father of Abishua.
  '40':
  - type: text
    content: 'Michael, Baaseiah, Malkijah, '
  '41':
  - type: text
    content: 'Ethni, Zerah, Adaiah, '
  '42':
  - type: text
    content: 'Ethan, Zimmah, Shimei, '
  '43':
  - type: text
    content: Jahath, Gershon, and Levi.
  '44':
  - type: text
    content: 'Heman’s second assistant was Ethan from the clan of Merari. Ethan’s genealogy was traced back through Kishi, Abdi, Malluch, '
  '45':
  - type: text
    content: 'Hashabiah, Amaziah, Hilkiah, '
  '46':
  - type: text
    content: 'Amzi, Bani, Shemer, '
  '47':
  - type: text
    content: Mahli, Mushi, Merari, and Levi.
  '48':
  - type: text
    content: Their fellow Levites were appointed to various other tasks in the Tabernacle, the house of God.
  - type: heading
    content: Aaron’s Descendants
  '49':
  - type: text
    content: Only Aaron and his descendants served as priests. They presented the offerings on the altar of burnt offering and the altar of incense, and they performed all the other duties related to the Most Holy Place. They made atonement for Israel by doing everything that Moses, the servant of God, had commanded them.
  '5':
  - type: text
    content: Abishua was the father of Bukki.
  - type: text
    content: Bukki was the father of Uzzi.
  '50':
  - type: text
    content: 'The descendants of Aaron were Eleazar, Phinehas, Abishua, '
  '51':
  - type: text
    content: 'Bukki, Uzzi, Zerahiah, '
  '52':
  - type: text
    content: 'Meraioth, Amariah, Ahitub, '
  '53':
  - type: text
    content: Zadok, and Ahimaaz.
  - type: heading
    content: Territory for the Levites
  '54':
  - type: text
    content: 'This is a record of the towns and territory assigned by means of sacred lots to the descendants of Aaron, who were from the clan of Kohath. '
  '55':
  - type: text
    content: 'This territory included Hebron and its surrounding pasturelands in Judah, '
  '56':
  - type: text
    content: 'but the fields and outlying areas belonging to the city were given to Caleb son of Jephunneh. '
  '57':
  - type: text
    content: 'So the descendants of Aaron were given the following towns, each with its pasturelands: Hebron (a city of refuge),'
  - type: note
    content: 'As in parallel text at Josh 21:13; Hebrew reads were given the cities of refuge: Hebron, and the following towns, each with its pasturelands.'
  - type: text
    content: ' Libnah, Jattir, Eshtemoa, '
  '58':
  - type: text
    content: Holon,
  - type: note
    content: As in parallel text at Josh 21:15; Masoretic Text reads Hilez; other manuscripts read Hilen.
  - type: text
    content: ' Debir, '
  '59':
  - type: text
    content: Ain,
  - type: note
    content: As in parallel text at Josh 21:16; Hebrew reads Ashan.
  - type: text
    content: ' Juttah,'
  - type: note
    content: As in Syriac version (see also Josh 21:16); Hebrew lacks Juttah.
  - type: text
    content: ' and Beth-shemesh. '
  '6':
  - type: text
    content: Uzzi was the father of Zerahiah.
  - type: text
    content: Zerahiah was the father of Meraioth.
  '60':
  - type: text
    content: And from the territory of Benjamin they were given Gibeon,
  - type: note
    content: As in parallel text at Josh 21:17; Hebrew lacks Gibeon.
  - type: text
    content: ' Geba, Alemeth, and Anathoth, each with its pasturelands. So thirteen towns were given to the descendants of Aaron. '
  '61':
  - type: text
    content: The remaining descendants of Kohath received ten towns from the territory of the half-tribe of Manasseh by means of sacred lots.
  '62':
  - type: text
    content: The descendants of Gershon received by sacred lots thirteen towns from the territories of Issachar, Asher, Naphtali, and from the Bashan area of Manasseh, east of the Jordan.
  '63':
  - type: text
    content: The descendants of Merari received by sacred lots twelve towns from the territories of Reuben, Gad, and Zebulun.
  '64':
  - type: text
    content: 'So the people of Israel assigned all these towns and pasturelands to the Levites. '
  '65':
  - type: text
    content: The towns in the territories of Judah, Simeon, and Benjamin, mentioned above, were assigned to them by means of sacred lots.
  '66':
  - type: text
    content: 'The descendants of Kohath were given the following towns from the territory of Ephraim, each with its pasturelands: '
  '67':
  - type: text
    content: Shechem (a city of refuge in the hill country of Ephraim),
  - type: note
    content: 'As in parallel text at Josh 21:21; Hebrew text reads were given the cities of refuge: Shechem in the hill country of Ephraim, and the following towns, each with its pasturelands.'
  - type: text
    content: ' Gezer, '
  '68':
  - type: text
    content: 'Jokmeam, Beth-horon, '
  '69':
  - type: text
    content: 'Aijalon, and Gath-rimmon. '
  '7':
  - type: text
    content: Meraioth was the father of Amariah.
  - type: text
    content: Amariah was the father of Ahitub.
  '70':
  - type: text
    content: The remaining descendants of Kohath were assigned the towns of Aner and Bileam from the territory of the half-tribe of Manasseh, each with its pasturelands.
  '71':
  - type: text
    content: 'The descendants of Gershon received the towns of Golan (in Bashan) and Ashtaroth from the territory of the half-tribe of Manasseh, each with its pasturelands. '
  '72':
  - type: text
    content: 'From the territory of Issachar, they were given Kedesh, Daberath, '
  '73':
  - type: text
    content: 'Ramoth, and Anem, each with its pasturelands. '
  '74':
  - type: text
    content: 'From the territory of Asher, they received Mashal, Abdon, '
  '75':
  - type: text
    content: 'Hukok, and Rehob, each with its pasturelands. '
  '76':
  - type: text
    content: From the territory of Naphtali, they were given Kedesh in Galilee, Hammon, and Kiriathaim, each with its pasturelands.
  '77':
  - type: text
    content: The remaining descendants of Merari received the towns of Jokneam, Kartah,
  - type: note
    content: As in Greek version (see also Josh 21:34); Hebrew lacks Jokneam, Kartah.
  - type: text
    content: ' Rimmon,'
  - type: note
    content: As in Greek version (see also Josh 19:13); Hebrew reads Rimmono.
  - type: text
    content: ' and Tabor from the territory of Zebulun, each with its pasturelands. '
  '78':
  - type: text
    content: From the territory of Reuben, east of the Jordan River opposite Jericho, they received Bezer (a desert town), Jahaz,
  - type: note
    content: Hebrew Jahzah, a variant spelling of Jahaz.
  - type: text
    content: ' '
  '79':
  - type: text
    content: 'Kedemoth, and Mephaath, each with its pasturelands. '
  '8':
  - type: text
    content: Ahitub was the father of Zadok.
  - type: text
    content: Zadok was the father of Ahimaaz.
  '80':
  - type: text
    content: 'And from the territory of Gad, they received Ramoth in Gilead, Mahanaim, '
  '81':
  - type: text
    content: Heshbon, and Jazer, each with its pasturelands.
  '9':
  - type: text
    content: Ahimaaz was the father of Azariah.
  - type: text
    content: Azariah was the father of Johanan.
