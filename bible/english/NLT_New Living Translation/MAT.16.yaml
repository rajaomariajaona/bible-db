document_id: MAT.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Leaders Demand a Miraculous Sign
  - type: text
    content: One day the Pharisees and Sadducees came to test Jesus, demanding that he show them a miraculous sign from heaven to prove his authority.
  '10':
  - type: text
    content: Or the 4,000 I fed with seven loaves, and the large baskets of leftovers you picked up?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Why can’t you understand that I’m not talking about bread? So again I say, ‘Beware of the yeast of the Pharisees and Sadducees.’”
  '12':
  - type: text
    content: Then at last they understood that he wasn’t speaking about the yeast in bread, but about the deceptive teaching of the Pharisees and Sadducees.
  - type: heading
    content: Peter’s Declaration about Jesus
  '13':
  - type: text
    content: 'When Jesus came to the region of Caesarea Philippi, he asked his disciples, '
  - type: text
    content: “Who do people say that the Son of Man is?”
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  '14':
  - type: text
    content: “Well,” they replied, “some say John the Baptist, some say Elijah, and others say Jeremiah or one of the other prophets.”
  '15':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “But who do you say I am?”
  '16':
  - type: text
    content: Simon Peter answered, “You are the Messiah,
  - type: note
    content: Or the Christ. Messiah (a Hebrew term) and Christ (a Greek term) both mean “anointed one.”
  - type: text
    content: ' the Son of the living God.”'
  '17':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You are blessed, Simon son of John,
  - type: note
    content: Greek Simon bar-Jonah; see John 1:42; 21:15-17.
  - type: text
    content: ' '
  - type: text
    content: because my Father in heaven has revealed this to you. You did not learn this from any human being.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Now I say to you that you are Peter (which means ‘rock’),
  - type: note
    content: Greek that you are Peter.
  - type: text
    content: ' '
  - type: text
    content: and upon this rock I will build my church, and all the powers of hell
  - type: note
    content: Greek and the gates of Hades.
  - type: text
    content: ' '
  - type: text
    content: will not conquer it.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And I will give you the keys of the Kingdom of Heaven. Whatever you forbid
  - type: note
    content: Or bind, or lock.
  - type: text
    content: ' '
  - type: text
    content: on earth will be forbidden in heaven, and whatever you permit
  - type: note
    content: Or loose, or open.
  - type: text
    content: ' '
  - type: text
    content: on earth will be permitted in heaven.”
  '2':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You know the saying, ‘Red sky at night means fair weather tomorrow;
  - type: text
    content: ' '
  '20':
  - type: text
    content: Then he sternly warned the disciples not to tell anyone that he was the Messiah.
  - type: heading
    content: Jesus Predicts His Death
  '21':
  - type: text
    content: From then on Jesus
  - type: note
    content: Some manuscripts read Jesus the Messiah.
  - type: text
    content: ' began to tell his disciples plainly that it was necessary for him to go to Jerusalem, and that he would suffer many terrible things at the hands of the elders, the leading priests, and the teachers of religious law. He would be killed, but on the third day he would be raised from the dead.'
  '22':
  - type: text
    content: But Peter took him aside and began to reprimand him
  - type: note
    content: Or began to correct him.
  - type: text
    content: ' for saying such things. “Heaven forbid, Lord,” he said. “This will never happen to you!”'
  '23':
  - type: text
    content: 'Jesus turned to Peter and said, '
  - type: text
    content: “Get away from me, Satan! You are a dangerous trap to me. You are seeing things merely from a human point of view, not from God’s.”
  '24':
  - type: text
    content: 'Then Jesus said to his disciples, '
  - type: text
    content: “If any of you wants to be my follower, you must give up your own way, take up your cross, and follow me.
  - type: text
    content: ' '
  '25':
  - type: text
    content: If you try to hang on to your life, you will lose it. But if you give up your life for my sake, you will save it.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And what do you benefit if you gain the whole world but lose your own soul?
  - type: note
    content: Or your self? also in 16:26b.
  - type: text
    content: ' '
  - type: text
    content: Is anything worth more than your soul?
  - type: text
    content: ' '
  '27':
  - type: text
    content: For the Son of Man will come with his angels in the glory of his Father and will judge all people according to their deeds.
  - type: text
    content: ' '
  '28':
  - type: text
    content: And I tell you the truth, some standing here right now will not die before they see the Son of Man coming in his Kingdom.”
  '3':
  - type: text
    content: red sky in the morning means foul weather all day.’ You know how to interpret the weather signs in the sky, but you don’t know how to interpret the signs of the times!
  - type: note
    content: Several manuscripts do not include any of the words in 16:2-3 after He replied.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Only an evil, adulterous generation would demand a miraculous sign, but the only sign I will give them is the sign of the prophet Jonah.
  - type: note
    content: Greek the sign of Jonah.
  - type: text
    content: ”
  - type: text
    content: ' Then Jesus left them and went away.'
  - type: heading
    content: Yeast of the Pharisees and Sadducees
  '5':
  - type: text
    content: 'Later, after they crossed to the other side of the lake, the disciples discovered they had forgotten to bring any bread. '
  '6':
  - type: text
    content: '“Watch out!” '
  - type: text
    content: 'Jesus warned them. '
  - type: text
    content: “Beware of the yeast of the Pharisees and Sadducees.”
  '7':
  - type: text
    content: 'At this they began to argue with each other because they hadn’t brought any bread. '
  '8':
  - type: text
    content: 'Jesus knew what they were saying, so he said, '
  - type: text
    content: “You have so little faith! Why are you arguing with each other about having no bread?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Don’t you understand even yet? Don’t you remember the 5,000 I fed with five loaves, and the baskets of leftovers you picked up?
  - type: text
    content: ' '
