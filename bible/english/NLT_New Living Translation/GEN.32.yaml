document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 32:1-32 are numbered 32:2-33 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'As Jacob started on his way again, angels of God came to meet him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jacob saw them, he exclaimed, “This is God’s camp!” So he named the place Mahanaim.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:2 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mahanaim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “two camps.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Sends Gifts to Esau
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Jacob sent messengers ahead to his brother, Esau, who was living in the region of Seir in the land of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He told them, “Give this message to my master Esau: ‘Humble greetings from your servant Jacob. Until now I have been living with Uncle Laban, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and now I own cattle, donkeys, flocks of sheep and goats, and many servants, both men and women. I have sent these messengers to inform my lord of my coming, hoping that you will be friendly to me.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'After delivering the message, the messengers returned to Jacob and reported, “We met your brother, Esau, and he is already on his way to meet you—with an army of 400 men!” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jacob was terrified at the news. He divided his household, along with the flocks and herds and camels, into two groups. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He thought, “If Esau meets one group and attacks it, perhaps the other group can escape.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jacob prayed, “O God of my grandfather Abraham, and God of my father, Isaac—O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you told me, ‘Return to your own land and to your relatives.’ And you promised me, ‘I will treat you kindly.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am not worthy of all the unfailing love and faithfulness you have shown to me, your servant. When I left home and crossed the Jordan River, I owned nothing except a walking stick. Now my household fills two large camps! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', please rescue me from the hand of my brother, Esau. I am afraid that he is coming to attack me, along with my wives and children. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But you promised me, ‘I will surely treat you kindly, and I will multiply your descendants until they become as numerous as the sands along the seashore—too many to count.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jacob stayed where he was for the night. Then he selected these gifts from his possessions to present to his brother, Esau: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '200 female goats, 20 male goats, 200 ewes, 20 rams, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '30 female camels with their young, 40 cows, 10 bulls, 20 female donkeys, and 10 male donkeys. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He divided these animals into herds and assigned each to different servants. Then he told his servants, “Go ahead of me with the animals, but keep some distance between the herds.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He gave these instructions to the men leading the first group: “When my brother, Esau, meets you, he will ask, ‘Whose servants are you? Where are you going? Who owns these animals?’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You must reply, ‘They belong to your servant Jacob, but they are a gift for his master Esau. Look, he is coming right behind us.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jacob gave the same instructions to the second and third herdsmen and to all who followed behind the herds: “You must say the same thing to Esau when you meet him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And be sure to say, ‘Look, your servant Jacob is right behind us.’”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jacob thought, “I will try to appease him by sending gifts ahead of me. When I see him in person, perhaps he will be friendly to me.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the gifts were sent on ahead, while Jacob himself spent that night in the camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Wrestles with God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'During the night Jacob got up and took his two wives, his two servant wives, and his eleven sons and crossed the Jabbok River with them. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: After taking them to the other side, he sent over all his possessions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'This left Jacob all alone in the camp, and a man came and wrestled with him until the dawn began to break. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When the man saw that he would not win the match, he touched Jacob’s hip and wrenched it out of its socket. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the man said, “Let me go, for the dawn is breaking!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Jacob said, “I will not let you go unless you bless me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “What is your name?” the man asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: He replied, “Jacob.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Your name will no longer be Jacob,” the man told him. “From now on you will be called Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:28 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew words for “heel” and “deceiver.” '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “God fights.”
    marker-yv: yv-n
  - type: text
    text: ' because you have fought with God and with men and have won.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Please tell me your name,” Jacob said.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Why do you want to know my name?” the man replied. Then he blessed Jacob there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jacob named the place Peniel (which means “face of God”), for he said, “I have seen God face to face, yet my life has been spared.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The sun was rising as Jacob left Peniel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Penuel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Peniel.
    marker-yv: yv-n
  - type: text
    text: ' and he was limping because of the injury to his hip. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: (Even today the people of Israel don’t eat the tendon near the hip socket because of what happened that night when the man strained the tendon of Jacob’s hip.)
