document_id: GEN.32,116
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Verses 32:1-32 are numbered 32:2-33 in Hebrew text.
  - type: text
    content: 'As Jacob started on his way again, angels of God came to meet him. '
  '10':
  - type: text
    content: 'I am not worthy of all the unfailing love and faithfulness you have shown to me, your servant. When I left home and crossed the Jordan River, I owned nothing except a walking stick. Now my household fills two large camps! '
  '11':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', please rescue me from the hand of my brother, Esau. I am afraid that he is coming to attack me, along with my wives and children. '
  '12':
  - type: text
    content: But you promised me, ‘I will surely treat you kindly, and I will multiply your descendants until they become as numerous as the sands along the seashore—too many to count.’”
  '13':
  - type: text
    content: 'Jacob stayed where he was for the night. Then he selected these gifts from his possessions to present to his brother, Esau: '
  '14':
  - type: text
    content: '200 female goats, 20 male goats, 200 ewes, 20 rams, '
  '15':
  - type: text
    content: '30 female camels with their young, 40 cows, 10 bulls, 20 female donkeys, and 10 male donkeys. '
  '16':
  - type: text
    content: He divided these animals into herds and assigned each to different servants. Then he told his servants, “Go ahead of me with the animals, but keep some distance between the herds.”
  '17':
  - type: text
    content: 'He gave these instructions to the men leading the first group: “When my brother, Esau, meets you, he will ask, ‘Whose servants are you? Where are you going? Who owns these animals?’ '
  '18':
  - type: text
    content: You must reply, ‘They belong to your servant Jacob, but they are a gift for his master Esau. Look, he is coming right behind us.’”
  '19':
  - type: text
    content: 'Jacob gave the same instructions to the second and third herdsmen and to all who followed behind the herds: “You must say the same thing to Esau when you meet him. '
  '2':
  - type: text
    content: When Jacob saw them, he exclaimed, “This is God’s camp!” So he named the place Mahanaim.
  - type: note
    content: Mahanaim means “two camps.”
  - type: heading
    content: Jacob Sends Gifts to Esau
  '20':
  - type: text
    content: And be sure to say, ‘Look, your servant Jacob is right behind us.’”
  - type: text
    content: 'Jacob thought, “I will try to appease him by sending gifts ahead of me. When I see him in person, perhaps he will be friendly to me.” '
  '21':
  - type: text
    content: So the gifts were sent on ahead, while Jacob himself spent that night in the camp.
  - type: heading
    content: Jacob Wrestles with God
  '22':
  - type: text
    content: 'During the night Jacob got up and took his two wives, his two servant wives, and his eleven sons and crossed the Jabbok River with them. '
  '23':
  - type: text
    content: After taking them to the other side, he sent over all his possessions.
  '24':
  - type: text
    content: 'This left Jacob all alone in the camp, and a man came and wrestled with him until the dawn began to break. '
  '25':
  - type: text
    content: 'When the man saw that he would not win the match, he touched Jacob’s hip and wrenched it out of its socket. '
  '26':
  - type: text
    content: Then the man said, “Let me go, for the dawn is breaking!”
  - type: text
    content: But Jacob said, “I will not let you go unless you bless me.”
  '27':
  - type: text
    content: “What is your name?” the man asked.
  - type: text
    content: He replied, “Jacob.”
  '28':
  - type: text
    content: “Your name will no longer be Jacob,” the man told him. “From now on you will be called Israel,
  - type: note
    content: Jacob sounds like the Hebrew words for “heel” and “deceiver.” Israel means “God fights.”
  - type: text
    content: ' because you have fought with God and with men and have won.”'
  '29':
  - type: text
    content: “Please tell me your name,” Jacob said.
  - type: text
    content: “Why do you want to know my name?” the man replied. Then he blessed Jacob there.
  '3':
  - type: text
    content: 'Then Jacob sent messengers ahead to his brother, Esau, who was living in the region of Seir in the land of Edom. '
  '30':
  - type: text
    content: 'Jacob named the place Peniel (which means “face of God”), for he said, “I have seen God face to face, yet my life has been spared.” '
  '31':
  - type: text
    content: The sun was rising as Jacob left Peniel,
  - type: note
    content: Hebrew Penuel, a variant spelling of Peniel.
  - type: text
    content: ' and he was limping because of the injury to his hip. '
  '32':
  - type: text
    content: (Even today the people of Israel don’t eat the tendon near the hip socket because of what happened that night when the man strained the tendon of Jacob’s hip.)
  '4':
  - type: text
    content: 'He told them, “Give this message to my master Esau: ‘Humble greetings from your servant Jacob. Until now I have been living with Uncle Laban, '
  '5':
  - type: text
    content: and now I own cattle, donkeys, flocks of sheep and goats, and many servants, both men and women. I have sent these messengers to inform my lord of my coming, hoping that you will be friendly to me.’”
  '6':
  - type: text
    content: 'After delivering the message, the messengers returned to Jacob and reported, “We met your brother, Esau, and he is already on his way to meet you—with an army of 400 men!” '
  '7':
  - type: text
    content: 'Jacob was terrified at the news. He divided his household, along with the flocks and herds and camels, into two groups. '
  '8':
  - type: text
    content: He thought, “If Esau meets one group and attacks it, perhaps the other group can escape.”
  '9':
  - type: text
    content: 'Then Jacob prayed, “O God of my grandfather Abraham, and God of my father, Isaac—O '
  - type: text
    content: Lord
  - type: text
    content: ', you told me, ‘Return to your own land and to your relatives.’ And you promised me, ‘I will treat you kindly.’ '
