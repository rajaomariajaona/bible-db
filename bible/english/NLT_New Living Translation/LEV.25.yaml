document_id: LEV.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbath Year
  - type: text
    content: 'While Moses was on Mount Sinai, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  '10':
  - type: text
    content: 'Set this year apart as holy, a time to proclaim freedom throughout the land for all who live there. It will be a jubilee year for you, when each of you may return to the land that belonged to your ancestors and return to your own clan. '
  '11':
  - type: text
    content: 'This fiftieth year will be a jubilee for you. During that year you must not plant your fields or store away any of the crops that grow on their own, and don’t gather the grapes from your unpruned vines. '
  '12':
  - type: text
    content: 'It will be a jubilee year for you, and you must keep it holy. But you may eat whatever the land produces on its own. '
  '13':
  - type: text
    content: In the Year of Jubilee each of you may return to the land that belonged to your ancestors.
  '14':
  - type: text
    content: '“When you make an agreement with your neighbor to buy or sell property, you must not take advantage of each other. '
  '15':
  - type: text
    content: 'When you buy land from your neighbor, the price you pay must be based on the number of years since the last jubilee. The seller must set the price by taking into account the number of years remaining until the next Year of Jubilee. '
  '16':
  - type: text
    content: 'The more years until the next jubilee, the higher the price; the fewer years, the lower the price. After all, the person selling the land is actually selling you a certain number of harvests. '
  '17':
  - type: text
    content: 'Show your fear of God by not taking advantage of each other. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '18':
  - type: text
    content: '“If you want to live securely in the land, follow my decrees and obey my regulations. '
  '19':
  - type: text
    content: 'Then the land will yield large crops, and you will eat your fill and live securely in it. '
  '2':
  - type: text
    content: '“Give the following instructions to the people of Israel. When you have entered the land I am giving you, the land itself must observe a Sabbath rest before the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'every seventh year. '
  '20':
  - type: text
    content: 'But you might ask, ‘What will we eat during the seventh year, since we are not allowed to plant or harvest crops that year?’ '
  '21':
  - type: text
    content: 'Be assured that I will send my blessing for you in the sixth year, so the land will produce a crop large enough for three years. '
  '22':
  - type: text
    content: When you plant your fields in the eighth year, you will still be eating from the large crop of the sixth year. In fact, you will still be eating from that large crop when the new crop is harvested in the ninth year.
  - type: heading
    content: Redemption of Property
  '23':
  - type: text
    content: “The land must never be sold on a permanent basis, for the land belongs to me. You are only foreigners and tenant farmers working for me.
  '24':
  - type: text
    content: '“With every purchase of land you must grant the seller the right to buy it back. '
  '25':
  - type: text
    content: 'If one of your fellow Israelites falls into poverty and is forced to sell some family land, then a close relative should buy it back for him. '
  '26':
  - type: text
    content: 'If there is no close relative to buy the land, but the person who sold it gets enough money to buy it back, '
  '27':
  - type: text
    content: 'he then has the right to redeem it from the one who bought it. The price of the land will be discounted according to the number of years until the next Year of Jubilee. In this way the original owner can then return to the land. '
  '28':
  - type: text
    content: But if the original owner cannot afford to buy back the land, it will remain with the new owner until the next Year of Jubilee. In the jubilee year, the land must be returned to the original owners so they can return to their family land.
  '29':
  - type: text
    content: '“Anyone who sells a house inside a walled town has the right to buy it back for a full year after its sale. During that year, the seller retains the right to buy it back. '
  '3':
  - type: text
    content: 'For six years you may plant your fields and prune your vineyards and harvest your crops, '
  '30':
  - type: text
    content: 'But if it is not bought back within a year, the sale of the house within the walled town cannot be reversed. It will become the permanent property of the buyer. It will not be returned to the original owner in the Year of Jubilee. '
  '31':
  - type: text
    content: But a house in a village—a settlement without fortified walls—will be treated like property in the countryside. Such a house may be bought back at any time, and it must be returned to the original owner in the Year of Jubilee.
  '32':
  - type: text
    content: '“The Levites always have the right to buy back a house they have sold within the towns allotted to them. '
  '33':
  - type: text
    content: 'And any property that is sold by the Levites—all houses within the Levitical towns—must be returned in the Year of Jubilee. After all, the houses in the towns reserved for the Levites are the only property they own in all Israel. '
  '34':
  - type: text
    content: The open pastureland around the Levitical towns may never be sold. It is their permanent possession.
  - type: heading
    content: Redemption of the Poor and Enslaved
  '35':
  - type: text
    content: '“If one of your fellow Israelites falls into poverty and cannot support himself, support him as you would a foreigner or a temporary resident and allow him to live with you. '
  '36':
  - type: text
    content: 'Do not charge interest or make a profit at his expense. Instead, show your fear of God by letting him live with you as your relative. '
  '37':
  - type: text
    content: 'Remember, do not charge interest on money you lend him or make a profit on food you sell him. '
  '38':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt to give you the land of Canaan and to be your God.'
  '39':
  - type: text
    content: '“If one of your fellow Israelites falls into poverty and is forced to sell himself to you, do not treat him as a slave. '
  '4':
  - type: text
    content: 'but during the seventh year the land must have a Sabbath year of complete rest. It is the '
  - type: text
    content: Lord
  - type: text
    content: '’s Sabbath. Do not plant your fields or prune your vineyards during that year. '
  '40':
  - type: text
    content: 'Treat him instead as a hired worker or as a temporary resident who lives with you, and he will serve you only until the Year of Jubilee. '
  '41':
  - type: text
    content: 'At that time he and his children will no longer be obligated to you, and they will return to their clans and go back to the land originally allotted to their ancestors. '
  '42':
  - type: text
    content: 'The people of Israel are my servants, whom I brought out of the land of Egypt, so they must never be sold as slaves. '
  '43':
  - type: text
    content: Show your fear of God by not treating them harshly.
  '44':
  - type: text
    content: '“However, you may purchase male and female slaves from among the nations around you. '
  '45':
  - type: text
    content: 'You may also purchase the children of temporary residents who live among you, including those who have been born in your land. You may treat them as your property, '
  '46':
  - type: text
    content: passing them on to your children as a permanent inheritance. You may treat them as slaves, but you must never treat your fellow Israelites this way.
  '47':
  - type: text
    content: '“Suppose a foreigner or temporary resident becomes rich while living among you. If any of your fellow Israelites fall into poverty and are forced to sell themselves to such a foreigner or to a member of his family, '
  '48':
  - type: text
    content: 'they still retain the right to be bought back, even after they have been purchased. They may be bought back by a brother, '
  '49':
  - type: text
    content: 'an uncle, or a cousin. In fact, anyone from the extended family may buy them back. They may also redeem themselves if they have prospered. '
  '5':
  - type: text
    content: 'And don’t store away the crops that grow on their own or gather the grapes from your unpruned vines. The land must have a year of complete rest. '
  '50':
  - type: text
    content: 'They will negotiate the price of their freedom with the person who bought them. The price will be based on the number of years from the time they were sold until the next Year of Jubilee—whatever it would cost to hire a worker for that period of time. '
  '51':
  - type: text
    content: 'If many years still remain until the jubilee, they will repay the proper proportion of what they received when they sold themselves. '
  '52':
  - type: text
    content: 'If only a few years remain until the Year of Jubilee, they will repay a small amount for their redemption. '
  '53':
  - type: text
    content: 'The foreigner must treat them as workers hired on a yearly basis. You must not allow a foreigner to treat any of your fellow Israelites harshly. '
  '54':
  - type: text
    content: 'If any Israelites have not been bought back by the time the Year of Jubilee arrives, they and their children must be set free at that time. '
  '55':
  - type: text
    content: 'For the people of Israel belong to me. They are my servants, whom I brought out of the land of Egypt. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: 'But you may eat whatever the land produces on its own during its Sabbath. This applies to you, your male and female servants, your hired workers, and the temporary residents who live with you. '
  '7':
  - type: text
    content: Your livestock and the wild animals in your land will also be allowed to eat what the land produces.
  - type: heading
    content: The Year of Jubilee
  '8':
  - type: text
    content: '“In addition, you must count off seven Sabbath years, seven sets of seven years, adding up to forty-nine years in all. '
  '9':
  - type: text
    content: Then on the Day of Atonement in the fiftieth year,
  - type: note
    content: Hebrew on the tenth day of the seventh month, on the Day of Atonement; see 23:27a and the note there.
  - type: text
    content: ' blow the ram’s horn loud and long throughout the land. '
