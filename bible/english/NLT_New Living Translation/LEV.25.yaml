document_id: LEV.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sabbath Year
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'While Moses was on Mount Sinai, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Give the following instructions to the people of Israel. When you have entered the land I am giving you, the land itself must observe a Sabbath rest before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'every seventh year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For six years you may plant your fields and prune your vineyards and harvest your crops, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but during the seventh year the land must have a Sabbath year of complete rest. It is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Sabbath. Do not plant your fields or prune your vineyards during that year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And don’t store away the crops that grow on their own or gather the grapes from your unpruned vines. The land must have a year of complete rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But you may eat whatever the land produces on its own during its Sabbath. This applies to you, your male and female servants, your hired workers, and the temporary residents who live with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your livestock and the wild animals in your land will also be allowed to eat what the land produces.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Year of Jubilee
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“In addition, you must count off seven Sabbath years, seven sets of seven years, adding up to forty-nine years in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then on the Day of Atonement in the fiftieth year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the tenth day of the seventh month, on the Day of Atonement; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 23:27a and the note there.
    marker-yv: yv-n
  - type: text
    text: ' blow the ram’s horn loud and long throughout the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Set this year apart as holy, a time to proclaim freedom throughout the land for all who live there. It will be a jubilee year for you, when each of you may return to the land that belonged to your ancestors and return to your own clan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This fiftieth year will be a jubilee for you. During that year you must not plant your fields or store away any of the crops that grow on their own, and don’t gather the grapes from your unpruned vines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It will be a jubilee year for you, and you must keep it holy. But you may eat whatever the land produces on its own. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: In the Year of Jubilee each of you may return to the land that belonged to your ancestors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“When you make an agreement with your neighbor to buy or sell property, you must not take advantage of each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When you buy land from your neighbor, the price you pay must be based on the number of years since the last jubilee. The seller must set the price by taking into account the number of years remaining until the next Year of Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The more years until the next jubilee, the higher the price; the fewer years, the lower the price. After all, the person selling the land is actually selling you a certain number of harvests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Show your fear of God by not taking advantage of each other. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“If you want to live securely in the land, follow my decrees and obey my regulations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the land will yield large crops, and you will eat your fill and live securely in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But you might ask, ‘What will we eat during the seventh year, since we are not allowed to plant or harvest crops that year?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Be assured that I will send my blessing for you in the sixth year, so the land will produce a crop large enough for three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When you plant your fields in the eighth year, you will still be eating from the large crop of the sixth year. In fact, you will still be eating from that large crop when the new crop is harvested in the ninth year.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Redemption of Property
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “The land must never be sold on a permanent basis, for the land belongs to me. You are only foreigners and tenant farmers working for me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“With every purchase of land you must grant the seller the right to buy it back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If one of your fellow Israelites falls into poverty and is forced to sell some family land, then a close relative should buy it back for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'If there is no close relative to buy the land, but the person who sold it gets enough money to buy it back, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'he then has the right to redeem it from the one who bought it. The price of the land will be discounted according to the number of years until the next Year of Jubilee. In this way the original owner can then return to the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But if the original owner cannot afford to buy back the land, it will remain with the new owner until the next Year of Jubilee. In the jubilee year, the land must be returned to the original owners so they can return to their family land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Anyone who sells a house inside a walled town has the right to buy it back for a full year after its sale. During that year, the seller retains the right to buy it back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But if it is not bought back within a year, the sale of the house within the walled town cannot be reversed. It will become the permanent property of the buyer. It will not be returned to the original owner in the Year of Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But a house in a village—a settlement without fortified walls—will be treated like property in the countryside. Such a house may be bought back at any time, and it must be returned to the original owner in the Year of Jubilee.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“The Levites always have the right to buy back a house they have sold within the towns allotted to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And any property that is sold by the Levites—all houses within the Levitical towns—must be returned in the Year of Jubilee. After all, the houses in the towns reserved for the Levites are the only property they own in all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The open pastureland around the Levitical towns may never be sold. It is their permanent possession.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Redemption of the Poor and Enslaved
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“If one of your fellow Israelites falls into poverty and cannot support himself, support him as you would a foreigner or a temporary resident and allow him to live with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Do not charge interest or make a profit at his expense. Instead, show your fear of God by letting him live with you as your relative. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Remember, do not charge interest on money you lend him or make a profit on food you sell him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who brought you out of the land of Egypt to give you the land of Canaan and to be your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“If one of your fellow Israelites falls into poverty and is forced to sell himself to you, do not treat him as a slave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Treat him instead as a hired worker or as a temporary resident who lives with you, and he will serve you only until the Year of Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'At that time he and his children will no longer be obligated to you, and they will return to their clans and go back to the land originally allotted to their ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The people of Israel are my servants, whom I brought out of the land of Egypt, so they must never be sold as slaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Show your fear of God by not treating them harshly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“However, you may purchase male and female slaves from among the nations around you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'You may also purchase the children of temporary residents who live among you, including those who have been born in your land. You may treat them as your property, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: passing them on to your children as a permanent inheritance. You may treat them as slaves, but you must never treat your fellow Israelites this way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '“Suppose a foreigner or temporary resident becomes rich while living among you. If any of your fellow Israelites fall into poverty and are forced to sell themselves to such a foreigner or to a member of his family, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'they still retain the right to be bought back, even after they have been purchased. They may be bought back by a brother, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'an uncle, or a cousin. In fact, anyone from the extended family may buy them back. They may also redeem themselves if they have prospered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'They will negotiate the price of their freedom with the person who bought them. The price will be based on the number of years from the time they were sold until the next Year of Jubilee—whatever it would cost to hire a worker for that period of time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'If many years still remain until the jubilee, they will repay the proper proportion of what they received when they sold themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'If only a few years remain until the Year of Jubilee, they will repay a small amount for their redemption. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'The foreigner must treat them as workers hired on a yearly basis. You must not allow a foreigner to treat any of your fellow Israelites harshly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'If any Israelites have not been bought back by the time the Year of Jubilee arrives, they and their children must be set free at that time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'For the people of Israel belong to me. They are my servants, whom I brought out of the land of Egypt. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
