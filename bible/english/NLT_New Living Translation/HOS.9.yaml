document_id: HOS.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hosea Announces Israel’s Punishment
  - type: text
    content: O people of Israel,
  - type: text
    content: do not rejoice as other nations do.
  - type: text
    content: For you have been unfaithful to your God,
  - type: text
    content: hiring yourselves out like prostitutes,
  - type: text
    content: worshiping other gods on every threshing floor.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “O Israel, when I first found you,'
  - type: text
    content: it was like finding fresh grapes in the desert.
  - type: text
    content: When I saw your ancestors,
  - type: text
    content: it was like seeing the first ripe figs of the season.
  - type: text
    content: But then they deserted me for Baal-peor,
  - type: text
    content: giving themselves to that shameful idol.
  - type: text
    content: Soon they became vile,
  - type: text
    content: as vile as the god they worshiped.
  '11':
  - type: text
    content: The glory of Israel will fly away like a bird,
  - type: text
    content: for your children will not be born
  - type: text
    content: or grow in the womb
  - type: text
    content: or even be conceived.
  '12':
  - type: text
    content: Even if you do have children who grow up,
  - type: text
    content: I will take them from you.
  - type: text
    content: It will be a terrible day when I turn away
  - type: text
    content: and leave you alone.
  '13':
  - type: text
    content: I have watched Israel become as beautiful as Tyre.
  - type: text
    content: But now Israel will bring out her children for slaughter.”
  '14':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', what should I request for your people?'
  - type: text
    content: I will ask for wombs that don’t give birth
  - type: text
    content: and breasts that give no milk.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “All their wickedness began at Gilgal;'
  - type: text
    content: there I began to hate them.
  - type: text
    content: I will drive them from my land
  - type: text
    content: because of their evil actions.
  - type: text
    content: I will love them no more
  - type: text
    content: because all their leaders are rebels.
  '16':
  - type: text
    content: The people of Israel are struck down.
  - type: text
    content: Their roots are dried up,
  - type: text
    content: and they will bear no more fruit.
  - type: text
    content: And if they give birth,
  - type: text
    content: I will slaughter their beloved children.”
  '17':
  - type: text
    content: My God will reject the people of Israel
  - type: text
    content: because they will not listen or obey.
  - type: text
    content: They will be wanderers,
  - type: text
    content: homeless among the nations.
  '2':
  - type: text
    content: So now your harvests will be too small to feed you.
  - type: text
    content: There will be no grapes for making new wine.
  '3':
  - type: text
    content: 'You may no longer stay here in the '
  - type: text
    content: Lord
  - type: text
    content: ’s land.
  - type: text
    content: Instead, you will return to Egypt,
  - type: text
    content: and in Assyria you will eat food
  - type: text
    content: that is ceremonially unclean.
  '4':
  - type: text
    content: 'There you will make no offerings of wine to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: None of your sacrifices there will please him.
  - type: text
    content: They will be unclean, like food touched by a person in mourning.
  - type: text
    content: All who present such sacrifices will be defiled.
  - type: text
    content: They may eat this food themselves,
  - type: text
    content: 'but they may not offer it to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: What then will you do on festival days?
  - type: text
    content: 'How will you observe the '
  - type: text
    content: Lord
  - type: text
    content: ’s festivals?
  '6':
  - type: text
    content: Even if you escape destruction from Assyria,
  - type: text
    content: Egypt will conquer you, and Memphis
  - type: note
    content: Memphis was the capital of northern Egypt.
  - type: text
    content: ' will bury you.'
  - type: text
    content: Nettles will take over your treasures of silver;
  - type: text
    content: thistles will invade your ruined homes.
  '7':
  - type: text
    content: The time of Israel’s punishment has come;
  - type: text
    content: the day of payment is here.
  - type: text
    content: Soon Israel will know this all too well.
  - type: text
    content: Because of your great sin and hostility,
  - type: text
    content: you say, “The prophets are crazy
  - type: text
    content: and the inspired men are fools!”
  '8':
  - type: text
    content: The prophet is a watchman over Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 9:11, 13, 16.
  - type: text
    content: ' for my God,'
  - type: text
    content: yet traps are laid for him wherever he goes.
  - type: text
    content: He faces hostility even in the house of God.
  '9':
  - type: text
    content: The things my people do are as depraved
  - type: text
    content: as what they did in Gibeah long ago.
  - type: text
    content: God will not forget.
  - type: text
    content: He will surely punish them for their sins.
