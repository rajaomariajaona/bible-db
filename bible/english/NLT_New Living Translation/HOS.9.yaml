document_id: HOS.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hosea Announces Israel’s Punishment
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O people of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not rejoice as other nations do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have been unfaithful to your God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hiring yourselves out like prostitutes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worshiping other gods on every threshing floor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, “O Israel, when I first found you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like finding fresh grapes in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I saw your ancestors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like seeing the first ripe figs of the season.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But then they deserted me for Baal-peor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: giving themselves to that shameful idol.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon they became vile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as vile as the god they worshiped.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The glory of Israel will fly away like a bird,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your children will not be born
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or grow in the womb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or even be conceived.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Even if you do have children who grow up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will take them from you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be a terrible day when I turn away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave you alone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I have watched Israel become as beautiful as Tyre.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But now Israel will bring out her children for slaughter.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what should I request for your people?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will ask for wombs that don’t give birth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and breasts that give no milk.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, “All their wickedness began at Gilgal;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there I began to hate them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will drive them from my land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of their evil actions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will love them no more
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because all their leaders are rebels.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The people of Israel are struck down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their roots are dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will bear no more fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if they give birth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will slaughter their beloved children.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: My God will reject the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they will not listen or obey.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be wanderers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: homeless among the nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So now your harvests will be too small to feed you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There will be no grapes for making new wine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You may no longer stay here in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Instead, you will return to Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and in Assyria you will eat food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is ceremonially unclean.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'There you will make no offerings of wine to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None of your sacrifices there will please him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be unclean, like food touched by a person in mourning.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who present such sacrifices will be defiled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They may eat this food themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but they may not offer it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: What then will you do on festival days?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How will you observe the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s festivals?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Even if you escape destruction from Assyria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt will conquer you, and Memphis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Memphis was the capital of northern Egypt.
      marker-yv: yv-n
    - type: text
      text: ' will bury you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nettles will take over your treasures of silver;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thistles will invade your ruined homes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The time of Israel’s punishment has come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the day of payment is here.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Soon Israel will know this all too well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your great sin and hostility,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you say, “The prophets are crazy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the inspired men are fools!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The prophet is a watchman over Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 9:11, 13, 16.
      marker-yv: yv-n
    - type: text
      text: ' for my God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet traps are laid for him wherever he goes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He faces hostility even in the house of God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The things my people do are as depraved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as what they did in Gibeah long ago.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will not forget.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will surely punish them for their sins.
