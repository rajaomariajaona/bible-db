document_id: NUM.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Second Passover
  - type: text
    content: 'A year after Israel’s departure from Egypt, the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the wilderness of Sinai. In the first month'
  - type: note
    content: The first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April.
  - type: text
    content: ' of that year he said, '
  '10':
  - type: text
    content: '“Give the following instructions to the people of Israel: If any of the people now or in future generations are ceremonially unclean at Passover time because of touching a dead body, or if they are on a journey and cannot be present at the ceremony, they may still celebrate the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover. '
  '11':
  - type: text
    content: They must offer the Passover sacrifice one month later, at twilight on the fourteenth day of the second month.
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late April, May, or early June.
  - type: text
    content: ' They must eat the Passover lamb at that time with bitter salad greens and bread made without yeast. '
  '12':
  - type: text
    content: They must not leave any of the lamb until the next morning, and they must not break any of its bones. They must follow all the normal regulations concerning the Passover.
  '13':
  - type: text
    content: '“But those who neglect to celebrate the Passover at the regular time, even though they are ceremonially clean and not away on a trip, will be cut off from the community of Israel. If they fail to present the '
  - type: text
    content: Lord
  - type: text
    content: '’s offering at the proper time, they will suffer the consequences of their guilt. '
  '14':
  - type: text
    content: 'And if foreigners living among you want to celebrate the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', they must follow these same decrees and regulations. The same laws apply both to native-born Israelites and to the foreigners living among you.”'
  - type: heading
    content: The Fiery Cloud
  '15':
  - type: text
    content: On the day the Tabernacle was set up, the cloud covered it.
  - type: note
    content: Hebrew covered the Tabernacle, the Tent of the Testimony.
  - type: text
    content: ' But from evening until morning the cloud over the Tabernacle looked like a pillar of fire. '
  '16':
  - type: text
    content: 'This was the regular pattern—at night the cloud that covered the Tabernacle had the appearance of fire. '
  '17':
  - type: text
    content: 'Whenever the cloud lifted from over the sacred tent, the people of Israel would break camp and follow it. And wherever the cloud settled, the people of Israel would set up camp. '
  '18':
  - type: text
    content: 'In this way, they traveled and camped at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command wherever he told them to go. Then they remained in their camp as long as the cloud stayed over the Tabernacle. '
  '19':
  - type: text
    content: 'If the cloud remained over the Tabernacle for a long time, the Israelites stayed and performed their duty to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: '“Tell the Israelites to celebrate the Passover at the prescribed time, '
  '20':
  - type: text
    content: 'Sometimes the cloud would stay over the Tabernacle for only a few days, so the people would stay for only a few days, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. Then at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command they would break camp and move on. '
  '21':
  - type: text
    content: 'Sometimes the cloud stayed only overnight and lifted the next morning. But day or night, when the cloud lifted, the people broke camp and moved on. '
  '22':
  - type: text
    content: 'Whether the cloud stayed above the Tabernacle for two days, a month, or a year, the people of Israel stayed in camp and did not move on. But as soon as it lifted, they broke camp and moved on. '
  '23':
  - type: text
    content: 'So they camped or traveled at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command, and they did whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' told them through Moses.'
  '3':
  - type: text
    content: at twilight on the fourteenth day of the first month.
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: ' Be sure to follow all my decrees and regulations concerning this celebration.”'
  '4':
  - type: text
    content: 'So Moses told the people to celebrate the Passover '
  '5':
  - type: text
    content: 'in the wilderness of Sinai as twilight fell on the fourteenth day of the month. And they celebrated the festival there, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '6':
  - type: text
    content: 'But some of the men had been ceremonially defiled by touching a dead body, so they could not celebrate the Passover that day. They came to Moses and Aaron that day '
  '7':
  - type: text
    content: 'and said, “We have become ceremonially unclean by touching a dead body. But why should we be prevented from presenting the '
  - type: text
    content: Lord
  - type: text
    content: ’s offering at the proper time with the rest of the Israelites?”
  '8':
  - type: text
    content: 'Moses answered, “Wait here until I have received instructions for you from the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '9':
  - type: text
    content: 'This was the '
  - type: text
    content: Lord
  - type: text
    content: '’s reply to Moses. '
