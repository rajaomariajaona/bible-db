document_id: JDG.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolatry in the Tribe of Dan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in those days Israel had no king. And the tribe of Dan was trying to find a place where they could settle, for they had not yet moved into the land assigned to them when the land was divided among the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the men of Dan chose from their clans five capable warriors from the towns of Zorah and Eshtaol to scout out a land for them to settle in.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When these warriors arrived in the hill country of Ephraim, they came to Micah’s house and spent the night there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'While at Micah’s house, they recognized the young Levite’s accent, so they went over and asked him, “Who brought you here, and what are you doing in this place? Why are you here?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He told them about his agreement with Micah and that he had been hired as Micah’s personal priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then they said, “Ask God whether or not our journey will be successful.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Go in peace,” the priest replied. “For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is watching over your journey.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So the five men went on to the town of Laish, where they noticed the people living carefree lives, like the Sidonians; they were peaceful and secure.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' The people were also wealthy because their land was very fertile. And they lived a great distance from Sidon and had no allies nearby.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the men returned to Zorah and Eshtaol, their relatives asked them, “What did you find?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The men replied, “Come on, let’s attack them! We have seen the land, and it is very good. What are you waiting for? Don’t hesitate to go and take possession of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When you get there, you will find the people living carefree lives. God has given us a spacious and fertile land, lacking in nothing!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So 600 men from the tribe of Dan, armed with weapons of war, set out from Zorah and Eshtaol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They camped at a place west of Kiriath-jearim in Judah, which is called Mahaneh-dan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mahaneh-dan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the camp of Dan.”
    marker-yv: yv-n
  - type: text
    text: ' to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they went on from there into the hill country of Ephraim and came to the house of Micah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The five men who had scouted out the land around Laish explained to the others, “These buildings contain a sacred ephod, as well as some household idols, a carved image, and a cast idol. What do you think you should do?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the five men turned off the road and went over to Micah’s house, where the young Levite lived, and greeted him kindly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As the 600 armed warriors from the tribe of Dan stood at the entrance of the gate, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: the five scouts entered the shrine and removed the carved image, the sacred ephod, the household idols, and the cast idol. Meanwhile, the priest was standing at the gate with the 600 armed warriors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When the priest saw the men carrying all the sacred objects out of Micah’s shrine, he said, “What are you doing?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Be quiet and come with us,” they said. “Be a father and priest to all of us. Isn’t it better to be a priest for an entire tribe and clan of Israel than for the household of just one man?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The young priest was quite happy to go with them, so he took along the sacred ephod, the household idols, and the carved image. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They turned and started on their way again, placing their children, livestock, and possessions in front of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When the people from the tribe of Dan were quite a distance from Micah’s house, the people who lived near Micah came chasing after them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They were shouting as they caught up with them. The men of Dan turned around and said to Micah, “What’s the matter? Why have you called these men together and chased after us like this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “What do you mean, ‘What’s the matter?’” Micah replied. “You’ve taken away all the gods I have made, and my priest, and I have nothing left!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The men of Dan said, “Watch what you say! There are some short-tempered men around here who might get angry and kill you and your family.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So the men of Dan continued on their way. When Micah saw that there were too many of them for him to attack, he turned around and went home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then, with Micah’s idols and his priest, the men of Dan came to the town of Laish, whose people were peaceful and secure. They attacked with swords and burned the town to the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: There was no one to rescue the people, for they lived a great distance from Sidon and had no allies nearby. This happened in the valley near Beth-rehob.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then the people of the tribe of Dan rebuilt the town and lived there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They renamed the town Dan after their ancestor, Israel’s son, but it had originally been called Laish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then they set up the carved image, and they appointed Jonathan son of Gershom, son of Moses,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in an ancient Hebrew tradition, some Greek manuscripts, and Latin Vulgate; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of Manasseh.
    marker-yv: yv-n
  - type: text
    text: ' as their priest. This family continued as priests for the tribe of Dan until the Exile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So Micah’s carved image was worshiped by the tribe of Dan as long as the Tabernacle of God remained at Shiloh.
