document_id: 1SA.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Anoints Saul as King
  - type: text
    content: 'Then Samuel took a flask of olive oil and poured it over Saul’s head. He kissed Saul and said, “I am doing this because the '
  - type: text
    content: Lord
  - type: text
    content: ' has appointed you to be the ruler over Israel, his special possession.'
  - type: note
    content: Greek version reads over Israel. And you will rule over the Lord’s people and save them from their enemies around them. This will be the sign to you that the Lord has appointed you to be leader over his special possession.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'When Saul and his servant arrived at Gibeah, they saw a group of prophets coming toward them. Then the Spirit of God came powerfully upon Saul, and he, too, began to prophesy. '
  '11':
  - type: text
    content: When those who knew Saul heard about it, they exclaimed, “What? Is even Saul a prophet? How did the son of Kish become a prophet?”
  '12':
  - type: text
    content: And one of those standing there said, “Can anyone become a prophet, no matter who his father is?”
  - type: note
    content: Hebrew said, “Who is their father?”
  - type: text
    content: ' So that is the origin of the saying “Is even Saul a prophet?”'
  '13':
  - type: text
    content: 'When Saul had finished prophesying, he went up to the place of worship. '
  '14':
  - type: text
    content: “Where have you been?” Saul’s uncle asked him and his servant.
  - type: text
    content: “We were looking for the donkeys,” Saul replied, “but we couldn’t find them. So we went to Samuel to ask him where they were.”
  '15':
  - type: text
    content: “Oh? And what did he say?” his uncle asked.
  '16':
  - type: text
    content: “He told us that the donkeys had already been found,” Saul replied. But Saul didn’t tell his uncle what Samuel said about the kingdom.
  - type: heading
    content: Saul Is Acclaimed King
  '17':
  - type: text
    content: 'Later Samuel called all the people of Israel to meet before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Mizpah. '
  '18':
  - type: text
    content: 'And he said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has declared: I brought you from Egypt and rescued you from the Egyptians and from all of the nations that were oppressing you. '
  '19':
  - type: text
    content: 'But though I have rescued you from your misery and distress, you have rejected your God today and have said, ‘No, we want a king instead!’ Now, therefore, present yourselves before the '
  - type: text
    content: Lord
  - type: text
    content: ' by tribes and clans.”'
  '2':
  - type: text
    content: When you leave me today, you will see two men beside Rachel’s tomb at Zelzah, on the border of Benjamin. They will tell you that the donkeys have been found and that your father has stopped worrying about them and is now worried about you. He is asking, ‘Have you seen my son?’
  '20':
  - type: text
    content: 'So Samuel brought all the tribes of Israel before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the tribe of Benjamin was chosen by lot. '
  '21':
  - type: text
    content: 'Then he brought each family of the tribe of Benjamin before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the family of the Matrites was chosen. And finally Saul son of Kish was chosen from among them. But when they looked for him, he had disappeared! '
  '22':
  - type: text
    content: 'So they asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Where is he?”'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “He is hiding among the baggage.” '
  '23':
  - type: text
    content: So they found him and brought him out, and he stood head and shoulders above anyone else.
  '24':
  - type: text
    content: 'Then Samuel said to all the people, “This is the man the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen as your king. No one in all Israel is like him!”'
  - type: text
    content: And all the people shouted, “Long live the king!”
  '25':
  - type: text
    content: 'Then Samuel told the people what the rights and duties of a king were. He wrote them down on a scroll and placed it before the '
  - type: text
    content: Lord
  - type: text
    content: . Then Samuel sent the people home again.
  '26':
  - type: text
    content: 'When Saul returned to his home at Gibeah, a group of men whose hearts God had touched went with him. '
  '27':
  - type: text
    content: But there were some scoundrels who complained, “How can this man save us?” And they scorned him and refused to bring him gifts. But Saul ignored them.
  - type: text
    content: '[Nahash, king of the Ammonites, had been grievously oppressing the people of Gad and Reuben who lived east of the Jordan River. He gouged out the right eye of each of the Israelites living there, and he didn’t allow anyone to come and rescue them. In fact, of all the Israelites east of the Jordan, there wasn’t a single one whose right eye Nahash had not gouged out. But there were 7,000 men who had escaped from the Ammonites, and they had settled in Jabesh-gilead.]'
  - type: note
    content: This paragraph, which is not included in the Masoretic Text, is found in Dead Sea Scroll 4QSama.
  '3':
  - type: text
    content: '“When you get to the oak of Tabor, you will see three men coming toward you who are on their way to worship God at Bethel. One will be bringing three young goats, another will have three loaves of bread, and the third will be carrying a wineskin full of wine. '
  '4':
  - type: text
    content: They will greet you and offer you two of the loaves, which you are to accept.
  '5':
  - type: text
    content: “When you arrive at Gibeah of God,
  - type: note
    content: Hebrew Gibeath-haelohim.
  - type: text
    content: ' where the garrison of the Philistines is located, you will meet a band of prophets coming down from the place of worship. They will be playing a harp, a tambourine, a flute, and a lyre, and they will be prophesying. '
  '6':
  - type: text
    content: 'At that time the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' will come powerfully upon you, and you will prophesy with them. You will be changed into a different person. '
  '7':
  - type: text
    content: 'After these signs take place, do what must be done, for God is with you. '
  '8':
  - type: text
    content: Then go down to Gilgal ahead of me. I will join you there to sacrifice burnt offerings and peace offerings. You must wait for seven days until I arrive and give you further instructions.”
  - type: heading
    content: Samuel’s Signs Are Fulfilled
  '9':
  - type: text
    content: 'As Saul turned and started to leave, God gave him a new heart, and all Samuel’s signs were fulfilled that day. '
