document_id: 1SA.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel Anoints Saul as King
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Samuel took a flask of olive oil and poured it over Saul’s head. He kissed Saul and said, “I am doing this because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has appointed you to be the ruler over Israel, his special possession.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'over Israel. And you will rule over the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '’s people and save them from their enemies around them. This will be the sign to you that the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' has appointed you to be leader over his special possession.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Saul and his servant arrived at Gibeah, they saw a group of prophets coming toward them. Then the Spirit of God came powerfully upon Saul, and he, too, began to prophesy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When those who knew Saul heard about it, they exclaimed, “What? Is even Saul a prophet? How did the son of Kish become a prophet?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And one of those standing there said, “Can anyone become a prophet, no matter who his father is?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: said, “Who is their father?”
      marker-yv: yv-n
    - type: text
      text: ' So that is the origin of the saying “Is even Saul a prophet?”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul had finished prophesying, he went up to the place of worship. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Where have you been?” Saul’s uncle asked him and his servant.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We were looking for the donkeys,” Saul replied, “but we couldn’t find them. So we went to Samuel to ask him where they were.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Oh? And what did he say?” his uncle asked.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He told us that the donkeys had already been found,” Saul replied. But Saul didn’t tell his uncle what Samuel said about the kingdom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Is Acclaimed King
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Later Samuel called all the people of Israel to meet before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Mizpah. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, has declared: I brought you from Egypt and rescued you from the Egyptians and from all of the nations that were oppressing you. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But though I have rescued you from your misery and distress, you have rejected your God today and have said, ‘No, we want a king instead!’ Now, therefore, present yourselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by tribes and clans.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When you leave me today, you will see two men beside Rachel’s tomb at Zelzah, on the border of Benjamin. They will tell you that the donkeys have been found and that your father has stopped worrying about them and is now worried about you. He is asking, ‘Have you seen my son?’
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel brought all the tribes of Israel before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the tribe of Benjamin was chosen by lot. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought each family of the tribe of Benjamin before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the family of the Matrites was chosen. And finally Saul son of Kish was chosen from among them. But when they looked for him, he had disappeared! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they asked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Where is he?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “He is hiding among the baggage.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they found him and brought him out, and he stood head and shoulders above anyone else.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel said to all the people, “This is the man the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen as your king. No one in all Israel is like him!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the people shouted, “Long live the king!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel told the people what the rights and duties of a king were. He wrote them down on a scroll and placed it before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then Samuel sent the people home again.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul returned to his home at Gibeah, a group of men whose hearts God had touched went with him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But there were some scoundrels who complained, “How can this man save us?” And they scorned him and refused to bring him gifts. But Saul ignored them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Nahash, king of the Ammonites, had been grievously oppressing the people of Gad and Reuben who lived east of the Jordan River. He gouged out the right eye of each of the Israelites living there, and he didn’t allow anyone to come and rescue them. In fact, of all the Israelites east of the Jordan, there wasn’t a single one whose right eye Nahash had not gouged out. But there were 7,000 men who had escaped from the Ammonites, and they had settled in Jabesh-gilead.]'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This paragraph, which is not included in the Masoretic Text, is found in Dead Sea Scroll 4QSam
        - type: usfm
          marker: sup
          children:
          - type: text
            text: a
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you get to the oak of Tabor, you will see three men coming toward you who are on their way to worship God at Bethel. One will be bringing three young goats, another will have three loaves of bread, and the third will be carrying a wineskin full of wine. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will greet you and offer you two of the loaves, which you are to accept.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When you arrive at Gibeah of God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gibeath-haelohim.
      marker-yv: yv-n
    - type: text
      text: ' where the garrison of the Philistines is located, you will meet a band of prophets coming down from the place of worship. They will be playing a harp, a tambourine, a flute, and a lyre, and they will be prophesying. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will come powerfully upon you, and you will prophesy with them. You will be changed into a different person. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these signs take place, do what must be done, for God is with you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then go down to Gilgal ahead of me. I will join you there to sacrifice burnt offerings and peace offerings. You must wait for seven days until I arrive and give you further instructions.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel’s Signs Are Fulfilled
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As Saul turned and started to leave, God gave him a new heart, and all Samuel’s signs were fulfilled that day. '
