document_id: 2SA.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Absalom’s Defeat and Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David now mustered the men who were with him and appointed generals and captains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: appointed commanders of thousands and commanders of hundreds.
    marker-yv: yv-n
  - type: text
    text: ' to lead them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He sent the troops out in three groups, placing one group under Joab, one under Joab’s brother Abishai son of Zeruiah, and one under Ittai, the man from Gath. The king told his troops, “I am going out with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But his men objected strongly. “You must not go,” they urged. “If we have to turn and run—and even if half of us die—it will make no difference to Absalom’s troops; they will be looking only for you. You are worth 10,000 of us,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in two Hebrew manuscripts and some Greek and Latin manuscripts; most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Now there are 10,000 like us.
    marker-yv: yv-n
  - type: text
    text: ' and it is better that you stay here in the town and send help if we need it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “If you think that’s the best plan, I’ll do it,” the king answered. So he stood alongside the gate of the town as all the troops marched out in groups of hundreds and of thousands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the king gave this command to Joab, Abishai, and Ittai: “For my sake, deal gently with young Absalom.” And all the troops heard the king give this order to his commanders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the battle began in the forest of Ephraim, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and the Israelite troops were beaten back by David’s men. There was a great slaughter that day, and 20,000 men laid down their lives. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The battle raged all across the countryside, and more men died because of the forest than were killed by the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: During the battle, Absalom happened to come upon some of David’s men. He tried to escape on his mule, but as he rode beneath the thick branches of a great tree, his hair
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: his head.
    marker-yv: yv-n
  - type: text
    text: ' got caught in the tree. His mule kept going and left him dangling in the air. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: One of David’s men saw what had happened and told Joab, “I saw Absalom dangling from a great tree.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What?” Joab demanded. “You saw him there and didn’t kill him? I would have rewarded you with ten pieces of silver
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 [shekels] of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 4 ounces or 114 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' and a hero’s belt!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I would not kill the king’s son for even a thousand pieces of silver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,000 [shekels] of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 25 pounds or 11.4 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: '” the man replied to Joab. “We all heard the king say to you and Abishai and Ittai, ‘For my sake, please spare young Absalom.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And if I had betrayed the king by killing his son—and the king would certainly find out who did it—you yourself would be the first to abandon me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Enough of this nonsense,” Joab said. Then he took three daggers and plunged them into Absalom’s heart as he dangled, still alive, in the great tree. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ten of Joab’s young armor bearers then surrounded Absalom and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Joab blew the ram’s horn, and his men returned from chasing the army of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They threw Absalom’s body into a deep pit in the forest and piled a great heap of stones over it. And all Israel fled to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: During his lifetime, Absalom had built a monument to himself in the King’s Valley, for he said, “I have no son to carry on my name.” He named the monument after himself, and it is known as Absalom’s Monument to this day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Mourns Absalom’s Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Zadok’s son Ahimaaz said, “Let me run to the king with the good news that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rescued him from his enemies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “No,” Joab told him, “it wouldn’t be good news to the king that his son is dead. You can be my messenger another time, but not today.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Joab said to a man from Ethiopia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'from Cush; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 18:23, 31, 32.
    marker-yv: yv-n
  - type: text
    text: ' “Go tell the king what you have seen.” The man bowed and ran off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But Ahimaaz continued to plead with Joab, “Whatever happens, please let me go, too.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Why should you go, my son?” Joab replied. “There will be no reward for your news.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Yes, but let me go anyway,” he begged.
- type: usfm
  marker: p
  children:
  - type: text
    text: Joab finally said, “All right, go ahead.” So Ahimaaz took the less demanding route by way of the plain and ran to Mahanaim ahead of the Ethiopian.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'While David was sitting between the inner and outer gates of the town, the watchman climbed to the roof of the gateway by the wall. As he looked, he saw a lone man running toward them. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He shouted the news down to David, and the king replied, “If he is alone, he has news.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'As the messenger came closer, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: the watchman saw another man running toward them. He shouted down, “Here comes another one!”
- type: usfm
  marker: p
  children:
  - type: text
    text: The king replied, “He also will have news.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “The first man runs like Ahimaaz son of Zadok,” the watchman said.
- type: usfm
  marker: p
  children:
  - type: text
    text: “He is a good man and comes with good news,” the king replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Ahimaaz cried out to the king, “Everything is all right!” He bowed before the king with his face to the ground and said, “Praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who has handed over the rebels who dared to stand against my lord the king.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “What about young Absalom?” the king demanded. “Is he all right?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Ahimaaz replied, “When Joab told me to come, there was a lot of commotion. But I didn’t know what was happening.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “Wait here,” the king told him. So Ahimaaz stepped aside.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the man from Ethiopia arrived and said, “I have good news for my lord the king. Today the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rescued you from all those who rebelled against you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “What about young Absalom?” the king demanded. “Is he all right?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And the Ethiopian replied, “May all of your enemies, my lord the king, both now and in the future, share the fate of that young man!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 18:33 is numbered 19:1 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: The king was overcome with emotion. He went up to the room over the gateway and burst into tears. And as he went, he cried, “O my son Absalom! My son, my son Absalom! If only I had died instead of you! O Absalom, my son, my son.”
