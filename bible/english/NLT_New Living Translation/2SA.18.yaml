document_id: 2SA.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Absalom’s Defeat and Death
  - type: text
    content: David now mustered the men who were with him and appointed generals and captains
  - type: note
    content: Hebrew appointed commanders of thousands and commanders of hundreds.
  - type: text
    content: ' to lead them. '
  '10':
  - type: text
    content: One of David’s men saw what had happened and told Joab, “I saw Absalom dangling from a great tree.”
  '11':
  - type: text
    content: “What?” Joab demanded. “You saw him there and didn’t kill him? I would have rewarded you with ten pieces of silver
  - type: note
    content: Hebrew 10 [shekels] of silver, about 4 ounces or 114 grams in weight.
  - type: text
    content: ' and a hero’s belt!”'
  '12':
  - type: text
    content: “I would not kill the king’s son for even a thousand pieces of silver,
  - type: note
    content: Hebrew 1,000 [shekels] of silver, about 25 pounds or 11.4 kilograms in weight.
  - type: text
    content: '” the man replied to Joab. “We all heard the king say to you and Abishai and Ittai, ‘For my sake, please spare young Absalom.’ '
  '13':
  - type: text
    content: And if I had betrayed the king by killing his son—and the king would certainly find out who did it—you yourself would be the first to abandon me.”
  '14':
  - type: text
    content: '“Enough of this nonsense,” Joab said. Then he took three daggers and plunged them into Absalom’s heart as he dangled, still alive, in the great tree. '
  '15':
  - type: text
    content: Ten of Joab’s young armor bearers then surrounded Absalom and killed him.
  '16':
  - type: text
    content: 'Then Joab blew the ram’s horn, and his men returned from chasing the army of Israel. '
  '17':
  - type: text
    content: They threw Absalom’s body into a deep pit in the forest and piled a great heap of stones over it. And all Israel fled to their homes.
  '18':
  - type: text
    content: During his lifetime, Absalom had built a monument to himself in the King’s Valley, for he said, “I have no son to carry on my name.” He named the monument after himself, and it is known as Absalom’s Monument to this day.
  - type: heading
    content: David Mourns Absalom’s Death
  '19':
  - type: text
    content: 'Then Zadok’s son Ahimaaz said, “Let me run to the king with the good news that the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued him from his enemies.”'
  '2':
  - type: text
    content: He sent the troops out in three groups, placing one group under Joab, one under Joab’s brother Abishai son of Zeruiah, and one under Ittai, the man from Gath. The king told his troops, “I am going out with you.”
  '20':
  - type: text
    content: “No,” Joab told him, “it wouldn’t be good news to the king that his son is dead. You can be my messenger another time, but not today.”
  '21':
  - type: text
    content: Then Joab said to a man from Ethiopia,
  - type: note
    content: Hebrew from Cush; similarly in 18:23, 31, 32.
  - type: text
    content: ' “Go tell the king what you have seen.” The man bowed and ran off.'
  '22':
  - type: text
    content: But Ahimaaz continued to plead with Joab, “Whatever happens, please let me go, too.”
  - type: text
    content: “Why should you go, my son?” Joab replied. “There will be no reward for your news.”
  '23':
  - type: text
    content: “Yes, but let me go anyway,” he begged.
  - type: text
    content: Joab finally said, “All right, go ahead.” So Ahimaaz took the less demanding route by way of the plain and ran to Mahanaim ahead of the Ethiopian.
  '24':
  - type: text
    content: 'While David was sitting between the inner and outer gates of the town, the watchman climbed to the roof of the gateway by the wall. As he looked, he saw a lone man running toward them. '
  '25':
  - type: text
    content: He shouted the news down to David, and the king replied, “If he is alone, he has news.”
  - type: text
    content: 'As the messenger came closer, '
  '26':
  - type: text
    content: the watchman saw another man running toward them. He shouted down, “Here comes another one!”
  - type: text
    content: The king replied, “He also will have news.”
  '27':
  - type: text
    content: “The first man runs like Ahimaaz son of Zadok,” the watchman said.
  - type: text
    content: “He is a good man and comes with good news,” the king replied.
  '28':
  - type: text
    content: 'Then Ahimaaz cried out to the king, “Everything is all right!” He bowed before the king with his face to the ground and said, “Praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has handed over the rebels who dared to stand against my lord the king.”'
  '29':
  - type: text
    content: “What about young Absalom?” the king demanded. “Is he all right?”
  - type: text
    content: Ahimaaz replied, “When Joab told me to come, there was a lot of commotion. But I didn’t know what was happening.”
  '3':
  - type: text
    content: But his men objected strongly. “You must not go,” they urged. “If we have to turn and run—and even if half of us die—it will make no difference to Absalom’s troops; they will be looking only for you. You are worth 10,000 of us,
  - type: note
    content: As in two Hebrew manuscripts and some Greek and Latin manuscripts; most Hebrew manuscripts read Now there are 10,000 like us.
  - type: text
    content: ' and it is better that you stay here in the town and send help if we need it.”'
  '30':
  - type: text
    content: “Wait here,” the king told him. So Ahimaaz stepped aside.
  '31':
  - type: text
    content: 'Then the man from Ethiopia arrived and said, “I have good news for my lord the king. Today the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued you from all those who rebelled against you.”'
  '32':
  - type: text
    content: “What about young Absalom?” the king demanded. “Is he all right?”
  - type: text
    content: And the Ethiopian replied, “May all of your enemies, my lord the king, both now and in the future, share the fate of that young man!”
  '33':
  - type: text
    content: ' '
  - type: note
    content: Verse 18:33 is numbered 19:1 in Hebrew text.
  - type: text
    content: The king was overcome with emotion. He went up to the room over the gateway and burst into tears. And as he went, he cried, “O my son Absalom! My son, my son Absalom! If only I had died instead of you! O Absalom, my son, my son.”
  '4':
  - type: text
    content: “If you think that’s the best plan, I’ll do it,” the king answered. So he stood alongside the gate of the town as all the troops marched out in groups of hundreds and of thousands.
  '5':
  - type: text
    content: 'And the king gave this command to Joab, Abishai, and Ittai: “For my sake, deal gently with young Absalom.” And all the troops heard the king give this order to his commanders.'
  '6':
  - type: text
    content: 'So the battle began in the forest of Ephraim, '
  '7':
  - type: text
    content: 'and the Israelite troops were beaten back by David’s men. There was a great slaughter that day, and 20,000 men laid down their lives. '
  '8':
  - type: text
    content: The battle raged all across the countryside, and more men died because of the forest than were killed by the sword.
  '9':
  - type: text
    content: During the battle, Absalom happened to come upon some of David’s men. He tried to escape on his mule, but as he rode beneath the thick branches of a great tree, his hair
  - type: note
    content: Hebrew his head.
  - type: text
    content: ' got caught in the tree. His mule kept going and left him dangling in the air. '
