document_id: 1TI.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions about Worship
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I urge you, first of all, to pray for all people. Ask God to help them; intercede on their behalf, and give thanks for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pray this way for kings and all who are in authority so that we can live peaceful and quiet lives marked by godliness and dignity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is good and pleases God our Savior, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who wants everyone to be saved and to understand the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For,
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'There is one God and one Mediator who can reconcile God and humanity—the man Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He gave his life to purchase freedom for everyone.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'This is the message God gave to the world at just the right time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And I have been chosen as a preacher and apostle to teach the Gentiles this message about faith and truth. I’m not exaggerating—just telling the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In every place of worship, I want men to pray with holy hands lifted up to God, free from anger and controversy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And I want women to be modest in their appearance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to pray in modest apparel.
    marker-yv: yv-n
  - type: text
    text: ' They should wear decent and appropriate clothing and not draw attention to themselves by the way they fix their hair or by wearing gold or pearls or expensive clothes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For women who claim to be devoted to God should make themselves attractive by the good things they do.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Women should learn quietly and submissively. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I do not let women teach men or have authority over them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: teach men or usurp their authority.
    marker-yv: yv-n
  - type: text
    text: ' Let them listen quietly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For God made Adam first, and afterward he made Eve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it was not Adam who was deceived by Satan. The woman was deceived, and sin was the result. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But women will be saved through childbearing,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'will be saved by accepting their role as mothers, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will be saved by the birth of the Child.
    marker-yv: yv-n
  - type: text
    text: ' assuming they continue to live in faith, love, holiness, and modesty.'
