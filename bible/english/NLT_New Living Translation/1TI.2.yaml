document_id: 1TI.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions about Worship
  - type: text
    content: 'I urge you, first of all, to pray for all people. Ask God to help them; intercede on their behalf, and give thanks for them. '
  '10':
  - type: text
    content: For women who claim to be devoted to God should make themselves attractive by the good things they do.
  '11':
  - type: text
    content: 'Women should learn quietly and submissively. '
  '12':
  - type: text
    content: I do not let women teach men or have authority over them.
  - type: note
    content: Or teach men or usurp their authority.
  - type: text
    content: ' Let them listen quietly. '
  '13':
  - type: text
    content: 'For God made Adam first, and afterward he made Eve. '
  '14':
  - type: text
    content: 'And it was not Adam who was deceived by Satan. The woman was deceived, and sin was the result. '
  '15':
  - type: text
    content: But women will be saved through childbearing,
  - type: note
    content: Or will be saved by accepting their role as mothers, or will be saved by the birth of the Child.
  - type: text
    content: ' assuming they continue to live in faith, love, holiness, and modesty.'
  '2':
  - type: text
    content: 'Pray this way for kings and all who are in authority so that we can live peaceful and quiet lives marked by godliness and dignity. '
  '3':
  - type: text
    content: 'This is good and pleases God our Savior, '
  '4':
  - type: text
    content: 'who wants everyone to be saved and to understand the truth. '
  '5':
  - type: text
    content: For,
  - type: text
    content: 'There is one God and one Mediator who can reconcile God and humanity—the man Christ Jesus. '
  '6':
  - type: text
    content: He gave his life to purchase freedom for everyone.
  - type: text
    content: 'This is the message God gave to the world at just the right time. '
  '7':
  - type: text
    content: And I have been chosen as a preacher and apostle to teach the Gentiles this message about faith and truth. I’m not exaggerating—just telling the truth.
  '8':
  - type: text
    content: In every place of worship, I want men to pray with holy hands lifted up to God, free from anger and controversy.
  '9':
  - type: text
    content: And I want women to be modest in their appearance.
  - type: note
    content: Or to pray in modest apparel.
  - type: text
    content: ' They should wear decent and appropriate clothing and not draw attention to themselves by the way they fix their hair or by wearing gold or pearls or expensive clothes. '
