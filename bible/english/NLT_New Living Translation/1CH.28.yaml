document_id: 1CH.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Instructions to Solomon
  - type: text
    content: David summoned all the officials of Israel to Jerusalem—the leaders of the tribes, the commanders of the army divisions, the other generals and captains,
  - type: note
    content: Hebrew the commanders of thousands and commanders of hundreds.
  - type: text
    content: ' the overseers of the royal property and livestock, the palace officials, the mighty men, and all the other brave warriors in the kingdom. '
  '10':
  - type: text
    content: 'So take this seriously. The '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to build a Temple as his sanctuary. Be strong, and do the work.”'
  '11':
  - type: text
    content: 'Then David gave Solomon the plans for the Temple and its surroundings, including the entry room, the storerooms, the upstairs rooms, the inner rooms, and the inner sanctuary—which was the place of atonement. '
  '12':
  - type: text
    content: David also gave Solomon all the plans he had in mind
  - type: note
    content: Or the plans of the spirit that was with him.
  - type: text
    content: ' for the courtyards of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, the outside rooms, the treasuries, and the rooms for the gifts dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'The king also gave Solomon the instructions concerning the work of the various divisions of priests and Levites in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: . And he gave specifications for the items in the Temple that were to be used for worship.
  '14':
  - type: text
    content: 'David gave instructions regarding how much gold and silver should be used to make the items needed for service. '
  '15':
  - type: text
    content: 'He told Solomon the amount of gold needed for the gold lampstands and lamps, and the amount of silver for the silver lampstands and lamps, depending on how each would be used. '
  '16':
  - type: text
    content: He designated the amount of gold for the table on which the Bread of the Presence would be placed and the amount of silver for other tables.
  '17':
  - type: text
    content: 'David also designated the amount of gold for the solid gold meat hooks used to handle the sacrificial meat and for the basins, pitchers, and dishes, as well as the amount of silver for every dish. '
  '18':
  - type: text
    content: 'He designated the amount of refined gold for the altar of incense. Finally, he gave him a plan for the '
  - type: text
    content: Lord
  - type: text
    content: ’s “chariot”—the gold cherubim
  - type: note
    content: Hebrew for the gold cherub chariot.
  - type: text
    content: ' whose wings were stretched out over the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant. '
  '19':
  - type: text
    content: '“Every part of this plan,” David told Solomon, “was given to me in writing from the hand of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or was written under the direction of the Lord.
  - type: text
    content: ”
  '2':
  - type: text
    content: 'David rose to his feet and said: “My brothers and my people! It was my desire to build a Temple where the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant, God’s footstool, could rest permanently. I made the necessary preparations for building it, '
  '20':
  - type: text
    content: 'Then David continued, “Be strong and courageous, and do the work. Don’t be afraid or discouraged, for the '
  - type: text
    content: Lord
  - type: text
    content: ' God, my God, is with you. He will not fail you or forsake you. He will see to it that all the work related to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' is finished correctly. '
  '21':
  - type: text
    content: The various divisions of priests and Levites will serve in the Temple of God. Others with skills of every kind will volunteer, and the officials and the entire nation are at your command.”
  '3':
  - type: text
    content: but God said to me, ‘You must not build a Temple to honor my name, for you are a warrior and have shed much blood.’
  '4':
  - type: text
    content: '“Yet the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has chosen me from among all my father’s family to be king over Israel forever. For he has chosen the tribe of Judah to rule, and from among the families of Judah he chose my father’s family. And from among my father’s sons the '
  - type: text
    content: Lord
  - type: text
    content: ' was pleased to make me king over all Israel. '
  '5':
  - type: text
    content: 'And from among my sons—for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given me many—he chose Solomon to succeed me on the throne of Israel and to rule over the '
  - type: text
    content: Lord
  - type: text
    content: '’s kingdom. '
  '6':
  - type: text
    content: 'He said to me, ‘Your son Solomon will build my Temple and its courtyards, for I have chosen him as my son, and I will be his father. '
  '7':
  - type: text
    content: And if he continues to obey my commands and regulations as he does now, I will make his kingdom last forever.’
  '8':
  - type: text
    content: '“So now, with God as our witness, and in the sight of all Israel—the '
  - type: text
    content: Lord
  - type: text
    content: '’s assembly—I give you this charge. Be careful to obey all the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, so that you may continue to possess this good land and leave it to your children as a permanent inheritance.'
  '9':
  - type: text
    content: '“And Solomon, my son, learn to know the God of your ancestors intimately. Worship and serve him with your whole heart and a willing mind. For the '
  - type: text
    content: Lord
  - type: text
    content: ' sees every heart and knows every plan and thought. If you seek him, you will find him. But if you forsake him, he will reject you forever. '
