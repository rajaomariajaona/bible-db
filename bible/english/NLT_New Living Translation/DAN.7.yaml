document_id: DAN.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel’s Vision of Four Beasts
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Earlier, during the first year of King Belshazzar’s reign in Babylon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The first year of Belshazzar’s reign (who was co-regent with his father, Nabonidus) was 556 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ' (or perhaps as late as 553 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' Daniel had a dream and saw visions as he lay in his bed. He wrote down the dream, and this is what he saw.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a river of fire was pouring out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flowing from his presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Millions of angels ministered to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: many millions stood to attend him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the court began its session,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the books were opened.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I continued to watch because I could hear the little horn’s boastful speech. I kept watching until the fourth beast was killed and its body was destroyed by fire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The other three beasts had their authority taken from them, but they were allowed to live a while longer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for a season and a time.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As my vision continued that night, I saw someone like a son of man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like a Son of Man.
      marker-yv: yv-n
    - type: text
      text: ' coming with the clouds of heaven. He approached the Ancient One and was led into his presence. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was given authority, honor, and sovereignty over all the nations of the world, so that people of every race and nation and language would obey him. His rule is eternal—it will never end. His kingdom will never be destroyed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Vision Is Explained
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I, Daniel, was troubled by all I had seen, and my visions terrified me. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So I approached one of those standing beside the throne and asked him what it all meant. He explained it to me like this: '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“These four huge beasts represent four kingdoms that will arise from the earth. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But in the end, the holy people of the Most High will be given the kingdom, and they will rule forever and ever.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I wanted to know the true meaning of the fourth beast, the one so different from the others and so terrifying. It had devoured and crushed its victims with iron teeth and bronze claws, trampling their remains beneath its feet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In my vision that night, I, Daniel, saw a great storm churning the surface of a great sea, with strong winds blowing from every direction. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also asked about the ten horns on the fourth beast’s head and the little horn that came up afterward and destroyed three of the other horns. This horn had seemed greater than the others, and it had human eyes and a mouth that was boasting arrogantly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I watched, this horn was waging war against God’s holy people and was defeating them, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: until the Ancient One—the Most High—came and judged in favor of his holy people. Then the time arrived for the holy people to take over the kingdom.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me, “This fourth beast is the fourth world power that will rule the earth. It will be different from all the others. It will devour the whole world, trampling and crushing everything in its path. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Its ten horns are ten kings who will rule that empire. Then another king will arise, different from the other ten, who will subdue three of them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will defy the Most High and oppress the holy people of the Most High. He will try to change their sacred festivals and laws, and they will be placed under his control for a time, times, and half a time.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But then the court will pass judgment, and all his power will be taken away and completely destroyed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the sovereignty, power, and greatness of all the kingdoms under heaven will be given to the holy people of the Most High. His kingdom will last forever, and all rulers will serve and obey him.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That was the end of the vision. I, Daniel, was terrified by my thoughts and my face was pale with fear, but I kept these things to myself.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then four huge beasts came up out of the water, each different from the others.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The first beast was like a lion with eagles’ wings. As I watched, its wings were pulled off, and it was left standing with its two hind feet on the ground, like a human being. And it was given a human mind.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I saw a second beast, and it looked like a bear. It was rearing up on one side, and it had three ribs in its mouth between its teeth. And I heard a voice saying to it, “Get up! Devour the flesh of many people!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the third of these strange beasts appeared, and it looked like a leopard. It had four bird’s wings on its back, and it had four heads. Great authority was given to this beast.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then in my vision that night, I saw a fourth beast—terrifying, dreadful, and very strong. It devoured and crushed its victims with huge iron teeth and trampled their remains beneath its feet. It was different from any of the other beasts, and it had ten horns.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As I was looking at the horns, suddenly another small horn appeared among them. Three of the first horns were torn out by the roots to make room for it. This little horn had eyes like human eyes and a mouth that was boasting arrogantly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I watched as thrones were put in place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Ancient One
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an Ancient of Days; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 7:13, 22.
      marker-yv: yv-n
    - type: text
      text: ' sat down to judge.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His clothing was as white as snow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hair like purest wool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sat on a fiery throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with wheels of blazing fire,
