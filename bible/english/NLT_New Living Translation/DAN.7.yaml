document_id: DAN.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Vision of Four Beasts
  - type: text
    content: Earlier, during the first year of King Belshazzar’s reign in Babylon,
  - type: note
    content: The first year of Belshazzar’s reign (who was co-regent with his father, Nabonidus) was 556 b.c. (or perhaps as late as 553 b.c.).
  - type: text
    content: ' Daniel had a dream and saw visions as he lay in his bed. He wrote down the dream, and this is what he saw.'
  '10':
  - type: text
    content: and a river of fire was pouring out,
  - type: text
    content: flowing from his presence.
  - type: text
    content: Millions of angels ministered to him;
  - type: text
    content: many millions stood to attend him.
  - type: text
    content: Then the court began its session,
  - type: text
    content: and the books were opened.
  '11':
  - type: text
    content: 'I continued to watch because I could hear the little horn’s boastful speech. I kept watching until the fourth beast was killed and its body was destroyed by fire. '
  '12':
  - type: text
    content: The other three beasts had their authority taken from them, but they were allowed to live a while longer.
  - type: note
    content: Aramaic for a season and a time.
  '13':
  - type: text
    content: As my vision continued that night, I saw someone like a son of man
  - type: note
    content: Or like a Son of Man.
  - type: text
    content: ' coming with the clouds of heaven. He approached the Ancient One and was led into his presence. '
  '14':
  - type: text
    content: He was given authority, honor, and sovereignty over all the nations of the world, so that people of every race and nation and language would obey him. His rule is eternal—it will never end. His kingdom will never be destroyed.
  - type: heading
    content: The Vision Is Explained
  '15':
  - type: text
    content: 'I, Daniel, was troubled by all I had seen, and my visions terrified me. '
  '16':
  - type: text
    content: 'So I approached one of those standing beside the throne and asked him what it all meant. He explained it to me like this: '
  '17':
  - type: text
    content: '“These four huge beasts represent four kingdoms that will arise from the earth. '
  '18':
  - type: text
    content: But in the end, the holy people of the Most High will be given the kingdom, and they will rule forever and ever.”
  '19':
  - type: text
    content: 'Then I wanted to know the true meaning of the fourth beast, the one so different from the others and so terrifying. It had devoured and crushed its victims with iron teeth and bronze claws, trampling their remains beneath its feet. '
  '2':
  - type: text
    content: 'In my vision that night, I, Daniel, saw a great storm churning the surface of a great sea, with strong winds blowing from every direction. '
  '20':
  - type: text
    content: 'I also asked about the ten horns on the fourth beast’s head and the little horn that came up afterward and destroyed three of the other horns. This horn had seemed greater than the others, and it had human eyes and a mouth that was boasting arrogantly. '
  '21':
  - type: text
    content: 'As I watched, this horn was waging war against God’s holy people and was defeating them, '
  '22':
  - type: text
    content: until the Ancient One—the Most High—came and judged in favor of his holy people. Then the time arrived for the holy people to take over the kingdom.
  '23':
  - type: text
    content: 'Then he said to me, “This fourth beast is the fourth world power that will rule the earth. It will be different from all the others. It will devour the whole world, trampling and crushing everything in its path. '
  '24':
  - type: text
    content: 'Its ten horns are ten kings who will rule that empire. Then another king will arise, different from the other ten, who will subdue three of them. '
  '25':
  - type: text
    content: He will defy the Most High and oppress the holy people of the Most High. He will try to change their sacred festivals and laws, and they will be placed under his control for a time, times, and half a time.
  '26':
  - type: text
    content: '“But then the court will pass judgment, and all his power will be taken away and completely destroyed. '
  '27':
  - type: text
    content: Then the sovereignty, power, and greatness of all the kingdoms under heaven will be given to the holy people of the Most High. His kingdom will last forever, and all rulers will serve and obey him.”
  '28':
  - type: text
    content: That was the end of the vision. I, Daniel, was terrified by my thoughts and my face was pale with fear, but I kept these things to myself.
  '3':
  - type: text
    content: Then four huge beasts came up out of the water, each different from the others.
  '4':
  - type: text
    content: The first beast was like a lion with eagles’ wings. As I watched, its wings were pulled off, and it was left standing with its two hind feet on the ground, like a human being. And it was given a human mind.
  '5':
  - type: text
    content: Then I saw a second beast, and it looked like a bear. It was rearing up on one side, and it had three ribs in its mouth between its teeth. And I heard a voice saying to it, “Get up! Devour the flesh of many people!”
  '6':
  - type: text
    content: Then the third of these strange beasts appeared, and it looked like a leopard. It had four bird’s wings on its back, and it had four heads. Great authority was given to this beast.
  '7':
  - type: text
    content: Then in my vision that night, I saw a fourth beast—terrifying, dreadful, and very strong. It devoured and crushed its victims with huge iron teeth and trampled their remains beneath its feet. It was different from any of the other beasts, and it had ten horns.
  '8':
  - type: text
    content: As I was looking at the horns, suddenly another small horn appeared among them. Three of the first horns were torn out by the roots to make room for it. This little horn had eyes like human eyes and a mouth that was boasting arrogantly.
  '9':
  - type: text
    content: I watched as thrones were put in place
  - type: text
    content: and the Ancient One
  - type: note
    content: Aramaic an Ancient of Days; also in 7:13, 22.
  - type: text
    content: ' sat down to judge.'
  - type: text
    content: His clothing was as white as snow,
  - type: text
    content: his hair like purest wool.
  - type: text
    content: He sat on a fiery throne
  - type: text
    content: with wheels of blazing fire,
