document_id: PSA.12,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by an eight-stringed instrument.'
  - type: note
    content: Hebrew according to the sheminith.
  - type: text
    content: 'Help, O '
  - type: text
    content: Lord
  - type: text
    content: ', for the godly are fast disappearing!'
  - type: text
    content: The faithful have vanished from the earth!
  '2':
  - type: text
    content: Neighbors lie to each other,
  - type: text
    content: speaking with flattering lips and deceitful hearts.
  '3':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' cut off their flattering lips'
  - type: text
    content: and silence their boastful tongues.
  '4':
  - type: text
    content: They say, “We will lie to our hearts’ content.
  - type: text
    content: Our lips are our own—who can stop us?”
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replies, “I have seen violence done to the helpless,'
  - type: text
    content: and I have heard the groans of the poor.
  - type: text
    content: Now I will rise up to rescue them,
  - type: text
    content: as they have longed for me to do.”
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s promises are pure,
  - type: text
    content: like silver refined in a furnace,
  - type: text
    content: purified seven times over.
  '7':
  - type: text
    content: 'Therefore, '
  - type: text
    content: Lord
  - type: text
    content: ', we know you will protect the oppressed,'
  - type: text
    content: preserving them forever from this lying generation,
  '8':
  - type: text
    content: even though the wicked strut about,
  - type: text
    content: and evil is praised throughout the land.
