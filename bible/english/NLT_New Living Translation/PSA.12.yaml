document_id: PSA.12
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, to be accompanied by an eight-stringed instrument.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: according to the sheminith.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Help, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for the godly are fast disappearing!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The faithful have vanished from the earth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Neighbors lie to each other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: speaking with flattering lips and deceitful hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' cut off their flattering lips'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and silence their boastful tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They say, “We will lie to our hearts’ content.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our lips are our own—who can stop us?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replies, “I have seen violence done to the helpless,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I have heard the groans of the poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I will rise up to rescue them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they have longed for me to do.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s promises are pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like silver refined in a furnace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: purified seven times over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', we know you will protect the oppressed,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: preserving them forever from this lying generation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: even though the wicked strut about,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and evil is praised throughout the land.
