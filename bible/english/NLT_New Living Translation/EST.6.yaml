document_id: EST.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Honors Mordecai
  - type: text
    content: 'That night the king had trouble sleeping, so he ordered an attendant to bring the book of the history of his reign so it could be read to him. '
  '10':
  - type: text
    content: “Excellent!” the king said to Haman. “Quick! Take the robes and my horse, and do just as you have said for Mordecai the Jew, who sits at the gate of the palace. Leave out nothing you have suggested!”
  '11':
  - type: text
    content: 'So Haman took the robes and put them on Mordecai, placed him on the king’s own horse, and led him through the city square, shouting, “This is what the king does for someone he wishes to honor!” '
  '12':
  - type: text
    content: Afterward Mordecai returned to the palace gate, but Haman hurried home dejected and completely humiliated.
  '13':
  - type: text
    content: When Haman told his wife, Zeresh, and all his friends what had happened, his wise advisers and his wife said, “Since Mordecai—this man who has humiliated you—is of Jewish birth, you will never succeed in your plans against him. It will be fatal to continue opposing him.”
  '14':
  - type: text
    content: While they were still talking, the king’s eunuchs arrived and quickly took Haman to the banquet Esther had prepared.
  '2':
  - type: text
    content: In those records he discovered an account of how Mordecai had exposed the plot of Bigthana and Teresh, two of the eunuchs who guarded the door to the king’s private quarters. They had plotted to assassinate King Xerxes.
  '3':
  - type: text
    content: “What reward or recognition did we ever give Mordecai for this?” the king asked.
  - type: text
    content: His attendants replied, “Nothing has been done for him.”
  '4':
  - type: text
    content: “Who is that in the outer court?” the king inquired. As it happened, Haman had just arrived in the outer court of the palace to ask the king to impale Mordecai on the pole he had prepared.
  '5':
  - type: text
    content: So the attendants replied to the king, “Haman is out in the court.”
  - type: text
    content: '“Bring him in,” the king ordered. '
  '6':
  - type: text
    content: So Haman came in, and the king said, “What should I do to honor a man who truly pleases me?”
  - type: text
    content: 'Haman thought to himself, “Whom would the king wish to honor more than me?” '
  '7':
  - type: text
    content: 'So he replied, “If the king wishes to honor someone, '
  '8':
  - type: text
    content: 'he should bring out one of the king’s own royal robes, as well as a horse that the king himself has ridden—one with a royal emblem on its head. '
  '9':
  - type: text
    content: Let the robes and the horse be handed over to one of the king’s most noble officials. And let him see that the man whom the king wishes to honor is dressed in the king’s robes and led through the city square on the king’s horse. Have the official shout as they go, ‘This is what the king does for someone he wishes to honor!’”
