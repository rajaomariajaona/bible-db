document_id: EST.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The King Honors Mordecai
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'That night the king had trouble sleeping, so he ordered an attendant to bring the book of the history of his reign so it could be read to him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In those records he discovered an account of how Mordecai had exposed the plot of Bigthana and Teresh, two of the eunuchs who guarded the door to the king’s private quarters. They had plotted to assassinate King Xerxes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “What reward or recognition did we ever give Mordecai for this?” the king asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: His attendants replied, “Nothing has been done for him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Who is that in the outer court?” the king inquired. As it happened, Haman had just arrived in the outer court of the palace to ask the king to impale Mordecai on the pole he had prepared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So the attendants replied to the king, “Haman is out in the court.”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Bring him in,” the king ordered. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Haman came in, and the king said, “What should I do to honor a man who truly pleases me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Haman thought to himself, “Whom would the king wish to honor more than me?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So he replied, “If the king wishes to honor someone, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'he should bring out one of the king’s own royal robes, as well as a horse that the king himself has ridden—one with a royal emblem on its head. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Let the robes and the horse be handed over to one of the king’s most noble officials. And let him see that the man whom the king wishes to honor is dressed in the king’s robes and led through the city square on the king’s horse. Have the official shout as they go, ‘This is what the king does for someone he wishes to honor!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Excellent!” the king said to Haman. “Quick! Take the robes and my horse, and do just as you have said for Mordecai the Jew, who sits at the gate of the palace. Leave out nothing you have suggested!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Haman took the robes and put them on Mordecai, placed him on the king’s own horse, and led him through the city square, shouting, “This is what the king does for someone he wishes to honor!” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Afterward Mordecai returned to the palace gate, but Haman hurried home dejected and completely humiliated.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When Haman told his wife, Zeresh, and all his friends what had happened, his wise advisers and his wife said, “Since Mordecai—this man who has humiliated you—is of Jewish birth, you will never succeed in your plans against him. It will be fatal to continue opposing him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: While they were still talking, the king’s eunuchs arrived and quickly took Haman to the banquet Esther had prepared.
