- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '38'
- type: text
  text: The family of Pashhur1,247
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '39'
- type: text
  text: The family of Harim1,017
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'These are the Levites who returned from exile:'
- type: text
  text: The families of Jeshua and Kadmiel (descendants of Hodaviah)74
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '41'
- type: text
  text: The singers of the family of Asaph128
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '42'
- type: text
  text: The gatekeepers of the families of Shallum, Ater, Talmon, Akkub, Hatita, and Shobai139
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The descendants of the following Temple servants returned from exile:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ziha, Hasupha, Tabbaoth,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Keros, Siaha, Padon,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Lebanah, Hagabah, Akkub,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Hagab, Shalmai,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in an alternate reading of the Masoretic Text (see also Neh 7:48); the other alternate reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shamlai.
    marker-yv: yv-n
  - type: text
    text: ' Hanan,'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Giddel, Gahar, Reaiah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Rezin, Nekoda, Gazzam,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Uzza, Paseah, Besai,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Asnah, Meunim, Nephusim,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Bakbuk, Hakupha, Harhur,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Bazluth, Mehida, Harsha,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Barkos, Sisera, Temah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Neziah, and Hatipha.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The descendants of these servants of King Solomon returned from exile:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Sotai, Hassophereth, Peruda,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Jaalah, Darkon, Giddel,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Shephatiah, Hattil, Pokereth-hazzebaim, and Ami.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: In all, the Temple servants and the descendants of Solomon’s servants numbered 392.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Another group returned at this time from the towns of Tel-melah, Tel-harsha, Kerub, Addan, and Immer. However, they could not prove that they or their families were descendants of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: This group included the families of Delaiah, Tobiah, and Nekoda—a total of 652 people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Three families of priests—Hobaiah, Hakkoz, and Barzillai—also returned. (This Barzillai had married a woman who was a descendant of Barzillai of Gilead, and he had taken her family name.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'They searched for their names in the genealogical records, but they were not found, so they were disqualified from serving as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'The governor told them not to eat the priests’ share of food from the sacrifices until a priest could consult the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' about the matter by using the Urim and Thummim—the sacred lots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'So a total of 42,360 people returned to Judah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'in addition to 7,337 servants and 200 singers, both men and women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'They took with them 736 horses, 245 mules, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 435 camels, and 6,720 donkeys.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'When they arrived at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in Jerusalem, some of the family leaders made voluntary offerings toward the rebuilding of God’s Temple on its original site, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: and each leader gave as much as he could. The total of their gifts came to 61,000 gold coins,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:69a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '61,000 darics of gold, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 1,100 pounds or 500 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' 6,250 pounds'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:69b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5,000 minas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,000 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver, and 100 robes for the priests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: So the priests, the Levites, the singers, the gatekeepers, the Temple servants, and some of the common people settled in villages near Jerusalem. The rest of the people returned to their own towns throughout Israel.
