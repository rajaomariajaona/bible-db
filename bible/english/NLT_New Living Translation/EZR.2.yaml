  '2':
  - type: text
    content: Their leaders were Zerubbabel, Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai, Bilshan, Mispar, Bigvai, Rehum, and Baanah.
  - type: text
    content: 'This is the number of the men of Israel who returned from exile:'
