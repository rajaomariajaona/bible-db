  '43':
  - type: text
    content: 'The descendants of the following Temple servants returned from exile:'
  - type: text
    content: Ziha, Hasupha, Tabbaoth,
  '44':
  - type: text
    content: Keros, Siaha, Padon,
  '45':
  - type: text
    content: Lebanah, Hagabah, Akkub,
  '46':
  - type: text
    content: Hagab, Shalmai,
  - type: note
    content: As in an alternate reading of the Masoretic Text (see also Neh 7:48); the other alternate reads Shamlai.
  - type: text
    content: ' Hanan,'
  '47':
  - type: text
    content: Giddel, Gahar, Reaiah,
  '48':
  - type: text
    content: Rezin, Nekoda, Gazzam,
  '49':
  - type: text
    content: Uzza, Paseah, Besai,
  '5':
  - type: text
    content: The family of Arah
  - type: text
    content: '775'
  '50':
  - type: text
    content: Asnah, Meunim, Nephusim,
  '51':
  - type: text
    content: Bakbuk, Hakupha, Harhur,
  '52':
  - type: text
    content: Bazluth, Mehida, Harsha,
  '53':
  - type: text
    content: Barkos, Sisera, Temah,
  '54':
  - type: text
    content: Neziah, and Hatipha.
  '55':
  - type: text
    content: 'The descendants of these servants of King Solomon returned from exile:'
  - type: text
    content: Sotai, Hassophereth, Peruda,
  '56':
  - type: text
    content: Jaalah, Darkon, Giddel,
  '57':
  - type: text
    content: Shephatiah, Hattil, Pokereth-hazzebaim, and Ami.
  '58':
  - type: text
    content: In all, the Temple servants and the descendants of Solomon’s servants numbered 392.
  '59':
  - type: text
    content: 'Another group returned at this time from the towns of Tel-melah, Tel-harsha, Kerub, Addan, and Immer. However, they could not prove that they or their families were descendants of Israel. '
  '6':
  - type: text
    content: The family of Pahath-moab (descendants of Jeshua and Joab)
  - type: text
    content: 2,812
  '60':
  - type: text
    content: This group included the families of Delaiah, Tobiah, and Nekoda—a total of 652 people.
  '61':
  - type: text
    content: 'Three families of priests—Hobaiah, Hakkoz, and Barzillai—also returned. (This Barzillai had married a woman who was a descendant of Barzillai of Gilead, and he had taken her family name.) '
  '62':
  - type: text
    content: 'They searched for their names in the genealogical records, but they were not found, so they were disqualified from serving as priests. '
  '63':
  - type: text
    content: 'The governor told them not to eat the priests’ share of food from the sacrifices until a priest could consult the '
  - type: text
    content: Lord
  - type: text
    content: ' about the matter by using the Urim and Thummim—the sacred lots.'
  '64':
  - type: text
    content: 'So a total of 42,360 people returned to Judah, '
  '65':
  - type: text
    content: 'in addition to 7,337 servants and 200 singers, both men and women. '
  '66':
  - type: text
    content: 'They took with them 736 horses, 245 mules, '
  '67':
  - type: text
    content: 435 camels, and 6,720 donkeys.
  '68':
  - type: text
    content: 'When they arrived at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem, some of the family leaders made voluntary offerings toward the rebuilding of God’s Temple on its original site, '
  '69':
  - type: text
    content: and each leader gave as much as he could. The total of their gifts came to 61,000 gold coins,
  - type: note
    content: Hebrew 61,000 darics of gold, about 1,100 pounds or 500 kilograms in weight.
  - type: text
    content: ' 6,250 pounds'
  - type: note
    content: Hebrew 5,000 minas [3,000 kilograms].
  - type: text
    content: ' of silver, and 100 robes for the priests.'
  '7':
  - type: text
    content: The family of Elam
  - type: text
    content: 1,254
  '70':
  - type: text
    content: So the priests, the Levites, the singers, the gatekeepers, the Temple servants, and some of the common people settled in villages near Jerusalem. The rest of the people returned to their own towns throughout Israel.
  '8':
  - type: text
    content: The family of Zattu
  - type: text
    content: '945'
  '9':
