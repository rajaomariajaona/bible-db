  - type: text
    text: Exiles Who Returned with Zerubbabel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Here is the list of the Jewish exiles of the provinces who returned from their captivity. King Nebuchadnezzar had deported them to Babylon, but now they returned to Jerusalem and the other towns in Judah where they originally lived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Their leaders were Zerubbabel, Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai, Bilshan, Mispar, Bigvai, Rehum, and Baanah.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'This is the number of the men of Israel who returned from exile:'
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '3'
- type: text
  text: The family of Parosh2,172
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '4'
- type: text
  text: The family of Shephatiah372
- type: usfm
