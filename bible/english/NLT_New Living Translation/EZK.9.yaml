document_id: EZK.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Slaughter of Idolaters
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' thundered, “Bring on the men appointed to punish the city! Tell them to bring their weapons with them!” '
  '10':
  - type: text
    content: So I will not spare them or have any pity on them. I will fully repay them for all they have done.”
  '11':
  - type: text
    content: Then the man in linen clothing, who carried the writer’s case, reported back and said, “I have done as you commanded.”
  '2':
  - type: text
    content: Six men soon appeared from the upper gate that faces north, each carrying a deadly weapon in his hand. With them was a man dressed in linen, who carried a writer’s case at his side. They all went into the Temple courtyard and stood beside the bronze altar.
  '3':
  - type: text
    content: 'Then the glory of the God of Israel rose up from between the cherubim, where it had rested, and moved to the entrance of the Temple. And the '
  - type: text
    content: Lord
  - type: text
    content: ' called to the man dressed in linen who was carrying the writer’s case. '
  '4':
  - type: text
    content: He said to him, “Walk through the streets of Jerusalem and put a mark on the foreheads of all who weep and sigh because of the detestable sins being committed in their city.”
  '5':
  - type: text
    content: 'Then I heard the '
  - type: text
    content: Lord
  - type: text
    content: ' say to the other men, “Follow him through the city and kill everyone whose forehead is not marked. Show no mercy; have no pity! '
  '6':
  - type: text
    content: Kill them all—old and young, girls and women and little children. But do not touch anyone with the mark. Begin right here at the Temple.” So they began by killing the seventy leaders.
  '7':
  - type: text
    content: '“Defile the Temple!” the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. “Fill its courtyards with corpses. Go!” So they went and began killing throughout the city.'
  '8':
  - type: text
    content: 'While they were out killing, I was all alone. I fell face down on the ground and cried out, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! Will your fury against Jerusalem wipe out everyone left in Israel?”'
  '9':
  - type: text
    content: 'Then he said to me, “The sins of the people of Israel and Judah are very, very great. The entire land is full of murder; the city is filled with injustice. They are saying, ‘The '
  - type: text
    content: 'Lord '
  - type: text
    content: 'doesn’t see it! The '
  - type: text
    content: Lord
  - type: text
    content: ' has abandoned the land!’ '
