document_id: EZK.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Slaughter of Idolaters
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thundered, “Bring on the men appointed to punish the city! Tell them to bring their weapons with them!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Six men soon appeared from the upper gate that faces north, each carrying a deadly weapon in his hand. With them was a man dressed in linen, who carried a writer’s case at his side. They all went into the Temple courtyard and stood beside the bronze altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the glory of the God of Israel rose up from between the cherubim, where it had rested, and moved to the entrance of the Temple. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' called to the man dressed in linen who was carrying the writer’s case. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He said to him, “Walk through the streets of Jerusalem and put a mark on the foreheads of all who weep and sigh because of the detestable sins being committed in their city.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I heard the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' say to the other men, “Follow him through the city and kill everyone whose forehead is not marked. Show no mercy; have no pity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Kill them all—old and young, girls and women and little children. But do not touch anyone with the mark. Begin right here at the Temple.” So they began by killing the seventy leaders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Defile the Temple!” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded. “Fill its courtyards with corpses. Go!” So they went and began killing throughout the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'While they were out killing, I was all alone. I fell face down on the ground and cried out, “O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! Will your fury against Jerusalem wipe out everyone left in Israel?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he said to me, “The sins of the people of Israel and Judah are very, very great. The entire land is full of murder; the city is filled with injustice. They are saying, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'doesn’t see it! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has abandoned the land!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So I will not spare them or have any pity on them. I will fully repay them for all they have done.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then the man in linen clothing, who carried the writer’s case, reported back and said, “I have done as you commanded.”
