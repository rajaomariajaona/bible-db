document_id: GEN.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tower of Babel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At one time all the people of the world spoke the same language and used the same words. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the account of Shem’s family.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Two years after the great flood, when Shem was 100 years old, he became the father of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the ancestor of; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:12, 14, 16, 18, 20, 22, 24.
      marker-yv: yv-n
    - type: text
      text: ' Arphaxad. '
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the birth of this ancestor of; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:13, 15, 17, 19, 21, 23, 25.
      marker-yv: yv-n
    - type: text
      text: ' Arphaxad, Shem lived another 500 years and had other sons and daughters.'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Arphaxad was 35 years old, he became the father of Shelah. '
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Shelah, Arphaxad lived another 403 years and had other sons and daughters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12-13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'When Arphaxad was 135 years old, he became the father of Cainan. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'After the birth of Cainan, Arphaxad lived another 430 years and had other sons and daughters, and then he died. When Cainan was 130 years old, he became the father of Shelah. After the birth of Shelah, Cainan lived another 330 years and had other sons and daughters, and then he died. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Luke 3:35-36.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Shelah was 30 years old, he became the father of Eber. '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Eber, Shelah lived another 403 years and had other sons and daughters.
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Eber was 34 years old, he became the father of Peleg. '
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Peleg, Eber lived another 430 years and had other sons and daughters.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Peleg was 30 years old, he became the father of Reu. '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Reu, Peleg lived another 209 years and had other sons and daughters.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As the people migrated to the east, they found a plain in the land of Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shinar.
      marker-yv: yv-n
    - type: text
      text: ' and settled there.'
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Reu was 32 years old, he became the father of Serug. '
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Serug, Reu lived another 207 years and had other sons and daughters.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Serug was 30 years old, he became the father of Nahor. '
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Nahor, Serug lived another 200 years and had other sons and daughters.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Nahor was 29 years old, he became the father of Terah. '
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After the birth of Terah, Nahor lived another 119 years and had other sons and daughters.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After Terah was 70 years old, he became the father of Abram, Nahor, and Haran.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Terah
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is the account of Terah’s family. Terah was the father of Abram, Nahor, and Haran; and Haran was the father of Lot. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Haran died in Ur of the Chaldeans, the land of his birth, while his father, Terah, was still living. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, Abram and Nahor both married. The name of Abram’s wife was Sarai, and the name of Nahor’s wife was Milcah. (Milcah and her sister Iscah were daughters of Nahor’s brother Haran.) '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They began saying to each other, “Let’s make bricks and harden them with fire.” (In this region bricks were used instead of stone, and tar was used for mortar.) '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But Sarai was unable to become pregnant and had no children.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day Terah took his son Abram, his daughter-in-law Sarai (his son Abram’s wife), and his grandson Lot (his son Haran’s child) and moved away from Ur of the Chaldeans. He was headed for the land of Canaan, but they stopped at Haran and settled there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Terah lived for 205 years
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some ancient versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '145 years; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 11:26 and 12:4.
      marker-yv: yv-n
    - type: text
      text: ' and died while still in Haran.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they said, “Come, let’s build a great city for ourselves with a tower that reaches into the sky. This will make us famous and keep us from being scattered all over the world.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down to look at the city and the tower the people were building. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Look!” he said. “The people are united, and they all speak the same language. After this, nothing they set out to do will be impossible for them! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Come, let’s go down and confuse the people with different languages. Then they won’t be able to understand each other.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that way, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' scattered them all over the world, and they stopped building the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why the city was called Babel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Babylon. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Babel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “confusion.”
      marker-yv: yv-n
    - type: text
      text: ' because that is where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confused the people with different languages. In this way he scattered them all over the world.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Line of Descent from Shem to Abram
    marker-yv: yv-h
