document_id: GEN.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tower of Babel
  - type: text
    content: 'At one time all the people of the world spoke the same language and used the same words. '
  '10':
  - type: text
    content: This is the account of Shem’s family.
  - type: text
    content: Two years after the great flood, when Shem was 100 years old, he became the father of
  - type: note
    content: Or the ancestor of; also in 11:12, 14, 16, 18, 20, 22, 24.
  - type: text
    content: ' Arphaxad. '
  '11':
  - type: text
    content: After the birth of
  - type: note
    content: Or the birth of this ancestor of; also in 11:13, 15, 17, 19, 21, 23, 25.
  - type: text
    content: ' Arphaxad, Shem lived another 500 years and had other sons and daughters.'
  '12':
  - type: text
    content: 'When Arphaxad was 35 years old, he became the father of Shelah. '
  '13':
  - type: text
    content: After the birth of Shelah, Arphaxad lived another 403 years and had other sons and daughters.
  - type: note
    content: Greek version reads 12When Arphaxad was 135 years old, he became the father of Cainan. 13After the birth of Cainan, Arphaxad lived another 430 years and had other sons and daughters, and then he died. When Cainan was 130 years old, he became the father of Shelah. After the birth of Shelah, Cainan lived another 330 years and had other sons and daughters, and then he died. Compare Luke 3:35-36.
  '14':
  - type: text
    content: 'When Shelah was 30 years old, he became the father of Eber. '
  '15':
  - type: text
    content: After the birth of Eber, Shelah lived another 403 years and had other sons and daughters.
  '16':
  - type: text
    content: 'When Eber was 34 years old, he became the father of Peleg. '
  '17':
  - type: text
    content: After the birth of Peleg, Eber lived another 430 years and had other sons and daughters.
  '18':
  - type: text
    content: 'When Peleg was 30 years old, he became the father of Reu. '
  '19':
  - type: text
    content: After the birth of Reu, Peleg lived another 209 years and had other sons and daughters.
  '2':
  - type: text
    content: As the people migrated to the east, they found a plain in the land of Babylonia
  - type: note
    content: Hebrew Shinar.
  - type: text
    content: ' and settled there.'
  '20':
  - type: text
    content: 'When Reu was 32 years old, he became the father of Serug. '
  '21':
  - type: text
    content: After the birth of Serug, Reu lived another 207 years and had other sons and daughters.
  '22':
  - type: text
    content: 'When Serug was 30 years old, he became the father of Nahor. '
  '23':
  - type: text
    content: After the birth of Nahor, Serug lived another 200 years and had other sons and daughters.
  '24':
  - type: text
    content: 'When Nahor was 29 years old, he became the father of Terah. '
  '25':
  - type: text
    content: After the birth of Terah, Nahor lived another 119 years and had other sons and daughters.
  '26':
  - type: text
    content: After Terah was 70 years old, he became the father of Abram, Nahor, and Haran.
  - type: heading
    content: The Family of Terah
  '27':
  - type: text
    content: 'This is the account of Terah’s family. Terah was the father of Abram, Nahor, and Haran; and Haran was the father of Lot. '
  '28':
  - type: text
    content: 'But Haran died in Ur of the Chaldeans, the land of his birth, while his father, Terah, was still living. '
  '29':
  - type: text
    content: 'Meanwhile, Abram and Nahor both married. The name of Abram’s wife was Sarai, and the name of Nahor’s wife was Milcah. (Milcah and her sister Iscah were daughters of Nahor’s brother Haran.) '
  '3':
  - type: text
    content: 'They began saying to each other, “Let’s make bricks and harden them with fire.” (In this region bricks were used instead of stone, and tar was used for mortar.) '
  '30':
  - type: text
    content: But Sarai was unable to become pregnant and had no children.
  '31':
  - type: text
    content: 'One day Terah took his son Abram, his daughter-in-law Sarai (his son Abram’s wife), and his grandson Lot (his son Haran’s child) and moved away from Ur of the Chaldeans. He was headed for the land of Canaan, but they stopped at Haran and settled there. '
  '32':
  - type: text
    content: Terah lived for 205 years
  - type: note
    content: Some ancient versions read 145 years; compare 11:26 and 12:4.
  - type: text
    content: ' and died while still in Haran.'
  '4':
  - type: text
    content: Then they said, “Come, let’s build a great city for ourselves with a tower that reaches into the sky. This will make us famous and keep us from being scattered all over the world.”
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' came down to look at the city and the tower the people were building. '
  '6':
  - type: text
    content: '“Look!” he said. “The people are united, and they all speak the same language. After this, nothing they set out to do will be impossible for them! '
  '7':
  - type: text
    content: Come, let’s go down and confuse the people with different languages. Then they won’t be able to understand each other.”
  '8':
  - type: text
    content: 'In that way, the '
  - type: text
    content: Lord
  - type: text
    content: ' scattered them all over the world, and they stopped building the city. '
  '9':
  - type: text
    content: That is why the city was called Babel,
  - type: note
    content: Or Babylon. Babel sounds like a Hebrew term that means “confusion.”
  - type: text
    content: ' because that is where the '
  - type: text
    content: Lord
  - type: text
    content: ' confused the people with different languages. In this way he scattered them all over the world.'
  - type: heading
    content: The Line of Descent from Shem to Abram
