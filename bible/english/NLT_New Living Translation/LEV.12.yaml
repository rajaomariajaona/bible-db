document_id: LEV.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Purification after Childbirth
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '2':
  - type: text
    content: '“Give the following instructions to the people of Israel. If a woman becomes pregnant and gives birth to a son, she will be ceremonially unclean for seven days, just as she is unclean during her menstrual period. '
  '3':
  - type: text
    content: 'On the eighth day the boy’s foreskin must be circumcised. '
  '4':
  - type: text
    content: 'After waiting thirty-three days, she will be purified from the bleeding of childbirth. During this time of purification, she must not touch anything that is set apart as holy. And she must not enter the sanctuary until her time of purification is over. '
  '5':
  - type: text
    content: If a woman gives birth to a daughter, she will be ceremonially unclean for two weeks, just as she is unclean during her menstrual period. After waiting sixty-six days, she will be purified from the bleeding of childbirth.
  '6':
  - type: text
    content: “When the time of purification is completed for either a son or a daughter, the woman must bring a one-year-old lamb for a burnt offering and a young pigeon or turtledove for a purification offering. She must bring her offerings to the priest at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The priest will then present them to the '
  - type: text
    content: Lord
  - type: text
    content: ' to purify her.'
  - type: note
    content: Or to make atonement for her; also in 12:8.
  - type: text
    content: ' Then she will be ceremonially clean again after her bleeding at childbirth. These are the instructions for a woman after the birth of a son or a daughter.'
  '8':
  - type: text
    content: “If a woman cannot afford to bring a lamb, she must bring two turtledoves or two young pigeons. One will be for the burnt offering and the other for the purification offering. The priest will sacrifice them to purify her, and she will be ceremonially clean.”
