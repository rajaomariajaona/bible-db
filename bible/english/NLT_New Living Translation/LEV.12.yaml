document_id: LEV.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Purification after Childbirth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Give the following instructions to the people of Israel. If a woman becomes pregnant and gives birth to a son, she will be ceremonially unclean for seven days, just as she is unclean during her menstrual period. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On the eighth day the boy’s foreskin must be circumcised. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'After waiting thirty-three days, she will be purified from the bleeding of childbirth. During this time of purification, she must not touch anything that is set apart as holy. And she must not enter the sanctuary until her time of purification is over. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: If a woman gives birth to a daughter, she will be ceremonially unclean for two weeks, just as she is unclean during her menstrual period. After waiting sixty-six days, she will be purified from the bleeding of childbirth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “When the time of purification is completed for either a son or a daughter, the woman must bring a one-year-old lamb for a burnt offering and a young pigeon or turtledove for a purification offering. She must bring her offerings to the priest at the entrance of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The priest will then present them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to purify her.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to make atonement for her; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:8.
      marker-yv: yv-n
    - type: text
      text: ' Then she will be ceremonially clean again after her bleeding at childbirth. These are the instructions for a woman after the birth of a son or a daughter.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “If a woman cannot afford to bring a lamb, she must bring two turtledoves or two young pigeons. One will be for the burnt offering and the other for the purification offering. The priest will sacrifice them to purify her, and she will be ceremonially clean.”
