document_id: HEB.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ Is Our High Priest
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Here is the main point: We have a High Priest who sat down in the place of honor beside the throne of the majestic God in heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: There he ministers in the heavenly Tabernacle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tent; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 8:5.
    marker-yv: yv-n
  - type: text
    text: ' the true place of worship that was built by the Lord and not by human hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And since every high priest is required to offer gifts and sacrifices, our High Priest must make an offering, too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If he were here on earth, he would not even be a priest, since there already are priests who offer the gifts required by the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They serve in a system of worship that is only a copy, a shadow of the real one in heaven. For when Moses was getting ready to build the Tabernacle, God gave him this warning: “Be sure that you make everything according to the pattern I have shown you here on the mountain.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exod 25:40; 26:30.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But now Jesus, our High Priest, has been given a ministry that is far superior to the old priesthood, for he is the one who mediates for us a far better covenant with God, based on better promises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If the first covenant had been faultless, there would have been no need for a second covenant to replace it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But when God found fault with the people, he said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The day is coming, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I will make a new covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the people of Israel and Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: This covenant will not be like the one
- type: usfm
  marker: q2
  children:
  - type: text
    text: I made with their ancestors
- type: usfm
  marker: q1
  children:
  - type: text
    text: when I took them by the hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: and led them out of the land of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They did not remain faithful to my covenant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so I turned my back on them, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But this is the new covenant I will make
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the people of Israel on that day,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: after those days.
    marker-yv: yv-n
  - type: text
    text: ' says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my laws in their minds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will write them on their hearts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be their God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will be my people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And they will not need to teach their neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will they need to teach their relatives,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their brother.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'saying, ‘You should know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’
- type: usfm
  marker: q1
  children:
  - type: text
    text: For everyone, from the least to the greatest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will know me already.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And I will forgive their wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will never again remember their sins.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8-12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer 31:31-34.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When God speaks of a “new” covenant, it means he has made the first one obsolete. It is now out of date and will soon disappear.
