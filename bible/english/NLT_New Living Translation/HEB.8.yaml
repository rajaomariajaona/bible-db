document_id: HEB.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Is Our High Priest
  - type: text
    content: 'Here is the main point: We have a High Priest who sat down in the place of honor beside the throne of the majestic God in heaven. '
  '10':
  - type: text
    content: But this is the new covenant I will make
  - type: text
    content: with the people of Israel on that day,
  - type: note
    content: Greek after those days.
  - type: text
    content: ' says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: I will put my laws in their minds,
  - type: text
    content: and I will write them on their hearts.
  - type: text
    content: I will be their God,
  - type: text
    content: and they will be my people.
  '11':
  - type: text
    content: And they will not need to teach their neighbors,
  - type: text
    content: nor will they need to teach their relatives,
  - type: note
    content: Greek their brother.
  - type: text
    content: 'saying, ‘You should know the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: text
    content: For everyone, from the least to the greatest,
  - type: text
    content: will know me already.
  '12':
  - type: text
    content: And I will forgive their wickedness,
  - type: text
    content: and I will never again remember their sins.”
  - type: note
    content: Jer 31:31-34.
  '13':
  - type: text
    content: When God speaks of a “new” covenant, it means he has made the first one obsolete. It is now out of date and will soon disappear.
  '2':
  - type: text
    content: There he ministers in the heavenly Tabernacle,
  - type: note
    content: Or tent; also in 8:5.
  - type: text
    content: ' the true place of worship that was built by the Lord and not by human hands.'
  '3':
  - type: text
    content: 'And since every high priest is required to offer gifts and sacrifices, our High Priest must make an offering, too. '
  '4':
  - type: text
    content: 'If he were here on earth, he would not even be a priest, since there already are priests who offer the gifts required by the law. '
  '5':
  - type: text
    content: 'They serve in a system of worship that is only a copy, a shadow of the real one in heaven. For when Moses was getting ready to build the Tabernacle, God gave him this warning: “Be sure that you make everything according to the pattern I have shown you here on the mountain.”'
  - type: note
    content: Exod 25:40; 26:30.
  '6':
  - type: text
    content: But now Jesus, our High Priest, has been given a ministry that is far superior to the old priesthood, for he is the one who mediates for us a far better covenant with God, based on better promises.
  '7':
  - type: text
    content: 'If the first covenant had been faultless, there would have been no need for a second covenant to replace it. '
  '8':
  - type: text
    content: 'But when God found fault with the people, he said:'
  - type: text
    content: '“The day is coming, says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when I will make a new covenant
  - type: text
    content: with the people of Israel and Judah.
  '9':
  - type: text
    content: This covenant will not be like the one
  - type: text
    content: I made with their ancestors
  - type: text
    content: when I took them by the hand
  - type: text
    content: and led them out of the land of Egypt.
  - type: text
    content: They did not remain faithful to my covenant,
  - type: text
    content: 'so I turned my back on them, says the '
  - type: text
    content: Lord
  - type: text
    content: .
