type_code: eng
verses:
  '1':
  - type: heading
    content: Book Five (Psalms 107–150)
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '10':
  - type: text
    content: Some sat in darkness and deepest gloom,
  - type: text
    content: imprisoned in iron chains of misery.
  '11':
  - type: text
    content: They rebelled against the words of God,
  - type: text
    content: scorning the counsel of the Most High.
  '12':
  - type: text
    content: That is why he broke them with hard labor;
  - type: text
    content: they fell, and no one was there to help them.
  '13':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', help!” they cried in their trouble,'
  - type: text
    content: and he saved them from their distress.
  '14':
  - type: text
    content: He led them from the darkness and deepest gloom;
  - type: text
    content: he snapped their chains.
  '15':
  - type: text
    content: 'Let them praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for his great love'
  - type: text
    content: and for the wonderful things he has done for them.
  '16':
  - type: text
    content: For he broke down their prison gates of bronze;
  - type: text
    content: he cut apart their bars of iron.
  '17':
  - type: text
    content: Some were fools; they rebelled
  - type: text
    content: and suffered for their sins.
  '18':
  - type: text
    content: They couldn’t stand the thought of food,
  - type: text
    content: and they were knocking on death’s door.
  '19':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', help!” they cried in their trouble,'
  - type: text
    content: and he saved them from their distress.
  '2':
  - type: text
    content: 'Has the '
  - type: text
    content: Lord
  - type: text
    content: ' redeemed you? Then speak out!'
  - type: text
    content: Tell others he has redeemed you from your enemies.
  '20':
  - type: text
    content: He sent out his word and healed them,
  - type: text
    content: snatching them from the door of death.
  '21':
  - type: text
    content: 'Let them praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for his great love'
  - type: text
    content: and for the wonderful things he has done for them.
  '22':
  - type: text
    content: Let them offer sacrifices of thanksgiving
  - type: text
    content: and sing joyfully about his glorious acts.
  '23':
  - type: text
    content: Some went off to sea in ships,
  - type: text
    content: plying the trade routes of the world.
  '24':
  - type: text
    content: 'They, too, observed the '
  - type: text
    content: Lord
  - type: text
    content: ’s power in action,
  - type: text
    content: his impressive works on the deepest seas.
  '25':
  - type: text
    content: He spoke, and the winds rose,
  - type: text
    content: stirring up the waves.
  '26':
  - type: text
    content: Their ships were tossed to the heavens
  - type: text
    content: and plunged again to the depths;
  - type: text
    content: the sailors cringed in terror.
  '27':
  - type: text
    content: They reeled and staggered like drunkards
  - type: text
    content: and were at their wits’ end.
  '28':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', help!” they cried in their trouble,'
  - type: text
    content: and he saved them from their distress.
  '29':
  - type: text
    content: He calmed the storm to a whisper
  - type: text
    content: and stilled the waves.
  '3':
  - type: text
    content: For he has gathered the exiles from many lands,
  - type: text
    content: from east and west,
  - type: text
    content: from north and south.
  - type: note
    content: Hebrew and sea.
  '30':
  - type: text
    content: What a blessing was that stillness
  - type: text
    content: as he brought them safely into harbor!
  '31':
  - type: text
    content: 'Let them praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for his great love'
  - type: text
    content: and for the wonderful things he has done for them.
  '32':
  - type: text
    content: Let them exalt him publicly before the congregation
  - type: text
    content: and before the leaders of the nation.
  '33':
  - type: text
    content: He changes rivers into deserts,
  - type: text
    content: and springs of water into dry, thirsty land.
  '34':
  - type: text
    content: He turns the fruitful land into salty wastelands,
  - type: text
    content: because of the wickedness of those who live there.
  '35':
  - type: text
    content: But he also turns deserts into pools of water,
  - type: text
    content: the dry land into springs of water.
  '36':
  - type: text
    content: He brings the hungry to settle there
  - type: text
    content: and to build their cities.
  '37':
  - type: text
    content: They sow their fields, plant their vineyards,
  - type: text
    content: and harvest their bumper crops.
  '38':
  - type: text
    content: How he blesses them!
  - type: text
    content: They raise large families there,
  - type: text
    content: and their herds of livestock increase.
  '39':
  - type: text
    content: When they decrease in number and become impoverished
  - type: text
    content: through oppression, trouble, and sorrow,
  '4':
  - type: text
    content: Some wandered in the wilderness,
  - type: text
    content: lost and homeless.
  '40':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' pours contempt on their princes,'
  - type: text
    content: causing them to wander in trackless wastelands.
  '41':
  - type: text
    content: But he rescues the poor from trouble
  - type: text
    content: and increases their families like flocks of sheep.
  '42':
  - type: text
    content: The godly will see these things and be glad,
  - type: text
    content: while the wicked are struck silent.
  '43':
  - type: text
    content: Those who are wise will take all this to heart;
  - type: text
    content: 'they will see in our history the faithful love of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: Hungry and thirsty,
  - type: text
    content: they nearly died.
  '6':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', help!” they cried in their trouble,'
  - type: text
    content: and he rescued them from their distress.
  '7':
  - type: text
    content: He led them straight to safety,
  - type: text
    content: to a city where they could live.
  '8':
  - type: text
    content: 'Let them praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for his great love'
  - type: text
    content: and for the wonderful things he has done for them.
  '9':
  - type: text
    content: For he satisfies the thirsty
  - type: text
    content: and fills the hungry with good things.
