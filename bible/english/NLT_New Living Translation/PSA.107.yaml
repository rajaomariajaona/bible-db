document_id: PSA.107,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Book Five
    - type: text
      text: ' (Psalms 107–150)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Some sat in darkness and deepest gloom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: imprisoned in iron chains of misery.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They rebelled against the words of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scorning the counsel of the Most High.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: That is why he broke them with hard labor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fell, and no one was there to help them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help!” they cried in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he saved them from their distress.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He led them from the darkness and deepest gloom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he snapped their chains.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Let them praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his great love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for the wonderful things he has done for them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For he broke down their prison gates of bronze;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he cut apart their bars of iron.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Some were fools; they rebelled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and suffered for their sins.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They couldn’t stand the thought of food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they were knocking on death’s door.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help!” they cried in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he saved them from their distress.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' redeemed you? Then speak out!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell others he has redeemed you from your enemies.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He sent out his word and healed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: snatching them from the door of death.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Let them praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his great love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for the wonderful things he has done for them.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Let them offer sacrifices of thanksgiving
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sing joyfully about his glorious acts.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Some went off to sea in ships,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plying the trade routes of the world.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They, too, observed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s power in action,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his impressive works on the deepest seas.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He spoke, and the winds rose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stirring up the waves.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Their ships were tossed to the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plunged again to the depths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sailors cringed in terror.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: They reeled and staggered like drunkards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and were at their wits’ end.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help!” they cried in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he saved them from their distress.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He calmed the storm to a whisper
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stilled the waves.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For he has gathered the exiles from many lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from east and west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from north and south.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and sea.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: What a blessing was that stillness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he brought them safely into harbor!
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Let them praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his great love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for the wonderful things he has done for them.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Let them exalt him publicly before the congregation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and before the leaders of the nation.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: He changes rivers into deserts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and springs of water into dry, thirsty land.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: He turns the fruitful land into salty wastelands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the wickedness of those who live there.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: But he also turns deserts into pools of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dry land into springs of water.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: He brings the hungry to settle there
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to build their cities.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: They sow their fields, plant their vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and harvest their bumper crops.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: How he blesses them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They raise large families there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their herds of livestock increase.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: When they decrease in number and become impoverished
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through oppression, trouble, and sorrow,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Some wandered in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lost and homeless.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pours contempt on their princes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: causing them to wander in trackless wastelands.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: But he rescues the poor from trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and increases their families like flocks of sheep.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: The godly will see these things and be glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the wicked are struck silent.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Those who are wise will take all this to heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they will see in our history the faithful love of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hungry and thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they nearly died.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help!” they cried in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he rescued them from their distress.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He led them straight to safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a city where they could live.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Let them praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his great love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for the wonderful things he has done for them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For he satisfies the thirsty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fills the hungry with good things.
