document_id: ISA.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Babylon
  - type: text
    content: 'Isaiah son of Amoz received this message concerning the destruction of Babylon:'
  '10':
  - type: text
    content: The heavens will be black above them;
  - type: text
    content: the stars will give no light.
  - type: text
    content: The sun will be dark when it rises,
  - type: text
    content: and the moon will provide no light.
  '11':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will punish the world for its evil'
  - type: text
    content: and the wicked for their sin.
  - type: text
    content: I will crush the arrogance of the proud
  - type: text
    content: and humble the pride of the mighty.
  '12':
  - type: text
    content: I will make people scarcer than gold—
  - type: text
    content: more rare than the fine gold of Ophir.
  '13':
  - type: text
    content: For I will shake the heavens.
  - type: text
    content: The earth will move from its place
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies displays his wrath'
  - type: text
    content: in the day of his fierce anger.”
  '14':
  - type: text
    content: Everyone in Babylon will run about like a hunted gazelle,
  - type: text
    content: like sheep without a shepherd.
  - type: text
    content: They will try to find their own people
  - type: text
    content: and flee to their own land.
  '15':
  - type: text
    content: Anyone who is captured will be cut down—
  - type: text
    content: run through with a sword.
  '16':
  - type: text
    content: Their little children will be dashed to death before their eyes.
  - type: text
    content: Their homes will be sacked, and their wives will be raped.
  '17':
  - type: text
    content: “Look, I will stir up the Medes against Babylon.
  - type: text
    content: They cannot be tempted by silver
  - type: text
    content: or bribed with gold.
  '18':
  - type: text
    content: The attacking armies will shoot down the young men with arrows.
  - type: text
    content: They will have no mercy on helpless babies
  - type: text
    content: and will show no compassion for children.”
  '19':
  - type: text
    content: Babylon, the most glorious of kingdoms,
  - type: text
    content: the flower of Chaldean pride,
  - type: text
    content: will be devastated like Sodom and Gomorrah
  - type: text
    content: when God destroyed them.
  '2':
  - type: text
    content: “Raise a signal flag on a bare hilltop.
  - type: text
    content: Call up an army against Babylon.
  - type: text
    content: Wave your hand to encourage them
  - type: text
    content: as they march into the palaces of the high and mighty.
  '20':
  - type: text
    content: Babylon will never be inhabited again.
  - type: text
    content: It will remain empty for generation after generation.
  - type: text
    content: Nomads will refuse to camp there,
  - type: text
    content: and shepherds will not bed down their sheep.
  '21':
  - type: text
    content: Desert animals will move into the ruined city,
  - type: text
    content: and the houses will be haunted by howling creatures.
  - type: text
    content: Owls will live among the ruins,
  - type: text
    content: and wild goats will go there to dance.
  '22':
  - type: text
    content: Hyenas will howl in its fortresses,
  - type: text
    content: and jackals will make dens in its luxurious palaces.
  - type: text
    content: Babylon’s days are numbered;
  - type: text
    content: its time of destruction will soon arrive.
  '3':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have dedicated these soldiers for this task.'
  - type: text
    content: Yes, I have called mighty warriors to express my anger,
  - type: text
    content: and they will rejoice when I am exalted.”
  '4':
  - type: text
    content: Hear the noise on the mountains!
  - type: text
    content: Listen, as the vast armies march!
  - type: text
    content: It is the noise and shouting of many nations.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has called this army together.'
  '5':
  - type: text
    content: They come from distant countries,
  - type: text
    content: from beyond the farthest horizons.
  - type: text
    content: 'They are the '
  - type: text
    content: Lord
  - type: text
    content: ’s weapons to carry out his anger.
  - type: text
    content: With them he will destroy the whole land.
  '6':
  - type: text
    content: 'Scream in terror, for the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' has arrived—'
  - type: text
    content: the time for the Almighty to destroy.
  '7':
  - type: text
    content: Every arm is paralyzed with fear.
  - type: text
    content: Every heart melts,
  '8':
  - type: text
    content: and people are terrified.
  - type: text
    content: Pangs of anguish grip them,
  - type: text
    content: like those of a woman in labor.
  - type: text
    content: They look helplessly at one another,
  - type: text
    content: their faces aflame with fear.
  '9':
  - type: text
    content: 'For see, the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming—'
  - type: text
    content: the terrible day of his fury and fierce anger.
  - type: text
    content: The land will be made desolate,
  - type: text
    content: and all the sinners destroyed with it.
