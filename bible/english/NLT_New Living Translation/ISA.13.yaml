document_id: ISA.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Babylon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Isaiah son of Amoz received this message concerning the destruction of Babylon:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The heavens will be black above them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the stars will give no light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun will be dark when it rises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the moon will provide no light.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will punish the world for its evil'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the wicked for their sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will crush the arrogance of the proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and humble the pride of the mighty.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will make people scarcer than gold—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more rare than the fine gold of Ophir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For I will shake the heavens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth will move from its place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies displays his wrath'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of his fierce anger.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Everyone in Babylon will run about like a hunted gazelle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like sheep without a shepherd.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will try to find their own people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flee to their own land.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Anyone who is captured will be cut down—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: run through with a sword.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Their little children will be dashed to death before their eyes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their homes will be sacked, and their wives will be raped.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Look, I will stir up the Medes against Babylon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They cannot be tempted by silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or bribed with gold.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The attacking armies will shoot down the young men with arrows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will have no mercy on helpless babies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will show no compassion for children.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Babylon, the most glorious of kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the flower of Chaldean pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be devastated like Sodom and Gomorrah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when God destroyed them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Raise a signal flag on a bare hilltop.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Call up an army against Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wave your hand to encourage them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they march into the palaces of the high and mighty.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Babylon will never be inhabited again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will remain empty for generation after generation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nomads will refuse to camp there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shepherds will not bed down their sheep.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Desert animals will move into the ruined city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the houses will be haunted by howling creatures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Owls will live among the ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wild goats will go there to dance.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hyenas will howl in its fortresses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and jackals will make dens in its luxurious palaces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon’s days are numbered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its time of destruction will soon arrive.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have dedicated these soldiers for this task.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I have called mighty warriors to express my anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will rejoice when I am exalted.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hear the noise on the mountains!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen, as the vast armies march!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the noise and shouting of many nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies has called this army together.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They come from distant countries,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from beyond the farthest horizons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s weapons to carry out his anger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With them he will destroy the whole land.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Scream in terror, for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has arrived—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time for the Almighty to destroy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Every arm is paralyzed with fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every heart melts,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: and people are terrified.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pangs of anguish grip them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those of a woman in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They look helplessly at one another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their faces aflame with fear.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For see, the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is coming—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the terrible day of his fury and fierce anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land will be made desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the sinners destroyed with it.
