document_id: MAT.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Triumphant Entry
  - type: text
    content: 'As Jesus and the disciples approached Jerusalem, they came to the town of Bethphage on the Mount of Olives. Jesus sent two of them on ahead. '
  '10':
  - type: text
    content: The entire city of Jerusalem was in an uproar as he entered. “Who is this?” they asked.
  '11':
  - type: text
    content: And the crowds replied, “It’s Jesus, the prophet from Nazareth in Galilee.”
  - type: heading
    content: Jesus Clears the Temple
  '12':
  - type: text
    content: 'Jesus entered the Temple and began to drive out all the people buying and selling animals for sacrifice. He knocked over the tables of the money changers and the chairs of those selling doves. '
  '13':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “The Scriptures declare, ‘My Temple will be called a house of prayer,’ but you have turned it into a den of thieves!”
  - type: note
    content: Isa 56:7; Jer 7:11.
  '14':
  - type: text
    content: 'The blind and the lame came to him in the Temple, and he healed them. '
  '15':
  - type: text
    content: The leading priests and the teachers of religious law saw these wonderful miracles and heard even the children in the Temple shouting, “Praise God for the Son of David.”
  - type: text
    content: 'But the leaders were indignant. '
  '16':
  - type: text
    content: They asked Jesus, “Do you hear what these children are saying?”
  - type: text
    content: '“Yes,” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “Haven’t you ever read the Scriptures? For they say, ‘You have taught children and infants to give you praise.’
  - type: note
    content: Ps 8:2 (Greek version).
  - type: text
    content: ”
  - type: text
    content: ' '
  '17':
  - type: text
    content: Then he returned to Bethany, where he stayed overnight.
  - type: heading
    content: Jesus Curses the Fig Tree
  '18':
  - type: text
    content: 'In the morning, as Jesus was returning to Jerusalem, he was hungry, '
  '19':
  - type: text
    content: 'and he noticed a fig tree beside the road. He went over to see if there were any figs, but there were only leaves. Then he said to it, '
  - type: text
    content: “May you never bear fruit again!”
  - type: text
    content: ' And immediately the fig tree withered up.'
  '2':
  - type: text
    content: '“Go into the village over there,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “As soon as you enter it, you will see a donkey tied there, with its colt beside it. Untie them and bring them to me.
  - type: text
    content: ' '
  '20':
  - type: text
    content: The disciples were amazed when they saw this and asked, “How did the fig tree wither so quickly?”
  '21':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “I tell you the truth, if you have faith and don’t doubt, you can do things like this and much more. You can even say to this mountain, ‘May you be lifted up and thrown into the sea,’ and it will happen.
  - type: text
    content: ' '
  '22':
  - type: text
    content: You can pray for anything, and if you have faith, you will receive it.”
  - type: heading
    content: The Authority of Jesus Challenged
  '23':
  - type: text
    content: When Jesus returned to the Temple and began teaching, the leading priests and elders came up to him. They demanded, “By what authority are you doing all these things? Who gave you the right?”
  '24':
  - type: text
    content: ' '
  - type: text
    content: '“I’ll tell you by what authority I do these things if you answer one question,” '
  - type: text
    content: 'Jesus replied. '
  '25':
  - type: text
    content: “Did John’s authority to baptize come from heaven, or was it merely human?”
  - type: text
    content: 'They talked it over among themselves. “If we say it was from heaven, he will ask us why we didn’t believe John. '
  '26':
  - type: text
    content: 'But if we say it was merely human, we’ll be mobbed because the people believe John was a prophet.” '
  '27':
  - type: text
    content: So they finally replied, “We don’t know.”
  - type: text
    content: 'And Jesus responded, '
  - type: text
    content: “Then I won’t tell you by what authority I do these things.
  - type: heading
    content: Parable of the Two Sons
  '28':
  - type: text
    content: ' '
  - type: text
    content: “But what do you think about this? A man with two sons told the older boy, ‘Son, go out and work in the vineyard today.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: The son answered, ‘No, I won’t go,’ but later he changed his mind and went anyway.
  - type: text
    content: ' '
  '3':
  - type: text
    content: If anyone asks what you are doing, just say, ‘The Lord needs them,’ and he will immediately let you take them.”
  '30':
  - type: text
    content: Then the father told the other son, ‘You go,’ and he said, ‘Yes, sir, I will.’ But he didn’t go.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Which of the two obeyed his father?”
  - type: text
    content: They replied, “The first.”
  - type: note
    content: Other manuscripts read “The second.” In still other manuscripts the first son says “Yes” but does nothing, the second son says “No” but then repents and goes, and the answer to Jesus’ question is that the second son obeyed his father.
  - type: text
    content: 'Then Jesus explained his meaning: '
  - type: text
    content: “I tell you the truth, corrupt tax collectors and prostitutes will get into the Kingdom of God before you do.
  - type: text
    content: ' '
  '32':
  - type: text
    content: For John the Baptist came and showed you the right way to live, but you didn’t believe him, while tax collectors and prostitutes did. And even when you saw this happening, you refused to believe him and repent of your sins.
  - type: heading
    content: Parable of the Evil Farmers
  '33':
  - type: text
    content: ' '
  - type: text
    content: “Now listen to another story. A certain landowner planted a vineyard, built a wall around it, dug a pit for pressing out the grape juice, and built a lookout tower. Then he leased the vineyard to tenant farmers and moved to another country.
  - type: text
    content: ' '
  '34':
  - type: text
    content: At the time of the grape harvest, he sent his servants to collect his share of the crop.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But the farmers grabbed his servants, beat one, killed one, and stoned another.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So the landowner sent a larger group of his servants to collect for him, but the results were the same.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Finally, the owner sent his son, thinking, ‘Surely they will respect my son.’
  '38':
  - type: text
    content: ' '
  - type: text
    content: “But when the tenant farmers saw his son coming, they said to one another, ‘Here comes the heir to this estate. Come on, let’s kill him and get the estate for ourselves!’
  - type: text
    content: ' '
  '39':
  - type: text
    content: So they grabbed him, dragged him out of the vineyard, and murdered him.
  '4':
  - type: text
    content: This took place to fulfill the prophecy that said,
  '40':
  - type: text
    content: ' '
  - type: text
    content: '“When the owner of the vineyard returns,” '
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “what do you think he will do to those farmers?”
  '41':
  - type: text
    content: The religious leaders replied, “He will put the wicked men to a horrible death and lease the vineyard to others who will give him his share of the crop after each harvest.”
  '42':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: “Didn’t you ever read this in the Scriptures?
  - type: text
    content: ‘The stone that the builders rejected
  - type: text
    content: has now become the cornerstone.
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ’s doing,
  - type: text
    content: and it is wonderful to see.’
  - type: note
    content: Ps 118:22-23.
  '43':
  - type: text
    content: ' '
  - type: text
    content: I tell you, the Kingdom of God will be taken away from you and given to a nation that will produce the proper fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Anyone who stumbles over that stone will be broken to pieces, and it will crush anyone it falls on.
  - type: note
    content: This verse is not included in some early manuscripts. Compare Luke 20:18.
  - type: text
    content: ”
  '45':
  - type: text
    content: 'When the leading priests and Pharisees heard this parable, they realized he was telling the story against them—they were the wicked farmers. '
  '46':
  - type: text
    content: They wanted to arrest him, but they were afraid of the crowds, who considered Jesus to be a prophet.
  '5':
  - type: text
    content: “Tell the people of Jerusalem,
  - type: note
    content: Greek Tell the daughter of Zion. Isa 62:11.
  - type: text
    content: ‘Look, your King is coming to you.
  - type: text
    content: He is humble, riding on a donkey—
  - type: text
    content: riding on a donkey’s colt.’”
  - type: note
    content: Zech 9:9.
  '6':
  - type: text
    content: 'The two disciples did as Jesus commanded. '
  '7':
  - type: text
    content: They brought the donkey and the colt to him and threw their garments over the colt, and he sat on it.
  - type: note
    content: Greek over them, and he sat on them.
  '8':
  - type: text
    content: 'Most of the crowd spread their garments on the road ahead of him, and others cut branches from the trees and spread them on the road. '
  '9':
  - type: text
    content: Jesus was in the center of the procession, and the people all around him were shouting,
  - type: text
    content: “Praise God
  - type: note
    content: Greek Hosanna, an exclamation of praise that literally means “save now”; also in 21:9b, 15.
  - type: text
    content: ' for the Son of David!'
  - type: text
    content: 'Blessings on the one who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Praise God in highest heaven!”
  - type: note
    content: Pss 118:25-26; 148:1.
