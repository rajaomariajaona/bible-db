document_id: MAT.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Triumphant Entry
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As Jesus and the disciples approached Jerusalem, they came to the town of Bethphage on the Mount of Olives. Jesus sent two of them on ahead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Go into the village over there,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As soon as you enter it, you will see a donkey tied there, with its colt beside it. Untie them and bring them to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone asks what you are doing, just say, ‘The Lord needs them,’ and he will immediately let you take them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This took place to fulfill the prophecy that said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Tell the people of Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tell the daughter of Zion. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 62:11.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Look, your King is coming to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is humble, riding on a donkey—
- type: usfm
  marker: q2
  children:
  - type: text
    text: riding on a donkey’s colt.’”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech 9:9.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The two disciples did as Jesus commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They brought the donkey and the colt to him and threw their garments over the colt, and he sat on it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: over them, and he sat on them.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Most of the crowd spread their garments on the road ahead of him, and others cut branches from the trees and spread them on the road. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jesus was in the center of the procession, and the people all around him were shouting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Praise God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hosanna, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: an exclamation of praise that literally means “save now”; also in 21:9b, 15.
    marker-yv: yv-n
  - type: text
    text: ' for the Son of David!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Blessings on the one who comes in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Praise God in highest heaven!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pss 118:25-26; 148:1.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The entire city of Jerusalem was in an uproar as he entered. “Who is this?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the crowds replied, “It’s Jesus, the prophet from Nazareth in Galilee.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Clears the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jesus entered the Temple and began to drive out all the people buying and selling animals for sacrifice. He knocked over the tables of the money changers and the chairs of those selling doves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Scriptures declare, ‘My Temple will be called a house of prayer,’ but you have turned it into a den of thieves!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 56:7; Jer 7:11.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The blind and the lame came to him in the Temple, and he healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The leading priests and the teachers of religious law saw these wonderful miracles and heard even the children in the Temple shouting, “Praise God for the Son of David.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But the leaders were indignant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They asked Jesus, “Do you hear what these children are saying?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Yes,” '
  - type: text
    text: 'Jesus replied. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Haven’t you ever read the Scriptures? For they say, ‘You have taught children and infants to give you praise.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 8:2 (Greek version).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then he returned to Bethany, where he stayed overnight.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Curses the Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In the morning, as Jesus was returning to Jerusalem, he was hungry, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and he noticed a fig tree beside the road. He went over to see if there were any figs, but there were only leaves. Then he said to it, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “May you never bear fruit again!”
  - type: text
    text: ' And immediately the fig tree withered up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The disciples were amazed when they saw this and asked, “How did the fig tree wither so quickly?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, if you have faith and don’t doubt, you can do things like this and much more. You can even say to this mountain, ‘May you be lifted up and thrown into the sea,’ and it will happen.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You can pray for anything, and if you have faith, you will receive it.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Authority of Jesus Challenged
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When Jesus returned to the Temple and began teaching, the leading priests and elders came up to him. They demanded, “By what authority are you doing all these things? Who gave you the right?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I’ll tell you by what authority I do these things if you answer one question,” '
  - type: text
    text: 'Jesus replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Did John’s authority to baptize come from heaven, or was it merely human?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They talked it over among themselves. “If we say it was from heaven, he will ask us why we didn’t believe John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But if we say it was merely human, we’ll be mobbed because the people believe John was a prophet.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So they finally replied, “We don’t know.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then I won’t tell you by what authority I do these things.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Two Sons
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But what do you think about this? A man with two sons told the older boy, ‘Son, go out and work in the vineyard today.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The son answered, ‘No, I won’t go,’ but later he changed his mind and went anyway.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then the father told the other son, ‘You go,’ and he said, ‘Yes, sir, I will.’ But he didn’t go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Which of the two obeyed his father?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They replied, “The first.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:29-31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '“The second.” '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In still other manuscripts the first son says “Yes” but does nothing, the second son says “No” but then repents and goes, and the answer to Jesus’ question is that the second son obeyed his father.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Jesus explained his meaning: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, corrupt tax collectors and prostitutes will get into the Kingdom of God before you do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John the Baptist came and showed you the right way to live, but you didn’t believe him, while tax collectors and prostitutes did. And even when you saw this happening, you refused to believe him and repent of your sins.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Evil Farmers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now listen to another story. A certain landowner planted a vineyard, built a wall around it, dug a pit for pressing out the grape juice, and built a lookout tower. Then he leased the vineyard to tenant farmers and moved to another country.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: At the time of the grape harvest, he sent his servants to collect his share of the crop.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the farmers grabbed his servants, beat one, killed one, and stoned another.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the landowner sent a larger group of his servants to collect for him, but the results were the same.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Finally, the owner sent his son, thinking, ‘Surely they will respect my son.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But when the tenant farmers saw his son coming, they said to one another, ‘Here comes the heir to this estate. Come on, let’s kill him and get the estate for ourselves!’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they grabbed him, dragged him out of the vineyard, and murdered him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“When the owner of the vineyard returns,” '
  - type: text
    text: 'Jesus asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “what do you think he will do to those farmers?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: The religious leaders replied, “He will put the wicked men to a horrible death and lease the vineyard to others who will give him his share of the crop after each harvest.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Didn’t you ever read this in the Scriptures?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘The stone that the builders rejected
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has now become the cornerstone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s doing,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and it is wonderful to see.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118:22-23.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you, the Kingdom of God will be taken away from you and given to a nation that will produce the proper fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who stumbles over that stone will be broken to pieces, and it will crush anyone it falls on.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse is not included in some early manuscripts. Compare Luke 20:18.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When the leading priests and Pharisees heard this parable, they realized he was telling the story against them—they were the wicked farmers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: They wanted to arrest him, but they were afraid of the crowds, who considered Jesus to be a prophet.
