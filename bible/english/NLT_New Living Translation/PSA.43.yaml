document_id: PSA.43
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Declare me innocent, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Defend me against these ungodly people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rescue me from these unjust liars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For you are God, my only safe haven.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you tossed me aside?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why must I wander around in grief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oppressed by my enemies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Send out your light and your truth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them guide me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them lead me to your holy mountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the place where you live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: There I will go to the altar of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to God—the source of all my joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will praise you with my harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God, my God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why am I discouraged?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why is my heart so sad?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my hope in God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will praise him again—
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Savior and my God!
