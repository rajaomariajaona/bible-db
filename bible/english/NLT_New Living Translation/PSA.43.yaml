document_id: PSA.43,116
type_code: eng
verses:
  '1':
  - type: text
    content: Declare me innocent, O God!
  - type: text
    content: Defend me against these ungodly people.
  - type: text
    content: Rescue me from these unjust liars.
  '2':
  - type: text
    content: For you are God, my only safe haven.
  - type: text
    content: Why have you tossed me aside?
  - type: text
    content: Why must I wander around in grief,
  - type: text
    content: oppressed by my enemies?
  '3':
  - type: text
    content: Send out your light and your truth;
  - type: text
    content: let them guide me.
  - type: text
    content: Let them lead me to your holy mountain,
  - type: text
    content: to the place where you live.
  '4':
  - type: text
    content: There I will go to the altar of God,
  - type: text
    content: to God—the source of all my joy.
  - type: text
    content: I will praise you with my harp,
  - type: text
    content: O God, my God!
  '5':
  - type: text
    content: Why am I discouraged?
  - type: text
    content: Why is my heart so sad?
  - type: text
    content: I will put my hope in God!
  - type: text
    content: I will praise him again—
  - type: text
    content: my Savior and my God!
