document_id: 2CH.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amaziah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amaziah was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother was Jehoaddin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Kgs 14:2; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoaddan, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoaddin.
    marker-yv: yv-n
  - type: text
    text: ' from Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amaziah did what was pleasing in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight, but not wholeheartedly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When Amaziah was well established as king, he executed the officials who had assassinated his father. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'However, he did not kill the children of the assassins, for he obeyed the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as written by Moses in the Book of the Law: “Parents must not be put to death for the sins of their children, nor children for the sins of their parents. Those deserving to die must be put to death for their own crimes.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 24:16.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Amaziah organized the army, assigning generals and captains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: commanders of thousands and commanders of hundreds.
    marker-yv: yv-n
  - type: text
    text: ' for all Judah and Benjamin. He took a census and found that he had an army of 300,000 select troops, twenty years old and older, all trained in the use of spear and shield. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He also paid about 7,500 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver to hire 100,000 experienced fighting men from Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But a man of God came to him and said, “Your Majesty, do not hire troops from Israel, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is not with Israel. He will not help those people of Ephraim! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If you let them go with your troops into battle, you will be defeated by the enemy no matter how well you fight. God will overthrow you, for he has the power to help you or to trip you up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amaziah asked the man of God, “But what about all that silver I paid to hire the army of Israel?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The man of God replied, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is able to give you much more than this!” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So Amaziah discharged the hired troops and sent them back to Ephraim. This made them very angry with Judah, and they returned home in a great rage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Amaziah summoned his courage and led his army to the Valley of Salt, where they killed 10,000 Edomite troops from Seir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They captured another 10,000 and took them to the top of a cliff and threw them off, dashing them to pieces on the rocks below.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Meanwhile, the hired troops that Amaziah had sent home raided several of the towns of Judah between Samaria and Beth-horon. They killed 3,000 people and carried off great quantities of plunder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When King Amaziah returned from slaughtering the Edomites, he brought with him idols taken from the people of Seir. He set them up as his own gods, bowed down in front of them, and offered sacrifices to them! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' very angry, and he sent a prophet to ask, “Why do you turn to gods who could not even save their own people from you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But the king interrupted him and said, “Since when have I made you the king’s counselor? Be quiet now before I have you killed!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So the prophet stopped with this warning: “I know that God has determined to destroy you because you have done this and have refused to accept my counsel.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: After consulting with his advisers, King Amaziah of Judah sent this challenge to Israel’s king Jehoash,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joash, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoash; also in 25:18, 21, 23, 25.
    marker-yv: yv-n
  - type: text
    text: ' the son of Jehoahaz and grandson of Jehu: “Come and meet me in battle!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Come, let us look one another in the face.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But King Jehoash of Israel replied to King Amaziah of Judah with this story: “Out in the Lebanon mountains, a thistle sent a message to a mighty cedar tree: ‘Give your daughter in marriage to my son.’ But just then a wild animal of Lebanon came by and stepped on the thistle, crushing it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “You are saying, ‘I have defeated Edom,’ and you are very proud of it. But my advice is to stay at home. Why stir up trouble that will only bring disaster on you and the people of Judah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Amaziah refused to listen, for God was determined to destroy him for turning to the gods of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So King Jehoash of Israel mobilized his army against King Amaziah of Judah. The two armies drew up their battle lines at Beth-shemesh in Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Judah was routed by the army of Israel, and its army scattered and fled for home. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: King Jehoash of Israel captured Judah’s king, Amaziah son of Joash and grandson of Ahaziah, at Beth-shemesh. Then he brought him to Jerusalem, where he demolished 600 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '400 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[180 meters].'
    marker-yv: yv-n
  - type: text
    text: ' of Jerusalem’s wall, from the Ephraim Gate to the Corner Gate. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He carried off all the gold and silver and all the articles from the Temple of God that had been in the care of Obed-edom. He also seized the treasures of the royal palace, along with hostages, and then returned to Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'King Amaziah of Judah lived for fifteen years after the death of King Jehoash of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The rest of the events in Amaziah’s reign, from beginning to end, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Judah and Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'After Amaziah turned away from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', there was a conspiracy against his life in Jerusalem, and he fled to Lachish. But his enemies sent assassins after him, and they killed him there. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They brought his body back on a horse, and he was buried with his ancestors in the City of David.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and other ancient versions (see also 2 Kgs 14:20); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the city of Judah.
    marker-yv: yv-n
