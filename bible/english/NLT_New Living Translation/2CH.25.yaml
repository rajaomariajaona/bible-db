document_id: 2CH.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Amaziah Rules in Judah
  - type: text
    content: Amaziah was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother was Jehoaddin
  - type: note
    content: As in parallel text at 2 Kgs 14:2; Hebrew reads Jehoaddan, a variant spelling of Jehoaddin.
  - type: text
    content: ' from Jerusalem. '
  '10':
  - type: text
    content: So Amaziah discharged the hired troops and sent them back to Ephraim. This made them very angry with Judah, and they returned home in a great rage.
  '11':
  - type: text
    content: 'Then Amaziah summoned his courage and led his army to the Valley of Salt, where they killed 10,000 Edomite troops from Seir. '
  '12':
  - type: text
    content: They captured another 10,000 and took them to the top of a cliff and threw them off, dashing them to pieces on the rocks below.
  '13':
  - type: text
    content: Meanwhile, the hired troops that Amaziah had sent home raided several of the towns of Judah between Samaria and Beth-horon. They killed 3,000 people and carried off great quantities of plunder.
  '14':
  - type: text
    content: 'When King Amaziah returned from slaughtering the Edomites, he brought with him idols taken from the people of Seir. He set them up as his own gods, bowed down in front of them, and offered sacrifices to them! '
  '15':
  - type: text
    content: 'This made the '
  - type: text
    content: Lord
  - type: text
    content: ' very angry, and he sent a prophet to ask, “Why do you turn to gods who could not even save their own people from you?”'
  '16':
  - type: text
    content: But the king interrupted him and said, “Since when have I made you the king’s counselor? Be quiet now before I have you killed!”
  - type: text
    content: 'So the prophet stopped with this warning: “I know that God has determined to destroy you because you have done this and have refused to accept my counsel.”'
  '17':
  - type: text
    content: After consulting with his advisers, King Amaziah of Judah sent this challenge to Israel’s king Jehoash,
  - type: note
    content: Hebrew Joash, a variant spelling of Jehoash; also in 25:18, 21, 23, 25.
  - type: text
    content: ' the son of Jehoahaz and grandson of Jehu: “Come and meet me in battle!”'
  - type: note
    content: Hebrew Come, let us look one another in the face.
  '18':
  - type: text
    content: 'But King Jehoash of Israel replied to King Amaziah of Judah with this story: “Out in the Lebanon mountains, a thistle sent a message to a mighty cedar tree: ‘Give your daughter in marriage to my son.’ But just then a wild animal of Lebanon came by and stepped on the thistle, crushing it!'
  '19':
  - type: text
    content: “You are saying, ‘I have defeated Edom,’ and you are very proud of it. But my advice is to stay at home. Why stir up trouble that will only bring disaster on you and the people of Judah?”
  '2':
  - type: text
    content: 'Amaziah did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, but not wholeheartedly.
  '20':
  - type: text
    content: 'But Amaziah refused to listen, for God was determined to destroy him for turning to the gods of Edom. '
  '21':
  - type: text
    content: 'So King Jehoash of Israel mobilized his army against King Amaziah of Judah. The two armies drew up their battle lines at Beth-shemesh in Judah. '
  '22':
  - type: text
    content: 'Judah was routed by the army of Israel, and its army scattered and fled for home. '
  '23':
  - type: text
    content: King Jehoash of Israel captured Judah’s king, Amaziah son of Joash and grandson of Ahaziah, at Beth-shemesh. Then he brought him to Jerusalem, where he demolished 600 feet
  - type: note
    content: Hebrew 400 cubits [180 meters].
  - type: text
    content: ' of Jerusalem’s wall, from the Ephraim Gate to the Corner Gate. '
  '24':
  - type: text
    content: He carried off all the gold and silver and all the articles from the Temple of God that had been in the care of Obed-edom. He also seized the treasures of the royal palace, along with hostages, and then returned to Samaria.
  '25':
  - type: text
    content: 'King Amaziah of Judah lived for fifteen years after the death of King Jehoash of Israel. '
  '26':
  - type: text
    content: 'The rest of the events in Amaziah’s reign, from beginning to end, are recorded in '
  - type: text
    content: The Book of the Kings of Judah and Israel.
  '27':
  - type: text
    content: 'After Amaziah turned away from the '
  - type: text
    content: Lord
  - type: text
    content: ', there was a conspiracy against his life in Jerusalem, and he fled to Lachish. But his enemies sent assassins after him, and they killed him there. '
  '28':
  - type: text
    content: They brought his body back on a horse, and he was buried with his ancestors in the City of David.
  - type: note
    content: As in some Hebrew manuscripts and other ancient versions (see also 2 Kgs 14:20); most Hebrew manuscripts read the city of Judah.
  '3':
  - type: text
    content: 'When Amaziah was well established as king, he executed the officials who had assassinated his father. '
  '4':
  - type: text
    content: 'However, he did not kill the children of the assassins, for he obeyed the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' as written by Moses in the Book of the Law: “Parents must not be put to death for the sins of their children, nor children for the sins of their parents. Those deserving to die must be put to death for their own crimes.”'
  - type: note
    content: Deut 24:16.
  '5':
  - type: text
    content: Then Amaziah organized the army, assigning generals and captains
  - type: note
    content: Hebrew commanders of thousands and commanders of hundreds.
  - type: text
    content: ' for all Judah and Benjamin. He took a census and found that he had an army of 300,000 select troops, twenty years old and older, all trained in the use of spear and shield. '
  '6':
  - type: text
    content: He also paid about 7,500 pounds
  - type: note
    content: Hebrew 100 talents [3,400 kilograms].
  - type: text
    content: ' of silver to hire 100,000 experienced fighting men from Israel.'
  '7':
  - type: text
    content: 'But a man of God came to him and said, “Your Majesty, do not hire troops from Israel, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is not with Israel. He will not help those people of Ephraim! '
  '8':
  - type: text
    content: If you let them go with your troops into battle, you will be defeated by the enemy no matter how well you fight. God will overthrow you, for he has the power to help you or to trip you up.”
  '9':
  - type: text
    content: Amaziah asked the man of God, “But what about all that silver I paid to hire the army of Israel?”
  - type: text
    content: 'The man of God replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is able to give you much more than this!” '
