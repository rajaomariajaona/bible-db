document_id: JDG.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Gideon Defeats the Midianites
  - type: text
    content: 'So Jerub-baal (that is, Gideon) and his army got up early and went as far as the spring of Harod. The armies of Midian were camped north of them in the valley near the hill of Moreh. '
  '10':
  - type: text
    content: 'But if you are afraid to attack, go down to the camp with your servant Purah. '
  '11':
  - type: text
    content: Listen to what the Midianites are saying, and you will be greatly encouraged. Then you will be eager to attack.”
  - type: text
    content: 'So Gideon took Purah and went down to the edge of the enemy camp. '
  '12':
  - type: text
    content: 'The armies of Midian, Amalek, and the people of the east had settled in the valley like a swarm of locusts. Their camels were like grains of sand on the seashore—too many to count! '
  '13':
  - type: text
    content: Gideon crept up just as a man was telling his companion about a dream. The man said, “I had this dream, and in my dream a loaf of barley bread came tumbling down into the Midianite camp. It hit a tent, turned it over, and knocked it flat!”
  '14':
  - type: text
    content: His companion answered, “Your dream can mean only one thing—God has given Gideon son of Joash, the Israelite, victory over Midian and all its allies!”
  '15':
  - type: text
    content: 'When Gideon heard the dream and its interpretation, he bowed in worship before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: As in Greek version; Hebrew reads he bowed.
  - type: text
    content: ' Then he returned to the Israelite camp and shouted, “Get up! For the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you victory over the Midianite hordes!” '
  '16':
  - type: text
    content: He divided the 300 men into three groups and gave each man a ram’s horn and a clay jar with a torch in it.
  '17':
  - type: text
    content: 'Then he said to them, “Keep your eyes on me. When I come to the edge of the camp, do just as I do. '
  '18':
  - type: text
    content: 'As soon as I and those with me blow the rams’ horns, blow your horns, too, all around the entire camp, and shout, ‘For the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon!’”'
  '19':
  - type: text
    content: It was just after midnight,
  - type: note
    content: Hebrew at the beginning of the second watch.
  - type: text
    content: ' after the changing of the guard, when Gideon and the 100 men with him reached the edge of the Midianite camp. Suddenly, they blew the rams’ horns and broke their clay jars. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “You have too many warriors with you. If I let all of you fight the Midianites, the Israelites will boast to me that they saved themselves by their own strength. '
  '20':
  - type: text
    content: 'Then all three groups blew their horns and broke their jars. They held the blazing torches in their left hands and the horns in their right hands, and they all shouted, “A sword for the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon!”'
  '21':
  - type: text
    content: 'Each man stood at his position around the camp and watched as all the Midianites rushed around in a panic, shouting as they ran to escape. '
  '22':
  - type: text
    content: 'When the 300 Israelites blew their rams’ horns, the '
  - type: text
    content: Lord
  - type: text
    content: ' caused the warriors in the camp to fight against each other with their swords. Those who were not killed fled to places as far away as Beth-shittah near Zererah and to the border of Abel-meholah near Tabbath.'
  '23':
  - type: text
    content: 'Then Gideon sent for the warriors of Naphtali, Asher, and Manasseh, who joined in chasing the army of Midian. '
  '24':
  - type: text
    content: Gideon also sent messengers throughout the hill country of Ephraim, saying, “Come down to attack the Midianites. Cut them off at the shallow crossings of the Jordan River at Beth-barah.”
  - type: text
    content: 'So all the men of Ephraim did as they were told. '
  '25':
  - type: text
    content: They captured Oreb and Zeeb, the two Midianite commanders, killing Oreb at the rock of Oreb, and Zeeb at the winepress of Zeeb. And they continued to chase the Midianites. Afterward the Israelites brought the heads of Oreb and Zeeb to Gideon, who was by the Jordan River.
  '3':
  - type: text
    content: Therefore, tell the people, ‘Whoever is timid or afraid may leave this mountain
  - type: note
    content: Hebrew may leave Mount Gilead. The identity of Mount Gilead is uncertain in this context. It is perhaps used here as another name for Mount Gilboa.
  - type: text
    content: ' and go home.’” So 22,000 of them went home, leaving only 10,000 who were willing to fight.'
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' told Gideon, “There are still too many! Bring them down to the spring, and I will test them to determine who will go with you and who will not.” '
  '5':
  - type: text
    content: 'When Gideon took his warriors down to the water, the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “Divide the men into two groups. In one group put all those who cup water in their hands and lap it up with their tongues like dogs. In the other group put all those who kneel down and drink with their mouths in the stream.” '
  '6':
  - type: text
    content: Only 300 of the men drank from their hands. All the others got down on their knees and drank with their mouths in the stream.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' told Gideon, “With these 300 men I will rescue you and give you victory over the Midianites. Send all the others home.” '
  '8':
  - type: text
    content: So Gideon collected the provisions and rams’ horns of the other warriors and sent them home. But he kept the 300 men with him.
  - type: text
    content: 'The Midianite camp was in the valley just below Gideon. '
  '9':
  - type: text
    content: 'That night the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Get up! Go down into the Midianite camp, for I have given you victory over them! '
