document_id: JDG.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gideon Defeats the Midianites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Jerub-baal (that is, Gideon) and his army got up early and went as far as the spring of Harod. The armies of Midian were camped north of them in the valley near the hill of Moreh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Gideon, “You have too many warriors with you. If I let all of you fight the Midianites, the Israelites will boast to me that they saved themselves by their own strength. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore, tell the people, ‘Whoever is timid or afraid may leave this mountain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'may leave Mount Gilead. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identity of Mount Gilead is uncertain in this context. It is perhaps used here as another name for Mount Gilboa.
    marker-yv: yv-n
  - type: text
    text: ' and go home.’” So 22,000 of them went home, leaving only 10,000 who were willing to fight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Gideon, “There are still too many! Bring them down to the spring, and I will test them to determine who will go with you and who will not.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Gideon took his warriors down to the water, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told him, “Divide the men into two groups. In one group put all those who cup water in their hands and lap it up with their tongues like dogs. In the other group put all those who kneel down and drink with their mouths in the stream.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Only 300 of the men drank from their hands. All the others got down on their knees and drank with their mouths in the stream.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Gideon, “With these 300 men I will rescue you and give you victory over the Midianites. Send all the others home.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So Gideon collected the provisions and rams’ horns of the other warriors and sent them home. But he kept the 300 men with him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The Midianite camp was in the valley just below Gideon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'That night the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “Get up! Go down into the Midianite camp, for I have given you victory over them! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But if you are afraid to attack, go down to the camp with your servant Purah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Listen to what the Midianites are saying, and you will be greatly encouraged. Then you will be eager to attack.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Gideon took Purah and went down to the edge of the enemy camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The armies of Midian, Amalek, and the people of the east had settled in the valley like a swarm of locusts. Their camels were like grains of sand on the seashore—too many to count! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Gideon crept up just as a man was telling his companion about a dream. The man said, “I had this dream, and in my dream a loaf of barley bread came tumbling down into the Midianite camp. It hit a tent, turned it over, and knocked it flat!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: His companion answered, “Your dream can mean only one thing—God has given Gideon son of Joash, the Israelite, victory over Midian and all its allies!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When Gideon heard the dream and its interpretation, he bowed in worship before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he bowed.
    marker-yv: yv-n
  - type: text
    text: ' Then he returned to the Israelite camp and shouted, “Get up! For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given you victory over the Midianite hordes!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He divided the 300 men into three groups and gave each man a ram’s horn and a clay jar with a torch in it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he said to them, “Keep your eyes on me. When I come to the edge of the camp, do just as I do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As soon as I and those with me blow the rams’ horns, blow your horns, too, all around the entire camp, and shout, ‘For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for Gideon!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It was just after midnight,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: at the beginning of the second watch.
    marker-yv: yv-n
  - type: text
    text: ' after the changing of the guard, when Gideon and the 100 men with him reached the edge of the Midianite camp. Suddenly, they blew the rams’ horns and broke their clay jars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then all three groups blew their horns and broke their jars. They held the blazing torches in their left hands and the horns in their right hands, and they all shouted, “A sword for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for Gideon!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Each man stood at his position around the camp and watched as all the Midianites rushed around in a panic, shouting as they ran to escape. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When the 300 Israelites blew their rams’ horns, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' caused the warriors in the camp to fight against each other with their swords. Those who were not killed fled to places as far away as Beth-shittah near Zererah and to the border of Abel-meholah near Tabbath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Gideon sent for the warriors of Naphtali, Asher, and Manasseh, who joined in chasing the army of Midian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Gideon also sent messengers throughout the hill country of Ephraim, saying, “Come down to attack the Midianites. Cut them off at the shallow crossings of the Jordan River at Beth-barah.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So all the men of Ephraim did as they were told. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They captured Oreb and Zeeb, the two Midianite commanders, killing Oreb at the rock of Oreb, and Zeeb at the winepress of Zeeb. And they continued to chase the Midianites. Afterward the Israelites brought the heads of Oreb and Zeeb to Gideon, who was by the Jordan River.
