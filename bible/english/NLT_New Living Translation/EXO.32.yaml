document_id: EXO.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gold Calf
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When the people saw how long it was taking Moses to come back down the mountain, they gathered around Aaron. “Come on,” they said, “make us some gods who can lead us. We don’t know what happened to this fellow Moses, who brought us here from the land of Egypt.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So Aaron said, “Take the gold rings from the ears of your wives and sons and daughters, and bring them to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the people took the gold rings from their ears and brought them to Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then Aaron took the gold, melted it down, and molded it into the shape of a calf. When the people saw it, they exclaimed, “O Israel, these are the gods who brought you out of the land of Egypt!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aaron saw how excited the people were, so he built an altar in front of the calf. Then he announced, “Tomorrow will be a festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The people got up early the next morning to sacrifice burnt offerings and peace offerings. After this, they celebrated with feasting and drinking, and they indulged in pagan revelry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Moses, “Quick! Go down the mountain! Your people whom you brought from the land of Egypt have corrupted themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: How quickly they have turned away from the way I commanded them to live! They have melted down gold and made a calf, and they have bowed down and sacrificed to it. They are saying, ‘These are your gods, O Israel, who brought you out of the land of Egypt.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “I have seen how stubborn and rebellious these people are. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now leave me alone so my fierce anger can blaze against them, and I will destroy them. Then I will make you, Moses, into a great nation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Moses tried to pacify the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God. “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!” he said. “Why are you so angry with your own people whom you brought from the land of Egypt with such great power and such a strong hand? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Why let the Egyptians say, ‘Their God rescued them with the evil intention of slaughtering them in the mountains and wiping them from the face of the earth’? Turn away from your fierce anger. Change your mind about this terrible disaster you have threatened against your people! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Remember your servants Abraham, Isaac, and Jacob.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: ' You bound yourself with an oath to them, saying, ‘I will make your descendants as numerous as the stars of heaven. And I will give them all of this land that I have promised to your descendants, and they will possess it forever.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' changed his mind about the terrible disaster he had threatened to bring on his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Moses turned and went down the mountain. He held in his hands the two stone tablets inscribed with the terms of the covenant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the two tablets of the Testimony; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 25:16.
    marker-yv: yv-n
  - type: text
    text: ' They were inscribed on both sides, front and back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These tablets were God’s work; the words on them were written by God himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When Joshua heard the boisterous noise of the people shouting below them, he exclaimed to Moses, “It sounds like war in the camp!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But Moses replied, “No, it’s not a shout of victory nor the wailing of defeat. I hear the sound of a celebration.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When they came near the camp, Moses saw the calf and the dancing, and he burned with anger. He threw the stone tablets to the ground, smashing them at the foot of the mountain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He took the calf they had made and burned it. Then he ground it into powder, threw it into the water, and forced the people to drink it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Finally, he turned to Aaron and demanded, “What did these people do to you to make you bring such terrible sin upon them?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Don’t get so upset, my lord,” Aaron replied. “You yourself know how evil these people are. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They said to me, ‘Make us gods who will lead us. We don’t know what happened to this fellow Moses, who brought us here from the land of Egypt.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So I told them, ‘Whoever has gold jewelry, take it off.’ When they brought it to me, I simply threw it into the fire—and out came this calf!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moses saw that Aaron had let the people get completely out of control, much to the amusement of their enemies.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'out of control, and they mocked anyone who opposed them. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So he stood at the entrance to the camp and shouted, “All of you who are on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s side, come here and join me.” And all the Levites gathered around him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Moses told them, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Each of you, take your swords and go back and forth from one end of the camp to the other. Kill everyone—even your brothers, friends, and neighbors.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The Levites obeyed Moses’ command, and about 3,000 people died that day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then Moses told the Levites, “Today you have ordained yourselves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Latin versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Today ordain yourselves.
    marker-yv: yv-n
  - type: text
    text: ' for the service of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for you obeyed him even though it meant killing your own sons and brothers. Today you have earned a blessing.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Intercedes for Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The next day Moses said to the people, “You have committed a terrible sin, but I will go back up to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the mountain. Perhaps I will be able to obtain forgiveness'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make atonement.
    marker-yv: yv-n
  - type: text
    text: ' for your sin.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So Moses returned to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and said, “Oh, what a terrible sin these people have committed. They have made gods of gold for themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But now, if you will only forgive their sin—but if not, erase my name from the record you have written!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied to Moses, “No, I will erase the name of everyone who has sinned against me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Now go, lead the people to the place I told you about. Look! My angel will lead the way before you. And when I come to call the people to account, I will certainly hold them responsible for their sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent a great plague upon the people because they had worshiped the calf Aaron had made.'
