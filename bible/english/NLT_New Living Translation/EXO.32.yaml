document_id: EXO.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gold Calf
  - type: text
    content: When the people saw how long it was taking Moses to come back down the mountain, they gathered around Aaron. “Come on,” they said, “make us some gods who can lead us. We don’t know what happened to this fellow Moses, who brought us here from the land of Egypt.”
  '10':
  - type: text
    content: Now leave me alone so my fierce anger can blaze against them, and I will destroy them. Then I will make you, Moses, into a great nation.”
  '11':
  - type: text
    content: 'But Moses tried to pacify the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. “O '
  - type: text
    content: Lord
  - type: text
    content: '!” he said. “Why are you so angry with your own people whom you brought from the land of Egypt with such great power and such a strong hand? '
  '12':
  - type: text
    content: 'Why let the Egyptians say, ‘Their God rescued them with the evil intention of slaughtering them in the mountains and wiping them from the face of the earth’? Turn away from your fierce anger. Change your mind about this terrible disaster you have threatened against your people! '
  '13':
  - type: text
    content: Remember your servants Abraham, Isaac, and Jacob.
  - type: note
    content: Hebrew Israel. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: ' You bound yourself with an oath to them, saying, ‘I will make your descendants as numerous as the stars of heaven. And I will give them all of this land that I have promised to your descendants, and they will possess it forever.’”'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' changed his mind about the terrible disaster he had threatened to bring on his people.'
  '15':
  - type: text
    content: Then Moses turned and went down the mountain. He held in his hands the two stone tablets inscribed with the terms of the covenant.
  - type: note
    content: Hebrew the two tablets of the Testimony; see note on 25:16.
  - type: text
    content: ' They were inscribed on both sides, front and back. '
  '16':
  - type: text
    content: These tablets were God’s work; the words on them were written by God himself.
  '17':
  - type: text
    content: When Joshua heard the boisterous noise of the people shouting below them, he exclaimed to Moses, “It sounds like war in the camp!”
  '18':
  - type: text
    content: But Moses replied, “No, it’s not a shout of victory nor the wailing of defeat. I hear the sound of a celebration.”
  '19':
  - type: text
    content: 'When they came near the camp, Moses saw the calf and the dancing, and he burned with anger. He threw the stone tablets to the ground, smashing them at the foot of the mountain. '
  '2':
  - type: text
    content: So Aaron said, “Take the gold rings from the ears of your wives and sons and daughters, and bring them to me.”
  '20':
  - type: text
    content: He took the calf they had made and burned it. Then he ground it into powder, threw it into the water, and forced the people to drink it.
  '21':
  - type: text
    content: Finally, he turned to Aaron and demanded, “What did these people do to you to make you bring such terrible sin upon them?”
  '22':
  - type: text
    content: '“Don’t get so upset, my lord,” Aaron replied. “You yourself know how evil these people are. '
  '23':
  - type: text
    content: 'They said to me, ‘Make us gods who will lead us. We don’t know what happened to this fellow Moses, who brought us here from the land of Egypt.’ '
  '24':
  - type: text
    content: So I told them, ‘Whoever has gold jewelry, take it off.’ When they brought it to me, I simply threw it into the fire—and out came this calf!”
  '25':
  - type: text
    content: Moses saw that Aaron had let the people get completely out of control, much to the amusement of their enemies.
  - type: note
    content: Or out of control, and they mocked anyone who opposed them. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'So he stood at the entrance to the camp and shouted, “All of you who are on the '
  - type: text
    content: Lord
  - type: text
    content: ’s side, come here and join me.” And all the Levites gathered around him.
  '27':
  - type: text
    content: 'Moses told them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Each of you, take your swords and go back and forth from one end of the camp to the other. Kill everyone—even your brothers, friends, and neighbors.” '
  '28':
  - type: text
    content: The Levites obeyed Moses’ command, and about 3,000 people died that day.
  '29':
  - type: text
    content: Then Moses told the Levites, “Today you have ordained yourselves
  - type: note
    content: As in Greek and Latin versions; Hebrew reads Today ordain yourselves.
  - type: text
    content: ' for the service of the '
  - type: text
    content: Lord
  - type: text
    content: ', for you obeyed him even though it meant killing your own sons and brothers. Today you have earned a blessing.”'
  - type: heading
    content: Moses Intercedes for Israel
  '3':
  - type: text
    content: 'All the people took the gold rings from their ears and brought them to Aaron. '
  '30':
  - type: text
    content: 'The next day Moses said to the people, “You have committed a terrible sin, but I will go back up to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the mountain. Perhaps I will be able to obtain forgiveness'
  - type: note
    content: Or to make atonement.
  - type: text
    content: ' for your sin.”'
  '31':
  - type: text
    content: 'So Moses returned to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Oh, what a terrible sin these people have committed. They have made gods of gold for themselves. '
  '32':
  - type: text
    content: But now, if you will only forgive their sin—but if not, erase my name from the record you have written!”
  '33':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' replied to Moses, “No, I will erase the name of everyone who has sinned against me. '
  '34':
  - type: text
    content: Now go, lead the people to the place I told you about. Look! My angel will lead the way before you. And when I come to call the people to account, I will certainly hold them responsible for their sins.”
  '35':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a great plague upon the people because they had worshiped the calf Aaron had made.'
  '4':
  - type: text
    content: Then Aaron took the gold, melted it down, and molded it into the shape of a calf. When the people saw it, they exclaimed, “O Israel, these are the gods who brought you out of the land of Egypt!”
  '5':
  - type: text
    content: 'Aaron saw how excited the people were, so he built an altar in front of the calf. Then he announced, “Tomorrow will be a festival to the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '6':
  - type: text
    content: The people got up early the next morning to sacrifice burnt offerings and peace offerings. After this, they celebrated with feasting and drinking, and they indulged in pagan revelry.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Quick! Go down the mountain! Your people whom you brought from the land of Egypt have corrupted themselves. '
  '8':
  - type: text
    content: How quickly they have turned away from the way I commanded them to live! They have melted down gold and made a calf, and they have bowed down and sacrificed to it. They are saying, ‘These are your gods, O Israel, who brought you out of the land of Egypt.’”
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I have seen how stubborn and rebellious these people are. '
