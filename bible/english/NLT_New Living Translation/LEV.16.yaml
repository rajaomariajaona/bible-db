document_id: LEV.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day of Atonement
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses after the death of Aaron’s two sons, who died after they entered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence and burned the wrong kind of fire before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Warn your brother, Aaron, not to enter the Most Holy Place behind the inner curtain whenever he chooses; if he does, he will die. For the Ark’s cover—the place of atonement—is there, and I myself am present in the cloud above the atonement cover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“When Aaron enters the sanctuary area, he must follow these instructions fully. He must bring a young bull for a sin offering and a ram for a burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He must put on his linen tunic and the linen undergarments worn next to his body. He must tie the linen sash around his waist and put the linen turban on his head. These are sacred garments, so he must bathe himself in water before he puts them on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aaron must take from the community of Israel two male goats for a sin offering and a ram for a burnt offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Aaron will present his own bull as a sin offering to purify himself and his family, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to make atonement for himself and his family; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 16:11, 17b, 24, 34.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he must take the two male goats and present them to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at the entrance of the Tabernacle.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:16, 17, 20, 23, 33.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He is to cast sacred lots to determine which goat will be reserved as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and which will carry the sins of the people to the wilderness of Azazel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aaron will then present as a sin offering the goat chosen by lot for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The other goat, the scapegoat chosen by lot to be sent away, will be kept alive, standing before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. When it is sent away to Azazel in the wilderness, the people will be purified and made right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wilderness, it will make atonement for the people.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Aaron will present his own bull as a sin offering to purify himself and his family, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. After he has slaughtered the bull as a sin offering, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'he will fill an incense burner with burning coals from the altar that stands before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Then he will take two handfuls of fragrant powdered incense and will carry the burner and the incense behind the inner curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence he will put the incense on the burning coals so that a cloud of incense will rise over the Ark’s cover—the place of atonement—that rests on the Ark of the Covenant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'that is above the Testimony. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew word for “testimony” refers to the terms of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ’s covenant with Israel as written on stone tablets, which were kept in the Ark, and also to the covenant itself.
    marker-yv: yv-n
  - type: text
    text: ' If he follows these instructions, he will not die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then he must take some of the blood of the bull, dip his finger in it, and sprinkle it on the east side of the atonement cover. He must sprinkle blood seven times with his finger in front of the atonement cover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Then Aaron must slaughter the first goat as a sin offering for the people and carry its blood behind the inner curtain. There he will sprinkle the goat’s blood over the atonement cover and in front of it, just as he did with the bull’s blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Through this process, he will purify
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'make atonement for; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 16:17a, 18, 20, 27, 33.
    marker-yv: yv-n
  - type: text
    text: ' the Most Holy Place, and he will do the same for the entire Tabernacle, because of the defiling sin and rebellion of the Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'No one else is allowed inside the Tabernacle when Aaron enters it for the purification ceremony in the Most Holy Place. No one may enter until he comes out again after purifying himself, his family, and all the congregation of Israel, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Then Aaron will come out to purify the altar that stands before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He will do this by taking some of the blood from the bull and the goat and putting it on each of the horns of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then he must sprinkle the blood with his finger seven times over the altar. In this way, he will cleanse it from Israel’s defilement and make it holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“When Aaron has finished purifying the Most Holy Place and the Tabernacle and the altar, he must present the live goat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He will lay both of his hands on the goat’s head and confess over it all the wickedness, rebellion, and sins of the people of Israel. In this way, he will transfer the people’s sins to the head of the goat. Then a man specially chosen for the task will drive the goat into the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: As the goat goes into the wilderness, it will carry all the people’s sins upon itself into a desolate land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“When Aaron goes back into the Tabernacle, he must take off the linen garments he was wearing when he entered the Most Holy Place, and he must leave the garments there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he must bathe himself with water in a sacred place, put on his regular garments, and go out to sacrifice a burnt offering for himself and a burnt offering for the people. Through this process, he will purify himself and the people, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He must then burn all the fat of the sin offering on the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “The man chosen to drive the scapegoat into the wilderness of Azazel must wash his clothes and bathe himself in water. Then he may return to the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“The bull and the goat presented as sin offerings, whose blood Aaron takes into the Most Holy Place for the purification ceremony, will be carried outside the camp. The animals’ hides, internal organs, and dung are all to be burned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The man who burns them must wash his clothes and bathe himself in water before returning to the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “On the tenth day of the appointed month in early autumn,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:29a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the tenth day of the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in September or October.
    marker-yv: yv-n
  - type: text
    text: ' you must deny yourselves.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:29b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'must fast; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:31.
    marker-yv: yv-n
  - type: text
    text: ' Neither native-born Israelites nor foreigners living among you may do any kind of work. This is a permanent law for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: On that day offerings of purification will be made for you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: atonement will be made for you, to purify you.
    marker-yv: yv-n
  - type: text
    text: ' and you will be purified in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence from all your sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'It will be a Sabbath day of complete rest for you, and you must deny yourselves. This is a permanent law for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: In future generations, the purification
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: atonement.
    marker-yv: yv-n
  - type: text
    text: ' ceremony will be performed by the priest who has been anointed and ordained to serve as high priest in place of his ancestor Aaron. He will put on the holy linen garments '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and purify the Most Holy Place, the Tabernacle, the altar, the priests, and the entire congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'This is a permanent law for you, to purify the people of Israel from their sins, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' once each year.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Moses followed all these instructions exactly as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
