document_id: EZK.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Coming of the End
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The end is here!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wherever you look—
- type: usfm
  marker: q1
  children:
  - type: text
    text: east, west, north, or south—
- type: usfm
  marker: q2
  children:
  - type: text
    text: your land is finished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: No hope remains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I will unleash my anger against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will call you to account
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all your detestable sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will turn my eyes away and show no pity.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will repay you for all your detestable sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disaster after disaster
- type: usfm
  marker: q2
  children:
  - type: text
    text: is coming your way!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The end has come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It has finally arrived.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your final doom is waiting!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O people of Israel, the day of your destruction is dawning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The time has come; the day of trouble is near.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shouts of anguish will be heard on the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Soon I will pour out my fury on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and unleash my anger against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will call you to account
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all your detestable sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will turn my eyes away and show no pity.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will repay you for all your detestable sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you will know that it is I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: who is striking the blow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “The day of judgment is here;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your destruction awaits!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people’s wickedness and pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: have blossomed to full flower.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Their violence has grown into a rod
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will beat them for their wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: None of these proud and wicked people will survive.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All their wealth and prestige will be swept away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Yes, the time has come;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day is here!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Buyers should not rejoice over bargains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor sellers grieve over losses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all of them will fall
- type: usfm
  marker: q2
  children:
  - type: text
    text: under my terrible anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Even if the merchants survive,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will never return to their business.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For what God has said applies to everyone—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will not be changed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one person whose life is twisted by sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: will ever recover.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Desolation of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The trumpet calls Israel’s army to mobilize,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one listens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my fury is against them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There is war outside the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and disease and famine within.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those outside the city walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be killed by enemy swords.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those inside the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: will die of famine and disease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The survivors who escape to the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: will moan like doves, weeping for their sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Their hands will hang limp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their knees will be weak as water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They will dress themselves in burlap;
- type: usfm
  marker: q2
  children:
  - type: text
    text: horror and shame will cover them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will shave their heads
- type: usfm
  marker: q2
  children:
  - type: text
    text: in sorrow and remorse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “They will throw their money in the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tossing it out like worthless trash.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their silver and gold won’t save them
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on that day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will neither satisfy nor feed them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for their greed can only trip them up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They were proud of their beautiful jewelry
- type: usfm
  marker: q2
  children:
  - type: text
    text: and used it to make detestable idols and vile images.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I will make all their wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: disgusting to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will give it as plunder to foreigners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the most wicked of nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will defile it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will turn my eyes from them
- type: usfm
  marker: q2
  children:
  - type: text
    text: as these robbers invade and defile my treasured land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Prepare chains for my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the land is bloodied by terrible crimes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem is filled with violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will bring the most ruthless of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: to occupy their homes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will break down their proud fortresses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and defile their sanctuaries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Terror and trembling will overcome my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will look for peace but not find it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Calamity will follow calamity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rumor will follow rumor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will look in vain
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a vision from the prophets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will receive no teaching from the priests
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no counsel from the leaders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The king and the prince will stand helpless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weeping in despair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the people’s hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: will tremble with fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: the evil they have done to others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will receive the punishment
- type: usfm
  marker: q2
  children:
  - type: text
    text: they so richly deserve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
