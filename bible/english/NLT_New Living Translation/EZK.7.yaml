document_id: EZK.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming of the End
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: “The day of judgment is here;
  - type: text
    content: your destruction awaits!
  - type: text
    content: The people’s wickedness and pride
  - type: text
    content: have blossomed to full flower.
  '11':
  - type: text
    content: Their violence has grown into a rod
  - type: text
    content: that will beat them for their wickedness.
  - type: text
    content: None of these proud and wicked people will survive.
  - type: text
    content: All their wealth and prestige will be swept away.
  '12':
  - type: text
    content: Yes, the time has come;
  - type: text
    content: the day is here!
  - type: text
    content: Buyers should not rejoice over bargains,
  - type: text
    content: nor sellers grieve over losses,
  - type: text
    content: for all of them will fall
  - type: text
    content: under my terrible anger.
  '13':
  - type: text
    content: Even if the merchants survive,
  - type: text
    content: they will never return to their business.
  - type: text
    content: For what God has said applies to everyone—
  - type: text
    content: it will not be changed!
  - type: text
    content: Not one person whose life is twisted by sin
  - type: text
    content: will ever recover.
  - type: heading
    content: The Desolation of Israel
  '14':
  - type: text
    content: “The trumpet calls Israel’s army to mobilize,
  - type: text
    content: but no one listens,
  - type: text
    content: for my fury is against them all.
  '15':
  - type: text
    content: There is war outside the city
  - type: text
    content: and disease and famine within.
  - type: text
    content: Those outside the city walls
  - type: text
    content: will be killed by enemy swords.
  - type: text
    content: Those inside the city
  - type: text
    content: will die of famine and disease.
  '16':
  - type: text
    content: The survivors who escape to the mountains
  - type: text
    content: will moan like doves, weeping for their sins.
  '17':
  - type: text
    content: Their hands will hang limp,
  - type: text
    content: their knees will be weak as water.
  '18':
  - type: text
    content: They will dress themselves in burlap;
  - type: text
    content: horror and shame will cover them.
  - type: text
    content: They will shave their heads
  - type: text
    content: in sorrow and remorse.
  '19':
  - type: text
    content: “They will throw their money in the streets,
  - type: text
    content: tossing it out like worthless trash.
  - type: text
    content: Their silver and gold won’t save them
  - type: text
    content: 'on that day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  - type: text
    content: It will neither satisfy nor feed them,
  - type: text
    content: for their greed can only trip them up.
  '2':
  - type: text
    content: '“Son of man, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to Israel:'
  - type: text
    content: “The end is here!
  - type: text
    content: Wherever you look—
  - type: text
    content: east, west, north, or south—
  - type: text
    content: your land is finished.
  '20':
  - type: text
    content: They were proud of their beautiful jewelry
  - type: text
    content: and used it to make detestable idols and vile images.
  - type: text
    content: Therefore, I will make all their wealth
  - type: text
    content: disgusting to them.
  '21':
  - type: text
    content: I will give it as plunder to foreigners,
  - type: text
    content: to the most wicked of nations,
  - type: text
    content: and they will defile it.
  '22':
  - type: text
    content: I will turn my eyes from them
  - type: text
    content: as these robbers invade and defile my treasured land.
  '23':
  - type: text
    content: “Prepare chains for my people,
  - type: text
    content: for the land is bloodied by terrible crimes.
  - type: text
    content: Jerusalem is filled with violence.
  '24':
  - type: text
    content: I will bring the most ruthless of nations
  - type: text
    content: to occupy their homes.
  - type: text
    content: I will break down their proud fortresses
  - type: text
    content: and defile their sanctuaries.
  '25':
  - type: text
    content: Terror and trembling will overcome my people.
  - type: text
    content: They will look for peace but not find it.
  '26':
  - type: text
    content: Calamity will follow calamity;
  - type: text
    content: rumor will follow rumor.
  - type: text
    content: They will look in vain
  - type: text
    content: for a vision from the prophets.
  - type: text
    content: They will receive no teaching from the priests
  - type: text
    content: and no counsel from the leaders.
  '27':
  - type: text
    content: The king and the prince will stand helpless,
  - type: text
    content: weeping in despair,
  - type: text
    content: and the people’s hands
  - type: text
    content: will tremble with fear.
  - type: text
    content: I will bring on them
  - type: text
    content: the evil they have done to others,
  - type: text
    content: and they will receive the punishment
  - type: text
    content: they so richly deserve.
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: No hope remains,
  - type: text
    content: for I will unleash my anger against you.
  - type: text
    content: I will call you to account
  - type: text
    content: for all your detestable sins.
  '4':
  - type: text
    content: I will turn my eyes away and show no pity.
  - type: text
    content: I will repay you for all your detestable sins.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: Disaster after disaster
  - type: text
    content: is coming your way!
  '6':
  - type: text
    content: The end has come.
  - type: text
    content: It has finally arrived.
  - type: text
    content: Your final doom is waiting!
  '7':
  - type: text
    content: O people of Israel, the day of your destruction is dawning.
  - type: text
    content: The time has come; the day of trouble is near.
  - type: text
    content: Shouts of anguish will be heard on the mountains,
  - type: text
    content: not shouts of joy.
  '8':
  - type: text
    content: Soon I will pour out my fury on you
  - type: text
    content: and unleash my anger against you.
  - type: text
    content: I will call you to account
  - type: text
    content: for all your detestable sins.
  '9':
  - type: text
    content: I will turn my eyes away and show no pity.
  - type: text
    content: I will repay you for all your detestable sins.
  - type: text
    content: 'Then you will know that it is I, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who is striking the blow.
