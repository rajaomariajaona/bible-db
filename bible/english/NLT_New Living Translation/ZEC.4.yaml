document_id: ZEC.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lampstand and Two Olive Trees
  - type: text
    content: 'Then the angel who had been talking with me returned and woke me, as though I had been asleep. '
  '10':
  - type: text
    content: 'Do not despise these small beginnings, for the '
  - type: text
    content: Lord
  - type: text
    content: ' rejoices to see the work begin, to see the plumb line in Zerubbabel’s hand.”'
  - type: text
    content: (The seven lamps
  - type: note
    content: Or The seven facets (see 3:9); Hebrew reads These seven.
  - type: text
    content: ' represent the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' that search all around the world.)'
  '11':
  - type: text
    content: 'Then I asked the angel, “What are these two olive trees on each side of the lampstand, '
  '12':
  - type: text
    content: and what are the two olive branches that pour out golden oil through two gold tubes?”
  '13':
  - type: text
    content: “Don’t you know?” he asked.
  - type: text
    content: “No, my lord,” I replied.
  '14':
  - type: text
    content: Then he said to me, “They represent the two anointed ones
  - type: note
    content: Or two heavenly beings; Hebrew reads two sons of fresh oil.
  - type: text
    content: ' who stand in the court of the Lord of all the earth.”'
  '2':
  - type: text
    content: “What do you see now?” he asked.
  - type: text
    content: 'I answered, “I see a solid gold lampstand with a bowl of oil on top of it. Around the bowl are seven lamps, each having seven spouts with wicks. '
  '3':
  - type: text
    content: 'And I see two olive trees, one on each side of the bowl.” '
  '4':
  - type: text
    content: Then I asked the angel, “What are these, my lord? What do they mean?”
  '5':
  - type: text
    content: “Don’t you know?” the angel asked.
  - type: text
    content: “No, my lord,” I replied.
  '6':
  - type: text
    content: 'Then he said to me, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to Zerubbabel: It is not by force nor by strength, but by my Spirit, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '7':
  - type: text
    content: 'Nothing, not even a mighty mountain, will stand in Zerubbabel’s way; it will become a level plain before him! And when Zerubbabel sets the final stone of the Temple in place, the people will shout: ‘May God bless it! May God bless it!’'
  - type: note
    content: Hebrew ‘Grace, grace to it.’
  - type: text
    content: ”
  '8':
  - type: text
    content: 'Then another message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '9':
  - type: text
    content: '“Zerubbabel is the one who laid the foundation of this Temple, and he will complete it. Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has sent me. '
