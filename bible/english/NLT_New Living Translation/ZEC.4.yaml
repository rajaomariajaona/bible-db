document_id: ZEC.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lampstand and Two Olive Trees
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the angel who had been talking with me returned and woke me, as though I had been asleep. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Do not despise these small beginnings, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rejoices to see the work begin, to see the plumb line in Zerubbabel’s hand.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: (The seven lamps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The seven facets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see 3:9); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: These seven.
      marker-yv: yv-n
    - type: text
      text: ' represent the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that search all around the world.)'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I asked the angel, “What are these two olive trees on each side of the lampstand, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: and what are the two olive branches that pour out golden oil through two gold tubes?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Don’t you know?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord,” I replied.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then he said to me, “They represent the two anointed ones
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'two heavenly beings; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two sons of fresh oil.
      marker-yv: yv-n
    - type: text
      text: ' who stand in the court of the Lord of all the earth.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What do you see now?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I answered, “I see a solid gold lampstand with a bowl of oil on top of it. Around the bowl are seven lamps, each having seven spouts with wicks. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I see two olive trees, one on each side of the bowl.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then I asked the angel, “What are these, my lord? What do they mean?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Don’t you know?” the angel asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord,” I replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then he said to me, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Zerubbabel: It is not by force nor by strength, but by my Spirit, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nothing, not even a mighty mountain, will stand in Zerubbabel’s way; it will become a level plain before him! And when Zerubbabel sets the final stone of the Temple in place, the people will shout: ‘May God bless it! May God bless it!’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘Grace, grace to it.’
      marker-yv: yv-n
    - type: text
      text: ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then another message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Zerubbabel is the one who laid the foundation of this Temple, and he will complete it. Then you will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies has sent me. '
