document_id: ISA.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will take his terrible, swift sword and punish Leviathan,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
      marker-yv: yv-n
    - type: text
      text: ' the swiftly moving serpent, the coiling, writhing serpent. He will kill the dragon of the sea.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The fortified towns will be silent and empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the houses abandoned, the streets overgrown with weeds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calves will graze there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chewing on twigs and branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The people are like the dead branches of a tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: broken off and used for kindling beneath the cooking pots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel is a foolish and stupid nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for its people have turned away from God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, the one who made them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will show them no pity or mercy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Yet the time will come when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will gather them together like handpicked grain. One by one he will gather them—from the Euphrates River'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
    - type: text
      text: ' in the east to the Brook of Egypt in the west. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'In that day the great trumpet will sound. Many who were dying in exile in Assyria and Egypt will return to Jerusalem to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on his holy mountain.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “In that day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing about the fruitful vineyard.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will watch over it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watering it carefully.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day and night I will watch so no one can harm it.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My anger will be gone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I find briers and thorns growing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will attack them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will burn them up—
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: unless they turn to me for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them make peace with me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, let them make peace with me.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The time is coming when Jacob’s descendants will take root.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel will bud and blossom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill the whole earth with fruit!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he struck her enemies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has he punished her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he punished them?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: No, but he exiled Israel to call her to account.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She was exiled from her land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though blown away in a storm from the east.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did this to purge Israel’s'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob’s. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 14:1.
      marker-yv: yv-n
    - type: text
      text: ' wickedness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take away all her sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a result, all the pagan altars will be crushed to dust.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No Asherah pole or pagan shrine will be left standing.
