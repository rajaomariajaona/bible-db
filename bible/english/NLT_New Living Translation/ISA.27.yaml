document_id: ISA.27,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will take his terrible, swift sword and punish Leviathan,'
  - type: note
    content: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: ' the swiftly moving serpent, the coiling, writhing serpent. He will kill the dragon of the sea.'
  '10':
  - type: text
    content: The fortified towns will be silent and empty,
  - type: text
    content: the houses abandoned, the streets overgrown with weeds.
  - type: text
    content: Calves will graze there,
  - type: text
    content: chewing on twigs and branches.
  '11':
  - type: text
    content: The people are like the dead branches of a tree,
  - type: text
    content: broken off and used for kindling beneath the cooking pots.
  - type: text
    content: Israel is a foolish and stupid nation,
  - type: text
    content: for its people have turned away from God.
  - type: text
    content: Therefore, the one who made them
  - type: text
    content: will show them no pity or mercy.
  '12':
  - type: text
    content: 'Yet the time will come when the '
  - type: text
    content: Lord
  - type: text
    content: ' will gather them together like handpicked grain. One by one he will gather them—from the Euphrates River'
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' in the east to the Brook of Egypt in the west. '
  '13':
  - type: text
    content: 'In that day the great trumpet will sound. Many who were dying in exile in Assyria and Egypt will return to Jerusalem to worship the '
  - type: text
    content: Lord
  - type: text
    content: ' on his holy mountain.'
  '2':
  - type: text
    content: “In that day,
  - type: text
    content: sing about the fruitful vineyard.
  '3':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will watch over it,'
  - type: text
    content: watering it carefully.
  - type: text
    content: Day and night I will watch so no one can harm it.
  '4':
  - type: text
    content: My anger will be gone.
  - type: text
    content: If I find briers and thorns growing,
  - type: text
    content: I will attack them;
  - type: text
    content: I will burn them up—
  '5':
  - type: text
    content: unless they turn to me for help.
  - type: text
    content: Let them make peace with me;
  - type: text
    content: yes, let them make peace with me.”
  '6':
  - type: text
    content: The time is coming when Jacob’s descendants will take root.
  - type: text
    content: Israel will bud and blossom
  - type: text
    content: and fill the whole earth with fruit!
  '7':
  - type: text
    content: 'Has the '
  - type: text
    content: Lord
  - type: text
    content: ' struck Israel'
  - type: text
    content: as he struck her enemies?
  - type: text
    content: Has he punished her
  - type: text
    content: as he punished them?
  '8':
  - type: text
    content: No, but he exiled Israel to call her to account.
  - type: text
    content: She was exiled from her land
  - type: text
    content: as though blown away in a storm from the east.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' did this to purge Israel’s'
  - type: note
    content: Hebrew Jacob’s. See note on 14:1.
  - type: text
    content: ' wickedness,'
  - type: text
    content: to take away all her sin.
  - type: text
    content: As a result, all the pagan altars will be crushed to dust.
  - type: text
    content: No Asherah pole or pagan shrine will be left standing.
