document_id: 2KI.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joash Repairs the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 12:1-21 are numbered 12:2-22 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Joash
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoash, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Joash; also in 12:2, 4, 6, 7, 18.
      marker-yv: yv-n
    - type: text
      text: ' began to rule over Judah in the seventh year of King Jehu’s reign in Israel. He reigned in Jerusalem forty years. His mother was Zibiah from Beersheba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the chest became full, the court secretary and the high priest counted the money that had been brought to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple and put it into bags. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they gave the money to the construction supervisors, who used it to pay the people working on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple—the carpenters, the builders, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the masons, and the stonecutters. They also used the money to buy the timber and the finished stone needed for repairing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple, and they paid any other expenses related to the Temple’s restoration.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The money brought to the Temple was not used for making silver bowls, lamp snuffers, basins, trumpets, or other articles of gold or silver for the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was paid to the workmen, who used it for the Temple repairs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No accounting of this money was required from the construction supervisors, because they were honest and trustworthy men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, the money that was contributed for guilt offerings and sin offerings was not brought into the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple. It was given to the priests for their own use.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The End of Joash’s Reign
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'About this time King Hazael of Aram went to war against Gath and captured it. Then he turned to attack Jerusalem. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'King Joash collected all the sacred objects that Jehoshaphat, Jehoram, and Ahaziah, the previous kings of Judah, had dedicated, along with what he himself had dedicated. He sent them all to Hazael, along with all the gold in the treasuries of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple and the royal palace. So Hazael called off his attack on Jerusalem.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events in Joash’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All his life Joash did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight because Jehoiada the priest instructed him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joash’s officers plotted against him and assassinated him at Beth-millo on the road to Silla. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The assassins were Jozacar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jozabad.
      marker-yv: yv-n
    - type: text
      text: ' son of Shimeath and Jehozabad son of Shomer—both trusted advisers. Joash was buried with his ancestors in the City of David. Then his son Amaziah became the next king.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Yet even so, he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day King Joash said to the priests, “Collect all the money brought as a sacred offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple, whether it is a regular assessment, a payment of vows, or a voluntary gift. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let the priests take some of that money to pay for whatever repairs are needed at the Temple.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But by the twenty-third year of Joash’s reign, the priests still had not repaired the Temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Joash called for Jehoiada and the other priests and asked them, “Why haven’t you repaired the Temple? Don’t use any more money for your own needs. From now on, it must all be spent on Temple repairs.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the priests agreed not to accept any more money from the people, and they also agreed to let others take responsibility for repairing the Temple.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoiada the priest bored a hole in the lid of a large chest and set it on the right-hand side of the altar at the entrance of the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The priests guarding the entrance put all of the people’s contributions into the chest. '
