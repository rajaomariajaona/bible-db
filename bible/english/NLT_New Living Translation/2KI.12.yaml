document_id: 2KI.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: text
    content: ' '
  - type: note
    content: Verses 12:1-21 are numbered 12:2-22 in Hebrew text.
  - type: text
    content: Joash
  - type: note
    content: Hebrew Jehoash, a variant spelling of Joash; also in 12:2, 4, 6, 7, 18.
  - type: text
    content: ' began to rule over Judah in the seventh year of King Jehu’s reign in Israel. He reigned in Jerusalem forty years. His mother was Zibiah from Beersheba. '
  '10':
  - type: text
    content: 'Whenever the chest became full, the court secretary and the high priest counted the money that had been brought to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and put it into bags. '
  '11':
  - type: text
    content: 'Then they gave the money to the construction supervisors, who used it to pay the people working on the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple—the carpenters, the builders, '
  '12':
  - type: text
    content: 'the masons, and the stonecutters. They also used the money to buy the timber and the finished stone needed for repairing the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple, and they paid any other expenses related to the Temple’s restoration.
  '13':
  - type: text
    content: 'The money brought to the Temple was not used for making silver bowls, lamp snuffers, basins, trumpets, or other articles of gold or silver for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'It was paid to the workmen, who used it for the Temple repairs. '
  '15':
  - type: text
    content: 'No accounting of this money was required from the construction supervisors, because they were honest and trustworthy men. '
  '16':
  - type: text
    content: 'However, the money that was contributed for guilt offerings and sin offerings was not brought into the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple. It was given to the priests for their own use.
  - type: heading
    content: The End of Joash’s Reign
  '17':
  - type: text
    content: 'About this time King Hazael of Aram went to war against Gath and captured it. Then he turned to attack Jerusalem. '
  '18':
  - type: text
    content: 'King Joash collected all the sacred objects that Jehoshaphat, Jehoram, and Ahaziah, the previous kings of Judah, had dedicated, along with what he himself had dedicated. He sent them all to Hazael, along with all the gold in the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple and the royal palace. So Hazael called off his attack on Jerusalem.
  '19':
  - type: text
    content: 'The rest of the events in Joash’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  '2':
  - type: text
    content: 'All his life Joash did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight because Jehoiada the priest instructed him. '
  '20':
  - type: text
    content: 'Joash’s officers plotted against him and assassinated him at Beth-millo on the road to Silla. '
  '21':
  - type: text
    content: The assassins were Jozacar
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads Jozabad.
  - type: text
    content: ' son of Shimeath and Jehozabad son of Shomer—both trusted advisers. Joash was buried with his ancestors in the City of David. Then his son Amaziah became the next king.'
  '3':
  - type: text
    content: Yet even so, he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there.
  '4':
  - type: text
    content: 'One day King Joash said to the priests, “Collect all the money brought as a sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, whether it is a regular assessment, a payment of vows, or a voluntary gift. '
  '5':
  - type: text
    content: Let the priests take some of that money to pay for whatever repairs are needed at the Temple.”
  '6':
  - type: text
    content: 'But by the twenty-third year of Joash’s reign, the priests still had not repaired the Temple. '
  '7':
  - type: text
    content: 'So King Joash called for Jehoiada and the other priests and asked them, “Why haven’t you repaired the Temple? Don’t use any more money for your own needs. From now on, it must all be spent on Temple repairs.” '
  '8':
  - type: text
    content: So the priests agreed not to accept any more money from the people, and they also agreed to let others take responsibility for repairing the Temple.
  '9':
  - type: text
    content: 'Then Jehoiada the priest bored a hole in the lid of a large chest and set it on the right-hand side of the altar at the entrance of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. The priests guarding the entrance put all of the people’s contributions into the chest. '
