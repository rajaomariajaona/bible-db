document_id: 2CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Vision and His Thorn in the Flesh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This boasting will do no good, but I must go on. I will reluctantly tell about visions and revelations from the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I know a man in Christ who.
    marker-yv: yv-n
  - type: text
    text: ' was caught up to the third heaven fourteen years ago. Whether I was in my body or out of my body, I don’t know—only God knows. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Yes, only God knows whether I was in my body or outside my body. But I do know '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: that I was caught up
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:3-4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'But I know such a man, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that he was caught up.
    marker-yv: yv-n
  - type: text
    text: ' to paradise and heard things so astounding that they cannot be expressed in words, things no human is allowed to tell.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'That experience is worth boasting about, but I’m not going to do it. I will boast only about my weaknesses. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If I wanted to boast, I would be no fool in doing so, because I would be telling the truth. But I won’t do it, because I don’t want anyone to give me credit beyond what they can see in my life or hear in my message, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: even though I have received such wonderful revelations from God. So to keep me from becoming proud, I was given a thorn in my flesh, a messenger from Satan to torment me and keep me from becoming proud.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Three different times I begged the Lord to take it away. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Each time he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My grace is all you need. My power works best in weakness.”
  - type: text
    text: ' So now I am glad to boast about my weaknesses, so that the power of Christ can work through me. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: That’s why I take pleasure in my weaknesses, and in the insults, hardships, persecutions, and troubles that I suffer for Christ. For when I am weak, then I am strong.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Concern for the Corinthians
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You have made me act like a fool. You ought to be writing commendations for me, for I am not at all inferior to these “super apostles,” even though I am nothing at all. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When I was with you, I certainly gave you proof that I am an apostle. For I patiently did many signs and wonders and miracles among you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The only thing I failed to do, which I do in the other churches, was to become a financial burden to you. Please forgive me for this wrong!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now I am coming to you for the third time, and I will not be a burden to you. I don’t want what you have—I want you. After all, children don’t provide for their parents. Rather, parents provide for their children. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will gladly spend myself and all I have for you, even though it seems that the more I love you, the less you love me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Some of you admit I was not a burden to you. But others still think I was sneaky and took advantage of you by trickery. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But how? Did any of the men I sent to you take advantage of you? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When I urged Titus to visit you and sent our other brother with him, did Titus take advantage of you? No! For we have the same spirit and walk in each other’s steps, doing things the same way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Perhaps you think we’re saying these things just to defend ourselves. No, we tell you this as Christ’s servants, and with God as our witness. Everything we do, dear friends, is to strengthen you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For I am afraid that when I come I won’t like what I find, and you won’t like my response. I am afraid that I will find quarreling, jealousy, anger, selfishness, slander, gossip, arrogance, and disorderly behavior. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Yes, I am afraid that when I come again, God will humble me in your presence. And I will be grieved because many of you have not given up your old sins. You have not repented of your impurity, sexual immorality, and eagerness for lustful pleasure.
