document_id: JDG.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Provides Wives for Benjamin
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The Israelites had vowed at Mizpah, “We will never give our daughters in marriage to a man from the tribe of Benjamin.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So the assembly sent 12,000 of their best warriors to Jabesh-gilead with orders to kill everyone there, including women and children. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “This is what you are to do,” they said. “Completely destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: ' all the males and every woman who is not a virgin.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Among the residents of Jabesh-gilead they found 400 young virgins who had never slept with a man, and they brought them to the camp at Shiloh in the land of Canaan.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The Israelite assembly sent a peace delegation to the remaining people of Benjamin who were living at the rock of Rimmon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the men of Benjamin returned to their homes, and the 400 women of Jabesh-gilead who had been spared were given to them as wives. But there were not enough women for all of them.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The people felt sorry for Benjamin because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had made this gap among the tribes of Israel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So the elders of the assembly asked, “How can we find wives for the few who remain, since the women of the tribe of Benjamin are dead? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'There must be heirs for the survivors so that an entire tribe of Israel is not wiped out. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But we cannot give them our own daughters in marriage because we have sworn with a solemn oath that anyone who does this will fall under God’s curse.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then they thought of the annual festival of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' held in Shiloh, south of Lebonah and north of Bethel, along the east side of the road that goes from Bethel to Shechem. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the people went to Bethel and sat in the presence of God until evening, weeping loudly and bitterly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They told the men of Benjamin who still needed wives, “Go and hide in the vineyards. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When you see the young women of Shiloh come out for their dances, rush out from the vineyards, and each of you can take one of them home to the land of Benjamin to be your wife! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And when their fathers and brothers come to us in protest, we will tell them, ‘Please be sympathetic. Let them have your daughters, for we didn’t find wives for all of them when we destroyed Jabesh-gilead. And you are not guilty of breaking the vow since you did not actually give your daughters to them in marriage.’”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So the men of Benjamin did as they were told. Each man caught one of the women as she danced in the celebration and carried her off to be his wife. They returned to their own land, and they rebuilt their towns and lived in them.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Then the people of Israel departed by tribes and families, and they returned to their own homes.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: In those days Israel had no king; all the people did whatever seemed right in their own eyes.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel,” they cried out, “why has this happened in Israel? Now one of our tribes is missing from Israel!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Early the next morning the people built an altar and presented their burnt offerings and peace offerings on it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then they said, “Who among the tribes of Israel did not join us at Mizpah when we held our assembly in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” At that time they had taken a solemn oath in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence, vowing that anyone who refused to come would be put to death.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The Israelites felt sorry for their brother Benjamin and said, “Today one of the tribes of Israel has been cut off. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'How can we find wives for the few who remain, since we have sworn by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' not to give them our daughters in marriage?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So they asked, “Who among the tribes of Israel did not join us at Mizpah when we assembled in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” And they discovered that no one from Jabesh-gilead had attended the assembly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For after they counted all the people, no one from Jabesh-gilead was present.
