type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Verse 9:1 is numbered 8:23 in Hebrew text.
  - type: text
    content: If only my head were a pool of water
  - type: text
    content: and my eyes a fountain of tears,
  - type: text
    content: I would weep day and night
  - type: text
    content: for all my people who have been slaughtered.
  '10':
  - type: text
    content: I will weep for the mountains
  - type: text
    content: and wail for the wilderness pastures.
  - type: text
    content: For they are desolate and empty of life;
  - type: text
    content: the lowing of cattle is heard no more;
  - type: text
    content: the birds and wild animals have all fled.
  '11':
  - type: text
    content: '“I will make Jerusalem into a heap of ruins,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “It will be a place haunted by jackals.
  - type: text
    content: The towns of Judah will be ghost towns,
  - type: text
    content: with no one living in them.”
  '12':
  - type: text
    content: 'Who is wise enough to understand all this? Who has been instructed by the '
  - type: text
    content: Lord
  - type: text
    content: ' and can explain it to others? Why has the land been so ruined that no one dares to travel through it?'
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replies, “This has happened because my people have abandoned my instructions; they have refused to obey what I said. '
  '14':
  - type: text
    content: 'Instead, they have stubbornly followed their own desires and worshiped the images of Baal, as their ancestors taught them. '
  '15':
  - type: text
    content: 'So now, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: Look! I will feed them with bitterness and give them poison to drink. '
  '16':
  - type: text
    content: I will scatter them around the world, in places they and their ancestors never heard of, and even there I will chase them with the sword until I have destroyed them completely.”
  - type: heading
    content: Weeping in Jerusalem
  '17':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “Consider all this, and call for the mourners.
  - type: text
    content: Send for the women who mourn at funerals.
  '18':
  - type: text
    content: Quick! Begin your weeping!
  - type: text
    content: Let the tears flow from your eyes.
  '19':
  - type: text
    content: Hear the people of Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' crying in despair,'
  - type: text
    content: ‘We are ruined! We are completely humiliated!
  - type: text
    content: We must leave our land,
  - type: text
    content: because our homes have been torn down.’”
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 9:2-26 are numbered 9:1-25 in Hebrew text.
  - type: text
    content: Oh, that I could go away and forget my people
  - type: text
    content: and live in a travelers’ shack in the desert.
  - type: text
    content: For they are all adulterers—
  - type: text
    content: a pack of treacherous liars.
  - type: heading
    content: Judgment for Disobedience
  '20':
  - type: text
    content: 'Listen, you women, to the words of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: open your ears to what he has to say.
  - type: text
    content: Teach your daughters to wail;
  - type: text
    content: teach one another how to lament.
  '21':
  - type: text
    content: For death has crept in through our windows
  - type: text
    content: and has entered our mansions.
  - type: text
    content: 'It has killed off the flower of our youth:'
  - type: text
    content: Children no longer play in the streets,
  - type: text
    content: and young men no longer gather in the squares.
  '22':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Bodies will be scattered across the fields like clumps of manure,
  - type: text
    content: like bundles of grain after the harvest.
  - type: text
    content: No one will be left to bury them.”
  '23':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Don’t let the wise boast in their wisdom,
  - type: text
    content: or the powerful boast in their power,
  - type: text
    content: or the rich boast in their riches.
  '24':
  - type: text
    content: But those who wish to boast
  - type: text
    content: 'should boast in this alone:'
  - type: text
    content: 'that they truly know me and understand that I am the '
  - type: text
    content: Lord
  - type: text
    content: who demonstrates unfailing love
  - type: text
    content: and who brings justice and righteousness to the earth,
  - type: text
    content: and that I delight in these things.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '25':
  - type: text
    content: '“A time is coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when I will punish all those who are circumcised in body but not in spirit— '
  '26':
  - type: text
    content: the Egyptians, Edomites, Ammonites, Moabites, the people who live in the desert in remote places,
  - type: note
    content: Or in the desert and clip the corners of their hair.
  - type: text
    content: ' and yes, even the people of Judah. And like all these pagan nations, the people of Israel also have uncircumcised hearts.”'
  '3':
  - type: text
    content: “My people bend their tongues like bows
  - type: text
    content: to shoot out lies.
  - type: text
    content: They refuse to stand up for the truth.
  - type: text
    content: They only go from bad to worse.
  - type: text
    content: They do not know me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “Beware of your neighbor!
  - type: text
    content: Don’t even trust your brother!
  - type: text
    content: For brother takes advantage of brother,
  - type: text
    content: and friend slanders friend.
  '5':
  - type: text
    content: They all fool and defraud each other;
  - type: text
    content: no one tells the truth.
  - type: text
    content: With practiced tongues they tell lies;
  - type: text
    content: they wear themselves out with all their sinning.
  '6':
  - type: text
    content: They pile lie upon lie
  - type: text
    content: and utterly refuse to acknowledge me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “See, I will melt them down in a crucible
  - type: text
    content: and test them like metal.
  - type: text
    content: What else can I do with my people?
  - type: note
    content: Hebrew with the daughter of my people? Greek version reads with the evil daughter of my people?
  '8':
  - type: text
    content: For their tongues shoot lies like poisoned arrows.
  - type: text
    content: They speak friendly words to their neighbors
  - type: text
    content: while scheming in their heart to kill them.
  '9':
  - type: text
    content: 'Should I not punish them for this?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself against such a nation?”
