document_id: JER.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 9:1 is numbered 8:23 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: If only my head were a pool of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my eyes a fountain of tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would weep day and night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all my people who have been slaughtered.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will weep for the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wail for the wilderness pastures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are desolate and empty of life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lowing of cattle is heard no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the birds and wild animals have all fled.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will make Jerusalem into a heap of ruins,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “It will be a place haunted by jackals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The towns of Judah will be ghost towns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one living in them.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who is wise enough to understand all this? Who has been instructed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and can explain it to others? Why has the land been so ruined that no one dares to travel through it?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replies, “This has happened because my people have abandoned my instructions; they have refused to obey what I said. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, they have stubbornly followed their own desires and worshiped the images of Baal, as their ancestors taught them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, the God of Israel, says: Look! I will feed them with bitterness and give them poison to drink. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will scatter them around the world, in places they and their ancestors never heard of, and even there I will chase them with the sword until I have destroyed them completely.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Weeping in Jerusalem
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Consider all this, and call for the mourners.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Send for the women who mourn at funerals.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quick! Begin your weeping!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the tears flow from your eyes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the people of Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' crying in despair,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘We are ruined! We are completely humiliated!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We must leave our land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because our homes have been torn down.’”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 9:2-26 are numbered 9:1-25 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Oh, that I could go away and forget my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and live in a travelers’ shack in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are all adulterers—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a pack of treacherous liars.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment for Disobedience
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, you women, to the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: open your ears to what he has to say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach your daughters to wail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach one another how to lament.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For death has crept in through our windows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has entered our mansions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It has killed off the flower of our youth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Children no longer play in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and young men no longer gather in the squares.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Bodies will be scattered across the fields like clumps of manure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like bundles of grain after the harvest.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will be left to bury them.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t let the wise boast in their wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the powerful boast in their power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the rich boast in their riches.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who wish to boast
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'should boast in this alone:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that they truly know me and understand that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who demonstrates unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who brings justice and righteousness to the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and that I delight in these things.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“A time is coming,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when I will punish all those who are circumcised in body but not in spirit— '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Egyptians, Edomites, Ammonites, Moabites, the people who live in the desert in remote places,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the desert and clip the corners of their hair.
      marker-yv: yv-n
    - type: text
      text: ' and yes, even the people of Judah. And like all these pagan nations, the people of Israel also have uncircumcised hearts.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My people bend their tongues like bows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to shoot out lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They refuse to stand up for the truth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They only go from bad to worse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not know me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Beware of your neighbor!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t even trust your brother!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For brother takes advantage of brother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and friend slanders friend.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all fool and defraud each other;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one tells the truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With practiced tongues they tell lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they wear themselves out with all their sinning.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pile lie upon lie
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and utterly refuse to acknowledge me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I will melt them down in a crucible
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test them like metal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What else can I do with my people?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with the daughter of my people? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with the evil daughter of my people?
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For their tongues shoot lies like poisoned arrows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak friendly words to their neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while scheming in their heart to kill them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Should I not punish them for this?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Should I not avenge myself against such a nation?”
