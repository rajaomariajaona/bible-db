document_id: JOB.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Continues to Defend His Innocence
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “My spirit is crushed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my life is nearly snuffed out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The grave is ready to receive me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I am surrounded by mockers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I watch how bitterly they taunt me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “You must defend my innocence, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since no one else will stand up for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have closed their minds to understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but do not let them triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They betray their friends for their own advantage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so let their children faint with hunger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “God has made a mockery of me among the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they spit in my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My eyes are swollen with weeping,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am but a shadow of my former self.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The virtuous are horrified when they see me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The innocent rise up against the ungodly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The righteous keep moving forward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those with clean hands become stronger and stronger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “As for all of you, come back with a better argument,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though I still won’t find a wise man among you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My days are over.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My hopes have disappeared.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart’s desires are broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: These men say that night is day;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they claim that the darkness is light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: What if I go to the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to Sheol; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 17:16.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make my bed in darkness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: What if I call the grave my father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the maggot my mother or my sister?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Where then is my hope?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can anyone find it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: No, my hope will go down with me to the grave.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We will rest together in the dust!”
