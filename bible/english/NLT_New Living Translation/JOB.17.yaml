document_id: JOB.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Continues to Defend His Innocence
  - type: text
    content: “My spirit is crushed,
  - type: text
    content: and my life is nearly snuffed out.
  - type: text
    content: The grave is ready to receive me.
  '10':
  - type: text
    content: “As for all of you, come back with a better argument,
  - type: text
    content: though I still won’t find a wise man among you.
  '11':
  - type: text
    content: My days are over.
  - type: text
    content: My hopes have disappeared.
  - type: text
    content: My heart’s desires are broken.
  '12':
  - type: text
    content: These men say that night is day;
  - type: text
    content: they claim that the darkness is light.
  '13':
  - type: text
    content: What if I go to the grave
  - type: note
    content: Hebrew to Sheol; also in 17:16.
  - type: text
    content: and make my bed in darkness?
  '14':
  - type: text
    content: What if I call the grave my father,
  - type: text
    content: and the maggot my mother or my sister?
  '15':
  - type: text
    content: Where then is my hope?
  - type: text
    content: Can anyone find it?
  '16':
  - type: text
    content: No, my hope will go down with me to the grave.
  - type: text
    content: We will rest together in the dust!”
  '2':
  - type: text
    content: I am surrounded by mockers.
  - type: text
    content: I watch how bitterly they taunt me.
  '3':
  - type: text
    content: “You must defend my innocence, O God,
  - type: text
    content: since no one else will stand up for me.
  '4':
  - type: text
    content: You have closed their minds to understanding,
  - type: text
    content: but do not let them triumph.
  '5':
  - type: text
    content: They betray their friends for their own advantage,
  - type: text
    content: so let their children faint with hunger.
  '6':
  - type: text
    content: “God has made a mockery of me among the people;
  - type: text
    content: they spit in my face.
  '7':
  - type: text
    content: My eyes are swollen with weeping,
  - type: text
    content: and I am but a shadow of my former self.
  '8':
  - type: text
    content: The virtuous are horrified when they see me.
  - type: text
    content: The innocent rise up against the ungodly.
  '9':
  - type: text
    content: The righteous keep moving forward,
  - type: text
    content: and those with clean hands become stronger and stronger.
