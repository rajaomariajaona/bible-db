document_id: JOB.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Continues to Defend His Innocence
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My spirit is crushed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my life is nearly snuffed out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The grave is ready to receive me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As for all of you, come back with a better argument,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I still won’t find a wise man among you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My days are over.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My hopes have disappeared.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart’s desires are broken.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These men say that night is day;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they claim that the darkness is light.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What if I go to the grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to Sheol; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 17:16.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make my bed in darkness?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What if I call the grave my father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the maggot my mother or my sister?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where then is my hope?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can anyone find it?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, my hope will go down with me to the grave.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will rest together in the dust!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am surrounded by mockers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I watch how bitterly they taunt me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You must defend my innocence, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since no one else will stand up for me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have closed their minds to understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but do not let them triumph.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They betray their friends for their own advantage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so let their children faint with hunger.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God has made a mockery of me among the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they spit in my face.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes are swollen with weeping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am but a shadow of my former self.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The virtuous are horrified when they see me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The innocent rise up against the ungodly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous keep moving forward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those with clean hands become stronger and stronger.
