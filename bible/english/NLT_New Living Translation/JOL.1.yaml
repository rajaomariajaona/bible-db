document_id: JOL.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this message to Joel son of Pethuel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mourning over the Locust Plague
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The fields are ruined,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the land is stripped bare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grain is destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the grapes have shriveled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the olive oil is gone.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Despair, all you farmers!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail, all you vine growers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep, because the wheat and barley—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the crops of the field—are ruined.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The grapevines have dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fig trees have withered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pomegranate trees, palm trees, and apple trees—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the fruit trees—have dried up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the people’s joy has dried up with them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dress yourselves in burlap and weep, you priests!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail, you who serve before the altar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, spend the night in burlap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you ministers of my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there is no grain or wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to offer at the Temple of your God.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Announce a time of fasting;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: call the people together for a solemn meeting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring the leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the people of the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'into the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cry out to him there.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the day when destruction comes from the Almighty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How terrible that day will be!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Our food disappears before our very eyes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No joyful celebrations are held in the house of our God.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The seeds die in the parched ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the grain crops fail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The barns stand empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and granaries are abandoned.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: How the animals moan with hunger!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The herds of cattle wander about confused,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have no pasture.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flocks of sheep and goats bleat in misery.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help us!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fire has consumed the wilderness pastures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flames have burned up all the trees.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear this, you leaders of the people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen, all who live in the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In all your history,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has anything like this happened before?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Even the wild animals cry out to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because the streams have dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fire has consumed the wilderness pastures.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tell your children about it in the years to come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let your children tell their children.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pass the story down from generation to generation.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: After the cutting locusts finished eating the crops,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the swarming locusts took what was left!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After them came the hopping locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then the stripping locusts,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The precise identification of the four kinds of locusts mentioned here is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' too!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Wake up, you drunkards, and weep!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail, all you wine-drinkers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the grapes are ruined,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your sweet wine is gone.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A vast army of locusts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A nation.
      marker-yv: yv-n
    - type: text
      text: ' has invaded my land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a terrible army too numerous to count.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its teeth are like lions’ teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its fangs like those of a lioness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: It has destroyed my grapevines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ruined my fig trees,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stripping their bark and destroying it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving the branches white and bare.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Weep like a bride dressed in black,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mourning the death of her husband.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For there is no grain or wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to offer at the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the priests are in mourning.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The ministers of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are weeping.'
