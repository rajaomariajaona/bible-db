document_id: JOL.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Joel son of Pethuel.'
  - type: heading
    content: Mourning over the Locust Plague
  '10':
  - type: text
    content: The fields are ruined,
  - type: text
    content: the land is stripped bare.
  - type: text
    content: The grain is destroyed,
  - type: text
    content: the grapes have shriveled,
  - type: text
    content: and the olive oil is gone.
  '11':
  - type: text
    content: Despair, all you farmers!
  - type: text
    content: Wail, all you vine growers!
  - type: text
    content: Weep, because the wheat and barley—
  - type: text
    content: all the crops of the field—are ruined.
  '12':
  - type: text
    content: The grapevines have dried up,
  - type: text
    content: and the fig trees have withered.
  - type: text
    content: The pomegranate trees, palm trees, and apple trees—
  - type: text
    content: all the fruit trees—have dried up.
  - type: text
    content: And the people’s joy has dried up with them.
  '13':
  - type: text
    content: Dress yourselves in burlap and weep, you priests!
  - type: text
    content: Wail, you who serve before the altar!
  - type: text
    content: Come, spend the night in burlap,
  - type: text
    content: you ministers of my God.
  - type: text
    content: For there is no grain or wine
  - type: text
    content: to offer at the Temple of your God.
  '14':
  - type: text
    content: Announce a time of fasting;
  - type: text
    content: call the people together for a solemn meeting.
  - type: text
    content: Bring the leaders
  - type: text
    content: and all the people of the land
  - type: text
    content: 'into the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: and cry out to him there.
  '15':
  - type: text
    content: 'The day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near,'
  - type: text
    content: the day when destruction comes from the Almighty.
  - type: text
    content: How terrible that day will be!
  '16':
  - type: text
    content: Our food disappears before our very eyes.
  - type: text
    content: No joyful celebrations are held in the house of our God.
  '17':
  - type: text
    content: The seeds die in the parched ground,
  - type: text
    content: and the grain crops fail.
  - type: text
    content: The barns stand empty,
  - type: text
    content: and granaries are abandoned.
  '18':
  - type: text
    content: How the animals moan with hunger!
  - type: text
    content: The herds of cattle wander about confused,
  - type: text
    content: because they have no pasture.
  - type: text
    content: The flocks of sheep and goats bleat in misery.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', help us!'
  - type: text
    content: The fire has consumed the wilderness pastures,
  - type: text
    content: and flames have burned up all the trees.
  '2':
  - type: text
    content: Hear this, you leaders of the people.
  - type: text
    content: Listen, all who live in the land.
  - type: text
    content: In all your history,
  - type: text
    content: has anything like this happened before?
  '20':
  - type: text
    content: Even the wild animals cry out to you
  - type: text
    content: because the streams have dried up,
  - type: text
    content: and fire has consumed the wilderness pastures.
  '3':
  - type: text
    content: Tell your children about it in the years to come,
  - type: text
    content: and let your children tell their children.
  - type: text
    content: Pass the story down from generation to generation.
  '4':
  - type: text
    content: After the cutting locusts finished eating the crops,
  - type: text
    content: the swarming locusts took what was left!
  - type: text
    content: After them came the hopping locusts,
  - type: text
    content: and then the stripping locusts,
  - type: note
    content: The precise identification of the four kinds of locusts mentioned here is uncertain.
  - type: text
    content: ' too!'
  '5':
  - type: text
    content: Wake up, you drunkards, and weep!
  - type: text
    content: Wail, all you wine-drinkers!
  - type: text
    content: All the grapes are ruined,
  - type: text
    content: and all your sweet wine is gone.
  '6':
  - type: text
    content: A vast army of locusts
  - type: note
    content: Hebrew A nation.
  - type: text
    content: ' has invaded my land,'
  - type: text
    content: a terrible army too numerous to count.
  - type: text
    content: Its teeth are like lions’ teeth,
  - type: text
    content: its fangs like those of a lioness.
  '7':
  - type: text
    content: It has destroyed my grapevines
  - type: text
    content: and ruined my fig trees,
  - type: text
    content: stripping their bark and destroying it,
  - type: text
    content: leaving the branches white and bare.
  '8':
  - type: text
    content: Weep like a bride dressed in black,
  - type: text
    content: mourning the death of her husband.
  '9':
  - type: text
    content: For there is no grain or wine
  - type: text
    content: 'to offer at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: So the priests are in mourning.
  - type: text
    content: 'The ministers of the '
  - type: text
    content: Lord
  - type: text
    content: ' are weeping.'
