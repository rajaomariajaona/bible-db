document_id: 2SA.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Avenges the Gibeonites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a famine during David’s reign that lasted for three years, so David asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' about it. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “The famine has come because Saul and his family are guilty of murdering the Gibeonites.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the king summoned the Gibeonites. They were not part of Israel but were all that was left of the nation of the Amorites. The people of Israel had sworn not to kill them, but Saul, in his zeal for Israel and Judah, had tried to wipe them out. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David asked them, “What can I do for you? How can I make amends so that you will bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s people again?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Well, money can’t settle this matter between us and the family of Saul,” the Gibeonites replied. “Neither can we demand the life of anyone in Israel.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What can I do then?” David asked. “Just tell me and I will do it for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then they replied, “It was Saul who planned to destroy us, to keep us from having any place at all in the territory of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So let seven of Saul’s sons be handed over to us, and we will execute them before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at Gibeon, on the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 21:9); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'at Gibeah of Saul, the chosen of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“All right,” the king said, “I will do it.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The king spared Jonathan’s son Mephibosheth,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mephibosheth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is another name for Merib-baal.
    marker-yv: yv-n
  - type: text
    text: ' who was Saul’s grandson, because of the oath David and Jonathan had sworn before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But he gave them Saul’s two sons Armoni and Mephibosheth, whose mother was Rizpah daughter of Aiah. He also gave them the five sons of Saul’s daughter Merab,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in a few Hebrew and Greek manuscripts and Syriac version (see also 1 Sam 18:19); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Michal.
    marker-yv: yv-n
  - type: text
    text: ' the wife of Adriel son of Barzillai from Meholah. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The men of Gibeon executed them on the mountain before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . So all seven of them died together at the beginning of the barley harvest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Rizpah daughter of Aiah, the mother of two of the men, spread burlap on a rock and stayed there the entire harvest season. She prevented the scavenger birds from tearing at their bodies during the day and stopped wild animals from eating them at night. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When David learned what Rizpah, Saul’s concubine, had done, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'he went to the people of Jabesh-gilead and retrieved the bones of Saul and his son Jonathan. (When the Philistines had killed Saul and Jonathan on Mount Gilboa, the people of Jabesh-gilead stole their bodies from the public square of Beth-shan, where the Philistines had hung them.) '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So David obtained the bones of Saul and Jonathan, as well as the bones of the men the Gibeonites had executed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the king ordered that they bury the bones in the tomb of Kish, Saul’s father, at the town of Zela in the land of Benjamin. After that, God ended the famine in the land.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Battles against Philistine Giants
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Once again the Philistines were at war with Israel. And when David and his men were in the thick of battle, David became weak and exhausted. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ishbi-benob was a descendant of the giants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a descendant of the Rapha; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 21:18, 20, 22.
    marker-yv: yv-n
  - type: text
    text: ; his bronze spearhead weighed more than seven pounds,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '300 [shekels] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.4 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' and he was armed with a new sword. He had cornered David and was about to kill him. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Abishai son of Zeruiah came to David’s rescue and killed the Philistine. Then David’s men declared, “You are not going out to battle with us again! Why risk snuffing out the light of Israel?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: After this, there was another battle against the Philistines at Gob. As they fought, Sibbecai from Hushah killed Saph, another descendant of the giants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: During another battle at Gob, Elhanan son of Jair
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:19a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 20:5; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of Jaare-oregim.
    marker-yv: yv-n
  - type: text
    text: ' from Bethlehem killed the brother of Goliath of Gath.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:19b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 20:5; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: killed Goliath of Gath.
    marker-yv: yv-n
  - type: text
    text: ' The handle of his spear was as thick as a weaver’s beam!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In another battle with the Philistines at Gath, they encountered a huge man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 20:6; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a Midianite.
    marker-yv: yv-n
  - type: text
    text: ' with six fingers on each hand and six toes on each foot, twenty-four in all, who was also a descendant of the giants. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But when he defied and taunted Israel, he was killed by Jonathan, the son of David’s brother Shimea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 20:7; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shimei, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Shimea.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These four Philistines were descendants of the giants of Gath, but David and his warriors killed them.
