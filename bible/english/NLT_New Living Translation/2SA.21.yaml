document_id: 2SA.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Avenges the Gibeonites
  - type: text
    content: 'There was a famine during David’s reign that lasted for three years, so David asked the '
  - type: text
    content: Lord
  - type: text
    content: ' about it. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “The famine has come because Saul and his family are guilty of murdering the Gibeonites.”'
  '10':
  - type: text
    content: 'Then Rizpah daughter of Aiah, the mother of two of the men, spread burlap on a rock and stayed there the entire harvest season. She prevented the scavenger birds from tearing at their bodies during the day and stopped wild animals from eating them at night. '
  '11':
  - type: text
    content: 'When David learned what Rizpah, Saul’s concubine, had done, '
  '12':
  - type: text
    content: 'he went to the people of Jabesh-gilead and retrieved the bones of Saul and his son Jonathan. (When the Philistines had killed Saul and Jonathan on Mount Gilboa, the people of Jabesh-gilead stole their bodies from the public square of Beth-shan, where the Philistines had hung them.) '
  '13':
  - type: text
    content: So David obtained the bones of Saul and Jonathan, as well as the bones of the men the Gibeonites had executed.
  '14':
  - type: text
    content: Then the king ordered that they bury the bones in the tomb of Kish, Saul’s father, at the town of Zela in the land of Benjamin. After that, God ended the famine in the land.
  - type: heading
    content: Battles against Philistine Giants
  '15':
  - type: text
    content: 'Once again the Philistines were at war with Israel. And when David and his men were in the thick of battle, David became weak and exhausted. '
  '16':
  - type: text
    content: Ishbi-benob was a descendant of the giants
  - type: note
    content: Or a descendant of the Rapha; also in 21:18, 20, 22.
  - type: text
    content: ; his bronze spearhead weighed more than seven pounds,
  - type: note
    content: Hebrew 300 [shekels] [3.4 kilograms].
  - type: text
    content: ' and he was armed with a new sword. He had cornered David and was about to kill him. '
  '17':
  - type: text
    content: But Abishai son of Zeruiah came to David’s rescue and killed the Philistine. Then David’s men declared, “You are not going out to battle with us again! Why risk snuffing out the light of Israel?”
  '18':
  - type: text
    content: After this, there was another battle against the Philistines at Gob. As they fought, Sibbecai from Hushah killed Saph, another descendant of the giants.
  '19':
  - type: text
    content: During another battle at Gob, Elhanan son of Jair
  - type: note
    content: As in parallel text at 1 Chr 20:5; Hebrew reads son of Jaare-oregim.
  - type: text
    content: ' from Bethlehem killed the brother of Goliath of Gath.'
  - type: note
    content: As in parallel text at 1 Chr 20:5; Hebrew reads killed Goliath of Gath.
  - type: text
    content: ' The handle of his spear was as thick as a weaver’s beam!'
  '2':
  - type: text
    content: 'So the king summoned the Gibeonites. They were not part of Israel but were all that was left of the nation of the Amorites. The people of Israel had sworn not to kill them, but Saul, in his zeal for Israel and Judah, had tried to wipe them out. '
  '20':
  - type: text
    content: In another battle with the Philistines at Gath, they encountered a huge man
  - type: note
    content: As in parallel text at 1 Chr 20:6; Hebrew reads a Midianite.
  - type: text
    content: ' with six fingers on each hand and six toes on each foot, twenty-four in all, who was also a descendant of the giants. '
  '21':
  - type: text
    content: But when he defied and taunted Israel, he was killed by Jonathan, the son of David’s brother Shimea.
  - type: note
    content: As in parallel text at 1 Chr 20:7; Hebrew reads Shimei, a variant spelling of Shimea.
  '22':
  - type: text
    content: These four Philistines were descendants of the giants of Gath, but David and his warriors killed them.
  '3':
  - type: text
    content: 'David asked them, “What can I do for you? How can I make amends so that you will bless the '
  - type: text
    content: Lord
  - type: text
    content: ’s people again?”
  '4':
  - type: text
    content: “Well, money can’t settle this matter between us and the family of Saul,” the Gibeonites replied. “Neither can we demand the life of anyone in Israel.”
  - type: text
    content: “What can I do then?” David asked. “Just tell me and I will do it for you.”
  '5':
  - type: text
    content: 'Then they replied, “It was Saul who planned to destroy us, to keep us from having any place at all in the territory of Israel. '
  '6':
  - type: text
    content: 'So let seven of Saul’s sons be handed over to us, and we will execute them before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Gibeon, on the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: As in Greek version (see also 21:9); Hebrew reads at Gibeah of Saul, the chosen of the Lord.
  - type: text
    content: ”
  - type: text
    content: '“All right,” the king said, “I will do it.” '
  '7':
  - type: text
    content: The king spared Jonathan’s son Mephibosheth,
  - type: note
    content: Mephibosheth is another name for Merib-baal.
  - type: text
    content: ' who was Saul’s grandson, because of the oath David and Jonathan had sworn before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: But he gave them Saul’s two sons Armoni and Mephibosheth, whose mother was Rizpah daughter of Aiah. He also gave them the five sons of Saul’s daughter Merab,
  - type: note
    content: As in a few Hebrew and Greek manuscripts and Syriac version (see also 1 Sam 18:19); most Hebrew manuscripts read Michal.
  - type: text
    content: ' the wife of Adriel son of Barzillai from Meholah. '
  '9':
  - type: text
    content: 'The men of Gibeon executed them on the mountain before the '
  - type: text
    content: Lord
  - type: text
    content: . So all seven of them died together at the beginning of the barley harvest.
