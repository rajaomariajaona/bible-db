document_id: ISA.59
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warnings against Sin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Listen! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s arm is not too weak to save you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor is his ear too deaf to hear you call.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It’s your sins that have cut you off from God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of your sins, he has turned away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will not listen anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your hands are the hands of murderers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your fingers are filthy with sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your lips are full of lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your mouth spews corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: No one cares about being fair and honest.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The people’s lawsuits are based on lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They conceive evil deeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then give birth to sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They hatch deadly snakes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and weave spiders’ webs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever eats their eggs will die;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever cracks them will hatch a viper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their webs can’t be made into clothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nothing they do is productive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All their activity is filled with sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and violence is their trademark.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their feet run to do evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they rush to commit murder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They think only about sinning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Misery and destruction always follow them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They don’t know where to find peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: or what it means to be just and good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have mapped out crooked roads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one who follows them knows a moment’s peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So there is no justice among us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we know nothing about right living.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We look for light but find only darkness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We look for bright skies but walk in gloom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: We grope like the blind along a wall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feeling our way like people without eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even at brightest noontime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we stumble as though it were dark.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among the living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we are like the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: We growl like hungry bears;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we moan like mournful doves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We look for justice, but it never comes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We look for rescue, but it is far away from us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For our sins are piled up before God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and testify against us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, we know what sinners we are.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We know we have rebelled and have denied the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have turned our backs on our God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We know how unfair and oppressive we have been,
- type: usfm
  marker: q2
  children:
  - type: text
    text: carefully planning our deceitful lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Our courts oppose the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and justice is nowhere to be found.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Truth stumbles in the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and honesty has been outlawed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Yes, truth is gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and anyone who renounces evil is attacked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' looked and was displeased'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to find there was no justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He was amazed to see that no one intervened
- type: usfm
  marker: q2
  children:
  - type: text
    text: to help the oppressed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he himself stepped in to save them with his strong arm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his justice sustained him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He put on righteousness as his body armor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and placed the helmet of salvation on his head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He clothed himself with a robe of vengeance
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wrapped himself in a cloak of divine passion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He will repay his enemies for their evil deeds.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His fury will fall on his foes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will pay them back even to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In the west, people will respect the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the east, they will glorify him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he will come like a raging flood tide
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'driven by the breath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'When the enemy comes like a raging flood tide, / the Spirit of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' will drive him back.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “The Redeemer will come to Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: to buy back those in Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: who have turned from their sins,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The Redeemer will come to Zion / to buy back those in Jacob / who have turned from their sins. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The one who rescues will come on behalf of Zion, / and he will turn Jacob away from ungodliness. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 11:26.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“And this is my covenant with them,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “My Spirit will not leave them, and neither will these words I have given you. They will be on your lips and on the lips of your children and your children’s children forever. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
