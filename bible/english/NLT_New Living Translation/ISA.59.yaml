document_id: ISA.59,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings against Sin
  - type: text
    content: 'Listen! The '
  - type: text
    content: Lord
  - type: text
    content: ’s arm is not too weak to save you,
  - type: text
    content: nor is his ear too deaf to hear you call.
  '10':
  - type: text
    content: We grope like the blind along a wall,
  - type: text
    content: feeling our way like people without eyes.
  - type: text
    content: Even at brightest noontime,
  - type: text
    content: we stumble as though it were dark.
  - type: text
    content: Among the living,
  - type: text
    content: we are like the dead.
  '11':
  - type: text
    content: We growl like hungry bears;
  - type: text
    content: we moan like mournful doves.
  - type: text
    content: We look for justice, but it never comes.
  - type: text
    content: We look for rescue, but it is far away from us.
  '12':
  - type: text
    content: For our sins are piled up before God
  - type: text
    content: and testify against us.
  - type: text
    content: Yes, we know what sinners we are.
  '13':
  - type: text
    content: 'We know we have rebelled and have denied the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: We have turned our backs on our God.
  - type: text
    content: We know how unfair and oppressive we have been,
  - type: text
    content: carefully planning our deceitful lies.
  '14':
  - type: text
    content: Our courts oppose the righteous,
  - type: text
    content: and justice is nowhere to be found.
  - type: text
    content: Truth stumbles in the streets,
  - type: text
    content: and honesty has been outlawed.
  '15':
  - type: text
    content: Yes, truth is gone,
  - type: text
    content: and anyone who renounces evil is attacked.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' looked and was displeased'
  - type: text
    content: to find there was no justice.
  '16':
  - type: text
    content: He was amazed to see that no one intervened
  - type: text
    content: to help the oppressed.
  - type: text
    content: So he himself stepped in to save them with his strong arm,
  - type: text
    content: and his justice sustained him.
  '17':
  - type: text
    content: He put on righteousness as his body armor
  - type: text
    content: and placed the helmet of salvation on his head.
  - type: text
    content: He clothed himself with a robe of vengeance
  - type: text
    content: and wrapped himself in a cloak of divine passion.
  '18':
  - type: text
    content: He will repay his enemies for their evil deeds.
  - type: text
    content: His fury will fall on his foes.
  - type: text
    content: He will pay them back even to the ends of the earth.
  '19':
  - type: text
    content: 'In the west, people will respect the name of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in the east, they will glorify him.
  - type: text
    content: For he will come like a raging flood tide
  - type: text
    content: 'driven by the breath of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or When the enemy comes like a raging flood tide, / the Spirit of the Lord will drive him back.
  '2':
  - type: text
    content: It’s your sins that have cut you off from God.
  - type: text
    content: Because of your sins, he has turned away
  - type: text
    content: and will not listen anymore.
  '20':
  - type: text
    content: “The Redeemer will come to Jerusalem
  - type: text
    content: to buy back those in Israel
  - type: text
    content: who have turned from their sins,”
  - type: note
    content: Hebrew The Redeemer will come to Zion / to buy back those in Jacob / who have turned from their sins. Greek version reads The one who rescues will come on behalf of Zion, / and he will turn Jacob away from ungodliness. Compare Rom 11:26.
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: '“And this is my covenant with them,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “My Spirit will not leave them, and neither will these words I have given you. They will be on your lips and on the lips of your children and your children’s children forever. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '3':
  - type: text
    content: Your hands are the hands of murderers,
  - type: text
    content: and your fingers are filthy with sin.
  - type: text
    content: Your lips are full of lies,
  - type: text
    content: and your mouth spews corruption.
  '4':
  - type: text
    content: No one cares about being fair and honest.
  - type: text
    content: The people’s lawsuits are based on lies.
  - type: text
    content: They conceive evil deeds
  - type: text
    content: and then give birth to sin.
  '5':
  - type: text
    content: They hatch deadly snakes
  - type: text
    content: and weave spiders’ webs.
  - type: text
    content: Whoever eats their eggs will die;
  - type: text
    content: whoever cracks them will hatch a viper.
  '6':
  - type: text
    content: Their webs can’t be made into clothing,
  - type: text
    content: and nothing they do is productive.
  - type: text
    content: All their activity is filled with sin,
  - type: text
    content: and violence is their trademark.
  '7':
  - type: text
    content: Their feet run to do evil,
  - type: text
    content: and they rush to commit murder.
  - type: text
    content: They think only about sinning.
  - type: text
    content: Misery and destruction always follow them.
  '8':
  - type: text
    content: They don’t know where to find peace
  - type: text
    content: or what it means to be just and good.
  - type: text
    content: They have mapped out crooked roads,
  - type: text
    content: and no one who follows them knows a moment’s peace.
  '9':
  - type: text
    content: So there is no justice among us,
  - type: text
    content: and we know nothing about right living.
  - type: text
    content: We look for light but find only darkness.
  - type: text
    content: We look for bright skies but walk in gloom.
