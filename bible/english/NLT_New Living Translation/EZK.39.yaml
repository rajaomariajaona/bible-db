document_id: EZK.39,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Slaughter of Gog’s Hordes
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Son of man, prophesy against Gog. Give him this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': I am your enemy, O Gog, ruler of the nations of Meshech and Tubal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They won’t need to cut wood from the fields or forests, for these weapons will give them all the fuel they need. They will plunder those who planned to plunder them, and they will rob those who planned to rob them, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “And I will make a vast graveyard for Gog and his hordes in the Valley of the Travelers, east of the Dead Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' It will block the way of those who travel there, and they will change the name of the place to the Valley of Gog’s Hordes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'It will take seven months for the people of Israel to bury the bodies and cleanse the land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Everyone in Israel will help, for it will be a glorious victory for Israel when I demonstrate my glory on that day, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“After seven months, teams of men will be appointed to search the land for skeletons to bury, so the land will be made clean again. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Whenever bones are found, a marker will be set up so the burial crews will take them to be buried in the Valley of Gog’s Hordes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: (There will be a town there named Hamonah, which means ‘horde.’) And so the land will finally be cleansed.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“And now, son of man, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Call all the birds and wild animals. Say to them: Gather together for my great sacrificial feast. Come from far and near to the mountains of Israel, and there eat flesh and drink blood! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Eat the flesh of mighty men and drink the blood of princes as though they were rams, lambs, goats, and bulls—all fattened animals from Bashan! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Gorge yourselves with flesh until you are glutted; drink blood until you are drunk. This is the sacrificial feast I have prepared for you. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I will turn you around and drive you toward the mountains of Israel, bringing you from the distant north. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Feast at my banquet table—feast on horses and charioteers, on mighty men and all kinds of valiant warriors, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“In this way, I will demonstrate my glory to the nations. Everyone will see the punishment I have inflicted on them and the power of my fist when I strike. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And from that time on the people of Israel will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The nations will then know why Israel was sent away to exile—it was punishment for sin, for they were unfaithful to their God. Therefore, I turned away from them and let their enemies destroy them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I turned my face away and punished them because of their defilement and their sins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration for God’s People
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“So now, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will end the captivity of my people'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Jacob.
      marker-yv: yv-n
    - type: text
      text: '; I will have mercy on all Israel, for I jealously guard my holy reputation! '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: They will accept responsibility for
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They will forget.
      marker-yv: yv-n
    - type: text
      text: ' their past shame and unfaithfulness after they come home to live in peace in their own land, with no one to bother them. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When I bring them home from the lands of their enemies, I will display my holiness among them for all the nations to see. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then my people will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God, because I sent them away to exile and brought them home again. I will leave none of my people behind. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And I will never again turn my face from them, for I will pour out my Spirit upon the people of Israel. I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will knock the bow from your left hand and the arrows from your right hand, and I will leave you helpless. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You and your army and your allies will all die on the mountains. I will feed you to the vultures and wild animals. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You will fall in the open fields, for I have spoken, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I will rain down fire on Magog and on all your allies who live safely on the coasts. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“In this way, I will make known my holy name among my people of Israel. I will not let anyone bring shame on it. And the nations, too, will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Holy One of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'That day of judgment will come, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Everything will happen just as I have declared it.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Then the people in the towns of Israel will go out and pick up your small and large shields, bows and arrows, javelins and spears, and they will use them for fuel. There will be enough to last them seven years! '
