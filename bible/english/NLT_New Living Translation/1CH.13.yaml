document_id: 1CH.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Attempts to Move the Ark
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: David consulted with all his officials, including the generals and captains of his army.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the commanders of thousands and of hundreds.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger was aroused against Uzzah, and he struck him dead because he had laid his hand on the Ark. So Uzzah died there in the presence of God.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'David was angry because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger had burst out against Uzzah. He named that place Perez-uzzah (which means “to burst out against Uzzah”), as it is still called today.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'David was now afraid of God, and he asked, “How can I ever bring the Ark of God back into my care?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So David did not move the Ark into the City of David. Instead, he took it to the house of Obed-edom of Gath. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The Ark of God remained there in Obed-edom’s house for three months, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed the household of Obed-edom and everything he owned.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then he addressed the entire assembly of Israel as follows: “If you approve and if it is the will of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, let us send messages to all the Israelites throughout the land, including the priests and Levites in their towns and pasturelands. Let us invite them to come and join us. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: It is time to bring back the Ark of our God, for we neglected it during the reign of Saul.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The whole assembly agreed to this, for the people could see it was the right thing to do. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David summoned all Israel, from the Shihor Brook of Egypt in the south all the way to the town of Lebo-hamath in the north, to join in bringing the Ark of God from Kiriath-jearim. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then David and all Israel went to Baalah of Judah (also called Kiriath-jearim) to bring back the Ark of God, which bears the name
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Ark of God, where the Name is proclaimed—the name.
      marker-yv: yv-n
    - type: text
      text: ' of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who is enthroned between the cherubim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They placed the Ark of God on a new cart and brought it from Abinadab’s house. Uzzah and Ahio were guiding the cart. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: David and all Israel were celebrating before God with all their might, singing songs and playing all kinds of musical instruments—lyres, harps, tambourines, cymbals, and trumpets.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But when they arrived at the threshing floor of Nacon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 6:6; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kidon.
      marker-yv: yv-n
    - type: text
      text: ' the oxen stumbled, and Uzzah reached out his hand to steady the Ark. '
