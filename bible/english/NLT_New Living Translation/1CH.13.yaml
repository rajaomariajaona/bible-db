document_id: 1CH.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Attempts to Move the Ark
  - type: text
    content: David consulted with all his officials, including the generals and captains of his army.
  - type: note
    content: Hebrew the commanders of thousands and of hundreds.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger was aroused against Uzzah, and he struck him dead because he had laid his hand on the Ark. So Uzzah died there in the presence of God.
  '11':
  - type: text
    content: 'David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger had burst out against Uzzah. He named that place Perez-uzzah (which means “to burst out against Uzzah”), as it is still called today.
  '12':
  - type: text
    content: 'David was now afraid of God, and he asked, “How can I ever bring the Ark of God back into my care?” '
  '13':
  - type: text
    content: 'So David did not move the Ark into the City of David. Instead, he took it to the house of Obed-edom of Gath. '
  '14':
  - type: text
    content: 'The Ark of God remained there in Obed-edom’s house for three months, and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the household of Obed-edom and everything he owned.'
  '2':
  - type: text
    content: 'Then he addressed the entire assembly of Israel as follows: “If you approve and if it is the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, let us send messages to all the Israelites throughout the land, including the priests and Levites in their towns and pasturelands. Let us invite them to come and join us. '
  '3':
  - type: text
    content: It is time to bring back the Ark of our God, for we neglected it during the reign of Saul.”
  '4':
  - type: text
    content: 'The whole assembly agreed to this, for the people could see it was the right thing to do. '
  '5':
  - type: text
    content: 'So David summoned all Israel, from the Shihor Brook of Egypt in the south all the way to the town of Lebo-hamath in the north, to join in bringing the Ark of God from Kiriath-jearim. '
  '6':
  - type: text
    content: Then David and all Israel went to Baalah of Judah (also called Kiriath-jearim) to bring back the Ark of God, which bears the name
  - type: note
    content: Or the Ark of God, where the Name is proclaimed—the name.
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: ' who is enthroned between the cherubim. '
  '7':
  - type: text
    content: 'They placed the Ark of God on a new cart and brought it from Abinadab’s house. Uzzah and Ahio were guiding the cart. '
  '8':
  - type: text
    content: David and all Israel were celebrating before God with all their might, singing songs and playing all kinds of musical instruments—lyres, harps, tambourines, cymbals, and trumpets.
  '9':
  - type: text
    content: But when they arrived at the threshing floor of Nacon,
  - type: note
    content: As in parallel text at 2 Sam 6:6; Hebrew reads Kidon.
  - type: text
    content: ' the oxen stumbled, and Uzzah reached out his hand to steady the Ark. '
