document_id: DEU.17,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“Never sacrifice sick or defective cattle, sheep, or goats to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, for he detests such gifts.'
  '10':
  - type: text
    content: 'You must carry out the verdict they announce and the sentence they prescribe at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses. You must do exactly what they say. '
  '11':
  - type: text
    content: 'After they have interpreted the law and declared their verdict, the sentence they impose must be fully executed; do not modify it in any way. '
  '12':
  - type: text
    content: 'Anyone arrogant enough to reject the verdict of the judge or of the priest who represents the '
  - type: text
    content: Lord
  - type: text
    content: ' your God must die. In this way you will purge the evil from Israel. '
  '13':
  - type: text
    content: Then everyone else will hear about it and be afraid to act so arrogantly.
  - type: heading
    content: Guidelines for a King
  '14':
  - type: text
    content: '“You are about to enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. When you take it over and settle there, you may think, ‘We should select a king to rule over us like the other nations around us.’ '
  '15':
  - type: text
    content: 'If this happens, be sure to select as king the man the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses. You must appoint a fellow Israelite; he may not be a foreigner.'
  '16':
  - type: text
    content: '“The king must not build up a large stable of horses for himself or send his people to Egypt to buy horses, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has told you, ‘You must never return to Egypt.’ '
  '17':
  - type: text
    content: 'The king must not take many wives for himself, because they will turn his heart away from the '
  - type: text
    content: Lord
  - type: text
    content: . And he must not accumulate large amounts of wealth in silver and gold for himself.
  '18':
  - type: text
    content: '“When he sits on the throne as king, he must copy for himself this body of instruction on a scroll in the presence of the Levitical priests. '
  '19':
  - type: text
    content: 'He must always keep that copy with him and read it daily as long as he lives. That way he will learn to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' his God by obeying all the terms of these instructions and decrees. '
  '2':
  - type: text
    content: '“When you begin living in the towns the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, a man or woman among you might do evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and violate the covenant. '
  '20':
  - type: text
    content: This regular reading will prevent him from becoming proud and acting as if he is above his fellow citizens. It will also prevent him from turning away from these commands in the smallest way. And it will ensure that he and his descendants will reign for many generations in Israel.
  '3':
  - type: text
    content: 'For instance, they might serve other gods or worship the sun, the moon, or any of the stars—the forces of heaven—which I have strictly forbidden. '
  '4':
  - type: text
    content: 'When you hear about it, investigate the matter thoroughly. If it is true that this detestable thing has been done in Israel, '
  '5':
  - type: text
    content: 'then the man or woman who has committed such an evil act must be taken to the gates of the town and stoned to death. '
  '6':
  - type: text
    content: 'But never put a person to death on the testimony of only one witness. There must always be two or three witnesses. '
  '7':
  - type: text
    content: The witnesses must throw the first stones, and then all the people may join in. In this way, you will purge the evil from among you.
  '8':
  - type: text
    content: '“Suppose a case arises in a local court that is too hard for you to decide—for instance, whether someone is guilty of murder or only of manslaughter, or a difficult lawsuit, or a case involving different kinds of assault. Take such legal cases to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, '
  '9':
  - type: text
    content: 'and present them to the Levitical priests or the judge on duty at that time. They will hear the case and declare the verdict. '
