document_id: PSA.90,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Book Four
    - type: text
      text: ' (Psalms 90–106)'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of Moses, the man of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, through all the generations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have been our home!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seventy years are given to us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Some even live to eighty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even the best years are filled with pain and trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soon they disappear, and we fly away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can comprehend the power of your anger?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wrath is as awesome as the fear you deserve.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach us to realize the brevity of life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that we may grow in wisdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', come back to us!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you delay?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take pity on your servants!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satisfy us each morning with your unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we may sing for joy to the end of our lives.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give us gladness in proportion to our former misery!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Replace the evil years with good.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us, your servants, see you work again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let our children see your glory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may the Lord our God show us his approval
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make our efforts successful.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, make our efforts successful!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the mountains were born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before you gave birth to the earth and the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from beginning to end, you are God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turn people back to dust, saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Return to dust, you mortals!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you, a thousand years are as a passing day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as brief as a few night hours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sweep people away like dreams that disappear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are like grass that springs up in the morning.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning it blooms and flourishes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but by evening it is dry and withered.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We wither beneath your anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are overwhelmed by your fury.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You spread out our sins before you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our secret sins—and you see them all.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We live our lives beneath your wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ending our years with a groan.
