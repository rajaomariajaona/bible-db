document_id: PSA.90,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Book Four (Psalms 90–106)
  - type: text
    content: A prayer of Moses, the man of God.
  - type: text
    content: Lord, through all the generations
  - type: text
    content: you have been our home!
  '10':
  - type: text
    content: Seventy years are given to us!
  - type: text
    content: Some even live to eighty.
  - type: text
    content: But even the best years are filled with pain and trouble;
  - type: text
    content: soon they disappear, and we fly away.
  '11':
  - type: text
    content: Who can comprehend the power of your anger?
  - type: text
    content: Your wrath is as awesome as the fear you deserve.
  '12':
  - type: text
    content: Teach us to realize the brevity of life,
  - type: text
    content: so that we may grow in wisdom.
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', come back to us!'
  - type: text
    content: How long will you delay?
  - type: text
    content: Take pity on your servants!
  '14':
  - type: text
    content: Satisfy us each morning with your unfailing love,
  - type: text
    content: so we may sing for joy to the end of our lives.
  '15':
  - type: text
    content: Give us gladness in proportion to our former misery!
  - type: text
    content: Replace the evil years with good.
  '16':
  - type: text
    content: Let us, your servants, see you work again;
  - type: text
    content: let our children see your glory.
  '17':
  - type: text
    content: And may the Lord our God show us his approval
  - type: text
    content: and make our efforts successful.
  - type: text
    content: Yes, make our efforts successful!
  '2':
  - type: text
    content: Before the mountains were born,
  - type: text
    content: before you gave birth to the earth and the world,
  - type: text
    content: from beginning to end, you are God.
  '3':
  - type: text
    content: You turn people back to dust, saying,
  - type: text
    content: “Return to dust, you mortals!”
  '4':
  - type: text
    content: For you, a thousand years are as a passing day,
  - type: text
    content: as brief as a few night hours.
  '5':
  - type: text
    content: You sweep people away like dreams that disappear.
  - type: text
    content: They are like grass that springs up in the morning.
  '6':
  - type: text
    content: In the morning it blooms and flourishes,
  - type: text
    content: but by evening it is dry and withered.
  '7':
  - type: text
    content: We wither beneath your anger;
  - type: text
    content: we are overwhelmed by your fury.
  '8':
  - type: text
    content: You spread out our sins before you—
  - type: text
    content: our secret sins—and you see them all.
  '9':
  - type: text
    content: We live our lives beneath your wrath,
  - type: text
    content: ending our years with a groan.
