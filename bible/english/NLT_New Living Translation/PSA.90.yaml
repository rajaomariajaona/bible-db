document_id: PSA.90
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Book Four
  - type: text
    text: ' (Psalms 90–106)'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A prayer of Moses, the man of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, through all the generations
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have been our home!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Before the mountains were born,
- type: usfm
  marker: q2
  children:
  - type: text
    text: before you gave birth to the earth and the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from beginning to end, you are God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You turn people back to dust, saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Return to dust, you mortals!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For you, a thousand years are as a passing day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as brief as a few night hours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You sweep people away like dreams that disappear.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are like grass that springs up in the morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In the morning it blooms and flourishes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but by evening it is dry and withered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: We wither beneath your anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we are overwhelmed by your fury.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You spread out our sins before you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: our secret sins—and you see them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We live our lives beneath your wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ending our years with a groan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Seventy years are given to us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Some even live to eighty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even the best years are filled with pain and trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: soon they disappear, and we fly away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Who can comprehend the power of your anger?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your wrath is as awesome as the fear you deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Teach us to realize the brevity of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may grow in wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', come back to us!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you delay?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take pity on your servants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Satisfy us each morning with your unfailing love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we may sing for joy to the end of our lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Give us gladness in proportion to our former misery!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Replace the evil years with good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let us, your servants, see you work again;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let our children see your glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And may the Lord our God show us his approval
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make our efforts successful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, make our efforts successful!
