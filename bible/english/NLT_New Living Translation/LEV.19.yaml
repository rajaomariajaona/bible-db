document_id: LEV.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Holiness in Personal Conduct
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also said to Moses, '
  '10':
  - type: text
    content: 'It is the same with your grape crop—do not strip every last bunch of grapes from the vines, and do not pick up the grapes that fall to the ground. Leave them for the poor and the foreigners living among you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '11':
  - type: text
    content: “Do not steal.
  - type: text
    content: “Do not deceive or cheat one another.
  '12':
  - type: text
    content: '“Do not bring shame on the name of your God by using it to swear falsely. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “Do not defraud or rob your neighbor.
  - type: text
    content: “Do not make your hired workers wait until the next day to receive their pay.
  '14':
  - type: text
    content: '“Do not insult the deaf or cause the blind to stumble. You must fear your God; I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: “Do not twist justice in legal matters by favoring the poor or being partial to the rich and powerful. Always judge people fairly.
  '16':
  - type: text
    content: “Do not spread slanderous gossip among your people.
  - type: note
    content: Hebrew Do not act as a merchant toward your own people.
  - type: text
    content: '“Do not stand idly by when your neighbor’s life is threatened. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “Do not nurse hatred in your heart for any of your relatives.
  - type: note
    content: Hebrew for your brother.
  - type: text
    content: ' Confront people directly so you will not be held guilty for their sin.'
  '18':
  - type: text
    content: '“Do not seek revenge or bear a grudge against a fellow Israelite, but love your neighbor as yourself. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: “You must obey all my decrees.
  - type: text
    content: “Do not mate two different kinds of animals. Do not plant your field with two different kinds of seed. Do not wear clothing woven from two different kinds of thread.
  '2':
  - type: text
    content: '“Give the following instructions to the entire community of Israel. You must be holy because I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, am holy.'
  '20':
  - type: text
    content: '“If a man has sex with a slave girl whose freedom has never been purchased but who is committed to become another man’s wife, he must pay full compensation to her master. But since she is not a free woman, neither the man nor the woman will be put to death. '
  '21':
  - type: text
    content: 'The man, however, must bring a ram as a guilt offering and present it to the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the Tabernacle.'
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' '
  '22':
  - type: text
    content: The priest will then purify him
  - type: note
    content: Or make atonement for him.
  - type: text
    content: ' before the '
  - type: text
    content: Lord
  - type: text
    content: ' with the ram of the guilt offering, and the man’s sin will be forgiven.'
  '23':
  - type: text
    content: “When you enter the land and plant fruit trees, leave the fruit unharvested for the first three years and consider it forbidden.
  - type: note
    content: Hebrew consider it uncircumcised.
  - type: text
    content: ' Do not eat it. '
  '24':
  - type: text
    content: 'In the fourth year the entire crop must be consecrated to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a celebration of praise. '
  '25':
  - type: text
    content: 'Finally, in the fifth year you may eat the fruit. If you follow this pattern, your harvest will increase. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '26':
  - type: text
    content: “Do not eat meat that has not been drained of its blood.
  - type: text
    content: “Do not practice fortune-telling or witchcraft.
  '27':
  - type: text
    content: “Do not trim off the hair on your temples or trim your beards.
  '28':
  - type: text
    content: '“Do not cut your bodies for the dead, and do not mark your skin with tattoos. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: “Do not defile your daughter by making her a prostitute, or the land will be filled with prostitution and wickedness.
  '3':
  - type: text
    content: '“Each of you must show great respect for your mother and father, and you must always observe my Sabbath days of rest. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '30':
  - type: text
    content: '“Keep my Sabbath days of rest, and show reverence toward my sanctuary. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: '“Do not defile yourselves by turning to mediums or to those who consult the spirits of the dead. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '32':
  - type: text
    content: '“Stand up in the presence of the elderly, and show respect for the aged. Fear your God. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: '“Do not take advantage of foreigners who live among you in your land. '
  '34':
  - type: text
    content: 'Treat them like native-born Israelites, and love them as you love yourself. Remember that you were once foreigners living in the land of Egypt. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '35':
  - type: text
    content: '“Do not use dishonest standards when measuring length, weight, or volume. '
  '36':
  - type: text
    content: Your scales and weights must be accurate. Your containers for measuring dry materials or liquids must be accurate.
  - type: note
    content: Hebrew Use an honest ephah [a dry measure] and an honest hin [a liquid measure].
  - type: text
    content: ' I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who brought you out of the land of Egypt.'
  '37':
  - type: text
    content: '“You must be careful to keep all of my decrees and regulations by putting them into practice. I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: '“Do not put your trust in idols or make metal images of gods for yourselves. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: '“When you sacrifice a peace offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', offer it properly so you'
  - type: note
    content: Or it.
  - type: text
    content: ' will be accepted by God. '
  '6':
  - type: text
    content: 'The sacrifice must be eaten on the same day you offer it or on the next day. Whatever is left over until the third day must be completely burned up. '
  '7':
  - type: text
    content: 'If any of the sacrifice is eaten on the third day, it will be contaminated, and I will not accept it. '
  '8':
  - type: text
    content: 'Anyone who eats it on the third day will be punished for defiling what is holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' and will be cut off from the community.'
  '9':
  - type: text
    content: '“When you harvest the crops of your land, do not harvest the grain along the edges of your fields, and do not pick up what the harvesters drop. '
