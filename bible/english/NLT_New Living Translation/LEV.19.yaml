document_id: LEV.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Holiness in Personal Conduct
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is the same with your grape crop—do not strip every last bunch of grapes from the vines, and do not pick up the grapes that fall to the ground. Leave them for the poor and the foreigners living among you. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not steal.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not deceive or cheat one another.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not bring shame on the name of your God by using it to swear falsely. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not defraud or rob your neighbor.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not make your hired workers wait until the next day to receive their pay.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not insult the deaf or cause the blind to stumble. You must fear your God; I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not twist justice in legal matters by favoring the poor or being partial to the rich and powerful. Always judge people fairly.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not spread slanderous gossip among your people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Do not act as a merchant toward your own people.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not stand idly by when your neighbor’s life is threatened. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not nurse hatred in your heart for any of your relatives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for your brother.
      marker-yv: yv-n
    - type: text
      text: ' Confront people directly so you will not be held guilty for their sin.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not seek revenge or bear a grudge against a fellow Israelite, but love your neighbor as yourself. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must obey all my decrees.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not mate two different kinds of animals. Do not plant your field with two different kinds of seed. Do not wear clothing woven from two different kinds of thread.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Give the following instructions to the entire community of Israel. You must be holy because I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, am holy.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If a man has sex with a slave girl whose freedom has never been purchased but who is committed to become another man’s wife, he must pay full compensation to her master. But since she is not a free woman, neither the man nor the woman will be put to death. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man, however, must bring a ram as a guilt offering and present it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the entrance of the Tabernacle.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest will then purify him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: make atonement for him.
      marker-yv: yv-n
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the ram of the guilt offering, and the man’s sin will be forgiven.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When you enter the land and plant fruit trees, leave the fruit unharvested for the first three years and consider it forbidden.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consider it uncircumcised.
      marker-yv: yv-n
    - type: text
      text: ' Do not eat it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fourth year the entire crop must be consecrated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a celebration of praise. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, in the fifth year you may eat the fruit. If you follow this pattern, your harvest will increase. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not eat meat that has not been drained of its blood.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not practice fortune-telling or witchcraft.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not trim off the hair on your temples or trim your beards.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not cut your bodies for the dead, and do not mark your skin with tattoos. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not defile your daughter by making her a prostitute, or the land will be filled with prostitution and wickedness.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Each of you must show great respect for your mother and father, and you must always observe my Sabbath days of rest. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Keep my Sabbath days of rest, and show reverence toward my sanctuary. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not defile yourselves by turning to mediums or to those who consult the spirits of the dead. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Stand up in the presence of the elderly, and show respect for the aged. Fear your God. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not take advantage of foreigners who live among you in your land. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Treat them like native-born Israelites, and love them as you love yourself. Remember that you were once foreigners living in the land of Egypt. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not use dishonest standards when measuring length, weight, or volume. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your scales and weights must be accurate. Your containers for measuring dry materials or liquids must be accurate.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Use an honest ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a dry measure] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and an honest hin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a liquid measure].'
      marker-yv: yv-n
    - type: text
      text: ' I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God who brought you out of the land of Egypt.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must be careful to keep all of my decrees and regulations by putting them into practice. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not put your trust in idols or make metal images of gods for yourselves. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you sacrifice a peace offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', offer it properly so you'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: it.
      marker-yv: yv-n
    - type: text
      text: ' will be accepted by God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sacrifice must be eaten on the same day you offer it or on the next day. Whatever is left over until the third day must be completely burned up. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any of the sacrifice is eaten on the third day, it will be contaminated, and I will not accept it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who eats it on the third day will be punished for defiling what is holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and will be cut off from the community.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you harvest the crops of your land, do not harvest the grain along the edges of your fields, and do not pick up what the harvesters drop. '
