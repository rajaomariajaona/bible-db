document_id: ZEC.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your doors, Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that fire may devour your cedar forests.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I took my staff called Favor and cut it in two, showing that I had revoked the covenant I had made with all the nations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That was the end of my covenant with them. The suffering flock was watching me, and they knew that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was speaking through my actions.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I said to them, “If you like, give me my wages, whatever I am worth; but only if you want to.” So they counted out for my wages thirty pieces of silver.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Throw it to the potter'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Syriac version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'into the treasury; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:13b. Compare Matt 27:6-10.
      marker-yv: yv-n
    - type: text
      text: '”—this magnificent sum at which they valued me! So I took the thirty coins and threw them to the potter in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I took my other staff, Union, and cut it in two, showing that the bond of unity between Judah and Israel was broken.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Go again and play the part of a worthless shepherd. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This illustrates how I will give this nation a shepherd who will not care for those who are dying, nor look after the young, nor heal the injured, nor feed the healthy. Instead, this shepherd will eat the meat of the fattest sheep and tear off their hooves.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What sorrow awaits this worthless shepherd
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who abandons the flock!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will cut his arm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pierce his right eye.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His arm will become useless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his right eye completely blind.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep, you cypress trees, for all the ruined cedars;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most majestic ones have fallen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep, you oaks of Bashan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the thick forests have been cut down.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the wailing of the shepherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their rich pastures are destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the young lions roaring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their thickets in the Jordan Valley are ruined.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Good and Evil Shepherds
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God says: “Go and care for the flock that is intended for slaughter. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The buyers slaughter their sheep without remorse. The sellers say, ‘Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Now I’m rich!’ Even the shepherds have no compassion for them. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Likewise, I will no longer have pity on the people of the land,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . “I will let them fall into each other’s hands and into the hands of their king. They will turn the land into a wilderness, and I will not rescue them.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I cared for the flock intended for slaughter—the flock that was oppressed. Then I took two shepherd’s staffs and named one Favor and the other Union. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I got rid of their three evil shepherds in a single month.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I became impatient with these sheep, and they hated me, too. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I told them, “I won’t be your shepherd any longer. If you die, you die. If you are killed, you are killed. And let those who remain devour each other!”
