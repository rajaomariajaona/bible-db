document_id: ZEC.11,116
type_code: eng
verses:
  '1':
  - type: text
    content: Open your doors, Lebanon,
  - type: text
    content: so that fire may devour your cedar forests.
  '10':
  - type: text
    content: 'Then I took my staff called Favor and cut it in two, showing that I had revoked the covenant I had made with all the nations. '
  '11':
  - type: text
    content: 'That was the end of my covenant with them. The suffering flock was watching me, and they knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' was speaking through my actions.'
  '12':
  - type: text
    content: And I said to them, “If you like, give me my wages, whatever I am worth; but only if you want to.” So they counted out for my wages thirty pieces of silver.
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Throw it to the potter'
  - type: note
    content: Syriac version reads into the treasury; also in 11:13b. Compare Matt 27:6-10.
  - type: text
    content: '”—this magnificent sum at which they valued me! So I took the thirty coins and threw them to the potter in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: Then I took my other staff, Union, and cut it in two, showing that the bond of unity between Judah and Israel was broken.
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go again and play the part of a worthless shepherd. '
  '16':
  - type: text
    content: This illustrates how I will give this nation a shepherd who will not care for those who are dying, nor look after the young, nor heal the injured, nor feed the healthy. Instead, this shepherd will eat the meat of the fattest sheep and tear off their hooves.
  '17':
  - type: text
    content: “What sorrow awaits this worthless shepherd
  - type: text
    content: who abandons the flock!
  - type: text
    content: The sword will cut his arm
  - type: text
    content: and pierce his right eye.
  - type: text
    content: His arm will become useless,
  - type: text
    content: and his right eye completely blind.”
  '2':
  - type: text
    content: Weep, you cypress trees, for all the ruined cedars;
  - type: text
    content: the most majestic ones have fallen.
  - type: text
    content: Weep, you oaks of Bashan,
  - type: text
    content: for the thick forests have been cut down.
  '3':
  - type: text
    content: Listen to the wailing of the shepherds,
  - type: text
    content: for their rich pastures are destroyed.
  - type: text
    content: Hear the young lions roaring,
  - type: text
    content: for their thickets in the Jordan Valley are ruined.
  - type: heading
    content: The Good and Evil Shepherds
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' my God says: “Go and care for the flock that is intended for slaughter. '
  '5':
  - type: text
    content: 'The buyers slaughter their sheep without remorse. The sellers say, ‘Praise the '
  - type: text
    content: Lord
  - type: text
    content: '! Now I’m rich!’ Even the shepherds have no compassion for them. '
  '6':
  - type: text
    content: 'Likewise, I will no longer have pity on the people of the land,” says the '
  - type: text
    content: Lord
  - type: text
    content: . “I will let them fall into each other’s hands and into the hands of their king. They will turn the land into a wilderness, and I will not rescue them.”
  '7':
  - type: text
    content: 'So I cared for the flock intended for slaughter—the flock that was oppressed. Then I took two shepherd’s staffs and named one Favor and the other Union. '
  '8':
  - type: text
    content: I got rid of their three evil shepherds in a single month.
  - type: text
    content: 'But I became impatient with these sheep, and they hated me, too. '
  '9':
  - type: text
    content: So I told them, “I won’t be your shepherd any longer. If you die, you die. If you are killed, you are killed. And let those who remain devour each other!”
