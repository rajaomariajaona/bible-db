document_id: JOB.34,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elihu Accuses Job of Arrogance
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Elihu said:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Listen to me, you who have understanding.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everyone knows that God doesn’t sin!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Almighty can do no wrong.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He repays people according to their deeds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He treats people as they deserve.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Truly, God will not do wrong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Almighty will not twist justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Did someone else put the world in his care?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who set the whole world in place?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If God were to take back his spirit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and withdraw his breath,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: all life would cease,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and humanity would turn again to dust.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Now listen to me if you are wise.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention to what I say.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Could God govern if he hated justice?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are you going to condemn the almighty judge?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For he says to kings, ‘You are wicked,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to nobles, ‘You are unjust.’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He doesn’t care how great a person may be,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he pays no more attention to the rich than to the poor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He made them all.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Listen to me, you wise men.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention, you who have knowledge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: In a moment they die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the middle of the night they pass away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mighty are removed without human hand.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “For God watches how people live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sees everything they do.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: No darkness is thick enough
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hide the wicked from his eyes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: We don’t set the time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when we will come before God in judgment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He brings the mighty to ruin without asking anyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he sets up others in their place.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He knows what they do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the night he overturns and destroys them.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He strikes them down because they are wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doing it openly for all to see.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For they turned away from following him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no respect for any of his ways.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: They cause the poor to cry out, catching God’s attention.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hears the cries of the needy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: But if he chooses to remain quiet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can criticize him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he hides his face, no one can find him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whether an individual or a nation.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Job said, ‘The ear tests the words it hears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as the mouth distinguishes between foods.’
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: He prevents the godless from ruling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they cannot be a snare to the people.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Why don’t people say to God, ‘I have sinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will sin no more’?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Or ‘I don’t know what evil I have done—tell me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I have done wrong, I will stop at once’?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “Must God tailor his justice to your demands?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you have rejected him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The choice is yours, not mine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go ahead, share your wisdom with us.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: After all, bright people will tell me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wise people will hear me say,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ‘Job speaks out of ignorance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his words lack insight.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Job, you deserve the maximum penalty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the wicked way you have talked.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: For you have added rebellion to your sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you show no respect,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you speak many angry words against God.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So let us discern for ourselves what is right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us learn together what is good.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For Job also said, ‘I am innocent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but God has taken away my rights.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I am innocent, but they call me a liar.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My suffering is incurable, though I have not sinned.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Tell me, has there ever been a man like Job,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with his thirst for irreverent talk?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He chooses evil people as companions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He spends his time with wicked men.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He has even said, ‘Why waste time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trying to please God?’
