document_id: JOB.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Accuses Job of Arrogance
  - type: text
    content: 'Then Elihu said:'
  '10':
  - type: text
    content: “Listen to me, you who have understanding.
  - type: text
    content: Everyone knows that God doesn’t sin!
  - type: text
    content: The Almighty can do no wrong.
  '11':
  - type: text
    content: He repays people according to their deeds.
  - type: text
    content: He treats people as they deserve.
  '12':
  - type: text
    content: Truly, God will not do wrong.
  - type: text
    content: The Almighty will not twist justice.
  '13':
  - type: text
    content: Did someone else put the world in his care?
  - type: text
    content: Who set the whole world in place?
  '14':
  - type: text
    content: If God were to take back his spirit
  - type: text
    content: and withdraw his breath,
  '15':
  - type: text
    content: all life would cease,
  - type: text
    content: and humanity would turn again to dust.
  '16':
  - type: text
    content: “Now listen to me if you are wise.
  - type: text
    content: Pay attention to what I say.
  '17':
  - type: text
    content: Could God govern if he hated justice?
  - type: text
    content: Are you going to condemn the almighty judge?
  '18':
  - type: text
    content: For he says to kings, ‘You are wicked,’
  - type: text
    content: and to nobles, ‘You are unjust.’
  '19':
  - type: text
    content: He doesn’t care how great a person may be,
  - type: text
    content: and he pays no more attention to the rich than to the poor.
  - type: text
    content: He made them all.
  '2':
  - type: text
    content: “Listen to me, you wise men.
  - type: text
    content: Pay attention, you who have knowledge.
  '20':
  - type: text
    content: In a moment they die.
  - type: text
    content: In the middle of the night they pass away;
  - type: text
    content: the mighty are removed without human hand.
  '21':
  - type: text
    content: “For God watches how people live;
  - type: text
    content: he sees everything they do.
  '22':
  - type: text
    content: No darkness is thick enough
  - type: text
    content: to hide the wicked from his eyes.
  '23':
  - type: text
    content: We don’t set the time
  - type: text
    content: when we will come before God in judgment.
  '24':
  - type: text
    content: He brings the mighty to ruin without asking anyone,
  - type: text
    content: and he sets up others in their place.
  '25':
  - type: text
    content: He knows what they do,
  - type: text
    content: and in the night he overturns and destroys them.
  '26':
  - type: text
    content: He strikes them down because they are wicked,
  - type: text
    content: doing it openly for all to see.
  '27':
  - type: text
    content: For they turned away from following him.
  - type: text
    content: They have no respect for any of his ways.
  '28':
  - type: text
    content: They cause the poor to cry out, catching God’s attention.
  - type: text
    content: He hears the cries of the needy.
  '29':
  - type: text
    content: But if he chooses to remain quiet,
  - type: text
    content: who can criticize him?
  - type: text
    content: When he hides his face, no one can find him,
  - type: text
    content: whether an individual or a nation.
  '3':
  - type: text
    content: Job said, ‘The ear tests the words it hears
  - type: text
    content: just as the mouth distinguishes between foods.’
  '30':
  - type: text
    content: He prevents the godless from ruling
  - type: text
    content: so they cannot be a snare to the people.
  '31':
  - type: text
    content: “Why don’t people say to God, ‘I have sinned,
  - type: text
    content: but I will sin no more’?
  '32':
  - type: text
    content: Or ‘I don’t know what evil I have done—tell me.
  - type: text
    content: If I have done wrong, I will stop at once’?
  '33':
  - type: text
    content: “Must God tailor his justice to your demands?
  - type: text
    content: But you have rejected him!
  - type: text
    content: The choice is yours, not mine.
  - type: text
    content: Go ahead, share your wisdom with us.
  '34':
  - type: text
    content: After all, bright people will tell me,
  - type: text
    content: and wise people will hear me say,
  '35':
  - type: text
    content: ‘Job speaks out of ignorance;
  - type: text
    content: his words lack insight.’
  '36':
  - type: text
    content: Job, you deserve the maximum penalty
  - type: text
    content: for the wicked way you have talked.
  '37':
  - type: text
    content: For you have added rebellion to your sin;
  - type: text
    content: you show no respect,
  - type: text
    content: and you speak many angry words against God.”
  '4':
  - type: text
    content: So let us discern for ourselves what is right;
  - type: text
    content: let us learn together what is good.
  '5':
  - type: text
    content: For Job also said, ‘I am innocent,
  - type: text
    content: but God has taken away my rights.
  '6':
  - type: text
    content: I am innocent, but they call me a liar.
  - type: text
    content: My suffering is incurable, though I have not sinned.’
  '7':
  - type: text
    content: “Tell me, has there ever been a man like Job,
  - type: text
    content: with his thirst for irreverent talk?
  '8':
  - type: text
    content: He chooses evil people as companions.
  - type: text
    content: He spends his time with wicked men.
  '9':
  - type: text
    content: He has even said, ‘Why waste time
  - type: text
    content: trying to please God?’
