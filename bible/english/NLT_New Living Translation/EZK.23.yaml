verses:
  '1':
  - type: heading
    content: The Adultery of Two Sisters
  - type: text
    content: 'This message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: They stripped her, took away her children as their slaves, and then killed her. After she received her punishment, her reputation was known to every woman in the land.
  '11':
  - type: text
    content: '“Yet even though Oholibah saw what had happened to Oholah, her sister, she followed right in her footsteps. And she was even more depraved, abandoning herself to her lust and prostitution. '
  '12':
  - type: text
    content: 'She fawned over all the Assyrian officers—those captains and commanders in handsome uniforms, those charioteers driving their horses—all of them attractive young men. '
  '13':
  - type: text
    content: I saw the way she was going, defiling herself just like her older sister.
  '14':
  - type: text
    content: “Then she carried her prostitution even further. She fell in love with pictures that were painted on a wall—pictures of Babylonian
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' military officers, outfitted in striking red uniforms. '
  '15':
  - type: text
    content: Handsome belts encircled their waists, and flowing turbans crowned their heads. They were dressed like chariot officers from the land of Babylonia.
  - type: note
    content: Or Chaldea; also in 23:16.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'When she saw these paintings, she longed to give herself to them, so she sent messengers to Babylonia to invite them to come to her. '
  '17':
  - type: text
    content: So they came and committed adultery with her, defiling her in the bed of love. After being defiled, however, she rejected them in disgust.
  '18':
  - type: text
    content: '“In the same way, I became disgusted with Oholibah and rejected her, just as I had rejected her sister, because she flaunted herself before them and gave herself to satisfy their lusts. '
  '19':
  - type: text
    content: 'Yet she turned to even greater prostitution, remembering her youth when she was a prostitute in Egypt. '
  '2':
  - type: text
    content: '“Son of man, once there were two sisters who were daughters of the same mother. '
  '20':
  - type: text
    content: 'She lusted after lovers with genitals as large as a donkey’s and emissions like those of a horse. '
  '21':
  - type: text
    content: And so, Oholibah, you relived your former days as a young girl in Egypt, when you first allowed your breasts to be fondled.
  - type: heading
    content: The Lord’s Judgment of Oholibah
  '22':
  - type: text
    content: '“Therefore, Oholibah, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will send your lovers against you from every direction—those very nations from which you turned away in disgust. '
  '23':
  - type: text
    content: 'For the Babylonians will come with all the Chaldeans from Pekod and Shoa and Koa. And all the Assyrians will come with them—handsome young captains, commanders, chariot officers, and other high-ranking officers, all riding their horses. '
  '24':
  - type: text
    content: They will all come against you from the north
  - type: note
    content: As in Greek version; the meaning of the Hebrew is uncertain.
  - type: text
    content: ' with chariots, wagons, and a great army prepared for attack. They will take up positions on every side, surrounding you with men armed with shields and helmets. And I will hand you over to them for punishment so they can do with you as they please. '
  '25':
  - type: text
    content: 'I will turn my jealous anger against you, and they will deal harshly with you. They will cut off your nose and ears, and any survivors will then be slaughtered by the sword. Your children will be taken away as captives, and everything that is left will be burned. '
  '26':
  - type: text
    content: 'They will strip you of your beautiful clothes and jewels. '
  '27':
  - type: text
    content: In this way, I will put a stop to the lewdness and prostitution you brought from Egypt. You will never again cast longing eyes on those things or fondly remember your time in Egypt.
  '28':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will surely hand you over to your enemies, to those you loathe, those you rejected. '
  '29':
  - type: text
    content: 'They will treat you with hatred and rob you of all you own, leaving you stark naked. The shame of your prostitution will be exposed to all the world. '
  '3':
  - type: text
    content: 'They became prostitutes in Egypt. Even as young girls, they allowed men to fondle their breasts. '
  '30':
  - type: text
    content: 'You brought all this on yourself by prostituting yourself to other nations, defiling yourself with all their idols. '
  '31':
  - type: text
    content: Because you have followed in your sister’s footsteps, I will force you to drink the same cup of terror she drank.
  '32':
  - type: text
    content: '“Yes, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “You will drink from your sister’s cup of terror,
  - type: text
    content: a cup that is large and deep.
  - type: text
    content: It is filled to the brim
  - type: text
    content: with scorn and derision.
  '33':
  - type: text
    content: Drunkenness and anguish will fill you,
  - type: text
    content: for your cup is filled to the brim with distress and desolation,
  - type: text
    content: the same cup your sister Samaria drank.
  '34':
  - type: text
    content: You will drain that cup of terror
  - type: text
    content: to the very bottom.
  - type: text
    content: Then you will smash it to pieces
  - type: text
    content: and beat your breast in anguish.
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '35':
  - type: text
    content: '“And because you have forgotten me and turned your back on me, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You must bear the consequences of all your lewdness and prostitution.”'
  - type: heading
    content: The Lord’s Judgment on Both Sisters
  '36':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, you must accuse Oholah and Oholibah of all their detestable sins. '
  '37':
  - type: text
    content: 'They have committed both adultery and murder—adultery by worshiping idols and murder by burning as sacrifices the children they bore to me. '
  '38':
  - type: text
    content: 'Furthermore, they have defiled my Temple and violated my Sabbath day! '
  '39':
  - type: text
    content: On the very day that they sacrificed their children to their idols, they boldly came into my Temple to worship! They came in and defiled my house.
  '4':
  - type: text
    content: The older girl was named Oholah, and her sister was Oholibah. I married them, and they bore me sons and daughters. I am speaking of Samaria and Jerusalem, for Oholah is Samaria and Oholibah is Jerusalem.
  '40':
  - type: text
    content: '“You sisters sent messengers to distant lands to get men. Then when they arrived, you bathed yourselves, painted your eyelids, and put on your finest jewels for them. '
  '41':
  - type: text
    content: 'You sat with them on a beautifully embroidered couch and put my incense and my special oil on a table that was spread before you. '
  '42':
  - type: text
    content: From your room came the sound of many men carousing. They were lustful men and drunkards
  - type: note
    content: Or Sabeans.
  - type: text
    content: ' from the wilderness, who put bracelets on your wrists and beautiful crowns on your heads. '
  '43':
  - type: text
    content: 'Then I said, ‘If they really want to have sex with old worn-out prostitutes like these, let them!’ '
  '44':
  - type: text
    content: 'And that is what they did. They had sex with Oholah and Oholibah, these shameless prostitutes. '
  '45':
  - type: text
    content: But righteous people will judge these sister cities for what they really are—adulterers and murderers.
  '46':
  - type: text
    content: '“Now this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Bring an army against them and hand them over to be terrorized and plundered. '
  '47':
  - type: text
    content: 'For their enemies will stone them and kill them with swords. They will butcher their sons and daughters and burn their homes. '
  '48':
  - type: text
    content: 'In this way, I will put an end to lewdness and idolatry in the land, and my judgment will be a warning to all women not to follow your wicked example. '
  '49':
  - type: text
    content: 'You will be fully repaid for all your prostitution—your worship of idols. Yes, you will suffer the full penalty. Then you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '5':
  - type: text
    content: '“Then Oholah lusted after other lovers instead of me, and she gave her love to the Assyrian officers. '
  '6':
  - type: text
    content: 'They were all attractive young men, captains and commanders dressed in handsome blue, charioteers driving their horses. '
  '7':
  - type: text
    content: And so she prostituted herself with the most desirable men of Assyria, worshiping their idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 23:30, 37, 39, 49.
  - type: text
    content: ' and defiling herself. '
  '8':
  - type: text
    content: For when she left Egypt, she did not leave her spirit of prostitution behind. She was still as lewd as in her youth, when the Egyptians slept with her, fondled her breasts, and used her as a prostitute.
  '9':
  - type: text
    content: '“And so I handed her over to her Assyrian lovers, whom she desired so much. '
