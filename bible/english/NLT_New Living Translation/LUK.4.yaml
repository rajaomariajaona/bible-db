document_id: LUK.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temptation of Jesus
  - type: text
    content: Then Jesus, full of the Holy Spirit, returned from the Jordan River. He was led by the Spirit in the wilderness,
  - type: note
    content: Some manuscripts read into the wilderness.
  - type: text
    content: ' '
  '10':
  - type: text
    content: For the Scriptures say,
  - type: text
    content: ‘He will order his angels to protect and guard you.
  '11':
  - type: text
    content: And they will hold you up with their hands
  - type: text
    content: so you won’t even hurt your foot on a stone.’
  - type: note
    content: Ps 91:11-12.
  - type: text
    content: ”
  '12':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: '“The Scriptures also say, ‘You must not test the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’'
  - type: note
    content: Deut 6:16.
  - type: text
    content: ”
  '13':
  - type: text
    content: When the devil had finished tempting Jesus, he left him until the next opportunity came.
  - type: heading
    content: Jesus Rejected at Nazareth
  '14':
  - type: text
    content: 'Then Jesus returned to Galilee, filled with the Holy Spirit’s power. Reports about him spread quickly through the whole region. '
  '15':
  - type: text
    content: He taught regularly in their synagogues and was praised by everyone.
  '16':
  - type: text
    content: 'When he came to the village of Nazareth, his boyhood home, he went as usual to the synagogue on the Sabbath and stood up to read the Scriptures. '
  '17':
  - type: text
    content: 'The scroll of Isaiah the prophet was handed to him. He unrolled the scroll and found the place where this was written:'
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' is upon me,'
  - type: text
    content: for he has anointed me to bring Good News to the poor.
  - type: text
    content: He has sent me to proclaim that captives will be released,
  - type: text
    content: that the blind will see,
  - type: text
    content: that the oppressed will be set free,
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'and that the time of the '
  - type: text
    content: Lord
  - type: text
    content: ’s favor has come.
  - type: text
    content: ' '
  - type: note
    content: Or and to proclaim the acceptable year of the Lord. Isa 61:1-2 (Greek version); 58:6.
  - type: text
    content: ”
  '2':
  - type: text
    content: where he was tempted by the devil for forty days. Jesus ate nothing all that time and became very hungry.
  '20':
  - type: text
    content: 'He rolled up the scroll, handed it back to the attendant, and sat down. All eyes in the synagogue looked at him intently. '
  '21':
  - type: text
    content: 'Then he began to speak to them. '
  - type: text
    content: “The Scripture you’ve just heard has been fulfilled this very day!”
  '22':
  - type: text
    content: Everyone spoke well of him and was amazed by the gracious words that came from his lips. “How can this be?” they asked. “Isn’t this Joseph’s son?”
  '23':
  - type: text
    content: 'Then he said, '
  - type: text
    content: '“You will undoubtedly quote me this proverb: ‘Physician, heal yourself’—meaning, ‘Do miracles here in your hometown like those you did in Capernaum.’'
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I tell you the truth, no prophet is accepted in his own hometown.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Certainly there were many needy widows in Israel in Elijah’s time, when the heavens were closed for three and a half years, and a severe famine devastated the land.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Yet Elijah was not sent to any of them. He was sent instead to a foreigner—a widow of Zarephath in the land of Sidon.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And many in Israel had leprosy in the time of the prophet Elisha, but the only one healed was Naaman, a Syrian.”
  '28':
  - type: text
    content: 'When they heard this, the people in the synagogue were furious. '
  '29':
  - type: text
    content: 'Jumping up, they mobbed him and forced him to the edge of the hill on which the town was built. They intended to push him over the cliff, '
  '3':
  - type: text
    content: Then the devil said to him, “If you are the Son of God, tell this stone to become a loaf of bread.”
  '30':
  - type: text
    content: but he passed right through the crowd and went on his way.
  - type: heading
    content: Jesus Casts Out a Demon
  '31':
  - type: text
    content: 'Then Jesus went to Capernaum, a town in Galilee, and taught there in the synagogue every Sabbath day. '
  '32':
  - type: text
    content: There, too, the people were amazed at his teaching, for he spoke with authority.
  '33':
  - type: text
    content: Once when he was in the synagogue, a man possessed by a demon—an evil
  - type: note
    content: Greek unclean; also in 4:36.
  - type: text
    content: ' spirit—cried out, shouting, '
  '34':
  - type: text
    content: “Go away! Why are you interfering with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '35':
  - type: text
    content: 'But Jesus reprimanded him. '
  - type: text
    content: '“Be quiet! Come out of the man,” '
  - type: text
    content: he ordered. At that, the demon threw the man to the floor as the crowd watched; then it came out of him without hurting him further.
  '36':
  - type: text
    content: 'Amazed, the people exclaimed, “What authority and power this man’s words possess! Even evil spirits obey him, and they flee at his command!” '
  '37':
  - type: text
    content: The news about Jesus spread through every village in the entire region.
  - type: heading
    content: Jesus Heals Many People
  '38':
  - type: text
    content: 'After leaving the synagogue that day, Jesus went to Simon’s home, where he found Simon’s mother-in-law very sick with a high fever. “Please heal her,” everyone begged. '
  '39':
  - type: text
    content: Standing at her bedside, he rebuked the fever, and it left her. And she got up at once and prepared a meal for them.
  '4':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “No! The Scriptures say, ‘People do not live by bread alone.’
  - type: note
    content: Deut 8:3.
  - type: text
    content: ”
  '40':
  - type: text
    content: 'As the sun went down that evening, people throughout the village brought sick family members to Jesus. No matter what their diseases were, the touch of his hand healed every one. '
  '41':
  - type: text
    content: Many were possessed by demons; and the demons came out at his command, shouting, “You are the Son of God!” But because they knew he was the Messiah, he rebuked them and refused to let them speak.
  - type: heading
    content: Jesus Continues to Preach
  '42':
  - type: text
    content: 'Early the next morning Jesus went out to an isolated place. The crowds searched everywhere for him, and when they finally found him, they begged him not to leave them. '
  '43':
  - type: text
    content: 'But he replied, '
  - type: text
    content: “I must preach the Good News of the Kingdom of God in other towns, too, because that is why I was sent.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: So he continued to travel around, preaching in synagogues throughout Judea.
  - type: note
    content: Some manuscripts read Galilee.
  '5':
  - type: text
    content: 'Then the devil took him up and revealed to him all the kingdoms of the world in a moment of time. '
  '6':
  - type: text
    content: '“I will give you the glory of these kingdoms and authority over them,” the devil said, “because they are mine to give to anyone I please. '
  '7':
  - type: text
    content: I will give it all to you if you will worship me.”
  '8':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The Scriptures say,
  - type: text
    content: '‘You must worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: and serve only him.’
  - type: text
    content: ' '
  - type: note
    content: Deut 6:13.
  - type: text
    content: ”
  '9':
  - type: text
    content: 'Then the devil took him to Jerusalem, to the highest point of the Temple, and said, “If you are the Son of God, jump off! '
