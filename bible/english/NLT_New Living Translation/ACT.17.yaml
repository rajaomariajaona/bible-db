document_id: ACT.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Preaches in Thessalonica
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Paul and Silas then traveled through the towns of Amphipolis and Apollonia and came to Thessalonica, where there was a Jewish synagogue. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That very night the believers sent Paul and Silas to Berea. When they arrived there, they went to the Jewish synagogue. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the people of Berea were more open-minded than those in Thessalonica, and they listened eagerly to Paul’s message. They searched the Scriptures day after day to see if Paul and Silas were teaching the truth. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As a result, many Jews believed, as did many of the prominent Greek women and men.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when some Jews in Thessalonica learned that Paul was preaching the word of God in Berea, they went there and stirred up trouble. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The believers acted at once, sending Paul on to the coast, while Silas and Timothy remained behind. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those escorting Paul went with him all the way to Athens; then they returned to Berea with instructions for Silas and Timothy to hurry and join him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Preaches in Athens
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While Paul was waiting for them in Athens, he was deeply troubled by all the idols he saw everywhere in the city. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He went to the synagogue to reason with the Jews and the God-fearing Gentiles, and he spoke daily in the public square to all who happened to be there.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also had a debate with some of the Epicurean and Stoic philosophers. When he told them about Jesus and his resurrection, they said, “What’s this babbler trying to say with these strange ideas he’s picked up?” Others said, “He seems to be preaching about some foreign gods.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they took him to the high council of the city.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the most learned society of philosophers in the city. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Areopagus.
      marker-yv: yv-n
    - type: text
      text: ' “Come and tell us about this new teaching,” they said. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As was Paul’s custom, he went to the synagogue service, and for three Sabbaths in a row he used the Scriptures to reason with the people. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You are saying some rather strange things, and we want to know what it’s all about.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (It should be explained that all the Athenians as well as the foreigners in Athens seemed to spend all their time discussing the latest ideas.)
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Paul, standing before the council,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'standing in the middle of Mars Hill; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: standing in the middle of the Areopagus.
      marker-yv: yv-n
    - type: text
      text: ' addressed them as follows: “Men of Athens, I notice that you are very religious in every way, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for as I was walking along I saw your many shrines. And one of your altars had this inscription on it: ‘To an Unknown God.’ This God, whom you worship without knowing, is the one I’m telling you about.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“He is the God who made the world and everything in it. Since he is Lord of heaven and earth, he doesn’t live in man-made temples, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and human hands can’t serve his needs—for he has no needs. He himself gives life and breath to everything, and he satisfies every need. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From one man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'From one; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: From one blood.
      marker-yv: yv-n
    - type: text
      text: ' he created all the nations throughout the whole earth. He decided beforehand when they should rise and fall, and he determined their boundaries.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“His purpose was for the nations to seek after God and perhaps feel their way toward him and find him—though he is not far from any one of us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For in him we live and move and exist. As some of your
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our.
      marker-yv: yv-n
    - type: text
      text: ' own poets have said, ‘We are his offspring.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since this is true, we shouldn’t think of God as an idol designed by craftsmen from gold or silver or stone.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He explained the prophecies and proved that the Messiah must suffer and rise from the dead. He said, “This Jesus I’m telling you about is the Messiah.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“God overlooked people’s ignorance about these things in earlier times, but now he commands everyone everywhere to repent of their sins and turn to him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he has set a day for judging the world with justice by the man he has appointed, and he proved to everyone who this is by raising him from the dead.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard Paul speak about the resurrection of the dead, some laughed in contempt, but others said, “We want to hear more about this later.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That ended Paul’s discussion with them, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but some joined him and became believers. Among them were Dionysius, a member of the council,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an Areopagite.
      marker-yv: yv-n
    - type: text
      text: ' a woman named Damaris, and others with them.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Some of the Jews who listened were persuaded and joined Paul and Silas, along with many God-fearing Greek men and quite a few prominent women.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quite a few of the wives of the leading men.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some of the Jews were jealous, so they gathered some troublemakers from the marketplace to form a mob and start a riot. They attacked the home of Jason, searching for Paul and Silas so they could drag them out to the crowd.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the city council.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not finding them there, they dragged out Jason and some of the other believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 17:10, 14.
      marker-yv: yv-n
    - type: text
      text: ' instead and took them before the city council. “Paul and Silas have caused trouble all over the world,” they shouted, “and now they are here disturbing our city, too. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jason has welcomed them into his home. They are all guilty of treason against Caesar, for they profess allegiance to another king, named Jesus.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of the city, as well as the city council, were thrown into turmoil by these reports. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the officials forced Jason and the other believers to post bond, and then they released them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Silas in Berea
    marker-yv: yv-h
