document_id: ISA.61,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Good News for the Oppressed
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The Spirit of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is upon me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has anointed me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to bring good news to the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has sent me to comfort the brokenhearted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to proclaim that captives will be released
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and prisoners will be freed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and the blind will see. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Luke 4:18.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I am overwhelmed with joy in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he has dressed me with the clothing of salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and draped me in a robe of righteousness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a bridegroom dressed for his wedding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a bride with her jewels.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will show his justice to the nations of the world.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everyone will praise him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His righteousness will be like a garden in early spring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with plants springing up everywhere.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He has sent me to tell those who mourn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that the time of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s favor has come,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to proclaim the acceptable year of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with it, the day of God’s anger against their enemies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: To all who mourn in Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will give a crown of beauty for ashes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a joyous blessing instead of mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: festive praise instead of despair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In their righteousness, they will be like great oaks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has planted for his own glory.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will rebuild the ancient ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: repairing cities destroyed long ago.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will revive them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they have been deserted for many generations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Foreigners will be your servants.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will feed your flocks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and plow your fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tend your vineyards.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You will be called priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ministers of our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will feed on the treasures of the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and boast in their riches.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Instead of shame and dishonor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will enjoy a double share of honor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will possess a double portion of prosperity in your land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everlasting joy will be yours.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“For I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', love justice.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hate robbery and wrongdoing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will faithfully reward my people for their suffering
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make an everlasting covenant with them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their descendants will be recognized
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and honored among the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone will realize that they are a people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed.”'
