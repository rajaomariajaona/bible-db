document_id: ISA.61,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Good News for the Oppressed
  - type: text
    content: 'The Spirit of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is upon me,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has anointed me'
  - type: text
    content: to bring good news to the poor.
  - type: text
    content: He has sent me to comfort the brokenhearted
  - type: text
    content: and to proclaim that captives will be released
  - type: text
    content: and prisoners will be freed.
  - type: note
    content: Greek version reads and the blind will see. Compare Luke 4:18.
  '10':
  - type: text
    content: 'I am overwhelmed with joy in the '
  - type: text
    content: Lord
  - type: text
    content: ' my God!'
  - type: text
    content: For he has dressed me with the clothing of salvation
  - type: text
    content: and draped me in a robe of righteousness.
  - type: text
    content: I am like a bridegroom dressed for his wedding
  - type: text
    content: or a bride with her jewels.
  '11':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will show his justice to the nations of the world.'
  - type: text
    content: Everyone will praise him!
  - type: text
    content: His righteousness will be like a garden in early spring,
  - type: text
    content: with plants springing up everywhere.
  '2':
  - type: text
    content: He has sent me to tell those who mourn
  - type: text
    content: 'that the time of the '
  - type: text
    content: Lord
  - type: text
    content: ’s favor has come,
  - type: note
    content: Or to proclaim the acceptable year of the Lord.
  - type: text
    content: and with it, the day of God’s anger against their enemies.
  '3':
  - type: text
    content: To all who mourn in Israel,
  - type: note
    content: Hebrew in Zion.
  - type: text
    content: he will give a crown of beauty for ashes,
  - type: text
    content: a joyous blessing instead of mourning,
  - type: text
    content: festive praise instead of despair.
  - type: text
    content: In their righteousness, they will be like great oaks
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' has planted for his own glory.'
  '4':
  - type: text
    content: They will rebuild the ancient ruins,
  - type: text
    content: repairing cities destroyed long ago.
  - type: text
    content: They will revive them,
  - type: text
    content: though they have been deserted for many generations.
  '5':
  - type: text
    content: Foreigners will be your servants.
  - type: text
    content: They will feed your flocks
  - type: text
    content: and plow your fields
  - type: text
    content: and tend your vineyards.
  '6':
  - type: text
    content: 'You will be called priests of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ministers of our God.
  - type: text
    content: You will feed on the treasures of the nations
  - type: text
    content: and boast in their riches.
  '7':
  - type: text
    content: Instead of shame and dishonor,
  - type: text
    content: you will enjoy a double share of honor.
  - type: text
    content: You will possess a double portion of prosperity in your land,
  - type: text
    content: and everlasting joy will be yours.
  '8':
  - type: text
    content: '“For I, the '
  - type: text
    content: Lord
  - type: text
    content: ', love justice.'
  - type: text
    content: I hate robbery and wrongdoing.
  - type: text
    content: I will faithfully reward my people for their suffering
  - type: text
    content: and make an everlasting covenant with them.
  '9':
  - type: text
    content: Their descendants will be recognized
  - type: text
    content: and honored among the nations.
  - type: text
    content: Everyone will realize that they are a people
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed.”'
