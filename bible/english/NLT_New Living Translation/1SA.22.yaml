verses:
  '1':
  - type: heading
    content: David at the Cave of Adullam
  - type: text
    content: 'So David left Gath and escaped to the cave of Adullam. Soon his brothers and all his other relatives joined him there. '
  '10':
  - type: text
    content: 'Ahimelech consulted the '
  - type: text
    content: Lord
  - type: text
    content: ' for him. Then he gave him food and the sword of Goliath the Philistine.”'
  - type: heading
    content: The Slaughter of the Priests
  '11':
  - type: text
    content: 'King Saul immediately sent for Ahimelech and all his family, who served as priests at Nob. '
  '12':
  - type: text
    content: When they arrived, Saul shouted at him, “Listen to me, you son of Ahitub!”
  - type: text
    content: “What is it, my king?” Ahimelech asked.
  '13':
  - type: text
    content: “Why have you and the son of Jesse conspired against me?” Saul demanded. “Why did you give him food and a sword? Why have you consulted God for him? Why have you encouraged him to kill me, as he is trying to do this very day?”
  '14':
  - type: text
    content: '“But sir,” Ahimelech replied, “is anyone among all your servants as faithful as David, your son-in-law? Why, he is the captain of your bodyguard and a highly honored member of your household! '
  '15':
  - type: text
    content: This was certainly not the first time I had consulted God for him! May the king not accuse me and my family in this matter, for I knew nothing at all of any plot against you.”
  '16':
  - type: text
    content: '“You will surely die, Ahimelech, along with your entire family!” the king shouted. '
  '17':
  - type: text
    content: 'And he ordered his bodyguards, “Kill these priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', for they are allies and conspirators with David! They knew he was running away from me, but they didn’t tell me!” But Saul’s men refused to kill the '
  - type: text
    content: Lord
  - type: text
    content: ’s priests.
  '18':
  - type: text
    content: 'Then the king said to Doeg, “You do it.” So Doeg the Edomite turned on them and killed them that day, eighty-five priests in all, still wearing their priestly garments. '
  '19':
  - type: text
    content: Then he went to Nob, the town of the priests, and killed the priests’ families—men and women, children and babies—and all the cattle, donkeys, sheep, and goats.
  '2':
  - type: text
    content: Then others began coming—men who were in trouble or in debt or who were just discontented—until David was the captain of about 400 men.
  '20':
  - type: text
    content: 'Only Abiathar, one of the sons of Ahimelech, escaped and fled to David. '
  '21':
  - type: text
    content: 'When he told David that Saul had killed the priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '22':
  - type: text
    content: 'David exclaimed, “I knew it! When I saw Doeg the Edomite there that day, I knew he was sure to tell Saul. Now I have caused the death of all your father’s family. '
  '23':
  - type: text
    content: Stay here with me, and don’t be afraid. I will protect you with my own life, for the same person wants to kill us both.”
  '3':
  - type: text
    content: 'Later David went to Mizpeh in Moab, where he asked the king, “Please allow my father and mother to live here with you until I know what God is going to do for me.” '
  '4':
  - type: text
    content: So David’s parents stayed in Moab with the king during the entire time David was living in his stronghold.
  '5':
  - type: text
    content: One day the prophet Gad told David, “Leave the stronghold and return to the land of Judah.” So David went to the forest of Hereth.
  '6':
  - type: text
    content: The news of his arrival in Judah soon reached Saul. At the time, the king was sitting beneath the tamarisk tree on the hill at Gibeah, holding his spear and surrounded by his officers.
  '7':
  - type: text
    content: “Listen here, you men of Benjamin!” Saul shouted to his officers when he heard the news. “Has that son of Jesse promised every one of you fields and vineyards? Has he promised to make you all generals and captains in his army?
  - type: note
    content: Hebrew commanders of thousands and commanders of hundreds?
  - type: text
    content: ' '
  '8':
  - type: text
    content: Is that why you have conspired against me? For not one of you told me when my own son made a solemn pact with the son of Jesse. You’re not even sorry for me. Think of it! My own son—encouraging him to kill me, as he is trying to do this very day!”
  '9':
  - type: text
    content: 'Then Doeg the Edomite, who was standing there with Saul’s men, spoke up. “When I was at Nob,” he said, “I saw the son of Jesse talking to the priest, Ahimelech son of Ahitub. '
