document_id: 1SA.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David at the Cave of Adullam
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So David left Gath and escaped to the cave of Adullam. Soon his brothers and all his other relatives joined him there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahimelech consulted the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for him. Then he gave him food and the sword of Goliath the Philistine.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Slaughter of the Priests
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'King Saul immediately sent for Ahimelech and all his family, who served as priests at Nob. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When they arrived, Saul shouted at him, “Listen to me, you son of Ahitub!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What is it, my king?” Ahimelech asked.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why have you and the son of Jesse conspired against me?” Saul demanded. “Why did you give him food and a sword? Why have you consulted God for him? Why have you encouraged him to kill me, as he is trying to do this very day?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But sir,” Ahimelech replied, “is anyone among all your servants as faithful as David, your son-in-law? Why, he is the captain of your bodyguard and a highly honored member of your household! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This was certainly not the first time I had consulted God for him! May the king not accuse me and my family in this matter, for I knew nothing at all of any plot against you.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You will surely die, Ahimelech, along with your entire family!” the king shouted. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he ordered his bodyguards, “Kill these priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for they are allies and conspirators with David! They knew he was running away from me, but they didn’t tell me!” But Saul’s men refused to kill the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s priests.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king said to Doeg, “You do it.” So Doeg the Edomite turned on them and killed them that day, eighty-five priests in all, still wearing their priestly garments. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he went to Nob, the town of the priests, and killed the priests’ families—men and women, children and babies—and all the cattle, donkeys, sheep, and goats.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then others began coming—men who were in trouble or in debt or who were just discontented—until David was the captain of about 400 men.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Abiathar, one of the sons of Ahimelech, escaped and fled to David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he told David that Saul had killed the priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David exclaimed, “I knew it! When I saw Doeg the Edomite there that day, I knew he was sure to tell Saul. Now I have caused the death of all your father’s family. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Stay here with me, and don’t be afraid. I will protect you with my own life, for the same person wants to kill us both.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later David went to Mizpeh in Moab, where he asked the king, “Please allow my father and mother to live here with you until I know what God is going to do for me.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David’s parents stayed in Moab with the king during the entire time David was living in his stronghold.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day the prophet Gad told David, “Leave the stronghold and return to the land of Judah.” So David went to the forest of Hereth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The news of his arrival in Judah soon reached Saul. At the time, the king was sitting beneath the tamarisk tree on the hill at Gibeah, holding his spear and surrounded by his officers.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Listen here, you men of Benjamin!” Saul shouted to his officers when he heard the news. “Has that son of Jesse promised every one of you fields and vineyards? Has he promised to make you all generals and captains in his army?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: commanders of thousands and commanders of hundreds?
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Is that why you have conspired against me? For not one of you told me when my own son made a solemn pact with the son of Jesse. You’re not even sorry for me. Think of it! My own son—encouraging him to kill me, as he is trying to do this very day!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Doeg the Edomite, who was standing there with Saul’s men, spoke up. “When I was at Nob,” he said, “I saw the son of Jesse talking to the priest, Ahimelech son of Ahitub. '
