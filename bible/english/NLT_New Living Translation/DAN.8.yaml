document_id: DAN.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel’s Vision of a Ram and Goat
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The original text from this point through chapter 12 is in Hebrew. See note at 2:4.
      marker-yv: yv-n
    - type: text
      text: 'During the third year of King Belshazzar’s reign, I, Daniel, saw another vision, following the one that had already appeared to me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Its power reached to the heavens, where it attacked the heavenly army, throwing some of the heavenly beings and some of the stars to the ground and trampling them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It even challenged the Commander of heaven’s army by canceling the daily sacrifices offered to him and by destroying his Temple. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The army of heaven was restrained from responding to this rebellion. So the daily sacrifice was halted, and truth was overthrown. The horn succeeded in everything it did.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11-12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for these verses is uncertain.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard two holy ones talking to each other. One of them asked, “How long will the events of this vision last? How long will the rebellion that causes desecration stop the daily sacrifices? How long will the Temple and heaven’s army be trampled on?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The other replied, “It will take 2,300 evenings and mornings; then the Temple will be made right again.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gabriel Explains the Vision
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As I, Daniel, was trying to understand the meaning of this vision, someone who looked like a man stood in front of me. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I heard a human voice calling out from the Ulai River, “Gabriel, tell this man the meaning of his vision.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Gabriel approached the place where I was standing, I became so terrified that I fell with my face to the ground. “Son of man,” he said, “you must understand that the events you have seen in your vision relate to the time of the end.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was speaking, I fainted and lay there with my face to the ground. But Gabriel roused me with a touch and helped me to my feet.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, “I am here to tell you what will happen later in the time of wrath. What you have seen pertains to the very end of time. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In this vision I was at the fortress of Susa, in the province of Elam, standing beside the Ulai River.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Ulai Gate; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:16.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two-horned ram represents the kings of Media and Persia. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The shaggy male goat represents the king of Greece,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Javan.
      marker-yv: yv-n
    - type: text
      text: ' and the large horn between his eyes represents the first king of the Greek Empire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The four prominent horns that replaced the one large horn show that the Greek Empire will break into four kingdoms, but none as great as the first.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At the end of their rule, when their sin is at its height, a fierce king, a master of intrigue, will rise to power. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will become very strong, but not by his own power. He will cause a shocking amount of destruction and succeed in everything he does. He will destroy powerful leaders and devastate the holy people. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will be a master of deception and will become arrogant; he will destroy many without warning. He will even take on the Prince of princes in battle, but he will be broken, though not by human power.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “This vision about the 2,300 evenings and mornings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'about the evenings and mornings; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 8:14.
      marker-yv: yv-n
    - type: text
      text: ' is true. But none of these things will happen for a long time, so keep this vision a secret.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I, Daniel, was overcome and lay sick for several days. Afterward I got up and performed my duties for the king, but I was greatly troubled by the vision and could not understand it.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As I looked up, I saw a ram with two long horns standing beside the river.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the gate; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:6.
      marker-yv: yv-n
    - type: text
      text: ' One of the horns was longer than the other, even though it had grown later than the other one. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The ram butted everything out of his way to the west, to the north, and to the south, and no one could stand against him or help his victims. He did as he pleased and became very great.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While I was watching, suddenly a male goat appeared from the west, crossing the land so swiftly that he didn’t even touch the ground. This goat, which had one very large horn between its eyes, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'headed toward the two-horned ram that I had seen standing beside the river, rushing at him in a rage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The goat charged furiously at the ram and struck him, breaking off both his horns. Now the ram was helpless, and the goat knocked him down and trampled him. No one could rescue the ram from the goat’s power.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The goat became very powerful. But at the height of his power, his large horn was broken off. In the large horn’s place grew four prominent horns pointing in the four directions of the earth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then from one of the prominent horns came a small horn whose power grew very great. It extended toward the south and the east and toward the glorious land of Israel. '
