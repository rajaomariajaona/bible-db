  - type: text
    text: A song for pilgrims ascending to Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'From the depths of despair, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I call for your help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my cry, O Lord.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pay attention to my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', if you kept a record of our sins,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who, O Lord, could ever survive?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But you offer forgiveness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we might learn to fear you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I am counting on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I am counting on him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have put my hope in his word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I long for the Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than sentries long for the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, more than sentries long for the dawn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O Israel, hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' there is unfailing love.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His redemption overflows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He himself will redeem Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: from every kind of sin.
