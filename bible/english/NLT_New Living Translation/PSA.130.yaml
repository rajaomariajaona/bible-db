document_id: PSA.130,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: 'From the depths of despair, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I call for your help.
  '2':
  - type: text
    content: Hear my cry, O Lord.
  - type: text
    content: Pay attention to my prayer.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', if you kept a record of our sins,'
  - type: text
    content: who, O Lord, could ever survive?
  '4':
  - type: text
    content: But you offer forgiveness,
  - type: text
    content: that we might learn to fear you.
  '5':
  - type: text
    content: 'I am counting on the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: yes, I am counting on him.
  - type: text
    content: I have put my hope in his word.
  '6':
  - type: text
    content: I long for the Lord
  - type: text
    content: more than sentries long for the dawn,
  - type: text
    content: yes, more than sentries long for the dawn.
  '7':
  - type: text
    content: 'O Israel, hope in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'for with the '
  - type: text
    content: Lord
  - type: text
    content: ' there is unfailing love.'
  - type: text
    content: His redemption overflows.
  '8':
  - type: text
    content: He himself will redeem Israel
  - type: text
    content: from every kind of sin.
