document_id: PSA.130,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the depths of despair, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I call for your help.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my cry, O Lord.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention to my prayer.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', if you kept a record of our sins,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who, O Lord, could ever survive?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you offer forgiveness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we might learn to fear you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am counting on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, I am counting on him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have put my hope in his word.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I long for the Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than sentries long for the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, more than sentries long for the dawn.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Israel, hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' there is unfailing love.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His redemption overflows.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He himself will redeem Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from every kind of sin.
