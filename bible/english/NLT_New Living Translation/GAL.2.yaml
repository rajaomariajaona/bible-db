document_id: GAL.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Apostles Accept Paul
  - type: text
    content: 'Then fourteen years later I went back to Jerusalem again, this time with Barnabas; and Titus came along, too. '
  '10':
  - type: text
    content: Their only suggestion was that we keep on helping the poor, which I have always been eager to do.
  - type: heading
    content: Paul Confronts Peter
  '11':
  - type: text
    content: 'But when Peter came to Antioch, I had to oppose him to his face, for what he did was very wrong. '
  '12':
  - type: text
    content: 'When he first arrived, he ate with the Gentile believers, who were not circumcised. But afterward, when some friends of James came, Peter wouldn’t eat with the Gentiles anymore. He was afraid of criticism from these people who insisted on the necessity of circumcision. '
  '13':
  - type: text
    content: As a result, other Jewish believers followed Peter’s hypocrisy, and even Barnabas was led astray by their hypocrisy.
  '14':
  - type: text
    content: When I saw that they were not following the truth of the gospel message, I said to Peter in front of all the others, “Since you, a Jew by birth, have discarded the Jewish laws and are living like a Gentile, why are you now trying to make these Gentiles follow the Jewish traditions?
  '15':
  - type: text
    content: '“You and I are Jews by birth, not ‘sinners’ like the Gentiles. '
  '16':
  - type: text
    content: Yet we know that a person is made right with God by faith in Jesus Christ, not by obeying the law. And we have believed in Christ Jesus, so that we might be made right with God because of our faith in Christ, not because we have obeyed the law. For no one will ever be made right with God by obeying the law.”
  - type: note
    content: Some translators hold that the quotation extends through verse 14; others through verse 16; and still others through verse 21.
  '17':
  - type: text
    content: 'But suppose we seek to be made right with God through faith in Christ and then we are found guilty because we have abandoned the law. Would that mean Christ has led us into sin? Absolutely not! '
  '18':
  - type: text
    content: 'Rather, I am a sinner if I rebuild the old system of law I already tore down. '
  '19':
  - type: text
    content: 'For when I tried to keep the law, it condemned me. So I died to the law—I stopped trying to meet all its requirements—so that I might live for God. '
  '2':
  - type: text
    content: 'I went there because God revealed to me that I should go. While I was there I met privately with those considered to be leaders of the church and shared with them the message I had been preaching to the Gentiles. I wanted to make sure that we were in agreement, for fear that all my efforts had been wasted and I was running the race for nothing. '
  '20':
  - type: text
    content: My old self has been crucified with Christ.
  - type: note
    content: Some English translations put this sentence in verse 19.
  - type: text
    content: ' It is no longer I who live, but Christ lives in me. So I live in this earthly body by trusting in the Son of God, who loved me and gave himself for me. '
  '21':
  - type: text
    content: I do not treat the grace of God as meaningless. For if keeping the law could make us right with God, then there was no need for Christ to die.
  '3':
  - type: text
    content: And they supported me and did not even demand that my companion Titus be circumcised, though he was a Gentile.
  - type: note
    content: Greek a Greek.
  '4':
  - type: text
    content: Even that question came up only because of some so-called believers there—false ones, really
  - type: note
    content: Greek some false brothers.
  - type: text
    content: '—who were secretly brought in. They sneaked in to spy on us and take away the freedom we have in Christ Jesus. They wanted to enslave us and force us to follow their Jewish regulations. '
  '5':
  - type: text
    content: But we refused to give in to them for a single moment. We wanted to preserve the truth of the gospel message for you.
  '6':
  - type: text
    content: 'And the leaders of the church had nothing to add to what I was preaching. (By the way, their reputation as great leaders made no difference to me, for God has no favorites.) '
  '7':
  - type: text
    content: 'Instead, they saw that God had given me the responsibility of preaching the gospel to the Gentiles, just as he had given Peter the responsibility of preaching to the Jews. '
  '8':
  - type: text
    content: For the same God who worked through Peter as the apostle to the Jews also worked through me as the apostle to the Gentiles.
  '9':
  - type: text
    content: In fact, James, Peter,
  - type: note
    content: Greek Cephas; also in 2:11, 14.
  - type: text
    content: ' and John, who were known as pillars of the church, recognized the gift God had given me, and they accepted Barnabas and me as their co-workers. They encouraged us to keep preaching to the Gentiles, while they continued their work with the Jews. '
