document_id: PRO.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Proverbs of Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The proverbs of Solomon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A wise child
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 10:1b.
    marker-yv: yv-n
  - type: text
    text: ' brings joy to a father;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a foolish child brings grief to a mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tainted wealth has no lasting value,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but right living can save your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not let the godly go hungry,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he refuses to satisfy the craving of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lazy people are soon poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hard workers get rich.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A wise youth harvests in the summer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one who sleeps during harvest is a disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The godly are showered with blessings;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the words of the wicked conceal violent intentions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: We have happy memories of the godly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the name of a wicked person rots away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wise are glad to be instructed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but babbling fools fall flat on their faces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: People with integrity walk safely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who follow crooked paths will be exposed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: People who wink at wrong cause trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a bold reproof promotes peace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: but babbling fools fall flat on their faces.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The words of the godly are a life-giving fountain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the words of the wicked conceal violent intentions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hatred stirs up quarrels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but love makes up for all offenses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Wise words come from the lips of people with understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those lacking sense will be beaten with a rod.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Wise people treasure knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the babbling of a fool invites disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The wealth of the rich is their fortress;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poverty of the poor is their destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The earnings of the godly enhance their lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but evil people squander their money on sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: People who accept discipline are on the pathway to life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who ignore correction will go astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hiding hatred makes you a liar;
- type: usfm
  marker: q2
  children:
  - type: text
    text: slandering others makes you a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Too much talk leads to sin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be sensible and keep your mouth shut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The words of the godly are like sterling silver;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heart of a fool is worthless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The words of the godly encourage many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools are destroyed by their lack of common sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The blessing of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' makes a person rich,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he adds no sorrow with it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Doing wrong is fun for a fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but living wisely brings pleasure to the sensible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The fears of the wicked will be fulfilled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hopes of the godly will be granted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When the storms of life come, the wicked are whirled away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly have a lasting foundation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lazy people irritate their employers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like vinegar to the teeth or smoke in the eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lengthens one’s life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the years of the wicked are cut short.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The hopes of the godly result in happiness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the expectations of the wicked come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a stronghold to those with integrity,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it destroys the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The godly will never be disturbed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked will be removed from the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The mouth of the godly person gives wise advice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the tongue that deceives will be cut off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The lips of the godly speak helpful words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the mouth of the wicked speaks perverse words.
