document_id: PRO.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Proverbs of Solomon
  - type: text
    content: 'The proverbs of Solomon:'
  - type: text
    content: A wise child
  - type: note
    content: Hebrew son; also in 10:1b.
  - type: text
    content: ' brings joy to a father;'
  - type: text
    content: a foolish child brings grief to a mother.
  '10':
  - type: text
    content: People who wink at wrong cause trouble,
  - type: text
    content: but a bold reproof promotes peace.
  - type: note
    content: As in Greek version; Hebrew reads but babbling fools fall flat on their faces.
  '11':
  - type: text
    content: The words of the godly are a life-giving fountain;
  - type: text
    content: the words of the wicked conceal violent intentions.
  '12':
  - type: text
    content: Hatred stirs up quarrels,
  - type: text
    content: but love makes up for all offenses.
  '13':
  - type: text
    content: Wise words come from the lips of people with understanding,
  - type: text
    content: but those lacking sense will be beaten with a rod.
  '14':
  - type: text
    content: Wise people treasure knowledge,
  - type: text
    content: but the babbling of a fool invites disaster.
  '15':
  - type: text
    content: The wealth of the rich is their fortress;
  - type: text
    content: the poverty of the poor is their destruction.
  '16':
  - type: text
    content: The earnings of the godly enhance their lives,
  - type: text
    content: but evil people squander their money on sin.
  '17':
  - type: text
    content: People who accept discipline are on the pathway to life,
  - type: text
    content: but those who ignore correction will go astray.
  '18':
  - type: text
    content: Hiding hatred makes you a liar;
  - type: text
    content: slandering others makes you a fool.
  '19':
  - type: text
    content: Too much talk leads to sin.
  - type: text
    content: Be sensible and keep your mouth shut.
  '2':
  - type: text
    content: Tainted wealth has no lasting value,
  - type: text
    content: but right living can save your life.
  '20':
  - type: text
    content: The words of the godly are like sterling silver;
  - type: text
    content: the heart of a fool is worthless.
  '21':
  - type: text
    content: The words of the godly encourage many,
  - type: text
    content: but fools are destroyed by their lack of common sense.
  '22':
  - type: text
    content: 'The blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' makes a person rich,'
  - type: text
    content: and he adds no sorrow with it.
  '23':
  - type: text
    content: Doing wrong is fun for a fool,
  - type: text
    content: but living wisely brings pleasure to the sensible.
  '24':
  - type: text
    content: The fears of the wicked will be fulfilled;
  - type: text
    content: the hopes of the godly will be granted.
  '25':
  - type: text
    content: When the storms of life come, the wicked are whirled away,
  - type: text
    content: but the godly have a lasting foundation.
  '26':
  - type: text
    content: Lazy people irritate their employers,
  - type: text
    content: like vinegar to the teeth or smoke in the eyes.
  '27':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' lengthens one’s life,'
  - type: text
    content: but the years of the wicked are cut short.
  '28':
  - type: text
    content: The hopes of the godly result in happiness,
  - type: text
    content: but the expectations of the wicked come to nothing.
  '29':
  - type: text
    content: 'The way of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a stronghold to those with integrity,'
  - type: text
    content: but it destroys the wicked.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will not let the godly go hungry,'
  - type: text
    content: but he refuses to satisfy the craving of the wicked.
  '30':
  - type: text
    content: The godly will never be disturbed,
  - type: text
    content: but the wicked will be removed from the land.
  '31':
  - type: text
    content: The mouth of the godly person gives wise advice,
  - type: text
    content: but the tongue that deceives will be cut off.
  '32':
  - type: text
    content: The lips of the godly speak helpful words,
  - type: text
    content: but the mouth of the wicked speaks perverse words.
  '4':
  - type: text
    content: Lazy people are soon poor;
  - type: text
    content: hard workers get rich.
  '5':
  - type: text
    content: A wise youth harvests in the summer,
  - type: text
    content: but one who sleeps during harvest is a disgrace.
  '6':
  - type: text
    content: The godly are showered with blessings;
  - type: text
    content: the words of the wicked conceal violent intentions.
  '7':
  - type: text
    content: We have happy memories of the godly,
  - type: text
    content: but the name of a wicked person rots away.
  '8':
  - type: text
    content: The wise are glad to be instructed,
  - type: text
    content: but babbling fools fall flat on their faces.
  '9':
  - type: text
    content: People with integrity walk safely,
  - type: text
    content: but those who follow crooked paths will be exposed.
