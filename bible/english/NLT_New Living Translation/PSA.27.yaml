document_id: PSA.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my light and my salvation—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so why should I be afraid?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my fortress, protecting me from danger,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so why should I tremble?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if my father and mother abandon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will hold me close.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Teach me how to live, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead me along the right path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my enemies are waiting for me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let me fall into their hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they accuse me of things I’ve never done;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with every breath they threaten me with violence.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet I am confident I will see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s goodness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I am here in the land of the living.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wait patiently for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be brave and courageous.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, wait patiently for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When evil people come to devour me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when my enemies and foes attack me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will stumble and fall.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though a mighty army surrounds me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart will not be afraid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if I am attacked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will remain confident.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The one thing I ask of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thing I seek most—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'is to live in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all the days of my life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'delighting in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s perfections
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and meditating in his Temple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he will conceal me there when troubles come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will hide me in his sanctuary.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will place me out of reach on a high rock.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will hold my head high
  - type: usfm
    marker: q2
    children:
    - type: text
      text: above my enemies who surround me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At his sanctuary I will offer sacrifices with shouts of joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'singing and praising the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with music.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear me as I pray, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be merciful and answer me!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart has heard you say, “Come and talk with me.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my heart responds, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I am coming.”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not turn your back on me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not reject your servant in anger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have always been my helper.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t leave me now; don’t abandon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God of my salvation!
