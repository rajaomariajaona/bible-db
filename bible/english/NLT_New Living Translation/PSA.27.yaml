document_id: PSA.27,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my light and my salvation—'
  - type: text
    content: so why should I be afraid?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my fortress, protecting me from danger,'
  - type: text
    content: so why should I tremble?
  '10':
  - type: text
    content: Even if my father and mother abandon me,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will hold me close.'
  '11':
  - type: text
    content: 'Teach me how to live, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Lead me along the right path,
  - type: text
    content: for my enemies are waiting for me.
  '12':
  - type: text
    content: Do not let me fall into their hands.
  - type: text
    content: For they accuse me of things I’ve never done;
  - type: text
    content: with every breath they threaten me with violence.
  '13':
  - type: text
    content: 'Yet I am confident I will see the '
  - type: text
    content: Lord
  - type: text
    content: ’s goodness
  - type: text
    content: while I am here in the land of the living.
  '14':
  - type: text
    content: 'Wait patiently for the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Be brave and courageous.
  - type: text
    content: 'Yes, wait patiently for the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: When evil people come to devour me,
  - type: text
    content: when my enemies and foes attack me,
  - type: text
    content: they will stumble and fall.
  '3':
  - type: text
    content: Though a mighty army surrounds me,
  - type: text
    content: my heart will not be afraid.
  - type: text
    content: Even if I am attacked,
  - type: text
    content: I will remain confident.
  '4':
  - type: text
    content: 'The one thing I ask of the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: the thing I seek most—
  - type: text
    content: 'is to live in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the days of my life,'
  - type: text
    content: 'delighting in the '
  - type: text
    content: Lord
  - type: text
    content: ’s perfections
  - type: text
    content: and meditating in his Temple.
  '5':
  - type: text
    content: For he will conceal me there when troubles come;
  - type: text
    content: he will hide me in his sanctuary.
  - type: text
    content: He will place me out of reach on a high rock.
  '6':
  - type: text
    content: Then I will hold my head high
  - type: text
    content: above my enemies who surround me.
  - type: text
    content: At his sanctuary I will offer sacrifices with shouts of joy,
  - type: text
    content: 'singing and praising the '
  - type: text
    content: Lord
  - type: text
    content: ' with music.'
  '7':
  - type: text
    content: 'Hear me as I pray, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Be merciful and answer me!
  '8':
  - type: text
    content: My heart has heard you say, “Come and talk with me.”
  - type: text
    content: And my heart responds, “
  - type: text
    content: Lord
  - type: text
    content: ', I am coming.”'
  '9':
  - type: text
    content: Do not turn your back on me.
  - type: text
    content: Do not reject your servant in anger.
  - type: text
    content: You have always been my helper.
  - type: text
    content: Don’t leave me now; don’t abandon me,
  - type: text
    content: O God of my salvation!
