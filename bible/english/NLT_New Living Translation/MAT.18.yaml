document_id: MAT.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Greatest in the Kingdom
  - type: text
    content: About that time the disciples came to Jesus and asked, “Who is greatest in the Kingdom of Heaven?”
  '10':
  - type: text
    content: ' '
  - type: text
    content: “Beware that you don’t look down on any of these little ones. For I tell you that in heaven their angels are always in the presence of my heavenly Father.
  - type: note
    content: Some manuscripts add verse 11, And the Son of Man came to save those who are lost. Compare Luke 19:10.
  - type: heading
    content: Parable of the Lost Sheep
  '12':
  - type: text
    content: ' '
  - type: text
    content: “If a man has a hundred sheep and one of them wanders away, what will he do? Won’t he leave the ninety-nine others on the hills and go out to search for the one that is lost?
  - type: text
    content: ' '
  '13':
  - type: text
    content: And if he finds it, I tell you the truth, he will rejoice over it more than over the ninety-nine that didn’t wander away!
  - type: text
    content: ' '
  '14':
  - type: text
    content: In the same way, it is not my heavenly Father’s will that even one of these little ones should perish.
  - type: heading
    content: Correcting Another Believer
  '15':
  - type: text
    content: ' '
  - type: text
    content: “If another believer
  - type: text
    content: ' '
  - type: note
    content: Greek If your brother.
  - type: text
    content: sins against you,
  - type: note
    content: Some manuscripts do not include against you.
  - type: text
    content: ' '
  - type: text
    content: go privately and point out the offense. If the other person listens and confesses it, you have won that person back.
  - type: text
    content: ' '
  '16':
  - type: text
    content: But if you are unsuccessful, take one or two others with you and go back again, so that everything you say may be confirmed by two or three witnesses.
  - type: text
    content: ' '
  '17':
  - type: text
    content: If the person still refuses to listen, take your case to the church. Then if he or she won’t accept the church’s decision, treat that person as a pagan or a corrupt tax collector.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, whatever you forbid
  - type: text
    content: ' '
  - type: note
    content: Or bind, or lock.
  - type: text
    content: on earth will be forbidden in heaven, and whatever you permit
  - type: note
    content: Or loose, or open.
  - type: text
    content: ' '
  - type: text
    content: on earth will be permitted in heaven.
  '19':
  - type: text
    content: ' '
  - type: text
    content: '“I also tell you this: If two of you agree here on earth concerning anything you ask, my Father in heaven will do it for you.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus called a little child to him and put the child among them. '
  '20':
  - type: text
    content: For where two or three gather together as my followers,
  - type: note
    content: Greek gather together in my name.
  - type: text
    content: ' '
  - type: text
    content: I am there among them.”
  - type: heading
    content: Parable of the Unforgiving Debtor
  '21':
  - type: text
    content: Then Peter came to him and asked, “Lord, how often should I forgive someone
  - type: note
    content: Greek my brother.
  - type: text
    content: ' who sins against me? Seven times?”'
  '22':
  - type: text
    content: ' '
  - type: text
    content: '“No, not seven times,” '
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “but seventy times seven!
  - type: note
    content: Or seventy-seven times.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Therefore, the Kingdom of Heaven can be compared to a king who decided to bring his accounts up to date with servants who had borrowed money from him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: In the process, one of his debtors was brought in who owed him millions of dollars.
  - type: note
    content: Greek 10,000 talents [375 tons or 340 metric tons of silver].
  - type: text
    content: ' '
  '25':
  - type: text
    content: He couldn’t pay, so his master ordered that he be sold—along with his wife, his children, and everything he owned—to pay the debt.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “But the man fell down before his master and begged him, ‘Please, be patient with me, and I will pay it all.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then his master was filled with pity for him, and he released him and forgave his debt.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “But when the man left the king, he went to a fellow servant who owed him a few thousand dollars.
  - type: text
    content: ' '
  - type: note
    content: Greek 100 denarii. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: He grabbed him by the throat and demanded instant payment.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “His fellow servant fell down before him and begged for a little more time. ‘Be patient with me, and I will pay it,’ he pleaded.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “I tell you the truth, unless you turn from your sins and become like little children, you will never get into the Kingdom of Heaven.
  - type: text
    content: ' '
  '30':
  - type: text
    content: But his creditor wouldn’t wait. He had the man arrested and put in prison until the debt could be paid in full.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “When some of the other servants saw this, they were very upset. They went to the king and told him everything that had happened.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Then the king called in the man he had forgiven and said, ‘You evil servant! I forgave you that tremendous debt because you pleaded with me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Shouldn’t you have mercy on your fellow servant, just as I had mercy on you?’
  - type: text
    content: ' '
  '34':
  - type: text
    content: Then the angry king sent the man to prison to be tortured until he had paid his entire debt.
  '35':
  - type: text
    content: ' '
  - type: text
    content: “That’s what my heavenly Father will do to you if you refuse to forgive your brothers and sisters
  - type: text
    content: ' '
  - type: note
    content: Greek your brother.
  - type: text
    content: from your heart.”
  '4':
  - type: text
    content: So anyone who becomes as humble as this little child is the greatest in the Kingdom of Heaven.
  '5':
  - type: text
    content: ' '
  - type: text
    content: “And anyone who welcomes a little child like this on my behalf
  - type: text
    content: ' '
  - type: note
    content: Greek in my name.
  - type: text
    content: is welcoming me.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But if you cause one of these little ones who trusts in me to fall into sin, it would be better for you to have a large millstone tied around your neck and be drowned in the depths of the sea.
  '7':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits the world, because it tempts people to sin. Temptations are inevitable, but what sorrow awaits the person who does the tempting.
  - type: text
    content: ' '
  '8':
  - type: text
    content: So if your hand or foot causes you to sin, cut it off and throw it away. It’s better to enter eternal life with only one hand or one foot than to be thrown into eternal fire with both of your hands and feet.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And if your eye causes you to sin, gouge it out and throw it away. It’s better to enter eternal life with only one eye than to have two eyes and be thrown into the fire of hell.
  - type: note
    content: Greek the Gehenna of fire.
