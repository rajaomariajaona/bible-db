document_id: 2SA.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Kindness to Mephibosheth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day David asked, “Is anyone in Saul’s family still alive—anyone to whom I can show kindness for Jonathan’s sake?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You and your sons and servants are to farm the land for him to produce food for your master’s household.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your master’s grandson.
      marker-yv: yv-n
    - type: text
      text: ' But Mephibosheth, your master’s grandson, will eat here at my table.” (Ziba had fifteen sons and twenty servants.)'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ziba replied, “Yes, my lord the king; I am your servant, and I will do all that you have commanded.” And from that time on, Mephibosheth ate regularly at David’s table,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my table.
      marker-yv: yv-n
    - type: text
      text: ' like one of the king’s own sons.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mephibosheth had a young son named Mica. From then on, all the members of Ziba’s household were Mephibosheth’s servants. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And Mephibosheth, who was crippled in both feet, lived in Jerusalem and ate regularly at the king’s table.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He summoned a man named Ziba, who had been one of Saul’s servants. “Are you Ziba?” the king asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes sir, I am,” Ziba replied.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The king then asked him, “Is anyone still alive from Saul’s family? If so, I want to show God’s kindness to them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ziba replied, “Yes, one of Jonathan’s sons is still alive. He is crippled in both feet.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Where is he?” the king asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In Lo-debar,” Ziba told him, “at the home of Makir son of Ammiel.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David sent for him and brought him from Makir’s home. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: His name was Mephibosheth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mephibosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is another name for Merib-baal.
      marker-yv: yv-n
    - type: text
      text: ; he was Jonathan’s son and Saul’s grandson. When he came to David, he bowed low to the ground in deep respect. David said, “Greetings, Mephibosheth.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mephibosheth replied, “I am your servant.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Don’t be afraid!” David said. “I intend to show kindness to you because of my promise to your father, Jonathan. I will give you all the property that once belonged to your grandfather Saul, and you will eat here with me at the king’s table!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mephibosheth bowed respectfully and exclaimed, “Who is your servant, that you should show such kindness to a dead dog like me?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the king summoned Saul’s servant Ziba and said, “I have given your master’s grandson everything that belonged to Saul and his family. '
