document_id: PSA.28,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'I pray to you, O '
  - type: text
    content: Lord
  - type: text
    content: ', my rock.'
  - type: text
    content: Do not turn a deaf ear to me.
  - type: text
    content: For if you are silent,
  - type: text
    content: I might as well give up and die.
  '2':
  - type: text
    content: Listen to my prayer for mercy
  - type: text
    content: as I cry out to you for help,
  - type: text
    content: as I lift my hands toward your holy sanctuary.
  '3':
  - type: text
    content: Do not drag me away with the wicked—
  - type: text
    content: with those who do evil—
  - type: text
    content: those who speak friendly words to their neighbors
  - type: text
    content: while planning evil in their hearts.
  '4':
  - type: text
    content: Give them the punishment they so richly deserve!
  - type: text
    content: Measure it out in proportion to their wickedness.
  - type: text
    content: Pay them back for all their evil deeds!
  - type: text
    content: Give them a taste of what they have done to others.
  '5':
  - type: text
    content: 'They care nothing for what the '
  - type: text
    content: Lord
  - type: text
    content: ' has done'
  - type: text
    content: or for what his hands have made.
  - type: text
    content: So he will tear them down,
  - type: text
    content: and they will never be rebuilt!
  '6':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: For he has heard my cry for mercy.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and shield.'
  - type: text
    content: I trust him with all my heart.
  - type: text
    content: He helps me, and my heart is filled with joy.
  - type: text
    content: I burst out in songs of thanksgiving.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives his people strength.'
  - type: text
    content: He is a safe fortress for his anointed king.
  '9':
  - type: text
    content: Save your people!
  - type: text
    content: Bless Israel, your special possession.
  - type: note
    content: Hebrew Bless your inheritance.
  - type: text
    content: Lead them like a shepherd,
  - type: text
    content: and carry them in your arms forever.
