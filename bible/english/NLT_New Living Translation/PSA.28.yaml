document_id: PSA.28,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I pray to you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', my rock.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not turn a deaf ear to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For if you are silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I might as well give up and die.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my prayer for mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I cry out to you for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I lift my hands toward your holy sanctuary.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not drag me away with the wicked—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with those who do evil—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who speak friendly words to their neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while planning evil in their hearts.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them the punishment they so richly deserve!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Measure it out in proportion to their wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay them back for all their evil deeds!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give them a taste of what they have done to others.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They care nothing for what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or for what his hands have made.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he will tear them down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will never be rebuilt!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he has heard my cry for mercy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength and shield.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I trust him with all my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He helps me, and my heart is filled with joy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I burst out in songs of thanksgiving.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives his people strength.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is a safe fortress for his anointed king.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save your people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bless Israel, your special possession.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bless your inheritance.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lead them like a shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and carry them in your arms forever.
