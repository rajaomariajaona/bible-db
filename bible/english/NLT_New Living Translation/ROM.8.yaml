document_id: ROM.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Life in the Spirit
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So now there is no condemnation for those who belong to Christ Jesus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Christ lives within you, so even though your body will die because of sin, the Spirit gives you life
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your spirit is alive.
      marker-yv: yv-n
    - type: text
      text: ' because you have been made right with God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Spirit of God, who raised Jesus from the dead, lives in you. And just as God raised Christ Jesus from the dead, he will give life to your mortal bodies by this same Spirit living within you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:29.
      marker-yv: yv-n
    - type: text
      text: ' you have no obligation to do what your sinful nature urges you to do. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if you live by its dictates, you will die. But if through the power of the Spirit you put to death the deeds of your sinful nature,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deeds of the body.
      marker-yv: yv-n
    - type: text
      text: ' you will live. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For all who are led by the Spirit of God are children
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sons; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:19.
      marker-yv: yv-n
    - type: text
      text: ' of God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So you have not received a spirit that makes you fearful slaves. Instead, you received God’s Spirit when he adopted you as his own children.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you received a spirit of sonship.
      marker-yv: yv-n
    - type: text
      text: ' Now we call him, “Abba, Father.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15b '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is an Aramaic term for “father.”
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For his Spirit joins with our spirit to affirm that we are God’s children. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since we are his children, we are his heirs. In fact, together with Christ we are heirs of God’s glory. But if we are to share his glory, we must also share his suffering.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Future Glory
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Yet what we suffer now is nothing compared to the glory he will reveal to us later. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For all creation is waiting eagerly for that future day when God will reveal who his children really are. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And because you belong to him, the power
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the law; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:2b.
      marker-yv: yv-n
    - type: text
      text: ' of the life-giving Spirit has freed you'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me.
      marker-yv: yv-n
    - type: text
      text: ' from the power of sin that leads to death. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Against its will, all creation was subjected to God’s curse. But with eager hope, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the creation looks forward to the day when it will join God’s children in glorious freedom from death and decay. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For we know that all creation has been groaning as in the pains of childbirth right up to the present time. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And we believers also groan, even though we have the Holy Spirit within us as a foretaste of future glory, for we long for our bodies to be released from sin and suffering. We, too, wait with eager hope for the day when God will give us our full rights as his adopted children,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wait anxiously for sonship.
      marker-yv: yv-n
    - type: text
      text: ' including the new bodies he has promised us. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: We were given this hope when we were saved. (If we already have something, we don’t need to hope
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wait.
      marker-yv: yv-n
    - type: text
      text: ' for it. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But if we look forward to something we don’t yet have, we must wait patiently and confidently.)
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Holy Spirit helps us in our weakness. For example, we don’t know what God wants us to pray for. But the Holy Spirit prays for us with groanings that cannot be expressed in words. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the Father who knows all hearts knows what the Spirit is saying, for the Spirit pleads for us believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' in harmony with God’s own will. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And we know that God causes everything to work together
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And we know that everything works together.
      marker-yv: yv-n
    - type: text
      text: ' for the good of those who love God and are called according to his purpose for them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God knew his people in advance, and he chose them to become like his Son, so that his Son would be the firstborn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: would be supreme.
      marker-yv: yv-n
    - type: text
      text: ' among many brothers and sisters. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The law of Moses was unable to save us because of the weakness of our sinful nature.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'our flesh; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 8:4, 5, 6, 7, 8, 9, 12.
      marker-yv: yv-n
    - type: text
      text: ' So God did what the law could not do. He sent his own Son in a body like the bodies we sinners have. And in that body God declared an end to sin’s control over us by giving his Son as a sacrifice for our sins. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And having chosen them, he called them to come to him. And having called them, he gave them right standing with himself. And having given them right standing, he gave them his glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nothing Can Separate Us from God’s Love
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'What shall we say about such wonderful things as these? If God is for us, who can ever be against us? '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Since he did not spare even his own Son but gave him up for us all, won’t he also give us everything else? '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Who dares accuse us whom God has chosen for his own? No one—for God himself has given us right standing with himself. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Who then will condemn us? No one—for Christ Jesus died for us and was raised to life for us, and he is sitting in the place of honor at God’s right hand, pleading for us.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can anything ever separate us from Christ’s love? Does it mean he no longer loves us if we have trouble or calamity, or are persecuted, or hungry, or destitute, or in danger, or threatened with death? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (As the Scriptures say, “For your sake we are killed every day; we are being slaughtered like sheep.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 44:22.
      marker-yv: yv-n
    - type: text
      text: ') '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No, despite all these things, overwhelming victory is ours through Christ, who loved us.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I am convinced that nothing can ever separate us from God’s love. Neither death nor life, neither angels nor demons,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nor rulers.
      marker-yv: yv-n
    - type: text
      text: ' neither our fears for today nor our worries about tomorrow—not even the powers of hell can separate us from God’s love. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No power in the sky above or in the earth below—indeed, nothing in all creation will ever be able to separate us from the love of God that is revealed in Christ Jesus our Lord.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He did this so that the just requirement of the law would be fully satisfied for us, who no longer follow our sinful nature but instead follow the Spirit.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who are dominated by the sinful nature think about sinful things, but those who are controlled by the Holy Spirit think about things that please the Spirit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So letting your sinful nature control your mind leads to death. But letting the Spirit control your mind leads to life and peace. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the sinful nature is always hostile to God. It never did obey God’s laws, and it never will. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s why those who are still under the control of their sinful nature can never please God.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you are not controlled by your sinful nature. You are controlled by the Spirit if you have the Spirit of God living in you. (And remember that those who do not have the Spirit of Christ living in them do not belong to him at all.) '
