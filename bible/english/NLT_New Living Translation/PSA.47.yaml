document_id: PSA.47
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of the descendants of Korah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Come, everyone! Clap your hands!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout to God with joyful praise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Most High is awesome.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the great King of all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He subdues the nations before us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: putting our enemies beneath our feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He chose the Promised Land as our inheritance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the proud possession of Jacob’s descendants, whom he loves. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God has ascended with a mighty shout.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has ascended with trumpets blaring.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sing praises to God, sing praises;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing praises to our King, sing praises!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For God is the King over all the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Praise him with a psalm.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maskil. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God reigns above the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sitting on his holy throne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The rulers of the world have gathered together
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the people of the God of Abraham.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For all the kings of the earth belong to God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is highly honored everywhere.
