document_id: PSA.47,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of the descendants of Korah.'
  - type: text
    content: Come, everyone! Clap your hands!
  - type: text
    content: Shout to God with joyful praise!
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' Most High is awesome.'
  - type: text
    content: He is the great King of all the earth.
  '3':
  - type: text
    content: He subdues the nations before us,
  - type: text
    content: putting our enemies beneath our feet.
  '4':
  - type: text
    content: He chose the Promised Land as our inheritance,
  - type: text
    content: 'the proud possession of Jacob’s descendants, whom he loves. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: God has ascended with a mighty shout.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has ascended with trumpets blaring.'
  '6':
  - type: text
    content: Sing praises to God, sing praises;
  - type: text
    content: sing praises to our King, sing praises!
  '7':
  - type: text
    content: For God is the King over all the earth.
  - type: text
    content: Praise him with a psalm.
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  '8':
  - type: text
    content: God reigns above the nations,
  - type: text
    content: sitting on his holy throne.
  '9':
  - type: text
    content: The rulers of the world have gathered together
  - type: text
    content: with the people of the God of Abraham.
  - type: text
    content: For all the kings of the earth belong to God.
  - type: text
    content: He is highly honored everywhere.
