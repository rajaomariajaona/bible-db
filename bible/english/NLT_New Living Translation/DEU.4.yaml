document_id: DEU.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Urges Israel to Obey
  - type: text
    content: '“And now, Israel, listen carefully to these decrees and regulations that I am about to teach you. Obey them so that you may live, so you may enter and occupy the land that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, is giving you. '
  '10':
  - type: text
    content: 'Never forget the day when you stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at Mount Sinai,'
  - type: note
    content: Hebrew Horeb, another name for Sinai; also in 4:15.
  - type: text
    content: ' where he told me, ‘Summon the people before me, and I will personally instruct them. Then they will learn to fear me as long as they live, and they will teach their children to fear me also.’'
  '11':
  - type: text
    content: '“You came near and stood at the foot of the mountain, while flames from the mountain shot into the sky. The mountain was shrouded in black clouds and deep darkness. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you from the heart of the fire. You heard the sound of his words but didn’t see his form; there was only a voice. '
  '13':
  - type: text
    content: He proclaimed his covenant—the Ten Commandments
  - type: note
    content: Hebrew the ten words.
  - type: text
    content: '—which he commanded you to keep, and which he wrote on two stone tablets. '
  '14':
  - type: text
    content: 'It was at that time that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me to teach you his decrees and regulations so you would obey them in the land you are about to enter and occupy.'
  - type: heading
    content: A Warning against Idolatry
  '15':
  - type: text
    content: '“But be very careful! You did not see the '
  - type: text
    content: Lord
  - type: text
    content: '’s form on the day he spoke to you from the heart of the fire at Mount Sinai. '
  '16':
  - type: text
    content: 'So do not corrupt yourselves by making an idol in any form—whether of a man or a woman, '
  '17':
  - type: text
    content: 'an animal on the ground, a bird in the sky, '
  '18':
  - type: text
    content: 'a small animal that scurries along the ground, or a fish in the deepest sea. '
  '19':
  - type: text
    content: 'And when you look up into the sky and see the sun, moon, and stars—all the forces of heaven—don’t be seduced into worshiping them. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave them to all the peoples of the earth. '
  '2':
  - type: text
    content: 'Do not add to or subtract from these commands I am giving you. Just obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I am giving you.'
  '20':
  - type: text
    content: 'Remember that the '
  - type: text
    content: Lord
  - type: text
    content: ' rescued you from the iron-smelting furnace of Egypt in order to make you his very own people and his special possession, which is what you are today.'
  '21':
  - type: text
    content: '“But the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me because of you. He vowed that I would not cross the Jordan River into the good land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your special possession. '
  '22':
  - type: text
    content: 'You will cross the Jordan to occupy the land, but I will not. Instead, I will die here on the east side of the river. '
  '23':
  - type: text
    content: 'So be careful not to break the covenant the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has made with you. Do not make idols of any shape or form, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has forbidden this. '
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is a devouring fire; he is a jealous God.'
  '25':
  - type: text
    content: '“In the future, when you have children and grandchildren and have lived in the land a long time, do not corrupt yourselves by making idols of any kind. This is evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and will arouse his anger.'
  '26':
  - type: text
    content: '“Today I call on heaven and earth as witnesses against you. If you break my covenant, you will quickly disappear from the land you are crossing the Jordan to occupy. You will live there only a short time; then you will be utterly destroyed. '
  '27':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will scatter you among the nations, where only a few of you will survive. '
  '28':
  - type: text
    content: 'There, in a foreign land, you will worship idols made from wood and stone—gods that neither see nor hear nor eat nor smell. '
  '29':
  - type: text
    content: 'But from there you will search again for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. And if you search for him with all your heart and soul, you will find him.'
  '3':
  - type: text
    content: '“You saw for yourself what the '
  - type: text
    content: Lord
  - type: text
    content: ' did to you at Baal-peor. There the '
  - type: text
    content: Lord
  - type: text
    content: ' your God destroyed everyone who had worshiped Baal, the god of Peor. '
  '30':
  - type: text
    content: '“In the distant future, when you are suffering all these things, you will finally return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and listen to what he tells you. '
  '31':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is a merciful God; he will not abandon you or destroy you or forget the solemn covenant he made with your ancestors.'
  - type: heading
    content: There Is Only One God
  '32':
  - type: text
    content: '“Now search all of history, from the time God created people on the earth until now, and search from one end of the heavens to the other. Has anything as great as this ever been seen or heard before? '
  '33':
  - type: text
    content: Has any nation ever heard the voice of God
  - type: note
    content: Or voice of a god.
  - type: text
    content: ' speaking from fire—as you did—and survived? '
  '34':
  - type: text
    content: 'Has any other god dared to take a nation for himself out of another nation by means of trials, miraculous signs, wonders, war, a strong hand, a powerful arm, and terrifying acts? Yet that is what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did for you in Egypt, right before your eyes.'
  '35':
  - type: text
    content: '“He showed you these things so you would know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God and there is no other. '
  '36':
  - type: text
    content: 'He let you hear his voice from heaven so he could instruct you. He let you see his great fire here on earth so he could speak to you from it. '
  '37':
  - type: text
    content: 'Because he loved your ancestors, he chose to bless their descendants, and he personally brought you out of Egypt with a great display of power. '
  '38':
  - type: text
    content: He drove out nations far greater than you, so he could bring you in and give you their land as your special possession, as it is today.
  '39':
  - type: text
    content: '“So remember this and keep it firmly in mind: The '
  - type: text
    content: Lord
  - type: text
    content: ' is God both in heaven and on earth, and there is no other. '
  '4':
  - type: text
    content: 'But all of you who were faithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God are still alive today—every one of you.'
  '40':
  - type: text
    content: 'If you obey all the decrees and commands I am giving you today, all will be well with you and your children. I am giving you these instructions so you will enjoy a long life in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for all time.”'
  - type: heading
    content: Eastern Cities of Refuge
  '41':
  - type: text
    content: 'Then Moses set apart three cities of refuge east of the Jordan River. '
  '42':
  - type: text
    content: 'Anyone who killed another person unintentionally, without previous hostility, could flee there to live in safety. '
  '43':
  - type: text
    content: 'These were the cities: Bezer on the wilderness plateau for the tribe of Reuben; Ramoth in Gilead for the tribe of Gad; Golan in Bashan for the tribe of Manasseh.'
  - type: heading
    content: Introduction to Moses’ Second Address
  '44':
  - type: text
    content: 'This is the body of instruction that Moses presented to the Israelites. '
  '45':
  - type: text
    content: 'These are the laws, decrees, and regulations that Moses gave to the people of Israel when they left Egypt, '
  '46':
  - type: text
    content: 'and as they camped in the valley near Beth-peor east of the Jordan River. (This land was formerly occupied by the Amorites under King Sihon, who ruled from Heshbon. But Moses and the Israelites destroyed him and his people when they came up from Egypt. '
  '47':
  - type: text
    content: 'Israel took possession of his land and that of King Og of Bashan—the two Amorite kings east of the Jordan. '
  '48':
  - type: text
    content: So Israel conquered the entire area from Aroer at the edge of the Arnon Gorge all the way to Mount Sirion,
  - type: note
    content: As in Syriac version (see also 3:9); Hebrew reads Mount Sion.
  - type: text
    content: ' also called Mount Hermon. '
  '49':
  - type: text
    content: And they conquered the eastern bank of the Jordan River as far south as the Dead Sea,
  - type: note
    content: Hebrew took the Arabah on the east side of the Jordan as far as the sea of the Arabah.
  - type: text
    content: ' below the slopes of Pisgah.)'
  '5':
  - type: text
    content: '“Look, I now teach you these decrees and regulations just as the '
  - type: text
    content: Lord
  - type: text
    content: ' my God commanded me, so that you may obey them in the land you are about to enter and occupy. '
  '6':
  - type: text
    content: 'Obey them completely, and you will display your wisdom and intelligence among the surrounding nations. When they hear all these decrees, they will exclaim, ‘How wise and prudent are the people of this great nation!’ '
  '7':
  - type: text
    content: 'For what great nation has a god as near to them as the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is near to us whenever we call on him? '
  '8':
  - type: text
    content: And what great nation has decrees and regulations as righteous and fair as this body of instructions that I am giving you today?
  '9':
  - type: text
    content: '“But watch out! Be careful never to forget what you yourself have seen. Do not let these memories escape from your mind as long as you live! And be sure to pass them on to your children and grandchildren. '
