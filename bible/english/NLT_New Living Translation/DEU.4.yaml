document_id: DEU.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Urges Israel to Obey
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“And now, Israel, listen carefully to these decrees and regulations that I am about to teach you. Obey them so that you may live, so you may enter and occupy the land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, is giving you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Never forget the day when you stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God at Mount Sinai,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai; also in 4:15.
      marker-yv: yv-n
    - type: text
      text: ' where he told me, ‘Summon the people before me, and I will personally instruct them. Then they will learn to fear me as long as they live, and they will teach their children to fear me also.’'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“You came near and stood at the foot of the mountain, while flames from the mountain shot into the sky. The mountain was shrouded in black clouds and deep darkness. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to you from the heart of the fire. You heard the sound of his words but didn’t see his form; there was only a voice. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He proclaimed his covenant—the Ten Commandments
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the ten words.
      marker-yv: yv-n
    - type: text
      text: '—which he commanded you to keep, and which he wrote on two stone tablets. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'It was at that time that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded me to teach you his decrees and regulations so you would obey them in the land you are about to enter and occupy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning against Idolatry
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“But be very careful! You did not see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s form on the day he spoke to you from the heart of the fire at Mount Sinai. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So do not corrupt yourselves by making an idol in any form—whether of a man or a woman, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'an animal on the ground, a bird in the sky, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'a small animal that scurries along the ground, or a fish in the deepest sea. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when you look up into the sky and see the sun, moon, and stars—all the forces of heaven—don’t be seduced into worshiping them. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gave them to all the peoples of the earth. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Do not add to or subtract from these commands I am giving you. Just obey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God that I am giving you.'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Remember that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescued you from the iron-smelting furnace of Egypt in order to make you his very own people and his special possession, which is what you are today.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was angry with me because of you. He vowed that I would not cross the Jordan River into the good land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you as your special possession. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'You will cross the Jordan to occupy the land, but I will not. Instead, I will die here on the east side of the river. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So be careful not to break the covenant the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has made with you. Do not make idols of any shape or form, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has forbidden this. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is a devouring fire; he is a jealous God.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“In the future, when you have children and grandchildren and have lived in the land a long time, do not corrupt yourselves by making idols of any kind. This is evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and will arouse his anger.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Today I call on heaven and earth as witnesses against you. If you break my covenant, you will quickly disappear from the land you are crossing the Jordan to occupy. You will live there only a short time; then you will be utterly destroyed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will scatter you among the nations, where only a few of you will survive. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'There, in a foreign land, you will worship idols made from wood and stone—gods that neither see nor hear nor eat nor smell. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But from there you will search again for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. And if you search for him with all your heart and soul, you will find him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“You saw for yourself what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did to you at Baal-peor. There the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God destroyed everyone who had worshiped Baal, the god of Peor. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“In the distant future, when you are suffering all these things, you will finally return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and listen to what he tells you. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is a merciful God; he will not abandon you or destroy you or forget the solemn covenant he made with your ancestors.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: There Is Only One God
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“Now search all of history, from the time God created people on the earth until now, and search from one end of the heavens to the other. Has anything as great as this ever been seen or heard before? '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Has any nation ever heard the voice of God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voice of a god.
      marker-yv: yv-n
    - type: text
      text: ' speaking from fire—as you did—and survived? '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Has any other god dared to take a nation for himself out of another nation by means of trials, miraculous signs, wonders, war, a strong hand, a powerful arm, and terrifying acts? Yet that is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God did for you in Egypt, right before your eyes.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '“He showed you these things so you would know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is God and there is no other. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'He let you hear his voice from heaven so he could instruct you. He let you see his great fire here on earth so he could speak to you from it. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Because he loved your ancestors, he chose to bless their descendants, and he personally brought you out of Egypt with a great display of power. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: He drove out nations far greater than you, so he could bring you in and give you their land as your special possession, as it is today.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '“So remember this and keep it firmly in mind: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is God both in heaven and on earth, and there is no other. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But all of you who were faithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God are still alive today—every one of you.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'If you obey all the decrees and commands I am giving you today, all will be well with you and your children. I am giving you these instructions so you will enjoy a long life in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you for all time.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eastern Cities of Refuge
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Then Moses set apart three cities of refuge east of the Jordan River. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Anyone who killed another person unintentionally, without previous hostility, could flee there to live in safety. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'These were the cities: Bezer on the wilderness plateau for the tribe of Reuben; Ramoth in Gilead for the tribe of Gad; Golan in Bashan for the tribe of Manasseh.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction to Moses’ Second Address
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'This is the body of instruction that Moses presented to the Israelites. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'These are the laws, decrees, and regulations that Moses gave to the people of Israel when they left Egypt, '
  '46':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'and as they camped in the valley near Beth-peor east of the Jordan River. (This land was formerly occupied by the Amorites under King Sihon, who ruled from Heshbon. But Moses and the Israelites destroyed him and his people when they came up from Egypt. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Israel took possession of his land and that of King Og of Bashan—the two Amorite kings east of the Jordan. '
  '48':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: So Israel conquered the entire area from Aroer at the edge of the Arnon Gorge all the way to Mount Sirion,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version (see also 3:9); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mount Sion.
      marker-yv: yv-n
    - type: text
      text: ' also called Mount Hermon. '
  '49':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: And they conquered the eastern bank of the Jordan River as far south as the Dead Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: took the Arabah on the east side of the Jordan as far as the sea of the Arabah.
      marker-yv: yv-n
    - type: text
      text: ' below the slopes of Pisgah.)'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Look, I now teach you these decrees and regulations just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God commanded me, so that you may obey them in the land you are about to enter and occupy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Obey them completely, and you will display your wisdom and intelligence among the surrounding nations. When they hear all these decrees, they will exclaim, ‘How wise and prudent are the people of this great nation!’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For what great nation has a god as near to them as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is near to us whenever we call on him? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And what great nation has decrees and regulations as righteous and fair as this body of instructions that I am giving you today?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“But watch out! Be careful never to forget what you yourself have seen. Do not let these memories escape from your mind as long as you live! And be sure to pass them on to your children and grandchildren. '
