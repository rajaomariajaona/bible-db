document_id: GEN.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Abraham
  - type: text
    content: 'Abraham married another wife, whose name was Keturah. '
  '10':
  - type: text
    content: 'This was the field Abraham had purchased from the Hittites and where he had buried his wife Sarah. '
  '11':
  - type: text
    content: After Abraham’s death, God blessed his son Isaac, who settled near Beer-lahai-roi in the Negev.
  - type: heading
    content: Ishmael’s Descendants
  '12':
  - type: text
    content: 'This is the account of the family of Ishmael, the son of Abraham through Hagar, Sarah’s Egyptian servant. '
  '13':
  - type: text
    content: 'Here is a list, by their names and clans, of Ishmael’s descendants: The oldest was Nebaioth, followed by Kedar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Dumah, Massa, '
  '15':
  - type: text
    content: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  '16':
  - type: text
    content: 'These twelve sons of Ishmael became the founders of twelve tribes named after them, listed according to the places they settled and camped. '
  '17':
  - type: text
    content: 'Ishmael lived for 137 years. Then he breathed his last and joined his ancestors in death. '
  '18':
  - type: text
    content: Ishmael’s descendants occupied the region from Havilah to Shur, which is east of Egypt in the direction of Asshur. There they lived in open hostility toward all their relatives.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: heading
    content: The Births of Esau and Jacob
  '19':
  - type: text
    content: 'This is the account of the family of Isaac, the son of Abraham. '
  '2':
  - type: text
    content: 'She gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  '20':
  - type: text
    content: When Isaac was forty years old, he married Rebekah, the daughter of Bethuel the Aramean from Paddan-aram and the sister of Laban the Aramean.
  '21':
  - type: text
    content: 'Isaac pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' on behalf of his wife, because she was unable to have children. The '
  - type: text
    content: Lord
  - type: text
    content: ' answered Isaac’s prayer, and Rebekah became pregnant with twins. '
  '22':
  - type: text
    content: 'But the two children struggled with each other in her womb. So she went to ask the '
  - type: text
    content: Lord
  - type: text
    content: ' about it. “Why is this happening to me?” she asked.'
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' told her, “The sons in your womb will become two nations. From the very beginning, the two nations will be rivals. One nation will be stronger than the other; and your older son will serve your younger son.”'
  '24':
  - type: text
    content: 'And when the time came to give birth, Rebekah discovered that she did indeed have twins! '
  '25':
  - type: text
    content: The first one was very red at birth and covered with thick hair like a fur coat. So they named him Esau.
  - type: note
    content: Esau sounds like a Hebrew term that means “hair.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then the other twin was born with his hand grasping Esau’s heel. So they named him Jacob.
  - type: note
    content: Jacob sounds like the Hebrew words for “heel” and “deceiver.”
  - type: text
    content: ' Isaac was sixty years old when the twins were born.'
  - type: heading
    content: Esau Sells His Birthright
  '27':
  - type: text
    content: 'As the boys grew up, Esau became a skillful hunter. He was an outdoorsman, but Jacob had a quiet temperament, preferring to stay at home. '
  '28':
  - type: text
    content: Isaac loved Esau because he enjoyed eating the wild game Esau brought home, but Rebekah loved Jacob.
  '29':
  - type: text
    content: 'One day when Jacob was cooking some stew, Esau arrived home from the wilderness exhausted and hungry. '
  '3':
  - type: text
    content: 'Jokshan was the father of Sheba and Dedan. Dedan’s descendants were the Asshurites, Letushites, and Leummites. '
  '30':
  - type: text
    content: Esau said to Jacob, “I’m starved! Give me some of that red stew!” (This is how Esau got his other name, Edom, which means “red.”)
  '31':
  - type: text
    content: “All right,” Jacob replied, “but trade me your rights as the firstborn son.”
  '32':
  - type: text
    content: “Look, I’m dying of starvation!” said Esau. “What good is my birthright to me now?”
  '33':
  - type: text
    content: But Jacob said, “First you must swear that your birthright is mine.” So Esau swore an oath, thereby selling all his rights as the firstborn to his brother, Jacob.
  '34':
  - type: text
    content: Then Jacob gave Esau some bread and lentil stew. Esau ate the meal, then got up and left. He showed contempt for his rights as the firstborn.
  '4':
  - type: text
    content: Midian’s sons were Ephah, Epher, Hanoch, Abida, and Eldaah. These were all descendants of Abraham through Keturah.
  '5':
  - type: text
    content: 'Abraham gave everything he owned to his son Isaac. '
  '6':
  - type: text
    content: But before he died, he gave gifts to the sons of his concubines and sent them off to a land in the east, away from Isaac.
  '7':
  - type: text
    content: 'Abraham lived for 175 years, '
  '8':
  - type: text
    content: 'and he died at a ripe old age, having lived a long and satisfying life. He breathed his last and joined his ancestors in death. '
  '9':
  - type: text
    content: 'His sons Isaac and Ishmael buried him in the cave of Machpelah, near Mamre, in the field of Ephron son of Zohar the Hittite. '
