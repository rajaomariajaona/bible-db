document_id: GEN.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Abraham
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Abraham married another wife, whose name was Keturah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'This was the field Abraham had purchased from the Hittites and where he had buried his wife Sarah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: After Abraham’s death, God blessed his son Isaac, who settled near Beer-lahai-roi in the Negev.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ishmael’s Descendants
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This is the account of the family of Ishmael, the son of Abraham through Hagar, Sarah’s Egyptian servant. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Here is a list, by their names and clans, of Ishmael’s descendants: The oldest was Nebaioth, followed by Kedar, Adbeel, Mibsam, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mishma, Dumah, Massa, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'These twelve sons of Ishmael became the founders of twelve tribes named after them, listed according to the places they settled and camped. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ishmael lived for 137 years. Then he breathed his last and joined his ancestors in death. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ishmael’s descendants occupied the region from Havilah to Shur, which is east of Egypt in the direction of Asshur. There they lived in open hostility toward all their relatives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Births of Esau and Jacob
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This is the account of the family of Isaac, the son of Abraham. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'She gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When Isaac was forty years old, he married Rebekah, the daughter of Bethuel the Aramean from Paddan-aram and the sister of Laban the Aramean.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Isaac pleaded with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on behalf of his wife, because she was unable to have children. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered Isaac’s prayer, and Rebekah became pregnant with twins. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But the two children struggled with each other in her womb. So she went to ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' about it. “Why is this happening to me?” she asked.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told her, “The sons in your womb will become two nations. From the very beginning, the two nations will be rivals. One nation will be stronger than the other; and your older son will serve your younger son.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when the time came to give birth, Rebekah discovered that she did indeed have twins! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The first one was very red at birth and covered with thick hair like a fur coat. So they named him Esau.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:25 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Esau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “hair.”
      marker-yv: yv-n
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then the other twin was born with his hand grasping Esau’s heel. So they named him Jacob.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:26 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like the Hebrew words for “heel” and “deceiver.”
      marker-yv: yv-n
    - type: text
      text: ' Isaac was sixty years old when the twins were born.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esau Sells His Birthright
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'As the boys grew up, Esau became a skillful hunter. He was an outdoorsman, but Jacob had a quiet temperament, preferring to stay at home. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Isaac loved Esau because he enjoyed eating the wild game Esau brought home, but Rebekah loved Jacob.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'One day when Jacob was cooking some stew, Esau arrived home from the wilderness exhausted and hungry. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jokshan was the father of Sheba and Dedan. Dedan’s descendants were the Asshurites, Letushites, and Leummites. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Esau said to Jacob, “I’m starved! Give me some of that red stew!” (This is how Esau got his other name, Edom, which means “red.”)
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “All right,” Jacob replied, “but trade me your rights as the firstborn son.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “Look, I’m dying of starvation!” said Esau. “What good is my birthright to me now?”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: But Jacob said, “First you must swear that your birthright is mine.” So Esau swore an oath, thereby selling all his rights as the firstborn to his brother, Jacob.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Then Jacob gave Esau some bread and lentil stew. Esau ate the meal, then got up and left. He showed contempt for his rights as the firstborn.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Midian’s sons were Ephah, Epher, Hanoch, Abida, and Eldaah. These were all descendants of Abraham through Keturah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Abraham gave everything he owned to his son Isaac. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But before he died, he gave gifts to the sons of his concubines and sent them off to a land in the east, away from Isaac.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Abraham lived for 175 years, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he died at a ripe old age, having lived a long and satisfying life. He breathed his last and joined his ancestors in death. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'His sons Isaac and Ishmael buried him in the cave of Machpelah, near Mamre, in the field of Ephron son of Zohar the Hittite. '
