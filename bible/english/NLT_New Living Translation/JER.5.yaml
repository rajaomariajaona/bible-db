document_id: JER.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sins of Judah
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Run up and down every street in Jerusalem,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Look high and low; search throughout the city!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you can find even one just and honest person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not destroy the city.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go down the rows of the vineyards and destroy the grapevines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving a scattered few alive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strip the branches from the vines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for these people do not belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Israel and Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are full of treachery against me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They have lied about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and said, ‘He won’t bother us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No disasters will come upon us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There will be no war or famine.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s prophets are all windbags
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who don’t really speak for him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let their predictions of disaster fall on themselves!’”
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because the people are talking like this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my messages will flame out of your mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn the people like kindling wood.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israel, I will bring a distant nation against you,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It is a mighty nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an ancient nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a people whose language you do not know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose speech you cannot understand.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their weapons are deadly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their warriors are mighty.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will devour the food of your harvest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will devour your sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will devour your flocks and herds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will devour your grapes and figs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will destroy your fortified towns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which you think are so safe.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet even in those days I will not blot you out completely,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And when your people ask, ‘Why did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God do all this to us?’ you must reply, ‘You rejected him and gave yourselves to foreign gods in your own land. Now you will serve foreigners in a land that is not your own.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning for God’s People
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even when they are under oath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'saying, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives,’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are still telling lies!”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Make this announcement to Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to the house of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and say this to Judah:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, you foolish and senseless people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with eyes that do not see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ears that do not hear.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you no respect for me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why don’t you tremble in my presence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', define the ocean’s sandy shoreline'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as an everlasting boundary that the waters cannot cross.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waves may toss and roar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they can never pass the boundaries I set.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people have stubborn and rebellious hearts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have turned away and abandoned me.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not say from the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Let us live in awe of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he gives us rain each spring and fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: assuring us of a harvest when the time is right.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wickedness has deprived you of these wonderful blessings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your sin has robbed you of all these good things.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Among my people are wicked men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lie in wait for victims like a hunter hiding in a blind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They continually set traps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to catch people.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a cage filled with birds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their homes are filled with evil plots.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And now they are great and rich.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are fat and sleek,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no limit to their wicked deeds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They refuse to provide justice to orphans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and deny the rights of the poor.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Should I not punish them for this?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Should I not avenge myself against such a nation?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you are searching for honesty.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You struck your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they paid no attention.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they refused to be corrected.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are determined, with faces set like stone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have refused to repent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A horrible and shocking thing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has happened in this land—
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the prophets give false prophecies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the priests rule with an iron hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Worse yet, my people like it that way!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But what will you do when the end comes?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said, “But what can we expect from the poor?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are ignorant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They don’t know the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t understand God’s laws.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will go and speak to their leaders.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Surely they know the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and understand God’s laws.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the leaders, too, as one man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had thrown off God’s yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and broken his chains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now a lion from the forest will attack them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wolf from the desert will pounce on them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A leopard will lurk near their towns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tearing apart any who dare to venture out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their rebellion is great,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their sins are many.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How can I pardon you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For even your children have turned from me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have sworn by gods that are not gods at all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I fed my people until they were full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they thanked me by committing adultery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lining up at the brothels.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are well-fed, lusty stallions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each neighing for his neighbor’s wife.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Should I not punish them for this?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Should I not avenge myself against such a nation?
