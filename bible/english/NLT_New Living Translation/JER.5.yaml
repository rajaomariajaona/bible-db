verses:
  '1':
  - type: heading
    content: The Sins of Judah
  - type: text
    content: '“Run up and down every street in Jerusalem,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Look high and low; search throughout the city!
  - type: text
    content: If you can find even one just and honest person,
  - type: text
    content: I will not destroy the city.
  '10':
  - type: text
    content: “Go down the rows of the vineyards and destroy the grapevines,
  - type: text
    content: leaving a scattered few alive.
  - type: text
    content: Strip the branches from the vines,
  - type: text
    content: 'for these people do not belong to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: The people of Israel and Judah
  - type: text
    content: are full of treachery against me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“They have lied about the '
  - type: text
    content: Lord
  - type: text
    content: and said, ‘He won’t bother us!
  - type: text
    content: No disasters will come upon us.
  - type: text
    content: There will be no war or famine.
  '13':
  - type: text
    content: God’s prophets are all windbags
  - type: text
    content: who don’t really speak for him.
  - type: text
    content: Let their predictions of disaster fall on themselves!’”
  '14':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies says:'
  - type: text
    content: “Because the people are talking like this,
  - type: text
    content: my messages will flame out of your mouth
  - type: text
    content: and burn the people like kindling wood.
  '15':
  - type: text
    content: O Israel, I will bring a distant nation against you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “It is a mighty nation,
  - type: text
    content: an ancient nation,
  - type: text
    content: a people whose language you do not know,
  - type: text
    content: whose speech you cannot understand.
  '16':
  - type: text
    content: Their weapons are deadly;
  - type: text
    content: their warriors are mighty.
  '17':
  - type: text
    content: They will devour the food of your harvest;
  - type: text
    content: they will devour your sons and daughters.
  - type: text
    content: They will devour your flocks and herds;
  - type: text
    content: they will devour your grapes and figs.
  - type: text
    content: And they will destroy your fortified towns,
  - type: text
    content: which you think are so safe.
  '18':
  - type: text
    content: '“Yet even in those days I will not blot you out completely,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: '“And when your people ask, ‘Why did the '
  - type: text
    content: Lord
  - type: text
    content: ' our God do all this to us?’ you must reply, ‘You rejected him and gave yourselves to foreign gods in your own land. Now you will serve foreigners in a land that is not your own.’'
  - type: heading
    content: A Warning for God’s People
  '2':
  - type: text
    content: But even when they are under oath,
  - type: text
    content: 'saying, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’'
  - type: text
    content: they are still telling lies!”
  '20':
  - type: text
    content: “Make this announcement to Israel,
  - type: note
    content: Hebrew to the house of Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: 'and say this to Judah:'
  '21':
  - type: text
    content: Listen, you foolish and senseless people,
  - type: text
    content: with eyes that do not see
  - type: text
    content: and ears that do not hear.
  '22':
  - type: text
    content: Have you no respect for me?
  - type: text
    content: Why don’t you tremble in my presence?
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', define the ocean’s sandy shoreline'
  - type: text
    content: as an everlasting boundary that the waters cannot cross.
  - type: text
    content: The waves may toss and roar,
  - type: text
    content: but they can never pass the boundaries I set.
  '23':
  - type: text
    content: But my people have stubborn and rebellious hearts.
  - type: text
    content: They have turned away and abandoned me.
  '24':
  - type: text
    content: They do not say from the heart,
  - type: text
    content: '‘Let us live in awe of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: for he gives us rain each spring and fall,
  - type: text
    content: assuring us of a harvest when the time is right.’
  '25':
  - type: text
    content: Your wickedness has deprived you of these wonderful blessings.
  - type: text
    content: Your sin has robbed you of all these good things.
  '26':
  - type: text
    content: “Among my people are wicked men
  - type: text
    content: who lie in wait for victims like a hunter hiding in a blind.
  - type: text
    content: They continually set traps
  - type: text
    content: to catch people.
  '27':
  - type: text
    content: Like a cage filled with birds,
  - type: text
    content: their homes are filled with evil plots.
  - type: text
    content: And now they are great and rich.
  '28':
  - type: text
    content: They are fat and sleek,
  - type: text
    content: and there is no limit to their wicked deeds.
  - type: text
    content: They refuse to provide justice to orphans
  - type: text
    content: and deny the rights of the poor.
  '29':
  - type: text
    content: 'Should I not punish them for this?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself against such a nation?
  '3':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are searching for honesty.'
  - type: text
    content: You struck your people,
  - type: text
    content: but they paid no attention.
  - type: text
    content: You crushed them,
  - type: text
    content: but they refused to be corrected.
  - type: text
    content: They are determined, with faces set like stone;
  - type: text
    content: they have refused to repent.
  '30':
  - type: text
    content: A horrible and shocking thing
  - type: text
    content: has happened in this land—
  '31':
  - type: text
    content: the prophets give false prophecies,
  - type: text
    content: and the priests rule with an iron hand.
  - type: text
    content: Worse yet, my people like it that way!
  - type: text
    content: But what will you do when the end comes?
  '4':
  - type: text
    content: Then I said, “But what can we expect from the poor?
  - type: text
    content: They are ignorant.
  - type: text
    content: 'They don’t know the ways of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: They don’t understand God’s laws.
  '5':
  - type: text
    content: So I will go and speak to their leaders.
  - type: text
    content: 'Surely they know the ways of the '
  - type: text
    content: Lord
  - type: text
    content: and understand God’s laws.”
  - type: text
    content: But the leaders, too, as one man,
  - type: text
    content: had thrown off God’s yoke
  - type: text
    content: and broken his chains.
  '6':
  - type: text
    content: So now a lion from the forest will attack them;
  - type: text
    content: a wolf from the desert will pounce on them.
  - type: text
    content: A leopard will lurk near their towns,
  - type: text
    content: tearing apart any who dare to venture out.
  - type: text
    content: For their rebellion is great,
  - type: text
    content: and their sins are many.
  '7':
  - type: text
    content: “How can I pardon you?
  - type: text
    content: For even your children have turned from me.
  - type: text
    content: They have sworn by gods that are not gods at all!
  - type: text
    content: I fed my people until they were full.
  - type: text
    content: But they thanked me by committing adultery
  - type: text
    content: and lining up at the brothels.
  '8':
  - type: text
    content: They are well-fed, lusty stallions,
  - type: text
    content: each neighing for his neighbor’s wife.
  '9':
  - type: text
    content: 'Should I not punish them for this?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself against such a nation?
