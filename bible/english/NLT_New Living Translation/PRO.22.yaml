document_id: PRO.22
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Choose a good reputation over great riches;
- type: usfm
  marker: q2
  children:
  - type: text
    text: being held in high esteem is better than silver or gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The rich and poor have this in common:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made them both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A prudent person foresees danger and takes precautions.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The simpleton goes blindly on and suffers the consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'True humility and fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: lead to riches, honor, and long life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Corrupt people walk a thorny, treacherous road;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever values life will avoid it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Direct your children onto the right path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when they are older, they will not leave it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Just as the rich rule the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the borrower is servant to the lender.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Those who plant injustice will harvest disaster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their reign of terror will come to an end.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek version includes an additional proverb: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'God blesses a man who gives cheerfully, / but his worthless deeds will come to an end. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare 2 Cor 9:7.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Blessed are those who are generous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they feed the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Throw out the mocker, and fighting goes, too.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Quarrels and insults will disappear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Whoever loves a pure heart and gracious speech
- type: usfm
  marker: q2
  children:
  - type: text
    text: will have the king as a friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' preserves those with knowledge,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he ruins the plans of the treacherous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The lazy person claims, “There’s a lion out there!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If I go outside, I might be killed!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The mouth of an immoral woman is a dangerous trap;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'those who make the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' angry will fall into it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A youngster’s heart is filled with foolishness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but physical discipline will drive it far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A person who gets ahead by oppressing the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: or by showering gifts on the rich will end in poverty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sayings of the Wise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Listen to the words of the wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: apply your heart to my instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For it is good to keep these sayings in your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and always ready on your lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am teaching you today—yes, you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so you will trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have written thirty sayings
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'excellent sayings; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' for you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: filled with advice and knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: In this way, you may know the truth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take an accurate report to those who sent you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t rob the poor just because you can,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or exploit the needy in court.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is their defender.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will ruin anyone who ruins them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Don’t befriend angry people
- type: usfm
  marker: q2
  children:
  - type: text
    text: or associate with hot-tempered people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: or you will learn to be like them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and endanger your soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Don’t agree to guarantee another person’s debt
- type: usfm
  marker: q2
  children:
  - type: text
    text: or put up security for someone else.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If you can’t pay it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even your bed will be snatched from under you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Don’t cheat your neighbor by moving the ancient boundary markers
- type: usfm
  marker: q2
  children:
  - type: text
    text: set up by previous generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do you see any truly competent workers?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will serve kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: rather than working for ordinary people.
