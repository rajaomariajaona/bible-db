document_id: PRO.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: Choose a good reputation over great riches;
  - type: text
    content: being held in high esteem is better than silver or gold.
  '10':
  - type: text
    content: Throw out the mocker, and fighting goes, too.
  - type: text
    content: Quarrels and insults will disappear.
  '11':
  - type: text
    content: Whoever loves a pure heart and gracious speech
  - type: text
    content: will have the king as a friend.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' preserves those with knowledge,'
  - type: text
    content: but he ruins the plans of the treacherous.
  '13':
  - type: text
    content: The lazy person claims, “There’s a lion out there!
  - type: text
    content: If I go outside, I might be killed!”
  '14':
  - type: text
    content: The mouth of an immoral woman is a dangerous trap;
  - type: text
    content: 'those who make the '
  - type: text
    content: Lord
  - type: text
    content: ' angry will fall into it.'
  '15':
  - type: text
    content: A youngster’s heart is filled with foolishness,
  - type: text
    content: but physical discipline will drive it far away.
  '16':
  - type: text
    content: A person who gets ahead by oppressing the poor
  - type: text
    content: or by showering gifts on the rich will end in poverty.
  - type: heading
    content: Sayings of the Wise
  '17':
  - type: text
    content: Listen to the words of the wise;
  - type: text
    content: apply your heart to my instruction.
  '18':
  - type: text
    content: For it is good to keep these sayings in your heart
  - type: text
    content: and always ready on your lips.
  '19':
  - type: text
    content: I am teaching you today—yes, you—
  - type: text
    content: 'so you will trust in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'The rich and poor have this in common:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' made them both.'
  '20':
  - type: text
    content: I have written thirty sayings
  - type: note
    content: Or excellent sayings; the meaning of the Hebrew is uncertain.
  - type: text
    content: ' for you,'
  - type: text
    content: filled with advice and knowledge.
  '21':
  - type: text
    content: In this way, you may know the truth
  - type: text
    content: and take an accurate report to those who sent you.
  '22':
  - type: text
    content: Don’t rob the poor just because you can,
  - type: text
    content: or exploit the needy in court.
  '23':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is their defender.'
  - type: text
    content: He will ruin anyone who ruins them.
  '24':
  - type: text
    content: Don’t befriend angry people
  - type: text
    content: or associate with hot-tempered people,
  '25':
  - type: text
    content: or you will learn to be like them
  - type: text
    content: and endanger your soul.
  '26':
  - type: text
    content: Don’t agree to guarantee another person’s debt
  - type: text
    content: or put up security for someone else.
  '27':
  - type: text
    content: If you can’t pay it,
  - type: text
    content: even your bed will be snatched from under you.
  '28':
  - type: text
    content: Don’t cheat your neighbor by moving the ancient boundary markers
  - type: text
    content: set up by previous generations.
  '29':
  - type: text
    content: Do you see any truly competent workers?
  - type: text
    content: They will serve kings
  - type: text
    content: rather than working for ordinary people.
  '3':
  - type: text
    content: A prudent person foresees danger and takes precautions.
  - type: text
    content: The simpleton goes blindly on and suffers the consequences.
  '4':
  - type: text
    content: 'True humility and fear of the '
  - type: text
    content: Lord
  - type: text
    content: lead to riches, honor, and long life.
  '5':
  - type: text
    content: Corrupt people walk a thorny, treacherous road;
  - type: text
    content: whoever values life will avoid it.
  '6':
  - type: text
    content: Direct your children onto the right path,
  - type: text
    content: and when they are older, they will not leave it.
  '7':
  - type: text
    content: Just as the rich rule the poor,
  - type: text
    content: so the borrower is servant to the lender.
  '8':
  - type: text
    content: Those who plant injustice will harvest disaster,
  - type: text
    content: and their reign of terror will come to an end.
  - type: note
    content: 'The Greek version includes an additional proverb: God blesses a man who gives cheerfully, / but his worthless deeds will come to an end. Compare 2 Cor 9:7.'
  '9':
  - type: text
    content: Blessed are those who are generous,
  - type: text
    content: because they feed the poor.
