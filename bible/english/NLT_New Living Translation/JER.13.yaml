document_id: JER.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Linen Loincloth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me: “Go and buy a linen loincloth and put it on, but do not wash it.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These wicked people refuse to listen to me. They stubbornly follow their own desires and worship other gods. Therefore, they will become like this loincloth—good for nothing! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a loincloth clings to a man’s waist, so I created Judah and Israel to cling to me, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . They were to be my people, my pride, my glory—an honor to my name. But they would not listen to me.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So tell them, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: May all your jars be filled with wine.’ And they will reply, ‘Of course! Jars are made to be filled with wine!’'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then tell them, ‘No, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' means: I will fill everyone in this land with drunkenness—from the king sitting on David’s throne to the priests and the prophets, right down to the common people of Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will smash them against each other, even parents against children, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . I will not let my pity or mercy or compassion keep me from destroying them.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning against Pride
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen and pay attention!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not be arrogant, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give glory to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before it is too late.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acknowledge him before he brings darkness upon you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: causing you to stumble and fall on the darkening mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For then, when you look for light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will find only terrible darkness and gloom.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if you still refuse to listen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will weep alone because of your pride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes will overflow with tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s flock will be led away into exile.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to the king and his mother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come down from your thrones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sit in the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your glorious crowns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will soon be snatched from your heads.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The towns of the Negev will close their gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will be able to open them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Judah will be taken away as captives.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All will be carried into exile.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So I bought the loincloth as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' directed me, and I put it on.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open up your eyes and see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the armies marching down from the north!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is your flock—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your beautiful flock—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he gave you to care for?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What will you say when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes the allies you have cultivated'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and appoints them as your rulers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pangs of anguish will grip you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those of a woman in labor!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You may ask yourself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why is all this happening to me?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is because of your many sins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why you have been stripped
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and raped by invading armies.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can an Ethiopian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a Cushite.
      marker-yv: yv-n
    - type: text
      text: ' change the color of his skin?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can a leopard take away its spots?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither can you start doing good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you have always done evil.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will scatter you like chaff
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is blown away by the desert winds.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is your allotment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the portion I have assigned to you,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “for you have forgotten me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting your trust in false gods.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I myself will strip you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and expose you to shame.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen your adultery and lust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your disgusting idol worship out in the fields and on the hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow awaits you, Jerusalem!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long before you are pure?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me another message: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Take the linen loincloth you are wearing, and go to the Euphrates River.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Perath; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 13:5, 6, 7.
      marker-yv: yv-n
    - type: text
      text: ' Hide it there in a hole in the rocks.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I went and hid it by the Euphrates as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had instructed me.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A long time afterward the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Go back to the Euphrates and get the loincloth I told you to hide there.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I went to the Euphrates and dug it out of the hole where I had hidden it. But now it was rotting and falling apart. The loincloth was good for nothing.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I received this message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: This shows how I will rot away the pride of Judah and Jerusalem. '
