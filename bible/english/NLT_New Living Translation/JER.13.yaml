document_id: JER.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Linen Loincloth
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go and buy a linen loincloth and put it on, but do not wash it.” '
  '10':
  - type: text
    content: 'These wicked people refuse to listen to me. They stubbornly follow their own desires and worship other gods. Therefore, they will become like this loincloth—good for nothing! '
  '11':
  - type: text
    content: 'As a loincloth clings to a man’s waist, so I created Judah and Israel to cling to me, says the '
  - type: text
    content: Lord
  - type: text
    content: . They were to be my people, my pride, my glory—an honor to my name. But they would not listen to me.
  '12':
  - type: text
    content: '“So tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: May all your jars be filled with wine.’ And they will reply, ‘Of course! Jars are made to be filled with wine!’'
  '13':
  - type: text
    content: '“Then tell them, ‘No, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' means: I will fill everyone in this land with drunkenness—from the king sitting on David’s throne to the priests and the prophets, right down to the common people of Jerusalem. '
  '14':
  - type: text
    content: 'I will smash them against each other, even parents against children, says the '
  - type: text
    content: Lord
  - type: text
    content: . I will not let my pity or mercy or compassion keep me from destroying them.’”
  - type: heading
    content: A Warning against Pride
  '15':
  - type: text
    content: Listen and pay attention!
  - type: text
    content: 'Do not be arrogant, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '16':
  - type: text
    content: 'Give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: before it is too late.
  - type: text
    content: Acknowledge him before he brings darkness upon you,
  - type: text
    content: causing you to stumble and fall on the darkening mountains.
  - type: text
    content: For then, when you look for light,
  - type: text
    content: you will find only terrible darkness and gloom.
  '17':
  - type: text
    content: And if you still refuse to listen,
  - type: text
    content: I will weep alone because of your pride.
  - type: text
    content: My eyes will overflow with tears,
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ’s flock will be led away into exile.
  '18':
  - type: text
    content: Say to the king and his mother,
  - type: text
    content: “Come down from your thrones
  - type: text
    content: and sit in the dust,
  - type: text
    content: for your glorious crowns
  - type: text
    content: will soon be snatched from your heads.”
  '19':
  - type: text
    content: The towns of the Negev will close their gates,
  - type: text
    content: and no one will be able to open them.
  - type: text
    content: The people of Judah will be taken away as captives.
  - type: text
    content: All will be carried into exile.
  '2':
  - type: text
    content: 'So I bought the loincloth as the '
  - type: text
    content: Lord
  - type: text
    content: ' directed me, and I put it on.'
  '20':
  - type: text
    content: Open up your eyes and see
  - type: text
    content: the armies marching down from the north!
  - type: text
    content: Where is your flock—
  - type: text
    content: your beautiful flock—
  - type: text
    content: that he gave you to care for?
  '21':
  - type: text
    content: 'What will you say when the '
  - type: text
    content: Lord
  - type: text
    content: ' takes the allies you have cultivated'
  - type: text
    content: and appoints them as your rulers?
  - type: text
    content: Pangs of anguish will grip you,
  - type: text
    content: like those of a woman in labor!
  '22':
  - type: text
    content: You may ask yourself,
  - type: text
    content: “Why is all this happening to me?”
  - type: text
    content: It is because of your many sins!
  - type: text
    content: That is why you have been stripped
  - type: text
    content: and raped by invading armies.
  '23':
  - type: text
    content: Can an Ethiopian
  - type: note
    content: Hebrew a Cushite.
  - type: text
    content: ' change the color of his skin?'
  - type: text
    content: Can a leopard take away its spots?
  - type: text
    content: Neither can you start doing good,
  - type: text
    content: for you have always done evil.
  '24':
  - type: text
    content: “I will scatter you like chaff
  - type: text
    content: that is blown away by the desert winds.
  '25':
  - type: text
    content: This is your allotment,
  - type: text
    content: the portion I have assigned to you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for you have forgotten me,
  - type: text
    content: putting your trust in false gods.
  '26':
  - type: text
    content: I myself will strip you
  - type: text
    content: and expose you to shame.
  '27':
  - type: text
    content: I have seen your adultery and lust,
  - type: text
    content: and your disgusting idol worship out in the fields and on the hills.
  - type: text
    content: What sorrow awaits you, Jerusalem!
  - type: text
    content: How long before you are pure?”
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me another message: '
  '4':
  - type: text
    content: “Take the linen loincloth you are wearing, and go to the Euphrates River.
  - type: note
    content: Hebrew Perath; also in 13:5, 6, 7.
  - type: text
    content: ' Hide it there in a hole in the rocks.” '
  '5':
  - type: text
    content: 'So I went and hid it by the Euphrates as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed me.'
  '6':
  - type: text
    content: 'A long time afterward the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go back to the Euphrates and get the loincloth I told you to hide there.” '
  '7':
  - type: text
    content: So I went to the Euphrates and dug it out of the hole where I had hidden it. But now it was rotting and falling apart. The loincloth was good for nothing.
  '8':
  - type: text
    content: 'Then I received this message from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: This shows how I will rot away the pride of Judah and Jerusalem. '
