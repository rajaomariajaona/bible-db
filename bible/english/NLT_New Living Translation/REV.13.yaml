document_id: REV.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Beast out of the Sea
  - type: text
    content: 'Then I saw a beast rising up out of the sea. It had seven heads and ten horns, with ten crowns on its horns. And written on each head were names that blasphemed God. '
  '10':
  - type: text
    content: Anyone who is destined for prison
  - type: text
    content: will be taken to prison.
  - type: text
    content: Anyone destined to die by the sword
  - type: text
    content: will die by the sword.
  - type: text
    content: This means that God’s holy people must endure persecution patiently and remain faithful.
  - type: heading
    content: The Beast out of the Earth
  '11':
  - type: text
    content: 'Then I saw another beast come up out of the earth. He had two horns like those of a lamb, but he spoke with the voice of a dragon. '
  '12':
  - type: text
    content: 'He exercised all the authority of the first beast. And he required all the earth and its people to worship the first beast, whose fatal wound had been healed. '
  '13':
  - type: text
    content: 'He did astounding miracles, even making fire flash down to earth from the sky while everyone was watching. '
  '14':
  - type: text
    content: 'And with all the miracles he was allowed to perform on behalf of the first beast, he deceived all the people who belong to this world. He ordered the people to make a great statue of the first beast, who was fatally wounded and then came back to life. '
  '15':
  - type: text
    content: He was then permitted to give life to this statue so that it could speak. Then the statue of the beast commanded that anyone refusing to worship it must die.
  '16':
  - type: text
    content: 'He required everyone—small and great, rich and poor, free and slave—to be given a mark on the right hand or on the forehead. '
  '17':
  - type: text
    content: 'And no one could buy or sell anything without that mark, which was either the name of the beast or the number representing his name. '
  '18':
  - type: text
    content: Wisdom is needed here. Let the one with understanding solve the meaning of the number of the beast, for it is the number of a man.
  - type: note
    content: Or of humanity.
  - type: text
    content: ' His number is 666.'
  - type: note
    content: Some manuscripts read 616.
  '2':
  - type: text
    content: This beast looked like a leopard, but it had the feet of a bear and the mouth of a lion! And the dragon gave the beast his own power and throne and great authority.
  '3':
  - type: text
    content: 'I saw that one of the heads of the beast seemed wounded beyond recovery—but the fatal wound was healed! The whole world marveled at this miracle and gave allegiance to the beast. '
  '4':
  - type: text
    content: They worshiped the dragon for giving the beast such power, and they also worshiped the beast. “Who is as great as the beast?” they exclaimed. “Who is able to fight against him?”
  '5':
  - type: text
    content: 'Then the beast was allowed to speak great blasphemies against God. And he was given authority to do whatever he wanted for forty-two months. '
  '6':
  - type: text
    content: And he spoke terrible words of blasphemy against God, slandering his name and his dwelling—that is, those who dwell in heaven.
  - type: note
    content: Some manuscripts read and his dwelling and all who dwell in heaven.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And the beast was allowed to wage war against God’s holy people and to conquer them. And he was given authority to rule over every tribe and people and language and nation. '
  '8':
  - type: text
    content: And all the people who belong to this world worshiped the beast. They are the ones whose names were not written in the Book of Life that belongs to the Lamb who was slaughtered before the world was made.
  - type: note
    content: Or not written in the Book of Life before the world was made—the Book that belongs to the Lamb who was slaughtered.
  '9':
  - type: text
    content: Anyone with ears to hear
  - type: text
    content: should listen and understand.
