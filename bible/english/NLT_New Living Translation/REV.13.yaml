document_id: REV.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beast out of the Sea
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I saw a beast rising up out of the sea. It had seven heads and ten horns, with ten crowns on its horns. And written on each head were names that blasphemed God. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone who is destined for prison
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be taken to prison.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone destined to die by the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will die by the sword.
  - type: usfm
    marker: m
    children:
    - type: text
      text: This means that God’s holy people must endure persecution patiently and remain faithful.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beast out of the Earth
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I saw another beast come up out of the earth. He had two horns like those of a lamb, but he spoke with the voice of a dragon. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He exercised all the authority of the first beast. And he required all the earth and its people to worship the first beast, whose fatal wound had been healed. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He did astounding miracles, even making fire flash down to earth from the sky while everyone was watching. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And with all the miracles he was allowed to perform on behalf of the first beast, he deceived all the people who belong to this world. He ordered the people to make a great statue of the first beast, who was fatally wounded and then came back to life. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He was then permitted to give life to this statue so that it could speak. Then the statue of the beast commanded that anyone refusing to worship it must die.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He required everyone—small and great, rich and poor, free and slave—to be given a mark on the right hand or on the forehead. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And no one could buy or sell anything without that mark, which was either the name of the beast or the number representing his name. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wisdom is needed here. Let the one with understanding solve the meaning of the number of the beast, for it is the number of a man.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of humanity.
      marker-yv: yv-n
    - type: text
      text: ' His number is 666.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '616.'
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This beast looked like a leopard, but it had the feet of a bear and the mouth of a lion! And the dragon gave the beast his own power and throne and great authority.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw that one of the heads of the beast seemed wounded beyond recovery—but the fatal wound was healed! The whole world marveled at this miracle and gave allegiance to the beast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They worshiped the dragon for giving the beast such power, and they also worshiped the beast. “Who is as great as the beast?” they exclaimed. “Who is able to fight against him?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the beast was allowed to speak great blasphemies against God. And he was given authority to do whatever he wanted for forty-two months. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he spoke terrible words of blasphemy against God, slandering his name and his dwelling—that is, those who dwell in heaven.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and his dwelling and all who dwell in heaven.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the beast was allowed to wage war against God’s holy people and to conquer them. And he was given authority to rule over every tribe and people and language and nation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the people who belong to this world worshiped the beast. They are the ones whose names were not written in the Book of Life that belongs to the Lamb who was slaughtered before the world was made.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not written in the Book of Life before the world was made—the Book that belongs to the Lamb who was slaughtered.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone with ears to hear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: should listen and understand.
