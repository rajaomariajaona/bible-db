document_id: ISA.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Taunt for Babylon’s King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will have mercy on the descendants of Jacob. He will choose Israel as his special people once again. He will bring them back to settle once again in their own land. And people from many different nations will come and join them there and unite with the people of Israel.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the house of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The nations of the world will help the people of Israel to return, and those who come to live in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s land will serve them. Those who captured Israel will themselves be captured, and Israel will rule over its enemies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In that wonderful day when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives his people rest from sorrow and fear, from slavery and chains, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: you will taunt the king of Babylon. You will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The mighty man has been destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, your insolence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Dead Sea Scrolls; the meaning of the Masoretic Text is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' is ended.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has crushed your wicked power'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and broken your evil rule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You struck the people with endless blows of rage
- type: usfm
  marker: q2
  children:
  - type: text
    text: and held the nations in your angry grip
- type: usfm
  marker: q2
  children:
  - type: text
    text: with unrelenting tyranny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But finally the earth is at rest and quiet.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now it can sing again!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even the trees of the forest—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cypress trees and the cedars of Lebanon—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'sing out this joyous song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Since you have been cut down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one will come now to cut us down!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “In the place of the dead
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sheol; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:15.
    marker-yv: yv-n
  - type: text
    text: ' there is excitement'
- type: usfm
  marker: q2
  children:
  - type: text
    text: over your arrival.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The spirits of world leaders and mighty kings long dead
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand up to see you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: With one voice they all cry out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Now you are as weak as we are!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Your might and power were buried with you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: were brought down to Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sound of the harp in your palace has ceased.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now maggots are your sheet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and worms your blanket.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “How you are fallen from heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O shining star, son of the morning!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been thrown down to the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who destroyed the nations of the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For you said to yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I will ascend to heaven and set my throne above God’s stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will preside on the mountain of the gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: far away in the north.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on the heights of Zaphon.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will climb to the highest heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be like the Most High.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Instead, you will be brought down to the place of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: down to its lowest depths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Everyone there will stare at you and ask,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Can this be the one who shook the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made the kingdoms of the world tremble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Is this the one who destroyed the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made it into a wasteland?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is this the king who demolished the world’s greatest cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and had no mercy on his prisoners?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “The kings of the nations lie in stately glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each in his own tomb,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: but you will be thrown out of your grave
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a worthless branch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a corpse trampled underfoot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be dumped into a mass grave
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those killed in battle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will descend to the pit.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You will not be given a proper burial,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you have destroyed your nation
- type: usfm
  marker: q2
  children:
  - type: text
    text: and slaughtered your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The descendants of such an evil person
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never again receive honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Kill this man’s children!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them die because of their father’s sins!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They must not rise and conquer the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filling the world with their cities.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I, myself, have risen against Babylon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will destroy its children and its children’s children,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I will make Babylon a desolate place of owls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filled with swamps and marshes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sweep the land with the broom of destruction.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, have spoken!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Assyria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has sworn this oath:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “It will all happen as I have planned.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will be as I have decided.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will break the Assyrians when they are in Israel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will trample them on my mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people will no longer be their slaves
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor bow down under their heavy loads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I have a plan for the whole earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hand of judgment upon all the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has spoken—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can change his plans?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When his hand is raised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can stop him?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Philistia
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This message came to me the year King Ahaz died:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'King Ahaz died in 715 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do not rejoice, you Philistines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the rod that struck you is broken—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the king who attacked you is dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For from that snake a more poisonous snake will be born,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fiery serpent to destroy you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I will feed the poor in my pasture;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the needy will lie down in peace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But as for you, I will wipe you out with famine
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy the few who remain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Wail at the gates! Weep in the cities!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Melt with fear, you Philistines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A powerful army comes like smoke from the north.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Each soldier rushes forward eager to fight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: What should we tell the Philistine messengers? Tell them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has built Jerusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its walls will give refuge to his oppressed people.”
