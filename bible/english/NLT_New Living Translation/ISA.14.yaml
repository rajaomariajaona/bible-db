document_id: ISA.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Taunt for Babylon’s King
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will have mercy on the descendants of Jacob. He will choose Israel as his special people once again. He will bring them back to settle once again in their own land. And people from many different nations will come and join them there and unite with the people of Israel.'
  - type: note
    content: Hebrew the house of Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: ' '
  '10':
  - type: text
    content: With one voice they all cry out,
  - type: text
    content: ‘Now you are as weak as we are!
  '11':
  - type: text
    content: Your might and power were buried with you.
  - type: note
    content: Hebrew were brought down to Sheol.
  - type: text
    content: The sound of the harp in your palace has ceased.
  - type: text
    content: Now maggots are your sheet,
  - type: text
    content: and worms your blanket.’
  '12':
  - type: text
    content: “How you are fallen from heaven,
  - type: text
    content: O shining star, son of the morning!
  - type: text
    content: You have been thrown down to the earth,
  - type: text
    content: you who destroyed the nations of the world.
  '13':
  - type: text
    content: For you said to yourself,
  - type: text
    content: ‘I will ascend to heaven and set my throne above God’s stars.
  - type: text
    content: I will preside on the mountain of the gods
  - type: text
    content: far away in the north.
  - type: note
    content: Or on the heights of Zaphon.
  '14':
  - type: text
    content: I will climb to the highest heavens
  - type: text
    content: and be like the Most High.’
  '15':
  - type: text
    content: Instead, you will be brought down to the place of the dead,
  - type: text
    content: down to its lowest depths.
  '16':
  - type: text
    content: Everyone there will stare at you and ask,
  - type: text
    content: ‘Can this be the one who shook the earth
  - type: text
    content: and made the kingdoms of the world tremble?
  '17':
  - type: text
    content: Is this the one who destroyed the world
  - type: text
    content: and made it into a wasteland?
  - type: text
    content: Is this the king who demolished the world’s greatest cities
  - type: text
    content: and had no mercy on his prisoners?’
  '18':
  - type: text
    content: “The kings of the nations lie in stately glory,
  - type: text
    content: each in his own tomb,
  '19':
  - type: text
    content: but you will be thrown out of your grave
  - type: text
    content: like a worthless branch.
  - type: text
    content: Like a corpse trampled underfoot,
  - type: text
    content: you will be dumped into a mass grave
  - type: text
    content: with those killed in battle.
  - type: text
    content: You will descend to the pit.
  '2':
  - type: text
    content: 'The nations of the world will help the people of Israel to return, and those who come to live in the '
  - type: text
    content: Lord
  - type: text
    content: ’s land will serve them. Those who captured Israel will themselves be captured, and Israel will rule over its enemies.
  '20':
  - type: text
    content: You will not be given a proper burial,
  - type: text
    content: for you have destroyed your nation
  - type: text
    content: and slaughtered your people.
  - type: text
    content: The descendants of such an evil person
  - type: text
    content: will never again receive honor.
  '21':
  - type: text
    content: Kill this man’s children!
  - type: text
    content: Let them die because of their father’s sins!
  - type: text
    content: They must not rise and conquer the earth,
  - type: text
    content: filling the world with their cities.”
  '22':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “I, myself, have risen against Babylon!
  - type: text
    content: I will destroy its children and its children’s children,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: “I will make Babylon a desolate place of owls,
  - type: text
    content: filled with swamps and marshes.
  - type: text
    content: I will sweep the land with the broom of destruction.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!”'
  - type: heading
    content: A Message about Assyria
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has sworn this oath:'
  - type: text
    content: “It will all happen as I have planned.
  - type: text
    content: It will be as I have decided.
  '25':
  - type: text
    content: I will break the Assyrians when they are in Israel;
  - type: text
    content: I will trample them on my mountains.
  - type: text
    content: My people will no longer be their slaves
  - type: text
    content: nor bow down under their heavy loads.
  '26':
  - type: text
    content: I have a plan for the whole earth,
  - type: text
    content: a hand of judgment upon all the nations.
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has spoken—'
  - type: text
    content: who can change his plans?
  - type: text
    content: When his hand is raised,
  - type: text
    content: who can stop him?”
  - type: heading
    content: A Message about Philistia
  '28':
  - type: text
    content: 'This message came to me the year King Ahaz died:'
  - type: note
    content: King Ahaz died in 715 b.c.
  '29':
  - type: text
    content: Do not rejoice, you Philistines,
  - type: text
    content: that the rod that struck you is broken—
  - type: text
    content: that the king who attacked you is dead.
  - type: text
    content: For from that snake a more poisonous snake will be born,
  - type: text
    content: a fiery serpent to destroy you!
  '3':
  - type: text
    content: 'In that wonderful day when the '
  - type: text
    content: Lord
  - type: text
    content: ' gives his people rest from sorrow and fear, from slavery and chains, '
  '30':
  - type: text
    content: I will feed the poor in my pasture;
  - type: text
    content: the needy will lie down in peace.
  - type: text
    content: But as for you, I will wipe you out with famine
  - type: text
    content: and destroy the few who remain.
  '31':
  - type: text
    content: Wail at the gates! Weep in the cities!
  - type: text
    content: Melt with fear, you Philistines!
  - type: text
    content: A powerful army comes like smoke from the north.
  - type: text
    content: Each soldier rushes forward eager to fight.
  '32':
  - type: text
    content: What should we tell the Philistine messengers? Tell them,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has built Jerusalem'
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ;
  - type: text
    content: its walls will give refuge to his oppressed people.”
  '4':
  - type: text
    content: you will taunt the king of Babylon. You will say,
  - type: text
    content: “The mighty man has been destroyed.
  - type: text
    content: Yes, your insolence
  - type: note
    content: As in Dead Sea Scrolls; the meaning of the Masoretic Text is uncertain.
  - type: text
    content: ' is ended.'
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has crushed your wicked power'
  - type: text
    content: and broken your evil rule.
  '6':
  - type: text
    content: You struck the people with endless blows of rage
  - type: text
    content: and held the nations in your angry grip
  - type: text
    content: with unrelenting tyranny.
  '7':
  - type: text
    content: But finally the earth is at rest and quiet.
  - type: text
    content: Now it can sing again!
  '8':
  - type: text
    content: Even the trees of the forest—
  - type: text
    content: the cypress trees and the cedars of Lebanon—
  - type: text
    content: 'sing out this joyous song:'
  - type: text
    content: ‘Since you have been cut down,
  - type: text
    content: no one will come now to cut us down!’
  '9':
  - type: text
    content: “In the place of the dead
  - type: note
    content: Hebrew Sheol; also in 14:15.
  - type: text
    content: ' there is excitement'
  - type: text
    content: over your arrival.
  - type: text
    content: The spirits of world leaders and mighty kings long dead
  - type: text
    content: stand up to see you.
