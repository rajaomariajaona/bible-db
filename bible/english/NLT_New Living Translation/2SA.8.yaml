document_id: 2SA.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Military Victories
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After this, David defeated and subdued the Philistines by conquering Gath, their largest town.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'by conquering Metheg-ammah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a name that means “the bridle,” possibly referring to the size of the town or the tribute money taken from it. Compare 1 Chr 18:1.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David also conquered the land of Moab. He made the people lie down on the ground in a row, and he measured them off in groups with a length of rope. He measured off two groups to be executed for every one group to be spared. The Moabites who were spared became David’s subjects and paid him tribute money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David also destroyed the forces of Hadadezer son of Rehob, king of Zobah, when Hadadezer marched out to strengthen his control along the Euphrates River. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: David captured 1,000 chariots, 7,000 charioteers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls and Greek version (see also 1 Chr 18:4); Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: captured 1,700 charioteers.
    marker-yv: yv-n
  - type: text
    text: ' and 20,000 foot soldiers. He crippled all the chariot horses except enough for 100 chariots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Arameans from Damascus arrived to help King Hadadezer, David killed 22,000 of them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he placed several army garrisons in Damascus, the Aramean capital, and the Arameans became David’s subjects and paid him tribute money. So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made David victorious wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David brought the gold shields of Hadadezer’s officers to Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: along with a large amount of bronze from Hadadezer’s towns of Tebah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 1 Chr 18:8); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Betah.
    marker-yv: yv-n
  - type: text
    text: ' and Berothai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When King Toi of Hamath heard that David had destroyed the entire army of Hadadezer, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: he sent his son Joram to congratulate King David for his successful campaign. Hadadezer and Toi had been enemies and were often at war. Joram presented David with many gifts of silver, gold, and bronze.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'King David dedicated all these gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as he did with the silver and gold from the other nations he had defeated— '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: from Edom,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in a few Hebrew manuscripts and Greek and Syriac versions (see also 8:14; 1 Chr 18:11); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aram.
    marker-yv: yv-n
  - type: text
    text: ' Moab, Ammon, Philistia, and Amalek—and from Hadadezer son of Rehob, king of Zobah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So David became even more famous when he returned from destroying 18,000 Edomites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in a few Hebrew manuscripts and Greek and Syriac versions (see also 8:14; 1 Chr 18:12); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Arameans.
    marker-yv: yv-n
  - type: text
    text: ' in the Valley of Salt. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He placed army garrisons throughout Edom, and all the Edomites became David’s subjects. In fact, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made David victorious wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So David reigned over all Israel and did what was just and right for all his people. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab son of Zeruiah was commander of the army. Jehoshaphat son of Ahilud was the royal historian. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zadok son of Ahitub and Ahimelech son of Abiathar were the priests. Seraiah was the court secretary. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Benaiah son of Jehoiada was captain of the king’s bodyguard.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the Kerethites and Pelethites.
    marker-yv: yv-n
  - type: text
    text: ' And David’s sons served as priestly leaders.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'David’s sons were priests; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare parallel text at 1 Chr 18:17.
    marker-yv: yv-n
