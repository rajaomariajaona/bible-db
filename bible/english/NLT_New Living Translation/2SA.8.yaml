document_id: 2SA.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Military Victories
  - type: text
    content: After this, David defeated and subdued the Philistines by conquering Gath, their largest town.
  - type: note
    content: Hebrew by conquering Metheg-ammah, a name that means “the bridle,” possibly referring to the size of the town or the tribute money taken from it. Compare 1 Chr 18:1.
  - type: text
    content: ' '
  '10':
  - type: text
    content: he sent his son Joram to congratulate King David for his successful campaign. Hadadezer and Toi had been enemies and were often at war. Joram presented David with many gifts of silver, gold, and bronze.
  '11':
  - type: text
    content: 'King David dedicated all these gifts to the '
  - type: text
    content: Lord
  - type: text
    content: ', as he did with the silver and gold from the other nations he had defeated— '
  '12':
  - type: text
    content: from Edom,
  - type: note
    content: As in a few Hebrew manuscripts and Greek and Syriac versions (see also 8:14; 1 Chr 18:11); most Hebrew manuscripts read Aram.
  - type: text
    content: ' Moab, Ammon, Philistia, and Amalek—and from Hadadezer son of Rehob, king of Zobah.'
  '13':
  - type: text
    content: So David became even more famous when he returned from destroying 18,000 Edomites
  - type: note
    content: As in a few Hebrew manuscripts and Greek and Syriac versions (see also 8:14; 1 Chr 18:12); most Hebrew manuscripts read Arameans.
  - type: text
    content: ' in the Valley of Salt. '
  '14':
  - type: text
    content: 'He placed army garrisons throughout Edom, and all the Edomites became David’s subjects. In fact, the '
  - type: text
    content: Lord
  - type: text
    content: ' made David victorious wherever he went.'
  '15':
  - type: text
    content: 'So David reigned over all Israel and did what was just and right for all his people. '
  '16':
  - type: text
    content: 'Joab son of Zeruiah was commander of the army. Jehoshaphat son of Ahilud was the royal historian. '
  '17':
  - type: text
    content: 'Zadok son of Ahitub and Ahimelech son of Abiathar were the priests. Seraiah was the court secretary. '
  '18':
  - type: text
    content: Benaiah son of Jehoiada was captain of the king’s bodyguard.
  - type: note
    content: Hebrew of the Kerethites and Pelethites.
  - type: text
    content: ' And David’s sons served as priestly leaders.'
  - type: note
    content: Hebrew David’s sons were priests; compare parallel text at 1 Chr 18:17.
  '2':
  - type: text
    content: David also conquered the land of Moab. He made the people lie down on the ground in a row, and he measured them off in groups with a length of rope. He measured off two groups to be executed for every one group to be spared. The Moabites who were spared became David’s subjects and paid him tribute money.
  '3':
  - type: text
    content: 'David also destroyed the forces of Hadadezer son of Rehob, king of Zobah, when Hadadezer marched out to strengthen his control along the Euphrates River. '
  '4':
  - type: text
    content: David captured 1,000 chariots, 7,000 charioteers,
  - type: note
    content: As in Dead Sea Scrolls and Greek version (see also 1 Chr 18:4); Masoretic Text reads captured 1,700 charioteers.
  - type: text
    content: ' and 20,000 foot soldiers. He crippled all the chariot horses except enough for 100 chariots.'
  '5':
  - type: text
    content: 'When Arameans from Damascus arrived to help King Hadadezer, David killed 22,000 of them. '
  '6':
  - type: text
    content: 'Then he placed several army garrisons in Damascus, the Aramean capital, and the Arameans became David’s subjects and paid him tribute money. So the '
  - type: text
    content: Lord
  - type: text
    content: ' made David victorious wherever he went.'
  '7':
  - type: text
    content: 'David brought the gold shields of Hadadezer’s officers to Jerusalem, '
  '8':
  - type: text
    content: along with a large amount of bronze from Hadadezer’s towns of Tebah
  - type: note
    content: As in some Greek manuscripts (see also 1 Chr 18:8); Hebrew reads Betah.
  - type: text
    content: ' and Berothai.'
  '9':
  - type: text
    content: 'When King Toi of Hamath heard that David had destroyed the entire army of Hadadezer, '
