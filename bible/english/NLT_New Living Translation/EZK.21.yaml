document_id: EZK.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Sword of Judgment
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 21:1-32 are numbered 21:6-37 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'Then this message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: It is sharpened for terrible slaughter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and polished to flash like lightning!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now will you laugh?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those far stronger than you have fallen beneath its power!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Yes, the sword is now being sharpened and polished;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is being prepared for the executioner.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Son of man, cry out and wail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pound your thighs in anguish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for that sword will slaughter my people and their leaders—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone will die!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: It will put them all to the test.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What chance do they have?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Son of man, prophesy to them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clap your hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then take the sword and brandish it twice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even three times,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to symbolize the great massacre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the great massacre facing them on every side.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Let their hearts melt with terror,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sword glitters at every gate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It flashes like lightning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is polished for slaughter!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: O sword, slash to the right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then slash to the left,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wherever you will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wherever you want.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I, too, will clap my hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will satisfy my fury.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omens for Babylon’s King
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then this message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Son of man, make a map and trace two routes on it for the sword of Babylon’s king to follow. Put a signpost on the road that comes out of Babylon where the road forks into two— '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, turn and face Jerusalem and prophesy against Israel and her sanctuaries. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'one road going to Ammon and its capital, Rabbah, and the other to Judah and fortified Jerusalem. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The king of Babylon now stands at the fork, uncertain whether to attack Jerusalem or Rabbah. He calls his magicians to look for omens. They cast lots by shaking arrows from the quiver. They inspect the livers of animal sacrifices. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The omen in his right hand says, ‘Jerusalem!’ With battering rams his soldiers will go against the gates, shouting for the kill. They will put up siege towers and build ramps against the walls. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The people of Jerusalem will think it is a false omen, because of their treaty with the Babylonians. But the king of Babylon will remind the people of their rebellion. Then he will attack and capture them.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Therefore, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Again and again you remind me of your sin and your guilt. You don’t even try to hide it! In everything you do, your sins are obvious for all to see. So now the time of your punishment has come!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“O you corrupt and wicked prince of Israel, your final day of reckoning is here! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take off your jeweled crown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the old order changes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now the lowly will be exalted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mighty will be brought down.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Destruction! Destruction!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will surely destroy the kingdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it will not be restored until the one appears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who has the right to judge it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will hand it over to him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for the Ammonites
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“And now, son of man, prophesy concerning the Ammonites and their mockery. Give them this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A sword, a sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is drawn for your slaughter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is polished to destroy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flashing like lightning!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Your prophets have given false visions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your fortune-tellers have told lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will fall on the necks of the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for whom the day of final reckoning has come.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tell her, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am your enemy, O Israel, and I am about to unsheath my sword to destroy your people—the righteous and the wicked alike. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “Now return the sword to its sheath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for in your own country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the land of your birth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will pass judgment upon you.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I will pour out my fury on you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and blow on you with the fire of my anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hand you over to cruel men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are skilled in destruction.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: You will be fuel for the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your blood will be spilled in your own land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be utterly wiped out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your memory lost to history,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Yes, I will cut off both the righteous and the wicked! I will draw my sword against everyone in the land from south to north. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Everyone in the world will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . My sword is in my hand, and it will not return to its sheath until its work is finished.’
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Son of man, groan before the people! Groan before them with bitter anguish and a broken heart. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When they ask why you are groaning, tell them, ‘I groan because of the terrifying news I have heard. When it comes true, the boldest heart will melt with fear; all strength will disappear. Every spirit will faint; strong knees will become as weak as water. And the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: It is coming! It’s on its way!’”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Son of man, give the people this message from the Lord:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A sword, a sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is being sharpened and polished.
