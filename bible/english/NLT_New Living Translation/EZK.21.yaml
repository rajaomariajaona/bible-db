document_id: EZK.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Sword of Judgment
  - type: text
    content: ' '
  - type: note
    content: Verses 21:1-32 are numbered 21:6-37 in Hebrew text.
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: It is sharpened for terrible slaughter
  - type: text
    content: and polished to flash like lightning!
  - type: text
    content: Now will you laugh?
  - type: text
    content: Those far stronger than you have fallen beneath its power!
  - type: note
    content: The meaning of the Hebrew is uncertain.
  '11':
  - type: text
    content: Yes, the sword is now being sharpened and polished;
  - type: text
    content: it is being prepared for the executioner.
  '12':
  - type: text
    content: “Son of man, cry out and wail;
  - type: text
    content: pound your thighs in anguish,
  - type: text
    content: for that sword will slaughter my people and their leaders—
  - type: text
    content: everyone will die!
  '13':
  - type: text
    content: It will put them all to the test.
  - type: text
    content: What chance do they have?
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: 'says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: “Son of man, prophesy to them
  - type: text
    content: and clap your hands.
  - type: text
    content: Then take the sword and brandish it twice,
  - type: text
    content: even three times,
  - type: text
    content: to symbolize the great massacre,
  - type: text
    content: the great massacre facing them on every side.
  '15':
  - type: text
    content: Let their hearts melt with terror,
  - type: text
    content: for the sword glitters at every gate.
  - type: text
    content: It flashes like lightning
  - type: text
    content: and is polished for slaughter!
  '16':
  - type: text
    content: O sword, slash to the right,
  - type: text
    content: then slash to the left,
  - type: text
    content: wherever you will,
  - type: text
    content: wherever you want.
  '17':
  - type: text
    content: I, too, will clap my hands,
  - type: text
    content: and I will satisfy my fury.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Omens for Babylon’s King
  '18':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '19':
  - type: text
    content: '“Son of man, make a map and trace two routes on it for the sword of Babylon’s king to follow. Put a signpost on the road that comes out of Babylon where the road forks into two— '
  '2':
  - type: text
    content: '“Son of man, turn and face Jerusalem and prophesy against Israel and her sanctuaries. '
  '20':
  - type: text
    content: 'one road going to Ammon and its capital, Rabbah, and the other to Judah and fortified Jerusalem. '
  '21':
  - type: text
    content: 'The king of Babylon now stands at the fork, uncertain whether to attack Jerusalem or Rabbah. He calls his magicians to look for omens. They cast lots by shaking arrows from the quiver. They inspect the livers of animal sacrifices. '
  '22':
  - type: text
    content: 'The omen in his right hand says, ‘Jerusalem!’ With battering rams his soldiers will go against the gates, shouting for the kill. They will put up siege towers and build ramps against the walls. '
  '23':
  - type: text
    content: The people of Jerusalem will think it is a false omen, because of their treaty with the Babylonians. But the king of Babylon will remind the people of their rebellion. Then he will attack and capture them.
  '24':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Again and again you remind me of your sin and your guilt. You don’t even try to hide it! In everything you do, your sins are obvious for all to see. So now the time of your punishment has come!'
  '25':
  - type: text
    content: '“O you corrupt and wicked prince of Israel, your final day of reckoning is here! '
  '26':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Take off your jeweled crown,
  - type: text
    content: for the old order changes.
  - type: text
    content: Now the lowly will be exalted,
  - type: text
    content: and the mighty will be brought down.
  '27':
  - type: text
    content: Destruction! Destruction!
  - type: text
    content: I will surely destroy the kingdom.
  - type: text
    content: And it will not be restored until the one appears
  - type: text
    content: who has the right to judge it.
  - type: text
    content: Then I will hand it over to him.
  - type: heading
    content: A Message for the Ammonites
  '28':
  - type: text
    content: '“And now, son of man, prophesy concerning the Ammonites and their mockery. Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “A sword, a sword
  - type: text
    content: is drawn for your slaughter.
  - type: text
    content: It is polished to destroy,
  - type: text
    content: flashing like lightning!
  '29':
  - type: text
    content: Your prophets have given false visions,
  - type: text
    content: and your fortune-tellers have told lies.
  - type: text
    content: The sword will fall on the necks of the wicked
  - type: text
    content: for whom the day of final reckoning has come.
  '3':
  - type: text
    content: 'Tell her, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am your enemy, O Israel, and I am about to unsheath my sword to destroy your people—the righteous and the wicked alike. '
  '30':
  - type: text
    content: “Now return the sword to its sheath,
  - type: text
    content: for in your own country,
  - type: text
    content: the land of your birth,
  - type: text
    content: I will pass judgment upon you.
  '31':
  - type: text
    content: I will pour out my fury on you
  - type: text
    content: and blow on you with the fire of my anger.
  - type: text
    content: I will hand you over to cruel men
  - type: text
    content: who are skilled in destruction.
  '32':
  - type: text
    content: You will be fuel for the fire,
  - type: text
    content: and your blood will be spilled in your own land.
  - type: text
    content: You will be utterly wiped out,
  - type: text
    content: your memory lost to history,
  - type: text
    content: 'for I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: 'Yes, I will cut off both the righteous and the wicked! I will draw my sword against everyone in the land from south to north. '
  '5':
  - type: text
    content: 'Everyone in the world will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: . My sword is in my hand, and it will not return to its sheath until its work is finished.’
  '6':
  - type: text
    content: '“Son of man, groan before the people! Groan before them with bitter anguish and a broken heart. '
  '7':
  - type: text
    content: 'When they ask why you are groaning, tell them, ‘I groan because of the terrifying news I have heard. When it comes true, the boldest heart will melt with fear; all strength will disappear. Every spirit will faint; strong knees will become as weak as water. And the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: It is coming! It’s on its way!’”'
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '9':
  - type: text
    content: '“Son of man, give the people this message from the Lord:'
  - type: text
    content: “A sword, a sword
  - type: text
    content: is being sharpened and polished.
