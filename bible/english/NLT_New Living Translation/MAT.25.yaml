document_id: MAT.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Ten Bridesmaids
  - type: text
    content: ' '
  - type: text
    content: “Then the Kingdom of Heaven will be like ten bridesmaids
  - type: text
    content: ' '
  - type: note
    content: Or virgins; also in 25:7, 11.
  - type: text
    content: who took their lamps and went to meet the bridegroom.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “But while they were gone to buy oil, the bridegroom came. Then those who were ready went in with him to the marriage feast, and the door was locked.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Later, when the other five bridesmaids returned, they stood outside, calling, ‘Lord! Lord! Open the door for us!’
  '12':
  - type: text
    content: ' '
  - type: text
    content: “But he called back, ‘Believe me, I don’t know you!’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “So you, too, must keep watch! For you do not know the day or hour of my return.
  - type: heading
    content: Parable of the Three Servants
  '14':
  - type: text
    content: ' '
  - type: text
    content: “Again, the Kingdom of Heaven can be illustrated by the story of a man going on a long trip. He called together his servants and entrusted his money to them while he was gone.
  - type: text
    content: ' '
  '15':
  - type: text
    content: He gave five bags of silver
  - type: note
    content: Greek talents; also throughout the story. A talent is equal to 75 pounds or 34 kilograms.
  - type: text
    content: ' '
  - type: text
    content: to one, two bags of silver to another, and one bag of silver to the last—dividing it in proportion to their abilities. He then left on his trip.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “The servant who received the five bags of silver began to invest the money and earned five more.
  - type: text
    content: ' '
  '17':
  - type: text
    content: The servant with two bags of silver also went to work and earned two more.
  - type: text
    content: ' '
  '18':
  - type: text
    content: But the servant who received the one bag of silver dug a hole in the ground and hid the master’s money.
  '19':
  - type: text
    content: ' '
  - type: text
    content: “After a long time their master returned from his trip and called them to give an account of how they had used his money.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Five of them were foolish, and five were wise.
  - type: text
    content: ' '
  '20':
  - type: text
    content: The servant to whom he had entrusted the five bags of silver came forward with five more and said, ‘Master, you gave me five bags of silver to invest, and I have earned five more.’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “The master was full of praise. ‘Well done, my good and faithful servant. You have been faithful in handling this small amount, so now I will give you many more responsibilities. Let’s celebrate together!
  - type: text
    content: ' '
  - type: note
    content: Greek Enter into the joy of your master [or your Lord ]; also in 25:23.
  - type: text
    content: ’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “The servant who had received the two bags of silver came forward and said, ‘Master, you gave me two bags of silver to invest, and I have earned two more.’
  '23':
  - type: text
    content: ' '
  - type: text
    content: “The master said, ‘Well done, my good and faithful servant. You have been faithful in handling this small amount, so now I will give you many more responsibilities. Let’s celebrate together!’
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Then the servant with the one bag of silver came and said, ‘Master, I knew you were a harsh man, harvesting crops you didn’t plant and gathering crops you didn’t cultivate.
  - type: text
    content: ' '
  '25':
  - type: text
    content: I was afraid I would lose your money, so I hid it in the earth. Look, here is your money back.’
  '26':
  - type: text
    content: ' '
  - type: text
    content: “But the master replied, ‘You wicked and lazy servant! If you knew I harvested crops I didn’t plant and gathered crops I didn’t cultivate,
  - type: text
    content: ' '
  '27':
  - type: text
    content: why didn’t you deposit my money in the bank? At least I could have gotten some interest on it.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Then he ordered, ‘Take the money from this servant, and give it to the one with the ten bags of silver.
  - type: text
    content: ' '
  '29':
  - type: text
    content: To those who use well what they are given, even more will be given, and they will have an abundance. But from those who do nothing, even what little they have will be taken away.
  - type: text
    content: ' '
  '3':
  - type: text
    content: The five who were foolish didn’t take enough olive oil for their lamps,
  - type: text
    content: ' '
  '30':
  - type: text
    content: Now throw this useless servant into outer darkness, where there will be weeping and gnashing of teeth.’
  - type: heading
    content: The Final Judgment
  '31':
  - type: text
    content: ' '
  - type: text
    content: “But when the Son of Man
  - type: text
    content: ' '
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: comes in his glory, and all the angels with him, then he will sit upon his glorious throne.
  - type: text
    content: ' '
  '32':
  - type: text
    content: All the nations
  - type: note
    content: Or peoples.
  - type: text
    content: ' '
  - type: text
    content: will be gathered in his presence, and he will separate the people as a shepherd separates the sheep from the goats.
  - type: text
    content: ' '
  '33':
  - type: text
    content: He will place the sheep at his right hand and the goats at his left.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Then the King will say to those on his right, ‘Come, you who are blessed by my Father, inherit the Kingdom prepared for you from the creation of the world.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For I was hungry, and you fed me. I was thirsty, and you gave me a drink. I was a stranger, and you invited me into your home.
  - type: text
    content: ' '
  '36':
  - type: text
    content: I was naked, and you gave me clothing. I was sick, and you cared for me. I was in prison, and you visited me.’
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Then these righteous ones will reply, ‘Lord, when did we ever see you hungry and feed you? Or thirsty and give you something to drink?
  - type: text
    content: ' '
  '38':
  - type: text
    content: Or a stranger and show you hospitality? Or naked and give you clothing?
  - type: text
    content: ' '
  '39':
  - type: text
    content: When did we ever see you sick or in prison and visit you?’
  '4':
  - type: text
    content: but the other five were wise enough to take along extra oil.
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: “And the King will say, ‘I tell you the truth, when you did it to one of the least of these my brothers and sisters,
  - type: text
    content: ' '
  - type: note
    content: Greek my brothers.
  - type: text
    content: you were doing it to me!’
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Then the King will turn to those on the left and say, ‘Away with you, you cursed ones, into the eternal fire prepared for the devil and his demons.
  - type: text
    content: ' '
  - type: note
    content: Greek his angels.
  '42':
  - type: text
    content: For I was hungry, and you didn’t feed me. I was thirsty, and you didn’t give me a drink.
  - type: text
    content: ' '
  '43':
  - type: text
    content: I was a stranger, and you didn’t invite me into your home. I was naked, and you didn’t give me clothing. I was sick and in prison, and you didn’t visit me.’
  '44':
  - type: text
    content: ' '
  - type: text
    content: “Then they will reply, ‘Lord, when did we ever see you hungry or thirsty or a stranger or naked or sick or in prison, and not help you?’
  '45':
  - type: text
    content: ' '
  - type: text
    content: “And he will answer, ‘I tell you the truth, when you refused to help the least of these my brothers and sisters, you were refusing to help me.’
  '46':
  - type: text
    content: ' '
  - type: text
    content: “And they will go away into eternal punishment, but the righteous will go into eternal life.”
  '5':
  - type: text
    content: When the bridegroom was delayed, they all became drowsy and fell asleep.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “At midnight they were roused by the shout, ‘Look, the bridegroom is coming! Come out and meet him!’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “All the bridesmaids got up and prepared their lamps.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Then the five foolish ones asked the others, ‘Please give us some of your oil because our lamps are going out.’
  '9':
  - type: text
    content: ' '
  - type: text
    content: “But the others replied, ‘We don’t have enough for all of us. Go to a shop and buy some for yourselves.’
