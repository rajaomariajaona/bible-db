document_id: 1KI.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ben-Hadad Attacks Samaria
  - type: text
    content: 'About that time King Ben-hadad of Aram mobilized his army, supported by the chariots and horses of thirty-two allied kings. They went to besiege Samaria, the capital of Israel, and launched attacks against it. '
  '10':
  - type: text
    content: 'Then Ben-hadad sent this message to Ahab: “May the gods strike me and even kill me if there remains enough dust from Samaria to provide even a handful for each of my soldiers.”'
  '11':
  - type: text
    content: 'The king of Israel sent back this answer: “A warrior putting on his sword for battle should not boast like a warrior who has already won.”'
  '12':
  - type: text
    content: Ahab’s reply reached Ben-hadad and the other kings as they were drinking in their tents.
  - type: note
    content: Or in Succoth; also in 20:16.
  - type: text
    content: ' “Prepare to attack!” Ben-hadad commanded his officers. So they prepared to attack the city.'
  - type: heading
    content: Ahab’s Victory over Ben-Hadad
  '13':
  - type: text
    content: 'Then a certain prophet came to see King Ahab of Israel and told him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do you see all these enemy forces? Today I will hand them all over to you. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '14':
  - type: text
    content: Ahab asked, “How will he do it?”
  - type: text
    content: 'And the prophet replied, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: The troops of the provincial commanders will do it.”'
  - type: text
    content: “Should we attack first?” Ahab asked.
  - type: text
    content: “Yes,” the prophet answered.
  '15':
  - type: text
    content: 'So Ahab mustered the troops of the 232 provincial commanders. Then he called out the rest of the army of Israel, some 7,000 men. '
  '16':
  - type: text
    content: 'About noontime, as Ben-hadad and the thirty-two allied kings were still in their tents drinking themselves into a stupor, '
  '17':
  - type: text
    content: the troops of the provincial commanders marched out of the city as the first contingent.
  - type: text
    content: As they approached, Ben-hadad’s scouts reported to him, “Some troops are coming from Samaria.”
  '18':
  - type: text
    content: “Take them alive,” Ben-hadad commanded, “whether they have come for peace or for war.”
  '19':
  - type: text
    content: 'But Ahab’s provincial commanders and the entire army had now come out to fight. '
  '2':
  - type: text
    content: 'Ben-hadad sent messengers into the city to relay this message to King Ahab of Israel: “This is what Ben-hadad says: '
  '20':
  - type: text
    content: 'Each Israelite soldier killed his Aramean opponent, and suddenly the entire Aramean army panicked and fled. The Israelites chased them, but King Ben-hadad and a few of his charioteers escaped on horses. '
  '21':
  - type: text
    content: However, the king of Israel destroyed the other horses and chariots and slaughtered the Arameans.
  '22':
  - type: text
    content: Afterward the prophet said to King Ahab, “Get ready for another attack. Begin making plans now, for the king of Aram will come back next spring.
  - type: note
    content: Hebrew at the turn of the year; similarly in 20:26. The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
  - type: text
    content: ”
  - type: heading
    content: Ben-Hadad’s Second Attack
  '23':
  - type: text
    content: 'After their defeat, Ben-hadad’s officers said to him, “The Israelite gods are gods of the hills; that is why they won. But we can beat them easily on the plains. '
  '24':
  - type: text
    content: 'Only this time replace the kings with field commanders! '
  '25':
  - type: text
    content: Recruit another army like the one you lost. Give us the same number of horses, chariots, and men, and we will fight against them on the plains. There’s no doubt that we will beat them.” So King Ben-hadad did as they suggested.
  '26':
  - type: text
    content: 'The following spring he called up the Aramean army and marched out against Israel, this time at Aphek. '
  '27':
  - type: text
    content: Israel then mustered its army, set up supply lines, and marched out for battle. But the Israelite army looked like two little flocks of goats in comparison to the vast Aramean forces that filled the countryside!
  '28':
  - type: text
    content: 'Then the man of God went to the king of Israel and said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: The Arameans have said, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is a god of the hills and not of the plains.’ So I will defeat this vast army for you. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '29':
  - type: text
    content: 'The two armies camped opposite each other for seven days, and on the seventh day the battle began. The Israelites killed 100,000 Aramean foot soldiers in one day. '
  '3':
  - type: text
    content: ‘Your silver and gold are mine, and so are your wives and the best of your children!’”
  '30':
  - type: text
    content: The rest fled into the town of Aphek, but the wall fell on them and killed another 27,000. Ben-hadad fled into the town and hid in a secret room.
  '31':
  - type: text
    content: Ben-hadad’s officers said to him, “Sir, we have heard that the kings of Israel are merciful. So let’s humble ourselves by wearing burlap around our waists and putting ropes on our heads, and surrender to the king of Israel. Then perhaps he will let you live.”
  '32':
  - type: text
    content: So they put on burlap and ropes, and they went to the king of Israel and begged, “Your servant Ben-hadad says, ‘Please let me live!’”
  - type: text
    content: The king of Israel responded, “Is he still alive? He is my brother!”
  '33':
  - type: text
    content: The men took this as a good sign and quickly picked up on his words. “Yes,” they said, “your brother Ben-hadad!”
  - type: text
    content: “Go and get him,” the king of Israel told them. And when Ben-hadad arrived, Ahab invited him up into his chariot.
  '34':
  - type: text
    content: Ben-hadad told him, “I will give back the towns my father took from your father, and you may establish places of trade in Damascus, as my father did in Samaria.”
  - type: text
    content: Then Ahab said, “I will release you under these conditions.” So they made a new treaty, and Ben-hadad was set free.
  - type: heading
    content: A Prophet Condemns Ahab
  '35':
  - type: text
    content: 'Meanwhile, the '
  - type: text
    content: Lord
  - type: text
    content: ' instructed one of the group of prophets to say to another man, “Hit me!” But the man refused to hit the prophet. '
  '36':
  - type: text
    content: 'Then the prophet told him, “Because you have not obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ', a lion will kill you as soon as you leave me.” And when he had gone, a lion did attack and kill him.'
  '37':
  - type: text
    content: Then the prophet turned to another man and said, “Hit me!” So he struck the prophet and wounded him.
  '38':
  - type: text
    content: 'The prophet placed a bandage over his eyes to disguise himself and then waited beside the road for the king. '
  '39':
  - type: text
    content: As the king passed by, the prophet called out to him, “Sir, I was in the thick of battle, and suddenly a man brought me a prisoner. He said, ‘Guard this man; if for any reason he gets away, you will either die or pay a fine of seventy-five pounds
  - type: note
    content: Hebrew 1 talent [34 kilograms].
  - type: text
    content: ' of silver!’ '
  '4':
  - type: text
    content: “All right, my lord the king,” Israel’s king replied. “All that I have is yours!”
  '40':
  - type: text
    content: But while I was busy doing something else, the prisoner disappeared!”
  - type: text
    content: “Well, it’s your own fault,” the king replied. “You have brought the judgment on yourself.”
  '41':
  - type: text
    content: 'Then the prophet quickly pulled the bandage from his eyes, and the king of Israel recognized him as one of the prophets. '
  '42':
  - type: text
    content: 'The prophet said to him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you have spared the man I said must be destroyed,'
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' now you must die in his place, and your people will die instead of his people.” '
  '43':
  - type: text
    content: So the king of Israel went home to Samaria angry and sullen.
  '5':
  - type: text
    content: 'Soon Ben-hadad’s messengers returned again and said, “This is what Ben-hadad says: ‘I have already demanded that you give me your silver, gold, wives, and children. '
  '6':
  - type: text
    content: But about this time tomorrow I will send my officials to search your palace and the homes of your officials. They will take away everything you consider valuable!’”
  '7':
  - type: text
    content: Then Ahab summoned all the elders of the land and said to them, “Look how this man is stirring up trouble! I already agreed with his demand that I give him my wives and children and silver and gold.”
  '8':
  - type: text
    content: “Don’t give in to any more demands,” all the elders and the people advised.
  '9':
  - type: text
    content: 'So Ahab told the messengers from Ben-hadad, “Say this to my lord the king: ‘I will give you everything you asked for the first time, but I cannot accept this last demand of yours.’” So the messengers returned to Ben-hadad with that response.'
