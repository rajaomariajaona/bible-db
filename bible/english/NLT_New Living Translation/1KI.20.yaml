document_id: 1KI.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ben-Hadad Attacks Samaria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'About that time King Ben-hadad of Aram mobilized his army, supported by the chariots and horses of thirty-two allied kings. They went to besiege Samaria, the capital of Israel, and launched attacks against it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ben-hadad sent messengers into the city to relay this message to King Ahab of Israel: “This is what Ben-hadad says: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘Your silver and gold are mine, and so are your wives and the best of your children!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “All right, my lord the king,” Israel’s king replied. “All that I have is yours!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Soon Ben-hadad’s messengers returned again and said, “This is what Ben-hadad says: ‘I have already demanded that you give me your silver, gold, wives, and children. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But about this time tomorrow I will send my officials to search your palace and the homes of your officials. They will take away everything you consider valuable!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Ahab summoned all the elders of the land and said to them, “Look how this man is stirring up trouble! I already agreed with his demand that I give him my wives and children and silver and gold.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Don’t give in to any more demands,” all the elders and the people advised.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Ahab told the messengers from Ben-hadad, “Say this to my lord the king: ‘I will give you everything you asked for the first time, but I cannot accept this last demand of yours.’” So the messengers returned to Ben-hadad with that response.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Ben-hadad sent this message to Ahab: “May the gods strike me and even kill me if there remains enough dust from Samaria to provide even a handful for each of my soldiers.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king of Israel sent back this answer: “A warrior putting on his sword for battle should not boast like a warrior who has already won.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ahab’s reply reached Ben-hadad and the other kings as they were drinking in their tents.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Succoth; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 20:16.
    marker-yv: yv-n
  - type: text
    text: ' “Prepare to attack!” Ben-hadad commanded his officers. So they prepared to attack the city.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahab’s Victory over Ben-Hadad
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then a certain prophet came to see King Ahab of Israel and told him, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Do you see all these enemy forces? Today I will hand them all over to you. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahab asked, “How will he do it?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the prophet replied, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: The troops of the provincial commanders will do it.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Should we attack first?” Ahab asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes,” the prophet answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Ahab mustered the troops of the 232 provincial commanders. Then he called out the rest of the army of Israel, some 7,000 men. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'About noontime, as Ben-hadad and the thirty-two allied kings were still in their tents drinking themselves into a stupor, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: the troops of the provincial commanders marched out of the city as the first contingent.
- type: usfm
  marker: p
  children:
  - type: text
    text: As they approached, Ben-hadad’s scouts reported to him, “Some troops are coming from Samaria.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Take them alive,” Ben-hadad commanded, “whether they have come for peace or for war.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Ahab’s provincial commanders and the entire army had now come out to fight. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Each Israelite soldier killed his Aramean opponent, and suddenly the entire Aramean army panicked and fled. The Israelites chased them, but King Ben-hadad and a few of his charioteers escaped on horses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: However, the king of Israel destroyed the other horses and chariots and slaughtered the Arameans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Afterward the prophet said to King Ahab, “Get ready for another attack. Begin making plans now, for the king of Aram will come back next spring.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'at the turn of the year; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 20:26. The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ben-Hadad’s Second Attack
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After their defeat, Ben-hadad’s officers said to him, “The Israelite gods are gods of the hills; that is why they won. But we can beat them easily on the plains. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Only this time replace the kings with field commanders! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Recruit another army like the one you lost. Give us the same number of horses, chariots, and men, and we will fight against them on the plains. There’s no doubt that we will beat them.” So King Ben-hadad did as they suggested.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The following spring he called up the Aramean army and marched out against Israel, this time at Aphek. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Israel then mustered its army, set up supply lines, and marched out for battle. But the Israelite army looked like two little flocks of goats in comparison to the vast Aramean forces that filled the countryside!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the man of God went to the king of Israel and said, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: The Arameans have said, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a god of the hills and not of the plains.’ So I will defeat this vast army for you. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The two armies camped opposite each other for seven days, and on the seventh day the battle began. The Israelites killed 100,000 Aramean foot soldiers in one day. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The rest fled into the town of Aphek, but the wall fell on them and killed another 27,000. Ben-hadad fled into the town and hid in a secret room.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ben-hadad’s officers said to him, “Sir, we have heard that the kings of Israel are merciful. So let’s humble ourselves by wearing burlap around our waists and putting ropes on our heads, and surrender to the king of Israel. Then perhaps he will let you live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So they put on burlap and ropes, and they went to the king of Israel and begged, “Your servant Ben-hadad says, ‘Please let me live!’”
- type: usfm
  marker: p
  children:
  - type: text
    text: The king of Israel responded, “Is he still alive? He is my brother!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The men took this as a good sign and quickly picked up on his words. “Yes,” they said, “your brother Ben-hadad!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go and get him,” the king of Israel told them. And when Ben-hadad arrived, Ahab invited him up into his chariot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ben-hadad told him, “I will give back the towns my father took from your father, and you may establish places of trade in Damascus, as my father did in Samaria.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Ahab said, “I will release you under these conditions.” So they made a new treaty, and Ben-hadad was set free.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prophet Condemns Ahab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Meanwhile, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' instructed one of the group of prophets to say to another man, “Hit me!” But the man refused to hit the prophet. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then the prophet told him, “Because you have not obeyed the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', a lion will kill you as soon as you leave me.” And when he had gone, a lion did attack and kill him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then the prophet turned to another man and said, “Hit me!” So he struck the prophet and wounded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The prophet placed a bandage over his eyes to disguise himself and then waited beside the road for the king. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: As the king passed by, the prophet called out to him, “Sir, I was in the thick of battle, and suddenly a man brought me a prisoner. He said, ‘Guard this man; if for any reason he gets away, you will either die or pay a fine of seventy-five pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver!’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But while I was busy doing something else, the prisoner disappeared!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Well, it’s your own fault,” the king replied. “You have brought the judgment on yourself.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then the prophet quickly pulled the bandage from his eyes, and the king of Israel recognized him as one of the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The prophet said to him, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because you have spared the man I said must be destroyed,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' now you must die in his place, and your people will die instead of his people.” '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So the king of Israel went home to Samaria angry and sullen.
