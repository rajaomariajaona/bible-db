document_id: GEN.39,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph in Potiphar’s House
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Joseph was taken to Egypt by the Ishmaelite traders, he was purchased by Potiphar, an Egyptian officer. Potiphar was captain of the guard for Pharaoh, the king of Egypt.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'She kept putting pressure on Joseph day after day, but he refused to sleep with her, and he kept out of her way as much as possible. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'One day, however, no one else was around when he went in to do his work. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: She came and grabbed him by his cloak, demanding, “Come on, sleep with me!” Joseph tore himself away, but he left his cloak in her hand as he ran from the house.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When she saw that she was holding his cloak and he had fled, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'she called out to her servants. Soon all the men came running. “Look!” she said. “My husband has brought this Hebrew slave here to make fools of us! He came into my room to rape me, but I screamed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When he heard me scream, he ran outside and got away, but he left his cloak behind with me.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'She kept the cloak with her until her husband came home. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then she told him her story. “That Hebrew slave you’ve brought into our house tried to come in and fool around with me,” she said. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “But when I screamed, he ran outside, leaving his cloak with me!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph Put in Prison
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Potiphar was furious when he heard his wife’s story about how Joseph had treated her. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joseph, so he succeeded in everything he did as he served in the home of his Egyptian master. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So he took Joseph and threw him into the prison where the king’s prisoners were held, and there he remained. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joseph in the prison and showed him his faithful love. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made Joseph a favorite with the prison warden. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Before long, the warden put Joseph in charge of all the other prisoners and over everything that happened in the prison. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The warden had no more worries, because Joseph took care of everything. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him and caused everything he did to succeed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Potiphar noticed this and realized that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joseph, giving him success in everything he did. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This pleased Potiphar, so he soon made Joseph his personal attendant. He put him in charge of his entire household and everything he owned. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'From the day Joseph was put in charge of his master’s household and property, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' began to bless Potiphar’s household for Joseph’s sake. All his household affairs ran smoothly, and his crops and livestock flourished. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So Potiphar gave Joseph complete administrative responsibility over everything he owned. With Joseph there, he didn’t worry about a thing—except what kind of food to eat!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph was a very handsome and well-built young man, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: and Potiphar’s wife soon began to look at him lustfully. “Come and sleep with me,” she demanded.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Joseph refused. “Look,” he told her, “my master trusts me with everything in his entire household. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: No one here has more authority than I do. He has held back nothing from me except you, because you are his wife. How could I do such a wicked thing? It would be a great sin against God.”
