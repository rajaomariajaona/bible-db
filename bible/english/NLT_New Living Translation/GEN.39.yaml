type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph in Potiphar’s House
  - type: text
    content: When Joseph was taken to Egypt by the Ishmaelite traders, he was purchased by Potiphar, an Egyptian officer. Potiphar was captain of the guard for Pharaoh, the king of Egypt.
  '10':
  - type: text
    content: 'She kept putting pressure on Joseph day after day, but he refused to sleep with her, and he kept out of her way as much as possible. '
  '11':
  - type: text
    content: 'One day, however, no one else was around when he went in to do his work. '
  '12':
  - type: text
    content: She came and grabbed him by his cloak, demanding, “Come on, sleep with me!” Joseph tore himself away, but he left his cloak in her hand as he ran from the house.
  '13':
  - type: text
    content: 'When she saw that she was holding his cloak and he had fled, '
  '14':
  - type: text
    content: 'she called out to her servants. Soon all the men came running. “Look!” she said. “My husband has brought this Hebrew slave here to make fools of us! He came into my room to rape me, but I screamed. '
  '15':
  - type: text
    content: When he heard me scream, he ran outside and got away, but he left his cloak behind with me.”
  '16':
  - type: text
    content: 'She kept the cloak with her until her husband came home. '
  '17':
  - type: text
    content: 'Then she told him her story. “That Hebrew slave you’ve brought into our house tried to come in and fool around with me,” she said. '
  '18':
  - type: text
    content: “But when I screamed, he ran outside, leaving his cloak with me!”
  - type: heading
    content: Joseph Put in Prison
  '19':
  - type: text
    content: 'Potiphar was furious when he heard his wife’s story about how Joseph had treated her. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph, so he succeeded in everything he did as he served in the home of his Egyptian master. '
  '20':
  - type: text
    content: 'So he took Joseph and threw him into the prison where the king’s prisoners were held, and there he remained. '
  '21':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph in the prison and showed him his faithful love. And the '
  - type: text
    content: Lord
  - type: text
    content: ' made Joseph a favorite with the prison warden. '
  '22':
  - type: text
    content: 'Before long, the warden put Joseph in charge of all the other prisoners and over everything that happened in the prison. '
  '23':
  - type: text
    content: 'The warden had no more worries, because Joseph took care of everything. The '
  - type: text
    content: Lord
  - type: text
    content: ' was with him and caused everything he did to succeed.'
  '3':
  - type: text
    content: 'Potiphar noticed this and realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph, giving him success in everything he did. '
  '4':
  - type: text
    content: 'This pleased Potiphar, so he soon made Joseph his personal attendant. He put him in charge of his entire household and everything he owned. '
  '5':
  - type: text
    content: 'From the day Joseph was put in charge of his master’s household and property, the '
  - type: text
    content: Lord
  - type: text
    content: ' began to bless Potiphar’s household for Joseph’s sake. All his household affairs ran smoothly, and his crops and livestock flourished. '
  '6':
  - type: text
    content: So Potiphar gave Joseph complete administrative responsibility over everything he owned. With Joseph there, he didn’t worry about a thing—except what kind of food to eat!
  - type: text
    content: 'Joseph was a very handsome and well-built young man, '
  '7':
  - type: text
    content: and Potiphar’s wife soon began to look at him lustfully. “Come and sleep with me,” she demanded.
  '8':
  - type: text
    content: 'But Joseph refused. “Look,” he told her, “my master trusts me with everything in his entire household. '
  '9':
  - type: text
    content: No one here has more authority than I do. He has held back nothing from me except you, because you are his wife. How could I do such a wicked thing? It would be a great sin against God.”
