document_id: REV.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lamb Breaks the Seventh Seal
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When the Lamb broke the seventh seal on the scroll,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: book.
    marker-yv: yv-n
  - type: text
    text: ' there was silence throughout heaven for about half an hour. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I saw the seven angels who stand before God, and they were given seven trumpets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then another angel with a gold incense burner came and stood at the altar. And a great amount of incense was given to him to mix with the prayers of God’s people as an offering on the gold altar before the throne. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The smoke of the incense, mixed with the prayers of God’s holy people, ascended up to God from the altar where the angel had poured them out. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the angel filled the incense burner with fire from the altar and threw it down upon the earth; and thunder crashed, lightning flashed, and there was a terrible earthquake.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The First Four Trumpets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the seven angels with the seven trumpets prepared to blow their mighty blasts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The first angel blew his trumpet, and hail and fire mixed with blood were thrown down on the earth. One-third of the earth was set on fire, one-third of the trees were burned, and all the green grass was burned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the second angel blew his trumpet, and a great mountain of fire was thrown into the sea. One-third of the water in the sea became blood, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: one-third of all things living in the sea died, and one-third of all the ships on the sea were destroyed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the third angel blew his trumpet, and a great star fell from the sky, burning like a torch. It fell on one-third of the rivers and on the springs of water. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The name of the star was Bitterness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Wormwood.
    marker-yv: yv-n
  - type: text
    text: ' It made one-third of the water bitter, and many people died from drinking the bitter water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the fourth angel blew his trumpet, and one-third of the sun was struck, and one-third of the moon, and one-third of the stars, and they became dark. And one-third of the day was dark, and also one-third of the night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then I looked, and I heard a single eagle crying loudly as it flew through the air, “Terror, terror, terror to all who belong to this world because of what will happen when the last three angels blow their trumpets.”
