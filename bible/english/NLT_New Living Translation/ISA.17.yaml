document_id: ISA.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Damascus and Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This message came to me concerning Damascus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, the city of Damascus will disappear!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will become a heap of ruins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Why? Because you have turned from the God who can save you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have forgotten the Rock who can hide you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you may plant the finest grapevines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and import the most expensive seedlings.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They may sprout on the day you set them out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, they may blossom on the very morning you plant them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will never pick any grapes from them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your only harvest will be a load of grief and unrelieved pain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Listen! The armies of many nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roar like the roaring of the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the thunder of the mighty forces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they rush forward like thundering waves.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But though they thunder like breakers on a beach,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God will silence them, and they will run away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will flee like chaff scattered by the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a tumbleweed whirling before a storm.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In the evening Israel waits in terror,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but by dawn its enemies are dead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the just reward of those who plunder us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fitting end for those who destroy us.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The towns of Aroer will be deserted.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Flocks will graze in the streets and lie down undisturbed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to chase them away.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The fortified towns of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: ' will also be destroyed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the royal power of Damascus will end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that remains of Syria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aram.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will share the fate of Israel’s departed glory,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “In that day Israel’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob’s. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 14:1.
      marker-yv: yv-n
    - type: text
      text: ' glory will grow dim;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its robust body will waste away.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The whole land will look like a grainfield
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after the harvesters have gathered the grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the fields in the valley of Rephaim after the harvest.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Only a few of its people will be left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like stray olives left on a tree after the harvest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only two or three remain in the highest branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: four or five scattered here and there on the limbs,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then at last the people will look to their Creator
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turn their eyes to the Holy One of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They will no longer look to their idols for help
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or worship what their own hands have made.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will never again bow down to their Asherah poles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or worship at the pagan shrines they have built.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their largest cities will be like a deserted forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the land the Hivites and Amorites abandoned
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like places of the wood and the highest bough.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the Israelites came here so long ago.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be utterly desolate.
