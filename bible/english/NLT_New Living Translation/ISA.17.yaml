document_id: ISA.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Damascus and Israel
  - type: text
    content: 'This message came to me concerning Damascus:'
  - type: text
    content: “Look, the city of Damascus will disappear!
  - type: text
    content: It will become a heap of ruins.
  '10':
  - type: text
    content: Why? Because you have turned from the God who can save you.
  - type: text
    content: You have forgotten the Rock who can hide you.
  - type: text
    content: So you may plant the finest grapevines
  - type: text
    content: and import the most expensive seedlings.
  '11':
  - type: text
    content: They may sprout on the day you set them out;
  - type: text
    content: yes, they may blossom on the very morning you plant them,
  - type: text
    content: but you will never pick any grapes from them.
  - type: text
    content: Your only harvest will be a load of grief and unrelieved pain.
  '12':
  - type: text
    content: Listen! The armies of many nations
  - type: text
    content: roar like the roaring of the sea.
  - type: text
    content: Hear the thunder of the mighty forces
  - type: text
    content: as they rush forward like thundering waves.
  '13':
  - type: text
    content: But though they thunder like breakers on a beach,
  - type: text
    content: God will silence them, and they will run away.
  - type: text
    content: They will flee like chaff scattered by the wind,
  - type: text
    content: like a tumbleweed whirling before a storm.
  '14':
  - type: text
    content: In the evening Israel waits in terror,
  - type: text
    content: but by dawn its enemies are dead.
  - type: text
    content: This is the just reward of those who plunder us,
  - type: text
    content: a fitting end for those who destroy us.
  '2':
  - type: text
    content: The towns of Aroer will be deserted.
  - type: text
    content: Flocks will graze in the streets and lie down undisturbed,
  - type: text
    content: with no one to chase them away.
  '3':
  - type: text
    content: The fortified towns of Israel
  - type: note
    content: Hebrew of Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' will also be destroyed,'
  - type: text
    content: and the royal power of Damascus will end.
  - type: text
    content: All that remains of Syria
  - type: note
    content: Hebrew Aram.
  - type: text
    content: will share the fate of Israel’s departed glory,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '4':
  - type: text
    content: “In that day Israel’s
  - type: note
    content: Hebrew Jacob’s. See note on 14:1.
  - type: text
    content: ' glory will grow dim;'
  - type: text
    content: its robust body will waste away.
  '5':
  - type: text
    content: The whole land will look like a grainfield
  - type: text
    content: after the harvesters have gathered the grain.
  - type: text
    content: It will be desolate,
  - type: text
    content: like the fields in the valley of Rephaim after the harvest.
  '6':
  - type: text
    content: Only a few of its people will be left,
  - type: text
    content: like stray olives left on a tree after the harvest.
  - type: text
    content: Only two or three remain in the highest branches,
  - type: text
    content: four or five scattered here and there on the limbs,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '7':
  - type: text
    content: Then at last the people will look to their Creator
  - type: text
    content: and turn their eyes to the Holy One of Israel.
  '8':
  - type: text
    content: They will no longer look to their idols for help
  - type: text
    content: or worship what their own hands have made.
  - type: text
    content: They will never again bow down to their Asherah poles
  - type: text
    content: or worship at the pagan shrines they have built.
  '9':
  - type: text
    content: Their largest cities will be like a deserted forest,
  - type: text
    content: like the land the Hivites and Amorites abandoned
  - type: note
    content: As in Greek version; Hebrew reads like places of the wood and the highest bough.
  - type: text
    content: when the Israelites came here so long ago.
  - type: text
    content: It will be utterly desolate.
