document_id: 2SA.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: That was the beginning of a long war between those who were loyal to Saul and those loyal to David. As time passed David became stronger and stronger, while Saul’s dynasty became weaker and weaker.
  - type: heading
    content: David’s Sons Born in Hebron
  '10':
  - type: text
    content: 'I’m going to take Saul’s kingdom and give it to David. I will establish the throne of David over Israel as well as Judah, all the way from Dan in the north to Beersheba in the south.” '
  '11':
  - type: text
    content: Ishbosheth didn’t dare say another word because he was afraid of what Abner might do.
  '12':
  - type: text
    content: Then Abner sent messengers to David, saying, “Doesn’t the entire land belong to you? Make a solemn pact with me, and I will help turn over all of Israel to you.”
  '13':
  - type: text
    content: “All right,” David replied, “but I will not negotiate with you unless you bring back my wife Michal, Saul’s daughter, when you come.”
  '14':
  - type: text
    content: 'David then sent this message to Ishbosheth, Saul’s son: “Give me back my wife Michal, for I bought her with the lives'
  - type: note
    content: Hebrew the foreskins.
  - type: text
    content: ' of 100 Philistines.”'
  '15':
  - type: text
    content: So Ishbosheth took Michal away from her husband, Palti
  - type: note
    content: As in 1 Sam 25:44; Hebrew reads Paltiel, a variant spelling of Palti.
  - type: text
    content: ' son of Laish. '
  '16':
  - type: text
    content: Palti followed along behind her as far as Bahurim, weeping as he went. Then Abner told him, “Go back home!” So Palti returned.
  '17':
  - type: text
    content: 'Meanwhile, Abner had consulted with the elders of Israel. “For some time now,” he told them, “you have wanted to make David your king. '
  '18':
  - type: text
    content: 'Now is the time! For the '
  - type: text
    content: Lord
  - type: text
    content: ' has said, ‘I have chosen David to save my people Israel from the hands of the Philistines and from all their other enemies.’” '
  '19':
  - type: text
    content: Abner also spoke with the men of Benjamin. Then he went to Hebron to tell David that all the people of Israel and Benjamin had agreed to support him.
  '2':
  - type: text
    content: 'These are the sons who were born to David in Hebron:'
  - type: text
    content: The oldest was Amnon, whose mother was Ahinoam from Jezreel.
  '20':
  - type: text
    content: 'When Abner and twenty of his men came to Hebron, David entertained them with a great feast. '
  '21':
  - type: text
    content: Then Abner said to David, “Let me go and call an assembly of all Israel to support my lord the king. They will make a covenant with you to make you their king, and you will rule over everything your heart desires.” So David sent Abner safely on his way.
  - type: heading
    content: Joab Murders Abner
  '22':
  - type: text
    content: 'But just after David had sent Abner away in safety, Joab and some of David’s troops returned from a raid, bringing much plunder with them. '
  '23':
  - type: text
    content: When Joab arrived, he was told that Abner had just been there visiting the king and had been sent away in safety.
  '24':
  - type: text
    content: 'Joab rushed to the king and demanded, “What have you done? What do you mean by letting Abner get away? '
  '25':
  - type: text
    content: You know perfectly well that he came to spy on you and find out everything you’re doing!”
  '26':
  - type: text
    content: 'Joab then left David and sent messengers to catch up with Abner, asking him to return. They found him at the well of Sirah and brought him back, though David knew nothing about it. '
  '27':
  - type: text
    content: When Abner arrived back at Hebron, Joab took him aside at the gateway as if to speak with him privately. But then he stabbed Abner in the stomach and killed him in revenge for killing his brother Asahel.
  '28':
  - type: text
    content: 'When David heard about it, he declared, “I vow by the '
  - type: text
    content: Lord
  - type: text
    content: ' that I and my kingdom are forever innocent of this crime against Abner son of Ner. '
  '29':
  - type: text
    content: Joab and his family are the guilty ones. May the family of Joab be cursed in every generation with a man who has open sores or leprosy
  - type: note
    content: Or or a contagious skin disease. The Hebrew word used here can describe various skin diseases.
  - type: text
    content: ' or who walks on crutches'
  - type: note
    content: Or who is effeminate; Hebrew reads who handles a spindle.
  - type: text
    content: ' or dies by the sword or begs for food!”'
  '3':
  - type: text
    content: The second was Daniel,
  - type: note
    content: As in parallel text at 1 Chr 3:1 (see also Greek version, which reads Daluia, and possible support by Dead Sea Scrolls); Hebrew reads Kileab.
  - type: text
    content: ' whose mother was Abigail, the widow of Nabal from Carmel.'
  - type: text
    content: The third was Absalom, whose mother was Maacah, the daughter of Talmai, king of Geshur.
  '30':
  - type: text
    content: So Joab and his brother Abishai killed Abner because Abner had killed their brother Asahel at the battle of Gibeon.
  - type: heading
    content: David Mourns Abner’s Death
  '31':
  - type: text
    content: 'Then David said to Joab and all those who were with him, “Tear your clothes and put on burlap. Mourn for Abner.” And King David himself walked behind the procession to the grave. '
  '32':
  - type: text
    content: 'They buried Abner in Hebron, and the king and all the people wept at his graveside. '
  '33':
  - type: text
    content: 'Then the king sang this funeral song for Abner:'
  - type: text
    content: “Should Abner have died as fools die?
  '34':
  - type: text
    content: Your hands were not bound;
  - type: text
    content: your feet were not chained.
  - type: text
    content: No, you were murdered—
  - type: text
    content: the victim of a wicked plot.”
  - type: text
    content: 'All the people wept again for Abner. '
  '35':
  - type: text
    content: David had refused to eat anything on the day of the funeral, and now everyone begged him to eat. But David had made a vow, saying, “May God strike me and even kill me if I eat anything before sundown.”
  '36':
  - type: text
    content: 'This pleased the people very much. In fact, everything the king did pleased them! '
  '37':
  - type: text
    content: So everyone in Judah and all Israel understood that David was not responsible for Abner’s murder.
  '38':
  - type: text
    content: 'Then King David said to his officials, “Don’t you realize that a great commander has fallen today in Israel? '
  '39':
  - type: text
    content: 'And even though I am the anointed king, these two sons of Zeruiah—Joab and Abishai—are too strong for me to control. So may the '
  - type: text
    content: Lord
  - type: text
    content: ' repay these evil men for their evil deeds.”'
  '4':
  - type: text
    content: The fourth was Adonijah, whose mother was Haggith.
  - type: text
    content: The fifth was Shephatiah, whose mother was Abital.
  '5':
  - type: text
    content: The sixth was Ithream, whose mother was Eglah, David’s wife.
  - type: text
    content: These sons were all born to David in Hebron.
  - type: heading
    content: Abner Joins Forces with David
  '6':
  - type: text
    content: 'As the war between the house of Saul and the house of David went on, Abner became a powerful leader among those loyal to Saul. '
  '7':
  - type: text
    content: One day Ishbosheth,
  - type: note
    content: Ishbosheth is another name for Esh-baal.
  - type: text
    content: ' Saul’s son, accused Abner of sleeping with one of his father’s concubines, a woman named Rizpah, daughter of Aiah.'
  '8':
  - type: text
    content: 'Abner was furious. “Am I some Judean dog to be kicked around like this?” he shouted. “After all I have done for your father, Saul, and his family and friends by not handing you over to David, is this my reward—that you find fault with me about this woman? '
  '9':
  - type: text
    content: 'May God strike me and even kill me if I don’t do everything I can to help David get what the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised him! '
