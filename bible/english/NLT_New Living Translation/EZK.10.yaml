document_id: EZK.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Glory Leaves the Temple
  - type: text
    content: 'In my vision I saw what appeared to be a throne of blue lapis lazuli above the crystal surface over the heads of the cherubim. '
  '10':
  - type: text
    content: 'All four wheels looked alike and were made the same; each wheel had a second wheel turning crosswise within it. '
  '11':
  - type: text
    content: 'The cherubim could move in any of the four directions they faced, without turning as they moved. They went straight in the direction they faced, never turning aside. '
  '12':
  - type: text
    content: 'Both the cherubim and the wheels were covered with eyes. The cherubim had eyes all over their bodies, including their hands, their backs, and their wings. '
  '13':
  - type: text
    content: 'I heard someone refer to the wheels as “the whirling wheels.” '
  '14':
  - type: text
    content: 'Each of the four cherubim had four faces: the first was the face of an ox,'
  - type: note
    content: Hebrew the face of a cherub; compare 1:10.
  - type: text
    content: ' the second was a human face, the third was the face of a lion, and the fourth was the face of an eagle.'
  '15':
  - type: text
    content: 'Then the cherubim rose upward. These were the same living beings I had seen beside the Kebar River. '
  '16':
  - type: text
    content: 'When the cherubim moved, the wheels moved with them. When they lifted their wings to fly, the wheels stayed beside them. '
  '17':
  - type: text
    content: When the cherubim stopped, the wheels stopped. When they flew upward, the wheels rose up, for the spirit of the living beings was in the wheels.
  '18':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' moved out from the entrance of the Temple and hovered above the cherubim. '
  '19':
  - type: text
    content: 'And as I watched, the cherubim flew with their wheels to the east gate of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple. And the glory of the God of Israel hovered above them.
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to the man in linen clothing and said, “Go between the whirling wheels beneath the cherubim, and take a handful of burning coals and scatter them over the city.” He did this as I watched.'
  '20':
  - type: text
    content: 'These were the same living beings I had seen beneath the God of Israel when I was by the Kebar River. I knew they were cherubim, '
  '21':
  - type: text
    content: 'for each had four faces and four wings and what looked like human hands under their wings. '
  '22':
  - type: text
    content: And their faces were just like the faces of the beings I had seen at the Kebar, and they traveled straight ahead, just as the others had.
  '3':
  - type: text
    content: 'The cherubim were standing at the south end of the Temple when the man went in, and the cloud of glory filled the inner courtyard. '
  '4':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rose up from above the cherubim and went over to the entrance of the Temple. The Temple was filled with this cloud of glory, and the courtyard glowed brightly with the glory of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: The moving wings of the cherubim sounded like the voice of God Almighty
  - type: note
    content: Hebrew El-Shaddai.
  - type: text
    content: ' and could be heard even in the outer courtyard.'
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to the man in linen clothing, “Go between the cherubim and take some burning coals from between the wheels.” So the man went in and stood beside one of the wheels. '
  '7':
  - type: text
    content: 'Then one of the cherubim reached out his hand and took some live coals from the fire burning among them. He put the coals into the hands of the man in linen clothing, and the man took them and went out. '
  '8':
  - type: text
    content: (All the cherubim had what looked like human hands under their wings.)
  '9':
  - type: text
    content: 'I looked, and each of the four cherubim had a wheel beside him, and the wheels sparkled like beryl. '
