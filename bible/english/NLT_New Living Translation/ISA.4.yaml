    - type: text
      text: '3'
  - type: text
    text: All who remain in Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be a holy people—
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who survive the destruction of Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are recorded among the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The Lord will wash the filth from beautiful Zion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
