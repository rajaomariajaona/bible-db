document_id: ISA.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: In that day so few men will be left that seven women will fight for each man, saying, “Let us all marry you! We will provide our own food and clothing. Only let us take your name so we won’t be mocked as old maids.”
  - type: heading
    content: A Promise of Restoration
  '2':
  - type: text
    content: But in that day, the branch
  - type: note
    content: Or the Branch.
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: will be beautiful and glorious;
  - type: text
    content: the fruit of the land will be the pride and glory
  - type: text
    content: of all who survive in Israel.
  '3':
  - type: text
    content: All who remain in Zion
  - type: text
    content: will be a holy people—
  - type: text
    content: those who survive the destruction of Jerusalem
  - type: text
    content: and are recorded among the living.
  '4':
  - type: text
    content: The Lord will wash the filth from beautiful Zion
  - type: note
    content: Or from the women of Zion; Hebrew reads from the daughters of Zion.
  - type: text
    content: and cleanse Jerusalem of its bloodstains
  - type: text
    content: with the hot breath of fiery judgment.
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will provide shade for Mount Zion'
  - type: text
    content: and all who assemble there.
  - type: text
    content: He will provide a canopy of cloud during the day
  - type: text
    content: and smoke and flaming fire at night,
  - type: text
    content: covering the glorious land.
  '6':
  - type: text
    content: It will be a shelter from daytime heat
  - type: text
    content: and a hiding place from storms and rain.
