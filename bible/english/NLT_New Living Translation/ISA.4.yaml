    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'from the women of Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from the daughters of Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cleanse Jerusalem of its bloodstains
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the hot breath of fiery judgment.
- type: usfm
  marker: q1
  children:
