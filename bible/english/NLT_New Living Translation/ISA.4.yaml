    - type: text
      text: '1'
  - type: text
    text: In that day so few men will be left that seven women will fight for each man, saying, “Let us all marry you! We will provide our own food and clothing. Only let us take your name so we won’t be mocked as old maids.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Promise of Restoration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
