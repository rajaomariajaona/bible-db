document_id: LEV.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordination of the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Bring Aaron and his sons, along with their sacred garments, the anointing oil, the bull for the sin offering, the two rams, and the basket of bread made without yeast, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and call the entire community of Israel together at the entrance of the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 8:4, 31, 33, 35.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Moses followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s instructions, and the whole community assembled at the Tabernacle entrance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moses announced to them, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded us to do!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he presented Aaron and his sons and washed them with water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He put the official tunic on Aaron and tied the sash around his waist. He dressed him in the robe, placed the ephod on him, and attached the ephod securely with its decorative sash. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Moses placed the chestpiece on Aaron and put the Urim and the Thummim inside it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He placed the turban on Aaron’s head and attached the gold medallion—the badge of holiness—to the front of the turban, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Moses took the anointing oil and anointed the Tabernacle and everything in it, making them holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He sprinkled the oil on the altar seven times, anointing it and all its utensils, as well as the washbasin and its stand, making them holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then he poured some of the anointing oil on Aaron’s head, anointing him and making him holy for his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Next Moses presented Aaron’s sons. He clothed them in their tunics, tied their sashes around them, and put their special head coverings on them, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Moses presented the bull for the sin offering. Aaron and his sons laid their hands on the bull’s head, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and Moses slaughtered it. Moses took some of the blood, and with his finger he put it on the four horns of the altar to purify it. He poured out the rest of the blood at the base of the altar. Through this process, he made the altar holy by purifying it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'by making atonement for it; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that offerings for purification might be made on it.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Moses took all the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, and he burned it all on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He took the rest of the bull, including its hide, meat, and dung, and burned it on a fire outside the camp, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Moses presented the ram for the burnt offering. Aaron and his sons laid their hands on the ram’s head, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Moses slaughtered it. Then Moses took the ram’s blood and splattered it against all sides of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then he cut the ram into pieces, and he burned the head, some of its pieces, and the fat on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After washing the internal organs and the legs with water, Moses burned the entire ram on the altar as a burnt offering. It was a pleasing aroma, a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Moses presented the other ram, which was the ram of ordination. Aaron and his sons laid their hands on the ram’s head, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and Moses slaughtered it. Then Moses took some of its blood and applied it to the lobe of Aaron’s right ear, the thumb of his right hand, and the big toe of his right foot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Next Moses presented Aaron’s sons and applied some of the blood to the lobes of their right ears, the thumbs of their right hands, and the big toes of their right feet. He then splattered the rest of the blood against all sides of the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Next Moses took the fat, including the fat of the broad tail, the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, along with the right thigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On top of these he placed a thin cake of bread made without yeast, a cake of bread mixed with olive oil, and a wafer spread with olive oil. All these were taken from the basket of bread made without yeast that was placed in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He put all these in the hands of Aaron and his sons, and he lifted these gifts as a special offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moses then took all the offerings back from them and burned them on the altar on top of the burnt offering. This was the ordination offering. It was a pleasing aroma, a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Moses took the breast and lifted it up as a special offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This was Moses’ portion of the ram of ordination, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Next Moses took some of the anointing oil and some of the blood that was on the altar, and he sprinkled them on Aaron and his garments and on his sons and their garments. In this way, he made Aaron and his sons and their garments holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Moses said to Aaron and his sons, “Boil the remaining meat of the offerings at the Tabernacle entrance, and eat it there, along with the bread that is in the basket of offerings for the ordination, just as I commanded when I said, ‘Aaron and his sons will eat it.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Any meat or bread that is left over must then be burned up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'You must not leave the Tabernacle entrance for seven days, for that is when the ordination ceremony will be completed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Everything we have done today was commanded by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in order to purify you, making you right with him.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make atonement for you.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Now stay at the entrance of the Tabernacle day and night for seven days, and do everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' requires. If you fail to do this, you will die, for this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So Aaron and his sons did everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded through Moses.'
