document_id: LEV.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ordination of the Priests
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Then Moses took the anointing oil and anointed the Tabernacle and everything in it, making them holy. '
  '11':
  - type: text
    content: 'He sprinkled the oil on the altar seven times, anointing it and all its utensils, as well as the washbasin and its stand, making them holy. '
  '12':
  - type: text
    content: 'Then he poured some of the anointing oil on Aaron’s head, anointing him and making him holy for his work. '
  '13':
  - type: text
    content: 'Next Moses presented Aaron’s sons. He clothed them in their tunics, tied their sashes around them, and put their special head coverings on them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '14':
  - type: text
    content: 'Then Moses presented the bull for the sin offering. Aaron and his sons laid their hands on the bull’s head, '
  '15':
  - type: text
    content: and Moses slaughtered it. Moses took some of the blood, and with his finger he put it on the four horns of the altar to purify it. He poured out the rest of the blood at the base of the altar. Through this process, he made the altar holy by purifying it.
  - type: note
    content: Or by making atonement for it; or that offerings for purification might be made on it.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Then Moses took all the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, and he burned it all on the altar. '
  '17':
  - type: text
    content: 'He took the rest of the bull, including its hide, meat, and dung, and burned it on a fire outside the camp, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '18':
  - type: text
    content: 'Then Moses presented the ram for the burnt offering. Aaron and his sons laid their hands on the ram’s head, '
  '19':
  - type: text
    content: 'and Moses slaughtered it. Then Moses took the ram’s blood and splattered it against all sides of the altar. '
  '2':
  - type: text
    content: '“Bring Aaron and his sons, along with their sacred garments, the anointing oil, the bull for the sin offering, the two rams, and the basket of bread made without yeast, '
  '20':
  - type: text
    content: 'Then he cut the ram into pieces, and he burned the head, some of its pieces, and the fat on the altar. '
  '21':
  - type: text
    content: 'After washing the internal organs and the legs with water, Moses burned the entire ram on the altar as a burnt offering. It was a pleasing aroma, a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '22':
  - type: text
    content: 'Then Moses presented the other ram, which was the ram of ordination. Aaron and his sons laid their hands on the ram’s head, '
  '23':
  - type: text
    content: 'and Moses slaughtered it. Then Moses took some of its blood and applied it to the lobe of Aaron’s right ear, the thumb of his right hand, and the big toe of his right foot. '
  '24':
  - type: text
    content: Next Moses presented Aaron’s sons and applied some of the blood to the lobes of their right ears, the thumbs of their right hands, and the big toes of their right feet. He then splattered the rest of the blood against all sides of the altar.
  '25':
  - type: text
    content: 'Next Moses took the fat, including the fat of the broad tail, the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, along with the right thigh. '
  '26':
  - type: text
    content: 'On top of these he placed a thin cake of bread made without yeast, a cake of bread mixed with olive oil, and a wafer spread with olive oil. All these were taken from the basket of bread made without yeast that was placed in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. '
  '27':
  - type: text
    content: 'He put all these in the hands of Aaron and his sons, and he lifted these gifts as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Moses then took all the offerings back from them and burned them on the altar on top of the burnt offering. This was the ordination offering. It was a pleasing aroma, a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Then Moses took the breast and lifted it up as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. This was Moses’ portion of the ram of ordination, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '3':
  - type: text
    content: and call the entire community of Israel together at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting; also in 8:4, 31, 33, 35.
  - type: text
    content: ”
  '30':
  - type: text
    content: Next Moses took some of the anointing oil and some of the blood that was on the altar, and he sprinkled them on Aaron and his garments and on his sons and their garments. In this way, he made Aaron and his sons and their garments holy.
  '31':
  - type: text
    content: 'Then Moses said to Aaron and his sons, “Boil the remaining meat of the offerings at the Tabernacle entrance, and eat it there, along with the bread that is in the basket of offerings for the ordination, just as I commanded when I said, ‘Aaron and his sons will eat it.’ '
  '32':
  - type: text
    content: 'Any meat or bread that is left over must then be burned up. '
  '33':
  - type: text
    content: 'You must not leave the Tabernacle entrance for seven days, for that is when the ordination ceremony will be completed. '
  '34':
  - type: text
    content: 'Everything we have done today was commanded by the '
  - type: text
    content: Lord
  - type: text
    content: ' in order to purify you, making you right with him.'
  - type: note
    content: Or to make atonement for you.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Now stay at the entrance of the Tabernacle day and night for seven days, and do everything the '
  - type: text
    content: Lord
  - type: text
    content: ' requires. If you fail to do this, you will die, for this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.” '
  '36':
  - type: text
    content: 'So Aaron and his sons did everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '4':
  - type: text
    content: 'So Moses followed the '
  - type: text
    content: Lord
  - type: text
    content: '’s instructions, and the whole community assembled at the Tabernacle entrance. '
  '5':
  - type: text
    content: 'Moses announced to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded us to do!” '
  '6':
  - type: text
    content: 'Then he presented Aaron and his sons and washed them with water. '
  '7':
  - type: text
    content: 'He put the official tunic on Aaron and tied the sash around his waist. He dressed him in the robe, placed the ephod on him, and attached the ephod securely with its decorative sash. '
  '8':
  - type: text
    content: 'Then Moses placed the chestpiece on Aaron and put the Urim and the Thummim inside it. '
  '9':
  - type: text
    content: 'He placed the turban on Aaron’s head and attached the gold medallion—the badge of holiness—to the front of the turban, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
