document_id: DEU.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Suppose a man marries a woman but she does not please him. Having discovered something wrong with her, he writes a document of divorce, hands it to her, and sends her away from his house. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“If you lend anything to your neighbor, do not enter his house to pick up the item he is giving as security. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'You must wait outside while he goes in and brings it out to you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If your neighbor is poor and gives you his cloak as security for a loan, do not keep the cloak overnight. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Return the cloak to its owner by sunset so he can stay warm through the night and bless you, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will count you as righteous.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Never take advantage of poor and destitute laborers, whether they are fellow Israelites or foreigners living in your towns. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'You must pay them their wages each day before sunset because they are poor and are counting on it. If you don’t, they might cry out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against you, and it would be counted against you as sin.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Parents must not be put to death for the sins of their children, nor children for the sins of their parents. Those deserving to die must be put to death for their own crimes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“True justice must be given to foreigners living among you and to orphans, and you must never accept a widow’s garment as security for her debt. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Always remember that you were slaves in Egypt and that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God redeemed you from your slavery. That is why I have given you this command.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“When you are harvesting your crops and forget to bring in a bundle of grain from your field, don’t go back to get it. Leave it for the foreigners, orphans, and widows. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you in all you do. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When she leaves his house, she is free to marry another man. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'When you beat the olives from your olive trees, don’t go over the boughs twice. Leave the remaining olives for the foreigners, orphans, and widows. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When you gather the grapes in your vineyard, don’t glean the vines after they are picked. Leave the remaining grapes for the foreigners, orphans, and widows. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Remember that you were slaves in the land of Egypt. That is why I am giving you this command.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But if the second husband also turns against her, writes a document of divorce, hands it to her, and sends her away, or if he dies, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'the first husband may not marry her again, for she has been defiled. That would be detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. You must not bring guilt upon the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you as a special possession.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “A newly married man must not be drafted into the army or be given any other official responsibilities. He must be free to spend one year at home, bringing happiness to the wife he has married.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “It is wrong to take a set of millstones, or even just the upper millstone, as security for a loan, for the owner uses it to make a living.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “If anyone kidnaps a fellow Israelite and treats him as a slave or sells him, the kidnapper must die. In this way, you will purge the evil from among you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “In all cases involving serious skin diseases,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here can describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' be careful to follow the instructions of the Levitical priests; obey all the commands I have given them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Remember what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God did to Miriam as you were coming from Egypt.'
