document_id: JDG.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abimelech Rules over Shechem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day Gideon’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jerub-baal’s '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 6:32); also in 9:2, 24.
    marker-yv: yv-n
  - type: text
    text: ' son Abimelech went to Shechem to visit his uncles—his mother’s brothers. He said to them and to the rest of his mother’s family, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Ask the leading citizens of Shechem whether they want to be ruled by all seventy of Gideon’s sons or by one man. And remember that I am your own flesh and blood!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Abimelech’s uncles gave his message to all the citizens of Shechem on his behalf. And after listening to this proposal, the people of Shechem decided in favor of Abimelech because he was their relative. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They gave him seventy silver coins from the temple of Baal-berith, which he used to hire some reckless troublemakers who agreed to follow him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He went to his father’s home at Ophrah, and there, on one stone, they killed all seventy of his half brothers, the sons of Gideon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jerub-baal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 6:32); also in 9:16, 19, 28, 57.
    marker-yv: yv-n
  - type: text
    text: ' But the youngest brother, Jotham, escaped and hid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then all the leading citizens of Shechem and Beth-millo called a meeting under the oak beside the pillar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' at Shechem and made Abimelech their king.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jotham’s Parable
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When Jotham heard about this, he climbed to the top of Mount Gerizim and shouted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Listen to me, citizens of Shechem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to me if you want God to listen to you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Once upon a time the trees decided to choose a king.
- type: usfm
  marker: q2
  children:
  - type: text
    text: First they said to the olive tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Be our king!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But the olive tree refused, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Should I quit producing the olive oil
- type: usfm
  marker: q2
  children:
  - type: text
    text: that blesses both God and people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just to wave back and forth over the trees?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Then they said to the fig tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You be our king!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the fig tree also refused, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Should I quit producing my sweet fruit
- type: usfm
  marker: q2
  children:
  - type: text
    text: just to wave back and forth over the trees?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Then they said to the grapevine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You be our king!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the grapevine also refused, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Should I quit producing the wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: that cheers both God and people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just to wave back and forth over the trees?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Then all the trees finally turned to the thornbush and said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Come, you be our king!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the thornbush replied to the trees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘If you truly want to make me your king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: come and take shelter in my shade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If not, let fire come out from me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devour the cedars of Lebanon.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jotham continued, “Now make sure you have acted honorably and in good faith by making Abimelech your king, and that you have done right by Gideon and all of his descendants. Have you treated him with the honor he deserves for all he accomplished? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For he fought for you and risked his life when he rescued you from the Midianites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But today you have revolted against my father and his descendants, killing his seventy sons on one stone. And you have chosen his slave woman’s son, Abimelech, to be your king just because he is your relative.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“If you have acted honorably and in good faith toward Gideon and his descendants today, then may you find joy in Abimelech, and may he find joy in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But if you have not acted in good faith, then may fire come out from Abimelech and devour the leading citizens of Shechem and Beth-millo; and may fire come out from the citizens of Shechem and Beth-millo and devour Abimelech!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Jotham escaped and lived in Beer because he was afraid of his brother Abimelech.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shechem Rebels against Abimelech
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After Abimelech had ruled over Israel for three years, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'God sent a spirit that stirred up trouble between Abimelech and the leading citizens of Shechem, and they revolted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'God was punishing Abimelech for murdering Gideon’s seventy sons, and the citizens of Shechem for supporting him in this treachery of murdering his brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The citizens of Shechem set an ambush for Abimelech on the hilltops and robbed everyone who passed that way. But someone warned Abimelech about their plot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'One day Gaal son of Ebed moved to Shechem with his brothers and gained the confidence of the leading citizens of Shechem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'During the annual harvest festival at Shechem, held in the temple of the local god, the wine flowed freely, and everyone began cursing Abimelech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Who is Abimelech?” Gaal shouted. “He’s not a true son of Shechem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Who is Shechem?
    marker-yv: yv-n
  - type: text
    text: ' so why should we be his servants? He’s merely the son of Gideon, and this Zebul is merely his deputy. Serve the true sons of Hamor, the founder of Shechem. Why should we serve Abimelech? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: If I were in charge here, I would get rid of Abimelech. I would say
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And he said.
    marker-yv: yv-n
  - type: text
    text: ' to him, ‘Get some soldiers, and come out and fight!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But when Zebul, the leader of the city, heard what Gaal was saying, he was furious. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He sent messengers to Abimelech in Arumah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in secret; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Tormah; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 9:41.
    marker-yv: yv-n
  - type: text
    text: ' telling him, “Gaal son of Ebed and his brothers have come to live in Shechem, and now they are inciting the city to rebel against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Come by night with an army and hide out in the fields. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: In the morning, as soon as it is daylight, attack the city. When Gaal and those who are with him come out against you, you can do with them as you wish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So Abimelech and all his men went by night and split into four groups, stationing themselves around Shechem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Gaal was standing at the city gates when Abimelech and his army came out of hiding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When Gaal saw them, he said to Zebul, “Look, there are people coming down from the hilltops!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Zebul replied, “It’s just the shadows on the hills that look like men.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: But again Gaal said, “No, people are coming down from the hills.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:37a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the center of the land.
    marker-yv: yv-n
  - type: text
    text: ' And another group is coming down the road past the Diviners’ Oak.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:37b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Elon-meonenim.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then Zebul turned on him and asked, “Now where is that big mouth of yours? Wasn’t it you that said, ‘Who is Abimelech, and why should we be his servants?’ The men you mocked are right outside the city! Go out and fight them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So Gaal led the leading citizens of Shechem into battle against Abimelech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But Abimelech chased him, and many of Shechem’s men were wounded and fell along the road as they retreated to the city gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Abimelech returned to Arumah, and Zebul drove Gaal and his brothers out of Shechem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The next day the people of Shechem went out into the fields to battle. When Abimelech heard about it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'he divided his men into three groups and set an ambush in the fields. When Abimelech saw the people coming out of the city, he and his men jumped up from their hiding places and attacked them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Abimelech and his group stormed the city gate to keep the men of Shechem from getting back in, while Abimelech’s other two groups cut them down in the fields. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: The battle went on all day before Abimelech finally captured the city. He killed the people, leveled the city, and scattered salt all over the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: When the leading citizens who lived in the tower of Shechem heard what had happened, they ran and hid in the temple of Baal-berith.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'El-berith, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Baal-berith; compare 9:4.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Someone reported to Abimelech that the citizens had gathered in the temple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'so he led his forces to Mount Zalmon. He took an ax and chopped some branches from a tree, then put them on his shoulder. “Quick, do as I have done!” he told his men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: So each of them cut down some branches, following Abimelech’s example. They piled the branches against the walls of the temple and set them on fire. So all the people who had lived in the tower of Shechem died—about 1,000 men and women.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Then Abimelech attacked the town of Thebez and captured it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'But there was a strong tower inside the town, and all the men and women—the entire population—fled to it. They barricaded themselves in and climbed up to the roof of the tower. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Abimelech followed them to attack the tower. But as he prepared to set fire to the entrance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: a woman on the roof dropped a millstone that landed on Abimelech’s head and crushed his skull.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'He quickly said to his young armor bearer, “Draw your sword and kill me! Don’t let it be said that a woman killed Abimelech!” So the young man ran him through with his sword, and he died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: When Abimelech’s men saw that he was dead, they disbanded and returned to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'In this way, God punished Abimelech for the evil he had done against his father by murdering his seventy brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: God also punished the men of Shechem for all their evil. So the curse of Jotham son of Gideon was fulfilled.
