document_id: JDG.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Abimelech Rules over Shechem
  - type: text
    content: One day Gideon’s
  - type: note
    content: Hebrew Jerub-baal’s (see 6:32); also in 9:2, 24.
  - type: text
    content: ' son Abimelech went to Shechem to visit his uncles—his mother’s brothers. He said to them and to the rest of his mother’s family, '
  '10':
  - type: text
    content: “Then they said to the fig tree,
  - type: text
    content: ‘You be our king!’
  '11':
  - type: text
    content: But the fig tree also refused, saying,
  - type: text
    content: ‘Should I quit producing my sweet fruit
  - type: text
    content: just to wave back and forth over the trees?’
  '12':
  - type: text
    content: “Then they said to the grapevine,
  - type: text
    content: ‘You be our king!’
  '13':
  - type: text
    content: But the grapevine also refused, saying,
  - type: text
    content: ‘Should I quit producing the wine
  - type: text
    content: that cheers both God and people,
  - type: text
    content: just to wave back and forth over the trees?’
  '14':
  - type: text
    content: “Then all the trees finally turned to the thornbush and said,
  - type: text
    content: ‘Come, you be our king!’
  '15':
  - type: text
    content: And the thornbush replied to the trees,
  - type: text
    content: ‘If you truly want to make me your king,
  - type: text
    content: come and take shelter in my shade.
  - type: text
    content: If not, let fire come out from me
  - type: text
    content: and devour the cedars of Lebanon.’”
  '16':
  - type: text
    content: 'Jotham continued, “Now make sure you have acted honorably and in good faith by making Abimelech your king, and that you have done right by Gideon and all of his descendants. Have you treated him with the honor he deserves for all he accomplished? '
  '17':
  - type: text
    content: 'For he fought for you and risked his life when he rescued you from the Midianites. '
  '18':
  - type: text
    content: But today you have revolted against my father and his descendants, killing his seventy sons on one stone. And you have chosen his slave woman’s son, Abimelech, to be your king just because he is your relative.
  '19':
  - type: text
    content: '“If you have acted honorably and in good faith toward Gideon and his descendants today, then may you find joy in Abimelech, and may he find joy in you. '
  '2':
  - type: text
    content: “Ask the leading citizens of Shechem whether they want to be ruled by all seventy of Gideon’s sons or by one man. And remember that I am your own flesh and blood!”
  '20':
  - type: text
    content: But if you have not acted in good faith, then may fire come out from Abimelech and devour the leading citizens of Shechem and Beth-millo; and may fire come out from the citizens of Shechem and Beth-millo and devour Abimelech!”
  '21':
  - type: text
    content: Then Jotham escaped and lived in Beer because he was afraid of his brother Abimelech.
  - type: heading
    content: Shechem Rebels against Abimelech
  '22':
  - type: text
    content: 'After Abimelech had ruled over Israel for three years, '
  '23':
  - type: text
    content: 'God sent a spirit that stirred up trouble between Abimelech and the leading citizens of Shechem, and they revolted. '
  '24':
  - type: text
    content: 'God was punishing Abimelech for murdering Gideon’s seventy sons, and the citizens of Shechem for supporting him in this treachery of murdering his brothers. '
  '25':
  - type: text
    content: The citizens of Shechem set an ambush for Abimelech on the hilltops and robbed everyone who passed that way. But someone warned Abimelech about their plot.
  '26':
  - type: text
    content: 'One day Gaal son of Ebed moved to Shechem with his brothers and gained the confidence of the leading citizens of Shechem. '
  '27':
  - type: text
    content: 'During the annual harvest festival at Shechem, held in the temple of the local god, the wine flowed freely, and everyone began cursing Abimelech. '
  '28':
  - type: text
    content: “Who is Abimelech?” Gaal shouted. “He’s not a true son of Shechem,
  - type: note
    content: Hebrew Who is Shechem?
  - type: text
    content: ' so why should we be his servants? He’s merely the son of Gideon, and this Zebul is merely his deputy. Serve the true sons of Hamor, the founder of Shechem. Why should we serve Abimelech? '
  '29':
  - type: text
    content: If I were in charge here, I would get rid of Abimelech. I would say
  - type: note
    content: As in Greek version; Hebrew reads And he said.
  - type: text
    content: ' to him, ‘Get some soldiers, and come out and fight!’”'
  '3':
  - type: text
    content: 'So Abimelech’s uncles gave his message to all the citizens of Shechem on his behalf. And after listening to this proposal, the people of Shechem decided in favor of Abimelech because he was their relative. '
  '30':
  - type: text
    content: 'But when Zebul, the leader of the city, heard what Gaal was saying, he was furious. '
  '31':
  - type: text
    content: He sent messengers to Abimelech in Arumah,
  - type: note
    content: Or in secret; Hebrew reads in Tormah; compare 9:41.
  - type: text
    content: ' telling him, “Gaal son of Ebed and his brothers have come to live in Shechem, and now they are inciting the city to rebel against you. '
  '32':
  - type: text
    content: 'Come by night with an army and hide out in the fields. '
  '33':
  - type: text
    content: In the morning, as soon as it is daylight, attack the city. When Gaal and those who are with him come out against you, you can do with them as you wish.”
  '34':
  - type: text
    content: 'So Abimelech and all his men went by night and split into four groups, stationing themselves around Shechem. '
  '35':
  - type: text
    content: 'Gaal was standing at the city gates when Abimelech and his army came out of hiding. '
  '36':
  - type: text
    content: When Gaal saw them, he said to Zebul, “Look, there are people coming down from the hilltops!”
  - type: text
    content: Zebul replied, “It’s just the shadows on the hills that look like men.”
  '37':
  - type: text
    content: But again Gaal said, “No, people are coming down from the hills.
  - type: note
    content: Or the center of the land.
  - type: text
    content: ' And another group is coming down the road past the Diviners’ Oak.'
  - type: note
    content: Hebrew Elon-meonenim.
  - type: text
    content: ”
  '38':
  - type: text
    content: Then Zebul turned on him and asked, “Now where is that big mouth of yours? Wasn’t it you that said, ‘Who is Abimelech, and why should we be his servants?’ The men you mocked are right outside the city! Go out and fight them!”
  '39':
  - type: text
    content: 'So Gaal led the leading citizens of Shechem into battle against Abimelech. '
  '4':
  - type: text
    content: 'They gave him seventy silver coins from the temple of Baal-berith, which he used to hire some reckless troublemakers who agreed to follow him. '
  '40':
  - type: text
    content: 'But Abimelech chased him, and many of Shechem’s men were wounded and fell along the road as they retreated to the city gate. '
  '41':
  - type: text
    content: Abimelech returned to Arumah, and Zebul drove Gaal and his brothers out of Shechem.
  '42':
  - type: text
    content: 'The next day the people of Shechem went out into the fields to battle. When Abimelech heard about it, '
  '43':
  - type: text
    content: 'he divided his men into three groups and set an ambush in the fields. When Abimelech saw the people coming out of the city, he and his men jumped up from their hiding places and attacked them. '
  '44':
  - type: text
    content: 'Abimelech and his group stormed the city gate to keep the men of Shechem from getting back in, while Abimelech’s other two groups cut them down in the fields. '
  '45':
  - type: text
    content: The battle went on all day before Abimelech finally captured the city. He killed the people, leveled the city, and scattered salt all over the ground.
  '46':
  - type: text
    content: When the leading citizens who lived in the tower of Shechem heard what had happened, they ran and hid in the temple of Baal-berith.
  - type: note
    content: Hebrew El-berith, another name for Baal-berith; compare 9:4.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Someone reported to Abimelech that the citizens had gathered in the temple, '
  '48':
  - type: text
    content: 'so he led his forces to Mount Zalmon. He took an ax and chopped some branches from a tree, then put them on his shoulder. “Quick, do as I have done!” he told his men. '
  '49':
  - type: text
    content: So each of them cut down some branches, following Abimelech’s example. They piled the branches against the walls of the temple and set them on fire. So all the people who had lived in the tower of Shechem died—about 1,000 men and women.
  '5':
  - type: text
    content: He went to his father’s home at Ophrah, and there, on one stone, they killed all seventy of his half brothers, the sons of Gideon.
  - type: note
    content: Hebrew Jerub-baal (see 6:32); also in 9:16, 19, 28, 57.
  - type: text
    content: ' But the youngest brother, Jotham, escaped and hid.'
  '50':
  - type: text
    content: 'Then Abimelech attacked the town of Thebez and captured it. '
  '51':
  - type: text
    content: 'But there was a strong tower inside the town, and all the men and women—the entire population—fled to it. They barricaded themselves in and climbed up to the roof of the tower. '
  '52':
  - type: text
    content: 'Abimelech followed them to attack the tower. But as he prepared to set fire to the entrance, '
  '53':
  - type: text
    content: a woman on the roof dropped a millstone that landed on Abimelech’s head and crushed his skull.
  '54':
  - type: text
    content: 'He quickly said to his young armor bearer, “Draw your sword and kill me! Don’t let it be said that a woman killed Abimelech!” So the young man ran him through with his sword, and he died. '
  '55':
  - type: text
    content: When Abimelech’s men saw that he was dead, they disbanded and returned to their homes.
  '56':
  - type: text
    content: 'In this way, God punished Abimelech for the evil he had done against his father by murdering his seventy brothers. '
  '57':
  - type: text
    content: God also punished the men of Shechem for all their evil. So the curse of Jotham son of Gideon was fulfilled.
  '6':
  - type: text
    content: Then all the leading citizens of Shechem and Beth-millo called a meeting under the oak beside the pillar
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' at Shechem and made Abimelech their king.'
  - type: heading
    content: Jotham’s Parable
  '7':
  - type: text
    content: When Jotham heard about this, he climbed to the top of Mount Gerizim and shouted,
  - type: text
    content: “Listen to me, citizens of Shechem!
  - type: text
    content: Listen to me if you want God to listen to you!
  '8':
  - type: text
    content: Once upon a time the trees decided to choose a king.
  - type: text
    content: First they said to the olive tree,
  - type: text
    content: ‘Be our king!’
  '9':
  - type: text
    content: But the olive tree refused, saying,
  - type: text
    content: ‘Should I quit producing the olive oil
  - type: text
    content: that blesses both God and people,
  - type: text
    content: just to wave back and forth over the trees?’
