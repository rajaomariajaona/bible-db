document_id: EXO.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Water from the Rock
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command, the whole community of Israel left the wilderness of Sin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The geographical name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is related to '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sinai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and should not be confused with the English word '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sin.
      marker-yv: yv-n
    - type: text
      text: ' and moved from place to place. Eventually they camped at Rephidim, but there was no water there for the people to drink. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua did what Moses had commanded and fought the army of Amalek. Meanwhile, Moses, Aaron, and Hur climbed to the top of a nearby hill. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As long as Moses held up the staff in his hand, the Israelites had the advantage. But whenever he dropped his hand, the Amalekites gained the advantage. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses’ arms soon became so tired he could no longer hold them up. So Aaron and Hur found a stone for him to sit on. Then they stood on each side of Moses, holding up his hands. So his hands held steady until sunset. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a result, Joshua overwhelmed the army of Amalek in battle.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the victory, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' instructed Moses, “Write this down on a scroll as a permanent reminder, and read it aloud to Joshua: I will erase the memory of Amalek from under heaven.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses built an altar there and named it Yahweh-Nissi (which means “the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my banner”). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “They have raised their fist against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s throne, so now
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hands have been lifted up to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ’s throne, and now.
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be at war with Amalek generation after generation.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So once more the people complained against Moses. “Give us water to drink!” they demanded.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Quiet!” Moses replied. “Why are you complaining against me? And why are you testing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But tormented by thirst, they continued to argue with Moses. “Why did you bring us out of Egypt? Are you trying to kill us, our children, and our livestock with thirst?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “What should I do with these people? They are ready to stone me!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Walk out in front of the people. Take your staff, the one you used when you struck the water of the Nile, and call some of the elders of Israel to join you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will stand before you on the rock at Mount Sinai.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai.
      marker-yv: yv-n
    - type: text
      text: ' Strike the rock, and water will come gushing out. Then the people will be able to drink.” So Moses struck the rock as he was told, and water gushed out as the elders looked on.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses named the place Massah (which means “test”) and Meribah (which means “arguing”) because the people of Israel argued with Moses and tested the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by saying, “Is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here with us or not?”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Defeats the Amalekites
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While the people of Israel were still at Rephidim, the warriors of Amalek attacked them. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Moses commanded Joshua, “Choose some men to go out and fight the army of Amalek for us. Tomorrow, I will stand at the top of the hill, holding the staff of God in my hand.”
