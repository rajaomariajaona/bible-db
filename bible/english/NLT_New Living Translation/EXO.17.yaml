document_id: EXO.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Water from the Rock
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: ’s command, the whole community of Israel left the wilderness of Sin
  - type: note
    content: The geographical name Sin is related to Sinai and should not be confused with the English word sin.
  - type: text
    content: ' and moved from place to place. Eventually they camped at Rephidim, but there was no water there for the people to drink. '
  '10':
  - type: text
    content: 'So Joshua did what Moses had commanded and fought the army of Amalek. Meanwhile, Moses, Aaron, and Hur climbed to the top of a nearby hill. '
  '11':
  - type: text
    content: 'As long as Moses held up the staff in his hand, the Israelites had the advantage. But whenever he dropped his hand, the Amalekites gained the advantage. '
  '12':
  - type: text
    content: 'Moses’ arms soon became so tired he could no longer hold them up. So Aaron and Hur found a stone for him to sit on. Then they stood on each side of Moses, holding up his hands. So his hands held steady until sunset. '
  '13':
  - type: text
    content: As a result, Joshua overwhelmed the army of Amalek in battle.
  '14':
  - type: text
    content: 'After the victory, the '
  - type: text
    content: Lord
  - type: text
    content: ' instructed Moses, “Write this down on a scroll as a permanent reminder, and read it aloud to Joshua: I will erase the memory of Amalek from under heaven.” '
  '15':
  - type: text
    content: 'Moses built an altar there and named it Yahweh-Nissi (which means “the '
  - type: text
    content: Lord
  - type: text
    content: ' is my banner”). '
  '16':
  - type: text
    content: 'He said, “They have raised their fist against the '
  - type: text
    content: Lord
  - type: text
    content: ’s throne, so now
  - type: note
    content: Or Hands have been lifted up to the Lord’s throne, and now.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' will be at war with Amalek generation after generation.”'
  '2':
  - type: text
    content: So once more the people complained against Moses. “Give us water to drink!” they demanded.
  - type: text
    content: '“Quiet!” Moses replied. “Why are you complaining against me? And why are you testing the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '3':
  - type: text
    content: But tormented by thirst, they continued to argue with Moses. “Why did you bring us out of Egypt? Are you trying to kill us, our children, and our livestock with thirst?”
  '4':
  - type: text
    content: 'Then Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “What should I do with these people? They are ready to stone me!”'
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Walk out in front of the people. Take your staff, the one you used when you struck the water of the Nile, and call some of the elders of Israel to join you. '
  '6':
  - type: text
    content: I will stand before you on the rock at Mount Sinai.
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' Strike the rock, and water will come gushing out. Then the people will be able to drink.” So Moses struck the rock as he was told, and water gushed out as the elders looked on.'
  '7':
  - type: text
    content: 'Moses named the place Massah (which means “test”) and Meribah (which means “arguing”) because the people of Israel argued with Moses and tested the '
  - type: text
    content: Lord
  - type: text
    content: ' by saying, “Is the '
  - type: text
    content: Lord
  - type: text
    content: ' here with us or not?”'
  - type: heading
    content: Israel Defeats the Amalekites
  '8':
  - type: text
    content: 'While the people of Israel were still at Rephidim, the warriors of Amalek attacked them. '
  '9':
  - type: text
    content: Moses commanded Joshua, “Choose some men to go out and fight the army of Amalek for us. Tomorrow, I will stand at the top of the hill, holding the staff of God in my hand.”
