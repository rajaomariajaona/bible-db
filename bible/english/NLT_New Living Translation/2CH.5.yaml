document_id: 2CH.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'So Solomon finished all his work on the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then he brought all the gifts his father, David, had dedicated—the silver, the gold, and the various articles—and he stored them in the treasuries of the Temple of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Brought to the Temple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nothing was in the Ark except the two stone tablets that Moses had placed in it at Mount Sinai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai.
      marker-yv: yv-n
    - type: text
      text: ' where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made a covenant with the people of Israel when they left Egypt.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then the priests left the Holy Place. All the priests who were present had purified themselves, whether or not they were on duty that day. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the Levites who were musicians—Asaph, Heman, Jeduthun, and all their sons and brothers—were dressed in fine linen robes and stood at the east side of the altar playing cymbals, lyres, and harps. They were joined by 120 priests who were playing trumpets. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The trumpeters and singers performed together in unison to praise and give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Accompanied by trumpets, cymbals, and other instruments, they raised their voices and praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with these words:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He is good!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that moment a thick cloud filled the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The priests could not continue their service because of the cloud, for the glorious presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the Temple of God.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Solomon then summoned to Jerusalem the elders of Israel and all the heads of tribes—the leaders of the ancestral families of Israel. They were to bring the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant to the Temple from its location in the City of David, also known as Zion. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So all the men of Israel assembled before the king at the annual Festival of Shelters, which is held in early autumn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'at the festival that is in the seventh month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Festival of Shelters began on the fifteenth day of the seventh month of the ancient Hebrew lunar calendar. This day occurred in late September, October, or early November.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When all the elders of Israel arrived, the Levites picked up the Ark. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The priests and Levites brought up the Ark along with the special tent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i.e., the tent mentioned in 2 Sam 6:17 and 1 Chr 16:1.
      marker-yv: yv-n
    - type: text
      text: ' and all the sacred items that had been in it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: There, before the Ark, King Solomon and the entire community of Israel sacrificed so many sheep, goats, and cattle that no one could keep count!
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then the priests carried the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant into the inner sanctuary of the Temple—the Most Holy Place—and placed it beneath the wings of the cherubim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The cherubim spread their wings over the Ark, forming a canopy over the Ark and its carrying poles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: These poles were so long that their ends could be seen from the Holy Place,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek version (see also 1 Kgs 8:8); Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the Ark.
      marker-yv: yv-n
    - type: text
      text: ' which is in front of the Most Holy Place, but not from the outside. They are still there to this day. '
