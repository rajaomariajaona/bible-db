    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Love for Israel
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“How I wish one of you would shut the Temple doors so that these worthless sacrifices could not be offered! I am not pleased with you,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, “and I will not accept your offerings. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But my name is honored
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will be honored.
      marker-yv: yv-n
    - type: text
      text: ' by people of other nations from morning till night. All around the world they offer'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will offer.
      marker-yv: yv-n
    - type: text
      text: ' sweet incense and pure offerings in honor of my name. For my name is great among the nations,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But you dishonor my name with your actions. By bringing contemptible food, you are saying it’s all right to defile the Lord’s table. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You say, ‘It’s too hard to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’ and you turn up your noses at my commands,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies. “Think of it! Animals that are stolen and crippled and sick are being presented as offerings! Should I accept from you such offerings as these?” asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Cursed is the cheat who promises to give a fine ram from his flock but then sacrifices a defective one to the Lord. For I am a great king,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, “and my name is feared among the nations!'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“I have always loved you,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you retort, “Really? How have you loved us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replies, “This is how I showed my love for you: I loved your ancestor Jacob, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but I rejected his brother, Esau, and devastated his hill country. I turned Esau’s inheritance into a desert for jackals.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Esau’s descendants in Edom may say, “We have been shattered, but we will rebuild the ruins.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies replies, “They may try to rebuild, but I will demolish them again. Their country will be known as ‘The Land of Wickedness,’ and their people will be called ‘The People with Whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Is Forever Angry.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you see the destruction for yourselves, you will say, ‘Truly, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s greatness reaches far beyond Israel’s borders!’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unworthy Sacrifices
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says to the priests: “A son honors his father, and a servant respects his master. If I am your father and master, where are the honor and respect I deserve? You have shown contempt for my name!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But you ask, ‘How have we ever shown contempt for your name?’
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You have shown contempt by offering defiled sacrifices on my altar.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then you ask, ‘How have we defiled the sacrifices?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: defiled you?
      marker-yv: yv-n
    - type: text
      text: ’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You defile them by saying the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' deserves no respect. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you give blind animals as sacrifices, isn’t that wrong? And isn’t it wrong to offer animals that are crippled and diseased? Try giving gifts like that to your governor, and see how pleased he is!” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go ahead, beg God to be merciful to you! But when you bring that kind of offering, why should he show you any favor at all?” asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
