document_id: MAL.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: This is the message
  - type: note
    content: 'Hebrew An Oracle: The message.'
  - type: text
    content: ' that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to Israel through the prophet Malachi.'
  - type: note
    content: Malachi means “my messenger.”
  - type: heading
    content: The Lord’s Love for Israel
  '10':
  - type: text
    content: '“How I wish one of you would shut the Temple doors so that these worthless sacrifices could not be offered! I am not pleased with you,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, “and I will not accept your offerings. '
  '11':
  - type: text
    content: But my name is honored
  - type: note
    content: Or will be honored.
  - type: text
    content: ' by people of other nations from morning till night. All around the world they offer'
  - type: note
    content: Or will offer.
  - type: text
    content: ' sweet incense and pure offerings in honor of my name. For my name is great among the nations,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '12':
  - type: text
    content: '“But you dishonor my name with your actions. By bringing contemptible food, you are saying it’s all right to defile the Lord’s table. '
  '13':
  - type: text
    content: 'You say, ‘It’s too hard to serve the '
  - type: text
    content: Lord
  - type: text
    content: ',’ and you turn up your noses at my commands,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. “Think of it! Animals that are stolen and crippled and sick are being presented as offerings! Should I accept from you such offerings as these?” asks the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“Cursed is the cheat who promises to give a fine ram from his flock but then sacrifices a defective one to the Lord. For I am a great king,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, “and my name is feared among the nations!'
  '2':
  - type: text
    content: '“I have always loved you,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: But you retort, “Really? How have you loved us?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replies, “This is how I showed my love for you: I loved your ancestor Jacob, '
  '3':
  - type: text
    content: but I rejected his brother, Esau, and devastated his hill country. I turned Esau’s inheritance into a desert for jackals.”
  '4':
  - type: text
    content: Esau’s descendants in Edom may say, “We have been shattered, but we will rebuild the ruins.”
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies replies, “They may try to rebuild, but I will demolish them again. Their country will be known as ‘The Land of Wickedness,’ and their people will be called ‘The People with Whom the '
  - type: text
    content: Lord
  - type: text
    content: ' Is Forever Angry.’ '
  '5':
  - type: text
    content: 'When you see the destruction for yourselves, you will say, ‘Truly, the '
  - type: text
    content: Lord
  - type: text
    content: ’s greatness reaches far beyond Israel’s borders!’”
  - type: heading
    content: Unworthy Sacrifices
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says to the priests: “A son honors his father, and a servant respects his master. If I am your father and master, where are the honor and respect I deserve? You have shown contempt for my name!'
  - type: text
    content: “But you ask, ‘How have we ever shown contempt for your name?’
  '7':
  - type: text
    content: “You have shown contempt by offering defiled sacrifices on my altar.
  - type: text
    content: “Then you ask, ‘How have we defiled the sacrifices?
  - type: note
    content: As in Greek version; Hebrew reads defiled you?
  - type: text
    content: ’
  - type: text
    content: '“You defile them by saying the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' deserves no respect. '
  '8':
  - type: text
    content: 'When you give blind animals as sacrifices, isn’t that wrong? And isn’t it wrong to offer animals that are crippled and diseased? Try giving gifts like that to your governor, and see how pleased he is!” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '9':
  - type: text
    content: '“Go ahead, beg God to be merciful to you! But when you bring that kind of offering, why should he show you any favor at all?” asks the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
