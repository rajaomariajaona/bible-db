document_id: ISA.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: Send lambs from Sela as tribute
  - type: text
    content: to the ruler of the land.
  - type: text
    content: Send them through the desert
  - type: text
    content: to the mountain of beautiful Zion.
  '10':
  - type: text
    content: Gone now is the gladness,
  - type: text
    content: gone the joy of harvest.
  - type: text
    content: There will be no singing in the vineyards,
  - type: text
    content: no more happy shouts,
  - type: text
    content: no treading of grapes in the winepresses.
  - type: text
    content: I have ended all their harvest joys.
  '11':
  - type: text
    content: My heart’s cry for Moab is like a lament on a harp.
  - type: text
    content: I am filled with anguish for Kir-hareseth.
  - type: note
    content: Hebrew Kir-heres, a variant spelling of Kir-hareseth.
  '12':
  - type: text
    content: The people of Moab will worship at their pagan shrines,
  - type: text
    content: but it will do them no good.
  - type: text
    content: They will cry to the gods in their temples,
  - type: text
    content: but no one will be able to save them.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has already said these things about Moab in the past. '
  '14':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' says, “Within three years, counting each day,'
  - type: note
    content: Hebrew Within three years, as a servant bound by contract would count them.
  - type: text
    content: ' the glory of Moab will be ended. From its great population, only a feeble few will be left alive.”'
  '2':
  - type: text
    content: The women of Moab are left like homeless birds
  - type: text
    content: at the shallow crossings of the Arnon River.
  '3':
  - type: text
    content: “Help us,” they cry.
  - type: text
    content: “Defend us against our enemies.
  - type: text
    content: Protect us from their relentless attack.
  - type: text
    content: Do not betray us now that we have escaped.
  '4':
  - type: text
    content: Let our refugees stay among you.
  - type: text
    content: Hide them from our enemies until the terror is past.”
  - type: text
    content: When oppression and destruction have ended
  - type: text
    content: and enemy raiders have disappeared,
  '5':
  - type: text
    content: then God will establish one of David’s descendants as king.
  - type: text
    content: He will rule with mercy and truth.
  - type: text
    content: He will always do what is just
  - type: text
    content: and be eager to do what is right.
  '6':
  - type: text
    content: We have heard about proud Moab—
  - type: text
    content: about its pride and arrogance and rage.
  - type: text
    content: But all that boasting has disappeared.
  '7':
  - type: text
    content: The entire land of Moab weeps.
  - type: text
    content: Yes, everyone in Moab mourns
  - type: text
    content: for the cakes of raisins from Kir-hareseth.
  - type: text
    content: They are all gone now.
  '8':
  - type: text
    content: The farms of Heshbon are abandoned;
  - type: text
    content: the vineyards at Sibmah are deserted.
  - type: text
    content: The rulers of the nations have broken down Moab—
  - type: text
    content: that beautiful grapevine.
  - type: text
    content: Its tendrils spread north as far as the town of Jazer
  - type: text
    content: and trailed eastward into the wilderness.
  - type: text
    content: Its shoots reached so far west
  - type: text
    content: that they crossed over the Dead Sea.
  - type: note
    content: Hebrew the sea.
  '9':
  - type: text
    content: So now I weep for Jazer and the vineyards of Sibmah;
  - type: text
    content: my tears will flow for Heshbon and Elealeh.
  - type: text
    content: There are no more shouts of joy
  - type: text
    content: over your summer fruits and harvest.
