document_id: ISA.16
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Send lambs from Sela as tribute
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the ruler of the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Send them through the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the mountain of beautiful Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The women of Moab are left like homeless birds
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the shallow crossings of the Arnon River.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Help us,” they cry.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Defend us against our enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protect us from their relentless attack.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not betray us now that we have escaped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let our refugees stay among you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hide them from our enemies until the terror is past.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: When oppression and destruction have ended
- type: usfm
  marker: q2
  children:
  - type: text
    text: and enemy raiders have disappeared,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: then God will establish one of David’s descendants as king.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will rule with mercy and truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will always do what is just
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be eager to do what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We have heard about proud Moab—
- type: usfm
  marker: q2
  children:
  - type: text
    text: about its pride and arrogance and rage.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But all that boasting has disappeared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The entire land of Moab weeps.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, everyone in Moab mourns
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the cakes of raisins from Kir-hareseth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are all gone now.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The farms of Heshbon are abandoned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the vineyards at Sibmah are deserted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rulers of the nations have broken down Moab—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that beautiful grapevine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its tendrils spread north as far as the town of Jazer
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trailed eastward into the wilderness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its shoots reached so far west
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they crossed over the Dead Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So now I weep for Jazer and the vineyards of Sibmah;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my tears will flow for Heshbon and Elealeh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There are no more shouts of joy
- type: usfm
  marker: q2
  children:
  - type: text
    text: over your summer fruits and harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Gone now is the gladness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gone the joy of harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be no singing in the vineyards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more happy shouts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no treading of grapes in the winepresses.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have ended all their harvest joys.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My heart’s cry for Moab is like a lament on a harp.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am filled with anguish for Kir-hareseth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kir-heres, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Kir-hareseth.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The people of Moab will worship at their pagan shrines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it will do them no good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will cry to the gods in their temples,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one will be able to save them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has already said these things about Moab in the past. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “Within three years, counting each day,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Within three years, as a servant bound by contract would count them.
    marker-yv: yv-n
  - type: text
    text: ' the glory of Moab will be ended. From its great population, only a feeble few will be left alive.”'
