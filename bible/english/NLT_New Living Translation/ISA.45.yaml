document_id: ISA.45,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Cyrus, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Chosen One
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Cyrus, his anointed one,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose right hand he will empower.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before him, mighty kings will be paralyzed with fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their fortress gates will be opened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to shut again.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How terrible it would be if a newborn baby said to its father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Why was I born?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or if it said to its mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Why did you make me this way?’”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Holy One of Israel and your Creator:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you question what I do for my children?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you give me orders about the work of my hands?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the one who made the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and created people to live on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my hands I stretched out the heavens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the stars are at my command.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will raise up Cyrus to fulfill my righteous purpose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will guide his actions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will restore my city and free my captive people—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without seeking a reward!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Future Conversion of Gentiles
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will rule the Egyptians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Ethiopians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cushites.
      marker-yv: yv-n
    - type: text
      text: ' and the Sabeans.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will come to you with all their merchandise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it will all be yours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will follow you as prisoners in chains.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will fall to their knees in front of you and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘God is with you, and he is the only God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is no other.’”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truly, O God of Israel, our Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you work in mysterious ways.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All craftsmen who make idols will be humiliated.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will all be disgraced together.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will save the people of Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with eternal salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Throughout everlasting ages,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will never again be humiliated and disgraced.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he created the heavens and earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put everything in place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made the world to be lived in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not to be a place of empty chaos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” he says,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and there is no other.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I publicly proclaim bold promises.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I do not whisper obscurities in some dark corner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would not have told the people of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 14:1.
      marker-yv: yv-n
    - type: text
      text: ' to seek me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I could not be found.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', speak only what is true'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and declare only what is right.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will go before you, Cyrus,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and level the mountains.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Greek version; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the swellings.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will smash down gates of bronze
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cut through bars of iron.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gather together and come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you fugitives from surrounding nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What fools they are who carry around their wooden idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pray to gods that cannot save!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consult together, argue your case.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get together and decide what to say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who made these things known so long ago?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What idol ever told you they would happen?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Was it not I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For there is no other God but me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a righteous God and Savior.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is none but me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the world look to me for salvation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I am God; there is no other.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have sworn by my own name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have spoken the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I will never go back on my word:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every knee will bend to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every tongue will declare allegiance to me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will confess; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will declare allegiance to God. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 14:11.
      marker-yv: yv-n
    - type: text
      text: ”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people will declare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the source of all my righteousness and strength.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all who were angry with him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come to him and be ashamed.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all the generations of Israel will be justified,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in him they will boast.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will give you treasures hidden in the darkness—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: secret riches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will do this so you may know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel, the one who calls you by name.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And why have I called you for this work?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why did I call you by name when you did not know me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is for the sake of Jacob my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel my chosen one.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no other God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have equipped you for battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you don’t even know me,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so all the world from east to west
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will know there is no other God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there is no other.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I create the light and make the darkness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I send good times and bad times.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', am the one who does these things.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Open up, O heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pour out your righteousness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the earth open wide
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so salvation and righteousness can sprout up together.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', created them.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What sorrow awaits those who argue with their Creator.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does a clay pot argue with its maker?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does the clay dispute with the one who shapes it, saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Stop, you’re doing it wrong!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does the pot exclaim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘How clumsy can you be?’
