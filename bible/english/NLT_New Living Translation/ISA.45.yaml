document_id: ISA.45,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cyrus, the Lord’s Chosen One
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to Cyrus, his anointed one,'
  - type: text
    content: whose right hand he will empower.
  - type: text
    content: Before him, mighty kings will be paralyzed with fear.
  - type: text
    content: Their fortress gates will be opened,
  - type: text
    content: never to shut again.
  '10':
  - type: text
    content: How terrible it would be if a newborn baby said to its father,
  - type: text
    content: ‘Why was I born?’
  - type: text
    content: or if it said to its mother,
  - type: text
    content: ‘Why did you make me this way?’”
  '11':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'the Holy One of Israel and your Creator:'
  - type: text
    content: “Do you question what I do for my children?
  - type: text
    content: Do you give me orders about the work of my hands?
  '12':
  - type: text
    content: I am the one who made the earth
  - type: text
    content: and created people to live on it.
  - type: text
    content: With my hands I stretched out the heavens.
  - type: text
    content: All the stars are at my command.
  '13':
  - type: text
    content: I will raise up Cyrus to fulfill my righteous purpose,
  - type: text
    content: and I will guide his actions.
  - type: text
    content: He will restore my city and free my captive people—
  - type: text
    content: without seeking a reward!
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!”'
  - type: heading
    content: Future Conversion of Gentiles
  '14':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “You will rule the Egyptians,
  - type: text
    content: the Ethiopians,
  - type: note
    content: Hebrew Cushites.
  - type: text
    content: ' and the Sabeans.'
  - type: text
    content: They will come to you with all their merchandise,
  - type: text
    content: and it will all be yours.
  - type: text
    content: They will follow you as prisoners in chains.
  - type: text
    content: They will fall to their knees in front of you and say,
  - type: text
    content: ‘God is with you, and he is the only God.
  - type: text
    content: There is no other.’”
  '15':
  - type: text
    content: Truly, O God of Israel, our Savior,
  - type: text
    content: you work in mysterious ways.
  '16':
  - type: text
    content: All craftsmen who make idols will be humiliated.
  - type: text
    content: They will all be disgraced together.
  '17':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will save the people of Israel'
  - type: text
    content: with eternal salvation.
  - type: text
    content: Throughout everlasting ages,
  - type: text
    content: they will never again be humiliated and disgraced.
  '18':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is God,'
  - type: text
    content: and he created the heavens and earth
  - type: text
    content: and put everything in place.
  - type: text
    content: He made the world to be lived in,
  - type: text
    content: not to be a place of empty chaos.
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ',” he says,'
  - type: text
    content: “and there is no other.
  '19':
  - type: text
    content: I publicly proclaim bold promises.
  - type: text
    content: I do not whisper obscurities in some dark corner.
  - type: text
    content: I would not have told the people of Israel
  - type: note
    content: Hebrew of Jacob. See note on 14:1.
  - type: text
    content: ' to seek me'
  - type: text
    content: if I could not be found.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', speak only what is true'
  - type: text
    content: and declare only what is right.
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will go before you, Cyrus,
  - type: text
    content: and level the mountains.
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text reads the swellings.
  - type: text
    content: I will smash down gates of bronze
  - type: text
    content: and cut through bars of iron.
  '20':
  - type: text
    content: “Gather together and come,
  - type: text
    content: you fugitives from surrounding nations.
  - type: text
    content: What fools they are who carry around their wooden idols
  - type: text
    content: and pray to gods that cannot save!
  '21':
  - type: text
    content: Consult together, argue your case.
  - type: text
    content: Get together and decide what to say.
  - type: text
    content: Who made these things known so long ago?
  - type: text
    content: What idol ever told you they would happen?
  - type: text
    content: 'Was it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: For there is no other God but me,
  - type: text
    content: a righteous God and Savior.
  - type: text
    content: There is none but me.
  '22':
  - type: text
    content: Let all the world look to me for salvation!
  - type: text
    content: For I am God; there is no other.
  '23':
  - type: text
    content: I have sworn by my own name;
  - type: text
    content: I have spoken the truth,
  - type: text
    content: 'and I will never go back on my word:'
  - type: text
    content: Every knee will bend to me,
  - type: text
    content: and every tongue will declare allegiance to me.
  - type: note
    content: Hebrew will confess; Greek version reads will declare allegiance to God. Compare Rom 14:11.
  - type: text
    content: ”
  '24':
  - type: text
    content: The people will declare,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is the source of all my righteousness and strength.”'
  - type: text
    content: And all who were angry with him
  - type: text
    content: will come to him and be ashamed.
  '25':
  - type: text
    content: 'In the '
  - type: text
    content: Lord
  - type: text
    content: ' all the generations of Israel will be justified,'
  - type: text
    content: and in him they will boast.
  '3':
  - type: text
    content: And I will give you treasures hidden in the darkness—
  - type: text
    content: secret riches.
  - type: text
    content: 'I will do this so you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the God of Israel, the one who calls you by name.
  '4':
  - type: text
    content: “And why have I called you for this work?
  - type: text
    content: Why did I call you by name when you did not know me?
  - type: text
    content: It is for the sake of Jacob my servant,
  - type: text
    content: Israel my chosen one.
  '5':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: there is no other God.
  - type: text
    content: I have equipped you for battle,
  - type: text
    content: though you don’t even know me,
  '6':
  - type: text
    content: so all the world from east to west
  - type: text
    content: will know there is no other God.
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other.'
  '7':
  - type: text
    content: I create the light and make the darkness.
  - type: text
    content: I send good times and bad times.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am the one who does these things.'
  '8':
  - type: text
    content: “Open up, O heavens,
  - type: text
    content: and pour out your righteousness.
  - type: text
    content: Let the earth open wide
  - type: text
    content: so salvation and righteousness can sprout up together.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', created them.'
  '9':
  - type: text
    content: “What sorrow awaits those who argue with their Creator.
  - type: text
    content: Does a clay pot argue with its maker?
  - type: text
    content: Does the clay dispute with the one who shapes it, saying,
  - type: text
    content: ‘Stop, you’re doing it wrong!’
  - type: text
    content: Does the pot exclaim,
  - type: text
    content: ‘How clumsy can you be?’
