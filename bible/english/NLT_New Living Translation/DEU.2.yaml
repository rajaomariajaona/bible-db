document_id: DEU.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Remembering Israel’s Wanderings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Then we turned around and headed back across the wilderness toward the Red Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sea of reeds.
    marker-yv: yv-n
  - type: text
    text: ' just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had instructed me, and we wandered around in the region of Mount Seir for a long time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Then at last the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '‘You have been wandering around in this hill country long enough; turn to the north. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Give these orders to the people: “You will pass through the country belonging to your relatives the Edomites, the descendants of Esau, who live in Seir. The Edomites will feel threatened, so be careful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Do not bother them, for I have given them all the hill country around Mount Seir as their property, and I will not give you even one square foot of their land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If you need food to eat or water to drink, pay them for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has blessed you in everything you have done. He has watched your every step through this great wilderness. During these forty years, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has been with you, and you have lacked nothing.”’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “So we bypassed the territory of our relatives, the descendants of Esau, who live in Seir. We avoided the road through the Arabah Valley that comes up from Elath and Ezion-geber.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Then as we turned north along the desert route through Moab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' warned us, ‘Do not bother the Moabites, the descendants of Lot, or start a war with them. I have given them Ar as their property, and I will not give you any of their land.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '(A race of giants called the Emites had once lived in the area of Ar. They were as strong and numerous and tall as the Anakites, another race of giants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Both the Emites and the Anakites are also known as the Rephaites, though the Moabites call them Emites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In earlier times the Horites had lived in Seir, but they were driven out and displaced by the descendants of Esau, just as Israel drove out the people of Canaan when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Israel their land.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moses continued, “Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to us, ‘Get moving. Cross the Zered Brook.’ So we crossed the brook.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Thirty-eight years passed from the time we first left Kadesh-barnea until we finally crossed the Zered Brook! By then, all the men old enough to fight in battle had died in the wilderness, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had vowed would happen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' struck them down until they had all been eliminated from the community.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“When all the men of fighting age had died, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘Today you will cross the border of Moab at Ar '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and enter the land of the Ammonites, the descendants of Lot. But do not bother them or start a war with them. I have given the land of Ammon to them as their property, and I will not give you any of their land.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '(That area was once considered the land of the Rephaites, who had lived there, though the Ammonites call them Zamzummites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They were also as strong and numerous and tall as the Anakites. But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' destroyed them so the Ammonites could occupy their land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He had done the same for the descendants of Esau who lived in Seir, for he destroyed the Horites so they could settle there in their place. The descendants of Esau live there to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A similar thing happened when the Caphtorites from Crete
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Caphtor.
    marker-yv: yv-n
  - type: text
    text: ' invaded and destroyed the Avvites, who had lived in villages in the area of Gaza.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moses continued, “Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, ‘Now get moving! Cross the Arnon Gorge. Look, I will hand over to you Sihon the Amorite, king of Heshbon, and I will give you his land. Attack him and begin to occupy the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Beginning today I will make people throughout the earth terrified because of you. When they hear reports about you, they will tremble with dread and fear.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victory over Sihon of Heshbon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moses continued, “From the wilderness of Kedemoth I sent ambassadors to King Sihon of Heshbon with this proposal of peace:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '‘Let us travel through your land. We will stay on the main road and won’t turn off into the fields on either side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Sell us food to eat and water to drink, and we will pay for it. All we want is permission to pass through your land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The descendants of Esau who live in Seir allowed us to go through their country, and so did the Moabites, who live in Ar. Let us pass through until we cross the Jordan into the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God is giving us.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“But King Sihon of Heshbon refused to allow us to pass through, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God made Sihon stubborn and defiant so he could help you defeat him, as he has now done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, ‘Look, I have begun to hand King Sihon and his land over to you. Begin now to conquer and occupy his land.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“Then King Sihon declared war on us and mobilized his forces at Jahaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God handed him over to us, and we crushed him, his sons, and all his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: We conquered all his towns and completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' everyone—men, women, and children. Not a single person was spared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: We took all the livestock as plunder for ourselves, along with anything of value from the towns we ransacked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God also helped us conquer Aroer on the edge of the Arnon Gorge, and the town in the gorge, and the whole area as far as Gilead. No town had walls too strong for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'However, we avoided the land of the Ammonites all along the Jabbok River and the towns in the hill country—all the places the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God had commanded us to leave alone.'
