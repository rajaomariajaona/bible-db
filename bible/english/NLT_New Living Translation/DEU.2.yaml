document_id: DEU.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Remembering Israel’s Wanderings
  - type: text
    content: “Then we turned around and headed back across the wilderness toward the Red Sea,
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed me, and we wandered around in the region of Mount Seir for a long time.'
  '10':
  - type: text
    content: '(A race of giants called the Emites had once lived in the area of Ar. They were as strong and numerous and tall as the Anakites, another race of giants. '
  '11':
  - type: text
    content: 'Both the Emites and the Anakites are also known as the Rephaites, though the Moabites call them Emites. '
  '12':
  - type: text
    content: 'In earlier times the Horites had lived in Seir, but they were driven out and displaced by the descendants of Esau, just as Israel drove out the people of Canaan when the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Israel their land.)'
  '13':
  - type: text
    content: 'Moses continued, “Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to us, ‘Get moving. Cross the Zered Brook.’ So we crossed the brook.'
  '14':
  - type: text
    content: '“Thirty-eight years passed from the time we first left Kadesh-barnea until we finally crossed the Zered Brook! By then, all the men old enough to fight in battle had died in the wilderness, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had vowed would happen. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' struck them down until they had all been eliminated from the community.'
  '16':
  - type: text
    content: '“When all the men of fighting age had died, '
  '17':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '18':
  - type: text
    content: '‘Today you will cross the border of Moab at Ar '
  '19':
  - type: text
    content: and enter the land of the Ammonites, the descendants of Lot. But do not bother them or start a war with them. I have given the land of Ammon to them as their property, and I will not give you any of their land.’”
  '2':
  - type: text
    content: '“Then at last the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '20':
  - type: text
    content: '(That area was once considered the land of the Rephaites, who had lived there, though the Ammonites call them Zamzummites. '
  '21':
  - type: text
    content: 'They were also as strong and numerous and tall as the Anakites. But the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed them so the Ammonites could occupy their land. '
  '22':
  - type: text
    content: 'He had done the same for the descendants of Esau who lived in Seir, for he destroyed the Horites so they could settle there in their place. The descendants of Esau live there to this day. '
  '23':
  - type: text
    content: A similar thing happened when the Caphtorites from Crete
  - type: note
    content: Hebrew from Caphtor.
  - type: text
    content: ' invaded and destroyed the Avvites, who had lived in villages in the area of Gaza.)'
  '24':
  - type: text
    content: 'Moses continued, “Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Now get moving! Cross the Arnon Gorge. Look, I will hand over to you Sihon the Amorite, king of Heshbon, and I will give you his land. Attack him and begin to occupy the land. '
  '25':
  - type: text
    content: Beginning today I will make people throughout the earth terrified because of you. When they hear reports about you, they will tremble with dread and fear.’”
  - type: heading
    content: Victory over Sihon of Heshbon
  '26':
  - type: text
    content: 'Moses continued, “From the wilderness of Kedemoth I sent ambassadors to King Sihon of Heshbon with this proposal of peace:'
  '27':
  - type: text
    content: '‘Let us travel through your land. We will stay on the main road and won’t turn off into the fields on either side. '
  '28':
  - type: text
    content: 'Sell us food to eat and water to drink, and we will pay for it. All we want is permission to pass through your land. '
  '29':
  - type: text
    content: 'The descendants of Esau who live in Seir allowed us to go through their country, and so did the Moabites, who live in Ar. Let us pass through until we cross the Jordan into the land the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is giving us.’'
  '3':
  - type: text
    content: '‘You have been wandering around in this hill country long enough; turn to the north. '
  '30':
  - type: text
    content: '“But King Sihon of Heshbon refused to allow us to pass through, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God made Sihon stubborn and defiant so he could help you defeat him, as he has now done.'
  '31':
  - type: text
    content: '“Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Look, I have begun to hand King Sihon and his land over to you. Begin now to conquer and occupy his land.’'
  '32':
  - type: text
    content: '“Then King Sihon declared war on us and mobilized his forces at Jahaz. '
  '33':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' our God handed him over to us, and we crushed him, his sons, and all his people. '
  '34':
  - type: text
    content: We conquered all his towns and completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' everyone—men, women, and children. Not a single person was spared. '
  '35':
  - type: text
    content: We took all the livestock as plunder for ourselves, along with anything of value from the towns we ransacked.
  '36':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' our God also helped us conquer Aroer on the edge of the Arnon Gorge, and the town in the gorge, and the whole area as far as Gilead. No town had walls too strong for us. '
  '37':
  - type: text
    content: 'However, we avoided the land of the Ammonites all along the Jabbok River and the towns in the hill country—all the places the '
  - type: text
    content: Lord
  - type: text
    content: ' our God had commanded us to leave alone.'
  '4':
  - type: text
    content: 'Give these orders to the people: “You will pass through the country belonging to your relatives the Edomites, the descendants of Esau, who live in Seir. The Edomites will feel threatened, so be careful. '
  '5':
  - type: text
    content: 'Do not bother them, for I have given them all the hill country around Mount Seir as their property, and I will not give you even one square foot of their land. '
  '6':
  - type: text
    content: 'If you need food to eat or water to drink, pay them for it. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you in everything you have done. He has watched your every step through this great wilderness. During these forty years, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has been with you, and you have lacked nothing.”’'
  '8':
  - type: text
    content: “So we bypassed the territory of our relatives, the descendants of Esau, who live in Seir. We avoided the road through the Arabah Valley that comes up from Elath and Ezion-geber.
  - type: text
    content: '“Then as we turned north along the desert route through Moab, '
  '9':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' warned us, ‘Do not bother the Moabites, the descendants of Lot, or start a war with them. I have given them Ar as their property, and I will not give you any of their land.’”'
