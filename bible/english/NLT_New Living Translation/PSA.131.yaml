document_id: PSA.131,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', my heart is not proud;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes are not haughty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I don’t concern myself with matters too great
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or too awesome for me to grasp.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, I have calmed and quieted myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a weaned child who no longer cries for its mother’s milk.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, like a weaned child is my soul within me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Israel, put your hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now and always.
