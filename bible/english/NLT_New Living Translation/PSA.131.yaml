document_id: PSA.131,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem. A psalm of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', my heart is not proud;'
  - type: text
    content: my eyes are not haughty.
  - type: text
    content: I don’t concern myself with matters too great
  - type: text
    content: or too awesome for me to grasp.
  '2':
  - type: text
    content: Instead, I have calmed and quieted myself,
  - type: text
    content: like a weaned child who no longer cries for its mother’s milk.
  - type: text
    content: Yes, like a weaned child is my soul within me.
  '3':
  - type: text
    content: 'O Israel, put your hope in the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: now and always.
