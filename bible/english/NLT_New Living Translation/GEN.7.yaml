document_id: GEN.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flood Covers the Earth
  - type: text
    content: 'When everything was ready, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Noah, “Go into the boat with all your family, for among all the people of the earth, I can see that you alone are righteous. '
  '10':
  - type: text
    content: After seven days, the waters of the flood came and covered the earth.
  '11':
  - type: text
    content: 'When Noah was 600 years old, on the seventeenth day of the second month, all the underground waters erupted from the earth, and the rain fell in mighty torrents from the sky. '
  '12':
  - type: text
    content: The rain continued to fall for forty days and forty nights.
  '13':
  - type: text
    content: 'That very day Noah had gone into the boat with his wife and his sons—Shem, Ham, and Japheth—and their wives. '
  '14':
  - type: text
    content: 'With them in the boat were pairs of every kind of animal—domestic and wild, large and small—along with birds of every kind. '
  '15':
  - type: text
    content: 'Two by two they came into the boat, representing every living thing that breathes. '
  '16':
  - type: text
    content: 'A male and female of each kind entered, just as God had commanded Noah. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' closed the door behind them.'
  '17':
  - type: text
    content: 'For forty days the floodwaters grew deeper, covering the ground and lifting the boat high above the earth. '
  '18':
  - type: text
    content: 'As the waters rose higher and higher above the ground, the boat floated safely on the surface. '
  '19':
  - type: text
    content: 'Finally, the water covered even the highest mountains on the earth, '
  '2':
  - type: text
    content: Take with you seven pairs—male and female—of each animal I have approved for eating and for sacrifice,
  - type: note
    content: Hebrew of each clean animal; similarly in 7:8.
  - type: text
    content: ' and take one pair of each of the others. '
  '20':
  - type: text
    content: rising more than twenty-two feet
  - type: note
    content: Hebrew 15 cubits [6.9 meters].
  - type: text
    content: ' above the highest peaks. '
  '21':
  - type: text
    content: 'All the living things on earth died—birds, domestic animals, wild animals, small animals that scurry along the ground, and all the people. '
  '22':
  - type: text
    content: 'Everything that breathed and lived on dry land died. '
  '23':
  - type: text
    content: 'God wiped out every living thing on the earth—people, livestock, small animals that scurry along the ground, and the birds of the sky. All were destroyed. The only people who survived were Noah and those with him in the boat. '
  '24':
  - type: text
    content: And the floodwaters covered the earth for 150 days.
  '3':
  - type: text
    content: 'Also take seven pairs of every kind of bird. There must be a male and a female in each pair to ensure that all life will survive on the earth after the flood. '
  '4':
  - type: text
    content: Seven days from now I will make the rains pour down on the earth. And it will rain for forty days and forty nights, until I have wiped from the earth all the living things I have created.”
  '5':
  - type: text
    content: 'So Noah did everything as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '6':
  - type: text
    content: 'Noah was 600 years old when the flood covered the earth. '
  '7':
  - type: text
    content: 'He went on board the boat to escape the flood—he and his wife and his sons and their wives. '
  '8':
  - type: text
    content: 'With them were all the various kinds of animals—those approved for eating and for sacrifice and those that were not—along with all the birds and the small animals that scurry along the ground. '
  '9':
  - type: text
    content: 'They entered the boat in pairs, male and female, just as God had commanded Noah. '
