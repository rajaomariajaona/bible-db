document_id: GEN.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Flood Covers the Earth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When everything was ready, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Noah, “Go into the boat with all your family, for among all the people of the earth, I can see that you alone are righteous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After seven days, the waters of the flood came and covered the earth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Noah was 600 years old, on the seventeenth day of the second month, all the underground waters erupted from the earth, and the rain fell in mighty torrents from the sky. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The rain continued to fall for forty days and forty nights.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That very day Noah had gone into the boat with his wife and his sons—Shem, Ham, and Japheth—and their wives. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With them in the boat were pairs of every kind of animal—domestic and wild, large and small—along with birds of every kind. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Two by two they came into the boat, representing every living thing that breathes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A male and female of each kind entered, just as God had commanded Noah. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' closed the door behind them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For forty days the floodwaters grew deeper, covering the ground and lifting the boat high above the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the waters rose higher and higher above the ground, the boat floated safely on the surface. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, the water covered even the highest mountains on the earth, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Take with you seven pairs—male and female—of each animal I have approved for eating and for sacrifice,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of each clean animal; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 7:8.
      marker-yv: yv-n
    - type: text
      text: ' and take one pair of each of the others. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: rising more than twenty-two feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '15 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.9 meters].'
      marker-yv: yv-n
    - type: text
      text: ' above the highest peaks. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the living things on earth died—birds, domestic animals, wild animals, small animals that scurry along the ground, and all the people. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everything that breathed and lived on dry land died. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God wiped out every living thing on the earth—people, livestock, small animals that scurry along the ground, and the birds of the sky. All were destroyed. The only people who survived were Noah and those with him in the boat. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the floodwaters covered the earth for 150 days.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Also take seven pairs of every kind of bird. There must be a male and a female in each pair to ensure that all life will survive on the earth after the flood. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Seven days from now I will make the rains pour down on the earth. And it will rain for forty days and forty nights, until I have wiped from the earth all the living things I have created.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Noah did everything as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noah was 600 years old when the flood covered the earth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went on board the boat to escape the flood—he and his wife and his sons and their wives. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With them were all the various kinds of animals—those approved for eating and for sacrifice and those that were not—along with all the birds and the small animals that scurry along the ground. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They entered the boat in pairs, male and female, just as God had commanded Noah. '
