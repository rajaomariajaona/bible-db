document_id: NUM.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Twelve Scouts Explore Canaan
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' now said to Moses, '
  '10':
  - type: text
    text: ZebulunGaddiel son of Sodi
  '11':
  - type: text
    text: Manasseh son of JosephGaddi son of Susi
  '12':
  - type: text
    text: DanAmmiel son of Gemalli
  '13':
  - type: text
    text: AsherSethur son of Michael
  '14':
  - type: text
    text: NaphtaliNahbi son of Vophsi
  '15':
  - type: text
    text: GadGeuel son of Maki
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the names of the men Moses sent out to explore the land. (Moses called Hoshea son of Nun by the name Joshua.)
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses gave the men these instructions as he sent them out to explore the land: “Go north through the Negev into the hill country. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See what the land is like, and find out whether the people living there are strong or weak, few or many. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See what kind of land they live in. Is it good or bad? Do their towns have walls, or are they unprotected like open camps? '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Send out men to explore the land of Canaan, the land I am giving to the Israelites. Send one leader from each of the twelve ancestral tribes.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Is the soil fertile or poor? Are there many trees? Do your best to bring back samples of the crops you see.” (It happened to be the season for harvesting the first ripe grapes.)
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went up and explored the land from the wilderness of Zin as far as Rehob, near Lebo-hamath. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Going north, they passed through the Negev and arrived at Hebron, where Ahiman, Sheshai, and Talmai—all descendants of Anak—lived. (The ancient town of Hebron was founded seven years before the Egyptian city of Zoan.) '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to the valley of Eshcol, they cut down a branch with a single cluster of grapes so large that it took two of them to carry it on a pole between them! They also brought back samples of the pomegranates and figs. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That place was called the valley of Eshcol (which means “cluster”), because of the cluster of grapes the Israelite men cut there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Scouting Report
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After exploring the land for forty days, the men returned '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'to Moses, Aaron, and the whole community of Israel at Kadesh in the wilderness of Paran. They reported to the whole community what they had seen and showed them the fruit they had taken from the land. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This was their report to Moses: “We entered the land you sent us to explore, and it is indeed a bountiful country—a land flowing with milk and honey. Here is the kind of fruit it produces. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the people living there are powerful, and their towns are large and fortified. We even saw giants there, the descendants of Anak! '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The Amalekites live in the Negev, and the Hittites, Jebusites, and Amorites live in the hill country. The Canaanites live along the coast of the Mediterranean Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' and along the Jordan Valley.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Moses did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him. He sent out twelve men, all tribal leaders of Israel, from their camp in the wilderness of Paran. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Caleb tried to quiet the people as they stood before Moses. “Let’s go at once to take the land,” he said. “We can certainly conquer it!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the other men who had explored the land with him disagreed. “We can’t go up against them! They are stronger than we are!” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they spread this bad report about the land among the Israelites: “The land we traveled through and explored will devour anyone who goes to live there. All the people we saw were huge. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We even saw giants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nephilim.
      marker-yv: yv-n
    - type: text
      text: ' there, the descendants of Anak. Next to them we felt like grasshoppers, and that’s what they thought, too!”'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These were the tribes and the names of their leaders:'
  - type: text
    text: TribeLeaderReubenShammua son of Zaccur
  '5':
  - type: text
    text: SimeonShaphat son of Hori
  '6':
  - type: text
    text: JudahCaleb son of Jephunneh
  '7':
  - type: text
    text: IssacharIgal son of Joseph
  '8':
  - type: text
    text: EphraimHoshea son of Nun
  '9':
  - type: text
    text: BenjaminPalti son of Raphu
