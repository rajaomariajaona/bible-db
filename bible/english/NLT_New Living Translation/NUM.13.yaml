  - type: heading
    content: Twelve Scouts Explore Canaan
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' now said to Moses, '
  '10':
  - type: text
    content: Zebulun
  - type: text
    content: Gaddiel son of Sodi
  '11':
  - type: text
    content: Manasseh son of Joseph
  - type: text
    content: Gaddi son of Susi
  '12':
  - type: text
    content: Dan
  - type: text
    content: Ammiel son of Gemalli
  '13':
  - type: text
    content: Asher
  - type: text
    content: Sethur son of Michael
  '14':
  - type: text
    content: Naphtali
  - type: text
    content: Nahbi son of Vophsi
  '15':
  - type: text
    content: Gad
  - type: text
    content: Geuel son of Maki
  '16':
  - type: text
    content: These are the names of the men Moses sent out to explore the land. (Moses called Hoshea son of Nun by the name Joshua.)
  '17':
  - type: text
    content: 'Moses gave the men these instructions as he sent them out to explore the land: “Go north through the Negev into the hill country. '
  '18':
  - type: text
    content: 'See what the land is like, and find out whether the people living there are strong or weak, few or many. '
  '19':
  - type: text
    content: 'See what kind of land they live in. Is it good or bad? Do their towns have walls, or are they unprotected like open camps? '
  '2':
  - type: text
    content: '“Send out men to explore the land of Canaan, the land I am giving to the Israelites. Send one leader from each of the twelve ancestral tribes.” '
  '20':
  - type: text
    content: Is the soil fertile or poor? Are there many trees? Do your best to bring back samples of the crops you see.” (It happened to be the season for harvesting the first ripe grapes.)
  '21':
  - type: text
    content: 'So they went up and explored the land from the wilderness of Zin as far as Rehob, near Lebo-hamath. '
  '22':
  - type: text
    content: 'Going north, they passed through the Negev and arrived at Hebron, where Ahiman, Sheshai, and Talmai—all descendants of Anak—lived. (The ancient town of Hebron was founded seven years before the Egyptian city of Zoan.) '
  '23':
  - type: text
    content: 'When they came to the valley of Eshcol, they cut down a branch with a single cluster of grapes so large that it took two of them to carry it on a pole between them! They also brought back samples of the pomegranates and figs. '
  '24':
  - type: text
    content: That place was called the valley of Eshcol (which means “cluster”), because of the cluster of grapes the Israelite men cut there.
  - type: heading
    content: The Scouting Report
  '25':
  - type: text
    content: 'After exploring the land for forty days, the men returned '
  '26':
  - type: text
    content: 'to Moses, Aaron, and the whole community of Israel at Kadesh in the wilderness of Paran. They reported to the whole community what they had seen and showed them the fruit they had taken from the land. '
  '27':
  - type: text
    content: 'This was their report to Moses: “We entered the land you sent us to explore, and it is indeed a bountiful country—a land flowing with milk and honey. Here is the kind of fruit it produces. '
  '28':
  - type: text
    content: 'But the people living there are powerful, and their towns are large and fortified. We even saw giants there, the descendants of Anak! '
  '29':
  - type: text
    content: The Amalekites live in the Negev, and the Hittites, Jebusites, and Amorites live in the hill country. The Canaanites live along the coast of the Mediterranean Sea
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' and along the Jordan Valley.”'
  '3':
  - type: text
    content: 'So Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him. He sent out twelve men, all tribal leaders of Israel, from their camp in the wilderness of Paran. '
  '30':
  - type: text
    content: But Caleb tried to quiet the people as they stood before Moses. “Let’s go at once to take the land,” he said. “We can certainly conquer it!”
  '31':
  - type: text
    content: 'But the other men who had explored the land with him disagreed. “We can’t go up against them! They are stronger than we are!” '
  '32':
  - type: text
    content: 'So they spread this bad report about the land among the Israelites: “The land we traveled through and explored will devour anyone who goes to live there. All the people we saw were huge. '
  '33':
  - type: text
    content: We even saw giants
  - type: note
    content: Hebrew nephilim.
  - type: text
    content: ' there, the descendants of Anak. Next to them we felt like grasshoppers, and that’s what they thought, too!”'
  '4':
  - type: text
    content: 'These were the tribes and the names of their leaders:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Reuben
  - type: text
    content: Shammua son of Zaccur
  '5':
  - type: text
    content: Simeon
  - type: text
    content: Shaphat son of Hori
  '6':
  - type: text
    content: Judah
  - type: text
    content: Caleb son of Jephunneh
  '7':
  - type: text
    content: Issachar
  - type: text
    content: Igal son of Joseph
  '8':
  - type: text
    content: Ephraim
  - type: text
    content: Hoshea son of Nun
  '9':
  - type: text
    content: Benjamin
  - type: text
    content: Palti son of Raphu
