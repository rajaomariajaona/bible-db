document_id: NAM.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Judgment against Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow awaits Nineveh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the city of murder and lies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is crammed with wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is never without victims.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet Thebes fell,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her people were led away as captives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her babies were dashed to death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the stones of the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soldiers threw dice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They cast lots.
      marker-yv: yv-n
    - type: text
      text: ' to get Egyptian officers as servants.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All their leaders were bound in chains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, Nineveh, will also stagger like a drunkard.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will hide for fear of the attacking enemy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your fortresses will fall.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be devoured like the ripe figs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that fall into the mouths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those who shake the trees.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your troops will be as weak
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and helpless as women.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of your land will be opened wide to the enemy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set on fire and burned.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get ready for the siege!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Store up water!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strengthen the defenses!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go into the pits to trample clay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pack it into molds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making bricks to repair the walls.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the fire will devour you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sword will cut you down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy will consume you like locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devouring everything they see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be no escape,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even if you multiply like swarming locusts.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your merchants have multiplied
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until they outnumber the stars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But like a swarm of locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they strip the land and fly away.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your guards
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: princes.
      marker-yv: yv-n
    - type: text
      text: ' and officials are also like swarming locusts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that crowd together in the hedges on a cold day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But like locusts that fly away when the sun comes up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them will fly away and disappear.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your shepherds are asleep, O Assyrian king;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your princes lie dead in the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people are scattered across the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to gather them together.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no healing for your wound;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your injury is fatal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who hear of your destruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will clap their hands for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where can anyone be found
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who has not suffered from your continual cruelty?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the crack of whips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rumble of wheels!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horses’ hooves pound,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chariots clatter wildly.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See the flashing swords and glittering spears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the charioteers charge past!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are countless casualties,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heaps of bodies—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so many bodies that
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people stumble over them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All this because Nineveh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the beautiful and faithless city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mistress of deadly charms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enticed the nations with her beauty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She taught them all her magic,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enchanting people everywhere.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am your enemy!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And now I will lift your skirts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and show all the earth your nakedness and shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cover you with filth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and show the world how vile you really are.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who see you will shrink back and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Nineveh lies in ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are the mourners?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does anyone regret your destruction?”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you any better than the city of Thebes,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'No-amon; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:10.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: situated on the Nile River, surrounded by water?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She was protected by the river on all sides,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walled in by water.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ethiopia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cush.
      marker-yv: yv-n
    - type: text
      text: ' and the land of Egypt'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave unlimited assistance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations of Put and Libya
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were among her allies.
