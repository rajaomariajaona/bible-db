document_id: NAM.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Judgment against Nineveh
  - type: text
    content: What sorrow awaits Nineveh,
  - type: text
    content: the city of murder and lies!
  - type: text
    content: She is crammed with wealth
  - type: text
    content: and is never without victims.
  '10':
  - type: text
    content: Yet Thebes fell,
  - type: text
    content: and her people were led away as captives.
  - type: text
    content: Her babies were dashed to death
  - type: text
    content: against the stones of the streets.
  - type: text
    content: Soldiers threw dice
  - type: note
    content: Hebrew They cast lots.
  - type: text
    content: ' to get Egyptian officers as servants.'
  - type: text
    content: All their leaders were bound in chains.
  '11':
  - type: text
    content: And you, Nineveh, will also stagger like a drunkard.
  - type: text
    content: You will hide for fear of the attacking enemy.
  '12':
  - type: text
    content: All your fortresses will fall.
  - type: text
    content: They will be devoured like the ripe figs
  - type: text
    content: that fall into the mouths
  - type: text
    content: of those who shake the trees.
  '13':
  - type: text
    content: Your troops will be as weak
  - type: text
    content: and helpless as women.
  - type: text
    content: The gates of your land will be opened wide to the enemy
  - type: text
    content: and set on fire and burned.
  '14':
  - type: text
    content: Get ready for the siege!
  - type: text
    content: Store up water!
  - type: text
    content: Strengthen the defenses!
  - type: text
    content: Go into the pits to trample clay,
  - type: text
    content: and pack it into molds,
  - type: text
    content: making bricks to repair the walls.
  '15':
  - type: text
    content: But the fire will devour you;
  - type: text
    content: the sword will cut you down.
  - type: text
    content: The enemy will consume you like locusts,
  - type: text
    content: devouring everything they see.
  - type: text
    content: There will be no escape,
  - type: text
    content: even if you multiply like swarming locusts.
  '16':
  - type: text
    content: Your merchants have multiplied
  - type: text
    content: until they outnumber the stars.
  - type: text
    content: But like a swarm of locusts,
  - type: text
    content: they strip the land and fly away.
  '17':
  - type: text
    content: Your guards
  - type: note
    content: Or princes.
  - type: text
    content: ' and officials are also like swarming locusts'
  - type: text
    content: that crowd together in the hedges on a cold day.
  - type: text
    content: But like locusts that fly away when the sun comes up,
  - type: text
    content: all of them will fly away and disappear.
  '18':
  - type: text
    content: Your shepherds are asleep, O Assyrian king;
  - type: text
    content: your princes lie dead in the dust.
  - type: text
    content: Your people are scattered across the mountains
  - type: text
    content: with no one to gather them together.
  '19':
  - type: text
    content: There is no healing for your wound;
  - type: text
    content: your injury is fatal.
  - type: text
    content: All who hear of your destruction
  - type: text
    content: will clap their hands for joy.
  - type: text
    content: Where can anyone be found
  - type: text
    content: who has not suffered from your continual cruelty?
  '2':
  - type: text
    content: Hear the crack of whips,
  - type: text
    content: the rumble of wheels!
  - type: text
    content: Horses’ hooves pound,
  - type: text
    content: and chariots clatter wildly.
  '3':
  - type: text
    content: See the flashing swords and glittering spears
  - type: text
    content: as the charioteers charge past!
  - type: text
    content: There are countless casualties,
  - type: text
    content: heaps of bodies—
  - type: text
    content: so many bodies that
  - type: text
    content: people stumble over them.
  '4':
  - type: text
    content: All this because Nineveh,
  - type: text
    content: the beautiful and faithless city,
  - type: text
    content: mistress of deadly charms,
  - type: text
    content: enticed the nations with her beauty.
  - type: text
    content: She taught them all her magic,
  - type: text
    content: enchanting people everywhere.
  '5':
  - type: text
    content: “I am your enemy!”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “And now I will lift your skirts
  - type: text
    content: and show all the earth your nakedness and shame.
  '6':
  - type: text
    content: I will cover you with filth
  - type: text
    content: and show the world how vile you really are.
  '7':
  - type: text
    content: All who see you will shrink back and say,
  - type: text
    content: ‘Nineveh lies in ruins.
  - type: text
    content: Where are the mourners?’
  - type: text
    content: Does anyone regret your destruction?”
  '8':
  - type: text
    content: Are you any better than the city of Thebes,
  - type: note
    content: Hebrew No-amon; also in 3:10.
  - type: text
    content: situated on the Nile River, surrounded by water?
  - type: text
    content: She was protected by the river on all sides,
  - type: text
    content: walled in by water.
  '9':
  - type: text
    content: Ethiopia
  - type: note
    content: Hebrew Cush.
  - type: text
    content: ' and the land of Egypt'
  - type: text
    content: gave unlimited assistance.
  - type: text
    content: The nations of Put and Libya
  - type: text
    content: were among her allies.
