document_id: EZK.36,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration for Israel
  - type: text
    content: '“Son of man, prophesy to Israel’s mountains. Give them this message: O mountains of Israel, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '10':
  - type: text
    content: 'I will greatly increase the population of Israel, and the ruined cities will be rebuilt and filled with people. '
  '11':
  - type: text
    content: 'I will increase not only the people, but also your animals. O mountains of Israel, I will bring people to live on you once again. I will make you even more prosperous than you were before. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: I will cause my people to walk on you once again, and you will be their territory. You will never again rob them of their children.
  '13':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The other nations taunt you, saying, ‘Israel is a land that devours its own people and robs them of their children!’ '
  '14':
  - type: text
    content: 'But you will never again devour your people or rob them of their children, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'I will not let you hear those other nations insult you, and you will no longer be mocked by them. You will not be a land that causes its nation to fall, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'Then this further message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '17':
  - type: text
    content: '“Son of man, when the people of Israel were living in their own land, they defiled it by the evil way they lived. To me their conduct was as unclean as a woman’s menstrual cloth. '
  '18':
  - type: text
    content: They polluted the land with murder and the worship of idols,
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 36:25.
  - type: text
    content: ' so I poured out my fury on them. '
  '19':
  - type: text
    content: 'I scattered them to many lands to punish them for the evil way they had lived. '
  '2':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Your enemies have taunted you, saying, ‘Aha! Now the ancient heights belong to us!’ '
  '20':
  - type: text
    content: 'But when they were scattered among the nations, they brought shame on my holy name. For the nations said, ‘These are the people of the '
  - type: text
    content: Lord
  - type: text
    content: ', but he couldn’t keep them safe in his own land!’ '
  '21':
  - type: text
    content: Then I was concerned for my holy name, on which my people brought shame among the nations.
  '22':
  - type: text
    content: '“Therefore, give the people of Israel this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': I am bringing you back, but not because you deserve it. I am doing it to protect my holy name, on which you brought shame while you were scattered among the nations. '
  '23':
  - type: text
    content: 'I will show how holy my great name is—the name on which you brought shame among the nations. And when I reveal my holiness through you before their very eyes, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', then the nations will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: For I will gather you up from all the nations and bring you home again to your land.
  '25':
  - type: text
    content: '“Then I will sprinkle clean water on you, and you will be clean. Your filth will be washed away, and you will no longer worship idols. '
  '26':
  - type: text
    content: And I will give you a new heart, and I will put a new spirit in you. I will take out your stony, stubborn heart and give you a tender, responsive heart.
  - type: note
    content: Hebrew a heart of flesh.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And I will put my Spirit in you so that you will follow my decrees and be careful to obey my regulations.
  '28':
  - type: text
    content: '“And you will live in Israel, the land I gave your ancestors long ago. You will be my people, and I will be your God. '
  '29':
  - type: text
    content: 'I will cleanse you of your filthy behavior. I will give you good crops of grain, and I will send no more famines on the land. '
  '3':
  - type: text
    content: 'Therefore, son of man, give the mountains of Israel this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': Your enemies have attacked you from all directions, making you the property of many nations and the object of much mocking and slander. '
  '30':
  - type: text
    content: 'I will give you great harvests from your fruit trees and fields, and never again will the surrounding nations be able to scoff at your land for its famines. '
  '31':
  - type: text
    content: 'Then you will remember your past sins and despise yourselves for all the detestable things you did. '
  '32':
  - type: text
    content: 'But remember, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I am not doing this because you deserve it. O my people of Israel, you should be utterly ashamed of all you have done!'
  '33':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: When I cleanse you from your sins, I will repopulate your cities, and the ruins will be rebuilt. '
  '34':
  - type: text
    content: 'The fields that used to lie empty and desolate in plain view of everyone will again be farmed. '
  '35':
  - type: text
    content: 'And when I bring you back, people will say, ‘This former wasteland is now like the Garden of Eden! The abandoned and ruined cities now have strong walls and are filled with people!’ '
  '36':
  - type: text
    content: 'Then the surrounding nations that survive will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have rebuilt the ruins and replanted the wasteland. For I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken, and I will do what I say.'
  '37':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am ready to hear Israel’s prayers and to increase their numbers like a flock. '
  '38':
  - type: text
    content: 'They will be as numerous as the sacred flocks that fill Jerusalem’s streets at the time of her festivals. The ruined cities will be crowded with people once more, and everyone will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'Therefore, O mountains of Israel, hear the word of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. He speaks to the hills and mountains, ravines and valleys, and to ruined wastes and long-deserted cities that have been destroyed and mocked by the surrounding nations. '
  '5':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: My jealous anger burns against these nations, especially Edom, because they have shown utter contempt for me by gleefully taking my land for themselves as plunder.'
  '6':
  - type: text
    content: '“Therefore, prophesy to the hills and mountains, the ravines and valleys of Israel. This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am furious that you have suffered shame before the surrounding nations. '
  '7':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I have taken a solemn oath that those nations will soon have their own shame to endure.'
  '8':
  - type: text
    content: '“But the mountains of Israel will produce heavy crops of fruit for my people—for they will be coming home again soon! '
  '9':
  - type: text
    content: 'See, I care about you, and I will pay attention to you. Your ground will be plowed and your crops planted. '
