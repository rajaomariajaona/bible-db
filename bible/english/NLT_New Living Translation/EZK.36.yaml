document_id: EZK.36,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration for Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Son of man, prophesy to Israel’s mountains. Give them this message: O mountains of Israel, hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will greatly increase the population of Israel, and the ruined cities will be rebuilt and filled with people. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will increase not only the people, but also your animals. O mountains of Israel, I will bring people to live on you once again. I will make you even more prosperous than you were before. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will cause my people to walk on you once again, and you will be their territory. You will never again rob them of their children.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: The other nations taunt you, saying, ‘Israel is a land that devours its own people and robs them of their children!’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you will never again devour your people or rob them of their children, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will not let you hear those other nations insult you, and you will no longer be mocked by them. You will not be a land that causes its nation to fall, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then this further message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, when the people of Israel were living in their own land, they defiled it by the evil way they lived. To me their conduct was as unclean as a woman’s menstrual cloth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They polluted the land with murder and the worship of idols,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung; also in 36:25.
      marker-yv: yv-n
    - type: text
      text: ' so I poured out my fury on them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I scattered them to many lands to punish them for the evil way they had lived. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Your enemies have taunted you, saying, ‘Aha! Now the ancient heights belong to us!’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they were scattered among the nations, they brought shame on my holy name. For the nations said, ‘These are the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but he couldn’t keep them safe in his own land!’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I was concerned for my holy name, on which my people brought shame among the nations.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, give the people of Israel this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': I am bringing you back, but not because you deserve it. I am doing it to protect my holy name, on which you brought shame while you were scattered among the nations. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will show how holy my great name is—the name on which you brought shame among the nations. And when I reveal my holiness through you before their very eyes, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', then the nations will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I will gather you up from all the nations and bring you home again to your land.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then I will sprinkle clean water on you, and you will be clean. Your filth will be washed away, and you will no longer worship idols. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will give you a new heart, and I will put a new spirit in you. I will take out your stony, stubborn heart and give you a tender, responsive heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a heart of flesh.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will put my Spirit in you so that you will follow my decrees and be careful to obey my regulations.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you will live in Israel, the land I gave your ancestors long ago. You will be my people, and I will be your God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will cleanse you of your filthy behavior. I will give you good crops of grain, and I will send no more famines on the land. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, son of man, give the mountains of Israel this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': Your enemies have attacked you from all directions, making you the property of many nations and the object of much mocking and slander. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give you great harvests from your fruit trees and fields, and never again will the surrounding nations be able to scoff at your land for its famines. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will remember your past sins and despise yourselves for all the detestable things you did. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But remember, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I am not doing this because you deserve it. O my people of Israel, you should be utterly ashamed of all you have done!'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: When I cleanse you from your sins, I will repopulate your cities, and the ruins will be rebuilt. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fields that used to lie empty and desolate in plain view of everyone will again be farmed. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I bring you back, people will say, ‘This former wasteland is now like the Garden of Eden! The abandoned and ruined cities now have strong walls and are filled with people!’ '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the surrounding nations that survive will know that I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have rebuilt the ruins and replanted the wasteland. For I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken, and I will do what I say.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am ready to hear Israel’s prayers and to increase their numbers like a flock. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will be as numerous as the sacred flocks that fill Jerusalem’s streets at the time of her festivals. The ruined cities will be crowded with people once more, and everyone will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, O mountains of Israel, hear the word of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He speaks to the hills and mountains, ravines and valleys, and to ruined wastes and long-deserted cities that have been destroyed and mocked by the surrounding nations. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: My jealous anger burns against these nations, especially Edom, because they have shown utter contempt for me by gleefully taking my land for themselves as plunder.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, prophesy to the hills and mountains, the ravines and valleys of Israel. This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am furious that you have suffered shame before the surrounding nations. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I have taken a solemn oath that those nations will soon have their own shame to endure.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But the mountains of Israel will produce heavy crops of fruit for my people—for they will be coming home again soon! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, I care about you, and I will pay attention to you. Your ground will be plowed and your crops planted. '
