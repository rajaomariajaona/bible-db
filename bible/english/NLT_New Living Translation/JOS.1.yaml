document_id: JOS.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Charge to Joshua
  - type: text
    content: 'After the death of Moses the '
  - type: text
    content: Lord
  - type: text
    content: '’s servant, the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Joshua son of Nun, Moses’ assistant. He said, '
  '10':
  - type: text
    content: 'Joshua then commanded the officers of Israel, '
  '11':
  - type: text
    content: '“Go through the camp and tell the people to get their provisions ready. In three days you will cross the Jordan River and take possession of the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.”'
  '12':
  - type: text
    content: 'Then Joshua called together the tribes of Reuben, Gad, and the half-tribe of Manasseh. He told them, '
  '13':
  - type: text
    content: '“Remember what Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', commanded you: ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you a place of rest. He has given you this land.’ '
  '14':
  - type: text
    content: 'Your wives, children, and livestock may remain here in the land Moses assigned to you on the east side of the Jordan River. But your strong warriors, fully armed, must lead the other tribes across the Jordan to help them conquer their territory. Stay with them '
  '15':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' gives them rest, as he has given you rest, and until they, too, possess the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving them. Only then may you return and settle here on the east side of the Jordan River in the land that Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', assigned to you.”'
  '16':
  - type: text
    content: 'They answered Joshua, “We will do whatever you command us, and we will go wherever you send us. '
  '17':
  - type: text
    content: 'We will obey you just as we obeyed Moses. And may the '
  - type: text
    content: Lord
  - type: text
    content: ' your God be with you as he was with Moses. '
  '18':
  - type: text
    content: Anyone who rebels against your orders and does not obey your words and everything you command will be put to death. So be strong and courageous!”
  '2':
  - type: text
    content: '“Moses my servant is dead. Therefore, the time has come for you to lead these people, the Israelites, across the Jordan River into the land I am giving them. '
  '3':
  - type: text
    content: 'I promise you what I promised Moses: ‘Wherever you set foot, you will be on land I have given you— '
  '4':
  - type: text
    content: from the Negev wilderness in the south to the Lebanon mountains in the north, from the Euphrates River in the east to the Mediterranean Sea
  - type: note
    content: Hebrew the Great Sea.
  - type: text
    content: ' in the west, including all the land of the Hittites.’ '
  '5':
  - type: text
    content: No one will be able to stand against you as long as you live. For I will be with you as I was with Moses. I will not fail you or abandon you.
  '6':
  - type: text
    content: '“Be strong and courageous, for you are the one who will lead these people to possess all the land I swore to their ancestors I would give them. '
  '7':
  - type: text
    content: 'Be strong and very courageous. Be careful to obey all the instructions Moses gave you. Do not deviate from them, turning either to the right or to the left. Then you will be successful in everything you do. '
  '8':
  - type: text
    content: 'Study this Book of Instruction continually. Meditate on it day and night so you will be sure to obey everything written in it. Only then will you prosper and succeed in all you do. '
  '9':
  - type: text
    content: 'This is my command—be strong and courageous! Do not be afraid or discouraged. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is with you wherever you go.”'
  - type: heading
    content: Joshua’s Charge to the Israelites
