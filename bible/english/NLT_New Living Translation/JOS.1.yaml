document_id: JOS.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Charge to Joshua
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After the death of Moses the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s servant, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Joshua son of Nun, Moses’ assistant. He said, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joshua then commanded the officers of Israel, '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Go through the camp and tell the people to get their provisions ready. In three days you will cross the Jordan River and take possession of the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua called together the tribes of Reuben, Gad, and the half-tribe of Manasseh. He told them, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Remember what Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', commanded you: ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you a place of rest. He has given you this land.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your wives, children, and livestock may remain here in the land Moses assigned to you on the east side of the Jordan River. But your strong warriors, fully armed, must lead the other tribes across the Jordan to help them conquer their territory. Stay with them '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives them rest, as he has given you rest, and until they, too, possess the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving them. Only then may you return and settle here on the east side of the Jordan River in the land that Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', assigned to you.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered Joshua, “We will do whatever you command us, and we will go wherever you send us. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We will obey you just as we obeyed Moses. And may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God be with you as he was with Moses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who rebels against your orders and does not obey your words and everything you command will be put to death. So be strong and courageous!”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Moses my servant is dead. Therefore, the time has come for you to lead these people, the Israelites, across the Jordan River into the land I am giving them. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I promise you what I promised Moses: ‘Wherever you set foot, you will be on land I have given you— '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: from the Negev wilderness in the south to the Lebanon mountains in the north, from the Euphrates River in the east to the Mediterranean Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Great Sea.
      marker-yv: yv-n
    - type: text
      text: ' in the west, including all the land of the Hittites.’ '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: No one will be able to stand against you as long as you live. For I will be with you as I was with Moses. I will not fail you or abandon you.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Be strong and courageous, for you are the one who will lead these people to possess all the land I swore to their ancestors I would give them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong and very courageous. Be careful to obey all the instructions Moses gave you. Do not deviate from them, turning either to the right or to the left. Then you will be successful in everything you do. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Study this Book of Instruction continually. Meditate on it day and night so you will be sure to obey everything written in it. Only then will you prosper and succeed in all you do. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is my command—be strong and courageous! Do not be afraid or discouraged. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is with you wherever you go.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua’s Charge to the Israelites
    marker-yv: yv-h
