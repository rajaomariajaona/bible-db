document_id: LUK.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Many people have set out to write accounts about the events that have been fulfilled among us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They used the eyewitness reports circulating among us from the early disciples.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from those who from the beginning were servants of the word.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Having carefully investigated everything from the beginning, I also have decided to write an accurate account for you, most honorable Theophilus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: so you can be certain of the truth of everything you were taught.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of John the Baptist Foretold
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Herod was king of Judea, there was a Jewish priest named Zechariah. He was a member of the priestly order of Abijah, and his wife, Elizabeth, was also from the priestly line of Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Zechariah and Elizabeth were righteous in God’s eyes, careful to obey all of the Lord’s commandments and regulations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They had no children because Elizabeth was unable to conceive, and they were both very old.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day Zechariah was serving God in the Temple, for his order was on duty that week. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As was the custom of the priests, he was chosen by lot to enter the sanctuary of the Lord and burn incense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: While the incense was being burned, a great crowd stood outside, praying.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'While Zechariah was in the sanctuary, an angel of the Lord appeared to him, standing to the right of the incense altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zechariah was shaken and overwhelmed with fear when he saw him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the angel said, “Don’t be afraid, Zechariah! God has heard your prayer. Your wife, Elizabeth, will give you a son, and you are to name him John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You will have great joy and gladness, and many will rejoice at his birth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: for he will be great in the eyes of the Lord. He must never touch wine or other alcoholic drinks. He will be filled with the Holy Spirit, even before his birth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: even from birth.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he will turn many Israelites to the Lord their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He will be a man with the spirit and power of Elijah. He will prepare the people for the coming of the Lord. He will turn the hearts of the fathers to their children,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Mal 4:5-6.
    marker-yv: yv-n
  - type: text
    text: ' and he will cause those who are rebellious to accept the wisdom of the godly.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zechariah said to the angel, “How can I be sure this will happen? I’m an old man now, and my wife is also well along in years.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the angel said, “I am Gabriel! I stand in the very presence of God. It was he who sent me to bring you this good news! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But now, since you didn’t believe what I said, you will be silent and unable to speak until the child is born. For my words will certainly be fulfilled at the proper time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Meanwhile, the people were waiting for Zechariah to come out of the sanctuary, wondering why he was taking so long. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When he finally did come out, he couldn’t speak to them. Then they realized from his gestures and his silence that he must have seen a vision in the sanctuary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When Zechariah’s week of service in the Temple was over, he returned home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Soon afterward his wife, Elizabeth, became pregnant and went into seclusion for five months. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “How kind the Lord is!” she exclaimed. “He has taken away my disgrace of having no children.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of Jesus Foretold
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to Nazareth, a village in Galilee, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'to a virgin named Mary. She was engaged to be married to a man named Joseph, a descendant of King David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Gabriel appeared to her and said, “Greetings,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:28a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rejoice.
    marker-yv: yv-n
  - type: text
    text: ' favored woman! The Lord is with you!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:28b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Blessed are you among women.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Confused and disturbed, Mary tried to think what the angel could mean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Don’t be afraid, Mary,” the angel told her, “for you have found favor with God! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'You will conceive and give birth to a son, and you will name him Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He will be very great and will be called the Son of the Most High. The Lord God will give him the throne of his ancestor David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: And he will reign over Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: over the house of Jacob.
    marker-yv: yv-n
  - type: text
    text: ' forever; his Kingdom will never end!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mary asked the angel, “But how can this happen? I am a virgin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The angel replied, “The Holy Spirit will come upon you, and the power of the Most High will overshadow you. So the baby to be born will be holy, and he will be called the Son of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'What’s more, your relative Elizabeth has become pregnant in her old age! People used to say she was barren, but she has conceived a son and is now in her sixth month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: For the word of God will never fail.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For nothing is impossible with God.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mary responded, “I am the Lord’s servant. May everything you have said about me come true.” And then the angel left her.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mary Visits Elizabeth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'A few days later Mary hurried to the hill country of Judea, to the town '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'where Zechariah lived. She entered the house and greeted Elizabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: At the sound of Mary’s greeting, Elizabeth’s child leaped within her, and Elizabeth was filled with the Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Elizabeth gave a glad cry and exclaimed to Mary, “God has blessed you above all women, and your child is blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Why am I so honored, that the mother of my Lord should visit me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'When I heard your greeting, the baby in my womb jumped for joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: You are blessed because you believed that the Lord would do what he said.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Magnificat: Mary’s Song of Praise'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mary responded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Oh, how my soul praises the Lord.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: How my spirit rejoices in God my Savior!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: For he took notice of his lowly servant girl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from now on all generations will call me blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: For the Mighty One is holy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he has done great things for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: He shows mercy from generation to generation
- type: usfm
  marker: q2
  children:
  - type: text
    text: to all who fear him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: His mighty arm has done tremendous things!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has scattered the proud and haughty ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: He has brought down princes from their thrones
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exalted the humble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: He has filled the hungry with good things
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sent the rich away with empty hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: He has helped his servant Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and remembered to be merciful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: For he made this promise to our ancestors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to Abraham and his children forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Mary stayed with Elizabeth about three months and then went back to her own home.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of John the Baptist
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'When it was time for Elizabeth’s baby to be born, she gave birth to a son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: And when her neighbors and relatives heard that the Lord had been very merciful to her, everyone rejoiced with her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'When the baby was eight days old, they all came for the circumcision ceremony. They wanted to name him Zechariah, after his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: But Elizabeth said, “No! His name is John!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: '“What?” they exclaimed. “There is no one in all your family by that name.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'So they used gestures to ask the baby’s father what he wanted to name him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'He motioned for a writing tablet, and to everyone’s surprise he wrote, “His name is John.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Instantly Zechariah could speak again, and he began praising God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Awe fell upon the whole neighborhood, and the news of what had happened spread throughout the Judean hills. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Everyone who heard about it reflected on these events and asked, “What will this child turn out to be?” For the hand of the Lord was surely upon him in a special way.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zechariah’s Prophecy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Then his father, Zechariah, was filled with the Holy Spirit and gave this prophecy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: “Praise the Lord, the God of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he has visited and redeemed his people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: He has sent us a mighty Savior
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:69 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: has raised up a horn of salvation for us.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the royal line of his servant David,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: just as he promised
- type: usfm
  marker: q2
  children:
  - type: text
    text: through his holy prophets long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Now we will be saved from our enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from all who hate us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: He has been merciful to our ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: by remembering his sacred covenant—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: the covenant he swore with an oath
- type: usfm
  marker: q2
  children:
  - type: text
    text: to our ancestor Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: We have been rescued from our enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we can serve God without fear,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: in holiness and righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: for as long as we live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: “And you, my little son,
- type: usfm
