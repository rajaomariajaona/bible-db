document_id: LUK.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'Many people have set out to write accounts about the events that have been fulfilled among us. '
  '10':
  - type: text
    content: While the incense was being burned, a great crowd stood outside, praying.
  '11':
  - type: text
    content: 'While Zechariah was in the sanctuary, an angel of the Lord appeared to him, standing to the right of the incense altar. '
  '12':
  - type: text
    content: 'Zechariah was shaken and overwhelmed with fear when he saw him. '
  '13':
  - type: text
    content: 'But the angel said, “Don’t be afraid, Zechariah! God has heard your prayer. Your wife, Elizabeth, will give you a son, and you are to name him John. '
  '14':
  - type: text
    content: 'You will have great joy and gladness, and many will rejoice at his birth, '
  '15':
  - type: text
    content: for he will be great in the eyes of the Lord. He must never touch wine or other alcoholic drinks. He will be filled with the Holy Spirit, even before his birth.
  - type: note
    content: Or even from birth.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he will turn many Israelites to the Lord their God. '
  '17':
  - type: text
    content: He will be a man with the spirit and power of Elijah. He will prepare the people for the coming of the Lord. He will turn the hearts of the fathers to their children,
  - type: note
    content: See Mal 4:5-6.
  - type: text
    content: ' and he will cause those who are rebellious to accept the wisdom of the godly.”'
  '18':
  - type: text
    content: Zechariah said to the angel, “How can I be sure this will happen? I’m an old man now, and my wife is also well along in years.”
  '19':
  - type: text
    content: 'Then the angel said, “I am Gabriel! I stand in the very presence of God. It was he who sent me to bring you this good news! '
  '2':
  - type: text
    content: They used the eyewitness reports circulating among us from the early disciples.
  - type: note
    content: Greek from those who from the beginning were servants of the word.
  - type: text
    content: ' '
  '20':
  - type: text
    content: But now, since you didn’t believe what I said, you will be silent and unable to speak until the child is born. For my words will certainly be fulfilled at the proper time.”
  '21':
  - type: text
    content: 'Meanwhile, the people were waiting for Zechariah to come out of the sanctuary, wondering why he was taking so long. '
  '22':
  - type: text
    content: When he finally did come out, he couldn’t speak to them. Then they realized from his gestures and his silence that he must have seen a vision in the sanctuary.
  '23':
  - type: text
    content: 'When Zechariah’s week of service in the Temple was over, he returned home. '
  '24':
  - type: text
    content: 'Soon afterward his wife, Elizabeth, became pregnant and went into seclusion for five months. '
  '25':
  - type: text
    content: “How kind the Lord is!” she exclaimed. “He has taken away my disgrace of having no children.”
  - type: heading
    content: The Birth of Jesus Foretold
  '26':
  - type: text
    content: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to Nazareth, a village in Galilee, '
  '27':
  - type: text
    content: 'to a virgin named Mary. She was engaged to be married to a man named Joseph, a descendant of King David. '
  '28':
  - type: text
    content: Gabriel appeared to her and said, “Greetings,
  - type: note
    content: Or Rejoice.
  - type: text
    content: ' favored woman! The Lord is with you!'
  - type: note
    content: Some manuscripts add Blessed are you among women.
  - type: text
    content: ”
  '29':
  - type: text
    content: 'Confused and disturbed, Mary tried to think what the angel could mean. '
  '3':
  - type: text
    content: 'Having carefully investigated everything from the beginning, I also have decided to write an accurate account for you, most honorable Theophilus, '
  '30':
  - type: text
    content: '“Don’t be afraid, Mary,” the angel told her, “for you have found favor with God! '
  '31':
  - type: text
    content: 'You will conceive and give birth to a son, and you will name him Jesus. '
  '32':
  - type: text
    content: 'He will be very great and will be called the Son of the Most High. The Lord God will give him the throne of his ancestor David. '
  '33':
  - type: text
    content: And he will reign over Israel
  - type: note
    content: Greek over the house of Jacob.
  - type: text
    content: ' forever; his Kingdom will never end!”'
  '34':
  - type: text
    content: Mary asked the angel, “But how can this happen? I am a virgin.”
  '35':
  - type: text
    content: 'The angel replied, “The Holy Spirit will come upon you, and the power of the Most High will overshadow you. So the baby to be born will be holy, and he will be called the Son of God. '
  '36':
  - type: text
    content: 'What’s more, your relative Elizabeth has become pregnant in her old age! People used to say she was barren, but she has conceived a son and is now in her sixth month. '
  '37':
  - type: text
    content: For the word of God will never fail.
  - type: note
    content: Some manuscripts read For nothing is impossible with God.
  - type: text
    content: ”
  '38':
  - type: text
    content: Mary responded, “I am the Lord’s servant. May everything you have said about me come true.” And then the angel left her.
  - type: heading
    content: Mary Visits Elizabeth
  '39':
  - type: text
    content: 'A few days later Mary hurried to the hill country of Judea, to the town '
  '4':
  - type: text
    content: so you can be certain of the truth of everything you were taught.
  - type: heading
    content: The Birth of John the Baptist Foretold
  '40':
  - type: text
    content: 'where Zechariah lived. She entered the house and greeted Elizabeth. '
  '41':
  - type: text
    content: At the sound of Mary’s greeting, Elizabeth’s child leaped within her, and Elizabeth was filled with the Holy Spirit.
  '42':
  - type: text
    content: 'Elizabeth gave a glad cry and exclaimed to Mary, “God has blessed you above all women, and your child is blessed. '
  '43':
  - type: text
    content: 'Why am I so honored, that the mother of my Lord should visit me? '
  '44':
  - type: text
    content: 'When I heard your greeting, the baby in my womb jumped for joy. '
  '45':
  - type: text
    content: You are blessed because you believed that the Lord would do what he said.”
  - type: heading
    content: 'The Magnificat: Mary’s Song of Praise'
  '46':
  - type: text
    content: Mary responded,
  - type: text
    content: “Oh, how my soul praises the Lord.
  '47':
  - type: text
    content: How my spirit rejoices in God my Savior!
  '48':
  - type: text
    content: For he took notice of his lowly servant girl,
  - type: text
    content: and from now on all generations will call me blessed.
  '49':
  - type: text
    content: For the Mighty One is holy,
  - type: text
    content: and he has done great things for me.
  '5':
  - type: text
    content: 'When Herod was king of Judea, there was a Jewish priest named Zechariah. He was a member of the priestly order of Abijah, and his wife, Elizabeth, was also from the priestly line of Aaron. '
  '50':
  - type: text
    content: He shows mercy from generation to generation
  - type: text
    content: to all who fear him.
  '51':
  - type: text
    content: His mighty arm has done tremendous things!
  - type: text
    content: He has scattered the proud and haughty ones.
  '52':
  - type: text
    content: He has brought down princes from their thrones
  - type: text
    content: and exalted the humble.
  '53':
  - type: text
    content: He has filled the hungry with good things
  - type: text
    content: and sent the rich away with empty hands.
  '54':
  - type: text
    content: He has helped his servant Israel
  - type: text
    content: and remembered to be merciful.
  '55':
  - type: text
    content: For he made this promise to our ancestors,
  - type: text
    content: to Abraham and his children forever.”
  '56':
  - type: text
    content: Mary stayed with Elizabeth about three months and then went back to her own home.
  - type: heading
    content: The Birth of John the Baptist
  '57':
  - type: text
    content: 'When it was time for Elizabeth’s baby to be born, she gave birth to a son. '
  '58':
  - type: text
    content: And when her neighbors and relatives heard that the Lord had been very merciful to her, everyone rejoiced with her.
  '59':
  - type: text
    content: 'When the baby was eight days old, they all came for the circumcision ceremony. They wanted to name him Zechariah, after his father. '
  '6':
  - type: text
    content: 'Zechariah and Elizabeth were righteous in God’s eyes, careful to obey all of the Lord’s commandments and regulations. '
  '60':
  - type: text
    content: But Elizabeth said, “No! His name is John!”
  '61':
  - type: text
    content: '“What?” they exclaimed. “There is no one in all your family by that name.” '
  '62':
  - type: text
    content: 'So they used gestures to ask the baby’s father what he wanted to name him. '
  '63':
  - type: text
    content: 'He motioned for a writing tablet, and to everyone’s surprise he wrote, “His name is John.” '
  '64':
  - type: text
    content: Instantly Zechariah could speak again, and he began praising God.
  '65':
  - type: text
    content: 'Awe fell upon the whole neighborhood, and the news of what had happened spread throughout the Judean hills. '
  '66':
  - type: text
    content: Everyone who heard about it reflected on these events and asked, “What will this child turn out to be?” For the hand of the Lord was surely upon him in a special way.
  - type: heading
    content: Zechariah’s Prophecy
  '67':
  - type: text
    content: 'Then his father, Zechariah, was filled with the Holy Spirit and gave this prophecy:'
  '68':
  - type: text
    content: “Praise the Lord, the God of Israel,
  - type: text
    content: because he has visited and redeemed his people.
  '69':
  - type: text
    content: He has sent us a mighty Savior
  - type: note
    content: Greek has raised up a horn of salvation for us.
  - type: text
    content: from the royal line of his servant David,
  '7':
  - type: text
    content: They had no children because Elizabeth was unable to conceive, and they were both very old.
  '70':
  - type: text
    content: just as he promised
  - type: text
    content: through his holy prophets long ago.
  '71':
  - type: text
    content: Now we will be saved from our enemies
  - type: text
    content: and from all who hate us.
  '72':
  - type: text
    content: He has been merciful to our ancestors
  - type: text
    content: by remembering his sacred covenant—
  '73':
  - type: text
    content: the covenant he swore with an oath
  - type: text
    content: to our ancestor Abraham.
  '74':
  - type: text
    content: We have been rescued from our enemies
  - type: text
    content: so we can serve God without fear,
  '75':
  - type: text
    content: in holiness and righteousness
  - type: text
    content: for as long as we live.
  '76':
  - type: text
    content: “And you, my little son,
  - type: text
    content: will be called the prophet of the Most High,
  - type: text
    content: because you will prepare the way for the Lord.
  '77':
  - type: text
    content: You will tell his people how to find salvation
  - type: text
    content: through forgiveness of their sins.
  '78':
  - type: text
    content: Because of God’s tender mercy,
  - type: text
    content: the morning light from heaven is about to break upon us,
  - type: note
    content: Or the Morning Light from Heaven is about to visit us.
  '79':
  - type: text
    content: to give light to those who sit in darkness and in the shadow of death,
  - type: text
    content: and to guide us to the path of peace.”
  '8':
  - type: text
    content: 'One day Zechariah was serving God in the Temple, for his order was on duty that week. '
  '80':
  - type: text
    content: John grew up and became strong in spirit. And he lived in the wilderness until he began his public ministry to Israel.
  '9':
  - type: text
    content: 'As was the custom of the priests, he was chosen by lot to enter the sanctuary of the Lord and burn incense. '
