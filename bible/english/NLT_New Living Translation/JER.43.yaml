document_id: JER.43,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Taken to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Jeremiah had finished giving this message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God to all the people, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then say to the people of Judah, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, the God of Israel, says: I will certainly bring my servant Nebuchadnezzar,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar.
      marker-yv: yv-n
    - type: text
      text: ' king of Babylon, here to Egypt. I will set his throne over these stones that I have hidden. He will spread his royal canopy over them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he comes, he will destroy the land of Egypt. He will bring death to those destined for death, captivity to those destined for captivity, and war to those destined for war. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will set fire to the temples of Egypt’s gods; he will burn the temples and carry the idols away as plunder. He will pick clean the land of Egypt as a shepherd picks fleas from his cloak. And he himself will leave unharmed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will break down the sacred pillars standing in the temple of the sun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Heliopolis.
      marker-yv: yv-n
    - type: text
      text: ' in Egypt, and he will burn down the temples of Egypt’s gods.’”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Azariah son of Hoshaiah and Johanan son of Kareah and all the other proud men said to Jeremiah, “You lie! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God hasn’t forbidden us to go to Egypt! '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Baruch son of Neriah has convinced you to say this, because he wants us to stay here and be killed by the Babylonians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans.
      marker-yv: yv-n
    - type: text
      text: ' or be carried off into exile.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Johanan and the other military leaders and all the people refused to obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command to stay in Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Johanan and the other leaders took with them all the people who had returned from the nearby countries to which they had fled. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the crowd were men, women, and children, the king’s daughters, and all those whom Nebuzaradan, the captain of the guard, had left with Gedaliah. The prophet Jeremiah and Baruch were also included. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people refused to obey the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and went to Egypt, going as far as the city of Tahpanhes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then at Tahpanhes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave another message to Jeremiah. He said, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“While the people of Judah are watching, take some large rocks and bury them under the pavement stones at the entrance of Pharaoh’s palace here in Tahpanhes. '
