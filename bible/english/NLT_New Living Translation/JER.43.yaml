document_id: JER.43,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Taken to Egypt
  - type: text
    content: 'When Jeremiah had finished giving this message from the '
  - type: text
    content: Lord
  - type: text
    content: ' their God to all the people, '
  '10':
  - type: text
    content: 'Then say to the people of Judah, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: I will certainly bring my servant Nebuchadnezzar,'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' king of Babylon, here to Egypt. I will set his throne over these stones that I have hidden. He will spread his royal canopy over them. '
  '11':
  - type: text
    content: 'And when he comes, he will destroy the land of Egypt. He will bring death to those destined for death, captivity to those destined for captivity, and war to those destined for war. '
  '12':
  - type: text
    content: 'He will set fire to the temples of Egypt’s gods; he will burn the temples and carry the idols away as plunder. He will pick clean the land of Egypt as a shepherd picks fleas from his cloak. And he himself will leave unharmed. '
  '13':
  - type: text
    content: He will break down the sacred pillars standing in the temple of the sun
  - type: note
    content: Or in Heliopolis.
  - type: text
    content: ' in Egypt, and he will burn down the temples of Egypt’s gods.’”'
  '2':
  - type: text
    content: 'Azariah son of Hoshaiah and Johanan son of Kareah and all the other proud men said to Jeremiah, “You lie! The '
  - type: text
    content: Lord
  - type: text
    content: ' our God hasn’t forbidden us to go to Egypt! '
  '3':
  - type: text
    content: Baruch son of Neriah has convinced you to say this, because he wants us to stay here and be killed by the Babylonians
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' or be carried off into exile.”'
  '4':
  - type: text
    content: 'So Johanan and the other military leaders and all the people refused to obey the '
  - type: text
    content: Lord
  - type: text
    content: '’s command to stay in Judah. '
  '5':
  - type: text
    content: 'Johanan and the other leaders took with them all the people who had returned from the nearby countries to which they had fled. '
  '6':
  - type: text
    content: 'In the crowd were men, women, and children, the king’s daughters, and all those whom Nebuzaradan, the captain of the guard, had left with Gedaliah. The prophet Jeremiah and Baruch were also included. '
  '7':
  - type: text
    content: 'The people refused to obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' and went to Egypt, going as far as the city of Tahpanhes.'
  '8':
  - type: text
    content: 'Then at Tahpanhes, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave another message to Jeremiah. He said, '
  '9':
  - type: text
    content: '“While the people of Judah are watching, take some large rocks and bury them under the pavement stones at the entrance of Pharaoh’s palace here in Tahpanhes. '
