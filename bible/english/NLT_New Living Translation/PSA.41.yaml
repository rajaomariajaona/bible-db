document_id: PSA.41
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, the joys of those who are kind to the poor!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rescues them when they are in trouble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' protects them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keeps them alive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gives them prosperity in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rescues them from their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' nurses them when they are sick'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restores them to health.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',” I prayed, “have mercy on me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Heal me, for I have sinned against you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But my enemies say nothing but evil about me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “How soon will he die and be forgotten?” they ask.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They visit me as if they were my friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all the while they gather gossip,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when they leave, they spread it everywhere.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All who hate me whisper about me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: imagining the worst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “He has some fatal disease,” they say.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “He will never get out of that bed!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even my best friend, the one I trusted completely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one who shared my food, has turned against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have mercy on me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make me well again, so I can pay them back!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I know you are pleased with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have not let my enemies triumph over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You have preserved my life because I am innocent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have brought me into your presence forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who lives from everlasting to everlasting.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen and amen!
