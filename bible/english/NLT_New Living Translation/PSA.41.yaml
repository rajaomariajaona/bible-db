document_id: PSA.41,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: Oh, the joys of those who are kind to the poor!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rescues them when they are in trouble.'
  '10':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', have mercy on me.'
  - type: text
    content: Make me well again, so I can pay them back!
  '11':
  - type: text
    content: I know you are pleased with me,
  - type: text
    content: for you have not let my enemies triumph over me.
  '12':
  - type: text
    content: You have preserved my life because I am innocent;
  - type: text
    content: you have brought me into your presence forever.
  '13':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: who lives from everlasting to everlasting.
  - type: text
    content: Amen and amen!
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' protects them'
  - type: text
    content: and keeps them alive.
  - type: text
    content: He gives them prosperity in the land
  - type: text
    content: and rescues them from their enemies.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' nurses them when they are sick'
  - type: text
    content: and restores them to health.
  '4':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ',” I prayed, “have mercy on me.'
  - type: text
    content: Heal me, for I have sinned against you.”
  '5':
  - type: text
    content: But my enemies say nothing but evil about me.
  - type: text
    content: “How soon will he die and be forgotten?” they ask.
  '6':
  - type: text
    content: They visit me as if they were my friends,
  - type: text
    content: but all the while they gather gossip,
  - type: text
    content: and when they leave, they spread it everywhere.
  '7':
  - type: text
    content: All who hate me whisper about me,
  - type: text
    content: imagining the worst.
  '8':
  - type: text
    content: “He has some fatal disease,” they say.
  - type: text
    content: “He will never get out of that bed!”
  '9':
  - type: text
    content: Even my best friend, the one I trusted completely,
  - type: text
    content: the one who shared my food, has turned against me.
