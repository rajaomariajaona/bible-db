document_id: PSA.56,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David, regarding the time the Philistines seized him in Gath. To be sung to the tune “Dove on Distant Oaks.”'
  - type: text
    content: O God, have mercy on me,
  - type: text
    content: for people are hounding me.
  - type: text
    content: My foes attack me all day long.
  '10':
  - type: text
    content: I praise God for what he has promised;
  - type: text
    content: 'yes, I praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for what he has promised.'
  '11':
  - type: text
    content: I trust in God, so why should I be afraid?
  - type: text
    content: What can mere mortals do to me?
  '12':
  - type: text
    content: I will fulfill my vows to you, O God,
  - type: text
    content: and will offer a sacrifice of thanks for your help.
  '13':
  - type: text
    content: For you have rescued me from death;
  - type: text
    content: you have kept my feet from slipping.
  - type: text
    content: So now I can walk in your presence, O God,
  - type: text
    content: in your life-giving light.
  '2':
  - type: text
    content: I am constantly hounded by those who slander me,
  - type: text
    content: and many are boldly attacking me.
  '3':
  - type: text
    content: But when I am afraid,
  - type: text
    content: I will put my trust in you.
  '4':
  - type: text
    content: I praise God for what he has promised.
  - type: text
    content: I trust in God, so why should I be afraid?
  - type: text
    content: What can mere mortals do to me?
  '5':
  - type: text
    content: They are always twisting what I say;
  - type: text
    content: they spend their days plotting to harm me.
  '6':
  - type: text
    content: They come together to spy on me—
  - type: text
    content: watching my every step, eager to kill me.
  '7':
  - type: text
    content: Don’t let them get away with their wickedness;
  - type: text
    content: in your anger, O God, bring them down.
  '8':
  - type: text
    content: You keep track of all my sorrows.
  - type: note
    content: Or my wanderings.
  - type: text
    content: You have collected all my tears in your bottle.
  - type: text
    content: You have recorded each one in your book.
  '9':
  - type: text
    content: My enemies will retreat when I call to you for help.
  - type: text
    content: 'This I know: God is on my side!'
