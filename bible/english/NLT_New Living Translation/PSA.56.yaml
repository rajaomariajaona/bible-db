document_id: PSA.56
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'miktam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David, regarding the time the Philistines seized him in Gath. To be sung to the tune “Dove on Distant Oaks.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, have mercy on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for people are hounding me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My foes attack me all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I am constantly hounded by those who slander me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many are boldly attacking me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But when I am afraid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will put my trust in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I praise God for what he has promised.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I trust in God, so why should I be afraid?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What can mere mortals do to me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They are always twisting what I say;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they spend their days plotting to harm me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They come together to spy on me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: watching my every step, eager to kill me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Don’t let them get away with their wickedness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your anger, O God, bring them down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You keep track of all my sorrows.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my wanderings.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have collected all my tears in your bottle.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have recorded each one in your book.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My enemies will retreat when I call to you for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This I know: God is on my side!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I praise God for what he has promised;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yes, I praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for what he has promised.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I trust in God, so why should I be afraid?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What can mere mortals do to me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will fulfill my vows to you, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will offer a sacrifice of thanks for your help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For you have rescued me from death;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have kept my feet from slipping.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So now I can walk in your presence, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your life-giving light.
