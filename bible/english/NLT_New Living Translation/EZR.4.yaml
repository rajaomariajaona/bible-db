document_id: EZR.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Enemies Oppose the Rebuilding
  - type: text
    content: 'The enemies of Judah and Benjamin heard that the exiles were rebuilding a Temple to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '10':
  - type: text
    content: They also sent greetings from the rest of the people whom the great and noble Ashurbanipal
  - type: note
    content: Aramaic Osnappar, another name for Ashurbanipal.
  - type: text
    content: ' had deported and relocated in Samaria and throughout the neighboring lands of the province west of the Euphrates River.'
  - type: note
    content: Aramaic the province beyond the river; also in 4:11, 16, 17, 20.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'This is a copy of their letter:'
  - type: text
    content: “To King Artaxerxes, from your loyal subjects in the province west of the Euphrates River.
  '12':
  - type: text
    content: '“The king should know that the Jews who came here to Jerusalem from Babylon are rebuilding this rebellious and evil city. They have already laid the foundation and will soon finish its walls. '
  '13':
  - type: text
    content: And the king should know that if this city is rebuilt and its walls are completed, it will be much to your disadvantage, for the Jews will then refuse to pay their tribute, customs, and tolls to you.
  '14':
  - type: text
    content: “Since we are your loyal subjects
  - type: note
    content: Aramaic Since we eat the salt of the palace.
  - type: text
    content: ' and do not want to see the king dishonored in this way, we have sent the king this information. '
  '15':
  - type: text
    content: 'We suggest that a search be made in your ancestors’ records, where you will discover what a rebellious city this has been in the past. In fact, it was destroyed because of its long and troublesome history of revolt against the kings and countries who controlled it. '
  '16':
  - type: text
    content: We declare to the king that if this city is rebuilt and its walls are completed, the province west of the Euphrates River will be lost to you.”
  '17':
  - type: text
    content: 'Then King Artaxerxes sent this reply:'
  - type: text
    content: “To Rehum the governor, Shimshai the court secretary, and their colleagues living in Samaria and throughout the province west of the Euphrates River. Greetings.
  '18':
  - type: text
    content: '“The letter you sent has been translated and read to me. '
  '19':
  - type: text
    content: 'I ordered a search of the records and have found that Jerusalem has indeed been a hotbed of insurrection against many kings. In fact, rebellion and revolt are normal there! '
  '2':
  - type: text
    content: So they approached Zerubbabel and the other leaders and said, “Let us build with you, for we worship your God just as you do. We have sacrificed to him ever since King Esarhaddon of Assyria brought us here.”
  '20':
  - type: text
    content: 'Powerful kings have ruled over Jerusalem and the entire province west of the Euphrates River, receiving tribute, customs, and tolls. '
  '21':
  - type: text
    content: 'Therefore, issue orders to have these men stop their work. That city must not be rebuilt except at my express command. '
  '22':
  - type: text
    content: Be diligent, and don’t neglect this matter, for we must not permit the situation to harm the king’s interests.”
  '23':
  - type: text
    content: When this letter from King Artaxerxes was read to Rehum, Shimshai, and their colleagues, they hurried to Jerusalem. Then, with a show of strength, they forced the Jews to stop building.
  - type: heading
    content: The Rebuilding Resumes
  '24':
  - type: text
    content: So the work on the Temple of God in Jerusalem had stopped, and it remained at a standstill until the second year of the reign of King Darius of Persia.
  - type: note
    content: The second year of Darius’s reign was 520 b.c. The narrative started in 4:1-5 is resumed at verse 24.
  '3':
  - type: text
    content: 'But Zerubbabel, Jeshua, and the other leaders of Israel replied, “You may have no part in this work. We alone will build the Temple for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, just as King Cyrus of Persia commanded us.”'
  '4':
  - type: text
    content: 'Then the local residents tried to discourage and frighten the people of Judah to keep them from their work. '
  '5':
  - type: text
    content: They bribed agents to work against them and to frustrate their plans. This went on during the entire reign of King Cyrus of Persia and lasted until King Darius of Persia took the throne.
  - type: note
    content: Darius reigned 521–486 b.c.
  - type: heading
    content: Later Opposition under Xerxes and Artaxerxes
  '6':
  - type: text
    content: Years later when Xerxes
  - type: note
    content: Hebrew Ahasuerus, another name for Xerxes. He reigned 486–465 b.c.
  - type: text
    content: ' began his reign, the enemies of Judah wrote a letter of accusation against the people of Judah and Jerusalem.'
  '7':
  - type: text
    content: Even later, during the reign of King Artaxerxes of Persia,
  - type: note
    content: Artaxerxes reigned 465–424 b.c.
  - type: text
    content: ' the enemies of Judah, led by Bishlam, Mithredath, and Tabeel, sent a letter to Artaxerxes in the Aramaic language, and it was translated for the king.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: The original text of 4:8–6:18 is in Aramaic.
  - type: text
    content: 'Rehum the governor and Shimshai the court secretary wrote the letter, telling King Artaxerxes about the situation in Jerusalem. '
  '9':
  - type: text
    content: 'They greeted the king for all their colleagues—the judges and local leaders, the people of Tarpel, the Persians, the Babylonians, and the people of Erech and Susa (that is, Elam). '
