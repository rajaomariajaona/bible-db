document_id: EZR.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Enemies Oppose the Rebuilding
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The enemies of Judah and Benjamin heard that the exiles were rebuilding a Temple to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So they approached Zerubbabel and the other leaders and said, “Let us build with you, for we worship your God just as you do. We have sacrificed to him ever since King Esarhaddon of Assyria brought us here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Zerubbabel, Jeshua, and the other leaders of Israel replied, “You may have no part in this work. We alone will build the Temple for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, just as King Cyrus of Persia commanded us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the local residents tried to discourage and frighten the people of Judah to keep them from their work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They bribed agents to work against them and to frustrate their plans. This went on during the entire reign of King Cyrus of Persia and lasted until King Darius of Persia took the throne.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Darius reigned 521–486 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Later Opposition under Xerxes and Artaxerxes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Years later when Xerxes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ahasuerus, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'another name for Xerxes. He reigned 486–465 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' began his reign, the enemies of Judah wrote a letter of accusation against the people of Judah and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Even later, during the reign of King Artaxerxes of Persia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Artaxerxes reigned 465–424 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' the enemies of Judah, led by Bishlam, Mithredath, and Tabeel, sent a letter to Artaxerxes in the Aramaic language, and it was translated for the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The original text of 4:8–6:18 is in Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'Rehum the governor and Shimshai the court secretary wrote the letter, telling King Artaxerxes about the situation in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They greeted the king for all their colleagues—the judges and local leaders, the people of Tarpel, the Persians, the Babylonians, and the people of Erech and Susa (that is, Elam). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They also sent greetings from the rest of the people whom the great and noble Ashurbanipal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Osnappar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Ashurbanipal.
    marker-yv: yv-n
  - type: text
    text: ' had deported and relocated in Samaria and throughout the neighboring lands of the province west of the Euphrates River.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the province beyond the river; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 4:11, 16, 17, 20.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is a copy of their letter:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “To King Artaxerxes, from your loyal subjects in the province west of the Euphrates River.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“The king should know that the Jews who came here to Jerusalem from Babylon are rebuilding this rebellious and evil city. They have already laid the foundation and will soon finish its walls. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And the king should know that if this city is rebuilt and its walls are completed, it will be much to your disadvantage, for the Jews will then refuse to pay their tribute, customs, and tolls to you.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Since we are your loyal subjects
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Since we eat the salt of the palace.
    marker-yv: yv-n
  - type: text
    text: ' and do not want to see the king dishonored in this way, we have sent the king this information. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'We suggest that a search be made in your ancestors’ records, where you will discover what a rebellious city this has been in the past. In fact, it was destroyed because of its long and troublesome history of revolt against the kings and countries who controlled it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: We declare to the king that if this city is rebuilt and its walls are completed, the province west of the Euphrates River will be lost to you.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then King Artaxerxes sent this reply:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “To Rehum the governor, Shimshai the court secretary, and their colleagues living in Samaria and throughout the province west of the Euphrates River. Greetings.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“The letter you sent has been translated and read to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I ordered a search of the records and have found that Jerusalem has indeed been a hotbed of insurrection against many kings. In fact, rebellion and revolt are normal there! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Powerful kings have ruled over Jerusalem and the entire province west of the Euphrates River, receiving tribute, customs, and tolls. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore, issue orders to have these men stop their work. That city must not be rebuilt except at my express command. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Be diligent, and don’t neglect this matter, for we must not permit the situation to harm the king’s interests.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When this letter from King Artaxerxes was read to Rehum, Shimshai, and their colleagues, they hurried to Jerusalem. Then, with a show of strength, they forced the Jews to stop building.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rebuilding Resumes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So the work on the Temple of God in Jerusalem had stopped, and it remained at a standstill until the second year of the reign of King Darius of Persia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The second year of Darius’s reign was 520 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ' The narrative started in 4:1-5 is resumed at verse 24.'
    marker-yv: yv-n
