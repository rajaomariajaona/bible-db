document_id: ISA.65
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment and Final Salvation
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I was ready to respond, but no one asked for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was ready to be found, but no one was looking for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, ‘Here I am, here I am!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a nation that did not call on my name.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to a nation that did not bear my name.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: All day long I opened my arms to a rebellious people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:1-2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I was found by people who were not looking for me. / I showed myself to those who were not asking for me. / All day long I opened my arms to them, / but they were disobedient and rebellious. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 10:20-21.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: But they follow their own evil paths
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their own crooked schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All day long they insult me to my face
- type: usfm
  marker: q2
  children:
  - type: text
    text: by worshiping idols in their sacred gardens.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They burn incense on pagan altars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: At night they go out among the graves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: worshiping the dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They eat the flesh of pigs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make stews with other forbidden foods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yet they say to each other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Don’t come too close or you will defile me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am holier than you!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: These people are a stench in my nostrils,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an acrid smell that never goes away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Look, my decree is written out
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'their sins are written out; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: it stands written.
    marker-yv: yv-n
  - type: text
    text: ' in front of me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not stand silent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will repay them in full!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, I will repay them—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: both for their own sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for those of their ancestors,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For they also burned incense on the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and insulted me on the hills.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pay them back in full!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But I will not destroy them all,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For just as good grapes are found among a cluster of bad ones
- type: usfm
  marker: q2
  children:
  - type: text
    text: (and someone will say, ‘Don’t throw them all away—
- type: usfm
  marker: q2
  children:
  - type: text
    text: some of those grapes are good!’),
- type: usfm
  marker: q1
  children:
  - type: text
    text: so I will not destroy all Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I still have true servants there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will preserve a remnant of the people of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'remnant of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of Judah to possess my land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those I choose will inherit it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my servants will live there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The plain of Sharon will again be filled with flocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my people who have searched for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the valley of Achor will be a place to pasture herds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“But because the rest of you have forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have forgotten his Temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and because you have prepared feasts to honor the god of Fate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have offered mixed wine to the god of Destiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: now I will ‘destine’ you for the sword.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All of you will bow down before the executioner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I called, you did not answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I spoke, you did not listen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You deliberately sinned—before my very eyes—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and chose to do what you know I despise.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My servants will eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will starve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My servants will drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will be thirsty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My servants will rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will be sad and ashamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My servants will sing for joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will cry in sorrow and despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Your name will be a curse word among my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will destroy you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will call his true servants by another name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All who invoke a blessing or take an oath
- type: usfm
  marker: q2
  children:
  - type: text
    text: will do so by the God of truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will put aside my anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and forget the evil of earlier days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Look! I am creating new heavens and a new earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will even think about the old ones anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Be glad; rejoice forever in my creation!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And look! I will create Jerusalem as a place of happiness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her people will be a source of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will rejoice over Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delight in my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the sound of weeping and crying
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be heard in it no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “No longer will babies die when only a few days old.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No longer will adults die before they have lived a full life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No longer will people be considered old at one hundred!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only the cursed will die that young!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: In those days people will live in the houses they build
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eat the fruit of their own vineyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Unlike the past, invaders will not take their houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and confiscate their vineyards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my people will live as long as trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my chosen ones will have time to enjoy their hard-won gains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They will not work in vain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their children will not be doomed to misfortune.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For they are people blessed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their children, too, will be blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will answer them before they even call to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: While they are still talking about their needs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will go ahead and answer their prayers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The wolf and the lamb will feed together.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The lion will eat hay like a cow.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the snakes will eat dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In those days no one will be hurt or destroyed on my holy mountain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
