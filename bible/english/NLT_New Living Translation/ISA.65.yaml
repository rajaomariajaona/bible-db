document_id: ISA.65,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment and Final Salvation
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “I was ready to respond, but no one asked for help.
  - type: text
    content: I was ready to be found, but no one was looking for me.
  - type: text
    content: I said, ‘Here I am, here I am!’
  - type: text
    content: to a nation that did not call on my name.
  - type: note
    content: Or to a nation that did not bear my name.
  '10':
  - type: text
    content: The plain of Sharon will again be filled with flocks
  - type: text
    content: for my people who have searched for me,
  - type: text
    content: and the valley of Achor will be a place to pasture herds.
  '11':
  - type: text
    content: '“But because the rest of you have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: and have forgotten his Temple,
  - type: text
    content: and because you have prepared feasts to honor the god of Fate
  - type: text
    content: and have offered mixed wine to the god of Destiny,
  '12':
  - type: text
    content: now I will ‘destine’ you for the sword.
  - type: text
    content: All of you will bow down before the executioner.
  - type: text
    content: For when I called, you did not answer.
  - type: text
    content: When I spoke, you did not listen.
  - type: text
    content: You deliberately sinned—before my very eyes—
  - type: text
    content: and chose to do what you know I despise.”
  '13':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “My servants will eat,
  - type: text
    content: but you will starve.
  - type: text
    content: My servants will drink,
  - type: text
    content: but you will be thirsty.
  - type: text
    content: My servants will rejoice,
  - type: text
    content: but you will be sad and ashamed.
  '14':
  - type: text
    content: My servants will sing for joy,
  - type: text
    content: but you will cry in sorrow and despair.
  '15':
  - type: text
    content: Your name will be a curse word among my people,
  - type: text
    content: 'for the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy you'
  - type: text
    content: and will call his true servants by another name.
  '16':
  - type: text
    content: All who invoke a blessing or take an oath
  - type: text
    content: will do so by the God of truth.
  - type: text
    content: For I will put aside my anger
  - type: text
    content: and forget the evil of earlier days.
  '17':
  - type: text
    content: “Look! I am creating new heavens and a new earth,
  - type: text
    content: and no one will even think about the old ones anymore.
  '18':
  - type: text
    content: Be glad; rejoice forever in my creation!
  - type: text
    content: And look! I will create Jerusalem as a place of happiness.
  - type: text
    content: Her people will be a source of joy.
  '19':
  - type: text
    content: I will rejoice over Jerusalem
  - type: text
    content: and delight in my people.
  - type: text
    content: And the sound of weeping and crying
  - type: text
    content: will be heard in it no more.
  '2':
  - type: text
    content: All day long I opened my arms to a rebellious people.
  - type: note
    content: Greek version reads I was found by people who were not looking for me. / I showed myself to those who were not asking for me. / All day long I opened my arms to them, / but they were disobedient and rebellious. Compare Rom 10:20-21.
  - type: text
    content: But they follow their own evil paths
  - type: text
    content: and their own crooked schemes.
  '20':
  - type: text
    content: “No longer will babies die when only a few days old.
  - type: text
    content: No longer will adults die before they have lived a full life.
  - type: text
    content: No longer will people be considered old at one hundred!
  - type: text
    content: Only the cursed will die that young!
  '21':
  - type: text
    content: In those days people will live in the houses they build
  - type: text
    content: and eat the fruit of their own vineyards.
  '22':
  - type: text
    content: Unlike the past, invaders will not take their houses
  - type: text
    content: and confiscate their vineyards.
  - type: text
    content: For my people will live as long as trees,
  - type: text
    content: and my chosen ones will have time to enjoy their hard-won gains.
  '23':
  - type: text
    content: They will not work in vain,
  - type: text
    content: and their children will not be doomed to misfortune.
  - type: text
    content: 'For they are people blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and their children, too, will be blessed.
  '24':
  - type: text
    content: I will answer them before they even call to me.
  - type: text
    content: While they are still talking about their needs,
  - type: text
    content: I will go ahead and answer their prayers!
  '25':
  - type: text
    content: The wolf and the lamb will feed together.
  - type: text
    content: The lion will eat hay like a cow.
  - type: text
    content: But the snakes will eat dust.
  - type: text
    content: In those days no one will be hurt or destroyed on my holy mountain.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: All day long they insult me to my face
  - type: text
    content: by worshiping idols in their sacred gardens.
  - type: text
    content: They burn incense on pagan altars.
  '4':
  - type: text
    content: At night they go out among the graves,
  - type: text
    content: worshiping the dead.
  - type: text
    content: They eat the flesh of pigs
  - type: text
    content: and make stews with other forbidden foods.
  '5':
  - type: text
    content: Yet they say to each other,
  - type: text
    content: ‘Don’t come too close or you will defile me!
  - type: text
    content: I am holier than you!’
  - type: text
    content: These people are a stench in my nostrils,
  - type: text
    content: an acrid smell that never goes away.
  '6':
  - type: text
    content: “Look, my decree is written out
  - type: note
    content: Or their sins are written out; Hebrew reads it stands written.
  - type: text
    content: ' in front of me:'
  - type: text
    content: I will not stand silent;
  - type: text
    content: I will repay them in full!
  - type: text
    content: Yes, I will repay them—
  '7':
  - type: text
    content: both for their own sins
  - type: text
    content: and for those of their ancestors,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For they also burned incense on the mountains
  - type: text
    content: and insulted me on the hills.
  - type: text
    content: I will pay them back in full!
  '8':
  - type: text
    content: “But I will not destroy them all,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For just as good grapes are found among a cluster of bad ones
  - type: text
    content: (and someone will say, ‘Don’t throw them all away—
  - type: text
    content: some of those grapes are good!’),
  - type: text
    content: so I will not destroy all Israel.
  - type: text
    content: For I still have true servants there.
  '9':
  - type: text
    content: I will preserve a remnant of the people of Israel
  - type: note
    content: Hebrew remnant of Jacob. See note on 14:1.
  - type: text
    content: and of Judah to possess my land.
  - type: text
    content: Those I choose will inherit it,
  - type: text
    content: and my servants will live there.
