document_id: JHN.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Lame Man
  - type: text
    content: 'Afterward Jesus returned to Jerusalem for one of the Jewish holy days. '
  '10':
  - type: text
    content: so the Jewish leaders objected. They said to the man who was cured, “You can’t work on the Sabbath! The law doesn’t allow you to carry that sleeping mat!”
  '11':
  - type: text
    content: But he replied, “The man who healed me told me, ‘Pick up your mat and walk.’”
  '12':
  - type: text
    content: “Who said such a thing as that?” they demanded.
  '13':
  - type: text
    content: 'The man didn’t know, for Jesus had disappeared into the crowd. '
  '14':
  - type: text
    content: 'But afterward Jesus found him in the Temple and told him, '
  - type: text
    content: “Now you are well; so stop sinning, or something even worse may happen to you.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: Then the man went and told the Jewish leaders that it was Jesus who had healed him.
  - type: heading
    content: Jesus Claims to Be the Son of God
  '16':
  - type: text
    content: So the Jewish leaders began harassing
  - type: note
    content: Or persecuting.
  - type: text
    content: ' Jesus for breaking the Sabbath rules. '
  '17':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “My Father is always working, and so am I.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: So the Jewish leaders tried all the harder to find a way to kill him. For he not only broke the Sabbath, he called God his Father, thereby making himself equal with God.
  '19':
  - type: text
    content: 'So Jesus explained, '
  - type: text
    content: “I tell you the truth, the Son can do nothing by himself. He does only what he sees the Father doing. Whatever the Father does, the Son also does.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Inside the city, near the Sheep Gate, was the pool of Bethesda,
  - type: note
    content: Other manuscripts read Beth-zatha; still others read Bethsaida.
  - type: text
    content: ' with five covered porches. '
  '20':
  - type: text
    content: For the Father loves the Son and shows him everything he is doing. In fact, the Father will show him how to do even greater works than healing this man. Then you will truly be astonished.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For just as the Father gives life to those he raises from the dead, so the Son gives life to anyone he wants.
  - type: text
    content: ' '
  '22':
  - type: text
    content: In addition, the Father judges no one. Instead, he has given the Son absolute authority to judge,
  - type: text
    content: ' '
  '23':
  - type: text
    content: so that everyone will honor the Son, just as they honor the Father. Anyone who does not honor the Son is certainly not honoring the Father who sent him.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, those who listen to my message and believe in God who sent me have eternal life. They will never be condemned for their sins, but they have already passed from death into life.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “And I assure you that the time is coming, indeed it’s here now, when the dead will hear my voice—the voice of the Son of God. And those who listen will live.
  - type: text
    content: ' '
  '26':
  - type: text
    content: The Father has life in himself, and he has granted that same life-giving power to his Son.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he has given him authority to judge everyone because he is the Son of Man.
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Don’t be so surprised! Indeed, the time is coming when all the dead in their graves will hear the voice of God’s Son,
  - type: text
    content: ' '
  '29':
  - type: text
    content: and they will rise again. Those who have done good will rise to experience eternal life, and those who have continued in evil will rise to experience judgment.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Crowds of sick people—blind, lame, or paralyzed—lay on the porches.
  - type: note
    content: 'Some manuscripts add an expanded conclusion to verse 3 and all of verse 4: waiting for a certain movement of the water, 4for an angel of the Lord came from time to time and stirred up the water. And the first person to step in after the water was stirred was healed of whatever disease he had.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: I can do nothing on my own. I judge as God tells me. Therefore, my judgment is just, because I carry out the will of the one who sent me, not my own will.
  - type: heading
    content: Witnesses to Jesus
  '31':
  - type: text
    content: ' '
  - type: text
    content: “If I were to testify on my own behalf, my testimony would not be valid.
  - type: text
    content: ' '
  '32':
  - type: text
    content: But someone else is also testifying about me, and I assure you that everything he says about me is true.
  - type: text
    content: ' '
  '33':
  - type: text
    content: In fact, you sent investigators to listen to John the Baptist, and his testimony about me was true.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Of course, I have no need of human witnesses, but I say these things so you might be saved.
  - type: text
    content: ' '
  '35':
  - type: text
    content: John was like a burning and shining lamp, and you were excited for a while about his message.
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I have a greater witness than John—my teachings and my miracles. The Father gave me these works to accomplish, and they prove that he sent me.
  - type: text
    content: ' '
  '37':
  - type: text
    content: And the Father who sent me has testified about me himself. You have never heard his voice or seen him face to face,
  - type: text
    content: ' '
  '38':
  - type: text
    content: and you do not have his message in your hearts, because you do not believe me—the one he sent to you.
  '39':
  - type: text
    content: ' '
  - type: text
    content: “You search the Scriptures because you think they give you eternal life. But the Scriptures point to me!
  - type: text
    content: ' '
  '40':
  - type: text
    content: Yet you refuse to come to me to receive this life.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Your approval means nothing to me,
  - type: text
    content: ' '
  '42':
  - type: text
    content: because I know you don’t have God’s love within you.
  - type: text
    content: ' '
  '43':
  - type: text
    content: For I have come to you in my Father’s name, and you have rejected me. Yet if others come in their own name, you gladly welcome them.
  - type: text
    content: ' '
  '44':
  - type: text
    content: No wonder you can’t believe! For you gladly honor each other, but you don’t care about the honor that comes from the one who alone is God.
  - type: note
    content: Some manuscripts read from the only One.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Yet it isn’t I who will accuse you before the Father. Moses will accuse you! Yes, Moses, in whom you put your hopes.
  - type: text
    content: ' '
  '46':
  - type: text
    content: If you really believed Moses, you would believe me, because he wrote about me.
  - type: text
    content: ' '
  '47':
  - type: text
    content: But since you don’t believe what he wrote, how will you believe what I say?”
  '5':
  - type: text
    content: 'One of the men lying there had been sick for thirty-eight years. '
  '6':
  - type: text
    content: 'When Jesus saw him and knew he had been ill for a long time, he asked him, '
  - type: text
    content: “Would you like to get well?”
  '7':
  - type: text
    content: “I can’t, sir,” the sick man said, “for I have no one to put me into the pool when the water bubbles up. Someone else always gets there ahead of me.”
  '8':
  - type: text
    content: 'Jesus told him, '
  - type: text
    content: “Stand up, pick up your mat, and walk!”
  '9':
  - type: text
    content: 'Instantly, the man was healed! He rolled up his sleeping mat and began walking! But this miracle happened on the Sabbath, '
