document_id: JHN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Lame Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Afterward Jesus returned to Jerusalem for one of the Jewish holy days. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Inside the city, near the Sheep Gate, was the pool of Bethesda,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-zatha; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bethsaida.
    marker-yv: yv-n
  - type: text
    text: ' with five covered porches. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Crowds of sick people—blind, lame, or paralyzed—lay on the porches.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add an expanded conclusion to verse 3 and all of verse 4: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'waiting for a certain movement of the water, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for an angel of the Lord came from time to time and stirred up the water. And the first person to step in after the water was stirred was healed of whatever disease he had.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One of the men lying there had been sick for thirty-eight years. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Jesus saw him and knew he had been ill for a long time, he asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Would you like to get well?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I can’t, sir,” the sick man said, “for I have no one to put me into the pool when the water bubbles up. Someone else always gets there ahead of me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stand up, pick up your mat, and walk!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Instantly, the man was healed! He rolled up his sleeping mat and began walking! But this miracle happened on the Sabbath, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: so the Jewish leaders objected. They said to the man who was cured, “You can’t work on the Sabbath! The law doesn’t allow you to carry that sleeping mat!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But he replied, “The man who healed me told me, ‘Pick up your mat and walk.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Who said such a thing as that?” they demanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The man didn’t know, for Jesus had disappeared into the crowd. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But afterward Jesus found him in the Temple and told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now you are well; so stop sinning, or something even worse may happen to you.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the man went and told the Jewish leaders that it was Jesus who had healed him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Claims to Be the Son of God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So the Jewish leaders began harassing
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: persecuting.
    marker-yv: yv-n
  - type: text
    text: ' Jesus for breaking the Sabbath rules. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father is always working, and so am I.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So the Jewish leaders tried all the harder to find a way to kill him. For he not only broke the Sabbath, he called God his Father, thereby making himself equal with God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Jesus explained, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, the Son can do nothing by himself. He does only what he sees the Father doing. Whatever the Father does, the Son also does.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Father loves the Son and shows him everything he is doing. In fact, the Father will show him how to do even greater works than healing this man. Then you will truly be astonished.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For just as the Father gives life to those he raises from the dead, so the Son gives life to anyone he wants.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In addition, the Father judges no one. Instead, he has given the Son absolute authority to judge,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that everyone will honor the Son, just as they honor the Father. Anyone who does not honor the Son is certainly not honoring the Father who sent him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, those who listen to my message and believe in God who sent me have eternal life. They will never be condemned for their sins, but they have already passed from death into life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And I assure you that the time is coming, indeed it’s here now, when the dead will hear my voice—the voice of the Son of God. And those who listen will live.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Father has life in himself, and he has granted that same life-giving power to his Son.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he has given him authority to judge everyone because he is the Son of Man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t be so surprised! Indeed, the time is coming when all the dead in their graves will hear the voice of God’s Son,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they will rise again. Those who have done good will rise to experience eternal life, and those who have continued in evil will rise to experience judgment.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I can do nothing on my own. I judge as God tells me. Therefore, my judgment is just, because I carry out the will of the one who sent me, not my own will.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Witnesses to Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I were to testify on my own behalf, my testimony would not be valid.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But someone else is also testifying about me, and I assure you that everything he says about me is true.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In fact, you sent investigators to listen to John the Baptist, and his testimony about me was true.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Of course, I have no need of human witnesses, but I say these things so you might be saved.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: John was like a burning and shining lamp, and you were excited for a while about his message.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I have a greater witness than John—my teachings and my miracles. The Father gave me these works to accomplish, and they prove that he sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the Father who sent me has testified about me himself. You have never heard his voice or seen him face to face,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and you do not have his message in your hearts, because you do not believe me—the one he sent to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You search the Scriptures because you think they give you eternal life. But the Scriptures point to me!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet you refuse to come to me to receive this life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your approval means nothing to me,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because I know you don’t have God’s love within you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I have come to you in my Father’s name, and you have rejected me. Yet if others come in their own name, you gladly welcome them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No wonder you can’t believe! For you gladly honor each other, but you don’t care about the honor that comes from the one who alone is God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from the only One.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yet it isn’t I who will accuse you before the Father. Moses will accuse you! Yes, Moses, in whom you put your hopes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you really believed Moses, you would believe me, because he wrote about me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But since you don’t believe what he wrote, how will you believe what I say?”
