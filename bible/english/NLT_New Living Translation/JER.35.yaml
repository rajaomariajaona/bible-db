document_id: JER.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faithful Recabites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the message the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Jeremiah when Jehoiakim son of Josiah was king of Judah: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go to the settlement where the families of the Recabites live, and invite them to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple. Take them into one of the inner rooms, and offer them some wine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So I went to see Jaazaniah son of Jeremiah and grandson of Habazziniah and all his brothers and sons—representing all the Recabite families. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I took them to the Temple, and we went into the room assigned to the sons of Hanan son of Igdaliah, a man of God. This room was located next to the one used by the Temple officials, directly above the room of Maaseiah son of Shallum, the Temple gatekeeper.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I set cups and jugs of wine before them and invited them to have a drink, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but they refused. “No,” they said, “we don’t drink wine, because our ancestor Jehonadab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jonadab, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehonadab; also in 35:10, 19. See 2 Kgs 10:15.
    marker-yv: yv-n
  - type: text
    text: ' son of Recab gave us this command: ‘You and your descendants must never drink wine. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And do not build houses or plant crops or vineyards, but always live in tents. If you follow these commands, you will live long, good lives in the land.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So we have obeyed him in all these things. We have never had a drink of wine to this day, nor have our wives, our sons, or our daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We haven’t built houses or owned vineyards or farms or planted crops. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We have lived in tents and have fully obeyed all the commands of Jehonadab, our ancestor. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But when King Nebuchadnezzar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon attacked this country, we were afraid of the Babylonian and Syrian'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldean and Aramean.
    marker-yv: yv-n
  - type: text
    text: ' armies. So we decided to move to Jerusalem. That is why we are here.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave this message to Jeremiah: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: Go and say to the people in Judah and Jerusalem, ‘Come and learn a lesson about how to obey me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Recabites do not drink wine to this day because their ancestor Jehonadab told them not to. But I have spoken to you again and again, and you refuse to obey me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Time after time I sent you prophets, who told you, “Turn from your wicked ways, and start doing things right. Stop worshiping other gods so that you might live in peace here in the land I have given to you and your ancestors.” But you would not listen to me or obey me. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The descendants of Jehonadab son of Recab have obeyed their ancestor completely, but you have refused to listen to me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies, the God of Israel, says: ‘Because you refuse to listen or answer when I call, I will send upon Judah and Jerusalem all the disasters I have threatened.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jeremiah turned to the Recabites and said, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘You have obeyed your ancestor Jehonadab in every respect, following all his instructions.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘Jehonadab son of Recab will always have descendants who serve me.’”'
