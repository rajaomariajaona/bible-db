document_id: JER.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faithful Recabites
  - type: text
    content: 'This is the message the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Jeremiah when Jehoiakim son of Josiah was king of Judah: '
  '10':
  - type: text
    content: 'We have lived in tents and have fully obeyed all the commands of Jehonadab, our ancestor. '
  '11':
  - type: text
    content: But when King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon attacked this country, we were afraid of the Babylonian and Syrian'
  - type: note
    content: Or Chaldean and Aramean.
  - type: text
    content: ' armies. So we decided to move to Jerusalem. That is why we are here.”'
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Jeremiah: '
  '13':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: Go and say to the people in Judah and Jerusalem, ‘Come and learn a lesson about how to obey me. '
  '14':
  - type: text
    content: 'The Recabites do not drink wine to this day because their ancestor Jehonadab told them not to. But I have spoken to you again and again, and you refuse to obey me. '
  '15':
  - type: text
    content: 'Time after time I sent you prophets, who told you, “Turn from your wicked ways, and start doing things right. Stop worshiping other gods so that you might live in peace here in the land I have given to you and your ancestors.” But you would not listen to me or obey me. '
  '16':
  - type: text
    content: The descendants of Jehonadab son of Recab have obeyed their ancestor completely, but you have refused to listen to me.’
  '17':
  - type: text
    content: '“Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies, the God of Israel, says: ‘Because you refuse to listen or answer when I call, I will send upon Judah and Jerusalem all the disasters I have threatened.’”'
  '18':
  - type: text
    content: 'Then Jeremiah turned to the Recabites and said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘You have obeyed your ancestor Jehonadab in every respect, following all his instructions.’ '
  '19':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘Jehonadab son of Recab will always have descendants who serve me.’”'
  '2':
  - type: text
    content: '“Go to the settlement where the families of the Recabites live, and invite them to the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple. Take them into one of the inner rooms, and offer them some wine.”
  '3':
  - type: text
    content: 'So I went to see Jaazaniah son of Jeremiah and grandson of Habazziniah and all his brothers and sons—representing all the Recabite families. '
  '4':
  - type: text
    content: I took them to the Temple, and we went into the room assigned to the sons of Hanan son of Igdaliah, a man of God. This room was located next to the one used by the Temple officials, directly above the room of Maaseiah son of Shallum, the Temple gatekeeper.
  '5':
  - type: text
    content: 'I set cups and jugs of wine before them and invited them to have a drink, '
  '6':
  - type: text
    content: but they refused. “No,” they said, “we don’t drink wine, because our ancestor Jehonadab
  - type: note
    content: Hebrew Jonadab, a variant spelling of Jehonadab; also in 35:10, 19. See 2 Kgs 10:15.
  - type: text
    content: ' son of Recab gave us this command: ‘You and your descendants must never drink wine. '
  '7':
  - type: text
    content: 'And do not build houses or plant crops or vineyards, but always live in tents. If you follow these commands, you will live long, good lives in the land.’ '
  '8':
  - type: text
    content: 'So we have obeyed him in all these things. We have never had a drink of wine to this day, nor have our wives, our sons, or our daughters. '
  '9':
  - type: text
    content: 'We haven’t built houses or owned vineyards or farms or planted crops. '
