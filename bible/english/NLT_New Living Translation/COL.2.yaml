document_id: COL.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I want you to know how much I have agonized for you and for the church at Laodicea, and for many other believers who have never met me personally. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So you also are complete through your union with Christ, who is the head over every ruler and authority.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you came to Christ, you were “circumcised,” but not by a physical procedure. Christ performed a spiritual circumcision—the cutting away of your sinful nature.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the cutting away of the body of the flesh.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For you were buried with Christ when you were baptized. And with him you were raised to new life because you trusted the mighty power of God, who raised Christ from the dead.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You were dead because of your sins and because your sinful nature was not yet cut away. Then God made you alive with Christ, for he forgave all our sins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He canceled the record of the charges against us and took it away by nailing it to the cross. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In this way, he disarmed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he stripped off.
      marker-yv: yv-n
    - type: text
      text: ' the spiritual rulers and authorities. He shamed them publicly by his victory over them on the cross.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t let anyone condemn you for what you eat or drink, or for not celebrating certain holy days or new moon ceremonies or Sabbaths. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these rules are only shadows of the reality yet to come. And Christ himself is that reality. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let anyone condemn you by insisting on pious self-denial or the worship of angels,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: or worshiping with angels.
      marker-yv: yv-n
    - type: text
      text: ' saying they have had visions about these things. Their sinful minds have made them proud, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they are not connected to Christ, the head of the body. For he holds the whole body together with its joints and ligaments, and it grows as God nourishes it.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I want them to be encouraged and knit together by strong ties of love. I want them to have complete confidence that they understand God’s mysterious plan, which is Christ himself. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have died with Christ, and he has set you free from the spiritual powers of this world. So why do you keep on following the rules of the world, such as, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Don’t handle! Don’t taste! Don’t touch!”? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such rules are mere human teachings about things that deteriorate as we use them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These rules may seem wise because they require strong devotion, pious self-denial, and severe bodily discipline. But they provide no help in conquering a person’s evil desires.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In him lie hidden all the treasures of wisdom and knowledge.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am telling you this so no one will deceive you with well-crafted arguments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For though I am far away from you, my heart is with you. And I rejoice that you are living as you should and that your faith in Christ is strong.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freedom from Rules and New Life in Christ
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And now, just as you accepted Christ Jesus as your Lord, you must continue to follow him. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Let your roots grow down into him, and let your lives be built on him. Then your faith will grow strong in the truth you were taught, and you will overflow with thankfulness.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let anyone capture you with empty philosophies and high-sounding nonsense that come from human thinking and from the spiritual powers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the spiritual principles; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:20.
      marker-yv: yv-n
    - type: text
      text: ' of this world, rather than from Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For in Christ lives all the fullness of God in a human body.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in him dwells all the completeness of the Godhead bodily.
      marker-yv: yv-n
    - type: text
      text: ' '
