document_id: EZK.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel’s Call and Commission
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Stand up, son of man,” said the voice. “I want to speak with you.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: which he unrolled. And I saw that both sides were covered with funeral songs, words of sorrow, and pronouncements of doom.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The Spirit came into me as he spoke, and he set me on my feet. I listened carefully to his words. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Son of man,” he said, “I am sending you to the nation of Israel, a rebellious nation that has rebelled against me. They and their ancestors have been rebelling against me to this very day. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They are a stubborn and hard-hearted people. But I am sending you to say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says!’ '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And whether they listen or refuse to listen—for remember, they are rebels—at least they will know they have had a prophet among them.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Son of man, do not fear them or their words. Don’t be afraid even though their threats surround you like nettles and briers and stinging scorpions. Do not be dismayed by their dark scowls, even though they are rebels. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You must give them my messages whether they listen or not. But they won’t listen, for they are completely rebellious! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Son of man, listen to what I say to you. Do not join them in their rebellion. Open your mouth, and eat what I give you.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I looked and saw a hand reaching out to me. It held a scroll, '
