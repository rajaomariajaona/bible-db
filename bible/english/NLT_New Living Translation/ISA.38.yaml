document_id: ISA.38,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Sickness and Recovery
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'About that time Hezekiah became deathly ill, and the prophet Isaiah son of Amoz went to visit him. He gave the king this message: “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘Set your affairs in order, for you are going to die. You will not recover from this illness.’”'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I said, “In the prime of my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: must I now enter the place of the dead?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enter the gates of Sheol?
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Am I to be robbed of the rest of my years?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I said, “Never again will I see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while still in the land of the living.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will I see my friends
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be with those who live in this world.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: My life has been blown away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a shepherd’s tent in a storm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has been cut short,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as when a weaver cuts cloth from a loom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Suddenly, my life was over.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I waited patiently all night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I was torn apart as though by lions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Suddenly, my life was over.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Delirious, I chattered like a swallow or a crane,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then I moaned like a mourning dove.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes grew tired of looking to heaven for help.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am in trouble, Lord. Help me!”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But what could I say?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he himself sent this sickness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I will walk humbly throughout my years
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of this anguish I have felt.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lord, your discipline is good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it leads to life and health.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You restore my health
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and allow me to live!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Yes, this anguish was good for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you have rescued me from death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forgiven all my sins.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For the dead
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheol.
      marker-yv: yv-n
    - type: text
      text: ' cannot praise you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cannot raise their voices in praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who go down to the grave
  - type: usfm
    marker: q2
    children:
    - type: text
      text: can no longer hope in your faithfulness.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Only the living can praise you as I do today.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Each generation tells of your faithfulness to the next.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When Hezekiah heard this, he turned his face to the wall and prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Think of it—the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is ready to heal me!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing his praises with instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every day of my life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Isaiah had said to Hezekiah’s servants, “Make an ointment from figs and spread it over the boil, and Hezekiah will recover.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Hezekiah had asked, “What sign will prove that I will go to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Remember, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how I have always been faithful to you and have served you single-mindedly, always doing what pleases you.” Then he broke down and wept bitterly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then this message came to Isaiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Go back to Hezekiah and tell him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestor David, says: I have heard your prayer and seen your tears. I will add fifteen years to your life, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and I will rescue you and this city from the king of Assyria. Yes, I will defend this city.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“‘And this is the sign from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to prove that he will do as he promised: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will cause the sun’s shadow to move ten steps backward on the sundial
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the steps.
      marker-yv: yv-n
    - type: text
      text: ' of Ahaz!’” So the shadow on the sundial moved backward ten steps.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Poem of Praise
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When King Hezekiah was well again, he wrote this poem:'
