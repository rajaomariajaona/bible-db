document_id: ISA.38,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Sickness and Recovery
  - type: text
    content: 'About that time Hezekiah became deathly ill, and the prophet Isaiah son of Amoz went to visit him. He gave the king this message: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Set your affairs in order, for you are going to die. You will not recover from this illness.’”'
  '10':
  - type: text
    content: I said, “In the prime of my life,
  - type: text
    content: must I now enter the place of the dead?
  - type: note
    content: Hebrew enter the gates of Sheol?
  - type: text
    content: Am I to be robbed of the rest of my years?”
  '11':
  - type: text
    content: 'I said, “Never again will I see the '
  - type: text
    content: Lord God
  - type: text
    content: while still in the land of the living.
  - type: text
    content: Never again will I see my friends
  - type: text
    content: or be with those who live in this world.
  '12':
  - type: text
    content: My life has been blown away
  - type: text
    content: like a shepherd’s tent in a storm.
  - type: text
    content: It has been cut short,
  - type: text
    content: as when a weaver cuts cloth from a loom.
  - type: text
    content: Suddenly, my life was over.
  '13':
  - type: text
    content: I waited patiently all night,
  - type: text
    content: but I was torn apart as though by lions.
  - type: text
    content: Suddenly, my life was over.
  '14':
  - type: text
    content: Delirious, I chattered like a swallow or a crane,
  - type: text
    content: and then I moaned like a mourning dove.
  - type: text
    content: My eyes grew tired of looking to heaven for help.
  - type: text
    content: I am in trouble, Lord. Help me!”
  '15':
  - type: text
    content: But what could I say?
  - type: text
    content: For he himself sent this sickness.
  - type: text
    content: Now I will walk humbly throughout my years
  - type: text
    content: because of this anguish I have felt.
  '16':
  - type: text
    content: Lord, your discipline is good,
  - type: text
    content: for it leads to life and health.
  - type: text
    content: You restore my health
  - type: text
    content: and allow me to live!
  '17':
  - type: text
    content: Yes, this anguish was good for me,
  - type: text
    content: for you have rescued me from death
  - type: text
    content: and forgiven all my sins.
  '18':
  - type: text
    content: For the dead
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' cannot praise you;'
  - type: text
    content: they cannot raise their voices in praise.
  - type: text
    content: Those who go down to the grave
  - type: text
    content: can no longer hope in your faithfulness.
  '19':
  - type: text
    content: Only the living can praise you as I do today.
  - type: text
    content: Each generation tells of your faithfulness to the next.
  '2':
  - type: text
    content: 'When Hezekiah heard this, he turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'Think of it—the '
  - type: text
    content: Lord
  - type: text
    content: ' is ready to heal me!'
  - type: text
    content: I will sing his praises with instruments
  - type: text
    content: every day of my life
  - type: text
    content: 'in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: Isaiah had said to Hezekiah’s servants, “Make an ointment from figs and spread it over the boil, and Hezekiah will recover.”
  '22':
  - type: text
    content: 'And Hezekiah had asked, “What sign will prove that I will go to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '3':
  - type: text
    content: '“Remember, O '
  - type: text
    content: Lord
  - type: text
    content: ', how I have always been faithful to you and have served you single-mindedly, always doing what pleases you.” Then he broke down and wept bitterly.'
  '4':
  - type: text
    content: 'Then this message came to Isaiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '5':
  - type: text
    content: '“Go back to Hezekiah and tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestor David, says: I have heard your prayer and seen your tears. I will add fifteen years to your life, '
  '6':
  - type: text
    content: and I will rescue you and this city from the king of Assyria. Yes, I will defend this city.
  '7':
  - type: text
    content: '“‘And this is the sign from the '
  - type: text
    content: Lord
  - type: text
    content: ' to prove that he will do as he promised: '
  '8':
  - type: text
    content: I will cause the sun’s shadow to move ten steps backward on the sundial
  - type: note
    content: Hebrew the steps.
  - type: text
    content: ' of Ahaz!’” So the shadow on the sundial moved backward ten steps.'
  - type: heading
    content: Hezekiah’s Poem of Praise
  '9':
  - type: text
    content: 'When King Hezekiah was well again, he wrote this poem:'
