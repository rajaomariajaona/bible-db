document_id: MRK.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: This is the Good News about Jesus the Messiah, the Son of God.
  - type: note
    content: Some manuscripts do not include the Son of God.
  - type: text
    content: ' It began '
  '10':
  - type: text
    content: As Jesus came up out of the water, he saw the heavens splitting apart and the Holy Spirit descending on him
  - type: note
    content: Or toward him, or into him.
  - type: text
    content: ' like a dove. '
  '11':
  - type: text
    content: And a voice from heaven said, “You are my dearly loved Son, and you bring me great joy.”
  '12':
  - type: text
    content: 'The Spirit then compelled Jesus to go into the wilderness, '
  '13':
  - type: text
    content: where he was tempted by Satan for forty days. He was out among the wild animals, and angels took care of him.
  '14':
  - type: text
    content: Later on, after John was arrested, Jesus went into Galilee, where he preached God’s Good News.
  - type: note
    content: Some manuscripts read the Good News of the Kingdom of God.
  - type: text
    content: ' '
  '15':
  - type: text
    content: '“The time promised by God has come at last!” '
  - type: text
    content: 'he announced. '
  - type: text
    content: “The Kingdom of God is near! Repent of your sins and believe the Good News!”
  - type: heading
    content: The First Disciples
  '16':
  - type: text
    content: One day as Jesus was walking along the shore of the Sea of Galilee, he saw Simon
  - type: note
    content: Simon is called “Peter” in 3:16 and thereafter.
  - type: text
    content: ' and his brother Andrew throwing a net into the water, for they fished for a living. '
  '17':
  - type: text
    content: 'Jesus called out to them, '
  - type: text
    content: “Come, follow me, and I will show you how to fish for people!”
  - type: text
    content: ' '
  '18':
  - type: text
    content: And they left their nets at once and followed him.
  '19':
  - type: text
    content: 'A little farther up the shore Jesus saw Zebedee’s sons, James and John, in a boat repairing their nets. '
  '2':
  - type: text
    content: 'just as the prophet Isaiah had written:'
  - type: text
    content: “Look, I am sending my messenger ahead of you,
  - type: text
    content: and he will prepare your way.
  - type: note
    content: Mal 3:1.
  '20':
  - type: text
    content: He called them at once, and they also followed him, leaving their father, Zebedee, in the boat with the hired men.
  - type: heading
    content: Jesus Casts Out an Evil Spirit
  '21':
  - type: text
    content: 'Jesus and his companions went to the town of Capernaum. When the Sabbath day came, he went into the synagogue and began to teach. '
  '22':
  - type: text
    content: The people were amazed at his teaching, for he taught with real authority—quite unlike the teachers of religious law.
  '23':
  - type: text
    content: Suddenly, a man in the synagogue who was possessed by an evil
  - type: note
    content: Greek unclean; also in 1:26, 27.
  - type: text
    content: ' spirit cried out, '
  '24':
  - type: text
    content: “Why are you interfering with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '25':
  - type: text
    content: 'But Jesus reprimanded him. '
  - type: text
    content: '“Be quiet! Come out of the man,” '
  - type: text
    content: 'he ordered. '
  '26':
  - type: text
    content: At that, the evil spirit screamed, threw the man into a convulsion, and then came out of him.
  '27':
  - type: text
    content: 'Amazement gripped the audience, and they began to discuss what had happened. “What sort of new teaching is this?” they asked excitedly. “It has such authority! Even evil spirits obey his orders!” '
  '28':
  - type: text
    content: The news about Jesus spread quickly throughout the entire region of Galilee.
  - type: heading
    content: Jesus Heals Many People
  '29':
  - type: text
    content: 'After Jesus left the synagogue with James and John, they went to Simon and Andrew’s home. '
  '3':
  - type: text
    content: He is a voice shouting in the wilderness,
  - type: text
    content: '‘Prepare the way for the '
  - type: text
    content: Lord
  - type: text
    content: ’s coming!
  - type: text
    content: Clear the road for him!’
  - type: note
    content: Isa 40:3 (Greek version).
  - type: text
    content: ”
  '30':
  - type: text
    content: 'Now Simon’s mother-in-law was sick in bed with a high fever. They told Jesus about her right away. '
  '31':
  - type: text
    content: So he went to her bedside, took her by the hand, and helped her sit up. Then the fever left her, and she prepared a meal for them.
  '32':
  - type: text
    content: 'That evening after sunset, many sick and demon-possessed people were brought to Jesus. '
  '33':
  - type: text
    content: 'The whole town gathered at the door to watch. '
  '34':
  - type: text
    content: So Jesus healed many people who were sick with various diseases, and he cast out many demons. But because the demons knew who he was, he did not allow them to speak.
  - type: heading
    content: Jesus Preaches in Galilee
  '35':
  - type: text
    content: 'Before daybreak the next morning, Jesus got up and went out to an isolated place to pray. '
  '36':
  - type: text
    content: 'Later Simon and the others went out to find him. '
  '37':
  - type: text
    content: When they found him, they said, “Everyone is looking for you.”
  '38':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “We must go on to other towns as well, and I will preach to them, too. That is why I came.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: So he traveled throughout the region of Galilee, preaching in the synagogues and casting out demons.
  - type: heading
    content: Jesus Heals a Man with Leprosy
  '4':
  - type: text
    content: 'This messenger was John the Baptist. He was in the wilderness and preached that people should be baptized to show that they had repented of their sins and turned to God to be forgiven. '
  '40':
  - type: text
    content: A man with leprosy came and knelt in front of Jesus, begging to be healed. “If you are willing, you can heal me and make me clean,” he said.
  '41':
  - type: text
    content: Moved with compassion,
  - type: note
    content: Some manuscripts read Moved with anger.
  - type: text
    content: ' Jesus reached out and touched him. '
  - type: text
    content: '“I am willing,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Be healed!”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Instantly the leprosy disappeared, and the man was healed. '
  '43':
  - type: text
    content: 'Then Jesus sent him on his way with a stern warning: '
  '44':
  - type: text
    content: “Don’t tell anyone about this. Instead, go to the priest and let him examine you. Take along the offering required in the law of Moses for those who have been healed of leprosy.
  - type: note
    content: See Lev 14:2-32.
  - type: text
    content: ' '
  - type: text
    content: This will be a public testimony that you have been cleansed.”
  '45':
  - type: text
    content: But the man went and spread the word, proclaiming to everyone what had happened. As a result, large crowds soon surrounded Jesus, and he couldn’t publicly enter a town anywhere. He had to stay out in the secluded places, but people from everywhere kept coming to him.
  '5':
  - type: text
    content: 'All of Judea, including all the people of Jerusalem, went out to see and hear John. And when they confessed their sins, he baptized them in the Jordan River. '
  '6':
  - type: text
    content: His clothes were woven from coarse camel hair, and he wore a leather belt around his waist. For food he ate locusts and wild honey.
  '7':
  - type: text
    content: 'John announced: “Someone is coming soon who is greater than I am—so much greater that I’m not even worthy to stoop down like a slave and untie the straps of his sandals. '
  '8':
  - type: text
    content: I baptize you with
  - type: note
    content: Or in; also in 1:8b.
  - type: text
    content: ' water, but he will baptize you with the Holy Spirit!”'
  - type: heading
    content: The Baptism and Temptation of Jesus
  '9':
  - type: text
    content: 'One day Jesus came from Nazareth in Galilee, and John baptized him in the Jordan River. '
