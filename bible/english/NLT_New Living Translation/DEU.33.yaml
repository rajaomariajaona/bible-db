document_id: DEU.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Blesses the People
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the blessing that Moses, the man of God, gave to the people of Israel before his death:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came from Mount Sinai'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dawned upon us
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: upon them.
    marker-yv: yv-n
  - type: text
    text: ' from Mount Seir;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he shone forth from Mount Paran
- type: usfm
  marker: q2
  children:
  - type: text
    text: and came from Meribah-kadesh
- type: usfm
  marker: q2
  children:
  - type: text
    text: with flaming fire at his right hand.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'came from myriads of holy ones, from the south, from his mountain slopes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indeed, he loves his people;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Indeed, lover of the peoples.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: all his holy ones are in his hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They follow in his steps
- type: usfm
  marker: q2
  children:
  - type: text
    text: and accept his teaching.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moses gave us the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the special possession of the people of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' became king in Israel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Jeshurun, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a term of endearment for Israel.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the leaders of the people assembled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the tribes of Israel gathered as one.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moses said this about the tribe of Reuben:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Moses said this about the tribe of Reuben.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let the tribe of Reuben live and not die out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though they are few in number.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moses said this about the tribe of Judah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', hear the cry of Judah'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring them together as a people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give them strength to defend their cause;
- type: usfm
  marker: q2
  children:
  - type: text
    text: help them against their enemies!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moses said this about the tribe of Levi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have given your Thummim and Urim—the sacred lots—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to your faithful servants the Levites.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Levites.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put them to the test at Massah
- type: usfm
  marker: q2
  children:
  - type: text
    text: and struggled with them at the waters of Meribah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Levites obeyed your word
- type: usfm
  marker: q2
  children:
  - type: text
    text: and guarded your covenant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were more loyal to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to their own parents.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They ignored their relatives
- type: usfm
  marker: q2
  children:
  - type: text
    text: and did not acknowledge their own children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They teach your regulations to Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they give your instructions to Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They present incense before you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and offer whole burnt offerings on the altar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Bless the ministry of the Levites, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and accept all the work of their hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hit their enemies where it hurts the most;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strike down their foes so they never rise again.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moses said this about the tribe of Benjamin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The people of Benjamin are loved by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and live in safety beside him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He surrounds them continuously
- type: usfm
  marker: q2
  children:
  - type: text
    text: and preserves them from every harm.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moses said this about the tribes of Joseph:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“May their land be blessed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the precious gift of dew from the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water from beneath the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: with the rich fruit that grows in the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rich harvest produced each month;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: with the finest crops of the ancient mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the abundance from the everlasting hills;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: with the best gifts of the earth and its bounty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the favor of the one who appeared in the burning bush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May these blessings rest on Joseph’s head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crowning the brow of the prince among his brothers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Joseph has the majesty of a young bull;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has the horns of a wild ox.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will gore distant nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is my blessing for the multitudes of Ephraim
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the thousands of Manasseh.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moses said this about the tribes of Zebulun and Issachar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and Issachar.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May the people of Zebulun prosper in their travels.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May the people of Issachar prosper at home in their tents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They summon the people to the mountain
- type: usfm
  marker: q2
  children:
  - type: text
    text: to offer proper sacrifices there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They benefit from the riches of the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hidden treasures in the sand.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moses said this about the tribe of Gad:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed is the one who enlarges Gad’s territory!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gad is poised there like a lion
- type: usfm
  marker: q2
  children:
  - type: text
    text: to tear off an arm or a head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The people of Gad took the best land for themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a leader’s share was assigned to them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the leaders of the people were assembled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they carried out the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and obeyed his regulations for Israel.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moses said this about the tribe of Dan:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Dan is a lion’s cub,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaping out from Bashan.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moses said this about the tribe of Naphtali:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “O Naphtali, you are rich in favor
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and full of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s blessings;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may you possess the west and the south.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moses said this about the tribe of Asher:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May Asher be blessed above other sons;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may he be esteemed by his brothers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may he bathe his feet in olive oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: May the bolts of your gates be of iron and bronze;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may you be secure all your days.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “There is no one like the God of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jeshurun, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a term of endearment for Israel.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: He rides across the heavens to help you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: across the skies in majestic splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The eternal God is your refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his everlasting arms are under you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He drives out the enemy before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he cries out, ‘Destroy them!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So Israel will live in safety,
- type: usfm
  marker: q2
  children:
  - type: text
    text: prosperous Jacob in security,
- type: usfm
  marker: q1
  children:
  - type: text
    text: in a land of grain and new wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the heavens drop down dew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: How blessed you are, O Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who else is like you, a people saved by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
