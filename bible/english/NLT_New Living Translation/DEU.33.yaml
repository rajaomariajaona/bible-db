document_id: DEU.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Blesses the People
  - type: text
    content: 'This is the blessing that Moses, the man of God, gave to the people of Israel before his death:'
  '10':
  - type: text
    content: They teach your regulations to Jacob;
  - type: text
    content: they give your instructions to Israel.
  - type: text
    content: They present incense before you
  - type: text
    content: and offer whole burnt offerings on the altar.
  '11':
  - type: text
    content: 'Bless the ministry of the Levites, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and accept all the work of their hands.
  - type: text
    content: Hit their enemies where it hurts the most;
  - type: text
    content: strike down their foes so they never rise again.”
  '12':
  - type: text
    content: 'Moses said this about the tribe of Benjamin:'
  - type: text
    content: '“The people of Benjamin are loved by the '
  - type: text
    content: Lord
  - type: text
    content: and live in safety beside him.
  - type: text
    content: He surrounds them continuously
  - type: text
    content: and preserves them from every harm.”
  '13':
  - type: text
    content: 'Moses said this about the tribes of Joseph:'
  - type: text
    content: '“May their land be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: with the precious gift of dew from the heavens
  - type: text
    content: and water from beneath the earth;
  '14':
  - type: text
    content: with the rich fruit that grows in the sun,
  - type: text
    content: and the rich harvest produced each month;
  '15':
  - type: text
    content: with the finest crops of the ancient mountains,
  - type: text
    content: and the abundance from the everlasting hills;
  '16':
  - type: text
    content: with the best gifts of the earth and its bounty,
  - type: text
    content: and the favor of the one who appeared in the burning bush.
  - type: text
    content: May these blessings rest on Joseph’s head,
  - type: text
    content: crowning the brow of the prince among his brothers.
  '17':
  - type: text
    content: Joseph has the majesty of a young bull;
  - type: text
    content: he has the horns of a wild ox.
  - type: text
    content: He will gore distant nations,
  - type: text
    content: even to the ends of the earth.
  - type: text
    content: This is my blessing for the multitudes of Ephraim
  - type: text
    content: and the thousands of Manasseh.”
  '18':
  - type: text
    content: Moses said this about the tribes of Zebulun and Issachar
  - type: note
    content: Hebrew lacks and Issachar.
  - type: text
    content: ':'
  - type: text
    content: “May the people of Zebulun prosper in their travels.
  - type: text
    content: May the people of Issachar prosper at home in their tents.
  '19':
  - type: text
    content: They summon the people to the mountain
  - type: text
    content: to offer proper sacrifices there.
  - type: text
    content: They benefit from the riches of the sea
  - type: text
    content: and the hidden treasures in the sand.”
  '2':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' came from Mount Sinai'
  - type: text
    content: and dawned upon us
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads upon them.
  - type: text
    content: ' from Mount Seir;'
  - type: text
    content: he shone forth from Mount Paran
  - type: text
    content: and came from Meribah-kadesh
  - type: text
    content: with flaming fire at his right hand.
  - type: note
    content: Or came from myriads of holy ones, from the south, from his mountain slopes. The meaning of the Hebrew is uncertain.
  '20':
  - type: text
    content: 'Moses said this about the tribe of Gad:'
  - type: text
    content: “Blessed is the one who enlarges Gad’s territory!
  - type: text
    content: Gad is poised there like a lion
  - type: text
    content: to tear off an arm or a head.
  '21':
  - type: text
    content: The people of Gad took the best land for themselves;
  - type: text
    content: a leader’s share was assigned to them.
  - type: text
    content: When the leaders of the people were assembled,
  - type: text
    content: 'they carried out the '
  - type: text
    content: Lord
  - type: text
    content: ’s justice
  - type: text
    content: and obeyed his regulations for Israel.”
  '22':
  - type: text
    content: 'Moses said this about the tribe of Dan:'
  - type: text
    content: “Dan is a lion’s cub,
  - type: text
    content: leaping out from Bashan.”
  '23':
  - type: text
    content: 'Moses said this about the tribe of Naphtali:'
  - type: text
    content: “O Naphtali, you are rich in favor
  - type: text
    content: 'and full of the '
  - type: text
    content: Lord
  - type: text
    content: ’s blessings;
  - type: text
    content: may you possess the west and the south.”
  '24':
  - type: text
    content: 'Moses said this about the tribe of Asher:'
  - type: text
    content: “May Asher be blessed above other sons;
  - type: text
    content: may he be esteemed by his brothers;
  - type: text
    content: may he bathe his feet in olive oil.
  '25':
  - type: text
    content: May the bolts of your gates be of iron and bronze;
  - type: text
    content: may you be secure all your days.”
  '26':
  - type: text
    content: “There is no one like the God of Israel.
  - type: note
    content: Hebrew of Jeshurun, a term of endearment for Israel.
  - type: text
    content: He rides across the heavens to help you,
  - type: text
    content: across the skies in majestic splendor.
  '27':
  - type: text
    content: The eternal God is your refuge,
  - type: text
    content: and his everlasting arms are under you.
  - type: text
    content: He drives out the enemy before you;
  - type: text
    content: he cries out, ‘Destroy them!’
  '28':
  - type: text
    content: So Israel will live in safety,
  - type: text
    content: prosperous Jacob in security,
  - type: text
    content: in a land of grain and new wine,
  - type: text
    content: while the heavens drop down dew.
  '29':
  - type: text
    content: How blessed you are, O Israel!
  - type: text
    content: 'Who else is like you, a people saved by the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: He is your protecting shield
  - type: text
    content: and your triumphant sword!
  - type: text
    content: Your enemies will cringe before you,
  - type: text
    content: and you will stomp on their backs!”
  '3':
  - type: text
    content: Indeed, he loves his people;
  - type: note
    content: As in Greek version; Hebrew reads Indeed, lover of the peoples.
  - type: text
    content: all his holy ones are in his hands.
  - type: text
    content: They follow in his steps
  - type: text
    content: and accept his teaching.
  '4':
  - type: text
    content: 'Moses gave us the '
  - type: text
    content: Lord
  - type: text
    content: ’s instruction,
  - type: text
    content: the special possession of the people of Israel.
  - type: note
    content: Hebrew of Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' became king in Israel'
  - type: note
    content: Hebrew in Jeshurun, a term of endearment for Israel.
  - type: text
    content: —
  - type: text
    content: when the leaders of the people assembled,
  - type: text
    content: when the tribes of Israel gathered as one.”
  '6':
  - type: text
    content: 'Moses said this about the tribe of Reuben:'
  - type: note
    content: Hebrew lacks Moses said this about the tribe of Reuben.
  - type: text
    content: “Let the tribe of Reuben live and not die out,
  - type: text
    content: though they are few in number.”
  '7':
  - type: text
    content: 'Moses said this about the tribe of Judah:'
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', hear the cry of Judah'
  - type: text
    content: and bring them together as a people.
  - type: text
    content: Give them strength to defend their cause;
  - type: text
    content: help them against their enemies!”
  '8':
  - type: text
    content: 'Moses said this about the tribe of Levi:'
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', you have given your Thummim and Urim—the sacred lots—'
  - type: text
    content: to your faithful servants the Levites.
  - type: note
    content: As in Greek version; Hebrew lacks the Levites.
  - type: text
    content: You put them to the test at Massah
  - type: text
    content: and struggled with them at the waters of Meribah.
  '9':
  - type: text
    content: The Levites obeyed your word
  - type: text
    content: and guarded your covenant.
  - type: text
    content: They were more loyal to you
  - type: text
    content: than to their own parents.
  - type: text
    content: They ignored their relatives
  - type: text
    content: and did not acknowledge their own children.
