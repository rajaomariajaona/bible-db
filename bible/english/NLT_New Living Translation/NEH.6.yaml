document_id: NEH.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Continued Opposition to Rebuilding
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies found out that I had finished rebuilding the wall and that no gaps remained—though we had not yet set up the doors in the gates. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later I went to visit Shemaiah son of Delaiah and grandson of Mehetabel, who was confined to his home. He said, “Let us meet together inside the Temple of God and bolt the doors shut. Your enemies are coming to kill you tonight.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I replied, “Should someone in my position run from danger? Should someone in my position enter the Temple to save his life? No, I won’t do it!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I realized that God had not spoken to him, but that he had uttered this prophecy against me because Tobiah and Sanballat had hired him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were hoping to intimidate me and make me sin. Then they would be able to accuse and discredit me.
  '14':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: Remember, O my God, all the evil things that Tobiah and Sanballat have done. And remember Noadiah the prophet and all the prophets like her who have tried to intimidate me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Builders Complete the Wall
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So on October 2
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the twenty-fifth day of the month Elul, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was October 2, 445 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 1:1.
      marker-yv: yv-n
    - type: text
      text: ' the wall was finished—just fifty-two days after we had begun. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When our enemies and the surrounding nations heard about it, they were frightened and humiliated. They realized this work had been done with the help of our God.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During those fifty-two days, many letters went back and forth between Tobiah and the nobles of Judah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For many in Judah had sworn allegiance to him because his father-in-law was Shecaniah son of Arah, and his son Jehohanan was married to the daughter of Meshullam son of Berekiah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They kept telling me about Tobiah’s good deeds, and then they told him everything I said. And Tobiah kept sending threatening letters to intimidate me.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Sanballat and Geshem sent a message asking me to meet them at one of the villages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: at Kephirim.
      marker-yv: yv-n
    - type: text
      text: ' in the plain of Ono.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I realized they were plotting to harm me, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so I replied by sending this message to them: “I am engaged in a great work, so I can’t come. Why should I stop working to come and meet with you?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Four times they sent the same message, and each time I gave the same reply. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fifth time, Sanballat’s servant came with an open letter in his hand, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and this is what it said:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: “There is a rumor among the surrounding nations, and Geshem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gashmu, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Geshem.
      marker-yv: yv-n
    - type: text
      text: ' tells me it is true, that you and the Jews are planning to rebel and that is why you are building the wall. According to his reports, you plan to be their king. '
  '7':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: He also reports that you have appointed prophets in Jerusalem to proclaim about you, ‘Look! There is a king in Judah!’
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “You can be very sure that this report will get back to the king, so I suggest that you come and talk it over with me.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I replied, “There is no truth in any part of your story. You are making up the whole thing.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were just trying to intimidate us, imagining that they could discourage us and stop the work. So I continued the work with even greater determination.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But now to strengthen my hands.
      marker-yv: yv-n
