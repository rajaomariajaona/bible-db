document_id: 1CH.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Gatekeepers
  - type: text
    content: 'These are the divisions of the gatekeepers:'
  - type: text
    content: From the Korahites, there was Meshelemiah son of Kore, of the family of Abiasaph.
  - type: note
    content: As in Greek version (see also Exod 6:24); Hebrew reads Asaph.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Hosah, of the Merari clan, appointed Shimri as the leader among his sons, though he was not the oldest. '
  '11':
  - type: text
    content: His other sons included Hilkiah (the second), Tebaliah (the third), and Zechariah (the fourth). Hosah’s sons and relatives, who served as gatekeepers, numbered thirteen in all.
  '12':
  - type: text
    content: 'These divisions of the gatekeepers were named for their family leaders, and like the other Levites, they served at the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: They were assigned by families for guard duty at the various gates, without regard to age or training, for it was all decided by means of sacred lots.
  '14':
  - type: text
    content: The responsibility for the east gate went to Meshelemiah
  - type: note
    content: Hebrew Shelemiah, a variant spelling of Meshelemiah; compare 26:2.
  - type: text
    content: ' and his group. The north gate was assigned to his son Zechariah, a man of unusual wisdom. '
  '15':
  - type: text
    content: 'The south gate went to Obed-edom, and his sons were put in charge of the storehouse. '
  '16':
  - type: text
    content: Shuppim and Hosah were assigned the west gate and the gateway leading up to the Temple.
  - type: note
    content: Or the gate of Shalleketh on the upper road (also in 26:18). The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Guard duties were divided evenly. '
  '17':
  - type: text
    content: 'Six Levites were assigned each day to the east gate, four to the north gate, four to the south gate, and two pairs at the storehouse. '
  '18':
  - type: text
    content: Six were assigned each day to the west gate, four to the gateway leading up to the Temple, and two to the courtyard.
  - type: note
    content: Or the colonnade. The meaning of the Hebrew is uncertain.
  '19':
  - type: text
    content: These were the divisions of the gatekeepers from the clans of Korah and Merari.
  - type: heading
    content: Treasurers and Other Officials
  '2':
  - type: text
    content: 'The sons of Meshelemiah were Zechariah (the oldest), Jediael (the second), Zebadiah (the third), Jathniel (the fourth), '
  '20':
  - type: text
    content: 'Other Levites, led by Ahijah, were in charge of the treasuries of the house of God and the treasuries of the gifts dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: From the family of Libni
  - type: note
    content: Hebrew Ladan, a variant spelling of Libni; compare 6:17.
  - type: text
    content: ' in the clan of Gershon, Jehiel'
  - type: note
    content: Hebrew Jehieli (also in 26:22), a variant spelling of Jehiel; compare 23:8.
  - type: text
    content: ' was the leader. '
  '22':
  - type: text
    content: 'The sons of Jehiel, Zetham and his brother Joel, were in charge of the treasuries of the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: 'These are the leaders that descended from Amram, Izhar, Hebron, and Uzziel:'
  '24':
  - type: text
    content: 'From the clan of Amram, Shebuel was a descendant of Gershom son of Moses. He was the chief officer of the treasuries. '
  '25':
  - type: text
    content: His relatives through Eliezer were Rehabiah, Jeshaiah, Joram, Zicri, and Shelomoth.
  '26':
  - type: text
    content: Shelomoth and his relatives were in charge of the treasuries containing the gifts that King David, the family leaders, and the generals and captains
  - type: note
    content: Hebrew the commanders of thousands and of hundreds.
  - type: text
    content: ' and other officers of the army had dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'These men dedicated some of the plunder they had gained in battle to maintain the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: Shelomoth
  - type: note
    content: Hebrew Shelomith, a variant spelling of Shelomoth.
  - type: text
    content: ' and his relatives also cared for the gifts dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' by Samuel the seer, Saul son of Kish, Abner son of Ner, and Joab son of Zeruiah. All the other dedicated gifts were in their care, too.'
  '29':
  - type: text
    content: From the clan of Izhar came Kenaniah. He and his sons were given administrative responsibilities
  - type: note
    content: Or were given outside work; or were given work away from the Temple area.
  - type: text
    content: ' over Israel as officials and judges.'
  '3':
  - type: text
    content: Elam (the fifth), Jehohanan (the sixth), and Eliehoenai (the seventh).
  '30':
  - type: text
    content: 'From the clan of Hebron came Hashabiah. He and his relatives—1,700 capable men—were put in charge of the Israelite lands west of the Jordan River. They were responsible for all matters related to the things of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the service of the king in that area.'
  '31':
  - type: text
    content: Also from the clan of Hebron came Jeriah,
  - type: note
    content: Hebrew Jerijah, a variant spelling of Jeriah; compare 23:19.
  - type: text
    content: ' who was the leader of the Hebronites according to the genealogical records. (In the fortieth year of David’s reign, a search was made in the records, and capable men from the clan of Hebron were found at Jazer in the land of Gilead.) '
  '32':
  - type: text
    content: There were 2,700 capable men among the relatives of Jeriah. King David sent them to the east side of the Jordan River and put them in charge of the tribes of Reuben and Gad and the half-tribe of Manasseh. They were responsible for all matters related to God and to the king.
  '4':
  - type: text
    content: 'The sons of Obed-edom, also gatekeepers, were Shemaiah (the oldest), Jehozabad (the second), Joah (the third), Sacar (the fourth), Nethanel (the fifth), '
  '5':
  - type: text
    content: Ammiel (the sixth), Issachar (the seventh), and Peullethai (the eighth). God had richly blessed Obed-edom.
  '6':
  - type: text
    content: 'Obed-edom’s son Shemaiah had sons with great ability who earned positions of great authority in the clan. '
  '7':
  - type: text
    content: Their names were Othni, Rephael, Obed, and Elzabad. Their relatives, Elihu and Semakiah, were also very capable men.
  '8':
  - type: text
    content: All of these descendants of Obed-edom, including their sons and grandsons—sixty-two of them in all—were very capable men, well qualified for their work.
  '9':
  - type: text
    content: Meshelemiah’s eighteen sons and relatives were also very capable men.
