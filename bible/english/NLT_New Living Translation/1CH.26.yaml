document_id: 1CH.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Gatekeepers
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are the divisions of the gatekeepers:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the Korahites, there was Meshelemiah son of Kore, of the family of Abiasaph.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also Exod 6:24); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Asaph.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hosah, of the Merari clan, appointed Shimri as the leader among his sons, though he was not the oldest. '
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: His other sons included Hilkiah (the second), Tebaliah (the third), and Zechariah (the fourth). Hosah’s sons and relatives, who served as gatekeepers, numbered thirteen in all.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'These divisions of the gatekeepers were named for their family leaders, and like the other Levites, they served at the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They were assigned by families for guard duty at the various gates, without regard to age or training, for it was all decided by means of sacred lots.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The responsibility for the east gate went to Meshelemiah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shelemiah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Meshelemiah; compare 26:2.
      marker-yv: yv-n
    - type: text
      text: ' and his group. The north gate was assigned to his son Zechariah, a man of unusual wisdom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The south gate went to Obed-edom, and his sons were put in charge of the storehouse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Shuppim and Hosah were assigned the west gate and the gateway leading up to the Temple.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the gate of Shalleketh on the upper road '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also in 26:18). The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' Guard duties were divided evenly. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Six Levites were assigned each day to the east gate, four to the north gate, four to the south gate, and two pairs at the storehouse. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Six were assigned each day to the west gate, four to the gateway leading up to the Temple, and two to the courtyard.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the colonnade. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These were the divisions of the gatekeepers from the clans of Korah and Merari.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Treasurers and Other Officials
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The sons of Meshelemiah were Zechariah (the oldest), Jediael (the second), Zebadiah (the third), Jathniel (the fourth), '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Other Levites, led by Ahijah, were in charge of the treasuries of the house of God and the treasuries of the gifts dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: From the family of Libni
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:21a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ladan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Libni; compare 6:17.
      marker-yv: yv-n
    - type: text
      text: ' in the clan of Gershon, Jehiel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:21b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehieli '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also in 26:22), a variant spelling of Jehiel; compare 23:8.
      marker-yv: yv-n
    - type: text
      text: ' was the leader. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The sons of Jehiel, Zetham and his brother Joel, were in charge of the treasuries of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'These are the leaders that descended from Amram, Izhar, Hebron, and Uzziel:'
  '24':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'From the clan of Amram, Shebuel was a descendant of Gershom son of Moses. He was the chief officer of the treasuries. '
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: His relatives through Eliezer were Rehabiah, Jeshaiah, Joram, Zicri, and Shelomoth.
  '26':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Shelomoth and his relatives were in charge of the treasuries containing the gifts that King David, the family leaders, and the generals and captains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the commanders of thousands and of hundreds.
      marker-yv: yv-n
    - type: text
      text: ' and other officers of the army had dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'These men dedicated some of the plunder they had gained in battle to maintain the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Shelomoth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shelomith, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Shelomoth.
      marker-yv: yv-n
    - type: text
      text: ' and his relatives also cared for the gifts dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by Samuel the seer, Saul son of Kish, Abner son of Ner, and Joab son of Zeruiah. All the other dedicated gifts were in their care, too.'
  '29':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: From the clan of Izhar came Kenaniah. He and his sons were given administrative responsibilities
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'were given outside work; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: were given work away from the Temple area.
      marker-yv: yv-n
    - type: text
      text: ' over Israel as officials and judges.'
  '3':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Elam (the fifth), Jehohanan (the sixth), and Eliehoenai (the seventh).
  '30':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'From the clan of Hebron came Hashabiah. He and his relatives—1,700 capable men—were put in charge of the Israelite lands west of the Jordan River. They were responsible for all matters related to the things of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the service of the king in that area.'
  '31':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Also from the clan of Hebron came Jeriah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jerijah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jeriah; compare 23:19.
      marker-yv: yv-n
    - type: text
      text: ' who was the leader of the Hebronites according to the genealogical records. (In the fortieth year of David’s reign, a search was made in the records, and capable men from the clan of Hebron were found at Jazer in the land of Gilead.) '
  '32':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: There were 2,700 capable men among the relatives of Jeriah. King David sent them to the east side of the Jordan River and put them in charge of the tribes of Reuben and Gad and the half-tribe of Manasseh. They were responsible for all matters related to God and to the king.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The sons of Obed-edom, also gatekeepers, were Shemaiah (the oldest), Jehozabad (the second), Joah (the third), Sacar (the fourth), Nethanel (the fifth), '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ammiel (the sixth), Issachar (the seventh), and Peullethai (the eighth). God had richly blessed Obed-edom.
  '6':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Obed-edom’s son Shemaiah had sons with great ability who earned positions of great authority in the clan. '
  '7':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Their names were Othni, Rephael, Obed, and Elzabad. Their relatives, Elihu and Semakiah, were also very capable men.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: All of these descendants of Obed-edom, including their sons and grandsons—sixty-two of them in all—were very capable men, well qualified for their work.
  '9':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Meshelemiah’s eighteen sons and relatives were also very capable men.
