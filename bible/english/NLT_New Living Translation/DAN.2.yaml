document_id: DAN.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Dream
  - type: text
    content: One night during the second year of his reign,
  - type: note
    content: The second year of Nebuchadnezzar’s reign was 603 b.c.
  - type: text
    content: ' Nebuchadnezzar had such disturbing dreams that he couldn’t sleep. '
  '10':
  - type: text
    content: 'The astrologers replied to the king, “No one on earth can tell the king his dream! And no king, however great and powerful, has ever asked such a thing of any magician, enchanter, or astrologer! '
  '11':
  - type: text
    content: The king’s demand is impossible. No one except the gods can tell you your dream, and they do not live here among people.”
  '12':
  - type: text
    content: 'The king was furious when he heard this, and he ordered that all the wise men of Babylon be executed. '
  '13':
  - type: text
    content: And because of the king’s decree, men were sent to find and kill Daniel and his friends.
  '14':
  - type: text
    content: 'When Arioch, the commander of the king’s guard, came to kill them, Daniel handled the situation with wisdom and discretion. '
  '15':
  - type: text
    content: 'He asked Arioch, “Why has the king issued such a harsh decree?” So Arioch told him all that had happened. '
  '16':
  - type: text
    content: Daniel went at once to see the king and requested more time to tell the king what the dream meant.
  '17':
  - type: text
    content: 'Then Daniel went home and told his friends Hananiah, Mishael, and Azariah what had happened. '
  '18':
  - type: text
    content: 'He urged them to ask the God of heaven to show them his mercy by telling them the secret, so they would not be executed along with the other wise men of Babylon. '
  '19':
  - type: text
    content: 'That night the secret was revealed to Daniel in a vision. Then Daniel praised the God of heaven. '
  '2':
  - type: text
    content: He called in his magicians, enchanters, sorcerers, and astrologers,
  - type: note
    content: Or Chaldeans; also in 2:4, 5, 10.
  - type: text
    content: ' and he demanded that they tell him what he had dreamed. As they stood before the king, '
  '20':
  - type: text
    content: He said,
  - type: text
    content: “Praise the name of God forever and ever,
  - type: text
    content: for he has all wisdom and power.
  '21':
  - type: text
    content: He controls the course of world events;
  - type: text
    content: he removes kings and sets up other kings.
  - type: text
    content: He gives wisdom to the wise
  - type: text
    content: and knowledge to the scholars.
  '22':
  - type: text
    content: He reveals deep and mysterious things
  - type: text
    content: and knows what lies hidden in darkness,
  - type: text
    content: though he is surrounded by light.
  '23':
  - type: text
    content: I thank and praise you, God of my ancestors,
  - type: text
    content: for you have given me wisdom and strength.
  - type: text
    content: You have told me what we asked of you
  - type: text
    content: and revealed to us what the king demanded.”
  - type: heading
    content: Daniel Interprets the Dream
  '24':
  - type: text
    content: Then Daniel went in to see Arioch, whom the king had ordered to execute the wise men of Babylon. Daniel said to him, “Don’t kill the wise men. Take me to the king, and I will tell him the meaning of his dream.”
  '25':
  - type: text
    content: Arioch quickly took Daniel to the king and said, “I have found one of the captives from Judah who will tell the king the meaning of his dream!”
  '26':
  - type: text
    content: The king said to Daniel (also known as Belteshazzar), “Is this true? Can you tell me what my dream was and what it means?”
  '27':
  - type: text
    content: 'Daniel replied, “There are no wise men, enchanters, magicians, or fortune-tellers who can reveal the king’s secret. '
  '28':
  - type: text
    content: But there is a God in heaven who reveals secrets, and he has shown King Nebuchadnezzar what will happen in the future. Now I will tell you your dream and the visions you saw as you lay on your bed.
  '29':
  - type: text
    content: '“While Your Majesty was sleeping, you dreamed about coming events. He who reveals secrets has shown you what is going to happen. '
  '3':
  - type: text
    content: he said, “I have had a dream that deeply troubles me, and I must know what it means.”
  '30':
  - type: text
    content: And it is not because I am wiser than anyone else that I know the secret of your dream, but because God wants you to understand what was in your heart.
  '31':
  - type: text
    content: '“In your vision, Your Majesty, you saw standing before you a huge, shining statue of a man. It was a frightening sight. '
  '32':
  - type: text
    content: 'The head of the statue was made of fine gold. Its chest and arms were silver, its belly and thighs were bronze, '
  '33':
  - type: text
    content: 'its legs were iron, and its feet were a combination of iron and baked clay. '
  '34':
  - type: text
    content: As you watched, a rock was cut from a mountain,
  - type: note
    content: As in Greek version (see also 2:45); Hebrew lacks from a mountain.
  - type: text
    content: ' but not by human hands. It struck the feet of iron and clay, smashing them to bits. '
  '35':
  - type: text
    content: The whole statue was crushed into small pieces of iron, clay, bronze, silver, and gold. Then the wind blew them away without a trace, like chaff on a threshing floor. But the rock that knocked the statue down became a great mountain that covered the whole earth.
  '36':
  - type: text
    content: '“That was the dream. Now we will tell the king what it means. '
  '37':
  - type: text
    content: 'Your Majesty, you are the greatest of kings. The God of heaven has given you sovereignty, power, strength, and honor. '
  '38':
  - type: text
    content: He has made you the ruler over all the inhabited world and has put even the wild animals and birds under your control. You are the head of gold.
  '39':
  - type: text
    content: '“But after your kingdom comes to an end, another kingdom, inferior to yours, will rise to take your place. After that kingdom has fallen, yet a third kingdom, represented by bronze, will rise to rule the world. '
  '4':
  - type: text
    content: Then the astrologers answered the king in Aramaic,
  - type: note
    content: The original text from this point through chapter 7 is in Aramaic.
  - type: text
    content: ' “Long live the king! Tell us the dream, and we will tell you what it means.”'
  '40':
  - type: text
    content: 'Following that kingdom, there will be a fourth one, as strong as iron. That kingdom will smash and crush all previous empires, just as iron smashes and crushes everything it strikes. '
  '41':
  - type: text
    content: 'The feet and toes you saw were a combination of iron and baked clay, showing that this kingdom will be divided. Like iron mixed with clay, it will have some of the strength of iron. '
  '42':
  - type: text
    content: 'But while some parts of it will be as strong as iron, other parts will be as weak as clay. '
  '43':
  - type: text
    content: This mixture of iron and clay also shows that these kingdoms will try to strengthen themselves by forming alliances with each other through intermarriage. But they will not hold together, just as iron and clay do not mix.
  '44':
  - type: text
    content: '“During the reigns of those kings, the God of heaven will set up a kingdom that will never be destroyed or conquered. It will crush all these kingdoms into nothingness, and it will stand forever. '
  '45':
  - type: text
    content: That is the meaning of the rock cut from the mountain, though not by human hands, that crushed to pieces the statue of iron, bronze, clay, silver, and gold. The great God was showing the king what will happen in the future. The dream is true, and its meaning is certain.”
  - type: heading
    content: Nebuchadnezzar Rewards Daniel
  '46':
  - type: text
    content: 'Then King Nebuchadnezzar threw himself down before Daniel and worshiped him, and he commanded his people to offer sacrifices and burn sweet incense before him. '
  '47':
  - type: text
    content: The king said to Daniel, “Truly, your God is the greatest of gods, the Lord over kings, a revealer of mysteries, for you have been able to reveal this secret.”
  '48':
  - type: text
    content: 'Then the king appointed Daniel to a high position and gave him many valuable gifts. He made Daniel ruler over the whole province of Babylon, as well as chief over all his wise men. '
  '49':
  - type: text
    content: At Daniel’s request, the king appointed Shadrach, Meshach, and Abednego to be in charge of all the affairs of the province of Babylon, while Daniel remained in the king’s court.
  '5':
  - type: text
    content: 'But the king said to the astrologers, “I am serious about this. If you don’t tell me what my dream was and what it means, you will be torn limb from limb, and your houses will be turned into heaps of rubble! '
  '6':
  - type: text
    content: But if you tell me what I dreamed and what the dream means, I will give you many wonderful gifts and honors. Just tell me the dream and what it means!”
  '7':
  - type: text
    content: They said again, “Please, Your Majesty. Tell us the dream, and we will tell you what it means.”
  '8':
  - type: text
    content: 'The king replied, “I know what you are doing! You’re stalling for time because you know I am serious when I say, '
  '9':
  - type: text
    content: ‘If you don’t tell me the dream, you are doomed.’ So you have conspired to tell me lies, hoping I will change my mind. But tell me the dream, and then I’ll know that you can tell me what it means.”
