document_id: 1CO.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Collection for Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now regarding your question about the money being collected for God’s people in Jerusalem. You should follow the same procedure I gave to the churches in Galatia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Timothy comes, don’t intimidate him. He is doing the Lord’s work, just as I am. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let anyone treat him with contempt. Send him on his way with your blessing when he returns to me. I expect him to come with the other believers.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with the brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 16:12.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now about our brother Apollos—I urged him to visit you with the other believers, but he was not willing to go right now. He will see you later when he has the opportunity.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be on guard. Stand firm in the faith. Be courageous.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Be men.
      marker-yv: yv-n
    - type: text
      text: ' Be strong. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And do everything with love.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You know that Stephanas and his household were the first of the harvest of believers in Greece,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in Achaia, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the southern region of the Greek peninsula.
      marker-yv: yv-n
    - type: text
      text: ' and they are spending their lives in service to God’s people. I urge you, dear brothers and sisters,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:15b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 16:20.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to submit to them and others like them who serve with such devotion. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am very glad that Stephanas, Fortunatus, and Achaicus have come here. They have been providing the help you weren’t here to give me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They have been a wonderful encouragement to me, as they have been to you. You must show your appreciation to all who serve so well.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Greetings
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The churches here in the province of Asia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:19a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Asia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a Roman province in what is now western Turkey.
      marker-yv: yv-n
    - type: text
      text: ' send greetings in the Lord, as do Aquila and Priscilla'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:19b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Prisca.
      marker-yv: yv-n
    - type: text
      text: ' and all the others who gather in their home for church meetings. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On the first day of each week, you should each put aside a portion of the money you have earned. Don’t wait until I get there and then try to collect it all at once. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: All the brothers and sisters here send greetings to you. Greet each other with a sacred kiss.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Here is my greeting in my own handwriting—Paul
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If anyone does not love the Lord, that person is cursed. Our Lord, come!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'From Aramaic, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Marana tha. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Maran atha, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Our Lord has come.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the grace of the Lord Jesus be with you.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: My love to all of you in Christ Jesus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Amen.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When I come, I will write letters of recommendation for the messengers you choose to deliver your gift to Jerusalem. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And if it seems appropriate for me to go along, they can travel with me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Instructions
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I am coming to visit you after I have been to Macedonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Macedonia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was in the northern region of Greece.
      marker-yv: yv-n
    - type: text
      text: ' for I am planning to travel through Macedonia. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Perhaps I will stay awhile with you, possibly all winter, and then you can send me on my way to my next destination. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This time I don’t want to make just a short visit and then go right on. I want to come and stay awhile, if the Lord will let me. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the meantime, I will be staying here at Ephesus until the Festival of Pentecost. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: There is a wide-open door for a great work here, although many oppose me.
