document_id: 1CO.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for Jerusalem
  - type: text
    content: 'Now regarding your question about the money being collected for God’s people in Jerusalem. You should follow the same procedure I gave to the churches in Galatia. '
  '10':
  - type: text
    content: 'When Timothy comes, don’t intimidate him. He is doing the Lord’s work, just as I am. '
  '11':
  - type: text
    content: Don’t let anyone treat him with contempt. Send him on his way with your blessing when he returns to me. I expect him to come with the other believers.
  - type: note
    content: Greek with the brothers; also in 16:12.
  '12':
  - type: text
    content: Now about our brother Apollos—I urged him to visit you with the other believers, but he was not willing to go right now. He will see you later when he has the opportunity.
  '13':
  - type: text
    content: Be on guard. Stand firm in the faith. Be courageous.
  - type: note
    content: Greek Be men.
  - type: text
    content: ' Be strong. '
  '14':
  - type: text
    content: And do everything with love.
  '15':
  - type: text
    content: You know that Stephanas and his household were the first of the harvest of believers in Greece,
  - type: note
    content: Greek in Achaia, the southern region of the Greek peninsula.
  - type: text
    content: ' and they are spending their lives in service to God’s people. I urge you, dear brothers and sisters,'
  - type: note
    content: Greek brothers; also in 16:20.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'to submit to them and others like them who serve with such devotion. '
  '17':
  - type: text
    content: 'I am very glad that Stephanas, Fortunatus, and Achaicus have come here. They have been providing the help you weren’t here to give me. '
  '18':
  - type: text
    content: They have been a wonderful encouragement to me, as they have been to you. You must show your appreciation to all who serve so well.
  - type: heading
    content: Paul’s Final Greetings
  '19':
  - type: text
    content: The churches here in the province of Asia
  - type: note
    content: Asia was a Roman province in what is now western Turkey.
  - type: text
    content: ' send greetings in the Lord, as do Aquila and Priscilla'
  - type: note
    content: Greek Prisca.
  - type: text
    content: ' and all the others who gather in their home for church meetings. '
  '2':
  - type: text
    content: 'On the first day of each week, you should each put aside a portion of the money you have earned. Don’t wait until I get there and then try to collect it all at once. '
  '20':
  - type: text
    content: All the brothers and sisters here send greetings to you. Greet each other with a sacred kiss.
  '21':
  - type: text
    content: ' '
  - type: heading
    content: Here is my greeting in my own handwriting—Paul
  - type: text
    content: .
  '22':
  - type: text
    content: If anyone does not love the Lord, that person is cursed. Our Lord, come!
  - type: note
    content: From Aramaic, Marana tha. Some manuscripts read Maran atha, “Our Lord has come.”
  '23':
  - type: text
    content: May the grace of the Lord Jesus be with you.
  '24':
  - type: text
    content: My love to all of you in Christ Jesus.
  - type: note
    content: Some manuscripts add Amen.
  '3':
  - type: text
    content: 'When I come, I will write letters of recommendation for the messengers you choose to deliver your gift to Jerusalem. '
  '4':
  - type: text
    content: And if it seems appropriate for me to go along, they can travel with me.
  - type: heading
    content: Paul’s Final Instructions
  '5':
  - type: text
    content: I am coming to visit you after I have been to Macedonia,
  - type: note
    content: Macedonia was in the northern region of Greece.
  - type: text
    content: ' for I am planning to travel through Macedonia. '
  '6':
  - type: text
    content: 'Perhaps I will stay awhile with you, possibly all winter, and then you can send me on my way to my next destination. '
  '7':
  - type: text
    content: 'This time I don’t want to make just a short visit and then go right on. I want to come and stay awhile, if the Lord will let me. '
  '8':
  - type: text
    content: 'In the meantime, I will be staying here at Ephesus until the Festival of Pentecost. '
  '9':
  - type: text
    content: There is a wide-open door for a great work here, although many oppose me.
