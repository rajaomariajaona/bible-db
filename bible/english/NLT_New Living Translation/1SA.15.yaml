document_id: 1SA.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Defeats the Amalekites
  - type: text
    content: 'One day Samuel said to Saul, “It was the '
  - type: text
    content: Lord
  - type: text
    content: ' who told me to anoint you as king of his people, Israel. Now listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, '
  '11':
  - type: text
    content: '“I am sorry that I ever made Saul king, for he has not been loyal to me and has refused to obey my command.” Samuel was so deeply moved when he heard this that he cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' all night.'
  '12':
  - type: text
    content: Early the next morning Samuel went to find Saul. Someone told him, “Saul went to the town of Carmel to set up a monument to himself; then he went on to Gilgal.”
  '13':
  - type: text
    content: 'When Samuel finally found him, Saul greeted him cheerfully. “May the '
  - type: text
    content: Lord
  - type: text
    content: ' bless you,” he said. “I have carried out the '
  - type: text
    content: Lord
  - type: text
    content: ’s command!”
  '14':
  - type: text
    content: “Then what is all the bleating of sheep and goats and the lowing of cattle I hear?” Samuel demanded.
  '15':
  - type: text
    content: '“It’s true that the army spared the best of the sheep, goats, and cattle,” Saul admitted. “But they are going to sacrifice them to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. We have destroyed everything else.”'
  '16':
  - type: text
    content: 'Then Samuel said to Saul, “Stop! Listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' told me last night!”'
  - type: text
    content: “What did he tell you?” Saul asked.
  '17':
  - type: text
    content: 'And Samuel told him, “Although you may think little of yourself, are you not the leader of the tribes of Israel? The '
  - type: text
    content: Lord
  - type: text
    content: ' has anointed you king of Israel. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent you on a mission and told you, ‘Go and completely destroy the sinners, the Amalekites, until they are all dead.’ '
  '19':
  - type: text
    content: 'Why haven’t you obeyed the '
  - type: text
    content: Lord
  - type: text
    content: '? Why did you rush for the plunder and do what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight?”
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has declared: I have decided to settle accounts with the nation of Amalek for opposing Israel when they came from Egypt. '
  '20':
  - type: text
    content: '“But I did obey the '
  - type: text
    content: Lord
  - type: text
    content: ',” Saul insisted. “I carried out the mission he gave me. I brought back King Agag, but I destroyed everyone else. '
  '21':
  - type: text
    content: 'Then my troops brought in the best of the sheep, goats, cattle, and plunder to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in Gilgal.”'
  '22':
  - type: text
    content: But Samuel replied,
  - type: text
    content: '“What is more pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: your burnt offerings and sacrifices
  - type: text
    content: or your obedience to his voice?
  - type: text
    content: Listen! Obedience is better than sacrifice,
  - type: text
    content: and submission is better than offering the fat of rams.
  '23':
  - type: text
    content: Rebellion is as sinful as witchcraft,
  - type: text
    content: and stubbornness as bad as worshiping idols.
  - type: text
    content: 'So because you have rejected the command of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: he has rejected you as king.”
  - type: heading
    content: Saul Pleads for Forgiveness
  '24':
  - type: text
    content: 'Then Saul admitted to Samuel, “Yes, I have sinned. I have disobeyed your instructions and the '
  - type: text
    content: Lord
  - type: text
    content: '’s command, for I was afraid of the people and did what they demanded. '
  '25':
  - type: text
    content: 'But now, please forgive my sin and come back with me so that I may worship the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '26':
  - type: text
    content: 'But Samuel replied, “I will not go back with you! Since you have rejected the '
  - type: text
    content: Lord
  - type: text
    content: ’s command, he has rejected you as king of Israel.”
  '27':
  - type: text
    content: 'As Samuel turned to go, Saul tried to hold him back and tore the hem of his robe. '
  '28':
  - type: text
    content: 'And Samuel said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has torn the kingdom of Israel from you today and has given it to someone else—one who is better than you. '
  '29':
  - type: text
    content: And he who is the Glory of Israel will not lie, nor will he change his mind, for he is not human that he should change his mind!”
  '3':
  - type: text
    content: Now go and completely destroy
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; also in 15:8, 9, 15, 18, 20, 21.
  - type: text
    content: ' the entire Amalekite nation—men, women, children, babies, cattle, sheep, goats, camels, and donkeys.”'
  '30':
  - type: text
    content: 'Then Saul pleaded again, “I know I have sinned. But please, at least honor me before the elders of my people and before Israel by coming back with me so that I may worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” '
  '31':
  - type: text
    content: 'So Samuel finally agreed and went back with him, and Saul worshiped the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Samuel Executes King Agag
  '32':
  - type: text
    content: Then Samuel said, “Bring King Agag to me.” Agag arrived full of hope, for he thought, “Surely the worst is over, and I have been spared!”
  - type: note
    content: Dead Sea Scrolls and Greek version read Agag arrived hesitantly, for he thought, “Surely this is the bitterness of death.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But Samuel said, “As your sword has killed the sons of many mothers, now your mother will be childless.” And Samuel cut Agag to pieces before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Gilgal.'
  '34':
  - type: text
    content: 'Then Samuel went home to Ramah, and Saul returned to his house at Gibeah of Saul. '
  '35':
  - type: text
    content: 'Samuel never went to meet with Saul again, but he mourned constantly for him. And the '
  - type: text
    content: Lord
  - type: text
    content: ' was sorry he had ever made Saul king of Israel.'
  '4':
  - type: text
    content: 'So Saul mobilized his army at Telaim. There were 200,000 soldiers from Israel and 10,000 men from Judah. '
  '5':
  - type: text
    content: 'Then Saul and his army went to a town of the Amalekites and lay in wait in the valley. '
  '6':
  - type: text
    content: 'Saul sent this warning to the Kenites: “Move away from where the Amalekites live, or you will die with them. For you showed kindness to all the people of Israel when they came up from Egypt.” So the Kenites packed up and left.'
  '7':
  - type: text
    content: 'Then Saul slaughtered the Amalekites from Havilah all the way to Shur, east of Egypt. '
  '8':
  - type: text
    content: 'He captured Agag, the Amalekite king, but completely destroyed everyone else. '
  '9':
  - type: text
    content: Saul and his men spared Agag’s life and kept the best of the sheep and goats, the cattle, the fat calves, and the lambs—everything, in fact, that appealed to them. They destroyed only what was worthless or of poor quality.
  - type: heading
    content: The Lord Rejects Saul
