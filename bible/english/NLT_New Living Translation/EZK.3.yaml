document_id: EZK.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The voice said to me, “Son of man, eat what I am giving you—eat this scroll! Then go and give its message to the people of Israel.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then he added, “Son of man, let all my words sink deep into your own heart first. Listen to them carefully for yourself. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then go to your people in exile and say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says!’ Do this whether they listen to you or not.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the Spirit lifted me up, and I heard a loud rumbling sound behind me. (May the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be praised in his place!)'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A possible reading for this verse is '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Then the Spirit lifted me up, and as the glory of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' rose from its place, I heard a loud rumbling sound behind me.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: It was the sound of the wings of the living beings as they brushed against each other and the rumbling of their wheels beneath them.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The Spirit lifted me up and took me away. I went in bitterness and turmoil, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s hold on me was strong. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then I came to the colony of Judean exiles in Tel-abib, beside the Kebar River. I was overwhelmed and sat among them for seven days.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Watchman for Israel
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'After seven days the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me a message. He said, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Son of man, I have appointed you as a watchman for Israel. Whenever you receive a message from me, warn people immediately. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'If I warn the wicked, saying, ‘You are under the penalty of death,’ but you fail to deliver the warning, they will die in their sins. And I will hold you responsible for their deaths. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: If you warn them and they refuse to repent and keep on sinning, they will die in their sins. But you will have saved yourself because you obeyed me.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So I opened my mouth, and he fed me the scroll. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“If righteous people turn away from their righteous behavior and ignore the obstacles I put in their way, they will die. And if you do not warn them, they will die in their sins. None of their righteous acts will be remembered, and I will hold you responsible for their deaths. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But if you warn righteous people not to sin and they listen to you and do not sin, they will live, and you will have saved yourself, too.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' took hold of me and said, “Get up and go out into the valley, and I will speak to you there.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So I got up and went, and there I saw the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as I had seen in my first vision by the Kebar River. And I fell face down on the ground.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then the Spirit came into me and set me on my feet. He spoke to me and said, “Go to your house and shut yourself in. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'There, son of man, you will be tied with ropes so you cannot go out among the people. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And I will make your tongue stick to the roof of your mouth so that you will be speechless and unable to rebuke them, for they are rebels. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But when I give you a message, I will loosen your tongue and let you speak. Then you will say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says!’ Those who choose to listen will listen, but those who refuse will refuse, for they are rebels.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Fill your stomach with this,” he said. And when I ate it, it tasted as sweet as honey in my mouth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then he said, “Son of man, go to the people of Israel and give them my messages. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I am not sending you to a foreign people whose language you cannot understand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'No, I am not sending you to people with strange and difficult speech. If I did, they would listen! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But the people of Israel won’t listen to you any more than they listen to me! For the whole lot of them are hard-hearted and stubborn. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But look, I have made you as obstinate and hard-hearted as they are. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I have made your forehead as hard as the hardest rock! So don’t be afraid of them or fear their angry looks, even though they are rebels.”
