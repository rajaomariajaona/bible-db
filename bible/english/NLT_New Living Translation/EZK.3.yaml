document_id: EZK.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The voice said to me, “Son of man, eat what I am giving you—eat this scroll! Then go and give its message to the people of Israel.” '
  '10':
  - type: text
    content: 'Then he added, “Son of man, let all my words sink deep into your own heart first. Listen to them carefully for yourself. '
  '11':
  - type: text
    content: 'Then go to your people in exile and say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says!’ Do this whether they listen to you or not.”'
  '12':
  - type: text
    content: 'Then the Spirit lifted me up, and I heard a loud rumbling sound behind me. (May the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' be praised in his place!)'
  - type: note
    content: A possible reading for this verse is Then the Spirit lifted me up, and as the glory of the Lord rose from its place, I heard a loud rumbling sound behind me.
  - type: text
    content: ' '
  '13':
  - type: text
    content: It was the sound of the wings of the living beings as they brushed against each other and the rumbling of their wheels beneath them.
  '14':
  - type: text
    content: 'The Spirit lifted me up and took me away. I went in bitterness and turmoil, but the '
  - type: text
    content: Lord
  - type: text
    content: '’s hold on me was strong. '
  '15':
  - type: text
    content: Then I came to the colony of Judean exiles in Tel-abib, beside the Kebar River. I was overwhelmed and sat among them for seven days.
  - type: heading
    content: A Watchman for Israel
  '16':
  - type: text
    content: 'After seven days the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me a message. He said, '
  '17':
  - type: text
    content: '“Son of man, I have appointed you as a watchman for Israel. Whenever you receive a message from me, warn people immediately. '
  '18':
  - type: text
    content: 'If I warn the wicked, saying, ‘You are under the penalty of death,’ but you fail to deliver the warning, they will die in their sins. And I will hold you responsible for their deaths. '
  '19':
  - type: text
    content: If you warn them and they refuse to repent and keep on sinning, they will die in their sins. But you will have saved yourself because you obeyed me.
  '2':
  - type: text
    content: 'So I opened my mouth, and he fed me the scroll. '
  '20':
  - type: text
    content: '“If righteous people turn away from their righteous behavior and ignore the obstacles I put in their way, they will die. And if you do not warn them, they will die in their sins. None of their righteous acts will be remembered, and I will hold you responsible for their deaths. '
  '21':
  - type: text
    content: But if you warn righteous people not to sin and they listen to you and do not sin, they will live, and you will have saved yourself, too.”
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' took hold of me and said, “Get up and go out into the valley, and I will speak to you there.” '
  '23':
  - type: text
    content: 'So I got up and went, and there I saw the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as I had seen in my first vision by the Kebar River. And I fell face down on the ground.'
  '24':
  - type: text
    content: 'Then the Spirit came into me and set me on my feet. He spoke to me and said, “Go to your house and shut yourself in. '
  '25':
  - type: text
    content: 'There, son of man, you will be tied with ropes so you cannot go out among the people. '
  '26':
  - type: text
    content: 'And I will make your tongue stick to the roof of your mouth so that you will be speechless and unable to rebuke them, for they are rebels. '
  '27':
  - type: text
    content: 'But when I give you a message, I will loosen your tongue and let you speak. Then you will say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says!’ Those who choose to listen will listen, but those who refuse will refuse, for they are rebels.'
  '3':
  - type: text
    content: “Fill your stomach with this,” he said. And when I ate it, it tasted as sweet as honey in my mouth.
  '4':
  - type: text
    content: 'Then he said, “Son of man, go to the people of Israel and give them my messages. '
  '5':
  - type: text
    content: 'I am not sending you to a foreign people whose language you cannot understand. '
  '6':
  - type: text
    content: 'No, I am not sending you to people with strange and difficult speech. If I did, they would listen! '
  '7':
  - type: text
    content: 'But the people of Israel won’t listen to you any more than they listen to me! For the whole lot of them are hard-hearted and stubborn. '
  '8':
  - type: text
    content: 'But look, I have made you as obstinate and hard-hearted as they are. '
  '9':
  - type: text
    content: I have made your forehead as hard as the hardest rock! So don’t be afraid of them or fear their angry looks, even though they are rebels.”
