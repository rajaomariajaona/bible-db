document_id: JOB.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bildad’s Second Response to Job
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Bildad the Shuhite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How long before you stop talking?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Speak sense if you want us to answer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do you think we are mere animals?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you think we are stupid?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You may tear out your hair in anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but will that destroy the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it make the rocks tremble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Surely the light of the wicked will be snuffed out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sparks of their fire will not glow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The light in their tent will grow dark.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The lamp hanging above them will be quenched.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The confident stride of the wicked will be shortened.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their own schemes will be their downfall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wicked walk into a net.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They fall into a pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A trap grabs them by the heel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A snare holds them tight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A noose lies hidden on the ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A rope is stretched across their path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Terrors surround the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trouble them at every step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hunger depletes their strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and calamity waits for them to stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Disease eats their skin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: death devours their limbs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They are torn from the security of their homes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are brought down to the king of terrors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The homes of the wicked will burn down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning sulfur rains on their houses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Their roots will dry up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their branches will wither.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All memory of their existence will fade from the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one will remember their names.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They will be thrust from light into darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: driven from the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They will have neither children nor grandchildren,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor any survivor in the place where they lived.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: People in the west are appalled at their fate;
- type: usfm
  marker: q2
  children:
  - type: text
    text: people in the east are horrified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They will say, ‘This was the home of a wicked person,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the place of one who rejected God.’”
