document_id: JOB.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s Second Response to Job
  - type: text
    content: 'Then Bildad the Shuhite replied:'
  '10':
  - type: text
    content: A noose lies hidden on the ground.
  - type: text
    content: A rope is stretched across their path.
  '11':
  - type: text
    content: “Terrors surround the wicked
  - type: text
    content: and trouble them at every step.
  '12':
  - type: text
    content: Hunger depletes their strength,
  - type: text
    content: and calamity waits for them to stumble.
  '13':
  - type: text
    content: Disease eats their skin;
  - type: text
    content: death devours their limbs.
  '14':
  - type: text
    content: They are torn from the security of their homes
  - type: text
    content: and are brought down to the king of terrors.
  '15':
  - type: text
    content: The homes of the wicked will burn down;
  - type: text
    content: burning sulfur rains on their houses.
  '16':
  - type: text
    content: Their roots will dry up,
  - type: text
    content: and their branches will wither.
  '17':
  - type: text
    content: All memory of their existence will fade from the earth;
  - type: text
    content: no one will remember their names.
  '18':
  - type: text
    content: They will be thrust from light into darkness,
  - type: text
    content: driven from the world.
  '19':
  - type: text
    content: They will have neither children nor grandchildren,
  - type: text
    content: nor any survivor in the place where they lived.
  '2':
  - type: text
    content: “How long before you stop talking?
  - type: text
    content: Speak sense if you want us to answer!
  '20':
  - type: text
    content: People in the west are appalled at their fate;
  - type: text
    content: people in the east are horrified.
  '21':
  - type: text
    content: They will say, ‘This was the home of a wicked person,
  - type: text
    content: the place of one who rejected God.’”
  '3':
  - type: text
    content: Do you think we are mere animals?
  - type: text
    content: Do you think we are stupid?
  '4':
  - type: text
    content: You may tear out your hair in anger,
  - type: text
    content: but will that destroy the earth?
  - type: text
    content: Will it make the rocks tremble?
  '5':
  - type: text
    content: “Surely the light of the wicked will be snuffed out.
  - type: text
    content: The sparks of their fire will not glow.
  '6':
  - type: text
    content: The light in their tent will grow dark.
  - type: text
    content: The lamp hanging above them will be quenched.
  '7':
  - type: text
    content: The confident stride of the wicked will be shortened.
  - type: text
    content: Their own schemes will be their downfall.
  '8':
  - type: text
    content: The wicked walk into a net.
  - type: text
    content: They fall into a pit.
  '9':
  - type: text
    content: A trap grabs them by the heel.
  - type: text
    content: A snare holds them tight.
