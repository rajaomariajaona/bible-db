document_id: EPH.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Mysterious Plan Revealed
  - type: text
    content: When I think of all this, I, Paul, a prisoner of Christ Jesus for the benefit of you Gentiles
  - type: note
    content: 'Paul resumes this thought in verse 14: “When I think of all this, I fall to my knees and pray to the Father.”'
  - type: text
    content: ' . . . '
  '10':
  - type: text
    content: 'God’s purpose in all this was to use the church to display his wisdom in its rich variety to all the unseen rulers and authorities in the heavenly places. '
  '11':
  - type: text
    content: This was his eternal plan, which he carried out through Christ Jesus our Lord.
  '12':
  - type: text
    content: Because of Christ and our faith in him,
  - type: note
    content: Or Because of Christ’s faithfulness.
  - type: text
    content: ' we can now come boldly and confidently into God’s presence. '
  '13':
  - type: text
    content: So please don’t lose heart because of my trials here. I am suffering for you, so you should feel honored.
  - type: heading
    content: Paul’s Prayer for Spiritual Growth
  '14':
  - type: text
    content: When I think of all this, I fall to my knees and pray to the Father,
  - type: note
    content: Some manuscripts read the Father of our Lord Jesus Christ.
  - type: text
    content: ' '
  '15':
  - type: text
    content: the Creator of everything in heaven and on earth.
  - type: note
    content: Or from whom every family in heaven and on earth takes its name.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'I pray that from his glorious, unlimited resources he will empower you with inner strength through his Spirit. '
  '17':
  - type: text
    content: 'Then Christ will make his home in your hearts as you trust in him. Your roots will grow down into God’s love and keep you strong. '
  '18':
  - type: text
    content: 'And may you have the power to understand, as all God’s people should, how wide, how long, how high, and how deep his love is. '
  '19':
  - type: text
    content: May you experience the love of Christ, though it is too great to understand fully. Then you will be made complete with all the fullness of life and power that comes from God.
  '2':
  - type: text
    content: 'assuming, by the way, that you know God gave me the special responsibility of extending his grace to you Gentiles. '
  '20':
  - type: text
    content: 'Now all glory to God, who is able, through his mighty power at work within us, to accomplish infinitely more than we might ask or think. '
  '21':
  - type: text
    content: Glory to him in the church and in Christ Jesus through all generations forever and ever! Amen.
  '3':
  - type: text
    content: 'As I briefly wrote earlier, God himself revealed his mysterious plan to me. '
  '4':
  - type: text
    content: 'As you read what I have written, you will understand my insight into this plan regarding Christ. '
  '5':
  - type: text
    content: God did not reveal it to previous generations, but now by his Spirit he has revealed it to his holy apostles and prophets.
  '6':
  - type: text
    content: 'And this is God’s plan: Both Gentiles and Jews who believe the Good News share equally in the riches inherited by God’s children. Both are part of the same body, and both enjoy the promise of blessings because they belong to Christ Jesus.'
  - type: note
    content: Or because they are united with Christ Jesus.
  - type: text
    content: ' '
  '7':
  - type: text
    content: By God’s grace and mighty power, I have been given the privilege of serving him by spreading this Good News.
  '8':
  - type: text
    content: 'Though I am the least deserving of all God’s people, he graciously gave me the privilege of telling the Gentiles about the endless treasures available to them in Christ. '
  '9':
  - type: text
    content: I was chosen to explain to everyone
  - type: note
    content: Some manuscripts do not include to everyone.
  - type: text
    content: ' this mysterious plan that God, the Creator of all things, had kept secret from the beginning.'
