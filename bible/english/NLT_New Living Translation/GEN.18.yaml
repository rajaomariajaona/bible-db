document_id: GEN.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Son Is Promised to Sarah
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared again to Abraham near the oak grove belonging to Mamre. One day Abraham was sitting at the entrance to his tent during the hottest part of the day. '
  '10':
  - type: text
    content: Then one of them said, “I will return to you about this time next year, and your wife, Sarah, will have a son!”
  - type: text
    content: 'Sarah was listening to this conversation from the tent. '
  '11':
  - type: text
    content: 'Abraham and Sarah were both very old by this time, and Sarah was long past the age of having children. '
  '12':
  - type: text
    content: So she laughed silently to herself and said, “How could a worn-out woman like me enjoy such pleasure, especially when my master—my husband—is also so old?”
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abraham, “Why did Sarah laugh? Why did she say, ‘Can an old woman like me have a baby?’ '
  '14':
  - type: text
    content: 'Is anything too hard for the '
  - type: text
    content: Lord
  - type: text
    content: '? I will return about this time next year, and Sarah will have a son.”'
  '15':
  - type: text
    content: Sarah was afraid, so she denied it, saying, “I didn’t laugh.”
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “No, you did laugh.”'
  - type: heading
    content: Abraham Intercedes for Sodom
  '16':
  - type: text
    content: Then the men got up from their meal and looked out toward Sodom. As they left, Abraham went with them to send them on their way.
  '17':
  - type: text
    content: '“Should I hide my plan from Abraham?” the '
  - type: text
    content: Lord
  - type: text
    content: ' asked. '
  '18':
  - type: text
    content: '“For Abraham will certainly become a great and mighty nation, and all the nations of the earth will be blessed through him. '
  '19':
  - type: text
    content: 'I have singled him out so that he will direct his sons and their families to keep the way of the '
  - type: text
    content: Lord
  - type: text
    content: ' by doing what is right and just. Then I will do for Abraham all that I have promised.”'
  '2':
  - type: text
    content: He looked up and noticed three men standing nearby. When he saw them, he ran to meet them and welcomed them, bowing low to the ground.
  '20':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' told Abraham, “I have heard a great outcry from Sodom and Gomorrah, because their sin is so flagrant. '
  '21':
  - type: text
    content: I am going down to see if their actions are as wicked as I have heard. If not, I want to know.”
  '22':
  - type: text
    content: 'The other men turned and headed toward Sodom, but the '
  - type: text
    content: Lord
  - type: text
    content: ' remained with Abraham. '
  '23':
  - type: text
    content: 'Abraham approached him and said, “Will you sweep away both the righteous and the wicked? '
  '24':
  - type: text
    content: 'Suppose you find fifty righteous people living there in the city—will you still sweep it away and not spare it for their sakes? '
  '25':
  - type: text
    content: Surely you wouldn’t do such a thing, destroying the righteous along with the wicked. Why, you would be treating the righteous and the wicked exactly the same! Surely you wouldn’t do that! Should not the Judge of all the earth do what is right?”
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “If I find fifty righteous people in Sodom, I will spare the entire city for their sake.”'
  '27':
  - type: text
    content: 'Then Abraham spoke again. “Since I have begun, let me speak further to my Lord, even though I am but dust and ashes. '
  '28':
  - type: text
    content: Suppose there are only forty-five righteous people rather than fifty? Will you destroy the whole city for lack of five?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will not destroy it if I find forty-five righteous people there.”'
  '29':
  - type: text
    content: Then Abraham pressed his request further. “Suppose there are only forty?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “I will not destroy it for the sake of the forty.”'
  '3':
  - type: text
    content: '“My lord,” he said, “if it pleases you, stop here for a while. '
  '30':
  - type: text
    content: “Please don’t be angry, my Lord,” Abraham pleaded. “Let me speak—suppose only thirty righteous people are found?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “I will not destroy it if I find thirty.”'
  '31':
  - type: text
    content: Then Abraham said, “Since I have dared to speak to the Lord, let me continue—suppose there are only twenty?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Then I will not destroy it for the sake of the twenty.”'
  '32':
  - type: text
    content: Finally, Abraham said, “Lord, please don’t be angry with me if I speak one more time. Suppose only ten are found there?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Then I will not destroy it for the sake of the ten.”'
  '33':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' had finished his conversation with Abraham, he went on his way, and Abraham returned to his tent.'
  '4':
  - type: text
    content: 'Rest in the shade of this tree while water is brought to wash your feet. '
  '5':
  - type: text
    content: And since you’ve honored your servant with this visit, let me prepare some food to refresh you before you continue on your journey.”
  - type: text
    content: “All right,” they said. “Do as you have said.”
  '6':
  - type: text
    content: So Abraham ran back to the tent and said to Sarah, “Hurry! Get three large measures
  - type: note
    content: Hebrew 3 seahs, about half a bushel or 22 liters.
  - type: text
    content: ' of your best flour, knead it into dough, and bake some bread.” '
  '7':
  - type: text
    content: 'Then Abraham ran out to the herd and chose a tender calf and gave it to his servant, who quickly prepared it. '
  '8':
  - type: text
    content: When the food was ready, Abraham took some yogurt and milk and the roasted meat, and he served it to the men. As they ate, Abraham waited on them in the shade of the trees.
  '9':
  - type: text
    content: “Where is Sarah, your wife?” the visitors asked.
  - type: text
    content: “She’s inside the tent,” Abraham replied.
