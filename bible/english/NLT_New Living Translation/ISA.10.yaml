document_id: ISA.10
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: What sorrow awaits the unjust judges
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who issue unfair laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They deprive the poor of justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deny the rights of the needy among my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They prey on widows
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take advantage of orphans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What will you do when I punish you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I send disaster upon you from a distant land?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To whom will you turn for help?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where will your treasures be safe?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You will stumble along as prisoners
- type: usfm
  marker: q2
  children:
  - type: text
    text: or lie among the dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But even then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger will not be satisfied.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His fist is still poised to strike.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against Assyria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “What sorrow awaits Assyria, the rod of my anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I use it as a club to express my anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am sending Assyria against a godless nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against a people with whom I am angry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assyria will plunder them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trampling them like dirt beneath its feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But the king of Assyria will not understand that he is my tool;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his mind does not work that way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His plan is simply to destroy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to cut down nation after nation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He will say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Each of my princes will soon be a king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We destroyed Calno just as we did Carchemish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hamath fell before us as Arpad did.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And we destroyed Samaria just as we did Damascus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yes, we have finished off many a kingdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose gods were greater than those in Jerusalem and Samaria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So we will defeat Jerusalem and her gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as we destroyed Samaria with hers.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After the Lord has used the king of Assyria to accomplish his purposes on Mount Zion and in Jerusalem, he will turn against the king of Assyria and punish him—for he is proud and arrogant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He boasts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “By my own powerful arm I have done this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: With my own shrewd wisdom I planned it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have broken down the defenses of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and carried off their treasures.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have knocked down their kings like a bull.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have robbed their nests of riches
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gathered up kingdoms as a farmer gathers eggs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one can even flap a wing against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: or utter a peep of protest.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But can the ax boast greater power than the person who uses it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is the saw greater than the person who saws?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can a rod strike unless a hand moves it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can a wooden cane walk by itself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will send a plague among Assyria’s proud troops,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a flaming fire will consume its glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the Light of Israel, will be a fire;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One will be a flame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will devour the thorns and briers with fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning up the enemy in a single night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will consume Assyria’s glory'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a fire consumes a forest in a fruitful land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will waste away like sick people in a plague.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Of all that glorious forest, only a few trees will survive—
- type: usfm
  marker: q2
  children:
  - type: text
    text: so few that a child could count them!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hope for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In that day the remnant left in Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the survivors in the house of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will no longer depend on allies
- type: usfm
  marker: q2
  children:
  - type: text
    text: who seek to destroy them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But they will faithfully trust the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A remnant will return;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shear-jashub; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 7:3; 8:18.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, the remnant of Jacob will return to the Mighty God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But though the people of Israel are as numerous
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the sand of the seashore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: only a remnant of them will return.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rightly decided to destroy his people.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Yes, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: has already decided to destroy the entire land.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:22-23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'only a remnant of them will be saved. / For he will carry out his sentence quickly and with finality and righteousness; / for God will carry out his sentence upon all the world with finality. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 9:27-28.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So this is what the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, says: “O my people in Zion, do not be afraid of the Assyrians when they oppress you with rod and club as the Egyptians did long ago. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In a little while my anger against you will end, and then my anger will rise up to destroy them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will lash them with his whip, as he did when Gideon triumphed over the Midianites at the rock of Oreb, or when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s staff was raised to drown the Egyptian army in the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will end the bondage of his people.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will break the yoke of slavery
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lift it from their shoulders.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The yoke will be broken, / for you have grown so fat.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Look, the Assyrians are now at Aiath.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are passing through Migron
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are storing their equipment at Micmash.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They are crossing the pass
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are camping at Geba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fear strikes the town of Ramah.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the people of Gibeah, the hometown of Saul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: are running for their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Scream in terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you people of Gallim!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout out a warning to Laishah.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, poor Anathoth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: There go the people of Madmenah, all fleeing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The citizens of Gebim are trying to hide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The enemy stops at Nob for the rest of that day.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shakes his fist at beautiful Mount Zion, the mountain of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But look! The Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will chop down the mighty tree of Assyria with great power!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will cut down the proud.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That lofty tree will be brought down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He will cut down the forest trees with an ax.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lebanon will fall to the Mighty One.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with an ax / as even the mighty trees of Lebanon fall.
    marker-yv: yv-n
