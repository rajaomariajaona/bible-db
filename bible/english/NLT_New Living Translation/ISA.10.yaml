document_id: ISA.10,116
type_code: eng
verses:
  '1':
  - type: text
    content: What sorrow awaits the unjust judges
  - type: text
    content: and those who issue unfair laws.
  '10':
  - type: text
    content: Yes, we have finished off many a kingdom
  - type: text
    content: whose gods were greater than those in Jerusalem and Samaria.
  '11':
  - type: text
    content: So we will defeat Jerusalem and her gods,
  - type: text
    content: just as we destroyed Samaria with hers.’”
  '12':
  - type: text
    content: 'After the Lord has used the king of Assyria to accomplish his purposes on Mount Zion and in Jerusalem, he will turn against the king of Assyria and punish him—for he is proud and arrogant. '
  '13':
  - type: text
    content: He boasts,
  - type: text
    content: “By my own powerful arm I have done this.
  - type: text
    content: With my own shrewd wisdom I planned it.
  - type: text
    content: I have broken down the defenses of nations
  - type: text
    content: and carried off their treasures.
  - type: text
    content: I have knocked down their kings like a bull.
  '14':
  - type: text
    content: I have robbed their nests of riches
  - type: text
    content: and gathered up kingdoms as a farmer gathers eggs.
  - type: text
    content: No one can even flap a wing against me
  - type: text
    content: or utter a peep of protest.”
  '15':
  - type: text
    content: But can the ax boast greater power than the person who uses it?
  - type: text
    content: Is the saw greater than the person who saws?
  - type: text
    content: Can a rod strike unless a hand moves it?
  - type: text
    content: Can a wooden cane walk by itself?
  '16':
  - type: text
    content: 'Therefore, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: will send a plague among Assyria’s proud troops,
  - type: text
    content: and a flaming fire will consume its glory.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the Light of Israel, will be a fire;'
  - type: text
    content: the Holy One will be a flame.
  - type: text
    content: He will devour the thorns and briers with fire,
  - type: text
    content: burning up the enemy in a single night.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will consume Assyria’s glory'
  - type: text
    content: like a fire consumes a forest in a fruitful land;
  - type: text
    content: it will waste away like sick people in a plague.
  '19':
  - type: text
    content: Of all that glorious forest, only a few trees will survive—
  - type: text
    content: so few that a child could count them!
  - type: heading
    content: Hope for the Lord’s People
  '2':
  - type: text
    content: They deprive the poor of justice
  - type: text
    content: and deny the rights of the needy among my people.
  - type: text
    content: They prey on widows
  - type: text
    content: and take advantage of orphans.
  '20':
  - type: text
    content: In that day the remnant left in Israel,
  - type: text
    content: the survivors in the house of Jacob,
  - type: text
    content: will no longer depend on allies
  - type: text
    content: who seek to destroy them.
  - type: text
    content: 'But they will faithfully trust the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel.
  '21':
  - type: text
    content: A remnant will return;
  - type: note
    content: Hebrew Shear-jashub; see 7:3; 8:18.
  - type: text
    content: yes, the remnant of Jacob will return to the Mighty God.
  '22':
  - type: text
    content: But though the people of Israel are as numerous
  - type: text
    content: as the sand of the seashore,
  - type: text
    content: only a remnant of them will return.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has rightly decided to destroy his people.'
  '23':
  - type: text
    content: 'Yes, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: has already decided to destroy the entire land.
  - type: note
    content: Greek version reads only a remnant of them will be saved. / For he will carry out his sentence quickly and with finality and righteousness; / for God will carry out his sentence upon all the world with finality. Compare Rom 9:27-28.
  '24':
  - type: text
    content: 'So this is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, says: “O my people in Zion, do not be afraid of the Assyrians when they oppress you with rod and club as the Egyptians did long ago. '
  '25':
  - type: text
    content: 'In a little while my anger against you will end, and then my anger will rise up to destroy them.” '
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will lash them with his whip, as he did when Gideon triumphed over the Midianites at the rock of Oreb, or when the '
  - type: text
    content: Lord
  - type: text
    content: ’s staff was raised to drown the Egyptian army in the sea.
  '27':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will end the bondage of his people.'
  - type: text
    content: He will break the yoke of slavery
  - type: text
    content: and lift it from their shoulders.
  - type: note
    content: As in Greek version; Hebrew reads The yoke will be broken, / for you have grown so fat.
  '28':
  - type: text
    content: Look, the Assyrians are now at Aiath.
  - type: text
    content: They are passing through Migron
  - type: text
    content: and are storing their equipment at Micmash.
  '29':
  - type: text
    content: They are crossing the pass
  - type: text
    content: and are camping at Geba.
  - type: text
    content: Fear strikes the town of Ramah.
  - type: text
    content: All the people of Gibeah, the hometown of Saul,
  - type: text
    content: are running for their lives.
  '3':
  - type: text
    content: What will you do when I punish you,
  - type: text
    content: when I send disaster upon you from a distant land?
  - type: text
    content: To whom will you turn for help?
  - type: text
    content: Where will your treasures be safe?
  '30':
  - type: text
    content: Scream in terror,
  - type: text
    content: you people of Gallim!
  - type: text
    content: Shout out a warning to Laishah.
  - type: text
    content: Oh, poor Anathoth!
  '31':
  - type: text
    content: There go the people of Madmenah, all fleeing.
  - type: text
    content: The citizens of Gebim are trying to hide.
  '32':
  - type: text
    content: The enemy stops at Nob for the rest of that day.
  - type: text
    content: He shakes his fist at beautiful Mount Zion, the mountain of Jerusalem.
  '33':
  - type: text
    content: 'But look! The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: will chop down the mighty tree of Assyria with great power!
  - type: text
    content: He will cut down the proud.
  - type: text
    content: That lofty tree will be brought down.
  '34':
  - type: text
    content: He will cut down the forest trees with an ax.
  - type: text
    content: Lebanon will fall to the Mighty One.
  - type: note
    content: Or with an ax / as even the mighty trees of Lebanon fall.
  '4':
  - type: text
    content: You will stumble along as prisoners
  - type: text
    content: or lie among the dead.
  - type: text
    content: 'But even then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger will not be satisfied.
  - type: text
    content: His fist is still poised to strike.
  - type: heading
    content: Judgment against Assyria
  '5':
  - type: text
    content: “What sorrow awaits Assyria, the rod of my anger.
  - type: text
    content: I use it as a club to express my anger.
  '6':
  - type: text
    content: I am sending Assyria against a godless nation,
  - type: text
    content: against a people with whom I am angry.
  - type: text
    content: Assyria will plunder them,
  - type: text
    content: trampling them like dirt beneath its feet.
  '7':
  - type: text
    content: But the king of Assyria will not understand that he is my tool;
  - type: text
    content: his mind does not work that way.
  - type: text
    content: His plan is simply to destroy,
  - type: text
    content: to cut down nation after nation.
  '8':
  - type: text
    content: He will say,
  - type: text
    content: ‘Each of my princes will soon be a king.
  '9':
  - type: text
    content: We destroyed Calno just as we did Carchemish.
  - type: text
    content: Hamath fell before us as Arpad did.
  - type: text
    content: And we destroyed Samaria just as we did Damascus.
