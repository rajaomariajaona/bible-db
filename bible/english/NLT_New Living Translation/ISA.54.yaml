document_id: ISA.54,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Future Glory for Jerusalem
  - type: text
    content: “Sing, O childless woman,
  - type: text
    content: you who have never given birth!
  - type: text
    content: Break into loud and joyful song, O Jerusalem,
  - type: text
    content: you who have never been in labor.
  - type: text
    content: For the desolate woman now has more children
  - type: text
    content: than the woman who lives with her husband,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: For the mountains may move
  - type: text
    content: and the hills disappear,
  - type: text
    content: but even then my faithful love for you will remain.
  - type: text
    content: My covenant of blessing will never be broken,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', who has mercy on you.'
  '11':
  - type: text
    content: “O storm-battered city,
  - type: text
    content: troubled and desolate!
  - type: text
    content: I will rebuild you with precious jewels
  - type: text
    content: and make your foundations from lapis lazuli.
  '12':
  - type: text
    content: I will make your towers of sparkling rubies,
  - type: text
    content: your gates of shining gems,
  - type: text
    content: and your walls of precious stones.
  '13':
  - type: text
    content: I will teach all your children,
  - type: text
    content: and they will enjoy great peace.
  '14':
  - type: text
    content: You will be secure under a government that is just and fair.
  - type: text
    content: Your enemies will stay far away.
  - type: text
    content: You will live in peace,
  - type: text
    content: and terror will not come near.
  '15':
  - type: text
    content: If any nation comes to fight you,
  - type: text
    content: it is not because I sent them.
  - type: text
    content: Whoever attacks you will go down in defeat.
  '16':
  - type: text
    content: “I have created the blacksmith
  - type: text
    content: who fans the coals beneath the forge
  - type: text
    content: and makes the weapons of destruction.
  - type: text
    content: And I have created the armies that destroy.
  '17':
  - type: text
    content: But in that coming day
  - type: text
    content: no weapon turned against you will succeed.
  - type: text
    content: You will silence every voice
  - type: text
    content: raised up to accuse you.
  - type: text
    content: 'These benefits are enjoyed by the servants of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: their vindication will come from me.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '2':
  - type: text
    content: “Enlarge your house; build an addition.
  - type: text
    content: Spread out your home, and spare no expense!
  '3':
  - type: text
    content: For you will soon be bursting at the seams.
  - type: text
    content: Your descendants will occupy other nations
  - type: text
    content: and resettle the ruined cities.
  '4':
  - type: text
    content: “Fear not; you will no longer live in shame.
  - type: text
    content: Don’t be afraid; there is no more disgrace for you.
  - type: text
    content: You will no longer remember the shame of your youth
  - type: text
    content: and the sorrows of widowhood.
  '5':
  - type: text
    content: For your Creator will be your husband;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is his name!'
  - type: text
    content: He is your Redeemer, the Holy One of Israel,
  - type: text
    content: the God of all the earth.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has called you back from your grief—'
  - type: text
    content: as though you were a young wife abandoned by her husband,”
  - type: text
    content: says your God.
  '7':
  - type: text
    content: “For a brief moment I abandoned you,
  - type: text
    content: but with great compassion I will take you back.
  '8':
  - type: text
    content: In a burst of anger I turned my face away for a little while.
  - type: text
    content: But with everlasting love I will have compassion on you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', your Redeemer.'
  '9':
  - type: text
    content: “Just as I swore in the time of Noah
  - type: text
    content: that I would never again let a flood cover the earth,
  - type: text
    content: so now I swear
  - type: text
    content: that I will never again be angry and punish you.
