document_id: ISA.54,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Future Glory for Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Sing, O childless woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have never given birth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break into loud and joyful song, O Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have never been in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the desolate woman now has more children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the woman who lives with her husband,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the mountains may move
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hills disappear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but even then my faithful love for you will remain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My covenant of blessing will never be broken,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has mercy on you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “O storm-battered city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: troubled and desolate!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rebuild you with precious jewels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make your foundations from lapis lazuli.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will make your towers of sparkling rubies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your gates of shining gems,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your walls of precious stones.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will teach all your children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will enjoy great peace.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You will be secure under a government that is just and fair.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your enemies will stay far away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will live in peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terror will not come near.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: If any nation comes to fight you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is not because I sent them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whoever attacks you will go down in defeat.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I have created the blacksmith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who fans the coals beneath the forge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and makes the weapons of destruction.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I have created the armies that destroy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But in that coming day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no weapon turned against you will succeed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will silence every voice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raised up to accuse you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'These benefits are enjoyed by the servants of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their vindication will come from me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Enlarge your house; build an addition.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Spread out your home, and spare no expense!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For you will soon be bursting at the seams.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your descendants will occupy other nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and resettle the ruined cities.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Fear not; you will no longer live in shame.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t be afraid; there is no more disgrace for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will no longer remember the shame of your youth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sorrows of widowhood.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For your Creator will be your husband;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies is his name!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is your Redeemer, the Holy One of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of all the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has called you back from your grief—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though you were a young wife abandoned by her husband,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: says your God.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “For a brief moment I abandoned you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but with great compassion I will take you back.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In a burst of anger I turned my face away for a little while.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But with everlasting love I will have compassion on you,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your Redeemer.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Just as I swore in the time of Noah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I would never again let a flood cover the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so now I swear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I will never again be angry and punish you.
