document_id: PSA.114,116
type_code: eng
verses:
  '1':
  - type: text
    content: When the Israelites escaped from Egypt—
  - type: text
    content: when the family of Jacob left that foreign land—
  '2':
  - type: text
    content: the land of Judah became God’s sanctuary,
  - type: text
    content: and Israel became his kingdom.
  '3':
  - type: text
    content: The Red Sea
  - type: note
    content: Hebrew the sea; also in 114:5.
  - type: text
    content: ' saw them coming and hurried out of their way!'
  - type: text
    content: The water of the Jordan River turned away.
  '4':
  - type: text
    content: The mountains skipped like rams,
  - type: text
    content: the hills like lambs!
  '5':
  - type: text
    content: What’s wrong, Red Sea, that made you hurry out of their way?
  - type: text
    content: What happened, Jordan River, that you turned away?
  '6':
  - type: text
    content: Why, mountains, did you skip like rams?
  - type: text
    content: Why, hills, like lambs?
  '7':
  - type: text
    content: Tremble, O earth, at the presence of the Lord,
  - type: text
    content: at the presence of the God of Jacob.
  '8':
  - type: text
    content: He turned the rock into a pool of water;
  - type: text
    content: yes, a spring of water flowed from solid rock.
