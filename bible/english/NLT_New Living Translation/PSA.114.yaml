document_id: PSA.114,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When the Israelites escaped from Egypt—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the family of Jacob left that foreign land—
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: the land of Judah became God’s sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel became his kingdom.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The Red Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '114:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 114:5.
      marker-yv: yv-n
    - type: text
      text: ' saw them coming and hurried out of their way!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The water of the Jordan River turned away.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The mountains skipped like rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hills like lambs!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: What’s wrong, Red Sea, that made you hurry out of their way?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What happened, Jordan River, that you turned away?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Why, mountains, did you skip like rams?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why, hills, like lambs?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tremble, O earth, at the presence of the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the presence of the God of Jacob.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He turned the rock into a pool of water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, a spring of water flowed from solid rock.
