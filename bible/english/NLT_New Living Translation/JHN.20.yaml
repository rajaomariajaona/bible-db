document_id: JHN.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: Early on Sunday morning,
  - type: note
    content: Greek On the first day of the week.
  - type: text
    content: ' while it was still dark, Mary Magdalene came to the tomb and found that the stone had been rolled away from the entrance. '
  '10':
  - type: text
    content: Then they went home.
  - type: heading
    content: Jesus Appears to Mary Magdalene
  '11':
  - type: text
    content: 'Mary was standing outside the tomb crying, and as she wept, she stooped and looked in. '
  '12':
  - type: text
    content: 'She saw two white-robed angels, one sitting at the head and the other at the foot of the place where the body of Jesus had been lying. '
  '13':
  - type: text
    content: “Dear woman, why are you crying?” the angels asked her.
  - type: text
    content: “Because they have taken away my Lord,” she replied, “and I don’t know where they have put him.”
  '14':
  - type: text
    content: 'She turned to leave and saw someone standing there. It was Jesus, but she didn’t recognize him. '
  '15':
  - type: text
    content: '“Dear woman, why are you crying?” '
  - type: text
    content: 'Jesus asked her. '
  - type: text
    content: “Who are you looking for?”
  - type: text
    content: She thought he was the gardener. “Sir,” she said, “if you have taken him away, tell me where you have put him, and I will go and get him.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“Mary!” '
  - type: text
    content: Jesus said.
  - type: text
    content: She turned to him and cried out, “Rabboni!” (which is Hebrew for “Teacher”).
  '17':
  - type: text
    content: ' '
  - type: text
    content: '“Don’t cling to me,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “for I haven’t yet ascended to the Father. But go find my brothers and tell them, ‘I am ascending to my Father and your Father, to my God and your God.’”
  '18':
  - type: text
    content: Mary Magdalene found the disciples and told them, “I have seen the Lord!” Then she gave them his message.
  - type: heading
    content: Jesus Appears to His Disciples
  '19':
  - type: text
    content: That Sunday evening
  - type: note
    content: Greek In the evening of that day, the first day of the week.
  - type: text
    content: ' the disciples were meeting behind locked doors because they were afraid of the Jewish leaders. Suddenly, Jesus was standing there among them! '
  - type: text
    content: '“Peace be with you,” '
  - type: text
    content: 'he said. '
  '2':
  - type: text
    content: She ran and found Simon Peter and the other disciple, the one whom Jesus loved. She said, “They have taken the Lord’s body out of the tomb, and we don’t know where they have put him!”
  '20':
  - type: text
    content: 'As he spoke, he showed them the wounds in his hands and his side. They were filled with joy when they saw the Lord! '
  '21':
  - type: text
    content: 'Again he said, '
  - type: text
    content: “Peace be with you. As the Father has sent me, so I am sending you.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Then he breathed on them and said, '
  - type: text
    content: “Receive the Holy Spirit.
  - type: text
    content: ' '
  '23':
  - type: text
    content: If you forgive anyone’s sins, they are forgiven. If you do not forgive them, they are not forgiven.”
  - type: heading
    content: Jesus Appears to Thomas
  '24':
  - type: text
    content: One of the twelve disciples, Thomas (nicknamed the Twin),
  - type: note
    content: Greek Thomas, who was called Didymus.
  - type: text
    content: ' was not with the others when Jesus came. '
  '25':
  - type: text
    content: They told him, “We have seen the Lord!”
  - type: text
    content: But he replied, “I won’t believe it unless I see the nail wounds in his hands, put my fingers into them, and place my hand into the wound in his side.”
  '26':
  - type: text
    content: 'Eight days later the disciples were together again, and this time Thomas was with them. The doors were locked; but suddenly, as before, Jesus was standing among them. '
  - type: text
    content: '“Peace be with you,” '
  - type: text
    content: 'he said. '
  '27':
  - type: text
    content: 'Then he said to Thomas, '
  - type: text
    content: “Put your finger here, and look at my hands. Put your hand into the wound in my side. Don’t be faithless any longer. Believe!”
  '28':
  - type: text
    content: “My Lord and my God!” Thomas exclaimed.
  '29':
  - type: text
    content: 'Then Jesus told him, '
  - type: text
    content: “You believe because you have seen me. Blessed are those who believe without seeing me.”
  - type: heading
    content: Purpose of the Book
  '3':
  - type: text
    content: 'Peter and the other disciple started out for the tomb. '
  '30':
  - type: text
    content: 'The disciples saw Jesus do many other miraculous signs in addition to the ones recorded in this book. '
  '31':
  - type: text
    content: But these are written so that you may continue to believe
  - type: note
    content: Some manuscripts read that you may believe.
  - type: text
    content: ' that Jesus is the Messiah, the Son of God, and that by believing in him you will have life by the power of his name.'
  '4':
  - type: text
    content: 'They were both running, but the other disciple outran Peter and reached the tomb first. '
  '5':
  - type: text
    content: 'He stooped and looked in and saw the linen wrappings lying there, but he didn’t go in. '
  '6':
  - type: text
    content: 'Then Simon Peter arrived and went inside. He also noticed the linen wrappings lying there, '
  '7':
  - type: text
    content: 'while the cloth that had covered Jesus’ head was folded up and lying apart from the other wrappings. '
  '8':
  - type: text
    content: 'Then the disciple who had reached the tomb first also went in, and he saw and believed— '
  '9':
  - type: text
    content: 'for until then they still hadn’t understood the Scriptures that said Jesus must rise from the dead. '
