document_id: JHN.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Resurrection
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Early on Sunday morning,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: On the first day of the week.
    marker-yv: yv-n
  - type: text
    text: ' while it was still dark, Mary Magdalene came to the tomb and found that the stone had been rolled away from the entrance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She ran and found Simon Peter and the other disciple, the one whom Jesus loved. She said, “They have taken the Lord’s body out of the tomb, and we don’t know where they have put him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Peter and the other disciple started out for the tomb. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They were both running, but the other disciple outran Peter and reached the tomb first. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He stooped and looked in and saw the linen wrappings lying there, but he didn’t go in. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Simon Peter arrived and went inside. He also noticed the linen wrappings lying there, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'while the cloth that had covered Jesus’ head was folded up and lying apart from the other wrappings. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the disciple who had reached the tomb first also went in, and he saw and believed— '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'for until then they still hadn’t understood the Scriptures that said Jesus must rise from the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then they went home.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to Mary Magdalene
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mary was standing outside the tomb crying, and as she wept, she stooped and looked in. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'She saw two white-robed angels, one sitting at the head and the other at the foot of the place where the body of Jesus had been lying. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Dear woman, why are you crying?” the angels asked her.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Because they have taken away my Lord,” she replied, “and I don’t know where they have put him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'She turned to leave and saw someone standing there. It was Jesus, but she didn’t recognize him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Dear woman, why are you crying?” '
  - type: text
    text: 'Jesus asked her. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who are you looking for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: She thought he was the gardener. “Sir,” she said, “if you have taken him away, tell me where you have put him, and I will go and get him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Mary!” '
  - type: text
    text: Jesus said.
- type: usfm
  marker: p
  children:
  - type: text
    text: She turned to him and cried out, “Rabboni!” (which is Hebrew for “Teacher”).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Don’t cling to me,” '
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “for I haven’t yet ascended to the Father. But go find my brothers and tell them, ‘I am ascending to my Father and your Father, to my God and your God.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mary Magdalene found the disciples and told them, “I have seen the Lord!” Then she gave them his message.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to His Disciples
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: That Sunday evening
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: In the evening of that day, the first day of the week.
    marker-yv: yv-n
  - type: text
    text: ' the disciples were meeting behind locked doors because they were afraid of the Jewish leaders. Suddenly, Jesus was standing there among them! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Peace be with you,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As he spoke, he showed them the wounds in his hands and his side. They were filled with joy when they saw the Lord! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Again he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be with you. As the Father has sent me, so I am sending you.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then he breathed on them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Receive the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you forgive anyone’s sins, they are forgiven. If you do not forgive them, they are not forgiven.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to Thomas
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: One of the twelve disciples, Thomas (nicknamed the Twin),
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Thomas, who was called Didymus.
    marker-yv: yv-n
  - type: text
    text: ' was not with the others when Jesus came. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They told him, “We have seen the Lord!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he replied, “I won’t believe it unless I see the nail wounds in his hands, put my fingers into them, and place my hand into the wound in his side.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Eight days later the disciples were together again, and this time Thomas was with them. The doors were locked; but suddenly, as before, Jesus was standing among them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Peace be with you,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he said to Thomas, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your finger here, and look at my hands. Put your hand into the wound in my side. Don’t be faithless any longer. Believe!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “My Lord and my God!” Thomas exclaimed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You believe because you have seen me. Blessed are those who believe without seeing me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Purpose of the Book
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The disciples saw Jesus do many other miraculous signs in addition to the ones recorded in this book. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But these are written so that you may continue to believe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that you may believe.
    marker-yv: yv-n
  - type: text
    text: ' that Jesus is the Messiah, the Son of God, and that by believing in him you will have life by the power of his name.'
