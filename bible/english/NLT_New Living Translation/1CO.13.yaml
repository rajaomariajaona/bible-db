document_id: 1CO.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Love Is the Greatest
  - type: text
    content: 'If I could speak all the languages of earth and of angels, but didn’t love others, I would only be a noisy gong or a clanging cymbal. '
  '10':
  - type: text
    content: But when the time of perfection comes, these partial things will become useless.
  '11':
  - type: text
    content: 'When I was a child, I spoke and thought and reasoned as a child. But when I grew up, I put away childish things. '
  '12':
  - type: text
    content: Now we see things imperfectly, like puzzling reflections in a mirror, but then we will see everything with perfect clarity.
  - type: note
    content: Greek see face to face.
  - type: text
    content: ' All that I know now is partial and incomplete, but then I will know everything completely, just as God now knows me completely.'
  '13':
  - type: text
    content: Three things will last forever—faith, hope, and love—and the greatest of these is love.
  '2':
  - type: text
    content: 'If I had the gift of prophecy, and if I understood all of God’s secret plans and possessed all knowledge, and if I had such faith that I could move mountains, but didn’t love others, I would be nothing. '
  '3':
  - type: text
    content: If I gave everything I have to the poor and even sacrificed my body, I could boast about it;
  - type: note
    content: Some manuscripts read sacrificed my body to be burned.
  - type: text
    content: ' but if I didn’t love others, I would have gained nothing.'
  '4':
  - type: text
    content: 'Love is patient and kind. Love is not jealous or boastful or proud '
  '5':
  - type: text
    content: 'or rude. It does not demand its own way. It is not irritable, and it keeps no record of being wronged. '
  '6':
  - type: text
    content: 'It does not rejoice about injustice but rejoices whenever the truth wins out. '
  '7':
  - type: text
    content: Love never gives up, never loses faith, is always hopeful, and endures through every circumstance.
  '8':
  - type: text
    content: Prophecy and speaking in unknown languages
  - type: note
    content: Or in tongues.
  - type: text
    content: ' and special knowledge will become useless. But love will last forever! '
  '9':
  - type: text
    content: 'Now our knowledge is partial and incomplete, and even the gift of prophecy reveals only part of the whole picture! '
