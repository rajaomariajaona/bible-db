document_id: 1CO.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love Is the Greatest
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If I could speak all the languages of earth and of angels, but didn’t love others, I would only be a noisy gong or a clanging cymbal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the time of perfection comes, these partial things will become useless.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I was a child, I spoke and thought and reasoned as a child. But when I grew up, I put away childish things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now we see things imperfectly, like puzzling reflections in a mirror, but then we will see everything with perfect clarity.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: see face to face.
      marker-yv: yv-n
    - type: text
      text: ' All that I know now is partial and incomplete, but then I will know everything completely, just as God now knows me completely.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Three things will last forever—faith, hope, and love—and the greatest of these is love.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If I had the gift of prophecy, and if I understood all of God’s secret plans and possessed all knowledge, and if I had such faith that I could move mountains, but didn’t love others, I would be nothing. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: If I gave everything I have to the poor and even sacrificed my body, I could boast about it;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sacrificed my body to be burned.
      marker-yv: yv-n
    - type: text
      text: ' but if I didn’t love others, I would have gained nothing.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Love is patient and kind. Love is not jealous or boastful or proud '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or rude. It does not demand its own way. It is not irritable, and it keeps no record of being wronged. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It does not rejoice about injustice but rejoices whenever the truth wins out. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Love never gives up, never loses faith, is always hopeful, and endures through every circumstance.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prophecy and speaking in unknown languages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in tongues.
      marker-yv: yv-n
    - type: text
      text: ' and special knowledge will become useless. But love will last forever! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now our knowledge is partial and incomplete, and even the gift of prophecy reveals only part of the whole picture! '
