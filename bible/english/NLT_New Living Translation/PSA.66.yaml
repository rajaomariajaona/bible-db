document_id: PSA.66,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A song. A psalm.'
  - type: text
    content: Shout joyful praises to God, all the earth!
  '10':
  - type: text
    content: You have tested us, O God;
  - type: text
    content: you have purified us like silver.
  '11':
  - type: text
    content: You captured us in your net
  - type: text
    content: and laid the burden of slavery on our backs.
  '12':
  - type: text
    content: Then you put a leader over us.
  - type: note
    content: Or You made people ride over our heads.
  - type: text
    content: We went through fire and flood,
  - type: text
    content: but you brought us to a place of great abundance.
  '13':
  - type: text
    content: Now I come to your Temple with burnt offerings
  - type: text
    content: to fulfill the vows I made to you—
  '14':
  - type: text
    content: yes, the sacred vows that I made
  - type: text
    content: when I was in deep trouble.
  '15':
  - type: text
    content: That is why I am sacrificing burnt offerings to you—
  - type: text
    content: the best of my rams as a pleasing aroma,
  - type: text
    content: 'and a sacrifice of bulls and male goats. '
  - type: text
    content: Interlude
  '16':
  - type: text
    content: Come and listen, all you who fear God,
  - type: text
    content: and I will tell you what he did for me.
  '17':
  - type: text
    content: For I cried out to him for help,
  - type: text
    content: praising him as I spoke.
  '18':
  - type: text
    content: If I had not confessed the sin in my heart,
  - type: text
    content: the Lord would not have listened.
  '19':
  - type: text
    content: But God did listen!
  - type: text
    content: He paid attention to my prayer.
  '2':
  - type: text
    content: Sing about the glory of his name!
  - type: text
    content: Tell the world how glorious he is.
  '20':
  - type: text
    content: Praise God, who did not ignore my prayer
  - type: text
    content: or withdraw his unfailing love from me.
  '3':
  - type: text
    content: Say to God, “How awesome are your deeds!
  - type: text
    content: Your enemies cringe before your mighty power.
  '4':
  - type: text
    content: Everything on earth will worship you;
  - type: text
    content: they will sing your praises,
  - type: text
    content: 'shouting your name in glorious songs.” '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: Come and see what our God has done,
  - type: text
    content: what awesome miracles he performs for people!
  '6':
  - type: text
    content: He made a dry path through the Red Sea,
  - type: note
    content: Hebrew the sea.
  - type: text
    content: and his people went across on foot.
  - type: text
    content: There we rejoiced in him.
  '7':
  - type: text
    content: For by his great power he rules forever.
  - type: text
    content: He watches every movement of the nations;
  - type: text
    content: 'let no rebel rise in defiance. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: Let the whole world bless our God
  - type: text
    content: and loudly sing his praises.
  '9':
  - type: text
    content: Our lives are in his hands,
  - type: text
    content: and he keeps our feet from stumbling.
