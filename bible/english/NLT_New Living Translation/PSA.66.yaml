document_id: PSA.66,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A song. A psalm.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Shout joyful praises to God, all the earth!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You have tested us, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have purified us like silver.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You captured us in your net
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laid the burden of slavery on our backs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then you put a leader over us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: You made people ride over our heads.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We went through fire and flood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you brought us to a place of great abundance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Now I come to your Temple with burnt offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to fulfill the vows I made to you—
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: yes, the sacred vows that I made
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I was in deep trouble.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: That is why I am sacrificing burnt offerings to you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the best of my rams as a pleasing aroma,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and a sacrifice of bulls and male goats. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Come and listen, all you who fear God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will tell you what he did for me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For I cried out to him for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: praising him as I spoke.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If I had not confessed the sin in my heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord would not have listened.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: But God did listen!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He paid attention to my prayer.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sing about the glory of his name!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell the world how glorious he is.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Praise God, who did not ignore my prayer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or withdraw his unfailing love from me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Say to God, “How awesome are your deeds!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your enemies cringe before your mighty power.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Everything on earth will worship you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will sing your praises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'shouting your name in glorious songs.” '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Come and see what our God has done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what awesome miracles he performs for people!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He made a dry path through the Red Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his people went across on foot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There we rejoiced in him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For by his great power he rules forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He watches every movement of the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let no rebel rise in defiance. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let the whole world bless our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and loudly sing his praises.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Our lives are in his hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he keeps our feet from stumbling.
