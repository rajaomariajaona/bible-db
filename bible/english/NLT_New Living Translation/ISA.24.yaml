document_id: ISA.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Destruction of the Earth
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to destroy the earth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make it a vast wasteland.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He devastates the surface of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scatters the people.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city writhes in chaos;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every home is locked to keep out intruders.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mobs gather in the streets, crying out for wine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Joy has turned to gloom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gladness has been banished from the land.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city is left in ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its gates battered down.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Throughout the earth the story is the same—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only a remnant is left,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the stray olives left on the tree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the few grapes left on the vine after harvest.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But all who are left shout and sing for joy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those in the west praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s majesty.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In eastern lands, give glory to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the lands beyond the sea, praise the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We hear songs of praise from the ends of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: songs that give glory to the Righteous One!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my heart is heavy with grief.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Weep for me, for I wither away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deceit still prevails,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and treachery is everywhere.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terror and traps and snares will be your lot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you people of the earth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who flee in terror will fall into a trap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who escape the trap will be caught in a snare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destruction falls like rain from the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the foundations of the earth shake.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth has broken up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It has utterly collapsed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is violently shaken.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Priests and laypeople,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: servants and masters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maids and mistresses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buyers and sellers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lenders and borrowers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bankers and debtors—none will be spared.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth staggers like a drunk.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It trembles like a tent in a storm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It falls and will not rise again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the guilt of its rebellion is very heavy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will punish the gods in the heavens'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the proud rulers of the nations on earth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be rounded up and put in prison.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be shut up in prison
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will finally be punished.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the glory of the moon will wane,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the brightness of the sun will fade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies will rule on Mount Zion.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will rule in great glory in Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sight of all the leaders of his people.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will be completely emptied and looted.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth mourns and dries up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the land wastes away and withers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the greatest people on earth waste away.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth suffers for the sins of its people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have twisted God’s instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: violated his laws,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and broken his everlasting covenant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, a curse consumes the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its people must pay the price for their sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are destroyed by fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and only a few are left alive.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grapevines waste away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no new wine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the merrymakers sigh and mourn.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cheerful sound of tambourines is stilled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the happy cries of celebration are heard no more.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The melodious chords of the harp are silent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gone are the joys of wine and song;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: alcoholic drink turns bitter in the mouth.
