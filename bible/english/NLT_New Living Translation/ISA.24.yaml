document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction of the Earth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is about to destroy the earth'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make it a vast wasteland.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He devastates the surface of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scatters the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Priests and laypeople,
- type: usfm
  marker: q2
  children:
  - type: text
    text: servants and masters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: maids and mistresses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: buyers and sellers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lenders and borrowers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bankers and debtors—none will be spared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The earth will be completely emptied and looted.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The earth mourns and dries up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the land wastes away and withers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even the greatest people on earth waste away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The earth suffers for the sins of its people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they have twisted God’s instructions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: violated his laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and broken his everlasting covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore, a curse consumes the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Its people must pay the price for their sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are destroyed by fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and only a few are left alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The grapevines waste away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is no new wine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the merrymakers sigh and mourn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The cheerful sound of tambourines is stilled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the happy cries of celebration are heard no more.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The melodious chords of the harp are silent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Gone are the joys of wine and song;
- type: usfm
  marker: q2
  children:
  - type: text
    text: alcoholic drink turns bitter in the mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The city writhes in chaos;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every home is locked to keep out intruders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mobs gather in the streets, crying out for wine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Joy has turned to gloom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gladness has been banished from the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The city is left in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its gates battered down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Throughout the earth the story is the same—
- type: usfm
  marker: q2
  children:
  - type: text
    text: only a remnant is left,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like the stray olives left on the tree
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the few grapes left on the vine after harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But all who are left shout and sing for joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Those in the west praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In eastern lands, give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the lands beyond the sea, praise the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: We hear songs of praise from the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: songs that give glory to the Righteous One!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my heart is heavy with grief.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Weep for me, for I wither away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deceit still prevails,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treachery is everywhere.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Terror and traps and snares will be your lot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you people of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Those who flee in terror will fall into a trap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who escape the trap will be caught in a snare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destruction falls like rain from the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foundations of the earth shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The earth has broken up.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It has utterly collapsed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is violently shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The earth staggers like a drunk.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It trembles like a tent in a storm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It falls and will not rise again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the guilt of its rebellion is very heavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will punish the gods in the heavens'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the proud rulers of the nations on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They will be rounded up and put in prison.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will be shut up in prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will finally be punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then the glory of the moon will wane,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the brightness of the sun will fade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will rule on Mount Zion.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will rule in great glory in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the sight of all the leaders of his people.
