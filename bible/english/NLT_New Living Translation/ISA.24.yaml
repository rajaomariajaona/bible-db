document_id: ISA.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Destruction of the Earth
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is about to destroy the earth'
  - type: text
    content: and make it a vast wasteland.
  - type: text
    content: He devastates the surface of the earth
  - type: text
    content: and scatters the people.
  '10':
  - type: text
    content: The city writhes in chaos;
  - type: text
    content: every home is locked to keep out intruders.
  '11':
  - type: text
    content: Mobs gather in the streets, crying out for wine.
  - type: text
    content: Joy has turned to gloom.
  - type: text
    content: Gladness has been banished from the land.
  '12':
  - type: text
    content: The city is left in ruins,
  - type: text
    content: its gates battered down.
  '13':
  - type: text
    content: Throughout the earth the story is the same—
  - type: text
    content: only a remnant is left,
  - type: text
    content: like the stray olives left on the tree
  - type: text
    content: or the few grapes left on the vine after harvest.
  '14':
  - type: text
    content: But all who are left shout and sing for joy.
  - type: text
    content: 'Those in the west praise the '
  - type: text
    content: Lord
  - type: text
    content: ’s majesty.
  '15':
  - type: text
    content: 'In eastern lands, give glory to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'In the lands beyond the sea, praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '16':
  - type: text
    content: We hear songs of praise from the ends of the earth,
  - type: text
    content: songs that give glory to the Righteous One!
  - type: text
    content: But my heart is heavy with grief.
  - type: text
    content: Weep for me, for I wither away.
  - type: text
    content: Deceit still prevails,
  - type: text
    content: and treachery is everywhere.
  '17':
  - type: text
    content: Terror and traps and snares will be your lot,
  - type: text
    content: you people of the earth.
  '18':
  - type: text
    content: Those who flee in terror will fall into a trap,
  - type: text
    content: and those who escape the trap will be caught in a snare.
  - type: text
    content: Destruction falls like rain from the heavens;
  - type: text
    content: the foundations of the earth shake.
  '19':
  - type: text
    content: The earth has broken up.
  - type: text
    content: It has utterly collapsed;
  - type: text
    content: it is violently shaken.
  '2':
  - type: text
    content: Priests and laypeople,
  - type: text
    content: servants and masters,
  - type: text
    content: maids and mistresses,
  - type: text
    content: buyers and sellers,
  - type: text
    content: lenders and borrowers,
  - type: text
    content: bankers and debtors—none will be spared.
  '20':
  - type: text
    content: The earth staggers like a drunk.
  - type: text
    content: It trembles like a tent in a storm.
  - type: text
    content: It falls and will not rise again,
  - type: text
    content: for the guilt of its rebellion is very heavy.
  '21':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish the gods in the heavens'
  - type: text
    content: and the proud rulers of the nations on earth.
  '22':
  - type: text
    content: They will be rounded up and put in prison.
  - type: text
    content: They will be shut up in prison
  - type: text
    content: and will finally be punished.
  '23':
  - type: text
    content: Then the glory of the moon will wane,
  - type: text
    content: and the brightness of the sun will fade,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will rule on Mount Zion.'
  - type: text
    content: He will rule in great glory in Jerusalem,
  - type: text
    content: in the sight of all the leaders of his people.
  '3':
  - type: text
    content: The earth will be completely emptied and looted.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken!'
  '4':
  - type: text
    content: The earth mourns and dries up,
  - type: text
    content: and the land wastes away and withers.
  - type: text
    content: Even the greatest people on earth waste away.
  '5':
  - type: text
    content: The earth suffers for the sins of its people,
  - type: text
    content: for they have twisted God’s instructions,
  - type: text
    content: violated his laws,
  - type: text
    content: and broken his everlasting covenant.
  '6':
  - type: text
    content: Therefore, a curse consumes the earth.
  - type: text
    content: Its people must pay the price for their sin.
  - type: text
    content: They are destroyed by fire,
  - type: text
    content: and only a few are left alive.
  '7':
  - type: text
    content: The grapevines waste away,
  - type: text
    content: and there is no new wine.
  - type: text
    content: All the merrymakers sigh and mourn.
  '8':
  - type: text
    content: The cheerful sound of tambourines is stilled;
  - type: text
    content: the happy cries of celebration are heard no more.
  - type: text
    content: The melodious chords of the harp are silent.
  '9':
  - type: text
    content: Gone are the joys of wine and song;
  - type: text
    content: alcoholic drink turns bitter in the mouth.
