document_id: PSA.98,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sing a new song to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has done wonderful deeds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His right hand has won a mighty victory;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his holy arm has shown his saving power!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has announced his victory'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has revealed his righteousness to every nation!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He has remembered his promise to love and be faithful to Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The ends of the earth have seen the victory of our God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Shout to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: break out in praise and sing for joy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sing your praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the harp,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the harp and melodious song,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: with trumpets and the sound of the ram’s horn.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Make a joyful symphony before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the King!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let the sea and everything in it shout his praise!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the earth and all living things join in.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let the rivers clap their hands in glee!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the hills sing out their songs of joy
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he is coming to judge the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will judge the world with justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the nations with fairness.
