document_id: PSA.98,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm.
  - type: text
    content: 'Sing a new song to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he has done wonderful deeds.
  - type: text
    content: His right hand has won a mighty victory;
  - type: text
    content: his holy arm has shown his saving power!
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has announced his victory'
  - type: text
    content: and has revealed his righteousness to every nation!
  '3':
  - type: text
    content: He has remembered his promise to love and be faithful to Israel.
  - type: text
    content: The ends of the earth have seen the victory of our God.
  '4':
  - type: text
    content: 'Shout to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth;'
  - type: text
    content: break out in praise and sing for joy!
  '5':
  - type: text
    content: 'Sing your praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' with the harp,'
  - type: text
    content: with the harp and melodious song,
  '6':
  - type: text
    content: with trumpets and the sound of the ram’s horn.
  - type: text
    content: 'Make a joyful symphony before the '
  - type: text
    content: Lord
  - type: text
    content: ', the King!'
  '7':
  - type: text
    content: Let the sea and everything in it shout his praise!
  - type: text
    content: Let the earth and all living things join in.
  '8':
  - type: text
    content: Let the rivers clap their hands in glee!
  - type: text
    content: Let the hills sing out their songs of joy
  '9':
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he is coming to judge the earth.
  - type: text
    content: He will judge the world with justice,
  - type: text
    content: and the nations with fairness.
