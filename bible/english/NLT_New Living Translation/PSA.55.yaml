document_id: PSA.55,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of David, to be accompanied by stringed instruments.'
  - type: text
    content: Listen to my prayer, O God.
  - type: text
    content: Do not ignore my cry for help!
  '10':
  - type: text
    content: Its walls are patrolled day and night against invaders,
  - type: text
    content: but the real danger is wickedness within the city.
  '11':
  - type: text
    content: Everything is falling apart;
  - type: text
    content: threats and cheating are rampant in the streets.
  '12':
  - type: text
    content: It is not an enemy who taunts me—
  - type: text
    content: I could bear that.
  - type: text
    content: It is not my foes who so arrogantly insult me—
  - type: text
    content: I could have hidden from them.
  '13':
  - type: text
    content: Instead, it is you—my equal,
  - type: text
    content: my companion and close friend.
  '14':
  - type: text
    content: What good fellowship we once enjoyed
  - type: text
    content: as we walked together to the house of God.
  '15':
  - type: text
    content: Let death stalk my enemies;
  - type: text
    content: let the grave
  - type: note
    content: Hebrew let Sheol.
  - type: text
    content: ' swallow them alive,'
  - type: text
    content: for evil makes its home within them.
  '16':
  - type: text
    content: But I will call on God,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will rescue me.'
  '17':
  - type: text
    content: Morning, noon, and night
  - type: text
    content: I cry out in my distress,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' hears my voice.'
  '18':
  - type: text
    content: He ransoms me and keeps me safe
  - type: text
    content: from the battle waged against me,
  - type: text
    content: though many still oppose me.
  '19':
  - type: text
    content: God, who has ruled forever,
  - type: text
    content: 'will hear me and humble them. '
  - type: text
    content: Interlude
  - type: text
    content: For my enemies refuse to change their ways;
  - type: text
    content: they do not fear God.
  '2':
  - type: text
    content: Please listen and answer me,
  - type: text
    content: for I am overwhelmed by my troubles.
  '20':
  - type: text
    content: As for my companion, he betrayed his friends;
  - type: text
    content: he broke his promises.
  '21':
  - type: text
    content: His words are as smooth as butter,
  - type: text
    content: but in his heart is war.
  - type: text
    content: His words are as soothing as lotion,
  - type: text
    content: but underneath are daggers!
  '22':
  - type: text
    content: 'Give your burdens to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he will take care of you.
  - type: text
    content: He will not permit the godly to slip and fall.
  '23':
  - type: text
    content: But you, O God, will send the wicked
  - type: text
    content: down to the pit of destruction.
  - type: text
    content: Murderers and liars will die young,
  - type: text
    content: but I am trusting you to save me.
  '3':
  - type: text
    content: My enemies shout at me,
  - type: text
    content: making loud and wicked threats.
  - type: text
    content: They bring trouble on me
  - type: text
    content: and angrily hunt me down.
  '4':
  - type: text
    content: My heart pounds in my chest.
  - type: text
    content: The terror of death assaults me.
  '5':
  - type: text
    content: Fear and trembling overwhelm me,
  - type: text
    content: and I can’t stop shaking.
  '6':
  - type: text
    content: Oh, that I had wings like a dove;
  - type: text
    content: then I would fly away and rest!
  '7':
  - type: text
    content: I would fly far away
  - type: text
    content: 'to the quiet of the wilderness. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: How quickly I would escape—
  - type: text
    content: far from this wild storm of hatred.
  '9':
  - type: text
    content: Confuse them, Lord, and frustrate their plans,
  - type: text
    content: for I see violence and conflict in the city.
