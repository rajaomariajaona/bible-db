document_id: PSA.55
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maskil. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David, to be accompanied by stringed instruments.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to my prayer, O God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not ignore my cry for help!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Please listen and answer me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am overwhelmed by my troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My enemies shout at me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making loud and wicked threats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They bring trouble on me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and angrily hunt me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My heart pounds in my chest.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The terror of death assaults me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fear and trembling overwhelm me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I can’t stop shaking.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oh, that I had wings like a dove;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I would fly away and rest!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I would fly far away
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the quiet of the wilderness. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: How quickly I would escape—
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from this wild storm of hatred.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Confuse them, Lord, and frustrate their plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I see violence and conflict in the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Its walls are patrolled day and night against invaders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the real danger is wickedness within the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Everything is falling apart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: threats and cheating are rampant in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is not an enemy who taunts me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could bear that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is not my foes who so arrogantly insult me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could have hidden from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Instead, it is you—my equal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my companion and close friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: What good fellowship we once enjoyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: as we walked together to the house of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let death stalk my enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: let Sheol.
    marker-yv: yv-n
  - type: text
    text: ' swallow them alive,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for evil makes its home within them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But I will call on God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will rescue me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Morning, noon, and night
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry out in my distress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hears my voice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He ransoms me and keeps me safe
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the battle waged against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though many still oppose me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God, who has ruled forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will hear me and humble them. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my enemies refuse to change their ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not fear God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: As for my companion, he betrayed his friends;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he broke his promises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: His words are as smooth as butter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in his heart is war.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His words are as soothing as lotion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but underneath are daggers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Give your burdens to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will take care of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will not permit the godly to slip and fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But you, O God, will send the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: down to the pit of destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Murderers and liars will die young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I am trusting you to save me.
