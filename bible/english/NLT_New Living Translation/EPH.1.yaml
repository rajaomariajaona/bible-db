document_id: EPH.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus.
  - type: text
    content: I am writing to God’s holy people in Ephesus,
  - type: note
    content: The most ancient manuscripts do not include in Ephesus.
  - type: text
    content: ' who are faithful followers of Christ Jesus.'
  '10':
  - type: text
    content: 'And this is the plan: At the right time he will bring everything together under the authority of Christ—everything in heaven and on earth. '
  '11':
  - type: text
    content: Furthermore, because we are united with Christ, we have received an inheritance from God,
  - type: note
    content: Or we have become God’s inheritance.
  - type: text
    content: ' for he chose us in advance, and he makes everything work out according to his plan.'
  '12':
  - type: text
    content: 'God’s purpose was that we Jews who were the first to trust in Christ would bring praise and glory to God. '
  '13':
  - type: text
    content: And now you Gentiles have also heard the truth, the Good News that God saves you. And when you believed in Christ, he identified you as his own
  - type: note
    content: Or he put his seal on you.
  - type: text
    content: ' by giving you the Holy Spirit, whom he promised long ago. '
  '14':
  - type: text
    content: The Spirit is God’s guarantee that he will give us the inheritance he promised and that he has purchased us to be his own people. He did this so we would praise and glorify him.
  - type: heading
    content: Paul’s Prayer for Spiritual Wisdom
  '15':
  - type: text
    content: Ever since I first heard of your strong faith in the Lord Jesus and your love for God’s people everywhere,
  - type: note
    content: Some manuscripts read your faithfulness to the Lord Jesus and to God’s people everywhere.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'I have not stopped thanking God for you. I pray for you constantly, '
  '17':
  - type: text
    content: asking God, the glorious Father of our Lord Jesus Christ, to give you spiritual wisdom
  - type: note
    content: Or to give you the Spirit of wisdom.
  - type: text
    content: ' and insight so that you might grow in your knowledge of God. '
  '18':
  - type: text
    content: I pray that your hearts will be flooded with light so that you can understand the confident hope he has given to those he called—his holy people who are his rich and glorious inheritance.
  - type: note
    content: Or called, and the rich and glorious inheritance he has given to his holy people.
  '19':
  - type: text
    content: 'I also pray that you will understand the incredible greatness of God’s power for us who believe him. This is the same mighty power '
  '2':
  - type: text
    content: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: heading
    content: Spiritual Blessings
  '20':
  - type: text
    content: 'that raised Christ from the dead and seated him in the place of honor at God’s right hand in the heavenly realms. '
  '21':
  - type: text
    content: 'Now he is far above any ruler or authority or power or leader or anything else—not only in this world but also in the world to come. '
  '22':
  - type: text
    content: 'God has put all things under the authority of Christ and has made him head over all things for the benefit of the church. '
  '23':
  - type: text
    content: And the church is his body; it is made full and complete by Christ, who fills all things everywhere with himself.
  '3':
  - type: text
    content: 'All praise to God, the Father of our Lord Jesus Christ, who has blessed us with every spiritual blessing in the heavenly realms because we are united with Christ. '
  '4':
  - type: text
    content: 'Even before he made the world, God loved us and chose us in Christ to be holy and without fault in his eyes. '
  '5':
  - type: text
    content: 'God decided in advance to adopt us into his own family by bringing us to himself through Jesus Christ. This is what he wanted to do, and it gave him great pleasure. '
  '6':
  - type: text
    content: So we praise God for the glorious grace he has poured out on us who belong to his dear Son.
  - type: note
    content: Greek to us in the beloved.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'He is so rich in kindness and grace that he purchased our freedom with the blood of his Son and forgave our sins. '
  '8':
  - type: text
    content: He has showered his kindness on us, along with all wisdom and understanding.
  '9':
  - type: text
    content: 'God has now revealed to us his mysterious will regarding Christ—which is to fulfill his own good plan. '
