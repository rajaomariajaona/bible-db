document_id: 2CH.20,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: War with Surrounding Nations
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: After this, the armies of the Moabites, Ammonites, and some of the Meunites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 26:7); Hebrew repeats '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ammonites.
      marker-yv: yv-n
    - type: text
      text: ' declared war on Jehoshaphat. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And now see what the armies of Ammon, Moab, and Mount Seir are doing. You would not let our ancestors invade those nations when Israel left Egypt, so they went around them and did not destroy them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now see how they reward us! For they have come to throw us out of your land, which you gave us as an inheritance. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: O our God, won’t you stop them? We are powerless against this mighty army that is about to attack us. We do not know what to do, but we are looking to you for help.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As all the men of Judah stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with their little ones, wives, and children, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came upon one of the men standing there. His name was Jahaziel son of Zechariah, son of Benaiah, son of Jeiel, son of Mattaniah, a Levite who was a descendant of Asaph.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “Listen, all you people of Judah and Jerusalem! Listen, King Jehoshaphat! This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do not be afraid! Don’t be discouraged by this mighty army, for the battle is not yours, but God’s. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tomorrow, march out against them. You will find them coming up through the ascent of Ziz at the end of the valley that opens into the wilderness of Jeruel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you will not even need to fight. Take your positions; then stand still and watch the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s victory. He is with you, O people of Judah and Jerusalem. Do not be afraid or discouraged. Go out against them tomorrow, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with you!”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Jehoshaphat bowed low with his face to the ground. And all the people of Judah and Jerusalem did the same, worshiping the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Levites from the clans of Kohath and Korah stood to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, with a very loud shout.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Messengers came and told Jehoshaphat, “A vast army from Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in one Hebrew manuscript; most Hebrew manuscripts and ancient versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aram.
      marker-yv: yv-n
    - type: text
      text: ' is marching against you from beyond the Dead Sea.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' They are already at Hazazon-tamar.” (This was another name for En-gedi.)'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning the army of Judah went out into the wilderness of Tekoa. On the way Jehoshaphat stopped and said, “Listen to me, all you people of Judah and Jerusalem! Believe in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and you will be able to stand firm. Believe in his prophets, and you will succeed.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After consulting the people, the king appointed singers to walk ahead of the army, singing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and praising him for his holy splendor. This is what they sang:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his faithful love endures forever!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the very moment they began to sing and give praise, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' caused the armies of Ammon, Moab, and Mount Seir to start fighting among themselves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The armies of Moab and Ammon turned against their allies from Mount Seir and killed every one of them. After they had destroyed the army of Seir, they began attacking each other. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when the army of Judah arrived at the lookout point in the wilderness, all they saw were dead bodies lying on the ground as far as they could see. Not a single one of the enemy had escaped.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Jehoshaphat and his men went out to gather the plunder. They found vast amounts of equipment, clothing,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Latin Vulgate; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: corpses.
      marker-yv: yv-n
    - type: text
      text: ' and other valuables—more than they could carry. There was so much plunder that it took them three days just to collect it all! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the fourth day they gathered in the Valley of Blessing,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: valley of Beracah.
      marker-yv: yv-n
    - type: text
      text: ' which got its name that day because the people praised and thanked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' there. It is still called the Valley of Blessing today.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the men returned to Jerusalem, with Jehoshaphat leading them, overjoyed that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given them victory over their enemies. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They marched into Jerusalem to the music of harps, lyres, and trumpets, and they proceeded to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the surrounding kingdoms heard that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: 'himself had fought against the enemies of Israel, the fear of God came over them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat was terrified by this news and begged the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for guidance. He also ordered everyone in Judah to begin fasting. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jehoshaphat’s kingdom was at peace, for his God had given him rest on every side.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of Jehoshaphat’s Reign
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Jehoshaphat ruled over the land of Judah. He was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother was Azubah, the daughter of Shilhi.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat was a good king, following the ways of his father, Asa. He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: During his reign, however, he failed to remove all the pagan shrines, and the people never fully committed themselves to follow the God of their ancestors.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events of Jehoshaphat’s reign, from beginning to end, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Record of Jehu Son of Hanani,
    - type: text
      text: ' which is included in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the Kings of Israel.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some time later King Jehoshaphat of Judah made an alliance with King Ahaziah of Israel, who was very wicked.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who made him do what was wicked.
      marker-yv: yv-n
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Together they built a fleet of trading ships
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fleet of ships that could go to Tarshish.
      marker-yv: yv-n
    - type: text
      text: ' at the port of Ezion-geber. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eliezer son of Dodavahu from Mareshah prophesied against Jehoshaphat. He said, “Because you have allied yourself with King Ahaziah, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will destroy your work.” So the ships met with disaster and never put out to sea.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: never set sail for Tarshish.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So people from all the towns of Judah came to Jerusalem to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s help.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat stood before the community of Judah and Jerusalem in front of the new courtyard at the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of our ancestors, you alone are the God who is in heaven. You are ruler of all the kingdoms of the earth. You are powerful and mighty; no one can stand against you! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O our God, did you not drive out those who lived in this land when your people Israel arrived? And did you not give this land forever to the descendants of your friend Abraham? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your people settled here and built this Temple to honor your name. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, ‘Whenever we are faced with any calamity such as war,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sword of judgment; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sword, judgment.
      marker-yv: yv-n
    - type: text
      text: ' plague, or famine, we can come to stand in your presence before this Temple where your name is honored. We can cry out to you to save us, and you will hear us and rescue us.’'
