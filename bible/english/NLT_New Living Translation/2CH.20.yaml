document_id: 2CH.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: War with Surrounding Nations
  - type: text
    content: After this, the armies of the Moabites, Ammonites, and some of the Meunites
  - type: note
    content: As in some Greek manuscripts (see also 26:7); Hebrew repeats Ammonites.
  - type: text
    content: ' declared war on Jehoshaphat. '
  '10':
  - type: text
    content: '“And now see what the armies of Ammon, Moab, and Mount Seir are doing. You would not let our ancestors invade those nations when Israel left Egypt, so they went around them and did not destroy them. '
  '11':
  - type: text
    content: 'Now see how they reward us! For they have come to throw us out of your land, which you gave us as an inheritance. '
  '12':
  - type: text
    content: O our God, won’t you stop them? We are powerless against this mighty army that is about to attack us. We do not know what to do, but we are looking to you for help.”
  '13':
  - type: text
    content: 'As all the men of Judah stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' with their little ones, wives, and children, '
  '14':
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon one of the men standing there. His name was Jahaziel son of Zechariah, son of Benaiah, son of Jeiel, son of Mattaniah, a Levite who was a descendant of Asaph.'
  '15':
  - type: text
    content: 'He said, “Listen, all you people of Judah and Jerusalem! Listen, King Jehoshaphat! This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not be afraid! Don’t be discouraged by this mighty army, for the battle is not yours, but God’s. '
  '16':
  - type: text
    content: 'Tomorrow, march out against them. You will find them coming up through the ascent of Ziz at the end of the valley that opens into the wilderness of Jeruel. '
  '17':
  - type: text
    content: 'But you will not even need to fight. Take your positions; then stand still and watch the '
  - type: text
    content: Lord
  - type: text
    content: '’s victory. He is with you, O people of Judah and Jerusalem. Do not be afraid or discouraged. Go out against them tomorrow, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is with you!”'
  '18':
  - type: text
    content: 'Then King Jehoshaphat bowed low with his face to the ground. And all the people of Judah and Jerusalem did the same, worshiping the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Then the Levites from the clans of Kohath and Korah stood to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with a very loud shout.'
  '2':
  - type: text
    content: Messengers came and told Jehoshaphat, “A vast army from Edom
  - type: note
    content: As in one Hebrew manuscript; most Hebrew manuscripts and ancient versions read Aram.
  - type: text
    content: ' is marching against you from beyond the Dead Sea.'
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' They are already at Hazazon-tamar.” (This was another name for En-gedi.)'
  '20':
  - type: text
    content: 'Early the next morning the army of Judah went out into the wilderness of Tekoa. On the way Jehoshaphat stopped and said, “Listen to me, all you people of Judah and Jerusalem! Believe in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and you will be able to stand firm. Believe in his prophets, and you will succeed.”'
  '21':
  - type: text
    content: 'After consulting the people, the king appointed singers to walk ahead of the army, singing to the '
  - type: text
    content: Lord
  - type: text
    content: ' and praising him for his holy splendor. This is what they sang:'
  - type: text
    content: '“Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: his faithful love endures forever!”
  '22':
  - type: text
    content: 'At the very moment they began to sing and give praise, the '
  - type: text
    content: Lord
  - type: text
    content: ' caused the armies of Ammon, Moab, and Mount Seir to start fighting among themselves. '
  '23':
  - type: text
    content: 'The armies of Moab and Ammon turned against their allies from Mount Seir and killed every one of them. After they had destroyed the army of Seir, they began attacking each other. '
  '24':
  - type: text
    content: So when the army of Judah arrived at the lookout point in the wilderness, all they saw were dead bodies lying on the ground as far as they could see. Not a single one of the enemy had escaped.
  '25':
  - type: text
    content: King Jehoshaphat and his men went out to gather the plunder. They found vast amounts of equipment, clothing,
  - type: note
    content: As in some Hebrew manuscripts and Latin Vulgate; most Hebrew manuscripts read corpses.
  - type: text
    content: ' and other valuables—more than they could carry. There was so much plunder that it took them three days just to collect it all! '
  '26':
  - type: text
    content: On the fourth day they gathered in the Valley of Blessing,
  - type: note
    content: Hebrew valley of Beracah.
  - type: text
    content: ' which got its name that day because the people praised and thanked the '
  - type: text
    content: Lord
  - type: text
    content: ' there. It is still called the Valley of Blessing today.'
  '27':
  - type: text
    content: 'Then all the men returned to Jerusalem, with Jehoshaphat leading them, overjoyed that the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them victory over their enemies. '
  '28':
  - type: text
    content: 'They marched into Jerusalem to the music of harps, lyres, and trumpets, and they proceeded to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: 'When all the surrounding kingdoms heard that the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'himself had fought against the enemies of Israel, the fear of God came over them. '
  '3':
  - type: text
    content: 'Jehoshaphat was terrified by this news and begged the '
  - type: text
    content: Lord
  - type: text
    content: ' for guidance. He also ordered everyone in Judah to begin fasting. '
  '30':
  - type: text
    content: So Jehoshaphat’s kingdom was at peace, for his God had given him rest on every side.
  - type: heading
    content: Summary of Jehoshaphat’s Reign
  '31':
  - type: text
    content: So Jehoshaphat ruled over the land of Judah. He was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother was Azubah, the daughter of Shilhi.
  '32':
  - type: text
    content: 'Jehoshaphat was a good king, following the ways of his father, Asa. He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. '
  '33':
  - type: text
    content: During his reign, however, he failed to remove all the pagan shrines, and the people never fully committed themselves to follow the God of their ancestors.
  '34':
  - type: text
    content: 'The rest of the events of Jehoshaphat’s reign, from beginning to end, are recorded in '
  - type: text
    content: The Record of Jehu Son of Hanani,
  - type: text
    content: ' which is included in '
  - type: text
    content: The Book of the Kings of Israel.
  '35':
  - type: text
    content: Some time later King Jehoshaphat of Judah made an alliance with King Ahaziah of Israel, who was very wicked.
  - type: note
    content: Or who made him do what was wicked.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Together they built a fleet of trading ships
  - type: note
    content: Hebrew fleet of ships that could go to Tarshish.
  - type: text
    content: ' at the port of Ezion-geber. '
  '37':
  - type: text
    content: 'Then Eliezer son of Dodavahu from Mareshah prophesied against Jehoshaphat. He said, “Because you have allied yourself with King Ahaziah, the '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy your work.” So the ships met with disaster and never put out to sea.'
  - type: note
    content: Hebrew never set sail for Tarshish.
  '4':
  - type: text
    content: 'So people from all the towns of Judah came to Jerusalem to seek the '
  - type: text
    content: Lord
  - type: text
    content: ’s help.
  '5':
  - type: text
    content: 'Jehoshaphat stood before the community of Judah and Jerusalem in front of the new courtyard at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'He prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of our ancestors, you alone are the God who is in heaven. You are ruler of all the kingdoms of the earth. You are powerful and mighty; no one can stand against you! '
  '7':
  - type: text
    content: 'O our God, did you not drive out those who lived in this land when your people Israel arrived? And did you not give this land forever to the descendants of your friend Abraham? '
  '8':
  - type: text
    content: 'Your people settled here and built this Temple to honor your name. '
  '9':
  - type: text
    content: They said, ‘Whenever we are faced with any calamity such as war,
  - type: note
    content: Or sword of judgment; or sword, judgment.
  - type: text
    content: ' plague, or famine, we can come to stand in your presence before this Temple where your name is honored. We can cry out to you to save us, and you will hear us and rescue us.’'
