document_id: PRO.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Don’t brag about tomorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since you don’t know what the day will bring.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Never abandon a friend—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: either yours or your father’s.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When disaster strikes, you won’t have to ask your brother for assistance.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s better to go to a neighbor than to a brother who lives far away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Be wise, my child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my son.
      marker-yv: yv-n
    - type: text
      text: ' and make my heart glad.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I will be able to answer my critics.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A prudent person foresees danger and takes precautions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The simpleton goes blindly on and suffers the consequences.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Get security from someone who guarantees a stranger’s debt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get a deposit if he does it for foreigners.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Latin versions (see also 20:16); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for a promiscuous woman.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: A loud and cheerful greeting early in the morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be taken as a curse!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A quarrelsome wife is as annoying
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as constant dripping on a rainy day.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Stopping her complaints is like trying to stop the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or trying to hold something with greased hands.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: As iron sharpens iron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a friend sharpens a friend.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: As workers who tend a fig tree are allowed to eat the fruit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so workers who protect their employer’s interests will be rewarded.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: As a face is reflected in water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the heart reflects the real person.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let someone else praise you, not your own mouth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stranger, not your own lips.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Just as Death and Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheol and Abaddon.
      marker-yv: yv-n
    - type: text
      text: ' are never satisfied,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so human desire is never satisfied.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fire tests the purity of silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a person is tested by being praised.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by flattery.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: You cannot separate fools from their foolishness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even though you grind them like grain with mortar and pestle.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Know the state of your flocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put your heart into caring for your herds,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: for riches don’t last forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the crown might not be passed to the next generation.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: After the hay is harvested and the new crop appears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mountain grasses are gathered in,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: your sheep will provide wool for clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your goats will provide the price of a field.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And you will have enough goats’ milk for yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your family, and your servant girls.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A stone is heavy and sand is weighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the resentment caused by a fool is even heavier.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Anger is cruel, and wrath is like a flood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but jealousy is even more dangerous.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: An open rebuke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is better than hidden love!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wounds from a sincere friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are better than many kisses from an enemy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A person who is full refuses honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but even bitter food tastes sweet to the hungry.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A person who strays from home
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a bird that strays from its nest.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The heartfelt counsel of a friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as sweet as perfume and incense.
