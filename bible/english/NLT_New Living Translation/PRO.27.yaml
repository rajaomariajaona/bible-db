document_id: PRO.27,116
type_code: eng
verses:
  '1':
  - type: text
    content: Don’t brag about tomorrow,
  - type: text
    content: since you don’t know what the day will bring.
  '10':
  - type: text
    content: Never abandon a friend—
  - type: text
    content: either yours or your father’s.
  - type: text
    content: When disaster strikes, you won’t have to ask your brother for assistance.
  - type: text
    content: It’s better to go to a neighbor than to a brother who lives far away.
  '11':
  - type: text
    content: Be wise, my child,
  - type: note
    content: Hebrew my son.
  - type: text
    content: ' and make my heart glad.'
  - type: text
    content: Then I will be able to answer my critics.
  '12':
  - type: text
    content: A prudent person foresees danger and takes precautions.
  - type: text
    content: The simpleton goes blindly on and suffers the consequences.
  '13':
  - type: text
    content: Get security from someone who guarantees a stranger’s debt.
  - type: text
    content: Get a deposit if he does it for foreigners.
  - type: note
    content: As in Greek and Latin versions (see also 20:16); Hebrew reads for a promiscuous woman.
  '14':
  - type: text
    content: A loud and cheerful greeting early in the morning
  - type: text
    content: will be taken as a curse!
  '15':
  - type: text
    content: A quarrelsome wife is as annoying
  - type: text
    content: as constant dripping on a rainy day.
  '16':
  - type: text
    content: Stopping her complaints is like trying to stop the wind
  - type: text
    content: or trying to hold something with greased hands.
  '17':
  - type: text
    content: As iron sharpens iron,
  - type: text
    content: so a friend sharpens a friend.
  '18':
  - type: text
    content: As workers who tend a fig tree are allowed to eat the fruit,
  - type: text
    content: so workers who protect their employer’s interests will be rewarded.
  '19':
  - type: text
    content: As a face is reflected in water,
  - type: text
    content: so the heart reflects the real person.
  '2':
  - type: text
    content: Let someone else praise you, not your own mouth—
  - type: text
    content: a stranger, not your own lips.
  '20':
  - type: text
    content: Just as Death and Destruction
  - type: note
    content: Hebrew Sheol and Abaddon.
  - type: text
    content: ' are never satisfied,'
  - type: text
    content: so human desire is never satisfied.
  '21':
  - type: text
    content: Fire tests the purity of silver and gold,
  - type: text
    content: but a person is tested by being praised.
  - type: note
    content: Or by flattery.
  '22':
  - type: text
    content: You cannot separate fools from their foolishness,
  - type: text
    content: even though you grind them like grain with mortar and pestle.
  '23':
  - type: text
    content: Know the state of your flocks,
  - type: text
    content: and put your heart into caring for your herds,
  '24':
  - type: text
    content: for riches don’t last forever,
  - type: text
    content: and the crown might not be passed to the next generation.
  '25':
  - type: text
    content: After the hay is harvested and the new crop appears
  - type: text
    content: and the mountain grasses are gathered in,
  '26':
  - type: text
    content: your sheep will provide wool for clothing,
  - type: text
    content: and your goats will provide the price of a field.
  '27':
  - type: text
    content: And you will have enough goats’ milk for yourself,
  - type: text
    content: your family, and your servant girls.
  '3':
  - type: text
    content: A stone is heavy and sand is weighty,
  - type: text
    content: but the resentment caused by a fool is even heavier.
  '4':
  - type: text
    content: Anger is cruel, and wrath is like a flood,
  - type: text
    content: but jealousy is even more dangerous.
  '5':
  - type: text
    content: An open rebuke
  - type: text
    content: is better than hidden love!
  '6':
  - type: text
    content: Wounds from a sincere friend
  - type: text
    content: are better than many kisses from an enemy.
  '7':
  - type: text
    content: A person who is full refuses honey,
  - type: text
    content: but even bitter food tastes sweet to the hungry.
  '8':
  - type: text
    content: A person who strays from home
  - type: text
    content: is like a bird that strays from its nest.
  '9':
  - type: text
    content: The heartfelt counsel of a friend
  - type: text
    content: is as sweet as perfume and incense.
