document_id: ROM.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith Brings Joy
  - type: text
    content: Therefore, since we have been made right in God’s sight by faith, we have peace
  - type: note
    content: Some manuscripts read let us have peace.
  - type: text
    content: ' with God because of what Jesus Christ our Lord has done for us. '
  '10':
  - type: text
    content: 'For since our friendship with God was restored by the death of his Son while we were still his enemies, we will certainly be saved through the life of his Son. '
  '11':
  - type: text
    content: So now we can rejoice in our wonderful new relationship with God because our Lord Jesus Christ has made us friends of God.
  - type: heading
    content: Adam and Christ Contrasted
  '12':
  - type: text
    content: 'When Adam sinned, sin entered the world. Adam’s sin brought death, so death spread to everyone, for everyone sinned. '
  '13':
  - type: text
    content: 'Yes, people sinned even before the law was given. But it was not counted as sin because there was not yet any law to break. '
  '14':
  - type: text
    content: 'Still, everyone died—from the time of Adam to the time of Moses—even those who did not disobey an explicit commandment of God, as Adam did. Now Adam is a symbol, a representation of Christ, who was yet to come. '
  '15':
  - type: text
    content: 'But there is a great difference between Adam’s sin and God’s gracious gift. For the sin of this one man, Adam, brought death to many. But even greater is God’s wonderful grace and his gift of forgiveness to many through this other man, Jesus Christ. '
  '16':
  - type: text
    content: 'And the result of God’s gracious gift is very different from the result of that one man’s sin. For Adam’s sin led to condemnation, but God’s free gift leads to our being made right with God, even though we are guilty of many sins. '
  '17':
  - type: text
    content: For the sin of this one man, Adam, caused death to rule over many. But even greater is God’s wonderful grace and his gift of righteousness, for all who receive it will live in triumph over sin and death through this one man, Jesus Christ.
  '18':
  - type: text
    content: 'Yes, Adam’s one sin brings condemnation for everyone, but Christ’s one act of righteousness brings a right relationship with God and new life for everyone. '
  '19':
  - type: text
    content: Because one person disobeyed God, many became sinners. But because one other person obeyed God, many will be made righteous.
  '2':
  - type: text
    content: Because of our faith, Christ has brought us into this place of undeserved privilege where we now stand, and we confidently and joyfully look forward to sharing God’s glory.
  '20':
  - type: text
    content: 'God’s law was given so that all people could see how sinful they were. But as people sinned more and more, God’s wonderful grace became more abundant. '
  '21':
  - type: text
    content: So just as sin ruled over all people and brought them to death, now God’s wonderful grace rules instead, giving us right standing with God and resulting in eternal life through Jesus Christ our Lord.
  '3':
  - type: text
    content: 'We can rejoice, too, when we run into problems and trials, for we know that they help us develop endurance. '
  '4':
  - type: text
    content: 'And endurance develops strength of character, and character strengthens our confident hope of salvation. '
  '5':
  - type: text
    content: And this hope will not lead to disappointment. For we know how dearly God loves us, because he has given us the Holy Spirit to fill our hearts with his love.
  '6':
  - type: text
    content: 'When we were utterly helpless, Christ came at just the right time and died for us sinners. '
  '7':
  - type: text
    content: 'Now, most people would not be willing to die for an upright person, though someone might perhaps be willing to die for a person who is especially good. '
  '8':
  - type: text
    content: 'But God showed his great love for us by sending Christ to die for us while we were still sinners. '
  '9':
  - type: text
    content: 'And since we have been made right in God’s sight by the blood of Christ, he will certainly save us from God’s condemnation. '
