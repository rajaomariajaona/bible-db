document_id: 1PE.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Wives
  - type: text
    content: 'In the same way, you wives must accept the authority of your husbands. Then, even if some refuse to obey the Good News, your godly lives will speak to them without any words. They will be won over '
  '10':
  - type: text
    content: For the Scriptures say,
  - type: text
    content: “If you want to enjoy life
  - type: text
    content: and see many happy days,
  - type: text
    content: keep your tongue from speaking evil
  - type: text
    content: and your lips from telling lies.
  '11':
  - type: text
    content: Turn away from evil and do good.
  - type: text
    content: Search for peace, and work to maintain it.
  '12':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' watch over those who do right,'
  - type: text
    content: and his ears are open to their prayers.
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' turns his face'
  - type: text
    content: against those who do evil.”
  - type: note
    content: Ps 34:12-16.
  - type: heading
    content: Suffering for Doing Good
  '13':
  - type: text
    content: 'Now, who will want to harm you if you are eager to do good? '
  '14':
  - type: text
    content: 'But even if you suffer for doing what is right, God will reward you for it. So don’t worry or be afraid of their threats. '
  '15':
  - type: text
    content: 'Instead, you must worship Christ as Lord of your life. And if someone asks about your hope as a believer, always be ready to explain it. '
  '16':
  - type: text
    content: But do this in a gentle and respectful way.
  - type: note
    content: Some English translations put this sentence in verse 15.
  - type: text
    content: ' Keep your conscience clear. Then if people speak against you, they will be ashamed when they see what a good life you live because you belong to Christ. '
  '17':
  - type: text
    content: Remember, it is better to suffer for doing good, if that is what God wants, than to suffer for doing wrong!
  '18':
  - type: text
    content: Christ suffered
  - type: note
    content: Some manuscripts read died.
  - type: text
    content: ' for our sins once for all time. He never sinned, but he died for sinners to bring you safely home to God. He suffered physical death, but he was raised to life in the Spirit.'
  - type: note
    content: Or in spirit.
  '19':
  - type: text
    content: 'So he went and preached to the spirits in prison— '
  '2':
  - type: text
    content: by observing your pure and reverent lives.
  '20':
  - type: text
    content: those who disobeyed God long ago when God waited patiently while Noah was building his boat. Only eight people were saved from drowning in that terrible flood.
  - type: note
    content: Greek saved through water.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And that water is a picture of baptism, which now saves you, not by removing dirt from your body, but as a response to God from
  - type: note
    content: Or as an appeal to God for.
  - type: text
    content: ' a clean conscience. It is effective because of the resurrection of Jesus Christ.'
  '22':
  - type: text
    content: Now Christ has gone to heaven. He is seated in the place of honor next to God, and all the angels and authorities and powers accept his authority.
  '3':
  - type: text
    content: 'Don’t be concerned about the outward beauty of fancy hairstyles, expensive jewelry, or beautiful clothes. '
  '4':
  - type: text
    content: 'You should clothe yourselves instead with the beauty that comes from within, the unfading beauty of a gentle and quiet spirit, which is so precious to God. '
  '5':
  - type: text
    content: 'This is how the holy women of old made themselves beautiful. They put their trust in God and accepted the authority of their husbands. '
  '6':
  - type: text
    content: For instance, Sarah obeyed her husband, Abraham, and called him her master. You are her daughters when you do what is right without fear of what your husbands might do.
  - type: heading
    content: Husbands
  '7':
  - type: text
    content: In the same way, you husbands must give honor to your wives. Treat your wife with understanding as you live together. She may be weaker than you are, but she is your equal partner in God’s gift of new life. Treat her as you should so your prayers will not be hindered.
  - type: heading
    content: All Christians
  '8':
  - type: text
    content: Finally, all of you should be of one mind. Sympathize with each other. Love each other as brothers and sisters.
  - type: note
    content: Greek Show brotherly love.
  - type: text
    content: ' Be tenderhearted, and keep a humble attitude. '
  '9':
  - type: text
    content: 'Don’t repay evil for evil. Don’t retaliate with insults when people insult you. Instead, pay them back with a blessing. That is what God has called you to do, and he will grant you his blessing. '
