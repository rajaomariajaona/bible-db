document_id: 1PE.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wives
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the same way, you wives must accept the authority of your husbands. Then, even if some refuse to obey the Good News, your godly lives will speak to them without any words. They will be won over '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: by observing your pure and reverent lives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Don’t be concerned about the outward beauty of fancy hairstyles, expensive jewelry, or beautiful clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You should clothe yourselves instead with the beauty that comes from within, the unfading beauty of a gentle and quiet spirit, which is so precious to God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is how the holy women of old made themselves beautiful. They put their trust in God and accepted the authority of their husbands. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For instance, Sarah obeyed her husband, Abraham, and called him her master. You are her daughters when you do what is right without fear of what your husbands might do.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Husbands
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In the same way, you husbands must give honor to your wives. Treat your wife with understanding as you live together. She may be weaker than you are, but she is your equal partner in God’s gift of new life. Treat her as you should so your prayers will not be hindered.
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Christians
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Finally, all of you should be of one mind. Sympathize with each other. Love each other as brothers and sisters.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Show brotherly love.
    marker-yv: yv-n
  - type: text
    text: ' Be tenderhearted, and keep a humble attitude. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Don’t repay evil for evil. Don’t retaliate with insults when people insult you. Instead, pay them back with a blessing. That is what God has called you to do, and he will grant you his blessing. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you want to enjoy life
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see many happy days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: keep your tongue from speaking evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your lips from telling lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Turn away from evil and do good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Search for peace, and work to maintain it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' watch over those who do right,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his ears are open to their prayers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' turns his face'
- type: usfm
  marker: q2
  children:
  - type: text
    text: against those who do evil.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10-12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 34:12-16.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Suffering for Doing Good
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now, who will want to harm you if you are eager to do good? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But even if you suffer for doing what is right, God will reward you for it. So don’t worry or be afraid of their threats. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Instead, you must worship Christ as Lord of your life. And if someone asks about your hope as a believer, always be ready to explain it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But do this in a gentle and respectful way.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some English translations put this sentence in verse 15.
    marker-yv: yv-n
  - type: text
    text: ' Keep your conscience clear. Then if people speak against you, they will be ashamed when they see what a good life you live because you belong to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Remember, it is better to suffer for doing good, if that is what God wants, than to suffer for doing wrong!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Christ suffered
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: died.
    marker-yv: yv-n
  - type: text
    text: ' for our sins once for all time. He never sinned, but he died for sinners to bring you safely home to God. He suffered physical death, but he was raised to life in the Spirit.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in spirit.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So he went and preached to the spirits in prison— '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: those who disobeyed God long ago when God waited patiently while Noah was building his boat. Only eight people were saved from drowning in that terrible flood.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: saved through water.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And that water is a picture of baptism, which now saves you, not by removing dirt from your body, but as a response to God from
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as an appeal to God for.
    marker-yv: yv-n
  - type: text
    text: ' a clean conscience. It is effective because of the resurrection of Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now Christ has gone to heaven. He is seated in the place of honor next to God, and all the angels and authorities and powers accept his authority.
