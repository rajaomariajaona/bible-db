document_id: 1PE.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wives
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the same way, you wives must accept the authority of your husbands. Then, even if some refuse to obey the Good News, your godly lives will speak to them without any words. They will be won over '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you want to enjoy life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and see many happy days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keep your tongue from speaking evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips from telling lies.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn away from evil and do good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Search for peace, and work to maintain it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' watch over those who do right,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his ears are open to their prayers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' turns his face'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against those who do evil.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10-12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 34:12-16.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Suffering for Doing Good
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now, who will want to harm you if you are eager to do good? '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But even if you suffer for doing what is right, God will reward you for it. So don’t worry or be afraid of their threats. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Instead, you must worship Christ as Lord of your life. And if someone asks about your hope as a believer, always be ready to explain it. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But do this in a gentle and respectful way.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some English translations put this sentence in verse 15.
      marker-yv: yv-n
    - type: text
      text: ' Keep your conscience clear. Then if people speak against you, they will be ashamed when they see what a good life you live because you belong to Christ. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Remember, it is better to suffer for doing good, if that is what God wants, than to suffer for doing wrong!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Christ suffered
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: died.
      marker-yv: yv-n
    - type: text
      text: ' for our sins once for all time. He never sinned, but he died for sinners to bring you safely home to God. He suffered physical death, but he was raised to life in the Spirit.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in spirit.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went and preached to the spirits in prison— '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: by observing your pure and reverent lives.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: those who disobeyed God long ago when God waited patiently while Noah was building his boat. Only eight people were saved from drowning in that terrible flood.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saved through water.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And that water is a picture of baptism, which now saves you, not by removing dirt from your body, but as a response to God from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as an appeal to God for.
      marker-yv: yv-n
    - type: text
      text: ' a clean conscience. It is effective because of the resurrection of Jesus Christ.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Christ has gone to heaven. He is seated in the place of honor next to God, and all the angels and authorities and powers accept his authority.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t be concerned about the outward beauty of fancy hairstyles, expensive jewelry, or beautiful clothes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You should clothe yourselves instead with the beauty that comes from within, the unfading beauty of a gentle and quiet spirit, which is so precious to God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how the holy women of old made themselves beautiful. They put their trust in God and accepted the authority of their husbands. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For instance, Sarah obeyed her husband, Abraham, and called him her master. You are her daughters when you do what is right without fear of what your husbands might do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Husbands
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In the same way, you husbands must give honor to your wives. Treat your wife with understanding as you live together. She may be weaker than you are, but she is your equal partner in God’s gift of new life. Treat her as you should so your prayers will not be hindered.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: All Christians
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Finally, all of you should be of one mind. Sympathize with each other. Love each other as brothers and sisters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Show brotherly love.
      marker-yv: yv-n
    - type: text
      text: ' Be tenderhearted, and keep a humble attitude. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Don’t repay evil for evil. Don’t retaliate with insults when people insult you. Instead, pay them back with a blessing. That is what God has called you to do, and he will grant you his blessing. '
