document_id: 2SA.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Ahithophel urged Absalom, “Let me choose 12,000 men to start out after David tonight. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then even the bravest soldiers, though they have the heart of a lion, will be paralyzed with fear. For all Israel knows what a mighty warrior your father is and how courageous his men are.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I recommend that you mobilize the entire army of Israel, bringing them from as far away as Dan in the north and Beersheba in the south. That way you will have an army as numerous as the sand on the seashore. And I advise that you personally lead the troops. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we find David, we’ll fall on him like dew that falls on the ground. Then neither he nor any of his men will be left alive. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if David were to escape into some town, you will have all Israel there at your command. Then we can take ropes and drag the walls of the town into the nearest valley until every stone is torn down.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Absalom and all the men of Israel said, “Hushai’s advice is better than Ahithophel’s.” For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had determined to defeat the counsel of Ahithophel, which really was the better plan, so that he could bring disaster on Absalom!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hushai Warns David to Escape
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hushai told Zadok and Abiathar, the priests, what Ahithophel had said to Absalom and the elders of Israel and what he himself had advised instead. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Quick!” he told them. “Find David and urge him not to stay at the shallows of the Jordan River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: at the crossing points of the wilderness.
      marker-yv: yv-n
    - type: text
      text: ' tonight. He must go across at once into the wilderness beyond. Otherwise he will die and his entire army with him.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan and Ahimaaz had been staying at En-rogel so as not to be seen entering and leaving the city. Arrangements had been made for a servant girl to bring them the message they were to take to King David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a boy spotted them at En-rogel, and he told Absalom about it. So they quickly escaped to Bahurim, where a man hid them down inside a well in his courtyard. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man’s wife put a cloth over the top of the well and scattered grain on it to dry in the sun; so no one suspected they were there.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will catch up with him while he is weary and discouraged. He and his troops will panic, and everyone will run away. Then I will kill only the king, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Absalom’s men arrived, they asked her, “Have you seen Ahimaaz and Jonathan?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The woman replied, “They were here, but they crossed over the brook.” Absalom’s men looked for them without success and returned to Jerusalem.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the two men crawled out of the well and hurried on to King David. “Quick!” they told him, “cross the Jordan tonight!” And they told him how Ahithophel had advised that he be captured and killed. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David and all the people with him went across the Jordan River during the night, and they were all on the other bank before dawn.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Ahithophel realized that his advice had not been followed, he saddled his donkey, went to his hometown, set his affairs in order, and hanged himself. He died there and was buried in the family tomb.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David soon arrived at Mahanaim. By now, Absalom had mobilized the entire army of Israel and was leading his troops across the Jordan River. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Absalom had appointed Amasa as commander of his army, replacing Joab, who had been commander under David. (Amasa was Joab’s cousin. His father was Jether,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ithra, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jether.
      marker-yv: yv-n
    - type: text
      text: ' an Ishmaelite.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Chr 2:17); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an Israelite.
      marker-yv: yv-n
    - type: text
      text: ' His mother, Abigail daughter of Nahash, was the sister of Joab’s mother, Zeruiah.) '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Absalom and the Israelite army set up camp in the land of Gilead.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David arrived at Mahanaim, he was warmly greeted by Shobi son of Nahash, who came from Rabbah of the Ammonites, and by Makir son of Ammiel from Lo-debar, and by Barzillai of Gilead from Rogelim. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought sleeping mats, cooking pots, serving bowls, wheat and barley, flour and roasted grain, beans, lentils, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: honey, butter, sheep, goats, and cheese for David and those who were with him. For they said, “You must all be very hungry and tired and thirsty after your long march through the wilderness.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and I will bring all the people back to you as a bride returns to her husband. After all, it is only one man’s life that you seek.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like the return of all is the man whom you seek.
      marker-yv: yv-n
    - type: text
      text: ' Then you will be at peace with all the people.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This plan seemed good to Absalom and to all the elders of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hushai Counters Ahithophel’s Advice
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But then Absalom said, “Bring in Hushai the Arkite. Let’s see what he thinks about this.” '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When Hushai arrived, Absalom told him what Ahithophel had said. Then he asked, “What is your opinion? Should we follow Ahithophel’s advice? If not, what do you suggest?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Well,” Hushai replied to Absalom, “this time Ahithophel has made a mistake. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know your father and his men; they are mighty warriors. Right now they are as enraged as a mother bear who has been robbed of her cubs. And remember that your father is an experienced man of war. He won’t be spending the night among the troops. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has probably already hidden in some pit or cave. And when he comes out and attacks and a few of your men fall, there will be panic among your troops, and the word will spread that Absalom’s men are being slaughtered. '
