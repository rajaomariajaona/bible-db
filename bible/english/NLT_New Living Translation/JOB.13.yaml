document_id: JOB.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Wants to Argue His Case with God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Look, I have seen all this with my own eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heard it with my own ears, and now I understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I know as much as you do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are no better than I am.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As for me, I would speak directly to the Almighty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want to argue my case with God himself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: As for you, you smear me with lies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: As physicians, you are worthless quacks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If only you could be silent!
- type: usfm
  marker: q2
  children:
  - type: text
    text: That’s the wisest thing you could do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Listen to my charge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention to my arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Are you defending God with lies?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you make your dishonest arguments for his sake?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Will you slant your testimony in his favor?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you argue God’s case for him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: What will happen when he finds out what you are doing?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you fool him as easily as you fool people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: No, you will be in trouble with him
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you secretly slant your testimony in his favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Doesn’t his majesty terrify you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Doesn’t your fear of him overwhelm you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Your platitudes are as valuable as ashes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your defense is as fragile as a clay pot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Be silent now and leave me alone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let me speak, and I will face the consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why should I put myself in mortal danger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Why should I take my flesh in my teeth.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take my life in my own hands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: God might kill me, but I have no other hope.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An alternate reading in the Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God might kill me, but I hope in him.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am going to argue my case with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But this is what will save me—I am not godless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If I were, I could not stand before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Listen closely to what I am about to say.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear me out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I have prepared my case;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be proved innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Who can argue with me over this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And if you prove me wrong, I will remain silent and die.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Asks How He Has Sinned
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “O God, grant me these two things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then I will be able to face you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Remove your heavy hand from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t terrify me with your awesome presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now summon me, and I will answer!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or let me speak to you, and you reply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tell me, what have I done wrong?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Show me my rebellion and my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Why do you turn away from me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do you treat me as your enemy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Would you terrify a leaf blown by the wind?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would you chase dry straw?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “You write bitter accusations against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring up all the sins of my youth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You put my feet in stocks.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You examine all my paths.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You trace all my footprints.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I waste away like rotting wood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a moth-eaten coat.
