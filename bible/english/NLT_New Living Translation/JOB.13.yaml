document_id: JOB.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Wants to Argue His Case with God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, I have seen all this with my own eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and heard it with my own ears, and now I understand.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, you will be in trouble with him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you secretly slant your testimony in his favor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doesn’t his majesty terrify you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Doesn’t your fear of him overwhelm you?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your platitudes are as valuable as ashes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your defense is as fragile as a clay pot.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Be silent now and leave me alone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me speak, and I will face the consequences.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should I put myself in mortal danger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Why should I take my flesh in my teeth.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take my life in my own hands?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God might kill me, but I have no other hope.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'An alternate reading in the Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God might kill me, but I hope in him.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am going to argue my case with him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But this is what will save me—I am not godless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I were, I could not stand before him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen closely to what I am about to say.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear me out.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have prepared my case;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be proved innocent.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can argue with me over this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And if you prove me wrong, I will remain silent and die.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Asks How He Has Sinned
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know as much as you do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are no better than I am.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O God, grant me these two things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then I will be able to face you.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove your heavy hand from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t terrify me with your awesome presence.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now summon me, and I will answer!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or let me speak to you, and you reply.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell me, what have I done wrong?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show me my rebellion and my sin.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you turn away from me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you treat me as your enemy?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would you terrify a leaf blown by the wind?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would you chase dry straw?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You write bitter accusations against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring up all the sins of my youth.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You put my feet in stocks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You examine all my paths.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You trace all my footprints.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I waste away like rotting wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a moth-eaten coat.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for me, I would speak directly to the Almighty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want to argue my case with God himself.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for you, you smear me with lies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As physicians, you are worthless quacks.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you could be silent!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That’s the wisest thing you could do.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my charge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention to my arguments.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are you defending God with lies?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you make your dishonest arguments for his sake?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you slant your testimony in his favor?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you argue God’s case for him?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What will happen when he finds out what you are doing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you fool him as easily as you fool people?
