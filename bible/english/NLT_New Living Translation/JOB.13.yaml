document_id: JOB.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Wants to Argue His Case with God
  - type: text
    content: “Look, I have seen all this with my own eyes
  - type: text
    content: and heard it with my own ears, and now I understand.
  '10':
  - type: text
    content: No, you will be in trouble with him
  - type: text
    content: if you secretly slant your testimony in his favor.
  '11':
  - type: text
    content: Doesn’t his majesty terrify you?
  - type: text
    content: Doesn’t your fear of him overwhelm you?
  '12':
  - type: text
    content: Your platitudes are as valuable as ashes.
  - type: text
    content: Your defense is as fragile as a clay pot.
  '13':
  - type: text
    content: “Be silent now and leave me alone.
  - type: text
    content: Let me speak, and I will face the consequences.
  '14':
  - type: text
    content: Why should I put myself in mortal danger
  - type: note
    content: Hebrew Why should I take my flesh in my teeth.
  - type: text
    content: and take my life in my own hands?
  '15':
  - type: text
    content: God might kill me, but I have no other hope.
  - type: note
    content: An alternate reading in the Masoretic Text reads God might kill me, but I hope in him.
  - type: text
    content: I am going to argue my case with him.
  '16':
  - type: text
    content: But this is what will save me—I am not godless.
  - type: text
    content: If I were, I could not stand before him.
  '17':
  - type: text
    content: “Listen closely to what I am about to say.
  - type: text
    content: Hear me out.
  '18':
  - type: text
    content: I have prepared my case;
  - type: text
    content: I will be proved innocent.
  '19':
  - type: text
    content: Who can argue with me over this?
  - type: text
    content: And if you prove me wrong, I will remain silent and die.
  - type: heading
    content: Job Asks How He Has Sinned
  '2':
  - type: text
    content: I know as much as you do.
  - type: text
    content: You are no better than I am.
  '20':
  - type: text
    content: “O God, grant me these two things,
  - type: text
    content: and then I will be able to face you.
  '21':
  - type: text
    content: Remove your heavy hand from me,
  - type: text
    content: and don’t terrify me with your awesome presence.
  '22':
  - type: text
    content: Now summon me, and I will answer!
  - type: text
    content: Or let me speak to you, and you reply.
  '23':
  - type: text
    content: Tell me, what have I done wrong?
  - type: text
    content: Show me my rebellion and my sin.
  '24':
  - type: text
    content: Why do you turn away from me?
  - type: text
    content: Why do you treat me as your enemy?
  '25':
  - type: text
    content: Would you terrify a leaf blown by the wind?
  - type: text
    content: Would you chase dry straw?
  '26':
  - type: text
    content: “You write bitter accusations against me
  - type: text
    content: and bring up all the sins of my youth.
  '27':
  - type: text
    content: You put my feet in stocks.
  - type: text
    content: You examine all my paths.
  - type: text
    content: You trace all my footprints.
  '28':
  - type: text
    content: I waste away like rotting wood,
  - type: text
    content: like a moth-eaten coat.
  '3':
  - type: text
    content: As for me, I would speak directly to the Almighty.
  - type: text
    content: I want to argue my case with God himself.
  '4':
  - type: text
    content: As for you, you smear me with lies.
  - type: text
    content: As physicians, you are worthless quacks.
  '5':
  - type: text
    content: If only you could be silent!
  - type: text
    content: That’s the wisest thing you could do.
  '6':
  - type: text
    content: Listen to my charge;
  - type: text
    content: pay attention to my arguments.
  '7':
  - type: text
    content: “Are you defending God with lies?
  - type: text
    content: Do you make your dishonest arguments for his sake?
  '8':
  - type: text
    content: Will you slant your testimony in his favor?
  - type: text
    content: Will you argue God’s case for him?
  '9':
  - type: text
    content: What will happen when he finds out what you are doing?
  - type: text
    content: Can you fool him as easily as you fool people?
