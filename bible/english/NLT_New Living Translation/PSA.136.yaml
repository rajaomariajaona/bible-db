document_id: PSA.136,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who killed the firstborn of Egypt.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought Israel out of Egypt.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He acted with a strong hand and powerful arm.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who parted the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '136:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sea of reeds; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 136:15.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led Israel safely through,
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he hurled Pharaoh and his army into the Red Sea.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who led his people through the wilderness.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who struck down mighty kings.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He killed powerful kings—
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihon king of the Amorites,
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the God of gods.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Og king of Bashan.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God gave the land of these kings as an inheritance—
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a special possession to his servant Israel.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He remembered us in our weakness.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He saved us from our enemies.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives food to every living thing.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the God of heaven.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the Lord of lords.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who alone does mighty miracles.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who made the heavens so skillfully.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who placed the earth among the waters.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to him who made the heavenly lights—
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the sun to rule the day,
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the moon and stars to rule the night.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: His faithful love endures forever.
