document_id: PSA.136,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '10':
  - type: text
    content: Give thanks to him who killed the firstborn of Egypt.
  - type: text
    content: His faithful love endures forever.
  '11':
  - type: text
    content: He brought Israel out of Egypt.
  - type: text
    content: His faithful love endures forever.
  '12':
  - type: text
    content: He acted with a strong hand and powerful arm.
  - type: text
    content: His faithful love endures forever.
  '13':
  - type: text
    content: Give thanks to him who parted the Red Sea.
  - type: note
    content: Hebrew sea of reeds; also in 136:15.
  - type: text
    content: His faithful love endures forever.
  '14':
  - type: text
    content: He led Israel safely through,
  - type: text
    content: His faithful love endures forever.
  '15':
  - type: text
    content: but he hurled Pharaoh and his army into the Red Sea.
  - type: text
    content: His faithful love endures forever.
  '16':
  - type: text
    content: Give thanks to him who led his people through the wilderness.
  - type: text
    content: His faithful love endures forever.
  '17':
  - type: text
    content: Give thanks to him who struck down mighty kings.
  - type: text
    content: His faithful love endures forever.
  '18':
  - type: text
    content: He killed powerful kings—
  - type: text
    content: His faithful love endures forever.
  '19':
  - type: text
    content: Sihon king of the Amorites,
  - type: text
    content: His faithful love endures forever.
  '2':
  - type: text
    content: Give thanks to the God of gods.
  - type: text
    content: His faithful love endures forever.
  '20':
  - type: text
    content: and Og king of Bashan.
  - type: text
    content: His faithful love endures forever.
  '21':
  - type: text
    content: God gave the land of these kings as an inheritance—
  - type: text
    content: His faithful love endures forever.
  '22':
  - type: text
    content: a special possession to his servant Israel.
  - type: text
    content: His faithful love endures forever.
  '23':
  - type: text
    content: He remembered us in our weakness.
  - type: text
    content: His faithful love endures forever.
  '24':
  - type: text
    content: He saved us from our enemies.
  - type: text
    content: His faithful love endures forever.
  '25':
  - type: text
    content: He gives food to every living thing.
  - type: text
    content: His faithful love endures forever.
  '26':
  - type: text
    content: Give thanks to the God of heaven.
  - type: text
    content: His faithful love endures forever.
  '3':
  - type: text
    content: Give thanks to the Lord of lords.
  - type: text
    content: His faithful love endures forever.
  '4':
  - type: text
    content: Give thanks to him who alone does mighty miracles.
  - type: text
    content: His faithful love endures forever.
  '5':
  - type: text
    content: Give thanks to him who made the heavens so skillfully.
  - type: text
    content: His faithful love endures forever.
  '6':
  - type: text
    content: Give thanks to him who placed the earth among the waters.
  - type: text
    content: His faithful love endures forever.
  '7':
  - type: text
    content: Give thanks to him who made the heavenly lights—
  - type: text
    content: His faithful love endures forever.
  '8':
  - type: text
    content: the sun to rule the day,
  - type: text
    content: His faithful love endures forever.
  '9':
  - type: text
    content: and the moon and stars to rule the night.
  - type: text
    content: His faithful love endures forever.
