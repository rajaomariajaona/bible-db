document_id: JHN.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Shepherd and His Sheep
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, anyone who sneaks over the wall of a sheepfold, rather than going through the gate, must surely be a thief and a robber!
  - type: text
    content: ' '
  '10':
  - type: text
    content: The thief’s purpose is to steal and kill and destroy. My purpose is to give them a rich and satisfying life.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “I am the good shepherd. The good shepherd sacrifices his life for the sheep.
  - type: text
    content: ' '
  '12':
  - type: text
    content: A hired hand will run when he sees a wolf coming. He will abandon the sheep because they don’t belong to him and he isn’t their shepherd. And so the wolf attacks them and scatters the flock.
  - type: text
    content: ' '
  '13':
  - type: text
    content: The hired hand runs away because he’s working only for the money and doesn’t really care about the sheep.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “I am the good shepherd; I know my own sheep, and they know me,
  - type: text
    content: ' '
  '15':
  - type: text
    content: just as my Father knows me and I know the Father. So I sacrifice my life for the sheep.
  - type: text
    content: ' '
  '16':
  - type: text
    content: I have other sheep, too, that are not in this sheepfold. I must bring them also. They will listen to my voice, and there will be one flock with one shepherd.
  '17':
  - type: text
    content: ' '
  - type: text
    content: “The Father loves me because I sacrifice my life so I may take it back again.
  - type: text
    content: ' '
  '18':
  - type: text
    content: No one can take my life from me. I sacrifice it voluntarily. For I have the authority to lay it down when I want to and also to take it up again. For this is what my Father has commanded.”
  '19':
  - type: text
    content: When he said these things, the people
  - type: note
    content: Greek Jewish people; also in 10:24, 31.
  - type: text
    content: ' were again divided in their opinions about him. '
  '2':
  - type: text
    content: But the one who enters through the gate is the shepherd of the sheep.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Some said, “He’s demon possessed and out of his mind. Why listen to a man like that?” '
  '21':
  - type: text
    content: Others said, “This doesn’t sound like a man possessed by a demon! Can a demon open the eyes of the blind?”
  - type: heading
    content: Jesus Claims to Be the Son of God
  '22':
  - type: text
    content: 'It was now winter, and Jesus was in Jerusalem at the time of Hanukkah, the Festival of Dedication. '
  '23':
  - type: text
    content: 'He was in the Temple, walking through the section known as Solomon’s Colonnade. '
  '24':
  - type: text
    content: The people surrounded him and asked, “How long are you going to keep us in suspense? If you are the Messiah, tell us plainly.”
  '25':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I have already told you, and you don’t believe me. The proof is the work I do in my Father’s name.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But you don’t believe me because you are not my sheep.
  - type: text
    content: ' '
  '27':
  - type: text
    content: My sheep listen to my voice; I know them, and they follow me.
  - type: text
    content: ' '
  '28':
  - type: text
    content: I give them eternal life, and they will never perish. No one can snatch them away from me,
  - type: text
    content: ' '
  '29':
  - type: text
    content: for my Father has given them to me, and he is more powerful than anyone else.
  - type: note
    content: Other manuscripts read for what my Father has given me is more powerful than anything; still others read for regarding that which my Father has given me, he is greater than all.
  - type: text
    content: ' '
  - type: text
    content: No one can snatch them from the Father’s hand.
  - type: text
    content: ' '
  '3':
  - type: text
    content: The gatekeeper opens the gate for him, and the sheep recognize his voice and come to him. He calls his own sheep by name and leads them out.
  - type: text
    content: ' '
  '30':
  - type: text
    content: The Father and I are one.”
  '31':
  - type: text
    content: 'Once again the people picked up stones to kill him. '
  '32':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “At my Father’s direction I have done many good works. For which one are you going to stone me?”
  '33':
  - type: text
    content: They replied, “We’re stoning you not for any good work, but for blasphemy! You, a mere man, claim to be God.”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “It is written in your own Scriptures
  - type: note
    content: Greek your own law.
  - type: text
    content: ' '
  - type: text
    content: that God said to certain leaders of the people, ‘I say, you are gods!’
  - type: note
    content: Ps 82:6.
  - type: text
    content: ' '
  '35':
  - type: text
    content: And you know that the Scriptures cannot be altered. So if those people who received God’s message were called ‘gods,’
  - type: text
    content: ' '
  '36':
  - type: text
    content: why do you call it blasphemy when I say, ‘I am the Son of God’? After all, the Father set me apart and sent me into the world.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Don’t believe me unless I carry out my Father’s work.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But if I do his work, believe in the evidence of the miraculous works I have done, even if you don’t believe me. Then you will know and understand that the Father is in me, and I am in the Father.”
  '39':
  - type: text
    content: 'Once again they tried to arrest him, but he got away and left them. '
  '4':
  - type: text
    content: After he has gathered his own flock, he walks ahead of them, and they follow him because they know his voice.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'He went beyond the Jordan River near the place where John was first baptizing and stayed there awhile. '
  '41':
  - type: text
    content: 'And many followed him. “John didn’t perform miraculous signs,” they remarked to one another, “but everything he said about this man has come true.” '
  '42':
  - type: text
    content: And many who were there believed in Jesus.
  '5':
  - type: text
    content: They won’t follow a stranger; they will run from him because they don’t know his voice.”
  '6':
  - type: text
    content: 'Those who heard Jesus use this illustration didn’t understand what he meant, '
  '7':
  - type: text
    content: 'so he explained it to them: '
  - type: text
    content: “I tell you the truth, I am the gate for the sheep.
  - type: text
    content: ' '
  '8':
  - type: text
    content: All who came before me
  - type: note
    content: Some manuscripts do not include before me.
  - type: text
    content: ' '
  - type: text
    content: were thieves and robbers. But the true sheep did not listen to them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Yes, I am the gate. Those who come in through me will be saved.
  - type: note
    content: Or will find safety.
  - type: text
    content: ' '
  - type: text
    content: They will come and go freely and will find good pastures.
  - type: text
    content: ' '
