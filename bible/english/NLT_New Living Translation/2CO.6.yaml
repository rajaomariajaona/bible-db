document_id: 2CO.6,116
type_code: eng
verses:
  '1':
  - type: text
    content: As God’s partners,
  - type: note
    content: Or As we work together.
  - type: text
    content: ' we beg you not to accept this marvelous gift of God’s kindness and then ignore it. '
  '10':
  - type: text
    content: Our hearts ache, but we always have joy. We are poor, but we give spiritual riches to others. We own nothing, and yet we have everything.
  '11':
  - type: text
    content: 'Oh, dear Corinthian friends! We have spoken honestly with you, and our hearts are open to you. '
  '12':
  - type: text
    content: 'There is no lack of love on our part, but you have withheld your love from us. '
  '13':
  - type: text
    content: I am asking you to respond as if you were my own children. Open your hearts to us!
  - type: heading
    content: The Temple of the Living God
  '14':
  - type: text
    content: 'Don’t team up with those who are unbelievers. How can righteousness be a partner with wickedness? How can light live with darkness? '
  '15':
  - type: text
    content: What harmony can there be between Christ and the devil
  - type: note
    content: Greek Beliar; various other manuscripts render this proper name of the devil as Belian, Beliab, or Belial.
  - type: text
    content: '? How can a believer be a partner with an unbeliever? '
  '16':
  - type: text
    content: 'And what union can there be between God’s temple and idols? For we are the temple of the living God. As God said:'
  - type: text
    content: “I will live in them
  - type: text
    content: and walk among them.
  - type: text
    content: I will be their God,
  - type: text
    content: and they will be my people.
  - type: note
    content: Lev 26:12; Ezek 37:27.
  '17':
  - type: text
    content: Therefore, come out from among unbelievers,
  - type: text
    content: 'and separate yourselves from them, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Don’t touch their filthy things,
  - type: text
    content: and I will welcome you.
  - type: note
    content: Isa 52:11; Ezek 20:34 (Greek version).
  '18':
  - type: text
    content: And I will be your Father,
  - type: text
    content: and you will be my sons and daughters,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: note
    content: 2 Sam 7:14.
  - type: text
    content: ”
  '2':
  - type: text
    content: For God says,
  - type: text
    content: “At just the right time, I heard you.
  - type: text
    content: On the day of salvation, I helped you.”
  - type: note
    content: Isa 49:8 (Greek version).
  - type: text
    content: Indeed, the “right time” is now. Today is the day of salvation.
  - type: heading
    content: Paul’s Hardships
  '3':
  - type: text
    content: 'We live in such a way that no one will stumble because of us, and no one will find fault with our ministry. '
  '4':
  - type: text
    content: 'In everything we do, we show that we are true ministers of God. We patiently endure troubles and hardships and calamities of every kind. '
  '5':
  - type: text
    content: 'We have been beaten, been put in prison, faced angry mobs, worked to exhaustion, endured sleepless nights, and gone without food. '
  '6':
  - type: text
    content: We prove ourselves by our purity, our understanding, our patience, our kindness, by the Holy Spirit within us,
  - type: note
    content: Or by our holiness of spirit.
  - type: text
    content: ' and by our sincere love. '
  '7':
  - type: text
    content: 'We faithfully preach the truth. God’s power is working in us. We use the weapons of righteousness in the right hand for attack and the left hand for defense. '
  '8':
  - type: text
    content: 'We serve God whether people honor us or despise us, whether they slander us or praise us. We are honest, but they call us impostors. '
  '9':
  - type: text
    content: 'We are ignored, even though we are well known. We live close to death, but we are still alive. We have been beaten, but we have not been killed. '
