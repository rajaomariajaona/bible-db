document_id: 2CO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: As God’s partners,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: As we work together.
    marker-yv: yv-n
  - type: text
    text: ' we beg you not to accept this marvelous gift of God’s kindness and then ignore it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For God says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “At just the right time, I heard you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: On the day of salvation, I helped you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 49:8 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: Indeed, the “right time” is now. Today is the day of salvation.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Hardships
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'We live in such a way that no one will stumble because of us, and no one will find fault with our ministry. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In everything we do, we show that we are true ministers of God. We patiently endure troubles and hardships and calamities of every kind. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We have been beaten, been put in prison, faced angry mobs, worked to exhaustion, endured sleepless nights, and gone without food. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We prove ourselves by our purity, our understanding, our patience, our kindness, by the Holy Spirit within us,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by our holiness of spirit.
    marker-yv: yv-n
  - type: text
    text: ' and by our sincere love. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'We faithfully preach the truth. God’s power is working in us. We use the weapons of righteousness in the right hand for attack and the left hand for defense. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We serve God whether people honor us or despise us, whether they slander us or praise us. We are honest, but they call us impostors. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We are ignored, even though we are well known. We live close to death, but we are still alive. We have been beaten, but we have not been killed. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Our hearts ache, but we always have joy. We are poor, but we give spiritual riches to others. We own nothing, and yet we have everything.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Oh, dear Corinthian friends! We have spoken honestly with you, and our hearts are open to you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There is no lack of love on our part, but you have withheld your love from us. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I am asking you to respond as if you were my own children. Open your hearts to us!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Temple of the Living God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Don’t team up with those who are unbelievers. How can righteousness be a partner with wickedness? How can light live with darkness? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: What harmony can there be between Christ and the devil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beliar; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'various other manuscripts render this proper name of the devil as '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Belian, Beliab, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Belial.
    marker-yv: yv-n
  - type: text
    text: '? How can a believer be a partner with an unbeliever? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And what union can there be between God’s temple and idols? For we are the temple of the living God. As God said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will live in them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and walk among them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be their God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will be my people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev 26:12; Ezek 37:27.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore, come out from among unbelievers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and separate yourselves from them, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t touch their filthy things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will welcome you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 52:11; Ezek 20:34 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And I will be your Father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will be my sons and daughters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2 Sam 7:14.
    marker-yv: yv-n
  - type: text
    text: ”
