document_id: 1CH.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So all Israel was listed in the genealogical records in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Returning Exiles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'The people of Judah were exiled to Babylon because they were unfaithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The first of the exiles to return to their property in their former towns were priests, Levites, Temple servants, and other Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Some of the people from the tribes of Judah, Benjamin, Ephraim, and Manasseh came and settled in Jerusalem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: One family that returned was that of Uthai son of Ammihud, son of Omri, son of Imri, son of Bani, a descendant of Perez son of Judah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Others returned from the Shilonite clan, including Asaiah (the oldest) and his sons.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: From the Zerahite clan, Jeuel returned with his relatives.
- type: usfm
  marker: m
  children:
  - type: text
    text: In all, 690 families from the tribe of Judah returned.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'From the tribe of Benjamin came Sallu son of Meshullam, son of Hodaviah, son of Hassenuah; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ibneiah son of Jeroham; Elah son of Uzzi, son of Micri; and Meshullam son of Shephatiah, son of Reuel, son of Ibnijah.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: These men were all leaders of clans, and they were listed in their genealogical records. In all, 956 families from the tribe of Benjamin returned.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Returning Priests
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Among the priests who returned were Jedaiah, Jehoiarib, Jakin, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Azariah son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub. Azariah was the chief officer of the house of God.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Other returning priests were Adaiah son of Jeroham, son of Pashhur, son of Malkijah, and Maasai son of Adiel, son of Jahzerah, son of Meshullam, son of Meshillemith, son of Immer.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: In all, 1,760 priests returned. They were heads of clans and very able men. They were responsible for ministering at the house of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Returning Levites
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Levites who returned were Shemaiah son of Hasshub, son of Azrikam, son of Hashabiah, a descendant of Merari; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bakbakkar; Heresh; Galal; Mattaniah son of Mica, son of Zicri, son of Asaph; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Obadiah son of Shemaiah, son of Galal, son of Jeduthun; and Berekiah son of Asa, son of Elkanah, who lived in the area of Netophah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The gatekeepers who returned were Shallum, Akkub, Talmon, Ahiman, and their relatives. Shallum was the chief gatekeeper. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Prior to this time, they were responsible for the King’s Gate on the east side. These men served as gatekeepers for the camps of the Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Shallum was the son of Kore, a descendant of Abiasaph,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ebiasaph, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Abiasaph; compare Exod 6:24.
    marker-yv: yv-n
  - type: text
    text: ' from the clan of Korah. He and his relatives, the Korahites, were responsible for guarding the entrance to the sanctuary, just as their ancestors had guarded the Tabernacle in the camp of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Phinehas son of Eleazar had been in charge of the gatekeepers in earlier times, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had been with him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And later Zechariah son of Meshelemiah was responsible for guarding the entrance to the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tent of Meeting.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In all, there were 212 gatekeepers in those days, and they were listed according to the genealogies in their villages. David and Samuel the seer had appointed their ancestors because they were reliable men. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These gatekeepers and their descendants, by their divisions, were responsible for guarding the entrance to the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' when that house was a tent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The gatekeepers were stationed on all four sides—east, west, north, and south. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Their relatives in the villages came regularly to share their duties for seven-day periods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The four chief gatekeepers, all Levites, were trusted officials, for they were responsible for the rooms and treasuries at the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They would spend the night around the house of God, since it was their duty to guard it and to open the gates every morning.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Some of the gatekeepers were assigned to care for the various articles used in worship. They checked them in and out to avoid any loss. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Others were responsible for the furnishings, the items in the sanctuary, and the supplies, such as choice flour, wine, olive oil, frankincense, and spices. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But it was the priests who blended the spices. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mattithiah, a Levite and the oldest son of Shallum the Korahite, was entrusted with baking the bread used in the offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And some members of the clan of Kohath were in charge of preparing the bread to be set on the table each Sabbath day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The musicians, all prominent Levites, lived at the Temple. They were exempt from other responsibilities since they were on duty at all hours. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: All these men lived in Jerusalem. They were the heads of Levite families and were listed as prominent leaders in their genealogical records.
- type: usfm
  marker: s1
  children:
  - type: text
    text: King Saul’s Family Tree
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jeiel (the father of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the founder of.
    marker-yv: yv-n
  - type: text
    text: ' Gibeon) lived in the town of Gibeon. His wife’s name was Maacah, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and his oldest son was named Abdon. Jeiel’s other sons were Zur, Kish, Baal, Ner, Nadab, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Gedor, Ahio, Zechariah, and Mikloth. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mikloth was the father of Shimeam. All these families lived near each other in Jerusalem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ner was the father of Kish.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Kish was the father of Saul.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Saul was the father of Jonathan, Malkishua, Abinadab, and Esh-baal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Jonathan was the father of Merib-baal.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Merib-baal was the father of Micah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: The sons of Micah were Pithon, Melech, Tahrea, and Ahaz.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version and Latin Vulgate (see also 8:35); Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and Ahaz.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ahaz was the father of Jadah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Greek version (see also 8:36); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jarah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jadah was the father of Alemeth, Azmaveth, and Zimri.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zimri was the father of Moza.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Moza was the father of Binea.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Binea’s son was Rephaiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Rephaiah’s son was Eleasah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eleasah’s son was Azel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Azel had six sons, whose names were Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.
