document_id: 1CH.9,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'So all Israel was listed in the genealogical records in '
  - type: text
    content: The Book of the Kings of Israel.
  - type: heading
    content: The Returning Exiles
  - type: text
    content: 'The people of Judah were exiled to Babylon because they were unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Among the priests who returned were Jedaiah, Jehoiarib, Jakin, '
  '11':
  - type: text
    content: Azariah son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub. Azariah was the chief officer of the house of God.
  '12':
  - type: text
    content: Other returning priests were Adaiah son of Jeroham, son of Pashhur, son of Malkijah, and Maasai son of Adiel, son of Jahzerah, son of Meshullam, son of Meshillemith, son of Immer.
  '13':
  - type: text
    content: In all, 1,760 priests returned. They were heads of clans and very able men. They were responsible for ministering at the house of God.
  - type: heading
    content: The Returning Levites
  '14':
  - type: text
    content: 'The Levites who returned were Shemaiah son of Hasshub, son of Azrikam, son of Hashabiah, a descendant of Merari; '
  '15':
  - type: text
    content: 'Bakbakkar; Heresh; Galal; Mattaniah son of Mica, son of Zicri, son of Asaph; '
  '16':
  - type: text
    content: Obadiah son of Shemaiah, son of Galal, son of Jeduthun; and Berekiah son of Asa, son of Elkanah, who lived in the area of Netophah.
  '17':
  - type: text
    content: 'The gatekeepers who returned were Shallum, Akkub, Talmon, Ahiman, and their relatives. Shallum was the chief gatekeeper. '
  '18':
  - type: text
    content: 'Prior to this time, they were responsible for the King’s Gate on the east side. These men served as gatekeepers for the camps of the Levites. '
  '19':
  - type: text
    content: Shallum was the son of Kore, a descendant of Abiasaph,
  - type: note
    content: Hebrew Ebiasaph, a variant spelling of Abiasaph; compare Exod 6:24.
  - type: text
    content: ' from the clan of Korah. He and his relatives, the Korahites, were responsible for guarding the entrance to the sanctuary, just as their ancestors had guarded the Tabernacle in the camp of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'The first of the exiles to return to their property in their former towns were priests, Levites, Temple servants, and other Israelites. '
  '20':
  - type: text
    content: 'Phinehas son of Eleazar had been in charge of the gatekeepers in earlier times, and the '
  - type: text
    content: Lord
  - type: text
    content: ' had been with him. '
  '21':
  - type: text
    content: And later Zechariah son of Meshelemiah was responsible for guarding the entrance to the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting.
  '22':
  - type: text
    content: 'In all, there were 212 gatekeepers in those days, and they were listed according to the genealogies in their villages. David and Samuel the seer had appointed their ancestors because they were reliable men. '
  '23':
  - type: text
    content: 'These gatekeepers and their descendants, by their divisions, were responsible for guarding the entrance to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' when that house was a tent. '
  '24':
  - type: text
    content: 'The gatekeepers were stationed on all four sides—east, west, north, and south. '
  '25':
  - type: text
    content: Their relatives in the villages came regularly to share their duties for seven-day periods.
  '26':
  - type: text
    content: 'The four chief gatekeepers, all Levites, were trusted officials, for they were responsible for the rooms and treasuries at the house of God. '
  '27':
  - type: text
    content: They would spend the night around the house of God, since it was their duty to guard it and to open the gates every morning.
  '28':
  - type: text
    content: 'Some of the gatekeepers were assigned to care for the various articles used in worship. They checked them in and out to avoid any loss. '
  '29':
  - type: text
    content: 'Others were responsible for the furnishings, the items in the sanctuary, and the supplies, such as choice flour, wine, olive oil, frankincense, and spices. '
  '3':
  - type: text
    content: Some of the people from the tribes of Judah, Benjamin, Ephraim, and Manasseh came and settled in Jerusalem.
  '30':
  - type: text
    content: 'But it was the priests who blended the spices. '
  '31':
  - type: text
    content: 'Mattithiah, a Levite and the oldest son of Shallum the Korahite, was entrusted with baking the bread used in the offerings. '
  '32':
  - type: text
    content: And some members of the clan of Kohath were in charge of preparing the bread to be set on the table each Sabbath day.
  '33':
  - type: text
    content: 'The musicians, all prominent Levites, lived at the Temple. They were exempt from other responsibilities since they were on duty at all hours. '
  '34':
  - type: text
    content: All these men lived in Jerusalem. They were the heads of Levite families and were listed as prominent leaders in their genealogical records.
  - type: heading
    content: King Saul’s Family Tree
  '35':
  - type: text
    content: Jeiel (the father of
  - type: note
    content: Or the founder of.
  - type: text
    content: ' Gibeon) lived in the town of Gibeon. His wife’s name was Maacah, '
  '36':
  - type: text
    content: 'and his oldest son was named Abdon. Jeiel’s other sons were Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Gedor, Ahio, Zechariah, and Mikloth. '
  '38':
  - type: text
    content: Mikloth was the father of Shimeam. All these families lived near each other in Jerusalem.
  '39':
  - type: text
    content: Ner was the father of Kish.
  - type: text
    content: Kish was the father of Saul.
  - type: text
    content: Saul was the father of Jonathan, Malkishua, Abinadab, and Esh-baal.
  '4':
  - type: text
    content: One family that returned was that of Uthai son of Ammihud, son of Omri, son of Imri, son of Bani, a descendant of Perez son of Judah.
  '40':
  - type: text
    content: Jonathan was the father of Merib-baal.
  - type: text
    content: Merib-baal was the father of Micah.
  '41':
  - type: text
    content: The sons of Micah were Pithon, Melech, Tahrea, and Ahaz.
  - type: note
    content: As in Syriac version and Latin Vulgate (see also 8:35); Hebrew lacks and Ahaz.
  '42':
  - type: text
    content: Ahaz was the father of Jadah.
  - type: note
    content: As in some Hebrew manuscripts and Greek version (see also 8:36); Hebrew reads Jarah.
  - type: text
    content: Jadah was the father of Alemeth, Azmaveth, and Zimri.
  - type: text
    content: Zimri was the father of Moza.
  '43':
  - type: text
    content: Moza was the father of Binea.
  - type: text
    content: Binea’s son was Rephaiah.
  - type: text
    content: Rephaiah’s son was Eleasah.
  - type: text
    content: Eleasah’s son was Azel.
  '44':
  - type: text
    content: Azel had six sons, whose names were Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.
  '5':
  - type: text
    content: Others returned from the Shilonite clan, including Asaiah (the oldest) and his sons.
  '6':
  - type: text
    content: From the Zerahite clan, Jeuel returned with his relatives.
  - type: text
    content: In all, 690 families from the tribe of Judah returned.
  '7':
  - type: text
    content: 'From the tribe of Benjamin came Sallu son of Meshullam, son of Hodaviah, son of Hassenuah; '
  '8':
  - type: text
    content: Ibneiah son of Jeroham; Elah son of Uzzi, son of Micri; and Meshullam son of Shephatiah, son of Reuel, son of Ibnijah.
  '9':
  - type: text
    content: These men were all leaders of clans, and they were listed in their genealogical records. In all, 956 families from the tribe of Benjamin returned.
  - type: heading
    content: The Returning Priests
