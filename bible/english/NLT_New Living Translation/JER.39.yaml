document_id: JER.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In January
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the tenth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This event occurred on January 15, 588 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; see 52:4a and the note there.
    marker-yv: yv-n
  - type: text
    text: ' of the ninth year of King Zedekiah’s reign, King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 39:5, 11.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon came with his entire army to besiege Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Two and a half years later, on July 18
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the ninth day of the fourth month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This day was July 18, 586 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 39:1a.
    marker-yv: yv-n
  - type: text
    text: ' in the eleventh year of Zedekiah’s reign, a section of the city wall was broken down. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the officers of the Babylonian army came in and sat in triumph at the Middle Gate: Nergal-sharezer of Samgar, and Nebo-sarsekim,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nergal-sharezer, Samgar-nebo, Sarsekim.
    marker-yv: yv-n
  - type: text
    text: ' a chief officer, and Nergal-sharezer, the king’s adviser, and all the other officers of the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When King Zedekiah of Judah and all the soldiers saw that the Babylonians had broken into the city, they fled. They waited for nightfall and then slipped through the gate between the two walls behind the king’s garden and headed toward the Jordan Valley.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Arabah.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But the Babylonian
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldean; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 39:8.
    marker-yv: yv-n
  - type: text
    text: ' troops chased them and overtook Zedekiah on the plains of Jericho. They captured him and took him to King Nebuchadnezzar of Babylon, who was at Riblah in the land of Hamath. There the king of Babylon pronounced judgment upon Zedekiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The king of Babylon made Zedekiah watch as he slaughtered his sons at Riblah. The king of Babylon also slaughtered all the nobles of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then he gouged out Zedekiah’s eyes and bound him in bronze chains to lead him away to Babylon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Meanwhile, the Babylonians burned Jerusalem, including the royal palace and the houses of the people, and they tore down the walls of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Nebuzaradan, the captain of the guard, took as exiles to Babylon the rest of the people who remained in the city, those who had defected to him, and everyone else who remained. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But Nebuzaradan allowed some of the poorest people to stay behind in the land of Judah, and he assigned them to care for the vineyards and fields.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Remains in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'King Nebuchadnezzar had told Nebuzaradan, the captain of the guard, to find Jeremiah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“See that he isn’t hurt,” he said. “Look after him well, and give him anything he wants.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Nebuzaradan, the captain of the guard; Nebushazban, a chief officer; Nergal-sharezer, the king’s adviser; and the other officers of Babylon’s king '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: sent messengers to bring Jeremiah out of the prison. They put him under the care of Gedaliah son of Ahikam and grandson of Shaphan, who took him back to his home. So Jeremiah stayed in Judah among his own people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given the following message to Jeremiah while he was still in prison: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Say to Ebed-melech the Ethiopian,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Cushite.
    marker-yv: yv-n
  - type: text
    text: ' ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: I will do to this city everything I have threatened. I will send disaster, not prosperity. You will see its destruction, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but I will rescue you from those you fear so much. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Because you trusted me, I will give you your life as a reward. I will rescue you and keep you safe. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
