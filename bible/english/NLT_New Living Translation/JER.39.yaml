document_id: JER.39,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: In January
  - type: note
    content: Hebrew In the tenth month, of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This event occurred on January 15, 588 b.c.; see 52:4a and the note there.
  - type: text
    content: ' of the ninth year of King Zedekiah’s reign, King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 39:5, 11.
  - type: text
    content: ' of Babylon came with his entire army to besiege Jerusalem. '
  '10':
  - type: text
    content: But Nebuzaradan allowed some of the poorest people to stay behind in the land of Judah, and he assigned them to care for the vineyards and fields.
  - type: heading
    content: Jeremiah Remains in Judah
  '11':
  - type: text
    content: 'King Nebuchadnezzar had told Nebuzaradan, the captain of the guard, to find Jeremiah. '
  '12':
  - type: text
    content: '“See that he isn’t hurt,” he said. “Look after him well, and give him anything he wants.” '
  '13':
  - type: text
    content: 'So Nebuzaradan, the captain of the guard; Nebushazban, a chief officer; Nergal-sharezer, the king’s adviser; and the other officers of Babylon’s king '
  '14':
  - type: text
    content: sent messengers to bring Jeremiah out of the prison. They put him under the care of Gedaliah son of Ahikam and grandson of Shaphan, who took him back to his home. So Jeremiah stayed in Judah among his own people.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had given the following message to Jeremiah while he was still in prison: '
  '16':
  - type: text
    content: “Say to Ebed-melech the Ethiopian,
  - type: note
    content: Hebrew the Cushite.
  - type: text
    content: ' ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: I will do to this city everything I have threatened. I will send disaster, not prosperity. You will see its destruction, '
  '17':
  - type: text
    content: 'but I will rescue you from those you fear so much. '
  '18':
  - type: text
    content: 'Because you trusted me, I will give you your life as a reward. I will rescue you and keep you safe. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  '2':
  - type: text
    content: Two and a half years later, on July 18
  - type: note
    content: Hebrew On the ninth day of the fourth month. This day was July 18, 586 b.c.; also see note on 39:1a.
  - type: text
    content: ' in the eleventh year of Zedekiah’s reign, a section of the city wall was broken down. '
  '3':
  - type: text
    content: 'All the officers of the Babylonian army came in and sat in triumph at the Middle Gate: Nergal-sharezer of Samgar, and Nebo-sarsekim,'
  - type: note
    content: Or Nergal-sharezer, Samgar-nebo, Sarsekim.
  - type: text
    content: ' a chief officer, and Nergal-sharezer, the king’s adviser, and all the other officers of the king of Babylon.'
  '4':
  - type: text
    content: When King Zedekiah of Judah and all the soldiers saw that the Babylonians had broken into the city, they fled. They waited for nightfall and then slipped through the gate between the two walls behind the king’s garden and headed toward the Jordan Valley.
  - type: note
    content: Hebrew the Arabah.
  '5':
  - type: text
    content: But the Babylonian
  - type: note
    content: Or Chaldean; similarly in 39:8.
  - type: text
    content: ' troops chased them and overtook Zedekiah on the plains of Jericho. They captured him and took him to King Nebuchadnezzar of Babylon, who was at Riblah in the land of Hamath. There the king of Babylon pronounced judgment upon Zedekiah. '
  '6':
  - type: text
    content: 'The king of Babylon made Zedekiah watch as he slaughtered his sons at Riblah. The king of Babylon also slaughtered all the nobles of Judah. '
  '7':
  - type: text
    content: Then he gouged out Zedekiah’s eyes and bound him in bronze chains to lead him away to Babylon.
  '8':
  - type: text
    content: 'Meanwhile, the Babylonians burned Jerusalem, including the royal palace and the houses of the people, and they tore down the walls of the city. '
  '9':
  - type: text
    content: 'Then Nebuzaradan, the captain of the guard, took as exiles to Babylon the rest of the people who remained in the city, those who had defected to him, and everyone else who remained. '
