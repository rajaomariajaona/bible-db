document_id: JER.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hope for Restoration
  - type: text
    content: '“In that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will be the God of all the families of Israel, and they will be my people. '
  '10':
  - type: text
    content: '“Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you nations of the world;
  - type: text
    content: 'proclaim it in distant coastlands:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', who scattered his people,'
  - type: text
    content: will gather them and watch over them
  - type: text
    content: as a shepherd does his flock.
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed Israel'
  - type: text
    content: from those too strong for them.
  '12':
  - type: text
    content: They will come home and sing songs of joy on the heights of Jerusalem.
  - type: text
    content: 'They will be radiant because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s good gifts—
  - type: text
    content: the abundant crops of grain, new wine, and olive oil,
  - type: text
    content: and the healthy flocks and herds.
  - type: text
    content: Their life will be like a watered garden,
  - type: text
    content: and all their sorrows will be gone.
  '13':
  - type: text
    content: The young women will dance for joy,
  - type: text
    content: and the men—old and young—will join in the celebration.
  - type: text
    content: I will turn their mourning into joy.
  - type: text
    content: I will comfort them and exchange their sorrow for rejoicing.
  '14':
  - type: text
    content: The priests will enjoy abundance,
  - type: text
    content: and my people will feast on my good gifts.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Rachel’s Sadness Turns to Joy
  '15':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “A cry is heard in Ramah—
  - type: text
    content: deep anguish and bitter weeping.
  - type: text
    content: Rachel weeps for her children,
  - type: text
    content: refusing to be comforted—
  - type: text
    content: for her children are gone.”
  '16':
  - type: text
    content: 'But now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Do not weep any longer,
  - type: text
    content: 'for I will reward you,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Your children will come back to you
  - type: text
    content: from the distant land of the enemy.
  '17':
  - type: text
    content: 'There is hope for your future,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Your children will come again to their own land.
  '18':
  - type: text
    content: I have heard Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 31:20.
  - type: text
    content: ' saying,'
  - type: text
    content: ‘You disciplined me severely,
  - type: text
    content: like a calf that needs training for the yoke.
  - type: text
    content: Turn me again to you and restore me,
  - type: text
    content: 'for you alone are the '
  - type: text
    content: Lord
  - type: text
    content: ' my God.'
  '19':
  - type: text
    content: I turned away from God,
  - type: text
    content: but then I was sorry.
  - type: text
    content: I kicked myself for my stupidity!
  - type: text
    content: I was thoroughly ashamed of all I did in my younger days.’
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Those who survive the coming destruction
  - type: text
    content: will find blessings even in the barren land,
  - type: text
    content: for I will give rest to the people of Israel.”
  '20':
  - type: text
    content: “Is not Israel still my son,
  - type: text
    content: 'my darling child?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I often have to punish him,
  - type: text
    content: but I still love him.
  - type: text
    content: That’s why I long for him
  - type: text
    content: and surely will have mercy on him.
  '21':
  - type: text
    content: Set up road signs;
  - type: text
    content: put up guideposts.
  - type: text
    content: Mark well the path
  - type: text
    content: by which you came.
  - type: text
    content: Come back again, my virgin Israel;
  - type: text
    content: return to your towns here.
  '22':
  - type: text
    content: How long will you wander,
  - type: text
    content: my wayward daughter?
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will cause something new to happen—'
  - type: text
    content: Israel will embrace her God.
  - type: note
    content: Hebrew a woman will surround a man.
  - type: text
    content: ”
  '23':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: “When I bring them back from captivity, the people of Judah and its towns will again say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you, O righteous home, O holy mountain!’ '
  '24':
  - type: text
    content: 'Townspeople and farmers and shepherds alike will live together in peace and happiness. '
  '25':
  - type: text
    content: For I have given rest to the weary and joy to the sorrowing.”
  '26':
  - type: text
    content: At this, I woke up and looked around. My sleep had been very sweet.
  '27':
  - type: text
    content: '“The day is coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when I will greatly increase the human population and the number of animals here in Israel and Judah. '
  '28':
  - type: text
    content: 'In the past I deliberately uprooted and tore down this nation. I overthrew it, destroyed it, and brought disaster upon it. But in the future I will just as deliberately plant it and build it up. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '29':
  - type: text
    content: '“The people will no longer quote this proverb:'
  - type: text
    content: ‘The parents have eaten sour grapes,
  - type: text
    content: but their children’s mouths pucker at the taste.’
  '3':
  - type: text
    content: 'Long ago the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Israel:'
  - type: text
    content: “I have loved you, my people, with an everlasting love.
  - type: text
    content: With unfailing love I have drawn you to myself.
  '30':
  - type: text
    content: All people will die for their own sins—those who eat the sour grapes will be the ones whose mouths will pucker.
  '31':
  - type: text
    content: '“The day is coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when I will make a new covenant with the people of Israel and Judah. '
  '32':
  - type: text
    content: 'This covenant will not be like the one I made with their ancestors when I took them by the hand and brought them out of the land of Egypt. They broke that covenant, though I loved them as a husband loves his wife,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: '“But this is the new covenant I will make with the people of Israel after those days,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “I will put my instructions deep within them, and I will write them on their hearts. I will be their God, and they will be my people. '
  '34':
  - type: text
    content: 'And they will not need to teach their neighbors, nor will they need to teach their relatives, saying, ‘You should know the '
  - type: text
    content: Lord
  - type: text
    content: '.’ For everyone, from the least to the greatest, will know me already,” says the '
  - type: text
    content: Lord
  - type: text
    content: . “And I will forgive their wickedness, and I will never again remember their sins.”
  '35':
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ' who provides the sun to light the day'
  - type: text
    content: and the moon and stars to light the night,
  - type: text
    content: and who stirs the sea into roaring waves.
  - type: text
    content: 'His name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: 'and this is what he says:'
  '36':
  - type: text
    content: “I am as likely to reject my people Israel
  - type: text
    content: as I am to abolish the laws of nature!”
  '37':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Just as the heavens cannot be measured
  - type: text
    content: and the foundations of the earth cannot be explored,
  - type: text
    content: so I will not consider casting them away
  - type: text
    content: for the evil they have done.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '38':
  - type: text
    content: '“The day is coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when all Jerusalem will be rebuilt for me, from the Tower of Hananel to the Corner Gate. '
  '39':
  - type: text
    content: 'A measuring line will be stretched out over the hill of Gareb and across to Goah. '
  '4':
  - type: text
    content: I will rebuild you, my virgin Israel.
  - type: text
    content: You will again be happy
  - type: text
    content: and dance merrily with your tambourines.
  '40':
  - type: text
    content: 'And the entire area—including the graveyard and ash dump in the valley, and all the fields out to the Kidron Valley on the east as far as the Horse Gate—will be holy to the '
  - type: text
    content: Lord
  - type: text
    content: . The city will never again be captured or destroyed.”
  '5':
  - type: text
    content: Again you will plant your vineyards on the mountains of Samaria
  - type: text
    content: and eat from your own gardens there.
  '6':
  - type: text
    content: The day will come when watchmen will shout
  - type: text
    content: from the hill country of Ephraim,
  - type: text
    content: ‘Come, let us go up to Jerusalem
  - type: note
    content: Hebrew Zion; also in 31:12.
  - type: text
    content: 'to worship the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.’”'
  '7':
  - type: text
    content: 'Now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Sing with joy for Israel.
  - type: note
    content: Hebrew Jacob; also in 31:11. See note on 5:20.
  - type: text
    content: Shout for the greatest of nations!
  - type: text
    content: 'Shout out with praise and joy:'
  - type: text
    content: '‘Save your people, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the remnant of Israel!’
  '8':
  - type: text
    content: For I will bring them from the north
  - type: text
    content: and from the distant corners of the earth.
  - type: text
    content: I will not forget the blind and lame,
  - type: text
    content: the expectant mothers and women in labor.
  - type: text
    content: A great company will return!
  '9':
  - type: text
    content: Tears of joy will stream down their faces,
  - type: text
    content: and I will lead them home with great care.
  - type: text
    content: They will walk beside quiet streams
  - type: text
    content: and on smooth paths where they will not stumble.
  - type: text
    content: For I am Israel’s father,
  - type: text
    content: and Ephraim is my oldest child.
