document_id: JER.31,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Restoration
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“In that day,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I will be the God of all the families of Israel, and they will be my people. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Listen to this message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you nations of the world;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'proclaim it in distant coastlands:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who scattered his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will gather them and watch over them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a shepherd does his flock.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has redeemed Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those too strong for them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will come home and sing songs of joy on the heights of Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They will be radiant because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s good gifts—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the abundant crops of grain, new wine, and olive oil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the healthy flocks and herds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their life will be like a watered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all their sorrows will be gone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young women will dance for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the men—old and young—will join in the celebration.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn their mourning into joy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will comfort them and exchange their sorrow for rejoicing.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The priests will enjoy abundance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my people will feast on my good gifts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rachel’s Sadness Turns to Joy
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A cry is heard in Ramah—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deep anguish and bitter weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rachel weeps for her children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refusing to be comforted—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for her children are gone.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But now this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not weep any longer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I will reward you,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your children will come back to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the distant land of the enemy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is hope for your future,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Your children will come again to their own land.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have heard Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 31:20.
      marker-yv: yv-n
    - type: text
      text: ' saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You disciplined me severely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a calf that needs training for the yoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn me again to you and restore me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you alone are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I turned away from God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but then I was sorry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I kicked myself for my stupidity!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was thoroughly ashamed of all I did in my younger days.’
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who survive the coming destruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will find blessings even in the barren land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will give rest to the people of Israel.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is not Israel still my son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'my darling child?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I often have to punish him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I still love him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I long for him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and surely will have mercy on him.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set up road signs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put up guideposts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mark well the path
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by which you came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come back again, my virgin Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: return to your towns here.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you wander,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my wayward daughter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will cause something new to happen—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel will embrace her God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a woman will surround a man.
      marker-yv: yv-n
    - type: text
      text: ”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, the God of Israel, says: “When I bring them back from captivity, the people of Judah and its towns will again say, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you, O righteous home, O holy mountain!’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Townspeople and farmers and shepherds alike will live together in peace and happiness. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I have given rest to the weary and joy to the sorrowing.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this, I woke up and looked around. My sleep had been very sweet.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The day is coming,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when I will greatly increase the human population and the number of animals here in Israel and Judah. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the past I deliberately uprooted and tore down this nation. I overthrew it, destroyed it, and brought disaster upon it. But in the future I will just as deliberately plant it and build it up. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The people will no longer quote this proverb:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The parents have eaten sour grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but their children’s mouths pucker at the taste.’
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Long ago the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have loved you, my people, with an everlasting love.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With unfailing love I have drawn you to myself.
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: All people will die for their own sins—those who eat the sour grapes will be the ones whose mouths will pucker.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The day is coming,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when I will make a new covenant with the people of Israel and Judah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This covenant will not be like the one I made with their ancestors when I took them by the hand and brought them out of the land of Egypt. They broke that covenant, though I loved them as a husband loves his wife,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But this is the new covenant I will make with the people of Israel after those days,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “I will put my instructions deep within them, and I will write them on their hearts. I will be their God, and they will be my people. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they will not need to teach their neighbors, nor will they need to teach their relatives, saying, ‘You should know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ For everyone, from the least to the greatest, will know me already,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . “And I will forgive their wickedness, and I will never again remember their sins.”
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who provides the sun to light the day'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the moon and stars to light the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who stirs the sea into roaring waves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and this is what he says:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am as likely to reject my people Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I am to abolish the laws of nature!”
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Just as the heavens cannot be measured
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the foundations of the earth cannot be explored,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I will not consider casting them away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the evil they have done.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The day is coming,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when all Jerusalem will be rebuilt for me, from the Tower of Hananel to the Corner Gate. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A measuring line will be stretched out over the hill of Gareb and across to Goah. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rebuild you, my virgin Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will again be happy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dance merrily with your tambourines.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the entire area—including the graveyard and ash dump in the valley, and all the fields out to the Kidron Valley on the east as far as the Horse Gate—will be holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . The city will never again be captured or destroyed.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again you will plant your vineyards on the mountains of Samaria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eat from your own gardens there.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day will come when watchmen will shout
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the hill country of Ephraim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Come, let us go up to Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 31:12.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.’”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sing with joy for Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 31:11. See note on 5:20.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout for the greatest of nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout out with praise and joy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Save your people, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the remnant of Israel!’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will bring them from the north
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the distant corners of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not forget the blind and lame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the expectant mothers and women in labor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A great company will return!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tears of joy will stream down their faces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will lead them home with great care.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will walk beside quiet streams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on smooth paths where they will not stumble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am Israel’s father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ephraim is my oldest child.
