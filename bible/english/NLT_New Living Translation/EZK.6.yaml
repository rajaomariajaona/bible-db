document_id: EZK.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Israel’s Mountains
  - type: text
    content: 'Again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'They will know that I alone am the '
  - type: text
    content: Lord
  - type: text
    content: ' and that I was serious when I said I would bring this calamity on them.'
  '11':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Clap your hands in horror, and stamp your feet. Cry out because of all the detestable sins the people of Israel have committed. Now they are going to die from war and famine and disease. '
  '12':
  - type: text
    content: 'Disease will strike down those who are far away in exile. War will destroy those who are nearby. And anyone who survives will be killed by famine. So at last I will spend my fury on them. '
  '13':
  - type: text
    content: 'They will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' when their dead lie scattered among their idols and altars on every hill and mountain and under every green tree and every great shade tree—the places where they offered sacrifices to their idols. '
  '14':
  - type: text
    content: I will crush them and make their cities desolate from the wilderness in the south to Riblah
  - type: note
    content: As in some Hebrew manuscripts; most Hebrew manuscripts read Diblah.
  - type: text
    content: ' in the north. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: '“Son of man, turn and face the mountains of Israel and prophesy against them. '
  '3':
  - type: text
    content: 'Proclaim this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' against the mountains of Israel. This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to the mountains and hills and to the ravines and valleys: I am about to bring war upon you, and I will smash your pagan shrines. '
  '4':
  - type: text
    content: All your altars will be demolished, and your places of worship will be destroyed. I will kill your people in front of your idols.
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 6:5, 6, 9, 13.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'I will lay your corpses in front of your idols and scatter your bones around your altars. '
  '6':
  - type: text
    content: 'Wherever you live there will be desolation, and I will destroy your pagan shrines. Your altars will be demolished, your idols will be smashed, your places of worship will be torn down, and all the religious objects you have made will be destroyed. '
  '7':
  - type: text
    content: 'The place will be littered with corpses, and you will know that I alone am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: '“But I will let a few of my people escape destruction, and they will be scattered among the nations of the world. '
  '9':
  - type: text
    content: 'Then when they are exiled among the nations, they will remember me. They will recognize how hurt I am by their unfaithful hearts and lustful eyes that long for their idols. Then at last they will hate themselves for all their detestable sins. '
