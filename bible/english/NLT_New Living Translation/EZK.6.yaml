document_id: EZK.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Israel’s Mountains
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Again a message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will know that I alone am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and that I was serious when I said I would bring this calamity on them.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Clap your hands in horror, and stamp your feet. Cry out because of all the detestable sins the people of Israel have committed. Now they are going to die from war and famine and disease. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Disease will strike down those who are far away in exile. War will destroy those who are nearby. And anyone who survives will be killed by famine. So at last I will spend my fury on them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' when their dead lie scattered among their idols and altars on every hill and mountain and under every green tree and every great shade tree—the places where they offered sacrifices to their idols. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will crush them and make their cities desolate from the wilderness in the south to Riblah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Diblah.
      marker-yv: yv-n
    - type: text
      text: ' in the north. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Son of man, turn and face the mountains of Israel and prophesy against them. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Proclaim this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against the mountains of Israel. This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to the mountains and hills and to the ravines and valleys: I am about to bring war upon you, and I will smash your pagan shrines. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: All your altars will be demolished, and your places of worship will be destroyed. I will kill your people in front of your idols.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung; also in 6:5, 6, 9, 13.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will lay your corpses in front of your idols and scatter your bones around your altars. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Wherever you live there will be desolation, and I will destroy your pagan shrines. Your altars will be demolished, your idols will be smashed, your places of worship will be torn down, and all the religious objects you have made will be destroyed. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The place will be littered with corpses, and you will know that I alone am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But I will let a few of my people escape destruction, and they will be scattered among the nations of the world. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then when they are exiled among the nations, they will remember me. They will recognize how hurt I am by their unfaithful hearts and lustful eyes that long for their idols. Then at last they will hate themselves for all their detestable sins. '
