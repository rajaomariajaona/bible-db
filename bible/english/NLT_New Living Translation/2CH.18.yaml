document_id: 2CH.18,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat and Ahab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jehoshaphat enjoyed great riches and high esteem, and he made an alliance with Ahab of Israel by having his son marry Ahab’s daughter. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'One of them, Zedekiah son of Kenaanah, made some iron horns and proclaimed, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: With these horns you will gore the Arameans to death!”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'All the other prophets agreed. “Yes,” they said, “go up to Ramoth-gilead and be victorious, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give the king victory!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Meanwhile, the messenger who went to get Micaiah said to him, “Look, all the prophets are promising victory for the king. Be sure that you agree with them and promise success.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But Micaiah replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, I will say only what my God says.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: When Micaiah arrived before the king, Ahab asked him, “Micaiah, should we go to war against Ramoth-gilead, or should I hold back?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Micaiah replied sarcastically, “Yes, go up and be victorious, for you will have victory over them!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the king replied sharply, “How many times must I demand that you speak only the truth to me when you speak for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Micaiah told him, “In a vision I saw all Israel scattered on the mountains, like sheep without a shepherd. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Their master has been killed.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: These people have no master.
      marker-yv: yv-n
    - type: text
      text: ' Send them home in peace.’”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Didn’t I tell you?” the king of Israel exclaimed to Jehoshaphat. “He never prophesies anything but trouble for me.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Micaiah continued, “Listen to what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says! I saw the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sitting on his throne with all the armies of heaven around him, on his right and on his left. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Who can entice King Ahab of Israel to go into battle against Ramoth-gilead so he can be killed?’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“There were many suggestions, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A few years later he went to Samaria to visit Ahab, who prepared a great banquet for him and his officials. They butchered great numbers of sheep, goats, and cattle for the feast. Then Ahab enticed Jehoshaphat to join forces with him to recover Ramoth-gilead.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and finally a spirit approached the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, ‘I can do it!’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘How will you do this?’ the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “And the spirit replied, ‘I will go out and inspire all of Ahab’s prophets to speak lies.’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘You will succeed,’ said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . ‘Go ahead and do it.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“So you see, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has put a lying spirit in the mouths of your prophets. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has pronounced your doom.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Zedekiah son of Kenaanah walked up to Micaiah and slapped him across the face. “Since when did the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' leave me to speak to you?” he demanded.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And Micaiah replied, “You will find out soon enough when you are trying to hide in some secret room!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“Arrest him!” the king of Israel ordered. “Take him back to Amon, the governor of the city, and to my son Joash. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Give them this order from the king: ‘Put this man in prison, and feed him nothing but bread and water until I return safely from the battle!’”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But Micaiah replied, “If you return safely, it will mean that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken through me!” Then he added to those standing around, “Everyone mark my words!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Ahab
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So King Ahab of Israel and King Jehoshaphat of Judah led their armies against Ramoth-gilead. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The king of Israel said to Jehoshaphat, “As we go into battle, I will disguise myself so no one will recognize me, but you wear your royal robes.” So the king of Israel disguised himself, and they went into battle.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Will you go with me to Ramoth-gilead?” King Ahab of Israel asked King Jehoshaphat of Judah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat replied, “Why, of course! You and I are as one, and my troops are your troops. We will certainly join you in battle.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Meanwhile, the king of Aram had issued these orders to his chariot commanders: “Attack only the king of Israel! Don’t bother with anyone else.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So when the Aramean chariot commanders saw Jehoshaphat in his royal robes, they went after him. “There is the king of Israel!” they shouted. But Jehoshaphat called out, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saved him. God helped him by turning the attackers away from him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: As soon as the chariot commanders realized he was not the king of Israel, they stopped chasing him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: An Aramean soldier, however, randomly shot an arrow at the Israelite troops and hit the king of Israel between the joints of his armor. “Turn the horses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Turn your hand.
      marker-yv: yv-n
    - type: text
      text: ' and get me out of here!” Ahab groaned to the driver of the chariot. “I’m badly wounded!”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: The battle raged all that day, and the king of Israel propped himself up in his chariot facing the Arameans. In the evening, just as the sun was setting, he died.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Jehoshaphat added, “But first let’s find out what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So the king of Israel summoned the prophets, 400 of them, and asked them, “Should we go to war against Ramoth-gilead, or should I hold back?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all replied, “Yes, go right ahead! God will give the king victory.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But Jehoshaphat asked, “Is there not also a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here? We should ask him the same question.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The king of Israel replied to Jehoshaphat, “There is one more man who could consult the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for us, but I hate him. He never prophesies anything but trouble for me! His name is Micaiah son of Imlah.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat replied, “That’s not the way a king should talk! Let’s hear what he has to say.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So the king of Israel called one of his officials and said, “Quick! Bring Micaiah son of Imlah.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micaiah Prophesies against Ahab
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'King Ahab of Israel and King Jehoshaphat of Judah, dressed in their royal robes, were sitting on thrones at the threshing floor near the gate of Samaria. All of Ahab’s prophets were prophesying there in front of them. '
