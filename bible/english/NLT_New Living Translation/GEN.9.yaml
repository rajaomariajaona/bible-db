document_id: GEN.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God Confirms His Covenant
  - type: text
    content: 'Then God blessed Noah and his sons and told them, “Be fruitful and multiply. Fill the earth. '
  '10':
  - type: text
    content: 'and with all the animals that were on the boat with you—the birds, the livestock, and all the wild animals—every living creature on earth. '
  '11':
  - type: text
    content: Yes, I am confirming my covenant with you. Never again will floodwaters kill all living creatures; never again will a flood destroy the earth.”
  '12':
  - type: text
    content: 'Then God said, “I am giving you a sign of my covenant with you and with all living creatures, for all generations to come. '
  '13':
  - type: text
    content: 'I have placed my rainbow in the clouds. It is the sign of my covenant with you and with all the earth. '
  '14':
  - type: text
    content: 'When I send clouds over the earth, the rainbow will appear in the clouds, '
  '15':
  - type: text
    content: 'and I will remember my covenant with you and with all living creatures. Never again will the floodwaters destroy all life. '
  '16':
  - type: text
    content: 'When I see the rainbow in the clouds, I will remember the eternal covenant between God and every living creature on earth.” '
  '17':
  - type: text
    content: Then God said to Noah, “Yes, this rainbow is the sign of the covenant I am confirming with all the creatures on earth.”
  - type: heading
    content: Noah’s Sons
  '18':
  - type: text
    content: 'The sons of Noah who came out of the boat with their father were Shem, Ham, and Japheth. (Ham is the father of Canaan.) '
  '19':
  - type: text
    content: From these three sons of Noah came all the people who now populate the earth.
  '2':
  - type: text
    content: 'All the animals of the earth, all the birds of the sky, all the small animals that scurry along the ground, and all the fish in the sea will look on you with fear and terror. I have placed them in your power. '
  '20':
  - type: text
    content: 'After the flood, Noah began to cultivate the ground, and he planted a vineyard. '
  '21':
  - type: text
    content: 'One day he drank some wine he had made, and he became drunk and lay naked inside his tent. '
  '22':
  - type: text
    content: 'Ham, the father of Canaan, saw that his father was naked and went outside and told his brothers. '
  '23':
  - type: text
    content: Then Shem and Japheth took a robe, held it over their shoulders, and backed into the tent to cover their father. As they did this, they looked the other way so they would not see him naked.
  '24':
  - type: text
    content: 'When Noah woke up from his stupor, he learned what Ham, his youngest son, had done. '
  '25':
  - type: text
    content: 'Then he cursed Canaan, the son of Ham:'
  - type: text
    content: “May Canaan be cursed!
  - type: text
    content: May he be the lowest of servants to his relatives.”
  '26':
  - type: text
    content: Then Noah said,
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Shem, be blessed,'
  - type: text
    content: and may Canaan be his servant!
  '27':
  - type: text
    content: May God expand the territory of Japheth!
  - type: text
    content: May Japheth share the prosperity of Shem,
  - type: note
    content: Hebrew May he live in the tents of Shem.
  - type: text
    content: and may Canaan be his servant.”
  '28':
  - type: text
    content: 'Noah lived another 350 years after the great flood. '
  '29':
  - type: text
    content: He lived 950 years, and then he died.
  '3':
  - type: text
    content: 'I have given them to you for food, just as I have given you grain and vegetables. '
  '4':
  - type: text
    content: But you must never eat any meat that still has the lifeblood in it.
  '5':
  - type: text
    content: '“And I will require the blood of anyone who takes another person’s life. If a wild animal kills a person, it must die. And anyone who murders a fellow human must die. '
  '6':
  - type: text
    content: If anyone takes a human life, that person’s life will also be taken by human hands. For God made human beings
  - type: note
    content: Or man; Hebrew reads ha-adam.
  - type: text
    content: ' in his own image. '
  '7':
  - type: text
    content: Now be fruitful and multiply, and repopulate the earth.”
  '8':
  - type: text
    content: 'Then God told Noah and his sons, '
  '9':
  - type: text
    content: '“I hereby confirm my covenant with you and your descendants, '
