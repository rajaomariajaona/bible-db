  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: How good to sing praises to our God!
  - type: text
    content: How delightful and how fitting!
  '10':
  - type: text
    content: He takes no pleasure in the strength of a horse
  - type: text
    content: or in human might.
  '11':
  - type: text
    content: 'No, the '
  - type: text
    content: Lord
  - type: text
    content: ’s delight is in those who fear him,
  - type: text
    content: those who put their hope in his unfailing love.
  '12':
  - type: text
    content: 'Glorify the '
  - type: text
    content: Lord
  - type: text
    content: ', O Jerusalem!'
  - type: text
    content: Praise your God, O Zion!
  '13':
  - type: text
    content: For he has strengthened the bars of your gates
  - type: text
    content: and blessed your children within your walls.
  '14':
  - type: text
    content: He sends peace across your nation
  - type: text
    content: and satisfies your hunger with the finest wheat.
  '15':
  - type: text
    content: He sends his orders to the world—
  - type: text
    content: how swiftly his word flies!
  '16':
  - type: text
    content: He sends the snow like white wool;
  - type: text
    content: he scatters frost upon the ground like ashes.
  '17':
  - type: text
    content: He hurls the hail like stones.
  - type: note
    content: Hebrew like bread crumbs.
  - type: text
    content: Who can stand against his freezing cold?
  '18':
  - type: text
    content: Then, at his command, it all melts.
  - type: text
    content: He sends his winds, and the ice thaws.
  '19':
  - type: text
    content: He has revealed his words to Jacob,
  - type: text
    content: his decrees and regulations to Israel.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is rebuilding Jerusalem'
  - type: text
    content: and bringing the exiles back to Israel.
  '20':
  - type: text
    content: He has not done this for any other nation;
  - type: text
    content: they do not know his regulations.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: He heals the brokenhearted
  - type: text
    content: and bandages their wounds.
  '4':
  - type: text
    content: He counts the stars
  - type: text
    content: and calls them all by name.
  '5':
  - type: text
    content: How great is our Lord! His power is absolute!
  - type: text
    content: His understanding is beyond comprehension!
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' supports the humble,'
  - type: text
    content: but he brings the wicked down into the dust.
  '7':
  - type: text
    content: 'Sing out your thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: sing praises to our God with a harp.
  '8':
  - type: text
    content: He covers the heavens with clouds,
  - type: text
    content: provides rain for the earth,
  - type: text
    content: and makes the grass grow in mountain pastures.
  '9':
  - type: text
    content: He gives food to the wild animals
  - type: text
    content: and feeds the young ravens when they cry.
