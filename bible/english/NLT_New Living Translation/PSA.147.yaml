document_id: PSA.147,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How good to sing praises to our God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How delightful and how fitting!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He takes no pleasure in the strength of a horse
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or in human might.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s delight is in those who fear him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who put their hope in his unfailing love.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Glorify the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', O Jerusalem!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Praise your God, O Zion!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he has strengthened the bars of your gates
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and blessed your children within your walls.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends peace across your nation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and satisfies your hunger with the finest wheat.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends his orders to the world—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how swiftly his word flies!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends the snow like white wool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he scatters frost upon the ground like ashes.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hurls the hail like stones.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '147:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like bread crumbs.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can stand against his freezing cold?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, at his command, it all melts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He sends his winds, and the ice thaws.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has revealed his words to Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his decrees and regulations to Israel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is rebuilding Jerusalem'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bringing the exiles back to Israel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has not done this for any other nation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not know his regulations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He heals the brokenhearted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bandages their wounds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He counts the stars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and calls them all by name.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How great is our Lord! His power is absolute!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His understanding is beyond comprehension!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' supports the humble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he brings the wicked down into the dust.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing out your thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing praises to our God with a harp.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He covers the heavens with clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provides rain for the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and makes the grass grow in mountain pastures.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives food to the wild animals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and feeds the young ravens when they cry.
