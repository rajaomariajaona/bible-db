document_id: 2SA.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nathan Rebukes David
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Nathan the prophet to tell David this story: “There were two men in a certain town. One was rich, and one was poor. '
  '10':
  - type: text
    content: From this time on, your family will live by the sword because you have despised me by taking Uriah’s wife to be your own.
  '11':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because of what you have done, I will cause your own household to rebel against you. I will give your wives to another man before your very eyes, and he will go to bed with them in public view. '
  '12':
  - type: text
    content: You did it secretly, but I will make this happen to you openly in the sight of all Israel.”
  - type: heading
    content: David Confesses His Guilt
  '13':
  - type: text
    content: 'Then David confessed to Nathan, “I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: 'Nathan replied, “Yes, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has forgiven you, and you won’t die for this sin. '
  '14':
  - type: text
    content: 'Nevertheless, because you have shown utter contempt for the word of the '
  - type: text
    content: Lord
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads the enemies of the Lord.
  - type: text
    content: ' by doing this, your child will die.”'
  '15':
  - type: text
    content: 'After Nathan returned to his home, the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a deadly illness to the child of David and Uriah’s wife. '
  '16':
  - type: text
    content: 'David begged God to spare the child. He went without food and lay all night on the bare ground. '
  '17':
  - type: text
    content: The elders of his household pleaded with him to get up and eat with them, but he refused.
  '18':
  - type: text
    content: Then on the seventh day the child died. David’s advisers were afraid to tell him. “He wouldn’t listen to reason while the child was ill,” they said. “What drastic thing will he do when we tell him the child is dead?”
  '19':
  - type: text
    content: When David saw them whispering, he realized what had happened. “Is the child dead?” he asked.
  - type: text
    content: “Yes,” they replied, “he is dead.”
  '2':
  - type: text
    content: 'The rich man owned a great many sheep and cattle. '
  '20':
  - type: text
    content: Then David got up from the ground, washed himself, put on lotions,
  - type: note
    content: Hebrew anointed himself.
  - type: text
    content: ' and changed his clothes. He went to the Tabernacle and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: . After that, he returned to the palace and was served food and ate.
  '21':
  - type: text
    content: His advisers were amazed. “We don’t understand you,” they told him. “While the child was still living, you wept and refused to eat. But now that the child is dead, you have stopped your mourning and are eating again.”
  '22':
  - type: text
    content: 'David replied, “I fasted and wept while the child was alive, for I said, ‘Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will be gracious to me and let the child live.’ '
  '23':
  - type: text
    content: But why should I fast when he is dead? Can I bring him back again? I will go to him one day, but he cannot return to me.”
  '24':
  - type: text
    content: Then David comforted Bathsheba, his wife, and slept with her. She became pregnant and gave birth to a son, and David
  - type: note
    content: Hebrew he; an alternate Hebrew reading and some Hebrew manuscripts read she.
  - type: text
    content: ' named him Solomon. The '
  - type: text
    content: Lord
  - type: text
    content: ' loved the child '
  '25':
  - type: text
    content: 'and sent word through Nathan the prophet that they should name him Jedidiah (which means “beloved of the '
  - type: text
    content: Lord
  - type: text
    content: '”), as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded.'
  - type: note
    content: As in Greek version; Hebrew reads because of the Lord.
  - type: heading
    content: David Captures Rabbah
  '26':
  - type: text
    content: Meanwhile, Joab was fighting against Rabbah, the capital of Ammon, and he captured the royal fortifications.
  - type: note
    content: Or the royal city.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Joab sent messengers to tell David, “I have fought against Rabbah and captured its water supply.
  - type: note
    content: Or captured the city of water.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Now bring the rest of the army and capture the city. Otherwise, I will capture it and get credit for the victory.”
  '29':
  - type: text
    content: 'So David gathered the rest of the army and went to Rabbah, and he fought against it and captured it. '
  '3':
  - type: text
    content: 'The poor man owned nothing but one little lamb he had bought. He raised that little lamb, and it grew up with his children. It ate from the man’s own plate and drank from his cup. He cuddled it in his arms like a baby daughter. '
  '30':
  - type: text
    content: David removed the crown from the king’s head,
  - type: note
    content: Or from the head of Milcom (as in Greek version). Milcom, also called Molech, was the god of the Ammonites.
  - type: text
    content: ' and it was placed on his own head. The crown was made of gold and set with gems, and it weighed seventy-five pounds.'
  - type: note
    content: Hebrew 1 talent [34 kilograms].
  - type: text
    content: ' David took a vast amount of plunder from the city. '
  '31':
  - type: text
    content: He also made slaves of the people of Rabbah and forced them to labor with
  - type: note
    content: Hebrew He also brought out the people [of Rabbah] and put them under.
  - type: text
    content: ' saws, iron picks, and iron axes, and to work in the brick kilns.'
  - type: note
    content: Hebrew and he made them pass through the brick kilns.
  - type: text
    content: ' That is how he dealt with the people of all the Ammonite towns. Then David and all the army returned to Jerusalem.'
  '4':
  - type: text
    content: One day a guest arrived at the home of the rich man. But instead of killing an animal from his own flock or herd, he took the poor man’s lamb and killed it and prepared it for his guest.”
  '5':
  - type: text
    content: 'David was furious. “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,” he vowed, “any man who would do such a thing deserves to die! '
  '6':
  - type: text
    content: He must repay four lambs to the poor man for the one he stole and for having no pity.”
  '7':
  - type: text
    content: 'Then Nathan said to David, “You are that man! The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I anointed you king of Israel and saved you from the power of Saul. '
  '8':
  - type: text
    content: 'I gave you your master’s house and his wives and the kingdoms of Israel and Judah. And if that had not been enough, I would have given you much, much more. '
  '9':
  - type: text
    content: 'Why, then, have you despised the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and done this horrible deed? For you have murdered Uriah the Hittite with the sword of the Ammonites and stolen his wife. '
