document_id: NUM.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparing the Lamps
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'When you present the Levites before the '
  - type: text
    content: Lord
  - type: text
    content: ', the people of Israel must lay their hands on them. '
  '11':
  - type: text
    content: 'Raising his hands, Aaron must then present the Levites to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a special offering from the people of Israel, thus dedicating them to the '
  - type: text
    content: Lord
  - type: text
    content: ’s service.
  '12':
  - type: text
    content: '“Next the Levites will lay their hands on the heads of the young bulls. Present one as a sin offering and the other as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', to purify the Levites and make them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for the Levites.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then have the Levites stand in front of Aaron and his sons, and raise your hands and present them as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'In this way, you will set the Levites apart from the rest of the people of Israel, and the Levites will belong to me. '
  '15':
  - type: text
    content: After this, they may go into the Tabernacle to do their work, because you have purified them and presented them as a special offering.
  '16':
  - type: text
    content: '“Of all the people of Israel, the Levites are reserved for me. I have claimed them for myself in place of all the firstborn sons of the Israelites; I have taken the Levites as their substitutes. '
  '17':
  - type: text
    content: 'For all the firstborn males among the people of Israel are mine, both of people and of animals. I set them apart for myself on the day I struck down all the firstborn sons of the Egyptians. '
  '18':
  - type: text
    content: 'Yes, I have claimed the Levites in place of all the firstborn sons of Israel. '
  '19':
  - type: text
    content: And of all the Israelites, I have assigned the Levites to Aaron and his sons. They will serve in the Tabernacle on behalf of the Israelites and make sacrifices to purify
  - type: note
    content: Or make atonement for.
  - type: text
    content: ' the people so no plague will strike them when they approach the sanctuary.”'
  '2':
  - type: text
    content: '“Give Aaron the following instructions: When you set up the seven lamps in the lampstand, place them so their light shines forward in front of the lampstand.” '
  '20':
  - type: text
    content: 'So Moses, Aaron, and the whole community of Israel dedicated the Levites, carefully following all the '
  - type: text
    content: Lord
  - type: text
    content: '’s instructions to Moses. '
  '21':
  - type: text
    content: 'The Levites purified themselves from sin and washed their clothes, and Aaron lifted them up and presented them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a special offering. He then offered a sacrifice to purify them and make them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or then made atonement for them to purify them.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'After that the Levites went into the Tabernacle to perform their duties, assisting Aaron and his sons. So they carried out all the commands that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses concerning the Levites.'
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also instructed Moses, '
  '24':
  - type: text
    content: '“This is the rule the Levites must follow: They must begin serving in the Tabernacle at the age of twenty-five, '
  '25':
  - type: text
    content: 'and they must retire at the age of fifty. '
  '26':
  - type: text
    content: After retirement they may assist their fellow Levites by serving as guards at the Tabernacle, but they may not officiate in the service. This is how you must assign duties to the Levites.”
  '3':
  - type: text
    content: 'So Aaron did this. He set up the seven lamps so they reflected their light forward, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '4':
  - type: text
    content: 'The entire lampstand, from its base to its decorative blossoms, was made of beaten gold. It was built according to the exact design the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown Moses.'
  - type: heading
    content: The Levites Dedicated
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '6':
  - type: text
    content: '“Now set the Levites apart from the rest of the people of Israel and make them ceremonially clean. '
  '7':
  - type: text
    content: 'Do this by sprinkling them with the water of purification, and have them shave their entire body and wash their clothing. Then they will be ceremonially clean. '
  '8':
  - type: text
    content: 'Have them bring a young bull and a grain offering of choice flour moistened with olive oil, along with a second young bull for a sin offering. '
  '9':
  - type: text
    content: Then assemble the whole community of Israel, and present the Levites at the entrance of the Tabernacle.
  - type: note
    content: Hebrew the Tent of Meeting; also in 8:15, 19, 22, 24, 26.
  - type: text
    content: ' '
