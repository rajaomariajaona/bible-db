document_id: NUM.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparing the Lamps
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When you present the Levites before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the people of Israel must lay their hands on them. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raising his hands, Aaron must then present the Levites to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a special offering from the people of Israel, thus dedicating them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s service.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Next the Levites will lay their hands on the heads of the young bulls. Present one as a sin offering and the other as a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to purify the Levites and make them right with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to make atonement for the Levites.
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then have the Levites stand in front of Aaron and his sons, and raise your hands and present them as a special offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this way, you will set the Levites apart from the rest of the people of Israel, and the Levites will belong to me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After this, they may go into the Tabernacle to do their work, because you have purified them and presented them as a special offering.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Of all the people of Israel, the Levites are reserved for me. I have claimed them for myself in place of all the firstborn sons of the Israelites; I have taken the Levites as their substitutes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all the firstborn males among the people of Israel are mine, both of people and of animals. I set them apart for myself on the day I struck down all the firstborn sons of the Egyptians. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, I have claimed the Levites in place of all the firstborn sons of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And of all the Israelites, I have assigned the Levites to Aaron and his sons. They will serve in the Tabernacle on behalf of the Israelites and make sacrifices to purify
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: make atonement for.
      marker-yv: yv-n
    - type: text
      text: ' the people so no plague will strike them when they approach the sanctuary.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Give Aaron the following instructions: When you set up the seven lamps in the lampstand, place them so their light shines forward in front of the lampstand.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses, Aaron, and the whole community of Israel dedicated the Levites, carefully following all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s instructions to Moses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levites purified themselves from sin and washed their clothes, and Aaron lifted them up and presented them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a special offering. He then offered a sacrifice to purify them and make them right with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: then made atonement for them to purify them.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that the Levites went into the Tabernacle to perform their duties, assisting Aaron and his sons. So they carried out all the commands that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Moses concerning the Levites.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also instructed Moses, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the rule the Levites must follow: They must begin serving in the Tabernacle at the age of twenty-five, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they must retire at the age of fifty. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After retirement they may assist their fellow Levites by serving as guards at the Tabernacle, but they may not officiate in the service. This is how you must assign duties to the Levites.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Aaron did this. He set up the seven lamps so they reflected their light forward, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The entire lampstand, from its base to its decorative blossoms, was made of beaten gold. It was built according to the exact design the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had shown Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Levites Dedicated
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Now set the Levites apart from the rest of the people of Israel and make them ceremonially clean. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Do this by sprinkling them with the water of purification, and have them shave their entire body and wash their clothing. Then they will be ceremonially clean. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Have them bring a young bull and a grain offering of choice flour moistened with olive oil, along with a second young bull for a sin offering. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then assemble the whole community of Israel, and present the Levites at the entrance of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:15, 19, 22, 24, 26.
      marker-yv: yv-n
    - type: text
      text: ' '
