document_id: ECC.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: These are the words of the Teacher,
  - type: note
    content: Hebrew Qoheleth; this term is rendered “the Teacher” throughout this book.
  - type: text
    content: ' King David’s son, who ruled in Jerusalem.'
  - type: heading
    content: Everything Is Meaningless
  '10':
  - type: text
    content: 'Sometimes people say, “Here is something new!” But actually it is old; nothing is ever truly new. '
  '11':
  - type: text
    content: We don’t remember what happened in the past, and in future generations, no one will remember what we are doing now.
  - type: heading
    content: 'The Teacher Speaks: The Futility of Wisdom'
  '12':
  - type: text
    content: 'I, the Teacher, was king of Israel, and I lived in Jerusalem. '
  '13':
  - type: text
    content: 'I devoted myself to search for understanding and to explore by wisdom everything being done under heaven. I soon discovered that God has dealt a tragic existence to the human race. '
  '14':
  - type: text
    content: I observed everything going on under the sun, and really, it is all meaningless—like chasing the wind.
  '15':
  - type: text
    content: What is wrong cannot be made right.
  - type: text
    content: What is missing cannot be recovered.
  '16':
  - type: text
    content: 'I said to myself, “Look, I am wiser than any of the kings who ruled in Jerusalem before me. I have greater wisdom and knowledge than any of them.” '
  '17':
  - type: text
    content: So I set out to learn everything from wisdom to madness and folly. But I learned firsthand that pursuing all this is like chasing the wind.
  '18':
  - type: text
    content: The greater my wisdom, the greater my grief.
  - type: text
    content: To increase knowledge only increases sorrow.
  '2':
  - type: text
    content: “Everything is meaningless,” says the Teacher, “completely meaningless!”
  '3':
  - type: text
    content: 'What do people get for all their hard work under the sun? '
  '4':
  - type: text
    content: 'Generations come and generations go, but the earth never changes. '
  '5':
  - type: text
    content: 'The sun rises and the sun sets, then hurries around to rise again. '
  '6':
  - type: text
    content: 'The wind blows south, and then turns north. Around and around it goes, blowing in circles. '
  '7':
  - type: text
    content: 'Rivers run into the sea, but the sea is never full. Then the water returns again to the rivers and flows out again to the sea. '
  '8':
  - type: text
    content: Everything is wearisome beyond description. No matter how much we see, we are never satisfied. No matter how much we hear, we are not content.
  '9':
  - type: text
    content: 'History merely repeats itself. It has all been done before. Nothing under the sun is truly new. '
