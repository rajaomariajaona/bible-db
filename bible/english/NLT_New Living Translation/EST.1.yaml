document_id: EST.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The King’s Banquet
  - type: text
    content: These events happened in the days of King Xerxes,
  - type: note
    content: Hebrew Ahasuerus, another name for Xerxes; also throughout the book of Esther. Xerxes reigned 486–465 b.c.
  - type: text
    content: ' who reigned over 127 provinces stretching from India to Ethiopia.'
  - type: note
    content: Hebrew to Cush.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'On the seventh day of the feast, when King Xerxes was in high spirits because of the wine, he told the seven eunuchs who attended him—Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Carcas— '
  '11':
  - type: text
    content: 'to bring Queen Vashti to him with the royal crown on her head. He wanted the nobles and all the other men to gaze on her beauty, for she was a very beautiful woman. '
  '12':
  - type: text
    content: But when they conveyed the king’s order to Queen Vashti, she refused to come. This made the king furious, and he burned with anger.
  '13':
  - type: text
    content: 'He immediately consulted with his wise advisers, who knew all the Persian laws and customs, for he always asked their advice. '
  '14':
  - type: text
    content: The names of these men were Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan—seven nobles of Persia and Media. They met with the king regularly and held the highest positions in the empire.
  '15':
  - type: text
    content: “What must be done to Queen Vashti?” the king demanded. “What penalty does the law provide for a queen who refuses to obey the king’s orders, properly sent through his eunuchs?”
  '16':
  - type: text
    content: 'Memucan answered the king and his nobles, “Queen Vashti has wronged not only the king but also every noble and citizen throughout your empire. '
  '17':
  - type: text
    content: 'Women everywhere will begin to despise their husbands when they learn that Queen Vashti has refused to appear before the king. '
  '18':
  - type: text
    content: Before this day is out, the wives of all the king’s nobles throughout Persia and Media will hear what the queen did and will start treating their husbands the same way. There will be no end to their contempt and anger.
  '19':
  - type: text
    content: '“So if it please the king, we suggest that you issue a written decree, a law of the Persians and Medes that cannot be revoked. It should order that Queen Vashti be forever banished from the presence of King Xerxes, and that the king should choose another queen more worthy than she. '
  '2':
  - type: text
    content: 'At that time Xerxes ruled his empire from his royal throne at the fortress of Susa. '
  '20':
  - type: text
    content: When this decree is published throughout the king’s vast empire, husbands everywhere, whatever their rank, will receive proper respect from their wives!”
  '21':
  - type: text
    content: 'The king and his nobles thought this made good sense, so he followed Memucan’s counsel. '
  '22':
  - type: text
    content: He sent letters to all parts of the empire, to each province in its own script and language, proclaiming that every man should be the ruler of his own home and should say whatever he pleases.
  - type: note
    content: Or and should speak in the language of his own people.
  '3':
  - type: text
    content: 'In the third year of his reign, he gave a banquet for all his nobles and officials. He invited all the military officers of Persia and Media as well as the princes and nobles of the provinces. '
  '4':
  - type: text
    content: The celebration lasted 180 days—a tremendous display of the opulent wealth of his empire and the pomp and splendor of his majesty.
  '5':
  - type: text
    content: 'When it was all over, the king gave a banquet for all the people, from the greatest to the least, who were in the fortress of Susa. It lasted for seven days and was held in the courtyard of the palace garden. '
  '6':
  - type: text
    content: The courtyard was beautifully decorated with white cotton curtains and blue hangings, which were fastened with white linen cords and purple ribbons to silver rings embedded in marble pillars. Gold and silver couches stood on a mosaic pavement of porphyry, marble, mother-of-pearl, and other costly stones.
  '7':
  - type: text
    content: 'Drinks were served in gold goblets of many designs, and there was an abundance of royal wine, reflecting the king’s generosity. '
  '8':
  - type: text
    content: By edict of the king, no limits were placed on the drinking, for the king had instructed all his palace officials to serve each man as much as he wanted.
  '9':
  - type: text
    content: At the same time, Queen Vashti gave a banquet for the women in the royal palace of King Xerxes.
  - type: heading
    content: Queen Vashti Deposed
