document_id: EST.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King’s Banquet
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: These events happened in the days of King Xerxes,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahasuerus, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'another name for Xerxes; also throughout the book of Esther. Xerxes reigned 486–465 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' who reigned over 127 provinces stretching from India to Ethiopia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Cush.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On the seventh day of the feast, when King Xerxes was in high spirits because of the wine, he told the seven eunuchs who attended him—Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Carcas— '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'to bring Queen Vashti to him with the royal crown on her head. He wanted the nobles and all the other men to gaze on her beauty, for she was a very beautiful woman. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But when they conveyed the king’s order to Queen Vashti, she refused to come. This made the king furious, and he burned with anger.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He immediately consulted with his wise advisers, who knew all the Persian laws and customs, for he always asked their advice. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The names of these men were Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan—seven nobles of Persia and Media. They met with the king regularly and held the highest positions in the empire.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “What must be done to Queen Vashti?” the king demanded. “What penalty does the law provide for a queen who refuses to obey the king’s orders, properly sent through his eunuchs?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Memucan answered the king and his nobles, “Queen Vashti has wronged not only the king but also every noble and citizen throughout your empire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Women everywhere will begin to despise their husbands when they learn that Queen Vashti has refused to appear before the king. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Before this day is out, the wives of all the king’s nobles throughout Persia and Media will hear what the queen did and will start treating their husbands the same way. There will be no end to their contempt and anger.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“So if it please the king, we suggest that you issue a written decree, a law of the Persians and Medes that cannot be revoked. It should order that Queen Vashti be forever banished from the presence of King Xerxes, and that the king should choose another queen more worthy than she. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'At that time Xerxes ruled his empire from his royal throne at the fortress of Susa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When this decree is published throughout the king’s vast empire, husbands everywhere, whatever their rank, will receive proper respect from their wives!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The king and his nobles thought this made good sense, so he followed Memucan’s counsel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He sent letters to all parts of the empire, to each province in its own script and language, proclaiming that every man should be the ruler of his own home and should say whatever he pleases.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and should speak in the language of his own people.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'In the third year of his reign, he gave a banquet for all his nobles and officials. He invited all the military officers of Persia and Media as well as the princes and nobles of the provinces. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The celebration lasted 180 days—a tremendous display of the opulent wealth of his empire and the pomp and splendor of his majesty.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When it was all over, the king gave a banquet for all the people, from the greatest to the least, who were in the fortress of Susa. It lasted for seven days and was held in the courtyard of the palace garden. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The courtyard was beautifully decorated with white cotton curtains and blue hangings, which were fastened with white linen cords and purple ribbons to silver rings embedded in marble pillars. Gold and silver couches stood on a mosaic pavement of porphyry, marble, mother-of-pearl, and other costly stones.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Drinks were served in gold goblets of many designs, and there was an abundance of royal wine, reflecting the king’s generosity. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: By edict of the king, no limits were placed on the drinking, for the king had instructed all his palace officials to serve each man as much as he wanted.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: At the same time, Queen Vashti gave a banquet for the women in the royal palace of King Xerxes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Queen Vashti Deposed
    marker-yv: yv-h
