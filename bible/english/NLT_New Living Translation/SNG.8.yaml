  '1':
  - type: heading
    content: Young Woman
  - type: text
    content: Oh, I wish you were my brother,
  - type: text
    content: who nursed at my mother’s breasts.
  - type: text
    content: Then I could kiss you no matter who was watching,
  - type: text
    content: and no one would criticize me.
  '10':
  - type: text
    content: I was a virgin, like a wall;
  - type: text
    content: now my breasts are like towers.
  - type: text
    content: When my lover looks at me,
  - type: text
    content: he is delighted with what he sees.
  '11':
  - type: text
    content: Solomon has a vineyard at Baal-hamon,
  - type: text
    content: which he leases out to tenant farmers.
  - type: text
    content: Each of them pays a thousand pieces of silver
  - type: text
    content: for harvesting its fruit.
  '12':
  - type: text
    content: But my vineyard is mine to give,
  - type: text
    content: and Solomon need not pay a thousand pieces of silver.
  - type: text
    content: But I will give two hundred pieces
  - type: text
    content: to those who care for its vines.
  - type: heading
    content: Young Man
  '13':
  - type: text
    content: O my darling, lingering in the gardens,
  - type: text
    content: your companions are fortunate to hear your voice.
  - type: text
    content: Let me hear it, too!
  - type: heading
    content: Young Woman
  '14':
  - type: text
    content: Come away, my love! Be like a gazelle
  - type: text
    content: or a young stag on the mountains of spices.
  '2':
  - type: text
    content: I would bring you to my childhood home,
  - type: text
    content: and there you would teach me.
  - type: note
    content: Or there she will teach me.
  - type: text
    content: I would give you spiced wine to drink,
  - type: text
    content: my sweet pomegranate wine.
  '3':
  - type: text
    content: Your left arm would be under my head,
  - type: text
    content: and your right arm would embrace me.
  '4':
  - type: text
    content: Promise me, O women of Jerusalem,
  - type: text
    content: not to awaken love until the time is right.
  - type: note
    content: Or not to awaken love until it is ready.
  - type: heading
    content: Young Women of Jerusalem
  '5':
  - type: text
    content: Who is this sweeping in from the desert,
  - type: text
    content: leaning on her lover?
  - type: heading
    content: Young Woman
  - type: text
    content: I aroused you under the apple tree,
  - type: text
    content: where your mother gave you birth,
  - type: text
    content: where in great pain she delivered you.
  '6':
  - type: text
    content: Place me like a seal over your heart,
  - type: text
    content: like a seal on your arm.
  - type: text
    content: For love is as strong as death,
  - type: text
    content: its jealousy
  - type: note
    content: Or its passion.
  - type: text
    content: ' as enduring as the grave.'
  - type: note
    content: Hebrew as Sheol.
  - type: text
    content: Love flashes like fire,
  - type: text
    content: the brightest kind of flame.
  '7':
  - type: text
    content: Many waters cannot quench love,
  - type: text
    content: nor can rivers drown it.
  - type: text
    content: If a man tried to buy love
  - type: text
    content: with all his wealth,
  - type: text
    content: his offer would be utterly scorned.
  - type: heading
    content: The Young Woman’s Brothers
  '8':
  - type: text
    content: We have a little sister
  - type: text
    content: too young to have breasts.
  - type: text
    content: What will we do for our sister
  - type: text
    content: if someone asks to marry her?
  '9':
  - type: text
    content: If she is a virgin, like a wall,
  - type: text
    content: we will protect her with a silver tower.
  - type: text
    content: But if she is promiscuous, like a swinging door,
  - type: text
    content: we will block her door with a cedar bar.
  - type: heading
    content: Young Woman
