    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, what joy for those
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose disobedience is forgiven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose sin is put out of sight!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yes, what joy for those
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'whose record the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has cleared of guilt,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of sin. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 4:8.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose lives are lived in complete honesty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I refused to confess my sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body wasted away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I groaned all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Day and night your hand of discipline was heavy on me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My strength evaporated like water in the summer heat. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Finally, I confessed all my sins to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stopped trying to hide my guilt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I said to myself, “I will confess my rebellion to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And you forgave me! All my guilt is gone. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore, let all the godly pray to you while there is still time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they may not drown in the floodwaters of judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For you are my hiding place;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you protect me from trouble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You surround me with songs of victory. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “I will guide you along the best pathway for your life.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will advise you and watch over you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do not be like a senseless horse or mule
- type: usfm
  marker: q2
  children:
  - type: text
    text: that needs a bit and bridle to keep it under control.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Many sorrows come to the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but unfailing love surrounds those who trust the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and be glad, all you who obey him!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout for joy, all you whose hearts are pure!
