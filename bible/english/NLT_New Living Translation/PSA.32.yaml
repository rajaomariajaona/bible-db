document_id: PSA.32,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of David.'
  - type: text
    content: Oh, what joy for those
  - type: text
    content: whose disobedience is forgiven,
  - type: text
    content: whose sin is put out of sight!
  '10':
  - type: text
    content: Many sorrows come to the wicked,
  - type: text
    content: 'but unfailing love surrounds those who trust the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: 'So rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ' and be glad, all you who obey him!'
  - type: text
    content: Shout for joy, all you whose hearts are pure!
  '2':
  - type: text
    content: Yes, what joy for those
  - type: text
    content: 'whose record the '
  - type: text
    content: Lord
  - type: text
    content: ' has cleared of guilt,'
  - type: note
    content: Greek version reads of sin. Compare Rom 4:8.
  - type: text
    content: whose lives are lived in complete honesty!
  '3':
  - type: text
    content: When I refused to confess my sin,
  - type: text
    content: my body wasted away,
  - type: text
    content: and I groaned all day long.
  '4':
  - type: text
    content: Day and night your hand of discipline was heavy on me.
  - type: text
    content: 'My strength evaporated like water in the summer heat. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: Finally, I confessed all my sins to you
  - type: text
    content: and stopped trying to hide my guilt.
  - type: text
    content: 'I said to myself, “I will confess my rebellion to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: 'And you forgave me! All my guilt is gone. '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: Therefore, let all the godly pray to you while there is still time,
  - type: text
    content: that they may not drown in the floodwaters of judgment.
  '7':
  - type: text
    content: For you are my hiding place;
  - type: text
    content: you protect me from trouble.
  - type: text
    content: 'You surround me with songs of victory. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “I will guide you along the best pathway for your life.'
  - type: text
    content: I will advise you and watch over you.
  '9':
  - type: text
    content: Do not be like a senseless horse or mule
  - type: text
    content: that needs a bit and bridle to keep it under control.”
