document_id: REV.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Great Prostitute
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One of the seven angels who had poured out the seven bowls came over and spoke to me. “Come with me,” he said, “and I will show you the judgment that is going to come on the great prostitute, who rules over many waters. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Five kings have already fallen, the sixth now reigns, and the seventh is yet to come, but his reign will be brief.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“The scarlet beast that was, but is no longer, is the eighth king. He is like the other seven, and he, too, is headed for destruction. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The ten horns of the beast are ten kings who have not yet risen to power. They will be appointed to their kingdoms for one brief moment to reign with the beast. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They will all agree to give him their power and authority. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Together they will go to war against the Lamb, but the Lamb will defeat them because he is Lord of all lords and King of all kings. And his called and chosen and faithful ones will be with him.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the angel said to me, “The waters where the prostitute is ruling represent masses of people of every nation and language. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The scarlet beast and his ten horns all hate the prostitute. They will strip her naked, eat her flesh, and burn her remains with fire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For God has put a plan into their minds, a plan that will carry out his purposes. They will agree to give their authority to the scarlet beast, and so the words of God will be fulfilled. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And this woman you saw in your vision represents the great city that rules over the kings of the world.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The kings of the world have committed adultery with her, and the people who belong to this world have been made drunk by the wine of her immorality.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So the angel took me in the Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in spirit.
      marker-yv: yv-n
    - type: text
      text: ' into the wilderness. There I saw a woman sitting on a scarlet beast that had seven heads and ten horns, and blasphemies against God were written all over it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The woman wore purple and scarlet clothing and beautiful jewelry made of gold and precious gems and pearls. In her hand she held a gold goblet full of obscenities and the impurities of her immorality. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A mysterious name was written on her forehead: “Babylon the Great, Mother of All Prostitutes and Obscenities in the World.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I could see that she was drunk—drunk with the blood of God’s holy people who were witnesses for Jesus. I stared at her in complete amazement.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Why are you so amazed?” the angel asked. “I will tell you the mystery of this woman and of the beast with seven heads and ten horns on which she sits. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The beast you saw was once alive but isn’t now. And yet he will soon come up out of the bottomless pit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the abyss, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the underworld.
      marker-yv: yv-n
    - type: text
      text: ' and go to eternal destruction. And the people who belong to this world, whose names were not written in the Book of Life before the world was made, will be amazed at the reappearance of this beast who had died.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“This calls for a mind with understanding: The seven heads of the beast represent the seven hills where the woman rules. They also represent seven kings. '
