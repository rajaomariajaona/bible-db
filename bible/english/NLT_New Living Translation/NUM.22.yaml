document_id: NUM.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balak Sends for Balaam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the people of Israel traveled to the plains of Moab and camped east of the Jordan River, across from Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balak son of Zippor, the Moabite king, had seen everything the Israelites did to the Amorites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when the people of Moab saw how many Israelites there were, they were terrified. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The king of Moab said to the elders of Midian, “This mob will devour everything in sight, like an ox devours grass in the field!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Balak, king of Moab, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: sent messengers to call Balaam son of Beor, who was living in his native land of Pethor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who was at Pethor in the land of the Amavites.
    marker-yv: yv-n
  - type: text
    text: ' near the Euphrates River.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: ' His message said:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“Look, a vast horde of people has arrived from Egypt. They cover the face of the earth and are threatening me. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Please come and curse these people for me because they are too powerful for me. Then perhaps I will be able to conquer them and drive them from the land. I know that blessings fall on any people you bless, and curses fall on people you curse.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Balak’s messengers, who were elders of Moab and Midian, set out with money to pay Balaam to place a curse upon Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: set out with the money of divination in their hand.
    marker-yv: yv-n
  - type: text
    text: ' They went to Balaam and delivered Balak’s message to him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Stay here overnight,” Balaam said. “In the morning I will tell you whatever the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' directs me to say.” So the officials from Moab stayed there with Balaam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: That night God came to Balaam and asked him, “Who are these men visiting you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Balaam said to God, “Balak son of Zippor, king of Moab, has sent me this message: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘Look, a vast horde of people has arrived from Egypt, and they cover the face of the earth. Come and curse these people for me. Then perhaps I will be able to stand up to them and drive them from the land.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But God told Balaam, “Do not go with them. You are not to curse these people, for they have been blessed!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The next morning Balaam got up and told Balak’s officials, “Go on home! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not let me go with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the Moabite officials returned to King Balak and reported, “Balaam refused to come with us.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Balak tried again. This time he sent a larger number of even more distinguished officials than those he had sent the first time. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They went to Balaam and delivered this message to him:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“This is what Balak son of Zippor says: Please don’t let anything stop you from coming to help me. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will pay you very well and do whatever you tell me. Just come and curse these people for me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But Balaam responded to Balak’s messengers, “Even if Balak were to give me his palace filled with silver and gold, I would be powerless to do anything against the will of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But stay here one more night, and I will see if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has anything else to say to me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: That night God came to Balaam and told him, “Since these men have come for you, get up and go with them. But do only what I tell you to do.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam and His Donkey
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the next morning Balaam got up, saddled his donkey, and started off with the Moabite officials. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But God was angry that Balaam was going, so he sent the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to stand in the road to block his way. As Balaam and two servants were riding along, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Balaam’s donkey saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' standing in the road with a drawn sword in his hand. The donkey bolted off the road into a field, but Balaam beat it and turned it back onto the road. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' stood at a place where the road narrowed between two vineyard walls. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When the donkey saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', it tried to squeeze by and crushed Balaam’s foot against the wall. So Balaam beat the donkey again. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' moved farther down the road and stood in a place too narrow for the donkey to get by at all. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: This time when the donkey saw the angel, it lay down under Balaam. In a fit of rage Balaam beat the animal again with his staff.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave the donkey the ability to speak. “What have I done to you that deserves your beating me three times?” it asked Balaam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “You have made me look like a fool!” Balaam shouted. “If I had a sword with me, I would kill you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “But I am the same donkey you have ridden all your life,” the donkey answered. “Have I ever done anything like this before?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” Balaam admitted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' opened Balaam’s eyes, and he saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' standing in the roadway with a drawn sword in his hand. Balaam bowed his head and fell face down on the ground before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“Why did you beat your donkey those three times?” the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' demanded. “Look, I have come to block your way because you are stubbornly resisting me. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Three times the donkey saw me and shied away; otherwise, I would certainly have killed you by now and spared the donkey.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then Balaam confessed to the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I have sinned. I didn’t realize you were standing in the road to block my way. I will return home if you are against my going.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Balaam, “Go with these men, but say only what I tell you to say.” So Balaam went on with Balak’s officials. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When King Balak heard that Balaam was on the way, he went out to meet him at a Moabite town on the Arnon River at the farthest border of his land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “Didn’t I send you an urgent invitation? Why didn’t you come right away?” Balak asked Balaam. “Didn’t you believe me when I said I would reward you richly?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Balaam replied, “Look, now I have come, but I have no power to say whatever I want. I will speak only the message that God puts in my mouth.” '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Balaam accompanied Balak to Kiriath-huzoth, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'where the king sacrificed cattle and sheep. He sent portions of the meat to Balaam and the officials who were with him. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: The next morning Balak took Balaam up to Bamoth-baal. From there he could see some of the people of Israel spread out below him.
