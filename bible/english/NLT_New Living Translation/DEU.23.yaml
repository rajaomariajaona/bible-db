verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Regulations concerning Worship
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 23:1-25 are numbered 23:2-26 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: '“If a man’s testicles are crushed or his penis is cut off, he may not be admitted to the assembly of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Any man who becomes ceremonially defiled because of a nocturnal emission must leave the camp and stay away all day. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toward evening he must bathe himself, and at sunset he may return to the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must have a designated area outside the camp where you can go to relieve yourself. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each of you must have a spade as part of your equipment. Whenever you relieve yourself, dig a hole with the spade and cover the excrement. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The camp must be holy, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God moves around in your camp to protect you and to defeat your enemies. He must not see any shameful thing among you, or he will turn away from you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If slaves should escape from their masters and take refuge with you, you must not hand them over to their masters. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let them live among you in any town they choose, and do not oppress them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No Israelite, whether man or woman, may become a temple prostitute. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you are bringing an offering to fulfill a vow, you must not bring to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God any offering from the earnings of a prostitute, whether a man'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a dog.
      marker-yv: yv-n
    - type: text
      text: ' or a woman, for both are detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not charge interest on the loans you make to a fellow Israelite, whether you loan money, or food, or anything else. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If a person is illegitimate by birth, neither he nor his descendants for ten generations may be admitted to the assembly of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may charge interest to foreigners, but you may not charge interest to Israelites, so that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God may bless you in everything you do in the land you are about to enter and occupy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you make a vow to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, be prompt in fulfilling whatever you promised him. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God demands that you promptly fulfill all your vows, or you will be guilty of sin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, it is not a sin to refrain from making a vow. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But once you have voluntarily made a vow, be careful to fulfill your promise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you enter your neighbor’s vineyard, you may eat your fill of grapes, but you must not carry any away in a basket. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when you enter your neighbor’s field of grain, you may pluck the heads of grain with your hand, but you must not harvest it with a sickle.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No Ammonite or Moabite or any of their descendants for ten generations may be admitted to the assembly of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These nations did not welcome you with food and water when you came out of Egypt. Instead, they hired Balaam son of Beor from Pethor in distant Aram-naharaim to curse you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God refused to listen to Balaam. He turned the intended curse into a blessing because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God loves you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As long as you live, you must never promote the welfare and prosperity of the Ammonites or Moabites.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not detest the Edomites or the Egyptians, because the Edomites are your relatives and you lived as foreigners among the Egyptians. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The third generation of Edomites and Egyptians may enter the assembly of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miscellaneous Regulations
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “When you go to war against your enemies, be sure to stay away from anything that is impure.
