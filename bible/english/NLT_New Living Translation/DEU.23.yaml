document_id: DEU.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Regulations concerning Worship
  - type: text
    content: ' '
  - type: note
    content: Verses 23:1-25 are numbered 23:2-26 in Hebrew text.
  - type: text
    content: '“If a man’s testicles are crushed or his penis is cut off, he may not be admitted to the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: '“Any man who becomes ceremonially defiled because of a nocturnal emission must leave the camp and stay away all day. '
  '11':
  - type: text
    content: Toward evening he must bathe himself, and at sunset he may return to the camp.
  '12':
  - type: text
    content: '“You must have a designated area outside the camp where you can go to relieve yourself. '
  '13':
  - type: text
    content: 'Each of you must have a spade as part of your equipment. Whenever you relieve yourself, dig a hole with the spade and cover the excrement. '
  '14':
  - type: text
    content: 'The camp must be holy, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God moves around in your camp to protect you and to defeat your enemies. He must not see any shameful thing among you, or he will turn away from you.'
  '15':
  - type: text
    content: '“If slaves should escape from their masters and take refuge with you, you must not hand them over to their masters. '
  '16':
  - type: text
    content: Let them live among you in any town they choose, and do not oppress them.
  '17':
  - type: text
    content: '“No Israelite, whether man or woman, may become a temple prostitute. '
  '18':
  - type: text
    content: 'When you are bringing an offering to fulfill a vow, you must not bring to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God any offering from the earnings of a prostitute, whether a man'
  - type: note
    content: Hebrew a dog.
  - type: text
    content: ' or a woman, for both are detestable to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: '“Do not charge interest on the loans you make to a fellow Israelite, whether you loan money, or food, or anything else. '
  '2':
  - type: text
    content: '“If a person is illegitimate by birth, neither he nor his descendants for ten generations may be admitted to the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'You may charge interest to foreigners, but you may not charge interest to Israelites, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in everything you do in the land you are about to enter and occupy.'
  '21':
  - type: text
    content: '“When you make a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, be prompt in fulfilling whatever you promised him. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God demands that you promptly fulfill all your vows, or you will be guilty of sin. '
  '22':
  - type: text
    content: 'However, it is not a sin to refrain from making a vow. '
  '23':
  - type: text
    content: 'But once you have voluntarily made a vow, be careful to fulfill your promise to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '24':
  - type: text
    content: '“When you enter your neighbor’s vineyard, you may eat your fill of grapes, but you must not carry any away in a basket. '
  '25':
  - type: text
    content: And when you enter your neighbor’s field of grain, you may pluck the heads of grain with your hand, but you must not harvest it with a sickle.
  '3':
  - type: text
    content: '“No Ammonite or Moabite or any of their descendants for ten generations may be admitted to the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'These nations did not welcome you with food and water when you came out of Egypt. Instead, they hired Balaam son of Beor from Pethor in distant Aram-naharaim to curse you. '
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' your God refused to listen to Balaam. He turned the intended curse into a blessing because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God loves you. '
  '6':
  - type: text
    content: As long as you live, you must never promote the welfare and prosperity of the Ammonites or Moabites.
  '7':
  - type: text
    content: '“Do not detest the Edomites or the Egyptians, because the Edomites are your relatives and you lived as foreigners among the Egyptians. '
  '8':
  - type: text
    content: 'The third generation of Edomites and Egyptians may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Miscellaneous Regulations
  '9':
  - type: text
    content: “When you go to war against your enemies, be sure to stay away from anything that is impure.
