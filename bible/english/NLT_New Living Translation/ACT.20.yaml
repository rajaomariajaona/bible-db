document_id: ACT.20,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Goes to Macedonia and Greece
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When the uproar was over, Paul sent for the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: disciples.
      marker-yv: yv-n
    - type: text
      text: ' and encouraged them. Then he said good-bye and left for Macedonia. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Paul went down, bent over him, and took him into his arms. “Don’t worry,” he said, “he’s alive!” '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then they all went back upstairs, shared in the Lord’s Supper,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: broke the bread.
      marker-yv: yv-n
    - type: text
      text: ' and ate together. Paul continued talking to them until dawn, and then he left. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Meanwhile, the young man was taken home alive and well, and everyone was greatly relieved.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Meets the Ephesian Elders
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Paul went by land to Assos, where he had arranged for us to join him, while we traveled by ship. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He joined us there, and we sailed together to Mitylene. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The next day we sailed past the island of Kios. The following day we crossed to the island of Samos, and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and having stayed at Trogyllium.
      marker-yv: yv-n
    - type: text
      text: ' a day later we arrived at Miletus.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Paul had decided to sail on past Ephesus, for he didn’t want to spend any more time in the province of Asia. He was hurrying to get to Jerusalem, if possible, in time for the Festival of Pentecost. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But when we landed at Miletus, he sent a message to the elders of the church at Ephesus, asking them to come and meet him.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When they arrived he declared, “You know that from the day I set foot in the province of Asia until now '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I have done the Lord’s work humbly and with many tears. I have endured the trials that came to me from the plots of the Jews. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'While there, he encouraged the believers in all the towns he passed through. Then he traveled down to Greece, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I never shrank back from telling you what you needed to hear, either publicly or in your homes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I have had one message for Jews and Greeks alike—the necessity of repenting from sin and turning to God, and of having faith in our Lord Jesus.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “And now I am bound by the Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'by my spirit, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'by an inner compulsion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by the spirit.
      marker-yv: yv-n
    - type: text
      text: ' to go to Jerusalem. I don’t know what awaits me, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'except that the Holy Spirit tells me in city after city that jail and suffering lie ahead. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But my life is worth nothing to me unless I use it for finishing the work assigned me by the Lord Jesus—the work of telling others the Good News about the wonderful grace of God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“And now I know that none of you to whom I have preached the Kingdom will ever see me again. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I declare today that I have been faithful. If anyone suffers eternal death, it’s not my fault,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I am innocent of the blood of all.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: for I didn’t shrink from declaring all that God wants you to know.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “So guard yourselves and God’s people. Feed and shepherd God’s flock—his church, purchased with his own blood
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:28a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with the blood of his own [Son].
      marker-yv: yv-n
    - type: text
      text: —over which the Holy Spirit has appointed you as leaders.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:28b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'overseers, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bishops.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'I know that false teachers, like vicious wolves, will come in among you after I leave, not sparing the flock. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: where he stayed for three months. He was preparing to sail back to Syria when he discovered a plot by some Jews against his life, so he decided to return through Macedonia.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Even some men from your own group will rise up and distort the truth in order to draw a following. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Watch out! Remember the three years I was with you—my constant watch and care over you night and day, and my many tears for you.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “And now I entrust you to God and the message of his grace that is able to build you up and give you an inheritance with all those he has set apart for himself.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“I have never coveted anyone’s silver or gold or fine clothes. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'You know that these hands of mine have worked to supply my own needs and even the needs of those who were with me. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And I have been a constant example of how you can help those in need by working hard. You should remember the words of the Lord Jesus: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘It is more blessed to give than to receive.’
    - type: text
      text: ”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'When he had finished speaking, he knelt and prayed with them. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'They all cried as they embraced and kissed him good-bye. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: They were sad most of all because he had said that they would never see him again. Then they escorted him down to the ship.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Several men were traveling with him. They were Sopater son of Pyrrhus from Berea; Aristarchus and Secundus from Thessalonica; Gaius from Derbe; Timothy; and Tychicus and Trophimus from the province of Asia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They went on ahead and waited for us at Troas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: After the Passover
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the days of unleavened bread.
      marker-yv: yv-n
    - type: text
      text: ' ended, we boarded a ship at Philippi in Macedonia and five days later joined them in Troas, where we stayed a week.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Visit to Troas
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: On the first day of the week, we gathered with the local believers to share in the Lord’s Supper.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to break bread.
      marker-yv: yv-n
    - type: text
      text: ' Paul was preaching to them, and since he was leaving the next day, he kept talking until midnight. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The upstairs room where we met was lighted with many flickering lamps. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'As Paul spoke on and on, a young man named Eutychus, sitting on the windowsill, became very drowsy. Finally, he fell sound asleep and dropped three stories to his death below. '
