document_id: GEN.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Call of Abram
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Abram, “Leave your native country, your relatives, and your father’s family, and go to the land that I will show you. '
  '10':
  - type: text
    content: 'At that time a severe famine struck the land of Canaan, forcing Abram to go down to Egypt, where he lived as a foreigner. '
  '11':
  - type: text
    content: 'As he was approaching the border of Egypt, Abram said to his wife, Sarai, “Look, you are a very beautiful woman. '
  '12':
  - type: text
    content: 'When the Egyptians see you, they will say, ‘This is his wife. Let’s kill him; then we can have her!’ '
  '13':
  - type: text
    content: So please tell them you are my sister. Then they will spare my life and treat me well because of their interest in you.”
  '14':
  - type: text
    content: 'And sure enough, when Abram arrived in Egypt, everyone noticed Sarai’s beauty. '
  '15':
  - type: text
    content: 'When the palace officials saw her, they sang her praises to Pharaoh, their king, and Sarai was taken into his palace. '
  '16':
  - type: text
    content: Then Pharaoh gave Abram many gifts because of her—sheep, goats, cattle, male and female donkeys, male and female servants, and camels.
  '17':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' sent terrible plagues upon Pharaoh and his household because of Sarai, Abram’s wife. '
  '18':
  - type: text
    content: 'So Pharaoh summoned Abram and accused him sharply. “What have you done to me?” he demanded. “Why didn’t you tell me she was your wife? '
  '19':
  - type: text
    content: 'Why did you say, ‘She is my sister,’ and allow me to take her as my wife? Now then, here is your wife. Take her and get out of here!” '
  '2':
  - type: text
    content: 'I will make you into a great nation. I will bless you and make you famous, and you will be a blessing to others. '
  '20':
  - type: text
    content: Pharaoh ordered some of his men to escort them, and he sent Abram out of the country, along with his wife and all his possessions.
  '3':
  - type: text
    content: I will bless those who bless you and curse those who treat you with contempt. All the families on earth will be blessed through you.”
  '4':
  - type: text
    content: 'So Abram departed as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed, and Lot went with him. Abram was seventy-five years old when he left Haran. '
  '5':
  - type: text
    content: 'He took his wife, Sarai, his nephew Lot, and all his wealth—his livestock and all the people he had taken into his household at Haran—and headed for the land of Canaan. When they arrived in Canaan, '
  '6':
  - type: text
    content: Abram traveled through the land as far as Shechem. There he set up camp beside the oak of Moreh. At that time, the area was inhabited by Canaanites.
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Abram and said, “I will give this land to your descendants.'
  - type: note
    content: Hebrew seed.
  - type: text
    content: '” And Abram built an altar there and dedicated it to the '
  - type: text
    content: Lord
  - type: text
    content: ', who had appeared to him. '
  '8':
  - type: text
    content: 'After that, Abram traveled south and set up camp in the hill country, with Bethel to the west and Ai to the east. There he built another altar and dedicated it to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he worshiped the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: Then Abram continued traveling south by stages toward the Negev.
  - type: heading
    content: Abram and Sarai in Egypt
