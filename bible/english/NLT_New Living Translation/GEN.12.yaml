document_id: GEN.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Call of Abram
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Abram, “Leave your native country, your relatives, and your father’s family, and go to the land that I will show you. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At that time a severe famine struck the land of Canaan, forcing Abram to go down to Egypt, where he lived as a foreigner. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As he was approaching the border of Egypt, Abram said to his wife, Sarai, “Look, you are a very beautiful woman. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When the Egyptians see you, they will say, ‘This is his wife. Let’s kill him; then we can have her!’ '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So please tell them you are my sister. Then they will spare my life and treat me well because of their interest in you.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And sure enough, when Abram arrived in Egypt, everyone noticed Sarai’s beauty. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the palace officials saw her, they sang her praises to Pharaoh, their king, and Sarai was taken into his palace. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh gave Abram many gifts because of her—sheep, goats, cattle, male and female donkeys, male and female servants, and camels.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent terrible plagues upon Pharaoh and his household because of Sarai, Abram’s wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Pharaoh summoned Abram and accused him sharply. “What have you done to me?” he demanded. “Why didn’t you tell me she was your wife? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why did you say, ‘She is my sister,’ and allow me to take her as my wife? Now then, here is your wife. Take her and get out of here!” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will make you into a great nation. I will bless you and make you famous, and you will be a blessing to others. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh ordered some of his men to escort them, and he sent Abram out of the country, along with his wife and all his possessions.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I will bless those who bless you and curse those who treat you with contempt. All the families on earth will be blessed through you.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram departed as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had instructed, and Lot went with him. Abram was seventy-five years old when he left Haran. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took his wife, Sarai, his nephew Lot, and all his wealth—his livestock and all the people he had taken into his household at Haran—and headed for the land of Canaan. When they arrived in Canaan, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram traveled through the land as far as Shechem. There he set up camp beside the oak of Moreh. At that time, the area was inhabited by Canaanites.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Abram and said, “I will give this land to your descendants.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seed.
      marker-yv: yv-n
    - type: text
      text: '” And Abram built an altar there and dedicated it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who had appeared to him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that, Abram traveled south and set up camp in the hill country, with Bethel to the west and Ai to the east. There he built another altar and dedicated it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abram continued traveling south by stages toward the Negev.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram and Sarai in Egypt
    marker-yv: yv-h
