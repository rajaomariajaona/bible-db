document_id: PHP.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: Therefore, my dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 4:8.
  - type: text
    content: ' stay true to the Lord. I love you and long to see you, dear friends, for you are my joy and the crown I receive for my work.'
  - type: heading
    content: Words of Encouragement
  '10':
  - type: text
    content: 'How I praise the Lord that you are concerned about me again. I know you have always been concerned for me, but you didn’t have the chance to help me. '
  '11':
  - type: text
    content: 'Not that I was ever in need, for I have learned how to be content with whatever I have. '
  '12':
  - type: text
    content: 'I know how to live on almost nothing or with everything. I have learned the secret of living in every situation, whether it is with a full stomach or empty, with plenty or little. '
  '13':
  - type: text
    content: For I can do everything through Christ,
  - type: note
    content: Greek through the one.
  - type: text
    content: ' who gives me strength. '
  '14':
  - type: text
    content: Even so, you have done well to share with me in my present difficulty.
  '15':
  - type: text
    content: 'As you know, you Philippians were the only ones who gave me financial help when I first brought you the Good News and then traveled on from Macedonia. No other church did this. '
  '16':
  - type: text
    content: 'Even when I was in Thessalonica you sent help more than once. '
  '17':
  - type: text
    content: I don’t say this because I want a gift from you. Rather, I want you to receive a reward for your kindness.
  '18':
  - type: text
    content: 'At the moment I have all I need—and more! I am generously supplied with the gifts you sent me with Epaphroditus. They are a sweet-smelling sacrifice that is acceptable and pleasing to God. '
  '19':
  - type: text
    content: And this same God who takes care of me will supply all your needs from his glorious riches, which have been given to us in Christ Jesus.
  '2':
  - type: text
    content: 'Now I appeal to Euodia and Syntyche. Please, because you belong to the Lord, settle your disagreement. '
  '20':
  - type: text
    content: Now all glory to God our Father forever and ever! Amen.
  - type: heading
    content: Paul’s Final Greetings
  '21':
  - type: text
    content: 'Give my greetings to each of God’s holy people—all who belong to Christ Jesus. The brothers who are with me send you their greetings. '
  '22':
  - type: text
    content: And all the rest of God’s people send you greetings, too, especially those in Caesar’s household.
  '23':
  - type: text
    content: May the grace of the Lord Jesus Christ be with your spirit.
  - type: note
    content: Some manuscripts add Amen.
  '3':
  - type: text
    content: And I ask you, my true partner,
  - type: note
    content: Or loyal Syzygus.
  - type: text
    content: ' to help these two women, for they worked hard with me in telling others the Good News. They worked along with Clement and the rest of my co-workers, whose names are written in the Book of Life.'
  '4':
  - type: text
    content: 'Always be full of joy in the Lord. I say it again—rejoice! '
  '5':
  - type: text
    content: Let everyone see that you are considerate in all you do. Remember, the Lord is coming soon.
  - type: note
    content: Greek the Lord is near.
  '6':
  - type: text
    content: 'Don’t worry about anything; instead, pray about everything. Tell God what you need, and thank him for all he has done. '
  '7':
  - type: text
    content: Then you will experience God’s peace, which exceeds anything we can understand. His peace will guard your hearts and minds as you live in Christ Jesus.
  '8':
  - type: text
    content: 'And now, dear brothers and sisters, one final thing. Fix your thoughts on what is true, and honorable, and right, and pure, and lovely, and admirable. Think about things that are excellent and worthy of praise. '
  '9':
  - type: text
    content: Keep putting into practice all you learned and received from me—everything you heard from me and saw me doing. Then the God of peace will be with you.
  - type: heading
    content: Paul’s Thanks for Their Gifts
