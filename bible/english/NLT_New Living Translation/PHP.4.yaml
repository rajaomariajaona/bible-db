document_id: PHP.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Therefore, my dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:8.
      marker-yv: yv-n
    - type: text
      text: ' stay true to the Lord. I love you and long to see you, dear friends, for you are my joy and the crown I receive for my work.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words of Encouragement
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'How I praise the Lord that you are concerned about me again. I know you have always been concerned for me, but you didn’t have the chance to help me. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Not that I was ever in need, for I have learned how to be content with whatever I have. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I know how to live on almost nothing or with everything. I have learned the secret of living in every situation, whether it is with a full stomach or empty, with plenty or little. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For I can do everything through Christ,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: through the one.
      marker-yv: yv-n
    - type: text
      text: ' who gives me strength. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Even so, you have done well to share with me in my present difficulty.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'As you know, you Philippians were the only ones who gave me financial help when I first brought you the Good News and then traveled on from Macedonia. No other church did this. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Even when I was in Thessalonica you sent help more than once. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I don’t say this because I want a gift from you. Rather, I want you to receive a reward for your kindness.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'At the moment I have all I need—and more! I am generously supplied with the gifts you sent me with Epaphroditus. They are a sweet-smelling sacrifice that is acceptable and pleasing to God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And this same God who takes care of me will supply all your needs from his glorious riches, which have been given to us in Christ Jesus.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now I appeal to Euodia and Syntyche. Please, because you belong to the Lord, settle your disagreement. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Now all glory to God our Father forever and ever! Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Greetings
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Give my greetings to each of God’s holy people—all who belong to Christ Jesus. The brothers who are with me send you their greetings. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And all the rest of God’s people send you greetings, too, especially those in Caesar’s household.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: May the grace of the Lord Jesus Christ be with your spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Amen.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And I ask you, my true partner,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: loyal Syzygus.
      marker-yv: yv-n
    - type: text
      text: ' to help these two women, for they worked hard with me in telling others the Good News. They worked along with Clement and the rest of my co-workers, whose names are written in the Book of Life.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Always be full of joy in the Lord. I say it again—rejoice! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Let everyone see that you are considerate in all you do. Remember, the Lord is coming soon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Lord is near.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Don’t worry about anything; instead, pray about everything. Tell God what you need, and thank him for all he has done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then you will experience God’s peace, which exceeds anything we can understand. His peace will guard your hearts and minds as you live in Christ Jesus.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And now, dear brothers and sisters, one final thing. Fix your thoughts on what is true, and honorable, and right, and pure, and lovely, and admirable. Think about things that are excellent and worthy of praise. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Keep putting into practice all you learned and received from me—everything you heard from me and saw me doing. Then the God of peace will be with you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Thanks for Their Gifts
    marker-yv: yv-h
