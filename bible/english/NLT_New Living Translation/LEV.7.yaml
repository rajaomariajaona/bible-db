document_id: LEV.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Further Instructions for the Guilt Offering
  - type: text
    content: '“These are the instructions for the guilt offering. It is most holy. '
  '10':
  - type: text
    content: All other grain offerings, whether made of dry flour or flour moistened with olive oil, are to be shared equally among all the priests, the descendants of Aaron.
  - type: heading
    content: Further Instructions for the Peace Offering
  '11':
  - type: text
    content: '“These are the instructions regarding the different kinds of peace offerings that may be presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'If you present your peace offering as an expression of thanksgiving, the usual animal sacrifice must be accompanied by various kinds of bread made without yeast—thin cakes mixed with olive oil, wafers spread with oil, and cakes made of choice flour mixed with olive oil. '
  '13':
  - type: text
    content: 'This peace offering of thanksgiving must also be accompanied by loaves of bread made with yeast. '
  '14':
  - type: text
    content: 'One of each kind of bread must be presented as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. It will then belong to the priest who splatters the blood of the peace offering against the altar. '
  '15':
  - type: text
    content: The meat of the peace offering of thanksgiving must be eaten on the same day it is offered. None of it may be saved for the next morning.
  '16':
  - type: text
    content: '“If you bring an offering to fulfill a vow or as a voluntary offering, the meat must be eaten on the same day the sacrifice is offered, but whatever is left over may be eaten on the second day. '
  '17':
  - type: text
    content: 'Any meat left over until the third day must be completely burned up. '
  '18':
  - type: text
    content: 'If any of the meat from the peace offering is eaten on the third day, the person who presented it will not be accepted by the '
  - type: text
    content: Lord
  - type: text
    content: . You will receive no credit for offering it. By then the meat will be contaminated; if you eat it, you will be punished for your sin.
  '19':
  - type: text
    content: '“Meat that touches anything ceremonially unclean may not be eaten; it must be completely burned up. The rest of the meat may be eaten, but only by people who are ceremonially clean. '
  '2':
  - type: text
    content: 'The animal sacrificed as a guilt offering must be slaughtered at the place where the burnt offerings are slaughtered, and its blood must be splattered against all sides of the altar. '
  '20':
  - type: text
    content: 'If you are ceremonially unclean and you eat meat from a peace offering that was presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', you will be cut off from the community. '
  '21':
  - type: text
    content: 'If you touch anything that is unclean (whether it is human defilement or an unclean animal or any other unclean, detestable thing) and then eat meat from a peace offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', you will be cut off from the community.”'
  - type: heading
    content: The Forbidden Blood and Fat
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Give the following instructions to the people of Israel. You must never eat fat, whether from cattle, sheep, or goats. '
  '24':
  - type: text
    content: 'The fat of an animal found dead or torn to pieces by wild animals must never be eaten, though it may be used for any other purpose. '
  '25':
  - type: text
    content: 'Anyone who eats fat from an animal presented as a special gift to the '
  - type: text
    content: Lord
  - type: text
    content: ' will be cut off from the community. '
  '26':
  - type: text
    content: 'No matter where you live, you must never consume the blood of any bird or animal. '
  '27':
  - type: text
    content: Anyone who consumes blood will be cut off from the community.”
  - type: heading
    content: A Portion for the Priests
  '28':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '29':
  - type: text
    content: '“Give the following instructions to the people of Israel. When you present a peace offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', bring part of it as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'The priest will then offer all its fat on the altar, including the fat of the broad tail, the fat around the internal organs, '
  '30':
  - type: text
    content: 'Present it to the '
  - type: text
    content: Lord
  - type: text
    content: ' with your own hands as a special gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. Bring the fat of the animal, together with the breast, and lift up the breast as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Then the priest will burn the fat on the altar, but the breast will belong to Aaron and his descendants. '
  '32':
  - type: text
    content: 'Give the right thigh of your peace offering to the priest as a gift. '
  '33':
  - type: text
    content: 'The right thigh must always be given to the priest who offers the blood and the fat of the peace offering. '
  '34':
  - type: text
    content: 'For I have reserved the breast of the special offering and the right thigh of the sacred offering for the priests. It is the permanent right of Aaron and his descendants to share in the peace offerings brought by the people of Israel. '
  '35':
  - type: text
    content: 'This is their rightful share. The special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' have been reserved for Aaron and his descendants from the time they were set apart to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' as priests. '
  '36':
  - type: text
    content: 'On the day they were anointed, the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded the Israelites to give these portions to the priests as their permanent share from generation to generation.”'
  '37':
  - type: text
    content: 'These are the instructions for the burnt offering, the grain offering, the sin offering, and the guilt offering, as well as the ordination offering and the peace offering. '
  '38':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave these instructions to Moses on Mount Sinai when he commanded the Israelites to present their offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the wilderness of Sinai.'
  '4':
  - type: text
    content: 'the two kidneys and the fat around them near the loins, and the long lobe of the liver. These are to be removed with the kidneys, '
  '5':
  - type: text
    content: 'and the priests will burn them on the altar as a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. This is the guilt offering. '
  '6':
  - type: text
    content: Any male from a priest’s family may eat the meat. It must be eaten in a sacred place, for it is most holy.
  '7':
  - type: text
    content: '“The same instructions apply to both the guilt offering and the sin offering. Both belong to the priest who uses them to purify someone, making that person right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'In the case of the burnt offering, the priest may keep the hide of the sacrificed animal. '
  '9':
  - type: text
    content: 'Any grain offering that has been baked in an oven, prepared in a pan, or cooked on a griddle belongs to the priest who presents it. '
