document_id: DEU.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Privilege of Holiness
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land you are about to enter and occupy, he will clear away many nations ahead of you: the Hittites, Girgashites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites. These seven nations are greater and more numerous than you. '
  '10':
  - type: text
    content: 'But he does not hesitate to punish and destroy those who reject him. '
  '11':
  - type: text
    content: Therefore, you must obey all these commands, decrees, and regulations I am giving you today.
  '12':
  - type: text
    content: '“If you listen to these regulations and faithfully obey them, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will keep his covenant of unfailing love with you, as he promised with an oath to your ancestors. '
  '13':
  - type: text
    content: 'He will love you and bless you, and he will give you many children. He will give fertility to your land and your animals. When you arrive in the land he swore to give your ancestors, you will have large harvests of grain, new wine, and olive oil, and great herds of cattle, sheep, and goats. '
  '14':
  - type: text
    content: 'You will be blessed above all the nations of the earth. None of your men or women will be childless, and all your livestock will bear young. '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will protect you from all sickness. He will not let you suffer from the terrible diseases you knew in Egypt, but he will inflict them on all your enemies!'
  '16':
  - type: text
    content: '“You must destroy all the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' your God hands over to you. Show them no mercy, and do not worship their gods, or they will trap you. '
  '17':
  - type: text
    content: 'Perhaps you will think to yourselves, ‘How can we ever conquer these nations that are so much more powerful than we are?’ '
  '18':
  - type: text
    content: 'But don’t be afraid of them! Just remember what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did to Pharaoh and to all the land of Egypt. '
  '19':
  - type: text
    content: 'Remember the great terrors the '
  - type: text
    content: Lord
  - type: text
    content: ' your God sent against them. You saw it all with your own eyes! And remember the miraculous signs and wonders, and the strong hand and powerful arm with which he brought you out of Egypt. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will use this same power against all the people you fear. '
  '2':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God hands these nations over to you and you conquer them, you must completely destroy'
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; also in 7:26.
  - type: text
    content: ' them. Make no treaties with them and show them no mercy. '
  '20':
  - type: text
    content: 'And then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will send terror'
  - type: note
    content: Often rendered the hornet. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' to drive out the few survivors still hiding from you!'
  '21':
  - type: text
    content: '“No, do not be afraid of those nations, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is among you, and he is a great and awesome God. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will drive those nations out ahead of you little by little. You will not clear them away all at once, otherwise the wild animals would multiply too quickly for you. '
  '23':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will hand them over to you. He will throw them into complete confusion until they are destroyed. '
  '24':
  - type: text
    content: He will put their kings in your power, and you will erase their names from the face of the earth. No one will be able to stand against you, and you will destroy them all.
  '25':
  - type: text
    content: '“You must burn their idols in fire, and you must not covet the silver or gold that covers them. You must not take it or it will become a trap to you, for it is detestable to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '26':
  - type: text
    content: Do not bring any detestable objects into your home, for then you will be destroyed, just like them. You must utterly detest such things, for they are set apart for destruction.
  '3':
  - type: text
    content: 'You must not intermarry with them. Do not let your daughters and sons marry their sons and daughters, '
  '4':
  - type: text
    content: 'for they will lead your children away from me to worship other gods. Then the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will burn against you, and he will quickly destroy you. '
  '5':
  - type: text
    content: 'This is what you must do. You must break down their pagan altars and shatter their sacred pillars. Cut down their Asherah poles and burn their idols. '
  '6':
  - type: text
    content: 'For you are a holy people, who belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Of all the people on earth, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen you to be his own special treasure.'
  '7':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' did not set his heart on you and choose you because you were more numerous than other nations, for you were the smallest of all nations! '
  '8':
  - type: text
    content: 'Rather, it was simply that the '
  - type: text
    content: Lord
  - type: text
    content: ' loves you, and he was keeping the oath he had sworn to your ancestors. That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' rescued you with such a strong hand from your slavery and from the oppressive hand of Pharaoh, king of Egypt. '
  '9':
  - type: text
    content: 'Understand, therefore, that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is indeed God. He is the faithful God who keeps his covenant for a thousand generations and lavishes his unfailing love on those who love him and obey his commands. '
