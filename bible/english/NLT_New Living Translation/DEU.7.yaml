document_id: DEU.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Privilege of Holiness
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God brings you into the land you are about to enter and occupy, he will clear away many nations ahead of you: the Hittites, Girgashites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites. These seven nations are greater and more numerous than you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God hands these nations over to you and you conquer them, you must completely destroy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 7:26.'
    marker-yv: yv-n
  - type: text
    text: ' them. Make no treaties with them and show them no mercy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You must not intermarry with them. Do not let your daughters and sons marry their sons and daughters, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for they will lead your children away from me to worship other gods. Then the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will burn against you, and he will quickly destroy you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what you must do. You must break down their pagan altars and shatter their sacred pillars. Cut down their Asherah poles and burn their idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For you are a holy people, who belong to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. Of all the people on earth, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has chosen you to be his own special treasure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' did not set his heart on you and choose you because you were more numerous than other nations, for you were the smallest of all nations! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rather, it was simply that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves you, and he was keeping the oath he had sworn to your ancestors. That is why the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rescued you with such a strong hand from your slavery and from the oppressive hand of Pharaoh, king of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Understand, therefore, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is indeed God. He is the faithful God who keeps his covenant for a thousand generations and lavishes his unfailing love on those who love him and obey his commands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But he does not hesitate to punish and destroy those who reject him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore, you must obey all these commands, decrees, and regulations I am giving you today.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“If you listen to these regulations and faithfully obey them, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will keep his covenant of unfailing love with you, as he promised with an oath to your ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He will love you and bless you, and he will give you many children. He will give fertility to your land and your animals. When you arrive in the land he swore to give your ancestors, you will have large harvests of grain, new wine, and olive oil, and great herds of cattle, sheep, and goats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You will be blessed above all the nations of the earth. None of your men or women will be childless, and all your livestock will bear young. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will protect you from all sickness. He will not let you suffer from the terrible diseases you knew in Egypt, but he will inflict them on all your enemies!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“You must destroy all the nations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God hands over to you. Show them no mercy, and do not worship their gods, or they will trap you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Perhaps you will think to yourselves, ‘How can we ever conquer these nations that are so much more powerful than we are?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But don’t be afraid of them! Just remember what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God did to Pharaoh and to all the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Remember the great terrors the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God sent against them. You saw it all with your own eyes! And remember the miraculous signs and wonders, and the strong hand and powerful arm with which he brought you out of Egypt. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will use this same power against all the people you fear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will send terror'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Often rendered '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the hornet. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' to drive out the few survivors still hiding from you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“No, do not be afraid of those nations, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is among you, and he is a great and awesome God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will drive those nations out ahead of you little by little. You will not clear them away all at once, otherwise the wild animals would multiply too quickly for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will hand them over to you. He will throw them into complete confusion until they are destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He will put their kings in your power, and you will erase their names from the face of the earth. No one will be able to stand against you, and you will destroy them all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“You must burn their idols in fire, and you must not covet the silver or gold that covers them. You must not take it or it will become a trap to you, for it is detestable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Do not bring any detestable objects into your home, for then you will be destroyed, just like them. You must utterly detest such things, for they are set apart for destruction.
