document_id: GEN.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Revenge against Shechem
  - type: text
    content: 'One day Dinah, the daughter of Jacob and Leah, went to visit some of the young women who lived in the area. '
  '10':
  - type: text
    content: And you may live among us; the land is open to you! Settle here and trade with us. And feel free to buy property in the area.”
  '11':
  - type: text
    content: 'Then Shechem himself spoke to Dinah’s father and brothers. “Please be kind to me, and let me marry her,” he begged. “I will give you whatever you ask. '
  '12':
  - type: text
    content: No matter what dowry or gift you demand, I will gladly pay it—just give me the girl as my wife.”
  '13':
  - type: text
    content: 'But since Shechem had defiled their sister, Dinah, Jacob’s sons responded deceitfully to Shechem and his father, Hamor. '
  '14':
  - type: text
    content: 'They said to them, “We couldn’t possibly allow this, because you’re not circumcised. It would be a disgrace for our sister to marry a man like you! '
  '15':
  - type: text
    content: 'But here is a solution. If every man among you will be circumcised like we are, '
  '16':
  - type: text
    content: 'then we will give you our daughters, and we’ll take your daughters for ourselves. We will live among you and become one people. '
  '17':
  - type: text
    content: But if you don’t agree to be circumcised, we will take her and be on our way.”
  '18':
  - type: text
    content: 'Hamor and his son Shechem agreed to their proposal. '
  '19':
  - type: text
    content: 'Shechem wasted no time in acting on this request, for he wanted Jacob’s daughter desperately. Shechem was a highly respected member of his family, '
  '2':
  - type: text
    content: 'But when the local prince, Shechem son of Hamor the Hivite, saw Dinah, he seized her and raped her. '
  '20':
  - type: text
    content: and he went with his father, Hamor, to present this proposal to the leaders at the town gate.
  '21':
  - type: text
    content: '“These men are our friends,” they said. “Let’s invite them to live here among us and trade freely. Look, the land is large enough to hold them. We can take their daughters as wives and let them marry ours. '
  '22':
  - type: text
    content: 'But they will consider staying here and becoming one people with us only if all of our men are circumcised, just as they are. '
  '23':
  - type: text
    content: But if we do this, all their livestock and possessions will eventually be ours. Come, let’s agree to their terms and let them settle here among us.”
  '24':
  - type: text
    content: 'So all the men in the town council agreed with Hamor and Shechem, and every male in the town was circumcised. '
  '25':
  - type: text
    content: 'But three days later, when their wounds were still sore, two of Jacob’s sons, Simeon and Levi, who were Dinah’s full brothers, took their swords and entered the town without opposition. Then they slaughtered every male there, '
  '26':
  - type: text
    content: including Hamor and his son Shechem. They killed them with their swords, then took Dinah from Shechem’s house and returned to their camp.
  '27':
  - type: text
    content: 'Meanwhile, the rest of Jacob’s sons arrived. Finding the men slaughtered, they plundered the town because their sister had been defiled there. '
  '28':
  - type: text
    content: 'They seized all the flocks and herds and donkeys—everything they could lay their hands on, both inside the town and outside in the fields. '
  '29':
  - type: text
    content: They looted all their wealth and plundered their houses. They also took all their little children and wives and led them away as captives.
  '3':
  - type: text
    content: 'But then he fell in love with her, and he tried to win her affection with tender words. '
  '30':
  - type: text
    content: Afterward Jacob said to Simeon and Levi, “You have ruined me! You’ve made me stink among all the people of this land—among all the Canaanites and Perizzites. We are so few that they will join forces and crush us. I will be ruined, and my entire household will be wiped out!”
  '31':
  - type: text
    content: “But why should we let him treat our sister like a prostitute?” they retorted angrily.
  '4':
  - type: text
    content: He said to his father, Hamor, “Get me this young girl. I want to marry her.”
  '5':
  - type: text
    content: 'Soon Jacob heard that Shechem had defiled his daughter, Dinah. But since his sons were out in the fields herding his livestock, he said nothing until they returned. '
  '6':
  - type: text
    content: 'Hamor, Shechem’s father, came to discuss the matter with Jacob. '
  '7':
  - type: text
    content: Meanwhile, Jacob’s sons had come in from the field as soon as they heard what had happened. They were shocked and furious that their sister had been raped. Shechem had done a disgraceful thing against Jacob’s family,
  - type: note
    content: Hebrew a disgraceful thing in Israel.
  - type: text
    content: ' something that should never be done.'
  '8':
  - type: text
    content: 'Hamor tried to speak with Jacob and his sons. “My son Shechem is truly in love with your daughter,” he said. “Please let him marry her. '
  '9':
  - type: text
    content: 'In fact, let’s arrange other marriages, too. You give us your daughters for our sons, and we will give you our daughters for your sons. '
