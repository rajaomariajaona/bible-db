document_id: ISA.66
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Heaven is my throne,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the earth is my footstool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Could you build me a temple as good as that?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Could you build me such a resting place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My hands have made both heaven and earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they and everything in them are mine.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek, Latin, and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: these things are.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will bless those who have humble and contrite hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who tremble at my word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But those who choose their own ways—
- type: usfm
  marker: q2
  children:
  - type: text
    text: delighting in their detestable sins—
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not have their offerings accepted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When such people sacrifice a bull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is no more acceptable than a human sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they sacrifice a lamb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s as though they had sacrificed a dog!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they bring an offering of grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they might as well offer the blood of a pig.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they burn frankincense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s as if they had blessed an idol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will send them great trouble—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the things they feared.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I called, they did not answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I spoke, they did not listen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They deliberately sinned before my very eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and chose to do what they know I despise.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hear this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'all you who tremble at his words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your own people hate you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and throw you out for being loyal to my name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be honored!’ they scoff.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Be joyful in him!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: But they will be put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: What is all the commotion in the city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What is that terrible noise from the Temple?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking vengeance against his enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Before the birth pains even begin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem gives birth to a son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who has ever seen anything as strange as this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who ever heard of such a thing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has a nation ever been born in a single day?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has a country ever come forth in a mere moment?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But by the time Jerusalem’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion’s.
    marker-yv: yv-n
  - type: text
    text: ' birth pains begin,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: her children will be born.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Would I ever bring this nation to the point of birth
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and then not deliver it?” asks the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No! I would never keep this nation from being born,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: says your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Rejoice with Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be glad with her, all you who love her
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all you who mourn for her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Drink deeply of her glory
- type: usfm
  marker: q2
  children:
  - type: text
    text: even as an infant drinks at its mother’s comforting breasts.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will give Jerusalem a river of peace and prosperity.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wealth of the nations will flow to her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her children will be nursed at her breasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: carried in her arms, and held on her lap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I will comfort you there in Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a mother comforts her child.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When you see these things, your heart will rejoice.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will flourish like the grass!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Everyone will see the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hand of blessing on his servants—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his anger against his enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'See, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming with fire,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his swift chariots roar like a whirlwind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will bring punishment with the fury of his anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the flaming fire of his hot rebuke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will punish the world by fire'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by his sword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will judge the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many will be killed by him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Those who ‘consecrate’ and ‘purify’ themselves in a sacred garden with its idol in the center—feasting on pork and rats and other detestable meats—will come to a terrible end,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“I can see what they are doing, and I know what they are thinking. So I will gather all nations and peoples together, and they will see my glory. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will perform a sign among them. And I will send those who survive to be messengers to the nations—to Tarshish, to the Libyans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:19a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts, which read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Put '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[that is, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Libya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ']; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pul.
    marker-yv: yv-n
  - type: text
    text: ' and Lydians'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:19b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lud.
    marker-yv: yv-n
  - type: text
    text: ' (who are famous as archers), to Tubal and Greece,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:19c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Javan.
    marker-yv: yv-n
  - type: text
    text: ' and to all the lands beyond the sea that have not heard of my fame or seen my glory. There they will declare my glory to the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They will bring the remnant of your people back from every nation. They will bring them to my holy mountain in Jerusalem as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They will ride on horses, in chariots and wagons, and on mules and camels,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“And I will appoint some of them to be my priests and Levites. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “As surely as my new heavens and earth will remain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so will you always be my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with a name that will never disappear,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “All humanity will come to worship me
- type: usfm
  marker: q2
  children:
  - type: text
    text: from week to week
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from month to month.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And as they go out, they will see
- type: usfm
  marker: q2
  children:
  - type: text
    text: the dead bodies of those who have rebelled against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the worms that devour them will never die,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fire that burns them will never go out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who pass by
- type: usfm
  marker: q2
  children:
  - type: text
    text: will view them with utter horror.”
