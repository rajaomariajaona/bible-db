document_id: ISA.66,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Heaven is my throne,
  - type: text
    content: and the earth is my footstool.
  - type: text
    content: Could you build me a temple as good as that?
  - type: text
    content: Could you build me such a resting place?
  '10':
  - type: text
    content: “Rejoice with Jerusalem!
  - type: text
    content: Be glad with her, all you who love her
  - type: text
    content: and all you who mourn for her.
  '11':
  - type: text
    content: Drink deeply of her glory
  - type: text
    content: even as an infant drinks at its mother’s comforting breasts.”
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will give Jerusalem a river of peace and prosperity.
  - type: text
    content: The wealth of the nations will flow to her.
  - type: text
    content: Her children will be nursed at her breasts,
  - type: text
    content: carried in her arms, and held on her lap.
  '13':
  - type: text
    content: I will comfort you there in Jerusalem
  - type: text
    content: as a mother comforts her child.”
  '14':
  - type: text
    content: When you see these things, your heart will rejoice.
  - type: text
    content: You will flourish like the grass!
  - type: text
    content: 'Everyone will see the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand of blessing on his servants—
  - type: text
    content: and his anger against his enemies.
  '15':
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming with fire,'
  - type: text
    content: and his swift chariots roar like a whirlwind.
  - type: text
    content: He will bring punishment with the fury of his anger
  - type: text
    content: and the flaming fire of his hot rebuke.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will punish the world by fire'
  - type: text
    content: and by his sword.
  - type: text
    content: He will judge the earth,
  - type: text
    content: and many will be killed by him.
  '17':
  - type: text
    content: '“Those who ‘consecrate’ and ‘purify’ themselves in a sacred garden with its idol in the center—feasting on pork and rats and other detestable meats—will come to a terrible end,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: '“I can see what they are doing, and I know what they are thinking. So I will gather all nations and peoples together, and they will see my glory. '
  '19':
  - type: text
    content: I will perform a sign among them. And I will send those who survive to be messengers to the nations—to Tarshish, to the Libyans
  - type: note
    content: As in some Greek manuscripts, which read Put [that is, Libya]; Hebrew reads Pul.
  - type: text
    content: ' and Lydians'
  - type: note
    content: Hebrew Lud.
  - type: text
    content: ' (who are famous as archers), to Tubal and Greece,'
  - type: note
    content: Hebrew Javan.
  - type: text
    content: ' and to all the lands beyond the sea that have not heard of my fame or seen my glory. There they will declare my glory to the nations. '
  '2':
  - type: text
    content: My hands have made both heaven and earth;
  - type: text
    content: they and everything in them are mine.
  - type: note
    content: As in Greek, Latin, and Syriac versions; Hebrew reads these things are.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: text
    content: “I will bless those who have humble and contrite hearts,
  - type: text
    content: who tremble at my word.
  '20':
  - type: text
    content: 'They will bring the remnant of your people back from every nation. They will bring them to my holy mountain in Jerusalem as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. They will ride on horses, in chariots and wagons, and on mules and camels,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: '“And I will appoint some of them to be my priests and Levites. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '22':
  - type: text
    content: “As surely as my new heavens and earth will remain,
  - type: text
    content: so will you always be my people,
  - type: text
    content: with a name that will never disappear,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: “All humanity will come to worship me
  - type: text
    content: from week to week
  - type: text
    content: and from month to month.
  '24':
  - type: text
    content: And as they go out, they will see
  - type: text
    content: the dead bodies of those who have rebelled against me.
  - type: text
    content: For the worms that devour them will never die,
  - type: text
    content: and the fire that burns them will never go out.
  - type: text
    content: All who pass by
  - type: text
    content: will view them with utter horror.”
  '3':
  - type: text
    content: But those who choose their own ways—
  - type: text
    content: delighting in their detestable sins—
  - type: text
    content: will not have their offerings accepted.
  - type: text
    content: When such people sacrifice a bull,
  - type: text
    content: it is no more acceptable than a human sacrifice.
  - type: text
    content: When they sacrifice a lamb,
  - type: text
    content: it’s as though they had sacrificed a dog!
  - type: text
    content: When they bring an offering of grain,
  - type: text
    content: they might as well offer the blood of a pig.
  - type: text
    content: When they burn frankincense,
  - type: text
    content: it’s as if they had blessed an idol.
  '4':
  - type: text
    content: I will send them great trouble—
  - type: text
    content: all the things they feared.
  - type: text
    content: For when I called, they did not answer.
  - type: text
    content: When I spoke, they did not listen.
  - type: text
    content: They deliberately sinned before my very eyes
  - type: text
    content: and chose to do what they know I despise.”
  '5':
  - type: text
    content: 'Hear this message from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'all you who tremble at his words:'
  - type: text
    content: “Your own people hate you
  - type: text
    content: and throw you out for being loyal to my name.
  - type: text
    content: '‘Let the '
  - type: text
    content: Lord
  - type: text
    content: ' be honored!’ they scoff.'
  - type: text
    content: ‘Be joyful in him!’
  - type: text
    content: But they will be put to shame.
  '6':
  - type: text
    content: What is all the commotion in the city?
  - type: text
    content: What is that terrible noise from the Temple?
  - type: text
    content: 'It is the voice of the '
  - type: text
    content: Lord
  - type: text
    content: taking vengeance against his enemies.
  '7':
  - type: text
    content: “Before the birth pains even begin,
  - type: text
    content: Jerusalem gives birth to a son.
  '8':
  - type: text
    content: Who has ever seen anything as strange as this?
  - type: text
    content: Who ever heard of such a thing?
  - type: text
    content: Has a nation ever been born in a single day?
  - type: text
    content: Has a country ever come forth in a mere moment?
  - type: text
    content: But by the time Jerusalem’s
  - type: note
    content: Hebrew Zion’s.
  - type: text
    content: ' birth pains begin,'
  - type: text
    content: her children will be born.
  '9':
  - type: text
    content: Would I ever bring this nation to the point of birth
  - type: text
    content: 'and then not deliver it?” asks the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “No! I would never keep this nation from being born,”
  - type: text
    content: says your God.
