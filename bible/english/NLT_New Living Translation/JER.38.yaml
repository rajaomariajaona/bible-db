document_id: JER.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah in a Cistern
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now Shephatiah son of Mattan, Gedaliah son of Pashhur, Jehucal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jucal, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehucal; see 37:3.
    marker-yv: yv-n
  - type: text
    text: ' son of Shelemiah, and Pashhur son of Malkijah heard what Jeremiah had been telling the people. He had been saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘Everyone who stays in Jerusalem will die from war, famine, or disease, but those who surrender to the Babylonians'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 38:18, 19, 23.
    marker-yv: yv-n
  - type: text
    text: ' will live. Their reward will be life. They will live!’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' also says: ‘The city of Jerusalem will certainly be handed over to the army of the king of Babylon, who will capture it.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So these officials went to the king and said, “Sir, this man must die! That kind of talk will undermine the morale of the few fighting men we have left, as well as that of all the people. This man is a traitor!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: King Zedekiah agreed. “All right,” he said. “Do as you like. I can’t stop you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So the officials took Jeremiah from his cell and lowered him by ropes into an empty cistern in the prison yard. It belonged to Malkijah, a member of the royal family. There was no water in the cistern, but there was a thick layer of mud at the bottom, and Jeremiah sank down into it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But Ebed-melech the Ethiopian,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Cushite.
    marker-yv: yv-n
  - type: text
    text: ' an important court official, heard that Jeremiah was in the cistern. At that time the king was holding court at the Benjamin Gate, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'so Ebed-melech rushed from the palace to speak with him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “My lord the king,” he said, “these men have done a very evil thing in putting Jeremiah the prophet into the cistern. He will soon die of hunger, for almost all the bread in the city is gone.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So the king told Ebed-melech, “Take thirty of my men with you, and pull Jeremiah out of the cistern before he dies.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Ebed-melech took the men with him and went to a room in the palace beneath the treasury, where he found some old rags and discarded clothing. He carried these to the cistern and lowered them to Jeremiah on a rope. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ebed-melech called down to Jeremiah, “Put these rags under your armpits to protect you from the ropes.” Then when Jeremiah was ready, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: they pulled him out. So Jeremiah was returned to the courtyard of the guard—the palace prison—where he remained.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Questions Jeremiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'One day King Zedekiah sent for Jeremiah and had him brought to the third entrance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple. “I want to ask you something,” the king said. “And don’t try to hide the truth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jeremiah said, “If I tell you the truth, you will kill me. And if I give you advice, you won’t listen to me anyway.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So King Zedekiah secretly promised him, “As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our Creator lives, I will not kill you or hand you over to the men who want you dead.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Jeremiah said to Zedekiah, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies, the God of Israel, says: ‘If you surrender to the Babylonian officers, you and your family will live, and the city will not be burned down. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But if you refuse to surrender, you will not escape! This city will be handed over to the Babylonians, and they will burn it to the ground.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “But I am afraid to surrender,” the king said, “for the Babylonians may hand me over to the Judeans who have defected to them. And who knows what they will do to me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jeremiah replied, “You won’t be handed over to them if you choose to obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Your life will be spared, and all will go well for you. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But if you refuse to surrender, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has revealed to me: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: All the women left in your palace will be brought out and given to the officers of the Babylonian army. Then the women will taunt you, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘What fine friends you have!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have betrayed and misled you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your feet sank in the mud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they left you to your fate!’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: All your wives and children will be led out to the Babylonians, and you will not escape. You will be seized by the king of Babylon, and this city will be burned down.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Zedekiah said to Jeremiah, “Don’t tell anyone you told me this, or you will die! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'My officials may hear that I spoke to you, and they may say, ‘Tell us what you and the king were talking about. If you don’t tell us, we will kill you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If this happens, just tell them you begged me not to send you back to Jonathan’s dungeon, for fear you would die there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Sure enough, it wasn’t long before the king’s officials came to Jeremiah and asked him why the king had called for him. But Jeremiah followed the king’s instructions, and they left without finding out the truth. No one had overheard the conversation between Jeremiah and the king. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And Jeremiah remained a prisoner in the courtyard of the guard until the day Jerusalem was captured.
