type_code: eng
verses:
  '1':
  - type: text
    content: Unfriendly people care only about themselves;
  - type: text
    content: they lash out at common sense.
  '10':
  - type: text
    content: 'The name of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a strong fortress;'
  - type: text
    content: the godly run to him and are safe.
  '11':
  - type: text
    content: The rich think of their wealth as a strong defense;
  - type: text
    content: they imagine it to be a high wall of safety.
  '12':
  - type: text
    content: Haughtiness goes before destruction;
  - type: text
    content: humility precedes honor.
  '13':
  - type: text
    content: Spouting off before listening to the facts
  - type: text
    content: is both shameful and foolish.
  '14':
  - type: text
    content: The human spirit can endure a sick body,
  - type: text
    content: but who can bear a crushed spirit?
  '15':
  - type: text
    content: Intelligent people are always ready to learn.
  - type: text
    content: Their ears are open for knowledge.
  '16':
  - type: text
    content: Giving a gift can open doors;
  - type: text
    content: it gives access to important people!
  '17':
  - type: text
    content: The first to speak in court sounds right—
  - type: text
    content: until the cross-examination begins.
  '18':
  - type: text
    content: Flipping a coin
  - type: note
    content: Hebrew Casting lots.
  - type: text
    content: ' can end arguments;'
  - type: text
    content: it settles disputes between powerful opponents.
  '19':
  - type: text
    content: An offended friend is harder to win back than a fortified city.
  - type: text
    content: Arguments separate friends like a gate locked with bars.
  '2':
  - type: text
    content: Fools have no interest in understanding;
  - type: text
    content: they only want to air their own opinions.
  '20':
  - type: text
    content: Wise words satisfy like a good meal;
  - type: text
    content: the right words bring satisfaction.
  '21':
  - type: text
    content: The tongue can bring death or life;
  - type: text
    content: those who love to talk will reap the consequences.
  '22':
  - type: text
    content: The man who finds a wife finds a treasure,
  - type: text
    content: 'and he receives favor from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: The poor plead for mercy;
  - type: text
    content: the rich answer with insults.
  '24':
  - type: text
    content: There are “friends” who destroy each other,
  - type: text
    content: but a real friend sticks closer than a brother.
  '3':
  - type: text
    content: Doing wrong leads to disgrace,
  - type: text
    content: and scandalous behavior brings contempt.
  '4':
  - type: text
    content: Wise words are like deep waters;
  - type: text
    content: wisdom flows from the wise like a bubbling brook.
  '5':
  - type: text
    content: It is not right to acquit the guilty
  - type: text
    content: or deny justice to the innocent.
  '6':
  - type: text
    content: Fools’ words get them into constant quarrels;
  - type: text
    content: they are asking for a beating.
  '7':
  - type: text
    content: The mouths of fools are their ruin;
  - type: text
    content: they trap themselves with their lips.
  '8':
  - type: text
    content: Rumors are dainty morsels
  - type: text
    content: that sink deep into one’s heart.
  '9':
  - type: text
    content: A lazy person is as bad as
  - type: text
    content: someone who destroys things.
