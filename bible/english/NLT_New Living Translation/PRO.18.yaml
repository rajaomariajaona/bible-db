document_id: PRO.18
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Unfriendly people care only about themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they lash out at common sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fools have no interest in understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they only want to air their own opinions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Doing wrong leads to disgrace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scandalous behavior brings contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Wise words are like deep waters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wisdom flows from the wise like a bubbling brook.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It is not right to acquit the guilty
- type: usfm
  marker: q2
  children:
  - type: text
    text: or deny justice to the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fools’ words get them into constant quarrels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are asking for a beating.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The mouths of fools are their ruin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they trap themselves with their lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rumors are dainty morsels
- type: usfm
  marker: q2
  children:
  - type: text
    text: that sink deep into one’s heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A lazy person is as bad as
- type: usfm
  marker: q2
  children:
  - type: text
    text: someone who destroys things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a strong fortress;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the godly run to him and are safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich think of their wealth as a strong defense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they imagine it to be a high wall of safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Haughtiness goes before destruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: humility precedes honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Spouting off before listening to the facts
- type: usfm
  marker: q2
  children:
  - type: text
    text: is both shameful and foolish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The human spirit can endure a sick body,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but who can bear a crushed spirit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Intelligent people are always ready to learn.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their ears are open for knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Giving a gift can open doors;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it gives access to important people!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The first to speak in court sounds right—
- type: usfm
  marker: q2
  children:
  - type: text
    text: until the cross-examination begins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Flipping a coin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Casting lots.
    marker-yv: yv-n
  - type: text
    text: ' can end arguments;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it settles disputes between powerful opponents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: An offended friend is harder to win back than a fortified city.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Arguments separate friends like a gate locked with bars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Wise words satisfy like a good meal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the right words bring satisfaction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The tongue can bring death or life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who love to talk will reap the consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The man who finds a wife finds a treasure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and he receives favor from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The poor plead for mercy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rich answer with insults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: There are “friends” who destroy each other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a real friend sticks closer than a brother.
