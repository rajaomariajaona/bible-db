document_id: GEN.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham’s Faith Tested
  - type: text
    content: Some time later, God tested Abraham’s faith. “Abraham!” God called.
  - type: text
    content: “Yes,” he replied. “Here I am.”
  '10':
  - type: text
    content: 'And Abraham picked up the knife to kill his son as a sacrifice. '
  '11':
  - type: text
    content: 'At that moment the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called to him from heaven, “Abraham! Abraham!”'
  - type: text
    content: “Yes,” Abraham replied. “Here I am!”
  '12':
  - type: text
    content: “Don’t lay a hand on the boy!” the angel said. “Do not hurt him in any way, for now I know that you truly fear God. You have not withheld from me even your son, your only son.”
  '13':
  - type: text
    content: 'Then Abraham looked up and saw a ram caught by its horns in a thicket. So he took the ram and sacrificed it as a burnt offering in place of his son. '
  '14':
  - type: text
    content: 'Abraham named the place Yahweh-Yireh (which means “the '
  - type: text
    content: Lord
  - type: text
    content: ' will provide”). To this day, people still use that name as a proverb: “On the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ' it will be provided.”'
  '15':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called again to Abraham from heaven. '
  '16':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you have obeyed me and have not withheld even your son, your only son, I swear by my own name that '
  '17':
  - type: text
    content: I will certainly bless you. I will multiply your descendants
  - type: note
    content: Hebrew seed; also in 22:17b, 18.
  - type: text
    content: ' beyond number, like the stars in the sky and the sand on the seashore. Your descendants will conquer the cities of their enemies. '
  '18':
  - type: text
    content: And through your descendants all the nations of the earth will be blessed—all because you have obeyed me.”
  '19':
  - type: text
    content: Then they returned to the servants and traveled back to Beersheba, where Abraham continued to live.
  '2':
  - type: text
    content: “Take your son, your only son—yes, Isaac, whom you love so much—and go to the land of Moriah. Go and sacrifice him as a burnt offering on one of the mountains, which I will show you.”
  '20':
  - type: text
    content: 'Soon after this, Abraham heard that Milcah, his brother Nahor’s wife, had borne Nahor eight sons. '
  '21':
  - type: text
    content: 'The oldest was named Uz, the next oldest was Buz, followed by Kemuel (the ancestor of the Arameans), '
  '22':
  - type: text
    content: 'Kesed, Hazo, Pildash, Jidlaph, and Bethuel. '
  '23':
  - type: text
    content: '(Bethuel became the father of Rebekah.) In addition to these eight sons from Milcah, '
  '24':
  - type: text
    content: Nahor had four other children from his concubine Reumah. Their names were Tebah, Gaham, Tahash, and Maacah.
  '3':
  - type: text
    content: 'The next morning Abraham got up early. He saddled his donkey and took two of his servants with him, along with his son, Isaac. Then he chopped wood for a fire for a burnt offering and set out for the place God had told him about. '
  '4':
  - type: text
    content: 'On the third day of their journey, Abraham looked up and saw the place in the distance. '
  '5':
  - type: text
    content: “Stay here with the donkey,” Abraham told the servants. “The boy and I will travel a little farther. We will worship there, and then we will come right back.”
  '6':
  - type: text
    content: 'So Abraham placed the wood for the burnt offering on Isaac’s shoulders, while he himself carried the fire and the knife. As the two of them walked on together, '
  '7':
  - type: text
    content: Isaac turned to Abraham and said, “Father?”
  - type: text
    content: “Yes, my son?” Abraham replied.
  - type: text
    content: “We have the fire and the wood,” the boy said, “but where is the sheep for the burnt offering?”
  '8':
  - type: text
    content: “God will provide a sheep for the burnt offering, my son,” Abraham answered. And they both walked on together.
  '9':
  - type: text
    content: 'When they arrived at the place where God had told him to go, Abraham built an altar and arranged the wood on it. Then he tied his son, Isaac, and laid him on the altar on top of the wood. '
