document_id: GEN.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham’s Faith Tested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Some time later, God tested Abraham’s faith. “Abraham!” God called.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes,” he replied. “Here I am.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Take your son, your only son—yes, Isaac, whom you love so much—and go to the land of Moriah. Go and sacrifice him as a burnt offering on one of the mountains, which I will show you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The next morning Abraham got up early. He saddled his donkey and took two of his servants with him, along with his son, Isaac. Then he chopped wood for a fire for a burnt offering and set out for the place God had told him about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On the third day of their journey, Abraham looked up and saw the place in the distance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Stay here with the donkey,” Abraham told the servants. “The boy and I will travel a little farther. We will worship there, and then we will come right back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Abraham placed the wood for the burnt offering on Isaac’s shoulders, while he himself carried the fire and the knife. As the two of them walked on together, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Isaac turned to Abraham and said, “Father?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, my son?” Abraham replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: “We have the fire and the wood,” the boy said, “but where is the sheep for the burnt offering?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “God will provide a sheep for the burnt offering, my son,” Abraham answered. And they both walked on together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they arrived at the place where God had told him to go, Abraham built an altar and arranged the wood on it. Then he tied his son, Isaac, and laid him on the altar on top of the wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Abraham picked up the knife to kill his son as a sacrifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At that moment the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' called to him from heaven, “Abraham! Abraham!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes,” Abraham replied. “Here I am!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Don’t lay a hand on the boy!” the angel said. “Do not hurt him in any way, for now I know that you truly fear God. You have not withheld from me even your son, your only son.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Abraham looked up and saw a ram caught by its horns in a thicket. So he took the ram and sacrificed it as a burnt offering in place of his son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abraham named the place Yahweh-Yireh (which means “the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will provide”). To this day, people still use that name as a proverb: “On the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' it will be provided.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' called again to Abraham from heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because you have obeyed me and have not withheld even your son, your only son, I swear by my own name that '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will certainly bless you. I will multiply your descendants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seed; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 22:17b, 18.
    marker-yv: yv-n
  - type: text
    text: ' beyond number, like the stars in the sky and the sand on the seashore. Your descendants will conquer the cities of their enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And through your descendants all the nations of the earth will be blessed—all because you have obeyed me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then they returned to the servants and traveled back to Beersheba, where Abraham continued to live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Soon after this, Abraham heard that Milcah, his brother Nahor’s wife, had borne Nahor eight sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The oldest was named Uz, the next oldest was Buz, followed by Kemuel (the ancestor of the Arameans), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kesed, Hazo, Pildash, Jidlaph, and Bethuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '(Bethuel became the father of Rebekah.) In addition to these eight sons from Milcah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahor had four other children from his concubine Reumah. Their names were Tebah, Gaham, Tahash, and Maacah.
