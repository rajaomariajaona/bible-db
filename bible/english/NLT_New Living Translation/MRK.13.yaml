document_id: MRK.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Speaks about the Future
  - type: text
    content: As Jesus was leaving the Temple that day, one of his disciples said, “Teacher, look at these magnificent buildings! Look at the impressive stones in the walls.”
  '10':
  - type: text
    content: For the Good News must first be preached to all nations.
  - type: note
    content: Or all peoples.
  - type: text
    content: ' '
  '11':
  - type: text
    content: But when you are arrested and stand trial, don’t worry in advance about what to say. Just say what God tells you at that time, for it is not you who will be speaking, but the Holy Spirit.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “A brother will betray his brother to death, a father will betray his own child, and children will rebel against their parents and cause them to be killed.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And everyone will hate you because you are my followers.
  - type: note
    content: Greek on account of my name.
  - type: text
    content: ' '
  - type: text
    content: But the one who endures to the end will be saved.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “The day is coming when you will see the sacrilegious object that causes desecration
  - type: text
    content: ' '
  - type: note
    content: Greek the abomination of desolation. See Dan 9:27; 11:31; 12:11.
  - type: text
    content: standing where he
  - type: note
    content: Or it.
  - type: text
    content: ' '
  - type: text
    content: should not be.”
  - type: text
    content: ' (Reader, pay attention!) '
  - type: text
    content: “Then those in Judea must flee to the hills.
  - type: text
    content: ' '
  '15':
  - type: text
    content: A person out on the deck of a roof must not go down into the house to pack.
  - type: text
    content: ' '
  '16':
  - type: text
    content: A person out in the field must not return even to get a coat.
  - type: text
    content: ' '
  '17':
  - type: text
    content: How terrible it will be for pregnant women and for nursing mothers in those days.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And pray that your flight will not be in winter.
  - type: text
    content: ' '
  '19':
  - type: text
    content: For there will be greater anguish in those days than at any time since God created the world. And it will never be so great again.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Yes, look at these great buildings. But they will be completely demolished. Not one stone will be left on top of another!”
  '20':
  - type: text
    content: In fact, unless the Lord shortens that time of calamity, not a single person will survive. But for the sake of his chosen ones he has shortened those days.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Then if anyone tells you, ‘Look, here is the Messiah,’ or ‘There he is,’ don’t believe it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For false messiahs and false prophets will rise up and perform signs and wonders so as to deceive, if possible, even God’s chosen ones.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Watch out! I have warned you about this ahead of time!
  '24':
  - type: text
    content: ' '
  - type: text
    content: “At that time, after the anguish of those days,
  - type: text
    content: the sun will be darkened,
  - type: text
    content: the moon will give no light,
  '25':
  - type: text
    content: ' '
  - type: text
    content: the stars will fall from the sky,
  - type: text
    content: and the powers in the heavens will be shaken.
  - type: note
    content: See Isa 13:10; 34:4; Joel 2:10.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Then everyone will see the Son of Man
  - type: text
    content: ' '
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: coming on the clouds with great power and glory.
  - type: note
    content: See Dan 7:13.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he will send out his angels to gather his chosen ones from all over the world
  - type: note
    content: Greek from the four winds.
  - type: text
    content: —from the farthest ends of the earth and heaven.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Now learn a lesson from the fig tree. When its branches bud and its leaves begin to sprout, you know that summer is near.
  - type: text
    content: ' '
  '29':
  - type: text
    content: In the same way, when you see all these things taking place, you can know that his return is very near, right at the door.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Later, Jesus sat on the Mount of Olives across the valley from the Temple. Peter, James, John, and Andrew came to him privately and asked him, '
  '30':
  - type: text
    content: I tell you the truth, this generation
  - type: note
    content: Or this age, or this nation.
  - type: text
    content: ' '
  - type: text
    content: will not pass from the scene before all these things take place.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Heaven and earth will disappear, but my words will never disappear.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “However, no one knows the day or hour when these things will happen, not even the angels in heaven or the Son himself. Only the Father knows.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And since you don’t know when that time will come, be on guard! Stay alert
  - type: note
    content: Some manuscripts add and pray.
  - type: text
    content: '!'
  '34':
  - type: text
    content: ' '
  - type: text
    content: “The coming of the Son of Man can be illustrated by the story of a man going on a long trip. When he left home, he gave each of his slaves instructions about the work they were to do, and he told the gatekeeper to watch for his return.
  - type: text
    content: ' '
  '35':
  - type: text
    content: You, too, must keep watch! For you don’t know when the master of the household will return—in the evening, at midnight, before dawn, or at daybreak.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Don’t let him find you sleeping when he arrives without warning.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'I say to you what I say to everyone: Watch for him!”'
  '4':
  - type: text
    content: “Tell us, when will all this happen? What sign will show us that these things are about to be fulfilled?”
  '5':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Don’t let anyone mislead you,
  - type: text
    content: ' '
  '6':
  - type: text
    content: for many will come in my name, claiming, ‘I am the Messiah.’
  - type: note
    content: Greek claiming, ‘I am.’
  - type: text
    content: ' '
  - type: text
    content: They will deceive many.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And you will hear of wars and threats of wars, but don’t panic. Yes, these things must take place, but the end won’t follow immediately.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Nation will go to war against nation, and kingdom against kingdom. There will be earthquakes in many parts of the world, as well as famines. But this is only the first of the birth pains, with more to come.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “When these things begin to happen, watch out! You will be handed over to the local councils and beaten in the synagogues. You will stand trial before governors and kings because you are my followers. But this will be your opportunity to tell them about me.
  - type: text
    content: ' '
  - type: note
    content: Or But this will be your testimony against them.
