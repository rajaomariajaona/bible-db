document_id: 2CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Many Achievements
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It took Solomon twenty years to build the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and his own royal palace. At the end of that time, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Solomon turned his attention to rebuilding the towns that King Hiram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Huram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Hiram; also in 8:18.
    marker-yv: yv-n
  - type: text
    text: ' had given him, and he settled Israelites in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Solomon also fought against the town of Hamath-zobah and conquered it. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He rebuilt Tadmor in the wilderness and built towns in the region of Hamath as supply centers. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He fortified the towns of Upper Beth-horon and Lower Beth-horon, rebuilding their walls and installing barred gates. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He also rebuilt Baalath and other supply centers and constructed towns where his chariots and horses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and charioteers.
    marker-yv: yv-n
  - type: text
    text: ' could be stationed. He built everything he desired in Jerusalem and Lebanon and throughout his entire realm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'There were still some people living in the land who were not Israelites, including the Hittites, Amorites, Perizzites, Hivites, and Jebusites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These were descendants of the nations whom the people of Israel had not destroyed. So Solomon conscripted them for his labor force, and they serve as forced laborers to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Solomon did not conscript any of the Israelites for his labor force. Instead, he assigned them to serve as fighting men, officers in his army, commanders of his chariots, and charioteers. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: King Solomon appointed 250 of them to supervise the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Solomon moved his wife, Pharaoh’s daughter, from the City of David to the new palace he had built for her. He said, “My wife must not live in King David’s palace, for the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has been there, and it is holy ground.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Solomon presented burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the altar he had built for him in front of the entry room of the Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He offered the sacrifices for the Sabbaths, the new moon festivals, and the three annual festivals—the Passover celebration, the Festival of Harvest,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Festival of Weeks.
    marker-yv: yv-n
  - type: text
    text: ' and the Festival of Shelters—as Moses had commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In assigning the priests to their duties, Solomon followed the regulations of his father, David. He also assigned the Levites to lead the people in praise and to assist the priests in their daily duties. And he assigned the gatekeepers to their gates by their divisions, following the commands of David, the man of God. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Solomon did not deviate in any way from David’s commands concerning the priests and Levites and the treasuries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Solomon made sure that all the work related to building the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was carried out, from the day its foundation was laid to the day of its completion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Later Solomon went to Ezion-geber and Elath,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 2 Kgs 14:22; 16:6); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eloth, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Elath.
    marker-yv: yv-n
  - type: text
    text: ' ports along the shore of the Red Sea'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Kgs 9:26; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea.
    marker-yv: yv-n
  - type: text
    text: ' in the land of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hiram sent him ships commanded by his own officers and manned by experienced crews of sailors. These ships sailed to Ophir with Solomon’s men and brought back to Solomon almost seventeen tons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '450 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[15.3 metric tons].'
    marker-yv: yv-n
  - type: text
    text: ' of gold.'
