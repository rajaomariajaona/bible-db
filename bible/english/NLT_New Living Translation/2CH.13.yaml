document_id: 2CH.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abijah’s War with Jeroboam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abijah began to rule over Judah in the eighteenth year of Jeroboam’s reign in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He reigned in Jerusalem three years. His mother was Maacah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in most Greek manuscripts and Syriac version (see also 2 Chr 11:20-21; 1 Kgs 15:2); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Micaiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Maacah.
    marker-yv: yv-n
  - type: text
    text: ' the daughter of Uriel from Gibeah.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then war broke out between Abijah and Jeroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Judah, led by King Abijah, fielded 400,000 select warriors, while Jeroboam mustered 800,000 select troops from Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the army of Judah arrived in the hill country of Ephraim, Abijah stood on Mount Zemaraim and shouted to Jeroboam and all Israel: “Listen to me! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Don’t you realize that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, made a lasting covenant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a covenant of salt.
    marker-yv: yv-n
  - type: text
    text: ' with David, giving him and his descendants the throne of Israel forever? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet Jeroboam son of Nebat, a mere servant of David’s son Solomon, rebelled against his master. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then a whole gang of scoundrels joined him, defying Solomon’s son Rehoboam when he was young and inexperienced and could not stand up to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Do you really think you can stand against the kingdom of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that is led by the descendants of David? You may have a vast army, and you have those gold calves that Jeroboam made as your gods. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But you have chased away the priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' (the descendants of Aaron) and the Levites, and you have appointed your own priests, just like the pagan nations. You let anyone become a priest these days! Whoever comes to be dedicated with a young bull and seven rams can become a priest of these so-called gods of yours!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“But as for us, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is our God, and we have not abandoned him. Only the descendants of Aaron serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as priests, and the Levites alone may help them in their work. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They present burnt offerings and fragrant incense to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'every morning and evening. They place the Bread of the Presence on the holy table, and they light the gold lampstand every evening. We are following the instructions of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, but you have abandoned him. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So you see, God is with us. He is our leader. His priests blow their trumpets and lead us into battle against you. O people of Israel, do not fight against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of your ancestors, for you will not succeed!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Meanwhile, Jeroboam had secretly sent part of his army around behind the men of Judah to ambush them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Judah realized that they were being attacked from the front and the rear, they cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help. Then the priests blew the trumpets, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and the men of Judah began to shout. At the sound of their battle cry, God defeated Jeroboam and all Israel and routed them before Abijah and the army of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Israelite army fled from Judah, and God handed them over to Judah in defeat. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abijah and his army inflicted heavy losses on them; 500,000 of Israel’s select troops were killed that day. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Judah defeated Israel on that occasion because they trusted in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abijah and his army pursued Jeroboam’s troops and captured some of his towns, including Bethel, Jeshanah, and Ephron, along with their surrounding villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Jeroboam of Israel never regained his power during Abijah’s lifetime, and finally the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' struck him down and he died. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Meanwhile, Abijah of Judah grew more and more powerful. He married fourteen wives and had twenty-two sons and sixteen daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The rest of the events of Abijah’s reign, including his words and deeds, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Commentary of Iddo the Prophet.
