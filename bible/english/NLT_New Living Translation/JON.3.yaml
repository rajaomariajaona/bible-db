document_id: JON.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Goes to Nineveh
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Jonah a second time: '
  '10':
  - type: text
    content: When God saw what they had done and how they had put a stop to their evil ways, he changed his mind and did not carry out the destruction he had threatened.
  '2':
  - type: text
    content: “Get up and go to the great city of Nineveh, and deliver the message I have given you.”
  '3':
  - type: text
    content: 'This time Jonah obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ’s command and went to Nineveh, a city so large that it took three days to see it all.
  - type: note
    content: Hebrew a great city to God, of three days’ journey.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'On the day Jonah entered the city, he shouted to the crowds: “Forty days from now Nineveh will be destroyed!” '
  '5':
  - type: text
    content: The people of Nineveh believed God’s message, and from the greatest to the least, they declared a fast and put on burlap to show their sorrow.
  '6':
  - type: text
    content: 'When the king of Nineveh heard what Jonah was saying, he stepped down from his throne and took off his royal robes. He dressed himself in burlap and sat on a heap of ashes. '
  '7':
  - type: text
    content: 'Then the king and his nobles sent this decree throughout the city:'
  - type: text
    content: '“No one, not even the animals from your herds and flocks, may eat or drink anything at all. '
  '8':
  - type: text
    content: 'People and animals alike must wear garments of mourning, and everyone must pray earnestly to God. They must turn from their evil ways and stop all their violence. '
  '9':
  - type: text
    content: Who can tell? Perhaps even yet God will change his mind and hold back his fierce anger from destroying us.”
