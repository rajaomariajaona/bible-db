document_id: 2CH.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Religious Reforms
  - type: text
    content: 'Then the Spirit of God came upon Azariah son of Oded, '
  '10':
  - type: text
    content: The people gathered at Jerusalem in late spring,
  - type: note
    content: Hebrew in the third month. This month of the ancient Hebrew lunar calendar usually occurs within the months of May and June.
  - type: text
    content: ' during the fifteenth year of Asa’s reign.'
  '11':
  - type: text
    content: 'On that day they sacrificed to the '
  - type: text
    content: Lord
  - type: text
    content: ' 700 cattle and 7,000 sheep and goats from the plunder they had taken in the battle. '
  '12':
  - type: text
    content: 'Then they entered into a covenant to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, with all their heart and soul. '
  '13':
  - type: text
    content: 'They agreed that anyone who refused to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, would be put to death—whether young or old, man or woman. '
  '14':
  - type: text
    content: 'They shouted out their oath of loyalty to the '
  - type: text
    content: Lord
  - type: text
    content: ' with trumpets blaring and rams’ horns sounding. '
  '15':
  - type: text
    content: 'All in Judah were happy about this covenant, for they had entered into it with all their heart. They earnestly sought after God, and they found him. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest from their enemies on every side.'
  '16':
  - type: text
    content: King Asa even deposed his grandmother
  - type: note
    content: Hebrew his mother.
  - type: text
    content: ' Maacah from her position as queen mother because she had made an obscene Asherah pole. He cut down her obscene pole, broke it up, and burned it in the Kidron Valley. '
  '17':
  - type: text
    content: 'Although the pagan shrines were not removed from Israel, Asa’s heart remained completely faithful throughout his life. '
  '18':
  - type: text
    content: He brought into the Temple of God the silver and gold and the various items that he and his father had dedicated.
  '19':
  - type: text
    content: So there was no more war until the thirty-fifth year of Asa’s reign.
  '2':
  - type: text
    content: 'and he went out to meet King Asa as he was returning from the battle. “Listen to me, Asa!” he shouted. “Listen, all you people of Judah and Benjamin! The '
  - type: text
    content: Lord
  - type: text
    content: ' will stay with you as long as you stay with him! Whenever you seek him, you will find him. But if you abandon him, he will abandon you. '
  '3':
  - type: text
    content: 'For a long time Israel was without the true God, without a priest to teach them, and without the Law to instruct them. '
  '4':
  - type: text
    content: 'But whenever they were in trouble and turned to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and sought him out, they found him.'
  '5':
  - type: text
    content: '“During those dark times, it was not safe to travel. Problems troubled the people of every land. '
  '6':
  - type: text
    content: 'Nation fought against nation, and city against city, for God was troubling them with every kind of problem. '
  '7':
  - type: text
    content: But as for you, be strong and courageous, for your work will be rewarded.”
  '8':
  - type: text
    content: When Asa heard this message from Azariah the prophet,
  - type: note
    content: As in Syriac version and Latin Vulgate (see also 15:1); Hebrew reads from Oded the prophet.
  - type: text
    content: ' he took courage and removed all the detestable idols from the land of Judah and Benjamin and in the towns he had captured in the hill country of Ephraim. And he repaired the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', which stood in front of the entry room of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  '9':
  - type: text
    content: 'Then Asa called together all the people of Judah and Benjamin, along with the people of Ephraim, Manasseh, and Simeon who had settled among them. For many from Israel had moved to Judah during Asa’s reign when they saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him. '
