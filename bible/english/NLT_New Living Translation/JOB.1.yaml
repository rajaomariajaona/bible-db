document_id: JOB.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: 'There once was a man named Job who lived in the land of Uz. He was blameless—a man of complete integrity. He feared God and stayed away from evil. '
  '10':
  - type: text
    content: 'You have always put a wall of protection around him and his home and his property. You have made him prosper in everything he does. Look how rich he is! '
  '11':
  - type: text
    content: But reach out and take away everything he has, and he will surely curse you to your face!”
  '12':
  - type: text
    content: '“All right, you may test him,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan. “Do whatever you want with everything he possesses, but don’t harm him physically.” So Satan left the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence.
  '13':
  - type: text
    content: 'One day when Job’s sons and daughters were feasting at the oldest brother’s house, '
  '14':
  - type: text
    content: 'a messenger arrived at Job’s home with this news: “Your oxen were plowing, with the donkeys feeding beside them, '
  '15':
  - type: text
    content: when the Sabeans raided us. They stole all the animals and killed all the farmhands. I am the only one who escaped to tell you.”
  '16':
  - type: text
    content: 'While he was still speaking, another messenger arrived with this news: “The fire of God has fallen from heaven and burned up your sheep and all the shepherds. I am the only one who escaped to tell you.”'
  '17':
  - type: text
    content: 'While he was still speaking, a third messenger arrived with this news: “Three bands of Chaldean raiders have stolen your camels and killed your servants. I am the only one who escaped to tell you.”'
  '18':
  - type: text
    content: 'While he was still speaking, another messenger arrived with this news: “Your sons and daughters were feasting in their oldest brother’s home. '
  '19':
  - type: text
    content: Suddenly, a powerful wind swept in from the wilderness and hit the house on all sides. The house collapsed, and all your children are dead. I am the only one who escaped to tell you.”
  '2':
  - type: text
    content: 'He had seven sons and three daughters. '
  '20':
  - type: text
    content: 'Job stood up and tore his robe in grief. Then he shaved his head and fell to the ground to worship. '
  '21':
  - type: text
    content: He said,
  - type: text
    content: “I came naked from my mother’s womb,
  - type: text
    content: and I will be naked when I leave.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me what I had,'
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' has taken it away.'
  - type: text
    content: 'Praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '22':
  - type: text
    content: In all of this, Job did not sin by blaming God.
  '3':
  - type: text
    content: He owned 7,000 sheep, 3,000 camels, 500 teams of oxen, and 500 female donkeys. He also had many servants. He was, in fact, the richest person in that entire area.
  '4':
  - type: text
    content: 'Job’s sons would take turns preparing feasts in their homes, and they would also invite their three sisters to celebrate with them. '
  '5':
  - type: text
    content: When these celebrations ended—sometimes after several days—Job would purify his children. He would get up early in the morning and offer a burnt offering for each of them. For Job said to himself, “Perhaps my children have sinned and have cursed God in their hearts.” This was Job’s regular practice.
  - type: heading
    content: Job’s First Test
  '6':
  - type: text
    content: One day the members of the heavenly court
  - type: note
    content: Hebrew the sons of God.
  - type: text
    content: ' came to present themselves before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the Accuser, Satan,'
  - type: note
    content: Hebrew and the satan; similarly throughout this chapter.
  - type: text
    content: ' came with them. '
  '7':
  - type: text
    content: '“Where have you come from?” the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Satan.'
  - type: text
    content: 'Satan answered the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have been patrolling the earth, watching everything that’s going on.”'
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Satan, “Have you noticed my servant Job? He is the finest man in all the earth. He is blameless—a man of complete integrity. He fears God and stays away from evil.”'
  '9':
  - type: text
    content: 'Satan replied to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Yes, but Job has good reason to fear God. '
