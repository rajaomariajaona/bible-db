document_id: JOB.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prologue
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There once was a man named Job who lived in the land of Uz. He was blameless—a man of complete integrity. He feared God and stayed away from evil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have always put a wall of protection around him and his home and his property. You have made him prosper in everything he does. Look how rich he is! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But reach out and take away everything he has, and he will surely curse you to your face!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right, you may test him,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan. “Do whatever you want with everything he possesses, but don’t harm him physically.” So Satan left the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day when Job’s sons and daughters were feasting at the oldest brother’s house, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a messenger arrived at Job’s home with this news: “Your oxen were plowing, with the donkeys feeding beside them, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: when the Sabeans raided us. They stole all the animals and killed all the farmhands. I am the only one who escaped to tell you.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was still speaking, another messenger arrived with this news: “The fire of God has fallen from heaven and burned up your sheep and all the shepherds. I am the only one who escaped to tell you.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was still speaking, a third messenger arrived with this news: “Three bands of Chaldean raiders have stolen your camels and killed your servants. I am the only one who escaped to tell you.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was still speaking, another messenger arrived with this news: “Your sons and daughters were feasting in their oldest brother’s home. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Suddenly, a powerful wind swept in from the wilderness and hit the house on all sides. The house collapsed, and all your children are dead. I am the only one who escaped to tell you.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He had seven sons and three daughters. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job stood up and tore his robe in grief. Then he shaved his head and fell to the ground to worship. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I came naked from my mother’s womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will be naked when I leave.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me what I had,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has taken it away.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!”'
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In all of this, Job did not sin by blaming God.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He owned 7,000 sheep, 3,000 camels, 500 teams of oxen, and 500 female donkeys. He also had many servants. He was, in fact, the richest person in that entire area.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job’s sons would take turns preparing feasts in their homes, and they would also invite their three sisters to celebrate with them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When these celebrations ended—sometimes after several days—Job would purify his children. He would get up early in the morning and offer a burnt offering for each of them. For Job said to himself, “Perhaps my children have sinned and have cursed God in their hearts.” This was Job’s regular practice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s First Test
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day the members of the heavenly court
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sons of God.
      marker-yv: yv-n
    - type: text
      text: ' came to present themselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the Accuser, Satan,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and the satan; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly throughout this chapter.
      marker-yv: yv-n
    - type: text
      text: ' came with them. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Where have you come from?” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked Satan.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I have been patrolling the earth, watching everything that’s going on.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked Satan, “Have you noticed my servant Job? He is the finest man in all the earth. He is blameless—a man of complete integrity. He fears God and stays away from evil.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satan replied to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Yes, but Job has good reason to fear God. '
