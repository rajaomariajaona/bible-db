document_id: 1CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Spiritual Gifts
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' regarding your question about the special abilities the Spirit gives us. I don’t want you to misunderstand this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'You know that when you were still pagans, you were led astray and swept along in worshiping speechless idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So I want you to know that no one speaking by the Spirit of God will curse Jesus, and no one can say Jesus is Lord, except by the Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'There are different kinds of spiritual gifts, but the same Spirit is the source of them all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'There are different kinds of service, but we serve the same Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: God works in different ways, but it is the same God who does the work in all of us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A spiritual gift is given to each of us so we can help each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: To one person the Spirit gives the ability to give wise advice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gives a word of wisdom.
    marker-yv: yv-n
  - type: text
    text: ; to another the same Spirit gives a message of special knowledge.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gives a word of knowledge.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The same Spirit gives great faith to another, and to someone else the one Spirit gives the gift of healing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He gives one person the power to perform miracles, and another the ability to prophesy. He gives someone else the ability to discern whether a message is from the Spirit of God or from another spirit. Still another person is given the ability to speak in unknown languages,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in various tongues; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 12:28, 30.
    marker-yv: yv-n
  - type: text
    text: ' while another is given the ability to interpret what is being said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: It is the one and only Spirit who distributes all these gifts. He alone decides which gift each person should have.
- type: usfm
  marker: s1
  children:
  - type: text
    text: One Body with Many Parts
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The human body has many parts, but the many parts make up one whole body. So it is with the body of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Some of us are Jews, some are Gentiles,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: some are Greeks.
    marker-yv: yv-n
  - type: text
    text: ' some are slaves, and some are free. But we have all been baptized into one body by one Spirit, and we all share the same Spirit.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: we were all given one Spirit to drink.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yes, the body has many different parts, not just one part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If the foot says, “I am not a part of the body because I am not a hand,” that does not make it any less a part of the body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And if the ear says, “I am not part of the body because I am not an eye,” would that make it any less a part of the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If the whole body were an eye, how would you hear? Or if your whole body were an ear, how would you smell anything?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But our bodies have many parts, and God has put each part just where he wants it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'How strange a body would be if it had only one part! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yes, there are many parts, but only one body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The eye can never say to the hand, “I don’t need you.” The head can’t say to the feet, “I don’t need you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In fact, some parts of the body that seem weakest and least important are actually the most necessary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the parts we regard as less honorable are those we clothe with the greatest care. So we carefully protect those parts that should not be seen, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'while the more honorable parts do not require this special care. So God has put the body together such that extra honor and care are given to those parts that have less dignity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This makes for harmony among the members, so that all the members care for each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If one part suffers, all the parts suffer with it, and if one part is honored, all the parts are glad.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'All of you together are Christ’s body, and each of you is a part of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Here are some of the parts God has appointed for the church:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: first are apostles,
- type: usfm
  marker: li1
  children:
  - type: text
    text: second are prophets,
- type: usfm
  marker: li1
  children:
  - type: text
    text: third are teachers,
- type: usfm
  marker: li1
  children:
  - type: text
    text: then those who do miracles,
- type: usfm
  marker: li1
  children:
  - type: text
    text: those who have the gift of healing,
- type: usfm
  marker: li1
  children:
  - type: text
    text: those who can help others,
- type: usfm
  marker: li1
  children:
  - type: text
    text: those who have the gift of leadership,
- type: usfm
  marker: li1
  children:
  - type: text
    text: those who speak in unknown languages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Are we all apostles? Are we all prophets? Are we all teachers? Do we all have the power to do miracles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Do we all have the gift of healing? Do we all have the ability to speak in unknown languages? Do we all have the ability to interpret unknown languages? Of course not! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So you should earnestly desire the most helpful gifts.
- type: usfm
  marker: p
  children:
  - type: text
    text: But now let me show you a way of life that is best of all.
