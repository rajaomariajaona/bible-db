document_id: 1CO.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Spiritual Gifts
  - type: text
    content: Now, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' regarding your question about the special abilities the Spirit gives us. I don’t want you to misunderstand this. '
  '10':
  - type: text
    content: He gives one person the power to perform miracles, and another the ability to prophesy. He gives someone else the ability to discern whether a message is from the Spirit of God or from another spirit. Still another person is given the ability to speak in unknown languages,
  - type: note
    content: Or in various tongues; also in 12:28, 30.
  - type: text
    content: ' while another is given the ability to interpret what is being said. '
  '11':
  - type: text
    content: It is the one and only Spirit who distributes all these gifts. He alone decides which gift each person should have.
  - type: heading
    content: One Body with Many Parts
  '12':
  - type: text
    content: 'The human body has many parts, but the many parts make up one whole body. So it is with the body of Christ. '
  '13':
  - type: text
    content: Some of us are Jews, some are Gentiles,
  - type: note
    content: Greek some are Greeks.
  - type: text
    content: ' some are slaves, and some are free. But we have all been baptized into one body by one Spirit, and we all share the same Spirit.'
  - type: note
    content: Greek we were all given one Spirit to drink.
  '14':
  - type: text
    content: 'Yes, the body has many different parts, not just one part. '
  '15':
  - type: text
    content: 'If the foot says, “I am not a part of the body because I am not a hand,” that does not make it any less a part of the body. '
  '16':
  - type: text
    content: 'And if the ear says, “I am not part of the body because I am not an eye,” would that make it any less a part of the body? '
  '17':
  - type: text
    content: If the whole body were an eye, how would you hear? Or if your whole body were an ear, how would you smell anything?
  '18':
  - type: text
    content: 'But our bodies have many parts, and God has put each part just where he wants it. '
  '19':
  - type: text
    content: 'How strange a body would be if it had only one part! '
  '2':
  - type: text
    content: 'You know that when you were still pagans, you were led astray and swept along in worshiping speechless idols. '
  '20':
  - type: text
    content: 'Yes, there are many parts, but only one body. '
  '21':
  - type: text
    content: The eye can never say to the hand, “I don’t need you.” The head can’t say to the feet, “I don’t need you.”
  '22':
  - type: text
    content: 'In fact, some parts of the body that seem weakest and least important are actually the most necessary. '
  '23':
  - type: text
    content: 'And the parts we regard as less honorable are those we clothe with the greatest care. So we carefully protect those parts that should not be seen, '
  '24':
  - type: text
    content: 'while the more honorable parts do not require this special care. So God has put the body together such that extra honor and care are given to those parts that have less dignity. '
  '25':
  - type: text
    content: 'This makes for harmony among the members, so that all the members care for each other. '
  '26':
  - type: text
    content: If one part suffers, all the parts suffer with it, and if one part is honored, all the parts are glad.
  '27':
  - type: text
    content: 'All of you together are Christ’s body, and each of you is a part of it. '
  '28':
  - type: text
    content: 'Here are some of the parts God has appointed for the church:'
  - type: text
    content: first are apostles,
  - type: text
    content: second are prophets,
  - type: text
    content: third are teachers,
  - type: text
    content: then those who do miracles,
  - type: text
    content: those who have the gift of healing,
  - type: text
    content: those who can help others,
  - type: text
    content: those who have the gift of leadership,
  - type: text
    content: those who speak in unknown languages.
  '29':
  - type: text
    content: 'Are we all apostles? Are we all prophets? Are we all teachers? Do we all have the power to do miracles? '
  '3':
  - type: text
    content: So I want you to know that no one speaking by the Spirit of God will curse Jesus, and no one can say Jesus is Lord, except by the Holy Spirit.
  '30':
  - type: text
    content: 'Do we all have the gift of healing? Do we all have the ability to speak in unknown languages? Do we all have the ability to interpret unknown languages? Of course not! '
  '31':
  - type: text
    content: So you should earnestly desire the most helpful gifts.
  - type: text
    content: But now let me show you a way of life that is best of all.
  '4':
  - type: text
    content: 'There are different kinds of spiritual gifts, but the same Spirit is the source of them all. '
  '5':
  - type: text
    content: 'There are different kinds of service, but we serve the same Lord. '
  '6':
  - type: text
    content: God works in different ways, but it is the same God who does the work in all of us.
  '7':
  - type: text
    content: 'A spiritual gift is given to each of us so we can help each other. '
  '8':
  - type: text
    content: To one person the Spirit gives the ability to give wise advice
  - type: note
    content: Or gives a word of wisdom.
  - type: text
    content: ; to another the same Spirit gives a message of special knowledge.
  - type: note
    content: Or gives a word of knowledge.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'The same Spirit gives great faith to another, and to someone else the one Spirit gives the gift of healing. '
