document_id: EXO.37,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Building the Ark of the Covenant
  - type: text
    content: Next Bezalel made the Ark of acacia wood—a sacred chest 45 inches long, 27 inches wide, and 27 inches high.
  - type: note
    content: Hebrew 2.5 cubits [115 centimeters] long, 1.5 cubits [69 centimeters] wide, and 1.5 cubits high.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Then Bezalel
  - type: note
    content: Hebrew he; also in 37:17, 25.
  - type: text
    content: ' made the table of acacia wood, 36 inches long, 18 inches wide, and 27 inches high.'
  - type: note
    content: Hebrew 2 cubits [92 centimeters] long, 1 cubit [46 centimeters] wide, and 1.5 cubits [69 centimeters] high.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'He overlaid it with pure gold and ran a gold molding around the edge. '
  '12':
  - type: text
    content: He decorated it with a 3-inch border
  - type: note
    content: Hebrew a border of a handbreadth [8 centimeters].
  - type: text
    content: ' all around, and he ran a gold molding along the border. '
  '13':
  - type: text
    content: 'Then he cast four gold rings for the table and attached them at the four corners next to the four legs. '
  '14':
  - type: text
    content: 'The rings were attached near the border to hold the poles that were used to carry the table. '
  '15':
  - type: text
    content: 'He made these poles from acacia wood and overlaid them with gold. '
  '16':
  - type: text
    content: Then he made special containers of pure gold for the table—bowls, ladles, jars, and pitchers—to be used in pouring out liquid offerings.
  - type: heading
    content: Building the Lampstand
  '17':
  - type: text
    content: 'Then Bezalel made the lampstand of pure, hammered gold. He made the entire lampstand and its decorations of one piece—the base, center stem, lamp cups, buds, and petals. '
  '18':
  - type: text
    content: 'The lampstand had six branches going out from the center stem, three on each side. '
  '19':
  - type: text
    content: 'Each of the six branches had three lamp cups shaped like almond blossoms, complete with buds and petals. '
  '2':
  - type: text
    content: 'He overlaid it inside and outside with pure gold, and he ran a molding of gold all around it. '
  '20':
  - type: text
    content: 'The center stem of the lampstand was crafted with four lamp cups shaped like almond blossoms, complete with buds and petals. '
  '21':
  - type: text
    content: 'There was an almond bud beneath each pair of branches where the six branches extended from the center stem, all made of one piece. '
  '22':
  - type: text
    content: The almond buds and branches were all of one piece with the center stem, and they were hammered from pure gold.
  '23':
  - type: text
    content: 'He also made seven lamps for the lampstand, lamp snuffers, and trays, all of pure gold. '
  '24':
  - type: text
    content: The entire lampstand, along with its accessories, was made from 75 pounds
  - type: note
    content: Hebrew 1 talent [34 kilograms].
  - type: text
    content: ' of pure gold.'
  - type: heading
    content: Building the Incense Altar
  '25':
  - type: text
    content: Then Bezalel made the incense altar of acacia wood. It was 18 inches square and 36 inches high,
  - type: note
    content: Hebrew 1 cubit [46 centimeters] long and 1 cubit wide, a square, and 2 cubits [92 centimeters] high.
  - type: text
    content: ' with horns at the corners carved from the same piece of wood as the altar itself. '
  '26':
  - type: text
    content: 'He overlaid the top, sides, and horns of the altar with pure gold, and he ran a gold molding around the entire altar. '
  '27':
  - type: text
    content: 'He made two gold rings and attached them on opposite sides of the altar below the gold molding to hold the carrying poles. '
  '28':
  - type: text
    content: He made the poles of acacia wood and overlaid them with gold.
  '29':
  - type: text
    content: Then he made the sacred anointing oil and the fragrant incense, using the techniques of a skilled incense maker.
  '3':
  - type: text
    content: 'He cast four gold rings and attached them to its four feet, two rings on each side. '
  '4':
  - type: text
    content: 'Then he made poles from acacia wood and overlaid them with gold. '
  '5':
  - type: text
    content: He inserted the poles into the rings at the sides of the Ark to carry it.
  '6':
  - type: text
    content: Then he made the Ark’s cover—the place of atonement—from pure gold. It was 45 inches long and 27 inches wide.
  - type: note
    content: Hebrew 2.5 cubits [115 centimeters] long and 1.5 cubits [69 centimeters] wide.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'He made two cherubim from hammered gold and placed them on the two ends of the atonement cover. '
  '8':
  - type: text
    content: 'He molded the cherubim on each end of the atonement cover, making it all of one piece of gold. '
  '9':
  - type: text
    content: The cherubim faced each other and looked down on the atonement cover. With their wings spread above it, they protected it.
  - type: heading
    content: Building the Table
