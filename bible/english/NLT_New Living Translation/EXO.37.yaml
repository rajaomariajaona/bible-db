document_id: EXO.37,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Ark of the Covenant
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Next Bezalel made the Ark of acacia wood—a sacred chest 45 inches long, 27 inches wide, and 27 inches high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[115 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide, and 1.5 cubits high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then Bezalel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 37:17, 25.
      marker-yv: yv-n
    - type: text
      text: ' made the table of acacia wood, 36 inches long, 18 inches wide, and 27 inches high.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[92 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide, and 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He overlaid it with pure gold and ran a gold molding around the edge. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He decorated it with a 3-inch border
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a border of a handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' all around, and he ran a gold molding along the border. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then he cast four gold rings for the table and attached them at the four corners next to the four legs. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The rings were attached near the border to hold the poles that were used to carry the table. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He made these poles from acacia wood and overlaid them with gold. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then he made special containers of pure gold for the table—bowls, ladles, jars, and pitchers—to be used in pouring out liquid offerings.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Lampstand
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Bezalel made the lampstand of pure, hammered gold. He made the entire lampstand and its decorations of one piece—the base, center stem, lamp cups, buds, and petals. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The lampstand had six branches going out from the center stem, three on each side. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Each of the six branches had three lamp cups shaped like almond blossoms, complete with buds and petals. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He overlaid it inside and outside with pure gold, and he ran a molding of gold all around it. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The center stem of the lampstand was crafted with four lamp cups shaped like almond blossoms, complete with buds and petals. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'There was an almond bud beneath each pair of branches where the six branches extended from the center stem, all made of one piece. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The almond buds and branches were all of one piece with the center stem, and they were hammered from pure gold.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He also made seven lamps for the lampstand, lamp snuffers, and trays, all of pure gold. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The entire lampstand, along with its accessories, was made from 75 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of pure gold.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Incense Altar
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then Bezalel made the incense altar of acacia wood. It was 18 inches square and 36 inches high,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 1 cubit wide, a square, and 2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[92 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' with horns at the corners carved from the same piece of wood as the altar itself. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He overlaid the top, sides, and horns of the altar with pure gold, and he ran a gold molding around the entire altar. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'He made two gold rings and attached them on opposite sides of the altar below the gold molding to hold the carrying poles. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: He made the poles of acacia wood and overlaid them with gold.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Then he made the sacred anointing oil and the fragrant incense, using the techniques of a skilled incense maker.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He cast four gold rings and attached them to its four feet, two rings on each side. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then he made poles from acacia wood and overlaid them with gold. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He inserted the poles into the rings at the sides of the Ark to carry it.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then he made the Ark’s cover—the place of atonement—from pure gold. It was 45 inches long and 27 inches wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[115 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He made two cherubim from hammered gold and placed them on the two ends of the atonement cover. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He molded the cherubim on each end of the atonement cover, making it all of one piece of gold. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The cherubim faced each other and looked down on the atonement cover. With their wings spread above it, they protected it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Table
    marker-yv: yv-h
