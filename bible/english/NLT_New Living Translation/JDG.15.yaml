document_id: JDG.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson’s Vengeance on the Philistines
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Later on, during the wheat harvest, Samson took a young goat as a present to his wife. He said, “I’m going into my wife’s room to sleep with her,” but her father wouldn’t let him in.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I truly thought you must hate her,” her father explained, “so I gave her in marriage to your best man. But look, her younger sister is even more beautiful than she is. Marry her instead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samson said, “This time I cannot be blamed for everything I am going to do to you Philistines.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then he went out and caught 300 foxes. He tied their tails together in pairs, and he fastened a torch to each pair of tails. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he lit the torches and let the foxes run through the grain fields of the Philistines. He burned all their grain to the ground, including the sheaves and the uncut grain. He also destroyed their vineyards and olive groves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Who did this?” the Philistines demanded.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Samson,” was the reply, “because his father-in-law from Timnah gave Samson’s wife to be married to his best man.” So the Philistines went and got the woman and her father and burned them to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Because you did this,” Samson vowed, “I won’t rest until I take my revenge on you!” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So he attacked the Philistines with great fury and killed many of them. Then he went to live in a cave in the rock of Etam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The Philistines retaliated by setting up camp in Judah and spreading out near the town of Lehi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The men of Judah asked the Philistines, “Why are you attacking us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The Philistines replied, “We’ve come to capture Samson. We’ve come to pay him back for what he did to us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So 3,000 men of Judah went down to get Samson at the cave in the rock of Etam. They said to Samson, “Don’t you realize the Philistines rule over us? What are you doing to us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Samson replied, “I only did to them what they did to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the men of Judah told him, “We have come to tie you up and hand you over to the Philistines.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “All right,” Samson said. “But promise that you won’t kill me yourselves.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “We will only tie you up and hand you over to the Philistines,” they replied. “We won’t kill you.” So they tied him up with two new ropes and brought him up from the rock.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As Samson arrived at Lehi, the Philistines came shouting in triumph. But the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came powerfully upon Samson, and he snapped the ropes on his arms as if they were burnt strands of flax, and they fell from his wrists. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then he found the jawbone of a recently killed donkey. He picked it up and killed 1,000 Philistines with it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Samson said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With the jawbone of a donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve piled them in heaps!
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the jawbone of a donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve killed a thousand men!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When he finished his boasting, he threw away the jawbone; and the place was named Jawbone Hill.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ramath-lehi.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samson was now very thirsty, and he cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “You have accomplished this great victory by the strength of your servant. Must I now die of thirst and fall into the hands of these pagans?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So God caused water to gush out of a hollow in the ground at Lehi, and Samson was revived as he drank. Then he named that place “The Spring of the One Who Cried Out,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: En-hakkore.
    marker-yv: yv-n
  - type: text
    text: ' and it is still in Lehi to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Samson judged Israel for twenty years during the period when the Philistines dominated the land.
