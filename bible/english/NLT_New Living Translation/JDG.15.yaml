document_id: JDG.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson’s Vengeance on the Philistines
  - type: text
    content: Later on, during the wheat harvest, Samson took a young goat as a present to his wife. He said, “I’m going into my wife’s room to sleep with her,” but her father wouldn’t let him in.
  '10':
  - type: text
    content: The men of Judah asked the Philistines, “Why are you attacking us?”
  - type: text
    content: The Philistines replied, “We’ve come to capture Samson. We’ve come to pay him back for what he did to us.”
  '11':
  - type: text
    content: So 3,000 men of Judah went down to get Samson at the cave in the rock of Etam. They said to Samson, “Don’t you realize the Philistines rule over us? What are you doing to us?”
  - type: text
    content: But Samson replied, “I only did to them what they did to me.”
  '12':
  - type: text
    content: But the men of Judah told him, “We have come to tie you up and hand you over to the Philistines.”
  - type: text
    content: “All right,” Samson said. “But promise that you won’t kill me yourselves.”
  '13':
  - type: text
    content: “We will only tie you up and hand you over to the Philistines,” they replied. “We won’t kill you.” So they tied him up with two new ropes and brought him up from the rock.
  '14':
  - type: text
    content: 'As Samson arrived at Lehi, the Philistines came shouting in triumph. But the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came powerfully upon Samson, and he snapped the ropes on his arms as if they were burnt strands of flax, and they fell from his wrists. '
  '15':
  - type: text
    content: 'Then he found the jawbone of a recently killed donkey. He picked it up and killed 1,000 Philistines with it. '
  '16':
  - type: text
    content: Then Samson said,
  - type: text
    content: “With the jawbone of a donkey,
  - type: text
    content: I’ve piled them in heaps!
  - type: text
    content: With the jawbone of a donkey,
  - type: text
    content: I’ve killed a thousand men!”
  '17':
  - type: text
    content: When he finished his boasting, he threw away the jawbone; and the place was named Jawbone Hill.
  - type: note
    content: Hebrew Ramath-lehi.
  '18':
  - type: text
    content: 'Samson was now very thirsty, and he cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You have accomplished this great victory by the strength of your servant. Must I now die of thirst and fall into the hands of these pagans?” '
  '19':
  - type: text
    content: So God caused water to gush out of a hollow in the ground at Lehi, and Samson was revived as he drank. Then he named that place “The Spring of the One Who Cried Out,”
  - type: note
    content: Hebrew En-hakkore.
  - type: text
    content: ' and it is still in Lehi to this day.'
  '2':
  - type: text
    content: “I truly thought you must hate her,” her father explained, “so I gave her in marriage to your best man. But look, her younger sister is even more beautiful than she is. Marry her instead.”
  '20':
  - type: text
    content: Samson judged Israel for twenty years during the period when the Philistines dominated the land.
  '3':
  - type: text
    content: 'Samson said, “This time I cannot be blamed for everything I am going to do to you Philistines.” '
  '4':
  - type: text
    content: 'Then he went out and caught 300 foxes. He tied their tails together in pairs, and he fastened a torch to each pair of tails. '
  '5':
  - type: text
    content: Then he lit the torches and let the foxes run through the grain fields of the Philistines. He burned all their grain to the ground, including the sheaves and the uncut grain. He also destroyed their vineyards and olive groves.
  '6':
  - type: text
    content: “Who did this?” the Philistines demanded.
  - type: text
    content: “Samson,” was the reply, “because his father-in-law from Timnah gave Samson’s wife to be married to his best man.” So the Philistines went and got the woman and her father and burned them to death.
  '7':
  - type: text
    content: '“Because you did this,” Samson vowed, “I won’t rest until I take my revenge on you!” '
  '8':
  - type: text
    content: So he attacked the Philistines with great fury and killed many of them. Then he went to live in a cave in the rock of Etam.
  '9':
  - type: text
    content: 'The Philistines retaliated by setting up camp in Judah and spreading out near the town of Lehi. '
