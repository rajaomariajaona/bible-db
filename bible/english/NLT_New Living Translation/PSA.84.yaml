document_id: PSA.84,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of the descendants of Korah, to be accompanied by a stringed instrument.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: according to the gittith.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How lovely is your dwelling place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A single day in your courts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is better than a thousand anywhere else!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would rather be a gatekeeper in the house of my God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than live the good life in the homes of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God is our sun and our shield.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He gives us grace and glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will withhold no good thing'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those who do what is right.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what joy for those who trust in you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I long, yes, I faint with longing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to enter the courts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my whole being, body and soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will shout joyfully to the living God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the sparrow finds a home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the swallow builds her nest and raises her young
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at a place near your altar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, my King and my God!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What joy for those who can live in your house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'always singing your praises. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What joy for those whose strength comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who have set their minds on a pilgrimage to Jerusalem.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they walk through the Valley of Weeping,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Valley of Poplars; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: valley of Baca.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will become a place of refreshing springs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The autumn rains will clothe it with blessings.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will continue to grow stronger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and each of them will appear before God in Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies, hear my prayer.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Listen, O God of Jacob. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, look with favor upon the king, our shield!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show favor to the one you have anointed.
