document_id: PSA.84,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of the descendants of Korah, to be accompanied by a stringed instrument.'
  - type: note
    content: Hebrew according to the gittith.
  - type: text
    content: How lovely is your dwelling place,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '10':
  - type: text
    content: A single day in your courts
  - type: text
    content: is better than a thousand anywhere else!
  - type: text
    content: I would rather be a gatekeeper in the house of my God
  - type: text
    content: than live the good life in the homes of the wicked.
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' God is our sun and our shield.'
  - type: text
    content: He gives us grace and glory.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will withhold no good thing'
  - type: text
    content: from those who do what is right.
  '12':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: what joy for those who trust in you.
  '2':
  - type: text
    content: I long, yes, I faint with longing
  - type: text
    content: 'to enter the courts of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: With my whole being, body and soul,
  - type: text
    content: I will shout joyfully to the living God.
  '3':
  - type: text
    content: Even the sparrow finds a home,
  - type: text
    content: and the swallow builds her nest and raises her young
  - type: text
    content: at a place near your altar,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, my King and my God!'
  '4':
  - type: text
    content: What joy for those who can live in your house,
  - type: text
    content: 'always singing your praises. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: 'What joy for those whose strength comes from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who have set their minds on a pilgrimage to Jerusalem.
  '6':
  - type: text
    content: When they walk through the Valley of Weeping,
  - type: note
    content: Or Valley of Poplars; Hebrew reads valley of Baca.
  - type: text
    content: it will become a place of refreshing springs.
  - type: text
    content: The autumn rains will clothe it with blessings.
  '7':
  - type: text
    content: They will continue to grow stronger,
  - type: text
    content: and each of them will appear before God in Jerusalem.
  - type: note
    content: Hebrew Zion.
  '8':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies, hear my prayer.'
  - type: text
    content: 'Listen, O God of Jacob. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: O God, look with favor upon the king, our shield!
  - type: text
    content: Show favor to the one you have anointed.
