document_id: EZR.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exiles Who Returned with Ezra
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Here is a list of the family leaders and the genealogies of those who came with me from Babylon during the reign of King Artaxerxes:'
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: From the family of Bani
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Esdras 8:36); Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bani.
      marker-yv: yv-n
    - type: text
      text: ': Shelomith son of Josiphiah and 160 other men.'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'From the family of Bebai: Zechariah son of Bebai and 28 other men.'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'From the family of Azgad: Johanan son of Hakkatan and 110 other men.'
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: From the family of Adonikam, who came later
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who were the last of his family.
      marker-yv: yv-n
    - type: text
      text: ': Eliphelet, Jeuel, Shemaiah, and 60 other men.'
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'From the family of Bigvai: Uthai, Zaccur,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions and an alternate reading of the Masoretic Text; the other alternate reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zabbud.
      marker-yv: yv-n
    - type: text
      text: ' and 70 other men.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezra’s Journey to Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I assembled the exiles at the Ahava Canal, and we camped there for three days while I went over the lists of the people and the priests who had arrived. I found that not one Levite had volunteered to come along. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, who were leaders of the people. I also sent for Joiarib and Elnathan, who were men of discernment. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I sent them to Iddo, the leader of the Levites at Casiphia, to ask him and his relatives and the Temple servants to send us ministers for the Temple of God at Jerusalem.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Since the gracious hand of our God was on us, they sent us a man named Sherebiah, along with eighteen of his sons and brothers. He was a very astute man and a descendant of Mahli, who was a descendant of Levi son of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the name that God gave to Jacob.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They also sent Hashabiah, together with Jeshaiah from the descendants of Merari, and twenty of his sons and brothers, '
  '2':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'From the family of Phinehas: Gershom.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Ithamar: Daniel.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of David: Hattush, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: and 220 Temple servants. The Temple servants were assistants to the Levites—a group of Temple workers first instituted by King David and his officials. They were all listed by name.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And there by the Ahava Canal, I gave orders for all of us to fast and humble ourselves before our God. We prayed that he would give us a safe journey and protect us, our children, and our goods as we traveled. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For I was ashamed to ask the king for soldiers and horsemen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charioteers.
      marker-yv: yv-n
    - type: text
      text: ' to accompany us and protect us from enemies along the way. After all, we had told the king, “Our God’s hand of protection is on all who worship him, but his fierce anger rages against those who abandon him.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So we fasted and earnestly prayed that our God would take care of us, and he heard our prayer.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'I appointed twelve leaders of the priests—Sherebiah, Hashabiah, and ten other priests— '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'to be in charge of transporting the silver, the gold, the gold bowls, and the other items that the king, his council, his officials, and all the people of Israel had presented for the Temple of God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I weighed the treasure as I gave it to them and found the totals to be as follows:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 24 tons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '650 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[22 metric tons].'
      marker-yv: yv-n
    - type: text
      text: ' of silver,'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 7,500 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3,400 kilograms]; also in 8:26c.'
      marker-yv: yv-n
    - type: text
      text: ' of silver articles,'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 7,500 pounds of gold,
  '27':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 20 gold bowls, equal in value to 1,000 gold coins,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1,000 darics, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 19 pounds or 8.6 kilograms in weight.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 2 fine articles of polished bronze, as precious as gold.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And I said to these priests, “You and these treasures have been set apart as holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. This silver and gold is a voluntary offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of our ancestors. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Guard these treasures well until you present them to the leading priests, the Levites, and the leaders of Israel, who will weigh them at the storerooms of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple in Jerusalem.” '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: a descendant of Shecaniah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Parosh: Zechariah and 150 other men were registered.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So the priests and the Levites accepted the task of transporting these treasures of silver and gold to the Temple of our God in Jerusalem.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: We broke camp at the Ahava Canal on April 19
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the twelfth day of the first month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was April 19, 458 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 6:15.
      marker-yv: yv-n
    - type: text
      text: ' and started off to Jerusalem. And the gracious hand of our God protected us and saved us from enemies and bandits along the way. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So we arrived safely in Jerusalem, where we rested for three days.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On the fourth day after our arrival, the silver, gold, and other valuables were weighed at the Temple of our God and entrusted to Meremoth son of Uriah the priest and to Eleazar son of Phinehas, along with Jozabad son of Jeshua and Noadiah son of Binnui—both of whom were Levites. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Everything was accounted for by number and weight, and the total weight was officially recorded.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then the exiles who had come out of captivity sacrificed burnt offerings to the God of Israel. They presented twelve bulls for all the people of Israel, as well as ninety-six rams and seventy-seven male lambs. They also offered twelve male goats as a sin offering. All this was given as a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: The king’s decrees were delivered to his highest officers and the governors of the province west of the Euphrates River,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the province beyond the river.
      marker-yv: yv-n
    - type: text
      text: ' who then cooperated by supporting the people and the Temple of God.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'From the family of Pahath-moab: Eliehoenai son of Zerahiah and 200 other men.'
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: From the family of Zattu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Esdras 8:32); Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zattu.
      marker-yv: yv-n
    - type: text
      text: ': Shecaniah son of Jahaziel and 300 other men.'
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'From the family of Adin: Ebed son of Jonathan and 50 other men.'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'From the family of Elam: Jeshaiah son of Athaliah and 70 other men.'
  '8':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'From the family of Shephatiah: Zebadiah son of Michael and 80 other men.'
  '9':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'From the family of Joab: Obadiah son of Jehiel and 218 other men.'
