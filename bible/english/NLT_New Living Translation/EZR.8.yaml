document_id: EZR.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Exiles Who Returned with Ezra
  - type: text
    content: 'Here is a list of the family leaders and the genealogies of those who came with me from Babylon during the reign of King Artaxerxes:'
  '10':
  - type: text
    content: From the family of Bani
  - type: note
    content: As in some Greek manuscripts (see also 1 Esdras 8:36); Hebrew lacks Bani.
  - type: text
    content: ': Shelomith son of Josiphiah and 160 other men.'
  '11':
  - type: text
    content: 'From the family of Bebai: Zechariah son of Bebai and 28 other men.'
  '12':
  - type: text
    content: 'From the family of Azgad: Johanan son of Hakkatan and 110 other men.'
  '13':
  - type: text
    content: From the family of Adonikam, who came later
  - type: note
    content: Or who were the last of his family.
  - type: text
    content: ': Eliphelet, Jeuel, Shemaiah, and 60 other men.'
  '14':
  - type: text
    content: 'From the family of Bigvai: Uthai, Zaccur,'
  - type: note
    content: As in Greek and Syriac versions and an alternate reading of the Masoretic Text; the other alternate reads Zabbud.
  - type: text
    content: ' and 70 other men.'
  - type: heading
    content: Ezra’s Journey to Jerusalem
  '15':
  - type: text
    content: 'I assembled the exiles at the Ahava Canal, and we camped there for three days while I went over the lists of the people and the priests who had arrived. I found that not one Levite had volunteered to come along. '
  '16':
  - type: text
    content: 'So I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, who were leaders of the people. I also sent for Joiarib and Elnathan, who were men of discernment. '
  '17':
  - type: text
    content: I sent them to Iddo, the leader of the Levites at Casiphia, to ask him and his relatives and the Temple servants to send us ministers for the Temple of God at Jerusalem.
  '18':
  - type: text
    content: Since the gracious hand of our God was on us, they sent us a man named Sherebiah, along with eighteen of his sons and brothers. He was a very astute man and a descendant of Mahli, who was a descendant of Levi son of Israel.
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'They also sent Hashabiah, together with Jeshaiah from the descendants of Merari, and twenty of his sons and brothers, '
  '2':
  - type: text
    content: 'From the family of Phinehas: Gershom.'
  - type: text
    content: 'From the family of Ithamar: Daniel.'
  - type: text
    content: 'From the family of David: Hattush, '
  '20':
  - type: text
    content: and 220 Temple servants. The Temple servants were assistants to the Levites—a group of Temple workers first instituted by King David and his officials. They were all listed by name.
  '21':
  - type: text
    content: 'And there by the Ahava Canal, I gave orders for all of us to fast and humble ourselves before our God. We prayed that he would give us a safe journey and protect us, our children, and our goods as we traveled. '
  '22':
  - type: text
    content: For I was ashamed to ask the king for soldiers and horsemen
  - type: note
    content: Or charioteers.
  - type: text
    content: ' to accompany us and protect us from enemies along the way. After all, we had told the king, “Our God’s hand of protection is on all who worship him, but his fierce anger rages against those who abandon him.” '
  '23':
  - type: text
    content: So we fasted and earnestly prayed that our God would take care of us, and he heard our prayer.
  '24':
  - type: text
    content: 'I appointed twelve leaders of the priests—Sherebiah, Hashabiah, and ten other priests— '
  '25':
  - type: text
    content: 'to be in charge of transporting the silver, the gold, the gold bowls, and the other items that the king, his council, his officials, and all the people of Israel had presented for the Temple of God. '
  '26':
  - type: text
    content: 'I weighed the treasure as I gave it to them and found the totals to be as follows:'
  - type: text
    content: 24 tons
  - type: note
    content: Hebrew 650 talents [22 metric tons].
  - type: text
    content: ' of silver,'
  - type: text
    content: 7,500 pounds
  - type: note
    content: Hebrew 100 talents [3,400 kilograms]; also in 8:26c.
  - type: text
    content: ' of silver articles,'
  - type: text
    content: 7,500 pounds of gold,
  '27':
  - type: text
    content: 20 gold bowls, equal in value to 1,000 gold coins,
  - type: note
    content: Hebrew 1,000 darics, about 19 pounds or 8.6 kilograms in weight.
  - type: text
    content: 2 fine articles of polished bronze, as precious as gold.
  '28':
  - type: text
    content: 'And I said to these priests, “You and these treasures have been set apart as holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. This silver and gold is a voluntary offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors. '
  '29':
  - type: text
    content: 'Guard these treasures well until you present them to the leading priests, the Levites, and the leaders of Israel, who will weigh them at the storerooms of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple in Jerusalem.” '
  '3':
  - type: text
    content: a descendant of Shecaniah.
  - type: text
    content: 'From the family of Parosh: Zechariah and 150 other men were registered.'
  '30':
  - type: text
    content: So the priests and the Levites accepted the task of transporting these treasures of silver and gold to the Temple of our God in Jerusalem.
  '31':
  - type: text
    content: We broke camp at the Ahava Canal on April 19
  - type: note
    content: Hebrew on the twelfth day of the first month, of the ancient Hebrew lunar calendar. This day was April 19, 458 b.c.; also see note on 6:15.
  - type: text
    content: ' and started off to Jerusalem. And the gracious hand of our God protected us and saved us from enemies and bandits along the way. '
  '32':
  - type: text
    content: So we arrived safely in Jerusalem, where we rested for three days.
  '33':
  - type: text
    content: 'On the fourth day after our arrival, the silver, gold, and other valuables were weighed at the Temple of our God and entrusted to Meremoth son of Uriah the priest and to Eleazar son of Phinehas, along with Jozabad son of Jeshua and Noadiah son of Binnui—both of whom were Levites. '
  '34':
  - type: text
    content: Everything was accounted for by number and weight, and the total weight was officially recorded.
  '35':
  - type: text
    content: 'Then the exiles who had come out of captivity sacrificed burnt offerings to the God of Israel. They presented twelve bulls for all the people of Israel, as well as ninety-six rams and seventy-seven male lambs. They also offered twelve male goats as a sin offering. All this was given as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '36':
  - type: text
    content: The king’s decrees were delivered to his highest officers and the governors of the province west of the Euphrates River,
  - type: note
    content: Hebrew the province beyond the river.
  - type: text
    content: ' who then cooperated by supporting the people and the Temple of God.'
  '4':
  - type: text
    content: 'From the family of Pahath-moab: Eliehoenai son of Zerahiah and 200 other men.'
  '5':
  - type: text
    content: From the family of Zattu
  - type: note
    content: As in some Greek manuscripts (see also 1 Esdras 8:32); Hebrew lacks Zattu.
  - type: text
    content: ': Shecaniah son of Jahaziel and 300 other men.'
  '6':
  - type: text
    content: 'From the family of Adin: Ebed son of Jonathan and 50 other men.'
  '7':
  - type: text
    content: 'From the family of Elam: Jeshaiah son of Athaliah and 70 other men.'
  '8':
  - type: text
    content: 'From the family of Shephatiah: Zebadiah son of Michael and 80 other men.'
  '9':
  - type: text
    content: 'From the family of Joab: Obadiah son of Jehiel and 218 other men.'
