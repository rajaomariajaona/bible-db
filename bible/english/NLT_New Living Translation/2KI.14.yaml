document_id: 2KI.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amaziah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amaziah son of Joash began to rule over Judah in the second year of the reign of King Jehoash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joash, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoash; also in 14:13, 23, 27.
    marker-yv: yv-n
  - type: text
    text: ' of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amaziah was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother was Jehoaddin from Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amaziah did what was pleasing in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, but not like his ancestor David. Instead, he followed the example of his father, Joash. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Amaziah did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Amaziah was well established as king, he executed the officials who had assassinated his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'However, he did not kill the children of the assassins, for he obeyed the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as written by Moses in the Book of the Law: “Parents must not be put to death for the sins of their children, nor children for the sins of their parents. Those deserving to die must be put to death for their own crimes.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 24:16.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amaziah also killed 10,000 Edomites in the Valley of Salt. He also conquered Sela and changed its name to Joktheel, as it is called to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day Amaziah sent messengers with this challenge to Israel’s king Jehoash, the son of Jehoahaz and grandson of Jehu: “Come and meet me in battle!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Come, let us look one another in the face.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But King Jehoash of Israel replied to King Amaziah of Judah with this story: “Out in the Lebanon mountains, a thistle sent a message to a mighty cedar tree: ‘Give your daughter in marriage to my son.’ But just then a wild animal of Lebanon came by and stepped on the thistle, crushing it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “You have indeed defeated Edom, and you are proud of it. But be content with your victory and stay at home! Why stir up trouble that will only bring disaster on you and the people of Judah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Amaziah refused to listen, so King Jehoash of Israel mobilized his army against King Amaziah of Judah. The two armies drew up their battle lines at Beth-shemesh in Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Judah was routed by the army of Israel, and its army scattered and fled for home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: King Jehoash of Israel captured Judah’s king, Amaziah son of Joash and grandson of Ahaziah, at Beth-shemesh. Then he marched to Jerusalem, where he demolished 600 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '400 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[180 meters].'
    marker-yv: yv-n
  - type: text
    text: ' of Jerusalem’s wall, from the Ephraim Gate to the Corner Gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He carried off all the gold and silver and all the articles from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . He also seized the treasures from the royal palace, along with hostages, and then returned to Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The rest of the events in Jehoash’s reign and everything he did, including the extent of his power and his war with King Amaziah of Judah, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When Jehoash died, he was buried in Samaria with the kings of Israel. And his son Jeroboam II became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'King Amaziah of Judah lived for fifteen years after the death of King Jehoash of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The rest of the events in Amaziah’s reign are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'There was a conspiracy against Amaziah’s life in Jerusalem, and he fled to Lachish. But his enemies sent assassins after him, and they killed him there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They brought his body back to Jerusalem on a horse, and he was buried with his ancestors in the City of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: All the people of Judah had crowned Amaziah’s sixteen-year-old son, Uzziah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Azariah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Uzziah.
    marker-yv: yv-n
  - type: text
    text: ' as king in place of his father, Amaziah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: After his father’s death, Uzziah rebuilt the town of Elath and restored it to Judah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeroboam II Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jeroboam II, the son of Jehoash, began to rule over Israel in the fifteenth year of King Amaziah’s reign in Judah. He reigned in Samaria forty-one years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jeroboam II recovered the territories of Israel between Lebo-hamath and the Dead Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea of the Arabah.
    marker-yv: yv-n
  - type: text
    text: ' just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, had promised through Jonah son of Amittai, the prophet from Gath-hepher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' saw the bitter suffering of everyone in Israel, and that there was no one in Israel, slave or free, to help them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had not said he would blot out the name of Israel completely, he used Jeroboam II, the son of Jehoash, to save them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The rest of the events in the reign of Jeroboam II and everything he did—including the extent of his power, his wars, and how he recovered for Israel both Damascus and Hamath, which had belonged to Judah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to Yaudi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: '—are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: When Jeroboam II died, he was buried in Samaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he was buried in Samaria.
    marker-yv: yv-n
  - type: text
    text: ' with the kings of Israel. Then his son Zechariah became the next king.'
