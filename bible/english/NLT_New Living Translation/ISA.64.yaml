document_id: ISA.64
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the Hebrew text this verse is included in 63:19.
    marker-yv: yv-n
  - type: text
    text: Oh, that you would burst from the heavens and come down!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How the mountains would quake in your presence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 64:2-12 are numbered 64:1-11 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: As fire causes wood to burn
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water to boil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your coming would make the nations tremble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then your enemies would learn the reason for your fame!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When you came down long ago,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you did awesome deeds beyond our highest expectations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And oh, how the mountains quaked!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For since the world began,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no ear has heard
- type: usfm
  marker: q1
  children:
  - type: text
    text: and no eye has seen a God like you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who works for those who wait for him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You welcome those who gladly do good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who follow godly ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you have been very angry with us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for we are not godly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We are constant sinners;
- type: usfm
  marker: q2
  children:
  - type: text
    text: how can people like us be saved?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We are all infected and impure with sin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When we display our righteous deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are nothing but filthy rags.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like autumn leaves, we wither and fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our sins sweep us away like the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet no one calls on your name
- type: usfm
  marker: q2
  children:
  - type: text
    text: or pleads with you for mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, you have turned away from us
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turned us over
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek, Syriac, and Aramaic versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: melted us.
    marker-yv: yv-n
  - type: text
    text: ' to our sins.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And yet, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are our Father.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are the clay, and you are the potter.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We all are formed by your hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Don’t be so angry with us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Please don’t remember our sins forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at us, we pray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see that we are all your people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Your holy cities are destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion is a wilderness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, Jerusalem is a desolate ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The holy and beautiful Temple
- type: usfm
  marker: q2
  children:
  - type: text
    text: where our ancestors praised you
- type: usfm
  marker: q1
  children:
  - type: text
    text: has been burned down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the things of beauty are destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After all this, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', must you still refuse to help us?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you continue to be silent and punish us?
