document_id: ISA.64,116
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: In the Hebrew text this verse is included in 63:19.
  - type: text
    content: Oh, that you would burst from the heavens and come down!
  - type: text
    content: How the mountains would quake in your presence!
  '10':
  - type: text
    content: Your holy cities are destroyed.
  - type: text
    content: Zion is a wilderness;
  - type: text
    content: yes, Jerusalem is a desolate ruin.
  '11':
  - type: text
    content: The holy and beautiful Temple
  - type: text
    content: where our ancestors praised you
  - type: text
    content: has been burned down,
  - type: text
    content: and all the things of beauty are destroyed.
  '12':
  - type: text
    content: 'After all this, '
  - type: text
    content: Lord
  - type: text
    content: ', must you still refuse to help us?'
  - type: text
    content: Will you continue to be silent and punish us?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 64:2-12 are numbered 64:1-11 in Hebrew text.
  - type: text
    content: As fire causes wood to burn
  - type: text
    content: and water to boil,
  - type: text
    content: your coming would make the nations tremble.
  - type: text
    content: Then your enemies would learn the reason for your fame!
  '3':
  - type: text
    content: When you came down long ago,
  - type: text
    content: you did awesome deeds beyond our highest expectations.
  - type: text
    content: And oh, how the mountains quaked!
  '4':
  - type: text
    content: For since the world began,
  - type: text
    content: no ear has heard
  - type: text
    content: and no eye has seen a God like you,
  - type: text
    content: who works for those who wait for him!
  '5':
  - type: text
    content: You welcome those who gladly do good,
  - type: text
    content: who follow godly ways.
  - type: text
    content: But you have been very angry with us,
  - type: text
    content: for we are not godly.
  - type: text
    content: We are constant sinners;
  - type: text
    content: how can people like us be saved?
  '6':
  - type: text
    content: We are all infected and impure with sin.
  - type: text
    content: When we display our righteous deeds,
  - type: text
    content: they are nothing but filthy rags.
  - type: text
    content: Like autumn leaves, we wither and fall,
  - type: text
    content: and our sins sweep us away like the wind.
  '7':
  - type: text
    content: Yet no one calls on your name
  - type: text
    content: or pleads with you for mercy.
  - type: text
    content: Therefore, you have turned away from us
  - type: text
    content: and turned us over
  - type: note
    content: As in Greek, Syriac, and Aramaic versions; Hebrew reads melted us.
  - type: text
    content: ' to our sins.'
  '8':
  - type: text
    content: 'And yet, O '
  - type: text
    content: Lord
  - type: text
    content: ', you are our Father.'
  - type: text
    content: We are the clay, and you are the potter.
  - type: text
    content: We all are formed by your hand.
  '9':
  - type: text
    content: 'Don’t be so angry with us, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Please don’t remember our sins forever.
  - type: text
    content: Look at us, we pray,
  - type: text
    content: and see that we are all your people.
