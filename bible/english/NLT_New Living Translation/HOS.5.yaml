document_id: HOS.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Failure of Israel’s Leaders
  - type: text
    content: “Hear this, you priests.
  - type: text
    content: Pay attention, you leaders of Israel.
  - type: text
    content: Listen, you members of the royal family.
  - type: text
    content: Judgment has been handed down against you.
  - type: text
    content: For you have led the people into a snare
  - type: text
    content: by worshiping the idols at Mizpah and Tabor.
  '10':
  - type: text
    content: “The leaders of Judah have become like thieves.
  - type: note
    content: Hebrew like those who move a boundary marker.
  - type: text
    content: So I will pour my anger on them like a waterfall.
  '11':
  - type: text
    content: The people of Israel will be crushed and broken by my judgment
  - type: text
    content: because they are determined to worship idols.
  - type: note
    content: Or determined to follow human commands. The meaning of the Hebrew is uncertain.
  '12':
  - type: text
    content: I will destroy Israel as a moth consumes wool.
  - type: text
    content: I will make Judah as weak as rotten wood.
  '13':
  - type: text
    content: “When Israel and Judah saw how sick they were,
  - type: text
    content: Israel turned to Assyria—
  - type: text
    content: to the great king there—
  - type: text
    content: but he could neither help nor cure them.
  '14':
  - type: text
    content: I will be like a lion to Israel,
  - type: text
    content: like a strong young lion to Judah.
  - type: text
    content: I will tear them to pieces!
  - type: text
    content: I will carry them off,
  - type: text
    content: and no one will be left to rescue them.
  '15':
  - type: text
    content: Then I will return to my place
  - type: text
    content: until they admit their guilt and turn to me.
  - type: text
    content: For as soon as trouble comes,
  - type: text
    content: they will earnestly search for me.”
  '2':
  - type: text
    content: You have dug a deep pit to trap them at Acacia Grove.
  - type: note
    content: Hebrew at Shittim. The meaning of the Hebrew for this sentence is uncertain.
  - type: text
    content: But I will settle with you for what you have done.
  '3':
  - type: text
    content: I know what you are like, O Ephraim.
  - type: text
    content: You cannot hide yourself from me, O Israel.
  - type: text
    content: You have left me as a prostitute leaves her husband;
  - type: text
    content: you are utterly defiled.
  '4':
  - type: text
    content: Your deeds won’t let you return to your God.
  - type: text
    content: You are a prostitute through and through,
  - type: text
    content: 'and you do not know the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: “The arrogance of Israel testifies against her;
  - type: text
    content: Israel and Ephraim will stumble under their load of guilt.
  - type: text
    content: Judah, too, will fall with them.
  '6':
  - type: text
    content: When they come with their flocks and herds
  - type: text
    content: 'to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: they will not find him,
  - type: text
    content: because he has withdrawn from them.
  '7':
  - type: text
    content: 'They have betrayed the honor of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: bearing children that are not his.
  - type: text
    content: Now their false religion will devour them
  - type: text
    content: along with their wealth.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  '8':
  - type: text
    content: “Sound the alarm in Gibeah!
  - type: text
    content: Blow the trumpet in Ramah!
  - type: text
    content: Raise the battle cry in Beth-aven
  - type: note
    content: Beth-aven means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
  - type: text
    content: '!'
  - type: text
    content: Lead on into battle, O warriors of Benjamin!
  '9':
  - type: text
    content: One thing is certain, Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 5:11, 12, 13, 14.
  - type: text
    content: ':'
  - type: text
    content: On your day of punishment,
  - type: text
    content: you will become a heap of rubble.
