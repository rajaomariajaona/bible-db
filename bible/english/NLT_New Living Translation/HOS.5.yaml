document_id: HOS.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Failure of Israel’s Leaders
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Hear this, you priests.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention, you leaders of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, you members of the royal family.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judgment has been handed down against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have led the people into a snare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by worshiping the idols at Mizpah and Tabor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “The leaders of Judah have become like thieves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like those who move a boundary marker.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So I will pour my anger on them like a waterfall.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The people of Israel will be crushed and broken by my judgment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they are determined to worship idols.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'determined to follow human commands. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will destroy Israel as a moth consumes wool.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make Judah as weak as rotten wood.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “When Israel and Judah saw how sick they were,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel turned to Assyria—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the great king there—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he could neither help nor cure them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will be like a lion to Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a strong young lion to Judah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will tear them to pieces!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will carry them off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will be left to rescue them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then I will return to my place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until they admit their guilt and turn to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For as soon as trouble comes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will earnestly search for me.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have dug a deep pit to trap them at Acacia Grove.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'at Shittim. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this sentence is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I will settle with you for what you have done.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I know what you are like, O Ephraim.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You cannot hide yourself from me, O Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have left me as a prostitute leaves her husband;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are utterly defiled.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Your deeds won’t let you return to your God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are a prostitute through and through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and you do not know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “The arrogance of Israel testifies against her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel and Ephraim will stumble under their load of guilt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah, too, will fall with them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When they come with their flocks and herds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will not find him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because he has withdrawn from them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They have betrayed the honor of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bearing children that are not his.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now their false religion will devour them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with their wealth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Sound the alarm in Gibeah!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blow the trumpet in Ramah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise the battle cry in Beth-aven
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Beth-aven '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead on into battle, O warriors of Benjamin!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: One thing is certain, Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 5:11, 12, 13, 14.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On your day of punishment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will become a heap of rubble.
