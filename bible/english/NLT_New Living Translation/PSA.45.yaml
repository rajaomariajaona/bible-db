document_id: PSA.45,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A love song to be sung to the tune “Lilies.” A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of the descendants of Korah.'
  - type: text
    content: Beautiful words stir my heart.
  - type: text
    content: I will recite a lovely poem about the king,
  - type: text
    content: for my tongue is like the pen of a skillful poet.
  '10':
  - type: text
    content: Listen to me, O royal daughter; take to heart what I say.
  - type: text
    content: Forget your people and your family far away.
  '11':
  - type: text
    content: For your royal husband delights in your beauty;
  - type: text
    content: honor him, for he is your lord.
  '12':
  - type: text
    content: The princess of Tyre
  - type: note
    content: Hebrew The daughter of Tyre.
  - type: text
    content: ' will shower you with gifts.'
  - type: text
    content: The wealthy will beg your favor.
  '13':
  - type: text
    content: The bride, a princess, looks glorious
  - type: text
    content: in her golden gown.
  '14':
  - type: text
    content: In her beautiful robes, she is led to the king,
  - type: text
    content: accompanied by her bridesmaids.
  '15':
  - type: text
    content: What a joyful and enthusiastic procession
  - type: text
    content: as they enter the king’s palace!
  '16':
  - type: text
    content: Your sons will become kings like their father.
  - type: text
    content: You will make them rulers over many lands.
  '17':
  - type: text
    content: I will bring honor to your name in every generation.
  - type: text
    content: Therefore, the nations will praise you forever and ever.
  '2':
  - type: text
    content: You are the most handsome of all.
  - type: text
    content: Gracious words stream from your lips.
  - type: text
    content: God himself has blessed you forever.
  '3':
  - type: text
    content: Put on your sword, O mighty warrior!
  - type: text
    content: You are so glorious, so majestic!
  '4':
  - type: text
    content: In your majesty, ride out to victory,
  - type: text
    content: defending truth, humility, and justice.
  - type: text
    content: Go forth to perform awe-inspiring deeds!
  '5':
  - type: text
    content: Your arrows are sharp, piercing your enemies’ hearts.
  - type: text
    content: The nations fall beneath your feet.
  '6':
  - type: text
    content: Your throne, O God,
  - type: note
    content: Or Your divine throne.
  - type: text
    content: ' endures forever and ever.'
  - type: text
    content: You rule with a scepter of justice.
  '7':
  - type: text
    content: You love justice and hate evil.
  - type: text
    content: Therefore God, your God, has anointed you,
  - type: text
    content: pouring out the oil of joy on you more than on anyone else.
  '8':
  - type: text
    content: Myrrh, aloes, and cassia perfume your robes.
  - type: text
    content: In ivory palaces the music of strings entertains you.
  '9':
  - type: text
    content: Kings’ daughters are among your noble women.
  - type: text
    content: At your right side stands the queen,
  - type: text
    content: wearing jewelry of finest gold from Ophir!
