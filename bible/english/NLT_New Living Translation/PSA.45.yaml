document_id: PSA.45,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A love song to be sung to the tune “Lilies.” A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of the descendants of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beautiful words stir my heart.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will recite a lovely poem about the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my tongue is like the pen of a skillful poet.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to me, O royal daughter; take to heart what I say.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forget your people and your family far away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your royal husband delights in your beauty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honor him, for he is your lord.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princess of Tyre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The daughter of Tyre.
      marker-yv: yv-n
    - type: text
      text: ' will shower you with gifts.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wealthy will beg your favor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bride, a princess, looks glorious
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in her golden gown.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In her beautiful robes, she is led to the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: accompanied by her bridesmaids.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a joyful and enthusiastic procession
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they enter the king’s palace!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sons will become kings like their father.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will make them rulers over many lands.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring honor to your name in every generation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore, the nations will praise you forever and ever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the most handsome of all.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gracious words stream from your lips.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God himself has blessed you forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your sword, O mighty warrior!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are so glorious, so majestic!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your majesty, ride out to victory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: defending truth, humility, and justice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go forth to perform awe-inspiring deeds!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your arrows are sharp, piercing your enemies’ hearts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The nations fall beneath your feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your throne, O God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Your divine throne.
      marker-yv: yv-n
    - type: text
      text: ' endures forever and ever.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You rule with a scepter of justice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love justice and hate evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore God, your God, has anointed you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pouring out the oil of joy on you more than on anyone else.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Myrrh, aloes, and cassia perfume your robes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In ivory palaces the music of strings entertains you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings’ daughters are among your noble women.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At your right side stands the queen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wearing jewelry of finest gold from Ophir!
