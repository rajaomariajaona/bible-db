document_id: JOS.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Israelites Defeat Ai
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Do not be afraid or discouraged. Take all your fighting men and attack Ai, for I have given you the king of Ai, his people, his town, and his land. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning Joshua roused his men and started toward Ai, accompanied by the elders of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the fighting men who were with Joshua marched in front of the town and camped on the north side of Ai, with a valley between them and the town. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That night Joshua sent about 5,000 men to lie in ambush between Bethel and Ai, on the west side of the town. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they stationed the main army north of the town and the ambush west of the town. Joshua himself spent that night in the valley.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the king of Ai saw the Israelites across the valley, he and all his army hurried out early in the morning and attacked the Israelites at a place overlooking the Jordan Valley.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Arabah.
      marker-yv: yv-n
    - type: text
      text: ' But he didn’t realize there was an ambush behind the town. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua and the Israelite army fled toward the wilderness as though they were badly beaten. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the men in the town were called out to chase after them. In this way, they were lured away from the town. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was not a man left in Ai or Bethel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts lack '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: or Bethel.
      marker-yv: yv-n
    - type: text
      text: ' who did not chase after the Israelites, and the town was left wide open.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Point the spear in your hand toward Ai, for I will hand the town over to you.” Joshua did as he was commanded. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As soon as Joshua gave this signal, all the men in ambush jumped up from their position and poured into the town. They quickly captured it and set it on fire.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You will destroy them as you destroyed Jericho and its king. But this time you may keep the plunder and the livestock for yourselves. Set an ambush behind the town.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the men of Ai looked behind them, smoke from the town was filling the sky, and they had nowhere to go. For the Israelites who had fled in the direction of the wilderness now turned on their pursuers. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joshua and all the other Israelites saw that the ambush had succeeded and that smoke was rising from the town, they turned and attacked the men of Ai. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the Israelites who were inside the town came out and attacked the enemy from the rear. So the men of Ai were caught in the middle, with Israelite fighters on both sides. Israel attacked them, and not a single person survived or escaped. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only the king of Ai was taken alive and brought to Joshua.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Israelite army finished chasing and killing all the men of Ai in the open fields, they went back and finished off everyone inside. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the entire population of Ai, including men and women, was wiped out that day—12,000 in all. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For Joshua kept holding out his spear until everyone who had lived in Ai was completely destroyed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only the livestock and the treasures of the town were not destroyed, for the Israelites kept these as plunder for themselves, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Joshua. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joshua burned the town of Ai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:28 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “ruin.”
      marker-yv: yv-n
    - type: text
      text: ' and it became a permanent mound of ruins, desolate to this very day.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua impaled the king of Ai on a sharpened pole and left him there until evening. At sunset the Israelites took down the body, as Joshua commanded, and threw it in front of the town gate. They piled a great heap of stones over him that can still be seen today.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant Renewed
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua and all the fighting men set out to attack Ai. Joshua chose 30,000 of his best warriors and sent them out at night '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Joshua built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, on Mount Ebal. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He followed the commands that Moses the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s servant had written in the Book of Instruction: “Make me an altar from stones that are uncut and have not been shaped with iron tools.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:25; Deut 27:5-6.
      marker-yv: yv-n
    - type: text
      text: ' Then on the altar they presented burnt offerings and peace offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And as the Israelites watched, Joshua copied onto the stones of the altar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: onto the stones.
      marker-yv: yv-n
    - type: text
      text: ' the instructions Moses had given them.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the Israelites—foreigners and native-born alike—along with the elders, officers, and judges, were divided into two groups. One group stood in front of Mount Gerizim, the other in front of Mount Ebal. Each group faced the other, and between them stood the Levitical priests carrying the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant. This was all done according to the commands that Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', had previously given for blessing the people of Israel.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua then read to them all the blessings and curses Moses had written in the Book of Instruction. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every word of every command that Moses had ever given was read to the entire assembly of Israel, including the women and children and the foreigners who lived among them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with these orders: “Hide in ambush close behind the town and be ready for action. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When our main army attacks, the men of Ai will come out to fight as they did before, and we will run away from them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We will let them chase us until we have drawn them away from the town. For they will say, ‘The Israelites are running away from us as they did before.’ Then, while we are running from them, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you will jump up from your ambush and take possession of the town, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will give it to you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set the town on fire, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded. You have your orders.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they left and went to the place of ambush between Bethel and the west side of Ai. But Joshua remained among the people in the camp that night. '
