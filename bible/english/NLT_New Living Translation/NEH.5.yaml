document_id: NEH.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nehemiah Defends the Oppressed
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'About this time some of the men and their wives raised a cry of protest against their fellow Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I myself, as well as my brothers and my workers, have been lending the people money and grain, but now let us stop this business of charging interest. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You must restore their fields, vineyards, olive groves, and homes to them this very day. And repay the interest you charged when you lent them money, grain, new wine, and olive oil.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They replied, “We will give back everything and demand nothing more from the people. We will do as you say.” Then I called the priests and made the nobles and officials swear to do what they had promised.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I shook out the folds of my robe and said, “If you fail to keep your promise, may God shake you like this from your homes and from your property!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole assembly responded, “Amen,” and they praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . And the people did as they had promised.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For the entire twelve years that I was governor of Judah—from the twentieth year to the thirty-second year of the reign of King Artaxerxes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'That is, 445–433 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: '—neither I nor my officials drew on our official food allowance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The former governors, in contrast, had laid heavy burdens on the people, demanding a daily ration of food and wine, besides forty pieces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '40 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1 pound or 456 grams].'
      marker-yv: yv-n
    - type: text
      text: ' of silver. Even their assistants took advantage of the people. But because I feared God, I did not act that way.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I also devoted myself to working on the wall and refused to acquire any land. And I required all my servants to spend time working on the wall. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I asked for nothing, even though I regularly fed 150 Jewish officials at my table, besides all the visitors from other lands! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The provisions I paid for each day included one ox, six choice sheep or goats, and a large number of poultry. And every ten days we needed a large supply of all kinds of wine. Yet I refused to claim the governor’s food allowance because the people already carried a heavy burden.
  '19':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Remember, O my God, all that I have done for these people, and bless me for it.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: They were saying, “We have such large families. We need more food to survive.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Others said, “We have mortgaged our fields, vineyards, and homes to get food during the famine.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And others said, “We have had to borrow money on our fields and vineyards to pay our taxes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: We belong to the same family as those who are wealthy, and our children are just like theirs. Yet we must sell our children into slavery just to get enough money to live. We have already sold some of our daughters, and we are helpless to do anything about it, for our fields and vineyards are already mortgaged to others.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When I heard their complaints, I was very angry. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: After thinking it over, I spoke out against these nobles and officials. I told them, “You are hurting your own relatives by charging interest when they borrow money!” Then I called a public meeting to deal with the problem.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: At the meeting I said to them, “We are doing all we can to redeem our Jewish relatives who have had to sell themselves to pagan foreigners, but you are selling them back into slavery again. How often must we redeem them?” And they had nothing to say in their defense.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I pressed further, “What you are doing is not right! Should you not walk in the fear of our God in order to avoid being mocked by enemy nations? '
