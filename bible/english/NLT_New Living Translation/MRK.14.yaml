document_id: MRK.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Anointed at Bethany
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'It was now two days before Passover and the Festival of Unleavened Bread. The leading priests and the teachers of religious law were still looking for an opportunity to capture Jesus secretly and kill him. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Judas Iscariot, one of the twelve disciples, went to the leading priests to arrange to betray Jesus to them. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They were delighted when they heard why he had come, and they promised to give him money. So he began looking for an opportunity to betray Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Last Supper
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: On the first day of the Festival of Unleavened Bread, when the Passover lamb is sacrificed, Jesus’ disciples asked him, “Where do you want us to go to prepare the Passover meal for you?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus sent two of them into Jerusalem with these instructions: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “As you go into the city, a man carrying a pitcher of water will meet you. Follow him.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'At the house he enters, say to the owner, ‘The Teacher asks: Where is the guest room where I can eat the Passover meal with my disciples?’'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will take you upstairs to a large room that is already set up. That is where you should prepare our meal.”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the two disciples went into the city and found everything just as Jesus had said, and they prepared the Passover meal there.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the evening Jesus arrived with the Twelve. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As they were at the table
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: As they reclined.
      marker-yv: yv-n
    - type: text
      text: ' eating, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, one of you eating with me here will betray me.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greatly distressed, each one asked in turn, “Am I the one?”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “But not during the Passover celebration,” they agreed, “or the people may riot.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is one of you twelve who is eating from this bowl with me.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: must die, as the Scriptures declared long ago. But how terrible it will be for the one who betrays him. It would be far better for that man if he had never been born!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were eating, Jesus took some bread and blessed it. Then he broke it in pieces and gave it to the disciples, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take it, for this is my body.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took a cup of wine and gave thanks to God for it. He gave it to them, and they all drank from it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This is my blood, which confirms the covenant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the new covenant.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: between God and his people. It is poured out as a sacrifice for many.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you the truth, I will not drink wine again until the day I drink it new in the Kingdom of God.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they sang a hymn and went out to the Mount of Olives.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts Peter’s Denial
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On the way, Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “All of you will desert me. For the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘God will strike
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I will strike. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zech 13:7.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Shepherd,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the sheep will be scattered.’
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But after I am raised from the dead, I will go ahead of you to Galilee and meet you there.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter said to him, “Even if everyone else deserts you, I never will.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Jesus was in Bethany at the home of Simon, a man who had previously had leprosy. While he was eating,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: reclining.
      marker-yv: yv-n
    - type: text
      text: ' a woman came in with a beautiful alabaster jar of expensive perfume made from essence of nard. She broke open the jar and poured the perfume over his head.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, Peter—this very night, before the rooster crows twice, you will deny three times that you even know me.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No!” Peter declared emphatically. “Even if I have to die with you, I will never deny you!” And all the others vowed the same.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays in Gethsemane
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They went to the olive grove called Gethsemane, and Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Sit here while I go and pray.”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He took Peter, James, and John with him, and he became deeply troubled and distressed. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My soul is crushed with grief to the point of death. Stay here and keep watch with me.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went on a little farther and fell to the ground. He prayed that, if it were possible, the awful hour awaiting him might pass him by. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Abba, Father,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:36 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is an Aramaic term for “father.”
      marker-yv: yv-n
    - type: text
      text: ' he cried out, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “everything is possible for you. Please take this cup of suffering away from me. Yet I want your will to be done, not mine.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he returned and found the disciples asleep. He said to Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Simon, are you asleep? Couldn’t you watch with me even one hour?
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Keep watch and pray, so that you will not give in to temptation. For the spirit is willing, but the body is weak.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus left them again and prayed the same prayer as before. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of those at the table were indignant. “Why waste such expensive perfume?” they asked. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he returned to them again, he found them sleeping, for they couldn’t keep their eyes open. And they didn’t know what to say.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he returned to them the third time, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go ahead and sleep. Have your rest. But no—the time has come. The Son of Man is betrayed into the hands of sinners.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Up, let’s be going. Look, my betrayer is here!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Betrayed and Arrested
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And immediately, even as Jesus said this, Judas, one of the twelve disciples, arrived with a crowd of men armed with swords and clubs. They had been sent by the leading priests, the teachers of religious law, and the elders. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The traitor, Judas, had given them a prearranged signal: “You will know which one to arrest when I greet him with a kiss. Then you can take him away under guard.” '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As soon as they arrived, Judas walked up to Jesus. “Rabbi!” he exclaimed, and gave him the kiss.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the others grabbed Jesus and arrested him. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But one of the men with Jesus pulled out his sword and struck the high priest’s slave, slashing off his ear.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Am I some dangerous revolutionary, that you come with swords and clubs to arrest me?
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why didn’t you arrest me in the Temple? I was there among you teaching every day. But these things are happening to fulfill what the Scriptures say about me.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It could have been sold for a year’s wages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'for 300 denarii. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' and the money given to the poor!” So they scolded her harshly.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all his disciples deserted him and ran away. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One young man following behind was clothed only in a long linen shirt. When the mob tried to grab him, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he slipped out of his shirt and ran away naked.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus before the Council
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They took Jesus to the high priest’s home where the leading priests, the elders, and the teachers of religious law had gathered. '
  '54':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Meanwhile, Peter followed him at a distance and went right into the high priest’s courtyard. There he sat with the guards, warming himself by the fire.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inside, the leading priests and the entire high council
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sanhedrin.
      marker-yv: yv-n
    - type: text
      text: ' were trying to find evidence against Jesus, so they could put him to death. But they couldn’t find any. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many false witnesses spoke against him, but they contradicted each other. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, some men stood up and gave this false testimony: '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We heard him say, ‘I will destroy this Temple made with human hands, and in three days I will build another, made without human hands.’” '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But even then they didn’t get their stories straight!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Leave her alone. Why criticize her for doing such a good thing to me?
    - type: text
      text: ' '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the high priest stood up before the others and asked Jesus, “Well, aren’t you going to answer these charges? What do you have to say for yourself?” '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus was silent and made no reply. Then the high priest asked him, “Are you the Messiah, the Son of the Blessed One?”
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: .
    - type: usfm
      marker: f
      children:
