          text: '14:62a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I Am
        - type: text
          text: '’ is here; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you will see the Son of Man seated in the place of power at God’s right hand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:62b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seated at the right hand of the power. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Ps 110:1.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and coming on the clouds of heaven.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:62c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Dan 7:13.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the high priest tore his clothing to show his horror and said, “Why do we need other witnesses? '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have all heard his blasphemy. What is your verdict?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Guilty!” they all cried. “He deserves to die!”
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then some of them began to spit at him, and they blindfolded him and beat him with their fists. “Prophesy to us,” they jeered. And the guards slapped him as they took him away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Denies Jesus
    marker-yv: yv-h
  '66':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, Peter was in the courtyard below. One of the servant girls who worked for the high priest came by '
  '67':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and noticed Peter warming himself at the fire. She looked at him closely and said, “You were one of those with Jesus of Nazareth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:67 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus the Nazarene.
      marker-yv: yv-n
    - type: text
      text: ”
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Peter denied it. “I don’t know what you’re talking about,” he said, and he went out into the entryway. Just then, a rooster crowed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:68 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Just then, a rooster crowed.
      marker-yv: yv-n
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the servant girl saw him standing there, she began telling the others, “This man is definitely one of them!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
