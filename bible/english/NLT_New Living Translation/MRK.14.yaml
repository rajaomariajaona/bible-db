document_id: MRK.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Anointed at Bethany
  - type: text
    content: 'It was now two days before Passover and the Festival of Unleavened Bread. The leading priests and the teachers of religious law were still looking for an opportunity to capture Jesus secretly and kill him. '
  '10':
  - type: text
    content: 'Then Judas Iscariot, one of the twelve disciples, went to the leading priests to arrange to betray Jesus to them. '
  '11':
  - type: text
    content: They were delighted when they heard why he had come, and they promised to give him money. So he began looking for an opportunity to betray Jesus.
  - type: heading
    content: The Last Supper
  '12':
  - type: text
    content: On the first day of the Festival of Unleavened Bread, when the Passover lamb is sacrificed, Jesus’ disciples asked him, “Where do you want us to go to prepare the Passover meal for you?”
  '13':
  - type: text
    content: 'So Jesus sent two of them into Jerusalem with these instructions: '
  - type: text
    content: “As you go into the city, a man carrying a pitcher of water will meet you. Follow him.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'At the house he enters, say to the owner, ‘The Teacher asks: Where is the guest room where I can eat the Passover meal with my disciples?’'
  - type: text
    content: ' '
  '15':
  - type: text
    content: He will take you upstairs to a large room that is already set up. That is where you should prepare our meal.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: So the two disciples went into the city and found everything just as Jesus had said, and they prepared the Passover meal there.
  '17':
  - type: text
    content: 'In the evening Jesus arrived with the Twelve. '
  '18':
  - type: text
    content: As they were at the table
  - type: note
    content: Or As they reclined.
  - type: text
    content: ' eating, Jesus said, '
  - type: text
    content: “I tell you the truth, one of you eating with me here will betray me.”
  '19':
  - type: text
    content: Greatly distressed, each one asked in turn, “Am I the one?”
  '2':
  - type: text
    content: “But not during the Passover celebration,” they agreed, “or the people may riot.”
  '20':
  - type: text
    content: 'He replied, '
  - type: text
    content: “It is one of you twelve who is eating from this bowl with me.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: must die, as the Scriptures declared long ago. But how terrible it will be for the one who betrays him. It would be far better for that man if he had never been born!”
  '22':
  - type: text
    content: 'As they were eating, Jesus took some bread and blessed it. Then he broke it in pieces and gave it to the disciples, saying, '
  - type: text
    content: “Take it, for this is my body.”
  '23':
  - type: text
    content: 'And he took a cup of wine and gave thanks to God for it. He gave it to them, and they all drank from it. '
  '24':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “This is my blood, which confirms the covenant
  - type: note
    content: Some manuscripts read the new covenant.
  - type: text
    content: ' '
  - type: text
    content: between God and his people. It is poured out as a sacrifice for many.
  - type: text
    content: ' '
  '25':
  - type: text
    content: I tell you the truth, I will not drink wine again until the day I drink it new in the Kingdom of God.”
  '26':
  - type: text
    content: Then they sang a hymn and went out to the Mount of Olives.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '27':
  - type: text
    content: 'On the way, Jesus told them, '
  - type: text
    content: “All of you will desert me. For the Scriptures say,
  - type: text
    content: ‘God will strike
  - type: text
    content: ' '
  - type: note
    content: Greek I will strike. Zech 13:7.
  - type: text
    content: the Shepherd,
  - type: text
    content: and the sheep will be scattered.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: But after I am raised from the dead, I will go ahead of you to Galilee and meet you there.”
  '29':
  - type: text
    content: Peter said to him, “Even if everyone else deserts you, I never will.”
  '3':
  - type: text
    content: Meanwhile, Jesus was in Bethany at the home of Simon, a man who had previously had leprosy. While he was eating,
  - type: note
    content: Or reclining.
  - type: text
    content: ' a woman came in with a beautiful alabaster jar of expensive perfume made from essence of nard. She broke open the jar and poured the perfume over his head.'
  '30':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I tell you the truth, Peter—this very night, before the rooster crows twice, you will deny three times that you even know me.”
  '31':
  - type: text
    content: “No!” Peter declared emphatically. “Even if I have to die with you, I will never deny you!” And all the others vowed the same.
  - type: heading
    content: Jesus Prays in Gethsemane
  '32':
  - type: text
    content: 'They went to the olive grove called Gethsemane, and Jesus said, '
  - type: text
    content: “Sit here while I go and pray.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'He took Peter, James, and John with him, and he became deeply troubled and distressed. '
  '34':
  - type: text
    content: 'He told them, '
  - type: text
    content: “My soul is crushed with grief to the point of death. Stay here and keep watch with me.”
  '35':
  - type: text
    content: 'He went on a little farther and fell to the ground. He prayed that, if it were possible, the awful hour awaiting him might pass him by. '
  '36':
  - type: text
    content: “Abba, Father,”
  - type: note
    content: Abba is an Aramaic term for “father.”
  - type: text
    content: ' he cried out, '
  - type: text
    content: “everything is possible for you. Please take this cup of suffering away from me. Yet I want your will to be done, not mine.”
  '37':
  - type: text
    content: 'Then he returned and found the disciples asleep. He said to Peter, '
  - type: text
    content: “Simon, are you asleep? Couldn’t you watch with me even one hour?
  - type: text
    content: ' '
  '38':
  - type: text
    content: Keep watch and pray, so that you will not give in to temptation. For the spirit is willing, but the body is weak.”
  '39':
  - type: text
    content: 'Then Jesus left them again and prayed the same prayer as before. '
  '4':
  - type: text
    content: 'Some of those at the table were indignant. “Why waste such expensive perfume?” they asked. '
  '40':
  - type: text
    content: When he returned to them again, he found them sleeping, for they couldn’t keep their eyes open. And they didn’t know what to say.
  '41':
  - type: text
    content: 'When he returned to them the third time, he said, '
  - type: text
    content: “Go ahead and sleep. Have your rest. But no—the time has come. The Son of Man is betrayed into the hands of sinners.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Up, let’s be going. Look, my betrayer is here!”
  - type: heading
    content: Jesus Is Betrayed and Arrested
  '43':
  - type: text
    content: 'And immediately, even as Jesus said this, Judas, one of the twelve disciples, arrived with a crowd of men armed with swords and clubs. They had been sent by the leading priests, the teachers of religious law, and the elders. '
  '44':
  - type: text
    content: 'The traitor, Judas, had given them a prearranged signal: “You will know which one to arrest when I greet him with a kiss. Then you can take him away under guard.” '
  '45':
  - type: text
    content: As soon as they arrived, Judas walked up to Jesus. “Rabbi!” he exclaimed, and gave him the kiss.
  '46':
  - type: text
    content: 'Then the others grabbed Jesus and arrested him. '
  '47':
  - type: text
    content: But one of the men with Jesus pulled out his sword and struck the high priest’s slave, slashing off his ear.
  '48':
  - type: text
    content: 'Jesus asked them, '
  - type: text
    content: “Am I some dangerous revolutionary, that you come with swords and clubs to arrest me?
  - type: text
    content: ' '
  '49':
  - type: text
    content: Why didn’t you arrest me in the Temple? I was there among you teaching every day. But these things are happening to fulfill what the Scriptures say about me.”
  '5':
  - type: text
    content: “It could have been sold for a year’s wages
  - type: note
    content: Greek for 300 denarii. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' and the money given to the poor!” So they scolded her harshly.'
  '50':
  - type: text
    content: 'Then all his disciples deserted him and ran away. '
  '51':
  - type: text
    content: 'One young man following behind was clothed only in a long linen shirt. When the mob tried to grab him, '
  '52':
  - type: text
    content: he slipped out of his shirt and ran away naked.
  - type: heading
    content: Jesus before the Council
  '53':
  - type: text
    content: 'They took Jesus to the high priest’s home where the leading priests, the elders, and the teachers of religious law had gathered. '
  '54':
  - type: text
    content: Meanwhile, Peter followed him at a distance and went right into the high priest’s courtyard. There he sat with the guards, warming himself by the fire.
  '55':
  - type: text
    content: Inside, the leading priests and the entire high council
  - type: note
    content: Greek the Sanhedrin.
  - type: text
    content: ' were trying to find evidence against Jesus, so they could put him to death. But they couldn’t find any. '
  '56':
  - type: text
    content: 'Many false witnesses spoke against him, but they contradicted each other. '
  '57':
  - type: text
    content: 'Finally, some men stood up and gave this false testimony: '
  '58':
  - type: text
    content: '“We heard him say, ‘I will destroy this Temple made with human hands, and in three days I will build another, made without human hands.’” '
  '59':
  - type: text
    content: But even then they didn’t get their stories straight!
  '6':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “Leave her alone. Why criticize her for doing such a good thing to me?
  - type: text
    content: ' '
  '60':
  - type: text
    content: 'Then the high priest stood up before the others and asked Jesus, “Well, aren’t you going to answer these charges? What do you have to say for yourself?” '
  '61':
  - type: text
    content: But Jesus was silent and made no reply. Then the high priest asked him, “Are you the Messiah, the Son of the Blessed One?”
  '62':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “
  - type: text
    content: I Am
  - type: text
    content: .
  - type: note
    content: Or The ‘I Am’ is here; or I am the Lord. See Exod 3:14.
  - type: text
    content: ' '
  - type: text
    content: And you will see the Son of Man seated in the place of power at God’s right hand
  - type: note
    content: Greek seated at the right hand of the power. See Ps 110:1.
  - type: text
    content: ' '
  - type: text
    content: and coming on the clouds of heaven.
  - type: note
    content: See Dan 7:13.
  - type: text
    content: ”
  '63':
  - type: text
    content: 'Then the high priest tore his clothing to show his horror and said, “Why do we need other witnesses? '
  '64':
  - type: text
    content: You have all heard his blasphemy. What is your verdict?”
  - type: text
    content: “Guilty!” they all cried. “He deserves to die!”
  '65':
  - type: text
    content: Then some of them began to spit at him, and they blindfolded him and beat him with their fists. “Prophesy to us,” they jeered. And the guards slapped him as they took him away.
  - type: heading
    content: Peter Denies Jesus
  '66':
  - type: text
    content: 'Meanwhile, Peter was in the courtyard below. One of the servant girls who worked for the high priest came by '
  '67':
  - type: text
    content: and noticed Peter warming himself at the fire. She looked at him closely and said, “You were one of those with Jesus of Nazareth.
  - type: note
    content: Or Jesus the Nazarene.
  - type: text
    content: ”
  '68':
  - type: text
    content: But Peter denied it. “I don’t know what you’re talking about,” he said, and he went out into the entryway. Just then, a rooster crowed.
  - type: note
    content: Some manuscripts do not include Just then, a rooster crowed.
  '69':
  - type: text
    content: 'When the servant girl saw him standing there, she began telling the others, “This man is definitely one of them!” '
  '7':
  - type: text
    content: You will always have the poor among you, and you can help them whenever you want to. But you will not always have me.
  - type: text
    content: ' '
  '70':
  - type: text
    content: But Peter denied it again.
  - type: text
    content: A little later some of the other bystanders confronted Peter and said, “You must be one of them, because you are a Galilean.”
  '71':
  - type: text
    content: 'Peter swore, “A curse on me if I’m lying—I don’t know this man you’re talking about!” '
  '72':
  - type: text
    content: And immediately the rooster crowed the second time.
  - type: text
    content: 'Suddenly, Jesus’ words flashed through Peter’s mind: '
  - type: text
    content: “Before the rooster crows twice, you will deny three times that you even know me.”
  - type: text
    content: ' And he broke down and wept.'
  '8':
  - type: text
    content: She has done what she could and has anointed my body for burial ahead of time.
  - type: text
    content: ' '
  '9':
  - type: text
    content: I tell you the truth, wherever the Good News is preached throughout the world, this woman’s deed will be remembered and discussed.”
  - type: heading
    content: Judas Agrees to Betray Jesus
