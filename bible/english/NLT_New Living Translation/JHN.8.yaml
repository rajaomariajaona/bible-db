document_id: JHN.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Woman Caught in Adultery
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus returned to the Mount of Olives, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus stood up again and said to the woman, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where are your accusers? Didn’t even one of them condemn you?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, Lord,” she said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Neither do I. Go and sin no more.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '----------'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, the Light of the World
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus spoke to the people once more and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the light of the world. If you follow me, you won’t have to walk in darkness, because you will have the light that leads to life.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Pharisees replied, “You are making those claims about yourself! Such testimony is not valid.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “These claims are valid even though I make them about myself. For I know where I came from and where I am going, but you don’t know this about me.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You judge me by human standards, but I do not judge anyone.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if I did, my judgment would be correct in every respect because I am not alone. The Father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The One.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who sent me is with me.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your own law says that if two people agree about something, their witness is accepted as fact.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut 19:15.
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am one witness, and my Father who sent me is the other.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Where is your father?” they asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Since you don’t know who I am, you don’t know who my Father is. If you knew me, you would also know my Father.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but early the next morning he was back again at the Temple. A crowd soon gathered, and he sat down and taught them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus made these statements while he was teaching in the section of the Temple known as the Treasury. But he was not arrested, because his time
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his hour.
      marker-yv: yv-n
    - type: text
      text: ' had not yet come.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Unbelieving People Warned
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Later Jesus said to them again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am going away. You will search for me but will die in your sin. You cannot come where I am going.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jewish people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:31, 48, 52, 57.
      marker-yv: yv-n
    - type: text
      text: ' asked, “Is he planning to commit suicide? What does he mean, ‘You cannot come where I am going’?”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are from below; I am from above. You belong to this world; I do not.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'That is why I said that you will die in your sins; for unless you believe that '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: ' who I claim to be,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'unless you believe that I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you will die in your sins.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Who are you?” they demanded.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The one I have always claimed to be.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Why do I speak to you at all?
      marker-yv: yv-n
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have much to say about you and much to condemn, but I won’t. For I say only what I have heard from the one who sent me, and he is completely truthful.”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they still didn’t understand that he was talking about his Father.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“When you have lifted up the Son of Man on the cross, then you will understand that '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: ' he.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'When you have lifted up the Son of Man, then you will know that I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I do nothing on my own but say only what the Father taught me.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the one who sent me is with me—he has not deserted me. For I always do what pleases him.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As he was speaking, the teachers of religious law and the Pharisees brought a woman who had been caught in the act of adultery. They put her in front of the crowd.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then many who heard him say these things believed in him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and Abraham
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus said to the people who believed in him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are truly my disciples if you remain faithful to my teachings.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you will know the truth, and the truth will set you free.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But we are descendants of Abraham,” they said. “We have never been slaves to anyone. What do you mean, ‘You will be set free’?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, everyone who sins is a slave of sin.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A slave is not a permanent member of the family, but a son is part of the family forever.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if the Son sets you free, you are truly free.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, I realize that you are descendants of Abraham. And yet some of you are trying to kill me because there’s no room in your hearts for my message.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am telling you what I saw when I was with my Father. But you are following the advice of your father.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Our father is Abraham!” they declared.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“No,” '
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “for if you were really the children of Abraham, you would follow his example.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: if you are really the children of Abraham, follow his example.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Teacher,” they said to Jesus, “this woman was caught in the act of adultery. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Instead, you are trying to kill me because I told you the truth, which I heard from God. Abraham never did such a thing.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: No, you are imitating your real father.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “We aren’t illegitimate children! God himself is our true Father.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If God were your Father, you would love me, because I have come to you from God. I am not here on my own, but he sent me.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why can’t you understand what I am saying? It’s because you can’t even hear me!
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you are the children of your father the devil, and you love to do the evil things he does. He was a murderer from the beginning. He has always hated the truth, because there is no truth in him. When he lies, it is consistent with his character; for he is a liar and the father of lies.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So when I tell the truth, you just naturally don’t believe me!
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which of you can truthfully accuse me of sin? And since I am telling you the truth, why don’t you believe me?
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who belongs to God listens gladly to the words of God. But you don’t listen because you don’t belong to God.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people retorted, “You Samaritan devil! Didn’t we say all along that you were possessed by a demon?”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“No,” '
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have no demon in me. For I honor my Father—and you dishonor me.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The law of Moses says to stone her. What do you say?”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And though I have no wish to glorify myself, God is going to glorify me. He is the true judge.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you the truth, anyone who obeys my teaching will never die!”
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people said, “Now we know you are possessed by a demon. Even Abraham and the prophets died, but you say, ‘Anyone who obeys my teaching will never die!’ '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Are you greater than our father Abraham? He died, and so did the prophets. Who do you think you are?”
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I want glory for myself, it doesn’t count. But it is my Father who will glorify me. You say, ‘He is our God,’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: You say he is your God.
      marker-yv: yv-n
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but you don’t even know him. I know him. If I said otherwise, I would be as great a liar as you! But I do know him and obey him.
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your father Abraham rejoiced as he looked forward to my coming. He saw it and was glad.”
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people said, “You aren’t even fifty years old. How can you say you have seen Abraham?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:57 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: How can you say Abraham has seen you?
      marker-yv: yv-n
    - type: text
      text: ”
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I tell you the truth, before Abraham was even born, '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: '!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:58 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'before Abraham was even born, I have always been alive; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'before Abraham was, I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that point they picked up stones to throw at him. But Jesus was hidden from them and left the Temple.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were trying to trap him into saying something they could use against him, but Jesus stooped down and wrote in the dust with his finger. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They kept demanding an answer, so he stood up again and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “All right, but let the one who has never sinned throw the first stone!”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he stooped down again and wrote in the dust.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the accusers heard this, they slipped away one by one, beginning with the oldest, until only Jesus was left in the middle of the crowd with the woman. '
