document_id: JHN.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Woman Caught in Adultery
  - type: text
    content: 'Jesus returned to the Mount of Olives, '
  '10':
  - type: text
    content: 'Then Jesus stood up again and said to the woman, '
  - type: text
    content: “Where are your accusers? Didn’t even one of them condemn you?”
  '11':
  - type: text
    content: “No, Lord,” she said.
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: “Neither do I. Go and sin no more.”
  - type: text
    content: '----------'
  - type: heading
    content: Jesus, the Light of the World
  '12':
  - type: text
    content: 'Jesus spoke to the people once more and said, '
  - type: text
    content: “I am the light of the world. If you follow me, you won’t have to walk in darkness, because you will have the light that leads to life.”
  '13':
  - type: text
    content: The Pharisees replied, “You are making those claims about yourself! Such testimony is not valid.”
  '14':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “These claims are valid even though I make them about myself. For I know where I came from and where I am going, but you don’t know this about me.
  - type: text
    content: ' '
  '15':
  - type: text
    content: You judge me by human standards, but I do not judge anyone.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And if I did, my judgment would be correct in every respect because I am not alone. The Father
  - type: note
    content: Some manuscripts read The One.
  - type: text
    content: ' '
  - type: text
    content: who sent me is with me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Your own law says that if two people agree about something, their witness is accepted as fact.
  - type: note
    content: See Deut 19:15.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am one witness, and my Father who sent me is the other.”
  '19':
  - type: text
    content: “Where is your father?” they asked.
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Since you don’t know who I am, you don’t know who my Father is. If you knew me, you would also know my Father.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'but early the next morning he was back again at the Temple. A crowd soon gathered, and he sat down and taught them. '
  '20':
  - type: text
    content: Jesus made these statements while he was teaching in the section of the Temple known as the Treasury. But he was not arrested, because his time
  - type: note
    content: Greek his hour.
  - type: text
    content: ' had not yet come.'
  - type: heading
    content: The Unbelieving People Warned
  '21':
  - type: text
    content: 'Later Jesus said to them again, '
  - type: text
    content: “I am going away. You will search for me but will die in your sin. You cannot come where I am going.”
  '22':
  - type: text
    content: The people
  - type: note
    content: Greek Jewish people; also in 8:31, 48, 52, 57.
  - type: text
    content: ' asked, “Is he planning to commit suicide? What does he mean, ‘You cannot come where I am going’?”'
  '23':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: “You are from below; I am from above. You belong to this world; I do not.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'That is why I said that you will die in your sins; for unless you believe that '
  - type: text
    content: I Am
  - type: text
    content: ' who I claim to be,'
  - type: note
    content: Greek unless you believe that I am. See Exod 3:14.
  - type: text
    content: ' '
  - type: text
    content: you will die in your sins.”
  '25':
  - type: text
    content: “Who are you?” they demanded.
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The one I have always claimed to be.
  - type: note
    content: Or Why do I speak to you at all?
  - type: text
    content: ' '
  '26':
  - type: text
    content: I have much to say about you and much to condemn, but I won’t. For I say only what I have heard from the one who sent me, and he is completely truthful.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: But they still didn’t understand that he was talking about his Father.
  '28':
  - type: text
    content: 'So Jesus said, '
  - type: text
    content: '“When you have lifted up the Son of Man on the cross, then you will understand that '
  - type: text
    content: I Am
  - type: text
    content: ' he.'
  - type: note
    content: Greek When you have lifted up the Son of Man, then you will know that I am. “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: I do nothing on my own but say only what the Father taught me.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And the one who sent me is with me—he has not deserted me. For I always do what pleases him.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: As he was speaking, the teachers of religious law and the Pharisees brought a woman who had been caught in the act of adultery. They put her in front of the crowd.
  '30':
  - type: text
    content: Then many who heard him say these things believed in him.
  - type: heading
    content: Jesus and Abraham
  '31':
  - type: text
    content: 'Jesus said to the people who believed in him, '
  - type: text
    content: “You are truly my disciples if you remain faithful to my teachings.
  - type: text
    content: ' '
  '32':
  - type: text
    content: And you will know the truth, and the truth will set you free.”
  '33':
  - type: text
    content: “But we are descendants of Abraham,” they said. “We have never been slaves to anyone. What do you mean, ‘You will be set free’?”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I tell you the truth, everyone who sins is a slave of sin.
  - type: text
    content: ' '
  '35':
  - type: text
    content: A slave is not a permanent member of the family, but a son is part of the family forever.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So if the Son sets you free, you are truly free.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Yes, I realize that you are descendants of Abraham. And yet some of you are trying to kill me because there’s no room in your hearts for my message.
  - type: text
    content: ' '
  '38':
  - type: text
    content: I am telling you what I saw when I was with my Father. But you are following the advice of your father.”
  '39':
  - type: text
    content: “Our father is Abraham!” they declared.
  - type: text
    content: '“No,” '
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “for if you were really the children of Abraham, you would follow his example.
  - type: note
    content: Some manuscripts read if you are really the children of Abraham, follow his example.
  - type: text
    content: ' '
  '4':
  - type: text
    content: '“Teacher,” they said to Jesus, “this woman was caught in the act of adultery. '
  '40':
  - type: text
    content: Instead, you are trying to kill me because I told you the truth, which I heard from God. Abraham never did such a thing.
  - type: text
    content: ' '
  '41':
  - type: text
    content: No, you are imitating your real father.”
  - type: text
    content: They replied, “We aren’t illegitimate children! God himself is our true Father.”
  '42':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “If God were your Father, you would love me, because I have come to you from God. I am not here on my own, but he sent me.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Why can’t you understand what I am saying? It’s because you can’t even hear me!
  - type: text
    content: ' '
  '44':
  - type: text
    content: For you are the children of your father the devil, and you love to do the evil things he does. He was a murderer from the beginning. He has always hated the truth, because there is no truth in him. When he lies, it is consistent with his character; for he is a liar and the father of lies.
  - type: text
    content: ' '
  '45':
  - type: text
    content: So when I tell the truth, you just naturally don’t believe me!
  - type: text
    content: ' '
  '46':
  - type: text
    content: Which of you can truthfully accuse me of sin? And since I am telling you the truth, why don’t you believe me?
  - type: text
    content: ' '
  '47':
  - type: text
    content: Anyone who belongs to God listens gladly to the words of God. But you don’t listen because you don’t belong to God.”
  '48':
  - type: text
    content: The people retorted, “You Samaritan devil! Didn’t we say all along that you were possessed by a demon?”
  '49':
  - type: text
    content: ' '
  - type: text
    content: '“No,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I have no demon in me. For I honor my Father—and you dishonor me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: The law of Moses says to stone her. What do you say?”
  '50':
  - type: text
    content: And though I have no wish to glorify myself, God is going to glorify me. He is the true judge.
  - type: text
    content: ' '
  '51':
  - type: text
    content: I tell you the truth, anyone who obeys my teaching will never die!”
  '52':
  - type: text
    content: 'The people said, “Now we know you are possessed by a demon. Even Abraham and the prophets died, but you say, ‘Anyone who obeys my teaching will never die!’ '
  '53':
  - type: text
    content: Are you greater than our father Abraham? He died, and so did the prophets. Who do you think you are?”
  '54':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “If I want glory for myself, it doesn’t count. But it is my Father who will glorify me. You say, ‘He is our God,’
  - type: note
    content: Some manuscripts read You say he is your God.
  - type: text
    content: ' '
  '55':
  - type: text
    content: but you don’t even know him. I know him. If I said otherwise, I would be as great a liar as you! But I do know him and obey him.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Your father Abraham rejoiced as he looked forward to my coming. He saw it and was glad.”
  '57':
  - type: text
    content: The people said, “You aren’t even fifty years old. How can you say you have seen Abraham?
  - type: note
    content: Some manuscripts read How can you say Abraham has seen you?
  - type: text
    content: ”
  '58':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I tell you the truth, before Abraham was even born, '
  - type: text
    content: I Am
  - type: text
    content: '!'
  - type: note
    content: Or before Abraham was even born, I have always been alive; Greek reads before Abraham was, I am. See Exod 3:14.
  - type: text
    content: ”
  - type: text
    content: ' '
  '59':
  - type: text
    content: At that point they picked up stones to throw at him. But Jesus was hidden from them and left the Temple.
  '6':
  - type: text
    content: 'They were trying to trap him into saying something they could use against him, but Jesus stooped down and wrote in the dust with his finger. '
  '7':
  - type: text
    content: 'They kept demanding an answer, so he stood up again and said, '
  - type: text
    content: “All right, but let the one who has never sinned throw the first stone!”
  - type: text
    content: ' '
  '8':
  - type: text
    content: Then he stooped down again and wrote in the dust.
  '9':
  - type: text
    content: 'When the accusers heard this, they slipped away one by one, beginning with the oldest, until only Jesus was left in the middle of the crowd with the woman. '
