document_id: JHN.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wedding at Cana
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The next day
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the third day; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 1:35, 43.
      marker-yv: yv-n
    - type: text
      text: ' there was a wedding celebration in the village of Cana in Galilee. Jesus’ mother was there, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “A host always serves the best wine first,” he said. “Then, when everyone has had a lot to drink, he brings out the less expensive wine. But you have kept the best until now!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: This miraculous sign at Cana in Galilee was the first time Jesus revealed his glory. And his disciples believed in him.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: After the wedding he went to Capernaum for a few days with his mother, his brothers, and his disciples.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Clears the Temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'It was nearly time for the Jewish Passover celebration, so Jesus went to Jerusalem. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'In the Temple area he saw merchants selling cattle, sheep, and doves for sacrifices; he also saw dealers at tables exchanging foreign money. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jesus made a whip from some ropes and chased them all out of the Temple. He drove out the sheep and cattle, scattered the money changers’ coins over the floor, and turned over their tables. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then, going over to the people who sold doves, he told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get these things out of here. Stop turning my Father’s house into a marketplace!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then his disciples remembered this prophecy from the Scriptures: “Passion for God’s house will consume me.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '“Concern for God’s house will be my undoing.” '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 69:9.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But the Jewish leaders demanded, “What are you doing? If God gave you authority to do this, show us a miraculous sign to prove it.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“All right,” '
    - type: text
      text: 'Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Destroy this temple, and in three days I will raise it up.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and Jesus and his disciples were also invited to the celebration. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“What!” they exclaimed. “It has taken forty-six years to build this Temple, and you can rebuild it in three days?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But when Jesus said “this temple,” he meant his own body. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: After he was raised from the dead, his disciples remembered he had said this, and they believed both the Scriptures and what Jesus had said.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and Nicodemus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Because of the miraculous signs Jesus did in Jerusalem at the Passover celebration, many began to trust in him. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But Jesus didn’t trust them, because he knew all about people. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: No one needed to tell him about human nature, for he knew what was in each person’s heart.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The wine supply ran out during the festivities, so Jesus’ mother told him, “They have no more wine.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Dear woman, that’s not our problem,” '
    - type: text
      text: 'Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My time has not yet come.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But his mother told the servants, “Do whatever he tells you.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Standing nearby were six stone water jars, used for Jewish ceremonial washing. Each could hold twenty to thirty gallons.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 or 3 measures '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[75 to 113 liters].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jesus told the servants, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Fill the jars with water.”
    - type: text
      text: ' When the jars had been filled, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now dip some out, and take it to the master of ceremonies.”
    - type: text
      text: ' So the servants followed his instructions.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When the master of ceremonies tasted the water that was now wine, not knowing where it had come from (though, of course, the servants knew), he called the bridegroom over. '
