document_id: JHN.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wedding at Cana
  - type: text
    content: The next day
  - type: note
    content: Greek On the third day; see 1:35, 43.
  - type: text
    content: ' there was a wedding celebration in the village of Cana in Galilee. Jesus’ mother was there, '
  '10':
  - type: text
    content: “A host always serves the best wine first,” he said. “Then, when everyone has had a lot to drink, he brings out the less expensive wine. But you have kept the best until now!”
  '11':
  - type: text
    content: This miraculous sign at Cana in Galilee was the first time Jesus revealed his glory. And his disciples believed in him.
  '12':
  - type: text
    content: After the wedding he went to Capernaum for a few days with his mother, his brothers, and his disciples.
  - type: heading
    content: Jesus Clears the Temple
  '13':
  - type: text
    content: 'It was nearly time for the Jewish Passover celebration, so Jesus went to Jerusalem. '
  '14':
  - type: text
    content: 'In the Temple area he saw merchants selling cattle, sheep, and doves for sacrifices; he also saw dealers at tables exchanging foreign money. '
  '15':
  - type: text
    content: 'Jesus made a whip from some ropes and chased them all out of the Temple. He drove out the sheep and cattle, scattered the money changers’ coins over the floor, and turned over their tables. '
  '16':
  - type: text
    content: 'Then, going over to the people who sold doves, he told them, '
  - type: text
    content: “Get these things out of here. Stop turning my Father’s house into a marketplace!”
  '17':
  - type: text
    content: 'Then his disciples remembered this prophecy from the Scriptures: “Passion for God’s house will consume me.”'
  - type: note
    content: Or “Concern for God’s house will be my undoing.” Ps 69:9.
  '18':
  - type: text
    content: But the Jewish leaders demanded, “What are you doing? If God gave you authority to do this, show us a miraculous sign to prove it.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: '“All right,” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “Destroy this temple, and in three days I will raise it up.”
  '2':
  - type: text
    content: 'and Jesus and his disciples were also invited to the celebration. '
  '20':
  - type: text
    content: '“What!” they exclaimed. “It has taken forty-six years to build this Temple, and you can rebuild it in three days?” '
  '21':
  - type: text
    content: 'But when Jesus said “this temple,” he meant his own body. '
  '22':
  - type: text
    content: After he was raised from the dead, his disciples remembered he had said this, and they believed both the Scriptures and what Jesus had said.
  - type: heading
    content: Jesus and Nicodemus
  '23':
  - type: text
    content: 'Because of the miraculous signs Jesus did in Jerusalem at the Passover celebration, many began to trust in him. '
  '24':
  - type: text
    content: 'But Jesus didn’t trust them, because he knew all about people. '
  '25':
  - type: text
    content: No one needed to tell him about human nature, for he knew what was in each person’s heart.
  '3':
  - type: text
    content: The wine supply ran out during the festivities, so Jesus’ mother told him, “They have no more wine.”
  '4':
  - type: text
    content: ' '
  - type: text
    content: '“Dear woman, that’s not our problem,” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “My time has not yet come.”
  '5':
  - type: text
    content: But his mother told the servants, “Do whatever he tells you.”
  '6':
  - type: text
    content: Standing nearby were six stone water jars, used for Jewish ceremonial washing. Each could hold twenty to thirty gallons.
  - type: note
    content: Greek 2 or 3 measures [75 to 113 liters].
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Jesus told the servants, '
  - type: text
    content: “Fill the jars with water.”
  - type: text
    content: ' When the jars had been filled, '
  '8':
  - type: text
    content: 'he said, '
  - type: text
    content: “Now dip some out, and take it to the master of ceremonies.”
  - type: text
    content: ' So the servants followed his instructions.'
  '9':
  - type: text
    content: 'When the master of ceremonies tasted the water that was now wine, not knowing where it had come from (though, of course, the servants knew), he called the bridegroom over. '
