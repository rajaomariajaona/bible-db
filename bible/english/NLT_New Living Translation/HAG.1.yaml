document_id: HAG.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Rebuild the Temple
  - type: text
    content: On August 29
  - type: note
    content: Hebrew On the first day of the sixth month, of the ancient Hebrew lunar calendar. A number of dates in Haggai can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This event occurred on August 29, 520 b.c.
  - type: text
    content: ' of the second year of King Darius’s reign, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave a message through the prophet Haggai to Zerubbabel son of Shealtiel, governor of Judah, and to Jeshua'
  - type: note
    content: Hebrew Joshua, a variant spelling of Jeshua; also in 1:12, 14.
  - type: text
    content: ' son of Jehozadak, the high priest.'
  '10':
  - type: text
    content: 'It’s because of you that the heavens withhold the dew and the earth produces no crops. '
  '11':
  - type: text
    content: I have called for a drought on your fields and hills—a drought to wither the grain and grapes and olive trees and all your other crops, a drought to starve you and your livestock and to ruin everything you have worked so hard to get.”
  - type: heading
    content: Obedience to God’s Call
  '12':
  - type: text
    content: 'Then Zerubbabel son of Shealtiel, and Jeshua son of Jehozadak, the high priest, and the whole remnant of God’s people began to obey the message from the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. When they heard the words of the prophet Haggai, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' their God had sent, the people feared the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Then Haggai, the '
  - type: text
    content: Lord
  - type: text
    content: '’s messenger, gave the people this message from the '
  - type: text
    content: Lord
  - type: text
    content: ': “I am with you, says the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sparked the enthusiasm of Zerubbabel son of Shealtiel, governor of Judah, and the enthusiasm of Jeshua son of Jehozadak, the high priest, and the enthusiasm of the whole remnant of God’s people. They began to work on the house of their God, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, '
  '15':
  - type: text
    content: on September 21
  - type: note
    content: Hebrew on the twenty-fourth day of the sixth month, of the ancient Hebrew lunar calendar. This event occurred on September 21, 520 b.c.; also see note on 1:1a.
  - type: text
    content: ' of the second year of King Darius’s reign.'
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: The people are saying, ‘The time has not yet come to rebuild the house of the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent this message through the prophet Haggai: '
  '4':
  - type: text
    content: '“Why are you living in luxurious houses while my house lies in ruins? '
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Look at what’s happening to you! '
  '6':
  - type: text
    content: You have planted much but harvest little. You eat but are not satisfied. You drink but are still thirsty. You put on clothes but cannot keep warm. Your wages disappear as though you were putting them in pockets filled with holes!
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Look at what’s happening to you! '
  '8':
  - type: text
    content: 'Now go up into the hills, bring down timber, and rebuild my house. Then I will take pleasure in it and be honored, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'You hoped for rich harvests, but they were poor. And when you brought your harvest home, I blew it away. Why? Because my house lies in ruins, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, while all of you are busy building your own fine houses. '
