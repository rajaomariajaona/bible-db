document_id: EXO.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Israelites in Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the names of the sons of Israel (that is, Jacob) who moved to Egypt with their father, each with his family: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reuben, Simeon, Levi, Judah, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issachar, Zebulun, Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan, Naphtali, Gad, and Asher. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In all, Jacob had seventy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and Greek version read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seventy-five; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see notes on Gen 46:27.
    marker-yv: yv-n
  - type: text
    text: ' descendants in Egypt, including Joseph, who was already there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In time, Joseph and all of his brothers died, ending that entire generation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But their descendants, the Israelites, had many children and grandchildren. In fact, they multiplied so greatly that they became extremely powerful and filled the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eventually, a new king came to power in Egypt who knew nothing about Joseph or what he had done. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He said to his people, “Look, the people of Israel now outnumber us and are stronger than we are. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: We must make a plan to keep them from growing even more. If we don’t, and if war breaks out, they will join our enemies and fight against us. Then they will escape from the country.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will take the country.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So the Egyptians made the Israelites their slaves. They appointed brutal slave drivers over them, hoping to wear them down with crushing labor. They forced them to build the cities of Pithom and Rameses as supply centers for the king. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the more the Egyptians oppressed them, the more the Israelites multiplied and spread, and the more alarmed the Egyptians became. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So the Egyptians worked the people of Israel without mercy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They made their lives bitter, forcing them to mix mortar and make bricks and do all the work in the fields. They were ruthless in all their demands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Pharaoh, the king of Egypt, gave this order to the Hebrew midwives, Shiphrah and Puah: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “When you help the Hebrew women as they give birth, watch as they deliver.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'look upon the two stones; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: perhaps the reference is to a birthstool.
    marker-yv: yv-n
  - type: text
    text: ' If the baby is a boy, kill him; if it is a girl, let her live.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But because the midwives feared God, they refused to obey the king’s orders. They allowed the boys to live, too.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So the king of Egypt called for the midwives. “Why have you done this?” he demanded. “Why have you allowed the boys to live?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “The Hebrew women are not like the Egyptian women,” the midwives replied. “They are more vigorous and have their babies so quickly that we cannot get there in time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So God was good to the midwives, and the Israelites continued to multiply, growing more and more powerful. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And because the midwives feared God, he gave them families of their own.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Pharaoh gave this order to all his people: “Throw every newborn Hebrew boy into the Nile River. But you may let the girls live.”'
