document_id: EXO.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Israelites in Egypt
  - type: text
    content: 'These are the names of the sons of Israel (that is, Jacob) who moved to Egypt with their father, each with his family: '
  '10':
  - type: text
    content: We must make a plan to keep them from growing even more. If we don’t, and if war breaks out, they will join our enemies and fight against us. Then they will escape from the country.
  - type: note
    content: Or will take the country.
  - type: text
    content: ”
  '11':
  - type: text
    content: 'So the Egyptians made the Israelites their slaves. They appointed brutal slave drivers over them, hoping to wear them down with crushing labor. They forced them to build the cities of Pithom and Rameses as supply centers for the king. '
  '12':
  - type: text
    content: 'But the more the Egyptians oppressed them, the more the Israelites multiplied and spread, and the more alarmed the Egyptians became. '
  '13':
  - type: text
    content: 'So the Egyptians worked the people of Israel without mercy. '
  '14':
  - type: text
    content: They made their lives bitter, forcing them to mix mortar and make bricks and do all the work in the fields. They were ruthless in all their demands.
  '15':
  - type: text
    content: 'Then Pharaoh, the king of Egypt, gave this order to the Hebrew midwives, Shiphrah and Puah: '
  '16':
  - type: text
    content: “When you help the Hebrew women as they give birth, watch as they deliver.
  - type: note
    content: Hebrew look upon the two stones; perhaps the reference is to a birthstool.
  - type: text
    content: ' If the baby is a boy, kill him; if it is a girl, let her live.” '
  '17':
  - type: text
    content: But because the midwives feared God, they refused to obey the king’s orders. They allowed the boys to live, too.
  '18':
  - type: text
    content: So the king of Egypt called for the midwives. “Why have you done this?” he demanded. “Why have you allowed the boys to live?”
  '19':
  - type: text
    content: “The Hebrew women are not like the Egyptian women,” the midwives replied. “They are more vigorous and have their babies so quickly that we cannot get there in time.”
  '2':
  - type: text
    content: 'Reuben, Simeon, Levi, Judah, '
  '20':
  - type: text
    content: 'So God was good to the midwives, and the Israelites continued to multiply, growing more and more powerful. '
  '21':
  - type: text
    content: And because the midwives feared God, he gave them families of their own.
  '22':
  - type: text
    content: 'Then Pharaoh gave this order to all his people: “Throw every newborn Hebrew boy into the Nile River. But you may let the girls live.”'
  '3':
  - type: text
    content: 'Issachar, Zebulun, Benjamin, '
  '4':
  - type: text
    content: 'Dan, Naphtali, Gad, and Asher. '
  '5':
  - type: text
    content: In all, Jacob had seventy
  - type: note
    content: Dead Sea Scrolls and Greek version read seventy-five; see notes on Gen 46:27.
  - type: text
    content: ' descendants in Egypt, including Joseph, who was already there.'
  '6':
  - type: text
    content: 'In time, Joseph and all of his brothers died, ending that entire generation. '
  '7':
  - type: text
    content: But their descendants, the Israelites, had many children and grandchildren. In fact, they multiplied so greatly that they became extremely powerful and filled the land.
  '8':
  - type: text
    content: 'Eventually, a new king came to power in Egypt who knew nothing about Joseph or what he had done. '
  '9':
  - type: text
    content: 'He said to his people, “Look, the people of Israel now outnumber us and are stronger than we are. '
