document_id: JER.48,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Moab
  - type: text
    content: 'This message was given concerning Moab. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says:'
  - type: text
    content: “What sorrow awaits the city of Nebo;
  - type: text
    content: it will soon lie in ruins.
  - type: text
    content: The city of Kiriathaim will be humiliated and captured;
  - type: text
    content: the fortress will be humiliated and broken down.
  '10':
  - type: text
    content: 'Cursed are those who refuse to do the '
  - type: text
    content: Lord
  - type: text
    content: ’s work,
  - type: text
    content: who hold back their swords from shedding blood!
  '11':
  - type: text
    content: “From his earliest history, Moab has lived in peace,
  - type: text
    content: never going into exile.
  - type: text
    content: He is like wine that has been allowed to settle.
  - type: text
    content: He has not been poured from flask to flask,
  - type: text
    content: and he is now fragrant and smooth.
  '12':
  - type: text
    content: 'But the time is coming soon,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will send men to pour him from his jar.
  - type: text
    content: They will pour him out,
  - type: text
    content: then shatter the jar!
  '13':
  - type: text
    content: At last Moab will be ashamed of his idol Chemosh,
  - type: text
    content: as the people of Israel were ashamed of their gold calf at Bethel.
  - type: note
    content: Hebrew ashamed when they trusted in Bethel.
  '14':
  - type: text
    content: “You used to boast, ‘We are heroes,
  - type: text
    content: mighty men of war.’
  '15':
  - type: text
    content: But now Moab and his towns will be destroyed.
  - type: text
    content: His most promising youth are doomed to slaughter,”
  - type: text
    content: 'says the King, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '16':
  - type: text
    content: “Destruction is coming fast for Moab;
  - type: text
    content: calamity threatens ominously.
  '17':
  - type: text
    content: You friends of Moab,
  - type: text
    content: weep for him and cry!
  - type: text
    content: See how the strong scepter is broken,
  - type: text
    content: how the beautiful staff is shattered!
  '18':
  - type: text
    content: “Come down from your glory
  - type: text
    content: and sit in the dust, you people of Dibon,
  - type: text
    content: for those who destroy Moab will shatter Dibon, too.
  - type: text
    content: They will tear down all your towers.
  '19':
  - type: text
    content: You people of Aroer,
  - type: text
    content: stand beside the road and watch.
  - type: text
    content: Shout to those who flee from Moab,
  - type: text
    content: ‘What has happened there?’
  '2':
  - type: text
    content: No one will ever brag about Moab again,
  - type: text
    content: for in Heshbon there is a plot to destroy her.
  - type: text
    content: ‘Come,’ they say, ‘we will cut her off from being a nation.’
  - type: text
    content: The town of Madmen,
  - type: note
    content: Madmen sounds like the Hebrew word for “silence”; it should not be confused with the English word madmen.
  - type: text
    content: ' too, will be silenced;'
  - type: text
    content: the sword will follow you there.
  '20':
  - type: text
    content: “And the reply comes back,
  - type: text
    content: ‘Moab lies in ruins, disgraced;
  - type: text
    content: weep and wail!
  - type: text
    content: 'Tell it by the banks of the Arnon River:'
  - type: text
    content: Moab has been destroyed!’
  '21':
  - type: text
    content: Judgment has been poured out on the towns of the plateau—
  - type: text
    content: on Holon and Jahaz
  - type: note
    content: Hebrew Jahzah, a variant spelling of Jahaz.
  - type: text
    content: ' and Mephaath,'
  '22':
  - type: text
    content: on Dibon and Nebo and Beth-diblathaim,
  '23':
  - type: text
    content: on Kiriathaim and Beth-gamul and Beth-meon,
  '24':
  - type: text
    content: on Kerioth and Bozrah—
  - type: text
    content: all the towns of Moab, far and near.
  '25':
  - type: text
    content: “The strength of Moab has ended.
  - type: text
    content: 'His arm has been broken,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: “Let him stagger and fall like a drunkard,
  - type: text
    content: 'for he has rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Moab will wallow in his own vomit,
  - type: text
    content: ridiculed by all.
  '27':
  - type: text
    content: Did you not ridicule the people of Israel?
  - type: text
    content: Were they caught in the company of thieves
  - type: text
    content: that you should despise them as you do?
  '28':
  - type: text
    content: “You people of Moab,
  - type: text
    content: flee from your towns and live in the caves.
  - type: text
    content: Hide like doves that nest
  - type: text
    content: in the clefts of the rocks.
  '29':
  - type: text
    content: We have all heard of the pride of Moab,
  - type: text
    content: for his pride is very great.
  - type: text
    content: We know of his lofty pride,
  - type: text
    content: his arrogance, and his haughty heart.
  '3':
  - type: text
    content: Listen to the cries from Horonaim,
  - type: text
    content: cries of devastation and great destruction.
  '30':
  - type: text
    content: I know about his insolence,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “but his boasts are empty—
  - type: text
    content: as empty as his deeds.
  '31':
  - type: text
    content: So now I wail for Moab;
  - type: text
    content: yes, I will mourn for Moab.
  - type: text
    content: My heart is broken for the men of Kir-hareseth.
  - type: note
    content: Hebrew Kir-heres, a variant spelling of Kir-hareseth; also in 48:36.
  '32':
  - type: text
    content: “You people of Sibmah, rich in vineyards,
  - type: text
    content: I will weep for you even more than I did for Jazer.
  - type: text
    content: Your spreading vines once reached as far as the Dead Sea,
  - type: note
    content: Hebrew the sea of Jazer.
  - type: text
    content: but the destroyer has stripped you bare!
  - type: text
    content: He has harvested your grapes and summer fruits.
  '33':
  - type: text
    content: Joy and gladness are gone from fruitful Moab.
  - type: text
    content: The presses yield no wine.
  - type: text
    content: No one treads the grapes with shouts of joy.
  - type: text
    content: There is shouting, yes, but not of joy.
  '34':
  - type: text
    content: “Instead, their awful cries of terror can be heard from Heshbon clear across to Elealeh and Jahaz; from Zoar all the way to Horonaim and Eglath-shelishiyah. Even the waters of Nimrim are dried up now.
  '35':
  - type: text
    content: '“I will put an end to Moab,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “for the people offer sacrifices at the pagan shrines and burn incense to their false gods. '
  '36':
  - type: text
    content: 'My heart moans like a flute for Moab and Kir-hareseth, for all their wealth has disappeared. '
  '37':
  - type: text
    content: 'The people shave their heads and beards in mourning. They slash their hands and put on clothes made of burlap. '
  '38':
  - type: text
    content: 'There is crying and sorrow in every Moabite home and on every street. For I have smashed Moab like an old, unwanted jar. '
  '39':
  - type: text
    content: How it is shattered! Hear the wailing! See the shame of Moab! It has become an object of ridicule, an example of ruin to all its neighbors.”
  '4':
  - type: text
    content: All Moab is destroyed.
  - type: text
    content: Her little ones will cry out.
  - type: note
    content: Greek version reads Her cries are heard as far away as Zoar.
  '40':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Look! The enemy swoops down like an eagle,
  - type: text
    content: spreading his wings over Moab.
  '41':
  - type: text
    content: Its cities will fall,
  - type: text
    content: and its strongholds will be seized.
  - type: text
    content: Even the mightiest warriors will be in anguish
  - type: text
    content: like a woman in labor.
  '42':
  - type: text
    content: Moab will no longer be a nation,
  - type: text
    content: 'for it has boasted against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '43':
  - type: text
    content: “Terror and traps and snares will be your lot,
  - type: text
    content: 'O Moab,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '44':
  - type: text
    content: “Those who flee in terror will fall into a trap,
  - type: text
    content: and those who escape the trap will step into a snare.
  - type: text
    content: I will see to it that you do not get away,
  - type: text
    content: for the time of your judgment has come,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '45':
  - type: text
    content: “The people flee as far as Heshbon
  - type: text
    content: but are unable to go on.
  - type: text
    content: For a fire comes from Heshbon,
  - type: text
    content: King Sihon’s ancient home,
  - type: text
    content: to devour the entire land
  - type: text
    content: with all its rebellious people.
  '46':
  - type: text
    content: “What sorrow awaits you, O people of Moab!
  - type: text
    content: The people of the god Chemosh are destroyed!
  - type: text
    content: Your sons and your daughters
  - type: text
    content: have been taken away as captives.
  '47':
  - type: text
    content: But I will restore the fortunes of Moab
  - type: text
    content: in days to come.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: text
    content: This is the end of Jeremiah’s prophecy concerning Moab.
  '5':
  - type: text
    content: Her refugees weep bitterly,
  - type: text
    content: climbing the slope to Luhith.
  - type: text
    content: They cry out in terror,
  - type: text
    content: descending the slope to Horonaim.
  '6':
  - type: text
    content: Flee for your lives!
  - type: text
    content: Hide
  - type: note
    content: Or Hide like a wild donkey; or Hide like a juniper shrub; or Be like [the town of] Aroer. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' in the wilderness!'
  '7':
  - type: text
    content: Because you have trusted in your wealth and skill,
  - type: text
    content: you will be taken captive.
  - type: text
    content: Your god Chemosh, with his priests and officials,
  - type: text
    content: will be hauled off to distant lands!
  '8':
  - type: text
    content: “All the towns will be destroyed,
  - type: text
    content: and no one will escape—
  - type: text
    content: either on the plateaus or in the valleys,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '9':
  - type: text
    content: Oh, that Moab had wings
  - type: text
    content: so she could fly away,
  - type: note
    content: Or Put salt on Moab, / for she will be laid waste.
  - type: text
    content: for her towns will be left empty,
  - type: text
    content: with no one living in them.
