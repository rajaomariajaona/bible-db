document_id: JER.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message was given concerning Moab. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What sorrow awaits the city of Nebo;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will soon lie in ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city of Kiriathaim will be humiliated and captured;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fortress will be humiliated and broken down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: No one will ever brag about Moab again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for in Heshbon there is a plot to destroy her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Come,’ they say, ‘we will cut her off from being a nation.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: The town of Madmen,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:2 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Madmen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew word for “silence”; it should not be confused with the English word '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: madmen.
    marker-yv: yv-n
  - type: text
    text: ' too, will be silenced;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sword will follow you there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Listen to the cries from Horonaim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cries of devastation and great destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All Moab is destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her little ones will cry out.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Her cries are heard as far away as Zoar.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Her refugees weep bitterly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: climbing the slope to Luhith.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cry out in terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: descending the slope to Horonaim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Flee for your lives!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hide like a wild donkey; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hide like a juniper shrub; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Be like '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[the town of] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aroer. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' in the wilderness!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because you have trusted in your wealth and skill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be taken captive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your god Chemosh, with his priests and officials,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be hauled off to distant lands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “All the towns will be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will escape—
- type: usfm
  marker: q1
  children:
  - type: text
    text: either on the plateaus or in the valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oh, that Moab had wings
- type: usfm
  marker: q2
  children:
  - type: text
    text: so she could fly away,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Put salt on Moab, / for she will be laid waste.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for her towns will be left empty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one living in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cursed are those who refuse to do the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who hold back their swords from shedding blood!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “From his earliest history, Moab has lived in peace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never going into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is like wine that has been allowed to settle.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has not been poured from flask to flask,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he is now fragrant and smooth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the time is coming soon,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “when I will send men to pour him from his jar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will pour him out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then shatter the jar!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: At last Moab will be ashamed of his idol Chemosh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the people of Israel were ashamed of their gold calf at Bethel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ashamed when they trusted in Bethel.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “You used to boast, ‘We are heroes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mighty men of war.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But now Moab and his towns will be destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His most promising youth are doomed to slaughter,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the King, whose name is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Destruction is coming fast for Moab;
- type: usfm
  marker: q2
  children:
  - type: text
    text: calamity threatens ominously.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You friends of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weep for him and cry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: See how the strong scepter is broken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how the beautiful staff is shattered!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Come down from your glory
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sit in the dust, you people of Dibon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for those who destroy Moab will shatter Dibon, too.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will tear down all your towers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You people of Aroer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand beside the road and watch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout to those who flee from Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘What has happened there?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “And the reply comes back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Moab lies in ruins, disgraced;
- type: usfm
  marker: q2
  children:
  - type: text
    text: weep and wail!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tell it by the banks of the Arnon River:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moab has been destroyed!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Judgment has been poured out on the towns of the plateau—
- type: usfm
  marker: q2
  children:
  - type: text
    text: on Holon and Jahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jahzah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jahaz.
    marker-yv: yv-n
  - type: text
    text: ' and Mephaath,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: on Dibon and Nebo and Beth-diblathaim,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: on Kiriathaim and Beth-gamul and Beth-meon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: on Kerioth and Bozrah—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the towns of Moab, far and near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “The strength of Moab has ended.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His arm has been broken,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Let him stagger and fall like a drunkard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for he has rebelled against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab will wallow in his own vomit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ridiculed by all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Did you not ridicule the people of Israel?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Were they caught in the company of thieves
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you should despise them as you do?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “You people of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flee from your towns and live in the caves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hide like doves that nest
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the clefts of the rocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: We have all heard of the pride of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his pride is very great.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We know of his lofty pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his arrogance, and his haughty heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I know about his insolence,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “but his boasts are empty—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as empty as his deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So now I wail for Moab;
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I will mourn for Moab.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart is broken for the men of Kir-hareseth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kir-heres, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Kir-hareseth; also in 48:36.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “You people of Sibmah, rich in vineyards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will weep for you even more than I did for Jazer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your spreading vines once reached as far as the Dead Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea of Jazer.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the destroyer has stripped you bare!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has harvested your grapes and summer fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Joy and gladness are gone from fruitful Moab.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The presses yield no wine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one treads the grapes with shouts of joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is shouting, yes, but not of joy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Instead, their awful cries of terror can be heard from Heshbon clear across to Elealeh and Jahaz; from Zoar all the way to Horonaim and Eglath-shelishiyah. Even the waters of Nimrim are dried up now.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“I will put an end to Moab,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “for the people offer sacrifices at the pagan shrines and burn incense to their false gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'My heart moans like a flute for Moab and Kir-hareseth, for all their wealth has disappeared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The people shave their heads and beards in mourning. They slash their hands and put on clothes made of burlap. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'There is crying and sorrow in every Moabite home and on every street. For I have smashed Moab like an old, unwanted jar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: How it is shattered! Hear the wailing! See the shame of Moab! It has become an object of ridicule, an example of ruin to all its neighbors.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
