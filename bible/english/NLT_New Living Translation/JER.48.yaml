- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the mightiest warriors will be in anguish
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman in labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Moab will no longer be a nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for it has boasted against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: “Terror and traps and snares will be your lot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O Moab,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: “Those who flee in terror will fall into a trap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who escape the trap will step into a snare.
- type: usfm
  marker: q1
  children:
  - type: text
