document_id: PRO.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Honor is no more associated with fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than snow with summer or rain with harvest.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: An employer who hires a fool or a bystander
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like an archer who shoots at random.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As a dog returns to its vomit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a fool repeats his foolishness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There is more hope for fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than for people who think they are wise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The lazy person claims, “There’s a lion on the road!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I’m sure there’s a lion out there!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: As a door swings back and forth on its hinges,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the lazy person turns over in bed.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lazy people take food in their hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but don’t even lift it to their mouth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lazy people consider themselves smarter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than seven wise counselors.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Interfering in someone else’s argument
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as foolish as yanking a dog’s ears.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Just as damaging
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a madman shooting a deadly weapon
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: is someone who lies to a friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then says, “I was only joking.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Like a fluttering sparrow or a darting swallow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an undeserved curse will not land on its intended victim.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fire goes out without wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and quarrels disappear when gossip stops.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: A quarrelsome person starts fights
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as easily as hot embers light charcoal or fire lights wood.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Rumors are dainty morsels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that sink deep into one’s heart.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Smooth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Burning.
      marker-yv: yv-n
    - type: text
      text: ' words may hide a wicked heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as a pretty glaze covers a clay pot.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: People may cover their hatred with pleasant words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they’re deceiving you.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They pretend to be kind, but don’t believe them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their hearts are full of many evils.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seven evils.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: While their hatred may be concealed by trickery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their wrongdoing will be exposed in public.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: If you set a trap for others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will get caught in it yourself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you roll a boulder down on others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will crush you instead.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A lying tongue hates its victims,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flattering words cause ruin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Guide a horse with a whip, a donkey with a bridle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a fool with a rod to his back!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t answer the foolish arguments of fools,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or you will become as foolish as they are.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Be sure to answer the foolish arguments of fools,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or they will become wise in their own estimation.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Trusting a fool to convey a message
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like cutting off one’s feet or drinking poison!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A proverb in the mouth of a fool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as useless as a paralyzed leg.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Honoring a fool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as foolish as tying a stone to a slingshot.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A proverb in the mouth of a fool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a thorny branch brandished by a drunk.
