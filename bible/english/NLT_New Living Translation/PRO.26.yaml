document_id: PRO.26,116
type_code: eng
verses:
  '1':
  - type: text
    content: Honor is no more associated with fools
  - type: text
    content: than snow with summer or rain with harvest.
  '10':
  - type: text
    content: An employer who hires a fool or a bystander
  - type: text
    content: is like an archer who shoots at random.
  '11':
  - type: text
    content: As a dog returns to its vomit,
  - type: text
    content: so a fool repeats his foolishness.
  '12':
  - type: text
    content: There is more hope for fools
  - type: text
    content: than for people who think they are wise.
  '13':
  - type: text
    content: The lazy person claims, “There’s a lion on the road!
  - type: text
    content: Yes, I’m sure there’s a lion out there!”
  '14':
  - type: text
    content: As a door swings back and forth on its hinges,
  - type: text
    content: so the lazy person turns over in bed.
  '15':
  - type: text
    content: Lazy people take food in their hand
  - type: text
    content: but don’t even lift it to their mouth.
  '16':
  - type: text
    content: Lazy people consider themselves smarter
  - type: text
    content: than seven wise counselors.
  '17':
  - type: text
    content: Interfering in someone else’s argument
  - type: text
    content: is as foolish as yanking a dog’s ears.
  '18':
  - type: text
    content: Just as damaging
  - type: text
    content: as a madman shooting a deadly weapon
  '19':
  - type: text
    content: is someone who lies to a friend
  - type: text
    content: and then says, “I was only joking.”
  '2':
  - type: text
    content: Like a fluttering sparrow or a darting swallow,
  - type: text
    content: an undeserved curse will not land on its intended victim.
  '20':
  - type: text
    content: Fire goes out without wood,
  - type: text
    content: and quarrels disappear when gossip stops.
  '21':
  - type: text
    content: A quarrelsome person starts fights
  - type: text
    content: as easily as hot embers light charcoal or fire lights wood.
  '22':
  - type: text
    content: Rumors are dainty morsels
  - type: text
    content: that sink deep into one’s heart.
  '23':
  - type: text
    content: Smooth
  - type: note
    content: As in Greek version; Hebrew reads Burning.
  - type: text
    content: ' words may hide a wicked heart,'
  - type: text
    content: just as a pretty glaze covers a clay pot.
  '24':
  - type: text
    content: People may cover their hatred with pleasant words,
  - type: text
    content: but they’re deceiving you.
  '25':
  - type: text
    content: They pretend to be kind, but don’t believe them.
  - type: text
    content: Their hearts are full of many evils.
  - type: note
    content: Hebrew seven evils.
  '26':
  - type: text
    content: While their hatred may be concealed by trickery,
  - type: text
    content: their wrongdoing will be exposed in public.
  '27':
  - type: text
    content: If you set a trap for others,
  - type: text
    content: you will get caught in it yourself.
  - type: text
    content: If you roll a boulder down on others,
  - type: text
    content: it will crush you instead.
  '28':
  - type: text
    content: A lying tongue hates its victims,
  - type: text
    content: and flattering words cause ruin.
  '3':
  - type: text
    content: Guide a horse with a whip, a donkey with a bridle,
  - type: text
    content: and a fool with a rod to his back!
  '4':
  - type: text
    content: Don’t answer the foolish arguments of fools,
  - type: text
    content: or you will become as foolish as they are.
  '5':
  - type: text
    content: Be sure to answer the foolish arguments of fools,
  - type: text
    content: or they will become wise in their own estimation.
  '6':
  - type: text
    content: Trusting a fool to convey a message
  - type: text
    content: is like cutting off one’s feet or drinking poison!
  '7':
  - type: text
    content: A proverb in the mouth of a fool
  - type: text
    content: is as useless as a paralyzed leg.
  '8':
  - type: text
    content: Honoring a fool
  - type: text
    content: is as foolish as tying a stone to a slingshot.
  '9':
  - type: text
    content: A proverb in the mouth of a fool
  - type: text
    content: is like a thorny branch brandished by a drunk.
