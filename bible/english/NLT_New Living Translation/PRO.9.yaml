document_id: PRO.9,116
type_code: eng
verses:
  '1':
  - type: text
    content: Wisdom has built her house;
  - type: text
    content: she has carved its seven columns.
  '10':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the foundation of wisdom.'
  - type: text
    content: Knowledge of the Holy One results in good judgment.
  '11':
  - type: text
    content: Wisdom will multiply your days
  - type: text
    content: and add years to your life.
  '12':
  - type: text
    content: If you become wise, you will be the one to benefit.
  - type: text
    content: If you scorn wisdom, you will be the one to suffer.
  - type: heading
    content: Folly Calls for a Hearing
  '13':
  - type: text
    content: The woman named Folly is brash.
  - type: text
    content: She is ignorant and doesn’t know it.
  '14':
  - type: text
    content: She sits in her doorway
  - type: text
    content: on the heights overlooking the city.
  '15':
  - type: text
    content: She calls out to men going by
  - type: text
    content: who are minding their own business.
  '16':
  - type: text
    content: “Come in with me,” she urges the simple.
  - type: text
    content: To those who lack good judgment, she says,
  '17':
  - type: text
    content: “Stolen water is refreshing;
  - type: text
    content: food eaten in secret tastes the best!”
  '18':
  - type: text
    content: But little do they know that the dead are there.
  - type: text
    content: Her guests are in the depths of the grave.
  - type: note
    content: Hebrew in Sheol.
  '2':
  - type: text
    content: She has prepared a great banquet,
  - type: text
    content: mixed the wines, and set the table.
  '3':
  - type: text
    content: She has sent her servants to invite everyone to come.
  - type: text
    content: She calls out from the heights overlooking the city.
  '4':
  - type: text
    content: “Come in with me,” she urges the simple.
  - type: text
    content: To those who lack good judgment, she says,
  '5':
  - type: text
    content: “Come, eat my food,
  - type: text
    content: and drink the wine I have mixed.
  '6':
  - type: text
    content: Leave your simple ways behind, and begin to live;
  - type: text
    content: learn to use good judgment.”
  '7':
  - type: text
    content: Anyone who rebukes a mocker will get an insult in return.
  - type: text
    content: Anyone who corrects the wicked will get hurt.
  '8':
  - type: text
    content: So don’t bother correcting mockers;
  - type: text
    content: they will only hate you.
  - type: text
    content: But correct the wise,
  - type: text
    content: and they will love you.
  '9':
  - type: text
    content: Instruct the wise,
  - type: text
    content: and they will be even wiser.
  - type: text
    content: Teach the righteous,
  - type: text
    content: and they will learn even more.
