document_id: PRO.9
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wisdom has built her house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has carved its seven columns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She has prepared a great banquet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mixed the wines, and set the table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: She has sent her servants to invite everyone to come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She calls out from the heights overlooking the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Come in with me,” she urges the simple.
- type: usfm
  marker: q2
  children:
  - type: text
    text: To those who lack good judgment, she says,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Come, eat my food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drink the wine I have mixed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leave your simple ways behind, and begin to live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: learn to use good judgment.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Anyone who rebukes a mocker will get an insult in return.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Anyone who corrects the wicked will get hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So don’t bother correcting mockers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will only hate you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But correct the wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will love you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Instruct the wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will be even wiser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will learn even more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the foundation of wisdom.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Knowledge of the Holy One results in good judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Wisdom will multiply your days
- type: usfm
  marker: q2
  children:
  - type: text
    text: and add years to your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If you become wise, you will be the one to benefit.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you scorn wisdom, you will be the one to suffer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Folly Calls for a Hearing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The woman named Folly is brash.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She is ignorant and doesn’t know it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She sits in her doorway
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the heights overlooking the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She calls out to men going by
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are minding their own business.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Come in with me,” she urges the simple.
- type: usfm
  marker: q2
  children:
  - type: text
    text: To those who lack good judgment, she says,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Stolen water is refreshing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: food eaten in secret tastes the best!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But little do they know that the dead are there.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her guests are in the depths of the grave.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sheol.
    marker-yv: yv-n
