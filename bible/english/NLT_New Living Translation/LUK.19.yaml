document_id: LUK.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and Zacchaeus
  - type: text
    content: 'Jesus entered Jericho and made his way through the town. '
  '10':
  - type: text
    content: For the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: came to seek and save those who are lost.”
  - type: heading
    content: Parable of the Ten Servants
  '11':
  - type: text
    content: 'The crowd was listening to everything Jesus said. And because he was nearing Jerusalem, he told them a story to correct the impression that the Kingdom of God would begin right away. '
  '12':
  - type: text
    content: 'He said, '
  - type: text
    content: “A nobleman was called away to a distant empire to be crowned king and then return.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Before he left, he called together ten of his servants and divided among them ten pounds of silver,
  - type: note
    content: Greek ten minas; one mina was worth about three months’ wages.
  - type: text
    content: ' '
  - type: text
    content: saying, ‘Invest this for me while I am gone.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: But his people hated him and sent a delegation after him to say, ‘We do not want him to be our king.’
  '15':
  - type: text
    content: ' '
  - type: text
    content: “After he was crowned king, he returned and called in the servants to whom he had given the money. He wanted to find out what their profits were.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The first servant reported, ‘Master, I invested your money and made ten times the original amount!’
  '17':
  - type: text
    content: ' '
  - type: text
    content: “‘Well done!’ the king exclaimed. ‘You are a good servant. You have been faithful with the little I entrusted to you, so you will be governor of ten cities as your reward.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: “The next servant reported, ‘Master, I invested your money and made five times the original amount.’
  '19':
  - type: text
    content: ' '
  - type: text
    content: “‘Well done!’ the king said. ‘You will be governor over five cities.’
  '2':
  - type: text
    content: 'There was a man there named Zacchaeus. He was the chief tax collector in the region, and he had become very rich. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “But the third servant brought back only the original amount of money and said, ‘Master, I hid your money and kept it safe.
  - type: text
    content: ' '
  '21':
  - type: text
    content: I was afraid because you are a hard man to deal with, taking what isn’t yours and harvesting crops you didn’t plant.’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “‘You wicked servant!’ the king roared. ‘Your own words condemn you. If you knew that I’m a hard man who takes what isn’t mine and harvests crops I didn’t plant,
  - type: text
    content: ' '
  '23':
  - type: text
    content: why didn’t you deposit my money in the bank? At least I could have gotten some interest on it.’
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Then, turning to the others standing nearby, the king ordered, ‘Take the money from this servant, and give it to the one who has ten pounds.’
  '25':
  - type: text
    content: ' '
  - type: text
    content: “‘But, master,’ they said, ‘he already has ten pounds!’
  '26':
  - type: text
    content: ' '
  - type: text
    content: “‘Yes,’ the king replied, ‘and to those who use well what they are given, even more will be given. But from those who do nothing, even what little they have will be taken away.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And as for these enemies of mine who didn’t want me to be their king—bring them in and execute them right here in front of me.’”
  - type: heading
    content: Jesus’ Triumphant Entry
  '28':
  - type: text
    content: 'After telling this story, Jesus went on toward Jerusalem, walking ahead of his disciples. '
  '29':
  - type: text
    content: 'As he came to the towns of Bethphage and Bethany on the Mount of Olives, he sent two disciples ahead. '
  '3':
  - type: text
    content: 'He tried to get a look at Jesus, but he was too short to see over the crowd. '
  '30':
  - type: text
    content: '“Go into that village over there,” '
  - type: text
    content: 'he told them. '
  - type: text
    content: “As you enter it, you will see a young donkey tied there that no one has ever ridden. Untie it and bring it here.
  - type: text
    content: ' '
  '31':
  - type: text
    content: If anyone asks, ‘Why are you untying that colt?’ just say, ‘The Lord needs it.’”
  '32':
  - type: text
    content: 'So they went and found the colt, just as Jesus had said. '
  '33':
  - type: text
    content: And sure enough, as they were untying it, the owners asked them, “Why are you untying that colt?”
  '34':
  - type: text
    content: 'And the disciples simply replied, “The Lord needs it.” '
  '35':
  - type: text
    content: So they brought the colt to Jesus and threw their garments over it for him to ride on.
  '36':
  - type: text
    content: 'As he rode along, the crowds spread out their garments on the road ahead of him. '
  '37':
  - type: text
    content: When he reached the place where the road started down the Mount of Olives, all of his followers began to shout and sing as they walked along, praising God for all the wonderful miracles they had seen.
  '38':
  - type: text
    content: '“Blessings on the King who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Peace in heaven, and glory in highest heaven!”
  - type: note
    content: Pss 118:26; 148:1.
  '39':
  - type: text
    content: But some of the Pharisees among the crowd said, “Teacher, rebuke your followers for saying things like that!”
  '4':
  - type: text
    content: So he ran ahead and climbed a sycamore-fig tree beside the road, for Jesus was going to pass that way.
  '40':
  - type: text
    content: 'He replied, '
  - type: text
    content: “If they kept quiet, the stones along the road would burst into cheers!”
  - type: heading
    content: Jesus Weeps over Jerusalem
  '41':
  - type: text
    content: 'But as he came closer to Jerusalem and saw the city ahead, he began to weep. '
  '42':
  - type: text
    content: “How I wish today that you of all people would understand the way to peace. But now it is too late, and peace is hidden from your eyes.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Before long your enemies will build ramparts against your walls and encircle you and close in on you from every side.
  - type: text
    content: ' '
  '44':
  - type: text
    content: They will crush you into the ground, and your children with you. Your enemies will not leave a single stone in place, because you did not recognize it when God visited you.
  - type: note
    content: Greek did not recognize the time of your visitation, a reference to the Messiah’s coming.
  - type: text
    content: ”
  - type: heading
    content: Jesus Clears the Temple
  '45':
  - type: text
    content: 'Then Jesus entered the Temple and began to drive out the people selling animals for sacrifices. '
  '46':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “The Scriptures declare, ‘My Temple will be a house of prayer,’ but you have turned it into a den of thieves.”
  - type: note
    content: Isa 56:7; Jer 7:11.
  '47':
  - type: text
    content: 'After that, he taught daily in the Temple, but the leading priests, the teachers of religious law, and the other leaders of the people began planning how to kill him. '
  '48':
  - type: text
    content: But they could think of nothing, because all the people hung on every word he said.
  '5':
  - type: text
    content: 'When Jesus came by, he looked up at Zacchaeus and called him by name. '
  - type: text
    content: '“Zacchaeus!” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Quick, come down! I must be a guest in your home today.”
  '6':
  - type: text
    content: 'Zacchaeus quickly climbed down and took Jesus to his house in great excitement and joy. '
  '7':
  - type: text
    content: But the people were displeased. “He has gone to be the guest of a notorious sinner,” they grumbled.
  '8':
  - type: text
    content: Meanwhile, Zacchaeus stood before the Lord and said, “I will give half my wealth to the poor, Lord, and if I have cheated people on their taxes, I will give them back four times as much!”
  '9':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Salvation has come to this home today, for this man has shown himself to be a true son of Abraham.
  - type: text
    content: ' '
