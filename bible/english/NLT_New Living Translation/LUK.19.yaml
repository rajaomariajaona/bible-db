document_id: LUK.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and Zacchaeus
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus entered Jericho and made his way through the town. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: came to seek and save those who are lost.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parable of the Ten Servants
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The crowd was listening to everything Jesus said. And because he was nearing Jerusalem, he told them a story to correct the impression that the Kingdom of God would begin right away. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A nobleman was called away to a distant empire to be crowned king and then return.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Before he left, he called together ten of his servants and divided among them ten pounds of silver,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ten minas; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: one mina was worth about three months’ wages.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saying, ‘Invest this for me while I am gone.’
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But his people hated him and sent a delegation after him to say, ‘We do not want him to be our king.’
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “After he was crowned king, he returned and called in the servants to whom he had given the money. He wanted to find out what their profits were.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The first servant reported, ‘Master, I invested your money and made ten times the original amount!’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘Well done!’ the king exclaimed. ‘You are a good servant. You have been faithful with the little I entrusted to you, so you will be governor of ten cities as your reward.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The next servant reported, ‘Master, I invested your money and made five times the original amount.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘Well done!’ the king said. ‘You will be governor over five cities.’
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There was a man there named Zacchaeus. He was the chief tax collector in the region, and he had become very rich. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But the third servant brought back only the original amount of money and said, ‘Master, I hid your money and kept it safe.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I was afraid because you are a hard man to deal with, taking what isn’t yours and harvesting crops you didn’t plant.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘You wicked servant!’ the king roared. ‘Your own words condemn you. If you knew that I’m a hard man who takes what isn’t mine and harvests crops I didn’t plant,
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: why didn’t you deposit my money in the bank? At least I could have gotten some interest on it.’
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then, turning to the others standing nearby, the king ordered, ‘Take the money from this servant, and give it to the one who has ten pounds.’
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘But, master,’ they said, ‘he already has ten pounds!’
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘Yes,’ the king replied, ‘and to those who use well what they are given, even more will be given. But from those who do nothing, even what little they have will be taken away.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And as for these enemies of mine who didn’t want me to be their king—bring them in and execute them right here in front of me.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Triumphant Entry
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After telling this story, Jesus went on toward Jerusalem, walking ahead of his disciples. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As he came to the towns of Bethphage and Bethany on the Mount of Olives, he sent two disciples ahead. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He tried to get a look at Jesus, but he was too short to see over the crowd. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go into that village over there,” '
    - type: text
      text: 'he told them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “As you enter it, you will see a young donkey tied there that no one has ever ridden. Untie it and bring it here.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone asks, ‘Why are you untying that colt?’ just say, ‘The Lord needs it.’”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went and found the colt, just as Jesus had said. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And sure enough, as they were untying it, the owners asked them, “Why are you untying that colt?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the disciples simply replied, “The Lord needs it.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they brought the colt to Jesus and threw their garments over it for him to ride on.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he rode along, the crowds spread out their garments on the road ahead of him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he reached the place where the road started down the Mount of Olives, all of his followers began to shout and sing as they walked along, praising God for all the wonderful miracles they had seen.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Blessings on the King who comes in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Peace in heaven, and glory in highest heaven!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pss 118:26; 148:1.
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some of the Pharisees among the crowd said, “Teacher, rebuke your followers for saying things like that!”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So he ran ahead and climbed a sycamore-fig tree beside the road, for Jesus was going to pass that way.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If they kept quiet, the stones along the road would burst into cheers!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Weeps over Jerusalem
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But as he came closer to Jerusalem and saw the city ahead, he began to weep. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How I wish today that you of all people would understand the way to peace. But now it is too late, and peace is hidden from your eyes.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Before long your enemies will build ramparts against your walls and encircle you and close in on you from every side.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will crush you into the ground, and your children with you. Your enemies will not leave a single stone in place, because you did not recognize it when God visited you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'did not recognize the time of your visitation, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a reference to the Messiah’s coming.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Clears the Temple
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus entered the Temple and began to drive out the people selling animals for sacrifices. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Scriptures declare, ‘My Temple will be a house of prayer,’ but you have turned it into a den of thieves.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 56:7; Jer 7:11.
      marker-yv: yv-n
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that, he taught daily in the Temple, but the leading priests, the teachers of religious law, and the other leaders of the people began planning how to kill him. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they could think of nothing, because all the people hung on every word he said.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus came by, he looked up at Zacchaeus and called him by name. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Zacchaeus!” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Quick, come down! I must be a guest in your home today.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zacchaeus quickly climbed down and took Jesus to his house in great excitement and joy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people were displeased. “He has gone to be the guest of a notorious sinner,” they grumbled.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Zacchaeus stood before the Lord and said, “I will give half my wealth to the poor, Lord, and if I have cheated people on their taxes, I will give them back four times as much!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Salvation has come to this home today, for this man has shown himself to be a true son of Abraham.
    - type: text
      text: ' '
