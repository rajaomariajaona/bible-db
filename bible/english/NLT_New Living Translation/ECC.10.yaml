document_id: ECC.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As dead flies cause even a bottle of perfume to stink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a little foolishness spoils great wisdom and honor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Using a dull ax requires great strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so sharpen the blade.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s the value of wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it helps you succeed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If a snake bites before you charm it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what’s the use of being a snake charmer?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise words bring approval,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools are destroyed by their own words.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools base their thoughts on foolish assumptions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so their conclusions will be wicked madness;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they chatter on and on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one really knows what is going to happen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one can predict the future.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools are so exhausted by a little work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they can’t even find their way home.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow for the land ruled by a servant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a child.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the land whose leaders feast in the morning.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Happy is the land whose king is a noble leader
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose leaders feast at the proper time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to gain strength for their work, not to get drunk.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laziness leads to a sagging roof;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: idleness leads to a leaky house.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A party gives laughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wine gives happiness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and money gives everything!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise person chooses the right road;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fool takes the wrong one.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never make light of the king, even in your thoughts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And don’t make fun of the powerful, even in your own bedroom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a little bird might deliver your message
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tell them what you said.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can identify fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just by the way they walk down the street!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your boss is angry at you, don’t quit!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A quiet spirit can overcome even great mistakes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ironies of Life
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There is another evil I have seen under the sun. Kings and rulers make a grave mistake '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'when they give great authority to foolish people and low positions to people of proven worth. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I have even seen servants riding horseback like princes—and princes walking like servants!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you dig a well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you might fall in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you demolish an old wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you could be bitten by a snake.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you work in a quarry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stones might fall and crush you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you chop wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is danger with each stroke of your ax.
