document_id: ECC.10,116
type_code: eng
verses:
  '1':
  - type: text
    content: As dead flies cause even a bottle of perfume to stink,
  - type: text
    content: so a little foolishness spoils great wisdom and honor.
  '10':
  - type: text
    content: Using a dull ax requires great strength,
  - type: text
    content: so sharpen the blade.
  - type: text
    content: That’s the value of wisdom;
  - type: text
    content: it helps you succeed.
  '11':
  - type: text
    content: If a snake bites before you charm it,
  - type: text
    content: what’s the use of being a snake charmer?
  '12':
  - type: text
    content: Wise words bring approval,
  - type: text
    content: but fools are destroyed by their own words.
  '13':
  - type: text
    content: Fools base their thoughts on foolish assumptions,
  - type: text
    content: so their conclusions will be wicked madness;
  '14':
  - type: text
    content: they chatter on and on.
  - type: text
    content: No one really knows what is going to happen;
  - type: text
    content: no one can predict the future.
  '15':
  - type: text
    content: Fools are so exhausted by a little work
  - type: text
    content: that they can’t even find their way home.
  '16':
  - type: text
    content: What sorrow for the land ruled by a servant,
  - type: note
    content: Or a child.
  - type: text
    content: the land whose leaders feast in the morning.
  '17':
  - type: text
    content: Happy is the land whose king is a noble leader
  - type: text
    content: and whose leaders feast at the proper time
  - type: text
    content: to gain strength for their work, not to get drunk.
  '18':
  - type: text
    content: Laziness leads to a sagging roof;
  - type: text
    content: idleness leads to a leaky house.
  '19':
  - type: text
    content: A party gives laughter,
  - type: text
    content: wine gives happiness,
  - type: text
    content: and money gives everything!
  '2':
  - type: text
    content: A wise person chooses the right road;
  - type: text
    content: a fool takes the wrong one.
  '20':
  - type: text
    content: Never make light of the king, even in your thoughts.
  - type: text
    content: And don’t make fun of the powerful, even in your own bedroom.
  - type: text
    content: For a little bird might deliver your message
  - type: text
    content: and tell them what you said.
  '3':
  - type: text
    content: You can identify fools
  - type: text
    content: just by the way they walk down the street!
  '4':
  - type: text
    content: If your boss is angry at you, don’t quit!
  - type: text
    content: A quiet spirit can overcome even great mistakes.
  - type: heading
    content: The Ironies of Life
  '5':
  - type: text
    content: 'There is another evil I have seen under the sun. Kings and rulers make a grave mistake '
  '6':
  - type: text
    content: 'when they give great authority to foolish people and low positions to people of proven worth. '
  '7':
  - type: text
    content: I have even seen servants riding horseback like princes—and princes walking like servants!
  '8':
  - type: text
    content: When you dig a well,
  - type: text
    content: you might fall in.
  - type: text
    content: When you demolish an old wall,
  - type: text
    content: you could be bitten by a snake.
  '9':
  - type: text
    content: When you work in a quarry,
  - type: text
    content: stones might fall and crush you.
  - type: text
    content: When you chop wood,
  - type: text
    content: there is danger with each stroke of your ax.
