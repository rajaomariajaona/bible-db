document_id: HEB.5,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Every high priest is a man chosen to represent other people in their dealings with God. He presents their gifts to God and offers sacrifices for their sins. '
  '10':
  - type: text
    content: And God designated him to be a High Priest in the order of Melchizedek.
  - type: heading
    content: A Call to Spiritual Growth
  '11':
  - type: text
    content: 'There is much more we would like to say about this, but it is difficult to explain, especially since you are spiritually dull and don’t seem to listen. '
  '12':
  - type: text
    content: You have been believers so long now that you ought to be teaching others. Instead, you need someone to teach you again the basic things about God’s word.
  - type: note
    content: Or about the oracles of God.
  - type: text
    content: ' You are like babies who need milk and cannot eat solid food. '
  '13':
  - type: text
    content: 'For someone who lives on milk is still an infant and doesn’t know how to do what is right. '
  '14':
  - type: text
    content: Solid food is for those who are mature, who through training have the skill to recognize the difference between right and wrong.
  '2':
  - type: text
    content: 'And he is able to deal gently with ignorant and wayward people because he himself is subject to the same weaknesses. '
  '3':
  - type: text
    content: That is why he must offer sacrifices for his own sins as well as theirs.
  '4':
  - type: text
    content: 'And no one can become a high priest simply because he wants such an honor. He must be called by God for this work, just as Aaron was. '
  '5':
  - type: text
    content: That is why Christ did not honor himself by assuming he could become High Priest. No, he was chosen by God, who said to him,
  - type: text
    content: “You are my Son.
  - type: text
    content: Today I have become your Father.
  - type: note
    content: Or Today I reveal you as my Son. Ps 2:7.
  - type: text
    content: ”
  '6':
  - type: text
    content: And in another passage God said to him,
  - type: text
    content: “You are a priest forever in the order of Melchizedek.”
  - type: note
    content: Ps 110:4.
  '7':
  - type: text
    content: 'While Jesus was here on earth, he offered prayers and pleadings, with a loud cry and tears, to the one who could rescue him from death. And God heard his prayers because of his deep reverence for God. '
  '8':
  - type: text
    content: 'Even though Jesus was God’s Son, he learned obedience from the things he suffered. '
  '9':
  - type: text
    content: 'In this way, God qualified him as a perfect High Priest, and he became the source of eternal salvation for all those who obey him. '
