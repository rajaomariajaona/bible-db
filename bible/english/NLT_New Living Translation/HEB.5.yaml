document_id: HEB.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Every high priest is a man chosen to represent other people in their dealings with God. He presents their gifts to God and offers sacrifices for their sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he is able to deal gently with ignorant and wayward people because he himself is subject to the same weaknesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: That is why he must offer sacrifices for his own sins as well as theirs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And no one can become a high priest simply because he wants such an honor. He must be called by God for this work, just as Aaron was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: That is why Christ did not honor himself by assuming he could become High Priest. No, he was chosen by God, who said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Son.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Today I have become your Father.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Today I reveal you as my Son. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 2:7.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And in another passage God said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are a priest forever in the order of Melchizedek.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:4.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'While Jesus was here on earth, he offered prayers and pleadings, with a loud cry and tears, to the one who could rescue him from death. And God heard his prayers because of his deep reverence for God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Even though Jesus was God’s Son, he learned obedience from the things he suffered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In this way, God qualified him as a perfect High Priest, and he became the source of eternal salvation for all those who obey him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And God designated him to be a High Priest in the order of Melchizedek.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Spiritual Growth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There is much more we would like to say about this, but it is difficult to explain, especially since you are spiritually dull and don’t seem to listen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You have been believers so long now that you ought to be teaching others. Instead, you need someone to teach you again the basic things about God’s word.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: about the oracles of God.
    marker-yv: yv-n
  - type: text
    text: ' You are like babies who need milk and cannot eat solid food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For someone who lives on milk is still an infant and doesn’t know how to do what is right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Solid food is for those who are mature, who through training have the skill to recognize the difference between right and wrong.
