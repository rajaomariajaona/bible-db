  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'These were the clans descended from the sons of Naphtali:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Jahzeelite clan, named after their ancestor Jahzeel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Gunite clan, named after their ancestor Guni.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: The Jezerite clan, named after their ancestor Jezer.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shillemite clan, named after their ancestor Shillem.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: These were the clans of Naphtali. Their registered troops numbered 45,400.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Results of the Registration
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: In summary, the registered troops of all Israel numbered 601,730.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '“Divide the land among the tribes, and distribute the grants of land in proportion to the tribes’ populations, as indicated by the number of names on the list. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Give the larger tribes more land and the smaller tribes less land, each group receiving a grant in proportion to the size of its population. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But you must assign the land by lot, and give land to each ancestral tribe according to the number of names on the list. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Each grant of land must be assigned by lot among the larger and smaller tribal groups.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Levi
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'This is the record of the Levites who were counted according to their clans:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Gershonite clan, named after their ancestor Gershon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Kohathite clan, named after their ancestor Kohath.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Merarite clan, named after their ancestor Merari.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: The Libnites, the Hebronites, the Mahlites, the Mushites, and the Korahites were all subclans of the Levites.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Now Kohath was the ancestor of Amram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'and Amram’s wife was named Jochebed. She also was a descendant of Levi, born among the Levites in the land of Egypt. Amram and Jochebed became the parents of Aaron, Moses, and their sister, Miriam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'To Aaron were born Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'But Nadab and Abihu died when they burned before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the wrong kind of fire, different than he had commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: The men from the Levite clans who were one month old or older numbered 23,000. But the Levites were not included in the registration of the rest of the people of Israel because they were not given an allotment of land when it was divided among the Israelites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'So these are the results of the registration of the people of Israel as conducted by Moses and Eleazar the priest on the plains of Moab beside the Jordan River, across from Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Not one person on this list had been among those listed in the previous registration taken by Moses and Aaron in the wilderness of Sinai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said of them, “They will all die in the wilderness.” Not one of them survived except Caleb son of Jephunneh and Joshua son of Nun.'
