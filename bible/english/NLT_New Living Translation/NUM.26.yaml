- type: usfm
  marker: li1
  children:
  - type: text
    text: The Bekerite clan, named after their ancestor Beker.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Tahanite clan, named after their ancestor Tahan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'This was the subclan descended from the Shuthelahites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Eranites, named after their ancestor Eran.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: These were the clans of Ephraim. Their registered troops numbered 32,500.
- type: usfm
  marker: m
  children:
  - type: text
    text: These clans of Manasseh and Ephraim were all descendants of Joseph.
- type: usfm
  marker: s1
  children:
  - type: text
