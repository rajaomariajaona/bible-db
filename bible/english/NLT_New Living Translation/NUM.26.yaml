document_id: NUM.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Second Registration of Israel’s Troops
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After the plague had ended,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The initial phrase in verse 26:1 is numbered 25:19 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and to Eleazar son of Aaron the priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “From the whole community of Israel, record the names of all the warriors by their families. List all the men twenty years old or older who are able to go to war.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So there on the plains of Moab beside the Jordan River, across from Jericho, Moses and Eleazar the priest issued these instructions to the leaders of Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“List all the men of Israel twenty years old and older, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: This is the record of all the descendants of Israel who came out of Egypt.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Reuben
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: These were the clans descended from the sons of Reuben, Jacob’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel’s; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 1:20-21b.
    marker-yv: yv-n
  - type: text
    text: ' oldest son:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Hanochite clan, named after their ancestor Hanoch.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Palluite clan, named after their ancestor Pallu.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The Hezronite clan, named after their ancestor Hezron.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Carmite clan, named after their ancestor Carmi.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: These were the clans of Reuben. Their registered troops numbered 43,730.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pallu was the ancestor of Eliab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and Eliab was the father of Nemuel, Dathan, and Abiram. This Dathan and Abiram are the same community leaders who conspired with Korah against Moses and Aaron, rebelling against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the earth opened up its mouth and swallowed them with Korah, and fire devoured 250 of their followers. This served as a warning to the entire nation of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: However, the sons of Korah did not die that day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Simeon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These were the clans descended from the sons of Simeon:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Jemuelite clan, named after their ancestor Jemuel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version (see also Gen 46:10; Exod 6:15); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nemuelite . . . Nemuel.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Jaminite clan, named after their ancestor Jamin.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Jakinite clan, named after their ancestor Jakin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The Zoharite clan, named after their ancestor Zohar.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel texts at Gen 46:10 and Exod 6:15; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zerahite . . . Zerah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shaulite clan, named after their ancestor Shaul.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: These were the clans of Simeon. Their registered troops numbered 22,200.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Gad
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
