  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'These were the clans descended from the sons of Asher:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Imnite clan, named after their ancestor Imnah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Ishvite clan, named after their ancestor Ishvi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Beriite clan, named after their ancestor Beriah.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'These were the subclans descended from the Beriites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Heberites, named after their ancestor Heber.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Malkielites, named after their ancestor Malkiel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
