  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'These were the subclans descended from the Belaites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Ardites, named after their ancestor Ard.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Samaritan Pentateuch, some Greek manuscripts, and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: named after their ancestor Ard.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
