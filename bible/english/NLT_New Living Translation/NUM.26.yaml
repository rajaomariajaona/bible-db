document_id: NUM.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Second Registration of Israel’s Troops
  - type: text
    content: After the plague had ended,
  - type: note
    content: The initial phrase in verse 26:1 is numbered 25:19 in Hebrew text.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and to Eleazar son of Aaron the priest, '
  '10':
  - type: text
    content: 'But the earth opened up its mouth and swallowed them with Korah, and fire devoured 250 of their followers. This served as a warning to the entire nation of Israel. '
  '11':
  - type: text
    content: However, the sons of Korah did not die that day.
  - type: heading
    content: The Tribe of Simeon
  '12':
  - type: text
    content: 'These were the clans descended from the sons of Simeon:'
  - type: text
    content: The Jemuelite clan, named after their ancestor Jemuel.
  - type: note
    content: As in Syriac version (see also Gen 46:10; Exod 6:15); Hebrew reads Nemuelite . . . Nemuel.
  - type: text
    content: The Jaminite clan, named after their ancestor Jamin.
  - type: text
    content: The Jakinite clan, named after their ancestor Jakin.
  '13':
  - type: text
    content: The Zoharite clan, named after their ancestor Zohar.
  - type: note
    content: As in parallel texts at Gen 46:10 and Exod 6:15; Hebrew reads Zerahite . . . Zerah.
  - type: text
    content: The Shaulite clan, named after their ancestor Shaul.
  '14':
  - type: text
    content: These were the clans of Simeon. Their registered troops numbered 22,200.
  - type: heading
    content: The Tribe of Gad
  '15':
  - type: text
    content: 'These were the clans descended from the sons of Gad:'
  - type: text
    content: The Zephonite clan, named after their ancestor Zephon.
  - type: text
    content: The Haggite clan, named after their ancestor Haggi.
  - type: text
    content: The Shunite clan, named after their ancestor Shuni.
  '16':
  - type: text
    content: The Oznite clan, named after their ancestor Ozni.
  - type: text
    content: The Erite clan, named after their ancestor Eri.
  '17':
  - type: text
    content: The Arodite clan, named after their ancestor Arodi.
  - type: note
    content: As in Samaritan Pentateuch and Greek and Syriac versions (see also Gen 46:16); Hebrew reads Arod.
  - type: text
    content: The Arelite clan, named after their ancestor Areli.
  '18':
  - type: text
    content: These were the clans of Gad. Their registered troops numbered 40,500.
  - type: heading
    content: The Tribe of Judah
  '19':
  - type: text
    content: 'Judah had two sons, Er and Onan, who had died in the land of Canaan. '
  '2':
  - type: text
    content: “From the whole community of Israel, record the names of all the warriors by their families. List all the men twenty years old or older who are able to go to war.”
  '20':
  - type: text
    content: 'These were the clans descended from Judah’s surviving sons:'
  - type: text
    content: The Shelanite clan, named after their ancestor Shelah.
  - type: text
    content: The Perezite clan, named after their ancestor Perez.
  - type: text
    content: The Zerahite clan, named after their ancestor Zerah.
  '21':
  - type: text
    content: 'These were the subclans descended from the Perezites:'
  - type: text
    content: The Hezronites, named after their ancestor Hezron.
  - type: text
    content: The Hamulites, named after their ancestor Hamul.
  '22':
  - type: text
    content: These were the clans of Judah. Their registered troops numbered 76,500.
  - type: heading
    content: The Tribe of Issachar
  '23':
  - type: text
    content: 'These were the clans descended from the sons of Issachar:'
  - type: text
    content: The Tolaite clan, named after their ancestor Tola.
  - type: text
    content: The Puite clan, named after their ancestor Puah.
  - type: note
    content: As in Samaritan Pentateuch, Greek and Syriac versions, and Latin Vulgate (see also 1 Chr 7:1); Hebrew reads The Punite clan, named after its ancestor Puvah.
  '24':
  - type: text
    content: The Jashubite clan, named after their ancestor Jashub.
  - type: text
    content: The Shimronite clan, named after their ancestor Shimron.
  '25':
  - type: text
    content: These were the clans of Issachar. Their registered troops numbered 64,300.
  - type: heading
    content: The Tribe of Zebulun
  '26':
  - type: text
    content: 'These were the clans descended from the sons of Zebulun:'
  - type: text
    content: The Seredite clan, named after their ancestor Sered.
  - type: text
    content: The Elonite clan, named after their ancestor Elon.
  - type: text
    content: The Jahleelite clan, named after their ancestor Jahleel.
  '27':
  - type: text
    content: These were the clans of Zebulun. Their registered troops numbered 60,500.
  - type: heading
    content: The Tribe of Manasseh
  '28':
  - type: text
    content: Two clans were descended from Joseph through Manasseh and Ephraim.
  '29':
  - type: text
    content: 'These were the clans descended from Manasseh:'
  - type: text
    content: The Makirite clan, named after their ancestor Makir.
  - type: text
    content: The Gileadite clan, named after their ancestor Gilead, Makir’s son.
  '3':
  - type: text
    content: 'So there on the plains of Moab beside the Jordan River, across from Jericho, Moses and Eleazar the priest issued these instructions to the leaders of Israel: '
  '30':
  - type: text
    content: 'These were the subclans descended from the Gileadites:'
  - type: text
    content: The Iezerites, named after their ancestor Iezer.
  - type: text
    content: The Helekites, named after their ancestor Helek.
  '31':
  - type: text
    content: The Asrielites, named after their ancestor Asriel.
  - type: text
    content: The Shechemites, named after their ancestor Shechem.
  '32':
  - type: text
    content: The Shemidaites, named after their ancestor Shemida.
  - type: text
    content: The Hepherites, named after their ancestor Hepher.
  '33':
  - type: text
    content: (One of Hepher’s descendants, Zelophehad, had no sons, but his daughters’ names were Mahlah, Noah, Hoglah, Milcah, and Tirzah.)
  '34':
  - type: text
    content: These were the clans of Manasseh. Their registered troops numbered 52,700.
  - type: heading
    content: The Tribe of Ephraim
  '35':
  - type: text
    content: 'These were the clans descended from the sons of Ephraim:'
  - type: text
    content: The Shuthelahite clan, named after their ancestor Shuthelah.
  - type: text
    content: The Bekerite clan, named after their ancestor Beker.
  - type: text
    content: The Tahanite clan, named after their ancestor Tahan.
  '36':
  - type: text
    content: 'This was the subclan descended from the Shuthelahites:'
  - type: text
    content: The Eranites, named after their ancestor Eran.
  '37':
  - type: text
    content: These were the clans of Ephraim. Their registered troops numbered 32,500.
  - type: text
    content: These clans of Manasseh and Ephraim were all descendants of Joseph.
  - type: heading
    content: The Tribe of Benjamin
  '38':
  - type: text
    content: 'These were the clans descended from the sons of Benjamin:'
  - type: text
    content: The Belaite clan, named after their ancestor Bela.
  - type: text
    content: The Ashbelite clan, named after their ancestor Ashbel.
  - type: text
    content: The Ahiramite clan, named after their ancestor Ahiram.
  '39':
  - type: text
    content: The Shuphamite clan, named after their ancestor Shupham.
  - type: note
    content: As in some Hebrew manuscripts, Samaritan Pentateuch, Greek and Syriac versions, and Latin Vulgate; most Hebrew manuscripts read Shephupham.
  - type: text
    content: The Huphamite clan, named after their ancestor Hupham.
  '4':
  - type: text
    content: '“List all the men of Israel twenty years old and older, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.”'
  - type: text
    content: This is the record of all the descendants of Israel who came out of Egypt.
  - type: heading
    content: The Tribe of Reuben
  '40':
  - type: text
    content: 'These were the subclans descended from the Belaites:'
  - type: text
    content: The Ardites, named after their ancestor Ard.
  - type: note
    content: As in Samaritan Pentateuch, some Greek manuscripts, and Latin Vulgate; Hebrew lacks named after their ancestor Ard.
  - type: text
    content: The Naamites, named after their ancestor Naaman.
  '41':
  - type: text
    content: These were the clans of Benjamin. Their registered troops numbered 45,600.
  - type: heading
    content: The Tribe of Dan
  '42':
  - type: text
    content: 'These were the clans descended from the sons of Dan:'
  - type: text
    content: The Shuhamite clan, named after their ancestor Shuham.
  '43':
  - type: text
    content: These were the Shuhamite clans of Dan. Their registered troops numbered 64,400.
  - type: heading
    content: The Tribe of Asher
  '44':
  - type: text
    content: 'These were the clans descended from the sons of Asher:'
  - type: text
    content: The Imnite clan, named after their ancestor Imnah.
  - type: text
    content: The Ishvite clan, named after their ancestor Ishvi.
  - type: text
    content: The Beriite clan, named after their ancestor Beriah.
  '45':
  - type: text
    content: 'These were the subclans descended from the Beriites:'
  - type: text
    content: The Heberites, named after their ancestor Heber.
  - type: text
    content: The Malkielites, named after their ancestor Malkiel.
  '46':
  - type: text
    content: Asher also had a daughter named Serah.
  '47':
  - type: text
    content: These were the clans of Asher. Their registered troops numbered 53,400.
  - type: heading
    content: The Tribe of Naphtali
  '48':
  - type: text
    content: 'These were the clans descended from the sons of Naphtali:'
  - type: text
    content: The Jahzeelite clan, named after their ancestor Jahzeel.
  - type: text
    content: The Gunite clan, named after their ancestor Guni.
  '49':
  - type: text
    content: The Jezerite clan, named after their ancestor Jezer.
  - type: text
    content: The Shillemite clan, named after their ancestor Shillem.
  '5':
  - type: text
    content: These were the clans descended from the sons of Reuben, Jacob’s
  - type: note
    content: Hebrew Israel’s; see note on 1:20-21b.
  - type: text
    content: ' oldest son:'
  - type: text
    content: The Hanochite clan, named after their ancestor Hanoch.
  - type: text
    content: The Palluite clan, named after their ancestor Pallu.
  '50':
  - type: text
    content: These were the clans of Naphtali. Their registered troops numbered 45,400.
  - type: heading
    content: Results of the Registration
  '51':
  - type: text
    content: In summary, the registered troops of all Israel numbered 601,730.
  '52':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '53':
  - type: text
    content: '“Divide the land among the tribes, and distribute the grants of land in proportion to the tribes’ populations, as indicated by the number of names on the list. '
  '54':
  - type: text
    content: 'Give the larger tribes more land and the smaller tribes less land, each group receiving a grant in proportion to the size of its population. '
  '55':
  - type: text
    content: 'But you must assign the land by lot, and give land to each ancestral tribe according to the number of names on the list. '
  '56':
  - type: text
    content: Each grant of land must be assigned by lot among the larger and smaller tribal groups.”
  - type: heading
    content: The Tribe of Levi
  '57':
  - type: text
    content: 'This is the record of the Levites who were counted according to their clans:'
  - type: text
    content: The Gershonite clan, named after their ancestor Gershon.
  - type: text
    content: The Kohathite clan, named after their ancestor Kohath.
  - type: text
    content: The Merarite clan, named after their ancestor Merari.
  '58':
  - type: text
    content: The Libnites, the Hebronites, the Mahlites, the Mushites, and the Korahites were all subclans of the Levites.
  - type: text
    content: 'Now Kohath was the ancestor of Amram, '
  '59':
  - type: text
    content: 'and Amram’s wife was named Jochebed. She also was a descendant of Levi, born among the Levites in the land of Egypt. Amram and Jochebed became the parents of Aaron, Moses, and their sister, Miriam. '
  '6':
  - type: text
    content: The Hezronite clan, named after their ancestor Hezron.
  - type: text
    content: The Carmite clan, named after their ancestor Carmi.
  '60':
  - type: text
    content: 'To Aaron were born Nadab, Abihu, Eleazar, and Ithamar. '
  '61':
  - type: text
    content: 'But Nadab and Abihu died when they burned before the '
  - type: text
    content: Lord
  - type: text
    content: ' the wrong kind of fire, different than he had commanded.'
  '62':
  - type: text
    content: The men from the Levite clans who were one month old or older numbered 23,000. But the Levites were not included in the registration of the rest of the people of Israel because they were not given an allotment of land when it was divided among the Israelites.
  '63':
  - type: text
    content: 'So these are the results of the registration of the people of Israel as conducted by Moses and Eleazar the priest on the plains of Moab beside the Jordan River, across from Jericho. '
  '64':
  - type: text
    content: 'Not one person on this list had been among those listed in the previous registration taken by Moses and Aaron in the wilderness of Sinai. '
  '65':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said of them, “They will all die in the wilderness.” Not one of them survived except Caleb son of Jephunneh and Joshua son of Nun.'
  '7':
  - type: text
    content: These were the clans of Reuben. Their registered troops numbered 43,730.
  '8':
  - type: text
    content: 'Pallu was the ancestor of Eliab, '
  '9':
  - type: text
    content: 'and Eliab was the father of Nemuel, Dathan, and Abiram. This Dathan and Abiram are the same community leaders who conspired with Korah against Moses and Aaron, rebelling against the '
  - type: text
    content: Lord
  - type: text
    content: '. '
