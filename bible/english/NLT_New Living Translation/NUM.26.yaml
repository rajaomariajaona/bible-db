  - type: text
    text: 'These were the clans descended from the sons of Gad:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Zephonite clan, named after their ancestor Zephon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Haggite clan, named after their ancestor Haggi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shunite clan, named after their ancestor Shuni.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The Oznite clan, named after their ancestor Ozni.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Erite clan, named after their ancestor Eri.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The Arodite clan, named after their ancestor Arodi.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Samaritan Pentateuch and Greek and Syriac versions (see also Gen 46:16); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Arod.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Arelite clan, named after their ancestor Areli.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These were the clans of Gad. Their registered troops numbered 40,500.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Judah had two sons, Er and Onan, who had died in the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These were the clans descended from Judah’s surviving sons:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shelanite clan, named after their ancestor Shelah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Perezite clan, named after their ancestor Perez.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Zerahite clan, named after their ancestor Zerah.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'These were the subclans descended from the Perezites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Hezronites, named after their ancestor Hezron.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Hamulites, named after their ancestor Hamul.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These were the clans of Judah. Their registered troops numbered 76,500.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Issachar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These were the clans descended from the sons of Issachar:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Tolaite clan, named after their ancestor Tola.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Puite clan, named after their ancestor Puah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Samaritan Pentateuch, Greek and Syriac versions, and Latin Vulgate (see also 1 Chr 7:1); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The Punite clan, named after its ancestor Puvah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The Jashubite clan, named after their ancestor Jashub.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shimronite clan, named after their ancestor Shimron.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These were the clans of Issachar. Their registered troops numbered 64,300.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Zebulun
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'These were the clans descended from the sons of Zebulun:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Seredite clan, named after their ancestor Sered.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Elonite clan, named after their ancestor Elon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Jahleelite clan, named after their ancestor Jahleel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: These were the clans of Zebulun. Their registered troops numbered 60,500.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Manasseh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Two clans were descended from Joseph through Manasseh and Ephraim.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These were the clans descended from Manasseh:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Makirite clan, named after their ancestor Makir.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Gileadite clan, named after their ancestor Gilead, Makir’s son.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'These were the subclans descended from the Gileadites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Iezerites, named after their ancestor Iezer.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Helekites, named after their ancestor Helek.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The Asrielites, named after their ancestor Asriel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Shechemites, named after their ancestor Shechem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The Shemidaites, named after their ancestor Shemida.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Hepherites, named after their ancestor Hepher.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: (One of Hepher’s descendants, Zelophehad, had no sons, but his daughters’ names were Mahlah, Noah, Hoglah, Milcah, and Tirzah.)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: These were the clans of Manasseh. Their registered troops numbered 52,700.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribe of Ephraim
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'These were the clans descended from the sons of Ephraim:'
- type: usfm
  marker: li1
  children:
