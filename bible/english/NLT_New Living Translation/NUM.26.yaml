- type: usfm
  marker: li1
  children:
  - type: text
    text: The Ashbelite clan, named after their ancestor Ashbel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The Ahiramite clan, named after their ancestor Ahiram.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
