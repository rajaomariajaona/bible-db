- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: These were the clans of Asher. Their registered troops numbered 53,400.
- type: usfm
  marker: s1
  children:
  - type: text
