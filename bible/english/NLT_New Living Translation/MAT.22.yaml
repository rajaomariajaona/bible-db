document_id: MAT.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Great Feast
  - type: text
    content: 'Jesus also told them other parables. He said, '
  '10':
  - type: text
    content: So the servants brought in everyone they could find, good and bad alike, and the banquet hall was filled with guests.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “But when the king came in to meet the guests, he noticed a man who wasn’t wearing the proper clothes for a wedding.
  - type: text
    content: ' '
  '12':
  - type: text
    content: ‘Friend,’ he asked, ‘how is it that you are here without wedding clothes?’ But the man had no reply.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then the king said to his aides, ‘Bind his hands and feet and throw him into the outer darkness, where there will be weeping and gnashing of teeth.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “For many are called, but few are chosen.”
  - type: heading
    content: Taxes for Caesar
  '15':
  - type: text
    content: 'Then the Pharisees met together to plot how to trap Jesus into saying something for which he could be arrested. '
  '16':
  - type: text
    content: 'They sent some of their disciples, along with the supporters of Herod, to meet with him. “Teacher,” they said, “we know how honest you are. You teach the way of God truthfully. You are impartial and don’t play favorites. '
  '17':
  - type: text
    content: 'Now tell us what you think about this: Is it right to pay taxes to Caesar or not?”'
  '18':
  - type: text
    content: 'But Jesus knew their evil motives. '
  - type: text
    content: '“You hypocrites!” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Why are you trying to trap me?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Here, show me the coin used for the tax.”
  - type: text
    content: ' When they handed him a Roman coin,'
  - type: note
    content: Greek a denarius.
  - type: text
    content: ' '
  '2':
  - type: text
    content: “The Kingdom of Heaven can be illustrated by the story of a king who prepared a great wedding feast for his son.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'he asked, '
  - type: text
    content: “Whose picture and title are stamped on it?”
  '21':
  - type: text
    content: “Caesar’s,” they replied.
  - type: text
    content: '“Well, then,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “give to Caesar what belongs to Caesar, and give to God what belongs to God.”
  '22':
  - type: text
    content: His reply amazed them, and they went away.
  - type: heading
    content: Discussion about Resurrection
  '23':
  - type: text
    content: 'That same day Jesus was approached by some Sadducees—religious leaders who say there is no resurrection from the dead. They posed this question: '
  '24':
  - type: text
    content: “Teacher, Moses said, ‘If a man dies without children, his brother should marry the widow and have a child who will carry on the brother’s name.’
  - type: note
    content: Deut 25:5-6.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Well, suppose there were seven brothers. The oldest one married and then died without children, so his brother married the widow. '
  '26':
  - type: text
    content: 'But the second brother also died, and the third brother married her. This continued with all seven of them. '
  '27':
  - type: text
    content: 'Last of all, the woman also died. '
  '28':
  - type: text
    content: So tell us, whose wife will she be in the resurrection? For all seven were married to her.”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Your mistake is that you don’t know the Scriptures, and you don’t know the power of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: When the banquet was ready, he sent his servants to notify those who were invited. But they all refused to come!
  '30':
  - type: text
    content: For when the dead rise, they will neither marry nor be given in marriage. In this respect they will be like the angels in heaven.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “But now, as to whether there will be a resurrection of the dead—haven’t you ever read about this in the Scriptures? Long after Abraham, Isaac, and Jacob had died, God said,
  - type: text
    content: ' '
  - type: note
    content: Greek read about this? God said.
  '32':
  - type: text
    content: ‘I am the God of Abraham, the God of Isaac, and the God of Jacob.’
  - type: note
    content: Exod 3:6.
  - type: text
    content: ' '
  - type: text
    content: So he is the God of the living, not the dead.”
  '33':
  - type: text
    content: When the crowds heard him, they were astounded at his teaching.
  - type: heading
    content: The Most Important Commandment
  '34':
  - type: text
    content: 'But when the Pharisees heard that he had silenced the Sadducees with his reply, they met together to question him again. '
  '35':
  - type: text
    content: 'One of them, an expert in religious law, tried to trap him with this question: '
  '36':
  - type: text
    content: “Teacher, which is the most important commandment in the law of Moses?”
  '37':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“‘You must love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart, all your soul, and all your mind.’'
  - type: note
    content: Deut 6:5.
  - type: text
    content: ' '
  '38':
  - type: text
    content: This is the first and greatest commandment.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'A second is equally important: ‘Love your neighbor as yourself.’'
  - type: note
    content: Lev 19:18.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: “So he sent other servants to tell them, ‘The feast has been prepared. The bulls and fattened cattle have been killed, and everything is ready. Come to the banquet!’
  - type: text
    content: ' '
  '40':
  - type: text
    content: The entire law and all the demands of the prophets are based on these two commandments.”
  - type: heading
    content: Whose Son Is the Messiah?
  '41':
  - type: text
    content: 'Then, surrounded by the Pharisees, Jesus asked them a question: '
  '42':
  - type: text
    content: “What do you think about the Messiah? Whose son is he?”
  - type: text
    content: They replied, “He is the son of David.”
  '43':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Then why does David, speaking under the inspiration of the Spirit, call the Messiah ‘my Lord’? For David said,
  '44':
  - type: text
    content: ' '
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: Sit in the place of honor at my right hand
  - type: text
    content: until I humble your enemies beneath your feet.’
  - type: note
    content: Ps 110:1.
  '45':
  - type: text
    content: ' '
  - type: text
    content: Since David called the Messiah ‘my Lord,’ how can the Messiah be his son?”
  '46':
  - type: text
    content: No one could answer him. And after that, no one dared to ask him any more questions.
  '5':
  - type: text
    content: But the guests he had invited ignored them and went their own way, one to his farm, another to his business.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Others seized his messengers and insulted them and killed them.
  '7':
  - type: text
    content: ' '
  - type: text
    content: “The king was furious, and he sent out his army to destroy the murderers and burn their town.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And he said to his servants, ‘The wedding feast is ready, and the guests I invited aren’t worthy of the honor.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Now go out to the street corners and invite everyone you see.’
  - type: text
    content: ' '
