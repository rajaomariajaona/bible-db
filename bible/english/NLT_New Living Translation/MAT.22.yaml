document_id: MAT.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parable of the Great Feast
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus also told them other parables. He said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the servants brought in everyone they could find, good and bad alike, and the banquet hall was filled with guests.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But when the king came in to meet the guests, he noticed a man who wasn’t wearing the proper clothes for a wedding.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Friend,’ he asked, ‘how is it that you are here without wedding clothes?’ But the man had no reply.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then the king said to his aides, ‘Bind his hands and feet and throw him into the outer darkness, where there will be weeping and gnashing of teeth.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For many are called, but few are chosen.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Taxes for Caesar
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the Pharisees met together to plot how to trap Jesus into saying something for which he could be arrested. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They sent some of their disciples, along with the supporters of Herod, to meet with him. “Teacher,” they said, “we know how honest you are. You teach the way of God truthfully. You are impartial and don’t play favorites. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now tell us what you think about this: Is it right to pay taxes to Caesar or not?”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus knew their evil motives. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You hypocrites!” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you trying to trap me?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Here, show me the coin used for the tax.”
    - type: text
      text: ' When they handed him a Roman coin,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a denarius.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Kingdom of Heaven can be illustrated by the story of a king who prepared a great wedding feast for his son.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whose picture and title are stamped on it?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Caesar’s,” they replied.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Well, then,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “give to Caesar what belongs to Caesar, and give to God what belongs to God.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His reply amazed them, and they went away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discussion about Resurrection
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That same day Jesus was approached by some Sadducees—religious leaders who say there is no resurrection from the dead. They posed this question: '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Teacher, Moses said, ‘If a man dies without children, his brother should marry the widow and have a child who will carry on the brother’s name.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 25:5-6.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Well, suppose there were seven brothers. The oldest one married and then died without children, so his brother married the widow. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the second brother also died, and the third brother married her. This continued with all seven of them. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Last of all, the woman also died. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So tell us, whose wife will she be in the resurrection? For all seven were married to her.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your mistake is that you don’t know the Scriptures, and you don’t know the power of God.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When the banquet was ready, he sent his servants to notify those who were invited. But they all refused to come!
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For when the dead rise, they will neither marry nor be given in marriage. In this respect they will be like the angels in heaven.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But now, as to whether there will be a resurrection of the dead—haven’t you ever read about this in the Scriptures? Long after Abraham, Isaac, and Jacob had died, God said,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: read about this? God said.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am the God of Abraham, the God of Isaac, and the God of Jacob.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 3:6.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So he is the God of the living, not the dead.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the crowds heard him, they were astounded at his teaching.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Most Important Commandment
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when the Pharisees heard that he had silenced the Sadducees with his reply, they met together to question him again. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One of them, an expert in religious law, tried to trap him with this question: '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Teacher, which is the most important commandment in the law of Moses?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“‘You must love the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' your God with all your heart, all your soul, and all your mind.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 6:5.
      marker-yv: yv-n
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the first and greatest commandment.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A second is equally important: ‘Love your neighbor as yourself.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev 19:18.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So he sent other servants to tell them, ‘The feast has been prepared. The bulls and fattened cattle have been killed, and everything is ready. Come to the banquet!’
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The entire law and all the demands of the prophets are based on these two commandments.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Whose Son Is the Messiah?
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then, surrounded by the Pharisees, Jesus asked them a question: '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you think about the Messiah? Whose son is he?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “He is the son of David.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then why does David, speaking under the inspiration of the Spirit, call the Messiah ‘my Lord’? For David said,
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' said to my Lord,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sit in the place of honor at my right hand
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: until I humble your enemies beneath your feet.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 110:1.
      marker-yv: yv-n
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Since David called the Messiah ‘my Lord,’ how can the Messiah be his son?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one could answer him. And after that, no one dared to ask him any more questions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the guests he had invited ignored them and went their own way, one to his farm, another to his business.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Others seized his messengers and insulted them and killed them.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The king was furious, and he sent out his army to destroy the murderers and burn their town.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he said to his servants, ‘The wedding feast is ready, and the guests I invited aren’t worthy of the honor.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now go out to the street corners and invite everyone you see.’
    - type: text
      text: ' '
