document_id: PSA.100,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of thanksgiving.
  - type: text
    content: 'Shout with joy to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth!'
  '2':
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' with gladness.'
  - type: text
    content: Come before him, singing with joy.
  '3':
  - type: text
    content: 'Acknowledge that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God!'
  - type: text
    content: He made us, and we are his.
  - type: note
    content: As in an alternate reading in the Masoretic Text; the other alternate and some ancient versions read and not we ourselves.
  - type: text
    content: We are his people, the sheep of his pasture.
  '4':
  - type: text
    content: Enter his gates with thanksgiving;
  - type: text
    content: go into his courts with praise.
  - type: text
    content: Give thanks to him and praise his name.
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is good.'
  - type: text
    content: His unfailing love continues forever,
  - type: text
    content: and his faithfulness continues to each generation.
