document_id: PSA.119,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is a Hebrew acrostic poem; there are twenty-two stanzas, one for each successive letter of the Hebrew alphabet. Each of the eight verses within each stanza begins with the Hebrew letter named in its heading.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Joyful are people of integrity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who follow the instructions of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I have tried hard to find you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t let me wander from your commands.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: I am even wiser than my elders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have kept your commandments.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: I have refused to walk on any evil path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I may remain obedient to your word.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: I haven’t turned away from your regulations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you have taught me well.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: How sweet your words taste to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are sweeter than honey.
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: Your commandments give me understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no wonder I hate every false way of life.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Nun
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: Your word is a lamp to guide my feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a light for my path.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: 'I’ve promised it once, and I’ll promise it again:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will obey your righteous regulations.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: 'I have suffered much, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: restore my life again as you promised.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', accept my offering of praise,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach me your regulations.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: My life constantly hangs in the balance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will not stop obeying your instructions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I have hidden your word in my heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I might not sin against you.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: The wicked have set their traps for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will not turn from your commandments.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: Your laws are my treasure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are my heart’s delight.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: I am determined to keep your decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the very end.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Samekh
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: I hate those with divided loyalties,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I love your instructions.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: You are my refuge and my shield;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your word is my source of hope.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: Get out of my life, you evil-minded people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I intend to obey the commands of my God.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', sustain me as you promised, that I may live!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not let my hope be crushed.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: Sustain me, and I will be rescued;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I will meditate continually on your decrees.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: But you have rejected all who stray from your decrees.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are only fooling themselves.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: You skim off the wicked of the earth like scum;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no wonder I love to obey your laws!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I praise you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your decrees.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: I tremble in fear of you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand in awe of your regulations.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Ayin
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: Don’t leave me to the mercy of my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have done what is just and right.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: Please guarantee a blessing for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let the arrogant oppress me!
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: My eyes strain to see your rescue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to see the truth of your promise fulfilled.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: I am your servant; deal with me in unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach me your decrees.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: Give discernment to me, your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I will understand your laws.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', it is time for you to act,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for these evil people have violated your instructions.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: Truly, I love your commands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than gold, even the finest gold.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: Each of your commandments is right.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That is why I hate every false way.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Pe
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: Your laws are wonderful.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No wonder I obey them!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I have recited aloud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the regulations you have given us.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: The teaching of your word gives light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so even the simple can understand.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: I pant with expectation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: longing for your commands.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Come and show me your mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you do for all who love your name.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: Guide my steps by your word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I will not be overcome by evil.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: Ransom me from the oppression of evil people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I can obey your commandments.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: Look upon me with love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your decrees.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: Rivers of tears gush from my eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because people disobey your instructions.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Tsadhe
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you are righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your regulations are fair.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: Your laws are perfect
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and completely trustworthy.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: I am overwhelmed with indignation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my enemies have disregarded your words.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I have rejoiced in your laws
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as much as in riches.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: Your promises have been thoroughly tested;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is why I love them so much.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: I am insignificant and despised,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t forget your commandments.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: Your justice is eternal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your instructions are perfectly true.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: As pressure and stress bear down on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I find joy in your commands.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '144'
    - type: text
      text: Your laws are always right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: help me to understand them so I may live.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Qoph
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '145'
    - type: text
      text: 'I pray with all my heart; answer me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will obey your decrees.
  '146':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '146'
    - type: text
      text: I cry out to you; rescue me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may obey your laws.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '147'
    - type: text
      text: I rise early, before the sun is up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cry out for help and put my hope in your words.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '148'
    - type: text
      text: I stay awake through the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thinking about your promise.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '149'
    - type: text
      text: 'In your faithful love, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear my cry;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me be revived by following your regulations.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will study your commandments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reflect on your ways.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '150'
    - type: text
      text: Lawless people are coming to attack me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they live far from your instructions.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '151'
    - type: text
      text: 'But you are near, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your commands are true.
  '152':
  - type: usfm
    marker: q1
    children:
