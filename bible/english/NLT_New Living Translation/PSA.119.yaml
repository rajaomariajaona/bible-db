document_id: PSA.119
type_code: eng
segments:
- type: usfm
  marker: qa
  children:
  - type: text
    text: Aleph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is a Hebrew acrostic poem; there are twenty-two stanzas, one for each successive letter of the Hebrew alphabet. Each of the eight verses within each stanza begins with the Hebrew letter named in its heading.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Joyful are people of integrity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who follow the instructions of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Joyful are those who obey his laws
- type: usfm
  marker: q2
  children:
  - type: text
    text: and search for him with all their hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They do not compromise with evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they walk only in his paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have charged us
- type: usfm
  marker: q2
  children:
  - type: text
    text: to keep your commandments carefully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oh, that my actions would consistently
- type: usfm
  marker: q2
  children:
  - type: text
    text: reflect your decrees!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then I will not be ashamed
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I compare my life with your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As I learn your righteous regulations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will thank you by living as I should!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will obey your decrees.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Please don’t give up on me!
- type: usfm
  marker: qa
  children:
  - type: text
    text: Beth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: How can a young person stay pure?
- type: usfm
  marker: q2
  children:
  - type: text
    text: By obeying your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have tried hard to find you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let me wander from your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I have hidden your word in my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I might not sin against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I praise you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I have recited aloud
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the regulations you have given us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have rejoiced in your laws
- type: usfm
  marker: q2
  children:
  - type: text
    text: as much as in riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will study your commandments
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reflect on your ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will delight in your decrees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not forget your word.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Gimel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Be good to your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may live and obey your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Open my eyes to see
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wonderful truths in your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am only a foreigner in the land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t hide your commands from me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I am always overwhelmed
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a desire for your regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You rebuke the arrogant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who wander from your commands are cursed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t let them scorn and insult me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have obeyed your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Even princes sit and speak against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will meditate on your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Your laws please me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they give me wise advice.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Daleth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I lie in the dust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: revive me by your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I told you my plans, and you answered.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Help me understand the meaning of your commandments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will meditate on your wonderful deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I weep with sorrow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: encourage me by your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Keep me from lying to myself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me the privilege of knowing your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I have chosen to be faithful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have determined to live by your regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I cling to your laws.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', don’t let me be put to shame!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I will pursue your commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you expand my understanding.
- type: usfm
  marker: qa
  children:
  - type: text
    text: He
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Teach me your decrees, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will keep them to the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Give me understanding and I will obey your instructions;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will put them into practice with all my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Make me walk along the path of your commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for that is where my happiness is found.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Give me an eagerness for your laws
- type: usfm
  marker: q2
  children:
  - type: text
    text: rather than a love for money!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Turn my eyes from worthless things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give me life through your word.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in your ways.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Reassure me of your promise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made to those who fear you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Help me abandon my shameful ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your regulations are good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: I long to obey your commandments!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Renew my life with your goodness.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Waw
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', give me your unfailing love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the salvation that you promised me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Then I can answer those who taunt me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I trust in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Do not snatch your word of truth from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your regulations are my only hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: I will keep on obeying your instructions
- type: usfm
  marker: q2
  children:
  - type: text
    text: forever and ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: I will walk in freedom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have devoted myself to your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: I will speak to kings about your laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will not be ashamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: How I delight in your commands!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How I love them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: I honor and love your commands.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I meditate on your decrees.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Zayin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Remember your promise to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is my only hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Your promise revives me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it comforts me in all my troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: The proud hold me in utter contempt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I do not turn away from your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: I meditate on your age-old regulations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', they comfort me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: I become furious with the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they reject your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Your decrees have been the theme of my songs
- type: usfm
  marker: q2
  children:
  - type: text
    text: wherever I have lived.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'I reflect at night on who you are, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore, I obey your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'This is how I spend my life:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: obeying your commandments.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Heth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are mine!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I promise to obey your words!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: With all my heart I want your blessings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be merciful as you promised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: I pondered the direction of my life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I turned to follow your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: I will hurry, without delay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to obey your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Evil people try to drag me into sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I am firmly anchored to your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: I rise at midnight to thank you
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your just regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: I am a friend to anyone who fears you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: anyone who obeys your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your unfailing love fills the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Teth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'You have done many good things for me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as you promised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: I believe in your commands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: now teach me good judgment and knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: I used to wander off until you disciplined me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but now I closely follow your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: You are good and do only good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Arrogant people smear me with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in truth I obey your commandments with all my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Their hearts are dull and stupid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I delight in your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: My suffering was good for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it taught me to pay attention to your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Your instructions are more valuable to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: than millions in gold and silver.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Yodh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: You made me; you created me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now give me the sense to follow your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: May all who fear you find in me a cause for joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'I know, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that your regulations are fair;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you disciplined me because I needed it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: Now let your unfailing love comfort me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as you promised me, your servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: Surround me with your tender mercies so I may live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your instructions are my delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Bring disgrace upon the arrogant people who lied about me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: meanwhile, I will concentrate on your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: Let me be united with all who fear you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those who know your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: May I be blameless in keeping your decrees;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I will never be ashamed.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Kaph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '81'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: I am worn out waiting for your rescue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '82'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: My eyes are straining to see your promises come true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you comfort me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '83'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: I am shriveled like a wineskin in the smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I have not forgotten to obey your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '84'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: How long must I wait?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you punish those who persecute me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '85'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: These arrogant people who hate your instructions
- type: usfm
  marker: q2
  children:
  - type: text
    text: have dug deep pits to trap me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '86'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: All your commands are trustworthy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Protect me from those who hunt me down without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '87'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: They almost finished me off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I refused to abandon your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '88'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: In your unfailing love, spare my life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I can continue to obey your laws.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Lamedh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '89'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: 'Your eternal word, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: stands firm in heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '90'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '90'
  - type: text
    text: Your faithfulness extends to every generation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as enduring as the earth you created.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '91'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '91'
  - type: text
    text: Your regulations remain true to this day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for everything serves your plans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '92'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '92'
  - type: text
    text: If your instructions hadn’t sustained me with joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would have died in my misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '93'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '93'
  - type: text
    text: I will never forget your commandments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for by them you give me life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '94'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '94'
  - type: text
    text: I am yours; rescue me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I have worked hard at obeying your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '95'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '95'
  - type: text
    text: Though the wicked hide along the way to kill me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will quietly keep my mind on your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '96'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '96'
  - type: text
    text: Even perfection has its limits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your commands have no limit.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Mem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '97'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '97'
  - type: text
    text: Oh, how I love your instructions!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I think about them all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '98'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '98'
  - type: text
    text: Your commands make me wiser than my enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they are my constant guide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '99'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '99'
  - type: text
    text: Yes, I have more insight than my teachers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am always thinking of your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '100'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '100'
  - type: text
    text: I am even wiser than my elders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have kept your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '101'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '101'
  - type: text
    text: I have refused to walk on any evil path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that I may remain obedient to your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '102'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '102'
  - type: text
    text: I haven’t turned away from your regulations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have taught me well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '103'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '103'
  - type: text
    text: How sweet your words taste to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are sweeter than honey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '104'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '104'
  - type: text
    text: Your commandments give me understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no wonder I hate every false way of life.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Nun
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '105'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '105'
  - type: text
    text: Your word is a lamp to guide my feet
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a light for my path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '106'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '106'
  - type: text
    text: 'I’ve promised it once, and I’ll promise it again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will obey your righteous regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '107'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '107'
  - type: text
    text: 'I have suffered much, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: restore my life again as you promised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '108'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '108'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', accept my offering of praise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach me your regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '109'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '109'
  - type: text
    text: My life constantly hangs in the balance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will not stop obeying your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '110'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '110'
  - type: text
    text: The wicked have set their traps for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will not turn from your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '111'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '111'
  - type: text
    text: Your laws are my treasure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are my heart’s delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '112'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '112'
  - type: text
    text: I am determined to keep your decrees
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the very end.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Samekh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '113'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '113'
  - type: text
    text: I hate those with divided loyalties,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I love your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '114'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '114'
  - type: text
    text: You are my refuge and my shield;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your word is my source of hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '115'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '115'
  - type: text
    text: Get out of my life, you evil-minded people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I intend to obey the commands of my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '116'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '116'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', sustain me as you promised, that I may live!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not let my hope be crushed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '117'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '117'
  - type: text
    text: Sustain me, and I will be rescued;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I will meditate continually on your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '118'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '118'
  - type: text
    text: But you have rejected all who stray from your decrees.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are only fooling themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '119'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '119'
  - type: text
    text: You skim off the wicked of the earth like scum;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no wonder I love to obey your laws!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '120'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '120'
  - type: text
    text: I tremble in fear of you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand in awe of your regulations.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Ayin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '121'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '121'
  - type: text
    text: Don’t leave me to the mercy of my enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have done what is just and right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '122'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '122'
  - type: text
    text: Please guarantee a blessing for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let the arrogant oppress me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '123'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '123'
  - type: text
    text: My eyes strain to see your rescue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to see the truth of your promise fulfilled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '124'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '124'
  - type: text
    text: I am your servant; deal with me in unfailing love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '125'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '125'
  - type: text
    text: Give discernment to me, your servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I will understand your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '126'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '126'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', it is time for you to act,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for these evil people have violated your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '127'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '127'
  - type: text
    text: Truly, I love your commands
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than gold, even the finest gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '128'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '128'
  - type: text
    text: Each of your commandments is right.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That is why I hate every false way.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Pe
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '129'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '129'
  - type: text
    text: Your laws are wonderful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No wonder I obey them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '130'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '130'
  - type: text
    text: The teaching of your word gives light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so even the simple can understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '131'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '131'
  - type: text
    text: I pant with expectation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: longing for your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '132'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '132'
  - type: text
    text: Come and show me your mercy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as you do for all who love your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '133'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '133'
  - type: text
    text: Guide my steps by your word,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I will not be overcome by evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '134'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '134'
  - type: text
    text: Ransom me from the oppression of evil people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I can obey your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '135'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '135'
  - type: text
    text: Look upon me with love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '136'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '136'
  - type: text
    text: Rivers of tears gush from my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: because people disobey your instructions.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Tsadhe
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '137'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '137'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are righteous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your regulations are fair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '138'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '138'
  - type: text
    text: Your laws are perfect
- type: usfm
  marker: q2
  children:
  - type: text
    text: and completely trustworthy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '139'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '139'
  - type: text
    text: I am overwhelmed with indignation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my enemies have disregarded your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '140'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '140'
  - type: text
    text: Your promises have been thoroughly tested;
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is why I love them so much.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '141'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '141'
  - type: text
    text: I am insignificant and despised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I don’t forget your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '142'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '142'
  - type: text
    text: Your justice is eternal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your instructions are perfectly true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '143'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '143'
  - type: text
    text: As pressure and stress bear down on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I find joy in your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '144'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '144'
  - type: text
    text: Your laws are always right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: help me to understand them so I may live.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Qoph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '145'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '145'
  - type: text
    text: 'I pray with all my heart; answer me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will obey your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '146'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '146'
  - type: text
    text: I cry out to you; rescue me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may obey your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '147'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '147'
  - type: text
    text: I rise early, before the sun is up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry out for help and put my hope in your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '148'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '148'
  - type: text
    text: I stay awake through the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thinking about your promise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '149'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '149'
  - type: text
    text: 'In your faithful love, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', hear my cry;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me be revived by following your regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '150'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '150'
  - type: text
    text: Lawless people are coming to attack me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they live far from your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '151'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '151'
  - type: text
    text: 'But you are near, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your commands are true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '152'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '152'
  - type: text
    text: I have known from my earliest days
- type: usfm
  marker: q2
  children:
  - type: text
    text: that your laws will last forever.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Resh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '153'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '153'
  - type: text
    text: Look upon my suffering and rescue me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have not forgotten your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '154'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '154'
  - type: text
    text: Argue my case; take my side!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Protect my life as you promised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '155'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '155'
  - type: text
    text: The wicked are far from rescue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they do not bother with your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '156'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '156'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', how great is your mercy;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me be revived by following your regulations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '157'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '157'
  - type: text
    text: Many persecute and trouble me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet I have not swerved from your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '158'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '158'
  - type: text
    text: Seeing these traitors makes me sick at heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they care nothing for your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '159'
  - type: usfm
    marker: vlbl
    children:
