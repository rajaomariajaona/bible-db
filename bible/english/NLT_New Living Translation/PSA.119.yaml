document_id: PSA.119,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Aleph
  - type: note
    content: This psalm is a Hebrew acrostic poem; there are twenty-two stanzas, one for each successive letter of the Hebrew alphabet. Each of the eight verses within each stanza begins with the Hebrew letter named in its heading.
  - type: text
    content: Joyful are people of integrity,
  - type: text
    content: 'who follow the instructions of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: I have tried hard to find you—
  - type: text
    content: don’t let me wander from your commands.
  '100':
  - type: text
    content: I am even wiser than my elders,
  - type: text
    content: for I have kept your commandments.
  '101':
  - type: text
    content: I have refused to walk on any evil path,
  - type: text
    content: so that I may remain obedient to your word.
  '102':
  - type: text
    content: I haven’t turned away from your regulations,
  - type: text
    content: for you have taught me well.
  '103':
  - type: text
    content: How sweet your words taste to me;
  - type: text
    content: they are sweeter than honey.
  '104':
  - type: text
    content: Your commandments give me understanding;
  - type: text
    content: no wonder I hate every false way of life.
  - type: heading
    content: Nun
  '105':
  - type: text
    content: Your word is a lamp to guide my feet
  - type: text
    content: and a light for my path.
  '106':
  - type: text
    content: 'I’ve promised it once, and I’ll promise it again:'
  - type: text
    content: I will obey your righteous regulations.
  '107':
  - type: text
    content: 'I have suffered much, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: restore my life again as you promised.
  '108':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', accept my offering of praise,'
  - type: text
    content: and teach me your regulations.
  '109':
  - type: text
    content: My life constantly hangs in the balance,
  - type: text
    content: but I will not stop obeying your instructions.
  '11':
  - type: text
    content: I have hidden your word in my heart,
  - type: text
    content: that I might not sin against you.
  '110':
  - type: text
    content: The wicked have set their traps for me,
  - type: text
    content: but I will not turn from your commandments.
  '111':
  - type: text
    content: Your laws are my treasure;
  - type: text
    content: they are my heart’s delight.
  '112':
  - type: text
    content: I am determined to keep your decrees
  - type: text
    content: to the very end.
  - type: heading
    content: Samekh
  '113':
  - type: text
    content: I hate those with divided loyalties,
  - type: text
    content: but I love your instructions.
  '114':
  - type: text
    content: You are my refuge and my shield;
  - type: text
    content: your word is my source of hope.
  '115':
  - type: text
    content: Get out of my life, you evil-minded people,
  - type: text
    content: for I intend to obey the commands of my God.
  '116':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', sustain me as you promised, that I may live!'
  - type: text
    content: Do not let my hope be crushed.
  '117':
  - type: text
    content: Sustain me, and I will be rescued;
  - type: text
    content: then I will meditate continually on your decrees.
  '118':
  - type: text
    content: But you have rejected all who stray from your decrees.
  - type: text
    content: They are only fooling themselves.
  '119':
  - type: text
    content: You skim off the wicked of the earth like scum;
  - type: text
    content: no wonder I love to obey your laws!
  '12':
  - type: text
    content: 'I praise you, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: teach me your decrees.
  '120':
  - type: text
    content: I tremble in fear of you;
  - type: text
    content: I stand in awe of your regulations.
  - type: heading
    content: Ayin
  '121':
  - type: text
    content: Don’t leave me to the mercy of my enemies,
  - type: text
    content: for I have done what is just and right.
  '122':
  - type: text
    content: Please guarantee a blessing for me.
  - type: text
    content: Don’t let the arrogant oppress me!
  '123':
  - type: text
    content: My eyes strain to see your rescue,
  - type: text
    content: to see the truth of your promise fulfilled.
  '124':
  - type: text
    content: I am your servant; deal with me in unfailing love,
  - type: text
    content: and teach me your decrees.
  '125':
  - type: text
    content: Give discernment to me, your servant;
  - type: text
    content: then I will understand your laws.
  '126':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', it is time for you to act,'
  - type: text
    content: for these evil people have violated your instructions.
  '127':
  - type: text
    content: Truly, I love your commands
  - type: text
    content: more than gold, even the finest gold.
  '128':
  - type: text
    content: Each of your commandments is right.
  - type: text
    content: That is why I hate every false way.
  - type: heading
    content: Pe
  '129':
  - type: text
    content: Your laws are wonderful.
  - type: text
    content: No wonder I obey them!
  '13':
  - type: text
    content: I have recited aloud
  - type: text
    content: all the regulations you have given us.
  '130':
  - type: text
    content: The teaching of your word gives light,
  - type: text
    content: so even the simple can understand.
  '131':
  - type: text
    content: I pant with expectation,
  - type: text
    content: longing for your commands.
  '132':
  - type: text
    content: Come and show me your mercy,
  - type: text
    content: as you do for all who love your name.
  '133':
  - type: text
    content: Guide my steps by your word,
  - type: text
    content: so I will not be overcome by evil.
  '134':
  - type: text
    content: Ransom me from the oppression of evil people;
  - type: text
    content: then I can obey your commandments.
  '135':
  - type: text
    content: Look upon me with love;
  - type: text
    content: teach me your decrees.
  '136':
  - type: text
    content: Rivers of tears gush from my eyes
  - type: text
    content: because people disobey your instructions.
  - type: heading
    content: Tsadhe
  '137':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you are righteous,'
  - type: text
    content: and your regulations are fair.
  '138':
  - type: text
    content: Your laws are perfect
  - type: text
    content: and completely trustworthy.
  '139':
  - type: text
    content: I am overwhelmed with indignation,
  - type: text
    content: for my enemies have disregarded your words.
  '14':
  - type: text
    content: I have rejoiced in your laws
  - type: text
    content: as much as in riches.
  '140':
  - type: text
    content: Your promises have been thoroughly tested;
  - type: text
    content: that is why I love them so much.
  '141':
  - type: text
    content: I am insignificant and despised,
  - type: text
    content: but I don’t forget your commandments.
  '142':
  - type: text
    content: Your justice is eternal,
  - type: text
    content: and your instructions are perfectly true.
  '143':
  - type: text
    content: As pressure and stress bear down on me,
  - type: text
    content: I find joy in your commands.
  '144':
  - type: text
    content: Your laws are always right;
  - type: text
    content: help me to understand them so I may live.
  - type: heading
    content: Qoph
  '145':
  - type: text
    content: 'I pray with all my heart; answer me, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: I will obey your decrees.
  '146':
  - type: text
    content: I cry out to you; rescue me,
  - type: text
    content: that I may obey your laws.
  '147':
  - type: text
    content: I rise early, before the sun is up;
  - type: text
    content: I cry out for help and put my hope in your words.
  '148':
  - type: text
    content: I stay awake through the night,
  - type: text
    content: thinking about your promise.
  '149':
  - type: text
    content: 'In your faithful love, O '
  - type: text
    content: Lord
  - type: text
    content: ', hear my cry;'
  - type: text
    content: let me be revived by following your regulations.
  '15':
  - type: text
    content: I will study your commandments
  - type: text
    content: and reflect on your ways.
  '150':
  - type: text
    content: Lawless people are coming to attack me;
  - type: text
    content: they live far from your instructions.
  '151':
  - type: text
    content: 'But you are near, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and all your commands are true.
  '152':
  - type: text
    content: I have known from my earliest days
  - type: text
    content: that your laws will last forever.
  - type: heading
    content: Resh
  '153':
  - type: text
    content: Look upon my suffering and rescue me,
  - type: text
    content: for I have not forgotten your instructions.
  '154':
  - type: text
    content: Argue my case; take my side!
  - type: text
    content: Protect my life as you promised.
  '155':
  - type: text
    content: The wicked are far from rescue,
  - type: text
    content: for they do not bother with your decrees.
  '156':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', how great is your mercy;'
  - type: text
    content: let me be revived by following your regulations.
  '157':
  - type: text
    content: Many persecute and trouble me,
  - type: text
    content: yet I have not swerved from your laws.
  '158':
  - type: text
    content: Seeing these traitors makes me sick at heart,
  - type: text
    content: because they care nothing for your word.
  '159':
  - type: text
    content: 'See how I love your commandments, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Give back my life because of your unfailing love.
  '16':
  - type: text
    content: I will delight in your decrees
  - type: text
    content: and not forget your word.
  - type: heading
    content: Gimel
  '160':
  - type: text
    content: The very essence of your words is truth;
  - type: text
    content: all your just regulations will stand forever.
  - type: heading
    content: Shin
  '161':
  - type: text
    content: Powerful people harass me without cause,
  - type: text
    content: but my heart trembles only at your word.
  '162':
  - type: text
    content: I rejoice in your word
  - type: text
    content: like one who discovers a great treasure.
  '163':
  - type: text
    content: I hate and abhor all falsehood,
  - type: text
    content: but I love your instructions.
  '164':
  - type: text
    content: I will praise you seven times a day
  - type: text
    content: because all your regulations are just.
  '165':
  - type: text
    content: Those who love your instructions have great peace
  - type: text
    content: and do not stumble.
  '166':
  - type: text
    content: 'I long for your rescue, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: so I have obeyed your commands.
  '167':
  - type: text
    content: I have obeyed your laws,
  - type: text
    content: for I love them very much.
  '168':
  - type: text
    content: Yes, I obey your commandments and laws
  - type: text
    content: because you know everything I do.
  - type: heading
    content: Taw
  '169':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', listen to my cry;'
  - type: text
    content: give me the discerning mind you promised.
  '17':
  - type: text
    content: Be good to your servant,
  - type: text
    content: that I may live and obey your word.
  '170':
  - type: text
    content: Listen to my prayer;
  - type: text
    content: rescue me as you promised.
  '171':
  - type: text
    content: Let praise flow from my lips,
  - type: text
    content: for you have taught me your decrees.
  '172':
  - type: text
    content: Let my tongue sing about your word,
  - type: text
    content: for all your commands are right.
  '173':
  - type: text
    content: Give me a helping hand,
  - type: text
    content: for I have chosen to follow your commandments.
  '174':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I have longed for your rescue,'
  - type: text
    content: and your instructions are my delight.
  '175':
  - type: text
    content: Let me live so I can praise you,
  - type: text
    content: and may your regulations help me.
  '176':
  - type: text
    content: I have wandered away like a lost sheep;
  - type: text
    content: come and find me,
  - type: text
    content: for I have not forgotten your commands.
  '18':
  - type: text
    content: Open my eyes to see
  - type: text
    content: the wonderful truths in your instructions.
  '19':
  - type: text
    content: I am only a foreigner in the land.
  - type: text
    content: Don’t hide your commands from me!
  '2':
  - type: text
    content: Joyful are those who obey his laws
  - type: text
    content: and search for him with all their hearts.
  '20':
  - type: text
    content: I am always overwhelmed
  - type: text
    content: with a desire for your regulations.
  '21':
  - type: text
    content: You rebuke the arrogant;
  - type: text
    content: those who wander from your commands are cursed.
  '22':
  - type: text
    content: Don’t let them scorn and insult me,
  - type: text
    content: for I have obeyed your laws.
  '23':
  - type: text
    content: Even princes sit and speak against me,
  - type: text
    content: but I will meditate on your decrees.
  '24':
  - type: text
    content: Your laws please me;
  - type: text
    content: they give me wise advice.
  - type: heading
    content: Daleth
  '25':
  - type: text
    content: I lie in the dust;
  - type: text
    content: revive me by your word.
  '26':
  - type: text
    content: I told you my plans, and you answered.
  - type: text
    content: Now teach me your decrees.
  '27':
  - type: text
    content: Help me understand the meaning of your commandments,
  - type: text
    content: and I will meditate on your wonderful deeds.
  '28':
  - type: text
    content: I weep with sorrow;
  - type: text
    content: encourage me by your word.
  '29':
  - type: text
    content: Keep me from lying to myself;
  - type: text
    content: give me the privilege of knowing your instructions.
  '3':
  - type: text
    content: They do not compromise with evil,
  - type: text
    content: and they walk only in his paths.
  '30':
  - type: text
    content: I have chosen to be faithful;
  - type: text
    content: I have determined to live by your regulations.
  '31':
  - type: text
    content: I cling to your laws.
  - type: text
    content: Lord
  - type: text
    content: ', don’t let me be put to shame!'
  '32':
  - type: text
    content: I will pursue your commands,
  - type: text
    content: for you expand my understanding.
  - type: heading
    content: He
  '33':
  - type: text
    content: 'Teach me your decrees, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I will keep them to the end.
  '34':
  - type: text
    content: Give me understanding and I will obey your instructions;
  - type: text
    content: I will put them into practice with all my heart.
  '35':
  - type: text
    content: Make me walk along the path of your commands,
  - type: text
    content: for that is where my happiness is found.
  '36':
  - type: text
    content: Give me an eagerness for your laws
  - type: text
    content: rather than a love for money!
  '37':
  - type: text
    content: Turn my eyes from worthless things,
  - type: text
    content: and give me life through your word.
  - type: note
    content: Some manuscripts read in your ways.
  '38':
  - type: text
    content: Reassure me of your promise,
  - type: text
    content: made to those who fear you.
  '39':
  - type: text
    content: Help me abandon my shameful ways;
  - type: text
    content: for your regulations are good.
  '4':
  - type: text
    content: You have charged us
  - type: text
    content: to keep your commandments carefully.
  '40':
  - type: text
    content: I long to obey your commandments!
  - type: text
    content: Renew my life with your goodness.
  - type: heading
    content: Waw
  '41':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', give me your unfailing love,'
  - type: text
    content: the salvation that you promised me.
  '42':
  - type: text
    content: Then I can answer those who taunt me,
  - type: text
    content: for I trust in your word.
  '43':
  - type: text
    content: Do not snatch your word of truth from me,
  - type: text
    content: for your regulations are my only hope.
  '44':
  - type: text
    content: I will keep on obeying your instructions
  - type: text
    content: forever and ever.
  '45':
  - type: text
    content: I will walk in freedom,
  - type: text
    content: for I have devoted myself to your commandments.
  '46':
  - type: text
    content: I will speak to kings about your laws,
  - type: text
    content: and I will not be ashamed.
  '47':
  - type: text
    content: How I delight in your commands!
  - type: text
    content: How I love them!
  '48':
  - type: text
    content: I honor and love your commands.
  - type: text
    content: I meditate on your decrees.
  - type: heading
    content: Zayin
  '49':
  - type: text
    content: Remember your promise to me;
  - type: text
    content: it is my only hope.
  '5':
  - type: text
    content: Oh, that my actions would consistently
  - type: text
    content: reflect your decrees!
  '50':
  - type: text
    content: Your promise revives me;
  - type: text
    content: it comforts me in all my troubles.
  '51':
  - type: text
    content: The proud hold me in utter contempt,
  - type: text
    content: but I do not turn away from your instructions.
  '52':
  - type: text
    content: I meditate on your age-old regulations;
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', they comfort me.'
  '53':
  - type: text
    content: I become furious with the wicked,
  - type: text
    content: because they reject your instructions.
  '54':
  - type: text
    content: Your decrees have been the theme of my songs
  - type: text
    content: wherever I have lived.
  '55':
  - type: text
    content: 'I reflect at night on who you are, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: therefore, I obey your instructions.
  '56':
  - type: text
    content: 'This is how I spend my life:'
  - type: text
    content: obeying your commandments.
  - type: heading
    content: Heth
  '57':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are mine!'
  - type: text
    content: I promise to obey your words!
  '58':
  - type: text
    content: With all my heart I want your blessings.
  - type: text
    content: Be merciful as you promised.
  '59':
  - type: text
    content: I pondered the direction of my life,
  - type: text
    content: and I turned to follow your laws.
  '6':
  - type: text
    content: Then I will not be ashamed
  - type: text
    content: when I compare my life with your commands.
  '60':
  - type: text
    content: I will hurry, without delay,
  - type: text
    content: to obey your commands.
  '61':
  - type: text
    content: Evil people try to drag me into sin,
  - type: text
    content: but I am firmly anchored to your instructions.
  '62':
  - type: text
    content: I rise at midnight to thank you
  - type: text
    content: for your just regulations.
  '63':
  - type: text
    content: I am a friend to anyone who fears you—
  - type: text
    content: anyone who obeys your commandments.
  '64':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', your unfailing love fills the earth;'
  - type: text
    content: teach me your decrees.
  - type: heading
    content: Teth
  '65':
  - type: text
    content: 'You have done many good things for me, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: just as you promised.
  '66':
  - type: text
    content: I believe in your commands;
  - type: text
    content: now teach me good judgment and knowledge.
  '67':
  - type: text
    content: I used to wander off until you disciplined me;
  - type: text
    content: but now I closely follow your word.
  '68':
  - type: text
    content: You are good and do only good;
  - type: text
    content: teach me your decrees.
  '69':
  - type: text
    content: Arrogant people smear me with lies,
  - type: text
    content: but in truth I obey your commandments with all my heart.
  '7':
  - type: text
    content: As I learn your righteous regulations,
  - type: text
    content: I will thank you by living as I should!
  '70':
  - type: text
    content: Their hearts are dull and stupid,
  - type: text
    content: but I delight in your instructions.
  '71':
  - type: text
    content: My suffering was good for me,
  - type: text
    content: for it taught me to pay attention to your decrees.
  '72':
  - type: text
    content: Your instructions are more valuable to me
  - type: text
    content: than millions in gold and silver.
  - type: heading
    content: Yodh
  '73':
  - type: text
    content: You made me; you created me.
  - type: text
    content: Now give me the sense to follow your commands.
  '74':
  - type: text
    content: May all who fear you find in me a cause for joy,
  - type: text
    content: for I have put my hope in your word.
  '75':
  - type: text
    content: 'I know, O '
  - type: text
    content: Lord
  - type: text
    content: ', that your regulations are fair;'
  - type: text
    content: you disciplined me because I needed it.
  '76':
  - type: text
    content: Now let your unfailing love comfort me,
  - type: text
    content: just as you promised me, your servant.
  '77':
  - type: text
    content: Surround me with your tender mercies so I may live,
  - type: text
    content: for your instructions are my delight.
  '78':
  - type: text
    content: Bring disgrace upon the arrogant people who lied about me;
  - type: text
    content: meanwhile, I will concentrate on your commandments.
  '79':
  - type: text
    content: Let me be united with all who fear you,
  - type: text
    content: with those who know your laws.
  '8':
  - type: text
    content: I will obey your decrees.
  - type: text
    content: Please don’t give up on me!
  - type: heading
    content: Beth
  '80':
  - type: text
    content: May I be blameless in keeping your decrees;
  - type: text
    content: then I will never be ashamed.
  - type: heading
    content: Kaph
  '81':
  - type: text
    content: I am worn out waiting for your rescue,
  - type: text
    content: but I have put my hope in your word.
  '82':
  - type: text
    content: My eyes are straining to see your promises come true.
  - type: text
    content: When will you comfort me?
  '83':
  - type: text
    content: I am shriveled like a wineskin in the smoke,
  - type: text
    content: but I have not forgotten to obey your decrees.
  '84':
  - type: text
    content: How long must I wait?
  - type: text
    content: When will you punish those who persecute me?
  '85':
  - type: text
    content: These arrogant people who hate your instructions
  - type: text
    content: have dug deep pits to trap me.
  '86':
  - type: text
    content: All your commands are trustworthy.
  - type: text
    content: Protect me from those who hunt me down without cause.
  '87':
  - type: text
    content: They almost finished me off,
  - type: text
    content: but I refused to abandon your commandments.
  '88':
  - type: text
    content: In your unfailing love, spare my life;
  - type: text
    content: then I can continue to obey your laws.
  - type: heading
    content: Lamedh
  '89':
  - type: text
    content: 'Your eternal word, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: stands firm in heaven.
  '9':
  - type: text
    content: How can a young person stay pure?
  - type: text
    content: By obeying your word.
  '90':
  - type: text
    content: Your faithfulness extends to every generation,
  - type: text
    content: as enduring as the earth you created.
  '91':
  - type: text
    content: Your regulations remain true to this day,
  - type: text
    content: for everything serves your plans.
  '92':
  - type: text
    content: If your instructions hadn’t sustained me with joy,
  - type: text
    content: I would have died in my misery.
  '93':
  - type: text
    content: I will never forget your commandments,
  - type: text
    content: for by them you give me life.
  '94':
  - type: text
    content: I am yours; rescue me!
  - type: text
    content: For I have worked hard at obeying your commandments.
  '95':
  - type: text
    content: Though the wicked hide along the way to kill me,
  - type: text
    content: I will quietly keep my mind on your laws.
  '96':
  - type: text
    content: Even perfection has its limits,
  - type: text
    content: but your commands have no limit.
  - type: heading
    content: Mem
  '97':
  - type: text
    content: Oh, how I love your instructions!
  - type: text
    content: I think about them all day long.
  '98':
  - type: text
    content: Your commands make me wiser than my enemies,
  - type: text
    content: for they are my constant guide.
  '99':
  - type: text
    content: Yes, I have more insight than my teachers,
  - type: text
    content: for I am always thinking of your laws.
