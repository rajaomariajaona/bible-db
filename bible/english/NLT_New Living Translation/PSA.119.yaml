    - type: text
      text: I will never forget your commandments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for by them you give me life.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '94'
    - type: text
      text: I am yours; rescue me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I have worked hard at obeying your commandments.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '95'
    - type: text
      text: Though the wicked hide along the way to kill me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will quietly keep my mind on your laws.
  '96':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '96'
    - type: text
      text: Even perfection has its limits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but your commands have no limit.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Mem
    marker-yv: yv-h
  '97':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '97'
    - type: text
      text: Oh, how I love your instructions!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I think about them all day long.
  '98':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '98'
    - type: text
      text: Your commands make me wiser than my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they are my constant guide.
  '99':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '99'
    - type: text
      text: Yes, I have more insight than my teachers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am always thinking of your laws.
