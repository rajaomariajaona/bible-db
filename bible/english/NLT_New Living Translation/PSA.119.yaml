        text: '48'
    - type: text
      text: I honor and love your commands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I meditate on your decrees.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Zayin
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Remember your promise to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is my only hope.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oh, that my actions would consistently
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reflect your decrees!
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Your promise revives me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it comforts me in all my troubles.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: The proud hold me in utter contempt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I do not turn away from your instructions.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: I meditate on your age-old regulations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they comfort me.'
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: I become furious with the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they reject your instructions.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Your decrees have been the theme of my songs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wherever I have lived.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'I reflect at night on who you are, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore, I obey your instructions.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'This is how I spend my life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: obeying your commandments.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Heth
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you are mine!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I promise to obey your words!
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: With all my heart I want your blessings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be merciful as you promised.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: I pondered the direction of my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I turned to follow your laws.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then I will not be ashamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I compare my life with your commands.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: I will hurry, without delay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to obey your commands.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Evil people try to drag me into sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I am firmly anchored to your instructions.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: I rise at midnight to thank you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your just regulations.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: I am a friend to anyone who fears you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anyone who obeys your commandments.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your unfailing love fills the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your decrees.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Teth
    marker-yv: yv-h
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'You have done many good things for me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as you promised.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: I believe in your commands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now teach me good judgment and knowledge.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: I used to wander off until you disciplined me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now I closely follow your word.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: You are good and do only good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your decrees.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: Arrogant people smear me with lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but in truth I obey your commandments with all my heart.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: As I learn your righteous regulations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will thank you by living as I should!
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: Their hearts are dull and stupid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I delight in your instructions.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: My suffering was good for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it taught me to pay attention to your decrees.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: Your instructions are more valuable to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than millions in gold and silver.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Yodh
    marker-yv: yv-h
  '73':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: You made me; you created me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now give me the sense to follow your commands.
  '74':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '74'
    - type: text
      text: May all who fear you find in me a cause for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have put my hope in your word.
  '75':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '75'
    - type: text
      text: 'I know, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that your regulations are fair;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you disciplined me because I needed it.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '76'
    - type: text
      text: Now let your unfailing love comfort me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as you promised me, your servant.
  '77':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '77'
    - type: text
      text: Surround me with your tender mercies so I may live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your instructions are my delight.
  '78':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '78'
    - type: text
      text: Bring disgrace upon the arrogant people who lied about me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: meanwhile, I will concentrate on your commandments.
  '79':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '79'
    - type: text
      text: Let me be united with all who fear you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with those who know your laws.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will obey your decrees.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Please don’t give up on me!
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Beth
    marker-yv: yv-h
  '80':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '80'
    - type: text
      text: May I be blameless in keeping your decrees;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I will never be ashamed.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Kaph
    marker-yv: yv-h
  '81':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '81'
    - type: text
      text: I am worn out waiting for your rescue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I have put my hope in your word.
  '82':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '82'
    - type: text
      text: My eyes are straining to see your promises come true.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will you comfort me?
  '83':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '83'
    - type: text
      text: I am shriveled like a wineskin in the smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I have not forgotten to obey your decrees.
  '84':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '84'
    - type: text
      text: How long must I wait?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will you punish those who persecute me?
  '85':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '85'
    - type: text
      text: These arrogant people who hate your instructions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have dug deep pits to trap me.
  '86':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '86'
    - type: text
      text: All your commands are trustworthy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Protect me from those who hunt me down without cause.
  '87':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '87'
    - type: text
      text: They almost finished me off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I refused to abandon your commandments.
  '88':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '88'
    - type: text
      text: In your unfailing love, spare my life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I can continue to obey your laws.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: Lamedh
    marker-yv: yv-h
  '89':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '89'
    - type: text
      text: 'Your eternal word, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stands firm in heaven.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How can a young person stay pure?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By obeying your word.
  '90':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '90'
    - type: text
      text: Your faithfulness extends to every generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as enduring as the earth you created.
  '91':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '91'
    - type: text
      text: Your regulations remain true to this day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for everything serves your plans.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '92'
    - type: text
      text: If your instructions hadn’t sustained me with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would have died in my misery.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
