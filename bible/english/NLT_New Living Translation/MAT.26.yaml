document_id: MAT.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Plot to Kill Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Jesus had finished saying all these things, he said to his disciples, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As you know, Passover begins in two days, and the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be handed over to be crucified.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'At that same time the leading priests and elders were meeting at the residence of Caiaphas, the high priest, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'plotting how to capture Jesus secretly and kill him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “But not during the Passover celebration,” they agreed, “or the people may riot.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Anointed at Bethany
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Meanwhile, Jesus was in Bethany at the home of Simon, a man who had previously had leprosy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: While he was eating,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: reclining.
    marker-yv: yv-n
  - type: text
    text: ' a woman came in with a beautiful alabaster jar of expensive perfume and poured it over his head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The disciples were indignant when they saw this. “What a waste!” they said. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “It could have been sold for a high price and the money given to the poor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Jesus, aware of this, replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why criticize this woman for doing such a good thing to me?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will always have the poor among you, but you will not always have me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: She has poured this perfume on me to prepare my body for burial.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you the truth, wherever the Good News is preached throughout the world, this woman’s deed will be remembered and discussed.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Agrees to Betray Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Judas Iscariot, one of the twelve disciples, went to the leading priests '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and asked, “How much will you pay me to betray Jesus to you?” And they gave him thirty pieces of silver. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: From that time on, Judas began looking for an opportunity to betray Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Last Supper
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On the first day of the Festival of Unleavened Bread, the disciples came to Jesus and asked, “Where do you want us to prepare the Passover meal for you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“As you go into the city,” '
  - type: text
    text: 'he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“you will see a certain man. Tell him, ‘The Teacher says: My time has come, and I will eat the Passover meal with my disciples at your house.’”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So the disciples did as Jesus told them and prepared the Passover meal there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When it was evening, Jesus sat down at the table
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus reclined.
    marker-yv: yv-n
  - type: text
    text: ' with the Twelve. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'While they were eating, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, one of you will betray me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Greatly distressed, each one asked in turn, “Am I the one, Lord?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “One of you who has just eaten from this bowl with me will betray me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of Man must die, as the Scriptures declared long ago. But how terrible it will be for the one who betrays him. It would be far better for that man if he had never been born!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Judas, the one who would betray him, also asked, “Rabbi, am I the one?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'As they were eating, Jesus took some bread and blessed it. Then he broke it in pieces and gave it to the disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take this and eat it, for this is my body.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he took a cup of wine and gave thanks to God for it. He gave it to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Each of you drink from it,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for this is my blood, which confirms the covenant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the new covenant.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: between God and his people. It is poured out as a sacrifice to forgive the sins of many.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mark my words—I will not drink wine again until the day I drink it new with you in my Father’s Kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then they sang a hymn and went out to the Mount of Olives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On the way, Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Tonight all of you will desert me. For the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘God will strike
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I will strike. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech 13:7.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Shepherd,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the sheep of the flock will be scattered.’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But after I have been raised from the dead, I will go ahead of you to Galilee and meet you there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Peter declared, “Even if everyone else deserts you, I will never desert you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, Peter—this very night, before the rooster crows, you will deny three times that you even know me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “No!” Peter insisted. “Even if I have to die with you, I will never deny you!” And all the other disciples vowed the same.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prays in Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then Jesus went with them to the olive grove called Gethsemane, and he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Sit here while I go over there to pray.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He took Peter and Zebedee’s two sons, James and John, and he became anguished and distressed. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My soul is crushed with grief to the point of death. Stay here and keep watch with me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'He went on a little farther and bowed with his face to the ground, praying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father! If it is possible, let this cup of suffering be taken away from me. Yet I want your will to be done, not mine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then he returned to the disciples and found them asleep. He said to Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Couldn’t you watch with me even one hour?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Keep watch and pray, so that you will not give in to temptation. For the spirit is willing, but the body is weak!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then Jesus left them a second time and prayed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father! If this cup cannot be taken away
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: If this cannot pass.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: unless I drink it, your will be done.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: When he returned to them again, he found them sleeping, for they couldn’t keep their eyes open.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'So he went to pray a third time, saying the same things again. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then he came to the disciples and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go ahead and sleep. Have your rest. But look—the time has come. The Son of Man is betrayed into the hands of sinners.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Up, let’s be going. Look, my betrayer is here!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Betrayed and Arrested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And even as Jesus said this, Judas, one of the twelve disciples, arrived with a crowd of men armed with swords and clubs. They had been sent by the leading priests and elders of the people. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'The traitor, Judas, had given them a prearranged signal: “You will know which one to arrest when I greet him with a kiss.” '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: So Judas came straight to Jesus. “Greetings, Rabbi!” he exclaimed and gave him the kiss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My friend, go ahead and do what you have come for.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then the others grabbed Jesus and arrested him. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: But one of the men with Jesus pulled out his sword and struck the high priest’s slave, slashing off his ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Put away your sword,” '
  - type: text
    text: 'Jesus told him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Those who use the sword will die by the sword.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t you realize that I could ask my Father for thousands
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: twelve legions.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of angels to protect us, and he would send them instantly?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if I did, how would the Scriptures be fulfilled that describe what must happen now?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Then Jesus said to the crowd, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Am I some dangerous revolutionary, that you come with swords and clubs to arrest me? Why didn’t you arrest me in the Temple? I was there teaching every day.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But this is all happening to fulfill the words of the prophets as recorded in the Scriptures.”
  - type: text
    text: ' At that point, all the disciples deserted him and fled.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus before the Council
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Then the people who had arrested Jesus led him to the home of Caiaphas, the high priest, where the teachers of religious law and the elders had gathered. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Meanwhile, Peter followed him at a distance and came to the high priest’s courtyard. He went in and sat with the guards and waited to see how it would all end.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Inside, the leading priests and the entire high council
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:59 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Sanhedrin.
    marker-yv: yv-n
  - type: text
    text: ' were trying to find witnesses who would lie about Jesus, so they could put him to death. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'But even though they found many who agreed to give false witness, they could not use anyone’s testimony. Finally, two men came forward '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: who declared, “This man said, ‘I am able to destroy the Temple of God and rebuild it in three days.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Then the high priest stood up and said to Jesus, “Well, aren’t you going to answer these charges? What do you have to say for yourself?” '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: But Jesus remained silent. Then the high priest said to him, “I demand in the name of the living God—tell us if you are the Messiah, the Son of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said it. And in the future you will see the Son of Man seated in the place of power at God’s right hand
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:64a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seated at the right hand of the power. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Ps 110:1.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and coming on the clouds of heaven.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:64b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Dan 7:13.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Then the high priest tore his clothing to show his horror and said, “Blasphemy! Why do we need other witnesses? You have all heard his blasphemy. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: What is your verdict?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Guilty!” they shouted. “He deserves to die!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Then they began to spit in Jesus’ face and beat him with their fists. And some slapped him, '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: jeering, “Prophesy to us, you Messiah! Who hit you that time?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Denies Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Meanwhile, Peter was sitting outside in the courtyard. A servant girl came over and said to him, “You were one of those with Jesus the Galilean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: But Peter denied it in front of everyone. “I don’t know what you’re talking about,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Later, out by the gate, another servant girl noticed him and said to those standing around, “This man was with Jesus of Nazareth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:71 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus the Nazarene.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Again Peter denied it, this time with an oath. “I don’t even know the man,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: A little later some of the other bystanders came over to Peter and said, “You must be one of them; we can tell by your Galilean accent.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: Peter swore, “A curse on me if I’m lying—I don’t know the man!” And immediately the rooster crowed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Suddenly, Jesus’ words flashed through Peter’s mind: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Before the rooster crows, you will deny three times that you even know me.”
  - type: text
    text: ' And he went away, weeping bitterly.'
