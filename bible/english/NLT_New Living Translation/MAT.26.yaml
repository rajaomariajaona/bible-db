document_id: MAT.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plot to Kill Jesus
  - type: text
    content: 'When Jesus had finished saying all these things, he said to his disciples, '
  '10':
  - type: text
    content: 'But Jesus, aware of this, replied, '
  - type: text
    content: “Why criticize this woman for doing such a good thing to me?
  - type: text
    content: ' '
  '11':
  - type: text
    content: You will always have the poor among you, but you will not always have me.
  - type: text
    content: ' '
  '12':
  - type: text
    content: She has poured this perfume on me to prepare my body for burial.
  - type: text
    content: ' '
  '13':
  - type: text
    content: I tell you the truth, wherever the Good News is preached throughout the world, this woman’s deed will be remembered and discussed.”
  - type: heading
    content: Judas Agrees to Betray Jesus
  '14':
  - type: text
    content: 'Then Judas Iscariot, one of the twelve disciples, went to the leading priests '
  '15':
  - type: text
    content: 'and asked, “How much will you pay me to betray Jesus to you?” And they gave him thirty pieces of silver. '
  '16':
  - type: text
    content: From that time on, Judas began looking for an opportunity to betray Jesus.
  - type: heading
    content: The Last Supper
  '17':
  - type: text
    content: On the first day of the Festival of Unleavened Bread, the disciples came to Jesus and asked, “Where do you want us to prepare the Passover meal for you?”
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“As you go into the city,” '
  - type: text
    content: 'he told them, '
  - type: text
    content: '“you will see a certain man. Tell him, ‘The Teacher says: My time has come, and I will eat the Passover meal with my disciples at your house.’”'
  - type: text
    content: ' '
  '19':
  - type: text
    content: So the disciples did as Jesus told them and prepared the Passover meal there.
  '2':
  - type: text
    content: “As you know, Passover begins in two days, and the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: will be handed over to be crucified.”
  '20':
  - type: text
    content: When it was evening, Jesus sat down at the table
  - type: note
    content: Or Jesus reclined.
  - type: text
    content: ' with the Twelve. '
  '21':
  - type: text
    content: 'While they were eating, he said, '
  - type: text
    content: “I tell you the truth, one of you will betray me.”
  '22':
  - type: text
    content: Greatly distressed, each one asked in turn, “Am I the one, Lord?”
  '23':
  - type: text
    content: 'He replied, '
  - type: text
    content: “One of you who has just eaten from this bowl with me will betray me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For the Son of Man must die, as the Scriptures declared long ago. But how terrible it will be for the one who betrays him. It would be far better for that man if he had never been born!”
  '25':
  - type: text
    content: Judas, the one who would betray him, also asked, “Rabbi, am I the one?”
  - type: text
    content: 'And Jesus told him, '
  - type: text
    content: “You have said it.”
  '26':
  - type: text
    content: 'As they were eating, Jesus took some bread and blessed it. Then he broke it in pieces and gave it to the disciples, saying, '
  - type: text
    content: “Take this and eat it, for this is my body.”
  '27':
  - type: text
    content: 'And he took a cup of wine and gave thanks to God for it. He gave it to them and said, '
  - type: text
    content: “Each of you drink from it,
  - type: text
    content: ' '
  '28':
  - type: text
    content: for this is my blood, which confirms the covenant
  - type: note
    content: Some manuscripts read the new covenant.
  - type: text
    content: ' '
  - type: text
    content: between God and his people. It is poured out as a sacrifice to forgive the sins of many.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Mark my words—I will not drink wine again until the day I drink it new with you in my Father’s Kingdom.”
  '3':
  - type: text
    content: 'At that same time the leading priests and elders were meeting at the residence of Caiaphas, the high priest, '
  '30':
  - type: text
    content: Then they sang a hymn and went out to the Mount of Olives.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'On the way, Jesus told them, '
  - type: text
    content: “Tonight all of you will desert me. For the Scriptures say,
  - type: text
    content: ‘God will strike
  - type: text
    content: ' '
  - type: note
    content: Greek I will strike. Zech 13:7.
  - type: text
    content: the Shepherd,
  - type: text
    content: and the sheep of the flock will be scattered.’
  '32':
  - type: text
    content: ' '
  - type: text
    content: But after I have been raised from the dead, I will go ahead of you to Galilee and meet you there.”
  '33':
  - type: text
    content: Peter declared, “Even if everyone else deserts you, I will never desert you.”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I tell you the truth, Peter—this very night, before the rooster crows, you will deny three times that you even know me.”
  '35':
  - type: text
    content: “No!” Peter insisted. “Even if I have to die with you, I will never deny you!” And all the other disciples vowed the same.
  - type: heading
    content: Jesus Prays in Gethsemane
  '36':
  - type: text
    content: 'Then Jesus went with them to the olive grove called Gethsemane, and he said, '
  - type: text
    content: “Sit here while I go over there to pray.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'He took Peter and Zebedee’s two sons, James and John, and he became anguished and distressed. '
  '38':
  - type: text
    content: 'He told them, '
  - type: text
    content: “My soul is crushed with grief to the point of death. Stay here and keep watch with me.”
  '39':
  - type: text
    content: 'He went on a little farther and bowed with his face to the ground, praying, '
  - type: text
    content: “My Father! If it is possible, let this cup of suffering be taken away from me. Yet I want your will to be done, not mine.”
  '4':
  - type: text
    content: 'plotting how to capture Jesus secretly and kill him. '
  '40':
  - type: text
    content: 'Then he returned to the disciples and found them asleep. He said to Peter, '
  - type: text
    content: “Couldn’t you watch with me even one hour?
  - type: text
    content: ' '
  '41':
  - type: text
    content: Keep watch and pray, so that you will not give in to temptation. For the spirit is willing, but the body is weak!”
  '42':
  - type: text
    content: 'Then Jesus left them a second time and prayed, '
  - type: text
    content: “My Father! If this cup cannot be taken away
  - type: note
    content: Greek If this cannot pass.
  - type: text
    content: ' '
  - type: text
    content: unless I drink it, your will be done.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: When he returned to them again, he found them sleeping, for they couldn’t keep their eyes open.
  '44':
  - type: text
    content: 'So he went to pray a third time, saying the same things again. '
  '45':
  - type: text
    content: 'Then he came to the disciples and said, '
  - type: text
    content: “Go ahead and sleep. Have your rest. But look—the time has come. The Son of Man is betrayed into the hands of sinners.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Up, let’s be going. Look, my betrayer is here!”
  - type: heading
    content: Jesus Is Betrayed and Arrested
  '47':
  - type: text
    content: 'And even as Jesus said this, Judas, one of the twelve disciples, arrived with a crowd of men armed with swords and clubs. They had been sent by the leading priests and elders of the people. '
  '48':
  - type: text
    content: 'The traitor, Judas, had given them a prearranged signal: “You will know which one to arrest when I greet him with a kiss.” '
  '49':
  - type: text
    content: So Judas came straight to Jesus. “Greetings, Rabbi!” he exclaimed and gave him the kiss.
  '5':
  - type: text
    content: “But not during the Passover celebration,” they agreed, “or the people may riot.”
  - type: heading
    content: Jesus Anointed at Bethany
  '50':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “My friend, go ahead and do what you have come for.”
  - type: text
    content: 'Then the others grabbed Jesus and arrested him. '
  '51':
  - type: text
    content: But one of the men with Jesus pulled out his sword and struck the high priest’s slave, slashing off his ear.
  '52':
  - type: text
    content: ' '
  - type: text
    content: '“Put away your sword,” '
  - type: text
    content: 'Jesus told him. '
  - type: text
    content: “Those who use the sword will die by the sword.
  - type: text
    content: ' '
  '53':
  - type: text
    content: Don’t you realize that I could ask my Father for thousands
  - type: note
    content: Greek twelve legions.
  - type: text
    content: ' '
  - type: text
    content: of angels to protect us, and he would send them instantly?
  - type: text
    content: ' '
  '54':
  - type: text
    content: But if I did, how would the Scriptures be fulfilled that describe what must happen now?”
  '55':
  - type: text
    content: 'Then Jesus said to the crowd, '
  - type: text
    content: “Am I some dangerous revolutionary, that you come with swords and clubs to arrest me? Why didn’t you arrest me in the Temple? I was there teaching every day.
  - type: text
    content: ' '
  '56':
  - type: text
    content: But this is all happening to fulfill the words of the prophets as recorded in the Scriptures.”
  - type: text
    content: ' At that point, all the disciples deserted him and fled.'
  - type: heading
    content: Jesus before the Council
  '57':
  - type: text
    content: 'Then the people who had arrested Jesus led him to the home of Caiaphas, the high priest, where the teachers of religious law and the elders had gathered. '
  '58':
  - type: text
    content: Meanwhile, Peter followed him at a distance and came to the high priest’s courtyard. He went in and sat with the guards and waited to see how it would all end.
  '59':
  - type: text
    content: Inside, the leading priests and the entire high council
  - type: note
    content: Greek the Sanhedrin.
  - type: text
    content: ' were trying to find witnesses who would lie about Jesus, so they could put him to death. '
  '6':
  - type: text
    content: 'Meanwhile, Jesus was in Bethany at the home of Simon, a man who had previously had leprosy. '
  '60':
  - type: text
    content: 'But even though they found many who agreed to give false witness, they could not use anyone’s testimony. Finally, two men came forward '
  '61':
  - type: text
    content: who declared, “This man said, ‘I am able to destroy the Temple of God and rebuild it in three days.’”
  '62':
  - type: text
    content: 'Then the high priest stood up and said to Jesus, “Well, aren’t you going to answer these charges? What do you have to say for yourself?” '
  '63':
  - type: text
    content: But Jesus remained silent. Then the high priest said to him, “I demand in the name of the living God—tell us if you are the Messiah, the Son of God.”
  '64':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You have said it. And in the future you will see the Son of Man seated in the place of power at God’s right hand
  - type: note
    content: Greek seated at the right hand of the power. See Ps 110:1.
  - type: text
    content: ' '
  - type: text
    content: and coming on the clouds of heaven.”
  - type: note
    content: See Dan 7:13.
  '65':
  - type: text
    content: 'Then the high priest tore his clothing to show his horror and said, “Blasphemy! Why do we need other witnesses? You have all heard his blasphemy. '
  '66':
  - type: text
    content: What is your verdict?”
  - type: text
    content: “Guilty!” they shouted. “He deserves to die!”
  '67':
  - type: text
    content: 'Then they began to spit in Jesus’ face and beat him with their fists. And some slapped him, '
  '68':
  - type: text
    content: jeering, “Prophesy to us, you Messiah! Who hit you that time?”
  - type: heading
    content: Peter Denies Jesus
  '69':
  - type: text
    content: Meanwhile, Peter was sitting outside in the courtyard. A servant girl came over and said to him, “You were one of those with Jesus the Galilean.”
  '7':
  - type: text
    content: While he was eating,
  - type: note
    content: Or reclining.
  - type: text
    content: ' a woman came in with a beautiful alabaster jar of expensive perfume and poured it over his head.'
  '70':
  - type: text
    content: But Peter denied it in front of everyone. “I don’t know what you’re talking about,” he said.
  '71':
  - type: text
    content: Later, out by the gate, another servant girl noticed him and said to those standing around, “This man was with Jesus of Nazareth.
  - type: note
    content: Or Jesus the Nazarene.
  - type: text
    content: ”
  '72':
  - type: text
    content: Again Peter denied it, this time with an oath. “I don’t even know the man,” he said.
  '73':
  - type: text
    content: A little later some of the other bystanders came over to Peter and said, “You must be one of them; we can tell by your Galilean accent.”
  '74':
  - type: text
    content: Peter swore, “A curse on me if I’m lying—I don’t know the man!” And immediately the rooster crowed.
  '75':
  - type: text
    content: 'Suddenly, Jesus’ words flashed through Peter’s mind: '
  - type: text
    content: “Before the rooster crows, you will deny three times that you even know me.”
  - type: text
    content: ' And he went away, weeping bitterly.'
  '8':
  - type: text
    content: 'The disciples were indignant when they saw this. “What a waste!” they said. '
  '9':
  - type: text
    content: “It could have been sold for a high price and the money given to the poor.”
