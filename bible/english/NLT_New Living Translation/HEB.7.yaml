document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melchizedek Is Greater Than Abraham
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This Melchizedek was king of the city of Salem and also a priest of God Most High. When Abraham was returning home after winning a great battle against the kings, Melchizedek met him and blessed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Abraham took a tenth of all he had captured in battle and gave it to Melchizedek. The name Melchizedek means “king of justice,” and king of Salem means “king of peace.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There is no record of his father or mother or any of his ancestors—no beginning or end to his life. He remains a priest forever, resembling the Son of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Consider then how great this Melchizedek was. Even Abraham, the great patriarch of Israel, recognized this by giving him a tenth of what he had taken in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now the law of Moses required that the priests, who are descendants of Levi, must collect a tithe from the rest of the people of Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from their brothers.
    marker-yv: yv-n
  - type: text
    text: ' who are also descendants of Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Melchizedek, who was not a descendant of Levi, collected a tenth from Abraham. And Melchizedek placed a blessing upon Abraham, the one who had already received the promises of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And without question, the person who has the power to give a blessing is greater than the one who is blessed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The priests who collect tithes are men who die, so Melchizedek is greater than they are, because we are told that he lives on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In addition, we might even say that these Levites—the ones who collect the tithe—paid a tithe to Melchizedek when their ancestor Abraham paid a tithe to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For although Levi wasn’t born yet, the seed from which he came was in Abraham’s body when Melchizedek collected the tithe from him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So if the priesthood of Levi, on which the law was based, could have achieved the perfection God intended, why did God need to establish a different priesthood, with a priest in the order of Melchizedek instead of the order of Levi and Aaron?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the order of Aaron?
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And if the priesthood is changed, the law must also be changed to permit it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the priest we are talking about belongs to a different tribe, whose members have never served at the altar as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: What I mean is, our Lord came from the tribe of Judah, and Moses never mentioned priests coming from that tribe.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is like Melchizedek
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This change has been made very clear since a different priest, who is like Melchizedek, has appeared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus became a priest, not by meeting the physical requirement of belonging to the tribe of Levi, but by the power of a life that cannot be destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the psalmist pointed this out when he prophesied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are a priest forever in the order of Melchizedek.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:4.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yes, the old requirement about the priesthood was set aside because it was weak and useless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For the law never made anything perfect. But now we have confidence in a better hope, through which we draw near to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This new system was established with a solemn oath. Aaron’s descendants became priests without such an oath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: but there was an oath regarding Jesus. For God said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has taken an oath and will not break his vow:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You are a priest forever.’”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:4.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Because of this oath, Jesus is the one who guarantees this better covenant with God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'There were many priests under the old system, for death prevented them from remaining in office. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But because Jesus lives forever, his priesthood lasts forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Therefore he is able, once and forever, to save
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is able to save completely.
    marker-yv: yv-n
  - type: text
    text: ' those who come to God through him. He lives forever to intercede with God on their behalf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He is the kind of high priest we need because he is holy and blameless, unstained by sin. He has been set apart from sinners and has been given the highest place of honor in heaven.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: has been exalted higher than the heavens.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Unlike those other high priests, he does not need to offer sacrifices every day. They did this for their own sins first and then for the sins of the people. But Jesus did this once for all when he offered himself as the sacrifice for the people’s sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The law appointed high priests who were limited by human weakness. But after the law was given, God appointed his Son with an oath, and his Son has been made the perfect High Priest forever.
