document_id: JHN.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and His Brothers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this, Jesus traveled around Galilee. He wanted to stay out of Judea, where the Jewish leaders were plotting his death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But soon it was time for the Jewish Festival of Shelters, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and Jesus’ brothers said to him, “Leave here and go to Judea, where your followers can see your miracles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You can’t become famous if you hide like this! If you can do such wonderful things, show yourself to the world!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For even his brothers didn’t believe in him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now is not the right time for me to go, but you can go anytime.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The world can’t hate you, but it does hate me because I accuse it of doing evil.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You go on. I’m not going
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: not yet going.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to this festival, because my time has not yet come.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: After saying these things, Jesus remained in Galilee.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Teaches Openly at the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But after his brothers left for the festival, Jesus also went, though secretly, staying out of public view. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The Jewish leaders tried to find him at the festival and kept asking if anyone had seen him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There was a lot of grumbling about him among the crowds. Some argued, “He’s a good man,” but others said, “He’s nothing but a fraud who deceives the people.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But no one had the courage to speak favorably about him in public, for they were afraid of getting in trouble with the Jewish leaders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then, midway through the festival, Jesus went up to the Temple and began to teach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The people
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jewish people.
    marker-yv: yv-n
  - type: text
    text: ' were surprised when they heard him. “How does he know so much when he hasn’t been trained?” they asked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My message is not my own; it comes from God who sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who wants to do the will of God will know whether my teaching is from God or is merely my own.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Those who speak for themselves want glory only for themselves, but a person who seeks to honor the one who sent him speaks truth, not lies.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moses gave you the law, but none of you obeys it! In fact, you are trying to kill me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The crowd replied, “You’re demon possessed! Who’s trying to kill you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I did one miracle on the Sabbath, and you were amazed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But you work on the Sabbath, too, when you obey Moses’ law of circumcision. (Actually, this tradition of circumcision began with the patriarchs, long before the law of Moses.)
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if the correct time for circumcising your son falls on the Sabbath, you go ahead and do it so as not to break the law of Moses. So why should you be angry with me for healing a man on the Sabbath?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Look beneath the surface so you can judge correctly.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Is Jesus the Messiah?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Some of the people who lived in Jerusalem started to ask each other, “Isn’t this the man they are trying to kill? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But here he is, speaking in public, and they say nothing to him. Could our leaders possibly believe that he is the Messiah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But how could he be? For we know where this man comes from. When the Messiah comes, he will simply appear; no one will know where he comes from.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'While Jesus was teaching in the Temple, he called out, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yes, you know me, and you know where I come from. But I’m not here on my own. The one who sent me is true, and you don’t know him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I know him because I come from him, and he sent me to you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then the leaders tried to arrest him; but no one laid a hand on him, because his time
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: his hour.
    marker-yv: yv-n
  - type: text
    text: ' had not yet come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Many among the crowds at the Temple believed in him. “After all,” they said, “would you expect the Messiah to do more miraculous signs than this man has done?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'When the Pharisees heard that the crowds were whispering such things, they and the leading priests sent Temple guards to arrest Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I will be with you only a little longer. Then I will return to the one who sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will search for me but not find me. And you cannot go where I am going.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The Jewish leaders were puzzled by this statement. “Where is he planning to go?” they asked. “Is he thinking of leaving the country and going to the Jews in other lands?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Jews who live among the Greeks?
    marker-yv: yv-n
  - type: text
    text: ' Maybe he will even teach the Greeks! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: What does he mean when he says, ‘You will search for me but not find me,’ and ‘You cannot go where I am going’?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Promises Living Water
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'On the last day, the climax of the festival, Jesus stood and shouted to the crowds, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone who is thirsty may come to me!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who believes in me may come and drink! For the Scriptures declare, ‘Rivers of living water will flow from his heart.’”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:37-38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '“Let anyone who is thirsty come to me and drink. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For the Scriptures declare, ‘Rivers of living water will flow from the heart of anyone who believes in me.’”
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: (When he said “living water,” he was speaking of the Spirit, who would be given to everyone believing in him. But the Spirit had not yet been given,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Several early manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'But as yet there was no Spirit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But as yet there was no Holy Spirit.
    marker-yv: yv-n
  - type: text
    text: ' because Jesus had not yet entered into his glory.)'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division and Unbelief
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: When the crowds heard him say this, some of them declared, “Surely this man is the Prophet we’ve been expecting.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Deut 18:15, 18; Mal 4:5-6.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Others said, “He is the Messiah.” Still others said, “But he can’t be! Will the Messiah come from Galilee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: For the Scriptures clearly state that the Messiah will be born of the royal line of David, in Bethlehem, the village where King David was born.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Mic 5:2.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So the crowd was divided about him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Some even wanted him arrested, but no one laid a hand on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: When the Temple guards returned without having arrested Jesus, the leading priests and Pharisees demanded, “Why didn’t you bring him in?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: “We have never heard anyone speak like this!” the guards responded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '“Have you been led astray, too?” the Pharisees mocked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: '“Is there a single one of us rulers or Pharisees who believes in him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: This foolish crowd follows him, but they are ignorant of the law. God’s curse is on them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Then Nicodemus, the leader who had met with Jesus earlier, spoke up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: “Is it legal to convict a man before he is given a hearing?” he asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: They replied, “Are you from Galilee, too? Search the Scriptures and see for yourself—no prophet ever comes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:52 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the prophet does not come.
    marker-yv: yv-n
  - type: text
    text: ' from Galilee!”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '----------'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '['
  - type: usfm
    marker: it
    children:
    - type: text
      text: The most ancient Greek manuscripts do not include John 7:53–8:11.
  - type: text
    text: ']'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Then the meeting broke up, and everybody went home.
