document_id: JHN.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and His Brothers
  - type: text
    content: 'After this, Jesus traveled around Galilee. He wanted to stay out of Judea, where the Jewish leaders were plotting his death. '
  '10':
  - type: text
    content: 'But after his brothers left for the festival, Jesus also went, though secretly, staying out of public view. '
  '11':
  - type: text
    content: 'The Jewish leaders tried to find him at the festival and kept asking if anyone had seen him. '
  '12':
  - type: text
    content: 'There was a lot of grumbling about him among the crowds. Some argued, “He’s a good man,” but others said, “He’s nothing but a fraud who deceives the people.” '
  '13':
  - type: text
    content: But no one had the courage to speak favorably about him in public, for they were afraid of getting in trouble with the Jewish leaders.
  '14':
  - type: text
    content: 'Then, midway through the festival, Jesus went up to the Temple and began to teach. '
  '15':
  - type: text
    content: The people
  - type: note
    content: Greek Jewish people.
  - type: text
    content: ' were surprised when they heard him. “How does he know so much when he hasn’t been trained?” they asked.'
  '16':
  - type: text
    content: 'So Jesus told them, '
  - type: text
    content: “My message is not my own; it comes from God who sent me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Anyone who wants to do the will of God will know whether my teaching is from God or is merely my own.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Those who speak for themselves want glory only for themselves, but a person who seeks to honor the one who sent him speaks truth, not lies.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Moses gave you the law, but none of you obeys it! In fact, you are trying to kill me.”
  '2':
  - type: text
    content: 'But soon it was time for the Jewish Festival of Shelters, '
  '20':
  - type: text
    content: The crowd replied, “You’re demon possessed! Who’s trying to kill you?”
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I did one miracle on the Sabbath, and you were amazed.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But you work on the Sabbath, too, when you obey Moses’ law of circumcision. (Actually, this tradition of circumcision began with the patriarchs, long before the law of Moses.)
  - type: text
    content: ' '
  '23':
  - type: text
    content: For if the correct time for circumcising your son falls on the Sabbath, you go ahead and do it so as not to break the law of Moses. So why should you be angry with me for healing a man on the Sabbath?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Look beneath the surface so you can judge correctly.”
  - type: heading
    content: Is Jesus the Messiah?
  '25':
  - type: text
    content: 'Some of the people who lived in Jerusalem started to ask each other, “Isn’t this the man they are trying to kill? '
  '26':
  - type: text
    content: 'But here he is, speaking in public, and they say nothing to him. Could our leaders possibly believe that he is the Messiah? '
  '27':
  - type: text
    content: But how could he be? For we know where this man comes from. When the Messiah comes, he will simply appear; no one will know where he comes from.”
  '28':
  - type: text
    content: 'While Jesus was teaching in the Temple, he called out, '
  - type: text
    content: “Yes, you know me, and you know where I come from. But I’m not here on my own. The one who sent me is true, and you don’t know him.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But I know him because I come from him, and he sent me to you.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and Jesus’ brothers said to him, “Leave here and go to Judea, where your followers can see your miracles! '
  '30':
  - type: text
    content: Then the leaders tried to arrest him; but no one laid a hand on him, because his time
  - type: note
    content: Greek his hour.
  - type: text
    content: ' had not yet come.'
  '31':
  - type: text
    content: Many among the crowds at the Temple believed in him. “After all,” they said, “would you expect the Messiah to do more miraculous signs than this man has done?”
  '32':
  - type: text
    content: 'When the Pharisees heard that the crowds were whispering such things, they and the leading priests sent Temple guards to arrest Jesus. '
  '33':
  - type: text
    content: 'But Jesus told them, '
  - type: text
    content: “I will be with you only a little longer. Then I will return to the one who sent me.
  - type: text
    content: ' '
  '34':
  - type: text
    content: You will search for me but not find me. And you cannot go where I am going.”
  '35':
  - type: text
    content: The Jewish leaders were puzzled by this statement. “Where is he planning to go?” they asked. “Is he thinking of leaving the country and going to the Jews in other lands?
  - type: note
    content: Or the Jews who live among the Greeks?
  - type: text
    content: ' Maybe he will even teach the Greeks! '
  '36':
  - type: text
    content: What does he mean when he says, ‘You will search for me but not find me,’ and ‘You cannot go where I am going’?”
  - type: heading
    content: Jesus Promises Living Water
  '37':
  - type: text
    content: 'On the last day, the climax of the festival, Jesus stood and shouted to the crowds, '
  - type: text
    content: “Anyone who is thirsty may come to me!
  - type: text
    content: ' '
  '38':
  - type: text
    content: Anyone who believes in me may come and drink! For the Scriptures declare, ‘Rivers of living water will flow from his heart.’”
  - type: note
    content: Or “Let anyone who is thirsty come to me and drink. 38For the Scriptures declare, ‘Rivers of living water will flow from the heart of anyone who believes in me.’”
  - type: text
    content: ' '
  '39':
  - type: text
    content: (When he said “living water,” he was speaking of the Spirit, who would be given to everyone believing in him. But the Spirit had not yet been given,
  - type: note
    content: Several early manuscripts read But as yet there was no Spirit. Still others read But as yet there was no Holy Spirit.
  - type: text
    content: ' because Jesus had not yet entered into his glory.)'
  - type: heading
    content: Division and Unbelief
  '4':
  - type: text
    content: 'You can’t become famous if you hide like this! If you can do such wonderful things, show yourself to the world!” '
  '40':
  - type: text
    content: When the crowds heard him say this, some of them declared, “Surely this man is the Prophet we’ve been expecting.”
  - type: note
    content: See Deut 18:15, 18; Mal 4:5-6.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Others said, “He is the Messiah.” Still others said, “But he can’t be! Will the Messiah come from Galilee? '
  '42':
  - type: text
    content: For the Scriptures clearly state that the Messiah will be born of the royal line of David, in Bethlehem, the village where King David was born.”
  - type: note
    content: See Mic 5:2.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'So the crowd was divided about him. '
  '44':
  - type: text
    content: Some even wanted him arrested, but no one laid a hand on him.
  '45':
  - type: text
    content: When the Temple guards returned without having arrested Jesus, the leading priests and Pharisees demanded, “Why didn’t you bring him in?”
  '46':
  - type: text
    content: “We have never heard anyone speak like this!” the guards responded.
  '47':
  - type: text
    content: '“Have you been led astray, too?” the Pharisees mocked. '
  '48':
  - type: text
    content: '“Is there a single one of us rulers or Pharisees who believes in him? '
  '49':
  - type: text
    content: This foolish crowd follows him, but they are ignorant of the law. God’s curse is on them!”
  '5':
  - type: text
    content: For even his brothers didn’t believe in him.
  '50':
  - type: text
    content: 'Then Nicodemus, the leader who had met with Jesus earlier, spoke up. '
  '51':
  - type: text
    content: “Is it legal to convict a man before he is given a hearing?” he asked.
  '52':
  - type: text
    content: They replied, “Are you from Galilee, too? Search the Scriptures and see for yourself—no prophet ever comes
  - type: note
    content: Some manuscripts read the prophet does not come.
  - type: text
    content: ' from Galilee!”'
  - type: text
    content: '----------'
  - type: text
    content: '['
  - type: text
    content: The most ancient Greek manuscripts do not include John 7:53–8:11.
  - type: text
    content: ']'
  '53':
  - type: text
    content: Then the meeting broke up, and everybody went home.
  '6':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Now is not the right time for me to go, but you can go anytime.
  - type: text
    content: ' '
  '7':
  - type: text
    content: The world can’t hate you, but it does hate me because I accuse it of doing evil.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You go on. I’m not going
  - type: note
    content: Some manuscripts read not yet going.
  - type: text
    content: ' '
  - type: text
    content: to this festival, because my time has not yet come.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: After saying these things, Jesus remained in Galilee.
  - type: heading
    content: Jesus Teaches Openly at the Temple
