document_id: JER.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatry Brings Destruction
  - type: text
    content: 'Hear the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks to you, O Israel! '
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is the only true God.'
  - type: text
    content: He is the living God and the everlasting King!
  - type: text
    content: The whole earth trembles at his anger.
  - type: text
    content: The nations cannot stand up to his wrath.
  '11':
  - type: text
    content: 'Say this to those who worship other gods: “Your so-called gods, who did not make the heavens and earth, will vanish from the earth and from under the heavens.”'
  - type: note
    content: The original text of this verse is in Aramaic.
  '12':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' made the earth by his power,'
  - type: text
    content: and he preserves it by his wisdom.
  - type: text
    content: With his own understanding
  - type: text
    content: he stretched out the heavens.
  '13':
  - type: text
    content: When he speaks in the thunder,
  - type: text
    content: the heavens roar with rain.
  - type: text
    content: He causes the clouds to rise over the earth.
  - type: text
    content: He sends the lightning with the rain
  - type: text
    content: and releases the wind from his storehouses.
  '14':
  - type: text
    content: The whole human race is foolish and has no knowledge!
  - type: text
    content: The craftsmen are disgraced by the idols they make,
  - type: text
    content: for their carefully shaped works are a fraud.
  - type: text
    content: These idols have no breath or power.
  '15':
  - type: text
    content: Idols are worthless; they are ridiculous lies!
  - type: text
    content: On the day of reckoning they will all be destroyed.
  '16':
  - type: text
    content: But the God of Israel
  - type: note
    content: Hebrew the Portion of Jacob. See note on 5:20.
  - type: text
    content: ' is no idol!'
  - type: text
    content: He is the Creator of everything that exists,
  - type: text
    content: including Israel, his own special possession.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is his name!'
  - type: heading
    content: The Coming Destruction
  '17':
  - type: text
    content: Pack your bags and prepare to leave;
  - type: text
    content: the siege is about to begin.
  '18':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Suddenly, I will fling out
  - type: text
    content: all you who live in this land.
  - type: text
    content: I will pour great troubles upon you,
  - type: text
    content: and at last you will feel my anger.”
  '19':
  - type: text
    content: My wound is severe,
  - type: text
    content: and my grief is great.
  - type: text
    content: My sickness is incurable,
  - type: text
    content: but I must bear it.
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Do not act like the other nations,
  - type: text
    content: who try to read their future in the stars.
  - type: text
    content: Do not be afraid of their predictions,
  - type: text
    content: even though other nations are terrified by them.
  '20':
  - type: text
    content: My home is gone,
  - type: text
    content: and no one is left to help me rebuild it.
  - type: text
    content: My children have been taken away,
  - type: text
    content: and I will never see them again.
  '21':
  - type: text
    content: The shepherds of my people have lost their senses.
  - type: text
    content: 'They no longer seek wisdom from the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Therefore, they fail completely,
  - type: text
    content: and their flocks are scattered.
  '22':
  - type: text
    content: Listen! Hear the terrifying roar of great armies
  - type: text
    content: as they roll down from the north.
  - type: text
    content: The towns of Judah will be destroyed
  - type: text
    content: and become a haunt for jackals.
  - type: heading
    content: Jeremiah’s Prayer
  '23':
  - type: text
    content: 'I know, '
  - type: text
    content: Lord
  - type: text
    content: ', that our lives are not our own.'
  - type: text
    content: We are not able to plan our own course.
  '24':
  - type: text
    content: 'So correct me, '
  - type: text
    content: Lord
  - type: text
    content: ', but please be gentle.'
  - type: text
    content: Do not correct me in anger, for I would die.
  '25':
  - type: text
    content: Pour out your wrath on the nations that refuse to acknowledge you—
  - type: text
    content: on the peoples that do not call upon your name.
  - type: text
    content: For they have devoured your people Israel
  - type: note
    content: Hebrew devoured Jacob. See note on 5:20.
  - type: text
    content: ;
  - type: text
    content: they have devoured and consumed them,
  - type: text
    content: making the land a desolate wilderness.
  '3':
  - type: text
    content: Their ways are futile and foolish.
  - type: text
    content: They cut down a tree, and a craftsman carves an idol.
  '4':
  - type: text
    content: They decorate it with gold and silver
  - type: text
    content: and then fasten it securely with hammer and nails
  - type: text
    content: so it won’t fall over.
  '5':
  - type: text
    content: Their gods are like
  - type: text
    content: helpless scarecrows in a cucumber field!
  - type: text
    content: They cannot speak,
  - type: text
    content: and they need to be carried because they cannot walk.
  - type: text
    content: Do not be afraid of such gods,
  - type: text
    content: for they can neither harm you nor do you any good.”
  '6':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', there is no one like you!'
  - type: text
    content: For you are great, and your name is full of power.
  '7':
  - type: text
    content: Who would not fear you, O King of nations?
  - type: text
    content: That title belongs to you alone!
  - type: text
    content: Among all the wise people of the earth
  - type: text
    content: and in all the kingdoms of the world,
  - type: text
    content: there is no one like you.
  '8':
  - type: text
    content: People who worship idols are stupid and foolish.
  - type: text
    content: The things they worship are made of wood!
  '9':
  - type: text
    content: They bring beaten sheets of silver from Tarshish
  - type: text
    content: and gold from Uphaz,
  - type: text
    content: and they give these materials to skillful craftsmen
  - type: text
    content: who make their idols.
  - type: text
    content: Then they dress these gods in royal blue and purple robes
  - type: text
    content: made by expert tailors.
