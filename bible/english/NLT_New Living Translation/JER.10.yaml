document_id: JER.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolatry Brings Destruction
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear the word that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' speaks to you, O Israel! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not act like the other nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who try to read their future in the stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid of their predictions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even though other nations are terrified by them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Their ways are futile and foolish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They cut down a tree, and a craftsman carves an idol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They decorate it with gold and silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then fasten it securely with hammer and nails
- type: usfm
  marker: q2
  children:
  - type: text
    text: so it won’t fall over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Their gods are like
- type: usfm
  marker: q2
  children:
  - type: text
    text: helpless scarecrows in a cucumber field!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cannot speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they need to be carried because they cannot walk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid of such gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they can neither harm you nor do you any good.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', there is no one like you!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For you are great, and your name is full of power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who would not fear you, O King of nations?
- type: usfm
  marker: q2
  children:
  - type: text
    text: That title belongs to you alone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among all the wise people of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in all the kingdoms of the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one like you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: People who worship idols are stupid and foolish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The things they worship are made of wood!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They bring beaten sheets of silver from Tarshish
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gold from Uphaz,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they give these materials to skillful craftsmen
- type: usfm
  marker: q2
  children:
  - type: text
    text: who make their idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they dress these gods in royal blue and purple robes
- type: usfm
  marker: q2
  children:
  - type: text
    text: made by expert tailors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the only true God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the living God and the everlasting King!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole earth trembles at his anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The nations cannot stand up to his wrath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Say this to those who worship other gods: “Your so-called gods, who did not make the heavens and earth, will vanish from the earth and from under the heavens.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The original text of this verse is in Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made the earth by his power,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he preserves it by his wisdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With his own understanding
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stretched out the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When he speaks in the thunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heavens roar with rain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He causes the clouds to rise over the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sends the lightning with the rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and releases the wind from his storehouses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The whole human race is foolish and has no knowledge!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The craftsmen are disgraced by the idols they make,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their carefully shaped works are a fraud.
- type: usfm
  marker: q2
  children:
  - type: text
    text: These idols have no breath or power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Idols are worthless; they are ridiculous lies!
- type: usfm
  marker: q2
  children:
  - type: text
    text: On the day of reckoning they will all be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But the God of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Portion of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 5:20.
    marker-yv: yv-n
  - type: text
    text: ' is no idol!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the Creator of everything that exists,
- type: usfm
  marker: q1
  children:
  - type: text
    text: including Israel, his own special possession.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is his name!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Coming Destruction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pack your bags and prepare to leave;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the siege is about to begin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Suddenly, I will fling out
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you who live in this land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pour great troubles upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and at last you will feel my anger.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My wound is severe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my grief is great.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My sickness is incurable,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I must bear it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My home is gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one is left to help me rebuild it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My children have been taken away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will never see them again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The shepherds of my people have lost their senses.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They no longer seek wisdom from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, they fail completely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their flocks are scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Listen! Hear the terrifying roar of great armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they roll down from the north.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The towns of Judah will be destroyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and become a haunt for jackals.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I know, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that our lives are not our own.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are not able to plan our own course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So correct me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but please be gentle.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not correct me in anger, for I would die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Pour out your wrath on the nations that refuse to acknowledge you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the peoples that do not call upon your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have devoured your people Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'devoured Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 5:20.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have devoured and consumed them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making the land a desolate wilderness.
