document_id: 2CO.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Because we have these promises, dear friends, let us cleanse ourselves from everything that can defile our body or spirit. And let us work toward complete holiness because we fear God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the kind of sorrow God wants us to experience leads us away from sin and results in salvation. There’s no regret for that kind of sorrow. But worldly sorrow, which lacks repentance, results in spiritual death.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Just see what this godly sorrow produced in you! Such earnestness, such concern to clear yourselves, such indignation, such alarm, such longing to see me, such zeal, and such a readiness to punish wrong. You showed that you have done everything necessary to make things right. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'My purpose, then, was not to write about who did the wrong or who was wronged. I wrote to you so that in the sight of God you could see for yourselves how loyal you are to us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: We have been greatly encouraged by this.
  - type: usfm
    marker: p
    children:
    - type: text
      text: In addition to our own encouragement, we were especially delighted to see how happy Titus was about the way all of you welcomed him and set his mind
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his spirit.
      marker-yv: yv-n
    - type: text
      text: ' at ease. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I had told him how proud I was of you—and you didn’t disappoint me. I have always told you the truth, and now my boasting to Titus has also proved true! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now he cares for you more than ever when he remembers the way all of you obeyed him and welcomed him with such fear and deep respect. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I am very happy now because I have complete confidence in you.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Please open your hearts to us. We have not done wrong to anyone, nor led anyone astray, nor taken advantage of anyone. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I’m not saying this to condemn you. I said before that you are in our hearts, and we live or die together with you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I have the highest confidence in you, and I take great pride in you. You have greatly encouraged me and made me happy despite all our troubles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Joy at the Church’s Repentance
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When we arrived in Macedonia, there was no rest for us. We faced conflict from every direction, with battles on the outside and fear on the inside. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But God, who encourages those who are discouraged, encouraged us by the arrival of Titus. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: His presence was a joy, but so was the news he brought of the encouragement he received from you. When he told us how much you long to see me, and how sorry you are for what happened, and how loyal you are to me, I was filled with joy!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I am not sorry that I sent that severe letter to you, though I was sorry at first, for I know it was painful to you for a little while. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now I am glad I sent it, not because it hurt you, but because the pain caused you to repent and change your ways. It was the kind of sorrow God wants his people to have, so you were not harmed by us in any way. '
