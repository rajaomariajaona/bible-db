document_id: JDG.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s War with Benjamin
  - type: text
    content: 'Then all the Israelites were united as one man, from Dan in the north to Beersheba in the south, including those from across the Jordan in the land of Gilead. The entire community assembled in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Mizpah. '
  '10':
  - type: text
    content: One-tenth of the men
  - type: note
    content: Hebrew 10 men from every hundred, 100 men from every thousand, and 1,000 men from every 10,000.
  - type: text
    content: ' from each tribe will be chosen to supply the warriors with food, and the rest of us will take revenge on Gibeah'
  - type: note
    content: Hebrew Geba, in this case a variant spelling of Gibeah; also in 20:33.
  - type: text
    content: ' of Benjamin for this shameful thing they have done in Israel.” '
  '11':
  - type: text
    content: So all the Israelites were completely united, and they gathered together to attack the town.
  '12':
  - type: text
    content: 'The Israelites sent messengers to the tribe of Benjamin, saying, “What a terrible thing has been done among you! '
  '13':
  - type: text
    content: Give up those evil men, those troublemakers from Gibeah, so we can execute them and purge Israel of this evil.”
  - type: text
    content: 'But the people of Benjamin would not listen. '
  '14':
  - type: text
    content: 'Instead, they came from their towns and gathered at Gibeah to fight the Israelites. '
  '15':
  - type: text
    content: 'In all, 26,000 of their warriors armed with swords arrived in Gibeah to join the 700 elite troops who lived there. '
  '16':
  - type: text
    content: 'Among Benjamin’s elite troops, 700 were left-handed, and each of them could sling a rock and hit a target within a hairsbreadth without missing. '
  '17':
  - type: text
    content: Israel had 400,000 experienced soldiers armed with swords, not counting Benjamin’s warriors.
  '18':
  - type: text
    content: Before the battle the Israelites went to Bethel and asked God, “Which tribe should go first to attack the people of Benjamin?”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Judah is to go first.”'
  '19':
  - type: text
    content: 'So the Israelites left early the next morning and camped near Gibeah. '
  '2':
  - type: text
    content: 'The leaders of all the people and all the tribes of Israel—400,000 warriors armed with swords—took their positions in the assembly of the people of God. '
  '20':
  - type: text
    content: 'Then they advanced toward Gibeah to attack the men of Benjamin. '
  '21':
  - type: text
    content: But Benjamin’s warriors, who were defending the town, came out and killed 22,000 Israelites on the battlefield that day.
  '22':
  - type: text
    content: 'But the Israelites encouraged each other and took their positions again at the same place they had fought the previous day. '
  '23':
  - type: text
    content: 'For they had gone up to Bethel and wept in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' until evening. They had asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Should we fight against our relatives from Benjamin again?”'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, “Go out and fight against them.”'
  '24':
  - type: text
    content: 'So the next day they went out again to fight against the men of Benjamin, '
  '25':
  - type: text
    content: but the men of Benjamin killed another 18,000 Israelites, all of whom were experienced with the sword.
  '26':
  - type: text
    content: 'Then all the Israelites went up to Bethel and wept in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and fasted until evening. They also brought burnt offerings and peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'The Israelites went up seeking direction from the '
  - type: text
    content: Lord
  - type: text
    content: '. (In those days the Ark of the Covenant of God was in Bethel, '
  '28':
  - type: text
    content: 'and Phinehas son of Eleazar and grandson of Aaron was the priest.) The Israelites asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Should we fight against our relatives from Benjamin again, or should we stop?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Go! Tomorrow I will hand them over to you.”'
  '29':
  - type: text
    content: 'So the Israelites set an ambush all around Gibeah. '
  '3':
  - type: text
    content: (Word soon reached the land of Benjamin that the other tribes had gone up to Mizpah.) The Israelites then asked how this terrible crime had happened.
  '30':
  - type: text
    content: 'They went out on the third day and took their positions at the same place as before. '
  '31':
  - type: text
    content: When the men of Benjamin came out to attack, they were drawn away from the town. And as they had done before, they began to kill the Israelites. About thirty Israelites died in the open fields and along the roads, one leading to Bethel and the other leading back to Gibeah.
  '32':
  - type: text
    content: Then the warriors of Benjamin shouted, “We’re defeating them as we did before!” But the Israelites had planned in advance to run away so that the men of Benjamin would chase them along the roads and be drawn away from the town.
  '33':
  - type: text
    content: When the main group of Israelite warriors reached Baal-tamar, they turned and took up their positions. Meanwhile, the Israelites hiding in ambush to the west
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew reads hiding in the open space.
  - type: text
    content: ' of Gibeah jumped up to fight. '
  '34':
  - type: text
    content: 'There were 10,000 elite Israelite troops who advanced against Gibeah. The fighting was so heavy that Benjamin didn’t realize the impending disaster. '
  '35':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' helped Israel defeat Benjamin, and that day the Israelites killed 25,100 of Benjamin’s warriors, all of whom were experienced swordsmen. '
  '36':
  - type: text
    content: Then the men of Benjamin saw that they were beaten.
  - type: text
    content: 'The Israelites had retreated from Benjamin’s warriors in order to give those hiding in ambush more room to maneuver against Gibeah. '
  '37':
  - type: text
    content: 'Then those who were hiding rushed in from all sides and killed everyone in the town. '
  '38':
  - type: text
    content: 'They had arranged to send up a large cloud of smoke from the town as a signal. '
  '39':
  - type: text
    content: When the Israelites saw the smoke, they turned and attacked Benjamin’s warriors.
  - type: text
    content: 'By that time Benjamin’s warriors had killed about thirty Israelites, and they shouted, “We’re defeating them as we did in the first battle!” '
  '4':
  - type: text
    content: 'The Levite, the husband of the woman who had been murdered, said, “My concubine and I came to spend the night in Gibeah, a town that belongs to the people of Benjamin. '
  '40':
  - type: text
    content: 'But when the warriors of Benjamin looked behind them and saw the smoke rising into the sky from every part of the town, '
  '41':
  - type: text
    content: 'the men of Israel turned and attacked. At this point the men of Benjamin became terrified, because they realized disaster was close at hand. '
  '42':
  - type: text
    content: So they turned around and fled before the Israelites toward the wilderness. But they couldn’t escape the battle, and the people who came out of the nearby towns were also killed.
  - type: note
    content: Or battle, for the people from the nearby towns also came out and killed them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: The Israelites surrounded the men of Benjamin and chased them relentlessly, finally overtaking them east of Gibeah.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'That day 18,000 of Benjamin’s strongest warriors died in battle. '
  '45':
  - type: text
    content: The survivors fled into the wilderness toward the rock of Rimmon, but Israel killed 5,000 of them along the road. They continued the chase until they had killed another 2,000 near Gidom.
  '46':
  - type: text
    content: 'So that day the tribe of Benjamin lost 25,000 strong warriors armed with swords, '
  '47':
  - type: text
    content: 'leaving only 600 men who escaped to the rock of Rimmon, where they lived for four months. '
  '48':
  - type: text
    content: And the Israelites returned and slaughtered every living thing in all the towns—the people, the livestock, and everything they found. They also burned down all the towns they came to.
  '5':
  - type: text
    content: 'That night some of the leading citizens of Gibeah surrounded the house, planning to kill me, and they raped my concubine until she was dead. '
  '6':
  - type: text
    content: 'So I cut her body into twelve pieces and sent the pieces throughout the territory assigned to Israel, for these men have committed a terrible and shameful crime. '
  '7':
  - type: text
    content: Now then, all of you—the entire community of Israel—must decide here and now what should be done about this!”
  '8':
  - type: text
    content: 'And all the people rose to their feet in unison and declared, “None of us will return home! No, not even one of us! '
  '9':
  - type: text
    content: 'Instead, this is what we will do to Gibeah; we will draw lots to decide who will attack it. '
