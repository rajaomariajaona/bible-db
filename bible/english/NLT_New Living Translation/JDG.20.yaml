document_id: JDG.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s War with Benjamin
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then all the Israelites were united as one man, from Dan in the north to Beersheba in the south, including those from across the Jordan in the land of Gilead. The entire community assembled in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at Mizpah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The leaders of all the people and all the tribes of Israel—400,000 warriors armed with swords—took their positions in the assembly of the people of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: (Word soon reached the land of Benjamin that the other tribes had gone up to Mizpah.) The Israelites then asked how this terrible crime had happened.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The Levite, the husband of the woman who had been murdered, said, “My concubine and I came to spend the night in Gibeah, a town that belongs to the people of Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'That night some of the leading citizens of Gibeah surrounded the house, planning to kill me, and they raped my concubine until she was dead. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So I cut her body into twelve pieces and sent the pieces throughout the territory assigned to Israel, for these men have committed a terrible and shameful crime. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now then, all of you—the entire community of Israel—must decide here and now what should be done about this!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And all the people rose to their feet in unison and declared, “None of us will return home! No, not even one of us! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Instead, this is what we will do to Gibeah; we will draw lots to decide who will attack it. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: One-tenth of the men
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 10 men from every hundred, 100 men from every thousand, and 1,000 men from every 10,000.
    marker-yv: yv-n
  - type: text
    text: ' from each tribe will be chosen to supply the warriors with food, and the rest of us will take revenge on Gibeah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Geba, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in this case a variant spelling of Gibeah; also in 20:33.
    marker-yv: yv-n
  - type: text
    text: ' of Benjamin for this shameful thing they have done in Israel.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So all the Israelites were completely united, and they gathered together to attack the town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The Israelites sent messengers to the tribe of Benjamin, saying, “What a terrible thing has been done among you! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Give up those evil men, those troublemakers from Gibeah, so we can execute them and purge Israel of this evil.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But the people of Benjamin would not listen. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Instead, they came from their towns and gathered at Gibeah to fight the Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In all, 26,000 of their warriors armed with swords arrived in Gibeah to join the 700 elite troops who lived there. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Among Benjamin’s elite troops, 700 were left-handed, and each of them could sling a rock and hit a target within a hairsbreadth without missing. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Israel had 400,000 experienced soldiers armed with swords, not counting Benjamin’s warriors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Before the battle the Israelites went to Bethel and asked God, “Which tribe should go first to attack the people of Benjamin?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered, “Judah is to go first.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the Israelites left early the next morning and camped near Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then they advanced toward Gibeah to attack the men of Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But Benjamin’s warriors, who were defending the town, came out and killed 22,000 Israelites on the battlefield that day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the Israelites encouraged each other and took their positions again at the same place they had fought the previous day. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For they had gone up to Bethel and wept in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' until evening. They had asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Should we fight against our relatives from Benjamin again?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said, “Go out and fight against them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So the next day they went out again to fight against the men of Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: but the men of Benjamin killed another 18,000 Israelites, all of whom were experienced with the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then all the Israelites went up to Bethel and wept in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and fasted until evening. They also brought burnt offerings and peace offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The Israelites went up seeking direction from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. (In those days the Ark of the Covenant of God was in Bethel, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Phinehas son of Eleazar and grandson of Aaron was the priest.) The Israelites asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Should we fight against our relatives from Benjamin again, or should we stop?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “Go! Tomorrow I will hand them over to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So the Israelites set an ambush all around Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They went out on the third day and took their positions at the same place as before. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: When the men of Benjamin came out to attack, they were drawn away from the town. And as they had done before, they began to kill the Israelites. About thirty Israelites died in the open fields and along the roads, one leading to Bethel and the other leading back to Gibeah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then the warriors of Benjamin shouted, “We’re defeating them as we did before!” But the Israelites had planned in advance to run away so that the men of Benjamin would chase them along the roads and be drawn away from the town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When the main group of Israelite warriors reached Baal-tamar, they turned and took up their positions. Meanwhile, the Israelites hiding in ambush to the west
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hiding in the open space.
    marker-yv: yv-n
  - type: text
    text: ' of Gibeah jumped up to fight. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'There were 10,000 elite Israelite troops who advanced against Gibeah. The fighting was so heavy that Benjamin didn’t realize the impending disaster. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' helped Israel defeat Benjamin, and that day the Israelites killed 25,100 of Benjamin’s warriors, all of whom were experienced swordsmen. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then the men of Benjamin saw that they were beaten.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The Israelites had retreated from Benjamin’s warriors in order to give those hiding in ambush more room to maneuver against Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then those who were hiding rushed in from all sides and killed everyone in the town. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'They had arranged to send up a large cloud of smoke from the town as a signal. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: When the Israelites saw the smoke, they turned and attacked Benjamin’s warriors.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'By that time Benjamin’s warriors had killed about thirty Israelites, and they shouted, “We’re defeating them as we did in the first battle!” '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But when the warriors of Benjamin looked behind them and saw the smoke rising into the sky from every part of the town, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the men of Israel turned and attacked. At this point the men of Benjamin became terrified, because they realized disaster was close at hand. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: So they turned around and fled before the Israelites toward the wilderness. But they couldn’t escape the battle, and the people who came out of the nearby towns were also killed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: battle, for the people from the nearby towns also came out and killed them.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: The Israelites surrounded the men of Benjamin and chased them relentlessly, finally overtaking them east of Gibeah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'That day 18,000 of Benjamin’s strongest warriors died in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: The survivors fled into the wilderness toward the rock of Rimmon, but Israel killed 5,000 of them along the road. They continued the chase until they had killed another 2,000 near Gidom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'So that day the tribe of Benjamin lost 25,000 strong warriors armed with swords, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'leaving only 600 men who escaped to the rock of Rimmon, where they lived for four months. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: And the Israelites returned and slaughtered every living thing in all the towns—the people, the livestock, and everything they found. They also burned down all the towns they came to.
