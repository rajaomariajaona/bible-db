document_id: HOS.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Judgment against Israel
  - type: text
    content: How prosperous Israel is—
  - type: text
    content: a luxuriant vine loaded with fruit.
  - type: text
    content: But the richer the people get,
  - type: text
    content: the more pagan altars they build.
  - type: text
    content: The more bountiful their harvests,
  - type: text
    content: the more beautiful their sacred pillars.
  '10':
  - type: text
    content: Now whenever it fits my plan,
  - type: text
    content: I will attack you, too.
  - type: text
    content: I will call out the armies of the nations
  - type: text
    content: to punish you for your multiplied sins.
  '11':
  - type: text
    content: “Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' is like a trained heifer treading out the grain—'
  - type: text
    content: an easy job she loves.
  - type: text
    content: But I will put a heavy yoke on her tender neck.
  - type: text
    content: I will force Judah to pull the plow
  - type: text
    content: and Israel
  - type: note
    content: Hebrew Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: ' to break up the hard ground.'
  '12':
  - type: text
    content: I said, ‘Plant the good seeds of righteousness,
  - type: text
    content: and you will harvest a crop of love.
  - type: text
    content: Plow up the hard ground of your hearts,
  - type: text
    content: 'for now is the time to seek the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: that he may come
  - type: text
    content: and shower righteousness upon you.’
  '13':
  - type: text
    content: “But you have cultivated wickedness
  - type: text
    content: and harvested a thriving crop of sins.
  - type: text
    content: You have eaten the fruit of lies—
  - type: text
    content: trusting in your military might,
  - type: text
    content: believing that great armies
  - type: text
    content: could make your nation safe.
  '14':
  - type: text
    content: Now the terrors of war
  - type: text
    content: will rise among your people.
  - type: text
    content: All your fortifications will fall,
  - type: text
    content: just as when Shalman destroyed Beth-arbel.
  - type: text
    content: Even mothers and children
  - type: text
    content: were dashed to death there.
  '15':
  - type: text
    content: You will share that fate, Bethel,
  - type: text
    content: because of your great wickedness.
  - type: text
    content: When the day of judgment dawns,
  - type: text
    content: the king of Israel will be completely destroyed.
  '2':
  - type: text
    content: The hearts of the people are fickle;
  - type: text
    content: they are guilty and must be punished.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will break down their altars'
  - type: text
    content: and smash their sacred pillars.
  '3':
  - type: text
    content: Then they will say, “We have no king
  - type: text
    content: 'because we didn’t fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: But even if we had a king,
  - type: text
    content: what could he do for us anyway?”
  '4':
  - type: text
    content: They spout empty words
  - type: text
    content: and make covenants they don’t intend to keep.
  - type: text
    content: So injustice springs up among them
  - type: text
    content: like poisonous weeds in a farmer’s field.
  '5':
  - type: text
    content: The people of Samaria tremble in fear
  - type: text
    content: for their calf idol at Beth-aven,
  - type: note
    content: Beth-aven means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
  - type: text
    content: and they mourn for it.
  - type: text
    content: Though its priests rejoice over it,
  - type: text
    content: its glory will be stripped away.
  - type: note
    content: Or will be taken away into exile.
  '6':
  - type: text
    content: This idol will be carted away to Assyria,
  - type: text
    content: a gift to the great king there.
  - type: text
    content: Ephraim will be ridiculed and Israel will be shamed,
  - type: text
    content: because its people have trusted in this idol.
  '7':
  - type: text
    content: Samaria and its king will be cut off;
  - type: text
    content: they will float away like driftwood on an ocean wave.
  '8':
  - type: text
    content: And the pagan shrines of Aven,
  - type: note
    content: Aven is a reference to Beth-aven; see 10:5a and the note there.
  - type: text
    content: ' the place of Israel’s sin, will crumble.'
  - type: text
    content: Thorns and thistles will grow up around their altars.
  - type: text
    content: They will beg the mountains, “Bury us!”
  - type: text
    content: and plead with the hills, “Fall on us!”
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “O Israel, ever since Gibeah,'
  - type: text
    content: there has been only sin and more sin!
  - type: text
    content: You have made no progress whatsoever.
  - type: text
    content: Was it not right that the wicked men of Gibeah were attacked?
