document_id: HOS.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Judgment against Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How prosperous Israel is—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a luxuriant vine loaded with fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the richer the people get,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the more pagan altars they build.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The more bountiful their harvests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the more beautiful their sacred pillars.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now whenever it fits my plan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will attack you, too.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will call out the armies of the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to punish you for your multiplied sins.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: ' is like a trained heifer treading out the grain—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an easy job she loves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I will put a heavy yoke on her tender neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will force Judah to pull the plow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
      marker-yv: yv-n
    - type: text
      text: ' to break up the hard ground.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, ‘Plant the good seeds of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will harvest a crop of love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plow up the hard ground of your hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for now is the time to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that he may come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shower righteousness upon you.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you have cultivated wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and harvested a thriving crop of sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have eaten the fruit of lies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trusting in your military might,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: believing that great armies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: could make your nation safe.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now the terrors of war
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will rise among your people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your fortifications will fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as when Shalman destroyed Beth-arbel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even mothers and children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were dashed to death there.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will share that fate, Bethel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your great wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the day of judgment dawns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king of Israel will be completely destroyed.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hearts of the people are fickle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are guilty and must be punished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will break down their altars'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smash their sacred pillars.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will say, “We have no king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because we didn’t fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even if we had a king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what could he do for us anyway?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They spout empty words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make covenants they don’t intend to keep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So injustice springs up among them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like poisonous weeds in a farmer’s field.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Samaria tremble in fear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their calf idol at Beth-aven,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Beth-aven '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they mourn for it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though its priests rejoice over it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its glory will be stripped away.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will be taken away into exile.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This idol will be carted away to Assyria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a gift to the great king there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim will be ridiculed and Israel will be shamed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because its people have trusted in this idol.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samaria and its king will be cut off;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will float away like driftwood on an ocean wave.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the pagan shrines of Aven,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Aven '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a reference to Beth-aven; see 10:5a and the note there.
      marker-yv: yv-n
    - type: text
      text: ' the place of Israel’s sin, will crumble.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thorns and thistles will grow up around their altars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will beg the mountains, “Bury us!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plead with the hills, “Fall on us!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, “O Israel, ever since Gibeah,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there has been only sin and more sin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made no progress whatsoever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Was it not right that the wicked men of Gibeah were attacked?
