document_id: HOS.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Love for Wickedness
  - type: text
    content: “I want to heal Israel, but its
  - type: note
    content: Hebrew Ephraim’s, referring to the northern kingdom of Israel; similarly in 7:8, 11.
  - type: text
    content: ' sins are too great.'
  - type: text
    content: Samaria is filled with liars.
  - type: text
    content: Thieves are on the inside
  - type: text
    content: and bandits on the outside!
  '10':
  - type: text
    content: Their arrogance testifies against them,
  - type: text
    content: 'yet they don’t return to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God'
  - type: text
    content: or even try to find him.
  '11':
  - type: text
    content: “The people of Israel have become like silly, witless doves,
  - type: text
    content: first calling to Egypt, then flying to Assyria for help.
  '12':
  - type: text
    content: But as they fly about,
  - type: text
    content: I will throw my net over them
  - type: text
    content: and bring them down like a bird from the sky.
  - type: text
    content: I will punish them for all the evil they do.
  - type: note
    content: Hebrew I will punish them because of what was reported against them in the assembly.
  '13':
  - type: text
    content: “What sorrow awaits those who have deserted me!
  - type: text
    content: Let them die, for they have rebelled against me.
  - type: text
    content: I wanted to redeem them,
  - type: text
    content: but they have told lies about me.
  '14':
  - type: text
    content: They do not cry out to me with sincere hearts.
  - type: text
    content: Instead, they sit on their couches and wail.
  - type: text
    content: They cut themselves,
  - type: note
    content: As in Greek version; Hebrew reads They gather together.
  - type: text
    content: ' begging foreign gods for grain and new wine,'
  - type: text
    content: and they turn away from me.
  '15':
  - type: text
    content: I trained them and made them strong,
  - type: text
    content: yet now they plot evil against me.
  '16':
  - type: text
    content: They look everywhere except to the Most High.
  - type: text
    content: They are as useless as a crooked bow.
  - type: text
    content: Their leaders will be killed by their enemies
  - type: text
    content: because of their insolence toward me.
  - type: text
    content: Then the people of Egypt
  - type: text
    content: will laugh at them.
  '2':
  - type: text
    content: Its people don’t realize
  - type: text
    content: that I am watching them.
  - type: text
    content: Their sinful deeds are all around them,
  - type: text
    content: and I see them all.
  '3':
  - type: text
    content: “The people entertain the king with their wickedness,
  - type: text
    content: and the princes laugh at their lies.
  '4':
  - type: text
    content: They are all adulterers,
  - type: text
    content: always aflame with lust.
  - type: text
    content: They are like an oven that is kept hot
  - type: text
    content: while the baker is kneading the dough.
  '5':
  - type: text
    content: On royal holidays, the princes get drunk with wine,
  - type: text
    content: carousing with those who mock them.
  '6':
  - type: text
    content: Their hearts are like an oven
  - type: text
    content: blazing with intrigue.
  - type: text
    content: Their plot smolders
  - type: note
    content: Hebrew Their baker sleeps.
  - type: text
    content: ' through the night,'
  - type: text
    content: and in the morning it breaks out like a raging fire.
  '7':
  - type: text
    content: Burning like an oven,
  - type: text
    content: they consume their leaders.
  - type: text
    content: They kill their kings one after another,
  - type: text
    content: and no one cries to me for help.
  '8':
  - type: text
    content: “The people of Israel mingle with godless foreigners,
  - type: text
    content: making themselves as worthless as a half-baked cake!
  '9':
  - type: text
    content: Worshiping foreign gods has sapped their strength,
  - type: text
    content: but they don’t even know it.
  - type: text
    content: Their hair is gray,
  - type: text
    content: but they don’t realize they’re old and weak.
