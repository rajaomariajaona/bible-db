document_id: HOS.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Love for Wickedness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I want to heal Israel, but its
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim’s, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel; similarly in 7:8, 11.
    marker-yv: yv-n
  - type: text
    text: ' sins are too great.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Samaria is filled with liars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thieves are on the inside
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bandits on the outside!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Its people don’t realize
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I am watching them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their sinful deeds are all around them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I see them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “The people entertain the king with their wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the princes laugh at their lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They are all adulterers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always aflame with lust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are like an oven that is kept hot
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the baker is kneading the dough.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On royal holidays, the princes get drunk with wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: carousing with those who mock them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their hearts are like an oven
- type: usfm
  marker: q2
  children:
  - type: text
    text: blazing with intrigue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their plot smolders
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Their baker sleeps.
    marker-yv: yv-n
  - type: text
    text: ' through the night,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the morning it breaks out like a raging fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Burning like an oven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they consume their leaders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They kill their kings one after another,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one cries to me for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “The people of Israel mingle with godless foreigners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making themselves as worthless as a half-baked cake!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Worshiping foreign gods has sapped their strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they don’t even know it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their hair is gray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they don’t realize they’re old and weak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Their arrogance testifies against them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yet they don’t return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or even try to find him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “The people of Israel have become like silly, witless doves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: first calling to Egypt, then flying to Assyria for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But as they fly about,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will throw my net over them
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bring them down like a bird from the sky.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will punish them for all the evil they do.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I will punish them because of what was reported against them in the assembly.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “What sorrow awaits those who have deserted me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them die, for they have rebelled against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I wanted to redeem them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they have told lies about me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They do not cry out to me with sincere hearts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Instead, they sit on their couches and wail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cut themselves,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: They gather together.
    marker-yv: yv-n
  - type: text
    text: ' begging foreign gods for grain and new wine,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they turn away from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I trained them and made them strong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet now they plot evil against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They look everywhere except to the Most High.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are as useless as a crooked bow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their leaders will be killed by their enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of their insolence toward me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the people of Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: will laugh at them.
