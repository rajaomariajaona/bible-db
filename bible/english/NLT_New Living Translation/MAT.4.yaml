document_id: MAT.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temptation of Jesus
  - type: text
    content: 'Then Jesus was led by the Spirit into the wilderness to be tempted there by the devil. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: '“Get out of here, Satan,” '
  - type: text
    content: 'Jesus told him. '
  - type: text
    content: “For the Scriptures say,
  - type: text
    content: '‘You must worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: and serve only him.’
  - type: text
    content: ' '
  - type: note
    content: Deut 6:13.
  - type: text
    content: ”
  '11':
  - type: text
    content: Then the devil went away, and angels came and took care of Jesus.
  - type: heading
    content: The Ministry of Jesus Begins
  '12':
  - type: text
    content: 'When Jesus heard that John had been arrested, he left Judea and returned to Galilee. '
  '13':
  - type: text
    content: 'He went first to Nazareth, then left there and moved to Capernaum, beside the Sea of Galilee, in the region of Zebulun and Naphtali. '
  '14':
  - type: text
    content: 'This fulfilled what God said through the prophet Isaiah:'
  '15':
  - type: text
    content: “In the land of Zebulun and of Naphtali,
  - type: text
    content: beside the sea, beyond the Jordan River,
  - type: text
    content: in Galilee where so many Gentiles live,
  '16':
  - type: text
    content: the people who sat in darkness
  - type: text
    content: have seen a great light.
  - type: text
    content: And for those who lived in the land where death casts its shadow,
  - type: text
    content: a light has shined.”
  - type: note
    content: Isa 9:1-2 (Greek version).
  '17':
  - type: text
    content: 'From then on Jesus began to preach, '
  - type: text
    content: “Repent of your sins and turn to God, for the Kingdom of Heaven is near.
  - type: note
    content: Or has come, or is coming soon.
  - type: text
    content: ”
  - type: heading
    content: The First Disciples
  '18':
  - type: text
    content: 'One day as Jesus was walking along the shore of the Sea of Galilee, he saw two brothers—Simon, also called Peter, and Andrew—throwing a net into the water, for they fished for a living. '
  '19':
  - type: text
    content: 'Jesus called out to them, '
  - type: text
    content: “Come, follow me, and I will show you how to fish for people!”
  - type: text
    content: ' '
  '2':
  - type: text
    content: For forty days and forty nights he fasted and became very hungry.
  '20':
  - type: text
    content: And they left their nets at once and followed him.
  '21':
  - type: text
    content: 'A little farther up the shore he saw two other brothers, James and John, sitting in a boat with their father, Zebedee, repairing their nets. And he called them to come, too. '
  '22':
  - type: text
    content: They immediately followed him, leaving the boat and their father behind.
  - type: heading
    content: Crowds Follow Jesus
  '23':
  - type: text
    content: 'Jesus traveled throughout the region of Galilee, teaching in the synagogues and announcing the Good News about the Kingdom. And he healed every kind of disease and illness. '
  '24':
  - type: text
    content: 'News about him spread as far as Syria, and people soon began bringing to him all who were sick. And whatever their sickness or disease, or if they were demon possessed or epileptic or paralyzed—he healed them all. '
  '25':
  - type: text
    content: Large crowds followed him wherever he went—people from Galilee, the Ten Towns,
  - type: note
    content: Greek Decapolis.
  - type: text
    content: ' Jerusalem, from all over Judea, and from east of the Jordan River.'
  '3':
  - type: text
    content: During that time the devil
  - type: note
    content: Greek the tempter.
  - type: text
    content: ' came and said to him, “If you are the Son of God, tell these stones to become loaves of bread.”'
  '4':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “No! The Scriptures say,
  - type: text
    content: ‘People do not live by bread alone,
  - type: text
    content: but by every word that comes from the mouth of God.’
  - type: text
    content: ' '
  - type: note
    content: Deut 8:3.
  - type: text
    content: ”
  '5':
  - type: text
    content: 'Then the devil took him to the holy city, Jerusalem, to the highest point of the Temple, '
  '6':
  - type: text
    content: and said, “If you are the Son of God, jump off! For the Scriptures say,
  - type: text
    content: ‘He will order his angels to protect you.
  - type: text
    content: And they will hold you up with their hands
  - type: text
    content: so you won’t even hurt your foot on a stone.’
  - type: note
    content: Ps 91:11-12.
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: '“The Scriptures also say, ‘You must not test the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’'
  - type: note
    content: Deut 6:16.
  - type: text
    content: ”
  '8':
  - type: text
    content: 'Next the devil took him to the peak of a very high mountain and showed him all the kingdoms of the world and their glory. '
  '9':
  - type: text
    content: “I will give it all to you,” he said, “if you will kneel down and worship me.”
