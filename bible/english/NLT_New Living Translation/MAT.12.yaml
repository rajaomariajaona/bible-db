document_id: MAT.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Discussion about the Sabbath
  - type: text
    content: 'At about that time Jesus was walking through some grainfields on the Sabbath. His disciples were hungry, so they began breaking off some heads of grain and eating them. '
  '10':
  - type: text
    content: where he noticed a man with a deformed hand. The Pharisees asked Jesus, “Does the law permit a person to work by healing on the Sabbath?” (They were hoping he would say yes, so they could bring charges against him.)
  '11':
  - type: text
    content: 'And he answered, '
  - type: text
    content: “If you had a sheep that fell into a well on the Sabbath, wouldn’t you work to pull it out? Of course you would.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And how much more valuable is a person than a sheep! Yes, the law permits a person to do good on the Sabbath.”
  '13':
  - type: text
    content: 'Then he said to the man, '
  - type: text
    content: “Hold out your hand.”
  - type: text
    content: ' So the man held out his hand, and it was restored, just like the other one! '
  '14':
  - type: text
    content: Then the Pharisees called a meeting to plot how to kill Jesus.
  - type: heading
    content: Jesus, God’s Chosen Servant
  '15':
  - type: text
    content: 'But Jesus knew what they were planning. So he left that area, and many people followed him. He healed all the sick among them, '
  '16':
  - type: text
    content: 'but he warned them not to reveal who he was. '
  '17':
  - type: text
    content: 'This fulfilled the prophecy of Isaiah concerning him:'
  '18':
  - type: text
    content: “Look at my Servant, whom I have chosen.
  - type: text
    content: He is my Beloved, who pleases me.
  - type: text
    content: I will put my Spirit upon him,
  - type: text
    content: and he will proclaim justice to the nations.
  '19':
  - type: text
    content: He will not fight or shout
  - type: text
    content: or raise his voice in public.
  '2':
  - type: text
    content: But some Pharisees saw them do it and protested, “Look, your disciples are breaking the law by harvesting grain on the Sabbath.”
  '20':
  - type: text
    content: He will not crush the weakest reed
  - type: text
    content: or put out a flickering candle.
  - type: text
    content: Finally he will cause justice to be victorious.
  '21':
  - type: text
    content: And his name will be the hope
  - type: text
    content: of all the world.”
  - type: note
    content: Isa 42:1-4 (Greek version for 42:4).
  - type: heading
    content: Jesus and the Prince of Demons
  '22':
  - type: text
    content: 'Then a demon-possessed man, who was blind and couldn’t speak, was brought to Jesus. He healed the man so that he could both speak and see. '
  '23':
  - type: text
    content: The crowd was amazed and asked, “Could it be that Jesus is the Son of David, the Messiah?”
  '24':
  - type: text
    content: But when the Pharisees heard about the miracle, they said, “No wonder he can cast out demons. He gets his power from Satan,
  - type: note
    content: Greek Beelzeboul; also in 12:27. Other manuscripts read Beezeboul; Latin version reads Beelzebub.
  - type: text
    content: ' the prince of demons.”'
  '25':
  - type: text
    content: 'Jesus knew their thoughts and replied, '
  - type: text
    content: “Any kingdom divided by civil war is doomed. A town or family splintered by feuding will fall apart.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan is casting out Satan, he is divided and fighting against himself. His own kingdom will not survive.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And if I am empowered by Satan, what about your own exorcists? They cast out demons, too, so they will condemn you for what you have said.
  - type: text
    content: ' '
  '28':
  - type: text
    content: But if I am casting out demons by the Spirit of God, then the Kingdom of God has arrived among you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: For who is powerful enough to enter the house of a strong man and plunder his goods? Only someone even stronger—someone who could tie him up and then plunder his house.
  '3':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Haven’t you read in the Scriptures what David did when he and his companions were hungry?
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “Anyone who isn’t with me opposes me, and anyone who isn’t working with me is actually working against me.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “So I tell you, every sin and blasphemy can be forgiven—except blasphemy against the Holy Spirit, which will never be forgiven.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Anyone who speaks against the Son of Man can be forgiven, but anyone who speaks against the Holy Spirit will never be forgiven, either in this world or in the world to come.
  '33':
  - type: text
    content: ' '
  - type: text
    content: “A tree is identified by its fruit. If a tree is good, its fruit will be good. If a tree is bad, its fruit will be bad.
  - type: text
    content: ' '
  '34':
  - type: text
    content: You brood of snakes! How could evil men like you speak what is good and right? For whatever is in your heart determines what you say.
  - type: text
    content: ' '
  '35':
  - type: text
    content: A good person produces good things from the treasury of a good heart, and an evil person produces evil things from the treasury of an evil heart.
  - type: text
    content: ' '
  '36':
  - type: text
    content: And I tell you this, you must give an account on judgment day for every idle word you speak.
  - type: text
    content: ' '
  '37':
  - type: text
    content: The words you say will either acquit you or condemn you.”
  - type: heading
    content: The Sign of Jonah
  '38':
  - type: text
    content: One day some teachers of religious law and Pharisees came to Jesus and said, “Teacher, we want you to show us a miraculous sign to prove your authority.”
  '39':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “Only an evil, adulterous generation would demand a miraculous sign; but the only sign I will give them is the sign of the prophet Jonah.
  - type: text
    content: ' '
  '4':
  - type: text
    content: He went into the house of God, and he and his companions broke the law by eating the sacred loaves of bread that only the priests are allowed to eat.
  - type: text
    content: ' '
  '40':
  - type: text
    content: For as Jonah was in the belly of the great fish for three days and three nights, so will the Son of Man be in the heart of the earth for three days and three nights.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “The people of Nineveh will stand up against this generation on judgment day and condemn it, for they repented of their sins at the preaching of Jonah. Now someone greater than Jonah is here—but you refuse to repent.
  - type: text
    content: ' '
  '42':
  - type: text
    content: The queen of Sheba
  - type: note
    content: Greek The queen of the south.
  - type: text
    content: ' '
  - type: text
    content: will also stand up against this generation on judgment day and condemn it, for she came from a distant land to hear the wisdom of Solomon. Now someone greater than Solomon is here—but you refuse to listen.
  '43':
  - type: text
    content: ' '
  - type: text
    content: “When an evil
  - type: text
    content: ' '
  - type: note
    content: Greek unclean.
  - type: text
    content: spirit leaves a person, it goes into the desert, seeking rest but finding none.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then it says, ‘I will return to the person I came from.’ So it returns and finds its former home empty, swept, and in order.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Then the spirit finds seven other spirits more evil than itself, and they all enter the person and live there. And so that person is worse off than before. That will be the experience of this evil generation.”
  - type: heading
    content: The True Family of Jesus
  '46':
  - type: text
    content: 'As Jesus was speaking to the crowd, his mother and brothers stood outside, asking to speak to him. '
  '47':
  - type: text
    content: Someone told Jesus, “Your mother and your brothers are standing outside, and they want to speak to you.”
  - type: note
    content: Some manuscripts do not include verse 47. Compare Mark 3:32 and Luke 8:20.
  '48':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “Who is my mother? Who are my brothers?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Then he pointed to his disciples and said, '
  - type: text
    content: “Look, these are my mother and brothers.
  - type: text
    content: ' '
  '5':
  - type: text
    content: And haven’t you read in the law of Moses that the priests on duty in the Temple may work on the Sabbath?
  - type: text
    content: ' '
  '50':
  - type: text
    content: Anyone who does the will of my Father in heaven is my brother and sister and mother!”
  '6':
  - type: text
    content: I tell you, there is one here who is even greater than the Temple!
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But you would not have condemned my innocent disciples if you knew the meaning of this Scripture: ‘I want you to show mercy, not offer sacrifices.’'
  - type: note
    content: Hos 6:6 (Greek version).
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: is Lord, even over the Sabbath!”
  - type: heading
    content: Jesus Heals on the Sabbath
  '9':
  - type: text
    content: 'Then Jesus went over to their synagogue, '
