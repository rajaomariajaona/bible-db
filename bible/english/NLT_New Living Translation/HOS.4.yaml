document_id: HOS.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Case against Israel
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', O people of Israel!'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought charges against you, saying:'
  - type: text
    content: “There is no faithfulness, no kindness,
  - type: text
    content: no knowledge of God in your land.
  '10':
  - type: text
    content: They will eat and still be hungry.
  - type: text
    content: They will play the prostitute and gain nothing from it,
  - type: text
    content: 'for they have deserted the '
  - type: text
    content: Lord
  '11':
  - type: text
    content: to worship other gods.
  - type: text
    content: “Wine has robbed my people
  - type: text
    content: of their understanding.
  '12':
  - type: text
    content: They ask a piece of wood for advice!
  - type: text
    content: They think a stick can tell them the future!
  - type: text
    content: Longing after idols
  - type: text
    content: has made them foolish.
  - type: text
    content: They have played the prostitute,
  - type: text
    content: serving other gods and deserting their God.
  '13':
  - type: text
    content: They offer sacrifices to idols on the mountaintops.
  - type: text
    content: They go up into the hills to burn incense
  - type: text
    content: in the pleasant shade of oaks, poplars, and terebinth trees.
  - type: text
    content: “That is why your daughters turn to prostitution,
  - type: text
    content: and your daughters-in-law commit adultery.
  '14':
  - type: text
    content: But why should I punish them
  - type: text
    content: for their prostitution and adultery?
  - type: text
    content: For your men are doing the same thing,
  - type: text
    content: sinning with whores and shrine prostitutes.
  - type: text
    content: O foolish people! You refuse to understand,
  - type: text
    content: so you will be destroyed.
  '15':
  - type: text
    content: “Though you, Israel, are a prostitute,
  - type: text
    content: may Judah not be guilty of such things.
  - type: text
    content: Do not join the false worship at Gilgal or Beth-aven,
  - type: note
    content: Beth-aven means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
  - type: text
    content: 'and do not take oaths there in the '
  - type: text
    content: Lord
  - type: text
    content: ’s name.
  '16':
  - type: text
    content: Israel is stubborn,
  - type: text
    content: like a stubborn heifer.
  - type: text
    content: 'So should the '
  - type: text
    content: Lord
  - type: text
    content: ' feed her'
  - type: text
    content: like a lamb in a lush pasture?
  '17':
  - type: text
    content: Leave Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' alone,'
  - type: text
    content: because she is married to idolatry.
  '18':
  - type: text
    content: When the rulers of Israel finish their drinking,
  - type: text
    content: off they go to find some prostitutes.
  - type: text
    content: They love shame more than honor.
  - type: note
    content: As in Greek version; the meaning of the Hebrew is uncertain.
  '19':
  - type: text
    content: So a mighty wind will sweep them away.
  - type: text
    content: Their sacrifices to idols will bring them shame.
  '2':
  - type: text
    content: You make vows and break them;
  - type: text
    content: you kill and steal and commit adultery.
  - type: text
    content: There is violence everywhere—
  - type: text
    content: one murder after another.
  '3':
  - type: text
    content: That is why your land is in mourning,
  - type: text
    content: and everyone is wasting away.
  - type: text
    content: Even the wild animals, the birds of the sky,
  - type: text
    content: and the fish of the sea are disappearing.
  '4':
  - type: text
    content: “Don’t point your finger at someone else
  - type: text
    content: and try to pass the blame!
  - type: text
    content: My complaint, you priests,
  - type: text
    content: is with you.
  - type: note
    content: Hebrew Your people are like those with a complaint against the priests.
  '5':
  - type: text
    content: So you will stumble in broad daylight,
  - type: text
    content: and your false prophets will fall with you in the night.
  - type: text
    content: And I will destroy Israel, your mother.
  '6':
  - type: text
    content: My people are being destroyed
  - type: text
    content: because they don’t know me.
  - type: text
    content: Since you priests refuse to know me,
  - type: text
    content: I refuse to recognize you as my priests.
  - type: text
    content: Since you have forgotten the laws of your God,
  - type: text
    content: I will forget to bless your children.
  '7':
  - type: text
    content: The more priests there are,
  - type: text
    content: the more they sin against me.
  - type: text
    content: They have exchanged the glory of God
  - type: text
    content: for the shame of idols.
  - type: note
    content: As in Syriac version and an ancient Hebrew tradition; Masoretic Text reads I will turn their glory into shame.
  '8':
  - type: text
    content: “When the people bring their sin offerings, the priests get fed.
  - type: text
    content: So the priests are glad when the people sin!
  '9':
  - type: text
    content: ‘And what the priests do, the people also do.’
  - type: text
    content: So now I will punish both priests and people
  - type: text
    content: for their wicked deeds.
