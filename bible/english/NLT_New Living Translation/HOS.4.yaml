document_id: HOS.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Case against Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', O people of Israel!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought charges against you, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There is no faithfulness, no kindness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no knowledge of God in your land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You make vows and break them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you kill and steal and commit adultery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is violence everywhere—
- type: usfm
  marker: q2
  children:
  - type: text
    text: one murder after another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: That is why your land is in mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone is wasting away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the wild animals, the birds of the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fish of the sea are disappearing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Don’t point your finger at someone else
- type: usfm
  marker: q2
  children:
  - type: text
    text: and try to pass the blame!
- type: usfm
  marker: q1
  children:
  - type: text
    text: My complaint, you priests,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is with you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Your people are like those with a complaint against the priests.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So you will stumble in broad daylight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your false prophets will fall with you in the night.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will destroy Israel, your mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: My people are being destroyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they don’t know me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since you priests refuse to know me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I refuse to recognize you as my priests.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since you have forgotten the laws of your God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will forget to bless your children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The more priests there are,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more they sin against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have exchanged the glory of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the shame of idols.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version and an ancient Hebrew tradition; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I will turn their glory into shame.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “When the people bring their sin offerings, the priests get fed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So the priests are glad when the people sin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘And what the priests do, the people also do.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: So now I will punish both priests and people
- type: usfm
  marker: q2
  children:
  - type: text
    text: for their wicked deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will eat and still be hungry.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will play the prostitute and gain nothing from it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for they have deserted the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: to worship other gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Wine has robbed my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: of their understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They ask a piece of wood for advice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They think a stick can tell them the future!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Longing after idols
- type: usfm
  marker: q2
  children:
  - type: text
    text: has made them foolish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have played the prostitute,
- type: usfm
  marker: q2
  children:
  - type: text
    text: serving other gods and deserting their God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They offer sacrifices to idols on the mountaintops.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They go up into the hills to burn incense
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the pleasant shade of oaks, poplars, and terebinth trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “That is why your daughters turn to prostitution,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your daughters-in-law commit adultery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But why should I punish them
- type: usfm
  marker: q2
  children:
  - type: text
    text: for their prostitution and adultery?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your men are doing the same thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sinning with whores and shrine prostitutes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O foolish people! You refuse to understand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you will be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Though you, Israel, are a prostitute,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may Judah not be guilty of such things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not join the false worship at Gilgal or Beth-aven,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-aven '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “house of wickedness”; it is being used as another name for Bethel, which means “house of God.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and do not take oaths there in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Israel is stubborn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a stubborn heifer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So should the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' feed her'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lamb in a lush pasture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Leave Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel.
    marker-yv: yv-n
  - type: text
    text: ' alone,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: because she is married to idolatry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When the rulers of Israel finish their drinking,
- type: usfm
  marker: q2
  children:
  - type: text
    text: off they go to find some prostitutes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They love shame more than honor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Greek version; the meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So a mighty wind will sweep them away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their sacrifices to idols will bring them shame.
