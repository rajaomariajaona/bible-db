document_id: 2CH.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Rules in Judah
  - type: text
    content: 'Manasseh was twelve years old when he became king, and he reigned in Jerusalem fifty-five years. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Manasseh and his people, but they ignored all his warnings. '
  '11':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent the commanders of the Assyrian armies, and they took Manasseh prisoner. They put a ring through his nose, bound him in bronze chains, and led him away to Babylon. '
  '12':
  - type: text
    content: 'But while in deep distress, Manasseh sought the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and sincerely humbled himself before the God of his ancestors. '
  '13':
  - type: text
    content: 'And when he prayed, the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to him and was moved by his request. So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought Manasseh back to Jerusalem and to his kingdom. Then Manasseh finally realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' alone is God!'
  '14':
  - type: text
    content: 'After this Manasseh rebuilt the outer wall of the City of David, from west of the Gihon Spring in the Kidron Valley to the Fish Gate, and continuing around the hill of Ophel. He built the wall very high. And he stationed his military officers in all of the fortified towns of Judah. '
  '15':
  - type: text
    content: 'Manasseh also removed the foreign gods and the idol from the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. He tore down all the altars he had built on the hill where the Temple stood and all the altars that were in Jerusalem, and he dumped them outside the city. '
  '16':
  - type: text
    content: 'Then he restored the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' and sacrificed peace offerings and thanksgiving offerings on it. He also encouraged the people of Judah to worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '17':
  - type: text
    content: 'However, the people still sacrificed at the pagan shrines, though only to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '18':
  - type: text
    content: 'The rest of the events of Manasseh’s reign, his prayer to God, and the words the seers spoke to him in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, are recorded in '
  - type: text
    content: The Book of the Kings of Israel.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Manasseh’s prayer, the account of the way God answered him, and an account of all his sins and unfaithfulness are recorded in '
  - type: text
    content: The Record of the Seers.
  - type: note
    content: Or The Record of Hozai.
  - type: text
    content: ' It includes a list of the locations where he built pagan shrines and set up Asherah poles and idols before he humbled himself and repented. '
  '2':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, following the detestable practices of the pagan nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of the Israelites. '
  '20':
  - type: text
    content: When Manasseh died, he was buried in his palace. Then his son Amon became the next king.
  - type: heading
    content: Amon Rules in Judah
  '21':
  - type: text
    content: 'Amon was twenty-two years old when he became king, and he reigned in Jerusalem two years. '
  '22':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as his father, Manasseh, had done. He worshiped and sacrificed to all the idols his father had made. '
  '23':
  - type: text
    content: 'But unlike his father, he did not humble himself before the '
  - type: text
    content: Lord
  - type: text
    content: . Instead, Amon sinned even more.
  '24':
  - type: text
    content: 'Then Amon’s own officials conspired against him and assassinated him in his palace. '
  '25':
  - type: text
    content: But the people of the land killed all those who had conspired against King Amon, and they made his son Josiah the next king.
  '3':
  - type: text
    content: He rebuilt the pagan shrines his father, Hezekiah, had broken down. He constructed altars for the images of Baal and set up Asherah poles. He also bowed before all the powers of the heavens and worshiped them.
  '4':
  - type: text
    content: 'He built pagan altars in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the place where the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, “My name will remain in Jerusalem forever.” '
  '5':
  - type: text
    content: 'He built these altars for all the powers of the heavens in both courtyards of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '6':
  - type: text
    content: Manasseh also sacrificed his own sons in the fire
  - type: note
    content: Or also made his sons pass through the fire.
  - type: text
    content: ' in the valley of Ben-Hinnom. He practiced sorcery, divination, and witchcraft, and he consulted with mediums and psychics. He did much that was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, arousing his anger.
  '7':
  - type: text
    content: 'Manasseh even took a carved idol he had made and set it up in God’s Temple, the very place where God had told David and his son Solomon: “My name will be honored forever in this Temple and in Jerusalem—the city I have chosen from among all the tribes of Israel. '
  '8':
  - type: text
    content: 'If the Israelites will be careful to obey my commands—all the laws, decrees, and regulations given through Moses—I will not send them into exile from this land that I set aside for your ancestors.” '
  '9':
  - type: text
    content: 'But Manasseh led the people of Judah and Jerusalem to do even more evil than the pagan nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' had destroyed when the people of Israel entered the land.'
