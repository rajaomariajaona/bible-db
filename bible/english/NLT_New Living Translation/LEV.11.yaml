document_id: LEV.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ceremonially Clean and Unclean Animals
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '10':
  - type: text
    content: 'But you must never eat animals from the sea or from rivers that do not have both fins and scales. They are detestable to you. This applies both to little creatures that live in shallow water and to all creatures that live in deep water. '
  '11':
  - type: text
    content: 'They will always be detestable to you. You must never eat their meat or even touch their dead bodies. '
  '12':
  - type: text
    content: Any marine animal that does not have both fins and scales is detestable to you.
  '13':
  - type: text
    content: '“These are the birds that are detestable to you. You must never eat them: the griffon vulture, the bearded vulture, the black vulture, '
  '14':
  - type: text
    content: 'the kite, falcons of all kinds, '
  '15':
  - type: text
    content: 'ravens of all kinds, '
  '16':
  - type: text
    content: 'the eagle owl, the short-eared owl, the seagull, hawks of all kinds, '
  '17':
  - type: text
    content: 'the little owl, the cormorant, the great owl, '
  '18':
  - type: text
    content: 'the barn owl, the desert owl, the Egyptian vulture, '
  '19':
  - type: text
    content: the stork, herons of all kinds, the hoopoe, and the bat.
  '2':
  - type: text
    content: “Give the following instructions to the people of Israel.
  - type: text
    content: '“Of all the land animals, these are the ones you may use for food. '
  '20':
  - type: text
    content: '“You must not eat winged insects that walk along the ground; they are detestable to you. '
  '21':
  - type: text
    content: 'You may, however, eat winged insects that walk along the ground and have jointed legs so they can jump. '
  '22':
  - type: text
    content: 'The insects you are permitted to eat include all kinds of locusts, bald locusts, crickets, and grasshoppers. '
  '23':
  - type: text
    content: All other winged insects that walk along the ground are detestable to you.
  '24':
  - type: text
    content: '“The following creatures will make you ceremonially unclean. If any of you touch their carcasses, you will be defiled until evening. '
  '25':
  - type: text
    content: If you pick up their carcasses, you must wash your clothes, and you will remain defiled until evening.
  '26':
  - type: text
    content: '“Any animal that has split hooves that are not evenly divided or that does not chew the cud is unclean for you. If you touch the carcass of such an animal, you will be defiled. '
  '27':
  - type: text
    content: 'Of the animals that walk on all fours, those that have paws are unclean. If you touch the carcass of such an animal, you will be defiled until evening. '
  '28':
  - type: text
    content: If you pick up its carcass, you must wash your clothes, and you will remain defiled until evening. These animals are unclean for you.
  '29':
  - type: text
    content: '“Of the small animals that scurry along the ground, these are unclean for you: the mole rat, the rat, large lizards of all kinds, '
  '3':
  - type: text
    content: 'You may eat any animal that has completely split hooves and chews the cud. '
  '30':
  - type: text
    content: 'the gecko, the monitor lizard, the common lizard, the sand lizard, and the chameleon. '
  '31':
  - type: text
    content: 'All these small animals are unclean for you. If any of you touch the dead body of such an animal, you will be defiled until evening. '
  '32':
  - type: text
    content: If such an animal dies and falls on something, that object will be unclean. This is true whether the object is made of wood, cloth, leather, or burlap. Whatever its use, you must dip it in water, and it will remain defiled until evening. After that, it will be ceremonially clean and may be used again.
  '33':
  - type: text
    content: '“If such an animal falls into a clay pot, everything in the pot will be defiled, and the pot must be smashed. '
  '34':
  - type: text
    content: 'If the water from such a container spills on any food, the food will be defiled. And any beverage in such a container will be defiled. '
  '35':
  - type: text
    content: Any object on which the carcass of such an animal falls will be defiled. If it is an oven or hearth, it must be destroyed, for it is defiled, and you must treat it accordingly.
  '36':
  - type: text
    content: '“However, if the carcass of such an animal falls into a spring or a cistern, the water will still be clean. But anyone who touches the carcass will be defiled. '
  '37':
  - type: text
    content: 'If the carcass falls on seed grain to be planted in the field, the seed will still be considered clean. '
  '38':
  - type: text
    content: But if the seed is wet when the carcass falls on it, the seed will be defiled.
  '39':
  - type: text
    content: '“If an animal you are permitted to eat dies and you touch its carcass, you will be defiled until evening. '
  '4':
  - type: text
    content: You may not, however, eat the following animals
  - type: note
    content: The identification of some of the animals, birds, and insects in this chapter is uncertain.
  - type: text
    content: ' that have split hooves or that chew the cud, but not both. The camel chews the cud but does not have split hooves, so it is ceremonially unclean for you. '
  '40':
  - type: text
    content: If you eat any of its meat or carry away its carcass, you must wash your clothes, and you will remain defiled until evening.
  '41':
  - type: text
    content: '“All small animals that scurry along the ground are detestable, and you must never eat them. '
  '42':
  - type: text
    content: 'This includes all animals that slither along on their bellies, as well as those with four legs and those with many feet. All such animals that scurry along the ground are detestable, and you must never eat them. '
  '43':
  - type: text
    content: 'Do not defile yourselves by touching them. You must not make yourselves ceremonially unclean because of them. '
  '44':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You must consecrate yourselves and be holy, because I am holy. So do not defile yourselves with any of these small animals that scurry along the ground. '
  '45':
  - type: text
    content: 'For I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am the one who brought you up from the land of Egypt, that I might be your God. Therefore, you must be holy because I am holy.'
  '46':
  - type: text
    content: '“These are the instructions regarding land animals, birds, marine creatures, and animals that scurry along the ground. '
  '47':
  - type: text
    content: By these instructions you will know what is unclean and clean, and which animals may be eaten and which may not be eaten.”
  '5':
  - type: text
    content: The hyrax
  - type: note
    content: Or coney, or rock badger.
  - type: text
    content: ' chews the cud but does not have split hooves, so it is unclean. '
  '6':
  - type: text
    content: 'The hare chews the cud but does not have split hooves, so it is unclean. '
  '7':
  - type: text
    content: 'The pig has evenly split hooves but does not chew the cud, so it is unclean. '
  '8':
  - type: text
    content: You may not eat the meat of these animals or even touch their carcasses. They are ceremonially unclean for you.
  '9':
  - type: text
    content: '“Of all the marine animals, these are ones you may use for food. You may eat anything from the water if it has both fins and scales, whether taken from salt water or from streams. '
