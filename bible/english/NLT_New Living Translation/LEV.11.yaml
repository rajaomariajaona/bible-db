document_id: LEV.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ceremonially Clean and Unclean Animals
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Give the following instructions to the people of Israel.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Of all the land animals, these are the ones you may use for food. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You may eat any animal that has completely split hooves and chews the cud. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You may not, however, eat the following animals
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of some of the animals, birds, and insects in this chapter is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' that have split hooves or that chew the cud, but not both. The camel chews the cud but does not have split hooves, so it is ceremonially unclean for you. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The hyrax
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coney, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rock badger.
    marker-yv: yv-n
  - type: text
    text: ' chews the cud but does not have split hooves, so it is unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The hare chews the cud but does not have split hooves, so it is unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The pig has evenly split hooves but does not chew the cud, so it is unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You may not eat the meat of these animals or even touch their carcasses. They are ceremonially unclean for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Of all the marine animals, these are ones you may use for food. You may eat anything from the water if it has both fins and scales, whether taken from salt water or from streams. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But you must never eat animals from the sea or from rivers that do not have both fins and scales. They are detestable to you. This applies both to little creatures that live in shallow water and to all creatures that live in deep water. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They will always be detestable to you. You must never eat their meat or even touch their dead bodies. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Any marine animal that does not have both fins and scales is detestable to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“These are the birds that are detestable to you. You must never eat them: the griffon vulture, the bearded vulture, the black vulture, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the kite, falcons of all kinds, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ravens of all kinds, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the eagle owl, the short-eared owl, the seagull, hawks of all kinds, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the little owl, the cormorant, the great owl, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the barn owl, the desert owl, the Egyptian vulture, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: the stork, herons of all kinds, the hoopoe, and the bat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“You must not eat winged insects that walk along the ground; they are detestable to you. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You may, however, eat winged insects that walk along the ground and have jointed legs so they can jump. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The insects you are permitted to eat include all kinds of locusts, bald locusts, crickets, and grasshoppers. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: All other winged insects that walk along the ground are detestable to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“The following creatures will make you ceremonially unclean. If any of you touch their carcasses, you will be defiled until evening. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: If you pick up their carcasses, you must wash your clothes, and you will remain defiled until evening.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Any animal that has split hooves that are not evenly divided or that does not chew the cud is unclean for you. If you touch the carcass of such an animal, you will be defiled. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Of the animals that walk on all fours, those that have paws are unclean. If you touch the carcass of such an animal, you will be defiled until evening. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If you pick up its carcass, you must wash your clothes, and you will remain defiled until evening. These animals are unclean for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Of the small animals that scurry along the ground, these are unclean for you: the mole rat, the rat, large lizards of all kinds, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'the gecko, the monitor lizard, the common lizard, the sand lizard, and the chameleon. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'All these small animals are unclean for you. If any of you touch the dead body of such an animal, you will be defiled until evening. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If such an animal dies and falls on something, that object will be unclean. This is true whether the object is made of wood, cloth, leather, or burlap. Whatever its use, you must dip it in water, and it will remain defiled until evening. After that, it will be ceremonially clean and may be used again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“If such an animal falls into a clay pot, everything in the pot will be defiled, and the pot must be smashed. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'If the water from such a container spills on any food, the food will be defiled. And any beverage in such a container will be defiled. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Any object on which the carcass of such an animal falls will be defiled. If it is an oven or hearth, it must be destroyed, for it is defiled, and you must treat it accordingly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“However, if the carcass of such an animal falls into a spring or a cistern, the water will still be clean. But anyone who touches the carcass will be defiled. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'If the carcass falls on seed grain to be planted in the field, the seed will still be considered clean. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: But if the seed is wet when the carcass falls on it, the seed will be defiled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“If an animal you are permitted to eat dies and you touch its carcass, you will be defiled until evening. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: If you eat any of its meat or carry away its carcass, you must wash your clothes, and you will remain defiled until evening.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“All small animals that scurry along the ground are detestable, and you must never eat them. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'This includes all animals that slither along on their bellies, as well as those with four legs and those with many feet. All such animals that scurry along the ground are detestable, and you must never eat them. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Do not defile yourselves by touching them. You must not make yourselves ceremonially unclean because of them. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'For I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. You must consecrate yourselves and be holy, because I am holy. So do not defile yourselves with any of these small animals that scurry along the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'For I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', am the one who brought you up from the land of Egypt, that I might be your God. Therefore, you must be holy because I am holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '“These are the instructions regarding land animals, birds, marine creatures, and animals that scurry along the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: By these instructions you will know what is unclean and clean, and which animals may be eaten and which may not be eaten.”
