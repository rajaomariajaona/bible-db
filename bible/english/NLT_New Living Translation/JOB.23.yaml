document_id: JOB.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job’s Eighth Speech: A Response to Eliphaz'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Job spoke again:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “But he knows where I am going.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when he tests me, I will come out as pure as gold.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For I have stayed on God’s paths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have followed his ways and not turned aside.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I have not departed from his commands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but have treasured his words more than daily food.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But once he has made his decision, who can change his mind?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whatever he wants to do, he does.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So he will do to me whatever he has planned.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He controls my destiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: No wonder I am so terrified in his presence.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I think of it, terror grips me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: God has made me sick at heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Almighty has terrified me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Darkness is all around me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thick, impenetrable darkness is everywhere.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “My complaint today is still a bitter one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I try hard not to groan aloud.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: If only I knew where to find God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would go to his court.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I would lay out my case
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and present my arguments.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then I would listen to his reply
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and understand what he says to me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Would he use his great power to argue with me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, he would give me a fair hearing.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Honest people can reason with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I would be forever acquitted by my judge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I go east, but he is not there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I go west, but I cannot find him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I do not see him in the north, for he is hidden.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I look to the south, but he is concealed.
