document_id: JOB.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Eighth Speech: A Response to Eliphaz'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: “But he knows where I am going.
  - type: text
    content: And when he tests me, I will come out as pure as gold.
  '11':
  - type: text
    content: For I have stayed on God’s paths;
  - type: text
    content: I have followed his ways and not turned aside.
  '12':
  - type: text
    content: I have not departed from his commands,
  - type: text
    content: but have treasured his words more than daily food.
  '13':
  - type: text
    content: But once he has made his decision, who can change his mind?
  - type: text
    content: Whatever he wants to do, he does.
  '14':
  - type: text
    content: So he will do to me whatever he has planned.
  - type: text
    content: He controls my destiny.
  '15':
  - type: text
    content: No wonder I am so terrified in his presence.
  - type: text
    content: When I think of it, terror grips me.
  '16':
  - type: text
    content: God has made me sick at heart;
  - type: text
    content: the Almighty has terrified me.
  '17':
  - type: text
    content: Darkness is all around me;
  - type: text
    content: thick, impenetrable darkness is everywhere.
  '2':
  - type: text
    content: “My complaint today is still a bitter one,
  - type: text
    content: and I try hard not to groan aloud.
  '3':
  - type: text
    content: If only I knew where to find God,
  - type: text
    content: I would go to his court.
  '4':
  - type: text
    content: I would lay out my case
  - type: text
    content: and present my arguments.
  '5':
  - type: text
    content: Then I would listen to his reply
  - type: text
    content: and understand what he says to me.
  '6':
  - type: text
    content: Would he use his great power to argue with me?
  - type: text
    content: No, he would give me a fair hearing.
  '7':
  - type: text
    content: Honest people can reason with him,
  - type: text
    content: so I would be forever acquitted by my judge.
  '8':
  - type: text
    content: I go east, but he is not there.
  - type: text
    content: I go west, but I cannot find him.
  '9':
  - type: text
    content: I do not see him in the north, for he is hidden.
  - type: text
    content: I look to the south, but he is concealed.
