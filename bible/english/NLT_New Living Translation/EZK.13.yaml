document_id: EZK.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against False Prophets
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: '“This will happen because these evil prophets deceive my people by saying, ‘All is peaceful’ when there is no peace at all! It’s as if the people have built a flimsy wall, and these prophets are trying to reinforce it by covering it with whitewash! '
  '11':
  - type: text
    content: 'Tell these whitewashers that their wall will soon fall down. A heavy rainstorm will undermine it; great hailstones and mighty winds will knock it down. '
  '12':
  - type: text
    content: And when the wall falls, the people will cry out, ‘What happened to your whitewash?’
  '13':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will sweep away your whitewashed wall with a storm of indignation, with a great flood of anger, and with hailstones of fury. '
  '14':
  - type: text
    content: 'I will break down your wall right to its foundation, and when it falls, it will crush you. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'At last my anger against the wall and those who covered it with whitewash will be satisfied. Then I will say to you: ‘The wall and those who whitewashed it are both gone. '
  '16':
  - type: text
    content: 'They were lying prophets who claimed peace would come to Jerusalem when there was no peace. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’'
  - type: heading
    content: Judgment against False Women Prophets
  '17':
  - type: text
    content: '“Now, son of man, speak out against the women who prophesy from their own imaginations. '
  '18':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: What sorrow awaits you women who are ensnaring the souls of my people, young and old alike. You tie magic charms on their wrists and furnish them with magic veils. Do you think you can trap others without bringing destruction on yourselves? '
  '19':
  - type: text
    content: You bring shame on me among my people for a few handfuls of barley or a piece of bread. By lying to my people who love to listen to lies, you kill those who should not die, and you promise life to those who should not live.
  '2':
  - type: text
    content: '“Son of man, prophesy against the false prophets of Israel who are inventing their own prophecies. Say to them, ‘Listen to the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against all your magic charms, which you use to ensnare my people like birds. I will tear them from your arms, setting my people free like birds set free from a cage. '
  '21':
  - type: text
    content: 'I will tear off the magic veils and save my people from your grasp. They will no longer be your victims. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'You have discouraged the righteous with your lies, but I didn’t want them to be sad. And you have encouraged the wicked by promising them life, even though they continue in their sins. '
  '23':
  - type: text
    content: 'Because of all this, you will no longer talk of seeing visions that you never saw, nor will you make predictions. For I will rescue my people from your grasp. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: What sorrow awaits the false prophets who are following their own imaginations and have seen nothing at all!’'
  '4':
  - type: text
    content: '“O people of Israel, these prophets of yours are like jackals digging in the ruins. '
  '5':
  - type: text
    content: 'They have done nothing to repair the breaks in the walls around the nation. They have not helped it to stand firm in battle on the day of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Instead, they have told lies and made false predictions. They say, ‘This message is from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ even though the '
  - type: text
    content: Lord
  - type: text
    content: ' never sent them. And yet they expect him to fulfill their prophecies! '
  '7':
  - type: text
    content: 'Can your visions be anything but false if you claim, ‘This message is from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ when I have not even spoken to you?'
  '8':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because what you say is false and your visions are a lie, I will stand against you, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'I will raise my fist against all the prophets who see false visions and make lying predictions, and they will be banished from the community of Israel. I will blot their names from Israel’s record books, and they will never again set foot in their own land. Then you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
