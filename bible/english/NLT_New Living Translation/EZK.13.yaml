document_id: EZK.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against False Prophets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, prophesy against the false prophets of Israel who are inventing their own prophecies. Say to them, ‘Listen to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: What sorrow awaits the false prophets who are following their own imaginations and have seen nothing at all!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“O people of Israel, these prophets of yours are like jackals digging in the ruins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They have done nothing to repair the breaks in the walls around the nation. They have not helped it to stand firm in battle on the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Instead, they have told lies and made false predictions. They say, ‘This message is from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',’ even though the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' never sent them. And yet they expect him to fulfill their prophecies! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Can your visions be anything but false if you claim, ‘This message is from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',’ when I have not even spoken to you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because what you say is false and your visions are a lie, I will stand against you, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will raise my fist against all the prophets who see false visions and make lying predictions, and they will be banished from the community of Israel. I will blot their names from Israel’s record books, and they will never again set foot in their own land. Then you will know that I am the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“This will happen because these evil prophets deceive my people by saying, ‘All is peaceful’ when there is no peace at all! It’s as if the people have built a flimsy wall, and these prophets are trying to reinforce it by covering it with whitewash! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tell these whitewashers that their wall will soon fall down. A heavy rainstorm will undermine it; great hailstones and mighty winds will knock it down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And when the wall falls, the people will cry out, ‘What happened to your whitewash?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will sweep away your whitewashed wall with a storm of indignation, with a great flood of anger, and with hailstones of fury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will break down your wall right to its foundation, and when it falls, it will crush you. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'At last my anger against the wall and those who covered it with whitewash will be satisfied. Then I will say to you: ‘The wall and those who whitewashed it are both gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They were lying prophets who claimed peace would come to Jerusalem when there was no peace. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against False Women Prophets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Now, son of man, speak out against the women who prophesy from their own imaginations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: What sorrow awaits you women who are ensnaring the souls of my people, young and old alike. You tie magic charms on their wrists and furnish them with magic veils. Do you think you can trap others without bringing destruction on yourselves? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You bring shame on me among my people for a few handfuls of barley or a piece of bread. By lying to my people who love to listen to lies, you kill those who should not die, and you promise life to those who should not live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am against all your magic charms, which you use to ensnare my people like birds. I will tear them from your arms, setting my people free like birds set free from a cage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will tear off the magic veils and save my people from your grasp. They will no longer be your victims. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You have discouraged the righteous with your lies, but I didn’t want them to be sad. And you have encouraged the wicked by promising them life, even though they continue in their sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Because of all this, you will no longer talk of seeing visions that you never saw, nor will you make predictions. For I will rescue my people from your grasp. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
