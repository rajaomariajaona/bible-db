document_id: 2KI.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Uzziah Rules in Judah
  - type: text
    content: Uzziah
  - type: note
    content: Hebrew Azariah, a variant spelling of Uzziah; also in 15:6, 7, 8, 17, 23, 27.
  - type: text
    content: ' son of Amaziah began to rule over Judah in the twenty-seventh year of the reign of King Jeroboam II of Israel. '
  '10':
  - type: text
    content: Then Shallum son of Jabesh conspired against Zechariah, assassinated him in public,
  - type: note
    content: Or at Ibleam.
  - type: text
    content: ' and became the next king.'
  '11':
  - type: text
    content: 'The rest of the events in Zechariah’s reign are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: '’s message to Jehu came true: “Your descendants will be kings of Israel down to the fourth generation.”'
  - type: heading
    content: Shallum Rules in Israel
  '13':
  - type: text
    content: 'Shallum son of Jabesh began to rule over Israel in the thirty-ninth year of King Uzziah’s reign in Judah. Shallum reigned in Samaria only one month. '
  '14':
  - type: text
    content: Then Menahem son of Gadi went to Samaria from Tirzah and assassinated him, and he became the next king.
  '15':
  - type: text
    content: 'The rest of the events in Shallum’s reign, including his conspiracy, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: heading
    content: Menahem Rules in Israel
  '16':
  - type: text
    content: At that time Menahem destroyed the town of Tappuah
  - type: note
    content: As in some Greek manuscripts; Hebrew reads Tiphsah.
  - type: text
    content: ' and all the surrounding countryside as far as Tirzah, because its citizens refused to surrender the town. He killed the entire population and ripped open the pregnant women.'
  '17':
  - type: text
    content: 'Menahem son of Gadi began to rule over Israel in the thirty-ninth year of King Uzziah’s reign in Judah. He reigned in Samaria ten years. '
  '18':
  - type: text
    content: 'But Menahem did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight. During his entire reign, he refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '19':
  - type: text
    content: Then King Tiglath-pileser
  - type: note
    content: Hebrew Pul, another name for Tiglath-pileser.
  - type: text
    content: ' of Assyria invaded the land. But Menahem paid him thirty-seven tons'
  - type: note
    content: Hebrew 1,000 talents [34 metric tons].
  - type: text
    content: ' of silver to gain his support in tightening his grip on royal power. '
  '2':
  - type: text
    content: He was sixteen years old when he became king, and he reigned in Jerusalem fifty-two years. His mother was Jecoliah from Jerusalem.
  '20':
  - type: text
    content: Menahem extorted the money from the rich of Israel, demanding that each of them pay fifty pieces
  - type: note
    content: Hebrew 50 shekels [20 ounces or 570 grams].
  - type: text
    content: ' of silver to the king of Assyria. So the king of Assyria turned from attacking Israel and did not stay in the land.'
  '21':
  - type: text
    content: 'The rest of the events in Menahem’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '22':
  - type: text
    content: When Menahem died, his son Pekahiah became the next king.
  - type: heading
    content: Pekahiah Rules in Israel
  '23':
  - type: text
    content: 'Pekahiah son of Menahem began to rule over Israel in the fiftieth year of King Uzziah’s reign in Judah. He reigned in Samaria two years. '
  '24':
  - type: text
    content: 'But Pekahiah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '25':
  - type: text
    content: Then Pekah son of Remaliah, the commander of Pekahiah’s army, conspired against him. With fifty men from Gilead, Pekah assassinated the king, along with Argob and Arieh, in the citadel of the palace at Samaria. And Pekah reigned in his place.
  '26':
  - type: text
    content: 'The rest of the events in Pekahiah’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: heading
    content: Pekah Rules in Israel
  '27':
  - type: text
    content: 'Pekah son of Remaliah began to rule over Israel in the fifty-second year of King Uzziah’s reign in Judah. He reigned in Samaria twenty years. '
  '28':
  - type: text
    content: 'But Pekah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '29':
  - type: text
    content: 'During Pekah’s reign, King Tiglath-pileser of Assyria attacked Israel again, and he captured the towns of Ijon, Abel-beth-maacah, Janoah, Kedesh, and Hazor. He also conquered the regions of Gilead, Galilee, and all of Naphtali, and he took the people to Assyria as captives. '
  '3':
  - type: text
    content: 'He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as his father, Amaziah, had done. '
  '30':
  - type: text
    content: Then Hoshea son of Elah conspired against Pekah and assassinated him. He began to rule over Israel in the twentieth year of Jotham son of Uzziah.
  '31':
  - type: text
    content: 'The rest of the events in Pekah’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: heading
    content: Jotham Rules in Judah
  '32':
  - type: text
    content: 'Jotham son of Uzziah began to rule over Judah in the second year of King Pekah’s reign in Israel. '
  '33':
  - type: text
    content: He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother was Jerusha, the daughter of Zadok.
  '34':
  - type: text
    content: 'Jotham did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. He did everything his father, Uzziah, had done. '
  '35':
  - type: text
    content: 'But he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there. He rebuilt the upper gate of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: 'The rest of the events in Jotham’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'In those days the '
  - type: text
    content: Lord
  - type: text
    content: ' began to send King Rezin of Aram and King Pekah of Israel to attack Judah. '
  '38':
  - type: text
    content: When Jotham died, he was buried with his ancestors in the City of David. And his son Ahaz became the next king.
  '4':
  - type: text
    content: 'But he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' struck the king with leprosy,'
  - type: note
    content: Or with a contagious skin disease. The Hebrew word used here and throughout this passage can describe various skin diseases.
  - type: text
    content: ' which lasted until the day he died. He lived in isolation in a separate house. The king’s son Jotham was put in charge of the royal palace, and he governed the people of the land.'
  '6':
  - type: text
    content: 'The rest of the events in Uzziah’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '7':
  - type: text
    content: When Uzziah died, he was buried with his ancestors in the City of David. And his son Jotham became the next king.
  - type: heading
    content: Zechariah Rules in Israel
  '8':
  - type: text
    content: 'Zechariah son of Jeroboam II began to rule over Israel in the thirty-eighth year of King Uzziah’s reign in Judah. He reigned in Samaria six months. '
  '9':
  - type: text
    content: 'Zechariah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, as his ancestors had done. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit. '
