document_id: 2KI.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Uzziah Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Uzziah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Azariah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Uzziah; also in 15:6, 7, 8, 17, 23, 27.
      marker-yv: yv-n
    - type: text
      text: ' son of Amaziah began to rule over Judah in the twenty-seventh year of the reign of King Jeroboam II of Israel. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then Shallum son of Jabesh conspired against Zechariah, assassinated him in public,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: at Ibleam.
      marker-yv: yv-n
    - type: text
      text: ' and became the next king.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The rest of the events in Zechariah’s reign are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s message to Jehu came true: “Your descendants will be kings of Israel down to the fourth generation.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shallum Rules in Israel
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Shallum son of Jabesh began to rule over Israel in the thirty-ninth year of King Uzziah’s reign in Judah. Shallum reigned in Samaria only one month. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then Menahem son of Gadi went to Samaria from Tirzah and assassinated him, and he became the next king.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The rest of the events in Shallum’s reign, including his conspiracy, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menahem Rules in Israel
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: At that time Menahem destroyed the town of Tappuah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tiphsah.
      marker-yv: yv-n
    - type: text
      text: ' and all the surrounding countryside as far as Tirzah, because its citizens refused to surrender the town. He killed the entire population and ripped open the pregnant women.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Menahem son of Gadi began to rule over Israel in the thirty-ninth year of King Uzziah’s reign in Judah. He reigned in Samaria ten years. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But Menahem did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight. During his entire reign, he refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then King Tiglath-pileser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Pul, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Tiglath-pileser.
      marker-yv: yv-n
    - type: text
      text: ' of Assyria invaded the land. But Menahem paid him thirty-seven tons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1,000 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 metric tons].'
      marker-yv: yv-n
    - type: text
      text: ' of silver to gain his support in tightening his grip on royal power. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He was sixteen years old when he became king, and he reigned in Jerusalem fifty-two years. His mother was Jecoliah from Jerusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Menahem extorted the money from the rich of Israel, demanding that each of them pay fifty pieces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20 ounces or 570 grams].'
      marker-yv: yv-n
    - type: text
      text: ' of silver to the king of Assyria. So the king of Assyria turned from attacking Israel and did not stay in the land.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The rest of the events in Menahem’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When Menahem died, his son Pekahiah became the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pekahiah Rules in Israel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pekahiah son of Menahem began to rule over Israel in the fiftieth year of King Uzziah’s reign in Judah. He reigned in Samaria two years. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But Pekahiah did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then Pekah son of Remaliah, the commander of Pekahiah’s army, conspired against him. With fifty men from Gilead, Pekah assassinated the king, along with Argob and Arieh, in the citadel of the palace at Samaria. And Pekah reigned in his place.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The rest of the events in Pekahiah’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pekah Rules in Israel
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pekah son of Remaliah began to rule over Israel in the fifty-second year of King Uzziah’s reign in Judah. He reigned in Samaria twenty years. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But Pekah did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'During Pekah’s reign, King Tiglath-pileser of Assyria attacked Israel again, and he captured the towns of Ijon, Abel-beth-maacah, Janoah, Kedesh, and Hazor. He also conquered the regions of Gilead, Galilee, and all of Naphtali, and he took the people to Assyria as captives. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, just as his father, Amaziah, had done. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then Hoshea son of Elah conspired against Pekah and assassinated him. He began to rule over Israel in the twentieth year of Jotham son of Uzziah.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The rest of the events in Pekah’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jotham Rules in Judah
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jotham son of Uzziah began to rule over Judah in the second year of King Pekah’s reign in Israel. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother was Jerusha, the daughter of Zadok.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jotham did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight. He did everything his father, Uzziah, had done. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'But he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there. He rebuilt the upper gate of the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'The rest of the events in Jotham’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'In those days the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' began to send King Rezin of Aram and King Pekah of Israel to attack Judah. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: When Jotham died, he was buried with his ancestors in the City of David. And his son Ahaz became the next king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But he did not destroy the pagan shrines, and the people still offered sacrifices and burned incense there. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck the king with leprosy,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with a contagious skin disease. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here and throughout this passage can describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' which lasted until the day he died. He lived in isolation in a separate house. The king’s son Jotham was put in charge of the royal palace, and he governed the people of the land.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The rest of the events in Uzziah’s reign and everything he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When Uzziah died, he was buried with his ancestors in the City of David. And his son Jotham became the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zechariah Rules in Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Zechariah son of Jeroboam II began to rule over Israel in the thirty-eighth year of King Uzziah’s reign in Judah. He reigned in Samaria six months. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Zechariah did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, as his ancestors had done. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit. '
