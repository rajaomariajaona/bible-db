document_id: LEV.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Procedures for the Grain Offering
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“When you present grain as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the offering must consist of choice flour. You are to pour olive oil on it, sprinkle it with frankincense, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and bring it to Aaron’s sons, the priests. The priest will scoop out a handful of the flour moistened with oil, together with all the frankincense, and burn this representative portion on the altar. It is a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The rest of the grain offering will then be given to Aaron and his sons. This offering will be considered a most holy part of the special gifts presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“If your offering is a grain offering baked in an oven, it must be made of choice flour, but without any yeast. It may be presented in the form of thin cakes mixed with olive oil or wafers spread with olive oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If your grain offering is cooked on a griddle, it must be made of choice flour mixed with olive oil but without any yeast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Break it in pieces and pour olive oil on it; it is a grain offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If your grain offering is prepared in a pan, it must be made of choice flour and olive oil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“No matter how a grain offering for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has been prepared, bring it to the priest, who will present it at the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The priest will take a representative portion of the grain offering and burn it on the altar. It is a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The rest of the grain offering will then be given to Aaron and his sons as their food. This offering will be considered a most holy part of the special gifts presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Do not use yeast in preparing any of the grain offerings you present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', because no yeast or honey may be burned as a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You may add yeast and honey to an offering of the first crops of your harvest, but these must never be offered on the altar as a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Season all your grain offerings with salt to remind you of God’s eternal covenant. Never forget to add salt to your grain offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“If you present a grain offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from the first portion of your harvest, bring fresh grain that is coarsely ground and roasted on a fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Put olive oil on this grain offering, and sprinkle it with frankincense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The priest will take a representative portion of the grain moistened with oil, together with all the frankincense, and burn it as a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
