document_id: LEV.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Procedures for the Grain Offering
  - type: text
    content: '“When you present grain as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', the offering must consist of choice flour. You are to pour olive oil on it, sprinkle it with frankincense, '
  '10':
  - type: text
    content: 'The rest of the grain offering will then be given to Aaron and his sons as their food. This offering will be considered a most holy part of the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: '“Do not use yeast in preparing any of the grain offerings you present to the '
  - type: text
    content: Lord
  - type: text
    content: ', because no yeast or honey may be burned as a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'You may add yeast and honey to an offering of the first crops of your harvest, but these must never be offered on the altar as a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: Season all your grain offerings with salt to remind you of God’s eternal covenant. Never forget to add salt to your grain offerings.
  '14':
  - type: text
    content: '“If you present a grain offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from the first portion of your harvest, bring fresh grain that is coarsely ground and roasted on a fire. '
  '15':
  - type: text
    content: 'Put olive oil on this grain offering, and sprinkle it with frankincense. '
  '16':
  - type: text
    content: 'The priest will take a representative portion of the grain moistened with oil, together with all the frankincense, and burn it as a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'and bring it to Aaron’s sons, the priests. The priest will scoop out a handful of the flour moistened with oil, together with all the frankincense, and burn this representative portion on the altar. It is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'The rest of the grain offering will then be given to Aaron and his sons. This offering will be considered a most holy part of the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: '“If your offering is a grain offering baked in an oven, it must be made of choice flour, but without any yeast. It may be presented in the form of thin cakes mixed with olive oil or wafers spread with olive oil. '
  '5':
  - type: text
    content: 'If your grain offering is cooked on a griddle, it must be made of choice flour mixed with olive oil but without any yeast. '
  '6':
  - type: text
    content: 'Break it in pieces and pour olive oil on it; it is a grain offering. '
  '7':
  - type: text
    content: If your grain offering is prepared in a pan, it must be made of choice flour and olive oil.
  '8':
  - type: text
    content: '“No matter how a grain offering for the '
  - type: text
    content: Lord
  - type: text
    content: ' has been prepared, bring it to the priest, who will present it at the altar. '
  '9':
  - type: text
    content: 'The priest will take a representative portion of the grain offering and burn it on the altar. It is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
