document_id: NUM.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Remembering Israel’s Journey
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the route the Israelites followed as they marched out of Egypt under the leadership of Moses and Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s direction, Moses kept a written record of their progress. These are the stages of their march, identified by the different places where they stopped along the way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They set out from the city of Rameses in early spring—on the fifteenth day of the first month
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
    marker-yv: yv-n
  - type: text
    text: '—on the morning after the first Passover celebration. The people of Israel left defiantly, in full view of all the Egyptians. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Meanwhile, the Egyptians were burying all their firstborn sons, whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had killed the night before. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had defeated the gods of Egypt that night with great acts of judgment!'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: After leaving Rameses, the Israelites set up camp at Succoth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then they left Succoth and camped at Etham on the edge of the wilderness.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They left Etham and turned back toward Pi-hahiroth, opposite Baal-zephon, and camped near Migdol.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They left Pi-hahiroth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts, Samaritan Pentateuch, and Latin Vulgate (see also 33:7); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: left from in front of Hahiroth.
    marker-yv: yv-n
  - type: text
    text: ' and crossed the Red Sea'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea.
    marker-yv: yv-n
  - type: text
    text: ' into the wilderness beyond. Then they traveled for three days into the Etham wilderness and camped at Marah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They left Marah and camped at Elim, where there were twelve springs of water and seventy palm trees.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They left Elim and camped beside the Red Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sea of reeds; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 33:11.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They left the Red Sea and camped in the wilderness of Sin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The geographical name '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is related to '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sinai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and should not be confused with the English word '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sin.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They left the wilderness of Sin and camped at Dophkah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They left Dophkah and camped at Alush.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They left Alush and camped at Rephidim, where there was no water for the people to drink.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They left Rephidim and camped in the wilderness of Sinai.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They left the wilderness of Sinai and camped at Kibroth-hattaavah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They left Kibroth-hattaavah and camped at Hazeroth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They left Hazeroth and camped at Rithmah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They left Rithmah and camped at Rimmon-perez.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They left Rimmon-perez and camped at Libnah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They left Libnah and camped at Rissah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They left Rissah and camped at Kehelathah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They left Kehelathah and camped at Mount Shepher.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They left Mount Shepher and camped at Haradah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They left Haradah and camped at Makheloth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They left Makheloth and camped at Tahath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They left Tahath and camped at Terah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They left Terah and camped at Mithcah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They left Mithcah and camped at Hashmonah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They left Hashmonah and camped at Moseroth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They left Moseroth and camped at Bene-jaakan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: They left Bene-jaakan and camped at Hor-haggidgad.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They left Hor-haggidgad and camped at Jotbathah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: They left Jotbathah and camped at Abronah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: They left Abronah and camped at Ezion-geber.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: They left Ezion-geber and camped at Kadesh in the wilderness of Zin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'They left Kadesh and camped at Mount Hor, at the border of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'While they were at the foot of Mount Hor, Aaron the priest was directed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to go up the mountain, and there he died. This happened in midsummer, on the first day of the fifth month'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in July or August.
    marker-yv: yv-n
  - type: text
    text: ' of the fortieth year after Israel’s departure from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Aaron was 123 years old when he died there on Mount Hor.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: At that time the Canaanite king of Arad, who lived in the Negev in the land of Canaan, heard that the people of Israel were approaching his land.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Meanwhile, the Israelites left Mount Hor and camped at Zalmonah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Then they left Zalmonah and camped at Punon.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: They left Punon and camped at Oboth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: They left Oboth and camped at Iye-abarim on the border of Moab.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: They left Iye-abarim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in 33:44; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Iyim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Iye-abarim.
    marker-yv: yv-n
  - type: text
    text: ' and camped at Dibon-gad.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: They left Dibon-gad and camped at Almon-diblathaim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: They left Almon-diblathaim and camped in the mountains east of the river,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the mountains of Abarim; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 33:48.
    marker-yv: yv-n
  - type: text
    text: ' near Mount Nebo.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'They left the mountains east of the river and camped on the plains of Moab beside the Jordan River, across from Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Along the Jordan River they camped from Beth-jeshimoth as far as the meadows of Acacia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as far as Abel-shittim.
    marker-yv: yv-n
  - type: text
    text: ' on the plains of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'While they were camped near the Jordan River on the plains of Moab opposite Jericho, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: '“Give the following instructions to the people of Israel: When you cross the Jordan River into the land of Canaan, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'you must drive out all the people living there. You must destroy all their carved and molten images and demolish all their pagan shrines. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Take possession of the land and settle in it, because I have given it to you to occupy. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'You must distribute the land among the clans by sacred lot and in proportion to their size. A larger portion of land will be allotted to each of the larger clans, and a smaller portion will be allotted to each of the smaller clans. The decision of the sacred lot is final. In this way, the portions of land will be divided among your ancestral tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But if you fail to drive out the people who live in the land, those who remain will be like splinters in your eyes and thorns in your sides. They will harass you in the land where you live. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: And I will do to you what I had planned to do to them.”
