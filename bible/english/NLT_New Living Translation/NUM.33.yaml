document_id: NUM.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Remembering Israel’s Journey
  - type: text
    content: 'This is the route the Israelites followed as they marched out of Egypt under the leadership of Moses and Aaron. '
  '10':
  - type: text
    content: They left Elim and camped beside the Red Sea.
  - type: note
    content: Hebrew sea of reeds; also in 33:11.
  '11':
  - type: text
    content: They left the Red Sea and camped in the wilderness of Sin.
  - type: note
    content: The geographical name Sin is related to Sinai and should not be confused with the English word sin.
  '12':
  - type: text
    content: They left the wilderness of Sin and camped at Dophkah.
  '13':
  - type: text
    content: They left Dophkah and camped at Alush.
  '14':
  - type: text
    content: They left Alush and camped at Rephidim, where there was no water for the people to drink.
  '15':
  - type: text
    content: They left Rephidim and camped in the wilderness of Sinai.
  '16':
  - type: text
    content: They left the wilderness of Sinai and camped at Kibroth-hattaavah.
  '17':
  - type: text
    content: They left Kibroth-hattaavah and camped at Hazeroth.
  '18':
  - type: text
    content: They left Hazeroth and camped at Rithmah.
  '19':
  - type: text
    content: They left Rithmah and camped at Rimmon-perez.
  '2':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: ’s direction, Moses kept a written record of their progress. These are the stages of their march, identified by the different places where they stopped along the way.
  '20':
  - type: text
    content: They left Rimmon-perez and camped at Libnah.
  '21':
  - type: text
    content: They left Libnah and camped at Rissah.
  '22':
  - type: text
    content: They left Rissah and camped at Kehelathah.
  '23':
  - type: text
    content: They left Kehelathah and camped at Mount Shepher.
  '24':
  - type: text
    content: They left Mount Shepher and camped at Haradah.
  '25':
  - type: text
    content: They left Haradah and camped at Makheloth.
  '26':
  - type: text
    content: They left Makheloth and camped at Tahath.
  '27':
  - type: text
    content: They left Tahath and camped at Terah.
  '28':
  - type: text
    content: They left Terah and camped at Mithcah.
  '29':
  - type: text
    content: They left Mithcah and camped at Hashmonah.
  '3':
  - type: text
    content: They set out from the city of Rameses in early spring—on the fifteenth day of the first month
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: '—on the morning after the first Passover celebration. The people of Israel left defiantly, in full view of all the Egyptians. '
  '30':
  - type: text
    content: They left Hashmonah and camped at Moseroth.
  '31':
  - type: text
    content: They left Moseroth and camped at Bene-jaakan.
  '32':
  - type: text
    content: They left Bene-jaakan and camped at Hor-haggidgad.
  '33':
  - type: text
    content: They left Hor-haggidgad and camped at Jotbathah.
  '34':
  - type: text
    content: They left Jotbathah and camped at Abronah.
  '35':
  - type: text
    content: They left Abronah and camped at Ezion-geber.
  '36':
  - type: text
    content: They left Ezion-geber and camped at Kadesh in the wilderness of Zin.
  '37':
  - type: text
    content: 'They left Kadesh and camped at Mount Hor, at the border of Edom. '
  '38':
  - type: text
    content: 'While they were at the foot of Mount Hor, Aaron the priest was directed by the '
  - type: text
    content: Lord
  - type: text
    content: ' to go up the mountain, and there he died. This happened in midsummer, on the first day of the fifth month'
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in July or August.
  - type: text
    content: ' of the fortieth year after Israel’s departure from Egypt. '
  '39':
  - type: text
    content: Aaron was 123 years old when he died there on Mount Hor.
  '4':
  - type: text
    content: 'Meanwhile, the Egyptians were burying all their firstborn sons, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had killed the night before. The '
  - type: text
    content: Lord
  - type: text
    content: ' had defeated the gods of Egypt that night with great acts of judgment!'
  '40':
  - type: text
    content: At that time the Canaanite king of Arad, who lived in the Negev in the land of Canaan, heard that the people of Israel were approaching his land.
  '41':
  - type: text
    content: Meanwhile, the Israelites left Mount Hor and camped at Zalmonah.
  '42':
  - type: text
    content: Then they left Zalmonah and camped at Punon.
  '43':
  - type: text
    content: They left Punon and camped at Oboth.
  '44':
  - type: text
    content: They left Oboth and camped at Iye-abarim on the border of Moab.
  '45':
  - type: text
    content: They left Iye-abarim
  - type: note
    content: As in 33:44; Hebrew reads Iyim, another name for Iye-abarim.
  - type: text
    content: ' and camped at Dibon-gad.'
  '46':
  - type: text
    content: They left Dibon-gad and camped at Almon-diblathaim.
  '47':
  - type: text
    content: They left Almon-diblathaim and camped in the mountains east of the river,
  - type: note
    content: Or the mountains of Abarim; also in 33:48.
  - type: text
    content: ' near Mount Nebo.'
  '48':
  - type: text
    content: 'They left the mountains east of the river and camped on the plains of Moab beside the Jordan River, across from Jericho. '
  '49':
  - type: text
    content: Along the Jordan River they camped from Beth-jeshimoth as far as the meadows of Acacia
  - type: note
    content: Hebrew as far as Abel-shittim.
  - type: text
    content: ' on the plains of Moab.'
  '5':
  - type: text
    content: After leaving Rameses, the Israelites set up camp at Succoth.
  '50':
  - type: text
    content: 'While they were camped near the Jordan River on the plains of Moab opposite Jericho, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '51':
  - type: text
    content: '“Give the following instructions to the people of Israel: When you cross the Jordan River into the land of Canaan, '
  '52':
  - type: text
    content: 'you must drive out all the people living there. You must destroy all their carved and molten images and demolish all their pagan shrines. '
  '53':
  - type: text
    content: 'Take possession of the land and settle in it, because I have given it to you to occupy. '
  '54':
  - type: text
    content: 'You must distribute the land among the clans by sacred lot and in proportion to their size. A larger portion of land will be allotted to each of the larger clans, and a smaller portion will be allotted to each of the smaller clans. The decision of the sacred lot is final. In this way, the portions of land will be divided among your ancestral tribes. '
  '55':
  - type: text
    content: 'But if you fail to drive out the people who live in the land, those who remain will be like splinters in your eyes and thorns in your sides. They will harass you in the land where you live. '
  '56':
  - type: text
    content: And I will do to you what I had planned to do to them.”
  '6':
  - type: text
    content: Then they left Succoth and camped at Etham on the edge of the wilderness.
  '7':
  - type: text
    content: They left Etham and turned back toward Pi-hahiroth, opposite Baal-zephon, and camped near Migdol.
  '8':
  - type: text
    content: They left Pi-hahiroth
  - type: note
    content: As in many Hebrew manuscripts, Samaritan Pentateuch, and Latin Vulgate (see also 33:7); most Hebrew manuscripts read left from in front of Hahiroth.
  - type: text
    content: ' and crossed the Red Sea'
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' into the wilderness beyond. Then they traveled for three days into the Etham wilderness and camped at Marah.'
  '9':
  - type: text
    content: They left Marah and camped at Elim, where there were twelve springs of water and seventy palm trees.
