document_id: NEH.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Occupy Jerusalem
  - type: text
    content: 'The leaders of the people were living in Jerusalem, the holy city. A tenth of the people from the other towns of Judah and Benjamin were chosen by sacred lots to live there, too, while the rest stayed where they were. '
  '10':
  - type: text
    content: 'From the priests:'
  - type: text
    content: 'Jedaiah son of Joiarib; Jakin; '
  '11':
  - type: text
    content: 'and Seraiah son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub, the supervisor of the Temple of God. '
  '12':
  - type: text
    content: 'Also 822 of their associates, who worked at the Temple. Also Adaiah son of Jeroham, son of Pelaliah, son of Amzi, son of Zechariah, son of Pashhur, son of Malkijah, '
  '13':
  - type: text
    content: 'along with 242 of his associates, who were heads of their families. Also Amashsai son of Azarel, son of Ahzai, son of Meshillemoth, son of Immer, '
  '14':
  - type: text
    content: and 128 of his
  - type: note
    content: As in Greek version; Hebrew reads their.
  - type: text
    content: ' outstanding associates. Their chief officer was Zabdiel son of Haggedolim.'
  '15':
  - type: text
    content: 'From the Levites:'
  - type: text
    content: 'Shemaiah son of Hasshub, son of Azrikam, son of Hashabiah, son of Bunni. '
  '16':
  - type: text
    content: 'Also Shabbethai and Jozabad, who were in charge of the work outside the Temple of God. '
  '17':
  - type: text
    content: 'Also Mattaniah son of Mica, son of Zabdi, a descendant of Asaph, who led in thanksgiving and prayer. Also Bakbukiah, who was Mattaniah’s assistant, and Abda son of Shammua, son of Galal, son of Jeduthun. '
  '18':
  - type: text
    content: In all, there were 284 Levites in the holy city.
  '19':
  - type: text
    content: 'From the gatekeepers:'
  - type: text
    content: Akkub, Talmon, and 172 of their associates, who guarded the gates.
  '2':
  - type: text
    content: And the people commended everyone who volunteered to resettle in Jerusalem.
  '20':
  - type: text
    content: 'The other priests, Levites, and the rest of the Israelites lived wherever their family inheritance was located in any of the towns of Judah. '
  '21':
  - type: text
    content: The Temple servants, however, whose leaders were Ziha and Gishpa, all lived on the hill of Ophel.
  '22':
  - type: text
    content: 'The chief officer of the Levites in Jerusalem was Uzzi son of Bani, son of Hashabiah, son of Mattaniah, son of Mica, a descendant of Asaph, whose family served as singers at God’s Temple. '
  '23':
  - type: text
    content: Their daily responsibilities were carried out according to the terms of a royal command.
  '24':
  - type: text
    content: Pethahiah son of Meshezabel, a descendant of Zerah son of Judah, was the royal adviser in all matters of public administration.
  '25':
  - type: text
    content: 'As for the surrounding villages with their open fields, some of the people of Judah lived in Kiriath-arba with its settlements, Dibon with its settlements, and Jekabzeel with its villages. '
  '26':
  - type: text
    content: 'They also lived in Jeshua, Moladah, Beth-pelet, '
  '27':
  - type: text
    content: 'Hazar-shual, Beersheba with its settlements, '
  '28':
  - type: text
    content: 'Ziklag, and Meconah with its settlements. '
  '29':
  - type: text
    content: 'They also lived in En-rimmon, Zorah, Jarmuth, '
  '3':
  - type: text
    content: 'Here is a list of the names of the provincial officials who came to live in Jerusalem. (Most of the people, priests, Levites, Temple servants, and descendants of Solomon’s servants continued to live in their own homes in the various towns of Judah, '
  '30':
  - type: text
    content: Zanoah, and Adullam with their surrounding villages. They also lived in Lachish with its nearby fields and Azekah with its surrounding villages. So the people of Judah were living all the way from Beersheba in the south to the valley of Hinnom.
  '31':
  - type: text
    content: 'Some of the people of Benjamin lived at Geba, Micmash, Aija, and Bethel with its settlements. '
  '32':
  - type: text
    content: 'They also lived in Anathoth, Nob, Ananiah, '
  '33':
  - type: text
    content: 'Hazor, Ramah, Gittaim, '
  '34':
  - type: text
    content: 'Hadid, Zeboim, Neballat, '
  '35':
  - type: text
    content: Lod, Ono, and the Valley of Craftsmen.
  - type: note
    content: Or and Ge-harashim.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Some of the Levites who lived in Judah were sent to live with the tribe of Benjamin.
  '4':
  - type: text
    content: but some of the people from Judah and Benjamin resettled in Jerusalem.)
  - type: text
    content: 'From the tribe of Judah:'
  - type: text
    content: 'Athaiah son of Uzziah, son of Zechariah, son of Amariah, son of Shephatiah, son of Mahalalel, of the family of Perez. '
  '5':
  - type: text
    content: Also Maaseiah son of Baruch, son of Col-hozeh, son of Hazaiah, son of Adaiah, son of Joiarib, son of Zechariah, of the family of Shelah.
  - type: note
    content: Hebrew son of the Shilonite.
  - type: text
    content: ' '
  '6':
  - type: text
    content: There were 468 descendants of Perez who lived in Jerusalem—all outstanding men.
  '7':
  - type: text
    content: 'From the tribe of Benjamin:'
  - type: text
    content: 'Sallu son of Meshullam, son of Joed, son of Pedaiah, son of Kolaiah, son of Maaseiah, son of Ithiel, son of Jeshaiah. '
  '8':
  - type: text
    content: 'After him were Gabbai and Sallai and a total of 928 relatives. '
  '9':
  - type: text
    content: Their chief officer was Joel son of Zicri, who was assisted by Judah son of Hassenuah, second-in-command over the city.
