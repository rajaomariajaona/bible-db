document_id: EXO.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Altar of Burnt Offering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Using acacia wood, construct a square altar 7-1/2 feet wide, 7-1/2 feet long, and 4-1/2 feet high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide, 5 cubits long, a square, and 3 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They will be held up by twenty posts set securely in twenty bronze bases. Hang the curtains with silver hooks and rings. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Make the curtains the same on the north side—150 feet of curtains held up by twenty posts set securely in bronze bases. Hang the curtains with silver hooks and rings. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The curtains on the west end of the courtyard will be 75 feet long,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters]; also in 27:13.'
      marker-yv: yv-n
    - type: text
      text: ' supported by ten posts set into ten bases. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The east end of the courtyard, the front, will also be 75 feet long. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The courtyard entrance will be on the east end, flanked by two curtains. The curtain on the right side will be 22-1/2 feet long,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '15 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.9 meters]; also in 27:15.'
      marker-yv: yv-n
    - type: text
      text: ' supported by three posts set into three bases. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The curtain on the left side will also be 22-1/2 feet long, supported by three posts set into three bases.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “For the entrance to the courtyard, make a curtain that is 30 feet long.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters].'
      marker-yv: yv-n
    - type: text
      text: ' Make it from finely woven linen, and decorate it with beautiful embroidery in blue, purple, and scarlet thread. Support it with four posts, each securely set in its own base. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'All the posts around the courtyard must have silver rings and hooks and bronze bases. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So the entire courtyard will be 150 feet long and 75 feet wide, with curtain walls 7-1/2 feet high,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 50 by 50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide and 5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' made from finely woven linen. The bases for the posts will be made of bronze.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “All the articles used in the rituals of the Tabernacle, including all the tent pegs used to support the Tabernacle and the courtyard curtains, must be made of bronze.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Light for the Tabernacle
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Make horns for each of its four corners so that the horns and altar are all one piece. Overlay the altar with bronze. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“Command the people of Israel to bring you pure oil of pressed olives for the light, to keep the lamps burning continually. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The lampstand will stand in the Tabernacle, in front of the inner curtain that shields the Ark of the Covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the Tent of Meeting, outside the inner curtain that is in front of the Testimony. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 25:16.
      marker-yv: yv-n
    - type: text
      text: ' Aaron and his sons must keep the lamps burning in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence all night. This is a permanent law for the people of Israel, and it must be observed from generation to generation.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Make ash buckets, shovels, basins, meat forks, and firepans, all of bronze. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Make a bronze grating for it, and attach four bronze rings at its four corners. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Install the grating halfway down the side of the altar, under the ledge. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For carrying the altar, make poles from acacia wood, and overlay them with bronze. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Insert the poles through the rings on the two sides of the altar. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The altar must be hollow, made from planks. Build it just as you were shown on the mountain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Courtyard
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Then make the courtyard for the Tabernacle, enclosed with curtains made of finely woven linen. On the south side, make the curtains 150 feet long.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 meters]; also in 27:11.'
      marker-yv: yv-n
    - type: text
      text: ' '
