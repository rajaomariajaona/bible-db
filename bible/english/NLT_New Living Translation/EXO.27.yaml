document_id: EXO.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Plans for the Altar of Burnt Offering
  - type: text
    content: “Using acacia wood, construct a square altar 7-1/2 feet wide, 7-1/2 feet long, and 4-1/2 feet high.
  - type: note
    content: Hebrew 5 cubits [2.3 meters] wide, 5 cubits long, a square, and 3 cubits [1.4 meters] high.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'They will be held up by twenty posts set securely in twenty bronze bases. Hang the curtains with silver hooks and rings. '
  '11':
  - type: text
    content: 'Make the curtains the same on the north side—150 feet of curtains held up by twenty posts set securely in bronze bases. Hang the curtains with silver hooks and rings. '
  '12':
  - type: text
    content: The curtains on the west end of the courtyard will be 75 feet long,
  - type: note
    content: Hebrew 50 cubits [23 meters]; also in 27:13.
  - type: text
    content: ' supported by ten posts set into ten bases. '
  '13':
  - type: text
    content: 'The east end of the courtyard, the front, will also be 75 feet long. '
  '14':
  - type: text
    content: The courtyard entrance will be on the east end, flanked by two curtains. The curtain on the right side will be 22-1/2 feet long,
  - type: note
    content: Hebrew 15 cubits [6.9 meters]; also in 27:15.
  - type: text
    content: ' supported by three posts set into three bases. '
  '15':
  - type: text
    content: The curtain on the left side will also be 22-1/2 feet long, supported by three posts set into three bases.
  '16':
  - type: text
    content: “For the entrance to the courtyard, make a curtain that is 30 feet long.
  - type: note
    content: Hebrew 20 cubits [9.2 meters].
  - type: text
    content: ' Make it from finely woven linen, and decorate it with beautiful embroidery in blue, purple, and scarlet thread. Support it with four posts, each securely set in its own base. '
  '17':
  - type: text
    content: 'All the posts around the courtyard must have silver rings and hooks and bronze bases. '
  '18':
  - type: text
    content: So the entire courtyard will be 150 feet long and 75 feet wide, with curtain walls 7-1/2 feet high,
  - type: note
    content: Hebrew 100 cubits [46 meters] long and 50 by 50 [23 meters] wide and 5 cubits [2.3 meters] high.
  - type: text
    content: ' made from finely woven linen. The bases for the posts will be made of bronze.'
  '19':
  - type: text
    content: “All the articles used in the rituals of the Tabernacle, including all the tent pegs used to support the Tabernacle and the courtyard curtains, must be made of bronze.
  - type: heading
    content: Light for the Tabernacle
  '2':
  - type: text
    content: 'Make horns for each of its four corners so that the horns and altar are all one piece. Overlay the altar with bronze. '
  '20':
  - type: text
    content: '“Command the people of Israel to bring you pure oil of pressed olives for the light, to keep the lamps burning continually. '
  '21':
  - type: text
    content: The lampstand will stand in the Tabernacle, in front of the inner curtain that shields the Ark of the Covenant.
  - type: note
    content: Hebrew in the Tent of Meeting, outside the inner curtain that is in front of the Testimony. See note on 25:16.
  - type: text
    content: ' Aaron and his sons must keep the lamps burning in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence all night. This is a permanent law for the people of Israel, and it must be observed from generation to generation.
  '3':
  - type: text
    content: 'Make ash buckets, shovels, basins, meat forks, and firepans, all of bronze. '
  '4':
  - type: text
    content: 'Make a bronze grating for it, and attach four bronze rings at its four corners. '
  '5':
  - type: text
    content: 'Install the grating halfway down the side of the altar, under the ledge. '
  '6':
  - type: text
    content: 'For carrying the altar, make poles from acacia wood, and overlay them with bronze. '
  '7':
  - type: text
    content: 'Insert the poles through the rings on the two sides of the altar. '
  '8':
  - type: text
    content: The altar must be hollow, made from planks. Build it just as you were shown on the mountain.
  - type: heading
    content: Plans for the Courtyard
  '9':
  - type: text
    content: “Then make the courtyard for the Tabernacle, enclosed with curtains made of finely woven linen. On the south side, make the curtains 150 feet long.
  - type: note
    content: Hebrew 100 cubits [46 meters]; also in 27:11.
  - type: text
    content: ' '
