document_id: EZK.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Valley of Dry Bones
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' took hold of me, and I was carried away by the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to a valley filled with bones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He led me all around among the bones that covered the valley floor. They were scattered everywhere across the ground and were completely dried out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then he asked me, “Son of man, can these bones become living people again?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',” I replied, “you alone know the answer to that.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then he said to me, “Speak a prophetic message to these bones and say, ‘Dry bones, listen to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Look! I am going to put breath into you and make you live again! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will put flesh and muscles on you and cover you with skin. I will put breath into you, and you will come to life. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So I spoke this message, just as he told me. Suddenly as I spoke, there was a rattling noise all across the valley. The bones of each body came together and attached themselves as complete skeletons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then as I watched, muscles and flesh formed over the bones. Then skin formed to cover their bodies, but they still had no breath in them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he said to me, “Speak a prophetic message to the winds, son of man. Speak a prophetic message and say, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Come, O breath, from the four winds! Breathe into these dead bodies so they may live again.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So I spoke the message as he commanded me, and breath came into their bodies. They all came to life and stood up on their feet—a great army.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then he said to me, “Son of man, these bones represent the people of Israel. They are saying, ‘We have become old, dry bones—all hope is gone. Our nation is finished.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore, prophesy to them and say, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: O my people, I will open your graves of exile and cause you to rise again. Then I will bring you back to the land of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When this happens, O my people, you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will put my Spirit in you, and you will live again and return home to your own land. Then you will know that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken, and I have done what I said. Yes, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken!’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reunion of Israel and Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Again a message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Son of man, take a piece of wood and carve on it these words: ‘This represents Judah and its allied tribes.’ Then take another piece and carve these words on it: ‘This represents Ephraim and the northern tribes of Israel.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'This is Ephraim’s wood, representing Joseph and all the house of Israel; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 37:19.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now hold them together in your hand as if they were one piece of wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When your people ask you what your actions mean, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'say to them, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will take Ephraim and the northern tribes and join them to Judah. I will make them one piece of wood in my hand.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Then hold out the pieces of wood you have inscribed, so the people can see them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And give them this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': I will gather the people of Israel from among the nations. I will bring them home to their own land from the places where they have been scattered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will unify them into one nation on the mountains of Israel. One king will rule them all; no longer will they be divided into two nations or into two kingdoms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They will never again pollute themselves with their idols
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:23a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung.
    marker-yv: yv-n
  - type: text
    text: ' and vile images and rebellion, for I will save them from their sinful apostasy.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:23b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts and Greek version; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from all their dwelling places where they sinned.
    marker-yv: yv-n
  - type: text
    text: ' I will cleanse them. Then they will truly be my people, and I will be their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“My servant David will be their king, and they will have only one shepherd. They will obey my regulations and be careful to keep my decrees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They will live in the land I gave my servant Jacob, the land where their ancestors lived. They and their children and their grandchildren after them will live there forever, generation after generation. And my servant David will be their prince forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And I will make a covenant of peace with them, an everlasting covenant. I will give them their land and increase their numbers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I will give them and increase their numbers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Greek version lacks the entire phrase.
    marker-yv: yv-n
  - type: text
    text: ' and I will put my Temple among them forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'I will make my home among them. I will be their God, and they will be my people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And when my Temple is among them forever, the nations will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who makes Israel holy.”'
