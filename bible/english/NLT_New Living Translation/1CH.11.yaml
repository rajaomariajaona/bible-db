document_id: 1CH.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Becomes King of All Israel
  - type: text
    content: 'Then all Israel gathered before David at Hebron and told him, “We are your own flesh and blood. '
  '10':
  - type: text
    content: 'These are the leaders of David’s mighty warriors. Together with all Israel, they decided to make David their king, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised concerning Israel.'
  '11':
  - type: text
    content: 'Here is the record of David’s mightiest warriors: The first was Jashobeam the Hacmonite, who was leader of the Three—the mightiest warriors among David’s men.'
  - type: note
    content: As in some Greek manuscripts (see also 2 Sam 23:8); Hebrew reads leader of the Thirty, or leader of the captains.
  - type: text
    content: ' He once used his spear to kill 300 enemy warriors in a single battle.'
  '12':
  - type: text
    content: Next in rank among the Three was Eleazar son of Dodai,
  - type: note
    content: As in parallel text at 2 Sam 23:9 (see also 1 Chr 27:4); Hebrew reads Dodo, a variant spelling of Dodai.
  - type: text
    content: ' a descendant of Ahoah. '
  '13':
  - type: text
    content: 'He was with David when the Philistines gathered for battle at Pas-dammim and attacked the Israelites in a field full of barley. The Israelite army fled, '
  '14':
  - type: text
    content: but Eleazar and David
  - type: note
    content: Hebrew they.
  - type: text
    content: ' held their ground in the middle of the field and beat back the Philistines. So the '
  - type: text
    content: Lord
  - type: text
    content: ' saved them by giving them a great victory.'
  '15':
  - type: text
    content: 'Once when David was at the rock near the cave of Adullam, the Philistine army was camped in the valley of Rephaim. The Three (who were among the Thirty—an elite group among David’s fighting men) went down to meet him there. '
  '16':
  - type: text
    content: David was staying in the stronghold at the time, and a Philistine detachment had occupied the town of Bethlehem.
  '17':
  - type: text
    content: 'David remarked longingly to his men, “Oh, how I would love some of that good water from the well by the gate in Bethlehem.” '
  '18':
  - type: text
    content: 'So the Three broke through the Philistine lines, drew some water from the well by the gate in Bethlehem, and brought it back to David. But David refused to drink it. Instead, he poured it out as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: “God forbid that I should drink this!” he exclaimed. “This water is as precious as the blood of these men
  - type: note
    content: Hebrew Shall I drink the lifeblood of these men?
  - type: text
    content: ' who risked their lives to bring it to me.” So David did not drink it. These are examples of the exploits of the Three.'
  - type: heading
    content: David’s Thirty Mighty Men
  '2':
  - type: text
    content: In the past,
  - type: note
    content: Or For some time.
  - type: text
    content: ' even when Saul was king, you were the one who really led the forces of Israel. And the '
  - type: text
    content: Lord
  - type: text
    content: ' your God told you, ‘You will be the shepherd of my people Israel. You will be the leader of my people Israel.’”'
  '20':
  - type: text
    content: Abishai, the brother of Joab, was the leader of the Thirty.
  - type: note
    content: As in Syriac version; Hebrew reads the Three; also in 11:21.
  - type: text
    content: ' He once used his spear to kill 300 enemy warriors in a single battle. It was by such feats that he became as famous as the Three. '
  '21':
  - type: text
    content: Abishai was the most famous of the Thirty and was their commander, though he was not one of the Three.
  '22':
  - type: text
    content: There was also Benaiah son of Jehoiada, a valiant warrior from Kabzeel. He did many heroic deeds, which included killing two champions
  - type: note
    content: Or two sons of Ariel.
  - type: text
    content: ' of Moab. Another time, on a snowy day, he chased a lion down into a pit and killed it. '
  '23':
  - type: text
    content: Once, armed only with a club, he killed an Egyptian warrior who was 7-1/2 feet
  - type: note
    content: Hebrew 5 cubits [2.3 meters].
  - type: text
    content: ' tall and who was armed with a spear as thick as a weaver’s beam. Benaiah wrenched the spear from the Egyptian’s hand and killed him with it. '
  '24':
  - type: text
    content: 'Deeds like these made Benaiah as famous as the three mightiest warriors. '
  '25':
  - type: text
    content: He was more honored than the other members of the Thirty, though he was not one of the Three. And David made him captain of his bodyguard.
  '26':
  - type: text
    content: 'David’s mighty warriors also included:'
  - type: text
    content: Asahel, Joab’s brother;
  - type: text
    content: Elhanan son of Dodo from Bethlehem;
  '27':
  - type: text
    content: Shammah from Harod;
  - type: note
    content: As in parallel text at 2 Sam 23:25; Hebrew reads Shammoth from Haror.
  - type: text
    content: Helez from Pelon;
  '28':
  - type: text
    content: Ira son of Ikkesh from Tekoa;
  - type: text
    content: Abiezer from Anathoth;
  '29':
  - type: text
    content: Sibbecai from Hushah;
  - type: text
    content: Zalmon
  - type: note
    content: As in parallel text at 2 Sam 23:28; Hebrew reads Ilai.
  - type: text
    content: ' from Ahoah;'
  '3':
  - type: text
    content: 'So there at Hebron, David made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: ' with all the elders of Israel. And they anointed him king of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through Samuel.'
  - type: heading
    content: David Captures Jerusalem
  '30':
  - type: text
    content: Maharai from Netophah;
  - type: text
    content: Heled son of Baanah from Netophah;
  '31':
  - type: text
    content: Ithai son of Ribai from Gibeah (in the land of Benjamin);
  - type: text
    content: Benaiah from Pirathon;
  '32':
  - type: text
    content: Hurai from near Nahale-gaash
  - type: note
    content: Or from the ravines of Gaash.
  - type: text
    content: ;
  - type: text
    content: Abi-albon
  - type: note
    content: As in parallel text at 2 Sam 23:31; Hebrew reads Abiel.
  - type: text
    content: ' from Arabah;'
  '33':
  - type: text
    content: Azmaveth from Bahurim
  - type: note
    content: As in parallel text at 2 Sam 23:31; Hebrew reads Baharum.
  - type: text
    content: ;
  - type: text
    content: Eliahba from Shaalbon;
  '34':
  - type: text
    content: the sons of Jashen
  - type: note
    content: As in parallel text at 2 Sam 23:32; Hebrew reads sons of Hashem.
  - type: text
    content: ' from Gizon;'
  - type: text
    content: Jonathan son of Shagee from Harar;
  '35':
  - type: text
    content: Ahiam son of Sharar
  - type: note
    content: As in parallel text at 2 Sam 23:33; Hebrew reads son of Sacar.
  - type: text
    content: ' from Harar;'
  - type: text
    content: Eliphal son of Ur;
  '36':
  - type: text
    content: Hepher from Mekerah;
  - type: text
    content: Ahijah from Pelon;
  '37':
  - type: text
    content: Hezro from Carmel;
  - type: text
    content: Paarai
  - type: note
    content: As in parallel text at 2 Sam 23:35; Hebrew reads Naarai.
  - type: text
    content: ' son of Ezbai;'
  '38':
  - type: text
    content: Joel, the brother of Nathan;
  - type: text
    content: Mibhar son of Hagri;
  '39':
  - type: text
    content: Zelek from Ammon;
  - type: text
    content: Naharai from Beeroth, the armor bearer of Joab son of Zeruiah;
  '4':
  - type: text
    content: 'Then David and all Israel went to Jerusalem (or Jebus, as it used to be called), where the Jebusites, the original inhabitants of the land, were living. '
  '40':
  - type: text
    content: Ira from Jattir;
  - type: text
    content: Gareb from Jattir;
  '41':
  - type: text
    content: Uriah the Hittite;
  - type: text
    content: Zabad son of Ahlai;
  '42':
  - type: text
    content: Adina son of Shiza, the Reubenite leader who had thirty men with him;
  '43':
  - type: text
    content: Hanan son of Maacah;
  - type: text
    content: Joshaphat from Mithna;
  '44':
  - type: text
    content: Uzzia from Ashtaroth;
  - type: text
    content: Shama and Jeiel, the sons of Hotham, from Aroer;
  '45':
  - type: text
    content: Jediael son of Shimri;
  - type: text
    content: Joha, his brother, from Tiz;
  '46':
  - type: text
    content: Eliel from Mahavah;
  - type: text
    content: Jeribai and Joshaviah, the sons of Elnaam;
  - type: text
    content: Ithmah from Moab;
  '47':
  - type: text
    content: Eliel and Obed;
  - type: text
    content: Jaasiel from Zobah.
  - type: note
    content: Or the Mezobaite.
  '5':
  - type: text
    content: The people of Jebus taunted David, saying, “You’ll never get in here!” But David captured the fortress of Zion, which is now called the City of David.
  '6':
  - type: text
    content: David had said to his troops, “Whoever is first to attack the Jebusites will become the commander of my armies!” And Joab, the son of David’s sister Zeruiah, was first to attack, so he became the commander of David’s armies.
  '7':
  - type: text
    content: 'David made the fortress his home, and that is why it is called the City of David. '
  '8':
  - type: text
    content: He extended the city from the supporting terraces
  - type: note
    content: Hebrew the millo. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' to the surrounding area, while Joab rebuilt the rest of Jerusalem. '
  '9':
  - type: text
    content: 'And David became more and more powerful, because the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies was with him.'
  - type: heading
    content: David’s Mightiest Warriors
