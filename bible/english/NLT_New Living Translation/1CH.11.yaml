document_id: 1CH.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Becomes King of All Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then all Israel gathered before David at Hebron and told him, “We are your own flesh and blood. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These are the leaders of David’s mighty warriors. Together with all Israel, they decided to make David their king, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised concerning Israel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is the record of David’s mightiest warriors: The first was Jashobeam the Hacmonite, who was leader of the Three—the mightiest warriors among David’s men.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 2 Sam 23:8); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leader of the Thirty, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leader of the captains.
      marker-yv: yv-n
    - type: text
      text: ' He once used his spear to kill 300 enemy warriors in a single battle.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next in rank among the Three was Eleazar son of Dodai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:9 (see also 1 Chr 27:4); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dodo, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Dodai.
      marker-yv: yv-n
    - type: text
      text: ' a descendant of Ahoah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was with David when the Philistines gathered for battle at Pas-dammim and attacked the Israelites in a field full of barley. The Israelite army fled, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but Eleazar and David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they.
      marker-yv: yv-n
    - type: text
      text: ' held their ground in the middle of the field and beat back the Philistines. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saved them by giving them a great victory.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once when David was at the rock near the cave of Adullam, the Philistine army was camped in the valley of Rephaim. The Three (who were among the Thirty—an elite group among David’s fighting men) went down to meet him there. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David was staying in the stronghold at the time, and a Philistine detachment had occupied the town of Bethlehem.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David remarked longingly to his men, “Oh, how I would love some of that good water from the well by the gate in Bethlehem.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Three broke through the Philistine lines, drew some water from the well by the gate in Bethlehem, and brought it back to David. But David refused to drink it. Instead, he poured it out as an offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “God forbid that I should drink this!” he exclaimed. “This water is as precious as the blood of these men
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shall I drink the lifeblood of these men?
      marker-yv: yv-n
    - type: text
      text: ' who risked their lives to bring it to me.” So David did not drink it. These are examples of the exploits of the Three.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Thirty Mighty Men
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In the past,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: For some time.
      marker-yv: yv-n
    - type: text
      text: ' even when Saul was king, you were the one who really led the forces of Israel. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God told you, ‘You will be the shepherd of my people Israel. You will be the leader of my people Israel.’”'
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Abishai, the brother of Joab, was the leader of the Thirty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Three; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:21.
      marker-yv: yv-n
    - type: text
      text: ' He once used his spear to kill 300 enemy warriors in a single battle. It was by such feats that he became as famous as the Three. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Abishai was the most famous of the Thirty and was their commander, though he was not one of the Three.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was also Benaiah son of Jehoiada, a valiant warrior from Kabzeel. He did many heroic deeds, which included killing two champions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two sons of Ariel.
      marker-yv: yv-n
    - type: text
      text: ' of Moab. Another time, on a snowy day, he chased a lion down into a pit and killed it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Once, armed only with a club, he killed an Egyptian warrior who was 7-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters].'
      marker-yv: yv-n
    - type: text
      text: ' tall and who was armed with a spear as thick as a weaver’s beam. Benaiah wrenched the spear from the Egyptian’s hand and killed him with it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deeds like these made Benaiah as famous as the three mightiest warriors. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was more honored than the other members of the Thirty, though he was not one of the Three. And David made him captain of his bodyguard.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David’s mighty warriors also included:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Asahel, Joab’s brother;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elhanan son of Dodo from Bethlehem;
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shammah from Harod;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:25; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shammoth from Haror.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Helez from Pelon;
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ira son of Ikkesh from Tekoa;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abiezer from Anathoth;
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sibbecai from Hushah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zalmon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:28; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ilai.
      marker-yv: yv-n
    - type: text
      text: ' from Ahoah;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there at Hebron, David made a covenant before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all the elders of Israel. And they anointed him king of Israel, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised through Samuel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Captures Jerusalem
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Maharai from Netophah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Heled son of Baanah from Netophah;
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ithai son of Ribai from Gibeah (in the land of Benjamin);
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Benaiah from Pirathon;
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hurai from near Nahale-gaash
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:32a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the ravines of Gaash.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abi-albon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:32b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:31; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abiel.
      marker-yv: yv-n
    - type: text
      text: ' from Arabah;'
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Azmaveth from Bahurim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:31; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Baharum.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliahba from Shaalbon;
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the sons of Jashen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:32; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sons of Hashem.
      marker-yv: yv-n
    - type: text
      text: ' from Gizon;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jonathan son of Shagee from Harar;
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahiam son of Sharar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:33; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son of Sacar.
      marker-yv: yv-n
    - type: text
      text: ' from Harar;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliphal son of Ur;
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hepher from Mekerah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahijah from Pelon;
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezro from Carmel;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Paarai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 23:35; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Naarai.
      marker-yv: yv-n
    - type: text
      text: ' son of Ezbai;'
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joel, the brother of Nathan;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Mibhar son of Hagri;
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zelek from Ammon;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Naharai from Beeroth, the armor bearer of Joab son of Zeruiah;
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then David and all Israel went to Jerusalem (or Jebus, as it used to be called), where the Jebusites, the original inhabitants of the land, were living. '
  '40':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ira from Jattir;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gareb from Jattir;
  '41':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Uriah the Hittite;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zabad son of Ahlai;
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Adina son of Shiza, the Reubenite leader who had thirty men with him;
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hanan son of Maacah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joshaphat from Mithna;
  '44':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Uzzia from Ashtaroth;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shama and Jeiel, the sons of Hotham, from Aroer;
  '45':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jediael son of Shimri;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joha, his brother, from Tiz;
  '46':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliel from Mahavah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jeribai and Joshaviah, the sons of Elnaam;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ithmah from Moab;
  '47':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliel and Obed;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jaasiel from Zobah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Mezobaite.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The people of Jebus taunted David, saying, “You’ll never get in here!” But David captured the fortress of Zion, which is now called the City of David.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David had said to his troops, “Whoever is first to attack the Jebusites will become the commander of my armies!” And Joab, the son of David’s sister Zeruiah, was first to attack, so he became the commander of David’s armies.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David made the fortress his home, and that is why it is called the City of David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He extended the city from the supporting terraces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the millo. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' to the surrounding area, while Joab rebuilt the rest of Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David became more and more powerful, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies was with him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mightiest Warriors
    marker-yv: yv-h
