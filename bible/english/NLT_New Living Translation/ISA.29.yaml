document_id: ISA.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “What sorrow awaits Ariel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ariel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like a Hebrew term that means “hearth” or “altar.”
    marker-yv: yv-n
  - type: text
    text: ' the City of David.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Year after year you celebrate your feasts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yet I will bring disaster upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there will be much weeping and sorrow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Jerusalem will become what her name Ariel means—
- type: usfm
  marker: q2
  children:
  - type: text
    text: an altar covered with blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will be your enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrounding Jerusalem and attacking its walls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will build siege towers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then deep from the earth you will speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from low in the dust your words will come.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your voice will whisper from the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a ghost conjured up from the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “But suddenly, your ruthless enemies will be crushed
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the finest of dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your many attackers will be driven away
- type: usfm
  marker: q2
  children:
  - type: text
    text: like chaff before the wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly, in an instant,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, will act for you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: with thunder and earthquake and great noise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with whirlwind and storm and consuming fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All the nations fighting against Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ariel.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will vanish like a dream!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who are attacking her walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: will vanish like a vision in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A hungry person dreams of eating
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wakes up still hungry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A thirsty person dreams of drinking
- type: usfm
  marker: q2
  children:
  - type: text
    text: but is still faint from thirst when morning comes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So it will be with your enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those who attack Mount Zion.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Are you amazed and incredulous?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t you believe it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then go ahead and be blind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are stupid, but not from wine!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You stagger, but not from liquor!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has poured out on you a spirit of deep sleep.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has closed the eyes of your prophets and visionaries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'All the future events in this vision are like a sealed book to them. When you give it to those who can read, they will say, “We can’t read it because it is sealed.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When you give it to those who cannot read, they will say, “We don’t know how to read.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And so the Lord says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “These people say they are mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They honor me with their lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their hearts are far from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their worship of me
- type: usfm
  marker: q2
  children:
  - type: text
    text: is nothing but man-made rules learned by rote.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Their worship is a farce, / for they teach man-made ideas as commands from God. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Mark 7:7.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Because of this, I will once again astound these hypocrites
- type: usfm
  marker: q2
  children:
  - type: text
    text: with amazing wonders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wisdom of the wise will pass away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the intelligence of the intelligent will disappear.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What sorrow awaits those who try to hide their plans from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: who do their evil deeds in the dark!
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' can’t see us,” they say.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “He doesn’t know what’s going on!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How foolish can you be?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the Potter, and he is certainly greater than you, the clay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Should the created thing say of the one who made it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “He didn’t make me”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a jar ever say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “The potter who made me is stupid”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Soon—and it will not be very long—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the forests of Lebanon will become a fertile field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fertile field will yield bountiful crops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In that day the deaf will hear words read from a book,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the blind will see through the gloom and darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The humble will be filled with fresh joy from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: The poor will rejoice in the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The scoffer will be gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the arrogant will disappear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who plot evil will be killed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Those who convict the innocent
- type: usfm
  marker: q2
  children:
  - type: text
    text: by their false testimony will disappear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A similar fate awaits those who use trickery to pervert justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who tell lies to destroy the innocent.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'That is why the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who redeemed Abraham, says to the people of Israel,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My people will no longer be ashamed
- type: usfm
  marker: q2
  children:
  - type: text
    text: or turn pale with fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For when they see their many children
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the blessings I have given them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will recognize the holiness of the Holy One of Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will stand in awe of the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then the wayward will gain understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and complainers will accept instruction.
