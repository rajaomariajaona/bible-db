document_id: ISA.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Jerusalem
  - type: text
    content: “What sorrow awaits Ariel,
  - type: note
    content: Ariel sounds like a Hebrew term that means “hearth” or “altar.”
  - type: text
    content: ' the City of David.'
  - type: text
    content: Year after year you celebrate your feasts.
  '10':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has poured out on you a spirit of deep sleep.'
  - type: text
    content: He has closed the eyes of your prophets and visionaries.
  '11':
  - type: text
    content: 'All the future events in this vision are like a sealed book to them. When you give it to those who can read, they will say, “We can’t read it because it is sealed.” '
  '12':
  - type: text
    content: When you give it to those who cannot read, they will say, “We don’t know how to read.”
  '13':
  - type: text
    content: And so the Lord says,
  - type: text
    content: “These people say they are mine.
  - type: text
    content: They honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  - type: text
    content: And their worship of me
  - type: text
    content: is nothing but man-made rules learned by rote.
  - type: note
    content: Greek version reads Their worship is a farce, / for they teach man-made ideas as commands from God. Compare Mark 7:7.
  '14':
  - type: text
    content: Because of this, I will once again astound these hypocrites
  - type: text
    content: with amazing wonders.
  - type: text
    content: The wisdom of the wise will pass away,
  - type: text
    content: and the intelligence of the intelligent will disappear.”
  '15':
  - type: text
    content: 'What sorrow awaits those who try to hide their plans from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who do their evil deeds in the dark!
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' can’t see us,” they say.'
  - type: text
    content: “He doesn’t know what’s going on!”
  '16':
  - type: text
    content: How foolish can you be?
  - type: text
    content: He is the Potter, and he is certainly greater than you, the clay!
  - type: text
    content: Should the created thing say of the one who made it,
  - type: text
    content: “He didn’t make me”?
  - type: text
    content: Does a jar ever say,
  - type: text
    content: “The potter who made me is stupid”?
  '17':
  - type: text
    content: Soon—and it will not be very long—
  - type: text
    content: the forests of Lebanon will become a fertile field,
  - type: text
    content: and the fertile field will yield bountiful crops.
  '18':
  - type: text
    content: In that day the deaf will hear words read from a book,
  - type: text
    content: and the blind will see through the gloom and darkness.
  '19':
  - type: text
    content: 'The humble will be filled with fresh joy from the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: The poor will rejoice in the Holy One of Israel.
  '2':
  - type: text
    content: Yet I will bring disaster upon you,
  - type: text
    content: and there will be much weeping and sorrow.
  - type: text
    content: For Jerusalem will become what her name Ariel means—
  - type: text
    content: an altar covered with blood.
  '20':
  - type: text
    content: The scoffer will be gone,
  - type: text
    content: the arrogant will disappear,
  - type: text
    content: and those who plot evil will be killed.
  '21':
  - type: text
    content: Those who convict the innocent
  - type: text
    content: by their false testimony will disappear.
  - type: text
    content: A similar fate awaits those who use trickery to pervert justice
  - type: text
    content: and who tell lies to destroy the innocent.
  '22':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: ', who redeemed Abraham, says to the people of Israel,'
  - type: note
    content: Hebrew of Jacob. See note on 14:1.
  - type: text
    content: “My people will no longer be ashamed
  - type: text
    content: or turn pale with fear.
  '23':
  - type: text
    content: For when they see their many children
  - type: text
    content: and all the blessings I have given them,
  - type: text
    content: they will recognize the holiness of the Holy One of Jacob.
  - type: text
    content: They will stand in awe of the God of Israel.
  '24':
  - type: text
    content: Then the wayward will gain understanding,
  - type: text
    content: and complainers will accept instruction.
  '3':
  - type: text
    content: I will be your enemy,
  - type: text
    content: surrounding Jerusalem and attacking its walls.
  - type: text
    content: I will build siege towers
  - type: text
    content: and destroy it.
  '4':
  - type: text
    content: Then deep from the earth you will speak;
  - type: text
    content: from low in the dust your words will come.
  - type: text
    content: Your voice will whisper from the ground
  - type: text
    content: like a ghost conjured up from the grave.
  '5':
  - type: text
    content: “But suddenly, your ruthless enemies will be crushed
  - type: text
    content: like the finest of dust.
  - type: text
    content: Your many attackers will be driven away
  - type: text
    content: like chaff before the wind.
  - type: text
    content: Suddenly, in an instant,
  '6':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, will act for you'
  - type: text
    content: with thunder and earthquake and great noise,
  - type: text
    content: with whirlwind and storm and consuming fire.
  '7':
  - type: text
    content: All the nations fighting against Jerusalem
  - type: note
    content: Hebrew Ariel.
  - type: text
    content: will vanish like a dream!
  - type: text
    content: Those who are attacking her walls
  - type: text
    content: will vanish like a vision in the night.
  '8':
  - type: text
    content: A hungry person dreams of eating
  - type: text
    content: but wakes up still hungry.
  - type: text
    content: A thirsty person dreams of drinking
  - type: text
    content: but is still faint from thirst when morning comes.
  - type: text
    content: So it will be with your enemies,
  - type: text
    content: with those who attack Mount Zion.”
  '9':
  - type: text
    content: Are you amazed and incredulous?
  - type: text
    content: Don’t you believe it?
  - type: text
    content: Then go ahead and be blind.
  - type: text
    content: You are stupid, but not from wine!
  - type: text
    content: You stagger, but not from liquor!
