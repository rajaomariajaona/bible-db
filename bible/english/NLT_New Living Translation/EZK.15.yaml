document_id: EZK.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem—a Useless Vine
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '2':
  - type: text
    content: '“Son of man, how does a grapevine compare to a tree? Is a vine’s wood as useful as the wood of a tree? '
  '3':
  - type: text
    content: 'Can its wood be used for making things, like pegs to hang up pots and pans? '
  '4':
  - type: text
    content: 'No, it can only be used for fuel, and even as fuel, it burns too quickly. '
  '5':
  - type: text
    content: Vines are useless both before and after being put into the fire!
  '6':
  - type: text
    content: '“And this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The people of Jerusalem are like grapevines growing among the trees of the forest. Since they are useless, I have thrown them on the fire to be burned. '
  '7':
  - type: text
    content: 'And I will see to it that if they escape from one fire, they will fall into another. When I turn against them, you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'And I will make the land desolate because my people have been unfaithful to me. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
