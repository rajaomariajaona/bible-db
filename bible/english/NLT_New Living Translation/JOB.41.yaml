document_id: JOB.41,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Challenge Continues
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 41:1-8 are numbered 40:25-32 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: “Can you catch Leviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
      marker-yv: yv-n
    - type: text
      text: ' with a hook'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put a noose around its jaw?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And since no one dares to disturb it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who then can stand up to me?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Who has given me anything that I need to pay back?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything under heaven is mine.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I want to emphasize Leviathan’s limbs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its enormous strength and graceful form.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Who can strip off its hide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who can penetrate its double layer of armor?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: its bridle?
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Who could pry open its jaws?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For its teeth are terrible!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The scales on its back are like
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Its pride is in its.
      marker-yv: yv-n
    - type: text
      text: ' rows of shields'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tightly sealed together.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They are so close together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no air can get between them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Each scale sticks tight to the next.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They interlock and cannot be penetrated.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “When it sneezes, it flashes light!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its eyes are like the red of dawn.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Lightning leaps from its mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flames of fire flash out.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Can you tie it with a rope through the nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or pierce its jaw with a spike?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Smoke streams from its nostrils
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like steam from a pot heated over burning rushes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Its breath would kindle coals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for flames shoot from its mouth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “The tremendous strength in Leviathan’s neck
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strikes terror wherever it goes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Its flesh is hard and firm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cannot be penetrated.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Its heart is hard as rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hard as a millstone.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When it rises, the mighty are afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gripped by terror.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: No sword can stop it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no spear, dart, or javelin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Iron is nothing but straw to that creature,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bronze is like rotten wood.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Arrows cannot make it flee.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stones shot from a sling are like bits of grass.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Clubs are like a blade of grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it laughs at the swish of javelins.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Will it beg you for mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or implore you for pity?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Its belly is covered with scales as sharp as glass.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It plows up the ground as it drags through the mud.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Leviathan makes the water boil with its commotion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It stirs the depths like a pot of ointment.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The water glistens in its wake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making the sea look white.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Nothing on earth is its equal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no other creature so fearless.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Of all the creatures, it is the proudest.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is the king of beasts.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Will it agree to work for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be your slave for life?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Can you make it a pet like a bird,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or give it to your little girls to play with?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Will merchants try to buy it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to sell it in their shops?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Will its hide be hurt by spears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or its head by a harpoon?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If you lay a hand on it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will certainly remember the battle that follows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You won’t try that again!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 41:9-34 are numbered 41:1-26 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: No, it is useless to try to capture it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The hunter who attempts it will be knocked down.
