document_id: JOB.41,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Challenge Continues
  - type: text
    content: ' '
  - type: note
    content: Verses 41:1-8 are numbered 40:25-32 in Hebrew text.
  - type: text
    content: “Can you catch Leviathan
  - type: note
    content: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: ' with a hook'
  - type: text
    content: or put a noose around its jaw?
  '10':
  - type: text
    content: And since no one dares to disturb it,
  - type: text
    content: who then can stand up to me?
  '11':
  - type: text
    content: Who has given me anything that I need to pay back?
  - type: text
    content: Everything under heaven is mine.
  '12':
  - type: text
    content: “I want to emphasize Leviathan’s limbs
  - type: text
    content: and its enormous strength and graceful form.
  '13':
  - type: text
    content: Who can strip off its hide,
  - type: text
    content: and who can penetrate its double layer of armor?
  - type: note
    content: As in Greek version; Hebrew reads its bridle?
  '14':
  - type: text
    content: Who could pry open its jaws?
  - type: text
    content: For its teeth are terrible!
  '15':
  - type: text
    content: The scales on its back are like
  - type: note
    content: As in some Greek manuscripts and Latin Vulgate; Hebrew reads Its pride is in its.
  - type: text
    content: ' rows of shields'
  - type: text
    content: tightly sealed together.
  '16':
  - type: text
    content: They are so close together
  - type: text
    content: that no air can get between them.
  '17':
  - type: text
    content: Each scale sticks tight to the next.
  - type: text
    content: They interlock and cannot be penetrated.
  '18':
  - type: text
    content: “When it sneezes, it flashes light!
  - type: text
    content: Its eyes are like the red of dawn.
  '19':
  - type: text
    content: Lightning leaps from its mouth;
  - type: text
    content: flames of fire flash out.
  '2':
  - type: text
    content: Can you tie it with a rope through the nose
  - type: text
    content: or pierce its jaw with a spike?
  '20':
  - type: text
    content: Smoke streams from its nostrils
  - type: text
    content: like steam from a pot heated over burning rushes.
  '21':
  - type: text
    content: Its breath would kindle coals,
  - type: text
    content: for flames shoot from its mouth.
  '22':
  - type: text
    content: “The tremendous strength in Leviathan’s neck
  - type: text
    content: strikes terror wherever it goes.
  '23':
  - type: text
    content: Its flesh is hard and firm
  - type: text
    content: and cannot be penetrated.
  '24':
  - type: text
    content: Its heart is hard as rock,
  - type: text
    content: hard as a millstone.
  '25':
  - type: text
    content: When it rises, the mighty are afraid,
  - type: text
    content: gripped by terror.
  '26':
  - type: text
    content: No sword can stop it,
  - type: text
    content: no spear, dart, or javelin.
  '27':
  - type: text
    content: Iron is nothing but straw to that creature,
  - type: text
    content: and bronze is like rotten wood.
  '28':
  - type: text
    content: Arrows cannot make it flee.
  - type: text
    content: Stones shot from a sling are like bits of grass.
  '29':
  - type: text
    content: Clubs are like a blade of grass,
  - type: text
    content: and it laughs at the swish of javelins.
  '3':
  - type: text
    content: Will it beg you for mercy
  - type: text
    content: or implore you for pity?
  '30':
  - type: text
    content: Its belly is covered with scales as sharp as glass.
  - type: text
    content: It plows up the ground as it drags through the mud.
  '31':
  - type: text
    content: “Leviathan makes the water boil with its commotion.
  - type: text
    content: It stirs the depths like a pot of ointment.
  '32':
  - type: text
    content: The water glistens in its wake,
  - type: text
    content: making the sea look white.
  '33':
  - type: text
    content: Nothing on earth is its equal,
  - type: text
    content: no other creature so fearless.
  '34':
  - type: text
    content: Of all the creatures, it is the proudest.
  - type: text
    content: It is the king of beasts.”
  '4':
  - type: text
    content: Will it agree to work for you,
  - type: text
    content: to be your slave for life?
  '5':
  - type: text
    content: Can you make it a pet like a bird,
  - type: text
    content: or give it to your little girls to play with?
  '6':
  - type: text
    content: Will merchants try to buy it
  - type: text
    content: to sell it in their shops?
  '7':
  - type: text
    content: Will its hide be hurt by spears
  - type: text
    content: or its head by a harpoon?
  '8':
  - type: text
    content: If you lay a hand on it,
  - type: text
    content: you will certainly remember the battle that follows.
  - type: text
    content: You won’t try that again!
  '9':
  - type: text
    content: ' '
  - type: note
    content: Verses 41:9-34 are numbered 41:1-26 in Hebrew text.
  - type: text
    content: No, it is useless to try to capture it.
  - type: text
    content: The hunter who attempts it will be knocked down.
