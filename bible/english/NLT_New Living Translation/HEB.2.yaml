document_id: HEB.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning against Drifting Away
  - type: text
    content: 'So we must listen very carefully to the truth we have heard, or we may drift away from it. '
  '10':
  - type: text
    content: God, for whom and through whom everything was made, chose to bring many children into glory. And it was only right that he should make Jesus, through his suffering, a perfect leader, fit to bring them into their salvation.
  '11':
  - type: text
    content: So now Jesus and the ones he makes holy have the same Father. That is why Jesus is not ashamed to call them his brothers and sisters.
  - type: note
    content: Greek brothers; also in 2:12.
  - type: text
    content: ' '
  '12':
  - type: text
    content: For he said to God,
  - type: text
    content: “I will proclaim your name to my brothers and sisters.
  - type: text
    content: I will praise you among your assembled people.”
  - type: note
    content: Ps 22:22.
  '13':
  - type: text
    content: He also said,
  - type: text
    content: “I will put my trust in him,”
  - type: text
    content: that is, “I and the children God has given me.”
  - type: note
    content: Isa 8:17-18.
  '14':
  - type: text
    content: Because God’s children are human beings—made of flesh and blood—the Son also became flesh and blood. For only as a human being could he die, and only by dying could he break the power of the devil, who had
  - type: note
    content: Or has.
  - type: text
    content: ' the power of death. '
  '15':
  - type: text
    content: Only in this way could he set free all who have lived their lives as slaves to the fear of dying.
  '16':
  - type: text
    content: 'We also know that the Son did not come to help angels; he came to help the descendants of Abraham. '
  '17':
  - type: text
    content: Therefore, it was necessary for him to be made in every respect like us, his brothers and sisters,
  - type: note
    content: Greek like the brothers.
  - type: text
    content: ' so that he could be our merciful and faithful High Priest before God. Then he could offer a sacrifice that would take away the sins of the people. '
  '18':
  - type: text
    content: Since he himself has gone through suffering and testing, he is able to help us when we are being tested.
  '2':
  - type: text
    content: 'For the message God delivered through angels has always stood firm, and every violation of the law and every act of disobedience was punished. '
  '3':
  - type: text
    content: 'So what makes us think we can escape if we ignore this great salvation that was first announced by the Lord Jesus himself and then delivered to us by those who heard him speak? '
  '4':
  - type: text
    content: And God confirmed the message by giving signs and wonders and various miracles and gifts of the Holy Spirit whenever he chose.
  - type: heading
    content: Jesus, the Man
  '5':
  - type: text
    content: 'And furthermore, it is not angels who will control the future world we are talking about. '
  '6':
  - type: text
    content: For in one place the Scriptures say,
  - type: text
    content: “What are mere mortals that you should think about them,
  - type: text
    content: or a son of man
  - type: note
    content: Or the Son of Man.
  - type: text
    content: ' that you should care for him?'
  '7':
  - type: text
    content: Yet for a little while you made them a little lower than the angels
  - type: text
    content: and crowned them with glory and honor.
  - type: note
    content: Some manuscripts add You gave them charge of everything you made.
  '8':
  - type: text
    content: You gave them authority over all things.”
  - type: note
    content: Ps 8:4-6 (Greek version).
  - type: text
    content: 'Now when it says “all things,” it means nothing is left out. But we have not yet seen all things put under their authority. '
  '9':
  - type: text
    content: 'What we do see is Jesus, who for a little while was given a position “a little lower than the angels”; and because he suffered death for us, he is now “crowned with glory and honor.” Yes, by God’s grace, Jesus tasted death for everyone. '
