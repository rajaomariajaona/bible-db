document_id: HEB.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Discipline Proves His Love
  - type: text
    content: 'Therefore, since we are surrounded by such a huge crowd of witnesses to the life of faith, let us strip off every weight that slows us down, especially the sin that so easily trips us up. And let us run with endurance the race God has set before us. '
  '10':
  - type: text
    content: 'For our earthly fathers disciplined us for a few years, doing the best they knew how. But God’s discipline is always good for us, so that we might share in his holiness. '
  '11':
  - type: text
    content: No discipline is enjoyable while it is happening—it’s painful! But afterward there will be a peaceful harvest of right living for those who are trained in this way.
  '12':
  - type: text
    content: 'So take a new grip with your tired hands and strengthen your weak knees. '
  '13':
  - type: text
    content: Mark out a straight path for your feet so that those who are weak and lame will not fall but become strong.
  - type: heading
    content: A Call to Listen to God
  '14':
  - type: text
    content: 'Work at living in peace with everyone, and work at living a holy life, for those who are not holy will not see the Lord. '
  '15':
  - type: text
    content: 'Look after each other so that none of you fails to receive the grace of God. Watch out that no poisonous root of bitterness grows up to trouble you, corrupting many. '
  '16':
  - type: text
    content: 'Make sure that no one is immoral or godless like Esau, who traded his birthright as the firstborn son for a single meal. '
  '17':
  - type: text
    content: You know that afterward, when he wanted his father’s blessing, he was rejected. It was too late for repentance, even though he begged with bitter tears.
  '18':
  - type: text
    content: You have not come to a physical mountain,
  - type: note
    content: Greek to something that can be touched.
  - type: text
    content: ' to a place of flaming fire, darkness, gloom, and whirlwind, as the Israelites did at Mount Sinai. '
  '19':
  - type: text
    content: 'For they heard an awesome trumpet blast and a voice so terrible that they begged God to stop speaking. '
  '2':
  - type: text
    content: We do this by keeping our eyes on Jesus, the champion who initiates and perfects our faith.
  - type: note
    content: Or Jesus, the originator and perfecter of our faith.
  - type: text
    content: ' Because of the joy'
  - type: note
    content: Or Instead of the joy.
  - type: text
    content: ' awaiting him, he endured the cross, disregarding its shame. Now he is seated in the place of honor beside God’s throne. '
  '20':
  - type: text
    content: 'They staggered back under God’s command: “If even an animal touches the mountain, it must be stoned to death.”'
  - type: note
    content: Exod 19:13.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Moses himself was so frightened at the sight that he said, “I am terrified and trembling.”
  - type: note
    content: Deut 9:19.
  '22':
  - type: text
    content: 'No, you have come to Mount Zion, to the city of the living God, the heavenly Jerusalem, and to countless thousands of angels in a joyful gathering. '
  '23':
  - type: text
    content: 'You have come to the assembly of God’s firstborn children, whose names are written in heaven. You have come to God himself, who is the judge over all things. You have come to the spirits of the righteous ones in heaven who have now been made perfect. '
  '24':
  - type: text
    content: You have come to Jesus, the one who mediates the new covenant between God and people, and to the sprinkled blood, which speaks of forgiveness instead of crying out for vengeance like the blood of Abel.
  '25':
  - type: text
    content: 'Be careful that you do not refuse to listen to the One who is speaking. For if the people of Israel did not escape when they refused to listen to Moses, the earthly messenger, we will certainly not escape if we reject the One who speaks to us from heaven! '
  '26':
  - type: text
    content: 'When God spoke from Mount Sinai his voice shook the earth, but now he makes another promise: “Once again I will shake not only the earth but the heavens also.”'
  - type: note
    content: Hag 2:6.
  - type: text
    content: ' '
  '27':
  - type: text
    content: This means that all of creation will be shaken and removed, so that only unshakable things will remain.
  '28':
  - type: text
    content: 'Since we are receiving a Kingdom that is unshakable, let us be thankful and please God by worshiping him with holy fear and awe. '
  '29':
  - type: text
    content: For our God is a devouring fire.
  '3':
  - type: text
    content: Think of all the hostility he endured from sinful people;
  - type: note
    content: Some manuscripts read Think of how people hurt themselves by opposing him.
  - type: text
    content: ' then you won’t become weary and give up. '
  '4':
  - type: text
    content: After all, you have not yet given your lives in your struggle against sin.
  '5':
  - type: text
    content: And have you forgotten the encouraging words God spoke to you as his children?
  - type: note
    content: Greek sons; also in 12:7, 8.
  - type: text
    content: ' He said,'
  - type: text
    content: “My child,
  - type: note
    content: Greek son; also in 12:6, 7.
  - type: text
    content: ' don’t make light of the '
  - type: text
    content: Lord
  - type: text
    content: ’s discipline,
  - type: text
    content: and don’t give up when he corrects you.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' disciplines those he loves,'
  - type: text
    content: and he punishes each one he accepts as his child.”
  - type: note
    content: Prov 3:11-12 (Greek version).
  '7':
  - type: text
    content: 'As you endure this divine discipline, remember that God is treating you as his own children. Who ever heard of a child who is never disciplined by its father? '
  '8':
  - type: text
    content: 'If God doesn’t discipline you as he does all of his children, it means that you are illegitimate and are not really his children at all. '
  '9':
  - type: text
    content: Since we respected our earthly fathers who disciplined us, shouldn’t we submit even more to the discipline of the Father of our spirits, and live forever?
  - type: note
    content: Or and really live?
