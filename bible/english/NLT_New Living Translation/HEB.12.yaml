document_id: HEB.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Discipline Proves His Love
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, since we are surrounded by such a huge crowd of witnesses to the life of faith, let us strip off every weight that slows us down, especially the sin that so easily trips us up. And let us run with endurance the race God has set before us. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For our earthly fathers disciplined us for a few years, doing the best they knew how. But God’s discipline is always good for us, so that we might share in his holiness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: No discipline is enjoyable while it is happening—it’s painful! But afterward there will be a peaceful harvest of right living for those who are trained in this way.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So take a new grip with your tired hands and strengthen your weak knees. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mark out a straight path for your feet so that those who are weak and lame will not fall but become strong.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Listen to God
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Work at living in peace with everyone, and work at living a holy life, for those who are not holy will not see the Lord. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Look after each other so that none of you fails to receive the grace of God. Watch out that no poisonous root of bitterness grows up to trouble you, corrupting many. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Make sure that no one is immoral or godless like Esau, who traded his birthright as the firstborn son for a single meal. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You know that afterward, when he wanted his father’s blessing, he was rejected. It was too late for repentance, even though he begged with bitter tears.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: You have not come to a physical mountain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to something that can be touched.
      marker-yv: yv-n
    - type: text
      text: ' to a place of flaming fire, darkness, gloom, and whirlwind, as the Israelites did at Mount Sinai. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For they heard an awesome trumpet blast and a voice so terrible that they begged God to stop speaking. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: We do this by keeping our eyes on Jesus, the champion who initiates and perfects our faith.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus, the originator and perfecter of our faith.
      marker-yv: yv-n
    - type: text
      text: ' Because of the joy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Instead of the joy.
      marker-yv: yv-n
    - type: text
      text: ' awaiting him, he endured the cross, disregarding its shame. Now he is seated in the place of honor beside God’s throne. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They staggered back under God’s command: “If even an animal touches the mountain, it must be stoned to death.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 19:13.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Moses himself was so frightened at the sight that he said, “I am terrified and trembling.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 9:19.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'No, you have come to Mount Zion, to the city of the living God, the heavenly Jerusalem, and to countless thousands of angels in a joyful gathering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'You have come to the assembly of God’s firstborn children, whose names are written in heaven. You have come to God himself, who is the judge over all things. You have come to the spirits of the righteous ones in heaven who have now been made perfect. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You have come to Jesus, the one who mediates the new covenant between God and people, and to the sprinkled blood, which speaks of forgiveness instead of crying out for vengeance like the blood of Abel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Be careful that you do not refuse to listen to the One who is speaking. For if the people of Israel did not escape when they refused to listen to Moses, the earthly messenger, we will certainly not escape if we reject the One who speaks to us from heaven! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When God spoke from Mount Sinai his voice shook the earth, but now he makes another promise: “Once again I will shake not only the earth but the heavens also.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hag 2:6.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: This means that all of creation will be shaken and removed, so that only unshakable things will remain.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Since we are receiving a Kingdom that is unshakable, let us be thankful and please God by worshiping him with holy fear and awe. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: For our God is a devouring fire.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Think of all the hostility he endured from sinful people;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Think of how people hurt themselves by opposing him.
      marker-yv: yv-n
    - type: text
      text: ' then you won’t become weary and give up. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: After all, you have not yet given your lives in your struggle against sin.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And have you forgotten the encouraging words God spoke to you as his children?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sons; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:7, 8.
      marker-yv: yv-n
    - type: text
      text: ' He said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:6, 7.
      marker-yv: yv-n
    - type: text
      text: ' don’t make light of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s discipline,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t give up when he corrects you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' disciplines those he loves,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he punishes each one he accepts as his child.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5-6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prov 3:11-12 (Greek version).
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'As you endure this divine discipline, remember that God is treating you as his own children. Who ever heard of a child who is never disciplined by its father? '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'If God doesn’t discipline you as he does all of his children, it means that you are illegitimate and are not really his children at all. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Since we respected our earthly fathers who disciplined us, shouldn’t we submit even more to the discipline of the Father of our spirits, and live forever?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and really live?
      marker-yv: yv-n
