document_id: 2SA.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Song of Praise
  - type: text
    content: 'David sang this song to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the day the '
  - type: text
    content: Lord
  - type: text
    content: ' rescued him from all his enemies and from Saul. '
  '10':
  - type: text
    content: He opened the heavens and came down;
  - type: text
    content: dark storm clouds were beneath his feet.
  '11':
  - type: text
    content: Mounted on a mighty angelic being,
  - type: note
    content: Hebrew a cherub.
  - type: text
    content: ' he flew,'
  - type: text
    content: soaring
  - type: note
    content: As in some Hebrew manuscripts (see also Ps 18:10); other Hebrew manuscripts read appearing.
  - type: text
    content: ' on the wings of the wind.'
  '12':
  - type: text
    content: He shrouded himself in darkness,
  - type: text
    content: veiling his approach with dense rain clouds.
  '13':
  - type: text
    content: A great brightness shone around him,
  - type: text
    content: and burning coals
  - type: note
    content: Or and lightning bolts.
  - type: text
    content: ' blazed forth.'
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' thundered from heaven;'
  - type: text
    content: the voice of the Most High resounded.
  '15':
  - type: text
    content: He shot arrows and scattered his enemies;
  - type: text
    content: his lightning flashed, and they were confused.
  '16':
  - type: text
    content: 'Then at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: at the blast of his breath,
  - type: text
    content: the bottom of the sea could be seen,
  - type: text
    content: and the foundations of the earth were laid bare.
  '17':
  - type: text
    content: “He reached down from heaven and rescued me;
  - type: text
    content: he drew me out of deep waters.
  '18':
  - type: text
    content: He rescued me from my powerful enemies,
  - type: text
    content: from those who hated me and were too strong for me.
  '19':
  - type: text
    content: They attacked me at a moment when I was in distress,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' supported me.'
  '2':
  - type: text
    content: 'He sang:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is my rock, my fortress, and my savior;'
  '20':
  - type: text
    content: He led me to a place of safety;
  - type: text
    content: he rescued me because he delights in me.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rewarded me for doing right;'
  - type: text
    content: he restored me because of my innocence.
  '22':
  - type: text
    content: 'For I have kept the ways of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I have not turned from my God to follow evil.
  '23':
  - type: text
    content: I have followed all his regulations;
  - type: text
    content: I have never abandoned his decrees.
  '24':
  - type: text
    content: I am blameless before God;
  - type: text
    content: I have kept myself from sin.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rewarded me for doing right.'
  - type: text
    content: He has seen my innocence.
  '26':
  - type: text
    content: “To the faithful you show yourself faithful;
  - type: text
    content: to those with integrity you show integrity.
  '27':
  - type: text
    content: To the pure you show yourself pure,
  - type: text
    content: but to the crooked you show yourself shrewd.
  '28':
  - type: text
    content: You rescue the humble,
  - type: text
    content: but your eyes watch the proud and humiliate them.
  '29':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you are my lamp.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' lights up my darkness.'
  '3':
  - type: text
    content: my God is my rock, in whom I find protection.
  - type: text
    content: He is my shield, the power that saves me,
  - type: text
    content: and my place of safety.
  - type: text
    content: He is my refuge, my savior,
  - type: text
    content: the one who saves me from violence.
  '30':
  - type: text
    content: In your strength I can crush an army;
  - type: text
    content: with my God I can scale any wall.
  '31':
  - type: text
    content: “God’s way is perfect.
  - type: text
    content: 'All the '
  - type: text
    content: Lord
  - type: text
    content: ’s promises prove true.
  - type: text
    content: He is a shield for all who look to him for protection.
  '32':
  - type: text
    content: 'For who is God except the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who but our God is a solid rock?
  '33':
  - type: text
    content: God is my strong fortress,
  - type: text
    content: and he makes my way perfect.
  '34':
  - type: text
    content: He makes me as surefooted as a deer,
  - type: text
    content: enabling me to stand on mountain heights.
  '35':
  - type: text
    content: He trains my hands for battle;
  - type: text
    content: he strengthens my arm to draw a bronze bow.
  '36':
  - type: text
    content: You have given me your shield of victory;
  - type: text
    content: your help
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads your answering.
  - type: text
    content: ' has made me great.'
  '37':
  - type: text
    content: You have made a wide path for my feet
  - type: text
    content: to keep them from slipping.
  '38':
  - type: text
    content: “I chased my enemies and destroyed them;
  - type: text
    content: I did not stop until they were conquered.
  '39':
  - type: text
    content: I consumed them;
  - type: text
    content: I struck them down so they did not get up;
  - type: text
    content: they fell beneath my feet.
  '4':
  - type: text
    content: 'I called on the '
  - type: text
    content: Lord
  - type: text
    content: ', who is worthy of praise,'
  - type: text
    content: and he saved me from my enemies.
  '40':
  - type: text
    content: You have armed me with strength for the battle;
  - type: text
    content: you have subdued my enemies under my feet.
  '41':
  - type: text
    content: You placed my foot on their necks.
  - type: text
    content: I have destroyed all who hated me.
  '42':
  - type: text
    content: They looked for help, but no one came to their rescue.
  - type: text
    content: 'They even cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', but he refused to answer.'
  '43':
  - type: text
    content: I ground them as fine as the dust of the earth;
  - type: text
    content: I trampled them
  - type: note
    content: As in Dead Sea Scrolls (see also Ps 18:42); Masoretic Text reads I crushed and trampled them.
  - type: text
    content: ' in the gutter like dirt.'
  '44':
  - type: text
    content: “You gave me victory over my accusers.
  - type: text
    content: You preserved me as the ruler over nations;
  - type: text
    content: people I don’t even know now serve me.
  '45':
  - type: text
    content: Foreign nations cringe before me;
  - type: text
    content: as soon as they hear of me, they submit.
  '46':
  - type: text
    content: They all lose their courage
  - type: text
    content: and come trembling
  - type: note
    content: As in parallel text at Ps 18:45; Hebrew reads come girding themselves.
  - type: text
    content: ' from their strongholds.'
  '47':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' lives! Praise to my Rock!'
  - type: text
    content: May God, the Rock of my salvation, be exalted!
  '48':
  - type: text
    content: He is the God who pays back those who harm me;
  - type: text
    content: he brings down the nations under me
  '49':
  - type: text
    content: and delivers me from my enemies.
  - type: text
    content: You hold me safe beyond the reach of my enemies;
  - type: text
    content: you save me from violent opponents.
  '5':
  - type: text
    content: “The waves of death overwhelmed me;
  - type: text
    content: floods of destruction swept over me.
  '50':
  - type: text
    content: 'For this, O '
  - type: text
    content: Lord
  - type: text
    content: ', I will praise you among the nations;'
  - type: text
    content: I will sing praises to your name.
  '51':
  - type: text
    content: You give great victories to your king;
  - type: text
    content: you show unfailing love to your anointed,
  - type: text
    content: to David and all his descendants forever.”
  '6':
  - type: text
    content: The grave
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' wrapped its ropes around me;'
  - type: text
    content: death laid a trap in my path.
  '7':
  - type: text
    content: 'But in my distress I cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: yes, I cried to my God for help.
  - type: text
    content: He heard me from his sanctuary;
  - type: text
    content: my cry reached his ears.
  '8':
  - type: text
    content: “Then the earth quaked and trembled.
  - type: text
    content: The foundations of the heavens shook;
  - type: text
    content: they quaked because of his anger.
  '9':
  - type: text
    content: Smoke poured from his nostrils;
  - type: text
    content: fierce flames leaped from his mouth.
  - type: text
    content: Glowing coals blazed forth from him.
