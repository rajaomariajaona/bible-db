document_id: PSA.112,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; after the introductory note of praise, each line begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'How joyful are those who fear the '
  - type: text
    content: Lord
  - type: text
    content: and delight in obeying his commands.
  '10':
  - type: text
    content: The wicked will see this and be infuriated.
  - type: text
    content: They will grind their teeth in anger;
  - type: text
    content: they will slink away, their hopes thwarted.
  '2':
  - type: text
    content: Their children will be successful everywhere;
  - type: text
    content: an entire generation of godly people will be blessed.
  '3':
  - type: text
    content: They themselves will be wealthy,
  - type: text
    content: and their good deeds will last forever.
  '4':
  - type: text
    content: Light shines in the darkness for the godly.
  - type: text
    content: They are generous, compassionate, and righteous.
  '5':
  - type: text
    content: Good comes to those who lend money generously
  - type: text
    content: and conduct their business fairly.
  '6':
  - type: text
    content: Such people will not be overcome by evil.
  - type: text
    content: Those who are righteous will be long remembered.
  '7':
  - type: text
    content: They do not fear bad news;
  - type: text
    content: 'they confidently trust the '
  - type: text
    content: Lord
  - type: text
    content: ' to care for them.'
  '8':
  - type: text
    content: They are confident and fearless
  - type: text
    content: and can face their foes triumphantly.
  '9':
  - type: text
    content: They share freely and give generously to those in need.
  - type: text
    content: Their good deeds will be remembered forever.
  - type: text
    content: They will have influence and honor.
