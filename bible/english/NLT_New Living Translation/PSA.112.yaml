document_id: PSA.112
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '112 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is a Hebrew acrostic poem; after the introductory note of praise, each line begins with a successive letter of the Hebrew alphabet.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How joyful are those who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delight in obeying his commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Their children will be successful everywhere;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an entire generation of godly people will be blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They themselves will be wealthy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their good deeds will last forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Light shines in the darkness for the godly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are generous, compassionate, and righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Good comes to those who lend money generously
- type: usfm
  marker: q2
  children:
  - type: text
    text: and conduct their business fairly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Such people will not be overcome by evil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who are righteous will be long remembered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They do not fear bad news;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they confidently trust the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to care for them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are confident and fearless
- type: usfm
  marker: q2
  children:
  - type: text
    text: and can face their foes triumphantly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They share freely and give generously to those in need.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their good deeds will be remembered forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will have influence and honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The wicked will see this and be infuriated.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will grind their teeth in anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will slink away, their hopes thwarted.
