document_id: ISA.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Assyria
  - type: text
    content: What sorrow awaits you Assyrians, who have destroyed others
  - type: note
    content: Hebrew What sorrow awaits you, O destroyer. The Hebrew text does not specifically name Assyria as the object of the prophecy in this chapter.
  - type: text
    content: but have never been destroyed yourselves.
  - type: text
    content: You betray others,
  - type: text
    content: but you have never been betrayed.
  - type: text
    content: When you are done destroying,
  - type: text
    content: you will be destroyed.
  - type: text
    content: When you are done betraying,
  - type: text
    content: you will be betrayed.
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Now I will stand up.'
  - type: text
    content: Now I will show my power and might.
  '11':
  - type: text
    content: You Assyrians produce nothing but dry grass and stubble.
  - type: text
    content: Your own breath will turn to fire and consume you.
  '12':
  - type: text
    content: Your people will be burned up completely,
  - type: text
    content: like thornbushes cut down and tossed in a fire.
  '13':
  - type: text
    content: Listen to what I have done, you nations far away!
  - type: text
    content: And you that are near, acknowledge my might!”
  '14':
  - type: text
    content: The sinners in Jerusalem shake with fear.
  - type: text
    content: Terror seizes the godless.
  - type: text
    content: “Who can live with this devouring fire?” they cry.
  - type: text
    content: “Who can survive this all-consuming fire?”
  '15':
  - type: text
    content: Those who are honest and fair,
  - type: text
    content: who refuse to profit by fraud,
  - type: text
    content: who stay far away from bribes,
  - type: text
    content: who refuse to listen to those who plot murder,
  - type: text
    content: who shut their eyes to all enticement to do wrong—
  '16':
  - type: text
    content: these are the ones who will dwell on high.
  - type: text
    content: The rocks of the mountains will be their fortress.
  - type: text
    content: Food will be supplied to them,
  - type: text
    content: and they will have water in abundance.
  '17':
  - type: text
    content: Your eyes will see the king in all his splendor,
  - type: text
    content: and you will see a land that stretches into the distance.
  '18':
  - type: text
    content: You will think back to this time of terror, asking,
  - type: text
    content: “Where are the Assyrian officers
  - type: text
    content: who counted our towers?
  - type: text
    content: Where are the bookkeepers
  - type: text
    content: who recorded the plunder taken from our fallen city?”
  '19':
  - type: text
    content: You will no longer see these fierce, violent people
  - type: text
    content: with their strange, unknown language.
  '2':
  - type: text
    content: 'But '
  - type: text
    content: Lord
  - type: text
    content: ', be merciful to us,'
  - type: text
    content: for we have waited for you.
  - type: text
    content: Be our strong arm each day
  - type: text
    content: and our salvation in times of trouble.
  '20':
  - type: text
    content: Instead, you will see Zion as a place of holy festivals.
  - type: text
    content: You will see Jerusalem, a city quiet and secure.
  - type: text
    content: It will be like a tent whose ropes are taut
  - type: text
    content: and whose stakes are firmly fixed.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will be our Mighty One.'
  - type: text
    content: He will be like a wide river of protection
  - type: text
    content: that no enemy can cross,
  - type: text
    content: that no enemy ship can sail upon.
  '22':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is our judge,'
  - type: text
    content: our lawgiver, and our king.
  - type: text
    content: He will care for us and save us.
  '23':
  - type: text
    content: The enemies’ sails hang loose
  - type: text
    content: on broken masts with useless tackle.
  - type: text
    content: Their treasure will be divided by the people of God.
  - type: text
    content: Even the lame will take their share!
  '24':
  - type: text
    content: The people of Israel will no longer say,
  - type: text
    content: “We are sick and helpless,”
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive their sins.'
  '3':
  - type: text
    content: The enemy runs at the sound of your voice.
  - type: text
    content: When you stand up, the nations flee!
  '4':
  - type: text
    content: Just as caterpillars and locusts strip the fields and vines,
  - type: text
    content: so the fallen army of Assyria will be stripped!
  '5':
  - type: text
    content: 'Though the '
  - type: text
    content: Lord
  - type: text
    content: ' is very great and lives in heaven,'
  - type: text
    content: he will make Jerusalem
  - type: note
    content: Hebrew Zion; also in 33:14.
  - type: text
    content: ' his home of justice and righteousness.'
  '6':
  - type: text
    content: In that day he will be your sure foundation,
  - type: text
    content: providing a rich store of salvation, wisdom, and knowledge.
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your treasure.'
  '7':
  - type: text
    content: But now your brave warriors weep in public.
  - type: text
    content: Your ambassadors of peace cry in bitter disappointment.
  '8':
  - type: text
    content: Your roads are deserted;
  - type: text
    content: no one travels them anymore.
  - type: text
    content: The Assyrians have broken their peace treaty
  - type: text
    content: and care nothing for the promises they made before witnesses.
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads care nothing for the cities.
  - type: text
    content: They have no respect for anyone.
  '9':
  - type: text
    content: The land of Israel wilts in mourning.
  - type: text
    content: Lebanon withers with shame.
  - type: text
    content: The plain of Sharon is now a wilderness.
  - type: text
    content: Bashan and Carmel have been plundered.
