document_id: ISA.33,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Assyria
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow awaits you Assyrians, who have destroyed others
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'What sorrow awaits you, O destroyer. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text does not specifically name Assyria as the object of the prophecy in this chapter.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but have never been destroyed yourselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You betray others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you have never been betrayed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you are done destroying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you are done betraying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be betrayed.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “Now I will stand up.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now I will show my power and might.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You Assyrians produce nothing but dry grass and stubble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your own breath will turn to fire and consume you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people will be burned up completely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like thornbushes cut down and tossed in a fire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to what I have done, you nations far away!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you that are near, acknowledge my might!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sinners in Jerusalem shake with fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Terror seizes the godless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who can live with this devouring fire?” they cry.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Who can survive this all-consuming fire?”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are honest and fair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who refuse to profit by fraud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who stay far away from bribes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who refuse to listen to those who plot murder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who shut their eyes to all enticement to do wrong—
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: these are the ones who will dwell on high.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The rocks of the mountains will be their fortress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Food will be supplied to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will have water in abundance.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your eyes will see the king in all his splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will see a land that stretches into the distance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will think back to this time of terror, asking,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where are the Assyrian officers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who counted our towers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are the bookkeepers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who recorded the plunder taken from our fallen city?”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will no longer see these fierce, violent people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their strange, unknown language.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', be merciful to us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we have waited for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be our strong arm each day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our salvation in times of trouble.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, you will see Zion as a place of holy festivals.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will see Jerusalem, a city quiet and secure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be like a tent whose ropes are taut
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose stakes are firmly fixed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be our Mighty One.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will be like a wide river of protection
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that no enemy can cross,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no enemy ship can sail upon.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our judge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our lawgiver, and our king.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will care for us and save us.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemies’ sails hang loose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on broken masts with useless tackle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their treasure will be divided by the people of God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the lame will take their share!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Israel will no longer say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “We are sick and helpless,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will forgive their sins.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy runs at the sound of your voice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When you stand up, the nations flee!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as caterpillars and locusts strip the fields and vines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the fallen army of Assyria will be stripped!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is very great and lives in heaven,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will make Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 33:14.
      marker-yv: yv-n
    - type: text
      text: ' his home of justice and righteousness.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day he will be your sure foundation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: providing a rich store of salvation, wisdom, and knowledge.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be your treasure.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now your brave warriors weep in public.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your ambassadors of peace cry in bitter disappointment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your roads are deserted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one travels them anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Assyrians have broken their peace treaty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and care nothing for the promises they made before witnesses.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: care nothing for the cities.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no respect for anyone.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land of Israel wilts in mourning.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lebanon withers with shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The plain of Sharon is now a wilderness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bashan and Carmel have been plundered.
