document_id: JOB.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Reminds Job of God’s Justice
  - type: text
    content: 'Then Elihu said:'
  '10':
  - type: text
    content: Yet they don’t ask, ‘Where is God my Creator,
  - type: text
    content: the one who gives songs in the night?
  '11':
  - type: text
    content: Where is the one who makes us smarter than the animals
  - type: text
    content: and wiser than the birds of the sky?’
  '12':
  - type: text
    content: And when they cry out, God does not answer
  - type: text
    content: because of their pride.
  '13':
  - type: text
    content: But it is wrong to say God doesn’t listen,
  - type: text
    content: to say the Almighty isn’t concerned.
  '14':
  - type: text
    content: You say you can’t see him,
  - type: text
    content: but he will bring justice if you will only wait.
  - type: note
    content: 'These verses can also be translated as follows: 13Indeed, God doesn’t listen to their empty plea; / the Almighty is not concerned. / 14How much less will he listen when you say you don’t see him, / and that your case is before him and you’re waiting for justice.'
  '15':
  - type: text
    content: You say he does not respond to sinners with anger
  - type: text
    content: and is not greatly concerned about wickedness.
  - type: note
    content: As in Greek and Latin versions; the meaning of this Hebrew word is uncertain.
  '16':
  - type: text
    content: But you are talking nonsense, Job.
  - type: text
    content: You have spoken like a fool.”
  '2':
  - type: text
    content: “Do you think it is right for you to claim,
  - type: text
    content: ‘I am righteous before God’?
  '3':
  - type: text
    content: For you also ask, ‘What’s in it for me?
  - type: text
    content: What’s the use of living a righteous life?’
  '4':
  - type: text
    content: “I will answer you
  - type: text
    content: and all your friends, too.
  '5':
  - type: text
    content: Look up into the sky,
  - type: text
    content: and see the clouds high above you.
  '6':
  - type: text
    content: If you sin, how does that affect God?
  - type: text
    content: Even if you sin again and again,
  - type: text
    content: what effect will it have on him?
  '7':
  - type: text
    content: If you are good, is this some great gift to him?
  - type: text
    content: What could you possibly give him?
  '8':
  - type: text
    content: No, your sins affect only people like yourself,
  - type: text
    content: and your good deeds also affect only humans.
  '9':
  - type: text
    content: “People cry out when they are oppressed.
  - type: text
    content: They groan beneath the power of the mighty.
