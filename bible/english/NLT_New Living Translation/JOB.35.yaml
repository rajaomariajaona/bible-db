document_id: JOB.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu Reminds Job of God’s Justice
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Elihu said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Do you think it is right for you to claim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I am righteous before God’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For you also ask, ‘What’s in it for me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What’s the use of living a righteous life?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I will answer you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your friends, too.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look up into the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see the clouds high above you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If you sin, how does that affect God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even if you sin again and again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what effect will it have on him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If you are good, is this some great gift to him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What could you possibly give him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: No, your sins affect only people like yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your good deeds also affect only humans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “People cry out when they are oppressed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They groan beneath the power of the mighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yet they don’t ask, ‘Where is God my Creator,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one who gives songs in the night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Where is the one who makes us smarter than the animals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wiser than the birds of the sky?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And when they cry out, God does not answer
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of their pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But it is wrong to say God doesn’t listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to say the Almighty isn’t concerned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You say you can’t see him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he will bring justice if you will only wait.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:13-14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'These verses can also be translated as follows: '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Indeed, God doesn’t listen to their empty plea; / the Almighty is not concerned. / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: How much less will he listen when you say you don’t see him, / and that your case is before him and you’re waiting for justice.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You say he does not respond to sinners with anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is not greatly concerned about wickedness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Greek and Latin versions; the meaning of this Hebrew word is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But you are talking nonsense, Job.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have spoken like a fool.”
