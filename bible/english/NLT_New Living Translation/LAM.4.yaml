document_id: LAM.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Anger Satisfied
  - type: text
    content: How the gold has lost its luster!
  - type: text
    content: Even the finest gold has become dull.
  - type: text
    content: The sacred gemstones
  - type: text
    content: lie scattered in the streets!
  '10':
  - type: text
    content: Tenderhearted women
  - type: text
    content: have cooked their own children.
  - type: text
    content: They have eaten them
  - type: text
    content: to survive the siege.
  '11':
  - type: text
    content: 'But now the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' is satisfied.'
  - type: text
    content: His fierce anger has been poured out.
  - type: text
    content: He started a fire in Jerusalem
  - type: note
    content: Hebrew in Zion.
  - type: text
    content: that burned the city to its foundations.
  '12':
  - type: text
    content: Not a king in all the earth—
  - type: text
    content: no one in all the world—
  - type: text
    content: would have believed that an enemy
  - type: text
    content: could march through the gates of Jerusalem.
  '13':
  - type: text
    content: Yet it happened because of the sins of her prophets
  - type: text
    content: and the sins of her priests,
  - type: text
    content: who defiled the city
  - type: text
    content: by shedding innocent blood.
  '14':
  - type: text
    content: They wandered blindly
  - type: text
    content: through the streets,
  - type: text
    content: so defiled by blood
  - type: text
    content: that no one dared touch them.
  '15':
  - type: text
    content: “Get away!” the people shouted at them.
  - type: text
    content: “You’re defiled! Don’t touch us!”
  - type: text
    content: So they fled to distant lands
  - type: text
    content: and wandered among foreign nations,
  - type: text
    content: but none would let them stay.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: 'Lord '
  - type: text
    content: himself has scattered them,
  - type: text
    content: and he no longer helps them.
  - type: text
    content: People show no respect for the priests
  - type: text
    content: and no longer honor the leaders.
  '17':
  - type: text
    content: We looked in vain for our allies
  - type: text
    content: to come and save us,
  - type: text
    content: but we were looking to nations
  - type: text
    content: that could not help us.
  '18':
  - type: text
    content: We couldn’t go into the streets
  - type: text
    content: without danger to our lives.
  - type: text
    content: Our end was near; our days were numbered.
  - type: text
    content: We were doomed!
  '19':
  - type: text
    content: Our enemies were swifter than eagles in flight.
  - type: text
    content: If we fled to the mountains, they found us.
  - type: text
    content: If we hid in the wilderness,
  - type: text
    content: they were waiting for us there.
  '2':
  - type: text
    content: See how the precious children of Jerusalem,
  - type: note
    content: Hebrew precious sons of Zion.
  - type: text
    content: worth their weight in fine gold,
  - type: text
    content: are now treated like pots of clay
  - type: text
    content: made by a common potter.
  '20':
  - type: text
    content: 'Our king—the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed, the very life of our nation—
  - type: text
    content: was caught in their snares.
  - type: text
    content: We had thought that his shadow
  - type: text
    content: would protect us against any nation on earth!
  '21':
  - type: text
    content: Are you rejoicing in the land of Uz,
  - type: text
    content: O people of Edom?
  - type: text
    content: 'But you, too, must drink from the cup of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  - type: text
    content: You, too, will be stripped naked in your drunkenness.
  '22':
  - type: text
    content: O beautiful Jerusalem,
  - type: note
    content: Hebrew O daughter of Zion.
  - type: text
    content: ' your punishment will end;'
  - type: text
    content: you will soon return from exile.
  - type: text
    content: But Edom, your punishment is just beginning;
  - type: text
    content: soon your many sins will be exposed.
  '3':
  - type: text
    content: Even the jackals feed their young,
  - type: text
    content: but not my people Israel.
  - type: text
    content: They ignore their children’s cries,
  - type: text
    content: like ostriches in the desert.
  '4':
  - type: text
    content: The parched tongues of their little ones
  - type: text
    content: stick to the roofs of their mouths in thirst.
  - type: text
    content: The children cry for bread,
  - type: text
    content: but no one has any to give them.
  '5':
  - type: text
    content: The people who once ate the richest foods
  - type: text
    content: now beg in the streets for anything they can get.
  - type: text
    content: Those who once wore the finest clothes
  - type: text
    content: now search the garbage dumps for food.
  '6':
  - type: text
    content: The guilt
  - type: note
    content: Or punishment.
  - type: text
    content: ' of my people'
  - type: text
    content: is greater than that of Sodom,
  - type: text
    content: where utter disaster struck in a moment
  - type: text
    content: and no hand offered help.
  '7':
  - type: text
    content: Our princes once glowed with health—
  - type: text
    content: brighter than snow, whiter than milk.
  - type: text
    content: Their faces were as ruddy as rubies,
  - type: text
    content: their appearance like fine jewels.
  - type: note
    content: Hebrew like lapis lazuli.
  '8':
  - type: text
    content: But now their faces are blacker than soot.
  - type: text
    content: No one recognizes them in the streets.
  - type: text
    content: Their skin sticks to their bones;
  - type: text
    content: it is as dry and hard as wood.
  '9':
  - type: text
    content: Those killed by the sword are better off
  - type: text
    content: than those who die of hunger.
  - type: text
    content: Starving, they waste away
  - type: text
    content: for lack of food from the fields.
