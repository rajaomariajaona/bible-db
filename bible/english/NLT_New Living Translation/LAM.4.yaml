document_id: LAM.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Anger Satisfied
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How the gold has lost its luster!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the finest gold has become dull.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sacred gemstones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lie scattered in the streets!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tenderhearted women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have cooked their own children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have eaten them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to survive the siege.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But now the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is satisfied.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His fierce anger has been poured out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He started a fire in Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that burned the city to its foundations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Not a king in all the earth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one in all the world—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would have believed that an enemy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: could march through the gates of Jerusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet it happened because of the sins of her prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sins of her priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who defiled the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by shedding innocent blood.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They wandered blindly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through the streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so defiled by blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no one dared touch them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Get away!” the people shouted at them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “You’re defiled! Don’t touch us!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they fled to distant lands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wandered among foreign nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but none would let them stay.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: himself has scattered them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he no longer helps them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People show no respect for the priests
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no longer honor the leaders.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: We looked in vain for our allies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to come and save us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but we were looking to nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that could not help us.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: We couldn’t go into the streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without danger to our lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our end was near; our days were numbered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We were doomed!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Our enemies were swifter than eagles in flight.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If we fled to the mountains, they found us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we hid in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were waiting for us there.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: See how the precious children of Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: precious sons of Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worth their weight in fine gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are now treated like pots of clay
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made by a common potter.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Our king—the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed, the very life of our nation—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was caught in their snares.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We had thought that his shadow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would protect us against any nation on earth!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Are you rejoicing in the land of Uz,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O people of Edom?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, too, must drink from the cup of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You, too, will be stripped naked in your drunkenness.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: O beautiful Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: O daughter of Zion.
      marker-yv: yv-n
    - type: text
      text: ' your punishment will end;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will soon return from exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Edom, your punishment is just beginning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soon your many sins will be exposed.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even the jackals feed their young,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not my people Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ignore their children’s cries,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like ostriches in the desert.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The parched tongues of their little ones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stick to the roofs of their mouths in thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The children cry for bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but no one has any to give them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The people who once ate the richest foods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now beg in the streets for anything they can get.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who once wore the finest clothes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now search the garbage dumps for food.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The guilt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: punishment.
      marker-yv: yv-n
    - type: text
      text: ' of my people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is greater than that of Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where utter disaster struck in a moment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no hand offered help.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our princes once glowed with health—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brighter than snow, whiter than milk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their faces were as ruddy as rubies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their appearance like fine jewels.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like lapis lazuli.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But now their faces are blacker than soot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one recognizes them in the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their skin sticks to their bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is as dry and hard as wood.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Those killed by the sword are better off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than those who die of hunger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Starving, they waste away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for lack of food from the fields.
