document_id: LUK.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Repentance
  - type: text
    content: 'About this time Jesus was informed that Pilate had murdered some people from Galilee as they were offering sacrifices at the Temple. '
  '10':
  - type: text
    content: 'One Sabbath day as Jesus was teaching in a synagogue, '
  '11':
  - type: text
    content: 'he saw a woman who had been crippled by an evil spirit. She had been bent double for eighteen years and was unable to stand up straight. '
  '12':
  - type: text
    content: 'When Jesus saw her, he called her over and said, '
  - type: text
    content: “Dear woman, you are healed of your sickness!”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then he touched her, and instantly she could stand straight. How she praised God!
  '14':
  - type: text
    content: But the leader in charge of the synagogue was indignant that Jesus had healed her on the Sabbath day. “There are six days of the week for working,” he said to the crowd. “Come on those days to be healed, not on the Sabbath.”
  '15':
  - type: text
    content: 'But the Lord replied, '
  - type: text
    content: “You hypocrites! Each of you works on the Sabbath day! Don’t you untie your ox or your donkey from its stall on the Sabbath and lead it out for water?
  - type: text
    content: ' '
  '16':
  - type: text
    content: This dear woman, a daughter of Abraham, has been held in bondage by Satan for eighteen years. Isn’t it right that she be released, even on the Sabbath?”
  '17':
  - type: text
    content: This shamed his enemies, but all the people rejoiced at the wonderful things he did.
  - type: heading
    content: Parable of the Mustard Seed
  '18':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “What is the Kingdom of God like? How can I illustrate it?
  - type: text
    content: ' '
  '19':
  - type: text
    content: It is like a tiny mustard seed that a man planted in a garden; it grows and becomes a tree, and the birds make nests in its branches.”
  - type: heading
    content: Parable of the Yeast
  '2':
  - type: text
    content: '“Do you think those Galileans were worse sinners than all the other people from Galilee?” '
  - type: text
    content: 'Jesus asked. '
  - type: text
    content: “Is that why they suffered?
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'He also asked, '
  - type: text
    content: “What else is the Kingdom of God like?
  - type: text
    content: ' '
  '21':
  - type: text
    content: It is like the yeast a woman used in making bread. Even though she put only a little yeast in three measures of flour, it permeated every part of the dough.”
  - type: heading
    content: The Narrow Door
  '22':
  - type: text
    content: 'Jesus went through the towns and villages, teaching as he went, always pressing on toward Jerusalem. '
  '23':
  - type: text
    content: Someone asked him, “Lord, will only a few be saved?”
  - type: text
    content: 'He replied, '
  '24':
  - type: text
    content: “Work hard to enter the narrow door to God’s Kingdom, for many will try to enter but will fail.
  - type: text
    content: ' '
  '25':
  - type: text
    content: When the master of the house has locked the door, it will be too late. You will stand outside knocking and pleading, ‘Lord, open the door for us!’ But he will reply, ‘I don’t know you or where you come from.’
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then you will say, ‘But we ate and drank with you, and you taught in our streets.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he will reply, ‘I tell you, I don’t know you or where you come from. Get away from me, all you who do evil.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “There will be weeping and gnashing of teeth, for you will see Abraham, Isaac, Jacob, and all the prophets in the Kingdom of God, but you will be thrown out.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And people will come from all over the world—from east and west, north and south—to take their places in the Kingdom of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Not at all! And you will perish, too, unless you repent of your sins and turn to God.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And note this: Some who seem least important now will be the greatest then, and some who are the greatest now will be least important then.'
  - type: note
    content: Greek Some are last who will be first, and some are first who will be last.
  - type: text
    content: ”
  - type: heading
    content: Jesus Grieves over Jerusalem
  '31':
  - type: text
    content: At that time some Pharisees said to him, “Get away from here if you want to live! Herod Antipas wants to kill you!”
  '32':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Go tell that fox that I will keep on casting out demons and healing people today and tomorrow; and the third day I will accomplish my purpose.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Yes, today, tomorrow, and the next day I must proceed on my way. For it wouldn’t do for a prophet of God to be killed except in Jerusalem!
  '34':
  - type: text
    content: ' '
  - type: text
    content: “O Jerusalem, Jerusalem, the city that kills the prophets and stones God’s messengers! How often I have wanted to gather your children together as a hen protects her chicks beneath her wings, but you wouldn’t let me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And now, look, your house is abandoned. And you will never see me again until you say, ‘Blessings on the one who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!’'
  - type: note
    content: Ps 118:26.
  - type: text
    content: ”
  '4':
  - type: text
    content: And what about the eighteen people who died when the tower in Siloam fell on them? Were they the worst sinners in Jerusalem?
  - type: text
    content: ' '
  '5':
  - type: text
    content: No, and I tell you again that unless you repent, you will perish, too.”
  - type: heading
    content: Parable of the Barren Fig Tree
  '6':
  - type: text
    content: 'Then Jesus told this story: '
  - type: text
    content: “A man planted a fig tree in his garden and came again and again to see if there was any fruit on it, but he was always disappointed.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Finally, he said to his gardener, ‘I’ve waited three years, and there hasn’t been a single fig! Cut it down. It’s just taking up space in the garden.’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “The gardener answered, ‘Sir, give it one more chance. Leave it another year, and I’ll give it special attention and plenty of fertilizer.
  - type: text
    content: ' '
  '9':
  - type: text
    content: If we get figs next year, fine. If not, then you can cut it down.’”
  - type: heading
    content: Jesus Heals on the Sabbath
