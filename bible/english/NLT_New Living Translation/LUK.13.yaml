document_id: LUK.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Repentance
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'About this time Jesus was informed that Pilate had murdered some people from Galilee as they were offering sacrifices at the Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Do you think those Galileans were worse sinners than all the other people from Galilee?” '
  - type: text
    text: 'Jesus asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Is that why they suffered?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Not at all! And you will perish, too, unless you repent of your sins and turn to God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what about the eighteen people who died when the tower in Siloam fell on them? Were they the worst sinners in Jerusalem?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No, and I tell you again that unless you repent, you will perish, too.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Barren Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Jesus told this story: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A man planted a fig tree in his garden and came again and again to see if there was any fruit on it, but he was always disappointed.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Finally, he said to his gardener, ‘I’ve waited three years, and there hasn’t been a single fig! Cut it down. It’s just taking up space in the garden.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The gardener answered, ‘Sir, give it one more chance. Leave it another year, and I’ll give it special attention and plenty of fertilizer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If we get figs next year, fine. If not, then you can cut it down.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals on the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'One Sabbath day as Jesus was teaching in a synagogue, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'he saw a woman who had been crippled by an evil spirit. She had been bent double for eighteen years and was unable to stand up straight. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Jesus saw her, he called her over and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Dear woman, you are healed of your sickness!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then he touched her, and instantly she could stand straight. How she praised God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the leader in charge of the synagogue was indignant that Jesus had healed her on the Sabbath day. “There are six days of the week for working,” he said to the crowd. “Come on those days to be healed, not on the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Lord replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You hypocrites! Each of you works on the Sabbath day! Don’t you untie your ox or your donkey from its stall on the Sabbath and lead it out for water?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This dear woman, a daughter of Abraham, has been held in bondage by Satan for eighteen years. Isn’t it right that she be released, even on the Sabbath?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: This shamed his enemies, but all the people rejoiced at the wonderful things he did.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Mustard Seed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is the Kingdom of God like? How can I illustrate it?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like a tiny mustard seed that a man planted in a garden; it grows and becomes a tree, and the birds make nests in its branches.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Yeast
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He also asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What else is the Kingdom of God like?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like the yeast a woman used in making bread. Even though she put only a little yeast in three measures of flour, it permeated every part of the dough.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Narrow Door
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus went through the towns and villages, teaching as he went, always pressing on toward Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Someone asked him, “Lord, will only a few be saved?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Work hard to enter the narrow door to God’s Kingdom, for many will try to enter but will fail.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the master of the house has locked the door, it will be too late. You will stand outside knocking and pleading, ‘Lord, open the door for us!’ But he will reply, ‘I don’t know you or where you come from.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then you will say, ‘But we ate and drank with you, and you taught in our streets.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he will reply, ‘I tell you, I don’t know you or where you come from. Get away from me, all you who do evil.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There will be weeping and gnashing of teeth, for you will see Abraham, Isaac, Jacob, and all the prophets in the Kingdom of God, but you will be thrown out.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And people will come from all over the world—from east and west, north and south—to take their places in the Kingdom of God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And note this: Some who seem least important now will be the greatest then, and some who are the greatest now will be least important then.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Some are last who will be first, and some are first who will be last.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Grieves over Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: At that time some Pharisees said to him, “Get away from here if you want to live! Herod Antipas wants to kill you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go tell that fox that I will keep on casting out demons and healing people today and tomorrow; and the third day I will accomplish my purpose.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yes, today, tomorrow, and the next day I must proceed on my way. For it wouldn’t do for a prophet of God to be killed except in Jerusalem!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “O Jerusalem, Jerusalem, the city that kills the prophets and stones God’s messengers! How often I have wanted to gather your children together as a hen protects her chicks beneath her wings, but you wouldn’t let me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And now, look, your house is abandoned. And you will never see me again until you say, ‘Blessings on the one who comes in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118:26.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
