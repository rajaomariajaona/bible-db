type_code: eng
verses:
  '1':
  - type: heading
    content: Sorrow in Jerusalem
  - type: note
    content: Each of the first four chapters of this book is an acrostic, laid out in the order of the Hebrew alphabet. The first word of each verse begins with a successive Hebrew letter. Chapters 1, 2, and 4 have one verse for each of the 22 Hebrew letters. Chapter 3 contains 22 stanzas of three verses each. Though chapter 5 has 22 verses, it is not an acrostic.
  - type: text
    content: Jerusalem, once so full of people,
  - type: text
    content: is now deserted.
  - type: text
    content: She who was once great among the nations
  - type: text
    content: now sits alone like a widow.
  - type: text
    content: Once the queen of all the earth,
  - type: text
    content: she is now a slave.
  '10':
  - type: text
    content: The enemy has plundered her completely,
  - type: text
    content: taking every precious thing she owns.
  - type: text
    content: She has seen foreigners violate her sacred Temple,
  - type: text
    content: 'the place the '
  - type: text
    content: Lord
  - type: text
    content: ' had forbidden them to enter.'
  '11':
  - type: text
    content: Her people groan as they search for bread.
  - type: text
    content: They have sold their treasures for food to stay alive.
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', look,” she mourns,'
  - type: text
    content: “and see how I am despised.
  '12':
  - type: text
    content: “Does it mean nothing to you, all you who pass by?
  - type: text
    content: Look around and see if there is any suffering like mine,
  - type: text
    content: 'which the '
  - type: text
    content: Lord
  - type: text
    content: ' brought on me'
  - type: text
    content: when he erupted in fierce anger.
  '13':
  - type: text
    content: “He has sent fire from heaven that burns in my bones.
  - type: text
    content: He has placed a trap in my path and turned me back.
  - type: text
    content: He has left me devastated,
  - type: text
    content: racked with sickness all day long.
  '14':
  - type: text
    content: “He wove my sins into ropes
  - type: text
    content: to hitch me to a yoke of captivity.
  - type: text
    content: The Lord sapped my strength and turned me over to my enemies;
  - type: text
    content: I am helpless in their hands.
  '15':
  - type: text
    content: “The Lord has treated my mighty men
  - type: text
    content: with contempt.
  - type: text
    content: At his command a great army has come
  - type: text
    content: to crush my young warriors.
  - type: text
    content: The Lord has trampled his beloved city
  - type: note
    content: Hebrew the virgin daughter of Judah.
  - type: text
    content: like grapes are trampled in a winepress.
  '16':
  - type: text
    content: “For all these things I weep;
  - type: text
    content: tears flow down my cheeks.
  - type: text
    content: No one is here to comfort me;
  - type: text
    content: any who might encourage me are far away.
  - type: text
    content: My children have no future,
  - type: text
    content: for the enemy has conquered us.”
  '17':
  - type: text
    content: Jerusalem reaches out for help,
  - type: text
    content: but no one comforts her.
  - type: text
    content: Regarding his people Israel,
  - type: note
    content: Hebrew Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has said,'
  - type: text
    content: “Let their neighbors be their enemies!
  - type: text
    content: Let them be thrown away like a filthy rag!”
  '18':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is right,” Jerusalem says,'
  - type: text
    content: “for I rebelled against him.
  - type: text
    content: Listen, people everywhere;
  - type: text
    content: look upon my anguish and despair,
  - type: text
    content: for my sons and daughters
  - type: text
    content: have been taken captive to distant lands.
  '19':
  - type: text
    content: “I begged my allies for help,
  - type: text
    content: but they betrayed me.
  - type: text
    content: My priests and leaders
  - type: text
    content: starved to death in the city,
  - type: text
    content: even as they searched for food
  - type: text
    content: to save their lives.
  '2':
  - type: text
    content: She sobs through the night;
  - type: text
    content: tears stream down her cheeks.
  - type: text
    content: Among all her lovers,
  - type: text
    content: there is no one left to comfort her.
  - type: text
    content: All her friends have betrayed her
  - type: text
    content: and become her enemies.
  '20':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', see my anguish!'
  - type: text
    content: My heart is broken
  - type: text
    content: and my soul despairs,
  - type: text
    content: for I have rebelled against you.
  - type: text
    content: In the streets the sword kills,
  - type: text
    content: and at home there is only death.
  '21':
  - type: text
    content: “Others heard my groans,
  - type: text
    content: but no one turned to comfort me.
  - type: text
    content: When my enemies heard about my troubles,
  - type: text
    content: they were happy to see what you had done.
  - type: text
    content: Oh, bring the day you promised,
  - type: text
    content: when they will suffer as I have suffered.
  '22':
  - type: text
    content: '“Look at all their evil deeds, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Punish them,
  - type: text
    content: as you have punished me
  - type: text
    content: for all my sins.
  - type: text
    content: My groans are many,
  - type: text
    content: and I am sick at heart.”
  '3':
  - type: text
    content: Judah has been led away into captivity,
  - type: text
    content: oppressed with cruel slavery.
  - type: text
    content: She lives among foreign nations
  - type: text
    content: and has no place of rest.
  - type: text
    content: Her enemies have chased her down,
  - type: text
    content: and she has nowhere to turn.
  '4':
  - type: text
    content: The roads to Jerusalem
  - type: note
    content: Hebrew Zion; also in 1:17.
  - type: text
    content: ' are in mourning,'
  - type: text
    content: for crowds no longer come to celebrate the festivals.
  - type: text
    content: The city gates are silent,
  - type: text
    content: her priests groan,
  - type: text
    content: her young women are crying—
  - type: text
    content: how bitter is her fate!
  '5':
  - type: text
    content: Her oppressors have become her masters,
  - type: text
    content: and her enemies prosper,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has punished Jerusalem'
  - type: text
    content: for her many sins.
  - type: text
    content: Her children have been captured
  - type: text
    content: and taken away to distant lands.
  '6':
  - type: text
    content: All the majesty of beautiful Jerusalem
  - type: note
    content: Hebrew of the daughter of Zion.
  - type: text
    content: has been stripped away.
  - type: text
    content: Her princes are like starving deer
  - type: text
    content: searching for pasture.
  - type: text
    content: They are too weak to run
  - type: text
    content: from the pursuing enemy.
  '7':
  - type: text
    content: In the midst of her sadness and wandering,
  - type: text
    content: Jerusalem remembers her ancient splendor.
  - type: text
    content: But now she has fallen to her enemy,
  - type: text
    content: and there is no one to help her.
  - type: text
    content: Her enemy struck her down
  - type: text
    content: and laughed as she fell.
  '8':
  - type: text
    content: Jerusalem has sinned greatly,
  - type: text
    content: so she has been tossed away like a filthy rag.
  - type: text
    content: All who once honored her now despise her,
  - type: text
    content: for they have seen her stripped naked and humiliated.
  - type: text
    content: All she can do is groan
  - type: text
    content: and hide her face.
  '9':
  - type: text
    content: She defiled herself with immorality
  - type: text
    content: and gave no thought to her future.
  - type: text
    content: Now she lies in the gutter
  - type: text
    content: with no one to lift her out.
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', see my misery,” she cries.'
  - type: text
    content: “The enemy has triumphed.”
