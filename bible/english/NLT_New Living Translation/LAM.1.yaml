document_id: LAM.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sorrow in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Each of the first four chapters of this book is an acrostic, laid out in the order of the Hebrew alphabet. The first word of each verse begins with a successive Hebrew letter. Chapters 1, 2, and 4 have one verse for each of the 22 Hebrew letters. Chapter 3 contains 22 stanzas of three verses each. Though chapter 5 has 22 verses, it is not an acrostic.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jerusalem, once so full of people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is now deserted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She who was once great among the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: now sits alone like a widow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Once the queen of all the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she is now a slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She sobs through the night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: tears stream down her cheeks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among all her lovers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one left to comfort her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All her friends have betrayed her
- type: usfm
  marker: q2
  children:
  - type: text
    text: and become her enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Judah has been led away into captivity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oppressed with cruel slavery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She lives among foreign nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has no place of rest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her enemies have chased her down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and she has nowhere to turn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The roads to Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:17.
    marker-yv: yv-n
  - type: text
    text: ' are in mourning,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for crowds no longer come to celebrate the festivals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city gates are silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her priests groan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: her young women are crying—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how bitter is her fate!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Her oppressors have become her masters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her enemies prosper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has punished Jerusalem'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for her many sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her children have been captured
- type: usfm
  marker: q2
  children:
  - type: text
    text: and taken away to distant lands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All the majesty of beautiful Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the daughter of Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: has been stripped away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her princes are like starving deer
- type: usfm
  marker: q2
  children:
  - type: text
    text: searching for pasture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are too weak to run
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the pursuing enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In the midst of her sadness and wandering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem remembers her ancient splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now she has fallen to her enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is no one to help her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her enemy struck her down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and laughed as she fell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerusalem has sinned greatly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so she has been tossed away like a filthy rag.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who once honored her now despise her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they have seen her stripped naked and humiliated.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All she can do is groan
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hide her face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: She defiled herself with immorality
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave no thought to her future.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now she lies in the gutter
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one to lift her out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', see my misery,” she cries.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “The enemy has triumphed.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The enemy has plundered her completely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking every precious thing she owns.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has seen foreigners violate her sacred Temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the place the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had forbidden them to enter.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Her people groan as they search for bread.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have sold their treasures for food to stay alive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', look,” she mourns,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and see how I am despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Does it mean nothing to you, all you who pass by?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look around and see if there is any suffering like mine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought on me'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he erupted in fierce anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “He has sent fire from heaven that burns in my bones.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has placed a trap in my path and turned me back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has left me devastated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: racked with sickness all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “He wove my sins into ropes
- type: usfm
  marker: q2
  children:
  - type: text
    text: to hitch me to a yoke of captivity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord sapped my strength and turned me over to my enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am helpless in their hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “The Lord has treated my mighty men
- type: usfm
  marker: q2
  children:
  - type: text
    text: with contempt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At his command a great army has come
- type: usfm
  marker: q2
  children:
  - type: text
    text: to crush my young warriors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord has trampled his beloved city
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the virgin daughter of Judah.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: like grapes are trampled in a winepress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “For all these things I weep;
- type: usfm
  marker: q2
  children:
  - type: text
    text: tears flow down my cheeks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one is here to comfort me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: any who might encourage me are far away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My children have no future,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the enemy has conquered us.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jerusalem reaches out for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one comforts her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarding his people Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let their neighbors be their enemies!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them be thrown away like a filthy rag!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is right,” Jerusalem says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “for I rebelled against him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen, people everywhere;
- type: usfm
  marker: q2
  children:
  - type: text
    text: look upon my anguish and despair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for my sons and daughters
- type: usfm
  marker: q2
  children:
  - type: text
    text: have been taken captive to distant lands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “I begged my allies for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they betrayed me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My priests and leaders
- type: usfm
  marker: q2
  children:
  - type: text
    text: starved to death in the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even as they searched for food
- type: usfm
  marker: q2
  children:
  - type: text
    text: to save their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', see my anguish!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart is broken
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my soul despairs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have rebelled against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the streets the sword kills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and at home there is only death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Others heard my groans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one turned to comfort me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When my enemies heard about my troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were happy to see what you had done.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, bring the day you promised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they will suffer as I have suffered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Look at all their evil deeds, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Punish them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you have punished me
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all my sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My groans are many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am sick at heart.”
