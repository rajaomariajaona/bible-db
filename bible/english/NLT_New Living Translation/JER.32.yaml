document_id: JER.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Land Purchase
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The following message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the tenth year of the reign of Zedekiah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The tenth year of Zedekiah’s reign and the eighteenth year of Nebuchadnezzar’s reign was 587 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' king of Judah. This was also the eighteenth year of the reign of King Nebuchadnezzar.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 32:28.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jerusalem was then under siege from the Babylonian army, and Jeremiah was imprisoned in the courtyard of the guard in the royal palace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'King Zedekiah had put him there, asking why he kept giving this prophecy: “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘I am about to hand this city over to the king of Babylon, and he will take it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: King Zedekiah will be captured by the Babylonians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 32:5, 24, 25, 28, 29, 43.
    marker-yv: yv-n
  - type: text
    text: ' and taken to meet the king of Babylon face to face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He will take Zedekiah to Babylon, and I will deal with him there,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . ‘If you fight against the Babylonians, you will never succeed.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent me a message. He said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Your cousin Hanamel son of Shallum will come and say to you, ‘Buy my field at Anathoth. By law you have the right to buy it before it is offered to anyone else.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said he would, my cousin Hanamel came and visited me in the prison. He said, “Please buy my field at Anathoth in the land of Benjamin. By law you have the right to buy it before it is offered to anyone else, so buy it for yourself.” Then I knew that the message I had heard was from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So I bought the field at Anathoth, paying Hanamel seventeen pieces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '17 shekels, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 7 ounces or 194 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' of silver for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I signed and sealed the deed of purchase before witnesses, weighed out the silver, and paid him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I took the sealed deed and an unsealed copy of the deed, which contained the terms and conditions of the purchase, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and I handed them to Baruch son of Neriah and grandson of Mahseiah. I did all this in the presence of my cousin Hanamel, the witnesses who had signed the deed, and all the men of Judah who were there in the courtyard of the guardhouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I said to Baruch as they all listened, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘Take both this sealed deed and the unsealed copy, and put them into a pottery jar to preserve them for a long time.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘Someday people will again own property here in this land and will buy and sell houses and vineyards and fields.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then after I had given the papers to Baruch, I prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! You made the heavens and earth by your strong hand and powerful arm. Nothing is too hard for you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You show unfailing love to thousands, but you also bring the consequences of one generation’s sin upon the next. You are the great and powerful God, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You have all wisdom and do great and mighty miracles. You see the conduct of all people, and you give them what they deserve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You performed miraculous signs and wonders in the land of Egypt—things still remembered to this day! And you have continued to do great miracles in Israel and all around the world. You have made your name famous to this day.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You brought Israel out of Egypt with mighty signs and wonders, with a strong hand and powerful arm, and with overwhelming terror. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You gave the people of Israel this land that you had promised their ancestors long before—a land flowing with milk and honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Our ancestors came and conquered it and lived in it, but they refused to obey you or follow your word. They have not done anything you commanded. That is why you have sent this terrible disaster upon them.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“See how the siege ramps have been built against the city walls! Through war, famine, and disease, the city will be handed over to the Babylonians, who will conquer it. Everything has happened just as you said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And yet, O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have told me to buy the field—paying good money for it before these witnesses—even though the city will soon be handed over to the Babylonians.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prediction of Jerusalem’s Fall
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then this message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of all the peoples of the world. Is anything too hard for me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will hand this city over to the Babylonians and to Nebuchadnezzar, king of Babylon, and he will capture it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The Babylonians outside the walls will come in and set fire to the city. They will burn down all these houses where the people provoked my anger by burning incense to Baal on the rooftops and by pouring out liquid offerings to other gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Israel and Judah have done nothing but wrong since their earliest days. They have infuriated me with all their evil deeds,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “From the time this city was built until now, it has done nothing but anger me, so I am determined to get rid of it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“The sins of Israel and Judah—the sins of the people of Jerusalem, the kings, the officials, the priests, and the prophets—have stirred up my anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'My people have turned their backs on me and have refused to return. Even though I diligently taught them, they would not receive instruction or obey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'They have set up their abominable idols right in my own Temple, defiling it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: They have built pagan shrines to Baal in the valley of Ben-Hinnom, and there they sacrifice their sons and daughters to Molech. I have never commanded such a horrible deed; it never even crossed my mind to command such a thing. What an incredible evil, causing Judah to sin so greatly!
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Promise of Restoration
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“Now I want to say something more about this city. You have been saying, ‘It will fall to the king of Babylon through war, famine, and disease.’ But this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'I will certainly bring my people back again from all the countries where I will scatter them in my fury. I will bring them back to this very city and let them live in peace and safety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'They will be my people, and I will be their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And I will give them one heart and one purpose: to worship me forever, for their own good and for the good of all their descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And I will make an everlasting covenant with them: I will never stop doing good for them. I will put a desire in their hearts to worship me, and they will never leave me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: I will find joy doing good for them and will faithfully and wholeheartedly replant them in this land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Just as I have brought all these calamities on them, so I will do all the good I have promised them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fields will again be bought and sold in this land about which you now say, ‘It has been ravaged by the Babylonians, a desolate land where people and animals have all disappeared.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Yes, fields will once again be bought and sold—deeds signed and sealed and witnessed—in the land of Benjamin and here in Jerusalem, in the towns of Judah and in the hill country, in the foothills of Judah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' and in the Negev, too. For someday I will restore prosperity to them. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
