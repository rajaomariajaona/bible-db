document_id: JER.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Land Purchase
  - type: text
    content: 'The following message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' in the tenth year of the reign of Zedekiah,'
  - type: note
    content: The tenth year of Zedekiah’s reign and the eighteenth year of Nebuchadnezzar’s reign was 587 b.c.
  - type: text
    content: ' king of Judah. This was also the eighteenth year of the reign of King Nebuchadnezzar.'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 32:28.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'I signed and sealed the deed of purchase before witnesses, weighed out the silver, and paid him. '
  '11':
  - type: text
    content: 'Then I took the sealed deed and an unsealed copy of the deed, which contained the terms and conditions of the purchase, '
  '12':
  - type: text
    content: and I handed them to Baruch son of Neriah and grandson of Mahseiah. I did all this in the presence of my cousin Hanamel, the witnesses who had signed the deed, and all the men of Judah who were there in the courtyard of the guardhouse.
  '13':
  - type: text
    content: 'Then I said to Baruch as they all listened, '
  '14':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘Take both this sealed deed and the unsealed copy, and put them into a pottery jar to preserve them for a long time.’ '
  '15':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘Someday people will again own property here in this land and will buy and sell houses and vineyards and fields.’”'
  - type: heading
    content: Jeremiah’s Prayer
  '16':
  - type: text
    content: 'Then after I had given the papers to Baruch, I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '17':
  - type: text
    content: '“O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! You made the heavens and earth by your strong hand and powerful arm. Nothing is too hard for you! '
  '18':
  - type: text
    content: 'You show unfailing love to thousands, but you also bring the consequences of one generation’s sin upon the next. You are the great and powerful God, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '19':
  - type: text
    content: 'You have all wisdom and do great and mighty miracles. You see the conduct of all people, and you give them what they deserve. '
  '2':
  - type: text
    content: 'Jerusalem was then under siege from the Babylonian army, and Jeremiah was imprisoned in the courtyard of the guard in the royal palace. '
  '20':
  - type: text
    content: You performed miraculous signs and wonders in the land of Egypt—things still remembered to this day! And you have continued to do great miracles in Israel and all around the world. You have made your name famous to this day.
  '21':
  - type: text
    content: '“You brought Israel out of Egypt with mighty signs and wonders, with a strong hand and powerful arm, and with overwhelming terror. '
  '22':
  - type: text
    content: 'You gave the people of Israel this land that you had promised their ancestors long before—a land flowing with milk and honey. '
  '23':
  - type: text
    content: Our ancestors came and conquered it and lived in it, but they refused to obey you or follow your word. They have not done anything you commanded. That is why you have sent this terrible disaster upon them.
  '24':
  - type: text
    content: '“See how the siege ramps have been built against the city walls! Through war, famine, and disease, the city will be handed over to the Babylonians, who will conquer it. Everything has happened just as you said. '
  '25':
  - type: text
    content: 'And yet, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you have told me to buy the field—paying good money for it before these witnesses—even though the city will soon be handed over to the Babylonians.”'
  - type: heading
    content: A Prediction of Jerusalem’s Fall
  '26':
  - type: text
    content: 'Then this message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '27':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of all the peoples of the world. Is anything too hard for me? '
  '28':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will hand this city over to the Babylonians and to Nebuchadnezzar, king of Babylon, and he will capture it. '
  '29':
  - type: text
    content: 'The Babylonians outside the walls will come in and set fire to the city. They will burn down all these houses where the people provoked my anger by burning incense to Baal on the rooftops and by pouring out liquid offerings to other gods. '
  '3':
  - type: text
    content: 'King Zedekiah had put him there, asking why he kept giving this prophecy: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I am about to hand this city over to the king of Babylon, and he will take it. '
  '30':
  - type: text
    content: 'Israel and Judah have done nothing but wrong since their earliest days. They have infuriated me with all their evil deeds,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: “From the time this city was built until now, it has done nothing but anger me, so I am determined to get rid of it.
  '32':
  - type: text
    content: '“The sins of Israel and Judah—the sins of the people of Jerusalem, the kings, the officials, the priests, and the prophets—have stirred up my anger. '
  '33':
  - type: text
    content: 'My people have turned their backs on me and have refused to return. Even though I diligently taught them, they would not receive instruction or obey. '
  '34':
  - type: text
    content: 'They have set up their abominable idols right in my own Temple, defiling it. '
  '35':
  - type: text
    content: They have built pagan shrines to Baal in the valley of Ben-Hinnom, and there they sacrifice their sons and daughters to Molech. I have never commanded such a horrible deed; it never even crossed my mind to command such a thing. What an incredible evil, causing Judah to sin so greatly!
  - type: heading
    content: A Promise of Restoration
  '36':
  - type: text
    content: '“Now I want to say something more about this city. You have been saying, ‘It will fall to the king of Babylon through war, famine, and disease.’ But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: '
  '37':
  - type: text
    content: 'I will certainly bring my people back again from all the countries where I will scatter them in my fury. I will bring them back to this very city and let them live in peace and safety. '
  '38':
  - type: text
    content: 'They will be my people, and I will be their God. '
  '39':
  - type: text
    content: 'And I will give them one heart and one purpose: to worship me forever, for their own good and for the good of all their descendants. '
  '4':
  - type: text
    content: King Zedekiah will be captured by the Babylonians
  - type: note
    content: Or Chaldeans; also in 32:5, 24, 25, 28, 29, 43.
  - type: text
    content: ' and taken to meet the king of Babylon face to face. '
  '40':
  - type: text
    content: 'And I will make an everlasting covenant with them: I will never stop doing good for them. I will put a desire in their hearts to worship me, and they will never leave me. '
  '41':
  - type: text
    content: I will find joy doing good for them and will faithfully and wholeheartedly replant them in this land.
  '42':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Just as I have brought all these calamities on them, so I will do all the good I have promised them. '
  '43':
  - type: text
    content: 'Fields will again be bought and sold in this land about which you now say, ‘It has been ravaged by the Babylonians, a desolate land where people and animals have all disappeared.’ '
  '44':
  - type: text
    content: Yes, fields will once again be bought and sold—deeds signed and sealed and witnessed—in the land of Benjamin and here in Jerusalem, in the towns of Judah and in the hill country, in the foothills of Judah
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' and in the Negev, too. For someday I will restore prosperity to them. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '5':
  - type: text
    content: 'He will take Zedekiah to Babylon, and I will deal with him there,’ says the '
  - type: text
    content: Lord
  - type: text
    content: . ‘If you fight against the Babylonians, you will never succeed.’”
  '6':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' sent me a message. He said, '
  '7':
  - type: text
    content: “Your cousin Hanamel son of Shallum will come and say to you, ‘Buy my field at Anathoth. By law you have the right to buy it before it is offered to anyone else.’”
  '8':
  - type: text
    content: 'Then, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said he would, my cousin Hanamel came and visited me in the prison. He said, “Please buy my field at Anathoth in the land of Benjamin. By law you have the right to buy it before it is offered to anyone else, so buy it for yourself.” Then I knew that the message I had heard was from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: So I bought the field at Anathoth, paying Hanamel seventeen pieces
  - type: note
    content: Hebrew 17 shekels, about 7 ounces or 194 grams in weight.
  - type: text
    content: ' of silver for it. '
