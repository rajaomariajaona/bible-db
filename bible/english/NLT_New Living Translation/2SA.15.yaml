document_id: 2SA.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Absalom’s Rebellion
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After this, Absalom bought a chariot and horses, and he hired fifty bodyguards to run ahead of him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But while he was there, he sent secret messengers to all the tribes of Israel to stir up a rebellion against the king. “As soon as you hear the ram’s horn,” his message read, “you are to say, ‘Absalom has been crowned king in Hebron.’” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took 200 men from Jerusalem with him as guests, but they knew nothing of his intentions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While Absalom was offering the sacrifices, he sent for Ahithophel, one of David’s counselors who lived in Giloh. Soon many others also joined Absalom, and the conspiracy gained momentum.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Escapes from Jerusalem
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A messenger soon arrived in Jerusalem to tell David, “All Israel has joined Absalom in a conspiracy against you!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then we must flee at once, or it will be too late!” David urged his men. “Hurry! If we get out of the city before Absalom arrives, both we and the city of Jerusalem will be spared from disaster.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We are with you,” his advisers replied. “Do what you think is best.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king and all his household set out at once. He left no one behind except ten of his concubines to look after the palace. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king and all his people set out on foot, pausing at the last house '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to let all the king’s men move past to lead the way. There were 600 men from Gath who had come with David, along with the king’s bodyguard.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Kerethites and Pelethites.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king turned and said to Ittai, a leader of the men from Gath, “Why are you coming with us? Go on back to King Absalom, for you are a guest in Israel, a foreigner in exile. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He got up early every morning and went out to the gate of the city. When people brought a case to the king for judgment, Absalom would ask where in Israel they were from, and they would tell him their tribe. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You arrived only recently, and should I force you today to wander with us? I don’t even know where we will go. Go on back and take your kinsmen with you, and may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' show you his unfailing love and faithfulness.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and may unfailing love and faithfulness go with you.
      marker-yv: yv-n
    - type: text
      text: ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Ittai said to the king, “I vow by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and by your own life that I will go wherever my lord the king goes, no matter what happens—whether it means life or death.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David replied, “All right, come with us.” So Ittai and all his men and their families went along.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone cried loudly as the king and his followers passed by. They crossed the Kidron Valley and then went out toward the wilderness.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zadok and all the Levites also came along, carrying the Ark of the Covenant of God. They set down the Ark of God, and Abiathar offered sacrifices
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abiathar went up.
      marker-yv: yv-n
    - type: text
      text: ' until everyone had passed out of the city.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king instructed Zadok to take the Ark of God back into the city. “If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sees fit,” David said, “he will bring me back to see the Ark and the Tabernacle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and his dwelling place.
      marker-yv: yv-n
    - type: text
      text: ' again. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if he is through with me, then let him do what seems best to him.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king also told Zadok the priest, “Look,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Are you a seer? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Do you see?
      marker-yv: yv-n
    - type: text
      text: ' here is my plan. You and Abiathar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and Abiathar; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 15:29.
      marker-yv: yv-n
    - type: text
      text: ' should return quietly to the city with your son Ahimaaz and Abiathar’s son Jonathan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will stop at the shallows of the Jordan River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: at the crossing points of the wilderness.
      marker-yv: yv-n
    - type: text
      text: ' and wait there for a report from you.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Zadok and Abiathar took the Ark of God back to the city and stayed there.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Absalom would say, “You’ve really got a strong case here! It’s too bad the king doesn’t have anyone to hear it. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David walked up the road to the Mount of Olives, weeping as he went. His head was covered and his feet were bare as a sign of mourning. And the people who were with him covered their heads and wept as they climbed the hill. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When someone told David that his adviser Ahithophel was now backing Absalom, David prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', let Ahithophel give Absalom foolish advice!”'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David reached the summit of the Mount of Olives where people worshiped God, Hushai the Arkite was waiting there for him. Hushai had torn his clothing and put dirt on his head as a sign of mourning. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David told him, “If you go with me, you will only be a burden. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Return to Jerusalem and tell Absalom, ‘I will now be your adviser, O king, just as I was your father’s adviser in the past.’ Then you can frustrate and counter Ahithophel’s advice. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zadok and Abiathar, the priests, will be there. Tell them about the plans being made in the king’s palace, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they will send their sons Ahimaaz and Jonathan to tell me what is going on.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David’s friend Hushai returned to Jerusalem, getting there just as Absalom arrived.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I wish I were the judge. Then everyone could bring their cases to me for judgment, and I would give them justice!”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When people tried to bow before him, Absalom wouldn’t let them. Instead, he took them by the hand and kissed them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Absalom did this with everyone who came to the king for judgment, and so he stole the hearts of all the people of Israel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After four years,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forty years.
      marker-yv: yv-n
    - type: text
      text: ' Absalom said to the king, “Let me go to Hebron to offer a sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and fulfill a vow I made to him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For while your servant was at Geshur in Aram, I promised to sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Hebron'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts; Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Hebron.
      marker-yv: yv-n
    - type: text
      text: ' if he would bring me back to Jerusalem.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” the king told him. “Go and fulfill your vow.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Absalom went to Hebron. '
