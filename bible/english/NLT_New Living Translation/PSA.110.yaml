document_id: PSA.110,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: note
    content: Or my lord.
  - type: text
    content: “Sit in the place of honor at my right hand
  - type: text
    content: until I humble your enemies,
  - type: text
    content: making them a footstool under your feet.”
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will extend your powerful kingdom from Jerusalem'
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ;
  - type: text
    content: you will rule over your enemies.
  '3':
  - type: text
    content: When you go to war,
  - type: text
    content: your people will serve you willingly.
  - type: text
    content: You are arrayed in holy garments,
  - type: text
    content: and your strength will be renewed each day like the morning dew.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has taken an oath and will not break his vow:'
  - type: text
    content: “You are a priest forever in the order of Melchizedek.”
  '5':
  - type: text
    content: The Lord stands at your right hand to protect you.
  - type: text
    content: He will strike down many kings when his anger erupts.
  '6':
  - type: text
    content: He will punish the nations
  - type: text
    content: and fill their lands with corpses;
  - type: text
    content: he will shatter heads over the whole earth.
  '7':
  - type: text
    content: But he himself will be refreshed from brooks along the way.
  - type: text
    content: He will be victorious.
