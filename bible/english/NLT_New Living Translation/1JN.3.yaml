document_id: 1JN.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'See how very much our Father loves us, for he calls us his children, and that is what we are! But the people who belong to this world don’t recognize that we are God’s children because they don’t know him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dear friends, we are already God’s children, but he has not yet shown us what we will be like when Christ appears. But we do know that we will be like him, for we will see him as he really is. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And all who have this eager expectation will keep themselves pure, just as he is pure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Everyone who sins is breaking God’s law, for all sin is contrary to the law of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And you know that Jesus came to take away our sins, and there is no sin in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Anyone who continues to live in him will not sin. But anyone who keeps on sinning does not know him or understand who he is.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dear children, don’t let anyone deceive you about this: When people do what is right, it shows that they are righteous, even as Christ is righteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But when people keep on sinning, it shows that they belong to the devil, who has been sinning since the beginning. But the Son of God came to destroy the works of the devil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Those who have been born into God’s family do not make a practice of sinning, because God’s life
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: because his seed.
    marker-yv: yv-n
  - type: text
    text: ' is in them. So they can’t keep on sinning, because they are children of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So now we can tell who are children of God and who are children of the devil. Anyone who does not live righteously and does not love other believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: does not love his brother.
    marker-yv: yv-n
  - type: text
    text: ' does not belong to God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love One Another
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is the message you have heard from the beginning: We should love one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We must not be like Cain, who belonged to the evil one and killed his brother. And why did he kill him? Because Cain had been doing what was evil, and his brother had been doing what was righteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So don’t be surprised, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' if the world hates you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If we love our brothers and sisters who are believers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 3:16.
    marker-yv: yv-n
  - type: text
    text: ' it proves that we have passed from death to life. But a person who has no love is still dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Anyone who hates another brother or sister
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hates his brother.
    marker-yv: yv-n
  - type: text
    text: ' is really a murderer at heart. And you know that murderers don’t have eternal life within them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'We know what real love is because Jesus gave up his life for us. So we also ought to give up our lives for our brothers and sisters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If someone has enough money to live well and sees a brother or sister
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sees his brother.
    marker-yv: yv-n
  - type: text
    text: ' in need but shows no compassion—how can God’s love be in that person?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dear children, let’s not merely say that we love each other; let us show the truth by our actions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Our actions will show that we belong to the truth, so we will be confident when we stand before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Even if we feel guilty, God is greater than our feelings, and he knows everything.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dear friends, if we don’t feel guilty, we can come to God with bold confidence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And we will receive from him whatever we ask because we obey him and do the things that please him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And this is his commandment: We must believe in the name of his Son, Jesus Christ, and love one another, just as he commanded us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Those who obey God’s commandments remain in fellowship with him, and he with them. And we know he lives in us because the Spirit he gave us lives in us.
