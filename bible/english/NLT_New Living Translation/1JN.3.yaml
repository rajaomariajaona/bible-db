document_id: 1JN.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'See how very much our Father loves us, for he calls us his children, and that is what we are! But the people who belong to this world don’t recognize that we are God’s children because they don’t know him. '
  '10':
  - type: text
    content: So now we can tell who are children of God and who are children of the devil. Anyone who does not live righteously and does not love other believers
  - type: note
    content: Greek does not love his brother.
  - type: text
    content: ' does not belong to God.'
  - type: heading
    content: Love One Another
  '11':
  - type: text
    content: 'This is the message you have heard from the beginning: We should love one another. '
  '12':
  - type: text
    content: 'We must not be like Cain, who belonged to the evil one and killed his brother. And why did he kill him? Because Cain had been doing what was evil, and his brother had been doing what was righteous. '
  '13':
  - type: text
    content: So don’t be surprised, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' if the world hates you.'
  '14':
  - type: text
    content: If we love our brothers and sisters who are believers,
  - type: note
    content: Greek the brothers; similarly in 3:16.
  - type: text
    content: ' it proves that we have passed from death to life. But a person who has no love is still dead. '
  '15':
  - type: text
    content: Anyone who hates another brother or sister
  - type: note
    content: Greek hates his brother.
  - type: text
    content: ' is really a murderer at heart. And you know that murderers don’t have eternal life within them.'
  '16':
  - type: text
    content: 'We know what real love is because Jesus gave up his life for us. So we also ought to give up our lives for our brothers and sisters. '
  '17':
  - type: text
    content: If someone has enough money to live well and sees a brother or sister
  - type: note
    content: Greek sees his brother.
  - type: text
    content: ' in need but shows no compassion—how can God’s love be in that person?'
  '18':
  - type: text
    content: 'Dear children, let’s not merely say that we love each other; let us show the truth by our actions. '
  '19':
  - type: text
    content: 'Our actions will show that we belong to the truth, so we will be confident when we stand before God. '
  '2':
  - type: text
    content: 'Dear friends, we are already God’s children, but he has not yet shown us what we will be like when Christ appears. But we do know that we will be like him, for we will see him as he really is. '
  '20':
  - type: text
    content: Even if we feel guilty, God is greater than our feelings, and he knows everything.
  '21':
  - type: text
    content: 'Dear friends, if we don’t feel guilty, we can come to God with bold confidence. '
  '22':
  - type: text
    content: And we will receive from him whatever we ask because we obey him and do the things that please him.
  '23':
  - type: text
    content: 'And this is his commandment: We must believe in the name of his Son, Jesus Christ, and love one another, just as he commanded us. '
  '24':
  - type: text
    content: Those who obey God’s commandments remain in fellowship with him, and he with them. And we know he lives in us because the Spirit he gave us lives in us.
  '3':
  - type: text
    content: And all who have this eager expectation will keep themselves pure, just as he is pure.
  '4':
  - type: text
    content: 'Everyone who sins is breaking God’s law, for all sin is contrary to the law of God. '
  '5':
  - type: text
    content: 'And you know that Jesus came to take away our sins, and there is no sin in him. '
  '6':
  - type: text
    content: Anyone who continues to live in him will not sin. But anyone who keeps on sinning does not know him or understand who he is.
  '7':
  - type: text
    content: 'Dear children, don’t let anyone deceive you about this: When people do what is right, it shows that they are righteous, even as Christ is righteous. '
  '8':
  - type: text
    content: 'But when people keep on sinning, it shows that they belong to the devil, who has been sinning since the beginning. But the Son of God came to destroy the works of the devil. '
  '9':
  - type: text
    content: Those who have been born into God’s family do not make a practice of sinning, because God’s life
  - type: note
    content: Greek because his seed.
  - type: text
    content: ' is in them. So they can’t keep on sinning, because they are children of God. '
