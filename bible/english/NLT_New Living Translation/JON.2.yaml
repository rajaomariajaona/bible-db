document_id: JON.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 2:1-10 are numbered 2:2-11 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Then Jonah prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God from inside the fish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in my great trouble,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he answered me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I called to you from the land of the dead,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you heard me!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You threw me into the ocean depths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I sank down to the heart of the sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mighty waters engulfed me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was buried beneath your wild and stormy waves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then I said, ‘O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have driven me from your presence.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet I will look once more toward your holy Temple.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I sank beneath the waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the waters closed over me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seaweed wrapped itself around my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I sank down to the very roots of the mountains.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was imprisoned in the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose gates lock shut forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: snatched me from the jaws of death!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As my life was slipping away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I remembered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my earnest prayer went out to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your holy Temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Those who worship false gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn their backs on all God’s mercies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But I will offer sacrifices to you with songs of praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will fulfill all my vows.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For my salvation comes from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' alone.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' ordered the fish to spit Jonah out onto the beach.'
