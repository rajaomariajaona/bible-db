document_id: JON.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Prayer
  - type: text
    content: ' '
  - type: note
    content: Verses 2:1-10 are numbered 2:2-11 in Hebrew text.
  - type: text
    content: 'Then Jonah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God from inside the fish. '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' ordered the fish to spit Jonah out onto the beach.'
  '2':
  - type: text
    content: He said,
  - type: text
    content: '“I cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' in my great trouble,'
  - type: text
    content: and he answered me.
  - type: text
    content: I called to you from the land of the dead,
  - type: note
    content: Hebrew from Sheol.
  - type: text
    content: 'and '
  - type: text
    content: Lord
  - type: text
    content: ', you heard me!'
  '3':
  - type: text
    content: You threw me into the ocean depths,
  - type: text
    content: and I sank down to the heart of the sea.
  - type: text
    content: The mighty waters engulfed me;
  - type: text
    content: I was buried beneath your wild and stormy waves.
  '4':
  - type: text
    content: 'Then I said, ‘O '
  - type: text
    content: Lord
  - type: text
    content: ', you have driven me from your presence.'
  - type: text
    content: Yet I will look once more toward your holy Temple.’
  '5':
  - type: text
    content: “I sank beneath the waves,
  - type: text
    content: and the waters closed over me.
  - type: text
    content: Seaweed wrapped itself around my head.
  '6':
  - type: text
    content: I sank down to the very roots of the mountains.
  - type: text
    content: I was imprisoned in the earth,
  - type: text
    content: whose gates lock shut forever.
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God,'
  - type: text
    content: snatched me from the jaws of death!
  '7':
  - type: text
    content: As my life was slipping away,
  - type: text
    content: 'I remembered the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: And my earnest prayer went out to you
  - type: text
    content: in your holy Temple.
  '8':
  - type: text
    content: Those who worship false gods
  - type: text
    content: turn their backs on all God’s mercies.
  '9':
  - type: text
    content: But I will offer sacrifices to you with songs of praise,
  - type: text
    content: and I will fulfill all my vows.
  - type: text
    content: 'For my salvation comes from the '
  - type: text
    content: Lord
  - type: text
    content: ' alone.”'
