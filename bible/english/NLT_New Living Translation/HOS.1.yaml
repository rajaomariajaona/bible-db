document_id: HOS.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Hosea son of Beeri during the years when Uzziah, Jotham, Ahaz, and Hezekiah were kings of Judah, and Jeroboam son of Jehoash'
  - type: note
    content: Hebrew Joash, a variant spelling of Jehoash.
  - type: text
    content: ' was king of Israel.'
  - type: heading
    content: Hosea’s Wife and Children
  '10':
  - type: text
    content: ' '
  - type: note
    content: Verses 1:10-11 are numbered 2:1-2 in Hebrew text.
  - type: text
    content: '“Yet the time will come when Israel’s people will be like the sands of the seashore—too many to count! Then, at the place where they were told, ‘You are not my people,’ it will be said, ‘You are children of the living God.’ '
  '11':
  - type: text
    content: Then the people of Judah and Israel will unite together. They will choose one leader for themselves, and they will return from exile together. What a day that will be—the day of Jezreel
  - type: note
    content: Jezreel means “God plants.”
  - type: text
    content: —when God will again plant his people in his land.
  '2':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' first began speaking to Israel through Hosea, he said to him, “Go and marry a prostitute,'
  - type: note
    content: Or a promiscuous woman.
  - type: text
    content: ' so that some of her children will be conceived in prostitution. This will illustrate how Israel has acted like a prostitute by turning against the '
  - type: text
    content: Lord
  - type: text
    content: ' and worshiping other gods.”'
  '3':
  - type: text
    content: 'So Hosea married Gomer, the daughter of Diblaim, and she became pregnant and gave Hosea a son. '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Name the child Jezreel, for I am about to punish King Jehu’s dynasty to avenge the murders he committed at Jezreel. In fact, I will bring an end to Israel’s independence. '
  '5':
  - type: text
    content: I will break its military power in the Jezreel Valley.”
  '6':
  - type: text
    content: 'Soon Gomer became pregnant again and gave birth to a daughter. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Hosea, “Name your daughter Lo-ruhamah—‘Not loved’—for I will no longer show love to the people of Israel or forgive them. '
  '7':
  - type: text
    content: 'But I will show love to the people of Judah. I will free them from their enemies—not with weapons and armies or horses and charioteers, but by my power as the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.”'
  '8':
  - type: text
    content: 'After Gomer had weaned Lo-ruhamah, she again became pregnant and gave birth to a second son. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Name him Lo-ammi—‘Not my people’—for Israel is not my people, and I am not their God.'
