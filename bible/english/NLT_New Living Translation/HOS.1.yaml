document_id: HOS.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this message to Hosea son of Beeri during the years when Uzziah, Jotham, Ahaz, and Hezekiah were kings of Judah, and Jeroboam son of Jehoash'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joash, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehoash.
      marker-yv: yv-n
    - type: text
      text: ' was king of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hosea’s Wife and Children
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 1:10-11 are numbered 2:1-2 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: '“Yet the time will come when Israel’s people will be like the sands of the seashore—too many to count! Then, at the place where they were told, ‘You are not my people,’ it will be said, ‘You are children of the living God.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then the people of Judah and Israel will unite together. They will choose one leader for themselves, and they will return from exile together. What a day that will be—the day of Jezreel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jezreel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “God plants.”
      marker-yv: yv-n
    - type: text
      text: —when God will again plant his people in his land.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' first began speaking to Israel through Hosea, he said to him, “Go and marry a prostitute,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a promiscuous woman.
      marker-yv: yv-n
    - type: text
      text: ' so that some of her children will be conceived in prostitution. This will illustrate how Israel has acted like a prostitute by turning against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and worshiping other gods.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Hosea married Gomer, the daughter of Diblaim, and she became pregnant and gave Hosea a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Name the child Jezreel, for I am about to punish King Jehu’s dynasty to avenge the murders he committed at Jezreel. In fact, I will bring an end to Israel’s independence. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I will break its military power in the Jezreel Valley.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Soon Gomer became pregnant again and gave birth to a daughter. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Hosea, “Name your daughter Lo-ruhamah—‘Not loved’—for I will no longer show love to the people of Israel or forgive them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But I will show love to the people of Judah. I will free them from their enemies—not with weapons and armies or horses and charioteers, but by my power as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'After Gomer had weaned Lo-ruhamah, she again became pregnant and gave birth to a second son. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Name him Lo-ammi—‘Not my people’—for Israel is not my people, and I am not their God.'
