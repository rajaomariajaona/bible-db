document_id: PRO.11,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the use of dishonest scales,'
  - type: text
    content: but he delights in accurate weights.
  '10':
  - type: text
    content: The whole city celebrates when the godly succeed;
  - type: text
    content: they shout for joy when the wicked die.
  '11':
  - type: text
    content: Upright citizens are good for a city and make it prosper,
  - type: text
    content: but the talk of the wicked tears it apart.
  '12':
  - type: text
    content: It is foolish to belittle one’s neighbor;
  - type: text
    content: a sensible person keeps quiet.
  '13':
  - type: text
    content: A gossip goes around telling secrets,
  - type: text
    content: but those who are trustworthy can keep a confidence.
  '14':
  - type: text
    content: Without wise leadership, a nation falls;
  - type: text
    content: there is safety in having many advisers.
  '15':
  - type: text
    content: There’s danger in putting up security for a stranger’s debt;
  - type: text
    content: it’s safer not to guarantee another person’s debt.
  '16':
  - type: text
    content: A gracious woman gains respect,
  - type: text
    content: but ruthless men gain only wealth.
  '17':
  - type: text
    content: Your kindness will reward you,
  - type: text
    content: but your cruelty will destroy you.
  '18':
  - type: text
    content: Evil people get rich for the moment,
  - type: text
    content: but the reward of the godly will last.
  '19':
  - type: text
    content: Godly people find life;
  - type: text
    content: evil people find death.
  '2':
  - type: text
    content: Pride leads to disgrace,
  - type: text
    content: but with humility comes wisdom.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests people with crooked hearts,'
  - type: text
    content: but he delights in those with integrity.
  '21':
  - type: text
    content: Evil people will surely be punished,
  - type: text
    content: but the children of the godly will go free.
  '22':
  - type: text
    content: A beautiful woman who lacks discretion
  - type: text
    content: is like a gold ring in a pig’s snout.
  '23':
  - type: text
    content: The godly can look forward to a reward,
  - type: text
    content: while the wicked can expect only judgment.
  '24':
  - type: text
    content: Give freely and become more wealthy;
  - type: text
    content: be stingy and lose everything.
  '25':
  - type: text
    content: The generous will prosper;
  - type: text
    content: those who refresh others will themselves be refreshed.
  '26':
  - type: text
    content: People curse those who hoard their grain,
  - type: text
    content: but they bless the one who sells in time of need.
  '27':
  - type: text
    content: If you search for good, you will find favor;
  - type: text
    content: but if you search for evil, it will find you!
  '28':
  - type: text
    content: Trust in your money and down you go!
  - type: text
    content: But the godly flourish like leaves in spring.
  '29':
  - type: text
    content: Those who bring trouble on their families inherit the wind.
  - type: text
    content: The fool will be a servant to the wise.
  '3':
  - type: text
    content: Honesty guides good people;
  - type: text
    content: dishonesty destroys treacherous people.
  '30':
  - type: text
    content: The seeds of good deeds become a tree of life;
  - type: text
    content: a wise person wins friends.
  - type: note
    content: Or and those who win souls are wise.
  '31':
  - type: text
    content: If the righteous are rewarded here on earth,
  - type: text
    content: what will happen to wicked sinners?
  - type: note
    content: Greek version reads If the righteous are barely saved, / what will happen to godless sinners? Compare 1 Pet 4:18.
  '4':
  - type: text
    content: Riches won’t help on the day of judgment,
  - type: text
    content: but right living can save you from death.
  '5':
  - type: text
    content: The godly are directed by honesty;
  - type: text
    content: the wicked fall beneath their load of sin.
  '6':
  - type: text
    content: The godliness of good people rescues them;
  - type: text
    content: the ambition of treacherous people traps them.
  '7':
  - type: text
    content: When the wicked die, their hopes die with them,
  - type: text
    content: for they rely on their own feeble strength.
  '8':
  - type: text
    content: The godly are rescued from trouble,
  - type: text
    content: and it falls on the wicked instead.
  '9':
  - type: text
    content: With their words, the godless destroy their friends,
  - type: text
    content: but knowledge will rescue the righteous.
