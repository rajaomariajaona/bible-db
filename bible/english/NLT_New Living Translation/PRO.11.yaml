document_id: PRO.11
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests the use of dishonest scales,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in accurate weights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Pride leads to disgrace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but with humility comes wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Honesty guides good people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dishonesty destroys treacherous people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Riches won’t help on the day of judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but right living can save you from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The godly are directed by honesty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked fall beneath their load of sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The godliness of good people rescues them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ambition of treacherous people traps them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When the wicked die, their hopes die with them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they rely on their own feeble strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The godly are rescued from trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it falls on the wicked instead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: With their words, the godless destroy their friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but knowledge will rescue the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The whole city celebrates when the godly succeed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they shout for joy when the wicked die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Upright citizens are good for a city and make it prosper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the talk of the wicked tears it apart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is foolish to belittle one’s neighbor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sensible person keeps quiet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A gossip goes around telling secrets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who are trustworthy can keep a confidence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Without wise leadership, a nation falls;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is safety in having many advisers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There’s danger in putting up security for a stranger’s debt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s safer not to guarantee another person’s debt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A gracious woman gains respect,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but ruthless men gain only wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Your kindness will reward you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your cruelty will destroy you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Evil people get rich for the moment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the reward of the godly will last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Godly people find life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: evil people find death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests people with crooked hearts,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in those with integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Evil people will surely be punished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the children of the godly will go free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A beautiful woman who lacks discretion
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like a gold ring in a pig’s snout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The godly can look forward to a reward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the wicked can expect only judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Give freely and become more wealthy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be stingy and lose everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The generous will prosper;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who refresh others will themselves be refreshed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: People curse those who hoard their grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they bless the one who sells in time of need.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If you search for good, you will find favor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but if you search for evil, it will find you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Trust in your money and down you go!
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the godly flourish like leaves in spring.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Those who bring trouble on their families inherit the wind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The fool will be a servant to the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The seeds of good deeds become a tree of life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a wise person wins friends.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and those who win souls are wise.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If the righteous are rewarded here on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what will happen to wicked sinners?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'If the righteous are barely saved, / what will happen to godless sinners? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare 1 Pet 4:18.
    marker-yv: yv-n
