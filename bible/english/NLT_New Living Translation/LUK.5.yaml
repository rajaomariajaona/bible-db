document_id: LUK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The First Disciples
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day as Jesus was preaching on the shore of the Sea of Galilee,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Lake Gennesaret, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: ' great crowds pressed in on him to listen to the word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He noticed two empty boats at the water’s edge, for the fishermen had left them and were washing their nets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Stepping into one of the boats, Jesus asked Simon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Simon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is called “Peter” in 6:14 and thereafter.
    marker-yv: yv-n
  - type: text
    text: ' its owner, to push it out into the water. So he sat in the boat and taught the crowds from there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When he had finished speaking, he said to Simon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now go out where it is deeper, and let down your nets to catch some fish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Master,” Simon replied, “we worked hard all last night and didn’t catch a thing. But if you say so, I’ll let the nets down again.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And this time their nets were so full of fish they began to tear! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A shout for help brought their partners in the other boat, and soon both boats were filled with fish and on the verge of sinking.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Simon Peter realized what had happened, he fell to his knees before Jesus and said, “Oh, Lord, please leave me—I’m such a sinful man.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For he was awestruck by the number of fish they had caught, as were the others with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His partners, James and John, the sons of Zebedee, were also amazed.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus replied to Simon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid! From now on you’ll be fishing for people!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And as soon as they landed, they left everything and followed Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Man with Leprosy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: In one of the villages, Jesus met a man with an advanced case of leprosy. When the man saw Jesus, he bowed with his face to the ground, begging to be healed. “Lord,” he said, “if you are willing, you can heal me and make me clean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus reached out and touched him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I am willing,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be healed!”
  - type: text
    text: ' And instantly the leprosy disappeared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Jesus instructed him not to tell anyone what had happened. He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go to the priest and let him examine you. Take along the offering required in the law of Moses for those who have been healed of leprosy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Lev 14:2-32.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This will be a public testimony that you have been cleansed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But despite Jesus’ instructions, the report of his power spread even faster, and vast crowds came to hear him preach and to be healed of their diseases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Jesus often withdrew to the wilderness for prayer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Paralyzed Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: One day while Jesus was teaching, some Pharisees and teachers of religious law were sitting nearby. (It seemed that these men showed up from every village in all Galilee and Judea, as well as from Jerusalem.) And the Lord’s healing power was strongly with Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Some men came carrying a paralyzed man on a sleeping mat. They tried to take him inside to Jesus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'but they couldn’t reach him because of the crowd. So they went up to the roof and took off some tiles. Then they lowered the sick man on his mat down into the crowd, right in front of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Seeing their faith, Jesus said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Young man, your sins are forgiven.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But the Pharisees and teachers of religious law said to themselves, “Who does he think he is? That’s blasphemy! Only God can forgive sins!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus knew what they were thinking, so he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why do you question this in your hearts?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Is it easier to say ‘Your sins are forgiven,’ or ‘Stand up and walk’?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So I will prove to you that the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has the authority on earth to forgive sins.”
  - type: text
    text: ' Then Jesus turned to the paralyzed man and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stand up, pick up your mat, and go home!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And immediately, as everyone watched, the man jumped up, picked up his mat, and went home praising God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Everyone was gripped with great wonder and awe, and they praised God, exclaiming, “We have seen amazing things today!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Levi (Matthew)
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Later, as Jesus left the town, he saw a tax collector named Levi sitting at his tax collector’s booth. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Follow me and be my disciple,” '
  - type: text
    text: 'Jesus said to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So Levi got up, left everything, and followed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Later, Levi held a banquet in his home with Jesus as the guest of honor. Many of Levi’s fellow tax collectors and other guests also ate with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But the Pharisees and their teachers of religious law complained bitterly to Jesus’ disciples, “Why do you eat and drink with such scum?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with tax collectors and sinners?
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Healthy people don’t need a doctor—sick people do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have come to call not those who think they are righteous, but those who know they are sinners and need to repent.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Discussion about Fasting
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: One day some people said to Jesus, “John the Baptist’s disciples fast and pray regularly, and so do the disciples of the Pharisees. Why are your disciples always eating and drinking?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do wedding guests fast while celebrating with the groom? Of course not.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But someday the groom will be taken away from them, and then they will fast.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then Jesus gave them this illustration: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one tears a piece of cloth from a new garment and uses it to patch an old garment. For then the new garment would be ruined, and the new patch wouldn’t even match the old garment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And no one puts new wine into old wineskins. For the new wine would burst the wineskins, spilling the wine and ruining the skins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: New wine must be stored in new wineskins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But no one who drinks the old wine seems to want the new wine. ‘The old is just fine,’ they say.”
