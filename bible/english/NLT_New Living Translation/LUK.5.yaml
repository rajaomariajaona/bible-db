document_id: LUK.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The First Disciples
  - type: text
    content: One day as Jesus was preaching on the shore of the Sea of Galilee,
  - type: note
    content: Greek Lake Gennesaret, another name for the Sea of Galilee.
  - type: text
    content: ' great crowds pressed in on him to listen to the word of God. '
  '10':
  - type: text
    content: His partners, James and John, the sons of Zebedee, were also amazed.
  - type: text
    content: 'Jesus replied to Simon, '
  - type: text
    content: “Don’t be afraid! From now on you’ll be fishing for people!”
  - type: text
    content: ' '
  '11':
  - type: text
    content: And as soon as they landed, they left everything and followed Jesus.
  - type: heading
    content: Jesus Heals a Man with Leprosy
  '12':
  - type: text
    content: In one of the villages, Jesus met a man with an advanced case of leprosy. When the man saw Jesus, he bowed with his face to the ground, begging to be healed. “Lord,” he said, “if you are willing, you can heal me and make me clean.”
  '13':
  - type: text
    content: 'Jesus reached out and touched him. '
  - type: text
    content: '“I am willing,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Be healed!”
  - type: text
    content: ' And instantly the leprosy disappeared. '
  '14':
  - type: text
    content: 'Then Jesus instructed him not to tell anyone what had happened. He said, '
  - type: text
    content: “Go to the priest and let him examine you. Take along the offering required in the law of Moses for those who have been healed of leprosy.
  - type: note
    content: See Lev 14:2-32.
  - type: text
    content: ' '
  - type: text
    content: This will be a public testimony that you have been cleansed.”
  '15':
  - type: text
    content: 'But despite Jesus’ instructions, the report of his power spread even faster, and vast crowds came to hear him preach and to be healed of their diseases. '
  '16':
  - type: text
    content: But Jesus often withdrew to the wilderness for prayer.
  - type: heading
    content: Jesus Heals a Paralyzed Man
  '17':
  - type: text
    content: One day while Jesus was teaching, some Pharisees and teachers of religious law were sitting nearby. (It seemed that these men showed up from every village in all Galilee and Judea, as well as from Jerusalem.) And the Lord’s healing power was strongly with Jesus.
  '18':
  - type: text
    content: 'Some men came carrying a paralyzed man on a sleeping mat. They tried to take him inside to Jesus, '
  '19':
  - type: text
    content: 'but they couldn’t reach him because of the crowd. So they went up to the roof and took off some tiles. Then they lowered the sick man on his mat down into the crowd, right in front of Jesus. '
  '2':
  - type: text
    content: 'He noticed two empty boats at the water’s edge, for the fishermen had left them and were washing their nets. '
  '20':
  - type: text
    content: 'Seeing their faith, Jesus said to the man, '
  - type: text
    content: “Young man, your sins are forgiven.”
  '21':
  - type: text
    content: But the Pharisees and teachers of religious law said to themselves, “Who does he think he is? That’s blasphemy! Only God can forgive sins!”
  '22':
  - type: text
    content: 'Jesus knew what they were thinking, so he asked them, '
  - type: text
    content: “Why do you question this in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Is it easier to say ‘Your sins are forgiven,’ or ‘Stand up and walk’?
  - type: text
    content: ' '
  '24':
  - type: text
    content: So I will prove to you that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has the authority on earth to forgive sins.”
  - type: text
    content: ' Then Jesus turned to the paralyzed man and said, '
  - type: text
    content: “Stand up, pick up your mat, and go home!”
  '25':
  - type: text
    content: 'And immediately, as everyone watched, the man jumped up, picked up his mat, and went home praising God. '
  '26':
  - type: text
    content: Everyone was gripped with great wonder and awe, and they praised God, exclaiming, “We have seen amazing things today!”
  - type: heading
    content: Jesus Calls Levi (Matthew)
  '27':
  - type: text
    content: 'Later, as Jesus left the town, he saw a tax collector named Levi sitting at his tax collector’s booth. '
  - type: text
    content: '“Follow me and be my disciple,” '
  - type: text
    content: 'Jesus said to him. '
  '28':
  - type: text
    content: So Levi got up, left everything, and followed him.
  '29':
  - type: text
    content: 'Later, Levi held a banquet in his home with Jesus as the guest of honor. Many of Levi’s fellow tax collectors and other guests also ate with them. '
  '3':
  - type: text
    content: Stepping into one of the boats, Jesus asked Simon,
  - type: note
    content: Simon is called “Peter” in 6:14 and thereafter.
  - type: text
    content: ' its owner, to push it out into the water. So he sat in the boat and taught the crowds from there.'
  '30':
  - type: text
    content: But the Pharisees and their teachers of religious law complained bitterly to Jesus’ disciples, “Why do you eat and drink with such scum?
  - type: note
    content: Greek with tax collectors and sinners?
  - type: text
    content: ”
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Healthy people don’t need a doctor—sick people do.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I have come to call not those who think they are righteous, but those who know they are sinners and need to repent.”
  - type: heading
    content: A Discussion about Fasting
  '33':
  - type: text
    content: One day some people said to Jesus, “John the Baptist’s disciples fast and pray regularly, and so do the disciples of the Pharisees. Why are your disciples always eating and drinking?”
  '34':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Do wedding guests fast while celebrating with the groom? Of course not.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But someday the groom will be taken away from them, and then they will fast.”
  '36':
  - type: text
    content: 'Then Jesus gave them this illustration: '
  - type: text
    content: “No one tears a piece of cloth from a new garment and uses it to patch an old garment. For then the new garment would be ruined, and the new patch wouldn’t even match the old garment.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “And no one puts new wine into old wineskins. For the new wine would burst the wineskins, spilling the wine and ruining the skins.
  - type: text
    content: ' '
  '38':
  - type: text
    content: New wine must be stored in new wineskins.
  - type: text
    content: ' '
  '39':
  - type: text
    content: But no one who drinks the old wine seems to want the new wine. ‘The old is just fine,’ they say.”
  '4':
  - type: text
    content: 'When he had finished speaking, he said to Simon, '
  - type: text
    content: “Now go out where it is deeper, and let down your nets to catch some fish.”
  '5':
  - type: text
    content: '“Master,” Simon replied, “we worked hard all last night and didn’t catch a thing. But if you say so, I’ll let the nets down again.” '
  '6':
  - type: text
    content: 'And this time their nets were so full of fish they began to tear! '
  '7':
  - type: text
    content: A shout for help brought their partners in the other boat, and soon both boats were filled with fish and on the verge of sinking.
  '8':
  - type: text
    content: 'When Simon Peter realized what had happened, he fell to his knees before Jesus and said, “Oh, Lord, please leave me—I’m such a sinful man.” '
  '9':
  - type: text
    content: 'For he was awestruck by the number of fish they had caught, as were the others with him. '
