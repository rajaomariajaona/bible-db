document_id: ISA.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Babylon’s False Gods
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Bel and Nebo, the gods of Babylon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bow as they are lowered to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are being hauled away on ox carts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The poor beasts stagger under the weight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Both the idols and their owners are bowed down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The gods cannot protect the people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the people cannot protect the gods.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They go off into captivity together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Listen to me, descendants of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you who remain in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have cared for you since you were born.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, I carried you before you were born.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will be your God throughout your lifetime—
- type: usfm
  marker: q2
  children:
  - type: text
    text: until your hair is white with age.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I made you, and I will care for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will carry you along and save you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “To whom will you compare me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is my equal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Some people pour out their silver and gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hire a craftsman to make a god from it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then they bow down and worship it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They carry it around on their shoulders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when they set it down, it stays there.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It can’t even move!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when someone prays to it, there is no answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It can’t rescue anyone from trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Do not forget this! Keep it in mind!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember this, you guilty ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Remember the things I have done in the past.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I alone am God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am God, and there is none like me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Only I can tell you the future
- type: usfm
  marker: q2
  children:
  - type: text
    text: before it even happens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything I plan will come to pass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I do whatever I wish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will call a swift bird of prey from the east—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a leader from a distant land to come and do my bidding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have said what I would do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will do it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Listen to me, you stubborn people
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are so far from doing right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For I am ready to set things right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not in the distant future, but right now!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am ready to save Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and show my glory to Israel.
