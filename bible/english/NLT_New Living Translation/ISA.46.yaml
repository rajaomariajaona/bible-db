document_id: ISA.46,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Babylon’s False Gods
  - type: text
    content: Bel and Nebo, the gods of Babylon,
  - type: text
    content: bow as they are lowered to the ground.
  - type: text
    content: They are being hauled away on ox carts.
  - type: text
    content: The poor beasts stagger under the weight.
  '10':
  - type: text
    content: Only I can tell you the future
  - type: text
    content: before it even happens.
  - type: text
    content: Everything I plan will come to pass,
  - type: text
    content: for I do whatever I wish.
  '11':
  - type: text
    content: I will call a swift bird of prey from the east—
  - type: text
    content: a leader from a distant land to come and do my bidding.
  - type: text
    content: I have said what I would do,
  - type: text
    content: and I will do it.
  '12':
  - type: text
    content: “Listen to me, you stubborn people
  - type: text
    content: who are so far from doing right.
  '13':
  - type: text
    content: For I am ready to set things right,
  - type: text
    content: not in the distant future, but right now!
  - type: text
    content: I am ready to save Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: and show my glory to Israel.
  '2':
  - type: text
    content: Both the idols and their owners are bowed down.
  - type: text
    content: The gods cannot protect the people,
  - type: text
    content: and the people cannot protect the gods.
  - type: text
    content: They go off into captivity together.
  '3':
  - type: text
    content: “Listen to me, descendants of Jacob,
  - type: text
    content: all you who remain in Israel.
  - type: text
    content: I have cared for you since you were born.
  - type: text
    content: Yes, I carried you before you were born.
  '4':
  - type: text
    content: I will be your God throughout your lifetime—
  - type: text
    content: until your hair is white with age.
  - type: text
    content: I made you, and I will care for you.
  - type: text
    content: I will carry you along and save you.
  '5':
  - type: text
    content: “To whom will you compare me?
  - type: text
    content: Who is my equal?
  '6':
  - type: text
    content: Some people pour out their silver and gold
  - type: text
    content: and hire a craftsman to make a god from it.
  - type: text
    content: Then they bow down and worship it!
  '7':
  - type: text
    content: They carry it around on their shoulders,
  - type: text
    content: and when they set it down, it stays there.
  - type: text
    content: It can’t even move!
  - type: text
    content: And when someone prays to it, there is no answer.
  - type: text
    content: It can’t rescue anyone from trouble.
  '8':
  - type: text
    content: “Do not forget this! Keep it in mind!
  - type: text
    content: Remember this, you guilty ones.
  '9':
  - type: text
    content: Remember the things I have done in the past.
  - type: text
    content: For I alone am God!
  - type: text
    content: I am God, and there is none like me.
