document_id: ROM.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Living to Please Others
  - type: text
    content: 'We who are strong must be considerate of those who are sensitive about things like this. We must not just please ourselves. '
  '10':
  - type: text
    content: And in another place it is written,
  - type: text
    content: “Rejoice with his people,
  - type: text
    content: you Gentiles.”
  - type: note
    content: Deut 32:43.
  '11':
  - type: text
    content: And yet again,
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', all you Gentiles.'
  - type: text
    content: Praise him, all you people of the earth.”
  - type: note
    content: Ps 117:1.
  '12':
  - type: text
    content: And in another place Isaiah said,
  - type: text
    content: “The heir to David’s throne
  - type: note
    content: Greek The root of Jesse. David was the son of Jesse.
  - type: text
    content: ' will come,'
  - type: text
    content: and he will rule over the Gentiles.
  - type: text
    content: They will place their hope on him.”
  - type: note
    content: Isa 11:10 (Greek version).
  '13':
  - type: text
    content: I pray that God, the source of hope, will fill you completely with joy and peace because you trust in him. Then you will overflow with confident hope through the power of the Holy Spirit.
  - type: heading
    content: Paul’s Reason for Writing
  '14':
  - type: text
    content: I am fully convinced, my dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 15:30.
  - type: text
    content: ' that you are full of goodness. You know these things so well you can teach each other all about them. '
  '15':
  - type: text
    content: 'Even so, I have been bold enough to write about some of these points, knowing that all you need is this reminder. For by God’s grace, '
  '16':
  - type: text
    content: 'I am a special messenger from Christ Jesus to you Gentiles. I bring you the Good News so that I might present you as an acceptable offering to God, made holy by the Holy Spirit. '
  '17':
  - type: text
    content: 'So I have reason to be enthusiastic about all Christ Jesus has done through me in my service to God. '
  '18':
  - type: text
    content: 'Yet I dare not boast about anything except what Christ has done through me, bringing the Gentiles to God by my message and by the way I worked among them. '
  '19':
  - type: text
    content: They were convinced by the power of miraculous signs and wonders and by the power of God’s Spirit.
  - type: note
    content: Other manuscripts read the Spirit; still others read the Holy Spirit.
  - type: text
    content: ' In this way, I have fully presented the Good News of Christ from Jerusalem all the way to Illyricum.'
  - type: note
    content: Illyricum was a region northeast of Italy.
  '2':
  - type: text
    content: 'We should help others do what is right and build them up in the Lord. '
  '20':
  - type: text
    content: 'My ambition has always been to preach the Good News where the name of Christ has never been heard, rather than where a church has already been started by someone else. '
  '21':
  - type: text
    content: I have been following the plan spoken of in the Scriptures, where it says,
  - type: text
    content: “Those who have never been told about him will see,
  - type: text
    content: and those who have never heard of him will understand.”
  - type: note
    content: Isa 52:15 (Greek version).
  '22':
  - type: text
    content: In fact, my visit to you has been delayed so long because I have been preaching in these places.
  - type: heading
    content: Paul’s Travel Plans
  '23':
  - type: text
    content: 'But now I have finished my work in these regions, and after all these long years of waiting, I am eager to visit you. '
  '24':
  - type: text
    content: I am planning to go to Spain, and when I do, I will stop off in Rome. And after I have enjoyed your fellowship for a little while, you can provide for my journey.
  '25':
  - type: text
    content: But before I come, I must go to Jerusalem to take a gift to the believers
  - type: note
    content: Greek God’s holy people; also in 15:26, 31.
  - type: text
    content: ' there. '
  '26':
  - type: text
    content: For you see, the believers in Macedonia and Achaia
  - type: note
    content: Macedonia and Achaia were the northern and southern regions of Greece.
  - type: text
    content: ' have eagerly taken up an offering for the poor among the believers in Jerusalem. '
  '27':
  - type: text
    content: 'They were glad to do this because they feel they owe a real debt to them. Since the Gentiles received the spiritual blessings of the Good News from the believers in Jerusalem, they feel the least they can do in return is to help them financially. '
  '28':
  - type: text
    content: 'As soon as I have delivered this money and completed this good deed of theirs, I will come to see you on my way to Spain. '
  '29':
  - type: text
    content: And I am sure that when I come, Christ will richly bless our time together.
  '3':
  - type: text
    content: For even Christ didn’t live to please himself. As the Scriptures say, “The insults of those who insult you, O God, have fallen on me.”
  - type: note
    content: Greek who insult you have fallen on me. Ps 69:9.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Dear brothers and sisters, I urge you in the name of our Lord Jesus Christ to join in my struggle by praying to God for me. Do this because of your love for me, given to you by the Holy Spirit. '
  '31':
  - type: text
    content: Pray that I will be rescued from those in Judea who refuse to obey God. Pray also that the believers there will be willing to accept the donation
  - type: note
    content: Greek the ministry; other manuscripts read the gift.
  - type: text
    content: ' I am taking to Jerusalem. '
  '32':
  - type: text
    content: Then, by the will of God, I will be able to come to you with a joyful heart, and we will be an encouragement to each other.
  '33':
  - type: text
    content: And now may God, who gives us his peace, be with you all. Amen.
  - type: note
    content: Some manuscripts do not include Amen. One very early manuscript places 16:25-27 here.
  '4':
  - type: text
    content: Such things were written in the Scriptures long ago to teach us. And the Scriptures give us hope and encouragement as we wait patiently for God’s promises to be fulfilled.
  '5':
  - type: text
    content: 'May God, who gives this patience and encouragement, help you live in complete harmony with each other, as is fitting for followers of Christ Jesus. '
  '6':
  - type: text
    content: Then all of you can join together with one voice, giving praise and glory to God, the Father of our Lord Jesus Christ.
  '7':
  - type: text
    content: 'Therefore, accept each other just as Christ has accepted you so that God will be given glory. '
  '8':
  - type: text
    content: Remember that Christ came as a servant to the Jews
  - type: note
    content: Greek servant of circumcision.
  - type: text
    content: ' to show that God is true to the promises he made to their ancestors. '
  '9':
  - type: text
    content: 'He also came so that the Gentiles might give glory to God for his mercies to them. That is what the psalmist meant when he wrote:'
  - type: text
    content: “For this, I will praise you among the Gentiles;
  - type: text
    content: I will sing praises to your name.”
  - type: note
    content: Ps 18:49.
