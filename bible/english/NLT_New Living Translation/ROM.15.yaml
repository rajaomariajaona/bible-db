document_id: ROM.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living to Please Others
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'We who are strong must be considerate of those who are sensitive about things like this. We must not just please ourselves. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And in another place it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rejoice with his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you Gentiles.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 32:43.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And yet again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you Gentiles.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Praise him, all you people of the earth.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 117:1.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And in another place Isaiah said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The heir to David’s throne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:12a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The root of Jesse. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David was the son of Jesse.
      marker-yv: yv-n
    - type: text
      text: ' will come,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will rule over the Gentiles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will place their hope on him.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:12b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 11:10 (Greek version).
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I pray that God, the source of hope, will fill you completely with joy and peace because you trust in him. Then you will overflow with confident hope through the power of the Holy Spirit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Reason for Writing
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I am fully convinced, my dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:30.
      marker-yv: yv-n
    - type: text
      text: ' that you are full of goodness. You know these things so well you can teach each other all about them. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Even so, I have been bold enough to write about some of these points, knowing that all you need is this reminder. For by God’s grace, '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I am a special messenger from Christ Jesus to you Gentiles. I bring you the Good News so that I might present you as an acceptable offering to God, made holy by the Holy Spirit. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So I have reason to be enthusiastic about all Christ Jesus has done through me in my service to God. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Yet I dare not boast about anything except what Christ has done through me, bringing the Gentiles to God by my message and by the way I worked among them. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They were convinced by the power of miraculous signs and wonders and by the power of God’s Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Spirit; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: ' In this way, I have fully presented the Good News of Christ from Jerusalem all the way to Illyricum.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19b '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Illyricum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a region northeast of Italy.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'We should help others do what is right and build them up in the Lord. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'My ambition has always been to preach the Good News where the name of Christ has never been heard, rather than where a church has already been started by someone else. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I have been following the plan spoken of in the Scriptures, where it says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who have never been told about him will see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who have never heard of him will understand.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 52:15 (Greek version).
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: In fact, my visit to you has been delayed so long because I have been preaching in these places.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Travel Plans
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But now I have finished my work in these regions, and after all these long years of waiting, I am eager to visit you. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I am planning to go to Spain, and when I do, I will stop off in Rome. And after I have enjoyed your fellowship for a little while, you can provide for my journey.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But before I come, I must go to Jerusalem to take a gift to the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'God’s holy people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:26, 31.
      marker-yv: yv-n
    - type: text
      text: ' there. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For you see, the believers in Macedonia and Achaia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:26 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Macedonia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achaia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: were the northern and southern regions of Greece.
      marker-yv: yv-n
    - type: text
      text: ' have eagerly taken up an offering for the poor among the believers in Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They were glad to do this because they feel they owe a real debt to them. Since the Gentiles received the spiritual blessings of the Good News from the believers in Jerusalem, they feel the least they can do in return is to help them financially. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'As soon as I have delivered this money and completed this good deed of theirs, I will come to see you on my way to Spain. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And I am sure that when I come, Christ will richly bless our time together.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For even Christ didn’t live to please himself. As the Scriptures say, “The insults of those who insult you, O God, have fallen on me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'who insult you have fallen on me. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 69:9.
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dear brothers and sisters, I urge you in the name of our Lord Jesus Christ to join in my struggle by praying to God for me. Do this because of your love for me, given to you by the Holy Spirit. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Pray that I will be rescued from those in Judea who refuse to obey God. Pray also that the believers there will be willing to accept the donation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the ministry; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the gift.
      marker-yv: yv-n
    - type: text
      text: ' I am taking to Jerusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Then, by the will of God, I will be able to come to you with a joyful heart, and we will be an encouragement to each other.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And now may God, who gives us his peace, be with you all. Amen.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One very early manuscript places 16:25-27 here.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Such things were written in the Scriptures long ago to teach us. And the Scriptures give us hope and encouragement as we wait patiently for God’s promises to be fulfilled.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'May God, who gives this patience and encouragement, help you live in complete harmony with each other, as is fitting for followers of Christ Jesus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then all of you can join together with one voice, giving praise and glory to God, the Father of our Lord Jesus Christ.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore, accept each other just as Christ has accepted you so that God will be given glory. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Remember that Christ came as a servant to the Jews
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: servant of circumcision.
      marker-yv: yv-n
    - type: text
      text: ' to show that God is true to the promises he made to their ancestors. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He also came so that the Gentiles might give glory to God for his mercies to them. That is what the psalmist meant when he wrote:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For this, I will praise you among the Gentiles;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praises to your name.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 18:49.
      marker-yv: yv-n
