document_id: ISA.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Future Reign
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is a vision that Isaiah son of Amoz saw concerning Judah and Jerusalem:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crawl into caves in the rocks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide in the dust
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'from the terror of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the glory of his majesty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Human pride will be brought down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and human arrogance will be humbled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be exalted'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on that day of judgment.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has a day of reckoning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will punish the proud and mighty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring down everything that is exalted.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will cut down the tall cedars of Lebanon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the mighty oaks of Bashan.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will level all the high mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the lofty hills.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will break down every high tower
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every fortified wall.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will destroy all the great trading ships
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: every ship of Tarshish.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every magnificent vessel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Human pride will be humbled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and human arrogance will be brought down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be exalted'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on that day of judgment.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Idols will completely disappear.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rises to shake the earth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his enemies will crawl into holes in the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will hide in caves in the rocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the terror of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the glory of his majesty.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the last days, the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be the highest of all—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most important place on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be raised above the other hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people from all over the world will stream there to worship.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day of judgment they will abandon the gold and silver idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they made for themselves to worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will leave their gods to the rodents and bats,
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while they crawl away into caverns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hide among the jagged rocks in the cliffs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will try to escape the terror of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the glory of his majesty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he rises to shake the earth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t put your trust in mere humans.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are as frail as breath.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What good are they?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People from many nations will come and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Come, let us go up to the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the house of Jacob’s God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There he will teach us his ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we will walk in his paths.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s teaching will go out from Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his word will go out from Jerusalem.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will mediate between nations'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will settle international disputes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will hammer their swords into plowshares
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their spears into pruning hooks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nation will no longer fight against nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor train for war anymore.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning of Judgment
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, descendants of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let us walk in the light of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the descendants of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have filled their land with practices from the East
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with sorcerers, as the Philistines do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have made alliances with pagans.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel is full of silver and gold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no end to its treasures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their land is full of warhorses;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no end to its chariots.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their land is full of idols;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people worship things they have made
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their own hands.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now they will be humbled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all will be brought low—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not forgive them.
