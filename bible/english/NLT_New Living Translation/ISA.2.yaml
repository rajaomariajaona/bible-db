document_id: ISA.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Future Reign
  - type: text
    content: 'This is a vision that Isaiah son of Amoz saw concerning Judah and Jerusalem:'
  '10':
  - type: text
    content: Crawl into caves in the rocks.
  - type: text
    content: Hide in the dust
  - type: text
    content: 'from the terror of the '
  - type: text
    content: Lord
  - type: text
    content: and the glory of his majesty.
  '11':
  - type: text
    content: Human pride will be brought down,
  - type: text
    content: and human arrogance will be humbled.
  - type: text
    content: 'Only the '
  - type: text
    content: Lord
  - type: text
    content: ' will be exalted'
  - type: text
    content: on that day of judgment.
  '12':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: has a day of reckoning.
  - type: text
    content: He will punish the proud and mighty
  - type: text
    content: and bring down everything that is exalted.
  '13':
  - type: text
    content: He will cut down the tall cedars of Lebanon
  - type: text
    content: and all the mighty oaks of Bashan.
  '14':
  - type: text
    content: He will level all the high mountains
  - type: text
    content: and all the lofty hills.
  '15':
  - type: text
    content: He will break down every high tower
  - type: text
    content: and every fortified wall.
  '16':
  - type: text
    content: He will destroy all the great trading ships
  - type: note
    content: Hebrew every ship of Tarshish.
  - type: text
    content: and every magnificent vessel.
  '17':
  - type: text
    content: Human pride will be humbled,
  - type: text
    content: and human arrogance will be brought down.
  - type: text
    content: 'Only the '
  - type: text
    content: Lord
  - type: text
    content: ' will be exalted'
  - type: text
    content: on that day of judgment.
  '18':
  - type: text
    content: Idols will completely disappear.
  '19':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' rises to shake the earth,'
  - type: text
    content: his enemies will crawl into holes in the ground.
  - type: text
    content: They will hide in caves in the rocks
  - type: text
    content: 'from the terror of the '
  - type: text
    content: Lord
  - type: text
    content: and the glory of his majesty.
  '2':
  - type: text
    content: 'In the last days, the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house
  - type: text
    content: will be the highest of all—
  - type: text
    content: the most important place on earth.
  - type: text
    content: It will be raised above the other hills,
  - type: text
    content: and people from all over the world will stream there to worship.
  '20':
  - type: text
    content: On that day of judgment they will abandon the gold and silver idols
  - type: text
    content: they made for themselves to worship.
  - type: text
    content: They will leave their gods to the rodents and bats,
  '21':
  - type: text
    content: while they crawl away into caverns
  - type: text
    content: and hide among the jagged rocks in the cliffs.
  - type: text
    content: 'They will try to escape the terror of the '
  - type: text
    content: Lord
  - type: text
    content: and the glory of his majesty
  - type: text
    content: as he rises to shake the earth.
  '22':
  - type: text
    content: Don’t put your trust in mere humans.
  - type: text
    content: They are as frail as breath.
  - type: text
    content: What good are they?
  '3':
  - type: text
    content: People from many nations will come and say,
  - type: text
    content: '“Come, let us go up to the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the house of Jacob’s God.
  - type: text
    content: There he will teach us his ways,
  - type: text
    content: and we will walk in his paths.”
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ’s teaching will go out from Zion;
  - type: text
    content: his word will go out from Jerusalem.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will mediate between nations'
  - type: text
    content: and will settle international disputes.
  - type: text
    content: They will hammer their swords into plowshares
  - type: text
    content: and their spears into pruning hooks.
  - type: text
    content: Nation will no longer fight against nation,
  - type: text
    content: nor train for war anymore.
  - type: heading
    content: A Warning of Judgment
  '5':
  - type: text
    content: Come, descendants of Jacob,
  - type: text
    content: 'let us walk in the light of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected his people,'
  - type: text
    content: the descendants of Jacob,
  - type: text
    content: because they have filled their land with practices from the East
  - type: text
    content: and with sorcerers, as the Philistines do.
  - type: text
    content: They have made alliances with pagans.
  '7':
  - type: text
    content: Israel is full of silver and gold;
  - type: text
    content: there is no end to its treasures.
  - type: text
    content: Their land is full of warhorses;
  - type: text
    content: there is no end to its chariots.
  '8':
  - type: text
    content: Their land is full of idols;
  - type: text
    content: the people worship things they have made
  - type: text
    content: with their own hands.
  '9':
  - type: text
    content: So now they will be humbled,
  - type: text
    content: and all will be brought low—
  - type: text
    content: do not forgive them.
