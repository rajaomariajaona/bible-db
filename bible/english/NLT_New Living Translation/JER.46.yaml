document_id: JER.46,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Messages for the Nations
  - type: text
    content: 'The following messages were given to Jeremiah the prophet from the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning foreign nations.'
  - type: heading
    content: Messages about Egypt
  '10':
  - type: text
    content: 'For this is the day of the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: a day of vengeance on his enemies.
  - type: text
    content: The sword will devour until it is satisfied,
  - type: text
    content: yes, until it is drunk with your blood!
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, will receive a sacrifice today'
  - type: text
    content: in the north country beside the Euphrates River.
  '11':
  - type: text
    content: “Go up to Gilead to get medicine,
  - type: text
    content: O virgin daughter of Egypt!
  - type: text
    content: But your many treatments
  - type: text
    content: will bring you no healing.
  '12':
  - type: text
    content: The nations have heard of your shame.
  - type: text
    content: The earth is filled with your cries of despair.
  - type: text
    content: Your mightiest warriors will run into each other
  - type: text
    content: and fall down together.”
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the prophet Jeremiah this message about King Nebuchadnezzar’s plans to attack Egypt.'
  '14':
  - type: text
    content: “Shout it out in Egypt!
  - type: text
    content: Publish it in the cities of Migdol, Memphis,
  - type: note
    content: Hebrew Noph; also in 46:19.
  - type: text
    content: ' and Tahpanhes!'
  - type: text
    content: Mobilize for battle,
  - type: text
    content: for the sword will devour everyone around you.
  '15':
  - type: text
    content: Why have your warriors fallen?
  - type: text
    content: 'They cannot stand, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has knocked them down.'
  '16':
  - type: text
    content: They stumble and fall over each other
  - type: text
    content: and say among themselves,
  - type: text
    content: ‘Come, let’s go back to our people,
  - type: text
    content: to the land of our birth.
  - type: text
    content: Let’s get away from the sword of the enemy!’
  '17':
  - type: text
    content: There they will say,
  - type: text
    content: ‘Pharaoh, the king of Egypt, is a loudmouth
  - type: text
    content: who missed his opportunity!’
  '18':
  - type: text
    content: “As surely as I live,” says the King,
  - type: text
    content: 'whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: “one is coming against Egypt
  - type: text
    content: who is as tall as Mount Tabor,
  - type: text
    content: or as Mount Carmel by the sea!
  '19':
  - type: text
    content: Pack up! Get ready to leave for exile,
  - type: text
    content: you citizens of Egypt!
  - type: text
    content: The city of Memphis will be destroyed,
  - type: text
    content: without a single inhabitant.
  '2':
  - type: text
    content: This message concerning Egypt was given in the fourth year of the reign of Jehoiakim son of Josiah, the king of Judah, on the occasion of the battle of Carchemish
  - type: note
    content: This event occurred in 605 b.c., during the fourth year of Jehoiakim’s reign (according to the calendar system in which the new year begins in the spring).
  - type: text
    content: ' when Pharaoh Neco, king of Egypt, and his army were defeated beside the Euphrates River by King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 46:13, 26.
  - type: text
    content: ' of Babylon.'
  '20':
  - type: text
    content: Egypt is as sleek as a beautiful heifer,
  - type: text
    content: but a horsefly from the north is on its way!
  '21':
  - type: text
    content: Egypt’s mercenaries have become like fattened calves.
  - type: text
    content: They, too, will turn and run,
  - type: text
    content: for it is a day of great disaster for Egypt,
  - type: text
    content: a time of great punishment.
  '22':
  - type: text
    content: Egypt flees, silent as a serpent gliding away.
  - type: text
    content: The invading army marches in;
  - type: text
    content: they come against her with axes like woodsmen.
  '23':
  - type: text
    content: 'They will cut down her people like trees,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for they are more numerous than locusts.
  '24':
  - type: text
    content: Egypt will be humiliated;
  - type: text
    content: she will be handed over to people from the north.”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: “I will punish Amon, the god of Thebes,'
  - type: note
    content: Hebrew of No.
  - type: text
    content: ' and all the other gods of Egypt. I will punish its rulers and Pharaoh, too, and all who trust in him. '
  '26':
  - type: text
    content: 'I will hand them over to those who want them killed—to King Nebuchadnezzar of Babylon and his army. But afterward the land will recover from the ravages of war. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '27':
  - type: text
    content: “But do not be afraid, Jacob, my servant;
  - type: text
    content: do not be dismayed, Israel.
  - type: text
    content: For I will bring you home again from distant lands,
  - type: text
    content: and your children will return from their exile.
  - type: text
    content: Israel
  - type: note
    content: Hebrew Jacob. See note on 5:20.
  - type: text
    content: ' will return to a life of peace and quiet,'
  - type: text
    content: and no one will terrorize them.
  '28':
  - type: text
    content: Do not be afraid, Jacob, my servant,
  - type: text
    content: 'for I am with you,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will completely destroy the nations to which I have exiled you,
  - type: text
    content: but I will not completely destroy you.
  - type: text
    content: I will discipline you, but with justice;
  - type: text
    content: I cannot let you go unpunished.”
  '3':
  - type: text
    content: “Prepare your shields,
  - type: text
    content: and advance into battle!
  '4':
  - type: text
    content: Harness the horses,
  - type: text
    content: and mount the stallions.
  - type: text
    content: Take your positions.
  - type: text
    content: Put on your helmets.
  - type: text
    content: Sharpen your spears,
  - type: text
    content: and prepare your armor.
  '5':
  - type: text
    content: But what do I see?
  - type: text
    content: The Egyptian army flees in terror.
  - type: text
    content: The bravest of its fighting men run
  - type: text
    content: without a backward glance.
  - type: text
    content: They are terrorized at every turn,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: “The swiftest runners cannot flee;
  - type: text
    content: the mightiest warriors cannot escape.
  - type: text
    content: By the Euphrates River to the north,
  - type: text
    content: they stumble and fall.
  '7':
  - type: text
    content: “Who is this, rising like the Nile at floodtime,
  - type: text
    content: overflowing all the land?
  '8':
  - type: text
    content: It is the Egyptian army,
  - type: text
    content: overflowing all the land,
  - type: text
    content: boasting that it will cover the earth like a flood,
  - type: text
    content: destroying cities and their people.
  '9':
  - type: text
    content: Charge, you horses and chariots;
  - type: text
    content: attack, you mighty warriors of Egypt!
  - type: text
    content: Come, all you allies from Ethiopia, Libya, and Lydia
  - type: note
    content: Hebrew from Cush, Put, and Lud.
  - type: text
    content: who are skilled with the shield and bow!
