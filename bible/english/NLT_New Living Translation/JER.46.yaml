document_id: JER.46,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Messages for the Nations
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The following messages were given to Jeremiah the prophet from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' concerning foreign nations.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Messages about Egypt
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For this is the day of the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of vengeance on his enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will devour until it is satisfied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, until it is drunk with your blood!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, will receive a sacrifice today'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the north country beside the Euphrates River.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go up to Gilead to get medicine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O virgin daughter of Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But your many treatments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring you no healing.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations have heard of your shame.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth is filled with your cries of despair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your mightiest warriors will run into each other
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fall down together.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave the prophet Jeremiah this message about King Nebuchadnezzar’s plans to attack Egypt.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shout it out in Egypt!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Publish it in the cities of Migdol, Memphis,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Noph; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 46:19.
      marker-yv: yv-n
    - type: text
      text: ' and Tahpanhes!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mobilize for battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sword will devour everyone around you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have your warriors fallen?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They cannot stand, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has knocked them down.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stumble and fall over each other
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and say among themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Come, let’s go back to our people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the land of our birth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s get away from the sword of the enemy!’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There they will say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Pharaoh, the king of Egypt, is a loudmouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who missed his opportunity!’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As surely as I live,” says the King,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whose name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “one is coming against Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who is as tall as Mount Tabor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or as Mount Carmel by the sea!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pack up! Get ready to leave for exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you citizens of Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city of Memphis will be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without a single inhabitant.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This message concerning Egypt was given in the fourth year of the reign of Jehoiakim son of Josiah, the king of Judah, on the occasion of the battle of Carchemish
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This event occurred in 605 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ', during the fourth year of Jehoiakim’s reign (according to the calendar system in which the new year begins in the spring).'
      marker-yv: yv-n
    - type: text
      text: ' when Pharaoh Neco, king of Egypt, and his army were defeated beside the Euphrates River by King Nebuchadnezzar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar; also in 46:13, 26.
      marker-yv: yv-n
    - type: text
      text: ' of Babylon.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt is as sleek as a beautiful heifer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a horsefly from the north is on its way!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt’s mercenaries have become like fattened calves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They, too, will turn and run,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for it is a day of great disaster for Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time of great punishment.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt flees, silent as a serpent gliding away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The invading army marches in;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they come against her with axes like woodsmen.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will cut down her people like trees,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “for they are more numerous than locusts.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt will be humiliated;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she will be handed over to people from the north.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, the God of Israel, says: “I will punish Amon, the god of Thebes,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of No.
      marker-yv: yv-n
    - type: text
      text: ' and all the other gods of Egypt. I will punish its rulers and Pharaoh, too, and all who trust in him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will hand them over to those who want them killed—to King Nebuchadnezzar of Babylon and his army. But afterward the land will recover from the ravages of war. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But do not be afraid, Jacob, my servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not be dismayed, Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will bring you home again from distant lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your children will return from their exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 5:20.
      marker-yv: yv-n
    - type: text
      text: ' will return to a life of peace and quiet,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will terrorize them.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid, Jacob, my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I am with you,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will completely destroy the nations to which I have exiled you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will not completely destroy you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will discipline you, but with justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cannot let you go unpunished.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Prepare your shields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and advance into battle!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harness the horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mount the stallions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take your positions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put on your helmets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sharpen your spears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and prepare your armor.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what do I see?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Egyptian army flees in terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bravest of its fighting men run
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without a backward glance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are terrorized at every turn,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The swiftest runners cannot flee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mightiest warriors cannot escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the Euphrates River to the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble and fall.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who is this, rising like the Nile at floodtime,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: overflowing all the land?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the Egyptian army,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: overflowing all the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boasting that it will cover the earth like a flood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying cities and their people.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Charge, you horses and chariots;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attack, you mighty warriors of Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, all you allies from Ethiopia, Libya, and Lydia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Cush, Put, and Lud.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are skilled with the shield and bow!
