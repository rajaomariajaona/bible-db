document_id: REV.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the angel showed me a river with the water of life, clear as crystal, flowing from the throne of God and of the Lamb. '
  '10':
  - type: text
    content: 'Then he instructed me, “Do not seal up the prophetic words in this book, for the time is near. '
  '11':
  - type: text
    content: Let the one who is doing harm continue to do harm; let the one who is vile continue to be vile; let the one who is righteous continue to live righteously; let the one who is holy continue to be holy.”
  '12':
  - type: text
    content: ' '
  - type: text
    content: “Look, I am coming soon, bringing my reward with me to repay all people according to their deeds.
  - type: text
    content: ' '
  '13':
  - type: text
    content: I am the Alpha and the Omega, the First and the Last, the Beginning and the End.”
  '14':
  - type: text
    content: 'Blessed are those who wash their robes. They will be permitted to enter through the gates of the city and eat the fruit from the tree of life. '
  '15':
  - type: text
    content: Outside the city are the dogs—the sorcerers, the sexually immoral, the murderers, the idol worshipers, and all who love to live a lie.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “I, Jesus, have sent my angel to give you this message for the churches. I am both the source of David and the heir to his throne.
  - type: text
    content: ' '
  - type: note
    content: Greek I am the root and offspring of David.
  - type: text
    content: I am the bright morning star.”
  '17':
  - type: text
    content: 'The Spirit and the bride say, “Come.” Let anyone who hears this say, “Come.” Let anyone who is thirsty come. Let anyone who desires drink freely from the water of life. '
  '18':
  - type: text
    content: 'And I solemnly declare to everyone who hears the words of prophecy written in this book: If anyone adds anything to what is written here, God will add to that person the plagues described in this book. '
  '19':
  - type: text
    content: And if anyone removes any of the words from this book of prophecy, God will remove that person’s share in the tree of life and in the holy city that are described in this book.
  '2':
  - type: text
    content: It flowed down the center of the main street. On each side of the river grew a tree of life, bearing twelve crops of fruit,
  - type: note
    content: Or twelve kinds of fruit.
  - type: text
    content: ' with a fresh crop each month. The leaves were used for medicine to heal the nations.'
  '20':
  - type: text
    content: 'He who is the faithful witness to all these things says, '
  - type: text
    content: “Yes, I am coming soon!”
  - type: text
    content: Amen! Come, Lord Jesus!
  '21':
  - type: text
    content: May the grace of the Lord Jesus be with God’s holy people.
  - type: note
    content: Other manuscripts read be with all; still others read be with all of God’s holy people. Some manuscripts add Amen.
  '3':
  - type: text
    content: 'No longer will there be a curse upon anything. For the throne of God and of the Lamb will be there, and his servants will worship him. '
  '4':
  - type: text
    content: 'And they will see his face, and his name will be written on their foreheads. '
  '5':
  - type: text
    content: And there will be no night there—no need for lamps or sun—for the Lord God will shine on them. And they will reign forever and ever.
  '6':
  - type: text
    content: Then the angel said to me, “Everything you have heard and seen is trustworthy and true. The Lord God, who inspires his prophets,
  - type: note
    content: Or The Lord, the God of the spirits of the prophets.
  - type: text
    content: ' has sent his angel to tell his servants what will happen soon.'
  - type: note
    content: Or suddenly, or quickly; also in 22:7, 12, 20.
  - type: text
    content: ”
  - type: heading
    content: Jesus Is Coming
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Look, I am coming soon! Blessed are those who obey the words of prophecy written in this book.
  - type: text
    content: ' '
  - type: note
    content: Or scroll ; also in 22:9, 10, 18, 19.
  - type: text
    content: ”
  '8':
  - type: text
    content: 'I, John, am the one who heard and saw all these things. And when I heard and saw them, I fell down to worship at the feet of the angel who showed them to me. '
  '9':
  - type: text
    content: But he said, “No, don’t worship me. I am a servant of God, just like you and your brothers the prophets, as well as all who obey what is written in this book. Worship only God!”
