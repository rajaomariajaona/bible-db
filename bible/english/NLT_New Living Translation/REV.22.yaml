document_id: REV.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel showed me a river with the water of life, clear as crystal, flowing from the throne of God and of the Lamb. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he instructed me, “Do not seal up the prophetic words in this book, for the time is near. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let the one who is doing harm continue to do harm; let the one who is vile continue to be vile; let the one who is righteous continue to live righteously; let the one who is holy continue to be holy.”
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look, I am coming soon, bringing my reward with me to repay all people according to their deeds.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the Alpha and the Omega, the First and the Last, the Beginning and the End.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed are those who wash their robes. They will be permitted to enter through the gates of the city and eat the fruit from the tree of life. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Outside the city are the dogs—the sorcerers, the sexually immoral, the murderers, the idol worshipers, and all who love to live a lie.
  '16':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I, Jesus, have sent my angel to give you this message for the churches. I am both the source of David and the heir to his throne.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I am the root and offspring of David.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the bright morning star.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit and the bride say, “Come.” Let anyone who hears this say, “Come.” Let anyone who is thirsty come. Let anyone who desires drink freely from the water of life. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I solemnly declare to everyone who hears the words of prophecy written in this book: If anyone adds anything to what is written here, God will add to that person the plagues described in this book. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if anyone removes any of the words from this book of prophecy, God will remove that person’s share in the tree of life and in the holy city that are described in this book.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It flowed down the center of the main street. On each side of the river grew a tree of life, bearing twelve crops of fruit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: twelve kinds of fruit.
      marker-yv: yv-n
    - type: text
      text: ' with a fresh crop each month. The leaves were used for medicine to heal the nations.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who is the faithful witness to all these things says, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, I am coming soon!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amen! Come, Lord Jesus!
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the grace of the Lord Jesus be with God’s holy people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'be with all; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'be with all of God’s holy people. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Amen.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No longer will there be a curse upon anything. For the throne of God and of the Lamb will be there, and his servants will worship him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they will see his face, and his name will be written on their foreheads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there will be no night there—no need for lamps or sun—for the Lord God will shine on them. And they will reign forever and ever.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the angel said to me, “Everything you have heard and seen is trustworthy and true. The Lord God, who inspires his prophets,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The Lord, the God of the spirits of the prophets.
      marker-yv: yv-n
    - type: text
      text: ' has sent his angel to tell his servants what will happen soon.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suddenly
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quickly; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 22:7, 12, 20.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Coming
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look, I am coming soon! Blessed are those who obey the words of prophecy written in this book.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: scroll
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in 22:9, 10, 18, 19.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, John, am the one who heard and saw all these things. And when I heard and saw them, I fell down to worship at the feet of the angel who showed them to me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he said, “No, don’t worship me. I am a servant of God, just like you and your brothers the prophets, as well as all who obey what is written in this book. Worship only God!”
