document_id: 2CH.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Celebrates Passover
  - type: text
    content: 'Then Josiah announced that the Passover of the '
  - type: text
    content: Lord
  - type: text
    content: ' would be celebrated in Jerusalem, and so the Passover lamb was slaughtered on the fourteenth day of the first month.'
  - type: note
    content: This day in the ancient Hebrew lunar calendar was April 5, 622 b.c.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'When everything was ready for the Passover celebration, the priests and the Levites took their places, organized by their divisions, as the king had commanded. '
  '11':
  - type: text
    content: 'The Levites then slaughtered the Passover lambs and presented the blood to the priests, who sprinkled the blood on the altar while the Levites prepared the animals. '
  '12':
  - type: text
    content: 'They divided the burnt offerings among the people by their family groups, so they could offer them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as prescribed in the Book of Moses. They did the same with the cattle. '
  '13':
  - type: text
    content: Then they roasted the Passover lambs as prescribed; and they boiled the holy offerings in pots, kettles, and pans, and brought them out quickly so the people could eat them.
  '14':
  - type: text
    content: Afterward the Levites prepared Passover offerings for themselves and for the priests—the descendants of Aaron—because the priests had been busy from morning till night offering the burnt offerings and the fat portions. The Levites took responsibility for all these preparations.
  '15':
  - type: text
    content: The musicians, descendants of Asaph, were in their assigned places, following the commands that had been given by David, Asaph, Heman, and Jeduthun, the king’s seer. The gatekeepers guarded the gates and did not need to leave their posts of duty, for their Passover offerings were prepared for them by their fellow Levites.
  '16':
  - type: text
    content: 'The entire ceremony for the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover was completed that day. All the burnt offerings were sacrificed on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', as King Josiah had commanded. '
  '17':
  - type: text
    content: 'All the Israelites present in Jerusalem celebrated Passover and the Festival of Unleavened Bread for seven days. '
  '18':
  - type: text
    content: 'Never since the time of the prophet Samuel had there been such a Passover. None of the kings of Israel had ever kept a Passover as Josiah did, involving all the priests and Levites, all the people of Jerusalem, and people from all over Judah and Israel. '
  '19':
  - type: text
    content: This Passover was celebrated in the eighteenth year of Josiah’s reign.
  - type: heading
    content: Josiah Dies in Battle
  '2':
  - type: text
    content: 'Josiah also assigned the priests to their duties and encouraged them in their work at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: After Josiah had finished restoring the Temple, King Neco of Egypt led his army up from Egypt to do battle at Carchemish on the Euphrates River, and Josiah and his army marched out to fight him.
  - type: note
    content: Or Josiah went out to meet him.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'But King Neco sent messengers to Josiah with this message:'
  - type: text
    content: “What do you want with me, king of Judah? I have no quarrel with you today! I am on my way to fight another nation, and God has told me to hurry! Do not interfere with God, who is with me, or he will destroy you.”
  '22':
  - type: text
    content: 'But Josiah refused to listen to Neco, to whom God had indeed spoken, and he would not turn back. Instead, he disguised himself and led his army into battle on the plain of Megiddo. '
  '23':
  - type: text
    content: But the enemy archers hit King Josiah with their arrows and wounded him. He cried out to his men, “Take me from the battle, for I am badly wounded!”
  '24':
  - type: text
    content: 'So they lifted Josiah out of his chariot and placed him in another chariot. Then they brought him back to Jerusalem, where he died. He was buried there in the royal cemetery. And all Judah and Jerusalem mourned for him. '
  '25':
  - type: text
    content: 'The prophet Jeremiah composed funeral songs for Josiah, and to this day choirs still sing these sad songs about his death. These songs of sorrow have become a tradition and are recorded in '
  - type: text
    content: The Book of Laments.
  '26':
  - type: text
    content: 'The rest of the events of Josiah’s reign and his acts of devotion (carried out according to what was written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '), '
  '27':
  - type: text
    content: 'from beginning to end—all are recorded in '
  - type: text
    content: The Book of the Kings of Israel and Judah.
  '3':
  - type: text
    content: 'He issued this order to the Levites, who were to teach all Israel and who had been set apart to serve the '
  - type: text
    content: Lord
  - type: text
    content: ': “Put the holy Ark in the Temple that was built by Solomon son of David, the king of Israel. You no longer need to carry it back and forth on your shoulders. Now spend your time serving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and his people Israel. '
  '4':
  - type: text
    content: Report for duty according to the family divisions of your ancestors, following the directions of King David of Israel and the directions of his son Solomon.
  '5':
  - type: text
    content: '“Then stand in the sanctuary at the place appointed for your family division and help the families assigned to you as they bring their offerings to the Temple. '
  '6':
  - type: text
    content: 'Slaughter the Passover lambs, purify yourselves, and prepare to help those who come. Follow all the directions that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave through Moses.”'
  '7':
  - type: text
    content: 'Then Josiah provided 30,000 lambs and young goats for the people’s Passover offerings, along with 3,000 cattle, all from the king’s own flocks and herds. '
  '8':
  - type: text
    content: 'The king’s officials also made willing contributions to the people, priests, and Levites. Hilkiah, Zechariah, and Jehiel, the administrators of God’s Temple, gave the priests 2,600 lambs and young goats and 300 cattle as Passover offerings. '
  '9':
  - type: text
    content: The Levite leaders—Conaniah and his brothers Shemaiah and Nethanel, as well as Hashabiah, Jeiel, and Jozabad—gave 5,000 lambs and young goats and 500 cattle to the Levites for their Passover offerings.
