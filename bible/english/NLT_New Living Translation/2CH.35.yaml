document_id: 2CH.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josiah Celebrates Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Josiah announced that the Passover of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would be celebrated in Jerusalem, and so the Passover lamb was slaughtered on the fourteenth day of the first month.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This day in the ancient Hebrew lunar calendar was April 5, 622 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Josiah also assigned the priests to their duties and encouraged them in their work at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He issued this order to the Levites, who were to teach all Israel and who had been set apart to serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': “Put the holy Ark in the Temple that was built by Solomon son of David, the king of Israel. You no longer need to carry it back and forth on your shoulders. Now spend your time serving the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God and his people Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Report for duty according to the family divisions of your ancestors, following the directions of King David of Israel and the directions of his son Solomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Then stand in the sanctuary at the place appointed for your family division and help the families assigned to you as they bring their offerings to the Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Slaughter the Passover lambs, purify yourselves, and prepare to help those who come. Follow all the directions that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave through Moses.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Josiah provided 30,000 lambs and young goats for the people’s Passover offerings, along with 3,000 cattle, all from the king’s own flocks and herds. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The king’s officials also made willing contributions to the people, priests, and Levites. Hilkiah, Zechariah, and Jehiel, the administrators of God’s Temple, gave the priests 2,600 lambs and young goats and 300 cattle as Passover offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Levite leaders—Conaniah and his brothers Shemaiah and Nethanel, as well as Hashabiah, Jeiel, and Jozabad—gave 5,000 lambs and young goats and 500 cattle to the Levites for their Passover offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When everything was ready for the Passover celebration, the priests and the Levites took their places, organized by their divisions, as the king had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The Levites then slaughtered the Passover lambs and presented the blood to the priests, who sprinkled the blood on the altar while the Levites prepared the animals. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They divided the burnt offerings among the people by their family groups, so they could offer them to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as prescribed in the Book of Moses. They did the same with the cattle. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they roasted the Passover lambs as prescribed; and they boiled the holy offerings in pots, kettles, and pans, and brought them out quickly so the people could eat them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Afterward the Levites prepared Passover offerings for themselves and for the priests—the descendants of Aaron—because the priests had been busy from morning till night offering the burnt offerings and the fat portions. The Levites took responsibility for all these preparations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The musicians, descendants of Asaph, were in their assigned places, following the commands that had been given by David, Asaph, Heman, and Jeduthun, the king’s seer. The gatekeepers guarded the gates and did not need to leave their posts of duty, for their Passover offerings were prepared for them by their fellow Levites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The entire ceremony for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover was completed that day. All the burnt offerings were sacrificed on the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as King Josiah had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All the Israelites present in Jerusalem celebrated Passover and the Festival of Unleavened Bread for seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Never since the time of the prophet Samuel had there been such a Passover. None of the kings of Israel had ever kept a Passover as Josiah did, involving all the priests and Levites, all the people of Jerusalem, and people from all over Judah and Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: This Passover was celebrated in the eighteenth year of Josiah’s reign.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josiah Dies in Battle
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: After Josiah had finished restoring the Temple, King Neco of Egypt led his army up from Egypt to do battle at Carchemish on the Euphrates River, and Josiah and his army marched out to fight him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Josiah went out to meet him.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But King Neco sent messengers to Josiah with this message:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “What do you want with me, king of Judah? I have no quarrel with you today! I am on my way to fight another nation, and God has told me to hurry! Do not interfere with God, who is with me, or he will destroy you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Josiah refused to listen to Neco, to whom God had indeed spoken, and he would not turn back. Instead, he disguised himself and led his army into battle on the plain of Megiddo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But the enemy archers hit King Josiah with their arrows and wounded him. He cried out to his men, “Take me from the battle, for I am badly wounded!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they lifted Josiah out of his chariot and placed him in another chariot. Then they brought him back to Jerusalem, where he died. He was buried there in the royal cemetery. And all Judah and Jerusalem mourned for him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The prophet Jeremiah composed funeral songs for Josiah, and to this day choirs still sing these sad songs about his death. These songs of sorrow have become a tradition and are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of Laments.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The rest of the events of Josiah’s reign and his acts of devotion (carried out according to what was written in the Law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '), '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'from beginning to end—all are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Israel and Judah.
