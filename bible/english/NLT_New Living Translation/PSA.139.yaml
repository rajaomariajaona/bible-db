document_id: PSA.139
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have examined my heart'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and know everything about me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You know when I sit down or stand up.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You know my thoughts even when I’m far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You see me when I travel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when I rest at home.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You know everything I do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You know what I am going to say
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'even before I say it, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You go before me and follow me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You place your hand of blessing on my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Such knowledge is too wonderful for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: too great for me to understand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I can never escape from your Spirit!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can never get away from your presence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If I go up to heaven, you are there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I go down to the grave,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '139:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
  - type: text
    text: ' you are there.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If I ride the wings of the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I dwell by the farthest oceans,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: even there your hand will guide me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your strength will support me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I could ask the darkness to hide me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the light around me to become night—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: but even in darkness I cannot hide from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To you the night shines as bright as day.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Darkness and light are the same to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You made all the delicate, inner parts of my body
- type: usfm
  marker: q2
  children:
  - type: text
    text: and knit me together in my mother’s womb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thank you for making me so wonderfully complex!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your workmanship is marvelous—how well I know it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You watched me as I was being formed in utter seclusion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I was woven together in the dark of the womb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You saw me before I was born.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every day of my life was recorded in your book.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every moment was laid out
- type: usfm
  marker: q2
  children:
  - type: text
    text: before a single day had passed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: How precious are your thoughts about me,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '139:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: How precious to me are your thoughts.
    marker-yv: yv-n
  - type: text
    text: ' O God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They cannot be numbered!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I can’t even count them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they outnumber the grains of sand!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when I wake up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are still with me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O God, if only you would destroy the wicked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get out of my life, you murderers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They blaspheme you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your enemies misuse your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', shouldn’t I hate those who hate you?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shouldn’t I despise those who oppose you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Yes, I hate them with total hatred,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your enemies are my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Search me, O God, and know my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: test me and know my anxious thoughts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Point out anything in me that offends you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lead me along the path of everlasting life.
