document_id: PSA.139,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you have examined my heart'
  - type: text
    content: and know everything about me.
  '10':
  - type: text
    content: even there your hand will guide me,
  - type: text
    content: and your strength will support me.
  '11':
  - type: text
    content: I could ask the darkness to hide me
  - type: text
    content: and the light around me to become night—
  '12':
  - type: text
    content: but even in darkness I cannot hide from you.
  - type: text
    content: To you the night shines as bright as day.
  - type: text
    content: Darkness and light are the same to you.
  '13':
  - type: text
    content: You made all the delicate, inner parts of my body
  - type: text
    content: and knit me together in my mother’s womb.
  '14':
  - type: text
    content: Thank you for making me so wonderfully complex!
  - type: text
    content: Your workmanship is marvelous—how well I know it.
  '15':
  - type: text
    content: You watched me as I was being formed in utter seclusion,
  - type: text
    content: as I was woven together in the dark of the womb.
  '16':
  - type: text
    content: You saw me before I was born.
  - type: text
    content: Every day of my life was recorded in your book.
  - type: text
    content: Every moment was laid out
  - type: text
    content: before a single day had passed.
  '17':
  - type: text
    content: How precious are your thoughts about me,
  - type: note
    content: Or How precious to me are your thoughts.
  - type: text
    content: ' O God.'
  - type: text
    content: They cannot be numbered!
  '18':
  - type: text
    content: I can’t even count them;
  - type: text
    content: they outnumber the grains of sand!
  - type: text
    content: And when I wake up,
  - type: text
    content: you are still with me!
  '19':
  - type: text
    content: O God, if only you would destroy the wicked!
  - type: text
    content: Get out of my life, you murderers!
  '2':
  - type: text
    content: You know when I sit down or stand up.
  - type: text
    content: You know my thoughts even when I’m far away.
  '20':
  - type: text
    content: They blaspheme you;
  - type: text
    content: your enemies misuse your name.
  '21':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', shouldn’t I hate those who hate you?'
  - type: text
    content: Shouldn’t I despise those who oppose you?
  '22':
  - type: text
    content: Yes, I hate them with total hatred,
  - type: text
    content: for your enemies are my enemies.
  '23':
  - type: text
    content: Search me, O God, and know my heart;
  - type: text
    content: test me and know my anxious thoughts.
  '24':
  - type: text
    content: Point out anything in me that offends you,
  - type: text
    content: and lead me along the path of everlasting life.
  '3':
  - type: text
    content: You see me when I travel
  - type: text
    content: and when I rest at home.
  - type: text
    content: You know everything I do.
  '4':
  - type: text
    content: You know what I am going to say
  - type: text
    content: 'even before I say it, '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: You go before me and follow me.
  - type: text
    content: You place your hand of blessing on my head.
  '6':
  - type: text
    content: Such knowledge is too wonderful for me,
  - type: text
    content: too great for me to understand!
  '7':
  - type: text
    content: I can never escape from your Spirit!
  - type: text
    content: I can never get away from your presence!
  '8':
  - type: text
    content: If I go up to heaven, you are there;
  - type: text
    content: if I go down to the grave,
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: ' you are there.'
  '9':
  - type: text
    content: If I ride the wings of the morning,
  - type: text
    content: if I dwell by the farthest oceans,
