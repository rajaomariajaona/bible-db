document_id: PSA.122,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was glad when they said to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Let us go to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now here we are,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: standing inside your gates, O Jerusalem.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem is a well-built city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its seamless walls cannot be breached.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All the tribes of Israel—the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s people—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make their pilgrimage here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They come to give thanks to the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the law requires of Israel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here stand the thrones where judgment is given,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thrones of the dynasty of David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pray for peace in Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May all who love this city prosper.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem, may there be peace within your walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and prosperity in your palaces.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sake of my family and friends, I will say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “May you have peace.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the sake of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will seek what is best for you, O Jerusalem.
