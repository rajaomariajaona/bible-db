document_id: PSA.122,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem. A psalm of David.
  - type: text
    content: I was glad when they said to me,
  - type: text
    content: '“Let us go to the house of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: And now here we are,
  - type: text
    content: standing inside your gates, O Jerusalem.
  '3':
  - type: text
    content: Jerusalem is a well-built city;
  - type: text
    content: its seamless walls cannot be breached.
  '4':
  - type: text
    content: 'All the tribes of Israel—the '
  - type: text
    content: Lord
  - type: text
    content: ’s people—
  - type: text
    content: make their pilgrimage here.
  - type: text
    content: 'They come to give thanks to the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: as the law requires of Israel.
  '5':
  - type: text
    content: Here stand the thrones where judgment is given,
  - type: text
    content: the thrones of the dynasty of David.
  '6':
  - type: text
    content: Pray for peace in Jerusalem.
  - type: text
    content: May all who love this city prosper.
  '7':
  - type: text
    content: O Jerusalem, may there be peace within your walls
  - type: text
    content: and prosperity in your palaces.
  '8':
  - type: text
    content: For the sake of my family and friends, I will say,
  - type: text
    content: “May you have peace.”
  '9':
  - type: text
    content: 'For the sake of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: I will seek what is best for you, O Jerusalem.
