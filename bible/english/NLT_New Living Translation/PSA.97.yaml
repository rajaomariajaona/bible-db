document_id: PSA.97,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is king!'
  - type: text
    content: Let the earth rejoice!
  - type: text
    content: Let the farthest coastlands be glad.
  '10':
  - type: text
    content: 'You who love the '
  - type: text
    content: Lord
  - type: text
    content: ', hate evil!'
  - type: text
    content: He protects the lives of his godly people
  - type: text
    content: and rescues them from the power of the wicked.
  '11':
  - type: text
    content: Light shines on the godly,
  - type: text
    content: and joy on those whose hearts are right.
  '12':
  - type: text
    content: 'May all who are godly rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: and praise his holy name!
  '2':
  - type: text
    content: Dark clouds surround him.
  - type: text
    content: Righteousness and justice are the foundation of his throne.
  '3':
  - type: text
    content: Fire spreads ahead of him
  - type: text
    content: and burns up all his foes.
  '4':
  - type: text
    content: His lightning flashes out across the world.
  - type: text
    content: The earth sees and trembles.
  '5':
  - type: text
    content: 'The mountains melt like wax before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: before the Lord of all the earth.
  '6':
  - type: text
    content: The heavens proclaim his righteousness;
  - type: text
    content: every nation sees his glory.
  '7':
  - type: text
    content: Those who worship idols are disgraced—
  - type: text
    content: all who brag about their worthless gods—
  - type: text
    content: for every god must bow to him.
  '8':
  - type: text
    content: Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' has heard and rejoiced,'
  - type: text
    content: and all the towns of Judah are glad
  - type: text
    content: 'because of your justice, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '9':
  - type: text
    content: 'For you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are supreme over all the earth;'
  - type: text
    content: you are exalted far above all gods.
