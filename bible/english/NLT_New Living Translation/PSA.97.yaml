document_id: PSA.97
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is king!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the earth rejoice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the farthest coastlands be glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dark clouds surround him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Righteousness and justice are the foundation of his throne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fire spreads ahead of him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and burns up all his foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His lightning flashes out across the world.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The earth sees and trembles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The mountains melt like wax before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the Lord of all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The heavens proclaim his righteousness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every nation sees his glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Those who worship idols are disgraced—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who brag about their worthless gods—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for every god must bow to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '97:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
  - type: text
    text: ' has heard and rejoiced,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the towns of Judah are glad
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because of your justice, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', are supreme over all the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are exalted far above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You who love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', hate evil!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He protects the lives of his godly people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rescues them from the power of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Light shines on the godly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and joy on those whose hearts are right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'May all who are godly rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and praise his holy name!
