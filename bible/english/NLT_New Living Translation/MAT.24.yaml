document_id: MAT.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Speaks about the Future
  - type: text
    content: 'As Jesus was leaving the Temple grounds, his disciples pointed out to him the various Temple buildings. '
  '10':
  - type: text
    content: And many will turn away from me and betray and hate each other.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And many false prophets will appear and will deceive many people.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Sin will be rampant everywhere, and the love of many will grow cold.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But the one who endures to the end will be saved.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And the Good News about the Kingdom will be preached throughout the whole world, so that all nations
  - type: note
    content: Or all peoples.
  - type: text
    content: ' '
  - type: text
    content: will hear it; and then the end will come.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “The day is coming when you will see what Daniel the prophet spoke about—the sacrilegious object that causes desecration
  - type: text
    content: ' '
  - type: note
    content: Greek the abomination of desolation. See Dan 9:27; 11:31; 12:11.
  - type: text
    content: standing in the Holy Place.”
  - type: text
    content: ' (Reader, pay attention!) '
  '16':
  - type: text
    content: “Then those in Judea must flee to the hills.
  - type: text
    content: ' '
  '17':
  - type: text
    content: A person out on the deck of a roof must not go down into the house to pack.
  - type: text
    content: ' '
  '18':
  - type: text
    content: A person out in the field must not return even to get a coat.
  - type: text
    content: ' '
  '19':
  - type: text
    content: How terrible it will be for pregnant women and for nursing mothers in those days.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'But he responded, '
  - type: text
    content: “Do you see all these buildings? I tell you the truth, they will be completely demolished. Not one stone will be left on top of another!”
  '20':
  - type: text
    content: And pray that your flight will not be in winter or on the Sabbath.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For there will be greater anguish than at any time since the world began. And it will never be so great again.
  - type: text
    content: ' '
  '22':
  - type: text
    content: In fact, unless that time of calamity is shortened, not a single person will survive. But it will be shortened for the sake of God’s chosen ones.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Then if anyone tells you, ‘Look, here is the Messiah,’ or ‘There he is,’ don’t believe it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For false messiahs and false prophets will rise up and perform great signs and wonders so as to deceive, if possible, even God’s chosen ones.
  - type: text
    content: ' '
  '25':
  - type: text
    content: See, I have warned you about this ahead of time.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “So if someone tells you, ‘Look, the Messiah is out in the desert,’ don’t bother to go and look. Or, ‘Look, he is hiding here,’ don’t believe it!
  - type: text
    content: ' '
  '27':
  - type: text
    content: For as the lightning flashes in the east and shines to the west, so it will be when the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: comes.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Just as the gathering of vultures shows there is a carcass nearby, so these signs indicate that the end is near.
  - type: note
    content: Greek Wherever the carcass is, the vultures gather.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Immediately after the anguish of those days,
  - type: text
    content: the sun will be darkened,
  - type: text
    content: the moon will give no light,
  - type: text
    content: the stars will fall from the sky,
  - type: text
    content: and the powers in the heavens will be shaken.
  - type: note
    content: See Isa 13:10; 34:4; Joel 2:10.
  '3':
  - type: text
    content: Later, Jesus sat on the Mount of Olives. His disciples came to him privately and said, “Tell us, when will all this happen? What sign will signal your return and the end of the world?
  - type: note
    content: Or the age?
  - type: text
    content: ”
  '30':
  - type: text
    content: ' '
  - type: text
    content: And then at last, the sign that the Son of Man is coming will appear in the heavens, and there will be deep mourning among all the peoples of the earth. And they will see the Son of Man coming on the clouds of heaven with power and great glory.
  - type: text
    content: ' '
  - type: note
    content: See Dan 7:13.
  '31':
  - type: text
    content: And he will send out his angels with the mighty blast of a trumpet, and they will gather his chosen ones from all over the world
  - type: note
    content: Greek from the four winds.
  - type: text
    content: —from the farthest ends of the earth and heaven.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “Now learn a lesson from the fig tree. When its branches bud and its leaves begin to sprout, you know that summer is near.
  - type: text
    content: ' '
  '33':
  - type: text
    content: In the same way, when you see all these things, you can know his return is very near, right at the door.
  - type: text
    content: ' '
  '34':
  - type: text
    content: I tell you the truth, this generation
  - type: note
    content: Or this age, or this nation.
  - type: text
    content: ' '
  - type: text
    content: will not pass from the scene until all these things take place.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Heaven and earth will disappear, but my words will never disappear.
  '36':
  - type: text
    content: ' '
  - type: text
    content: “However, no one knows the day or hour when these things will happen, not even the angels in heaven or the Son himself.
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts do not include or the Son himself.
  - type: text
    content: Only the Father knows.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “When the Son of Man returns, it will be like it was in Noah’s day.
  - type: text
    content: ' '
  '38':
  - type: text
    content: In those days before the flood, the people were enjoying banquets and parties and weddings right up to the time Noah entered his boat.
  - type: text
    content: ' '
  '39':
  - type: text
    content: People didn’t realize what was going to happen until the flood came and swept them all away. That is the way it will be when the Son of Man comes.
  '4':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “Don’t let anyone mislead you,
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: “Two men will be working together in the field; one will be taken, the other left.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Two women will be grinding flour at the mill; one will be taken, the other left.
  '42':
  - type: text
    content: ' '
  - type: text
    content: “So you, too, must keep watch! For you don’t know what day your Lord is coming.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Understand this: If a homeowner knew exactly when a burglar was coming, he would keep watch and not permit his house to be broken into.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: You also must be ready all the time, for the Son of Man will come when least expected.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “A faithful, sensible servant is one to whom the master can give the responsibility of managing his other household servants and feeding them.
  - type: text
    content: ' '
  '46':
  - type: text
    content: If the master returns and finds that the servant has done a good job, there will be a reward.
  - type: text
    content: ' '
  '47':
  - type: text
    content: I tell you the truth, the master will put that servant in charge of all he owns.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But what if the servant is evil and thinks, ‘My master won’t be back for a while,’
  - type: text
    content: ' '
  '49':
  - type: text
    content: and he begins beating the other servants, partying, and getting drunk?
  - type: text
    content: ' '
  '5':
  - type: text
    content: for many will come in my name, claiming, ‘I am the Messiah.’ They will deceive many.
  - type: text
    content: ' '
  '50':
  - type: text
    content: The master will return unannounced and unexpected,
  - type: text
    content: ' '
  '51':
  - type: text
    content: and he will cut the servant to pieces and assign him a place with the hypocrites. In that place there will be weeping and gnashing of teeth.
  '6':
  - type: text
    content: And you will hear of wars and threats of wars, but don’t panic. Yes, these things must take place, but the end won’t follow immediately.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Nation will go to war against nation, and kingdom against kingdom. There will be famines and earthquakes in many parts of the world.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But all this is only the first of the birth pains, with more to come.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “Then you will be arrested, persecuted, and killed. You will be hated all over the world because you are my followers.
  - type: text
    content: ' '
  - type: note
    content: Greek on account of my name.
