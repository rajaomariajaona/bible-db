document_id: HOS.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hosea’s Wife Is Redeemed
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go and love your wife again, even though she'
  - type: note
    content: Or Go and love a woman who.
  - type: text
    content: ' commits adultery with another lover. This will illustrate that the '
  - type: text
    content: Lord
  - type: text
    content: ' still loves Israel, even though the people have turned to other gods and love to worship them.'
  - type: note
    content: Hebrew love their raisin cakes.
  - type: text
    content: ”
  '2':
  - type: text
    content: So I bought her back for fifteen pieces of silver
  - type: note
    content: Hebrew 15 [shekels] of silver, about 6 ounces or 171 grams in weight.
  - type: text
    content: ' and five bushels of barley and a measure of wine.'
  - type: note
    content: As in Greek version, which reads a homer of barley and a wineskin full of wine; Hebrew reads a homer [5 bushels or 220 liters] of barley and a lethek [2.5 bushels or 110 liters] of barley.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Then I said to her, “You must live in my house for many days and stop your prostitution. During this time, you will not have sexual relations with anyone, not even with me.
  - type: note
    content: Or and I will live with you.
  - type: text
    content: ”
  '4':
  - type: text
    content: This shows that Israel will go a long time without a king or prince, and without sacrifices, sacred pillars, priests,
  - type: note
    content: Hebrew ephod, the vest worn by the priest.
  - type: text
    content: ' or even idols! '
  '5':
  - type: text
    content: 'But afterward the people will return and devote themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and to David’s descendant, their king.'
  - type: note
    content: Hebrew to David their king.
  - type: text
    content: ' In the last days, they will tremble in awe of the '
  - type: text
    content: Lord
  - type: text
    content: ' and of his goodness.'
