document_id: JER.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Potter and the Clay
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave another message to Jeremiah. He said, '
  '10':
  - type: text
    content: but then that nation turns to evil and refuses to obey me, I will not bless it as I said I would.
  '11':
  - type: text
    content: '“Therefore, Jeremiah, go and warn all Judah and Jerusalem. Say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am planning disaster for you instead of good. So turn from your evil ways, each of you, and do what is right.’”'
  '12':
  - type: text
    content: But the people replied, “Don’t waste your breath. We will continue to live as we want to, stubbornly following our own evil desires.”
  '13':
  - type: text
    content: 'So this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Has anyone ever heard of such a thing,
  - type: text
    content: even among the pagan nations?
  - type: text
    content: My virgin daughter Israel
  - type: text
    content: has done something terrible!
  '14':
  - type: text
    content: Does the snow ever disappear from the mountaintops of Lebanon?
  - type: text
    content: Do the cold streams flowing from those distant mountains ever run dry?
  '15':
  - type: text
    content: But my people are not so reliable, for they have deserted me;
  - type: text
    content: they burn incense to worthless idols.
  - type: text
    content: They have stumbled off the ancient highways
  - type: text
    content: and walk in muddy paths.
  '16':
  - type: text
    content: Therefore, their land will become desolate,
  - type: text
    content: a monument to their stupidity.
  - type: text
    content: All who pass by will be astonished
  - type: text
    content: and will shake their heads in amazement.
  '17':
  - type: text
    content: I will scatter my people before their enemies
  - type: text
    content: as the east wind scatters dust.
  - type: text
    content: And in all their trouble I will turn my back on them
  - type: text
    content: and refuse to notice their distress.”
  - type: heading
    content: A Plot against Jeremiah
  '18':
  - type: text
    content: Then the people said, “Come on, let’s plot a way to stop Jeremiah. We have plenty of priests and wise men and prophets. We don’t need him to teach the word and give us advice and prophecies. Let’s spread rumors about him and ignore what he says.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', hear me and help me!'
  - type: text
    content: Listen to what my enemies are saying.
  '2':
  - type: text
    content: '“Go down to the potter’s shop, and I will speak to you there.” '
  '20':
  - type: text
    content: Should they repay evil for good?
  - type: text
    content: They have dug a pit to kill me,
  - type: text
    content: though I pleaded for them
  - type: text
    content: and tried to protect them from your anger.
  '21':
  - type: text
    content: So let their children starve!
  - type: text
    content: Let them die by the sword!
  - type: text
    content: Let their wives become childless widows.
  - type: text
    content: Let their old men die in a plague,
  - type: text
    content: and let their young men be killed in battle!
  '22':
  - type: text
    content: Let screaming be heard from their homes
  - type: text
    content: as warriors come suddenly upon them.
  - type: text
    content: For they have dug a pit for me
  - type: text
    content: and have hidden traps along my path.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you know all about their murderous plots against me.'
  - type: text
    content: Don’t forgive their crimes and blot out their sins.
  - type: text
    content: Let them die before you.
  - type: text
    content: Deal with them in your anger.
  '3':
  - type: text
    content: 'So I did as he told me and found the potter working at his wheel. '
  '4':
  - type: text
    content: But the jar he was making did not turn out as he had hoped, so he crushed it into a lump of clay again and started over.
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me this message: '
  '6':
  - type: text
    content: '“O Israel, can I not do to you as this potter has done to his clay? As the clay is in the potter’s hand, so are you in my hand. '
  '7':
  - type: text
    content: 'If I announce that a certain nation or kingdom is to be uprooted, torn down, and destroyed, '
  '8':
  - type: text
    content: 'but then that nation renounces its evil ways, I will not destroy it as I had planned. '
  '9':
  - type: text
    content: 'And if I announce that I will plant and build up a certain nation or kingdom, '
