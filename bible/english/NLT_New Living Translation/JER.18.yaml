document_id: JER.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Potter and the Clay
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave another message to Jeremiah. He said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go down to the potter’s shop, and I will speak to you there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So I did as he told me and found the potter working at his wheel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But the jar he was making did not turn out as he had hoped, so he crushed it into a lump of clay again and started over.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me this message: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“O Israel, can I not do to you as this potter has done to his clay? As the clay is in the potter’s hand, so are you in my hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If I announce that a certain nation or kingdom is to be uprooted, torn down, and destroyed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but then that nation renounces its evil ways, I will not destroy it as I had planned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if I announce that I will plant and build up a certain nation or kingdom, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: but then that nation turns to evil and refuses to obey me, I will not bless it as I said I would.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Therefore, Jeremiah, go and warn all Judah and Jerusalem. Say to them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am planning disaster for you instead of good. So turn from your evil ways, each of you, and do what is right.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the people replied, “Don’t waste your breath. We will continue to live as we want to, stubbornly following our own evil desires.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Has anyone ever heard of such a thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even among the pagan nations?
- type: usfm
  marker: q1
  children:
  - type: text
    text: My virgin daughter Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: has done something terrible!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Does the snow ever disappear from the mountaintops of Lebanon?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do the cold streams flowing from those distant mountains ever run dry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But my people are not so reliable, for they have deserted me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they burn incense to worthless idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have stumbled off the ancient highways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and walk in muddy paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore, their land will become desolate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a monument to their stupidity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who pass by will be astonished
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will shake their heads in amazement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will scatter my people before their enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the east wind scatters dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in all their trouble I will turn my back on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refuse to notice their distress.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Plot against Jeremiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the people said, “Come on, let’s plot a way to stop Jeremiah. We have plenty of priests and wise men and prophets. We don’t need him to teach the word and give us advice and prophecies. Let’s spread rumors about him and ignore what he says.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', hear me and help me!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to what my enemies are saying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Should they repay evil for good?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have dug a pit to kill me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: though I pleaded for them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tried to protect them from your anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So let their children starve!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them die by the sword!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let their wives become childless widows.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let their old men die in a plague,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let their young men be killed in battle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Let screaming be heard from their homes
- type: usfm
  marker: q2
  children:
  - type: text
    text: as warriors come suddenly upon them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have dug a pit for me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have hidden traps along my path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you know all about their murderous plots against me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t forgive their crimes and blot out their sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them die before you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deal with them in your anger.
