document_id: JHN.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: “I have told you these things so that you won’t abandon your faith.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Righteousness is available because I go to the Father, and you will see me no more.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Judgment will come because the ruler of this world has already been judged.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “There is so much more I want to tell you, but you can’t bear it now.
  - type: text
    content: ' '
  '13':
  - type: text
    content: When the Spirit of truth comes, he will guide you into all truth. He will not speak on his own but will tell you what he has heard. He will tell you about the future.
  - type: text
    content: ' '
  '14':
  - type: text
    content: He will bring me glory by telling you whatever he receives from me.
  - type: text
    content: ' '
  '15':
  - type: text
    content: All that belongs to the Father is mine; this is why I said, ‘The Spirit will tell you whatever he receives from me.’
  - type: heading
    content: Sadness Will Be Turned to Joy
  '16':
  - type: text
    content: ' '
  - type: text
    content: “In a little while you won’t see me anymore. But a little while after that, you will see me again.”
  '17':
  - type: text
    content: 'Some of the disciples asked each other, “What does he mean when he says, ‘In a little while you won’t see me, but then you will see me,’ and ‘I am going to the Father’? '
  '18':
  - type: text
    content: And what does he mean by ‘a little while’? We don’t understand.”
  '19':
  - type: text
    content: 'Jesus realized they wanted to ask him about it, so he said, '
  - type: text
    content: “Are you asking yourselves what I meant? I said in a little while you won’t see me, but a little while after that you will see me again.
  - type: text
    content: ' '
  '2':
  - type: text
    content: For you will be expelled from the synagogues, and the time is coming when those who kill you will think they are doing a holy service for God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: I tell you the truth, you will weep and mourn over what is going to happen to me, but the world will rejoice. You will grieve, but your grief will suddenly turn to wonderful joy.
  - type: text
    content: ' '
  '21':
  - type: text
    content: It will be like a woman suffering the pains of labor. When her child is born, her anguish gives way to joy because she has brought a new baby into the world.
  - type: text
    content: ' '
  '22':
  - type: text
    content: So you have sorrow now, but I will see you again; then you will rejoice, and no one can rob you of that joy.
  - type: text
    content: ' '
  '23':
  - type: text
    content: At that time you won’t need to ask me for anything. I tell you the truth, you will ask the Father directly, and he will grant your request because you use my name.
  - type: text
    content: ' '
  '24':
  - type: text
    content: You haven’t done this before. Ask, using my name, and you will receive, and you will have abundant joy.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “I have spoken of these matters in figures of speech, but soon I will stop speaking figuratively and will tell you plainly all about the Father.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then you will ask in my name. I’m not saying I will ask the Father on your behalf,
  - type: text
    content: ' '
  '27':
  - type: text
    content: for the Father himself loves you dearly because you love me and believe that I came from God.
  - type: note
    content: Some manuscripts read from the Father.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Yes, I came from the Father into the world, and now I will leave the world and return to the Father.”
  '29':
  - type: text
    content: 'Then his disciples said, “At last you are speaking plainly and not figuratively. '
  '3':
  - type: text
    content: This is because they have never known the Father or me.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Now we understand that you know everything, and there’s no need to question you. From this we believe that you came from God.”
  '31':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “Do you finally believe?
  - type: text
    content: ' '
  '32':
  - type: text
    content: But the time is coming—indeed it’s here now—when you will be scattered, each one going his own way, leaving me alone. Yet I am not alone because the Father is with me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: I have told you all this so that you may have peace in me. Here on earth you will have many trials and sorrows. But take heart, because I have overcome the world.”
  '4':
  - type: text
    content: Yes, I’m telling you these things now, so that when they happen, you will remember my warning. I didn’t tell you earlier because I was going to be with you for a while longer.
  - type: heading
    content: The Work of the Holy Spirit
  '5':
  - type: text
    content: ' '
  - type: text
    content: “But now I am going away to the one who sent me, and not one of you is asking where I am going.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Instead, you grieve because of what I’ve told you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But in fact, it is best for you that I go away, because if I don’t, the Advocate
  - type: note
    content: Or Comforter, or Encourager, or Counselor. Greek reads Paraclete.
  - type: text
    content: ' '
  - type: text
    content: won’t come. If I do go away, then I will send him to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And when he comes, he will convict the world of its sin, and of God’s righteousness, and of the coming judgment.
  - type: text
    content: ' '
  '9':
  - type: text
    content: The world’s sin is that it refuses to believe in me.
  - type: text
    content: ' '
