      text: '1'
  - type: text
    text: 'I took my troubles to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cried out to him, and he answered my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rescue me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from liars'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from all deceitful people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O deceptive tongue, what will God do to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How will he increase your punishment?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You will be pierced with sharp arrows
- type: usfm
  marker: q2
  children:
  - type: text
    text: and burned with glowing coals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: How I suffer in far-off Meshech.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It pains me to live in distant Kedar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am tired of living
- type: usfm
  marker: q2
  children:
  - type: text
    text: among people who hate peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I search for peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when I speak of peace, they want war!
