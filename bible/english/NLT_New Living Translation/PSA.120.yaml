document_id: PSA.120,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: 'I took my troubles to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I cried out to him, and he answered my prayer.
  '2':
  - type: text
    content: 'Rescue me, O '
  - type: text
    content: Lord
  - type: text
    content: ', from liars'
  - type: text
    content: and from all deceitful people.
  '3':
  - type: text
    content: O deceptive tongue, what will God do to you?
  - type: text
    content: How will he increase your punishment?
  '4':
  - type: text
    content: You will be pierced with sharp arrows
  - type: text
    content: and burned with glowing coals.
  '5':
  - type: text
    content: How I suffer in far-off Meshech.
  - type: text
    content: It pains me to live in distant Kedar.
  '6':
  - type: text
    content: I am tired of living
  - type: text
    content: among people who hate peace.
  '7':
  - type: text
    content: I search for peace;
  - type: text
    content: but when I speak of peace, they want war!
