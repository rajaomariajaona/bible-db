document_id: PSA.120,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I took my troubles to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cried out to him, and he answered my prayer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rescue me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', from liars'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from all deceitful people.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O deceptive tongue, what will God do to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How will he increase your punishment?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be pierced with sharp arrows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burned with glowing coals.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How I suffer in far-off Meshech.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It pains me to live in distant Kedar.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am tired of living
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among people who hate peace.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I search for peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but when I speak of peace, they want war!
