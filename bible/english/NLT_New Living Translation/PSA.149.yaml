document_id: PSA.149,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a new song.'
  - type: text
    content: Sing his praises in the assembly of the faithful.
  '2':
  - type: text
    content: O Israel, rejoice in your Maker.
  - type: text
    content: O people of Jerusalem,
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' exult in your King.'
  '3':
  - type: text
    content: Praise his name with dancing,
  - type: text
    content: accompanied by tambourine and harp.
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' delights in his people;'
  - type: text
    content: he crowns the humble with victory.
  '5':
  - type: text
    content: Let the faithful rejoice that he honors them.
  - type: text
    content: Let them sing for joy as they lie on their beds.
  '6':
  - type: text
    content: Let the praises of God be in their mouths,
  - type: text
    content: and a sharp sword in their hands—
  '7':
  - type: text
    content: to execute vengeance on the nations
  - type: text
    content: and punishment on the peoples,
  '8':
  - type: text
    content: to bind their kings with shackles
  - type: text
    content: and their leaders with iron chains,
  '9':
  - type: text
    content: to execute the judgment written against them.
  - type: text
    content: This is the glorious privilege of his faithful ones.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
