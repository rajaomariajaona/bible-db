    - type: text
      text: '4'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' delights in his people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he crowns the humble with victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the faithful rejoice that he honors them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them sing for joy as they lie on their beds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let the praises of God be in their mouths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a sharp sword in their hands—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: to execute vengeance on the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and punishment on the peoples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: to bind their kings with shackles
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their leaders with iron chains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: to execute the judgment written against them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: This is the glorious privilege of his faithful ones.
