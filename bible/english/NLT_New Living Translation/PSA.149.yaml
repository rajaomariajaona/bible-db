document_id: PSA.149,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a new song.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing his praises in the assembly of the faithful.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israel, rejoice in your Maker.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O people of Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '149:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' exult in your King.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise his name with dancing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: accompanied by tambourine and harp.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delights in his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he crowns the humble with victory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the faithful rejoice that he honors them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them sing for joy as they lie on their beds.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the praises of God be in their mouths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a sharp sword in their hands—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to execute vengeance on the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and punishment on the peoples,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bind their kings with shackles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their leaders with iron chains,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to execute the judgment written against them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is the glorious privilege of his faithful ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
