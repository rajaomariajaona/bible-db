      - type: text
        text: Zion.
    marker-yv: yv-n
  - type: text
    text: ' exult in your King.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Praise his name with dancing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: accompanied by tambourine and harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
