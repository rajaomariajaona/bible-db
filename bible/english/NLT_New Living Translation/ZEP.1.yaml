document_id: ZEP.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this message to Zephaniah when Josiah son of Amon was king of Judah. Zephaniah was the son of Cushi, son of Gedaliah, son of Amariah, son of Hezekiah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Coming Judgment against Judah
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“On that day,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “a cry of alarm will come from the Fish Gate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and echo throughout the New Quarter of the city.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Second Quarter, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a newer section of Jerusalem. Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Mishneh.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a great crash will sound from the hills.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail in sorrow, all you who live in the market area,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the valley, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a lower section of Jerusalem. Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Maktesh.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all the merchants and traders will be destroyed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will search with lanterns in Jerusalem’s darkest corners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to punish those who sit complacent in their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They think the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do nothing to them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: either good or bad.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So their property will be plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their homes will be ransacked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will build new homes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but never live in them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will plant vineyards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but never drink wine from them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“That terrible day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Swiftly it comes—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day of bitter tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day when even strong men will cry out.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It will be a day when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger is poured out—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of terrible distress and anguish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day of ruin and desolation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of darkness and gloom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day of clouds and blackness,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of trumpet calls and battle cries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Down go the walled cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the strongest battlements!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Because you have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make you grope around like the blind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your blood will be poured into the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your bodies will lie rotting on the ground.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your silver and gold will not save you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on that day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the whole land will be devoured
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the fire of his jealousy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will make a terrifying end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of all the people on earth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the people living in the land.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will sweep away everything
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the face of the earth,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will sweep away people and animals alike.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sweep away the birds of the sky and the fish in the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will reduce the wicked to heaps of rubble,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I will wipe humanity from the face of the earth,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will crush Judah and Jerusalem with my fist
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy every last trace of their Baal worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put an end to all the idolatrous priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that even the memory of them will disappear.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they go up to their roofs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bow down to the sun, moon, and stars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They claim to follow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but then they worship Molech,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Malcam, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant spelling of Molech; or it could possibly mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: their king.
      marker-yv: yv-n
    - type: text
      text: ' too.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will destroy those who used to worship me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now no longer do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They no longer ask for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s guidance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or seek my blessings.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Stand in silence in the presence of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the awesome day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s judgment is near.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has prepared his people for a great slaughter'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has chosen their executioners.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: has prepared a sacrifice and sanctified his guests.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “On that day of judgment,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will punish the leaders and princes of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all those following pagan customs.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, I will punish those who participate in pagan worship ceremonies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who fill their masters’ houses with violence and deceit.
