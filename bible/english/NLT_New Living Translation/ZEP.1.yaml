document_id: ZEP.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Zephaniah when Josiah son of Amon was king of Judah. Zephaniah was the son of Cushi, son of Gedaliah, son of Amariah, son of Hezekiah.'
  - type: heading
    content: Coming Judgment against Judah
  '10':
  - type: text
    content: '“On that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “a cry of alarm will come from the Fish Gate
  - type: text
    content: and echo throughout the New Quarter of the city.
  - type: note
    content: Or the Second Quarter, a newer section of Jerusalem. Hebrew reads the Mishneh.
  - type: text
    content: And a great crash will sound from the hills.
  '11':
  - type: text
    content: Wail in sorrow, all you who live in the market area,
  - type: note
    content: Or in the valley, a lower section of Jerusalem. Hebrew reads the Maktesh.
  - type: text
    content: for all the merchants and traders will be destroyed.
  '12':
  - type: text
    content: “I will search with lanterns in Jerusalem’s darkest corners
  - type: text
    content: to punish those who sit complacent in their sins.
  - type: text
    content: 'They think the '
  - type: text
    content: Lord
  - type: text
    content: ' will do nothing to them,'
  - type: text
    content: either good or bad.
  '13':
  - type: text
    content: So their property will be plundered,
  - type: text
    content: their homes will be ransacked.
  - type: text
    content: They will build new homes
  - type: text
    content: but never live in them.
  - type: text
    content: They will plant vineyards
  - type: text
    content: but never drink wine from them.
  '14':
  - type: text
    content: '“That terrible day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near.'
  - type: text
    content: Swiftly it comes—
  - type: text
    content: a day of bitter tears,
  - type: text
    content: a day when even strong men will cry out.
  '15':
  - type: text
    content: 'It will be a day when the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger is poured out—
  - type: text
    content: a day of terrible distress and anguish,
  - type: text
    content: a day of ruin and desolation,
  - type: text
    content: a day of darkness and gloom,
  - type: text
    content: a day of clouds and blackness,
  '16':
  - type: text
    content: a day of trumpet calls and battle cries.
  - type: text
    content: Down go the walled cities
  - type: text
    content: and the strongest battlements!
  '17':
  - type: text
    content: '“Because you have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I will make you grope around like the blind.
  - type: text
    content: Your blood will be poured into the dust,
  - type: text
    content: and your bodies will lie rotting on the ground.”
  '18':
  - type: text
    content: Your silver and gold will not save you
  - type: text
    content: 'on that day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  - type: text
    content: For the whole land will be devoured
  - type: text
    content: by the fire of his jealousy.
  - type: text
    content: He will make a terrifying end
  - type: text
    content: of all the people on earth.
  - type: note
    content: Or the people living in the land.
  '2':
  - type: text
    content: “I will sweep away everything
  - type: text
    content: 'from the face of the earth,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: “I will sweep away people and animals alike.
  - type: text
    content: I will sweep away the birds of the sky and the fish in the sea.
  - type: text
    content: I will reduce the wicked to heaps of rubble,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: 'and I will wipe humanity from the face of the earth,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “I will crush Judah and Jerusalem with my fist
  - type: text
    content: and destroy every last trace of their Baal worship.
  - type: text
    content: I will put an end to all the idolatrous priests,
  - type: text
    content: so that even the memory of them will disappear.
  '5':
  - type: text
    content: For they go up to their roofs
  - type: text
    content: and bow down to the sun, moon, and stars.
  - type: text
    content: 'They claim to follow the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but then they worship Molech,
  - type: note
    content: Hebrew Malcam, a variant spelling of Molech; or it could possibly mean their king.
  - type: text
    content: ' too.'
  '6':
  - type: text
    content: And I will destroy those who used to worship me
  - type: text
    content: but now no longer do.
  - type: text
    content: 'They no longer ask for the '
  - type: text
    content: Lord
  - type: text
    content: ’s guidance
  - type: text
    content: or seek my blessings.”
  '7':
  - type: text
    content: 'Stand in silence in the presence of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'for the awesome day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s judgment is near.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has prepared his people for a great slaughter'
  - type: text
    content: and has chosen their executioners.
  - type: note
    content: Hebrew has prepared a sacrifice and sanctified his guests.
  '8':
  - type: text
    content: “On that day of judgment,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will punish the leaders and princes of Judah
  - type: text
    content: and all those following pagan customs.
  '9':
  - type: text
    content: Yes, I will punish those who participate in pagan worship ceremonies,
  - type: text
    content: and those who fill their masters’ houses with violence and deceit.
