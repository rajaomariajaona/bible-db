document_id: PSA.91,116
type_code: eng
verses:
  '1':
  - type: text
    content: Those who live in the shelter of the Most High
  - type: text
    content: will find rest in the shadow of the Almighty.
  '10':
  - type: text
    content: no evil will conquer you;
  - type: text
    content: no plague will come near your home.
  '11':
  - type: text
    content: For he will order his angels
  - type: text
    content: to protect you wherever you go.
  '12':
  - type: text
    content: They will hold you up with their hands
  - type: text
    content: so you won’t even hurt your foot on a stone.
  '13':
  - type: text
    content: You will trample upon lions and cobras;
  - type: text
    content: you will crush fierce lions and serpents under your feet!
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “I will rescue those who love me.'
  - type: text
    content: I will protect those who trust in my name.
  '15':
  - type: text
    content: When they call on me, I will answer;
  - type: text
    content: I will be with them in trouble.
  - type: text
    content: I will rescue and honor them.
  '16':
  - type: text
    content: I will reward them with a long life
  - type: text
    content: and give them my salvation.”
  '2':
  - type: text
    content: 'This I declare about the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: He alone is my refuge, my place of safety;
  - type: text
    content: he is my God, and I trust him.
  '3':
  - type: text
    content: For he will rescue you from every trap
  - type: text
    content: and protect you from deadly disease.
  '4':
  - type: text
    content: He will cover you with his feathers.
  - type: text
    content: He will shelter you with his wings.
  - type: text
    content: His faithful promises are your armor and protection.
  '5':
  - type: text
    content: Do not be afraid of the terrors of the night,
  - type: text
    content: nor the arrow that flies in the day.
  '6':
  - type: text
    content: Do not dread the disease that stalks in darkness,
  - type: text
    content: nor the disaster that strikes at midday.
  '7':
  - type: text
    content: Though a thousand fall at your side,
  - type: text
    content: though ten thousand are dying around you,
  - type: text
    content: these evils will not touch you.
  '8':
  - type: text
    content: Just open your eyes,
  - type: text
    content: and see how the wicked are punished.
  '9':
  - type: text
    content: 'If you make the '
  - type: text
    content: Lord
  - type: text
    content: ' your refuge,'
  - type: text
    content: if you make the Most High your shelter,
