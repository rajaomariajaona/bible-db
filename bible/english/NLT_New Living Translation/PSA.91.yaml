document_id: PSA.91
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Those who live in the shelter of the Most High
- type: usfm
  marker: q2
  children:
  - type: text
    text: will find rest in the shadow of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This I declare about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He alone is my refuge, my place of safety;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is my God, and I trust him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For he will rescue you from every trap
- type: usfm
  marker: q2
  children:
  - type: text
    text: and protect you from deadly disease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will cover you with his feathers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will shelter you with his wings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His faithful promises are your armor and protection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not be afraid of the terrors of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the arrow that flies in the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not dread the disease that stalks in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the disaster that strikes at midday.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Though a thousand fall at your side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though ten thousand are dying around you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: these evils will not touch you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Just open your eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see how the wicked are punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If you make the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your refuge,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you make the Most High your shelter,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: no evil will conquer you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no plague will come near your home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For he will order his angels
- type: usfm
  marker: q2
  children:
  - type: text
    text: to protect you wherever you go.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They will hold you up with their hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you won’t even hurt your foot on a stone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You will trample upon lions and cobras;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will crush fierce lions and serpents under your feet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “I will rescue those who love me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will protect those who trust in my name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When they call on me, I will answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be with them in trouble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will rescue and honor them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will reward them with a long life
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give them my salvation.”
