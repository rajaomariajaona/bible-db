document_id: 2CO.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Defends His Authority
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now I, Paul, appeal to you with the gentleness and kindness of Christ—though I realize you think I am timid in person and bold only when I write from far away. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For some say, “Paul’s letters are demanding and forceful, but in person he is weak, and his speeches are worthless!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Those people should realize that our actions when we arrive in person will be as forceful as what we say in our letters from far away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Oh, don’t worry; we wouldn’t dare say that we are as wonderful as these other men who tell you how important they are! But they are only comparing themselves with each other, using themselves as the standard of measurement. How ignorant!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'We will not boast about things done outside our area of authority. We will boast only about what has happened within the boundaries of the work God has given us, which includes our working with you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: We are not reaching beyond these boundaries when we claim authority over you, as if we had never visited you. For we were the first to travel all the way to Corinth with the Good News of Christ.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nor do we boast and claim credit for the work someone else has done. Instead, we hope that your faith will grow so that the boundaries of our work among you will be extended. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then we will be able to go and preach the Good News in other places far beyond you, where no one else is working. Then there will be no question of our boasting about work done in someone else’s territory. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As the Scriptures say, “If you want to boast, boast only about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 9:24.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When people commend themselves, it doesn’t count for much. The important thing is for the Lord to commend them.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Well, I am begging you now so that when I come I won’t have to be bold with those who think we act from human motives.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'We are human, but we don’t wage war as humans do. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: English translations divide verses 4 and 5 in various ways.
      marker-yv: yv-n
    - type: text
      text: 'We use God’s mighty weapons, not worldly weapons, to knock down the strongholds of human reasoning and to destroy false arguments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'We destroy every proud obstacle that keeps people from knowing God. We capture their rebellious thoughts and teach them to obey Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And after you have become fully obedient, we will punish everyone who remains disobedient.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Look at the obvious facts.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: You look at things only on the basis of appearance.
      marker-yv: yv-n
    - type: text
      text: ' Those who say they belong to Christ must recognize that we belong to Christ as much as they do. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I may seem to be boasting too much about the authority given to us by the Lord. But our authority builds you up; it doesn’t tear you down. So I will not be ashamed of using my authority.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I’m not trying to frighten you by my letters. '
