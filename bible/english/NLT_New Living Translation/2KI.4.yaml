document_id: 2KI.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elisha Helps a Poor Widow
  - type: text
    content: 'One day the widow of a member of the group of prophets came to Elisha and cried out, “My husband who served you is dead, and you know how he feared the '
  - type: text
    content: Lord
  - type: text
    content: . But now a creditor has come, threatening to take my two sons as slaves.”
  '10':
  - type: text
    content: Let’s build a small room for him on the roof and furnish it with a bed, a table, a chair, and a lamp. Then he will have a place to stay whenever he comes by.”
  '11':
  - type: text
    content: 'One day Elisha returned to Shunem, and he went up to this upper room to rest. '
  '12':
  - type: text
    content: 'He said to his servant Gehazi, “Tell the woman from Shunem I want to speak to her.” When she appeared, '
  '13':
  - type: text
    content: Elisha said to Gehazi, “Tell her, ‘We appreciate the kind concern you have shown us. What can we do for you? Can we put in a good word for you to the king or to the commander of the army?’”
  - type: text
    content: “No,” she replied, “my family takes good care of me.”
  '14':
  - type: text
    content: Later Elisha asked Gehazi, “What can we do for her?”
  - type: text
    content: Gehazi replied, “She doesn’t have a son, and her husband is an old man.”
  '15':
  - type: text
    content: '“Call her back again,” Elisha told him. When the woman returned, Elisha said to her as she stood in the doorway, '
  '16':
  - type: text
    content: “Next year at this time you will be holding a son in your arms!”
  - type: text
    content: “No, my lord!” she cried. “O man of God, don’t deceive me and get my hopes up like that.”
  '17':
  - type: text
    content: But sure enough, the woman soon became pregnant. And at that time the following year she had a son, just as Elisha had said.
  '18':
  - type: text
    content: 'One day when her child was older, he went out to help his father, who was working with the harvesters. '
  '19':
  - type: text
    content: Suddenly he cried out, “My head hurts! My head hurts!”
  - type: text
    content: His father said to one of the servants, “Carry him home to his mother.”
  '2':
  - type: text
    content: “What can I do to help you?” Elisha asked. “Tell me, what do you have in the house?”
  - type: text
    content: “Nothing at all, except a flask of olive oil,” she replied.
  '20':
  - type: text
    content: 'So the servant took him home, and his mother held him on her lap. But around noontime he died. '
  '21':
  - type: text
    content: 'She carried him up and laid him on the bed of the man of God, then shut the door and left him there. '
  '22':
  - type: text
    content: 'She sent a message to her husband: “Send one of the servants and a donkey so that I can hurry to the man of God and come right back.”'
  '23':
  - type: text
    content: “Why go today?” he asked. “It is neither a new moon festival nor a Sabbath.”
  - type: text
    content: But she said, “It will be all right.”
  '24':
  - type: text
    content: So she saddled the donkey and said to the servant, “Hurry! Don’t slow down unless I tell you to.”
  '25':
  - type: text
    content: 'As she approached the man of God at Mount Carmel, Elisha saw her in the distance. He said to Gehazi, “Look, the woman from Shunem is coming. '
  '26':
  - type: text
    content: Run out to meet her and ask her, ‘Is everything all right with you, your husband, and your child?’”
  - type: text
    content: “Yes,” the woman told Gehazi, “everything is fine.”
  '27':
  - type: text
    content: 'But when she came to the man of God at the mountain, she fell to the ground before him and caught hold of his feet. Gehazi began to push her away, but the man of God said, “Leave her alone. She is deeply troubled, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has not told me what it is.”'
  '28':
  - type: text
    content: Then she said, “Did I ask you for a son, my lord? And didn’t I say, ‘Don’t deceive me and get my hopes up’?”
  '29':
  - type: text
    content: Then Elisha said to Gehazi, “Get ready to travel
  - type: note
    content: Hebrew Bind up your loins.
  - type: text
    content: ; take my staff and go! Don’t talk to anyone along the way. Go quickly and lay the staff on the child’s face.”
  '3':
  - type: text
    content: 'And Elisha said, “Borrow as many empty jars as you can from your friends and neighbors. '
  '30':
  - type: text
    content: 'But the boy’s mother said, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and you yourself live, I won’t go home unless you go with me.” So Elisha returned with her.'
  '31':
  - type: text
    content: Gehazi hurried on ahead and laid the staff on the child’s face, but nothing happened. There was no sign of life. He returned to meet Elisha and told him, “The child is still dead.”
  '32':
  - type: text
    content: 'When Elisha arrived, the child was indeed dead, lying there on the prophet’s bed. '
  '33':
  - type: text
    content: 'He went in alone and shut the door behind him and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Then he lay down on the child’s body, placing his mouth on the child’s mouth, his eyes on the child’s eyes, and his hands on the child’s hands. And as he stretched out on him, the child’s body began to grow warm again! '
  '35':
  - type: text
    content: Elisha got up, walked back and forth across the room once, and then stretched himself out again on the child. This time the boy sneezed seven times and opened his eyes!
  '36':
  - type: text
    content: 'Then Elisha summoned Gehazi. “Call the child’s mother!” he said. And when she came in, Elisha said, “Here, take your son!” '
  '37':
  - type: text
    content: She fell at his feet and bowed before him, overwhelmed with gratitude. Then she took her son in her arms and carried him downstairs.
  - type: heading
    content: Miracles during a Famine
  '38':
  - type: text
    content: Elisha now returned to Gilgal, and there was a famine in the land. One day as the group of prophets was seated before him, he said to his servant, “Put a large pot on the fire, and make some stew for the rest of the group.”
  '39':
  - type: text
    content: 'One of the young men went out into the field to gather herbs and came back with a pocketful of wild gourds. He shredded them and put them into the pot without realizing they were poisonous. '
  '4':
  - type: text
    content: Then go into your house with your sons and shut the door behind you. Pour olive oil from your flask into the jars, setting each one aside when it is filled.”
  '40':
  - type: text
    content: Some of the stew was served to the men. But after they had eaten a bite or two they cried out, “Man of God, there’s poison in this stew!” So they would not eat it.
  '41':
  - type: text
    content: Elisha said, “Bring me some flour.” Then he threw it into the pot and said, “Now it’s all right; go ahead and eat.” And then it did not harm them.
  '42':
  - type: text
    content: One day a man from Baal-shalishah brought the man of God a sack of fresh grain and twenty loaves of barley bread made from the first grain of his harvest. Elisha said, “Give it to the people so they can eat.”
  '43':
  - type: text
    content: “What?” his servant exclaimed. “Feed a hundred people with only this?”
  - type: text
    content: 'But Elisha repeated, “Give it to the people so they can eat, for this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Everyone will eat, and there will even be some left over!” '
  '44':
  - type: text
    content: 'And when they gave it to the people, there was plenty for all and some left over, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised.'
  '5':
  - type: text
    content: 'So she did as she was told. Her sons kept bringing jars to her, and she filled one after another. '
  '6':
  - type: text
    content: Soon every container was full to the brim!
  - type: text
    content: “Bring me another jar,” she said to one of her sons.
  - type: text
    content: “There aren’t any more!” he told her. And then the olive oil stopped flowing.
  '7':
  - type: text
    content: When she told the man of God what had happened, he said to her, “Now sell the olive oil and pay your debts, and you and your sons can live on what is left over.”
  - type: heading
    content: Elisha and the Woman from Shunem
  '8':
  - type: text
    content: One day Elisha went to the town of Shunem. A wealthy woman lived there, and she urged him to come to her home for a meal. After that, whenever he passed that way, he would stop there for something to eat.
  '9':
  - type: text
    content: 'She said to her husband, “I am sure this man who stops in from time to time is a holy man of God. '
