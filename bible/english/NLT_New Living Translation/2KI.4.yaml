document_id: 2KI.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisha Helps a Poor Widow
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day the widow of a member of the group of prophets came to Elisha and cried out, “My husband who served you is dead, and you know how he feared the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . But now a creditor has come, threatening to take my two sons as slaves.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let’s build a small room for him on the roof and furnish it with a bed, a table, a chair, and a lamp. Then he will have a place to stay whenever he comes by.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day Elisha returned to Shunem, and he went up to this upper room to rest. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to his servant Gehazi, “Tell the woman from Shunem I want to speak to her.” When she appeared, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said to Gehazi, “Tell her, ‘We appreciate the kind concern you have shown us. What can we do for you? Can we put in a good word for you to the king or to the commander of the army?’”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No,” she replied, “my family takes good care of me.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later Elisha asked Gehazi, “What can we do for her?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gehazi replied, “She doesn’t have a son, and her husband is an old man.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Call her back again,” Elisha told him. When the woman returned, Elisha said to her as she stood in the doorway, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Next year at this time you will be holding a son in your arms!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord!” she cried. “O man of God, don’t deceive me and get my hopes up like that.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But sure enough, the woman soon became pregnant. And at that time the following year she had a son, just as Elisha had said.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day when her child was older, he went out to help his father, who was working with the harvesters. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Suddenly he cried out, “My head hurts! My head hurts!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: His father said to one of the servants, “Carry him home to his mother.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What can I do to help you?” Elisha asked. “Tell me, what do you have in the house?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Nothing at all, except a flask of olive oil,” she replied.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the servant took him home, and his mother held him on her lap. But around noontime he died. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She carried him up and laid him on the bed of the man of God, then shut the door and left him there. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She sent a message to her husband: “Send one of the servants and a donkey so that I can hurry to the man of God and come right back.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why go today?” he asked. “It is neither a new moon festival nor a Sabbath.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But she said, “It will be all right.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she saddled the donkey and said to the servant, “Hurry! Don’t slow down unless I tell you to.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As she approached the man of God at Mount Carmel, Elisha saw her in the distance. He said to Gehazi, “Look, the woman from Shunem is coming. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Run out to meet her and ask her, ‘Is everything all right with you, your husband, and your child?’”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” the woman told Gehazi, “everything is fine.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when she came to the man of God at the mountain, she fell to the ground before him and caught hold of his feet. Gehazi began to push her away, but the man of God said, “Leave her alone. She is deeply troubled, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not told me what it is.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then she said, “Did I ask you for a son, my lord? And didn’t I say, ‘Don’t deceive me and get my hopes up’?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Elisha said to Gehazi, “Get ready to travel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bind up your loins.
      marker-yv: yv-n
    - type: text
      text: ; take my staff and go! Don’t talk to anyone along the way. Go quickly and lay the staff on the child’s face.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elisha said, “Borrow as many empty jars as you can from your friends and neighbors. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the boy’s mother said, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and you yourself live, I won’t go home unless you go with me.” So Elisha returned with her.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gehazi hurried on ahead and laid the staff on the child’s face, but nothing happened. There was no sign of life. He returned to meet Elisha and told him, “The child is still dead.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Elisha arrived, the child was indeed dead, lying there on the prophet’s bed. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went in alone and shut the door behind him and prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he lay down on the child’s body, placing his mouth on the child’s mouth, his eyes on the child’s eyes, and his hands on the child’s hands. And as he stretched out on him, the child’s body began to grow warm again! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha got up, walked back and forth across the room once, and then stretched himself out again on the child. This time the boy sneezed seven times and opened his eyes!
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elisha summoned Gehazi. “Call the child’s mother!” he said. And when she came in, Elisha said, “Here, take your son!” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She fell at his feet and bowed before him, overwhelmed with gratitude. Then she took her son in her arms and carried him downstairs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miracles during a Famine
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Elisha now returned to Gilgal, and there was a famine in the land. One day as the group of prophets was seated before him, he said to his servant, “Put a large pot on the fire, and make some stew for the rest of the group.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the young men went out into the field to gather herbs and came back with a pocketful of wild gourds. He shredded them and put them into the pot without realizing they were poisonous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then go into your house with your sons and shut the door behind you. Pour olive oil from your flask into the jars, setting each one aside when it is filled.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the stew was served to the men. But after they had eaten a bite or two they cried out, “Man of God, there’s poison in this stew!” So they would not eat it.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Bring me some flour.” Then he threw it into the pot and said, “Now it’s all right; go ahead and eat.” And then it did not harm them.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day a man from Baal-shalishah brought the man of God a sack of fresh grain and twenty loaves of barley bread made from the first grain of his harvest. Elisha said, “Give it to the people so they can eat.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What?” his servant exclaimed. “Feed a hundred people with only this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elisha repeated, “Give it to the people so they can eat, for this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Everyone will eat, and there will even be some left over!” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they gave it to the people, there was plenty for all and some left over, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she did as she was told. Her sons kept bringing jars to her, and she filled one after another. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Soon every container was full to the brim!
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Bring me another jar,” she said to one of her sons.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “There aren’t any more!” he told her. And then the olive oil stopped flowing.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When she told the man of God what had happened, he said to her, “Now sell the olive oil and pay your debts, and you and your sons can live on what is left over.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisha and the Woman from Shunem
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day Elisha went to the town of Shunem. A wealthy woman lived there, and she urged him to come to her home for a meal. After that, whenever he passed that way, he would stop there for something to eat.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to her husband, “I am sure this man who stops in from time to time is a holy man of God. '
