document_id: COL.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus, and from our brother Timothy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the way you live will always honor and please the Lord, and your lives will produce every kind of good fruit. All the while, you will grow as you learn to know God better and better.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We also pray that you will be strengthened with all his glorious power so you will have all the endurance and patience you need. May you be filled with joy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all the patience and endurance you need with joy.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'always thanking the Father. He has enabled you to share in the inheritance that belongs to his people, who live in the light. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he has rescued us from the kingdom of darkness and transferred us into the Kingdom of his dear Son, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who purchased our freedom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with his blood.
      marker-yv: yv-n
    - type: text
      text: ' and forgave our sins.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is Supreme
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Christ is the visible image of the invisible God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He existed before anything was created and is supreme over all creation,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He is the firstborn of all creation.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for through him God created everything
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heavenly realms and on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made the things we can see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the things we can’t see—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: such as thrones, kingdoms, rulers, and authorities in the unseen world.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything was created through him and for him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He existed before anything else,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he holds all creation together.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Christ is also the head of the church,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which is his body.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the beginning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: supreme over all who rise from the dead.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the firstborn from the dead.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he is first in everything.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God in all his fullness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was pleased to live in Christ,
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are writing to God’s holy people in the city of Colosse, who are faithful brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faithful brothers.
      marker-yv: yv-n
    - type: text
      text: ' in Christ.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God our Father give you grace and peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Thanksgiving and Prayer
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and through him God reconciled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything to himself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made peace with everything in heaven and on earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by means of Christ’s blood on the cross.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This includes you who were once far away from God. You were his enemies, separated from him by your evil thoughts and actions. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet now he has reconciled you to himself through the death of Christ in his physical body. As a result, he has brought you into his own presence, and you are holy and blameless as you stand before him without a single fault.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you must continue to believe this truth and stand firmly in it. Don’t drift away from the assurance you received when you heard the Good News. The Good News has been preached all over the world, and I, Paul, have been appointed as God’s servant to proclaim it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Work for the Church
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I am glad when I suffer for you in my body, for I am participating in the sufferings of Christ that continue for his body, the church. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'God has given me the responsibility of serving his church by proclaiming his entire message to you. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This message was kept secret for centuries and generations past, but now it has been revealed to God’s people. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For God wanted them to know that the riches and glory of Christ are for you Gentiles, too. And this is the secret: Christ lives in you. This gives you assurance of sharing his glory.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we tell others about Christ, warning everyone and teaching everyone with all the wisdom God has given us. We want to present them to God, perfect
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mature.
      marker-yv: yv-n
    - type: text
      text: ' in their relationship to Christ. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s why I work and struggle so hard, depending on Christ’s mighty power that works within me.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We always pray for you, and we give thanks to God, the Father of our Lord Jesus Christ. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For we have heard of your faith in Christ Jesus and your love for all of God’s people, '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: which come from your confident hope of what God has reserved for you in heaven. You have had this expectation ever since you first heard the truth of the Good News.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This same Good News that came to you is going out all over the world. It is bearing fruit everywhere by changing lives, just as it changed your lives from the day you first heard and understood the truth about God’s wonderful grace.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You learned about the Good News from Epaphras, our beloved co-worker. He is Christ’s faithful servant, and he is helping us on your behalf.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he is ministering on your behalf; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he is ministering on our behalf.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He has told us about the love for others that the Holy Spirit has given you.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we have not stopped praying for you since we first heard about you. We ask God to give you complete knowledge of his will and to give you spiritual wisdom and understanding. '
