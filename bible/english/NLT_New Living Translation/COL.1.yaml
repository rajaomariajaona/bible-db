document_id: COL.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus, and from our brother Timothy.
  '10':
  - type: text
    content: Then the way you live will always honor and please the Lord, and your lives will produce every kind of good fruit. All the while, you will grow as you learn to know God better and better.
  '11':
  - type: text
    content: We also pray that you will be strengthened with all his glorious power so you will have all the endurance and patience you need. May you be filled with joy,
  - type: note
    content: Or all the patience and endurance you need with joy.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'always thanking the Father. He has enabled you to share in the inheritance that belongs to his people, who live in the light. '
  '13':
  - type: text
    content: 'For he has rescued us from the kingdom of darkness and transferred us into the Kingdom of his dear Son, '
  '14':
  - type: text
    content: who purchased our freedom
  - type: note
    content: Some manuscripts add with his blood.
  - type: text
    content: ' and forgave our sins.'
  - type: heading
    content: Christ Is Supreme
  '15':
  - type: text
    content: Christ is the visible image of the invisible God.
  - type: text
    content: He existed before anything was created and is supreme over all creation,
  - type: note
    content: Or He is the firstborn of all creation.
  '16':
  - type: text
    content: for through him God created everything
  - type: text
    content: in the heavenly realms and on earth.
  - type: text
    content: He made the things we can see
  - type: text
    content: and the things we can’t see—
  - type: text
    content: such as thrones, kingdoms, rulers, and authorities in the unseen world.
  - type: text
    content: Everything was created through him and for him.
  '17':
  - type: text
    content: He existed before anything else,
  - type: text
    content: and he holds all creation together.
  '18':
  - type: text
    content: Christ is also the head of the church,
  - type: text
    content: which is his body.
  - type: text
    content: He is the beginning,
  - type: text
    content: supreme over all who rise from the dead.
  - type: note
    content: Or the firstborn from the dead.
  - type: text
    content: So he is first in everything.
  '19':
  - type: text
    content: For God in all his fullness
  - type: text
    content: was pleased to live in Christ,
  '2':
  - type: text
    content: We are writing to God’s holy people in the city of Colosse, who are faithful brothers and sisters
  - type: note
    content: Greek faithful brothers.
  - type: text
    content: ' in Christ.'
  - type: text
    content: May God our Father give you grace and peace.
  - type: heading
    content: Paul’s Thanksgiving and Prayer
  '20':
  - type: text
    content: and through him God reconciled
  - type: text
    content: everything to himself.
  - type: text
    content: He made peace with everything in heaven and on earth
  - type: text
    content: by means of Christ’s blood on the cross.
  '21':
  - type: text
    content: 'This includes you who were once far away from God. You were his enemies, separated from him by your evil thoughts and actions. '
  '22':
  - type: text
    content: Yet now he has reconciled you to himself through the death of Christ in his physical body. As a result, he has brought you into his own presence, and you are holy and blameless as you stand before him without a single fault.
  '23':
  - type: text
    content: But you must continue to believe this truth and stand firmly in it. Don’t drift away from the assurance you received when you heard the Good News. The Good News has been preached all over the world, and I, Paul, have been appointed as God’s servant to proclaim it.
  - type: heading
    content: Paul’s Work for the Church
  '24':
  - type: text
    content: 'I am glad when I suffer for you in my body, for I am participating in the sufferings of Christ that continue for his body, the church. '
  '25':
  - type: text
    content: 'God has given me the responsibility of serving his church by proclaiming his entire message to you. '
  '26':
  - type: text
    content: 'This message was kept secret for centuries and generations past, but now it has been revealed to God’s people. '
  '27':
  - type: text
    content: 'For God wanted them to know that the riches and glory of Christ are for you Gentiles, too. And this is the secret: Christ lives in you. This gives you assurance of sharing his glory.'
  '28':
  - type: text
    content: So we tell others about Christ, warning everyone and teaching everyone with all the wisdom God has given us. We want to present them to God, perfect
  - type: note
    content: Or mature.
  - type: text
    content: ' in their relationship to Christ. '
  '29':
  - type: text
    content: That’s why I work and struggle so hard, depending on Christ’s mighty power that works within me.
  '3':
  - type: text
    content: 'We always pray for you, and we give thanks to God, the Father of our Lord Jesus Christ. '
  '4':
  - type: text
    content: 'For we have heard of your faith in Christ Jesus and your love for all of God’s people, '
  '5':
  - type: text
    content: which come from your confident hope of what God has reserved for you in heaven. You have had this expectation ever since you first heard the truth of the Good News.
  '6':
  - type: text
    content: This same Good News that came to you is going out all over the world. It is bearing fruit everywhere by changing lives, just as it changed your lives from the day you first heard and understood the truth about God’s wonderful grace.
  '7':
  - type: text
    content: You learned about the Good News from Epaphras, our beloved co-worker. He is Christ’s faithful servant, and he is helping us on your behalf.
  - type: note
    content: Or he is ministering on your behalf; some manuscripts read he is ministering on our behalf.
  - type: text
    content: ' '
  '8':
  - type: text
    content: He has told us about the love for others that the Holy Spirit has given you.
  '9':
  - type: text
    content: 'So we have not stopped praying for you since we first heard about you. We ask God to give you complete knowledge of his will and to give you spiritual wisdom and understanding. '
