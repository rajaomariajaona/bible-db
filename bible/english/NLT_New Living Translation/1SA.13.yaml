document_id: 1SA.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Continued War with Philistia
  - type: text
    content: Saul was thirty
  - type: note
    content: As in a few Greek manuscripts; the number is missing in the Hebrew.
  - type: text
    content: ' years old when he became king, and he reigned for forty-two years.'
  - type: note
    content: Hebrew reigned . . . and two; the number is incomplete in the Hebrew. Compare Acts 13:21.
  '10':
  - type: text
    content: 'Just as Saul was finishing with the burnt offering, Samuel arrived. Saul went out to meet and welcome him, '
  '11':
  - type: text
    content: but Samuel said, “What is this you have done?”
  - type: text
    content: 'Saul replied, “I saw my men scattering from me, and you didn’t arrive when you said you would, and the Philistines are at Micmash ready for battle. '
  '12':
  - type: text
    content: 'So I said, ‘The Philistines are ready to march against us at Gilgal, and I haven’t even asked for the '
  - type: text
    content: Lord
  - type: text
    content: ’s help!’ So I felt compelled to offer the burnt offering myself before you came.”
  '13':
  - type: text
    content: '“How foolish!” Samuel exclaimed. “You have not kept the command the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave you. Had you kept it, the '
  - type: text
    content: Lord
  - type: text
    content: ' would have established your kingdom over Israel forever. '
  '14':
  - type: text
    content: 'But now your kingdom must end, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has sought out a man after his own heart. The '
  - type: text
    content: Lord
  - type: text
    content: ' has already appointed him to be the leader of his people, because you have not kept the '
  - type: text
    content: Lord
  - type: text
    content: ’s command.”
  - type: heading
    content: Israel’s Military Disadvantage
  '15':
  - type: text
    content: Samuel then left Gilgal and went on his way, but the rest of the troops went with Saul to meet the army. They went up from Gilgal to Gibeah in the land of Benjamin.
  - type: note
    content: As in Greek version; Hebrew reads Samuel then left Gilgal and went to Gibeah in the land of Benjamin.
  - type: text
    content: ' When Saul counted the men who were still with him, he found only 600 were left! '
  '16':
  - type: text
    content: 'Saul and Jonathan and the troops with them were staying at Geba in the land of Benjamin. The Philistines set up their camp at Micmash. '
  '17':
  - type: text
    content: 'Three raiding parties soon left the camp of the Philistines. One went north toward Ophrah in the land of Shual, '
  '18':
  - type: text
    content: another went west to Beth-horon, and the third moved toward the border above the valley of Zeboim near the wilderness.
  '19':
  - type: text
    content: 'There were no blacksmiths in the land of Israel in those days. The Philistines wouldn’t allow them for fear they would make swords and spears for the Hebrews. '
  '2':
  - type: text
    content: Saul selected 3,000 special troops from the army of Israel and sent the rest of the men home. He took 2,000 of the chosen men with him to Micmash and the hill country of Bethel. The other 1,000 went with Saul’s son Jonathan to Gibeah in the land of Benjamin.
  '20':
  - type: text
    content: So whenever the Israelites needed to sharpen their plowshares, picks, axes, or sickles,
  - type: note
    content: As in Greek version; Hebrew reads or plowshares.
  - type: text
    content: ' they had to take them to a Philistine blacksmith. '
  '21':
  - type: text
    content: 'The charges were as follows: a quarter of an ounce'
  - type: note
    content: Hebrew 1 pim [8 grams].
  - type: text
    content: ' of silver for sharpening a plowshare or a pick, and an eighth of an ounce'
  - type: note
    content: Hebrew 1/3 [of a shekel] [4 grams].
  - type: text
    content: ' for sharpening an ax or making the point of an ox goad. '
  '22':
  - type: text
    content: So on the day of the battle none of the people of Israel had a sword or spear, except for Saul and Jonathan.
  '23':
  - type: text
    content: The pass at Micmash had meanwhile been secured by a contingent of the Philistine army.
  '3':
  - type: text
    content: 'Soon after this, Jonathan attacked and defeated the garrison of Philistines at Geba. The news spread quickly among the Philistines. So Saul blew the ram’s horn throughout the land, saying, “Hebrews, hear this! Rise up in revolt!” '
  '4':
  - type: text
    content: All Israel heard the news that Saul had destroyed the Philistine garrison at Geba and that the Philistines now hated the Israelites more than ever. So the entire Israelite army was summoned to join Saul at Gilgal.
  '5':
  - type: text
    content: The Philistines mustered a mighty army of 3,000
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads 30,000.
  - type: text
    content: ' chariots, 6,000 charioteers, and as many warriors as the grains of sand on the seashore! They camped at Micmash east of Beth-aven. '
  '6':
  - type: text
    content: 'The men of Israel saw what a tight spot they were in; and because they were hard pressed by the enemy, they tried to hide in caves, thickets, rocks, holes, and cisterns. '
  '7':
  - type: text
    content: Some of them crossed the Jordan River and escaped into the land of Gad and Gilead.
  - type: heading
    content: Saul’s Disobedience and Samuel’s Rebuke
  - type: text
    content: 'Meanwhile, Saul stayed at Gilgal, and his men were trembling with fear. '
  '8':
  - type: text
    content: 'Saul waited there seven days for Samuel, as Samuel had instructed him earlier, but Samuel still didn’t come. Saul realized that his troops were rapidly slipping away. '
  '9':
  - type: text
    content: So he demanded, “Bring me the burnt offering and the peace offerings!” And Saul sacrificed the burnt offering himself.
