document_id: 1SA.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Continued War with Philistia
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Saul was thirty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in a few Greek manuscripts; the number is missing in the Hebrew.
      marker-yv: yv-n
    - type: text
      text: ' years old when he became king, and he reigned for forty-two years.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reigned . . . and two; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the number is incomplete in the Hebrew. Compare Acts 13:21.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as Saul was finishing with the burnt offering, Samuel arrived. Saul went out to meet and welcome him, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but Samuel said, “What is this you have done?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul replied, “I saw my men scattering from me, and you didn’t arrive when you said you would, and the Philistines are at Micmash ready for battle. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said, ‘The Philistines are ready to march against us at Gilgal, and I haven’t even asked for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s help!’ So I felt compelled to offer the burnt offering myself before you came.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“How foolish!” Samuel exclaimed. “You have not kept the command the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gave you. Had you kept it, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would have established your kingdom over Israel forever. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now your kingdom must end, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sought out a man after his own heart. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has already appointed him to be the leader of his people, because you have not kept the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Military Disadvantage
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Samuel then left Gilgal and went on his way, but the rest of the troops went with Saul to meet the army. They went up from Gilgal to Gibeah in the land of Benjamin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samuel then left Gilgal and went to Gibeah in the land of Benjamin.
      marker-yv: yv-n
    - type: text
      text: ' When Saul counted the men who were still with him, he found only 600 were left! '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Saul and Jonathan and the troops with them were staying at Geba in the land of Benjamin. The Philistines set up their camp at Micmash. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Three raiding parties soon left the camp of the Philistines. One went north toward Ophrah in the land of Shual, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: another went west to Beth-horon, and the third moved toward the border above the valley of Zeboim near the wilderness.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were no blacksmiths in the land of Israel in those days. The Philistines wouldn’t allow them for fear they would make swords and spears for the Hebrews. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul selected 3,000 special troops from the army of Israel and sent the rest of the men home. He took 2,000 of the chosen men with him to Micmash and the hill country of Bethel. The other 1,000 went with Saul’s son Jonathan to Gibeah in the land of Benjamin.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So whenever the Israelites needed to sharpen their plowshares, picks, axes, or sickles,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: or plowshares.
      marker-yv: yv-n
    - type: text
      text: ' they had to take them to a Philistine blacksmith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The charges were as follows: a quarter of an ounce'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:21a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 pim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 grams].'
      marker-yv: yv-n
    - type: text
      text: ' of silver for sharpening a plowshare or a pick, and an eighth of an ounce'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:21b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1/3 [of a shekel] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4 grams].'
      marker-yv: yv-n
    - type: text
      text: ' for sharpening an ax or making the point of an ox goad. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So on the day of the battle none of the people of Israel had a sword or spear, except for Saul and Jonathan.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The pass at Micmash had meanwhile been secured by a contingent of the Philistine army.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon after this, Jonathan attacked and defeated the garrison of Philistines at Geba. The news spread quickly among the Philistines. So Saul blew the ram’s horn throughout the land, saying, “Hebrews, hear this! Rise up in revolt!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All Israel heard the news that Saul had destroyed the Philistine garrison at Geba and that the Philistines now hated the Israelites more than ever. So the entire Israelite army was summoned to join Saul at Gilgal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Philistines mustered a mighty army of 3,000
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 30,000.
      marker-yv: yv-n
    - type: text
      text: ' chariots, 6,000 charioteers, and as many warriors as the grains of sand on the seashore! They camped at Micmash east of Beth-aven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men of Israel saw what a tight spot they were in; and because they were hard pressed by the enemy, they tried to hide in caves, thickets, rocks, holes, and cisterns. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of them crossed the Jordan River and escaped into the land of Gad and Gilead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Disobedience and Samuel’s Rebuke
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, Saul stayed at Gilgal, and his men were trembling with fear. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Saul waited there seven days for Samuel, as Samuel had instructed him earlier, but Samuel still didn’t come. Saul realized that his troops were rapidly slipping away. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So he demanded, “Bring me the burnt offering and the peace offerings!” And Saul sacrificed the burnt offering himself.
