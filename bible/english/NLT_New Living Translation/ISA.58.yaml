document_id: ISA.58
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: True and False Worship
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Shout with the voice of a trumpet blast.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout aloud! Don’t be timid.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell my people Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
  - type: text
    text: ' of their sins!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yet they act so pious!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They come to the Temple every day
- type: usfm
  marker: q2
  children:
  - type: text
    text: and seem delighted to learn all about me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They act like a righteous nation
- type: usfm
  marker: q2
  children:
  - type: text
    text: that would never abandon the laws of its God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They ask me to take action on their behalf,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pretending they want to be near me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘We have fasted before you!’ they say.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Why aren’t you impressed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have been very hard on ourselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you don’t even notice it!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will tell you why!” I respond.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “It’s because you are fasting to please yourselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even while you fast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you keep oppressing your workers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: What good is fasting
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you keep on fighting and quarreling?
- type: usfm
  marker: q1
  children:
  - type: text
    text: This kind of fasting
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never get you anywhere with me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You humble yourselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: by going through the motions of penance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bowing your heads
- type: usfm
  marker: q2
  children:
  - type: text
    text: like reeds bending in the wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You dress in burlap
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cover yourselves with ashes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is this what you call fasting?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Do you really think this will please the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“No, this is the kind of fasting I want:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Free those who are wrongly imprisoned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: lighten the burden of those who work for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the oppressed go free,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and remove the chains that bind people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Share your food with the hungry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give shelter to the homeless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give clothes to those who need them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not hide from relatives who need your help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Then your salvation will come like the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your wounds will quickly heal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your godliness will lead you forward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will protect you from behind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then when you call, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will answer.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Yes, I am here,’ he will quickly reply.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Remove the heavy yoke of oppression.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Stop pointing your finger and spreading vicious rumors!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Feed the hungry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and help those in trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then your light will shine out from the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the darkness around you will be as bright as noon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will guide you continually,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving you water when you are dry
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restoring your strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be like a well-watered garden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an ever-flowing spring.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Some of you will rebuild the deserted ruins of your cities.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then you will be known as a rebuilder of walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a restorer of homes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Keep the Sabbath day holy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t pursue your own interests on that day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but enjoy the Sabbath
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and speak of it with delight as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s holy day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Honor the Sabbath in everything you do on that day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t follow your own desires or talk idly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be your delight.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will give you great honor
- type: usfm
  marker: q1
  children:
  - type: text
    text: and satisfy you with the inheritance I promised to your ancestor Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
