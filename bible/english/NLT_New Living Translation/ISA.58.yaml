document_id: ISA.58,116
type_code: eng
verses:
  '1':
  - type: heading
    content: True and False Worship
  - type: text
    content: “Shout with the voice of a trumpet blast.
  - type: text
    content: Shout aloud! Don’t be timid.
  - type: text
    content: Tell my people Israel
  - type: note
    content: Hebrew Jacob. See note on 14:1.
  - type: text
    content: ' of their sins!'
  '10':
  - type: text
    content: Feed the hungry,
  - type: text
    content: and help those in trouble.
  - type: text
    content: Then your light will shine out from the darkness,
  - type: text
    content: and the darkness around you will be as bright as noon.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will guide you continually,'
  - type: text
    content: giving you water when you are dry
  - type: text
    content: and restoring your strength.
  - type: text
    content: You will be like a well-watered garden,
  - type: text
    content: like an ever-flowing spring.
  '12':
  - type: text
    content: Some of you will rebuild the deserted ruins of your cities.
  - type: text
    content: Then you will be known as a rebuilder of walls
  - type: text
    content: and a restorer of homes.
  '13':
  - type: text
    content: “Keep the Sabbath day holy.
  - type: text
    content: Don’t pursue your own interests on that day,
  - type: text
    content: but enjoy the Sabbath
  - type: text
    content: 'and speak of it with delight as the '
  - type: text
    content: Lord
  - type: text
    content: ’s holy day.
  - type: text
    content: Honor the Sabbath in everything you do on that day,
  - type: text
    content: and don’t follow your own desires or talk idly.
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your delight.'
  - type: text
    content: I will give you great honor
  - type: text
    content: and satisfy you with the inheritance I promised to your ancestor Jacob.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: Yet they act so pious!
  - type: text
    content: They come to the Temple every day
  - type: text
    content: and seem delighted to learn all about me.
  - type: text
    content: They act like a righteous nation
  - type: text
    content: that would never abandon the laws of its God.
  - type: text
    content: They ask me to take action on their behalf,
  - type: text
    content: pretending they want to be near me.
  '3':
  - type: text
    content: ‘We have fasted before you!’ they say.
  - type: text
    content: ‘Why aren’t you impressed?
  - type: text
    content: We have been very hard on ourselves,
  - type: text
    content: and you don’t even notice it!’
  - type: text
    content: “I will tell you why!” I respond.
  - type: text
    content: “It’s because you are fasting to please yourselves.
  - type: text
    content: Even while you fast,
  - type: text
    content: you keep oppressing your workers.
  '4':
  - type: text
    content: What good is fasting
  - type: text
    content: when you keep on fighting and quarreling?
  - type: text
    content: This kind of fasting
  - type: text
    content: will never get you anywhere with me.
  '5':
  - type: text
    content: You humble yourselves
  - type: text
    content: by going through the motions of penance,
  - type: text
    content: bowing your heads
  - type: text
    content: like reeds bending in the wind.
  - type: text
    content: You dress in burlap
  - type: text
    content: and cover yourselves with ashes.
  - type: text
    content: Is this what you call fasting?
  - type: text
    content: 'Do you really think this will please the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '6':
  - type: text
    content: '“No, this is the kind of fasting I want:'
  - type: text
    content: Free those who are wrongly imprisoned;
  - type: text
    content: lighten the burden of those who work for you.
  - type: text
    content: Let the oppressed go free,
  - type: text
    content: and remove the chains that bind people.
  '7':
  - type: text
    content: Share your food with the hungry,
  - type: text
    content: and give shelter to the homeless.
  - type: text
    content: Give clothes to those who need them,
  - type: text
    content: and do not hide from relatives who need your help.
  '8':
  - type: text
    content: “Then your salvation will come like the dawn,
  - type: text
    content: and your wounds will quickly heal.
  - type: text
    content: Your godliness will lead you forward,
  - type: text
    content: 'and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' will protect you from behind.'
  '9':
  - type: text
    content: 'Then when you call, the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer.'
  - type: text
    content: ‘Yes, I am here,’ he will quickly reply.
  - type: text
    content: “Remove the heavy yoke of oppression.
  - type: text
    content: Stop pointing your finger and spreading vicious rumors!
