document_id: ISA.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hezekiah Seeks the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Help
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When King Hezekiah heard their report, he tore his clothes and put on burlap and went into the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he sent Eliakim the palace administrator, Shebna the court secretary, and the leading priests, all dressed in burlap, to the prophet Isaiah son of Amoz. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They told him, “This is what King Hezekiah says: Today is a day of trouble, insults, and disgrace. It is like when a child is ready to be born, but the mother has no strength to deliver the baby. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But perhaps the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has heard the Assyrian chief of staff,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the rabshakeh; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 37:8.
    marker-yv: yv-n
  - type: text
    text: ' sent by the king to defy the living God, and will punish him for his words. Oh, pray for those of us who are left!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'After King Hezekiah’s officials delivered the king’s message to Isaiah, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'the prophet replied, “Say to your master, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Do not be disturbed by this blasphemous speech against me from the Assyrian king’s messengers. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Listen! I myself will move against him,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I will put a spirit in him.
    marker-yv: yv-n
  - type: text
    text: ' and the king will receive a message that he is needed at home. So he will return to his land, where I will have him killed with a sword.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Meanwhile, the Assyrian chief of staff left Jerusalem and went to consult the king of Assyria, who had left Lachish and was attacking Libnah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Soon afterward King Sennacherib received word that King Tirhakah of Ethiopia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Cush.
    marker-yv: yv-n
  - type: text
    text: ' was leading an army to fight against him. Before leaving to meet the attack, he sent messengers back to Hezekiah in Jerusalem with this message:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“This message is for King Hezekiah of Judah. Don’t let your God, in whom you trust, deceive you with promises that Jerusalem will not be captured by the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You know perfectly well what the kings of Assyria have done wherever they have gone. They have completely destroyed everyone who stood in their way! Why should you be any different? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Have the gods of other nations rescued them—such nations as Gozan, Haran, Rezeph, and the people of Eden who were in Tel-assar? My predecessors destroyed them all! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: What happened to the king of Hamath and the king of Arpad? What happened to the kings of Sepharvaim, Hena, and Ivvah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'After Hezekiah received the letter from the messengers and read it, he went up to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and spread it out before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Hezekiah prayed this prayer before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, God of Israel, you are enthroned between the mighty cherubim! You alone are God of all the kingdoms of the earth. You alone created the heavens and the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Bend down, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and listen! Open your eyes, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and see! Listen to Sennacherib’s words of defiance against the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“It is true, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that the kings of Assyria have destroyed all these nations. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they have thrown the gods of these nations into the fire and burned them. But of course the Assyrians could destroy them! They were not gods at all—only idols of wood and stone shaped by human hands. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, rescue us from his power; then all the kingdoms of the earth will know that you alone, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', are God.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls (see also 2 Kgs 19:19); Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'you alone are the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaiah Predicts Judah’s Deliverance
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Isaiah son of Amoz sent this message to Hezekiah: “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Because you prayed about King Sennacherib of Assyria, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken this word against him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The virgin daughter of Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: despises you and laughs at you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughter of Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: shakes her head in derision as you flee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Whom have you been defying and ridiculing?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Against whom did you raise your voice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: At whom did you look with such haughty eyes?
- type: usfm
  marker: q2
  children:
  - type: text
    text: It was the Holy One of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: By your messengers you have defied the Lord.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have said, ‘With my many chariots
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have conquered the highest mountains—
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, the remotest peaks of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have cut down its tallest cedars
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its finest cypress trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have reached its farthest heights
- type: usfm
  marker: q2
  children:
  - type: text
    text: and explored its deepest forests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I have dug wells in many foreign lands
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls (see also 2 Kgs 19:24); Masoretic Text lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in many foreign lands.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refreshed myself with their water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the sole of my foot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stopped up all the rivers of Egypt!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “But have you not heard?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I decided this long ago.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Long ago I planned it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now I am making it happen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I planned for you to crush fortified cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: into heaps of rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: That is why their people have so little power
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are so frightened and confused.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are as weak as grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as easily trampled as tender green shoots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are like grass sprouting on a housetop,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scorched
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls and some Greek manuscripts (see also 2 Kgs 19:26); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like a terraced field.
    marker-yv: yv-n
  - type: text
    text: ' before it can grow lush and tall.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “But I know you well—
- type: usfm
  marker: q2
  children:
  - type: text
    text: where you stay
- type: usfm
  marker: q1
  children:
  - type: text
    text: and when you come and go.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know the way you have raged against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And because of your raging against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your arrogance, which I have heard for myself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my hook in your nose
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my bit in your mouth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make you return
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the same road on which you came.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Isaiah said to Hezekiah, “Here is the proof that what I say is true:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This year you will eat only what grows up by itself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and next year you will eat what springs up from that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But in the third year you will plant crops and harvest them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will tend vineyards and eat their fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And you who are left in Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have escaped the ravages of the siege,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will put roots down in your own soil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grow up and flourish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For a remnant of my people will spread out from Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a group of survivors from Mount Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The passionate commitment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will make this happen!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“And this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the king of Assyria:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘His armies will not enter Jerusalem.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will not even shoot an arrow at it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will not march outside its gates with their shields
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor build banks of earth against its walls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The king will return to his own country
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the same road on which he came.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not enter this city,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ‘For my own honor and for the sake of my servant David,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will defend this city and protect it.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'That night the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
