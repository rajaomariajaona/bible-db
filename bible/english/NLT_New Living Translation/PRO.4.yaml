document_id: PRO.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Father’s Wise Advice
  - type: text
    content: My children,
  - type: note
    content: Hebrew My sons.
  - type: text
    content: ' listen when your father corrects you.'
  - type: text
    content: Pay attention and learn good judgment,
  '10':
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son; also in 4:20.
  - type: text
    content: ' listen to me and do as I say,'
  - type: text
    content: and you will have a long, good life.
  '11':
  - type: text
    content: I will teach you wisdom’s ways
  - type: text
    content: and lead you in straight paths.
  '12':
  - type: text
    content: When you walk, you won’t be held back;
  - type: text
    content: when you run, you won’t stumble.
  '13':
  - type: text
    content: Take hold of my instructions; don’t let them go.
  - type: text
    content: Guard them, for they are the key to life.
  '14':
  - type: text
    content: Don’t do as the wicked do,
  - type: text
    content: and don’t follow the path of evildoers.
  '15':
  - type: text
    content: Don’t even think about it; don’t go that way.
  - type: text
    content: Turn away and keep moving.
  '16':
  - type: text
    content: For evil people can’t sleep until they’ve done their evil deed for the day.
  - type: text
    content: They can’t rest until they’ve caused someone to stumble.
  '17':
  - type: text
    content: They eat the food of wickedness
  - type: text
    content: and drink the wine of violence!
  '18':
  - type: text
    content: The way of the righteous is like the first gleam of dawn,
  - type: text
    content: which shines ever brighter until the full light of day.
  '19':
  - type: text
    content: But the way of the wicked is like total darkness.
  - type: text
    content: They have no idea what they are stumbling over.
  '2':
  - type: text
    content: for I am giving you good guidance.
  - type: text
    content: Don’t turn away from my instructions.
  '20':
  - type: text
    content: My child, pay attention to what I say.
  - type: text
    content: Listen carefully to my words.
  '21':
  - type: text
    content: Don’t lose sight of them.
  - type: text
    content: Let them penetrate deep into your heart,
  '22':
  - type: text
    content: for they bring life to those who find them,
  - type: text
    content: and healing to their whole body.
  '23':
  - type: text
    content: Guard your heart above all else,
  - type: text
    content: for it determines the course of your life.
  '24':
  - type: text
    content: Avoid all perverse talk;
  - type: text
    content: stay away from corrupt speech.
  '25':
  - type: text
    content: Look straight ahead,
  - type: text
    content: and fix your eyes on what lies before you.
  '26':
  - type: text
    content: Mark out a straight path for your feet;
  - type: text
    content: stay on the safe path.
  '27':
  - type: text
    content: Don’t get sidetracked;
  - type: text
    content: keep your feet from following evil.
  '3':
  - type: text
    content: For I, too, was once my father’s son,
  - type: text
    content: tenderly loved as my mother’s only child.
  '4':
  - type: text
    content: My father taught me,
  - type: text
    content: “Take my words to heart.
  - type: text
    content: Follow my commands, and you will live.
  '5':
  - type: text
    content: Get wisdom; develop good judgment.
  - type: text
    content: Don’t forget my words or turn away from them.
  '6':
  - type: text
    content: Don’t turn your back on wisdom, for she will protect you.
  - type: text
    content: Love her, and she will guard you.
  '7':
  - type: text
    content: Getting wisdom is the wisest thing you can do!
  - type: text
    content: And whatever else you do, develop good judgment.
  '8':
  - type: text
    content: If you prize wisdom, she will make you great.
  - type: text
    content: Embrace her, and she will honor you.
  '9':
  - type: text
    content: She will place a lovely wreath on your head;
  - type: text
    content: she will present you with a beautiful crown.”
