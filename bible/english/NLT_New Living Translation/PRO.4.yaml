document_id: PRO.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Father’s Wise Advice
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My children,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: My sons.
      marker-yv: yv-n
    - type: text
      text: ' listen when your father corrects you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention and learn good judgment,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'My son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:20.
      marker-yv: yv-n
    - type: text
      text: ' listen to me and do as I say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will have a long, good life.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will teach you wisdom’s ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lead you in straight paths.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you walk, you won’t be held back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you run, you won’t stumble.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take hold of my instructions; don’t let them go.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Guard them, for they are the key to life.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t do as the wicked do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t follow the path of evildoers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t even think about it; don’t go that way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn away and keep moving.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For evil people can’t sleep until they’ve done their evil deed for the day.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They can’t rest until they’ve caused someone to stumble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They eat the food of wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drink the wine of violence!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of the righteous is like the first gleam of dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which shines ever brighter until the full light of day.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the way of the wicked is like total darkness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no idea what they are stumbling over.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am giving you good guidance.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t turn away from my instructions.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My child, pay attention to what I say.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen carefully to my words.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t lose sight of them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them penetrate deep into your heart,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they bring life to those who find them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and healing to their whole body.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard your heart above all else,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it determines the course of your life.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoid all perverse talk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stay away from corrupt speech.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look straight ahead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fix your eyes on what lies before you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mark out a straight path for your feet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stay on the safe path.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t get sidetracked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep your feet from following evil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I, too, was once my father’s son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tenderly loved as my mother’s only child.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My father taught me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take my words to heart.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Follow my commands, and you will live.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get wisdom; develop good judgment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t forget my words or turn away from them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t turn your back on wisdom, for she will protect you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Love her, and she will guard you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Getting wisdom is the wisest thing you can do!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And whatever else you do, develop good judgment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you prize wisdom, she will make you great.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Embrace her, and she will honor you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will place a lovely wreath on your head;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she will present you with a beautiful crown.”
