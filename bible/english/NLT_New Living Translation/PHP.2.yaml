document_id: PHP.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Have the Attitude of Christ
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Is there any encouragement from belonging to Christ? Any comfort from his love? Any fellowship together in the Spirit? Are your hearts tender and compassionate? '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that at the name of Jesus every knee should bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in heaven and on earth and under the earth,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every tongue declare that Jesus Christ is Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the glory of God the Father.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shine Brightly for Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friends, you always followed my instructions when I was with you. And now that I am away, it is even more important. Work hard to show the results of your salvation, obeying God with deep reverence and fear. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For God is working in you, giving you the desire and the power to do what pleases him.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do everything without complaining and arguing, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that no one can criticize you. Live clean, innocent lives as children of God, shining like bright lights in a world full of crooked and perverse people. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hold firmly to the word of life; then, on the day of Christ’s return, I will be proud that I did not run the race in vain and that my work was not useless. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But I will rejoice even if I lose my life, pouring it out like a liquid offering to God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will rejoice even if I am to be poured out as a liquid offering.
      marker-yv: yv-n
    - type: text
      text: ' just like your faithful service is an offering to God. And I want all of you to share that joy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yes, you should rejoice, and I will share your joy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Commends Timothy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If the Lord Jesus is willing, I hope to send Timothy to you soon for a visit. Then he can cheer me up by telling me how you are getting along. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then make me truly happy by agreeing wholeheartedly with each other, loving one another, and working together with one mind and purpose.
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have no one else like Timothy, who genuinely cares about your welfare. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All the others care only for themselves and not for what matters to Jesus Christ. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But you know how Timothy has proved himself. Like a son with his father, he has served with me in preaching the Good News. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I hope to send him to you just as soon as I find out what is going to happen to me here. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I have confidence from the Lord that I myself will come to see you soon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Commends Epaphroditus
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, I thought I should send Epaphroditus back to you. He is a true brother, co-worker, and fellow soldier. And he was your messenger to help me in my need. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I am sending him because he has been longing to see you, and he was very distressed that you heard he was ill. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he certainly was ill; in fact, he almost died. But God had mercy on him—and also on me, so that I would not have one sorrow after another.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I am all the more anxious to send him back to you, for I know you will be glad to see him, and then I will not be so worried about you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Welcome him in the Lord’s love
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the Lord.
      marker-yv: yv-n
    - type: text
      text: ' and with great joy, and give him the honor that people like him deserve. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t be selfish; don’t try to impress others. Be humble, thinking of others as better than yourselves. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he risked his life for the work of Christ, and he was at the point of death while doing for me what you couldn’t do from far away.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t look out only for your own interests, but take an interest in others, too.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You must have the same attitude that Christ Jesus had.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though he was God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Being in the form of God.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he did not think of equality with God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as something to cling to.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, he gave up his divine privileges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he emptied himself.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he took the humble position of a slave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the form of a slave.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and was born as a human being.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he appeared in human form,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some English translations put this phrase in verse 8.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he humbled himself in obedience to God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and died a criminal’s death on a cross.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, God elevated him to the place of highest honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave him the name above all other names,
