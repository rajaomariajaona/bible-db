document_id: PHP.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Have the Attitude of Christ
  - type: text
    content: 'Is there any encouragement from belonging to Christ? Any comfort from his love? Any fellowship together in the Spirit? Are your hearts tender and compassionate? '
  '10':
  - type: text
    content: that at the name of Jesus every knee should bow,
  - type: text
    content: in heaven and on earth and under the earth,
  '11':
  - type: text
    content: and every tongue declare that Jesus Christ is Lord,
  - type: text
    content: to the glory of God the Father.
  - type: heading
    content: Shine Brightly for Christ
  '12':
  - type: text
    content: 'Dear friends, you always followed my instructions when I was with you. And now that I am away, it is even more important. Work hard to show the results of your salvation, obeying God with deep reverence and fear. '
  '13':
  - type: text
    content: For God is working in you, giving you the desire and the power to do what pleases him.
  '14':
  - type: text
    content: 'Do everything without complaining and arguing, '
  '15':
  - type: text
    content: 'so that no one can criticize you. Live clean, innocent lives as children of God, shining like bright lights in a world full of crooked and perverse people. '
  '16':
  - type: text
    content: 'Hold firmly to the word of life; then, on the day of Christ’s return, I will be proud that I did not run the race in vain and that my work was not useless. '
  '17':
  - type: text
    content: But I will rejoice even if I lose my life, pouring it out like a liquid offering to God,
  - type: note
    content: Greek I will rejoice even if I am to be poured out as a liquid offering.
  - type: text
    content: ' just like your faithful service is an offering to God. And I want all of you to share that joy. '
  '18':
  - type: text
    content: Yes, you should rejoice, and I will share your joy.
  - type: heading
    content: Paul Commends Timothy
  '19':
  - type: text
    content: 'If the Lord Jesus is willing, I hope to send Timothy to you soon for a visit. Then he can cheer me up by telling me how you are getting along. '
  '2':
  - type: text
    content: Then make me truly happy by agreeing wholeheartedly with each other, loving one another, and working together with one mind and purpose.
  '20':
  - type: text
    content: 'I have no one else like Timothy, who genuinely cares about your welfare. '
  '21':
  - type: text
    content: 'All the others care only for themselves and not for what matters to Jesus Christ. '
  '22':
  - type: text
    content: 'But you know how Timothy has proved himself. Like a son with his father, he has served with me in preaching the Good News. '
  '23':
  - type: text
    content: 'I hope to send him to you just as soon as I find out what is going to happen to me here. '
  '24':
  - type: text
    content: And I have confidence from the Lord that I myself will come to see you soon.
  - type: heading
    content: Paul Commends Epaphroditus
  '25':
  - type: text
    content: 'Meanwhile, I thought I should send Epaphroditus back to you. He is a true brother, co-worker, and fellow soldier. And he was your messenger to help me in my need. '
  '26':
  - type: text
    content: 'I am sending him because he has been longing to see you, and he was very distressed that you heard he was ill. '
  '27':
  - type: text
    content: And he certainly was ill; in fact, he almost died. But God had mercy on him—and also on me, so that I would not have one sorrow after another.
  '28':
  - type: text
    content: 'So I am all the more anxious to send him back to you, for I know you will be glad to see him, and then I will not be so worried about you. '
  '29':
  - type: text
    content: Welcome him in the Lord’s love
  - type: note
    content: Greek in the Lord.
  - type: text
    content: ' and with great joy, and give him the honor that people like him deserve. '
  '3':
  - type: text
    content: 'Don’t be selfish; don’t try to impress others. Be humble, thinking of others as better than yourselves. '
  '30':
  - type: text
    content: For he risked his life for the work of Christ, and he was at the point of death while doing for me what you couldn’t do from far away.
  '4':
  - type: text
    content: Don’t look out only for your own interests, but take an interest in others, too.
  '5':
  - type: text
    content: You must have the same attitude that Christ Jesus had.
  '6':
  - type: text
    content: Though he was God,
  - type: note
    content: Or Being in the form of God.
  - type: text
    content: he did not think of equality with God
  - type: text
    content: as something to cling to.
  '7':
  - type: text
    content: Instead, he gave up his divine privileges
  - type: note
    content: Greek he emptied himself.
  - type: text
    content: ;
  - type: text
    content: he took the humble position of a slave
  - type: note
    content: Or the form of a slave.
  - type: text
    content: and was born as a human being.
  - type: text
    content: When he appeared in human form,
  - type: note
    content: Some English translations put this phrase in verse 8.
  '8':
  - type: text
    content: he humbled himself in obedience to God
  - type: text
    content: and died a criminal’s death on a cross.
  '9':
  - type: text
    content: Therefore, God elevated him to the place of highest honor
  - type: text
    content: and gave him the name above all other names,
