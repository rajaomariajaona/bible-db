document_id: 2SA.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Anointed King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this, David asked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Should I move back to one of the towns of Judah?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David asked, “Which town should I go to?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“To Hebron,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ishbosheth, Saul’s son, was forty years old when he became king, and he ruled from Mahanaim for two years. Meanwhile, the people of Judah remained loyal to David. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: David made Hebron his capital, and he ruled as king of Judah for seven and a half years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: War between Israel and Judah
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'One day Abner led Ishbosheth’s troops from Mahanaim to Gibeon. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: About the same time, Joab son of Zeruiah led David’s troops out and met them at the pool of Gibeon. The two groups sat down there, facing each other from opposite sides of the pool.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then Abner suggested to Joab, “Let’s have a few of our warriors fight hand to hand here in front of us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right,” Joab agreed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So twelve men were chosen to fight from each side—twelve men of Benjamin representing Ishbosheth son of Saul, and twelve representing David. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Each one grabbed his opponent by the hair and thrust his sword into the other’s side so that all of them died. So this place at Gibeon has been known ever since as the Field of Swords.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Helkath-hazzurim.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A fierce battle followed that day, and Abner and the men of Israel were defeated by the forces of David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Asahel
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joab, Abishai, and Asahel—the three sons of Zeruiah—were among David’s forces that day. Asahel could run like a gazelle, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and he began chasing Abner. He pursued him relentlessly, not stopping for anything. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'David’s two wives were Ahinoam from Jezreel and Abigail, the widow of Nabal from Carmel. So David and his wives '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When Abner looked back and saw him coming, he called out, “Is that you, Asahel?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, it is,” he replied.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Go fight someone else!” Abner warned. “Take on one of the younger men, and strip him of his weapons.” But Asahel kept right on chasing Abner.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Again Abner shouted to him, “Get away from here! I don’t want to kill you. How could I ever face your brother Joab again?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But Asahel refused to turn back, so Abner thrust the butt end of his spear through Asahel’s stomach, and the spear came out through his back. He stumbled to the ground and died there. And everyone who came by that spot stopped and stood still when they saw Asahel lying there.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When Joab and Abishai found out what had happened, they set out after Abner. The sun was just going down as they arrived at the hill of Ammah near Giah, along the road to the wilderness of Gibeon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Abner’s troops from the tribe of Benjamin regrouped there at the top of the hill to take a stand.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Abner shouted down to Joab, “Must we always be killing each other? Don’t you realize that bitterness is the only result? When will you call off your men from chasing their Israelite brothers?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then Joab said, “God only knows what would have happened if you hadn’t spoken, for we would have chased you all night if necessary.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So Joab blew the ram’s horn, and his men stopped chasing the troops of Israel.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: All that night Abner and his men retreated through the Jordan Valley.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:29a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Arabah.
      marker-yv: yv-n
    - type: text
      text: ' They crossed the Jordan River, traveling all through the morning,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:29b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'continued on through the Bithron. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and didn’t stop until they arrived at Mahanaim.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and his men and their families all moved to Judah, and they settled in the villages near Hebron. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Meanwhile, Joab and his men also returned home. When Joab counted his casualties, he discovered that only 19 men were missing in addition to Asahel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But 360 of Abner’s men had been killed, all from the tribe of Benjamin. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Joab and his men took Asahel’s body to Bethlehem and buried him there in his father’s tomb. Then they traveled all night and reached Hebron at daybreak.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then the men of Judah came to David and anointed him king over the people of Judah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David heard that the men of Jabesh-gilead had buried Saul, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'he sent them this message: “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you for being so loyal to your master Saul and giving him a decent burial. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be loyal to you in return and reward you with his unfailing love! And I, too, will reward you for what you have done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now that Saul is dead, I ask you to be my strong and loyal subjects like the people of Judah, who have anointed me as their new king.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ishbosheth Proclaimed King of Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But Abner son of Ner, the commander of Saul’s army, had already gone to Mahanaim with Saul’s son Ishbosheth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ishbosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is another name for Esh-baal.
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: There he proclaimed Ishbosheth king over Gilead, Jezreel, Ephraim, Benjamin, the land of the Ashurites, and all the rest of Israel.
