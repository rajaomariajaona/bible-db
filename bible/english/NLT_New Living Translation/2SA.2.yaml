document_id: 2SA.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King of Judah
  - type: text
    content: 'After this, David asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Should I move back to one of the towns of Judah?”'
  - type: text
    content: '“Yes,” the '
  - type: text
    content: Lord
  - type: text
    content: ' replied.'
  - type: text
    content: Then David asked, “Which town should I go to?”
  - type: text
    content: '“To Hebron,” the '
  - type: text
    content: Lord
  - type: text
    content: ' answered.'
  '10':
  - type: text
    content: 'Ishbosheth, Saul’s son, was forty years old when he became king, and he ruled from Mahanaim for two years. Meanwhile, the people of Judah remained loyal to David. '
  '11':
  - type: text
    content: David made Hebron his capital, and he ruled as king of Judah for seven and a half years.
  - type: heading
    content: War between Israel and Judah
  '12':
  - type: text
    content: 'One day Abner led Ishbosheth’s troops from Mahanaim to Gibeon. '
  '13':
  - type: text
    content: About the same time, Joab son of Zeruiah led David’s troops out and met them at the pool of Gibeon. The two groups sat down there, facing each other from opposite sides of the pool.
  '14':
  - type: text
    content: Then Abner suggested to Joab, “Let’s have a few of our warriors fight hand to hand here in front of us.”
  - type: text
    content: '“All right,” Joab agreed. '
  '15':
  - type: text
    content: 'So twelve men were chosen to fight from each side—twelve men of Benjamin representing Ishbosheth son of Saul, and twelve representing David. '
  '16':
  - type: text
    content: Each one grabbed his opponent by the hair and thrust his sword into the other’s side so that all of them died. So this place at Gibeon has been known ever since as the Field of Swords.
  - type: note
    content: Hebrew Helkath-hazzurim.
  '17':
  - type: text
    content: A fierce battle followed that day, and Abner and the men of Israel were defeated by the forces of David.
  - type: heading
    content: The Death of Asahel
  '18':
  - type: text
    content: 'Joab, Abishai, and Asahel—the three sons of Zeruiah—were among David’s forces that day. Asahel could run like a gazelle, '
  '19':
  - type: text
    content: 'and he began chasing Abner. He pursued him relentlessly, not stopping for anything. '
  '2':
  - type: text
    content: 'David’s two wives were Ahinoam from Jezreel and Abigail, the widow of Nabal from Carmel. So David and his wives '
  '20':
  - type: text
    content: When Abner looked back and saw him coming, he called out, “Is that you, Asahel?”
  - type: text
    content: “Yes, it is,” he replied.
  '21':
  - type: text
    content: “Go fight someone else!” Abner warned. “Take on one of the younger men, and strip him of his weapons.” But Asahel kept right on chasing Abner.
  '22':
  - type: text
    content: Again Abner shouted to him, “Get away from here! I don’t want to kill you. How could I ever face your brother Joab again?”
  '23':
  - type: text
    content: But Asahel refused to turn back, so Abner thrust the butt end of his spear through Asahel’s stomach, and the spear came out through his back. He stumbled to the ground and died there. And everyone who came by that spot stopped and stood still when they saw Asahel lying there.
  '24':
  - type: text
    content: 'When Joab and Abishai found out what had happened, they set out after Abner. The sun was just going down as they arrived at the hill of Ammah near Giah, along the road to the wilderness of Gibeon. '
  '25':
  - type: text
    content: Abner’s troops from the tribe of Benjamin regrouped there at the top of the hill to take a stand.
  '26':
  - type: text
    content: Abner shouted down to Joab, “Must we always be killing each other? Don’t you realize that bitterness is the only result? When will you call off your men from chasing their Israelite brothers?”
  '27':
  - type: text
    content: 'Then Joab said, “God only knows what would have happened if you hadn’t spoken, for we would have chased you all night if necessary.” '
  '28':
  - type: text
    content: So Joab blew the ram’s horn, and his men stopped chasing the troops of Israel.
  '29':
  - type: text
    content: All that night Abner and his men retreated through the Jordan Valley.
  - type: note
    content: Hebrew the Arabah.
  - type: text
    content: ' They crossed the Jordan River, traveling all through the morning,'
  - type: note
    content: Or continued on through the Bithron. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and didn’t stop until they arrived at Mahanaim.'
  '3':
  - type: text
    content: 'and his men and their families all moved to Judah, and they settled in the villages near Hebron. '
  '30':
  - type: text
    content: 'Meanwhile, Joab and his men also returned home. When Joab counted his casualties, he discovered that only 19 men were missing in addition to Asahel. '
  '31':
  - type: text
    content: 'But 360 of Abner’s men had been killed, all from the tribe of Benjamin. '
  '32':
  - type: text
    content: Joab and his men took Asahel’s body to Bethlehem and buried him there in his father’s tomb. Then they traveled all night and reached Hebron at daybreak.
  '4':
  - type: text
    content: Then the men of Judah came to David and anointed him king over the people of Judah.
  - type: text
    content: 'When David heard that the men of Jabesh-gilead had buried Saul, '
  '5':
  - type: text
    content: 'he sent them this message: “May the '
  - type: text
    content: Lord
  - type: text
    content: ' bless you for being so loyal to your master Saul and giving him a decent burial. '
  '6':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' be loyal to you in return and reward you with his unfailing love! And I, too, will reward you for what you have done. '
  '7':
  - type: text
    content: Now that Saul is dead, I ask you to be my strong and loyal subjects like the people of Judah, who have anointed me as their new king.”
  - type: heading
    content: Ishbosheth Proclaimed King of Israel
  '8':
  - type: text
    content: But Abner son of Ner, the commander of Saul’s army, had already gone to Mahanaim with Saul’s son Ishbosheth.
  - type: note
    content: Ishbosheth is another name for Esh-baal.
  - type: text
    content: ' '
  '9':
  - type: text
    content: There he proclaimed Ishbosheth king over Gilead, Jezreel, Ephraim, Benjamin, the land of the Ashurites, and all the rest of Israel.
