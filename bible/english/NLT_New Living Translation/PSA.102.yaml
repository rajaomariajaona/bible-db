document_id: PSA.102,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A prayer of one overwhelmed with trouble, pouring out problems before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear my prayer!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen to my plea!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: because of your anger and wrath.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For you have picked me up and thrown me out.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My life passes as swiftly as the evening shadows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am withering away like grass.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will sit on your throne forever.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your fame will endure to every generation.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You will arise and have mercy on Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 102:16.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now is the time to pity her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now is the time you promised to help.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For your people love every stone in her walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cherish even the dust in her streets.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the nations will tremble before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The kings of the earth will tremble before his glory.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rebuild Jerusalem.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will appear in his glory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He will listen to the prayers of the destitute.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not reject their pleas.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Let this be recorded for future generations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so that a people not yet born will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tell them the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looked down'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from his heavenly sanctuary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He looked down to earth from heaven
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Don’t turn away from me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in my time of distress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bend down to listen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and answer me quickly when I call to you.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: to hear the groans of the prisoners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to release those condemned to die.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fame will be celebrated in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his praises in Jerusalem,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: when multitudes gather together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and kingdoms come to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He broke my strength in midlife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cutting short my days.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But I cried to him, “O my God, who lives forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t take my life while I am so young!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Long ago you laid the foundation of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made the heavens with your hands.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: They will perish, but you remain forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will wear out like old clothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will change them like a garment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and discard them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But you are always the same;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will live forever.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The children of your people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will live in security.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children’s children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will thrive in your presence.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For my days disappear like smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bones burn like red-hot coals.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My heart is sick, withered like grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have lost my appetite.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Because of my groaning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am reduced to skin and bones.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I am like an owl in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a little owl in a far-off wilderness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I lie awake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lonely as a solitary bird on the roof.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: My enemies taunt me day after day.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They mock and curse me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I eat ashes for food.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My tears run down into my drink
