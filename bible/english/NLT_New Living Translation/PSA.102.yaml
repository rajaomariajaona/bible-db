document_id: PSA.102,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'A prayer of one overwhelmed with trouble, pouring out problems before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', hear my prayer!'
  - type: text
    content: Listen to my plea!
  '10':
  - type: text
    content: because of your anger and wrath.
  - type: text
    content: For you have picked me up and thrown me out.
  '11':
  - type: text
    content: My life passes as swiftly as the evening shadows.
  - type: text
    content: I am withering away like grass.
  '12':
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', will sit on your throne forever.'
  - type: text
    content: Your fame will endure to every generation.
  '13':
  - type: text
    content: You will arise and have mercy on Jerusalem
  - type: note
    content: Hebrew Zion; also in 102:16.
  - type: text
    content: —
  - type: text
    content: and now is the time to pity her,
  - type: text
    content: now is the time you promised to help.
  '14':
  - type: text
    content: For your people love every stone in her walls
  - type: text
    content: and cherish even the dust in her streets.
  '15':
  - type: text
    content: 'Then the nations will tremble before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: The kings of the earth will tremble before his glory.
  '16':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will rebuild Jerusalem.'
  - type: text
    content: He will appear in his glory.
  '17':
  - type: text
    content: He will listen to the prayers of the destitute.
  - type: text
    content: He will not reject their pleas.
  '18':
  - type: text
    content: Let this be recorded for future generations,
  - type: text
    content: 'so that a people not yet born will praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: 'Tell them the '
  - type: text
    content: Lord
  - type: text
    content: ' looked down'
  - type: text
    content: from his heavenly sanctuary.
  - type: text
    content: He looked down to earth from heaven
  '2':
  - type: text
    content: Don’t turn away from me
  - type: text
    content: in my time of distress.
  - type: text
    content: Bend down to listen,
  - type: text
    content: and answer me quickly when I call to you.
  '20':
  - type: text
    content: to hear the groans of the prisoners,
  - type: text
    content: to release those condemned to die.
  '21':
  - type: text
    content: 'And so the '
  - type: text
    content: Lord
  - type: text
    content: ’s fame will be celebrated in Zion,
  - type: text
    content: his praises in Jerusalem,
  '22':
  - type: text
    content: when multitudes gather together
  - type: text
    content: 'and kingdoms come to worship the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: He broke my strength in midlife,
  - type: text
    content: cutting short my days.
  '24':
  - type: text
    content: But I cried to him, “O my God, who lives forever,
  - type: text
    content: don’t take my life while I am so young!
  '25':
  - type: text
    content: Long ago you laid the foundation of the earth
  - type: text
    content: and made the heavens with your hands.
  '26':
  - type: text
    content: They will perish, but you remain forever;
  - type: text
    content: they will wear out like old clothing.
  - type: text
    content: You will change them like a garment
  - type: text
    content: and discard them.
  '27':
  - type: text
    content: But you are always the same;
  - type: text
    content: you will live forever.
  '28':
  - type: text
    content: The children of your people
  - type: text
    content: will live in security.
  - type: text
    content: Their children’s children
  - type: text
    content: will thrive in your presence.”
  '3':
  - type: text
    content: For my days disappear like smoke,
  - type: text
    content: and my bones burn like red-hot coals.
  '4':
  - type: text
    content: My heart is sick, withered like grass,
  - type: text
    content: and I have lost my appetite.
  '5':
  - type: text
    content: Because of my groaning,
  - type: text
    content: I am reduced to skin and bones.
  '6':
  - type: text
    content: I am like an owl in the desert,
  - type: text
    content: like a little owl in a far-off wilderness.
  '7':
  - type: text
    content: I lie awake,
  - type: text
    content: lonely as a solitary bird on the roof.
  '8':
  - type: text
    content: My enemies taunt me day after day.
  - type: text
    content: They mock and curse me.
  '9':
  - type: text
    content: I eat ashes for food.
  - type: text
    content: My tears run down into my drink
