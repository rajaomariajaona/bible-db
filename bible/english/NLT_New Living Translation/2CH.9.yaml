document_id: 2CH.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Visit of the Queen of Sheba
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the queen of Sheba heard of Solomon’s fame, she came to Jerusalem to test him with hard questions. She arrived with a large group of attendants and a great caravan of camels loaded with spices, large quantities of gold, and precious jewels. When she met with Solomon, she talked with him about everything she had on her mind. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Solomon had answers for all her questions; nothing was too hard for him to explain to her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When the queen of Sheba realized how wise Solomon was, and when she saw the palace he had built, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: she was overwhelmed. She was also amazed at the food on his tables, the organization of his officials and their splendid clothing, the cup-bearers and their robes, and the burnt offerings
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions (see also 1 Kgs 10:5); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and the ascent.
    marker-yv: yv-n
  - type: text
    text: ' Solomon made at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: She exclaimed to the king, “Everything I heard in my country about your achievements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your words.
    marker-yv: yv-n
  - type: text
    text: ' and wisdom is true! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I didn’t believe what was said until I arrived here and saw it with my own eyes. In fact, I had not heard the half of your great wisdom! It is far beyond what I was told. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'How happy your people must be! What a privilege for your officials to stand here day after day, listening to your wisdom! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who delights in you and has placed you on the throne as king to rule for him. Because God loves Israel and desires this kingdom to last forever, he has made you king over them so you can rule with justice and righteousness.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then she gave the king a gift of 9,000 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '120 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4,000 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of gold, great quantities of spices, and precious jewels. Never before had there been spices as fine as those the queen of Sheba gave to King Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: (In addition, the crews of Hiram and Solomon brought gold from Ophir, and they also brought red sandalwood
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'algum wood '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(also in 9:11); perhaps a variant spelling of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'almug. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare parallel text at 1 Kgs 10:11-12.
    marker-yv: yv-n
  - type: text
    text: ' and precious jewels. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The king used the sandalwood to make steps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gateways. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' for the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the royal palace, and to construct lyres and harps for the musicians. Never before had such beautiful things been seen in Judah.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: King Solomon gave the queen of Sheba whatever she asked for—gifts of greater value than the gifts she had given him. Then she and all her attendants returned to their own land.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Wealth and Splendor
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Each year Solomon received about 25 tons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '666 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[23 metric tons].'
    marker-yv: yv-n
  - type: text
    text: ' of gold. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: This did not include the additional revenue he received from merchants and traders. All the kings of Arabia and the governors of the provinces also brought gold and silver to Solomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: King Solomon made 200 large shields of hammered gold, each weighing more than 15 pounds.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '600 [shekels] of hammered gold '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[6.8 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He also made 300 smaller shields of hammered gold, each weighing more than 7-1/2 pounds.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '300 [shekels] of gold '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.4 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' The king placed these shields in the Palace of the Forest of Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the king made a huge throne, decorated with ivory and overlaid with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The throne had six steps, with a footstool of gold. There were armrests on both sides of the seat, and the figure of a lion stood on each side of the throne. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: There were also twelve other lions, one standing on each end of the six steps. No other throne in all the world could be compared with it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All of King Solomon’s drinking cups were solid gold, as were all the utensils in the Palace of the Forest of Lebanon. They were not made of silver, for silver was considered worthless in Solomon’s day!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The king had a fleet of trading ships of Tarshish manned by the sailors sent by Hiram.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Huram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Hiram.
    marker-yv: yv-n
  - type: text
    text: ' Once every three years the ships returned, loaded with gold, silver, ivory, apes, and peacocks.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and baboons.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So King Solomon became richer and wiser than any other king on earth. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kings from every nation came to consult him and to hear the wisdom God had given him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Year after year everyone who visited brought him gifts of silver and gold, clothing, weapons, spices, horses, and mules.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Solomon had 4,000 stalls for his horses and chariots, and he had 12,000 horses.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 12,000 charioteers.
    marker-yv: yv-n
  - type: text
    text: ' He stationed some of them in the chariot cities, and some near him in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He ruled over all the kings from the Euphrates River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: ' in the north to the land of the Philistines and the border of Egypt in the south. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The king made silver as plentiful in Jerusalem as stone. And valuable cedar timber was as common as the sycamore-fig trees that grow in the foothills of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Solomon’s horses were imported from Egypt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Muzur, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a district near Cilicia.
    marker-yv: yv-n
  - type: text
    text: ' and many other countries.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Summary of Solomon’s Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The rest of the events of Solomon’s reign, from beginning to end, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Record of Nathan the Prophet,
  - type: text
    text: ' and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prophecy of Ahijah from Shiloh,
  - type: text
    text: ' and also in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Visions of Iddo the Seer,
  - type: text
    text: ' concerning Jeroboam son of Nebat. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Solomon ruled in Jerusalem over all Israel for forty years. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: When he died, he was buried in the City of David, named for his father. Then his son Rehoboam became the next king.
