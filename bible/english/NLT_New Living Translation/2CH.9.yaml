document_id: 2CH.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Visit of the Queen of Sheba
  - type: text
    content: 'When the queen of Sheba heard of Solomon’s fame, she came to Jerusalem to test him with hard questions. She arrived with a large group of attendants and a great caravan of camels loaded with spices, large quantities of gold, and precious jewels. When she met with Solomon, she talked with him about everything she had on her mind. '
  '10':
  - type: text
    content: (In addition, the crews of Hiram and Solomon brought gold from Ophir, and they also brought red sandalwood
  - type: note
    content: Hebrew algum wood (also in 9:11); perhaps a variant spelling of almug. Compare parallel text at 1 Kgs 10:11-12.
  - type: text
    content: ' and precious jewels. '
  '11':
  - type: text
    content: The king used the sandalwood to make steps
  - type: note
    content: Or gateways. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace, and to construct lyres and harps for the musicians. Never before had such beautiful things been seen in Judah.)'
  '12':
  - type: text
    content: King Solomon gave the queen of Sheba whatever she asked for—gifts of greater value than the gifts she had given him. Then she and all her attendants returned to their own land.
  - type: heading
    content: Solomon’s Wealth and Splendor
  '13':
  - type: text
    content: Each year Solomon received about 25 tons
  - type: note
    content: Hebrew 666 talents [23 metric tons].
  - type: text
    content: ' of gold. '
  '14':
  - type: text
    content: This did not include the additional revenue he received from merchants and traders. All the kings of Arabia and the governors of the provinces also brought gold and silver to Solomon.
  '15':
  - type: text
    content: King Solomon made 200 large shields of hammered gold, each weighing more than 15 pounds.
  - type: note
    content: Hebrew 600 [shekels] of hammered gold [6.8 kilograms].
  - type: text
    content: ' '
  '16':
  - type: text
    content: He also made 300 smaller shields of hammered gold, each weighing more than 7-1/2 pounds.
  - type: note
    content: Hebrew 300 [shekels] of gold [3.4 kilograms].
  - type: text
    content: ' The king placed these shields in the Palace of the Forest of Lebanon.'
  '17':
  - type: text
    content: 'Then the king made a huge throne, decorated with ivory and overlaid with pure gold. '
  '18':
  - type: text
    content: 'The throne had six steps, with a footstool of gold. There were armrests on both sides of the seat, and the figure of a lion stood on each side of the throne. '
  '19':
  - type: text
    content: There were also twelve other lions, one standing on each end of the six steps. No other throne in all the world could be compared with it!
  '2':
  - type: text
    content: 'Solomon had answers for all her questions; nothing was too hard for him to explain to her. '
  '20':
  - type: text
    content: All of King Solomon’s drinking cups were solid gold, as were all the utensils in the Palace of the Forest of Lebanon. They were not made of silver, for silver was considered worthless in Solomon’s day!
  '21':
  - type: text
    content: The king had a fleet of trading ships of Tarshish manned by the sailors sent by Hiram.
  - type: note
    content: Hebrew Huram, a variant spelling of Hiram.
  - type: text
    content: ' Once every three years the ships returned, loaded with gold, silver, ivory, apes, and peacocks.'
  - type: note
    content: Or and baboons.
  '22':
  - type: text
    content: 'So King Solomon became richer and wiser than any other king on earth. '
  '23':
  - type: text
    content: 'Kings from every nation came to consult him and to hear the wisdom God had given him. '
  '24':
  - type: text
    content: Year after year everyone who visited brought him gifts of silver and gold, clothing, weapons, spices, horses, and mules.
  '25':
  - type: text
    content: Solomon had 4,000 stalls for his horses and chariots, and he had 12,000 horses.
  - type: note
    content: Or 12,000 charioteers.
  - type: text
    content: ' He stationed some of them in the chariot cities, and some near him in Jerusalem. '
  '26':
  - type: text
    content: He ruled over all the kings from the Euphrates River
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' in the north to the land of the Philistines and the border of Egypt in the south. '
  '27':
  - type: text
    content: The king made silver as plentiful in Jerusalem as stone. And valuable cedar timber was as common as the sycamore-fig trees that grow in the foothills of Judah.
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Solomon’s horses were imported from Egypt
  - type: note
    content: Possibly Muzur, a district near Cilicia.
  - type: text
    content: ' and many other countries.'
  - type: heading
    content: Summary of Solomon’s Reign
  '29':
  - type: text
    content: 'The rest of the events of Solomon’s reign, from beginning to end, are recorded in '
  - type: text
    content: The Record of Nathan the Prophet,
  - type: text
    content: ' and '
  - type: text
    content: The Prophecy of Ahijah from Shiloh,
  - type: text
    content: ' and also in '
  - type: text
    content: The Visions of Iddo the Seer,
  - type: text
    content: ' concerning Jeroboam son of Nebat. '
  '3':
  - type: text
    content: 'When the queen of Sheba realized how wise Solomon was, and when she saw the palace he had built, '
  '30':
  - type: text
    content: 'Solomon ruled in Jerusalem over all Israel for forty years. '
  '31':
  - type: text
    content: When he died, he was buried in the City of David, named for his father. Then his son Rehoboam became the next king.
  '4':
  - type: text
    content: she was overwhelmed. She was also amazed at the food on his tables, the organization of his officials and their splendid clothing, the cup-bearers and their robes, and the burnt offerings
  - type: note
    content: As in Greek and Syriac versions (see also 1 Kgs 10:5); Hebrew reads and the ascent.
  - type: text
    content: ' Solomon made at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: She exclaimed to the king, “Everything I heard in my country about your achievements
  - type: note
    content: Hebrew your words.
  - type: text
    content: ' and wisdom is true! '
  '6':
  - type: text
    content: 'I didn’t believe what was said until I arrived here and saw it with my own eyes. In fact, I had not heard the half of your great wisdom! It is far beyond what I was told. '
  '7':
  - type: text
    content: 'How happy your people must be! What a privilege for your officials to stand here day after day, listening to your wisdom! '
  '8':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who delights in you and has placed you on the throne as king to rule for him. Because God loves Israel and desires this kingdom to last forever, he has made you king over them so you can rule with justice and righteousness.”'
  '9':
  - type: text
    content: Then she gave the king a gift of 9,000 pounds
  - type: note
    content: Hebrew 120 talents [4,000 kilograms].
  - type: text
    content: ' of gold, great quantities of spices, and precious jewels. Never before had there been spices as fine as those the queen of Sheba gave to King Solomon.'
