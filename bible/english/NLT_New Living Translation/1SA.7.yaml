document_id: 1SA.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the men of Kiriath-jearim came to get the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They took it to the hillside home of Abinadab and ordained Eleazar, his son, to be in charge of it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Ark remained in Kiriath-jearim for a long time—twenty years in all. During that time all Israel mourned because it seemed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had abandoned them.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samuel Leads Israel to Victory
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Samuel said to all the people of Israel, “If you want to return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all your hearts, get rid of your foreign gods and your images of Ashtoreth. Turn your hearts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and obey him alone; then he will rescue you from the Philistines.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the Israelites got rid of their images of Baal and Ashtoreth and worshiped only the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Samuel told them, “Gather all of Israel to Mizpah, and I will pray to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for you.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So they gathered at Mizpah and, in a great ceremony, drew water from a well and poured it out before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They also went without food all day and confessed that they had sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . (It was at Mizpah that Samuel became Israel’s judge.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the Philistine rulers heard that Israel had gathered at Mizpah, they mobilized their army and advanced. The Israelites were badly frightened when they learned that the Philistines were approaching. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Don’t stop pleading with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God to save us from the Philistines!” they begged Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Samuel took a young lamb and offered it to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a whole burnt offering. He pleaded with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to help Israel, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Just as Samuel was sacrificing the burnt offering, the Philistines arrived to attack Israel. But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke with a mighty voice of thunder from heaven that day, and the Philistines were thrown into such confusion that the Israelites defeated them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The men of Israel chased them from Mizpah to a place below Beth-car, slaughtering them all along the way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Samuel then took a large stone and placed it between the towns of Mizpah and Jeshanah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shen.
    marker-yv: yv-n
  - type: text
    text: ' He named it Ebenezer (which means “the stone of help”), for he said, “Up to this point the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has helped us!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So the Philistines were subdued and didn’t invade Israel again for some time. And throughout Samuel’s lifetime, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s powerful hand was raised against the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The Israelite villages near Ekron and Gath that the Philistines had captured were restored to Israel, along with the rest of the territory that the Philistines had taken. And there was peace between Israel and the Amorites in those days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samuel continued as Israel’s judge for the rest of his life. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Each year he traveled around, setting up his court first at Bethel, then at Gilgal, and then at Mizpah. He judged the people of Israel at each of these places. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he would return to his home at Ramah, and he would hear cases there, too. And Samuel built an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at Ramah.'
