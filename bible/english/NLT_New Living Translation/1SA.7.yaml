document_id: 1SA.7,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'So the men of Kiriath-jearim came to get the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. They took it to the hillside home of Abinadab and ordained Eleazar, his son, to be in charge of it. '
  '10':
  - type: text
    content: 'Just as Samuel was sacrificing the burnt offering, the Philistines arrived to attack Israel. But the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke with a mighty voice of thunder from heaven that day, and the Philistines were thrown into such confusion that the Israelites defeated them. '
  '11':
  - type: text
    content: The men of Israel chased them from Mizpah to a place below Beth-car, slaughtering them all along the way.
  '12':
  - type: text
    content: Samuel then took a large stone and placed it between the towns of Mizpah and Jeshanah.
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads Shen.
  - type: text
    content: ' He named it Ebenezer (which means “the stone of help”), for he said, “Up to this point the '
  - type: text
    content: Lord
  - type: text
    content: ' has helped us!”'
  '13':
  - type: text
    content: 'So the Philistines were subdued and didn’t invade Israel again for some time. And throughout Samuel’s lifetime, the '
  - type: text
    content: Lord
  - type: text
    content: '’s powerful hand was raised against the Philistines. '
  '14':
  - type: text
    content: The Israelite villages near Ekron and Gath that the Philistines had captured were restored to Israel, along with the rest of the territory that the Philistines had taken. And there was peace between Israel and the Amorites in those days.
  '15':
  - type: text
    content: 'Samuel continued as Israel’s judge for the rest of his life. '
  '16':
  - type: text
    content: 'Each year he traveled around, setting up his court first at Bethel, then at Gilgal, and then at Mizpah. He judged the people of Israel at each of these places. '
  '17':
  - type: text
    content: 'Then he would return to his home at Ramah, and he would hear cases there, too. And Samuel built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' at Ramah.'
  '2':
  - type: text
    content: 'The Ark remained in Kiriath-jearim for a long time—twenty years in all. During that time all Israel mourned because it seemed the '
  - type: text
    content: Lord
  - type: text
    content: ' had abandoned them.'
  - type: heading
    content: Samuel Leads Israel to Victory
  '3':
  - type: text
    content: 'Then Samuel said to all the people of Israel, “If you want to return to the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your hearts, get rid of your foreign gods and your images of Ashtoreth. Turn your hearts to the '
  - type: text
    content: Lord
  - type: text
    content: ' and obey him alone; then he will rescue you from the Philistines.” '
  '4':
  - type: text
    content: 'So the Israelites got rid of their images of Baal and Ashtoreth and worshiped only the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'Then Samuel told them, “Gather all of Israel to Mizpah, and I will pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' for you.” '
  '6':
  - type: text
    content: 'So they gathered at Mizpah and, in a great ceremony, drew water from a well and poured it out before the '
  - type: text
    content: Lord
  - type: text
    content: '. They also went without food all day and confessed that they had sinned against the '
  - type: text
    content: Lord
  - type: text
    content: . (It was at Mizpah that Samuel became Israel’s judge.)
  '7':
  - type: text
    content: 'When the Philistine rulers heard that Israel had gathered at Mizpah, they mobilized their army and advanced. The Israelites were badly frightened when they learned that the Philistines were approaching. '
  '8':
  - type: text
    content: '“Don’t stop pleading with the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to save us from the Philistines!” they begged Samuel. '
  '9':
  - type: text
    content: 'So Samuel took a young lamb and offered it to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a whole burnt offering. He pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' to help Israel, and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him.'
