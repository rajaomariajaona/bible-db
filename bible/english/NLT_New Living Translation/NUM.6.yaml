document_id: NUM.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nazirite Laws
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: On the eighth day they must bring two turtledoves or two young pigeons to the priest at the entrance of the Tabernacle.
  - type: note
    content: Hebrew the Tent of Meeting; also in 6:13, 18.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The priest will offer one of the birds for a sin offering and the other for a burnt offering. In this way, he will purify them
  - type: note
    content: Or make atonement for them.
  - type: text
    content: ' from the guilt they incurred through contact with the dead body. Then they must reaffirm their commitment and let their hair begin to grow again. '
  '12':
  - type: text
    content: 'The days of their vow that were completed before their defilement no longer count. They must rededicate themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a Nazirite for the full term of their vow, and each must bring a one-year-old male lamb for a guilt offering.'
  '13':
  - type: text
    content: '“This is the ritual law for Nazirites. At the conclusion of their time of separation as Nazirites, they must each go to the entrance of the Tabernacle '
  '14':
  - type: text
    content: 'and offer their sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ': a one-year-old male lamb without defect for a burnt offering, a one-year-old female lamb without defect for a sin offering, a ram without defect for a peace offering, '
  '15':
  - type: text
    content: 'a basket of bread made without yeast—cakes of choice flour mixed with olive oil and wafers spread with olive oil—along with their prescribed grain offerings and liquid offerings. '
  '16':
  - type: text
    content: 'The priest will present these offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ': first the sin offering and the burnt offering; '
  '17':
  - type: text
    content: 'then the ram for a peace offering, along with the basket of bread made without yeast. The priest must also present the prescribed grain offering and liquid offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: '“Then the Nazirites will shave their heads at the entrance of the Tabernacle. They will take the hair that had been dedicated and place it on the fire beneath the peace-offering sacrifice. '
  '19':
  - type: text
    content: 'After the Nazirite’s head has been shaved, the priest will take for each of them the boiled shoulder of the ram, and he will take from the basket a cake and a wafer made without yeast. He will put them all into the Nazirite’s hands. '
  '2':
  - type: text
    content: “Give the following instructions to the people of Israel.
  - type: text
    content: '“If any of the people, either men or women, take the special vow of a Nazirite, setting themselves apart to the '
  - type: text
    content: Lord
  - type: text
    content: ' in a special way, '
  '20':
  - type: text
    content: 'Then the priest will lift them up as a special offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. These are holy portions for the priest, along with the breast of the special offering and the thigh of the sacred offering that are lifted up before the '
  - type: text
    content: Lord
  - type: text
    content: . After this ceremony the Nazirites may again drink wine.
  '21':
  - type: text
    content: '“This is the ritual law of the Nazirites, who vow to bring these offerings to the '
  - type: text
    content: Lord
  - type: text
    content: . They may also bring additional offerings if they can afford it. And they must be careful to do whatever they vowed when they set themselves apart as Nazirites.”
  - type: heading
    content: The Priestly Blessing
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Tell Aaron and his sons to bless the people of Israel with this special blessing:'
  '24':
  - type: text
    content: '‘May the '
  - type: text
    content: Lord
  - type: text
    content: ' bless you'
  - type: text
    content: and protect you.
  '25':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' smile on you'
  - type: text
    content: and be gracious to you.
  '26':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' show you his favor'
  - type: text
    content: and give you his peace.’
  '27':
  - type: text
    content: Whenever Aaron and his sons bless the people of Israel in my name, I myself will bless them.”
  '3':
  - type: text
    content: 'they must give up wine and other alcoholic drinks. They must not use vinegar made from wine or from other alcoholic drinks, they must not drink fresh grape juice, and they must not eat grapes or raisins. '
  '4':
  - type: text
    content: As long as they are bound by their Nazirite vow, they are not allowed to eat or drink anything that comes from a grapevine—not even the grape seeds or skins.
  '5':
  - type: text
    content: '“They must never cut their hair throughout the time of their vow, for they are holy and set apart to the '
  - type: text
    content: Lord
  - type: text
    content: '. Until the time of their vow has been fulfilled, they must let their hair grow long. '
  '6':
  - type: text
    content: 'And they must not go near a dead body during the entire period of their vow to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Even if the dead person is their own father, mother, brother, or sister, they must not defile themselves, for the hair on their head is the symbol of their separation to God. '
  '8':
  - type: text
    content: 'This requirement applies as long as they are set apart to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“If someone falls dead beside them, the hair they have dedicated will be defiled. They must wait for seven days and then shave their heads. Then they will be cleansed from their defilement. '
