document_id: NUM.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nazirite Laws
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the eighth day they must bring two turtledoves or two young pigeons to the priest at the entrance of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 6:13, 18.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest will offer one of the birds for a sin offering and the other for a burnt offering. In this way, he will purify them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: make atonement for them.
      marker-yv: yv-n
    - type: text
      text: ' from the guilt they incurred through contact with the dead body. Then they must reaffirm their commitment and let their hair begin to grow again. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The days of their vow that were completed before their defilement no longer count. They must rededicate themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a Nazirite for the full term of their vow, and each must bring a one-year-old male lamb for a guilt offering.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the ritual law for Nazirites. At the conclusion of their time of separation as Nazirites, they must each go to the entrance of the Tabernacle '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and offer their sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': a one-year-old male lamb without defect for a burnt offering, a one-year-old female lamb without defect for a sin offering, a ram without defect for a peace offering, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a basket of bread made without yeast—cakes of choice flour mixed with olive oil and wafers spread with olive oil—along with their prescribed grain offerings and liquid offerings. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will present these offerings before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': first the sin offering and the burnt offering; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then the ram for a peace offering, along with the basket of bread made without yeast. The priest must also present the prescribed grain offering and liquid offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the Nazirites will shave their heads at the entrance of the Tabernacle. They will take the hair that had been dedicated and place it on the fire beneath the peace-offering sacrifice. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the Nazirite’s head has been shaved, the priest will take for each of them the boiled shoulder of the ram, and he will take from the basket a cake and a wafer made without yeast. He will put them all into the Nazirite’s hands. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Give the following instructions to the people of Israel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If any of the people, either men or women, take the special vow of a Nazirite, setting themselves apart to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in a special way, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priest will lift them up as a special offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. These are holy portions for the priest, along with the breast of the special offering and the thigh of the sacred offering that are lifted up before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . After this ceremony the Nazirites may again drink wine.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the ritual law of the Nazirites, who vow to bring these offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . They may also bring additional offerings if they can afford it. And they must be careful to do whatever they vowed when they set themselves apart as Nazirites.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priestly Blessing
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Tell Aaron and his sons to bless the people of Israel with this special blessing:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and protect you.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' smile on you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be gracious to you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' show you his favor'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give you his peace.’
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Whenever Aaron and his sons bless the people of Israel in my name, I myself will bless them.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they must give up wine and other alcoholic drinks. They must not use vinegar made from wine or from other alcoholic drinks, they must not drink fresh grape juice, and they must not eat grapes or raisins. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As long as they are bound by their Nazirite vow, they are not allowed to eat or drink anything that comes from a grapevine—not even the grape seeds or skins.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“They must never cut their hair throughout the time of their vow, for they are holy and set apart to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Until the time of their vow has been fulfilled, they must let their hair grow long. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they must not go near a dead body during the entire period of their vow to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even if the dead person is their own father, mother, brother, or sister, they must not defile themselves, for the hair on their head is the symbol of their separation to God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This requirement applies as long as they are set apart to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If someone falls dead beside them, the hair they have dedicated will be defiled. They must wait for seven days and then shave their heads. Then they will be cleansed from their defilement. '
