document_id: MIC.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Case against Israel
  - type: text
    content: 'Listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' is saying:'
  - type: text
    content: “Stand up and state your case against me.
  - type: text
    content: Let the mountains and hills be called to witness your complaints.
  '10':
  - type: text
    content: What shall I say about the homes of the wicked
  - type: text
    content: filled with treasures gained by cheating?
  - type: text
    content: What about the disgusting practice
  - type: text
    content: of measuring out grain with dishonest measures?
  - type: note
    content: Hebrew of using the short ephah? The ephah was a unit for measuring grain.
  '11':
  - type: text
    content: How can I tolerate your merchants
  - type: text
    content: who use dishonest scales and weights?
  '12':
  - type: text
    content: The rich among you have become wealthy
  - type: text
    content: through extortion and violence.
  - type: text
    content: Your citizens are so used to lying
  - type: text
    content: that their tongues can no longer tell the truth.
  '13':
  - type: text
    content: “Therefore, I will wound you!
  - type: text
    content: I will bring you to ruin for all your sins.
  '14':
  - type: text
    content: You will eat but never have enough.
  - type: text
    content: Your hunger pangs and emptiness will remain.
  - type: text
    content: And though you try to save your money,
  - type: text
    content: it will come to nothing in the end.
  - type: text
    content: You will save a little,
  - type: text
    content: but I will give it to those who conquer you.
  '15':
  - type: text
    content: You will plant crops
  - type: text
    content: but not harvest them.
  - type: text
    content: You will press your olives
  - type: text
    content: but not get enough oil to anoint yourselves.
  - type: text
    content: You will trample the grapes
  - type: text
    content: but get no juice to make your wine.
  '16':
  - type: text
    content: You keep only the laws of evil King Omri;
  - type: text
    content: you follow only the example of wicked King Ahab!
  - type: text
    content: Therefore, I will make an example of you,
  - type: text
    content: bringing you to complete ruin.
  - type: text
    content: You will be treated with contempt,
  - type: text
    content: mocked by all who see you.”
  '2':
  - type: text
    content: And now, O mountains,
  - type: text
    content: 'listen to the '
  - type: text
    content: Lord
  - type: text
    content: ’s complaint!
  - type: text
    content: He has a case against his people.
  - type: text
    content: He will bring charges against Israel.
  '3':
  - type: text
    content: “O my people, what have I done to you?
  - type: text
    content: What have I done to make you tired of me?
  - type: text
    content: Answer me!
  '4':
  - type: text
    content: For I brought you out of Egypt
  - type: text
    content: and redeemed you from slavery.
  - type: text
    content: I sent Moses, Aaron, and Miriam to help you.
  '5':
  - type: text
    content: Don’t you remember, my people,
  - type: text
    content: how King Balak of Moab tried to have you cursed
  - type: text
    content: and how Balaam son of Beor blessed you instead?
  - type: text
    content: And remember your journey from Acacia Grove
  - type: note
    content: Hebrew Shittim.
  - type: text
    content: ' to Gilgal,'
  - type: text
    content: 'when I, the '
  - type: text
    content: Lord
  - type: text
    content: ', did everything I could'
  - type: text
    content: to teach you about my faithfulness.”
  '6':
  - type: text
    content: 'What can we bring to the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Should we bring him burnt offerings?
  - type: text
    content: Should we bow before God Most High
  - type: text
    content: with offerings of yearling calves?
  '7':
  - type: text
    content: Should we offer him thousands of rams
  - type: text
    content: and ten thousand rivers of olive oil?
  - type: text
    content: Should we sacrifice our firstborn children
  - type: text
    content: to pay for our sins?
  '8':
  - type: text
    content: 'No, O people, the '
  - type: text
    content: Lord
  - type: text
    content: ' has told you what is good,'
  - type: text
    content: 'and this is what he requires of you:'
  - type: text
    content: to do what is right, to love mercy,
  - type: text
    content: and to walk humbly with your God.
  - type: heading
    content: Israel’s Guilt and Punishment
  '9':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ' if you are wise!'
  - type: text
    content: 'His voice calls to everyone in Jerusalem:'
  - type: text
    content: “The armies of destruction are coming;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is sending them.'
  - type: note
    content: Hebrew “Listen to the rod. / Who appointed it?”
