document_id: MIC.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Case against Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Listen to what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stand up and state your case against me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the mountains and hills be called to witness your complaints.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: What shall I say about the homes of the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filled with treasures gained by cheating?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What about the disgusting practice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of measuring out grain with dishonest measures?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of using the short ephah? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ephah was a unit for measuring grain.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: How can I tolerate your merchants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who use dishonest scales and weights?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The rich among you have become wealthy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through extortion and violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your citizens are so used to lying
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that their tongues can no longer tell the truth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Therefore, I will wound you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring you to ruin for all your sins.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You will eat but never have enough.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your hunger pangs and emptiness will remain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And though you try to save your money,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will come to nothing in the end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will save a little,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will give it to those who conquer you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You will plant crops
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not harvest them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will press your olives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not get enough oil to anoint yourselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will trample the grapes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but get no juice to make your wine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: You keep only the laws of evil King Omri;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you follow only the example of wicked King Ahab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I will make an example of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing you to complete ruin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be treated with contempt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mocked by all who see you.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And now, O mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'listen to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s complaint!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has a case against his people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bring charges against Israel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “O my people, what have I done to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What have I done to make you tired of me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Answer me!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For I brought you out of Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and redeemed you from slavery.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sent Moses, Aaron, and Miriam to help you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Don’t you remember, my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how King Balak of Moab tried to have you cursed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how Balaam son of Beor blessed you instead?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remember your journey from Acacia Grove
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shittim.
      marker-yv: yv-n
    - type: text
      text: ' to Gilgal,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'when I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', did everything I could'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to teach you about my faithfulness.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'What can we bring to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should we bring him burnt offerings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should we bow before God Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with offerings of yearling calves?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Should we offer him thousands of rams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ten thousand rivers of olive oil?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should we sacrifice our firstborn children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pay for our sins?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'No, O people, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told you what is good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and this is what he requires of you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to do what is right, to love mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to walk humbly with your God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Guilt and Punishment
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' if you are wise!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His voice calls to everyone in Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The armies of destruction are coming;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is sending them.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Listen to the rod. / Who appointed it?”
      marker-yv: yv-n
