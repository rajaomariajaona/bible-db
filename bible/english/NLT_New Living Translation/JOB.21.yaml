document_id: JOB.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Seventh Speech: A Response to Zophar'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: Their bulls never fail to breed.
  - type: text
    content: Their cows bear calves and never miscarry.
  '11':
  - type: text
    content: They let their children frisk about like lambs.
  - type: text
    content: Their little ones skip and dance.
  '12':
  - type: text
    content: They sing with tambourine and harp.
  - type: text
    content: They celebrate to the sound of the flute.
  '13':
  - type: text
    content: They spend their days in prosperity,
  - type: text
    content: then go down to the grave
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: ' in peace.'
  '14':
  - type: text
    content: And yet they say to God, ‘Go away.
  - type: text
    content: We want no part of you and your ways.
  '15':
  - type: text
    content: Who is the Almighty, and why should we obey him?
  - type: text
    content: What good will it do us to pray?’
  '16':
  - type: text
    content: (They think their prosperity is of their own doing,
  - type: text
    content: but I will have nothing to do with that kind of thinking.)
  '17':
  - type: text
    content: “Yet the light of the wicked never seems to be extinguished.
  - type: text
    content: Do they ever have trouble?
  - type: text
    content: Does God distribute sorrows to them in anger?
  '18':
  - type: text
    content: Are they driven before the wind like straw?
  - type: text
    content: Are they carried away by the storm like chaff?
  - type: text
    content: Not at all!
  '19':
  - type: text
    content: “‘Well,’ you say, ‘at least God will punish their children!’
  - type: text
    content: But I say he should punish the ones who sin,
  - type: text
    content: so that they understand his judgment.
  '2':
  - type: text
    content: “Listen closely to what I am saying.
  - type: text
    content: That’s one consolation you can give me.
  '20':
  - type: text
    content: Let them see their destruction with their own eyes.
  - type: text
    content: Let them drink deeply of the anger of the Almighty.
  '21':
  - type: text
    content: For they will not care what happens to their family
  - type: text
    content: after they are dead.
  '22':
  - type: text
    content: “But who can teach a lesson to God,
  - type: text
    content: since he judges even the most powerful?
  '23':
  - type: text
    content: One person dies in prosperity,
  - type: text
    content: completely comfortable and secure,
  '24':
  - type: text
    content: the picture of good health,
  - type: text
    content: vigorous and fit.
  '25':
  - type: text
    content: Another person dies in bitter poverty,
  - type: text
    content: never having tasted the good life.
  '26':
  - type: text
    content: But both are buried in the same dust,
  - type: text
    content: both eaten by the same maggots.
  '27':
  - type: text
    content: “Look, I know what you’re thinking.
  - type: text
    content: I know the schemes you plot against me.
  '28':
  - type: text
    content: You will tell me of rich and wicked people
  - type: text
    content: whose houses have vanished because of their sins.
  '29':
  - type: text
    content: But ask those who have been around,
  - type: text
    content: and they will tell you the truth.
  '3':
  - type: text
    content: Bear with me, and let me speak.
  - type: text
    content: After I have spoken, you may resume mocking me.
  '30':
  - type: text
    content: Evil people are spared in times of calamity
  - type: text
    content: and are allowed to escape disaster.
  '31':
  - type: text
    content: No one criticizes them openly
  - type: text
    content: or pays them back for what they have done.
  '32':
  - type: text
    content: When they are carried to the grave,
  - type: text
    content: an honor guard keeps watch at their tomb.
  '33':
  - type: text
    content: A great funeral procession goes to the cemetery.
  - type: text
    content: Many pay their respects as the body is laid to rest,
  - type: text
    content: and the earth gives sweet repose.
  '34':
  - type: text
    content: “How can your empty clichés comfort me?
  - type: text
    content: All your explanations are lies!”
  '4':
  - type: text
    content: “My complaint is with God, not with people.
  - type: text
    content: I have good reason to be so impatient.
  '5':
  - type: text
    content: Look at me and be stunned.
  - type: text
    content: Put your hand over your mouth in shock.
  '6':
  - type: text
    content: When I think about what I am saying, I shudder.
  - type: text
    content: My body trembles.
  '7':
  - type: text
    content: “Why do the wicked prosper,
  - type: text
    content: growing old and powerful?
  '8':
  - type: text
    content: They live to see their children grow up and settle down,
  - type: text
    content: and they enjoy their grandchildren.
  '9':
  - type: text
    content: Their homes are safe from every fear,
  - type: text
    content: and God does not punish them.
