document_id: JOB.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job’s Seventh Speech: A Response to Zophar'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job spoke again:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Listen closely to what I am saying.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That’s one consolation you can give me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Bear with me, and let me speak.
- type: usfm
  marker: q2
  children:
  - type: text
    text: After I have spoken, you may resume mocking me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “My complaint is with God, not with people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have good reason to be so impatient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look at me and be stunned.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put your hand over your mouth in shock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When I think about what I am saying, I shudder.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My body trembles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Why do the wicked prosper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: growing old and powerful?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They live to see their children grow up and settle down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they enjoy their grandchildren.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their homes are safe from every fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God does not punish them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Their bulls never fail to breed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their cows bear calves and never miscarry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They let their children frisk about like lambs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their little ones skip and dance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They sing with tambourine and harp.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They celebrate to the sound of the flute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They spend their days in prosperity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then go down to the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
  - type: text
    text: ' in peace.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And yet they say to God, ‘Go away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We want no part of you and your ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Who is the Almighty, and why should we obey him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What good will it do us to pray?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: (They think their prosperity is of their own doing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will have nothing to do with that kind of thinking.)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Yet the light of the wicked never seems to be extinguished.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do they ever have trouble?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does God distribute sorrows to them in anger?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Are they driven before the wind like straw?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are they carried away by the storm like chaff?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not at all!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “‘Well,’ you say, ‘at least God will punish their children!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: But I say he should punish the ones who sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that they understand his judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Let them see their destruction with their own eyes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them drink deeply of the anger of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For they will not care what happens to their family
- type: usfm
  marker: q2
  children:
  - type: text
    text: after they are dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “But who can teach a lesson to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since he judges even the most powerful?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: One person dies in prosperity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: completely comfortable and secure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: the picture of good health,
- type: usfm
  marker: q2
  children:
  - type: text
    text: vigorous and fit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Another person dies in bitter poverty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never having tasted the good life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But both are buried in the same dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: both eaten by the same maggots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Look, I know what you’re thinking.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know the schemes you plot against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You will tell me of rich and wicked people
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose houses have vanished because of their sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But ask those who have been around,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will tell you the truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Evil people are spared in times of calamity
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are allowed to escape disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: No one criticizes them openly
- type: usfm
  marker: q2
  children:
  - type: text
    text: or pays them back for what they have done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: When they are carried to the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an honor guard keeps watch at their tomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: A great funeral procession goes to the cemetery.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Many pay their respects as the body is laid to rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the earth gives sweet repose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “How can your empty clichés comfort me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your explanations are lies!”
