document_id: ZEC.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Justice and Mercy
  - type: text
    content: On December 7
  - type: note
    content: Hebrew On the fourth day of the ninth month, the month of Kislev, of the ancient Hebrew lunar calendar. This event occurred on December 7, 518 b.c.; also see note on 1:1.
  - type: text
    content: ' of the fourth year of King Darius’s reign, another message came to Zechariah from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: Do not oppress widows, orphans, foreigners, and the poor. And do not scheme against each other.
  '11':
  - type: text
    content: '“Your ancestors refused to listen to this message. They stubbornly turned away and put their fingers in their ears to keep from hearing. '
  '12':
  - type: text
    content: 'They made their hearts as hard as stone, so they could not hear the instructions or the messages that the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies had sent them by his Spirit through the earlier prophets. That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies was so angry with them.'
  '13':
  - type: text
    content: '“Since they refused to listen when I called to them, I would not listen when they called to me, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '14':
  - type: text
    content: As with a whirlwind, I scattered them among the distant nations, where they lived as strangers. Their land became so desolate that no one even traveled through it. They turned their pleasant land into a desert.”
  '2':
  - type: text
    content: The people of Bethel had sent Sharezer and Regemmelech,
  - type: note
    content: Or Bethel-sharezer had sent Regemmelech.
  - type: text
    content: ' along with their attendants, to seek the '
  - type: text
    content: Lord
  - type: text
    content: '’s favor. '
  '3':
  - type: text
    content: 'They were to ask this question of the prophets and the priests at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies: “Should we continue to mourn and fast each summer on the anniversary of the Temple’s destruction,'
  - type: note
    content: Hebrew mourn and fast in the fifth month. The Temple had been destroyed in the fifth month of the ancient Hebrew lunar calendar (August 586 b.c.); see 2 Kgs 25:8.
  - type: text
    content: ' as we have done for so many years?”'
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies sent me this message in reply: '
  '5':
  - type: text
    content: “Say to all your people and your priests, ‘During these seventy years of exile, when you fasted and mourned in the summer and in early autumn,
  - type: note
    content: Hebrew fasted and mourned in the fifth and seventh months. The fifth month of the ancient Hebrew lunar calendar usually occurs within the months of July and August. The seventh month usually occurs within the months of September and October; both the Day of Atonement and the Festival of Shelters were celebrated in the seventh month.
  - type: text
    content: ' was it really for me that you were fasting? '
  '6':
  - type: text
    content: 'And even now in your holy festivals, aren’t you eating and drinking just to please yourselves? '
  '7':
  - type: text
    content: 'Isn’t this the same message the '
  - type: text
    content: Lord
  - type: text
    content: ' proclaimed through the prophets in years past when Jerusalem and the towns of Judah were bustling with people, and the Negev and the foothills of Judah'
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' were well populated?’”'
  '8':
  - type: text
    content: 'Then this message came to Zechariah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Judge fairly, and show mercy and kindness to one another. '
