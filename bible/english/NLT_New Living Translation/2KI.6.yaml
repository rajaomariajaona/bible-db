document_id: 2KI.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Floating Ax Head
  - type: text
    content: 'One day the group of prophets came to Elisha and told him, “As you can see, this place where we meet with you is too small. '
  '10':
  - type: text
    content: So the king of Israel would send word to the place indicated by the man of God. Time and again Elisha warned the king, so that he would be on the alert there.
  '11':
  - type: text
    content: The king of Aram became very upset over this. He called his officers together and demanded, “Which of you is the traitor? Who has been informing the king of Israel of my plans?”
  '12':
  - type: text
    content: “It’s not us, my lord the king,” one of the officers replied. “Elisha, the prophet in Israel, tells the king of Israel even the words you speak in the privacy of your bedroom!”
  '13':
  - type: text
    content: “Go and find out where he is,” the king commanded, “so I can send troops to seize him.”
  - type: text
    content: 'And the report came back: “Elisha is at Dothan.” '
  '14':
  - type: text
    content: So one night the king of Aram sent a great army with many chariots and horses to surround the city.
  '15':
  - type: text
    content: When the servant of the man of God got up early the next morning and went outside, there were troops, horses, and chariots everywhere. “Oh, sir, what will we do now?” the young man cried to Elisha.
  '16':
  - type: text
    content: '“Don’t be afraid!” Elisha told him. “For there are more on our side than on theirs!” '
  '17':
  - type: text
    content: 'Then Elisha prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', open his eyes and let him see!” The '
  - type: text
    content: Lord
  - type: text
    content: ' opened the young man’s eyes, and when he looked up, he saw that the hillside around Elisha was filled with horses and chariots of fire.'
  '18':
  - type: text
    content: 'As the Aramean army advanced toward him, Elisha prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', please make them blind.” So the '
  - type: text
    content: Lord
  - type: text
    content: ' struck them with blindness as Elisha had asked.'
  '19':
  - type: text
    content: Then Elisha went out and told them, “You have come the wrong way! This isn’t the right city! Follow me, and I will take you to the man you are looking for.” And he led them to the city of Samaria.
  '2':
  - type: text
    content: Let’s go down to the Jordan River, where there are plenty of logs. There we can build a new place for us to meet.”
  - type: text
    content: “All right,” he told them, “go ahead.”
  '20':
  - type: text
    content: 'As soon as they had entered Samaria, Elisha prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', now open their eyes and let them see.” So the '
  - type: text
    content: Lord
  - type: text
    content: ' opened their eyes, and they discovered that they were in the middle of Samaria.'
  '21':
  - type: text
    content: When the king of Israel saw them, he shouted to Elisha, “My father, should I kill them? Should I kill them?”
  '22':
  - type: text
    content: “Of course not!” Elisha replied. “Do we kill prisoners of war? Give them food and drink and send them home again to their master.”
  '23':
  - type: text
    content: So the king made a great feast for them and then sent them home to their master. After that, the Aramean raiders stayed away from the land of Israel.
  - type: heading
    content: Ben-Hadad Besieges Samaria
  '24':
  - type: text
    content: 'Some time later, however, King Ben-hadad of Aram mustered his entire army and besieged Samaria. '
  '25':
  - type: text
    content: As a result, there was a great famine in the city. The siege lasted so long that a donkey’s head sold for eighty pieces of silver, and a cup of dove’s dung sold for five pieces
  - type: note
    content: Hebrew sold for 80 [shekels] [2 pounds or 0.9 kilograms] of silver, and 1/4 of a cab [0.3 liters] of dove’s dung sold for 5 [shekels] [2 ounces or 57 grams]. Dove’s dung may be a variety of wild vegetable.
  - type: text
    content: ' of silver.'
  '26':
  - type: text
    content: One day as the king of Israel was walking along the wall of the city, a woman called to him, “Please help me, my lord the king!”
  '27':
  - type: text
    content: 'He answered, “If the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'doesn’t help you, what can I do? I have neither food from the threshing floor nor wine from the press to give you.” '
  '28':
  - type: text
    content: But then the king asked, “What is the matter?”
  - type: text
    content: 'She replied, “This woman said to me: ‘Come on, let’s eat your son today, then we will eat my son tomorrow.’ '
  '29':
  - type: text
    content: So we cooked my son and ate him. Then the next day I said to her, ‘Kill your son so we can eat him,’ but she has hidden her son.”
  '3':
  - type: text
    content: “Please come with us,” someone suggested.
  - type: text
    content: '“I will,” he said. '
  '30':
  - type: text
    content: 'When the king heard this, he tore his clothes in despair. And as the king walked along the wall, the people could see that he was wearing burlap under his robe next to his skin. '
  '31':
  - type: text
    content: “May God strike me and even kill me if I don’t separate Elisha’s head from his shoulders this very day,” the king vowed.
  '32':
  - type: text
    content: Elisha was sitting in his house with the elders of Israel when the king sent a messenger to summon him. But before the messenger arrived, Elisha said to the elders, “A murderer has sent a man to cut off my head. When he arrives, shut the door and keep him out. We will soon hear his master’s steps following him.”
  '33':
  - type: text
    content: While Elisha was still saying this, the messenger arrived. And the king
  - type: note
    content: Hebrew he.
  - type: text
    content: ' said, “All this misery is from the '
  - type: text
    content: Lord
  - type: text
    content: '! Why should I wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' any longer?”'
  '4':
  - type: text
    content: So he went with them.
  - type: text
    content: 'When they arrived at the Jordan, they began cutting down trees. '
  '5':
  - type: text
    content: But as one of them was cutting a tree, his ax head fell into the river. “Oh, sir!” he cried. “It was a borrowed ax!”
  '6':
  - type: text
    content: '“Where did it fall?” the man of God asked. When he showed him the place, Elisha cut a stick and threw it into the water at that spot. Then the ax head floated to the surface. '
  '7':
  - type: text
    content: “Grab it,” Elisha said. And the man reached out and grabbed it.
  - type: heading
    content: Elisha Traps the Arameans
  '8':
  - type: text
    content: When the king of Aram was at war with Israel, he would confer with his officers and say, “We will mobilize our forces at such and such a place.”
  '9':
  - type: text
    content: 'But immediately Elisha, the man of God, would warn the king of Israel, “Do not go near that place, for the Arameans are planning to mobilize their troops there.” '
