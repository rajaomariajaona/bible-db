document_id: 2KI.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Floating Ax Head
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day the group of prophets came to Elisha and told him, “As you can see, this place where we meet with you is too small. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So the king of Israel would send word to the place indicated by the man of God. Time and again Elisha warned the king, so that he would be on the alert there.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The king of Aram became very upset over this. He called his officers together and demanded, “Which of you is the traitor? Who has been informing the king of Israel of my plans?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “It’s not us, my lord the king,” one of the officers replied. “Elisha, the prophet in Israel, tells the king of Israel even the words you speak in the privacy of your bedroom!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Go and find out where he is,” the king commanded, “so I can send troops to seize him.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the report came back: “Elisha is at Dothan.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So one night the king of Aram sent a great army with many chariots and horses to surround the city.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When the servant of the man of God got up early the next morning and went outside, there were troops, horses, and chariots everywhere. “Oh, sir, what will we do now?” the young man cried to Elisha.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Don’t be afraid!” Elisha told him. “For there are more on our side than on theirs!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Elisha prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', open his eyes and let him see!” The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' opened the young man’s eyes, and when he looked up, he saw that the hillside around Elisha was filled with horses and chariots of fire.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'As the Aramean army advanced toward him, Elisha prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', please make them blind.” So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck them with blindness as Elisha had asked.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then Elisha went out and told them, “You have come the wrong way! This isn’t the right city! Follow me, and I will take you to the man you are looking for.” And he led them to the city of Samaria.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let’s go down to the Jordan River, where there are plenty of logs. There we can build a new place for us to meet.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” he told them, “go ahead.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As soon as they had entered Samaria, Elisha prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', now open their eyes and let them see.” So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' opened their eyes, and they discovered that they were in the middle of Samaria.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: When the king of Israel saw them, he shouted to Elisha, “My father, should I kill them? Should I kill them?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Of course not!” Elisha replied. “Do we kill prisoners of war? Give them food and drink and send them home again to their master.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So the king made a great feast for them and then sent them home to their master. After that, the Aramean raiders stayed away from the land of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ben-Hadad Besieges Samaria
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Some time later, however, King Ben-hadad of Aram mustered his entire army and besieged Samaria. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: As a result, there was a great famine in the city. The siege lasted so long that a donkey’s head sold for eighty pieces of silver, and a cup of dove’s dung sold for five pieces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sold for 80 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2 pounds or 0.9 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of silver, and 1/4 of a cab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[0.3 liters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of dove’s dung sold for 5 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2 ounces or 57 grams]. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dove’s dung '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: may be a variety of wild vegetable.
      marker-yv: yv-n
    - type: text
      text: ' of silver.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: One day as the king of Israel was walking along the wall of the city, a woman called to him, “Please help me, my lord the king!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'He answered, “If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: 'doesn’t help you, what can I do? I have neither food from the threshing floor nor wine from the press to give you.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But then the king asked, “What is the matter?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She replied, “This woman said to me: ‘Come on, let’s eat your son today, then we will eat my son tomorrow.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So we cooked my son and ate him. Then the next day I said to her, ‘Kill your son so we can eat him,’ but she has hidden her son.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Please come with us,” someone suggested.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I will,” he said. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When the king heard this, he tore his clothes in despair. And as the king walked along the wall, the people could see that he was wearing burlap under his robe next to his skin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “May God strike me and even kill me if I don’t separate Elisha’s head from his shoulders this very day,” the king vowed.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Elisha was sitting in his house with the elders of Israel when the king sent a messenger to summon him. But before the messenger arrived, Elisha said to the elders, “A murderer has sent a man to cut off my head. When he arrives, shut the door and keep him out. We will soon hear his master’s steps following him.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: While Elisha was still saying this, the messenger arrived. And the king
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he.
      marker-yv: yv-n
    - type: text
      text: ' said, “All this misery is from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Why should I wait for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' any longer?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So he went with them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived at the Jordan, they began cutting down trees. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But as one of them was cutting a tree, his ax head fell into the river. “Oh, sir!” he cried. “It was a borrowed ax!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Where did it fall?” the man of God asked. When he showed him the place, Elisha cut a stick and threw it into the water at that spot. Then the ax head floated to the surface. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Grab it,” Elisha said. And the man reached out and grabbed it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisha Traps the Arameans
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When the king of Aram was at war with Israel, he would confer with his officers and say, “We will mobilize our forces at such and such a place.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But immediately Elisha, the man of God, would warn the king of Israel, “Do not go near that place, for the Arameans are planning to mobilize their troops there.” '
