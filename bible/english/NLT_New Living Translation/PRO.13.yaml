document_id: PRO.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise child accepts a parent’s discipline;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A wise son accepts his father’s discipline.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mocker refuses to listen to correction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pride leads to conflict;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who take advice are wise.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wealth from get-rich-quick schemes quickly disappears;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wealth from hard work grows over time.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hope deferred makes the heart sick,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a dream fulfilled is a tree of life.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People who despise advice are asking for trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who respect a command will succeed.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The instruction of the wise is like a life-giving fountain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who accept it avoid the snares of death.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A person with good sense is respected;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a treacherous person is headed for destruction.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the way of the treacherous is lasting.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise people think before they act;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools don’t—and even brag about their foolishness.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An unreliable messenger stumbles into trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a reliable messenger brings healing.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you ignore criticism, you will end in poverty and disgrace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you accept correction, you will be honored.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is pleasant to see dreams come true,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools refuse to turn from evil to attain them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise words will win you a good meal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but treacherous people have an appetite for violence.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Walk with the wise and become wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: associate with fools and get in trouble.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trouble chases sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while blessings reward the righteous.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good people leave an inheritance to their grandchildren,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the sinner’s wealth passes to the godly.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A poor person’s farm may produce much food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but injustice sweeps it all away.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who spare the rod of discipline hate their children.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who love their children care enough to discipline them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly eat to their hearts’ content,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the belly of the wicked goes hungry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who control their tongue will have a long life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: opening your mouth can ruin everything.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazy people want much but get little,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who work hard will prosper.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly hate lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked cause shame and disgrace.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Godliness guards the path of the blameless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the evil are misled by sin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some who are poor pretend to be rich;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: others who are rich pretend to be poor.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rich can pay a ransom for their lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the poor won’t even get threatened.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The life of the godly is full of light and joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the light of the wicked will be snuffed out.
