document_id: PRO.13,116
type_code: eng
verses:
  '1':
  - type: text
    content: A wise child accepts a parent’s discipline;
  - type: note
    content: Hebrew A wise son accepts his father’s discipline.
  - type: text
    content: a mocker refuses to listen to correction.
  '10':
  - type: text
    content: Pride leads to conflict;
  - type: text
    content: those who take advice are wise.
  '11':
  - type: text
    content: Wealth from get-rich-quick schemes quickly disappears;
  - type: text
    content: wealth from hard work grows over time.
  '12':
  - type: text
    content: Hope deferred makes the heart sick,
  - type: text
    content: but a dream fulfilled is a tree of life.
  '13':
  - type: text
    content: People who despise advice are asking for trouble;
  - type: text
    content: those who respect a command will succeed.
  '14':
  - type: text
    content: The instruction of the wise is like a life-giving fountain;
  - type: text
    content: those who accept it avoid the snares of death.
  '15':
  - type: text
    content: A person with good sense is respected;
  - type: text
    content: a treacherous person is headed for destruction.
  - type: note
    content: As in Greek version; Hebrew reads the way of the treacherous is lasting.
  '16':
  - type: text
    content: Wise people think before they act;
  - type: text
    content: fools don’t—and even brag about their foolishness.
  '17':
  - type: text
    content: An unreliable messenger stumbles into trouble,
  - type: text
    content: but a reliable messenger brings healing.
  '18':
  - type: text
    content: If you ignore criticism, you will end in poverty and disgrace;
  - type: text
    content: if you accept correction, you will be honored.
  '19':
  - type: text
    content: It is pleasant to see dreams come true,
  - type: text
    content: but fools refuse to turn from evil to attain them.
  '2':
  - type: text
    content: Wise words will win you a good meal,
  - type: text
    content: but treacherous people have an appetite for violence.
  '20':
  - type: text
    content: Walk with the wise and become wise;
  - type: text
    content: associate with fools and get in trouble.
  '21':
  - type: text
    content: Trouble chases sinners,
  - type: text
    content: while blessings reward the righteous.
  '22':
  - type: text
    content: Good people leave an inheritance to their grandchildren,
  - type: text
    content: but the sinner’s wealth passes to the godly.
  '23':
  - type: text
    content: A poor person’s farm may produce much food,
  - type: text
    content: but injustice sweeps it all away.
  '24':
  - type: text
    content: Those who spare the rod of discipline hate their children.
  - type: text
    content: Those who love their children care enough to discipline them.
  '25':
  - type: text
    content: The godly eat to their hearts’ content,
  - type: text
    content: but the belly of the wicked goes hungry.
  '3':
  - type: text
    content: Those who control their tongue will have a long life;
  - type: text
    content: opening your mouth can ruin everything.
  '4':
  - type: text
    content: Lazy people want much but get little,
  - type: text
    content: but those who work hard will prosper.
  '5':
  - type: text
    content: The godly hate lies;
  - type: text
    content: the wicked cause shame and disgrace.
  '6':
  - type: text
    content: Godliness guards the path of the blameless,
  - type: text
    content: but the evil are misled by sin.
  '7':
  - type: text
    content: Some who are poor pretend to be rich;
  - type: text
    content: others who are rich pretend to be poor.
  '8':
  - type: text
    content: The rich can pay a ransom for their lives,
  - type: text
    content: but the poor won’t even get threatened.
  '9':
  - type: text
    content: The life of the godly is full of light and joy,
  - type: text
    content: but the light of the wicked will be snuffed out.
