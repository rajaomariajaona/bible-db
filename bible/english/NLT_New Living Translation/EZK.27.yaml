document_id: EZK.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The End of Tyre’s Glory
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then this message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Men from distant Persia, Lydia, and Libya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paras, Lud, and Put.
      marker-yv: yv-n
    - type: text
      text: ' served in your great army. They hung their shields and helmets on your walls, giving you great honor. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Men from Arvad and Helech stood on your walls. Your towers were manned by men from Gammad. Their shields hung on your walls, completing your beauty.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Tarshish sent merchants to buy your wares in exchange for silver, iron, tin, and lead. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Merchants from Greece,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Javan.
      marker-yv: yv-n
    - type: text
      text: ' Tubal, and Meshech brought slaves and articles of bronze to trade with you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“From Beth-togarmah came riding horses, chariot horses, and mules, all in exchange for your goods. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Merchants came to you from Dedan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Rhodes.
      marker-yv: yv-n
    - type: text
      text: ' Numerous coastlands were your captive markets; they brought payment in ivory tusks and ebony wood.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Syria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Aram; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Edom.
      marker-yv: yv-n
    - type: text
      text: ' sent merchants to buy your rich variety of goods. They traded turquoise, purple dyes, embroidery, fine linen, and jewelry of coral and rubies. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Judah and Israel traded for your wares, offering wheat from Minnith, figs,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' honey, olive oil, and balm.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Damascus sent merchants to buy your rich variety of goods, bringing wine from Helbon and white wool from Zahar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Greeks from Uzal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Vedan and Javan from Uzal. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' came to trade for your merchandise. Wrought iron, cassia, and fragrant calamus were bartered for your wares.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, sing a funeral song for Tyre, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“Dedan sent merchants to trade their expensive saddle blankets with you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The Arabians and the princes of Kedar sent merchants to trade lambs and rams and male goats in exchange for your goods. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The merchants of Sheba and Raamah came with all kinds of spices, jewels, and gold in exchange for your wares.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Haran, Canneh, Eden, Sheba, Asshur, and Kilmad came with their merchandise, too. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They brought choice fabrics to trade—blue cloth, embroidery, and multicolored carpets rolled up and bound with cords. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The ships of Tarshish were your ocean caravans. Your island warehouse was filled to the brim!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of Tyre
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “But look! Your oarsmen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have taken you into stormy seas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A mighty eastern gale
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has wrecked you in the heart of the sea!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Everything is lost—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your riches and wares,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your sailors and pilots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your ship builders, merchants, and warriors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day of your ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone on board sinks into the depths of the sea.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Your cities by the sea tremble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as your pilots cry out in terror.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: All the oarsmen abandon their ships;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sailors and pilots stand on the shore.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'that mighty gateway to the sea, the trading center of the world. Give Tyre this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You boasted, O Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My beauty is perfect!’
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: They cry aloud over you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and weep bitterly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They throw dust on their heads
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and roll in ashes.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: They shave their heads in grief for you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dress themselves in burlap.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They weep for you with bitter anguish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and deep mourning.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: As they wail and mourn over you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they sing this sad funeral song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Was there ever such a city as Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now silent at the bottom of the sea?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The merchandise you traded
  - type: usfm
    marker: q2
    children:
    - type: text
      text: satisfied the desires of many nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings at the ends of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were enriched by your trade.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Now you are a wrecked ship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: broken at the bottom of the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your merchandise and crew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have gone down with you.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: All who live along the coastlands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are appalled at your terrible fate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their kings are filled with horror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and look on with twisted faces.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: The merchants among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shake their heads at the sight of you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hiss at you.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have come to a horrible end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will exist no more.’”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You extended your boundaries into the sea.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your builders made your beauty perfect.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You were like a great ship
  - type: usfm
    marker: q2
    children:
    - type: text
      text: built of the finest cypress from Senir.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hermon.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They took a cedar from Lebanon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to make a mast for you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They carved your oars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the oaks of Bashan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your deck of pine from the coasts of Cyprus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kittim.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was inlaid with ivory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Your sails were made of Egypt’s finest linen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they flew as a banner above you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You stood beneath blue and purple awnings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made bright with dyes from the coasts of Elishah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Your oarsmen came from Sidon and Arvad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your helmsmen were skilled men from Tyre itself.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Wise old craftsmen from Gebal did the caulking.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ships from every land came with goods to barter for your trade.
