document_id: EZK.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The End of Tyre’s Glory
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: “Men from distant Persia, Lydia, and Libya
  - type: note
    content: Hebrew Paras, Lud, and Put.
  - type: text
    content: ' served in your great army. They hung their shields and helmets on your walls, giving you great honor. '
  '11':
  - type: text
    content: Men from Arvad and Helech stood on your walls. Your towers were manned by men from Gammad. Their shields hung on your walls, completing your beauty.
  '12':
  - type: text
    content: '“Tarshish sent merchants to buy your wares in exchange for silver, iron, tin, and lead. '
  '13':
  - type: text
    content: Merchants from Greece,
  - type: note
    content: Hebrew Javan.
  - type: text
    content: ' Tubal, and Meshech brought slaves and articles of bronze to trade with you.'
  '14':
  - type: text
    content: '“From Beth-togarmah came riding horses, chariot horses, and mules, all in exchange for your goods. '
  '15':
  - type: text
    content: Merchants came to you from Dedan.
  - type: note
    content: Greek version reads Rhodes.
  - type: text
    content: ' Numerous coastlands were your captive markets; they brought payment in ivory tusks and ebony wood.'
  '16':
  - type: text
    content: “Syria
  - type: note
    content: Hebrew Aram; some manuscripts read Edom.
  - type: text
    content: ' sent merchants to buy your rich variety of goods. They traded turquoise, purple dyes, embroidery, fine linen, and jewelry of coral and rubies. '
  '17':
  - type: text
    content: Judah and Israel traded for your wares, offering wheat from Minnith, figs,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' honey, olive oil, and balm.'
  '18':
  - type: text
    content: '“Damascus sent merchants to buy your rich variety of goods, bringing wine from Helbon and white wool from Zahar. '
  '19':
  - type: text
    content: Greeks from Uzal
  - type: note
    content: Hebrew Vedan and Javan from Uzal. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' came to trade for your merchandise. Wrought iron, cassia, and fragrant calamus were bartered for your wares.'
  '2':
  - type: text
    content: '“Son of man, sing a funeral song for Tyre, '
  '20':
  - type: text
    content: '“Dedan sent merchants to trade their expensive saddle blankets with you. '
  '21':
  - type: text
    content: 'The Arabians and the princes of Kedar sent merchants to trade lambs and rams and male goats in exchange for your goods. '
  '22':
  - type: text
    content: The merchants of Sheba and Raamah came with all kinds of spices, jewels, and gold in exchange for your wares.
  '23':
  - type: text
    content: '“Haran, Canneh, Eden, Sheba, Asshur, and Kilmad came with their merchandise, too. '
  '24':
  - type: text
    content: 'They brought choice fabrics to trade—blue cloth, embroidery, and multicolored carpets rolled up and bound with cords. '
  '25':
  - type: text
    content: The ships of Tarshish were your ocean caravans. Your island warehouse was filled to the brim!
  - type: heading
    content: The Destruction of Tyre
  '26':
  - type: text
    content: “But look! Your oarsmen
  - type: text
    content: have taken you into stormy seas!
  - type: text
    content: A mighty eastern gale
  - type: text
    content: has wrecked you in the heart of the sea!
  '27':
  - type: text
    content: Everything is lost—
  - type: text
    content: your riches and wares,
  - type: text
    content: your sailors and pilots,
  - type: text
    content: your ship builders, merchants, and warriors.
  - type: text
    content: On the day of your ruin,
  - type: text
    content: everyone on board sinks into the depths of the sea.
  '28':
  - type: text
    content: Your cities by the sea tremble
  - type: text
    content: as your pilots cry out in terror.
  '29':
  - type: text
    content: All the oarsmen abandon their ships;
  - type: text
    content: the sailors and pilots stand on the shore.
  '3':
  - type: text
    content: 'that mighty gateway to the sea, the trading center of the world. Give Tyre this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “You boasted, O Tyre,
  - type: text
    content: ‘My beauty is perfect!’
  '30':
  - type: text
    content: They cry aloud over you
  - type: text
    content: and weep bitterly.
  - type: text
    content: They throw dust on their heads
  - type: text
    content: and roll in ashes.
  '31':
  - type: text
    content: They shave their heads in grief for you
  - type: text
    content: and dress themselves in burlap.
  - type: text
    content: They weep for you with bitter anguish
  - type: text
    content: and deep mourning.
  '32':
  - type: text
    content: As they wail and mourn over you,
  - type: text
    content: 'they sing this sad funeral song:'
  - type: text
    content: ‘Was there ever such a city as Tyre,
  - type: text
    content: now silent at the bottom of the sea?
  '33':
  - type: text
    content: The merchandise you traded
  - type: text
    content: satisfied the desires of many nations.
  - type: text
    content: Kings at the ends of the earth
  - type: text
    content: were enriched by your trade.
  '34':
  - type: text
    content: Now you are a wrecked ship,
  - type: text
    content: broken at the bottom of the sea.
  - type: text
    content: All your merchandise and crew
  - type: text
    content: have gone down with you.
  '35':
  - type: text
    content: All who live along the coastlands
  - type: text
    content: are appalled at your terrible fate.
  - type: text
    content: Their kings are filled with horror
  - type: text
    content: and look on with twisted faces.
  '36':
  - type: text
    content: The merchants among the nations
  - type: text
    content: shake their heads at the sight of you,
  - type: note
    content: Hebrew hiss at you.
  - type: text
    content: for you have come to a horrible end
  - type: text
    content: and will exist no more.’”
  '4':
  - type: text
    content: You extended your boundaries into the sea.
  - type: text
    content: Your builders made your beauty perfect.
  '5':
  - type: text
    content: You were like a great ship
  - type: text
    content: built of the finest cypress from Senir.
  - type: note
    content: Or Hermon.
  - type: text
    content: They took a cedar from Lebanon
  - type: text
    content: to make a mast for you.
  '6':
  - type: text
    content: They carved your oars
  - type: text
    content: from the oaks of Bashan.
  - type: text
    content: Your deck of pine from the coasts of Cyprus
  - type: note
    content: Hebrew Kittim.
  - type: text
    content: was inlaid with ivory.
  '7':
  - type: text
    content: Your sails were made of Egypt’s finest linen,
  - type: text
    content: and they flew as a banner above you.
  - type: text
    content: You stood beneath blue and purple awnings
  - type: text
    content: made bright with dyes from the coasts of Elishah.
  '8':
  - type: text
    content: Your oarsmen came from Sidon and Arvad;
  - type: text
    content: your helmsmen were skilled men from Tyre itself.
  '9':
  - type: text
    content: Wise old craftsmen from Gebal did the caulking.
  - type: text
    content: Ships from every land came with goods to barter for your trade.
