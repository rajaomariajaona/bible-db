document_id: MAL.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning to the Priests
  - type: text
    content: '“Listen, you priests—this command is for you! '
  '10':
  - type: text
    content: Are we not all children of the same Father? Are we not all created by the same God? Then why do we betray each other, violating the covenant of our ancestors?
  '11':
  - type: text
    content: 'Judah has been unfaithful, and a detestable thing has been done in Israel and in Jerusalem. The men of Judah have defiled the '
  - type: text
    content: Lord
  - type: text
    content: '’s beloved sanctuary by marrying women who worship idols. '
  '12':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' cut off from the nation of Israel'
  - type: note
    content: Hebrew from the tents of Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: ' every last man who has done this and yet brings an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '13':
  - type: text
    content: 'Here is another thing you do. You cover the '
  - type: text
    content: Lord
  - type: text
    content: '’s altar with tears, weeping and groaning because he pays no attention to your offerings and doesn’t accept them with pleasure. '
  '14':
  - type: text
    content: 'You cry out, “Why doesn’t the '
  - type: text
    content: Lord
  - type: text
    content: ' accept my worship?” I’ll tell you why! Because the '
  - type: text
    content: Lord
  - type: text
    content: ' witnessed the vows you and your wife made when you were young. But you have been unfaithful to her, though she remained your faithful partner, the wife of your marriage vows.'
  '15':
  - type: text
    content: 'Didn’t the '
  - type: text
    content: Lord
  - type: text
    content: ' make you one with your wife? In body and spirit you are his.'
  - type: note
    content: Or Didn’t the one Lord make us and preserve our life and breath? or Didn’t the one Lord make her, both flesh and spirit? The meaning of the Hebrew is uncertain.
  - type: text
    content: ' And what does he want? Godly children from your union. So guard your heart; remain loyal to the wife of your youth. '
  '16':
  - type: text
    content: “For I hate divorce!”
  - type: note
    content: Hebrew For he hates divorcing.
  - type: text
    content: ' says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. “To divorce your wife is to overwhelm her with cruelty,'
  - type: note
    content: Hebrew to cover one’s garment with violence.
  - type: text
    content: '” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. “So guard your heart; do not be unfaithful to your wife.”'
  '17':
  - type: text
    content: 'You have wearied the '
  - type: text
    content: Lord
  - type: text
    content: ' with your words.'
  - type: text
    content: “How have we wearied him?” you ask.
  - type: text
    content: 'You have wearied him by saying that all who do evil are good in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, and he is pleased with them. You have wearied him by asking, “Where is the God of justice?”
  '2':
  - type: text
    content: 'Listen to me and make up your minds to honor my name,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, “or I will bring a terrible curse against you. I will curse even the blessings you receive. Indeed, I have already cursed them, because you have not taken my warning to heart. '
  '3':
  - type: text
    content: 'I will punish your descendants and splatter your faces with the manure from your festival sacrifices, and I will throw you on the manure pile. '
  '4':
  - type: text
    content: 'Then at last you will know it was I who sent you this warning so that my covenant with the Levites can continue,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '5':
  - type: text
    content: '“The purpose of my covenant with the Levites was to bring life and peace, and that is what I gave them. This required reverence from them, and they greatly revered me and stood in awe of my name. '
  '6':
  - type: text
    content: They passed on to the people the truth of the instructions they received from me. They did not lie or cheat; they walked with me, living good and righteous lives, and they turned many from lives of sin.
  '7':
  - type: text
    content: '“The words of a priest’s lips should preserve knowledge of God, and people should go to him for instruction, for the priest is the messenger of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '8':
  - type: text
    content: 'But you priests have left God’s paths. Your instructions have caused many to stumble into sin. You have corrupted the covenant I made with the Levites,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '9':
  - type: text
    content: “So I have made you despised and humiliated in the eyes of all the people. For you have not obeyed me but have shown favoritism in the way you carry out my instructions.”
  - type: heading
    content: A Call to Faithfulness
