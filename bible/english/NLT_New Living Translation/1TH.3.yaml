document_id: 1TH.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Finally, when we could stand it no longer, we decided to stay alone in Athens, '
  '10':
  - type: text
    content: Night and day we pray earnestly for you, asking God to let us see you again to fill the gaps in your faith.
  '11':
  - type: text
    content: 'May God our Father and our Lord Jesus bring us to you very soon. '
  '12':
  - type: text
    content: 'And may the Lord make your love for one another and for all people grow and overflow, just as our love for you overflows. '
  '13':
  - type: text
    content: May he, as a result, make your hearts strong, blameless, and holy as you stand before God our Father when our Lord Jesus comes again with all his holy people. Amen.
  '2':
  - type: text
    content: and we sent Timothy to visit you. He is our brother and God’s co-worker
  - type: note
    content: Other manuscripts read and God’s servant; still others read and a co-worker, or and a servant and co-worker for God, or and God’s servant and our co-worker.
  - type: text
    content: ' in proclaiming the Good News of Christ. We sent him to strengthen you, to encourage you in your faith, '
  '3':
  - type: text
    content: 'and to keep you from being shaken by the troubles you were going through. But you know that we are destined for such troubles. '
  '4':
  - type: text
    content: 'Even while we were with you, we warned you that troubles would soon come—and they did, as you well know. '
  '5':
  - type: text
    content: That is why, when I could bear it no longer, I sent Timothy to find out whether your faith was still strong. I was afraid that the tempter had gotten the best of you and that our work had been useless.
  '6':
  - type: text
    content: 'But now Timothy has just returned, bringing us good news about your faith and love. He reports that you always remember our visit with joy and that you want to see us as much as we want to see you. '
  '7':
  - type: text
    content: So we have been greatly encouraged in the midst of our troubles and suffering, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' because you have remained strong in your faith. '
  '8':
  - type: text
    content: It gives us new life to know that you are standing firm in the Lord.
  '9':
  - type: text
    content: 'How we thank God for you! Because of you we have great joy as we enter God’s presence. '
