document_id: ISA.47,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Prediction of Babylon’s Fall
  - type: text
    content: “Come down, virgin daughter of Babylon, and sit in the dust.
  - type: text
    content: For your days of sitting on a throne have ended.
  - type: text
    content: O daughter of Babylonia,
  - type: note
    content: Or Chaldea; also in 47:5.
  - type: text
    content: ' never again will you be'
  - type: text
    content: the lovely princess, tender and delicate.
  '10':
  - type: text
    content: “You felt secure in your wickedness.
  - type: text
    content: ‘No one sees me,’ you said.
  - type: text
    content: But your ‘wisdom’ and ‘knowledge’ have led you astray,
  - type: text
    content: and you said, ‘I am the only one, and there is no other.’
  '11':
  - type: text
    content: So disaster will overtake you,
  - type: text
    content: and you won’t be able to charm it away.
  - type: text
    content: Calamity will fall upon you,
  - type: text
    content: and you won’t be able to buy your way out.
  - type: text
    content: A catastrophe will strike you suddenly,
  - type: text
    content: one for which you are not prepared.
  '12':
  - type: text
    content: “Now use your magical charms!
  - type: text
    content: Use the spells you have worked at all these years!
  - type: text
    content: Maybe they will do you some good.
  - type: text
    content: Maybe they can make someone afraid of you.
  '13':
  - type: text
    content: All the advice you receive has made you tired.
  - type: text
    content: Where are all your astrologers,
  - type: text
    content: those stargazers who make predictions each month?
  - type: text
    content: Let them stand up and save you from what the future holds.
  '14':
  - type: text
    content: But they are like straw burning in a fire;
  - type: text
    content: they cannot save themselves from the flame.
  - type: text
    content: You will get no help from them at all;
  - type: text
    content: their hearth is no place to sit for warmth.
  '15':
  - type: text
    content: And all your friends,
  - type: text
    content: those with whom you’ve done business since childhood,
  - type: text
    content: will go their own ways,
  - type: text
    content: turning a deaf ear to your cries.
  '2':
  - type: text
    content: Take heavy millstones and grind flour.
  - type: text
    content: Remove your veil, and strip off your robe.
  - type: text
    content: Expose yourself to public view.
  - type: note
    content: Hebrew Bare your legs; pass through the rivers.
  '3':
  - type: text
    content: You will be naked and burdened with shame.
  - type: text
    content: I will take vengeance against you without pity.”
  '4':
  - type: text
    content: 'Our Redeemer, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: is the Holy One of Israel.
  '5':
  - type: text
    content: “O beautiful Babylon, sit now in darkness and silence.
  - type: text
    content: Never again will you be known as the queen of kingdoms.
  '6':
  - type: text
    content: For I was angry with my chosen people
  - type: text
    content: and punished them by letting them fall into your hands.
  - type: text
    content: But you, Babylon, showed them no mercy.
  - type: text
    content: You oppressed even the elderly.
  '7':
  - type: text
    content: You said, ‘I will reign forever as queen of the world!’
  - type: text
    content: You did not reflect on your actions
  - type: text
    content: or think about their consequences.
  '8':
  - type: text
    content: “Listen to this, you pleasure-loving kingdom,
  - type: text
    content: living at ease and feeling secure.
  - type: text
    content: You say, ‘I am the only one, and there is no other.
  - type: text
    content: I will never be a widow or lose my children.’
  '9':
  - type: text
    content: 'Well, both these things will come upon you in a moment:'
  - type: text
    content: widowhood and the loss of your children.
  - type: text
    content: Yes, these calamities will come upon you,
  - type: text
    content: despite all your witchcraft and magic.
