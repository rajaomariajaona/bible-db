document_id: ISA.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prediction of Babylon’s Fall
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Come down, virgin daughter of Babylon, and sit in the dust.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For your days of sitting on a throne have ended.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O daughter of Babylonia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldea; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 47:5.
    marker-yv: yv-n
  - type: text
    text: ' never again will you be'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lovely princess, tender and delicate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Take heavy millstones and grind flour.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remove your veil, and strip off your robe.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Expose yourself to public view.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bare your legs; pass through the rivers.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You will be naked and burdened with shame.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will take vengeance against you without pity.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Our Redeemer, whose name is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “O beautiful Babylon, sit now in darkness and silence.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never again will you be known as the queen of kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For I was angry with my chosen people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and punished them by letting them fall into your hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you, Babylon, showed them no mercy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You oppressed even the elderly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You said, ‘I will reign forever as queen of the world!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: You did not reflect on your actions
- type: usfm
  marker: q2
  children:
  - type: text
    text: or think about their consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Listen to this, you pleasure-loving kingdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: living at ease and feeling secure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You say, ‘I am the only one, and there is no other.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will never be a widow or lose my children.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Well, both these things will come upon you in a moment:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: widowhood and the loss of your children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, these calamities will come upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: despite all your witchcraft and magic.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “You felt secure in your wickedness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘No one sees me,’ you said.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But your ‘wisdom’ and ‘knowledge’ have led you astray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you said, ‘I am the only one, and there is no other.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So disaster will overtake you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you won’t be able to charm it away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Calamity will fall upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you won’t be able to buy your way out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A catastrophe will strike you suddenly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one for which you are not prepared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Now use your magical charms!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Use the spells you have worked at all these years!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maybe they will do you some good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Maybe they can make someone afraid of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: All the advice you receive has made you tired.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where are all your astrologers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: those stargazers who make predictions each month?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them stand up and save you from what the future holds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But they are like straw burning in a fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cannot save themselves from the flame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will get no help from them at all;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hearth is no place to sit for warmth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And all your friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those with whom you’ve done business since childhood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will go their own ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turning a deaf ear to your cries.
