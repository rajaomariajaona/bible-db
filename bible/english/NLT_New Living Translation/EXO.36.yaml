document_id: EXO.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has gifted Bezalel, Oholiab, and the other skilled craftsmen with wisdom and ability to perform any task involved in building the sanctuary. Let them construct and furnish the Tabernacle, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Moses summoned Bezalel and Oholiab and all the others who were specially gifted by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and were eager to get to work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moses gave them the materials donated by the people of Israel as sacred offerings for the completion of the sanctuary. But the people continued to bring additional gifts each morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Finally the craftsmen who were working on the sanctuary left their work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They went to Moses and reported, “The people have given more than enough materials to complete the job the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded us to do!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses gave the command, and this message was sent throughout the camp: “Men and women, don’t prepare any more gifts for the sanctuary. We have enough!” So the people stopped bringing their sacred offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their contributions were more than enough to complete the whole project.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Building the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The skilled craftsmen made ten curtains of finely woven linen for the Tabernacle. Then Bezalel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'he; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 36:16, 20, 35. See 37:1.
    marker-yv: yv-n
  - type: text
    text: ' decorated the curtains with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All ten curtains were exactly the same size—42 feet long and 6 feet wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '28 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[12.9 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long and 4 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.8 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Five of these curtains were joined together to make one long curtain, and the other five were joined to make a second long curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He made fifty loops of blue yarn and put them along the edge of the last curtain in each set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The fifty loops along the edge of one curtain matched the fifty loops along the edge of the other curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then he made fifty gold clasps and fastened the long curtains together with the clasps. In this way, the Tabernacle was made of one continuous piece.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He made eleven curtains of goat-hair cloth to serve as a tent covering for the Tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These eleven curtains were all exactly the same size—45 feet long and 6 feet wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '30 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.8 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long and 4 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.8 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bezalel joined five of these curtains together to make one long curtain, and the other six were joined to make a second long curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He made fifty loops for the edge of each large curtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He also made fifty bronze clasps to fasten the long curtains together. In this way, the tent covering was made of one continuous piece. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He completed the tent covering with a layer of tanned ram skins and a layer of fine goatskin leather.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the framework of the Tabernacle, Bezalel constructed frames of acacia wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Each frame was 15 feet high and 27 inches wide,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.6 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'high and 1.5 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[69 centimeters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'with two pegs under each frame. All the frames were identical. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He made twenty of these frames to support the curtains on the south side of the Tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He also made forty silver bases—two bases under each frame, with the pegs fitting securely into the bases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For the north side of the Tabernacle, he made another twenty frames, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'with their forty silver bases, two bases under each frame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He made six frames for the rear—the west side of the Tabernacle— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'along with two additional frames to reinforce the rear corners of the Tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These corner frames were matched at the bottom and firmly attached at the top with a single ring, forming a single corner unit. Both of these corner units were made the same way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So there were eight frames at the rear of the Tabernacle, set in sixteen silver bases—two bases under each frame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then he made crossbars of acacia wood to link the frames, five crossbars for the north side of the Tabernacle '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and five for the south side. He also made five crossbars for the rear of the Tabernacle, which faced west. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He made the middle crossbar to attach halfway up the frames; it ran all the way from one end of the Tabernacle to the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He overlaid the frames with gold and made gold rings to hold the crossbars. Then he overlaid the crossbars with gold as well.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'For the inside of the Tabernacle, Bezalel made a special curtain of finely woven linen. He decorated it with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: For the curtain, he made four posts of acacia wood and four gold hooks. He overlaid the posts with gold and set them in four silver bases.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then he made another curtain for the entrance to the sacred tent. He made it of finely woven linen and embroidered it with exquisite designs using blue, purple, and scarlet thread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: This curtain was hung on gold hooks attached to five posts. The posts with their decorated tops and hooks were overlaid with gold, and the five bases were cast from bronze.
