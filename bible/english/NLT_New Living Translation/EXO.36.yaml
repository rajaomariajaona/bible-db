document_id: EXO.36,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has gifted Bezalel, Oholiab, and the other skilled craftsmen with wisdom and ability to perform any task involved in building the sanctuary. Let them construct and furnish the Tabernacle, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '10':
  - type: text
    content: 'Five of these curtains were joined together to make one long curtain, and the other five were joined to make a second long curtain. '
  '11':
  - type: text
    content: 'He made fifty loops of blue yarn and put them along the edge of the last curtain in each set. '
  '12':
  - type: text
    content: 'The fifty loops along the edge of one curtain matched the fifty loops along the edge of the other curtain. '
  '13':
  - type: text
    content: Then he made fifty gold clasps and fastened the long curtains together with the clasps. In this way, the Tabernacle was made of one continuous piece.
  '14':
  - type: text
    content: 'He made eleven curtains of goat-hair cloth to serve as a tent covering for the Tabernacle. '
  '15':
  - type: text
    content: These eleven curtains were all exactly the same size—45 feet long and 6 feet wide.
  - type: note
    content: Hebrew 30 cubits [13.8 meters] long and 4 cubits [1.8 meters] wide.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Bezalel joined five of these curtains together to make one long curtain, and the other six were joined to make a second long curtain. '
  '17':
  - type: text
    content: 'He made fifty loops for the edge of each large curtain. '
  '18':
  - type: text
    content: 'He also made fifty bronze clasps to fasten the long curtains together. In this way, the tent covering was made of one continuous piece. '
  '19':
  - type: text
    content: He completed the tent covering with a layer of tanned ram skins and a layer of fine goatskin leather.
  '2':
  - type: text
    content: 'So Moses summoned Bezalel and Oholiab and all the others who were specially gifted by the '
  - type: text
    content: Lord
  - type: text
    content: ' and were eager to get to work. '
  '20':
  - type: text
    content: 'For the framework of the Tabernacle, Bezalel constructed frames of acacia wood. '
  '21':
  - type: text
    content: Each frame was 15 feet high and 27 inches wide,
  - type: note
    content: Hebrew 10 cubits [4.6 meters] high and 1.5 cubits [69 centimeters] wide.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'with two pegs under each frame. All the frames were identical. '
  '23':
  - type: text
    content: 'He made twenty of these frames to support the curtains on the south side of the Tabernacle. '
  '24':
  - type: text
    content: 'He also made forty silver bases—two bases under each frame, with the pegs fitting securely into the bases. '
  '25':
  - type: text
    content: 'For the north side of the Tabernacle, he made another twenty frames, '
  '26':
  - type: text
    content: 'with their forty silver bases, two bases under each frame. '
  '27':
  - type: text
    content: 'He made six frames for the rear—the west side of the Tabernacle— '
  '28':
  - type: text
    content: 'along with two additional frames to reinforce the rear corners of the Tabernacle. '
  '29':
  - type: text
    content: 'These corner frames were matched at the bottom and firmly attached at the top with a single ring, forming a single corner unit. Both of these corner units were made the same way. '
  '3':
  - type: text
    content: 'Moses gave them the materials donated by the people of Israel as sacred offerings for the completion of the sanctuary. But the people continued to bring additional gifts each morning. '
  '30':
  - type: text
    content: So there were eight frames at the rear of the Tabernacle, set in sixteen silver bases—two bases under each frame.
  '31':
  - type: text
    content: 'Then he made crossbars of acacia wood to link the frames, five crossbars for the north side of the Tabernacle '
  '32':
  - type: text
    content: 'and five for the south side. He also made five crossbars for the rear of the Tabernacle, which faced west. '
  '33':
  - type: text
    content: 'He made the middle crossbar to attach halfway up the frames; it ran all the way from one end of the Tabernacle to the other. '
  '34':
  - type: text
    content: He overlaid the frames with gold and made gold rings to hold the crossbars. Then he overlaid the crossbars with gold as well.
  '35':
  - type: text
    content: 'For the inside of the Tabernacle, Bezalel made a special curtain of finely woven linen. He decorated it with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '36':
  - type: text
    content: For the curtain, he made four posts of acacia wood and four gold hooks. He overlaid the posts with gold and set them in four silver bases.
  '37':
  - type: text
    content: 'Then he made another curtain for the entrance to the sacred tent. He made it of finely woven linen and embroidered it with exquisite designs using blue, purple, and scarlet thread. '
  '38':
  - type: text
    content: This curtain was hung on gold hooks attached to five posts. The posts with their decorated tops and hooks were overlaid with gold, and the five bases were cast from bronze.
  '4':
  - type: text
    content: 'Finally the craftsmen who were working on the sanctuary left their work. '
  '5':
  - type: text
    content: 'They went to Moses and reported, “The people have given more than enough materials to complete the job the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded us to do!”'
  '6':
  - type: text
    content: 'So Moses gave the command, and this message was sent throughout the camp: “Men and women, don’t prepare any more gifts for the sanctuary. We have enough!” So the people stopped bringing their sacred offerings. '
  '7':
  - type: text
    content: Their contributions were more than enough to complete the whole project.
  - type: heading
    content: Building the Tabernacle
  '8':
  - type: text
    content: The skilled craftsmen made ten curtains of finely woven linen for the Tabernacle. Then Bezalel
  - type: note
    content: Hebrew he; also in 36:16, 20, 35. See 37:1.
  - type: text
    content: ' decorated the curtains with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '9':
  - type: text
    content: All ten curtains were exactly the same size—42 feet long and 6 feet wide.
  - type: note
    content: Hebrew 28 cubits [12.9 meters] long and 4 cubits [1.8 meters] wide.
  - type: text
    content: ' '
