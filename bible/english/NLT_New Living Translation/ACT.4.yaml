document_id: ACT.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter and John before the Council
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'While Peter and John were speaking to the people, they were confronted by the priests, the captain of the Temple guard, and some of the Sadducees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'These leaders were very disturbed that Peter and John were teaching the people that through Jesus there is a resurrection of the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They arrested them and, since it was already evening, put them in jail until morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But many of the people who heard their message believed it, so the number of men who believed now totaled about 5,000.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The next day the council of all the rulers and elders and teachers of religious law met in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Annas the high priest was there, along with Caiaphas, John, Alexander, and other relatives of the high priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They brought in the two disciples and demanded, “By what power, or in whose name, have you done this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Peter, filled with the Holy Spirit, said to them, “Rulers and elders of our people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'are we being questioned today because we’ve done a good deed for a crippled man? Do you want to know how he was healed? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let me clearly state to all of you and to all the people of Israel that he was healed by the powerful name of Jesus Christ the Nazarene,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus Christ of Nazareth.
    marker-yv: yv-n
  - type: text
    text: ' the man you crucified but whom God raised from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For Jesus is the one referred to in the Scriptures, where it says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The stone that you builders rejected
- type: usfm
  marker: q2
  children:
  - type: text
    text: has now become the cornerstone.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118:22.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: There is salvation in no one else! God has given no other name under heaven by which we must be saved.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The members of the council were amazed when they saw the boldness of Peter and John, for they could see that they were ordinary men with no special training in the Scriptures. They also recognized them as men who had been with Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But since they could see the man who had been healed standing right there among them, there was nothing the council could say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So they ordered Peter and John out of the council chamber
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Sanhedrin.
    marker-yv: yv-n
  - type: text
    text: ' and conferred among themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“What should we do with these men?” they asked each other. “We can’t deny that they have performed a miraculous sign, and everybody in Jerusalem knows about it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But to keep them from spreading their propaganda any further, we must warn them not to speak to anyone in Jesus’ name again.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So they called the apostles back in and commanded them never again to speak or teach in the name of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Peter and John replied, “Do you think God wants us to obey you rather than him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: We cannot stop telling about everything we have seen and heard.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The council then threatened them further, but they finally let them go because they didn’t know how to punish them without starting a riot. For everyone was praising God '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: for this miraculous sign—the healing of a man who had been lame for more than forty years.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Believers Pray for Courage
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'As soon as they were freed, Peter and John returned to the other believers and told them what the leading priests and elders had said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When they heard the report, all the believers lifted their voices together in prayer to God: “O Sovereign Lord, Creator of heaven and earth, the sea, and everything in them— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: you spoke long ago by the Holy Spirit through our ancestor David, your servant, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Why were the nations so angry?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why did they waste their time with futile plans?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The kings of the earth prepared for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rulers gathered together
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and against his Messiah.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:25-26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'his anointed one; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'his Christ. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 2:1-2.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“In fact, this has happened here in this very city! For Herod Antipas, Pontius Pilate the governor, the Gentiles, and the people of Israel were all united against Jesus, your holy servant, whom you anointed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But everything they did was determined beforehand according to your will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And now, O Lord, hear their threats, and give us, your servants, great boldness in preaching your word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Stretch out your hand with healing power; may miraculous signs and wonders be done through the name of your holy servant Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: After this prayer, the meeting place shook, and they were all filled with the Holy Spirit. Then they preached the word of God with boldness.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Believers Share Their Possessions
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'All the believers were united in heart and mind. And they felt that what they owned was not their own, so they shared everything they had. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The apostles testified powerfully to the resurrection of the Lord Jesus, and God’s great blessing was upon them all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'There were no needy people among them, because those who owned land or houses would sell them '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: and bring the money to the apostles to give to those in need.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For instance, there was Joseph, the one the apostles nicknamed Barnabas (which means “Son of Encouragement”). He was from the tribe of Levi and came from the island of Cyprus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: He sold a field he owned and brought the money to the apostles.
