document_id: ACT.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter and John before the Council
  - type: text
    content: 'While Peter and John were speaking to the people, they were confronted by the priests, the captain of the Temple guard, and some of the Sadducees. '
  '10':
  - type: text
    content: Let me clearly state to all of you and to all the people of Israel that he was healed by the powerful name of Jesus Christ the Nazarene,
  - type: note
    content: Or Jesus Christ of Nazareth.
  - type: text
    content: ' the man you crucified but whom God raised from the dead. '
  '11':
  - type: text
    content: For Jesus is the one referred to in the Scriptures, where it says,
  - type: text
    content: ‘The stone that you builders rejected
  - type: text
    content: has now become the cornerstone.’
  - type: note
    content: Ps 118:22.
  '12':
  - type: text
    content: There is salvation in no one else! God has given no other name under heaven by which we must be saved.”
  '13':
  - type: text
    content: 'The members of the council were amazed when they saw the boldness of Peter and John, for they could see that they were ordinary men with no special training in the Scriptures. They also recognized them as men who had been with Jesus. '
  '14':
  - type: text
    content: 'But since they could see the man who had been healed standing right there among them, there was nothing the council could say. '
  '15':
  - type: text
    content: So they ordered Peter and John out of the council chamber
  - type: note
    content: Greek the Sanhedrin.
  - type: text
    content: ' and conferred among themselves.'
  '16':
  - type: text
    content: '“What should we do with these men?” they asked each other. “We can’t deny that they have performed a miraculous sign, and everybody in Jerusalem knows about it. '
  '17':
  - type: text
    content: 'But to keep them from spreading their propaganda any further, we must warn them not to speak to anyone in Jesus’ name again.” '
  '18':
  - type: text
    content: So they called the apostles back in and commanded them never again to speak or teach in the name of Jesus.
  '19':
  - type: text
    content: 'But Peter and John replied, “Do you think God wants us to obey you rather than him? '
  '2':
  - type: text
    content: 'These leaders were very disturbed that Peter and John were teaching the people that through Jesus there is a resurrection of the dead. '
  '20':
  - type: text
    content: We cannot stop telling about everything we have seen and heard.”
  '21':
  - type: text
    content: 'The council then threatened them further, but they finally let them go because they didn’t know how to punish them without starting a riot. For everyone was praising God '
  '22':
  - type: text
    content: for this miraculous sign—the healing of a man who had been lame for more than forty years.
  - type: heading
    content: The Believers Pray for Courage
  '23':
  - type: text
    content: 'As soon as they were freed, Peter and John returned to the other believers and told them what the leading priests and elders had said. '
  '24':
  - type: text
    content: 'When they heard the report, all the believers lifted their voices together in prayer to God: “O Sovereign Lord, Creator of heaven and earth, the sea, and everything in them— '
  '25':
  - type: text
    content: you spoke long ago by the Holy Spirit through our ancestor David, your servant, saying,
  - type: text
    content: ‘Why were the nations so angry?
  - type: text
    content: Why did they waste their time with futile plans?
  '26':
  - type: text
    content: The kings of the earth prepared for battle;
  - type: text
    content: the rulers gathered together
  - type: text
    content: 'against the '
  - type: text
    content: Lord
  - type: text
    content: and against his Messiah.’
  - type: note
    content: Or his anointed one; or his Christ. Ps 2:1-2.
  '27':
  - type: text
    content: '“In fact, this has happened here in this very city! For Herod Antipas, Pontius Pilate the governor, the Gentiles, and the people of Israel were all united against Jesus, your holy servant, whom you anointed. '
  '28':
  - type: text
    content: 'But everything they did was determined beforehand according to your will. '
  '29':
  - type: text
    content: 'And now, O Lord, hear their threats, and give us, your servants, great boldness in preaching your word. '
  '3':
  - type: text
    content: 'They arrested them and, since it was already evening, put them in jail until morning. '
  '30':
  - type: text
    content: Stretch out your hand with healing power; may miraculous signs and wonders be done through the name of your holy servant Jesus.”
  '31':
  - type: text
    content: After this prayer, the meeting place shook, and they were all filled with the Holy Spirit. Then they preached the word of God with boldness.
  - type: heading
    content: The Believers Share Their Possessions
  '32':
  - type: text
    content: 'All the believers were united in heart and mind. And they felt that what they owned was not their own, so they shared everything they had. '
  '33':
  - type: text
    content: 'The apostles testified powerfully to the resurrection of the Lord Jesus, and God’s great blessing was upon them all. '
  '34':
  - type: text
    content: 'There were no needy people among them, because those who owned land or houses would sell them '
  '35':
  - type: text
    content: and bring the money to the apostles to give to those in need.
  '36':
  - type: text
    content: 'For instance, there was Joseph, the one the apostles nicknamed Barnabas (which means “Son of Encouragement”). He was from the tribe of Levi and came from the island of Cyprus. '
  '37':
  - type: text
    content: He sold a field he owned and brought the money to the apostles.
  '4':
  - type: text
    content: But many of the people who heard their message believed it, so the number of men who believed now totaled about 5,000.
  '5':
  - type: text
    content: 'The next day the council of all the rulers and elders and teachers of religious law met in Jerusalem. '
  '6':
  - type: text
    content: 'Annas the high priest was there, along with Caiaphas, John, Alexander, and other relatives of the high priest. '
  '7':
  - type: text
    content: They brought in the two disciples and demanded, “By what power, or in whose name, have you done this?”
  '8':
  - type: text
    content: 'Then Peter, filled with the Holy Spirit, said to them, “Rulers and elders of our people, '
  '9':
  - type: text
    content: 'are we being questioned today because we’ve done a good deed for a crippled man? Do you want to know how he was healed? '
