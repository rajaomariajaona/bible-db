document_id: PSA.39
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For Jeduthun, the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I said to myself, “I will watch what I do
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not sin in what I say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will hold my tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the ungodly are around me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But as I stood there in silence—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even speaking of good things—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the turmoil within me grew worse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The more I thought about it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hotter I got,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'igniting a fire of words:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', remind me how brief my time on earth will be.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remind me that my days are numbered—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how fleeting my life is.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have made my life no longer than the width of my hand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My entire lifetime is just a moment to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'at best, each of us is but a breath.” '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We are merely moving shadows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all our busy rushing ends in nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We heap up wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not knowing who will spend it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And so, Lord, where do I put my hope?
- type: usfm
  marker: q2
  children:
  - type: text
    text: My only hope is in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rescue me from my rebellion.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not let fools mock me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I am silent before you; I won’t say a word,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my punishment is from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But please stop striking me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am exhausted by the blows from your hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When you discipline us for our sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you consume like a moth what is precious to us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Each of us is but a breath. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hear my prayer, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to my cries for help!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t ignore my tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am your guest—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a traveler passing through,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as my ancestors were before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Leave me alone so I can smile again
- type: usfm
  marker: q2
  children:
  - type: text
    text: before I am gone and exist no more.
