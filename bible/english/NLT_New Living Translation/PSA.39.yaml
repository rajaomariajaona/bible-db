document_id: PSA.39,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For Jeduthun, the choir director: A psalm of David.'
  - type: text
    content: I said to myself, “I will watch what I do
  - type: text
    content: and not sin in what I say.
  - type: text
    content: I will hold my tongue
  - type: text
    content: when the ungodly are around me.”
  '10':
  - type: text
    content: But please stop striking me!
  - type: text
    content: I am exhausted by the blows from your hand.
  '11':
  - type: text
    content: When you discipline us for our sins,
  - type: text
    content: you consume like a moth what is precious to us.
  - type: text
    content: 'Each of us is but a breath. '
  - type: text
    content: Interlude
  '12':
  - type: text
    content: 'Hear my prayer, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Listen to my cries for help!
  - type: text
    content: Don’t ignore my tears.
  - type: text
    content: For I am your guest—
  - type: text
    content: a traveler passing through,
  - type: text
    content: as my ancestors were before me.
  '13':
  - type: text
    content: Leave me alone so I can smile again
  - type: text
    content: before I am gone and exist no more.
  '2':
  - type: text
    content: But as I stood there in silence—
  - type: text
    content: not even speaking of good things—
  - type: text
    content: the turmoil within me grew worse.
  '3':
  - type: text
    content: The more I thought about it,
  - type: text
    content: the hotter I got,
  - type: text
    content: 'igniting a fire of words:'
  '4':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', remind me how brief my time on earth will be.'
  - type: text
    content: Remind me that my days are numbered—
  - type: text
    content: how fleeting my life is.
  '5':
  - type: text
    content: You have made my life no longer than the width of my hand.
  - type: text
    content: My entire lifetime is just a moment to you;
  - type: text
    content: 'at best, each of us is but a breath.” '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: We are merely moving shadows,
  - type: text
    content: and all our busy rushing ends in nothing.
  - type: text
    content: We heap up wealth,
  - type: text
    content: not knowing who will spend it.
  '7':
  - type: text
    content: And so, Lord, where do I put my hope?
  - type: text
    content: My only hope is in you.
  '8':
  - type: text
    content: Rescue me from my rebellion.
  - type: text
    content: Do not let fools mock me.
  '9':
  - type: text
    content: I am silent before you; I won’t say a word,
  - type: text
    content: for my punishment is from you.
