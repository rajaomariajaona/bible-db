document_id: DEU.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victory over Og of Bashan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Next we turned and headed for the land of Bashan, where King Og and his entire army attacked us at Edrei. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told me, ‘Do not be afraid of him, for I have given you victory over Og and his entire army, and I will give you all his land. Treat him just as you treated King Sihon of the Amorites, who ruled in Heshbon.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God handed King Og and all his people over to us, and we killed them all. Not a single person survived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We conquered all sixty of his towns—the entire Argob region in his kingdom of Bashan. Not a single town escaped our conquest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'These towns were all fortified with high walls and barred gates. We also took many unwalled villages at the same time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 3:6b.'
    marker-yv: yv-n
  - type: text
    text: ' the kingdom of Bashan, just as we had destroyed King Sihon of Heshbon. We destroyed all the people in every town we conquered—men, women, and children alike. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But we kept all the livestock for ourselves and took plunder from all the towns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“So we took the land of the two Amorite kings east of the Jordan River—all the way from the Arnon Gorge to Mount Hermon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(Mount Hermon is called Sirion by the Sidonians, and the Amorites call it Senir.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We had now conquered all the cities on the plateau and all Gilead and Bashan, as far as the towns of Salecah and Edrei, which were part of Og’s kingdom in Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: (King Og of Bashan was the last survivor of the giant Rephaites. His bed was made of iron and was more than thirteen feet long and six feet wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '9 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.1 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long and 4 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.8 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
  - type: text
    text: ' It can still be seen in the Ammonite city of Rabbah.)'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Land Division East of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“When we took possession of this land, I gave to the tribes of Reuben and Gad the territory beyond Aroer along the Arnon Gorge, plus half of the hill country of Gilead with its towns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I gave the rest of Gilead and all of Bashan—Og’s former kingdom—to the half-tribe of Manasseh. (This entire Argob region of Bashan used to be known as the land of the Rephaites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jair, a leader from the tribe of Manasseh, conquered the whole Argob region in Bashan, all the way to the border of the Geshurites and Maacathites. Jair renamed this region after himself, calling it the Towns of Jair,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Havvoth-jair.
    marker-yv: yv-n
  - type: text
    text: ' as it is still known today.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I gave Gilead to the clan of Makir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But I also gave part of Gilead to the tribes of Reuben and Gad. The area I gave them extended from the middle of the Arnon Gorge in the south to the Jabbok River on the Ammonite frontier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They also received the Jordan Valley, all the way from the Sea of Galilee down to the Dead Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Kinnereth to the Sea of the Arabah, the Salt Sea.
    marker-yv: yv-n
  - type: text
    text: ' with the Jordan River serving as the western boundary. To the east were the slopes of Pisgah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“At that time I gave this command to the tribes that would live east of the Jordan: ‘Although the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has given you this land as your property, all your fighting men must cross the Jordan ahead of your Israelite relatives, armed and ready to assist them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Your wives, children, and numerous livestock, however, may stay behind in the towns I have given you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given security to the rest of the Israelites, as he has to you, and when they occupy the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving them across the Jordan River, then you may all return here to the land I have given you.’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Forbidden to Enter the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“At that time I gave Joshua this charge: ‘You have seen for yourself everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has done to these two kings. He will do the same to all the kingdoms on the west side of the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Do not be afraid of the nations there, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will fight for you.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“At that time I pleaded with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have only begun to show your greatness and the strength of your hand to me, your servant. Is there any god in heaven or on earth who can perform such great and mighty deeds as you do? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Please let me cross the Jordan to see the wonderful land on the other side, the beautiful hill country and the Lebanon mountains.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was angry with me because of you, and he would not listen to me. ‘That’s enough!’ he declared. ‘Speak of it no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But go up to Pisgah Peak, and look over the land in every direction. Take a good look, but you may not cross the Jordan River. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Instead, commission Joshua and encourage and strengthen him, for he will lead the people across the Jordan. He will give them all the land you now see before you as their possession.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So we stayed in the valley near Beth-peor.
