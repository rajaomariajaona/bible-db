document_id: DEU.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Victory over Og of Bashan
  - type: text
    content: '“Next we turned and headed for the land of Bashan, where King Og and his entire army attacked us at Edrei. '
  '10':
  - type: text
    content: 'We had now conquered all the cities on the plateau and all Gilead and Bashan, as far as the towns of Salecah and Edrei, which were part of Og’s kingdom in Bashan. '
  '11':
  - type: text
    content: (King Og of Bashan was the last survivor of the giant Rephaites. His bed was made of iron and was more than thirteen feet long and six feet wide.
  - type: note
    content: Hebrew 9 cubits [4.1 meters] long and 4 cubits [1.8 meters] wide.
  - type: text
    content: ' It can still be seen in the Ammonite city of Rabbah.)'
  - type: heading
    content: Land Division East of the Jordan
  '12':
  - type: text
    content: '“When we took possession of this land, I gave to the tribes of Reuben and Gad the territory beyond Aroer along the Arnon Gorge, plus half of the hill country of Gilead with its towns. '
  '13':
  - type: text
    content: 'Then I gave the rest of Gilead and all of Bashan—Og’s former kingdom—to the half-tribe of Manasseh. (This entire Argob region of Bashan used to be known as the land of the Rephaites. '
  '14':
  - type: text
    content: Jair, a leader from the tribe of Manasseh, conquered the whole Argob region in Bashan, all the way to the border of the Geshurites and Maacathites. Jair renamed this region after himself, calling it the Towns of Jair,
  - type: note
    content: Hebrew Havvoth-jair.
  - type: text
    content: ' as it is still known today.) '
  '15':
  - type: text
    content: 'I gave Gilead to the clan of Makir. '
  '16':
  - type: text
    content: 'But I also gave part of Gilead to the tribes of Reuben and Gad. The area I gave them extended from the middle of the Arnon Gorge in the south to the Jabbok River on the Ammonite frontier. '
  '17':
  - type: text
    content: They also received the Jordan Valley, all the way from the Sea of Galilee down to the Dead Sea,
  - type: note
    content: Hebrew from Kinnereth to the Sea of the Arabah, the Salt Sea.
  - type: text
    content: ' with the Jordan River serving as the western boundary. To the east were the slopes of Pisgah.'
  '18':
  - type: text
    content: '“At that time I gave this command to the tribes that would live east of the Jordan: ‘Although the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you this land as your property, all your fighting men must cross the Jordan ahead of your Israelite relatives, armed and ready to assist them. '
  '19':
  - type: text
    content: 'Your wives, children, and numerous livestock, however, may stay behind in the towns I have given you. '
  '2':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' told me, ‘Do not be afraid of him, for I have given you victory over Og and his entire army, and I will give you all his land. Treat him just as you treated King Sihon of the Amorites, who ruled in Heshbon.’'
  '20':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' has given security to the rest of the Israelites, as he has to you, and when they occupy the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving them across the Jordan River, then you may all return here to the land I have given you.’'
  - type: heading
    content: Moses Forbidden to Enter the Land
  '21':
  - type: text
    content: '“At that time I gave Joshua this charge: ‘You have seen for yourself everything the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done to these two kings. He will do the same to all the kingdoms on the west side of the Jordan. '
  '22':
  - type: text
    content: 'Do not be afraid of the nations there, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will fight for you.’'
  '23':
  - type: text
    content: '“At that time I pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, '
  '24':
  - type: text
    content: '‘O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you have only begun to show your greatness and the strength of your hand to me, your servant. Is there any god in heaven or on earth who can perform such great and mighty deeds as you do? '
  '25':
  - type: text
    content: Please let me cross the Jordan to see the wonderful land on the other side, the beautiful hill country and the Lebanon mountains.’
  '26':
  - type: text
    content: '“But the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me because of you, and he would not listen to me. ‘That’s enough!’ he declared. ‘Speak of it no more. '
  '27':
  - type: text
    content: 'But go up to Pisgah Peak, and look over the land in every direction. Take a good look, but you may not cross the Jordan River. '
  '28':
  - type: text
    content: 'Instead, commission Joshua and encourage and strengthen him, for he will lead the people across the Jordan. He will give them all the land you now see before you as their possession.’ '
  '29':
  - type: text
    content: So we stayed in the valley near Beth-peor.
  '3':
  - type: text
    content: '“So the '
  - type: text
    content: Lord
  - type: text
    content: ' our God handed King Og and all his people over to us, and we killed them all. Not a single person survived. '
  '4':
  - type: text
    content: 'We conquered all sixty of his towns—the entire Argob region in his kingdom of Bashan. Not a single town escaped our conquest. '
  '5':
  - type: text
    content: 'These towns were all fortified with high walls and barred gates. We also took many unwalled villages at the same time. '
  '6':
  - type: text
    content: We completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; also in 3:6b.
  - type: text
    content: ' the kingdom of Bashan, just as we had destroyed King Sihon of Heshbon. We destroyed all the people in every town we conquered—men, women, and children alike. '
  '7':
  - type: text
    content: But we kept all the livestock for ourselves and took plunder from all the towns.
  '8':
  - type: text
    content: '“So we took the land of the two Amorite kings east of the Jordan River—all the way from the Arnon Gorge to Mount Hermon. '
  '9':
  - type: text
    content: '(Mount Hermon is called Sirion by the Sidonians, and the Amorites call it Senir.) '
