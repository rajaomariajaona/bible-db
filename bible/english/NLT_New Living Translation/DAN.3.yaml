document_id: DAN.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Gold Statue
  - type: text
    content: King Nebuchadnezzar made a gold statue ninety feet tall and nine feet wide
  - type: note
    content: Aramaic 60 cubits [27 meters] tall and 6 cubits [2.7 meters] wide.
  - type: text
    content: ' and set it up on the plain of Dura in the province of Babylon. '
  '10':
  - type: text
    content: 'You issued a decree requiring all the people to bow down and worship the gold statue when they hear the sound of the horn, flute, zither, lyre, harp, pipes, and other musical instruments. '
  '11':
  - type: text
    content: 'That decree also states that those who refuse to obey must be thrown into a blazing furnace. '
  '12':
  - type: text
    content: But there are some Jews—Shadrach, Meshach, and Abednego—whom you have put in charge of the province of Babylon. They pay no attention to you, Your Majesty. They refuse to serve your gods and do not worship the gold statue you have set up.”
  '13':
  - type: text
    content: 'Then Nebuchadnezzar flew into a rage and ordered that Shadrach, Meshach, and Abednego be brought before him. When they were brought in, '
  '14':
  - type: text
    content: 'Nebuchadnezzar said to them, “Is it true, Shadrach, Meshach, and Abednego, that you refuse to serve my gods or to worship the gold statue I have set up? '
  '15':
  - type: text
    content: I will give you one more chance to bow down and worship the statue I have made when you hear the sound of the musical instruments.
  - type: note
    content: Aramaic the horn, flute, zither, lyre, harp, pipes, and other musical instruments.
  - type: text
    content: ' But if you refuse, you will be thrown immediately into the blazing furnace. And then what god will be able to rescue you from my power?”'
  '16':
  - type: text
    content: 'Shadrach, Meshach, and Abednego replied, “O Nebuchadnezzar, we do not need to defend ourselves before you. '
  '17':
  - type: text
    content: 'If we are thrown into the blazing furnace, the God whom we serve is able to save us. He will rescue us from your power, Your Majesty. '
  '18':
  - type: text
    content: But even if he doesn’t, we want to make it clear to you, Your Majesty, that we will never serve your gods or worship the gold statue you have set up.”
  - type: heading
    content: The Blazing Furnace
  '19':
  - type: text
    content: 'Nebuchadnezzar was so furious with Shadrach, Meshach, and Abednego that his face became distorted with rage. He commanded that the furnace be heated seven times hotter than usual. '
  '2':
  - type: text
    content: 'Then he sent messages to the high officers, officials, governors, advisers, treasurers, judges, magistrates, and all the provincial officials to come to the dedication of the statue he had set up. '
  '20':
  - type: text
    content: 'Then he ordered some of the strongest men of his army to bind Shadrach, Meshach, and Abednego and throw them into the blazing furnace. '
  '21':
  - type: text
    content: 'So they tied them up and threw them into the furnace, fully dressed in their pants, turbans, robes, and other garments. '
  '22':
  - type: text
    content: 'And because the king, in his anger, had demanded such a hot fire in the furnace, the flames killed the soldiers as they threw the three men in. '
  '23':
  - type: text
    content: So Shadrach, Meshach, and Abednego, securely tied, fell into the roaring flames.
  '24':
  - type: text
    content: But suddenly, Nebuchadnezzar jumped up in amazement and exclaimed to his advisers, “Didn’t we tie up three men and throw them into the furnace?”
  - type: text
    content: “Yes, Your Majesty, we certainly did,” they replied.
  '25':
  - type: text
    content: “Look!” Nebuchadnezzar shouted. “I see four men, unbound, walking around in the fire unharmed! And the fourth looks like a god
  - type: note
    content: Aramaic like a son of the gods.
  - type: text
    content: '!”'
  '26':
  - type: text
    content: 'Then Nebuchadnezzar came as close as he could to the door of the flaming furnace and shouted: “Shadrach, Meshach, and Abednego, servants of the Most High God, come out! Come here!”'
  - type: text
    content: 'So Shadrach, Meshach, and Abednego stepped out of the fire. '
  '27':
  - type: text
    content: Then the high officers, officials, governors, and advisers crowded around them and saw that the fire had not touched them. Not a hair on their heads was singed, and their clothing was not scorched. They didn’t even smell of smoke!
  '28':
  - type: text
    content: 'Then Nebuchadnezzar said, “Praise to the God of Shadrach, Meshach, and Abednego! He sent his angel to rescue his servants who trusted in him. They defied the king’s command and were willing to die rather than serve or worship any god except their own God. '
  '29':
  - type: text
    content: 'Therefore, I make this decree: If any people, whatever their race or nation or language, speak a word against the God of Shadrach, Meshach, and Abednego, they will be torn limb from limb, and their houses will be turned into heaps of rubble. There is no other god who can rescue like this!”'
  '3':
  - type: text
    content: So all these officials
  - type: note
    content: Aramaic the high officers, officials, governors, advisers, treasurers, judges, magistrates, and all the provincial officials.
  - type: text
    content: ' came and stood before the statue King Nebuchadnezzar had set up.'
  '30':
  - type: text
    content: Then the king promoted Shadrach, Meshach, and Abednego to even higher positions in the province of Babylon.
  '4':
  - type: text
    content: 'Then a herald shouted out, “People of all races and nations and languages, listen to the king’s command! '
  '5':
  - type: text
    content: When you hear the sound of the horn, flute, zither, lyre, harp, pipes, and other musical instruments,
  - type: note
    content: The identification of some of these musical instruments is uncertain.
  - type: text
    content: ' bow to the ground to worship King Nebuchadnezzar’s gold statue. '
  '6':
  - type: text
    content: Anyone who refuses to obey will immediately be thrown into a blazing furnace.”
  '7':
  - type: text
    content: So at the sound of the musical instruments,
  - type: note
    content: Aramaic the horn, flute, zither, lyre, harp, and other musical instruments.
  - type: text
    content: ' all the people, whatever their race or nation or language, bowed to the ground and worshiped the gold statue that King Nebuchadnezzar had set up.'
  '8':
  - type: text
    content: But some of the astrologers
  - type: note
    content: Aramaic Chaldeans.
  - type: text
    content: ' went to the king and informed on the Jews. '
  '9':
  - type: text
    content: 'They said to King Nebuchadnezzar, “Long live the king! '
