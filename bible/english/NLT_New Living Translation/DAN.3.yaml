document_id: DAN.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar’s Gold Statue
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: King Nebuchadnezzar made a gold statue ninety feet tall and nine feet wide
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '60 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[27 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tall and 6 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.7 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' and set it up on the plain of Dura in the province of Babylon. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You issued a decree requiring all the people to bow down and worship the gold statue when they hear the sound of the horn, flute, zither, lyre, harp, pipes, and other musical instruments. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'That decree also states that those who refuse to obey must be thrown into a blazing furnace. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But there are some Jews—Shadrach, Meshach, and Abednego—whom you have put in charge of the province of Babylon. They pay no attention to you, Your Majesty. They refuse to serve your gods and do not worship the gold statue you have set up.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Nebuchadnezzar flew into a rage and ordered that Shadrach, Meshach, and Abednego be brought before him. When they were brought in, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nebuchadnezzar said to them, “Is it true, Shadrach, Meshach, and Abednego, that you refuse to serve my gods or to worship the gold statue I have set up? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will give you one more chance to bow down and worship the statue I have made when you hear the sound of the musical instruments.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the horn, flute, zither, lyre, harp, pipes, and other musical instruments.
      marker-yv: yv-n
    - type: text
      text: ' But if you refuse, you will be thrown immediately into the blazing furnace. And then what god will be able to rescue you from my power?”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Shadrach, Meshach, and Abednego replied, “O Nebuchadnezzar, we do not need to defend ourselves before you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If we are thrown into the blazing furnace, the God whom we serve is able to save us. He will rescue us from your power, Your Majesty. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But even if he doesn’t, we want to make it clear to you, Your Majesty, that we will never serve your gods or worship the gold statue you have set up.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Blazing Furnace
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nebuchadnezzar was so furious with Shadrach, Meshach, and Abednego that his face became distorted with rage. He commanded that the furnace be heated seven times hotter than usual. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then he sent messages to the high officers, officials, governors, advisers, treasurers, judges, magistrates, and all the provincial officials to come to the dedication of the statue he had set up. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then he ordered some of the strongest men of his army to bind Shadrach, Meshach, and Abednego and throw them into the blazing furnace. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So they tied them up and threw them into the furnace, fully dressed in their pants, turbans, robes, and other garments. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And because the king, in his anger, had demanded such a hot fire in the furnace, the flames killed the soldiers as they threw the three men in. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So Shadrach, Meshach, and Abednego, securely tied, fell into the roaring flames.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But suddenly, Nebuchadnezzar jumped up in amazement and exclaimed to his advisers, “Didn’t we tie up three men and throw them into the furnace?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Your Majesty, we certainly did,” they replied.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Look!” Nebuchadnezzar shouted. “I see four men, unbound, walking around in the fire unharmed! And the fourth looks like a god
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like a son of the gods.
      marker-yv: yv-n
    - type: text
      text: '!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then Nebuchadnezzar came as close as he could to the door of the flaming furnace and shouted: “Shadrach, Meshach, and Abednego, servants of the Most High God, come out! Come here!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Shadrach, Meshach, and Abednego stepped out of the fire. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Then the high officers, officials, governors, and advisers crowded around them and saw that the fire had not touched them. Not a hair on their heads was singed, and their clothing was not scorched. They didn’t even smell of smoke!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then Nebuchadnezzar said, “Praise to the God of Shadrach, Meshach, and Abednego! He sent his angel to rescue his servants who trusted in him. They defied the king’s command and were willing to die rather than serve or worship any god except their own God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Therefore, I make this decree: If any people, whatever their race or nation or language, speak a word against the God of Shadrach, Meshach, and Abednego, they will be torn limb from limb, and their houses will be turned into heaps of rubble. There is no other god who can rescue like this!”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So all these officials
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the high officers, officials, governors, advisers, treasurers, judges, magistrates, and all the provincial officials.
      marker-yv: yv-n
    - type: text
      text: ' came and stood before the statue King Nebuchadnezzar had set up.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then the king promoted Shadrach, Meshach, and Abednego to even higher positions in the province of Babylon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then a herald shouted out, “People of all races and nations and languages, listen to the king’s command! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When you hear the sound of the horn, flute, zither, lyre, harp, pipes, and other musical instruments,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of some of these musical instruments is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' bow to the ground to worship King Nebuchadnezzar’s gold statue. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Anyone who refuses to obey will immediately be thrown into a blazing furnace.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So at the sound of the musical instruments,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the horn, flute, zither, lyre, harp, and other musical instruments.
      marker-yv: yv-n
    - type: text
      text: ' all the people, whatever their race or nation or language, bowed to the ground and worshiped the gold statue that King Nebuchadnezzar had set up.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But some of the astrologers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans.
      marker-yv: yv-n
    - type: text
      text: ' went to the king and informed on the Jews. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They said to King Nebuchadnezzar, “Long live the king! '
