document_id: DEU.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Release for Debtors
  - type: text
    content: '“At the end of every seventh year you must cancel the debts of everyone who owes you money. '
  '10':
  - type: text
    content: 'Give generously to the poor, not grudgingly, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in everything you do. '
  '11':
  - type: text
    content: There will always be some in the land who are poor. That is why I am commanding you to share freely with the poor and with other Israelites in need.
  - type: heading
    content: Release for Hebrew Slaves
  '12':
  - type: text
    content: “If a fellow Hebrew sells himself or herself to be your servant
  - type: note
    content: Or If a Hebrew man or woman is sold to you.
  - type: text
    content: ' and serves you for six years, in the seventh year you must set that servant free.'
  '13':
  - type: text
    content: '“When you release a male servant, do not send him away empty-handed. '
  '14':
  - type: text
    content: 'Give him a generous farewell gift from your flock, your threshing floor, and your winepress. Share with him some of the bounty with which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you. '
  '15':
  - type: text
    content: 'Remember that you were once slaves in the land of Egypt and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God redeemed you! That is why I am giving you this command.'
  '16':
  - type: text
    content: '“But suppose your servant says, ‘I will not leave you,’ because he loves you and your family, and he has done well with you. '
  '17':
  - type: text
    content: In that case, take an awl and push it through his earlobe into the door. After that, he will be your servant for life. And do the same for your female servants.
  '18':
  - type: text
    content: '“You must not consider it a hardship when you release your servants. Remember that for six years they have given you services worth double the wages of hired workers, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all you do.'
  - type: heading
    content: Sacrificing Firstborn Male Animals
  '19':
  - type: text
    content: '“You must set aside for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God all the firstborn males from your flocks and herds. Do not use the firstborn of your herds to work your fields, and do not shear the firstborn of your flocks. '
  '2':
  - type: text
    content: 'This is how it must be done. Everyone must cancel the loans they have made to their fellow Israelites. They must not demand payment from their neighbors or relatives, for the '
  - type: text
    content: Lord
  - type: text
    content: '’s time of release has arrived. '
  '20':
  - type: text
    content: 'Instead, you and your family must eat these animals in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God each year at the place he chooses. '
  '21':
  - type: text
    content: 'But if this firstborn animal has any defect, such as lameness or blindness, or if anything else is wrong with it, you must not sacrifice it to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '22':
  - type: text
    content: 'Instead, use it for food for your family in your hometown. Anyone, whether ceremonially clean or unclean, may eat it, just as anyone may eat a gazelle or deer. '
  '23':
  - type: text
    content: But you must not consume the blood. You must pour it out on the ground like water.
  '3':
  - type: text
    content: This release from debt, however, applies only to your fellow Israelites—not to the foreigners living among you.
  '4':
  - type: text
    content: '“There should be no poor among you, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will greatly bless you in the land he is giving you as a special possession. '
  '5':
  - type: text
    content: 'You will receive this blessing if you are careful to obey all the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I am giving you today. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you as he has promised. You will lend money to many nations but will never need to borrow. You will rule many nations, but they will not rule over you.'
  '7':
  - type: text
    content: '“But if there are any poor Israelites in your towns when you arrive in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, do not be hard-hearted or tightfisted toward them. '
  '8':
  - type: text
    content: 'Instead, be generous and lend them whatever they need. '
  '9':
  - type: text
    content: 'Do not be mean-spirited and refuse someone a loan because the year for canceling debts is close at hand. If you refuse to make the loan and the needy person cries out to the '
  - type: text
    content: Lord
  - type: text
    content: ', you will be considered guilty of sin. '
