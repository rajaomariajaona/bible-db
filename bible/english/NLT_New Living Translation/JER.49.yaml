document_id: JER.49,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Ammon
  - type: text
    content: 'This message was given concerning the Ammonites. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Are there no descendants of Israel
  - type: text
    content: to inherit the land of Gad?
  - type: text
    content: Why are you, who worship Molech,
  - type: note
    content: Hebrew Malcam, a variant spelling of Molech; also in 49:3.
  - type: text
    content: living in its towns?
  '10':
  - type: text
    content: But I will strip bare the land of Edom,
  - type: text
    content: and there will be no place left to hide.
  - type: text
    content: Its children, its brothers, and its neighbors
  - type: text
    content: will all be destroyed,
  - type: text
    content: and Edom itself will be no more.
  '11':
  - type: text
    content: But I will protect the orphans who remain among you.
  - type: text
    content: Your widows, too, can depend on me for help.”
  '12':
  - type: text
    content: 'And this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “If the innocent must suffer, how much more must you! You will not go unpunished! You must drink this cup of judgment! '
  '13':
  - type: text
    content: 'For I have sworn by my own name,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “that Bozrah will become an object of horror and a heap of ruins; it will be mocked and cursed. All its towns and villages will be desolate forever.”'
  '14':
  - type: text
    content: 'I have heard a message from the '
  - type: text
    content: Lord
  - type: text
    content: that an ambassador was sent to the nations to say,
  - type: text
    content: “Form a coalition against Edom,
  - type: text
    content: and prepare for battle!”
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says to Edom,'
  - type: text
    content: “I will cut you down to size among the nations.
  - type: text
    content: You will be despised by all.
  '16':
  - type: text
    content: You have been deceived
  - type: text
    content: by the fear you inspire in others
  - type: text
    content: and by your own pride.
  - type: text
    content: You live in a rock fortress
  - type: text
    content: and control the mountain heights.
  - type: text
    content: But even if you make your nest among the peaks with the eagles,
  - type: text
    content: I will bring you crashing down,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “Edom will be an object of horror.
  - type: text
    content: All who pass by will be appalled
  - type: text
    content: and will gasp at the destruction they see there.
  '18':
  - type: text
    content: It will be like the destruction of Sodom and Gomorrah
  - type: text
    content: 'and their neighboring towns,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “No one will live there;
  - type: text
    content: no one will inhabit it.
  '19':
  - type: text
    content: I will come like a lion from the thickets of the Jordan,
  - type: text
    content: leaping on the sheep in the pasture.
  - type: text
    content: I will chase Edom from its land,
  - type: text
    content: and I will appoint the leader of my choice.
  - type: text
    content: For who is like me, and who can challenge me?
  - type: text
    content: What ruler can oppose my will?”
  '2':
  - type: text
    content: 'In the days to come,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will sound the battle cry against your city of Rabbah.
  - type: text
    content: It will become a desolate heap of ruins,
  - type: text
    content: and the neighboring towns will be burned.
  - type: text
    content: Then Israel will take back the land
  - type: text
    content: 'you took from her,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'Listen to the '
  - type: text
    content: Lord
  - type: text
    content: ’s plans against Edom
  - type: text
    content: and the people of Teman.
  - type: text
    content: Even the little children will be dragged off like sheep,
  - type: text
    content: and their homes will be destroyed.
  '21':
  - type: text
    content: The earth will shake with the noise of Edom’s fall,
  - type: text
    content: and its cry of despair will be heard all the way to the Red Sea.
  - type: note
    content: Hebrew sea of reeds.
  '22':
  - type: text
    content: Look! The enemy swoops down like an eagle,
  - type: text
    content: spreading his wings over Bozrah.
  - type: text
    content: Even the mightiest warriors will be in anguish
  - type: text
    content: like a woman in labor.
  - type: heading
    content: A Message about Damascus
  '23':
  - type: text
    content: 'This message was given concerning Damascus. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The towns of Hamath and Arpad are struck with fear,
  - type: text
    content: for they have heard the news of their destruction.
  - type: text
    content: Their hearts are troubled
  - type: text
    content: like a wild sea in a raging storm.
  '24':
  - type: text
    content: Damascus has become feeble,
  - type: text
    content: and all her people turn to flee.
  - type: text
    content: Fear, anguish, and pain have gripped her
  - type: text
    content: as they grip a woman in labor.
  '25':
  - type: text
    content: That famous city, a city of joy,
  - type: text
    content: will be forsaken!
  '26':
  - type: text
    content: Her young men will fall in the streets and die.
  - type: text
    content: Her soldiers will all be killed,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '27':
  - type: text
    content: “And I will set fire to the walls of Damascus
  - type: text
    content: that will burn up the palaces of Ben-hadad.”
  - type: heading
    content: A Message about Kedar and Hazor
  '28':
  - type: text
    content: This message was given concerning Kedar and the kingdoms of Hazor, which were attacked by King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 49:30.
  - type: text
    content: ' of Babylon. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Advance against Kedar!
  - type: text
    content: Destroy the warriors from the East!
  '29':
  - type: text
    content: Their flocks and tents will be captured,
  - type: text
    content: and their household goods and camels will be taken away.
  - type: text
    content: 'Everywhere shouts of panic will be heard:'
  - type: text
    content: ‘We are terrorized at every turn!’
  '3':
  - type: text
    content: “Cry out, O Heshbon,
  - type: text
    content: for the town of Ai is destroyed.
  - type: text
    content: Weep, O people of Rabbah!
  - type: text
    content: Put on your clothes of mourning.
  - type: text
    content: Weep and wail, hiding in the hedges,
  - type: text
    content: for your god Molech, with his priests and officials,
  - type: text
    content: will be hauled off to distant lands.
  '30':
  - type: text
    content: 'Run for your lives,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Hide yourselves in deep caves, you people of Hazor,
  - type: text
    content: for King Nebuchadnezzar of Babylon has plotted against you
  - type: text
    content: and is preparing to destroy you.
  '31':
  - type: text
    content: “Go up and attack that complacent nation,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Its people live alone in the desert
  - type: text
    content: without walls or gates.
  '32':
  - type: text
    content: Their camels and other livestock will all be yours.
  - type: text
    content: I will scatter to the winds these people
  - type: text
    content: who live in remote places.
  - type: note
    content: Or who clip the corners of their hair.
  - type: text
    content: I will bring calamity upon them
  - type: text
    content: 'from every direction,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: “Hazor will be inhabited by jackals,
  - type: text
    content: and it will be desolate forever.
  - type: text
    content: No one will live there;
  - type: text
    content: no one will inhabit it.”
  - type: heading
    content: A Message about Elam
  '34':
  - type: text
    content: 'This message concerning Elam came to the prophet Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' at the beginning of the reign of King Zedekiah of Judah. '
  '35':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “I will destroy the archers of Elam—
  - type: text
    content: the best of their forces.
  '36':
  - type: text
    content: I will bring enemies from all directions,
  - type: text
    content: and I will scatter the people of Elam to the four winds.
  - type: text
    content: They will be exiled to countries around the world.
  '37':
  - type: text
    content: I myself will go with Elam’s enemies to shatter it.
  - type: text
    content: In my fierce anger, I will bring great disaster
  - type: text
    content: 'upon the people of Elam,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Their enemies will chase them with the sword
  - type: text
    content: until I have destroyed them completely.
  '38':
  - type: text
    content: 'I will set my throne in Elam,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “and I will destroy its king and officials.
  '39':
  - type: text
    content: But I will restore the fortunes of Elam
  - type: text
    content: in days to come.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: You are proud of your fertile valleys,
  - type: text
    content: but they will soon be ruined.
  - type: text
    content: You trusted in your wealth,
  - type: text
    content: you rebellious daughter,
  - type: text
    content: and thought no one could ever harm you.
  '5':
  - type: text
    content: But look! I will bring terror upon you,”
  - type: text
    content: 'says the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “Your neighbors will chase you from your land,
  - type: text
    content: and no one will help your exiles as they flee.
  '6':
  - type: text
    content: But I will restore the fortunes of the Ammonites
  - type: text
    content: in days to come.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: Messages about Edom
  '7':
  - type: text
    content: 'This message was given concerning Edom. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “Is there no wisdom in Teman?
  - type: text
    content: Is no one left to give wise counsel?
  '8':
  - type: text
    content: Turn and flee!
  - type: text
    content: Hide in deep caves, you people of Dedan!
  - type: text
    content: For when I bring disaster on Edom,
  - type: note
    content: Hebrew Esau; also in 49:10.
  - type: text
    content: I will punish you, too!
  '9':
  - type: text
    content: Those who harvest grapes
  - type: text
    content: always leave a few for the poor.
  - type: text
    content: If thieves came at night,
  - type: text
    content: they would not take everything.
