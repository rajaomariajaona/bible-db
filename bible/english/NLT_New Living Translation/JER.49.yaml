document_id: JER.49
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Ammon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message was given concerning the Ammonites. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Are there no descendants of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: to inherit the land of Gad?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are you, who worship Molech,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Malcam, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Molech; also in 49:3.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: living in its towns?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In the days to come,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I will sound the battle cry against your city of Rabbah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will become a desolate heap of ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the neighboring towns will be burned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Israel will take back the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you took from her,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Cry out, O Heshbon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the town of Ai is destroyed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep, O people of Rabbah!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put on your clothes of mourning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep and wail, hiding in the hedges,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your god Molech, with his priests and officials,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be hauled off to distant lands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You are proud of your fertile valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they will soon be ruined.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You trusted in your wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you rebellious daughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thought no one could ever harm you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But look! I will bring terror upon you,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your neighbors will chase you from your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will help your exiles as they flee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But I will restore the fortunes of the Ammonites
- type: usfm
  marker: q2
  children:
  - type: text
    text: in days to come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Messages about Edom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'This message was given concerning Edom. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is there no wisdom in Teman?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is no one left to give wise counsel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Turn and flee!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hide in deep caves, you people of Dedan!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I bring disaster on Edom,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Esau; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 49:10.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will punish you, too!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Those who harvest grapes
- type: usfm
  marker: q2
  children:
  - type: text
    text: always leave a few for the poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If thieves came at night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they would not take everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But I will strip bare the land of Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there will be no place left to hide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its children, its brothers, and its neighbors
- type: usfm
  marker: q2
  children:
  - type: text
    text: will all be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Edom itself will be no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But I will protect the orphans who remain among you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your widows, too, can depend on me for help.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “If the innocent must suffer, how much more must you! You will not go unpunished! You must drink this cup of judgment! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I have sworn by my own name,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “that Bozrah will become an object of horror and a heap of ruins; it will be mocked and cursed. All its towns and villages will be desolate forever.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard a message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: that an ambassador was sent to the nations to say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Form a coalition against Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prepare for battle!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to Edom,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will cut you down to size among the nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will be despised by all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You have been deceived
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the fear you inspire in others
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by your own pride.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You live in a rock fortress
- type: usfm
  marker: q2
  children:
  - type: text
    text: and control the mountain heights.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even if you make your nest among the peaks with the eagles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will bring you crashing down,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Edom will be an object of horror.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All who pass by will be appalled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will gasp at the destruction they see there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It will be like the destruction of Sodom and Gomorrah
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and their neighboring towns,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No one will live there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one will inhabit it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will come like a lion from the thickets of the Jordan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaping on the sheep in the pasture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will chase Edom from its land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will appoint the leader of my choice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For who is like me, and who can challenge me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What ruler can oppose my will?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Listen to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s plans against Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people of Teman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the little children will be dragged off like sheep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their homes will be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The earth will shake with the noise of Edom’s fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its cry of despair will be heard all the way to the Red Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sea of reeds.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Look! The enemy swoops down like an eagle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreading his wings over Bozrah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the mightiest warriors will be in anguish
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman in labor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Damascus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'This message was given concerning Damascus. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The towns of Hamath and Arpad are struck with fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they have heard the news of their destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their hearts are troubled
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a wild sea in a raging storm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Damascus has become feeble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all her people turn to flee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fear, anguish, and pain have gripped her
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they grip a woman in labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: That famous city, a city of joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be forsaken!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Her young men will fall in the streets and die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her soldiers will all be killed,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “And I will set fire to the walls of Damascus
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will burn up the palaces of Ben-hadad.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Kedar and Hazor
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: This message was given concerning Kedar and the kingdoms of Hazor, which were attacked by King Nebuchadnezzar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 49:30.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Advance against Kedar!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Destroy the warriors from the East!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Their flocks and tents will be captured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their household goods and camels will be taken away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Everywhere shouts of panic will be heard:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘We are terrorized at every turn!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Run for your lives,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Hide yourselves in deep caves, you people of Hazor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for King Nebuchadnezzar of Babylon has plotted against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is preparing to destroy you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Go up and attack that complacent nation,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Its people live alone in the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: without walls or gates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Their camels and other livestock will all be yours.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will scatter to the winds these people
- type: usfm
  marker: q2
  children:
  - type: text
    text: who live in remote places.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who clip the corners of their hair.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring calamity upon them
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'from every direction,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “Hazor will be inhabited by jackals,
