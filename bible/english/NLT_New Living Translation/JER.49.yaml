document_id: JER.49,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Ammon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This message was given concerning the Ammonites. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are there no descendants of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to inherit the land of Gad?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are you, who worship Molech,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Malcam, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Molech; also in 49:3.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: living in its towns?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will strip bare the land of Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there will be no place left to hide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its children, its brothers, and its neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will all be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Edom itself will be no more.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will protect the orphans who remain among you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your widows, too, can depend on me for help.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “If the innocent must suffer, how much more must you! You will not go unpunished! You must drink this cup of judgment! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have sworn by my own name,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “that Bozrah will become an object of horror and a heap of ruins; it will be mocked and cursed. All its towns and villages will be desolate forever.”'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have heard a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that an ambassador was sent to the nations to say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Form a coalition against Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and prepare for battle!”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Edom,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will cut you down to size among the nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will be despised by all.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been deceived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the fear you inspire in others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by your own pride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You live in a rock fortress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and control the mountain heights.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even if you make your nest among the peaks with the eagles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring you crashing down,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Edom will be an object of horror.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who pass by will be appalled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will gasp at the destruction they see there.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be like the destruction of Sodom and Gomorrah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and their neighboring towns,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “No one will live there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one will inhabit it.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will come like a lion from the thickets of the Jordan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaping on the sheep in the pasture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will chase Edom from its land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will appoint the leader of my choice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For who is like me, and who can challenge me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What ruler can oppose my will?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the days to come,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will sound the battle cry against your city of Rabbah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will become a desolate heap of ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the neighboring towns will be burned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Israel will take back the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you took from her,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s plans against Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people of Teman.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the little children will be dragged off like sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their homes will be destroyed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will shake with the noise of Edom’s fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its cry of despair will be heard all the way to the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! The enemy swoops down like an eagle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spreading his wings over Bozrah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the mightiest warriors will be in anguish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a woman in labor.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Damascus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This message was given concerning Damascus. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The towns of Hamath and Arpad are struck with fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have heard the news of their destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their hearts are troubled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a wild sea in a raging storm.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Damascus has become feeble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all her people turn to flee.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear, anguish, and pain have gripped her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they grip a woman in labor.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That famous city, a city of joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be forsaken!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young men will fall in the streets and die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her soldiers will all be killed,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And I will set fire to the walls of Damascus
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will burn up the palaces of Ben-hadad.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Kedar and Hazor
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This message was given concerning Kedar and the kingdoms of Hazor, which were attacked by King Nebuchadnezzar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar; also in 49:30.
      marker-yv: yv-n
    - type: text
      text: ' of Babylon. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Advance against Kedar!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Destroy the warriors from the East!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their flocks and tents will be captured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their household goods and camels will be taken away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Everywhere shouts of panic will be heard:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘We are terrorized at every turn!’
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cry out, O Heshbon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the town of Ai is destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep, O people of Rabbah!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put on your clothes of mourning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep and wail, hiding in the hedges,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your god Molech, with his priests and officials,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be hauled off to distant lands.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Run for your lives,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Hide yourselves in deep caves, you people of Hazor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for King Nebuchadnezzar of Babylon has plotted against you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is preparing to destroy you.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go up and attack that complacent nation,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Its people live alone in the desert
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without walls or gates.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their camels and other livestock will all be yours.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will scatter to the winds these people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who live in remote places.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who clip the corners of their hair.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring calamity upon them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from every direction,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hazor will be inhabited by jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it will be desolate forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will live there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one will inhabit it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Elam
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This message concerning Elam came to the prophet Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the beginning of the reign of King Zedekiah of Judah. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will destroy the archers of Elam—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the best of their forces.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring enemies from all directions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will scatter the people of Elam to the four winds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be exiled to countries around the world.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I myself will go with Elam’s enemies to shatter it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In my fierce anger, I will bring great disaster
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'upon the people of Elam,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Their enemies will chase them with the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until I have destroyed them completely.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will set my throne in Elam,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and I will destroy its king and officials.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will restore the fortunes of Elam
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in days to come.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are proud of your fertile valleys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they will soon be ruined.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You trusted in your wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you rebellious daughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thought no one could ever harm you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But look! I will bring terror upon you,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your neighbors will chase you from your land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will help your exiles as they flee.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will restore the fortunes of the Ammonites
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in days to come.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Messages about Edom
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This message was given concerning Edom. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is there no wisdom in Teman?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is no one left to give wise counsel?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn and flee!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide in deep caves, you people of Dedan!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when I bring disaster on Edom,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:8 '
