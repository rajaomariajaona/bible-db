document_id: NUM.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Balaam Blesses Israel
  - type: text
    content: 'Then Balaam said to King Balak, “Build me seven altars here, and prepare seven young bulls and seven rams for me to sacrifice.” '
  '10':
  - type: text
    content: Who can count Jacob’s descendants, as numerous as dust?
  - type: text
    content: Who can count even a fourth of Israel’s people?
  - type: text
    content: Let me die like the righteous;
  - type: text
    content: let my life end like theirs.”
  '11':
  - type: text
    content: Then King Balak demanded of Balaam, “What have you done to me? I brought you to curse my enemies. Instead, you have blessed them!”
  '12':
  - type: text
    content: 'But Balaam replied, “I will speak only the message that the '
  - type: text
    content: Lord
  - type: text
    content: ' puts in my mouth.”'
  - type: heading
    content: Balaam’s Second Message
  '13':
  - type: text
    content: 'Then King Balak told him, “Come with me to another place. There you will see another part of the nation of Israel, but not all of them. Curse at least that many!” '
  '14':
  - type: text
    content: So Balak took Balaam to the plateau of Zophim on Pisgah Peak. He built seven altars there and offered a young bull and a ram on each altar.
  '15':
  - type: text
    content: 'Then Balaam said to the king, “Stand here by your burnt offerings while I go over there to meet the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' met Balaam and gave him a message. Then he said, “Go back to Balak and give him my message.”'
  '17':
  - type: text
    content: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. “What did the '
  - type: text
    content: Lord
  - type: text
    content: ' say?” Balak asked eagerly.'
  '18':
  - type: text
    content: 'This was the message Balaam delivered:'
  - type: text
    content: “Rise up, Balak, and listen!
  - type: text
    content: Hear me, son of Zippor.
  '19':
  - type: text
    content: God is not a man, so he does not lie.
  - type: text
    content: He is not human, so he does not change his mind.
  - type: text
    content: Has he ever spoken and failed to act?
  - type: text
    content: Has he ever promised and not carried it through?
  '2':
  - type: text
    content: Balak followed his instructions, and the two of them sacrificed a young bull and a ram on each altar.
  '20':
  - type: text
    content: Listen, I received a command to bless;
  - type: text
    content: God has blessed, and I cannot reverse it!
  '21':
  - type: text
    content: No misfortune is in his plan for Jacob;
  - type: text
    content: no trouble is in store for Israel.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' their God is with them;'
  - type: text
    content: he has been proclaimed their king.
  '22':
  - type: text
    content: God brought them out of Egypt;
  - type: text
    content: for them he is as strong as a wild ox.
  '23':
  - type: text
    content: No curse can touch Jacob;
  - type: text
    content: no magic has any power against Israel.
  - type: text
    content: For now it will be said of Jacob,
  - type: text
    content: ‘What wonders God has done for Israel!’
  '24':
  - type: text
    content: These people rise up like a lioness,
  - type: text
    content: like a majestic lion rousing itself.
  - type: text
    content: They refuse to rest
  - type: text
    content: until they have feasted on prey,
  - type: text
    content: drinking the blood of the slaughtered!”
  '25':
  - type: text
    content: Then Balak said to Balaam, “Fine, but if you won’t curse them, at least don’t bless them!”
  '26':
  - type: text
    content: 'But Balaam replied to Balak, “Didn’t I tell you that I can do only what the '
  - type: text
    content: Lord
  - type: text
    content: ' tells me?”'
  - type: heading
    content: Balaam’s Third Message
  '27':
  - type: text
    content: Then King Balak said to Balaam, “Come, I will take you to one more place. Perhaps it will please God to let you curse them from there.”
  '28':
  - type: text
    content: So Balak took Balaam to the top of Mount Peor, overlooking the wasteland.
  - type: note
    content: Or overlooking Jeshimon.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Balaam again told Balak, “Build me seven altars, and prepare seven young bulls and seven rams for me to sacrifice.” '
  '3':
  - type: text
    content: 'Then Balaam said to Balak, “Stand here by your burnt offerings, and I will go to see if the '
  - type: text
    content: Lord
  - type: text
    content: ' will respond to me. Then I will tell you whatever he reveals to me.” So Balaam went alone to the top of a bare hill, '
  '30':
  - type: text
    content: So Balak did as Balaam ordered and offered a young bull and a ram on each altar.
  '4':
  - type: text
    content: and God met him there. Balaam said to him, “I have prepared seven altars and have sacrificed a young bull and a ram on each altar.”
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave Balaam a message for King Balak. Then he said, “Go back to Balak and give him my message.”'
  '6':
  - type: text
    content: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. '
  '7':
  - type: text
    content: 'This was the message Balaam delivered:'
  - type: text
    content: “Balak summoned me to come from Aram;
  - type: text
    content: the king of Moab brought me from the eastern hills.
  - type: text
    content: ‘Come,’ he said, ‘curse Jacob for me!
  - type: text
    content: Come and announce Israel’s doom.’
  '8':
  - type: text
    content: But how can I curse those
  - type: text
    content: whom God has not cursed?
  - type: text
    content: How can I condemn those
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has not condemned?'
  '9':
  - type: text
    content: I see them from the cliff tops;
  - type: text
    content: I watch them from the hills.
  - type: text
    content: I see a people who live by themselves,
  - type: text
    content: set apart from other nations.
