document_id: NUM.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam Blesses Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Balaam said to King Balak, “Build me seven altars here, and prepare seven young bulls and seven rams for me to sacrifice.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Balak followed his instructions, and the two of them sacrificed a young bull and a ram on each altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Balaam said to Balak, “Stand here by your burnt offerings, and I will go to see if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will respond to me. Then I will tell you whatever he reveals to me.” So Balaam went alone to the top of a bare hill, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and God met him there. Balaam said to him, “I have prepared seven altars and have sacrificed a young bull and a ram on each altar.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Balaam a message for King Balak. Then he said, “Go back to Balak and give him my message.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'This was the message Balaam delivered:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Balak summoned me to come from Aram;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the king of Moab brought me from the eastern hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Come,’ he said, ‘curse Jacob for me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come and announce Israel’s doom.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But how can I curse those
- type: usfm
  marker: q2
  children:
  - type: text
    text: whom God has not cursed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I condemn those
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has not condemned?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I see them from the cliff tops;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I watch them from the hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I see a people who live by themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set apart from other nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who can count Jacob’s descendants, as numerous as dust?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can count even a fourth of Israel’s people?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me die like the righteous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let my life end like theirs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then King Balak demanded of Balaam, “What have you done to me? I brought you to curse my enemies. Instead, you have blessed them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Balaam replied, “I will speak only the message that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' puts in my mouth.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Second Message
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then King Balak told him, “Come with me to another place. There you will see another part of the nation of Israel, but not all of them. Curse at least that many!” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So Balak took Balaam to the plateau of Zophim on Pisgah Peak. He built seven altars there and offered a young bull and a ram on each altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Balaam said to the king, “Stand here by your burnt offerings while I go over there to meet the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' met Balaam and gave him a message. Then he said, “Go back to Balak and give him my message.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. “What did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' say?” Balak asked eagerly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This was the message Balaam delivered:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Rise up, Balak, and listen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear me, son of Zippor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God is not a man, so he does not lie.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is not human, so he does not change his mind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has he ever spoken and failed to act?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has he ever promised and not carried it through?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Listen, I received a command to bless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God has blessed, and I cannot reverse it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: No misfortune is in his plan for Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no trouble is in store for Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God is with them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has been proclaimed their king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: God brought them out of Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for them he is as strong as a wild ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: No curse can touch Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no magic has any power against Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For now it will be said of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘What wonders God has done for Israel!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: These people rise up like a lioness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a majestic lion rousing itself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They refuse to rest
- type: usfm
  marker: q2
  children:
  - type: text
    text: until they have feasted on prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drinking the blood of the slaughtered!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Balak said to Balaam, “Fine, but if you won’t curse them, at least don’t bless them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Balaam replied to Balak, “Didn’t I tell you that I can do only what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' tells me?”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Third Message
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then King Balak said to Balaam, “Come, I will take you to one more place. Perhaps it will please God to let you curse them from there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So Balak took Balaam to the top of Mount Peor, overlooking the wasteland.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: overlooking Jeshimon.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Balaam again told Balak, “Build me seven altars, and prepare seven young bulls and seven rams for me to sacrifice.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Balak did as Balaam ordered and offered a young bull and a ram on each altar.
