document_id: NUM.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Balaam Blesses Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Balaam said to King Balak, “Build me seven altars here, and prepare seven young bulls and seven rams for me to sacrifice.” '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can count Jacob’s descendants, as numerous as dust?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can count even a fourth of Israel’s people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me die like the righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let my life end like theirs.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King Balak demanded of Balaam, “What have you done to me? I brought you to curse my enemies. Instead, you have blessed them!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Balaam replied, “I will speak only the message that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' puts in my mouth.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Balaam’s Second Message
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then King Balak told him, “Come with me to another place. There you will see another part of the nation of Israel, but not all of them. Curse at least that many!” '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Balak took Balaam to the plateau of Zophim on Pisgah Peak. He built seven altars there and offered a young bull and a ram on each altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Balaam said to the king, “Stand here by your burnt offerings while I go over there to meet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' met Balaam and gave him a message. Then he said, “Go back to Balak and give him my message.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. “What did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' say?” Balak asked eagerly.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the message Balaam delivered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rise up, Balak, and listen!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear me, son of Zippor.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is not a man, so he does not lie.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is not human, so he does not change his mind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has he ever spoken and failed to act?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has he ever promised and not carried it through?
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Balak followed his instructions, and the two of them sacrificed a young bull and a ram on each altar.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, I received a command to bless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has blessed, and I cannot reverse it!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No misfortune is in his plan for Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no trouble is in store for Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God is with them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has been proclaimed their king.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God brought them out of Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for them he is as strong as a wild ox.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No curse can touch Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no magic has any power against Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For now it will be said of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What wonders God has done for Israel!’
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These people rise up like a lioness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a majestic lion rousing itself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They refuse to rest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until they have feasted on prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drinking the blood of the slaughtered!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Balak said to Balaam, “Fine, but if you won’t curse them, at least don’t bless them!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Balaam replied to Balak, “Didn’t I tell you that I can do only what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tells me?”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Balaam’s Third Message
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then King Balak said to Balaam, “Come, I will take you to one more place. Perhaps it will please God to let you curse them from there.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Balak took Balaam to the top of Mount Peor, overlooking the wasteland.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: overlooking Jeshimon.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam again told Balak, “Build me seven altars, and prepare seven young bulls and seven rams for me to sacrifice.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Balaam said to Balak, “Stand here by your burnt offerings, and I will go to see if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will respond to me. Then I will tell you whatever he reveals to me.” So Balaam went alone to the top of a bare hill, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Balak did as Balaam ordered and offered a young bull and a ram on each altar.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and God met him there. Balaam said to him, “I have prepared seven altars and have sacrificed a young bull and a ram on each altar.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Balaam a message for King Balak. Then he said, “Go back to Balak and give him my message.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Balaam returned and found the king standing beside his burnt offerings with all the officials of Moab. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the message Balaam delivered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Balak summoned me to come from Aram;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king of Moab brought me from the eastern hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Come,’ he said, ‘curse Jacob for me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come and announce Israel’s doom.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But how can I curse those
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom God has not cursed?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can I condemn those
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not condemned?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see them from the cliff tops;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I watch them from the hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see a people who live by themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set apart from other nations.
