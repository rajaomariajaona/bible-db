document_id: ACT.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cornelius Calls for Peter
  - type: text
    content: In Caesarea there lived a Roman army officer
  - type: note
    content: Greek a centurion; similarly in 10:22.
  - type: text
    content: ' named Cornelius, who was a captain of the Italian Regiment. '
  '10':
  - type: text
    content: 'and he was hungry. But while a meal was being prepared, he fell into a trance. '
  '11':
  - type: text
    content: 'He saw the sky open, and something like a large sheet was let down by its four corners. '
  '12':
  - type: text
    content: 'In the sheet were all sorts of animals, reptiles, and birds. '
  '13':
  - type: text
    content: Then a voice said to him, “Get up, Peter; kill and eat them.”
  '14':
  - type: text
    content: “No, Lord,” Peter declared. “I have never eaten anything that our Jewish laws have declared impure and unclean.
  - type: note
    content: Greek anything common and unclean.
  - type: text
    content: ”
  '15':
  - type: text
    content: 'But the voice spoke again: “Do not call something unclean if God has made it clean.” '
  '16':
  - type: text
    content: The same vision was repeated three times. Then the sheet was suddenly pulled up to heaven.
  '17':
  - type: text
    content: 'Peter was very perplexed. What could the vision mean? Just then the men sent by Cornelius found Simon’s house. Standing outside the gate, '
  '18':
  - type: text
    content: they asked if a man named Simon Peter was staying there.
  '19':
  - type: text
    content: 'Meanwhile, as Peter was puzzling over the vision, the Holy Spirit said to him, “Three men have come looking for you. '
  '2':
  - type: text
    content: 'He was a devout, God-fearing man, as was everyone in his household. He gave generously to the poor and prayed regularly to God. '
  '20':
  - type: text
    content: Get up, go downstairs, and go with them without hesitation. Don’t worry, for I have sent them.”
  '21':
  - type: text
    content: So Peter went down and said, “I’m the man you are looking for. Why have you come?”
  '22':
  - type: text
    content: 'They said, “We were sent by Cornelius, a Roman officer. He is a devout and God-fearing man, well respected by all the Jews. A holy angel instructed him to summon you to his house so that he can hear your message.” '
  '23':
  - type: text
    content: So Peter invited the men to stay for the night. The next day he went with them, accompanied by some of the brothers from Joppa.
  '24':
  - type: text
    content: 'They arrived in Caesarea the following day. Cornelius was waiting for them and had called together his relatives and close friends. '
  '25':
  - type: text
    content: 'As Peter entered his home, Cornelius fell at his feet and worshiped him. '
  '26':
  - type: text
    content: 'But Peter pulled him up and said, “Stand up! I’m a human being just like you!” '
  '27':
  - type: text
    content: So they talked together and went inside, where many others were assembled.
  '28':
  - type: text
    content: 'Peter told them, “You know it is against our laws for a Jewish man to enter a Gentile home like this or to associate with you. But God has shown me that I should no longer think of anyone as impure or unclean. '
  '29':
  - type: text
    content: So I came without objection as soon as I was sent for. Now tell me why you sent for me.”
  '3':
  - type: text
    content: One afternoon about three o’clock, he had a vision in which he saw an angel of God coming toward him. “Cornelius!” the angel said.
  '30':
  - type: text
    content: 'Cornelius replied, “Four days ago I was praying in my house about this same time, three o’clock in the afternoon. Suddenly, a man in dazzling clothes was standing in front of me. '
  '31':
  - type: text
    content: 'He told me, ‘Cornelius, your prayer has been heard, and your gifts to the poor have been noticed by God! '
  '32':
  - type: text
    content: 'Now send messengers to Joppa, and summon a man named Simon Peter. He is staying in the home of Simon, a tanner who lives near the seashore.’ '
  '33':
  - type: text
    content: So I sent for you at once, and it was good of you to come. Now we are all here, waiting before God to hear the message the Lord has given you.”
  - type: heading
    content: The Gentiles Hear the Good News
  '34':
  - type: text
    content: 'Then Peter replied, “I see very clearly that God shows no favoritism. '
  '35':
  - type: text
    content: 'In every nation he accepts those who fear him and do what is right. '
  '36':
  - type: text
    content: 'This is the message of Good News for the people of Israel—that there is peace with God through Jesus Christ, who is Lord of all. '
  '37':
  - type: text
    content: 'You know what happened throughout Judea, beginning in Galilee, after John began preaching his message of baptism. '
  '38':
  - type: text
    content: And you know that God anointed Jesus of Nazareth with the Holy Spirit and with power. Then Jesus went around doing good and healing all who were oppressed by the devil, for God was with him.
  '39':
  - type: text
    content: “And we apostles are witnesses of all he did throughout Judea and in Jerusalem. They put him to death by hanging him on a cross,
  - type: note
    content: Greek on a tree.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Cornelius stared at him in terror. “What is it, sir?” he asked the angel.
  - type: text
    content: 'And the angel replied, “Your prayers and gifts to the poor have been received by God as an offering! '
  '40':
  - type: text
    content: 'but God raised him to life on the third day. Then God allowed him to appear, '
  '41':
  - type: text
    content: not to the general public,
  - type: note
    content: Greek the people.
  - type: text
    content: ' but to us whom God had chosen in advance to be his witnesses. We were those who ate and drank with him after he rose from the dead. '
  '42':
  - type: text
    content: 'And he ordered us to preach everywhere and to testify that Jesus is the one appointed by God to be the judge of all—the living and the dead. '
  '43':
  - type: text
    content: He is the one all the prophets testified about, saying that everyone who believes in him will have their sins forgiven through his name.”
  - type: heading
    content: The Gentiles Receive the Holy Spirit
  '44':
  - type: text
    content: 'Even as Peter was saying these things, the Holy Spirit fell upon all who were listening to the message. '
  '45':
  - type: text
    content: The Jewish believers
  - type: note
    content: Greek The faithful ones of the circumcision.
  - type: text
    content: ' who came with Peter were amazed that the gift of the Holy Spirit had been poured out on the Gentiles, too. '
  '46':
  - type: text
    content: For they heard them speaking in other tongues
  - type: note
    content: Or in other languages.
  - type: text
    content: ' and praising God.'
  - type: text
    content: 'Then Peter asked, '
  '47':
  - type: text
    content: '“Can anyone object to their being baptized, now that they have received the Holy Spirit just as we did?” '
  '48':
  - type: text
    content: So he gave orders for them to be baptized in the name of Jesus Christ. Afterward Cornelius asked him to stay with them for several days.
  '5':
  - type: text
    content: 'Now send some men to Joppa, and summon a man named Simon Peter. '
  '6':
  - type: text
    content: He is staying with Simon, a tanner who lives near the seashore.”
  '7':
  - type: text
    content: 'As soon as the angel was gone, Cornelius called two of his household servants and a devout soldier, one of his personal attendants. '
  '8':
  - type: text
    content: He told them what had happened and sent them off to Joppa.
  - type: heading
    content: Peter Visits Cornelius
  '9':
  - type: text
    content: 'The next day as Cornelius’s messengers were nearing the town, Peter went up on the flat roof to pray. It was about noon, '
