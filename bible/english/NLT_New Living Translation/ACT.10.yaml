document_id: ACT.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cornelius Calls for Peter
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In Caesarea there lived a Roman army officer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a centurion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 10:22.
    marker-yv: yv-n
  - type: text
    text: ' named Cornelius, who was a captain of the Italian Regiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He was a devout, God-fearing man, as was everyone in his household. He gave generously to the poor and prayed regularly to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: One afternoon about three o’clock, he had a vision in which he saw an angel of God coming toward him. “Cornelius!” the angel said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cornelius stared at him in terror. “What is it, sir?” he asked the angel.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the angel replied, “Your prayers and gifts to the poor have been received by God as an offering! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now send some men to Joppa, and summon a man named Simon Peter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He is staying with Simon, a tanner who lives near the seashore.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As soon as the angel was gone, Cornelius called two of his household servants and a devout soldier, one of his personal attendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He told them what had happened and sent them off to Joppa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Visits Cornelius
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The next day as Cornelius’s messengers were nearing the town, Peter went up on the flat roof to pray. It was about noon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and he was hungry. But while a meal was being prepared, he fell into a trance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He saw the sky open, and something like a large sheet was let down by its four corners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In the sheet were all sorts of animals, reptiles, and birds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then a voice said to him, “Get up, Peter; kill and eat them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “No, Lord,” Peter declared. “I have never eaten anything that our Jewish laws have declared impure and unclean.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: anything common and unclean.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the voice spoke again: “Do not call something unclean if God has made it clean.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The same vision was repeated three times. Then the sheet was suddenly pulled up to heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Peter was very perplexed. What could the vision mean? Just then the men sent by Cornelius found Simon’s house. Standing outside the gate, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: they asked if a man named Simon Peter was staying there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Meanwhile, as Peter was puzzling over the vision, the Holy Spirit said to him, “Three men have come looking for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Get up, go downstairs, and go with them without hesitation. Don’t worry, for I have sent them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So Peter went down and said, “I’m the man you are looking for. Why have you come?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They said, “We were sent by Cornelius, a Roman officer. He is a devout and God-fearing man, well respected by all the Jews. A holy angel instructed him to summon you to his house so that he can hear your message.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So Peter invited the men to stay for the night. The next day he went with them, accompanied by some of the brothers from Joppa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They arrived in Caesarea the following day. Cornelius was waiting for them and had called together his relatives and close friends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As Peter entered his home, Cornelius fell at his feet and worshiped him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Peter pulled him up and said, “Stand up! I’m a human being just like you!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So they talked together and went inside, where many others were assembled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Peter told them, “You know it is against our laws for a Jewish man to enter a Gentile home like this or to associate with you. But God has shown me that I should no longer think of anyone as impure or unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So I came without objection as soon as I was sent for. Now tell me why you sent for me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cornelius replied, “Four days ago I was praying in my house about this same time, three o’clock in the afternoon. Suddenly, a man in dazzling clothes was standing in front of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He told me, ‘Cornelius, your prayer has been heard, and your gifts to the poor have been noticed by God! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now send messengers to Joppa, and summon a man named Simon Peter. He is staying in the home of Simon, a tanner who lives near the seashore.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So I sent for you at once, and it was good of you to come. Now we are all here, waiting before God to hear the message the Lord has given you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gentiles Hear the Good News
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then Peter replied, “I see very clearly that God shows no favoritism. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'In every nation he accepts those who fear him and do what is right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'This is the message of Good News for the people of Israel—that there is peace with God through Jesus Christ, who is Lord of all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'You know what happened throughout Judea, beginning in Galilee, after John began preaching his message of baptism. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And you know that God anointed Jesus of Nazareth with the Holy Spirit and with power. Then Jesus went around doing good and healing all who were oppressed by the devil, for God was with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “And we apostles are witnesses of all he did throughout Judea and in Jerusalem. They put him to death by hanging him on a cross,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on a tree.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'but God raised him to life on the third day. Then God allowed him to appear, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: not to the general public,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the people.
    marker-yv: yv-n
  - type: text
    text: ' but to us whom God had chosen in advance to be his witnesses. We were those who ate and drank with him after he rose from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And he ordered us to preach everywhere and to testify that Jesus is the one appointed by God to be the judge of all—the living and the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: He is the one all the prophets testified about, saying that everyone who believes in him will have their sins forgiven through his name.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gentiles Receive the Holy Spirit
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Even as Peter was saying these things, the Holy Spirit fell upon all who were listening to the message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: The Jewish believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The faithful ones of the circumcision.
    marker-yv: yv-n
  - type: text
    text: ' who came with Peter were amazed that the gift of the Holy Spirit had been poured out on the Gentiles, too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: For they heard them speaking in other tongues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in other languages.
    marker-yv: yv-n
  - type: text
    text: ' and praising God.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Peter asked, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '“Can anyone object to their being baptized, now that they have received the Holy Spirit just as we did?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: So he gave orders for them to be baptized in the name of Jesus Christ. Afterward Cornelius asked him to stay with them for several days.
