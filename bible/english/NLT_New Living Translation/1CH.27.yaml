document_id: 1CH.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Military Commanders and Divisions
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the list of Israelite generals and captains,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: commanders of thousands and of hundreds.
    marker-yv: yv-n
  - type: text
    text: ' and their officers, who served the king by supervising the army divisions that were on duty each month of the year. Each division served for one month and had 24,000 troops.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jashobeam son of Zabdiel was commander of the first division of 24,000 troops, which was on duty during the first month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He was a descendant of Perez and was in charge of all the army officers for the first month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dodai, a descendant of Ahoah, was commander of the second division of 24,000 troops, which was on duty during the second month. Mikloth was his chief officer.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Benaiah son of Jehoiada the priest was commander of the third division of 24,000 troops, which was on duty during the third month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This was the Benaiah who commanded David’s elite military group known as the Thirty. His son Ammizabad was his chief officer.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asahel, the brother of Joab, was commander of the fourth division of 24,000 troops, which was on duty during the fourth month. Asahel was succeeded by his son Zebadiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Shammah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shamhuth, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Shammah; compare 11:27 and 2 Sam 23:25.
    marker-yv: yv-n
  - type: text
    text: ' the Izrahite was commander of the fifth division of 24,000 troops, which was on duty during the fifth month.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ira son of Ikkesh from Tekoa was commander of the sixth division of 24,000 troops, which was on duty during the sixth month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Helez, a descendant of Ephraim from Pelon, was commander of the seventh division of 24,000 troops, which was on duty during the seventh month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sibbecai, a descendant of Zerah from Hushah, was commander of the eighth division of 24,000 troops, which was on duty during the eighth month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Abiezer from Anathoth in the territory of Benjamin was commander of the ninth division of 24,000 troops, which was on duty during the ninth month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Maharai, a descendant of Zerah from Netophah, was commander of the tenth division of 24,000 troops, which was on duty during the tenth month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Benaiah from Pirathon in Ephraim was commander of the eleventh division of 24,000 troops, which was on duty during the eleventh month.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Heled,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Heldai, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Heled; compare 11:30 and 2 Sam 23:29.
    marker-yv: yv-n
  - type: text
    text: ' a descendant of Othniel from Netophah, was commander of the twelfth division of 24,000 troops, which was on duty during the twelfth month.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Leaders of the Tribes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The following were the tribes of Israel and their leaders:'
- type: text
  text: TribeLeaderReubenEliezer son of ZicriSimeonShephatiah son of Maacah
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '17'
- type: text
  text: LeviHashabiah son of KemuelAaron (the priests)Zadok
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '18'
- type: text
  text: JudahElihu (a brother of David)IssacharOmri son of Michael
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '19'
- type: text
  text: ZebulunIshmaiah son of ObadiahNaphtaliJeremoth son of Azriel
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '20'
- type: text
  text: EphraimHoshea son of AzaziahManasseh (west)Joel son of Pedaiah
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '21'
- type: text
  text: Manasseh in Gilead (east)Iddo son of ZechariahBenjaminJaasiel son of Abner
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '22'
- type: text
  text: DanAzarel son of Jeroham
- type: usfm
  marker: m
  children:
  - type: text
    text: These were the leaders of the tribes of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When David took his census, he did not count those who were younger than twenty years of age, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised to make the Israelites as numerous as the stars in heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Joab son of Zeruiah began the census but never finished it because
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: never finished it, and yet.
    marker-yv: yv-n
  - type: text
    text: ' the anger of God fell on Israel. The total number was never recorded in King David’s official records.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Officials of David’s Kingdom
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Azmaveth son of Adiel was in charge of the palace treasuries.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jonathan son of Uzziah was in charge of the regional treasuries throughout the towns, villages, and fortresses of Israel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ezri son of Kelub was in charge of the field workers who farmed the king’s lands.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Shimei from Ramah was in charge of the king’s vineyards.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zabdi from Shepham was responsible for the grapes and the supplies of wine.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Baal-hanan from Geder was in charge of the king’s olive groves and sycamore-fig trees in the foothills of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joash was responsible for the supplies of olive oil.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Shitrai from Sharon was in charge of the cattle on the Sharon Plain.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shaphat son of Adlai was responsible for the cattle in the valleys.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Obil the Ishmaelite was in charge of the camels.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehdeiah from Meronoth was in charge of the donkeys.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jaziz the Hagrite was in charge of the king’s flocks of sheep and goats.
- type: usfm
  marker: m
  children:
  - type: text
    text: All these officials were overseers of King David’s property.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jonathan, David’s uncle, was a wise counselor to the king, a man of great insight, and a scribe. Jehiel the Hacmonite was responsible for teaching the king’s sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ahithophel was the royal adviser. Hushai the Arkite was the king’s friend. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ahithophel was succeeded by Jehoiada son of Benaiah and by Abiathar. Joab was commander of the king’s army.
