document_id: 1CH.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Military Commanders and Divisions
  - type: text
    content: This is the list of Israelite generals and captains,
  - type: note
    content: Hebrew commanders of thousands and of hundreds.
  - type: text
    content: ' and their officers, who served the king by supervising the army divisions that were on duty each month of the year. Each division served for one month and had 24,000 troops.'
  '10':
  - type: text
    content: Helez, a descendant of Ephraim from Pelon, was commander of the seventh division of 24,000 troops, which was on duty during the seventh month.
  '11':
  - type: text
    content: Sibbecai, a descendant of Zerah from Hushah, was commander of the eighth division of 24,000 troops, which was on duty during the eighth month.
  '12':
  - type: text
    content: Abiezer from Anathoth in the territory of Benjamin was commander of the ninth division of 24,000 troops, which was on duty during the ninth month.
  '13':
  - type: text
    content: Maharai, a descendant of Zerah from Netophah, was commander of the tenth division of 24,000 troops, which was on duty during the tenth month.
  '14':
  - type: text
    content: Benaiah from Pirathon in Ephraim was commander of the eleventh division of 24,000 troops, which was on duty during the eleventh month.
  '15':
  - type: text
    content: Heled,
  - type: note
    content: Hebrew Heldai, a variant spelling of Heled; compare 11:30 and 2 Sam 23:29.
  - type: text
    content: ' a descendant of Othniel from Netophah, was commander of the twelfth division of 24,000 troops, which was on duty during the twelfth month.'
  - type: heading
    content: Leaders of the Tribes
  '16':
  - type: text
    content: 'The following were the tribes of Israel and their leaders:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Reuben
  - type: text
    content: Eliezer son of Zicri
  - type: text
    content: Simeon
  - type: text
    content: Shephatiah son of Maacah
  '17':
  - type: text
    content: Levi
  - type: text
    content: Hashabiah son of Kemuel
  - type: text
    content: Aaron (the priests)
  - type: text
    content: Zadok
  '18':
  - type: text
    content: Judah
  - type: text
    content: Elihu (a brother of David)
  - type: text
    content: Issachar
  - type: text
    content: Omri son of Michael
  '19':
  - type: text
    content: Zebulun
  - type: text
    content: Ishmaiah son of Obadiah
  - type: text
    content: Naphtali
  - type: text
    content: Jeremoth son of Azriel
  '2':
  - type: text
    content: 'Jashobeam son of Zabdiel was commander of the first division of 24,000 troops, which was on duty during the first month. '
  '20':
  - type: text
    content: Ephraim
  - type: text
    content: Hoshea son of Azaziah
  - type: text
    content: Manasseh (west)
  - type: text
    content: Joel son of Pedaiah
  '21':
  - type: text
    content: Manasseh in Gilead (east)
  - type: text
    content: Iddo son of Zechariah
  - type: text
    content: Benjamin
  - type: text
    content: Jaasiel son of Abner
  '22':
  - type: text
    content: Dan
  - type: text
    content: Azarel son of Jeroham
  - type: text
    content: These were the leaders of the tribes of Israel.
  '23':
  - type: text
    content: 'When David took his census, he did not count those who were younger than twenty years of age, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised to make the Israelites as numerous as the stars in heaven. '
  '24':
  - type: text
    content: Joab son of Zeruiah began the census but never finished it because
  - type: note
    content: Or never finished it, and yet.
  - type: text
    content: ' the anger of God fell on Israel. The total number was never recorded in King David’s official records.'
  - type: heading
    content: Officials of David’s Kingdom
  '25':
  - type: text
    content: Azmaveth son of Adiel was in charge of the palace treasuries.
  - type: text
    content: Jonathan son of Uzziah was in charge of the regional treasuries throughout the towns, villages, and fortresses of Israel.
  '26':
  - type: text
    content: Ezri son of Kelub was in charge of the field workers who farmed the king’s lands.
  '27':
  - type: text
    content: Shimei from Ramah was in charge of the king’s vineyards.
  - type: text
    content: Zabdi from Shepham was responsible for the grapes and the supplies of wine.
  '28':
  - type: text
    content: Baal-hanan from Geder was in charge of the king’s olive groves and sycamore-fig trees in the foothills of Judah.
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: Joash was responsible for the supplies of olive oil.
  '29':
  - type: text
    content: Shitrai from Sharon was in charge of the cattle on the Sharon Plain.
  - type: text
    content: Shaphat son of Adlai was responsible for the cattle in the valleys.
  '3':
  - type: text
    content: He was a descendant of Perez and was in charge of all the army officers for the first month.
  '30':
  - type: text
    content: Obil the Ishmaelite was in charge of the camels.
  - type: text
    content: Jehdeiah from Meronoth was in charge of the donkeys.
  '31':
  - type: text
    content: Jaziz the Hagrite was in charge of the king’s flocks of sheep and goats.
  - type: text
    content: All these officials were overseers of King David’s property.
  '32':
  - type: text
    content: 'Jonathan, David’s uncle, was a wise counselor to the king, a man of great insight, and a scribe. Jehiel the Hacmonite was responsible for teaching the king’s sons. '
  '33':
  - type: text
    content: 'Ahithophel was the royal adviser. Hushai the Arkite was the king’s friend. '
  '34':
  - type: text
    content: Ahithophel was succeeded by Jehoiada son of Benaiah and by Abiathar. Joab was commander of the king’s army.
  '4':
  - type: text
    content: Dodai, a descendant of Ahoah, was commander of the second division of 24,000 troops, which was on duty during the second month. Mikloth was his chief officer.
  '5':
  - type: text
    content: 'Benaiah son of Jehoiada the priest was commander of the third division of 24,000 troops, which was on duty during the third month. '
  '6':
  - type: text
    content: This was the Benaiah who commanded David’s elite military group known as the Thirty. His son Ammizabad was his chief officer.
  '7':
  - type: text
    content: Asahel, the brother of Joab, was commander of the fourth division of 24,000 troops, which was on duty during the fourth month. Asahel was succeeded by his son Zebadiah.
  '8':
  - type: text
    content: Shammah
  - type: note
    content: Hebrew Shamhuth, a variant spelling of Shammah; compare 11:27 and 2 Sam 23:25.
  - type: text
    content: ' the Izrahite was commander of the fifth division of 24,000 troops, which was on duty during the fifth month.'
  '9':
  - type: text
    content: Ira son of Ikkesh from Tekoa was commander of the sixth division of 24,000 troops, which was on duty during the sixth month.
