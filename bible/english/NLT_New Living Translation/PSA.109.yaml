type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: O God, whom I praise,
  - type: text
    content: don’t stand silent and aloof
  '10':
  - type: text
    content: May his children wander as beggars
  - type: text
    content: and be driven from
  - type: note
    content: As in Greek version; Hebrew reads and seek.
  - type: text
    content: ' their ruined homes.'
  '11':
  - type: text
    content: May creditors seize his entire estate,
  - type: text
    content: and strangers take all he has earned.
  '12':
  - type: text
    content: Let no one be kind to him;
  - type: text
    content: let no one pity his fatherless children.
  '13':
  - type: text
    content: May all his offspring die.
  - type: text
    content: May his family name be blotted out in the next generation.
  '14':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' never forget the sins of his fathers;'
  - type: text
    content: may his mother’s sins never be erased from the record.
  '15':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' always remember these sins,'
  - type: text
    content: and may his name disappear from human memory.
  '16':
  - type: text
    content: For he refused all kindness to others;
  - type: text
    content: he persecuted the poor and needy,
  - type: text
    content: and he hounded the brokenhearted to death.
  '17':
  - type: text
    content: He loved to curse others;
  - type: text
    content: now you curse him.
  - type: text
    content: He never blessed others;
  - type: text
    content: now don’t you bless him.
  '18':
  - type: text
    content: Cursing is as natural to him as his clothing,
  - type: text
    content: or the water he drinks,
  - type: text
    content: or the rich food he eats.
  '19':
  - type: text
    content: Now may his curses return and cling to him like clothing;
  - type: text
    content: may they be tied around him like a belt.”
  '2':
  - type: text
    content: while the wicked slander me
  - type: text
    content: and tell lies about me.
  '20':
  - type: text
    content: 'May those curses become the '
  - type: text
    content: Lord
  - type: text
    content: ’s punishment
  - type: text
    content: for my accusers who speak evil of me.
  '21':
  - type: text
    content: 'But deal well with me, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for the sake of your own reputation!
  - type: text
    content: Rescue me
  - type: text
    content: because you are so faithful and good.
  '22':
  - type: text
    content: For I am poor and needy,
  - type: text
    content: and my heart is full of pain.
  '23':
  - type: text
    content: I am fading like a shadow at dusk;
  - type: text
    content: I am brushed off like a locust.
  '24':
  - type: text
    content: My knees are weak from fasting,
  - type: text
    content: and I am skin and bones.
  '25':
  - type: text
    content: I am a joke to people everywhere;
  - type: text
    content: when they see me, they shake their heads in scorn.
  '26':
  - type: text
    content: 'Help me, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God!'
  - type: text
    content: Save me because of your unfailing love.
  '27':
  - type: text
    content: Let them see that this is your doing,
  - type: text
    content: 'that you yourself have done it, '
  - type: text
    content: Lord
  - type: text
    content: .
  '28':
  - type: text
    content: Then let them curse me if they like,
  - type: text
    content: but you will bless me!
  - type: text
    content: When they attack me, they will be disgraced!
  - type: text
    content: But I, your servant, will go right on rejoicing!
  '29':
  - type: text
    content: May my accusers be clothed with disgrace;
  - type: text
    content: may their humiliation cover them like a cloak.
  '3':
  - type: text
    content: They surround me with hateful words
  - type: text
    content: and fight against me for no reason.
  '30':
  - type: text
    content: 'But I will give repeated thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: praising him to everyone.
  '31':
  - type: text
    content: For he stands beside the needy,
  - type: text
    content: ready to save them from those who condemn them.
  '4':
  - type: text
    content: I love them, but they try to destroy me with accusations
  - type: text
    content: even as I am praying for them!
  '5':
  - type: text
    content: They repay evil for good,
  - type: text
    content: and hatred for my love.
  '6':
  - type: text
    content: They say,
  - type: note
    content: Hebrew lacks They say.
  - type: text
    content: ' “Get an evil person to turn against him.'
  - type: text
    content: Send an accuser to bring him to trial.
  '7':
  - type: text
    content: When his case comes up for judgment,
  - type: text
    content: let him be pronounced guilty.
  - type: text
    content: Count his prayers as sins.
  '8':
  - type: text
    content: Let his years be few;
  - type: text
    content: let someone else take his position.
  '9':
  - type: text
    content: May his children become fatherless,
  - type: text
    content: and his wife a widow.
