document_id: PSA.109,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, whom I praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t stand silent and aloof
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: May his children wander as beggars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be driven from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '109:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and seek.
      marker-yv: yv-n
    - type: text
      text: ' their ruined homes.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: May creditors seize his entire estate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strangers take all he has earned.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Let no one be kind to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let no one pity his fatherless children.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: May all his offspring die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May his family name be blotted out in the next generation.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' never forget the sins of his fathers;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may his mother’s sins never be erased from the record.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' always remember these sins,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may his name disappear from human memory.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For he refused all kindness to others;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he persecuted the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he hounded the brokenhearted to death.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He loved to curse others;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now you curse him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He never blessed others;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now don’t you bless him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Cursing is as natural to him as his clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the water he drinks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the rich food he eats.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Now may his curses return and cling to him like clothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may they be tied around him like a belt.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: while the wicked slander me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tell lies about me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'May those curses become the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s punishment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my accusers who speak evil of me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But deal well with me, O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sake of your own reputation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you are so faithful and good.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For I am poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my heart is full of pain.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I am fading like a shadow at dusk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am brushed off like a locust.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: My knees are weak from fasting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am skin and bones.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I am a joke to people everywhere;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they see me, they shake their heads in scorn.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Help me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Save me because of your unfailing love.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Let them see that this is your doing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that you yourself have done it, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then let them curse me if they like,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you will bless me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they attack me, they will be disgraced!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I, your servant, will go right on rejoicing!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: May my accusers be clothed with disgrace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may their humiliation cover them like a cloak.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They surround me with hateful words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fight against me for no reason.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But I will give repeated thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: praising him to everyone.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: For he stands beside the needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to save them from those who condemn them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I love them, but they try to destroy me with accusations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even as I am praying for them!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They repay evil for good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hatred for my love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They say,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '109:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They say.
      marker-yv: yv-n
    - type: text
      text: ' “Get an evil person to turn against him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Send an accuser to bring him to trial.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When his case comes up for judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let him be pronounced guilty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Count his prayers as sins.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let his years be few;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let someone else take his position.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: May his children become fatherless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his wife a widow.
