document_id: 1SA.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark in Philistia
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After the Philistines captured the Ark of God, they took it from the battleground at Ebenezer to the town of Ashdod. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent the Ark of God to the town of Ekron, but when the people of Ekron saw it coming they cried out, “They are bringing the Ark of the God of Israel here to kill us, too!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people summoned the Philistine rulers again and begged them, “Please send the Ark of the God of Israel back to its own country, or it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he.
      marker-yv: yv-n
    - type: text
      text: ' will kill us all.” For the deadly plague from God had already begun, and great fear was sweeping across the town. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who didn’t die were afflicted with tumors; and the cry from the town rose to heaven.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They carried the Ark of God into the temple of Dagon and placed it beside an idol of Dagon. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when the citizens of Ashdod went to see it the next morning, Dagon had fallen with his face to the ground in front of the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! So they took Dagon and put him in his place again. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the next morning the same thing happened—Dagon had fallen face down before the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' again. This time his head and hands had broken off and were lying in the doorway. Only the trunk of his body was left intact. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: That is why to this day neither the priests of Dagon nor anyone who enters the temple of Dagon in Ashdod will step on its threshold.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s heavy hand struck the people of Ashdod and the nearby villages with a plague of tumors.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version and Latin Vulgate read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tumors; and rats appeared in their land, and death and destruction were throughout the city.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people realized what was happening, they cried out, “We can’t keep the Ark of the God of Israel here any longer! He is against us! We will all be destroyed along with Dagon, our god.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they called together the rulers of the Philistine towns and asked, “What should we do with the Ark of the God of Israel?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rulers discussed it and replied, “Move it to the town of Gath.” So they moved the Ark of the God of Israel to Gath. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Ark arrived at Gath, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s heavy hand fell on its men, young and old; he struck them with a plague of tumors, and there was a great panic.
