document_id: PSA.59,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David, regarding the time Saul sent soldiers to watch David’s house in order to kill him. To be sung to the tune “Do Not Destroy!”'
  - type: text
    content: Rescue me from my enemies, O God.
  - type: text
    content: Protect me from those who have come to destroy me.
  '10':
  - type: text
    content: In his unfailing love, my God will stand with me.
  - type: text
    content: He will let me look down in triumph on all my enemies.
  '11':
  - type: text
    content: Don’t kill them, for my people soon forget such lessons;
  - type: text
    content: stagger them with your power, and bring them to their knees,
  - type: text
    content: O Lord our shield.
  '12':
  - type: text
    content: Because of the sinful things they say,
  - type: text
    content: because of the evil that is on their lips,
  - type: text
    content: let them be captured by their pride,
  - type: text
    content: their curses, and their lies.
  '13':
  - type: text
    content: Destroy them in your anger!
  - type: text
    content: Wipe them out completely!
  - type: text
    content: Then the whole world will know
  - type: text
    content: that God reigns in Israel.
  - type: note
    content: Hebrew in Jacob. See note on 44:4.
  - type: text
    content: ' '
  - type: text
    content: Interlude
  '14':
  - type: text
    content: My enemies come out at night,
  - type: text
    content: snarling like vicious dogs
  - type: text
    content: as they prowl the streets.
  '15':
  - type: text
    content: They scavenge for food
  - type: text
    content: but go to sleep unsatisfied.
  - type: note
    content: Or and growl if they don’t get enough.
  '16':
  - type: text
    content: But as for me, I will sing about your power.
  - type: text
    content: Each morning I will sing with joy about your unfailing love.
  - type: text
    content: For you have been my refuge,
  - type: text
    content: a place of safety when I am in distress.
  '17':
  - type: text
    content: O my Strength, to you I sing praises,
  - type: text
    content: for you, O God, are my refuge,
  - type: text
    content: the God who shows me unfailing love.
  '2':
  - type: text
    content: Rescue me from these criminals;
  - type: text
    content: save me from these murderers.
  '3':
  - type: text
    content: They have set an ambush for me.
  - type: text
    content: 'Fierce enemies are out there waiting, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: though I have not sinned or offended them.
  '4':
  - type: text
    content: I have done nothing wrong,
  - type: text
    content: yet they prepare to attack me.
  - type: text
    content: Wake up! See what is happening and help me!
  '5':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies, the God of Israel,'
  - type: text
    content: wake up and punish those hostile nations.
  - type: text
    content: 'Show no mercy to wicked traitors. '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: They come out at night,
  - type: text
    content: snarling like vicious dogs
  - type: text
    content: as they prowl the streets.
  '7':
  - type: text
    content: Listen to the filth that comes from their mouths;
  - type: text
    content: their words cut like swords.
  - type: text
    content: “After all, who can hear us?” they sneer.
  '8':
  - type: text
    content: 'But '
  - type: text
    content: Lord
  - type: text
    content: ', you laugh at them.'
  - type: text
    content: You scoff at all the hostile nations.
  '9':
  - type: text
    content: You are my strength; I wait for you to rescue me,
  - type: text
    content: for you, O God, are my fortress.
