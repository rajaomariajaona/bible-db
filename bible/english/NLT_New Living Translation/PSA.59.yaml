document_id: PSA.59
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'miktam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David, regarding the time Saul sent soldiers to watch David’s house in order to kill him. To be sung to the tune “Do Not Destroy!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rescue me from my enemies, O God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Protect me from those who have come to destroy me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rescue me from these criminals;
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me from these murderers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They have set an ambush for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Fierce enemies are out there waiting, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: though I have not sinned or offended them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I have done nothing wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they prepare to attack me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up! See what is happening and help me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies, the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: wake up and punish those hostile nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Show no mercy to wicked traitors. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They come out at night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snarling like vicious dogs
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they prowl the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Listen to the filth that comes from their mouths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their words cut like swords.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “After all, who can hear us?” they sneer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you laugh at them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You scoff at all the hostile nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You are my strength; I wait for you to rescue me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you, O God, are my fortress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In his unfailing love, my God will stand with me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will let me look down in triumph on all my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Don’t kill them, for my people soon forget such lessons;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stagger them with your power, and bring them to their knees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Lord our shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Because of the sinful things they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the evil that is on their lips,
- type: usfm
  marker: q1
  children:
  - type: text
    text: let them be captured by their pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their curses, and their lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Destroy them in your anger!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wipe them out completely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the whole world will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God reigns in Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 44:4.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My enemies come out at night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snarling like vicious dogs
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they prowl the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They scavenge for food
- type: usfm
  marker: q2
  children:
  - type: text
    text: but go to sleep unsatisfied.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and growl if they don’t get enough.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But as for me, I will sing about your power.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Each morning I will sing with joy about your unfailing love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you have been my refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place of safety when I am in distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: O my Strength, to you I sing praises,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you, O God, are my refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God who shows me unfailing love.
