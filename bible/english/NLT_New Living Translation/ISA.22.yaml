document_id: ISA.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This message came to me concerning Jerusalem—the Valley of Vision
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: concerning the Valley of Vision.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is happening?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is everyone running to the rooftops?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You survey the houses and tear some down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for stone to strengthen the walls.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Between the city walls, you build a reservoir
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for water from the old pool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you never ask for help from the One who did all this.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You never considered the One who planned this long ago.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'At that time the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called you to weep and mourn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He told you to shave your heads in sorrow for your sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to wear clothes of burlap to show your remorse.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But instead, you dance and play;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you slaughter cattle and kill sheep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You feast on meat and drink wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You say, “Let’s feast and drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for tomorrow we die!”
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies has revealed this to me: “Till the day you die, you will never be forgiven for this sin.” That is the judgment of the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Shebna
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, said to me: “Confront Shebna, the palace administrator, and give him this message:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Who do you think you are,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what are you doing here,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: building a beautiful tomb for yourself—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a monument high up in the rock?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to hurl you away, mighty man.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is going to grab you,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: crumple you into a ball,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and toss you away into a distant, barren land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There you will die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your glorious chariots will be broken and useless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are a disgrace to your master!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Yes, I will drive you out of office,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “I will pull you down from your high position. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The whole city is in a terrible uproar.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What do I see in this reveling city?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bodies are lying everywhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: killed not in battle but by famine and disease.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And then I will call my servant Eliakim son of Hilkiah to replace you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will dress him in your royal robes and will give him your title and your authority. And he will be a father to the people of Jerusalem and Judah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I will give him the key to the house of David—the highest position in the royal court. When he opens doors, no one will be able to close them; when he closes doors, no one will be able to open them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He will bring honor to his family name, for I will drive him firmly in place like a nail in the wall. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: They will give him great responsibility, and he will bring honor to even the lowliest members of his family.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'They will hang on him all the glory of his father’s house: its offspring and offshoots, all its lesser vessels, from the bowls to all the jars.'
      marker-yv: yv-n
    - type: text
      text: ”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies also says: “The time will come when I will pull out the nail that seemed so firm. It will come out and fall to the ground. Everything it supports will fall with it. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: All your leaders have fled.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They surrendered without resistance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people tried to slip away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they were captured, too.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: That’s why I said, “Leave me alone to weep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not try to comfort me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me cry for my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I watch them being destroyed.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oh, what a day of crushing defeat!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What a day of confusion and terror
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'brought by the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: upon the Valley of Vision!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The walls of Jerusalem have been broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cries of death echo from the mountainsides.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elamites are the archers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their chariots and charioteers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The men of Kir hold up the shields.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Chariots fill your beautiful valleys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and charioteers storm your gates.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Judah’s defenses have been stripped away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You run to the armory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to the House of the Forest; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 1 Kgs 7:2-5.
      marker-yv: yv-n
    - type: text
      text: ' for your weapons.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You inspect the breaks in the walls of Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the city of David.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You store up water in the lower pool.
