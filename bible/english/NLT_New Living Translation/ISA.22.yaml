document_id: ISA.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Jerusalem
  - type: text
    content: This message came to me concerning Jerusalem—the Valley of Vision
  - type: note
    content: Hebrew concerning the Valley of Vision.
  - type: text
    content: ':'
  - type: text
    content: What is happening?
  - type: text
    content: Why is everyone running to the rooftops?
  '10':
  - type: text
    content: You survey the houses and tear some down
  - type: text
    content: for stone to strengthen the walls.
  '11':
  - type: text
    content: Between the city walls, you build a reservoir
  - type: text
    content: for water from the old pool.
  - type: text
    content: But you never ask for help from the One who did all this.
  - type: text
    content: You never considered the One who planned this long ago.
  '12':
  - type: text
    content: 'At that time the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: called you to weep and mourn.
  - type: text
    content: He told you to shave your heads in sorrow for your sins
  - type: text
    content: and to wear clothes of burlap to show your remorse.
  '13':
  - type: text
    content: But instead, you dance and play;
  - type: text
    content: you slaughter cattle and kill sheep.
  - type: text
    content: You feast on meat and drink wine.
  - type: text
    content: You say, “Let’s feast and drink,
  - type: text
    content: for tomorrow we die!”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has revealed this to me: “Till the day you die, you will never be forgiven for this sin.” That is the judgment of the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: heading
    content: A Message for Shebna
  '15':
  - type: text
    content: 'This is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, said to me: “Confront Shebna, the palace administrator, and give him this message:'
  '16':
  - type: text
    content: “Who do you think you are,
  - type: text
    content: and what are you doing here,
  - type: text
    content: building a beautiful tomb for yourself—
  - type: text
    content: a monument high up in the rock?
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to hurl you away, mighty man.'
  - type: text
    content: He is going to grab you,
  '18':
  - type: text
    content: crumple you into a ball,
  - type: text
    content: and toss you away into a distant, barren land.
  - type: text
    content: There you will die,
  - type: text
    content: and your glorious chariots will be broken and useless.
  - type: text
    content: You are a disgrace to your master!
  '19':
  - type: text
    content: '“Yes, I will drive you out of office,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “I will pull you down from your high position. '
  '2':
  - type: text
    content: The whole city is in a terrible uproar.
  - type: text
    content: What do I see in this reveling city?
  - type: text
    content: Bodies are lying everywhere,
  - type: text
    content: killed not in battle but by famine and disease.
  '20':
  - type: text
    content: 'And then I will call my servant Eliakim son of Hilkiah to replace you. '
  '21':
  - type: text
    content: 'I will dress him in your royal robes and will give him your title and your authority. And he will be a father to the people of Jerusalem and Judah. '
  '22':
  - type: text
    content: 'I will give him the key to the house of David—the highest position in the royal court. When he opens doors, no one will be able to close them; when he closes doors, no one will be able to open them. '
  '23':
  - type: text
    content: 'He will bring honor to his family name, for I will drive him firmly in place like a nail in the wall. '
  '24':
  - type: text
    content: They will give him great responsibility, and he will bring honor to even the lowliest members of his family.
  - type: note
    content: 'Hebrew They will hang on him all the glory of his father’s house: its offspring and offshoots, all its lesser vessels, from the bowls to all the jars.'
  - type: text
    content: ”
  '25':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies also says: “The time will come when I will pull out the nail that seemed so firm. It will come out and fall to the ground. Everything it supports will fall with it. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: All your leaders have fled.
  - type: text
    content: They surrendered without resistance.
  - type: text
    content: The people tried to slip away,
  - type: text
    content: but they were captured, too.
  '4':
  - type: text
    content: That’s why I said, “Leave me alone to weep;
  - type: text
    content: do not try to comfort me.
  - type: text
    content: Let me cry for my people
  - type: text
    content: as I watch them being destroyed.”
  '5':
  - type: text
    content: Oh, what a day of crushing defeat!
  - type: text
    content: What a day of confusion and terror
  - type: text
    content: 'brought by the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: upon the Valley of Vision!
  - type: text
    content: The walls of Jerusalem have been broken,
  - type: text
    content: and cries of death echo from the mountainsides.
  '6':
  - type: text
    content: Elamites are the archers,
  - type: text
    content: with their chariots and charioteers.
  - type: text
    content: The men of Kir hold up the shields.
  '7':
  - type: text
    content: Chariots fill your beautiful valleys,
  - type: text
    content: and charioteers storm your gates.
  '8':
  - type: text
    content: Judah’s defenses have been stripped away.
  - type: text
    content: You run to the armory
  - type: note
    content: Hebrew to the House of the Forest; see 1 Kgs 7:2-5.
  - type: text
    content: ' for your weapons.'
  '9':
  - type: text
    content: You inspect the breaks in the walls of Jerusalem.
  - type: note
    content: Hebrew the city of David.
  - type: text
    content: You store up water in the lower pool.
