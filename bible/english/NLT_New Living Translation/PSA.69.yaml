document_id: PSA.69
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, to be sung to the tune “Lilies.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Save me, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the floodwaters are up to my neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Deeper and deeper I sink into the mire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t find a foothold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am in deep water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the floods overwhelm me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I am exhausted from crying for help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my throat is parched.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eyes are swollen with weeping,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting for my God to help me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those who hate me without cause
- type: usfm
  marker: q2
  children:
  - type: text
    text: outnumber the hairs on my head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many enemies try to destroy me with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: demanding that I give back what I didn’t steal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O God, you know how foolish I am;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sins cannot be hidden from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t let those who trust in you be ashamed because of me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let me cause them to be humiliated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For I endure insults for your sake;
- type: usfm
  marker: q2
  children:
  - type: text
    text: humiliation is written all over my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even my own brothers pretend they don’t know me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they treat me like a stranger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Passion for your house has consumed me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the insults of those who insult you have fallen on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When I weep and fast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they scoff at me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When I dress in burlap to show sorrow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they make fun of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I am the favorite topic of town gossip,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the drunks sing about me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I keep praying to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: hoping this time you will show me favor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In your unfailing love, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: answer my prayer with your sure salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rescue me from the mud;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let me sink any deeper!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me from those who hate me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pull me from these deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Don’t let the floods overwhelm me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the deep waters swallow me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the pit of death devour me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Answer my prayers, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your unfailing love is wonderful.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take care of me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your mercy is so plentiful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t hide from your servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: answer me quickly, for I am in deep trouble!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Come and redeem me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: free me from my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You know of my shame, scorn, and disgrace.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You see all that my enemies are doing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Their insults have broken my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am in despair.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If only one person would show some pity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if only one would turn and comfort me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But instead, they give me poison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gall.
    marker-yv: yv-n
  - type: text
    text: ' for food;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they offer me sour wine for my thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Let the bountiful table set before them become a snare
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their prosperity become a trap.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Let their bountiful table set before them become a snare, / a trap that makes them think all is well. / Let their blessings cause them to stumble, / and let them get what they deserve. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 11:9.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Let their eyes go blind so they cannot see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make their bodies shake continually.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and let their backs be bent forever. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 11:10.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pour out your fury on them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: consume them with your burning anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Let their homes become desolate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their tents be deserted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: To the one you have punished, they add insult to injury;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they add to the pain of those you have hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pile their sins up high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t let them go free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Erase their names from the Book of Life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let them be counted among the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I am suffering and in pain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rescue me, O God, by your saving power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then I will praise God’s name with singing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will honor him with thanksgiving.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For this will please the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' more than sacrificing cattle,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than presenting a bull with its horns and hooves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The humble will see their God at work and be glad.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all who seek God’s help be encouraged.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hears the cries of the needy;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he does not despise his imprisoned people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Praise him, O heaven and earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the seas and all that move in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For God will save Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rebuild the towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His people will live there
- type: usfm
  marker: q2
  children:
  - type: text
    text: and settle in their own land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The descendants of those who obey him will inherit the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who love him will live there in safety.
