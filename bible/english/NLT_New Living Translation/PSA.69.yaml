document_id: PSA.69,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be sung to the tune “Lilies.”'
  - type: text
    content: Save me, O God,
  - type: text
    content: for the floodwaters are up to my neck.
  '10':
  - type: text
    content: When I weep and fast,
  - type: text
    content: they scoff at me.
  '11':
  - type: text
    content: When I dress in burlap to show sorrow,
  - type: text
    content: they make fun of me.
  '12':
  - type: text
    content: I am the favorite topic of town gossip,
  - type: text
    content: and all the drunks sing about me.
  '13':
  - type: text
    content: 'But I keep praying to you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: hoping this time you will show me favor.
  - type: text
    content: In your unfailing love, O God,
  - type: text
    content: answer my prayer with your sure salvation.
  '14':
  - type: text
    content: Rescue me from the mud;
  - type: text
    content: don’t let me sink any deeper!
  - type: text
    content: Save me from those who hate me,
  - type: text
    content: and pull me from these deep waters.
  '15':
  - type: text
    content: Don’t let the floods overwhelm me,
  - type: text
    content: or the deep waters swallow me,
  - type: text
    content: or the pit of death devour me.
  '16':
  - type: text
    content: 'Answer my prayers, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for your unfailing love is wonderful.
  - type: text
    content: Take care of me,
  - type: text
    content: for your mercy is so plentiful.
  '17':
  - type: text
    content: Don’t hide from your servant;
  - type: text
    content: answer me quickly, for I am in deep trouble!
  '18':
  - type: text
    content: Come and redeem me;
  - type: text
    content: free me from my enemies.
  '19':
  - type: text
    content: You know of my shame, scorn, and disgrace.
  - type: text
    content: You see all that my enemies are doing.
  '2':
  - type: text
    content: Deeper and deeper I sink into the mire;
  - type: text
    content: I can’t find a foothold.
  - type: text
    content: I am in deep water,
  - type: text
    content: and the floods overwhelm me.
  '20':
  - type: text
    content: Their insults have broken my heart,
  - type: text
    content: and I am in despair.
  - type: text
    content: If only one person would show some pity;
  - type: text
    content: if only one would turn and comfort me.
  '21':
  - type: text
    content: But instead, they give me poison
  - type: note
    content: Or gall.
  - type: text
    content: ' for food;'
  - type: text
    content: they offer me sour wine for my thirst.
  '22':
  - type: text
    content: Let the bountiful table set before them become a snare
  - type: text
    content: and their prosperity become a trap.
  - type: note
    content: Greek version reads Let their bountiful table set before them become a snare, / a trap that makes them think all is well. / Let their blessings cause them to stumble, / and let them get what they deserve. Compare Rom 11:9.
  '23':
  - type: text
    content: Let their eyes go blind so they cannot see,
  - type: text
    content: and make their bodies shake continually.
  - type: note
    content: Greek version reads and let their backs be bent forever. Compare Rom 11:10.
  '24':
  - type: text
    content: Pour out your fury on them;
  - type: text
    content: consume them with your burning anger.
  '25':
  - type: text
    content: Let their homes become desolate
  - type: text
    content: and their tents be deserted.
  '26':
  - type: text
    content: To the one you have punished, they add insult to injury;
  - type: text
    content: they add to the pain of those you have hurt.
  '27':
  - type: text
    content: Pile their sins up high,
  - type: text
    content: and don’t let them go free.
  '28':
  - type: text
    content: Erase their names from the Book of Life;
  - type: text
    content: don’t let them be counted among the righteous.
  '29':
  - type: text
    content: I am suffering and in pain.
  - type: text
    content: Rescue me, O God, by your saving power.
  '3':
  - type: text
    content: I am exhausted from crying for help;
  - type: text
    content: my throat is parched.
  - type: text
    content: My eyes are swollen with weeping,
  - type: text
    content: waiting for my God to help me.
  '30':
  - type: text
    content: Then I will praise God’s name with singing,
  - type: text
    content: and I will honor him with thanksgiving.
  '31':
  - type: text
    content: 'For this will please the '
  - type: text
    content: Lord
  - type: text
    content: ' more than sacrificing cattle,'
  - type: text
    content: more than presenting a bull with its horns and hooves.
  '32':
  - type: text
    content: The humble will see their God at work and be glad.
  - type: text
    content: Let all who seek God’s help be encouraged.
  '33':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' hears the cries of the needy;'
  - type: text
    content: he does not despise his imprisoned people.
  '34':
  - type: text
    content: Praise him, O heaven and earth,
  - type: text
    content: the seas and all that move in them.
  '35':
  - type: text
    content: For God will save Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: and rebuild the towns of Judah.
  - type: text
    content: His people will live there
  - type: text
    content: and settle in their own land.
  '36':
  - type: text
    content: The descendants of those who obey him will inherit the land,
  - type: text
    content: and those who love him will live there in safety.
  '4':
  - type: text
    content: Those who hate me without cause
  - type: text
    content: outnumber the hairs on my head.
  - type: text
    content: Many enemies try to destroy me with lies,
  - type: text
    content: demanding that I give back what I didn’t steal.
  '5':
  - type: text
    content: O God, you know how foolish I am;
  - type: text
    content: my sins cannot be hidden from you.
  '6':
  - type: text
    content: Don’t let those who trust in you be ashamed because of me,
  - type: text
    content: 'O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: Don’t let me cause them to be humiliated,
  - type: text
    content: O God of Israel.
  '7':
  - type: text
    content: For I endure insults for your sake;
  - type: text
    content: humiliation is written all over my face.
  '8':
  - type: text
    content: Even my own brothers pretend they don’t know me;
  - type: text
    content: they treat me like a stranger.
  '9':
  - type: text
    content: Passion for your house has consumed me,
  - type: text
    content: and the insults of those who insult you have fallen on me.
