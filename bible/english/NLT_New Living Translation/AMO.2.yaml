document_id: AMO.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Moab have sinned again and again,
  - type: note
    content: Hebrew have committed three sins, even four; also in 2:4, 6.
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They desecrated the bones of Edom’s king,
  - type: text
    content: burning them to ashes.
  '10':
  - type: text
    content: It was I who rescued you from Egypt
  - type: text
    content: and led you through the desert for forty years,
  - type: text
    content: so you could possess the land of the Amorites.
  '11':
  - type: text
    content: I chose some of your sons to be prophets
  - type: text
    content: and others to be Nazirites.
  - type: text
    content: Can you deny this, my people of Israel?”
  - type: text
    content: 'asks the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “But you caused the Nazirites to sin by making them drink wine,
  - type: text
    content: and you commanded the prophets, ‘Shut up!’
  '13':
  - type: text
    content: “So I will make you groan
  - type: text
    content: like a wagon loaded down with sheaves of grain.
  '14':
  - type: text
    content: Your fastest runners will not get away.
  - type: text
    content: The strongest among you will become weak.
  - type: text
    content: Even mighty warriors will be unable to save themselves.
  '15':
  - type: text
    content: The archers will not stand their ground.
  - type: text
    content: The swiftest runners won’t be fast enough to escape.
  - type: text
    content: Even those riding horses won’t be able to save themselves.
  '16':
  - type: text
    content: On that day the most courageous of your fighting men
  - type: text
    content: will drop their weapons and run for their lives,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: So I will send down fire on the land of Moab,
  - type: text
    content: and all the fortresses in Kerioth will be destroyed.
  - type: text
    content: The people will fall in the noise of battle,
  - type: text
    content: as the warriors shout and the ram’s horn sounds.
  '3':
  - type: text
    content: And I will destroy their king
  - type: text
    content: and slaughter all their princes,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: God’s Judgment on Judah and Israel
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Judah have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: 'They have rejected the instruction of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: refusing to obey his decrees.
  - type: text
    content: They have been led astray by the same lies
  - type: text
    content: that deceived their ancestors.
  '5':
  - type: text
    content: So I will send down fire on Judah,
  - type: text
    content: and all the fortresses of Jerusalem will be destroyed.”
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Israel have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They sell honorable people for silver
  - type: text
    content: and poor people for a pair of sandals.
  '7':
  - type: text
    content: They trample helpless people in the dust
  - type: text
    content: and shove the oppressed out of the way.
  - type: text
    content: Both father and son sleep with the same woman,
  - type: text
    content: corrupting my holy name.
  '8':
  - type: text
    content: At their religious festivals,
  - type: text
    content: they lounge in clothing their debtors put up as security.
  - type: text
    content: In the house of their gods,
  - type: note
    content: Or their God.
  - type: text
    content: they drink wine bought with unjust fines.
  '9':
  - type: text
    content: “But as my people watched,
  - type: text
    content: I destroyed the Amorites,
  - type: text
    content: though they were as tall as cedars
  - type: text
    content: and as strong as oaks.
  - type: text
    content: I destroyed the fruit on their branches
  - type: text
    content: and dug out their roots.
