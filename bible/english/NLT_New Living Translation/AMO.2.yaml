document_id: AMO.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Moab have sinned again and again,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'have committed three sins, even four; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:4, 6.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They desecrated the bones of Edom’s king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning them to ashes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: It was I who rescued you from Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led you through the desert for forty years,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you could possess the land of the Amorites.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I chose some of your sons to be prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and others to be Nazirites.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you deny this, my people of Israel?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “But you caused the Nazirites to sin by making them drink wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you commanded the prophets, ‘Shut up!’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “So I will make you groan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a wagon loaded down with sheaves of grain.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Your fastest runners will not get away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The strongest among you will become weak.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even mighty warriors will be unable to save themselves.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The archers will not stand their ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The swiftest runners won’t be fast enough to escape.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even those riding horses won’t be able to save themselves.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On that day the most courageous of your fighting men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will drop their weapons and run for their lives,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So I will send down fire on the land of Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the fortresses in Kerioth will be destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people will fall in the noise of battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the warriors shout and the ram’s horn sounds.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And I will destroy their king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and slaughter all their princes,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Judgment on Judah and Israel
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Judah have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have rejected the instruction of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refusing to obey his decrees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have been led astray by the same lies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that deceived their ancestors.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So I will send down fire on Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the fortresses of Jerusalem will be destroyed.”
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Israel have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sell honorable people for silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and poor people for a pair of sandals.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They trample helpless people in the dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shove the oppressed out of the way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both father and son sleep with the same woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: corrupting my holy name.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: At their religious festivals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lounge in clothing their debtors put up as security.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the house of their gods,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: their God.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they drink wine bought with unjust fines.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “But as my people watched,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I destroyed the Amorites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though they were as tall as cedars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as strong as oaks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I destroyed the fruit on their branches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dug out their roots.
