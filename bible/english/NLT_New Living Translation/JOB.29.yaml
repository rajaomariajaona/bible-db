document_id: JOB.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Speaks of His Former Blessings
  - type: text
    content: 'Job continued speaking:'
  '10':
  - type: text
    content: The highest officials of the city stood quietly,
  - type: text
    content: holding their tongues in respect.
  '11':
  - type: text
    content: “All who heard me praised me.
  - type: text
    content: All who saw me spoke well of me.
  '12':
  - type: text
    content: For I assisted the poor in their need
  - type: text
    content: and the orphans who required help.
  '13':
  - type: text
    content: I helped those without hope, and they blessed me.
  - type: text
    content: And I caused the widows’ hearts to sing for joy.
  '14':
  - type: text
    content: Everything I did was honest.
  - type: text
    content: Righteousness covered me like a robe,
  - type: text
    content: and I wore justice like a turban.
  '15':
  - type: text
    content: I served as eyes for the blind
  - type: text
    content: and feet for the lame.
  '16':
  - type: text
    content: I was a father to the poor
  - type: text
    content: and assisted strangers who needed help.
  '17':
  - type: text
    content: I broke the jaws of godless oppressors
  - type: text
    content: and plucked their victims from their teeth.
  '18':
  - type: text
    content: “I thought, ‘Surely I will die surrounded by my family
  - type: text
    content: after a long, good life.
  - type: note
    content: Hebrew after I have counted my days like sand.
  '19':
  - type: text
    content: For I am like a tree whose roots reach the water,
  - type: text
    content: whose branches are refreshed with the dew.
  '2':
  - type: text
    content: “I long for the years gone by
  - type: text
    content: when God took care of me,
  '20':
  - type: text
    content: New honors are constantly bestowed on me,
  - type: text
    content: and my strength is continually renewed.’
  '21':
  - type: text
    content: “Everyone listened to my advice.
  - type: text
    content: They were silent as they waited for me to speak.
  '22':
  - type: text
    content: And after I spoke, they had nothing to add,
  - type: text
    content: for my counsel satisfied them.
  '23':
  - type: text
    content: They longed for me to speak as people long for rain.
  - type: text
    content: They drank my words like a refreshing spring rain.
  '24':
  - type: text
    content: When they were discouraged, I smiled at them.
  - type: text
    content: My look of approval was precious to them.
  '25':
  - type: text
    content: Like a chief, I told them what to do.
  - type: text
    content: I lived like a king among his troops
  - type: text
    content: and comforted those who mourned.
  '3':
  - type: text
    content: when he lit up the way before me
  - type: text
    content: and I walked safely through the darkness.
  '4':
  - type: text
    content: When I was in my prime,
  - type: text
    content: God’s friendship was felt in my home.
  '5':
  - type: text
    content: The Almighty was still with me,
  - type: text
    content: and my children were around me.
  '6':
  - type: text
    content: My steps were awash in cream,
  - type: text
    content: and the rocks gushed olive oil for me.
  '7':
  - type: text
    content: “Those were the days when I went to the city gate
  - type: text
    content: and took my place among the honored leaders.
  '8':
  - type: text
    content: The young stepped aside when they saw me,
  - type: text
    content: and even the aged rose in respect at my coming.
  '9':
  - type: text
    content: The princes stood in silence
  - type: text
    content: and put their hands over their mouths.
