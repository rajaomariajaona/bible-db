document_id: JOB.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Speaks of His Former Blessings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job continued speaking:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I long for the years gone by
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God took care of me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: when he lit up the way before me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I walked safely through the darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When I was in my prime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s friendship was felt in my home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Almighty was still with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my children were around me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: My steps were awash in cream,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rocks gushed olive oil for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Those were the days when I went to the city gate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and took my place among the honored leaders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The young stepped aside when they saw me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even the aged rose in respect at my coming.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The princes stood in silence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put their hands over their mouths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The highest officials of the city stood quietly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: holding their tongues in respect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “All who heard me praised me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All who saw me spoke well of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For I assisted the poor in their need
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the orphans who required help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I helped those without hope, and they blessed me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I caused the widows’ hearts to sing for joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Everything I did was honest.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Righteousness covered me like a robe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I wore justice like a turban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I served as eyes for the blind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and feet for the lame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I was a father to the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and assisted strangers who needed help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I broke the jaws of godless oppressors
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plucked their victims from their teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “I thought, ‘Surely I will die surrounded by my family
- type: usfm
  marker: q2
  children:
  - type: text
    text: after a long, good life.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: after I have counted my days like sand.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For I am like a tree whose roots reach the water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose branches are refreshed with the dew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: New honors are constantly bestowed on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my strength is continually renewed.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Everyone listened to my advice.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They were silent as they waited for me to speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And after I spoke, they had nothing to add,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my counsel satisfied them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They longed for me to speak as people long for rain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They drank my words like a refreshing spring rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When they were discouraged, I smiled at them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My look of approval was precious to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Like a chief, I told them what to do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I lived like a king among his troops
- type: usfm
  marker: q2
  children:
  - type: text
    text: and comforted those who mourned.
