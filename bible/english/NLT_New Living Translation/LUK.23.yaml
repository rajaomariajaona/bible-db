document_id: LUK.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Trial before Pilate
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the entire council took Jesus to Pilate, the Roman governor. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They began to state their case: “This man has been leading our people astray by telling them not to pay their taxes to the Roman government and by claiming he is the Messiah, a king.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So Pilate asked him, “Are you the king of the Jews?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pilate turned to the leading priests and to the crowd and said, “I find nothing wrong with this man!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then they became insistent. “But he is causing riots by his teaching wherever he goes—all over Judea, from Galilee to Jerusalem!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Oh, is he a Galilean?” Pilate asked. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When they said that he was, Pilate sent him to Herod Antipas, because Galilee was under Herod’s jurisdiction, and Herod happened to be in Jerusalem at the time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Herod was delighted at the opportunity to see Jesus, because he had heard about him and had been hoping for a long time to see him perform a miracle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He asked Jesus question after question, but Jesus refused to answer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Meanwhile, the leading priests and the teachers of religious law stood there shouting their accusations. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Herod and his soldiers began mocking and ridiculing Jesus. Finally, they put a royal robe on him and sent him back to Pilate. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: (Herod and Pilate, who had been enemies before, became friends that day.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Pilate called together the leading priests and other religious leaders, along with the people, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and he announced his verdict. “You brought this man to me, accusing him of leading a revolt. I have examined him thoroughly on this point in your presence and find him innocent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Herod came to the same conclusion and sent him back to us. Nothing this man has done calls for the death penalty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So I will have him flogged, and then I will release him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add verse 17, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Now it was necessary for him to release one prisoner to them during the Passover celebration. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Matt 27:15; Mark 15:6; John 18:39.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then a mighty roar rose from the crowd, and with one voice they shouted, “Kill him, and release Barabbas to us!” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(Barabbas was in prison for taking part in an insurrection in Jerusalem against the government, and for murder.) '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate argued with them, because he wanted to release Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But they kept shouting, “Crucify him! Crucify him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For the third time he demanded, “Why? What crime has he committed? I have found no reason to sentence him to death. So I will have him flogged, and then I will release him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the mob shouted louder and louder, demanding that Jesus be crucified, and their voices prevailed. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Pilate sentenced Jesus to die as they demanded. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: As they had requested, he released Barabbas, the man in prison for insurrection and murder. But he turned Jesus over to them to do as they wished.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: As they led Jesus away, a man named Simon, who was from Cyrene,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:26 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Cyrene '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was a city in northern Africa.
    marker-yv: yv-n
  - type: text
    text: ' happened to be coming in from the countryside. The soldiers seized him and put the cross on him and made him carry it behind Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A large crowd trailed behind, including many grief-stricken women. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But Jesus turned and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughters of Jerusalem, don’t weep for me, but weep for yourselves and for your children.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the days are coming when they will say, ‘Fortunate indeed are the women who are childless, the wombs that have not borne a child and the breasts that have never nursed.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: People will beg the mountains, ‘Fall on us,’ and plead with the hills, ‘Bury us.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hos 10:8.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if these things are done when the tree is green, what will happen when it is dry?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: If these things are done to me, the living tree, what will happen to you, the dry tree?
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Two others, both criminals, were led out to be executed with him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When they came to a place called The Skull,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sometimes rendered '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Calvary, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: which comes from the Latin word for “skull.”
    marker-yv: yv-n
  - type: text
    text: ' they nailed him to the cross. And the criminals were also crucified—one on his right and one on his left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, forgive them, for they don’t know what they are doing.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:34a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This sentence is not included in many ancient manuscripts.
    marker-yv: yv-n
  - type: text
    text: ' And the soldiers gambled for his clothes by throwing dice.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:34b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'by casting lots. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Ps 22:18.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The crowd watched and the leaders scoffed. “He saved others,” they said, “let him save himself if he is really God’s Messiah, the Chosen One.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The soldiers mocked him, too, by offering him a drink of sour wine. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'They called out to him, “If you are the King of the Jews, save yourself!” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A sign was fastened above him with these words: “This is the King of the Jews.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: One of the criminals hanging beside him scoffed, “So you’re the Messiah, are you? Prove it by saving yourself—and us, too, while you’re at it!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But the other criminal protested, “Don’t you fear God even when you have been sentenced to die? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'We deserve to die for our crimes, but this man hasn’t done anything wrong.” '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Then he said, “Jesus, remember me when you come into your Kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I assure you, today you will be with me in paradise.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'By this time it was about noon, and darkness fell across the whole land until three o’clock. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The light from the sun was gone. And suddenly, the curtain in the sanctuary of the Temple was torn down the middle. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then Jesus shouted, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, I entrust my spirit into your hands!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 31:5.
    marker-yv: yv-n
  - type: text
    text: ' And with those words he breathed his last.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: When the Roman officer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:47a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the centurion.
    marker-yv: yv-n
  - type: text
    text: ' overseeing the execution saw what had happened, he worshiped God and said, “Surely this man was innocent.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:47b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: righteous.
    marker-yv: yv-n
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: And when all the crowd that came to see the crucifixion saw what had happened, they went home in deep sorrow.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: went home beating their breasts.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: But Jesus’ friends, including the women who had followed him from Galilee, stood at a distance watching.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Burial of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Now there was a good and righteous man named Joseph. He was a member of the Jewish high council, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'but he had not agreed with the decision and actions of the other religious leaders. He was from the town of Arimathea in Judea, and he was waiting for the Kingdom of God to come. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'He went to Pilate and asked for Jesus’ body. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Then he took the body down from the cross and wrapped it in a long sheet of linen cloth and laid it in a new tomb that had been carved out of rock. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: This was done late on Friday afternoon, the day of preparation,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: It was the day of preparation.
    marker-yv: yv-n
  - type: text
    text: ' as the Sabbath was about to begin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
