document_id: LUK.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Trial before Pilate
  - type: text
    content: 'Then the entire council took Jesus to Pilate, the Roman governor. '
  '10':
  - type: text
    content: 'Meanwhile, the leading priests and the teachers of religious law stood there shouting their accusations. '
  '11':
  - type: text
    content: 'Then Herod and his soldiers began mocking and ridiculing Jesus. Finally, they put a royal robe on him and sent him back to Pilate. '
  '12':
  - type: text
    content: (Herod and Pilate, who had been enemies before, became friends that day.)
  '13':
  - type: text
    content: 'Then Pilate called together the leading priests and other religious leaders, along with the people, '
  '14':
  - type: text
    content: 'and he announced his verdict. “You brought this man to me, accusing him of leading a revolt. I have examined him thoroughly on this point in your presence and find him innocent. '
  '15':
  - type: text
    content: 'Herod came to the same conclusion and sent him back to us. Nothing this man has done calls for the death penalty. '
  '16':
  - type: text
    content: So I will have him flogged, and then I will release him.”
  - type: note
    content: Some manuscripts add verse 17, Now it was necessary for him to release one prisoner to them during the Passover celebration. Compare Matt 27:15; Mark 15:6; John 18:39.
  '18':
  - type: text
    content: 'Then a mighty roar rose from the crowd, and with one voice they shouted, “Kill him, and release Barabbas to us!” '
  '19':
  - type: text
    content: '(Barabbas was in prison for taking part in an insurrection in Jerusalem against the government, and for murder.) '
  '2':
  - type: text
    content: 'They began to state their case: “This man has been leading our people astray by telling them not to pay their taxes to the Roman government and by claiming he is the Messiah, a king.”'
  '20':
  - type: text
    content: 'Pilate argued with them, because he wanted to release Jesus. '
  '21':
  - type: text
    content: But they kept shouting, “Crucify him! Crucify him!”
  '22':
  - type: text
    content: For the third time he demanded, “Why? What crime has he committed? I have found no reason to sentence him to death. So I will have him flogged, and then I will release him.”
  '23':
  - type: text
    content: 'But the mob shouted louder and louder, demanding that Jesus be crucified, and their voices prevailed. '
  '24':
  - type: text
    content: 'So Pilate sentenced Jesus to die as they demanded. '
  '25':
  - type: text
    content: As they had requested, he released Barabbas, the man in prison for insurrection and murder. But he turned Jesus over to them to do as they wished.
  - type: heading
    content: The Crucifixion
  '26':
  - type: text
    content: As they led Jesus away, a man named Simon, who was from Cyrene,
  - type: note
    content: Cyrene was a city in northern Africa.
  - type: text
    content: ' happened to be coming in from the countryside. The soldiers seized him and put the cross on him and made him carry it behind Jesus. '
  '27':
  - type: text
    content: 'A large crowd trailed behind, including many grief-stricken women. '
  '28':
  - type: text
    content: 'But Jesus turned and said to them, '
  - type: text
    content: “Daughters of Jerusalem, don’t weep for me, but weep for yourselves and for your children.
  - type: text
    content: ' '
  '29':
  - type: text
    content: For the days are coming when they will say, ‘Fortunate indeed are the women who are childless, the wombs that have not borne a child and the breasts that have never nursed.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: So Pilate asked him, “Are you the king of the Jews?”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You have said it.”
  '30':
  - type: text
    content: People will beg the mountains, ‘Fall on us,’ and plead with the hills, ‘Bury us.’
  - type: note
    content: Hos 10:8.
  - type: text
    content: ' '
  '31':
  - type: text
    content: For if these things are done when the tree is green, what will happen when it is dry?
  - type: note
    content: Or If these things are done to me, the living tree, what will happen to you, the dry tree?
  - type: text
    content: ”
  '32':
  - type: text
    content: 'Two others, both criminals, were led out to be executed with him. '
  '33':
  - type: text
    content: When they came to a place called The Skull,
  - type: note
    content: Sometimes rendered Calvary, which comes from the Latin word for “skull.”
  - type: text
    content: ' they nailed him to the cross. And the criminals were also crucified—one on his right and one on his left.'
  '34':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Father, forgive them, for they don’t know what they are doing.”
  - type: note
    content: This sentence is not included in many ancient manuscripts.
  - type: text
    content: ' And the soldiers gambled for his clothes by throwing dice.'
  - type: note
    content: Greek by casting lots. See Ps 22:18.
  '35':
  - type: text
    content: 'The crowd watched and the leaders scoffed. “He saved others,” they said, “let him save himself if he is really God’s Messiah, the Chosen One.” '
  '36':
  - type: text
    content: 'The soldiers mocked him, too, by offering him a drink of sour wine. '
  '37':
  - type: text
    content: 'They called out to him, “If you are the King of the Jews, save yourself!” '
  '38':
  - type: text
    content: 'A sign was fastened above him with these words: “This is the King of the Jews.”'
  '39':
  - type: text
    content: One of the criminals hanging beside him scoffed, “So you’re the Messiah, are you? Prove it by saving yourself—and us, too, while you’re at it!”
  '4':
  - type: text
    content: Pilate turned to the leading priests and to the crowd and said, “I find nothing wrong with this man!”
  '40':
  - type: text
    content: 'But the other criminal protested, “Don’t you fear God even when you have been sentenced to die? '
  '41':
  - type: text
    content: 'We deserve to die for our crimes, but this man hasn’t done anything wrong.” '
  '42':
  - type: text
    content: Then he said, “Jesus, remember me when you come into your Kingdom.”
  '43':
  - type: text
    content: 'And Jesus replied, '
  - type: text
    content: “I assure you, today you will be with me in paradise.”
  - type: heading
    content: The Death of Jesus
  '44':
  - type: text
    content: 'By this time it was about noon, and darkness fell across the whole land until three o’clock. '
  '45':
  - type: text
    content: 'The light from the sun was gone. And suddenly, the curtain in the sanctuary of the Temple was torn down the middle. '
  '46':
  - type: text
    content: 'Then Jesus shouted, '
  - type: text
    content: “Father, I entrust my spirit into your hands!”
  - type: note
    content: Ps 31:5.
  - type: text
    content: ' And with those words he breathed his last.'
  '47':
  - type: text
    content: When the Roman officer
  - type: note
    content: Greek the centurion.
  - type: text
    content: ' overseeing the execution saw what had happened, he worshiped God and said, “Surely this man was innocent.'
  - type: note
    content: Or righteous.
  - type: text
    content: '” '
  '48':
  - type: text
    content: And when all the crowd that came to see the crucifixion saw what had happened, they went home in deep sorrow.
  - type: note
    content: Greek went home beating their breasts.
  - type: text
    content: ' '
  '49':
  - type: text
    content: But Jesus’ friends, including the women who had followed him from Galilee, stood at a distance watching.
  - type: heading
    content: The Burial of Jesus
  '5':
  - type: text
    content: Then they became insistent. “But he is causing riots by his teaching wherever he goes—all over Judea, from Galilee to Jerusalem!”
  '50':
  - type: text
    content: 'Now there was a good and righteous man named Joseph. He was a member of the Jewish high council, '
  '51':
  - type: text
    content: 'but he had not agreed with the decision and actions of the other religious leaders. He was from the town of Arimathea in Judea, and he was waiting for the Kingdom of God to come. '
  '52':
  - type: text
    content: 'He went to Pilate and asked for Jesus’ body. '
  '53':
  - type: text
    content: 'Then he took the body down from the cross and wrapped it in a long sheet of linen cloth and laid it in a new tomb that had been carved out of rock. '
  '54':
  - type: text
    content: This was done late on Friday afternoon, the day of preparation,
  - type: note
    content: Greek It was the day of preparation.
  - type: text
    content: ' as the Sabbath was about to begin.'
  '55':
  - type: text
    content: 'As his body was taken away, the women from Galilee followed and saw the tomb where his body was placed. '
  '56':
  - type: text
    content: Then they went home and prepared spices and ointments to anoint his body. But by the time they were finished the Sabbath had begun, so they rested as required by the law.
  '6':
  - type: text
    content: '“Oh, is he a Galilean?” Pilate asked. '
  '7':
  - type: text
    content: When they said that he was, Pilate sent him to Herod Antipas, because Galilee was under Herod’s jurisdiction, and Herod happened to be in Jerusalem at the time.
  '8':
  - type: text
    content: 'Herod was delighted at the opportunity to see Jesus, because he had heard about him and had been hoping for a long time to see him perform a miracle. '
  '9':
  - type: text
    content: 'He asked Jesus question after question, but Jesus refused to answer. '
