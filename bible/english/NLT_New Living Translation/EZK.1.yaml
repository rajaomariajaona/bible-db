document_id: EZK.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of Living Beings
  - type: text
    content: On July 31
  - type: note
    content: Hebrew On the fifth day of the fourth month, of the ancient Hebrew lunar calendar. A number of dates in Ezekiel can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This event occurred on July 31, 593 b.c.
  - type: text
    content: ' of my thirtieth year,'
  - type: note
    content: Or in the thirtieth year.
  - type: text
    content: ' while I was with the Judean exiles beside the Kebar River in Babylon, the heavens were opened and I saw visions of God. '
  '10':
  - type: text
    content: 'Each had a human face in the front, the face of a lion on the right side, the face of an ox on the left side, and the face of an eagle at the back. '
  '11':
  - type: text
    content: 'Each had two pairs of outstretched wings—one pair stretched out to touch the wings of the living beings on either side of it, and the other pair covered its body. '
  '12':
  - type: text
    content: They went in whatever direction the spirit chose, and they moved straight forward in any direction without turning around.
  '13':
  - type: text
    content: 'The living beings looked like bright coals of fire or brilliant torches, and lightning seemed to flash back and forth among them. '
  '14':
  - type: text
    content: And the living beings darted to and fro like flashes of lightning.
  '15':
  - type: text
    content: 'As I looked at these beings, I saw four wheels touching the ground beside them, one wheel belonging to each. '
  '16':
  - type: text
    content: 'The wheels sparkled as if made of beryl. All four wheels looked alike and were made the same; each wheel had a second wheel turning crosswise within it. '
  '17':
  - type: text
    content: 'The beings could move in any of the four directions they faced, without turning as they moved. '
  '18':
  - type: text
    content: The rims of the four wheels were tall and frightening, and they were covered with eyes all around.
  '19':
  - type: text
    content: 'When the living beings moved, the wheels moved with them. When they flew upward, the wheels went up, too. '
  '2':
  - type: text
    content: 'This happened during the fifth year of King Jehoiachin’s captivity. '
  '20':
  - type: text
    content: 'The spirit of the living beings was in the wheels. So wherever the spirit went, the wheels and the living beings also went. '
  '21':
  - type: text
    content: When the beings moved, the wheels moved. When the beings stopped, the wheels stopped. When the beings flew upward, the wheels rose up, for the spirit of the living beings was in the wheels.
  '22':
  - type: text
    content: 'Spread out above them was a surface like the sky, glittering like crystal. '
  '23':
  - type: text
    content: 'Beneath this surface the wings of each living being stretched out to touch the others’ wings, and each had two wings covering its body. '
  '24':
  - type: text
    content: As they flew, their wings sounded to me like waves crashing against the shore or like the voice of the Almighty
  - type: note
    content: Hebrew Shaddai.
  - type: text
    content: ' or like the shouting of a mighty army. When they stopped, they let down their wings. '
  '25':
  - type: text
    content: As they stood with wings lowered, a voice spoke from beyond the crystal surface above them.
  '26':
  - type: text
    content: 'Above this surface was something that looked like a throne made of blue lapis lazuli. And on this throne high above was a figure whose appearance resembled a man. '
  '27':
  - type: text
    content: 'From what appeared to be his waist up, he looked like gleaming amber, flickering like a fire. And from his waist down, he looked like a burning flame, shining with splendor. '
  '28':
  - type: text
    content: 'All around him was a glowing halo, like a rainbow shining in the clouds on a rainy day. This is what the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' looked like to me. When I saw it, I fell face down on the ground, and I heard someone’s voice speaking to me.'
  '3':
  - type: text
    content: '(The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Ezekiel son of Buzi, a priest, beside the Kebar River in the land of the Babylonians,'
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' and he felt the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' take hold of him.)'
  '4':
  - type: text
    content: As I looked, I saw a great storm coming from the north, driving before it a huge cloud that flashed with lightning and shone with brilliant light. There was fire inside the cloud, and in the middle of the fire glowed something like gleaming amber.
  - type: note
    content: Or like burnished metal; also in 1:27.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'From the center of the cloud came four living beings that looked human, '
  '6':
  - type: text
    content: 'except that each had four faces and four wings. '
  '7':
  - type: text
    content: 'Their legs were straight, and their feet had hooves like those of a calf and shone like burnished bronze. '
  '8':
  - type: text
    content: 'Under each of their four wings I could see human hands. So each of the four beings had four faces and four wings. '
  '9':
  - type: text
    content: The wings of each living being touched the wings of the beings beside it. Each one moved straight forward in any direction without turning around.
