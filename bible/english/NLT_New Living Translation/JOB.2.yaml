document_id: JOB.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Second Test
  - type: text
    content: One day the members of the heavenly court
  - type: note
    content: Hebrew the sons of God.
  - type: text
    content: ' came again to present themselves before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the Accuser, Satan,'
  - type: note
    content: Hebrew and the satan; similarly throughout this chapter.
  - type: text
    content: ' came with them. '
  '10':
  - type: text
    content: But Job replied, “You talk like a foolish woman. Should we accept only good things from the hand of God and never anything bad?” So in all this, Job said nothing wrong.
  - type: heading
    content: Job’s Three Friends Share His Anguish
  '11':
  - type: text
    content: 'When three of Job’s friends heard of the tragedy he had suffered, they got together and traveled from their homes to comfort and console him. Their names were Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite. '
  '12':
  - type: text
    content: 'When they saw Job from a distance, they scarcely recognized him. Wailing loudly, they tore their robes and threw dust into the air over their heads to show their grief. '
  '13':
  - type: text
    content: Then they sat on the ground with him for seven days and nights. No one said a word to Job, for they saw that his suffering was too great for words.
  '2':
  - type: text
    content: '“Where have you come from?” the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Satan.'
  - type: text
    content: 'Satan answered the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have been patrolling the earth, watching everything that’s going on.”'
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' asked Satan, “Have you noticed my servant Job? He is the finest man in all the earth. He is blameless—a man of complete integrity. He fears God and stays away from evil. And he has maintained his integrity, even though you urged me to harm him without cause.”'
  '4':
  - type: text
    content: 'Satan replied to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Skin for skin! A man will give up everything he has to save his life. '
  '5':
  - type: text
    content: But reach out and take away his health, and he will surely curse you to your face!”
  '6':
  - type: text
    content: '“All right, do with him as you please,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan. “But spare his life.” '
  '7':
  - type: text
    content: 'So Satan left the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence, and he struck Job with terrible boils from head to foot.
  '8':
  - type: text
    content: 'Job scraped his skin with a piece of broken pottery as he sat among the ashes. '
  '9':
  - type: text
    content: His wife said to him, “Are you still trying to maintain your integrity? Curse God and die.”
