document_id: 1SA.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Saul
  - type: text
    content: 'Now the Philistines attacked Israel, and the men of Israel fled before them. Many were slaughtered on the slopes of Mount Gilboa. '
  '10':
  - type: text
    content: They placed his armor in the temple of the Ashtoreths, and they fastened his body to the wall of the city of Beth-shan.
  '11':
  - type: text
    content: 'But when the people of Jabesh-gilead heard what the Philistines had done to Saul, '
  '12':
  - type: text
    content: 'all their mighty warriors traveled through the night to Beth-shan and took the bodies of Saul and his sons down from the wall. They brought them to Jabesh, where they burned the bodies. '
  '13':
  - type: text
    content: Then they took their bones and buried them beneath the tamarisk tree at Jabesh, and they fasted for seven days.
  '2':
  - type: text
    content: 'The Philistines closed in on Saul and his sons, and they killed three of his sons—Jonathan, Abinadab, and Malkishua. '
  '3':
  - type: text
    content: The fighting grew very fierce around Saul, and the Philistine archers caught up with him and wounded him severely.
  '4':
  - type: text
    content: Saul groaned to his armor bearer, “Take your sword and kill me before these pagan Philistines come to run me through and taunt and torture me.”
  - type: text
    content: 'But his armor bearer was afraid and would not do it. So Saul took his own sword and fell on it. '
  '5':
  - type: text
    content: 'When his armor bearer realized that Saul was dead, he fell on his own sword and died beside the king. '
  '6':
  - type: text
    content: So Saul, his three sons, his armor bearer, and his troops all died together that same day.
  '7':
  - type: text
    content: When the Israelites on the other side of the Jezreel Valley and beyond the Jordan saw that the Israelite army had fled and that Saul and his sons were dead, they abandoned their towns and fled. So the Philistines moved in and occupied their towns.
  '8':
  - type: text
    content: 'The next day, when the Philistines went out to strip the dead, they found the bodies of Saul and his three sons on Mount Gilboa. '
  '9':
  - type: text
    content: 'So they cut off Saul’s head and stripped off his armor. Then they proclaimed the good news of Saul’s death in their pagan temple and to the people throughout the land of Philistia. '
