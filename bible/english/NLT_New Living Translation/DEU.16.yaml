document_id: DEU.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Passover and the Festival of Unleavened Bread
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“In honor of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, celebrate the Passover each year in the early spring, in the month of Abib,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Observe the month of Abib, and keep the Passover unto the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' your God. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abib, the first month of the ancient Hebrew lunar calendar, usually occurs within the months of March and April.
    marker-yv: yv-n
  - type: text
    text: ' for that was the month in which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God brought you out of Egypt by night. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Your Passover sacrifice may be from either the flock or the herd, and it must be sacrificed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God at the designated place of worship—the place he chooses for his name to be honored. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eat it with bread made without yeast. For seven days the bread you eat must be made without yeast, as when you escaped from Egypt in such a hurry. Eat this bread—the bread of suffering—so that as long as you live you will remember the day you departed from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let no yeast be found in any house throughout your land for those seven days. And when you sacrifice the Passover lamb on the evening of the first day, do not let any of the meat remain until the next morning.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“You may not sacrifice the Passover in just any of the towns that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You must offer it only at the designated place of worship—the place the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God chooses for his name to be honored. Sacrifice it there in the evening as the sun goes down on the anniversary of your exodus from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Roast the lamb and eat it in the place the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God chooses. Then you may go back to your tents the next morning. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the next six days you may not eat any bread made with yeast. On the seventh day proclaim another holy day in honor of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, and no work may be done on that day.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Harvest
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Count off seven weeks from when you first begin to cut the grain at the time of harvest. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then celebrate the Festival of Harvest
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Weeks; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:16. This was later called the Festival of Pentecost (see Acts 2:1). It is celebrated today as Shavuot (or Shabuoth).
    marker-yv: yv-n
  - type: text
    text: ' to honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. Bring him a voluntary offering in proportion to the blessings you have received from him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is a time to celebrate before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God at the designated place of worship he will choose for his name to be honored. Celebrate with your sons and daughters, your male and female servants, the Levites from your towns, and the foreigners, orphans, and widows who live among you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Remember that you were once slaves in Egypt, so be careful to obey all these decrees.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Shelters
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “You must observe the Festival of Shelters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Booths, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Tabernacles; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:16. This was earlier called the Festival of the Final Harvest or Festival of Ingathering (see Exod 23:16b). It is celebrated today as Sukkot (or Succoth).
    marker-yv: yv-n
  - type: text
    text: ' for seven days at the end of the harvest season, after the grain has been threshed and the grapes have been pressed. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'This festival will be a happy time of celebrating with your sons and daughters, your male and female servants, and the Levites, foreigners, orphans, and widows from your towns. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For seven days you must celebrate this festival to honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God at the place he chooses, for it is he who blesses you with bountiful harvests and gives you success in all your work. This festival will be a time of great joy for all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Each year every man in Israel must celebrate these three festivals: the Festival of Unleavened Bread, the Festival of Harvest, and the Festival of Shelters. On each of these occasions, all men must appear before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God at the place he chooses, but they must not appear before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' without a gift for him. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All must give as they are able, according to the blessings given to them by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Justice for the People
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Appoint judges and officials for yourselves from each of your tribes in all the towns the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you. They must judge the people fairly. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You must never twist justice or show partiality. Never accept a bribe, for bribes blind the eyes of the wise and corrupt the decisions of the godly. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Let true justice prevail, so you may live and occupy the land that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You must never set up a wooden Asherah pole beside the altar you build for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And never set up sacred pillars for worship, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God hates them.'
