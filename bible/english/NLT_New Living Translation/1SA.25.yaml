document_id: 1SA.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Samuel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now Samuel died, and all Israel gathered for his funeral. They buried him at his house in Ramah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nabal Angers David
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then David moved down to the wilderness of Maon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 25:2); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paran.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Who is this fellow David?” Nabal sneered to the young men. “Who does this son of Jesse think he is? There are lots of servants these days who run away from their masters. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Should I take my bread and my water and my meat that I’ve slaughtered for my shearers and give it to a band of outlaws who come from who knows where?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David’s young men returned and told him what Nabal had said. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Get your swords!” was David’s reply as he strapped on his own. Then 400 men started off with David, and 200 remained behind to guard their equipment.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, one of Nabal’s servants went to Abigail and told her, “David sent messengers from the wilderness to greet our master, but he screamed insults at them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men have been very good to us, and we never suffered any harm from them. Nothing was stolen from us the whole time they were with us. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In fact, day and night they were like a wall of protection to us and the sheep. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You need to know this and figure out what to do, for there is going to be trouble for our master and his whole family. He’s so ill-tempered that no one can even talk to him!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abigail wasted no time. She quickly gathered 200 loaves of bread, two wineskins full of wine, five sheep that had been slaughtered, nearly a bushel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 seahs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[36.5 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of roasted grain, 100 clusters of raisins, and 200 fig cakes. She packed them on donkeys '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said to her servants, “Go on ahead. I will follow you shortly.” But she didn’t tell her husband Nabal what she was doing.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There was a wealthy man from Maon who owned property near the town of Carmel. He had 3,000 sheep and 1,000 goats, and it was sheep-shearing time. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As she was riding her donkey into a mountain ravine, she saw David and his men coming toward her. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David had just been saying, “A lot of good it did to help this fellow. We protected his flocks in the wilderness, and nothing he owned was lost or stolen. But he has repaid me evil for good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God strike me and kill me
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: May God strike and kill the enemies of David.
      marker-yv: yv-n
    - type: text
      text: ' if even one man of his household is still alive tomorrow morning!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abigail Intercedes for Nabal
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Abigail saw David, she quickly got off her donkey and bowed low before him. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'She fell at his feet and said, “I accept all blame in this matter, my lord. Please listen to what I have to say. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I know Nabal is a wicked and ill-tempered man; please don’t pay any attention to him. He is a fool, just as his name suggests.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nabal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fool.”
      marker-yv: yv-n
    - type: text
      text: ' But I never even saw the young men you sent.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now, my lord, as surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and you yourself live, since the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has kept you from murdering and taking vengeance into your own hands, let all your enemies and those who try to harm you be as cursed as Nabal is. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And here is a present that I, your servant, have brought to you and your young men. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please forgive me if I have offended you in any way. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will surely reward you with a lasting dynasty, for you are fighting the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s battles. And you have not done wrong throughout your entire life.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Even when you are chased by those who seek to kill you, your life is safe in the care of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, secure in his treasure pouch! But the lives of your enemies will disappear like stones shot from a sling! '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This man’s name was Nabal, and his wife, Abigail, was a sensible and beautiful woman. But Nabal, a descendant of Caleb, was crude and mean in all his dealings.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done all he promised and has made you leader of Israel, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'don’t let this be a blemish on your record. Then your conscience won’t have to bear the staggering burden of needless bloodshed and vengeance. And when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done these great things for you, please remember me, your servant!”'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David replied to Abigail, “Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who has sent you to meet me today! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thank God for your good sense! Bless you for keeping me from murder and from carrying out vengeance with my own hands. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I swear by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who has kept me from hurting you, that if you had not hurried out to meet me, not one of Nabal’s men would still be alive tomorrow morning.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David accepted her present and told her, “Return home in peace. I have heard what you said. We will not kill your husband.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Abigail arrived home, she found that Nabal was throwing a big party and was celebrating like a king. He was very drunk, so she didn’t tell him anything about her meeting with David until dawn the next day. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the morning when Nabal was sober, his wife told him what had happened. As a result he had a stroke,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his heart failed him.
      marker-yv: yv-n
    - type: text
      text: ' and he lay paralyzed on his bed like a stone. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About ten days later, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck him, and he died.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Marries Abigail
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When David heard that Nabal was dead, he said, “Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has avenged the insult I received from Nabal and has kept me from doing it myself. Nabal has received the punishment for his sin.” Then David sent messengers to Abigail to ask her to become his wife.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David heard that Nabal was shearing his sheep, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the messengers arrived at Carmel, they told Abigail, “David has sent us to take you back to marry him.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She bowed low to the ground and responded, “I, your servant, would be happy to marry David. I would even be willing to become a slave, washing the feet of his servants!” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quickly getting ready, she took along five of her servant girls as attendants, mounted her donkey, and went with David’s messengers. And so she became his wife. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David also married Ahinoam from Jezreel, making both of them his wives. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul, meanwhile, had given his daughter Michal, David’s wife, to a man from Gallim named Palti son of Laish.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he sent ten of his young men to Carmel with this message for Nabal: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Peace and prosperity to you, your family, and everything you own! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am told that it is sheep-shearing time. While your shepherds stayed among us near Carmel, we never harmed them, and nothing was ever stolen from them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ask your own men, and they will tell you this is true. So would you be kind to us, since we have come at a time of celebration? Please share any provisions you might have on hand with us and with your friend David.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David’s young men gave this message to Nabal in David’s name, and they waited for a reply.
