document_id: 1SA.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Samuel
  - type: text
    content: Now Samuel died, and all Israel gathered for his funeral. They buried him at his house in Ramah.
  - type: heading
    content: Nabal Angers David
  - type: text
    content: Then David moved down to the wilderness of Maon.
  - type: note
    content: As in Greek version (see also 25:2); Hebrew reads Paran.
  - type: text
    content: ' '
  '10':
  - type: text
    content: '“Who is this fellow David?” Nabal sneered to the young men. “Who does this son of Jesse think he is? There are lots of servants these days who run away from their masters. '
  '11':
  - type: text
    content: Should I take my bread and my water and my meat that I’ve slaughtered for my shearers and give it to a band of outlaws who come from who knows where?”
  '12':
  - type: text
    content: 'So David’s young men returned and told him what Nabal had said. '
  '13':
  - type: text
    content: “Get your swords!” was David’s reply as he strapped on his own. Then 400 men started off with David, and 200 remained behind to guard their equipment.
  '14':
  - type: text
    content: 'Meanwhile, one of Nabal’s servants went to Abigail and told her, “David sent messengers from the wilderness to greet our master, but he screamed insults at them. '
  '15':
  - type: text
    content: 'These men have been very good to us, and we never suffered any harm from them. Nothing was stolen from us the whole time they were with us. '
  '16':
  - type: text
    content: 'In fact, day and night they were like a wall of protection to us and the sheep. '
  '17':
  - type: text
    content: You need to know this and figure out what to do, for there is going to be trouble for our master and his whole family. He’s so ill-tempered that no one can even talk to him!”
  '18':
  - type: text
    content: Abigail wasted no time. She quickly gathered 200 loaves of bread, two wineskins full of wine, five sheep that had been slaughtered, nearly a bushel
  - type: note
    content: Hebrew 5 seahs [36.5 liters].
  - type: text
    content: ' of roasted grain, 100 clusters of raisins, and 200 fig cakes. She packed them on donkeys '
  '19':
  - type: text
    content: and said to her servants, “Go on ahead. I will follow you shortly.” But she didn’t tell her husband Nabal what she was doing.
  '2':
  - type: text
    content: 'There was a wealthy man from Maon who owned property near the town of Carmel. He had 3,000 sheep and 1,000 goats, and it was sheep-shearing time. '
  '20':
  - type: text
    content: 'As she was riding her donkey into a mountain ravine, she saw David and his men coming toward her. '
  '21':
  - type: text
    content: 'David had just been saying, “A lot of good it did to help this fellow. We protected his flocks in the wilderness, and nothing he owned was lost or stolen. But he has repaid me evil for good. '
  '22':
  - type: text
    content: May God strike me and kill me
  - type: note
    content: As in Greek version; Hebrew reads May God strike and kill the enemies of David.
  - type: text
    content: ' if even one man of his household is still alive tomorrow morning!”'
  - type: heading
    content: Abigail Intercedes for Nabal
  '23':
  - type: text
    content: 'When Abigail saw David, she quickly got off her donkey and bowed low before him. '
  '24':
  - type: text
    content: 'She fell at his feet and said, “I accept all blame in this matter, my lord. Please listen to what I have to say. '
  '25':
  - type: text
    content: I know Nabal is a wicked and ill-tempered man; please don’t pay any attention to him. He is a fool, just as his name suggests.
  - type: note
    content: The name Nabal means “fool.”
  - type: text
    content: ' But I never even saw the young men you sent.'
  '26':
  - type: text
    content: '“Now, my lord, as surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and you yourself live, since the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept you from murdering and taking vengeance into your own hands, let all your enemies and those who try to harm you be as cursed as Nabal is. '
  '27':
  - type: text
    content: 'And here is a present that I, your servant, have brought to you and your young men. '
  '28':
  - type: text
    content: 'Please forgive me if I have offended you in any way. The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely reward you with a lasting dynasty, for you are fighting the '
  - type: text
    content: Lord
  - type: text
    content: ’s battles. And you have not done wrong throughout your entire life.
  '29':
  - type: text
    content: '“Even when you are chased by those who seek to kill you, your life is safe in the care of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, secure in his treasure pouch! But the lives of your enemies will disappear like stones shot from a sling! '
  '3':
  - type: text
    content: This man’s name was Nabal, and his wife, Abigail, was a sensible and beautiful woman. But Nabal, a descendant of Caleb, was crude and mean in all his dealings.
  '30':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' has done all he promised and has made you leader of Israel, '
  '31':
  - type: text
    content: 'don’t let this be a blemish on your record. Then your conscience won’t have to bear the staggering burden of needless bloodshed and vengeance. And when the '
  - type: text
    content: Lord
  - type: text
    content: ' has done these great things for you, please remember me, your servant!”'
  '32':
  - type: text
    content: 'David replied to Abigail, “Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who has sent you to meet me today! '
  '33':
  - type: text
    content: 'Thank God for your good sense! Bless you for keeping me from murder and from carrying out vengeance with my own hands. '
  '34':
  - type: text
    content: 'For I swear by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who has kept me from hurting you, that if you had not hurried out to meet me, not one of Nabal’s men would still be alive tomorrow morning.” '
  '35':
  - type: text
    content: Then David accepted her present and told her, “Return home in peace. I have heard what you said. We will not kill your husband.”
  '36':
  - type: text
    content: 'When Abigail arrived home, she found that Nabal was throwing a big party and was celebrating like a king. He was very drunk, so she didn’t tell him anything about her meeting with David until dawn the next day. '
  '37':
  - type: text
    content: In the morning when Nabal was sober, his wife told him what had happened. As a result he had a stroke,
  - type: note
    content: Hebrew his heart failed him.
  - type: text
    content: ' and he lay paralyzed on his bed like a stone. '
  '38':
  - type: text
    content: 'About ten days later, the '
  - type: text
    content: Lord
  - type: text
    content: ' struck him, and he died.'
  - type: heading
    content: David Marries Abigail
  '39':
  - type: text
    content: 'When David heard that Nabal was dead, he said, “Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', who has avenged the insult I received from Nabal and has kept me from doing it myself. Nabal has received the punishment for his sin.” Then David sent messengers to Abigail to ask her to become his wife.'
  '4':
  - type: text
    content: 'When David heard that Nabal was shearing his sheep, '
  '40':
  - type: text
    content: When the messengers arrived at Carmel, they told Abigail, “David has sent us to take you back to marry him.”
  '41':
  - type: text
    content: 'She bowed low to the ground and responded, “I, your servant, would be happy to marry David. I would even be willing to become a slave, washing the feet of his servants!” '
  '42':
  - type: text
    content: 'Quickly getting ready, she took along five of her servant girls as attendants, mounted her donkey, and went with David’s messengers. And so she became his wife. '
  '43':
  - type: text
    content: 'David also married Ahinoam from Jezreel, making both of them his wives. '
  '44':
  - type: text
    content: Saul, meanwhile, had given his daughter Michal, David’s wife, to a man from Gallim named Palti son of Laish.
  '5':
  - type: text
    content: 'he sent ten of his young men to Carmel with this message for Nabal: '
  '6':
  - type: text
    content: '“Peace and prosperity to you, your family, and everything you own! '
  '7':
  - type: text
    content: 'I am told that it is sheep-shearing time. While your shepherds stayed among us near Carmel, we never harmed them, and nothing was ever stolen from them. '
  '8':
  - type: text
    content: 'Ask your own men, and they will tell you this is true. So would you be kind to us, since we have come at a time of celebration? Please share any provisions you might have on hand with us and with your friend David.” '
  '9':
  - type: text
    content: David’s young men gave this message to Nabal in David’s name, and they waited for a reply.
