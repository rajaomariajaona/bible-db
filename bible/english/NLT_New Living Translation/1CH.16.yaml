document_id: 1CH.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'They brought the Ark of God and placed it inside the special tent David had prepared for it. And they presented burnt offerings and peace offerings to God. '
  '10':
  - type: text
    content: Exult in his holy name;
  - type: text
    content: 'rejoice, you who worship the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: 'Search for the '
  - type: text
    content: Lord
  - type: text
    content: ' and for his strength;'
  - type: text
    content: continually seek him.
  '12':
  - type: text
    content: Remember the wonders he has performed,
  - type: text
    content: his miracles, and the rulings he has given,
  '13':
  - type: text
    content: you children of his servant Israel,
  - type: text
    content: you descendants of Jacob, his chosen ones.
  '14':
  - type: text
    content: 'He is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  - type: text
    content: His justice is seen throughout the land.
  '15':
  - type: text
    content: Remember his covenant forever—
  - type: text
    content: the commitment he made to a thousand generations.
  '16':
  - type: text
    content: This is the covenant he made with Abraham
  - type: text
    content: and the oath he swore to Isaac.
  '17':
  - type: text
    content: He confirmed it to Jacob as a decree,
  - type: text
    content: 'and to the people of Israel as a never-ending covenant:'
  '18':
  - type: text
    content: “I will give you the land of Canaan
  - type: text
    content: as your special possession.”
  '19':
  - type: text
    content: He said this when you were few in number,
  - type: text
    content: a tiny group of strangers in Canaan.
  '2':
  - type: text
    content: 'When he had finished his sacrifices, David blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: They wandered from nation to nation,
  - type: text
    content: from one kingdom to another.
  '21':
  - type: text
    content: Yet he did not let anyone oppress them.
  - type: text
    content: 'He warned kings on their behalf:'
  '22':
  - type: text
    content: “Do not touch my chosen people,
  - type: text
    content: and do not hurt my prophets.”
  '23':
  - type: text
    content: 'Let the whole earth sing to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Each day proclaim the good news that he saves.
  '24':
  - type: text
    content: Publish his glorious deeds among the nations.
  - type: text
    content: Tell everyone about the amazing things he does.
  '25':
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: '! He is most worthy of praise!'
  - type: text
    content: He is to be feared above all gods.
  '26':
  - type: text
    content: The gods of other nations are mere idols,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens!'
  '27':
  - type: text
    content: Honor and majesty surround him;
  - type: text
    content: strength and joy fill his dwelling.
  '28':
  - type: text
    content: 'O nations of the world, recognize the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'recognize that the '
  - type: text
    content: Lord
  - type: text
    content: ' is glorious and strong.'
  '29':
  - type: text
    content: 'Give to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory he deserves!'
  - type: text
    content: Bring your offering and come into his presence.
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in all his holy splendor.'
  '3':
  - type: text
    content: Then he gave to every man and woman in all Israel a loaf of bread, a cake of dates,
  - type: note
    content: Or a portion of meat. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and a cake of raisins.'
  '30':
  - type: text
    content: Let all the earth tremble before him.
  - type: text
    content: The world stands firm and cannot be shaken.
  '31':
  - type: text
    content: Let the heavens be glad, and the earth rejoice!
  - type: text
    content: 'Tell all the nations, “The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns!”'
  '32':
  - type: text
    content: Let the sea and everything in it shout his praise!
  - type: text
    content: Let the fields and their crops burst out with joy!
  '33':
  - type: text
    content: 'Let the trees of the forest sing for joy before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he is coming to judge the earth.
  '34':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '35':
  - type: text
    content: Cry out, “Save us, O God of our salvation!
  - type: text
    content: Gather and rescue us from among the nations,
  - type: text
    content: so we can thank your holy name
  - type: text
    content: and rejoice and praise you.”
  '36':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: who lives from everlasting to everlasting!
  - type: text
    content: 'And all the people shouted “Amen!” and praised the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Worship at Jerusalem and Gibeon
  '37':
  - type: text
    content: 'David arranged for Asaph and his fellow Levites to serve regularly before the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant, doing whatever needed to be done each day. '
  '38':
  - type: text
    content: This group included Obed-edom (son of Jeduthun), Hosah, and sixty-eight other Levites as gatekeepers.
  '39':
  - type: text
    content: 'Meanwhile, David stationed Zadok the priest and his fellow priests at the Tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the place of worship in Gibeon, where they continued to minister before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'David appointed the following Levites to lead the people in worship before the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '—to invoke his blessings, to give thanks, and to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '40':
  - type: text
    content: 'They sacrificed the regular burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' each morning and evening on the altar set aside for that purpose, obeying everything written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', as he had commanded Israel. '
  '41':
  - type: text
    content: 'David also appointed Heman, Jeduthun, and the others chosen by name to give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for “his faithful love endures forever.” '
  '42':
  - type: text
    content: They used their trumpets, cymbals, and other instruments to accompany their songs of praise to God.
  - type: note
    content: Or to accompany the sacred music; or to accompany singing to God.
  - type: text
    content: ' And the sons of Jeduthun were appointed as gatekeepers.'
  '43':
  - type: text
    content: Then all the people returned to their homes, and David turned and went home to bless his own family.
  '5':
  - type: text
    content: 'Asaph, the leader of this group, sounded the cymbals. Second to him was Zechariah, followed by Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel. They played the harps and lyres. '
  '6':
  - type: text
    content: The priests, Benaiah and Jahaziel, played the trumpets regularly before the Ark of God’s Covenant.
  - type: heading
    content: David’s Song of Praise
  '7':
  - type: text
    content: 'On that day David gave to Asaph and his fellow Levites this song of thanksgiving to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '8':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' and proclaim his greatness.'
  - type: text
    content: Let the whole world know what he has done.
  '9':
  - type: text
    content: Sing to him; yes, sing his praises.
  - type: text
    content: Tell everyone about his wonderful deeds.
