document_id: 1CH.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought the Ark of God and placed it inside the special tent David had prepared for it. And they presented burnt offerings and peace offerings to God. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exult in his holy name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'rejoice, you who worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Search for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and for his strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: continually seek him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember the wonders he has performed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his miracles, and the rulings he has given,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you children of his servant Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you descendants of Jacob, his chosen ones.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His justice is seen throughout the land.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember his covenant forever—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the commitment he made to a thousand generations.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the covenant he made with Abraham
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the oath he swore to Isaac.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He confirmed it to Jacob as a decree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and to the people of Israel as a never-ending covenant:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will give you the land of Canaan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as your special possession.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said this when you were few in number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a tiny group of strangers in Canaan.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had finished his sacrifices, David blessed the people in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wandered from nation to nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one kingdom to another.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he did not let anyone oppress them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He warned kings on their behalf:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not touch my chosen people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not hurt my prophets.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the whole earth sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Each day proclaim the good news that he saves.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publish his glorious deeds among the nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell everyone about the amazing things he does.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! He is most worthy of praise!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is to be feared above all gods.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gods of other nations are mere idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made the heavens!'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honor and majesty surround him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strength and joy fill his dwelling.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O nations of the world, recognize the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'recognize that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is glorious and strong.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the glory he deserves!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring your offering and come into his presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in all his holy splendor.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he gave to every man and woman in all Israel a loaf of bread, a cake of dates,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a portion of meat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and a cake of raisins.'
  '30':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the earth tremble before him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world stands firm and cannot be shaken.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the heavens be glad, and the earth rejoice!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Tell all the nations, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns!”'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the sea and everything in it shout his praise!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the fields and their crops burst out with joy!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the trees of the forest sing for joy before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he is coming to judge the earth.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cry out, “Save us, O God of our salvation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gather and rescue us from among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so we can thank your holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rejoice and praise you.”
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lives from everlasting to everlasting!
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the people shouted “Amen!” and praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Worship at Jerusalem and Gibeon
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'David arranged for Asaph and his fellow Levites to serve regularly before the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant, doing whatever needed to be done each day. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This group included Obed-edom (son of Jeduthun), Hosah, and sixty-eight other Levites as gatekeepers.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, David stationed Zadok the priest and his fellow priests at the Tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the place of worship in Gibeon, where they continued to minister before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David appointed the following Levites to lead the people in worship before the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—to invoke his blessings, to give thanks, and to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They sacrificed the regular burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' each morning and evening on the altar set aside for that purpose, obeying everything written in the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as he had commanded Israel. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David also appointed Heman, Jeduthun, and the others chosen by name to give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for “his faithful love endures forever.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They used their trumpets, cymbals, and other instruments to accompany their songs of praise to God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to accompany the sacred music; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to accompany singing to God.
      marker-yv: yv-n
    - type: text
      text: ' And the sons of Jeduthun were appointed as gatekeepers.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the people returned to their homes, and David turned and went home to bless his own family.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asaph, the leader of this group, sounded the cymbals. Second to him was Zechariah, followed by Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel. They played the harps and lyres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priests, Benaiah and Jahaziel, played the trumpets regularly before the Ark of God’s Covenant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Song of Praise
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On that day David gave to Asaph and his fellow Levites this song of thanksgiving to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and proclaim his greatness.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the whole world know what he has done.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to him; yes, sing his praises.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell everyone about his wonderful deeds.
