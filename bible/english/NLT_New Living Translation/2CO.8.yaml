document_id: 2CO.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Generous Giving
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now I want you to know, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' what God in his kindness has done through the churches in Macedonia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Here is my advice: It would be good for you to finish what you started a year ago. Last year you were the first who wanted to give, and you were the first to begin doing it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now you should finish what you started. Let the eagerness you showed in the beginning be matched now by your giving. Give in proportion to what you have. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Whatever you give is acceptable if you give it eagerly. And give according to what you have, not what you don’t have. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Of course, I don’t mean your giving should make life easy for others and hard for yourselves. I only mean that there should be some equality. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Right now you have plenty and can help those who are in need. Later, they will have plenty and can share with you when you need it. In this way, things will be equal. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: As the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who gathered a lot had nothing left over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who gathered only a little had enough.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 16:18.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Titus and His Companions
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But thank God! He has given Titus the same enthusiasm for you that I have. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Titus welcomed our request that he visit you again. In fact, he himself was very eager to go and see you. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'We are also sending another brother with Titus. All the churches praise him as a preacher of the Good News. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He was appointed by the churches to accompany us as we take the offering to Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 1 Cor 16:3-4.
      marker-yv: yv-n
    - type: text
      text: —a service that glorifies the Lord and shows our eagerness to help.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: They are being tested by many troubles, and they are very poor. But they are also filled with abundant joy, which has overflowed in rich generosity.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'We are traveling together to guard against any criticism for the way we are handling this generous gift. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: We are careful to be honorable before the Lord, but we also want everyone else to see that we are honorable.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'We are also sending with them another of our brothers who has proven himself many times and has shown on many occasions how eager he is. He is now even more enthusiastic because of his great confidence in you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: If anyone asks about Titus, say that he is my partner who works with me to help you. And the brothers with him have been sent by the churches,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: are apostles of the churches.
      marker-yv: yv-n
    - type: text
      text: ' and they bring honor to Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So show them your love, and prove to all the churches that our boasting about you is justified.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I can testify that they gave not only what they could afford, but far more. And they did it of their own free will. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They begged us again and again for the privilege of sharing in the gift for the believers in Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They even did more than we had hoped, for their first action was to give themselves to the Lord and to us, just as God wanted them to do.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So we have urged Titus, who encouraged your giving in the first place, to return to you and encourage you to finish this ministry of giving. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Since you excel in so many ways—in your faith, your gifted speakers, your knowledge, your enthusiasm, and your love from us
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your love for us.
      marker-yv: yv-n
    - type: text
      text: —I want you to excel also in this gracious act of giving.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I am not commanding you to do this. But I am testing how genuine your love is by comparing it with the eagerness of the other churches.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You know the generous grace of our Lord Jesus Christ. Though he was rich, yet for your sakes he became poor, so that by his poverty he could make you rich.
