document_id: 2CO.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Generous Giving
  - type: text
    content: Now I want you to know, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' what God in his kindness has done through the churches in Macedonia. '
  '10':
  - type: text
    content: 'Here is my advice: It would be good for you to finish what you started a year ago. Last year you were the first who wanted to give, and you were the first to begin doing it. '
  '11':
  - type: text
    content: 'Now you should finish what you started. Let the eagerness you showed in the beginning be matched now by your giving. Give in proportion to what you have. '
  '12':
  - type: text
    content: 'Whatever you give is acceptable if you give it eagerly. And give according to what you have, not what you don’t have. '
  '13':
  - type: text
    content: 'Of course, I don’t mean your giving should make life easy for others and hard for yourselves. I only mean that there should be some equality. '
  '14':
  - type: text
    content: 'Right now you have plenty and can help those who are in need. Later, they will have plenty and can share with you when you need it. In this way, things will be equal. '
  '15':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “Those who gathered a lot had nothing left over,
  - type: text
    content: and those who gathered only a little had enough.”
  - type: note
    content: Exod 16:18.
  - type: heading
    content: Titus and His Companions
  '16':
  - type: text
    content: 'But thank God! He has given Titus the same enthusiasm for you that I have. '
  '17':
  - type: text
    content: 'Titus welcomed our request that he visit you again. In fact, he himself was very eager to go and see you. '
  '18':
  - type: text
    content: 'We are also sending another brother with Titus. All the churches praise him as a preacher of the Good News. '
  '19':
  - type: text
    content: He was appointed by the churches to accompany us as we take the offering to Jerusalem
  - type: note
    content: See 1 Cor 16:3-4.
  - type: text
    content: —a service that glorifies the Lord and shows our eagerness to help.
  '2':
  - type: text
    content: They are being tested by many troubles, and they are very poor. But they are also filled with abundant joy, which has overflowed in rich generosity.
  '20':
  - type: text
    content: 'We are traveling together to guard against any criticism for the way we are handling this generous gift. '
  '21':
  - type: text
    content: We are careful to be honorable before the Lord, but we also want everyone else to see that we are honorable.
  '22':
  - type: text
    content: 'We are also sending with them another of our brothers who has proven himself many times and has shown on many occasions how eager he is. He is now even more enthusiastic because of his great confidence in you. '
  '23':
  - type: text
    content: If anyone asks about Titus, say that he is my partner who works with me to help you. And the brothers with him have been sent by the churches,
  - type: note
    content: Greek are apostles of the churches.
  - type: text
    content: ' and they bring honor to Christ. '
  '24':
  - type: text
    content: So show them your love, and prove to all the churches that our boasting about you is justified.
  '3':
  - type: text
    content: 'For I can testify that they gave not only what they could afford, but far more. And they did it of their own free will. '
  '4':
  - type: text
    content: They begged us again and again for the privilege of sharing in the gift for the believers in Jerusalem.
  - type: note
    content: Greek for God’s holy people.
  - type: text
    content: ' '
  '5':
  - type: text
    content: They even did more than we had hoped, for their first action was to give themselves to the Lord and to us, just as God wanted them to do.
  '6':
  - type: text
    content: 'So we have urged Titus, who encouraged your giving in the first place, to return to you and encourage you to finish this ministry of giving. '
  '7':
  - type: text
    content: Since you excel in so many ways—in your faith, your gifted speakers, your knowledge, your enthusiasm, and your love from us
  - type: note
    content: Some manuscripts read your love for us.
  - type: text
    content: —I want you to excel also in this gracious act of giving.
  '8':
  - type: text
    content: I am not commanding you to do this. But I am testing how genuine your love is by comparing it with the eagerness of the other churches.
  '9':
  - type: text
    content: You know the generous grace of our Lord Jesus Christ. Though he was rich, yet for your sakes he became poor, so that by his poverty he could make you rich.
