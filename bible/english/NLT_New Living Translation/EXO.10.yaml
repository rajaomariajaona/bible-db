document_id: EXO.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Locusts
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Return to Pharaoh and make your demands again. I have made him and his officials stubborn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have made his heart and his officials’ hearts heavy.
      marker-yv: yv-n
    - type: text
      text: ' so I can display my miraculous signs among them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh retorted, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will certainly need to be with you if I let you take your little ones! I can see through your evil plan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Never! Only the men may go and worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', since that is what you requested.” And Pharaoh threw them out of the palace.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Raise your hand over the land of Egypt to bring on the locusts. Let them cover the land and devour every plant that survived the hailstorm.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses raised his staff over Egypt, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' caused an east wind to blow over the land all that day and through the night. When morning arrived, the east wind had brought the locusts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the locusts swarmed over the whole land of Egypt, settling in dense swarms from one end of the country to the other. It was the worst locust plague in Egyptian history, and there has never been another one like it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the locusts covered the whole country and darkened the land. They devoured every plant in the fields and all the fruit on the trees that had survived the hailstorm. Not a single leaf was left on the trees and plants throughout the land of Egypt.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh quickly summoned Moses and Aaron. “I have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and against you,” he confessed. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Forgive my sin, just this once, and plead with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God to take away this death from me.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses left Pharaoh’s court and pleaded with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' responded by shifting the wind, and the strong west wind blew the locusts into the Red Sea.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
    - type: text
      text: ' Not a single locust remained in all the land of Egypt. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I’ve also done it so you can tell your children and grandchildren about how I made a mockery of the Egyptians and about the signs I displayed among them—and so you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hardened Pharaoh’s heart again, so he refused to let the people go.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Darkness
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Lift your hand toward heaven, and the land of Egypt will be covered with a darkness so thick you can feel it.” '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Moses lifted his hand to the sky, and a deep darkness covered the entire land of Egypt for three days. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: During all that time the people could not see each other, and no one moved. But there was light as usual where the people of Israel lived.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, Pharaoh called for Moses. “Go and worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” he said. “But leave your flocks and herds here. You may even take your little ones with you.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No,” Moses said, “you must provide us with animals for sacrifices and burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All our livestock must go with us, too; not a hoof can be left behind. We must choose our sacrifices for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God from among these animals. And we won’t know how we are to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' until we get there.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hardened Pharaoh’s heart once more, and he would not let them go. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Get out of here!” Pharaoh shouted at Moses. “I’m warning you. Never come back to see me again! The day you see my face, you will die!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Very well,” Moses replied. “I will never see your face again.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses and Aaron went to Pharaoh and said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, says: How long will you refuse to submit to me? Let my people go, so they can worship me. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you refuse, watch out! For tomorrow I will bring a swarm of locusts on your country. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will cover the land so that you won’t be able to see the ground. They will devour what little is left of your crops after the hailstorm, including all the trees growing in the fields. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will overrun your palaces and the homes of your officials and all the houses in Egypt. Never in the history of Egypt have your ancestors seen a plague like this one!” And with that, Moses turned and left Pharaoh.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh’s officials now came to Pharaoh and appealed to him. “How long will you let this man hold us hostage? Let the men go to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God! Don’t you realize that Egypt lies in ruins?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses and Aaron were brought back to Pharaoh. “All right,” he told them, “go and worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. But who exactly will be going with you?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses replied, “We will all go—young and old, our sons and daughters, and our flocks and herds. We must all join together in celebrating a festival to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
