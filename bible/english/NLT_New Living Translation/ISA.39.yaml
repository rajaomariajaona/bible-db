segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Envoys from Babylon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Soon after this, Merodach-baladan son of Baladan, king of Babylon, sent Hezekiah his best wishes and a gift. He had heard that Hezekiah had been very sick and that he had recovered. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hezekiah was delighted with the Babylonian envoys and showed them everything in his treasure-houses—the silver, the gold, the spices, and the aromatic oils. He also took them to see his armory and showed them everything in his royal treasuries! There was nothing in his palace or kingdom that Hezekiah did not show them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Isaiah the prophet went to King Hezekiah and asked him, “What did those men want? Where were they from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Hezekiah replied, “They came from the distant land of Babylon.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “What did they see in your palace?” asked Isaiah.
- type: usfm
  marker: p
  children:
  - type: text
    text: “They saw everything,” Hezekiah replied. “I showed them everything I own—all my royal treasuries.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Isaiah said to Hezekiah, “Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '‘The time is coming when everything in your palace—all the treasures stored up by your ancestors until now—will be carried off to Babylon. Nothing will be left,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ‘Some of your very own sons will be taken away into exile. They will become eunuchs who will serve in the palace of Babylon’s king.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Hezekiah said to Isaiah, “This message you have given me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good.” For the king was thinking, “At least there will be peace and security during my lifetime.”'
