document_id: MAT.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Twelve Apostles
  - type: text
    content: Jesus called his twelve disciples together and gave them authority to cast out evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirits and to heal every kind of disease and illness. '
  '10':
  - type: text
    content: Don’t carry a traveler’s bag with a change of clothes and sandals or even a walking stick. Don’t hesitate to accept hospitality, because those who work deserve to be fed.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “Whenever you enter a city or village, search for a worthy person and stay in his home until you leave town.
  - type: text
    content: ' '
  '12':
  - type: text
    content: When you enter the home, give it your blessing.
  - type: text
    content: ' '
  '13':
  - type: text
    content: If it turns out to be a worthy home, let your blessing stand; if it is not, take back the blessing.
  - type: text
    content: ' '
  '14':
  - type: text
    content: If any household or town refuses to welcome you or listen to your message, shake its dust from your feet as you leave.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I tell you the truth, the wicked cities of Sodom and Gomorrah will be better off than such a town on the judgment day.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Look, I am sending you out as sheep among wolves. So be as shrewd as snakes and harmless as doves.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But beware! For you will be handed over to the courts and will be flogged with whips in the synagogues.
  - type: text
    content: ' '
  '18':
  - type: text
    content: You will stand trial before governors and kings because you are my followers. But this will be your opportunity to tell the rulers and other unbelievers about me.
  - type: note
    content: Or But this will be your testimony against the rulers and other unbelievers.
  - type: text
    content: ' '
  '19':
  - type: text
    content: When you are arrested, don’t worry about how to respond or what to say. God will give you the right words at the right time.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Here are the names of the twelve apostles:'
  - type: text
    content: first, Simon (also called Peter),
  - type: text
    content: then Andrew (Peter’s brother),
  - type: text
    content: James (son of Zebedee),
  - type: text
    content: John (James’s brother),
  '20':
  - type: text
    content: For it is not you who will be speaking—it will be the Spirit of your Father speaking through you.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “A brother will betray his brother to death, a father will betray his own child, and children will rebel against their parents and cause them to be killed.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And all nations will hate you because you are my followers.
  - type: note
    content: Greek on account of my name.
  - type: text
    content: ' '
  - type: text
    content: But everyone who endures to the end will be saved.
  - type: text
    content: ' '
  '23':
  - type: text
    content: When you are persecuted in one town, flee to the next. I tell you the truth, the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: will return before you have reached all the towns of Israel.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Students
  - type: text
    content: ' '
  - type: note
    content: Or Disciples.
  - type: text
    content: are not greater than their teacher, and slaves are not greater than their master.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Students are to be like their teacher, and slaves are to be like their master. And since I, the master of the household, have been called the prince of demons,
  - type: note
    content: Greek Beelzeboul; other manuscripts read Beezeboul; Latin version reads Beelzebub.
  - type: text
    content: ' '
  - type: text
    content: the members of my household will be called by even worse names!
  '26':
  - type: text
    content: ' '
  - type: text
    content: “But don’t be afraid of those who threaten you. For the time is coming when everything that is covered will be revealed, and all that is secret will be made known to all.
  - type: text
    content: ' '
  '27':
  - type: text
    content: What I tell you now in the darkness, shout abroad when daybreak comes. What I whisper in your ear, shout from the housetops for all to hear!
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Don’t be afraid of those who want to kill your body; they cannot touch your soul. Fear only God, who can destroy both soul and body in hell.
  - type: text
    content: ' '
  - type: note
    content: Greek Gehenna.
  '29':
  - type: text
    content: What is the price of two sparrows—one copper coin
  - type: note
    content: Greek one assarion [i.e., one “as,” a Roman coin equal to 1/16 of a denarius].
  - type: text
    content: '? But not a single sparrow can fall to the ground without your Father knowing it.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Philip,
  - type: text
    content: Bartholomew,
  - type: text
    content: Thomas,
  - type: text
    content: Matthew (the tax collector),
  - type: text
    content: James (son of Alphaeus),
  - type: text
    content: Thaddaeus,
  - type: note
    content: Other manuscripts read Lebbaeus; still others read Lebbaeus who is called Thaddaeus.
  '30':
  - type: text
    content: And the very hairs on your head are all numbered.
  - type: text
    content: ' '
  '31':
  - type: text
    content: So don’t be afraid; you are more valuable to God than a whole flock of sparrows.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “Everyone who acknowledges me publicly here on earth, I will also acknowledge before my Father in heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But everyone who denies me here on earth, I will also deny before my Father in heaven.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Don’t imagine that I came to bring peace to the earth! I came not to bring peace, but a sword.
  '35':
  - type: text
    content: ' '
  - type: text
    content: ‘I have come to set a man against his father,
  - type: text
    content: a daughter against her mother,
  - type: text
    content: and a daughter-in-law against her mother-in-law.
  '36':
  - type: text
    content: ' '
  - type: text
    content: Your enemies will be right in your own household!’
  - type: note
    content: Mic 7:6.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “If you love your father or mother more than you love me, you are not worthy of being mine; or if you love your son or daughter more than me, you are not worthy of being mine.
  - type: text
    content: ' '
  '38':
  - type: text
    content: If you refuse to take up your cross and follow me, you are not worthy of being mine.
  - type: text
    content: ' '
  '39':
  - type: text
    content: If you cling to your life, you will lose it; but if you give up your life for me, you will find it.
  '4':
  - type: text
    content: Simon (the zealot
  - type: note
    content: Greek the Cananean, an Aramaic term for Jewish nationalists.
  - type: text
    content: ),
  - type: text
    content: Judas Iscariot (who later betrayed him).
  '40':
  - type: text
    content: ' '
  - type: text
    content: “Anyone who receives you receives me, and anyone who receives me receives the Father who sent me.
  - type: text
    content: ' '
  '41':
  - type: text
    content: If you receive a prophet as one who speaks for God,
  - type: note
    content: Greek receive a prophet in the name of a prophet.
  - type: text
    content: ' '
  - type: text
    content: you will be given the same reward as a prophet. And if you receive righteous people because of their righteousness, you will be given a reward like theirs.
  - type: text
    content: ' '
  '42':
  - type: text
    content: And if you give even a cup of cold water to one of the least of my followers, you will surely be rewarded.”
  '5':
  - type: text
    content: 'Jesus sent out the twelve apostles with these instructions: '
  - type: text
    content: “Don’t go to the Gentiles or the Samaritans,
  - type: text
    content: ' '
  '6':
  - type: text
    content: but only to the people of Israel—God’s lost sheep.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Go and announce to them that the Kingdom of Heaven is near.
  - type: note
    content: Or has come, or is coming soon.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Heal the sick, raise the dead, cure those with leprosy, and cast out demons. Give as freely as you have received!
  '9':
  - type: text
    content: ' '
  - type: text
    content: “Don’t take any money in your money belts—no gold, silver, or even copper coins.
  - type: text
    content: ' '
