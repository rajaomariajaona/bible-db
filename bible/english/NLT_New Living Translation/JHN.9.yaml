document_id: JHN.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Man Born Blind
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'As Jesus was walking along, he saw a man who had been blind from birth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They asked, “Who healed you? What happened?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He told them, “The man they call Jesus made mud and spread it over my eyes and told me, ‘Go to the pool of Siloam and wash yourself.’ So I went and washed, and now I can see!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Where is he now?” they asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I don’t know,” he replied.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then they took the man who had been blind to the Pharisees, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'because it was on the Sabbath that Jesus had made the mud and healed him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The Pharisees asked the man all about it. So he told them, “He put the mud over my eyes, and when I washed it away, I could see!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Some of the Pharisees said, “This man Jesus is not from God, for he is working on the Sabbath.” Others said, “But how could an ordinary sinner do such miraculous signs?” So there was a deep division of opinion among them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the Pharisees again questioned the man who had been blind and demanded, “What’s your opinion about this man who healed you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man replied, “I think he must be a prophet.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The Jewish leaders still refused to believe the man had been blind and could now see, so they called in his parents. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They asked them, “Is this your son? Was he born blind? If so, how can he now see?”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Rabbi,” his disciples asked him, “why was this man born blind? Was it because of his own sins or his parents’ sins?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'His parents replied, “We know this is our son and that he was born blind, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'but we don’t know how he can see or who healed him. Ask him. He is old enough to speak for himself.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'His parents said this because they were afraid of the Jewish leaders, who had announced that anyone saying Jesus was the Messiah would be expelled from the synagogue. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: That’s why they said, “He is old enough. Ask him.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So for the second time they called in the man who had been blind and told him, “God should get the glory for this,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Give glory to God, not to Jesus; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Give glory to God.
      marker-yv: yv-n
    - type: text
      text: ' because we know this man Jesus is a sinner.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“I don’t know whether he is a sinner,” the man replied. “But I know this: I was blind, and now I can see!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “But what did he do?” they asked. “How did he heal you?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Look!” the man exclaimed. “I told you once. Didn’t you listen? Why do you want to hear it again? Do you want to become his disciples, too?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then they cursed him and said, “You are his disciple, but we are disciples of Moses! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: We know God spoke to Moses, but we don’t even know where this man comes from.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It was not because of his sins or his parents’ sins,” '
    - type: text
      text: 'Jesus answered. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This happened so the power of God could be seen in him.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“Why, that’s very strange!” the man replied. “He healed my eyes, and yet you don’t know where he comes from? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'We know that God doesn’t listen to sinners, but he is ready to hear those who worship him and do his will. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ever since the world began, no one has been able to open the eyes of someone born blind. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: If this man were not from God, he couldn’t have done it.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “You were born a total sinner!” they answered. “Are you trying to teach us?” And they threw him out of the synagogue.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spiritual Blindness
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When Jesus heard what had happened, he found the man and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe in the Son of Man?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Son of God? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: The man answered, “Who is he, sir? I want to believe in him.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You have seen him,” '
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and he is speaking to you!”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: “Yes, Lord, I believe!” the man said. And he worshiped Jesus.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Then Jesus told him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:38-39a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Yes, Lord, I believe!” the man said. And he worshiped Jesus. Then Jesus told him.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I entered this world to render judgment—to give sight to the blind and to show those who think they see
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:39b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: those who see.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that they are blind.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: We must quickly carry out the tasks assigned us by the one who sent us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I must quickly carry out the tasks assigned me by the one who sent me; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: We must quickly carry out the tasks assigned us by the one who sent me.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The night is coming, and then no one can work.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Some Pharisees who were standing nearby heard him and asked, “Are you saying we’re blind?”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“If you were blind, you wouldn’t be guilty,” '
    - type: text
      text: 'Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But you remain guilty because you claim you can see.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But while I am here in the world, I am the light of the world.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then he spit on the ground, made mud with the saliva, and spread the mud over the blind man’s eyes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go wash yourself in the pool of Siloam”
    - type: text
      text: ' (Siloam means “sent”). So the man went and washed and came back seeing!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'His neighbors and others who knew him as a blind beggar asked each other, “Isn’t this the man who used to sit and beg?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Some said he was, and others said, “No, he just looks like him!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the beggar kept saying, “Yes, I am the same one!”
