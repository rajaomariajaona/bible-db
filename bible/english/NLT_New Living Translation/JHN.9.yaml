document_id: JHN.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man Born Blind
  - type: text
    content: 'As Jesus was walking along, he saw a man who had been blind from birth. '
  '10':
  - type: text
    content: They asked, “Who healed you? What happened?”
  '11':
  - type: text
    content: He told them, “The man they call Jesus made mud and spread it over my eyes and told me, ‘Go to the pool of Siloam and wash yourself.’ So I went and washed, and now I can see!”
  '12':
  - type: text
    content: “Where is he now?” they asked.
  - type: text
    content: “I don’t know,” he replied.
  '13':
  - type: text
    content: 'Then they took the man who had been blind to the Pharisees, '
  '14':
  - type: text
    content: 'because it was on the Sabbath that Jesus had made the mud and healed him. '
  '15':
  - type: text
    content: The Pharisees asked the man all about it. So he told them, “He put the mud over my eyes, and when I washed it away, I could see!”
  '16':
  - type: text
    content: Some of the Pharisees said, “This man Jesus is not from God, for he is working on the Sabbath.” Others said, “But how could an ordinary sinner do such miraculous signs?” So there was a deep division of opinion among them.
  '17':
  - type: text
    content: Then the Pharisees again questioned the man who had been blind and demanded, “What’s your opinion about this man who healed you?”
  - type: text
    content: The man replied, “I think he must be a prophet.”
  '18':
  - type: text
    content: 'The Jewish leaders still refused to believe the man had been blind and could now see, so they called in his parents. '
  '19':
  - type: text
    content: They asked them, “Is this your son? Was he born blind? If so, how can he now see?”
  '2':
  - type: text
    content: “Rabbi,” his disciples asked him, “why was this man born blind? Was it because of his own sins or his parents’ sins?”
  '20':
  - type: text
    content: 'His parents replied, “We know this is our son and that he was born blind, '
  '21':
  - type: text
    content: 'but we don’t know how he can see or who healed him. Ask him. He is old enough to speak for himself.” '
  '22':
  - type: text
    content: 'His parents said this because they were afraid of the Jewish leaders, who had announced that anyone saying Jesus was the Messiah would be expelled from the synagogue. '
  '23':
  - type: text
    content: That’s why they said, “He is old enough. Ask him.”
  '24':
  - type: text
    content: So for the second time they called in the man who had been blind and told him, “God should get the glory for this,
  - type: note
    content: Or Give glory to God, not to Jesus; Greek reads Give glory to God.
  - type: text
    content: ' because we know this man Jesus is a sinner.”'
  '25':
  - type: text
    content: '“I don’t know whether he is a sinner,” the man replied. “But I know this: I was blind, and now I can see!”'
  '26':
  - type: text
    content: “But what did he do?” they asked. “How did he heal you?”
  '27':
  - type: text
    content: “Look!” the man exclaimed. “I told you once. Didn’t you listen? Why do you want to hear it again? Do you want to become his disciples, too?”
  '28':
  - type: text
    content: 'Then they cursed him and said, “You are his disciple, but we are disciples of Moses! '
  '29':
  - type: text
    content: We know God spoke to Moses, but we don’t even know where this man comes from.”
  '3':
  - type: text
    content: ' '
  - type: text
    content: '“It was not because of his sins or his parents’ sins,” '
  - type: text
    content: 'Jesus answered. '
  - type: text
    content: “This happened so the power of God could be seen in him.
  - type: text
    content: ' '
  '30':
  - type: text
    content: '“Why, that’s very strange!” the man replied. “He healed my eyes, and yet you don’t know where he comes from? '
  '31':
  - type: text
    content: 'We know that God doesn’t listen to sinners, but he is ready to hear those who worship him and do his will. '
  '32':
  - type: text
    content: 'Ever since the world began, no one has been able to open the eyes of someone born blind. '
  '33':
  - type: text
    content: If this man were not from God, he couldn’t have done it.”
  '34':
  - type: text
    content: “You were born a total sinner!” they answered. “Are you trying to teach us?” And they threw him out of the synagogue.
  - type: heading
    content: Spiritual Blindness
  '35':
  - type: text
    content: 'When Jesus heard what had happened, he found the man and asked, '
  - type: text
    content: “Do you believe in the Son of Man?
  - type: note
    content: Some manuscripts read the Son of God? “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ”
  '36':
  - type: text
    content: The man answered, “Who is he, sir? I want to believe in him.”
  '37':
  - type: text
    content: ' '
  - type: text
    content: '“You have seen him,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “and he is speaking to you!”
  '38':
  - type: text
    content: “Yes, Lord, I believe!” the man said. And he worshiped Jesus.
  '39':
  - type: text
    content: Then Jesus told him,
  - type: note
    content: Some manuscripts do not include “Yes, Lord, I believe!” the man said. And he worshiped Jesus. Then Jesus told him.
  - type: text
    content: ' '
  - type: text
    content: “I entered this world to render judgment—to give sight to the blind and to show those who think they see
  - type: note
    content: Greek those who see.
  - type: text
    content: ' '
  - type: text
    content: that they are blind.”
  '4':
  - type: text
    content: We must quickly carry out the tasks assigned us by the one who sent us.
  - type: note
    content: Other manuscripts read I must quickly carry out the tasks assigned me by the one who sent me; still others read We must quickly carry out the tasks assigned us by the one who sent me.
  - type: text
    content: ' '
  - type: text
    content: The night is coming, and then no one can work.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Some Pharisees who were standing nearby heard him and asked, “Are you saying we’re blind?”
  '41':
  - type: text
    content: ' '
  - type: text
    content: '“If you were blind, you wouldn’t be guilty,” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “But you remain guilty because you claim you can see.
  '5':
  - type: text
    content: But while I am here in the world, I am the light of the world.”
  '6':
  - type: text
    content: 'Then he spit on the ground, made mud with the saliva, and spread the mud over the blind man’s eyes. '
  '7':
  - type: text
    content: 'He told him, '
  - type: text
    content: “Go wash yourself in the pool of Siloam”
  - type: text
    content: ' (Siloam means “sent”). So the man went and washed and came back seeing!'
  '8':
  - type: text
    content: 'His neighbors and others who knew him as a blind beggar asked each other, “Isn’t this the man who used to sit and beg?” '
  '9':
  - type: text
    content: Some said he was, and others said, “No, he just looks like him!”
  - type: text
    content: But the beggar kept saying, “Yes, I am the same one!”
