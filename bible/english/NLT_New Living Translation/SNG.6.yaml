document_id: SNG.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Young Women of Jerusalem
  - type: text
    content: Where has your lover gone,
  - type: text
    content: O woman of rare beauty?
  - type: text
    content: Which way did he turn
  - type: text
    content: so we can help you find him?
  - type: heading
    content: Young Woman
  '10':
  - type: text
    content: “Who is this, arising like the dawn,
  - type: text
    content: as fair as the moon,
  - type: text
    content: as bright as the sun,
  - type: text
    content: as majestic as an army with billowing banners?”
  - type: heading
    content: Young Woman
  '11':
  - type: text
    content: I went down to the grove of walnut trees
  - type: text
    content: and out to the valley to see the new spring growth,
  - type: text
    content: to see whether the grapevines had budded
  - type: text
    content: or the pomegranates were in bloom.
  '12':
  - type: text
    content: Before I realized it,
  - type: text
    content: my strong desires had taken me to the chariot of a noble man.
  - type: note
    content: Or to the royal chariots of my people, or to the chariots of Amminadab. The meaning of the Hebrew is uncertain.
  - type: heading
    content: Young Women of Jerusalem
  '13':
  - type: text
    content: ' '
  - type: note
    content: Verse 6:13 is numbered 7:1 in Hebrew text.
  - type: text
    content: Return, return to us, O maid of Shulam.
  - type: text
    content: Come back, come back, that we may see you again.
  - type: heading
    content: Young Man
  - type: text
    content: Why do you stare at this young woman of Shulam,
  - type: text
    content: as she moves so gracefully between two lines of dancers?
  - type: note
    content: Or as you would at the movements of two armies? or as you would at the dance of Mahanaim? The meaning of the Hebrew is uncertain.
  '2':
  - type: text
    content: My lover has gone down to his garden,
  - type: text
    content: to his spice beds,
  - type: text
    content: to browse in the gardens
  - type: text
    content: and gather the lilies.
  '3':
  - type: text
    content: I am my lover’s, and my lover is mine.
  - type: text
    content: He browses among the lilies.
  - type: heading
    content: Young Man
  '4':
  - type: text
    content: You are beautiful, my darling,
  - type: text
    content: like the lovely city of Tirzah.
  - type: text
    content: Yes, as beautiful as Jerusalem,
  - type: text
    content: as majestic as an army with billowing banners.
  '5':
  - type: text
    content: Turn your eyes away,
  - type: text
    content: for they overpower me.
  - type: text
    content: Your hair falls in waves,
  - type: text
    content: like a flock of goats winding down the slopes of Gilead.
  '6':
  - type: text
    content: Your teeth are as white as sheep
  - type: text
    content: that are freshly washed.
  - type: text
    content: Your smile is flawless,
  - type: text
    content: each tooth matched with its twin.
  - type: note
    content: Hebrew Not one is missing; each has a twin.
  '7':
  - type: text
    content: Your cheeks are like rosy pomegranates
  - type: text
    content: behind your veil.
  '8':
  - type: text
    content: Even among sixty queens
  - type: text
    content: and eighty concubines
  - type: text
    content: and countless young women,
  '9':
  - type: text
    content: I would still choose my dove, my perfect one—
  - type: text
    content: the favorite of her mother,
  - type: text
    content: dearly loved by the one who bore her.
  - type: text
    content: The young women see her and praise her;
  - type: text
    content: 'even queens and royal concubines sing her praises:'
