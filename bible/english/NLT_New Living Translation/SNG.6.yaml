document_id: SNG.6
type_code: eng
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Women of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Where has your lover gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O woman of rare beauty?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which way did he turn
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we can help you find him?
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My lover has gone down to his garden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to his spice beds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to browse in the gardens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I am my lover’s, and my lover is mine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He browses among the lilies.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You are beautiful, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the lovely city of Tirzah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, as beautiful as Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as majestic as an army with billowing banners.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Turn your eyes away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they overpower me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your hair falls in waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a flock of goats winding down the slopes of Gilead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your teeth are as white as sheep
- type: usfm
  marker: q2
  children:
  - type: text
    text: that are freshly washed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your smile is flawless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each tooth matched with its twin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Not one is missing; each has a twin.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your cheeks are like rosy pomegranates
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind your veil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even among sixty queens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eighty concubines
- type: usfm
  marker: q2
  children:
  - type: text
    text: and countless young women,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I would still choose my dove, my perfect one—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the favorite of her mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dearly loved by the one who bore her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The young women see her and praise her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'even queens and royal concubines sing her praises:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Who is this, arising like the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as fair as the moon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as bright as the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as majestic as an army with billowing banners?”
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I went down to the grove of walnut trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and out to the valley to see the new spring growth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to see whether the grapevines had budded
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the pomegranates were in bloom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Before I realized it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my strong desires had taken me to the chariot of a noble man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to the royal chariots of my people, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to the chariots of Amminadab. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Women of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 6:13 is numbered 7:1 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: Return, return to us, O maid of Shulam.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come back, come back, that we may see you again.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you stare at this young woman of Shulam,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as she moves so gracefully between two lines of dancers?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'as you would at the movements of two armies? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'as you would at the dance of Mahanaim? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
