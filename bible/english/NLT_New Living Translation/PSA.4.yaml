document_id: PSA.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by stringed instruments.'
  - type: text
    content: Answer me when I call to you,
  - type: text
    content: O God who declares me innocent.
  - type: text
    content: Free me from my troubles.
  - type: text
    content: Have mercy on me and hear my prayer.
  '2':
  - type: text
    content: How long will you people ruin my reputation?
  - type: text
    content: How long will you make groundless accusations?
  - type: text
    content: 'How long will you continue your lies? '
  - type: text
    content: Interlude
  '3':
  - type: text
    content: 'You can be sure of this:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' set apart the godly for himself.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will answer when I call to him.'
  '4':
  - type: text
    content: Don’t sin by letting anger control you.
  - type: text
    content: 'Think about it overnight and remain silent. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: Offer sacrifices in the right spirit,
  - type: text
    content: 'and trust the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: Many people say, “Who will show us better times?”
  - type: text
    content: 'Let your face smile on us, '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: You have given me greater joy
  - type: text
    content: than those who have abundant harvests of grain and new wine.
  '8':
  - type: text
    content: In peace I will lie down and sleep,
  - type: text
    content: 'for you alone, O '
  - type: text
    content: Lord
  - type: text
    content: ', will keep me safe.'
