document_id: PSA.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, to be accompanied by stringed instruments.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Answer me when I call to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God who declares me innocent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Free me from my troubles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have mercy on me and hear my prayer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: How long will you people ruin my reputation?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you make groundless accusations?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How long will you continue your lies? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You can be sure of this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' set apart the godly for himself.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will answer when I call to him.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t sin by letting anger control you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Think about it overnight and remain silent. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Offer sacrifices in the right spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Many people say, “Who will show us better times?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let your face smile on us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You have given me greater joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than those who have abundant harvests of grain and new wine.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In peace I will lie down and sleep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you alone, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will keep me safe.'
