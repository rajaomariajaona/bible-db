document_id: JER.41,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Murder of Gedaliah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: But in midautumn of that year,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the seventh month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This month occurred within the months of October and November 586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 39:1a.
      marker-yv: yv-n
    - type: text
      text: ' Ishmael son of Nethaniah and grandson of Elishama, who was a member of the royal family and had been one of the king’s high officials, went to Mizpah with ten men to meet Gedaliah. While they were eating together, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ishmael made captives of the king’s daughters and the other people who had been left under Gedaliah’s care in Mizpah by Nebuzaradan, the captain of the guard. Taking them with him, he started back toward the land of Ammon.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Johanan son of Kareah and the other military leaders heard about Ishmael’s crimes, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they took all their men and set out to stop him. They caught up with him at the large pool near Gibeon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people Ishmael had captured shouted for joy when they saw Johanan and the other military leaders. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the captives from Mizpah escaped and began to help Johanan. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Ishmael and eight of his men escaped from Johanan into the land of Ammon.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Johanan son of Kareah and the other military leaders took all the people they had rescued in Gibeon—the soldiers, women, children, and court officials
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eunuchs.
      marker-yv: yv-n
    - type: text
      text: ' whom Ishmael had captured after he killed Gedaliah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took them all to the village of Geruth-kimham near Bethlehem, where they prepared to leave for Egypt. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were afraid of what the Babylonians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans.
      marker-yv: yv-n
    - type: text
      text: ' would do when they heard that Ishmael had killed Gedaliah, the governor appointed by the Babylonian king.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ishmael and his ten men suddenly jumped up, drew their swords, and killed Gedaliah, whom the king of Babylon had appointed governor. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ishmael also killed all the Judeans and the Babylonian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldean.
      marker-yv: yv-n
    - type: text
      text: ' soldiers who were with Gedaliah at Mizpah.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, before anyone had heard about Gedaliah’s murder, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eighty men arrived from Shechem, Shiloh, and Samaria to worship at the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They had shaved off their beards, torn their clothes, and cut themselves, and had brought along grain offerings and frankincense. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ishmael left Mizpah to meet them, weeping as he went. When he reached them, he said, “Oh, come and see what has happened to Gedaliah!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as soon as they were all inside the town, Ishmael and his men killed all but ten of them and threw their bodies into a cistern. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The other ten had talked Ishmael into letting them go by promising to bring him their stores of wheat, barley, olive oil, and honey that they had hidden away. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cistern where Ishmael dumped the bodies of the men he murdered was the large one
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: murdered because of Gedaliah was one.
      marker-yv: yv-n
    - type: text
      text: ' dug by King Asa when he fortified Mizpah to protect himself against King Baasha of Israel. Ishmael son of Nethaniah filled it with corpses.'
