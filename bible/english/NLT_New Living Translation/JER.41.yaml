document_id: JER.41,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Murder of Gedaliah
  - type: text
    content: But in midautumn of that year,
  - type: note
    content: Hebrew in the seventh month, of the ancient Hebrew lunar calendar. This month occurred within the months of October and November 586 b.c.; also see note on 39:1a.
  - type: text
    content: ' Ishmael son of Nethaniah and grandson of Elishama, who was a member of the royal family and had been one of the king’s high officials, went to Mizpah with ten men to meet Gedaliah. While they were eating together, '
  '10':
  - type: text
    content: Then Ishmael made captives of the king’s daughters and the other people who had been left under Gedaliah’s care in Mizpah by Nebuzaradan, the captain of the guard. Taking them with him, he started back toward the land of Ammon.
  '11':
  - type: text
    content: 'But when Johanan son of Kareah and the other military leaders heard about Ishmael’s crimes, '
  '12':
  - type: text
    content: 'they took all their men and set out to stop him. They caught up with him at the large pool near Gibeon. '
  '13':
  - type: text
    content: 'The people Ishmael had captured shouted for joy when they saw Johanan and the other military leaders. '
  '14':
  - type: text
    content: 'And all the captives from Mizpah escaped and began to help Johanan. '
  '15':
  - type: text
    content: Meanwhile, Ishmael and eight of his men escaped from Johanan into the land of Ammon.
  '16':
  - type: text
    content: Then Johanan son of Kareah and the other military leaders took all the people they had rescued in Gibeon—the soldiers, women, children, and court officials
  - type: note
    content: Or eunuchs.
  - type: text
    content: ' whom Ishmael had captured after he killed Gedaliah. '
  '17':
  - type: text
    content: 'They took them all to the village of Geruth-kimham near Bethlehem, where they prepared to leave for Egypt. '
  '18':
  - type: text
    content: They were afraid of what the Babylonians
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' would do when they heard that Ishmael had killed Gedaliah, the governor appointed by the Babylonian king.'
  '2':
  - type: text
    content: 'Ishmael and his ten men suddenly jumped up, drew their swords, and killed Gedaliah, whom the king of Babylon had appointed governor. '
  '3':
  - type: text
    content: Ishmael also killed all the Judeans and the Babylonian
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' soldiers who were with Gedaliah at Mizpah.'
  '4':
  - type: text
    content: 'The next day, before anyone had heard about Gedaliah’s murder, '
  '5':
  - type: text
    content: 'eighty men arrived from Shechem, Shiloh, and Samaria to worship at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. They had shaved off their beards, torn their clothes, and cut themselves, and had brought along grain offerings and frankincense. '
  '6':
  - type: text
    content: Ishmael left Mizpah to meet them, weeping as he went. When he reached them, he said, “Oh, come and see what has happened to Gedaliah!”
  '7':
  - type: text
    content: 'But as soon as they were all inside the town, Ishmael and his men killed all but ten of them and threw their bodies into a cistern. '
  '8':
  - type: text
    content: 'The other ten had talked Ishmael into letting them go by promising to bring him their stores of wheat, barley, olive oil, and honey that they had hidden away. '
  '9':
  - type: text
    content: The cistern where Ishmael dumped the bodies of the men he murdered was the large one
  - type: note
    content: As in Greek version; Hebrew reads murdered because of Gedaliah was one.
  - type: text
    content: ' dug by King Asa when he fortified Mizpah to protect himself against King Baasha of Israel. Ishmael son of Nethaniah filled it with corpses.'
