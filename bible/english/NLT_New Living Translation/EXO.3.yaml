document_id: EXO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses and the Burning Bush
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day Moses was tending the flock of his father-in-law, Jethro,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses’ father-in-law went by two names, Jethro and Reuel.
    marker-yv: yv-n
  - type: text
    text: ' the priest of Midian. He led the flock far into the wilderness and came to Sinai,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Horeb, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Sinai.
    marker-yv: yv-n
  - type: text
    text: ' the mountain of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to him in a blazing fire from the middle of a bush. Moses stared in amazement. Though the bush was engulfed in flames, it didn’t burn up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “This is amazing,” Moses said to himself. “Why isn’t that bush burning up? I must go see it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' saw Moses coming to take a closer look, God called to him from the middle of the bush, “Moses! Moses!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Here I am!” Moses replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Do not come any closer,” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' warned. “Take off your sandals, for you are standing on holy ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am the God of your father
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your fathers.
    marker-yv: yv-n
  - type: text
    text: —the God of Abraham, the God of Isaac, and the God of Jacob.” When Moses heard this, he covered his face because he was afraid to look at God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told him, “I have certainly seen the oppression of my people in Egypt. I have heard their cries of distress because of their harsh slave drivers. Yes, I am aware of their suffering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So I have come down to rescue them from the power of the Egyptians and lead them out of Egypt into their own fertile and spacious land. It is a land flowing with milk and honey—the land where the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites now live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Look! The cry of the people of Israel has reached me, and I have seen how harshly the Egyptians abuse them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now go, for I am sending you to Pharaoh. You must lead my people Israel out of Egypt.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But Moses protested to God, “Who am I to appear before Pharaoh? Who am I to lead the people of Israel out of Egypt?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'God answered, “I will be with you. And this is your sign that I am the one who has sent you: When you have brought the people out of Egypt, you will worship God at this very mountain.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But Moses protested, “If I go to the people of Israel and tell them, ‘The God of your ancestors has sent me to you,’ they will ask me, ‘What is his name?’ Then what should I tell them?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: God replied to Moses, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: I Am Who I Am
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Will Be What I Will Be.
    marker-yv: yv-n
  - type: text
    text: ' Say this to the people of Israel: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: I Am
  - type: text
    text: ' has sent me to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'God also said to Moses, “Say this to the people of Israel: Yahweh,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yahweh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(also in 3:16) is a transliteration of the proper name '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ” (note the use of small capitals).
    marker-yv: yv-n
  - type: text
    text: ' the God of your ancestors—the God of Abraham, the God of Isaac, and the God of Jacob—has sent me to you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is my eternal name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my name to remember for all generations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Now go and call together all the elders of Israel. Tell them, ‘Yahweh, the God of your ancestors—the God of Abraham, Isaac, and Jacob—has appeared to me. He told me, “I have been watching closely, and I see how the Egyptians are treating you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I have promised to rescue you from your oppression in Egypt. I will lead you to a land flowing with milk and honey—the land where the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites now live.”’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“The elders of Israel will accept your message. Then you and the elders must go to the king of Egypt and tell him, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of the Hebrews, has met with us. So please let us take a three-day journey into the wilderness to offer sacrifices to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', our God.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “But I know that the king of Egypt will not let you go unless a mighty hand forces him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Latin versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will not let you go, not by a mighty hand.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So I will raise my hand and strike the Egyptians, performing all kinds of miracles among them. Then at last he will let you go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I will cause the Egyptians to look favorably on you. They will give you gifts when you go so you will not leave empty-handed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Every Israelite woman will ask for articles of silver and gold and fine clothing from her Egyptian neighbors and from the foreign women in their houses. You will dress your sons and daughters with these, stripping the Egyptians of their wealth.”
